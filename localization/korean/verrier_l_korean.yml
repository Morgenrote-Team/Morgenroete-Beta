 verrier_found_observatory_decision: "천문대 설립"
 verrier_found_observatory_decision_desc: "19세기의 천문학이 비약적인 발전을 이루어낸 것은 무엇보다도 국가의 후원이 있었기 때문입니다. 새로운 항성과 행성, 소행성의 명명은 국가와 통치자에 위신을 가져다 주었기에 천체의 탐색이 활발했던 것입니다. 망원경의 현대화나 사진술 도입처럼 새로운 연구 방법이 등장함에 따라 천체의 발견 수도 엄청나게 증가하였습니다. 천문대를 건설하면 매년 새로운 천체가 자연스럽게 발견될 것이며, 완공된 천문대에서 정확한 수를 확인할 수 있게 됩니다. 새로운 기술과 [concept_verrier_astronomer]의 관여 역시 그 규모를 늘려줄 것입니다."
 verrier_charter_moon_decision: "월면도 제작"
 verrier_charter_moon_decision_desc: "지구의 동반자 달의 표면을 지도화한 월면도와 그것을 제작하려는 시도는 수 세기에 걸쳐 반복되어 왔습니다. 이른바 '월면지'라 부르는 이 학문에 망원경의 발명은 혁신을 일으켰지만, 사진술의 발명으로 월면을 정확히 지도화할 수 있는 전혀 새로운 방법을 찾게 되었습니다."
 verrier_visit_observatory_decision: "천문대 방문"
 verrier_visit_observatory_decision_desc: "우리나라의 대표 천문대를 방문하여 천문학에 관한 국내외의 핵심 정보를 두루 알아봅니다."
 verrier_asteroid_congress_decision: "소행성 천문 회의"
 verrier_asteroid_congress_decision_desc: "1801년 세레스가 발견된 이래 천문학자들이 점점 더 많은 천체를 발견하면서 태양계 행성의 수도 계속 증가하는 결과로 이어졌다. 특히 해왕성의 발견은 화성과 목성 사이의 수많은 소천체들을 새로운 범주로 묶는 것이 적절한가에 관한 의문을 제기하게 되었다. 새로운 천문 기호의 발명과 비교적 작은 크기라는 사실에 착안해 이들을 '소항성'이나 '소행성'으로 칭하는 것이 적절하다는 학자들도 있었다. 물론 이렇게 분류가 이루어진다면 지금까지 행성으로 여겨져 왔던 일부 천체들이 행성 지위를 잃고 단순한 암석 덩어리로 격하된다는 의미를 안긴다."
 verrier_asteroid_congress_decision_tt: "새로운 천체가 발견될수록 행성에 대한 기존의 정의를 개편할 필요성이 더욱 절실해지고 있다. 발견된 천체의 수가 #BLUE 1,500개#!를 넘어가면 상황이 더욱 복잡해져 학술회의를 개최하는 것이 불가피할 듯 싶다."
 verrier_carte_congress_decision: "카르트 뒤 시엘"
 verrier_carte_congress_decision_desc: "1887년 파리 천문대장 아메데 무셰는 건판을 이용한 새로운 사진 촬영술이 성도 제작 방식을 뒤바꿀 잠재력을 가졌음을 깨닫고, 천문사에 유례 없던 대규모 국제 성도 제작 사업을 개시하였습니다. 1887년 4월 파리에서 개최된 천문사진 학술회의에 50여명의 천문학자들이 참여하여 본 사업에 참여하기로 뜻을 모았습니다. 우리도 국제 사회의 천문학 지식을 공유하는 목적에서 이러한 학술회의를 개최할 수 있습니다."
 verrier_great_debate_decision: "대논쟁"
 verrier_great_debate_decision_desc: "일명 '대논쟁'이라고도 하는 섀플리-커티스 논쟁은 20세기 초에 은하의 본질과 우주의 크기에 관한 새로운 이해로 이어지는 담론들을 집대성한 사건입니다. 천문학계의 대논쟁은 우리 은하의 크기와 당시 '나선형 성운'으로 알려졌던 은하들이 우리 은하 내에 위치한 소천체인지, 아니면 우리 은하에서 훨씬 멀리 떨어진 별개의 천치인지에 관한 논쟁을 중심으로 펼쳐졌습니다. 이날 두 과학자는 우주의 크기에 관한 별개의 기술 논문을 발표하고, 저녁에는 공개 토론이 뒤따랐습니다. 우리는 우주의 궁극적인 불가사의를 논하려는 목적에서 본 학술회의를 개최할 수 있습니다."
 notification_verrier_astronomical_observation_notification_name: "연간 천문학 현황 보고"
 notification_verrier_astronomical_observation_notification_desc: "올 한해 우리 [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]가 새로 발견하고 기록한 [Concept('concept_verrier_astronomical_object','$concept_verrier_celestial_bodies$')]의 수는 [GetPlayer.MakeScope.Var('verrier_astronomical_objects_notification_var').GetValue|0+=]개입니다."
 verrier.10.t: "해왕성 발견"
 verrier.10.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](이)가 해왕성을 발견하는 영예를 조국에 안겼다!"
 verrier.10.f: "해왕성은 자정 직후 한 시간 남짓한 탐색 끝에 발견되었다. 르 베리에가 예상한 위치에서 1도 미만의 오차를 기록하는 굉장한 일치율을 보인 것이다. 그 후 이틀 밤에 걸친 관측으로 해왕성의 위치와 움직임을 검증한 [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](은)는 놀라움을 금치 못하며 베리에에게 이렇게 답했다. \"당신이 계산한 위치에 그 행성이 정말로 있었소!\""
 verrier.10.g: "다른 나라들은 부러움에 몸서리칠 것이다!"
 verrier.5.t: "천문대 개관"
 verrier.5.d: "우리나라 천문 연구의 심장부인 천문대가 오늘 엄숙한 기념식과 함께 개관하였다."
 verrier.5.f: ""
 verrier.5.g: "새로운 천문대를 방문합시다."
 verrier.6.t: "천문대 폐쇄"
 verrier.6.d: "조국의 천문학자들이 천문대 폐쇄라는 결단을 내렸다."
 verrier.6.f: "최근의 정치적 상황으로 우리나라에 여러 곳의 천문대가 생겨났다. 경쟁을 무마하고 수도에 자리한 본 천문대의 정부 예산을 확보한다는 목적에서 연구진들은 분관에서의 활동을 멈추고 천문대를 폐쇄하기로 결정한 것이다. 모든 연구 결과는 기존 연구 인력과 함께 수도로 이전될 전망이다."
 verrier.6.g: "유감스럽지만 어쩔 수 없다."
 verrier.6.h: "음... 수도에도 아직 천문대를 두고 있진 않은데. 그대로 이전하면 되겠군!"
 verrier.11.d: "오늘 [SCOPE.sCountry('verrier_neptune_discoverer_country').GetName] 학계에서 자국의 동료 학자가 지금까지 미지의 상태로 남아 있었던 해왕성을 발견하는 데 성공했다고 우리 측에 밝혀왔다."
 verrier.11.g: "경축드리오..."
 verrier.20.t: "명왕성 발견"
 verrier.20.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](이)가 명왕성을 발견하는 영예를 조국에 안겼다!"
 verrier.20.f: "명왕성이 발견되었을 당시, 그 형상이 희미하고 관측 가능한 원반이 없다는 점에서 명왕성이 행성 X라는 가설에 의문이 제기되었습니다. 실제로도 일부 과학자들에게 명왕성은 적잖은 실망감을 안겼습니다. 20세기에 걸쳐 명왕성의 추정 질량은 계속해서 하향 조정되었습니다. 처음에 천문학자들은 해왕성과 천왕성에 끼친 영향을 추정하여 질량을 계산하였습니다. 1931년에는 명왕성의 질량이 지구와 거의 같다는 분석이 나왔고, 1948년에 추가 계산을 통해 화성과 비슷한 수준으로 낮아졌습니다. 그럼에도 불구하고 명왕성의 발견은 전세계 언론의 1면을 장식한 사건이었습니다."
 verrier.20.g: "크기는 작을지 몰라도 분명 행성이다."
 verrier.21.d: "오늘 [SCOPE.sCountry('verrier_pluto_discoverer_country').GetName] 학계에서 자국의 동료 학자가 지금까지 미지의 상태로 남아 있었던 명왕성을 발견하는 데 성공했다고 우리 측에 밝혀왔다."
 verrier.21.g: "이거 정말 행성이 맞소?"
 verrier.30.t: "소행성 천문 회의"
 verrier.30.d: "지금까지 행성으로 여겨졌던 일부 천체의 운명이 국제 학술회의를 통해 결정될 전망이다."
 verrier.30.f: "19세기 전반 이래 발견된 소천체들이 기존에 알려진 행성의 모습과 크게 일치하지 않는다는 시각이 빠르게 제기되고 있다. 이런 인식은 무엇보다도 해왕성의 발견을 계기로 더욱 힘을 얻었는데, 해왕성은 오랫동안 알려진 행성들과 훨씬 더 유사한 형태를 지니고 있었기 때문이다. 반세기 동안 행성으로 불려왔던 팔라스, 베스타, 주노 등의 천체에 대해서도 다소 주저했을지언정 결국 '소행성'이라는 새로운 범주로 분류되기에 이르렀다. 그러나 1801년 주세페 피아치가 발견한 소형 행성 세레스의 경우에는 아직 합의를 이룬 것이 없다. 일부 정통파를 중심으로 행성 지위를 유지해야 한다는 주장도 제기되는데, 세레스는 다른 행성에 비해 크기가 현저히 작긴 하지만, 그렇다고 소행성으로 분류하기에는 너무 크다는 지적이다. 이에 일부 회의 참석자들은 표결을 요구하고 있다."
 verrier.30.f_astraea: "19세기 전반 이래 발견된 소천체들이 기존에 알려진 행성의 모습과 크게 일치하지 않는다는 시각이 빠르게 제기되고 있다. 이런 인식은 무엇보다도 해왕성의 발견을 계기로 더욱 힘을 얻었는데, 해왕성은 오랫동안 알려진 행성들과 훨씬 더 유사한 형태를 지니고 있었기 때문이다. 반세기 동안 행성으로 불려왔던 팔라스, 베스타, 주노, 아스트라이아 등의 천체에 대해서도 다소 주저했을지언정 결국 '소행성'이라는 새로운 범주로 분류되기에 이르렀다. 그러나 1801년 주세페 피아치가 발견한 소형 행성 세레스의 경우에는 아직 합의를 이룬 것이 없다. 일부 정통파를 중심으로 행성 지위를 유지해야 한다는 주장도 제기되는데, 세레스는 다른 행성에 비해 크기가 현저히 작긴 하지만, 그렇다고 소행성으로 분류하기에는 너무 크다는 지적이다. 이에 일부 회의 참석자들은 표결을 요구하고 있다."
 verrier.30.g: "세레스는 마음에 드는군. 이 행성의 운명은 표결에 부쳐봅시다."
 verrier.30.h: "회의를 별도로 개최할 필요는 없다."
 verrier.31.t: "세레스의 지위"
 verrier.31.d: "우리나라는 [SCOPE.sCountry('verrier_congress_host_country').GetName]에서 주최한 천문 학술회의에 초청되었다. 이 자리에서 제일 중요하게 다뤄질 주제는 (전?) 행성 세레스의 운명은 어떻게 될 것인가이다."
 verrier.31.f: "19세기 전반 이래 발견된 소천체들이 기존에 알려진 행성의 모습과 크게 일치하지 않는다는 시각이 빠르게 제기되고 있다. 이런 인식은 무엇보다도 해왕성의 발견을 계기로 더욱 힘을 얻었는데, 해왕성은 오랫동안 알려진 행성들과 훨씬 더 유사한 형태를 지니고 있었기 때문이다. 반세기 동안 행성으로 불려왔던 팔라스, 베스타, 주노 등의 천체에 대해서도 다소 주저했을지언정 결국 '소행성'이라는 새로운 범주로 분류되기에 이르렀다. 그러나 1801년 주세페 피아치가 발견한 소형 행성 세레스의 경우에는 아직 합의를 이룬 것이 없다. 일부 정통파를 중심으로 행성 지위를 유지해야 한다는 주장도 제기되는데, 세레스는 다른 행성에 비해 크기가 현저히 작긴 하지만, 그렇다고 소행성으로 분류하기에는 너무 크다는 지적이다. 이에 대해 세레스가 행성으로 계속 인정된다면 훨씬 큰 천체들도 행성으로 여겨질 수 있어 천문학을 더욱 어렵게 만들 것이라는 반대 주장도 제기되었다."
 verrier.31.f_astraea: "19세기 전반 이래 발견된 소천체들이 기존에 알려진 행성의 모습과 크게 일치하지 않는다는 시각이 빠르게 제기되고 있다. 이런 인식은 무엇보다도 해왕성의 발견을 계기로 더욱 힘을 얻었는데, 해왕성은 오랫동안 알려진 행성들과 훨씬 더 유사한 형태를 지니고 있었기 때문이다. 반세기 동안 행성으로 불려왔던 팔라스, 베스타, 주노, 아스트라이아 등의 천체에 대해서도 다소 주저했을지언정 결국 '소행성'이라는 새로운 범주로 분류되기에 이르렀다. 그러나 1801년 주세페 피아치가 발견한 소형 행성 세레스의 경우에는 아직 합의를 이룬 것이 없다. 일부 정통파를 중심으로 행성 지위를 유지해야 한다는 주장도 제기되는데, 세레스는 다른 행성에 비해 크기가 현저히 작긴 하지만, 그렇다고 소행성으로 분류하기에는 너무 크다는 지적이다. 이에 대해 세레스가 행성으로 계속 인정된다면 훨씬 큰 천체들도 행성으로 여겨질 수 있어 천문학을 더욱 어렵게 만들 것이라는 반대 주장도 제기되었다."
 verrier.31.g: "세레스는 행성이다."
 verrier.31.h: "세레스는 행성이 아니다"
 verrier.32.t_demoted: "세레스의 강등"
 verrier.32.t_saved: "세레스의 수호"
 verrier.32.d_demoted: "천문 학술회의에서 세레스의 행성 지위를 박탈하였다."
 verrier.32.d_saved: "천문 학술회의에서 세레스의 행성 지위를 재확인하였다."
 verrier.32.f_demoted: "결과는 예상대로였다. 나머지 소천체들이 소행성이라면 논리적으로 세레스도 소행성이어야 한다는 것이다. 천문학자들은 세레스가 일명 소행성대에서 가장 큰 천체일 가능성이 높단 점에 동의하였으며, 한때 행성이었던 점을 감안하여 소행성의 제1번이라는 명예를 선사하더라도 그 이상은 없다는 방침을 내렸다. 행성 지위가 학문적 함의에서 그칠 것이 아니라 문화적 함의도 지닌다는 목소리도 있었으나 그러한 논지는 과학보다는 비이성적 향수에 가깝다고 볼 수 있었다.\n\n최종 투표 결과는 찬성 #G [GetGlobalVariable('verrier_ceres_yes').GetValue]표#!, 반대는 #R [GetGlobalVariable('verrier_ceres_no').GetValue]표#!로 집계되었다."
 verrier.32.f_saved: "결과는 많은 이들을 놀라움에 빠렸다. 천문작자들 과반수 이상이 세레스의 행성 지위 유지에 찬성한 것이다! 그 형상이나 질량을 감안하면 세레스는 소행성대의 다른 천체와는 확연히 구분된다는 것이 전통파의 주장이었다. 그 자체로 명백한 행성이라는 것이다. 과학자들은 여기에 세레스는 오랜 세월 동안 과학 뿐만 아니라 사회적, 문화적으로도 태양계의 일부로 인식되어 왔다는 점을 덧붙였다. 수많은 사람들이 정을 붙였던 행성을 소행성으로 격하시키고 그 정체성을 빼앗는 것은 오만과 경계를 나란히 한다는 것이었다.\n\n최종 투표 결과는 찬성 #G [GetGlobalVariable('verrier_ceres_yes').GetValue]표#!, 반대는 #R [GetGlobalVariable('verrier_ceres_no').GetValue]표#!로 집계되었다."
 verrier.32.g: "세레스는 지금껏 왜소행성에 불과했지."
 verrier.32.h: "세레스를 구했다!"
 verrier.33.t: "4개의 행성을 소행성으로 격하"
 verrier.33.t_astraea: "5개의 행성을 소행성으로 격하"
 verrier.33.d: "천문 학술회의에서 최종 선언문을 발표하고, 그간 행성으로 다뤄져 왔던 4개의 천체가 소행성이 되었음을 천명하였다."
 verrier.33.f: "학술회의에서는 미래 천문학 발전을 위하여 천체와 소행성이라는 새로운 범주를 도입하였다. 이에 우주 상의 모든 암석을 행성으로 볼 수 없게 되었다. 1801년 이래 발견된 일부 새로운 천체들은 물론 행성으로 여겼던 세레스, 팔라스, 베스타, 주노도 소행성으로 분류하게 되었다."
 verrier.33.f_astraea: "회의에서는 미래 천문학 발전을 위하여 천체와 소행성이라는 새로운 범주를 도입하였다. 이에 우주 상의 모든 암석을 행성으로 볼 수 없게 되었다. 1801년 이래 발견된 일부 새로운 천체들은 물론 행성으로 여겼던 세레스, 팔라스, 베스타, 주노, 아스트라이아도 소행성으로 분류하게 되었다."
 verrier.33.g: "태양계에는 총 여덟 행성이 있다."
 verrier.34.t: "3개의 행성을 소행성으로 격하"
 verrier.34.t_astraea: "4개의 행성을 소행성으로 격하"
 verrier.34.d: "천문 학술회의에서 최종 선언문을 발표하고, 그간 행성으로 다뤄져 왔던 3개의 천체가 소행성이 되었음을 천명하였다."
 verrier.34.f: "회의에서는 미래 천문학 발전을 위하여 천체와 소행성이라는 새로운 범주를 도입하였다. 이에 우주 상의 모든 암석을 행성으로 볼 수 없게 되었다. 1801년 이래 발견된 일부 새로운 천체들은 물론 행성으로 여겼던 팔라스, 베스타, 주노도 소행성으로 분류하게 되었다. 세레스는 행성으로 남았다."
 verrier.34.f_astraea: "회의에서는 미래 천문학 발전을 위하여 천체와 소행성이라는 새로운 범주를 도입하였다. 이에 우주 상의 모든 암석을 행성으로 볼 수 없게 되었다. 1801년 이래 발견된 일부 새로운 천체들은 물론 행성으로 여겼던 팔라스, 베스타, 주노, 아스트라이아도 소행성으로 분류하게 되었다. 세레스는 행성으로 남았다."
 verrier.34.g: "태양계에는 총 아홉 행성이 있다."
 verrier.35.t: "행성 지위 논란"
 verrier.35.d: "최근 한 천문 학술회의에서 우리나라의 위신에 영향을 줄 성명을 발표하였다."
 verrier.35.f: "여러 반대의 목소리도 상황을 바꾸진 못했다. 우리가 발견한 행성에서 행성 지위를 박탈하는 것은 세계에서 우리의 위신에 부정적 영향을 끼친다. 지금은 거의 모든 국가가 소행성을 찾아낼 수 있기에 그것만으로는 세계적인 인정을 받지 못한다. 그 천체는 과거 우리 학자가 발견한 것이라 자랑하던 시절이 있었으나, 작금의 결정으로 그러한 자만심은 허물어지고 말았다."
 verrier.35.g: "이번 투표는 조작된 것이 틀림없소!"
 verrier.40.t: "혜성 목격!"
 verrier.40.d: "천문대의 과학자들이 새로운 혜성을 발견했다."
 verrier.40.f: "하늘에서 혜성이 목격되었다. 어떤 이들은 앞날에 암운이 드리워졌다는 징조라고 믿는가 하면, 또 어떤 이들은 저것이 사실은 하늘에 떠 있는 요정이라 보고 있다. 이 혜성은 아무래도 천공 속을 떠다니는 거대한 얼음 덩어리이며, 긴 꼬리는 태양의 힘으로 형성된 것이라 보는 사람들도 있다. 세가지 설 모두 그럴듯하다는 점에서 이들을 둘러싼 논쟁은 우리나라의 지식 추구를 자극하고 있다."
 verrier.40.g: "이렇게 계몽된 시대에 살고 있음에 하느님께 감사를 느낀다."
 verrier.41.t: "새로운 소행성"
 verrier.41.d: "천문학자들이 소행성으로 분류되는 새로운 천체를 발견하여 우리 성도에 추가하였다."
 verrier.41.f: "19세기에는 천체, 그 중에서도 소행성의 위치를 성도로 제작하는 작업이 엄청난 탄력을 받았다. 1850년대까지 학계에서 발견한 소행성은 단 12개 수준에 머물렀으나, 세기말이 다가오면서 약 300여개로 늘어났다. 이러한 발견으로 기존의 분류 체계를 다시 검토하고 새로운 분류 체계를 수립하는 데 제 역할을 다했다."
 verrier.41.g: "얼마나 더 남았소?"
 verrier.42.t: "Meteor Shower"
 verrier.42.d: "A seasonal meteor shower allows our astronomers to see a particularly large number of astronomical objects this year."
 verrier.42.f: "A meteor shower is a celestial event in which a number of meteors are observed to radiate, or originate, from one point in the night sky. These meteors are caused by streams of cosmic debris called meteoroids entering Earth's atmosphere at extremely high speeds on parallel trajectories. Most meteors are smaller than a grain of sand, so almost all of them disintegrate and never hit the Earth's surface. Very intense or unusual meteor showers are known as meteor outbursts and meteor storms, which produce at least 1,000 meteors an hour, most notably from the Leonids."
 verrier.42.g: "Hopefully the sky is clear and visibility is good!"
 verrier.43.t: "Nebula"
 verrier.43.d: "Our observatory has found a previously unknown beautiful nebula with numerous unknown stars."
 verrier.43.f: "The first true nebula, as distinct from a star cluster, was mentioned by the Muslim Persian astronomer Abd al-Rahman al-Sufi. He noted 'a little cloud' where the Andromeda Galaxy is located. From 1751 to 1753, Nicolas-Louis de Lacaille cataloged 42 nebulae from the Cape of Good Hope, most of which were previously unknown. The number of nebulae was then greatly increased by the efforts of William Herschel and his sister Caroline Herschel, whoroughly 2,000 nebulae. Beginning in 1864, William Huggins examined the spectra of about 70 nebulae. About 1923, following the Great Debate, it had become clear that many 'nebulae' were in fact galaxies far from the Milky Way."
 verrier.43.g: "Wonderful!"
 verrier.44.t: "별의 명칭"
 verrier.44.d: "[SCOPE.sCharacter('verrier_star_discoverer').GetFullName](이)가 우연히 새로운 별을 찾아냈다고 한다. 지금 이 별의 이름을 무엇으로 할지 논의가 이뤄지고 있다."
 verrier.44.f: "천문학자들은 처음에는 신화 속 인물에서 천체의 이름을 따오는 불문율이 있었으나, 이후에는 지구상에 처음 밝혀진 지명을 지을 때처럼 통치자의 이름이나 자국에 관련된 이름을 붙이는 경향이 나타났습니다. 예컨대 천왕성은 당시 영국 국왕의 이름을 따서 '조지'(George)로 처음 명명되었습니다. 피아치는 세레스를 발견할 당시 자신의 후원자이자 통치자의 이름을 따서 '페르디난데아' (Ferdinandea)라는 별칭을 붙였습니다."
 verrier.44.g: "이 별은 우리나라의 국명을 따오는 것이 좋겠다."
 verrier.44.h: "이 별은 우리 통치자의 이름을 따오는 것이 좋겠다."
 verrier.44.i: "이 별은 발견한 사람의 이름을 따오는 것이 좋겠다."
 verrier.45.t: "A new [concept_verrier_astronomer] takes the stage"
 verrier.45.d: "In the past, [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] has often expressed a great interest in astronomy and observes the starry sky in his free time."
 verrier.45.f: "Up until the present day, a number of amateur astronomers have rendered outstanding service and have advanced astronomy as a science. The countless amount of objects has repeatedly meant that scientific dilettantes have also been able to help learned experts with their records. Not surprising, because some famous astronomers often started out as passionate stargazers."
 verrier.45.g: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] should become a professional [concept_verrier_astronomer]."
 verrier.45.h: "The studies are interesting, nothing more, nothing less."
 verrier.46.t: "Star maps wrong"
 verrier.46.d: "Unfortunately, after reviewing older star maps, we found that some of the mapped stars do not exist at all."
 verrier.46.f: "Unfortunately, errors in astronomical records are not uncommon. This was true not only for the early modern period, but even for the 19th century, despite improved and refined methods. For example, in 1861 Hermann Goldschmidt claimed to have found another moon of Saturn, which he named 'Chiron', but whose existence could never be confirmed."
 verrier.46.g: "Are you saying it was just dirt on the telescope?"
 verrier.47.t: "New moons of Saturn discovered"
 verrier.47.d: "After upgrading the telescope at one of our main observatories, our astronomers were able to discover two new moons of Saturn."
 verrier.47.f: "The moons of Saturn are numerous and diverse, ranging from tiny moonlets only tens of meters across to enormous Titan, which is larger than the planet Mercury. Saturn has 83 moons with confirmed orbits that are not embedded in its rings. as well as dense rings that contain millions of embedded moonlets and innumerable smaller ring particles. Seven Saturnian moons are large enough to have collapsed into a relaxed, ellipsoidal shape, though only one or two of those, Titan and possibly Rhea, are currently in hydrostatic equilibrium. Particularly notable among Saturn's moons is Titan, the second-largest moon in the Solar System after Jupiter's Ganymede."
 verrier.47.g: "Excellent."
 verrier.48.t: "Incredible Nova!"
 verrier.48.d: "Our [concept_verrier_astronomer], Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName], discovered a new Nova far brighter than its surrounding stars. Such sightings are incredibly rare and usually limited to the best astronomers."
 verrier.48.f: "We were the first to notice the appearance of the Nova. But soon many other observatories started pointing their telescopes to it. The Nova was far brighter than the surrounding stars and lasted for nearly two weeks. Although it faded over time, it was clearly visible for quite some time. We do not know yet, why it happened but the observation will surely help us to understand this phenomenon better!"
 verrier.48.g: "Incredible"
 verrier.50.t: "Map of the Moon"
 verrier.50.d: "After many years of intensive observation and mapping, as well as using state-of-the-art photography, our astronomers have been able to create an accurate map of the moon."
 verrier.50.f: "Lunar mapping became systematic in 1779 when Johann Schröter began meticulous observation and measurement of lunar topography. In 1834 Johann Heinrich von Mädler published the first large cartograph (map) of the Moon, comprising 4 sheets in size, and he subsequently published The Universal Selenography. All lunar measurement was based on direct observation until March 1840, when J.W. Draper, using a 5 inch reflector, produced a daguerreotype of the Moon and thus introduced photography to astronomy. At first, the images were of very poor quality, but as with the telescope 200 years earlier, their quality rapidly improved. By 1890 lunar photography had become a recognized subdiscipline of astronomy."
 verrier.50.g: "Superb."
 verrier.51.t: "Lunar channel"
 verrier.51.d: "The project to map the moon photographically has made progress."
 verrier.51.f: "Rille is typically used to describe any of the long, narrow depressions in the surface of the Moon that resemble channels. The Latin term is rima, plural rimae. Typically, a rille can be several kilometers wide and hundreds of kilometers in length. However, the term has also been used loosely to describe similar structures on a number of planets in the Solar System, including Mars, Venus, and on a number of moons. All bear a structural resemblance to each other."
 verrier.51.g: "Fascinating."
 verrier.52.t: "Lunar crater"
 verrier.52.f: "The cratering records of very old surfaces - such as the Moon - record a period of intense early bombardment in the inner Solar System around 3.9 billion years ago. Because the processes of erosion on the Moon are minimal, craters persist. In 1893, Grove Karl Gilbert suggested for the first time that the Moon's craters were formed by large asteroid impacts."
 verrier.53.t: "Lunar maria"
 verrier.53.f: "The lunar maria are large, dark, basaltic plains on Earth's Moon, formed by ancient asteroid impacts on the far side on the Moon that triggered volcanic activity on the opposite (near) side. They were dubbed maria, Latin for 'seas', by early astronomers who mistook them for actual seas. They are less reflective than the \"highlands\" as a result of their iron-rich composition, and hence appear dark to the naked eye. The maria cover about 16% of the lunar surface, mostly on the side visible from Earth. The few maria on the far side are much smaller, residing mostly in very large craters. The traditional nomenclature for the Moon also includes one oceanus (ocean), as well as features with the names lacus ('lake'), palus ('marsh'), and sinus ('bay'). The last three are smaller than maria, but have the same nature and characteristics."
 verrier.54.t: "Lunar highlands"
 verrier.54.f: "The lighter-colored regions of the Moon are called terrae, or more commonly highlands, because they are higher than most maria. They have been dated to having formed 4.4 billion years ago, and may represent plagioclase cumulates of the lunar magma ocean. The concentration of maria on the near side likely reflects the substantially thicker crust of the highlands of the Far Side, which may have formed in a slow-velocity impact of a second moon of Earth a few tens of millions of years after the Moon's formation."
 verrier.61.t: "[SCOPE.sCharacter('verrier_1843_discoverer').GetLastName] 혜성"
 verrier.61.d: "[SCOPE.sCharacter('verrier_1843_discoverer').GetFullName](이)가 @verrier_comet!대혜성을 발견했다!"
 verrier.61.f: "The Great Comet of 1843 was a long-period comet which became very bright in March 1843 (it is also known as the Great March Comet). It was discovered on February 5, 1843, and rapidly brightened to become a great comet. It was a member of the Kreutz Sungrazers, a family of comets resulting from the breakup of a parent comet into multiple fragments in about 1106. These comets pass extremely close to the surface of the Sun - within a few solar radii - and often become very bright as a result. It passed closest to Earth on March 6, 1843, and was at its greatest brilliance the following day; unfortunately for observers north of the equator, at its peak it was best visible from the Southern Hemisphere. It was last observed on April 19, 1843. At that time this comet had passed closer to the Sun than any other known object."
 verrier.61.g: "[ROOT.GetCountry.GetNameNoFlag]에 영광을!"
 verrier.62.t_name: "[SCOPE.sCharacter('verrier_1843_discoverer').GetLastName] 혜성"
 verrier.62.t_year: "1843년 대혜성"
 verrier.62.d: "경이로운 대혜성이 며칠 동안 하늘을 수놓고 있다."
 verrier.62.g: "하늘을 계속 지켜보시오!"
 verrier.64.t: "[SCOPE.sCharacter('verrier_1858_discoverer').GetLastName] 혜성"
 verrier.64.d: "[SCOPE.sCharacter('verrier_1858_discoverer').GetFullName](이)가 @verrier_comet!대혜성을 발견했다!"
 verrier.64.f: "After the Great Comet of 1811, the Great Comet of 1858 was the most brilliant comet that appeared in the 19th century. It was also the first comet to be photographed. It was nearest the Earth on October 10, 1858, and for much of October was a brilliant object with a long, scimitar-like dust tail and prominent gas tail. It remained a naked-eye object until November for Southern Hemisphere observers. It is considered to be one of the most beautiful comets observed, and was one of the brightest of the century, making a strong impression both on artists and the general public. After a prior period of hysteria on the subject of comets, especially in Paris (caused partly by incorrect calculations by John Russell Hind which suggested that one would strike the Earth in June 1857) it went on to be the most-observed of the century due to its excellent visibility in dark skies for Northern Hemisphere viewers, particularly in Europe, and fine weather in September and October. William Henry Smyth, an English astronomer, recalled it as 'one of the most beautiful objects that I have ever seen'. It was featured in a number of sketches and at least one painting by William Turner of Oxford."
 verrier.65.t_name: "[SCOPE.sCharacter('verrier_1858_discoverer').GetLastName] 혜성"
 verrier.65.t_year: "1858년 대혜성"
 verrier.67.t: "[SCOPE.sCharacter('verrier_1861_discoverer').GetLastName] 혜성"
 verrier.67.d: "[SCOPE.sCharacter('verrier_1861_discoverer').GetFullName](이)가 @verrier_comet!대혜성을 발견했다!"
 verrier.67.f: "'On the evening of May 13, 1861, while searching the western sky for comets, I detected a faint nebulous object near the star Lacaille 1316 in the constellation Eridanus. In my marine telescope the object appeared much diffused, and it was with the greatest difficulty that I estimated its distance from three well known fixed stars. The object was hardly distinguishable in the small telescope attached to the sextant, and I found it necessary to employ a coloured glass between the index and horizon glasses, for the superior brilliance of the reference stars Procyon, Sirius, and Canopus, when they were brought into the field of view, quite extinguished its feeble light. Every comet hunter knows how necessary it is to the carrying out of his work to have at hand a copious catalogue of nebulae, but this valuable adjunct I unfortunately did not possess. I could not, however, find the object in the limited catalogues at my command. I accordingly made up my mind to watch it, and it is well that I did so, otherwise I should have missed one of the best opportunities for introducing myself to the astronomical world.'"
 verrier.68.t_name: "[SCOPE.sCharacter('verrier_1861_discoverer').GetLastName] 혜성"
 verrier.68.t_year: "1861년 대혜성"
 verrier.70.t: "[SCOPE.sCharacter('verrier_1874_discoverer').GetLastName] 혜성"
 verrier.70.d: "[SCOPE.sCharacter('verrier_1874_discoverer').GetFullName](이)가 @verrier_comet!대혜성을 발견했다!"
 verrier.70.f: "The Great Comet of 1874 is a non-periodic comet, which in the summer of 1874 could be seen by the naked eye. Without doubt it was a beauty; a true great comet. At its brightest, it probably exceeded the first magnitude and displayed a series of envelopes within its coma that astronomers compared with the Great Comet 16 years earlier. Suitably placed observers also noted maximum naked-eye tail lengths reaching 70 degrees as the comet passed near Earth in July. The public scare regarding the comet was satirized by Mark Twain in his short story 'A Curious Pleasure Excursion.'"
 verrier.71.t_name: "[SCOPE.sCharacter('verrier_1874_discoverer').GetLastName] 혜성"
 verrier.71.t_year: "1874년 대혜성"
 verrier.73.t: "[SCOPE.sCharacter('verrier_1882_discoverer').GetLastName] 혜성"
 verrier.73.d: "[SCOPE.sCharacter('verrier_1882_discoverer').GetFullName](이)가 @verrier_comet!대혜성을 발견했다!"
 verrier.73.f: "The Great Comet of 1882 was a comet which became very bright in September 1882. It was a member of the Kreutz Sungrazers. The comet was bright enough to be visible next to the Sun in the daytime sky at its perihelion. The comet appeared in the morning skies of September 1882. Reports suggest that it was first seen as early as 1 September 1882, from the Cape of Good Hope as well as the Gulf of Guinea, and over the next few days many observers in the southern hemisphere reported the new comet. Her Majesty's Astronomer at the Cape, David Gill, reported watching the comet rise a few minutes before the Sun on 18 September, and described it as 'The nucleus was then undoubtedly single, and certainly rather under than over 4\" in diameter; in fact, as I have described it, it resembled very much a star of the 1st magnitude seen by daylight.' The fragments of the Great Comet of 1882 will return in several hundred years' time, spread out over perhaps two or three centuries."
 verrier.74.t_name: "[SCOPE.sCharacter('verrier_1882_discoverer').GetLastName] 혜성"
 verrier.74.t_year: "1882년 대혜성"
 verrier.80.t: "Carte du Ciel Congress"
 verrier.80.d: "Preparations for the Astronomical Congress are complete. It's time to invite the other countries."
 verrier.80.f: "In three congresses (1887, 1889 and 1891) uniform observation and calculation methods were developed on the basis of the best techniques of the time. Astronomers from up to 38 countries took part in this Parliament of the Carte du Ciel; ultimately the declination zones were divided among 18 observatories according to their latitudes. However, the planned exposure times of 40 minutes had to be partially adapted to the climatic situation, as well as the evaluation to the existing comparators. From around 1895, several of the institutes also wanted to contribute their project experience to improvements, acceleration of the methodology and newer laboratory technology. This was compounded by the fact that they also wanted to divert resources into the development of emerging astrophysics."
 verrier.80.g: "Invite the leading astronomic nations."
 verrier.81.t: "Carte du Ciel Invitation"
 verrier.81.d: "Our astronomers were invited to a congress aimed at more detailed exploration and mapping of the starry sky."
 verrier.81.f: "In three congresses (1887, 1889 and 1891) uniform observation and calculation methods were developed on the basis of the best techniques of the time. Astronomers from up to 38 countries took part in this Parliament of the Carte du Ciel; ultimately the declination zones were divided among 18 observatories according to their latitudes. However, the planned exposure times of 40 minutes had to be partially adapted to the climatic situation, as well as the evaluation to the existing comparators. From around 1895, several of the institutes also wanted to contribute their project experience to improvements, acceleration of the methodology and newer laboratory technology. This was compounded by the fact that they also wanted to divert resources into the development of emerging astrophysics."
 verrier.81.g: "We'll come."
 verrier.82.t_laughed: "천문 회의에서 받은 조롱"
 verrier.82.t_respected: "천문 회의에서 대우받다"
 verrier.82.t_lauded: "천문 회의에서 칭송받다"
 verrier.82.d_laughed: "천문 학술회의에 참석한 우리 대표단은 천문학 지식의 부족으로 비웃음을 당하고 말았다!"
 verrier.82.d_respected: "천문 학술회의에 참석한 우리 대표단은 제대로 된 대우를 받았다."
 verrier.82.d_lauded: "우리나라가 천문 분야의 선진 지식으로 다른 학자들의 관심을 끌고 있다."
 verrier.82.f_laughed: "\"에테르 이론이 구식이라니 그게 가당키나 한 말이오?\""
 verrier.82.f_respected: "\"뷔페에 토성 모양의 음식이 조금이라도 남아있으면 좋겠군.\""
 verrier.82.f_lauded: "\"안녕하십니까, 대마젤란운 씨. 이제야 그 이름의 유래를 알 것도 같군요.\""
 verrier.82.g: "끔찍하군..."
 verrier.82.h: "좋다."
 verrier.82.i: "아주 좋아!"
 verrier.83.t: "Sharing Star Maps"
 verrier.83.d: "Our astronomers would like to exchange our star charts for those of colleagues from abroad."
 verrier.83.f: "Astronomy was one of the research fields in which international cooperation began very early; only the First World War put a temporary end to such efforts. The challenge of seeing the entire sky and unraveling the mysteries of the universe meant that scientists from all countries committed themselves to a common goal. Only politics could put obstacles in the way."
 verrier.83.g: "We want to share our maps."
 verrier.83.h: "We are not interested."
 verrier.84.t: "Map exchange"
 verrier.84.d: "Astronomers have traded some star crates with foreign scientists without consulting us."
 verrier.84.f: "Astronomy was one of the research fields in which international cooperation began very early; only the First World War put a temporary end to such efforts. The challenge of seeing the entire sky and unraveling the mysteries of the universe meant that scientists from all countries committed themselves to a common goal. Only politics could put obstacles in the way - or not."
 verrier.84.g: "They should have asked me first!"
 verrier.85.t: "Astronomical Congress ends"
 verrier.85.d: "The congress has ended and we have recently received some important information about the starry sky."
 verrier.85.f: "The project to create a sky map with an international network of observatories turned out to be a mammoth task in the decades that followed, which was not so easy to master. The Carte du Ciel was to remain unfinished. Nevertheless, the international meetings gave the opportunity for exchange and laid the foundation for future international collaborations and conferences in the field of astronomical research."
 verrier.85.g: "It was pretty educational."
 verrier.86.t: "The Great Debate"
 verrier.86.d: "Preparations for the Astronomical Congress are complete. It's time to invite the other countries."
 verrier.86.f: "The Great Debate, also called the Shapley-Curtis Debate, was held between the astronomers Harlow Shapley and Heber Curtis. It concerned the nature of so-called spiral nebulae and the size of the universe. Shapley believed that these nebulae were relatively small and lay within the outskirts of the Milky Way galaxy (then thought to be the entire universe), while Curtis held that they were in fact independent galaxies, implying that they were exceedingly large and distant.  Much of the lore of the Great Debate grew out of two papers published by Shapley and by Curtis in the May 1921 issue of the Bulletin of the National Research Council. In the aftermath of the public debate, scientists have been able to verify individual pieces of evidence from both astronomers."
 verrier.86.g: "Invite the leading astronomic nations."
 verrier.87.t: "The Great Debate"
 verrier.87.d: "Our astronomers have been invited to a congress to clarify the question of the size and nature of the universe."
 verrier.87.f: "The Great Debate, also called the Shapley-Curtis Debate, was held between the astronomers Harlow Shapley and Heber Curtis. It concerned the nature of so-called spiral nebulae and the size of the universe. Shapley believed that these nebulae were relatively small and lay within the outskirts of the Milky Way galaxy (then thought to be the entire universe), while Curtis held that they were in fact independent galaxies, implying that they were exceedingly large and distant.  Much of the lore of the Great Debate grew out of two papers published by Shapley and by Curtis in the May 1921 issue of the Bulletin of the National Research Council. In the aftermath of the public debate, scientists have been able to verify individual pieces of evidence from both astronomers."
 verrier.87.g: "I assume the answer is 42?"
 verrier.88.t: "One Universe or different Galaxies?"
 verrier.88.d: "The debate at the Astronomical Congress revolves around whether the Milky Way represents the entire universe."
 verrier.88.f: "Shapley was arguing in favor of the Milky Way as the entirety of the universe. He believed that 'spiral nebulae' such as Andromeda were simply part of the Milky Way. He could back up this claim by citing relative sizes - if Andromeda were not part of the Milky Way, then its distance must have been on the order of 100,000,000 light years - a span most contemporary astronomers would not accept. Curtis, on the other hand, contended that Andromeda and other such 'nebulae' were separate galaxies, or 'island universes' (a term invented by the 18th-century philosopher Immanuel Kant, who also believed that the 'spiral nebulae' were extragalactic). He showed that there were more novae in Andromeda than in the Milky Way. From this, he could ask why there were more novae in one small section of the galaxy than the other sections of the galaxy, if Andromeda were not a separate galaxy but simply a nebula within Earth's galaxy. This led to supporting Andromeda as a separate galaxy with its own signature age and rate of nova occurrences."
 verrier.88.g: "The Universe is made up of different galaxies."
 verrier.88.h: "There is only one Milky Way, the rest are clouds of gas."
 verrier.89.t: "The Sun in the Universe"
 verrier.89.d: "Another focus of debate is whether the Sun is at the center of the Milky Way or in an outer region."
 verrier.89.f: "'As a consequence of the exceptional growth and activity of the great observatories, with their powerful methods of analyzing stars and of sounding space, we have reached an epoch, I believe, when another advance is necessary; our conception of the galactic system must be enlarged to keep in proper relationship the objects our telescopes are finding; the solar system can no longer maintain a central position.'\n\n 'There has been a similar general accord in the deduced results as to the shape and structure of the galaxy:\n 1. The stars are not infinite in number, nor uniform in distribution.\n 2. Our galaxy, delimited for us by the projected contours of the Milky Way, contains possibly a billion suns.\n 3. This galaxy is shaped much like a lens, or a thin watch, the thickness being probably less than one-sixth of the diameter.\n 4. Our Sun is located fairly close to the center of figure of the galaxy."
 verrier.89.g: "The Sun is in the inner part of the Milky Way."
 verrier.89.h: "The Sun is in the outer reaches of the Milky Way."
 verrier.90.t: "Great Debate ends"
 verrier.90.d: "The Great Debate is over and the positions accepted by the majority of scientists have emerged."
 verrier.91.t: "Annus mirabilis papers"
 verrier.91.d: "The scientist Albert Einstein revolutionized classical physics with several theories."
 verrier.91.f: "The annus mirabilis papers are the four papers that Albert Einstein published in Annalen der Physik (Annals of Physics), a scientific journal, in 1905. These four papers were major contributions to the foundation of modern physics. They revolutionized science's understanding of the fundamental concepts of space, time, mass, and energy. The first paper explained the photoelectric effect, the second paper explained Brownian motion. The third paper introduced Einstein's theory of special relativity, which established the universal constant speed of light for all reference frames and a theory of spacetime. The fourth, a consequence of the theory of special relativity, developed the principle of mass-energy equivalence, expressed in the famous equation E = mc^2 and which led to the discovery and use of atomic energy. These four papers, together with quantum mechanics and Einstein's later theory of general relativity, are the foundation of modern physics."
 verrier.91.g: "So, everything is relative now?"
 verrier.92.t: "Einstein moves to [ROOT.GetCountry.GetNameNoFlag]"
 verrier.92.d: "The famous physicist Albert Einstein was appointed professor by one of our universities - and he accepted."
 verrier.92.f: "Albert Einstein was a German-born theoretical physicist,  widely acknowledged to be one of the greatest and most influential physicists of all time. Einstein is best known for developing the theory of relativity, but he also made important contributions to the development of the theory of quantum mechanics. Relativity and quantum mechanics are the two pillars of modern physics. His work is also known for its influence on the philosophy of science. Einstein was born in the German Empire, but moved to Switzerland in 1895, forsaking his German citizenship the following year.  In 1901, he acquired Swiss citizenship, which he kept for the rest of his life.  In 1914, Einstein moved to Berlin in order to join the Prussian Academy of Sciences and the Humboldt University of Berlin. In 1917, Einstein became director of the Kaiser Wilhelm Institute for Physics; he also became a German citizen again, this time Prussian. In 1933, while Einstein was visiting the United States, Adolf Hitler came to power in Germany. Einstein, as a Jew, objected to the policies of the newly elected Nazi government; he settled in the United States and became an American citizen in 1940."
 verrier.92.g: "Welcome!"
 verrier.93.t: "Einstein's theory of gravity"
 verrier.93.d: "With a revolutionary theory, Albert Einstein has once again changed our view of gravity in particular and the universe in general."
 verrier.93.f: "General relativity, also known as the general theory of relativity, is the geometric theory of gravitation published by Albert Einstein in 1915 and is the current description of gravitation in modern physics. General relativity generalizes special relativity and refines Newton's law of universal gravitation, providing a unified description of gravity as a geometric property of space and time or four-dimensional spacetime. In particular, the curvature of spacetime is directly related to the energy and momentum of whatever matter and radiation are present. Einstein's theory has astrophysical implications, including the prediction of black holes - regions of space in which space and time are distorted in such a way that nothing, not even light, can escape from them. Black holes are the end-state for massive stars. Microquasars and active galactic nuclei are believed to be stellar black holes and supermassive black holes. It also predicts gravitational lensing, where the bending of light results in multiple images of the same distant astronomical phenomenon."
 verrier.93.g: "The man is a genius."
 verrier.94.t: "Einstein emigrates"
 verrier.94.d: "Due to political changes in our country, the renowned physicist Albert Einstein handed in his passport today and left our country!"
 verrier.94.f: "Albert Einstein was predominantly known during his lifetime for his development of the theory of relativity and his work in the field of physics in general. However, his political views were of public interest through the middle of the 20th century due to his fame and involvement in political, humanitarian, and academic projects around the world. Einstein was a proponent of civil rights and used his notoriety to condemn American discrimination. When he arrived in America, he objected to the mistreatment of African Americans.  Einstein, who had experienced heavy anti-Semitic discrimination in pre-World War II Germany, worked with a number of leading civil rights activists and civil rights organizations. He was in favour of socialism, especially in his later life, detailing his economic views in a 1949 article titled 'Why Socialism?' for the Monthly Review. His opinions on the Bolsheviks also changed with time. In 1925, he criticized them for not having a 'well-regulated system of government' and called their rule a 'regime of terror and a tragedy in human history'."
 verrier.94.g: "We don't need him anyway."
 verrier.95.t: "Einstein, the politician"
 verrier.95.d: "The physicist Albert Einstein has garnered national and international recognition and is apparently toying with the idea of becoming actively involved in politics."
 verrier.95.f: "In 1918, Einstein was one of the founding members of the German Democratic Party, a liberal party. His political views were of public interest through the middle of the 20th century due to his fame and involvement in political, humanitarian, and academic projects around the world. Einstein was a peace activist and a firm advocate of global federalism and world law. He was in favour of socialism, especially in his later life, detailing his economic views in a 1949 article titled 'Why Socialism?' for the Monthly Review. Einstein's opinions on the Bolsheviks changed with time. In 1925, he criticized them for not having a 'well-regulated system of government' and called their rule a 'regime of terror and a tragedy in human history'. His visible position in society allowed him to speak and write frankly, even provocatively, at a time when many people were silenced in Europe due to the rise of Nazism in Germany. Einstein was a proponent of civil rights and used his notoriety to condemn American discrimination. Einstein was a lifelong pacifist and believed that wars stood in the way of human progress."
 verrier.95.g: "He is an important public figure."
 verrier.95.h: "He is a scientist, not a politician."
 verrier.100.t: "천문대"
 verrier.100.d: "대표적인 천문학 통계 현황을 표시합니다."
 verrier.100.planets: "태양계의 #T 행성#!으로 공인된 천체는 총 #G [GetGlobalVariable('verrier_planets_number').GetValue]개#!이며 그 목록은 다음과 같습니다.\n"
 verrier.100.mercury: "\n#V 수성#! - 고대부터 알려져 있었습니다."
 verrier.100.venus: "\n#V 금성#! - 고대부터 알려져 있었습니다."
 verrier.100.earth: "\n#V 지구#! - 테라(Terra)란 이름으로도 알려져 있으며 우리의 고향입니다."
 verrier.100.mars: "\n#V 화성#! - 고대부터 알려져 있었습니다."
 verrier.100.jupiter: "\n#V 목성#! - 고대부터 알려져 있었습니다."
 verrier.100.saturn: "\n#V 토성#! - 고대부터 알려져 있었습니다."
 verrier.100.moon: "\n\n#T @verrier_moon_photo!월면 사진#!수집 개수:#G [ROOT.Var('verrier_moon_photo').GetValue]#!/#BLUE 10#!\n"
 verrier.100.comets: "\n#T @verrier_comet!대혜성#!관측 사례:#G [ROOT.Var('verrier_great_comet').GetValue]#!#BLUE [GetGlobalVariable('verrier_total_verrier_great_comet').GetValue]#!\n"
 verrier.100.objects: "\n국제 천문학계에서 발견한 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]의 수는 총 @verrier_astronomicalobject!#BLUE [GetGlobalVariable('verrier_total_astronomical_objects').GetValue]개#!이며, 그 중에서 우리가 발견한 것은 총 #G [ROOT.Var('verrier_astronomical_objects').GetValue]개#!입니다.\n"
 verrier.100.no_galaxies: "\n은하수는 #E 온 우주#!를 아우르고 있습니다. 안드로메다 성운과 같은 현상은 #E 가스 구름#!에 불과합니다."
 verrier.100.galaxies: "\n은하수는 우주를 구성하는 #E 수많은 은하 중 하나#!일 뿐입니다. 안드로메다 성운과 같은 천체들은 사실 #E 다른 은하#!에 해당됩니다."
 verrier.100.sun_center: "태양은 은하수의 #E 중심부#!에 놓여 있습니다."
 verrier.100.sun_outer: "태양은 은하수의 #E 외곽부#!에 놓여 있습니다."
 verrier.100.g: "역경을 헤치고 별을 향하여."
 verrier.100.h: "[concept_verrier_astronomer]를 찾아가겠다!"
 verrier.100.i: "천문학계 발견을 가장 많이 이룩한 국가들을 보여주시오!"
 verrier_leave_observatory_tt: "천문대를 떠납니다"
 verrier.101.t: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]"
 verrier.101.d: "저희 [concept_verrier_astronomer] [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] 님은 천공의 신비를 밝히기 위해 끊임없이 연구합니다."
 verrier.101.g: "역경을 헤치고 별을 향하여."
 verrier.101.h: "천문대로 돌아가자."
 verrier.111.t: "Miracles of the Sky"
 verrier.111.d: "Joseph Johann von Littrow, one of the most important living astronomers in Europe, has published a new standard work in astronomy."
 verrier.111.f: "Joseph Johann von Littrow was an Austrian astronomer and initiator of the new university observatory in Vienna. As director of the university observatory and from 1838 as dean, he was able to completely rebuild the outdated observatory and equip it with good, medium-sized instruments by 1825. 1834-36 Littrow published the popular science book 'Miracles of the Sky', of which 14,000 copies were printed in a few years. The three-volume work developed into a classic of astronomical literature and made Littrow the most widely read German-speaking astronomer in the 19th century. Littrow originally planned to publish a comprehensive history of astronomy as the final part of his 'Miracles of the Sky'. However, he could not complete this project. His history of astronomy remained in manuscript. Littrow died in November 1840."
 verrier.111.g: "This book has a practical utility."
 verrier.111.h: "This book has a theoretical utility."
 verrier.111.i: "This book has an educational utility."
 verrier.112.t: "Bonner Durchmusterung"
 verrier.112.d: "Prussian astronomers have presented an extensive star catalog with previously unknown astronomical objects."
 verrier.112.f: "The Bonner Durchmusterung (BD) is a star catalog (or an atlas derived from it with 36 sheets) based on visual star measurements of the northern sky. The survey was carried out by [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] at the Bonn Observatory of the University of Bonn. It was carried out and published between 1846 and 1863 with the support of Adalbert Krüger and Eduard Schönfeld. A total of around 324,198 stars in the declination range between 89° and −2° up to magnitude 9.5 (sometimes up to magnitude 10) were measured. A comet finder manufactured by Joseph von Fraunhofer with a 7.7 cm aperture and 65 cm focal length served as the instrument for this."
 verrier.112.g: "Fine!"
 verrier.112.h: "Surely [SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName] will discover even more wonders of the sky!"
 verrier.113.t: "Martian Canals"
 verrier.113.d: "One of our astronomers has made some strange observations on our red neighbor planet."
 verrier.113.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] is considered the most keen-eyed [concept_verrier_astronomer] of his century and is best known for his observations of the planets Mercury, Venus and Mars. On the latter, in 1877, he discovered what appeared to be delicate gullies, soon dubbed Martian canals by the media, and a subject of research for 80 years. These linear structures were close to the visibility limit of the 30 to 50 cm lens telescopes of the time and required special observation experience. Only at the next Mars opposition in 1879 was their sighting confirmed by other astronomers. [SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName] considered them to be naturally formed, rectilinear depressions up to 2000 km long and about 100 km wide, through which water could eventually spread on the otherwise dry surface. However, an incorrect translation into English (canals instead of correct channels) made many journalists think of engineering structures. This gave rise to science fiction novels and a decades-long myth of Martians."
 verrier.113.g: "An amazing discovery."
 verrier.113.h: "We must train a general against the future Martian threat!"
 verrier.113.i: "Maybe we can name more things after [SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName]!"
 verrier.114.t: "핼리 혜성"
 verrier.114.d: "핼리 혜성이 75년 만에 밤하늘에 나타났다."
 verrier.114.f: "Halley is the only known short-period comet that is regularly visible to the naked eye from Earth, and thus the only naked-eye comet that can appear twice in a human lifetime. Halley's periodic returns to the inner Solar System have been observed and recorded by astronomers around the world since at least 240 BC. But it was not until 1705 that the English astronomer Edmond Halley understood that these appearances were reappearances of the same comet. As a result of this discovery, the comet is named after Halley. The 1910 approach was notable for several reasons: it was the first approach of which photographs exist, and the first for which spectroscopic data were obtained. American satirist and writer Mark Twain was born on 30 November 1835, exactly two weeks after the comet's perihelion. In his autobiography, published in 1909, he said: ' came in with Halley's comet in 1835. It is coming again next year, and I expect to go out with it. It will be the greatest disappointment of my life if I don't go out with Halley's comet. The Almighty has said, no doubt: 'Now here are these two unaccountable freaks; they came in together, they must go out together.' Twain died on 21 April 1910, the day following the comet's subsequent perihelion"
 verrier.114.g: "See you again in 75 years!"
 verrier.115.t: "Lemaître's expanding universe"
 verrier.115.d: "A catholic priest has written an intriguing and revolutionary theory about the status and origin of the universe that could overturn our previous world view."
 verrier.115.f: "Georges Lemaître was a Belgian Catholic priest, theoretical physicist, mathematician, astronomer, and professor of physics at the Catholic University of Louvain. He was the first to theorize that the recession of nearby galaxies can be explained by an expanding universe, which was observationally confirmed soon afterwards by Edwin Hubble. He first derived 'Hubble's law', now called the Hubble–Lemaître law by the IAU, and published the first estimation of the Hubble constant in 1927, two years before Hubble's article. Lemaître also proposed the 'Big Bang theory' of the origin of the universe, calling it the 'hypothesis of the primeval atom', and later calling it 'the beginning of the world'. Under the title 'A homogeneous Universe of constant mass and growing radius accounting for the radial velocity of extragalactic nebulae' (1927), that was later to bring him international fame, he presented the new idea that the universe is expanding, which he derived from General Relativity."
 verrier.115.g: "So, this whole 'big bang' stuff was made up by a jesuit? I knew it!"
 verrier.116.t: "Quantum Theory"
 verrier.116.d: "With his quantum theory, the physicist [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] permanently changed the human understanding of atomic and subatomic processes."
 verrier.116.f: "'He was, by nature, a conservative mind; he had nothing of the revolutionary and was thoroughly skeptical about speculations. Yet his belief in the compelling force of logical reasoning from facts was so strong that he did not flinch from announcing the most revolutionary idea which ever has shaken physics.' - Max Born about Max Planck \n\n The central assumption behind his new derivation, was the supposition, now known as the Planck postulate, that electromagnetic energy could be emitted only in quantized form. Physicists now call these quanta photons. This assumption, incompatible with classical physics, is regarded as the birth of quantum physics and the greatest intellectual accomplishment of Planck's career. The discovery of Planck's constant enabled him to define a new universal set of physical units, all based on fundamental physical constants upon which much of quantum theory is based. In recognition of Planck's fundamental contribution to a new branch of physics, he was awarded the Nobel Prize in Physics for 1918."
 verrier.116.g: "A historic breakthrough for science!"
 verrier.116.h: "This brilliant man should work for us!"
 verrier.117.t: "Beyond the Milky Way"
 verrier.117.d: "The astronomer [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] proved that many objects previously thought to be clouds of dust and gas and classified as 'nebulae' are actually galaxies beyond the Milky Way "
 verrier.117.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] was an American astronomer. He played a crucial role in establishing the fields of extragalactic astronomy and observational cosmology. Hubble provided evidence that the recessional velocity of a galaxy increases with its distance from the Earth, a property now known as 'Hubble's law', although it had been proposed two years earlier by Georges Lemaître. Using the Hooker Telescope at Mount Wilson, Hubble identified Cepheid variables, a standard candle discovered by Henrietta Leavitt. Comparing their apparent luminosity to their intrinsic luminosity gives their distance from Earth. Hubble found Cephieds in several nebulae, including the Andromeda Nebula and Triangulum Nebula. His observations, made in 1924, proved conclusively that these nebulae were much too distant to be part of the Milky Way and were, in fact, entire galaxies outside our own, thus today they are no longer considered nebula. Hubble also devised the most commonly used system for classifying galaxies, grouping them according to their appearance in photographic images. He arranged the different groups of galaxies in what became known as the Hubble sequence."
 verrier.117.h: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName] will be a fine addition to my collection!"
 verrier.118.t: "Nuclear Physics"
 verrier.118.d: "The research and work done unter Ernest Rutherford establishes the nuclear structure of the atom and the essential nature of radioactive decay as a nuclear process."
 verrier.118.f: "Ernest Rutherford was a New Zealand physicist who came to be known as the father of nuclear physics. Apart from his work in his homeland, he spent a substantial amount of his career abroad, in both Canada and the United Kingdom. In early work, Rutherford discovered the concept of radioactive half-life, the radioactive element radon, and differentiated and named alpha and beta radiation. It is the basis for the Nobel Prize in Chemistry he was awarded in 1908 'for his investigations into the disintegration of the elements, and the chemistry of radioactive substances'. Rutherford moved to the UK, where he and Thomas Royds proved that alpha radiation is helium nuclei. Later he theorized that atoms have their charge concentrated in a very small nucleus, and thereby pioneered the Rutherford model of the atom, through his discovery and interpretation of Rutherford scattering by the gold foil experiment of Hans Geiger and Ernest Marsden. He performed the first artificially induced nuclear reaction in experiments where nitrogen nuclei were bombarded with alpha particles. As a result, he discovered the emission of a subatomic particle which he named the proton."
 verrier.119.t: "The Periodic Table"
 verrier.119.d: "The chemist Dmitri Mendeleev created a version of the periodic table of elements."
 verrier.119.f: "In 1863, there were 56 known elements with a new element being discovered at a rate of approximately one per year. Other scientists had previously identified periodicity of elements. After becoming a teacher in 1867, Mendeleev wrote 'Principles of Chemistry', which became the definitive textbook of its time. It was published in two volumes between 1868 and 1870, and Mendeleev wrote it as he was preparing a textbook for his course. As he attempted to classify the elements according to their chemical properties, he noticed patterns that led him to postulate his periodic table; he claimed to have envisioned the complete arrangement of the elements in a dream: 'I saw in a dream a table where all elements fell into place as required. Awakening, I immediately wrote it down on a piece of paper, only in one place did a correction later seem necessary.' By adding additional elements following this pattern, Mendeleev developed his extended version of the periodic table. Mendeleev published his periodic table of all known elements and predicted several new elements to complete the table in a Russian-language journal."
 verrier.120.t: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]"
 verrier.120.d: "France's most famous [concept_verrier_astronomer] has written a compendium on the celestial bodies of the solar system."
 verrier.120.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] was a French astronomer and mathematician who specialized in celestial mechanics and is best known for predicting the existence and position of Neptune using only mathematics. The calculations were made to explain discrepancies with Uranus's orbit and the laws of Kepler and Newton. Le Verrier sent the coordinates to Johann Gottfried Galle in Berlin, asking him to verify. Galle found Neptune in the same night he received Le Verrier's letter, within 1° of the predicted position. After that Le Verrier took on the task to '... embrace in a single work the entire planetary system, put everything in harmony if possible, otherwise, declare with certainty that there are as yet unknown causes of perturbations...', a work which would occupy him for the rest of his life. Le Verrier began by re-evaluating, to the 7th order, the technique of calculating the planetary perturbations known as the perturbing function. This derivation, which resulted in 469 mathematical terms, was complete by 1849. He next collected observations of the positions of the planets as far back as 1750. Examining these and correcting for inconsistencies with the most recent data occupied him until 1852. The tables formed the fundamental ephemeris of the Connaissance des Temps, the astronomical almanac of the Bureau des Longitudes, until about 1912."
 verrier.120.h: "He should serve us."
 verrier_congress_attend_modifier: "천문 학술회의 참석"
 verrier.121.t: "아스트라이아 발견"
 verrier.121.d: "프로이센의 아마추어 천문학자 카를 루트비히가 새로운 행성을 우연히 발견하여 '아스트라이아'라는 이름을 붙였다."
 verrier.121.f: "카를 루트비히 헨케는 본래 우체국 서기였으나 은퇴 후 본인이 열의를 보이던 천문학자에 몰두하기 시작했습니다. 1845년 12월 8일 루트비히는 태양계의 다섯 번째 소행성인 아스트라이아를 발견했습니다. 이는 마지막 행성으로 여겨진 베스타가 발견된 지 근 40년 만의 일이었습니다. 프로이센 국왕은 루트비히의 발견에 공로를 인정하여 연금 1,200마르크를 수여하였습니다. 아스트라이아의 발견은 소행성대에서 추가 발견의 서막이 되었으며, 해왕성 발견 이전의 마지막 주요 천체 발견 사례이기도 했습니다. 동시에 아스트라이아의 발견은 우주에 있는 이토록 작은 천체들이 과연 '행성'이라는 명칭을 가질 자격이 있는가에 관한 의문을 불러일으켰습니다. 당시 알렉산더 폰 훔볼트는 이러한 천체들을 '소행성'이라는 별개의 범주로 분류할 것을 제안하였습니다."
 verrier.121.g: "열두 번째 행성이군!"
 verrier.122.g: "요즘은 눈에 띄기만 하면 어떤 돌멩이든 행성이라 선언하는 것 같군."
 verrier.200.t: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](이)가 백조자리 61번과의 거리가 11.4광년임을 증명"
 verrier.200.d: "우주의 규모가 단번에 훨씬 커졌다. [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](은)는 백조자리 61번의 시차를 이용하여 별까지의 거리를 11.4광년으로 측정했다. 이 기술로 우주 연구에 엄청난 진전이 있을 것이다."
 verrier.200.f: "1836년 독일의 천문학자 프리드리히 베셀은 항성 간의 거리를 관측하는 데 처음으로 성공하였습니다. 이 관측을 위하여 베셀은 지구의 자전을 이용하여 고정된 별과 뒷배경의 상대적인 위치를 기록하는 시차를 활용하였습니다. 이는 마치 특정 물체를 오른쪽으로 보고 그 다음에 왼쪽눈으로 보는 것과 같습니다.\n\n이러한 위치 변화를 통해 거리를 계산할 수 있습니다."
 verrier.200.g: "천문학계의 위대한 날이오!"
 verrier_modern_astronomy_invented_modifier: "First Measurement of Distance of a Star"
 verrier.201.t: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]  found the cause for the Fraunhofer Lines"
 verrier.201.d: "For a long time the reason for the thin black lines in the sun's spectrum have been up to speculation. But now Dr. [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] has finally found the reason for them: Specific Chemical Elements cause those lines to appear. This offers a way to find out what Elements are present on stars."
 verrier.201.f: "Joseph Fraunhofer noticed distinct lines in the spectrum of the sun in 1813. Only decades later, Gustav Robert Kirchhoff and Robert Bunsen found the cause of those lines. By burning various elements and chemical compunds they obsevred that those elements absorbed specific parts of a spectrum. Therefore they argued that the absorbtion of specific parts of a spectrum are evidence of specific chemical compund or element in a star's outer part.\n\nSpectroscopy not only allowed to classify stars by their type but also allowed spectroscopic analysis of materials and chemicals. Even the discovery of Helium happened thanks to the spectroscopy of the sun."
 verrier.201.g: "Another mystery of the universe is solved!"
 verrier.1001.t: "타라 왈리 코티의 건설"
 verrier.1001.d: "The construction of our observatory Tara Wali Kothi is slow. Last year Lt. Col. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] was appointed as Royal [concept_verrier_astronomer] in the hopes of a faster construction. The construction will probably take some more years unless we support Wilcox with money and knowledge. But the first question is whether we want to even continue the construction of the building."
 verrier.1001.f: "The Tara Wali Kothi was an observatory commissioned by king Nasir-ud-Din Haider who was interested in astronomy and astrology and even studied astronomy in Calcuta.\nThe Tara Wali Kothi or translated \"Mansion of Stars\" started its construction in 1832 and needed 9 years to finish its construction in 1841. It was in use for only a few years and was later used as a headquarter during the Indian Rebellion. Later it was used as a bank."
 verrier.1001.g: "Under [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] we will see fast progress!"
 verrier.1001.h: "This is a waste of money!"
 stop_constructing_tara_wali_kothi_tt: "타라 왈리 코티 천문대의 건설을 중단하게 됩니다. 천문대를 지을 기회는 다시는 찾아오지 않습니다."
 verrier.1002.t: "Tara Wali Kothi finished"
 verrier.1002.d: "After years of construction the Tara Wali Kothi is finally finished and will house the newest astronomical instruments and guide us to great discoveries."
 verrier.1002.f: "[ROOT.GetCountry.GetRuler.GetFullName] was looking through the big telescope, looking for stars and planets. Now that the Tara Wali Kothi was finally constructed, the building would house the greatest minds of [ROOT.GetCountry.GetName] and provide classes to students. It was a huge step into the future."
 verrier.1002.g: "The Mansion of Stars will guide us to new discoveries!"
 je_verrier_tara_wali_kothi: "타라 왈리 코티의 건설"
 je_verrier_tara_wali_kothi_reason: "타라 왈리 코티 천문대가 아와드 왕국에서 건설되고 있습니다. 진행도는 여러 가지 방식에 따라 좌우될 수 있습니다."
 je_verrier_tara_wali_kothi_goal: "건설 진행도가 60 이상이 되어야 함"
 je_verrier_tara_wali_kothi_success: "건설 진행도가 60 이상에 도달함"
 verrier_add_20_tara_wali_kothi_progress_tt: "타라 왈리 코티의 #p 건설 진행도#! 20 추가"
 verrier_add_10_tara_wali_kothi_progress_tt: "타라 왈리 코티의 #p 건설 진행도#! 10 추가"
 verrier_kothe_buy_additional_instruments_button: "근대 천문 기구 입수"
 verrier_kothe_buy_additional_instruments_button_desc: "타라 왈리 코티에 들일 근대 천문 기구를 구매합니다. 이것으로 건설 속도가 더욱 빨라질 것입니다."
 verrier_kothe_employ_physics_teachers_button: "물리학 강사 채용"
 verrier_kothe_employ_physics_teachers_button_desc: "최신 물리학, 천문학 동향을 가르칠 사람을 채용해 우리 대학에 파견합니다. 이것으로 타라 왈리 코티의 완공을 앞당기고 연구 가속을 부여받게 됩니다."
 verrier_kothe_employ_foreign_engineers_button: "외국인 공학자 채용"
 verrier_kothe_employ_foreign_engineers_button_desc: "타라 왈리 코티의 필수적인 천문 기구와 건물 시공에 외국인 공학자를 채용합니다. 이것으로 완공을 앞당기게 됩니다."
 verrier_kothe_pay_workers_extra_button: "추가 인부 수당 지급"
 verrier_kothe_pay_workers_extra_button_desc: "건설을 더 빨리 마무리하기 위하여 건설 인부를 추가로 투입합니다. 이것으로 완공을 앞당기게 됩니다."
 verrier.1011.t: "Construction of the Ethniko Asterosokopio Athinon started"
 verrier.1011.d: "The first Greek Observatory was one more step on Greece's road to modern times. A huge crowd had gathered at the hill of Nymphs to observe this milestone in Greek history. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] was there, together with members of the Government and the Greek church. They all celebrated, held speeches and gazed at the sky."
 verrier.1011.f: "   Under the cheers of the people the foundation stone of the building was set. The stone had a picture of the solar system engraved, fitting for the new Observatory of Greece.\n\n   #b Historically, #! the Ethniko Asterosokopio Athinon began construction on the 26th of June 1842, the day of a solar eclpipse. This was after years of lobbying by Greek astronomer Georgios Konstantinos Vouris, who was probably the most well known Greek scientist of his time.\n   As Vouris lived in Austria for quite some time he had good connections to Austrians and Greeks alike. He convinced the Greek-Austrian banker and entrepreneur Georgios Sinas to donate to the cause. The first building of the observatory was named after Sinas."
 verrier.1011.a: "Soon we will be able to observe the stars with unprecedented accuracy."
 verrier.1012.t: "Astronomers start observing the sky at the Ethniko Asterosokopio Athinon"
 verrier.1012.d: "The construction of the Ethniko Asterosokopio Athinon, Greece's first observatory, was finished today.  The observatory is the first research institute in Greece and a huge huge milestone of the scientific community in Greece. It's astronomers will focus on observing the sun, the moon and the stars. Hopefully their work will lead to new discoveries in the field of astronomy."
 verrier.1012.f: "The moon was clearly visible through the telescope. It looked amazing. You could even see the small craters on it.\n\n#b Historically, #! the observatory started its work in 1856 under the Greek astronomer Georgios Konstantinos Vouris, two years later Vouris became ill and retired in Vienna. His replacement, Johann Friedrich Julius Schmidt, expanded the library of the observatory and observed many astronomical objects. One of his focuses was the Moon. His main work, the Chaptre der Gebirge des Mondes (The Topographical Chart of the Moon) featured the whole observable surface of the Moon as precise drawings. He also noticed that the crater Linne showed morphological changes.\n   Schmidt released works about earthquakes and meteorology as well and tried to locate Troy.\n\n   The Observatory on the hill of the Nymphs is still in use but there are three more sites that are part of the National Observatory of Athens, the Penteli Astronomical Station, the Kryoneri Astronomical Station and the Chelmos Observatory."
 verrier.1012.g: "What wonders will we discover?"
 verrier.1012.h: "I'm sure Vouris will make great discoveries!"
 verrier.1013.t: "First students at the Othóneion Panepistímion"
 verrier.1013.d: "King Otto used his contacts to various European scientists to build a new University, the Othóneion Panepistímion or Othonian University. Many of the new professors were Greeks, who were educated in the west. Those scientists and scholars bring significant knowledge to Greece and will educate the next generation. Right now the University is located in the house of the architects Stamatios Kleanthis and Eduard Schaubert but it will relocate as soon as the Main Building will be finished."
 verrier.1013.g: "This knowledge will help us to close the gap on the great powers!"
 verrier.1013.h: "We do not need the help of foreigners!"
 verrier.1050.t: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]"
 verrier.1050.d: "Mathematician and Astronomer [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] is the is the Observator of the Leipzig Observatory. Just this year he published his newest work about astronomy \"Die Hauptsätze der Astronomie\", \"The Principles of Astronomy\". He would surely be useful as an official Astronomer."
 verrier.1050.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] was both a mathematician and an astronomer. He published many books about astronomy while also teaching it at the University of Leipzig. In mathematics, he was mainly concerned with topology, a branch of geometry that deals with the position and arrangement of geometric entities. Most famous is the Möbius strip, which Möbius invented to show that a surface does not necessarily have two sides."
 verrier.1050.g: "Wonderful!"
 verrier.1050.h: "He should become our head [concept_verrier_astronomer]!"
 verrier.1060.t: "A comet grazing the sun flushes money into Harvard's coffers"
 verrier.1060.d: "After a bright comet was visible even during the day, a large number of donations came to Harvard University from the people of Boston. The money will be used to build an observatory. The previous observer of the university, William Cranch Bond, is euphoric about the possibility of a modern observatory."
 verrier.1060.f: "William Cranch Bond was originally a watchmaker and at the same time an amateur astronomer. In his first home, he built an observatory with which he measured the sky. In 1839 he was appointed as an unpaid observator at Harvard University, having to bring his own equipment. When donations of USD 25,730 reached the university in 1843, he was able to build a modern observatory.\nBond succeeded, among other things, in discovering Saturn's moon Hyperion and, together with his son, in discovering Saturn's innermost ring. He was also a pioneer of astrophotography. He succeeded in taking the first picture of a star in America."
 verrier.1060.g: "Let us start the construction of an Observatory!"
 verrier.1060.h: "Yes, we will definitely use the money for Astronomy!"
 verrier.1060.i: "We don't need any donated money!"
 verrier.1100.t: "A stressful job"
 verrier.1100.d: "Your [concept_verrier_astronomer], [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], is quite stressed. Maybe we should give [SCOPE.sCharacter('verrier_astronomer_scope').GetHerHim] a break?"
 verrier.1100.f: "I HAVE to find more stars! There are so many out there! How can I not find any that no one else found yet? Or what about comets and asteroids? I have to find something!\nMaybe some Martians? Wait are Martians real? Or did I mean Martian Canals? I don't remember. And where are my notes again?"
 verrier.1100.g: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] needs a break!"
 verrier.1100.h: "It's [SCOPE.sCharacter('verrier_astronomer_scope').GetHerHis] job. [SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe|U] gets paid for discovering stars, not for breaks!"
 astronomer_on_break_tt: "[concept_verrier_astronomer]가 #n 1년#! 동안 휴식기에 들어갑니다. 이 기간 동안 평소대로의 이벤트는 받지 못하게 됩니다."
 verrier.1101.t: "Is Dr. [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] losing [SCOPE.sCharacter('verrier_astronomer_scope').GetHerHis] mind?"
 verrier.1101.d: "Your [concept_verrier_astronomer], [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], seems to forget more and more things. Maybe it is time for [SCOPE.sCharacter('verrier_astronomer_scope').GetHerHim] to step down as an Astronomer?"
 verrier.1101.f: "Where did I put those notes? Wait, where did I put my lunch? and what is this weird stuff on my telescope? Is that... is that my lunch?\nWait, what is this smell? Is that a fire? How did this happen!?"
 verrier.1101.g: "I don't think [SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe] should keep working."
 verrier.1101.h: "Pff, that's totally normal!"
 verrier.1110.t: "Twin Star disappeared"
 verrier.1110.d: "Our [concept_verrier_astronomer], [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], was sure to have identified two twin stars that behaved exactly the same in the night. When other Astronomers tried to find those stars, they could only find one. It seems [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] might have a serious problem with [SCOPE.sCharacter('verrier_astronomer_scope').GetHerHis] eyes or with alcohol."
 verrier.1110.f: "I swear! *hick* There was a second star there! *hick* It was clearly visible *hick* and a perfect twin. *hick* It must have vanished. *hick* Or maybe my colleagues are lying! *hick* Who knows!"
 verrier.1110.g: "[SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe|U] needs to get back on track!"
 verrier.1111.t: "Research Notes destroyed"
 verrier.1111.d: "A horrible incident at the [concept_verrier_observatory] caused a fire that destroyed several research notes of our [concept_verrier_astronomer], [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]. It seems like acandle light those research notes, but we are not sure, why [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] didn't stop the flames."
 verrier.1111.f: "I do not know how this happened! I was working very hard and must have been so busy with the telescope that I just didn't notice!"
 verrier.1111.g: "Was [SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe] drunk or something?"
 verrier.1111.h: "Was [SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe] on drugs?"
 verrier.1111.i: "Did [SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe] have another breakdown?"
 verrier.1111.j: "Did [SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe] forget the candles again?"
 verrier.1112.t: "Lost Stars"
 verrier.1112.d: "A few days ago our [concept_verrier_astronomer], [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], found various new stars. Sadly [SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe] seems to have lost [SCOPE.sCharacter('verrier_astronomer_scope').GetHerHis] notes on them and can't find the stars again. We don't know if they disappeared or if [SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe] forgot where [SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe] found them."
 verrier.1112.f: "Where are those notes? I searched everywhere! In the kitchen, in the trash, on my desk... Everywhere!\nAnd the stars are gone too! How could this happen!"
 verrier.1112.g: "Hopefully [SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe] finds the stars again!"
