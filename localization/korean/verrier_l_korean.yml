 verrier.9000.t: "A teacher from Michigan attempts to go over the Niagara Falls in a barrel"
 verrier.9000.d: "It borders on madness to want to somehow cross a roaring waterfall. But in a barrel? A woman? Annie Edson Taylor wants to do just that. She wants to float down Niagara Falls in a barrel.\nShould we stop her plan or let her take the risk?"
 verrier.9000.f: "\"Five bucks says she drowns!\"\n\"Ten dollars that she will reach the bottom alive!\"\n\n#b Historically#! there have been various attempts to cross, float down, or jump down Niagara Falls. Most attempts ended in death. The survivors usually faced fines and penalties."
 verrier.9000.g: "Stop this madness now!"
 verrier.9000.h: "Not my problem. Let her do whatever she wants..."
 verrier_niagara_falls_not_allow_barrel_tt: "If you stop the teacher from doing what she's doing, surely nothing bad will happen."
 verrier_niagara_falls_allow_barrel_tt: "Maybe the teacher will become the first person to cross Niagara Falls alive in a barrel. But maybe she won't survive it at all."
 verrier.9001.t: "Annie Edson Taylor is the first person to cross Niagara Falls in a barrel"
 verrier.9001.d: "Although many thought Annie Edson Taylor's attempt would be fatal, she survived the fall over Niagara Falls. She has some injuries, including bleeding, but she is fine. Still, she warns everyone against attempting the same. Local authorities have already drafted an order to make such attempts punishable by law."
 verrier.9001.f: "\"No one ought ever do that again.\"\n\n   #b Historically#! Annie Edson Taylor survived her attempt in 1901. Once at the bottom, however, she bled and warned possible imitators.\n   Nevertheless, there were people attempting the same thing. Charles Stephens was the first person to die in his attempt in 1920."
 verrier.9001.g: "She was lucky. Now forbid people to try again!"
 verrier.9002.t: "Annie Edson Taylor dies while attempting to cross Niagara Falls"
 verrier.9002.d: "What many assumed would happen has come to pass. Annie Edson Taylor has died while attempting to cross Niagara Falls in a barrel. It appears that she arrived at the bottom alive, but badly injured. However, since she was unable to free herself from her barrel, she drowned when the water got in. Certainly not a pretty death."
 verrier.9002.f: "\"Michigan woman dies trying to fall down a huge waterfall in a barrel.\"\n\n   #b Historically#! Annie Edson Taylor survived her attempt in 1901. Once at the bottom, however, she bled and warned possible imitators.\n   Nevertheless, there were people attempting the same thing. Charles Stephens was the first person to die in his attempt in 1920."
 verrier.9002.g: "Play stupid games, win stupid prizes... Ban anyone from trying ever again."
 verrier_barrel_successful_modifier: "Successfully crossed the Niagara Falls in a barrel"
 verrier_barrel_unsuccessful_modifier: "Deadly Barrel-Expedition"
 verrier.9003.t: "Niagara Falls freeze over"
 verrier.9003.d: "A freezing winter leads to the Niagara Falls freezing over more and more. Meanwhile, an ice bridge has already formed under one of the waterfalls. People are flocking to watch the spectacle, and resourceful businessmen are already setting up the first mobile stores on the ice. But there are also voices warning that the ice could break at some point. Should we do something to protect the people?"
 verrier.9003.f: "\"What an icy wonderland! It looks magical! I'm sure this winter wonderland will be remembered forever as a beautiful moment!\"\n\n#b Historically,#! the waters of North America have frozen over time and again. Niagara Falls was no exception. Falling ice often formed an \"ice bridge\" under the falls, and from the 1880s on, people gathered there to celebrate a kind of folk festival with entertainment and drinks."
 verrier.9003.g: "We have to provide security. Block the ice bridge."
 verrier.9003.h: "People are certainly aware of the risk and careful!"
 verrier_niagara_falls_no_security_tt: "You don't block the ice bridge, hopefully nothing happens, but you #n never know#!...."
 verrier.9004.t: "Niagara Falls ice bridge collapsed - several fatalities"
 verrier.9004.d: "Terrible news from Niagara Falls has reached us. The ice bridge has broken apart and the individual pieces have floated down the river at breakneck speed. Most of the people on the bridge managed to save themselves, but some unfortunates were trapped on the ice pier. When firefighters attempted to rescue them, they perished in the roaring mixture of ice and water.\nStrong criticism is leveled at the government of [SCOPE.sState('niagara_falls_state_scope').GetName], as the disaster could have easily been prevented."
 verrier.9004.f: "\"It sounded like the roaring of a park of artillery, as the great ice bridge in the gorge just below the mighty cataract suddenly sped away with its load of people. Individuals jumped into the water and were able to save themselves shivering ashore, others were too slow and had to watch helplessly as the huge mass of ice raced down the river.\"\n\n#b Historically,#! the waters of North America have frozen over time and again. Niagara Falls was no exception. Falling ice often formed an \"ice bridge\" under the falls, and from the 1880s on, people gathered there to celebrate a kind of folk festival with entertainment and drinks. In 1912, the ice bridge broke off, resulting in the death of three people. Since then, visitors are warned not to step on the ice."
 verrier.9004.g: "What an unnecessary tragedy!"
 verrier.9005.t: "The ice at Niagara Falls has melted"
 verrier.9005.d: "It has become quieter again at Niagara Falls. The ice stayed only for a short time and has meanwhile retreated. Now the water is roaring into the basin again as usual. What remains of the short time are enchanting memories and handsome profits for a few local businessmen. Who knows when Niagara Falls will freeze over for the next time?"
 verrier.9005.f: "\"One day I will tell my children about how I was standing on the ice bridge and heard a crack. Luckily, though, it wasn't anything bad. Instead, I danced on the ice with my wife!\"\n\n#b Historically,#! the waters of North America have frozen over time and again. Niagara Falls was no exception. Falling ice often formed an \"ice bridge\" under the falls, and from the 1880s on, people gathered there to celebrate a kind of folk festival with entertainment and drinks. In 1912, the ice bridge broke off, resulting in the death of three people. Since then, visitors are warned not to step on the ice."
 verrier.9005.g: "Wonderful!"
