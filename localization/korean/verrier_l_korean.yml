 verrier.501.t: "다른 국가에서 위성을 발견함"
 verrier.501.d: "안타깝게도 [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사가 발견하려던 위성을 다른 국가에서 먼저 발견하고 말았다. 이 소식은 이미 각 언론의 지면을 장식하고 있었다."
 verrier.501.f: "\"관측은 어떤 면에서 반드시 터득해야 하는 기술이다.\" - 윌리엄 허셜"
 verrier.501.g: "실망스럽군."
 verrier.511.t: "데이모스 발견"
 verrier.511.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 몇 달에 걸친 탐색이 결실을 맺었다. 화성의 궤도에서 이전에는 알려지지 않았던 위성을 발견한 것이다! 이 천체의 이름은 #YELLOW 데이모스#!로 명명되었다. "
 verrier.511.f: "\"나는 1877년 11월 11일 새벽 관측 재개에 나섰으나 계속해서 아무 것도 발견하지 못했다. 하지만 몇 시간이 흘러 다시 도전에 나서자 화성의 반대편, 북쪽으로 살짝 떨어진 지점에 희미한 천체가 있는 것을 발견했다. 그 천체의 위치를 관측할 시간은 거의 없었고 무엇보다 강에서 피어오르는 연기 때문에 관측을 중단해야 했다. 이때가 11일 밤 2시 반이었다. 며칠 동안 흐릿한 날씨가 계속되었다. 8월 16일 화성의 반대편에서 그 천체를 다시 발견하였고, 그날 밤의 관측 결과는 그 천체가 화성 주변을 함께 돌고 있으며 그것이 위성일 경우 화성의 이각 근처에 있는 것으로 나타났다. 이때까지 나는 천문대 사람들에게 화성의 위성을 찾고 있다고 아무에게도 말하지 않았다. 하지만 16일 관측을 마치고 오전 3시 경에 천문대를 떠나면서, 그 천체를 보여줬던 내 조수 조지 앤더슨에게 화성의 위성을 발견한 것 같다고 전해주었다.\" - 아사프 홀"
 verrier.511.g: "우리 소장품에 위성 하나가 더 추가되는군."
 verrier.512.t: "포보스 발견"
 verrier.512.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 몇 달에 걸친 탐색이 결실을 맺었다. 화성의 궤도에서 이전에는 알려지지 않았던 위성을 발견한 것이다! 이 천체의 이름은 #YELLOW 포보스#!로 명명되었다. "
 verrier.512.f: "\"(1877년) 8월 17일 한 시에서 두 시 되었을 즈음, 내가 관측에 나서던 사이 뉴컴 교수가 점심을 먹으러 방안으로 들어왔다. 나는 교수에게 화성 근처에 흐릿한 천체를 측정한 결과를 보여주며 그것이 행성과 함께 움직이고 있음을 증명하였다. 8월 18일 외부궤도의 위성이 나타나길 기다리고 탐색하던 도중, 내부 궤도 상의 위성을 하나 발견하였다. 17일과 18일 사이의 관측 결과는 두 천체의 특성에 의문을 갖게 하였으며 새로운 위성을 발견하였다는 사실을 로저스 제독이 공개적으로 발표하였다.\" - 애저프 홀"
 verrier.521.t: "아말테아 발견"
 verrier.521.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 몇 달에 걸친 탐색이 결실을 맺었다. 목성의 궤도에서 이전에는 알려지지 않았던 위성을 발견한 것이다! 이 천체의 이름은 #YELLOW 아말테아#!로 명명되었다. "
 verrier.521.f: "아말테아는 1892년 9월 9일 미국 캘리포니아주 해밀턴산의 릭 천문대에서 에드워드 E. 버나드가 91cm 구경 망원경으로 목성의 새로운 위성을 체계적으로 찾아내는 과정에서 발견하였다. 당시 목성에서 발견된 다섯 번째 위성이자, 1610년 갈릴레오 갈릴레이가 처음 네 개의 위성을 발견한 이래 최초로 발견된 위성이었다. 이에 따라 아말테아는 목성 V 위성이라는 질서정연한 이름이 붙게 되었는데 여기서 V란 로마 숫자로 5를 뜻하기 때문이었다. 프랑스 천문학자 카미유 플랑마리옹은 위성의 명칭을 아말테아로 부를 것을 제안하였는데, 수십년 동안 이 명칭은 비공식으로 남아 있다가 마침내 정식 명칭으로 채택되기에 이르렀다."
 verrier.522.t: "히말리아 발견"
 verrier.522.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 몇 달에 걸친 탐색이 결실을 맺었다. 목성의 궤도에서 이전에는 알려지지 않았던 위성을 발견한 것이다! 이 천체의 이름은 #YELLOW 히말리아#!로 명명되었다. "
 verrier.522.f: "히말리아는 목성의 외곽 위성 내지는 불규칙 궤도 위성 중에서 크기가 가장 크다. 히말리아는 1904년 12월 3일 미국 캘리포니아주 산호세에 있는 릭 천문대에서 천문학자 찰스 딜런 페린이 처음 발견하였다. 그 이름은 그리스 신화에서 제우스와 애인 관계로 등장하는 님프 '히말리아'에서 따왔다."
 verrier.523.t: "엘라라 발견"
 verrier.523.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 몇 달에 걸친 탐색이 결실을 맺었다. 목성의 궤도에서 이전에는 알려지지 않았던 위성을 발견한 것이다! 이 천체의 이름은 #YELLOW 엘라라#!로 명명되었다. "
 verrier.523.f: "엘라라는 1905년 1월 2일 미국 캘리포니아주 산호세의 릭 천문대에서 천문학자 찰스 딜런 페린이 발견하였다. 목성의 외곽 위성과 불규칙 궤도 위성 중에서는 두 번째로 큰 위성이다. 그 이름은 그리스 신화에서 제우스의 애인 관계로 등장하는 엘라라에서 따왔다."
 verrier.524.t: "파시파에 발견"
 verrier.524.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 몇 달에 걸친 탐색이 결실을 맺었다. 목성의 궤도에서 이전에는 알려지지 않았던 위성을 발견한 것이다! 이 천체의 이름은 #YELLOW 파시파에#!로 명명되었다. "
 verrier.524.f: "파시파에는 1908년 1월 27일 천문학자 필리베르 자크 멜로트가 발견하였다. 그 존재가 처음 포착된 것은 1908년 2월 28일 영국 왕립 그리니치 천문대에서 촬영한 사진 건판에서였다. 다른 건판을 조사한 결과 파시파에는 이미 1월 27일자 사진에도 담긴 것이 확인되었다. 처음에는 이것이 소행성인지 위성인지 불분명하였기에, 1908 CJ라는 소행성 명칭이 임시로 붙었다. 그해 4월 10일에는 목성의 여덟 번째 위성을 발견한 것이라는 사실이 공인되었다. 위성의 명칭은 그리스 신화에서 미노스의 아내이자 미노타우루스의 어머니로 등장하는 파시파에에서 따왔다. 파시파에는 목성의 위성 가운데 비슷한 궤도를 따르는 위성군의 명칭이기도 하다. 파시파에군은 총 13개의 위성으로 구성되어 있으며 그 중에서 파시파에가 가장 크다."
 verrier.525.t: "시노페 발견"
 verrier.525.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 몇 달에 걸친 탐색이 결실을 맺었다. 목성의 궤도에서 이전에는 알려지지 않았던 위성을 발견한 것이다! 이 천체의 이름은 #YELLOW 시노페#!로 명명되었다. "
 verrier.525.f: "시노페는 1914년 7월 1일 천문학자 세스 번즈 니콜슨이 릭 천문대에서 처음 발견하였다. 그 이름은 그리스 신화에서 제우스가 구애하고 아폴로에게 납치되는 님프, 시노페에서 따 왔다. 시노페는 고유의 궤도적 특성으로 파시파이군에 속한 것으로 분류된다."
 verrier.526.t: "리시테아 발견"
 verrier.526.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 몇 달에 걸친 탐색이 결실을 맺었다. 목성의 궤도에서 이전에는 알려지지 않았던 위성을 발견한 것이다! 이 천체의 이름은 #YELLOW 리시테아#!로 명명되었다. "
 verrier.526.f: "리시테아는 1938년 7월 6일 천문학자 세스 번즈 니콜슨이 윌슨산 천문대에서 처음 발견하였다. 그 이름은 그리스 신화에서 제우스의 애인으로 등장하는 리시테아에서 따 왔다. 리시테아는 고유의 궤도적 특성에 따라 목성의 위성 히말리아에서 이름이 유래된 '히말리아군'에 속한 것으로 분류된다."
 verrier.527.t: "카르메 발견"
 verrier.527.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 몇 달에 걸친 탐색이 결실을 맺었다. 목성의 궤도에서 이전에는 알려지지 않았던 위성을 발견한 것이다! 이 천체의 이름은 #YELLOW 카르메#!로 명명되었다. "
 verrier.527.f: "카르메는 1938년 7월 30일 미국 캘리포니아주 윌슨산 천문대에서 천문학자 세스 번즈 니콜슨이 처음 발견하였다. 니콜슨은 7월 5일부터 8월 25일까지 목성의 사진을 촬영하였는데 7월 30일에 촬영된 사진 건판에 카르메가 찍힌 것을 밝혀냈다. 목성에서 새로운 위성을 발견했다는 사실은 그해 8월 말에 발표되었다. 카르메의 이름은 그리스 신화에서 제우스의 애인으로 등장하는 카르메에서 따 왔다."
 verrier.531.t: "엔셀라두스 발견"
 verrier.531.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 몇 달에 걸친 탐색이 결실을 맺었다. 토성의 궤도에서 이전에는 알려지지 않았던 위성을 발견한 것이다! 이 천체의 이름은 #YELLOW 엔셀라두스#!로 명명되었다. "
 verrier.531.f: "엔셀라두스는 1789년 8월 28일 독일계 영국인 천문학자 윌리엄 허셸이 발견하였다. 당시 엔셀라두스는 토성에서 여섯번째로 발견된 위성이자 지구의 달을 제외하고 태양계를 통틀어 열두번째로 발견된 위성이었다. 위성의 궤도가 토성에서 두 번째로 근접한 것으로 보였기 때문에 당시에 존재가 알려졌던 7개의 대형 위성 가운데 두번째로 안쪽에 있는 것으로 분류되었다. 위성의 명칭은 그리스 신화의 거인 온켈라도스 (라틴어로 엔켈라두스)에서 따왔다. 엔셀라두스라는 이름은 토성의 일곱 위성을 아우르는 명칭으로도 쓰이는데, 이는 윌리엄 허셜의 아들이자 천문학자인 존 허셜이 제안한 것이다."
 verrier.532.t: "미마스 발견"
 verrier.532.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 몇 달에 걸친 탐색이 결실을 맺었다. 목성의 궤도에서 이전에는 알려지지 않았던 위성을 발견한 것이다! 이 천체의 이름은 #YELLOW 미마스#!로 명명되었다. "
 verrier.532.f: "\"날씨가 허락하는 한 계속해서 관측에 나섰다. 40피트(12m) 반사경의 강력한 빛이 제 몫을 톡톡히 해준 덕에, 나는 9월 17일 일곱 번째 위성을 발견할 수 있었다. 그 시점에서 위성은 최대 이각에 도달해 있었다.\" - 윌리엄 허셜"
 verrier.533.t: "히페리온 발견"
 verrier.533.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 몇 달에 걸친 탐색이 결실을 맺었다. 토성의 궤도에서 이전에는 알려지지 않았던 위성을 발견한 것이다! 이 천체의 이름은 #YELLOW 히페리온#!으로 명명되었다."
 verrier.533.f: "히페리온은 1848년 9월 미국의 윌리엄 크랜치 본드와 그 아들 조지 필립스 본드, 그리고 영국의 윌리엄 러셀이 각각 발견하였다. 그 이름은 고대 그리스 신화에 등장하는 경계와 관찰의 신이자 크로누스(로마 신화의 사르투누스와 동일 신)의 형인 티탄족 히페리온에서 따 왔다."
 verrier.534.t: "포에베 발견"
 verrier.534.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 몇 달에 걸친 탐색이 결실을 맺었다. 토성의 궤도에서 이전에는 알려지지 않았던 위성을 발견한 것이다! 이 천체의 이름은 #YELLOW 포에베#!로 명명되었다."
 verrier.534.f: "포에베는 1899년 3월 18일 윌리엄 헨리 피커링이 페루 아레키파 인근의 보이든 천문대에서 델리즐 스튜어트가 작년 8월 16일부터 촬영한 사진건판을 비교하는 과정에서 발견하였다. 사진 비교를 통해서 발견된 위성은 이번이 첫 사례였다. 포에베는 그리스 신화에서 크로누스의 여동생이자 달의 신격이 부여된 것으로 전해지는 티탄 12신 중 한 명인 포이베에서 이름을 따 왔다. 한때는 그 존재가 의심되어 피커링 본인도 \"1900년에는 나조차도 1898년의 그 네 사진이 사실은 결함이거나 우연히 흐릿하게 나타난 별이었을지도 모른다고 생각하기 시작했다\"고 이야기한 바 있으나, 나중에 피커링이 직접 그 존재를 다시 확인하게 되었다. 이후 피커링은 1904년 촬영된 건판 사진을 통해 1905년 토성의 열 번째 위성을 발견하게 되었으며 이를 '테미스'로 명명하였다. 그 공로로 1905년 프랑스 과학 아카데미에서 랄랑드상을 수상하였다. 하지만 이 '테미스'라는 위성은 훗날 존재하지 않는 것으로 밝혀졌다."
 verrier.541.t: "티타니아 발견"
 verrier.541.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 몇 달에 걸친 탐색이 결실을 맺었다. 천왕성의 궤도에서 이전에는 알려지지 않았던 위성을 발견한 것이다! 이 천체의 이름은 #YELLOW 티타니아#!로 명명되었다."
 verrier.541.f: "티타니아는 천왕성에서 가장 큰 위성이자 태양계를 통틀어 여덟 번째로 큰 위성이다. 1787년 1월 11일 윌리엄 허셜이 발견하였으며, 같은 날 그는 천왕성의 두번째 위성인 오베론을 발견하기도 했다. 훗날 허셜은 네 개의 위성을 추가로 발견했다고 학계에 보고하였으나, 이들 네 위성은 나중에 거짓으로 판명되었다. 첫 발견으로부터 근 50년 동안 티타니아와 오베론은 윌리엄 허셜을 제외한 다른 학자로부터 관측되지 못하였으나, 오늘날에는 최첨단 아마추어 망원경으로도 지구에서 충분히 관측할 수 있다. 천왕성의 위성은 전부 윌리엄 셰익스피어나 알렉산더 포프의 작품 속 등장인물에서 이름을 따 왔다. 티타니아라는 이름 역시 《한여름 밤의 꿈》에서 등장하는 요정들의 여왕에서 유래하였다."
 verrier.542.t: "오베론 발견"
 verrier.542.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 몇 달에 걸친 탐색이 결실을 맺었다. 천왕성의 궤도에서 이전에는 알려지지 않았던 위성을 발견한 것이다! 이 천체의 이름은 #YELLOW 오베론#!으로 명명되었다."
 verrier.542.f: "오베론은 천왕성에서 가장 바깥에 위치한 위성이자 두번째로 큰 위성이다. 또한 태양계 전체를 통틀어 열 번째로 큰 위성이기도 하다. 1787년 1월 11일 윌리엄 허셜이 발견하였으며, 같은 날 그는 천왕성의 두번째 위성인 오베론을 발견하기도 했다. 훗날 허셜은 네 개의 위성을 추가로 발견했다고 학계에 보고하였으나, 이들 네 위성은 나중에 거짓으로 판명되었다. 첫 발견으로부터 근 50년 동안 오베론과 티타니아는 윌리엄 허셜을 제외한 다른 학자로부터 관측되지 못하였으나, 오늘날에는 최첨단 아마추어 망원경으로도 지구에서 충분히 관측할 수 있다. 천왕성의 위성은 전부 윌리엄 셰익스피어나 알렉산더 포프의 작품 속 등장인물에서 이름을 따 왔다. 오베론이라는 이름 역시 《한여름 밤의 꿈》에서 등장하는 요정들의 왕에서 유래하였다."
 verrier.543.t: "아리엘 발견"
 verrier.543.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 몇 달에 걸친 탐색이 결실을 맺었다. 천왕성의 궤도에서 이전에는 알려지지 않았던 위성을 발견한 것이다! 이 천체의 이름은 #YELLOW 아리엘#!로 명명되었다."
 verrier.543.f: "아리엘은 천왕성에서 가장 밝고 네 번째로 큰 위성으로 알려져 있다. 아리엘과 움브리엘은 1851년 10월 24일 영국의 천문학자 윌리엄 라셀이 리버풀에서 자비로 건설한 천문대에서 60cm 크기의 반사 망원경으로 처음 발견하였다. 당시 두 위성은 천왕성의 세번째, 네번째 위성으로 각각 기록되었다. 아리엘이라는 이름은 알렉산더 포프의 서사시  〈머리카락 도둑〉에 등장하는 요정의 이름에서 따 왔다."
 verrier.544.t: "움브리엘 발견"
 verrier.544.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 몇 달에 걸친 탐색이 결실을 맺었다. 천왕성의 궤도에서 이전에는 알려지지 않았던 위성을 발견한 것이다! 이 천체의 이름은 #YELLOW 움브리엘#!로 명명되었다."
 verrier.544.f: "움브리엘은 천왕성에서 세 번째로 큰 위성으로 알려져 있다. 움브리엘은 1851년 10월 24일 영국의 천문학자 윌리엄 라셀이 아리엘과 함께 발견하였다. 알렉산더 포프의 1712년 서사시 〈머리카락 도둑〉의 등장인물에서 이름을 따 왔다. 티타니아와 오베론의 발견자인 윌리엄 허셜도 18세기 말 천왕성의 위성을 네 개 더 찾아냈다고 주장하였으나, 그것이 사실인지 확인된 바가 없으며 현재로서는 네 위성 모두 조작된 것으로 추정된다."
 verrier.545.t: "미란다 발견"
 verrier.545.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 몇 달에 걸친 탐색이 결실을 맺었다. 천왕성의 궤도에서 이전에는 알려지지 않았던 위성을 발견한 것이다! 이 천체의 이름은 #YELLOW 미란다#!로 명명되었다."
 verrier.545.f: "미란다는 1948년 2월 16일 행성 천문학자 제러드 카이퍼가 맥도널드 천문대의 82인치(2,080mm) 크기 오토 스트루브 망원경을 이용해 처음 발견하였다. 미란다가 천왕성 주변을 공전한다는 사실은 1948년 3월 1일에 처음 확인되었다. 천왕성에서 위성이 발견된 것은 이번이 100년 만이다. 카이퍼는 셰익스피어의 희곡 《템페스트》에서 등장하는 '미란다'에서 천체의 이름을 따 왔는데, 그전까지 발견된 천왕성의 네 위성, 즉 아리엘, 움브리엘, 티타니아, 오베론이 전부 셰익스피어나 알렉산더 포프의 작품 속 등장인물에서 이름이 유래하였기 때문이다. 그러나 이들 네 위성의 이름이 요정의 이름이었다면 미란다는 인간의 이름이라는 점에서 다르다."
 verrier.551.t: "트리톤 발견"
 verrier.551.d: "해왕성이 발견된 지 머지않아 [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName](이)가 해왕성 궤도에서 이전에는 알려지지 않았던 위성을 발견했다! 이 천체의 이름은 #YELLOW 트리톤#!으로 명명되었다."
 verrier.551.f: "트리톤은 해왕성에서 가장 큰 자연위성이다. 해왕성의 위성 중 유일하게 자체 중력으로 구형을 이룰 만큼 질량이 큰 위성이며, 얇지만 구조가 튼튼한 대기를 가지고 있다. 트리톤은 해왕성의 자전 방향과 반대 방향으로 역행공전을 하는데, 현재까지 태양게에서 발견된 대형 위성으로는 유일한 사례다. 트리톤은 1846년 10월 10일 영국의 천문학자 윌리엄 러셀이 해왕성을 발견한 지 17일 만에 처음으로 찾아냈다.  존 허셜은 해왕성 발견 소식을 듣자 윌리엄 러셀에게 혹시 있을지 모를 위성을 찾아 보라고 서신을 보냈는데, 그로부터 8일 뒤 러셀이 트리톤을 발견했던 것이다. 맥주 양조업자였던 러셀은 직접 제작한 61cm 구경(24인치)의 금속 거울 반사 망원경(일명 '2피트 반사경')으로 트리톤을 관측해냈다. 트리톤이라는 이름은 그리스 신화에서 포세이돈의 아들이자 바다의 신으로 등장하는 트리톤에서 유래하였다. 참고로 로마 신화에서는 포세이돈이 넵투누스로 불리는데, 이는 영어로 해왕성을 뜻하는 '넵튠'의 유래가 되었다."
 verrier.552.t: "네레이드 발견"
 verrier.552.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 몇 달에 걸친 탐색이 결실을 맺었다. 해왕성의 궤도에서 이전에는 알려지지 않았던 위성을 발견한 것이다! 이 천체의 이름은 #YELLOW 네레이드#!로 명명되었다."
 verrier.552.f: "네레이드는 해왕성에서 세번째로 큰 위성이다. 1949년 5월 1일 제러드 P. 카이퍼가 맥도널드 천문대에서 82인치 구경 망원경을 이용해 사진 건판을 촬영, 비교하여 찾아냈다. 카이퍼는 발견 소식을 보고하는 과정에서 이름을 제안하였는데, 로마 신화에서 넵투누스의 하인으로 등장하는 바다의 님프 네레이드에서 따 왔다. 천왕성에서 두번째로 발견된 행성이자 보이저 2호가 천왕성에 근접하기 전에 발견된 마지막 위성이기도 하다."
 verrier.49.t: "태양의 흑점"
 verrier.49.d: "우리 천문대의 연구원들이 흑점 관측을 통해 태양이 이례적인 활동에 들어갔음을 알아냈다."
 verrier.49.f: "태양의 흑점은 태양의 가시 표면(광구)에 나타나는 어두운 점으로, 표면의 다른 부분보다 온도가 낮아 가시광선을 덜 방출하는 부분을 말한다. 흑점의 개수와 크기는 태양 활동을 측정하는 가장 간단한 지표이다. 흑점의 빈도는 11년의 평균 주기로 나타나는데 이를 흑점 주기라고 부른다. 흑점과 그 주변에서 발생하는 분출 현상은 강력한 자기장에 기인하는데, 이 자기장은 태양 내부에서 표면으로 열이 전달되는 것을 막는 역할을 한다. 그런 흑점 중에서 알려지지 않았던 몇 가지가 최근에 발견된 것이다."
 verrier.49.g: "정말 흥미롭군!"
