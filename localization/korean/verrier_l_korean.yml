 verrier_neptune_star_chart_tt: "동맹국에서 @verrier_astronomicalobject! [concept_verrier_astronomical_object] #G 5개#! 이상을 발견함"
 verrier.142.t: "태양 플레어"
 verrier.142.d: "태양 플레어를 관측하던 [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName](이)가 대단히 이례적인 현상을 발견하였다. 그의 이론이 사실이라면 태양 폭풍이 지구를 향해 돌진하고 있는 것이다. 이는 과학적 의의로서는 신기원을 이루는 대사건이다. 허나 그와 동시에 위험할 가능성도 존재한다."
 verrier.142.f: "태양 플레어는 태양의 채층 내부에서 자기장 에너지에 의해 발생하는 복사량 증가 현상이다. 플레어 영역의 흡수 스펙트럼을 분석해 보면 일반적으로 수소 외에 헬륨과 칼슘이 나타난다. 이 영역에서는 자외선과 X선 영역의 단파 복사 뿐만 아니라 양성자, 전자, 이온 등이 방출된다. 이 같은 현상이 지구에 닿는다면 전리층에 교란을 일으켜 무선 통신에 지장을 준다. 입자가 지구 대기권에 진입하면 자기 폭풍을 불러일으킨다. 입자들이 오로라 영역에 천천히 침투하여 밤에 볼 수 있는 오로라를 유발하고, 강하게 변동하는 전류가 지구 자기장에 교란을 일으키면 전리층 폭풍이 발생하게 된다."
 verrier.142.g: "그게 무슨 뜻이오, 교수?"
 verrier.143.t: "[SCOPE.sCharacter('verrier_carrington_discoverer').GetLastName] 사건"
 verrier.143.d: "자기 폭풍이 지구를 강타했다! 특이한 자연 현상으로 인해 이탈리아의 로마, 쿠바의 하바나, 심지어 중국에서도 오로라가 관측된 것이다. 사람들은 경이로운 천체 현상에 감탄을 금치 못하고 있다. 이번 현상은 천문학자 [SCOPE.sCharacter('verrier_carrington_discoverer').GetFullName](이)가 발견한 태양 플레어와 관련이 있는 것으로 보인다."
 verrier.143.f: "1859년 8월 28일부터 9월 4일까지 천문학자 리처드 캐링턴이 강력한 태양 플레어가 여러 개 발생한 것을 처음 발견하였다. 코로나 질량 방출로 뿜어낸 자기가 초속 2000km가 넘는 속도로 약 17시간 30분 뒤에 지구에 도달하였다. 9월 1일 밤부터 2일 새벽까지는 역사상 가장 강력한 지자기 폭풍이 기록되었다. 북반구와 남반구를 가리지 않고 전세계에서 오로라가 관측된 것이다. 미국 로키산맥에서는 새벽부터 너무 밝아지는 바람에 금광 채굴자들이 아침인 줄 알고 잠에서 깨어나 아침 식사를 만들기도 했다. 미국 북동부에서는 사람들이 새벽빛으로 신문을 읽을 수가 있었다. 오로라 현상은 극지방에서부터 멕시코 중남부, 쿠바, 하와이, 호주 퀸즐랜드, 일본 남부, 중국 등의 저위도 지역, 심지어 콜롬비아처럼 적도에 상당히 가까운 저위도 지역에서도 관측되었다."
 verrier.143.g: "두렵지만 동시에 경이롭군."
 verrier.144.t: "전신 체계의 마비"
 verrier.144.d: "지자기장으로 유도된 전자기장 때문에 유럽과 북미 전역의 전신 체계가 마비되었다. 심지어 전신 기사들이 감전되는 사고가 발생했다는 소식도 들어왔다. 전신선에 유도된 전압이 너무 높아 수신기의 종이 조각에 스파크가 튀어 불이 붙기도 했다. 일부 전신국ㅇ에서는 전원을 차단한 상태에서도 계속해서 전보를 전해받을 수도 있었다."
 verrier.144.f: "보스턴 전신국 (포틀랜드 전신국에게): 배터리를 5분 간 완전히 차단하십시오.\n포틀랜드 전신국: 알겠습니다. 지금 차단하였습니다.\n보스턴: 우리 쪽도 차단했고, 지금은 오로라의 전류를 쓰고 있습니다. 이쪽 전보는 어떻게 수신하고 계십니까?\n포틀랜드: 배터리를 연결할 때보다 더욱 잘 됩니다. 전류가 서서히 흐르다 끊어집니다.\n보스턴: 우리 측에서는 전류가 제법 강할 때가 있는데, 오로라가 배터리를 번갈아 중화시키고 증폭시키는 바람에, 전류가 너무 강해지면 계전기 자체가 제대로 작동되지 못하는 경우가 있어 배터리 없이 송수신하는 것이 더 쓸만 합니다. 지금 같은 문제를 겪고 있는 이상 배터리 없이 송수신해야 한다고 가정해야겠습니다.\n포틀랜드: 좋습니다. 계속해도 되겠습니까?\n보스턴: 예, 진행하십시오."
 verrier.144.g: "전신이 전기 없이 작동한다고?! 어떻게 그런 일이 있을 수가!"
 verrier.9010.t: "과학의 소리"
 verrier.9010.d: "[SCOPE.sState('sound_of_science_state').GetCityHubName] 대학교의 한 교수가 음원이나 관찰자가 움직일 때 관측된 소리와 빛의 진동수가 변한다는 #variable 크리스티 도플러#!의 이론이 타당하다는 것을 입증하였다."
 verrier.9010.f: "질주하는 열차, 요란한 경적 소리, 그리고 절대음감을 보유한 열두 명의 사람이 기발한 실험을 위해 #bold #variable [SCOPE.sState('sound_of_science_state').GetFarmHubName]-[SCOPE.sState('sound_of_science_state').GetCityHubName]#!#! 철도 위에 모였다. 이번 실험의 핵심은 천체의 운동에 관한 도플러 효과의 검증이다. 파동의 주파수가 물체의 속도에 따라 변한다는 도플러 효과 이론이 옳다면, 열차가 청중들을 지나쳐 갈 때 요란한 경적 소리의 음높이가 확연히 낮아져야 한다.\n청중들은 열차가 지나가는 동안 8분의 1 수준의 음높이차를 구분하며 관찰 사항을 세심하게 기록하였다. 사흘 간의 실험 끝에 나온 결과는.... 놀랍게도 모든 사람에게서 음높이가 낮아진 것으로 드러났다!"
 verrier.9010.g: "관찰과 실험은 지식의 기반이다."
 verrier.9010.h: "새로운 진실이 예기치 못한 시점에 어떻게 빛을 발하게 될지는 누구도 모르는 법이다."
 verrier_sound_of_science_prestige_modifier: "과학의 소리"
 verrier_sound_of_science_tech_spread_modifier: "과학의 소리"
 je_verrier_uranus: "또다른 행성?"
 je_verrier_uranus_reason: "저 너머에 또 다른 행성이 존재할까? 지난 수백 년간 행성은 총 여섯 개가 존재하였으나 최근 망원경의 발달로 하나를 더 찾을 가능성이 상당히 커지고 있다. 어쩌면 일곱 개를 넘어 더 많은 행성을 발견할 지도 모른다! 행성을 더 찾아낸다면 우주의 신비를 밝히는 데 보탬이 될 수도 있다.\n\n#b 실제 역사:#! 오랫동안 총 여섯 개의 행성이 알려져 왔던 것은 그것들 모두 밝기가 밝았던 탓에 맨눈으로도 관측하기 쉬웠기 때문이었다. 반면 천왕성, 해왕성, 명왕성은 밝기가 낮았고, 천왕성의 경우 여건만 잘 갖춘다면 눈으로 관측할 수는 있었지만 공전 속도가 너무 느린 탓에 고정된 별이라 착각하는 천문학자들이 많았다."
 je_verrier_uranus_goal: "행성이 또 있는지를 알아내려면 우선 @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] [JournalEntry.GetTotalGoalValue|0+]개를 찾아내야 한다."
 je_verrier_uranus_fail: "새로운 행성을 발견하거나 여섯 행성밖에 없다는 것을 알아내는 데 있어 다른 국가에서 우리보다 먼저 요건을 충족함"
 verrier.12.t: "새로운 행성!"
 verrier.12.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](이)가 지금껏 알려지지 못한 행성, 천왕성을 찾아냈다! 그 누구도 예기치 못한 발견을 이룩한 것이다."
 verrier.12.f: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](은)는 처음에 새로운 혜성을 찾아냈다고 생각했다. 그로부터 몇 주가 지나자 사실은 새로운 행성이라는 것이 밝혀졌다! 과거에는 다른 행성이 존재할 가능성을 생각지도 못했다는 사실이 놀라울 따름이다. 그러나 이제는 천왕성이 발견된 이상, 다른 행성들이 더 존재할 가능성에 대해 의문을 제기하는 사람들이 많아지게 되었다.\n\n#b 실제 역사:#! 천왕성이 발견된 것은 1781년 빌헬름 허셜에 의해서였으며 그것도 우연히 발견되었다. 처음에는 알려진 행성 외에 다른 행성이 존재할 이유가 없었기에 혜성으로 취급되었다. 그러나 그로부터 3개월 만에 학계에서는 그것이 사실은 새로운 행성이라는 것을 깨닫게 되었다."
 verrier.12.g: "믿을 수 없군! 정말로 또다른 행성이 더 있단 말인가?"
 verrier.13.d: "충격적인 소식이 전해졌다! [SCOPE.sCountry('verrier_uranus_discoverer_country').GetName]의 어느 천문학자가 천왕성이라는 새로운 행성을 발견한 것이다. 행성이 하나 더 있다는 사실이 발견된 이상, 우리도 행성을 또 찾아낼 수 있을지도 모른다! "
 verrier.13.g: "행성이 여섯 개보다 많다면 우리도 새로운 행성을 발견할 수 있겠군!"
 verrier_uranus_discoverer_modifier: "천왕성 발견국"
 je_verrier_dwarf_planets: "천체경찰"
 je_verrier_dwarf_planets_reason: "참고: 본 저널 항목은 여러 차례에 걸쳐 완료할 수 있습니다.\n\n천왕성이 발견되면서 다른 행성을 찾아낼 가능성이 생기게 되었다. 화성과 목성 사이에 거대한 빈 공간에 아무런 행성이 없었기에 천문학자들은 이곳에서 다른 행성을 찾아낼 수 있을 것으로 보았다. 이에 따라 '천체경찰'을 결성하여 여러 천문대가 공동으로 행성을 탐색하는 여정에 나섰다.\n\n#b 실제 역사:#! 천체경찰 (독일어로 Himmelspolizey)은 19세기 초 여러 유럽 천문학자들이 결성한 협력조직이다. 화성과 목성 궤도 사이에 존재할 것으로 예측된 천체의 탐색에 주력하였으며, 1800년 제2차 유럽 천문학자 회의에서 결성되었다."
 je_verrier_dwarf_planets_goal: "새로운 행성을 발견하려면 @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] [JournalEntry.GetGoalAddValue|0+]개를 발견해야 합니다."
 verrier.14.t: "세레스 발견"
 verrier.14.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](이)가 화성과 목성 사이에 미지의 행성을 발견하였다. 엄청난 발견이다!"
 verrier.14.f: "#b 실제 역사:#! 천문학계에서는 화성과 목성 사이의 빈 공간에 또다른 행성이 있을 것으로 오랫동안 예측해 왔다. 이에 따라 '천체경찰'이 결성되어 일정한 공간을 분할한 다음 각 천문대마다 할당하여 찾도록 하였다.\n1801년 새해 첫날 밤, 주세페 피아치가 천체 일람을 이용해 세레스를 발견하는 데 성공하였다."
 verrier.14.g: "행성이 얼마나 더 있을지 궁금하군."
 verrier_ceres_discoverer_modifier: "세레스 발견국"
 notification_verrier_ceres_discovered_notification_name: "세레스 발견"
 notification_verrier_ceres_discovered_notification_desc: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] 박사가 태양계의 새로운 행성을 찾아내는 엄청난 발견을 이뤄냈다. 이 행성은 화성과 목성 사이에 위치한 것으로서 세레스로 명명하게 되었다."
 verrier.15.t: "팔라스 발견"
 verrier.15.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](이)가 화성과 목성 사이에 미지의 행성을 발견하였다. 엄청난 발견이다!"
 verrier.15.f: "#b 실제 역사:#! 화성과 목성 사이에서 세레스가 발견되자 같은 공간에 또다른 행성이 존재할 것으로 여긴 사람은 아무도 없었다. 그러나 하인리히 빌헬름 올베르스가 세레스를 찾는 과정에서 새로운 행성을 발견한 것은 뜻밖의 엄청난 사건이었다. 팔라스의 발견은 천체경찰로 하여금 동일 공간의 다른 행성을 탐색하려는 노력으로 이어졌으며, 그로부터 불과 몇 년 만에 결실을 이루게 되었다."
 verrier_pallas_discoverer_modifier: "팔라스 발견자"
 notification_verrier_pallas_discovered_notification_name: "팔라스 발견"
 notification_verrier_pallas_discovered_notification_desc: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] 박사가 태양계의 새로운 행성을 찾아내는 엄청난 발견을 이뤄냈다. 이 행성은 화성과 목성 사이에 위치한 것으로서 팔라스로 명명하게 되었다."
 verrier.16.t: "베스타 발견"
 verrier.16.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](이)가 화성과 목성 사이에 미지의 행성을 발견하였다. 엄청난 발견이다!"
 verrier.16.f: "#b 실제 역사:#! 1807년 하인리히 빌헬름 오베르스가 두 번째 행성을 발견하고 카를 프리드리히 가우스에게 그 행성의 명칭을 정해달라고 부탁하였다. 이에 따라 명명된 베스타는 화성과 목성 사이 공간에 존재하는 네번째로 발견된 행성이자, 향후 40년 동안 마지막으로 발견된 행성이 되었다."
 verrier_vesta_discoverer_modifier: "베스타 발견자"
 notification_verrier_vesta_discovered_notification_name: "베스타 발견"
 notification_verrier_vesta_discovered_notification_desc: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] 박사가 태양계의 새로운 행성을 찾아내는 엄청난 발견을 이뤄냈다. 이 행성은 화성과 목성 사이에 위치한 것으로서 베스타로 명명하게 되었다."
 verrier.17.t: "주노 발견"
 verrier.17.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](이)가 화성과 목성 사이에 미지의 행성을 발견하였다. 엄청난 발견이다!"
 verrier.17.f: "#b 실제 역사:#! 1801년 세레스, 1802년 팔라스가 발견된 이래 불과 2년 만에 카를 루트비히 하르트비히가 화성과 목성 사이의 동일한 공간에서 주노를 발견하였다. 1807년 발견된 베스타와 함께 이들 네 천체는 행성으로 여겨졌으며, 해당 공간에서 더 많은 소행성이 발견되고 행성으로 여겨지는 와중에도 변치 않았다. 그러나 이후 천문학계에서 이들 가운데 실제 행성은 없는 것으로 다시 분류하게 되었다."
 verrier_juno_discoverer_modifier: "주노 발견자"
 notification_verrier_juno_discovered_notification_name: "주노 발견"
 notification_verrier_juno_discovered_notification_desc: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] 박사가 태양계의 새로운 행성을 찾아내는 엄청난 발견을 이뤄냈다. 이 행성은 화성과 목성 사이에 위치한 것으로서 주노로 명명하게 되었다."
 je_verrier_neptune_goal: "미지의 행성을 발견하려면 별들로 가득한 밤하늘을 자세히 연구할 필요가 있습니다. @verrier_astronomicalobject![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] [JournalEntry.GetTotalGoalValue|0+]개를 찾아내야 행성을 발견할 수 있게 됩니다."
 je_verrier_pluto_goal: "행성 X의 발견 성공을 위해서는 별이 빛나는 하늘을 심층적으로 연구할 필요가 있습니다. @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] [JournalEntry.GetTotalGoalValue|0+]개를 찾아내면 비로소 행성을 찾아낼 기회를 얻게 됩니다."
 MR_ASTEROID_CONGRESS_DWARF_PLANETS_TT: "#default_text #V 세레스#!, #V 팔라스#!, #V 베스타#!, #V 주노#!가 발견됨#!"
 je_verrier_astro_physics: "천체물리학"
 je_verrier_astro_physics_reason: "물리학계의 새로운 발견이 과학계를 뒤집고 있다. 천문학도 이러한 변화에서 자유롭지 못하다. 두 과학 분야는 활발한 교류를 진행하고 있으며 이론물리학과 관측물리학은 우주를 한층 더 이해하는 데 공헌할 수 있다."
 verrier_astro_physics_tech: "천체물리학"
 verrier_astro_physics_tech_desc: "천체물리학은 물리학과 화학의 방법과 원리를 활용하여 천체와 천문 현상을 연구하는 학문입니다.  이 학문을 창설한 학자 가운데 제임스 킬러는 \"천체물리학은 우주 상의 천체의 위치나 운동이 아니라 그 본질, 즉 천체가 어디에 있느냐가 아니라 무엇이냐를 밝히는 것이 목표\"라고 말했습니다."
 verrier_modern_physics_tech: "근대 물리학"
 verrier_modern_physics_tech_desc: "근대 물리학은 20세기 초에 발달한 물리학의 한 갈래입니다. 근대 물리학의 대표적인 문야로는 양자역학, 특수 상대성 이론, 일반 상대성 이론 등이 있습니다. 근대 물리학은 빛의 속도와 비교될 만큼 빠른 속도, 원자 반지름에 비교될 만큼 짧은 거리, 극도로 높은 에너지와 같은 극한 사황을 다룹니다."
 verrier_nuclear_physics_tech: "핵물리학"
 verrier_nuclear_physics_tech_desc: "핵물리학은 원자핵의 구조와 운동을 다루는 물리학의 한 갈래입니다. 핵물리학은 원자핵의 구조, 즉 원자핵의 구조적 특징과 그 반응의 규명을 다룹니다. 이를 위해 핵의 자발적인 변화 (방사능), 핵에 대한 산란 과정, 핵반응 등을 실험적, 이론적으로 연구합니다. 핵분열과 핵융합 기반 기술들은 핵물리학의 연구를 바탕으로 합니다."
 verrier_first_sun_photo_modifier: "최초의 일식 사진"
 verrier_helium_discovered_modifier: "태양 원소"
 verrier_comet_observer: "혜성 관측자"
 verrier_comet_observer_desc: "이 천문학자는 대혜성을 발견하여 자신의 이름으로 명명하였습니다."
 verrier_magnetic_storm_observer: "자기폭풍 관측자"
 verrier_magnetic_storm_observer_desc: "이 천문학자는 태양 플레어로 발생한 자기 폭풍을 면밀히 관찰하고 연구하였습니다."
 verrier_solar_observer: "태양 관측자"
 verrier_solar_observer_desc: "이 천문학자는 일식을 관측하여 귀중한 과학적 지식을 습득하였습니다."
 verrier.152.t: "일식"
 verrier.152.d: "올해는 보기 드문 천문 현상이 벌어졌다. [ROOT.GetCountry.GetCapital.GetCityHubName]의 상공에 완전 개기일식이 모습을 드러낸 것이다. [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName](은)는 일식을 한층 더 가까이 관측할 수 있는 특별한 기회를 갖게 되었다."
 verrier.152.f: "개기 일식은 지구 상의 특정 지역에서 관측할 때 달이 태양을 부분적으로 혹은 완전히 가리는 천문 현상입니다. 달의 그림자가 지구를 덮는 이 현상은 초승달일 때만 발생하게 됩니다. 일식은 태양과 우주 전반에 대한 새로운 통찰력을 얻는 데 활용되는 경우가 많았습니다. 1919년 5월 29일 아서 스탠리 에딩턴이 이끄는 탐사대가 아프리카 프린시페섬에서 관측한 개기일식은 그로부터 몇 년 전 알베르트 아인슈타인이 발표한 상대성 이론과 맞물려 특히 주목을 받았습니다. 아인슈타인의 상대성 이론은 태양의 중력장으로 멀리서 건너오는 별빛이 휘어진다고 설명했는데, 일식의 관측 결과가 이를 뒷받침했기 때문입니다."
 verrier.152.g: "참 보기 드문 현상이군!"
 verrier.153.t: "[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName]의 구슬"
 verrier.153.d: "우리 천문학자 [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName](이)가 지난번 개기일식 때 태양 코로나와 주요 천체들을 한층 더 자세히 관측하는 특별한 기회를 얻고, 그 과정에서 드러나는 현상들을 태양 대기의 일부로 분류하였다."
 verrier.153.f: "베일리의 구슬(금환 효과)은 개기일식과 금환일식의 특징이다. 같은 현상에서 벌어지지만 일식의 종류에 따라 별개로 구분된다. 일식 동안에 달이 태양을 가리면 루나 림이라는 거친 형상에 의하여 햇빛이 구슬처럼 부분적으로 빛나는 현상이 벌어진다. 그 이름은 1836년 효과의 원리를 설명한 프랜시스 베일리에서 따왔다. 금환 효과는 하나에서 두 개의 구슬처럼 보일 때, 달의 실루엣이 금환 주변에서 고정되어 광채를 발하는, 빛나는 '다이아몬드'처럼 나타날 때에만 보인다."
 verrier.153.g: "이 현상은 [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사의 이름을 따오는 것이 좋겠다."
 verrier.154.t: "개기일식을 처음으로 사진에 담다"
 verrier.154.d: "[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사가 신기술을 활용하여 개기일식을 처음으로 사진으로 남기는 데 성공했다."
 verrier.154.f: "개기일식처럼 희귀 현상을 사진으로 담는 것은 초창기 사진술에서는 특별한 도전이 아닐 수 없었는데, 태양의 코로나와 달의 어두운 그림자 사이의 극명한 대비를 감안해야 하는 것은 물론, 촬영장비가 맞춰야 할 각도도 평소와는 사뭇 달랐기 떄문이다. 태양 코로나를 제대로 노출하여 사진으로 처음 담는 데 성공한 것은 1851년 7월 28일 개기일식이 계기가 되었다. 당시 쾨니히스베르크의 왕립 프로이센 천문대에서 도시 최고의 사진가(당시 명칭은 다게레오타입 촬영가)였던 요한 율리우스 프리드리히 베르코브스키에게 이번 현상의 정지화상을 기록해줄 것을 의뢰하였다. 관측자는 6cm 크기의 조그마한 굴절 망원경을 15.8cm 크기의 프라운호퍼 태양의에 부착하였으며, 베르코브스키가 완전 개기일식에 도달한 직후 84초 동안 노출하여 사진으로 담아내는 데 성공하였다."
 verrier.154.g: "완벽하군."
 verrier.155.t: "태양 원소"
 verrier.155.d: "[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사가 최근 일식을 기회로 새로운 분광 분석 기술을 활용하여 놀라운 발견을 해냈다. 정황상 새로운 원소를 발견한 듯하다. 처음에는 아무도 박사의 말을 믿지 않았지만, 화학계의 [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 이제 막 사실로 확인하였다."
 verrier.155.f: "헬륨이 존재한다는 증거는 태양 채층 스펙트럼에서 587.49나노미터 크기의 파장을 지닌 밝은 노란색 스펙트럼선이 나타나면서 처음 드러냈다. 프랑스 천문학자 쥘 장센은 1868년 8월 18일 인도에서 벌어진 개기일식을 관측하면서 이 선을 처음으로 발견하였다. 발견 소식을 전할 당시, 지구에서 관측할 수 있는 것으로 확인되기 전까지 새로운 원소가 우주에서 발견된 사례가 전무하였기에 처음에는 그의 말을 믿는 사람이 아무도 없었다. 같은 해 10월 20일 영국의 노먼 로키어는 태양 스펙트럼에서 노란색 선이 실존함을 확인하고, 지금껏 알려지지 않은 원소가 존재하기 때문이라는 결론을 내렸다. 이 스펙트럼선은 나트륨의 프라운호퍼 이중D선(D2 = 589.00nm, D1 = 589.60nm)과 중심선에서 1.8나노미터 거리로 몹시 가까웠기 때문에, 나트륨의 D2, D1선과의 구분을 위해 해당 선을 D3라 명명하였다. 로키어와 동료 학자 에드워드 프랭클랜드는 이 새로운 원소에 헬륨(그리스어로 헬리오스, 즉 태양에서 유래)이라는 이름을 붙일 것을 제안하였다."
 verrier.155.g: "헬륨이라고? 태양의 원소에 딱 알맞은 이름이로군!"
 alert_verrier_asteroid_congress_possible_alert_hint: "우리나라가 소행성 학술회의를 개최할 수 있습니다. 개최를 위해서는 #V 모르겐뢰테 창#!의 학자 개요 란에 들어가 주십시오."
 alert_verrier_carte_congress_possible_alert_hint: "우리나라가 카르트 뒤 시엘 학술회의를 개최할 수 있습니다. 개최를 위해 #V 모르겐뢰테 창#!의 학자 개요 란에 들어가 주십시오."
 alert_verrier_great_debate_possible_alert_hint: "우리나라가 은하와 우주의 크기에 관한 대논쟁을 주최할 수 있습니다. 주최를 위해 #V 모르겐뢰테 창#!의 학자 개요 란에 들어가 주십시오."
 verrier_chemistry_tech: "유기화학과 무기화학"
 verrier_observatory_can_construct_technology_or_astronomer_tt: "[GetTechnology('verrier_astronomy_tech').GetName]이나 [GetTechnology('verrier_chemistry_tech').GetName]을 연구 완료하였거나 [concept_verrier_astronomer]나 [concept_mendelejew_chemist]를 보유함"
 verrier_add_x_meteorites_minus_x_tt: "@verrier_meteorite![Concept('concept_verrier_meteorite','$concept_verrier_meteorites$')] [SCOPE.GetValue('verrier_meteorites_amount')|0+]점 상실"
 verrier_add_x_meteorites_minus_1_tt: "@verrier_meteorite![concept_verrier_meteorite] [SCOPE.GetValue('verrier_meteorites_amount')|0+]점 상실"
 verrier_add_x_meteorites_0_tt: "@verrier_meteorite![Concept('concept_verrier_meteorite','$concept_verrier_meteorites$')] 0개 획득"
 verrier_add_x_meteorites_plus_1_tt: "@verrier_meteorite![concept_verrier_meteorite] [SCOPE.GetValue('verrier_meteorites_amount')|0+]개 획득"
 verrier_add_x_meteorites_plus_x_tt: "@verrier_meteorite![Concept('concept_verrier_meteorite','$concept_verrier_meteorites$')] [SCOPE.GetValue('verrier_meteorites_amount')|0+]개 획득"
 verrier.300.t: "금성 일면통과"
 verrier.300.d: "천문학자들은 #ORANGE 1874년#!도에 호주-인도네시아-태평양 지역에서 일식이 진행될 것으로 예측하고 있다. [ROOT.GetCountry.GetNameNoFlag] 학계에서는 [concept_dubois_pacific_expedition]를 파견해 이 같은 일생일대의 천문 현상을 관측해 보자고 목소리를 높이고 있다."
 verrier.300.f: "금성 일면통과는 금성이 태양 앞을 지나가는 현상을 말한다. 이 현상은 대략 243년에 단 4번만 발생한다. 실제 역사에서 이러한 일면통과를 정확히 측정하는 것은 지구와 태양 간의 거리(천문단위)를 정의하는 데 있어 대단히 중요했으며 여러 연구기관과 학자들이 수많은 탐사와 측정 활동에 나서는 계기가 되었다. 1874년 금성 일면통과는 천문 측정을 하기에 비교적 불리한 여건이었다. 유럽 대다수 지역에서는 관측할 수가 없었고 긴 시간 동안 통과하는 것은 아시아 지역에서만, 짧은 시간 동안 통과하는 것은 호주와 남태평양, 남인도양의 군도 (특히 케르겔렌 제도)에서만 관측이 가능하였다. 그럼에도 총 60여 개의 탐사단이 현지에 파견되었다.\n\n#R 주의: 태평양 탐사로 금성 일면통과를 관측하려면 [concept_verrier_astronomer]가 반드시 동행해야 합니다.#!"
 verrier.300.g: "이건 절대 놓쳐선 안 되겠군."
 verrier.301.t: "1874년 금성 일면통과"
 verrier.301.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]호 탐사대#!가 금성 일면통과를 눈으로 관측할 기회를 누렸다. [SCOPE.sCharacter('rapanui_scientist').GetFullName](은)는 천문 현상과 관련하여 다가올 수년 동안 학계를 분주하게 만들 중대한 기록들을 남길 수 있었다."
 verrier.301.f: "1874년 금성 일면통과는 1874년 12월 9일에 진행된 현상으로, 19세기에 벌어진 두 차례의 금성 일면통과 가운데 첫번째에 해당된다. 과거의 일면통과와 비교하면 1874년도의 일면통과는 개선된 장비와 관측 여건을 활용할 기회를 얻게 되었다. 이 현상을 전세계 곳곳에서 관측하기 위해 무수한 탐사대가 꾸려졌으며, 일부 국가는 계획 준비를 위해 정부 위원회를 정식으로 출범시키기도 하였다. 프랑스에서는 총 여섯 탐사대, 영국에서는 다섯 탐사대, 미국 의회 차원에서는 여덟 탐사대, 독일에서는 세 탐사대('가젤 탐사대' 포함), 멕시코에서는 두 탐사대를 파견하였다. 이탈리아, 러시아, 오스트리아도  각각 한 탐사대씩 보내어 천문 현상을 관측하였다. 프랑스 탐사대의 기록은 일면통과의 각 순간 차례대로 여러 장의 사진으로 남겼고, 이를 이어붙여 최초의 '영화'로 만든 점에서 특히 유명하다. 금성 일면통과는 인류 최초의 영상에 담긴 것 중 하나였던 것이다."
 verrier.301.g: "압도적인 광경이다."
 verrier.401.t: "푸우투스크의 유성우"
 verrier.401.d: "마조비아 사람들이 하늘에서 무언가를 목격하였다."
 verrier.401.f: "마조비아의 중심부에 자리잡은 아담한 마을 푸우투스크에는 우주의 비밀이 숨겨져 있다. 추운 겨울날 바로 이곳에서 전례 없던 규모의 천문 현상이 펼쳐졌고, 이 평화로운 마을은 광활하고 신비로운 우주와 영원히 함께하게 되었다. 때는 1868년 1월 30일. 푸우투스크 주민들은 본인들의 일상이 머지않아 특별한 현상과 얽히게 될 줄은 꿈에도 몰랐다. 오후에서 저녁으로 넘어갈 즈음 마을에는 낯선 고요함이 감돌았다. 그때 갑자기 눈부신 빛이 하늘을 가르기 시작했다. 태양보다 더 밝게 빛나는 불덩이가 하늘을 가로지른 것이다. 목격자들은 그것이 불타는 구체처럼 보였고, 빛나는 꼬리를 휘날리며 천둥 같은 굉음과 함께 하늘을 갈랐다고 전하고 있다. 훗날 운석으로 밝혀진 이 불덩이는 지구 대기권에 진입하면서 폭발하듯 산산조각났다. 수천 개의 운석 파편이 푸우투스크와 그 주변 지역에 쏟아져내리며 유성우를 형성하였다. 이 현상은 푸우투스크 유성우로 알려지게 되었다."
 verrier.401.g: "참 놀라운 광경이구만!"
 verrier.402.t: "The Holbrook Meteor Shower"
 verrier.402.d: "애리조나 사람들이 하늘에서 무언가를 목격하였다."
 verrier.402.f: "홀브루크에 밤이 찾아온 오후 7시 15분경, 하늘은 눈부신 유성의 향연으로 가득 찼다. 크기와 밝기가 제각각인 수백 개의 빛나는 유성들이 한 점에서 출발해 사방으로 흩어지며 하늘을 가로질렀던 것이다. 밝은 흰색과 은은한 노란색 섬광의 궤적을 남긴 이 유성들은 경이로운 광경을 자아냈다. 불타는 핵을 지닌 큼직한 파편들은 대류권에서 작은 조각으로 부숴지며 사라졌다. 멀리서 대포 소리 같은 굉음이 울려 퍼졌는데, 이는 유성이 부숴지면서 발생한 엄청난 힘을 보여주는 것이었다. 처음에는 깜짝 놀랐던 주민들은 머지않아 현장에 모여들어 이번 천체 현상에 경탄을 금하지 않을 수 없었다. 이후 주변을 수색한 결과, 철과 니켈이 주 성분을 이루는 조그마한 운석 파편들이 일대에 흩어져 있는 것을 발견할 수 있었다."
 verrier.403.t: "크냐히냐의 유성우"
 verrier.403.d: "슬로바키아 동부 사람들이 하늘에서 무언가를 목격하였다."
 verrier.403.f: "크냐히냐 운석은 유럽에 떨어진 운석 가운데 역사상 가장 중요한 운석으로 평가받고 있다. 오랫동안 세계에서 가장 무거운 석질 운석으로 여겨져 온 이 운석은 1866년 6월 9일 오후 4시에서 5시 사이에 크냐히냐 마을 북쪽 산악 지대에 충돌하였다. 당시 수많은 목격자들의 증언이 있었으며 이는 나중에 기록화로도 남겨졌다. 운석은 지구 대기권에 진입하면서 천 개가 넘는 조각으로 부숴졌다."
 verrier.411.t: "케이프 요크 운석"
 verrier.411.d: "지질학 연구를 진행하던 [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 우연히 중대한 발견을 이루어냈다. 이상한 돌 하나를 정밀 분석해 본 결과 외계에서 온 운석으로 드러난 것이다. 운석의 크기는 기존 기록을 깰 만큼 엄청난 수준이다."
 verrier.411.f: "지질학자 [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName](이)가 그린란드의 얼음 벌판에서 우리의 지식 한계를 넓혀 줄 천상의 보석, 이른바 케이프 요크 운석을 발견하였다. 이 거대한 파편들은 철질로 되어 있어 오랫동안 이누이트들이 도구 제작에 활용해 왔으며, 특유의 위드만슈테텐 무늬와 트로일라이트가 함유된 외계 운석으로 확인되었다. 최대 31톤에 달하는 케이프 요크 운석은 우리 태양계를 형성한 원시 물질에 관한 전례 없는 통찰력을 제시하고 있다. 이번 발견은 초기 태양계 형성 과정에 대한 이해를 증진시키고 인류사와 우주적 사건 간의 심오한 연관성을 드높이고 있다. 운석이 연구 기관으로 이관되면 상세한 분석이 이루어져 우주의 장대한 설계에 숨겨진 신비가 밝혀질 것이다. 이런 천상의 유물을 연구하면서 우리는 우주의 복잡한 구조와 그 속에서 우리의 위치에 대한 이해를 더욱 심화할 것이다."
 verrier.411.g: "이건 정말이지 믿을 수 없는 발견이군!"
 verrier.412.t: "바쿠비리토 운석"
 verrier.412.f: "바쿠비리토 운석은 멕시코에서 발견된 가장 큰 운석이다. 1863년 지질학자 길버트 엘리스 베일리가 시날로아데레이바 마을 인근의 란치토 마을에서 발견하였으며, 무게 20~22톤 규모의 철질 운석이다. 크기는 길이 4.25m, 너비 2m, 높이 1.75m에 달한다."
 verrier.413.t: "문드라빌라 운석"
 verrier.413.f: "문드라빌라 운석은 지구 대기권에 진입하여 파편화되어 호주 서부 눌라보어 평원에 떨어진 철질 운석이다. 운석 자체는 수백만 년 전 유성우의 일부로 지구에 충돌한 것으로 추정된다. 총 질량은 24톤에 달하여 세계에서 가장 큰 운석으로 꼽히며, 그 연대가 약 6천만 년 전으로 거슬러 올라가기에 지구상에서 제일 오래된 운석으로 꼽히기도 한다."
 verrier.414.t: "윌라멧 운석"
 verrier.414.f: "윌라멧은 1902년 미국 오리건주 웨스트린 인근 윌라멧 계곡에서 정식으로 발견된 운석의 명칭이다. 다만 지구로 떨어진 시점은 수천 년 전의 일로 추정된다. 발견 당시 세계에서 세 번째로 제일 큰 운석이었으며 오늘날에는 여섯 번째로 큰 운석으로 꼽힌다. 무게는 15.5톤에 달한다. 13,000여년의 세월 동안 기상 변화의 영향으로 운석의 일부가 떨어져 나갔는데 그 무게만 최대 6톤으로 추산된다. 윌라멧 운석은 발견되기 훨씬 이전부터 클라마카스족의 숭배 대상이 되어왔다. 1902년 발견 당시 엘리스 휴즈는 원주민 외에 운석의 중요성을 처음으로 인식한 유럽인 정착민이었던 것이다."
 verrier.415.t: "호바 운석"
 verrier.415.f: "호바 운석은 현재까지 지구에서 발견된 가장 큰 운석이다. 나미비아 그루트폰테인에서 서쪽으로 약 20km 떨어진 지점, 오타비 산맥에 자리한 호바 농장 부지에서 발견되었다. 무게는 50~60톤으로 추산되며, 원래 크기는 가로 2.70m, 세로 2.70m, 두께 0.90m였다. 철질로 이루어진 운석으로 약 8만 년 전에 지구에 충돌했으며 지금까지도 원래 위치에 그대로 남아 있다. 나이는 1억 9천만 년에서 4억 1천만 년 사이로 추정된다."
 verrier.421.t: "[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 운석 연구 희망"
 verrier.421.d: "우리 천문학자 [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 끈질긴 노력 덕분에 운석이 충돌한 지 며칠 만에 수많은 파편을 수습할 수 있었다. 이번 발견은 우주의 여러 신비를 밝히는 데 보탬이 될 것으로 보이나, [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 자신이 발견한 건 자신이 간직하겠다고 고집하고 있다."
 verrier.421.f: "빅토리아 시대의 열의 속에서 이 천문학자는 하늘을 관찰하고 운석 파편들을 발견하기에 이르렀다. 예리한 관찰력과 체계적인 접근법 덕분에 그 천체의 잔해들을 수집하고 연구할 수 있었던 것이다. 파편 하나하나를 세심히 분석하고, 운석의 구성과 기원에 대하여 한층 더 깊이 이해하는 데 공헌하였다. 이 천문학자의 업적은 우주의 신비를 밝히려는 깊은 의지와 호기심에 따라 움직였던, 빅토리아 시대 과학의 헌신을 보여주는 전형적인 사례로 남게 되었다."
 verrier.421.g: "모든 파편은 학술원에 이관되어야 한다!"
 verrier.421.h: "운석 하나쯤은 [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName]께서 연구해 보는 것이 좋겠소."
 verrier.422.t: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetFullName]의 운석 분석 희망"
 verrier.422.d: "국내 수석 화학자로 재직 중인 [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 정부에 최근 발견된 운석을 조사하게 해 달라는 청원을 냈다. 더욱이 운석 자체도 위태로운 금고보다 연구실에 안전하게 모셔둔 것도 있다."
 verrier.422.f: "\"외계의 물질! 그것도 미지의 거리를 뚫고 건너왔다니! 이는 학계의 큰 충격이요, 운석의 화학 성분을 자세히 들여다볼 절호의 기회입니다.\""
 verrier.422.g: "학자란 양반들이 하나같이 운석을 노리는 이유가 궁금해지는군."
 verrier.422.h: "이번 기회로 화학계의 발전을 이루리라 믿네."
 verrier.1013.f: "저명한 [concept_verrier_astronomer]였던 게오르기오스 콘스탄티노스 부리스는 새로 지어진 대학에서 그리스 학생 몇 명을 대상으로 첫 강연에 나섰다. 그리스에 배움과 전진의 시대라는 새 시대가 도래하고 있었다.\n\n#b 실제 역사에서#! 대학은 1836년에 건설이 계획되어 1837년 5월 3일에 정식 개교하였다. 이는 그리스 본토 최초의 대학교였다. 1841년 본관 공사가 마무리되면서 대학은 신관으로 이전하였다. 대학교 부속동의 건설은 1864년까지 이어졌다.\n오토네이온 파네피스티미온은 국립 대학으로 개명되었는데, 그 계기가 1862년 그리스에서 벌어진 쿠데타로 오토가 망명길에 올라야 했기 때문이다.\n\n오늘날 아테네 국립 카포디스트리아 대학은 그리스를 대표하는 대학교로 꼽힌다. 이 대학 출신 동문 가운데 두 명의 시인이 노벨상을 수상했으며, 그리스 총리 15명과 대통령 3명이 이곳 출신이다."
 je_verrier_meteorites: "운석 소장품"
 je_verrier_meteorites_reason: "하늘에서 갓 떨어진 것이든 수백만 년이 지난 후에 발견된 것이든, 운석은 지구와 우주의 지난 날에 대한 흥미로운 통찰력을 제공한다. 발견이 충분히 이루어지면 과학 발전을 이룩할 것이다."
 je_verrier_meteorites_goal: "#!@verrier_meteorite![Concept('concept_verrier_meteorite','$concept_verrier_meteorites$')] [JournalEntry.GetTotalGoalValue|V0]개 발견"
 verrier_moon_observer: "위성 관측자"
 verrier_moon_observer_desc: "이 인물은 자연 위성에 깊은 관심을 갖고 있으며, 위성들을 발견하고 위치를 기록하는 일에 능숙합니다."
 verrier_has_active_astronomer_tt: "#default_text [GetPlayer.GetName]에 #V 분주한 상태#!가 아닌 [concept_verrier_astronomer]가 있음#!"
 verrier_stop_astronomer_project_button: "천문학자 과제 중단"
 verrier_stop_astronomer_project_button_desc: "현재 천문학자 과제를 중단합니다. 모든 천문학자 진행도가 사라집니다."
 je_astronomer_dies_tt: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사 사망"
