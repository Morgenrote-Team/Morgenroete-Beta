 verrier.308.t: "1874년 금성 일면통과"
 verrier.308.d: "천문학계에서는 #ORANGE 1874년#! 호주-인도네시아-태평양 지역 일대에서 금성 일면통과가 있을 것으로 예측하고 있다. [ROOT.GetCountry.GetNameNoFlag] 학계에서는 이번 일생일대의 천문 현상을 관측할 것을 건의하고 있다."
 verrier.308.f: "금성 일면통과는 금성이 태양 앞을 지나가는 현상을 말한다. 이 현상은 대략 243년에 단 4번만 발생한다. 실제 역사에서 이러한 일면통과를 정확히 측정하는 것은 지구와 태양 간의 거리(천문단위)를 정의하는 데 있어 대단히 중요했으며 여러 연구기관과 학자들이 수많은 탐사와 측정 활동에 나서는 계기가 되었다. 1874년 금성 일면통과는 천문 측정을 하기에 비교적 불리한 여건이었다. 유럽 대다수 지역에서는 관측할 수가 없었고 긴 시간 동안 통과하는 것은 아시아 지역에서만, 짧은 시간 동안 통과하는 것은 호주와 남태평양, 남인도양의 군도 (특히 케르겔렌 제도)에서만 관측이 가능하였다. 그럼에도 총 60여 개의 탐사단이 현지에 파견되었다."
 verrier.308.g: "이건 절대 놓쳐선 안 되겠군."
 verrier.309.t: "1882년 금성 일면통과"
 verrier.309.d: "천문학계에서는 #ORANGE 1882년#! 호주-인도네시아-태평양 지역 일대에서 금성 일면통과가 있을 것으로 예측하고 있다. [ROOT.GetCountry.GetNameNoFlag] 학계에서는 이번 일생일대의 천문 현상을 관측할 것을 건의하고 있다."
 verrier.309.f: "금성 일면통과는 금성이 태양 앞을 지나가는 현상을 말한다. 이 현상은 대략 243년에 단 4번만 발생한다. 실제 역사에서 이러한 일면통과를 정확히 측정하는 것은 지구와 태양 간의 거리(천문단위)를 정의하는 데 있어 대단히 중요했으며 여러 연구기관과 학자들이 수많은 탐사와 측정 활동에 나서는 계기가 되었다. 1882년 금성 일면통과는 1874년 통과 당시보다 관측 가능한 지역이 조금 더 늘었다는 점에서 다소 유리한 여건에 있었다. 북아메리카 북부와 북동부를 제외한 아메리카 대륙 전역에서 관측이 가능했던 것이다."
 verrier.311.t: "금성 일면통과 대비"
 verrier.311.d: "보기 드문 천문 현상이 다가오고 있다. 다름아닌 금성이 태양 앞을 지나가는 것이다. 전세계의 천문대와 정부가 준비에 나서고 있다."
 verrier.311.f: "날짜는 초 단위까지 계산되었다. 망원경은 포장되고 시계도 제 시간으로 맞춰졌다. 금성이 태양 앞을 지나간다. 천문학자들은 이번 일면통과로 하나의 천문단위, 즉 태양계의 근본적인 규모를 정확히 측정할 수 있을 것으로 보고 있다. 그러나 이러한 노력의 성공 여부는, 위치, 날씨, 좌표와 같은 관측 여건에 달렸다. "
 verrier.311.g: "우리는 고국에서 관측하도록 할 것이오."
 verrier.311.h: "우리는 보호령 중 한 곳에 탐사대를 파견할 것이오."
 verrier.311.i: "우리는 먼 나라로 탐사대를 파견할 것이오."
 verrier.311.j: "이 건은 다시 검토해 보아야겠소."
 verrier.319.t: "외지인의 눈이 밤하늘로 향하다"
 verrier.319.d: "[SCOPE.sCountry('verrier_venus_transit_leader').GetName]에서 온 탐사대가 금성 일면통과라는 희귀한 천문 현상을 관측하기 위해 우리 영토에 발을 들였다."
 verrier.319.f: "외지인들이 렌즈와 시계, 해도가 담긴 상자를 들고 하선했다. 대변인이 대학 관계자들을 만나 우호 서신을 교환하고 기술 회의를 제안하였다. 천문대의 연구원들은 호기심을 보였고, 언론에서는 중립적이면서도 경계를 놓치지 않았다.\n\n각 부처에서는 이번 사안의 의미를 논하고 있다. 과학적 협력은 물론, 측정 자료의 교환, 물류 주권, 세계 무대에서의 인지도 향상까지 고려해야 한다는 것이다."
 verrier.319.g: "과학이 모두가 나누는 언어가 되기를."
 verrier.321.t: "탐사대를 덮친 폭풍"
 verrier.321.d: "탐사선이 항해 도중 거센 폭풍우를 만났다. 파도가 몰아치고 돛대가 흔들리는 와중에 여러 상자가 갑판에서 떨어져 바다 속으로 가라앉았는데, 그중에는 정밀 천체 관측 장비도 있었다."
 verrier.321.f: "하늘이 무너지고 [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName](은)는 난간에 매달렸다. 바다는 마치 적군처럼 솟아 올라 갑판 위로 밧줄과 나무통을 내던졌다. 두 개의 상자가 무서운 포물선을 그리며 떠내려가 어둠 속으로 사라졌다.\n\n나중에 폭풍이 지나가고 적막만이 남으면서 피해 상황을 파악하게 되었다. 태양의 본체. 쾨니히스베르크의 이중 렌즈. 정밀시계 여러 점.\n\n[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 잔뜩 젖은 선원들과 부서진 나무조각 사이에서 장비가 있던 빈자리를 응시하였다. 예비 장비는 무사했지만 멀쩡한 것은 없었다.\n\n그렇게 시간은 금성처럼 누구도 기다려주지 않았다."
 verrier.321.g: "계속 나아가세. 아직 장비는 충분히 남았어."
 verrier.322.t: "예기치 못한 빛"
 verrier.322.d: "밤중에 별자리를 관측하는 과정에서 탐사대에 동행한 천문학자가 아무것도 없어야 할 자리에 불규칙적인 움직임과 위치가 고정된 빛 하나를 발견했다. 기존 성도와 비교해가며 그 실체를 확인한 결과, 탐사대가 미지의 새로운 천체를 발견했을 가능성이 존재하게 되었다."
 verrier.322.f: "탐사선은 비단결처럼 부드러운 하늘 아래를 떠다녔다. 몇 시간 전 구름이 걷히면서 너무나 맑고 깨끗한 하늘이 드러나 초현실적인 느낌마저 들었다. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 다시 접안렌즈를 자세히 들여다보았다. 알타이르와 육분의 눈금 가장자리 사이에 무언가가 움직였다. 혜성이라기엔 너무 느렸다. 잘못 보았다기엔 제자리에 잘 고정되어 있었다.\n\n밤마다 박사는 하늘의 똑같은 지점을 찾아 그림으로 옮기고, 계산하고, 비교했다. 마침내 박사는 기록을 남겼다. 조그마한 행성체. 어쩌면 두 개일지도. 그것도 아직 등재된 적 없는 것 말이다.\n\n금성은 조금 더 기다려야 할지 모른다. 하지만 별들은 벌써 무언가 다른 것을 보여주고 있었다."
 verrier.322.g: "이거 하나는 분명하군. 천공은 여전히 비밀을 간직하고 있어."
 verrier.323.t: "별 사이의 정원"
 verrier.323.d: "탐사대가 항해 도중 잠시 휴식을 취하면서 천문 관측에 알맞은 고지대를 조사하기 위해 내륙으로 들어갔다. 그런데 이들이 발견한 것은 낯선 식물들이 자라는 숲이었다. 그곳의 식물들은 기존의 식물 도감에 전혀 기록되지 않은 종이었다."
 verrier.323.f: "모든 것은 향기에서 비롯되었다. 은은하면서도 상큼한 귤 향이 숲속 끝의 고사리에서 피어났다. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 빽빽한 덤불을 헤치고 그 향기를 따라가다 햇빛이 물처럼 고인 자그마한 빈자리를 발견했다.\n\n그곳에는 진한 보라색 꽃이 완벽한 나선형으로 피어 있었다. 붉은 이끼가 흑요석 빛의 돌을 뒤덮고 있었고, 높은 곳에는 마치 매달린 별처럼 생긴 덩굴들이 바람에 흔들리고 있었다. 그 누구도 그 식물의 이름을 알지 못했다.\n\n젊은 조수 한 명이 나지막히 말했다. \"하늘이 지면으로 떨어질 것 같네요.\"\n\n금성을 좇아 이곳에 왔지만, 고요한 공기와 은은한 조명 속에서 다른 부류의 경이로움을 발견한 것이었다."
 verrier.323.g: "표본을 채집, 보존하여 연구에 활용하자."
 verrier.324.t: "시간을 거스른 암석"
 verrier.324.d: "최고도 관측 지점을 물색하는 과정에서 탐사대는 우연히 지질학적으로 대단히 흥미로운 장소를 발견하였다. 주변의 암석에는 이전까지 거의 보지 못한, 아니면 전혀 볼 수 없었던 무늬와 화석들이 나타나 있던 것이다."
 verrier.324.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 겉으로 드러난 지층의 표면을 따라 손을 뻗어 매만졌다. 아침 햇살에 흐릿하게 반짝이는 표면에 금속성 광택이 감도는 경계선이 차곡히 쌓였다. 짙은 녹색의 소용돌이가 주황색 결정을 감싸고, 마치 누군가 일부러 짜낸 듯한 무늬를 이루고 있었다.\n\n근처의 다른 암석에서는 거품 화석이 드러났는데, 속은 비었어도 여전히 온전한 상태였다. 탐사대에 동행한 어느 지질학자는 화산 활동으로 생겼을 거라 짐작했다. 다른 한 명은 고개를 저으며 말했다. \"이건 지금껏 본 것 중에 제일 오래되었군.\"\n\n그들이 가져온 장비는 하늘을 관측하기 위해 제작한 것이었다. 그러나 그들의 발밑에 깔린 바위 속에는 지구의 깊숙한 기억이 파편으로 남아 있었다."
 verrier.324.g: "이번 발견은 지구 역사의 한 대목을 장식할 만하군."
 verrier.325.t: "하늘 아래 가로막힌 장벽"
 verrier.325.d: "탐사대가 입항 과정에서 세관 당국으로부터 즉시 통관을 거절당했다. 과학 장비가 담긴 상자 몇 개가 검사 대상에 올라 억류되고, 세관 직원들은 이전에는 필요 없던 추가 서류를 제출하라고 밝혔다."
 verrier.325.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 화물 명세서 옆에 이 악물고 서 있었다. 수은 렌즈, 정밀 시계, 윤기 나는 황동 케이스가 창고에 쌓여 문이 잠긴 채 잉크와 도장을 기다리기 전까지 꼼짝하지 못했던 것이다.\n\n세관 직원은 정중했지만 단호했다. \"연구든 뭐든 간에, 협정으로 예외가 되지 않는 모든 외국산 기기는 신고와 검사, 납세가 이루어져야 하오.\"\n\n협정 따위 체결할 시간은 없었다.\n\n밖에서는 해가 아직 떠오르고 있었다. 그리고 금성은 복잡한 통과 절차를 기다려주지 않을 것이다."
 verrier.325.g: "수수료를 지불하고 허가를 서둘러 받아냅시다."
 verrier.340.t: "금성 일면통과 관측 준비 완료"
 verrier.340.d: "몇 주간에 걸친 준비 끝에 금성 일면통과를 위한 관측소가 완성되었다. 관측 기기는 보정을 마쳤고, 차트도 검증하였다. 이제 모든 것이 하늘에 달렸다."
 verrier.340.f: "둥근 천장은 마치 고요한 임무를 품은 놋쇠 등대처럼 솟아 있었다. 고국 땅에서 석재로 지어졌든, 낯선 땅에서 천과 비단을 둘렀든, 그 안에는 숨 막힐 듯한 기대감이 가득 찼다는 점에서 다를 게 없었다. 안에서는 태양계가 등불 아래에서 반짝였다. 톱니바퀴는 조그만 소리를 내며 돌아갔고 시계는 기대에 찬 듯이 딸깍거렸다. 밖에서는 조수들이 렌즈의 먼지를 닦아내고 있었다. 공기조차 머뭇거리는 듯했다. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 문 앞에 서서 문턱을 매만졌다. 지난 몇 달 간 모든 것이 이 순간을 향해 움직여 왔다. 이제 더 이상 지을 것은 없고 남은 것은 그저 기다리는 것 뿐. 그들 위의 보이지 않는 하늘 어딘가에서 금성이 본연의 궤도를 따라 흘러가고 있었다."
 verrier.340.g: "침착한 손길에서 정확도를 빚는다."
 verrier.341.t: "고요한 조정"
 verrier.341.d: "[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] 박사는 망원경 본체 내부 지지대에 사소하지만 큰 조정을 가해야 한다고 제안하였다. 이것으로 내부의 진동을 줄이고 금성이 태양과 만나는 순간의 광학적 선명도를 높일 수 있다는 것이 박사의 입장이다."
 verrier.341.f: "그 사건은 둥근 천장 안이 아니라 그 뒤편의 작업용 천막에서 벌어졌다. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사가 차트를 꼼꼼히 살펴보는 동안 [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] 박사가 기름 때 묻은 메모지를 들고 다가왔다. 완충 장치의 장력을 다시 계산하고, 황동 내륜 지지대를 조정했다는 것이다.\n\n다른 사람들은 정중하지만 회의적인 태도로 귀를 기울였다. 허나 시험 결과, 관측되는 상이 미세하게나마 더욱 안정된 것이 확인되었다. 흐릿한 부분과 선명한 부분의 경계가 달라질 정도로 충분한 변화였다."
 verrier.341.g: "작은 변화가 엄청난 정확도를 만든다."
 verrier.342.t: "선명도의 방정식"
 verrier.342.d: "최근 전자기 이론의 혁신으로 망원경 관측 방식에 새로운 광학 필터 조정법을 적용할 수 있게 되었다. 이제 대기에서 빛이 산란되어 발생하는 간섭을 잘 감안하여 보다 선명한 시각 자료를 얻을 수 있게 된 것이다."
 verrier.342.f: "그 발상은 관측소에서도, 렌즈 수리공의 작업대에서도 나온 것이 아니라 종이 한 장에서 나왔다. 파동 방정식을 한층 개선한 것이었다. 빛이 단순히 입자나 광선이 아니라 진동하는 장으로 작용한다는 것을 밝혀낸 순간이었다. 이것으로 새로운 간섭 이론을 예측하고 보정할 수 있었다. 필터를 다시 제작하고, 노출 시간을 조정하였다. 공학자들은 의심 가는 사항을 다시 한번 확인하였다.\n\n 그날 밤 [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사가 시험 렌즈를 통해 하늘을 바라보자, 별들은 더 이상 흔들림이 없었다. 정확하고 냉정하게, 제자리에 있었던 것이다. 하늘의 흔들림도 멈추었다."
 verrier.342.g: "수학이 시야를 날카롭게 만든다."
 verrier.351.t: "1874년 금성 일면통과"
 verrier.351.d: "요코하마에서 레위니옹까지, 케르겔렌에서 북경까지, 대륙과 대양을 넘어 천문학자들은 금성이 일면을 가로지르는 모습을 관찰하였다. 1874년 금성 일면통과가 마무리되면서 많은 연구팀이 관측 성공을 보고하였다."
 verrier.351.f: "이들은 증기선을 타고, 낙타를 타고, 기차를 타고, 걸어서 왔다. 이들은 공학자였고 식물학자였고 지도제작자였다. 이들은 밀림과 사막에 천문대를 세웠다. 날씨를 연구하고, 그림자의 시간을 재고, 손이 떨릴 때까지 렌즈를 연마했다.\n\n그렇게 1874년 12월 9일, 이들은 여섯 시간 동안 검은 점이 태양 원반을 가로지르는 것을 지켜보았다.\n\n금성은 남몰래 살짝 들어와 비밀처럼 사라졌다. 측정은 완벽하진 않았지만 충분했다. 이제 삼각측량에 나설 수 있었다. 인류가 처음으로 신화나 눈대중이 아니라, 그림자가 따르는 수치로 태양계의 실제 크기를 알게 될 수도 있는 순간이었다. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 노트를 접고 숨을 내쉬었다. 드디어 끝났다."
 verrier.351.g: "정말 아름답구나."
 verrier.352.t: "1882년 금성 일면통과"
 verrier.352.d: "1882년 12월 6일, 금성이 다시 한번 태양 위를 지나갔다. 금세기 마지막 기회를 놓치지 않기 위해 전세계 학자들은 하늘에 관측 장비를 고정하고 금성의 검은 원반이 지나가는 모습을 포착하였다."
 verrier.352.f: "이번에는 탐사선이 더 일찍 출발했다. 천문대는 더욱 견고해졌다. 시계는 보다 정확해졌다. 1874년의 경험이 그 모든 바늘과 그림자와 계산을 인도하였다.\n\n뉴저지에서 파타고니아까지, 멕시코에서 호주까지, 세상은 태양 위를 스치는 작은 점을 보기 위해 멈춰 섰다.\n\n[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 마지막 필터를 조정하였다. 눈부시게 하얀 하늘을 원반이 천천히 가로지르며 나타났다. 환호성은 없었다. 오로지 펜 휘두르는 소리, 셔터가 찰칵거리는 소리, 그리고 조용한 성공의 숨결만이 들렸다. 금성이 다시 돌아오기까지는 121년을 더 기다려야 한다. 허나 바로 이 순간, 시간 그 자체를 측정하고야 만 것이었다."
 verrier.352.g: "이 다음 기회는 영영 볼 수 없겠지."
 verrier.353.t: "빛의 장막을 뚫고"
 verrier.353.d: "오랜 기다림 끝에 다가온 순간, 날씨가 악화되기 시작했다. 구름이 몰려든 것이었다. 모든 것을 가릴 정도는 아니었지만, 선명도와 타이밍을 해칠 만했다."
 verrier.353.f: "하늘이 완전히 가려지지는 않았지만 더 이상 우리 뜻대로 되어주질 않았다. 떠다니는 구름층이 마치 얇은 천을 두르듯 태양을 뒤덮었다. 빛이 어두워졌다가 불규칙적으로 깜빡였다. 모든 렌즈에 균형을 맞추느라 애를 썼고, 온 조수들이 숨을 내쉬었다.\n\n[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 필터 속으로 눈을 고정했다. 금성의 실루엣이 나타났다. 희미하고 굴절된 모습으로 안개와 계산 사이에서 일렁이는 듯했다.\n\n깔끔한 원형은 아니었다. 교과서적인 관측도 아니었다. 그러나 그것은 주어진 자료였다. 변덕스러운 하늘 아래 어렵게 확보한 자료였던 것이다."
 verrier.353.g: "하늘이 파편을 내려준다면 우린 그걸 꿰맞출 수밖에."
 verrier.354.t: "움직이는 그림자"
 verrier.354.d: "금성 일면통과가 진행되면서 관측팀은 정확한 측정 자료 뿐만 아니라 화상까지 포착하였다. 수십 장의 사진 건판을 순차적으로 촬영하여 하나의 영상으로 만든 것이다. 역사상 처음으로 행성 일면통과가 영상으로 기록되었다."
 verrier.354.f: "깜빡거렸다. 떨렸다. 허나 움직인다. 여러 장의 사진 건판에 포착된 금성이 태양 원반의 가장자리에 진입하여, 완벽한 검은 점으로 가로지른다. 단순한 계산이나 기록화가 아닌, 움직임이다. 그것도 시간 속에 포착된 움직임인 것이다. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 암실에서 조명을 높이 들고 그 짧은 순간이 반복되는 것을 바라보았다. 여섯 시간 동안의 측정이 단 몇 초간의 경이로움으로 압축됐다. 천문학자들은 박수를 보냈다. 자신들이 새로운 일을 해냈다는 것을 알았기 때문이다. 이들은 하늘을 움직이게 만든 것이다."
 verrier.354.g: "각 프레임을 분석하여 행성 운동 이론을 개선하자."
 verrier.355.t: "금성 행진곡"
 verrier.355.d: "1882년 금성 일면통과를 둘러싼 전세계의 흥분에 감명받은 [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName](이)가 새로운 기념곡을 작곡했다. 많은 청중 앞에서 초연된 이 행진곡은 천문 현상의 장엄함과 새로운 과학의 세기의 리듬을 동시에 담아내고 있다."
 verrier.355.f: "1882년 금성 일면통과로부터 1년 뒤, 존 필립 수자는 지난 1878년 사망한 미국 물리학자 조셉 헨리의 동상 제막식에 연주될 행진곡의 작곡을 의뢰받았다. 프리메이슨 회원이기도 했던 수자는 마침 그 프리메이슨이 자연 현상에서 발견하던 신비로운 특성에 미혹되어 있었다. 수자 생전에는 널리 알려지지 못했던 이 곡은 홍수로 악보 사본이 소실되면서 오랫동안 연주되지 못했다."
 verrier.355.g: "관객이 아니라 역사를 위해 쓰여진 곡도 있군."
 verrier_venus_transit_modifier: "금성 일면통과 관측 완료"
 building_verrier_observatory_throughput_add: "천문대 건물 [concept_throughput]"
 building_verrier_observatory_throughput_add_desc: "천문대의 [concept_throughput]을 증가시킵니다."
 verrier.161.t: "지구에서 떼어져 나온 달"
 verrier.161.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사가 달이 한때는 지구의 일부였으며, 초창기 지구의 빠른 자전과 조석력에 이끌려 분리되었다는 새로운 이론을 제시하였다."
 verrier.161.f: "지구와 달이 회전하는 가스 구름에서 동시에 형성되었다는 설명으로 세간에 널리 받아들여진 칸트-라플레스 이론과는 달리, [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 지구가 극도로 빠른 자전 속도를 지니던 시기에 그 외층에서 달이 분리되어 나왔다는 주장을 제시하였다. 박사의 이론은 지구-달 체계가 각운동량을 보존한다는 조석역학에 기반을 두고 있는데 해당 현상과도 맞아떨어지는 부분이다. 달의 비교적 낮은 밀도와 구성 성분이 지구 외층과 유사하다는 사실은 달이 지표면에서 기원했다는 가설을 뒷받침하고 있다. 비록 물리적 표본은 부족하나 이번 이론은 달 궤도와 지구의 자전 속도 감소가 밀접하게 연관된 이유를 역학적으로 설명하고 있다."
 verrier.161.g: "흥미롭군."
 verrier.162.t: "지구에 사로잡힌 달"
 verrier.162.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사가 대담한 가설을 내놓았다. 달이 지구와 함께 형성된 것이 아니라, 태양계 어딘가에서 이미 형성된 다음에 중력에 이끌려 사로잡혔다는 것이다."
 verrier.162.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 지금의 공동 형성 이론에서 벗어나 달이 한때는 별개의 천체였다고 주장하였다. 박사의 계산에 따르면 초창기 지구 대기의 저항이나 제3의 천체와의 상호작용으로 탄력받은 지구 중력이 달을 궤도로 끌어들였을 가능성이 존재하며, 그 시점은 두 천체가 형성된 지 이미 오랜 시간이 지난 뒤의 일이라는 것이다. 이러한 현상은 달의 궤도가 기울어진 점과 독특한 움직임을 보이는 것을 설명할 수 있지만, 조건이 정확하게 맞아떨어지지 않는 이상 사로잡는 것 자체가 역학적으로 불안정할 것이라 지적하는 학자들도 있다. 또 이에 필요한 에너지 손실을 설명할 수 있는 작동 방식은 아직 밝혀지지 않았다. 그럼에도 이번 이론은 기존 견해에 맞선 대담한 도전으로 주목받고 있다."
 verrier.162.g: "추측에 불과하지만 검토해볼 가치는 있군."
 verrier.163.t: "태초의 충돌"
 verrier.163.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 대담한 지질학 가설을 내놓았다. 초창기 지구에 격렬한 충돌이 가해져 방출된 지구의 물질로부터 달이 형성되었다는 설이다."
 verrier.163.f: "달의 기원에 대한 기존 이론들의 모순이 해결되지 않는 것에 좌절한 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 획기적인 대안을 제시하고 나섰다. 너무 작지도 그렇다고 행성 크기도 아닌, 적당한 질량의 천체가 형성 단계에 있던 지구에 비스듬한 각도로 충돌했다는 것이다. 그렇게 생겨난 파편들, 주로 지구의 외층 물질들이 궤도에 진입하여 점차 뭉쳐나가면서 달을 형성했다는 가설이다. 이 시나리오는 달의 낮은 밀도, 지구 맨틀과의 유사성, 지구-달 체계의 특이한 운동량과 일맥상통하고 있다. 해당 가설은 아직 추측의 영역에 남아 있으며 증명하기도 어려우나, 지질학적 추론과 천체역학을 하나로 묶고, 행성의 형성 과정을 점진적인 조화가 아닌 충돌 과정으로 과감히 설명했다는 점에서 주목할 만하다."
 verrier.163.g: "행성학을 재편할 이론이로군."
