 verrier_neptune_star_chart_button: "성도 교환"
 verrier_neptune_star_chart_button_desc: "천문대와 천문학자를 갖춘 외국 세력과 동맹 관계에 있다면 양국의 천문학자들이 성도를 한 차례 교환할 수 있습니다."
 verrier_neptune_modern_telescope_button: "망원경 개량"
 verrier_neptune_academic_synergies_button: "학계의 시너지"
 verrier_neptune_academic_synergies_button_desc: "학계의 모든 역량을 미지의 행성 탐색에 주력하면 훨씬 빠른 성과를 이룩하고 경쟁국들을 앞지를 수 있습니다. 이는 물론 우리 공과 대학의 학술 분야에도 영향을 끼칠 것입니다. 지금 천문학자를 양성하면 예산 지원도 가속화됩니다."
