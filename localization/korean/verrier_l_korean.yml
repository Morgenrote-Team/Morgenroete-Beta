 verrier.142.t: "태양 플레어"
 verrier.142.d: "태양 플레어를 관측하던 [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName](이)가 대단히 이례적인 현상을 발견하였다. 그의 이론이 사실이라면 태양 폭풍이 지구를 향해 돌진하고 있는 것이다. 이는 과학적 의의로서는 신기원을 이루는 대사건이다. 허나 그와 동시에 위험할 가능성도 존재한다."
 verrier.142.f: "태양 플레어는 태양의 채층 내부에서 자기장 에너지에 의해 발생하는 복사량 증가 현상이다. 플레어 영역의 흡수 스펙트럼을 분석해 보면 일반적으로 수소 외에 헬륨과 칼슘이 나타난다. 이 영역에서는 자외선과 X선 영역의 단파 복사 뿐만 아니라 양성자, 전자, 이온 등이 방출된다. 이 같은 현상이 지구에 닿는다면 전리층에 교란을 일으켜 무선 통신에 지장을 준다. 입자가 지구 대기권에 진입하면 자기 폭풍을 불러일으킨다. 입자들이 오로라 영역에 천천히 침투하여 밤에 볼 수 있는 오로라를 유발하고, 강하게 변동하는 전류가 지구 자기장에 교란을 일으키면 전리층 폭풍이 발생하게 된다."
 verrier.142.g: "그게 무슨 뜻이오, 교수?"
 verrier.143.t: "The [SCOPE.sCharacter('verrier_carrington_discoverer').GetLastName] Event"
 verrier.143.d: "A magnetic storm has hit the Earth! This unique natural event has resulted in the Northern Lights being visible even in Rome, Havana and China. People are amazed by that celestial spectacle. Apparently it has something to do with a solar flare discovered by the Astronomer [SCOPE.sCharacter('verrier_carrington_discoverer').GetFullName]."
 verrier.143.f: "From August 28 to September 4, 1859, several powerful solar flares occurred, observed in particular by the astronomer Richard Carrington. The material ejected from the coronal mass ejections had a speed of over 2000 km/s. This reached Earth about 17.5 hours later. The most powerful geomagnetic storm to date was recorded on the night of September 1st to 2nd. Auroras were seen around the world in both northern and southern hemispheres. The aurora over the Rocky Mountains in the United States was so bright that the glow woke gold miners, who began preparing breakfast because they thought it was morning. People in the northeastern United States could read a newspaper by the aurora's light. The aurora was visible from the poles to low latitude areas such as south-central Mexico, Cuba, Hawaii, Queensland, southern Japan and China, and even at lower latitudes very close to the equator, such as in Colombia."
 verrier.143.g: "This is terrible and fantastic at the same time."
 verrier.144.t: "The Telegraphy System collapses"
 verrier.144.d: "Because of the geomagnetically induced current from the electromagnetic field, telegraph systems all over Europe and North America failed, in some cases giving their operators electric shocks. Such high voltages were induced in telegraph lines that strips of paper in the receivers were set on fire by sparks. Some operators were able to continue to send and receive messages despite having disconnected their power supplies."
 verrier.144.f: "Boston operator (to Portland operator): 'Please cut off your battery entirely for fifteen minutes.'\nPortland operator: 'Will do so. It is now disconnected.'\nBoston: 'Mine is disconnected, and we are working with the auroral current. How do you receive my writing?'\nPortland: 'Better than with our batteries on. Current comes and goes gradually.'\nBoston: 'My current is very strong at times, and we can work better without the batteries, as the aurora seems to neutralize and augment our batteries alternately, making current too strong at times for our relay magnets. Suppose we work without batteries while we are affected by this trouble.'\nPortland: 'Very well. Shall I go ahead with business?'\nBoston: 'Yes. Go ahead.'"
 verrier.144.g: "The telegraphs work without electricity?! That's completely impossible!"
 verrier.9010.t: "The Sound of Science"
 verrier.9010.d: "A professors at [SCOPE.sState('sound_of_science_state').GetCityHubName] University has demonstrated the the validity of #variable Christian Doppler#!'s theory that the observed frequency of sound or light changes if either the source or the observer is moving."
 verrier.9010.f: "A racing train, a blaring brass horn and a dozen perfect pitch ears have come together on the #bold #variable [SCOPE.sState('sound_of_science_state').GetFarmHubName]-[SCOPE.sState('sound_of_science_state').GetCityHubName]#!#! railway for an imaginative experiment. At stake? Doppler's theory on the movement of stars. For if the theory that the frequency of a wave changes with the speed of an object is correct, then a noticable drop in pitch from the blaring horn should be observed as the train races past the spectators.\nSelected for their ability to hear even a 1/8th difference in pitch, the spectators carefully record their observations as the train races by. Now; after 3 days of tabulation the results are in... And... Uniformly a drop in pitch is recorded!"
 verrier.9010.g: "Observation and experimentation is the foundation of knowledge."
 verrier.9010.h: "One cannot know how unexpectedly a new truth can find a purpose."
 verrier_sound_of_science_prestige_modifier: "The Sound of Science"
 verrier_sound_of_science_tech_spread_modifier: "과학의 소리"
 je_verrier_uranus: "Another Planet?"
 je_verrier_uranus_reason: "Could it be that there is another planet out there? For centuries, there were only 6 planets, but with the recent improvements of telescopes, it is very much possible that we might find another one. And why stop at 7, maybe there are even more! Finding more planets might even help to unravel the mysteries of the universe.\n\n#b Historical Context:#! The 6 planets were known for a long time, as they were easy to observe even with bare eyes thanks to their brightness. Uranus, Neptune and Pluto on the other hand were less bright and even though Uranus is visible for eyes in the right circumstances, Its slow orbital speed has led many astronomers to believe that the planet is a fixed star."
 je_verrier_uranus_goal: "To determine whether there is another planet or not, we need to discover [JournalEntry.GetTotalGoalValue|0+] @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]."
 je_verrier_uranus_fail: "If another nation meets the requirements before us they might find a new planet or maybe realise that there are only 6 planets."
 verrier.12.t: "A new Planet!"
 verrier.12.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] has discovered an unknown planet that is now called Uranus! An event no one has seen coming."
 verrier.12.f: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] first thought to have found a new comet. Only weeks later was it clear that it was in fact a new planet! It is incredible that another planet was basically not considered possible before. But now that Uranus was found, many ask, if there could be even more planets.\n\n#b Historical Context:#! It was not until 1781 that Wilhelm Herschel stumbled across Uranus by chance. At first he thought it was a comet, because why should there be more planets than the well-known ones? Within the next 3 months, however, the scientific community realized that it was indeed a new planet."
 verrier.12.g: "Unbelieveable! Are there possibly even more planets?"
 verrier.13.d: "A sensation happened! An astronomer from [SCOPE.sCountry('verrier_uranus_discoverer_country').GetName] has found a new planet called Uranus. And if there is one more, maybe we can find eben more!"
 verrier.13.g: "If there are more than 6, maybe there are even more for us to discover!"
 verrier_uranus_discoverer_modifier: "천왕성 발견국"
 je_verrier_dwarf_planets: "천체경찰"
 je_verrier_dwarf_planets_reason: "참고: 본 저널 항목은 여러 차례에 걸쳐 완료할 수 있습니다.\n\n천왕성이 발견되면서 다른 행성을 찾아낼 가능성이 생기게 되었다. 화성과 목성 사이에 거대한 빈 공간에 아무런 행성이 없었기에 천문학자들은 이곳에서 다른 행성을 찾아낼 수 있을 것으로 보았다. 이에 따라 '천체경찰'을 결성하여 여러 천문대가 공동으로 행성을 탐색하는 여정에 나섰다.\n\n#b 실제 역사:#! 천체경찰 (독일어로 Himmelspolizey)은 19세기 초 여러 유럽 천문학자들이 결성한 협력조직이다. 화성과 목성 궤도 사이에 존재할 것으로 예측된 천체의 탐색에 주력하였으며, 1800년 제2차 유럽 천문학자 회의에서 결성되었다."
 je_verrier_dwarf_planets_goal: "새로운 행성을 발견하려면 @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] [JournalEntry.GetGoalAddValue|0+]개를 발견해야 합니다."
 verrier.14.t: "세레스 발견"
 verrier.14.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](이)가 화성과 목성 사이에 미지의 행성을 발견하였다. 엄청난 발견이다!"
 verrier.14.f: "#b 실제 역사:#! 천문학계에서는 화성과 목성 사이의 빈 공간에 또다른 행성이 있을 것으로 오랫동안 예측해 왔다. 이에 따라 '천체경찰'이 결성되어 일정한 공간을 분할한 다음 각 천문대마다 할당하여 찾도록 하였다.\n1801년 새해 첫날 밤, 주세페 피아치가 천체 일람을 이용해 세레스를 발견하는 데 성공하였다."
 verrier.14.g: "행성이 얼마나 더 있을지 궁금하군."
 verrier_ceres_discoverer_modifier: "세레스 발견국"
 notification_verrier_ceres_discovered_notification_name: "세레스 발견"
 notification_verrier_ceres_discovered_notification_desc: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] 박사가 태양계의 새로운 행성을 찾아내는 엄청난 발견을 이뤄냈다. 이 행성은 화성과 목성 사이에 위치한 것으로서 세레스로 명명하게 되었다."
 verrier.15.t: "팔라스 발견"
 verrier.15.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](이)가 화성과 목성 사이에 미지의 행성을 발견하였다. 엄청난 발견이다!"
 verrier.15.f: "#b 실제 역사:#! 화성과 목성 사이에서 세레스가 발견되자 같은 공간에 또다른 행성이 존재할 것으로 여긴 사람은 아무도 없었다. 그러나 하인리히 빌헬름 올베르스가 세레스를 찾는 과정에서 새로운 행성을 발견한 것은 뜻밖의 엄청난 사건이었다. 팔라스의 발견은 천체경찰로 하여금 동일 공간의 다른 행성을 탐색하려는 노력으로 이어졌으며, 그로부터 불과 몇 년 만에 결실을 이루게 되었다."
 verrier_pallas_discoverer_modifier: "팔라스 발견자"
 notification_verrier_pallas_discovered_notification_name: "팔라스 발견"
 notification_verrier_pallas_discovered_notification_desc: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] 박사가 태양계의 새로운 행성을 찾아내는 엄청난 발견을 이뤄냈다. 이 행성은 화성과 목성 사이에 위치한 것으로서 팔라스로 명명하게 되었다."
 verrier.16.t: "베스타 발견"
 verrier.16.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](이)가 화성과 목성 사이에 미지의 행성을 발견하였다. 엄청난 발견이다!"
 verrier.16.f: "#b 실제 역사:#! 1807년 하인리히 빌헬름 오베르스가 두 번째 행성을 발견하고 카를 프리드리히 가우스에게 그 행성의 명칭을 정해달라고 부탁하였다. 이에 따라 명명된 베스타는 화성과 목성 사이 공간에 존재하는 네번째로 발견된 행성이자, 향후 40년 동안 마지막으로 발견된 행성이 되었다."
 verrier_vesta_discoverer_modifier: "베스타 발견자"
 notification_verrier_vesta_discovered_notification_name: "베스타 발견"
 notification_verrier_vesta_discovered_notification_desc: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] 박사가 태양계의 새로운 행성을 찾아내는 엄청난 발견을 이뤄냈다. 이 행성은 화성과 목성 사이에 위치한 것으로서 베스타로 명명하게 되었다."
 verrier.17.t: "주노 발견"
 verrier.17.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](이)가 화성과 목성 사이에 미지의 행성을 발견하였다. 엄청난 발견이다!"
 verrier.17.f: "#b 실제 역사:#! 1801년 세레스, 1802년 팔라스가 발견된 이래 불과 2년 만에 카를 루트비히 하르트비히가 화성과 목성 사이의 동일한 공간에서 주노를 발견하였다. 1807년 발견된 베스타와 함께 이들 네 천체는 행성으로 여겨졌으며, 해당 공간에서 더 많은 소행성이 발견되고 행성으로 여겨지는 와중에도 변치 않았다. 그러나 이후 천문학계에서 이들 가운데 실제 행성은 없는 것으로 다시 분류하게 되었다."
 verrier_juno_discoverer_modifier: "주노 발견자"
 notification_verrier_juno_discovered_notification_name: "주노 발견"
 notification_verrier_juno_discovered_notification_desc: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] 박사가 태양계의 새로운 행성을 찾아내는 엄청난 발견을 이뤄냈다. 이 행성은 화성과 목성 사이에 위치한 것으로서 주노로 명명하게 되었다."
 je_verrier_neptune_goal: "미지의 행성을 발견하려면 별들로 가득한 밤하늘을 자세히 연구할 필요가 있습니다. @verrier_astronomicalobject![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] [JournalEntry.GetTotalGoalValue|0+]개를 찾아내야 행성을 발견할 수 있게 됩니다."
 je_verrier_pluto_goal: "행성 X의 발견 성공을 위해서는 별이 빛나는 하늘을 심층적으로 연구할 필요가 있습니다. @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] [JournalEntry.GetTotalGoalValue|0+]개를 찾아내면 비로소 행성을 찾아낼 기회를 얻게 됩니다."
 MR_ASTEROID_CONGRESS_DWARF_PLANETS_TT: "#default_text #V 세레스#!, #V 팔라스#!, #V 베스타#!, #V 주노#!가 발견됨#!"
 je_verrier_astro_physics: "천체물리학"
 je_verrier_astro_physics_reason: "물리학계의 새로운 발견이 과학계를 뒤집고 있다. 천문학도 이러한 변화에서 자유롭지 못하다. 두 과학 분야는 활발한 교류를 진행하고 있으며 이론물리학과 관측물리학은 우주를 한층 더 이해하는 데 공헌할 수 있다."
 verrier_astro_physics_tech: "천체물리학"
 verrier_astro_physics_tech_desc: "천체물리학은 물리학과 화학의 방법과 원리를 활용하여 천체와 천문 현상을 연구하는 학문입니다.  이 학문을 창설한 학자 가운데 제임스 킬러는 \"천체물리학은 우주 상의 천체의 위치나 운동이 아니라 그 본질, 즉 천체가 어디에 있느냐가 아니라 무엇이냐를 밝히는 것이 목표\"라고 말했습니다."
 verrier_modern_physics_tech: "근대 물리학"
 verrier_modern_physics_tech_desc: "근대 물리학은 20세기 초에 발달한 물리학의 한 갈래입니다. 근대 물리학의 대표적인 문야로는 양자역학, 특수 상대성 이론, 일반 상대성 이론 등이 있습니다. 근대 물리학은 빛의 속도와 비교될 만큼 빠른 속도, 원자 반지름에 비교될 만큼 짧은 거리, 극도로 높은 에너지와 같은 극한 사황을 다룹니다."
 verrier_nuclear_physics_tech: "핵물리학"
 verrier_nuclear_physics_tech_desc: "핵물리학은 원자핵의 구조와 운동을 다루는 물리학의 한 갈래입니다. 핵물리학은 원자핵의 구조, 즉 원자핵의 구조적 특징과 그 반응의 규명을 다룹니다. 이를 위해 핵의 자발적인 변화 (방사능), 핵에 대한 산란 과정, 핵반응 등을 실험적, 이론적으로 연구합니다. 핵분열과 핵융합 기반 기술들은 핵물리학의 연구를 바탕으로 합니다."
 verrier_first_sun_photo_modifier: "최초의 일식 사진"
 verrier_helium_discovered_modifier: "태양 원소"
 verrier_comet_observer: "혜성 관측자"
 verrier_comet_observer_desc: "이 천문학자는 대혜성을 발견하여 자신의 이름으로 명명하였습니다."
 verrier_magnetic_storm_observer: "자기폭풍 관측자"
 verrier_magnetic_storm_observer_desc: "이 천문학자는 태양 플레어로 발생한 자기 폭풍을 면밀히 관찰하고 연구하였습니다."
 verrier_solar_observer: "태양 관측자"
 verrier_solar_observer_desc: "이 천문학자는 일식을 관측하여 귀중한 과학적 지식을 습득하였습니다."
 verrier.152.t: "일식"
 verrier.152.d: "올해는 보기 드문 천문 현상이 벌어졌다. [ROOT.GetCountry.GetCapital.GetCityHubName]의 상공에 완전 개기일식이 모습을 드러낸 것이다. [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName](은)는 일식을 한층 더 가까이 관측할 수 있는 특별한 기회를 갖게 되었다."
 verrier.152.f: "개기 일식은 지구 상의 특정 지역에서 관측할 때 달이 태양을 부분적으로 혹은 완전히 가리는 천문 현상입니다. 달의 그림자가 지구를 덮는 이 현상은 초승달일 때만 발생하게 됩니다. 일식은 태양과 우주 전반에 대한 새로운 통찰력을 얻는 데 활용되는 경우가 많았습니다. 1919년 5월 29일 아서 스탠리 에딩턴이 이끄는 탐사대가 아프리카 프린시페섬에서 관측한 개기일식은 그로부터 몇 년 전 알베르트 아인슈타인이 발표한 상대성 이론과 맞물려 특히 주목을 받았습니다. 아인슈타인의 상대성 이론은 태양의 중력장으로 멀리서 건너오는 별빛이 휘어진다고 설명했는데, 일식의 관측 결과가 이를 뒷받침했기 때문입니다."
 verrier.152.g: "참 보기 드문 현상이군!"
 verrier.153.t: "[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName]의 구슬"
 verrier.153.d: "우리 천문학자 [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName](이)가 지난번 개기일식 때 태양 코로나와 주요 천체들을 한층 더 자세히 관측하는 특별한 기회를 얻고, 그 과정에서 드러나는 현상들을 태양 대기의 일부로 분류하였다."
 verrier.153.f: "베일리의 구슬(금환 효과)은 개기일식과 금환일식의 특징이다. 같은 현상에서 벌어지지만 일식의 종류에 따라 별개로 구분된다. 일식 동안에 달이 태양을 가리면 루나 림이라는 거친 형상에 의하여 햇빛이 구슬처럼 부분적으로 빛나는 현상이 벌어진다. 그 이름은 1836년 효과의 원리를 설명한 프랜시스 베일리에서 따왔다. 금환 효과는 하나에서 두 개의 구슬처럼 보일 때, 달의 실루엣이 금환 주변에서 고정되어 광채를 발하는, 빛나는 '다이아몬드'처럼 나타날 때에만 보인다."
 verrier.153.g: "이 현상은 [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사의 이름을 따오는 것이 좋겠다."
 verrier.154.t: "개기일식을 처음으로 사진에 담다"
 verrier.154.d: "[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사가 신기술을 활용하여 개기일식을 처음으로 사진으로 남기는 데 성공했다."
 verrier.154.f: "개기일식처럼 희귀 현상을 사진으로 담는 것은 초창기 사진술에서는 특별한 도전이 아닐 수 없었는데, 태양의 코로나와 달의 어두운 그림자 사이의 극명한 대비를 감안해야 하는 것은 물론, 촬영장비가 맞춰야 할 각도도 평소와는 사뭇 달랐기 떄문이다. 태양 코로나를 제대로 노출하여 사진으로 처음 담는 데 성공한 것은 1851년 7월 28일 개기일식이 계기가 되었다. 당시 쾨니히스베르크의 왕립 프로이센 천문대에서 도시 최고의 사진가(당시 명칭은 다게레오타입 촬영가)였던 요한 율리우스 프리드리히 베르코브스키에게 이번 현상의 정지화상을 기록해줄 것을 의뢰하였다. 관측자는 6cm 크기의 조그마한 굴절 망원경을 15.8cm 크기의 프라운호퍼 태양의에 부착하였으며, 베르코브스키가 완전 개기일식에 도달한 직후 84초 동안 노출하여 사진으로 담아내는 데 성공하였다."
 verrier.154.g: "완벽하군."
 verrier.155.t: "태양 원소"
 verrier.155.d: "Using a new spectographic technique, Dr. [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName] made a remarkable discovery during the last solar eclipse. It looks like he has discovered a new element. Nobody wanted to believe him at first, but the chemist Dr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName] has just confirmed this discovery."
 verrier.155.f: "Evidence of the element helium was first obtained from a bright yellow spectral line at a wavelength of 587.49 nanometers in the spectrum of the Sun's chromosphere. The French astronomer Jules Janssen made this observation in India during the total solar eclipse of August 18, 1868. When he announced his discovery, no one initially believed him because no new element had ever been found in space before it was proven on the planet Earth could be guided. On October 20 of the same year, the Englishman Norman Lockyer confirmed that the yellow line was indeed present in the solar spectrum and concluded that it was caused by a previously unknown element. Since this spectral line was very close (1.8 nm from the center) to the Fraunhofer double-D line (D2 = 589.00 nm, D1 = 589.60 nm) of the metal sodium, he named the line D3 to describe it to be distinguished from these lines D1 and D2 of sodium. He and his English colleague Edward Frankland suggested naming the new element helium (from the Greek helios, sun)."
 verrier.155.g: "Helium? An apt name for the solar element!"
