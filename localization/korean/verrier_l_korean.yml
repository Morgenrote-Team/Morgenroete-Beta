 verrier.171.t: "철도시"
 verrier.171.d: "신기술의 도래는 사람들의 시간 감각을 바꾸었을 뿐만 아니라 그 한계도 부각시켰다. 철도와 전신의 발명으로 사람들은 시간이 장소마다 다르다는 사실을 더욱 분명히 인식하게 되었다."
 verrier.171.f: "19세기 초에는 전세계적으로 통일된 표준시가 존재하지 않았다. 도시와 마을마다 자체적인 태양시를 따랐으며, 해당 지점에서 태양이 가장 높이 뜬 시점을 기준으로 결정하였다. 이동과 통신 속도가 비교적 느렸던 시절에는 이런 관행이 수백 년 동안 별다른 문제가 되지 않았다. 그러나 멀리 떨어진 지역 간의 연결이 급격히 늘어나면서 시차가 점점 더 두드러지게 나타나기 시작하였다. 이를테면 런던과 브리스톨의 시차는 11분, 뉴욕과 시카고의 시차는 거의 1시간에 가까웠던 것이다. 이처럼 현지 시간이 난립하게 된 것은 정확한 출발과 도착 시간을 산정해야 하는 열차 시간표에 심각한 문제를 야기했다.\n\n이에 대응하여 1840년대부터 영국의 철도 회사들은 철도시(Railway Time)이라 부르는 체계를 도입하였다. 처음에 이 철도시는 내부적인 용도로만 사용되었으며, 역내 시간은 계속해서 현지 시간을 보여주었다. 그러나 표준화를 통해 실질적으로 얻는 이득이 우세해졌다. 이르면 1847년에는 거의 모든 대표 철도 회사들이 GMT를 시간표의 기준시로 채택하였으며, 1855년에는 영국 대다수 도시에서 채택하기에 이르렀다. 이로써 철도시는 법적 근거는 없지만 사실상의 국가 표준시로 등극하게 되었다."
 verrier.171.g: "철도 회사와 전신소가 시간을 만들었다니?"
 verrier.172.t: "표준시"
 verrier.172.d: "[GetPlayer.GetName]에서 표준시에 관한 법이 제정됨에 따라, 종전에 철도 회사와 전신국에서만 사용되던 기존의 시간체계는 이제 일상생활의 일부가 되었다. 이러한 합리화 절차로 행정과 경제 면에서 효율성을 높였지만, 일부 산간마을에서는 자체적인 기준 시간이 폐지된 것을 아쉬워하고 있다."
 verrier.172.f: "철도 시간은 후대의 국가 표준시의 실용적인 전신에 불과했습니다. 이는 정부의 주도적인 노력보다는 사업상의 필요에 의해 생겨났습니다. 이후 많은 국가들이 국가 표준시를 법제화하여 철도 시간표뿐 아니라 사회 모든 영역에 적용하기 시작했습니다. 1880년 영국이 표준시를 처음 도입한 이래, 1893년 독일이 중앙유럽시(CET)를 도입하며 그 뒤를 따랐고, 1911년 프랑스가 그리니치 표준시(GMT)에 1시간을 더한 시간을 채택하기에 이르렀습니다.\n\n철도 시간과 표준시의 결정적인 차이점은 적용 범위와 구속력에 있습니다. 철도 시간은 초기에는 철도 운영 효율화를 목표로 함으로서, 산업 현장에 특화된 해결책이었던 반면, 국가 표준시는 정부가 강제적으로 도입한 포괄적인 시간 표준화에 해당되었습니다. 양측 모두 1884년 국제자오선회의의 본초자오선 도입과 간접적인 연관이 있습니다."
 verrier.172.g: "막스 베버라면 분명 이러한 상황에 대해 할 말이 있을 것이다."
 verrier.173.t: "국제자오선회의"
 verrier.173.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]에서 각국 대표가 참석한 가운데 열린 회의에서 [GetGlobalVariable('verrier_prime_meridian_global_var').GetCountry.GetName](을)를 관통하는 경도를 본초자오선으로 지정한다는 결정이 내려졌다. 벌써부터 '[GetPlayer.GetCustom('verrier_prime_meridian_city')] 표준시'를 논하는 사람들이 많아지고 있다."
 verrier.173.f: "국제 자오선 회의는 국제적으로 사용할 본초자오선을 설정하기 위한 회의였다. 회의의 주제는 '전세계 공통으로 기준이 될 경도와 시간 계산의 기준선으로 사용할 자오선의 설정'이었다. 실제 역사에서는 그리니치 표준시를 경도 0도로 설정하여 국제 표준시로 권고하는 결론에 이르렀다. 그러나 본초자오선의 도입은 단순히 지도제작에 그치는 것이 아니라, 특정 지점을 기준으로 하는 국제 시간대를 설정하는 협약의 출발점이었다.\n\n그리니치가 예로부터 널리 쓰인 것은 영국이 열강으로서 지위를 갖췄고, 무역력도 지배적이었던 것이 주된 이유다. 국력과 물리학 기술, 상선 부문 시장 선도권, 대서양 횡단 해저 케이블 부설 성공, 전신과 철도 분야의 기업 지원, 그리고 뛰어난 천문학자 보유 등 여러 요인이 본초자오선을 지나는 지점을 결정하는 데 중요한 역할을 하였다."
 verrier.173.g: "만국이 시간을 하나로 통일할 수 있다고?"
 verrier.174.t: "시간대"
 verrier.174.d: "본초자오선의 기준점으로 [GetPlayer.GetCustom('verrier_prime_meridian_city')](을)를 선정하고, [GetPlayer.GetCustom('verrier_prime_meridian_city')] 표준시를 기준시로 삼게 되면서, 국제 자오선 회의의 초점은 시간대 설정으로 옮겨갔다."
 verrier.174.f: "시간대의 경계는 모든 나라에 들어맞은 것은 아니었다. 미국은 한 나라를 4가지의 시간대로 나누는 개념을 쉽게 받아들였지만, 모든 국가가 그런 것은 아니었다. 일부 국가는 수도를 기준으로 단일 시간대를 전국에 적용했는데, 이는 변방 지역에서 시간이 어긋날 수 있다는 문제를 야기했다. 어떤 경우에는 특정 국가의 시간 수요를 충족하기 위해 정시가 아닌 30분 단위로 표준시를 조정하기도 했다. 심지어 일부 국가는 실제 시간대와 다른 시간대를 채택하기도 했다. "
 verrier.174.g: "우리는 국제 표준시 기반을 우선한다."
 verrier.174.h: "[GetPlayer.GetName]에는 본연의 입장에서 유리한 시간대가 필요하다. 설령 그것이 국제 표준에 완전히 부합하지 않더라도 말이다."
 verrier_radioactivity_tech: "방사능"
 verrier_radioactivity_tech_desc: "자연방사능은 1895년 앙투안 앙리 베크렐이 사진 건판의 흑화 현상을 기반 삼아 처음으로 발견하였으나, 물리 현상으로 정식 분류된 것은 1915년경에 이르러서였습니다. 처음에는 피에르 퀴리와 마리 퀴리를 중심으로 중대한 발견이 이루어졌는데, 다양한 방사성 원소의 존재를 밝혀낸 것은 물론 조사 과정에서 실제로 만들어진 것도 있었습니다. 베크렐과 퀴리 부부는 방사능 실험으로 1903년 노벨 물리학상을 수상하였으며, 이는 핵 연구의 역사적인 출발점으로 평가되고 있습니다."
 verrier_spectroscopy_tech: "분광학"
 verrier_spectroscopy_tech_desc: "분광학은 파장과 에너지, 질량 등과 같은 특정 속성에 따라 복사선을 분석하는 물리적 수단들을 총칭하는 용어입니다. 그 결과로 얻은 강도의 분포를 스펙트럼이라고 칭합니다. 로베르트 분젠과 구스타프 키르히호프는 분광기를 발명하고 방출 스펙트럼을 관찰하여 새로운 원소들을 발견하게 되었습니다."
