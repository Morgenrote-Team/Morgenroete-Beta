 verrier.55.t: "어둠 속의 뒷면"
 verrier.55.d: "우리 천문학자가 운과 실력을 바탕으로 달의 칭동을 사진으로 처음 포착하는 데 성공하였다!"
 verrier.55.f: "너무 미묘해서 눈치채지 못할 수도 있지만 달은 지구를 향해 완벽하게 고정되어 있는 것은 아니다. 불규칙한 궤도의 움직임만으로도 평소에는 알 길이 없는 달 뒷면의 아주 조금이나마 관찰할 수 있는데, 이러한 미세한 단서들은 달이 감추고 있는 최고의 비밀을 엿볼 수 있는 소중한 기회를 선사한다. 이처럼 평소에는 결코 볼 수 없을지도 모를 광경을 사진으로 담는 것은 본연의 실력만큼이나 운이 따라야 한다. 카메라를 들고 몇 시간 동안 홀로 안자 완벽한 사진을 찍도록 타이밍이 딱 맞기를 간절히 바라야 하기 때문이다.\n\n그러나 그것이 성공한다면, 역사상 누구도 제대로 볼 수 없었던 지구의 오랜 동반자, 달의 뒷면을 볼 수 있을 것이다."
 verrier.55.g: "언젠가는 달의 뒷면 전체를 볼 수 있겠지."
