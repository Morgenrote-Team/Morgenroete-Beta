 verrier_astronomer: "천문학자"
 verrier_astronomer_desc: "이 과학자는 별빛의 밤하늘에서 벌어지는 현상을 다루고 망원경으로 천체를 끊임없이 관측합니다."
 verrier_astronomer_experienced: "경험 많은 천문학자"
 verrier_astronomer_experienced_desc: "이 인물은 몇 가지 뛰어난 천문학적 발견으로 대중으로부터 높은 평가를 받고 있습니다."
 verrier_astronomer_famous: "저명한 천문학자"
 verrier_astronomer_famous_desc: "이 천문학자는 수많은 발견과 우주에 대한 이해 향상에 기여한 공로로, 당대 가장 존경받는 지식인 중 한 명으로 여겨집니다."
 verrier_mathematician: "수학자"
 verrier_mathematician_desc: "이 인물은 몇 가지 뛰어난 수학적 발견으로 대중으로부터 높은 평가를 받고 있습니다."
 verrier_physics_tech: "고전물리학"
 verrier_physics_tech_desc: "물리학은 근세 유럽인들이 실험적이고 정량적인 방법을 사용하여 오늘날 물리 법칙이라 부르는 것을 발견하면서 별개의 과학으로 거듭났습니다. 이 시기의 발전을 이룩한 학자로는 지구를 중심으로 태양계가 도는 천동설을 태양 중심의 지동설로 대체한 코페르니쿠스, 1609년~1619년 행성체의 운동을 지배하는 법칙을 발견한 케플러, 16세기~17세기 망원경을 이용한 관측 기반 천문학을 선구적으로 연구했던 갈릴레오, 운동 법칙과 만유인력을 발견하고 통일하면서 본인의 이름을 붙이게 된 아이작 뉴턴 등이 있습니다."
 verrier_astronomy_tech: "근대 천문학"
 verrier_astronomy_tech_desc: "18세기~19세기에 걸쳐 레오나르트 오일러, 알렉시 클로드 클레로, 장 르 롱 달랑베르가 수행한 '삼체문제' 연구는 달과 행성의 운동을 더욱 정확하게 예측하는 토대로 자리매김했습니다. 이후 조제프 루이 라그랑주와 피에르 시몽 라플라스가 이 연구를 한층 정교화하면서, 행성과 위성 간에 발생하는 '섭동' 현상을 통해 그 질량까지 추정할 수 있게 되었습니다."
 verrier_electromagnetism_tech: "전자기학"
 verrier_electromagnetism_tech_desc: "1864년 영국 에든버러 출신의 제임스 클러크 맥스웰은 빛의 전자기 이론을 발표했습니다. 이는 전기에 관한 인류의 지식에서 가장 위대한 진일보였을지도 모릅니다. 맥스웰의 이론은 자유 공간 상에 전자기파가 존재한다는 점을 명확히 시사했으며, 그의 후학들은 맥스의 이론을 증명하고자 실험에 매진했습니다. 결국 공간 속에서 전자기파가 발견되면서, 19세기 말 '라디오'의 눈부신 발전으로 이어지게 되었습니다."
 verrier_chemistry_tech_desc: "화학적 결합에 대한 전기화학이론의 발달은 19세기 초 옌스 야콥 베르셀리우스와 험프리 데이비라는 두 과학자를 중심으로 연구가 이루어졌습니다. 앞서 알레산드로 볼타가 볼타 전지를 발명하면서 가능해진 일이었습니다. 영국의 윌리엄 프라우트는 모든 원자의 무게가 수소 원자 무게의 배수와 정확히 일치한다는 점에 착안하여 모든 원소를 원자 무게 순으로 배열할 것을 처음으로 제안하였습니다. J.A.R. 뉴랜즈는 초창기 원소표를 정리하였고 이는 곧 오늘날 주기율표로 발전하게 되었습니다."
 je_verrier_neptune: "미지의 행성"
 je_verrier_neptune_reason: "1821년 알렉시스 부바르는 천왕성 궤도의 천체력을 발표하였다. 이 천체력은 뉴턴의 운동과 중력 법칙을 바탕으로 향후 천왕성의 위치를 예측하고 있었다. 하지만 이어진 관측 결과가 천체력과 상당히 차이난다는 사실이 확인되면서 이에 부바르는 천체의 섭동성을 가설로 내세웠다. 이러한 불규칙성은 천체의 황도 경도와 궤도 반경(태양으로부터의 거리) 모두에서 드러났는데 이를 설명하려는 여러 가설이 제기되었다. 태양으로부터 매우 먼 거리에서의 중력 효과는 뉴턴의 해설과 다를 수 있다는 설, 단순히 관측 오차일 수 있다는 설, 그리고 어쩌면 아직 발견되지 않은 행성이 천왕성을 끌어당기거나 섭동시키고 있다는 설이었다. 존 코치 애덤스는 대학생 시절 이러한 불규칙성을 접하고 섭동설에 확신을 갖게 되었다. 애덤스는 천왕성에 관한 관측 자료와 뉴턴의 중력 법칙을 활용하면 섭동 천체의 질량과 위치, 궤도를 추정할 수 있다고 보았다.\n한편 1845년 11월 10일 위르뱅 르 베리에는 파리 과학 아카데미에 천왕성에 관한 연구 논문을 제출하고 기존 이론으로는 천왕성의 움직임을 설명할 수 없음을 밝혔다. 애덤스의 연구는 알지 못했던 베리에는 비슷한 조사에 나섰고, 1846년 6월 1일 학회 공개 회의에서 두번째 연구 논문을 제출하여 제안된 섭동 천체의 위치는 제시하였으나 질량이나 궤도는 밝히지 않았다. 베리에가 밝혀낸 미지의 행성의 위치는 실제 발견 위치에서 1도 이내의 오차로 존재했다. 애덤스가 비공개로 진행하던 계산을 베리에가 공개적으로 확인해주었으나 그로 인해 영국에서 미지의 행성을 찾기 위한 탐색에 나섰다는 사실을 베리에는 알지 못했다. 8월 31일, 베리에는 세번째 논문을 제출하였는데 여기에는 새로운 천체의 질량과 궤도가 분명히 제시되었다. 이제 남은 것은 그 천체를 찾아내어 존재한다는 사실을 입증하는 것뿐이었다."
 je_verrier_neptune_fail: "두 번째로 많은 천체를 발견한 국가는 위로상을 받습니다. 나머지 모든 국가의 노력은 헛수고가 됩니다."
 je_verrier_pluto: "행성 X"
 je_verrier_pluto_reason: "1840년대 위르뱅 르 베리에는 뉴턴역학을 이용해 천왕성의 궤도 섭동을 분석한 뒤 당시 발견되지 않은 해왕성의 위치를 예측하였다. 이어서 19세기 말 천문학계에서는 해왕성의 관측을 통해 천왕성의 궤도가 해왕성 외에 다른 행성에 의해 교란되고 있을 가능성을 제기하였다. 1906년 미국 보스턴의 부유한 시민이자 지난 1894년 애리조나주 플래그스태프에 로웰 천문대를 건설한 바 있는 퍼시벌 로웰이 '행성 X'라고 직접 명명한 미지의 행성을 찾아 나서는 대대적인 프로젝트에 나섰다. 1909년 퍼시벌 로웰과 윌리엄 H. 피커링은 미지의 행성이 위치할 가능성이 있는 좌표 몇 곳을 제시하였다. 로웰과 천문대는 계속된 탐색에도 별다른 성과를 거두지 못했고 1916년 로웰이 사망하면서 탐색도 끝을 맞이했다. 로웰은 미처 알지 못했지만 조사 과정에서 1915년 3월 19일과 4월 7일자 사진에 행성 X가 희미하게 포착되기도 했다. 그러나 당시에는 그 행성의 정체가 밝혀지지 않았다. 퍼시벌 로웰의 아내였던 콘스턴트 로웰은 남편의 유산을 두고 로웰 천문대를 상대로 10년간의 법정 공방을 벌였으며, 행성 X 탐색은 1929년이 되어서야 재개되었다. 천문대 대표 베스토 멜빈 슬리퍼는 행성 X를 찾는 임무를 클라이드 톰보에게 맡겼다. 당시 23세였던 톰보는 슬리퍼가 자신의 천문학 그림에 감명받아 천문대에 부임한 지 얼마 안 되었을 시점이었다. 톰보의 임무는 밤하늘을 체계적으로 두 장씩 촬영한 다음, 두 짝의 사진을 각각 분석하여 천체의 위치 변화를 확인하는 것이었다. 톰보는 반짝 비교정(blink comparator)을 이용하여 각 사진의 상을 빠르게 앞뒤로 전환함으로써, 사진 사이에 위치나 모양이 변한 천체가 있다면 움직이도록 보이게 하였다. 근 1년 동안 이어진 탐색 끝에 1930년 2월 18일 톰보는 사진 건판에서 움직이는 천체로 추정되는 것을 발견하였다."
 je_verrier_pluto_fail: "다른 국가가 우리보다 먼저 조건을 충족하여 행성 X를 발견하면 우리의 모든 노력은 물거품이 됩니다."
 je_verrier_charter_moon: "월면도 제작"
 je_verrier_charter_moon_reason: "월면학은 달의 표면과 지형지물을 연구하는 학문으로 월리학이라고도 부른다. 지구의 지리학과 지형학처럼 월면학은 행성과학 분야의 하위 학문으로 속해 있다. 예로부터 월면학자들의 주된 관심사는 바다와 분화구, 산맥 등의 다양한 달 지형을 지도로 만들고 지명을 붙이는 일이었다. 월면도(달 지도) 제작은 1779년 요한 슈뢰터가 월면 지형에 대한 면밀한 관찰과 측정에 나서면서 체계적으로 이루어지게 되었다. 1834년 요한 하인리히 폰 메들러는 4장 분량으로 구성된 대형 월면도를 처음으로 출판했고 이후 〈보편월면학〉을 출간하였다. 이때까지의 모든 달 관측은 눈으로 직접 보는 방식이었지만, 1840년 3월 J.W. 드레이퍼가 5인치 반사 망원경을 이용하여 다게레오타입 사진을 촬영하고 , 천문학에 사진술을 도입하게 되었다. 처음에는 사진의 상이 매우 흐릿했으나 200년전 망원경처럼 그 품질은 빠르게 향상되었다. 1890년경에는 월면사진술이 천문학의 하위 분야로 인정받게 되었다."
 je_verrier_charter_moon_success: "@verrier_moon_photo! #T 월면 사진#! #G 10장#!을 모으면 월면도를 제작할 수 있게 됩니다."
 je_verrier_charter_moon_goal: ""
 je_verrier_astro_physics_success: "최소 #G 1000개#!의 @verrier_astronomicalobject! 천체를 발견해야 합니다."
 je_verrier_astro_physics_goal: ""
 verrier_hide_astronomical_decisions: "천문학 결단 숨김"
 verrier_hide_astronomical_decisions_desc: "모든 천문학 결단을 숨김 처리하여 개요를 정리합니다."
 verrier_show_astronomical_decisions: "천문학 결단 표시"
 verrier_show_astronomical_decisions_desc: "모든 천문학 결단을 표시합니다."
 verrier_found_observatory_decision: "천문대 설립"
 verrier_found_observatory_decision_desc: "19세기의 천문학이 비약적인 발전을 이루어낸 것은 무엇보다도 국가의 후원이 있었기 때문입니다. 새로운 항성과 행성, 소행성의 명명은 국가와 통치자에 위신을 가져다 주었기에 천체의 탐색이 활발했던 것입니다. 망원경의 현대화나 사진술 도입처럼 새로운 연구 방법이 등장함에 따라 천체의 발견 수도 엄청나게 증가하였습니다. 천문대를 건설하면 매년 새로운 천체가 자연스럽게 발견될 것이며, 완공된 천문대에서 정확한 수를 확인할 수 있게 됩니다. 새로운 기술과 [concept_verrier_astronomer]의 관여 역시 그 규모를 늘려줄 것입니다."
 verrier_charter_moon_decision: "월면도 제작"
 verrier_charter_moon_decision_desc: "지구의 동반자 달의 표면을 지도화한 월면도와 그것을 제작하려는 시도는 수 세기에 걸쳐 반복되어 왔습니다. 이른바 '월면지'라 부르는 이 학문에 망원경의 발명은 혁신을 일으켰지만, 사진술의 발명으로 월면을 정확히 지도화할 수 있는 전혀 새로운 방법을 찾게 되었습니다."
 verrier_visit_observatory_decision: "천문대 방문"
 verrier_visit_observatory_decision_desc: "우리나라의 대표 천문대를 방문하여 천문학에 관한 국내외의 핵심 정보를 두루 알아봅니다."
 verrier_asteroid_congress_decision: "소행성 천문 회의"
 verrier_asteroid_congress_decision_desc: "1801년 세레스가 발견된 이래 천문학자들이 점점 더 많은 천체를 발견하면서 태양계 행성의 수도 계속 증가하는 결과로 이어졌다. 특히 해왕성의 발견은 화성과 목성 사이의 수많은 소천체들을 새로운 범주로 묶는 것이 적절한가에 관한 의문을 제기하게 되었다. 새로운 천문 기호의 발명과 비교적 작은 크기라는 사실에 착안해 이들을 '소항성'이나 '소행성'으로 칭하는 것이 적절하다는 학자들도 있었다. 물론 이렇게 분류가 이루어진다면 지금까지 행성으로 여겨져 왔던 일부 천체들이 행성 지위를 잃고 단순한 암석 덩어리로 격하된다는 의미를 안긴다."
 verrier_asteroid_congress_decision_tt: "새로운 천체가 발견될수록 행성에 대한 기존의 정의를 개편할 필요성이 더욱 절실해지고 있다. 발견된 천체의 수가 #BLUE 1,500개#!를 넘어가면 상황이 더욱 복잡해져 학술회의를 개최하는 것이 불가피할 듯 싶다."
 verrier_carte_congress_decision: "카르트 뒤 시엘"
 verrier_carte_congress_decision_desc: "1887년 파리 천문대장 아메데 무셰는 건판을 이용한 새로운 사진 촬영술이 성도 제작 방식을 뒤바꿀 잠재력을 가졌음을 깨닫고, 천문사에 유례 없던 대규모 국제 성도 제작 사업을 개시하였습니다. 1887년 4월 파리에서 개최된 천문사진 학술회의에 50여명의 천문학자들이 참여하여 본 사업에 참여하기로 뜻을 모았습니다. 우리도 국제 사회의 천문학 지식을 공유하는 목적에서 이러한 학술회의를 개최할 수 있습니다."
 verrier_great_debate_decision: "대논쟁"
 verrier_great_debate_decision_desc: "일명 '대논쟁'이라고도 하는 섀플리-커티스 논쟁은 20세기 초에 은하의 본질과 우주의 크기에 관한 새로운 이해로 이어지는 담론들을 집대성한 사건입니다. 천문학계의 대논쟁은 우리 은하의 크기와 당시 '나선형 성운'으로 알려졌던 은하들이 우리 은하 내에 위치한 소천체인지, 아니면 우리 은하에서 훨씬 멀리 떨어진 별개의 천치인지에 관한 논쟁을 중심으로 펼쳐졌습니다. 이날 두 과학자는 우주의 크기에 관한 별개의 기술 논문을 발표하고, 저녁에는 공개 토론이 뒤따랐습니다. 우리는 우주의 궁극적인 불가사의를 논하려는 목적에서 본 학술회의를 개최할 수 있습니다."
 notification_verrier_astronomical_observation_notification_name: "연간 천문학 현황 보고"
 notification_verrier_astronomical_observation_notification_desc: "올 한해 우리 [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]가 새로 발견하고 기록한 [Concept('concept_verrier_astronomical_object','$concept_verrier_celestial_bodies$')]의 수는 [GetPlayer.MakeScope.Var('verrier_astronomical_objects_notification_var').GetValue|0+=]개입니다."
 verrier.10.t: "해왕성 발견"
 verrier.10.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](이)가 해왕성을 발견하는 영예를 조국에 안겼다!"
 verrier.10.f: "해왕성은 자정 직후 한 시간 남짓한 탐색 끝에 발견되었다. 르 베리에가 예상한 위치에서 1도 미만의 오차를 기록하는 굉장한 일치율을 보인 것이다. 그 후 이틀 밤에 걸친 관측으로 해왕성의 위치와 움직임을 검증한 [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](은)는 놀라움을 금치 못하며 베리에에게 이렇게 답했다. \"당신이 계산한 위치에 그 행성이 정말로 있었소!\""
 verrier.10.g: "다른 나라들은 부러움에 몸서리칠 것이다!"
 verrier.5.t: "천문대 개관"
 verrier.5.d: "우리나라 천문 연구의 심장부인 천문대가 오늘 엄숙한 기념식과 함께 개관하였다."
 verrier.5.f: ""
 verrier.5.g: "새로운 천문대를 방문합시다."
 verrier.6.t: "천문대 폐쇄"
 verrier.6.d: "조국의 천문학자들이 천문대 폐쇄라는 결단을 내렸다."
 verrier.6.f: "최근의 정치적 상황으로 우리나라에 여러 곳의 천문대가 생겨났다. 경쟁을 무마하고 수도에 자리한 본 천문대의 정부 예산을 확보한다는 목적에서 연구진들은 분관에서의 활동을 멈추고 천문대를 폐쇄하기로 결정한 것이다. 모든 연구 결과는 기존 연구 인력과 함께 수도로 이전될 전망이다."
 verrier.6.g: "유감스럽지만 어쩔 수 없다."
 verrier.6.h: "음... 수도에도 아직 천문대를 두고 있진 않은데. 그대로 이전하면 되겠군!"
 verrier.11.d: "오늘 [SCOPE.sCountry('verrier_neptune_discoverer_country').GetName] 학계에서 자국의 동료 학자가 지금까지 미지의 상태로 남아 있었던 해왕성을 발견하는 데 성공했다고 우리 측에 밝혀왔다."
 verrier.11.g: "경축드리오..."
 verrier.20.t: "명왕성 발견"
 verrier.20.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](이)가 명왕성을 발견하는 영예를 조국에 안겼다!"
 verrier.20.f: "명왕성이 발견되었을 당시, 그 형상이 희미하고 관측 가능한 원반이 없다는 점에서 명왕성이 행성 X라는 가설에 의문이 제기되었습니다. 실제로도 일부 과학자들에게 명왕성은 적잖은 실망감을 안겼습니다. 20세기에 걸쳐 명왕성의 추정 질량은 계속해서 하향 조정되었습니다. 처음에 천문학자들은 해왕성과 천왕성에 끼친 영향을 추정하여 질량을 계산하였습니다. 1931년에는 명왕성의 질량이 지구와 거의 같다는 분석이 나왔고, 1948년에 추가 계산을 통해 화성과 비슷한 수준으로 낮아졌습니다. 그럼에도 불구하고 명왕성의 발견은 전세계 언론의 1면을 장식한 사건이었습니다."
 verrier.20.g: "크기는 작을지 몰라도 분명 행성이다."
 verrier.21.d: "오늘 [SCOPE.sCountry('verrier_pluto_discoverer_country').GetName] 학계에서 자국의 동료 학자가 지금까지 미지의 상태로 남아 있었던 명왕성을 발견하는 데 성공했다고 우리 측에 밝혀왔다."
 verrier.21.g: "이거 정말 행성이 맞소?"
 verrier.30.t: "소행성 천문 회의"
 verrier.30.d: "지금까지 행성으로 여겨졌던 일부 천체의 운명이 국제 학술회의를 통해 결정될 전망이다."
 verrier.30.f: "19세기 전반 이래 발견된 소천체들이 기존에 알려진 행성의 모습과 크게 일치하지 않는다는 시각이 빠르게 제기되고 있다. 이런 인식은 무엇보다도 해왕성의 발견을 계기로 더욱 힘을 얻었는데, 해왕성은 오랫동안 알려진 행성들과 훨씬 더 유사한 형태를 지니고 있었기 때문이다. 반세기 동안 행성으로 불려왔던 팔라스, 베스타, 주노 등의 천체에 대해서도 다소 주저했을지언정 결국 '소행성'이라는 새로운 범주로 분류되기에 이르렀다. 그러나 1801년 주세페 피아치가 발견한 소형 행성 세레스의 경우에는 아직 합의를 이룬 것이 없다. 일부 정통파를 중심으로 행성 지위를 유지해야 한다는 주장도 제기되는데, 세레스는 다른 행성에 비해 크기가 현저히 작긴 하지만, 그렇다고 소행성으로 분류하기에는 너무 크다는 지적이다. 이에 일부 회의 참석자들은 표결을 요구하고 있다."
 verrier.30.f_astraea: "19세기 전반 이래 발견된 소천체들이 기존에 알려진 행성의 모습과 크게 일치하지 않는다는 시각이 빠르게 제기되고 있다. 이런 인식은 무엇보다도 해왕성의 발견을 계기로 더욱 힘을 얻었는데, 해왕성은 오랫동안 알려진 행성들과 훨씬 더 유사한 형태를 지니고 있었기 때문이다. 반세기 동안 행성으로 불려왔던 팔라스, 베스타, 주노, 아스트라이아 등의 천체에 대해서도 다소 주저했을지언정 결국 '소행성'이라는 새로운 범주로 분류되기에 이르렀다. 그러나 1801년 주세페 피아치가 발견한 소형 행성 세레스의 경우에는 아직 합의를 이룬 것이 없다. 일부 정통파를 중심으로 행성 지위를 유지해야 한다는 주장도 제기되는데, 세레스는 다른 행성에 비해 크기가 현저히 작긴 하지만, 그렇다고 소행성으로 분류하기에는 너무 크다는 지적이다. 이에 일부 회의 참석자들은 표결을 요구하고 있다."
 verrier.30.g: "세레스는 마음에 드는군. 이 행성의 운명은 표결에 부쳐봅시다."
 verrier.30.h: "회의를 별도로 개최할 필요는 없다."
 verrier.31.t: "세레스의 지위"
 verrier.31.d: "우리나라는 [SCOPE.sCountry('verrier_congress_host_country').GetName]에서 주최한 천문 학술회의에 초청되었다. 이 자리에서 제일 중요하게 다뤄질 주제는 (전?) 행성 세레스의 운명은 어떻게 될 것인가이다."
 verrier.31.f: "19세기 전반 이래 발견된 소천체들이 기존에 알려진 행성의 모습과 크게 일치하지 않는다는 시각이 빠르게 제기되고 있다. 이런 인식은 무엇보다도 해왕성의 발견을 계기로 더욱 힘을 얻었는데, 해왕성은 오랫동안 알려진 행성들과 훨씬 더 유사한 형태를 지니고 있었기 때문이다. 반세기 동안 행성으로 불려왔던 팔라스, 베스타, 주노 등의 천체에 대해서도 다소 주저했을지언정 결국 '소행성'이라는 새로운 범주로 분류되기에 이르렀다. 그러나 1801년 주세페 피아치가 발견한 소형 행성 세레스의 경우에는 아직 합의를 이룬 것이 없다. 일부 정통파를 중심으로 행성 지위를 유지해야 한다는 주장도 제기되는데, 세레스는 다른 행성에 비해 크기가 현저히 작긴 하지만, 그렇다고 소행성으로 분류하기에는 너무 크다는 지적이다. 이에 대해 세레스가 행성으로 계속 인정된다면 훨씬 큰 천체들도 행성으로 여겨질 수 있어 천문학을 더욱 어렵게 만들 것이라는 반대 주장도 제기되었다."
 verrier.31.f_astraea: "19세기 전반 이래 발견된 소천체들이 기존에 알려진 행성의 모습과 크게 일치하지 않는다는 시각이 빠르게 제기되고 있다. 이런 인식은 무엇보다도 해왕성의 발견을 계기로 더욱 힘을 얻었는데, 해왕성은 오랫동안 알려진 행성들과 훨씬 더 유사한 형태를 지니고 있었기 때문이다. 반세기 동안 행성으로 불려왔던 팔라스, 베스타, 주노, 아스트라이아 등의 천체에 대해서도 다소 주저했을지언정 결국 '소행성'이라는 새로운 범주로 분류되기에 이르렀다. 그러나 1801년 주세페 피아치가 발견한 소형 행성 세레스의 경우에는 아직 합의를 이룬 것이 없다. 일부 정통파를 중심으로 행성 지위를 유지해야 한다는 주장도 제기되는데, 세레스는 다른 행성에 비해 크기가 현저히 작긴 하지만, 그렇다고 소행성으로 분류하기에는 너무 크다는 지적이다. 이에 대해 세레스가 행성으로 계속 인정된다면 훨씬 큰 천체들도 행성으로 여겨질 수 있어 천문학을 더욱 어렵게 만들 것이라는 반대 주장도 제기되었다."
 verrier.31.g: "세레스는 행성이다."
 verrier.31.h: "세레스는 행성이 아니다"
 verrier.32.t_demoted: "세레스의 강등"
 verrier.32.t_saved: "세레스의 수호"
 verrier.32.d_demoted: "천문 학술회의에서 세레스의 행성 지위를 박탈하였다."
 verrier.32.d_saved: "천문 학술회의에서 세레스의 행성 지위를 재확인하였다."
 verrier.32.f_demoted: "결과는 예상대로였다. 나머지 소천체들이 소행성이라면 논리적으로 세레스도 소행성이어야 한다는 것이다. 천문학자들은 세레스가 일명 소행성대에서 가장 큰 천체일 가능성이 높단 점에 동의하였으며, 한때 행성이었던 점을 감안하여 소행성의 제1번이라는 명예를 선사하더라도 그 이상은 없다는 방침을 내렸다. 행성 지위가 학문적 함의에서 그칠 것이 아니라 문화적 함의도 지닌다는 목소리도 있었으나 그러한 논지는 과학보다는 비이성적 향수에 가깝다고 볼 수 있었다.\n\n최종 투표 결과는 찬성 #G [GetGlobalVariable('verrier_ceres_yes').GetValue]표#!, 반대는 #R [GetGlobalVariable('verrier_ceres_no').GetValue]표#!로 집계되었다."
 verrier.32.f_saved: "결과는 많은 이들을 놀라움에 빠렸다. 천문작자들 과반수 이상이 세레스의 행성 지위 유지에 찬성한 것이다! 그 형상이나 질량을 감안하면 세레스는 소행성대의 다른 천체와는 확연히 구분된다는 것이 전통파의 주장이었다. 그 자체로 명백한 행성이라는 것이다. 과학자들은 여기에 세레스는 오랜 세월 동안 과학 뿐만 아니라 사회적, 문화적으로도 태양계의 일부로 인식되어 왔다는 점을 덧붙였다. 수많은 사람들이 정을 붙였던 행성을 소행성으로 격하시키고 그 정체성을 빼앗는 것은 오만과 경계를 나란히 한다는 것이었다.\n\n최종 투표 결과는 찬성 #G [GetGlobalVariable('verrier_ceres_yes').GetValue]표#!, 반대는 #R [GetGlobalVariable('verrier_ceres_no').GetValue]표#!로 집계되었다."
 verrier.32.g: "세레스는 지금껏 왜소행성에 불과했지."
 verrier.32.h: "세레스를 구했다!"
 verrier.33.t: "4개의 행성을 소행성으로 격하"
 verrier.33.t_astraea: "5개의 행성을 소행성으로 격하"
 verrier.33.d: "천문 학술회의에서 최종 선언문을 발표하고, 그간 행성으로 다뤄져 왔던 4개의 천체가 소행성이 되었음을 천명하였다."
 verrier.33.f: "학술회의에서는 미래 천문학 발전을 위하여 천체와 소행성이라는 새로운 범주를 도입하였다. 이에 우주 상의 모든 암석을 행성으로 볼 수 없게 되었다. 1801년 이래 발견된 일부 새로운 천체들은 물론 행성으로 여겼던 세레스, 팔라스, 베스타, 주노도 소행성으로 분류하게 되었다."
 verrier.33.f_astraea: "회의에서는 미래 천문학 발전을 위하여 천체와 소행성이라는 새로운 범주를 도입하였다. 이에 우주 상의 모든 암석을 행성으로 볼 수 없게 되었다. 1801년 이래 발견된 일부 새로운 천체들은 물론 행성으로 여겼던 세레스, 팔라스, 베스타, 주노, 아스트라이아도 소행성으로 분류하게 되었다."
 verrier.33.g: "태양계에는 총 여덟 행성이 있다."
 verrier.34.t: "3개의 행성을 소행성으로 격하"
 verrier.34.t_astraea: "4개의 행성을 소행성으로 격하"
 verrier.34.d: "천문 학술회의에서 최종 선언문을 발표하고, 그간 행성으로 다뤄져 왔던 3개의 천체가 소행성이 되었음을 천명하였다."
 verrier.34.f: "회의에서는 미래 천문학 발전을 위하여 천체와 소행성이라는 새로운 범주를 도입하였다. 이에 우주 상의 모든 암석을 행성으로 볼 수 없게 되었다. 1801년 이래 발견된 일부 새로운 천체들은 물론 행성으로 여겼던 팔라스, 베스타, 주노도 소행성으로 분류하게 되었다. 세레스는 행성으로 남았다."
 verrier.34.f_astraea: "회의에서는 미래 천문학 발전을 위하여 천체와 소행성이라는 새로운 범주를 도입하였다. 이에 우주 상의 모든 암석을 행성으로 볼 수 없게 되었다. 1801년 이래 발견된 일부 새로운 천체들은 물론 행성으로 여겼던 팔라스, 베스타, 주노, 아스트라이아도 소행성으로 분류하게 되었다. 세레스는 행성으로 남았다."
 verrier.34.g: "태양계에는 총 아홉 행성이 있다."
 verrier.35.t: "행성 지위 논란"
 verrier.35.d: "최근 한 천문 학술회의에서 우리나라의 위신에 영향을 줄 성명을 발표하였다."
 verrier.35.f: "여러 반대의 목소리도 상황을 바꾸진 못했다. 우리가 발견한 행성에서 행성 지위를 박탈하는 것은 세계에서 우리의 위신에 부정적 영향을 끼친다. 지금은 거의 모든 국가가 소행성을 찾아낼 수 있기에 그것만으로는 세계적인 인정을 받지 못한다. 그 천체는 과거 우리 학자가 발견한 것이라 자랑하던 시절이 있었으나, 작금의 결정으로 그러한 자만심은 허물어지고 말았다."
 verrier.35.g: "이번 투표는 조작된 것이 틀림없소!"
 verrier.40.t: "혜성 목격!"
 verrier.40.d: "천문대의 과학자들이 새로운 혜성을 발견했다."
 verrier.40.f: "하늘에서 혜성이 목격되었다. 어떤 이들은 앞날에 암운이 드리워졌다는 징조라고 믿는가 하면, 또 어떤 이들은 저것이 사실은 하늘에 떠 있는 요정이라 보고 있다. 이 혜성은 아무래도 천공 속을 떠다니는 거대한 얼음 덩어리이며, 긴 꼬리는 태양의 힘으로 형성된 것이라 보는 사람들도 있다. 세가지 설 모두 그럴듯하다는 점에서 이들을 둘러싼 논쟁은 우리나라의 지식 추구를 자극하고 있다."
 verrier.40.g: "이렇게 계몽된 시대에 살고 있음에 하느님께 감사를 느낀다."
 verrier.41.t: "새로운 소행성"
 verrier.41.d: "천문학자들이 소행성으로 분류되는 새로운 천체를 발견하여 우리 성도에 추가하였다."
 verrier.41.f: "19세기에는 천체, 그 중에서도 소행성의 위치를 성도로 제작하는 작업이 엄청난 탄력을 받았다. 1850년대까지 학계에서 발견한 소행성은 단 12개 수준에 머물렀으나, 세기말이 다가오면서 약 300여개로 늘어났다. 이러한 발견으로 기존의 분류 체계를 다시 검토하고 새로운 분류 체계를 수립하는 데 제 역할을 다했다."
 verrier.41.g: "얼마나 더 남았소?"
 verrier.42.t: "유성우"
 verrier.42.d: "시기마다 돌아오는 유성우 덕분에 올해는 우리 천문학자들이 특히 더 많은 천체를 관측할 수 있게 되었다."
 verrier.42.f: "유성우는 밤하늘의 특정 지점에서 수많은 유성이 퍼져내리거나 생겨나는 것처럼 보이는 천문 현상이다. 이러한 유성은 운석이라 불리우는 우주 잔해들이 매우 빠른 속도로 평행 궤도를 따라 지구의 대기권에 진입하면서 발생한다. 대다수 유성은 모래알보다 작기 때문에 거의 대다수가 해체되며 지구의 표면에 도달하지 않는다. 상당히 강렬하거나 특이한 유성우는 별똥만발(유성우폭발)이라고 부르며, 시간당 최소 1,000개 이상의 유성이 떨어지는 경우도 있는데 대표적으로 사자자리 유성우가 있다."
 verrier.42.g: "하늘이 맑고 탁 트였으면 좋겠군!"
 verrier.43.t: "성운"
 verrier.43.d: "우리 천문대에서 미지의 수많은 별 사이에 과거에는 알려지지 않았던 아름다운 성운을 찾아냈다."
 verrier.43.f: "성운을 별무리와 처음 제대로 구분하게 된 것은 페르시아의 이슬람 천문학자 아브드 알라흐만 알수피가 기록하면서부터였다. 알라흐만 알수피는 안드로메다 은하가 위치한 곳에 '작은 구름'이 있다고 밝혀두었다. 1751년부터 1753년까지 니콜라스루이 드 라카이유는 희망봉에서 총 42개의 성운을 기록으로 남겼는데 대다수가 이전까지 그 존재가 알려지지 않았던 것이었다. 이후 성운의 숫자는 윌리엄 허셜과 그 여동생 캐롤라인 허셜의 연구를 거쳐 약 2,000개에 달하는 수준으로 급격하게 늘었다. 1864년부터 윌리엄 허긴스는 70여개 성운 스펙트럼을 조사하였다. 1923년경에는 대논쟁 이래 수많은 '성운'이 사실은 우리 은하에서 멀리 떨어진 은하라는 사실이 밝혀졌다."
 verrier.43.g: "경이롭군!"
 verrier.44.t: "별의 명칭"
 verrier.44.d: "[SCOPE.sCharacter('verrier_star_discoverer').GetFullName](이)가 우연히 새로운 별을 찾아냈다고 한다. 지금 이 별의 이름을 무엇으로 할지 논의가 이뤄지고 있다."
 verrier.44.f: "천문학자들은 처음에는 신화 속 인물에서 천체의 이름을 따오는 불문율이 있었으나, 이후에는 지구상에 처음 밝혀진 지명을 지을 때처럼 통치자의 이름이나 자국에 관련된 이름을 붙이는 경향이 나타났습니다. 예컨대 천왕성은 당시 영국 국왕의 이름을 따서 '조지'(George)로 처음 명명되었습니다. 피아치는 세레스를 발견할 당시 자신의 후원자이자 통치자의 이름을 따서 '페르디난데아' (Ferdinandea)라는 별칭을 붙였습니다."
 verrier.44.g: "이 별은 우리나라의 국명을 따오는 것이 좋겠다."
 verrier.44.h: "이 별은 우리 통치자의 이름을 따오는 것이 좋겠다."
 verrier.44.i: "이 별은 발견한 사람의 이름을 따오는 것이 좋겠다."
 verrier.45.t: "학계에 등장한 새로운 [concept_verrier_astronomer]"
 verrier.45.d: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName](은)는 과거에 천문학에 지대한 관심을 드러내며 여가 시간에 밤하늘을 자주 관측하던 사람이다."
 verrier.45.f: "오늘날까지 수많은 아마추어 천문학자들이 뛰어난 공헌과 함께 천문학 발전에 기여해 왔다. 수많은 천체 덕분에 아마추어 천문학자들도 전문가들의 관측 기록에 도움을 줄 수 잇었다. 유명한 천문학자들 중에는 별 관측에 열정적이었던 것으로부터 출발했던 경우가 많았음을 생각하면 그다지 놀라운 일은 아니다."
 verrier.45.g: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName](이)가 전문 [concept_verrier_astronomer]로 거듭납니다."
 verrier.45.h: "연구란 마음 가는 것 그 이상도 이하도 아니다."
 verrier.46.t: "잘못 만든 성도"
 verrier.46.d: "옛 성도를 검증한 결과, 유감스럽게도 지도상에 표시된 별 가운데 실제로 존재하지 않은 것들이 표시된 것으로 밝혀졌다."
 verrier.46.f: "안타깝게도 천문기록의 오류는 드문 일이 아니다. 이는 근대 초기 뿐만 아니라 관측 방식이 발전하고 정교해진 19세기에도 해당되는 이야기였다. 예컨대 1861년 헤르만 골드슈미트는 토성의 위성을 새로 발견했다고 주장하며 '키론'이라 명명하였으나 그 실체는 영영 확인되지 않았다."
 verrier.46.g: "그러니까 망원경에 얼룩이 묻어 있었단 말이오?"
 verrier.47.t: "토성의 신규 위성 발견"
 verrier.47.d: "우리나라의 대표 천문대 중 한 곳의 망원경을 새 것으로 바꾼 뒤 우리 천문학자들은 토성의 위성 두 개를 새롭게 발견하였다."
 verrier.47.f: "토성의 위성은 지름이 수십 미터에 불과한 조그마한 것부터 수성보다 클 정도로 거대한 타이탄에 이르기까지 그 수도 많고 다양하다. 토성에는 자신만의 궤도를 지닌 것으로 확인된 위성만 83개가 존재하며, 이들을 제하고 수백만 개의 작은 위성과 셀 수 없이 많은 초소형 입자가 조밀하게 모여 만들어진 토성 고리도 존재한다. 토성의 위성 가운데 7위성은 안정된 타원체로 수축할 만큼 충분히 크기가 크지만, 현재 정역학평형(靜力學平衡, hydrostatic equilibrium) 상태에 있는 것은 타이탄과 레아(추정)의 한두개  뿐이다. 토성의 위성 가운데 특히 주목할 만한 것은 목성의 가니메데에 이어 태양계에서 두번째로 큰 타이탄이다."
 verrier.47.g: "훌륭하군."
 verrier.48.t: "엄청난 신성 발견!"
 verrier.48.d: "우리 [concept_verrier_astronomer] [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사가 주변의 항성보다 훨씬 더 밝은 신성을 새로 발견하였다. 이러한 발견은 극히 드문 것으로 최고의 천문학자들만이 해낼 수 있다."
 verrier.48.f: "우리나라는 이 신성의 존재를 처음으로 발견한 국가가 되었다. 그러나 머지않아 다른 여러 천문대들도 망원경을 그곳으로 돌리기 시작했다. 이 신성은 주변의 항성보다 훨씬 더 밝았으며 거의 2주 동안 밝게 빛났다. 시간이 지나면서 밝기는 떨어졌지만 꽤 오랫동안 선명하게 관측할 수 있었다. 우리는 아직 이러한 현상의 원인을 밝혀내지 못했지만, 이번 관측을 통해 해당 현상을 이해하는 데 충분히 도움이 될 것이다!"
 verrier.48.g: "정말 놀라워."
 verrier.50.t: "월면도"
 verrier.50.d: "수년간의 집중 관측과 지도 제작, 그리고 최첨단 사진술의 활용을 통해 우리 천문학자들은 월면을 정확하게 담은 지도를 제작할 수 있었다."
 verrier.50.f: "월면도(달 지도) 제작은 1779년 요한 슈뢰터가 월면 지형에 대한 면밀한 관찰과 측정에 나서면서 체계적으로 이루어지게 되었다. 1834년 요한 하인리히 폰 메들러는 4장 분량으로 구성된 대형 월면도를 처음으로 출판했고 이후 〈보편월면학〉을 출간하였다. 이때까지의 모든 달 관측은 눈으로 직접 보는 방식이었지만, 1840년 3월 J.W. 드레이퍼가 5인치 반사 망원경을 이용하여 다게레오타입 사진을 촬영하고 , 천문학에 사진술을 도입하게 되었다. 처음에는 사진의 상이 매우 흐릿했으나 200년전 망원경처럼 그 품질은 빠르게 향상되었다. 1890년경에는 월면사진술이 천문학의 하위 분야로 인정받게 되었다."
 verrier.50.g: "정말 훌륭하군."
 verrier.51.t: "달의 수로"
 verrier.51.d: "달 표면을 사진으로 지도화하는 사업이 진전을 이루었다."
 verrier.51.f: "달 표면의 수로처럼 생긴 길고 좁은 침하 지형을 아울러 영어로 '릴'(rille)이라고 부른다. 라틴어로는 '리마' (rima, 복수형 rimae)라고 부른다. 이 침하지형은 보통 폭이 수 킬로미터, 길이는 수백 킬로미터에 달한다. 그러나 릴이라는 용어 자체는 여러 위성은 물론 화성과 금성 등 태양계의 다른 행성에도 널리 사용되고 있다. 이들 모두 구조적으로 유사성을 보인다."
 verrier.51.g: "정말 흥미롭군."
 verrier.52.t: "달 충돌구"
 verrier.52.f: "달처럼 매우 오래된 표면에 충돌구가 남겨진 것은 약 39억년 전 태양계 내부에서 초창기의 격렬한 충돌이 존재했음을 보여주고 있다. 달에서는 침식 작용이 미미하기 때문에 충돌구가 계속해서 남아 있을 수 있는 것이다. 1893년 그로브 칼 길버트는 달의 충돌구가 대규모 소행성 충돌로 형성되었다는 가설을 처음으로 제시하였다."
 verrier.53.t: "달의 바다"
 verrier.53.f: "달의 바다는 달 표면에 자리한 크고 어두운 현무암질의 평원을 말한다. 먼 옛날 소행성 충돌로 인해 달 뒷면의 화산 활동이 촉발되면서 형성되었다. 초기 천문학자들은 이 평원을 실제 바다로 오인하여 라틴어로 '바다'를 뜻하는 '마리아'(maria)로 명명하였다. 달의 바다는 토양 성분에 철분이 풍부하여 고지대보다 반사율이 낮아 맨눈으로 봤을 때 어둡게 보인다. 마리아는 달 표면의 약 16%를 차지하며, 대부분 지구에서 볼 수 있는 앞면에 자리해 있다. 뒷면에 존재하는 소수의 바다는 크기도 훨씬 작고 대부분 거대한 충돌구 내에 자리해 있다. 달의 지형지물에 붙여진 지명 가운데에는 오케아누스(바다) 외에도 라쿠스(호수), 팔루스(습지), 시누스(만)도 존재한다. 이들 세 지형은 바다보다는 작지만 그 실체와 특성은 동일하다."
 verrier.54.t: "달의 고원"
 verrier.54.f: "달 표면에서 밝은 색을 띄는 지역은 달의 바다보다 지형이 높은 것이 대부분이기 때문에 고원이라 부르며, 라틴어로 테라이(terrae)라고도 부른다. 달의 고원은 약 44억 년 전에 형성된 것으로 추정되며, 달의 마그마 바다에서 나온 사장석이 축적된 것으로 보인다. 달 앞면에 바다가 집중된 것은 뒷면 고지대의 지각이 훨씬 두껍기 때문일 가능성이 높은데, 달이 형성된 이후 수천만 년 뒤에 지구의 두번째 위성이 저속으로 충돌하면서 지각이 형성된 것으로 추정된다."
 verrier.61.t: "[SCOPE.sCharacter('verrier_1843_discoverer').GetLastName] 혜성"
 verrier.61.d: "[SCOPE.sCharacter('verrier_1843_discoverer').GetFullName](이)가 @verrier_comet!대혜성을 발견했다!"
 verrier.61.f: "1843년 대혜성은 1843년 3월에 빛을 발한 장주기 혜성이다. 1843년 2월 5일에 처음 발견되어 급속도로 밝아져 대혜성이 되었다. 1106년경 모혜성이 여러 조각으로 쪼개지면서 생성된 크로이츠 혜성군에 속한다. 크로이츠 혜성군은 태양 표면에 매우 가까이, 정확히는 태양 반지름의 몇 배 수준으로 근접하며 그 과정에서 상당히 밝아지는 경우가 많다. 1843년 대혜성은 1843년 3월 6일 지구에 최근접하였고 그 다음날 최고 밝기를 기록하였다. 북반구 관측자들에게는 아쉽게도 남반구에서 제일 잘 보이는 혜성이었다. 마지막 관측은 1843년 4월 19일에 이루어졌다. 당시 이 혜성은 알려진 어떤 천체보다도 태양에 가장 가까이 접근한 것으로 알려졌다."
 verrier.61.g: "[ROOT.GetCountry.GetNameNoFlag]에 영광을!"
 verrier.62.t_name: "[SCOPE.sCharacter('verrier_1843_discoverer').GetLastName] 혜성"
 verrier.62.t_year: "1843년 대혜성"
 verrier.62.d: "경이로운 대혜성이 며칠 동안 하늘을 수놓고 있다."
 verrier.62.g: "하늘을 계속 지켜보시오!"
 verrier.64.t: "[SCOPE.sCharacter('verrier_1858_discoverer').GetLastName] 혜성"
 verrier.64.d: "[SCOPE.sCharacter('verrier_1858_discoverer').GetFullName](이)가 @verrier_comet!대혜성을 발견했다!"
 verrier.64.f: "1858년 대혜성은 19세기에 나타난 혜성 가운데 1811년 대혜성 이래 가장 밝은 혜성으로 기록되었으며, 사진으로 촬영된 최초의 혜성이기도 하다. 1858년 10월 10일 지구에 최근접하였으며 10월 내내 밝게 빛난 이 혜성은 기다란 초승달 모양의 먼지 꼬리와 눈에 띄는 가스 꼬리를 지니고 있었다. 남반구에서는 11월까지 맨눈으로 관측할 수 있었다. 관측된 혜성 가운데 가장 아름다웠던 혜성 중 하나로 여겨지며, 금세기 가장 밝게 빛나는 혜성이기도 하였기에 예술가와 일반 대중 모두에게 강렬한 인상을 주었다. 특히 파리에서는 혜성에 대한 흥분감이 엄청났는데 이는 존 러셀힌드가 잘못된 계산을 바탕으로 1857년 6월 지구에 충돌할 것으로 예측했던 것도 있다. 북반구, 특히 유럽에서 어두운 밤하늘 아래 잘 보였으며 1858년 9월~10월의 기상 여견도 좋았기 때문에 19세기를 통틀어 가장 많이 관측된 혜성으로 기록되었다. 영국의 천문학자 윌리엄 헨리 스미스는 '내 생애 보았던 천체 가운데 가장 아름답다'고 회상하였다. 1858년 대혜성은 여러 스케치를 통해 그 모습이 전해지고 있으며 특히 옥스퍼드대 출신의 윌리엄 터너가 남긴 그림이 유명하다."
 verrier.65.t_name: "[SCOPE.sCharacter('verrier_1858_discoverer').GetLastName] 혜성"
 verrier.65.t_year: "1858년 대혜성"
 verrier.67.t: "[SCOPE.sCharacter('verrier_1861_discoverer').GetLastName] 혜성"
 verrier.67.d: "[SCOPE.sCharacter('verrier_1861_discoverer').GetFullName](이)가 @verrier_comet!대혜성을 발견했다!"
 verrier.67.f: "\"1861년 5월 13일 저녁, 서쪽 하늘에서 혜성을 찾던 중 에디라누스자리에 있는 항성 라카이유 1316 인근에서 희미한 성운 같은 천체를 발견하였다. 해상망원경으로 관측해 보니 그 천체는 매우 흐릿하게 보였고, 이미 알려진 세 개의 고정별로부터 거리를 계산하는 데 상당한 어려움이 따랐다. 기준별인 프로키온, 시리우스, 카노푸스의 밝은 빛으로 희미한 천체의 빛이 완전히 가려져서, 육분의에 부착된 작은 망원경으로는 그 물체를 거의 구분할 수 없었기에, 지표경과 수평경 사이에 색유리를 끼워야 했다. 혜성을 찾는 사람이라면 모름지기 자신의 임무를 수행하는 데 있어 방대한 성운 목록을 확보하는 것이 얼마나 중요한지 알고 있으나, 불행히도 나에게는 그런 귀중한 자료가 없었다. 게다가 가지고 있던 그나마의 목록에도 그 천체는 기재되어 있지 않았다. 따라서 그 천체를 지켜보기로 마음먹었고, 그렇게 하길 정말 잘했다고 생각한다. 그렇지 않았더라면 천문학의 세계에 발을 들일 수 있는 최고의 기회를 놓쳤을 테니까.\"\n- 혜성을 발견한 존 태벗의 회고록"
 verrier.68.t_name: "[SCOPE.sCharacter('verrier_1861_discoverer').GetLastName] 혜성"
 verrier.68.t_year: "1861년 대혜성"
 verrier.70.t: "[SCOPE.sCharacter('verrier_1874_discoverer').GetLastName] 혜성"
 verrier.70.d: "[SCOPE.sCharacter('verrier_1874_discoverer').GetFullName](이)가 @verrier_comet!대혜성을 발견했다!"
 verrier.70.f: "1874년 대혜성은 비주기성 혜성으로 1874년 여름에 맨눈으로 볼 수 있었던 혜성이었다. 이 혜성이 상당히 아름다운, 진정한 대혜성이었다는 데에는 의심의 여지가 없다. 가장 밝았을 무렵에는 1등급을 넘겼을 것으로 추정되며, 혜성의 중심부에는 여러 겹의 외피층이 나났는데 학계에서는 이를 16년 전의 대혜성과 비교하였다. 7월에 혜성이 지구 근처를 지나갈 당시에는 알맞은 위치에서 관측한 경우 꼬리 길이가 최대 70도에 달하는 모습을 볼 수도 있었다. 이 혜성에 대한 대중의 공포는 마크 트웨인의 단편 소설 《기묘하고 즐거운 나들이》에서 풍자되었다."
 verrier.71.t_name: "[SCOPE.sCharacter('verrier_1874_discoverer').GetLastName] 혜성"
 verrier.71.t_year: "1874년 대혜성"
 verrier.73.t: "[SCOPE.sCharacter('verrier_1882_discoverer').GetLastName] 혜성"
 verrier.73.d: "[SCOPE.sCharacter('verrier_1882_discoverer').GetFullName](이)가 @verrier_comet!대혜성을 발견했다!"
 verrier.73.f: "1882년 대혜성은 크로이츠 혜성군에 속했던 1882년 9월에 최대 밝기를 기록한 혜성이다. 근일점에 도달했을 당시 낮에도 태양 바로 옆에서 볼 수 있을 만큼 밝았다. 이 혜성은 1882년 9월 아침 하늘에만 나타났다. 기록에 따르면 9월 1일경 아프리카 희망봉과 기니만에서 처음 관측되었으며, 이후 며칠 동안 남반구 곳곳에서 새로운 혜성을 관측했다고 전해진다. 희망봉에 상주하던 영국 천문학자 데이비드 길은 9월 18일 해가 뜨기 몇 분 전에 혜성이 떠오르는 것을 관측하고 다음과 같은 기록을 남겼다. \"혜성의 핵은 분명 단일했으며, 지름은 4인치(약 10cm)보다 작았다. 사실 내 기준에서는 낮에 보는 1등성 별과 매우 비슷했다.\" 1882년 대혜성의 파편은 지금으로부터 수백 년 뒤, 정확히는 200년~300년의 시간을 거쳐 다시 돌아올 예정이다."
 verrier.74.t_name: "[SCOPE.sCharacter('verrier_1882_discoverer').GetLastName] 혜성"
 verrier.74.t_year: "1882년 대혜성"
 verrier.80.t: "카르트 뒤 시엘 학술회의"
 verrier.80.d: "천문학 학술회의를 위한 준비가 마무리되었다. 이제는 다른 국가들을 초청할 차례가 왔다."
 verrier.80.f: "당대 최신 기술을 바탕으로 통일된 관측 및 측정 방법을 모색하는 학술회의가 1887년, 1889년, 1891년 세 차례에 걸쳐 개최되었다. 총 38개국에서 온 천문학자들이 카르트 뒤 시엘 회의에 참석하였으며, 최종적으로 각 위도에 따라 18개 천문대에 적위구역을 편성하였다. 그러나 당초 계획했던 40분의 노출시간은 기후 상황에 맞춰 부분 조정되어야 했고, 기존 비교 대상과의 평가도 요구되었다. 1895년경부터 여러 연구소에서 자신들만의 연구 경험을 활용하여 방법론을 개선하고 가속화하며, 새로운 실험실 기술 개발에 기여하고자 하였다. 이러한 노력은 동시에 새롭게 부상하던 천체물리학 분야에 자원을 투자하고자 하는 열망으로 한층 강화되었다."
 verrier.80.g: "천문학계의 선도 국가들을 초청하자."
 verrier.81.t: "카르트 뒤 시엘 학술회의 초청"
 verrier.81.d: "우리 천문학자들이 밤하늘의 심층적인 관측과 지도 제작을 목적으로 한 학술회의에 초청받았다."
 verrier.81.f: "당대 최신 기술을 바탕으로 통일된 관측 및 측정 방법을 모색하는 학술회의가 1887년, 1889년, 1891년 세 차례에 걸쳐 개최되었다. 총 38개국에서 온 천문학자들이 카르트 뒤 시엘 회의에 참석하였으며, 최종적으로 각 위도에 따라 18개 천문대에 적위구역을 편성하였다. 그러나 당초 계획했던 40분의 노출시간은 기후 상황에 맞춰 부분 조정되어야 했고, 기존 비교 대상과의 평가도 요구되었다. 1895년경부터 여러 연구소에서 자신들만의 연구 경험을 활용하여 방법론을 개선하고 가속화하며, 새로운 실험실 기술 개발에 기여하고자 하였다. 이러한 노력은 동시에 새롭게 부상하던 천체물리학 분야에 자원을 투자하고자 하는 열망으로 한층 강화되었다."
 verrier.81.g: "참가하도록 하지."
 verrier.82.t_laughed: "천문 회의에서 받은 조롱"
 verrier.82.t_respected: "천문 회의에서 대우받다"
 verrier.82.t_lauded: "천문 회의에서 칭송받다"
 verrier.82.d_laughed: "천문 학술회의에 참석한 우리 대표단은 천문학 지식의 부족으로 비웃음을 당하고 말았다!"
 verrier.82.d_respected: "천문 학술회의에 참석한 우리 대표단은 제대로 된 대우를 받았다."
 verrier.82.d_lauded: "우리나라가 천문 분야의 선진 지식으로 다른 학자들의 관심을 끌고 있다."
 verrier.82.f_laughed: "\"에테르 이론이 구식이라니 그게 가당키나 한 말이오?\""
 verrier.82.f_respected: "\"뷔페에 토성 모양의 음식이 조금이라도 남아있으면 좋겠군.\""
 verrier.82.f_lauded: "\"안녕하십니까, 대마젤란운 씨. 이제야 그 이름의 유래를 알 것도 같군요.\""
 verrier.82.g: "끔찍하군..."
 verrier.82.h: "좋다."
 verrier.82.i: "아주 좋아!"
 verrier.83.t: "성도 공유"
 verrier.83.d: "우리 천문학자들은 해외에서 건너온 동료 학자들과 성도를 공유하고자 한다."
 verrier.83.f: "천문학은 일찍부터 국제적인 협력이 이루어졌던 연구 분야였다. 그러한 협력이 일시 중단된 것은 제1차 세계 대전 시기가 유일했다. 밤하늘을 전부 관측하고 우주의 신비를 밝히는 것은, 만국의 과학자들이 공통의 목표에 전념하게 만드는 것이기도 했다. 이와 같은 협력에 장애가 되는 것은 정치 문제 뿐이다."
 verrier.83.g: "우리도 성도를 공유하고 싶소."
 verrier.83.h: "그런 건 관심 없다네."
 verrier.84.t: "성도 교환"
 verrier.84.d: "천문학자들이 우리와 상의하지 않고 외국 학자들과 성도 일부를 교환하였다."
 verrier.84.f: "천문학은 일찍부터 국제적인 협력이 이루어졌던 연구 분야였다. 그러한 협력이 일시 중단된 것은 제1차 세계 대전 시기가 유일했다. 밤하늘을 전부 관측하고 우주의 신비를 밝히는 것은, 만국의 과학자들이 공통의 목표에 전념하게 만드는 것이기도 했다. 이와 같은 협력에 장애가 되는 것은 정치 문제 뿐이다... 그렇지 않을 수도 있지만 말이다."
 verrier.84.g: "나한테 먼저 물어봐야 할 것이 아니오!"
 verrier.85.t: "천문학 학술회의 종료"
 verrier.85.d: "학술회의가 마무리되면서 우리는 요 근래 밤하늘에 관한 중요한 지식들을 확보하게 되었다."
 verrier.85.f: "국제 천문대 협력망을 활용한 천체지도 제작 사업은 이후 수십 년에 걸쳐 엄청난 어려움에 부딪혔으며, 사업을 완수하기란 결코 쉽지 않았다. 결국 천체지도는 미완으로 남게 되었다. 그러나 국제 학술회의는 지식 교류의 장을 마련하고 추후 국제 협력과 천문학 연구 분야 학술회의의 토대를 마련했다는 점에서 의의가 있었다."
 verrier.85.g: "참으로 유익한 시간이었소."
 verrier.86.t: "대논쟁"
 verrier.86.d: "천문학 학술회의를 위한 준비가 마무리되었다. 이제는 다른 국가들을 초청할 차례가 왔다."
 verrier.86.f: "섀플리-커티스 논쟁이라고도 부르는 대논쟁은 일명 나선 성운의 본질과 우주에 크기에 관하여 천문학자 할로 섀플리와 허버 커티스가 벌인 논쟁이다. 섀플러는 나선 성운이 비교적 작고 우리 은하(당시 기준으로는 우주 전체)의 외곽에 자리해 있다고 주장한 반면, 커티스는 이들 성운이 사실상 별개의 은하이며, 따라서 크기가 매우 크고 멀리 떨어진 것이라고 주장했다. 이 '대논쟁'에 대한 여러 일화는 1921년 5월 미국 국립연구위원회 회보에 섀플리와 커티스가 각각 발표한 두푠의 논문에서 비롯되었다. 공개 토론이 벌어진 이래 학계에서는 두 천문학자들이 제시한 증거들을 하나씩 검증해 나갈 수 있었다."
 verrier.86.g: "천문학계의 선도 국가들을 초청하자."
 verrier.87.t: "대논쟁"
 verrier.87.d: "우리 천문학자들이 우주의 크기와 실체에 관한 의문을 풀기 위한 학술회의에 초청받았다."
 verrier.87.f: "섀플리-커티스 논쟁이라고도 부르는 대논쟁은 일명 나선 성운의 본질과 우주에 크기에 관하여 천문학자 할로 섀플리와 허버 커티스가 벌인 논쟁이다. 섀플러는 나선 성운이 비교적 작고 우리 은하(당시 기준으로는 우주 전체)의 외곽에 자리해 있다고 주장한 반면, 커티스는 이들 성운이 사실상 별개의 은하이며, 따라서 크기가 매우 크고 멀리 떨어진 것이라고 주장했다. 이 '대논쟁'에 대한 여러 일화는 1921년 5월 미국 국립연구위원회 회보에 섀플리와 커티스가 각각 발표한 두푠의 논문에서 비롯되었다. 공개 토론이 벌어진 이래 학계에서는 두 천문학자들이 제시한 증거들을 하나씩 검증해 나갈 수 있었다."
 verrier.87.g: "그 정답은 42 아닌가?"
 verrier.88.t: "하나의 우주인가, 별개의 은하인가"
 verrier.88.d: "천문학 학술회의에서 불거진 논쟁은 우리 은하수가 우주 전체를 아우르는가에 대한 것이었다."
 verrier.88.f: "섀플리는 은하수가 전 우주라는 주장을 내세웠다. 안드로메다 같은 '나선 성운'은 그저 은하수의 일부일 뿐이라고 확신했던 것이다. 그 주장을 뒷받침하는 근거로 각 성운의 상대적인 크기를 제시하였는데, 안드로메다가 은하수의 일부가 아니라면 그 거리는 1억 광년에 달해야 하는데 현대 천문학계로서는 받아들일 수 없는 범위라는 것이다. 반면 커티스는 안드로메다와 소위 다른 '성운'이란 것들도 별개의 은하, 즉 '섬우주'라고 주장하였다. 섬우주란 18세기 철학자 임마누엘 칸트가 만든 용어로, 칸트 역시 '나선 성운'이 은하계 외부에 존재한다고 보았다. 커티스는 안드로메다 은하에 은하수보다 더 많은 신성이 존재한다는 사실을 제시하였다. 이를 통해 안드로메다가 우리 은하 내의 성운에 불과하고 별개의 은하가 아니라면, 은하의 특정 작은 영역에서 다른 영역보다 더 많은 초신성이 발견되는 이유가 뭐냐고 의문을 던질 수 있었던 것이다. 이는 안드로메다가 고유의 나이와 신성 발생률을 지닌 별개의 은하라는 주장을 뒷받침하는 근거가 되었다."
 verrier.88.g: "우주는 여러 개의 은하로 이루어져 있다."
 verrier.88.h: "은하수는 하나뿐이며, 나머지는 전부 가스 구름이다."
 verrier.89.t: "우주 속 태양의 위치"
 verrier.89.d: "토론의 또다른 주제는 태양이 은하의 중심에 있는가, 아니면 외곽에 자리해 있는가였다."
 verrier.89.f: "\"대대적인 천체 분석과 우주 탐구를 진행하는 대형 천문대의 비약적인 성장과 활동에, 나는 또 하나의 도약이 필요한 시대에 들어섰다고 봅니다. 우리네 망원경이 찾아내는 천체와의 적절한 관계를 유지하기 위해서는 은하계를 향한 우리의 개념을 확대해야 합니다. 태양계는 더 이상 중심점을 유지할 수 없는 노릇입니다.\"\n\n\"은하의 형태와 구조에 대해서도 대체로 비슷한 합의에 도달했습니다.\n 첫째, 별의 수는 무한하지 않으며 분포도 균일하지 않습니다.\n 둘째, 우리 은하는 은하수의 윤곽으로 구분할 수 있으며, 추정컨대 10억 개의 항성을 지니고 있을 것으로 봅니다.\n 셋째, 우리 은하는 렌즈나 얇은 시계와 몹시 유사한 형태로 되어 있으며, 두께는 지름의 6분의 1보다 작을 것입니다.\n 넷째, 우리 태양은 은하의 중심부에 상당히 가까이 있을 것입니다.\""
 verrier.89.g: "태양은 은하의 내부에 자리해 있다."
 verrier.89.h: "태양은 은하의 외곽에 자리해 있다."
 verrier.90.t: "대논쟁 종료"
 verrier.90.d: "대논쟁이 마무리되고 대다수 학자들의 동의로 학계의 정설이 마련되었다."
 verrier.91.t: "기적의 해 논문"
 verrier.91.d: "과학자 알베르트 아인슈타인이 여러 이론으로 고전물리학에 혁명을 일으켰다."
 verrier.91.f: "'기적의 해 논문'이란 알베르트 아인슈타인이 1905년 과학 전문지 《물리학 연보》(Annalen der Physik)에 게재한 네 편의 논문을 말한다. 이 논문들은 현대물리학의 기초를 다지는 데 중대한 공헌을 하였으며, 공간과 시간, 질량과 에너지 같은 기본 개념에 대한 과학적 이해를 뒤바꾸어 놓았다. 첫 번째 논문은 광전 효과를, 두 번째 논문은 브라운 운동을 설명하였다. 세 번째 논문은 아인슈타인의 특수 상대성 이론을 처음 소개하며 모든 기준계에서 빛의 속도가 일정하다는 것과 시공간 이론을 확립하였다. 네번째 논문은 특수 상대성 이론의 연구 결과로, 그 유명한 E = mc² 방정식으로 표현되는 질량-에너지 등가 원리를 발전시켰고, 원자력의 발견과 활용으로 이어졌다. 이 네 편의 논문은 양자역학과 아인슈타인이 후속으로 발표한 일반 상대성 이론과 함께 현대 물리학의 기초를 이루게 되었다."
 verrier.91.g: "그러니까 이제부터 만물은 상대적이라는 얘기로군?"
 verrier.92.t: "[ROOT.GetCountry.GetNameNoFlag]에 온 아인슈타인"
 verrier.92.d: "유명 물리학자 알베르트 아인슈타인이 우리 대학의 교수로 위촉되었다."
 verrier.92.f: "알베르트 아인슈타인은 독일 태생의 이론물리학자로, 역사상 가장 위대하면서도 영향력이 큰 물리학자로 널리 알려져 있다. 아인슈타인은 상대성 이론을 주창한 것으로 제일 유명하지만, 양자역학 이론의 발전에도 큰 공헌을 하였다. 상대성 이론과 양자역학은 근대물리학을 떠받치는 두 기둥과도 같다. 아인슈타인의 업적은 과학철학에도 큰 영향을 끼친 것으로 알려져 있다. 아인슈타인은 독일 제국에서 태어났지만 1895년 스위스로 이주하였고 이듬해 독일 시민권을 포기하였다. 1901년에는 스위스 시민권을 취득하여 평생 유지하였다. 1914년 프로이센 과학원과 베를린 훔볼트 대학교에 위촉되어 베를린으로 이주하였다. 1917년에는 카이저 빌헬름 물리학 연구소장으로 임명되었고, 이때 다시 독일 시민권을 취득하였는데 당시에는 프로이센 시민권이었다. 1933년 아인슈타인이 미국을 방문할 당시 아돌프 히틀러가 독일에서 집권하였다. 유대인이었던 아인슈타인은 신 나치 정권의 정책에 반하여 미국으로 건너가 1940년 미국 시민권을 취득하였다."
 verrier.92.g: "어서 오시오!"
 verrier.93.t: "아인슈타인의 중력 이론"
 verrier.93.d: "알베르트 아인슈타인이 혁신적인 이론으로 중력에 대한 우리의 관점은 물론 우주를 향해 바라보는 관점까지도 다시 한번 바꿔놓았다."
 verrier.93.f: "일반 상대성 이론은 1915년 알베르트 아인슈타인이 발표한 중력의 기하학적 이론으로, 근대물리학에서 중력을 설명하는 데 있어 적용되는 이론이다. 일반 상대성 이론은 특수 상대성 이론을 일반화하고 뉴턴의 만유인력 법칙을 정교화하여, 중력을 시공간의 기하학적 속성, 즉 4차원 시공간으로 합쳐 설명하고 있다. 특히 시공간의 곡률은 존재하는 어떤 물질이나 복사선의 에너지, 운동량에 직접적인 영향을 받는다. 아인슈타인의 이론은 천체물리학적 함의도 담겨 있는데 그 중 하나는 블랙홀의 존재를 예측한 것이다. 블랙홀이란 시공간이 왜곡되어 빛조차 탈출할 수 없는 영역으로, 질량이 큰 별이 수명을 다하면 생겨난다. 마이크로퀘이사와 활동 은하핵은 항성 블랙홀과 초거대 블랙홀로 여겨지고 있다. 또 중력 렌즈 현상, 즉 빛의 굴절로 멀리 떨어진 천체 현상이 여러 개의 상(像)으로 나타나는 현상을 예측하고 있다."
 verrier.93.g: "이 사람 정말 천재라니까."
 verrier.94.t: "아인슈타인의 이민"
 verrier.94.d: "우리나라의 정치적 변동으로 인해 저명한 물리학자 알베르트 아인슈타인이 오늘 여권을 반납하고 조국을 떠나 버렸다!"
 verrier.94.f: "알베르트 아인슈타인은 생전에 주로 상대성 이론의 발전과 물리학 분야 전반에 걸친 업적으로 이름을 알렸다. 그러나 세계적인 명성과 인도주의, 정치, 학술 활동의 참여로, 20세기 중반까지 아인슈타인 본인의 정치관에 대해서도 대중의 관심을 끌었다. 아인슈타인은 시민권 옹호자로서 본인의 명성을 통해 미국의 인종차별을 규탄했다. 미국에 도착할 당시에는 미국 흑인들의 부당한 대우에 반대 의사를 표했다. 제2차 세계 대전 이전 독일에서 극심한 반유대주의 차별을 경험했던 아인슈타인은 여러 저명한 시민권 운동가와 단체와 협력하였다. 말년에는 사회주의를 지지하였으며 1949년 《먼슬리 리뷰》 지에 '왜 사회주의인가?'라는 제목의 기고문에서 본인의 경제관을 소상히 설명하였다. 볼셰비키 정권을 향한 의견도 시간이 지나면서 변화하였다. 1925년에는 볼세비키가 '잘 정돈된 정부 체제'를 갖추지 못했다고 비판하며 이들의 통치가 '공포 정치이자 인류 역사의 비극'이라 규정하였다."
 verrier.94.g: "어차피 필요 없었다."
 verrier.95.t: "정치인 아인슈타인"
 verrier.95.d: "물리학자 알베르트 아인슈타인이 국내외적으로 명성을 얻으면서 정계에 적극 입문하는 것을 고심중인 것으로 전해졌다."
 verrier.95.f: "1918년 아인슈타인은 자유주의 성향인 독일 민주당의 창당에 참여하였다. 또한 세계적인 명성과 인도주의, 정치, 학술 활동의 참여로, 20세기 중반까지 아인슈타인 본인의 정치관에 대해서도 대중의 관심을 끌었다. 아인슈타인은 평화 운동가이자 세계 연방주의와 세계법을 강력히 지지하였다. 말년에는 사회주의를 지지하였으며 1949년 《먼슬리 리뷰》 지에 '왜 사회주의인가?'라는 제목의 기고문에서 본인의 경제관을 소상히 설명하였다. 볼셰비키 정권을 향한 의견도 시간이 지나면서 변화하였다. 1925년에는 볼세비키가 '잘 정돈된 정부 체제'를 갖추지 못했다고 비판하며 이들의 통치가 '공포 정치이자 인류 역사의 비극'이라 규정하였다. 독일에서 나치즘이 대두되면서 많은 사람들이 침묵을 강요당하던 시대에, 아인슈타인은 사회적으로 저명한 지위를 바탕으로 솔직하면서도 때로는 도발적인 발언과 기고에 나설 수 있었다. 아인슈타인은 시민권 옹호자였으며, 자신의 명성을 이용하여 미국의 인종차별을 비판했다. 또 한평생 평화주의자였으며 전쟁은 인류의 진보를 가로막는다고 믿었다."
 verrier.95.g: "아인슈타인은 큰 일을 할 공인이다."
 verrier.95.h: "그 사람은 과학자이지 정치인은 아니다."
 verrier.100.t: "천문대"
 verrier.100.d: "대표적인 천문학 통계 현황을 표시합니다."
 verrier.100.planets: "태양계의 #T 행성#!으로 공인된 천체는 총 #G [GetGlobalVariable('verrier_planets_number').GetValue]개#!이며 그 목록은 다음과 같습니다.\n"
 verrier.100.mercury: "\n#V 수성#! - 고대부터 알려져 있었습니다."
 verrier.100.venus: "\n#V 금성#! - 고대부터 알려져 있었습니다."
 verrier.100.earth: "\n#V 지구#! - 테라(Terra)란 이름으로도 알려져 있으며 우리의 고향입니다."
 verrier.100.mars: "\n#V 화성#! - 고대부터 알려져 있었습니다."
 verrier.100.jupiter: "\n#V 목성#! - 고대부터 알려져 있었습니다."
 verrier.100.saturn: "\n#V 토성#! - 고대부터 알려져 있었습니다."
 verrier.100.moon: "\n\n#T @verrier_moon_photo!월면 사진#!수집 개수:#G [ROOT.Var('verrier_moon_photo').GetValue]#!/#BLUE 10#!\n"
 verrier.100.comets: "\n#T @verrier_comet!대혜성#!관측 사례:#G [ROOT.Var('verrier_great_comet').GetValue]#!#BLUE [GetGlobalVariable('verrier_total_verrier_great_comet').GetValue]#!\n"
 verrier.100.objects: "\n국제 천문학계에서 발견한 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]의 수는 총 @verrier_astronomicalobject!#BLUE [GetGlobalVariable('verrier_total_astronomical_objects').GetValue]개#!이며, 그 중에서 우리가 발견한 것은 총 #G [ROOT.Var('verrier_astronomical_objects').GetValue]개#!입니다.\n"
 verrier.100.no_galaxies: "\n은하수는 #E 온 우주#!를 아우르고 있습니다. 안드로메다 성운과 같은 현상은 #E 가스 구름#!에 불과합니다."
 verrier.100.galaxies: "\n은하수는 우주를 구성하는 #E 수많은 은하 중 하나#!일 뿐입니다. 안드로메다 성운과 같은 천체들은 사실 #E 다른 은하#!에 해당됩니다."
 verrier.100.sun_center: "태양은 은하수의 #E 중심부#!에 놓여 있습니다."
 verrier.100.sun_outer: "태양은 은하수의 #E 외곽부#!에 놓여 있습니다."
 verrier.100.g: "역경을 헤치고 별을 향하여."
 verrier.100.h: "[concept_verrier_astronomer]를 찾아가겠다!"
 verrier.100.i: "천문학계 발견을 가장 많이 이룩한 국가들을 보여주시오!"
 verrier_leave_observatory_tt: "천문대를 떠납니다"
 verrier.101.t: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]"
 verrier.101.d: "저희 [concept_verrier_astronomer] [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] 님은 천공의 신비를 밝히기 위해 끊임없이 연구합니다."
 verrier.101.g: "역경을 헤치고 별을 향하여."
 verrier.101.h: "천문대로 돌아가자."
 verrier.111.t: "천공의 기적"
 verrier.111.d: "현시대 유럽에서 제일 중요한 천문학자로 평가받는 요제프 요한 폰 리트로프가 천문학계의 표준이 될 입문서를 발표하였다."
 verrier.111.f: "요제프 요한 폰 리트로프는 오스트리아의 천문학자이자 빈에 대학 천문대를 새로 설립한 인물이다. 1825년 시대에 뒤떨어진 천문대를 완전히 되살리고 우수한 중형 관측 기구들을 갖추는 데 힘썼으며, 대학 천문대 연구소장에 이어 1838년 학장으로 재직하게 되었다. 1834년부터 1836년까지 리트로프는 일반인을 대상으로 한 과학 서적 《하늘의 기적》을 출간하였는데, 그로부터 수 년만에 1만 4천 부가 인쇄되는 기염을 토했다. 총 3권 분량이 이 책은 천문학계의 고전 문학으로 자리매김하였으며, 리트로프는 19세기 독일어권에서 최다 발행 부수를 기록한 천문학자로 거듭나게 되었다. 리트로프는 원래 《하늘의 기적》의 마지막 권으로 천문학의 역사를 집대성하고자 하였으나 집필을 끝마치지 못하고 원고로만 남긴 채 1840년 11월 세상을 떴다."
 verrier.111.g: "이 책은 실용적 용도로 쓰일 수 있겠군."
 verrier.111.h: "이 책은 이론적 용도로 쓰일 수 있겠어."
 verrier.111.i: "이 책은 교육적 용도로 쓰일 수 있겠소."
 verrier.112.t: "본 소천성표"
 verrier.112.d: "프로이센의 천문학자들이 지금까지 알려지지 않았던 천체들을 수록한 방대한 성표를 발표하였다."
 verrier.112.f: "본 소천성표 (Bonner Durchmusterung, BD 목록)은 북반구 밤하늘의 별들을 육안으로 관측하여 제작한 성표 내지는 36장 분량의 별지도이다. 본 대학교 부속 천문대의 [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName](이)가 조사를 진행하여 제작하였으며, 아달베르트 크뤼거와 에두아르트 쇤펠트의 지원을 받아 1846년부터 1863년까지 제작이 진행되어 출간되었다. 적위 89°~-2° 범위에 있는 총 324,198개의 별이 수록되었으며 최대 9.5등급(드물게는 10등급)의 별을 관측하였다. 이번 조사에는 요제프 폰 프라운호퍼가 제작한 7.7cm 구경, 초점거리 65cm의 혜성 탐지 망원경이 사용되었다."
 verrier.112.g: "좋았어!"
 verrier.112.h: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName](이)가 밤하늘의 경이로움을 보다 깊이 탐구하기를 바라오!"
 verrier.113.t: "화성의 운하"
 verrier.113.d: "국내 천문학자가 붉은빛의 이웃 행성을 관측하던 중 이상한 점을 발견하였다."
 verrier.113.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName](은)는 당대 가장 예리한 [concept_verrier_astronomer]로 평가되며 수성과 금성, 화성의 관측 연구로 유명하다. 특히 1877년 화성에서 마치 정교하게 지어진 도랑처럼 보이는 구조물을 발견하였는데 이를 언론에서 '화성의 운하'라고 칭하게 되었고, 그로부터 80년 동안 연구 대상이 되었다. 당시 이 선형 지형은 30cm~50cm 구경 렌즈로 된 망원경의 시야 범위 한계에 겨우 들어왔기 때문에 특별한 기회가 찾아와야 관측할 수 있었다. 1879년 화성 충(화성이 태양의 정반대 편의 일직선상에 놓임)을 계기로 다른 학자들도 해당 구조물을 실제로 관측하였다. [SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName](은)는 해당 지형이 자연적으로 형성된 것으로, 최대 길이 2000km, 너비 약 100km의 직사각형 함몰 지형으로서 건조한 화성 표면으로 물이 흘러나갈 수 있었을 것으로 보았다. 하지만 영어로 번역되는 과정에서 '해협'(channels)이 아닌 '운하'(canals)로 잘못 번역되면서 많은 언론에서 이를 누군가 파낸 토목지형으로 오해하게 되었다. 이로 인해 공상 과학 소설의 소재로 다뤄지고, 화성인에 대한 이야기가 수십 년 동안 지속되는 계기가 되었다."
 verrier.113.g: "놀라운 발견일세."
 verrier.113.h: "추후 화성의 위협에 맞설 장교를 양성해야 하겠군!"
 verrier.113.i: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName] 씨라면 더 많은 것들을 이름 붙일 수 있을지 모르오!"
 verrier.114.t: "핼리 혜성"
 verrier.114.d: "핼리 혜성이 75년 만에 밤하늘에 나타났다."
 verrier.114.f: "핼리 혜성은 정기적으로 지구에서 맨눈으로 관측할 수 있는 유일한 단주기 혜성이자, 인간이 한평생 맨눈으로 두 번 볼 수 있는 유일한 혜성이다. 핼리 혜성이 주기에 맞춰 태양계 안쪽으로 접근하는 현상은 적어도 기원전 240년부터 전세계 천문학자들이 관측하고 기록해 왔다. 그러나 동일한 혜성이 다시 나타나는 것이라는 사실이 처음 밝혀진 것은 1705년 영국의 천문학자 에드먼드 핼리에 의해서였다. 혜성에 핼리라는 이름이 붙여진 것도 이 때의 발견을 기리기 위함이다. 1910년 혜성 접근 당시 여러 가지 이유로 기억에 남게 되었는데, 사진으로 남겨진 동시에 분광학적 측정 자료를 확보할 수 있었던 최초의 사례였기 때문이다. 미국의 풍자 작가이자 소설가인 마크 트웨인은 1835년 11월 30일, 혜성이 근일점을 통과한지 정확히 2주 뒤에 태어났다. 1909년 출간된 자서전에서 트웨인은 이렇게 밝혔다. \"나는 1835년 핼리 혜성과 함께 세상에 나왔다. 내년에 다시 한번 혜성이 찾아올 것이고, 나는 그 혜성과 함께 세상을 떠날 것이다. 만약 내가 핼리 혜성과 함께 떠나지 못한다면 내 한평생 가장 큰 미련으로 남을 것이다. 전능하신 주님께서 분명히 이렇게 말씀하셨다. '이렇게 영문 모를 괴짜 둘이 동시에 존재하다니, 함께 왔으니 함께 떠나야 할 것이다'라고.\" 실제로 트웨인은 핼리 혜성이 근일점이 통과한 그 다음날, 1910년 4월 21일에 사망했다."
 verrier.114.g: "75년 뒤에 봅시다!"
 verrier.115.t: "르메트르의 우주 팽창론"
 verrier.115.d: "어느 가톨릭 사제가 우주의 상태와 기원에 관한 흥미롭고 혁신적인 이론을 발표하였다. 이것으로 우리가 기존에 알고 있던 우주관이 뒤집힐 수도 있다."
 verrier.115.f: "조르주 르메트르는 벨기에의 가톨릭 사제이자 이론물리학자, 수학자, 천문학자로서 루뱅 가톨릭대의 물리학 교수로 재직하였다. 르메트르는 가까운 은하들이 후퇴하는 현상을 우주의 팽창으로 설명할 수 있다는 이론을 처음으로 제시한 인물로, 머지않아 에드윈 허블의 관측 연구로 사실로 확인되었다. 오늘날 국제천문연맹에서 허블-르메트르 법칙이라 불리우는 '허블의 법칙'도 처음으로 이끌어냈으며, 허블의 논문이 발표되기 2년 전인 1927년에 허블 상수를 처음 추산해냈다. 또 르메트르는 우주의 기원에 대해 '빅뱅 이론'을 제시하였는데, 처음에는 '원시 원자 가설'이라 불렀다가 이후 '우주 창조설'이라 칭하였다. 훗날 국제적인 명성을 얻게 된 논문 〈은하 외 성운의 시선속도를 설명하는 일정 질량과 증가하는 반지름을 지닌 균일우주〉(1927년)에서 일반 상대성 이론에 기반한 우주의 팽창이라는 새로운 개념을 제시한 것이다."
 verrier.115.g: "그러니까 이 '빅뱅'이라는 게 전부 예수회에서 지어냈다 이 말이지? 그럴 줄 알았어!"
 verrier.116.t: "양자이론"
 verrier.116.d: "물리학자 [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName](이)가 양자이론을 창시하며 원자와 아원자에 대한 인류의 이해를 영원히 뒤바꿔놓았다."
 verrier.116.f: "\"그 사람은 본래부터 보수적인 성향이었다. 혁신적인 면모는 없었고 추측이 생긴다면 철저히 회의적인 자세로 대했다. 그러나 사실에 근거한 논리적 추론이 막강한 힘을 지녔다는 개인적인 신념이 너무나 강한 나머지, 물리학계를 뒤흔들 만큼 가장 혁명적인 발상을 발표하는 데 조금도 주저하지 않았다.\" - 막스 플랑크에 대한 막스 보른의 평.\n\n 막스 플랑크의 새로운 파생 이론의 핵심 가정은 전자기 에너지가 양자화된 형태로만 방출될 수 있다는 것으로, 오늘날 이것을 플랑크 가설이라 부른다. 물리학계에서는 이러한 양자를 광자라고 칭한다. 고전 물리학과 양립할 수 없는 이런 가정은 양자 물리학의 탄생이자 플랑크의 가장 위대한 업적으로 높이 평가받고 있다. 플랑크 상수의 발견은 양자이론의 대부분을 뒷받침하는 기본 물리 상수에 기반하여, 새로운 보편적인 물리 단위를 정의할 수 있게 하였다. 플랑크는 물리학의 새 분야에 대한 근본적인 기여를 인정받아 1918년 노벨 물리학상을 수상하기에 이른다."
 verrier.116.g: "과학계의 눈부신 진일보로다!"
 verrier.116.h: "이런 영리한 인재가 조국을 위해 일한다면!"
 verrier.117.t: "은하수 너머"
 verrier.117.d: "천문학자 [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName](이)가 과거에 먼지와 가스 구름으로 여겨져 '성운'으로 분류되었던 수많은 천체가 사실은 은하수 너머의 은하라는 것을 증명하였다."
 verrier.117.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName](은)는 미국의 천문학자로, 외부은하 천문학과 관측우주론 분야의 확립에 중대한 역할을 하였다. 허블은 은하의 후퇴 속도가 지구와의 거리에 따라 증가한다는 근거를 제시하였다. 오늘날 '허블의 법칙'이라 알려져 있는 이 속성은 사실 그로부터 2년 전 조르주 르메트르가 제시한 바 있다. 허블은 윌슨 산의 후커 망원경을 사용하여 헨리에타 리빗이 발견한 표준촛불인 '세페이드 변광성'을 발견하였다. 세페이드 변광성의 겉보기 밝기와 고유 밝기를 비교하면 지구와의 거리를 알 수 있게 된다. 1924년 허블은 안드로메다 성운과 삼각 성운을 비롯한 여러 성운에서 세페이드 변광성을 찾아냈다. 이러한 관측은 해당 성운들이 우리 은하의 일부라 보기에는 너무 멀리 떨어져 있으며, 사실은 우리 은하 외부에 있는 별개의 은하라는 것을 확실하게 증명하였다. 이에 따라 오늘날 이들은 더 이상 성운으로 여겨지지 않고 있다. 허블은 사진의 화상에서 보이는 형태에 따라 은하를 분류하는 체계도 고안하였는데 이 역시 오늘날 가장 널리 사용되고 있다. 이렇듯 허블이 여러 은하군을 배치한 방식을 '허블 순차'로 부르게 된 것이다."
 verrier.117.h: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName] 씨를 우리 인재풀에 들이면 좋겠소만!"
 verrier.118.t: "핵물리학"
 verrier.118.d: "어니스트 러더퍼드의 연구와 논문으로 원자의 핵 구조와 방사성 붕괴가 핵 과정의 하나라는 본질적 특성을 확립하게 되었다."
 verrier.118.f: "어니스트 러더퍼드는 뉴질랜드 출신의 물리학자로, 핵물리학의 아버지로 널리 알려져 있다. 러더퍼드는 고국에서의 연구 활동 외에도 캐나다와 영국 등 국외에서도 적잖은 세월을 보냈다. 초창기 연구에서 러더퍼드는 방사성의 반감기 개념과 방사성 원소 라돈을 발견하고, 알파선과 베타선을 구분하여 명명하였다. 이러한 공로로 1908년 노벨 화학상을 수상하게 되었으며, 당시 수상 사유로 '원소 붕괴 및 방사성 물질의 화학에 관한 연구'가 선정되었다. 러더퍼드는 영국으로 건너가 토머스 로이드와 함께 알파선이 헬륨 원자핵에서 방출된다는 사실을 입증하였다. 이후 원자의 전하가 매우 작은 원자핵에 집중되어 있다는 이론을 제시하였고, 한스 가이거와 어니스트 마스덴의 금속박 실험을 통해 드러난 '러더퍼드 산란 현상'을 발견하고 해석하여 러더퍼드 원자 모형을 정립하였다. 러더퍼드는 질소 핵에 알파 입자를 충돌시키는 실험을 통해 최초로 인공적인 핵반응을 유도한 사람이 되었다. 그 결과 아원자 입자의 방출을 발견하고 이를 양성자라고 명명하였다."
 verrier.119.t: "주기율표"
 verrier.119.d: "화학자 드미트리 멘델레예프가 원소의 주기율에 따른 표를 선보였다."
 verrier.119.f: "1863년에는 총 56원소가 알려져 있었고 해마다 새로운 원소가 하나씩 발견되고 있었다. 학계 일각에서는 이미 원소의 주기성을 밝혀낸 상황이었다. 1867년 교사가 된 멘델레예프는 《화학의 원리》를 집필하여 당대 최고의 교과서로 등극시켰다. 이 책은 1868년~1870년 두 권에 걸쳐 출판되었으며, 멘델레예프가 강의 교재를 준비하는 과정에서 집필한 것이다. 멘델레예프는 원소들을 화학적 성질에 따라 분류하는 과정에서 어떤 법칙을 발견하고 주기율표를 제안하게 되었다. 정확히는 꿈에서 모든 원소가 제자리에 배열된 표를 보았다고 멘델레예프는 전한다. \"꿈에서 모든 원소가 제자리에 딱 들어맞는 표를 보았다. 잠에서 깨어 바로 종이에 적어 두었는데, 나중에 한 자리만 수정하면 될 듯 싶었다.\" 멘델레예프는 이 법칙에 따라 새로운 원소들을 채원허으면서 확장된 주기율표를 완성하기에 이르렀다. 멘델레예프는 러시아의 학술지에 현존하는 모든 원소를 담은 주기율표를 발표하고, 나아가 그 주기율표의 빈자리를 완성할 몇 가지 신규 원소의 존재를 예측하였다."
 verrier.120.t: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]"
 verrier.120.d: "프랑스에서 제일 유명한 [concept_verrier_astronomer]가 태양계의 천체에 관한 개요서를 집필하였다."
 verrier.120.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName](은)는 프랑스의 천문학자이자 수학자로 천체역학을 전공으로 하였으며, 해왕성의 존재와 위치를 수학적으로만 예측한 업적으로 가장 잘 알려져 있다. 그의 계산은 천왕성의 궤도가 케플러와 뉴턴의 법칙과 일치하지 않는 것을 설명하기 위한 것이었다. 베리에는 베를린에 머물던 요한 고트프리트 갈레에게 좌표를 보내 검증을 부탁하였다. 갈레는 베리에의 편지를 받은 바로 그날 밤, 예측 위치와 1° 이내의 오차로 해왕성을 발견하는 데 성공하였다. 이후 베리에는 \"... 한 번의 연구로 전 행성계를 포괄하고, 가능하다면 모든 것을 조화롭게 하며, 그렇지 않으면 아직 미지의 교란 요인이 있음을 확실히 밝히는 것...\"을 주제로 한 과제에 착수하였으며, 남은 한평생을 해당 연구에 바쳤다. 베리에는 우선 섭동함수로 알려진 행성의 섭동 계산법을 7차까지 재검토하는 작업에 착수하였다. 이후 1849년 총 469항으로 이루어진 계산 결과를 도출해낼 수 있었다. 그런 다음 1750년부터 기록된 행성 위치 관측 자료를 수집하였다. 그리고 1852년까지 이 자료들을 검토하고 최근 자료와의 불일치를 수정하는 데 집중하였다. 이렇게 완성된 성표는 1912년까지 프랑스 경도국에서 펴낸 천문연감인 《시간의 지식》(Connaissance des Temps)의 기본 천체력으로 활용되었다."
 verrier.120.h: "이 자가 조국을 위해 봉사하면 좋겠구나."
 verrier_congress_attend_modifier: "천문 학술회의 참석"
 verrier.121.t: "아스트라이아 발견"
 verrier.121.d: "프로이센의 아마추어 천문학자 카를 루트비히가 새로운 행성을 우연히 발견하여 '아스트라이아'라는 이름을 붙였다."
 verrier.121.f: "카를 루트비히 헨케는 본래 우체국 서기였으나 은퇴 후 본인이 열의를 보이던 천문학자에 몰두하기 시작했습니다. 1845년 12월 8일 루트비히는 태양계의 다섯 번째 소행성인 아스트라이아를 발견했습니다. 이는 마지막 행성으로 여겨진 베스타가 발견된 지 근 40년 만의 일이었습니다. 프로이센 국왕은 루트비히의 발견에 공로를 인정하여 연금 1,200마르크를 수여하였습니다. 아스트라이아의 발견은 소행성대에서 추가 발견의 서막이 되었으며, 해왕성 발견 이전의 마지막 주요 천체 발견 사례이기도 했습니다. 동시에 아스트라이아의 발견은 우주에 있는 이토록 작은 천체들이 과연 '행성'이라는 명칭을 가질 자격이 있는가에 관한 의문을 불러일으켰습니다. 당시 알렉산더 폰 훔볼트는 이러한 천체들을 '소행성'이라는 별개의 범주로 분류할 것을 제안하였습니다."
 verrier.121.g: "열두 번째 행성이군!"
 verrier.122.g: "요즘은 눈에 띄기만 하면 어떤 돌멩이든 행성이라 선언하는 것 같군."
 verrier.200.t: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](이)가 백조자리 61번과의 거리가 11.4광년임을 증명"
 verrier.200.d: "우주의 규모가 단번에 훨씬 커졌다. [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](은)는 백조자리 61번의 시차를 이용하여 별까지의 거리를 11.4광년으로 측정했다. 이 기술로 우주 연구에 엄청난 진전이 있을 것이다."
 verrier.200.f: "1836년 독일의 천문학자 프리드리히 베셀은 항성 간의 거리를 관측하는 데 처음으로 성공하였습니다. 이 관측을 위하여 베셀은 지구의 자전을 이용하여 고정된 별과 뒷배경의 상대적인 위치를 기록하는 시차를 활용하였습니다. 이는 마치 특정 물체를 오른쪽으로 보고 그 다음에 왼쪽눈으로 보는 것과 같습니다.\n\n이러한 위치 변화를 통해 거리를 계산할 수 있습니다."
 verrier.200.g: "천문학계의 위대한 날이오!"
 verrier_modern_astronomy_invented_modifier: "항성 간 거리의 첫 측정"
 verrier.201.t: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], 프라운호퍼선의 원인 규명"
 verrier.201.d: "태양 스펙트럼의 얇은 검은띠가 발생하는 이유는 오랫동안 추정의 영역으로 남아 있었다. 그런데 최근 [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] 박사가 마침내 그 이유를 알아냈다. 특정 화학 원소로 인해 선이 나타났다는 것이다. 이것으로 항성에 존재하는 원소가 무엇인지를 밝혀낼 수 있게 되었다."
 verrier.201.f: "독일의 요제프 프라운호퍼는 1813년 태양 스펙트럼에 뚜렷한 선이 존재한다는 것을 알아차렸다. 그로부터 수십년 뒤, 구스타프 로베르트 키르히호프와 로베르트 분젠은 그 선이 표시되는 원인을 규명하였다. 이들은 다양한 원소와 화합물을 태워 관찰하면서, 각 원소마다 스펙트럼의 특정 구간을 흡수한다는 사실을 알아냈다. 따라서 스펙트럼 상에 특정 구간이 흡수되면 그에 알맞는 특정 화합물이나 원소가 항성의 외부에 분포한다는 증거라고 주장하였다.\n\n분광학의 발명으로 항성을 유형별 구분 뿐만 아니라 화학 물질의 분광 분석도 가능하게 하였다. 심지어 헬륨의 발견 또한 태양을 분광 분석한 덕분에 이루어질 수 있었다."
 verrier.201.g: "우주의 또다른 신비가 풀렸군!"
 verrier.1001.t: "타라 왈리 코티 천문대의 건설"
 verrier.1001.d: "우리나라의 타라 왈리 코티 천문대의 공사 속도가 지지부진하다. 작년에 건설 속도를 높이기 위해 [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] 중령이 왕실 [concept_verrier_astronomer]로 임명된 바 있다. 이 자에게 예산과 지식을 지원하지 않으면 건설 과정은 수년이 더 걸릴지도 모른다. 하지만 무엇보다도 우선해야 할 질문은 우리가 이 천문대의 건설을 계속할 생각이 있는가이다."
 verrier.1001.f: "타라 왈리 코티 천문대는 국왕 나시르우드딘의 지시로 건립된 천문대였다. 나시르우드딘은 평소 천문학과 점성술에 관심이 많았고 캘커타에서 천문학을 공부하기도 했다.\n타라 왈리 코티는 '별들의 저택'이라는 뜻으로 1832년에 착공되어 9년 간의 공사 끝에 1841년에 완공되었다. 천문대로는 몇 년 동안만 쓰이다가 세포이 항쟁 당시에 군사 본부로 쓰였으며, 이후에는 은행으로 활용되었다."
 verrier.1001.g: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]의 지도라면 진척 속도가 빨라질 걸세!"
 verrier.1001.h: "그야말로 돈 낭비 아닌가!"
 stop_constructing_tara_wali_kothi_tt: "타라 왈리 코티 천문대의 건설을 중단하게 됩니다. 천문대를 지을 기회는 다시는 찾아오지 않습니다."
 verrier.1002.t: "타라 왈리 코티 천문대 준공"
 verrier.1002.d: "수년 간의 공사 끝에 타라 왈리 코티 천문대가 준공되었다. 이곳에는 최신 천문 기구가 설치되어 조국을 위대한 발견으로 이끌 것이다."
 verrier.1002.f: "[ROOT.GetCountry.GetRuler.GetFullName](은)는 커다란 망원경으로 별과 행성을 찾았다. 이제 타라 왈리 코티 천문대가 완공되었으니 [ROOT.GetCountry.GetName] 최고의 지성들을 모아 학생들을 가르칠 것이다. 그 자체로 미래를 향한 큰 진일보가 아닐 수 없다."
 verrier.1002.g: "별들의 저택이 조국을 새로운 발견으로 이끌 것이다!"
 je_verrier_tara_wali_kothi: "타라 왈리 코티 천문대의 건설"
 je_verrier_tara_wali_kothi_reason: "타라 왈리 코티 천문대가 아와드 왕국에서 건설되고 있습니다. 진행도는 여러 가지 방식에 따라 좌우될 수 있습니다."
 je_verrier_tara_wali_kothi_goal: "건설 진행도가 60 이상이 되어야 함"
 je_verrier_tara_wali_kothi_success: "건설 진행도가 60 이상에 도달함"
 verrier_add_20_tara_wali_kothi_progress_tt: "타라 왈리 코티 천문대의 #p 건설 진행도#! 20 추가"
 verrier_add_10_tara_wali_kothi_progress_tt: "타라 왈리 코티 천문대의 #p 건설 진행도#! 10 추가"
 verrier_kothe_buy_additional_instruments_button: "근대 천문 기구 입수"
 verrier_kothe_buy_additional_instruments_button_desc: "타라 왈리 코티 천문대에 들일 근대 천문 기구를 구매합니다. 이것으로 건설 속도가 더욱 빨라질 것입니다."
 verrier_kothe_employ_physics_teachers_button: "물리학 강사 채용"
 verrier_kothe_employ_physics_teachers_button_desc: "최신 물리학, 천문학 동향을 가르칠 사람을 채용해 우리 대학에 파견합니다. 이것으로 타라 왈리 코티 천문대의 완공을 앞당기고 연구 가속을 부여받게 됩니다."
 verrier_kothe_employ_foreign_engineers_button: "외국인 공학자 채용"
 verrier_kothe_employ_foreign_engineers_button_desc: "타라 왈리 코티 천문대에 필요한 천문 기구와 건물 시공에 외국인 공학자를 채용합니다. 이것으로 완공을 앞당기게 됩니다."
 verrier_kothe_pay_workers_extra_button: "추가 인부 수당 지급"
 verrier_kothe_pay_workers_extra_button_desc: "건설을 더 빨리 마무리하기 위하여 건설 인부를 추가로 투입합니다. 이것으로 완공을 앞당기게 됩니다."
 verrier.1011.t: "아테네 국립 천문대 착공"
 verrier.1011.d: "그리스 최초의 천문대 설립은 그리스의 근대화를 향한 또 하나의 진일보였다. 수많은 관중이 님프 언덕에 모여 그리스 역사의 길이 남을 이 순간을 눈에 담고자 하였다. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting](을)를 비롯하여 그리스 정부와 그리스 정교회 관계자들도 자리를 지켰다. 이들 모두가 이날을 기리며 하늘을 올려다보았다."
 verrier.1011.f: "사람들의 환호성 속에 주춧돌이 놓였다. 주춧돌에는 그리스의 새로운 천문대라는 취지에 걸맞게 태양계 그림이 새겨졌다.\n\n#b 실제 역사#!에서 아테네 국립 천문대는 1842년 6월 26일 일식이 벌어진 날에 착공되었다. 이는 당대 그리스에서 가장 유명한 과학자였던 게오르기오스 콘스탄티노스 부리스의 오랜 노력 끝에 성사된 일이었다.\n부리스는 오스트리아에서 오랫동안 살면서 오스트리아와 그리스 양측에 모두 좋은 관계를 맺고 있었다. 또 그리스계 오스트리아 은행가이자 사업가였던 게오르기오스 시나스를 설득하여 천문대 건립에 필요한 기부금을 마련하기도 했다. 천문대의 첫번째 건물은 시나스의 이름을 따서 명명되었다."
 verrier.1011.a: "우린 머지않아 전례 없는 정확도로 밤하늘을 관측할 수 있을 것이다."
 verrier.1012.t: "아테네 국립 천문대의 관측 개시"
 verrier.1012.d: "그리스 최초의 천문대인 아테네 국립 천문대가 오늘 완공되었다. 그리스 최초의 연구소로서 그리스 과학계에 있어 대단히 중요한 이정표가 되었다. 천문대에서는 태양과 달, 항성 관측에 집중하게 될 것이며, 이들의 연구가 천문학계에 새로운 발견으로 이어지기를 기대해 본다."
 verrier.1012.f: "망원경 렌즈 너머로 달이 선명하게 보였다. 참으로 놀라웠다. 달 표면의 조그마한 충돌구까지 볼 수 있었다.\n\n#b 실제 역사#!에서 아테네 국립 천문대는 1856년 그리스 천문학자 게오르기오스 콘스탄티노스 부리스가 설립하였다. 부리스는 2년 뒤 병에 걸려 빈에서 은퇴 생활을 보냈다. 후임으로 나선 요한 프리드리히 율리우스 슈미트는 천문대의 도서관을 확장하고 여러 개의 천체를 발견하였다. 슈미트의 주요 연구 대상은 달이었다. 대표 저작인 《달의 지형도》(Chaptre der Gebirge des Mondes)는 달에서 관측할 수 있는 모든 표면을 정밀화로 담아냈다. 또 린네 분화구의 형태가 변화했다는 사실도 알아내기도 했다.\n슈미트는 지진과 기상학에 관한 논문도 발표하였으며 트로이의 위치를 물색하기도 했다.\n\n  님프 언덕에 세워진 천문대도 여전히 사용 중에 있지만, 펜텔리 천문대, 크리오네리 천문대, 첼모스 천문대 등 아테네 국립 천문대의 부속 기관은 세 군데 더 지어져 활동 중에 있다."
 verrier.1012.g: "어떤 경이로움이 우리 앞을 기다리고 있을까?"
 verrier.1012.h: "부리스 씨가 큰 발견을 해낼 거라 믿네!"
 verrier.1013.t: "오토네이온 대학교의 첫 수강생"
 verrier.1013.d: "오토 전하께서 유럽의 여러 과학자들과 쌓은 인맥을 활용하여 '오토네이온 대학교'를 설립하였다. 새로 임용된 교수들은 대부분 서유럽에서 유학을 거치고 온 그리스인이다. 이들 학자들은 조국 그리스에 크나큰 지식을 선사하는 동시에 미래 세대의 교육에 큰 기여를 할 것이다. 현재 대학교는 건축가 스타마티오스 클레안티오스와 에두아르트 샤우베르의 자택에 강의실을 두고 있지만, 본관 건물이 완공되는 대로 이전할 전망이다."
 verrier.1013.g: "지식을 발판 삼아 강대국과의 격차를 따라잡을 것이다!"
 verrier.1013.h: "외세의 도움은 필요 없네!"
 verrier.1050.t: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]"
 verrier.1050.d: "수학자이자 천문학자인 [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName](은)는 라이프치히 천문대의 연구원으로 재직 중이다. 올해 본인의 최신 연구를 소개하는 천문학 서적인 《천문학의 원칙》을 출간하였다. 이 자를 정식 천문학자로 임명하면 틀림없이 쓸만한 인재가 될 것이다."
 verrier.1050.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName](은)는 수학자인 동시에 천문학자로도 활동하였다. 라이프치히 대학교의 강의를 맡는 동시에 천문학에 관한 서적을 여럿 출간하기도 하였다. 수학계에서는 주로 기하학 도형의 위치와 배열을 다루는 기하학의 한 분야인 위상수학에 관심을 가졌다. 이 인물이 남긴 가장 유명한 업적은 뫼비우스 띠로, 표면이 반드시 두 변을 가질 필요는 없다는 것을 보여주기 위해 직접 고안한 형태다."
 verrier.1050.g: "정말 대단해!"
 verrier.1050.h: "우리 수석 [concept_verrier_astronomer]가 되어주어야겠소!"
 verrier.1060.t: "태양을 스쳐 지나간 혜성을 계기로 하버드 대학에 후원 열풍"
 verrier.1060.d: "대낮에도 밝은 혜성이 관측되자 보스턴 시민들이 하버드 대학교에 많은 후원금을 보내주었다. 이 기부금은 천문대 건설에 활용될 전망이다. 하버드 대학교 전임 천문대장 윌리엄 크랜치 본드는 최신형 천문대가 건설되리라는 소식에 대단히 기뻐하는 모습이다."
 verrier.1060.f: "윌리엄 크랜치 본드는 시계공을 본업으로 아마추어 천문확자로 활동했던 사람이다. 처음에는 자택에 천문대를 지어 밤하늘을 측정하였다. 1839년 하버드 대학교의 무보수 관측원으로 임명되었는데 당시만 하더라도 본인의 장비를 직접 가져와야 했다. 1843년 하버드 대학교에 25,730달러 상당의 후원금이 들어오면서 비로소 최신형 관측소를 건설할 수 있었다.\n본드가 이룩한 업적 가운데 특히 토성의 위성인 하이페리온을 발견한 것이 유명하며, 아들과 함께 토성 최내곽 고리를 발견하기도 했다. 또 천체 사진술의 선구자로서 미국 최초로 별 사진을 촬영하는데 성공하였다."
 verrier.1060.g: "천문대의 건설을 시작하세!"
 verrier.1060.h: "아무렴, 우리는 이 기부금을 천문학 연구에 반드시 사용할 것이오!"
 verrier.1060.i: "기부금은 필요 없네!"
 verrier.1100.t: "부담이 과한 직업"
 verrier.1100.d: "우리 [concept_verrier_astronomer] [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](이)가 상당한 압박을 받고 있다고 한다. 아무래도 휴식을 권해야 할 차례가 아닌가 싶다."
 verrier.1100.f: "무슨 수를 써서라도 별을 더 찾아내야겠소! 별이 저렇게나 많은데! 다른 사람들이 못 찾은 별을 나도 못찾을 리는 없잖소? 혜성이나 소행성은 또 어떻고? 뭐라도 발견해야 한단 말이오!\n화성인은 또 어떨까? 가만, 화성인은 실존했던가? 아니면 화성 운하를 말하는 건가? 기억이 안 나는군. 헌데 내 기록지는 또 어디로 갔지?"
 verrier.1100.g: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]에겐 휴식이 필요하다!"
 verrier.1100.h: "자기 일인 것을 어쩌겠나. 더군다나 별을 찾으라 했지 쉬라고 돈 주는 건 아니란 말이오!"
 astronomer_on_break_tt: "[concept_verrier_astronomer]가 #n 1년#! 동안 휴식기에 들어갑니다. 이 기간 동안 평소대로의 이벤트는 받지 못하게 됩니다."
 verrier.1101.t: "정신이 나가버린 [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] 박사?"
 verrier.1101.d: "우리 [concept_verrier_astronomer] [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](이)가 뭔가를 까먹는 일이 점점 더 많아지고 있다. 아무래도 천문학자로서의 자리를 내려놓을 차례가 아닌가 싶다."
 verrier.1101.f: "기록지를 어디에 뒀더라? 가만, 점심은 먹었던가? 그리고 내 망원경에 붙은 이건 또 뭐야? 이거... 내 점심이던가?\n가만, 이 냄새는 또 뭐지? 저거 혹시 불 난건가? 어떻게 이럴 수가!?"
 verrier.1101.g: "아무래도 계속 일해선 안 될 듯하오."
 verrier.1101.h: "나 참, 평소대로구만!"
 verrier.1110.t: "쌍둥이 별의 소실"
 verrier.1110.d: "우리 [concept_verrier_astronomer] [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](이)가 밤하늘에서 똑같이 움직이는 쌍둥이 별을 발견했다고 믿어 의심치 않았다. 다른 학자들이 그 별들을 찾으려 하였으나 나타난 것은 하나 뿐이었다. [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]의 시력에 뭔가 심각한 문제가 생겼거나, 술에 취한 나머지 헷갈렸던 모양이다."
 verrier.1110.f: "정말이라니깐! (딸꾹) 그 자리에 두번째 별이 있었단 말이오! (딸꾹) 누가 봐도 완벽한  (딸꾹) 쌍둥이 별이 뚜렷하게 나타났단 말일세. (딸꾹) 모습을 감춰버린 게 틀림없어. (딸꾹) 아니면 우리 동료들이 거짓말을 하고 있을지 (딸꾹) 누가 알겠소!"
 verrier.1110.g: "정신 좀 차리시오!"
 verrier.1111.t: "연구 기록지 소실"
 verrier.1111.d: "[concept_verrier_observatory]에서 화재가 일어나 우리 [concept_verrier_astronomer] [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]의 연구 기록지 다수가 불에 타는 끔찍한 사고가 발생했다. 연구 기록지에 촛불이 옮겨붙은 것이 원인으로 보이지만, [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName](이)가 불길을 잡지 않은 이유는 명확히 알 수 없다."
 verrier.1111.f: "이런 일이 있을 줄은 몰랐소! 열심히 연구하고 망원경 들여다보기 바빠서 알아차릴 새도 없었다고!"
 verrier.1111.g: "술이라도 취했던 건가?"
 verrier.1111.h: "약이라도 취했던 건가?"
 verrier.1111.i: "정신착란을 일으킨 건가?"
 verrier.1111.j: "또 촛불 끄는 걸 깜빡한 건가?"
 verrier.1112.t: "잃어버린 별들"
 verrier.1112.d: "며칠 전 우리 [concept_verrier_astronomer] [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName](이)가 새로운 별을 발견하였다. 그런데 안타깝게도 그것들을 기록한 쪽지가 분실되어 별들을 다시 찾아낼 수 없게 된 모양이다. 기록이 사라진 것인지 아니면 어디에 놔뒀는지를 까먹은 것인지는 알 길이 없다."
 verrier.1112.f: "기록지가 어디 간 거야? 샅샅이 뒤져봤는데! 부엌에도, 쓰레기통에도, 책상 위에도... 전부 다 찾아봤는데!\n이렇게 되면 별도 함께 사라진 거잖아! 어떻게 이런 일이 있을 수가!"
 verrier.1112.g: "그 별들을 다시 찾아내기를 바라겠소!"
 alert_verrier_asteroid_congress_possible_alert_name: "소행성 학술회의 개최"
 verrier_asteroid_congress_possible_alert_setting_name: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon!#!소행성 천문회의 개최"
 alert_verrier_carte_congress_possible_alert_name: "카르트 뒤 시엘 학술회의 개최"
 verrier_carte_congress_possible_alert_setting_name: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon!#!카르트 뒤 시엘 학술회의 개최"
 alert_verrier_great_debate_possible_alert_name: "대논쟁 주최"
 verrier_great_debate_possible_alert_setting_name: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon!#!대논쟁 주최"
 alert_verrier_can_build_observatory_alert_name: "천문대 건설 가능"
 verrier_can_build_observatory_alert_setting_name: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon!#!천문대 건설 가능"
 alert_verrier_can_build_observatory_alert_hint: "우리나라가 [concept_verrier_observatory]를 지을 수 있게 되었습니다. 건물 창이나 생산 돋보기에서 건설할 수 있습니다."
 alert_verrier_can_update_observatory_pms_alert_name: "더 나은 천문대 생산 방식 활성화 가능"
 verrier_can_update_observatory_pms_alert_setting_name: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon!#!더 나은 천문대 생산 방식 활성화 가능"
 alert_verrier_can_update_observatory_pms_alert_hint: "우리 천문대는 더 나은 생산 방식을 활성화할 수 있습니다. 건물 창으로 가서 활성화해 보십시오."
 verrier.9000.t: "미시건 출신의 교사, 나무통으로 나이아가라 폭포를 건너려 시도"
 verrier.9000.d: "굉음을 내며 쏟아지는 폭포를 어떻게든 건너려는 것은 미친 짓에 가깝다. 그런데 나무통에 들어가서? 그것도 여자가? 에니 테일러는 바로 그런 사람이다. 나무통에 몸을 싣고 나이아가라 폭포를 따라 내려가려는 사람인 것이다.\n이 사람의 계획을 막아야 할까, 아니면 위험을 무릅쓰도록 해야 할까?"
 verrier.9000.f: "\"익사한다에 5달러 내겠소!\"\n\"살아서 내려온다에 10달러 걸겠네!\"\n\n#b 실제 역사#!에서 나이아가라 폭포를 건너거나, 뜬 채로 내려가거나, 뛰어내리려는 시도가 몇 차례 있었다. 대부분의 시도는 목숨을 잃는 것으로 끝났고, 살아남았다 하더라도 벌금형과 처벌에 직면해야 했다."
 verrier.9000.g: "이런 미친 짓은 당장 막아야 한다!"
 verrier.9000.h: "내 알 바 아니오. 원한다면 하게 내버려 두자고..."
 verrier_niagara_falls_not_allow_barrel_tt: "해당 교사의 계획을 저지한다면 틀림없이 나쁜 일이 벌어지게 됩니다."
 verrier_niagara_falls_allow_barrel_tt: "해당 교사가 나무통을 타고 나이아가라를 건넌 최초의 인간으로 등극할 수 있습니다. 그렇지 않다면 영영 살아남지 못하게 됩니다."
 verrier.9001.t: "애니 에드슨 테일러, 나무통으로 나이아가라 폭포 횡단에 최초로 성공"
 verrier.9001.d: "에니 에디슨 테일러가 자신의 시도가 죽음으로 끝날 것이라 생각한 사람들이 많았음에도 나이아가라 폭포에서 뛰어내려 살아남는 데 성공하였다. 출혈 등의 부상은 입었지만 건강에는 아무 이상이 없었다. 그럼에도 에디슨 테일러는 다른 사람들에게 똑같은 시도에 나서지 말라고 경고하고 있다. 지역 당국 역시 이러한 시도를 법으로 처벌하는 방안을 내놓았다."
 verrier.9001.f: "\"다시는 누구도 이런 짓을 하여서는 안 되겠습니다.\"\n\n#b 실제 역사#!에서도 1901년 애니 에드슨 테일러는 나이아가라 폭포에서 뛰어내려 살아남았다. 하지만 바닥에 닿자마자 피를 흘리게 되었고, 자신을 따라하려는 사람들에게 경고를 남겼다.\n그럼에도 똑같은 시도를 하는 사람들이 있었는데, 1920년에는 찰스 스티븐스라는 사람이 같은 시도에 나섰다가 처음으로 죽음을 맞이하게 되었다."
 verrier.9001.g: "운이 좋았군. 이제 두 번 다시 그런 일은 없도록 금지해야 하네!"
 verrier.9002.t: "애니 에드슨 테일러, 나이아가라 폭포 횡단 시도 중에 사망"
 verrier.9002.d: "많은 사람들이 예상했던 일이 결국 벌어지고 말았다. 애니 에드슨 테일러는 나무통에 몸을 싣고 나이아가라 폭포를 건너려다 목숨을 잃고 말았다. 처음에 폭포 아래에 도달하면서 큰 부상을 입기는 했지만 살아남았던 것으로 보인다. 그러나 나무통 안으로 물이 들어오면서 빠져나오지 못하고 그대로 익사한 것이다. 참으로 안타까운 죽음이다."
 verrier.9002.f: "\"미시간에서 온 여성이 나무통에 타고 거대한 폭포를 건너려다 사망.\"\n\n#b 실제 역사#!에서도 1901년 애니 에드슨 테일러는 나이아가라 폭포에서 뛰어내려 살아남았다. 하지만 바닥에 닿자마자 피를 흘리게 되었고, 자신을 따라하려는 사람들에게 경고를 남겼다.\n그럼에도 똑같은 시도를 하는 사람들이 있었는데, 1920년에는 찰스 스티븐스라는 사람이 같은 시도에 나섰다가 처음으로 죽음을 맞이하게 되었다."
 verrier.9002.g: "어리석은 짓을 하면 어리석은 결실을 거두는 법... 다시는 누구도 이런 짓을 못하게 막아야 한다."
 verrier_barrel_successful_modifier: "나무통으로 나이아가라 폭포 횡단 성공"
 verrier_barrel_unsuccessful_modifier: "죽음으로 끝난 나무통 탐험"
 verrier.9003.t: "얼어붙은 나이아가라 폭포"
 verrier.9003.d: "살얼음 같은 겨울철 날씨로 나이아가라 폭포가 점차 얼어붙기 시작했다. 그 한편으로 폭포 아래에 얼음다리가 벌써 만들어졌다. 사람들은 그 광경을 보기 위해 모여들었고 약삭빠른 장사꾼들은 얼음 위에 벌써부터 노점상을 차려놓고 있다. 그러나 언젠가 얼음이 무너져 내릴 것이란 경고의 목소리도 일고 있다. 정부 차원에서 시민들을 통제해야 할 것인가?"
 verrier.9003.f: "\"이런 얼음 왕국이 다 있나! 정말 마법 같군! 이만한 겨울 왕국이라면 아름다운 순간으로 영원히 기억되리라 믿어 의심치 않네!\"\n\n#b 실제 역사#!에서 북아메리카의 수원지대는 계속해서 얼어붙었고 나이아가라 폭포도 예외는 아니었다. 얼음이 떨어지면서 폭포 아래에 '얼음다리'를 만드는 경우가 잦았고, 1880년대부터는 사람들이 그곳에 모여 오락과 술을 즐기는 일종의 민속 축제를 열기도 했다."
 verrier.9003.g: "안전은 확보해야지. 얼음다리 출입을 막도록."
 verrier.9003.h: "모두들 그 위험성은 충분히 인지하고 조심하고 있지 않은가!"
 verrier_niagara_falls_no_security_tt: "얼음다리 출입을 막지 않습니다. 아무 사고가 없길 바라야겠지만 과연 #n 무슨 일#!이 벌어질지는 모르는 법입니다..."
 verrier.9004.t: "나이아가라 폭포의 얼음다리 붕괴로 사망자 다수 발생"
 verrier.9004.d: "나이아가라 폭포에서 끔찍한 소식이 전해졌다. 얼음다리가 무너져 내려 그 조각들이 엄청난 속도로 강을 따라 떠내려갔다. 다리 위에 서 있던 사람들 대다수는 무사히 빠져나왔지만, 안타깝게도 몇몇 사람들은 얼음다리에 고립되고 말았다. 소방관들이 구조를 시도했지만 거센 물살에 휩쓸려 얼음과 물이 뒤섞인 채 목숨을 잃고 말았다.\n조금이라도 노력했다면 미연에 방지했을 참사에 [SCOPE.sState('niagara_falls_state_scope').GetName] 정부를 향한 거센 비판 여론이 제기되고 있다."
 verrier.9004.f: "\"대포 쏘는 듯이 우르렁 소리가 들리더니, 저 큼직한 폭포 바로 아래 협곡에 있던 거대한 얼음다리가 위에 사람들을 둔 채 갑자기 순식간에 사라져 버렸지 뭡니까. 어떤 사람들은 물속으로 뛰어들어 간신히 몸을 겨누고 추위에 떨며 강가에 올라왔던데, 또 어떤 사람들은 몸이 너무 느려서 거대한 얼음 덩어리와 함께 강물을 따라 휩쓸려 가는 걸 속수무책으로 지켜볼 수밖에 없었다구요.\"\n\n#b 실제 역사#!에서 북아메리카의 수원지대는 계속해서 얼어붙었고 나이아가라 폭포도 예외는 아니었다. 얼음이 떨어지면서 폭포 아래에 '얼음다리'를 만드는 경우가 잦았고, 1880년대부터는 사람들이 그곳에 모여 오락과 술을 즐기는 일종의 민속 축제를 열기도 했다. 1912년에는 얼음다리가 무너져 세 명이 사망하는 사고가 벌어졌다. 그 후로 방문객들을 대상으로 얼음 위를 밟지 말라는 경고 조치가 내려졌다."
 verrier.9004.g: "그야말로 있을 수 없는 참사로군!"
 verrier.9005.t: "나이아가라 폭포의 얼음이 녹아내리다"
 verrier.9005.d: "나이아가라 폭포가 다시 고요해졌다. 얼음은 잠시 동안만 얼어붙었다가 이제는 완전히 녹아내렸다. 폭포수는 평소처럼 다시 굉음을 내며 분지로 쏟아져내리고 있다. 짧았던 그 순간은 아름다운 추억과 일부 지역 장사꾼들의 쏠쏠한 수익으로 남게 되었다. 나이아가라 폭포가 언제 또 다시 얼어붙을지 누가 알겠는가?"
 verrier.9005.f: "\"언젠가 애들한테 얼음다리 위에 서 있었는데 쩍 하는 소리가 들렸더라 하는 이야기를 들려주렵니다. 다행히 큰일은 아니었지요. 오히려 아내와 함께 얼음 위에서 춤도 춰 봤다구요!\"\n\n#b 실제 역사#!에서 북아메리카의 수원지대는 계속해서 얼어붙었고 나이아가라 폭포도 예외는 아니었다. 얼음이 떨어지면서 폭포 아래에 '얼음다리'를 만드는 경우가 잦았고, 1880년대부터는 사람들이 그곳에 모여 오락과 술을 즐기는 일종의 민속 축제를 열기도 했다. 1912년에는 얼음다리가 무너져 세 명이 사망하는 사고가 벌어졌다. 그 후로 방문객들을 대상으로 얼음 위를 밟지 말라는 경고 조치가 내려졌다."
 verrier.9005.g: "좋았어!"
