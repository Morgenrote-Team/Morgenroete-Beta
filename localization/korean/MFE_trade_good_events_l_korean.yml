l_korean:
 MFE_trade_good_events.1.t: "[SCOPE.sW('active_war').GetName]를 위한 총알"
 MFE_trade_good_events.1.d: "[SCOPE.sC('munitions_state').GetName]에 있는 군수 공장이 최근에 강화되었다는 보고가 들어왔다."
 MFE_trade_good_events.1.f: "\"[SCOPE.sC('munitions_state').GetAdjective] 언론은 이 놀라운 성과를 보도하는 데 열을 올리고 있는데 참 그럴 만도 하오.\""
 MFE_trade_good_events.1.a: "전쟁에 직면했나 보군."
 MFE_trade_good_events.2.t: "군수품 구걸"
 MFE_trade_good_events.2.d: "[SCOPE.sC('ally').GetName]이 [SCOPE.sW('active_war').GetName]에 참전하면서 탄약 비축량이 바닥을 드러냈고 우리 측에 탄약을 지원해 달라고 간청하고 있다."
 MFE_trade_good_events.2.f: "\"[ROOT.GetCountry.GetName]여, 가격만 제시하여 주시오, 전쟁에서 이기기만 한다면, 그 액수는 귀국의 것이니\""
 MFE_trade_good_events.2.a: "탄약 좀 내어 줍시다."
 MFE_trade_good_events.2.b: "탄약도 없이 적군을 어떻게 무찌르란 말인가?!"
 MFE_trade_good_events.3.t: "비밀리에 요청해온 [SCOPE.sC('ally').GetName]"
 MFE_trade_good_events.3.d: "[SCOPE.sC('ally').GetName] 측이 이번 전쟁에 대비가 되어 있지 않아 특히 탄약을 비롯한 물자가 벌써 바닥을 드러내고 있단 정보를 [SCOPE.sW('active_war').GetName]에서 입수한 모양이다.\n\n이들은 우리에게 외교관을 비밀리에 파견해, 화포 지원을 해 준다면 무슨 요구든 들어주겠다고 나섰다."
 MFE_trade_good_events.3.f: "\"믿어주십시오... [SCOPE.sC('ally').GetName](은)는 기필코 이번 전쟁에서 승리할 수 있습니다. 허나 우리에겐 도움이 필요합니다! 가장 절망적인 순간에 저희를 저버리지 마십시오!\""
 MFE_trade_good_events.3.a: "화포 좀 내어 줍시다."
 MFE_trade_good_events.3.b: "우리 쪽 물자도 너무 부족할 듯 한데."
 MFE_trade_good_events.4.t: "보안 구멍"
 MFE_trade_good_events.4.d: "우리 정보기관이 [SCOPE.sS('arms_state').GetName]의 군수공장에 침입 사건이 발생하여 대량의 폭약이 사라졌다고 보고했다."
 MFE_trade_good_events.4.f: "그런 일이 벌어지고도 어떻게 보고만 있었는가?"
 MFE_trade_good_events.4.a: "부디 그릇된 손에 들어가지 않았기를..."
 MFE_trade_good_events.5.t: "[SCOPE.sS('arable_state').GetName]의 대풍작"
 MFE_trade_good_events.5.d: "[SCOPE.sS('arable_state').GetName] 지역에 내린 비가 농장에 엄청난 영향을 주어 벌써부터 모두의 예상을 깨고 상당한 농업 생산량을 기록했다는 보고가 계속해서 이어지고 있다."
 MFE_trade_good_events.5.f: "\"올해 수확량이 너무 좋아서 이번에는 일손을 많이 들여야겠는데, 그럴 여력은 남아 있으니 다행이구만.\""
 MFE_trade_good_events.5.a: "이보다 더 좋을 순 없을 것이다."
 MFE_trade_good_events.6.t: "전차 공장의 광인"
 MFE_trade_good_events.6.d: "[SCOPE.sS('tank_state').GetName]의 현지 언론에서 끔찍한 소식이 지면을 채우고 있다. 한 미치광이가 어떻게 했는지 전차를 탈취하여 마을 전체를 파괴하고, 수심 명의 무고한 시민들을 살해한 뒤 경찰에게 제압당했다고 한다."
 MFE_trade_good_events.6.f: "\"이런 무의미한 비극이 왜 일어났는가는 아무도 알지 못하고, 우리도 그 이유를 영영 알아내지 못할 것이다.\""
 MFE_trade_good_events.6.a: "고통을 함께 나누겠지만 도움은 줄 수 없다네."
 MFE_trade_good_events.6.b: "필요한 건 뭐든 내어주게. 정말이지 끔찍한 일이야..."
 MFE_trade_good_events.7.t: "[SCOPE.sS('plane_state').GetName]에 대한 투자 열기"
 MFE_trade_good_events.7.d: "항공기 투자자들이 [SCOPE.sS('plane_state').GetName]에 몰려들면서 현지 공장과의 계약 확보를 위하여 치열한 경쟁을 벌이고 있다."
 MFE_trade_good_events.7.f: "\"이런 모습은 내 정말이지 처음 본다니깐요. 기업가들이 늦기 전에 조금이라도 한 입 덜어먹으려고 난리도 아니랍니다.\""
 MFE_trade_good_events.7.a: "[SCOPE.GetRootScope.GetCountry.GetName]에 살기 가장 좋은 시대로군."
 MFE_trade_good_events.8.t: "형편없는 조선술"
 MFE_trade_good_events.8.d: "[SCOPE.sS('ironclad_state').GetName]에서 수출하는 상선의 만듦새가 조잡한 바람에 시장의 여론이 빠르게 악화되고 있다. "
 MFE_trade_good_events.8.f: "\"물에 띄운 지 한 달도 안된 배가 이렇게까지 녹이 슬 수가 있나? 이렇다면 저품질 강철을 썼다는 말밖에 안 되는군.\""
 MFE_trade_good_events.8.a: "공급 여건이 나아지길 바랄 뿐이다."
 MFE_trade_good_events.9.t: "보람 없는 책임"
 MFE_trade_good_events.9.d: "[SCOPE.sS('grain_state').GetName]의 곡물 부족 사태가 사회적 문제를 불러일으키면서, 이 때를 틈타 지식인의 급진 세력이 [SCOPE.GetRootScope.GetCountry.GetName]의 사태 수습 부족을 두고 거센 비판에 나서고 있다."
 MFE_trade_good_events.9.f: "'국민을 먹여살릴 능력이 없는 정부에게 국민의 권력을 맡겨서는 안 된다'"
 MFE_trade_good_events.9.a: "저들이 정말로 살기 위해 식량이 필요한지는 모르겠군."
 MFE_trade_good_events.9.b: "[SCOPE.sS('grain_state').GetName]에 예산 일부를 돌리자"
 MFE_trade_good_events.9.c: "지난번에 보아하니, [SCOPE.sS('grain_state').GetName]의 상점마다 사먹을 만한 케이크가 가득하던데."
 MFE_trade_good_events.10.t: "코를 찌르는 새우와 농어"
 MFE_trade_good_events.10.d: "최근 [SCOPE.sS('fish_state').GetName]에서 조업하는 어선들의 어획물이 고약한 맛이 난다고 한다. 해산물 종류마다 기름지고 끈적이는 질감에 썩은 생선 맛이 나고 있다."
 MFE_trade_good_events.10.f: "'윽, 당신 냄새 안 나? 당연히 나겠지, 여기 들어오자마자 뛰쳐 나가고 싶지 않나. 저기 길고양이들도 이딴 건 거를 것이야.'"
 MFE_trade_good_events.10.a: "생선 비린내가 이렇게나 독할 수가?"
 MFE_trade_good_events.11.t: "[SCOPE.sS('ship_state').GetName]의 조선소"
 MFE_trade_good_events.11.d: "[SCOPE.sS('ship_state').GetName]의 항만소장이 본 지역에서 건조 중인 군함이 완성되었다고 보고해 왔다."
 MFE_trade_good_events.11.f: "\"군함 진수식에는 명명식이 관례이오니 샴페인 한 병을 마련해 오시기를 부탁드리겠습니다.\""
 MFE_trade_good_events.11.a: "정말 반가운 소식이로군! 그것도 기한에 앞당겨서 말이지."
 MFE_trade_good_events.11.b: "그렇다면 샴페인을 더 들여와야겠지!"
 MFE_trade_good_events.12.t: "[SCOPE.sS('fabric_state').GetName]산 섬유"
 MFE_trade_good_events.12.d: "[SCOPE.sS('fabric_state').GetName]에서 생산되는 섬유가 우수한 품질로 세계적인 명성을 얻고 있다."
 MFE_trade_good_events.12.f: "\"햇빛에 비추면 이렇게 색이 변한다니. 이집트산 면화으로 만든 것 같지 않아?\""
 MFE_trade_good_events.12.a: "산업이 번창하는 소식을 들을 때면 언제나 기쁘단 말이지."
 MFE_trade_good_events.12.b: "이 정도 품질이라면 고급 맞춤복에 걸맞지 않은가!"
 MFE_trade_good_events.13.t: "제재소 대화재"
 MFE_trade_good_events.13.d: "[SCOPE.sS('sawmill_fire_state').GetName] 지역 일간지가 끔찍한 화재가 발생하여 도시의 상당 구역을 불태워 버렸다고 보도하였다."
 MFE_trade_good_events.13.f: "\"도시 외곽에서 기름 묻은 걸레 더미에 불이 붙어 발생한 이번 화재로 총 139명이 사망하고 말았다.\""
 MFE_trade_good_events.13.a: "참으로 안타깝다! 저 불쌍하기 그지없는 넋이여..."
 MFE_trade_good_events.13.b: "지금 즉시 지원에 나서도록!"
 MFE_trade_good_events.14.t: "[SCOPE.sS('hardwood_state').GetName]의 최고급 목재"
 MFE_trade_good_events.14.d: "[SCOPE.sS('hardwood_state').GetName] 전역의 가구 제조업체들이 현지 삼림의 활엽수를 자재로 사용하여 명성을 떨치고 있다."
 MFE_trade_good_events.14.f: "\"자, 나뭇결을 자세히 보시고 판자를 한번 두드려 보십시오... 소리 들리십니까? 강도가 무척 높고 견고하지요... 백 년은 거뜬히 쓸 만 할 겁니다.\""
 MFE_trade_good_events.14.a: "잘 됐군, 그렇지 않나?"
 MFE_trade_good_events.14.b: "그거 참 좋은 소식인걸! 그 나무로 악기를 만들어 보세!"
 MFE_trade_good_events.15.t: "[SCOPE.sS('grocery_state').GetName]의 조직 범죄 횡행"
 MFE_trade_good_events.15.d: "[SCOPE.sS('grocery_state').GetName] 지역의 굶주린 주민들이 갱단을 이루어 채소가게와 식료품점을 털고 있다는 소식이다."
 MFE_trade_good_events.15.f: "\"소고기 구이 1파운드 가격이 반년 전보다 두 배나 올랐는데, 서민들에게 남은 선택지가 무엇이 있겠소?\""
 MFE_trade_good_events.15.a: "경찰이 이 사태를 마무리짓기를 바라겠소."
 MFE_trade_good_events.15.b: "무력을 동원하기보다는 구호품을 보냅시다!"
 MFE_trade_good_events.16.t: "닳아 해진 살림살이"
 MFE_trade_good_events.16.d: "면화 가격이 상승하면서 [SCOPE.sS('clothes_state').GetName] 지역의 의류 가격이 폭등했다."
 MFE_trade_good_events.16.f: "\"아 그러믄요, 정말이지 나쁘다니까. 길에 아이들이 밀가루 포대를 거적데기마냥 걸치고 다니던데 그런 애들이면 운이 썩 좋은 편이지.\""
 MFE_trade_good_events.16.a: "이런 비극에도 어찌할 도리가 없군..."
 MFE_trade_good_events.16.b: "모두에게 밀가루 포대 정도는 나눠줄 수 있겠지..."
 MFE_trade_good_events.17.t: "진열실의 비극"
 MFE_trade_good_events.17.d: "[SCOPE.sS('furniture_state').GetName] 지역의 가구 공장을 방문한 [SCOPE.GetRootScope.GetCountry.GetRuler.GetFullName](이)가 의자에 앉았다가 갑자기 쓰러져 서거하고 말았다."
 MFE_trade_good_events.17.f: "\"[SCOPE.sS('furniture_state').GetName] 지역에 대규모 경찰 병력이 배치되어 사건 진상을 파악하기는 어려우나 이번 사건이 비극인 것은 틀림없는 사실이다.\""
 MFE_trade_good_events.17.a: "안타까운 사고였을까, 아니면 악의적인 행위였을까?"
 MFE_trade_good_events.17.b: "음... 살인 의자라. 저런 거라면 소장품으로 둘 만한 걸."
 MFE_trade_good_events.18.t: "세계 최고의 종이"
 MFE_trade_good_events.18.d: "[SCOPE.sS('paper_state').GetName] 지역의 종이 생산력이 모두의 기대치를 뛰어넘으면서 해당 지역은 종이 생산으로 유명한 고장으로 거듭나게 되었다."
 MFE_trade_good_events.18.f: "\"20년 전만 하더라도 마을에 공장이라곤 없었는데, 지금은 거리마다 하나씩 들어섰구만.\""
 MFE_trade_good_events.18.a: "남는 건 좀 빳빳한 걸로 바꿔 치워야겠지. 알아듣겠나?"
 MFE_trade_good_events.18.b: "종이 주세요!"
 MFE_trade_good_events.19.t: "별 끄고 지내기"
 MFE_trade_good_events.19.d: "[SCOPE.sS('power_state').GetName] 지역에서 전기 수요가 늘어나면서 가로등으로 인해 빛 공해가 심각해지고 있다."
 MFE_trade_good_events.19.f: "\"예전엔 맑은 날 밤에 마을 광장에서도 북두칠성을 볼 수 있었는데, 지금은 밤하늘 좀 보려면 시골로 나가야 하는구만.\""
 MFE_trade_good_events.19.a: "진보가 이어지면 의도찮은 결과도 따른다, 그런 말이 있지."
 MFE_trade_good_events.19.b: "밤중에는 조명을 좀 끄도록 하시오!"
 MFE_trade_good_events.20.t: "폭발 사태"
 MFE_trade_good_events.20.d: "[SCOPE.sS('sulfur_state').GetName] 지역 인근의 유황 광산에서 대규모 폭발이 발생하여 작업 현장이 무너져 내리고 수백 명의 광부가 목숨을 잃었다."
 MFE_trade_good_events.20.f: "\"여느 때와 다를 바 없이 평범한 날이 될 줄 알았건만, 천지가 진동하더니 끔찍한 소리가 들려오는 게 아니겠소...\""
 MFE_trade_good_events.20.a: "지하에 갇힌 광부가 있는가? 정말 참혹하군."
 MFE_trade_good_events.20.b: "유황 캔 건 어떻게 됐소? 멀쩡한가? 전부 괜찮은 거요?"
 MFE_trade_good_events.21.t: "납 광산의 아찔한 풍경"
 MFE_trade_good_events.21.d: "[SCOPE.sS('lead_state').GetName] 지역의 납 광산에 사고가 벌어져 모든 것이 한순간에 무너지고 말았다."
 MFE_trade_good_events.21.f: "\"광부들이 지하에 갇힌 동료들을 구조하기 위해 애를 쓰고 있지만, 상황이 그리 좋아 보이지는 않는다...\""
 MFE_trade_good_events.21.a: "이런 비극적이고 말도 안 되는 인명 손실에 깊은 애도를 표합니다."
 MFE_trade_good_events.21.b: "우리나라 최고의 납 광산이었건만!"
 MFE_trade_good_events.22.t: "유해 화학물질 유출"
 MFE_trade_good_events.22.d: "[SCOPE.sS('lead_state').GetName] 인근의 납 광산에서 흘러나온 납 성분이 지역 식수원을 오염시키고 있다."
 MFE_trade_good_events.22.f: "\"농민들은 그 물 때문에 신장에 문제가 생기고 머리가 빠진다고 밝히고 있으며, 연대의 표시로 [SCOPE.GetRootScope.GetCountry.GetRuler.GetFullName](이)가 지역 우물물을 마셔야 한다고 목소리를 높이고 있다.\""
 MFE_trade_good_events.22.a: "전혀 그럴 생각 없소! 그 잔 좀 치워 버리게."
 MFE_trade_good_events.22.b: "물맛이 아주 일품인걸!"
 MFE_trade_good_events.23.t: "새 시대의 개막"
 MFE_trade_good_events.23.d: "'고무'라 하는 기적의 물질이 수도에서부터 시골 구석까지 모두의 삶을 변화시키고 있다."
 MFE_trade_good_events.23.f: "\"호들갑처럼 들릴 지 모르지만, 이런 놀라운 물질로 거의 모든 것을 만들 수 있다는 점에서, 우리는 새 시대로 접어들고 있다고 해도 과언이 아니오!\""
 MFE_trade_good_events.23.a: "이 소재가 가져올 기술 발전을 기꺼이 받아들입시다."
 MFE_trade_good_events.23.b: "더 많이 생산해 봅시다!"
 MFE_trade_good_events.24.t: "[SCOPE.sS('oil_state').GetName]의 흑빛 금"
 MFE_trade_good_events.24.d: "[SCOPE.sS('oil_state').GetName]에서 발견된 다량의 석유로 하룻밤 새 백만장자가 된 사람들이 생겨나면서, 전국적으로 석유 채굴에 대한 관심이 높아지고 있다."
 MFE_trade_good_events.24.f: "\"이게 별 거 아닌 것처럼 보여도 내 장담컨대 같은 무게의 금만큼 가치를 지닌다니까!\""
 MFE_trade_good_events.24.a: "우리나라 중공업계에서 석유를 있는 대로 끌어 쓰는 상황에서 참으로 반가운 소식이로군."
 MFE_trade_good_events.24.b: "난 진짜 금이 좋은데!"
 MFE_trade_good_events.25.t: "지역 사회를 박살 내는 제철소"
 MFE_trade_good_events.25.d: "[SCOPE.sState('steel_state').GetName] 지역 주민들이 마을에 제철소를 들인 것을 후회하며 옛 모습대로의 생활 방식이 사라지는 것에 한탄하고 있다."
 MFE_trade_good_events.25.f: "\"처음에는 그저 일거리가 생긴다기에 반가운 마음이었는데, 하루 16시간에 일주일 내내 일하는 건... 이게 어디 사람 사는 것인가?\""
 MFE_trade_good_events.25.a: "[ROOT.GetCountry.GetName]의 미래를 생각하면 튼튼한 철강 산업이 필수적이다."
 MFE_trade_good_events.25.b: "근무 시간 정도는 줄일 수 있겠지..."