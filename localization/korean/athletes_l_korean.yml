l_korean:
 athletes.2.t: "우리의 산악인 [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullNameNoFormatting]의 은퇴"
 athletes.2.d: "수십 년 간 정상에 오르고, 미지의 경로를 개척하며, 위험한 지형을 탐험하는 데 인생을 바친 [SCOPE.sCharacter('athletes_retired_person_scope').GetFullName](이)가 은퇴를 결심했다. [SCOPE.sCharacter('athletes_retired_person_scope').GetSheHe|U]는 이제 더 이상 [concept_douglas_mountaineer]으로 활동하지 않는다."
 athletes.2.f: ""
 athletes.2.g: "정상은 결코 끝이 아니었고 하산 전 경치만 남았다."
 athletes.12.t: "우리 산악인의 사망"
 athletes.12.d: "일생을 험준한 봉우리를 정복하고 다른 이들을 가장 위험한 등반길로 이끌며 보낸, 우리가 가장 존경하던 [concept_douglas_mountaineer]가 세상을 떠났다. 이제 구름 너머의 길을 이끌 사람은 누구인가?"
 athletes.12.f: ""
 athletes.12.g: "그들의 밧줄은 사라졌지만 그들의 흔적은 남아 있다."
 athletes.52.t: "새로운 산악인"
 athletes.52.d: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetFullName]는 유망한 인재로서 장차 우리의 산봉우리를 정복하는 최고의 산악인으로 거듭날 것으로 거론되고 있다."
 athletes.52.f: ""
 athletes.52.g: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetSheHe|U]는 결의를 갖고 등반에 임한다."
 athletes.102.t: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]의 베테랑 산악인 등극!"
 athletes.102.d: "빙하를 헤치고 능선을 건너며 미지로 향하는 원정대를 이끌어 온 우리의 [concept_douglas_mountaineer] [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]는 그간의 명성으로 바탕으로 이제 베테랑 산악인으로 불리우게 되었다!"
 athletes.102.f: ""
 athletes.102.g: "등산의 달인이로다!"
 athletes.53.t: "신임 감독"
 athletes.53.d: "새로운 [concept_vikelas_coach]가 인사를 나누러 왔다. [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerHis|U]의 이름은 [SCOPE.sCharacter('vikelas_new_coach_scope').GetFullName]이다."
 athletes.53.f: ""
 athletes.53.g: "[SCOPE.sCharacter('vikelas_new_coach_scope').GetSheHe|U]가 우리 제군들을 승리로 이끌 것이다."
 athletes.103.t: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName]의 대표 감독 등극!"
 athletes.103.d: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName](은)는 온 세대의 선수들을 훈련시키고 성장시키며 그 이름을 알렸다. [ROOT.Var('vikelas_coach_var').GetCharacter.GetSheHe]는 그간의 명성을 바탕으로 이제 대표 감독으로 불리우게 되었다!"
 athletes.103.f: ""
 athletes.103.g: "경기장에서 부끄럼 없이 소리칠 수 있는 능력에 대한 상이다."