l_korean:

 ### Athletes ###

 athletes.2.t: "산악인, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullNameNoFormatting], 은퇴" #deepl:814507835
 athletes.2.d: "수십 년 동안 정상 등반, 미지의 루트 개척, 위험한 지형에서의 탐험을 이끌며 [SCOPE.sCharacter('athletes_retired_person_scope').GetHerHis] 의 삶을 살아온 [SCOPE.sCharacter('athletes_retired_person_scope').GetFullName] 은 은퇴를 결정했습니다. [SCOPE.sCharacter('athletes_retired_person_scope').GetSheHe|U] 은 더 이상 [concept_douglas_mountaineer] 의 역할을 하지 않습니다." #deepl:3082522384
 athletes.2.f: ""
 athletes.2.g: "정상은 결코 끝이 아니었고 하산 전 경치만 남았습니다." #deepl:3095673486
 athletes.12.t: "산악인 사망" #deepl:3903757311
 athletes.12.d: "평생 봉우리를 정복하고 가장 위험한 등반을 통해 다른 사람들을 안내한 후, 가장 존경받는 산악인 [concept_douglas_mountaineer] 이 세상을 떠났습니다. 이제 누가 구름 속으로 길을 안내할까요?" #deepl:820605549
 athletes.12.f: ""
 athletes.12.g: "그들의 밧줄은 사라졌지만 그들의 흔적은 남아 있습니다." #deepl:3208123983

 athletes.52.t: "새로운 마운티니어" #deepl:1807684299
 athletes.52.d: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetFullName] 언젠가 최고의 자리에 오를 수 있는 유망한 인재입니다." #deepl:1736780592
 athletes.52.f: ""
 athletes.52.g: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetSheHe|U] 목적을 가지고 등반합니다." #deepl:1012883623

 athletes.102.t: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] 이제 베테랑 산악인이 되었습니다!" #deepl:4259800261
 athletes.102.d: "빙하를 뚫고 능선을 넘고 미지의 탐험을 이끈 후, 이제 베테랑 산악인( [concept_douglas_mountaineer] [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] )이라고 불릴 만큼 유명해졌습니다!" #deepl:334481273
 athletes.102.f: ""
 athletes.102.g: "산의 달인!" #deepl:1052077048
