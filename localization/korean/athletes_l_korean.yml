l_korean:
 athletes.2.t: "우리의 등산가 [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullNameNoFormatting]의 은퇴"
 athletes.2.d: "수십 년 동안 산을 오르고, 미지의 경로를 개척하며, 위험한 지형을 탐험해 온 [SCOPE.sCharacter('athletes_retired_person_scope').GetHerHis] 삶 끝에, [SCOPE.sCharacter('athletes_retired_person_scope').GetFullName]는 은퇴를 결정했습니다. 이제 [SCOPE.sCharacter('athletes_retired_person_scope').GetSheHe|U]는 더 이상 우리 [concept_douglas_mountaineer]로서 활동하지 않을 것입니다."
 athletes.2.f: ""
 athletes.2.g: "정상은 결코 끝이 아니었고 하산 전 경치만 남았다."
 athletes.12.t: "우리 등산가의 사망"
 athletes.12.d: "일생을 험준한 봉우리를 정복하고 다른 이들을 가장 위험한 등반길로 이끌며 보낸, 우리가 가장 존경하던 [concept_douglas_mountaineer]가 세상을 떠났습니다. 이제 누가 구름 너머의 길을 이끌 것인가요?"
 athletes.12.f: ""
 athletes.12.g: "그들의 밧줄은 사라졌지만 그들의 흔적은 남아 있다."
 athletes.52.t: "새로운 등산가"
 athletes.52.d: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetFullName]는 언젠가 우리 봉우리 중 가장 위대한 등반가들과 어깨를 나란히 할 유망한 인재입니다."
 athletes.52.f: ""
 athletes.52.g: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetSheHe|U]는 목표를 가지고 등반합니다."
 athletes.102.t: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName](이)가 이제 베테랑 산악인이 되었습니다!"
 athletes.102.d: "빙하를 헤치고 능선을 건너며 미지로 향하는 원정대를 이끌어 온 우리의 [concept_douglas_mountaineer] [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]는 그간의 명성으로 바탕으로 이제 베테랑 등반가로 불리우게 되었습니다!"
 athletes.102.f: ""
 athletes.102.g: "등산의 달인이로다!"
 athletes.53.t: "새로운 코치"
 athletes.53.d: "새로운 [concept_vikelas_coach]가 [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerselfHimself]를 소개했습니다. [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerHis|U] 이름은 [SCOPE.sCharacter('vikelas_new_coach_scope').GetFullName]입니다."
 athletes.53.f: ""
 athletes.53.g: "[SCOPE.sCharacter('vikelas_new_coach_scope').GetSheHe|U]가 우리 소년들을 승리로 이끌 것이다."
 athletes.103.t: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName](이)가 이제 시니어 코치가 되었습니다!"
 athletes.103.d: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName]는 온 세대의 선수들을 훈련시키고 성장시키며 그 이름을 알렸습니다. [ROOT.Var('vikelas_coach_var').GetCharacter.GetSheHe]는 그간의 명성을 바탕으로 이제 대표 코치로 불리우게 되었습니다!"
 athletes.103.f: ""
 athletes.103.g: "경기장에서 부끄럼 없이 소리칠 수 있는 능력에 대한 상이다."