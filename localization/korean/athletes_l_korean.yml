l_korean:
 athletes.2.t: "우리 등산가, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullNameNoFormatting]의 은퇴"
 athletes.2.d: "수십 년 동안 산을 오르고, 미지의 경로를 개척하며, 위험한 지형을 탐험해 온 [SCOPE.sCharacter('athletes_retired_person_scope').GetHerHis] 삶 끝에, [SCOPE.sCharacter('athletes_retired_person_scope').GetFullName]는 은퇴를 결정했습니다. 이제 [SCOPE.sCharacter('athletes_retired_person_scope').GetSheHe|U]는 더 이상 우리 [concept_douglas_mountaineer]로서 활동하지 않을 것입니다."
 athletes.2.f: ""
 athletes.2.g: "정상은 결코 끝이 아니었고 하산 전 경치만 남았다."
 athletes.12.t: "우리 등산가의 사망"
 athletes.12.d: "일생을 험준한 봉우리를 정복하고 다른 이들을 가장 위험한 등반길로 이끌며 보낸, 우리가 가장 존경하던 [concept_douglas_mountaineer]가 세상을 떠났습니다. 이제 누가 구름 너머의 길을 이끌 것인가요?"
 athletes.12.f: ""
 athletes.12.g: "그들의 밧줄은 사라졌지만 그들의 흔적은 남아 있다."
 athletes.52.t: "새로운 등산가"
 athletes.52.d: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetFullName]는 언젠가 우리 봉우리 중 가장 위대한 등반가들과 어깨를 나란히 할 유망한 인재입니다."
 athletes.52.f: ""
 athletes.52.g: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetSheHe|U]는 목표를 가지고 등반합니다."
 athletes.102.t: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]가 이제 베테랑 등반가가 되었습니다!"
 athletes.102.d: "빙하를 헤치고 능선을 건너며 미지의 지역을 탐험대와 함께 개척해온 우리 [concept_douglas_mountaineer] [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]는 이제 베테랑 등반가로 불릴 만큼 명성을 얻었습니다!"
 athletes.102.f: ""
 athletes.102.g: "등산의 달인이로다!"
 athletes.53.t: "A New Coach"
 athletes.53.d: "A new [concept_vikelas_coach] has introduced [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerselfHimself]. [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerHis|U] name is [SCOPE.sCharacter('vikelas_new_coach_scope').GetFullName]."
 athletes.53.f: ""
 athletes.53.g: "[SCOPE.sCharacter('vikelas_new_coach_scope').GetSheHe|U] will lead our boys to victory."
 athletes.103.t: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] is now a Senior Coach!"
 athletes.103.d: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] made a name for himself by training and developing an entire generation of players. [ROOT.Var('vikelas_coach_var').GetCharacter.GetSheHe] is now famous enough to be considered a Senior Coach!"
 athletes.103.f: ""
 athletes.103.g: "An award for being able to scream shamelessly on the pitch."