 klimt_recently_hired_independent_painter_modifier: "최근 독립 화가 채용"
 klimt.2.f: "[concept_klimt_painter]가 40세의 나이가 되면 배움이 끝났다고 여기고 자신이 선택한 회화 양식에 비로소 안착하게 됩니다. 경험상 그 양식은 가장 현대적인 장르에 해당되는데 아르누보가 가장 현대적이고 고전주의가 가장 뒤처진 예술 양식에 해당됩니다. 특정 회화 양식을 지닌 화가는 일정한 조건에 따라 해당 양식으로 된 걸작을 그릴 수 있습니다. 또 여러분의 취향에 맞게 미술관의 미술 소장품을 가꿔나갈 수 있습니다. 전공을 택한 화가는 본인의 회화 공부가 끝났다고 생각하고 더 이상 유학에 나서지 않습니다."
 klimt.2.g: "그리는 방식이 무르익었구나."
 klimt.10.t: "미술관 개관"
 klimt.10.d: "신임 관장이 새로운 미술관의 개관을 기념하며 축하 행사를 열었다. 귀빈으로 참석한 [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName](은)는 만족스러운 모습으로 행사에 임했다."
 klimt.10.f: "국립 미술관의 건립은 다양한 가능성을 열어줍니다. 각 전공 분야의 화가들은 자신의 취향에 맞는 미술 소장품을 자동으로 구축하게 됩니다. 이를테면 낭만주의 양식에 몰두하는 화가들은 낭만주의 회화 소장품을 형성하게 될 것입니다. 이러한 미술 소장품은 걸작을 통해 더욱 강화되어 훌륭한 소장품으로 나아갈 수 있습니다. 걸작은 해당 미술 운동의 화가들이 시간에 따라 무작위 확률로 그리거나 해외에서 구입해 들여올 수 있습니다."
 klimt.10.g: "드디어 이 작품들을 다락방에 쟁여둘 필요가 없어졌군!"
 klimt.20.t: "국립 미술관"
 klimt.20.d: "한 시대를 대표하는 걸작은 미술관에 전시됩니다. 현재 우리는 다음과 같은 회화 걸작을 소장하고 있습니다."
 klimt.20.none: "현재 국립 미술관에서 소장하고 있는 걸작이 없습니다."
 klimt.20.classicism: "#T 고전주의:#!\n#YELLOW 〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]〉#! ([ROOT.Var('klimt_classic_masterwork_year_var').GetValue]년 구입)"
 klimt.20.romanticism: "\n\n#T 낭만주의:#!\n#YELLOW 〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]〉#! ([ROOT.Var('klimt_romantic_masterwork_year_var').GetValue]년 구입)"
 klimt.20.realism: "\n\n#T 사실주의: #!\n#YELLOW 〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]〉#! ([ROOT.Var('klimt_realistic_masterwork_year_var').GetValue]년 구입)"
 klimt.20.impressionism: "\n\n#T 인상주의: #!\n#YELLOW 〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]〉#! ([ROOT.Var('klimt_impressionistic_masterwork_year_var').GetValue]년 구입)"
 klimt.20.expressionism: "\n\n#T 표현주의: #!\n#YELLOW 〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]〉#! ([ROOT.Var('klimt_expressionistic_masterwork_year_var').GetValue]년 구입)"
 klimt.20.art_nouveau: "\n\n#T 아르누보: #!\n#YELLOW 〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]〉#! ([ROOT.Var('klimt_art_nouveau_masterwork_year_var').GetValue]년 구입)"
 klimt.20.g: "좋은 하루 되시길."
 klimt.30.t: "예술에 신선한 바람을 불어넣다"
 klimt.30.d: "[SCOPE.sState('klimt_secession_state').GetCityHubName]에서 아르누보 양식과 연계된 세계적으로 뛰어난 예술 운동의 중심지로 거듭났다. 이곳의 예술가 모임은 자신들을 '[SCOPE.sState('klimt_secession_state').GetCityHubName] 분리파'로 칭하고 있다."
 klimt.30.f: "빈 분리파는 아르누보와 밀접한 연관이 있는 예술 운동으로, 1897년 오스트리아 화가와 판화가, 조각가, 건축가들이 모여 결성했습니다. 참여자로는 요제프 호프만, 콜로만 모저, 오토 바그너, 구스타프 클림트가 있었습니다. 이들은 전통적인 예술 양식의 지지를 배격하며 오스트리아 예술 협회에서 탈퇴하는 행보를 보였습니다. 빈 분리파의 작품 가운데 가장 영향력이 컸던 것은 요제프 마리아 올브리히가 설계한 '분리파 건물'로, 분리파의 전시회장으로 계획된 건물입니다. 이들이 발행한 공식 잡지로 베르 사크룸 (Ver Sacrum, 라틴어로 '신성한 봄')이 있었으며, 굉장히 특색있고 영향력 있는 판화 작품들이 게재되었습니다. 1905년 빈 분리파는 클림트, 바그너, 호프만 등 주요 참여자들이 주도권 문제로 탈퇴를 선언하며 분열에 이르렀지만, 분리파 건물에 본부를 두고 활동을 이어갔으며, 현재까지도 그 명맥을 유지하고 있습니다. 오늘날 분리파 전시관은 예술가들이 독자적으로 이끌고 운영하고 있습니다."
 klimt.30.g: "전 세계를 향한 입맞춤!"
 klimt.30.h: "클림트? 제가 아는 구스타프 클림트가 맞습니까?"
 klimt.30_tt: "#white #b 제1차 분리파#!#! 이벤트가 활성화됨"
 klimt.40.t: "특별전"
 klimt.40.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]의 작품을 단독으로 조명하는 전시가 [SCOPE.sState('klimt_vernissage_state').GetCityHubName]에서 열렸다. 이번 전시는 올해 문화계의 하이라이트로 평가받으며 평단의 찬사를 받았다. 이는 우리나라가 문화 강국임을 다시 한번 증명하는 계기가 되었다."
 klimt.40.f: "\"대다수 사람들의 눈 속에 비친 나란 존재는 무엇일까? 보잘것 없는 사람, 괴상한 사람, 아니면 불쾌한 사람... 사회에서 아무런 지위도 갖지 못했고 앞으로도 갖지 못할 사람, 한마디로 바닥 중에서도 바닥일 것이다. 좋다, 그럼 설령 그것이 분명 사실이라 할지라도, 언젠가는 나의 작품을 통해서 그런 괴상한 사람, 보잘것 없는 사람의 마음 속에 무엇이 들어 있는지 보여주고 싶다.\n그것이 나의 야망이다. 그 모든 것을 마다하고 원망보다는 사랑에, 열의보다는 평온에 바탕을 두고 있다.\n비록 절망의 심연으로 빠져들곤 하지만 내 안에는 여전히 고요함과 순수한 조화, 그리고 음악이 있다. 나는 가난하기 그지없는 오두막집에서, 더럽기 그지없는 구석에서 그림이나 드로잉을 바라본다. 그리고 내 마음은 거스를 수 없는 기세로 그런 것들을 향해 나아간다.\" - 빈센트 반 고흐"
 klimt.40.g: "뷔페는 입에 맞으셨는지요?"
 klimt.101.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]"
 klimt.101.d: "특별전에 나선 거장 [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName](이)가 본인의 최신작 〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]〉(을)를 일반에 공개했다. 이 작품은 전형적인 고전주의 작품으로 이미 본연의 장르에서 높이 평가받았다."
 klimt.101.f: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName]의 신작은 예술 전문가들의 시선을 곧바로 사로잡았다. 특히 보수적인 시각의 학계에서 미적 형태와 선화와 색채의 어우러짐을 장점으로 꼽았다. 이 작품의 도덕적 고결함과 숭고함은 특히나 두드러지는 부분이었다. 해당 작품은 우리나라의 완벽한 문화유산으로 평가되어 미술관을 장식하는 것이 마땅했다."
 klimt.101.g: "이런 작품은... 미술관에 모셔야 한다!"
 klimt.102.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]"
 klimt.102.d: "국민 화가 [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName](이)가 소수의 초청객들을 불러모아 본인의 작품을 전면 공개하였다. 색채의 관능미와 강렬함이 대중에게 하나의 인상을 남겼다. 이 그림은 벌써부터 낭만주의의 걸작으로 평가받고 있다."
 klimt.102.f: "〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]〉(은)는 첫날 저녁부터 이미 일부 관람객들에게 강렬한 인상을 남겼다. 이 걸작 속에 담긴 혼은 분명히 느낄 수 있었다. 몇 군데의 윤곽선이 흐릿하다는 평이 있었지만, 그러한 모호함과 풍부한 색채가 어우러져 소재의 위력을 더욱 부각시킨다고 보는 평론가들도 있었다. 이 그림으로 [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName](은)는 미술사에 한 획을 그었음에 틀림이 없다."
 klimt.103.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]"
 klimt.103.d: "어느 연회에서 [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName](이)가 사실수의로 명확히 분류할 수 있는 새로운 그림을 선보일 기회를 갖게 되었다. 자리에 참석한 몇몇 미술 평론가들은 그 그림에 찬사를 보냈다."
 klimt.103.f: "현장에 참석한 일부 손님들은 더욱 도발적인 그림이 될까 걱정하기도 하였으나 〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]〉(이)라는 이 작품은 예상보다 훨씬 차분하게 표현된 작품이었다. 처음에는 풍속화로 잘못 본 참석자들도 있었다. 그러나 일상적인 장면을 묘사한 이 작품을 오랫동안 바라볼수록, 그 속에 담긴 미묘하면서도 도발적인 생각과 작가가 암시하는 사회적 문제가 더욱 분명하게 다가왔다. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName](은)는 사회 비판적인 표현 방식으로 일부 사교회 인사들에게 거부감을 주었을지는 모르지만, 이런 예술 작품은 국가 차원의 가치 있는 전시회에 걸어두어야 한다는 것이 대다수 여론이었다."
 klimt.104.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]"
 klimt.104.d: "전국 회화 협회의 고위 관계자들이 주최한 대규모 미술 전시에서 [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName](이)가 선보인 작품은 상당한 주목을 받았음에도 일부 평론가들로부터 조롱을 받았다. 그러나 외국 미술상으로부터 높은 가격에 매입하겠다는 제안이 오면서 해당 작품은 갑자기 큰 인기를 얻고 있다고 한다."
 klimt.104.f: "〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]〉의 전시가 처음 이뤄질 당시만 해도 여론은 반으로 갈렸다. 그림 속 전원 풍경이 너무 순진하고 정치적, 사회적 열망이 담겨 있지 않다는 평이 있는가 하면, 형식과 선의 부재를 지적하는 평도 있었다. 또 한편으로는 사라져가는 풍경이 작가의 정신 상태가 무너져서일지 모른다고 비웃는 사람도 있었다. 그때까지 우호적인 여론은 열세에 있었지만, [SCOPE.sCountry('klimt_art_dealer_country').GetName]에서 찾아온 미술상이 걸작 속에 담긴 품격과 혁신적 정신을 중심으로 역설하면서 이야기가 달라졌다. 미술상은 곧바로 엄청난 금액을 지불하고 그림을 입수하여 자국으로 가져가겠다고 밝혔다. 이 사건 이후 그림에 대한 관심이 더욱 커졌고 곧바로 국가 문화유산으로 지정되기에 이르렀다. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName](은)는 이번 일로 더할 나위 없이 기쁠 것이다."
 klimt.105.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]"
 klimt.105.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]의 최신작은 관람객과 평론가들 사이에서 공포와 증오, 분노와 혐오감을 일으켰다. 다시 말해 세상에 충격을 던질 만큼 성공을 거둔 것이다!"
 klimt.105.f: "\"〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]〉(이)라 함은 도대체 무슨 뜻이오? 무슨 의미가 담긴 거지? 유치원생의 색칠놀이에서나 볼 법한 이 색채들은 또 뭐요? 이런 조잡한 형상에, 정신 나간 풍경은 또 뭐고? 이게 예술이라고? 예술?! 이런 사기꾼을 봤나! 그림에 침을 뱉어도 지금보다 훨씬 더 예술에 가깝겠군!\"\n\n참고로 위 발언은 그림 전시회에서 나왔던 호평 중 하나였다. 이것으로 [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName](은)는 역사적인 스캔들을 일으켰고 오히려 그림의 중요성을 높이는 계기가 되었던 것이다."
 klimt.106.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]"
 klimt.106.d: "신작 〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]〉의 발표로 [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName](은)는 국제 무대에서 가장 중요한 화가로 높이 평가받게 되었다. 이 작품은 전통파와 전위파 양측 모두를 전율 속에 빠뜨렸다."
 klimt.106.f: "\"아르누보(신미술)라니, 그게 뭔가? 미술은 새로울 수가 없네만.\" - 알폰스 무하"
 klimt.110.t: "A discreet Order"
 klimt.110.d: "An experienced art and antiques dealer has offered to procure a rare masterpiece abroad. Extreme discretion is required in this matter - the dealer also buys from rivals and even war opponents. [SCOPE.sCharacter('klimt_art_dealer').GetFullName] has assured that he will fulfill his order quietly - assuming good pay and some paintings in return."
 klimt.110.f: "In order to purchase a foreign painting, an art dealer abroad must make a suitable offer. This includes not only money, but also a few paintings in return - which will damage our [concept_klimt_painting_tradition]. An art dealer can only buy masterpieces in countries that have more than one painting of the same style - they will not sell a unique piece. Likewise, a nation cannot purchase more than one masterpiece of a style abroad. It will take about six months for the deal to be completed and for the painting to arrive in our National Gallery."
 klimt.110.g: "고전주의 걸작 보유"
 klimt.110.h: "낭만주의 걸작 보유"
 klimt.110.i: "사실주의 걸작 보유"
 klimt.110.j: "인상주의 걸작 보유"
 klimt.110.k: "표현주의 걸작 보유"
 klimt.110.l: "아르누보 걸작 보유"
 klimt.111.t: "고전주의 걸작"
 klimt.111.d: "오늘 국립 미술관의 새로운 걸작으로 〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]〉라는 작품이 들어왔다. 정부 측은 이 작품에 매우 만족하는 분위기이다. 미술상은 자신이 할 일은 다 했다는 입장이다."
 klimt.111.f: "큰 기대는 어긋나지 않았습니다. 〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]〉(은)는 요구한 바를 확실히 담아내며 [GetPlayer.GetNameNoFlag]의 회화 소장품에 훌륭한 보탬이 될 것입니다. 관련 업계의 언론들도 이번 거래는 투자한 전액만큼의 가치가 있다고 입을 모았습니다. 다음 달에는 고전주의의 정점인 이번 작품을 조명하는 전시가 예정되어 있습니다."
 klimt.111.g: "우리 소장품에 또 하나의 귀한 작품이 들어왔구나! "
 klimt.112.t: "A Masterwork of Romanticism"
 klimt.112.d: "Some onlookers gathered at the National Gallery today. Representatives of the local and national press have also been besieging the place since the early hours of the morning. The word has already gotten around that '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]', a romantic masterpiece, is about to arrive in the picture collection."
 klimt.112.f: "There have already been some rumors about '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]'. It should be a colorful painting that stimulates the senses. No further information is known about the subject. The unknown art dealer, who could provide more information, is said to have gone abroad with a big chunk of money and made plans for his retirement. He was no longer available for interviews."
 klimt.113.t: "A Masterwork of Realism"
 klimt.113.d: "The new masterpiece '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]' was presented to the public in a ceremony today as part of a special exhibition. The piece belongs to the genre of realism and is considered one of the key paintings of this art era. The crowd was correspondingly large. The tickets for the event were completely sold out weeks before."
 klimt.113.f: "'It is both a great honor and a pleasure for me, as director of the National Gallery, to be able to present to you today the new masterpiece that will enrich our picture collection from today. As you know, we have been working for a long time to be able to call a key work of realism our own. '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]' is exactly that. I don't need to say much about the painter, you all know him. With its sober depiction and everyday relevance, it was initially misunderstood by critics as genre painting or as spiritless. But in reality its content is profound. Note the details in the coloring that give the impression that...'"
 klimt.114.t: "A Masterwork of Impressionism"
 klimt.114.d: "The art dealer fulfilled his mission today and delivered '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]' to those responsible at the National Gallery for a hefty reward. The process went smoothly. The director also commented positively on the purchase, but complained that the colors were a bit blurry."
 klimt.114.f: "'I am very depressed and deeply disgusted with painting. It is really a continual torture.' -Claude Monet"
 klimt.115.t: "A Masterwork of Expressionism"
 klimt.115.d: "'[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]', the masterpiece from abroad procured by a trusted art dealer, has finally arrived in [GetPlayer.GetNameNoFlag]. However, one cannot speak of undivided approval. The art dealer also left after paying and cannot be found."
 klimt.115.f: "After '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]' arrived, some art connoisseurs expressed surprise, if not criticism. The unusual composition gave the impression that it could hardly be the work of a renowned artist. The unusual name, which had little to do with the daubing, also aroused suspicion as to whether they had perhaps come across a charlatan who had had a joke. The fact that an authentic autograph was found on the picture made things worse rather than better. Be prepared for strong reactions from the audience."
 klimt.116.t: "아르누보 걸작"
 klimt.116.d: "오늘 국립 미술관장은 해외에서 주문한 걸작이 도착했다는 소식에 안도하는 모습이다. 〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]〉(은)는 참으로 보기에 아름다운 작품이다. "
 klimt.116.f: "〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]〉(이)가 마침내 그 모습을 드러내자, 참석자들의 마음을 단번에 사로잡는 것이 동물원의 새끼 호랑이를 보는 듯했다. 아니면 박물관의 새로운 대표 유물을 보는 것처럼. 아니면 천문대에서 행성을 새로 발견한 것처럼. 혹은 작곡가가 음악 걸작을 새로 선보인 것처럼. 아니면 고생물학자가 골격을 다시 조립한 것처럼. 혹은 인류 조상의 유해를 발견한 것처럼. 혹은..."
 klimt.116.g: "혹은 슈나이더 트로피에서 우승한 것처럼 말이지?"
 klimt.301.t: "[SCOPE.sState('klimt_art_capital').GetCityHubName]상 수상 결과"
 klimt.301.d: "미술을 사랑하는 우리나라의 엘리트층에서 최고의 그림을 선정하는 예술상 제정을 추진하고 있다."
 klimt.301.f: "미술관을 보유한 국가들은 간혹 미술 대회를 개최합니다. 가장 뛰어난 화가 다섯 명이 입상하여 명성에 큰 영향을 미치게 됩니다. 미술 대회는 보통 5년에 한 번씩 열립니다. 위대한 화가들은 이미 본인의 공로를 인정받았기 때문에 초청받지 않습니다."
 klimt.301.g: "미술 대회를 개최해야겠다."
 klimt.301.h: "돈 낭비야!"
 klimt.302.t: "[SCOPE.sState('klimt_art_capital').GetCityHubName] 예술상"
 klimt.302.d: "심사위원단이 심사를 마치고 최고의 그림들을 선정했다. 이제 막 5인의 수상 명단이 공개되었다."
 klimt.302.f: "1등 - [SCOPE.sCharacter('klimt_character_first_winner_scope').GetFullName] ([GetGlobalVariable('klimt_prize_winner_1_global_var').GetCountry.GetName])\n2등 - [SCOPE.sCharacter('klimt_character_second_winner_scope').GetFullName] ([GetGlobalVariable('klimt_prize_winner_2_global_var').GetCountry.GetName])\n3등 - [SCOPE.sCharacter('klimt_character_third_winner_scope').GetFullName] ([GetGlobalVariable('klimt_prize_winner_3_global_var').GetCountry.GetName])\n4등 - [SCOPE.sCharacter('klimt_character_fourth_winner_scope').GetFullName] ([GetGlobalVariable('klimt_prize_winner_4_global_var').GetCountry.GetName])\n5등 - [SCOPE.sCharacter('klimt_character_fifth_winner_scope').GetFullName] ([GetGlobalVariable('klimt_prize_winner_5_global_var').GetCountry.GetName])"
 klimt.302.g: "입상자에게 상을 수여하도록."
 klimt.401.t: "화가의 유학 대상"
 klimt.401.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName](은)는 이제 막 떠날 채비를 마쳤다. 어떤 미술 양식을 배우는 것이 좋을까?"
 klimt.401.f: "미술 유학에서 [concept_klimt_painter]가 공부를 계속하면 본인의 부재에 따라 [concept_klimt_painting_tradition]을 만들어내지 않게 됩니다. 미술 양식은 이전에 자신이 배우지 않았던 것만 익힐 수 있습니다. 보통 이런 유학은 1년 동안 이어지지만 어떤 걸림돌이나 기회로 인해 체류기간이 연장될 수도 있습니다."
 klimt.401.g: "고전주의"
 klimt.401.h: "낭만주의"
 klimt.401.i: "사실주의"
 klimt.401.j: "인상주의"
 klimt.401.k: "표현주의"
 klimt.401.l: "아르누보"
 klimt.401.m: "상관 없다."
 klimt.402.t: "[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] 도착"
 klimt.402.d: "좋은 소식! [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName](이)가 [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]에 도착했다고 한다. 아직은 공짜 숙소를 물색하고 있다고 하며 머지않아 배움에 나설 것이라고 한다."
 klimt.402.f: ""
 klimt.402.g: "아... [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]."
 klimt.403.t: "미술 유학에서 돌아온 [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]"
 klimt.403.f: "'예술은 오직 그 자체로 목적일 때, 절대적으로 자유로울 때, 스스로에게 맡겨졌을 때, 그리고 진리와 아름다움이라는 자신만의 규칙 외에 더 높은 규칙을 감안하지 않을 때 비로소 예술이 된다.' - 루트비히 포이어바흐"
 klimt.403.g: "그래서 유학 내내 놀기만 하다 온 것은 아니겠지?"
 klimt.411.t: "Fellow painters among themselves"
 klimt.411.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] met a fellow painter from [SCOPE.sCharacter('klimt_fellow_painter').GetHomeCountry.GetName] on his study trip. The two recognize each other as equal colleagues. [SCOPE.sCharacter('klimt_fellow_painter').GetFullName] seems to be a gifted spirit and sociable."
 klimt.411.f: "If by chance several nations have sent a painter on a study trip at the same time, then there is a possibility that they will meet and there will be positive synergetic effects. Rivalries and enmities can then quickly disappear in the interests of shared enthusiasm for art."
 klimt.411.g: "They should exchange their artistic knowledge."
 klimt.411.h: "They can certainly learn from each other's techniques."
 klimt.411.i: "The acquaintance will be useful in the art world to support each other."
 klimt.421.t: "In the Footsteps of Giants"
 klimt.421.d: "Our painter wrote from [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] place of study that [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] already foresees [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] future in glorious visions. What [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] needs, however, is more time and more money."
 klimt.421.f: "In Rome, [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] is confronted with some of the most important painters in art history as well as with the remains of Roman architecture. Time and time again, travelers to Rome have developed a special relationship with this city and its history. The desire to follow in the footsteps of the classics has moved many an artist. [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]'s ambition grows to one day become an artist just as great as one of [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] idols. This may border on megalomania, but above all it will take time, patience - and further studies, as [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] said in a letter."
 klimt.421.g: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] should take [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] time and emulate Michelangelo and Raphael."
 klimt.421.h: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] should paint, not daydream!"
 klimt.422.t: "Spirit of the Romantics"
 klimt.422.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] hasn't written back from Bamberg for days. Apparently [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] indulges in daydreaming."
 klimt.422.f: "Bamberg is not just a picturesque place with numerous half-timbered houses and a rich baroque heritage that invite you to linger romantically. There is something about this city that made it incredibly attractive to the romantics. Ludwig Tieck and Heinrich Wackenroder were important romantics who actually came from Berlin, but on whom Franconian left their mark. They too were less interested in their studies and more interested in the country, its people and the rich heritage of the cities in the area. E. T. A. Hoffmann, another romantic from Prussia, experienced his literary breakthrough during his five-year stay in Bamberg. What his trip to Italy was for Goethe, this part of Germany was for young romantics. In the cultural landscape they not only found a connection to the idealized German Middle Ages, but also to the paintings of Albrecht Dürer in Nuremberg and to Catholicism, whose spirituality appealed more to the Romantics than secularized Protestantism."
 klimt.422.g: "The life of a good-for-nothing..."
 klimt.423.t: "Conversion"
 klimt.423.d: "Actually, [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] hasn't had much of a relationship with faith so far. However, the strong Catholicism he was confronted with, both in art and in everyday life, triggered something in [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHim]. More and more [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] feels a connection that [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] would never have thought possible until then. Inspired by this, [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] painted [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] first religious picture."
 klimt.423.f: "'See Bamberg and become Catholic' was a motto among German Romantics. In fact, German Romanticism was one of the few eras influenced more by Catholic than Protestant thinkers, including many converts. In a similar way, Rome also brought doubters into the fold of the Church. This may be surprising in a materialistic age in which progress and science played a leading role in society, but it was precisely the need for a counter-response that ultimately led a hedonist to the monastery."
 klimt.423.g: "I hope this isn't a cheesy picture of the Madonna."
 klimt.423.tt: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] loses all negative addictive traits and converts to #YELLOW Catholicism#! if [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] is not yet a Catholic."
 klimt.424.t: "세부 묘사에 주목하다"
 klimt.424.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName](은)는 [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]에서 사실주의의 거장을 만나 자신의 회화 기법을 개선하는 데 도움을 주겠다는 제안을 받았다. 이렇게 되면 수 개월이 걸릴 뿐만 아니라 상당한 예산이 들게 된다."
 klimt.424.f: "\"회화는 본질적으로 구체 예술이며, 실재하고 실존하는 사물의 재현으로만 구성될 수 있다.\" - 귀스타브 쿠르베"
 klimt.424.g: "시간이 좀 걸리겠지만 그만한 가치가 있군."
 klimt.424.h: "그보다 [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName](이)가 거장으로부터 인정받을 수 있도록 주력하는 것이 좋겠다."
 klimt.425.t: "한계를 모르는 영감"
 klimt.425.f: "\"인상주의가 등장한 이래, 갈색조가 태반이던 공식 살롱전은 푸른색, 초록색, 붉은색이 되었다... 하지만 그 속은 박하사탕이나 초콜릿, 그들은 예쁜 사탕밖에 모른다.\" - 클로드 모네"
 klimt.425.g: "이런 새로운 발상들을 영감 삼아 수많은 그림들을 그릴 수 있겠지."
 klimt.425.h: "이런 새로운 발상들이 조국의 우리 문화에도 영감을 주어야 해."
 klimt.426.t: "예술가의 삶"
 klimt.426.d: "[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]의 세련된 삶은 [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]에게도 영향을 끼쳤다. 술집에서 시간을 흘려 보내며 창의력을 높이고자 각성제를 복용하는 일이 늘상 있었던 것이다. 술 한두잔만으로는 이렇게 짧은 시간 안에 본인의 작품을 완성하기가 어려웠을 것이다."
 klimt.426.f: "\"첫 잔에 세상은 바라던 대로 보인다.\n두번째 잔에 세상은 현실과 다르게 보인다.\n마지막 잔에 세상은 있는 그대로 보인다.\n그것이야말로 세상에서 가장 무서운 일이다.\" - 오스카 와일드"
 klimt.426.g: "본인의 예술에 영감을 준다는데 무엇이 문제인가?"
 klimt.426.h: "그럼 시간이 더 오래 걸릴 게 아닌가."
 klimt.427.t: "화가의 타락"
 klimt.427.d: "[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]에서 우려스러운 보고를 전달받았다. [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]의 중독 증세가 심각한 수준에 이르렀다는 소식이다. 겉보기에는 자리를 비운 틈을 타 타락과 방탕에 빠져 본인의 건강에 심각한 악영향을 미치고 있는 모양이다."
 klimt.427.f: "카미유 피사로, 앙리 드 툴루즈로트렉, 폴 고갱, 오스카 와일드, 샤를 보들레르. 이들 모두가 압생트 중독의 희생자였다. 빈센트 반 고흐에게도 마찬가지였다. 한편 가브리엘레 단눈치오는 음란한 모험을 찾아 나섰다. 장 콕토는 제 손으로 아편을 발견하여 사용법과 효과를 두고 일기장에 남겼다. 대다수의 경우 이러한 중독과 악행은 자멸과 요절로 이어진다는 사실은 화가의 삶에서 비극적인 일화로 꼽힌다."
 klimt.427.g: "화가라면 한번씩 타락하는 법이다."
 klimt.427.h: "우리가 나서줘야겠군!"
 klimt.427.tt: "유학이 중단되고 [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName](은)는 [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]에 있는 우리 주재원에 체포되어 [GetPlayer.GetName]로 되돌려보내집니다. 그곳에서 향후 6개월 동안 재활에 나서게 됩니다. "
 klimt.428.t: "다시 돌아온 [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]"
 klimt.428.d: "몇 달간의 휴식 끝에 우리 화가가 평소대로의 일상 작업으로 복귀했다. [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName](은)는 본인의 생활 방식을 그만둔 것은 아니지만 적어도 그보다 악화되는 일은 피할 수 있었다."
 klimt.428.f: "\"납치라고요? 아니요, 아뇨, 선생님, 그건 개입이었답니다. 납치는 선생님의 고통을 가중시키지만, 중재는 선생님의 이익을 위해서만 나설 수 있지요... 어떻게 대해야 좋을지 아무것도 모른다니 그게 무슨 말씀이십니까.\""
 klimt.428.g: "이제는 정상으로 돌아오기를 바라오."
 klimt.431.t: "베두타"
 klimt.431.d: "유학길에 나선 우리 화가가 본인이 체류 중인 [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] 시의 아름다움에 감명을 받고 뛰어난 베두타 한 점을 그리기 시작했다. 하지만 이것으로 [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] 체류가 조금 더 길어질 전망이다."
 klimt.431.f: "베두타(Veduta)는 도시 풍경이나 기타 경관을 매우 세밀하게 묘사한 대형 회화 내지는 판화 작품을 말한다. 베두타를 그리는 화가는 베두티스타(Vedutista)라고 불렀다. 19세기 후반에는 지형을 정학하게 담으려는 욕구가 회화나 훗날 사진으로 표현된 파노라마로 대체되면서, 도시 풍경에 대한 개인의 '인상'이 더욱 중요해졌다. 이 시기의 대표적인 베두타 화가로는 데이비드 로버츠와 에두아르트 가에트너가 있었다."
 klimt.431.g: "훌륭한 발상이오."
 klimt.431.h: "공부에 집중하시오."
 klimt.432.t: "화가 공동체"
 klimt.432.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName](이)가 [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]의 현지 화가 공동체의 일원으로 환대를 받았다."
 klimt.432.f: "\"나는 홀로 남아 스스로가 홀로 있음을 알아야 자연을 온전히 사색하고 느낄 수 있다. 나를 둘러싼 모든 것에 스스로를 맡겨야 하고, 구름과 바위와 하나가 되어야 내가 나다울 수 있다. 자연과 대화를 나누기 위해서라면 고독은 필수불가결하다.\" - 카스파르 다비트 프리드리히"
 klimt.432.g: "우리도 미술계의 인정을 받아야 한다."
 klimt.433.t: "재빠른 이해력"
 klimt.433.d: "[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName](으)로 유학을 떠난 우리 화가가 예상했던 것보다 더 빠른 진척을 보이고 있다. 이대로라면 조기에 귀국할 수 있을지도 모른다."
 klimt.433.f: "\"재능은 하고 싶은 대로 한다. 천재는 할 수 있는 것만 한다.\" - 외젠 들라크루아"
 klimt.433.g: "재능은 첫눈에 알아보기 마련."
 klimt.434.t: "미술상"
 klimt.434.d: "유학에 나선 [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName](이)가 작품 몇 점을 구해다 줄 수 있는 유명한 미술상을 만났다."
 klimt.434.f: "\"저는 정말로 진지한 사업가랍니다. 내가 가짜를 판다고 경쟁자들이 훼방 놓기 바쁜데 순전히 시기심 때문이오. 이 그림 한번 보시면 흥미가 동하지 않겠소? 레오나르도 다 빈치의 진품, 시스티나 성당의 여인이오. 정말 희귀하지요! 이만한 기회는 다시 찾아오지 않는답니다!\""
 klimt.434.g: "그림 몇 점을 구매한다."
 klimt.434.h: "외국의 이류 작품은 필요 없다."
 klimt.435.t: "최신 유행"
 klimt.435.d: "유학길에 오른 우리 화가가 이전에는 알지 못했던 새로운 유행과 새로운 건축 양식, 그리고 새로운 유희를 알게 되었다."
 klimt.435.f: "\"영국에서 온 사람들은 깜짝 놀란 친구들에게, 해협 건너편의 사람들은 아무리 상식적인 사람이라도 여전히 어린아이 같은 즐거움을 좋아한다고 설명해 주곤 했다. 젊은이들은 들판에서 가죽공을 차며 놀고, 카펫 청소기 같은 것으로 네트 너머 공을 치는 사람도 있다. 이런 광기는 어디서나 구경꾼을 끌어모은다. 개중에는 공직에 있는 고위 인사도 있는데, 심지어 직접 나서는 것을 마다하지 않는 경우도 있다.\""
 klimt.435.g: "새로운 문화의 신선한 바람이로군."
 klimt.435.h: "허나 시대 정신을 그대로 따르는 것이 정말로 옳은 것일까?"
 alert_klimt_painter_trip_possible_alert_name: "[concept_klimt_painter]의 새로운 예술 양식 공부 가능"
 klimt_painter_trip_possible_alert_setting_name: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon!#![concept_klimt_painter]의 새로운 예술 양식 공부 가능"
 klimt_great_painting_modifier: "근사한 초상화"
 klimt_excellent_taste_modifier: "근사한 감각"
 klimt_disgusting_painting_modifier: "끔찍한 초상화"
 klimt_disgusting_taste_modifier: "끔찍한 감각"
 klimt_art_censorship_modifier: "그림 검열"
 je_klimt_rossetti: "라파엘 전파"
 je_klimt_rossetti_reason: "라파엘 전파는 라파엘로와 미켈란젤로의 르네상스 미술에 문화적 단절이 있다고 본 화가 집단입니다. 이들은 14세기~15세기의 이탈리아 회화를 선호했으며, 자신들을 개혁 운동으로 여겼습니다. 이들의 경쟁 상대는 르네상스 시대 화가들보다는 그것을 모방한 신고전주의 화가들이었습니다. 작품 제작의 주 소재는 중세 시대가 특히 많았으며, 가장 유명했던 대표 화가로는 단테 가브리엘레 로세티가 있었습니다."
 je_klimt_fattori: "마키아이올리파"
 je_klimt_fattori_reason: "마키아이올리파는 인상주의의 혁신을 예견한 이탈리아 고유의 예술가 집단이었지만, 당대에는 크게 주목받지 못했습니다. 마키아이올리라는 용어는 이탈리아어 'macchia'에서 유래했는데, 이는 '얼룩'이란 뜻을 갖고 있습니다 (두번째 뜻은 '덤불지대'). 마키아이올리파를 대표했던 가장 중요한 화가로는 조반니 파토리가 있었습니다."
 je_klimt_barbizon: "바르비종파"
 je_klimt_barbizon_reason: "바르비종파는 19세기 중반으로 넘어갈 무렵 프랑스 풍경화가들이 모여 결성하였습니다. 이들은 퐁텐블로 숲 인근의 바르비종 마을에 모여 살았습니다. 테오도르 루소가 결성하여 1870년까지 존속했던 이 화가 공동체는 유럽 전역의 풍경화, 특히 인상주의에 지대한 영향을 끼쳤습니다."
 klimt.501.t: "라파엘전파"
 klimt.501.d: "라파엘전파와 함께 고전주의와 사실주의에 반대하는 형재단이 결성되었으나 동시에 스스로를 개혁 운동으로 여겼다. 이들의 지원으로 새로운 재능을 발굴할 수 있었지만, 현재 우리나라의 화가로 나선 [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]의 양식과는 상반되는 상황이다."
 klimt.501.f: "\"나는 전에도 이곳에 있었다\n하지만 언제, 어떻게인가는 말할 수 없다\n방문 너머의 풀밭\n달콤하고 강렬한 향기\n한숨 소리, 해안가의 불빛들을 나는 안다\" - 단테 가브리엘레 로세티"
 klimt.501.g: "라파엘전파 형제단을 후원하자."
 klimt.501.h: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName](이)가 훨씬 낫군."
 klimt.502.t: "마키아이올리"
 klimt.502.d: "오늘 피렌체에서 마키아이올리라는 화가 집단이 창설되었다. 그 영향력은 미미할지라도 일부 젊은 화가들에게 미술의 새로운 길을 모색하도록 영감을 주고 있다."
 klimt.502.f: "\"얼룩(마키아)은 빛 앞에 서 있는 물체의 견고함이다.\" - 조반니 파토리"
 klimt.502.g: "그럼 이들은 전위파 이전의 전위파였단 말인가?"
 klimt.503.t: "바르비종파"
 klimt.503.d: "테오도르 루소의 주도로 퐁텐블로 인근에 화가 공동체가 설립되면서, 풍경화는 예술계 전반에 새로운 활력을 불어넣고 있다."
 klimt.503.f: "\"나의 그림이 당신이 자주 찾던 곳의 단순하고 진실된 면모를 과장된 기교 없이 충실히 담아내고, 내가 저 식물의 세계에 생명을 불어넣을 수 있다면... 당신은 겨울바람에 신음하는 나무들과, 둥지를 떠난 새끼를 부르짖는 어미 새의 울음소리를 듣게 될 것이오. 당신은 옛 성의 전율도 느낄 것이오. 그것은 당신이 사랑했던 아내처럼, 자신 또한... 사라졌다가 다른 모습으로 다시 태어날 것이라 일러둘 것이오... 인간이란 보이는 것을 수학적 정확성으로 베끼는 존재가 아니라, 모든 운명이 당신을 단단히 붙들고 있는, 현실 세계를 느끼고 해석하는 존재이기 때문이오.\" - 테오도르 루소"
 klimt.503.g: "멋진 풍경화로군!"
 klimt.601.t: "[SCOPE.sCharacter('klimt_painter_scope').GetLastName]의 죽음"
 klimt.601.d: "국내외적으로 높이 평가받는 화가이자 우리나라의 뛰어난 예술인으로 활동하던 [SCOPE.sCharacter('klimt_painter_scope').GetFullName](이)가 오늘 세상을 떠났다. 그 빈자리를 다시 채우기란 어려운 일이 될 것이다."
 klimt.601.f: "1835년 6월 26일 카스파르 다비트 프리드리히는 뇌일혈을 일으켜 마비 증세를 동반하게 된다. 테플리츠에서 요양하던 프리드리히는 시인 주코프스키를 다룬 그림 몇 점을 러시아 황실에 팔아 겨우 치료비를 마련할 수 있었다. 치료 후 프리드리히는 다시 그림을 그리기 시작했으나 어려움을 겪었다. 그럼에도 불구하고 1835년~1836년에는 유화 작품 〈달빛 아래 바닷가〉를 그려낼 수 있었다. 1839년까지 프리드리히는 주로 세피아를 이용한 드로잉과 수채화를 그렸으며, 푸역ㅇ화는 줄이고 죽음에 관한 알레고리화를 더 많이 그렸다. 프리드리히는 자신의 세피아 드로잉을 1836년과 1838년 드레스덴 미술전에 출품하였다. 생애 마지막 해에는 작품 활동을 중단하였다. 1840년 5월 7일 프리드리히는 드레스덴에서 향년 65세를 일기로 숨을 거뒀고 트리니티 공동묘지에 안장되었다."
 klimt.601.g: "이제 그분의 죽은 초상화는 누가 그린단 말인가?"
 klimt.602.f: "터너는 나이가 들수록 점점 더 괴짜가 되었다. 가까운 친구도 별로 없었던 터너에게는 30년간 함께 살며 화실 조수 일을 봐준 아버지가 있었다. 1829년 아버지의 사망은 터너에게 큰 충격을 주었고 이후로도 우울증에 시달렸다. 1851년 12월 19일 터너는 첼시의 체인 워크에 있던 소피아 캐롤라인 부스의 집에서 콜레라로 사망했다. 이후 세인트폴 대성당에 안장되었으며, 그 위치는 화가 조슈아 레이놀즈의 무덤 곁에 있다. 터너의 마지막 유언은 \"태양 (또는 아들?)은 신이다\"라는 이야기가 전해지고 있으나, 사실이 아니라는 주장도 제기되고 있다."
 klimt.603.f: "1848년 2월 6일 토머스 콜은 가족들을 데리고 캣스킬의 세인트 루크 성공회 교회의 아침 예배를 드리러 나갔다. 점심을 먹은 콜은 피로감을 호소했고, 자정 무렵에는 상태가 악화되어 의사를 호출하기에 이르렀다. 이후 흉막염과 폐울혈이 발병하고 말았다. 토머스 콜은 1848년 2월 11일 금요일 오후 8시, 시더 그로브의 본채에서 숨을 거뒀다."
 klimt.604.f: "1862년~1863년 겨울은 들라크루아에게 몹시 힘든 시기였다. 심한 인후염에 시달리던 들라크루아는 겨울이 흘러갈수록 증상이 악화되는 듯했다. 샹프로세로 여행을 떠난 들라크루아는 열차에서 친구를 만나 이야기를 나누다가 극심한 피로감을 느꼈다. 6월 1일에는 의사를 만나러 파리로 되돌아왔다. 그로부터 2주 뒤인 6월 16일에는 상태가 호전되어 시골의 자택으로 복귀하였다. 그러나 7월 15일에 다시 병세가 도져 의사를 찾아갔고, 그 의사는 이제 더는 해줄 수 있는 것이 없다고 밝혔다. 당시 들라크루아가 먹을 수 있는 것은 과일 뿐이었다. 들라크루아는 몸 상태가 심상찮음을 깨닫고 유언장을 작성하였다. 여기에는 친구들에게 각각 선물을 남기고, 평소 신뢰하던 가정부 제니 르 기유에게는 생활비로 충당할 만큼 돈을 줄 것이며, 화실에 있는 모든 물건을 경매에 부치도록 해 달라는 내용이 담겼다. 또한 \"데스마스크든, 그림이든 사진이든 상관 없이, 나는 명백히 그것을 금지한다\"라며 자신의 얼굴을 어떤 방식으로든 묘사하는 것을 금한다는 구절을 유언장에 남겼다. 8월 13일 들라크루아는 세상을 떠났다."
 klimt.605.f: "에케르스베리는 말년에 이르러 시력이 점점 나빠지기 시작했으며, 결국에는 그림을 완전히 그만두어야 했다. 1853년 7월 22일 에케르스베리는 코펜하겐에서 콜레라가 대유행하면서 숨을 거두었다. 이후 코펜하겐의 아시스텐스 공동묘지에 안장되었다."
 klimt.901.t: "[GetPlayer.GetNameNoFlag]의 창공"
 klimt.901.d: "[GetPlayer.GetNameNoFlag](은)는 천문학 분야를 선도하는 국가다. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]의 뛰어난 발견은 [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]에게 영감을 주어 밤하늘과 우주를 묘사한 그림을 그리게 되었다."
 klimt.901.f: "한 국가가 세운 이정표는 그 나라의 화가들에게도 영향을 끼칩니다. 특별한 문화적 사건, 기술 발전, 과학적 발견은 화가들에게 영감을 주어 화폭에 영원히 담아내게 됩니다."
 klimt.901.g: "아름답군!"
 klimt.902.t: "태평양의 보물"
 klimt.902.d: "태평양에서 돌아온 탐사대가 이국적인 물건, 매혹적인 예술품, 새로운 해양학 지식, 야생 동물을 [GetPlayer.GetNameNoFlag]에 들이면서 본연의 흔적을 남겼다. 그것들을 보고 영감을 얻은 [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName](은)는 조국의 발견과 탐험에 대한 의지를 보여주는 그림을 그리게 되었다."
 klimt.903.t: "오리엔탈 미술"
 klimt.903.d: "중동으로의 탐사가 나날이 이루어지면서 우리 사회에도 '오리엔탈리즘'이라 불리우는 예술 운동에 도취된 모습이다. [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] 또한 동양의 매력에 사로잡혀 천일야화에서 영감을 얻은 환상화를 그렸다."
 klimt.904.t: "새 시대의 도래"
 klimt.904.d: "[GetPlayer.GetNameNoFlag](은)는 창공 정복의 가두에 서 있다. 비행기든 비행선이든 새로운 기계들이 하늘을 가득 채운다. 신기록은 나날이 경신되고 비행사들은 국가적 영웅으로 대우받고 있다. [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] 역시 이 새로운 시대의 혼을 색채로 표현하여 기술과 의지, 영웅주의의 승리를 기리고 있다."
 klimt.905.t: "호랑이와 사자가 있는 초상화"
 klimt.905.d: "지난날 동물원에 방문한 [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName](은)는 [GetPlayer.GetNameNoFlag]에서 수도에 들여놓은 전세계의 이국적인 동물들을 직접 경험할 수 있었다. 박물학의 적임자 [ROOT.Var('ito_naturalist_var').GetCharacter.GetLastName] 교수는 [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHim|U]에게 동물원 투어를 시켜주며 동물들에 대한 흥미로운 사실들을 알려주었다. 동물원을 떠나기 전 [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe|U]는 비범한 자화상을 그렸다."
 klimt.906.t: "공룡 스케치"
 klimt.906.d: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] 교수의 성과에 영감을 얻은 [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName](이)가 멸종된 파충류를 화폭에 담아 생명을 불어넣겠다고 한다."
 klimt.907.t: "정글의 비밀"
 klimt.907.d: "유카탄 반도에서 이뤄낸 고고학 발견과 더불어, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 교수를 비롯한 연구진들이 새로운 마야 유적지를 거듭 발견했던 모험적인 상황을 전해들은 [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName](이)가 조국의 탐사를 그림 속에 영원히 담게 되었다."
 klimt.908.t: "[ROOT.Var('elgar_composer_var').GetCharacter.GetFullName]의 초상"
 klimt.908.d: "거장 [ROOT.Var('elgar_composer_var').GetCharacter.GetLastName]의 작품 속 지칠 줄 모르는 연주와 거듭 새롭게 이어지는 최고조는 [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]에게 영감을 주어 작곡가의 초상화를 그리게 되었다. 이 그림 또한 작곡가의 견줄 데 없는 음악과 더불어 본연의 명성을 드높일 것이다."
 klimt.911.t: "[SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle]의 초상화?"
 klimt.911.d: "[GetPlayer.GetNameNoFlag]의 국가 원수에게 정식으로 헌정된 미술관에 [SCOPE.sCharacter('klimt_ruler_scope').GetFullName]의 초상화가 아직도 마련되지 않았다. [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName](은)는 통치자의 모습을 화폭에 제대로 담을 수 있는 최적의 후보로 떠올랐다."
 klimt.911.f: "매 임기 때마다 화가에게 정부수반이나 국가원수의 초상화를 그려달라는 요청이 제기될 확률이 존재합니다. 하지만 그 요청이 성공할지의 여부는 해당 화가의 명성이 좌우합니다."
 klimt.911.g: "초상화를 제작하시오."
 klimt.911.h: "그래서 잘못되기라도 하면, 그 돈은 누가 낼 것이오?"
 klimt.912.t: "참... 비범한 초상화"
 klimt.912.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName](이)가 오늘 [SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle]의 초상화를 대중 앞에 공개했다. 동료 화가들은 '대담함'과 '혁신성'에 찬사를 내린 반면, 정부 일각에서는 경악을 금치 못하고 있다."
 klimt.912.f: "\"징그럽구만!\"\n\"입체파라고 합니다. 나리.\""
 klimt.912.g: "예술은 예술일 뿐."
 klimt.912.h: "저 초상화를 없애 버리시오!"
 klimt.913.t: "근사한 초상화"
 klimt.913.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName](은)는 [SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle]의 초상화를 그리며 본인 스스로의 정점을 뛰어넘었다. 초상화는 곧바로 열렬한 호응을 불러일으켰고 작가의 역대 최고작으로 꼽히기에 이르렀다."
 klimt.913.f: "\"키 6.5피트(198cm)에 헤라클레스 같은 근육, 나폴레옹 같은 강인한 모습, 아프로디테를 쏙 빼닮은 얼굴... 그래 맞아, 이게 바로 나야! 화가에게는 잔뜩 챙겨주도록 하시오.\""
