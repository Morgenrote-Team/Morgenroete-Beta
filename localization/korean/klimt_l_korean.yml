 klimt_add_x_painting_tradition_plus_x_tt: "[THIS.GetCountry.GetName] gains [SCOPE.GetValue('painting_tradition_amount')|0+] @klimt_painting_tradition! [concept_klimt_painting_tradition]."
 klimt.403.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] has returned from [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] study trip and has brought with [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHim] new experiences, new knowledge and new inspiration. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe|U] has also somewhat improved [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] reputation in the art world."
 klimt.425.d: "Since [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] arrival in [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName], [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] has had hundreds and thousands of impressions. It's been a long time since one idea followed the next. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] can literally feel how this place invigorates [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHim]."
