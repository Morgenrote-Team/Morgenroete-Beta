 klimt.11.t: "Dissolution of a Gallery"
 klimt.11.d: "The government can no longer guarantee a National Gallery in [SCOPE.sState('klimt_gallery_state').GetName]. It was decided to dissolve it and transfer the most important exhibits to our capital."
 klimt.11.f: "If a National Gallery exists outside the capital, it will automatically be dissolved and exhibited in its own National Gallery. If there is no National Gallery yet, a new one will be built."
 klimt.11.g: "This exquisite collection of paintings will enrich our National Gallery."
 klimt.11.h: "Take the collection as the basis for building a new National Gallery."
 alert_klimt_painter_trip_possible_alert_hint: "You have a [concept_klimt_painter] who could study a new Art Style in a [concept_artists_center_of_arts]. Press the Button in the Artist Tab in the #V Morgenröte Window#! to send them."
 klimt_add_x_painting_tradition_minus_x_tt: "[THIS.GetCountry.GetName] loses [SCOPE.GetValue('painting_tradition_amount')|0+] @klimt_painting_tradition! [concept_klimt_painting_tradition]."
