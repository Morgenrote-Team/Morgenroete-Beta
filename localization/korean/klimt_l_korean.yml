 je_klimt_painter_trip: "유학"
 je_klimt_painter_trip_reason: "[concept_klimt_painter_trip]을 통해 화가는 이전에 알지 못했던 미술 양식을 익히고 이를 통해 해마다 [concept_klimt_painting_tradition]을 쌓게 됩니다. 또한 해외에 있는 [concept_artists_center_of_arts]에 머무는 동안 여러 긍정적, 부정적 특성을 새로 지닐 수 있습니다."
 je_klimt_painter_trip_goal: "화가의 배움에는 보통 #G 12개월#!이 소요됩니다. 이벤트를 통해 이 시간을 늘리거나 단축할 수 있습니다."
 je_klimt_secession: "아르누보 분리파"
 je_klimt_secession_reason: "아르누보라 불린 새로운 예술 운동이 수많은 예술가들을 매료시키고 있습니다. 일정 환경 내에서 국제적인 명성을 얻고, 회화와 건축에 새로운 활력을 불어넣는 확고한 예술 운동으로 나아갈 수 있습니다. 실제 역사에서 이러한 유형의 가장 중요한 집단으로 '빈 분리파'가 꼽힙니다. 빈 분리파, 정확한 명칭으로 오스트리아 예술가 협회는 19세기 말 빈에서 활동했던 예술가 단체입니다. 이 점에 착안하여 빈에서 유행한 아르누보 양식을 분리파 양식 또는 빈 아르누보라고도 부릅니다."
 je_klimt_secession_fail: "다른 국가에서 우리보다 먼저 분리파를 해금함"
