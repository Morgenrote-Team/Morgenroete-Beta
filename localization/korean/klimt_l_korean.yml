 klimt_classic_school_desc: "이 인물은 고전주의 예술 양식을 공부하였습니다. 40세가 넘으면 해당 예술 양식에 주력할 수 있습니다."
 klimt_romantic_school_desc: "이 인물은 낭만주의 예술 양식을 공부하였습니다. 40세가 넘으면 해당 예술 양식에 주력할 수 있습니다."
 klimt_realistic_school_desc: "이 인물은 사실주의 예술 양식을 공부하였습니다. 40세가 넘으면 해당 예술 양식에 주력할 수 있습니다."
 klimt_impressionistic_school_desc: "이 인물은 인상주의 예술 양식을 공부하였습니다. 40세가 넘으면 해당 예술 양식에 주력할 수 있습니다."
 klimt_expressionistic_school_desc: "이 인물은 표현주의 예술 양식을 공부하였습니다. 40세가 넘으면 해당 예술 양식에 주력할 수 있습니다."
 klimt_art_nouveau_school_desc: "이 인물은 아르누보 예술 양식을 공부하였습니다. 40세가 넘으면 해당 예술 양식에 주력할 수 있습니다."
 klimt_classic_painter_desc: "이 인물은 고전주의 회화에 주력하고 있습니다. 이것으로 고전주의 걸작을 제작할 수 있습니다."
 klimt_romantic_painter_desc: "이 인물은 낭만주의 회화에 주력하고 있습니다. 이것으로 낭만주의 걸작을 제작할 수 있습니다."
 klimt_realistic_painter_desc: "이 인물은 사실주의 회화에 주력하고 있습니다. 이것으로 사실주의 걸작을 제작할 수 있습니다."
 klimt_impressionistic_painter_desc: "이 인물은 인상주의 회화에 주력하고 있습니다. 이것으로 인상주의 걸작을 제작할 수 있습니다."
 klimt_expressionistic_painter_desc: "이 인물은 표현주의 회화에 주력하고 있습니다. 이것으로 표현주의 걸작을 제작할 수 있습니다."
