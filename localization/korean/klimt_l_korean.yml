 klimt.11.t: "미술관 폐관"
 klimt.11.d: "정부에서는 [SCOPE.sState('klimt_gallery_state').GetName]의 국립 미술관을 더 이상 유지할 수 없게 되었다. 이에 미술관을 폐관하여 대표 전시품들을 우리 수도로 이전하는 방침이 내려졌다."
 klimt.11.f: "국립 미술관이 수도 바깥에 존재한다면 자동으로 폐쇄되며 원래의 국립 미술관으로 자리를 옮겨 전시가 이루어지게 됩니다. 국립 미술관이 아직 없다면 하나가 새로 지어집니다."
 klimt.11.g: "이곳의 아름다운 회화 소장품이 우리네 국립 미술관을 풍성하게 만드리라."
 klimt.11.h: "소장품을 기반으로 새로운 국립 미술관을 건설하라."
 alert_klimt_painter_trip_possible_alert_hint: "[concept_klimt_painter]가 [concept_artists_center_of_arts]에서 새로운 예술 양식을 공부할 수 있습니다. #V 모르겐뢰테 창#!의 예술가 탭에 있는 버튼을 눌러 유학을 보내십시오."
 klimt_add_x_painting_tradition_minus_x_tt: "[THIS.GetCountry.GetName]에서 @klimt_painting_tradition![concept_klimt_painting_tradition] [SCOPE.GetValue('painting_tradition_amount')|0+]을 상실합니다."
 klimt_add_x_painting_tradition_0_tt: "[THIS.GetCountry.GetName]에서 @klimt_painting_tradition![concept_klimt_painting_tradition]을 획득하지 않습니다."
 klimt_add_x_painting_tradition_plus_x_tt: "[THIS.GetCountry.GetName]에서 @klimt_painting_tradition![concept_klimt_painting_tradition] [SCOPE.GetValue('painting_tradition_amount')|0+]을 획득합니다."
 klimt.403.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName](이)가 새로운 경험, 새로운 지식, 새로운 영감을 품에 안고 유학길에서 돌아왔다. 이와 더불어 미술계에서 [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe|U]의 명예도 한층 높아지게 되었다."
 klimt.425.d: "[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]에 발을 내딛은 이래 [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName](은)는 수백 수천 가지의 인상을 마음 속에 담았다. 아이디어가 연이어 나오는 것은 정말이지 오랜만이다. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName](은)는 이곳이 본인에게 얼마나 활력을 주는지 고스란히 느꼈다."
 country_klimt_decorative_painting_tradition_add: "연간 @klimt_painting_tradition! [concept_klimt_painting_tradition]"
 country_klimt_decorative_painting_tradition_add_desc: "우리나라에서 매달 누적되는 [concept_klimt_painting_tradition]의 양입니다."
 alert_klimt_painter_trip_possible_alert_action: "$mr_alert_send_to_arts_artists$"
 klimt_has_x_painting_tradition_tooltip_trigger_tt: "#default_text [GetPlayer.GetName]에서 보유한 [concept_klimt_painting_tradition]의 양이 @klimt_painting_tradition!#V [SCOPE.GetValue('variable_amount')|0] 이상#! (현재 [GetPlayer.MakeScope.GetVariable('klimt_painting_tradition_var').GetValue|0])#!"
 klimt.2.t: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName](이)가 해당 양식에 전념하게 됨"
 klimt.2.d: "자신의 기법 개선을 위해 긴 세월 동안 경험과 인상을 쌓아온 [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName](이)가 마침내 선호하던 예술 양식에 안착하게 되었다."
 je_klimt_painter_trip_fail: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]가 유학을 조기에 마쳐야 하거나, 외국에 머무는 과정에서 다른 화가로 교체되거나 사망하는 경우 새로운 예술 양식 [concept_character_trait]을 획득할 수 없음"
 klimt.2.h: "고전주의 회화야말로 여느 양식에 비할 데가 없다."
 klimt.2.i: "낭만주의야말로 회화에 혼을 불어넣지."
 klimt.2.j: "사실주의에 필적할 만한 것이 또 있겠나?"
 klimt.2.k: "인상주의로 인상을 주어야 한다는 인상이 있다네."
 klimt.2.l: "구겔후프!"
 klimt.2.m: "다른 것보다 아르누보가 예술 그 자체지."
