l_korean:
 klimt_painter: "화가"
 klimt_painter_desc: "이 인물은 그림 그리기에 특화된 예술가입니다. 언젠가 이 인물의 그림이 전세계적으로 알려지게 될지도 모르겠군요."
 klimt_great_painter: "위대한 화가"
 klimt_great_painter_desc: "이 인물은 세계에서 가장 위대한 화가로 꼽힙니다. 이 인물의 그림은 주요 미술관이라면 하나씩 걸려 있으며, 수집가들 사이에서도 거액에 거래되고 있습니다."
 klimt_spitzweg_not_funny_modifier: "의심쩍은 슈피츠베크"
 klimt.1300.t: "칼 슈피츠베크의 《가난한 시인》"
 klimt.1300.d: "《가난한 시인》(Der arme Poet)은 독일의 화가 칼 슈피츠베크의 대표작으로 잘 알려진 작품이다. 이 그림은 1839년에 제작되었으며 세 가지 판본이 있었다. 초창기 걸작으로 평가된다."
 klimt.1300.f: "카를 슈피츠베크는 독일 낭만주의 화가이자 시인이다. 슈피츠베크는 비더마이어 시대의 대표적인 예술가로 평가받고 있다. 부유한 상인이었던 아버지는 카를을 약사로 키웠다. 슈피츠베크는 뮌헨 대학교를 졸업하였지만, 투병 과정에서 그림에 입문하였다. 독학으로 미술을 익힌 그는 플랑드르 거장들의 작품을 모사하는 것으로 시작했다. 슈피츠베크의 첫 작품은 풍자 잡지에 투고되었다. 1833년 아버지의 유산을 물려받은 슈피츠베크는 그림에 전념할 수 있게 되었다. 슈피츠베크의 후기 회화와 드로잉은 해학적인 풍속화가 주를 이루며, 개성이 뚜렷한 괴짜 인물들이 묘사된 그림이 많다."
 klimt.1300.g: "아하하, 웃긴 화가로군!"
 klimt.1300.h: "잠깐! 누굴 풍자한 거지?"
