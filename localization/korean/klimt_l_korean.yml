 klimt_painter_trip_possible_tt: "#default_text [concept_klimt_painter]는 다른 예술 양식을 습득하기 위해 유학을 떠날 수 있습니다. 다만 아직 화가가 익히지 못한 예술 양식에 해당되는 [concept_artists_center_of_arts]가 존재해야 이러한 회화 유학을 떠날 수 있습니다. 40세를 넘긴 화가는 더 이상 예술 양식을 배우지 않게 됩니다.#!"
