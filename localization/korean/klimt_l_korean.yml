 klimt_recently_hired_independent_painter_modifier: "Recently hired Independent Painter"
 klimt.2.f: "At the age of around 40, a [concept_klimt_painter] will consider his studies to be complete and will finally settle on his preferred painting style. The rule of thumb is that this style is based on the most modern genre, with Art Nouveau being the most modern and Classicism being the most archaic art form. Painters with a specialized painting style will create masterpieces in this art style under certain conditions. You can also initiate an art collection in a gallery that suits your taste. A specialized painter considers his painting training to be complete and will no longer go on educational journeys."
 klimt.2.g: "The painting style is now mature."
 klimt.10.t: "Gallery inaugurated"
 klimt.10.d: "The newly appointed director opened the new art gallery with a celebratory ceremony. One of the guests of honor was [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName], who attended the act with satisfaction."
 klimt.10.f: "The construction of a national gallery opens up a variety of possibilities. Specialized painters will automatically create an art collection tailored to their tastes. Accordingly, artists who have abandoned the Romantic style will create a collection of Romantic paintings. Such an art collection can be further enhanced with a masterpiece to make it an excellent collection. Masterpieces can be painted randomly over time by artists in this art movement or acquired from abroad."
 klimt.10.g: "Finally we no longer have to store this stuff in the attic!"
 klimt.20.t: "National Gallery"
 klimt.20.d: "The defining masterpieces of an era are displayed in the art gallery. We currently own the following unique paintings:"
 klimt.20.none: "We currently have no masterpieces in the National Gallery."
 klimt.20.classicism: "#T Classicism:#!\n#YELLOW '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]'#!, acquired in [ROOT.Var('klimt_classic_masterwork_year_var').GetValue]."
 klimt.20.romanticism: "\n\n#T Romanticism:#!\n#YELLOW '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]'#!, acquired in [ROOT.Var('klimt_romantic_masterwork_year_var').GetValue]."
 klimt.20.realism: "\n\n#T 사실주의: #!\n#YELLOW 〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]〉#! ([ROOT.Var('klimt_realistic_masterwork_year_var').GetValue]년 구입)"
 klimt.20.impressionism: "\n\n#T 인상주의: #!\n#YELLOW 〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]〉#! ([ROOT.Var('klimt_impressionistic_masterwork_year_var').GetValue]년 구입)"
 klimt.20.expressionism: "\n\n#T 표현주의: #!\n#YELLOW 〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]〉#! ([ROOT.Var('klimt_expressionistic_masterwork_year_var').GetValue]년 구입)"
 klimt.20.art_nouveau: "\n\n#T 아르누보: #!\n#YELLOW 〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]〉#! ([ROOT.Var('klimt_art_nouveau_masterwork_year_var').GetValue]년 구입)"
 klimt.20.g: "Have a nice day."
 klimt.30.t: "A Breath of fresh Air for Art"
 klimt.30.d: "[SCOPE.sState('klimt_secession_state').GetCityHubName] has become the center of an international outstanding art movement deeply connected with Art Nouveau. The artistic circle describes itself as the '[SCOPE.sState('klimt_secession_state').GetCityHubName]  Secession'."
 klimt.30.f: "The Vienna Secession is an art movement, closely related to Art Nouveau, that was formed in 1897 by a group of Austrian painters, graphic artists, sculptors and architects, including Josef Hoffman, Koloman Moser, Otto Wagner and Gustav Klimt. They resigned from the Association of Austrian Artists in protest against its support for more traditional artistic styles. Their most influential architectural work was the Secession Building designed by Joseph Maria Olbrich as a venue for expositions of the group. Their official magazine was called Ver Sacrum (Sacred Spring, in Latin), which published highly stylised and influential works of graphic art. In 1905 the group itself split, when some of the most prominent members, including Klimt, Wagner, and Hoffmann, resigned in a dispute over priorities, but it continued to function, and still functions today, from its headquarters in the Secession Building. In its current form, the Secession exhibition gallery is independently led and managed by artists."
 klimt.30.g: "This kiss for the whole world!"
 klimt.30.h: "Klimt? You mean Gustav Klimt?"
 klimt.30_tt: "Triggers the Event #white #b The First Secession#!#!"
 klimt.40.t: "Vernissage"
 klimt.40.d: "The exhibition in [SCOPE.sState('klimt_vernissage_state').GetCityHubName] was entirely dedicated to the works of [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]. The event is considered one of the cultural highlights of the year and has earned it critical acclaim. For our country it is confirmation that we are a leading cultural nation."
 klimt.40.f: "'What am I in the eyes of most people — a nonentity, an eccentric, or an unpleasant person — somebody who has no position in society and will never have; in short, the lowest of the low. All right, then — even if that were absolutely true, then I should one day like to show by my work what such an eccentric, such a nobody, has in his heart.\nThat is my ambition, based less on resentment than on love in spite of everything, based more on a feeling of serenity than on passion.\nThough I am often in the depths of misery, there is still calmness, pure harmony and music inside me. I see paintings or drawings in the poorest cottages, in the dirtiest corners. And my mind is driven towards these things with an irresistible momentum.' -Vincent van Gogh"
 klimt.40.g: "How was the buffet?"
 klimt.101.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]"
 klimt.101.d: "At his vernissage, Maestro [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] presented [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] latest painting to the public: '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]' is a typical work of classicism and is already considered significant in this genre."
 klimt.101.f: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName]'s new work immediately caught the attention of art experts. In particular, the more conservative-minded academics liked the aesthetic forms and the balance of line and color. The moral integrity and sublimity of the work of art were particularly emphasized. The picture is already considered an excellent cultural heritage of our nation and should be the adornment of any gallery."
 klimt.101.g: "This belongs in a ... Gallery!"
 klimt.102.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]"
 klimt.102.d: "The national painter [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] presented [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] work to the public with a few invited guests. The sensuality and the power of the colors make an impression on the audience. The painting is already considered a key work of Romanticism."
 klimt.102.f: "'[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]' already had a strong impact on some visitors on the first evening. The spirit behind the masterpiece is clearly noticeable. Critics complained that the contours were blurred in some places, others saw the strength of the subject in this lack of clarity combined with the richness of color. With this painting, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] has certainly secured an entry in the books of art history."
 klimt.103.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]"
 klimt.103.d: "At a soirée, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] took advantage of the opportunity to show a new painting that can clearly be assigned to realism. Some art experts in attendance praised the work."
 klimt.103.f: "Some guests present had feared a more provocative surprise, but '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]' turned out to be a very sober representation. At first glance, some guests mistook it as a genre painting. But the longer those present looked at the depiction of an everyday scene, the clearer the subtle, inflammatory idea behind it and the social issues to which the author was alluding became clear. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] may have alienated a few members of the evening society with the socially critical approach, but the overwhelming opinion is that such an art treasure belongs in a worthy exhibition on a national level."
 klimt.104.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]"
 klimt.104.d: "At a large art exhibition by high-ranking representatives of the national painting society, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] presented a work that, although it gained considerable attention, also attracted the ridicule of some critics. However, a high-priced offer from a foreign art dealer has suddenly made it very popular."
 klimt.104.f: "Opinions were divided when '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]' was presented. Some found the idyll almost naive and without political or social aspirations, others criticized the lack of form and lines. Someone scoffed that the dissolving landscape was probably due to the author's dissolving brain. The proponents could not prevail until an art dealer from [SCOPE.sCountry('klimt_art_dealer_country').GetName] particularly emphasized the quality and innovative spirit of the masterpiece. He was immediately prepared to pay an overwhelming price for the painting and take it back to his country. After this episode, interest in the image grew more, which was immediately declared a national cultural heritage. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] can be more than happy about it."
 klimt.105.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]"
 klimt.105.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]'s latest picture has aroused horror, hatred, anger and disgust among audiences and critics. In other words: it was a sensational success!"
 klimt.105.f: "'What does that even mean: '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]'? What's the point? What are these colors from a kindergarten coloring book? These crude figures? These delirious scenes? You call that art? ART?! You charlatan! If you spit on the picture, it would be more art than it is now!'\n\nAnd that was one of the more positive comments at the presentation. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] has thereby caused a historic scandal that only increases the importance of the picture."
 klimt.106.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]"
 klimt.106.d: "After the publication of [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] new work '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]'', [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] is considered one of the most important artists on the international scene. It thrilled traditionalists and avant-garde alike."
 klimt.106.f: "'What is it, Art Nouveau? Art can never be new.' -Alphonse Mucha"
 klimt.110.t: "A discreet Order"
 klimt.110.d: "An experienced art and antiques dealer has offered to procure a rare masterpiece abroad. Extreme discretion is required in this matter - the dealer also buys from rivals and even war opponents. [SCOPE.sCharacter('klimt_art_dealer').GetFullName] has assured that he will fulfill his order quietly - assuming good pay and some paintings in return."
 klimt.110.f: "In order to purchase a foreign painting, an art dealer abroad must make a suitable offer. This includes not only money, but also a few paintings in return - which will damage our [concept_klimt_painting_tradition]. An art dealer can only buy masterpieces in countries that have more than one painting of the same style - they will not sell a unique piece. Likewise, a nation cannot purchase more than one masterpiece of a style abroad. It will take about six months for the deal to be completed and for the painting to arrive in our National Gallery."
 klimt.110.g: "고전주의 걸작 보유"
 klimt.110.h: "낭만주의 걸작 보유"
 klimt.110.i: "사실주의 걸작 보유"
 klimt.110.j: "인상주의 걸작 보유"
 klimt.110.k: "표현주의 걸작 보유"
 klimt.110.l: "아르누보 걸작 보유"
 klimt.111.t: "고전주의 걸작"
 klimt.111.d: "오늘 국립미술관의 새로운 걸작으로 〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]〉라는 작품이 들어왔습니다. 정부 측은 이 작품에 매우 만족하는 분위기입니다. 미술상은 자신이 할 일은 다 했다는 입장입니다."
 klimt.111.f: "큰 기대는 어긋나지 않았습니다. 〈[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]〉(은)는 요구한 바를 확실히 담아내며 [GetPlayer.GetNameNoFlag]의 회화 소장품에 훌륭한 보탬이 될 것입니다. 관련 업계의 언론들도 이번 거래는 투자한 전액만큼의 가치가 있다고 입을 모았습니다. 다음 달에는 고전주의의 정점인 이번 작품을 조명하는 전시가 예정되어 있습니다."
 klimt.111.g: "우리 소장품에 또 하나의 귀한 작품이 들어왔구나! "
 klimt.112.t: "A Masterwork of Romanticism"
 klimt.112.d: "Some onlookers gathered at the National Gallery today. Representatives of the local and national press have also been besieging the place since the early hours of the morning. The word has already gotten around that '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]', a romantic masterpiece, is about to arrive in the picture collection."
 klimt.112.f: "There have already been some rumors about '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]'. It should be a colorful painting that stimulates the senses. No further information is known about the subject. The unknown art dealer, who could provide more information, is said to have gone abroad with a big chunk of money and made plans for his retirement. He was no longer available for interviews."
 klimt.113.t: "A Masterwork of Realism"
 klimt.113.d: "The new masterpiece '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]' was presented to the public in a ceremony today as part of a special exhibition. The piece belongs to the genre of realism and is considered one of the key paintings of this art era. The crowd was correspondingly large. The tickets for the event were completely sold out weeks before."
 klimt.113.f: "'It is both a great honor and a pleasure for me, as director of the National Gallery, to be able to present to you today the new masterpiece that will enrich our picture collection from today. As you know, we have been working for a long time to be able to call a key work of realism our own. '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]' is exactly that. I don't need to say much about the painter, you all know him. With its sober depiction and everyday relevance, it was initially misunderstood by critics as genre painting or as spiritless. But in reality its content is profound. Note the details in the coloring that give the impression that...'"
 klimt.114.t: "A Masterwork of Impressionism"
 klimt.114.d: "The art dealer fulfilled his mission today and delivered '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]' to those responsible at the National Gallery for a hefty reward. The process went smoothly. The director also commented positively on the purchase, but complained that the colors were a bit blurry."
 klimt.114.f: "'I am very depressed and deeply disgusted with painting. It is really a continual torture.' -Claude Monet"
 klimt.115.t: "A Masterwork of Expressionism"
 klimt.115.d: "'[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]', the masterpiece from abroad procured by a trusted art dealer, has finally arrived in [GetPlayer.GetNameNoFlag]. However, one cannot speak of undivided approval. The art dealer also left after paying and cannot be found."
 klimt.115.f: "After '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]' arrived, some art connoisseurs expressed surprise, if not criticism. The unusual composition gave the impression that it could hardly be the work of a renowned artist. The unusual name, which had little to do with the daubing, also aroused suspicion as to whether they had perhaps come across a charlatan who had had a joke. The fact that an authentic autograph was found on the picture made things worse rather than better. Be prepared for strong reactions from the audience."
 klimt.116.t: "A Masterwork of Art Nouveau"
 klimt.116.d: "The director of the National Gallery was relieved to discover today that the masterpiece had arrived from overseas. [SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')] is pure eye candy."
 klimt.116.f: "When [SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')] was finally brought out of the box, it immediately captured the hearts of those present like a new tiger cub in a zoo. Or a new major artifact in a museum. Or a newly found planet in an observatory. Or a composer's new musical masterpiece. Or a reassembled skeleton of a paleontologist. Or the found remains of a human ancestor. Or ..."
 klimt.116.g: "Or a win at the Schneider Trophy?"
 klimt.301.t: "[SCOPE.sState('klimt_art_capital').GetCityHubName] 예술상"
 klimt.301.d: "미술을 사랑하는 우리나라의 엘리트층에서 최고의 그림을 선정하는 예술상 제정을 추진하고 있습니다."
 klimt.301.f: "미술관을 보유한 국가들은 간혹 미술 대회를 개최합니다. 가장 뛰어난 화가 다섯 명이 입상하여 명성에 큰 영향을 미치게 됩니다. 미술 대회는 보통 5년에 한 번씩 열립니다. 위대한 화가들은 이미 본인의 공로를 인정받았기 때문에 초청받지 않습니다."
 klimt.301.g: "미술 대회를 개최해야겠다."
 klimt.301.h: "돈 낭비야!"
 klimt.302.t: "[SCOPE.sState('klimt_art_capital').GetCityHubName] 예술상"
 klimt.302.d: "심사위원단이 심사를 마치고 최고의 그림들을 선정했습니다. 5인의 수상 명단이 벌써 공개되었습니다."
 klimt.302.f: "1등 - [SCOPE.sCharacter('klimt_character_first_winner_scope').GetFullName] ([GetGlobalVariable('klimt_prize_winner_1_global_var').GetCountry.GetName])\n 2등 - [SCOPE.sCharacter('klimt_character_second_winner_scope').GetFullName] ([GetGlobalVariable('klimt_prize_winner_2_global_var').GetCountry.GetName])\n 3등 - [SCOPE.sCharacter('klimt_character_third_winner_scope').GetFullName] ([GetGlobalVariable('klimt_prize_winner_3_global_var').GetCountry.GetName])\n 4등 - [SCOPE.sCharacter('klimt_character_fourth_winner_scope').GetFullName] ([GetGlobalVariable('klimt_prize_winner_4_global_var').GetCountry.GetName])\n 5등 - [SCOPE.sCharacter('klimt_character_fifth_winner_scope').GetFullName] ([GetGlobalVariable('klimt_prize_winner_5_global_var').GetCountry.GetName])"
 klimt.302.g: "입상자에게 상을 수여하도록."
 klimt.401.t: "화가의 견학 대상"
 klimt.401.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName](은)는 이미 떠날 채비를 마쳤습니다. 어떤 미술 양식을 배우는 것이 좋을까요?"
 klimt.401.f: "미술 견학으로 배움을 계속하는 [concept_klimt_painter]는 본인의 부재로 인해 [concept_klimt_painting_tradition]을 쌓지 않게 됩니다. 미술 양식은 이전에 자신이 배우지 않았던 것만 익힐 수 있습니다. 보통 이런 견학은 1년 동안 이어지지만 어떤 걸림돌이나 기회로 인해 체류기간이 연장될 수도 있습니다."
 klimt.401.g: "고전주의"
 klimt.401.h: "낭만주의"
 klimt.401.i: "사실주의"
 klimt.401.j: "인상주의"
 klimt.401.k: "표현주의"
 klimt.401.l: "아르누보"
 klimt.401.m: "상관 없다."
 klimt.402.t: "[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] 도착"
 klimt.402.d: "좋은 소식입니다! [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName](이)가 [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]에 도착했다고 합니다. 아직은 공짜 숙소를 물색하고 있다고 하며 머지않아 배움에 나설 것이라고 합니다."
 klimt.402.f: ""
 klimt.402.g: "아... [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]라."
 klimt.403.t: "미술 견학에서 돌아온 [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]"
 klimt.403.f: "'예술은 오직 그 자체로 목적일 때, 절대적으로 자유로울 때, 스스로에게 맡겨졌을 때, 그리고 진리와 아름다움이라는 자신만의 규칙 외에 더 높은 규칙을 감안하지 않을 때 비로소 예술이 된다.' - 루트비히 포이어바흐"
 klimt.403.g: "그래서 그 견학 내내 유흥만 좇은 것은 아니겠지?"
 klimt.411.t: "Fellow painters among themselves"
 klimt.411.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] met a fellow painter from [SCOPE.sCharacter('klimt_fellow_painter').GetHomeCountry.GetName] on his study trip. The two recognize each other as equal colleagues. [SCOPE.sCharacter('klimt_fellow_painter').GetFullName] seems to be a gifted spirit and sociable."
 klimt.411.f: "If by chance several nations have sent a painter on a study trip at the same time, then there is a possibility that they will meet and there will be positive synergetic effects. Rivalries and enmities can then quickly disappear in the interests of shared enthusiasm for art."
 klimt.411.g: "They should exchange their artistic knowledge."
 klimt.411.h: "They can certainly learn from each other's techniques."
 klimt.411.i: "The acquaintance will be useful in the art world to support each other."
 klimt.421.t: "In the Footsteps of Giants"
 klimt.421.d: "Our painter wrote from [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] place of study that [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] already foresees [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] future in glorious visions. What [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] needs, however, is more time and more money."
 klimt.421.f: "In Rome, [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] is confronted with some of the most important painters in art history as well as with the remains of Roman architecture. Time and time again, travelers to Rome have developed a special relationship with this city and its history. The desire to follow in the footsteps of the classics has moved many an artist. [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]'s ambition grows to one day become an artist just as great as one of [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] idols. This may border on megalomania, but above all it will take time, patience - and further studies, as [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] said in a letter."
 klimt.421.g: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] should take [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] time and emulate Michelangelo and Raphael."
 klimt.421.h: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] should paint, not daydream!"
 klimt.422.t: "Spirit of the Romantics"
 klimt.422.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] hasn't written back from Bamberg for days. Apparently [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] indulges in daydreaming."
 klimt.422.f: "Bamberg is not just a picturesque place with numerous half-timbered houses and a rich baroque heritage that invite you to linger romantically. There is something about this city that made it incredibly attractive to the romantics. Ludwig Tieck and Heinrich Wackenroder were important romantics who actually came from Berlin, but on whom Franconian left their mark. They too were less interested in their studies and more interested in the country, its people and the rich heritage of the cities in the area. E. T. A. Hoffmann, another romantic from Prussia, experienced his literary breakthrough during his five-year stay in Bamberg. What his trip to Italy was for Goethe, this part of Germany was for young romantics. In the cultural landscape they not only found a connection to the idealized German Middle Ages, but also to the paintings of Albrecht Dürer in Nuremberg and to Catholicism, whose spirituality appealed more to the Romantics than secularized Protestantism."
 klimt.422.g: "The life of a good-for-nothing..."
 klimt.423.t: "Conversion"
 klimt.423.d: "Actually, [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] hasn't had much of a relationship with faith so far. However, the strong Catholicism he was confronted with, both in art and in everyday life, triggered something in [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHim]. More and more [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] feels a connection that [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] would never have thought possible until then. Inspired by this, [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] painted [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] first religious picture."
 klimt.423.f: "'See Bamberg and become Catholic' was a motto among German Romantics. In fact, German Romanticism was one of the few eras influenced more by Catholic than Protestant thinkers, including many converts. In a similar way, Rome also brought doubters into the fold of the Church. This may be surprising in a materialistic age in which progress and science played a leading role in society, but it was precisely the need for a counter-response that ultimately led a hedonist to the monastery."
 klimt.423.g: "I hope this isn't a cheesy picture of the Madonna."
 klimt.423.tt: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] loses all negative addictive traits and converts to #YELLOW Catholicism#! if [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] is not yet a Catholic."
 klimt.424.t: "Attention to Detail"
 klimt.424.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] found in [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] a master of realism who would help him improve [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] painting technique. However, this will take months - and the fee is hefty."
 klimt.424.f: "'Painting is an essentially concrete art and can only consist of the representation of real and existing things.' -Gustave Coubert"
 klimt.424.g: "This may take some time, but it's worth it."
 klimt.424.h: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] should rather concentrate on gaining recognition from the master."
 klimt.425.t: "Inspiration without limits"
 klimt.425.f: "'Since the appearance of Impressionism, the official salons, which used to be brown, have become blue, green, and red.. .But peppermint or chocolate, they are still confections.' -Claude Monet"
 klimt.425.g: "These new ideas will inspire him to create numerous paintings."
 klimt.425.h: "These new ideas should inspire our culture at home."
 klimt.426.t: "An Artist's Life"
 klimt.426.d: "The sophisticated life in [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] has also left its mark on [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]. [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe|U] often hangs out in bars and pubs - and uses stimulants to increase [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] creative power. Without one or two intoxications, [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] would hardly be able to complete [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] workload in such a short time."
 klimt.426.f: "'After the first glass, you see things as you wish they were.\nAfter the second, you see things as they are not.\nFinally, you see things as they really are,\nwhich is the most horrible thing in the world.' -Oscar Wilde"
 klimt.426.g: "If that inspires [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] art - where is the problem?"
 klimt.426.h: "Then it just takes longer."
 klimt.427.t: "An Artist's Vice"
 klimt.427.d: "We are receiving worrying reports from [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]. [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]'s addictions reach frightening proportions. Apparently [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] uses his absence to indulge in vices and debauchery, which put a significant strain on [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] health."
 klimt.427.f: "Camille Pissarro, Henri de Toulouse-Lautrec, Paul Gauguin, Oscar Wilde and Charles Baudelaire - they all fell victim to absinthe intoxication. The same applies to Vincent van Gogh. Gabriele D'Annunzio, on the other hand, was looking for erotic adventures. Jean Cocteau discovered opium for himself and wrote a diary about its use and effects. The fact that in many cases these addictions and vices led to self-destruction and premature death is one of the tragic episodes of artists' lives."
 klimt.427.g: "Every artist has a vice."
 klimt.427.h: "We have to intervene!"
 klimt.427.tt: "The educational trip is cancelled. [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] is taken into custody by our agents in [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] and brought back to [GetPlayer.GetName]. He will be put into rehab there for the next six months."
 klimt.428.t: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] is available again"
 klimt.428.d: "After a break of several months, our painter has returned to [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] usual day-to-day business. [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] didn't give up [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] lifestyle, but at least something worse could be prevented."
 klimt.428.f: "'A kidnapping? No, no, monsieur, that was an intervention. A kidnapping would happen to your suffering, an intervention is only initiated for your good... what do you mean, we don't know what's best for you?'"
 klimt.428.g: "Hopefully things will return to normal now."
 klimt.431.t: "Veduta"
 klimt.431.d: "Inspired by the beauty of [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] host city [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] our painter began painting a masterful veduta picture on an educational trip. However, that could extend [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] stay a bit."
 klimt.431.f: "A veduta is a highly detailed, usually large-scale painting or, more often, print of a cityscape or some other vista. The painters of vedute are referred to as vedutisti. In the later 19th century, more personal \"impressions\" of cityscapes replaced the desire for topographical accuracy, which was satisfied instead by painted, and later photographed, panoramas. The most important veduta painters of this time include David Roberts and Eduard Gaertner."
 klimt.431.g: "A splendid idea."
 klimt.431.h: "Concentrate on studying."
 klimt.432.t: "Painting Circle"
 klimt.432.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] has been welcomed into [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]'s local artist group as one of their own."
 klimt.432.f: "'I must stay alone and know that I am alone to contemplate and feel nature in full; I have to surrender myself to what encircles me, I have to merge with my clouds and rocks in order to be what I am. Solitude is indispensible for my dialogue with nature.' -Caspar David Friedrich"
 klimt.432.g: "We need the recognition of the painting world."
 klimt.433.t: "Quick Comprehension"
 klimt.433.d: "On [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] educational journey in [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName], our artist is making faster progress than expected. Maybe [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] can return sooner."
 klimt.433.f: "'Talent does whatever it wants to do. Genius does only what it can.' -Eugène Delacroix"
 klimt.433.g: "You can see talent at first glance."
 klimt.434.t: "Art Dealer"
 klimt.434.d: "During [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] educational stay, [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] found a renowned art dealer who might sell a few pieces."
 klimt.434.f: "'I am an absolutely serious businessman. My competitors' slanders that I sell counterfeits are only due to envy. Can I now get you excited about this painting? A real Leonardo da Vinci: The Lady with the Sistine Degu. A rarity! An offer like this will never come again!'"
 klimt.434.g: "Buy some paintings."
 klimt.434.h: "We don't need second-rate foreign goods."
 klimt.435.t: "The Latest Fashion"
 klimt.435.d: "On [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] educational journey, our artist learned about new fashions, new architectural styles and new pastimes that were previously unknown to [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis]."
 klimt.435.f: "'Men who came from England knew how to tell their astonished friends that the people across the Channel, however sensible they were, were still very fond of childish pleasures. So young people entertain themselves by kicking a leather ball around on a meadow, others hit the ball over a net with a kind of carpet beater, and this madness attracts spectators in every crowd. Among them there are people in office and dignity - who sometimes even don't disdain to get involved themselves.'"
 klimt.435.g: "The fresh breath of new culture."
 klimt.435.h: "But is it really right to just follow the zeitgeist?"
