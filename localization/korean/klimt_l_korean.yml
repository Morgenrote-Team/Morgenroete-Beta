 klimt.2.t: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] commits [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerselfHimself] to a Style"
 klimt.2.d: "After many years in which [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] collected experiences and impressions to improve [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] technique, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe] finally settled on a preferred style."
 je_klimt_painter_trip_fail: "If [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] has to end [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] journey prematurely gets replaced or dies during [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis] stay in a foreign country, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe] will not acquire a new school [concept_character_trait]."
 klimt.2.h: "고전주의 회화야말로 여느 양식에 비할 데가 없다."
