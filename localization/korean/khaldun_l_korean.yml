 khaldun_al_qarawiyyin_center_of_learning_modifier: "알-카라위인 학습 중심지"
 khaldun.101.t: "알-카라위인: 학문의 중심지"
 khaldun.101.d: "수세기 전, 알-카라위인은 과학과 학문의 중심지였습니다. 이제 다시 세계 주요 대학 중 하나로 그 자리를 되찾았습니다."
 khaldun.101.f: "\"알-카라위인은 유럽의 모든 대학보다 더 오래된 대학입니다. 많은 책들을 소장했지만 안타깝게도 쇠퇴하기 시작했습니다. 오늘은 이 대학이 다시 제자리를 찾는 날입니다!\""
 khaldun.101.g: "알-카라위인은 배움의 등대가 될 것입니다!"
 khaldun.101.h: "알-카라위인은 수학과 공학의 등대가 될 것입니다!"
 khaldun.101.i: "알-카라위인은 자연사의 등대가 될 것입니다!"
 khaldun.101.j: "알-카라위인은 인문학의 등대가 될 것입니다!"