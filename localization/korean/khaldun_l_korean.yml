 khaldun_reorganize_library_button_desc: "이 도서관에는 많은 고서와 책이 있지만 수년 동안 방치되어 왔습니다. 작품의 재정비가 시급히 필요합니다."
 khaldun_accquire_modern_books_button: "최신 도서 확보"
