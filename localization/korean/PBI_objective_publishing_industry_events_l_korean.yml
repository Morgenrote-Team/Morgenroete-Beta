l_korean:
 pbi_objective_publishing_industry_events.200.t: "대성공을 거둔 신문 연재 소설"
 pbi_objective_publishing_industry_events.200.d: "[SCOPE.sState('target_state').GetName] 신문 단독으로 연재된 [SCOPE.sCharacter('target_character').GetFullName]의 소설은 독자들의 열렬한 호응과 함께 완결에 이르렀다."
 pbi_objective_publishing_industry_events.200.f: "연재 기간 동안 신문 판매량은 세 배로 폭등하기에 이르렀다. 출판사는 연재 분량을 요약한 단행본을 출간했고, 해외 시장을 위한 번역도 마무리되었다. 단행본의 판매 실적도 꾸준히 늘고 있다."
 pbi_objective_publishing_industry_events.200.a: "훌륭하오!"
 pbi_objective_publishing_industry_events.200.good: "소설 집필 진행도가 #positive_value 상승#!함"
 pbi_objective_publishing_industry_events.200.bad: "소설 집필 진행도가 #negative_value 감소#!함"
 pbi_objective_publishing_industry_events.200.stop: "#negative_value 장차 소설 진행도가 초기화될 확률이 증가함#!"
 pbi_objective_publishing_industry_events.201.t: "연재 취소"
 pbi_objective_publishing_industry_events.201.d: "[SCOPE.sState('target_state').GetName] 신문에서 연재되던 소설이 작가가 집필을 계속할 상황이 아닌 관계로 도중 완결되었다."
 pbi_objective_publishing_industry_events.201.f: "많은 독자들이 그토록 간절히 기다려온 연재 소설의 나머지 단락은 영영 읽을 수 없게 되었다."
 pbi_objective_publishing_industry_events.201.a: "안 됐군."
 pbi_objective_publishing_industry_events.202.t: "Great Writer of the Future"
 pbi_objective_publishing_industry_events.202.d: "A [SCOPE.sState('target_state').GetName] newspaper company is looking to publish a new newspaper.\nThey are looking for a new novelist for this ambitious newspaper."
 pbi_objective_publishing_industry_events.202.f: "Nowadays, it is not the political statement, the witty editorial of the chief editor, or the sensational three-page article that determines the sales of a newspaper, but the interest of the serialized fiction."
 pbi_objective_publishing_industry_events.202.a: "[SCOPE.sCharacter('target_character_1').GetFullName] is the great writer of the future!"
 pbi_objective_publishing_industry_events.202.a.tt: "Start writing a series of novels"
 pbi_objective_publishing_industry_events.202.b: "I sense an overflowing intelligence from [SCOPE.sCharacter('target_character_2').GetFullName]!"
 pbi_objective_publishing_industry_events.202.c: "[SCOPE.sCharacter('target_character_3').GetFullName]'s writing has an irresistible pull!"
 pbi_objective_publishing_industry_events.202.e: "There must be other gems in the rough that shine!"
 pbi_objective_publishing_industry_events.202.e.tt: "We will look for other candidates"
 pbi_objective_publishing_industry_events.203.t: "Unable to continue writing"
 pbi_objective_publishing_industry_events.203.d: "[SCOPE.sCharacter('target_character').GetFullName] is struggling to make progress on [SCOPE.sCharacter('target_character').GetHerHis] novel. If this continues, the serialization will probably stop."
 pbi_objective_publishing_industry_events.203.f: "A editor in charge visited [SCOPE.sCharacter('target_character').GetLastName]'s home early in the morning to check on the progress of the manuscript, but [SCOPE.sCharacter('target_character').GetSheHe] was not there. The servant said that the master had not been home for three days and did not know where [SCOPE.sCharacter('target_character').GetSheHe] was."
 pbi_objective_publishing_industry_events.203.a: "Tie [SCOPE.sCharacter('target_character').GetHerHim] to a chair, but keep [SCOPE.sCharacter('target_character').GetHerHim] writing!"
 pbi_objective_publishing_industry_events.203.b: "[SCOPE.sCharacter('target_character').GetFullName] needs a change of scenery"
 pbi_objective_publishing_industry_events.204.t: "Who owns the manuscript?"
 pbi_objective_publishing_industry_events.204.d: "The author is refusing to allow the publisher to review the content of a novel that [SCOPE.sCharacter('target_character').GetFullName] is serializing."
 pbi_objective_publishing_industry_events.204.f: "The publisher is concerned that the portrayal of certain characters in the novel may be perceived as making fun of certain politicians."
 pbi_objective_publishing_industry_events.204.a: "Publishers have review rights"
 pbi_objective_publishing_industry_events.204.b: "The author's will should be respected"
 pbi_objective_publishing_industry_events.205.t: "Immoral Content"
 pbi_objective_publishing_industry_events.205.d: "[SCOPE.gsInterestGroup('target_ig').GetName] are demanding improvements to [SCOPE.sCharacter('target_character').GetFullName]'s serialized novels because of their immoral content."
 pbi_objective_publishing_industry_events.205.f: "'The content of [SCOPE.sCharacter('target_character').GetLastName]'s controversial novel, which has been serialized in newspapers, is unacceptable'"
 pbi_objective_publishing_industry_events.205.a: "Great works are unacceptable to old values"
 pbi_objective_publishing_industry_events.205.b: "We need to review the content"
 pbi_objective_publishing_industry_events.206.t: "Suspicion of plagiarism"
 pbi_objective_publishing_industry_events.206.d: "Several novelists have claimed that their work has been plagiarized in [SCOPE.sCharacter('target_character').GetFullName]'s serialized novel."
 pbi_objective_publishing_industry_events.206.f: "'The alleged creativity of your oh-so-esteemed writer is pure fraud. This scene he claims to have made up is based on the chapter of one of my books. How can you deny that? The scene with the bathing woman is completely unique. I claim my copyright!'"
 pbi_objective_publishing_industry_events.206.a: "That's a false accusation"
 pbi_objective_publishing_industry_events.207.t: "A Novel Like a Prophecy"
 pbi_objective_publishing_industry_events.207.d: "The content of [SCOPE.sCharacter('target_character').GetFullName]'s serialized novels has drawn attention for its striking similarity to a recent bizarre murder in [SCOPE.sState('target_state').GetName]."
 pbi_objective_publishing_industry_events.207.f: "'There is no doubt that the problem of poverty that our society is currently facing is behind the occurrence of such incidents. And it is surprising that [SCOPE.sCharacter('target_character').GetLastName]'s novel, which is currently being serialized, contains the exact same description, as if foretelling the occurrence of such a situation.'"
 pbi_objective_publishing_industry_events.207.a: "It's a piece that captures the times"
 pbi_objective_publishing_industry_events.208.t: "Favorable book reviews by celebrities"
 pbi_objective_publishing_industry_events.208.d: "[SCOPE.sCharacter('target_character_1').GetFullName], an influential member of a [SCOPE.gsInterestGroup('target_ig_1').GetName], has issued a favorable review of the novel [SCOPE.sCharacter('target_character').GetFullName] is serializing."
 pbi_objective_publishing_industry_events.208.f: "'All the newspapers are publishing novels, but [SCOPE.sCharacter('target_character').GetFullName]'s novel is the most interesting of them all. Frankly speaking, I am amazed that [SCOPE.sCharacter('target_character').GetSheHe] has such literary talent.'"
 pbi_objective_publishing_industry_events.208.a: "[SCOPE.sCharacter('target_character_1').GetLastName] has eyes to see"
 pbi_objective_publishing_industry_events.208.b: "I don't need [SCOPE.sCharacter('target_character_1').GetHerHis] favors"
 pbi_objective_publishing_industry_events.209.t: "Critical book reviews by celebrities"
 pbi_objective_publishing_industry_events.209.d: "[SCOPE.sCharacter('target_character_1').GetFullName], a prominent member of the [SCOPE.gsInterestGroup('target_ig_1').GetName], has issued a critical review of a novel that [SCOPE.sCharacter('target_character').GetFullName] is serializing."
 pbi_objective_publishing_industry_events.209.f: "'The ugliness of [SCOPE.sCharacter('target_character').GetLastName]'s serialized novels is outstanding compared to the serialized novels of recent years. In particular, the novel published this week was unremarkable. It is no longer possible to repair this broken story. I even feel sympathy for [SCOPE.sCharacter('target_character').GetLastName], who must continue to write novels even though [SCOPE.sCharacter('target_character').GetSheHe] has become a laughingstock of the world.'"
 pbi_objective_publishing_industry_events.209.a: "[SCOPE.sCharacter('target_character_1').GetLastName] is revealing his own ignorance"
 pbi_objective_publishing_industry_events.210.t: "Serialized novels attract attention"
 pbi_objective_publishing_industry_events.210.d: "[SCOPE.sCharacter('target_character').GetFullName]'s novels, serialized in [SCOPE.sState('target_state').GetName] newspapers, are gaining more and more attention with each installment."
 pbi_objective_publishing_industry_events.210.f: "The story of the protagonist's hardships and efforts, based on his own life, has captured the hearts of many readers."
 pbi_objective_publishing_industry_events.210.a: "I can't wait to see the rest of it!"
 pbi_objective_publishing_industry_events.211.t: "Ardent Fan"
 pbi_objective_publishing_industry_events.211.d.rich: "[SCOPE.sCharacter('target_character').GetFullName]'s serialized novels are popular with [SCOPE.sState('target_state').GetName]'s [concept_upper_strata]."
 pbi_objective_publishing_industry_events.211.d.middle: "[SCOPE.sCharacter('target_character').GetFullName]'s serialized novels are popular with [SCOPE.sState('target_state').GetName]'s [concept_middle_strata]."
 pbi_objective_publishing_industry_events.211.d.poor: "[SCOPE.sCharacter('target_character').GetFullName]'s serialized novels are popular with [SCOPE.sState('target_state').GetName]'s [concept_lower_strata]."
 pbi_objective_publishing_industry_events.211.f: "While one can enjoy novels from a variety of newspapers in [SCOPE.sState('target_state').GetName], [SCOPE.sCharacter('target_character').GetFullName]'s work has been immensely popular in recent years."
 pbi_objective_publishing_industry_events.211.a: "Do you have any signing events planned?"
 pbi_objective_publishing_industry_events.212.t: "Suspension of serialization"
 pbi_objective_publishing_industry_events.212.d: "The court ordered [SCOPE.sCharacter('target_character').GetFullName]'s serialized novels to stop being serialized on the grounds that the characters in them slander certain politicians."
 pbi_objective_publishing_industry_events.212.f: "Everyone who has read the novel knows that the characters in [SCOPE.sCharacter('target_character').GetFullName]'s novel are modeled on certain politicians."
 pbi_objective_publishing_industry_events.212.a: "Oh, my God"
 pbi_objective_publishing_industry_events.300.t: "Journalists on the battlefield"
 pbi_objective_publishing_industry_events.300.d: "Articles sent from the [SCOPE.sFront('target_front').GetName] by reporter who served in the [SCOPE.sWar('target_war').GetName] war have attracted a great deal of interest."
 pbi_objective_publishing_industry_events.300.f: "'General [SCOPE.sCharacter('target_character').GetFullName] ordered repeated assaults and finally succeeded in forcing the enemy to retreat, but our forces also suffered tremendous damage. The result of this battle, which lasted half a day, was only an advance of 100 meters on our position.'"
 pbi_objective_publishing_industry_events.300.a: "Let's recruit volunteers"
 pbi_objective_publishing_industry_events.300.b: "Let's collect donations"
 pbi_objective_publishing_industry_events.400.t: "Winning the Diplomatic Battle"
 pbi_objective_publishing_industry_events.400.d: "Our publicized talks with [SCOPE.sCountry('target_country').GetName] were reported en masse in the [SCOPE.sCountry('target_country').GetName] press. While this has given momentum to [Concept('concept_radical', '$concept_radicals$')] in [SCOPE.sCountry('target_country').GetName], it has also drawn condemnation of [SCOPE.sCountry('target_country').GetName] among the countries involved."
 pbi_objective_publishing_industry_events.400.f: "'In response to the [SCOPE.sCountry('target_country').GetName] diplomat's #bold insolent request#!, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] #bold refused to meet#! with the diplomat and informed him through #bold a junior officer#! that he had #bold nothing further to say#!.'"
 pbi_objective_publishing_industry_events.400.a: "Even fools and newspapers can be useful in the hands of a clever person"
 pbi_objective_publishing_industry_events.402.t: "Information Warfare"
 pbi_objective_publishing_industry_events.402.d: "Newspapers now have more power than any politician's speech. If we use this power effectively, we should be able to do damage to our enemies."
 pbi_objective_publishing_industry_events.402.f: "'You furnish the pictures and I'll furnish the war.'\nWilliam Randolph Hearst"
 pbi_objective_publishing_industry_events.402.a: "[SCOPE.sCountry('target_country_1').GetName] is our enemy"
 pbi_objective_publishing_industry_events.402.b: "We cannot let [SCOPE.sCountry('target_country_2').GetName] continue to grow"
 pbi_objective_publishing_industry_events.402.c: "We need to take care of the problem with [SCOPE.sCountry('target_country_3').GetName]"
 pbi_objective_publishing_industry_events.402.e: "We should consider it carefully"
 pbi_objective_publishing_industry_events.402.tt: "We will postpone the decision on the target country for one month"
 pbi_objective_publishing_industry_events.403.t: "Powder Magazine"
 pbi_objective_publishing_industry_events.403.d: "[SCOPE.sCountry('target_country').GetName] newspapers have complained that our claims in the [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName] region are unjustified."
 pbi_objective_publishing_industry_events.403.f: "For [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName], an [concept_strategic_region] for both us and [SCOPE.sCountry('target_country').GetName], the [SCOPE.sCountry('target_country').GetName] newspapers are constantly appealing to the legitimacy of their rights. Trouble in this area will strongly stimulate [SCOPE.sCountry('target_country').GetName] public sentiment."
 pbi_objective_publishing_industry_events.403.a: "There is no way not to take advantage of this"
 pbi_objective_publishing_industry_events.404.t: "Insolent Request"
 pbi_objective_publishing_industry_events.404.d: "[SCOPE.sCountry('target_country').GetName] government, through its diplomats, is seeking concessions from us and is seeking a secret meeting with [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]."
 pbi_objective_publishing_industry_events.404.f: "[SCOPE.sCountry('target_country').GetName] public opinion is beginning to insist that war should be opened if their superiority in the [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName] region is not recognized. It is almost certain that the [SCOPE.sCountry('target_country').GetName] government's latest demand reflects their desire to avoid war by suppressing domestic public opinion, which is becoming dominated by the pro-open war camp."
 pbi_objective_publishing_industry_events.404.a: "They want to pull back the curtain.\nAnd in the way that is best for them!"
 pbi_objective_publishing_industry_events.405.t: "Telegram of Destiny"
 pbi_objective_publishing_industry_events.405.d: "A telegram was delivered to [SCOPE.sCharacter('target_character').GetFullName], informing [SCOPE.sCharacter('target_character').GetHerHim] of the contents of a secret meeting with [SCOPE.sCountry('target_country').GetName] diplomats at [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]'s villa in [SCOPE.sState('target_state_2').GetName]. The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] said [ROOT.GetCountry.GetRuler.GetSheHe] would leave it to the government to decide whether to make its contents public."
 pbi_objective_publishing_industry_events.405.f: "'The [SCOPE.sCountry('target_country').GetName] diplomats not only forcefully demanded a meeting with [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], they also asked to withdraw our [concept_interest] to the [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName] region and, as proof of their commitment, to abdicate. The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] responded by informing the diplomats that [ROOT.GetCountry.GetRuler.GetSheHe] could not and should not make such a commitment and that [ROOT.GetCountry.GetRuler.GetSheHe] had nothing further to say at the meeting and that negotiations were off'"
 pbi_objective_publishing_industry_events.405.a: "Make it public. But a little excitingly"
 pbi_objective_publishing_industry_events.405.a.tt: "Things develop into a [concept_diplomatic_incident]"
 pbi_objective_publishing_industry_events.405.b: "Not to be published"
 pbi_objective_publishing_industry_events.405.b.tt: "The situation will be resolved amicably"
 pbi_objective_publishing_industry_events.500.t: "쥐구멍에 볕들 날"
 pbi_objective_publishing_industry_events.500.d: "신문들이 삽화 대신 사진을 게재하기 시작하면서 우리 사회의 적나라한 현실에도 빛이 들게 되었다."
 pbi_objective_publishing_industry_events.500.f: "사진 속에는 치안과 위생 상태가 열악한 빈민가가 담겼다. 많은 노동자들이 저임금에 위험한 일거리를 강요받고 있다는 소식이다. 아이들도 학교에 다닐 수 없어 노동 현장에 나설 수밖에 없는 실정이다."
 pbi_objective_publishing_industry_events.500.a: "복지 확대에 주력할 필요가 있겠군."
 pbi_objective_publishing_industry_events.500.b: "[SCOPE.sCharacter('target_character_1').GetLastName]도 [GetLawGroup('lawgroup_childrens_rights').GetName]에 대한 생각을 바꿨을지 모른다."
 pbi_objective_publishing_industry_events.500.c: "[SCOPE.sCharacter('target_character_2').GetLastName]도 [GetLawGroup('lawgroup_welfare').GetName]에 대한 생각을 바꿨을지 모른다."
 pbi_objective_publishing_industry_events.500.e: "[SCOPE.sCharacter('target_character_3').GetLastName]도 [GetLawGroup('lawgroup_citizenship').GetName]에 대한 생각을 바꿨을지 모른다."
 gaudi_transatlantic_cable_expedition_modifier: "대서양 횡단 케이블 탐사"
 gaudi_transatlantic_cable_expedition_failed_modifier: "대서양 횡단 케이블 탐사 살패"