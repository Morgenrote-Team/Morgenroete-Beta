l_korean:
 pbi_objective_publishing_industry_events.200.t: "대성공을 거둔 신문 연재 소설"
 pbi_objective_publishing_industry_events.200.d: "[SCOPE.sState('target_state').GetName] 신문 단독으로 연재된 [SCOPE.sCharacter('target_character').GetFullName]의 소설은 독자들의 열렬한 호응과 함께 완결에 이르렀다."
 pbi_objective_publishing_industry_events.200.f: "연재 기간 동안 신문 판매량은 세 배로 폭등하기에 이르렀다. 출판사는 연재 분량을 요약한 단행본을 출간했고, 해외 시장을 위한 번역도 마무리되었다. 단행본의 판매 실적도 꾸준히 늘고 있다."
 pbi_objective_publishing_industry_events.200.a: "훌륭하오!"
 pbi_objective_publishing_industry_events.200.good: "소설 집필 진행도가 #positive_value 상승#!함"
 pbi_objective_publishing_industry_events.200.bad: "소설 집필 진행도가 #negative_value 감소#!함"
 pbi_objective_publishing_industry_events.200.stop: "#negative_value 장차 소설 진행도가 초기화될 확률이 증가함#!"
 pbi_objective_publishing_industry_events.201.t: "연재 취소"
 pbi_objective_publishing_industry_events.201.d: "[SCOPE.sState('target_state').GetName] 신문에서 연재되던 소설이 작가가 집필을 계속할 상황이 아닌 관계로 도중 완결되었다."
 pbi_objective_publishing_industry_events.201.f: "많은 독자들이 그토록 간절히 기다려온 연재 소설의 나머지 단락은 영영 읽을 수 없게 되었다."
 pbi_objective_publishing_industry_events.201.a: "안 됐군."
 pbi_objective_publishing_industry_events.202.t: "미래의 대작가"
 pbi_objective_publishing_industry_events.202.d: "[SCOPE.sState('target_state').GetName] 신문사에서는 새 신문을 발행할 준비에 나서고 있다.\n이와 함께 야심찬 신문에 연재할 새로운 소설가를 모집한다고 전해졌다."
 pbi_objective_publishing_industry_events.202.f: "오늘날 신문 판매량을 좌우하는 것은 정치 논평도, 편집장의 재치 있는 사설도, 자극적인 3면 기사도 아닌 연재 소설에 대한 관심이다."
 pbi_objective_publishing_industry_events.202.a: "[SCOPE.sCharacter('target_character_1').GetFullName](이)라면 위대한 작가가 될 것이오!"
 pbi_objective_publishing_industry_events.202.a.tt: "연재 소설의 집필에 나섭니다."
 pbi_objective_publishing_industry_events.202.b: "[SCOPE.sCharacter('target_character_2').GetFullName]에게서 넘치는 지성을 느꼈소!"
 pbi_objective_publishing_industry_events.202.c: "[SCOPE.sCharacter('target_character_3').GetFullName]의 글은 거부할 수 없는 매력을 지녔지!"
 pbi_objective_publishing_industry_events.202.e: "거친 땅 속에 빛나는 보석이 또 있을지 몰라!"
 pbi_objective_publishing_industry_events.202.e.tt: "다른 후보를 물색합니다."
 pbi_objective_publishing_industry_events.203.t: "집필 활동 불가"
 pbi_objective_publishing_industry_events.203.d: "[SCOPE.sCharacter('target_character').GetFullName](은)는 연재 소설의 진도를 내는 것이 힘겨운 모양이다. 이대로라면 지면 연재는 중단되고 말 것이다."
 pbi_objective_publishing_industry_events.203.f: "담당 편집자가 원고 진행상황을 확인하려 이른 아침에 [SCOPE.sCharacter('target_character').GetLastName]의 집을 방문했으나 부재 중이었다. 하인은 주인이 사흘째 집을 비워 어디로 간 건지 모른다고 털어놓았다."
 pbi_objective_publishing_industry_events.203.a: "의자에 묶어둬서라도 글을 쓰게 하시오!"
 pbi_objective_publishing_industry_events.203.b: "[SCOPE.sCharacter('target_character').GetFullName]에게는 기분 전환이 필요하오."
 pbi_objective_publishing_industry_events.204.t: "원고의 주인은 누구?"
 pbi_objective_publishing_industry_events.204.d: "작가가 자신이 연재 중인 소설의 내용을 검수하게 해 달라는 출판사의 요청을 거부하고 있다."
 pbi_objective_publishing_industry_events.204.f: "출판사 측은 소설 속 특정 인물의 묘사가 일부 정치인을 조롱하는 것처럼 비춰질 수 있다는 점을 우려하는 상황이다."
 pbi_objective_publishing_industry_events.204.a: "출판사도 검수할 권리는 있다."
 pbi_objective_publishing_industry_events.204.b: "작가의 의향을 존중해야지."
 pbi_objective_publishing_industry_events.205.t: "부도덕한 내용"
 pbi_objective_publishing_industry_events.205.d: "[SCOPE.gsInterestGroup('target_ig').GetName] 집단에서 [SCOPE.sCharacter('target_character').GetFullName]의 연재 소설에 부도덕한 내용이 있다며 개선할 것을 요구하고 있다."
 pbi_objective_publishing_industry_events.205.f: "\"신문에 연재되고 있는 [SCOPE.sCharacter('target_character').GetLastName]의 소설 내용은 논란의 여지가 있으며 용납할 수 없다.\""
 pbi_objective_publishing_industry_events.205.a: "위대한 작품은 구시대적 가치에 부합하지 않는 법이오."
 pbi_objective_publishing_industry_events.205.b: "내용을 검수할 필요가 있겠어."
 pbi_objective_publishing_industry_events.206.t: "표절 의혹"
 pbi_objective_publishing_industry_events.206.d: "여러 작가들이 [SCOPE.sCharacter('target_character').GetFullName]의 연재 소설에서 자신의 작품을 표절했다고 주장하고 있다."
 pbi_objective_publishing_industry_events.206.f: "\"당신들이 그토록 존경한다던 작가의 창의력이란 것은 순전히 사기입니다. 본인이 지어냈다고 주장하는 장면은 내 책의 한 장에서 따온 것이오! 어떻게 그걸 부정할 수가 있겠습니까? 목욕하는 여자가 나오는 장면만 순수 본인 것이고요. 내 저작권을 주장해야겠소!\""
 pbi_objective_publishing_industry_events.206.a: "그건 허위 주장이다."
 pbi_objective_publishing_industry_events.207.t: "예언을 하는 듯한 소설"
 pbi_objective_publishing_industry_events.207.d: "[SCOPE.sCharacter('target_character').GetFullName]의 연재 소설의 내용이 최근 [SCOPE.sState('target_state').GetName]에서 발생한 기이한 살인 사건과 놀라울 정도로 유사하다는 점에서 눈길을 끌고 있다."
 pbi_objective_publishing_industry_events.207.f: "\"오늘날 우리 사회가 직면하고 있는 빈곤 문제가 이러한 사건 발생의 근본적 원인이라는 점에는 의심할 여지가 없다. 더욱이 놀라운 것은 최근 연재되고 있는 [SCOPE.sCharacter('target_character').GetLastName] 작가의 소설에 마치 이러한 상황이 발생할 것을 예견이라도 한 듯 정확히 동일한 내용을 묘사하고 있다는 점이다.\""
 pbi_objective_publishing_industry_events.207.a: "현 시대를 잘 포착한 작품이로군."
 pbi_objective_publishing_industry_events.208.t: "유명 인사의 소설 호평"
 pbi_objective_publishing_industry_events.208.d: "[SCOPE.gsInterestGroup('target_ig_1').GetName] 집단에서 영향력 있는 일원으로 꼽히는 [SCOPE.sCharacter('target_character_1').GetFullName](이)가 [SCOPE.sCharacter('target_character').GetFullName]의 연재 소설을 호평하는 평론을 냈다."
 pbi_objective_publishing_industry_events.208.f: "\"어느 신문에서든 소설을 게재하고 있기 마련이지만 그 중에서도 가장 재미있는 작품은 [SCOPE.sCharacter('target_character').GetFullName]의 소설이다. 솔직히 말해서 [SCOPE.sCharacter('target_character').GetSheHe]에게 그런 문학적 재능이 있다는 점이 놀랍다.\""
 pbi_objective_publishing_industry_events.208.a: "[SCOPE.sCharacter('target_character_1').GetLastName]에게도 보는 눈이 있군."
 pbi_objective_publishing_industry_events.208.b: "그런 사람의 호의는 필요 없네."
 pbi_objective_publishing_industry_events.209.t: "유명 인사의 소설 혹평"
 pbi_objective_publishing_industry_events.209.d: "[SCOPE.gsInterestGroup('target_ig_1').GetName] 집단에서 주도적인 일원으로 꼽히는 [SCOPE.sCharacter('target_character_1').GetFullName](이)가 [SCOPE.sCharacter('target_character').GetFullName]의 연재 소설을 혹평하는 평론을 냈다."
 pbi_objective_publishing_industry_events.209.f: "\"[SCOPE.sCharacter('target_character').GetLastName]의 연재 소설은 최근 몇 년 새 나온 연재 소설과 비교해도 굉장히 볼품없다. 특히 이번 주에 나온 연재분은 재미가 하나도 없었다. 이런 망가진 이야기를 더는 수습할 수는 없을 것이다. 전세계의 웃음거리가 되었음에도 소설을 계속 써야만 하는 [SCOPE.sCharacter('target_character').GetLastName]에게 동정심마저 느낀다.\""
 pbi_objective_publishing_industry_events.209.a: "[SCOPE.sCharacter('target_character_1').GetLastName](이)가 본인의 무지를 드러내고 있군."
 pbi_objective_publishing_industry_events.210.t: "연재 소설이 주목 받다"
 pbi_objective_publishing_industry_events.210.d: "[SCOPE.sState('target_state').GetName]의 일간지에 연재 중인 [SCOPE.sCharacter('target_character').GetFullName]의 소설이 매 회마다 점점 더 많은 관심을 받고 있다."
 pbi_objective_publishing_industry_events.210.f: "주인공의 고난과 노력에 대한 이야기는 작가 본인의 실제 인생을 바탕으로 하여 많은 독자들의 마음을 사로잡았다."
 pbi_objective_publishing_industry_events.210.a: "나머지 부분도 너무 기대되는군!"
 pbi_objective_publishing_industry_events.211.t: "열광팬"
 pbi_objective_publishing_industry_events.211.d.rich: "[SCOPE.sCharacter('target_character').GetFullName]의 연재 소설이 [SCOPE.sState('target_state').GetName]의 [concept_upper_strata]으로부터 인기를 끌고 있다."
 pbi_objective_publishing_industry_events.211.d.middle: "[SCOPE.sCharacter('target_character').GetFullName]의 연재 소설이 [SCOPE.sState('target_state').GetName]의 [concept_middle_strata]으로부터 인기를 끌고 있다."
 pbi_objective_publishing_industry_events.211.d.poor: "[SCOPE.sCharacter('target_character').GetFullName]의 연재 소설이 [SCOPE.sState('target_state').GetName]의 [concept_lower_strata]으로부터 인기를 끌고 있다."
 pbi_objective_publishing_industry_events.211.f: "[SCOPE.sState('target_state').GetName]에서는 여러 신문에 연재되는 소설들을 즐길 수 있지만 그 중에서도 [SCOPE.sCharacter('target_character').GetFullName]의 작품은 최근 몇년 사이에 엄청난 인기를 누리고 있다."
 pbi_objective_publishing_industry_events.211.a: "사인회를 열 계획은 없는가?"
 pbi_objective_publishing_industry_events.212.t: "연재 중단"
 pbi_objective_publishing_industry_events.212.d: "법원에서 [SCOPE.sCharacter('target_character').GetFullName]의 연재 소설에 특정 정치인의 비방이 들어가 있다는 이유로 연재를 중단하라는 판결을 내렸다."
 pbi_objective_publishing_industry_events.212.f: "[SCOPE.sCharacter('target_character').GetFullName]의 소설을 읽어본 사람이라면 누구나 그 인물들이 특정 정치인을 모델로 했다는 점을 알게 된다."
 pbi_objective_publishing_industry_events.212.a: "어떻게 이럴 수가."
 pbi_objective_publishing_industry_events.300.t: "전장의 기자들"
 pbi_objective_publishing_industry_events.300.d: "[SCOPE.sWar('target_war').GetName] 전쟁에 뛰어든 기자들이 [SCOPE.sFront('target_front').GetName]에서 보내온 기사들이 엄청난 관심을 불러일으켰다."
 pbi_objective_publishing_industry_events.300.f: "\"[SCOPE.sCharacter('target_character').GetFullName] 장군은 거듭 공격을 명령했고 마침내 적을 후퇴하게 만들었지만, 우리 군 또한 막대한 피해를 입었다. 반나절 동안 지속된 이 전투의 결과로 우리 진지는 겨우 100m 앞으로 전진하였을 뿐이다.\""
 pbi_objective_publishing_industry_events.300.a: "자원봉사자를 모집하자."
 pbi_objective_publishing_industry_events.300.b: "기부금을 모으자."
 pbi_objective_publishing_industry_events.400.t: "외교적 싸움의 승리"
 pbi_objective_publishing_industry_events.400.d: "[SCOPE.sCountry('target_country').GetName]와의 공개 회담은 [SCOPE.sCountry('target_country').GetName]의 언론에 대대적으로 보도됐다. 이로 인해 [SCOPE.sCountry('target_country').GetName]의 [Concept('concept_radical', '$concept_radicals$')]에 탄력을 받게 되었지만, 동시에 관계 국가 사이에서 [SCOPE.sCountry('target_country').GetName]에 대한 비판도 제기되었다."
 pbi_objective_publishing_industry_events.400.f: "\"[SCOPE.sCountry('target_country').GetName] 외교관의 #bold 무례한 요청#!에 대한 응답으로 [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]께서는 외교관과의 #bold 접견을 거부#!하였으며 #bold 부사관#!을 통해 #bold 더 이상 대화하지 않겠다#!는 뜻을 전하였다.\""
 pbi_objective_publishing_industry_events.400.a: "바보나 신문이라도 똑똑한 사람의 손에 들어가면 유용할 수 있지."
 pbi_objective_publishing_industry_events.402.t: "정보 전쟁"
 pbi_objective_publishing_industry_events.402.d: "신문들이 이제 어느 정치인의 발언보다도 큰 위력을 지니게 되었다. 이 위력을 효과적으로 활용한다면 적국에 타격을 가할 수 있을 것이다."
 pbi_objective_publishing_industry_events.402.f: "\"당신이 사진을 주면 나는 전쟁을 주겠소.\"\n- 윌리엄 랜돌프 허스트"
 pbi_objective_publishing_industry_events.402.a: "우리의 주적은 [SCOPE.sCountry('target_country_1').GetName]이다."
 pbi_objective_publishing_industry_events.402.b: "[SCOPE.sCountry('target_country_2').GetName](이)가 계속해서 성장하는 모습을 언제까지고 두고볼 순 없다."
 pbi_objective_publishing_industry_events.402.c: "[SCOPE.sCountry('target_country_3').GetName]에 관한 문제를 해결해야 할 차례다."
 pbi_objective_publishing_industry_events.402.e: "신중히 검토해 보겠다."
 pbi_objective_publishing_industry_events.402.tt: "대상국에 대한 결단을 한 달 연기하겠다."
 pbi_objective_publishing_industry_events.403.t: "화약고"
 pbi_objective_publishing_industry_events.403.d: "[SCOPE.sCountry('target_country').GetName] 언론들은 [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName] 지역에 대한 우리의 영유권 주장이 정당하지 않다고 불만의 목소리를 높였다."
 pbi_objective_publishing_industry_events.403.f: "[SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName](은)는 우리와 [SCOPE.sCountry('target_country').GetName] 모두의 [concept_strategic_region]으로써 [SCOPE.sCountry('target_country').GetName] 언론들은 자국의 영유권이 정당하다는 것을 끊임없이 제기하고 있다. 이 지역에서 분쟁이 발생하면 [SCOPE.sCountry('target_country').GetName]의 국민 정서를 크게 자극할 가능성이 있다."
 pbi_objective_publishing_industry_events.403.a: "이런 기회를 활용하지 않을 수가 없군."
 pbi_objective_publishing_industry_events.404.t: "무례한 요청"
 pbi_objective_publishing_industry_events.404.d: "[SCOPE.sCountry('target_country').GetName] 정부가 외교관을 통해 우리에게 양보를 구하는 동시에 [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName](와)과의 비밀 회담을 요청해 왔다."
 pbi_objective_publishing_industry_events.404.f: "[SCOPE.sCountry('target_country').GetName] 국민들의 여론은 [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName] 지역에서의 우월성을 인정받지 못하면 전쟁에 나서야 한다는 주장이 점차 확산되는 상황이다. 최근 [SCOPE.sCountry('target_country').GetName] 정부에서 요청한 것은 공공연한 전쟁 찬성파가 장악하고 있는 국내 여론을 잦아들게 함으로서 전쟁을 피하려는 의도가 반영된 것이 거의 확실해 보인다."
 pbi_objective_publishing_industry_events.404.a: "저들은 장막을 걷고 싶은 모양이군.\n자기네한테 제일 유리한 대로 말이오!"
 pbi_objective_publishing_industry_events.405.t: "운명의 전보"
 pbi_objective_publishing_industry_events.405.d: "[SCOPE.sState('target_state_2').GetName]에 위치한 [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]의 별장에서 열린 [SCOPE.sCountry('target_country').GetName] 외교관들과의 비밀 접견 내용이 전보에 담겨 [SCOPE.sCharacter('target_character').GetFullName]에게 전달되는 사건이 벌어졌다. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]께서는 그 내용을 공개할지의 여부를 정부의 판단에 맡기겠다고 전하였다."
 pbi_objective_publishing_industry_events.405.f: "\"[SCOPE.sCountry('target_country').GetName] 외교관들은 [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName](와)과의 회견을 강경하게 요구하였을 뿐만 아니라, [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName] 지역에 대한 [concept_interest]를 철회하고, 자신들의 의지를 증명하기 위해 퇴위할 것을 요구했다. 이에 [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]께서는 본인은 그러한 약속을 할 수 없고 해서도 안 되며, 지금 회견에서는 더 이상 할 말이 없어 협상은 결렬될 것이라고 외교관들에게 통보하였다.\""
 pbi_objective_publishing_industry_events.405.a: "공개하시오. 조금은 재미있게 말이오."
 pbi_objective_publishing_industry_events.405.a.tt: "[concept_diplomatic_incident]으로 번지게 됩니다."
 pbi_objective_publishing_industry_events.405.b: "보도하지 않도록 하시오."
 pbi_objective_publishing_industry_events.405.b.tt: "상황이 원만하게 해결됩니다."
 pbi_objective_publishing_industry_events.500.t: "쥐구멍에 볕들 날"
 pbi_objective_publishing_industry_events.500.d: "신문들이 삽화 대신 사진을 게재하기 시작하면서 우리 사회의 적나라한 현실에도 빛이 들게 되었다."
 pbi_objective_publishing_industry_events.500.f: "사진 속에는 치안과 위생 상태가 열악한 빈민가가 담겼다. 많은 노동자들이 저임금에 위험한 일거리를 강요받고 있다는 소식이다. 아이들도 학교에 다닐 수 없어 노동 현장에 나설 수밖에 없는 실정이다."
 pbi_objective_publishing_industry_events.500.a: "복지 확대에 주력할 필요가 있겠군."
