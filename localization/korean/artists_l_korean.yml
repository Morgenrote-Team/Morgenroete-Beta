 je_artists_impressionism: "인상주의"
 je_artists_impressionism_reason: "[concept_elgar_impressionism]은(는) 예술사에서 장면의 순간적인 단편을 분위기 있게 묘사하는 것이 특징인 양식입니다. 이는 19세기 후반 프랑스 회화 운동에서 비롯되었습니다. 인상주의라는 용어는 음악, 문학, 영화, 사진의 특정 양식에도 적용되었습니다. 하인리히 하르트와 같은 많은 자연주의자들이 음악을 ‘진리 탐구적 행동주의’를 표현하는 수단으로서 거부한 반면, 인상주의자들은 종종 ‘목적 없는 앞으로의 꿈’과 세밀하게 조율된 다채로운 화음을 하나의 즐거움으로 여겼습니다."
 je_artists_impressionism_success: "#G 850#! 필요합니다 @elgar_music_tradition! [concept_elgar_musical_tradition]."
 je_artists_expressionism: "표현주의"
 je_artists_expressionism_reason: "[concept_elgar_expressionism]은 예술 양식 중 하나입니다. 그 기원과 선구자는 19세기 후반에서 찾아볼 수 있습니다. 인상주의, 상징주의, 야수파와 마찬가지로, 표현주의는 자연주의적 경향에 반하는 운동입니다. 표현주의에서는 표현적 수준이 미적, 호소적, 사실적 수준보다 우위를 차지합니다. 예술가는 자신의 경험을 관람자에게 전달하고자 합니다. 사물의 외적 모습을 묘사하는 음악적 인상주의와 달리, 표현주의 예술 운동은 인간 영혼의 감정을 형상화합니다."
 je_artists_expressionism_success: "#G 850#! 필요합니다 @elgar_music_tradition! [concept_elgar_musical_tradition]."
 je_artists_art_nouveau: "아르누보"
 je_artists_art_nouveau_reason: "[concept_elgar_art_nouveau], 주로 이탈리아와 관련하여 Stile liberty라고도 불리는 이 양식은 19세기에서 20세기로 넘어가는 시기의 예술사적 시대입니다. 아르누보로 분류될 수 있는 흐름에는 개혁 양식(개혁 운동 이후), 분리파 양식(비엔나 분리파 이후), 카탈루냐의 모데르니스메, 스위스의 스타일 사팽, 미국의 티파니 스타일 등이 있습니다. 프랑스어, 영어, 이탈리아어에서 주로 사용되는 표현인 아르누보 외에도, 영어에서는 현대식, 이탈리아어에서는 플로랄 스타일이 사용됩니다. 시기적으로 아르누보는 세기말에 속합니다."
 je_artists_mass_culture: "대중문화"
 je_artists_mass_culture_reason: "'대중'—문화의 전통을 대표하는 모든 것에 대한 이해할 수 없는 적대감, 농민의 지혜를 혼동시키는 날카롭고 냉정한 지성, 성과 사회의 모든 문제와 관련하여 매우 원시적인 본능과 조건으로 돌아가는 새롭게 발견된 자연주의, 임금 분쟁과 경기장 형태로 되살아난 '빵과 서커스'—이 모든 것은 문화의 확실한 종말과 완전히 새로운 인간 존재 단계의 개막을 나타냅니다.' - 오스발트 스펭글러, 《서구의 몰락》"
 je_artists_mass_culture_goal: ""
 je_artists_biennale: "비엔날레"
 je_artists_biennale_reason: "비엔날레는 2년마다 열리는 전시회입니다. 그 역사적 모델은 베니스 비엔날레로, 빠르게 국제적 명성을 얻었고 모든 분야의 현대 미술가들이 경쟁하는 메카가 되었습니다. 전 세계의 예술가들은 자신들의 조국에 국제적 인정을 부여하고, 문화 강국으로서의 위치를 공고히 했습니다."
 je_artists_biennale_fail_tt: "다른 나라가 먼저 개최하면 우리는 비엔날레를 조직할 수 없습니다."
 artists.1001.t: "비엔날레 설립"
 artists.1001.d: "[SCOPE.sState('artists_biennale_city').GetCityHubName]는 현대 작품의 국제 미술 전시회를 열기에 최적의 장소로 여겨집니다. 주최 측은 내년에 첫 비엔날레를 개최하기 위한 준비를 시작했습니다."
 artists.1001.f: "첫 번째 비엔날레가 개최된 이후, 우리나라에서는 2년마다 새로운 비엔날레가 열리며 예술 분야에서 뛰어난 성과를 보인 국가들을 기리게 됩니다. 결정적인 기준은 한 국가에 속한 모든 예술가들의 종합 평판 값입니다. 비엔날레는 항상 비엔날레 개최지를 소유한 국가에서 주최합니다. 만약 [SCOPE.sState('artists_biennale_city').GetCityHubName]가 외국 세력에 의해 점령된다면, 새로운 소유국이 비엔날레를 개최할 수 있습니다."
 artists.1001.g: "우리가 첫 번째 비엔날레를 준비하겠다."
 artists.1002.t: "[SCOPE.sState('artists_biennale_city').GetCityHubName] [TimeKeeper.GetCurrentDate.Format('y')]년 비엔날레"
 artists.1002.d: "[SCOPE.sState('artists_biennale_city').GetCityHubName]에서 열리고 있는 비엔날레가 벌써 몇 주째 진행 중입니다. 전시 중인 예술가들 사이에서 이미 하나의 흐름이 나타나고 있습니다. [SCOPE.sCountry('artists_biennale_first_winner_scope').GetName] 출신 전시자들이 가장 유력한 후보로 꼽힙니다. [SCOPE.sCountry('artists_biennale_second_winner_scope').GetName]과 [SCOPE.sCountry('artists_biennale_third_winner_scope').GetName]도 흥미로운 전시물을 선보이고 있지만, 그것만으로는 부족할 것 같습니다."
 artists.1002.f: "베니스 비엔날레는 1895년에 설립되었으며, 20세기 초 몇십 년 동안 점점 국제적인 행사가 되었습니다. 1907년부터 여러 국가가 전시회에 자국의 국가관을 설치하기 시작했으며, 첫 번째 국가관은 벨기에였습니다. 1910년에는 국제적으로 유명한 예술가들의 작품이 처음으로 전시되었습니다. 구스타프 클림트를 위한 전시실, 르누아르의 개인전, 쿠르베 회고전이 그 예입니다. 피카소의 작품 '가족의 살팀방크'는 그 참신함이 관객에게 충격을 줄 수 있다는 우려로 인해 중앙 팔라초에 있는 스페인 살롱에서 철거되었습니다. 1914년까지 총 일곱 개의 국가관이 설치되었습니다: 벨기에(1907), 헝가리(1909), 독일(1909), 영국(1909), 프랑스(1912), 러시아(1914)."
 artists.1002.g: "심사위원들이 회의를 해야 한다."
 artists.1003.d: "[SCOPE.sState('artists_biennale_city').GetCityHubName] 비엔날레 심사위원들의 만장일치 결정에 따라, 올해 우리 예술가들이 가장 혁신적이고 수준 높은 전시를 선보였으며, 회화, 문학, 음악 분야에서 선두를 달리고 있습니다. 축하합니다!"
 artists.1003.f: "[GetPlayer.GetName]이 올해 비엔날레를 압도하며 1위를 차지했습니다. [SCOPE.sCountry('artists_biennale_second_winner_scope').GetName]의 예술가들이 2위를 차지했고, [SCOPE.sCountry('artists_biennale_third_winner_scope').GetName]의 예술가들도 인상적인 모습을 보였습니다."
 artists.1003.g: "새로운 문화의 여명이 밝아오고 있다."
 artists.2001.t: "인상주의의 탄생"
 artists.2001.d: "우리 수도 [SCOPE.sState('elgar_culture_capital').GetCityHubName]가 인상주의 미술의 중심지로 발전하고 있습니다."
 artists.2001.f: "[concept_elgar_impressionism]은(는) 예술사에서 장면의 순간적인 단편을 분위기 있게 묘사하는 것이 특징인 양식입니다. 이는 19세기 후반 프랑스 회화 운동에서 비롯되었습니다. 인상주의라는 용어는 음악, 문학, 영화, 사진의 특정 양식에도 적용되었습니다. 하인리히 하르트와 같은 많은 자연주의자들이 음악을 ‘진리 탐구적 행동주의’를 표현하는 수단으로서 거부한 반면, 인상주의자들은 종종 ‘목적 없는 앞으로의 꿈’과 세밀하게 조율된 다채로운 화음을 하나의 즐거움으로 여겼습니다."
 artists.2001.g: "우리는 선도적인 문화 국가다"
 artists.2002.t: "표현주의의 탄생"
 artists.2002.d: "우리 수도 [SCOPE.sState('elgar_culture_capital').GetCityHubName]가 표현주의 미술의 중심지로 발전하고 있습니다."
 artists.2002.f: "[concept_elgar_expressionism]은 예술 양식 중 하나입니다. 그 기원과 선구자는 19세기 후반에서 찾아볼 수 있습니다. 인상주의, 상징주의, 야수파와 마찬가지로, 표현주의는 자연주의적 경향에 반하는 운동입니다. 표현주의에서는 표현적 수준이 미적, 호소적, 사실적 수준보다 우위를 차지합니다. 예술가는 자신의 경험을 관람자에게 전달하고자 합니다. 사물의 외적 모습을 묘사하는 음악적 인상주의와 달리, 표현주의 예술 운동은 인간 영혼의 감정을 형상화합니다."
 artists.2003.t: "아르 누보의 탄생"
 artists.2003.d: "우리 수도 [SCOPE.sState('elgar_culture_capital').GetCityHubName]가 아르 누보 미술의 중심지로 발전하고 있습니다."
 artists.2003.f: "[concept_elgar_art_nouveau], 주로 이탈리아와 관련하여 Stile liberty라고도 불리는 이 양식은 19세기에서 20세기로 넘어가는 시기의 예술사적 시대입니다. 아르누보로 분류될 수 있는 흐름에는 개혁 양식(개혁 운동 이후), 분리파 양식(비엔나 분리파 이후), 카탈루냐의 모데르니스메, 스위스의 스타일 사팽, 미국의 티파니 스타일 등이 있습니다. 프랑스어, 영어, 이탈리아어에서 주로 사용되는 표현인 아르누보 외에도, 영어에서는 현대식, 이탈리아어에서는 플로랄 스타일이 사용됩니다. 시기적으로 아르누보는 세기말에 속합니다."
 artists.2004.t: "[concept_elgar_impressionism] 확산"
 artists.2004.d: "인상주의 경향이 인접 국가에서 우리 수도로 번져와 지배적인 미술 사조가 되었습니다."
 artists.2004.g: "인상적이군."
 artists.2005.t: "표현주의의 확산"
 artists.2005.d: "표현주의 경향이 인접 국가에서 우리 수도로 번져와 지배적인 미술 사조가 되었습니다."
 artists.2005.g: "표현이 풍부하군."
