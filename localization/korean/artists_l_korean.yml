 artists_state_trait_center_impressionism: "인상주의의 중심#!\n#G +3#! @elgar_music_tradition! 음악 전통\n#G +1#! @manzoni_literary_tradition! 문학 전통\n#G +1#! @klimt_painting_tradition! 회화 전통"
