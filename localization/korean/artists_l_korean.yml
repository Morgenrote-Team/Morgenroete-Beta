 je_artists_realism: "예술의 전당"
 je_artists_realism_reason: "사실주의는 예술 양식으로서 점점 더 큰 인기를 얻고 있습니다. 이미 여러 지역의 화가들이 이 새로운 사조에 헌신하고 있습니다. 그러나 사실주의에는 아직 그에 걸맞은 진정한 중심이 존재하지 않습니다. 기존 예술 장인들이 새로운 양식에 보이는 거부감 때문에, 사실주의는 지금까지도 아카데미 바깥의 현상으로만 머물러 있습니다. 이제는 이 양식을 가르치는 우리만의 예술 학교가 필요합니다. 사실주의 회화가 자리 잡을 수 있는 갤러리도 갖추어야 하며, 무엇보다 우리나라에서 사실주의의 모범적 인물로 자리할 [concept_klimt_painter]가 필요합니다. 또한 미술 살롱의 설립은 회화 경연 대회를 조직할 수 있는 기반도 마련해 줄 것입니다."
 je_artists_realism_success: "우리는 #G 250#! @klimt_painting_tradition! [concept_klimt_painting_tradition]이 필요하다."
 je_artists_realism_goal: ""
 je_artists_realism_trigger: "사실주의를 위한 [concept_artists_center_of_arts]는 #G 존재하지 않는다#!."
 je_artists_realism_fail: "사실주의를 위한 [concept_artists_center_of_arts]는 #R 존재함#!."
 je_artists_irrationalism: "음악 축제"
 je_artists_irrationalism_reason: "스스로를 '총체예술작품'으로 인식하는 새로운 혁명적 음악 형식이 형성되고 있습니다. 이 음악 형식을 탄생시키는 일은 비범한 작곡가의 몫입니다. 이 음악은 전용 축제 극장에서 단독으로 연주될 수 있으며, 국제적인 음악 애호가들이 순례하듯 찾아오는 장소가 될 것입니다. 그것은 비이성주의의 중심지가 될 것입니다. 또한 음악 축제를 설립함으로써 음악 경연 대회 역시 조직할 수 있습니다."
 je_artists_irrationalism_success: "#G 500#! 필요합니다 @elgar_music_tradition! [concept_elgar_musical_tradition]."
