 artists.11.t: "우리 작곡가의 사망"
 artists.11.d: "수십 년간 [concept_elgar_composer]로 활동한 우리 전설적인 작곡가가 세상을 떠났습니다. 과연 이토록 놀라운 예술가를 다시 찾을 수 있을까요?"
 artists.11.g: "이것이 그의 선율의 끝이다."
 artists.11_tt: "때때로 게임 내 인물이 사망하기도 합니다. 모드는 이를 막을 수 없습니다. 이 이벤트는 해당 예술가의 역할을 게임에서 제거하여, 그들의 유령에 시달리지 않도록 합니다."
 artists.12.t: "우리 작가의 사망"
 artists.12.d: "수십 년간 [concept_manzoni_writer]로 활동한 우리 전설적인 작사가가 세상을 떠났습니다. 과연 이토록 놀라운 작가를 다시 찾을 수 있을까요?"
 artists.12.g: "그의 마지막 말은 무엇이었을까?"
 artists.13.t: "우리 화가의 사망"
 artists.13.d: "수십 년간 [concept_klimt_painter]로 활동한 우리 최고의 예술가가 세상을 떠났습니다. 과연 이토록 놀라운 예술가를 다시 찾을 수 있을까요?"
 artists.13.g: "페인트가 말라버렸다."
 artists.51.t: "새로운 작곡가"
 artists.51.d: "[SCOPE.sCharacter('elgar_new_composer_scope').GetFullName]는 우리의 [concept_elgar_composer]가 될 가능성이 있는 유망한 음악 인재입니다."
 artists.51.g: "이 분이야말로 우리에게 큰 보탬이 될 것이다."
 artists.52.t: "새로운 작가"
 artists.52.g: "이 분이야말로 우리에게 큰 보탬이 될 것이다."
 artists.53.t: "새로운 화가"
 artists.53.d: "[SCOPE.sCharacter('klimt_new_painter_scope').GetFullName]는 우리의 [concept_klimt_painter]가 될 수 있는 유망한 예술 인재입니다."
 artists.53.g: "이 분이야말로 우리에게 큰 보탬이 될 것이다."
 artists.53.h: "이 분은 예술학교에 남는 것이 좋겠다."
 artists.101.t: "[ROOT.Var('elgar_composer_var').GetCharacter.GetFullName](이)가 이제 위대한 작곡가가 되었습니다!"
 artists.101.d: "전 세계 곳곳에서 열리는 콘서트, 모두가 아는 멜로디, 명망 높은 오페라 하우스에서 공연되는 오페라. 이 모든 업적을 거쳐, 우리 [concept_elgar_composer] [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName]의 명성으로 [ROOT.Var('elgar_composer_var').GetCharacter.GetHerHim]은 이제 위대한 작곡가로 인정받기에 충분합니다!"
 artists.101.f: ""
 artists.101.g: "음악의 거장!"
 artists.102.t: "[ROOT.Var('manzoni_writer_var').GetCharacter.GetFullName](이)가 이제 위대한 작가가 되었습니다!"
 artists.102.d: "수많은 저서와 기고문, 문학 작품을 발표해 온 우리의 [concept_manzoni_writer] [ROOT.Var('manzoni_writer_var').GetCharacter.GetFullName](은)는 그간의 명성을 바탕으로 이제 위대한 작가로 인정받게 되었습니다!"
 artists.102.f: ""
 artists.102.g: "문학의 거장!"
 artists.103.t: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName](이)가 이제 위대한 화가가 되었습니다!"
 artists.103.d: "수많은 그림과 더불어 여러 작품을 제작해 온 우리의 [concept_klimt_painter] [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName](은)는 그간의 명성을 바탕으로 이제 위대한 화가로 인정받게 되었습니다!"
 artists.103.f: ""
 artists.103.g: "그림의 대가!"
