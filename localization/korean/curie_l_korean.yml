 curie.10.t: "[SCOPE.sState('curie_uranium_state_scope').GetName]에서 발견된 우라늄"
 curie.10.d: "지질학자가 [SCOPE.sState('curie_uranium_state_scope').GetName]에서 시료 채취 중 매우 풍부한 우라늄 광상을 발견했습니다. 물리학자들과 화학자들의 관심이 매우 큽니다."
 curie.10.f: "우라늄(행성 천왕성에서 이름을 따옴)은 원소 기호 U, 원자 번호 92를 가진 화학 원소입니다. 우라늄 화합물은 19세기 내내 유리와 도자기, 꽃병 및 장식품뿐만 아니라 그릇이나 컵 같은 일상 용품의 착색에 사용되었습니다. 보헤미아의 요아힘스탈에 있는 유리 제조업체들은 이 기법을 1826년경부터 사용했습니다. 우라늄은 20세기 중반까지 유리 착색에 쓰였으며, 이후에는 덜 해로운 다른 착색 광물로 대체되었습니다. 오렌지색에서 밝은 빨간색까지 다양한 우라늄 함유 도자기 유약은 식기류부터 건축용 액세서리에 이르기까지 다양하게 사용되었습니다. 미국에서 '피에스타웨어'라 불리는 이 도자기는 제조업체 이름에서 유래했으며, 오늘날에도 많은 미국 가정에서 여전히 발견될 수 있는 가장 방사능이 높은 물품 중 하나일 것입니다."
 curie.10.g: "전망이 밝다!"
