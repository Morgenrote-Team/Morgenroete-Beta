l_korean:
 test_event_title:0 "(테스트)"
 test_event_desc:0 "(테스트)"
 test_event_flavor:0 "(테스트)"
 test_event.a:0 "(테스트)"
 test_event.b:0 "(테스트)"
 MFE_political_events.1.t:0 "신문에 게재된 익명 기고문"
 MFE_political_events.1.d:0 "[SCOPE.gsInterestGroup('ig_intelligentsia').GetName] 인사들이 작금의 정치적  분위기에 고무되어 신문에 악의적인 반정부 성향의 글을 기고하고 있다."
 MFE_political_events.1.f:0 "\"요즘 세상의 사람들에게 [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] 같은 것에 무슨 소용이 있겠는가? 우리는 이 폭군의 압제에서 벗어나 [ROOT.GetCountry.GetName]의 더욱 보람찬 미래를 꿈꾼다.\""
 MFE_political_events.1.a:0 "이렇게 정신나간 기고문을 다 보았나, 탄압하시오!"
 MFE_political_events.1.b:0 "출판물이 자유롭게 유통되도록 허용하시오."
 MFE_political_events.2.t:0 "지역 선거의 교란 사태"
 MFE_political_events.2.d:0 "[ROOT.GetCountry.GetCapital.GetName]에서 정치적 긴장이 고조됨에 따라 당 기관지의 지역 사무소를 습격하는 사건이 발생하고 말았다."
 MFE_political_events.2.f:0 "\"[SCOPE.sParty('harassing_party').GetName] 쪽 사람들이 쇠지렛대와 도끼로 무장한 채 떼거지로 몰려오더니, [SCOPE.sParty('harassed_party').GetName] 인쇄소를 박살내고는 방해하는 사람은 때려눕히겠다고 위협하는 것을 보았소.\""
 MFE_political_events.2.a:0 "[SCOPE.sParty('harassed_party').GetName](을)를 지켜주자."
 MFE_political_events.2.b:0 "[SCOPE.sParty('harassing_party').GetName] 측 폭도들을 고발하라."
 MFE_political_events.3.t:0 "부정선거"
 MFE_political_events.3.d:0 "[ROOT.GetCountry.GetCapital.GetName]의 선거 결과가 야당 측의 부정 투표와 매표 의혹으로 얼룩졌다."
 MFE_political_events.3.f:0 "\"젊은이, 오늘 자네와 몇 번이나 봤지 않나? 분명 전에도 이곳에 온 적이 있는 것 같은데 말이야...\""
 MFE_political_events.3.a:0 "[SCOPE.sParty('party_1').GetName] 측에서 투표를 조작한 것이 틀림없다..."
 MFE_political_events.3.b:0 "[SCOPE.sParty('party_2').GetName] 측은 지금 상황에서 믿어서는 안 될 것이다..."
 MFE_political_events.4.t:0 "노동자 위원회"
 MFE_political_events.4.d:0 "[SCOPE.gsInterestGroup('ig_tradeunions').GetName]과 연계된 [SCOPE.sState('workers_state').GetName]의 노동자들이 위원회를 결성하고 직장에서 더 많은 권리를 요구하며 투쟁에 나섰다."
 MFE_political_events.4.f:0 "\"공장의 12시간 교대 근무는 비인간적이며, 인간 존엄을 모욕하는 행위요. 동지들, 다른 길은 열려 있소.\""
 MFE_political_events.4.a:0 "집회를 허가하도록... 지금 당장은 말이지."
 MFE_political_events.4.b:0 "용납할 수 없다! 이런 집회는 계속되어선 안 될 것이야."
 MFE_political_events.5.t:0 "Local Management Conflict"
 MFE_political_events.5.d:0 "The Mill Workers trade union in one of our provinces are protesting against factory manager accused of abusing his workers, even going so far as to beat them with canes whenever they happen to trigger his highly personal definition of laziness. We could remove the manager, but the mill owner insist that he does a very good job."
 MFE_political_events.5.f:0 "So we need him removed. Not just removed, but removed good. Ya’see? We don’t want him no more. He’s bad news, I’ll tell ya."
 MFE_political_events.5.a:0 "Nothing can be done about this..."
 MFE_political_events.5.b:0 "We need to step in immediately"
 MFE_political_events.6.t:0 "Public Meeting Held"
 MFE_political_events.6.d:0 "Emulating the example found in neighboring capitals, the [SCOPE.gsInterestGroup('ig_trade_unions').GetName] in [ROOT.GetCountry.GetCapital.GetName] have started holding public meetings."
 MFE_political_events.6.f:0 "\"The power of one man is nothing, but when we combine our numbers, why...the entirety of [ROOT.GetCountry.GetName] will have to listen to us.\""
 MFE_political_events.6.a:0 "These meetings are harmless...allow them to continue"
 MFE_political_events.6.b:0 "Do what we can to prevent this activity"
 MFE_political_events.7.t:0 "Attack On The Workhouse"
 MFE_political_events.7.d:0 "Demonstrations in [SCOPE.sState('attacked_state').GetName] have gotten out of hand, leading to violence in the streets."
 MFE_political_events.7.f:0 "\"The damned rabble from the steel mill started gathering outside of the factory, and before the police could arrive to disperse the crowd, there was...well, you know what happened.\""
 MFE_political_events.7.a:0 "Democracy is an inherently messy endeavor"
 MFE_political_events.7.b:0 "Do what we can to help"
 MFE_political_events.8.t:0 "구빈원의 파업"
 MFE_political_events.8.d:0 "임금 체불 문제가 [ROOT.GetCountry.GetCapital.GetName] 지역의 빵 부족 사태와 맞물려 노동자 파업으로 번지게 되었다."
 MFE_political_events.8.f:0 "\"임금도 못 받고 굶주린 우리가 어떻게 해 뜰 때부터 해 질 때까지 일할 수 있겠나? 동지들이여, 바리케이드로 향하세!\""
 MFE_political_events.8.a:0 "경찰력을 동원하라!"
 MFE_political_events.8.b:0 "그게 무슨 대수라고..."
 MFE_political_events.9.t:0 "투표 제도를 비판하는 교수"
 MFE_political_events.9.d:0 "[SCOPE.gsInterestGroup('ig_intelligentsia').GetName]에서 칭송받는 [SCOPE.sCharacter('professor').GetFullName] 교수가 연속 공개 강연을 통해 [ROOT.GetCountry.GetName]의 선거 제도를 맹렬히 비판했다."
 MFE_political_events.9.f:0 "\"이제 이런 점에도 자세히 주목해 봅시다. 자세히 보시면 [ROOT.GetCountry.GetRuler.GetFullName]의 현행 제도가 더는 옹호할 수 없다는 사실이 자명할 것이오.\""
 MFE_political_events.9.a:0 "타당한 주장인걸..."
 MFE_political_events.9.b:0 "[SCOPE.sCharacter('professor').GetFullName]에게 공개 발언을 삼가라고 전하시오."
 MFE_political_events.10.t:0 "무역 정책 협상"
 MFE_political_events.10.d:0 "계속된 논의 끝에 [ROOT.GetCountry.GetCapital.GetName]의 무역 정책 협상에 마침내 돌파구가 마련되었다."
 MFE_political_events.10.f:0 "\"좋은 타협은 양측 모두를 만족시키지 못한다는 말이 있소. 다행히 이번 합의는 양측 모두에 이익이 되니, 와교적 수완의 진정 우수한 사례라 할 수 있소.\""
 MFE_political_events.10.a:0 "이번 협상의 공은 [SCOPE.gsInterestGroup('ig_industrialists').GetName]에게 있다."
 MFE_political_events.10.b:0 "이것이 가능했던 것은 [ROOT.GetCountry.GetRuler.GetFullName]의 덕이오!"
 MFE_political_events.11.t:0 "빵 폭동"
 MFE_political_events.11.d:0 "수입산 곡물 부족 사태가 [SCOPE.sState('bread_riot_state').GetName] 지역의 빵값 폭등을 초래하고 말았다."
 MFE_political_events.11.f:0 "\"동전 반 닢이면 빵 세 덩이를 살 수 잇었는데 지금은 이게 뭐요? 빵집이 문을 연 것을 보는 것만으로도 다행일 지경이로군.\""
 MFE_political_events.11.a:0 "국가가 주민들의 배고픔을 달래주는 데 힘써보도록 하겠다."
 MFE_political_events.11.b:0 "빵이 먹고 싶으면 사면 되잖아!"
 MFE_political_events.12.t:0 "Hard Times On The Farm"
 MFE_political_events.12.d:0 "The drought in [SCOPE.sState('bread_queue_state').GetName] is starting to ruin the local farmers, precipitating a crisis in [ROOT.GetCountry.GetName]."
 MFE_political_events.12.f:0 "\"Rain? We haven't seen any here in [SCOPE.sState('bread_queue_state').GetName] in months. The planting season has been very hard on us...we are going to lose everything.\""
 MFE_political_events.12.a:0 "Send aid immediately"
 MFE_political_events.12.b:0 "Oh well, they will figure it out"
 MFE_political_events.13.t:0 "Guns Cross The Border"
 MFE_political_events.13.d:0 "Reports are circulating that unscrupulous merchants are flooding [SCOPE.sState('neighbor_neighbor_state').GetName] with weapons, ratcheting up the potential for violence."
 MFE_political_events.13.f:0 "\"[SCOPE.sState('neighbor_neighbor_state').GetName] is a powder keg at the moment, and all it will take is one spark to set off a wider conflagration.\""
 MFE_political_events.13.a:0 "Little can be done in a free market..."
 MFE_political_events.13.b:0 "Demand they stop this immediately!"
 MFE_political_events.14.t:0 "Local Business Fails"
 MFE_political_events.14.d:0 "An industrial accident in [SCOPE.sState('failing_building').GetName] is making international headlines; an explosion at a factory has killed thirty two workers."
 MFE_political_events.14.f:0 "\"How were we supposed to know the boilers were going to explode? Forget the [SCOPE.gsInterestGroup('ig_trade_unions').GetName] - it's going to take months before business is up and running again!\""
 MFE_political_events.14.a:0 "Send money to the state administrators"
 MFE_political_events.14.b:0 "We need to support the People"
 MFE_political_events.15.t:0 "Recruitment Drive"
 MFE_political_events.15.d:0 "A burst of jingoistic fervor in [SCOPE.sState('conscription_state').GetName] has resulted in an unprecedented amount of conscripts volunteering."
 MFE_political_events.15.f:0 "\"There's nothing wrong with giving the boys a little taste of glory - they'll be home by Christmas anyways.\""
 MFE_political_events.15.a:0 "Go through with the recruitment drive"
 MFE_political_events.15.b:0 "We don't need the extra soldiers"
 MFE_political_events.16.t:0 "Secular Policies"
 MFE_political_events.16.d:0 "[SCOPE.sCharacter('ig_leader').GetFullName], a religious figure of some notoriety, has been publicly calling for the government of [ROOT.GetCountry.GetName] to do more to support the poorest elements of society."
 MFE_political_events.16.f:0 "\"How can [ROOT.GetCountry.GetRuler.GetFullName], who lives a soft life of luxury in [ROOT.GetCountry.GetCapital.GetName], know what it is like to feel the bitterness of poverty? Our leadership is out of touch.\""
 MFE_political_events.16.a:0 "'Convince' the Church to stay quiet"
 MFE_political_events.16.b:0 "Do they not have faith in our policies?!"
 MFE_political_events.17.t:0 "Protectionist Lobby"
 MFE_political_events.17.d:0 "Political elements aligned with the Protectionist Lobby have proposed bold series of reforms, causing debates throughout [ROOT.GetCountry.GetName]."
 MFE_political_events.17.f:0 "\"The momentum is with us, dear friends - we must strike while the iron is hot and seize the popular imagination!\""
 MFE_political_events.17.a:0 "Perhaps we can apply some more restrictions..."
 MFE_political_events.17.b:0 "Who do they think they are..."
 MFE_political_events.18.t:0 "Free Trade & Repeal Society"
 MFE_political_events.18.d:0 "A group of rabble-rousers calling themselves the 'Free Trade & Repeal Society' have set up shop in [ROOT.GetCountry.GetCapital.GetName] and have been gazetting incendiary tracts."
 MFE_political_events.18.f:0 "\"The time has come for man-made borders to be broken down and for trade to flow freely between the nations of the Earth. Eliminate the need for oversight and the common man will triumph!\""
 MFE_political_events.18.a:0 "Free Trade may be a good idea..."
 MFE_political_events.18.b:0 "The [SCOPE.sParty('liberal_party').GetName] will not dictate our policy!"
 MFE_political_events.19.t:0 "자유 무역과 도덕"
 MFE_political_events.19.d:0 "[ROOT.GetCountry.GetCapital.GetName]에서 발행되는 일간지의 편집국에서 자유 무역에 관한 연속 보도를 내놓으면서 농민들 사이에서 분노의 파장이 일고 있다."
 MFE_political_events.19.f:0 "\"왜 우리 같은 서민들은 만물에 과중한 세금을 내야만 하는가? 현 체제 하에서 이미 충분히 고통받고 있지 않은가? 자유 무역을 수용하는 것은 도덕적 의무다.\""
 MFE_political_events.19.a:0 "자유무역은 미래로 향하는 길이다."
 MFE_political_events.19.b:0 "당분간은 아무 변화도 없을 것이오."
 MFE_political_events.20.t:0 "노조 개혁안"
 MFE_political_events.20.d:0 "[SCOPE.gsInterestGroup('ig_trade_unions').GetName] 대표단에서 대대적인 개혁안을 제안해 왔다."
 MFE_political_events.20.f:0 "[SCOPE.sCharacter('trade_leader').GetFullName] 의원은 재계와 인연이 있는 국회의원으로 자신의 정치적 영향력을 활용하여 본인이 속한 기업에 유리한 개혁안을 추진하고 있다."
 MFE_political_events.20.a:0 "이런 제안은 받아들일 수 없다."
 MFE_political_events.20.b:0 "저들을 달래는 것이 좋겠소... 당분간은 말이지."
 MFE_political_events.21.t:0 "검열국의 업무 과중"
 MFE_political_events.21.d:0 "검열국이 예산 증액을 요청하는 서한을 [ROOT.GetCountry.GetRuler.GetFullName]에게 보냈다."
 MFE_political_events.21.f:0 "\"매일 아침 신문과 관보, 정치 전단물, 개인 서신 등 천여 건이 넘는 문서를 검토해야 하는데, 지금으로서는 인력이 턱없이 부족하나이다.\""
 MFE_political_events.21.a:0 "글쎼 뭐... 검열을 해야 하지 않겠소."
 MFE_political_events.21.b:0 "있는 자원으로 최대한 해보라 전하시오."
 MFE_political_events.22.t:0 "자유시장주의를 향한 비판"
 MFE_political_events.22.d:0 "국민들 사이에서 무역 정책을 둘러싼 논쟁이 불거지면서 모두가 각자의 편을 들고 있는 모습이다."
 MFE_political_events.22.f:0 "\"정부가 우리 국민보다 [SCOPE.gsInterestGroup('ig_industrialists').GetName] 계층을 더 중요하게 여기는 모양이오! 이렇게 치열한 시장에서 어떻게 살아남는단 말인가?\""
 MFE_political_events.22.a:0 "자유시장이야말로 우리가 나아갈 유일한 길이다!"
 MFE_political_events.22.b:0 "세상이 많이 바뀌었지... 적응할 필요가 있겠소."
 MFE_political_events.23.t:0 "반노예제 집회"
 MFE_political_events.23.d:0 "#Y 노예제#! 문제는 [ROOT.GetCountry.GetName]에서 큰 논란의 중심에 서 있다. 노예제를 비판하는 여론이 더욱 커지고 있지만, 뿌리깊은 기득권 세력은 현상 유지를 흔들려는 어떠한 변화에도 거세게 저항하고 있다."
 MFE_political_events.23.f:0 "\"이 사안은 대단히 민감해서 지금 당장 건들지 않는 것이 최선입니다. 이를테면 노예 소유주들이 겪는 재산 손실을 누가 다 보상하느냐의 문제가 있지요. 지금은 이런 문제를 논할 여유가 없소.\""
 MFE_political_events.23.a:0 "우리가 할 수 있는 게 마땅치 않다."
 MFE_political_events.23.b:0 "아무렴, 노예제는 그 자체로 악법이지."
 MFE_political_events.24.t:0 "여성에게 교육을"
 MFE_political_events.24.d:0 "[ROOT.GetCountry.GetCapital.GetName]의 영향력 있는 시민 단체들이 특히 학계를 중심으로 여성 권리 확대에 압력을 가하고 있다."
 MFE_political_events.24.f:0 "\"우리 딸들이 어째서 입학을 거절당해야 한단 말인가? 그들도 [ROOT.GetCountry.GetName] 사회에 기여하는 구성원이 아니란 말인가?\""
 MFE_political_events.24.a:0 "교육은 기본권이다!"
 MFE_political_events.24.b:0 "점진적인 변화가 더욱 안전한 발전의 길이다."
 MFE_political_events.25.t:0 "단식 투쟁"
 MFE_political_events.25.d:0 "[ROOT.GetCountry.GetCapital.GetName]에서 대규모 단식 투쟁이 벌어지고 있다. 파업에 나선 노동자들은 [SCOPE.gsInterestGroup('ig_industrialists').GetName]의 지지를 받고 있는 것으로 전해졌다."
 MFE_political_events.25.f:0 "\"어떻게 식사 시간도 없이 12시간 교대 근무를 할 수 있단 말인가? 사측에서 근무 시간의 식사를 계속 수용하지 않는다면, 우리는 정책 개편이 이뤄지기 전까지 계속 단식할 거요!\""
 MFE_political_events.25.a:0 "저들의 주장은 일리가 있다... 어찌 됐든 점심은 중요하니까. "
 MFE_political_events.25.b:0 "저 반동분자들을 체포하라."
 MFE_political_events.26.t:0 "현지 시인"
 MFE_political_events.26.f:0 "\"그럼 지금부터,〈젊은 베르테르의 환희에 가득찬 황홀경〉의 한 구절을 낭독해 보겠습니다...크흠.\n\n금발 타래의 어린 아가씨여 부디/내게 일러 주시오, 양말 산 곳은 어디?/내 발이 시리고 딱딱한 돌과 같아/뼛속까지 한기가 스며들 것 같아.\" "
 MFE_political_events.26.a:0 "우리 학생들을 가르치기 위해 채용해 보는 것이 좋겠다."
 MFE_political_events.26.b:0 "우리는 '예술' 따위보다 실질적인 사안에 집중해야 한다."
 MFE_political_events.27.t:0 "지하 신문"
 MFE_political_events.27.d:0 "[SCOPE.gsInterestGroup('ig_intelligentsia').GetName]의 익명 회원들이 [ROOT.GetCountry.GetRuler.GetFullName](을)를 풍자하는 신문을 자체적으로 발행하고 있다."
 MFE_political_events.27.f:0 "제6면에는 벌거벗은 [ROOT.GetCountry.GetRuler.GetFirstName](이)가 돼지 여물통에서 물 마시는 삽화와 함께 '꿀꿀! 산업가라면 무슨 쓰레기든 먹어치울 거야!'라는 설명 문구가 달렸다."
 MFE_political_events.27.a:0 "추잡하기가 이를 데 없군! 지금 즉시 탄압하도록."
 MFE_political_events.27.b:0 "출판은 자유롭게 허용해야지."
 MFE_political_events.28.t:0 "귀족들의 농민 계층 불만 조장"
 MFE_political_events.28.d:0 "우리나라의 [SCOPE.sCulture('discriminated_culture').GetName] 사람들 사이에서 귀족층이 자신들을 괴롭히고 있다는 불만이 제기되고 있다."
 MFE_political_events.28.f:0 "상류층 사이에서 널리 퍼져 있는 인식을 그대로 전하자면 \"[SCOPE.sCulture('discriminated_culture').GetName] 것들은 [ROOT.GetCountry.GetName]에 살면서 변소나 파고 노새나 몰아야 할 인간들이라니까. 썩은내나 풍기고 마구간에서 자니까\"라는 모양이다."
 MFE_political_events.28.a:0 "진짜 그래서 더 웃기군."
 MFE_political_events.28.b:0 "이제 모욕은 근절해야지! [SCOPE.sCulture('discriminated_culture').GetName] 사람들의 편에 서겠다."
 MFE_political_events.29.t:0 "현지 상인들의 시름"
 MFE_political_events.29.d:0 "값싼 수입 상품이 [ROOT.GetCountry.GetCapital.GetName]에 대량으로 유입되면서 현지 상인들이 사업을 접어야 할 지경이라고 울분을 토하고 있다."
 MFE_political_events.29.f:0 "\"이 사태에 아무런 조치가 취해지지 않는다면 우린 정치개혁을 요구하고 투쟁할 수밖에 없단 말이오. 이런 시대에 정직한 사업가가 어떻게 대성할 수 있겠는가?\""
 MFE_political_events.29.a:0 "그게 바로 자유무역인 것을!"
 MFE_political_events.29.b:0 "우리 시장이 가능한 모든 이점을 누려야 한다!"
 MFE_political_events.26.d: "[SCOPE.sCharacter('manzoni_new_writer_scope').GetFullName] 시인이 신간 시집을 홍보하기 위한 순회 강연의 일환으로 [ROOT.GetCountry.GetCapital.GetName]에 발을 들였다."
 MFE_political_events.26.g: "그 분도 결국 훌륭한 재능을 지닌 인물이 아니던가."