 je_noble_gases: "대기 중의 알려지지 않은 원소"
 je_noble_gases_reason: "헨리 캐번디시는 1783년 대기 중에 비활성 기체가 분포하고 있다는 사실을 처음으로  밝혀냈다. 캐번디시는 마찰전기를 이용해 공기와 산소를 섞은 결과, 대기 중의 질소와 산소가 완전 반응을 일으켜 질소산화물을 형성하는 것을 관찰하였다. 이 과정에서 반응하지 않은 잔류물이 남았다. 그러나 캐번디시는 자신이 발견한 것의 가치를 제대로 알아보지 못하고 실험을 중단하고 말았다. 이는 이전에는 알려지지 않은 원소가 존재할 가능성을 시사하므로 현대적인 실험 방법을 이용하여 연구될 필요가 있다."
 je_mendelejew_noble_gases_has_famous_chemist_tt: "저명한 [concept_mendelejew_chemist] 보유"
 je_mendelejew_noble_gases_invalid: "다른 국가에서 고귀한 기체를 발견함"
 mendelejew.901.t: "고귀한 기체"
 mendelejew.901.d: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 지구상에서도 검출된 적이 있으나 이전에는 이론상으로 존재하던 헬륨을 분리하는 데 성공했다. 박사는 이를 통해 대기 중에 존재하는 미지의 원소가 하나가 아니라 여러 개라는 놀라운 발견을 해냈다. 박사는 이들 기체가 반응성이 낮다는 점에서 '고귀한 기체'(비활성 기체)로 명명하였다."
 mendelejew.901.f: "캐번디시의 공기 연구 실험은 1888년 레일리 경이 이어나갔다. 레일리 경은 공기 중에서 얻은 질소의 밀도는 암모니아를 분해하여 얻는 질소와 차이가 있다는 것을 알아냈다. 따라서 레일리 경은 대기 중에 아직 알려지지 않은 비활성 성분이 존재할 것으로 추측하였다. 이에 레일리 경은 윌리엄 램지와 함께 공기 표본을 마그네슘과 반응시켜 질소를 완전히 제거하고 미지의 기체를 분리하는 시도에 나섰다. 두 사람은 마침내 1894년 분광학적 수단을 동원하여 아르곤이라는 새로운 원소를 발견하였다. 헬륨과 아르곤의 주요 성질을 조사한 결과, 이들은 대기 중의 다른 기체와는 달리 일원자로 구성되어 있다는 사실이 밝혀졌다. 윌리엄 램지는 이러한 기체들이 주기율표에서 하나의 족을 형성할 것으로 보고 나머지 원소들을 찾기 시작했다. 1898년 윌리엄 램지와 모리스 윌리엄 트레버스는 공기의 분별 증류를 통해 네온과 크립톤, 제논을 분리하기에 이르렀다."
 mendelejew.901.g: "고귀하다고? 게으른 거겠지."
 mandelejew_noble_gases_901.tt: "#YELLOW 아르곤#!, #YELLOW 네온#!, #YELLOW 크립톤#!, #YELLOW 제논#!의 이론화, 발견, 분리가 이루어집니다."
 mendelejew_chemist_synthetic_rubber_cost_modifier: "합성 고무 연구"
 mendelejew_synthetic_rubber_tech: "합성 고무"
 mendelejew_synthetic_rubber_tech_desc: "합성 고무는 인공 탄성중합체로서, 석유 부산물로부터 합성된 중합체에 해당됩니다. 합성 고무는 가열 안정성, 석유와 관련 화합물에 대한 내성이라는 두 가지 주요 측면에서 천연 고무보다 우수합니다."
