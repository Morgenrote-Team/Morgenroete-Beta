 mendelejew.990.d: "오늘 화학계 최고의 지성이자 진정한 거장이었던 [SCOPE.sCharacter('mendelejew_chemist_scope').GetFullName](이)가 서거하여 학계에 큰 공백을 남겼다는 소식에 온 국가가 애도를 표하고 있다."
 mendelejew.990.f: "어떤 의견을 습관처럼 갖게 되면 그것이 진실이라는 확신에 사로잡히게 되고, 그 의견의 약점을 숨기며, 그것의 반증을 받아들이지 못하게 되곤 한다.\n\n야코브 베르젤리우스"
 mendelejew.990.g: "화학계는 위대한 지성을 잃었다."
