 mendelejew_chemist_theorist: "화학자 전문 분야: 이론가"
 mendelejew_chemist_theorist_desc: "이 화학자는 연구 분야를 이론 화학으로 바꿔 기존에 발견되지 않았던 원소에 대해 새로운 가설을 더 빠르게 제시하고 있습니다."
 mendelejew_chemist_analyst: "화학자 전문 분야: 분석가"
 mendelejew_chemist_analyst_desc: "이 화학자는 새로운 원소의 발견에 뛰어난 재능을 보유하고 있으며 다른 동료 학자보다 더 빨리 성과를 내고 있습니다."
 mendelejew_chemist_inspector: "화학자 전문 분야: 검사관"
 mendelejew_chemist_inspector_desc: "이 화학자는 물질 연구에 뛰어난 것으로 높이 평가받고 있으며, 누구보다 빠르게 원소를 분리할 수 있습니다."
 je_mendelejew_element_theory: "원소에 대한 고찰"
 je_mendelejew_element_theory_reason: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName](이)가 새로운 원소의 이론화에 나섭니다. 경험치와 역량, 인물 특성, 그리고 천문대의 실험실 장비 성능은 이론화 과정의 소요 시간에 큰 영향을 끼칩니다. 이번 연구의 대상은 #YELLOW 원소 기호 [ROOT.Var('mendelejew_thought_variable').GetValue|0]번#!입니다."
 je_chemist_dies_tt: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사 사망"
 je_element_theory_failed_tt: "다른 국가에서 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사보다 먼저 원소를 이론화함"
 je_mendelejew_element_discovery: "원소 탐색"
 je_mendelejew_element_discovery_reason: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName](이)가 새로운 원소를 발견하기 위해 부단히 노력하고자 합니다. 경험치와 역량, 인물 특성, 그리고 천문대의 실험실 장비 성능은 발견 과정의 소요 시간에 큰 영향을 끼칩니다. 이번 연구의 대상은 #YELLOW 원소 기호 [ROOT.Var('mendelejew_searched_variable').GetValue|0]번#!입니다."
 je_element_discovery_failed_tt: "다른 국가에서 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사보다 먼저 원소를 발견함"
 je_mendelejew_element_isolation: "원소 검증"
 je_element_isolation_failed_tt: "다른 국가에서 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사보다 먼저 원소를 분리함"
 mendelejew.101.t: "신규 원소 이론"
 mendelejew.101.d: "폭넓은 연구와 탐색 끝에 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 미지의 원소 하나가 존재한다는 가설을 제시했다. 박사는 이것을 가상의 #YELLOW [ROOT.Var('mendelejew_thought_variable').GetValue|0]번 원소#!로 명명하였다. 다만 이 원소는 아직 발견되기를 기다리고 있다."
 mendelejew.101.f: "화학 원소라는 용어는 17세기에 등장하였는데, 당시 연금술에서 사용되던 원소의 개념이 물질의 다채로운 성질과 각 물질 사이의 반응을 과학적으로 설명하기에는 적절치 못하다는 인식이 조금씩 확산되었기 때문입니다. 1661년 로버트 보일은 연금술의 한계를 비판하여 큰 반응을 이끌어낸 《회의적인 화학자》를 출간하였는데, 이 책에서 보일은 화학 원소라 함은 '다른 물질이나 서로에게서 생겨난 것이 아니며, 혼합 물질을 구성하는 요소로서' 원시적인 물질을 뜻한다고 해설하였습니다."
 mendelejew.101.g: "뭐 어떤가, 이건 이론일 뿐. 화학 이론 말이오!"
 mendelejew.102.t: "누락된 원소?"
 mendelejew.102.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 최신 연구에서 지금까지 알려진 지식을 바탕으로 미지의 원소가 존재하는 것이 분명하다는 사실을 밝혀냈다. 이런 원소들을 정확히 어떻게 밝혀낼 것인가는 아직 알 수 없지만, 머지않아 가설이 세워질 것으로 전망된다."
 mendelejew.102.f: "기원전 360년경 그리스 철학자 플라톤이 자신의 대화록 《티마이오스》에서 '원소'(스토이케이아)라는 용어를 처음 사용하였습니다. 이 작품에는 무기물과 유기물의 구성이 어떻게 되어 있는가에 관한 담론이 소개되어 있으며, 화학에 대한 추론적 논문의 성격을 띕니다. 플라톤은 한 세기 전 엠페도클레스가 제시한 원소들이 정사면체(불), 정팔면체(공기), 정이십면체(물), 정육면체(흙)의 작은 다면체 형태로 이루어져 있다고 믿었습니다."
 mendelejew.102.g: "존재하는지도 모르는 것이 어떻게 누락될 수가 있는가?"
 mendelejew.103.t: "외국에서 새 원소를 이론화함"
 mendelejew.103.d: "우리 수석 화학자 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]에게는 유감스럽게도, 본인이 이론화 시도에 나섰던 #YELLOW [ROOT.Var('mendelejew_thought_variable').GetValue|0]번 원소#!에 관한 가설을 제시하는 과학 논문이 해외 학술지에 게재될 예정이라는 소식이 오늘 전해졌다. 이에 모든 연구가 중단된 상태다."
 mendelejew.103.f: "\"행운은 준비된 사람에게 찾아오는 축복.\" - 루이 파스퇴르"
 mendelejew.103.g: "뻔뻔하긴! 우리는 출판 직전이었단 말이오!"
 mendelejew.111.t: "교수의 부재?"
 mendelejew.111.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName](은)는 훌륭한 연구자일 뿐만 아니라 재능 있는 교수로도 인정받고 있다. 허나 지금의 원소 연구 과정에서 지켜지는 의무들이 교육 과정에 악영향을 주고 있다. 세미나와 강연에 소홀하다는 불만이 벌써부터 제기되는 실정이다."
 mendelejew.111.f: "독일의 화학 교수 유스투스 폰 리비히는 근대적인 강의법으로 학생들 사이에서 특히 인기가 많았습니다. 리비히가 발견하고 저술한 정보들은 머지않아 전세계적으로 본인의 이름을 알리게 되었으며 그 결과로 수많은 독일인과 외국인 학생 (영국인 84명과 미국인 18명)이 리비히의 화학과 약학 강의를 청강하러 기센에 찾아오는 계기가 되었습니다."
 mendelejew.111.g: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 연구에 집중해야 한다."
 mendelejew.111.h: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 강연에 집중해야 한다."
 mendelejew.111.i: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 어느 쪽도 소홀히 해선 안 된다."
 mendelejew.112.t: "꿈"
 mendelejew.112.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName](이)가 지난 밤 에 꾸었던 꿈 속에서 영감을 받은 덕분에 이전에 실패했던 화학 이론 문제를 해결할 수 있게 되었다고 전했다."
 mendelejew.112.f: "\"저는 앉아서 교과서에 글을 적었지만 진전은 없었습니다. 내 생각은 다른 곳에 가 있었기 때문이오. 의자를 벽난로 쪽으로 돌려 꿈뻑 졸기 시작했죠. 다시 원자가 내 눈앞에 뛰다니는 듯 했소. 이번에는 작은 원자들이 뒷쪽에 얌전히 머물러 있었소. 나의 정신적 시야는 그것들의 환영을 반복 시청하며 더욱 예리해져, 이제는 다양한 형태를 지닌 더욱 큰 구조들을 구별할 수 있었습니다. 길게 늘어선 원자들은 떄론 더 촘촘하게 서로 맞물려 뱀처럼 얽히며 움직였습니다. 잠깐! 저게 뭔가? 뱀 한마리가 자기 꼬리를 움켜쥐고 내 눈앞에서 조롱하듯 빙글 돌고 있었습니다. 마치 번개처럼 나는 깨어났고 이번에도 나는 그 가설의 결과를 생각하며 남은 밤을 지새웠소. 신사 여러분, 꿈꾸는 법을 배우도록 합시다. 그럼 아마도 우리는 진실을 알게 될지 모릅니다... 허나 깨어 있는 이성으로 검증하지 않고서야 우리의 꿈을 발표하는 것은 조심해야 하겠습니다.\" - 아우구스트 케쿨레"
 mendelejew.112.g: "박사께서는 잠에 들 때에도 연구를 한단 말이오?"
 mendelejew.113.t: "화학 논문"
 mendelejew.113.d: "미지의 원소에 관한 실제 이론을 연구하는 일환으로 화학 논문의 집필이 이루어졌다. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 지금까지 이 논문을 사적 용도로만 활용할 생각이었으나 ,조수는 이를 초안으로 여기지 말고 완성해서 출판해야 한다고 나섰다."
 mendelejew.113.f: "화학 뿐만 아니라 여느 학문 분야라면 연구 목표를 달성하지 못하더라도 그 과정에서 훨씨 넏 흥미로운 발견을 이룩하여 급히 써놓는 식으로 기록되는 경우가 많다. 목표를 잠시 잊고 더욱 획기적인 연구에 몰두하는 것은 흔한 일이다."
 mendelejew.113.g: "그저 개인의 연구를 위한 것이다."
 mendelejew.113.h: "이 연구는 교육 과정에서 다뤄져야 한다."
 mendelejew.113.i: "이 연구서는 과학적 가치가 있으니, 공개적으로 다뤄져야 한다!"
 mendelejew.114.t: "낮잠"
 mendelejew.114.d: "우리 화학자 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 자신의 연구가 완전히 성공하기 위해서는 특별한 휴식과 재충전의 기회, 특히 영감을 받기 위한 수면이 필요하다고 밝혔다. 허나 그 후로 별다른 진전은 없는 상황이다."
 mendelejew.114.f: "\"모든 가정이 사실이고 화학식도 유효하다면, 그 결과는... 아, 다람쥐다!\""
 mendelejew.114.g: "화학자가 여태껏 빈둥거리기만 했단 말이오?!"
 mendelejew.115.t: "천문학-화학 공동 연구"
 mendelejew.115.d: "천문학계에서 활동중인 [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사과의 지식 교류로 우리 화학자 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사의 신규 원소 이론화 과정에 획기적인 탄력을 받게 되었다."
 mendelejew.115.f: "분광학이 탄생한 이후에도 그렇지만, 그 전에도 화학과 천문학은 서로 영향력을 주고받았다. 초창기 분광학은 천문학 기술로 활용되었는데, 윌리엄 하이드 월러스턴의 실험에서 태양의 광선을 스펙트럼선으로 나타내는 최초의 분광계가 제작된 것이 대표적인 사례다. 이러한 스펙트럼선의 특성은 훗날 요제프 폰프라운호퍼가 자세히 기록하였다. 이후 구스타프 로베르트 키르히호프와 로베르트 분젠이 각 원소마다 스펙트럼선의 일정 수와 배열이 적용된다는 사실을 밝혀냈다. 두 사람은 월러스턴과 프라운호퍼가 스펙트럼선을 관측했던 것은 태양의 바깥층에 존재하는 원소가 흡수 특성을 지니고 있었기 때문이며, 그렇기에 광구에서도 똑같은 스펙트럼선이 나타날 것이라는 결론을 내렸다."
 mendelejew.115.g: "학문의 통합일세!"
 mendelejew.201.t: "새로운 원소의 발견"
 mendelejew.201.f: "\"우린 아직 알려지지 않은 원소가 많이 발견되기를 기대할 수밖에 없다. 이를테면 원자량이 65에서 75 사이에 해당되는 알루미늄부터 규소까지의 자리에는 유사한 원소가 있을 것이다.\" - 드미트리 멘델레예프"
 mendelejew.201.g: "그 맛은 어떠한가?"
 mendelejew.202.d: "우리 수석 화학자 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName](이)가 가설로 제시된 #YELLOW [ROOT.Var('mendelejew_searched_variable').GetValue|0]번 원소#!가 실존한다고 확신하며 이를 찾아내기로 결심하였다."
 mendelejew.202.f: "오늘날 존재가 알려진 원소 가운데 고대부터 순수한 형태로 전해져 왔던 원소는 탄소, 황, 철, 구리, 아연, 은, 주석, 금, 수은, 납까지 단 10원소에 불과하다. 이들은 자연적으로 존재하거나 광석을 제련하는 식으로 존재가 알려져 왔다. 중세 시대에 광업이 발전하면서 미확인 금속이 광석에서 발견되는 경우가 많았는데, 특히 독일의 에르츠산맥에서 채취된 광석이 여기에 해당되었으며 코발트, 니켈처럼 산신의 이름을 따와 명명되곤 했다.1669년 헤니히 브란트가 인을 발견하면서 마침내 대다수의 원소를 발견하는 시대가 열렸으며, 1789년 마르틴 하인리히 클라프로트가 피치블랜드 광석에서 우라늄을 발견하기도 했다."
 mendelejew.202.g: "기초적인 연구로군."
 mendelejew.203.t: "외국에서 신규 원소 발견"
 mendelejew.203.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 오늘 아침 어느 회담에서 외국 학자가 #YELLOW [ROOT.Var('mendelejew_searched_variable').GetValue|0]번 원소#!를 먼저 발견하는 데 성공했다는 사실을 전해들었다. 그 소식에 의욕을 잃은 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetSheHe]는 모든 연구를 중단하였다."
 mendelejew.203.f: "\"저는 물리학과 화학 논문에 기술된 여러 실험들을 시도해 보았고 그 결과는 간혹 예기치 못한 것이었습니다. 어떤 날에는 작은 성공에 고무되기도 하였지만, 다른 날에는 경험 부족으로 인한 사고와 실패로 깊은 절망에 빠지기도 하였습니다.\" - 마리 퀴리"
 mendelejew.203.g: "저것이 가짜 원소란 걸 증명하고 말겠다!"
 mendelejew.211.t: "새로운 실험실?"
 mendelejew.211.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 자신의 대학에 마련된 화학 실험실의 환경이 열악하다고 목소리를 높였다. 새로운 기구와 장비를 시급히 구입할 필요가 있는 것이다. 그렇지 않으면 신규 원소 발견이 상당히 지연될 수 있다."
 mendelejew.211.f: "실험실을 설치하고 새로운 장비나 기구를 구입하는 것은 마냥 주어지는 기회가 아니었다. 19세기 초에는 화학에 대한 부정적인 인식이 여전히 도처에 남아 있었다. 학계의 최정상에 올라 있던 화학자 유스투스 폰 리비히조차도 실험실 장비는 본인이 부담해야 했다."
 mendelejew.211.g: "예산을 지원하여 최첨단 장비를 갖춘 새로운 실험실을 갖춘다."
 mendelejew.211.h: "대학 차원에서 예산을 아껴 새로운 기구를 구입한다."
 mendelejew.211.i: "그럼 그 예산은 누가 다 댈 것인가?"
 mendelejew.212.t: "미지의 화합물"
 mendelejew.212.d: "#YELLOW [ROOT.Var('mendelejew_searched_variable').GetValue|0]번 원소#!를 찾아내기 위해 노력하던 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 이전에는 알려지지 않았던 화합물을 발견하여 산업 현장에 실질적인 이득을 가져다줄 것으로 전망된다."
 mendelejew.212.f: "화합물은 두 가지 이상 원소의 원자를 화학적 결합으로 묶은, 여러 개의 동일 분자(또는 분자체)로 이루어진 화학 물질을 말한다. 따라서 단 하나의 원소에 들어 있는 원자로 구성된 분자는 화합물이 아니다. 화합물은 화학 반응을 통해 별개의 물질로 전환될 수 있으며 다른 물질과 상호작용을 일으킬 수 있다. 그 과정에서 원자 간의 결합이 끊어지거나 새로운 결합이 이루어질 수도 있다."
 mendelejew.212.g: "대단해!"
 mendelejew.213.t: "화학 조수"
 mendelejew.213.d: "아직 미발견 상태로 남아 있는 #YELLOW [ROOT.Var('mendelejew_searched_variable').GetValue|0]번 원소#!를 탐색하던 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 유능한 조수의 도움을 받고 있다. 일부 동료 학자들은 단순히 조수로 남기에는 재능이 아깝다고 생각하는 모양이다."
 mendelejew.213.f: "\"나는 화학 현상, 다시 말해 놀랍도록 다른 성질을 지닌 물질이 반응하는 것에 완전히 매혹되었으며 세상의 이런 측면에 대해 더 많이 알고 싶었다.\" - 라이너스 폴링"
 mendelejew.213.g: "조수는 원소 연구에 집중하도록 하시오."
 mendelejew.213.h: "과학적 재능을 북돋아 줍시다."
 mendelejew.214.t: "샘플 오류"
 mendelejew.214.d: "알고 보니 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 불순물이 섞인 샘플을 수 개월 동안 다루어서 잘못된 결과를 도출했던 것으로 밝혀졌다."
 mendelejew.214.f: "\"그냥 석영이 변색된 것이었다니 그게 무슨 소리야?!\""
 mendelejew.214.g: "과학의 퇴보로군."
 mendelejew.215.t: "지질학-화학 공동 협력"
 mendelejew.215.d: "지질학계에서 활동중인 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사과의 지식 교류로 우리 화학자 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사의 신규 원소 발견 과정에 획기적인 탄력을 받게 되었다."
 mendelejew.215.f: "지질학자가 새로운 광물의 목록을 기록하지 않았다면 여러 화학 원소의 발견도 불가능했을 것이다. 1839년 독일계 스위스 화학자 크리스티안 프리드리히 쇤바인은 '지구화학'이라는 용어를 창시하였다. 이 용어는 단순히 광물을 기록하는 것을 넘어서 그것의 물질적 기반과 화학적 역학을 이해하는 것을 목표로 삼았다."
 mendelejew.301.t: "새로운 원소의 분리"
 mendelejew.301.f: "\"자연에서는 아무것도 생겨나지 않고, 사라지지도 않으며, 모든 것이 변한다. 우리는 오직 사실만을 믿어야 한다. 자연은 우리에게 사실을 전하며, 결코 속일 수 없다.\" - 앙투안 라부아지에"
 mendelejew.301.g: "과학계의 업적일세."
 mendelejew.302.d: "#YELLOW [ROOT.Var('mendelejew_examined_variable').GetValue|0]번 원소#!가 '발견'되었다고는 하지만 그 존재는 분리가 이뤄지기 전까지 확인할 수 없다. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName](은)는 해당 원소의 존재를 확인하고 최종적으로 순수한 형태로 만들 수 있도록 한층 더 면밀한 시험에 나서기로 결정하였다."
 mendelejew.302.f: "최초의 근대적인 원소 일람은 1789년 앙투안 라부아지에의 《화학원론》에서 제시한 것으로 빛과 열을 포함한 33원소가 소개되었습니다. 1818년에는 옌스 야코브 베르셀리우스가 당시 공인된 49원소 가운데 45원소의 원자량을 측정하였습니다. 1869년 드미트리 멘델레예프는 주기율표에 63원소를 수록하였습니다."
 mendelejew.302.g: "실험실이 보험에 가입되어 있길 바라오."
 mendelejew.303.t: "외국에서 새로운 원소를 분리하다"
 mendelejew.303.d: "나쁜 소식이다! 외국의 화학자가 #YELLOW [ROOT.Var('mendelejew_examined_variable').GetValue|0]번 원소#!를 먼저 분리한 것으로 전해졌다. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 쏟아부어 왔던 그 모든 노력과 희망은 물거품이 되고 말았다. 어쩌면 다른 원소를 탐색할 수 있을지도 모른다."
 mendelejew.303.f: "\"발상이 좋아도 시기는 어긋나기 마련이다. 내가 주변의 많은 사람들보다 더욱 성과를 거둘 수 있엇던 것은 주로, 아니 거의 오직, 성실함이 보편화된 덕분이라고 해도 과언이 아닐 것이다.\" - 존 달튼"
 mendelejew.303.g: "이런 과학적 영광은 우리 것이 되었어야 했다..."
 mendelejew.311.t: "화학 합성"
 mendelejew.311.d: "#YELLOW [ROOT.Var('mendelejew_examined_variable').GetValue|0]번 원소#!의 분리에 나선 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 이전에는 기술적으로 부담이 큰 것으로 여겨졌던 합성 물질을 만들어내는 데 성공했다. 이것으로 우리 학계는 물론 경제와 산업에도 이득이 될 것으로 전망된다."
 mendelejew.311.f: "화학 합성(화학적 결합)은 하나 혹은 여러 개의 생성물을 얻기 위해 화학 반응을 인위적으로 수행하는 것을 말한다. 이는 일반적으로 한 차례 이상의 반응을 거친 물리적, 화학적 조작 과정을 통해 이루어진다. 현대적인 실험실이라면 이 과정을 재현 가능하고 신뢰할 수 있다. 화학 합성을 통해 특정 환경에 노출되면 변환되는 하나 이상의 화합물(시약이나 반응물이라고 칭함)이 만들어진다. 원하는 생성물을 얻기 위해 여러 유형의 반응을 적용할 수도 있다. 이를 위해서는 화학반응기나 단순한 둥근바닥 플라스크와 같은 반응조(反應槽)에 화합물을 섞는 과정이 필요하다. 최종 생성물을 분리하려면 특정 형태의 처리나 정제 과정을 필요로 하는 화학 반응이 많다."
 mendelejew.311.g: "아주 좋아."
 mendelejew.312.t: "Chemical Dissociation"
 mendelejew.312.d: "Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] has made progress in his attempts to isolate #YELLOW Element Number [ROOT.Var('mendelejew_examined_variable').GetValue|0]#!. A chemical dissociation took him a decisive step further."
 mendelejew.312.f: "Dissociation in chemistry is a general process in which molecules (or ionic compounds such as salts, or complexes) separate or split into other things such as atoms, ions, or radicals, usually in a reversible manner. For instance, when an acid dissolves in water, a covalent bond between an electronegative atom and a hydrogen atom is broken by heterolytic fission, which gives a proton (H+) and a negative ion. Dissociation is the opposite of association or recombination."
 mendelejew.312.g: "Fantastic!"
 mendelejew.313.t: "의무에 소홀하다"
 mendelejew.313.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName](이)가 #YELLOW [ROOT.Var('mendelejew_examined_variable').GetValue|0]번 원소#!의 분리에 관한 연구 과제를 수행하고 있다는 핑계로 평소에 불쾌해하던 학업 의무를 저버리고 있다는 것은 비밀이 아니다. 총장은 대학 회의나 강연에 모습을 드러내지 않는 것에 책임을 물을 방침이다."
 mendelejew.313.f: "'학생'이란 칭호를 달고 다니는 성가신 것들을 피하는 데에는 어떠한 변명도 지나치지 않다."
 mendelejew.313.g: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 더욱 중요한 일에 나서고 있소."
 mendelejew.313.h: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 제 의무를 다해야 하오."
 mendelejew.314.t: "An unforeseen Chemical Reaction"
 mendelejew.314.d: "During one of his last chemical experiments, Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] apparently misinterpreted a few small things and thus slightly underestimated the effect of a reaction."
 mendelejew.314.f: "The newspapers are still reporting on the failed fire brigade operation, whose use of water fueled the chemical reaction even more instead of reducing the damage. Several students complained of smoke inhalation, and there were several injuries in the laboratory. The university building in the Faculty of Science has suffered significant damage and will have to be closed for months, if not years. The local newspaper was awaiting a statement from Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], who, however, could not be reached after his short-term hospital stay due to a tennis tournament."
 mendelejew.314.g: "A disaster!"
 mendelejew.315.t: "An Ingenious-Chemical Collaboration"
 mendelejew.315.d: "The engineer Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] has improved some scientific equipment to assist Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] in the planned isolation of an element."
 mendelejew.315.f: "At the beginning of the 20th century, chemists and mechanical engineers worked together in the chemical industry, e.g. in the design of reactors and boilers, some of which were exposed to considerable stress (600 °C and 100 bar). The new discipline of chemical engineering ultimately developed at this interface, whose graduates today dominate the chemical industry."
 mendelejew.401.t: "A Chemical Experiment"
 mendelejew.401.d: "In order to take a break from his usual work,  Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] wants to use the space in the country's most important laboratory to carry out a chemical experiment. The experimental glasses are already ready."
 mendelejew.401.f: "From time to time, chemists come up with the idea of pursuing their passion instead of the tasks assigned to them. Every now and then, valuable findings actually emerge: for example, the improvement of fertilizers or the production of chemicals in industry. Whether such success occurs depends largely on the character traits, skills and experience of a chemist."
 mendelejew.401.g: "I'm excited to see what comes out of this experiment!"
 mendelejew.401.h: "Stop this nonsense."
 mendelejew.402.t: "Successful experiment"
 mendelejew.402.d: "Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] was right and actually gained useful knowledge from his latest experiment. The newly discovered chemical procedure will influence agriculture and industry in the coming years. Maybe the process will be named after [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetHerHim] at some point?"
 mendelejew.402.f1: "Through [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetHerHis] experimental research, [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] has succeeded in producing a better fertilizer that promises richer harvests in the coming years."
 mendelejew.402.f2: "With [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetHerHis] revolutionary process, [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] has laid the foundations for a special fertilizer that will be used particularly in plantation farming."
 mendelejew.402.f3: "The new process that [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] has made accessible to industry should significantly improve production in chemical factories."
 mendelejew.402.g: "Success!"
 mendelejew.403.t: "Failed experiment"
 mendelejew.403.d: "Although his colleagues had high hopes for [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]'s work, [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetHerHis] experiment was not successful. Instead, [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetSheHe] lost valuable time that would have been better spent on element research."
 mendelejew.403.f: "'Well, that didn't work as expected. At least the laboratory didn't explode!'"
 mendelejew.403.g: "Disappointing."
