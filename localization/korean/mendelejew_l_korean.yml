 mendelejew_chemist_theorist: "화학자 전문 분야: 이론가"
 mendelejew_chemist_theorist_desc: "이 화학자는 연구 분야를 이론 화학으로 바꿔 기존에 발견되지 않았던 원소에 대해 새로운 가설을 더 빠르게 제시하고 있습니다."
 mendelejew_chemist_analyst: "화학자 전문 분야: 분석가"
 mendelejew_chemist_analyst_desc: "이 화학자는 새로운 원소의 발견에 뛰어난 재능을 보유하고 있으며 다른 동료 학자보다 더 빨리 성과를 내고 있습니다."
 mendelejew_chemist_inspector: "화학자 전문 분야: 검사관"
 mendelejew_chemist_inspector_desc: "이 화학자는 물질 연구에 뛰어난 것으로 높이 평가받고 있으며, 누구보다 빠르게 원소를 분리할 수 있습니다."
 je_mendelejew_element_theory: "원소에 대한 고찰"
 je_mendelejew_element_theory_reason: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName](이)가 새로운 원소의 이론화에 나서고 있습니다. 경험치와 역량, 인물 특성, 그리고 천문대의 실험실 장비 성능은 이론화 과정의 소요 시간에 중대한 영향을 끼칩니다. 이번 연구 대상은 #YELLOW [ROOT.Var('mendelejew_thought_variable').GetValue|0]번 원소#!입니다."
 je_chemist_dies_tt: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사 사망"
 je_element_theory_failed_tt: "다른 국가에서 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사보다 먼저 원소를 이론화함"
 je_mendelejew_element_discovery: "원소 탐색"
 je_mendelejew_element_discovery_reason: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName](이)가 새로운 원소를 발견하기 위해 쉴 틈 없이 노력하고자 합니다. 경험치와 역량, 인물 특성, 그리고 천문대의 실험실 장비 성능은 발견 과정의 소요 시간에 중대한 영향을 끼칩니다. 이번 연구 대상은 #YELLOW [ROOT.Var('mendelejew_searched_variable').GetValue|0]번 원소#!입니다."
 je_element_discovery_failed_tt: "다른 국가에서 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사보다 먼저 원소를 발견함"
 je_mendelejew_element_isolation: "원소 검증"
 je_element_isolation_failed_tt: "다른 국가에서 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사보다 먼저 원소를 분리함"
 mendelejew.101.t: "신규 원소 이론"
 mendelejew.101.d: "폭넓은 연구와 탐색 끝에 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 미지의 원소 하나가 존재한다는 가설을 제시했다. 박사는 이것을 가상의 #YELLOW [ROOT.Var('mendelejew_thought_variable').GetValue|0]번 원소#!로 명명하였다. 다만 이 원소는 아직 발견되기를 기다리고 있다."
 mendelejew.101.f: "화학 원소라는 용어는 17세기에 등장하였는데, 당시 연금술에서 사용되던 원소의 개념이 물질의 다채로운 성질과 각 물질 사이의 반응을 과학적으로 설명하기에는 적절치 못하다는 인식이 조금씩 확산되었기 때문입니다. 1661년 로버트 보일은 연금술의 한계를 비판하여 큰 반응을 이끌어낸 《회의적인 화학자》를 출간하였는데, 이 책에서 보일은 화학 원소라 함은 '다른 물질이나 서로에게서 생겨난 것이 아니며, 혼합 물질을 구성하는 요소로서' 원시적인 물질을 뜻한다고 해설하였습니다."
 mendelejew.101.g: "뭐 어떤가, 이건 이론일 뿐. 화학 이론 말이오!"
 mendelejew.102.t: "누락된 원소?"
 mendelejew.102.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 최신 연구에서 지금까지 알려진 지식을 바탕으로 미지의 원소가 존재하는 것이 분명하다는 사실을 밝혀냈다. 이런 원소들을 정확히 어떻게 밝혀낼 것인가는 아직 알 수 없지만, 머지않아 가설이 세워질 것으로 전망된다."
 mendelejew.102.f: "기원전 360년경 그리스 철학자 플라톤이 자신의 대화록 《티마이오스》에서 '원소'(스토이케이아)라는 용어를 처음 사용하였습니다. 이 작품에는 무기물과 유기물의 구성이 어떻게 되어 있는가에 관한 담론이 소개되어 있으며, 화학에 대한 추론적 논문의 성격을 띕니다. 플라톤은 한 세기 전 엠페도클레스가 제시한 원소들이 정사면체(불), 정팔면체(공기), 정이십면체(물), 정육면체(흙)의 작은 다면체 형태로 이루어져 있다고 믿었습니다."
 mendelejew.102.g: "존재하는지도 모르는 것이 어떻게 누락될 수가 있는가?"
 mendelejew.103.t: "외국에서 새 원소를 이론화함"
 mendelejew.103.d: "우리 수석 화학자 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]에게는 유감스럽게도, 본인이 이론화 시도에 나섰던 #YELLOW [ROOT.Var('mendelejew_thought_variable').GetValue|0]번 원소#!에 관한 가설을 제시하는 과학 논문이 해외 학술지에 게재될 예정이라는 소식이 오늘 전해졌다. 이에 모든 연구가 중단된 상태다."
 mendelejew.103.f: "\"행운은 준비된 사람에게 찾아오는 축복.\" - 루이 파스퇴르"
 mendelejew.103.g: "뻔뻔하긴! 우리는 출판 직전이었단 말이오!"
 mendelejew.111.t: "교수의 부재?"
 mendelejew.111.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName](은)는 훌륭한 연구자일 뿐만 아니라 재능 있는 교수로도 인정받고 있다. 허나 지금의 원소 연구 과정에서 지켜지는 의무들이 교육 과정에 악영향을 주고 있다. 세미나와 강연에 소홀하다는 불만이 벌써부터 제기되는 실정이다."
 mendelejew.111.f: "독일의 화학 교수 유스투스 폰 리비히는 근대적인 강의법으로 학생들 사이에서 특히 인기가 많았습니다. 리비히가 발견하고 저술한 정보들은 머지않아 전세계적으로 본인의 이름을 알리게 되었으며 그 결과로 수많은 독일인과 외국인 학생 (영국인 84명과 미국인 18명)이 리비히의 화학과 약학 강의를 청강하러 기센에 찾아오는 계기가 되었습니다."
 mendelejew.111.g: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 연구에 집중해야 한다."
 mendelejew.111.h: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 강연에 집중해야 한다."
 mendelejew.111.i: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 어느 쪽도 소홀히 해선 안 된다."
 mendelejew.112.t: "꿈"
 mendelejew.112.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName](이)가 지난 밤 에 꾸었던 꿈 속에서 영감을 받은 덕분에 이전에 실패했던 화학 이론 문제를 해결할 수 있게 되었다고 전했다."
 mendelejew.112.f: "\"저는 앉아서 교과서에 글을 적었지만 진전은 없었습니다. 내 생각은 다른 곳에 가 있었기 때문이오. 의자를 벽난로 쪽으로 돌려 꿈뻑 졸기 시작했죠. 다시 원자가 내 눈앞에 뛰다니는 듯 했소. 이번에는 작은 원자들이 뒷쪽에 얌전히 머물러 있었소. 나의 정신적 시야는 그것들의 환영을 반복 시청하며 더욱 예리해져, 이제는 다양한 형태를 지닌 더욱 큰 구조들을 구별할 수 있었습니다. 길게 늘어선 원자들은 떄론 더 촘촘하게 서로 맞물려 뱀처럼 얽히며 움직였습니다. 잠깐! 저게 뭔가? 뱀 한마리가 자기 꼬리를 움켜쥐고 내 눈앞에서 조롱하듯 빙글 돌고 있었습니다. 마치 번개처럼 나는 깨어났고 이번에도 나는 그 가설의 결과를 생각하며 남은 밤을 지새웠소. 신사 여러분, 꿈꾸는 법을 배우도록 합시다. 그럼 아마도 우리는 진실을 알게 될지 모릅니다... 허나 깨어 있는 이성으로 검증하지 않고서야 우리의 꿈을 발표하는 것은 조심해야 하겠습니다.\" - 아우구스트 케쿨레"
 mendelejew.112.g: "박사께서는 잠에 들 때에도 연구를 한단 말이오?"
 mendelejew.113.t: "화학 논문"
 mendelejew.113.d: "미지의 원소에 관한 실제 이론을 연구하는 일환으로 화학 논문의 집필이 이루어졌다. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 지금까지 이 논문을 사적 용도로만 활용할 생각이었으나 ,조수는 이를 초안으로 여기지 말고 완성해서 출판해야 한다고 나섰다."
 mendelejew.113.f: "화학 뿐만 아니라 여느 학문 분야라면 연구 목표를 달성하지 못하더라도 그 과정에서 훨씨 넏 흥미로운 발견을 이룩하여 급히 써놓는 식으로 기록되는 경우가 많다. 목표를 잠시 잊고 더욱 획기적인 연구에 몰두하는 것은 흔한 일이다."
 mendelejew.113.g: "그저 개인의 연구를 위한 것이다."
 mendelejew.113.h: "이 연구는 교육 과정에서 다뤄져야 한다."
 mendelejew.113.i: "이 연구서는 과학적 가치가 있으니, 공개적으로 다뤄져야 한다!"
 mendelejew.114.t: "낮잠"
 mendelejew.114.d: "우리 화학자 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 자신의 연구가 완전히 성공하기 위해서는 특별한 휴식과 재충전의 기회, 특히 영감을 받기 위한 수면이 필요하다고 밝혔다. 허나 그 후로 별다른 진전은 없는 상황이다."
 mendelejew.114.f: "\"모든 가정이 사실이고 화학식도 유효하다면, 그 결과는... 아, 다람쥐다!\""
 mendelejew.114.g: "화학자가 여태껏 빈둥거리기만 했단 말이오?!"
 mendelejew.115.t: "천문학과 화학의 조화"
 mendelejew.115.d: "천문학계에서 활동중인 [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사과의 지식 교류로 우리 화학자 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사의 신규 원소 이론화 과정에 획기적인 탄력을 받게 되었다."
 mendelejew.115.f: "분광학이 탄생한 이후에도 그렇지만, 그 전에도 화학과 천문학은 서로 영향력을 주고받았다. 초창기 분광학은 천문학 기술로 활용되었는데, 윌리엄 하이드 월러스턴의 실험에서 태양의 광선을 스펙트럼선으로 나타내는 최초의 분광계가 제작된 것이 대표적인 사례다. 이러한 스펙트럼선의 특성은 훗날 요제프 폰프라운호퍼가 자세히 기록하였다. 이후 구스타프 로베르트 키르히호프와 로베르트 분젠이 각 원소마다 스펙트럼선의 일정 수와 배열이 적용된다는 사실을 밝혀냈다. 두 사람은 월러스턴과 프라운호퍼가 스펙트럼선을 관측했던 것은 태양의 바깥층에 존재하는 원소가 흡수 특성을 지니고 있었기 때문이며, 그렇기에 광구에서도 똑같은 스펙트럼선이 나타날 것이라는 결론을 내렸다."
 mendelejew.115.g: "학문의 통합일세!"
 mendelejew.201.t: "새로운 원소의 발견"
 mendelejew.201.f: "\"우린 아직 알려지지 않은 원소가 많이 발견되기를 기대할 수밖에 없다. 이를테면 원자량이 65에서 75 사이에 해당되는 알루미늄부터 규소까지의 자리에는 유사한 원소가 있을 것이다.\" - 드미트리 멘델레예프"
 mendelejew.201.g: "그 맛은 어떠한가?"
 mendelejew.202.d: "우리 수석 화학자 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName](이)가 가설로 제시된 #YELLOW [ROOT.Var('mendelejew_searched_variable').GetValue|0]번 원소#!가 실존한다고 확신하며 이를 찾아내기로 결심하였다."
 mendelejew.202.f: "오늘날 존재가 알려진 원소 가운데 고대부터 순수한 형태로 전해져 왔던 원소는 탄소, 황, 철, 구리, 아연, 은, 주석, 금, 수은, 납까지 단 10원소에 불과하다. 이들은 자연적으로 존재하거나 광석을 제련하는 식으로 존재가 알려져 왔다. 중세 시대에 광업이 발전하면서 미확인 금속이 광석에서 발견되는 경우가 많았는데, 특히 독일의 에르츠산맥에서 채취된 광석이 여기에 해당되었으며 코발트, 니켈처럼 산신의 이름을 따와 명명되곤 했다.1669년 헤니히 브란트가 인을 발견하면서 마침내 대다수의 원소를 발견하는 시대가 열렸으며, 1789년 마르틴 하인리히 클라프로트가 피치블랜드 광석에서 우라늄을 발견하기도 했다."
 mendelejew.202.g: "기초적인 연구로군."
 mendelejew.203.t: "외국에서 신규 원소 발견"
 mendelejew.203.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 오늘 아침 어느 회담에서 외국 학자가 #YELLOW [ROOT.Var('mendelejew_searched_variable').GetValue|0]번 원소#!를 먼저 발견하는 데 성공했다는 사실을 전해들었다. 그 소식에 의욕을 잃은 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetSheHe]는 모든 연구를 중단하였다."
 mendelejew.203.f: "\"저는 물리학과 화학 논문에 기술된 여러 실험들을 시도해 보았고 그 결과는 간혹 예기치 못한 것이었습니다. 어떤 날에는 작은 성공에 고무되기도 하였지만, 다른 날에는 경험 부족으로 인한 사고와 실패로 깊은 절망에 빠지기도 하였습니다.\" - 마리 퀴리"
 mendelejew.203.g: "저것이 가짜 원소란 걸 증명하고 말겠다!"
 mendelejew.211.t: "새로운 실험실?"
 mendelejew.211.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 자신의 대학에 마련된 화학 실험실의 환경이 열악하다고 목소리를 높였다. 새로운 기구와 장비를 시급히 구입할 필요가 있는 것이다. 그렇지 않으면 신규 원소 발견이 상당히 지연될 수 있다."
 mendelejew.211.f: "실험실을 설치하고 새로운 장비나 기구를 구입하는 것은 마냥 주어지는 기회가 아니었다. 19세기 초에는 화학에 대한 부정적인 인식이 여전히 도처에 남아 있었다. 학계의 최정상에 올라 있던 화학자 유스투스 폰 리비히조차도 실험실 장비는 본인이 부담해야 했다."
 mendelejew.211.g: "예산을 지원하여 최첨단 장비를 갖춘 새로운 실험실을 갖춘다."
 mendelejew.211.h: "대학 차원에서 예산을 아껴 새로운 기구를 구입한다."
 mendelejew.211.i: "그럼 그 예산은 누가 다 댈 것인가?"
 mendelejew.212.t: "미지의 화합물"
 mendelejew.212.d: "#YELLOW [ROOT.Var('mendelejew_searched_variable').GetValue|0]번 원소#!를 찾아내기 위해 노력하던 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 이전에는 알려지지 않았던 화합물을 발견하여 산업 현장에 실질적인 이득을 가져다줄 것으로 전망된다."
 mendelejew.212.f: "화합물은 두 가지 이상 원소의 원자를 화학적 결합으로 묶은, 여러 개의 동일 분자(또는 분자체)로 이루어진 화학 물질을 말한다. 따라서 단 하나의 원소에 들어 있는 원자로 구성된 분자는 화합물이 아니다. 화합물은 화학 반응을 통해 별개의 물질로 전환될 수 있으며 다른 물질과 상호작용을 일으킬 수 있다. 그 과정에서 원자 간의 결합이 끊어지거나 새로운 결합이 이루어질 수도 있다."
 mendelejew.212.g: "대단해!"
 mendelejew.213.t: "화학 조수"
 mendelejew.213.d: "아직 미발견 상태로 남아 있는 #YELLOW [ROOT.Var('mendelejew_searched_variable').GetValue|0]번 원소#!를 탐색하던 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 유능한 조수의 도움을 받고 있다. 일부 동료 학자들은 단순히 조수로 남기에는 재능이 아깝다고 생각하는 모양이다."
 mendelejew.213.f: "\"나는 화학 현상, 다시 말해 놀랍도록 다른 성질을 지닌 물질이 반응하는 것에 완전히 매혹되었으며 세상의 이런 측면에 대해 더 많이 알고 싶었다.\" - 라이너스 폴링"
 mendelejew.213.g: "조수는 원소 연구에 집중하도록 하시오."
 mendelejew.213.h: "과학적 재능을 북돋아 줍시다."
 mendelejew.214.t: "샘플 오류"
 mendelejew.214.d: "알고 보니 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 불순물이 섞인 샘플을 수 개월 동안 다루어서 잘못된 결과를 도출했던 것으로 밝혀졌다."
 mendelejew.214.f: "\"그냥 석영이 변색된 것이었다니 그게 무슨 소리야?!\""
 mendelejew.214.g: "과학의 퇴보로군."
 mendelejew.215.t: "지질학과 화학의 조화"
 mendelejew.215.d: "지질학계에서 활동중인 [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사과의 지식 교류로 우리 화학자 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사의 신규 원소 발견 과정에 획기적인 탄력을 받게 되었다."
 mendelejew.215.f: "지질학자가 새로운 광물의 목록을 기록하지 않았다면 여러 화학 원소의 발견도 불가능했을 것이다. 1839년 독일계 스위스 화학자 크리스티안 프리드리히 쇤바인은 '지구화학'이라는 용어를 창시하였다. 이 용어는 단순히 광물을 기록하는 것을 넘어서 그것의 물질적 기반과 화학적 역학을 이해하는 것을 목표로 삼았다."
 mendelejew.301.t: "새로운 원소의 분리"
 mendelejew.301.f: "\"자연에서는 아무것도 생겨나지 않고, 사라지지도 않으며, 모든 것이 변한다. 우리는 오직 사실만을 믿어야 한다. 자연은 우리에게 사실을 전하며, 결코 속일 수 없다.\" - 앙투안 라부아지에"
 mendelejew.301.g: "과학계의 업적일세."
 mendelejew.302.d: "#YELLOW [ROOT.Var('mendelejew_examined_variable').GetValue|0]번 원소#!가 '발견'되었다고는 하지만 그 존재는 분리가 이뤄지기 전까지 확인할 수 없다. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName](은)는 해당 원소의 존재를 확인하고 최종적으로 순수한 형태로 만들 수 있도록 한층 더 면밀한 시험에 나서기로 결정하였다."
 mendelejew.302.f: "최초의 근대적인 원소 일람은 1789년 앙투안 라부아지에의 《화학원론》에서 제시한 것으로 빛과 열을 포함한 33원소가 소개되었습니다. 1818년에는 옌스 야코브 베르셀리우스가 당시 공인된 49원소 가운데 45원소의 원자량을 측정하였습니다. 1869년 드미트리 멘델레예프는 주기율표에 63원소를 수록하였습니다."
 mendelejew.302.g: "실험실이 보험에 가입되어 있길 바라오."
 mendelejew.303.t: "외국에서 새로운 원소를 분리하다"
 mendelejew.303.d: "나쁜 소식이다! 외국의 화학자가 #YELLOW [ROOT.Var('mendelejew_examined_variable').GetValue|0]번 원소#!를 먼저 분리한 것으로 전해졌다. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 쏟아부어 왔던 그 모든 노력과 희망은 물거품이 되고 말았다. 어쩌면 다른 원소를 탐색할 수 있을지도 모른다."
 mendelejew.303.f: "\"발상이 좋아도 시기는 어긋나기 마련이다. 내가 주변의 많은 사람들보다 더욱 성과를 거둘 수 있엇던 것은 주로, 아니 거의 오직, 성실함이 보편화된 덕분이라고 해도 과언이 아닐 것이다.\" - 존 달튼"
 mendelejew.303.g: "이런 과학적 영광은 우리 것이 되었어야 했다..."
 mendelejew.311.t: "화학 합성"
 mendelejew.311.d: "#YELLOW [ROOT.Var('mendelejew_examined_variable').GetValue|0]번 원소#!의 분리에 나선 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 이전에는 기술적으로 부담이 큰 것으로 여겨졌던 합성 물질을 만들어내는 데 성공했다. 이것으로 우리 학계는 물론 경제와 산업에도 이득이 될 것으로 전망된다."
 mendelejew.311.f: "화학 합성(화학적 결합)은 하나 혹은 여러 개의 생성물을 얻기 위해 화학 반응을 인위적으로 수행하는 것을 말한다. 이는 일반적으로 한 차례 이상의 반응을 거친 물리적, 화학적 조작 과정을 통해 이루어진다. 현대적인 실험실이라면 이 과정을 재현 가능하고 신뢰할 수 있다. 화학 합성을 통해 특정 환경에 노출되면 변환되는 하나 이상의 화합물(시약이나 반응물이라고 칭함)이 만들어진다. 원하는 생성물을 얻기 위해 여러 유형의 반응을 적용할 수도 있다. 이를 위해서는 화학반응기나 단순한 둥근바닥 플라스크와 같은 반응조(反應槽)에 화합물을 섞는 과정이 필요하다. 최종 생성물을 분리하려면 특정 형태의 처리나 정제 과정을 필요로 하는 화학 반응이 많다."
 mendelejew.311.g: "아주 좋아."
 mendelejew.312.t: "화학적 해리"
 mendelejew.312.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 #YELLOW [ROOT.Var('mendelejew_examined_variable').GetValue|0]번 원소#!를 분리하려는 시도에 진전을 이루었다. 해리 과정을 통해 결정적인 한 걸음을 내딛게 된 것이다."
 mendelejew.312.f: "화학에서 해리(解離, dissociation)라 함은 분자(또는 염과 같은 이온성 화합물이나 착물)가 원자, 이온, 라디칼과 같은 다른 물질로 분리되거나 쪼개지는 통상적인 과정으로, 가역적으로 발생하는 경우가 대부분이다. 이를테면 산이 물에 분해될 때 음전성 원자와 수소 원자 사이의 공유 결합은 불균일분해로 끊어져 양성자(H+)와 음이온을 생성한다. 해리는 결합이나 재결합의 반대 과정이라고 할 수 있다."
 mendelejew.312.g: "대단해!"
 mendelejew.313.t: "의무에 소홀하다"
 mendelejew.313.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName](이)가 #YELLOW [ROOT.Var('mendelejew_examined_variable').GetValue|0]번 원소#!의 분리에 관한 연구 과제를 수행하고 있다는 핑계로 평소에 불쾌해하던 학업 의무를 저버리고 있다는 것은 비밀이 아니다. 총장은 대학 회의나 강연에 모습을 드러내지 않는 것에 책임을 물을 방침이다."
 mendelejew.313.f: "'학생'이란 칭호를 달고 다니는 성가신 것들을 피하는 데에는 어떠한 변명도 지나치지 않다."
 mendelejew.313.g: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 더욱 중요한 일에 나서고 있소."
 mendelejew.313.h: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 제 의무를 다해야 하오."
 mendelejew.314.t: "예상치 못한 화학 반응"
 mendelejew.314.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 최근 화학 실험 과정에서 몇 가지 사소한 부분들을 잘못 해석하여 화학 반응의 강도를 과소평가해버린 모양이다."
 mendelejew.314.f: "언론에서는 소방대의 진화 작업에 문제가 있었다고 연일 보도하고 있는데, 소방관들이 쓴 소방수가 피해를 줄이는 게 아니라 오히려 화학 반응을 더욱 악화시켰다고 한다. 여러 학생들이 연기 흡입으로 고통을 호소했고, 실험실에서는 부상자도 발생했다. 자연과학부 건물은 피해 상황이 심각하여 수 개월, 혹은 수 년 동안 폐쇄될 것으로 전망된다. 현지 언론에서는 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박자의 입장을 기다리고 있었으나 단기 입원 후 테니스 대회 참가로 연락이 닫지 않았다."
 mendelejew.314.g: "재난 그 자체로군!"
 mendelejew.315.t: "발상과 화학의 조화"
 mendelejew.315.d: "공학 분야에서 활동하는 [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] 박사가 신형 과학 기구를 제작하여 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사의 원소 분리 계획에 보탬이 되도록 하였다."
 mendelejew.315.f: "20세기 초 화학자와 기계공학자들은 화학 분야에서 협력에 나섰다. 극한의 압력 환경(섭씨 600도, 100bar)에 노출되는 반응기와 보일러를 설계한 것이 그 사례다. 이것으로 화학공학이라는 새로운 학문 분야가 탄생하였으며, 오늘날 이 분야의 졸업생들은 화학 산업을 주도하고 있다."
 mendelejew.401.t: "화학 실험"
 mendelejew.401.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 평소 연구에서 잠시 숨을 돌리기 위해, 국내에서 가장 중요한 연구소의 공간을 활용하여 화학 실험을 진행하고자 한다. 실험용 유리는 이미 준비된 상황이다."
 mendelejew.401.f: "화학자들은 간혹 자신에게 주어진 업무 대신 열정을 추구하는 생각을 하곤 한다. 그리고  떄로는 가치 있는 발견을 이뤄내기도 하는데, 예를 들어서 비료의 품질이나 산업용 화학 물질을 개량해낸다. 실험의 성공 여부는 화학자의 인물 특성, 숙련도와 경험치에 크게 좌우된다."
 mendelejew.401.g: "실험 결과가 어떻게 나올지 기대되는군!"
 mendelejew.401.h: "이런 헛짓거리는 그만두시오."
 mendelejew.402.t: "실험 성공"
 mendelejew.402.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사의 생각이 옳았고, 실제로 최근 실험을 통해 유용한 지식을 확보할 수 있었다. 새로 발견한 화학 공정은 향후 몇년 간 농업과 산업 분야에 영향을 끼칠 것이다. 언젠가는 이 공정이 박사의 이름을 따서 명명될 수도? "
 mendelejew.402.f1: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] 박사는 실험 연구를 통해 신형 비료를 생산하는 데 성공하여, 향후 몇년 간 더 많은 수확량을 거둘 수 있게 되었다."
 mendelejew.402.f2: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] 박사는 혁신적인 공정으로 플랜테이션 농장에 특히 유용할 특수 비료 생산의 토대를 마련하게 되었다."
 mendelejew.402.f3: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName](이)가 개발하여 산업계에 공개한 새로운 공정은 화학 공장의 생산량을 크게 향상시킬 전망이다."
 mendelejew.402.g: "성공이다!"
 mendelejew.403.t: "실험 실패"
 mendelejew.403.d: "동료 학자들의 큰 기대 속에 진행된 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]의 실험은 성공을 거두지 못했다. 이것으로 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetSheHe]는 원소 연구에 유용하게 쓰일 귀중한 시간을 낭비하고 말았다."
 mendelejew.403.f: "\"그게, 뭐 예상했던 만큼 잘 나오진 않았소. 그래도 실험실이 날아가진 않았으니 말이오!\""
 mendelejew.403.g: "실망스럽군."
 mendelejew_building_throughput_add_modifier: "화학 공정 개선"
 mendelejew_building_production_mult_modifier: "신규 화학 생산 방식"
 mendelejew_building_goods_input_mult_modifier: "효율적인 화학 정제법"
 mendelejew_chemist_focus_building: "화학 중점"
 mendelejew_chemist_fertilizer_cost_modifier: "비료 공장 개량 예산"
 mendelejew_chemist_explosives_cost_modifier: "폭약 공장 개량 예산"
 mendelejew_chemist_synthetics_cost_modifier: "합성 화학 물질 공장 개량 예산"
 mendelejew_congress_host_modifier: "화학 학술회의 개최"
 mendelejew_laughed_congress_modifier: "화학 회의에서 망신당함"
 mendelejew_respected_congress_modifier: "화학 회의에서 대우받음"
 mendelejew_lauded_congress_modifier: "화학 회의에서 칭송받음"
 mendelejew_stop_chemistry_project_button: "화학 과제 중단"
 mendelejew_stop_chemistry_project_button_desc: "현재 화학 과제를 중단합니다. 모든 화학 진행도가 사라집니다."
 mendelejew_stop_chemist_improving_project_tt: "#italic 화학 과제 중단#! 버튼을 클릭하거나 [concept_mendelejew_chemist]를 보유하지 않게 되면 과제를 중단할 수 있습니다."
 mendelejew_conference_chemist_double_vote_tt: "경험 많은 화학자를 보유한 덕분에 우리의 투표권은 #G 2배#!로 적용됩니다."
 mendelejew_conference_chemist_triple_vote_tt: "저명한 화학자를 보유한 덕분에 우리의 투표권은 #G 3배#!로 적용됩니다."
 je_mendelejew_improve_fertilizer_project: "비료 개량"
 je_mendelejew_improve_explosives_project: "폭약 개량"
 je_mendelejew_improve_synthetics_project: "화학 합성 물질 개량"
 mendelejew_synthetic_fuel_tech: "합성유"
 mendelejew_synthetic_fuel_tech_desc: "베르기우스-피어 공정은 석탄의 직접 수소화를 통한 대규모 석탄 액화 공정입니다. 석탄읙 고분자 물질은 고압과 고온 환경에서 수소에 의해 더 작은 분자로 분해됩니다. 이렇게 만들어진 기체와 액체 탄화수소는 제품화하여 연료와 윤활유로 활용됩니다. 1910년~1925년 독일의 화학자 프리드리히 베르기우스가 해당 공정의 기본 원리를 개발해냈습니다. 이후 1925년 BASF에서 마티아스 피어가 지도한 연구 사업으로 상용 공정과 촉매 개발이 이루어졌습니다."
 mendelejew.501.t: "인류를 위한 헌신"
 mendelejew.501.d: "[SCOPE.sCharacter('mendelejew_chemist_scope').GetFullName](은)는 조국의 폭약 공장에 혁명을 불러일으켰다. 새로운 화학 공정과 제작법을 생산력과 효율성을 상당한 수준으로 개량한 것이다. 벌써부터 [SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName] 박사가 전세계의 기아 퇴치에 지대한 공헌을 했다는 평가가 나오고 있다.\n\n총 개량 건물수: [GetPlayer.MakeScope.Var('mr_num_improved_chemical_plants_buildings_var').GetValue|V0]곳"
 mendelejew.501.f: "\"농부들은 우리의 초특급 신형 비료로 우리보다 먼저 앞서나갈 것이오! 인류를 위한 정말 큰 도약이요, 교수님의 놀라운 업적일세! 정말 똑똑한 분이오. 내가 큰 돈을 번다는 건 그저 부수적인 결과일 뿐이니 기사에 싣지 않아도 좋소. 그러나 지난 골프 대회에서 내가 우승한 건 마음껏 언급하시길 바라오.\""
 mendelejew.501.g: "모두에게 더 많은 질산염을!"
 mendelejew.502.t: "광업을 위한 헌신"
 mendelejew.502.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName](이)가 새로운 폭약 생산 공정의 특허를 취득하여 조국의 광업에 새 시대를 열었다. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 개발한 새로운 공식으로 생산 효율이 더욱 향상되고 원재료도 훨씬 적게 들어가게 되었다.\n\n총 개량 건물수: [GetPlayer.MakeScope.Var('mr_num_improved_explosives_factory_buildings_var').GetValue|V0]곳"
 mendelejew.502.f: "\"물론 이 폭약으로 광부들이 더욱 안전해진다는 건 아닐세. 허나 저들이 효과를 봤다면 이전보다 훨씬 더 효과를 본다는 이야기라네. 나는 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 발명한 우리의 신형 다이너마이트의 폭발력을 내 눈으로 확인하였고, 광부들이 이전보다 적게 일해도 된다는 사실을 발견했소. 이렇게 되면 이제 할 일은 잔해를 치우는 것뿐이니 광부들은 오히려 나에게 돈을 내야 할 거요.\""
 mendelejew.502.g: "모두에게 더 많은 니트로글리세린을!"
 mendelejew.503.t: "국가 주권을 위한 헌신"
 mendelejew.503.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName](은)는 화학 물질 제품의 생산에 상당한 변화를 불러일으켰다. 일부 공식을 다시 만들고 공정을 개선한 덕에 조금의 노력으로도 더 많은 제품을 생산할 수 있게 된 것이다. 이것으로 [GetPlayer.GetName](은)는 수입 의존 면에서 그 어느 때보다 한층 더 자립할 수 있게 되었으며, [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 벌써부터 국가의 영웅으로 추앙받고 있다.\n\n총 개량 건물수: [GetPlayer.MakeScope.Var('mr_num_improved_synthetics_factory_buildings_var').GetValue|V0]곳"
 mendelejew.503.f: "\"기본적으로 우리의 신형 합성 물질 제품을 구매하는 것은 애국자로서의 의무요. [ROOT.GetCountry.GetAdjectiveNoFlag] 과학자 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 발명해서 [ROOT.GetCountry.GetAdjectiveNoFlag] 공장에서 [ROOT.GetCountry.GetAdjectiveNoFlag] 노동자들이 (덜하든 더하든 간에) [ROOT.GetCountry.GetAdjectiveNoFlag] 자원을 사용하여 생산하고 있소. 그리고 당신도 훌륭한 애국 시민이 되고 싶지 않소? 그렇다면 더 높은 가격이라도 감수할 가치가 있을 것이오. 결국 조국을 위한 일이니까.\""
 mendelejew.503.g: "모두에게 더 많은 합성 물질 제품을!"
 mendelejew.601.t: "화학 학술회의"
 mendelejew.601.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]에서 개최되는 최정상급 국제 화학자 회의의 준비가 거의 마무리되었다. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName](은)는 이번 행사에 가장 중요한 전문가들이 참석할 수 있도록 특별히 신경을 쓰고 있다. 이제 남은 것은 초청장을 발송하는 것뿐이다."
 mendelejew.601.f: "화학은 19세기 중반에 과학의 한 분야로 정립되었으나 여전히 이론적으로 상당한 결함을 갖고 있었다. 수많은 '학파'가 각자의 견해를 제시하고 있던 상황이었으며, 원자와 분자의 구조가 특히 그러하였다. 존 달튼에 따르면 원자가 화학적 화합물의 가장 작은 구성 요소라는 것은 정설로 받아들여졌지만, 그 구조에 대해서는 알려진 바가 거의 없었다. 원자량의 기본 규모처럼 이론상의 근본적인 문제에 대해서도 의견이 분분했다. 명명법과 화학식 구조 또한 일관성이 별로 없었다. 그러나 이러한 문제들을 논의할 수 있는 회의 역시 그때까지 마련되지 않던 상황이었다. 이에 세 명의 젊은 화학 교수가 동료 학자들과의 토론을 통해 논란이 되는 문제를 명확히 하고자 학술회의를 개최하기로 계획하고, 1860년 9월 3일부터 9월 5일까지 독일 카를스루에에 화학 분야를 대표하는 핵심 인물들을 초청하였다."
 mendelejew.601.g: "우리 손님들은 수프에 들어가는 염화나트륨과도 같다."
 mendelejew.602.d: "[SCOPE.sCountry('mendelejew_congress_host_country').GetName]에서 국제 화학 학술회의의 초청장을 보냈다. 참가자들은 원자 질량의 국제 기준을 논의할 전망이며, [SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName] 박사를 따뜻하게 맞이하겠다고 전했다."
 mendelejew.602.g: "하루빨리 응해야 한다!"
 mendelejew.604.t: "원자의 질량"
 mendelejew.604.d: "학술회의는 순조롭게 시작되었지만, 원자의 질량에 관한 국제적인 기준을 확립하려는 노력은 머지않아 난관에 봉착했다. 학자들 가운데 자국을 우선하는 성향을 가진 파벌이 기존의 체계를 고수하려 했기 때문이다."
 mendelejew.604.f: "1860년 카를스루에 학술회의에서는 여러 토의 주제에 합의가 이루어지지 않았다. 가장 중요한 주제는 원자와 분자의 질량이었다. 과거 화학자들의 연구 결과를 기반으로 원자는 개별적인 입자이며 분자는 그것으로 구성된다는 점에는 의견의 일치를 보았지만, 원자의 질량을 나타내는 여러 가지 체계가 나란히 사용되고 있었다. 그 중 하나로 수소를 기준으로 삼은 체계가 있었는데, 기본값을 1로 두고 탄소를 6에, 산소를 8에 둔 것이었다. 원자량이 불확실한 만큼 연구 대상이 되는 화합물의 원소 구성도 불확실하였다. 질량 체계에는 크게 다섯 가지의 서로 다른 체계가 존재하였고, 복잡한 환산 과정 때문에 일부 화학자들은 아예 변화를 거부하기도 했다."
 mendelejew.604.g: "이렇게 의견이 어긋나서야 기존 체계를 버릴 이유는 없겠지."
 mendelejew.604.h: "우리는 국제적이고 공통적인 원자량 체계가 필요하다."
 mendelejew.605.t: "화학자들의 대화"
 mendelejew.605.d: "학술회의가 진행되는 한편으로 [SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName] 박사는 전세계에서 찾아온 수많은 동료 전문가들과 의견을 교환할 기회를 갖게 되었다. 지금 같은 특별한 기회를 어떤 면으로 잘 활용해야 하는가가 의문으로 남아 있다."
 mendelejew.605.f: "\"법칙을 이해하는 데 가설이 필수적이라는 것은 사실 놀라운 일이 아니다. 새로운 학문을 배우는 사람의 사고는 그 학문 자체가 역사적 발전을 이룩한 모든 단계를 거쳐야 하는 경우가 많다.\" - 스타니슬라오 카니차로"
 mendelejew.605.g: "우리 화학자는 미래를 위한 새로운 통찰력을 얻게 될 것이다."
 mendelejew.605.h: "우리 화학자는 지금 자신의 연구에서 불거지는 문제의 해결책을 알아볼 것이다."
 mendelejew.605.i: "우리 화학자는 조수들을 먼저 보내 무언가 배우도록 할 것이다."
 mendelejew.609.t_national: "화학 학술회의, 결론 없이 마무리"
 mendelejew.609.d_national: "사흘 동안 조직위와 화학계의 대표 전문가들은 이번 행사를 살려보기 위해 노력했으나 결국 원자량의 보편적인 표기 규칙을 마련하는 데 실패하고 말았다. 각국은 당분간 기존의 체계를 고수할 것이며 이에 따라 원자량 환산표의 구축이 더욱 절실해졌다."
 mendelejew.609.f_national: "카를스루에 학술회의는 특정 과학 분야에 관한 최초의 전문 학술회의였다. 비록 결정적인 성과는 없었지만, 카를스루에 화학 학술회의는 19세기 화학사를 통틀어 가장 중요한 행사로 평가받고 있다. 국내외 수많은 화학자들이 한자리에 모여 이론화학의 향후 발전에 촉매적 역할을 했던 것이다."
 mendelejew.609.g: "이것으로 수 년은 후퇴하게 되었군."
 mendelejew.609.t_international: "화학 학술대회, 합의 도출로 마무리"
 mendelejew.609.d_international: "다행히 이번 학술회의에 참석한 화학자들은 원자량을 통일하는 해결 방안을 합의하기에 이르렀다. 이 체계는 이제 국제적으로 공인된 것으로 여겨진다. 학자들은 아메데오 아보가드로의 정리를 근거로 삼았다. [SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName] 박사는 오늘 편지를 통해 성공 소식을 기쁘게 알렸다."
 mendelejew.609.f_international: "카를스루에 학술회의의 대표적인 장기적 성과로는 오늘날 우리에게도 친숙한 원자량을 채택했다는 점에 있다. 카를스루에 회의 이후 수소는 1개, 탄소는 12개, 산소는 16개 등으로 정해진 것이다. 이는 수소, 질소, 산소 등의 특정 원소들이 개별 원자가 아닌 이원자 분자로 구성되어 있다는 사실을 의식한 결과다."
 mendelejew.609.h: "화학의 획기적인 발전이군!"
 mendelejew.201.d: "고된 시간과 지난한 양의 자료를 꼼꼼히 검토한 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 이제 확신을 가졌다. 지난번의 조사 결과가 맞다면, 오랫동안 찾아 헤매던 #YELLOW [ROOT.Var('mendelejew_searched_variable').GetValue|0]번 원소#!를 실제로 발견한 것이다. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사는 이 원소에 #YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('mendelejew_element_name')]#!라는 이름을 붙이기로 결정하였다."
 mendelejew.301.d: "이제 의심의 여지는 사라졌다. #YELLOW [ROOT.Var('mendelejew_examined_variable').GetValue|0]번 원소#!는 그저 존재할 뿐만 아니라 현대적인 화학 공법을 이용하여 분리할 수 있게 된 것이다. 오늘은 조국에 있어 정말로 위대한 날이다!"
 je_mendelejew_element_isolation_reason: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName](이)가 새로운 원소를 분리하기 위해 쉴 틈 없이 연구하고 있습니다. 경험치와 역량, 인물 특성, 그리고 천문대의 실험실 장비 성능은 분리 과정의 소요 시간에 중대한 영향을 끼칩니다. 이번 연구 대상은 #YELLOW [ROOT.Var('mendelejew_examined_variable').GetValue|0]번 원소#!입니다."
