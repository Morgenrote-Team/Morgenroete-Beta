 je_mendelejew_improve_fertilizer_project_reason: "우리 [concept_mendelejew_chemist] [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]의 [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName]을 대상으로 생산 방식 현대화에 주력하고 있습니다. \n$mr_divider_for_je$\n이 사업은 매달 진행도를 얻습니다. 진행도가 #V 24점#!에 도달할 때마다 현재 건물에 새로운 변화 요인이 부여됩니다. 변화 요인은 총 세 가지가 존재합니다.\n$mr_divider_for_je$\n현재 건물: [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]의 [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_mendelejew_improve_chemical_plants_project_modifier_1_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_mendelejew_improve_chemical_plants_project_modifier_2_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_mendelejew_improve_chemical_plants_project_modifier_3_type')]\n\n남은 건물 수 (현재 건물 제외): [JournalEntry.MakeScope.Var('mr_number_of_remaining_list_entries_var').GetValue|V0]곳\n\n현재 월간 진행도: #underline #tooltip:[GetRawTextTooltipTag('gaudi_monthly_mechanical_research_progress_tt')] [GetPlayer.MakeScope.ScriptValue('mendelejew_general_project_progress_value')|+2]#!#!"
