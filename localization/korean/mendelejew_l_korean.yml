 mendelejew.990.t: "The Death of [SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName]"
 mendelejew.990.d: "Today, our nation mourns the loss of [SCOPE.sCharacter('mendelejew_chemist_scope').GetFullName], one of its greatest minds and a true giant in chemistry, leaving a significant void in academic life."
 mendelejew.990.f: "The habit of an opinion often leads to the complete conviction of its truth, it hides the weaker parts of it, and makes us incapable of accepting the proofs against it. \n \n /Jacob Berzelius"
 mendelejew.990.g: "Chemistry has lost a great mind"
