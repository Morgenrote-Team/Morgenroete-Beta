 custom_animal_documentation_topic_1: "동물의 구애 의식과 짝짓기 행동에 대한 탐구를 상세히 설명합니다."
 custom_animal_documentation_topic_2: "저자는 자연 서식지에서 그 생물과 직접 마주친 경험을 생생하게 공유합니다."
 custom_animal_documentation_topic_3: "화려한 삽화로 가득한 이 책은 생동감 넘치는 색감으로 동물의 세계를 생동감 있게 그려냅니다."
 custom_animal_documentation_topic_4: "현대 사회가 동물의 서식지 축소에 미치는 영향에 대해 날카롭게 비판합니다."
 custom_animal_documentation_topic_5: "동물의 먹이 습관과 선호하는 식단에 대해 심층적으로 분석합니다."
 custom_animal_documentation_topic_6: "학계에서는 이 작품의 접근 방식이 독특하다며 재미있게 보았다는 평을 내렸습니다."
 custom_animal_documentation_topic_7: "언론에서는 이 책의 통찰력과 매력적인 서술을 극찬했습니다."
 custom_animal_documentation_topic_8: "이 책은 동물의 일상적인 생활과 행동에 대하여 포괄적으로 설명하고 있습니다."
 custom_animal_documentation_topic_9: "이 책은 그 동물에 대한 깊은 애정을 마음속 깊이 표현하고 있습니다."
 custom_animal_documentation_topic_10: "이 책은 [ROOT.GetCountry.GetAdjectiveNoFormatting]의 본질에 대한 대대적인 조사 결과를 전달하고 있습니다."
