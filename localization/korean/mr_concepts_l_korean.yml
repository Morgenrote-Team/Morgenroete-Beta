 concept_lepsius_local_artifact: "현지 유물"
 concept_lepsius_local_artifacts: "현지 유물"
 concept_lepsius_major_local_artifact: "대표 $concept_lepsius_local_artifact$"
 concept_lepsius_major_local_artifacts: "대표 $concept_lepsius_local_artifacts$"
 concept_andersson_neoanthropus_fossil: "네오안트로푸스 화석"
 concept_andersson_palaeanthropus_fossil: "팔라에안트로푸스 화석"
 concept_andersson_pithecanthropus_fossil: "피테칸트로푸스 화석"
 concept_andersson_australopithecus_fossil: "오스트랄로피테쿠스 화석"
 concept_andersson_anthropological_prestige: "인류학계 위신"
 concept_andersson_anthropological_prestige_desc: "#b 인류학계 위신#!은 인류학계 성과에 따라 산정되는 위신의 총합을 나타냅니다. 그 종류는 다음과 같습니다.\n\n#b 선사시대 유물#!: 위신 1\n#b 네오안트로푸스, 팔라에안트로푸스, 피테칸트로푸스, 오스트랄로피테쿠스 화석#!: 위신 1\n#b 비너스 조각상#!:위신 5\n#b 동굴 벽화#!:위신 10\n#b 인류학의 발상국#!: 위신 15\n#b 네오안트로푸스 유형의 새로운 종#!: 위신 20\n#b 팔라에안트로푸스 유형의 새로운 종#!: 위신 40\n#b 피테칸트로푸스 유형의 새로운 종#!: 위신 60\n#b 오스트랄로피테쿠스 유형의 새로운 종#!: 위신 80\n#b 네오안트로푸스 골격#!: 위신 25\n#b 팔라에안트로푸스 골격#!: 위신 50\n#b 피테칸트로푸스 골격#!: 위신 75\n#b 오스트랄로피테쿠스 골격#!: 위신 100\n#b 호모 사피엔스 첫 규명#!: 위신 40\n#b 호모 네안데르탈렌시스 첫 규명#!: 위신 50\n#b 호모 에렉투스 첫 규명#!: 위신 50"
 concept_andersson_anthropology: "인류학"
 concept_andersson_anthropology_desc: "#b 인류학#!은 신석기 시대부터 오스트랄로피테쿠스까지 전 시대에 걸쳐 인류의 선사시대 조상에 주력하는 학문입니다. [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')]는 [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]과 [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')]을 연구하여 먼 과거를 재구성합니다. 인류학자는 [concept_andersson_human_evolution]를 여전히 유인원에서 초기 인류를 거쳐 현생 인류로 이어지는 과정(피테칸트로푸스, 팔레안트로푸스, 네오안트로푸스)으로 보고 있습니다. 따라서 인류학자들은 전세계에서 이러한 종의 대표적인 표본을 찾아, 발견지에 따라서 명명합니다. 화석이 충분히 모였다면 [concept_andersson_skeleton]을 복원할 수 있습니다. 또한 동굴 벽화를 발견하고, 두개측정을 실시하며, 신석가와 중석기, 구석기 후기에 관한 전시를 기획하기도 합니다. 아메리카 대륙의 인류 정착과 현대 인류의 기원에 관한 학술대회도 이들의 연구 범위에 속합니다."
 concept_dubois_natural_history_paleontology: "고생물학"
 concept_dubois_dinosaur_fossils: "공룡 화석"
 concept_dubois_great_formations: "거대 지층"
 concept_panum_pandemic: "대유행"
 concept_theiler_pest: "해충"
 concept_theiler_pests: "해충"
 concept_theiler_pest_desc: "해충은 주로 농작물에 피해를 주는 곤충을 말하며, 한 국가의 농업 생산에 상당한 악영향을 끼칠 수 있습니다. 작물에 영향을 끼치는 여러 요인과는 달리 해충은 수년간 유지될 수 있으나, 일정 기간 동안 완전히 모습을 감추기도 합니다. [concept_theiler_biologist]나 간혹 [concept_mendelejew_chemist]가 해충의 위협을 억제하거나 완전히 박멸할 방법을 강구하게 됩니다. 해충의 종류는 다음과 같습니다.\n\n- [GetHarvestConditionType('locust_swarm').GetName]"
 concept_vikelas_mechanical_innovation_desc: "기계 혁신은 [concept_vikelas_mechanic]가 [concept_vikelas_race_car] 개량에 활용하는 요소입니다. 경주용 차량의 속도, 신뢰도, 안전성 개선에 사용됩니다."