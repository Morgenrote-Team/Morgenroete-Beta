 concept_andersson_anthropologist: "#b #BLUE 인류학자#!#!"
 concept_andersson_anthropologists: "#b #BLUE 인류학자#!#!"
 concept_andersson_anthropologist_desc: "#b #BLUE 인류학자#!#!는 고생물학과 고고학 양측의 관점에서 선사 인류를 연구하는 학자입니다. [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]과 [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')]을 탐색하고, 인류의 새로운 종을 찾고 [Concept('concept_andersson_skeleton','$concept_andersson_skeletons$')]을 복우너합니다. 인류학자는 동굴학자(동굴 탐사 전문가)로 나설 때가 많으며 시간이 지나면 다양한 전공을 발전시킬 수 있습니다. 그 전공 분야에는 인류일원론자, 인류다원론자, 전파론자, 진화론자 등이 있으며, 학술회의에서의 투표 성향에 따라 갈리는 경우가 많습니다. 특히 뛰어난 인류학자는 [concept_andersson_human_evolution]에 관한 기존의 인류학적 용어를 개편하거나 필트다운인 화석이 위조라는 것을 밝혀낼 수도 있습니다."
 concept_andersson_human_fossil: "인류 화석"
 concept_andersson_human_fossils: "인류 화석"
 concept_andersson_human_bones: "인간 뼈"
 concept_andersson_human_fossil_desc: "#b 인류 화석#!에는 두 가지 핵심 유형이 존재합니다. 하나는 불특정 화석, 다른 하나는 특정 화석입니다. 불특정 화석은 역사 시대의 화석을 비롯하여 인류의 모든 유해를 말합니다. 인류학자가 아닌 사람도 발견할 수 있지만, 이를테면 [GetBuildingType('building_andersson_institute').GetName]의 설립처럼 중요한 역할을 할 때가 있습니다. 특정 화석은 네오안트로푸스, 팔라에안트로푸스, 피테칸트로푸스, 오스트랄로피테쿠스의 네 가지 범주로 분류됩니다. 이러한 화석은 원시 인류 조사나 원시 인류 탐사 중에 발견할 수 있습니다. 그 과정에서 [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')]는 완전히 새로운 유형의 화석을 발견할 수도 있습니다. 인류 화석에는 총 16가지가 존재합니다. 이를 통해 [Concept('concept_andersson_skeleton','$concept_andersson_skeletons$')]을 복원할 수도 있으며 [concept_andersson_human_evolution] 추적에 도움이 됩니다."
 concept_andersson_cave: "동굴"
 concept_andersson_caves: "동굴"
 concept_andersson_cave_desc: "#b 선사시대 동굴#!은 초창기 인류나 선인류가 [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]의 형태로 발견되는 곳입니다. 인류학 연구를 수행하면 보너스를 제공하게 됩니다. 동굴은 [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')]가 발견하고 탐사할 수 있습니다. 일부 동굴은 실제 역사의 이벤트를 통해서도 해금됩니다."
 concept_andersson_human_evolution: "인류의 진화"
 concept_andersson_human_evolution_desc: "빅토리아 시대에는 [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]과 진화 단계를 발달 수준에 따라 분류하는 경향이 있었습니다. 예술적 재능을 지닌 '천재적인' 호모 사피엔스와, 외모가 투박한 조상 내지는 유인원과 비슷한 종을 구분했던 것입니다. 따라서 인류의 조상은 네오안트로푸스 (진인), 팔라에안트로푸스 (동굴인), 피테칸트로푸스 (원인)으로 나뉘었는데, 피테칸트로푸스의 경우 동물과 인간 사이의 실질적인 '잃어버린 고리'로 취급되었습니다. 이러한 개념들은 후대의 학계에서 자주 부정되었지만, 초창기 인류사 연구의 출발점이 되었습니다. 아프리카에서 오스트랄로피테쿠스 (남방원인)이 발견된 것은 여러 가지 이유에서 기존의 시각을 뒤흔든 사건이었습니다."
 concept_andersson_prehistoric_artifact: "선사시대 유물"
 concept_andersson_prehistoric_artifacts: "선사시대 유물"
 concept_andersson_prehistoric_artifact_desc: "#b 선사시대 유물#!은 [concept_andersson_cave]이나 고고학 유적지에 인류가 거주했음을 보여주는 증거입니다. 불특정 [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]과는 달리 [concept_andersson_anthropological_prestige]을 바로 제공합니다. 흔치 않지만 신석기 시대, 중석기 시대, 전기 구석기 시대의 인류에 관한 전시의 개최에도 필요합니다. [concept_lepsius_archaeologist] 특성을 보유한 [concept_andersson_anthropologist]는 인류학 연구 과정에서 선사시대 유물을 더 많이 찾아냅니다."
 concept_andersson_skeleton: "선사시대 골격"
 concept_andersson_skeletons: "선사시대 골격"
 concept_andersson_skeleton_desc: "#b 선사시대 골격#!의 복원을 하기 위해서는 먼저 [GetBuildingType('building_andersson_institute').GetName]를 지어야 합니다. [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')]가 특정 종의 [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] 5점을 확보하면 복원에 나서게 되며, 인류학자의 [Concept('concept_character_trait','$concept_character_traits$')]과 경험지가 소요 시간에 영향을 끼칩니다. 네오안트로푸스, 팔라에안트로푸스, 피테칸트로푸스에 속한 종의 골격을 처음으로 복원하면 그에 알맞는 연구소의 생산 방식이 활성화됩니다. 다만 인류학자도 화석이 주어지면 다른 골격을 쉽게 복원할 수 있으며 [concept_andersson_anthropological_prestige]을 추가로 획득할 수 있습니다."
 concept_lepsius_minor_excavation_site: "일반 발굴지"
 concept_lepsius_minor_excavation_site_desc: "대규모 [Concept('concept_lepsius_excavation_site', '$concept_lepsius_excavation_sites$')]가 모든 국가가 발굴 허가를 통해 접근할 수 있고, 각 지역에 따라 이집트, 메소포타미아, 에게 문명, 선콜럼버스 시대의 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]을 획득할 수 있는 것과는 별도로, 소유국만이 접근할 수 있고 현지 유물만 나오는 '소규모' 발굴지의 개념도 존재합니다. 이 발굴지는 일지 항목을 통해 해금되며 [concept_lepsius_archaeologist]와 특수 기술의 연구가 필요한 경우가 일반적입니다. 발굴지가 실제로 활성화된다면 주 지역의 주 특성으로 표시가 됩니다. 발굴이 이루어진다면 고고학자가 고고학 과제를 수행하는 한 현지 유물을 계속해서 창출해 냅니다. 이러한 발굴지의 대표적인 예시로는 폼페이, 티칼, 하라파 등이 있습니다."
 concept_andersson_prehistoric_venus: "선사시대 비너스상"
 concept_andersson_prehistoric_venuses: "선사시대 비너스상"
