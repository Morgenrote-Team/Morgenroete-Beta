l_korean:
 ag_morgenroete_name: "[concept_morgenroete]"
 ag_morgenroete_tooltip: "한 개 이상의 행동을 취할 수 있는 [concept_morgenroete] 특성이 존재합니다."
 concept_morgenroete: "#r 모르겐뢰테#!"
 concept_morgenroete_mr: "MR"
 concept_morgenroete_concept: "개념"
 concept_pm_academics_university_humanities: "#b #BLUE 인문-인류학 특화 #!#!"
 concept_pm_academics_university_natural_history: "#b #GREEN 자연사 특화 #!#!"
 concept_pm_academics_university_mathematics: "#b #ORANGE 수학-기술 특화 #!#!"
 concept_academics_university_specialization: "대학 특화"
 concept_academics_academic: "학자"
 concept_academics_academics: "학자"
 concept_academics_scientist: "과학자"
 concept_academics_scientists: "과학자"
 concept_academics_academic_desc: "[concept_morgenroete]에서 #b 학자#!는 모드의 특정 기능을 사용할 수 있게 해 주는 특수 인물입니다. #b 학자#!를 얻기 위해서는 특정 이벤트에서 획득하거나 [concept_academics_progress]를 충분히 획득하면 됩니다. \n현재 존재하는 #b 학자#!는 다음과 같습니다.\n - [concept_tesla_engineer]\n - [concept_mendelejew_chemist]\n - [concept_verrier_astronomer]\n - [concept_agassiz_geologist]\n - [concept_dubois_paleontologist]\n - [concept_dubois_naturalist]\n - [concept_theiler_biologist]\n - [concept_panum_physician]\n - [concept_lepsius_archaeologist]\n - [concept_lepsius_anthropologist]"
 concept_academics_progress: "학자 양성 진행도"
 concept_academics_progress_desc: "#b 학자 양성 진행도#!를 360점을 획득하면 새로운 [concept_academics_academic]를 얻을 수 있습니다. #b 학자 양성 진행도#!를 가지려면 #b 학구적 환경#! 기술과 한 개 이상의 #b 대학#!이 필요합니다.\n #b 학자 양성 진행도#!는 여러 가지 요인에 따라 점수를 얻습니다. 이를테면 [concept_literacy]이 높을 수록 #b 학자 양성 진행도#!의 진척도 더욱 빨라집니다. 또다른 요인으로 여러분의 국가에 학자 인구 비중이 얼마나 되느냐입니다. 학자 인구가 #p 2% 이상#!일 경우 #b 학자 양성 진행도#!를 최대치로 획득할 수 있습니다. 학제 개선과 지식인 계층을 만족시켰을 경우에도 #b 학자 양성 진행도#!의 획득에 도움이 됩니다. 마지막으로 [concept_dubois_zoo]이나 [concept_verrier_observatory]와 같은 일부 기술 특화 및 특수 건물도 #b 학자 양성 진행도 #!를 추가로 제공합니다."
 concept_academics_scientific_society: "과학원"
 concept_academics_scientific_societies: "과학원"
 concept_academics_scientific_society_desc: "#b 과학원#!은 이 나라의 최우수 인재들이 모이는 기관입니다. 과학원은 나라의 과학자와 학자들을 대표하며, 여러분이 [Concept('concept_academics_academic','$concept_academics_academics$')]를 방문할 수 있게 합니다.\n\n#b 과학원#!이 제시하는 [Concept('concept_academics_academic_mission','$concept_academics_missions$')]을 수행하여 유용한 보상을 얻을 수도 있습니다."
 concept_academics_experience: "경험치"
 concept_academics_experience_desc: "학자 중에서는 한평생 #b 경험치#!를 모으는 학자도 있습니다. [concept_morgenroete]에서는 인물 생성 시 #b 경험치#!를 부여받게 됩니다. 일반적으로는 30세가 되기 전까지 매년 #b 경험치#! 10을 얻게 됩니다.\n 또한 새로운 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]를 발견하는 등의 제 할일을 마칠 때마다 추가 #b 경험치#!를 얻습니다. 해마다 #b 경험치#!를 계속해서 얻게 되는 것은 물론입니다.\n#b 경험치#! 100을 획득한 인물은 #b 경험 많음 특성#!을 획득합니다. #b 경험치 #! 300에 도달한 인물은 #b 저명함 특성#!을 획득하게 됩니다.\n 인물의 #b 경험치#!가 높을수록 본인의 연구 활동도 한층 나아지게 됩니다. 예를 들어 경험이 많거나 저명한 [concept_dubois_paleontologist]는 더 많은 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]를 획득하며, [concept_dubois_dinosaur_skeleton]의 조립 실력도 능숙해지게 됩니다."
 concept_academics_academic_mission: "학회 임무"
 concept_academics_academic_missions: "학회 임무"
 concept_academics_mission: "임무"
 concept_academics_missions: "임무"
 concept_academics_academic_mission_desc: "우리 [concept_academics_scientific_society]에서는 간혹 특정한 목표를 달성해달라고 요청하기도 합니다. 이런 목표는 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] 등을 일정 규모로 발견하라는 목표일 수도 있습니다. 행성 X를 발견하거나 [Concept('concept_lepsius_exhibition','$concept_lepsius_excellent_exhibition$')]를 마련하라는 #b 임무#!도 존재합니다.\n#b 임무#! 달성에 실패하면 #b 과학원#!은 실망하게 되지만, 성공할 경우에는 유용한 보상이 주어지게 됩니다."
 concept_curtiss_aviation: "항공"
 concept_curtiss_aviation_desc: "#b 비행#!은 [concept_morgenroete]를 대표하는 요소 중 하나입니다. 19세기와 20세기에는 인류의 비행이 도래하였습니다. 처음에는 #b 열기구#!와 #b 비행선#!의 형태로, 그 다음은 #b 항공기#!로 말이지요. 비행은 명예로운 활동이었으며 새로운 지평에 도달할 수 있게 하였습니다.\n\n 게임 초반에는 여러 국가들이 [Concept('concept_curtiss_balloonist_role','$concept_curtiss_balloonist_role_only_balloonist$')]를 후원하여 기록 경신에 나서면서 하늘을 향한 여정을 시작합니다. 기록을 경신하면 해당 국가의 기술력 향상과 명성 변화 요인을 부여받을 수 있습니다.\n 비행선 기술을 연구했다면 북극점에 접근할 수 있고 [concept_curtiss_pilot]를 갖췄다는 조건 하에 [concept_curtiss_arctic_expedition]에 나설 수 있게 됩니다.\n 항공 분야를 더 많이 연구하면 여러 가지 새로운 기능을 사용할 수 있습니다. [concept_curtiss_airport]을 건설하여 새로운 #b 비행#! 상품과 #b 서비스#!를 생산할 수 있습니다. #b 공항#!으로 [concept_curtiss_airline]를 키워나가면 외교적 행동으로 [concept_curtiss_airspace_convention]을 사용할 수 있습니다. #b 영공 협약#!으로 여러 주와 [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')], 그리고 북극점에 도달할 수 있습니다. #b 항공사#!가 충분히 성장하면 거대 비행선이나 세계 최대 규모의 항공기를 제작할 수 있습니다.\n 20세기 초에는 가장 흥미진진한 요소가 열리게 됩니다. 바로 [concept_curtiss_schneider_trophy]에 참가할 수 있게 되는 것입니다. #b 슈나이더 트로피#!란 여러 국가가 경쟁하는 수상 비행기 경주입니다. 우승을 이뤄내면 명성을 획득함과 동시에 차기 대회를 개최할 수 있습니다. 3회 우승을 이룩하면 #b 슈나이더 트로피#!를 영구 소유하게 됩니다."
 concept_curtiss_balloonist_role: "열기구 조종사 역할"
 concept_curtiss_balloonist_role_only_balloonist: "열기구 조종사"
 concept_curtiss_balloonists_role: "열기구 조종사"
 concept_curtiss_balloonist_role_desc: "#b 열기구 조종사#!는 국가의 후원을 받을 수 있는 특별한 캐릭터입니다. 선진국이나 서양 국가들을 중심으로 #b 열기구 조종사#!를 후원하여 기록 경신과 새로운 발견을 위해 경쟁에 나섭니다. #b 열기구 조종사#!는 무작위로 비행에 나서 최장 거리, 최장 비행 시간, 최고도 비행 등의 기록을 세웁니다. 비행을 할 때마다 #b 열기구 조종사#!는 경험치를 얻고 순위가 올라가며, 새로운 기록을 세울 확률이 높아집니다. 하지만 열기구 비행은 위험한 활동이며, 특히 질병, 알코올 중독, 약물 남용이 있는 열기구 조종사는 일찍 죽음을 맞이할 가능성이 높다는 점에 유의해야 합니다."
 concept_curtiss_arctic_expedition: "북극 탐험"
 concept_curtiss_arctic_expeditions: "북극 탐험"
 concept_curtiss_arctic_expedition_desc: "#b 비행선#! 기술을 연구하고 [concept_verrier_observatory]에 #b 기상관측소#!를 갖추고 있으며, [concept_curtiss_pilot]를 보유하고 있고, 북극점과 인접한 주로 접근할 수 있다면 #b 북극 탐험#!에 나설 수 있습니다. 탐험에 나설 수 있는 주는 #b 그린란드#!, #b 북부 노르웨이#!, #b 알래스카#!, #b 누나부트#!, #b 네네#!입니다. 해당 주를 직접 보유하거나 보유국과 [concept_curtiss_airspace_convention]을 체결하면 탐사 권한을 받을 수 있습니다.\n#b 북극 탐험#!에서는 연구 여행을 떠나고, 북극 기지를 건설하고, 북극의 지리·기상·생태에 관한 새로운 지식을 얻고, 비행선에 올라 사상 첫 북극점 횡단에 나설 수 있습니다!"
 concept_curtiss_pilot: "비행사"
 concept_curtiss_pilots: "비행사"
 concept_curtiss_pilot_desc: "#b 비행사#!는 #b 비행사 특성#!을 보유한 인물입니다. #b 비행사#!는 #b 초기 항공술#!을 연구한 뒤 낮은 확률로 출현합니다. 또한 공중 정찰을 생산 방식으로 채택한 부대가 전투에 돌입할 시, 이벤트의 형식으로 전투 중 #b 비행사#!가 출현할 기회가 생깁니다. 항공기와 근대 항공술 등의 더 나은 기술을 개발하거나, 결단을 통해 조종사 학교를 설립하면 #b 비행사#! 특성을 지닌 인물을 획득할 기회도 늘게 됩니다.\n#b 비행사#!는 당신에게 여러모로 보탬이 됩니다. #b 항공사#!에서는 이미지 재고를 위해 #b 비행사#!에 관심을 둘 수 있고, [concept_curtiss_schneider_trophy] 경기에서는 경험이 풍부한 #b 비행사#!가 더 유리한가 하면, [concept_curtiss_arctic_expedition]를 수행할 때에도 #b 비행사#!를 필수로 갖추고 있어야 합니다. #b 비행사#!는 전선에 배치될 경우 특정 이벤트를 통해 에이스 비행사로 승급될 수도 있습니다."
 concept_curtiss_airport: "공항"
 concept_curtiss_airports: "공항"
 concept_curtiss_airport_desc: "#b 공항#!은 #b 근대 항공술#! 기술 연구로 해제되는 건물입니다. 순수 민간 건물로서 [GetGoods('air_travel').GetName]과 #b 서비스#!를 제공하되 [GetGoods('tools').GetName], [GetGoods('paper').GetName], [GetGoods('aeroplanes').GetName], [GetGoods('oil').GetName] 등의 여러 상품을 소비합니다. 후반에는 [GetGoods('electricity').GetName], [GetGoods('telephones').GetName], [GetGoods('radios').GetName]도 소비하게 됩니다.\n#b 공항#!이 충분히 갖춰지면 [concept_curtiss_airline]가 창설되며, #b 공항#!의 규모를 키울수록 #b 항공사#!도 같이 성장하여 더 많은 보너스를 제공하게 됩니다."
 concept_curtiss_airline: "항공사"
 concept_curtiss_airlines: "항공사"
 concept_curtiss_airline_desc: "#b 항공사#!는 게임 후반부에 국내 단계에서 국제 항공편에 이르기까지 [GetGoods('air_travel').GetName]을 제공하는 기업이나 정부 운영 기관을 말합니다.#b 항공사#!는 여러 가지 추가 보너스도 제공합니다. #b 항공사#!는 이러한 항공편 운행을 위해 [Concept('concept_curtiss_airport','$concept_curtiss_airports$')]을 필요로 합니다. #b 공항#!의 규모를 늘리면 #b 항공사#!도 성장하게 됩니다.\n#b 항공사#!가 국영 체제로 운영되면 거대한 비행선을 건조하여 광활한 거리를 비행할 기회를 얻게 됩니다. #b 항공사#!가 공공, 민간 소유라면 역사상 최대 규모의 항공기를 제작할 기회를 얻을 수도 있습니다."
 concept_curtiss_airspace_convention: "영공 협약"
 concept_curtiss_airspace_conventions: "영공 협약"
 concept_curtiss_airspace_convention_desc: "#b 영공 협약#!은 당신의 영향권으로부터 멀리 떨어진 지역과 교류할 수 있도록 해 주는 중요한 [concept_diplomatic_pact]입니다. [concept_lepsius_excavation_site]가 있는 다른 나라와 #b 영공 협약#!을 체결하였다면 그 지역에 [concept_active_interest]를 보유하지 않고도 [concept_lepsius_expedition]를 보낼 수 있습니다.\n #b 영공 협약#!은 [concept_curtiss_arctic_expedition]를 파견하는 데 필요한 주를 소유하지 않고도 보낼 수 있게 해 줍니다."
 concept_curtiss_schneider_trophy: "슈나이더 트로피"
 concept_curtiss_schneider_trophy_desc: "이 영예로운 트로피를 둘러싼 경쟁은 제1차 세계 대전이 발발하기 직전, 본래 수상 비행기 개발을 촉진하려는 의도에서 프랑스의 자크 슈나이더가 제정한 것입니다. 세월이 흐르면서 이 트로피를 차지하기 위한 경쟁은 국가 간 경쟁으로 나아갔고, 그 중에서도 영국과 미국, 이탈리아는 자국 팀을 전폭적으로 지원하며 트로피 확보에 매진하였습니다. 실제로 #b 슈나이더 트로피#! 덕분에 기술 발전이 크게 촉진되어 더욱 빠르고 발전된 수상 비행기가 개발되기에 이르렀습니다.\n#b 슈나이더 트로피#!는 #b 수상 비행기#! 기술을 개발한 국가가 5개국 이상이고, 각 국가에서 항구와 도심 10단계를 보유하고 있을 경우 창설할 수 있습니다.\n트로피 우승국은 일지 항목을 통해 여러 요인에 따라 결정됩니다. 예를 들어 항공 학교와 대형 [concept_curtiss_airline]를 보유한 국가는 유리한 조건에 서게 됩니다. 위대한 [concept_curtiss_pilot]를 보유하거나 대대적인 예산 투입 역시 트로피 우승에 보탬이 됩니다.\n지난 대회 트로피 우승국은 항구를 보유하거나 호수가 많은 스위스일 경우에는 차기 대회를 개최할 자격이 주어집니다. 3회 연속 우승은 더욱 특별한 기회로서 해당 국가는 트로피를 영구히 보유하게 되며 명성 보너스도 얻게 됩니다."
 concept_curtiss_balloonist: "열기구 조종사"
 concept_curtiss_balloonist_desc: "이 인물은 열기구 비행으로 모험을 즐기곤 하는 열기구 조종사입니다."
 concept_curtiss_experienced_balloonist: "경험 많은 열기구 조종사"
 concept_curtiss_experienced_balloonist_desc: "이 인물은 경험 많은 열기구 조종사로, 열기구 비행으로 모험을 떠나곤 합니다. 이 특성을 가진 인물은 더 나은 기록을 세울 확률이 높습니다."
 concept_curtiss_famous_balloonist: "유명한 열기구 조종사"
 concept_curtiss_famous_balloonist_desc: "이 인물은 유명한 열기구 조종사로, 열기구 비행으로 모험을 떠나곤 합니다. 이 특성을 가진 인물은 더 나은 기록을 세울 확률이 높습니다."
 concept_dubois_natural_history: "자연사"
 concept_dubois_natural_history_desc: "#b 자연사#!는 [concept_morgenroete]를 대표하는 요소 중 하나입니다. 19세기에는 비글호 탐사를 비롯한 위대한 탐험, 진화론의 도래, 수십 만에 달하는 신종 생물 발견, 그리고 무엇보다도 공룡의 발견 등 자연사의 수많은 위대한 발견이 이루어졌습니다.\n\n 함대와 제독을 보유한 강대국은 [concept_dubois_pacific_expedition]에 배를 보낼 수 있습니다. #b 태평양 탐험#!에서는 희귀 동식물과 화석을 발견하고, 해양학 연구를 수행하고, 일식을 비롯한 천문 현상을 관측할 수 있습니다. \n\n 그 과정에서 찾아낸 대형 동물은 [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]이라 부르며, 그 동물들을 전시하는 [concept_dubois_zoo]을 건설하는 데 쓰입니다. 동물의 수가 많을수록 #b 동물원#!이 지닌 효과도 커집니다. 이런 #b 동물#!들은 탐험을 통해 찾아내거나, 자신의 영토에서 포획하거나, 다른 국가에 판매를 요청할 수 있습니다.\n\n 작은 동물이나 식물, 그 외 유기체는 [concept_dubois_specimen]이라고 부릅니다. [concept_dubois_naturalist]는 #b 표본#!을 수집합니다. #GREEN #b 박물학자#!#!는 열대우림 주 특성이 부여된 주에 [Concept('concept_dubois_botanical_expedition','$concept_dubois_botanical_expeditions$')]을 보낼 수 있습니다. 그런 주를 직접 보유하지 못하였다면 다른 국가로부터 [concept_dubois_botanical_licence]를 확보할 수 있습니다. #GREEN #b 박물학자#!#!는 희귀 표본을 찾을 때마다 [concept_academics_experience]를 얻게 됩니다. \n\n[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]은 [concept_dubois_paleontologist]의 연구 분야로서 식물과 곤충, 그 외 작은 동물의 화석들을 포괄하고 있습니다. #b 화석#!은 #b 탐험#!이나 [Concept('concept_dubois_formation','$concept_dubois_formations$')]이 있는 지역에서 찾을 수 있습니다. #b 거대한 지층#!을 보유하고 있다면 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]를 찾을 수 있습니다. 아니면 [concept_dubois_paleontological_licence]를 취득하여 접근할 수도 있습니다. \n\n 당신의 나라에 오를 수 있는 산맥이 있다면, 군의 장군은 [concept_douglas_mountaineering]에 참가하여 더 좋은 특성과 명성 보너스를 획득할 수 있습니다."
 concept_dubois_naturalist: "#b #GREEN 박물학자#!#!"
 concept_dubois_naturalists: "#b #GREEN 박물학자#!#!"
 concept_dubois_naturalist_desc: "#b #GREEN 박물학자#!#!는 [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]과 [concept_dubois_specimen]을 수집할 수 있는 학자입니다. [concept_dubois_pacific_expedition]와 [concept_dubois_botanical_expedition]의 일원으로 파견시켜, 희귀 식물과 동물들을 발견하여 소량의 보너스를 획득할 수 있습니다. #b #GREEN 박물학자#!#!가 새로운 희귀 표본을 발견하면 [concept_academics_experience]를 얻습니다."
 concept_dubois_paleontologist: "#b #GREEN 고생물학자#!#!"
 concept_dubois_paleontologists: "#b #GREEN 고생물학자#!#!"
 concept_dubois_paleontologist_desc: "#b #GREEN 고생물학자#!#!는 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]와 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]을 발굴하는 학자입니다. 이들을 수집하려면 [concept_dubois_formation]에 접근할 수 있어야 합니다. #b 지층#!이 있는 주를 직접 보유하거나 [concept_dubois_paleontological_licence]를 취득하여 접근이 가능해지면 #b 고생물학자#!에게 [concept_dubois_paleontological_expedition]를 보낼 수 있습니다.\n #b 공룡 뼈#! 5점을 수집하거나 복원하면 #b 고생물학자#!는 [concept_dubois_dinosaur_skeleton]을 복원할 수 있습니다. #b #GREEN 고생물학자#!#!가 [concept_academics_experience]를 얻을 수록 #b 공룡 골격#! 복원 능력도 좋아지며 #b 골격#! 자체도 품질이 좋아집니다. #b 공룡 골격#!의 품질이 좋을 수록 [concept_dubois_paleontological_collection]으로 얻는 위신도 늘어나게 됩니다."
 concept_dubois_pacific_expedition: "태평양 탐험"
 concept_dubois_pacific_expeditions: "태평양 탐험"
 concept_dubois_pacific_expedition_desc: "열강이나 강대국으로서 태평양에 탐사대를 파견할 수 있습니다. 이를 위해서는 #b 경험론#!, #b 스크루 호위함#!, #b 변증법#!을 연구하여야 하며, 항구와 대학을 보유하고, 최소 15척의 함대와 제독을 두고 있어야 합니다.\n #b 태평양 탐사#!에서는 희귀 식물, [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')], [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]을 발견하고, 해양학 연구를 진행하거나 일식 등의 천문 현상을 관측할 수 있습니다. #b 탐사#!에 처음 나설 때 탐사대에 데려갈 #b 과학자#!도 고를 수 있는데 #b 측량사#!, [concept_dubois_naturalist], [concept_dubois_paleontologist], [concept_verrier_astronomer]가 그 대상입니다. 이들 각자의 전공 분야는 특정 이벤트에서 더 나은 성과를 내는 데 도움이 될 것입니다.\n탐사대는 탐사의 주제를 직접 선택할 수 있습니다. 바다의 신비에 전념하여 해양학과 천문학 지식을 늘릴 수도 있는데 이 경우 해양학 관련 이벤트만 발생합니다. 자연의 경이로움을 탐험한다면 식물학, 동물학, 고생물학 관련 이벤트와 마주하게 됩니다. 강대국은 유물을 발견하거나, 교역소를 건설하거나, 선교를 하는 등의 위신 과제도 진행할 수 있습니다. 특히 오세아니아에 외교적 이해 관계를 두지 않았지만 선교사들로 작은 식민지를 건설할 수 있다는 점에서 유용합니다.\n 또한 오세아니아, 오스트레일리아, 인도네시아의 3곳 중에서 탐사 목적지를 선택해야 합니다. 각 지역마다 서로 다른 이벤트와 보상이 기다리고 있습니다."
 concept_dubois_habitat: "서식지"
 concept_dubois_habitats: "서식지"
 concept_dubois_animal_habitat: "동물 서식지"
 concept_dubois_habitat_desc: "#b 서식지#!는 주 내에서 특정 [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]이 서식하는 지역을 말합니다. #r 모르겐뢰테#!에서 #b 서식지#!는 여러 주 지역에 수많은 동물들을 대상으로 존재합니다. #b 서식지#!를 보유했다면 해당되는 #b 동물#!을 [concept_dubois_zoo]에 반입하거나 다른 나라에 판매할 수도 있습니다.\n\n 주의 [concept_urbanization]가 2000 이상이고 [concept_arable_land]가 없는 상태라면, 그곳의 #b 이국적 동물#!은 #n 10년 후에 멸종#!하게 됩니다.\n\n #b 동물#!들을 멸종 위기에서 벗어나게 하려면 #b 서식지#!가 존재하는 주에 [concept_dubois_nature_reserve]을 설치해야 합니다."
 concept_dubois_nature_reserve: "자연 보호 구역"
 concept_dubois_nature_reserves: "자연 보호 구역"
 concept_dubois_royal_hunting_reserve: "왕실 사냥 구역"
 concept_dubois_nature_reserve_desc: "#b 자연 보호 구역#!은 [Concept('concept_dubois_habitat','$concept_dubois_habitats$')]를 보존하거나 신설할 수 있는 보호 구역을 말합니다.\n\n 이미 #b 서식지#!를 보유하고 있을 경우 그 #b 서식지#!가 존재하는 주에 #b 자연 보호 구역#! 건물을 건설하여 인간의 영향권으로부터 파괴되는 것을 막을 수 있습니다. #b 자연 보호 구역#!을 건설하려면 #b 유전학#! 기술을 연구해야 하고, 주 문화로 된 본토의 편입 주에 #b 서식지#!가 존재하여야 합니다.\n\n #b 서식지#!를 보유하고 있지 않을 경우, 국내 지역들을 조사하여 #b 자연 보호 구역#!을 건설할 수 있습니다. 이 때 #b 유전학#! 기술을 연구하고 당신의 대륙에 서식하는 [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]이 최소 한 종 이상 [concept_dubois_zoo]에 수용되어 있어야 합니다.\n\n#b 자연 보호 구역#!은 자국의 동물 #b 서식지#!를 보호할 뿐만 아니라, 자기 대륙의 #b 이국적 동물#!들을 번식시킬 수도 있습니다. 이렇게 하면 대륙 내에 존재하는 모든 #b 이국적 동물#!을 하나의 주에 보전시킬 수 있습니다."
 concept_dubois_zoo_animal: "동물원 동물"
 concept_dubois_zoo_animals: "동물원 동물"
 concept_dubois_exotic_animal: "이국적 동물"
 concept_dubois_exotic_animals: "이국적 동물"
 concept_dubois_zoo_animal_desc: "세계에는 [concept_dubois_naturalist]이 잡을 수 있는 동물이 많습니다. #b 이국적 동물#!을 포획하려면 [concept_dubois_habitat]가 있는 주가 필요합니다. 아니면 #b 서식지#!가 있는 나라에서 #b 이국적 동물#!을 구매해올 수도 있습니다. \n한번 포획하면 #b 동물원 동물#!은 [concept_dubois_zoo]으로 보내지며 #b 동물원#!을 확장할 수 있게 됩니다."
 concept_dubois_zoo: "동물원"
 concept_dubois_zoos: "동물원"
 concept_dubois_zoo_desc: "#b 동물원#!은 [concept_dubois_zoo_animal] 5마리를 모은 뒤에 지을 수 있는 특수 건물입니다. #b 동물원#!에는 당신이 수집한 #b 동물#!과 [concept_dubois_specimen] 컬렉션, 고생물학 컬렉션을 소장시킬 수 있습니다."
 concept_dubois_specimen: "표본"
 concept_dubois_specimens: "표본"
 concept_dubois_specimen_desc: "[concept_dubois_naturalist]가 수집할 수 있는 다양한 곤충, 식물, 소형 동물은 #b 표본#!이라고 부릅니다. #b 표본#!으로 식물원을 짓거나 [concept_dubois_zoo]에 표본 컬렉션을 둘 수 있습니다."
 concept_dubois_botanical_expedition: "식물 탐사"
 concept_dubois_botanical_expeditions: "식물 탐사"
 concept_dubois_botanical_expedition_desc: "[concept_ito_medicinal_plants]이 있는 주를 보유했거나 [concept_dubois_botanical_licence]를 확보하여 그 주로 접근할 수 있다면 [concept_dubois_naturalist]에게 #b 식물 탐사#!를 떠나도록 명할 수 있습니다.\n 당신의 #b 박물학자#!는 1년간의 여정 동안 [concept_ito_medicinal_plants]과 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]을 수집하게 됩니다. 간혹 희귀한 식물을 찾아 [concept_dubois_zoo]의 식물원에 엄청난 수집품으로 둘 수도 있습니다."
 concept_dubois_botanical_licence: "식물 탐사 허가"
 concept_dubois_botanical_licences: "식물 탐사 허가"
 concept_dubois_botanical_licence_desc: "열대우림 주 특성이 있는 주로 접근할 수 없더라도, 그 주를 보유한 나라에 #b 식물 탐사 허가#!를 받아 [concept_dubois_botanical_expedition]를 보낼 수 있습니다. 소정의 금액을 건네야 하지만 그 대가로 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]을 모으고 희귀한 식물을 발견할 수 있게 됩니다."
 concept_dubois_fossil: "화석"
 concept_dubois_fossils: "화석"
 concept_dubois_fossil_desc: "[concept_dubois_paleontologist]는 [concept_dubois_formation]을 발굴하면 오래 전에 멸종한 동식물의 #b 화석#!을 발견할 수 있습니다."
 concept_dubois_dinosaur_bone: "공룡 뼈"
 concept_dubois_dinosaur_bones: "공룡 뼈"
 concept_dubois_dinosaur_bone_desc: "[concept_dubois_paleontologist]는 대규모 [Concept('concept_dubois_formation','$concept_dubois_formations$')]에서 공룡 뼈를 발견할 수 있습니다.\n#b 경험 많은 고생물학자#!의 경우 20개의 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] 조각을 모아 #b 공룡 뼈#!로 만들 수도 있습니다. #b 공룡 뼈#!는 배치 가능한 뼈가 최소 한 개 이상인 경우에만 복원이 가능합니다.\n 고생물학자는 이러한 직무를 수행하는 데 있어 지치거나 분주한 상태가 아니어야 합니다. 복원의 성공 여부는 학자의 고생물학적 [concept_academics_experience]에 크게 달려 있습니다. \n#b 공룡 뼈#!는 [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')]의 복원에 활용됩니다."
 concept_dubois_dinosaur_skeleton: "공룡 골격"
 concept_dubois_dinosaur_skeletons: "공룡 골격"
 concept_dubois_dinosaur_skeleton_desc: "[concept_dubois_paleontologist]는 특정 대륙 지역의 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] 다섯 개를 모으면 공룡 하나를 온전히 복원할 수 있습니다. #b 공룡 골격#!을 복원하려면 동일 지역에서 찾아낸 #b 공룡 뼈#! 다섯 개가 필요합니다.\n당신의 #b 고생물학자#!가 #b 공룡 골격#!을 제대로 복원하려면 충분히 경험을 쌓아야 하겠습니다. 그렇지 않으면 [concept_dubois_paleontological_collection]의 명성을 잃을 위험이 있습니다. 하지만 #b 공룡 골격#!이 잘못 복원되었다면 직접 고쳐볼 수도 있으며, 그러면 조금 더 나은 복원으로 나아갈 수도 있습니다."
 concept_dubois_paleontological_collection: "고생물학 소장품"
 concept_dubois_paleontological_collections: "고생물학 소장품"
 concept_dubois_paleontological_collection_desc: "#b 고생물학 소장품#!은 당신의 [concept_dubois_paleontologist]가 활약하는 영역입니다. 이곳에서는 우리 나라가 수집한 모든 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]과 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')], [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')]을 둘러볼 수 있습니다.\n#b 고생물학자#!가 조립한 #b 공룡 골격#!의 품질이 좋을수록, #b 소장품#!을 통해 얻는 위신도 증가합니다. #b 고생물학자#!가 #b 골격#!을 완전히 잘못 조립했다면 위신을 잃을 수도 있습니다. 그렇지만 그 #b 고생물학자#! 본인이나 후임이 더 나은 모습으로 다시 조립할 수 있을지도 모릅니다!"
 concept_dubois_formation: "지층"
 concept_dubois_formations: "지층"
 concept_dubois_geological_formation: "지질학적 지층"
 concept_dubois_formation_desc: "#b 지층#!에는 두 가지 종류가 있는데, 일반 지층에는 [concept_dubois_paleontologist]를 파견해 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]를 수집할 수 있고 대규모 지층에서는 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]를 발견할 수 있습니다.\n#b 지층#!은 고생물학자가 따로 발견하거나, 고생물학 기술을 연구할 때 보유할 수 있습니다.\n #b 대규모 지층#!을 보유하지 못했다면 그것을 보유한 국가로부터 [concept_dubois_paleontological_licence]를 받아서 접근할 수 있습니다."
 concept_dubois_paleontological_expedition: "고생물학 탐사"
 concept_dubois_paleontological_expeditions: "고생물학 탐사"
 concept_dubois_paleontological_licence: "고생물학 탐사 허가"
 concept_dubois_paleontological_licences: "고생물학 탐사 허가"
 concept_dubois_paleontological_licence_desc: "[concept_dubois_formation]으로 접근할 수 없다면 #b 고생물학 탐사 허가#!를 받아 접근할 수 있습니다. 이 외교적 행동은 #b 대규모 지층#!으로 접근할 수 있게 만듭니다. 이를 사용하려면 당신은 열강이나 강대국이 되어야 하고, 상대국에는 #b 대규모 지층#!이 존재해야 합니다. 상대 국가에 수입의 소액을 건네야 하지만 그럴 만한 가치가 있을 것입니다."
 concept_dubois_mountain: "산"
 concept_dubois_mountains: "산"
 concept_dubois_mountain_desc: "세계 각지의 #b 산#!에 등정할 수 있습니다.\n\n#V 북아메리카#!\n#b 매킨리산#! (알래스카) - 6190미터\n#b 로건산#! (유콘 준주) - 5959미터\n#b 치틀랄테페틀#! (멕시코) - 5636미터\n#b 휘트니산#! (캘리포니아) - 4421미터\n\n#V 남아메리카:#!\n#b 아콩카과산#! (멘도사) - 6267미터\n#b 우아스카란#! (리마) - 6768미터\n#b 이이마니산#! (라파스) - 6438미터\n#b 침보라소산#! (에콰도르) - 6267미터\n\n#V 유럽:#!\n#b 시하라산#! (대캅카스) - 5642미터\n#b 두포우르슈피츠봉#! (스위스 서부), 4634미터\n#b 마테호른산#! (스위스 서부) - 4478미터\n#b 에기유베르트산#! (사보이) - 4122미터\n#b 아네토산#! (아라곤) - 3404미터\n\n#V 아프리카:#!\n#b 키보산#! (탕가니카) - 5895미터\n#b 케냐산#! (케냐) - 5199미터\n#b 스탠리산#! (우간다) - 5109미터\n#b 카메룬베르크산#! (남카메룬), 4095미터\n\n#V 아시아:#!\n#b 카메트산#! (델리) - 7756미터\n#b 초골리사산#! (카슈미르) - 7665미터\n#b 카브루산#! (히말라야) - 7412미터\n#b 카우프만봉#! (타지키스탄) - 7134미터\n\n#V 호주와 오세아니아:#!\n#b 빌헬름산#! (뉴 기니 동부), 4121미터\n#b 쿡산#! (남섬) - 3724미터"
 concept_elgar_music: "음악 문화"
 concept_elgar_opera: "오페라"
 concept_elgar_operas: "오페라"
 concept_elgar_opera_house: "오페라 극장"
 concept_elgar_opera_houses: "오페라 극장"
 concept_elgar_musical_tradition: "음악 전통"
 concept_elgar_impressionism: "인상주의"
 concept_elgar_expressionism: "표현주의"
 concept_elgar_art_nouveau: "아르누보"
 concept_elgar_architecture: "건축"
 concept_elgar_architectural_project: "건축 사업"
 concept_elgar_architectural_projects: "건축 사업"
 concept_lepsius_archaeology: "고고학"
 concept_lepsius_archaeology_desc: "#b 고고학#!은 [concept_morgenroete]를 대표하는 요소 중 하나입니다.\n\n 지도상에는 총 8개의 [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')]가 존재합니다.\n\n [concept_lepsius_expedition]를 보내려면 골동품 연구 기술을 연구하여야 하고, [concept_lepsius_archaeological_team]을 보유하며 발굴지 중 한 곳에 접근이 가능해야 합니다. 발굴지는 직접 그 지역을 소유하거나 그곳을 보유한 나라에 [concept_lepsius_excavation_licence]를 받으면 도달할 수 있습니다.\n\n이제 발굴지에 고고학 탐사를 보낼 차례입니다. 탐사단은 [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]을 발견하게 되며, 매우 희귀한 확률과 좋은 [concept_lepsius_archaeologist]의 도움으로 [concept_lepsius_major_artifact]을 발견할 수도 있습니다. \n\n 탐사단이 유물을 가지고 돌아오면 [concept_lepsius_museum]을 지을 수도 있습니다. 고고학 박물관에서는 당신이 모은 유물을 볼 수 있고, [concept_lepsius_exhibition]를 열고 #b #BLUE 고고학자#!#!를 찾아갈 수도 있습니다.\n\n 더 많은 유물과 전시를 확보하게 되면 획득하는 위신도 높아집니다.\n\n#b 인류학#!은 고고학의 또다른 한 분야입니다. [concept_lepsius_anthropologist]와 [concept_lepsius_cave]을 보유하고 있다면 [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils$')]을 발견하여 선사시대 인류를 복원할 수 있습니다. 각각의 유골을 확보할수록 인류학 명성도 더욱 높아집니다. 인류학 명성을 충분히 모았다면 조국의 위신을 높이는 변화 요인을 부여받게 됩니다."
 concept_lepsius_archaeologist: "#b #BLUE 고고학자#!#!"
 concept_lepsius_archaeologists: "#b #BLUE 고고학자#!#!"
 concept_lepsius_archaeologist_desc: "#b #BLUE 고고학자#!#!는 [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]를 보낼 수 있는 학자입니다. 그곳에서 [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]을 수집하게 됩니다. 간혹 [concept_lepsius_major_artifact]을 발견할 수도 있습니다. \n 고고학자는 임무를 수행하는 동안 매년 간접적으로 [concept_academics_experience]를 얻습니다. #b 경험치#!를 충분히 얻게 되면 고고학자 특성 레벨을 더 높일 수 있습니다."
 concept_lepsius_anthropologist: "#b #BLUE 인류학자#!#!"
 concept_lepsius_anthropologists: "#b #BLUE 인류학자#!#!"
 concept_lepsius_anthropologist_desc: "#b #BLUE 인류학자#!#!는 고생물학과 고고학 양측의 관점에서 선사 인류를 연구하는 학자입니다. [Concept('concept_lepsius_cave','$concept_lepsius_caves$')]에서 [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils$')]을 찾거나 이전까지 알려지지 않던 뼈를 식별해 냅니다. #b 인류 화석#! 3점을 모으면 유인원 종 하나를 복원할 수 있습니다. 뼈의 발견과 식별, 그리고 초창기 인류 종의 분류 작업은 인류학계의 명성을 가져다줍니다. 인류학자는 동굴 탐사 도중에 현지 유물을 발견하기도 합니다."
 concept_lepsius_museum: "고고학 박물관"
 concept_lepsius_museum_desc: "#b 고고학 박물관#!은 당신의 국가가 찾아낸 모든 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]을 전시하기 위해 짓는 건물입니다."
 concept_lepsius_excavation_site: "역사적 발굴지"
 concept_lepsius_excavation_sites: "역사적 발굴지"
 concept_lepsius_excavation_site_desc: "#b 역사적 발굴지#!는 여러 곳이 존재하며, 상이집트와 하이집트, 바빌로니아, 아시리아, 크레타, 아르골리스, 유카탄, 페루가 각 나라에 존재합니다. #b 발굴지#!마다 그 지역의 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]과 이벤트가 존재합니다."
 concept_lepsius_expedition: "고고학 탐사"
 concept_lepsius_expeditions: "고고학 탐사"
 concept_lepsius_expedition_desc: "#b 고고학 탐사#!는 [concept_lepsius_archaeologist]와 그 [concept_lepsius_archaeological_team]이 나서는 탐사입니다. 수 개월의 시간 동안 최대한 많은 [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]을 수집하게 됩니다. #b 탐사#!는 [Concept('concept_lepsius_major_artifact','$concept_lepsius_major_artifacts$')]을 얻을 수 있는 유일한 방법입니다.\n 초기 고고학을 연구하였다면 #b 탐사#!를 성공적으로 마친 다음 그 지역에 탐사단을 파견하여 [concept_lepsius_excavation]를 진행할 수 있습니다."
 concept_lepsius_archaeological_team: "발굴단"
 concept_lepsius_archaeological_teams: "발굴단"
 concept_lepsius_excavation_team: "탐사단"
 concept_lepsius_archaeological_team_desc: "[Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]를 수행하기 위해서는 하나 이상의 #b 고고학 발굴단#!이 필요합니다. #b 고고학 발굴단#!은 총 3팀까지 둘 수 있지만, 하나씩 추가할 때마다 더 높은 조건을 요구하게 됩니다.\n\n첫번째 #b 발굴단#!은 골동품 연구 기술을 연구하고, 3단계 이상의 대학과 문해율 33%를 보유해야 합니다.\n\n두번째 발굴단은 근대 고고학 기술을 연구하고, 15단계 이상의 대학과 문해율 66%를 보유해야 합니다.\n\n마지막 #b 발굴단#!은 골동품 연구 기술을 연구하고 경험 많은 [concept_lepsius_archaeologist]를 두고 있어야 합니다.\n\n#b 발굴단#!은 [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]와 [Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')]에 활용됩니다."
 concept_lepsius_excavation_licence: "탐사 허가"
 concept_lepsius_excavation_licences: "탐사 허가"
 concept_lepsius_excavation_licence_desc: "본인의 국가에 [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')]가 따로 없더라도 외교 행동으로서 #b 탐사 허가#!를 받아 접근할 수 있습니다.\n#b 탐사 허가#!를 취득하기 위해서는 최소 강대국에 도달해 있고 해당 지역에 [concept_active_interest]를 보유해야 합니다.\n#b 탐사 허가#!를 유지하기 위해 해당 국가에 소액의 보상을 지불하게 됩니다."
 concept_lepsius_artifact: "유물"
 concept_lepsius_artifacts: "유물"
 concept_lepsius_minor_artifact: "소형 유물"
 concept_lepsius_minor_artifacts: "소형 유물"
 concept_lepsius_oceanic_artifact: "오세아니아 유물"
 concept_lepsius_oceanic_artifacts: "오세아니아 유물"
 concept_lepsius_artifact_desc: "유물은 [Concept('concept_lepsius_archaeological_team','$concept_lepsius_archaeological_teams$')]에게 [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]와 [Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')]을 시키거나, [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')]를 떠나거나, 이벤트를 통해 얻을 수 있습니다.\n\n 보통은 소형 #b 유물#!을 얻게 되는데, 이 #b 유물#!자체로 [concept_lepsius_museum]의 [Concept('concept_lepsius_exhibition','$concept_lepsius_exhibitions$')]에 활용할 수 있습니다.\n\n한편 한번씩만 발견할 수 있고 고유의 이름을 갖고 있는 특별한 #b 유물#!을 [Concept('concept_lepsius_major_artifact','$concept_lepsius_major_artifacts$')]이라 부릅니다. 탐사와 발굴, 고고학계 발견을 통해 획득할 수 있습니다."
 concept_lepsius_major_artifact: "대표 유물"
 concept_lepsius_major_artifacts: "대표 유물"
 concept_lepsius_major_artifact_desc: "#b 대표 유물#!은 이름과 고유성을 지닌 특별한 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]을 말합니다.\n#b 대표 유물#!은 여러 방법을 통해 찾을 수 있습니다. [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]를 통해 찾아낼 수 있는 것도 있고, 발견할 때까지 [concept_lepsius_excavation]을 계속해야 손에 넣을 수 있는 것도 있습니다. 또 고고학계의 큰 발견을 해야만 획득할 수 있는 것도 존재합니다.\n#b 대표 유물#!을 국외로 불법 반출하는 것은 외교적 문제를 야기할 수 있으며, #b 대표 유물#!을 직접 소유하는 것보다 더욱 악영향을 끼칠 수 있습니다. 그런 한편으로 #b 대표 유물#!로 [Concept('concept_lepsius_exhibition','$concept_lepsius_excellent_exhibition$')]을 구성하여 엄청난 명성 보너스를 부여받을 수 있으며, [Concept('concept_academics_academic_mission','$concept_academics_academic_missions$')] 중에서도 필요로 할 수가 있습니다."
 concept_lepsius_exhibition: "전시"
 concept_lepsius_exhibitions: "전시"
 concept_lepsius_excellent_exhibition: "완벽한 전시"
 concept_lepsius_excavation: "발굴"
 concept_lepsius_excavations: "발굴"
 concept_lepsius_excavation_desc: "초기 고고학을 연구하고 [concept_lepsius_expedition]를 끝냈다면 [concept_lepsius_archaeological_team]을 현장에 남도록 결정하여 [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]을 계속해서 얻을 수 있습니다. 발굴단은 언제든지 #b 발굴#! 작업에서 불러들일 수 있습니다."
 concept_lepsius_human_fossil: "인류 화석"
 concept_lepsius_human_fossils: "인류 화석"
 concept_lepsius_human_fossils_fossils: "화석"
 concept_lepsius_human_bones: "인간 뼈"
 concept_lepsius_human_fossil_desc: "#b 인류 화석#!은 크로마뇽인, 네안데르탈인, 호모 에렉투스, 오스트랄로피테쿠스, 파란트로푸스의 다섯가지 종 가운데 하나에 속하게 됩니다. [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')]가 [Concept('concept_lepsius_cave','$concept_lepsius_caves$')]에서 발견할 수 있으며 보통은 곧바로 식별하고 분류할 수 있습니다. 그러나 고고학자나 고생물학자도 드물게 인류 화석을 발견할 수 있습니다. 이렇게 발견된 '미지의 인류 화석'은 #b #BLUE 인류학자#!#!만이 올바르게 식별할 수 있습니다. 뼈 3개를 모으면 하나의 종을 복원할 수 있으며 인류학계의 명성을 보상으로 얻습니다. 처음으로 초창기 인류를 분류하게 된다면 훨씬 더 많은 명성이 주어집니다. 인간 화석은 원하는 만큼 수차례 복원할 수 있습니다."
 concept_lepsius_cave: "동굴"
 concept_lepsius_caves: "동굴"
 concept_lepsius_cave_desc: "#b 선사시대 동굴#!은 초창기 인류나 선인류 종이 [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils_fossils$')]을, 더 진화한 부류라면 도구를 남겼을 수도 있는 장소입니다. 동굴은 [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')]가 발견하고 탐사할 수 있습니다. 일부 동굴은 역사적 이벤트로 해제됩니다. 각 동굴에는 오직 한 가지 종의 화석이 남겨져 있으며, 이는 곧 크로마뇽인과 네안데르탈인의 뼈가 절대로 같은 동굴에 있을 수 없다는 뜻이 됩니다. 동굴 중에는 실제 역사에 등장한 것도 있는가 하면, 나머지는 게임 시작 시 아프리카, 아시아, 유럽의 3대륙 중 하나에 불규칙하게 배정됩니다. 그 바탕에는 선인류의 분포 지역을 대략적으로 따르고 있는데, 이를테면 오스트랄로피테쿠스는 아프리카에서만 발견할 수 있을 것입니다."
 concept_verrier_astronomy: "천문학"
 concept_verrier_observatory: "천문대"
 concept_verrier_observatories: "천문대"
 concept_verrier_astronomer: "#b #ORANGE 천문학자#!#!"
 concept_verrier_astronomers: "#b #ORANGE 천문학자#!#!"
 concept_verrier_astronomical_object: "천체"
 concept_verrier_astronomical_objects: "천체"
 concept_verrier_astronomical_object_icon: "@verrier_astronomicalobject!"
 concept_verrier_celestial_body: "천체"
 concept_verrier_celestial_bodies: "천체"
 concept_verrier_comet: "대혜성"
 concept_verrier_comets: "대혜성"
 concept_verrier_comet_desc: "빅토리아 시대에는 대중의 큰 관심을 끌었던 #b 대혜성#!이 몇 차례 나타난 적이 있었습니다. [concept_verrier_astronomer]를 보유한다면 이러한 #b 대혜성#!을 처음으로 발견할 기회가 생기며, 명성과 연구 보너스를 받게 됩니다."
 concept_verrier_moon_photo: "월면 사진"
 concept_verrier_moon_photos: "월면 사진"
 concept_rapanui_christian_mission: "기독교 선교"
 concept_rapanui_christian_missions: "기독교 선교"
 concept_rapanui_christian_mission_desc: "오세아니아에 [Concept('concept_interest','$concept_interests$')]를 보유한 [Concept('concept_major_power','$concept_major_powers$')]이나 [Concept('concept_great_power','$concept_great_powers$')]은 그 지역의 분권화된 섬나라를 개종시킬 수 있으나, 당신의 나라가 너무 세속적이지 않고 '종교인' 이해 집단이 약세 상태에 있지 않아야 가능합니다.\n\n 개종 활동은 총 세가지 단계를 거칩니다. 선교사를 보내면 친절이나 무시, 즉각 처형 중 하나의 대우를 받게 됩니다. 선교 활동이 실패로 돌아가면 하느님의 말씀을 전파할 새로운 선교사를 찾기까지 수 년의 시간이 소요됩니다. 선교가 이루어지면 해마다 총 인구의 1%가 개종하게 됩니다. 개종 과정에 도움이 되거나 방해가 되는 이벤트가 발생할 수 있습니다.\n\n 두번째 단계는 원주민의 30%가 개종했을 떄 시작됩니다. 이때 선교 본부는 영구적인 기지로 바뀝니다. 원주민의 51%가 기독교를 믿으면 족장은 당신의 종교로 개종하고 [concept_protectorate]이 되어 스스로 당신의 지배 하에 두게 됩니다. 그로부터 수년 뒤 말라리아 예방 기술을 보유하고 있다면 그 지역들을 합병할 수도 있습니다.\n\n 세번째 단계에서는 일지를 통해 능동적으로 결단을 내릴 수 있습니다. 추가 선교사를 파견하여 선교 활동을 직접 강화하거나 무역을 시도할 수 있습니다. 희귀 [Concept('concept_lepsius_artifact','$concept_lepsius_oceanic_artifacts$')], [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')], 부유층의 삶의 질을 높여줄 진주를 구입할 수 있게 됩니다."
 concept_manzoni_literary_tradition: "문학 전통"
 concept_klimt_painters: "#PURPLE #b 화가#!#!"
 concept_klimt_painting_tradition: "화가 전통"
 concept_vikelas_sports: "체육"
 concept_vikelas_sports_desc: "#b 체육#!은 [concept_morgenroete]를 대표하는 요소 중 하나입니다.\n\n #b 단체 운동#!을 연구한 국가는 여러 체육 활동에 나설 수 있습니다. 가장 핵심적인 요소로는 [concept_vikelas_ioc]를 창설하여 [concept_vikelas_olympic_games] 조직을 개시할 수 있다는 점이 꼽힙니다. 올림픽 대회는 금메달을 획득하여 나라의 [concept_prestige]을 획득할 기회를 제공합니다."
 concept_vikelas_olympic_games: "올림픽 대회"
 concept_vikelas_olympic_games_desc: "[concept_vikelas_ioc]가 한번 창설되면 #b 올림픽 대회#!를 4년마다 개최할 수 있습니다. 각 주기마다 위원회에서 #b 개최국#!을 투표로 뽑습니다. 개최국은 큰 [concept_prestige] 부스트를 얻습니다.\n 올림픽 대회 기간 동안 선수들은 메달 획득을 놓고 경쟁하게 됩니다. 얼마나 많은 메달을 획득할지는 여러 요인이 작용합니다. 인구는 작은 영향을 미치고, [concept_sol]은 더 큰 영향을 끼치며, 일부 이벤트도 성공 가능성에 영향을 미치고, 위대한 [Concept('concept_general', '$concept_generals$')]과 위대한 [Concept('concept_admiral', '$concept_admirals$')]의 보유 여부도 마찬가지로 영향을 미칩니다. 여기에 #b 선수#! 특성을 보유한 인물과 도심의 #b 체육 시설#! 설정 여부도 작은 부스트를 줍니다.\n 이러한 요인들은 전체 금메달수 12개 가운데 우리나라가 몇 개나 획득할지에 영향을 끼치게 됩니다. 금메달을 획득할 때마다 [concept_prestige] 5를 부여받게 됩니다."
 concept_vikelas_ioc: "국제올림픽위원회"
 concept_vikelas_ioc_desc: "#V $vikelas_international_sports_tech$#!을 연구한 국가는 #b 국제올림픽위원회#!, 줄여서 #b IOC#!를 창설할 수 있습니다. 그 후 IOC는 [concept_vikelas_olympic_games]의 개최 준비에 나서게 됩니다. IOC의 회원국은 올림픽 대회에 참가할 수 있습니다.\nIOC의 핵심 회원국은 #b 이사국#!입니다. IOC를 창설한 국가는 #b 회장국#!이 되며 이사국을 동시에 영구히 겸하게 되지만, 나머지 이사국들은 4년에 한번씩 선출됩니다. 이사회는 열강 5개국, 유럽 2개국, 아시아 2개국, 아메리카 2개국, 아프리카 1개국, 오세아니아 1개국으로 구성됩니다.\n이사국의 주요 업무는 차기 대회 개최국을 선정하는 것입니다. 개최 후보국으로는 총 3개국이 지정됩니다 (이사회에 로비를 가하면 4개국이 될 수도 있습니다).\n그리스가 IOC를 창설했을 경우 올림픽 대회는 그리스에서만 개최되므로, 이사회가 개최국을 선정하지 않게 되어 그 중요도가 훨씬 떨어지게 됩니다."
 concept_lepsius_exhibition_desc: "동일 종류의 [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]을 충분히 소장하였다면 [concept_lepsius_museum]에서 전시를 자동으로(즉, 각 지역별 [concept_production_method]의 형태로) 준비하게 됩니다. 일반 유물의 경우 유물 10점 이상을 확보해야 첫 전시가 이루어집니다. 전시의 규모는 유물 수가 각각 25점 (중규모 전시), 50점 (대규모 전시), 100점 (완벽한 전시)에 도달할 때마다 늘어나게 됩니다. 완벽한 전시의 경우 [concept_lepsius_major_artifact] 1점이 추가로 필요합니다.\n\n현지 유물은 일반 전시와 대규모 전시로 제한되어 있어 전시의 유형 면에서 다양성이 떨어집니다. 일반 전시는 현지 유물 25점, 대규모 전시는 50점이 필요합니다."
 concept_vikelas_racer: "카레이서"
 concept_vikelas_racers: "카레이서"
 concept_vikelas_racer_desc: "카레이서는 [concept_vikelas_car_racing]에 참가하는 특수 [concept_character]입니다."
 concept_vikelas_car_racing: "카레이싱"
 concept_vikelas_car_racing_desc: "카레이싱은 [Concept('concept_vikelas_racer','$concept_vikelas_racers$')]가 트랙이나 일반 도로에서 서로 간의 경주에 나서는 체육 종목입니다."
 concept_lepsius_archaeological_exhibition: "고고학 전시"
 concept_elgar_opera_desc: "#b 오페라 극장#!은 한 나라의 음악적 구심점으로, 최고의 음악인들이 모여 대중들을 위한 연주에 나서는 곳입니다. \n#b 오페라 극장#!은 도심 단계가 최소 5단계에 이른 주에 개별적으로 건설할 수 있는 건물입니다. #b 오페라 극장#!에서는 음악을 생산하고 악기를 소비하게 됩니다. #b 오페라 극장#!의 단계가 높을수록 해마다 생산되는 [concept_elgar_musical_tradition]의 양도 늘어나게 됩니다.\n또한 #b 오페라 극장#!을 건설하면 극장을 방문하는 등의 몇 가지 선택권이 생기게 됩니다."
 concept_elgar_impressionism_desc: "#b Impressionism#!  is a style in art history that is characterized by the atmospheric depiction of fleeting snapshots of a scene. It emerged from a movement within painting in France in the second half of the 19th century. The term impressionism has also been applied to certain styles of music, literature, film and photography. While many Naturalists such as Heinrich Hart rejected music as a means of expressing a 'truth-seeking Actionism', the Impressionists often regarded the 'objectless dreaming ahead' to finely graduated colorful chords as a pleasure.\n\nIn the game, #b Impressionism#! is only unlockable with a journal entry that requires 1000 [concept_elgar_musical_tradition], an [concept_elgar_opera], powerful landowners, industrialists that are not powerful and an Intelligentsia with an approval of 5 above. If you choose #b Impressionism#!, you won't be able to unlock the other two branches.\n\nThe focus of #b Impressionism#! in the game is music. Therefore it will give you the biggest bonus to [concept_elgar_musical_tradition]."
 concept_elgar_expressionism_desc: "#b Expressionism#!  is a style in art. Its beginnings and forerunners can be found in the late 19th century. Like Impressionism, Symbolism and Fauvism, Expressionism is a movement against the tendencies of Naturalism. In Expressionism, the expressive level outweighs the aesthetic, appellative and factual level. The artist wants to represent his experience for the viewer. In contrast to musical impressionism, which depicts the perception of the external appearance of things, the expressionist art movements formulate the emotions of the human soul.\n\nIn the game, #b Expressionism#! is only unlockable with a journal entry that requires 1000 [concept_elgar_musical_tradition], an [concept_elgar_opera], a powerful intelligentsia or trade unions, landowners that are not powerful and either the Intelligentsia or the trade unions need an approval of 5 or above. If you choose #b Expressionism#!, you won't be able to unlock the other two branches.\n\nThe focus of #b Expressionism#! in the game would be literature, but it is not yet implemented."
 concept_elgar_art_nouveau_desc: "#b Art Nouveau#! is an Artstyle that developed from the #italic Arts and Crafts Movement#! and was inspired by natural forms. It often focused on dynamism and movement and used modern materials.\n\nIn the game, #b Art Nouveau#! is only unlockable with a journal entry that requires 1000 [concept_elgar_musical_tradition], an [concept_elgar_opera], powerful industrialists and an Intelligentsia with an approval of 5 or above. If you choose #b Art Nouveau#!, you won't be able to unlock the other two branches.\n\nThe focus of #b Art Nouveau#! and #b Art Déco#!, the next technology in this branch, is Architecture. You will get various events and journal entries about architectural deeds and be able get a [concept_gaudi_architectural_splendour]."
 concept_elgar_composer: "#PURPLE #b 작곡가#!#!"
 concept_elgar_composers: "#PURPLE #b 작곡가#!#!"
 concept_elgar_composer_desc: "#b 작곡가#!는 음악을 작곡하는 인물입니다. 작곡가는 특수 인물 유형으로, 이벤트를 통해 획득하거나, [concept_artistic_progress]를 충분히 쌓아 국내에서 직접 배출하거나, [concept_elgar_travelling_composer]를 섭외하는 방식으로 획득합니다.\n #b 작곡가#!를 두게 되면 [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')], [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')] 작곡을 맡길 수 있습니다. 각각의 행동은 작곡가가 하는 일과 그 과정에서 필요한 것은 무엇인지, 그것으로 무엇을 얻는지에 따라 전부 다릅니다. #b 작곡가#!는 무엇이든 주어진 일감을 마치고 나면 [Concept('concept_elgar_composer_exhaustion','$concept_elgar_composer_exhaustion_exhausted$')] 상태가 되어 한동안 휴식을 취해야지만 다시 일할 수 있게 됩니다.\n #b 작곡가#!는 한평생 [concept_artists_experience]를 획득하게 되고 간혹 잃기도 합니다.  #b 명성#!이 높을 수록 #b 작곡가#!의 행동으로 얻게 되는 이익도 커지게 됩니다. #b 명성#! 500에 도달한 #b 작곡가#!는 [Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')]가 되어, 세계적으로 알려진 음악의 거장으로 거듭나게 됩니다."
 concept_elgar_great_composer: "#PURPLE #b 위대한 작곡가#!#!"
 concept_elgar_great_composers: "#PURPLE #b 위대한 작곡가#!#!"
 concept_elgar_great_composer_desc: "#b 위대한 작곡가#!는 음악계의 거장을 말합니다. 이들의 이름은 후세에 길이 남게 될 것입니다. [Concept('concept_elgar_composer','$concept_elgar_composers$')]가 [concept_artists_experience] 500에 도달하면 #b 위대한 작곡가#!가 됩니다. 이렇게 되면 효율성이 상당히 늘어나게 되고, 나라에는 더 많은 [concept_elgar_musical_tradition]이 주어지게 됩니다. 일례로 #b 위대한 작곡가#!는 [concept_elgar_musical_masterwork]을 더 빨리 작곡할 수 있게 됩니다."
 concept_elgar_travelling_composer: "방랑 작곡가"
 concept_elgar_travelling_composers: "방랑 작곡가"
 concept_elgar_travelling_composer_desc: "#b 방랑 작곡가#!는 어느 국가에도 소속되지 않고 순회 공연으로 각국을 떠도는 [Concept('concept_elgar_composer','$concept_elgar_composers$')]를 말합니다. #b 방랑 작곡가#!는 영입할 수 있지만 보유중인 [concept_artists_experience]가 많을수록 요구 조건도 더 커지게 됩니다.\n #b 방랑 작곡가#!를 초빙하려면 최소 하나 이상의 [Concept('concept_elgar_opera','$concept_elgar_opera_house$')]을 보유해야 합니다. #b 명성#!을 많이 확보한 #b 작곡가#!일수록 더 큰 규모의 오페라 극장과 최신 음악 [Concept('concept_technology', '$concept_technologies$')], 일정량의 [concept_elgar_musical_tradition]을 요구할 것이며 일부 작곡가는 [Concept('concept_major_power', '$concept_major_power_short$')] 또는 [Concept('concept_great_power', '$concept_great_powers$')]인 경우에만 응할 수도 있습니다.\n 특이 사항으로 [Concept('concept_elgar_national_composer','$concept_elgar_national_composers$')]가 존재하는데, 본인과 동일하거나 매우 유사한 국가 정체성을 지닌 국가에서만 영입을 허락하는 작곡가에 해당됩니다."
 concept_elgar_national_composer: "국민 작곡가"
 concept_elgar_national_composers: "국민 작곡가"
 concept_elgar_national_composer_desc: "#b National Composers#! are [Concept('concept_elgar_composer','$concept_elgar_composers$')] who value their nation very much. They will not be able to be hired by other nations.\nWhether a #b National Composer#! is available to you or not is decided by their culture's [Concept('concept_cultural_trait','$concept_cultural_traits$')]. One of your primary cultures needs to share both a non-heritage #b Trait#! as well as a [concept_cultural_heritage_trait]. This means that a North German #b National Composer#! will be available to German Countries as well as Switzerland."
 concept_elgar_composing: "작곡"
 concept_elgar_composing_lower_case: "작곡"
 concept_elgar_composing_compose: "작곡"
 concept_elgar_composing_desc: "[concept_elgar_composer]가 #b 작곡#!을 하면 해마다 [concept_artists_experience] 5를 받고 나라의 [concept_elgar_musical_tradition]이 5만큼 추가됩니다. 추가로 해마다 일정 편수의 곡을 작곡하게 됩니다. 지휘자, 거장, 혁신가, 꼼꼼함 등의 특성을 보유한 #b 작곡가#!는 해마다 작곡하는 곡의 수가 한 편 더 추가됩니다. 작곡 편수는 추후 [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tour_tours$')]의 성공에도 결정적인 역할을 합니다. #b 작곡가#!는 일지 항목에서 취소가 이루어질 때까지 작곡을 계속하게 됩니다. #b 작곡가#!가 작곡을 하면 국가에 소량의 연간 유지비를 부과하게 됩니다."
 concept_elgar_conducting: "지휘"
 concept_elgar_conducting_lower_case: "지휘"
 concept_elgar_conducting_conduct: "지휘"
 concept_elgar_conducting_desc: "The [concept_elgar_composer] will focus on #b conducting#! for 24 months and organize a concert season. This will improve the music output of a random [concept_elgar_opera] for 5 to 10 years, give your nation a small boost to [concept_elgar_musical_tradition] and give your #b Composer#! a medium boost to his [concept_artists_experience]. If your #b Composer#! is not yet a Conductor, he can gain the [concept_character_trait] at the end of the season. You will have to pay the #b Composer#! while he is #b conducting#!."
 concept_elgar_musical_tour: "순회 공연"
 concept_elgar_musical_tours: "순회 공연"
 concept_elgar_musical_tour_tour: "투어"
 concept_elgar_musical_tour_tours: "투어"
 concept_elgar_musical_tour_desc: "[concept_elgar_composer]는 30일 동안 해외에서 #b 순회 공연#!에 나설 수 있습니다. #b 순회 공연#!은 #b 작곡가#!가 속한 국가의 [concept_prestige]을 높입니다. 또 #b 작곡가#!는 #b 투어#!가 마무리되는 시점에서 #b 작곡가#!의 작곡 횟수와 특성에 따라 [concept_artists_experience] 증가를 적용받습니다.\n 작곡 횟수가 20곡 미만인 #b 작곡가#!는 #b 투어#!에 나서지 않는 것이 좋으며, #b 내성적#! 특성을 가진 #b 작곡가#!는 #b 투어#!에 나설 수 없습니다."
 concept_elgar_musical_masterwork: "음악계 걸작"
 concept_elgar_musical_masterworks: "음악계 걸작"
 concept_elgar_musical_masterwork_masterwork: "걸작"
 concept_elgar_musical_masterwork_masterworks: "걸작"
 concept_elgar_musical_masterwork_of_music: "음악의 걸작"
 concept_elgar_musical_masterworks_of_music: "음악의 걸작"
 concept_elgar_musical_masterwork_desc: "[concept_elgar_composer]는 #b 걸작#! 작곡을 개시할 수 있으며 수년의 시간이 소요됩니다. #b 작곡가#!의 [concept_artists_experience]가 많을수록 작곡도 빨리 끝내게 됩니다. #b 걸작#!이 한번 탄생하면 #b 작곡가#!는 [concept_artists_experience] 50을 획득하며 나라에는 [concept_rank]에 따라 [concept_elgar_musical_tradition]을 150까지 획득하게 됩니다. \n#b 작곡가#!는 #b 걸작#!을 최대 3점까지 만들 수 있으며 작곡하는 동안 나라에서 금전적 지원을 해주어야 합니다."
 concept_elgar_composer_exhaustion: "작곡가 탈진"
 concept_elgar_composer_exhaustion_exhausted: "탈진한"
 concept_elgar_composer_exhaustion_desc: "[concept_elgar_composer]가 [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')] 작곡, [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')]을 마치고 나면 직무로 #b 탈진#!한 상태가 됩니다. #b 탈진한 작곡가#!는 일정 시간 동안 활동에 나설 수 없게 됩니다. #b 작곡가#!의 나이가 많을수록 #b 탈진 상태#!에서 벗어나는 시간도 길어집니다."
 concept_manzoni_writer: "#PURPLE #b 작가#!#!"
 concept_manzoni_writers: "#PURPLE #b 작가#!#!"
 concept_klimt_painter: "#PURPLE #b 화가#!#!"
 concept_pm_artists_academy_conservatory: "#b #PURPLE 음악원#!#!"
 concept_pm_artists_academy_conservatory_desc: "음악원은 예술 학교의 특화 분야를 음악에 둡니다. 음악원을 보유하면 [Concept('concept_elgar_composer','$concept_elgar_composers$')]를 후원할 수 있습니다. 생산 방식을 변경하면 해당 예술 학교에 #n 부정적인 산출량 변화 요인#!이 부여되고 [concept_artistic_progress]에 #n 부정적 영향#!을 끼칠 수 있습니다."
 concept_pm_artists_academy_salon: "#b #PURPLE 문학 살롱#!#!"
 concept_pm_artists_academy_salon_desc: "문학 살롱은 예술 학교의 특화 분야를 문학에 둡니다. 문학 살롱을 보유하면 [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]를 후원할 수 있습니다. 생산 방식을 변경하면 해당 예술 학교에 #n 부정적인 산출량 변화 요인#!이 부여되고 [concept_artistic_progress]에 #n 부정적 영향#!을 끼칠 수 있습니다."
 concept_pm_artists_academy_studio: "#b #PURPLE 화실#!#!"
 concept_pm_artists_academy_studio_desc: "화실은 예술 학교의 특화 분야를 회화에 둡니다. 화실을 보유하면 [Concept('concept_klimt_painter','$concept_klimt_painters$')]를 후원할 수 있습니다. 생산 방식을 변경하면 해당 예술 학교에 #n 부정적인 산출량 변화 요인#!이 부여되고 [concept_artistic_progress]에 #n 부정적 영향#!을 끼칠 수 있습니다."
 concept_pm_artists_academy_specialization: "예술 학교 특화"
 concept_pm_artists_academy_specialization_desc: "모든 예술 학교는 생산 방식을 변경하는 식으로 특화 분야를 교체할 수 있습니다.\n[concept_pm_artists_academy_conservatory]으로 설정된 예술 학교는 [Concept('concept_elgar_composer','$concept_elgar_composers$')]를 후원할 수 있습니다.\n[concept_pm_artists_academy_salon]으로 설정된 예술 학교는 [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]를 후원할 수 있습니다.\n[concept_pm_artists_academy_studio]로 설정된 예술 학교는 [Concept('concept_klimt_painter','$concept_klimt_painters$')]를 후원할 수 있습니다.\n특화 분야를 변경하면 건물과 [concept_artistic_progress]에 #n 단기간의 부정적 효과#!가 부여됩니다."
 concept_artists_artist: "예술가"
 concept_artists_artists: "예술가"
 concept_artistic_progress: "예술가 양성 진행도"
 concept_artistic_progress_desc: "#b 예술가 양성 진행도#!가 1000에 도달하면 새로운 [concept_artists_artist]를 얻을 수 있습니다. #b 예술가 양성 진행도#!를 모으기 위해서는 #b 예술 학교#!나 #b 오페라 극장#!을 보유하여야 합니다.\n #b 예술가 양성 진행도#!의 획득은 여러 요인에 좌우됩니다. 예컨대 [concept_literacy]이 높을수록 #b 예술가 양성 진행도#!도 빨라집니다. 예술 창의 예술가 양성 진행도 툴바에서 어떤 요인에 따라 점수를 얻게 되는지에 관한 세부 정보를 모두 확인할 수 있습니다."
 concept_artists_experience: "명성"
 concept_artists_experience_desc: "[concept_artists_artist]는 #b 명성#!을 보유하고 있습니다. 명성은 그 예술가가 얼마나 높이 평가받는지를 나타냅니다. 예술가는 적은 수의 명성을 보유한 채로 시작하며 자기 분야에서 활동할 수록 명성을 추가로 얻게 됩니다. 명성 500을 획득한 예술가는 #b 위대한 예술가#!가 되어 그에 상응하는 [concept_character_trait]을 받게 됩니다."
 concept_manzoni_great_writer: "위대한 작가"
 concept_manzoni_local_writer: "지역 작가"
 concept_artists_center_of_arts: "예술의 중심지"
 concept_artists_centers_of_arts: "예술의 중심지"
 concept_artists_center_of_classicism: "고전주의의 중심지"
 concept_artists_center_of_romanticism: "낭만주의의 중심지"
 concept_artists_center_of_realism: "사실주의의 중심지"
 concept_artists_center_of_impressionism: "인상주의의 중심지"
 concept_artists_center_of_expressionism: "표현주의의 중심지"
 concept_artists_center_of_art_nouveau: "아르누보의 중심지"
 concept_klimt_great_painter: "#PURPLE #b 위대한 화가#!#!"
 concept_klimt_great_painters: "#PURPLE #b 위대한 화가#!#!"
 concept_klimt_great_painter_desc: "#b 위대한 화가#!는 영원히 기억될 [Concept('concept_klimt_painter','$concept_klimt_painters$')]입니다. #b 화가#!가 500 [concept_artists_experience]에 도달하면 #b 위대한 화가#!가 됩니다. 이로써 화가의 효율성이 크게 향상되고 나라에서는 [concept_klimt_painting_tradition]을 더 많이 획득할 수 있게 됩니다."
 concept_klimt_independent_painter: "독립 화가"
 concept_klimt_independent_painters: "독립 화가"
 concept_klimt_painter_trip: "화가의 유학"
 concept_klimt_painter_trip_journeys: "유학"
 concept_elgar_music_desc: "#b Music Culture#! is one of the main features of [concept_morgenroete]. During the 19th and 20th Century, Music was important as a mean to entertain the populace and to show a nations greatness.\n\nTo access most of the Music content in #r Morgenröte#! you will need to build an [concept_elgar_opera]. The #b Opera#! will produce Music but needs Instruments to operate. Apart from producing #b Music #! for your populace to consume, #b Operas#! will slowly add [concept_elgar_musical_tradition] to your Country.\n\n#b Musical Tradition#! reflects a nation's musical achievements and traditions. The amount of #b Musical Tradition#! gives you a prestige bonus and allows you to choose a path for your nation's art to go forward. You can either go the route of [concept_elgar_impressionism], [concept_elgar_expressionism] or [concept_elgar_art_nouveau]. Each one of these Art Styles has another focus.\n\nA good way to gain even more #b Musical Tradition#! is by getting a [concept_elgar_composer]. A composer will be able to [Concept('concept_elgar_composing','$concept_elgar_composing_compose$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_conduct$')], go on [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')] and even create [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterworks_of_music$')]. These actions will either improve the #b Composer's#! [concept_artists_experience] or improve your nations #b Musical Tradition#!."
 concept_artists_center_of_arts_desc: "#b 예술의 중심지#!는 특정 [concept_artists_art_style]의 중심지로서 그 #b 예술 양식#!의 발상이 이루어지면 생겨나는 [concept_state_region]을 말합니다. 하나의 #b 예술 양식#!에는 #b 예술의 중심지#!가 하나만 존재할 수 있습니다.\n#b 예술의 중심지#!는 [Concept('concept_klimt_painter','$concept_klimt_painters$')]가 그곳의 #b 예술 양식#!을 배우기 위해 [concept_klimt_painter_trip]을 떠날 수 있다는 점에서 특히 중요합니다. 그것을 제외하더라도 #b 예술의 중심지#! 가운데서는 그 지역에서 벌어지는 고유 이벤트를 선사하는 곳도 존재합니다. 예를 들어 어떤 중심지에서는 [Concept('concept_klimt_art_prize','$concept_klimt_art_prizes$')]에 도전하여 우승을 노릴 수도 있습니다."
 concept_klimt_painting_culture: "회화 문화"
 concept_klimt_painting_culture_desc: "#b 회화 문화#!는 [concept_morgenroete]의 핵심 요소 중 하나입니다. 19세기와 20세기에는 회화가 급속도로 발전하여 새롭고 다채로운 [Concept('concept_artists_art_style','$concept_artists_art_styles$')]이 도래하면서 개인과 국가에 큰 발전을 불러일으켰습니다.\n\n#r 모르겐뢰테#!의 회화 콘텐츠를 즐기려면 그 대부분은 #b 예술 학교#!를 먼저 지어야 합니다. #b 예술 학교#!는 [concept_klimt_painting_tradition]을 모으고 신임 [Concept('concept_klimt_painter','$concept_klimt_painters$')]를 모집할 수 있게 해줍니다.\n\n#b 화가#!는 조국을 위해 회화 작품과 #b 걸작#!을 제작하며 상당한 양의 #b 회화 전통#!을 선사합니다. #b 화가#!들에게는 전공으로 삼을 수 있는 다채로운 [Concept('concept_artists_art_style','$concept_artists_art_styles$')]이 존재하므로, [concept_klimt_painter_trip]을 통해 #b 예술 양식#!을 추가로 배우게 할 수 있습니다. 40세를 넘긴 #b 화가#!는 자신이 배운 #b 예술 양식#! 중 하나를 특화 분야로 선택하여, 해당 #b 예술 양식#!으로 된 회화 작품 제작에 집중하게 될 것입니다."
 concept_artists_art_style: "예술 양식"
 concept_artists_art_styles: "예술 양식"
 concept_artists_art_style_style: "양식"
 concept_artists_art_style_desc: "#b 예술 양식#!은 예술의 특정한 중점 요소를 말합니다. #b 고전주의#!나 #b 낭만주의#!처럼 처음부터 존재하는 #b 예술 양식#!도 있습니다. 나머지 예술 양식, #b 사실주의#!, #b 비합리주의#!, [concept_elgar_impressionism], [concept_elgar_expressionism], [concept_elgar_art_nouveau]는 어떤 환경을 충족해야 나타나게 됩니다. 모든 #b 예술 양식#!은 그것이 시작된 [concept_state_region]에 [concept_artists_center_of_arts]를 두고 있습니다."
 concept_klimt_painter_desc: "#PURPLE #b 화가#!#!는 회화와 그 밖의 미술 작품을 제작하는 인물입니다. #b 화가#!는 특수 인물 유형으로, 이벤트를 통해 획득하거나, [concept_artistic_progress]를 충분히 쌓아 국내에서 직접 배출하거나, [concept_klimt_independent_painter]를 섭외하는 방식으로 획득합니다.\n#b 화가#!는 곧바로 그림 그리기를 시작하며 본인의 [Concept('concept_character_trait','$concept_character_traits$')]에 따라 해마다 일정 수의 그림을 제작하게 됩니다. 간혹 #b 걸작#!을 그려내어 더 많은 [concept_klimt_painting_tradition]을 부여하기도 합니다.\n#b 화가#!는 [Concept('concept_klimt_painter_trip','$concept_klimt_painter_trip_journeys$')]으로 다채로운 [Concept('concept_artists_art_style','$concept_artists_art_styles$')]을 습득할 수 있습니다. #b 화가#!는 40세가 되면 하나의 #b 예술 양식#!을 전공으로 삼게 되며, 해당 양식으로 된 #b 걸작#!을 그려낼 수 있습니다."
 concept_klimt_independent_painter_desc: "[Concept('concept_klimt_painter','$concept_klimt_painters$')] that are not hired by a country are #b Independent Painters#!. #b Independent Painters#! can be hired by countries that have a [Concept('concept_primary_cultures','$concept_primary_culture$')] that shares a [concept_cultural_trait] with the culture of the #b Painter#!.\n#b Independent Painters#! have various requirements for their host country. You will need #b Arts Academies#!, certain [Concept('concept_technology', '$concept_technologies$')] or [concept_klimt_painting_tradition] depending on the #b Painter's#! [concept_artists_experience]. Additionally you will have to pay them a sum of money that depends on their #b Renown#! as well as your country's financial capabilities."
 concept_klimt_painter_trip_desc: "A [concept_klimt_painter] can learn new [Concept('concept_artists_art_style','$concept_artists_art_styles$')] on an #b Educational Journey#! to one of the [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')].\nOn such a #b Trip#! a painter can gain positive and negative [Concept('concept_character_trait','$concept_character_traits$')] that will influence their work and the number of paintings they create. Each #b Center of Arts#! has slightly different events and will give the #b Painter#! a unique #b Trait#! at the end that can later become the #b Painter's#! Specialization."
 concept_klimt_art_prize: "예술상"
 concept_klimt_art_prizes: "예술상"
 concept_klimt_art_prize_desc: "From time to time, artistic competitions are held in which prizes are awarded - which promote an artist's reputation. Nations that have a [concept_artists_center_of_arts] for Irrationalism or [concept_elgar_impressionism] choose the best musicians in a competition that takes place every five years. The owners of an [concept_klimt_art_gallery] or a #b Center of Art of Realism#! come to host a painting competition that takes place every five years. The country from which the winners come also receives Music or Painting Tradition. A special form of art competition is the Biennale, which every two years awards a comprehensive art prize to the country that has the artists with the highest reputation, which increases all cultural tradition values."
 concept_klimt_art_gallery: "미술관"
 concept_klimt_art_gallery_desc: "#b 미술관#!은 국가의 수도에 설치되는 특수 건물로, #b 사실주의#!를 연구하는 시점에서 이용할 수 있습니다. 이 때 나라에 중점 분야를 지닌 [concept_klimt_painter]를 두고 있어야 건설이 가능합니다. 중점 분야를 지닌 #b 화가#!는 본인의 [Concept('concept_artists_art_style','$concept_artists_art_style_style$')]으로 된 소장품을 해제하게 되는데, 이는 다시 말해 낭만주의 양식에 중점을 둔 화가는 낭만주의 소장품을 해제하게 됩니다. 지금의 소장품을 훌륭한 소장품으로 발전시키기 위해서는 해당 양식의 걸작이 필요한데, 반드시 화가가 직접 그리거나 해외에서 구입해 들여와야 합니다."
 concept_manzoni_writer_novelist: "소설가"
 concept_manzoni_writer_desc: "A #b Writer#! is a special character that will write works of literature for your country. #b Writers#! usually start as [concept_manzoni_local_writer] and will write #b Publications#! and sometimes even [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')]. A #b Bestseller#! will grant the #b Writer#! a big amount of [concept_artists_experience] and [concept_manzoni_literary_tradition] to your country. There is a chance to write a #b Bestseller#! every year, depending on how close the #b Writer's#! [concept_manzoni_genre] is to the [concept_manzoni_popular_taste].\n\nA well known #b Writer#! whose [concept_interest_group] is happy enough, can become your [concept_manzoni_national_writer]. A #b National Writer#! can gain [Concept('concept_manzoni_book_licence','$concept_manzoni_book_licences$')] or create a Newspaper Novel. If a #b Writer#! gains 500 #b Reputation#! they can become a [concept_manzoni_great_writer] and provide your country with even more #b Literary Tradition#!.\n\nBe careful, if #b Writers#! are unhappy with the political situation in a country, they can decide to become [Concept('concept_agitator', '$concept_agitators$')] or interfere in the political discourse."
 concept_manzoni_great_writer_desc: "A #b Great Writer#! is a [concept_manzoni_writer] known all over the world. A #b Writer#! can becoma a #b Great Writer#! once their [concept_artists_experience] reaches #V 500#!. If your #b Great Writer#! is your [concept_manzoni_national_writer] you will get a bonus to your yearly [concept_manzoni_literary_tradition] gain."
 concept_manzoni_local_writer_desc: "Nearly every [concept_manzoni_writer] starts as a #b Local Writer#!. Every country can have a maximum of 3 #b Local Writers#! that will create #b Publications#!, grant you [concept_manzoni_literary_tradition] if their [concept_manzoni_genre] matches the [concept_manzoni_popular_taste] and gain [concept_artists_experience].\nA #b Local Writer#! with a #b Reputation#! of 150 and whose [concept_interest_group] is not unhappy, can become a countries [concept_manzoni_national_writer] which will grant you more #b Literary Tradition#! and other additional advantages.\nBe aware that #b Local Writers#! unhappy with the current political situation can start to interfere in the political discourse or even become an [concept_agitator]"
 concept_manzoni_national_writer: "국민 작가"
 concept_manzoni_national_writer_desc: "A #b National Writer#! is a type of [concept_manzoni_writer] that is considered to be the face of your countries literature. #b National Writers#! Grant you a minimum of 1 and up to 5 [concept_manzoni_literary_tradition].\nYou can gain a #b National Writer#! by appointing one of your [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')]. To be able to appoint one of your #b Local Writers#! they must have at least #V 150#! [concept_artists_experience] and their [concept_interest_group] must have a positive [concept_approval].\n"
 concept_manzoni_bestseller: "베스트셀러"
 concept_manzoni_bestsellers: "베스트셀러"
 concept_manzoni_bestseller_desc: "A #b Bestseller#! is a #b Publication#! by a [concept_manzoni_writer] that is selling very well, usually because the #b Writer's#! [concept_manzoni_genre] matches or is close to the current [concept_manzoni_popular_taste].\nEvery year there is a chance for a [concept_manzoni_national_writer] or [concept_manzoni_local_writer] to write a #b Bestseller#!. The first #b Bestseller#! will grant a big amount of [concept_manzoni_literary_tradition] and every #b Bestseller#! after the first one will grant the country a significant amount of #b Literary Tradition#!."
 concept_manzoni_genre: "장르"
 concept_manzoni_genres: "장르"
 concept_manzoni_genre_desc: "Every [Concept('concept_manzoni_writer','$concept_manzoni_writer_novelist$')] has a specific #b Genre#! for their writing. The #b Genre#! gets assigned when the #b Writer#! gets created and depends on many factors.\n#b Writers#! will gain more [concept_artists_experience] and write more [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')] when their #b Genre#! matches or is close to the [concept_manzoni_popular_taste] of the country."
 concept_manzoni_popular_taste: "대중적 취향"
 concept_manzoni_popular_taste_audience: "독자의 취향"
 concept_manzoni_popular_tastes_audience: "독자의 취향"
 concept_manzoni_popular_taste_desc: "Every nation's population has a #b Taste#! for a specific [concept_manzoni_genre]. About every 10 years this #b Taste#! will change depending on political, social and cultural changes in the country itself.\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] who have a #b Genre#! matching the #b Taste#! or close to it will gain more [concept_artists_experience] and write more [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')].\n\n#V Close Tastes:#!\n- #b $manzoni_taste_adventure_var_loc$#!: $manzoni_genre_science_fiction$, $manzoni_genre_juvenile$, $manzoni_genre_crime_mystery$\n- #b $manzoni_taste_crime_var_loc$#!: $manzoni_genre_science_fiction$, $manzoni_genre_adventure$, $manzoni_genre_romance$\n- #b $manzoni_taste_devotional_var_loc$#!: $manzoni_genre_juvenile$, $manzoni_genre_romance$, $manzoni_genre_adventure$\n- #b $manzoni_taste_juvenile_var_loc$#!: $manzoni_genre_adventure$, $manzoni_genre_devout$, $manzoni_genre_crime_mystery$\n- #b $manzoni_taste_literary_var_loc$#!: $manzoni_genre_social_critic$, $manzoni_genre_science_fiction$, $manzoni_genre_romance$\n- #b $manzoni_taste_romance_var_loc$#!: $manzoni_genre_devout$, $manzoni_genre_juvenile$, $manzoni_genre_literary_fiction$\n- #b $manzoni_taste_science_var_loc$#!: $manzoni_genre_adventure$, $manzoni_genre_social_critic$, $manzoni_genre_literary_fiction$\n- #b $manzoni_taste_social_var_loc$#!: $manzoni_genre_literary_fiction$, $manzoni_genre_juvenile$, $manzoni_genre_crime_mystery$"
 concept_manzoni_book_licence: "서적 출판 허가"
 concept_manzoni_book_licences: "서적 출판 허가"
 concept_manzoni_book_licence_desc: "Foreign publishers can get contracts with a [concept_manzoni_national_writer] and offer his books as translations in their own market. This happens when a writer meets the [Concept('concept_manzoni_popular_taste','$concept_manzoni_popular_tastes_audience$')] abroad. If an author gets at least five book licenses, his books are considered world literature. He can then go on a reading tour."
 concept_manzoni_local_writers: "지역 작가"
 concept_manzoni_library: "국립 도서관"
 concept_manzoni_library_desc: "Your #b National Library#! will automatically set up Book Collections (in form of a [concept_production_method]) if you have enough [concept_manzoni_publications]. The first Book Collection will be created for 1.000 or more publications. From there better Collections are possible with 2.500 (Tiny Book Collection), 5.000 (Small Book Collection), 10.000 (Medium Book Collection), 25.000 (Large Book Collection), 50.000 (Excellent Book Collection) and 100.000 (Great Book Collection)."
 concept_manzoni_publications: "출판물"
 concept_manzoni_publications_desc: "#b Publications#! include all newly published book titles, newspapers, essays and other similar written products in a nation. They are not consistent with @manzoni_prints! $manzoni_prints$ circulating as commodities. Publications can also appear independently of the publishing industry, for example through the in-house printing presses of government buildings or universities. Academics and private individuals also produce publications depending on their literacy level. However, the publishing industry accounts for the lion's share, and the decisive factor is whether a modern production method is used or not. A large number of publications is fundamental to the expansion of a [concept_manzoni_library]."
 concept_curtiss_tourism: "관광"
 concept_curtiss_tourism_desc: "Tourism provides a culturally superior nation with additional income. Unique monuments, museums and art galleries, archaeological sites, centers of art as well as high values in the various cultural traditions are factors that make a nation an attractive tourist destination. Laws that increase freedom of movement and economic activity also contribute to higher tourism income. The infrastructure also plays a crucial role - after all, remote places cannot be reached. An airport in particular revolutionizes tourism and provides a significant increase in revenue."
 concept_curtiss_private_airline: "민간 항공사"
 concept_mendelejew_chemist: "#b #ORANGE 화학자#!#!"
 concept_manzoni_literature: "문학 문화"
 concept_manzoni_literature_desc: "#b Literary Culture#!is one of the main features of [concept_morgenroete]. Print culture and newspaper culture in particular experienced significant upheavals in the 19th and 20th centuries. The mass of printed products and everyday use is represented by the printing industry. The cultural value of the literature produced is reflected in the [concept_manzoni_literary_tradition]. The latter depends largely on the [Concept('concept_manzoni_writer','$concept_manzoni_writers$')] of a country, and there are [Concept('concept_manzoni_local_writer','$concept_manzoni_national_writers$')] and [Concept('concept_manzoni_national_writer','$concept_manzoni_local_writers$')]. Whether they live in the shadows or become celebrated authors depends on the [concept_manzoni_popular_taste]."
 concept_morgenroete_desc: "#r 모르겐뢰테 - 정취의 여명#! (Morgenröte - Dawn of Flavor)은 빅토리아 3의 문화적, 과학적 면모를 넓히기 위해 제작된 모드입니다. 빅토리아 시대의 다양한 풍경을 담은 콘텐츠를 다음과 같이 선보이고 있습니다.\n\n#V Lepsius: #! [concept_lepsius_archaeology]\n#V Verrier:#! [concept_verrier_astronomy]\n#V Gaudi:#! [concept_elgar_architecture] & [concept_tesla_engineering]\n#V Dubois:#! [concept_dubois_natural_history]\n#V Mendelejew:#! [concept_mendelejew_chemistry]\n#V Elgar:#! [concept_elgar_music]\n#V Manzoni:#! [concept_manzoni_literature]\n#V Klimt:#! [concept_klimt_painting_culture]\n#V Curtiss:#! [concept_curtiss_aviation]\n#V Vikelas:#! [concept_vikelas_sports]"
 concept_agassiz_mineral: "광물"
 concept_agassiz_minerals: "광물"
 concept_agassiz_mineral_desc: "Minerals are all types of special types of rock that do not fall under the known resources used in industry. A nation receives a certain number of minerals annually once it has invented the #b Geology#! Technology. If a [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] is in the service of this nation, he can find additional minerals. Locations of minerals are characterized by state modifiers: mountains, deserts, arctic areas, raw material deposits (coal, iron and sulfur areas, for example) as well as geological [Concept('concept_dubois_formation','$concept_dubois_formations$')] and volcanoes. Deserts and arctic areas are considered to be poor in minerals, while great geological formations and volcanoes are considered to be particularly rich in minerals. A more valuable form of minerals are [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]."
 concept_agassiz_rare_mineral: "희귀 광물"
 concept_agassiz_rare_minerals: "희귀 광물"
 concept_agassiz_rare_mineral_desc: "[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] can find Rare Minerals on their expeditions, such as [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')], [concept_douglas_mountaineering] expeditions, [concept_agassiz_volcano] expeditions or during mineral prospecting. Unlike common [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')], they are only found in very limited quantities. Rare Minerals are used to build a mineral cabinet."
 concept_agassiz_geologist: "#b #GREEN 지질학자#!#!"
 concept_agassiz_geologists: "#b #GREEN 지질학자#!#!"
 concept_agassiz_geologist_desc: "#b #GREEN 지질학자#!#!는 주로 암석과 지구의 역사를 전공으로 연구하는 [Concept('concept_academics_academic','$concept_academics_academics$')]입니다. 이들은 [Concept('concept_lepsius_cave','$concept_lepsius_caves$')], [Concept('concept_dubois_formation','$concept_dubois_formations$')], [Concept('concept_curie_uranium','$concept_curie_uranium$')] 광맥의 위치를 밝혀내어 [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')], [Concept('concept_curie_physicist','$concept_curie_physicists$')]에게 없어서는 안 될 동료 학자로 활약합니다. 탐사 도중에는 [concept_mendelejew_chemist]가 [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]를 발견하거나 분리하는 데 쓰이는 [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]을 추가로 발견합니다. 희귀 원자재의 새로운 광맥을 찾아낼 수도 있습니다. 또한 화산학자로도 활동하여 현지 [Concept('concept_agassiz_volcano','$concept_agassiz_volcanoes$')]으로 탐사를 떠나 자세한 연구를 진행합니다. 지구의 내부 구조를 밝혀내기 위하여 [Concept('concept_tesla_engineer','$concept_tesla_engineers$')]와 함께 지진계를 비롯한 새로운 기계를 개발할 수도 있습니다. [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')]과 [concept_douglas_mountaineering] 원정에서도 지질학자들은 제 역할을 맡게 됩니다."
 concept_agassiz_volcano: "화산"
 concept_agassiz_volcanoes: "화산"
 concept_curie_physicist: "#b #ORANGE 물리학자#!#!"
 concept_curie_physicists: "#b #ORANGE 물리학자#!#!"
 concept_curie_physicist_desc: "#n 모르겐뢰테의 다음 버전을 기대해 주세요!#!"
 concept_curie_uranium: "우라늄"
 concept_curie_uranium_desc: "Uranium is an extremely rare material that can only be found in a few selected, historical provinces by [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]. Modern Physics must have been researched for this. At first glance, uranium is a secondary ore that is only used in ceramic production. However, it will be needed later, especially in the [concept_verrier_observatory]. Only if the best physical and chemical production methods are supplied with uranium they can fulfill their purpose, whether in the field of nuclear physics or in the research of previously unknown elements. Without uranium, all scientific activities in the field of radioactivity are simply impossible. It is therefore particularly interesting for [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] and [Concept('concept_curie_physicist','$concept_curie_physicists$')] in the final phase of Victoria 3."
 concept_mendelejew_chemistry: "화학"
 concept_mendelejew_chemistry_desc: "#b Chemistry#! is one of the main features of [concept_morgenroete]. Starting in the 18th Century, #b Chemistry#! rapidly developed into a modern science. Suddenly many new elements were discovered and chemical processes were invented. The 19th and 20th century saw even more discoveries in Chemistry, ranging from new elements to the invention of dynamite or the Haber-Bosch-Process.\n\nIn #b Morgenröte#! #b Chemistry#! will be conducted by [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] who will be able to focus on different tasks.\nOne focus is the improvement of your countries #b $building_chemical_plant$#!, #b $building_explosives_factory$#! or #b $building_synthetics_plant$#!, which will make those [Concept('concept_building', '$concept_buildings$')] more efficient.\nIf you are looking for a more prestigous task, you can let your #b Chemist#! theorize, discover or isolate [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]. Each Element will add a little bit of [concept_prestige] depending on whether you theoriized, discovered or isolated it.\nLater in the game the #b Chemist#! will also be able to invent #b Synthetic Oil#! and #b Synthetic Rubber#!. This will unlock the #b $building_mendelejew_hydrogenation_plants$#! or the #b $building_mendelejew_synthetic_rubber_factory$#!."
 concept_mendelejew_chemists: "#b #ORANGE 화학자#!#!"
 concept_mendelejew_chemist_desc: "#b #ORANGE 화학자#!#!는 [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]를 이론화하고, 발견하고, 분리하는 [Concept('concept_academics_academic','$concept_academics_academics$')]입니다.\n#b #ORANGE 화학자#!#!는 #b 원소#!를 연구하거나 학술회의에 참석하면 [concept_academics_experience]를 획득합니다. 비료와 폭약, 합성 화학 물질의 생산도 개선시킬 수 있습니다. 화학자는 주기율표나 합성 연료를 발명할 수도 있으며 석유가 부족한 국가에 소중한 존재가 될 수 있습니다. 또 매년 #b 경험치#!를 자동으로 획득하여, #b #ORANGE 화학자#!#!가 더 나은 화학자 특성을 보유할 수 있게 만듭니다. 임명 시나 특정 이벤트를 통해 특성화(이론가, 전문가, 조사관)를 선택할 수도 있습니다."
 concept_mendelejew_element: "화학 원소"
 concept_mendelejew_element_no_chemical: "원소"
 concept_mendelejew_elements: "화학 원소"
 concept_mendelejew_element_desc: "In ancient times it was common to believe that the world consisted of the four elements: fire, earth, water and air. With the beginning of the emancipation of chemistry from alchemy, the scientific analysis of the chemical elements came about. This process was far from complete in the 19th century.\n\n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] can continue this research by theorizing, discovering, and isolating elements one at a time. Only when isolated is an element considered fully recognized and given its name; previously it is just a number. The categorization of elements brings scientific progress and chemist [concept_academics_experience].\nNot all elements can be theorized, discovered and isolated from the start.\n The prerequisite is that the chemical laboratory in the [concept_verrier_observatory] has adequate equipment, in some cases also an Institute for Modern Physics. Many elements can only be properly researched with spectrography; towards the end of the game, a cyclotron may be necessary. [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] are necessary for the discovery and isolation of chemical elements. In addition to production methods, the chemist's experience and character traits play a decisive role in how long the research takes.\n\nResearched elements are a requirement for the development of the periodic table and the organization of the chemistry congress."
 concept_verrier_meteorite: "운석"
 concept_verrier_meteorites: "운석"
 concept_manzoni_national_writers: "국민 작가"
 concept_verrier_astronomy_desc: "#b Astronomy#! is one of the main features of [concept_morgenroete].\n\nTo gain access to #b Astronomy#! you need an [concept_verrier_observatory] or an [concept_verrier_astronomer].\n\nOnce you have an Observatory, you will passively discover [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')].\n\n If you have an [concept_verrier_astronomer] you will even be able to find new Planets, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] and take [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')].\nSometimes your [concept_agassiz_geologist] might also find [Concept('concept_verrier_meteorite','$concept_verrier_meteorites$')] which can be examined by #b Astronomers#! and [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')].\n\nEvery Astronomical discovery will grant you [concept_verrier_astronomical_prestige] which will be added to you [concept_prestige]. Check the $verrier_astronomical_prestige_modifier$ [concept_modifier] to see your #b Astronomical Prestige#!"
 concept_verrier_observatory_desc: "An #b Observatory#! is the backbone of a countries [concept_verrier_astronomy] and [concept_mendelejew_chemistry]. From there [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] can discover Planets, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] and take [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')].\nTo build an #b Observatory#!, you need to have a University and either the $verrier_astronomy_tech$ or $verrier_chemistry_tech$ [concept_technology] researched. Additionally an #b Observatory#! can only be built once and only in your capital."
 concept_verrier_astronomer_desc: "#b Astronomers#! are Academics that will explore the sky and discover [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] and [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')].\n#b Astronomers#! gain [concept_academics_experience] when they discover #b Astronomical Objects#! or attend Conferences. They get #b Experience#! passively as well each year. This allows #b Astronomers#! to get better astronomer traits.\n\nAn #b Astronomer#! can focus on discovering new #b Satellites#! or #b Taking Moon Photos#!. This will however reduce the amount of discovered #b Astronomical Objects#!"
 concept_verrier_astronomical_prestige: "천문학계 명예"
 concept_verrier_astronomical_prestige_desc: "#b Astronomical Prestige#! is the amount of [concept_prestige] you gain from Astronomy. Various factors influence your #b Astronomical Prestige#!:\n- Finding a new Planet will grant you between #V 15#! and #V 100#! Prestige depending on the difficulty to find it.\n- Each discovered [concept_verrier_satellite] will grant you 10 Prestige.\n- A completed [Concept('concept_verrier_moon_photo','$concept_verrier_moon_map$')] will grant you #V 25#! Prestige.\n- A great Comet will grant you 10 Prestige.\n- Every [concept_verrier_meteorite] will grant you #V 1#! Prestige.\n- Every #V 100#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] will grant you #V 1#! Prestige."
 concept_verrier_astronomical_object_desc: "#b Astronomical Objects#! are Asteroids and Stars that you discovered. Those Objects can be discovered if you have an [concept_verrier_observatory]. The better your Astronomy Technology is, the more Objects you will find. You will also discover more #b Objects#! if you have an [concept_verrier_astronomer].\nWith enough #b Astronomical Objects#! you will be able to discover new Planets or the Astro Physics Technology."
 concept_verrier_moon_map: "월면도"
 concept_verrier_moon_photo_desc: "[concept_verrier_observatory]를 보유한 상태에서 카메라 기술을 연구하였다면, [concept_verrier_astronomer]에게 달 표면의 촬영을 개시하라는 지시를 내릴 수 있습니다. 이 과정에서 #b 천문학자#!가 해마다 찾아내는 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]의 양은 감소하는 대신, 일정량의 #b 월면 사진#!을 획득하게 됩니다.\n#b 월면 사진#!을 충분히 모았다면, 지구의 동반자를 정확히 그려낸 지도를 제작할 수 있게 됩니다. 월면도 제작을 완수한 국가는 일정한 [concept_verrier_astronomical_prestige]을 얻게 됩니다."
 concept_verrier_satellite: "위성"
 concept_verrier_satellites: "위성"
 concept_verrier_satellite_desc: "#b 위성#!은 행성을 공전하는 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]입니다. #b 위성#! 가운데에는 지구의 달처럼 이미 발견된 것도 있지만, [concept_verrier_astronomer]로 하여금 추가로 찾아낼 수 있습니다.\n각 #b 위성#!을 발견할 때마다 소량의 [concept_verrier_astronomical_prestige]를 부여받게 됩니다."
 concept_verrier_meteorite_desc: "Meteorites are relatively small solid bodies of cosmic origin that have passed through the Earth's atmosphere and reached the ground. In rare cases, meteorite fragments can be found after a meteor shower. Meteorites that hit the earth thousands of years ago can also be found by [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] in difficult terrain such as deserts and arctic areas. [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] and [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] in particular are interested in meteorites and  might want to analyze them.\n\nAdditionally #b Meteorites#! help to raise your [concept_agassiz_geological_score] and allow for a better estimate of the [concept_agassiz_age_of_earth]."
 concept_agassiz_volcano_desc: "#b Volcanoes#! are a new state trait in #r Morgenröte#!. Unlike the base game for Victoria 3, it is not strategic regions but rather states with volcanoes that are tied to whether a volcanic eruption takes place. The volcanic activity is significantly greater, but it is not always destructive. In countries with volcanoes, a #b $building_agassiz_volcano_observatory$#! can be built, which not only helps to predict and mitigate eruptions through observations, but is also the starting point for a volcano expedition. [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] can acquire new [concept_agassiz_geological_knowledge], [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')], experience and the volcanologist trait on a volcano expedition."
 concept_agassiz_geological_knowledge: "지질학 지식"
 concept_agassiz_geological_knowledge_desc: "#b 지질학 지식#!에는 특정 국가의 지구 환경에 관한 전반적인 이해를 다룹니다. 매우 희귀한 자원으로서 주로 지질학계의 이정표를 세우는 과정에서 얻을 수 있습니다. #b 지질학 지식#!은 [concept_agassiz_geological_score]와는 다르지만 그것을 구성하는 가장 중요한 요소이며 특히나 가치 있는 요인으로 평가됩니다."
 concept_agassiz_geological_score: "지질학 점수"
 concept_agassiz_geological_score_desc: "#b 지질학 점수#!에는 지질학과 관련된 특정 국가의 업적이나 지식을 두루 포함합니다. 가장 중요한 요인은 [concept_agassiz_geological_knowledge]이지만 그 밖에도 중요한 요소들이 존재하는데, [concept_agassiz_geologist]의 경험치, [concept_agassiz_oceanographic_knowledge], [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]과 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')], [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]의 개수, 지질학 기술 등이 해당됩니다. 지질학 점수는 [concept_agassiz_age_of_earth]를 다시 측정하는 데에도 결정적으로 작용합니다."
 concept_agassiz_oceanographic_knowledge: "해양학 지식"
 concept_agassiz_oceanographic_knowledge_desc: "#b 해양학 지식#!은 [concept_agassiz_geological_knowledge]의 일부를 이루며, 특히 해류를 비롯한 해양 관련 지식 뿐만 아니라, 지구물리학적 고찰이 병행되는 일반해양 연구에도 부응합니다. #b 해양학 연구#!는 주로 [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')]에서 얻을 수 있습니다. [concept_agassiz_geological_knowledge]을 입수하려면 #b 해양학 연구#! 50이 필요합니다."
 concept_agassiz_age_of_earth: "지구의 나이"
 concept_agassiz_age_of_earth_desc: "One of the big questions of the 19th century was the question of the #b Age of the Earth#!. It had natural history implications, particularly regarding the validity of the theory of evolution and the sequence of geological events. Only a [concept_agassiz_geologist] can determine a new earth age. To do this, his nation must have a higher [concept_agassiz_geological_score] than the nation that last determined an Earth age. He will then share his research results with other colleagues. He doesn't necessarily have to be successful - geologists who are too young and inexperienced will not be heard. However, foreign nations are a little more accommodating when no new theory has been presented for many years. Geologists can only estimate the age of the Earth once in their lives - but this only applies if they are successful. If you fail, you can try again after a phase of motivation."
 concept_agassiz_geology: "지질학"
 concept_agassiz_geology_desc: "#b Geology#! is one of the main features of [concept_morgenroete]. Even before the beginning of the Victorian Age, geology had already experienced a significant boom, which is why it is available to many nations at the start of the game.\n\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] can be used in a variety of ways: they can find [Concept('concept_dubois_formation','$concept_dubois_formations$')], [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] and [concept_curie_uranium] deposits during a geological search, go on [concept_agassiz_volcano] expeditions, determine [concept_agassiz_age_of_earth], find new ore and oil deposits or go on [concept_dubois_pacific_expedition] and [concept_douglas_mountaineering] expeditions useful as scientific companions. A [concept_agassiz_geological_score] evaluates the overall knowledge of a nation and is crucial in determining the age of the earth. [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] and [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] are an essential part of geology; The latter can be used to establish a mineral cabinet in the [concept_dubois_zoo]. A special geological facility is the #b $building_agassiz_volcano_observatory$#!, which carries out volcanological and seismic studies."
 concept_theiler_biologist: "#b #GREEN 생물학자#!#!"
 concept_theiler_biologists: "#b #GREEN 생물학자#!#!"
 concept_theiler_biologist_desc: "생물학자는 생명의 모든 면모를 연구하는 [concept_academics_academic]입니다.\n[concept_morgenroete]에서 생물학자는 주로 [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]을 연구하고, 농업을 개량하고, [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')]와 [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]를 탐색할 책임을 맡습니다.\n 생물학자는 과제를 마무리하거나 자동으로 [concept_academics_experience]를 획득하게 됩니다."
 concept_gaudi_architect: "#b #PURPLE 건축가#!#!"
 concept_gaudi_architects: "#b #PURPLE 건축가#!#!"
 concept_academics_university_specialization_desc: "각 대학은 생산 방식을 변경함으로써 분야별 특화가 가능합니다.\n[concept_pm_academics_university_humanities]으로 설정된 대학은 국가의 연구 방향을 사회 기술로 설정하고 [Concept('concept_panum_physician','$concept_panum_physicians$')], [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')], [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')]에 한하여 모집할 수 있게 됩니다.\n[concept_pm_academics_university_natural_history]로 설정된 대학은 국가의 연구 방향을 사회 기술로 설정하고 [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')], [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')], [Concept('concept_theiler_biologist','$concept_theiler_biologists$')]에 한하여 모집할 수 있게 됩니다.\n[concept_pm_academics_university_mathematics]로 설정된 대학은 국가의 연구 방향을 생산과 군사 기술로 설정하고 [Concept('concept_tesla_engineer','$concept_tesla_engineers$')], [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')], [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]에 한하여 모집할 수 있게 됩니다.\n특화 분야를 변경하면 [concept_academics_academic_confusion]으로 이어져 대학과 [concept_academics_progress]에 #n 단기적인 부정적 영향#!을 줄 수 있습니다.\n특화 분야가 설정된 대학은 여러 과제에도 영향을 끼칩니다. 이를테면 $concept_pm_academics_university_mathematics$로 설정된 대학은 공학 사업에 보탬이 됩니다."
 concept_pm_academics_university_humanities_desc: "인문-인류학 중점은 대학의 특화 분야로서 사회 연구의 국가적 초점을 결정하고, [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')]와 [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')]를 모집하는 데 특화되어 있습니다. 현재 적용된 생산 방식을 변경하면 대학에 #n 부정적 산출량 변화 요인#!을, [concept_academics_progress]에 #n 부정적 효과#!를 얻게 됩니다.\n대학 특화 분야를 인문-인류학 중점으로 설정하면 탐사 성공 확률 보너스를 얻게 되며 (특화 대학 40단계로 최대 4점), 그 밖의 과제에서도 진행도를 늘려 주게 됩니다."
 concept_pm_academics_university_natural_history_desc: "자연사 중점은 대학의 특화 분야로서 사회 연구의 국가적 초점을 결정하고, [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')], [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')], [Concept('concept_dubois_biologist','$concept_dubois_biologists$')]를 모집하는 데 특화되어 있습니다. 현재 적용된 생산 방식을 변경하면 대학에 #n 부정적 산출량 변화 요인#!을, [concept_academics_progress]에 #n 부정적 효과#!를 얻게 됩니다.\n대학 특화 분야를 자연사 중점으로 설정하면 자연과학자들의 여러 과제에서 보너스가 부여됩니다."
 concept_pm_academics_university_mathematics_desc: "수학-기술 중점은 대학의 특화 분야로서 생산과 군사 연구의 국가적 초점을 결정하고, [Concept('concept_tesla_engineer','$concept_tesla_engineers$')], [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]를 모집하는 데 특화되어 있습니다. 현재 적용된 생산 방식을 변경하면 대학에 #n 부정적 산출량 변화 요인#!을, [concept_academics_progress]에 #n 부정적 효과#!를 얻게 됩니다.\n대학 특화 분야를 수학-기술 중점으로 설정하면 [Concept('concept_tesla_engineer','$concept_tesla_engineers$')]와 [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]의 여러 과제에 보너스를 부여하게 됩니다."
 concept_panum_physician: "#b #BLUE 의사#!#!"
 concept_panum_physicians: "#b #BLUE 의사#!#!"
 concept_panum_physician_desc: "#b #BLUE 의사#!#!는 [concept_panum_medicine] 분야에서 활동하고 연구하는 [Concept('concept_academics_academic','$concept_academics_academics$')]입니다. 이들의 주 업무는 [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')], [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] 발견입니다. 의학 연구를 증진시키고, 보건 환경을 개선하며, 다른 인물들을 치료할 수도 있습니다.\n의사는 업무 과정에서, 그리고 해마다 자동으로 [concept_academics_experience]를 획득합니다. #b 경험치#!를 충분히 획득하면 더 좋은 단계의 의사 특성을 확보하게 됩니다."
 concept_panum_medicine: "의학"
 concept_panum_medicine_desc: "빅토리아 3 [concept_morgenroete] 모드에서 의학은 가장 큰 확장 기능에 해당됩니다. 그 중에서도 중점을 두고 있는 것은 콜레라, 결핵, 발진티푸스와 같은 유행성 [Concept('concept_panum_disease','$concept_panum_diseases$')]인데, 이들 질병은 수 세기 동안 인류를 괴롭혀 왔으며 마침내 과학의 발전으로 통제가 가능해졌습니다. 따라서 유행성 질병이란 [concept_morgenroete]에서 소개하는 부정적 이벤트 중 하나인 것입니다. 또한 [concept_panum_disease_treatment]을 찾아 질병을 억제하는 것이 훨씬 더 중요합니다. 그렇기에 의학의 핵심 요소는 인문-인류학 대학 특화 분야에서 활동하는 학자 중 하나인 [concept_panum_physician]가 되겠습니다. 의사는 유행성 질병을 기록하고 치료법을 찾습니다. 치료법은 일반적으로 [concept_panum_disease_description]와 특정 기술을 필요로 합니다. 의사는 의학 기술 연구를 향상시키거나 병원을 통해 보건 환경을 확대시키고, 새로운 의료 기술을 도입하거나 다른 인물을 치료할 수도 있습니다. 의학 학술회의는 의학 지식을 국제적으로 전파하는 데 도움이 됩니다. 의학 현대화의 중요한 단계로 미아스마 이론에서 [concept_panum_germ_theory]으로의 전환도 있습니다. 의학적 발견의 선두 국가는 높은 [concept_panum_medical_prestige]을 자랑하게 됩니다."
 concept_panum_disease: "질병"
 concept_panum_diseases: "질병"
 concept_panum_disease_desc: "The term disease usually refers to the epidemic diseases that can affect a nation every few years. A [concept_panum_physician] can counteract them by making [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] and providing [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] Epidemic diseases usually do not occur at the same time and it takes some time for epidemic diseases to break out again. Depending on the type, epidemic diseases can have a devastating effect and spread across several states. There are various [concept_panum_disease_prevention] methods to delay the onset of such a disease or to mitigate its effects. The triggers for an illness can be very different. Yellow fever only occurs in tropical regions and cholera and tuberculosis require a minimum of urbanization to have an effect. A state's standard of living and level of devestation also play a role.\n\nIn addition to these particularly feared epidemic diseases, there are also everyday diseases that a physician can randomly examine during medical research. Such diseases include rickets, pellagra and syphilis."
 concept_panum_disease_description: "질병 기록"
 concept_panum_disease_descriptions: "질병 기록"
 concept_panum_disease_description_desc: "질병 기록(기술)은 [concept_panum_disease]을 이해하기 위한 첫걸음에 해당됩니다. 유행병의 심각성에는 별다른 영향을 미치지 못하지만, [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')]과 [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')], [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]을 찾는 과정의 근간이 됩니다. 질병을 기록하는 데에는 추가적인 조건이 존재하진 않으며, 오로지 전염성 질병과 [concept_panum_physician]만 필요합니다."
 concept_panum_disease_treatment: "질병 치료"
 concept_panum_disease_treatments: "질병 치료"
 concept_panum_disease_treatment_desc: "A [concept_panum_physician], given the right technology and a [concept_panum_disease_description], can find a treatment for a [concept_panum_disease] in a lengthy process. Treatments are not the same as a cure. Rather, the doctor finds out the cause of an illness and develops methods on this basis to prevent or significantly limit an outbreak. Disease treatments limit the length of an epidemic disease to a few months or weeks and also prevent it from spreading to several states. Disease treatments are part of possible [concept_panum_disease_prevention] against epidemic outbreaks."
 concept_panum_disease_prevention: "질병 예방"
 concept_panum_disease_prevention_no_disease: "예방"
 concept_panum_disease_prevention_desc: "There are several ways to avoid or at least mitigate an epidemic [concept_panum_disease]. The most well-known method is the [concept_panum_disease_treatment] developed by a [concept_panum_physician]. It significantly reduces the time in which a disease rages and also reduces the likelihood that it will spread to another country. Standard of living, hospitals, technologies and a high level of healthcare institutions also have an impact. The ultimate prevention is a [concept_theiler_vaccine] that prevents a disease from occurring in the first place. Vaccines are developed by [Concept('concept_theiler_biologist','$concept_theiler_biologists$')]. However, it is only effective if the health institution has at least reached the level specified in the medical faculty. After all, the distribution of a vaccine has to be organized and supervised."
 concept_panum_disease_type: "질병 유형"
 concept_panum_disease_types: "질병 유형"
 concept_panum_disease_type_desc: "전염성 [Concept('concept_panum_disease','$concept_panum_diseases$')]은 확산 정도에 따라 구분이 가능합니다. #V 지역 질병#!은 발병한 주에만 국한되는 질병으로 성홍열이 그 예시입니다. #V 권역 질병#!은 인근 주로 확산될 수는 있지만 그 이상으로 퍼지지 않는 질병으로 결핵이 그 예시입니다. #V 초권역 질병#!은 각 주가 서로 인접하지 않더라도 전국에 걸쳐서 확산될 수 있는 질병으로, 제일 악명 높은 예시로는 콜레라가 있습니다."
 concept_panum_local_disease: "지역 질병"
 concept_panum_local_diseases: "지역 질병"
 concept_panum_regional_disease: "권역 질병"
 concept_panum_regional_diseases: "권역 질병"
 concept_panum_transregional_disease: "초권역 질병"
 concept_panum_transregional_diseases: "초권역 질병"
 concept_panum_germ_theory: "매균설"
 concept_panum_germ_theory_desc: "매균설은 19세기 의학의 근간을 이룬 과학적 진전으로 꼽힙니다. 예로부터 [Concept('concept_panum_disease','$concept_panum_diseases$')]의 원인을 설명하기 위한 시도가 이어졌고 그 가운데 '미아즈마설(장기설)'이 대표 학설로 당대 유럽에 널리 퍼져 있었으나, 이러한 구식 이론들을 매균설이 대체하게 된 것입니다. 매균설은 그것을 처음으로 발견한 국가만 이익을 보는 것은 아닙니다. [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')]을 찾는 과정에서 매균설은 부정적 결과를 차단하고 긍정적인 결과를 더 많이 이끌어낸다는 점에서 성공 확률을 높여주게 됩니다."
 concept_panum_medical_prestige: "의학계 명예"
 concept_panum_medical_prestige_desc: "Medical Prestige is made up of the [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] (2 points), [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] (4 points), [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] (3 points) and [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] (4 points) discovered so far. First discoveries give twice as many points. Further medical prestige can come from curing everyday illnesses, inventing special healing methods, or generally improving the healthcare system via a [concept_panum_physician]."
 concept_theiler_pathogen: "병원체"
 concept_theiler_pathogens: "병원체"
 concept_theiler_pathogen_desc: "병원체는 [concept_panum_disease]을 유발하는 어떤 실체를 가리키는 말입니다. 그 정체는 특정 유기체에서 [concept_theiler_microorganism]까지 모든 것이 해당될 수 있지만, 박테리아나 기생충, 바이러스인 경우가 흔합니다.\n생물학자는 미생물을 충분히 모아 활용할 수 있다면 질병의 원인으로 작용하는 병원체의 탐색에 나설 수 있습니다. 이것으로 질병 예방과 [concept_theiler_vaccine]의 개발 및 생산에 도움이 됩니다."
 concept_theiler_vaccine: "백신"
 concept_theiler_vaccines: "백신"
 concept_theiler_vaccine_desc: "백신의 개발로 인류는 [Concept('concept_panum_disease','$concept_panum_diseases$')]에 감염되지 않고도 면역력을 얻을 수 있게 되어 수백만 명의 생명을 구할 수 있게 됩니다.\n백신을 개발하려면 우선 [concept_theiler_biologist]가 질병의 원인이 되는 [concept_theiler_pathogen]를 찾아내야 합니다. 그런 뒤 사용 가능한 [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]의 양이 충분하다면 백신 개발을 시작할 수 있습니다."
 concept_panum_red_cross: "적십자"
 concept_panum_red_cross_desc: "적십자는 최초의 국제 기구 중 하나로, 드물지만 전시에 적십자 의료진의 지원을 받을 수 있는 기회를 제공합니다. 적십자의 가입국은 특정 보너스도 얻게 됩니다. 게임 규칙에 따라 적십자는 실제 역사에 따라서, 또는 유동적으로 설립할 수 있으며, 승인국의 경우 특정 기술 조건을 충족하면 가입이 가능합니다. 창설국은 수도에 적십자 본부를 두게 됩니다. 가입국은 국제법상 구속력을 갖는 [Concept('concept_panum_convention','$concept_panum_conventions$')]을 최대 3차에 걸쳐 서명할 수 있습니다."
 concept_panum_convention: "국제 협약"
 concept_panum_conventions: "국제 협약"
 concept_panum_convention_desc: "국제 협약은 국제 교섭을 통해 게임 내에 특정 규칙을 수립하기 위한 국가 간의 공동 선언입니다. 19세기에는 제네바 협약이나 헤이그 육상전 수칙 등 여러 사례가 존재하였습니다. 모든 협약의 공통점은 전쟁의 참혹함을 누그러뜨리려는 것이었습니다. 이에 따라 군사적 선택보다는 부상자를 안전히 치료하는 것이 우선시되고, 최후의 수단으로 무기 사용을 금지하여 전쟁 확산을 어느 정도 억제하는 효과를 가져옵니다. 이러한 협약의 장점은 유연성을 확대한다는 것입니다. 협약을 채택하면 우호적인 평가를 불러오지만 파기하면 국제적인 분노를 초래할 수 있습니다.\n\n 국제 협약은 일반적으로 구속력이 없는 선언입니다. 다만 일정 수의 [concept_panum_red_cross] 가입국이 서명한다면 시간이 지나면서 유효한 국제법이 되며, 모든 서명국은 이를 준수해야 합니다. 이와 더불어 다른 가입국들도 서명에 나서게 됩니다. 이는 전체 가입국의 65% 이상, 강대국의 과반수가 협약에 동의하면 발생하게 되며, 그 이후에는 모든 가입국이 준수해야 합니다. 이 시점에서 더 이상 통상적인 방법으로 협약을 파기할 수 없으며, 구속력 있는 협약을 피하려면 적십자에서 완전히 탈퇴하고 모든 결과를 감수해야 합니다."
 concept_manzoni_literary_tradition_desc: "#b 문학 전통#!은 한 국가의 문학적 성과와 전통을 나타냅니다.\n#b 문학 전통#!을 획득하는 데에는 여러 가지 방법이 있습니다. 최소 하나 이상의 $building_art_academy$를 보유하거나, 한 명 이상의 [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')]와 [concept_manzoni_national_writer]를 보유하거나, [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')]를 보유하면 당신의 국가에서 #b 문학 전통#!을 자동으로 획득하게 됩니다.\n국가가 획득하는 #b 문학 전통#!이 많아질수록 획득하는 위신 보너스도 높아집니다. 여기에 [concept_elgar_expressionism] [concept_artists_art_style]을 해제할 수 있습니다."
 concept_elgar_musical_tradition_desc: "#b 음악 전통#!은 한 국가의 음악적 성과와 전통을 나타냅니다.\n#b 음악 전통#!을 획득하는 데에는 여러 가지 방법이 있습니다. 최소 하나 이상의 [concept_elgar_opera]을 보유하면 당신의 국가에서 #b 음악 전통#!을 자동으로 획득하게 됩니다. #b 오페라 극장#!의 수와 규모가 커질수록 획득하는 양도 늘게 됩니다. 음악과 예술 관련 기술을 연구하여 #b 음악 전통#!을 추가로 획득할 수도 있습니다. 각 기술마다 전혀 다른 보너스가 부여됩니다. [concept_elgar_composer]를 두고 있는 경우 이벤트를 통해서도 #b 음악 전통#!을 확보할 수 있습니다.\n국가가 획득하는 #b 음악 전통#!이 많아질수록 획득하는 위신 보너스도 높아집니다. 여기에 [concept_elgar_impressionism] [concept_artists_art_style]을 해제할 수 있습니다."
 concept_klimt_painting_tradition_desc: "#b 회화 전통#!은 한 국가의 회화적 성과와 전통을 나타냅니다. #b 예술 학교#!나 [concept_klimt_painter]를 보유했거나, 특정 [Concept('concept_technology', '$concept_technologies$')]을 연구했거나, 이벤트를 통해서 획득할 수 있습니다.\n#b 회화 전통#!으로 [concept_elgar_art_nouveau] [concept_artists_art_style]을 해제할 수 있으며 #b 문화 전통#!을 산정하는 데에도 사용됩니다."
 concept_mendelejew_theorized_elements: "이론화된 원소"
 concept_mendelejew_discovered_elements: "발견된 원소"
 concept_mendelejew_isolated_elements: "분리된 원소"
 concept_panum_psycho_point: "심리치료 점수"
 concept_panum_psycho_points: "심리치료 점수"
 concept_panum_psycho_point_desc: "심리치료 점수는 한 국가의 심리학과 정신의학 분야에서 어디까지 진척되었는가를 나타내는 추상적인 점수에 해당됩니다. 기술 연구나 정신병원, #V 정신과의#! [concept_character_trait]을 지닌 [concept_panum_physician] 보유로 매달 생성됩니다. 또한 이벤트를 통해서도 획득이 가능합니다. 심리치료 점수가 높을수록 정신 질환을 앓는 인물을 치료할 확률이 높아집니다. 심리치료 단계가 올라갈수록 연구 보너스와 [concept_academics_progress]도 부여받게 됩니다. 대다수 심리학과에서는 심리치료 점수를 조건으로 내세웁니다."
 concept_vikelas_mechanic: "정비사"
 concept_vikelas_mechanic_desc: "-"
 concept_vikelas_mechanical_innovation: "기계 혁신"
 concept_vikelas_race_car: "경주용 차량"
 concept_vikelas_race_car_desc: "-"
 concept_vikelas_race_car_reliability: "경주용 차량 신뢰성"
 concept_vikelas_race_car_safety: "경주용 차량 안전성"
 concept_vikelas_race_car_speed: "경주용 차량 속력"
 concept_dubois_dinosaur_bone_no_dinosaur: "뼈"
 concept_dubois_dinosaur_bones_no_dinosaur: "뼈"
 concept_dubois_paleontological_expedition_desc: "[concept_dubois_paleontologist]를 [Concept('concept_dubois_formation','$concept_dubois_formations$')]으로 파견할 수 있습니다. 탐사에는 1년이 소요되며 성공 여부에 따라 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]과 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]를 획득하게 됩니다. 탐사를 마치고 따로 작업중이지 않은 [concept_dubois_paleontological_team]이 있다면 [concept_dubois_paleontological_excavation]을 설정하여 그 지역의 화석과 뼈를 지속적으로 획득할 수 있습니다.\n지층에 접근하는 가장 쉬운 방법은 해당 주를 장악하는 것입니다. 그러나 [Concept('concept_dubois_paleontological_licence','$concept_dubois_paleontological_licences$')]를 이용하면 평화적으로 접근이 가능합니다."
 concept_dubois_paleontological_team: "고생물학 발굴단"
 concept_dubois_paleontological_teams: "고생물학 발굴단"
 concept_dubois_paleontological_team_desc: "고생물학 발굴단은 [concept_dubois_paleontological_expedition]를 마친 뒤 [concept_dubois_paleontological_excavation]을 진행하는 데 사용됩니다. 이를 통해 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]과 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]를 지속적으로 획득할 수 있습니다."
 concept_dubois_paleontological_excavation: "고생물학 발굴"
 concept_dubois_paleontological_excavations: "고생물학 발굴"
 concept_dubois_paleontological_excavation_desc: "[concept_dubois_paleontological_expedition]를 마친 뒤 따로 작업중이지 않은 [concept_dubois_paleontological_team]을 두고 있다면 고생물학 발굴을 진행할 수 있습니다. 고생물학 발굴을 통해 발굴단은 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]과 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]를 지속적으로 손에 넣게 됩니다."
 concept_verrier_venus_transit: "금성 일면통과"
 concept_verrier_venus_transit_desc: "금성 일면통과는 달이 지구와 금성 사이를 통과하는 드문 현상을 말합니다. 19세기에는 1874년과 1882년 총 두 차례에 걸쳐서만 발생하였습니다. 금성 일면통과의 관측은 그 자체로 태양계의 크기를 가늠하고 천문 단위 (AU)의 규모를 더욱 정확하게 측정할 수 있다는 점에서 중대한 과학적 사건이었습니다. [concept_verrier_venus_transit_zone]에 속한 국가들은 자국에서 직접 관측이 가능하며, 다른 나라들은 탐사대를 파견해야 합니다. 관측의 성공 여부는 [concept_verrier_astronomer]의 경험치, [concept_tesla_engineer]의 지원, 그리고 약간의 운에 달려 있습니다. 이는 날씨 때문에 양호한 관측 환경이 아니게 될 수 있기 때문입니다. 관측 결과가 좋을수록 더 큰 성과를 거둘 수 있습니다."
 concept_verrier_venus_transit_zone: "금성 일면통과 관측 지역"
 concept_verrier_venus_transit_zone_desc: "금성 일면통과 관측 지역은 금성의 일면통과가 (일부가 아닌) 완전히 이루어지는 모습을 관측할 수 있는 지구상의 지역들을 말합니다. 1873년에는 동아시아-태평양 지역, 1882년에는 아메리카 대륙 전역에 집중적으로 걸쳐 있었습니다. 관측이 가능한 전략 지역의 새부 내역은 아래와 같습니다.\n\n#V 1874년 금성 일면통과:#!\n인도네시아, 인도차이나, 오세아니아, 남중국, 북중국, 만주, 일본, 중앙 인도, 마드라스, 벵골, 히말라야, 인도양 일대 영토의 주\n\n#V 1882년 금성 일면통과:#!\n 브라질, 라플라타, 안데스, 그란 콜롬비아, 멕시코, 중앙 아메리카, 카리브해, 미드웨스트, 딕시, 뉴잉글랜드, 온타리오와 퀘벡 주"
 concept_vikelas_coach: "감독"
 concept_vikelas_coaches: "감독"
 concept_vikelas_coach_desc: "감독은 나라를 대표하여 국가 체육 종목 (국기, 國技)의 훈련을 맡는 사람입니다. 국기의 종류에는 [concept_vikelas_football], 야구, 농구, 크리켓이 있습니다. 감독은 각 대회에 나서는 대표팀에 보너스를 부여하게 되며, 대회로는 국제 세계 선수권 대회나 국가 간 경기가 존재합니다. 후자의 경우 정기적으로 비공개로 진행되며 승리할 떄마다 감독의 경험치가 늘어납니다. 높은 경험치와 긍정적인 [Concept('concept_character_trait','$concept_character_traits$')]은 세계 선수권 대회에서 승리할 기회를 늘리게 됩니다. 야심이나 카리스마 같은 긍정적인 특성은 선수들에게 동기를 부여하고, 무자비함이나 잔인함처럼 의욕을 꺾는 특성은 경기에서 승리할 기회를 낮춥니다.\n\n#R 참고: 현재는 축구만 구현되어 있습니다.#!"
 concept_vikelas_football: "축구"
 concept_vikelas_football_desc: "축구는 국기(國技) 종목의 하나입니다. 최초의 축구 클럽은 유럽과 남아메리카 등지에서 창설할 수 있으며 비교적 자유로운 법률 체계, 탄탄한 소시민 계층, 상당 수준의 평균 생활 수준이 요구됩니다. 이들을 갖추게 되면 간헐적인 축구 경기가 열릴 수 있습니다. FIFA를 설립하면 국가 간 경기와 월드컵 대회도 치를 수 있습니다. 세계 랭킹 8위 내에 드는 팀은 자동으로 월드컵 본선에 진출합니다. 각 나라의 팀은 '국가 축구팀 평가값' (NFTV)에 따라 평가가 이루어지는데, 이는 생활 수준(국민의 건강 상태), 소시민 계층의 영향력(클럽 조직), 문해력(전술), 전통(축구의 국기 채택 여부) 등의 매개변수를 종합하여 산출됩니다. 경기에서는 평가값 뿐만 아니라 [concept_vikelas_coach]의 특성과 경험치 또한 고려됩니다."
 concept_gaudi_architectural_splendour: "장엄한 건축"
 concept_gaudi_architectural_splendour_desc: "장엄한 건축은 20세기 초에 등장한 아르데코, 바우하우스, 신고전주의 등 근대 건축의 눈부신 발전을 아우르는 용어입니다. 장엄한 건축은 시대에 뒤떨어진 외관을 미래지향적인 건축으로 전환시킨 정도를 나타냅니다. 아르데코의 경우 아르데코 도시라는 이상을 충족하기 위해 높은 문턱을 넘어서야 하지만, 그것으로 얻는 이득 역시 훨씬 커지게 됩니다."
 concept_artists_artist_desc: "[concept_morgenroete]에서 #b 예술가#!는 이 모드 내 특정 기능들을 사용할 수 있게 해 주는 특수 인물입니다. #b 예술가#!는 일부 이벤트를 통해서나 [concept_artistic_progress]를 충분히 모으면 획득할 수 있습니다. 예술가는 본인의 특정 분야에서의 입지를 반영하는 [concept_artists_experience]를 지니고 있습니다.\n현재 #b 예술가#!의 유형은 다음과 같습니다.\n - [concept_elgar_composer]\n - [concept_klimt_painter]\n - [concept_manzoni_writer]\n - [concept_gaudi_architect]"
 concept_elgar_architecture_desc: "Architecture is one of the core concepts of [concept_morgenroete]. It is divided into two major parts.\n\nOn the one hand, [concept_gaudi_monuments] have been completely redesigned: they are no longer built directly, but expanded step by step based on decisions. On the other hand, numerous monuments have been added - some of which must be built, others exist at the start of the game.\n\nThe other key point is the introduction of the [concept_gaudi_architect], who can upgrade cities and design up to 15 new unique buildings by researching [Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')]. Architects can also rebuild a country in the Bauhaus, Neoclassical, and Art Deco styles. A [concept_gaudi_great_architect] can even design their own [concept_gaudi_custom_monument]!"
 concept_gaudi_architect_desc: "#PURPLE #b Architects#!#! are [Concept('concept_artists_artist','$concept_artists_artists$')] whose skills relate to urban planning, building design and construction. They are special character types that you can gain either from events, from gaining enough [concept_artistic_progress] to create one in your nation or by offering a position to a [concept_gaudi_independent_architect].\nWhile other artists are more likely to accumulate cultural tradition, architects only rarely generate the very valuable [concept_gaudi_architectural_splendour] when they are involved in urban planning or the expansion of the capital—or when they completely redesign the country in a particular architectural style. Their main task is more practical in nature. They work in public construction, thus providing a nation with additional construction points. They improve infrastructure through planning and enhance capital cities into livable places. Architects can also hone their skills on a study tour or write an architectural treatise.\nOf paramount importance is the design of new, unique buildings, for which they create a [concept_gaudi_architectural_blueprint]. A total of 15 of these [concept_gaudi_blueprint_buildings] can be researched—since this takes a long time, it's worth considering which ones make sense.\nArchitects also provide a passive bonus: their mere presence accelerates the construction of [concept_gaudi_monuments] by 100 percent. The greatest achievement of an architect is the design of their own [concept_gaudi_custom_monument]. This is only possible with a [concept_gaudi_great_architect]."
 concept_douglas_mountaineering: "등산"
 concept_douglas_mountaineering_desc: "Countries that own at least one [concept_douglas_mountain_summit] or have a #b Mountaineering License#! with a country that has one can participate in mountaineering. To start a #b Mountain Expedition#! you need both the #b Prospecting#! and #b Nationalism#! technologies as well as a general that has either the #b Mountaineer#!, #b Explorer#!, #b Mountain Commander#! or #b Surveyor#! Trait.\nAs soon as you start a #b Mountain Expedition#! you will have to first choose which general will be the main Mountaineer. Then you will choose the summit to climb.\nThe higher the mountains, the more dangerous is the ascent. The Mountains are classified according to their height in meters ranging from under 4000 meters upt to over 8000 meters. Success depends on researched military technologies, the age and health of the leader, and their characteristics. Avalanches and steep slopes can pose a major risk that threatens the entire endeavor.\nYou can even send an additional [Concept('concept_academics_academic','$concept_academics_scientist$')] on the trip. Either a [concept_dubois_naturalist] or a [concept_dubois_paleontologist] will help discover more about the mountain you climbed on.\nIn the end you will get a prestige bonus and your general will develop better traits that will help them in combat as well for mountaineering."
 concept_gaudi_great_architect: "#PURPLE #b 위대한 건축가#!#!"
 concept_gaudi_great_architects: "#PURPLE #b 위대한 건축가#!#!"
 concept_gaudi_great_architect_desc: "#b 위대한 건축가#!는 건축 분야에서 최고의 거장으로 평가받는 [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]를 말합니다. #b 건축가#!가 [concept_artists_experience] 500에 도달하면 #b 위대한 건축가#!가 됩니다. 예술가가 위대한 건축가로 등극하면, 상당히 돋보이는 외관으로 조국의 정신을 구현하는 [concept_gaudi_custom_monument]의 설계도를 제작할 수 있게 됩니다."
 concept_gaudi_monuments: "Monuments in #R Morgenröte#!"
 concept_gaudi_monuments_desc: "Many Nations received new #b Monuments#! in [concept_morgenroete]: the #b Cologne Cathedral#! in Germany, the #b Gotthardbahn#! in Switzerland, the #b Cristo Redentor#! in Brazil, the #b Mole Antonelliana#! in Italy, the #b Summer Palace#! in China, the #b Sagrada Família#! in Spain, the #b Schloss Neuschwanstein#! in Bavaria, the #b Palacio de Bellas Artes#! in Mexico and the #b Gyeongbokgung Palace#! in Korea.\nAll Buildings except for the #b Summer Palace#!, and the #b Campanile#! need to be constructed by their owner, the #b Saxon Palace#! can be reactivated by a Polish nation. There are also new monuments at game start like the #b Buddhas of Bamiyan#! or the #b Potala Palace#!\nThere is also the possibility to have a [concept_gaudi_custom_monument] designed by a [concept_gaudi_great_architect].\n\nUnlike in the vanilla game, #b Monuments#! are not built directly, but rather through a decision. Construction takes place in several stages, depending on the size of the building, and can take years or even decades - and is significantly more expensive."
 concept_athletes_athlete: "선수"
 concept_athletes_athletes: "선수"
 concept_athletes_athlete_desc: "[concept_morgenroete]에서 #b 선수#!는 이 모드 내 특정 기능들을 사용할 수 있게 해 주는 특수 인물입니다. #b 선수#!는 일부 이벤트를 통해서나 버튼을 클릭하면 획득할 수 있습니다. 다른 인물과 마찬가지로 #b 선수#!는 경험치를 모을수록 자기 종목에서 더 큰 성공을 보장받게 됩니다.\n 현재 #b 선수#!의 유형은 다음과 같습니다.\n - [concept_curtiss_balloonist]\n - [concept_curtiss_pilot]\n - [concept_vikelas_olympian]\n - [concept_douglas_mountaineer]\n - [concept_vikelas_coach]\n - [concept_vikelas_racer]"
 concept_gaudi_independent_architect: "독립 건축가"
 concept_gaudi_independent_architects: "독립 건축가"
 concept_gaudi_independent_architect_desc: "[Concept('concept_gaudi_architect','$concept_gaudi_architects$')] that are not hired by a country are #b Independent Architects#!.\nUnlike many other artists, there are few requirements to recruit an #b Independent Architect#!, except for a minimal technological recquirement. They are true globetrotters and usually only demand good payment."
 concept_gaudi_architectural_blueprint: "건축 설계도"
 concept_gaudi_architectural_blueprints: "건축 설계도"
 concept_gaudi_architectural_blueprint_desc: "건축 설계도는 [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]가 제작할 수 있습니다. 한 국가에 하나씩만 세울 수 있는 특수 [concept_gaudi_blueprint_buildings]의 건설에 필수적인 요소입니다. 총 열다섯 가지의 건물이 다섯 가지 분류로 각각 나뉩니다. 어떤 설계도는 특정 기술의 선행 연구가 필요합니다. 설계 작업은 간혹 수년 간 진행될 수도 있기에, 어떤 설계도를 최우선으로 삼아야 하는지 미리 결정하는 것이 현명할 수 있습니다. 건물 자체는 어느 주에나 건설할 수 있지만, 도심 단계가 특정 수준에 도달해야 한다는 조건이 있습니다. 일부 건물의 경우 조건이 추가로 존재할 수 있습니다."
 concept_gaudi_blueprint_buildings: "설계도 건물"
 concept_gaudi_blueprint_buildings_desc: "설계도 건물은 [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]가 연구한 설계도를 필요로 하는 건물을 말합니다. 한 국가에 하나씩만 건설할 수 있으며, 총 15가지의 건물이 존재합니다.\n\n#b 기념물#!\n- [GetBuildingType('building_gaudi_statue').GetName]\n- [GetBuildingType('building_gaudi_fountain').GetName]\n- [GetBuildingType('building_gaudi_arch').GetName]\n\n#b 공공 광장#!\n- [GetBuildingType('building_gaudi_park').GetName]\n- [GetBuildingType('building_gaudi_luna').GetName]\n- [GetBuildingType('building_gaudi_parade').GetName]\n\n#b 공공사업 기관#!\n- [GetBuildingType('building_gaudi_almshouse').GetName]\n- [GetBuildingType('building_gaudi_school').GetName]\n- [GetBuildingType('building_gaudi_prison').GetName]\n\n#b 보건 시설#!\n- [GetBuildingType('building_gaudi_canalization').GetName]\n- [GetBuildingType('building_gaudi_hospital').GetName]\n- [GetBuildingType('building_gaudi_health').GetName]\n\n#b 국립 학술 기관#!\n- [GetBuildingType('building_gaudi_science').GetName]\n- [GetBuildingType('building_gaudi_arts').GetName]\n- [GetBuildingType('building_gaudi_sports').GetName]"
 concept_gaudi_custom_monument: "Custom Monument"
 concept_gaudi_custom_monument_desc: "A custom monument is an [concept_gaudi_architect]'s greatest possible masterpiece. It can compete with other, ordinary monuments. Only a [concept_gaudi_great_architect] can draw up such plans. It requires research into the most modern architectural technologies. The type of monument an architect designs depends largely on their architectural style. Art Deco architects design the [GetBuildingType('building_gaudi_people_monument').GetName], Bauhaus architects the [GetBuildingType('building_gaudi_people_forum').GetName], and Neoclassical architects the [GetBuildingType('building_gaudi_people_palace').GetName]."
 concept_douglas_mountaineer: "산악인"
 concept_douglas_mountaineers: "산악인"
 concept_douglas_mountaineer_desc: "#b 산악인#!은 정복되지 않은 [concept_douglas_mountain_summit]을 등정하는 [Concept('concept_athletes_athlete','$concept_athletes_athletes$')]입니다. 이들은 등산회를 설립한 뒤 [concept_douglas_alpine_heritage]에 따라 모집할 수 있습니다. 산봉우리와 화산 등의 지형지물을 갖춘 국가는 모집에 유리해집니다. 등산 특성과 경험치는 등반 과정이나 위험한 상황의 극복에 있어 가장 중요한 요인이라 할 수 있습니다.#!"
 concept_vikelas_olympian: "올림픽 선수"
 concept_vikelas_olympian_desc: "#n 이 항목은 수정 중입니다.#!"
 concept_douglas_mountain_summit: "산 정상"
 concept_douglas_mountain_summits: "산 정상"
 concept_douglas_mountain_summit_desc: "Mountain Summits are the coveted goal of all mountaineers. They mark the highest point of a mountain. Each summit has three distinct attributes that define how difficult it is to reach successfully.\n\n#V Height#!: Height determines how many steps are required to climb a mountain—this reflects the overall length of an expedition. For every 1,000 meters, one progress step is needed. The value is rounded up, meaning that the 4,421-meter-high Mount Whitney requires 5 steps, while the 7,134-meter-high Kauffmann Peak demands 8. A mountain's prestige is calculated based on its height: the total height is divided by 300. Thus, an ideal mountain of 4,500 meters grants 15 prestige.\n\n#V Level#!: A mountain's level represents the equipment demands necessary to climb it. This is not strictly tied to its height. For example, despite its 5,636 meters, Citlaltépetl is only Level 1 and requires just basic equipment. In contrast, the Matterhorn, at only 4,478 meters, is considered significantly more demanding at Level 3, requiring at least first aid preparation for Alpine emergencies.\n\n#V Risk#!: A mountain's risk level indicates the likelihood of negative events affecting an expedition. It is independent of both height and level. Avalanches, fog, and severe weather are key concerns. Popocatépetl could be ascended already in early modern times due to its hospitable surroundings. In contrast, the much smaller Großvenediger, at just 3,666 meters, still posed a serious threat to Austrian expeditions well into the early 19th century.\n\nMore information about individual summits can be found under the [concept_douglas_mountain_summit_list] section."
 concept_douglas_mountain_range: "산맥"
 concept_douglas_mountain_ranges: "산맥"
 concept_douglas_mountain_range_desc: "A mountain range is defined as a mountain formation that offers potential for [concept_douglas_mountaineering] training over long distances. Classic mountain ranges include the Rocky Mountains, the Andes, the Alps, and the Caucasus. Unlike the [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] that are to be conquered, there are also plenty of less challenging mountains where there is no risk of a [concept_douglas_mountaineer] experiencing a fatal fall. Rather, they should be viewed as a training route. Countries with mountain ranges are more likely to produce mountaineers than those without this geographical feature."
 concept_douglas_alpine_heritage: "Alpine Heritage"
 concept_douglas_alpine_heritage_desc: "Alpine Heritage is a collective term for a connection with the mountains and a specialization in climbing mountains. It also refers to the potential to recruit new [Concept('concept_douglas_mountaineer','$concept_douglas_mountaineers$')]—since, in most cases, experienced mountaineers come from mountainous areas. This always gives countries with [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')] or [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] an advantage. Recruiting a new mountaineer, as well as various other actions, costs Alpine Heritage."
 concept_douglas_mountain_summit_list: "산 정상 목록"
 concept_douglas_mountain_summit_list_desc: "There are many [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] that can be climbed.\n\n#V North America:#!\n#b Mount McKinley#! (Alaska), Height 6190 meters, Level 4\n#b Mount Logan#! (Yukon Territory), Height 5959 meters, Level 4\n#b Citlaltépetl#! (México), Height 5636 meters, Level 1\n#b Mount Whitney#! (California), Height 4421 meters, Level 1\n\n#V South America:#!\n#b Aconcagua#! (Mendoza), Height 6267 meters, Level 3\n#b Huascarán#! (Lima Territory), Height 6768 meters, Level 5\n#b Illimani#! (La Paz), Height 6438 meters, Level 4\n#b Chimborazo#! (Ecuador), Height 6267 meters, Level 1\n\n#V Europe:#!\n#b Shkara#! (Greater Caucasus), Height 5642 meters, Level 4\n#b Dufourspitze#! (Dufourspitze), Height 4634 meters, Level 2\n#b Matterhorn#! (West Switzerland), Height 4478 meters, Level 3\n#b Aiguille Verte#! (Savoy), Height 4122 meters, Level 3\n#b Pico de Aneto#! (Aragon), Height 3404 meters, Level 1\n\n#V Africa:#!\n#b Kibo#! (Tanganyika), Height 5895 meters, Level 2\n#b Mount Kenya#! (Kenya), Height 5199 meters, Level 3\n#b Mount Stanley#! (Uganda), Height 5109 meters, Level 3\n#b Mount Cameroon#! (South Cameroon), 4095 meters, Level 1\n\n#V Asia:#!\n#b Kamet#! (Delhi), Height 7756 meters, Level\n#b Chogolisa#! (Kashmir), Height 7665 meters, Level 5\n#b Kabru#! (Himalayas), Height 7412 meters, Level 5\n#b Kaufmann Peak#! (Tajikistan), Height 7134 meters, Level 4\n\n#V Australia & Oceania:#!\n#b Mount Wilhelm#! (Eastern New Guinea), Height 4121 meters, Level 2\n#b Mount Cook#! (South Island), Height 3724 meters, Level 2"
