 concept_elgar_architectural_project: "건축 사업"
 concept_elgar_architectural_projects: "건축 사업"
 concept_lepsius_archaeology: "고고학"
 concept_lepsius_archaeology_desc: "#b 고고학#!은 [concept_morgenroete]를 대표하는 요소 중 하나입니다.\n\n지도상에는 총 8개의 [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')]가 존재합니다.\n\n[concept_lepsius_expedition]를 보내려면 골동품 연구 기술을 연구하여야 하고, [concept_lepsius_archaeological_team]을 보유하며 발굴지 중 한 곳에 접근이 가능해야 합니다. 발굴지는 직접 그 지역을 소유하거나 그곳을 보유한 나라에 [concept_lepsius_excavation_licence]를 받으면 도달할 수 있습니다.\n\n이제 발굴지에 고고학 탐사를 보낼 차례입니다. 탐사단은 [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]을 발견하게 되며, 매우 희귀한 확률과 좋은 [concept_lepsius_archaeologist]의 도움으로 [concept_lepsius_major_artifact]을 발견할 수도 있습니다. \n\n탐사단이 유물을 가지고 돌아오면 [concept_lepsius_museum]을 지을 수도 있습니다. 고고학 박물관에서는 당신이 모은 유물을 볼 수 있고, [concept_lepsius_exhibition]를 열고 #b #BLUE 고고학자#!#!를 찾아갈 수도 있습니다.\n\n더 많은 유물과 전시를 확보하게 되면 획득하는 위신도 높아집니다.\n\n#b 인류학#!은 고고학의 또다른 한 분야입니다. [concept_andersson_anthropologist]와 [concept_andersson_cave]을 보유하고 있다면 [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]을 발견하여 선사시대 인류를 복원할 수 있습니다. 각각의 유골을 확보할수록 인류학 명성도 더욱 높아집니다. 인류학 명성을 충분히 모았다면 조국의 위신을 높이는 변화 요인을 부여받게 됩니다."
 concept_lepsius_archaeologist: "#b #BLUE 고고학자#!#!"
 concept_lepsius_archaeologists: "#b #BLUE 고고학자#!#!"
 concept_lepsius_archaeologist_desc: "#b #BLUE 고고학자#!#!는 [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]를 보낼 수 있는 학자입니다. 그곳에서 [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]을 수집하게 됩니다. 간혹 [concept_lepsius_major_artifact]을 발견할 수도 있습니다. \n고고학자는 임무를 수행하는 동안 매년 간접적으로 [concept_academics_experience]를 얻습니다. #b 경험치#!를 충분히 얻게 되면 고고학자 특성 레벨을 더 높일 수 있습니다."
 concept_lepsius_museum: "고고학 박물관"
 concept_lepsius_museum_desc: "#b 고고학 박물관#!은 당신의 국가가 찾아낸 모든 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]을 전시하기 위해 짓는 건물입니다."
 concept_lepsius_excavation_site: "역사적 발굴지"
 concept_lepsius_excavation_sites: "역사적 발굴지"
 concept_lepsius_excavation_site_desc: "#b 역사적 발굴지#!는 여러 곳이 존재하며, 상이집트와 하이집트, 바빌로니아, 아시리아, 크레타, 아르골리스, 유카탄, 페루가 각 나라에 존재합니다. #b 발굴지#!마다 그 지역의 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]과 이벤트가 존재합니다. 이렇듯 역사적으로 중요한 대규모 발굴지가 있는가 하면, [Concept('concept_lepsius_minor_excavation_site', '$concept_lepsius_minor_excavation_sites$')]도 존재합니다."
 concept_lepsius_expedition: "고고학 탐사"
 concept_lepsius_expeditions: "고고학 탐사"
 concept_lepsius_expedition_desc: "#b 고고학 탐사#!는 [concept_lepsius_archaeologist]와 그 [concept_lepsius_archaeological_team]이 나서는 탐사입니다. 수 개월의 시간 동안 최대한 많은 [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]을 수집하게 됩니다. #b 탐사#!는 [Concept('concept_lepsius_major_artifact','$concept_lepsius_major_artifacts$')]을 얻을 수 있는 유일한 방법입니다.\n초기 고고학을 연구하였다면 #b 탐사#!를 성공적으로 마친 다음 그 지역에 탐사단을 파견하여 [concept_lepsius_excavation]를 진행할 수 있습니다."
 concept_lepsius_archaeological_team: "고고학 발굴단"
 concept_lepsius_archaeological_teams: "고고학 발굴단"
 concept_lepsius_excavation_team: "발굴단"
 concept_lepsius_archaeological_team_desc: "[Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]를 수행하기 위해서는 하나 이상의 #b 고고학 발굴단#!이 필요합니다. #b 고고학 발굴단#!은 총 3팀까지 둘 수 있지만, 하나씩 추가할 때마다 더 높은 조건을 요구하게 됩니다.\n\n첫번째 #b 발굴단#!은 골동품 연구 기술을 연구하고, 3단계 이상의 대학과 문해율 33%를 보유해야 합니다.\n\n두번째 발굴단은 근대 고고학 기술을 연구하고, 15단계 이상의 대학과 문해율 66%를 보유해야 합니다.\n\n마지막 #b 발굴단#!은 골동품 연구 기술을 연구하고 경험 많은 [concept_lepsius_archaeologist]를 두고 있어야 합니다.\n\n#b 발굴단#!은 [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]와 [Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')]에 활용됩니다."
 concept_lepsius_excavation_licence: "탐사 허가"
 concept_lepsius_excavation_licences: "탐사 허가"
 concept_lepsius_excavation_licence_desc: "본인의 국가에 [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')]가 따로 없더라도 외교 행동으로서 #b 탐사 허가#!를 받아 접근할 수 있습니다.\n#b 탐사 허가#!를 취득하기 위해서는 최소 강대국에 도달해 있고 해당 지역에 충분히 높은 [concept_interest_tier]를 보유해야 합니다.\n#b 탐사 허가#!를 유지하기 위해 해당 국가에 소액의 보상을 지불하게 됩니다."
 concept_lepsius_artifact: "유물"
 concept_lepsius_artifacts: "유물"
 concept_lepsius_minor_artifact: "소형 유물"
 concept_lepsius_minor_artifacts: "소형 유물"
 concept_lepsius_oceanic_artifact: "오세아니아 유물"
 concept_lepsius_oceanic_artifacts: "오세아니아 유물"
 concept_lepsius_artifact_desc: "유물은 [Concept('concept_lepsius_archaeological_team','$concept_lepsius_archaeological_teams$')]에게 [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]와 [Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')]을 시키거나, [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')]를 떠나거나, 이벤트를 통해 얻을 수 있습니다.\n\n보통은 소형 #b 유물#!을 얻게 되는데, 이 #b 유물#!자체로 [concept_lepsius_museum]의 [Concept('concept_lepsius_exhibition','$concept_lepsius_exhibitions$')]에 활용할 수 있습니다.\n\n한편 한번씩만 발견할 수 있고 고유의 이름을 갖고 있는 특별한 #b 유물#!을 [Concept('concept_lepsius_major_artifact','$concept_lepsius_major_artifacts$')]이라 부릅니다. 탐사와 발굴, 고고학계 발견을 통해 획득할 수 있습니다."
 concept_lepsius_major_artifact: "대표 유물"
 concept_lepsius_major_artifacts: "대표 유물"
 concept_lepsius_major_artifact_desc: "#b 대표 유물#!은 이름과 고유성을 지닌 특별한 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]을 말합니다.\n#b 대표 유물#!은 여러 방법을 통해 찾을 수 있습니다. [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]를 통해 찾아낼 수 있는 것도 있고, 발견할 때까지 [concept_lepsius_excavation]을 계속해야 손에 넣을 수 있는 것도 있습니다. 또 고고학계의 큰 발견을 해야만 획득할 수 있는 것도 존재합니다.\n#b 대표 유물#!을 국외로 불법 반출하는 것은 외교적 문제를 야기할 수 있으며, #b 대표 유물#!을 직접 소유하는 것보다 더욱 악영향을 끼칠 수 있습니다. 그런 한편으로 #b 대표 유물#!로 [Concept('concept_lepsius_exhibition','$concept_lepsius_excellent_exhibition$')]을 구성하여 엄청난 명성 보너스를 부여받을 수 있으며, [Concept('concept_academics_academic_mission','$concept_academics_academic_missions$')] 중에서도 필요로 할 수가 있습니다."
 concept_lepsius_exhibition: "전시"
 concept_lepsius_exhibitions: "전시"
 concept_lepsius_excellent_exhibition: "완벽한 전시"
 concept_lepsius_excavation: "발굴"
 concept_lepsius_excavations: "발굴"
 concept_lepsius_excavation_desc: "초기 고고학을 연구하고 [concept_lepsius_expedition]를 끝냈다면 [concept_lepsius_archaeological_team]을 현장에 남도록 결정하여 [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]을 계속해서 얻을 수 있습니다. 발굴단은 언제든지 #b 발굴#! 작업에서 불러들일 수 있습니다."
 concept_verrier_astronomy: "천문학"
 concept_verrier_observatory: "천문대"
 concept_verrier_observatories: "천문대"
 concept_verrier_astronomer: "#b #ORANGE 천문학자#!#!"
 concept_verrier_astronomers: "#b #ORANGE 천문학자#!#!"
 concept_verrier_astronomical_object: "천체"
 concept_verrier_astronomical_objects: "천체"
 concept_verrier_astronomical_object_icon: "@verrier_astronomicalobject!"
 concept_verrier_celestial_body: "천체"
 concept_verrier_celestial_bodies: "천체"
 concept_verrier_comet: "대혜성"
 concept_verrier_comets: "대혜성"
 concept_verrier_comet_desc: "빅토리아 시대에는 대중의 큰 관심을 끌었던 #b 대혜성#!이 몇 차례 나타난 적이 있었습니다. [concept_verrier_astronomer]를 보유한다면 이러한 #b 대혜성#!을 처음으로 발견할 기회가 생기며, 명성과 연구 보너스를 받게 됩니다."
 concept_verrier_moon_photo: "월면 사진"
 concept_verrier_moon_photos: "월면 사진"
 concept_rapanui_christian_mission: "기독교 선교"
 concept_rapanui_christian_missions: "기독교 선교"
 concept_rapanui_christian_mission_desc: "오세아니아에 [Concept('concept_interest','$concept_interests$')]를 보유한 [Concept('concept_major_power','$concept_major_powers$')]이나 [Concept('concept_great_power','$concept_great_powers$')]은 그 지역의 분권화된 섬나라를 개종시킬 수 있으나, 당신의 나라가 너무 세속적이지 않고 '종교인' 이해 집단이 약세 상태에 있지 않아야 가능합니다.\n\n개종 활동은 총 세가지 단계를 거칩니다. 선교사를 보내면 친절이나 무시, 즉각 처형 중 하나의 대우를 받게 됩니다. 선교 활동이 실패로 돌아가면 하느님의 말씀을 전파할 새로운 선교사를 찾기까지 수 년의 시간이 소요됩니다. 선교가 이루어지면 해마다 총 인구의 1%가 개종하게 됩니다. 개종 과정에 도움이 되거나 방해가 되는 이벤트가 발생할 수 있습니다.\n\n두번째 단계는 원주민의 30%가 개종했을 떄 시작됩니다. 이때 선교 본부는 영구적인 기지로 바뀝니다. 원주민의 51%가 기독교를 믿으면 족장은 당신의 종교로 개종하고 [concept_protectorate]이 되어 스스로 당신의 지배 하에 두게 됩니다. 그로부터 수년 뒤 말라리아 예방 기술을 보유하고 있다면 그 지역들을 합병할 수도 있습니다.\n\n세번째 단계에서는 일지를 통해 능동적으로 결단을 내릴 수 있습니다. 추가 선교사를 파견하여 선교 활동을 직접 강화하거나 무역을 시도할 수 있습니다. 희귀 [Concept('concept_lepsius_artifact','$concept_lepsius_oceanic_artifacts$')], [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')], 부유층의 삶의 질을 높여줄 진주를 구입할 수 있게 됩니다."
 concept_manzoni_literary_tradition: "문학 전통"
 concept_klimt_painters: "#PURPLE #b 화가#!#!"
 concept_klimt_painting_tradition: "회화 전통"
 concept_vikelas_sports: "체육"
 concept_vikelas_sports_desc: "#b 체육#!은 [concept_morgenroete]를 대표하는 요소 중 하나입니다.\n\n#b 단체 운동#!을 연구한 국가는 여러 체육 활동에 나설 수 있습니다. 가장 핵심적인 요소로는 [concept_vikelas_ioc]를 창설하여 [concept_vikelas_olympic_games] 조직을 개시할 수 있다는 점이 꼽힙니다. 올림픽 대회는 금메달을 획득하여 나라의 [concept_prestige]을 획득할 기회를 제공합니다."
 concept_vikelas_olympic_games: "올림픽 대회"
 concept_vikelas_olympic_games_desc: "[concept_vikelas_ioc]가 한번 창설되면 #b 올림픽 대회#!를 4년마다 개최할 수 있습니다. 각 주기마다 위원회에서 #b 개최국#!을 투표로 뽑습니다. 개최국은 큰 [concept_prestige] 부스트를 얻습니다.\n올림픽 대회 기간 동안 선수들은 메달 획득을 놓고 경쟁하게 됩니다. 얼마나 많은 메달을 획득할지는 여러 요인이 작용합니다. 인구는 작은 영향을 미치고, [concept_sol]은 더 큰 영향을 끼치며, 일부 이벤트도 성공 가능성에 영향을 미치고, 위대한 [Concept('concept_general', '$concept_generals$')]과 위대한 [Concept('concept_admiral', '$concept_admirals$')]의 보유 여부도 마찬가지로 영향을 미칩니다. 여기에 #b 선수#! 특성을 보유한 인물과 도심의 #b 체육 시설#! 설정 여부도 작은 부스트를 줍니다.\n이러한 요인들은 전체 금메달수 12개 가운데 우리나라가 몇 개나 획득할지에 영향을 끼치게 됩니다. 금메달을 획득할 때마다 [concept_prestige] 5를 부여받게 됩니다."
 concept_vikelas_ioc: "국제올림픽위원회"
 concept_vikelas_ioc_desc: "#V $vikelas_international_sports_tech$#!을 연구한 국가는 #b 국제올림픽위원회#!, 줄여서 #b IOC#!를 창설할 수 있습니다. 그 후 IOC는 [concept_vikelas_olympic_games]의 개최 준비에 나서게 됩니다. IOC의 회원국은 올림픽 대회에 참가할 수 있습니다.\nIOC의 핵심 회원국은 #b 이사국#!입니다. IOC를 창설한 국가는 #b 회장국#!이 되며 이사국을 동시에 영구히 겸하게 되지만, 나머지 이사국들은 4년에 한번씩 선출됩니다. 이사회는 열강 5개국, 유럽 2개국, 아시아 2개국, 아메리카 2개국, 아프리카 1개국, 오세아니아 1개국으로 구성됩니다.\n이사국의 주요 업무는 차기 대회 개최국을 선정하는 것입니다. 개최 후보국으로는 총 3개국이 지정됩니다 (이사회에 로비를 가하면 4개국이 될 수도 있습니다).\n그리스가 IOC를 창설했을 경우 올림픽 대회는 그리스에서만 개최되므로, 이사회가 개최국을 선정하지 않게 되어 그 중요도가 훨씬 떨어지게 됩니다."
 concept_lepsius_exhibition_desc: "동일 종류의 [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]을 충분히 소장하였다면 [concept_lepsius_museum]에서 전시를 자동으로(즉, 각 지역별 [concept_production_method]의 형태로) 준비하게 됩니다. 일반 유물의 경우 유물 10점 이상을 확보해야 첫 전시가 이루어집니다. 전시의 규모는 유물 수가 각각 25점 (중규모 전시), 50점 (대규모 전시), 100점 (완벽한 전시)에 도달할 때마다 늘어나게 됩니다. 완벽한 전시의 경우 [concept_lepsius_major_artifact] 1점이 추가로 필요합니다.\n\n현지 유물은 일반 전시와 대규모 전시로 제한되어 있어 전시의 유형 면에서 다양성이 떨어집니다. 일반 전시는 현지 유물 25점, 대규모 전시는 50점이 필요합니다."
 concept_vikelas_racer: "카레이서"
 concept_vikelas_racers: "카레이서"
 concept_vikelas_racer_desc: "#b 카레이서#!는 [concept_vikelas_car_racing]에 참가하는 특수 [concept_character]입니다. 카레이싱에서 [concept_vikelas_race_car]을 빼면 승부를 좌우하는 중요한 요인이라고 할 수 있습니다. 이들의 개인적인 자질이 결정적인 역할을 합니다."
 concept_vikelas_car_racing: "카레이싱"
 concept_vikelas_car_racing_desc: "카레이싱은 [Concept('concept_vikelas_racer','$concept_vikelas_racers$')]가 트랙이나 일반 도로에서 서로 간의 경주에 나서는 체육 종목입니다."
 concept_lepsius_archaeological_exhibition: "고고학 전시"
 concept_elgar_opera_desc: "#b 오페라 극장#!은 한 나라의 음악적 구심점으로, 최고의 음악인들이 모여 대중들을 위한 연주에 나서는 곳입니다. \n#b 오페라 극장#!은 도심 단계가 최소 5단계에 이른 주에 개별적으로 건설할 수 있는 건물입니다. #b 오페라 극장#!에서는 음악을 생산하고 악기를 소비하게 됩니다. #b 오페라 극장#!의 단계가 높을수록 해마다 생산되는 [concept_elgar_musical_tradition]의 양도 늘어나게 됩니다.\n또한 #b 오페라 극장#!을 건설하면 극장을 방문하는 등의 몇 가지 선택권이 생기게 됩니다."
 concept_elgar_impressionism_desc: "#b 인상주의#!는 미술사에서 찰나에 포착된 한 장면으로 분위기를 생생하게 묘사한 것이 특징인 예술 양식입니다. 19세기 말 프랑스 회화계에서 시작된 예술 운동이기도 합니다. 인상주의라는 용어는 음악과 문학, 영화, 사진 등 다양한 분야에 걸쳐 적용되어 왔습니다. 하인리히 하르트 등의 자연주의 화가들이 '진실 추구적 행위주의'를 표현하는 수단으로서 음악을 거부했던 것과는 달리, 인상주의 화가들은 섬세하게 표현된 색채의 화음 속에서 '소재 없는 몽상'에 재미를 느끼곤 했습니다.\n\n게임 내에서 #b 인상주의#!는 일지 항목을 통해서만 해제가 가능하며 [concept_elgar_musical_tradition] 1000과 [concept_elgar_opera], 권세 상태의 지주, 권세 상태가 아닌 기업가, 찬성 5 이상의 지식인을 필요로 합니다. #b 인상주의#!를 채택하면 나머지 두 분기는 해제할 수 없게 됩니다.\n\n게임 내에서 #b 인상주의#!가 중점을 두는 분야는 음악입니다. 따라서 인상주의는 [concept_elgar_musical_tradition]에 제일 큰 보너스를 부여하게 됩니다."
 concept_elgar_expressionism_desc: "#b 표현주의#!는 예술 양식의 하나입니다. 표현주의의 시작과 선구자들의 활동은 19세기 말로 거슬러 올라갑니다. 인상주의, 상징주의, 야수주의처럼 표현주의도 자연주의의 경향에 대한 반발 운동이었습니다. 표현주의에서는 미적 수준, 묘사적 수준, 사실적 수준보다 표현적 수준이 우선시됩니다. 예술가는 자신의 경험을 관객에게 전달하고자 합니다. 사물의 외형적 인식을 묘사하려는 인상주의 음악과는 대조적으로, 표현주의 운동은 인간 영혼의 감적을 표현합니다.\n\n이 게임에서 #b 표현주의#!는 일지 항목으로만 해금할 수 있으며 [concept_elgar_musical_tradition] 1000, [concept_elgar_opera], 찬성 5 이상을 갖춘 권세 상태의 지식인이나 노동조합이 필요합니다. #b 표현주의#!를 택하면 나머지 두 분기는 해제할 수 없습니다.\n\n#b 표현주의#!의 중점은 문학이 될 예정이지만 아직 미구현 상태입니다."
 concept_elgar_art_nouveau_desc: "#b 아르누보#!는 '아트 앤 크래프트 운동'에서 발달한 예술 양식으로 자연의 형태에서 영감을 얻습니다. 역동성과 움직임에 초점을 맞추고 현대적인 재료를 활용하는 경우가 주를 이뤘습니다.\n\n이 게임에서 #b 아르누보#!는 일지 항목으로만 해금할 수 있으며 [concept_elgar_musical_tradition] 1000, [concept_elgar_opera], 찬성 5 이상을 갖춘 권세 상태의 기업가와 지식인이 필요합니다. #b 아르누보#!를 택하면 나머지 두 분기는 해제할 수 없습니다.\n\n#b 아르누보#!와 본 갈래의 다음 기술인 #b 아르데코#!는 건축에 중점을 둡니다. 건축 관련 다양한 이벤트와 일지 항목을 통해 [concept_gaudi_architectural_splendour]을 획득할 수 있게 됩니다."
 concept_elgar_composer: "#PURPLE #b 작곡가#!#!"
 concept_elgar_composers: "#PURPLE #b 작곡가#!#!"
 concept_elgar_composer_desc: "#b 작곡가#!는 음악을 작곡하는 인물입니다. 작곡가는 특수 인물 유형으로, 이벤트를 통해 획득하거나, [concept_artistic_progress]를 충분히 쌓아 국내에서 직접 배출하거나, [concept_elgar_travelling_composer]를 섭외하는 방식으로 획득합니다.\n#b 작곡가#!를 두게 되면 [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')], [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')] 작곡을 맡길 수 있습니다. 각각의 행동은 작곡가가 하는 일과 그 과정에서 필요한 것은 무엇인지, 그것으로 무엇을 얻는지에 따라 전부 다릅니다. #b 작곡가#!는 무엇이든 주어진 일감을 마치고 나면 [Concept('concept_elgar_composer_exhaustion','$concept_elgar_composer_exhaustion_exhausted$')] 상태가 되어 한동안 휴식을 취해야지만 다시 일할 수 있게 됩니다.\n#b 작곡가#!는 한평생 [concept_artists_experience]을 획득하게 되고 간혹 잃기도 합니다.  #b 명성#!이 높을 수록 #b 작곡가#!의 행동으로 얻게 되는 이익도 커지게 됩니다. #b 명성#! 500에 도달한 #b 작곡가#!는 [Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')]가 되어, 세계적으로 알려진 음악의 거장으로 거듭나게 됩니다."
 concept_elgar_great_composer: "#PURPLE #b 위대한 작곡가#!#!"
 concept_elgar_great_composers: "#PURPLE #b 위대한 작곡가#!#!"
 concept_elgar_great_composer_desc: "#b 위대한 작곡가#!는 음악계의 거장을 말합니다. 이들의 이름은 후세에 길이 남게 될 것입니다. [Concept('concept_elgar_composer','$concept_elgar_composers$')]가 [concept_artists_experience] 500에 도달하면 #b 위대한 작곡가#!가 됩니다. 이렇게 되면 효율성이 상당히 늘어나게 되고, 나라에는 더 많은 [concept_elgar_musical_tradition]이 주어지게 됩니다. 일례로 #b 위대한 작곡가#!는 [concept_elgar_musical_masterwork]을 더 빨리 작곡할 수 있게 됩니다."
 concept_elgar_travelling_composer: "방랑 작곡가"
 concept_elgar_travelling_composers: "방랑 작곡가"
 concept_elgar_travelling_composer_desc: "#b 방랑 작곡가#!는 어느 국가에도 소속되지 않고 순회 공연으로 각국을 떠도는 [Concept('concept_elgar_composer','$concept_elgar_composers$')]를 말합니다. #b 방랑 작곡가#!는 영입할 수 있지만 보유중인 [concept_artists_experience]이 많을수록 요구 조건도 더 커지게 됩니다.\n#b 방랑 작곡가#!를 초빙하려면 최소 하나 이상의 [Concept('concept_elgar_opera','$concept_elgar_opera_house$')]을 보유해야 합니다. #b 명성#!을 많이 확보한 #b 작곡가#!일수록 더 큰 규모의 오페라 극장과 최신 음악 [Concept('concept_technology', '$concept_technologies$')], 일정량의 [concept_elgar_musical_tradition]을 요구할 것이며 일부 작곡가는 [Concept('concept_major_power', '$concept_major_power_short$')] 또는 [Concept('concept_great_power', '$concept_great_powers$')]인 경우에만 응할 수도 있습니다.\n특이 사항으로 [Concept('concept_elgar_national_composer','$concept_elgar_national_composers$')]가 존재하는데, 본인과 동일하거나 매우 유사한 국가 정체성을 지닌 국가에서만 영입을 허락하는 작곡가에 해당됩니다."
 concept_elgar_national_composer: "국민 작곡가"
 concept_elgar_national_composers: "국민 작곡가"
 concept_elgar_national_composer_desc: "#b 국민 작곡가#!는 조국의 가치를 드높이는 [Concept('concept_elgar_composer','$concept_elgar_composers$')]입니다. 다른 국가에서 채용할 수 없는 것이 특징입니다.\n#b 국민 작곡가#!의 사용 가능 여부는 해당 인물의 [Concept('concept_discrimination_trait', '$concept_cultural_traits$')]으로 결정됩니다. 국가의 주 문화가 비문화 유산 #b 특성#!과 [concept_language_trait]을 모두 공유해야 합니다. 즉 북독일 문화의 #b 국민 작곡가#!는 독일계 국가와 스위스에서 이용할 수 있습니다."
 concept_elgar_composing: "작곡"
 concept_elgar_composing_lower_case: "작곡"
 concept_elgar_composing_compose: "작곡"
 concept_elgar_composing_desc: "[concept_elgar_composer]가 #b 작곡#!을 하면 해마다 [concept_artists_experience] 5를 받고 나라의 [concept_elgar_musical_tradition]이 5만큼 추가됩니다. 추가로 해마다 일정 편수의 곡을 작곡하게 됩니다. 지휘자, 거장, 혁신가, 꼼꼼함 등의 특성을 보유한 #b 작곡가#!는 해마다 작곡하는 곡의 수가 한 편 더 추가됩니다. 작곡 편수는 추후 [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tour_tours$')]의 성공에도 결정적인 역할을 합니다. #b 작곡가#!는 일지 항목에서 취소가 이루어질 때까지 작곡을 계속하게 됩니다. #b 작곡가#!가 작곡을 하면 국가에 소량의 연간 유지비를 부과하게 됩니다."
 concept_elgar_conducting: "지휘"
 concept_elgar_conducting_lower_case: "지휘"
 concept_elgar_conducting_conduct: "지휘"
 concept_elgar_conducting_desc: "[concept_elgar_composer]가 24개월 동안 #b 지휘#!에 집중하게 됩니다. 이것으로 무작위 [concept_elgar_opera]의 음악 산출량을 5년~10년 간 늘려주고, 나라에는 [concept_elgar_musical_tradition]에 소량의 가속도를 부여하며 #b 작곡가#!의 [concept_artists_experience]에도 적당한 가속도가 부여됩니다. #b 작곡가#!가 아직 지휘자로 나서지 않았다면 음악 시즌 말미에 해당 [concept_character_trait]을 부여받을 수 있습니다. #b 지휘#! 중에 있는 #b 작곡가#!에게는 소정의 예산을 지원하게 됩니다."
 concept_elgar_musical_tour: "순회 공연"
 concept_elgar_musical_tours: "순회 공연"
 concept_elgar_musical_tour_tour: "투어"
 concept_elgar_musical_tour_tours: "투어"
 concept_elgar_musical_tour_desc: "[concept_elgar_composer]는 30일 동안 해외에서 #b 순회 공연#!에 나설 수 있습니다. #b 순회 공연#!은 #b 작곡가#!가 속한 국가의 [concept_prestige]을 높입니다. 또 #b 작곡가#!는 #b 투어#!가 마무리되는 시점에서 #b 작곡가#!의 작곡 횟수와 특성에 따라 [concept_artists_experience] 증가를 적용받습니다.\n작곡 횟수가 20곡 미만인 #b 작곡가#!는 #b 투어#!에 나서지 않는 것이 좋으며, #b 내성적#! 특성을 가진 #b 작곡가#!는 #b 투어#!에 나설 수 없습니다."
 concept_elgar_musical_masterwork: "음악계 걸작"
 concept_elgar_musical_masterworks: "음악계 걸작"
 concept_elgar_musical_masterwork_masterwork: "걸작"
 concept_elgar_musical_masterwork_masterworks: "걸작"
 concept_elgar_musical_masterwork_of_music: "음악계 걸작"
 concept_elgar_musical_masterworks_of_music: "음악계 걸작"
 concept_elgar_musical_masterwork_desc: "[concept_elgar_composer]는 #b 걸작#! 작곡을 개시할 수 있으며 수년의 시간이 소요됩니다. #b 작곡가#!의 [concept_artists_experience]이 많을수록 작곡도 빨리 끝내게 됩니다. #b 걸작#!이 한번 탄생하면 #b 작곡가#!는 [concept_artists_experience] 50을 획득하며 나라에는 [concept_rank]에 따라 [concept_elgar_musical_tradition]을 150까지 획득하게 됩니다. \n#b 작곡가#!는 #b 걸작#!을 최대 3점까지 만들 수 있으며 작곡하는 동안 나라에서 금전적 지원을 해주어야 합니다."
 concept_elgar_composer_exhaustion: "작곡가 탈진"
 concept_elgar_composer_exhaustion_exhausted: "탈진한"
 concept_elgar_composer_exhaustion_desc: "[concept_elgar_composer]가 [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')] 작곡, [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')]을 마치고 나면 직무로 #b 탈진#!한 상태가 됩니다. #b 탈진한 작곡가#!는 일정 시간 동안 활동에 나설 수 없게 됩니다. #b 작곡가#!의 나이가 많을수록 #b 탈진 상태#!에서 벗어나는 시간도 길어집니다."
 concept_manzoni_writer: "#PURPLE #b 작가#!#!"
 concept_manzoni_writers: "#PURPLE #b 작가#!#!"
 concept_klimt_painter: "#PURPLE #b 화가#!#!"
 concept_pm_artists_academy_conservatory: "#b #PURPLE 음악원#!#!"
 concept_pm_artists_academy_conservatory_desc: "음악원은 예술 학교의 특화 분야를 음악에 둡니다. 음악원을 보유하면 [Concept('concept_elgar_composer','$concept_elgar_composers$')]를 후원할 수 있습니다. 생산 방식을 변경하면 해당 예술 학교에 #n 부정적인 산출량 변화 요인#!이 부여되고 [concept_artistic_progress]에 #n 부정적 영향#!을 끼칠 수 있습니다."
 concept_pm_artists_academy_salon: "#b #PURPLE 문학 살롱#!#!"
 concept_pm_artists_academy_salon_desc: "문학 살롱은 예술 학교의 특화 분야를 문학에 둡니다. 문학 살롱을 보유하면 [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]를 후원할 수 있습니다. 생산 방식을 변경하면 해당 예술 학교에 #n 부정적인 산출량 변화 요인#!이 부여되고 [concept_artistic_progress]에 #n 부정적 영향#!을 끼칠 수 있습니다."
 concept_pm_artists_academy_studio: "#b #PURPLE 화실#!#!"
 concept_pm_artists_academy_studio_desc: "화실은 예술 학교의 특화 분야를 회화에 둡니다. 화실을 보유하면 [Concept('concept_klimt_painter','$concept_klimt_painters$')]를 후원할 수 있습니다. 생산 방식을 변경하면 해당 예술 학교에 #n 부정적인 산출량 변화 요인#!이 부여되고 [concept_artistic_progress]에 #n 부정적 영향#!을 끼칠 수 있습니다."
 concept_pm_artists_academy_specialization: "예술 학교 특화"
 concept_pm_artists_academy_specialization_desc: "모든 예술 학교는 생산 방식을 변경하는 식으로 특화 분야를 교체할 수 있습니다.\n[concept_pm_artists_academy_conservatory]으로 설정된 예술 학교는 [Concept('concept_elgar_composer','$concept_elgar_composers$')]를 후원할 수 있습니다.\n[concept_pm_artists_academy_salon]으로 설정된 예술 학교는 [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]를 후원할 수 있습니다.\n[concept_pm_artists_academy_studio]로 설정된 예술 학교는 [Concept('concept_klimt_painter','$concept_klimt_painters$')]를 후원할 수 있습니다.\n특화 분야를 변경하면 건물과 [concept_artistic_progress]에 #n 단기간의 부정적 효과#!가 부여됩니다."
 concept_artists_artist: "예술가"
 concept_artists_artists: "예술가"
 concept_artistic_progress: "예술가 양성 진행도"
 concept_artistic_progress_desc: "#b 예술가 양성 진행도#!가 1000에 도달하면 새로운 [concept_artists_artist]를 얻을 수 있습니다. #b 예술가 양성 진행도#!를 모으기 위해서는 #b 예술 학교#!나 #b 오페라 극장#!을 보유하여야 합니다.\n#b 예술가 양성 진행도#!의 획득은 여러 요인에 좌우됩니다. 예컨대 [concept_literacy] 비율이 높을수록 #b 예술가 양성 진행도#!도 빨라집니다. 예술 창의 예술가 양성 진행도 툴바에서 어떤 요인에 따라 점수를 얻게 되는지에 관한 세부 정보를 모두 확인할 수 있습니다."
 concept_artists_experience: "명성"
 concept_artists_experience_desc: "[concept_artists_artist]는 #b 명성#!을 보유하고 있습니다. 명성은 그 예술가가 얼마나 높이 평가받는지를 나타냅니다. 예술가는 적은 수의 명성을 보유한 채로 시작하며 자기 분야에서 활동할 수록 명성을 추가로 얻게 됩니다. 명성 500을 획득한 예술가는 #b 위대한 예술가#!가 되어 그에 상응하는 [concept_character_trait]을 받게 됩니다."
 concept_manzoni_great_writer: "위대한 작가"
 concept_manzoni_local_writer: "지역 작가"
 concept_artists_center_of_arts: "예술의 중심지"
 concept_artists_centers_of_arts: "예술의 중심지"
 concept_artists_center_of_classicism: "고전주의의 중심지"
 concept_artists_center_of_romanticism: "낭만주의의 중심지"
 concept_artists_center_of_realism: "사실주의의 중심지"
 concept_artists_center_of_impressionism: "인상주의의 중심지"
 concept_artists_center_of_expressionism: "표현주의의 중심지"
 concept_artists_center_of_art_nouveau: "아르누보의 중심지"
 concept_klimt_great_painter: "#PURPLE #b 위대한 화가#!#!"
 concept_klimt_great_painters: "#PURPLE #b 위대한 화가#!#!"
 concept_klimt_great_painter_desc: "#b 위대한 화가#!는 영원히 기억될 [Concept('concept_klimt_painter','$concept_klimt_painters$')]입니다. #b 화가#!가 500 [concept_artists_experience]에 도달하면 #b 위대한 화가#!가 됩니다. 이로써 화가의 효율성이 크게 향상되고 나라에서는 [concept_klimt_painting_tradition]을 더 많이 획득할 수 있게 됩니다."
 concept_klimt_independent_painter: "독립 화가"
 concept_klimt_independent_painters: "독립 화가"
 concept_klimt_painter_trip: "화가의 유학"
 concept_klimt_painter_trip_journeys: "유학"
 concept_elgar_music_desc: "#b 음악 문화#!는 [concept_morgenroete]를 대표하는 요소 중 하나입니다. 19세기와 20세기에 음악은 대중을 즐겁게 하고 국가의 위대함을 보여주는 중대한 수단이었습니다.\n\n#r 모르겐뢰테#!의 음악 관련 기능을 이용하려면 대부분 [concept_elgar_opera]을 지어야 가능합니다. #b 오페라 건물#!은 음악을 생산하지만 운영을 위해서는 악기가 필요합니다. #b 오페라 건물#!은 대중의 소비에 따라 #b 음악#!을 제작할 뿐만 아니라 당신의 국가에 [concept_elgar_musical_tradition]를 천천히 쌓아나가게 됩니다.\n\n#b 음악 전통#!은 한 국가의 음악적 성과와 전통을 반영합니다. #b 음악 전통#!을 일정량 보유하면 위신 보너스를 부여해 주고, 국가의 예술이 앞으로 발전해 나갈 방향을 고를 수 있게 해 줍니다. 당신이 나아갈 수 있는 진로로는 [concept_elgar_impressionism], [concept_elgar_expressionism], [concept_elgar_art_nouveau]가 있습니다. 이들 각각의 예술 양식은 또다른 중점 사항을 지닙니다.\n\n#b 음악 전통#!을 훨씬 더 많이 얻으려면 [concept_elgar_composer]를 보유하는 것도 좋은 방법입니다. 작곡가는 [Concept('concept_elgar_composing','$concept_elgar_composing_compose$')]과 [Concept('concept_elgar_conducting','$concept_elgar_conducting_conduct$')], [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')], [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterworks_of_music$')] 작곡까지 해낼 수 있습니다. 이러한 행동들은 #b 작곡가#!의 [concept_artists_experience]을 늘리거나 국가의 #b 음악 전통#!을 향상시켜 줍니다."
 concept_artists_center_of_arts_desc: "#b 예술의 중심지#!는 특정 [concept_artists_art_style]의 중심지로서 그 #b 예술 양식#!의 발상이 이루어지면 생겨나는 [concept_state_region]을 말합니다. 하나의 #b 예술 양식#!에는 #b 예술의 중심지#!가 하나만 존재할 수 있습니다.\n#b 예술의 중심지#!는 [Concept('concept_klimt_painter','$concept_klimt_painters$')]가 그곳의 #b 예술 양식#!을 배우기 위해 [concept_klimt_painter_trip]을 떠날 수 있다는 점에서 특히 중요합니다. 그것을 제외하더라도 #b 예술의 중심지#! 가운데서는 그 지역에서 벌어지는 고유 이벤트를 선사하는 곳도 존재합니다. 예를 들어 어떤 중심지에서는 [Concept('concept_klimt_art_prize','$concept_klimt_art_prizes$')]에 도전하여 우승을 노릴 수도 있습니다."
 concept_klimt_painting_culture: "회화 문화"
 concept_klimt_painting_culture_desc: "#b 회화 문화#!는 [concept_morgenroete]를 대표하는 요소 중 하나입니다. 19세기와 20세기에는 회화가 급속도로 발전하여 새롭고 다채로운 [Concept('concept_artists_art_style','$concept_artists_art_styles$')]이 도래하면서 개인과 국가에 큰 발전을 불러일으켰습니다.\n\n#r 모르겐뢰테#!의 회화 콘텐츠를 즐기려면 그 대부분은 #b 예술 학교#!를 먼저 지어야 합니다. #b 예술 학교#!는 [concept_klimt_painting_tradition]을 모으고 신임 [Concept('concept_klimt_painter','$concept_klimt_painters$')]를 모집할 수 있게 해줍니다.\n\n#b 화가#!는 조국을 위해 회화 작품과 #b 걸작#!을 제작하며 상당한 양의 #b 회화 전통#!을 선사합니다. #b 화가#!들에게는 전공으로 삼을 수 있는 다채로운 [Concept('concept_artists_art_style','$concept_artists_art_styles$')]이 존재하므로, [concept_klimt_painter_trip]을 통해 #b 예술 양식#!을 추가로 배우게 할 수 있습니다. 40세를 넘긴 #b 화가#!는 자신이 배운 #b 예술 양식#! 중 하나를 특화 분야로 선택하여, 해당 #b 예술 양식#!으로 된 회화 작품 제작에 집중하게 될 것입니다."
 concept_artists_art_style: "예술 양식"
 concept_artists_art_styles: "예술 양식"
 concept_artists_art_style_style: "양식"
 concept_artists_art_style_desc: "#b 예술 양식#!은 예술의 특정한 중점 요소를 말합니다. #b 고전주의#!나 #b 낭만주의#!처럼 처음부터 존재하는 #b 예술 양식#!도 있습니다. 나머지 예술 양식, #b 사실주의#!, #b 비합리주의#!, [concept_elgar_impressionism], [concept_elgar_expressionism], [concept_elgar_art_nouveau]는 어떤 환경을 충족해야 나타나게 됩니다. 모든 #b 예술 양식#!은 그것이 시작된 [concept_state_region]에 [concept_artists_center_of_arts]를 두고 있습니다."
 concept_klimt_painter_desc: "#PURPLE #b 화가#!#!는 회화와 그 밖의 미술 작품을 제작하는 인물입니다. #b 화가#!는 특수 인물 유형으로, 이벤트를 통해 획득하거나, [concept_artistic_progress]를 충분히 쌓아 국내에서 직접 배출하거나, [concept_klimt_independent_painter]를 섭외하는 방식으로 획득합니다.\n#b 화가#!는 곧바로 그림 그리기를 시작하며 본인의 [Concept('concept_character_trait','$concept_character_traits$')]에 따라 해마다 일정 수의 그림을 제작하게 됩니다. 간혹 #b 걸작#!을 그려내어 더 많은 [concept_klimt_painting_tradition]을 부여하기도 합니다.\n#b 화가#!는 [Concept('concept_klimt_painter_trip','$concept_klimt_painter_trip_journeys$')]으로 다채로운 [Concept('concept_artists_art_style','$concept_artists_art_styles$')]을 습득할 수 있습니다. #b 화가#!는 40세가 되면 하나의 #b 예술 양식#!을 전공으로 삼게 되며, 해당 양식으로 된 #b 걸작#!을 그려낼 수 있습니다."
 concept_klimt_independent_painter_desc: "국가에서 채용하지 않은 [Concept('concept_klimt_painter','$concept_klimt_painters$')]는 #b 독립 화가#!라고 합니다. #b 독립 화가#!는 해당 #b 화가#!의 문화와 [concept_discrimination_trait]을 공유하는 [Concept('concept_primary_cultures','$concept_primary_culture$')]을 지닌 국가로부터 채용될 수 있습니다.\n#b 독립 화가#!를 데려오려면 여러 가지 조건이 요구됩니다.#b 화가#!의 [concept_artists_experience]에 따라 #b 예술 학교#!와 특정 [Concept('concept_technology', '$concept_technologies$')]이나 [concept_klimt_painting_tradition]이 필요할 수 있습니다. 또한 화가의 #b 명성#!은 물론 조국의 재정 여건에 따라 일정 액수의 예산을 지불해야 합니다."
 concept_klimt_painter_trip_desc: "[concept_klimt_painter]는 [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] 중 한 곳으로 #b 유학#!을 떠나 새로운 [Concept('concept_artists_art_style','$concept_artists_art_styles$')]을 습득할 수 있습니다.\n그렇게 시작된 #b 유학#!에서 화가는 긍정적이거나 부정적인 [Concept('concept_character_trait','$concept_character_traits$')]을 획득하여 본인의 작품과 그려내는 그림 수에 영향을 끼치게 됩니다. #b 예술의 중심지#!는 서로 조금씩 다른 이벤트를 보유하고 있으며, 마무리되는 시점에서 #b 화가#!에게 고유의 #b 특성#!을 부여하는데 이는 훗날 #b 화가#!의 전공 양식으로 나아갈 수도 있습니다."
 concept_klimt_art_prize: "예술상"
 concept_klimt_art_prizes: "예술상"
 concept_klimt_art_prize_desc: "간혹 예술 대회가 개최되어 수상자가 발표되는데 이것으로 화가의 명성을 늘릴 수 있습니다. 비이성주의나 [concept_elgar_impressionism]의 [concept_artists_center_of_arts]를 지닌 국가는 5년 주기로 경쟁에 나설 최고의 음악가를 선발하게 됩니다. [concept_klimt_art_gallery]이나 #b 사실주의의 중심지#!를 보유한 국가는 미술 대회를 5년 주기로 개최할 수 있습니다. 수상자의 출신 국가는 음악과 회화 전통을 추가로 얻게 됩니다. 예술 대회의 특수 형태로 비엔날레가 있는데 2년 주기로 가장 많은 명성을 지닌 예술인의 보유국에 종합 예술상을 수여하는 행사이며, 모든 문화 전통을 추가로 늘려줍니다."
 concept_klimt_art_gallery: "미술관"
 concept_klimt_art_gallery_desc: "#b 미술관#!은 국가의 수도에 설치되는 특수 건물로, #b 사실주의#!를 연구하는 시점에서 이용할 수 있습니다. 이 때 나라에 중점 분야를 지닌 [concept_klimt_painter]를 두고 있어야 건설이 가능합니다. 중점 분야를 지닌 #b 화가#!는 본인의 [Concept('concept_artists_art_style','$concept_artists_art_style_style$')]으로 된 소장품을 해제하게 되는데, 이는 다시 말해 낭만주의 양식에 중점을 둔 화가는 낭만주의 소장품을 해제하게 됩니다. 지금의 소장품을 훌륭한 소장품으로 발전시키기 위해서는 해당 양식의 걸작이 필요한데, 반드시 화가가 직접 그리거나 해외에서 구입해 들여와야 합니다."
 concept_manzoni_writer_novelist: "소설가"
 concept_manzoni_writer_desc: "#b 작가#!는 당신의 국가를 위해 문학 작품을 집필하는 특수 인물입니다. #b 작가#!는 주로 [concept_manzoni_local_writer]로 시작해서 #b 출판물#!을 저술하며 간혹 [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')]도 내기도 합니다. #b 베스트셀러#!는 #b 작가#!에게 상당량의 [concept_artists_experience]을, 국가에게는 [concept_manzoni_literary_tradition]을 선사합니다. #b 베스트셀러#!는 #b 작가#!의 [concept_manzoni_genre]가 [concept_manzoni_popular_taste]과 얼마나 유사한가를 기준으로 집필될 확률이 해마다 생기게 됩니다. \n\n유명한 #b 작가#!는 본인의 [concept_interest_group]이 충분히 만족한 상태라는 조건에서 [concept_manzoni_national_writer]로 임명될 수 있습니다. #b 국민 작가#!는 [Concept('concept_manzoni_book_licence','$concept_manzoni_book_licences$')]를 받거나 신문 연재 소설을 집필할 수 있습니다. #b 작가#!가 #b 명성#! 500을 획득하면 [concept_manzoni_great_writer]가 되어 국가에 더 많은 #b 문학 전통#!을 선사합니다.\n\n#b 작가#!가 국가의 정치적 상황에 만족하지 못하면 [Concept('concept_agitator', '$concept_agitators$')]가 되거나 정계에 모습을 드러낼 수 있다는 점에 유의합시다."
 concept_manzoni_great_writer_desc: "#b 위대한 작가#!는 세계적으로 알려진 [concept_manzoni_writer]입니다. #b 작가#!가 [concept_artists_experience] #V 500#!을 획득하면 #b 위대한 작가#!로 거듭납니다. #b 위대한 작가#!가 [concept_manzoni_national_writer]인 상태라면 해마다 얻는 [concept_manzoni_literary_tradition]에 보너스를 부여하게 됩니다."
 concept_manzoni_local_writer_desc: "[concept_manzoni_writer]라면 거의 대부분 #b 지역 작가#!로 출발하게 됩니다. 한 국가당 최대 3명의 #b 지역 작가#!를 보유할 수 있으며, 주로 #b 출판물#!을 저술하는 활동에 나서지만, 본인의 [concept_manzoni_genre]가 [concept_manzoni_popular_taste]과 일치하면 [concept_manzoni_literary_tradition]을 부여하고 본인도 [concept_artists_experience]을 획득하게 됩니다.\n#b 지역 작가#!가 #b 명성#! 150에 도달하고 자신의 [concept_interest_group]이 불만족 상태가 아니라면 자국의 [concept_manzoni_national_writer]가 되어 더 많은 #b 문학 전통#!과 추가적인 이익을 거둘 수 있습니다.\n#b 작가#!가 국가의 정치적 상황에 만족하지 못하면 정계에 모습을 드러내거나 [concept_agitator]가 될 수 있다는 점에 유의합시다."
 concept_manzoni_national_writer: "국민 작가"
 concept_manzoni_national_writer_desc: "#b 국민 작가#!는 우리나라 문학을 대표하는 [concept_manzoni_writer] 유형입니다. #b 국민 작가#!는 최소 1에서 최대 5의 [concept_manzoni_literary_tradition]을 부여합니다.\n#b 국민 작가#!는 [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')] 중 한 명을 임명하는 방법으로 확보할 수 있습니다. 이 때 #b 지역 작가#!를 임명하려면 그 작가의 [concept_artists_experience]이 #V 150#! 이상이고 소속된 [concept_interest_group]이 긍정적인 [concept_approval]을 보유하고 있어야 합니다.\n"
 concept_manzoni_bestseller: "베스트셀러"
 concept_manzoni_bestsellers: "베스트셀러"
 concept_manzoni_bestseller_desc: "#b 베스트셀러#!는 [concept_manzoni_writer]의 #b 출판물#! 가운데 잘 팔리는 작품을 말합니다. 그 원인은 #b 작가#!의 [concept_manzoni_genre]가 현재 [concept_manzoni_popular_taste]과 일치하거나 유사하기 때문입니다.\n매년 [concept_manzoni_national_writer]나 [concept_manzoni_local_writer]가 #b 베스트셀러#!를 집필할 확률이 주어집니다. 첫번째 #b 베스트셀러#!는 많은 양의 [concept_manzoni_literary_tradition]을 선사하며, 이후의 모든 #b 베스트셀러#!는 국가에 상당량의 #b 문학 전통#!을 부여하게 됩니다."
 concept_manzoni_genre: "장르"
 concept_manzoni_genres: "장르"
 concept_manzoni_genre_desc: "모든 [Concept('concept_manzoni_writer','$concept_manzoni_writer_novelist$')]는 특정 #b 장르#!에 기반하여 글쓰기에 나서게 됩니다. #b 장르#!는 #b 작가#!가 생성될 때 처음 배정되며 이후로도 여러 요인에 기반하여 결정됩니다.\n#b 작가#!의 #b 장르#!가 국가의 [concept_manzoni_popular_taste]과 일치하거나 유사하다면 더 많은 [concept_artists_experience]을 받고 [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')]를 집필할 확률도 늘어나게 됩니다."
 concept_manzoni_popular_taste: "대중적 취향"
 concept_manzoni_popular_taste_audience: "독자의 취향"
 concept_manzoni_popular_tastes_audience: "독자의 취향"
 concept_manzoni_popular_taste_desc: "모든 국가의 국민들은 특정 [concept_manzoni_genre]를 #b 취향#!으로 삼고 있습니다. 대중의 #b 취향#!은 약 10년에 한번씩 변경되며, 국가의 정치, 사회, 문화적 변화에 기반하여 변경이 이루어집니다.\n대중의 #b 취향#!과 일치하거나 유사한 #b 장르#!를 선택한 [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]는 더 많은 [concept_artists_experience]을 획득하고 [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')]를 집필할 확률도 늘어나게 됩니다.\n\n#V 각 장르의 유사 장르는 다음과 같습니다.#!\n- #b $manzoni_taste_adventure_var_loc$#!: $manzoni_genre_science_fiction$, $manzoni_genre_juvenile$, $manzoni_genre_crime_mystery$\n- #b $manzoni_taste_crime_var_loc$#!: $manzoni_genre_science_fiction$, $manzoni_genre_adventure$, $manzoni_genre_romance$\n- #b $manzoni_taste_devotional_var_loc$#!: $manzoni_genre_juvenile$, $manzoni_genre_romance$, $manzoni_genre_adventure$\n- #b $manzoni_taste_juvenile_var_loc$#!: $manzoni_genre_adventure$, $manzoni_genre_devout$, $manzoni_genre_crime_mystery$\n- #b $manzoni_taste_literary_var_loc$#!: $manzoni_genre_social_critic$, $manzoni_genre_science_fiction$, $manzoni_genre_romance$\n- #b $manzoni_taste_romance_var_loc$#!: $manzoni_genre_devout$, $manzoni_genre_juvenile$, $manzoni_genre_literary_fiction$\n- #b $manzoni_taste_science_var_loc$#!: $manzoni_genre_adventure$, $manzoni_genre_social_critic$, $manzoni_genre_literary_fiction$\n- #b $manzoni_taste_social_var_loc$#!: $manzoni_genre_literary_fiction$, $manzoni_genre_juvenile$, $manzoni_genre_crime_mystery$"
 concept_manzoni_book_licence: "서적 출판 허가"
 concept_manzoni_book_licences: "서적 출판 허가"
 concept_manzoni_book_licence_desc: "해외 출판사들은 [concept_manzoni_national_writer]와 계약을 맺고 그 작가의 작품을 번역본으로 만들어 자국 시장에 출간할 수 있습니다. 이는 작가의 장르가 해당 국가의 [Concept('concept_manzoni_popular_taste','$concept_manzoni_popular_tastes_audience$')]과 일치할 때 발생합니다. 어느 작가가 다섯 국가에 출판 허가를 내주었다면 그 작가의 작품은 세계 문학으로 여겨집니다. 그렇게 되면 그 작가는 순회 낭독회에 나설 수 있습니다."
 concept_manzoni_local_writers: "지역 작가"
 concept_manzoni_library: "국립 도서관"
 concept_manzoni_library_desc: "#b 국립 도서관#!은 서적 소장품을 ([concept_production_method]의 형태로) 자동으로 수집하게 됩니다. 시작 단계의 서적 소장품은 국내 [concept_manzoni_publications]의 규모가 1,000편 이상에 도달할 때 생성됩니다. 그 이후로는 소장품이 각각 2,500편 (협소한 서적 소장품), 5,000편 (소규모 서적 소장품), 10,000편 (중규모 서적 소장품), 25,000편 (대규모 서적 소장품), 50,000편 (완벽한 서적 소장품), 100,000편 (위대한 서적 소장품)에 도달할 때마다 단계 승급이 이루어집니다."
 concept_manzoni_publications: "출판물"
 concept_manzoni_publications_desc: "#b 출판물#!은 한 국가 내에서 발행되는 신간 단행본, 신문, 에세이, 기타 저작물을 아우릅니다. 상품으로 유통되는 @manzoni_prints! $manzoni_prints$과는 다릅니다. 출판물은 출판 업계와는 독립적으로 발행될 수 있습니다. 예를 들어 정부 기관이나 대학의 자체 인쇄소를 통해 발행되는 식입니다. 학자나 개인 또한 출판물을 제작하며, 그 규모는 자신의 문해력 수준에 따릅니다. 다만 가장 큰 비중을 차지하는 것은 출판 업계로서 최신 생산 방식을 사용하고 있는지의 여부가 결정적인 요소입니다. 대량의 출판물은 [concept_manzoni_library]의 확장에 필수적입니다."
 concept_curtiss_tourism: "관광"
 concept_curtiss_tourism_desc: "관광은 우수한 문화를 지닌 국가에 추가 수입을 부여합니다. 고유의 기념 건축물, 박물관과 미술관, 고고학 유적, 예술의 중심지는 물론, 여러 문화 전통이 얼마나 높은가에 따른 요소들이 관광객들에게 매력적인 방문 국가로 만들 수 있습니다. 정치 운동과 경제 활동의 자유를 확대하는 법률 제정 또한 관광 수입을 높입니다. 기반 시설 역시 핵심적인 역할을 하는데 어쨌든 외딴 지역은 도달하기가 어렵기 때문입니다. 무엇보다도 공항을 지으면 관광에 큰 변화를 일으킬 수 있으며 수입 증대 효과도 상당합니다."
 concept_curtiss_private_airline: "민간 항공사"
 concept_mendelejew_chemist: "#b #ORANGE 화학자#!#!"
 concept_manzoni_literature: "문학 문화"
 concept_manzoni_literature_desc: "#b 문학 문화#!는 [concept_morgenroete]를 대표하는 요소 중 하나입니다. 출판 문화, 그 중에서도 신문 문화는 19세기와 20세기에 상당한 격변을 거쳤습니다. 출판 업계는 출판물의 대량 생산과 일상 생활의 수요를 대변합니다. 문학의 문화적 가치는 [concept_manzoni_literary_tradition]에 반영됩니다. 문학 전통은 해당 국가의 [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]가 크게 좌우하는데, 그 종류는 [Concept('concept_manzoni_local_writer','$concept_manzoni_national_writers$')]와 [Concept('concept_manzoni_national_writer','$concept_manzoni_local_writers$')]가 존재합니다. 이들이 구석에 갖혀 지낼지, 아니면 유명한 작가로 거듭날지는 [concept_manzoni_popular_taste]에 달려 있습니다."
 concept_morgenroete_desc: "#r 모르겐뢰테 - 정취의 여명#! (Morgenröte - Dawn of Flavor)은 빅토리아 3의 문화적, 과학적 면모를 넓히기 위해 제작된 모드입니다. 빅토리아 시대의 다양한 풍경을 담은 콘텐츠를 다음과 같이 선보이고 있습니다.\n\n#V 과학:#!\n #indent_newline:3 • Tesla: [concept_tesla_engineering]#!\n #indent_newline:3 • Mendeleev: [concept_mendelejew_chemistry]#!\n #indent_newline:3 • Verrier: [concept_verrier_astronomy]#!\n #indent_newline:3 • Agassiz: [concept_agassiz_geology]#!\n #indent_newline:3 • Dubois: [Concept('concept_dubois_natural_history','$concept_dubois_natural_history_paleontology$')]#!\n #indent_newline:3 • Ito: [concept_dubois_natural_history]#!\n #indent_newline:3 • Theiler: [concept_theiler_biology]#!\n #indent_newline:3 • Panum: [concept_panum_medicine]#!\n #indent_newline:3 • Lepsius: [concept_lepsius_archaeology]#!\n #indent_newline:3 • Andersson: [concept_andersson_anthropology]#!\n\n#V 예술:#!\n#indent_newline:3 • Gaudí: [concept_elgar_architecture]#!\n#indent_newline:3 • Elgar: [concept_elgar_music]#!\n#indent_newline:3 • Manzoni: [concept_manzoni_literature]#!\n#indent_newline:3 • Klimt: [concept_klimt_painting_culture]#!\n\n#V 체육:#!\n#indent_newline:3 • Douglas: [concept_douglas_mountaineering]#!\n#indent_newline:3 • Vikelas: [concept_vikelas_sports], [concept_vikelas_car_racing]#!\n#indent_newline:3 • Curtiss: [concept_curtiss_aviation]#!"
 concept_agassiz_mineral: "광물"
 concept_agassiz_minerals: "광물"
 concept_agassiz_mineral_desc: "광물은 산업에서 사용되는 기존 자원에 속하지 않는 모든 유형의 특수 암석을 일컫는 말입니다. #b 지질학#! 기술을 연구한 국가는 매년 한차례 일정량의 광물을 획득하게 됩니다. [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]가 재직 중에 있다면 광물을 추가로 찾아냅니다. 광물의 위치는 주 변화 요인에 따라 구분되며 그 종류로는 산맥, 사막, 극지, 원자재 매장지(석탄, 철광석, 유황 매장지 등), 지질학적 [Concept('concept_dubois_formation','$concept_dubois_formations$')](누층)과 화산이 있습니다. 사막과 극지방은 광물의 획득량이 낮은 수준인 데 반해 대규모 누층과 화산은 광물이 특히나 풍부한 지역으로 평가됩니다. 훨씬 더 귀한 형태의 광물은 [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]이라 부릅니다."
 concept_agassiz_rare_mineral: "희귀 광물"
 concept_agassiz_rare_minerals: "희귀 광물"
 concept_agassiz_rare_mineral_desc: "[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]는 [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')], [concept_douglas_mountaineering] 탐사, [concept_agassiz_volcano] 탐사, 광물 탐사 등의 여러 탐사를 통해 희귀 광물을 찾아낼 수 있습니다. 일반적인 [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]과는 달리 획득량이 극히 제한되어 있습니다. 희귀 광물은 광물 표본실을 개설할 때 사용됩니다."
 concept_agassiz_geologist: "#b #GREEN 지질학자#!#!"
 concept_agassiz_geologists: "#b #GREEN 지질학자#!#!"
 concept_agassiz_geologist_desc: "#b #GREEN 지질학자#!#!는 주로 암석과 지구의 역사를 전공으로 연구하는 [Concept('concept_academics_academic','$concept_academics_academics$')]입니다. 이들은 [Concept('concept_dubois_formation','$concept_dubois_formations$')], [Concept('concept_curie_uranium','$concept_curie_uranium$')] 광맥의 위치를 밝혀내어 [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_curie_physicist','$concept_curie_physicists$')]에게 없어서는 안 될 동료 학자로 활약합니다. 탐사 도중에는 [concept_mendelejew_chemist]가 [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]를 발견하거나 분리하는 데 쓰이는 [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]을 추가로 발견합니다. 희귀 원자재의 새로운 광맥을 찾아낼 수도 있습니다. 또한 화산학자로도 활동하여 현지 [Concept('concept_agassiz_volcano','$concept_agassiz_volcanoes$')]으로 탐사를 떠나 자세한 연구를 진행합니다. 지구의 내부 구조를 밝혀내기 위하여 [Concept('concept_tesla_engineer','$concept_tesla_engineers$')]와 함께 지진계를 비롯한 새로운 기계를 개발할 수도 있습니다. [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')]과 [concept_douglas_mountaineering] 원정에서도 지질학자들은 제 역할을 맡게 됩니다."
 concept_agassiz_volcano: "화산"
 concept_agassiz_volcanoes: "화산"
 concept_curie_physicist: "#b #ORANGE 물리학자#!#!"
 concept_curie_physicists: "#b #ORANGE 물리학자#!#!"
 concept_curie_physicist_desc: "#n 모르겐뢰테의 다음 버전을 기대해 주세요!#!"
 concept_curie_uranium: "우라늄"
 concept_curie_uranium_desc: "우라늄은 극도로 희귀한 물질로 역사상 실존했던 특정 지역에서만 [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]가 찾아낼 수 있습니다. 이를 위해서는 근대물리학을 반드시 연구해야 합니다. 언뜻 보았을 때 우라늄은 도자기 생산에만 쓰이는 부차적인 광물일 수 있습니다. 그러나 나중에는 특히 [concept_verrier_observatory]에 필요하게 됩니다. 핵물리학 분야에서든 이전에 알려지지 않았던 원소를 연구하든, 최적의 물리적, 화학적 생산 방식에 우라늄이 공급되어야 그 목적을 달성할 수 있게 됩니다. 우라늄이 없다면 방사능 분야의 모든 과학 연구가 불가능해져 버립니다. 따라서 우라늄은 빅토리아 3의 최종장에서 [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]와 [Concept('concept_curie_physicist','$concept_curie_physicists$')]에게 특히 중요한 의미를 지닙니다."
 concept_mendelejew_chemistry: "화학"
 concept_mendelejew_chemistry_desc: "#b 화학#!은 [concept_morgenroete]를 대표하는 요소 중 하나입니다. 18세기부터 #b 화학#!은 근대 과학으로 급속히 발달하게 되었습니다. 수많은 원소들이 갑자기 새로 발견되고 화학 공정도 개발되던 시대였습니다. 19세기와 20세기에는 신규 원소에서부터 다이너마이트나 하버-보슈법의 발명에 이르기까지 화학계에서의 여러 발견을 이룩하고 있었습니다.\n\n#b 모르겐뢰테#!에서 #b 화학#!은 [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]가 수행하게 되며 다양한 과제에 주력하게 됩니다.\n그 중 하나는 조국의 #b $building_chemical_plant$#!이나 #b $building_explosives_factory$#!, #b $building_synthetics_plant$#!를 개량하는 것으로서 각 [Concept('concept_building', '$concept_buildings$')]의 효율성을 증대시킵니다.\n이보다 좀 더 명예로운 과제라면 #b 화학자#!가 [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]를 이론화하고, 발견하고, 분리하도록 지시할 수도 있습니다. 각 원소를 이론화, 발견, 분리할 때마다 소량의 [concept_prestige]를 얻게 됩니다.\n게임 후반부에는 #b 화학자#!가 #b 합성유#!와 #b 합성 고무#! 개발에 나설 수도 있습니다. 이것으로 #b $building_mendelejew_hydrogenation_plants$#!과 #b $building_mendelejew_synthetic_rubber_factory$#!이 각각 해금됩니다."
 concept_mendelejew_chemists: "#b #ORANGE 화학자#!#!"
 concept_mendelejew_chemist_desc: "#b #ORANGE 화학자#!#!는 [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]를 이론화하고, 발견하고, 분리하는 [Concept('concept_academics_academic','$concept_academics_academics$')]입니다.\n#b #ORANGE 화학자#!#!는 #b 원소#!를 연구하거나 학술회의에 참석하면 [concept_academics_experience]를 획득합니다. 비료와 폭약, 합성 화학 물질의 생산도 개선시킬 수 있습니다. 화학자는 주기율표나 합성 연료를 발명할 수도 있으며 석유가 부족한 국가에 소중한 존재가 될 수 있습니다. 또 매년 #b 경험치#!를 자동으로 획득하여, #b #ORANGE 화학자#!#!가 더 나은 화학자 특성을 보유할 수 있게 만듭니다. 임명 시나 특정 이벤트를 통해 특성화(이론가, 전문가, 조사관)를 선택할 수도 있습니다."
 concept_mendelejew_element: "화학 원소"
 concept_mendelejew_element_no_chemical: "원소"
 concept_mendelejew_elements: "화학 원소"
 concept_mendelejew_element_desc: "예로부터 이 세상이 불, 흙, 물, 공기의 4원소로 구성되어 있다는 믿음이 널리 퍼져 있었습니다. 연금술에서 화학이 분리되기 시작하면서 화학 원소의 과학적 분석도 이루어지기 시작했습니다. 하지만 19세기만 하더라도 이 과정은 완벽함과는 거리가 멀었습니다.\n\n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]는 한번에 하나의 원소를 가지고 이론화, 발견, 분리하는 식으로 원소 연구를 진행할 수 있습니다. 원소가 분리되어야만 제대로 된 원소로 공인받고 이름을 붙일 수 있으며 그 전까지는 번호로만 구분됩니다. 원소의 분류는 학자 양성 진행도와 화학자의 [concept_academics_experience]를 늘려 줍니다.\n모든 원소를 처음부터 이론화, 발견, 분리할 수 있는 것은 아닙니다.\n그 전제로 [concept_verrier_observatory]의 화학 실험실에 적절한 장비가 갖춰져야 하며, 경우에 따라서는 근대물리학 연구소를 차려야 합니다. 분광학을 통해서만 제대로 연구할 수 있는 원소들도 많습니다. 게임 후반부에는 사이클로트론도 필요할 수 있습니다. 화학 원소의 발견과 분리에는 [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]이 필수적입니다. 생산 방식은 물론 화학자의 경험치와 인물 특성이 연구 기간에 결정적인 역할을 합니다.\n\n원소 연구는 주기율표의 개발과 화학 학술회의의 개최를 하는 데에도 필요합니다."
 concept_verrier_meteorite: "운석"
 concept_verrier_meteorites: "운석"
 concept_manzoni_national_writers: "국민 작가"
 concept_verrier_astronomy_desc: "#b 천문학#!은 [concept_morgenroete]를 대표하는 요소 중 하나입니다.\n\n#b 천문학#!을 하려면 [concept_verrier_observatory]나 [concept_verrier_astronomer]가 필요합니다.\n\n천문대를 갖추면 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]를 자동으로 발견하게 됩니다.\n\n[concept_verrier_astronomer]가 있다면 행성, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')]을 새로 찾아내고 [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')]을 촬영하는 등의 활동에도 나설 수 있게 됩니다.\n간혹 [concept_agassiz_geologist]가 찾아내는 [Concept('concept_verrier_meteorite','$concept_verrier_meteorites$')]은 #b 천문학자#!와 [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]가 조사에 나설 수 있습니다.\n\n천문학 발견을 이룩할 때마다 [concept_verrier_astronomical_prestige]을 부여받게 되며 국가의 전체 [concept_prestige]에 추가됩니다. #b 천문학계 위신#!이 얼마나 되는지를 보시려면 $verrier_astronomical_prestige_modifier$ [concept_modifier]을 확인해 보십시오."
 concept_verrier_observatory_desc: "#b 천문대#!는 한 세기 동안의 [concept_verrier_astronomy]과 [concept_mendelejew_chemistry]의 중추를 이룹니다. 이곳에서 [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]는 행성과 [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')]을 발견하고 [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')]을 촬영할 수 있습니다.\n#b 천문대#!를 건설하려면 대학 하나가 필요하며 $verrier_astronomy_tech$이나 $verrier_chemistry_tech$ [concept_technology]의 연구가 완료되어야 합니다. 또한 #b 천문대#!는 자국의 수도에 단 한번만 건설할 수 있습니다."
 concept_verrier_astronomer_desc: "#b 천문학자#!는 밤하늘을 탐색하여 [Concept('concept_verrier_satellite','$concept_verrier_satellites$')]과 [Concept('concept_verrier_comet','$concept_verrier_comets$')], [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]를 발견하는 학자입니다.\n#b 천문학자#!는 #b 천체#!를 발견하거나 학술회의에 참석하면 [concept_academics_experience]를 획득합니다. #b 경험치#!는 매년 자동으로 쌓이기도 합니다. 이것으로 #b 천문학자#!의 인물 특성이 더 좋은 것으로 승급될 수 있습니다.\n\n#b 천문학자#!는 새로운 #b 위성#! 탐색이나 #b 월면 사진 촬영#!에 주력할 수 있습니다. 다만 이 과정에서 발견하는 #b 천체#!의 수가 감소하게 됩니다."
 concept_verrier_astronomical_prestige: "천문학계 위신"
 concept_verrier_astronomical_prestige_desc: "#b 천문학계 위신#!은 천문학 연구로 획득하는 [concept_prestige]의 양입니다. #b 천문학계 위신#!에 영향을 주는 요인은 여러 가지가 있니다.\n- 신규 행성을 발견하면 발견 난이도에 따라 #V 15#!에서 #V 100#!의 위신을 줍니다.\n- [concept_verrier_satellite]을 발견할 때마다 10의 위신을 줍니다.\n- [Concept('concept_verrier_moon_photo','$concept_verrier_moon_map$')]을 완성하면 #V 25#!의 위신을 줍니다.\n- 대혜성은 10의 위신을 줍니다.\n- [concept_verrier_meteorite]을 발견할 때마다 #V 1#!의 위신을 줍니다.\n- #V 100개#!의 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]를 발견할 때마다 #V 1#!의 위신을 줍니다."
 concept_verrier_astronomical_object_desc: "#b 천체#!는 당신이 발견하는 소행성과 별을 일컫는 말입니다. 천체는 [concept_verrier_observatory]가 있어야 발견할 수 있습니다. 천문학 기술이 더 뛰어날 수록 찾아내는 천체의 수도 많아집니다. [concept_verrier_astronomer]를 두고 있다면 더 많은 #b 천체#!를 발견할 수 있습니다.\n#b 천체#!의 수가 충분하다면 새로운 행성을 발견하거나 천체물리학 기술을 개발할 수 있게 됩니다."
 concept_verrier_moon_map: "월면도"
 concept_verrier_moon_photo_desc: "[concept_verrier_observatory]를 보유한 상태에서 카메라 기술을 연구하였다면, [concept_verrier_astronomer]에게 달 표면의 촬영을 개시하라는 지시를 내릴 수 있습니다. 이 과정에서 #b 천문학자#!가 해마다 찾아내는 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]의 양은 감소하는 대신, 일정량의 #b 월면 사진#!을 획득하게 됩니다.\n#b 월면 사진#!을 충분히 모았다면, 지구의 동반자를 정확히 그려낸 지도를 제작할 수 있게 됩니다. 월면도 제작을 완수한 국가는 일정한 [concept_verrier_astronomical_prestige]을 얻게 됩니다."
 concept_verrier_satellite: "위성"
 concept_verrier_satellites: "위성"
 concept_verrier_satellite_desc: "#b 위성#!은 행성을 공전하는 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]입니다. #b 위성#! 가운데에는 지구의 달처럼 이미 발견된 것도 있지만, [concept_verrier_astronomer]로 하여금 추가로 찾아낼 수 있습니다.\n각 #b 위성#!을 발견할 때마다 소량의 [concept_verrier_astronomical_prestige]를 부여받게 됩니다."
 concept_verrier_meteorite_desc: "운석은 우주에서 기원하여 지구 대기를 뚫고 지표면에 도달하는 비교적 작은 고체 형태를 말합니다. 드물지만 유성우가 내린 뒤에 운석 조각이 발견되기도 합니다. 수천년 전 지구에 떨어진 운석은 사막이나 북극 지형 같은 험준한 지형에서 [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]가 찾아낼 수도 있습니다. [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]나 [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]가 특히 운석에 관심을 두고 있으며 분석해 보기를 희망할 수도 있습니다.\n\n또한 #b 운석#!으로 [concept_agassiz_geological_score]를 높이고 [concept_agassiz_age_of_earth]를 더욱 정확하게 추산할 수도 있습니다."
 concept_agassiz_volcano_desc: "#b 화산#!은 #r 모르겐뢰테#!의 새로운 주 특성입니다. 빅토리아 3의 기본 게임과는 달리 화산 분화 발생 여부는 전략 지역이 아니라 화산이 있는 주와 연관되어 있습니다. 화산 활동은 그 규모가 훨씬 크지만 항상 파멸적인 결과로 이어지지는 않습니다. 화산이 있는 국가에서는 #b $building_agassiz_volcano_observatory$#!를 지을 수 있는데, 관측을 통해 분화를 예측하고 그로 인한 피해를 누그러뜨리는 데 보탬이 될 뿐만 아니라 화산 탐사에 나설 수 있는 기회로도 작용합니다. [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]는 화산 탐사를 통해 새로운 [concept_agassiz_geological_knowledge]과 [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')], 경험치와 화산학자 특성을 획득할 수 있습니다."
 concept_agassiz_geological_knowledge: "지질학 지식"
 concept_agassiz_geological_knowledge_desc: "#b 지질학 지식#!에는 특정 국가의 지구 환경에 관한 전반적인 이해를 다룹니다. 매우 희귀한 자원으로서 주로 지질학계의 이정표를 세우는 과정에서 얻을 수 있습니다. #b 지질학 지식#!은 [concept_agassiz_geological_score]와는 다르지만 그것을 구성하는 가장 중요한 요소이며 특히나 가치 있는 요인으로 평가됩니다."
 concept_agassiz_geological_score: "지질학 점수"
 concept_agassiz_geological_score_desc: "#b 지질학 점수#!에는 지질학과 관련된 특정 국가의 업적이나 지식을 두루 포함합니다. 가장 중요한 요인은 [concept_agassiz_geological_knowledge]이지만 그 밖에도 중요한 요소들이 존재하는데, [concept_agassiz_geologist]의 경험치, [concept_agassiz_oceanographic_knowledge], [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]과 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')], [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]의 개수, 지질학 기술 등이 해당됩니다. 지질학 점수는 [concept_agassiz_age_of_earth]를 다시 측정하는 데에도 결정적으로 작용합니다."
 concept_agassiz_oceanographic_knowledge: "해양학 지식"
 concept_agassiz_oceanographic_knowledge_desc: "#b 해양학 지식#!은 [concept_agassiz_geological_knowledge]의 일부를 이루며, 특히 해류를 비롯한 해양 관련 지식 뿐만 아니라, 지구물리학적 고찰이 병행되는 일반해양 연구에도 부응합니다. #b 해양학 연구#!는 주로 [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')]에서 얻을 수 있습니다. [concept_agassiz_geological_knowledge]을 입수하려면 #b 해양학 연구#! 50이 필요합니다."
 concept_agassiz_age_of_earth: "지구의 나이"
 concept_agassiz_age_of_earth_desc: "#b 지구의 나이#!는 19세기 최대의 난제로 꼽혔습니다. 이는 자연사, 특히 진화론의 타당성과 지질학적 사건의 순서에 중대한 영향을 끼쳤습니다. 지구의 나이를 새로 산정하는 것은 [concept_agassiz_geologist]만이 할 수 있습니다. 이를 위해서는 지질학자의 소속 국가가 지난번의 나이를 산정한 국가보다 높은 [concept_agassiz_geological_score]를 확보해야 합니다. 그런 다음에 자신의 연구 결과를 다른 동료 학자들과 공유하게 됩니다. 반드시 성공해야 하는 것은 아니며, 너무 어리거나 경험이 부족한 지질학자는 인정받지 못할 수도 있습니다. 그러나 오랫동안 새로운 이론이 제시되지 않은 경우에는 외국에서 한층 더 관대한 자세로 대할 수도 있습니다. 지질학자는 일생에 한 번씩만 지구의 나이를 산정할 수 있지만 이것 역시 성공에 이르렀을 때의 이야기입니다. 실패하더라도 일정 기간의 동기부여 기간을 거쳐 다시 시도할 수 있습니다."
 concept_agassiz_geology: "지질학"
 concept_agassiz_geology_desc: "#b 지질학#!은 [concept_morgenroete]를 대표하는 요소 중 하나입니다. 빅토리아 시대가 도래하기 전에도 지질학은 이미 상당한 발전을 이룩하였는데 이는 수많은 국가들이 게임 시작부터 지질학에 나설 수 있는 이유이기도 합니다.\n\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]는 다양반 방면으로 활용할 수 있습니다. 지질학 연구를 통해 [Concept('concept_dubois_formation','$concept_dubois_formations$')], [Concept('concept_andersson_cave','$concept_andersson_caves$')], [concept_curie_uranium] 매장지를 찾거나, [concept_agassiz_volcano] 탐사에 나서고, [concept_agassiz_age_of_earth]를 산정하고, [concept_dubois_pacific_expedition]과 [concept_douglas_mountaineering] 원정에서 과학 동행자로서 합류하여 제 역할을 다할 수 있습니다. [concept_agassiz_geological_score]는 한 국가의 전반적인 지식을 계산하며 지구의 나이를 산정하는 데에 핵심적인 요소로 작동합니다. [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]과 [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]은 지질학의 핵심적인 요소로서, 후자의 경우 [concept_dubois_zoo]에 광물 표본실을 개설할 수 있게 만듭니다. 특수 지질학 시설로 #b $building_agassiz_volcano_observatory$#!가 있으며, 화산학과 지진학 연구를 수행합니다."
 concept_theiler_biologist: "#b #GREEN 생물학자#!#!"
 concept_theiler_biologists: "#b #GREEN 생물학자#!#!"
 concept_theiler_biologist_desc: "생물학자는 생명의 모든 면모를 연구하는 [concept_academics_academic]입니다.\n[concept_morgenroete]에서 생물학자는 주로 [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]을 연구하고, 농업을 개량하고, [Concept('concept_theiler_pest','$concept_theiler_pests$')]에 맞서 싸우고, [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')]와 [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]를 탐색할 책임을 맡습니다.\n생물학자는 과제를 마무리하거나 자동으로 [concept_academics_experience]를 획득하게 됩니다."
 concept_gaudi_architect: "#b #PURPLE 건축가#!#!"
 concept_gaudi_architects: "#b #PURPLE 건축가#!#!"
 concept_academics_university_specialization_desc: "각 대학은 생산 방식을 변경함으로써 분야별 특화가 가능합니다.\n[concept_pm_academics_university_humanities]으로 설정된 대학은 국가의 연구 방향을 사회 기술로 설정하고 [Concept('concept_panum_physician','$concept_panum_physicians$')], [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')], [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')]에 한하여 모집할 수 있게 됩니다.\n[concept_pm_academics_university_natural_history]로 설정된 대학은 국가의 연구 방향을 사회 기술로 설정하고 [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')], [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')], [Concept('concept_theiler_biologist','$concept_theiler_biologists$')]에 한하여 모집할 수 있게 됩니다.\n[concept_pm_academics_university_mathematics]로 설정된 대학은 국가의 연구 방향을 생산과 군사 기술로 설정하고 [Concept('concept_tesla_engineer','$concept_tesla_engineers$')], [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')], [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]에 한하여 모집할 수 있게 됩니다.\n특화 분야를 변경하면 [concept_academics_academic_confusion]으로 이어져 대학과 [concept_academics_progress]에 #n 단기적인 부정적 영향#!을 줄 수 있습니다.\n특화 분야가 설정된 대학은 여러 과제에도 영향을 끼칩니다. 이를테면 $concept_pm_academics_university_mathematics$로 설정된 대학은 공학 사업에 보탬이 됩니다."
 concept_pm_academics_university_humanities_desc: "인문-인류학 중점은 대학의 특화 분야로서 사회 연구의 국가적 초점을 결정하고, [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')]와 [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')]를 모집하는 데 특화되어 있습니다. 현재 적용된 생산 방식을 변경하면 대학에 #n 부정적 산출량 변화 요인#!을, [concept_academics_progress]에 #n 부정적 효과#!를 얻게 됩니다.\n대학 특화 분야를 인문-인류학 중점으로 설정하면 탐사 성공 확률 보너스를 얻게 되며 (특화 대학 40단계로 최대 4점), 그 밖의 과제에서도 진행도를 늘려 주게 됩니다."
 concept_pm_academics_university_natural_history_desc: "자연사 중점은 대학의 특화 분야로서 사회 연구의 국가적 초점을 결정하고, [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')], [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')], [Concept('concept_theiler_biologist','$concept_theiler_biologists$')]를 모집하는 데 특화되어 있습니다. 현재 적용된 생산 방식을 변경하면 대학에 #n 부정적 산출량 변화 요인#!을, [concept_academics_progress]에 #n 부정적 효과#!를 얻게 됩니다.\n대학 특화 분야를 자연사 중점으로 설정하면 자연과학자들의 여러 과제에서 보너스가 부여됩니다."
 concept_pm_academics_university_mathematics_desc: "수학-기술 중점은 대학의 특화 분야로서 생산과 군사 연구의 국가적 초점을 결정하고, [Concept('concept_tesla_engineer','$concept_tesla_engineers$')], [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]를 모집하는 데 특화되어 있습니다. 현재 적용된 생산 방식을 변경하면 대학에 #n 부정적 산출량 변화 요인#!을, [concept_academics_progress]에 #n 부정적 효과#!를 얻게 됩니다.\n대학 특화 분야를 수학-기술 중점으로 설정하면 [Concept('concept_tesla_engineer','$concept_tesla_engineers$')]와 [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]의 여러 과제에 보너스를 부여하게 됩니다."
 concept_panum_physician: "#b #BLUE 의사#!#!"
 concept_panum_physicians: "#b #BLUE 의사#!#!"
 concept_panum_physician_desc: "#b #BLUE 의사#!#!는 [concept_panum_medicine] 분야에서 활동하고 연구하는 [Concept('concept_academics_academic','$concept_academics_academics$')]입니다. 이들의 주 업무는 [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')], [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] 발견입니다. 의학 연구를 증진시키고, 보건 환경을 개선하며, 다른 인물들을 치료할 수도 있습니다.\n의사는 업무 과정에서, 그리고 해마다 자동으로 [concept_academics_experience]를 획득합니다. #b 경험치#!를 충분히 획득하면 더 좋은 단계의 의사 특성을 확보하게 됩니다."
 concept_panum_medicine: "의학"
 concept_panum_medicine_desc: "빅토리아 3 [concept_morgenroete] 모드에서 의학은 가장 큰 확장 기능에 해당됩니다. 그 중에서도 중점을 두고 있는 것은 콜레라, 결핵, 발진티푸스와 같은 유행성 [Concept('concept_panum_disease','$concept_panum_diseases$')]인데, 이들 질병은 수 세기 동안 인류를 괴롭혀 왔으며 마침내 과학의 발전으로 통제가 가능해졌습니다. 따라서 유행성 질병이란 [concept_morgenroete]에서 소개하는 부정적 이벤트 중 하나인 것입니다. 또한 [concept_panum_disease_treatment]을 찾아 질병을 억제하는 것이 훨씬 더 중요합니다. 그렇기에 의학의 핵심 요소는 인문-인류학 대학 특화 분야에서 활동하는 학자 중 하나인 [concept_panum_physician]가 되겠습니다. 의사는 유행성 질병을 기록하고 치료법을 찾습니다. 치료법은 일반적으로 [concept_panum_disease_description]와 특정 기술을 필요로 합니다. 의사는 의학 기술 연구를 향상시키거나 병원을 통해 보건 환경을 확대시키고, 새로운 의료 기술을 도입하거나 다른 인물을 치료할 수도 있습니다. 의학 학술회의는 의학 지식을 국제적으로 전파하는 데 도움이 됩니다. 의학 현대화의 중요한 단계로 미아스마 이론에서 [concept_panum_germ_theory]으로의 전환도 있습니다. 의학적 발견의 선두 국가는 높은 [concept_panum_medical_prestige]을 자랑하게 됩니다."
 concept_panum_disease: "질병"
 concept_panum_diseases: "질병"
 concept_panum_disease_desc: "질병은 일반적으로 몇 년에 한 번씩 특정 국가에 영향을 끼칠 수 있는 전염병을 가리키는 말입니다. [concept_panum_physician]는 [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')]과 [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] 보급으로 대응에 나설 수 있습니다. 전염병은 동시에 발병하지 않는 경우가 일반적이며 전염병이 다시 발생하려면 일정한 시간이 소요됩니다. 전염병은 그 유형에 따라 일정한 파괴 효과를 지니며 여러 주에 걸쳐 전파될 수 있습니다. [concept_panum_disease_prevention] 방법에는 여러 가지가 존재하며, 이를 통해 질병의 발병을 지연시키거나 그 영향을 누그러뜨릴 수 있습니다. 질병의 유발 요인은 매우 다양할 수 있습니다. 황열병은 열대 지역에서만 발생하고, 콜레라와 결핵은 어느 정도 도시화가 이루어져야 위력을 발휘합니다. 특정 주의 삶의 질과 황폐화 수준도 중요한 역할을 합니다.\n\n특히나 우려되는 전염병 뿐만 아니라 의사가 의학 연구 중에 무작위로 검사할 수 있는 일상적인 질병도 존재합니다. 그 종류로는 구루병, 펠라그라, 매독 등이 존재합니다.\n\n질병의 종류는 다음과 같습니다.\n #indent_newline:3 • [GetHarvestConditionType('panum_cholera_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_tuberculosis_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_smallpox_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_typhus_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_yellow_fever_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_measles_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_scarlet_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_plague_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_diphteria_condition').GetName]#!\n #indent_newline:3 • [GetHarvestConditionType('panum_polio_condition').GetName]#!"
 concept_panum_disease_description: "질병 기록"
 concept_panum_disease_descriptions: "질병 기술"
 concept_panum_disease_description_desc: "질병 기록(기술)은 [concept_panum_disease]을 이해하기 위한 첫걸음에 해당됩니다. 유행병의 심각성에는 별다른 영향을 미치지 못하지만, [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')]과 [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')], [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]을 찾는 과정의 근간이 됩니다. 질병을 기록하는 데에는 추가적인 조건이 존재하진 않으며, 오로지 전염성 질병과 [concept_panum_physician]만 필요합니다."
 concept_panum_disease_treatment: "질병 치료"
 concept_panum_disease_treatments: "질병 치료"
 concept_panum_disease_treatment_desc: "[concept_panum_physician]는 적절한 기술과 [concept_panum_disease_description]가 주어지면 긴 과정을 거쳐 [concept_panum_disease]의 치료법을 알아낼 수 있습니다. 여기서 치료란 완치가 아닙니다. 그 대신 질병의 원인을 규명하고 그것을 기반으로 해당 질병의 유행을 예방하거나 상당 수준 제한할 방법을 개발하게 됩니다. 질병 치료법은 전염병의 유행 기간을 몇 달에서 몇 주 수준으로 단축하며 여러 주로 전파되는 것을 막게 됩니다. 질병 치료법은 전염병 유행에 맞서 실시할 수 있는 [concept_panum_disease_prevention]의 하나이기도 합니다."
 concept_panum_disease_prevention: "질병 예방"
 concept_panum_disease_prevention_no_disease: "예방"
 concept_panum_disease_prevention_desc: "[concept_panum_disease] 유행을 방지하거나 최소한 누그러뜨릴 수 있는 방법에는 여러 가지가 존재합니다. 가장 대표적인 방법은 [concept_panum_physician]가 [concept_panum_disease_treatment]을 개발하는 것입니다. 질병의 확산 기간을 크게 단축시키고 다른 나라로 전파될 가능성도 줄여줍니다. 삶의 질, 병원 시설, 기술력, 보건부의 상위 단계 도달 여부도 영향을 끼칩니다. 궁극적인 예방책은 질병 발생 자체를 막는 [concept_theiler_vaccine]입니다. 백신은 [Concept('concept_theiler_biologist','$concept_theiler_biologists$')]가 개발할 수 있습니다. 그러나 백신의 접종과 보급은 보건부의 단계가 의과 대학에서 정한 수준에 도달해야 효과를 볼 수 있습니다. 무엇보다 백신의 보급은 체계화와 감독이 필요합니다."
 concept_panum_disease_type: "질병 유형"
 concept_panum_disease_types: "질병 유형"
 concept_panum_disease_type_desc: "전염성 [Concept('concept_panum_disease','$concept_panum_diseases$')]은 확산 정도에 따라 구분이 가능합니다. #V 지역 질병#!은 발병한 주에만 국한되는 질병으로 성홍열이 그 예시입니다. #V 권역 질병#!은 인근 주로 확산될 수는 있지만 그 이상으로 퍼지지 않는 질병으로 결핵이 그 예시입니다. #V 초권역 질병#!은 각 주가 서로 인접하지 않더라도 전국에 걸쳐서 확산될 수 있는 질병으로, 제일 악명 높은 예시로는 콜레라가 있습니다."
 concept_panum_local_disease: "지역 질병"
 concept_panum_local_diseases: "지역 질병"
 concept_panum_regional_disease: "권역 질병"
 concept_panum_regional_diseases: "권역 질병"
 concept_panum_transregional_disease: "초권역 질병"
 concept_panum_transregional_diseases: "초권역 질병"
 concept_panum_germ_theory: "매균설"
 concept_panum_germ_theory_desc: "매균설은 19세기 의학의 근간을 이룬 과학적 진전으로 꼽힙니다. 예로부터 [Concept('concept_panum_disease','$concept_panum_diseases$')]의 원인을 설명하기 위한 시도가 이어졌고 그 가운데 '미아즈마설(장기설)'이 대표 학설로 당대 유럽에 널리 퍼져 있었으나, 이러한 구식 이론들을 매균설이 대체하게 된 것입니다. 매균설은 그것을 처음으로 발견한 국가만 이익을 보는 것은 아닙니다. [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')]을 찾는 과정에서 매균설은 부정적 결과를 차단하고 긍정적인 결과를 더 많이 이끌어낸다는 점에서 성공 확률을 높여주게 됩니다."
 concept_panum_medical_prestige: "의학계 위신"
 concept_panum_medical_prestige_desc: "의학계 위신은 현재까지 발견한 [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] (2점), [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] (4점), [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] (3점), [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] (4점)을 합산하여 결정됩니다. 처음으로 발견한 것은 점수가 2배로 산정됩니다. [concept_panum_physician]를 활용하여 일상적인 질병을 치료하거나, 특별한 치료법을 발명하거나, 의료 체계를 전반적으로 개선함으로서 의학계 위신을 높일 수 있습니다."
 concept_theiler_pathogen: "병원체"
 concept_theiler_pathogens: "병원체"
 concept_theiler_pathogen_desc: "병원체는 [concept_panum_disease]을 유발하는 어떤 실체를 가리키는 말입니다. 그 정체는 특정 유기체에서 [concept_theiler_microorganism]까지 모든 것이 해당될 수 있지만, 박테리아나 기생충, 바이러스인 경우가 흔합니다.\n[concept_theiler_biologist]는 미생물을 충분히 모아 활용할 수 있다면 질병의 원인으로 작용하는 병원체의 탐색에 나설 수 있습니다. 이것으로 질병 예방과 [concept_theiler_vaccine]의 개발 및 생산에 도움이 됩니다."
 concept_theiler_vaccine: "백신"
 concept_theiler_vaccines: "백신"
 concept_theiler_vaccine_desc: "백신의 개발로 인류는 [Concept('concept_panum_disease','$concept_panum_diseases$')]에 감염되지 않고도 면역력을 얻을 수 있게 되어 수백만 명의 생명을 구할 수 있게 됩니다.\n백신을 개발하려면 우선 [concept_theiler_biologist]가 질병의 원인이 되는 [concept_theiler_pathogen]를 찾아내야 합니다. 그런 뒤 사용 가능한 [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]의 양이 충분하다면 백신 개발을 시작할 수 있습니다."
 concept_panum_red_cross: "적십자"
 concept_panum_red_cross_desc: "적십자는 최초의 국제 기구 중 하나로, 드물지만 전시에 적십자 의료진의 지원을 받을 수 있는 기회를 제공합니다. 적십자의 가입국은 특정 보너스도 얻게 됩니다. 게임 규칙에 따라 적십자는 실제 역사에 따라서, 또는 유동적으로 설립할 수 있으며, 승인국의 경우 특정 기술 조건을 충족하면 가입이 가능합니다. 창설국은 수도에 적십자 본부를 두게 됩니다. 가입국은 국제법상 구속력을 갖는 [Concept('concept_panum_convention','$concept_panum_conventions$')]을 최대 3차에 걸쳐 서명할 수 있습니다."
 concept_panum_convention: "국제 협약"
 concept_panum_conventions: "국제 협약"
 concept_panum_convention_desc: "국제 협약은 국제 교섭을 통해 게임 내에 특정 규칙을 수립하기 위한 국가 간의 공동 선언입니다. 19세기에는 제네바 협약이나 헤이그 육상전 수칙 등 여러 사례가 존재하였습니다. 모든 협약의 공통점은 전쟁의 참혹함을 누그러뜨리려는 것이었습니다. 이에 따라 군사적 선택보다는 부상자를 안전히 치료하는 것이 우선시되고, 최후의 수단으로 무기 사용을 금지하여 전쟁 확산을 어느 정도 억제하는 효과를 가져옵니다. 이러한 협약의 장점은 유연성을 확대한다는 것입니다. 협약을 채택하면 우호적인 평가를 불러오지만 파기하면 국제적인 분노를 초래할 수 있습니다.\n\n국제 협약은 일반적으로 구속력이 없는 선언입니다. 다만 일정 수의 [concept_panum_red_cross] 가입국이 서명한다면 시간이 지나면서 유효한 국제법이 되며, 모든 서명국은 이를 준수해야 합니다. 이와 더불어 다른 가입국들도 서명에 나서게 됩니다. 이는 전체 가입국의 65% 이상, 강대국의 과반수가 협약에 동의하면 발생하게 되며, 그 이후에는 모든 가입국이 준수해야 합니다. 이 시점에서 더 이상 통상적인 방법으로 협약을 파기할 수 없으며, 구속력 있는 협약을 피하려면 적십자에서 완전히 탈퇴하고 모든 결과를 감수해야 합니다."
 concept_manzoni_literary_tradition_desc: "#b 문학 전통#!은 한 국가의 문학적 성과와 전통을 나타냅니다.\n#b 문학 전통#!을 획득하는 데에는 여러 가지 방법이 있습니다. 최소 하나 이상의 $building_art_academy$를 보유하거나, 한 명 이상의 [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')]와 [concept_manzoni_national_writer]를 보유하거나, [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')]를 보유하면 당신의 국가에서 #b 문학 전통#!을 자동으로 획득하게 됩니다.\n국가가 획득하는 #b 문학 전통#!이 많아질수록 획득하는 위신 보너스도 높아집니다. 여기에 [concept_elgar_expressionism] [concept_artists_art_style]을 해제할 수 있습니다."
 concept_elgar_musical_tradition_desc: "#b 음악 전통#!은 한 국가의 음악적 성과와 전통을 나타냅니다.\n#b 음악 전통#!을 획득하는 데에는 여러 가지 방법이 있습니다. 최소 하나 이상의 [concept_elgar_opera]을 보유하면 당신의 국가에서 #b 음악 전통#!을 자동으로 획득하게 됩니다. #b 오페라 극장#!의 수와 규모가 커질수록 획득하는 양도 늘게 됩니다. 음악과 예술 관련 기술을 연구하여 #b 음악 전통#!을 추가로 획득할 수도 있습니다. 각 기술마다 전혀 다른 보너스가 부여됩니다. [concept_elgar_composer]를 두고 있는 경우 이벤트를 통해서도 #b 음악 전통#!을 확보할 수 있습니다.\n국가가 획득하는 #b 음악 전통#!이 많아질수록 획득하는 위신 보너스도 높아집니다. 여기에 [concept_elgar_impressionism] [concept_artists_art_style]을 해제할 수 있습니다."
 concept_klimt_painting_tradition_desc: "#b 회화 전통#!은 한 국가의 회화적 성과와 전통을 나타냅니다. #b 예술 학교#!나 [concept_klimt_painter]를 보유했거나, 특정 [Concept('concept_technology', '$concept_technologies$')]을 연구했거나, 이벤트를 통해서 획득할 수 있습니다.\n#b 회화 전통#!으로 [concept_elgar_art_nouveau] [concept_artists_art_style]을 해제할 수 있으며 #b 문화 전통#!을 산정하는 데에도 사용됩니다."
 concept_mendelejew_theorized_elements: "이론화된 원소"
 concept_mendelejew_discovered_elements: "발견된 원소"
 concept_mendelejew_isolated_elements: "분리된 원소"
 concept_panum_psycho_point: "심리치료 점수"
 concept_panum_psycho_points: "심리치료 점수"
 concept_panum_psycho_point_desc: "심리치료 점수는 한 국가의 심리학과 정신의학 분야에서 어디까지 진척되었는가를 나타내는 추상적인 점수에 해당됩니다. 기술 연구나 정신병원, #V 정신과의#! [concept_character_trait]을 지닌 [concept_panum_physician] 보유로 매달 생성됩니다. 또한 이벤트를 통해서도 획득이 가능합니다. 심리치료 점수가 높을수록 정신 질환을 앓는 인물을 치료할 확률이 높아집니다. 심리치료 단계가 올라갈수록 연구 보너스와 [concept_academics_progress]도 부여받게 됩니다. 대다수 심리학과에서는 심리치료 점수를 조건으로 내세웁니다."
 concept_vikelas_mechanic: "정비사"
 concept_vikelas_mechanic_desc: "#b 정비사#!는 [concept_vikelas_race_car]을 제작하는 인물로, 본인의 인물 특성과 경험치에 따라 차량의 제작과 개량의 소요 시간에 영향을 끼집니다. 다만 차량 뿐만 아니라 [concept_vikelas_mechanical_innovation]에도 직접적인 영향을 끼칩니다. 유능한 정비사는 차량의 속력(운전자의 과속 욕구)이 안전 등급을 넘어서지 않도록 관리하여 치명적인 사고를 방지합니다. 차체 신뢰성 또한 마찬가지로, 속력 등급이 신뢰성 등급보다 높으면 차량이 목적지에 도달하지 못할 확률이 50%로 증가하게 됩니다."
 concept_vikelas_mechanical_innovation: "기계 혁신"
 concept_vikelas_race_car: "경주용 차량"
 concept_vikelas_race_car_desc: "[concept_vikelas_racer]와 더불어 #b 경주용 차량#!은 [concept_vikelas_car_racing]에 있어 핵심 요소입니다. 경주용 차량은 [concept_vikelas_mechanic]가 제작합니다. 경주용 차량의 최우선 속성은 속력, 신뢰성, 안전성입니다. 속도는 빠르지만 안전 기준을 충족하지 못하는 차량은 우승 가능성은 높아도 치명적인 사고의 위험성도 매우 높습니다. 반대로 안전하지만 너무 느린 차량은 승리를 보장할 수 없습니다. 따라서 레이싱팀은 올바른 균형을 맞춰야 합니다."
 concept_vikelas_race_car_reliability: "경주용 차량 신뢰성"
 concept_vikelas_race_car_safety: "경주용 차량 안전성"
 concept_vikelas_race_car_speed: "경주용 차량 속력"
 concept_dubois_dinosaur_bone_no_dinosaur: "뼈"
 concept_dubois_dinosaur_bones_no_dinosaur: "뼈"
 concept_dubois_paleontological_expedition_desc: "[concept_dubois_paleontologist]를 [Concept('concept_dubois_formation','$concept_dubois_formations$')]으로 파견할 수 있습니다. 탐사에는 1년이 소요되며 성공 여부에 따라 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]과 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]를 획득하게 됩니다. 탐사를 마치고 따로 작업중이지 않은 [concept_dubois_paleontological_team]이 있다면 [concept_dubois_paleontological_excavation]을 설정하여 그 지역의 화석과 뼈를 지속적으로 획득할 수 있습니다.\n지층에 접근하는 가장 쉬운 방법은 해당 주를 장악하는 것입니다. 그러나 [Concept('concept_dubois_paleontological_licence','$concept_dubois_paleontological_licences$')]를 이용하면 평화적으로 접근이 가능합니다."
 concept_dubois_paleontological_team: "고생물학 발굴단"
 concept_dubois_paleontological_teams: "고생물학 발굴단"
 concept_dubois_paleontological_team_desc: "고생물학 발굴단은 [concept_dubois_paleontological_expedition]를 마친 뒤 [concept_dubois_paleontological_excavation]을 진행하는 데 사용됩니다. 이를 통해 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]과 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]를 지속적으로 획득할 수 있습니다."
 concept_dubois_paleontological_excavation: "고생물학 발굴"
 concept_dubois_paleontological_excavations: "고생물학 발굴"
 concept_dubois_paleontological_excavation_desc: "[concept_dubois_paleontological_expedition]를 마친 뒤 따로 작업중이지 않은 [concept_dubois_paleontological_team]을 두고 있다면 고생물학 발굴을 진행할 수 있습니다. 고생물학 발굴을 통해 발굴단은 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]과 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]를 지속적으로 손에 넣게 됩니다."
 concept_verrier_venus_transit: "금성 일면통과"
 concept_verrier_venus_transit_desc: "금성 일면통과는 금성이 지구와 태양 사이를 통과하는 드문 현상을 말합니다. 19세기에는 1874년과 1882년 총 두 차례에 걸쳐서만 발생하였습니다. 금성 일면통과의 관측은 그 자체로 태양계의 크기를 가늠하고 천문 단위 (AU)의 규모를 더욱 정확하게 측정할 수 있다는 점에서 중대한 과학적 사건이었습니다. [concept_verrier_venus_transit_zone]에 속한 국가들은 자국에서 직접 관측이 가능하며, 다른 나라들은 탐사대를 파견해야 합니다. 관측의 성공 여부는 [concept_verrier_astronomer]의 경험치, [concept_tesla_engineer]의 지원, 그리고 약간의 운에 달려 있습니다. 이는 날씨 때문에 양호한 관측 환경이 아니게 될 수 있기 때문입니다. 관측 결과가 좋을수록 더 큰 성과를 거둘 수 있습니다."
 concept_verrier_venus_transit_zone: "금성 일면통과 관측 지역"
 concept_verrier_venus_transit_zone_desc: "금성 일면통과 관측 지역은 금성의 일면통과가 (일부가 아닌) 완전히 이루어지는 모습을 관측할 수 있는 지구상의 지역들을 말합니다. 1873년에는 동아시아-태평양 지역, 1882년에는 아메리카 대륙 전역에 집중적으로 걸쳐 있었습니다. 관측이 가능한 전략 지역의 새부 내역은 아래와 같습니다.\n\n#V 1874년 금성 일면통과:#!\n인도네시아, 인도차이나, 오세아니아, 남중국, 북중국, 만주, 일본, 중앙 인도, 마드라스, 벵골, 히말라야, 인도양 일대 영토의 주\n\n#V 1882년 금성 일면통과:#!\n브라질, 라플라타, 안데스, 그란 콜롬비아, 멕시코, 중앙 아메리카, 카리브해, 미드웨스트, 딕시, 뉴잉글랜드, 온타리오와 퀘벡 주"
 concept_vikelas_coach: "감독"
 concept_vikelas_coaches: "감독"
 concept_vikelas_coach_desc: "감독은 나라를 대표하여 국가 체육 종목 (국기, 國技)의 훈련을 맡는 사람입니다. 국기의 종류에는 [concept_vikelas_football], 야구, 농구, 크리켓이 있습니다. 감독은 각 대회에 나서는 대표팀에 보너스를 부여하게 되며, 대회로는 국제 세계 선수권 대회나 국가 간 경기가 존재합니다. 후자의 경우 정기적으로 비공개로 진행되며 승리할 떄마다 감독의 경험치가 늘어납니다. 높은 경험치와 긍정적인 [Concept('concept_character_trait','$concept_character_traits$')]은 세계 선수권 대회에서 승리할 기회를 늘리게 됩니다. 야심이나 카리스마 같은 긍정적인 특성은 선수들에게 동기를 부여하고, 무자비함이나 잔인함처럼 의욕을 꺾는 특성은 경기에서 승리할 기회를 낮춥니다."
 concept_vikelas_football: "축구"
 concept_vikelas_football_desc: "축구는 국기(國技) 종목의 하나입니다. 최초의 축구 클럽은 유럽과 남아메리카 등지에서 창설할 수 있으며 비교적 자유로운 법률 체계, 탄탄한 소시민 계층, 상당 수준의 평균 생활 수준이 요구됩니다. 이들을 갖추게 되면 간헐적인 축구 경기가 열릴 수 있습니다. FIFA를 설립하면 국가 간 경기와 월드컵 대회도 치를 수 있습니다. 세계 랭킹 8위 내에 드는 팀은 자동으로 월드컵 본선에 진출합니다. 각 나라의 팀은 '국가 축구팀 평가값' (NFTV)에 따라 평가가 이루어지는데, 이는 생활 수준(국민의 건강 상태), 소시민 계층의 영향력(클럽 조직), 문해력(전술), 전통(축구의 국기 채택 여부) 등의 매개변수를 종합하여 산출됩니다. 경기에서는 평가값 뿐만 아니라 [concept_vikelas_coach]의 특성과 경험치 또한 고려됩니다."
 concept_gaudi_architectural_splendour: "장엄한 건축"
 concept_gaudi_architectural_splendour_desc: "장엄한 건축은 20세기 초에 등장한 아르데코, 바우하우스, 신고전주의 등 근대 건축의 눈부신 발전을 아우르는 용어입니다. 장엄한 건축은 시대에 뒤떨어진 외관을 미래지향적인 건축으로 전환시킨 정도를 나타냅니다. 아르데코의 경우 아르데코 도시라는 이상을 충족하기 위해 높은 문턱을 넘어서야 하지만, 그것으로 얻는 이득 역시 훨씬 커지게 됩니다."
 concept_artists_artist_desc: "[concept_morgenroete]에서 #b 예술가#!는 이 모드 내 특정 기능들을 사용할 수 있게 해 주는 특수 인물입니다. #b 예술가#!는 일부 이벤트를 통해서나 [concept_artistic_progress]를 충분히 모으면 획득할 수 있습니다. 예술가는 본인의 특정 분야에서의 입지를 반영하는 [concept_artists_experience]을 지니고 있습니다.\n현재 #b 예술가#!의 유형은 다음과 같습니다.\n - [concept_elgar_composer]\n - [concept_klimt_painter]\n - [concept_manzoni_writer]\n - [concept_gaudi_architect]"
 concept_elgar_architecture_desc: "건축은 [concept_morgenroete]의 대표적인 요소로 꼽히며, 두 가지 부문으로 나뉩니다.\n\n먼저 [concept_gaudi_monuments]은 완전히 새로운 모습으로 바뀌었습니다. 더 이상 직접 건설하는 것이 아니라 결단을 통해 여러 단계를 거쳐 확장되는 방식으로 지어집니다. 또 한편으로 여러 개의 기념물이 추가되었는데 그 중에는 반드시 새로 지어야 하는 것도 있고, 게임 시작부터 존재하는 것도 있습니다.\n\n다른 하나는 [concept_gaudi_architect]의 도입으로, 도시를 개선하고 [Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')] 연구로 15개의 새로운 고유 건물을 설계합니다. 건축가는 국가 전체를 바우하우스, 신고전주의, 아르데코 양식으로 다시 꾸밀 수도 있습니다. [concept_gaudi_great_architect]는 고유의 [concept_gaudi_custom_monument]을 설계할 수도 있습니다!"
 concept_gaudi_architect_desc: "#PURPLE #b 건축가#!#!는 도시 계획, 건물 설계와 시공에 관한 능력을 갖춘 [Concept('concept_artists_artist','$concept_artists_artists$')]입니다. 건축가는 이벤트를 통해서 얻거나, 국가의 [concept_artistic_progress]를 충분히 모으거나, [concept_gaudi_independent_architect]에게 직위를 임명하는 식으로 얻을 수 있습니다.\n다른 예술가들이 문화 전통을 쌓으려는 경향이 있는 데 반해, 건축가는 도시 계획이나 수도 확장에 참여하거나 혹은 특정 건축 양식으로 국가를 완전히 재설계할 때 [concept_gaudi_architectural_splendour]이라는 매우 귀한 개념을 드물게 창출할 뿐입니다. 건축가의 주요 임무는 실용적인 면에 중점을 둡니다. 공공 건설에 참여하여 국가에 추가 건설 점수를 제공하고, 도시 계획으로 기반 시설을 개선하고, 수도를 더욱 살기 좋은 곳으로 탈바꿈시킵니다. 건축가는 유학을 떠나 실력을 닦거나 건축 논문을 집필할 수도 있습니다.\n무엇보다도 중요한 것은 새롭고 독특한 건축을 설계하는 것에 있는데 이를 위해 [concept_gaudi_architectural_blueprint]를 제작합니다. 연구할 수 있는 [concept_gaudi_blueprint_buildings]의 수는 총 15개로, 상당한 시간이 소요되기에 어떤 것이 알맞을지 고려하는 것이 좋습니다.\n건축가는 부가적인 보너스도 제공합니다. 건축가가 존재하면 [concept_gaudi_monuments]의 건설 진행도를 100% 증가시킵니다. 건축가가 이룩할 수 있는 가장 위대한 업적은 본인만의 [concept_gaudi_custom_monument]을 설계하는 것입니다. 이 건축물의 설계는 [concept_gaudi_great_architect]가 있을 때만 가능합니다."
 concept_douglas_mountaineering: "등산"
 concept_douglas_mountaineering_desc: "[concept_douglas_mountain_summit]을 하나 이상 보유했거나 그것을 보유한 국가와 #b 등산 허가#!를 체결한 국가는 등산에 나설 수 있습니다. #b 산악 원정#!을 개시하려면 #b 탐광#!과 #b 민족주의#! 기술이 모두 필요하며 #b 산악인#!, #b 탐험가#!, #b 산악 사령관#!, #b 측량사#! 특성 중 하나를 지닌 장군이 필요합니다.\n#b 산악 원정#!을 시작하자마자 제일 먼저 해야 할 것은 어떤 장군을 대표 산악인으로 삼을 것인지 고르는 것입니다. 그런 다음 등반에 나설 산봉우리를 선택합니다.\n산의 높이가 높을수록 위험도도 커집니다. 모든 산은 높이에 따라 미터 단위로 분류되며 그 범위는 4000m 이하에서 8000m 이상까지 다양합니다. 원정의 성공 여부는 군사 기술 수준, 원정대장의 나이와 건강 상태, 특성에 달려 있습니다. 눈사태와 가파른 경사길은 전체 원정을 위협하는 주요 위험 요소입니다.\n여정에는 [Concept('concept_academics_academic','$concept_academics_scientist$')]를 추가로 합류시킬 수 있습니다. [concept_dubois_naturalist]나 [concept_dubois_paleontologist]가 오르고 있는 산에 관한 정보를 알아내는 데 보탬이 될 것입니다.\n원정을 마치면 위신 보너스를 얻게 되며, 장군은 전투 뿐만 아니라 등산에도 도움이 되는 더 나은 특성을 지니게 됩니다."
 concept_gaudi_great_architect: "#PURPLE #b 위대한 건축가#!#!"
 concept_gaudi_great_architects: "#PURPLE #b 위대한 건축가#!#!"
 concept_gaudi_great_architect_desc: "#b 위대한 건축가#!는 건축 분야에서 최고의 거장으로 평가받는 [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]를 말합니다. #b 건축가#!가 [concept_artists_experience] 500에 도달하면 #b 위대한 건축가#!가 됩니다. 예술가가 위대한 건축가로 등극하면, 상당히 돋보이는 외관으로 조국의 정신을 구현하는 [concept_gaudi_custom_monument]의 설계도를 제작할 수 있게 됩니다."
 concept_gaudi_monuments: "#R 모르겐뢰테#!의 기념물"
 concept_gaudi_monuments_desc: "[concept_morgenroete]에서는 여러 국가에 새로운 #b 기념물#!이 추가됩니다. 독일의 #b 쾰른 대성당#!, 스위스의 #b 고트하르트 철도#!, 브라질의 #b 구세주 그리스도상#!, 이탈리아의 #b 몰레 안토넬리아나#!, 중국의 #b 이화원#!, 스페인의 #b 사그라다 파밀리아 성당#!, 바이에른의 #b 노이슈반슈타인 성#!, 멕시코의 #b 벨라스 아르테스 궁전#!, 한국의 #b 경복궁#!이 그 대상입니다.\n#b 이화원#!을 제외한 모든 건축물과 #b 종탑#!은 자국에서 직접 건설하여야 하며, #b 작센 궁전#!의 경우 폴란드계 국가라면 건설이 활성화됩니다. #b 바미얀 석불#!이나 #b 포탈라 궁전#!처럼 게임 시작 시점부터 추가되는 건축물도 존재합니다.\n또한 [concept_gaudi_great_architect]가 설계한 [concept_gaudi_custom_monument]을 세울 수도 있습니다.\n\n바닐라 버전과는 달리 #b 기념물#!은 곧바로 세울 수 있는 것이 아니라 결단을 통해 건설이 이루어집니다. 건설 과정은 건축물의 규모에 따라 여러 단계를 거치게 되며, 수 년에서 수십 년이 소요될 수 있고, 들어가는 예산도 훨씬 많아지게 됩니다."
 concept_athletes_athlete: "선수"
 concept_athletes_athletes: "선수"
 concept_athletes_athlete_desc: "[concept_morgenroete]에서 #b 선수#!는 이 모드 내 특정 기능들을 사용할 수 있게 해 주는 특수 인물입니다. #b 선수#!는 일부 이벤트를 통해서나 버튼을 클릭하면 획득할 수 있습니다. 다른 인물과 마찬가지로 #b 선수#!는 경험치를 모을수록 자기 종목에서 더 큰 성공을 보장받게 됩니다.\n현재 #b 선수#!의 유형은 다음과 같습니다.\n - [concept_curtiss_balloonist]\n - [concept_curtiss_pilot]\n - [concept_vikelas_olympian]\n - [concept_douglas_mountaineer]\n - [concept_vikelas_coach]\n - [concept_vikelas_racer]"
 concept_gaudi_independent_architect: "독립 건축가"
 concept_gaudi_independent_architects: "독립 건축가"
 concept_gaudi_independent_architect_desc: "특정 국가에 소속되지 않은 [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]는 #b 독립 건축가#!라고 부릅니다.\n다른 예술가와는 달리 #b 독립 예술가#!를 채용하는 데에 필요한 조건은 최소한의 기술 요구 사항을 제외하면 별로 없습니다. 이들은 세계 곳곳을 다니는 사람들로서 대개 좋은 보수만 요구하게 됩니다. "
 concept_gaudi_architectural_blueprint: "건축 설계도"
 concept_gaudi_architectural_blueprints: "건축 설계도"
 concept_gaudi_architectural_blueprint_desc: "건축 설계도는 [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]가 제작할 수 있습니다. 한 국가에 하나씩만 세울 수 있는 특수 [concept_gaudi_blueprint_buildings]의 건설에 필수적인 요소입니다. 총 열다섯 가지의 건물이 다섯 가지 분류로 각각 나뉩니다. 어떤 설계도는 특정 기술의 선행 연구가 필요합니다. 설계 작업은 간혹 수년 간 진행될 수도 있기에, 어떤 설계도를 최우선으로 삼아야 하는지 미리 결정하는 것이 현명할 수 있습니다. 건물 자체는 어느 주에나 건설할 수 있지만, 도심 단계가 특정 수준에 도달해야 한다는 조건이 있습니다. 일부 건물의 경우 조건이 추가로 존재할 수 있습니다."
 concept_gaudi_blueprint_buildings: "설계도 건물"
 concept_gaudi_blueprint_buildings_desc: "설계도 건물은 [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]가 연구한 설계도를 필요로 하는 건물을 말합니다. 한 국가에 하나씩만 건설할 수 있으며, 총 15가지의 건물이 존재합니다.\n\n#b 기념물#!\n- [GetBuildingType('building_gaudi_statue').GetName]\n- [GetBuildingType('building_gaudi_fountain').GetName]\n- [GetBuildingType('building_gaudi_arch').GetName]\n\n#b 공공 광장#!\n- [GetBuildingType('building_gaudi_park').GetName]\n- [GetBuildingType('building_gaudi_luna').GetName]\n- [GetBuildingType('building_gaudi_parade').GetName]\n\n#b 공공사업 기관#!\n- [GetBuildingType('building_gaudi_almshouse').GetName]\n- [GetBuildingType('building_gaudi_school').GetName]\n- [GetBuildingType('building_gaudi_prison').GetName]\n\n#b 보건 시설#!\n- [GetBuildingType('building_gaudi_canalization').GetName]\n- [GetBuildingType('building_gaudi_hospital').GetName]\n- [GetBuildingType('building_gaudi_health').GetName]\n\n#b 국립 학술 기관#!\n- [GetBuildingType('building_gaudi_science').GetName]\n- [GetBuildingType('building_gaudi_arts').GetName]\n- [GetBuildingType('building_gaudi_sports').GetName]"
 concept_gaudi_custom_monument: "자체 기념물"
 concept_gaudi_custom_monument_desc: "자체 기념물은 [concept_gaudi_architect]가 설계할 수 있는 가장 위대한 걸작으로서 다른 일반 기념물에 견줄 만합니다. [concept_gaudi_great_architect]만이 건설 계획에 나설 수 있으며, 근대 건축 기술을 대부분 연구한 상태여야 합니다. 건축가가 설계하는 기념물의 유형은 그 건축가의 건축 양식에 크게 좌우됩니다. 아르데코 건축가는 [GetBuildingType('building_gaudi_people_monument').GetName]을, 바우하우스 건축가는 [GetBuildingType('building_gaudi_people_forum').GetName]을, 신고전주의 건축가는 [GetBuildingType('building_gaudi_people_palace').GetName]을 설계하게 됩니다."
 concept_douglas_mountaineer: "산악인"
 concept_douglas_mountaineers: "산악인"
 concept_douglas_mountaineer_desc: "#b 산악인#!은 정복되지 않은 [concept_douglas_mountain_summit]을 등정하는 [Concept('concept_athletes_athlete','$concept_athletes_athletes$')]입니다. 이들은 등산회를 설립한 뒤 [concept_douglas_alpine_heritage]에 따라 모집할 수 있습니다. 산봉우리와 화산 등의 지형지물을 갖춘 국가는 모집에 유리해집니다. 등산 특성과 경험치는 등반 과정이나 위험한 상황의 극복에 있어 가장 중요한 요인이라 할 수 있습니다."
 concept_vikelas_olympian: "올림픽 선수"
 concept_vikelas_olympian_desc: "#n 이 항목은 수정 중입니다.#!"
 concept_douglas_mountain_summit: "산 정상"
 concept_douglas_mountain_summits: "산 정상"
 concept_douglas_mountain_summit_desc: "산 정상은 모든 산악인들이 열망하는 목표입니다. 산 정상은 산의 가장 높은 지점을 뜻합니다. 각 정상에는 성공적으로 등정하기 위한 세 가지 고유한 특성을 지니고 있습니다.\n\n#V 높이#!: 높이는 산 등정에 필요한 단계가 얼마나 되는지를 결정하며 전체 원정 기간에 반영됩니다. 1,000m를 넘길 때마다 1단계씩 필요하며 천 이하 자릿수는 올림 처리됩니다. 예를 들어서 해발 4,421m의 휘트니산은 5단계, 해발 7,134m의 카우프만봉은 8단계가 요구됩니다. 산의 위신은 높이에 따라 결정되며 전체 높이를 300으로 나눈 값이 됩니다. 따라서 해발 4,500m인 산이 있다면 15의 위신을 부여하게 됩니다.\n\n#V 단계#!: 산의 난이도 단계는 등정에 필요한 장비를 나타냅니다. 그 기준은 반드시 높이와 딱 맞아 떨어지는 것은 아닙니다. 예를 들어서 해발 5,636m인 시틀라테페틀산은 1단계에 그치며 기초 장비만 필요합니다. 반대로 해발 4,478m에 불과한 마터호른산은 난이도가 3단계로 훨씬 더 까다로운 것으로 여겨지며, 고산 응급상황에 대비한 응급 처치 교육이 필요합니다.\n\n#V 위험도#!: 산의 위험 단계는 원정에 영향을 주는 부정적인 이벤트가 발생할 가능성을 나타냅니다. 눈사태, 안개, 그리고 여러 날씨 여건이 주요 위험 요소입니다. 포포카테페틀산은 주변 환경이 쾌적하여 근대 초부터 이미 등정이 가능했습니다. 반면 해발 3,666m로 높이가 훨씬 작은 그로스베네디거봉은 19세기 초까지 오스트리아 원정대에 심각한 위협으로 다가왔습니다.\n\n산 정상의 개별적인 세부 정보에 대해서는 [concept_douglas_mountain_summit_list] 단락에서 확인할 수 있습니다."
 concept_douglas_mountain_range: "산맥"
 concept_douglas_mountain_ranges: "산맥"
 concept_douglas_mountain_range_desc: "산맥은 장거리 [concept_douglas_mountaineering] 훈련에 적합한 산악 지형을 의미합니다. 대표적인 산맥으로는 로키산맥, 안데스산맥, 알프스산맥, 캅카스산맥 등이 있습니다. 정복의 대상이 되는 [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]과는 달리 [concept_douglas_mountaineer]이 추락 사고로 목숨을 잃을 위험성은 전혀 없는, 도전 부담이 덜한 산들도 많습니다. 이러한 산들은 훈련 경로로 활용될 수 있습니다. 산맥이 있는 국가는 그것이 없는 국가보다 산악인을 더 많이 양성할 가능성이 높습니다."
 concept_douglas_alpine_heritage: "산악 전통"
 concept_douglas_alpine_heritage_desc: "산악 전통은 산과의 유대감과 등반의 전문성을 포괄하는 용어입니다. 경험 많은 산악인이라면 대부분 산악 지역 출신이라는 점에서 새로운 [Concept('concept_douglas_mountaineer','$concept_douglas_mountaineers$')]을 모집할 수 있는 잠재력을 나타내기도 합니다. 이는 [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')]이나 [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]을 보유한 국가에 항상 이득으로 작용합니다. 새로운 산악인 모집을 비롯한 여러 등산 활동에는 산악 전통이 소모됩니다."
 concept_douglas_mountain_summit_list: "산 정상 목록"
 concept_douglas_mountain_summit_list_desc: "등반 원정을 떠날 수 있는 [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]에는 여러 곳이 존재합니다.\n\n#V 북아메리카: #!\n#b 매킨리산#! (알래스카) - 해발 6,190m, 4단계\n#b 로건산#! (유콘 준주) - 해발 5,959m, 4단계\n#b 시클라테페틀산#! (멕시코) - 해발 5636m, 1단계\n#b 휘트니산#! (캘리포니아) - 해발 4421m, 1단계\n\n#V 남아메리카:#!\n#b 아콩카과산#! (멘도사) - 해발 6267m, 3단계\n#b 우아스카란산#! (리마) - 해발 6768m, 5단계\n#b 이이마니산#! (라파스) - 해발 6438m, 4단계\n#b 침보라소산#! (에콰도르) - 해발 6267m, 1단계\n\n#V 유럽:#!\n#b 시카라산#! (볼쇼이캅카스) - 해발 5642m, 4단계\n#b 두포우르슈피츠봉#! (두포우르슈피츠) - 해발 4634m, 2단계\n#b 마테호른산#! (스위스 서부) - 해발 4478m, 3단계\n#b 에기유베르트산#! (사보이) - 해발 4122m, 3단계\n#b 아네토산#! (아라곤) - 해발 3404m, 1단계\n\n#V 아프리카:#!\n#b 키보산#! (탕가니카) - 해발 5895m, 2단계\n#b 케냐산#! (케냐) - 해발 5199m, 3단계\n#b 스탠리산#! (우간다) - 해발 5109m, 3단계\n#b 카메룬산#! (남 카메룬) - 해발 4095m, 1단계\n\n#V 아시아:#!\n#b 카멧산#! (델리) - 해발 7756m, 4단계\n#b 초골리사산#! (카슈미르) - 해발 7665m, 5단계\n#b 카브루산#! (히말라야) - 해발 7412m, 5단계\n#b 카우프만봉#! (타지키스탄) - 해발 7134m, 4단계\n\n#V 호주와 오세아니아:#!\n#b 윌헬름산#! (뉴 기니 동부) - 해발 4121m, 2단계\n#b 쿡산#! (남섬) - 해발 3724m, 2단계"
