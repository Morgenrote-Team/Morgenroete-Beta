l_korean:
 ag_morgenroete_name: "[concept_morgenroete]"
 ag_morgenroete_tooltip: "한 개 이상의 행동을 취할 수 있는 [concept_morgenroete] 특성이 존재합니다."
 concept_morgenroete: "#r 모르겐뢰테 #!"
 concept_morgenroete_mr: "MR"
 concept_morgenroete_concept: "개념"
 concept_pm_academics_university_humanities: "#b #BLUE 인문-인류학 특화 #!#!"
 concept_pm_academics_university_natural_history: "#b #GREEN 자연사 특화 #!#!"
 concept_pm_academics_university_mathematics: "#b #ORANGE 수학-기술 특화 #!#!"
 concept_academics_university_specialization: "대학 특화"
 concept_academics_academic: "학자"
 concept_academics_academics: "학자"
 concept_academics_scientist: "과학자"
 concept_academics_scientists: "과학자"
 concept_academics_academic_desc: "[concept_morgenroete]에서 #b 학자#!는 모드의 특정 기능을 사용할 수 있게 해 주는 특수 인물입니다. #b 학자#!를 얻기 위해서는 특정 이벤트에서 획득하거나 [concept_academics_progress]를 충분히 획득하면 됩니다. \n현재 존재하는 #b 학자#!는 다음과 같습니다.\n - [concept_tesla_engineer]\n - [concept_mendelejew_chemist]\n - [concept_verrier_astronomer]\n - [concept_agassiz_geologist]\n - [concept_dubois_paleontologist]\n - [concept_dubois_naturalist]\n - [concept_theiler_biologist]\n - [concept_panum_physician]\n - [concept_lepsius_archaeologist]\n - [concept_lepsius_anthropologist]"
 concept_academics_progress: "학자 양성 진행도"
 concept_academics_progress_desc: "#b 학자 양성 진행도#!를 360점을 획득하면 새로운 [concept_academics_academic]를 얻을 수 있습니다. #b 학자 양성 진행도#!를 가지려면 #b 학구적 환경#! 기술과 한 개 이상의 #b 대학#!이 필요합니다.\n #b 학자 양성 진행도#!는 여러 가지 요인에 따라 점수를 얻습니다. 이를테면 [concept_literacy]이 높을 수록 #b 학자 양성 진행도#!의 진척도 더욱 빨라집니다. 또다른 요인으로 여러분의 국가에 학자 인구 비중이 얼마나 되느냐입니다. 학자 인구가 #p 2% 이상#!일 경우 #b 학자 양성 진행도#!를 최대치로 획득할 수 있습니다. 학제 개선과 지식인 계층을 만족시켰을 경우에도 #b 학자 양성 진행도#!의 획득에 도움이 됩니다. 마지막으로 [concept_dubois_zoo]이나 [concept_verrier_observatory]와 같은 일부 기술 특화 및 특수 건물도 #b 학자 양성 진행도 #!를 추가로 제공합니다."
 concept_academics_scientific_society: "과학원"
 concept_academics_scientific_societies: "과학원"
 concept_academics_scientific_society_desc: "#b 과학원#!은 이 나라의 최우수 인재들이 모이는 기관입니다. 과학원은 나라의 과학자와 학자들을 대표하며, 여러분이 [Concept('concept_academics_academic','$concept_academics_academics$')]를 방문할 수 있게 합니다.\n\n#b 과학원#!이 제시하는 [Concept('concept_academics_academic_mission','$concept_academics_missions$')]을 수행하여 유용한 보상을 얻을 수도 있습니다."
 concept_academics_experience: "경험"
 concept_academics_experience_desc: "Some Academics gather #b Experience#! during their life. In [concept_morgenroete], the characters get #b Experience#! when they get created. Usually they get 10 #b Experience#! for every year older than 30.\nAdditionally they gain #b Experience#! by doing their work, for example for finding new [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]. They gain #b Experience#! passively each year as well.\nA character that gets 100 #b Experience#! will get the #b Experienced Trait#!. If a character reaches 300 #b Experience#!, they get the #b Famous Trait#!\nThe higher the #b Experience#! of a character, the better their work. An experienced or famous [concept_dubois_paleontologist] for example finds more [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] and is better at building a [concept_dubois_dinosaur_skeleton]."
 concept_academics_academic_mission: "학회 임무"
 concept_academics_academic_missions: "학회 임무"
 concept_academics_mission: "임무"
 concept_academics_missions: "임무"
 concept_academics_academic_mission_desc: "우리 [concept_academics_scientific_society]에서는 간혹 특정한 목표를 달성해달라고 요청하기도 합니다. 이런 목표는 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] 등을 일정 규모로 발견하라는 목표일 수도 있습니다. 행성 X를 발견하거나 [Concept('concept_lepsius_exhibition','$concept_lepsius_excellent_exhibition$')]를 마련하라는 #b 임무#!도 존재합니다.\n#b 임무#! 달성에 실패하면 #b 과학원#!은 실망하게 되지만, 성공할 경우에는 유용한 보상이 주어지게 됩니다."
 concept_curtiss_aviation: "항공"
 concept_curtiss_aviation_desc: "#b Aviation#! is one of the main features of [concept_morgenroete]. The 19th and 20th century saw the rise of human flight. First in the form of #b Balloons#! and #b Airships#!, then with #b Planes#!. Flying was a prestigious activity and allowed reaching new horizons.\n\nMany countries start their journey to the skies at the beginning of the game, when they start sponsoring a [Concept('concept_curtiss_balloonist_role','$concept_curtiss_balloonist_role_only_balloonist$')] to break records. Breaking one of the recors will give your country a technology boost as well as a prestige modifier.\nResearching the Zeppelin Technology will allow you to conduct an [concept_curtiss_arctic_expedition] if you have access to the North Pole and a [concept_curtiss_pilot].\nResearching further in the aviation path will allow you to use multiple new mechanics. You will be able to build [concept_curtiss_airport] which produce the new #b Flights#! Good as well as #b Services#!. The #b Airport#! will allow an [concept_curtiss_airline] to grow which will allow you to use the [concept_curtiss_airspace_convention] diplomatic action. The #b Airspace Convention#! will allow you to get access to States and [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')] as well as the North Pole. If your #b Airline#! grows enough you will be able to either build a gigantic blimp or the world's biggest plane.\nThe most exciting feature comes at the beginning of the 20th century: You will be able to compete at the [concept_curtiss_schneider_trophy]. The #b Schneider Trophy#! is a seaplane race in which different countries compete. If you win you will get prestige as well and host the next event. And if you manage to win the race 3 times, you will keep the #b Schneider Trophy#!."
 concept_curtiss_balloonist_role: "열기구 조종사 역할"
 concept_curtiss_balloonist_role_only_balloonist: "열기구 조종사"
 concept_curtiss_balloonists_role: "열기구 조종사"
 concept_curtiss_balloonist_role_desc: "#b 열기구 조종사#!는 국가의 후원을 받을 수 있는 특별한 캐릭터입니다. 선진국이나 서양 국가들을 중심으로 #b 열기구 조종사#!를 후원하여 기록 경신과 새로운 발견을 위해 경쟁에 나섭니다. #b 열기구 조종사#!는 무작위로 비행에 나서 최장 거리, 최장 비행 시간, 최고도 비행 등의 기록을 세웁니다. 비행을 할 때마다 #b 열기구 조종사#!는 경험치를 얻고 순위가 올라가며, 새로운 기록을 세울 확률이 높아집니다. 하지만 열기구 비행은 위험한 활동이며, 특히 질병, 알코올 중독, 약물 남용이 있는 열기구 조종사는 일찍 죽음을 맞이할 가능성이 높다는 점에 유의해야 합니다."
 concept_curtiss_arctic_expedition: "북극 탐험"
 concept_curtiss_arctic_expeditions: "북극 탐험"
 concept_curtiss_arctic_expedition_desc: "#b 비행선#! 기술을 연구하고 [concept_verrier_observatory]에 #b 기상관측소#!를 갖추고 있으며, [concept_curtiss_pilot]를 보유하고 있고, 북극점과 인접한 주로 접근할 수 있다면 #b 북극 탐험#!에 나설 수 있습니다. 탐험에 나설 수 있는 주는 #b 그린란드#!, #b 북부 노르웨이#!, #b 알래스카#!, #b 누나부트#!, #b 네네#!입니다. 해당 주를 직접 보유하거나 보유국과 [concept_curtiss_airspace_convention]을 체결하면 탐사 권한을 받을 수 있습니다.\n#b 북극 탐험#!에서는 연구 여행을 떠나고, 북극 기지를 건설하고, 북극의 지리·기상·생태에 관한 새로운 지식을 얻고, 비행선에 올라 사상 첫 북극점 횡단에 나설 수 있습니다!"
 concept_curtiss_pilot: "비행사"
 concept_curtiss_pilots: "비행사"
 concept_curtiss_pilot_desc: "A #b Pilot#! is a character with the #b Pilot Trait#!. #b Pilots#! have a low chance of spawning after the #b Early Aviation#! discovery. In addition, in battles on a front using Aerial Reconnaissance as a production method, there is a chance that a #b Pilot#! emerges from the battle via an event. Better technologies such as Airplanes and Modern Aviation, but also establishing a Pilot School via Decisions allows for a better chance for a character to have the #b Pilot#! trait.\n#b Pilots#! help you in different ways. #b Airlines#! may be interested in #b Pilots#! to boost their image; in the battle for the [concept_curtiss_schneider_trophy], experienced #b Pilots#! have a better chance; and a #b Pilot#! is necessary to undertake the [concept_curtiss_arctic_expedition]. #b Pilots#! can also be upgraded to ace pilots via an event if they are deployed on a front."
 concept_curtiss_airport: "공항"
 concept_curtiss_airports: "공항"
 concept_curtiss_airport_desc: "An #b Airport#! is a building that is unlocked by the #b Modern Aviation#! Technology. It is a purely civilian building and provides [GetGoods('air_travel').GetName] and #b Services#! but consumes a variety of goods starting from [GetGoods('tools').GetName], [GetGoods('paper').GetName], [GetGoods('aeroplanes').GetName] and [GetGoods('oil').GetName]. Later it needs [GetGoods('electricity').GetName], [GetGoods('telephones').GetName] and [GetGoods('radios').GetName] as well.\nIf you have enough #b Airports#! an [concept_curtiss_airline] will be founded and with your growing #b Airports#!, the #b Airline#! will grow as well and offer more bonuses."
 concept_curtiss_airline: "항공사"
 concept_curtiss_airlines: "항공사"
 concept_curtiss_airline_desc: "An #b Airline#! is a company or a government run institution that offers [GetGoods('air_travel').GetName] from the local level up to international flights at the end of the game. #b Airlines#! provide various other bonuses as well. #b Airlines#! need [Concept('concept_curtiss_airport','$concept_curtiss_airports$')] to conduct those flights. If you grow you #b Airports#!, so will the #b Airlines#!.\nIf your #b Airline#! is government run, you will get the opportunity to construct an enormous blimp and let it travel vast distances. If your #b Airline#! is publically or privately owned, you might instead get the chance to build the biggest airplane ever created."
 concept_curtiss_airspace_convention: "Airspace Convention"
 concept_curtiss_airspace_conventions: "Airspace Conventions"
 concept_curtiss_airspace_convention_desc: "The #b Airspace Convention#! is an important [concept_diplomatic_pact] that allows you to interact with regions far away from your influence. If you have an #b Airspace Convention#! with another nation that has an [concept_lepsius_excavation_site], you will be able to conduct an [concept_lepsius_expedition] without having an [concept_active_interest] in the region.\nAn #b Airspace Convention#! will allow you to send an [concept_curtiss_arctic_expedition] if you do not own one of the states necessary."
 concept_curtiss_schneider_trophy: "슈나이더 트로피"
 concept_curtiss_schneider_trophy_desc: "The fight for this prestigious trophy, which the Frenchman Jacques Schneider donated shortly before the First World War, was primarily intended to stimulate the development of seaplanes. Over time, the race for this trophy became a race of nations, with the UK, USA and Italy in particular giving their teams massive support to win the coveted trophy. In fact, technological development has benefited from the #b Schneider Trophy#! using ever faster and more advanced seaplanes.\nThe #b Schneider Trophy#! can be founded if there are 5 nations that invented the #b Seaplanes#! Technology and if you have a port and a level 10 urban center in one of your states.\nThe Winner of the Trophy is chosen by a journal entry and many factors. A nation with a pilot school and a big [concept_curtiss_airline] will have an advantage for example. A great [concept_curtiss_pilot] and massive funding will help winning the trophy as well.\nThe winner of the last Trophy will be able to hold the next one if they have a port or are Switzerland with its many lakes. Winning the Trophy 3 times in a row is even better, as the nation will keep the trophy forever and get a prestige bonus for it."
 concept_curtiss_balloonist: "열기구 조종사"
 concept_curtiss_balloonist_desc: "이 인물은 열기구 비행으로 모험을 즐길 때가 많은 열기구 조종사입니다."
 concept_curtiss_experienced_balloonist: "경험 많은 열기구 조종사"
 concept_curtiss_experienced_balloonist_desc: "이 인물은 열기구 비행으로 모험을 즐길 때가 많은, 경험 많은 열기구 조종사입니다. 이 특성을 가진 인물은 신기록을 세울 확률이 높습니다."
 concept_curtiss_famous_balloonist: "유명한 열기구 조종사"
 concept_curtiss_famous_balloonist_desc: "이 인물은 열기구 비행으로 모험을 즐길 때가 많은, 유명한 열기구 조종사입니다. 이 특성을 가진 인물은 신기록을 세울 확률이 높습니다."
 concept_dubois_natural_history: "자연사"
 concept_dubois_natural_history_desc: "#b 자연사#!는 [concept_morgenroete]의 핵심 요소 중 하나입니다. 19세기에는 비글호 탐사를 비롯한 위대한 탐험, 진화론의 도래, 수십 만에 달하는 신종 생물 발견, 그리고 무엇보다도 공룡의 발견 등 자연사의 수많은 위대한 발견이 이루어졌습니다.\n\n 함대와 제독을 보유한 강대국은 [concept_dubois_pacific_expedition]에 배를 보낼 수 있습니다. #b 태평양 탐험#!에서는 희귀 동식물과 화석을 발견하고, 해양학 연구를 수행하고, 일식을 비롯한 천문 현상을 관측할 수 있습니다. \n\n 그 과정에서 찾아낸 대형 동물은 [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]이라 부르며, 그 동물들을 전시하는 [concept_dubois_zoo]을 건설하는 데 쓰입니다. 동물의 수가 많을수록 #b 동물원#!이 지닌 효과도 커집니다. 이런 #b 동물#!들은 탐험을 통해 찾아내거나, 자신의 영토에서 포획하거나, 다른 국가에 판매를 요청할 수 있습니다.\n\n 작은 동물이나 식물, 그 외 유기체는 [concept_dubois_specimen]이라고 부릅니다. [concept_dubois_naturalist]는 #b 표본#!을 수집합니다. #GREEN #b 박물학자#!#!는 열대우림 주 특성이 부여된 주에 [Concept('concept_dubois_botanical_expedition','$concept_dubois_botanical_expeditions$')]을 보낼 수 있습니다. 그런 주를 직접 보유하지 못하였다면 다른 국가로부터 [concept_dubois_botanical_licence]를 확보할 수 있습니다. #GREEN #b 박물학자#!#!는 희귀 표본을 찾을 때마다 [concept_academics_experience]를 얻게 됩니다. \n\n[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]은 [concept_dubois_paleontologist]의 연구 분야로서 식물과 곤충, 그 외 작은 동물의 화석들을 포괄하고 있습니다. #b 화석#!은 #b 탐험#!이나 [Concept('concept_dubois_formation','$concept_dubois_formations$')]이 있는 지역에서 찾을 수 있습니다. #b 거대한 지층#!을 보유하고 있다면 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]를 찾을 수 있습니다. 아니면 [concept_dubois_paleontological_licence]를 취득하여 접근할 수도 있습니다. \n\n 당신의 나라에 오를 수 있는 산맥이 있다면, 군의 장군은 [concept_douglas_mountaineering]에 참가하여 더 좋은 특성과 명성 보너스를 획득할 수 있습니다."
 concept_dubois_naturalist: "#b #GREEN 박물학자#!#!"
 concept_dubois_naturalists: "#b #GREEN 박물학자#!#!"
 concept_dubois_naturalist_desc: "#b #GREEN Naturalist#!#! are Academics that can gather [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] and [concept_dubois_specimen]. They can be sent of to a [concept_dubois_pacific_expedition] or a [concept_dubois_botanical_expedition] where they can find rare plants and animals that give you a small bonus. #b #GREEN Naturalists#!#! gain [concept_academics_experience] when they find new rare specimens."
 concept_dubois_paleontologist: "#b #GREEN 고생물학자#!#!"
 concept_dubois_paleontologists: "#b #GREEN 고생물학자#!#!"
 concept_dubois_paleontologist_desc: "#b #GREEN Paleontologists#!#! are Academics that will dig for [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] and [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]. To collect them, you need access to a [concept_dubois_formation]. If you have access to a #b Formation#! either by owning it yourself or with a [concept_dubois_paleontological_licence], you can send your #b Paleontologist#! on a [concept_dubois_paleontological_expedition].\nAfter collecting or reconstructing 5 #b Dinosaur Bones#! your #b Paleontologist#! can construct a [concept_dubois_dinosaur_skeleton]. As #b #GREEN Paleontologists#!#! gain [concept_academics_experience], they will get better at reconstructing #b Dinosaur Skeletons#! and so will the #b skeletons#!. The better the #b Dinosaur Skeletons#!, the more prestige your [concept_dubois_paleontological_collection] will provide."
 concept_dubois_pacific_expedition: "태평양 탐험"
 concept_dubois_pacific_expeditions: "태평양 탐험"
 concept_dubois_pacific_expedition_desc: "As a Major or Great Power you can send an Expedition to the Pacific Ocean. You need to have the #b Empiricism#!, #b Screw Frigate#! and #b Dialectics Technology#! researched, you need a Port and a University, as well as a Navy of at least 15 and an Admiral.\nOn a #b Pacific Expedition#! you can find rare plants, [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')], and [Concept('concept_dubois_fossil','$concept_dubois_fossils$')], conduct oceanographic research, or observe astronomical phenomena such as solar eclipses. At the beginning of the #b Expedition#! you can choose a #b Scientist#! for your Expedition as well, either a #b Surveyor#!, [concept_dubois_naturalist], [concept_dubois_paleontologist] or [concept_verrier_astronomer]. Each one will help to bring better yields in specific events tied to their expertise.\nYour expedition can choose a focus on what exactly it explores. It can be devoted entirely to the mysteries of the sea and improve your oceanographic and astronomical knowledge; in that case, only oceanographic events will trigger. If you explore the wonders of nature, you will be confronted with botanical, zoological and paleontological events. Great Powers will also have the option to undertake a prestige mission, in which you'll find artifacts, establish trading posts or set up missions - especially useful if you don't have diplomatic interests in Oceania, but want to try to acquire at least a small colony through missionaries.\nYou will also have to choose where exactly your mission will travel to: Oceania, Australia or Indonesia. Each one offers different events and rewards."
 concept_dubois_habitat: "Habitat"
 concept_dubois_habitats: "Habitats"
 concept_dubois_animal_habitat: "Animal Habitat"
 concept_dubois_habitat_desc: "A #b Habitat#! is a region in a state where a specific [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] lives. In #r Morgenröte#! #b Habitats#! for the various animals exist in various State Regions. If you own a #b Habitat#! you can transport the #b Animals#! to the [concept_dubois_zoo] or even sell them to other countries.\n\nIf your state reaches an [concept_urbanization] of 2000 or higher or has no more [concept_arable_land], the #b Exotic Animals#! will go #n extinct after 10 years#!.\n\nTo save the #b Animals#! from extinction you can build a [concept_dubois_nature_reserve] in a state with a #b Habitat#!"
 concept_dubois_nature_reserve: "Nature Reserve"
 concept_dubois_nature_reserves: "Nature Reserves"
 concept_dubois_royal_hunting_reserve: "Royal Hunting Reserve"
 concept_dubois_nature_reserve_desc: "A #b Nature Reserve#! is a protected area where you can protect or establish [Concept('concept_dubois_habitat','$concept_dubois_habitats$')].\n\nIf you already have a #b Habitat#!, you can protect it from destruction by the influence of humans by constructing the #b Nature Reserve#! building in the state with the #b Habitat#!. To build a #b Nature Reserve#!, you need to have the #b Genetics#! technology unlocked and have an incorporated state with a #b Habitat#! that is a homeland of one of your primary cultures.\n\nIf you do not own a #b Habitat#!, you can build a #b Nature Reserve#! by surveying your country for a location if you have the #b Genetics#! technology unlocked and at least one [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] from your continent in your [concept_dubois_zoo].\n\nA #b Nature Reserve#! does not only protect your animal #b Habitats#!, it also allows you to settle #b Exotic Animals#! from your continent in them. By doing this, you can protect all the #b Exotic Animals#! of your continent in one single state."
 concept_dubois_zoo_animal: "동물원 동물"
 concept_dubois_zoo_animals: "동물원 동물"
 concept_dubois_exotic_animal: "이국적 동물"
 concept_dubois_exotic_animals: "이국적 동물"
 concept_dubois_zoo_animal_desc: "세계에는 [concept_dubois_naturalist]이 잡을 수 있는 동물이 많습니다. #b 이국적 동물#!을 포획하려면 [concept_dubois_habitat]가 있는 주가 필요합니다. 아니면 #b 서식지#!가 있는 나라에서 #b 이국적 동물#!을 구매해올 수도 있습니다. \n한번 포획하면 #b 동물원 동물#!은 [concept_dubois_zoo]으로 보내지며 #b 동물원#!을 확장할 수 있게 됩니다."
 concept_dubois_zoo: "동물원"
 concept_dubois_zoos: "동물원"
 concept_dubois_zoo_desc: "#b 동물원#!은 [concept_dubois_zoo_animal] 5마리를 모은 뒤에 지을 수 있는 특수 건물입니다. #b 동물원#!에는 당신이 수집한 #b 동물#!과 [concept_dubois_specimen] 컬렉션, 고생물학 컬렉션을 소장시킬 수 있습니다."
 concept_dubois_specimen: "표본"
 concept_dubois_specimens: "표본"
 concept_dubois_specimen_desc: "[concept_dubois_naturalist]가 수집할 수 있는 다양한 곤충, 식물, 소형 동물은 #b 표본#!이라고 부릅니다. #b 표본#!으로 식물원을 짓거나 [concept_dubois_zoo]에 표본 컬렉션을 둘 수 있습니다."
 concept_dubois_botanical_expedition: "식물 탐사"
 concept_dubois_botanical_expeditions: "식물 탐사"
 concept_dubois_botanical_expedition_desc: "[concept_ito_medicinal_plants]이 있는 주를 보유했거나 [concept_dubois_botanical_licence]를 확보하여 그 주로 접근할 수 있다면 [concept_dubois_naturalist]에게 #b 식물 탐사#!를 떠나도록 명할 수 있습니다.\n 당신의 #b 박물학자#!는 1년간의 여정 동안 [concept_ito_medicinal_plants]과 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]을 수집하게 됩니다. 간혹 희귀한 식물을 찾아 [concept_dubois_zoo]의 식물원에 엄청난 수집품으로 둘 수도 있습니다."
 concept_dubois_botanical_licence: "식물 탐사 허가"
 concept_dubois_botanical_licences: "식물 탐사 허가"
 concept_dubois_botanical_licence_desc: "열대우림 주 특성이 있는 주로 접근할 수 없더라도, 그 주를 보유한 나라에 #b 식물 탐사 허가#!를 받아 [concept_dubois_botanical_expedition]를 보낼 수 있습니다. 소정의 금액을 건네야 하지만 그 대가로 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]을 모으고 희귀한 식물을 발견할 수 있게 됩니다."
 concept_dubois_fossil: "Fossil"
 concept_dubois_fossils: "Fossils"
 concept_dubois_fossil_desc: "A [concept_dubois_paleontologist] can discover #b Fossils#! of plants and animals, that are long extinct, if you uncovered a [concept_dubois_formation]."
 concept_dubois_dinosaur_bone: "Dinosaur Bones"
 concept_dubois_dinosaur_bones: "Dinosaur Bones"
 concept_dubois_dinosaur_bone_desc: "A [concept_dubois_paleontologist] can find Dinosaur Bones in Great [Concept('concept_dubois_formation','$concept_dubois_formations$')].\nAn #b Experienced Paleontologist#! can also attempt to reconstruct a #b Dinosaur Bone#! from 20 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] fragments. A #b Dinosaur Bone#! can only be reconstructed if at least one dinosaur bone is available for orientation.\nTo perform any of the actions, the paleontologist must not be exhausted or busy. Its success depends largely on paleontological [concept_academics_experience].\n#b Dinosaur Bones#! are use to reconstruct [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')]."
 concept_dubois_dinosaur_skeleton: "Dinosaur Skeleton"
 concept_dubois_dinosaur_skeletons: "Dinosaur Skeletons"
 concept_dubois_dinosaur_skeleton_desc: "From five [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] from a continental region, a [concept_dubois_paleontologist] can reconstruct a complete dinosaur. To reconstruct a #b Dinosaur Skeleton#!, you need 5 #b Dinosaur Bones#! from the same region.\nHopefully your #b Paleontologist#! ist experienced enough to reconstruct the #b Dinosaur Skeleton#! right. Otherwise you might risk to lose prestige for your [concept_dubois_paleontological_collection]. However, if a #b Dinosaur Skeleton#! was reconstructed wrong, you can attempt to fix it which will result in a slightly better reconstruction."
 concept_dubois_paleontological_collection: "Paleontological Collection"
 concept_dubois_paleontological_collections: "Paleontological Collections"
 concept_dubois_paleontological_collection_desc: "The #b Paleontological Collection#! is the realm of your [concept_dubois_paleontologist]. There you will find all the [Concept('concept_dubois_fossil','$concept_dubois_fossils$')], [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] and [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] of your nation.\nThe better your #b Paleontologist#! mounted these #b Dinosaur Skeletons#!, the more prestige your #b Collection#! will provide. If your #b Paleontologist#! mounted the #b Skeletons#! horribly wrong, that could even cause you to lose prestige. But maybe the same or another #b Paleontologist#! can remount them better!"
 concept_dubois_formation: "Formation"
 concept_dubois_formations: "Formations"
 concept_dubois_geological_formation: "Geological Formation"
 concept_dubois_formation_desc: "There are two kinds of #b Formations#!, normal Formations allow your [concept_dubois_paleontologist] to collect [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] while Great Formations allow for the discovery of [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')].\n#b Formations#! can be uncovered by your Paleontologist or when you research the Paleontology Technology.\nIf you do not have a #b Great Formation#! yourself, you can buy a [concept_dubois_paleontological_licence] from a nation that does and gain access to it."
 concept_dubois_paleontological_expedition: "Paleontological Expedition"
 concept_dubois_paleontological_expeditions: "Paleontological Expeditions"
 concept_dubois_paleontological_licence: "Paleontological Licence"
 concept_dubois_paleontological_licences: "Paleontological Licences"
 concept_dubois_paleontological_licence_desc: "If you do not have access to a [concept_dubois_formation], you can try to get access to one with a #b Paleontological Licence#!. This diplomatic Action allows you to gain access to a #b Great Formation#!. To be able to use it, you need to be a Major or Great Power and the other nation needs a #b Great Formation#!. You will have to pay the other nation a small amount of your income, but hopefully it will be worth it."
 concept_dubois_mountain: "Mountain"
 concept_dubois_mountains: "Mountains"
 concept_dubois_mountain_desc: "There are many #b Mountains#! that can be climbed.\n\n#V North America:#!\n#b Mount McKinley#! (Alaska), 6190 meters\n#b Mount Logan#! (Yukon Territory), 5959 meters\n#b Citlaltépetl#! (México), 5636 meters\n#b Mount Whitney#! (California), 4421 meters\n\n#V South America:#!\n#b Aconcagua#! (Mendoza), 6267 meters\n#b Huascarán#! (Lima Territory), 6768 meters\n#b Illimani#! (La Paz), 6438 meters\n#b Chimborazo#! (Ecuador), 6267 meters\n\n#V Europe:#!\n#b Shkara#! (Greater Caucasus), 5642 meters\n#b Dufourspitze#! (Dufourspitze), 4634 meters\n#b Matterhorn#! (West Switzerland), 4478 meters\n#b Aiguille Verte#! (Savoy), 4122 meters\n#b Pico de Aneto#! (Aragon), 3404 meters\n\n#V Africa:#!\n#b Kibo#! (Tanganyika), 5895 meters\n#b Mount Kenya#! (Kenya), 5199 meters\n#b Mount Stanley#! (Uganda), 5109 meters\n#b Kamerunberg#! (South Cameroon), 4095 meters\n\n#V Asia:#!\n#b Kamet#! (Delhi), 7756 meters\n#b Chogolisa#! (Kashmir), 7665 meters\n#b Kabru#! (Himalayas), 7412 meters\n#b Kaufmann Peak#! (Tajikistan), 7134 meters\n\n#V Australia & Oceania:#!\n#b Mount Wilhelm#! (Eastern New Guinea), 4121 meters\n#b Mount Cook#! (South Island), 3724 meters"
 concept_elgar_music: "Music Culture"
 concept_elgar_opera: "오페라"
 concept_elgar_operas: "오페라"
 concept_elgar_opera_house: "오페라 극장"
 concept_elgar_opera_houses: "오페라 극장"
 concept_elgar_musical_tradition: "음악 전통"
 concept_elgar_impressionism: "인상주의"
 concept_elgar_expressionism: "표현주의"
 concept_elgar_art_nouveau: "아르누보"
 concept_elgar_architecture: "건축"
 concept_elgar_architectural_project: "건축 사업"
 concept_elgar_architectural_projects: "건축 사업"
 concept_lepsius_archaeology: "고고학"
 concept_lepsius_archaeology_desc: "#b Archaeology#! is one of the main features of [concept_morgenroete].\n\nThere are 8 [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')] on the map.\n\n To be able to send an [concept_lepsius_expedition], you need to research the Antiquarianism Technology, have an [concept_lepsius_archaeological_team] and have acces to one of the Excavation Sites. You can either get access by owning the Site yourself or by asking a country with a Site for a [concept_lepsius_excavation_licence].\n\nYou can now send an Archaeological expedition to one of the Excavation Sites. Your Team will discover [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] and in very rare cases and the help of a good [concept_lepsius_archaeologist], you might even find a [concept_lepsius_major_artifact].\n\nOnce your Team returns with the Artifacts, you might be able to build a [concept_lepsius_museum]. In a Archaeological Museum you will be able to see your Artifacts, create [concept_lepsius_exhibition] and visit your #b #BLUE Archaeologist#!#!.\n\nThe more Artifacts and Exhibitions you have, the more Prestige you will get.\n\n#b Anthropology#! is another part of Archaeology. If you have an [concept_lepsius_anthropologist] and a [concept_lepsius_cave], you can find [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils$')] and reconstruct prehistoric human species. Each skeleton will give you more anthropological prestige. With enough anthropological prestige, you will get a prestige modifier for your country."
 concept_lepsius_archaeologist: "#b #BLUE 고고학자#!#!"
 concept_lepsius_archaeologists: "#b #BLUE 고고학자#!#!"
 concept_lepsius_archaeologist_desc: "#b #BLUE 고고학자#!#!는 [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]를 보낼 수 있는 학자입니다. 그곳에서 [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]을 수집하게 됩니다. 간혹 [concept_lepsius_major_artifact]을 발견할 수도 있습니다. \n 고고학자는 임무를 수행하는 동안 매년 간접적으로 [concept_academics_experience]를 얻습니다. #b 경험치#!를 충분히 얻게 되면 고고학자 특성 레벨을 더 높일 수 있습니다."
 concept_lepsius_anthropologist: "#b #BLUE 인류학자#!#!"
 concept_lepsius_anthropologists: "#b #BLUE 인류학자#!#!"
 concept_lepsius_anthropologist_desc: "#b #BLUE 인류학자#!#!는 고생물학과 고고학 양측의 관점에서 선사 인류를 연구하는 학자입니다. [Concept('concept_lepsius_cave','$concept_lepsius_caves$')]에서 [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils$')]을 찾거나 이전까지 알려지지 않던 뼈를 식별해 냅니다. #b 인류 화석#! 3점을 모으면 유인원 종 하나를 복원할 수 있습니다. 뼈의 발견과 식별, 그리고 초창기 인류 종의 분류 작업은 인류학계의 명성을 가져다줍니다. 인류학자는 동굴 탐사 도중에 현지 유물을 발견하기도 합니다."
 concept_lepsius_museum: "고고학 박물관"
 concept_lepsius_museum_desc: "#b 고고학 박물관#!은 당신의 국가가 찾아낸 모든 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]을 전시하기 위해 짓는 건물입니다."
 concept_lepsius_excavation_site: "Historical Excavation Site"
 concept_lepsius_excavation_sites: "Historical Excavation Sites"
 concept_lepsius_excavation_site_desc: "There are multiple #b Historical Excavation Sites#! in different countries including: Upper and Lower Egypt, Babylonia, Assyria, Crete, Argolis, Yucatán and Peru. Each #b Historical Site#! offers different [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] and Events."
 concept_lepsius_expedition: "Archaeological Expedition"
 concept_lepsius_expeditions: "Archaeological Expeditions"
 concept_lepsius_expedition_desc: "An #b Archaeological Expedition#! is an expedition of an [concept_lepsius_archaeologist] and his [concept_lepsius_archaeological_team]. It will take multiple months in which they will try to gather as many [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] as possible. #b Expeditions#! are the only way to get in possession of [Concept('concept_lepsius_major_artifact','$concept_lepsius_major_artifacts$')].\nIf you researched early Archaeology, you can leave your Team at the Site to create an [concept_lepsius_excavation] after a successful #b Expeditions#!."
 concept_lepsius_archaeological_team: "Archaeological Team"
 concept_lepsius_archaeological_teams: "Archaeological Teams"
 concept_lepsius_excavation_team: "Excavation Team"
 concept_lepsius_archaeological_team_desc: "You need one or more #b Archaeological Team#! to be able to conduct [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]. You can gain up to 3 #b Archaeological Teams#!, but each one has higher requirements.\n\nYou can get your first #b Team#! by having researched the Antiquarianism Technology, having a University of at least level 3 and a Literacy of 33%.\n\nYou can get another Team if you have researched the Modern Archaeology Technology, have a University of at least level 15 and a Literacy of 66%.\n\nYou can get another #b Team#! having researched the Antiquarianism Technology and having an Experienced [concept_lepsius_archaeologist].\n\nYou need #b Teams#! for [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] and [Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')]."
 concept_lepsius_excavation_licence: "Excavation Licence"
 concept_lepsius_excavation_licences: "Excavation Licences"
 concept_lepsius_excavation_licence_desc: "If you do not own some of the [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')] yourself, you can still get access to them by using the #b Excavation Licence#! Diplomatic Action.\nTo be able to get a #b Excavation Licence#! you need to be at least a Major Power and have an [concept_active_interest] in the Region.\nYou will have to pay the other country a small amount of money to keep the #b Excavation Licence#!."
 concept_lepsius_artifact: "Artifact"
 concept_lepsius_artifacts: "Artifacts"
 concept_lepsius_minor_artifact: "Minor Artifact"
 concept_lepsius_minor_artifacts: "Minor Artifacts"
 concept_lepsius_oceanic_artifact: "Oceanic Artifact"
 concept_lepsius_oceanic_artifacts: "Oceanic Artifacts"
 concept_lepsius_artifact_desc: "You can get Artifacts by sending [Concept('concept_lepsius_archaeological_team','$concept_lepsius_archaeological_teams$')] on [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')], [Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')], on [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] or in Events.\n\nUsually you will get Minor #b Artifacts#!. You can use these Minor #b Artifacts#! for [Concept('concept_lepsius_exhibition','$concept_lepsius_exhibitions$')] in your [concept_lepsius_museum].\n\n[Concept('concept_lepsius_major_artifact','$concept_lepsius_major_artifacts$')] on the other hand are unique #b Artifacts#! that can only be found once and have a unique name. You can usually find them in Expeditions, excavations and as Archaeological Discoveries."
 concept_lepsius_major_artifact: "Major Artifact"
 concept_lepsius_major_artifacts: "Major Artifacts"
 concept_lepsius_major_artifact_desc: "#b Major Artifacts#! are special [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] that have a name and an identity.\nYou can find #b Major Artifacts#! in different ways. Some of them you will find during [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]. For others you need to maintain a continous [concept_lepsius_excavation] until you find. And some will be discovered in a major discovery.\nTaking a #b Major Artifact#! out of a country illegally might cause a diplomatic incident that might harm you more than owning a #b Major Artifact#!. On the other hand, #b Major Artifacts#! allow you to create a [Concept('concept_lepsius_exhibition','$concept_lepsius_excellent_exhibition$')] which will give you a huge prestige bonus and is needed for some [Concept('concept_academics_academic_mission','$concept_academics_academic_missions$')]."
 concept_lepsius_exhibition: "Exhibition"
 concept_lepsius_exhibitions: "Exhibitions"
 concept_lepsius_excellent_exhibition: "Excellent Exhibition"
 concept_lepsius_excavation: "Excavation"
 concept_lepsius_excavations: "Excavations"
 concept_lepsius_excavation_desc: "If you have researched Early Archaeology and finished an [concept_lepsius_expedition], you can decide to leave your [concept_lepsius_archaeological_team] at the Site to passively dig out [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]. You can always call your Team back from the #b Excavation#!."
 concept_lepsius_human_fossil: "인류 화석"
 concept_lepsius_human_fossils: "인류 화석"
 concept_lepsius_human_fossils_fossils: "화석"
 concept_lepsius_human_bones: "인간 뼈"
 concept_lepsius_human_fossil_desc: "#b 인류 화석#!은 크로마뇽인, 네안데르탈인, 호모 에렉투스, 오스트랄로피테쿠스, 파란트로푸스의 다섯가지 종 가운데 하나에 속하게 됩니다. [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')]가 [Concept('concept_lepsius_cave','$concept_lepsius_caves$')]에서 발견할 수 있으며 보통은 곧바로 식별하고 분류할 수 있습니다. 그러나 고고학자나 고생물학자도 드물게 인류 화석을 발견할 수 있습니다. 이렇게 발견된 '미지의 인류 화석'은 #b #BLUE 인류학자#!#!만이 올바르게 식별할 수 있습니다. 뼈 3개를 모으면 하나의 종을 복원할 수 있으며 인류학계의 명성을 보상으로 얻습니다. 처음으로 초창기 인류를 분류하게 된다면 훨씬 더 많은 명성이 주어집니다. 인간 화석은 원하는 만큼 수차례 복원할 수 있습니다."
 concept_lepsius_cave: "동굴"
 concept_lepsius_caves: "동굴"
 concept_lepsius_cave_desc: "#b 선사시대 동굴#!은 초창기 인류나 선인류 종이 [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils_fossils$')]을, 더 진화한 부류라면 도구를 남겼을 수도 있는 장소입니다. 동굴은 [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')]가 발견하고 탐사할 수 있습니다. 일부 동굴은 역사적 이벤트로 해금됩니다. 각 동굴에는 오직 한 가지 종의 화석이 남겨져 있으며, 이는 곧 크로마뇽인과 네안데르탈인의 뼈가 절대로 같은 동굴에 있을 수 없다는 뜻이 됩니다. 동굴 중에는 실제 역사에 등장한 것도 있는가 하면, 나머지는 게임 시작 시 아프리카, 아시아, 유럽의 3대륙 중 하나에 불규칙하게 배정됩니다. 그 바탕에는 선인류의 분포 지역을 대략적으로 따르고 있는데, 이를테면 오스트랄로피테쿠스는 아프리카에서만 발견할 수 있을 것입니다."
 concept_verrier_astronomy: "천문학"
 concept_verrier_observatory: "천문대"
 concept_verrier_observatories: "천문대"
 concept_verrier_astronomer: "#b #ORANGE 천문학자#!#!"
 concept_verrier_astronomers: "#b #ORANGE 천문학자#!#!"
 concept_verrier_astronomical_object: "천체"
 concept_verrier_astronomical_objects: "천체"
 concept_verrier_astronomical_object_icon: "@verrier_astronomicalobject!"
 concept_verrier_celestial_body: "Celestial Body"
 concept_verrier_celestial_bodies: "Celestial Bodies"
 concept_verrier_comet: "Great Comet"
 concept_verrier_comets: "Great Comets"
 concept_verrier_comet_desc: "The Victorian Age had a few #b Great Comets#! that got widespread public attention. If you have an [concept_verrier_astronomer] there is a chance that you will discover one of these #b Great Comets#! first, resulting in a bonus to Prestige and Research."
 concept_verrier_moon_photo: "Moon Photo"
 concept_verrier_moon_photos: "Moon Photos"
 concept_rapanui_christian_mission: "Christian Mission"
 concept_rapanui_christian_missions: "Christian Missions"
 concept_rapanui_christian_mission_desc: "[Concept('concept_major_power','$concept_major_powers$')] or [Concept('concept_great_power','$concept_great_powers$')] with [Concept('concept_interest','$concept_interests$')] in Oceania can try to convert a decentralized island nation in the region - but this is only possible if your country is not too secular and the \"devout\" interest group is not too weak.\n\nThe proselytizing takes place in three steps. If you send a missionary, he will either be received kindly, ignored - or killed immediately. Should your mission go awry, you will have to wait a few years to find a new missionary to spread the word of God. Afterwards your missionary will convert 1% of the population per year. There might be events that help or hinder the conversion.\n\nThe second stage begins when you reach 30% converted natives. Now your Missionary Station will become permanent. Should 51 percent of the natives profess Christianity, then the chief will convert to your religion and place himself under your protection as a [concept_protectorate]. Years later, these areas can even be annexed if you have the technology to prevent malaria.\n\nIn the third stage you can actively make decisions via the Journal Entry. Either you strengthen the mission directly by sending additional missionaries, or you try to trade. You can acquire rare [Concept('concept_lepsius_artifact','$concept_lepsius_oceanic_artifacts$')], [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] or pearls that increase the standard of living of the rich."
 concept_manzoni_literary_tradition: "Literary Tradition"
 concept_klimt_painters: "#PURPLE #b Painters#!#!"
 concept_klimt_painting_tradition: "Painting Tradition"
 concept_vikelas_sports: "Sports"
 concept_vikelas_sports_desc: "#b Sports#! are one of the main features of [concept_morgenroete].\n\nOnce a country discovers #b Organized Sports#!, it gets access to different sporting activities. The most important one is the foundation of the [concept_vikelas_ioc] which will start to organize the [concept_vikelas_olympic_games]. The Olympic Games will give you a chance to win Gold Medals that will provide your country with [concept_prestige]."
 concept_vikelas_olympic_games: "올림픽 대회"
 concept_vikelas_olympic_games_desc: "Once the [concept_vikelas_ioc] is founded, the #b Olympic Games#! can take place every 4 years. Each time the Comittee will vote for a #b Host#!. The host country will get a big [concept_prestige] boost.\n During the Olympic Games your Athletes will compete for medals. Many factors influence how many Medals you will get. Your population has a small influence, the [concept_sol] has a bigger infleunce, some events influence your chances as well and so do great [Concept('concept_general', '$concept_generals$')] and great [Concept('concept_admiral', '$concept_admirals$')]. Additionally characters with the #b Athlete#! trait and Urban Centers with the #b Sports Facilities#! also give small boosts.\nAll those factors have an influence on how many medals out of the 12 Gold Medals your country will get. Each Gold Medal will grant you 5 [concept_prestige]."
 concept_vikelas_ioc: "국제올림픽위원회"
 concept_vikelas_ioc_desc: "A Nation that has researched #V $vikelas_international_sports_tech$#! can found the #b International Olympic Comittee#! or #b IOC#! in short. The IOC will then start organizing the [concept_vikelas_olympic_games]. Each member of the IOC can participate in the Olympic Games.\n The most important members of the IOC are the #b Board Members#!. The Founder of the IOC will become the #b President#! and therefore stay a board member forever while the other members will be elected every 4 years. The Board has space for 5 Great Powers, 2 European, 2 Asian, 2 American, 1 African and 1 Oceanic nation.\nThe main task of the Board Members is choosing the next Host of the Games. There will be 3 candidates (or 4 if a country decides to bribe the Board) to choose from.\nIf Greece founds the IOC, the Olympic Games will only be held in Greece resulting in the Board being less important, as they do not choose the Host."
 concept_lepsius_exhibition_desc: "Your [concept_lepsius_museum] will automatically set up Exhibitions (in form of a [concept_production_method] for each region) if you have enough [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] of the same kind. For normal Artifacts the first Exhibition will be created for 10 or more artifacts. From there better Exhibitions are possible with 25 (Medium Exhibition), 50 (Large Exhibition) and 100 Minor Artifacts (Excellent Exhibition). The Excellent Exhibition additionally needs one [concept_lepsius_major_artifact].\n\nLocal Artifacts have a less diverse set of Exhibitions as they are limited to a regular and a grand Exhibition. The regular Exhibition requires 25 local Artifacts and the Grand Exhibition requires 50."
 concept_vikelas_racer: "Car Racer"
 concept_vikelas_racers: "Car Racers"
 concept_vikelas_racer_desc: "A Car Racer is a special [concept_character] who takes part in [concept_vikelas_car_racing]."
 concept_vikelas_car_racing: "Car Racing"
 concept_vikelas_car_racing_desc: "Car Racing is a sport in which [Concept('concept_vikelas_racer','$concept_vikelas_racers$')] compete against each other either on a track or on regular roads."
 concept_lepsius_archaeological_exhibition: "Archaeological Exhibition"
 concept_elgar_opera_desc: "The #b Opera#! is the musical center of a nation. It is where the most important musicians gather and play for the masses.\nThe #b Opera#! is a seperate building that can be constructed in states if the Urban Center is at least level 5. The #b Opera#! will produce Music and consume Instruments. The higher the level of the #b Opera#! is, the more [concept_elgar_musical_tradition] will be produced every year.\nAdditionally with an #b Opera#! you gain access to some decisions like visiting your Opera."
 concept_elgar_impressionism_desc: "#b Impressionism#!  is a style in art history that is characterized by the atmospheric depiction of fleeting snapshots of a scene. It emerged from a movement within painting in France in the second half of the 19th century. The term impressionism has also been applied to certain styles of music, literature, film and photography. While many Naturalists such as Heinrich Hart rejected music as a means of expressing a 'truth-seeking Actionism', the Impressionists often regarded the 'objectless dreaming ahead' to finely graduated colorful chords as a pleasure.\n\nIn the game, #b Impressionism#! is only unlockable with a journal entry that requires 1000 [concept_elgar_musical_tradition], an [concept_elgar_opera], powerful landowners, industrialists that are not powerful and an Intelligentsia with an approval of 5 above. If you choose #b Impressionism#!, you won't be able to unlock the other two branches.\n\nThe focus of #b Impressionism#! in the game is music. Therefore it will give you the biggest bonus to [concept_elgar_musical_tradition]."
 concept_elgar_expressionism_desc: "#b Expressionism#!  is a style in art. Its beginnings and forerunners can be found in the late 19th century. Like Impressionism, Symbolism and Fauvism, Expressionism is a movement against the tendencies of Naturalism. In Expressionism, the expressive level outweighs the aesthetic, appellative and factual level. The artist wants to represent his experience for the viewer. In contrast to musical impressionism, which depicts the perception of the external appearance of things, the expressionist art movements formulate the emotions of the human soul.\n\nIn the game, #b Expressionism#! is only unlockable with a journal entry that requires 1000 [concept_elgar_musical_tradition], an [concept_elgar_opera], a powerful intelligentsia or trade unions, landowners that are not powerful and either the Intelligentsia or the trade unions need an approval of 5 or above. If you choose #b Expressionism#!, you won't be able to unlock the other two branches.\n\nThe focus of #b Expressionism#! in the game would be literature, but it is not yet implemented."
 concept_elgar_art_nouveau_desc: "#b Art Nouveau#! is an Artstyle that developed from the #italic Arts and Crafts Movement#! and was inspired by natural forms. It often focused on dynamism and movement and used modern materials.\n\nIn the game, #b Art Nouveau#! is only unlockable with a journal entry that requires 1000 [concept_elgar_musical_tradition], an [concept_elgar_opera], powerful industrialists and an Intelligentsia with an approval of 5 or above. If you choose #b Art Nouveau#!, you won't be able to unlock the other two branches.\n\nThe focus of #b Art Nouveau#! and #b Art Déco#!, the next technology in this branch, is Architecture. You will get various events and journal entries about architectural deeds and be able get a [concept_gaudi_architectural_splendour]."
 concept_elgar_composer: "#PURPLE #b Composer#!#!"
 concept_elgar_composers: "#PURPLE #b Composers#!#!"
 concept_elgar_composer_desc: "#b Composers#! are men and women who compose music. Composers are special character types that you can gain either from events, from gaining enough [concept_artistic_progress] to create one in your nation or by offering a position to a [concept_elgar_travelling_composer].\nOnce you have a #b Composer#! you can let them start [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], to go on [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')] or composing [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')]. Each action is different in what the composer does, what they require and what you gain from them. The #b Composer#! will be [Concept('concept_elgar_composer_exhaustion','$concept_elgar_composer_exhaustion_exhausted$')] after every task and need to rest for a while until he can work again.\nDuring their life, #b Composers#! will gain [concept_artists_experience] and sometimes lose it again. The higher the #b Reputation#!, the greater the benefits of a #b Composer's#! actions will be. #b Composers#! reaching a #b Reputation#! of 500 will become [Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')], Titans of Music, known throughout the world."
 concept_elgar_great_composer: "#PURPLE #b Great Composer#!#!"
 concept_elgar_great_composers: "#PURPLE #b Great Composers#!#!"
 concept_elgar_great_composer_desc: "#b Great Composers#! are the Titans of music. The ones whose names will be known for all eternity. [Concept('concept_elgar_composer','$concept_elgar_composers$')] reaching 500 [concept_artists_experience], will become #b Great Composers#!. This will greatly increase their efficiency and let your nation gain way more [concept_elgar_musical_tradition]. A #b Great Composer#! can create a [concept_elgar_musical_masterwork] way faster for example."
 concept_elgar_travelling_composer: "Travelling Composer"
 concept_elgar_travelling_composers: "Travelling Composer"
 concept_elgar_travelling_composer_desc: "#b Travelling Composers#! are [Concept('concept_elgar_composer','$concept_elgar_composers$')] that are not hired by any nation. Instead they travel around on concert tours. You can possibly aquire a #b Travelling Composer#!, but the more [concept_artists_experience] they have the more demands they will have.\nTo invite a #b Travelling Composer#! you need to at least have an [Concept('concept_elgar_opera','$concept_elgar_opera_house$')]. #b Composers#! with a higher #b Reputation#! will demand bigger Opera Houses, modern music [Concept('concept_technology', '$concept_technologies$')], a certain [concept_elgar_musical_tradition] and some might only join [Concept('concept_major_power', '$concept_major_power_short$')] or [Concept('concept_great_power', '$concept_great_powers$')].\nA special case are [Concept('concept_elgar_national_composer','$concept_elgar_national_composers$')] that are only available to nations that are of the same or a very similar national identity."
 concept_elgar_national_composer: "National Composer"
 concept_elgar_national_composers: "National Composer"
 concept_elgar_national_composer_desc: "#b National Composers#! are [Concept('concept_elgar_composer','$concept_elgar_composers$')] who value their nation very much. They will not be able to be hired by other nations.\nWhether a #b National Composer#! is available to you or not is decided by their culture's [Concept('concept_cultural_trait','$concept_cultural_traits$')]. One of your primary cultures needs to share both a non-heritage #b Trait#! as well as a [concept_cultural_heritage_trait]. This means that a North German #b National Composer#! will be available to German Countries as well as Switzerland."
 concept_elgar_composing: "Composing"
 concept_elgar_composing_lower_case: "composing"
 concept_elgar_composing_compose: "compose"
 concept_elgar_composing_desc: "A [concept_elgar_composer] who #b composes#! receives 5 [concept_artists_experience] per year and adds 5 [concept_elgar_musical_tradition] to the country. In addition, he creates a random number of compositions each year. A #b Composer#! with special skills such as Conductor, Virtuoso, Innovative or Meticulous creates one additional composition per year. The number of compositions is decisive for success in later [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tour_tours$')]. A #b Composer#! composes until the action is canceled in the Journal Entry. A #b Composer#! who composes costs the country a small annual maintenance fee."
 concept_elgar_conducting: "Conducting"
 concept_elgar_conducting_lower_case: "conducting"
 concept_elgar_conducting_conduct: "conduct"
 concept_elgar_conducting_desc: "The [concept_elgar_composer] will focus on #b conducting#! for 24 months and organize a concert season. This will improve the music output of a random [concept_elgar_opera] for 5 to 10 years, give your nation a small boost to [concept_elgar_musical_tradition] and give your #b Composer#! a medium boost to his [concept_artists_experience]. If your #b Composer#! is not yet a Conductor, he can gain the [concept_character_trait] at the end of the season. You will have to pay the #b Composer#! while he is #b conducting#!."
 concept_elgar_musical_tour: "Concert Tour"
 concept_elgar_musical_tours: "Concert Tours"
 concept_elgar_musical_tour_tour: "Tour"
 concept_elgar_musical_tour_tours: "Tours"
 concept_elgar_musical_tour_desc: "The [concept_elgar_composer] can go on a #b Concert Tour#! abroad for 30 months. #b Concert Tours#! increase the [concept_prestige] of the #b Composer's#! nation. Additionally the #b Composer#! gains a boost of [concept_artists_experience] at the end of the #b Tour#! that depends on the number of Compositions of the #b Composer#! as well as his traits.\n#b Composers#! with less than 20 Compositions should probably not go on #b Tours#! and #b Composers#! with the #b Reserved#! Trait can not go on #b Tours#!."
 concept_elgar_musical_masterwork: "음악계 걸작"
 concept_elgar_musical_masterworks: "음악계 걸작"
 concept_elgar_musical_masterwork_masterwork: "걸작"
 concept_elgar_musical_masterwork_masterworks: "걸작"
 concept_elgar_musical_masterwork_of_music: "음악의 걸작"
 concept_elgar_musical_masterworks_of_music: "음악의 걸작"
 concept_elgar_musical_masterwork_desc: "[concept_elgar_composer]는 #b 걸작#! 작곡을 개시할 수 있으며 수년의 시간이 소요됩니다. #b 작곡가#!의 [concept_artists_experience]가 많을수록 작곡도 빨리 끝내게 됩니다. #b 걸작#!이 한번 탄생하면 #b 작곡가#!는 [concept_artists_experience] 50을 획득하며 나라에는 [concept_rank]에 따라 [concept_elgar_musical_tradition]을 150까지 획득하게 됩니다. \n#b 작곡가#!는 #b 걸작#!을 최대 3점까지 만들 수 있으며 작곡하는 동안 나라에서 금전적 지원을 해주어야 합니다."
 concept_elgar_composer_exhaustion: "Composer Exhaustion"
 concept_elgar_composer_exhaustion_exhausted: "exhausted"
 concept_elgar_composer_exhaustion_desc: "Once a [concept_elgar_composer] finished [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], composing [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')] or a [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')], he will be #b exhausted#! from the work. An #b exhausted Composer#! will not be able to work for some time. The older the #b Composer#!, the longer it takes get rid of the #b Exhaustion#!."
 concept_manzoni_writer: "#PURPLE #b 작가#!#!"
 concept_manzoni_writers: "#PURPLE #b 작가#!#!"
 concept_klimt_painter: "#PURPLE #b 화가#!#!"
 concept_pm_artists_academy_conservatory: "#b #PURPLE Conservatory#!#!"
 concept_pm_artists_academy_conservatory_desc: "A Conservatory will specializes the Arts Academy for Music. If you have a Conservatory, you will be able to promote [Concept('concept_elgar_composer','$concept_elgar_composers$')]. You will get a #n negative throughput modifier#! for the Art Academy as well as a #n negative effect#! on your [concept_artistic_progress] when you change this production method."
 concept_pm_artists_academy_salon: "#b #PURPLE Literary Salon#!#!"
 concept_pm_artists_academy_salon_desc: "A Literary Salon will specializes the Arts Academy for Literature. If you have a Literature Salon, you will be able to promote [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]. You will get a #n negative throughput modifier#! for the Art Academy as well as a #n negative effect#! on your [concept_artistic_progress] when you change this production method."
 concept_pm_artists_academy_studio: "#b #PURPLE Art Studio#!#!"
 concept_pm_artists_academy_studio_desc: "An Art Studio will specializes the Arts Academy for Painting. If you have a Art Studio, you will be able to promote [Concept('concept_klimt_painter','$concept_klimt_painters$')]. You will get a #n negative throughput modifier#! for the Art Academy as well as a #n negative effect#! on your [concept_artistic_progress] when you change this production method."
 concept_pm_artists_academy_specialization: "Arts Academy Focus"
 concept_pm_artists_academy_specialization_desc: "Every Arts Academy can be specialized by changing its production method.\nAn Arts Academy with a [concept_pm_artists_academy_conservatory] will allow you to promote [Concept('concept_elgar_composer','$concept_elgar_composers$')].\nAn Arts Academy with a [concept_pm_artists_academy_salon] will allow you to promote [Concept('concept_manzoni_writer','$concept_manzoni_writers$')].\nAn Arts Academy with an [concept_pm_artists_academy_studio] will allow you to promote [Concept('concept_klimt_painter','$concept_klimt_painters$')].\nChanging the Specialization will have a #n short negative effect#! for the building and your [concept_artistic_progress]."
 concept_artists_artist: "Artist"
 concept_artists_artists: "Artists"
 concept_artistic_progress: "Artistic Progress"
 concept_artistic_progress_desc: "By aquiring 1000 #b Artistic Progress#! you can gain a new [concept_artists_artist]. To even have access to #b Artistic Progress#!, you must either have an #b Arts Academy#! or an #b Opera#!.\nYour #b Artistic Progress#! gain is influenced by various factors. The more [concept_literacy] you have, the faster you gain #b Artistic Progress#! for example. You can gain detailed information on all the factors influencing Artistic Progress from the Toolbar of the Artistic Progress Bar in the Arts Window."
 concept_artists_experience: "Reputation"
 concept_artists_experience_desc: "Every [concept_artists_artist] has a #b Reputation#!. The Reputation represents how well regarded the artist is. Artists start with a small amount of Reputation and can gain additional Reputation by working in their field. Artists that gained a Reputation of 500, will become a #Great Artists#! and get the corresponding [concept_character_trait]."
 concept_manzoni_great_writer: "Great Writer"
 concept_manzoni_local_writer: "Local Writer"
 concept_artists_center_of_arts: "예술의 중심지"
 concept_artists_centers_of_arts: "예술의 중심지"
 concept_artists_center_of_classicism: "고전주의의 중심지"
 concept_artists_center_of_romanticism: "낭만주의의 중심지"
 concept_artists_center_of_realism: "사실주의의 중심지"
 concept_artists_center_of_impressionism: "인상주의의 중심지"
 concept_artists_center_of_expressionism: "표현주의의 중심지"
 concept_artists_center_of_art_nouveau: "아르누보의 중심지"
 concept_klimt_great_painter: "#PURPLE #b 위대한 화가#!#!"
 concept_klimt_great_painters: "#PURPLE #b 위대한 화가#!#!"
 concept_klimt_great_painter_desc: "#b 위대한 화가#!는 영원히 기억될 [Concept('concept_klimt_painter','$concept_klimt_painters$')]입니다. #b 화가#!가 500 [concept_artists_experience]에 도달하면 #b 위대한 화가#!가 됩니다. 이로써 화가의 효율성이 크게 향상되고 나라에서는 [concept_klimt_painting_tradition]을 더 많이 획득할 수 있게 됩니다."
 concept_klimt_independent_painter: "독립 화가"
 concept_klimt_independent_painters: "독립 화가"
 concept_klimt_painter_trip: "화가의 유학"
 concept_klimt_painter_trip_journeys: "유학"
 concept_elgar_music_desc: "#b Music Culture#! is one of the main features of [concept_morgenroete]. During the 19th and 20th Century, Music was important as a mean to entertain the populace and to show a nations greatness.\n\nTo access most of the Music content in #r Morgenröte#! you will need to build an [concept_elgar_opera]. The #b Opera#! will produce Music but needs Instruments to operate. Apart from producing #b Music #! for your populace to consume, #b Operas#! will slowly add [concept_elgar_musical_tradition] to your Country.\n\n#b Musical Tradition#! reflects a nation's musical achievements and traditions. The amount of #b Musical Tradition#! gives you a prestige bonus and allows you to choose a path for your nation's art to go forward. You can either go the route of [concept_elgar_impressionism], [concept_elgar_expressionism] or [concept_elgar_art_nouveau]. Each one of these Art Styles has another focus.\n\nA good way to gain even more #b Musical Tradition#! is by getting a [concept_elgar_composer]. A composer will be able to [Concept('concept_elgar_composing','$concept_elgar_composing_compose$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_conduct$')], go on [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')] and even create [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterworks_of_music$')]. These actions will either improve the #b Composer's#! [concept_artists_experience] or improve your nations #b Musical Tradition#!."
 concept_artists_center_of_arts_desc: "A #b Center of Arts#! is a center of an [concept_artists_art_style] that gets created in a [concept_state_region] once an #b Art Style#! gets invented. There is only one #b Center of Arts#! per #b Art Style#!.\n#b Center of Arts#! are especially important for [Concept('concept_klimt_painter','$concept_klimt_painters$')] that can take [concept_klimt_painter_trip] to study the #b Art Style#! there. Apart from that some #b Center of Arts#! offer unique events that will happen there. Some for example allow you to win [Concept('concept_klimt_art_prize','$concept_klimt_art_prizes$')]."
 concept_klimt_painting_culture: "Painting Culture"
 concept_klimt_painting_culture_desc: "#b Painting Culture#! is one of the main features of [concept_morgenroete]. During the 19th and 20th Century, Painting developed rapidly resulting in various new [Concept('concept_artists_art_style','$concept_artists_art_styles$')] that brought a lot of progress to individuals and countries.\n\nTo access most of the Painting content in #r Morgenröte#! you will need to build an #b Arts Academy#!. #b Arts Academies#! allow you to start gaining [concept_klimt_painting_tradition] and to recruit new [Concept('concept_klimt_painter','$concept_klimt_painters$')]\n\n#b Painters#! will createpaint paintings and #b Masterworks#! for your country and give you a big amount of #b Painting Tradition#!. As there are different [Concept('concept_artists_art_style','$concept_artists_art_styles$')] for #b Painters#! to focus on, you can let them study additional #b Art Styles#! on a [concept_klimt_painter_trip]. Once they turn 40 years old, #b Painters#! will specialize in one of their #b Art Styles#! and focus on creating paintings in that #b Art Style#!."
 concept_artists_art_style: "Art Style"
 concept_artists_art_styles: "Art Styles"
 concept_artists_art_style_style: "Style"
 concept_artists_art_style_desc: "An #b Art Style#! is a specific focus of Art. Some #b Art Styles#! are there from the beginning like #b Classicism#! and #b Romanticism#!. The others, #b Realism#!, #b Irrationalism#!, [concept_elgar_impressionism], [concept_elgar_expressionism] and [concept_elgar_art_nouveau], only appear later after certain conditions are met. Every #b Art Style#! has a corresponding [concept_artists_center_of_arts] in the [concept_state_region] where it started."
 concept_klimt_painter_desc: "#PURPLE #b Painters#!#! are men and women that create paintings and other pieces of art. #b Painters#! are special character types that you can gain either from events, from gaining enough [concept_artistic_progress] to create one in your nation or by offering a position to a [concept_klimt_independent_painter].\n#b Painters#! will immediately start to paint and create a number of paintings each year depending on their [Concept('concept_character_trait','$concept_character_traits$')]. Sometimes they can even create a #b Masterwork#! that will give you even more [concept_klimt_painting_tradition].\n#b Painters#! can study different [Concept('concept_artists_art_style','$concept_artists_art_styles$')] on [Concept('concept_klimt_painter_trip','$concept_klimt_painter_trip_journeys$')]. Each #b Painter#! will specialize in an #b Art Style#! once they are 40 years old which will allow them to paint #b Masterworks#! of a certain Style."
 concept_klimt_independent_painter_desc: "[Concept('concept_klimt_painter','$concept_klimt_painters$')] that are not hired by a country are #b Independent Painters#!. #b Independent Painters#! can be hired by countries that have a [Concept('concept_primary_cultures','$concept_primary_culture$')] that shares a [concept_cultural_trait] with the culture of the #b Painter#!.\n#b Independent Painters#! have various requirements for their host country. You will need #b Arts Academies#!, certain [Concept('concept_technology', '$concept_technologies$')] or [concept_klimt_painting_tradition] depending on the #b Painter's#! [concept_artists_experience]. Additionally you will have to pay them a sum of money that depends on their #b Renown#! as well as your country's financial capabilities."
 concept_klimt_painter_trip_desc: "A [concept_klimt_painter] can learn new [Concept('concept_artists_art_style','$concept_artists_art_styles$')] on an #b Educational Journey#! to one of the [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')].\nOn such a #b Trip#! a painter can gain positive and negative [Concept('concept_character_trait','$concept_character_traits$')] that will influence their work and the number of paintings they create. Each #b Center of Arts#! has slightly different events and will give the #b Painter#! a unique #b Trait#! at the end that can later become the #b Painter's#! Specialization."
 concept_klimt_art_prize: "Art Prize"
 concept_klimt_art_prizes: "Art Prizes"
 concept_klimt_art_prize_desc: "From time to time, artistic competitions are held in which prizes are awarded - which promote an artist's reputation. Nations that have a [concept_artists_center_of_arts] for Irrationalism or [concept_elgar_impressionism] choose the best musicians in a competition that takes place every five years. The owners of an [concept_klimt_art_gallery] or a #b Center of Art of Realism#! come to host a painting competition that takes place every five years. The country from which the winners come also receives Music or Painting Tradition. A special form of art competition is the Biennale, which every two years awards a comprehensive art prize to the country that has the artists with the highest reputation, which increases all cultural tradition values."
 concept_klimt_art_gallery: "Art Gallery"
 concept_klimt_art_gallery_desc: "The #b Art Gallery#! is a special building in a nation's capital that is available starting with #b Realism#!. It can only be built if the nation has a [concept_klimt_painter] with specialization. #b Painters#! with a specialization unlock the collection of their [Concept('concept_artists_art_style','$concept_artists_art_style_style$')] - that is, an artist with a specialization in the Romantic style unlocks a collection of Romanticism. In order to upgrade a collection to an excellent collection, a masterpiece of this kind is required, which must either be painted by a painter or acquired from abroad."
 concept_manzoni_writer_novelist: "Novelist"
 concept_manzoni_writer_desc: "A #b Writer#! is a special character that will write works of literature for your country. #b Writers#! usually start as [concept_manzoni_local_writer] and will write #b Publications#! and sometimes even [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')]. A #b Bestseller#! will grant the #b Writer#! a big amount of [concept_artists_experience] and [concept_manzoni_literary_tradition] to your country. There is a chance to write a #b Bestseller#! every year, depending on how close the #b Writer's#! [concept_manzoni_genre] is to the [concept_manzoni_popular_taste].\n\nA well known #b Writer#! whose [concept_interest_group] is happy enough, can become your [concept_manzoni_national_writer]. A #b National Writer#! can gain [Concept('concept_manzoni_book_licence','$concept_manzoni_book_licences$')] or create a Newspaper Novel. If a #b Writer#! gains 500 #b Reputation#! they can become a [concept_manzoni_great_writer] and provide your country with even more #b Literary Tradition#!.\n\nBe careful, if #b Writers#! are unhappy with the political situation in a country, they can decide to become [Concept('concept_agitator', '$concept_agitators$')] or interfere in the political discourse."
 concept_manzoni_great_writer_desc: "A #b Great Writer#! is a [concept_manzoni_writer] known all over the world. A #b Writer#! can becoma a #b Great Writer#! once their [concept_artists_experience] reaches #V 500#!. If your #b Great Writer#! is your [concept_manzoni_national_writer] you will get a bonus to your yearly [concept_manzoni_literary_tradition] gain."
 concept_manzoni_local_writer_desc: "Nearly every [concept_manzoni_writer] starts as a #b Local Writer#!. Every country can have a maximum of 3 #b Local Writers#! that will create #b Publications#!, grant you [concept_manzoni_literary_tradition] if their [concept_manzoni_genre] matches the [concept_manzoni_popular_taste] and gain [concept_artists_experience].\nA #b Local Writer#! with a #b Reputation#! of 150 and whose [concept_interest_group] is not unhappy, can become a countries [concept_manzoni_national_writer] which will grant you more #b Literary Tradition#! and other additional advantages.\nBe aware that #b Local Writers#! unhappy with the current political situation can start to interfere in the political discourse or even become an [concept_agitator]"
 concept_manzoni_national_writer: "National Writer"
 concept_manzoni_national_writer_desc: "A #b National Writer#! is a type of [concept_manzoni_writer] that is considered to be the face of your countries literature. #b National Writers#! Grant you a minimum of 1 and up to 5 [concept_manzoni_literary_tradition].\nYou can gain a #b National Writer#! by appointing one of your [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')]. To be able to appoint one of your #b Local Writers#! they must have at least #V 150#! [concept_artists_experience] and their [concept_interest_group] must have a positive [concept_approval].\n"
 concept_manzoni_bestseller: "Bestseller"
 concept_manzoni_bestsellers: "Bestsellers"
 concept_manzoni_bestseller_desc: "A #b Bestseller#! is a #b Publication#! by a [concept_manzoni_writer] that is selling very well, usually because the #b Writer's#! [concept_manzoni_genre] matches or is close to the current [concept_manzoni_popular_taste].\nEvery year there is a chance for a [concept_manzoni_national_writer] or [concept_manzoni_local_writer] to write a #b Bestseller#!. The first #b Bestseller#! will grant a big amount of [concept_manzoni_literary_tradition] and every #b Bestseller#! after the first one will grant the country a significant amount of #b Literary Tradition#!."
 concept_manzoni_genre: "Genre"
 concept_manzoni_genres: "Genres"
 concept_manzoni_genre_desc: "Every [Concept('concept_manzoni_writer','$concept_manzoni_writer_novelist$')] has a specific #b Genre#! for their writing. The #b Genre#! gets assigned when the #b Writer#! gets created and depends on many factors.\n#b Writers#! will gain more [concept_artists_experience] and write more [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')] when their #b Genre#! matches or is close to the [concept_manzoni_popular_taste] of the country."
 concept_manzoni_popular_taste: "Popular Taste"
 concept_manzoni_popular_taste_audience: "Audience Taste"
 concept_manzoni_popular_tastes_audience: "Audience Tastes"
 concept_manzoni_popular_taste_desc: "Every nation's population has a #b Taste#! for a specific [concept_manzoni_genre]. About every 10 years this #b Taste#! will change depending on political, social and cultural changes in the country itself.\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] who have a #b Genre#! matching the #b Taste#! or close to it will gain more [concept_artists_experience] and write more [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')].\n\n#V Close Tastes:#!\n- #b $manzoni_taste_adventure_var_loc$#!: $manzoni_genre_science_fiction$, $manzoni_genre_juvenile$, $manzoni_genre_crime_mystery$\n- #b $manzoni_taste_crime_var_loc$#!: $manzoni_genre_science_fiction$, $manzoni_genre_adventure$, $manzoni_genre_romance$\n- #b $manzoni_taste_devotional_var_loc$#!: $manzoni_genre_juvenile$, $manzoni_genre_romance$, $manzoni_genre_adventure$\n- #b $manzoni_taste_juvenile_var_loc$#!: $manzoni_genre_adventure$, $manzoni_genre_devout$, $manzoni_genre_crime_mystery$\n- #b $manzoni_taste_literary_var_loc$#!: $manzoni_genre_social_critic$, $manzoni_genre_science_fiction$, $manzoni_genre_romance$\n- #b $manzoni_taste_romance_var_loc$#!: $manzoni_genre_devout$, $manzoni_genre_juvenile$, $manzoni_genre_literary_fiction$\n- #b $manzoni_taste_science_var_loc$#!: $manzoni_genre_adventure$, $manzoni_genre_social_critic$, $manzoni_genre_literary_fiction$\n- #b $manzoni_taste_social_var_loc$#!: $manzoni_genre_literary_fiction$, $manzoni_genre_juvenile$, $manzoni_genre_crime_mystery$"
 concept_manzoni_book_licence: "Book Licence"
 concept_manzoni_book_licences: "Book Licences"
 concept_manzoni_book_licence_desc: "Foreign publishers can get contracts with a [concept_manzoni_national_writer] and offer his books as translations in their own market. This happens when a writer meets the [Concept('concept_manzoni_popular_taste','$concept_manzoni_popular_tastes_audience$')] abroad. If an author gets at least five book licenses, his books are considered world literature. He can then go on a reading tour."
 concept_manzoni_local_writers: "Local Writers"
 concept_manzoni_library: "National Library"
 concept_manzoni_library_desc: "Your #b National Library#! will automatically set up Book Collections (in form of a [concept_production_method]) if you have enough [concept_manzoni_publications]. The first Book Collection will be created for 1.000 or more publications. From there better Collections are possible with 2.500 (Tiny Book Collection), 5.000 (Small Book Collection), 10.000 (Medium Book Collection), 25.000 (Large Book Collection), 50.000 (Excellent Book Collection) and 100.000 (Great Book Collection)."
 concept_manzoni_publications: "Publications"
 concept_manzoni_publications_desc: "#b Publications#! include all newly published book titles, newspapers, essays and other similar written products in a nation. They are not consistent with @manzoni_prints! $manzoni_prints$ circulating as commodities. Publications can also appear independently of the publishing industry, for example through the in-house printing presses of government buildings or universities. Academics and private individuals also produce publications depending on their literacy level. However, the publishing industry accounts for the lion's share, and the decisive factor is whether a modern production method is used or not. A large number of publications is fundamental to the expansion of a [concept_manzoni_library]."
 concept_curtiss_tourism: "Tourism"
 concept_curtiss_tourism_desc: "Tourism provides a culturally superior nation with additional income. Unique monuments, museums and art galleries, archaeological sites, centers of art as well as high values in the various cultural traditions are factors that make a nation an attractive tourist destination. Laws that increase freedom of movement and economic activity also contribute to higher tourism income. The infrastructure also plays a crucial role - after all, remote places cannot be reached. An airport in particular revolutionizes tourism and provides a significant increase in revenue."
 concept_curtiss_private_airline: "Private Airline"
 concept_mendelejew_chemist: "#b #ORANGE Chemist#!#!"
 concept_manzoni_literature: "Literary Culture"
 concept_manzoni_literature_desc: "#b Literary Culture#!is one of the main features of [concept_morgenroete]. Print culture and newspaper culture in particular experienced significant upheavals in the 19th and 20th centuries. The mass of printed products and everyday use is represented by the printing industry. The cultural value of the literature produced is reflected in the [concept_manzoni_literary_tradition]. The latter depends largely on the [Concept('concept_manzoni_writer','$concept_manzoni_writers$')] of a country, and there are [Concept('concept_manzoni_local_writer','$concept_manzoni_national_writers$')] and [Concept('concept_manzoni_national_writer','$concept_manzoni_local_writers$')]. Whether they live in the shadows or become celebrated authors depends on the [concept_manzoni_popular_taste]."
 concept_morgenroete_desc: "#r Morgenröte - Dawn of Flavor #! is a mod created to broaden the cultural and scientific aspects of Victoria 3. It features content for various aspects of the Victorian Age:\n\n#V Lepsius: #! [concept_lepsius_archaeology]\n#V Verrier:#! [concept_verrier_astronomy]\n#V Gaudi:#! [concept_elgar_architecture] & [concept_tesla_engineering]\n#V Dubois:#! [concept_dubois_natural_history]\n#V Mendelejew:#! [concept_mendelejew_chemistry]\n#V Elgar:#! [concept_elgar_music]\n#V Manzoni:#! [concept_manzoni_literature]\n#V Klimt:#! [concept_klimt_painting_culture]\n#V Curtiss:#! [concept_curtiss_aviation]\n#V Vikelas:#! [concept_vikelas_sports]"
 concept_agassiz_mineral: "Mineral"
 concept_agassiz_minerals: "Minerals"
 concept_agassiz_mineral_desc: "Minerals are all types of special types of rock that do not fall under the known resources used in industry. A nation receives a certain number of minerals annually once it has invented the #b Geology#! Technology. If a [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] is in the service of this nation, he can find additional minerals. Locations of minerals are characterized by state modifiers: mountains, deserts, arctic areas, raw material deposits (coal, iron and sulfur areas, for example) as well as geological [Concept('concept_dubois_formation','$concept_dubois_formations$')] and volcanoes. Deserts and arctic areas are considered to be poor in minerals, while great geological formations and volcanoes are considered to be particularly rich in minerals. A more valuable form of minerals are [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]."
 concept_agassiz_rare_mineral: "Rare Mineral"
 concept_agassiz_rare_minerals: "Rare Minerals"
 concept_agassiz_rare_mineral_desc: "[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] can find Rare Minerals on their expeditions, such as [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')], [concept_douglas_mountaineering] expeditions, [concept_agassiz_volcano] expeditions or during mineral prospecting. Unlike common [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')], they are only found in very limited quantities. Rare Minerals are used to build a mineral cabinet."
 concept_agassiz_geologist: "#b #GREEN Geologist#!#!"
 concept_agassiz_geologists: "#b #GREEN Geologists#!#!"
 concept_agassiz_geologist_desc: "#b #GREEN Geologists#!#! are [Concept('concept_academics_academic','$concept_academics_academics$')] who primarily study rocks and earth history. They locate [Concept('concept_lepsius_cave','$concept_lepsius_caves$')], [Concept('concept_dubois_formation','$concept_dubois_formations$')] and [Concept('concept_curie_uranium','$concept_curie_uranium$')] deposits, which makes them irreplaceable colleagues for [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] and [Concept('concept_curie_physicist','$concept_curie_physicists$')]. During their expeditions, they may find additional [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] that a [concept_mendelejew_chemist] can use to discover or isolate [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]. They can find new deposits of raw materials. They are also active as volcanologists and can go on expeditions to local [Concept('concept_agassiz_volcano','$concept_agassiz_volcanoes$')] to research them in more detail. Together with [Concept('concept_tesla_engineer','$concept_tesla_engineers$')], they can develop new devices, such as seismographs, to learn more about the Earth's interior. Geologists can take part in [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] and [concept_douglas_mountaineering] expeditions."
 concept_agassiz_volcano: "Volcano"
 concept_agassiz_volcanoes: "Volcanoes"
 concept_curie_physicist: "#b #ORANGE Physicist#!#!"
 concept_curie_physicists: "#b #ORANGE Physicists#!#!"
 concept_curie_physicist_desc: "#n Coming soon to Morgenröte!#!"
 concept_curie_uranium: "Uranium"
 concept_curie_uranium_desc: "Uranium is an extremely rare material that can only be found in a few selected, historical provinces by [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]. Modern Physics must have been researched for this. At first glance, uranium is a secondary ore that is only used in ceramic production. However, it will be needed later, especially in the [concept_verrier_observatory]. Only if the best physical and chemical production methods are supplied with uranium they can fulfill their purpose, whether in the field of nuclear physics or in the research of previously unknown elements. Without uranium, all scientific activities in the field of radioactivity are simply impossible. It is therefore particularly interesting for [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] and [Concept('concept_curie_physicist','$concept_curie_physicists$')] in the final phase of Victoria 3."
 concept_mendelejew_chemistry: "Chemistry"
 concept_mendelejew_chemistry_desc: "#b Chemistry#! is one of the main features of [concept_morgenroete]. Starting in the 18th Century, #b Chemistry#! rapidly developed into a modern science. Suddenly many new elements were discovered and chemical processes were invented. The 19th and 20th century saw even more discoveries in Chemistry, ranging from new elements to the invention of dynamite or the Haber-Bosch-Process.\n\nIn #b Morgenröte#! #b Chemistry#! will be conducted by [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] who will be able to focus on different tasks.\nOne focus is the improvement of your countries #b $building_chemical_plant$#!, #b $building_explosives_factory$#! or #b $building_synthetics_plant$#!, which will make those [Concept('concept_building', '$concept_buildings$')] more efficient.\nIf you are looking for a more prestigous task, you can let your #b Chemist#! theorize, discover or isolate [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]. Each Element will add a little bit of [concept_prestige] depending on whether you theoriized, discovered or isolated it.\nLater in the game the #b Chemist#! will also be able to invent #b Synthetic Oil#! and #b Synthetic Rubber#!. This will unlock the #b $building_mendelejew_hydrogenation_plants$#! or the #b $building_mendelejew_synthetic_rubber_factory$#!."
 concept_mendelejew_chemists: "#b #ORANGE Chemists#!#!"
 concept_mendelejew_chemist_desc: "#b #ORANGE Chemists#!#! are [Concept('concept_academics_academic','$concept_academics_academics$')] that will theorize, discover and isolate [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')].\n#b #ORANGE Chemists#!#! gain [concept_academics_experience] when they research #b Elements#! or attend Conferences. They can also improve fertilizers, explosives and synthetics. Chemists may invent the periodic table or synthetic fuel, making them valuable for countries without oil access. They get #b Experience#! passively as well each year. This allows #b #ORANGE Chemists#!#! to get better chemist traits. They may also get a specialization (theorist, analyst, inspector) when created or by event."
 concept_mendelejew_element: "Chemical Element"
 concept_mendelejew_element_no_chemical: "Element"
 concept_mendelejew_elements: "Chemical Elements"
 concept_mendelejew_element_desc: "In ancient times it was common to believe that the world consisted of the four elements: fire, earth, water and air. With the beginning of the emancipation of chemistry from alchemy, the scientific analysis of the chemical elements came about. This process was far from complete in the 19th century.\n\n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] can continue this research by theorizing, discovering, and isolating elements one at a time. Only when isolated is an element considered fully recognized and given its name; previously it is just a number. The categorization of elements brings scientific progress and chemist [concept_academics_experience].\nNot all elements can be theorized, discovered and isolated from the start.\n The prerequisite is that the chemical laboratory in the [concept_verrier_observatory] has adequate equipment, in some cases also an Institute for Modern Physics. Many elements can only be properly researched with spectrography; towards the end of the game, a cyclotron may be necessary. [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] are necessary for the discovery and isolation of chemical elements. In addition to production methods, the chemist's experience and character traits play a decisive role in how long the research takes.\n\nResearched elements are a requirement for the development of the periodic table and the organization of the chemistry congress."
 concept_verrier_meteorite: "Meteorite"
 concept_verrier_meteorites: "Meteorites"
 concept_manzoni_national_writers: "National Writers"
 concept_verrier_astronomy_desc: "#b Astronomy#! is one of the main features of [concept_morgenroete].\n\nTo gain access to #b Astronomy#! you need an [concept_verrier_observatory] or an [concept_verrier_astronomer].\n\nOnce you have an Observatory, you will passively discover [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')].\n\n If you have an [concept_verrier_astronomer] you will even be able to find new Planets, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] and take [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')].\nSometimes your [concept_agassiz_geologist] might also find [Concept('concept_verrier_meteorite','$concept_verrier_meteorites$')] which can be examined by #b Astronomers#! and [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')].\n\nEvery Astronomical discovery will grant you [concept_verrier_astronomical_prestige] which will be added to you [concept_prestige]. Check the $verrier_astronomical_prestige_modifier$ [concept_modifier] to see your #b Astronomical Prestige#!"
 concept_verrier_observatory_desc: "An #b Observatory#! is the backbone of a countries [concept_verrier_astronomy] and [concept_mendelejew_chemistry]. From there [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] can discover Planets, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] and take [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')].\nTo build an #b Observatory#!, you need to have a University and either the $verrier_astronomy_tech$ or $verrier_chemistry_tech$ [concept_technology] researched. Additionally an #b Observatory#! can only be built once and only in your capital."
 concept_verrier_astronomer_desc: "#b Astronomers#! are Academics that will explore the sky and discover [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] and [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')].\n#b Astronomers#! gain [concept_academics_experience] when they discover #b Astronomical Objects#! or attend Conferences. They get #b Experience#! passively as well each year. This allows #b Astronomers#! to get better astronomer traits.\n\nAn #b Astronomer#! can focus on discovering new #b Satellites#! or #b Taking Moon Photos#!. This will however reduce the amount of discovered #b Astronomical Objects#!"
 concept_verrier_astronomical_prestige: "Astronomical Prestige"
 concept_verrier_astronomical_prestige_desc: "#b Astronomical Prestige#! is the amount of [concept_prestige] you gain from Astronomy. Various factors influence your #b Astronomical Prestige#!:\n- Finding a new Planet will grant you between #V 15#! and #V 100#! Prestige depending on the difficulty to find it.\n- Each discovered [concept_verrier_satellite] will grant you 10 Prestige.\n- A completed [Concept('concept_verrier_moon_photo','$concept_verrier_moon_map$')] will grant you #V 25#! Prestige.\n- A great Comet will grant you 10 Prestige.\n- Every [concept_verrier_meteorite] will grant you #V 1#! Prestige.\n- Every #V 100#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] will grant you #V 1#! Prestige."
 concept_verrier_astronomical_object_desc: "#b Astronomical Objects#! are Asteroids and Stars that you discovered. Those Objects can be discovered if you have an [concept_verrier_observatory]. The better your Astronomy Technology is, the more Objects you will find. You will also discover more #b Objects#! if you have an [concept_verrier_astronomer].\nWith enough #b Astronomical Objects#! you will be able to discover new Planets or the Astro Physics Technology."
 concept_verrier_moon_map: "Moon Map"
 concept_verrier_moon_photo_desc: "If you have an [concept_verrier_observatory] and researched the Camera Technology, you will be able to order your [concept_verrier_astronomer] to begin photographing the Moon. This will reduce the amount of [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] from your #b Astronomer#! but give you #b Moon Photos#! every year.\nIf you collect enough #b Moon Photos#!, you will create an accurate map of Earth's Companion. Completing the Moon Map will grant your nation some [concept_verrier_astronomical_prestige]"
 concept_verrier_satellite: "Satellite"
 concept_verrier_satellites: "Satellites"
 concept_verrier_satellite_desc: "#b Satellites#! or Moons are [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] that are orbiting a planet. Some #b Satellites#! like the Earth's Moon are already discovered, but an [concept_verrier_astronomer] can try to find more of them.\nEach #b Satellite#! discovered by your country will grant it a small amount of [concept_verrier_astronomical_prestige]."
 concept_verrier_meteorite_desc: "Meteorites are relatively small solid bodies of cosmic origin that have passed through the Earth's atmosphere and reached the ground. In rare cases, meteorite fragments can be found after a meteor shower. Meteorites that hit the earth thousands of years ago can also be found by [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] in difficult terrain such as deserts and arctic areas. [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] and [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] in particular are interested in meteorites and  might want to analyze them.\n\nAdditionally #b Meteorites#! help to raise your [concept_agassiz_geological_score] and allow for a better estimate of the [concept_agassiz_age_of_earth]."
 concept_agassiz_volcano_desc: "#b Volcanoes#! are a new state trait in #r Morgenröte#!. Unlike the base game for Victoria 3, it is not strategic regions but rather states with volcanoes that are tied to whether a volcanic eruption takes place. The volcanic activity is significantly greater, but it is not always destructive. In countries with volcanoes, a #b $building_agassiz_volcano_observatory$#! can be built, which not only helps to predict and mitigate eruptions through observations, but is also the starting point for a volcano expedition. [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] can acquire new [concept_agassiz_geological_knowledge], [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')], experience and the volcanologist trait on a volcano expedition."
 concept_agassiz_geological_knowledge: "Geological Knowledge"
 concept_agassiz_geological_knowledge_desc: "#b Geological Knowledge#! includes a nation's general understanding of the nature of the earth. It is a very rare resource that can be acquired primarily in the course of geological milestones. #b Geological Knowledge#! is not the same as the [concept_agassiz_geological_score], but it is the most important component of it and is considered particularly valuable."
 concept_agassiz_geological_score: "Geological Score"
 concept_agassiz_geological_score_desc: "The #b Geological Score#! includes all of a nation's achievements and knowledge that are related to geology. The most important component is [concept_agassiz_geological_knowledge], but there are many other important factors; such as the experience of a [concept_agassiz_geologist], [concept_agassiz_oceanographic_knowledge], the number of [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')], [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] or [Concept('concept_dubois_specimen','$concept_dubois_specimens$')], and geological technologies. The Geological Score is crucial for re-dating the [concept_agassiz_age_of_earth]."
 concept_agassiz_oceanographic_knowledge: "Oceanographic Knowledge"
 concept_agassiz_oceanographic_knowledge_desc: "#b Oceanographic Knowledge#! forms part of [concept_agassiz_geological_knowledge] and corresponds to knowledge about the seas, in particular ocean currents, but also general marine research combined with geophysical considerations. #b Oceanographic Knowledge#! is largely gained on [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')]. 50 #b Oceanographic Knowledge#! is necessary to acquire [concept_agassiz_geological_knowledge]."
 concept_agassiz_age_of_earth: "Age of the Earth"
 concept_agassiz_age_of_earth_desc: "One of the big questions of the 19th century was the question of the #b Age of the Earth#!. It had natural history implications, particularly regarding the validity of the theory of evolution and the sequence of geological events. Only a [concept_agassiz_geologist] can determine a new earth age. To do this, his nation must have a higher [concept_agassiz_geological_score] than the nation that last determined an Earth age. He will then share his research results with other colleagues. He doesn't necessarily have to be successful - geologists who are too young and inexperienced will not be heard. However, foreign nations are a little more accommodating when no new theory has been presented for many years. Geologists can only estimate the age of the Earth once in their lives - but this only applies if they are successful. If you fail, you can try again after a phase of motivation."
 concept_agassiz_geology: "Geology"
 concept_agassiz_geology_desc: "#b Geology#! is one of the main features of [concept_morgenroete]. Even before the beginning of the Victorian Age, geology had already experienced a significant boom, which is why it is available to many nations at the start of the game.\n\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] can be used in a variety of ways: they can find [Concept('concept_dubois_formation','$concept_dubois_formations$')], [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] and [concept_curie_uranium] deposits during a geological search, go on [concept_agassiz_volcano] expeditions, determine [concept_agassiz_age_of_earth], find new ore and oil deposits or go on [concept_dubois_pacific_expedition] and [concept_douglas_mountaineering] expeditions useful as scientific companions. A [concept_agassiz_geological_score] evaluates the overall knowledge of a nation and is crucial in determining the age of the earth. [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] and [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] are an essential part of geology; The latter can be used to establish a mineral cabinet in the [concept_dubois_zoo]. A special geological facility is the #b $building_agassiz_volcano_observatory$#!, which carries out volcanological and seismic studies."
 concept_theiler_biologist: "#b #GREEN Biologist#!#!"
 concept_theiler_biologists: "#b #GREEN Biologists#!#!"
 concept_theiler_biologist_desc: "A Biologist is an [concept_academics_academic] who researches all aspects of life.\nIn [concept_morgenroete] the Biologist is mostly responsible for researching [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')], improving your Agriculture and finding [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] and [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')].\nBiologists gain [concept_academics_experience] passively or by finishing projects."
 concept_gaudi_architect: "#b #PURPLE Architect#!#!"
 concept_gaudi_architects: "#b #PURPLE Architects#!#!"
 concept_academics_university_specialization_desc: "Each University can be specialized by changing its production method.\nA university with a [concept_pm_academics_university_humanities] will allow you to focus your nations research on society innovation and allows to specifically recruit [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] and [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')].\nA university with a [concept_pm_academics_university_natural_history] will allow you to focus your nations research on society innovation and allows to specifically recruit [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] and [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')].\nA university with a [concept_pm_academics_university_mathematics] will allow you to focus your nations research on production and military innovation and allows to specifically recruit [Concept('concept_tesla_engineer','$concept_tesla_engineers$')] or [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')].\nChanging the Specialization will have a #n short negative effect#! for the building and your [concept_academics_progress].\nSpecialized Universities can influence various projects as well. Universities with a $concept_pm_academics_university_mathematics$ focus will help with engineering projects for example."
 concept_pm_academics_university_humanities_desc: "A Humanities-Anthropological Focus specializes the University and allows a national focus on Society Research and to specifically recruit [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] and [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')]. You will get a #n negative throughput modifier#! for the University as well as a #n negative effect#! on your [concept_academics_progress] when you change this production method.\nSpecializing your Universities with the Humanities-Anthropological Focus will give you a bonus on the success chance of Expeditions (maximum of +4 requiring 40 Levels of specialization) and improve the progress for some other projects."
 concept_pm_academics_university_natural_history_desc: "A Natural History Focus specializes the University and allowsa national focus on Society Research and to specifically recruit [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')], [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] and [Concept('concept_dubois_biologist','$concept_dubois_biologists$')]. You will get a #n negative throughput modifier#! for the University as well as a #n negative effect#! on your [concept_academics_progress] when you change this production method.\nSpecializing your Universities with the Natural History Focus will give you a bonus to various projects of your Natural scientists."
 concept_pm_academics_university_mathematics_desc: "Mathematical-Technical Focus specializes the University and allows a national focus on Production and Military Research and to specifically recruit [Concept('concept_tesla_engineer','$concept_tesla_engineers$')] or [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]. You will get a #n negative throughput modifier#! for the University as well as a #n negative effect#! on your [concept_academics_progress] when you change this production method.\nSpecializing your Universities with the Mathematical-Technical Focus will give you a bonus to various projects of your [Concept('concept_tesla_engineer','$concept_tesla_engineers$')] and [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]."
 concept_panum_physician: "#b #BLUE Physician#!#!"
 concept_panum_physicians: "#b #BLUE Physicians#!#!"
 concept_panum_physician_desc: "#b #BLUE Physicians#!#! are [Concept('concept_academics_academic','$concept_academics_academics$')] who work and research in the field of [concept_panum_medicine]. Their main task is to write [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] and find [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')].They can also improve medical research, improve healthcare, and heal other characters.\nPhysicians gain [concept_academics_experience] during their work and passively every year. They can get better levels of the physician trait by earning enough #b Experience#!."
 concept_panum_medicine: "Medicine"
 concept_panum_medicine_desc: "Medicine is one of the biggest expansions of [concept_morgenroete] for Victoria 3. One of the focuses is on epidemic [Concept('concept_panum_disease','$concept_panum_diseases$')] such as cholera, tuberculosis and typhus, which have plagued humanity for centuries and have finally been brought under control thanks to scientific advances. Epidemic diseases are therefore one of the negative events in [concept_morgenroete]. Containment through the search for a [concept_panum_disease_treatment] is therefore even more important. A central component of medicine is therefore a [concept_panum_physician] who is one of the academics of the anthropological-humanistic university focus. He can describe epidemic diseases and find treatments. A treatment method usually requires a [concept_panum_disease_description] and a technology. A physician can also improve the research of medical technologies or expand healthcare through hospitals, as well as introduce new medical techniques and heal other characters. Medical conferences help to spread medical knowledge internationally. An important step in the modernization of medicine is also the transition from the miasma theory to the [concept_panum_germ_theory]. A nation that is a leader in medical discoveries can also demonstrate high [concept_panum_medical_prestige]."
 concept_panum_disease: "Disease"
 concept_panum_diseases: "Diseases"
 concept_panum_disease_desc: "The term disease usually refers to the epidemic diseases that can affect a nation every few years. A [concept_panum_physician] can counteract them by making [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] and providing [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] Epidemic diseases usually do not occur at the same time and it takes some time for epidemic diseases to break out again. Depending on the type, epidemic diseases can have a devastating effect and spread across several states. There are various [concept_panum_disease_prevention] methods to delay the onset of such a disease or to mitigate its effects. The triggers for an illness can be very different. Yellow fever only occurs in tropical regions and cholera and tuberculosis require a minimum of urbanization to have an effect. A state's standard of living and level of devestation also play a role.\n\nIn addition to these particularly feared epidemic diseases, there are also everyday diseases that a physician can randomly examine during medical research. Such diseases include rickets, pellagra and syphilis."
 concept_panum_disease_description: "Disease Description"
 concept_panum_disease_descriptions: "Disease Descriptions"
 concept_panum_disease_description_desc: "Descriptions are the first step towards understanding a [concept_panum_disease]. They have no impact on the severity of an epidemic, but are fundamental to finding [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')], [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] and [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]. Disease descriptions have no further requirements: all that is required is an epidemic disease and a [concept_panum_physician]."
 concept_panum_disease_treatment: "Disease Treatment"
 concept_panum_disease_treatments: "Disease Treatments"
 concept_panum_disease_treatment_desc: "A [concept_panum_physician], given the right technology and a [concept_panum_disease_description], can find a treatment for a [concept_panum_disease] in a lengthy process. Treatments are not the same as a cure. Rather, the doctor finds out the cause of an illness and develops methods on this basis to prevent or significantly limit an outbreak. Disease treatments limit the length of an epidemic disease to a few months or weeks and also prevent it from spreading to several states. Disease treatments are part of possible [concept_panum_disease_prevention] against epidemic outbreaks."
 concept_panum_disease_prevention: "Disease Prevention"
 concept_panum_disease_prevention_no_disease: "Prevention"
 concept_panum_disease_prevention_desc: "There are several ways to avoid or at least mitigate an epidemic [concept_panum_disease]. The most well-known method is the [concept_panum_disease_treatment] developed by a [concept_panum_physician]. It significantly reduces the time in which a disease rages and also reduces the likelihood that it will spread to another country. Standard of living, hospitals, technologies and a high level of healthcare institutions also have an impact. The ultimate prevention is a [concept_theiler_vaccine] that prevents a disease from occurring in the first place. Vaccines are developed by [Concept('concept_theiler_biologist','$concept_theiler_biologists$')]. However, it is only effective if the health institution has at least reached the level specified in the medical faculty. After all, the distribution of a vaccine has to be organized and supervised."
 concept_panum_disease_type: "Disease Type"
 concept_panum_disease_types: "Disease Types"
 concept_panum_disease_type_desc: "Epidemic [Concept('concept_panum_disease','$concept_panum_diseases$')] can be differentiated according to their degree of distribution. #V Local diseases#!, such as scarlet fever, are limited to the state in which they broke out. #V Regional diseases#!, such as tuberculosis, can spread to some surrounding states, but not beyond. #V Transregional diseases#! - the most notorious of which is cholera - can spread throughout the country, even though states do not have to border each other."
 concept_panum_local_disease: "Local Disease"
 concept_panum_local_diseases: "Local Diseases"
 concept_panum_regional_disease: "Regional Disease"
 concept_panum_regional_diseases: "Regional Diseases"
 concept_panum_transregional_disease: "Transregional Epidemic"
 concept_panum_transregional_diseases: "Transregional Epidemic"
 concept_panum_germ_theory: "Germ Theory"
 concept_panum_germ_theory_desc: "Germ theory is one of the fundamental medical scientific advances of the 19th century. It replaced previous, more archaic theories, such as the miasma theory, which was widespread in Europe and represents all traditional attempts to explain the cause of [Concept('concept_panum_disease','$concept_panum_diseases$')]. The discovery of germ theory not only benefits the first discoverer. When looking for [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')], the chances of success are slightly higher because it prevents some negative events and unlocks more positive events."
 concept_panum_medical_prestige: "Medical Prestige"
 concept_panum_medical_prestige_desc: "Medical Prestige is made up of the [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] (2 points), [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] (4 points), [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] (3 points) and [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] (4 points) discovered so far. First discoveries give twice as many points. Further medical prestige can come from curing everyday illnesses, inventing special healing methods, or generally improving the healthcare system via a [concept_panum_physician]."
 concept_theiler_pathogen: "Pathogen"
 concept_theiler_pathogens: "Pathogens"
 concept_theiler_pathogen_desc: "A Pathogen is the name for something that causes a [concept_panum_disease]. This could be anything from an organism to a [concept_theiler_microorganism]. Often it is a Bacterium, parasite or Virus.\nA Biologist with access to enough Microorganisms can try to find the Pathogen that causes a Disease. This can help tp prevent the disease and to discover and produce a [concept_theiler_vaccine]"
 concept_theiler_vaccine: "Vaccine"
 concept_theiler_vaccines: "Vaccines"
 concept_theiler_vaccine_desc: "The discovery of Vaccines has allowed humans to become immune to [Concept('concept_panum_disease','$concept_panum_diseases$')] without contracting them and can potentially save millions of lives.\nTo create a Vaccine, A [concept_theiler_biologist] must first find the [concept_theiler_pathogen] that causes a Disease. Then the development of a Vaccine can start if enough [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')] are available."
 concept_panum_red_cross: "Red Cross"
 concept_panum_red_cross_desc: "The Red Cross is one of the first international organizations and, in rare cases, offers the opportunity to receive Red Cross medics in a war. Red Cross members also receive certain bonuses. Depending on the game rule, the Red Cross can be founded historically or dynamically; Recognized states can join under certain technological requirements. The founder receives the headquarters of the Red Cross in his capital. Members can accede to up to three [Concept('concept_panum_convention','$concept_panum_conventions$')] that are binding under international law."
 concept_panum_convention: "International Convention"
 concept_panum_conventions: "International Conventions"
 concept_panum_convention_desc: "An international convention is a joint declaration of intent by states to establish certain rules of the game in international traffic. There were several examples of this in the course of the 19th century, such as the Geneva Convention or the Hague Code of Land Warfare. What all conventions have in common is that they attempt to mitigate the horrors of war. Military options are therefore preferred over safe medical care for the wounded and ultimate weapons are banned, which leads to a certain containment of the war. The advantage is greater flexibility. While the adoption of a convention is viewed favorably, the abolition of a convention can lead to international anger.\n\nInternational conventions are usually non-binding declarations of intent. However, if enough members of the [concept_panum_red_cross] sign it, over time it will become valid international law, which all signatories are expected to comply with - and the other members will also sign it. This happens when 65 percent of all members and the majority of the Great Powers agree to this convention - then all other members are then forced to comply with it. This convention can then no longer be abolished as usual. In order to avoid binding conventions, a complete withdrawal from the Red Cross is necessary - with all the consequences."
 concept_manzoni_literary_tradition_desc: "#b Literary Tradition#! is a representation of a nation's literary achievements and traditions.\nThere are various ways to gain #b Literary Tradition#!. Having at least one $building_art_academy$, having one or more [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')], a [concept_manzoni_national_writer] and having certain [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] will passively add #b Literary Tradition#! to your country.\nThe more #b Literary Tradition#! your nation gains, the higher the prestige bonus you gain. Additionally it will allow you to unlock the [concept_elgar_expressionism] [concept_artists_art_style]."
 concept_elgar_musical_tradition_desc: "#b Musical Tradition#! is a representation of a nation's musical achievements and traditions.\nThere are various ways to gain #b Musical Tradition#!. If you have at least one [concept_elgar_opera], you will passively get #b Musical Tradition#!. The more #b Operas#! you have the more you get. You can also gain more #b Musical Tradition#! from musical and arts technologies. Each Technology gives a different bonus. You can also get #b Musical Tradition#! from events, especially if you have a [concept_elgar_composer].\nThe more #b Musical Tradition#! your nation gains, the higher the prestige bonus you gain. Additionally it will allow you unlock the [concept_elgar_impressionism] [concept_artists_art_style]."
 concept_klimt_painting_tradition_desc: "#b Painting Tradition#! is a representation of a nation's painting achievements and traditions. It can be gained from having #b Arts Academies#!, a [concept_klimt_painter], certain [Concept('concept_technology', '$concept_technologies$')] or from events.\n#b Painting Tradition#! allows you to unlock the [concept_elgar_art_nouveau] [concept_artists_art_style] and is used to calculate your #b Cultural Tradition#!."
 concept_mendelejew_theorized_elements: "Theorized Elements"
 concept_mendelejew_discovered_elements: "Discovered Elements"
 concept_mendelejew_isolated_elements: "Isolated Elements"
 concept_panum_psycho_point: "Psychotherapeutic Point"
 concept_panum_psycho_points: "Psychotherapeutic Points"
 concept_panum_psycho_point_desc: "Psychotherapeutic points are an abstract currency that represent a country's progress in the field of psychiatry and psychology. They are generated monthly from technologies, an insane asylum or a [concept_panum_physician] with #V Psychiatrist#! [concept_character_trait]. Psychotherapeutic points can also be acquired via event. A high number of psychotherapeutic points results in a better chance of healing characters with mental illnesses. Moving up a psychotherapeutic level also gives research bonuses and [concept_academics_progress]. A certain number of psychotherapeutic points is a requirement for most psychological schools."
 concept_vikelas_mechanic: "Mechanic"
 concept_vikelas_mechanic_desc: "LOREM IPSUM"
 concept_vikelas_mechanical_innovation: "Mechanical Innovation"
 concept_vikelas_race_car: "Race Car"
 concept_vikelas_race_car_desc: "LOREM IPSUM"
 concept_vikelas_race_car_reliability: "Race Car Reliability"
 concept_vikelas_race_car_safety: "Race Car Safety"
 concept_vikelas_race_car_speed: "Race Car Speed"
 concept_dubois_dinosaur_bone_no_dinosaur: "Bones"
 concept_dubois_dinosaur_bones_no_dinosaur: "Bones"
 concept_dubois_paleontological_expedition_desc: "A [concept_dubois_paleontologist] can be dispatched to [Concept('concept_dubois_formation','$concept_dubois_formations$')]. It will take 1 year and depending on the Success of the Expedition, you will get [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] and [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]. When you finish an Expedition and if you have a free [concept_dubois_paleontological_team] you can set up a [concept_dubois_paleontological_excavation] to passively gain Fossils and Bones from that region.\nThe easiest way to gain access to a formation is to control the associated state. However, access can also be gained peacefully through [Concept('concept_dubois_paleontological_licence','$concept_dubois_paleontological_licences$')]."
 concept_dubois_paleontological_team: "Paleontological Team"
 concept_dubois_paleontological_teams: "Paleontological Teams"
 concept_dubois_paleontological_team_desc: "Paleontological Teams can be used to set up an [concept_dubois_paleontological_excavation] after finishing a [concept_dubois_paleontological_expedition]. This will allow you to passively get [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] and [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]."
 concept_dubois_paleontological_excavation: "Paleontological Excavation"
 concept_dubois_paleontological_excavations: "Paleontological Excavations"
 concept_dubois_paleontological_excavation_desc: "You can set up a Paleontological Expedition after finishing a [concept_dubois_paleontological_expedition] if you have a free [concept_dubois_paleontological_team]. A Paleontological Excavation will allow your Team to passively produce [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] and [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]."
 concept_verrier_venus_transit: "Venus Transit"
 concept_verrier_venus_transit_desc: "The transit of Venus refers to the rare occurrence of the moon passing between Earth and Venus. However, it occurred twice in the 19th century: in 1874 and 1882. Since observations of the transit of Venus allow conclusions to be drawn about the size of the solar system and a more precise determination of the size of the astronomical unit (AU), these were major scientific events. Countries located in the [concept_verrier_venus_transit_zone] can observe the event from there; other countries must send expeditions. The success of the observation depends on the experience of the [concept_verrier_astronomer], the availability of an [concept_tesla_engineer], and a bit of luck: sometimes the weather can prevent a good image. The better the observation, the greater the bonus."
 concept_verrier_venus_transit_zone: "Venus Transit Zone"
 concept_verrier_venus_transit_zone_desc: "The Venus Transit Zone refers to the part of the Earth from which a complete (not just partial) transit of Venus can be observed. In 1874, this was particularly true for the East Asia-Pacific region, and in 1882 for almost the entire American continent. A detailed breakdown of the strategic regions is provided below.\n\n#V Venus Transit 1874:#!\nIndonesia, Indochina, Oceania, South China, North China, manchuria, Japan, Central India, Madras, Bengal, Himalayas; also, the State of Indian Ocean Territory.\n\n#V Venus Transit 1882:#!\nBrazil, La Plata, Andes, Gran Columbia, Mexico, Central America, Carribean, The Midwest, Dixie, New England; also, the States of Ontario and Quebec."
 concept_vikelas_coach: "Coach"
 concept_vikelas_coaches: "Coaches"
 concept_vikelas_coach_desc: "Coaches are the national trainers of a country in a specific national sport. National sports include [concept_vikelas_football], baseball, basketball, and cricket. Coaches provide bonuses for the respective team in competitions – whether at International World Championships or at international matches. The latter are played secretly at regular intervals and increase a coach's experience value upon victory. High experience points and positive [Concept('concept_character_trait','$concept_character_traits$')] increase the chance of winning a World Championship. Positive traits are those that particularly motivate players – such as ambitious or charismatic – while demotivating traits reduce the chance of winning a match. These include traits such as ruthless or cruel.\n\n#R NOTE: At the moment only football is integrated.#!"
 concept_vikelas_football: "Football"
 concept_vikelas_football_desc: "Football is a possible national sport. The first football clubs can be established in Europe and South America; this will require a relatively liberal legal system, a strong petty bourgeoisie, or considerable average standard of living. After that, occasional football matches could be played. With the establishment of FIFA, international matches and the World Cup also become possible. The eight best teams automatically qualify for the World Cup. The teams are calculated according to the National Football Team Value (NFTV), which is derived from the parameters of standard of living (fitness of the population), strength of the petty bourgeoisie (club system), literacy (tactics), and tradition (national sport: yes or no?). In matches, not only the NFTV is taken into account, but also the character traits and experience of the [concept_vikelas_coach]."
 concept_gaudi_architectural_splendour: "Architectural Splendour"
 concept_gaudi_architectural_splendour_desc: "Architectural Splendour is a collective term for the spectacular advances in modern architecture, referring primarily to Art Deco, Bauhaus, and Neoclassicism as they emerged in the early 20th century. The value represents the transformation of outdated forms into a future-ready architecture. Art Deco requires reaching a higher threshold to fulfill the dream of an Art Deco city — yet the benefits are greater."
 concept_artists_artist_desc: "In [concept_morgenroete] #b Artists#! are special characters that allow you to use certain mechanics of the mod. You can get #b Artists#! in some events or by aquiring enough [concept_artistic_progress]. Artists have [concept_artists_experience] that reflects their standing in their respective field.\nCurrently these #b Artists#! exist:\n - [concept_elgar_composer]\n - [concept_klimt_painter]\n - [concept_manzoni_writer]\n - [concept_gaudi_architect]"
 concept_elgar_architecture_desc: "Architecture is one of the core concepts of [concept_morgenroete]. It is divided into two major parts.\n\nOn the one hand, [concept_gaudi_monuments] have been completely redesigned: they are no longer built directly, but expanded step by step based on decisions. On the other hand, numerous monuments have been added - some of which must be built, others exist at the start of the game.\n\nThe other key point is the introduction of the [concept_gaudi_architect], who can upgrade cities and design up to 15 new unique buildings by researching [Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')]. Architects can also rebuild a country in the Bauhaus, Neoclassical, and Art Deco styles. A [concept_gaudi_great_architect] can even design their own [concept_gaudi_custom_monument]!"
 concept_gaudi_architect_desc: "#PURPLE #b Architects#!#! are [Concept('concept_artists_artist','$concept_artists_artists$')] whose skills relate to urban planning, building design and construction. They are special character types that you can gain either from events, from gaining enough [concept_artistic_progress] to create one in your nation or by offering a position to a [concept_gaudi_independent_architect].\nWhile other artists are more likely to accumulate cultural tradition, architects only rarely generate the very valuable [concept_gaudi_architectural_splendour] when they are involved in urban planning or the expansion of the capital—or when they completely redesign the country in a particular architectural style. Their main task is more practical in nature. They work in public construction, thus providing a nation with additional construction points. They improve infrastructure through planning and enhance capital cities into livable places. Architects can also hone their skills on a study tour or write an architectural treatise.\nOf paramount importance is the design of new, unique buildings, for which they create a [concept_gaudi_architectural_blueprint]. A total of 15 of these [concept_gaudi_blueprint_buildings] can be researched—since this takes a long time, it's worth considering which ones make sense.\nArchitects also provide a passive bonus: their mere presence accelerates the construction of [concept_gaudi_monuments] by 100 percent. The greatest achievement of an architect is the design of their own [concept_gaudi_custom_monument]. This is only possible with a [concept_gaudi_great_architect]."
 concept_douglas_mountaineering: "Mountaineering"
 concept_douglas_mountaineering_desc: "Countries that own at least one [concept_douglas_mountain_summit] or have a #b Mountaineering License#! with a country that has one can participate in mountaineering. To start a #b Mountain Expedition#! you need both the #b Prospecting#! and #b Nationalism#! technologies as well as a general that has either the #b Mountaineer#!, #b Explorer#!, #b Mountain Commander#! or #b Surveyor#! Trait.\nAs soon as you start a #b Mountain Expedition#! you will have to first choose which general will be the main Mountaineer. Then you will choose the summit to climb.\nThe higher the mountains, the more dangerous is the ascent. The Mountains are classified according to their height in meters ranging from under 4000 meters upt to over 8000 meters. Success depends on researched military technologies, the age and health of the leader, and their characteristics. Avalanches and steep slopes can pose a major risk that threatens the entire endeavor.\nYou can even send an additional [Concept('concept_academics_academic','$concept_academics_scientist$')] on the trip. Either a [concept_dubois_naturalist] or a [concept_dubois_paleontologist] will help discover more about the mountain you climbed on.\nIn the end you will get a prestige bonus and your general will develop better traits that will help them in combat as well for mountaineering."
 concept_gaudi_great_architect: "#PURPLE #b Great Architect#!#!"
 concept_gaudi_great_architects: "#PURPLE #b Great Architects#!#!"
 concept_gaudi_great_architect_desc: "#b Great Architects#! are [Concept('concept_gaudi_architect','$concept_gaudi_architects$')] that are considered to be the most important minds in their field. #b Architects#! reaching 500 [concept_artists_experience] will become #b Great Architects#!. Should an artist achieve this special rank, he or she can design the blueprint for a truly outstanding [concept_gaudi_custom_monument] that embodies the spirit of the nation."
 concept_gaudi_monuments: "Monuments in #R Morgenröte#!"
 concept_gaudi_monuments_desc: "Many Nations received new #b Monuments#! in [concept_morgenroete]: the #b Cologne Cathedral#! in Germany, the #b Gotthardbahn#! in Switzerland, the #b Cristo Redentor#! in Brazil, the #b Mole Antonelliana#! in Italy, the #b Summer Palace#! in China, the #b Sagrada Família#! in Spain, the #b Schloss Neuschwanstein#! in Bavaria, the #b Palacio de Bellas Artes#! in Mexico and the #b Gyeongbokgung Palace#! in Korea.\nAll Buildings except for the #b Summer Palace#!, and the #b Campanile#! need to be constructed by their owner, the #b Saxon Palace#! can be reactivated by a Polish nation. There are also new monuments at game start like the #b Buddhas of Bamiyan#! or the #b Potala Palace#!\nThere is also the possibility to have a [concept_gaudi_custom_monument] designed by a [concept_gaudi_great_architect].\n\nUnlike in the vanilla game, #b Monuments#! are not built directly, but rather through a decision. Construction takes place in several stages, depending on the size of the building, and can take years or even decades - and is significantly more expensive."
 concept_athletes_athlete: "Athlete"
 concept_athletes_athletes: "Athletes"
 concept_athletes_athlete_desc: "In [concept_morgenroete] #b Athletes#! are special characters that allow you to use certain mechanics of the mod.#b Athletes#! are usually created through events or via a button. Like other characters, #b Athletes#! possess experiences that guarantee greater success in their field.\nCurrently these #b Athletess#! exist:\n - [concept_curtiss_balloonist]\n - [concept_curtiss_pilot]\n - [concept_vikelas_olympian]\n - [concept_douglas_mountaineer]\n - [concept_vikelas_coach]\n - [concept_vikelas_racer]"
 concept_gaudi_independent_architect: "Independent Architect"
 concept_gaudi_independent_architects: "Independent Architects"
 concept_gaudi_independent_architect_desc: "[Concept('concept_gaudi_architect','$concept_gaudi_architects$')] that are not hired by a country are #b Independent Architects#!.\nUnlike many other artists, there are few requirements to recruit an #b Independent Architect#!, except for a minimal technological recquirement. They are true globetrotters and usually only demand good payment."
 concept_gaudi_architectural_blueprint: "Architectural Blueprint"
 concept_gaudi_architectural_blueprints: "Architectural Blueprints"
 concept_gaudi_architectural_blueprint_desc: "Architectural blueprints can be researched by [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]. They are essential for the construction of special [concept_gaudi_blueprint_buildings] that can only be erected once in a nation. There are a total of 15 different buildings in five different categories. Certain blueprints require technologies to be researched. Since research can sometimes take years, it's wise to decide beforehand which blueprints are most important. The buildings can potentially be constructed in any state, but require a certain level of urbanization. In some cases, there may be additional requirements."
 concept_gaudi_blueprint_buildings: "Blueprint Buildings"
 concept_gaudi_blueprint_buildings_desc: "Blueprint buildings are buildings which need a bluprint researched by [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]. These buildings can only be built once in a nation. There are 15 different buildings:\n\n#b Monument#!\n- [GetBuildingType('building_gaudi_statue').GetName]\n- [GetBuildingType('building_gaudi_fountain').GetName]\n- [GetBuildingType('building_gaudi_arch').GetName]\n\n#b Public Square#!\n- [GetBuildingType('building_gaudi_park').GetName]\n- [GetBuildingType('building_gaudi_luna').GetName]\n- [GetBuildingType('building_gaudi_parade').GetName]\n\n#b Service Buildings#!\n- [GetBuildingType('building_gaudi_almshouse').GetName]\n- [GetBuildingType('building_gaudi_school').GetName]\n- [GetBuildingType('building_gaudi_prison').GetName]\n\n#b Health Institutions#!\n- [GetBuildingType('building_gaudi_canalization').GetName]\n- [GetBuildingType('building_gaudi_hospital').GetName]\n- [GetBuildingType('building_gaudi_health').GetName]\n\n#b National Academies#!\n- [GetBuildingType('building_gaudi_science').GetName]\n- [GetBuildingType('building_gaudi_arts').GetName]\n- [GetBuildingType('building_gaudi_sports').GetName]"
 concept_gaudi_custom_monument: "Custom Monument"
 concept_gaudi_custom_monument_desc: "A custom monument is an [concept_gaudi_architect]'s greatest possible masterpiece. It can compete with other, ordinary monuments. Only a [concept_gaudi_great_architect] can draw up such plans. It requires research into the most modern architectural technologies. The type of monument an architect designs depends largely on their architectural style. Art Deco architects design the [GetBuildingType('building_gaudi_people_monument').GetName], Bauhaus architects the [GetBuildingType('building_gaudi_people_forum').GetName], and Neoclassical architects the [GetBuildingType('building_gaudi_people_palace').GetName]."
 concept_douglas_mountaineer: "Mountaineer"
 concept_douglas_mountaineers: "Mountaineers"
 concept_douglas_mountaineer_desc: "#b Mountaineers#! are [Concept('concept_athletes_athlete','$concept_athletes_athletes$')] who can climb unconquered [concept_douglas_mountain_summit]. They can be recruited against [concept_douglas_alpine_heritage] after the establishment of a mountaineering club. Countries with geographical features such as mountains, peaks, or volcanoes therefore have an advantage in recruitment. Mountaineering traits and experience are the most important factors for progress in conquering a mountain or overcoming a dangerous situation.#!"
 concept_vikelas_olympian: "Olympian"
 concept_vikelas_olympian_desc: "#n This entry is being revised.#!"
 concept_douglas_mountain_summit: "Mountain Summit"
 concept_douglas_mountain_summits: "Mountain Summits"
 concept_douglas_mountain_summit_desc: "Mountain Summits are the coveted goal of all mountaineers. They mark the highest point of a mountain. Each summit has three distinct attributes that define how difficult it is to reach successfully.\n\n#V Height#!: Height determines how many steps are required to climb a mountain—this reflects the overall length of an expedition. For every 1,000 meters, one progress step is needed. The value is rounded up, meaning that the 4,421-meter-high Mount Whitney requires 5 steps, while the 7,134-meter-high Kauffmann Peak demands 8. A mountain's prestige is calculated based on its height: the total height is divided by 300. Thus, an ideal mountain of 4,500 meters grants 15 prestige.\n\n#V Level#!: A mountain's level represents the equipment demands necessary to climb it. This is not strictly tied to its height. For example, despite its 5,636 meters, Citlaltépetl is only Level 1 and requires just basic equipment. In contrast, the Matterhorn, at only 4,478 meters, is considered significantly more demanding at Level 3, requiring at least first aid preparation for Alpine emergencies.\n\n#V Risk#!: A mountain's risk level indicates the likelihood of negative events affecting an expedition. It is independent of both height and level. Avalanches, fog, and severe weather are key concerns. Popocatépetl could be ascended already in early modern times due to its hospitable surroundings. In contrast, the much smaller Großvenediger, at just 3,666 meters, still posed a serious threat to Austrian expeditions well into the early 19th century.\n\nMore information about individual summits can be found under the [concept_douglas_mountain_summit_list] section."
 concept_douglas_mountain_range: "Mountain Range"
 concept_douglas_mountain_ranges: "Mountain Ranges"
 concept_douglas_mountain_range_desc: "A mountain range is defined as a mountain formation that offers potential for [concept_douglas_mountaineering] training over long distances. Classic mountain ranges include the Rocky Mountains, the Andes, the Alps, and the Caucasus. Unlike the [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] that are to be conquered, there are also plenty of less challenging mountains where there is no risk of a [concept_douglas_mountaineer] experiencing a fatal fall. Rather, they should be viewed as a training route. Countries with mountain ranges are more likely to produce mountaineers than those without this geographical feature."
 concept_douglas_alpine_heritage: "Alpine Heritage"
 concept_douglas_alpine_heritage_desc: "Alpine Heritage is a collective term for a connection with the mountains and a specialization in climbing mountains. It also refers to the potential to recruit new [Concept('concept_douglas_mountaineer','$concept_douglas_mountaineers$')]—since, in most cases, experienced mountaineers come from mountainous areas. This always gives countries with [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')] or [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] an advantage. Recruiting a new mountaineer, as well as various other actions, costs Alpine Heritage."
 concept_douglas_mountain_summit_list: "List of Mountain Summits"
 concept_douglas_mountain_summit_list_desc: "There are many [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] that can be climbed.\n\n#V North America:#!\n#b Mount McKinley#! (Alaska), Height 6190 meters, Level 4\n#b Mount Logan#! (Yukon Territory), Height 5959 meters, Level 4\n#b Citlaltépetl#! (México), Height 5636 meters, Level 1\n#b Mount Whitney#! (California), Height 4421 meters, Level 1\n\n#V South America:#!\n#b Aconcagua#! (Mendoza), Height 6267 meters, Level 3\n#b Huascarán#! (Lima Territory), Height 6768 meters, Level 5\n#b Illimani#! (La Paz), Height 6438 meters, Level 4\n#b Chimborazo#! (Ecuador), Height 6267 meters, Level 1\n\n#V Europe:#!\n#b Shkara#! (Greater Caucasus), Height 5642 meters, Level 4\n#b Dufourspitze#! (Dufourspitze), Height 4634 meters, Level 2\n#b Matterhorn#! (West Switzerland), Height 4478 meters, Level 3\n#b Aiguille Verte#! (Savoy), Height 4122 meters, Level 3\n#b Pico de Aneto#! (Aragon), Height 3404 meters, Level 1\n\n#V Africa:#!\n#b Kibo#! (Tanganyika), Height 5895 meters, Level 2\n#b Mount Kenya#! (Kenya), Height 5199 meters, Level 3\n#b Mount Stanley#! (Uganda), Height 5109 meters, Level 3\n#b Mount Cameroon#! (South Cameroon), 4095 meters, Level 1\n\n#V Asia:#!\n#b Kamet#! (Delhi), Height 7756 meters, Level\n#b Chogolisa#! (Kashmir), Height 7665 meters, Level 5\n#b Kabru#! (Himalayas), Height 7412 meters, Level 5\n#b Kaufmann Peak#! (Tajikistan), Height 7134 meters, Level 4\n\n#V Australia & Oceania:#!\n#b Mount Wilhelm#! (Eastern New Guinea), Height 4121 meters, Level 2\n#b Mount Cook#! (South Island), Height 3724 meters, Level 2"
 concept_panum_disease_description_describe: "describe"
 concept_panum_disease_description_described: "described"
 concept_panum_disease_treatment_treat: "treat"
 concept_panum_disease_treatment_treated: "treated"
