 concept_tesla_aeronautical_engineering: "#b #ORANGE 항공 공학#!#!"
 concept_tesla_engineering: "공학"
 concept_tesla_engineering_desc: "#b 공학#!은 [concept_morgenroete]를 대표하는 요소 중 하나입니다.\n\n#b 공학#!을 활용하려면 [concept_tesla_engineer]를 두어야 합니다. #b 공학자#!는 자신의 특화 분야에 따라 #b 공학 사업#!을 펼칠 수 있습니다. #b 공학자#!의 특화 유형은 총 다섯 가지가 있습니다.\n- [concept_tesla_civil_engineer]는 국가 기반 시설 개선에 중점을 둡니다.\n- [concept_tesla_mechanical_engineer]는 산업의 이익을 늘리는 등의 기계 혁신에 중점을 둡니다.\n- [concept_tesla_military_engineer]는 나라의 육군과 해군을 개선하는 데 중점을 둡니다.\n- [concept_tesla_electrical_engineer]는 전기 기반시설 개량에 중점을 둡니다.\n- [concept_tesla_aeronautical_engineer]는 인류의 비행을 실현시키고 항공기와 비행선의 개량에 중점을 둡니다."
 concept_tesla_engineer_desc: "#b #ORANGE 공학자#!#!는 전문 지식의 제공으로 특수 건물의 건설을 돕는 학자입니다.\n또한 #b #ORANGE 공학자#!#!는 나라의 [concept_technology_spread]에 보너스를 부여합니다. 이 보너스는 얼마나 많은 나라들이 당신의 국가보다 더 많은 연구를 이뤄냈는지에 따라 달라집니다."
 concept_tesla_civil_engineer_desc: "#b 토목 공학자#!는 나라의 기반 시설 개량에 중점을 둡니다.\n#b 공학 사업#!을 시작하여 특정 주의 [concept_infrastructure]을 늘려주는 [Concept('concept_modifier','$concept_modifiers$')]을 부여하고, #b 건설 부문#!을 개선하며, [Concept('concept_technology', '$concept_technologies$')] 연구에 나설 수 있습니다."
 concept_tesla_mechanical_engineer_desc: "#b 기계 공학자#!는 우리 산업을 개량시킬 기계 혁신에 중점을 둡니다.\n#b 공학 사업#!을 시작하여 산업용 건물의 [concept_throughput]과 [concept_good_production], [concept_input_mult]을 향상시키는 [Concept('concept_modifier','$concept_modifiers$')]을 부여하고, 신형 기관차로 #b 철도#!를 개량하고, 산업 [Concept('concept_technology', '$concept_technologies$')] 연구에 나설 수 있습니다."
 concept_tesla_military_engineer_desc: "#b 군사 공학자#!는 우리 육군과 해군에 신기술을 도입하여 개선하는 데 중점을 둡니다.\n#b 공학 사업#!을 시작하여 무기 발명, 신형 야전 시설, 탱크 개량으로 새로운 [Concept('concept_mobilization_option','$concept_mobilization_options$')]을 획득하거나 육해군 [Concept('concept_technology', '$concept_technologies$')] 연구에 나설 수 있습니다."
 concept_tesla_electrical_engineer_desc: "#b 전기 공학자#!는 전기 기술 혁신을 통한 국가 발전에 중점을 둡니다.\n#b 공학 사업#!을 시작하여 지구 자기장을 연구하고, 전신과 라디오망을 확충하고, 전기 [Concept('concept_technology', '$concept_technologies$')] 연구에 나설 수 있습니다."
 concept_tesla_aeronautical_engineer_desc: "#b 항공 공학자#!는 비행 수단의 개발과 항공기, 비행선의 개량에 중점을 둡니다.\n#b 공학 사업#!을 시작하여 #V 공항#!에 [concept_throughput], [concept_good_production], [concept_input_mult]을 향상시키는 [Concept('concept_modifier','$concept_modifiers$')]을 추가하고, [Concept('concept_mobilization_option','$concept_mobilization_options$')]로 #V 고성능 항공기#!를 잠금 해제하고, 항공 [Concept('concept_technology', '$concept_technologies$')] 연구에 나설 수 있습니다."
 concept_vikelas_national_sport: "국기 종목"
 concept_vikelas_national_sport_desc: "어느 국가든 본연의 국기 종목을 채택할 수 있으며 그 선택지로는 크리켓, 야구, 축구, 농구가 있습니다. 이들 네 종목 가운데 크리켓을 뺀 나머지 세 종목은 19세기에만 개발할 수 있습니다. 해당 종목을 처음으로 만들어낸 국가는 그 종목의 '본고장'으로 여겨집니다. 그때부터 체육 종목은 전세계로 전파되지만 동일한 여건에서 이루어지는 것은 아닙니다. 크리켓과 야구는 확산 속도가 좀 더 제한적인 반면, 축구와 농구는 비교적 자유로운 환경에서 확산됩니다. 지배국이 관계 개선을 통해 종속국에 체육 종목을 전파할 수도 있습니다. 한 나라에는 여러 종목이 공존할 수 있지만, 전국의 모든 체육 시설에서 보급되려면 반드시 국기 종목이 되어야 합니다."
 concept_theiler_microorganism: "미생물"
 concept_theiler_microorganisms: "미생물"
 concept_theiler_microorganism_desc: "미생물은 박테리아, 바이러스, 단세포 유기체와 같은 미세한 유기체를 말합니다.\n[concept_theiler_biologist]가 분주한 상태가 아닐 때에만 진행할 수 있는 $je_theiler_microorganism_research$ [concept_journal_entry]으로 발견할 수 있습니다.\n미생물은 주로 [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] 발견과 [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] 개발에 사용되며 후자의 경우 많은 국민들을 [Concept('concept_panum_disease','$concept_panum_diseases$')]으로부터 보호한다는 점에서 나라에 보탬이 됩니다."
 concept_theiler_biology: "생물학"
 concept_theiler_biology_desc: "[concept_morgenroete]에서 #b 생물학#!은 의학과 농업 분야의 중요한 보조 역할을 합니다. 특히 중요한 것은 미생물 연구인데, [concept_theiler_biologist]가 [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')], 특히 [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')]를 식별하여 [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] 개발에 보탬이 될 수 있습니다. 의료 체계가 충분히 발달했다면 백신은 [Concept('concept_panum_disease','$concept_panum_diseases$')]을 완전히 예방할 수 있습니다. 또한 생물학자는 사과굴나방 방제와 같은 [concept_theiler_pest] 박멸에 유용하며, 농업 생산량 증대에도 공헌합니다."
 concept_ito_medicinal_plants: "약용 식물"
 concept_ito_medicinal_plants_desc: "약용 식물은 의약품과 기타 유용한 화학 물질의 제조에 사용할 수 있는 약효성 식물입니다.\n[concept_dubois_naturalist]에게 [concept_dubois_botanical_expedition]를 보내게 하여 약용 식물을 수집할 수 있습니다. 충분한 양의 약용 식물이 채집되면 [concept_mendelejew_chemist]가 화학 물질을 분리할 수 있게 됩니다. 분리가 완료되면 [concept_theiler_biologist]가 의약품 생산에 나설 수 있게 됩니다."
 concept_academics_academic_confusion: "학계의 혼란"
 concept_academics_academic_confusion_desc: "[concept_academics_university_specialization]를 변경한 대학에서는 여러 학자들이 혼란에 빠지게 됩니다. 이는 단기적인 연구 성과 감소로 이어질 수 있습니다."
