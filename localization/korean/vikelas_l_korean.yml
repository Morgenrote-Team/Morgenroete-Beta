 vikelas.501.t: "[ROOT.GetCountry.GetAdjectiveNoFormatting] 자동차 클럽"
 vikelas.501.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName](은)는 열성적인 카레이서로 유명한데 이를 기념하기 위해 뜻이 맞는 사람들과 자동차 클럽을 창단했다고 한다. 이 클럽은 국내 자동차 산업을 강화하고 전국 자동차 대회를 개최하는 것을 목표로 삼고 있다."
 vikelas.501.f: "1895년 세계 최초의 자동차 클럽으로 설립된 프랑스 자동차 클럽(ACF)은 1890년대 중반부터 해마다 자동차 경주를 개최하여 시즌의 하이라이트를 장식하였다. 이 경주는 일반 시골 도로에서 진행되는 일명 '도시간 경주'였으며, 참가자들은 일정 간격으로 한 명씩 출발하는 방식이었다. ACF가 설립된 계기 중 하나는 1894년 파리-루앙 경주에서 알베르 드 디옹이 강등되면서부터였다. 이후 모터스포츠는 급속도로 발전하였고 더욱 강력한 차량이 등장하면서 그 위험성도 크게 증가했다. 이에 ACF는 1901년 경기 규정을 마련하기에 이르는데 이것이 바로 세계 최초의 모터스포츠 규정으로 여겨진다. 규정 도입으로 마련된 핵심적인 변화는 ACF 주관 경기에 적용되는 차량 등급 분류였으며, 각 등급별로 중량 제한을 두어 당시 허다했던 타이어 파손 사례를 줄이는 데 도움이 될 것으로 기대되었다."
 vikelas.501.g: "전율 가득한 종목이로군!"
 vikelas.502.t: "첫 그랑프리 경주"
 vikelas.502.d: "모터스포츠가 획기적인 전환점을 맞이했다. 그랑프리 경주의 창설로 모터스포츠를 사랑하는 모든 국가에서 한 곳씩 돌아가며 국제 경기를 치르게 된 것이다. 이것으로 국제 선수권 대회가 탄생하게 되었다. 다가오는 해에 치러질 초대 그랑프리 대회에 자동차 클럽을 둔 국가로서 [SCOPE.sCountry('vikelas_gp_founder_scope').GetName] 역시 초청받게 되었다."
 vikelas.502.f: "1900년부터 1905년까지 자동차 세계 선수권 대회를 개최하려는 첫번째 시도로서 고든 베넷 컵의 연간 레이스 대회가 열렸다. 계속해서 빨라지는 자동차 속력을 고려해 1902년 ACF는 일명 레이싱 포뮬러 형태의 기술 규정을 사상 처음으로 제정하였다. 그러나 사고 빈도는 계속해서 오르는 추세에 있었는데, 1903년부터는 폐쇄형 서킷에서만 경기를 치르도록 하였다. 고든 베넷 레이스의 후속으로 ACF는 1906년 그랑프리라는 이름 하에 본격적인 레이싱 대회를 처음 개최하게 되었다. 역사상 최초 우승자는 르노 사의 차량으로 우승한 헝가리 선수 페렌츠 시스였다."
 vikelas.502.g: "그러니까 우승할 대회가 또 생겼다, 이 말이지?"
 vikelas.503.t: "국제 공인 자동차 클럽 협회"
 vikelas.503.d: "오늘 [GetGlobalVariable('vikelas_aiacr_seat_global_var').GetStateRegion.GetCityHubName]에서 국제 자동차 협회가 창설되었다. 협회의 정식 명칭은 국제 공인 자동차 클럽 협회(AIACR)이다."
 vikelas.503.f: "자동차 제조사들이 모든 국제 경주에 참가하려면, 과거에 프랑스 자동차 클럽에서 독자적으로 제정했던 그랑프리 규정을 국제적인 자동차 협회를 통해 모든 국가에 통일하여 시행할 필요가 있었다. 그렇게 1904년 6월 20일 프랑스 파리에서 국제 공인 자동차 클럽 협회(AIACR)이 출범하게 되었다. 당시 이 협회를 창설하게 된 것은 며칠 전 바트 홈부르크에서 열린 고든 베넷 컵의 일환으로 주요 참가국의 자동차 클럽들이 내린 결정에  따른 것이었다. AIACR은 제2차 세계 대전 후 국제 자동차 협회(FIA)로 명칭을 변경하였다."
 vikelas.503.g: "지금부터 자동차 경주는 전세계로 나아간다!"
 vikelas.504.t: "신규 그랑프리 레이스 서킷"
 vikelas.504.d: "AIACR의 회원국 중 한 곳이 정식 그랑프리 서킷을 준공하였다. 이제부터 #G [GetGlobalVariable('vikelas_num_grand_prix_tracks_global_var').GetValue]#! #V 그랑프리 서킷#!이 연간 레이싱 일정에 포함된다."
 vikelas.504.f: "\"자동차 경주, 투우와 등정만이 진정한 체육이다... 다른 건 그냥 놀이일 뿐이다.\" - 어니스트 헤밍웨이"
 vikelas.504.g: "관중석에 VIP석을 예약해 주게."
 vikelas.505.t: "경주용 자동차 제조사로 이름난 곳"
 vikelas.505.d: "[GetPlayer.GetName]에서 최초의 연속 레이싱 팀을 보유하게 되었다. 이름은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')](이)다. [SCOPE.sState('vikelas_team_state').GetName]의 자동차 공장은 브랜드 인지도 덕분에 큰 수요를 누리게 되었다."
 vikelas.505.f: "개인 단위 선수에서 공장 소속 선수를 둔 프로 레이싱팀으로 점진적인 발전이 이루어지면서 모터스포츠는 돌이킬 수 없는 변화를 겪게 되었다. 자가 제작 차량으로 경기에 나서는 선수는 보기 힘들어졌다. 팀을 창단하지 않은 자동차 제조사의 라이선스를 취득한 괴짜 귀족이 재미를 느끼려 출전하는 경우는 여전히 존재했지만, 자동차 개발이 모터스포츠의 진정한 구심점이 된 것이다."
 vikelas.505.g: "이제 우리만의 경주용 차량을 설계할 수 있다!"
 vikelas.506.t: "경주용 차량 정비사"
 vikelas.506.d: "수석 공학자 [SCOPE.sCharacter('gaudi_engineer_scope').GetLastName] 박사가 새로 창단된 레이싱팀의 정비사로 본인 휘하 연구진 출신의 훌륭한 조수 [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetFullName](을)를 추천하였다. [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetHerHis] 전공 분야는..."
 vikelas.506.f: "정비사는 차량의 세가지 영역, 즉 엔진, 안전성, 차체의 개량 작업에 나설 수 있다. 특정 분야로 전문화하면 개량 작업 속도가 두 배 더 빨라진다. 무조건 그런 것은 아니지만 기본적으로 엔진은 신뢰성(과 속력)을 향상시키고, 안전 장치는 안전성을 높이며, 차체는 속력(과 안전성)를 향상시키는 것으로 알려져 있다."
 vikelas.506.h: "엔진."
 vikelas.506.i: "안전성."
 vikelas.506.j: "차체."
 vikelas.511.t: "[SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]-[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName] 자동차 경주"
 vikelas.511.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]의 주간지 [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')]에서 이번 주 발행되는 호에 대규모 자동차 경주가 개최된다는 소식을 실었다. [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]에서 [SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName]까지 이어지는 도시간 경주로서, 해외에서도 많은 선수들이 참가할 전망이다."
 vikelas.511.f: "초창기 모터스포츠는 이른바 신사 드라이버들이 직접 제작한 자동차로 도시간 경주에 참가하는 것이 특징이었다. 이들은 정비사와 동승했는데, 운전기사 역할까지 겸할 때가 많았다. 이런 레이스 방식은 신문과 자동차 클럽의 홍보, 조직, 지원을 통해 널리 알려졌다. 당시 정비사들은 경험이 부족한 경우가 많아 목적지에 무사히 도착하는 것 자체가 중요했다. 파리-마드리드 경주에서 마르셀 르노가 겪은 것과 같은 치명적 사고는 이러한 형태의 경기 방식이 카레이싱의 역사에서 그저 과도기적 단계에 불과했음을 드러냈다."
 vikelas.511.g: "앞으로 석 달 동안 경기 준비에 나서야겠군."
 vikelas.512.t: "경기 준비"
 vikelas.512.d: "[SCOPE.sCountry('vikelas_race_country').GetName]에서 개최되는 [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]-[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName] 경주가 다가오면서, 우리나라 최고의 카레이서 [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]의 참가 여부를 놓고 추측이 제기되고 있다."
 vikelas.512.g: "이건 완벽한 기회야!"
 vikelas.512.h: "너무 위험하다."
 vikelas.512.tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName](은)는 앞으로 석 달 동안 경기 준비에 나섭니다."
 vikelas.513.t: "홀가분한 질주"
 vikelas.513.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]에게 행운이 따랐다. 탁 트인 도로에서 마음껏 질주할 수 있게 된 것이다. 엔진은 멈추고 코너링은 부드럽다. 이것이야말로 카레이서에게 필요한 최적의 조건이다."
 vikelas.513.f: "\"속력이 핏속으로 스며들면, 살기 위해 운전할 수밖에 없다.\" - 루돌프 카라촐라"
 vikelas.513.g: "환상적이군!"
 vikelas.514.t: "아름답고 순수한 자연"
 vikelas.514.d: "도시간 경주에 나선 [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName](이)가 지나가던 지역의 손길이 닿지 않은 자연을 마주하고 감탄하였다. 여기서 기념으로 뭘 하나 챙겨가는 것이 좋을지도 모르겠다."
 vikelas.514.f: "모터스포츠 초창기에는 가능한 한 야생적이고 순수한 풍경 속을 달리는 것이 특별한 매력이었으며, 카레이서의 입장에서도 도전으로 다가왔다. 이 때문에 초창기 레이스 트랙은 운전기술이나 적응력이 그다지 중요치 않다는 비판을 받기도 했다. 물론 외딴 계곡이나 해변가, 산악 지역은 예상치 못한 놀라움을 선사하기도 했다."
 vikelas.514.g: "계속 달려서 우승해야지!"
 vikelas.514.h: "꽃을 좀 뜯어간다."
 vikelas.514.i: "돌을 좀 가져간다."
 vikelas.515.t: "연료 탱크에 설탕 넣기"
 vikelas.515.d: "잠시 정차하던 [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName](은)는 경쟁 관계에 있던 [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName] 선수도 근처에 있음을 알아차렸다. 그런데 저쪽에서는 완전히 보이지 않는 상황인 듯하다."
 vikelas.515.f: "\"반칙하지 않으면 노력하는 것이 아니다.\""
 vikelas.515.g: "달콤한 복수다."
 vikelas.516.t: "동지에게 작은 도움을?"
 vikelas.516.d: "현재 좋은 등수를 기록하고 있는 [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName](이)가 도로변에서 [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName]의 차량이 연기가 피어오르는 것을 목격하였다. 다가가서 괜찮은지 확인해 보는 것은 어떨까?"
 vikelas.516.f: "초창기 자동차 경주에서는 차량 사고와 부상이 허다했다. 후대에는 코스를 통제하고 마샬이 배치되어 위험 상황을 확인하였지만, 장거리 레이스에서는 보는 사람 없이 차량 고장이 벌어질 경우에는 매우 위험할 수 있었다. 1930년대 아펜니노 산맥에서 열린 밀레 밀리아 레이스에서는 늑대가 목격되기도 했다. 이러한 이유로 레이싱 동료 선수 간의 도움은 자연스러운 일이었다."
 vikelas.516.g: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] 선수가 멈춰서 도와야 한다."
 vikelas.516.h: "하하! 바보 같긴!"
 vikelas.517.t: "엔진 문제"
 vikelas.517.d: "차량의 엔진에 [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] 본인도 알 수 없는 문제가 발생하고 말았다. 지금까지의 원인 분석에도 이렇다 할 결론을 내리지 못했다. 아무래도 속도를 줄여 경기를 재개해야 할 지도 모른다."
 vikelas.517.f: "엔진 문제는 과거와 현재를 막론하고 모든 형태의 모터스포츠에서 벌어지는 문제다. 선두를 달리고 있었는데 경기를 기권한 카레이서도 수없이 많았다. 지금 상황에서 [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName](은)는 속도를 줄여야만 경기를 완주할 수 있을 텐데 그렇게 되면 우승하기는 훨씬 어려워질 것이다."
 vikelas.517.g: "차량의 이용 가능한 미세조정 수단은 전부 시도해 보자."
 vikelas.517.h: "이렇게라도 경기에서 차량을 살려내야 한다."
 vikelas.518.t: "못"
 vikelas.518.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName](이)가 다른 참가자들과의 격차를 어느 정도 벌릴 수 있었다. 어쩌면 우승 확률을 높이고 다른 참가자들을 곤경에 빠뜨릴 기회가 찾아왔을지도?"
 vikelas.518.f: "\"그 사람은 분명 반칙을 했소. 나도 반칙을 했는데 제쳤거든.\""
 vikelas.518.g: "못 가져와, 머틀리."
 vikelas.518.h: "그런 식의 비신사적 행위는 삼가야 한다."
 vikelas.519.t: "실격"
 vikelas.519.d: "불행히도 [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]의 부정행위가 발각되고 말았다. 이에 조직위 측은 [ROOT.Var('vikelas_racer_var').GetCharacter.GetHerHim](을)를 추후 레이스에서 실격 처리하기로 하였다."
 vikelas.519.f: "\"도시간 레이스 규정 제12조 6항 9절에 따라 참가자는 통상 규칙을 위반하였으므로 조기 실격 처리되었음. 이의제기는 할 수 없음.\""
 vikelas.519.g: "실격이라니? 불공평하다!"
 vikelas.520.f: "#V 경기 결과#!\n\n1위: [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] ([SCOPE.sCountry('vikelas_first_winner_scope').GetName])\n2위: [SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName] ([SCOPE.sCountry('vikelas_second_winner_scope').GetName])\n3위: [SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName] ([SCOPE.sCountry('vikelas_third_winner_scope').GetName])"
 vikelas.520.g: "샴페인을 터뜨리세!"
 vikelas.521.t: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] 우승"
 vikelas.521.d: "[SCOPE.sCountry('vikelas_race_country').GetName]에서 열린 도시간 경주에서 [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName](이)가 우승을 차지했다. 이 선수가 운전한 차량은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]였다."
 vikelas.521.g: "샴페인을 터뜨리세!"
 vikelas.522.t: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] 2위"
 vikelas.522.d: "[SCOPE.sCountry('vikelas_race_country').GetName]에서 열린 도시간 경주에서 [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName](이)가 2위를 차지했다. 이 선수가 운전한 차량은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]였다."
 vikelas.522.g: "다음 대회에 또 보세!"
 vikelas.523.t: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] 3위"
 vikelas.523.d: "[SCOPE.sCountry('vikelas_race_country').GetName]에서 열린 도시간 경주에서 [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName](이)가 3위를 차지했다. 이 선수가 운전한 차량은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]였다."
 vikelas.524.t: "도시간 경주 종료"
 vikelas.524.d: "[SCOPE.sCountry('vikelas_race_country').GetName]에서 열린 도시간 자동차 경주가 마무리되고 우승자를 가렸다.  [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] 선수가 탑승한 차량은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]이었다. 비록 순위권에 들지는 못했지만, 차량과 레이서 모두 무사히 경기를 마쳤다."
 vikelas.531.t: "내구 레이스"
 vikelas.531.d: "[GetPlayer.GetName]에서 대규모 내구 레이스를 준비하며 전세계에서 참가할 선수들에게 초청장을 보냈다."
 vikelas.531.f: "20세기 초의 초창기 레이싱 대회는 최대한 먼 거리를 달리는 장거리 경주였다. 경주용 차량의 속력과 신뢰성을 시험하기 위한 목적이었다. 처음에는 프랑스가 대회를 압도하였지만 머지않아 그랑프리 레이스로 전환되었다. 하지만 국제적인 내구 레이스가 여전히 주요 대회로 남아 있었다. 가장 전통적인 레이스는 시칠리아에서 개최된 타르가 플로리오였다. 1906년부터 1977년까지 주로 5월에 개최되었으며, 월드컵 지위를 부여받은 주요 국제 대회였다. 타르가 플로리오 이후에는 밀레 밀리아(1000마일) 대회가 도로 레이스의 고전 격으로 여겨졌고, 그란 투리스모(GT)라는 용어의 토대가 되었다. 1950년대에는 카레라 파나메리카가 여기에 추가되었다. 그란 트리스모는 장거리 레이스를 위해 페라리가 특별히 개발한 차량처럼 고성능 투어링 스포츠카를 지칭하는 용어다."
 vikelas.531.g: "결승선에서 봅시다!"
 vikelas.533.t: "타이어 파손"
 vikelas.533.d: "레이스 도중에 타이어가 터지면서 [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] 선수의 차량도 갑작스레 멈추게 되었다. 이런 사고에도 불구하고 다친 곳 없이 침착함을 보여주었지만, 귀중한 시간을 잃고 말았다."
 vikelas.533.f: "1931년 밀레 밀리아 대회는 엄청난 타이어 마모가 벌어진 것이 특징이었다. 로마에 도착하기 전 아르칸젤리는 타이어를 아홉 번이나 교체해야 했다. 누볼라리 역시 여러 차례 펑크가 터졌지만, 로마에서는 카라치올라보다 2분 앞서 있었다. 아드리아해로 돌아오는 길에도 알파 로메오 차량들은 타이어 문제에도 시원한 속도를 유지했다. 그 사이 보르자키니는 선두를 18분 차이로 벌려나갔다. 지중해 북부 해안을 따라서는 추격해오는 아르칸젤리보다 캄파리가 4분 앞섰다. 이후 선두는 알파 로메오 차량 간에 여러 차례 바뀌었고, 이탈리아 선수들은 전체 레이스의 3분의 2까지는 모든 것이 순조로운 듯했다. 이는 차량정비소가 촘촘하게 이어진 덕에 타이어를 여러 차례 교체할 수 있었기 때문이다. 하지만 마지막 80km 구간에서 폭우가 쏟아지고, 알파 로메오 차량들이 다시 한번 타이어 마모로 사고를 겪으면서 승패가 갈렸다."
 vikelas.533.g: "운이 따르지 못했군."
 vikelas.534.t: "철도 건널목"
 vikelas.534.d: "다른 선수를 추격하던 중 갑자기 경고음이 울리고 두 차량 앞에 차단기가 내려왔다. 앞차는 그대로 통과해 버렸다. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] 선수는 그대로 멈출지, 아니면 상대방과의 격차가 너무 벌어지기 전에 위험을 무릅쓰고 건널지 결정해야 한다."
 vikelas.534.f: "밀레 밀리아에 출전한 선수들은 대담한 묘기를 부리곤 하였는데, 1954년 대회에 참가한 한스 헤르만은 닫히는 철도 차단기 아래로 차를 몰고 들어가면서 본인과 동승자가 머리를 숙이는 아찔한 상황을 연출하였다."
 vikelas.534.g: "위험을 감수한다!"
 vikelas.534.h: "이건 너무 무모해!"
 vikelas.538.t: "늑대와 권총"
 vikelas.538.d: "밤중에 산악 지대를 지나던 레이싱팀이 코스를 이탈하였다. 그 때 갑자기 늑대 울음소리가 들렸다. 근처에 늑대 무리가 나타난 것이다."
 vikelas.538.f: "\"우리는 눈보라 속에 갇혀 늑대들에게 쫓겼다. 그러나 내가 항상 좌석 아래에 숨겨둔 권총으로 총성을 울리고, 손전등과 총으로 무장한 도로 공사 인부들이 찾아오면서 늑대들은 달아났다.\" - 엔초 페라리"
 vikelas.538.g: "늑대들을 해치우자."
 vikelas.538.h: "주변 지역으로 돌아서 지나간다."
 vikelas.538.i: "멍청한 레이스보다 이런 발견이 훨씬 더 중요해."
 vikelas.539.t: "차량이 관중석으로 돌진하다!"
 vikelas.539.d: "경주용 차량이 경기 도중 트랙을 이탈하여 관중석으로 돌진하는 끔찍한 사고가 벌어졌다. 모터스포츠계는 충격에 휩싸였고 안전 기준에 대한 논란이 다시 불붙고 있다."
 vikelas.539.f: "1927년 초대 밀레 밀리아 대회가 개최된 이래 수많은 관객이 길가에 모여들었음에도 대형 사고는 드물었다. 그러나 1938년 4월 3일 오후 4시 30분 대형 사고로 분위기가 바뀌었다. 당시 제노바 출신의 카레이서 안젤로 미냐네고와 동승자 루이지 브루초 박사가 몰던 란차 아프릴리아가 볼로냐의 베르티 피차트 대로를 따라 달리던 상황이었다. 시속 100km에 가까운 속도로 달리던 미냐네고는 미숙한 운전 실력으로 전차 선로에서 차량 통제력을 잃고 말았다. 란차는 먼저 나무에 충돌한 뒤 도로변에 모여든 관객들을 덮쳤다. 차량에 탑승한 두 사람은 거의 다치지 않았지만, 관객 중 어린이 7명을 비롯해 10명이 목숨을 잃었다. 그 밖에도 26명이 부상을 입고, 일부는 중상을 입었다. 그리고 스탕겔라에서 또다른 사고가 벌어져 12세 소녀가 목숨을 잃기도 했다."
 vikelas.539.g: "레이싱계의 어두운 날이다."
 vikelas.540.t: "평균 속력 기록 경신"
 vikelas.540.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] 선수가 내구 레이스에서 전례 없던 평균 속력을 달성하였다. 이 기록으로 모터스포츠 역사에 한 획을 긋게 되었다."
 vikelas.540.f: "[GetPlayer.GetCustom('vikelas_race_team_name_type')] 선수는 숨막힐 것 같은 정밀도와 기술적 숙련도로 과거에 불가능할 것으로 여겼던 평균 속력을 달성하였다. 이 기록은 모터스포츠 황금기의 빛나는 순간으로 오랫동안 기억될 것이다."
 vikelas.545.t: "모여든 팬들!"
 vikelas.545.d: "도시간 내구 레이스를 펼치던 중 [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] 선수가 자기네 도시를 지나간다는 소식을 듣고 축하하러 온 응원단이 엄청나게 모여들었다. 이 사건은 모터스포츠가 대중적인 흥분을 일으키는 계기가 되었다."
 vikelas.545.f: "거리에는 질주하는 차를 구경하러 사람들이 빼곡히 들어찼다. 아이들은 깃발을 흔들고, 어른들은 뛰어난 기량과 용기로 자신들에게 영감을 준 라이더의 이름을 외쳤다. 차가 멈추자 흥분의 물결이 주변으로 들어찼다. 그 짤막한 정차에도 화환과 박수, 환호성이 이어졌고, 선수는 다시 경기에 나섰다. 그 순간 사람들의 마음속에 속도와 기술에 대한 열정을 불러일으켰고, 앞으로 수십 년 동안 모터스포츠가 어떤 의미를 갖게 될지를 보여주는 맛보기였다고 할 수 있었다."
 vikelas.545.g: "카레이싱이 인기를 얻었군."
 vikelas.541.t: "내구 레이스 종료"
 vikelas.541.d: "[SCOPE.sCountry('vikelas_first_winner_scope').GetName] 출신 [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] 선수가 내구 레이스에서 우승하는 영광을 안으며 관중들의 마음을 사로잡았다."
 vikelas.541.f: "마지막 몇 킬로미터는 그야말로 장관이었다. 트랙 위로 먼지가 휘날리고, 엔진은 굉음을 내며, 흥분은 최고조에 달했다. 마침내 우승자가 결승선을 통과하자 우레와 같은 환호성이 터져 나왔다. 치열한 경주의 흔적으로 뒤덮인 차는 승리를 향한 본인의 의지를 상징하는 듯했다. 팬들은 우승자를 어깨에 메고 환호하며 그 순간을 함께 축하했다. 이 승리로 [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] 선수는 모터스포츠계의 정상급 선수로 거듭났고, 소속 레이싱팀 [GetPlayer.GetCustom('vikelas_race_team_name_type')](은)는 모두가 우러러보는 브랜드가 되었다."
 vikelas.542.d: "[SCOPE.sCountry('vikelas_endurance_race_country_scope').GetName]"
 vikelas.551.t: "[GetPlayer.GetName] 그랑프리"
 vikelas.551.d: "[GetPlayer.GetNameNoFormatting]에 레이싱 시즌이 돌아왔다. 머지않아 우리나라에서 개최될 그랑프리 대회에 나서기 위해 수많은 카레이서와 레이싱팀이 벌써부터 입국하고 있다."
 vikelas.551.f: "\"레이싱은 삶 그 자체다. 나머지는 기다림일 뿐.\" - 루돌프 카라촐라"
 vikelas.551.g: "가장 빠른 자가 우승하길."
 vikelas.552.t: "랩타임 신기록"
 vikelas.552.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] 선수가 레이스 훈련에서 최고 기록을 경신했다. 이는 실전에서도 기대를 걸어볼 만한 완벽한 결과다."
 vikelas.552.f: "\"출발 전부터 나는 우승을 확신했다.\" - 에토레 부가티"
 vikelas.553.t: "기름 유출"
 vikelas.553.d: "그랑프리 레이스 도중 [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] 선수가 사고 차량에서 유출된 기름에 휩쓸려 도로를 이탈했다. 경기는 재개할 수 있지만 전체 레이스에서 많이 뒤처지게 되었다."
 vikelas.553.f: "\"나는 차를 달리게 만든다. 멈추게 만드는 게 아니다.\" - 에토레 부가티"
 vikelas.553.g: "안 돼!"
 vikelas.554.t: "비"
 vikelas.554.d: "그랑프리 경기가 갑작스러운 비구름에 예상치 못한 상황에 놓였다. 일부 선수들은 장비 교체를 위해 정차하였다. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]에게 남은 문제는 무모하게 경기를 계속할지, 아니면 안전을 생각해 속력을 줄여야할지이다."
 vikelas.554.f: "\"두려움은 없다. 오직 믿음 뿐.\" - 아르망 푸조"
 vikelas.554.g: "고작 비 좀 내린다고 트랙에서 이탈하진 않으니까!"
 vikelas.554.h: "속력을 줄이자."
 vikelas.555.t: "추월"
 vikelas.555.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] 선수가 [SCOPE.sCountry('vikelas_race_country_scope').GetName]에서 온 [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName] 선수와 거리를 좁히면서 특별한 기회가 찾아왔다. 추월 기술을 펼치는 것이 좋을까?"
 vikelas.555.f: "\"완벽한 경주용 차량은 결승선을 가장 먼저 넘은 뒤 각 부품으로 분해된다.\" - 페르디난트 포르쉐"
 vikelas.555.g: "가자!"
 vikelas.555.h: "이건 너무 위험하다."
 vikelas.556.t: "추월 성공"
 vikelas.556.d: "추월 기술이 완벽히 성공했다. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] 선수가 앞서나가며 속력에 불이 붙었다."
 vikelas.556.f: "\"알파 로메오가 지나가면 모자를 벗어 경의를 표한다.\" - 헨리 포드"
 vikelas.556.g: "만세!"
 vikelas.557.t: "추월 실패"
 vikelas.557.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] 선수가 추월에 실패하고 말았다. 상대방은 제 위치를 완벽히 지켰고 우리 선수는 일정 시간을 허비하고 말았다."
 vikelas.557.f: "\"운이 없었지만 승부에선 어쩔 수 없다. 최선을 다했고 경기에서 졌으니 상 받은 사람을 응원하련다.\" - 랄프 드팔마"
 vikelas.557.g: "이런 수치가."
 vikelas.558.t: "홈 관중에게 동기를 부여받은 선수"
 vikelas.558.d: "[GetPlayer.GetNameNoFormatting] 그랑프리 대회에서 [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] 선수는 조국의 영웅으로서 관중석으로부터 열렬한 응원을 일방적으로 받고 있다. 이것으로 카레이서에게 엄청난 동기부여가 되었다!"
 vikelas.558.f: "\"2등을 기억하는 사람은 아무도 없다. 나는 절대 2등이 되지 않는다.\" - 엔초 페라리"
 vikelas.558.g: "대단해!"
 vikelas.559.t: "자동차 레이스 선수권 대회"
 vikelas.559.d: "[SCOPE.sCountry('vikelas_first_winner_scope').GetNameNoFlag] 선수가 이번 레이싱 시즌을 압도하며 자동차 선수권 대회에서 우승을 거머쥐었다."
 vikelas.559.f: "#V 최종 순위#!\n\n1위: [SCOPE.sCountry('vikelas_first_winner_scope').GetName] - [SCOPE.GetValue('vikelas_first_winner_points_scope')]점 [SCOPE.GetValue('vikelas_first_winner_victories_scope')]승\n2위: [SCOPE.sCountry('vikelas_second_winner_scope').GetName] - [SCOPE.GetValue('vikelas_second_winner_points_scope')]점 [SCOPE.GetValue('vikelas_second_winner_victories_scope')]승\n3위: [SCOPE.sCountry('vikelas_third_winner_scope').GetName] - [SCOPE.GetValue('vikelas_third_winner_points_scope')]점 [SCOPE.GetValue('vikelas_third_winner_victories_scope')]승\n4위: [SCOPE.sCountry('vikelas_fourth_winner_scope').GetName] - [SCOPE.GetValue('vikelas_fourth_winner_points_scope')]점 [SCOPE.GetValue('vikelas_fourth_winner_victories_scope')]승\n5위: [SCOPE.sCountry('vikelas_fifth_winner_scope').GetName] - [SCOPE.GetValue('vikelas_fifth_winner_points_scope')]점 [SCOPE.GetValue('vikelas_fifth_winner_victories_scope')]승"
 vikelas.559.g: "이제 카르멘을 틀어봅시다."
 vikelas.559.h: "순위 결과에는 관심 없네."
 vikelas.559.tt: "연간 자동차 선수권 대회의 순위 결과가 더 이상 표시되지 않습니다."
 vikelas.561.t: "[GetPlayer.GetName] 그랑프리 종료"
 vikelas.561.d: "그랑프리 레이스가 종료되고 우승자가 가려졌다. [GetPlayer.GetName] 그랑프리 대회의 우승자는 [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] 선수였다. 이번 레이싱 대회는 많은 사람들의 기억 속에 오래토록 남을 것이다."
 vikelas.561.f: "#V 최종 결과#!\n\n1위: [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] ([SCOPE.sCountry('vikelas_first_winner_scope').GetName])\n2위: [SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName] ([SCOPE.sCountry('vikelas_second_winner_scope').GetName])\n3위: [SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName] ([SCOPE.sCountry('vikelas_third_winner_scope').GetName])"
 vikelas.561.g: "샴페인을 터뜨립시다!"
 vikelas.571.t: "제1회 르망 24시"
 vikelas.571.d: "1923년 제1회 르망 24시가 개최되어 전세계의 선수와 제조사를 끌어모으며, 머지않아 모터스포츠계에서 가장 명예로운 대회로 거듭났다."
 vikelas.571.f: "1923년 5월 26일~5월 27일 프랑스 동부 자동차 클럽의 주최로 제1회 르망 24시 대회가 개최되었다. 프랑스 사르트 지방에 마련된 17.3km 길이의 트랙에 총 33대의 차량이 도전에 나섰다. 경기 환경은 폭우와 진흙탕, 르망 시와 주변 시골길을 지나는 코스처럼 어려운 여건에서 진행되었다. 첫 대회에서는 체너드 & 워커 스포츠를 몬 앙드레 라가슈와 르네 레오나르가 우승하였으며, 24시간 동안 2,209km를 달렸다. 이 대회로 모터스포츠에서 혁신과 인내를 기리는 전통의 시작을 알렸다."
 vikelas.571.g: "24시간 동안 달린다고? 미쳤구만!"
 vikelas.572.t: "타르가 플로리오의 탄생"
 vikelas.572.d: "1906년 이탈리아 시칠리아의 구불구불한 도로에서 펼쳐지는 화려한 레이스 대회인 타르가 플로리오가 탄생했다. 빈첸초 플로리오가 주최한 이 경기는 시칠리아를 모터스포츠계의 중심지로 만들었다."
 vikelas.572.f: "1906년 5월 6일, 시칠리아의 가파른 산길과 그림 같은 마을이 펼쳐지는 장거리 레이스인 제1회 타르가 플로리오 대회가 치러졌다. 모터스포츠 애호가였던 빈첸초 플로리오가 주최하였으며 평소 본인이 꿈꾸던 스포츠의 도전 정신을 구현하였다. 트랙의 길이는 총 446km에 달했으며 148km씩 세 바퀴로 나뉘어 레이스가 진행되었다. 첫 대회 우승은 이탈라를 몬 알레산드로 카뇨에게 돌아갔으며 평균속도 46.8km/h로 결승선을 넘었다. 타르가 플로리오는 용기와 기술력, 속도를 향한 열정의 상징으로 급속도로 거듭나게 되었다."
 vikelas.572.g: "타르가 플로리오가 하나의 전통을 세웠군."
 vikelas.573.t: "제1회 제메링 베르크-렌넨 대회"
 vikelas.573.d: "1899년 초창기 자동차 공학과 운전실력의 한계를 시험하는 제1회 제메링 힐클라이밍 대회가 개최되었다. 이 대회는 모터스포츠의 역사에 중대한 이정표를 남겼다."
 vikelas.573.f: "1899년 오스트리아 자동차 클럽에서 주최한 제1회 제메링 힐클라이밍 대회가 개최되었다. 오스트리아 클람암제메링에서 고갯길까지 총 9.8km 거리의 루트를 달리는 이 대회는 초창기 자동차와 운전 선수들을 극한으로 밀어붙였다. 이 대회는 7%에 이르는 경사도와 급격한 커브길로 기술력과 용기 모두를 시험에 들게 하였다. 첫 대회 우승은 모르스 자동차를 몬 예뇌 지치에게 돌아갔는데 평균속력 22.2km/h로 코스를 완주하였다. 이 대회는 수많은 관객을 끌어모았으며 유럽에서 힐클라이밍 종목의 전통을 마련하는 토대로 작용하였다."
 vikelas.573.g: "힐클라이밍이 많은 이들을 매료시키는군."
 vikelas.581.t: "신형 차량 엔진"
