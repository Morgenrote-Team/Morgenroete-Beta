 vikelas.121.t: "공산주의 성향의 체조 선수"
 vikelas.121.d: "[SCOPE.sCharacter('vikelas_communist_athlete_scope').GetFullName](은)는 우리나라에서 가장 뛰어난 기량을 보인 체조 선수로서 금메달을 획득할 확률이 높은 것으로 여겨지고 있다. 하지만 이 선수의 사상관이 공산주의라는 점에서 일부 체육 관계자들의 반감을 사고 있다. 이들은 이 선수가 정치 세력의 우상으로 이용될 수 있다고 우려하고 있다."
 vikelas.121.f: "체조는 가장 오래된 올림픽 종목이자 올림픽 전 대회에서 선보였던 4대 종목 가운데 하나입니다. 체조는 기계체조, 리듬체조, 트램벌린 체조의 총 3개 종목으로 구성됩니다. 기계체조는 1896년 아테네 대회 이래 올림픽 일정의 하나로 포함되어 왔습니다."
 vikelas.121.g: "사상이 무슨 상관인가, 우승만 하면 됐지!"
 vikelas.121.h: "다른 선수는 없소?"
 vikelas.122.t: "반동적인 테니스 선수"
 vikelas.122.f: "1896년 제1회 올림픽 대회에서는 죄드폼 (Jeu de Paume, 프랑스 '죄드롱그폼'의 변형 종목)과 론 테니스 (Lawn tennis)가 정식 종목으로 채택되었습니다. 그러나 프랑스, 영국, 미국의 유명 선수들이 참가를 희망하지 않으면서 론 테니스 참가 선수들은 그리스의 무명 선수들이 주를 이뤘습니다. 또한 영국의 해머던지기 선수 조지 스튜어트 로버트슨과 헝가리의 역도 선수 몸칠로 터퍼비처처럼 다른 종목에 나선 선수들도 참가하였습니다. 항간에 알려진 속설에 따르면 프리드리히 아돌프 트라운 선수는 아테네의 한 가게에서 테니스 라켓을 사던 아일랜드 선수 존 피우스 볼랜드의 권유로 대회 경기에 나섰다고 합니다. 테니스는 1924년까지 올림픽 종목으로 유지되다 폐지되고 1988년 대회부터 다시 부활하였습니다."
 vikelas.123.t: "경기를 놓쳐버린 선수"
 vikelas.123.d: "우리 선수 중 한 명이 경기를 놓치고 말았다. 이곳에서 다른 달력을 쓴 것이 혼동을 일으킨 모양이다."
 vikelas.123.f: "\"뭐야? 달력이 다르다고? 달력이 왜 다른데? 왜 아무도 말을 안해 준 건데?\"\n\n이 이야기는 #b 실화#!입니다. 초대 근대 올림픽 대회가 열렸던 그리스에서는 율리우스력을 사용했던 탓에 일부 선수가 경기를 놓치는 문제가 벌어지기도 했습니다."
 vikelas.123.g: "왜 다른 달력을 쓰냔 말이야?!"
 vikelas_negative_influence_on_score_tt: "이것으로 [GetPlayer.GetName]의 메달 획득에 #n 부정적인#! 영향을 끼칩니다."
 vikelas.124.t: "정직한 사이클 선수"
 vikelas.124.d: "우리나라의 사이클 선수 [SCOPE.sCharacter('vikelas_honorable_cyclist_scope').GetFullName](이)가 경쟁 선수 [SCOPE.sCharacter('vikelas_cyclist_with_problems_scope').GetFullName]의 자전거에 기계 상의 문제가 발생하여 수리해야 한다는 소식에 자신도 경주를 멈추었다. 두 선수는 자전거가 수리된 후에 경기를 재개하였다. 결승선에서는 [SCOPE.sCharacter('vikelas_honorable_cyclist_scope').GetLastName](이)가 결국 승리를 거머쥐었다."
 vikelas.124.f: "\"[SCOPE.sCharacter('vikelas_cyclist_with_problems_scope').GetLastNameNoFormatting] 씨, 당신 자전거 상태가 어떻소?\"\n\"아, 그냥 체인에 작은 문제가 생겼을 뿐예요. 기다려 주셔서 감사합니다, [SCOPE.sCharacter('vikelas_honorable_cyclist_scope').GetLastNameNoFormatting] 씨!\""
 vikelas.124.g: "잘 대처했네!"
 vikelas.125.t: "자동차에 치인 사이클 선수"
 vikelas.125.d: "우리나라의 사이클 선수 [SCOPE.sCharacter('vikelas_cyclist_with_accident_scope').GetFullName](이)가 거리 경주에 나선 도중 갑자기 차 한대에 치이고 말았다. 해당 선수는 사고로 다쳐 병원에 입원해 있다고 한다. 경미한 부상만 입은 것으로 전해져 천만다행인 상황이다."
 vikelas.125.f: "사고를 일으킨 차량 운전자는 인터뷰에서 이렇게 밝혔다. \"정말이지 멍청한 발상이오. 공공 도로에서 자전거 경주를 하다니. 도로는 나와 내 차의 것이지 선수들 경주 나서라고 있는 게 아니란 말이오!\""
 vikelas.125.g: "어떻게 이런 일이?"
 vikelas.126.t: "거리 경주의 대형 사고"
 vikelas.126.d: "올해 사이클 거리 경주에서는 좁은 거리와 집단 출발로 대형 사고가 터지고 말았다. 다행히도 경미한 부상만 보고되었으며 잠시 경기를 중단한 뒤에 경주가 재개되었다."
 vikelas.126.f: "\"수백 명의 자전거 선수들이 우승을 목표로 3m 너비의 도로에서 출발하면서 사고를 일으킬 것이라고 누가 생각이나 했겠습니까? 저흰 선수들이 그런 상황에 주의할 것이라고 믿어 의심치 않았습니다\"라고 조직위 측은 기자에게 밝혔다."
 vikelas.126.g: "아무도 죽지 않은 게 다행이군!"
 vikelas.127.t: "술 취한 사이클 선수"
 vikelas.127.d: "우리나라를 대표하여 사이클 종목에 출전한 [SCOPE.sCharacter('vikelas_drunken_cyclist_scope').GetFullName](이)가 거리 경주에 나섰다가 술에 취해 잠에 들었다가 방향을 바꿔 엉뚱한 방향으로 질주했다고 한다."
 vikelas.127.f: "\"이 선수가 1등으로 달리다가 갑자기 멈추더니 술집으로 들어왔소. 날씨가 후덥지근하니 목이 말랐나 보오. 그러더니 백포도주 두 병을 통째로 넘기는 것이 아니오. 내 그렇게 빨리 마시는 사람은 처음 보리다. 그러고 나서 밖으로 나가더니 잠에 빠졌소. 우리가 깨우려고 애쓰다 보니 어느 순간 일어나서 급하게 자전거를 타고 가버렸소. 그 방향이 잘못됐다는게 참 아쉽지만 말이오.\""
 vikelas.127.g: "정말이지 부끄러운 행태로군!"
 vikelas.128.t: "공짜 맥주!"
 vikelas.128.d: "올해 사이클 거리 경주에서는 [SCOPE.sCharacter('vikelas_cheating_cyclist_scope').GetFullName](이)가 우승하였는데 그 이유가 자신이 가장 빨랐기 때문이 아니라 무료로 제공되는 맥주를 마시려고 멈추지 않았기 때문이라고 한다."
 vikelas.128.f: "올해 올림픽 사이클 거리 경주에서 대단히 기묘한 우승이 펼쳐졌다. 오랫동안 크게 뒤쳐져 있던 [SCOPE.sCharacter('vikelas_cheating_cyclist_scope').GetFullNameNoFormatting]였으나, 경쟁 선수들이 공짜 맥주가 놓인 탁상을 보고 멈춰 서서 술을 들이키는 동안 [SCOPE.sCharacter('vikelas_cheating_cyclist_scope').GetLastNameNoFormatting](이)가 그 틈을 타 앞으로 치고 나가면서 우승을 거머쥔 것이다. 일각에서는 공짜 맥주가 우연이 아니라 [SCOPE.sCharacter('vikelas_cheating_cyclist_scope').GetLastNameNoFormatting](이)가 전세 내고 마련한 것이라고들 한다. 하지만 그 주장을 증명할 수단은 없는 상황이다."
 vikelas.128.g: "하! 술 마시면 꼭 저런다니깐."
 vikelas_positive_influence_on_score_tt: "이것으로 [GetPlayer.GetName]의 메달 획득에 #p 긍정적인#! 영향을 끼칩니다."
 vikelas.129.t: "스위스 씨름 제왕이 레슬링 종목에서 우승"
 vikelas.129.d: "스위스의 슈빙겐(전통 씨름) 선수 [SCOPE.sCharacter('vikelas_schwingerkonig_scope').GetFullName](이)가 올해 올림픽 대회의 레슬링 종목에서 우승을 차지했다."
 vikelas.129.f: "\"준다는 게 고작 금메달 뿐이라니? 스위스였다면 황소 한마리를 갖다 바쳤을 것을!\""
 vikelas.129.g: "훌륭한 우승자로세!"
 vikelas.130.t: "줄다리기"
 vikelas.130.d: "올림픽 대회에서 큰 화제를 모았던 줄다리기 경기에서 우리의 상대로 나선 [SCOPE.sCountry('vikelas_rival_country_scope').GetName] 팀이 부정 행위로 우리 팀을 넘어뜨리고 승리했다. 상대팀은 우리나라와 우리 문화, 언어에 대한 농담으로 우리 팀을 계속해서 모욕하였다."
 vikelas.130.f: "줄다리기는 1900년부터 1920년까지 올림픽 대회의 정식 종목 중 하나였다. 지금은 별개의 종목으로 여겨지지만 과거에는 육상 차력 종목 내지는 트랙과 필드 종목의 일부로 여겨졌다. 파리 올림픽에는 프랑스팀과 덴마크-스웨덴 공동팀의 단 두 팀만 참가하였다. 각 팀은 6명의 선수로 구성되었으며 최대 3경기가 진행되어 2경기를 이긴 팀이 우승하였다. 줄다리기는 안트베르펜 대회에서 마지막으로 열렸다. 당시 5개국이 참가하여 베르그발 체계를 이용해 메달에 도전하였다. 금메달 결정전에서 최종 우승팀에 패한 팀이 은메달 결정전을 치르고, 그 다음에는 동메달 결정전을 치르는 방식으로 진행되었다."
 vikelas.130.g: "언젠가 이 날을 후회하게 될 것이다!"
 vikelas.131.t_fencing: "펜싱 종목에 나선 장군"
 vikelas.131.t_shooting: "사격 종목에 나선 장군"
 vikelas.131.t_riding: "승마 종목에 나선 장군"
 vikelas.131.d_fencing: "[SCOPE.sCharacter('vikelas_olympic_general_scope').GetFullName](이)가 많은 동지들의 놀라움 속에 올림픽 대회에 출전하여 뛰어난 펜싱 실력으로 상대를 놀라게 만들었다. 비록 은메달에 크쳤지만 조국에게 있어 그는 진정한 우승자였다."
 vikelas.131.d_shooting: "[SCOPE.sCharacter('vikelas_olympic_general_scope').GetFullName](이)가 올림픽 대회에 출전하여 누구보다도 뛰어난 소총 사격 실력을 보였다. 금메달 획득까지 단 한 발을 놓쳤지만 고국에서는 여전히 영웅으로 추앙받고 있다."
 vikelas.131.d_riding: "올림픽 대회에 출전한 [SCOPE.sCharacter('vikelas_olympic_general_scope').GetFullName](이)가 인상적인 승마 실력을 보여주며 많은 관람객들로 하여금 우승 후보로 주목받게 되었다. 실격으로 우승은 좌절되었으나 대회에서 많은 이들의 응원을 받은 선수로 기억되고 있다."
 vikelas.131.f_fencing: "펜싱은 1896년 초대 아테네 올림픽의 창설 종목 중 하나였다. 아테네 대회에서는 펜싱 종목에 총 3개 경기가 열렸는데 아마추어 선수를 대상으로 한 사브르와 포일 경기, 수준급 선수를 대상으로 한 포일 경기로 구성되었다. 1900년 파리 대회에서는 에페 펜싱 종목이, 1920년 안트베르펜 대회에서는 단체 펜싱 종목이 추가되었다. 1920년 안트베르펜 대회에서는 사상 처음으로 여자 포일 종목에서 여자 선수들이 출전하여 우승자를 내기도 하였다. 이와 더불어 에페 펜싱은 근대 5종의 다섯가지 종목 중 하나로서, 올림픽 대회 종목으로 재편되어 1912년 스톡홀름 하계 올림픽에서 첫선을 보였다."
 vikelas.131.f_shooting: "국제올림픽위원회는 제2회 올림픽의 정식 종목으로 총 아홉 가지의 사격 경기를 배정하였다. 그 중에서도 군용 소총 사격은 5개 등급 (복사 자세, 슬사 자세, 입사 자세, 3자세, 단체전)으로 나뉘어 주요 부문을 차지했다. 6천 명이 넘는 사격 선수가 참가 신청을 하였지만 올림픽 본선에 진출한 선수는 72명에 불과했다. 당시 사격은 상금이 걸린 체육 종목으로 널리 퍼져 있었으나, 체육 대회의 성과로 상금을 받는 것은 올림픽 정신에 어긋나는 것으로 여겨져, 프로 선수들의 올림픽 대회 출전이 불허되기에 이르렀다. 올림픽 정식 종목으로 채택되지 않은 다른 경기로는 비둘기 사격, 석궁 사격, 대포 사격 등이 있었다."
 vikelas.131.f_riding: "국제올림픽위원회는 제2회 올림픽 대회의 정식 종목에 세 가지의 승마 경기를 배정하였다. 이는 승마가 올림픽 종목으로 처음으로 채택된 사례였다. 이들 세 경기의 정확한 참가자 수는 현재로서는 알아내기 어렵다. 이름이 알려진 선수는 5개국 출신 15명 선수 뿐이다. 이들 외에도 50명의 선수가 출전했으나 중복으로 출발한 선수가 있을 가능성도 배제할 수는 없다. 파리, 런던, 스톡홀름 대회에서는 장교 전용 경기로 진행되었으며, 그 기준이 완화된 것은 제7회 안트베르펜 올림픽 대회부터였다."
 vikelas.131.g: "우수한 선수로군."
 vikelas.132.t_rowing: "조정 종목에 나선 제독"
 vikelas.132.t_sailing: "요트 종목에 나선 제독"
 vikelas.132.t_swimming: "수영 종목에 나선 제독"
 vikelas.132.d_rowing: "[SCOPE.sCharacter('vikelas_olympic_admiral_scope').GetFullName](은)는 훌륭한 제독일 뿐만 아니라 뛰어난 조정 선수이기도 하다. 이번 올림픽 대회에 자신의 팀을 꾸려 참가한 그는 동료들과 관객들의 존경을 한몸에 받았다."
 vikelas.132.d_sailing: "[SCOPE.sCharacter('vikelas_olympic_admiral_scope').GetFullName](이)가 올림픽 대회에서 자신의 풍부한 경험을 활용하여 본인의 요트 팀과 함께 은메달을 획득하였다. 이 놀라운 위업에 온 나라가 고무되고 있다."
 vikelas.132.d_swimming: "올림픽에서 놀라운 사건이 벌어졌다. [SCOPE.sCharacter('vikelas_olympic_admiral_scope').GetFullName](이)가 동료들도 모르고 정부에도 알리지 않은 채 일반 선수 자격으로 올림픽 대회에 출전한 것이다. 그가 그렇게 뛰어난 수영 선수일지 누가 알았겠는가. 금메달 획득에는 부족했으나 오래도록 인상으로 남기에는 충분했다. 정말 다재다능한 사람이다!"
 vikelas.132.f_rowing: "제2회 파리 올림픽 대회에서 보트 조정 종목의 진행이 부실한 탓에 조직위가 결승전을 두 번 치르는 일이 벌어졌다. 국제올림픽위원회가 두 결승전을 모두 우승자 명단에 포함시킨 것은 1900년 하계 올림픽이 개최되던 당시의 상황을 해석하기가 어려웠음을 알 수 있다."
 vikelas.132.f_sailing: "올림픽 요트 종목은 1900년 대회부터 도입되었다. 제2회 파리 올림픽 대회에서는 처음으로 메달을 놓고 팀 단위로 경기를 펼쳤다. 요트 경기는 원래 1896년 아테네 대회에서 올림픽 무대에 첫선을 보일 계획이었으나 당시 궂은 날씨 상황으로 경기가 치러지지 못했다. 요트 종목은 1904년 하계 올림픽을 제외하고 역대 모든 올림픽 대회에서 치러졌다. 올림픽 요트 경기 대다수는 플릿 레이스 형식으로 진행되었으나, 일부 대회에서는 매치 레이스 형식이나 플릿/매치 혼합 형식도 열렸다."
 vikelas.132.f_swimming: "1896년 하계 올림픽에서는 총 4개의 수영 경기가 치러졌으며 전부 남성만 출전하였다.  당시 경기는 해양 종목 소위원회에서 기획 주최하였다. 모든 종목은 4월 11일 제아만에서 진행되었다. 제아만은 아테네 지역의 항구 겸 정박지로, 올림픽 조직위 측에서 별도 수영장의 건설 비용을 절감하기 위해 이곳을 수영장으로 채택했다. 총 4개국 13명의 선수가 참가하였다. 여자 수영 종목은 1912년 대회부터 올림픽에 도입되었다."
 vikelas.133.t_boxing: "복싱 종목에 나선 정치인"
 vikelas.133.t_wrestling: "레슬링 종목에 나선 정치인"
 vikelas.133.t_archery: "양궁 종목에 나선 정치인"
 vikelas.133.d_boxing: "[SCOPE.sCharacter('vikelas_olympic_politician_scope').GetFullName]의 말솜씨가 좋다는 것은 만인이 짐작하고 있었다. 그러나 올림픽 대회에서는 뛰어난 신체적 능력까지 보여주었다. 앞으로 그의 정적들은 더욱 조심해야 할지도 모르겠다."
 vikelas.133.d_wrestling: "[SCOPE.sCharacter('vikelas_olympic_politician_scope').GetFullName](이)가 탁월한 레슬링 선수라는 것을 누군가 짐작했더라면, 그 정적들은 감히 건드릴 생각조차 못했을 것이다. 당내에서만큼이나 올림픽 대회에서 열렬한 환호를 받았으며, 거의 금메달을 획득할 뻔했다!"
 vikelas.133.d_archery: "[SCOPE.sCharacter('vikelas_olympic_politician_scope').GetFullName]의 연설은 언제나 정확하기로 높이 평가받았다. 하지만 올림픽에 출전하기 전까지는 가장 가까운 지인들만이 여가 시간에 타고난 양궁선수로 나선다는 사실을 알고 있었다. 유권자들이 국제 체육 대회의 관중들만큼이나 열렬히 환호한다면 머지않아 이 나라의 가장 높은 자리에도 등극할 것이다!"
 vikelas.133.f_boxing: "복싱은 올림픽 종목 중에서도 가장 오래된 종목으로 꼽힌다. 현대 복싱의 선대 격이 되는 체육 종목이 처음 도래한 것은 기원전 688년 고대 올림픽 대회로 거슬러 올라간다. 1904년 세인트루이스 올림픽 대회부터 복싱은 근대 올림픽 종목으로 첫선을 보였다. 그러나 당시 대회에서는 7개 체급에 출전한 44명 선수 전원이 미국인이었다. 1912년에는 개최국인 스웨덴이 복싱을 금지했기 때문에 복싱 경기는 치러지지 않았다."
 vikelas.133.f_wrestling: "1896년 하계 올림픽에서 단 하나의 레슬링 종목이 치러졌다. 당시 경기는 레슬링 체조 소위원회에서 기획하고 준비하였다. 우승자는 독일의 카를 슈만이었다. 레슬링은 처음에는 그레코로만형으로 치러졌으며 1904년 자유형이 도입되었다. 레슬링은 고대 올림픽에서도 이미 주종목으로 치렀기 때문에, 올림픽의 대표 종목이라 할 수 있었다."
 vikelas.133.f_archery: "국제올림픽위원회 (IOC)는 제2회 올림픽의 정식 종목에 여섯 개의 양궁 종목을 편성하였는데, 근대 올림픽의 창시자 피에르 드 쿠베르탱과 IOC의 견해에 따르면 올림픽 대회에 양궁이 국제 참여에 있어 기본적인 필수 종목으로 여겨졌기 때문이다. 당시 양궁은 인기 종목이었으며 총 1,723명의 양궁 선수가 참가해 성대한 행진식과 함께 경기가 열렸다. 전체 경기로 따지면 총 5,254명의 선수가 출전하였다. 올림픽 정식 종목으로 채택된 여섯 번의 경기에서 이름을 남긴 선수는 프랑스와 벨기에 출신 선수 17명에 불과하다. 그러나 이들 경기에 훨씬 더 많은 선수가 참가했던 것으로 확인된다. 체육사학계에서는 네덜란드 선수들을 비롯해 총 153명의 선수가 참가했을 것으로 추정하고 있다."
 vikelas.134.t: "올림픽 챔피언"
 vikelas.134.d: "수차례의 시도와 수년간의 훈련, 그리고 꺾이지 않는 마음이 마침내 [SCOPE.sCharacter('vikelas_olympic_champion_scope').GetFullName]에게 오래토록 기다려 왔던 결실을 선사했다. 올림픽에 출전해 우승자로 돌아와 자랑스럽게 금메달을 목에 걸고 돌아온 것이다!"
 vikelas.134.f: "오늘날 우리가 알고 있는 것처럼 올림픽 우승자에게 금메달을, 2등에게 은메달을, 3등에게 동메달을 수여하는 방식은 처음부터 존재하지 않았다. 1896년과 1900년 대회에서는 상위 2위까지만 메달이 수여되었으며, 1등에게는 은메달을, 2등에게는 동메달을 수여했다. 1904년부터 처음으로 우승자에게 금메달이 수여되었으며, 나머지 메달 색은 한 단계씩 내려왔다."
 vikelas.134.g: "온 국민의 영웅일세!"
 vikelas.141.t: "요트가 없다!"
 vikelas.141.d: "올해 올림픽 대회에서 요트 종목을 치르기로 하였음에도 어떻게 된 일인지 요트가 준비되어 있지 않다고 한다. 이는 요트 경기가 치러지지 않을 수도 있다는 뜻이 된다."
 vikelas.141.f: "\"요트는 어디 있소?\"\n\"요트를 준비하는 건 당신인 줄 알았는데.\"\n\"내가?! 나는 이미 조정 경기를 준비했잖소. 요트는 당신 책임 아니오!\"\n\n#b 실제 역사#!에서도 초대 올림픽에서는 선수와 조직위 모두 요트를 준비하지 못해 요트 경기가 열리지 못했다."
 vikelas.141.g: "이건 나라 망신이오! 어디서든 요트를 구해오도록!"
 vikelas.141.h: "올해는 요트 경기를 치르기 힘들 듯 하군."
 vikelas.142.t: "축구 경기 조작?"
 vikelas.142.d: "우리나라와 [SCOPE.sCountry('vikelas_olympics_football_country_scope').GetName] 간의 축구 경기가 공정하게 진행될 것인가에 대한 의문이 제기되고 있다. 참관인들은 심판이 편파적이며 우리 팀에 유리하게 판정한다고 주장하고 있다."
 vikelas.142.f: "축구는 1908년 올림픽 대회부터 정식 올림픽 종목으로 채택되었다. 하지만 당시에는 축구단 차원에서, 혹은 가끔씩 별개의 선수들이 한 팀으로 묶여 참가하는 경우가 대세였으며, 국가대항전은 1908년 대회부터 비로소 시작되었다. 역사상 첫 공식 국제 경기는 1908년 올림픽 축구 대회의 덴마크팀과 프랑스 B팀 간에 치러진 경기였다. 올림픽 축구 대회는 1928년까지 사실상 세계 축구 선수권 대회와 같은 위상을 누렸지만, 1930년 월드컵이 창설되고 1920년대~1930년대 유럽과 남미 일부 국가에서 프로축구가 도입되면서 그 위상은 급격히 떨어졌다. 프로축구의 도입으로 아마추어 선수들만 참가가 허용되면서 각국 최고의 선수들은 더 이상 올림픽에 출전할 수 없게 되었기 때문이다."
 vikelas.142.g: "방금 그 공은 분명 오프사이드였다고!"
 vikelas.142.h: "[SCOPE.sCountry('vikelas_olympics_football_country_scope').GetName](이)가 정당하게 승리한 것이다."
 vikelas.143.t: "마라톤의 새 전설"
 vikelas.143.d: "마라토너 [SCOPE.sCharacter('vikelas_olympic_marathon_athlete_scope').GetFullName](이)가 인상적인 경기를 펼치며 마라톤에서 우승하여 조국의 영웅으로 떠올랐다!"
 vikelas.143.f: "[SCOPE.sCountry('vikelas_olympic_rival_country_1_scope').GetName] 최고의 선수로 꼽히는 [SCOPE.sCharacter('vikelas_olympic_rival_athlete_1_scope').GetFullName](은)는 흰 장갑을 끼고 1500m 달리기에서 1,2위를 달리던 [SCOPE.sCountry('vikelas_olympic_rival_country_2_scope').GetName]의 [SCOPE.sCharacter('vikelas_olympic_rival_athlete_2_scope').GetFullName] 선수, [SCOPE.sCountry('vikelas_olympic_rival_country_3_scope').GetName]의 [SCOPE.sCharacter('vikelas_olympic_rival_athlete_3_scope').GetFullName] 선수를 제치고 선두로 나섰다. 전해진 바에 따르면 [SCOPE.sCharacter('vikelas_olympic_marathon_athlete_scope').GetLastName](은)는 22km 지점의 여관에서 와인 한 잔을 마시고 자신이 이긴다고 큰 소리로 외쳤다. 그리고 모든 선수를 앞서며 그 약속을 지켜나갔다. 그를 따라잡을 수 있는 선수는 [SCOPE.sCharacter('vikelas_olympic_rival_athlete_2_scope').GetFullName] 뿐이었지만 결국 지쳐 나가떨어지고 말았다. [SCOPE.sCharacter('vikelas_olympic_marathon_athlete_scope').GetLastName] 선수는 경기 도중에 양젖 치즈와 브랜디, 그리고 동포들의 따뜻한 격려로 기운을 차렸다고 한다. 경기장으로 달려가 지친 무릎을 꿇은 그는 [SCOPE.sCharacter('vikelas_ruler').GetPrimaryRoleTitle] 앞에 겸손하게 엎드리며 말했다. \"저는 그저 농부의 아들일 뿐입니다.\""
 vikelas.143.g: "진정한 올림픽 선수일세!"
 vikelas.144.t: "차질 없는 올림픽 대회 준비"
 vikelas.144.d: "올림픽 대회 참가국들이 이번 대회의 조직 운영이 훌륭하다며 찬사를 보내고 있다. 모든 것이 순조롭게 진행되고 있다."
 vikelas.144.f: "\"올림픽 대회를 개최한다는 것, 역사를 일깨운다는 것.\" - 피에르 드 쿠베르탱"
 vikelas.144.g: "완벽하군."
 vikelas.145.t: "찬사 받는 개최국"
 vikelas.145.d: "외국 선수들과 관중들이 우리나라의 환대에 아낌없는 찬사를 보내고 있다. 우리나라는 세계에 좋은 인상을 남겼다."
 vikelas.145.f: "\"올림픽 대회는 세계를 위한 것이요, 모든 국가가 참가할 수 있어야 한다.\" - 피에르 드 쿠베르탱"
 vikelas.151.t_sailing: "난관을 마다하고 치러진 요트 경기"
 vikelas.151.t_no_sailing: "요트 경기 무산"
 vikelas.151.d_sailing: "[SCOPE.sCountry('vikelas_olympics_host_scope').GetName]에서 요트 경기를 위한 요트를 따로 준비하지 않았음에도, 다른 도시와 국가에서 요트를 빌려와 경기를 치를 수 있게 되었다."
 vikelas.151.d_no_sailing: "[SCOPE.sCountry('vikelas_olympics_host_scope').GetName]에서 요트 경기에 쓰일 요트를 준비하지 않은 관계로 올해에는 대회가 열리지 않을 전망이다."
 vikelas.151.f_sailing: "요트 경기는 인근 항구에서 요트를 대여해 오면서 가까쓰로 겨우 진행될 수 있었다.\n\n#b 실제 역사#!에서는 초대 올림픽 대회에서 선수와 조직위 모두 요트를 따로 준비하지 못한 바람에 요트 경기가 치러지지 못했다."
 vikelas.151.f_no_sailing: "요트 경기는 전용 요트의 승선이 준비되지 않아 진행되지 못했다.\n— 카랄람보스 안니노스\n\n#b 실제 역사#!에서는 초대 올림픽 대회에서 선수와 조직위 모두 요트를 따로 준비하지 못한 바람에 요트 경기가 치러지지 못했다."
 vikelas.151.g: "우리 선수가 우승하길 바라오!"
 vikelas.151.h: "경쟁국에 돌아갈 메달 하나가 줄었구만!"
 vikelas.151.i: "그보다 더 중요한 문제를 다루고 있으니 방해하지 말도록."
 vikelas.161.t: "마라톤에 나서는 히치하이커를 위한 안내서"
 vikelas.161.d: "우리 국가대표로 출전한 [SCOPE.sCharacter('vikelas_hitchhiker_scope').GetFullName](이)가 결승선을 1등으로 들어오면서 모든 관중이 열광에 빠졌다. 그러나 머지않아 이 선수가 경기 도중 차를 얻어타고 11km를 질주했다는 사실이 드러났다. 이에 따라 [SCOPE.sCharacter('vikelas_hitchhiker_scope').GetLastName] 선수는 실격 처리되었다. 본인 말로는 장난을 치고 싶었을 뿐이라고 하지만, 우리나라의 위상에 타격이 될 수도 있다."
 vikelas.161.f: "\"그 남자가 타월을 갖고 있었습니다. 올림픽에 참가할 줄 누가 알았겠습니까? 타월 하나쯤 가지고 다니면 만반의 준비가 되었다는 뜻이지 않나요!\"\n"
 vikelas.161.g: "겁먹지 마시오!"
 vikelas.162.t: "들개가 나타났다"
 vikelas.162.d: "마라톤 선수로 나선 [SCOPE.sCharacter('vikelas_chased_by_dogs_scope').GetFullName](이)가 실수로 무성한 풀숲에 들어갔다가 들개가 나타나는 바람에 쫓기기 시작했다. 옥수수밭에 숨어들어가서야 그 개는 추격을 겨우 멈췄다."
 vikelas.162.f: "\"컹! 컹!\"\n"
 vikelas.162.g: "그러게 풀숲에 들어가지 말았어야지!"
 vikelas.163.t: "표적지를 잘못 맞추다"
 vikelas.163.d: "사격 국가대표로 나선 [SCOPE.sCharacter('vikelas_bad_shooter_scope').GetFullName] 선수가 만점을 받으며 단 한 발만 남겨두고 있었다. 마지막 발도 표적지를 맞췄지만... 다른 쪽이었다. 마지막 발은 0점으로 처리되어 [SCOPE.sCharacter('vikelas_bad_shooter_scope').GetLastName]의 우승은 물건너가게 되었다."
 vikelas.163.f: "\"내 장담컨대 표적지는 제대로 겨냥했다니깐! 틀림없어! 난 엉뚱한 표적지를 맞춘 적이 없어! 그런 일은 절대 없다고!\"\n"
 vikelas.163.g: "패배하는 것도 가지가지로군!"
 vikelas.182.t: "올림픽 성화봉"
 vikelas.182.d: "올림픽 대회의 개막을 알리기 위해 올림픽 성화 주자로 나선 [SCOPE.sCountry('vikelas_olympic_country').GetName](이)가 오늘 [SCOPE.sState('capital_scope').GetName]에 도착했다. 국민들에게 감동을 주는 행사였다!"
 vikelas.182.f: "올림픽 성화는 고대 그리스의 여신 헤스티아의 영원히 타오르는 화롯불에서 기원한 것으로 1928년 암스테르담 올림픽 대회에서 처음 선보였다. 올림픽 성화 봉송이 전통으로 자리잡게 된 것은 1936년 베를린 하계 올림픽에서 처음 도입된 것이다. 흔히 알려진 바와는 달리 성화봉송의 개념 자체는 나치 정권이 아닌 독일계 유대인 고고학자 알프레드 쉬프의 제안으로 성사된 것이다. 성화 봉송이라는 전통을 도입한 것은 올림픽 대회라는 정체성에 새로운 상징을 부여했을 뿐만 아니라, 매년 사람들을 하나로 묶고 다른 갈등으로부터 관심을 돌릴 수 있는 고무적인 상징으로 거듭나게 되었다."
 vikelas.182.g: "빵과 서커스일세."
 vikelas.183.t: "The Olympic Flame"
 vikelas.183.d: "After a brilliant opening ceremony in which every country in the world appeared in a magnificent procession, the Olympic flame was lit as the highlight. The crowds are thrilled!"
 vikelas.183.f: "Over the course of the 20th century, the Olympic Games increasingly transformed into a mass phenomenon, whose ritual-secular idea enabled a society alienated from religious and national ideals to find a certain sense of meaning - both in the national and in the cosmopolitan sense. Some saw this as an opportunity to emphasize the outstanding position of their own country, for others the idea that the nations met peacefully for sporting competitions played a greater role. For the host country, however, it was an opportunity to present itself to its own people and the world in a way that had hardly been seen before."
 vikelas.183.g: "The people of our nation see us as a great country."
 vikelas.183.h: "The nations of the world see us as a great country."
 vikelas.191.t: "IOC 본부가 [ROOT.GetCountry.GetNameNoFlag](으)로 이전"
 vikelas.191.d: "Due to political changes, the IOC had to move its headquarters. It considers [ROOT.GetCountry.GetNameNoFlag] to be a suitable location and offers the country the presidency of the board."
 vikelas.191.f: "If the original founding country of the IOC disappears from the map for whatever reason, the IOC will move its headquarters to another country and completely re-elect. In return, the country in exile is offered the presidency. Classic candidates for such cases are Switzerland or Greece. If these countries do not exist either, the presidency will be offered to a Great Power that already sits on the board."
 vikelas.191.g: "새로운 국제 올림픽 위원회를 선출합시다."
 vikelas_no_more_olympic_flavor_notification_events_tt: "단순 플레이버로 발생하는 올림픽 대회에 관한 이벤트를 #n 더 이상#! 받지 않습니다."
