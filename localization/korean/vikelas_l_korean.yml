 je_vikelas_mechanic_engine: "경주용 차량 엔진 개량"
 je_vikelas_mechanic_engine_reason: "우리 정비사 [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName](이)가 차량의 신뢰성과 속력을 향상시킬 신형 엔진 개발을 위해 쉴 틈 없이 연구하고 있다. 본 사업의 마무리는 정비사의 특성과 경험치에 크게 좌우된다."
 je_vikelas_mechanic_safety: "경주용 차량 안전성 개량"
 je_vikelas_mechanic_safety_reason: "우리 정비사 [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName](이)가 차량의 안전성을 향상시키고 있다. 본 사업의 마무리는 정비사의 특성과 경험치에 크게 좌우된다."
 je_vikelas_mechanic_body: "경주용 차량 차체 개량"
 je_vikelas_mechanic_body_reason: "우리 정비사 [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName](이)가 차량의 속력을 늘리고 안전성도 한층 더 늘릴 신형 차체를 제작하고 있다. 본 사업의 마무리는 정비사의 특성과 경험치에 크게 좌우된다."
 vikelas_mechanic_progress_bar_at_full_tt: "경주용 차량 개량 진행바가 #variable 100%#!에 도달함"
 je_vikelas_endurance_race: "내구 레이스"
 je_vikelas_endurance_race_reason: "현재 우리나라의 여러 주에서 내구 레이스가 진행되고 있다. 레이싱을 사랑하는 만국의 레이서들이 본 경주에 참가한다. 개최국은 다소 유리한 위치를 점하며 추가 이벤트를 받게 된다. 그랑프리 경주와는 달리 장거리 주행을 해야 하므로, 차량의 속력보다는 내구성이 더 중요하다. 엔진이 고장날 위험도 치명적인 사고보다 훨씬 더 크다."
 je_vikelas_endurance_race_success: "[GetPlayer.GetName]에서 #ORANGE 내구 레이스 진행도 8#! 이상 확보"
 je_vikelas_endurance_race_goal: ""
 vikelas.501.t: "The [ROOT.GetCountry.GetAdjectiveNoFormatting] Automobile Club"
 vikelas.501.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] is considered a passionate driver and has founded an automobile club with like-minded people to mark this occasion. This is intended to strengthen the domestic car industry and organize national car events."
 vikelas.501.f: "As early as the mid-1890s, the Automobile Club de France (ACF), founded in 1895 as the first automobile club in the world, organized a race once a year, which represented the highlight of the season. These were so-called 'city-to-city' races on public country roads, in which the participants were sent out individually at intervals. One of the triggers for the founding of the ACF was Albert de Dion's relegation from the Paris-Rouen race in 1894. In the following years, rapid development began, with ever more powerful vehicles greatly increasing the dangers of motorsport. The ACF therefore implemented rules for the first time in 1901, which can be considered the first motorsport regulations in the world. A central innovation was the division into categories that had to apply to all events supported by the ACF. The resulting weight limitation should initially help to reduce the immense number of tire defects due to overloading."
 vikelas.501.g: "A sport full of thrills!"
 vikelas.502.t: "First Grand Prix Race"
 vikelas.502.d: "Motorsport is taking a revolutionary turn: with the Grand Prix races, international races are to be held one after the other in all motorsport-loving nations. With this, an international championship was born. [SCOPE.sCountry('vikelas_gp_founder_scope').GetName] has invited all nations with an Automobile Club to participate at their first Grand Prix in the coming year."
 vikelas.502.f: "The annual races for the Gordon Bennett Cup were the first attempt to hold an automobile world championship from 1900 to 1905. In view of constantly increasing speeds, in 1902 the ACF issued technical regulations for the first time in the form of a so-called racing formula, which the participating cars had to adhere to. Nevertheless, the frequency of accidents continued to increase, so that from 1903 only circuit races could be held on closed courses. As the successor to the Gordon Bennett races, the main race organized by the ACF ran for the first time in 1906 under the name Grand Prix. The first Grand Prix winner in history was the Hungarian driver Ferenc Szisz in a Renault."
 vikelas.502.g: "So there is something to be won?"
 vikelas.503.t: "Association Internationale des Automobile Clubs Reconnus"
 vikelas.503.d: "Today the International Automobile Association was founded in [GetGlobalVariable('vikelas_aiacr_seat_global_var').GetStateRegion.GetCityHubName]. Its full name is Association Internationale des Automobile Clubs Reconnus (AIACR)."
 vikelas.503.f: "In order for the automobile manufacturers to be able to take part in all international races, it became necessary to have the technical and sporting regulations that had previously been independently stipulated by the French Automobile Club for its races in the form of the respective Grand Prix formula regulated across countries by an International Automobile Association. The association was founded on June 20, 1904 in Paris as the Association Internationale of the Automobile Club Reconnus (AIACR), after the decision to found it had been made a few days earlier by the automobile clubs of the most important racing nations as part of the Gordon Bennett Cup in Bad Homburg. The AIACR was to rename itself the FIA after the Second World War."
 vikelas.503.g: "From now on, automobile racing is international!"
 vikelas.504.t: "New Grand Prix Race Circuit"
 vikelas.504.d: "Another member of the AIACR has built an official Grand Prix circuit. There are now #G [GetGlobalVariable('vikelas_num_grand_prix_tracks_global_var').GetValue]#! #V Grand Prix circuits#! in the annual racing calendar."
 vikelas.504.f: "'Auto racing, bull fighting, and mountain climbing are the only real sports… all the others are games.' -Ernest Hemingway"
 vikelas.504.g: "Reserve the VIP seats in the stands."
 vikelas.505.t: "Racing Car Manufacturer Location"
 vikelas.505.d: "With [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')], [GetPlayer.GetName] has its first series racing team. The car factory in [SCOPE.sState('vikelas_team_state').GetName] is now enjoying great demand due to the established brand."
 vikelas.505.f: "With the slow development from individual men's drivers to professional racing teams with factory drivers, motorsport changed permanently. Amateurs with self-built cars became a rarity. Although it still happened that eccentric aristocrats with licenses from other car manufacturers sought the thrill, car development became the real center of motorsports."
 vikelas.505.g: "We can now design our own race cars!"
 vikelas.506.t: "경주용 차량 정비사"
 vikelas.506.d: "수석 공학자 [SCOPE.sCharacter('gaudi_engineer_scope').GetLastName] 박사가 새로 창단된 레이싱팀의 정비사로 본인 휘하 연구진 출신의 훌륭한 조수 [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetFullName](을)를 추천하였다. [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetHerHis] 전공 분야는..."
 vikelas.506.f: "정비사는 차량의 세가지 영역, 즉 엔진, 안전성, 차체의 개량 작업에 나설 수 있다. 특정 분야로 전문화하면 개량 작업 속도가 두 배 더 빨라진다. 무조건 그런 것은 아니지만 기본적으로 엔진은 신뢰성(과 속력)을 향상시키고, 안전 장치는 안전성을 높이며, 차체는 속력(과 안전성)를 향상시키는 것으로 알려져 있다."
 vikelas.506.h: "엔진."
 vikelas.506.i: "안전성."
 vikelas.506.j: "차체."
 vikelas.511.t: "The Great [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]-[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName] Race"
 vikelas.511.d: "The [ROOT.GetCountry.GetCapital.GetCityHubName] [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] has announced a big car race in its current weekly edition. The city-to-city race is designed to go from [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName] to [SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName]. Numerous racing drivers are also expected from abroad."
 vikelas.511.f: "The early days of motor racing were characterized by so-called gentleman drivers who took part in city-to-city races in self-built cars with their mechanic, who often also served as chauffeur. This racing format was often advertised, organized and supported by newspapers and automobile clubs. Since the mechanics were often still in their infancy, it was more important to arrive at the destination at all. Fatal accidents like that of Marcel Renault in the Paris-Madrid race meant that this form of organization was only a transitional phase in the history of racing."
 vikelas.511.g: "Prepare for the event in three months."
 vikelas.512.t: "Race Participation"
 vikelas.512.d: "The upcoming [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]-[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName] race in [SCOPE.sCountry('vikelas_race_country').GetName] has led to speculation as to whether our country's premier racer, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName], will also take part."
 vikelas.512.g: "An excellent opportunity!"
 vikelas.512.h: "This is too dangerous."
 vikelas.512.tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] will prepare for the race in three months."
 vikelas.513.t: "Free Ride"
 vikelas.513.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] is lucky: [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] can give full throttle on the open road. The engine stops, the corners are smooth. Best requirements for a racing driver."
 vikelas.513.f: "'When speed gets in the blood, one must drive to live.' -Rudolf Carraciola"
 vikelas.513.g: "Fantastic!"
 vikelas.514.t: "Beautiful, untouched Nature"
 vikelas.514.d: "As [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] drives from city to city, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] notices the untouched nature in the area [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] is driving through. Maybe [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] should take a souvenir with him?"
 vikelas.514.f: "In the early phase of motorsport, a special attraction was driving through landscapes that were as wild and untouched as possible, which presented the driver with challenges. The early race tracks were therefore also criticized because they supposedly required less driving skill and adaptation requirements. Of course, some remote valleys, beaches and mountain areas could offer surprises."
 vikelas.514.g: "We have a race to win!"
 vikelas.514.h: "Collect some plants."
 vikelas.514.i: "Collect some stones."
 vikelas.515.t: "Sugar in the Tank"
 vikelas.515.d: "During a short stop, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] notices that [ROOT.Var('vikelas_racer_var').GetCharacter.GetHerHis] competitor [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName]'s car is also nearby. Apparently the car is completely unobserved."
 vikelas.515.f: "'If you're not cheating, you're not trying.'"
 vikelas.515.g: "A sweet revange."
 vikelas.516.t: "A little help for a friend?"
 vikelas.516.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] is currently in a good position, but sees [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName]'s smoking car on the side of the road. Maybe [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] should check to see if everything is okay?"
 vikelas.516.f: "Motor injuries and accidents were commonplace in the early days of racing. However, while in later times marshals were available on closed routes, a breakdown could be dangerous in long-distance races without an observer. Wolves were still seen at the Mille Miglia in the Apennines in the 1930s. That's why help between racing colleagues often comes naturally."
 vikelas.516.g: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] should stop and help."
 vikelas.516.h: "Haha! Fools!"
 vikelas.517.t: "Engine problems"
 vikelas.517.d: "Something - even [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] can't explain it - is going on with the engine. A diagnosis has so far been unsuccessful. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U] may have to continue the race at reduced speed."
 vikelas.517.f: "Engine problems occur in every form of motorsport - both then and now. There were numerous drivers who had to retire from a race early because they were in the lead. As things stand, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] could still finish the race, but only if he slows down, which would make it much more difficult to win."
 vikelas.517.g: "Use all available mechanical fine-tuning measures."
 vikelas.517.h: "The car has to survive the race like this."
 vikelas.518.t: "Nails"
 vikelas.518.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] was able to build up a certain lead over the rest of the field. Maybe [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] could improve his chances of winning and make life difficult for the rest of the field?"
 vikelas.518.f: "'I know he was cheating because I was cheating and he beat me.'"
 vikelas.518.g: "Get the nails, Muttley."
 vikelas.518.h: "We refrain from such unsportsmanlike practices."
 vikelas.519.t: "Disqualification"
 vikelas.519.d: "Unfortunately, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]'s sporting misconduct came to light. The racing commission therefore immediately excluded [ROOT.Var('vikelas_racer_var').GetCharacter.GetHerHim] from further racing."
 vikelas.519.f: "'According to the regulations of the city-to-city race in accordance with paragraph 12 paragraph 6 line 9, the participant has violated the general rules and will therefore be excluded early. Appeal is not possible.'"
 vikelas.519.g: "Disqualified? That's unfair!"
 vikelas.520.f: "#V 경기 결과#!\n\n1위: [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] ([SCOPE.sCountry('vikelas_first_winner_scope').GetName])\n2위: [SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName] ([SCOPE.sCountry('vikelas_second_winner_scope').GetName])\n3위: [SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName] ([SCOPE.sCountry('vikelas_third_winner_scope').GetName])"
 vikelas.520.g: "샴페인을 터뜨리세!"
 vikelas.521.t: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] 우승"
 vikelas.521.d: "[SCOPE.sCountry('vikelas_race_country').GetName]에서 열린 도시간 경주에서 [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName](이)가 우승을 차지했다. 이 선수가 운전한 차량은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]였다."
 vikelas.521.g: "샴페인을 터뜨리세!"
 vikelas.522.t: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] 2위"
 vikelas.522.d: "[SCOPE.sCountry('vikelas_race_country').GetName]에서 열린 도시간 경주에서 [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName](이)가 2위를 차지했다. 이 선수가 운전한 차량은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]였다."
 vikelas.522.g: "다음 대회에 또 보세!"
 vikelas.523.t: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] 3위"
 vikelas.523.d: "[SCOPE.sCountry('vikelas_race_country').GetName]에서 열린 도시간 경주에서 [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName](이)가 3위를 차지했다. 이 선수가 운전한 차량은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]였다."
 vikelas.524.t: "도시간 경주 종료"
 vikelas.524.d: "[SCOPE.sCountry('vikelas_race_country').GetName]에서 열린 도시간 자동차 경주가 마무리되고 우승자를 가렸다.  [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] 선수가 탑승한 차량은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]이었다. 비록 순위권에 들지는 못했지만, 차량과 레이서 모두 무사히 경기를 마쳤다."
 vikelas.531.t: "Endurance Race"
 vikelas.531.d: "[GetPlayer.GetName] has organized a major endurance race and invited racers from all over the world to take part."
 vikelas.531.f: "The first car races at the beginning of the 20th century were distance races with the greatest possible range. They should test the speed and reliability of the racing cars. While France dominated racing in the early stages, they soon moved on to Grand Prix racing. That didn't change the fact that there were still important international endurance races. The most traditional race was the Targa Florio in Sicily. From 1906 to 1977 it was held mostly in May as an important international event, some with World Cup status. After the Targa Florio, the Thousand Miles (Mille Miglia) was considered a classic among road races (the Carrera Panamericana was added in the 1950s) and the basis for the term 'Gran Turismo' (GT), which describes fast touring sports cars for long-distance racing, such as those developed by Ferrari specifically for the MM."
 vikelas.531.g: "See you at the finish line!"
 vikelas.533.t: "Tire Damage"
 vikelas.533.d: "In the middle of the race, a burst tire leads to a sudden stop for [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]. Despite the incident, the driver remained uninjured and impressed with his level-headed actions, but lost important time."
 vikelas.533.f: "The Mille Miglia of 1931 was characterized by massive tire wear. Before arriving in Rome, Arcangeli had to change a tire nine times. Nuvolari also had several punctures, but he still led Caracciola by two minutes in Rome. On the return journey to the Adriatic, the Alfa Romeos maintained their spirited pace despite the tire problems. In between, Borzacchini led the competition by 18 minutes. Along the Mediterranean coast north, Campari was four minutes ahead of the resurgent Arcangeli. The lead changed several times within the Alfa Romeos and the Italians seemed to have everything under control after two thirds of the race distance. This was also due to a dense network of service stations, which made many tire changes possible. The decision was made in the last 80 kilometers, when heavy rain set in and the Alfa Romeos had accidents with their tires once again worn out."
 vikelas.533.g: "Bad luck."
 vikelas.534.t: "The Railway Crossing"
 vikelas.534.d: "While chasing another driver, a warning sound suddenly sounds: a railway barrier lowers itself in front of both cars. The car in front speeds through. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] must decide whether to stop or risk crossing before the opponent gains too much space."
 vikelas.534.f: "The drivers of the Mille Miglia were prone to daring maneuvers, like Hans Hermann, who competed in 1954, who drove his car under a closing railway barrier, whereby he and his passenger had to duck their heads."
 vikelas.534.g: "Risk it!"
 vikelas.534.h: "This is too foolhardy!"
 vikelas.538.t: "Wolves & Revolvers"
 vikelas.538.d: "On a mountainous night drive, the racing team gets off track. Suddenly there is a howl. A pack of wolves appeared to be hanging around nearby."
 vikelas.538.f: "'We found ourselves in a blizzard, and we were chased by wolves. They were put to flight, however, by shots from the revolver I always kept under the seat cushion, and by the arrival of a group of road gangers armed with torches and guns.' -Enzo Ferrari"
 vikelas.538.g: "Kill the wolves."
 vikelas.538.h: "Drive around the area widely."
 vikelas.538.i: "This discovery is much more important than a stupid race."
 vikelas.539.t: "Racing car drives into spectators!"
 vikelas.539.d: "A terrible accident occurred when a racing car left the track during the race and drove into the crowd. The motorsport world is shaken and the debate about safety standards is flaring up again."
 vikelas.539.f: "Since the first Mille Miglia in 1927, the event had been spared from catastrophic accidents despite the large number of spectators lining the roadsides. That changed on April 3, 1938 at 4:30 p.m. At this point the two Genoese drivers Angelo Mignanego and his co-pilot Dr. Luigi Bruzzo in her Lancia Aprilia along Viale Berti Pichat in Bologna. At a speed of just under 100 km/h, the inexperienced Mignanego lost control of the car on the tram tracks laid there. The Lancia first crashed into a tree and then into a large group of spectators. While the two car occupants were almost uninjured, ten people, including seven children, died in the crash. 26 spectators were injured, some seriously. A 12-year-old girl died in another accident in Stanghella."
 vikelas.539.g: "A black day for racing."
 vikelas.540.t: "New Average Speed Record"
 vikelas.540.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] has achieved an unprecedented average speed in endurance racing. The record will go down as a milestone in the history of motorsport."
 vikelas.540.f: "With breathtaking precision and technical mastery, [GetPlayer.GetCustom('vikelas_race_team_name_type')] achieved an average speed that was previously thought impossible. The record will long be considered the highlight of this golden era of motorsport."
 vikelas.545.t: "Fan Gathering!"
 vikelas.545.d: "During the endurance race between two cities, a cheering crowd gathered to celebrate [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] passing by their city. This event marks the rise of motorsport as a public sensation."
 vikelas.545.f: "The streets were lined with people who crowded together to catch a glimpse of the car speeding by. Children waved flags and adults shouted the name of the rider whose skills and courage inspired them. As the car stopped, a wave of excitement washed over him. Flowers, applause and cheers accompanied the short stop before the driver set off again. It was a moment that ignited a passion for speed and technology in people's hearts - a taste of what motorsport would mean in the decades to come."
 vikelas.545.g: "Racing becomes popular."
 vikelas.541.t: "Endurance Race Ends"
 vikelas.541.d: "[SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] from [SCOPE.sCountry('vikelas_first_winner_scope').GetName] won the prestigious endurance race and also the hearts of the spectators."
 vikelas.541.f: "The last few kilometers were a real spectacle: dust swirled across the track, the engines roared and the excitement was palpable. When the winner finally crossed the finish line, thunderous cheers erupted. His car, covered with the marks of a bitter race, became a symbol of his will to win. Fans carried him on their shoulders as the crowd celebrated the moment. With this triumph, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] becomes one of the most important personalities in the motor sport and his racing team [GetPlayer.GetCustom('vikelas_race_team_name_type')] becomes a highly respected brand."
 vikelas.542.d: "[SCOPE.sCountry('vikelas_endurance_race_country_scope').GetName]"
 vikelas.551.t: "Grand Prix of [GetPlayer.GetName]"
 vikelas.551.d: "The racing season has reached [GetPlayer.GetNameNoFormatting]. Numerous racing drivers and their racing teams have already arrived to prepare for the Grand Prix that our country will soon host."
 vikelas.551.f: "'To race is to live. All the rest is simply waiting.' -Rudolf Carraciola"
 vikelas.551.g: "May the fastest win."
 vikelas.552.t: "Fastest Lap"
 vikelas.552.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] achieved the fastest lap in race training. These are excellent prospects for the actual race."
 vikelas.552.f: "'Even before the start, I was sure of winning.' -Ettore Bugatti"
 vikelas.553.t: "Oil Slick"
 vikelas.553.d: "During the Grand prix race, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] got into the oil slick of an accident vehicle and left the road. Driver and car are able to continue driving, but have lost a lot of time in the current race."
 vikelas.553.f: "'I make cars to go. Not to stop.' -Ettore Bugatti"
 vikelas.553.g: "Oh no!"
 vikelas.554.t: "Rain"
 vikelas.554.d: "The Grand Prix race was surprised by a sudden rain front. Some riders stopped to change their equipment. The question for [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] is whether [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] should complete the race recklessly or slow down to be on the safe side."
 vikelas.554.f: "'Fear nothing. Only believe.' -Armand Peugeot"
 vikelas.554.g: "That doesn't throw a driver off track!"
 vikelas.554.h: "Slow down the pace."
 vikelas.555.t: "Overtaking Maneuver"
 vikelas.555.d: "A unique opportunity arises when [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] gets close to [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName], a racer from [SCOPE.sCountry('vikelas_race_country_scope').GetName]. Should [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] attempt an overtaking maneuver?"
 vikelas.555.f: "'The perfect racing car crosses the finish line first and then falls apart into its individual parts.' -Ferdinand Porsche"
 vikelas.555.g: "Forza!"
 vikelas.555.h: "This is too risky."
 vikelas.556.t: "Overtaking Maneuver succeeds"
 vikelas.556.d: "The overtaking maneuver was a complete success. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] is ahead and has a speed advantage."
 vikelas.556.f: "'When I see an Alfa Romeo go by, I tip my hat.' -Henry Ford"
 vikelas.556.g: "Hooray!"
 vikelas.557.t: "Overtaking Maneuver fails"
 vikelas.557.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] did not succeed in the overtaking maneuver. The opponent defended himself successfully and our racing driver lost a lot of time."
 vikelas.557.f: "'It's hard luck, but it's all in the game. I did my best, and since I've lost out, I'm for the man who picked the prize.' -Ralph DePalma"
 vikelas.557.g: "What a shame."
 vikelas.558.t: "Home Crowd motivates Racer"
 vikelas.558.d: "At the Grand Prix of [GetPlayer.GetNameNoFormatting], [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] is considered a local hero and receives particularly strong support from the audience. This motivates the racing driver enormously!"
 vikelas.558.f: "'No one remembers who took second place and that will never be me.' -Enzo Ferrari"
 vikelas.558.g: "Great!"
 vikelas.559.t: "Auto Race Championship"
 vikelas.559.d: "[SCOPE.sCountry('vikelas_first_winner_scope').GetNameNoFlag] dominated this racing season and won the auto championship."
 vikelas.559.f: "#V End Results#!\n\nFirst Place: [SCOPE.sCountry('vikelas_first_winner_scope').GetName], [SCOPE.GetValue('vikelas_first_winner_points_scope')] Points, [SCOPE.GetValue('vikelas_first_winner_victories_scope')] Victories\nSecond Place: [SCOPE.sCountry('vikelas_second_winner_scope').GetName], [SCOPE.GetValue('vikelas_second_winner_points_scope')] Points, [SCOPE.GetValue('vikelas_second_winner_victories_scope')] Victories\nThird Place: [SCOPE.sCountry('vikelas_third_winner_scope').GetName], [SCOPE.GetValue('vikelas_third_winner_points_scope')] Points, [SCOPE.GetValue('vikelas_third_winner_victories_scope')] Victories\nFourth Place: [SCOPE.sCountry('vikelas_fourth_winner_scope').GetName], [SCOPE.GetValue('vikelas_fourth_winner_points_scope')] Points, [SCOPE.GetValue('vikelas_fourth_winner_victories_scope')] Victories\nFifth Place: [SCOPE.sCountry('vikelas_fifth_winner_scope').GetName], [SCOPE.GetValue('vikelas_fifth_winner_points_scope')] Points, [SCOPE.GetValue('vikelas_fifth_winner_victories_scope')] Victories"
 vikelas.559.g: "Now play Bizet."
 vikelas.559.h: "Not interested in statistics."
 vikelas.559.tt: "Annual Automobile Championship statistics are no longer displayed."
 vikelas.561.t: "Grand Prix of [GetPlayer.GetName] ends"
 vikelas.561.d: "The Grand Prix Race is over and the winners have been chosen. The winner of the [GetPlayer.GetName] Grand Prize is [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName]. The racing event will be remembered by the population for a long time."
 vikelas.561.f: "#V End Results#!\n\nFirst Place: [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] from [SCOPE.sCountry('vikelas_first_winner_scope').GetName]\nSecond Place: [SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName] from [SCOPE.sCountry('vikelas_second_winner_scope').GetName]\nThird Place: [SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName] from [SCOPE.sCountry('vikelas_third_winner_scope').GetName]"
 vikelas.561.g: "Champagne!"
 vikelas.571.t: "The First 24 Hours of Le Mans"
 vikelas.571.d: "In 1923, the first 24 Hours of Le Mans took place, quickly becoming one of the most prestigious events in motorsport, attracting drivers and manufacturers from around the world."
 vikelas.571.f: "On May 26 and 27, 1923, the first 24 Hours of Le Mans was held, organized by the Automobile Club de l'Ouest. The 17.3-kilometer track in the Sarthe region hosted 33 vehicles. The conditions were challenging: rain, muddy roads, and a course that ran through the city of Le Mans and surrounding country roads. Victory went to André Lagache and René Léonard, driving a Chenard & Walcker Sport, covering a distance of 2,209 kilometers in 24 hours. This race marked the beginning of a tradition that continues to celebrate innovation and endurance in motorsport."
 vikelas.571.g: "24 hours? This is crazy!"
 vikelas.572.t: "The Birth of the Targa Florio"
 vikelas.572.d: "In 1906, the Targa Florio was created, a spectacular race held on the winding roads of Sicily. Organized by Vincenzo Florio, it brought the region into the center of the motorsport world."
 vikelas.572.f: "On May 6, 1906, the first Targa Florio took place, a long-distance race that turned the steep mountain roads and picturesque villages of Sicily into a challenging racecourse. Organized by Vincenzo Florio, a motorsport enthusiast, the event fulfilled his vision of a sporting challenge. The track spanned 446 kilometers, divided into three laps of 148 kilometers each. Victory went to Alessandro Cagno, driving an Itala, who crossed the finish line with an average speed of 46.8 km/h. The Targa Florio quickly became a symbol of courage, skill, and the passion for speed."
 vikelas.572.g: "The Targa Florio Establishes a Tradition"
 vikelas.573.t: "The First Semmering Berg-Rennen"
 vikelas.573.d: "In 1899, the first hill climb at Semmering was held, testing the limits of early automobile engineering and driving skill. This event marked an important milestone in the history of motorsport."
 vikelas.573.f: "On August 27, 1899, the first Semmering Hill Climb was held, organized by the Austrian Automobile Club. The 9.8-kilometer route, running from Klamm am Semmering to the mountain pass, pushed the early automobiles and their drivers to the limit. With inclines of up to 7% and sharp curves, the race was a test of both technology and courage. Victory went to Count Jenő Zichy, driving a Mors automobile, who completed the course with an average speed of 22.2 km/h. The race attracted a large audience and laid the foundation for the tradition of hill climbing in Europe."
 vikelas.573.g: "The hill climb enthralls the masses."
 vikelas.581.t: "신형 차량 엔진"
 vikelas.581.d_level_2: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName](이)가 경주용 차량의 엔진을 개량하였다. 지금부터 선보일 최신형 차량은 #V 6기통 엔진#!이 탑재된다. 신형 차량의 명칭은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]이다."
 vikelas.581.d_level_3: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName](이)가 경주용 차량의 엔진을 개량하였다. 지금부터 선보일 최신형 차량은 #V 4기통 압축 엔진#!이 탑재된다. 신형 차량의 명칭은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]이다."
 vikelas.581.d_level_4: "four-cylinder compressor engine[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName](이)가 경주용 차량의 엔진을 개량하였다. 지금부터 선보일 최신형 차량은 #V 8기통 압축 엔진#!이 탑재된다. 신형 차량의 명칭은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]이다."
 vikelas.581.f: "\"나는 엔진을 만들고 거기에 바퀴를 붙일 뿐이다.\" - 엔초 페라리"
 vikelas.581.g: "가자!"
 vikelas_new_engine_tt: "현재 엔진이 개량됩니다."
 vikelas.582.t: "신형 차량 안전 설비"
 vikelas.582.d_level_2: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName](이)가 경주용 차량의 안전 설비를 개량하였다. 지금부터 선보일 안전 설비는 #V 백미러#!다. 신형 차량의 명칭은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]이다."
 vikelas.582.d_level_3: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName](이)가 경주용 차량의 안전 설비를 개량하였다. 지금부터 선보일 안전 설비는 #V 유압 브레이크#!다. 신형 차량의 명칭은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]이다."
 vikelas.582.d_level_4: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName](이)가 경주용 차량의 안전 설비를 개량하였다. 지금부터 선보일 안전 설비는 #V 현대식 타이어#!다. 신형 차량의 명칭은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]이다."
 vikelas.582.f: "\"먼저 들어오려면 먼저 완주해야 한다.\" - 후안 마누엘 판히오"
 vikelas_new_safety_tt: "현재 안전 설정이 개선됩니다."
 vikelas.583.t: "신형 차체"
 vikelas.583.d_level_2: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName](이)가 경주용 차량의 차체를 개량하였다. 지금부터 선보일 차체는 #V 어뢰형 차체#!다. 신형 차량의 명칭은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]이다."
 vikelas.583.d_level_3: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName](이)가 경주용 차량의 차체를 개량하였다. 지금부터 선보일 차체는 #V 압연 철판 차체#!다. 신형 차량의 명칭은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]이다."
 vikelas.583.d_level_4: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName](이)가 경주용 차량의 차체를 개량하였다. 지금부터 선보일 차체는 #V 유선형 차체#!다. 신형 차량의 명칭은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]이다."
 vikelas.583.f: "\"세컨드카를 만든 지 5분 만에 자동차 경주가 시작됐다.\" - 헨리 포드"
 vikelas_new_body_tt: "현재 차체가 개량됩니다."
 vikelas.584.t: "The V Engine"
 vikelas.584.d: "Our engineer Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] made a groundbreaking proposal as to what a new engine for racing could look like and contacted the mechanic [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName]."
 vikelas.584.f: "A V engine is a type of reciprocating piston engine with several cylinders. These are divided into two banks of cylinders that are at an angle to each other. V engines are widely used, especially with a higher number of cylinders and limited installation space. The compact design saves material and therefore weight. The first V engine, a two-cylinder V-twin, was designed by Wilhelm Maybach and used in the 1889 Daimler Stahlradwagen automobile. The first V8 engine was produced in 1903, in the form of the Antoinette engine designed by Léon Levavasseur for racing boats and airplanes."
 vikelas.584.g: "Heureka!"
 vikelas.585.t: "연료 개량"
 vikelas.585.d: "우리 화학자 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 내연기관용 연료를 한층 더 개량하여 경주용 차량의 효율성과 성능을 늘리는 핵심적인 역할을 할 수 있도록 하였다. [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName](은)는 시험 주행에서 큰 관심을 표했다."
 vikelas.585.f: "The first decades of gasoline fuels were extremely changeable. Many companies tended to stretch the fuel or mix it with other pure fuels. Nikolaus August Otto already used rectified alcohol. In some countries, the scarcity of petroleum led to the development of alternatives - or to make the amount of fuel available more efficient. In racing, improved fuels and lubricating oils used to ensure that driving performance was optimized."
 vikelas.585.g: "Heureka!"
 vikelas.586.t: "Aerodynamic Forces"
 vikelas.586.d: "Our physicist Dr. [ROOT.Var('curie_physicistvar').GetCharacter.GetLastName] has described some calculations on aerodynamic forces that could be useful for vehicle construction. Car mechanic [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] received a copy of the paper."
 vikelas.586.f: "'Aerodynamics are for people who can't build engines.' -Enzo Ferrari"
 vikelas.586.g: "Heureka!"
 vikelas.590.t: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] is now a Famous Racer!"
 vikelas.590.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] won races around the world and is famous for his racing style. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] is now famous enough to be considered a Famous Racer!"
 vikelas.590.f: ""
 vikelas.590.g: "A living legend!"
 vikelas.591.t: "Our Car Racer, [SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullNameNoFormatting], retires"
 vikelas.591.d: "수십 년 간 전 세계를 돌며 자동차 레이스에 인생을 바쳐왔던 [SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullName](이)가 은퇴를 결심했다. [SCOPE.sCharacter('vikelas_retired_racer_scope').GetSheHe]는 이제 더 이상 [concept_vikelas_racer]로 활동하지 않게 되었다."
 vikelas.591.g: "[SCOPE.sCharacter('vikelas_retired_racer_scope').GetSheHe|U] earned [SCOPE.sCharacter('vikelas_retired_racer_scope').GetHerHis] retirement!"
 vikelas.591.h: "He would make a great engineer!"
 vikelas.591.new_racer_replace_tt: "[SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullName](이)가 은퇴하고 [SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName](이)가 [GetPlayer.GetName]의 신임 [concept_vikelas_racer]로 임명됩니다."
 vikelas.591.racer_to_engineer_tt: "[SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullName](이)가 당신의 신임 [concept_tesla_engineer]로 임명됩니다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_replacement_engineer_custom_loc')]"
 vikelas.591.new_racer_tt: "[SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName](이)가 [GetPlayer.GetName]의 신임 [concept_vikelas_racer]로 임명됩니다."
 vikelas.592.t: "[concept_vikelas_racer] 사망"
 vikelas.592.d: "수년간 [concept_vikelas_racer]로 활동해 온 우리나라에서 가장 유명한 카레이서가 세상을 떠났다. 이토록 눈부신 재능을 대신할 사람은 과연 누구인가?"
 vikelas.592.g: "This is a huge loss!"
 vikelas.592_tt: "간혹 게임 내 인물이 사망하기도 합니다. 모드에서도 이를 막을 수는 없습니다. 본 이벤트는 해당 [concept_character]이 맡은 역할을 게임에서 제거하여, 그들의 유령에 시달리지 않도록 합니다."
 vikelas.593.t: "Fatal Car Accident"
 vikelas.593.d: "Racing driver [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] pushed his luck too far. [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U] left the road at too high a speed and suffered a fatal accident."
 vikelas.593.f: "'Racing is a great mania to which one must sacrifice everything, without reticence, without hesitation.' -Enzo Ferrari"
 vikelas.593.g: "Next one!"
 vikelas.594.t: "Car Breakdown"
 vikelas.594.d: "Unfortunately, racer [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] had to give up before the race was over. The car broke down, [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe] claims."
 vikelas.594.f: "'Bad luck does not exist.' -Enzo Ferrari"
 vikelas.594.g: "Was it the car, or did the driver overstimulate the engine?"
 vikelas.595.t: "신규 레이서"
 vikelas.595.d: "새로운 [concept_vikelas_racer]가 인사를 나누러 왔다. [SCOPE.sCharacter('vikelas_new_racer_scope').GetHerHis|U]의 이름은 [SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName]이다."
 vikelas.595.g: "[SCOPE.sCharacter('vikelas_new_racer_scope').GetSheHe]에게 운이 더 따르기를 바라겠소."
 vikelas.596.t: "신규 정비사"
 vikelas.596.d: "새로운 [concept_vikelas_mechanic]가 본인 소개에 나섰다. [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetHerHis|U] 이름은 [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetFullName]이며, 특화 분야는..."
 vikelas_autoracing_found_automobile_club_button: "자동차 경주단 설립"
 vikelas_autoracing_found_automobile_club_button_desc: "자동차 경주단 설립은 모터스포츠에 필수적인 다른 시설을 건립하는 데 첫걸음으로 작용합니다."
 vikelas_autoracing_long_distance_button: "내구 레이스 개최"
 vikelas_autoracing_long_distance_button_desc: "도시간 경주의 형태로 진행되는 경우가 많은 내구 레이스는 초창기 자동차 경주의 표준이자 20세기 중반까지 지속되었습니다. 이탈리아에서는 타르가 플로리오나 밀레 밀리아 같은 레이스가 대표적인 사례로 남아 있습니다. 인간과 기계가 특별한 시험대에 오르는 내구 레이스는 오랫동안 진정한 국가대항전 성격의 자동차 경주로 여겨졌습니다."
 vikelas_autoracing_found_grand_prix_button: "Found Grand Prix Racing"
 vikelas_autoracing_found_grand_prix_button_desc: "In 1906, the first official Grand Prix in automotive history was organized with the race for the Grand Prix de l'ACF. Regardless of the country of origin, up to three racing cars per automobile manufacturer were approved, as originally requested by the representatives of the French industry. In keeping with its status as the most important of all competitions, the race was held over a distance of over 1200 km and on two consecutive days. In 1925, at the instigation of the Automobile Club of Italy, the introduction of an official world championship was finally announced. The three official Grand Prix races of the season (France, Italy and Belgium) were designated as races, as well as Indianapolis as the most important American racing event."
 vikelas_autoracing_race_track_button: "Build a Race Track"
 vikelas_autoracing_race_track_button_desc: "With the Grand Prix races, the fixed race track is increasingly becoming the norm for car racing. A dedicated race track would not only centralize international racing events in one location, but as a test track it would also give our racing drivers an experience bonus every year."
