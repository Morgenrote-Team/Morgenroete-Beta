 vikelas.21.h: "헌데 그런 경기에 누가 관심이나 갖겠소?"
 vikelas.31.t: "목초지의 시합에서 미국의 여가 활동으로"
 vikelas.31.d: "[SCOPE.sState('vikelas_baseball_state').GetName]에서 미국의 정신을 대변하는 새로운 운동이 인기 있는 종목으로 거듭났다."
 vikelas.31.f: "1840년대 들어 야구는 그 시초 격인 종목의 그늘에서 벗어나 독자적인 형태를 갖추기 시작했다. 미국에서는 급속한 도시화가 이루어지고 있었고, 성장하는 도시들은 신국가의 정신을 반영하며 공동체 의식을 함양할 수 있는 여가 활동을 찾고 있었다. 1845년 뉴욕의 니커보커 야구단의 알렉산더 카트라이트와 선수들이 야구 최초의 표준 규정을 제정하면서 중대한 전환점을 맞이하였다. 일명 '니커보커 규정'이라 부르는 이 규정집은 다이아몬드형 구장에 베이스 4개, 1이닝 3아웃, 팀당 선수 9인 구성 등을 다루고 있으며, 현대 야구의 기반을 마련하였다는 점에서 의의가 있다. 당시까지 잔디밭이나 들판에서 치러지던 비공식적인 야구와는 확연히 다른 형태였던 것이다. 1846년 6월 19일, 니커보커 야구단은 미국 뉴저지주 호보켄에서 본 규정에 따라 최초의 공식 경기를 치렀다. 경기 결과는 상대팀인 뉴욕 라인의 승리로 끝났지만, 조직화된 야구의 탄생을 알렸다는 점에서 높이 평가받고 있다."
 vikelas.31.g: "홈런!"
 vikelas.41.t: "근대 축구의 시작"
 vikelas.41.d: "[SCOPE.sState('vikelas_football_state').GetName]의 축구단들이 구기 종목의 상충되는 여러 규정들을 조정하고 공동 대회를 주최하기 위하여 새로운 축구 규정집을 제시하였다."
 vikelas.41.f: "19세기 초 잉글랜드에서 축구는 통일된 종목이 아니라 마을과 도시, 학교에서 벌어지는 다양한 구기종목을 아우르는 말이었다. 이러한 종목들은 규칙이 제각기 달랐으며 규정 마련을 향한 첫번째 시도는 1848년 케임브리지 규정이 제정되면서부터였다. 이는 이름 그대로 케임브리지대 재학생들을 위한 통일된 규칙을 마련하려는 시도였으며, 최종본은 아니었지만 이후의 발전을 위한 토대를 마련하였다. 1863년 10월 26일 11개 축구단이 런던 프리메이슨 태번에 모여 축구협회(Football Association, FA)를 창설하면서부터 진정한 발전이 이루어졌다. 발로만 공을 다룰 것과 공을 들고 뛰거나 던지는 것을 금하는 규칙이 협회 출범 이래 몇 주 만에 합의를 거쳐 제정되었다. 이는 럭비 팬들의 반발을 샀고, 이후 럭비라는 종목으로 분화되어 자신들만의 규칙을 제정하기에 이르렀다. 축구협회의 창설과 함꼐 현대 축구가 탄생한 셈이다."
 vikelas.41.g: "골!"
 vikelas.51.t: "복숭아 바구니로 치르는 경기"
 vikelas.51.d: "[SCOPE.sState('vikelas_basketball_state').GetName] 지역의 체육관에서 새로운 체육 종목이 등장했다. 언젠가 전 세계의 체육관과 경기장에 울려퍼질지도 모를 그런 경기 종목이다."
 vikelas.51.f: "\"발로 차지 않는다. 공을 들고 뛰지 않는다. 복숭아 마구니 두 개를 걸어다 못 박아 둔다.\"\n\n[TimeKeeper.GetCurrentDate.Format('y')]년 [SCOPE.sState('vikelas_basketball_state').GetFarmHubName]의 어느 학교에서 [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] 박사는 겨울에 실내에서 가만히 있지 못하는 학생들에게 어떤 활동을 시킬 것인가 하는 문제에 직면하였다. 박사의 해결책은 간단했지만, 사뭇 달랐다. 축구공, 높이 매단 두 개의 복숭아 바구니, 그리고 열세 가지 규칙.\n아이들은 처음에 이상하게 생각했다. 몸싸움도, 드리블도 금지라니. 그저 조심스러운 패스와 함께 포물선을 그리며 던지기만 하는 규칙이었다. 하지만 왠지 모르게 아이들은 이 규칙에 익숙해졌다. 농구는 다른 학교로, 그리고 다른 도시로 퍼져나갔다. 10년도 채 안 되어 뉴욕에서 도쿄까지, 전세계의 체육관은 농구공 튀기는 소리와 \"들어간다!\" 하는 함성으로 가득찼다.\n추운 날씨에 즐기는 단순한 오락으로 시작된 농구는 그 이상의 의미를 가지게 되었다. 빠르게 진행되면서 팀워크를 중시하고, 현대적인 생활방식에 적합하고, 무엇보다 [ROOT.GetCountry.GetAdjectiveNoFormatting]에서 탄생한 것이기 때문이다."
 vikelas.51.g: "각 학교와 체육관에 보급하자."
 vikelas.302.h: "뭐가 그렇게 재미있다는 건지 모르겠군."
 vikelas.303.h: "이렇게 지루한 경기도 다 있군."
 vikelas.311.g: "이제는 경기 결과를 절대 놓치지 않겠다!"
 vikelas.312.t: "스포츠 라디오"
 vikelas.312.d: "[SCOPE.sState('vikelas_radio_state').GetName]의 라디오 제조업체가 체육 경기의 라디오 방송에 주력하는 제품을 홍보하고 있다. [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] 경기를 단 한번도 놓치지 않으려는 사람들의 욕구가 이 공장으로 하여금 생산품 최적화로 이어졌던 것이다."
 vikelas.312.f: "라디오는 체육 경기의 새로운 보도 매체로 제격이었다. 경기의 박진감 넘치는 순간을 생중계하고, 관중의 함성을 전달하며, 해설자의 목소리를 청중의 심장 박동에 맞춰 전할 수 있었기 때문이다. 미국에서는 1921년 8월 5일 피츠버그의 KDKA 방송국이 피츠버그 파이러츠와 필라델피아 필리스의 야구 경기를 생중계하면서 그 역사가 시작되었다. 해설자 해롤드 알린은 취재석에 앉아 간단한 마이크 하나로 마치 친구와 이야기를 나누듯 모든 경기 상황을 생생하게 전달했다. 새로운 기기에 푹 빠진 청취자들은 체육 경기가 거실을 점령한 듯한 느낌을 받았다. 유럽에서도 BBC가 그 시도를 뒤따랐다. 1927년 1월 11일, BBC는 테디 웨이클럼의 해설과 함께 아스널과 셰필드 유나이티드의 축구 경기를 최초로 생중계했던 것이다."
 vikelas.312.g: "꼭 눈앞에 생생하게 그려지는군!"
 vikelas.318.t: "[GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] 협회"
 vikelas.318.g: "국가 [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] 협회를 창설하세!"
 vikelas.318.f: "편입된 본토 주의 35%에서 크리켓, 야구, 축구, 농구 중 한 종목의 클럽을 보유하고 있다면 해당 종목의 협회가 창설됩니다. 협회는 리그 경기와 챔피언십 결승전을 개최할 수 있는 기반이 됩니다. 단, 한 국가에 최소 두 개 이상의 클럽이 있어야 개최가 가능합니다. 축구 협회는 FIFA 월드컵 참가의 필수 조건입니다."
 vikelas.318.d: "[GetPlayer.GetNameNoFormatting] 전역에서 [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName](이)가 인기 체육 종목으로 떠올랐다. 체육단 문화의 활성화를 바탕으로 이제 [ROOT.GetCountry.GetCapital.GetCityHubName]에 전국 협회가 설립되기에 이르렀다."
 vikelas.321.g: "홈런!"
 vikelas.322.t: "야구 카드"
 vikelas.322.d: "우리나라의 한 유명 기업이 홍보 목적으로 야구 카드를 인쇄 제작하였는데, 그 이후로 야구 카드 수집 열풍이 불고 있다."
 vikelas.322.f: "야구 트레이딩 카드의 역사는 야구가 특정 지역의 여가 활동에서 미국의 국민 종목으로 거듭나던 시절로 거슬러 올라간다. 1860년대 초 전미 야구선수 협회(NABBP)가 최초의 야구단을 창설하면서 선수들의 초상화가 스튜디오 사진의 형태로 소개되었다. 이른바 캐비닛 카드, 트레이드 카드로 불린 이 카드들은 사진 스튜디오에서 제작되어 부유한 팬들이 수집되었으나, 시리즈의 개념은 아직 없었다. 현대적인 의미의 트레이딩 카드가 등장한 것은 1880년대로 거슬러 올라간다. 당시 담배 제조사에서 담배갑에 조그만 판지 그림을 넣는 발상을 떠올렸다. 처음에는 단순히 담배갑을 고정하는 용도로 쓰였지만, 기업들은 머지않아 그로 인한 홍보 효과를 인식하게 되었다. 뉴욕의 굿윈 앤 컴퍼니는 1887년~1890년 '올드 저지 시리즈'를 발매하며 이 시기의 선구자로 평가받고 있다. 올드 저지 시리즈는 얇은 판지에 선수들의 흑백사진을 인쇄하여 제작되었으며, 야구팬들에게 자신이 좋아하는 선수의 카드 시리즈를 전부 모을 수 있는 기회를 처음 제공하였다."
 vikelas.322.g: "스크랩북은 언제 출시되려나?"
 vikelas.331.t: "라이벌 축구단 창설"
 vikelas.331.d: "이웃 지역의 축구단에 불만을 품은 [SCOPE.sState('vikelas_football_club_state_scope').GetName]의 노동자들이 힘을 합쳐 자신들만의 축구단을 결성하였는데 그 이름이 [SCOPE.sState('vikelas_football_club_state_scope').GetCustom('vikelas_historical_football_club_names_type')](이)라고 한다. 아무래도 두 축구단 사이에 적대감이 있는 것으로 보인다."
 vikelas.331.f: "상당수의 체육단은 다른 체육단과의 분열이나 불만 여론으로부터 탄생하였다. 이를테면 인터밀란은 밀라노 크리켓 축구 클럽(현 AC 밀란)에 불만을 품은 몇몇 다국적 선수들이 밀라노의 한 식당인 '리스토란테 오롤로조'에서 창단하면서 출발하였다. 정식 명칭은 '밀라노 국제 축구단'이었던 이 축구단은 오직 이탈리아인 선수만 뛸 수 있엇던 민족주의 성향의 밀란 CFC에서 분리된 것이었다."
 vikelas.331.g: "라이벌 구도가 세워질 조짐인가?"
 vikelas.332.t: "축구 라이벌전"
 vikelas.332.d: "[SCOPE.sState('vikelas_rival_state_1_scope').GetName]의 [SCOPE.sState('vikelas_rival_state_1_scope').GetCustom('vikelas_historical_football_club_names_type')] 축구단과 [SCOPE.sState('vikelas_rival_state_2_scope').GetName]의 [SCOPE.sState('vikelas_rival_state_2_scope').GetCustom('vikelas_historical_football_club_names_type')] 축구단이 오늘 리그 경기를 치른다. 올해 우승팀을 결정지을 수도 있는 이번 경기에서, 두 팀 모두 서로를 라이벌로 여기며 우승을 염원하고 있기에 긴장감이 고조될 것으로 전망된다."
 vikelas.332.f: "킥오프, 스로인, 싸움 좀 해 보자\n낮게 깔고, 잘 끌고 가, 브라보, 이기든 죽든\n공 잡아, 시티!\n뺏길까 신경 쓰지 마,\n침착해, 지금이 기회야\n만세, 골 넣었다\n - 앨버트 T. 스미스"
 vikelas.332.g: "[SCOPE.sState('vikelas_rival_state_1_scope').GetName] 팀을 응원하겠어!"
 vikelas.332.h: "[SCOPE.sState('vikelas_rival_state_2_scope').GetName] 팀이 더 잘 해!"
 vikelas.333.t: "축구 극성팬"
 vikelas.333.d: "[GetPlayer.GetAdjective] 챔피언을 놓고 벌어진 축구 경기가 폭력적인 축구 팬들의 난동으로 빛이 바랬다. 이들은 경기 결과에 불만을 품고 상대팀과 심판, [ROOT.Var('vikelas_rival_state_var').GetState.GetName]의 상가를 공격하며 큰 혼란을 빚었다. 다행히도 사망자는 나오지 않았다."
 vikelas.333.f: "\"어디 있냐, 겁보 심판아! 너 때문에 졌잖아! 저기 있다! 잡아라 얘들아!\""
 vikelas.333.g: "난장판이 따로 없군!"
 vikelas.334.t: "축구 챔피언 탄생!"
 vikelas.334.d: "치열한 접전 끝에 [ROOT.Var('vikelas_rival_state_var').GetState.GetName] 팀이 승리를 거두며 [GetPlayer.GetAdjective] 새로운 챔피언이 탄생했다. [ROOT.Var('vikelas_rival_state_var').GetState.GetNameNoFormatting] 시민들은 자기 팀의 승리를 축하하러 나섰다."
 vikelas.334.f: "\"올레! 올레! 올레! 올레--! 올레--! 올레--!\""
 vikelas.334.g: "우리는 챔피언이다!"
 vikelas.391.t: "국기 종목 채택"
 vikelas.391.d: "[GetPlayer.GetNameNoFormatting]의 국기 종목으로 무엇을 채택할까?"
 vikelas.391.f: "\"호르누센이라는 이 종목 들어보셨습니까? 정말 재밌답니다.\""
 vikelas.391.g: "크리켓."
 vikelas.391.h: "야구."
 vikelas.391.i: "축구."
 vikelas.391.j: "농구."
 vikelas.391.k: "그만두겠다."
 vikelas.392.t: "국기 종목 변경"
 vikelas.392.d: "[GetPlayer.GetNameNoFormatting]의 국기 종목을 무엇으로 바꿀까?"
 vikelas.392.f: "\"[ROOT.GetCountry.MakeScope.Var('vikelas_national_sport_var').GetFlagName](은)는 너무 지루하오. 치즈 굴리기 경기는 어떻소?\""
 vikelas.393.t: "새로운 국기 종목"
 vikelas.393.d: "[SCOPE.sCountry('vikelas_overlord_country_scope').GetName]의 사절단이 우리 정부에 자국의 국기 종목을 도입할 것을 제안하였다. 이어서 그 계획을 실현하기 위한 감독을 파견하기로 했다."
 vikelas.393.f: "\"놀이란 휴식과도 같다. 끊임없이 일할 수는 없으니 사람에겐 휴식이 필요하다.\" - 아리스토텔레스"
 vikelas.393.g: "다음은 내가 치겠네!"
 vikelas.393.h: "홈런!"
 vikelas.393.i: "골!"
 vikelas.393.j: "덜커덩!"
 vikelas.394.t: "공통의 체육 종목"
 vikelas.394.d: "[ROOT.GetCountry.MakeScope.Var('vikelas_national_sport_var').GetFlagName](을)를 국가 통합과 이념 요소로 바라보는 우리나라 국민들이 점점 더 많아지는 가운데 국제 관계에서도 그와 다르지 않다. 국기 종목을 공유한다는 것은 [GetPlayer.GetNameNoFormatting]에서 지배국인 [SCOPE.sCountry('vikelas_overlord_country_scope').GetName](와)과 단순한 권력 관계를 넘어서 더 많은 공통점을 가지고 있다는 느낌을 선사하고 있다."
 vikelas.394.f: "종주국과 종속국이 동일한 국기 종목을 보유하였다면 독립 욕구가 감소합니다."
 vikelas.394.g: "공통의 체육은 공통의 관심이다."
 vikelas.395.t: "연방권 [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] 선수권 대회"
 vikelas.395.d: "연방권 [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] 선수권 대회에 참여하기 위해 모든 동맹국과 우방국에서 찾아온 관객과 선수단이 모여들었다. 이번 대회는 [ROOT.GetCountry.GetAdjectiveNoFormatting]의 영향권이 정치를 넘어서 문화적으로도 함께 성장하고 있음을 보여주는 신호다."
 vikelas.395.f: "19세기 말 영국과 다른 대영제국 소속 국가와의 시범 경기 시즌이 일종의 토너먼트 성격을 띈 방식으로 치러졌다. 1909년 국제 크리켓 회의(ICC의 창설은 대영제국의 크리켓 강국들 간에 공식적인 교류가 이루어지는 토대를 마련하였다. 초대 회원국으로는 잉글랜드, 오스트레일리아, 남아프리카가 있었고, 이후 인도와 뉴질랜드, 서인도 제도가 합류하였다.\n\n한편 잉글랜드, 스코틀랜드, 웨일스, 북아일랜드의 4대 구성국 간에 진행되는 영국 국내 선수권 대회도 매년 개최되었다. 이는 국제 정기 축구 대회로는 가장 오래된 대회였으며, 축구에서 영국의 패권을 상징하는 대회로도 여겨졌다.\n\n대영제국 전체를 포괄하는 엠파이어 컵의 구상은 완전히 실현되지 못했지만, 여러 차례 시도된 바 있으며 그에 근접한 대회 시즌 또한 존재하였다."
 vikelas.395.g: "대회 개막을 선언한다!"
 vikelas.396.t: "연방권 [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] 선수권 대회 우승!"
 vikelas.396.d: "결정전에서 우리나라가 상대국으로 나선 [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] 팀을 물리치고 연방권 [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] 선수권 대회에서 우승하였다!"
 vikelas.396.f: "[SCOPE.sCharacter('vikelas_morlock_scope').GetFullNameNoFormatting]에게 전해진 [SCOPE.sCharacter('vikelas_schaefer_scope').GetFullNameNoFormatting]의 패스가 [SCOPE.sCountry('vikelas_second_winner_team_scope').GetNameNoFormatting]에게 막히고, 항상 [SCOPE.sCharacter('vikelas_bozsik_scope').GetFullNameNoFormatting]이었던 [SCOPE.sCountry('vikelas_second_winner_team_scope').GetAdjectiveNoFormatting] 우측 공격수 [SCOPE.sCharacter('vikelas_bozsik_scope').GetFullNameNoFormatting] 선수가 공을 잡습니다. 공을 잡았지만 [SCOPE.sCharacter('vikelas_schaefer_scope').GetFullNameNoFormatting]에게 기회를 놓치고 맙니다. [SCOPE.sCharacter('vikelas_schaefer_scope').GetFullNameNoFormatting] 선수가 안쪽으로 크로스를 올립니다. 헤더- 막혔군요. [SCOPE.sCharacter('vikelas_rahn_scope').GetFullNameNoFormatting] 선수가 다시 뒤에서 슛을 날리는데요, [SCOPE.sCharacter('vikelas_rahn_scope').GetFullNameNoFormatting] 선수의 슛- 골! 고올! 고오오올입니다! 고오오올!"
 vikelas.396.g: "우승 트로피는 [GetPlayer.GetNameNoFormatting]에!"
 vikelas.397.t: "연방권 [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] 선수권 대회 종료"
 vikelas.397.d: "연방권 [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] 선수권 대회가 끝이 났다. [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] 팀은 결승전에서 [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName]에 패했다. 동맹국과 우호국에서 온 선수단과 관중들은 모두 자국으로 돌아갔다. [GetPlayer.GetNameNoFormatting] 팀은 개최국이자 주최국으로서 사람들의 기억 속에 훌륭한 모습으로 영원히 남을 것이다."
 vikelas.397.f: "\"어찌 보면 우리는 권리를 빼앗긴 속국이나 총알받이, 지배국의 이득을 위해 이용당하는 국가들의 단순한 모임이 아니라... 하나의 가족일지도 모른다.\""
 vikelas.397.g: "각 나라마다 서로를 이해하는 데 도움이 되었군."
 vikelas.403.d: "오늘 FIFA는 [SCOPE.sState('vikelas_fifa_state').GetStateRegion.GetCityHubName]에서 회담을 개최하고 새로운 이사회 참여국을 선정하였다."
