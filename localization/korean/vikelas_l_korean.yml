 vikelas.100.t: "올림픽의 꿈"
 vikelas.100.d: "[SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName](은)는 고대 올림픽을 근대적인 면모로 되살리려 한다. 국제 체육 대회를 4년에 한번씩 개최하게 되는 것이다."
 vikelas.100.f: "올림픽의 이상은 건강한 신체에 건강한 정신이 깃든다는 고대의 이상에서 영감을 받으며 점차 발전해 왔다. 그러한 발전에는 고고학도 한몫하였는데, 19세기 말 에른스트 쿠르티우스가 올림피아를 발굴하면서 올림픽에 대한 관심이 다시금 높아졌다. 여기에 진화론에 기반한 '적자생존'이라는 사회적 이념과, 공장 노동 시대에는 신체 활동이 필수적이라는 인식이 더해졌다. 국제적인 행사로서 근대 올림픽은 국가적 이기심을 초월하여 세계 평화에 기여해야 한다. '더 빨리, 더 높이, 더 강하게(Citius, altius, fortius)'라는 표어처럼, 기록 경신을 위한 분투는 사회적 경계를 뛰어넘는 진보를 상징한다."
 vikelas.100.g: "국제올림픽위원회를 창설하자."
 vikelas.102.t: "국제올림픽위원회"
 vikelas.102.d: "올림픽 대회의 활성화를 위해 [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]에서 고대 올림픽의 근대적 행사를 조직하고 지속하는 국제올림픽위원회 (IOC)가 창설되었다."
 vikelas.102.f: "최초의 국제올림픽위원회는 [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]의 측근들이 주를 이루었다. 이들은 소모임을 형성하며 퍼져나갔고, 이후 다른 IOC 위원들이 합류하면서, 뜻을 같이하는 사람들의 모임이 국제적인 조직으로 변모하게 되었다."
 vikelas.102.g: "국가와 세계 체육을 위한 한 걸음이로다."
 vikelas.103.t: "올림픽 대회: 그리스의 것?"
 vikelas.103.d: "국제올림픽위원회가 창설되자, 올림픽을 그리스에서만 개최할 것인지 아니면 4년마다 다른 장소에서 개최할 것인지에 대한 의문이 제기되었다."
 vikelas.103.f: "세계 각국 대표들은 올림픽이 국제적인 행사로 개최되기를 바랐다. 4년마다 개최지를 순환하여야 하며, 개최지의 결정은 이사회에서 맡아야 한다는 것이었다. 그러나 그리스에서 올림픽의 부활이 이루어지게 되면서 이러한 입장은 논란의 여지가 생겼다. 결국 [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName] 위원장은 개최지 문제를 '우리의 대회니 우리가 좌우한다'라는 간단한 공식으로 요약했다. 이는 이사회의 권한을 오로지 명예에만 의존하게 만들고, 그 권한을 심각하게 제한하는 결과를 초래할 것이다."
 vikelas.103.g: "올림픽 대회는 그리스의 것이다."
 vikelas.103.h: "올림픽 대회는 전 세계 모두의 것이다."
 vikelas.104.t: "국제올림픽위원회"
 vikelas.104.d: "올림픽 대회의 활성화를 위해 [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]에서 고대 올림픽의 근대적 행사를 조직하고 지속하는 국제올림픽위원회 (IOC)가 창설되었다. 올림픽 대회는 4년마다 그리스에서 개최될 예정이다."
 vikelas.104.f: "최초의 국제올림픽위원회는 [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]의 측근들이 주를 이루었다. 이들은 소모임을 형성하며 퍼져나갔고, 이후 다른 IOC 위원들이 합류하면서, 뜻을 같이하는 사람들의 모임이 국제적인 조직으로 변모하게 되었다. 원래 세계 각국 대표들은 올림픽을 국제적인 행사로 개최하기를 바랐다. 그러나 그리스의 영향력이 강했던 탓에 IOC는 개최지 순환 원칙을 포기해야 했다. 이에 따라 올림픽은 4년마다 그리스에서 개최된다."
 vikelas.104.g: "그들의 대회니 그들의 법대로..."
 vikelas.105.t: "올림픽의 부활"
 vikelas.105.d: "국제올림픽위원회 (IOC)는 총회를 열고 제1회 근대 올림픽을 그리스에서 개최하기로 결정하였다."
 vikelas.105.f: "국제올림픽위원회 (IOC)의 첫 번째 과제 중 하나는 새로운 올림픽 개최지를 결정하는 것이었다. 고대의 사례를 참고하여, IOC는 최초의 올림픽 개최지였던 그리스를 기념하는 의미에서 그리스에서 대회를 개최한다는 결정을 만장일치로 채택했다. 이후 올림픽은 4년 주기로 다른 국가에서 개최할 예정이다. 개최지는 4년 주기로 소집되는 IOC 이사회에서 선정된다."
 vikelas.105.g: "정말 기대되는군!"
 vikelas.106.t: "제[GetGlobalVariable('vikelas_olympic_games_number_global_var').GetValue]회 올림픽 대회 개막"
 vikelas.106.d: "제1회 근대 올림픽이 개막했다! 전세계 각국이 그리스로 모여들었다. 총 #BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]개국#!에서 온 선수들이 이번 국제 대회에 출전하게 되었다."
 vikelas.106.f: "서기 393년 로마 황제 테오도시우스 1세가 이교도 숭배를 이유로 고대 올림픽을 금지한 이래, [TimeKeeper.GetCurrentDate.Format('wy')]년 근대 올림픽이 처음으로 열리게 되었다. 비록 당시 기준으로도 최고 수준의 체육적 성과는 거의 나오지 않았지만, 대회 자체는 전반적으로 큰 성공을 거둔 것으로 평가받으며 올림픽이 영구적으로 자리 잡는 데 중요한 역할을 하였다."
 vikelas.106.g: "올림픽이 돌아왔구나!"
 vikelas.107.g: "더 빨리 더 높이 더 멀리!"
 vikelas.108.t: "제[GetGlobalVariable('vikelas_olympic_games_number_global_var').GetValue]회 올림픽 대회 폐막"
 vikelas.108.d: "제1회 올림픽 대회가 막을 내렸다. 수 세기의 역사를 지닌 전통이 부활하여 근대적인 면모로 다시 태어난 모습에 관중과 언론, 그리고 선수들이 환호하였다."
 vikelas.108.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_winners_type')] 하지만 다른 국가들도 훌륭한 대회 성적을 거두었다. 이번에 참가한 [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue|0V]개국 가운데 금메달을 획득한 국가는 다음과 같다.\n[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_1_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_2_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_3_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_4_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_5_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_6_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_7_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_8_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_9_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_10_this_year_global_type')]"
 vikelas.108.g: "더 빨리, 더 높이, 더 강하게."
 vikelas.109.d: "그리스가 다시 한번 전세계 각국을 올림픽 대회에 초청하였다. 이번 국제 대회에는 #BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]개국#!의 선수들이 참가한다."
 vikelas.109.f: "그리스가 IOC를 창설하였으므로 과거와 마찬가지로 앞으로도 올림픽은 그리스 영토 내에서만 개최될 것이라는 사실은 자명했다. 이는 대회의 지속성을 확실히 보장하는 것을 넘어서, 세계적으로 대우받는 역할을 그리스가 맡게 하면서, 한때 작은 왕국이었던 그리스에게 매우 특별한 지위를 선사하게 되었다."
 vikelas.110.t: "올림픽의 열정"
 vikelas.110.d: "[SCOPE.sCharacter('vikelas_olympics_enthusiast_scope').GetFullName](은)는 머지않아 올림픽 대회가 그리스에서 개최된다는 사실에 매혹된 모양이다. [ROOT.GetCountry.GetName]에서도 새로 창설된 국제올림픽위원회의 회원국이 되어야 한다며 자신이 직접 추진하겠다고 밝혔다."
 vikelas.110.f: "수많은 학자들이 올림픽 대회를 성공적으로 만드는 데 기여했다는 사실은 그리 놀라운 사실이 아니다. 고대 유물 연구가 중에는 학문적 소양에 근거하여 올림픽 대회의 부활에 관심을 가진 사람들이 많았기 때문이다. 비록 직접 참가하지는 않았어도 IOC와 접촉을 시도하였으며, 자국 대표 선수가 국제 대회에 참가하는 것을 국가적 영광으로 여겼다."
 vikelas.110.g: "칭찬할 만한 계획이다."
 vikelas.112.t: "신임 IOC 이사회 선출"
 vikelas.112.d: "IOC 이사회가 새롭게 선출되었다."
 vikelas.112.f: "IOC 이사회는 4년에 한번씩 선출됩니다. 창설국과 위원장의 출신국만 이사회에 계속해서 남을 수 있습니다. 나머지는 강대국 5개국, 유럽 2개국, 아메리카 2개국, 아시아 2개국, 아프리카 1개국, 오세아니아 1개국의 체계로 자리가 배분됩니다. 이사회에서는 차기 올림픽의 유치국을 IOC 위원의 표결을 거쳐 선정합니다."
 vikelas.113.t: "차기 올림픽 개최지"
 vikelas.113.d: "IOC 이사회 참여국들이 차기 올림픽 개최지를 결정하기 위해 모였다."
 vikelas.113.f: "IOC 회원국 가운데 지난 20년간 올림픽을 개최하지 않은 3개국이 후보에 오릅니다. 청탁 여부에 따라 네번째 국가가 후보로 추가될 수도 있습니다. 개최국 선정은 해당 국가의 평판과 세력망에 따라 결정됩니다. 종속국과 종주국, 동맹국과 관세동맹국은 각자 서로에게 표를 던집니다. 관계 상태와 악명 또한 중요한 기준이 됩니다."
 vikelas.113.g: "[SCOPE.sCountry('vikelas_olympics_candidate_1').GetName]"
 vikelas.113.h: "[SCOPE.sCountry('vikelas_olympics_candidate_2').GetName]"
 vikelas.113.i: "[SCOPE.sCountry('vikelas_olympics_candidate_3').GetName]"
 vikelas.113.j: "[SCOPE.sCountry('vikelas_olympics_candidate_4').GetName]"
 vikelas.113.k: "[SCOPE.sCountry('vikelas_olympics_candidate_fallback').GetName]"
 vikelas.114.t: "차기 올림픽은 [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFlag]에서"
 vikelas.114.d: "IOC의 결정이 내려졌다. [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetName](이)가 차기 올림픽 대회를 개최할 만한 최적의 환경을 갖춘 것으로 결론이 내려졌다."
 vikelas.114.f: "올림픽 개최는 참으로 영광스러운 일이다. 대회 준비에는 예산이 들어가지만 그만한 가치가 있다."
 vikelas.114.g: "[SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFlag]에서 만납시다!"
 vikelas.115.g: "[SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFlag]에서... 어라, 우리나라잖아? 만세!"
 vikelas.116.d: "전 세계가 [ROOT.GetCountry.GetName]에 모였다. 이번 국제 대회에는 #BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]개국#! 출신의 선수들이 참가하였다. 개최국으로서 자부심을 느끼며, 우리 선수들도 조국 개최의 이점을 잘 살리기를 바란다!"
 vikelas.116.f: "\"올림픽 대회에서 가장 중요한 것은 이기는 것이 아니라 참가하는 것이. 인생에서 가장 중요한 것은 성공이 아니라 분투하는 과정이다. 정복을 이뤄냈느냐가 아니라 얼마나 잘 싸웠느냐가 핵심이다. 이러한 원칙을 널리 전파하는 것은 더욱 강하고 용감하며, 무엇보다도 더욱 양심적이고 관대한 인류사회를 이룩하는 것이다.\" - 피에르 드 쿠베르탱"
 vikelas.116.g: "대회의 개막을 선언한다!"
 vikelas.117.d: "전세계가 [SCOPE.sCountry('vikelas_olympic_country').GetName]에 모였다. 이번 국제 대회에는 #BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]개국#! 출신의 선수들이 참가하였다."
 vikelas.118.d: "우리 선수들은 용감히 싸웠다... 이제는 그 영광을 고국에 선사할 차례다."
 vikelas.119.t: "국제올림픽위원회"
 vikelas.119.d: "올림픽 대회의 활성화를 위해 [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]에서 고대 올림픽의 근대적 행사를 조직하고 지속하는 국제올림픽위원회 (IOC)가 창설되었다. 첫번째 근대 올림픽 대회는 [ROOT.GetCountry.GetName]에서 개최하는 것으로 결론이 났다."
 vikelas.119.f: "초대 IOC는 [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]의 측근들로 구성되었다. 이들은 소모임을 형성하며 퍼져나갔고, 이후 다른 IOC 위원들이 합류하면서, 뜻을 같이하는 사람들의 모임이 국제적인 조직으로 거듭나게 되었다.  이들이 처음으로 내린 결정 중 하나는 초대 올림픽 대회의 개최지에 관한 문제였다. 현재 올림픽 대회를 전담할 만한 자주국으로서 그리스가 존재하지 않은 관계로, 위원회 창립국인 [ROOT.GetCountry.GetName]에서 대회를 개최하기로 결정된 것이다. 이후 이사회는 4년에 한 번씩 다른 개최지를 지정한다는 방침이다."
 vikelas.119.g: "그렇다면 우리 측에서 대회를 주최해야겠군."
 vikelas.120.t: "국제올림픽위원회"
 vikelas.120.d: "올림픽 대회의 활성화를 위해 [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]에서 고대 올림픽의 근대적 행사를 조직하고 지속하는 국제올림픽위원회 (IOC)가 창설되었다. 첫번째 근대 올림픽 대회는 [ROOT.GetCountry.GetName]에서 개최하는 것으로 결론이 났다."
 vikelas.120.f: "초대 IOC는 [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]의 측근들로 구성되었다. 이들은 소모임을 형성하며 퍼져나갔고, 이후 다른 IOC 위원들이 합류하면서, 뜻을 같이하는 사람들의 모임이 국제적인 조직으로 거듭나게 되었다.  이들이 처음으로 내린 결정 중 하나는 초대 올림픽 대회의 개최지에 관한 문제였다. 현재 올림픽 대회를 전담할 만한 자주국으로서 그리스가 존재하지 않은 관계로, 위원회 창립국인 [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFlag]에서 대회를 개최하기로 결정된 것이다. 이후 이사회는 4년에 한 번씩 다른 개최지를 지정한다는 방침이다."
 vikelas.120.g: "[SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFlag]에서 만납시다"
 vikelas_3_winners_loc: "금년도 올림픽 대회의 1위를 차지한 국가는 하나도 둘도 아닌 셋이나 나왔다! [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName], [GetGlobalVariable('vikelas_medal_rank_2_this_year_global_var').GetCountry.GetName], [GetGlobalVariable('vikelas_medal_rank_3_this_year_global_var').GetCountry.GetName] 3개국이 총 [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|0V]개의 @vikelas_gold_medals! 금메달을 획득했다."
 vikelas_2_winners_loc: "[GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName], [GetGlobalVariable('vikelas_medal_rank_2_this_year_global_var').GetCountry.GetName] 양국이 총 [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|0V]개의 @vikelas_gold_medals!금메달을 차지했다. 이로써 두 국가는 세계 최정상을 차지한 선수들의 본고장이 되었다."
 vikelas_1_winner_loc: "이번 올림픽 대회는 [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName]에서 총 [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|0V]개의 @vikelas_gold_medals!금메달을 획득하며 정상에 올랐다."
 vikelas_medal_rank_1_this_year_global_loc: "\n1위: [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName] - [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|V0]개"
