 vikelas_sports_clubs_tech: "체육단"
 vikelas_sports_clubs_tech_desc: "18세기 잉글랜드에서 승마, 복싱, 크리켓 종목 위주로 체육단이 처음 등장하게 되었습니다. 이들은 조직 구조, 회원제, 정기 행사, 구속력 있는 규칙과 규정을 확립함으로써 체육의 제도화에 중추적인 역할을 하였습니다. 이러한 전문화는 협회와 리그, 국제 대회로 구성된 근대 체육 시스템의 토대를 마련하였습니다."
 vikelas_international_sports_tech: "국제 체육"
 vikelas_international_sports_tech_desc: "체육 대회를 향한 인기는 국내적으로, 그다음에는 국제적으로 확산되었습니다. 국가 대항전의 규칙을 개선하기 위해 국제위원회, 체육 연맹, 경기 규칙이 필요하게 되었습니다. 이 과정에서 올림픽과 국제올림픽위원회(IOC)가 가장 중요한 역할을 했습니다."
