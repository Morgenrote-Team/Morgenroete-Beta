 vikelas_bicycles_tech: "자전거"
 vikelas_bicycles_tech_desc: "19세기 중반에는 밸런스 바이크가 페달이 앞바퀴축에 직접 장착된 최초의 벨로시페드로 진화하였습니다. '뼈가 흔들리는 자전거'로 불리게 된 벨로시페드는 무거운 철제 림과 나무 바퀴살을 사용하여 울렁이는 지형에서 타기에는 체력적으로 상당한 부담을 안겼습니다. 이런 불편함에도 불구하고 이 시기에는 처음으로 자전거 붐이 일었으며, 점차 정교한 설계로 이어져 후대의 하이휠 바이크의 등장을 위한 토대를 마련하였습니다."
