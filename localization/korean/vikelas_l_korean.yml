 je_vikelas_basketball_fail: "다른 국가에서 [GetPlayer.GetName]보다 먼저 농구를 발명함"
 je_vikelas_baseball: "야구"
 je_vikelas_baseball_reason: "야구는 19세기 미국의 국기 종목으로 거듭난 이래 전세계로 퍼져나가게 되었습니다. 기록상으로 전해지는 최초의 경기는 1846년 뉴저지주 호보컨에서 열린 경기입니다. 1860년대에는 급격한 프로 종목화를 겪었는데 일례로 1876년 최초의 메이저 프로 리그인 내셔널 리그가 출범하였습니다. 이와 동시에 야구는 미국 장병과 상인, 선교사를 통해 다른 국가로 전파되었습니다."
 je_vikelas_baseball_fail: "다른 국가에서 [GetPlayer.GetName]보다 먼저 야구를 발명함"
 je_vikelas_football: "축구"
 je_vikelas_football_reason: "1840년대 잉글랜드에서 최초의 통일 축구 규정이 등장했고, 1863년에는 최초의 축구단이, 1872년에는 잉글랜드와 스코틀랜드 간의 첫 공식 국제 경기가 열렸습니다. 영국을 시작으로 축구는 유럽 대륙과 남아메리카로 퍼져나갔습니다. 1890년대 이후 독일, 프랑스, 이탈리아, 스페인에서 국가 협회와 리그가 창설되었습니다. 동시에 아르헨티나, 브라질, 우루과이로도 축구가 전파되어 영국 철도 노동자와 이민자들이 최초의 축구단을 창설하기도 하였습니다."
 je_vikelas_football_fail: "다른 국가에서 [GetPlayer.GetName]보다 먼저 축구를 발명함"
 je_vikelas_cricket: "크리켓"
 je_vikelas_cricket_reason: "크리켓의 기원은 중세 후기로 거슬러 올라간다. 이르면 16세기 영국 켄트 지역의 아이들이 배트와 공을 이용한 간단한 놀이를 즐겼는데, 옛 문헌에서는 이를 '크레켓'(creckett) 내지는 '크레그' (creag)라고 기록하였다. 하지만 체계적이고 복잡한 경기로 발전하기 시작한 것은 18세기의 일이다. 이 시기에는 최초의 조직적인 클럽이 등장하였으며, 1787년 런던에서 메릴본 크리켓 클럽(Marylebone Cricket Club, MCC)이 설립되면서 더욱 주목받게 되었다. 메릴본 크리켓 클럽은 구속력 있는 규칙을 처음 제정하였으며 이는 곧 현대 크리켓 경기의 시초가 되었다."
 je_vikelas_cricket_fail: "다른 국가에서 [GetPlayer.GetName]보다 먼저 크리켓을 발명함"
 je_vikelas_cricket_national_league: "국내 크리켓 리그"
 je_vikelas_cricket_national_league_reason: "19세기 들어 잉글랜드에서 귀족과 평민 모두의 여가 활동으로 오랫동안 자리잡았던 크리켓이 점점 더 체계적인 구조를 갖추기 시작했다. 그 가운데 1890년 세계 최초의 국내 크리켓 정식 리그인 '카운티 챔피언십'의 창설로 결정적인 순간이 찾아왔다. 그 전에도 18세기부터 각 지역별 대항전이 열려왔지만 공식적인 점수 체계나 순위표는 없었다. 카운티 챔피언십은 영국 크리켓계에 표준화된 경쟁 체계를 도입하였고, 초창기에는 요크셔와 서리, 랭커셔가 강팀으로 부상하였다. 영국 이외에도 특히 호주와 남아프리카를 중심으로 크리켓 클럽들이 체계적인 대회를 개최하기 시작하였다."
 je_vikelas_baseball_national_league: "국내 야구 리그"
 je_vikelas_baseball_national_league_reason: "원래 뉴욕에서 주로 인기를 끌던 야구는 1860년대에 이르러 미국 전역에 큰 바람을 몰고 왔다. 남북전쟁 당시 부대에서 병사들이 야구를 즐겼던 것이 결정적인 요인이었다. 1857년 최초의 야구 협회인 전미 야구 선수 협회(NABBP)가 창설되었다. 1867년에는 400개가 넘는 야구단이 협회에 가입하였다. 그러나 그 중에서도 제일 강했던 야구단은 미국 북동부를 연고지로 삼았으며 특히 뉴욕의 야구단이 최고로 꼽혔다. 1871년 NABBP의 후신으로 전미 프로 야구 선수 협회 (NAPBBP)가 설립되었는데, 일명 내셔널 어소시에이션(NA)라고도 부르는 이 단체는 세계 최초의 프로야구 리그로 평가받고 있다."
 je_vikelas_football_national_league: "국내 축구 리그"
 je_vikelas_football_national_league_reason: "영국 공립학교와 지역사회에서 비공식적으로 즐기던 축구는 19세기 말에 이르러 영국 전역에 바람을 몰고 왔다. 1863년 축구협회(Football Association, FA)의 창설로 경기 규칙을 체계화하고 조직적인 경기를 가능케 한 것이 결정적인 요인이었다. 1870년대에 이르러 산업화된 도시의 노동계층을 중심으로 축구의 인기가 빠르게 확산되었다. 1888년에는 세계 최초의 프로축구 리그인 '풋볼 리그'가 영국에서 창설되었다. 이 리그는 미들랜즈와 잉글랜드 북부 지역의 12개 축구단을 하나로 묶었으며, 프레스턴 노스 엔드와 애시턴 빌라 등의 팀이 초창기 강팀으로 활약했다."
 je_vikelas_basketball_national_league: "국내 농구 리그"
 je_vikelas_basketball_national_league_reason: "1891년 제임스 네이스미스가 발명한 농구는 YMCA 훈련 활동에 그쳤던 것이 20세기 초에 이르러 하나의 경쟁 종목으로 거듭나게 되었다. 1898년 세계 최초의 프로 농구로 여겨지는 '내셔널 배스킷볼 리그'(NBL)가 미국에서 창설되면서 결정적인 발전을 이룩하였다. NBL은 펜실베이니아주와 뉴저지주의 6개 농구단으로 구성되었으며, 농구의 프로종목화를 향한 첫 걸음이었다. 그러나 처음 결성된 NBL은 1904년 해체되어 단명하고 말았다. 프로농구가 전국적으로 안정적인 체육 사업으로 자리잡게 된 것은 1946년 미국 농구 협회(BAA)가 창설되면서부터였는데, 이 단체는 훗날 NBA로 합병된다."
