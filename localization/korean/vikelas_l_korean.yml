 vikelas_become_ioc_president_tt: "[GetPlayer.GetName](이)가 신임 IOC 회장국이 됩니다"
 vikelas_ioc_foundation_button: "IOC 창설"
 vikelas_ioc_foundation_button_desc: "국제올림픽위원회 (IOC)는 협회의 형태로 수립된 비정부 기구입니다. 위원회의 목적은 근대 올림픽을 조직, 감독하는 것입니다. 창립국은 올림픽 대회 개최지를 선정하는 평의회의 상임 의석을 확보하게 됩니다. IOC 창립 직후 초대 올림픽 대회가 개최되었으며 이후 4년 주기로 대회가 개최되고 있습니다. 특정 조건을 충족한 국가는 IOC 정회원으로 가입할 수 있지만, 평의회의 의석수는 제한되어 있습니다."
 vikelas_ioc_statistics_button: "IOC 방문"
 vikelas_ioc_statistics_button_desc: "국제올림픽위원회를 방문하여 회원국 현황과 차기 올림픽 개최지, 전세계 메달 집계 순위를 확인합니다."
 vikelas_ioc_member_button: "IOC 회원국 가입"
 vikelas_ioc_member_button_desc: "4년 주기로 열리는 올림픽 대회의 참가를 위해 국제올림픽위원회에 가입합니다. IOC 회원국은 자국에서 올림픽 대회를 개최할 기회를 얻게 됩니다."
 vikelas_ioc_bribe_button: "IOC 뇌물 공여"
 vikelas_ioc_bribe_button_desc: "IOC 이사회에 너그러운 '기부'를 하면 위원들의 호감을 얻어 차기 올림픽 개최지 선정에서 네 번째 후보국으로 거론될 수 있습니다. 하지만 그렇다고 해서 반드시 개최지로 선정된다는 보장은 없습니다. 우리의 너그러움을 두고 오해하는 IOC 위원들이 생길 수도 있습니다."
 vikelas_olympic_flame_button: "올림픽 성화"
 vikelas_olympic_flame_button_desc: "그리스 여신 헤스티아의 영원히 타오르는 화롯불에서 영감받은 올림픽 성화는 1928년 암스테르담 올림픽에서 처음 선보였습니다. 성화 봉송의 전통은 1936년 베를린 하계 올림픽부터 시작되었습니다. 성화 봉송이란 아이디어 자체는 대중의 상식과는 달리 나치 정권이 아닌 독일계 유대인 고고학자 알프레드 쉬프에게서 나왔습니다. 성화 봉송의 도입은 올림픽에 새로운 정체성을 부여했을 뿐만 아니라, 매 대회마다 온 국민을 하나로 묶고, 다른 갈등으로부터 관심을 돌릴 수 있는 고무적인 상징으로 작용하였습니다."
 vikelas_school_sport_button: "학교 체육 도입"
 vikelas_school_sport_button_desc: "학교 체육 과목을 도입하면 운동선수로서의 자질을 갖춘 인재를 더 많이 확보하고 올림픽에서 더 나은 성적을 거둘 수 있게 됩니다."
 vikelas_football_worldcup_button: "축구 월드컵 조직"
 vikelas_football_worldcup_button_desc: "월드컵은 국가 대표팀이 출전하는 축구 대회입니다. 각 대표팀은 매 4년마다 월드컵 본선에 진출할 수 있습니다. 4주간의 토너먼트에서 최고의 성적을 거둔 국가 대표팀이 세계 챔피언에 등극하게 됩니다. 대회의 조직과 후원은 국제축구연맹 (FIFA)에서 전담하고 있습니다. 초대 월드컵 대회는 1930년 우루과이에서 개최되었으며 개최국 우루과이가 우승을 차지했습니다."
 vikelas_football_worldcup_tt: "축구 협회를 설립한 국가가 최소 #G 16개국#!에 달함"
 je_vikelas_sports: "체육"
 je_vikelas_sports_reason: "19세기에 들어서면서 체육 조직은 새로운 가치를 지니게 되었습니다. 여러 국가에서 체육단이 결성되고, 운동장은 공공시설이 되었으며, 체육 활동은 여가 활동으로서 널리 퍼졌습니다. 축구와 야구는 국민 체육으로 발전했고, 자전거 경주와 자동차 경주는 머지않아 대중 사회의 의식으로 자리 잡았습니다. 이러한 발달의 정점은 국제적인 행사로서 올림픽 경기가 창설된 것이었습니다."
 je_vikelas_olympic_games_host_greece: "[SCOPE.sCountry('vikelas_olympic_country').GetNameNoFlag]에서 열린 제[GetGlobalVariable('vikelas_olympic_games_number_global_var').GetValue]회 올림픽 대회"
 je_vikelas_olympic_games_host_greece_reason: "올림픽 대회가 한창 진행되고 있습니다. IOC에 가입한 여러 국가들이 @vikelas_gold_medals! 올림픽 금메달을 놓고 이제 막 경쟁에 나서고 있습니다! 올림픽에서는 최대 12개의 금메달을 획득할 수 있습니다."
