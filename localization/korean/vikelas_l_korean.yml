 vikelas.300.t: "새로운 운동 종목"
 vikelas.300.d_football: "축구라는 새로운 운동 종목에 매료되는 국민들이 점점 더 많아지고 있다. 이 운동이 [SCOPE.sCountry('vikelas_overlord_country_scope').GetName]에서 '수입'되어 왔다는 점을 비판하는 목소리도 많지만, 이제는 너무나 인기가 많아져서 외면할 수 없는 수준에 이르렀다."
 vikelas.300.d_baseball: "야구라는 새로운 운동 종목에 매료되는 국민들이 점점 더 많아지고 있다. 이 운동이 [SCOPE.sCountry('vikelas_overlord_country_scope').GetName]에서 '수입'되어 왔다는 점을 비판하는 목소리도 많지만, 이제는 너무나 인기가 많아져서 외면할 수 없는 수준에 이르렀다."
 vikelas.300.d_cricket: "크리켓이라는 새로운 운동 종목에 매료되는 국민들이 점점 더 많아지고 있다. 이 운동이 [SCOPE.sCountry('vikelas_overlord_country_scope').GetName]에서 '수입'되어 왔다는 점을 비판하는 목소리도 많지만, 이제는 너무나 인기가 많아져서 외면할 수 없는 수준에 이르렀다."
 vikelas.300.f: "\"놀이란 휴식과도 같다. 끊임없이 일할 수는 없으니 사람에겐 휴식이 필요하다.\" - 아리스토텔레스"
 vikelas.300.g: "골!"
 vikelas.300.h: "이제 내가 타자야!"
 vikelas.300.i: "나이스 볼."
 vikelas.300.football.tt: "축구가 [GetPlayer.GetName]의 국기 종목이 됩니다."
 vikelas.300.baseball.tt: "야구가 [GetPlayer.GetName]의 국기 종목이 됩니다."
 vikelas.300.cricket.tt: "크리켓이 [GetPlayer.GetName]의 국기 종목이 됩니다."
 vikelas.301.t: "크리켓 클럽 창단"
 vikelas.301.d: "일부 유력자들이 자신들이 좋아하는 취미를 즐기기 위해 체육단을 창설하였다. 그 이름하여 [SCOPE.GetRootScope.GetState.GetStateRegion.GetCityHubName] 크리켓 클럽이다."
 vikelas.301.f: "19세기는 크리켓이 시골의 여가 활동에서 국가적, 국제적으로 중요한 체육 종목으로 거듭난 시대였다. 영국의 상류층은 크리켓을 가장 좋아하는 여가 활동으로 여겼으며, 이튼 스쿨이나 해로 스쿨 같은 기숙학교에서도 '신사의 체육'이라 칭송하며 크리켓을 장려했다. 그와 동시에 노동계급에서도 인기가 높아졌는데, 특히 잉글랜드 북부를 중심으로 공장 노동자들이 자체적으로 클럽을 창설하였다. 이렇듯 크리켓의 대중화는 클럽수과 관객수의 전례 없던 성장으로 이어졌다.\n\n국제 경기도 머지않아 개최되었다. 1844년 미국 뉴욕에서 열린 캐나다와 미국 간의 경기가 세계 최초의 국제 경기로 기록되어 전해지고 있다."
 vikelas.301.g: "이제 내가 타자야!"
 vikelas.301.h: "이런 고상한 종목도 다 있군."
 vikelas.302.t: "야구단 창단"
 vikelas.302.d: "[SCOPE.sState('vikelas_baseball_club_state_scope').GetName]에서 야구가 인기 여가 활동으로 거듭나고 있다. 정기적으로 경기를 치르는 새로운 야구단이 창설되었는데 그 이름은 [SCOPE.sState('vikelas_baseball_club_state_scope').GetCustom('vikelas_historical_baseball_club_names_type')] 야구단이라고 한다."
 vikelas.302.f: "1840년대 들어 야구는 그 시초 격인 종목의 그늘에서 벗어나 독자적인 형태를 갖추기 시작했다. 미국에서는 급속한 도시화가 이루어지고 있었고, 성장하는 도시들은 신국가의 정신을 반영하며 공동체 의식을 함양할 수 있는 여가 활동을 찾고 있었다. 1845년 뉴욕의 니커보커 야구단의 알렉산더 카트라이트와 선수들이 야구 최초의 표준 규정을 제정하면서 중대한 전환점을 맞이하였다. 일명 '니커보커 규정'이라 부르는 이 규정집은 다이아몬드형 구장에 베이스 4개, 1이닝 3아웃, 팀당 선수 9인 구성 등을 다루고 있으며, 현대 야구의 기반을 마련하였다는 점에서 의의가 있다. 당시까지 잔디밭이나 들판에서 치러지던 비공식적인 야구와는 확연히 다른 형태였던 것이다. 1846년 6월 19일, 니커보커 야구단은 미국 뉴저지주 호보켄에서 본 규정에 따라 최초의 공식 경기를 치렀다. 경기 결과는 상대팀인 뉴욕 라인의 승리로 끝났지만, 조직화된 야구의 탄생을 알렸다는 점에서 높이 평가받고 있다."
 vikelas.302.g: "홈런."
 vikelas.303.t: "축구단 창단"
 vikelas.303.d: "[SCOPE.sState('vikelas_football_club_state_scope').GetName] 지역의 인부와 노동자들이 몇 주 동안 축구 경기를 치르기 위해 모여들었다. 이제 이들은 [SCOPE.sState('vikelas_football_club_state_scope').GetCustom('vikelas_historical_football_club_names_type')] 축구단을 결성하기에 이르렀다."
 vikelas.303.f: "19세기 초 잉글랜드에서 축구는 통일된 종목이 아니라 마을과 도시, 학교에서 벌어지는 다양한 구기종목을 아우르는 말이었다. 이러한 종목들은 규칙이 제각기 달랐으며 규정 마련을 향한 첫번째 시도는 1848년 케임브리지 규정이 제정되면서부터였다. 이는 이름 그대로 케임브리지대 재학생들을 위한 통일된 규칙을 마련하려는 시도였으며, 최종본은 아니었지만 이후의 발전을 위한 토대를 마련하였다. 1863년 10월 26일 11개 축구단이 런던 프리메이슨 태번에 모여 축구협회(Football Association, FA)를 창설하면서부터 진정한 발전이 이루어졌다. 발로만 공을 다룰 것과 공을 들고 뛰거나 던지는 것을 금하는 규칙이 협회 출범 이래 몇 주 만에 합의를 거쳐 제정되었다. 이는 럭비 팬들의 반발을 샀고, 이후 럭비라는 종목으로 분화되어 자신들만의 규칙을 제정하기에 이르렀다. 축구협회의 창설과 함꼐 현대 축구가 탄생한 셈이다."
 vikelas.303.g: "골!"
 vikelas.304.t: "야구단 창단"
 vikelas.304.d: "[SCOPE.sState('vikelas_basketball_club_state_scope').GetName] 지역에서 [GetPlayer.GetName] 전역에 농구를 보급하려는 목적으로 농구단이 창설되었다."
 vikelas.304.f: "농구는 현대의 대표 체육 종목 가운데 가장 최근에 등장한 종목이다. 농구의 기원은 19세기 말 사회운동과 밀접한 연관이 있다. 1891년 캐나다의 의사이자 체육교사였던 제임스 네이스미스가 한 가지 과제에 직면하였다. 미국 매사추세츠주 스프링필드에 있던 YMCA 훈련기관의 학생들이 뉴잉글랜드 지역의 추운 겨울에도 즐길 수 있는 실내 종목을 개발해야 했던 것이다. YMCA 측은 체육을 통해 청년들의 신체적, 정신적 건강을 향상하고자 하였는데, 그 자체로 개신교 정신과 도시화 시대에 부합하는 교육 사업이었다. 빠른 선수 교체와 명확한 규칙이 마련된 농구야말로 이런 목표에 완벽하게 들어맞았다. 농구는 공동체 의식을 함양하는 동시에 성장하는 미국 도시에 새로운 여가 활동을 불어넣는 종목이 되었다."
 vikelas.304.g: "덜커덩!"
 vikelas.304.h: "이런 바보 같은 운동이 다 있다니."
 vikelas.311.t: "체육 소식지"
 vikelas.311.d: "[SCOPE.sState('vikelas_gazette_state').GetName] 지역에서 어느 출판사가 체육 경기 보도, 특히 [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName]만 집중적으로 다루는 새로운 구성의 일간지를 선보여 엄청난 매출을 기록하고 있다."
 vikelas.311.f: "19세기 말 체육이 경기장을 벗어나 도시와 카페, 그리고 대중의 마음 속으로 전파되면서 새로운 매체가 필요해졌다. 경기 승패에 관한 소식은 경기장을 찾는 관중 뿐만 아니라 공장 문 앞에서 일하는 노동자, 신문을 손에 든 직장인에게도 전해져야 했다. 이러한 요구를 충족시킨 《가제타 델로 스포르트》(Gazzetta dello Sport)라는 소식지가 이탈리아에서 처음 등장하며 경기 결과 보도의 새 시대를 열었다. 1896년 4월 3일 아테네에서 열린 제1회 근대 올림픽이 개막되기 불과 3주 전에 이탈리아 밀라노에서 창간된 《가제타》는 처음부터 단순 경기 결과의 발표 이상의 의미를 지녔다. 사이클, 육상, 축구, 펜싱 등 속도와 경쟁, 열의를 약속하는 모든 종목의 목소리를 대변하려 했던 것이다. 처음에는 일반지에 흑색 활자로 주2회 발행되었던 《가제타》는 단순한 사실 전달을 넘어 이야기를 들려주고, 선수들을 영웅으로, 경기를 드라마로 만들었다. 그리고 1899년 《가제타》의 상징적인 변화가 벌어졌으니 다름아닌 소식지 표지가 분홍색으로 바뀐 것이었다. 원래는 분홍색 종이가 더 저렴했기 때문에 등장한 실용적인 조치였지만 머지않아 하나의 상표로 자리잡게 되었다."
 vikelas.321.t: "야구"
 vikelas.321.d: "미국에서 유래한 체육 종목이 우리나라 국민들에게 접해지면서 팬층을 점점 더 늘려나가고 있다. [GetPlayer.GetNameNoFlag]에서 야구 열풍이 일어난 것이다."
 vikelas.321.f: "야구는 미국의 국기(國技) 종목으로 여겨지지만 전혀 다른 국가로도 퍼져나가 비슷한 위상을 차지하게 되었다. 일본에서 야구는 개항 직후인 1872년 허레이스 넬슨에 의해 소개되었다. 서양의 문물에 개방적이었던 당시 일본은 야구를 빠르게 받아들여 인기있는 종목으로 자리잡았다. 그러나 야구가 프로종목으로 자리잡기까지는 30년 넘는 세월이 걸렸다.\n\n중국에서는 1864년 미국의 의료선교사 헨리 윌리엄 분이 상해야구단을 창단하면서 처음 소개되었다. 이후 청나라는 야구를 배우기 위해 중국 유학생을 미국으로 보내기 시작했다. 정식으로 야구 경기가 시작된 것은 1905년 세인트존스 대학교와 상하이 MCA 야구단 간의 경기가 치러지면서부터였다.\n\n쿠바에서는 네메시오 기요가최초의 메이저 야구단을 창단하면서 야구가 대중화되었다. 미국이 쿠바에 개입하기 이전인 1870년대부터 쿠바에서 가장 인기 있는 종목이 되었다. 야구는 미국에서 시작되었지만 쿠바 민족주의와 강하게 맞물려 있는데, 이는 투우 같은 스페인 식민지 시대의 운동 종목을 야구가 실질적으로 대체했기 때문이다."
 vikelas.403.t: "FIFA 신규 이사회 선출"
 vikelas.403.f: "FIFA에서 신임 이사회 구성을 다음과 같이 발표하였다.\n\n#V 회장국: [GetGlobalVariable('vikelas_fifa_president_global_var').GetCountry.GetName] #!\n\n#V 이사국: [GetGlobalVariable('vikelas_fifa_board_member_1_global_var').GetCountry.GetName|V] [GetGlobalVariable('vikelas_fifa_board_member_2_global_var').GetCountry.GetName|V] [GetGlobalVariable('vikelas_fifa_board_member_3_global_var').GetCountry.GetName|V] [GetGlobalVariable('vikelas_fifa_board_member_4_global_var').GetCountry.GetName|V] [GetGlobalVariable('vikelas_fifa_board_member_5_global_var').GetCountry.GetName|V]"
