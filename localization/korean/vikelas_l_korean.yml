 vikelas_streamliners_tech: "유선형 차량"
 vikelas_streamliners_tech_desc: "현대적인 견인 성능과 신형 알루미늄 차체 구조를 활용한 차세대 열차 설계로, 철도 현장에 더 많은 열차를 더 빠른 속도로 운행할 수 있도록 합니다."
 vikelas_racer: "카레이서"
 vikelas_racer_desc: "카레이서는 그랑프리 트로피를 차지하기 위해 [concept_vikelas_car_racing]에 나섭니다."
 vikelas_racer_champion: "유명 레이서"
 vikelas_racer_champion_desc: "유명 레이서는 정예 카레이서에 해당됩니다. 이들은 모터스포츠 세계에서 그 이름이 널리 알려져 있으며 [concept_vikelas_car_racing]에 출전하여 경기 우승을 자주 거머쥡니다."
 vikelas_speedster_racer: "속도광"
 vikelas_speedster_racer_desc: "이 레이서는 속도 질주에 완전히 중독되어 있으며 가장 빨리 달리기 위해 온 노력을 기울입니다."
 vikelas_enduring_racer: "내구 레이서"
 vikelas_enduring_racer_desc: "이 레이서는 오랫동안 지속되는 장거리 경주에 강점을 보이며, 엔진 보호에 더욱 신경을 씁니다."
 vikelas_prudent_racer: "신중한 레이서"
 vikelas_prudent_racer_desc: "이 레이서의 최우선 목표는 안전하고 확실하게 목적지에 도착하는 것입니다."
 vikelas_engine_mechanic: "엔진 정비사"
 vikelas_engine_mechanic_desc: "이 정비사는 엔진에 대한 지식이 특히 풍부하며 누구보다도 빠르게 엔진 개량에 나설 수 있습니다."
 vikelas_safety_mechanic: "안전 정비사"
 vikelas_safety_mechanic_desc: "이 정비사는 레이서의 생명을 보호하기 위한 안전 체계를 잘 이해하고 있는 혁신가입니다."
 vikelas_body_mechanic: "차체 정비사"
 vikelas_body_mechanic_desc: "이 정비사는 차체 제작에 특화되어 있으며 새로운 소재와 공기역학적 형태로의 개선을 끊임없이 연구합니다. "
 vikelas_all_rounder_mechanic: "만능 정비사"
 vikelas_all_rounder_mechanic_desc: "전 분야에 능통하여 특별히 강점도 약점도 없는 정비사입니다."
