 vikelas.582.d_level_3: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName](이)가 경주용 차량의 안전 설비를 개량하였다. 지금부터 선보일 안전 설비는 #V 유압 브레이크#!다. 신형 차량의 명칭은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]이다."
 vikelas.582.d_level_4: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName](이)가 경주용 차량의 안전 설비를 개량하였다. 지금부터 선보일 안전 설비는 #V 현대식 타이어#!다. 신형 차량의 명칭은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]이다."
 vikelas.582.f: "\"먼저 들어오려면 먼저 완주해야 한다.\" - 후안 마누엘 판히오"
 vikelas_new_safety_tt: "현재 안전 설정이 개선됩니다."
 vikelas.583.t: "신형 차체"
 vikelas.583.d_level_2: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName](이)가 경주용 차량의 차체를 개량하였다. 지금부터 선보일 차체는 #V 어뢰형 차체#!다. 신형 차량의 명칭은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]이다."
 vikelas.583.d_level_3: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName](이)가 경주용 차량의 차체를 개량하였다. 지금부터 선보일 차체는 #V 압연 철판 차체#!다. 신형 차량의 명칭은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]이다."
 vikelas.583.d_level_4: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName](이)가 경주용 차량의 차체를 개량하였다. 지금부터 선보일 차체는 #V 유선형 차체#!다. 신형 차량의 명칭은 [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]이다."
 vikelas.583.f: "\"세컨드카를 만든 지 5분 만에 자동차 경주가 시작됐다.\" - 헨리 포드"
 vikelas_new_body_tt: "현재 차체가 개량됩니다."
 vikelas.584.t: "V형 엔진"
 vikelas.584.d: "우리 공학자 [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] 박사가 레이싱용 신형 엔진의 획기적인 설계안을 완성하고 정비사 [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName]에게 이 소식을 전했다."
 vikelas.584.f: "V형 엔진은 여러 개의 실린더를 장착한 왕복 피스톤 엔진의 한 종류다. 실린더는 서로간에 특정 각도를 이루며 배치된 두 개의 실린더 뱅크로 나뉜다. V형 엔진은 실린더 수가 많고 설치 공간이 제한적인 경우에 특히 널리 사용된다. 컴팩트한 설계 덕분에 원재료를 절약할 수 있고 따라서 중량도 줄일 수 있다. 최초의 V형 엔진은 2기통 V트윈 엔진으로, 빌헬름 마이바흐가 설계하여 1889년 다임러 슈탈라드바겐 자동차에 사용되었다. 최초의 V8 엔진은 1903년 레옹 르바바쇠르가 경주용 보트와 비행기 전용으로 설계한 앙투아네트 엔진의 형태로 생산되었다."
 vikelas.584.g: "유레카!"
 vikelas.585.t: "연료 개량"
 vikelas.585.d: "우리 화학자 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] 박사가 내연기관용 연료를 한층 더 개량하여 경주용 차량의 효율성과 성능을 늘리는 핵심적인 역할을 할 수 있도록 하였다. [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName](은)는 시험 주행에서 큰 관심을 표했다."
 vikelas.585.f: "휘발유 연료의 초창기 수십 년간의 역사는 매우 변화무쌍했다. 여러 회사들이 연료를 희석하거나 다른 순수연료와 혼합하는 방식을 택했다. 니콜라우스 아우구스트 오토는 당시에도 이미 정제 알코올을 사용하기도 했다. 일부 국가에서는 석유 부족으로 대체 연료를 개발하거나 사용 가능한 연료량을 더욱 효율적으로 활용하는 방법을 모색했다. 레이싱 분야에서는 주행 성능을 최적화하기 위해 개량 연료와 윤활유가 사용되었다."
 vikelas.585.g: "유레카!"
 vikelas.586.t: "공기역학적 힘"
 vikelas.586.d: "우리 물리학자 [ROOT.Var('curie_physicistvar').GetCharacter.GetLastName] 박사가 차량 제작에 유용할 공기역학적 힘의 계산 결과를 발표하였다. 차량 정비사 [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName]도 해당 논문의 사본을 전달받았다."
 vikelas.586.f: "\"공기역학은 엔진을 만들 줄 모르는 사람들을 위한 것.\" - 엔초 페라리"
 vikelas.586.g: "유레카!"
 vikelas.590.t: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]의 유명 카레이서 등극!"
 vikelas.590.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] 선수는 전세계의 레이스에서 우승하며 본연의 레이싱 방식으로 널리 이름을 알렸다. 이제 [ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U]의 명성은 유명 레이서로 꼽힐 만하다!"
 vikelas.590.f: ""
 vikelas.590.g: "살아있는 전설일세!"
 vikelas.591.t: "우리의 카레이서 [SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullNameNoFormatting] 은퇴"
 vikelas.591.d: "수십 년 간 전 세계를 돌며 자동차 레이스에 인생을 바쳐왔던 [SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullName](이)가 은퇴를 결심했다. [SCOPE.sCharacter('vikelas_retired_racer_scope').GetSheHe]는 이제 더 이상 [concept_vikelas_racer]로 활동하지 않게 되었다."
 vikelas.591.g: "[SCOPE.sCharacter('vikelas_retired_racer_scope').GetSheHe|U]는 은퇴에 이르게 되었다!"
 vikelas.591.h: "이 사람이라면 뛰어난 공학자가 될 것이다!"
 vikelas.591.new_racer_replace_tt: "[SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullName](이)가 은퇴하고 [SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName](이)가 [GetPlayer.GetName]의 신임 [concept_vikelas_racer]로 임명됩니다."
 vikelas.591.racer_to_engineer_tt: "[SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullName](이)가 당신의 신임 [concept_tesla_engineer]로 임명됩니다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_replacement_engineer_custom_loc')]"
 vikelas.591.new_racer_tt: "[SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName](이)가 [GetPlayer.GetName]의 신임 [concept_vikelas_racer]로 임명됩니다."
 vikelas.592.t: "[concept_vikelas_racer] 사망"
 vikelas.592.d: "수년간 [concept_vikelas_racer]로 활동해 온 우리나라에서 가장 유명한 카레이서가 세상을 떠났다. 이토록 눈부신 재능을 대신할 사람은 과연 누구인가?"
 vikelas.592.g: "빈자리가 너무 크다!"
 vikelas.592_tt: "간혹 게임 내 인물이 사망하기도 합니다. 모드에서도 이를 막을 수는 없습니다. 본 이벤트는 해당 [concept_character]이 맡은 역할을 게임에서 제거하여, 그들의 유령에 시달리지 않도록 합니다."
 vikelas.593.t: "치명적인 차 사고"
 vikelas.593.d: "카레이싱에 나선 [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] 선수가 자신의 운을 너무 밀어붙인 모양인지, 과속으로 도로를 이탈하여 치명적인 사고를 당했다."
 vikelas.593.f: "\"레이싱은 모든 것을 희생해야 하며, 주저하거나 망설임 없이 몰두해야 하는 엄청난 관기다.\" - 엔초 페라리"
 vikelas.593.g: "다음 사람!"
 vikelas.594.t: "차량 고장"
 vikelas.594.d: "안타깝게도 [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] 선수가 레이스를 마치기 전에 경기를 포기하게 되었다. 차가 고장났다는 것이 선수의 해명이다."
 vikelas.594.f: "\"불운이란 것은 없다.\" - 엔초 페라리"
 vikelas.594.g: "차의 문제였을까, 아니면 카레이서가 엔진에 부담을 주어서였을까?"
 vikelas.595.t: "신규 레이서"
 vikelas.595.d: "새로운 [concept_vikelas_racer]가 인사를 나누러 왔다. [SCOPE.sCharacter('vikelas_new_racer_scope').GetHerHis|U]의 이름은 [SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName]이다."
 vikelas.595.g: "[SCOPE.sCharacter('vikelas_new_racer_scope').GetSheHe]에게 운이 더 따르기를 바라겠소."
 vikelas.596.t: "신규 정비사"
 vikelas.596.d: "새로운 [concept_vikelas_mechanic]가 본인 소개에 나섰다. [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetHerHis|U] 이름은 [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetFullName]이며, 특화 분야는..."
 vikelas_autoracing_found_automobile_club_button: "자동차 경주단 설립"
 vikelas_autoracing_found_automobile_club_button_desc: "자동차 경주단 설립은 모터스포츠에 필수적인 다른 시설을 건립하는 데 첫걸음으로 작용합니다."
 vikelas_autoracing_long_distance_button: "내구 레이스 개최"
 vikelas_autoracing_long_distance_button_desc: "도시간 경주의 형태로 진행되는 경우가 많은 내구 레이스는 초창기 자동차 경주의 표준이자 20세기 중반까지 지속되었습니다. 이탈리아에서는 타르가 플로리오나 밀레 밀리아 같은 레이스가 대표적인 사례로 남아 있습니다. 인간과 기계가 특별한 시험대에 오르는 내구 레이스는 오랫동안 진정한 국가대항전 성격의 자동차 경주로 여겨졌습니다."
 vikelas_autoracing_found_grand_prix_button: "그랑프리 레이스 창설"
 vikelas_autoracing_found_grand_prix_button_desc: "1906년 자동차 역사상 최초의 정식 그랑프리인 ACF 그랑프리 대회가 열렸다. 프랑스 자동차 업계 대표의 요청으로 참가국에 관계없이 자동차 제조사당 최대 3대의 경주용 자동차가 출전할 수 있었다. 레이스 가운데서도 으뜸이라는 위상에 걸맞게, 이틀 연속으로 1200km가 넘는 거리를 주행하였다. 1925년에는 이탈리아 자동차 클럽의 주도로 마침내 공식 세계 선수권 대회가 창설되었다. 시즌 공식 3대 그랑프리 레이스(프랑스, 이탈리아, 벨기에)는 물론 미국 최고의 레이싱 대회인 인디애나폴리스 그랑프리가 대회의 레이스로 지정되었다."
 vikelas_autoracing_race_track_button: "레이스 트랙 건설"
 vikelas_autoracing_race_track_button_desc: "그랑프리 레이스의 개최로 고정형 레이스 트랙은 점차 카레이싱의 표준으로 자리잡게 되었습니다. 전용 레이스 트랙은 국제 레이싱 대회를 한 곳에 집중시킬 뿐만 아니라, 테스트 트랙으로서 매년 드라이버들에게 경험치 보너스를 제공하게 됩니다."
 vikelas_coach: "감독"
 vikelas_coach_desc: "이 인물은 체육단의 감독을 맡고 있습니다."
 vikelas_coach_senior: "대표 감독"
 vikelas_coach_senior_desc: "이 감독은 수년간의 경험을 바탕으로 체육계의 전설로 평가받고 있습니다."
 vikelas_replace_coach_with_new_coach_tt: "[SCOPE.sCharacter('vikelas_new_coach_var').GetFullName](이)가 당신의 신임 [concept_vikelas_coach]으로 임명됩니다. [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_replacement_coach_custom_loc')]"
 vikelas_would_replace_coach_loc: "#n 이것으로 당신의 #V 감독#! [ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName](을)를 대체하게 됩니다.#!"
 vikelas_will_not_replace_coach_loc: "#p 아직 #!#V 감독#!#p 을 보유하고 있지 않습니다!#!"
 vikelas_coach_experience_gain_tt: "당신의 [concept_vikelas_coach] [GetPlayer.MakeScope.Var('vikelas_coach_var').GetCharacter.GetFullName](이)가 경험치 [SCOPE.GetValue('xp_amount')|0+](을)를 얻습니다."
 building_vikelas_fifa: "국제축구연맹"
 pmg_vikelas_fifa: "국제축구연맹"
 pm_vikelas_fifa: "국제축구연맹"
 mobilization_option_bicycle_recon: "자전거 교대"
 vikelas_the_velocipede_modifier: "이륜차"
 vikelas_the_bicycle_modifier: "자전거"
 vikelas_bicycle_race_modifier: "일류 자전거 경주"
 vikelas_bicycle_race_working_class_hero_modifier: "자전거 경주: 노동계급의 영웅"
 vikelas_bicycle_race_national_icon_modifier: "자전거 경주: 국가적 우상"
 vikelas_bicycle_race_modern_man_modifier: "자전거 경주: 현대인"
 vikelas_bicycle_race_incident_modifier: "자전거 경주: 사고"
 vikelas_bicycle_race_euphoria_modifier: "자전거 경주: 희열"
 vikelas_bicycle_race_cheater_modifier: "자전거 경주: 반칙"
 vikelas_bicycle_race_newspaper_modifier: "자전거 경주: 보도 문화"
 vikelas_bicycle_race_repairs_modifier: "자전거 경주: 긴급 수리 허용"
 vikelas_hired_coach_recently_modifier: "최근 감독 채용"
 vikelas_basketball_modifier: "농구"
 je_vikelas_bicycle_race: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 je_vikelas_bicycle_race_reason: "기업가와 출판사, 자전거 제조사들이 공개 대회를 제안하고 있다. 신형 안전 자전거의 속력과 내구성, 가능성을 입증하기 위한 장거리 경주가 될 것이다."
 je_vikelas_basketball: "농구"
 je_vikelas_basketball_reason: "진행이 빠르고, 단체 기반에, 근대 도시에 알맞은 이 종목은 금세기를 대표할 체육 종목이 될지도 모른다."
 vikelas.21.t: "신사의 경기"
 vikelas.21.d: "[SCOPE.sState('vikelas_cricket_state').GetName]에서 여러 크리켓 선수들이 한 데 모여 처음으로 규칙을 정하고 경기에 나섰다. 이 클럽은 크리켓 부문의 선도적인 역할을 맡게 되었다."
 vikelas.21.f: "19세기는 크리켓이 시골의 여가 활동에서 국가적, 국제적으로 중요한 체육 종목으로 거듭난 시대였다. 영국의 상류층은 크리켓을 가장 좋아하는 여가 활동으로 여겼으며, 이튼 스쿨이나 해로 스쿨 같은 기숙학교에서도 '신사의 체육'이라 칭송하며 크리켓을 장려했다. 그와 동시에 노동계급에서도 인기가 높아졌는데, 특히 잉글랜드 북부를 중심으로 공장 노동자들이 자체적으로 클럽을 창설하였다. 이렇듯 크리켓의 대중화는 클럽수과 관객수의 전례 없던 성장으로 이어졌다.\n\n국제 경기도 머지않아 개최되었다. 1844년 미국 뉴욕에서 열린 캐나다와 미국 간의 경기가 세계 최초의 국제 경기로 기록되어 전해지고 있다."
 vikelas.21.g: "다음은 내가 치겠네!"
 vikelas.601.t: "보도 위의 페달"
 vikelas.601.d: "새로운 발명품이 거리에 등장했다. 앞바퀴에 직결된 페달로 움직이는 두 바퀴 달린 탈것, 이름하여 '벨로시페드'다."
 vikelas.601.f: "수도의 공원과 넓은 거리에서 사람들의 시선이 집중되었다. 모자와 조끼를 입은 신사들이 기묘한 철제 프레임 위에 올라타 페달을 세게 밟으며 깜짝 놀란 행인들 사이를 흔들거리며 지나간다. 어떤 이들은 넘어지고, 어떤 이들은 날아오른다. 아이들은 웃고, 늙은 나랏님들은 눈썹을 치켜올린다. 신문에서는 이것을 벨로시페드라 부르며, 반은 장난감, 반은 새로운 가능성을 품고 있다고 한다. 마차 제작소에서 발명한 이 '뼈 흔드는 기계'는 혁신적인 만큼이나 무겁다. 자갈길에서는 척추에 충격을 가하지만 매끄러운 산책로에서는 놀라울 정도로 우아하게 움직인다. 이것은 단순한 신기함이 아니라 새로운 형태의 움직임을 예고하는 출발점이라는 이야기가 돌고 있다."
 vikelas.601.g: "재밌는 유행이로군!"
 vikelas.602.t: "미래의 자전거"
 vikelas.602.d: "신형 자전거의 디자인이 공개되었다. 두 바퀴의 크기가 동일하고 뒷바퀴 축이 체인 구동식이며 균형감이 한층 강화된 것이 특징이다. 불안정한 하이휠 자전거와는 달리 이 '안전 자전거'는 안정성 있고 가격도 합리적이며 빠르게 호응을 얻고 있다. 발명가는 누구인가? 바로 [SCOPE.sCharacter('vikelas_bicycle_inventor_scope').GetFullName]다!"
 vikelas.602.f: "기존의 벨로시페드는 뼈와 신경을 모두 흔들어 놓았다. 높이 솟은 페니파딩은 속력에 힘을 실어주었지만 그 대가는 너무나도 컸다. 한 순간의 실수로도 자전거 운전자는 날아가 버릴 수 있었다. 이제 수도의 공방에서는 새로운 종류의 자전거가 퍼져나가고 있다. 작고 세련되고, 안전한 이 자전거는 체인 구동식 뒷바퀴와 공기압 타이어를 장착하여 여성과 노동자들도 타기 시작했다. 한때 마차가 다니던 거리에는 이제 돌길 위를 달리는 고무 타이어의 부드러운 소리가 울려 퍼진다. 카페에서든 공장에서든 사람들의 반응은 한결같다. 이것은 장난감이 아니다. 빠르고, 조용하고, 갑자기 손에 잡힐 것만 같은, 그런 자유다."
 vikelas.602.g: "이것을 탄 모든 시민들이 근대로 나아갈 수 있도록 하자."
 vikelas.611.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.611.d: "드디어 그 날이 밝았다. 전국에서 몰려온 자전거 선수들이 출발선에 모여, 탁 트인 도로에서 본인의 기량과 기계의 한계를 시험하려 한다. 온 공기가 기대감으로 가득 찼다."
 vikelas.611.f: "이미 수많은 관객으로 가득 찬 대로 위로 태양이 떠오른다. 깃발은 펄럭이고 기름내와 먼지가 아침 공기 속에 감돈다. 수십 명의 선수들이 자전거에 오른다. 어떤 것은 공장에서 갓 나온 번쩍이는 신상품, 어떤 것은 뒷골목 공방에서 기워붙인 것이다.\n총성이 울린다. 환호성이 터져 나온다. 그리고 바퀴는 돌아가기 시작한다.\n선수들은 성문을 지나 시골길로 나아간다. 농부들은 밭일을 잠시 멈추고, 아이들은 도로변을 따라 달려간다. 신부들은 축복을 내리고, 냉소적인 사람들은 비웃는다. 하지만 먼지가 뒤로 흩날리는 가운데, 군중 사이에서 묘한 예감이 피어오른다. 이것은 무언가 더 거대한 일의 서막처럼 느껴진다는 것을."
 vikelas.611.g: "온 도시에 진보의 소리가 울려 퍼지길."
 vikelas.621.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.621.d: "전국 자전거 경주 대회의 우승자가 결승선 그 이상의 것을 사로잡았다. 그것은 다름아닌 온 국민의 마음이다. 이제 모든 시선은 그가 무엇을 상징하는가에 쏠려 있다."
 vikelas.621.f: "신문에서는 그를 '강철의 라이더'라 부른다. 직조공의 집안에서 태어나 열두 살에 부모님을 잃고 열여섯 살에 공장에서 일했다. 낡고 흠집투성이인 안전 자전거를 정성껏 덧대고 기름칠한 끝에 거둔 그의 승리는 단순한 경기에서의 승리가 아니었다. 그것은 하나의 비유와도 같았다. 관객들은 그 이름을 외치고, 화가들은 그 선수를 그리고, 아이들은 그 자세를 따라한다. 하지만 그보다 중요한 것은 사상가들이 주목한다는 것이다. 어떤 이들은 노동의 힘을 상징하는 얼굴이라 하고, 또 어떤 이들은 국가의 활력을 증명했다고 말한다. 언론에서는 노동자냐, 애국자냐, 아니면 완전히 새로운 무언가냐 논쟁을 벌인다.\n정작 그는 말이 없다. 미소짓고 고개를 끄덕이며 달릴 뿐이다."
 vikelas.621.g: "노동계급의 영웅으로 추앙하자."
 vikelas.621.h: "국가적 우상으로 기리자."
 vikelas.621.i: "진보와 현대인의 상징으로 높이 평가하자."
 vikelas.622.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.622.d: "전국 자전거 경주 대회가 진행되던 도중에 비극적인 사고가 발생했다. 선수 한 명이 목숨을 잃고 여러 명이 부상당했다. 관객들의 환호도 멈추었다."
 vikelas.622.f: "바퀴가 움푹 파인 곳에 걸리면서, 비명과 충돌, 그리고 소란이 벌어졌다. 관객들은 앞으로 모여들고 자전거들은 줄줄이 걸려 넘어졌다. 피와 먼지가 뒤섞였다. 헬멧은 쪼개지고 뼈가 부러졌다. 이 사고로 공장 견습생이던 열 일곱 살 청년이 목숨을 잃었다. 언론에서는 의견이 엇갈렸다. 어떤 이들은 진보의 불가피한 대가라 칭한 반면, 공공 체육이 무모했다고 비난하는 언론도 있다."
 vikelas.622.g: "희생자의 넋을 기립시다."
 vikelas.623.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.623.d: "경기의 한 특정 구간이 대중의 마음을 사로잡았다. 관중들은 그 구간에서 펼쳐지는 모습이 단순한 경기가 아니라 전설이라 입을 모으고 있다."
 vikelas.623.f: "새벽녘에 선수들이 언덕 속으로 사라졌다. 그 후 펼쳐진 것은 더 이상 경주가 아니라 정신력의 시험이었다. 열두 명이 뒤처지고 세 명이 쓰러졌다. 한 명은 급커브에서 넘어져 피를 흘리며 도움을 거부했다. 하지만 한 명은 안개를 뚫고 앞으로 나아가 만인의 마음을 사로잡았다. 온 나라에서 들리는 이야기는 그것 뿐이다."
 vikelas.623.g: "그 선수의 분투를 온 세대가 기억하길."
 vikelas.623.h: "그 순간을 담은 그림 제작을 의뢰하자."
 vikelas.624.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.624.d: "최근 레이스 단계가 진행되고 논란이 터져나오고 있다. 한 선수가 부정행위로 적발되었는데 일각에서는 그 선수가 조금 덜 신중했을 뿐 다른 선수들과 다름없이 행동했을 뿐이라고 주장하고 있다."
 vikelas.624.f: "\"그 선수가 헛간 뒤에서 자전거를 갈아탔다는 말도 있다. 숨겨진 와이어에 매달려 언덕 위로 끌려 올라갔다는 말도 있다.\n\n진실은 가려져 있다. 분명한 것은 그 선수가 정말 빨랐다는 것이다. 놀라울 정도로 빨랐다. 험준한 오르막길을 오른 뒤에도 체력이 충분했다. 경쟁 선수들은 분노했고 관중들은 숨죽였다. 언론은 피 냄새를 맡고 달려든다. 한 사진에는 그 선수와 똑같은 옷을 입은 또다른 남자가 찍혀 있고, 야간 경기 도중에 차 한대에 이끌려 가는 것을 봤다고 주장하는 목격자도 있다. 혐의 대상에 오른 선수는 모든 정황을 부인하고, 시기심과 정치질일 뿐이라고 일축한다.\""
 vikelas.624.g: "해당 선수를 실격 처리하고 부정행위의 실체를 밝히시오."
 vikelas.624.h: "운동 정신의 명예를 위해 사건을 덮읍시다."
 vikelas.625.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.625.d: "올해 레이스 시즌은 치열한 라이벌 구도로 가득하다. 체력은 같지만 스타일은 정반대인 두 선수가 온 나라를 두 편으로 갈라놓고 있다."
 vikelas.625.f: "한쪽은 불꽃 같다. 무모하고 대담하며 젊은이들의 호응을 받고 있다. 모자를 관중에게 던지고, 페달을 밟으며 웃고, 예고 없이 추격에 나선다.\n다른 한쪽은 얼음 같다. 침착하고 계산적이며 마치 수학 같다. 힘을 아껴두었다가 단 몇 초 차이로 승리하고, 필요할 때만 말을 한다.\n\n지붕 위에서는 그들의 이름이 함성으로 울려 퍼진다. 각 도시마다 편을 가른다. 포스터는 빨간색과 파란색으로 인쇄된다. 양복점에선 두 색깔로 된 모자를 팔고, 아이들은 나무 자전거로 선수들의 자세를 흉내낸다.\n언론에선 단순한 레이스 이상의 것을 다룬다. 두 선수의 성격, 철학, 그리고 사람들이 바라던 바에 대해 이야기한다. 그리고 두 선수 모두 한치의 양보도 없다."
 vikelas.625.g: "이것으로 언론 문화에 보탬이 될 것이다."
 vikelas.625.h: "정치적 이득을 위해 라이벌 구도를 이용한다."
 vikelas.626.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.626.d: "올해 레이스 시즌은 치열한 라이벌 구도로 가득하다. 체력은 같지만 스타일은 정반대인 두 선수가 온 나라를 두 편으로 갈라놓고 있다."
 vikelas.626.f: "\"마을 대장간에서 망치를 손에 든 채, 얼굴은 그을려 새까맣게 변한 채로 혼자 서 있는 그를 발견했다.\"\n\n내리막길은 위험천만했다. 코너를 잘못 돌다가 자갈에 발이 걸려 넘어지며 앞 포크가 박살났다. 그 선수의 자전거는 상처 입은 새처럼 접혔다. 대부분의 사람이었다면 멈췄을 것이다. 하지만 그 선수는 그러지 않았다.\n그는 절뚝거리며 프레임을 질질 끌면서 몇 킬로미터를 걸어내려갔다. 외딴 마을에서 대장간을 발견했다. 정비사도, 단체용 차량도 없었다. 남은 것은 풀무와 모루, 그리고 자신의 두 손 뿐.\n소매를 걷어붙이고 이 악물고 몇 시간 동안 기억과 감에 의존해 앞 포크를 다시 만들었다. 관계자들이 도착하자, 그 선수는 잠시 멈춰 서서 노려보며 말했다. \"만지지 마십시오.\"\n선두보다 8시간이나 뒤처진 그는 다시 출발했다. 승리할 가능성은 없다. 그러나 길을 따라 늘어선 군중들은 환호했다. 승자를 위해서가 아닌, 멈추지 않고 계속 나아간 그를 위해서였다."
 vikelas.626.g: "인상깊은 이야기일세."
 vikelas.626.h: "긴급 수리를 허가하라."
 vikelas.626.i: "이 선수를 기리자!"
 vikelas.401.t: "국제 축구 연맹"
 vikelas.401.d: "오늘 [GetGlobalVariable('vikelas_fifa_seat_global_var').GetStateRegion.GetCityHubName]에서 국제 축구 연맹이 창설되었다. 정식 명칭은 '국제 축구 협회 연맹'(FIFA)라고 한다."
 vikelas.401.f: "1904년 5월 21일, 벨기에와 덴마크, 프랑스, 네덜란드, 스페인, 스웨덴, 스위스 등 7개국 대표들이 한자리에 모여 헌장에 서명하였다. 헌장의 목표는 축구 규칙의 표준을 마련하고, 국제 경기를 조직하며, 축구를 세계적 수준으로 끌어올리는 것이었다. 이로써 국제 축구 연맹, 약칭 FIFA가 탄생하게 되었다. 초창기 FIFA는 소박한 모습이었다. 회장직은 비정기직이었고, 아마추어 선수들이 출전했으며, 지역간의 분쟁도 존재했다. 그러나 그 이면에는 국제적인 운동이 발돋움하고 있었다. 영국(잉글랜드)은 외국의 간섭을 우려하여 가입을 망설였고, 남미 국가들도 자체적인 축구 연맹을 결성하기 시작했다. 1924년과 1928년 올림픽 축구 대회는 축구의 진정한 위상을 보여주었다. 파리 올림픽에서는 6만 명의 관중이 모여 군대가 아닌 자국팀을 응원하였다."
 vikelas.401.g: "FIFA에 가입하여 국제 대회를 지지합시다."
 vikelas.411.t: "[TimeKeeper.GetCurrentDate.Format('y')]년 축구 월드컵"
 vikelas.411.d: "FIFA는 올해 월드컵 대회를 [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]에서 치르기로 결정하였다. 예선전에 출전하는 국가는 총 8개국으로 좁혀졌다."
 vikelas.411.f: "#V 다음은 8강전 출전권을 확보한 국가대표팀의 목록이다.#!\n\n[SCOPE.sCountry('vikelas_first_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_second_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_third_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fourth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fifth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_sixth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_seventh_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_eighth_qualified_team_scope').GetName]"
 vikelas.411.g: "최고의 팀이 승리하기를."
 vikelas.412.t: "세계 챔피언"
 vikelas.412.d: "우리나라가 온 대륙의 정상급 선수들을 물리치고 세계 무대에 우뚝 섰다. 축하 물결로 전국이 들썩이고 있다!"
 vikelas.412.f: "우리 팀은 [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]에서 열린 월드컵 결승전에서 [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName]과의 치열한 경기 끝에 우승 자격을 증명하였다. 우리 대표팀은 황금 트로피를 들어올렸다. 경기 종료 휘슬이 라디오와 카페, 병영을 가리지 않고 울려퍼졌다. 북방의 광부들부터 항구의 상인들까지, 온 국민이 하나되어 함성을 질렀다. 대표팀의 주장은 시상대에서 눈물을 감추지 못했다. 신세대는 이날을 지켜보며 꿈을 꾸었다."
 vikelas.412.g: "우리가 챔피언이다."
 vikelas.413.t: "[SCOPE.sCountry('vikelas_fifa_host_scope').GetName]에 펼쳐진 은빛 영광"
 vikelas.413.d: "우리 축구팀이 결승전에 진출하였으나 우승의 영광은 놓치고 말았다. 전국에서 자부심과 실망감이 뒤섞여 퍼지고 있다."
 vikelas.413.f: "최선을 다한 우리 대표팀이었지만 아쉽게도 충분치 않았던 모양이다. [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] 팀을 상대로 손에 땀을 쥐게 만드는 경기에서 우리 선수들은 패배를 맞이하였다. 몇 주 동안 그들은 온 국민의 희망을 짊어졌다. 진흙탕의 경기장과 눈부신 열기 속에서, 그들은 달렸고, 싸웠고, 믿음을 이어나갔다. 경기마다 그들은 전설이 되었다. 상대 국가가 연주되는 동안에도 그들은 고개를 꼿꼿이 들었다. 눈물은 없고 오직 침묵만이 감돌 뿐. 그리고 천천히, 박수 소리가 커져갔다."
 vikelas.413.g: "우승 기회를 빼앗기다니!"
 vikelas.414.t: "일찍 끝나버린 꿈"
 vikelas.414.d: "우리 국가 대표팀은 [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]에서 열린 FIFA 월드컵에서 조기에 탈락하였다. 결승전에서는 [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] 팀이 [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] 팀을 상대로 우승하였다."
 vikelas.414.f: "희망은 있었다. 실질적이고 구체적인 희망이었다. 공장의 마당에서는 승리의 함성이 울려 퍼졌고, 교회에서는 라디오 중계 소리가 언뜻 들려왔으며, 아이들은 골목에서 골 장면을 따라했다. 대표팀은 축구 이상의 의미를 지녔다. 야망과 자부심, 그리고 우리 스스로를 뛰어넘을 수 있다는 믿음 말이다. 하지만 마지막 경기가 모든 것을 바꿔놓았다. 단 한 골의 실점. 눈에 보이지도 않은 핸드볼 반칙. 놓쳐버린 기회. 이제 꿈은 끝났고 세상은 계속 흘러간다."
 vikelas.414.g: "기대를 걸었지만... 그만하면 잘 했지."
