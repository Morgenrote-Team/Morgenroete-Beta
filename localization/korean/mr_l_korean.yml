 mr_hide_geography_decisions_tt: "모든 지역 디시전을 숨깁니다."
 mr_appoint_chief_engineer: "Appoint Chief Engineer"
 mr_appoint_chief_engineer_desc: "With a chief engineer, the monthly construction progress of monuments get an additional construction point."
 mr_dismiss_chief_engineer: "Dismiss Chief Engineer"
 mr_visiting_museum_tt: "Not currently visiting the Museum."
 mr_visiting_observatory_tt: "Not currently visiting the Observatory."
 mr_visiting_opera_tt: "Not currently visiting the Opera."
 mr_visiting_zoo_tt: "Not currently visiting the Zoo."
 mr_visiting_fossils_tt: "Not currently visiting the Paleontological Collection."
 mr_visiting_human_evolution_tt: "Not currently visiting the Anthropological Collection."
 mr_visiting_scientific_society_tt: "Not currently visiting the [concept_academics_scientific_society]."
 je_mr_scientific_conferences: "Scientific Conferences"
 je_mr_scientific_conferences_reason: "How old is the earth? Where does man come from? How credible is the Bible as a historical source? Is the universe infinite - and what are galaxies actually? Over the course of a hundred years, not only science as such, but also people's view of the world has changed significantly. The theory of evolution has shaken man's certainty just as much as the theory of relativity. Scientific conferences are intended to clarify some of the fundamental questions by having international scientists discuss them."
 mr_exodus_congress_egyptian_artifacts_tt: "We need at least #G 25#! #O @lepsius_egypt_minor! Egyptian Artifacts#!."
 mr_exodus_congress_global_artifacts_tt: "International archaeological research must have secured a total of #BLUE 150 #! #O Artifacts#!. Currently [GetGlobalVariable('lepsius_global_artifacts').GetValue] #O Artifacts#! have been recovered."
 mr_civilization_congress_mesopotamian_artifacts_tt: "We need at least #G 25#! #O @lepsius_mesopotamia_minor! Mesopotamian Artifacts#!."
 mr_civilization_congress_global_artifacts_tt: "International archaeological research must have secured a total of #BLUE 300 #! #O Artifacts#!. Currently [GetGlobalVariable('lepsius_global_artifacts').GetValue] #O Artifacts#! have been recovered."
 mr_troy_congress_aegean_artifacts_tt: "We need at least #G 25#! #O @lepsius_aegean_minor! Aegean Artifacts#!."
 mr_troy_congress_global_artifacts_tt: "International archaeological research must have secured a total of #BLUE 500 #! #O Artifacts#!. Currently [GetGlobalVariable('lepsius_global_artifacts').GetValue] #O Artifacts#! have been recovered."
 mr_hippocampus_congress_specimen_tt: "We need at least #G 20000#! @dubois_specimen! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]."
 mr_hippocampus_congress_global_specimen_tt: "International naturalist research must have secured a total of #BLUE 100000 #! @dubois_specimen! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]. Currently [GetGlobalVariable('dubois_global_specimen').GetValue] #O Specimens#! have been collected."
 mr_origin_congress_human_fossil_tt: "We need at least #G 10#! @dubois_human_fossil! #O Human Fossils#!."
 mr_origin_congress_special_human_fossil_tt: "We need at least #G 3#! @dubois_human_fossil! #O Human Fossils#! from one of these species: Homo Neanderthalensis, Homo Erectus, Australopithecus or Paranthropus."
 mr_origin_congress_global_human_fossil_tt: "International anthropologist research must have secured a total of #BLUE 50 #! @dubois_human_fossil! #O Human Fossils#!. Currently [GetGlobalVariable('dubois_global_human_fossil').GetValue] #O Human Fossils#! have been found."
 mr_extinction_congress_fossil_tt: "We need at least #G 5#! @dubois_dinosaur_skeleton! [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')]."
 mr_extinction_congress_global_fossil_tt: "International paleontologist research must have secured a total of #BLUE 500 #! @dubois_fossil! [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]. Currently [GetGlobalVariable('dubois_global_fossil').GetValue] @dubois_fossil! [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] have been found."
 je_mr_archaeology: "Archaeology"
 je_mr_archaeology_reason: "The 19th century and the beginning of the 20th century saw a rapid development in the field of antiquity research: from treasure digging to serious science. The excavation of Troy by Heinrich Schliemann and the discovery of the tomb of Tutankhamen by Howard Carter are just two of the most famous highlights of this era. At the same time, they show that not only scientific thirst, but also national prestige played an important role in recovering valuable artifacts. With the (almost) complete decipherment of the Egyptian hieroglyphs by Karl Richard Lepsius in 1837, this new era was to begin."
 mr_romantic_composer_button: "Hire a new [concept_elgar_composer] (Romanticism)"
 mr_composer_button_desc: "Unlike [Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')], ordinary [Concept('concept_elgar_composer','$concept_elgar_composers$')] are responsible for day-to-day operations. They can be hired as conductors and give their country a passive [concept_elgar_musical_tradition] bonus. A composer can be hired three times per game, which requires research into a specific technology (Romanticism, Irrationalism, Neoclassicism/New Objectivity/Art Deco). A country can only support one ordinary composer, and a ten-year investment in the country's musical culture is required."
 mr_wagnerian_composer_button: "Hire a new [concept_elgar_composer] (Irrationalism)"
 mr_modern_composer_button: "Hire a new [concept_elgar_composer] (Modern)"
 mr_appoint_conductor_button: "Appoint a Chief Conductor"
 mr_appoint_conductor_button_desc: "Conductors run the national music business, particularly a country's leading [Concept('concept_elgar_opera','$concept_elgar_opera_house$')]. In the opera house they can be entrusted with a specific task for three years: conducting, composing or a tour. In this way they are similar to the [Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')], although their earnings for the [concept_elgar_musical_tradition] are kept within manageable limits."
 mr_national_conservatory_button: "Found a National Conservatory"
 mr_national_conservatory_button_desc: "\"With a Conservatory, there is a chance that characters with the Composer trait will appear over time without having to hire them. The chance is very small, but it is there. The probability can be increased with a ballet school in one of our opera schools."
 mr_santa_cecilia_button: "Make Santa Cecilia an Academy"
 mr_santa_cecilia_button_desc: "The Accademia di Santa Cecilia was founded by the papal bull 'Ratione congruit' by Sixtus V in 1585 in the form of a congregation. In 1838 the Congregation of Saint Cecilia was officially named an Academy and then the Pontifical Academy. Its members at that time included Luigi Cherubini, Mercadante, Donizetti, Rossini, Paganini, Auber, Liszt, Mendelssohn, Berlioz, Gounod and Meyerbeer. One of its honorary members was Queen Victoria. In united Italy it developed into a leading conservatory."
 mr_leipzig_conservatory_button: "Found the Leipzig Conservatory"
 mr_leipzig_conservatory_button_desc: "The traditional music city of Leipzig, where Johann Sebastian Bach was already active, offered optimal conditions for the founding of a musical and academic talent factory at the beginning of the 19th century. Four committed citizens of the city, namely the lawyer Heinrich Conrad Schleinitz (second director), the district director of Leipzig Johann Paul von Falkenstein and the Royal Saxon Court Councilor Johann Georg Keil as well as the Gewandhaus Kapellmeister Felix Mendelssohn Bartholdy put the previous ideas into practice."
 mr_petrograd_conservatory_button: "Found the Petrograd Conservatory"
 mr_petrograd_conservatory_button_desc: "On the initiative of the Grand Duchess Elena Pavlovna, Anton Rubinstein, Andrei Nikolayevich Markovich and other personalities of society and musical life, the Russian Music Society was founded, from whose music classes the first conservatory in Russia was founded. Anton Rubinstein was the first director of the conservatory and professor of piano. The first graduate to complete his composition studies here was Peter Tchaikovsky. Nikolai Andreyevich Rimsky-Korsakov had a particularly influential role as professor of composition and instrumentation and head of the orchestra class."
 mr_bayreuth_button: "Establish the Richard Wagner Festival"
 mr_bayreuth_button_desc: "Richard Wagner has long dreamed of having his own festival hall where his greatest works are performed every year. Such a place could quickly become a place of pilgrimage for all music enthusiasts and would be a lasting, living memorial in his honor."
