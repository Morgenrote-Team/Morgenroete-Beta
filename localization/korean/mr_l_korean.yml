 objective_thriving_culture_name_BAV: "바이에른"
 objective_thriving_culture_desc_BAV: "바이에른은 언제든 독일의 주요 국가들과 경쟁할 수 있는 문화적 역량을 갖추고 있었습니다. 19세기는 뮌헨에서 예술과 건축이 번성한 시대였습니다. 바이에른은 발할라와 노이슈반슈타인성은 물론, 시조새 화석이 발견되고, 뮌헨 분리파의 본고장이자, 화가 슈피츠베크의 고향이기도 했습니다. 독일의 중견국 바이에른이 군사력 의존도를 줄이고 과학과 예술에 더 집중하는 방식으로 이웃 강대국에 맞서 자국을 지킬 수 있을까요?"
 objective_thriving_culture_name_MEX: "멕시코"
 objective_thriving_culture_desc_MEX: "언뜻 보면 멕시코는 문화 번성을 이루기에는 최적의 선택이 아닌 것처럼 보일 수 있습니다. 하지만 풍부한 고고학적 역사는 그 가능성을 열어줍니다. 이론상 멕시코는 북서항로 개척에 획기적인 성과를 거둘 수도 있습니다. 여러 위기에 시달리는 이 나라가 화합을 이룬다면, 벨라스 아르테스 궁전처럼 예술적 성공의 영예를 거둘 것입니다."
 je_mr_morgenrote_introduction_reason: "[concept_morgenroete]는 과학과 예술, 문화에 중점을 둔 모드입니다. 여러 새로운 매커니즘과 풍부한 콘텐츠를 선보이고 있습니다. 모드에 관한 전반적인 개요를 보려면 메뉴 창에서 빅토백과를 열람하거나, 지금 보시는 이 [Concept('concept_morgenroete','$concept_morgenroete_concept$')]에 마우스를 올려놓아 어떤 모드인지를 확인해 보세요.\n\n모르겐뢰테의 컨텐츠 대부분에 접근하려면 본 일지 항목의 버튼을 클릭하거나 사이드바 근처의 버튼을 클릭하세요. 본 일지 항목의 버튼은 항상 작동합니다."
 je_objective_cradle_of_culture_tt: "#ORANGE 인상주의#!, #ORANGE 표현주의#!, #ORANGE 아르누보#!를 처음으로 연구한 국가 되기"
 mr_divider_for_je: "              @divider_start!@divider_mid!@divider_mid!@divider_mid!@divider_mid!@divider_mid!@divider_end!"
 objective_thriving_culture_name_SWE: "스웨덴"
 objective_thriving_culture_desc_SWE: "지난 100년 간 스웨덴은 선도적인 과학 강국으로 부상하여 생물 이명법, 섭씨 온도, 화학 원소 기호 체계 등 과학 부문에 지대한 공헌을 하였습니다.\n   스웨덴은 과학 부문의 선두 주자를 계속해서 지킬 수 있을까요? 아니면 이제 작가와 작곡가를 육성하여 문화 분야를 끌어올리는 쪽으로 관심을 돌려야 할 때일까요?"
