 dlc_morgenrote: "Morgenröte - Dawn of Flavor"
 dlc_morgenrote_desc: "Morgenröte – Dawn of Flavor is a Mod to enrich the world of Victoria 3 with culture, beauty and lifestyle. Our approach is not to improve the map or the economy, but to improve all those aspects of the Victorian century that only appear briefly in the previously sterile game world. These include immersive scientific expeditions, increasing prestige through culture, and training artists and scientists.\n\nDon't worry, Morgenröte is #p active#!."
