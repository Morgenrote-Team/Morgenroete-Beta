l_korean:
 objective_thriving_culture: "번성하는 문화"
 objective_thriving_culture_desc: "어느 야만 국가든 한 땅덩어리를 정복할 수 있습니다. 그러나 진정한 문명은 과학과 문화 분야에서 드러납니다. 고고학적 보물을 발굴하고, 새로운 별과 행성을 발견하며, 작곡가를 고용하고, 이국적인 동식물을 수집하며, 연구 여행에 나서거나 항공 시대의 기록을 세우세요. 새로운 아침이 밝아옵니다!"
 objective_thriving_culture_name_AUS: "오스트리아"
 objective_thriving_culture_desc_AUS: "벨라 제란트 알리, 오스트리아 구름이여! 오스트리아의 전성기는 끝난 것일까요? 비엔나 회의와 메테르니히는 오스트리아를 마지막으로 유럽의 중심에 다시 세웠지만, 프로이센과 러시아의 야망이 합의 지향적인 합스부르크 제국의 정책을 위협하고 있습니다. 과거처럼, 오스트리아는 앞으로도 문화와 라이프스타일의 중심지가 되어 승리할 수 있을까요? 비엔나의 음악 도시로서의 명성을 지키고, 유럽에서 가장 매력적인 도시로 발전시켜야 합니다."
 objective_thriving_culture_name_BEL: "벨기에"
 objective_thriving_culture_desc_BEL: "벨기에는 경제 강국으로서의 야망뿐 아니라 고생물학, 천문학, 그리고 태평양 탐험 등 과학 분야에서 번창할 다양한 가능성을 지니고 있습니다. 작은 이 나라는 전쟁으로 얻는 명성을 대신해 세계적인 명성을 공고히 할 수 있습니다. 콩고는 단순한 식민지인가요, 아니면 식물 탐사대의 목적지인가요? 그리고 브뤼셀은 단순한 작곡가들의 경유지에 불과한가요, 아니면 국가가 자체적인 음악 전통을 세우려는 시도를 할 것인가요?"
 objective_thriving_culture_name_SAR: "사르데냐-피에몬테"
 objective_thriving_culture_desc_SAR: "사르데냐-피에몬테는 곤란한 상황에 처해 있습니다. 한편으로는 이탈리아 민족을 통일할 정치적·군사적 역량을 모을 수 있을지, 다른 한편으로는 이탈리아 문화 국가로서의 명성을 지켜낼 수 있을지 고민해야 합니다. 통일된 이탈리아는 몰레 안토넬리아 건설과 음악적 성공, 슈나이더 트로피의 비행 기록 등 새로운 기회를 맞이하게 될 것입니다."
 objective_thriving_culture_name_SWI: "스위스"
 objective_thriving_culture_desc_SWI: "내륙국인 스위스는 먼 지역으로의 탐험에 있어서는 불리할 수 있지만, 자국 내에서는 상당한 잠재력을 지니고 있습니다. 고전 음악 진흥에 대한 현명한 결정은 알프스 국가가 위대한 작곡가 중 한 명이 머무를 수 있도록 동기를 부여하게 합니다. 고생물학에서는 한 지층의 형성이 유용하게 작용하며, 알프레트 에셔가 구상한 세기의 대사업, 산맥 한가운데를 관통하는 거대한 터널도 여전히 존재합니다."
 objective_thriving_culture_idle_header: "계속 진행할 것이다"
 objective_thriving_culture_idle_hint: "앞으로 더 많은 도전이 나타날 것이다"
 thriving_culture_welcome: "모르겐뢰테에 오신 것을 환영합니다!"
 thriving_culture_welcome_desc: "문화 경로를 선택하신 것을 축하합니다! 이것은 '모르겐뢰테' 시나리오입니다. 문화와 과학만을 바탕으로 평화롭게 국가를 세계 정상에 올려보세요."
 thriving_culture_lesson_button_skip: "힘내라!"
 thriving_culture_complete_desc: "축하합니다! 당신의 나라는 이 시대의 문화적 모범이 되었습니다! 정말로 '모르겐뢰테'의 모든 면모를 발견했습니까? 지구의 중심까지 여행해 보았나요? 잃어버린 세계를 다시 찾았나요? 아틀란티스를 발견했나요? 샹그릴라를 찾았나요? 아니라고요? 그렇다면 어떻게 모든 것을 이뤘다고 할 수 있겠습니까?"
 thriving_culture_lesson_button_complete: "더 있다고?"
 je_objective_promote_an_academic: "[concept_academics_academic] 홍보하기"
 je_objective_promote_an_academic_reason: "다양한 과학 및 문화 활동을 추구하기 위해서는 학문 진흥이 불가피합니다."
 je_objective_a_great_step_forward: "위대한 진전"
 je_objective_a_great_step_forward_reason: "자국은 핵심 과학 기술을 탐구함으로써 중요한 역사적 이정표를 세워야 합니다."
 je_objective_a_great_step_forward_theory_of_evolution_tt: "Discover the #b Theory of Evolution#! as the first nation."
 je_objective_a_great_step_forward_early_archaeology_tt: "Discover #b Early Archaeology#! as the first nation."
 je_objective_a_great_step_forward_modern_astronomy_tt: "Discover #b Modern Astronomy#! as the first nation."
 je_objective_a_great_step_forward_steel_frame_tt: "Discover #b Steel Frame Buildings#! as the first nation."
 je_objective_major_discovery: "A Major Discovery"
 je_objective_major_discovery_reason: "The Faustian spirit of our age calls for testing the extremes. We should make a great discovery for the glory of our nation!"
 je_objective_go_on_scientifical_expedition: "Finance a Scientifical Expedition"
 je_objective_go_on_scientifical_expedition_reason: "A scientific expedition is fundamental to the continued research of our academics and the enrichment of our museums and collections. We should hire an academic to do one as soon as possible."
 je_objective_go_on_scientifical_expedition_archaeology: "Active [concept_lepsius_expedition]."
 je_objective_go_on_scientifical_expedition_paleontology: "Active [concept_dubois_paleontological_expedition]."
 je_objective_go_on_scientifical_expedition_botany: "Active [concept_dubois_botanical_expedition]."
 je_objective_go_on_scientifical_expedition_pacific: "Active [concept_dubois_pacific_expedition]."
 je_objective_dawn_of_a_new_era: "Dawn of a New Era"
 je_objective_dawn_of_a_new_era_reason: "In the 19th century, pure passion for collecting turned into scientific methods and systematics. No corner of the planet is inaccessible anymore, no past, no matter how dark, seems unfathomable. Everything can be measured, analyzed and interpreted. It is time to create a scientific collection that lives up to this claim."
 dawn_of_new_era_fossil_tt: "Collect #G 25#! [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]."
 dawn_of_new_era_specimen_tt: "Collect #G 35,000#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]."
 dawn_of_new_era_artifacts_tt: "Collect #G 50#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]."
 dawn_of_new_era_astronomical_objects_tt: "Map #G 75#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]."
 je_objective_more_than_politics: "More than Politics"
 je_objective_more_than_politics_reason: "Beauty and truth have a greater value than the despicable struggle for power. The construction of significant scientific and cultural institutions should be a sign of what really counts in the face of history."
 je_objective_assemble_dinosaur_skeleton: "Reconstruct a Dinosaur"
 je_objective_assemble_dinosaur_skeleton_reason: "The paleontological efforts of our country should not be neglected. An imposing dinosaur skeleton could be the start of an exquisite collection!"
 je_objective_relevant_culture: "Internationally Relevant Culture"
 je_objective_relevant_culture_reason: "At home we have already demonstrated our affinity for the fine arts and sciences, but in order for the whole world to know this, we must greatly increase our efforts - in which field we specialize is entirely up to us."
 relevant_culture_astronomy_tt: "Host an #O Astronomical Congress#!."
 relevant_culture_music_tt: "Have a #O Regionally important#! [concept_elgar_musical_tradition]."
 je_objective_cradle_of_culture: "Cradle of Culture"
 je_objective_cradle_of_culture_reason: "New forms of art are replacing the rigid forms of historicism, mannerism and realism. A new era has begun. Our nation must be at the forefront of this new dawn and be the flagship of the avant-garde!"
 je_objective_thriving_culture: "번성하는 문화"
 je_objective_thriving_culture_reason: "In order to become the most important cultural nation in the world, we have to show our aesthetic sense and our scientific understanding in all facets."
 thriving_culture_archaeological_discovery_tt: "Makes a great #O Archeological Discovery#!."
 thriving_culture_great_comet_tt: "Discover a [concept_verrier_comet]."
 thriving_culture_great_composer_tt: "Hire at least one [concept_elgar_great_composer] in the game."
