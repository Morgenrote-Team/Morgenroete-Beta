 objective_thriving_culture_name_BAV: "바이에른"
 objective_thriving_culture_desc_BAV: "바이에른은 언제든 독일의 주요 국가들과 경쟁할 수 있는 문화적 역량을 갖추고 있었습니다. 19세기는 뮌헨에서 예술과 건축이 번성한 시대였습니다. 바이에른은 발할라와 노이슈반슈타인성은 물론, 시조새 화석이 발견되고, 뮌헨 분리파의 본고장이자, 화가 슈피츠베크의 고향이기도 했습니다. 독일의 중견국 바이에른이 군사력 의존도를 줄이고 과학과 예술에 더 집중하는 방식으로 이웃 강대국에 맞서 자국을 지킬 수 있을까요?"
 objective_thriving_culture_name_MEX: "멕시코"
 objective_thriving_culture_desc_MEX: "언뜻 보면 멕시코는 문화 번성을 이루기에는 최적의 선택이 아닌 것처럼 보일 수 있습니다. 하지만 풍부한 고고학적 역사는 그 가능성을 열어줍니다. 이론상 멕시코는 북서항로 개척에 획기적인 성과를 거둘 수도 있습니다. 여러 위기에 시달리는 이 나라가 화합을 이룬다면, 벨라스 아르테스 궁전처럼 예술적 성공의 영예를 거둘 것입니다."
 je_mr_morgenrote_introduction_reason: "[concept_morgenroete] is a mod that focuses on science, arts and culture. It includes many new mechanics and a lot of content. To get a general overview over the mod, try to use the concepts either by going into the menu and to the Vickypedia or by hovering over this [Concept('concept_morgenroete','$concept_morgenroete_concept$')].\n\nTo access most of the Morgenröte content, either click the button in this journal entry or the one close to the sidebar. The button in this journal entry should always work."
 je_objective_cradle_of_culture_tt: "#ORANGE 인상주의#!, #ORANGE 표현주의#!, #ORANGE 아르누보#!를 처음으로 연구한 국가 되기"
