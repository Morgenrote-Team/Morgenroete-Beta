 objective_thriving_culture_name_SWE: "Sweden"
 objective_thriving_culture_desc_SWE: "Over the past 100 years, Sweden has emerged as a leading scientific nation, making significant contributions to science including a system for naming organisms, the Celsius temperature scale, and a system of element symbols for chemical elements. \n   Can Sweden maintain its position at the forefront of science, or is it time to redirect attention toward cultural pursuits, nurturing writers and composers?"
