 setting_mr_tech_normal_rule_desc: "모르겐뢰테의 여러 이벤트를 통해 당신의 국가에서 진행하는 특정 기술 연구에 소량의 보너스를 선사합니다. 현재 설정은 #V 일반 값#!으로 되어 있습니다."
 setting_mr_tech_half_rule: "#V 기술 보너스#!#n 절반#!"
 setting_mr_tech_half_rule_desc: "모르겐뢰테의 여러 이벤트를 통해 당신의 국가에서 진행하는 특정 기술 연구에 소량의 보너스를 선사합니다. 현재 설정은 #n 절반 값#!으로 되어 있습니다. 이것으로 연구 속도가 다소 느려질 수 있습니다."
