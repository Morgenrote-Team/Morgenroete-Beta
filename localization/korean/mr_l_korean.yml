l_korean:
 objective_thriving_culture: "번성하는 문화"
 objective_thriving_culture_desc: "어느 야만 국가든 한 땅덩어리를 정복할 수 있습니다. 그러나 진정한 문명은 과학과 문화 분야에서 드러납니다. 고고학적 보물을 발굴하고, 새로운 별과 행성을 발견하며, 작곡가를 고용하고, 이국적인 동식물을 수집하며, 연구 여행에 나서거나 항공 시대의 기록을 세우십시오. 새로운 아침이 밝아옵니다!"
 objective_thriving_culture_name_AUS: "오스트리아"
 objective_thriving_culture_desc_AUS: "벨라 제란트 알리, 오스트리아 구름이여! 오스트리아의 전성기는 끝난 것일까요? 비엔나 회의와 메테르니히는 오스트리아를 마지막으로 유럽의 중심에 다시 세웠지만, 프로이센과 러시아의 야망이 합의 지향적인 합스부르크 제국의 정책을 위협하고 있습니다. 과거처럼, 오스트리아는 앞으로도 문화와 라이프스타일의 중심지가 되어 승리할 수 있을까요? 비엔나의 음악 도시로서의 명성을 지키고, 유럽에서 가장 매력적인 도시로 발전시켜야 합니다."
 objective_thriving_culture_name_BEL: "벨기에"
 objective_thriving_culture_desc_BEL: "벨기에는 경제 강국으로서의 야망뿐 아니라 고생물학, 천문학, 그리고 태평양 탐사 등 과학 분야에서 번성할 여러 가능성을 지니고 있습니다. 조그마한 이 나라는 전쟁으로 얻는 명성보다 세계적인 명성을 공고히 할 수 있습니다. 콩고는 단순한 식민지일까요, 아니면 식물 탐사대의 목적지일까요? 그리고 브뤼셀은 단순한 작곡가들의 경유지에 불과할까요, 아니면 나라 고유의 음악 전통을 세우려는 시도를 할 것인가요?"
 objective_thriving_culture_name_SAR: "사르데냐-피에몬테"
 objective_thriving_culture_desc_SAR: "사르데냐-피에몬테는 곤란한 상황에 처해 있습니다. 한편으로는 이탈리아 민족을 통일할 정치적·군사적 역량을 모을 수 있을지, 다른 한편으로는 이탈리아 문화 국가로서의 명성을 지켜낼 수 있을지 고민해야 합니다. 통일된 이탈리아는 몰레 안토넬리아 건설과 음악적 성공, 슈나이더 트로피의 비행 기록 등 새로운 기회를 맞이하게 될 것입니다."
 objective_thriving_culture_name_SWI: "스위스"
 objective_thriving_culture_desc_SWI: "내륙국인 스위스는 먼 지역으로의 탐험에 있어서는 불리할 수 있지만, 자국 내에서는 상당한 잠재력을 지니고 있습니다. 고전 음악 진흥에 대한 현명한 결정은 알프스 국가가 위대한 작곡가 중 한 명이 머무를 수 있도록 동기를 부여하게 합니다. 고생물학에서는 한 지층의 형성이 유용하게 작용하며, 알프레트 에셔가 구상한 세기의 대사업, 산맥 한가운데를 관통하는 거대한 터널도 여전히 존재합니다."
 objective_thriving_culture_idle_header: "뻗어나가는 길"
 objective_thriving_culture_idle_hint: "앞으로 더 많은 도전 과제가 나타납니다"
 thriving_culture_welcome: "모르겐뢰테에 오신 것을 환영합니다!"
 thriving_culture_welcome_desc: "문화 루트를 택하신 것을 축하합니다! 본 루트는 '모르겐뢰테'의 시나리오입니다. 오로지 문화적, 과학적 측면을 바탕으로 국가를 세계 정상에 평화롭게 등극해 보십시오."
 thriving_culture_lesson_button_skip: "가자!"
 thriving_culture_complete_desc: "축하합니다! 당신의 나라는 이 시대의 문화적 모범이 되었습니다! 정말로 '모르겐뢰테'의 모든 면모를 발견했습니까? 지구의 중심까지 여행해 보았나요? 잃어버린 세계를 다시 찾았나요? 아틀란티스를 발견했나요? 샹그릴라를 찾았나요? 아니라고요? 그렇다면 어떻게 모든 것을 이뤘다고 할 수 있겠습니까?"
 thriving_culture_lesson_button_complete: "더 있다고?"
 je_objective_promote_an_academic: "[concept_academics_academic] 양성"
 je_objective_promote_an_academic_reason: "다양한 과학 문화 활동을 추진하기 위해서는 학문의 진흥이 불가피하다."
 je_objective_a_great_step_forward: "위대한 진전"
 je_objective_a_great_step_forward_reason: "우리나라는 핵심 과학 기술을 연구하여 중요한 역사적 이정표를 세워야 한다."
 je_objective_a_great_step_forward_theory_of_evolution_tt: "#b 진화론#!을 처음으로 제시한 국가 되기"
 je_objective_a_great_step_forward_early_archaeology_tt: "#b 초기 고고학#!을 처음으로 연구한 국가 되기"
 je_objective_a_great_step_forward_modern_astronomy_tt: "#b 근대 천문학#!을 처음으로 연구한 국가 되기"
 je_objective_a_great_step_forward_steel_frame_tt: "#b 강철 골조 건물#!을 처음으로 연구한 국가 되기"
 je_objective_major_discovery: "중대한 발견"
 je_objective_major_discovery_reason: "우리 시대의 파우스트 정신은 극한의 시험을 부른다. 우리는 조국의 영광을 위해 위대한 발견을 해야 한다!"
 je_objective_go_on_scientifical_expedition: "과학 탐사단 지원"
 je_objective_go_on_scientifical_expedition_reason: "과학 탐사는 우리 학자들의 지속적인 연구와 박물관과 소장품의 강화에 필수적입니다. 이를 위해서는 하루빨리 학자를 채용하여야 합니다."
 je_objective_go_on_scientifical_expedition_archaeology: "[concept_lepsius_expedition] 활성화"
 je_objective_go_on_scientifical_expedition_paleontology: "[concept_dubois_paleontological_expedition] 활성화"
 je_objective_go_on_scientifical_expedition_botany: "[concept_dubois_botanical_expedition] 활성화"
 je_objective_go_on_scientifical_expedition_pacific: "[concept_dubois_pacific_expedition] 활성화"
 je_objective_dawn_of_a_new_era: "새 시대의 여명"
 je_objective_dawn_of_a_new_era_reason: "19세기에 이르러 수집을 향한 순수한 열정이 과학적 수단과 체계화로 발전하였다. 이제 지구 상의 어느 곳에도 접근할 수 있고, 아무리 컴컴한 과거라도 이해할 수 없는 것은 없다. 무엇이든 측정하고 분석하고 해석할 수 있게 된 것이다. 이제 이러한 요구에 걸맞은 과학적 수집품을 구축할 시간이다."
 dawn_of_new_era_fossil_tt: "[Concept('concept_dubois_fossil','$concept_dubois_fossils$')] #G 25점#! 수집"
 dawn_of_new_era_specimen_tt: "[Concept('concept_dubois_specimen','$concept_dubois_specimens$')] #G 35,000점#! 수집"
 dawn_of_new_era_artifacts_tt: "[Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] #G 50점#! 수집"
 dawn_of_new_era_astronomical_objects_tt: "[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] #G 75개#! 관측"
 je_objective_more_than_politics: "정치보다 중한"
 je_objective_more_than_politics_reason: "미(美)와 진리는 비겁한 권력 투쟁보다 훨씬 더 큰 가치를 지닙니다. 주요 과학 연구소와 문화 기관의 건설은 역사 앞에 진정으로 중요한 것이 무엇인지를 보여주는 증표가 되어야 합니다."
 je_objective_assemble_dinosaur_skeleton: "공룡 복원"
 je_objective_assemble_dinosaur_skeleton_reason: "우리나라의 고생물학 연구는 결코 소홀해서는 안 될 것이다. 당당한 공룡 골격이야말로 훌륭한 소장품의 출발점이 될 것이다!"
 je_objective_relevant_culture: "세계적 수준에 걸맞는 문화"
 je_objective_relevant_culture_reason: "우리는 국내에서는 예술과 과학을 향한 애정을 보여주었지만, 이를 전세계에 알리기 위해서는 더욱 큰 노력을 기울여야 한다. 어떤 분야에 주력할 지는 전적으로 우리에게 달렸다."
 relevant_culture_astronomy_tt: "#O 천문 학술회의#! 개최"
 relevant_culture_music_tt: "[concept_elgar_musical_tradition]이 #O 전략 지역을 대표하는 수준#!에 등극함"
 je_objective_cradle_of_culture: "문화의 요람"
 je_objective_cradle_of_culture_reason: "새로운 양식의 예술이 역사주의, 매너리즘, 사실주의의 경직된 양식을 대체하고 있다. 새 시대가 도래했다. 우리나라는 신시대의 선두로 나아가 전위 예술의 기함으로 거듭나야 한다!"
 je_objective_thriving_culture: "번성하는 문화"
 je_objective_thriving_culture_reason: "세계 최고의 문화 강국이 되려면 모든 부문에서 미적 감각과 과학적 이해를 보여주해야 한다."
 thriving_culture_archaeological_discovery_tt: "위대한 #O 고고학 발견#!을 이룩함"
 thriving_culture_great_comet_tt: "[concept_verrier_comet]을 발견"
 thriving_culture_great_composer_tt: "이번 게임에서 최소 한 명의 [concept_elgar_great_composer]를 채용함"
 mr_hide_geography_decisions: "지역 결단 숨김"
 mr_hide_geography_decisions_desc: "모든 지역 결단을 숨김 처리하여 개요를 정리합니다."
 mr_show_geography_decisions: "지역 결단 표시"
 mr_show_geography_decisions_desc: "모든 지역 결단을 표시합니다."
 mr_show_geography_decisions_tt: "모든 지역 결단을 표시합니다."
 mr_hide_geography_decisions_tt: "모든 지역 결단을 숨깁니다."
 mr_appoint_chief_engineer: "수석 공학자 임명"
 mr_appoint_chief_engineer_desc: "수석 공학자가 있다면 기념물의 월간 건설 진행도에 건설 포인트가 추가됩니다."
 mr_dismiss_chief_engineer: "수석 공학자 해임"
 mr_visiting_museum_tt: "현재 박물관을 방문하고 있지 않음"
 mr_visiting_observatory_tt: "현재 천문대를 방문하고 있지 않음"
 mr_visiting_opera_tt: "현재 오페라 극장을 방문하고 있지 않음"
 mr_visiting_zoo_tt: "현재 동물원을 방문하고 있지 않음"
 mr_visiting_fossils_tt: "현재 고생물학 전시관을 방문하고 있음"
 mr_visiting_human_evolution_tt: "현재 인류학 전시관을 방문하고 있지 않음"
 mr_visiting_scientific_society_tt: "[concept_academics_scientific_society]을 방문하고 있지 않음"
 je_mr_scientific_conferences: "과학 학술회의"
 je_mr_scientific_conferences_reason: "지구의 나이는 얼마인가? 인류의 기원은 어디인가? 성경은 역사적 사료로서 어디까지 신뢰해야 하는가? 우주는 무한한가, 그리고 은하의 실체는 무엇인가? 백 년간의 세월 동안 과학은 이런 질문에만 그치는 것을 넘어서, 사람들이 세계를 바라보는 관점에 중대한 변화를 불러일으켰습니다. 진화론은 상대성이론 만큼이나 인류 스스로의 확신을 뒤흔들었습니다. 이러한 근본적인 질문들을 세계의 과학자들이 모여 논쟁하고, 그 해답을 찾으려는 목적에서 개최되는 것이 과학 학술회의입니다."
 mr_exodus_congress_egyptian_artifacts_tt: "최소 #G 25점#!의 #O @lepsius_egypt_minor! 이집트 유물#!이 필요합니다."
 mr_exodus_congress_global_artifacts_tt: "전세계 고고학계에서 찾아낸 #O 유물#!의 개수가 총 #BLUE 150점#!에 도달해야 합니다. 현재 발견된 #O 유물#!의 수는 [GetGlobalVariable('lepsius_global_artifacts').GetValue]점입니다."
 mr_civilization_congress_mesopotamian_artifacts_tt: "최소 #G 25점#!의 #O @lepsius_mesopotamia_minor! 메소포타미아 유물#!이 필요합니다."
 mr_civilization_congress_global_artifacts_tt: "전세계 고고학계에서 찾아낸 #O 유물#!의 개수가 총 #BLUE 300점#!에 도달해야 합니다. 현재 발견된 #O 유물#!의 수는 [GetGlobalVariable('lepsius_global_artifacts').GetValue]점입니다."
 mr_troy_congress_aegean_artifacts_tt: "최소 #G 25점#!의 #O @lepsius_aegean_minor! 에게 문명 유물#!이 필요합니다."
 mr_troy_congress_global_artifacts_tt: "전세계 고고학계에서 찾아낸 #O 유물#!의 개수가 총 #BLUE 500점#!에 도달해야 합니다. 현재 발견된 #O 유물#!의 수는 [GetGlobalVariable('lepsius_global_artifacts').GetValue]점입니다."
 mr_hippocampus_congress_specimen_tt: "최소 #G 20,000점#!의 @dubois_specimen! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]이 필요합니다."
 mr_hippocampus_congress_global_specimen_tt: "전세계 박물학자들의 연구를 통해 확보된 @dubois_specimen! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]의 규모가 총 #BLUE 100,000점#!에 도달함 (현재 수집된 #O 표본#!은 [GetGlobalVariable('dubois_global_specimen').GetValue]점)"
 mr_origin_congress_human_fossil_tt: "최소 #G 10점#!의 @dubois_human_fossil! #O 인류 화석#!이 필요합니다."
 mr_origin_congress_special_human_fossil_tt: "호모 네안데르탈렌시스, 호모 에렉투스, 오스트랄로피테쿠스, 파란트로푸스의 4종에 달하는 @dubois_human_fossil!#O 인류 화석#! 가운데 최소 #G 3점#!을 보유함"
 mr_origin_congress_global_human_fossil_tt: "전세계 인류학자들의 연구를 통해 확보된 @dubois_human_fossil!#O 인류 화석#!의 수가 총 #BLUE 50점#!에 도달함 (현재 #O 인류 화석#! [GetGlobalVariable('dubois_global_human_fossil').GetValue]점 발견)"
 mr_extinction_congress_fossil_tt: "최소 #G 5점#!의 @dubois_dinosaur_skeleton! [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')]이 필요합니다."
 mr_extinction_congress_global_fossil_tt: "전세계 고생물학자들의 연구를 통해 확보된 @dubois_fossil! [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]의 수가 총 #BLUE 500점#!에 도달함 (현재 @dubois_fossil! [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] [GetGlobalVariable('dubois_global_fossil').GetValue]점 발견)"
 je_mr_archaeology: "고고학"
 je_mr_archaeology_reason: "19세기와 20세기 초에는 단순한 보물 발굴에서 본격적인 과학 연구에 이르기까지 고대 유물 연구 분야에서 급속한 발전을 이룩하게 되었습니다. 하인리히 슐리만의 트로이 발굴과 하워드 카터의 투탕카멘 무덤 발굴은 이 시대의 가장 유명한 성과로 꼽힙니다. 이 사건들은 귀중한 유물 발굴에 있어 과학적 탐구심 뿐만 아니라 국가적 위신 또한 중대한 역할을 하였음을 보여줍니다. 이러한 시대가 본격적으로 시작된 것은 1837년 카를 리하르트 레프지우스가 이집트 상형문자를 거의 완벽히 해독하면서부터였습니다."
 mr_romantic_composer_button: "신임 [concept_elgar_composer] (낭만주의) 채용"
 mr_composer_button_desc: "[Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')]와는 달리 일반 [Concept('concept_elgar_composer','$concept_elgar_composers$')]는 통상적인 운영을 담당합니다. 이들은 지휘자로 고용될 수 있으며 해당 국가에 [concept_elgar_musical_tradition] 보너스를 자동으로 부여합니다. 작곡가는 한 게임당 세 번씩 채용할 수 있으며 특정 기술 (낭만주의, 비이성주의, 신고전주의/신즉물주의/아르데코 중 1택) 연구가 필요합니다. 한 국가는 일반 작곡가를 한 명만 채용할 수 있으며, 국가의 음악 문화에 10년간 투자해야 합니다."
 mr_wagnerian_composer_button: "신임 [concept_elgar_composer] (비이성주의) 채용"
 mr_modern_composer_button: "신임 [concept_elgar_composer] (근대) 채용"
 mr_appoint_conductor_button: "최고 지휘자 임명"
 mr_appoint_conductor_button_desc: "지휘자는 국가적인 음악 사업, 특히 해당 국가의 주요 [Concept('concept_elgar_opera','$concept_elgar_opera_house$')]을 주도합니다. 오페라 극장에서는 지휘와 작곡, 순회 공연과 같은 특정 업무를 3년 동안 맡을 수 있습니다. 이 점에서 [Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')]와 유사한 면이 있지만, [concept_elgar_musical_tradition]에 기여하는 정도는 감당 가능한 범위 내에서 유지됩니다."
 mr_national_conservatory_button: "국립 음악원 설립"
 mr_national_conservatory_button_desc: "음악원을 두면 작곡가 특성을 지닌 인물을 고용하지 않아도 시간이 지나면서 나타날 확률이 생깁니다. 확률은 극히 낮지만 분명 존재합니다. 음악원 중 한 곳에 발레 학교를 두면 그 확률이 늘어나게 됩니다."
 mr_santa_cecilia_button: "산타체칠리아 학술원 설립"
 mr_santa_cecilia_button_desc: "산타 체칠리아 아카데미아는 1585년 교황 식스투스 5세의 칙령 '라티오네 콩그루이트' (Ratione Congruit)에 따라 수도원의 형태로 설립되었다. 1838년 산타 체칠리아 수도회는 정식 명칭을 아카데미로, 그 후에는 교황청 아카데미로 바꾸었다. 당시 회원으로는 루이지 케루비니, 메르카단테, 도니체티, 로시니, 파가니니, 오베르, 리스트, 멘델스존, 베를리오즈, 구노, 마이어베어 등이 있었다. 명예 회원으로는 영국의 빅토리아 여왕이 있었다. 이탈리아 통일 이후 산타 체칠리아 아카데미아는 선두적인 음악원으로 발전해 나갔다."
 mr_leipzig_conservatory_button: "라이프치히 음악원 설립"
 mr_leipzig_conservatory_button_desc: "요한 세바스티안 바흐가 일찍이 자취를 남겼던 전통적인 음악 도시 라이프치히는 19세기 초에 이르러 음악과 학술 인재 양성소를 설립하기에 모자람 없는 환경을 마련하였습니다. 변호사 하인리히 콘라트 슐라이니츠 (부원장), 라히프치히 구역담당관 요한 파울 폰 팔켄슈타인, 작센 왕정 고문 요한 게오르크 카일, 그리고 게반트하우스 지휘자 펠릭스 멘델손 바르톨디, 이들 라히프치히 시민 4인의 헌신으로 구상의 실현에 나서게 되었습니다."
 mr_petrograd_conservatory_button: "페트로그라드 음악원 설립"
 mr_petrograd_conservatory_button_desc: "옐레나 파블로브나 대공비, 안톤 루빈슈타인, 안드레이 니콜라예비치 마르코비치 등 사회와 음악계 저명 인사들의 주도로 설립된 러시아 음악 협회는 음악 강좌를 기반으로 러시아 최초의 음악원이 탄생하는 계기를 마련했다. 안톤 루빈슈타인은 음악원의 초대 원장이자 피아노 교수였다. 이곳에서 작곡을 전공한 최초의 졸업생은 표트르 차이코프스키였다. 니콜라이 안드레예비치 림스키코르사코프는 작곡과 기악 전공 교수이자 오케스트라 학부장으로서 특히 상당한 영향력을 행사하였다."
 mr_bayreuth_button: "리하르트 바그너 축제 창설"
 mr_bayreuth_button_desc: "리하르트 바그너는 매년 자신의 대표작들을 공연하는 전용 축제 홀을 오래토록 꿈꿔왔습니다. 그런 무대가 생긴다면 모든 음악 애호가들의 순례지가 되고, 바그너의 업적을 기리는 영원한 기념물이 될 것입니다."
