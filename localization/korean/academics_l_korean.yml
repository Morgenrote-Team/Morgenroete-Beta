 academics.111.t: "[ROOT.Var('dubois_naturalist_var').GetCharacter.GetFullName](은)는 이제 저명한 박물학자입니다"
 academics.111.d: "수 년간 연구와 수집을 지속해온 우리의 [concept_dubois_naturalist] [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] 박사가 이제 그간의 활동을 바탕으로 저명한 학자로 거듭났습니다!"
 academics.111.f: ""
