 je_academics_first_railway: "산업 주력: [SCOPE.GetRootScope.GetCountry.GetName] 최초의 철도 건설"
 je_academics_first_railway_reason: "철도의 발명이 [SCOPE.GetRootScope.GetCountry.GetName](으)로 전파됨에 따라, 기업가들 사이에서도 상품 운송을 더욱 편리하게 해 줄 기계를 마련해 달라는 요구가 많아졌습니다. 이것이 실현되면 우리가 산업 강국으로 발돋움하는 데 보탬이 될 것입니다."
 academics.2400.t: "철도가 필요하다!"
 academics.2400.d: "철도는 상품 운송을 더욱 용이하게 해 줍니다. 이에 따라 [SCOPE.GetRootScope.GetCountry.GetName]의 기업 대표들은 향후 5년 안에 우리나라에 철도를 놓을 것을 요구하고 있습니다."
 academics.2400.f: "\"우리나라는 아직도 비포장 도로와 뱃길을 통해 제품을 운송하고 있습니다. 이런 상황은 더는 용납할 수 없소. 상품과 자원 수송을 개선할 방법이 있다면 수익이 급증하고 더 많은 공장을 건설하여 국민의 삶의 질도 개선할 수 있을 것입니다. 지금 당장 철도를 지어 주시오!\""
 academics.2400.g: "철도를 지을 수 있을까?"
 academics_industrialists_happy_modifier: "기업가 만족"
 academics_industrialists_discontent_modifier: "기업가 불만"
 academics_first_railway_modifier: "최초의 철도"
 academics.2401.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_title_custom_loc')]"
 academics_spanisch_broetli_title_loc: "스위스 북부 철도 (스페인식 브뢰틀리 철도)"
 academics_ferrovia_torino_genova_title_loc: "토리노-제노바 철도"
 academics_generic_title_loc: "[SCOPE.GetRootScope.GetCountry.GetName] 최초의 철도 노선"
 academics.2401.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_desc_custom_loc')]"
 academics_spanisch_broetli_desc_loc: "스위스는 취리히와 바덴을 잇는 최초의 철도 노선을 개통했습니다. 이 노선으로 상품과 여객과 우편의 수송을 원활하게 하고, 취리히와 바덴의 산업 발전을 촉진할 것으로 기대하고 있습니다. 좌우간 취리히의 부유층은 아침부터 아랫사람을 바덴으로 보내서 유명 제빵사가 만든 따끈한 스페인식 빵, '브뢰틀리'를 사 오도록 할 수 있게 된 것입니다. 기업가들도 새로운 철도 노선의 개통에 매우 만족하는 분위기입니다."
 academics_ferrovia_torino_desc_title_loc: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting]께서 참석하신 가운데 토리노-제노바 철도가 정식으로 개통되었습니다. 토리노에서 제노바로 이어지는 이 철도 노선은 이탈리아 공학의 걸작입니다. 169km 길이의 복선 철도에 30개가 넘는 교량을 갖췄고, 3,259m 길이의 지오비 터널을 비롯하여 전체 터널만 세계 최고 규모를 자랑합니다.\n이번 철도의 개통으로 토리노~제노바의 화물과 여객 수송을 더욱 원할하게 하여 산업 발전에 기여할 것으로 기대됩니다. 각계 기업 대표들도 사상 첫 철도 노선의 개통 소식을 몹시 반가워하고 있습니다."
 academics_generic_desc_loc: "우리나라 최초의 철도 건설은 쉽지도 않았고 예산도 많이 들었습니다. 하지만 [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting]의 뛰어난 공학 기술 덕에 기록적인 속도로 완공에 이르렀습니다. 기업가들은 이번 철도의 개통으로 상품과 자원을 빠르게 운송할 수 있게 되어 매우 만족하고 있습니다."
 academics.2401.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_flavor_custom_loc')]"
 academics_spanisch_broetli_flavor_loc: "스페인식 브뢰틀리의 군침 도는 향기가 코끝을 간지럽힙니다. 이 맛있는 페이스트리는 취리히와 바덴을 연결하는 스위스 최초의 기차에 실려 배달되어 온 것입니다.\n\n#b 실제 역사#!에서 취리히와 바덴을 잇는 철도는 '스위스 통일 전쟁' (Sonderbundskrieg)이 벌어지기 직전인 1847년에 완공되었습니다. 당시 열차 4대로 하루 4회 운행이 가능했으며, 23km 구간을 약 45분 만에 주파할 수 있었습니다. 정식 명칭으로 '스위스 북부 철도'(Schweizerische Nordbahn)라 불렸던 이 철도는 사업적으로 큰 성공을 거두지는 못하면서, 아라우까지의 연장 계획도 머지않아 백지화되고 하루 열차 운행 횟수도 3회로 축소되었습니다.\n\n오늘날 스위스에는 '스페인식 브뢰틀리 철도'의 복원 차량이 남아 있으며, 실제 영업 중인 선로에서 역사적인 열차로서 운행되기도 합니다."
 academics_ferrovia_torino_genova_flavor_loc: "제노바의 대주교가 첫 기관차에 세례를 내리자, 괴수가 힘차게 움직이기 시작했습니다. 이것이 제노바에서 토리노까지의 여정을 성공적으로 마친 최초의 열차였습니다.\n\n#b 실제 역사에서, #!이 노선은 사르데냐-피에몬테의 첫 철도로, 1844년 7월 18일 국왕 카를로 알베르토의 요청에 의한 것이었습니다. 노선이 완공되기도 전에 노선의 첫 구간부터 순차적으로 단선으로 운행되다가, 1853년 12월 6일, 공식적으로 개통되었습니다.\n얼마 지나지 않아 이 철도는 이탈리아에서 가장 분주한 노선으로 자리 잡게 되었는데, 여러 이유가 있겠으나 제노바항에서 수입되는 물산을 수송할 수 있게 한 것이 크게 작용했습니다. 1889년, 기존 노선보다 구배가 작은 대체 구간이 지오비 고개를 따라 부설되었습니다.\n1898년, 승무원들이 지오비 터널 구간에서 질식하여 기관차가 기관사를 잃고 움직인 사건이 있었습니다. 결국 대기 중이던 열차에 충돌하여 13명의 사상자를 내게 되었고, 이후 노선은 전철화되었습니다."
 academics_generic_flavor_loc: "\"진작에 우리만의 철도를 가지고 있어야 했는데 말입니다! 지금까지는 경쟁에서 뒤처져있었지만, 이제 우리의 물산을 제대로 된 방식으로 수송할 수 있게 되었습니다!\""
 academics.2401.g: "그래, 우리는 해내리라!"
 academics.2402.t: "최초의 철도 부설 실패"
 academics.2402.d: "우리나라 최초의 철도를 건설해달라는 사업가들의 건의로부터 5년이 흘렀습니다. 우리는 제 시간에 철도 노선을 건설하지 못했습니다. 이는 분명 우리 정부를 향한 산업계의 태도에 영향을 미칠 것입니다."
 academics.2402.f: "\"철도 노선 하나도 못 놓다니. 당신네 정부는 정말이지 나태 그 자체일세. 부끄러운 줄 아시오!\""
 academics.2402.g: "아니, 거절하겠소."
