 academics.6.d: "수십 년 간 새로운 [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]과 식물 등의 생물들을 찾아내는 데 일생을 바친 [SCOPE.sCharacter('academics_retired_person_scope').GetFullName](이)가 은퇴를 결심했습니다. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U]는 더 이상 [concept_dubois_naturalist]로 활동하지 않습니다."
 academics.7.d: "수십 년 간 새로운 화석을 찾아내고, 공룡과 다른 멸종 생물을 복원하는 데 일생을 바친 [SCOPE.sCharacter('academics_retired_person_scope').GetFullName](이)가 은퇴를 결심했습니다. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U]는 더 이상 [concept_dubois_paleontologist]로 활동하지 않습니다."
