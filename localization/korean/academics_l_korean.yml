 ademics_our_own_dinosaur_modifier: "Our New Dinosaur"
 ademics_no_dinosaur_modifier: "No Dinosaur"
 academics.2303_goal_tt: "Construct #G 1#! [concept_dubois_dinosaur_skeleton]"
 academics.2303_reward_tt: "As a reward the Intelligencia will get #p 5 Approval#! and you will get #p 5%#! more prestige for 4 years. We will also get a medium tech investment."
 je_academics_giant_of_the_past: "Paleontological Focus: Giant of the Past"
 je_academics_giant_of_the_past_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] has asked to collect [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] and reconstruct a [concept_dubois_dinosaur_skeleton]. What condition it is in remains secondary - the main thing is that we have an opulent piece in our collection. Dinosaur bones are found in Great Formations. If we don't have one on our territory, a [concept_dubois_paleontological_licence] would be advantageous so that our paleontologist can search abroad."
 academics.2303.t: "Giant of the Past"
 academics.2303.d: "Some leading scientists have lamented that despite our paleontological advances, we have yet to display a complete dinosaur skeleton. Our Scientific Society has also deeply regretted this unfortunate situation in a letter and would like to see this situation remedied."
 academics.2303.f: "WE WANT A DINOSAUR, AND WE WANT IT NOW!\n\nSigned, the members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2303.g: "An excellent initiative!"
 academics.2303.h: "This is not an amusement park for little boys, but a scientific institute."
 academics.2304.t: "The Dire Lizard"
 academics.2304.d: "The new dinosaur is the most spectacular piece of the paleontological collection. Every day new visitors flock to the exhibition to see the skeleton."
 academics.2304.f: "Can we have another one?\n\nSigned, the members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2304.g: "Our own dinosaur!"
 academics.2305.t: "No Lizard"
 academics.2305.d: "The platform set aside for the planned dinosaur skeleton remains empty. The Scientific Society reacted to this with great irritation."
 academics.2305.f: "Do we need to be even clearer?\n\nSigned, the members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2305.g: "Find another toy!"
 academics.2306_goal_tt: "Find #G 3#! #O Special Fossils#!"
 academics.2306_reward_tt: "As a reward, our [concept_dubois_paleontologist] will get #p 50 Experience#! If we don't have a [concept_dubois_paleontologist] yet, we will get one. We will also get a large tech investment."
 je_academics_special_fossils: "Paleontological Focus: Special Fossils"
 je_academics_special_fossils_reason: "Special fossils are unique fossils that are treated separately because of their exceptional status. These include transitional forms such as Archeopteryx or Ichthyostega, but also large extinct mammal species such as the giant sloth Megatherium or the dolphin-like Ichthyosaurus. But smaller fossils that are used to define an era - the best known are ammonites and trilobites - also belong to this category. In total, there are a dozen special fossils that can be found not only in formations but also on scientific expeditions."
 je_academics_special_fossils_success: "Find #G 3#! #O Special Fossils#!"
 academics.2306.t: "Extraordinary Fossils"
 academics.2306.d: "The Scientific Society has an extraordinary request of us regarding extraordinary fossils."
 academics.2306.f: "The history of animal ancestry is a secret of nature that our researchers reveal a little more every day. A special role is played by those forms that lie at the thresholds between species, so-called 'missing links'. At the same time, there are extraordinary creatures on our planet that don't have to be dinosaurs to impress: extinct mammals such as saber-toothed tigers or giant sloths. If we collected at least 3 special fossils, we could further strengthen the reputation of our institute in the world.\n\nSigned, the members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2306.g: "Special Fossisls for a special collection."
 academics.2306.h: "Can't we focus our scientific capacities on something more meaningful?"
 academics.2307.t: "Astonishing Fossil Collection"
 academics.2307.d: "There is no doubt that the National Paleontological Institute has one of the most important international collections. There is hardly any comparable place with such extraordinary pieces."
 academics.2307.f: "Special fossils may not always be as impressive as one might first think, but they have great scientific value. The Scientific Society therefore sent a thank you letter. There will be a special exhibition in the coming days."
 academics.2307.g: "Magnificent."
 academics.2308.t: "Special Disappointment"
 academics.2308.d: "The Scientific Society has expressed dismay at the latest paleontological failure."
 academics.2308.f: "It is a national tragedy that the country's natural history concerns are being completely ignored. Paleontological research is dismissed as nonsense about dead birds and lizards, support payments for special expeditions are rarely made and even the smallest wishes are ignored. J'Accuse!\n\nSigned, the members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2308.g: "Oh dear."
 ademics_no_paleontological_hero_modifier: "No Hero of Paleontology"
 academics.2309_goal_tt: "Have a #o famous#! [concept_dubois_paleontologist]"
 academics.2309_reward_tt: "As a reward, we will gain #p 120#! [concept_academics_progress]."
 je_academics_famous_paleontologist: "Paleontological Focus: Famous Paleontologist"
 je_academics_famous_paleontologist_reason: "The rise of a [concept_dubois_paleontologist] is accompanied by the improvement of his experience. Like every academic, a paleontologist receives 5 experience points annually. He gains additional experience in successful paleontological research of formations. Additionally, a paleontologist can be used on Mountaineering expeditions and Pacific expeditions. Successfully constructing and reassembling dinosaur skeletons also helps enhance a paleontologist's experience."
 academics.2310.g: "An inspiration for the youth."
 academics.2311.t: "No Hero of Paleontology"
 academics.2311.d: "For whatever reason, we have not been able to promote a paleontologist and let him achieve world fame."
 academics.2311.f: "Unfortunately, the failure has meant that the scientific disciplines continue to be dismissed as orchid subjects and the enthusiasm for academic study and entry into active research service is limited. Members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] feel the dissatisfaction in conversations. The intellectual elite blames the government for this situation."
 academics.2311.g: "Disappointing."
 academics_splendid_dinosaur_collection_modifier: "Splendid Dinosaur Collection"
 academics.2312_goal_tt: "Have a #o Dinosaur Rating#! of at least #G 5 #!"
 academics.2312_reward_tt: "As a reward the Intelligencia will get #p 5 Approval#!. Additionally, you will get #p 10%#! more prestige and the cost for society technology will be reduced by #p 5%#! for 10 years. "
 je_academics_dinosaur_rating: "Paleontological Focus: Dinosaur Rating"
 je_academics_dinosaur_rating_reason: "In order to improve the #O Dinosaur Rating#!, not only new dinosaur skeletons are needed, but also a perfect reconstruction of them. This can take years. The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] has therefore decided not to set a time limit."
 je_academics_dinosaur_rating_success: "Have a #o Dinosaur Rating#! of at least #G 5 #!"
 academics.2312.t: "The Splendour of Paleontology"
 academics.2312.d: "The paleontological branch of our scientific research already has a good reputation. Now it's time to make it known worldwide by significantly improving our dinosaur exhibition."
 academics.2312.f: "We might like to show a different dinosaur in our exhibition. A larger number of skeletons would not only benefit scientific research, but also our national reputation. The whole world is digging for dinosaur bones and is fascinated by the previously unknown prehistory. It shouldn't just be about quantity, but also about quality. We should aim to be the frontrunner in dinosaur skeleton reconstruction.\n\nSigned, the members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2312.g: "This will be a colossal undertaking!"
 academics.2312.h: "Not this paleontological nonsense again."
 academics.2313.t: "A Splendid Collection"
 academics.2313.d: "The Scientific Society was proud to announce today a special exhibition of dinosaur skeletons."
 academics.2313.f: "We are deeply indebted to the government for finally having a dinosaur collection that underscores the high level of paleontological research in our nation. There are hardly any more exquisite collections than this one. It took a lot of hard work and effort, as well as a thirst for research and persistence. Society can look at this work with pride, while abroad looks at it with envy. Gentleman: This is a great day for science in general and paleontology in particular!\n\nSigned, the members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2313.g: "Wonderful!"
