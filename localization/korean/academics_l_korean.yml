 academics.2101_reward_tt: "그 보상으로, 대학이 있는 모든 주에서 중산층의 #p 삶의 질#!이 5년 동안 1포인트씩 오르고, 추가로 [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]은 #p 5 찬성#!을 얻게 되며 생산 기술 비용이 3년간 #p 5%#! 감소하는 효과를 얻습니다."
 academics.2104_reward_tt: "그 보상으로 우리는 5년간 #p 5% 위신#!을 획득하고, 추가로 [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]은 #p 5 찬성#!을 얻게 되며 생산 기술 비용이 3년간 #p 5%#! 감소하는 효과를 얻습니다. 우리 고고학자는 #p 경험치 15#!를 얻습니다."
 academics.2110_reward_tt: "그 보상으로 우리는 5년간 #p 5% 위신#!을 획득하고, 추가로 [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]은 #p 5 찬성#!을 얻게 되며 생산 기술 비용이 3년간 #p 5%#! 감소하는 효과를 얻습니다. 우리 고고학자는 #p 경험치 25#!를 얻습니다."
 academics.2112_reward_tt: "그 보상으로 우리는 5년간 #p 10% 위신#!을 획득하고, 추가로 [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]은 #p 5 찬성#!을 얻게 되며 생산 기술 비용이 3년간 #p 5%#! 감소하는 효과를 얻습니다. 우리 국민들은 #p 삶의 질 1포인트#! 상승을 누리게 되며, 우리 고고학자는 #p 경험치 50#!을 얻습니다."
 academics.2309.t: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]의 야망"
 academics.2309.d: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] 교수가 고생물학 분야에서 국내 최고의 권위자로 평가받고 있다. 과학원에서는 이 교수를 국제적으로 각광받는 인물로 발전시켜 학계의 얼굴로서 활용한다는 방침이다."
 academics.2309.f: "We have come to the firm conclusion that our colleague, Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastNameNoFormatting], would be ideally suited to represent our nation as a science location. [SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe] should receive every possible support to increase [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim] reputation. This would motivate young people in particular to pursue a scientific career themselves.\n\nSigned, the members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2309.g: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe]는 저명한 학자로 거듭납니다"
 academics.2309.h: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe] shouldn't become megalomaniac."
 academics.2310.t: "고생물학계의 영예"
 academics.2310.d: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName](이)가 고생물학계에서 명성을 날리면서 학술원에서 바랐던 과학계의 얼굴이 되었다."
 academics.2310.f: "저희는 [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastNameNoFormatting] 교수님의 위대함과 명성에 감명받은 많은 신입생들을 맞이하고 있습니다. 교수님께선 본인의 분야에 활기를 불어넣었을 뿐만 아니라, 과학 자체에 대한 근본적인 흥미를 일깨워 주셨습니다. 과학자는 더 이상 가망이 별로 없는 특이한 경력이 아니라, 명성과 모험을 약속받는 흥미로운 직업이 되었습니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동 서명"
