 rule_academics_mission_rule: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon! #! 학술 임무"
 setting_academics_missions_rule: "학술 임무 #p 활성화#!"
 setting_academics_missions_rule_desc: "10년마다 학술 기관을 위한 임무를 받게 됩니다. 이 임무들은 학술 건물 건설이나 일정 수량의 표본 수집 등이 될 수 있습니다. 임무를 완료하면 소정의 보상을 받게 됩니다."
 setting_academics_no_missions_rule: "학술 임무 #n 비활성화#!"
 setting_academics_no_missions_rule_desc: "학술 임무를 받지 않습니다."
 rule_academics_focus_rule: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon! #! 학자 중점 규칙"
 setting_academics_historical_focus_rule: "역사 초점"
 setting_academics_historical_focus_rule_desc: "일부 국가는 역사적인 기술 학교로 시작합니다. 예를 들어, 프로이센은 군수 산업 단지로, 프랑스는 아방가르드 지식인으로 시작합니다."
 setting_academics_no_focus_rule: "초점 없음"
 setting_academics_no_focus_rule_desc: "모든 국가가 기술 학교 없이 시작합니다."
