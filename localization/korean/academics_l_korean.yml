 academics.110.d: "수 년간 연구와 활동을 지속해온 우리의 [concept_dubois_naturalist] [ROOT.Var('ito_naturalist_var').GetCharacter.GetLastName] 박사가 이제 경험 많은 학자로 거듭났다!"
 academics.110.f: ""
 academics.110.g: "위대한 진화로다!"
 academics.111.t: "[ROOT.Var('ito_naturalist_var').GetCharacter.GetFullName]의 저명한 박물학자 등극"
 academics.111.d: "수 년간 연구와 수집을 지속해온 우리의 [concept_dubois_naturalist] [ROOT.Var('ito_naturalist_var').GetCharacter.GetLastName] 박사가 이제 그간의 활동을 바탕으로 저명한 학자로 거듭났다!"
 academics.111.f: ""
 academics.111.g: "최고의 박물학자"
