 academics_recruit_foreign_scientist: "외국 과학자 섭외"
 academics_recruit_foreign_scientist_action_name: "외국 과학자 섭외"
 academics_recruit_foreign_scientist_desc: "우리보다 더 발전한 외국에서 [Concept('concept_academics_academic','$concept_academics_scientist$')]를 섭외합니다. 최고의 과학자는 조국을 떠나지 않기 때문에 그들을 따로 모셔올 수는 없습니다. 따라서 섭외된 과학자는 경험치를 쌓는 데 시간이 더 걸릴 것입니다."
 academics_recruit_foreign_scientist_proposal_notification_name: "[INITIATOR_COUNTRY.GetName]에 과학자 파견"
 academics_recruit_foreign_scientist_proposal_notification_desc: "[INITIATOR_COUNTRY.GetName]에서 자력으로 과학자를 모집할 수 없다며 일정 금액을 대가로 우리나라의 하급 [Concept('concept_academics_academic','$concept_academics_scientists$')]를 파견해 달라고 요청하고 있습니다. 이는 우리가 선택한 기존 과학자를 내쫓는 것이 아니라 경험 없는 신규 과학자를 파견하는 것입니다."
 academics_recruit_foreign_scientist_proposal_notification_effects_desc: "@money!#p 250K#!를 받고 우리나라의 하급 [Concept('concept_academics_academic','$concept_academics_scientists$')]를 [INITIATOR_COUNTRY.GetName]에 파견합니다."
 academics_target_country_has_scientist_tt: "요청한 국가에 #V 적어도 한 명 이상의 [Concept('concept_academics_academic','$concept_academics_scientist$')]#!가 있음"
 academics_smaller_tech_advance_than_best_30_percent_tt: "[GetPlayer.GetName]의 기술 연구 수준이 #V 상위 30% 국가#!에 #V 속하지 않음#!. 현재 우리나라의 기술 연구는 상위 [GetPlayer.MakeScope.Var('academics_country_tech_advance_var').GetValue|%+0] 국가에 해당됩니다."
 academics_recent_foreign_scientist_recruitment_tt: "#V 최근 5년 이내#!에 #V 외국 과학자를 고용하지 않음#!"
 academics_smaller_tech_advance_than_target_tt: "[GetPlayer.GetName]의 기술 연구가 다른 국가보다 #V 앞서가지 않음#!. 다른 국가의 기술 연구 수준은 #V 상위 30% 국가#!에 속함."
