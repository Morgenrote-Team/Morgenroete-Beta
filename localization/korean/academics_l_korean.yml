 academics.2110.t: "Museum Director wants a Major Artifact"
 academics.2110.d: "The director of the Archaeological Museum today wrote an open letter to the government on behalf of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]."
 academics.2110.f: "It is with great regret that I have to state that, despite the rich fund of artifacts, our museum still lacks a major attraction that could be called a showpiece of the collection. Unfortunately, the government has so far failed to focus on quality as an archaeological standard for the objects instead of quantity. I therefore strongly advise that this grievance be rectified in the next few years, or our nation will at best be ranked as bean counters in the scientific world.\n\nSigned, The Director of the Archaeological Museum"
 academics.2110.g: "A prestigious endeavor."
 academics.2110.h: "It's not worth the trouble."
 academics.2110_goal_tt: "You will have to collect #p 1#! [concept_lepsius_major_artifact] in #n 15#! years."
 academics.2111.t: "Splendour of the Museum"
 academics.2111.d: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] expressed its gratitude in its letter today."
 academics.2111.f: "Congratulations on the decision to make archeology the country's national priority. The recently acquired, exceptional specimen will be on display in a special exhibition over the next few weeks. The world envies us!\n\nSigned, The Director of the Archaeological Museum"
 academics.2111.g: "Wonderful."
 academics.2112.t: "A dusty place"
 academics.2112.d: "In an open letter today on behalf of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], the director of the Archaeological Museum expressed his regret that archeology is not being heard in our nation."
 academics.2112.f: "Never was so much ruined by so few in so little time.\n\nSigned, The Director of the Archaeological Museum"
 academics.2112.g: "And?"
 je_academics_major_artifact: "Focus on Archaeology: Major Artifact"
 je_academics_major_artifact_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wants us to find at least #p 1#! [concept_lepsius_major_artifact]. Major Artifacts can be gained through major discoveries, through permanent excavations, or in random event chains during expeditions."
 je_academics_major_artifact_success: "Have #p 1#! [concept_lepsius_major_artifact]."
 academics.2113.t: "Museum Director demands Archaeological Excellence"
 academics.2113.d: "The director of the Archaeological Museum has pointed out that little is missing to make the exhibition almost perfect."
 academics.2113.f: "I'm a humble man. As you know, my claims are not particularly extravagant. I have never asked this government for a fancy favour. I always held myself back, as befits the curator of such a splendid institution. Also: one last little icing on the cake is missing to elevate our beautiful collection to world class. All it takes is an excellent exhibition. Not more. Getting 100 artifacts from a region anda Major artifact will hopefully not be difficult, right?\n\nSigned, The Director of the Archaeological Museum"
 academics.2113.g: "A welcome challenge."
 academics.2113.h: "That's too risky."
 academics.2112_goal_tt: "You will have to arrange an Excellent Exhbition in #n 20#! years."
 academics.2114.t: "Archaeology on its Peak"
 academics.2114.d: "A softened, barely legible letter reached us today from the Archaeological Museum."
 academics.2114.f: "Only the sender could still be deciphered. The signature clearly belonged to the museum director. The secretary suspects tears of joy as he writes the letter."
 academics.2114.g: "He is happy and so are we."
 academics.2115.t: "Setback for Archaoelogy"
 academics.2115.d: "A softened, barely legible letter reached us today from the Archaeological Museum."
 academics.2115.f: "Only the sender could still be deciphered. The signature clearly belonged to the museum director. The secretary assumes that tears came to his eyes as he wrote it. Our failure on the last archaeological mission must have thrown him into a deep depression."
 academics.2115.g: "He is sad and so are we."
 je_academics_excellent_collection: "Focus on Archaeology: Excellent Collection"
 je_academics_excellent_collection_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wants us to create an Excellent Exhibition. We need #G 100#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] and #p 1#! [concept_lepsius_major_artifact] from one archaeological region to do so."
 academics.2116.t: "We need to find more Artifacts than [SCOPE.sCountry('rival_scope').GetName]"
 academics.2116.d: "The membetrs of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] are unhappy that [SCOPE.sCountry('rival_scope').GetName] gathered more [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] than our nation. They ask us to find more #b Artifacts#! in total than [SCOPE.sCountry('rival_scope').GetName] in 10 years time."
 academics.2116.f: "It is a shame that such an insignificant nation as [SCOPE.sCountry('rival_scope').GetName] has a larger collection of artifacts than us. We must overtake these tomb raiders that are only digging for treassure and do not even conduct real archaeology! How much knowledge has been lost because of these barbarians?\n\nSigned, the members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2116_goal_tt: "You will have to gather more [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] than your rival, [SCOPE.sCountry('rival_scope').GetName], in #n 10#! years. They have [GetPlayer.MakeScope.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+], we have [GetPlayer.MakeScope.Var('lepsius_total_artifacts').GetValue|0+]."
 academics.2116_reward_tt: "As a reward the Intelligencia will get #p 5 Approval#! and you will get #p 10%#! more prestige for 4 years."
 academics.2116.g: "I am an Archaeologist and I'm digging a hole!"
 academics.2116.h: "Archaeology is not a Treasure Hunt!"
 academics_no_competition_with_rival_total_artifacts: "Lost the Treasure Hunt"
 academics_competition_with_rival_won_total_artifacts: "Won the Treasure Hunt"
 je_academics_rivalry_for_artifacts: "Focus on Archaeology: The Treasure Hunt"
 je_academics_rivalry_for_artifacts_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wants us to find more [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] than our rival [SCOPE.sCountry('target').GetName].\n\nOur #b Total Artifacts#!: [ROOT.Var('lepsius_total_artifacts').GetValue|0+]\n[SCOPE.sCountry('target').GetName]'s #b Total Artifacts#!: [ROOT.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+]"
 je_academics_rivalry_for_artifacts_success: "You ([GetPlayer.MakeScope.Var('lepsius_total_artifacts').GetValue|0+]) have more [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] than [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+])."
 academics.2117.t: "Wondrous artifact collection"
 academics.2117.d_rival: "We have gathered a bigger collection of artifacts than our rival [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName]. The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] and our population are excited about this victory of our nation!"
 academics.2117.d_rival_gone: "Our archaeological Rival is gone. The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] and our population are excited about this victory of our nation!"
 academics.2117.f: "It should be obvious, that our nation must have a better archaeological collection than those barbarians. The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] is contented with this collection. Although there are more artifacts that need to be saved from such savages.\n\nSigned, the members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2117.g: "So many saved artifacts!"
 academics.2118.t: "We failed to expand our archaeological collection"
 academics.2118.d: "We were not able to expand our archaeological collection further than our rivals in [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName]. The members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] are utterly disappointed."
 academics.2118.f: "The dirty hands of those savages are soiling the very history of humanity. How could you let all those artifacts get looted by those tomb raiders. So much knowledge will have been lost because they rather want treasures instead of preserving our history. Disgusting!\n\nThe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2118.g: "We don't need those dusty artifacts."
 academics.2200.t: "We need to find more specimen than [SCOPE.sCountry('rival_scope').GetName]"
 academics.2200.d: "The membetrs of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] are unhappy that [SCOPE.sCountry('rival_scope').GetName] gathered more [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] than our nation. They ask us to find more #b Specimens#! in total than [SCOPE.sCountry('rival_scope').GetName] in 10 years time."
 academics.2200.f: "Our Specimen Collections are nothing in comparison to the ones in [SCOPE.sCountry('rival_scope').GetName]. They have everything we are longing for! I even heard that they have a gigantic flower that smells like rotten corpses. Our whole pride is a orange butterfly. We need to find new specimens, specimens that no one found before us! Otherwise they might fall into the hands of these animal butchers!\n\nSigned, the members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2200_goal_tt: "You will have to gather more [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] than your rival, [SCOPE.sCountry('rival_scope').GetName], in #n 10#! years. They have [GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+], we have [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]."
 academics.2200_reward_tt: "As a reward the Intelligencia will get #p 5 Approval#! and you will get #p 10%#! more prestige for 4 years."
 academics.2200.g: "We need to send our Naturalist out immediately!"
 academics.2200.h: "What a waste of time!"
 academics_no_competition_with_rival_specimen: "Lost the Run for Specimen"
 academics_competition_with_rival_won_specimen: "Won the Run for Specimen"
 je_academics_rivalry_for_specimen: "Focus on Naturalism: The Run for the Specimens"
 je_academics_rivalry_for_specimen_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wants us to find more [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] than our rival [SCOPE.sCountry('target').GetName].\n\nOur #b Total Specimens#!: [ROOT.Var('dubois_specimen').GetValue|0+]\n[SCOPE.sCountry('target').GetName]'s #b Total Specimens#!: [ROOT.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+]"
 je_academics_rivalry_for_specimen_success: "You ([GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]) have more [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] than [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+])."
 academics.2201.t: "Astonishing Specimen Collection"
 academics.2201.d_rival: "We have gathered a bigger collection of [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] than our rival [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]. The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] and our population are excited about this victory of our nation!"
 academics.2201.d_rival_gone: "Our Rival in our quest for a huge biological collection is gone. The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] and our population are excited about this victory of our nation!"
 academics.2201.f: "Finally we have a #b Specimen Collection#! worthy of our great nation. It is time that we can exhibit the most fascinating living beings on this planet. The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] is satisfied with our collection for the moment. Obviously, we will have to keep growing our collection to prevent other nations from butchering these poor animals and plants.\n\nSigned, the members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2201.g: "A worthy collection!"
 academics.2202.t: "We failed to gather more Specimen than [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]"
 academics.2202.d: "We were not able to expand our specimen collection further than our rivals in [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]. The members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] are absolutely crushed."
 academics.2202.f: "Now they found the most fascinating animal in the world too. A flying lizard. They named it after the president of they Academy of Science. You failed.\n\nThe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2202.g: "I will never recover from this scientifically!"
 academics.2203.t: "The [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] want [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] for our Zoo"
 academics.2203.d: "The [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] petitioned our government to acquire [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] for our [concept_dubois_zoo] in 10 year."
 academics.2203.f: "There is an [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] that our Zoo is lacking. We need our government to find [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] and bring it to our Zoo. We can't allow our Zoo to not have this wonderful animal after all.\n\nSigned,  the representatives of the [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]"
 academics.2203_goal_tt: "You will have to acquire a [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] for our [concept_dubois_zoo] in 10 years."
 academics.2203_reward_tt: "As a reward the [GetPlayer.MakeScope.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] will gain #p 5#! approval of your government and #p 5%#! more pop attraction and your country will get #p 5%#! more prestige for 5 years."
 academics.2203.g: "Gotta catch them all!"
 academics.2203.h: "I am leading a great nation. I don't have dealings with a Zoo!"
 je_academics_get_exotic_animal: "Focus on Naturalism: Acquire [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] for our Zoo"
 je_academics_get_exotic_animal_reason: "The [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] wants us to acquire [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] for our [concept_dubois_zoo].\nThere are various ways to acquire such an [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]."
 academics.2204.t: "A new home for [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]"
 academics.2204.d: "We have managed to acquire [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] for our [concept_dubois_zoo]. This will surely make the [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] happy."
 academics.2204.f: "Your government successfully acquired [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] for our glorious country. This shows that our country is powerful enough to spend its ressources on the amusement of our population. Thank you!\n\nSigned, the representatives of the [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]"
 academics.2204.g: "A wonderful animal!"
 academics.2205.t: "No new animal in our zoo"
 academics.2205.d: "We were not able to acquire [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] for our Zoo. The [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] won't be amused."
 academics.2205.f: "You can't even acquired an animal for our Zoo. How should we trust you to guide this country?\n\nSigned, the representatives of the [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]"
 academics.2205.g: "We don't have time for some random animals!"
 academics_exotic_animal_acquired_ig_modifier: "Exotic Animal acquired"
 academics_exotic_animal_not_acquired_ig_modifier: "Exotic Animal not acquired"
 academics_exotic_animal_acquired_country_modifier: "Exotic Animal acquired"
 academics.2206.t: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] demands a Zoo"
 academics.2206.d: "The previous scientific successes in the field of natural research can be described as meager. Some influential scientific representatives have therefore turned to the government with a petition."
 academics.2206.f: "In order to strengthen biological research in general and zoological research in particular, a zoo with a collection of rare animals is essential. Such a facility would also greatly improve the well-being of the population. The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] therefore suggests that all means should be used to establish a national zoo and would also assist in the training of an energetic zoologist.\n\nSigned, The Council of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2206.g: "A few animals can certainly be found."
 academics.2206.h: "Don't these people have anyone else to annoy?"
 academics.2207.t: "The New Zoo"
 academics.2207.d: "Some representatives of the Scientific Society personally attended the inauguration of the new zoo."
 academics.2207.f: "Excellent, really excellent the new zoo. The members have had a wonderful day and are particularly happy about the free pet food. We hope that this will only be a start, and that the zoo that has just opened will soon be expanded and filled with more precious, exotic and wonderful creatures.\n\nSigned, The Council of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2207.g: "Leave me some peanuts!"
 academics.2208.t: "No Zoo"
 academics.2208.d: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wrote a bitter letter today complaining that the wish for a new zoo has not been fulfilled."
 academics.2208.f: "To our great regret we have found that the current government appears to be made up of outright enemies of science, of biology in general and of zoology in particular, or at least a bunch of inhuman animal haters. Perhaps in such an environment the magnificent animals would be wasted in vain.\n\nSigned, The Council of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2208.g: "If you are stubborn, you certainly won't get any wishes fulfilled."
 academics.2206_goal_tt: "You will have to collect #p 5#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] and build a [concept_dubois_zoo] in #n 5#! years. "
 academics.2206_reward_tt: "As a reward, our naturalist will get #p 50 Experience#! If we don't have a naturalist yet, we will get one."
 academics.2209.t: "Zoo Enlargement"
 academics.2209.d: "An open letter from the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] laments the fact that the National Zoo offers little variety."
 academics.2209.f: "Although our capital city now has a zoo facility that offers some variety for scientists to study animals and for the paying public, this facility has barely reached the standard worthy of the city's size and our national importance. In order to increase the prestige, to entertain the population and to advance science, we therefore recommend expanding the current zoo to at least a medium-sized one.\n\nSigned, The Council of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2209.g: "Bring in more animals!"
 academics.2209.h: "We have better things to do."
 academics.2210.t: "An even bigger Zoo"
 academics.2210.d: "An open letter from the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] laments the fact that the National Zoo offers little variety."
 academics.2210.f: "Although we have allowed our zoo to grow to a respectable size in the past, it does not yet enjoy the international importance that it could and should have in order to impress other nations with our zoological passion. We need more and more exotic animals. Not only science is at stake here, but also our prestige. We strongly advise upgrading our zoo to a large zoo.\n\nSigned, The Council of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2211.t: "A thriving Zoological Garden"
 academics.2211.d: "The enlarged Zoological Garden is one of the main attractions of the capital and is very popular with scholars and ordinary citizens alike. The Scientific Society is pleased to note that their wish has been granted."
 academics.2211.f: "Well done! The new zoo is more spacious and fulfills the requirement of depicting a broader spectrum of the world's animal world. I hope you also thought of a platypus? We would like to take over a sponsorship for it. Does it happen to be named Perry?\n\nSigned, The Council of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2211.g: "The animals of the world in our home!"
 academics.2212.t: "Zoological disappointment"
 academics.2212.d: "The Scientific Society wonders if asking the government is still worthwhile when their concerns are trampled on in such a way as the tiny request for a few zoo animals."
 academics.2212.f: "We are very, very disappointed.\n\nSigned, The Council of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2212.g: "They should do research instead of having fun in the zoo."
 academics.2209_goal_tt: "You will have to enlarge your [concept_dubois_zoo] to #p size 3#! (medium-sized zoo) in #n 10#! years."
 academics.2210_goal_tt: "You will have to enlarge your [concept_dubois_zoo] to #p size 4#! (large zoo) in #n 10#! years."
 academics.2209_reward_tt: "As a reward, our naturalist will get #p 50 Experience#! If we don't have a naturalist yet, we will get one."
 je_academics_found_zoo: "Focus on Naturalism: Found a Zoo"
 je_academics_found_zoo_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wants us to build a [concept_dubois_zoo] to enhance knowledge, but also the living standard of our intellectuals. Building a zoo requires #p 5#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')], which may be caught by a [concept_dubois_naturalist] on a local Zoological Expedition or a Heia Safari. Animals may also be buyed from other countries."
 je_academics_medium_zoo: "Focus on Naturalism: Enlarge the Zoo"
 je_academics_medium_zoo_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] has requested an extension of the [concept_dubois_zoo] We have a total of ten years to upgrade our zoo to a #p medium-sized zoo#!. This recquires more [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')], which may be caught by a [concept_dubois_naturalist] on a local Zoological Expedition or a Heia Safari. Animals may also be buyed from other countries."
 je_academics_large_zoo: "Focus on Naturalism: Enlarge the Zoo"
 je_academics_large_zoo_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] has requested an extension of the [concept_dubois_zoo] We have a total of ten years to upgrade our zoo to a #p large zoo#!. This recquires more [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')], which may be caught by a [concept_dubois_naturalist] on a local Zoological Expedition or a Heia Safari. Animals may also be buyed from other countries."
 academics.2300.t: "We need to find more fossils than [SCOPE.sCountry('rival_scope').GetName]"
 academics.2300.d: "We are lacking enough [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] for a larger collection than [SCOPE.sCountry('rival_scope').GetName]. Therefore, the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] want us to find more #b Fossils#! in total than [SCOPE.sCountry('rival_scope').GetName]. They would surely appreciate it a lot if we could beat this rival."
 academics.2300.f: "While our Rivals in [SCOPE.sCountry('rival_scope').GetName] have various Fossils from different ages and places around the world, ours are quite limited both in the timeframe and geographical frame. This is a huge shame and unaccaptable for such a great nation as ours.\nWe need to expand our fossil collection immediately!\n\nSigned, the members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2300_goal_tt: "You will have to gather more [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] than your rival, [SCOPE.sCountry('rival_scope').GetName], in #n 10#! years. They have [GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+], we have [GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]."
 academics.2300_reward_tt: "As a reward the Intelligencia will get #p 5 Approval#! and you will get #p 10%#! more prestige for 4 years."
 academics.2300.g: "Ah, a fossil feud!"
 academics.2300.h: "We do not need any dusty rocks..."
 academics_no_competition_with_rival_fossils: "Lost the Fossil Feud"
 academics_competition_with_rival_won_fossils: "Won the Fossil Feud"
 je_academics_rivalry_for_fossils: "Focus on Paleontology: The Fossil Feud"
 je_academics_rivalry_for_fossils_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wants us to collect more [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] than our rival [SCOPE.sCountry('target').GetName].\n\nOur #b Total Fossils#!: [ROOT.Var('dubois_fossil').GetValue|0+]\n[SCOPE.sCountry('target').GetName]'s #b Total Fossils#!: [ROOT.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+]"
 je_academics_rivalry_for_fossils_success: "You ([GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]) have more [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] than [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+])."
 academics.2301.t: "Fantastic Fossil Collection"
 academics.2301.d_rival: "We have gathered a bigger collection of [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] than our rival [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]. The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] and our population are excited about this victory of our nation!"
 academics.2301.d_rival_gone: "Our Rival in our quest for a huge fossil collection is gone. The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] and our population are excited about this victory of our nation!"
 academics.2301.f: "It was clear from the very beginning that we needed a bigger fossil collection than our Rival. Now that we collected so many fossils from the Cambrian all the way to the Quaternary and from America to the Pacific Islands we truely have a worthy collection! Obviously this should have been the case years ago, and we should exand this collection even further. For the moment the situation is \"good enough\", as the peasants say.\n\nSigned, the members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2301.g: "This puts an end to this feud!"
 academics.2302.t: "We failed to gather more Fossils than [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]"
 academics.2302.d: "We were not able to expand our fossil collection further than our rivals in [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]. The members of the [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] are not amused."
 academics.2302.f: "Their collection spans eons, they have everything and we have some dusty rocks with badly visible fossils... It is horrible. This is a shameful time for our nation! Disgusting.\n\nThe [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2302.g: "I don't need old rocks anyways..."
