 academics.1010.t: "여자가 공부를?"
 academics.1010.d: "우리 대학 중 한 곳에 입학 지원서를 제출한 여학생들이 있는 모양입니다. 여기서 이들의 진학이 위법 사항은 아닌가, 그리고 우리 정부가 여성 진학에 공식적으로 어떤 입장을 갖고 있는가에 관하여 의문이 제기되고 있습니다."
 academics.1010.f: "\"여성의 두뇌는 논리적 사고보다 감정에 알맞게 되어 있으므로, 학업에 나서게 둬서는 안 될 것이오!\"\n\n\"여성이 그대보다 더 유능한 과학자가 될까 두려울 뿐이로군. 그대의 주장은 과학적 근거가 전혀 없으니, 그런 일은 반드시 일어날 것이오! 여성도 남성과 똑같은 조건에서 학업에 나설 수 있도록 해야 합니다!\""
 academics.1010.g: "공부하게 놔 두시오!"
 academics.1010.h: "가만, 여태까지 공부도 못했단 말이오?"
 academics.1010.i: "여자가 집이나 지킬 것이지!"
 academics.1011.t: "훌륭한 여성 과학자"
 academics.1011.d: "우리나라 대학 중 한 곳에서 [SCOPE.sCharacter('academics_female_scientist').GetFullName]라는 여학생이 학과 수석 졸업을 이뤄냈다. 이 학생은 남성들이 지배적인 학문에서 기록적인 속도로 학업을 마치고, 제 전공에서 활약하기를 열망하고 있다. 이토록 훌륭한 학생이 앞으로 나아갈 모습은..."
 academics.1011.f: "그대의 훌륭한 학위에 진심 어린 축하를 전하오! 여자로서 그런 과업을 이뤄낼 지 어느 누가 생각이나 했겠소!"
 academics.1011.g: "...공학자"
 academics.1011.h: "...천문학자"
 academics.1011.i: "...박물학자"
 academics.1011.j: "...고생물학자"
 academics.1011.k: "...고고학자"
 academics.1011.l: "...인류학자"
 academics.1011.m: "필요하지 않다."
