 academics.114.t: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetFullName]의 경험 많은 생물학자 등극"
 academics.114.d: "수 년간 미생물의 생태와 그 밖의 생물학적 현상을 연구해온 우리의 [concept_theiler_biologist] [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] 박사가 이제 경험 많은 학자로 거듭났다!"
