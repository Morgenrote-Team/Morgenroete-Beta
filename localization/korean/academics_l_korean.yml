 academics.21.t: "[concept_tesla_engineer] 사망"
 academics.21.d: "수십 년간 [concept_tesla_engineer]로 활동해 왔던 우리의 #b #ORANGE 최고 공학자#!#!가 세상을 떠났습니다. 이토록 대단한 학자를 언제 또 다시 만날 수 있을까요?"
 academics.21.g: "큰 별이 졌구나!"
 academics.21_tt: "간혹 게임 내 인물이 사망하기도 합니다. 모드에서도 이를 막을 수는 없습니다. 본 이벤트는 해당 과학자가 맡은 역할을 게임에서 제거하여, 그들의 유령에 시달리지 않도록 합니다."
 academics.22.t: "[concept_verrier_astronomer] 사망"
 academics.22.d: "수십 년간 [concept_verrier_astronomer]로 활동해 왔던 우리의 #b #ORANGE 최고 천문학자#!#!가 세상을 떠났습니다. 이토록 대단한 학자를 언제 또 다시 만날 수 있을까요?"
 academics.26.t: "[concept_dubois_naturalist] 사망"
 academics.26.d: "수십 년간 [concept_dubois_naturalist]로 활동해 왔던 우리의 #b #GREEN 최고 박물학자#!#!가 세상을 떠났습니다. 이토록 대단한 학자를 언제 또 다시 만날 수 있을까요?"
 academics.27.t: "[concept_dubois_paleontologist] 사망"
 academics.27.d: "수십 년간 [concept_dubois_paleontologist]로 활동해 왔던 우리의 #b #GREEN 최고 고생물학자#!#!가 세상을 떠났습니다. 이토록 대단한 학자를 언제 또 다시 만날 수 있을까요?"
 academics.29.t: "[concept_lepsius_archaeologist] 사망"
 academics.29.d: "수십 년간 [concept_lepsius_archaeologist]로 활동해 왔던 우리의 #b #BLUE 최고 고고학자#!#!가 세상을 떠났습니다. 이토록 대단한 학자를 언제 또 다시 만날 수 있을까요?"
 academics.30.t: "[concept_lepsius_anthropologist] 사망"
 academics.30.d: "수십 년간 [concept_lepsius_anthropologist]로 활동해 왔던 우리의 #b #BLUE 최고 인류학자#!#!가 세상을 떠났습니다. 이토록 대단한 학자를 언제 또 다시 만날 수 있을까요?"
 academics.90.t: "#b [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]#!"
 academics.90.d: "여기는 [concept_academics_scientific_society]입니다. 이곳에서는 우리의 과학자와 연구원을 만나보실 수 있습니다."
