 academics.91.t: "학계의 정설"
 academics.91.d: "본 학회는 다음의 학설을 유효한 것으로 간주합니다. 다만 학술 대회에서 정설이 바뀔 수도 있습니다."
 academics.91.history: "#T 역사학#!\n"
 academics.91.exodus_default: "성경은 #YELLOW 1차 사료#!로써 유용합니다."
 academics.91.exodus_merit: "성경은 1차 사료가 아니지만, #YELLOW 2차 사료#!로써 유용합니다."
 academics.91.exodus_invention: "성경은 사료로써 #YELLOW 무가치#!하며 연구에 불필요합니다."
 academics.91.civilization_default: "\n가장 오래된 문명은 #YELLOW 이집트 문명#!입니다."
 academics.91.civilization_panbabylonism: "\n가장 오래된 문명은 #YELLOW 바빌론 문명#!입니다. 모든 문화와 사상 업적은 바빌론에서 비롯되었습니다."
 academics.91.civilization_antipanbabylonism: "\n바빌로니아는 인류의 요람으로써 중요하지만, 다른 지역 곳곳에서도 #YELLOW 수평적인 발전 #!이 이루어져 왔습니다."
 academics.91.troy_default: "\n트로이는 #YELLOW 신화#!입니다."
 academics.91.troy_homeric: "\n호메로스가 남긴 트로이 서사시는 #YELLOW 역사적 사건#!을 서술하고 있습니다."
 academics.91.troy_historical: "\n호메로스가 남긴 트로이 서사시에는 #YELLOW 진실의 핵심#!이 담겨 있습니다!"
 academics.91.troy_myth: "\n트로이는 #YELLOW 신화#!입니다."
 academics.91.troy_disputed: "\n트로이에 관한 학계의 논의는 #YELLOW 미해결 상태#!로 남아 있습니다."
 academics.91.natural_history: "\n\n#T 자연사#!"
 academics.91.hippocampus_default: "\n동물계에서 인간의 지위는 #YELLOW 미확정 상태#!입니다."
 academics.91.hippocampus_unique: "\n동물계에서 인간의 지위는 #YELLOW 특별#!합니다."
 academics.91.hippocampus_primate: "\n동물계에서 인간은 #YELLOW 유인원에 가깝습니다#!."
 academics.91.origin_default: "\n현대 인류의 발원지는 #YELLOW 밝혀지지 않았습니다#!."
 academics.91.origin_europe: "\n현대 인류의 발원지는 #YELLOW 유럽#!입니다."
 academics.91.origin_asia: "\n현대 인류의 발원지는 #YELLOW 아시아#!입니다."
 academics.91.origin_africa: "\n현대 인류의 발원지는 #YELLOW 아프리카#!입니다."
 academics.91.extinction_default: "\n공룡이 멸종한 원인은 #YELLOW 밝혀지지 않았습니다#!."
 academics.91.extinction_asteroid: "\n공룡이 멸종한 원인은 #YELLOW 소행성 충돌#!입니다."
 academics.91.extinction_climate: "\n공룡이 멸종한 이유는 #YELLOW 기후 변화#! 때문입니다."
 academics.91.extinction_sex: "\n공룡이 멸종한 이유는 말 그대로 #YELLOW 성관계를 하고 싶지 않았기 때문#!입니다! 토트넘 교수의 부인처럼 말이죠."
 academics.91.extinction_mammals: "\n#YELLOW 포유류와의 경쟁#!으로 포유류가 공룡 알을 노린 것이 공룡의 멸종 원인입니다."
 academics.91.extinction_fat: "\n공룡들의 #YELLOW 지나친 비대화#! (질환성 거인증)로 진화 단계에서 막다른 길에 이르면서 끝내 멸종한 것입니다."
 academics.91.extinction_stupid: "\n공룡이 멸종한 원인은 세월이 흐르면서 #YELLOW 두뇌가 줄어들어 살아남을 머리가 돌아가지 않았기 때문#!입니다."
 academics.91.astronomy: "\n\n#T 천문학#!"
 academics.91.ceres_default: "\n태양계에는 #YELLOW [GetGlobalVariable('verrier_planets_number').GetValue]개#!의 행성이 있습니다."
