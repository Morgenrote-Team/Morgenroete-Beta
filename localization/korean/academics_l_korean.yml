 rule_academics_mission_rule: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon! #! 학술 임무"
 setting_academics_missions_rule: "학술 임무 #p 활성화#!"
 setting_academics_missions_rule_desc: "10년마다 학술 기관을 위한 임무를 받게 됩니다. 이 임무들은 학술 건물 건설이나 일정 수량의 표본 수집 등이 될 수 있습니다. 임무를 완료하면 소정의 보상을 받게 됩니다."
