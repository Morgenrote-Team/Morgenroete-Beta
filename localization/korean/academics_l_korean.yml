 je_academics_find_planet_x_reason: "The [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] wants us to find the mysterious #o Planet X#!. To have a chance to discover it, we will need an [concept_verrier_astronomer] and #p 1500#! discovered [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]."
