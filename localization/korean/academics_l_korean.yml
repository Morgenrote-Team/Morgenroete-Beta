 ademics_our_own_dinosaur_modifier: "우리만의 새 공룡"
 ademics_no_dinosaur_modifier: "공룡 없음"
 academics.2303_goal_tt: "[concept_dubois_dinosaur_skeleton] #G 1점#! 복원"
 academics.2303_reward_tt: "그 보상으로 지식인은 #p 5 찬성#!을 얻고 4년 간 국가 위신이 #p 5%#! 증가하며, 중규모의 기술 투자를 획득합니다."
 je_academics_giant_of_the_past: "고생물학 집중 과제: 태고의 거인"
 je_academics_giant_of_the_past_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]를 수집하여 [concept_dubois_dinosaur_skeleton]을 복원할 것을 요청하였습니다. 그것의 상태가 어떠한가는 나중의 문제입니다. 중요한 것은 우리 소장품에 귀한 유물이 있다는 것입니다. 공룡 뼈는 거대 지층에서 발견할 수 있습니다. 우리 영토 내에 따로 없다면 고생물학자가 해외로 나아가 탐색할 수 있게 해 주는 [concept_dubois_paleontological_licence]를 받는 것이 유리합니다."
 academics.2303.t: "태고의 거인"
 academics.2303.d: "일부 수석 과학자들은 고생물학계의 발전에도 불구하고 아직까지 완전한 공룡 골격을 전시하지 못하고 있는 사실에 안타까움을 표했다. 우리 과학원에서도 지금의 안타까운 상황에 깊은 유감을 표하며 상황이 해결되기를 바라고 있다."
 academics.2303.f: "#V 공룡 내놔! 지금 당장!#!\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동 서명"
 academics.2303.g: "훌륭한 발상일세!"
 academics.2303.h: "저곳은 애기들 놀이터가 아니라 과학 연구소란 말이오."
 academics.2304.t: "무시무시한 공룡"
 academics.2304.d: "신규 공룡 화석이 고생물학 전시관에서 눈길을 사로잡는 소장품으로 떠올랐다. 매일 새로운 방문객들이 이 골격을 구경하기 위해 전시관으로 발길을 옮긴다."
 academics.2304.f: "하나 더 가져도 되겠습니까?\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동"
 academics.2304.g: "마침내 우리도 공룡을!"
 academics.2305.t: "공룡 없음"
 academics.2305.d: "계획했던 공룡 골격을 들이기 위한 전시대가 여전히 빈 상태로 남았다. 이에 과학원에서는 상당한 불쾌감을 표했다."
 academics.2305.f: "대체 얼마나 더 똑똑히 말씀드려야겠습니까?\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동 서명"
 academics.2305.g: "저기 다른 거 갖고 놀아!"
 academics.2306_goal_tt: "#O 특별 화석#! #G 3점#! 발견"
 academics.2306_reward_tt: "그 보상으로 우리 [concept_dubois_paleontologist]는 #p 경험치 50#!을 획득하고, 아직 [concept_dubois_paleontologist]가 없다면 하나를 얻습니다. 또한 대규모 기술 투자도 부여받게 됩니다."
 je_academics_special_fossils: "고생물학 집중 과제: 특별 화석"
 je_academics_special_fossils_reason: "특별 화석은 그 특별한 지위로 인해 별개로 다뤄지는 독특한 화석을 말합니다. 여기에는 시조새나 어룡과 같은 과도기적 형태 뿐만 아니라 거대 나무늘보였던 메가테리움이나 돌고래처럼 생긴 이크티요사우루스처럼 멸종된 대형 포유류의 화석도 포함됩니다. 또한 특정 시대를 정의할 만한 소형 화석, 대표적으로 암모나이트와 삼엽충도 여기에 속합니다. 특수 화석은 총 12가지가 존재하며 지층 뿐만 아니라 과학 탐사를 통해서도 발견될 수 있습니다."
 je_academics_special_fossils_success: "#O 특별 화석#! #G 3점#! 발견"
 academics.2306.t: "예사롭지 않은 화석"
 academics.2306.d: "학회에서 예사롭지 않은 화석에 대해 예사롭지 않은 기안을 올리다."
 academics.2306.f: "동물 계통의 역사는 연구자들에 의해 나날이 새롭게 밝혀지고 있지만, 아직은 자연의 비밀입니다. 여기에서 종과 종의 사이에 위치한, 소위 '잃어버린 고리'라고 부를 수 있는 여러 형상이 특별한 역할을 맡고 있습니다. 한편, 굳이 공룡이 아니더라도 충분히 깊은 인상을 남길 법한 희한한 생물체가 이 행성에 존재했기도 합니다. 가령, 지금은 멸종해 버린 검치호라거나 땅늘보가 있지요. 우리가 적어도 3종류의 특이한 화석을 손에 넣을 수 있다면, 우리 기관의 명성을 세계에 더더욱 떨칠 수 있을 것입니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동 서명"
 academics.2306.g: "특별한 수집품에 특이한 화석이라."
 academics.2306.h: "과학적 역량은 좀 더 의미 있는 데 쓰여야 하지 않겠나?"
 academics.2307.t: "눈부신 화석 표본"
 academics.2307.d: "국립고생물원에서 국제적으로 주목받는 표본 중 하나를 보유하고 있음에는 논란의 여지가 없습니다. 이토록 예사롭지 않은 소장품을 가진 곳은 거의 없을 것입니다."
 academics.2307.f: "특이한 화석이라고 해서 언제나 처음 생각만큼 인상적일 수는 없습니다. 그럼에도 여기에는 상당한 과학적 가치가 있지요. 학회에서 감사의 인사를 전한 이유가 바로 여기에 있습니다. 곧 특별한 전시가 열리겠군요."
 academics.2307.g: "참으로 위대하도다."
 academics.2308.t: "예사롭지 않은 실망"
 academics.2308.d: "최근의 고생물학적 실패에 대해 학회에서 유감을 표하다."
 academics.2308.f: "일국의 자연사에 대한 관심이 철저하게 경시됨은 국가 차원의 비극입니다. 고생물학 연구가 이제는 죽어 없어진 새나 도마뱀 따위를 논하는 헛소리로 치부되어 특수 탐사를 위한 자금 조달마저 거의 이루어지지 않고 있습니다. 아주 작은 규모의 요구조차 할 수 없는 형편이라니. 고발하지 않을 수가 없습니다!\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동 서명"
 academics.2308.g: "허, 참."
 ademics_no_paleontological_hero_modifier: "고생물학계의 영웅 부재"
 academics.2309_goal_tt: "#o 저명한#! [concept_dubois_paleontologist] 보유"
 academics.2309_reward_tt: "그 보상으로 [concept_academics_progress] #p 120#!을 획득합니다."
 je_academics_famous_paleontologist: "고생물학 집중 과제: 저명한 고생물학자"
 je_academics_famous_paleontologist_reason: "[concept_dubois_paleontologist]의 성장은 본인의 경험치 향상에 동반됩니다. 여느 학자처럼 고생물학자는 해마다 경험치 5를 획득합니다. 지층을 대상으로 고생물학 연구를 성공적으로 마치면 경험치를 추가로 획득하게 됩니다. 또한 고생물학자는 산악 원정이나 태평양 탐사에도 나설 수 있습니다. 공룡 골격을 성공적으로 복원하거나 재조립하여도 고생물학자의 경험치 향상에 도움이 됩니다."
 academics.2310.g: "젊은이들의 귀감일세."
 academics.2311.t: "고생물학계의 영웅 부재"
 academics.2311.d: "어떤 이유에서건 우리는 고생물학자의 양성도 그를 통한 세계적인 명예도 이룩할 수 없게 되었다."
 academics.2311.f: "불행히도 일련의 실패로 인해 이 분야는 계속해서 천대받고 있습니다. 까다롭고 특이한 난초처럼만 여겨지는 현실이지요. 학술 연구에 대한 열정도, 이를 활발한 연구 활동으로 이어지게 하는 것도 상당히 제한적일 수밖에 없습니다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]  회원 사이에는 불만의 목소리가 가득합니다. 학자 측에서는 이 상황을 들어 정부를 힐난하고 있습니다."
 academics.2311.g: "유감이군."
 academics_splendid_dinosaur_collection_modifier: "훌륭한 공룡 소장품"
 academics.2312_goal_tt: "#o 공룡 평점#!이 #G 5점#! 이상"
 academics.2312_reward_tt: "그 보상으로 지식인은 #p 5 찬성#!을 얻고, 10년 간 #p 10%#!의 추가 위신을 획득하는 동시에 사회 기술 비용이 #p 5%#! 감소합니다."
 je_academics_dinosaur_rating: "고생물학 집중 과제: 공룡 평점"
 je_academics_dinosaur_rating_reason: "#O 공룡 평점#! 점수를 늘리려면 새로운 공룡 골격을 완성하는 것 뿐만 아니라 그 골격을 완벽하게 재복원하는 과정도 필요합니다. 여기에는 10년의 시간이 소요됩니다. 따라서 [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서 별다른 시간 제한을 두지 않기로 결정하였습니다."
 je_academics_dinosaur_rating_success: "#o 공룡 평점#!이 #G 5점#! 이상"
 academics.2312.t: "고생물학의 장관"
 academics.2312.d: "고생물학 분야에서 우리가 거둔 학문적 진취는 이미 상당히 높은 평판을 얻고 있다. 지금이야말로 공룡 전시를 대폭 향상하여 세계에 우리의 이름을 새길 때이다."
 academics.2312.f: "전시에 다른 공룡을 내보이는 것도 고려해 봄 직합니다. 다량의 골격은 연구에도 물론 이롭지만, 국제적 평판에도 도움을 줍니다. 전 세계가 공룡의 뼈를 파내고 파내며, 지금껏 알려지지 않았던 선사에 매료되었습니다. 양도 양이지만 질 역시 중요하지요. 우리는 공룡 골격 조립의 선두 주자가 되어야만 합니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동 서명"
 academics.2312.g: "이거 아주 큰 일이 되었는걸!"
 academics.2312.h: "이제 고생물학은 그만."
 academics.2313.t: "훌륭한 소장품"
 academics.2313.d: "오늘, 학회는 공룡 골격 특별 전시의 개최를 발표할 수 있다는 사실에 자부심을 느꼈다."
 academics.2313.f: "나라의 높은 고생물학 수준을 과시할 수 있는 공룡 골격 소장품을 가지게 된 것은 모두 정부의 공입니다. 이보다 더 훌륭한 소장품은 존재하기 어렵지 않을지요. 지대한 노력과 헌신, 연구에의 갈망과 끈기가 이 모든 것을 이룰 수 있게 하였습니다. 학회는 이러한 위업을 자부하며 바라볼 것이며, 이국은 선망하며 우러를 것입니다. 여러분, 과학, 특히 고생물학에 있어 오늘은 참으로 뜻깊은 날이 아닐 수 없습니다!\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동 서명"
 academics.2313.g: "훌륭하구나!"
 academics_royalist_reaction_modifier: "왕당파의 대응"
 academics_royalist_weakness_modifier: "왕당파의 무력함"
 academics_constitution_suspended_modifier: "국가기본법 철폐"
 academics_constitution_confirmed_modifier: "국가기본법 승인"
 academics_academic_purge_modifier: "학계의 숙청\n#R -1#! #o 학자 양성 진행도#!"
 academics_good_to_be_british_modifier: "영국인이라서 좋았다"
 academics_supported_hanover_modifier: "하노버 지지"
 academics_supported_goettinger_seven_modifier: "괴팅겐의 7인 지지"
 academics_kneeling_decree_modifer: "장궤 조례"
 academics_germanistentag_modifier: "독일 학술회의"
 je_goettinger_seven_monument: "괴팅겐의 7인 운동"
 je_goettinger_seven_monument_reason: "독일 통일의 지도력을 쥔 국가가 과거 '괴팅겐의 7인'을 지지하였다면, 통일 후에는 그들의 공로를 기릴 수 있게 된다. 기념비를 세우면 후대의 학자들에게 귀감이 될 것이다! 물론 지금의 독일 정부가 전설적인 교수들의 자유주의 사상을 공유한다는 전제가 이루어져야 한다."
 academics.3101.t: "하노버의 헌법"
 academics.3101.d: "국왕께서 첫 어명으로 국가 기본법(Staatsgrungesetz, 헌법)의 폐지를 선언하였다. 에른스트 아우구스투스 1세 국왕께서는 자신이 해당 법에 구속되지 않는다는 점을 역설하였다."
 academics.3101.f: "하노버는 1819년 왕세자 섭정 체제로 헌법을 처음 제정하였으나, 이 헌법은 빈 회의에서 보장된 바 있던 선제후국에서 왕국으로의 전환을 명시하는 데 그칠 뿐이었습니다. 영국 국왕 윌리엄 4세의 하노버 총독으로 재임하던 케임브리지 공작은 하노버 정부의 전면 개편을 건의하였습니다. 윌리엄 4세는 1833년 신헌법을 승인하였으나 컴벌랜드 공작에게는 건의도 승인도 이루어지지 않았으며, 이에 컴벌랜드 공작은 자신의 동의 없이 헌법이 채택된 것에 정식으로 항의하였습니다. 하노버로 건너간 에른스트 국왕은 논란의 여지가 남은 헌법에 의거하여 소집되었던 하노버 의회를 전격 해산하였습니다. 국왕은 자신의 승인이 건의된 적이 없으며 왕국의 필요에도 부합하지 않는다는 점을 근거로 헌법의 효력 정지를 선포하였습니다."
 academics.3101.g: "헌법의 효력을 정지하라."
 academics.3101.h: "국왕은 법 위에 서지 않는다."
 academics.3102.t: "괴팅겐의 7인"
 academics.3102.d: "역사학자이자 정치가인 프리드리히 크리스토프 달만은 하노버의 에른스트 국왕이 본인의 의중에 맞게 헌법을 개정하려는 계획에, 자신이 헌법 초안 작성에 참여했다는 이유를 들어 반대 의사를 표했다. 괴팅겐 대학의 저명한 교수 6인도 1833년 헌법을 옹호하고 개정을 반대하며 입장 표명에 동참했다. 이윽고 이들은 '괴팅겐의 7인'이라 불리우며 국왕의 눈엣가시로 떠올랐다."
 academics.3102.f: "달만의 입장문은 폭발적인 반향을 끌어모았다. 대학의 학부생들은 수백 부에서 수천 부에 달하는 사본을 인쇄하여 독일 전역에 퍼뜨렸다. 나머지 6인으로는 독일학자 형제인 빌헬름 그림과 야콥 그림 (유명 동화, 민담 작가이자 스토리텔러로 통칭 '그림 형제'), 법학자 빌헬름 에두아르트 알브레히트, 역사학자 게오르크 고트프리트 게르비누스, 물리학자 빌헬름 에두아르트 베버, 신학자 겸 동양학자 하인리히 게오르크 아우구스트 에발트가 저항에 나섰다. 이 저항 운동으로 인한 파장은 국왕으로 하여금 대응에 나설 수 밖에 없었으며, 반기를 들었던 7인의 교수들은 대학 재판소로 출석하기에 앞서 심문을 받았다."
 academics.3102.g: "저런 자들은 교수직을 몰수하고 추방시켜야 한다!"
 academics.3102.h: "상황이 악화되기 전에 저들의 요구를 들어주는 것이 어떤가."
 academics.3103.d: "영국에서 빅토리아 여왕이 즉위하면서 120년 넘게 이어져 온 하노버와의 동군연합도 끊어지게 된 것을 슬퍼하는 여론이 일각에서 제기되고 있다. 하지만 최근 독일에서 벌어진 일들을 생각하면 이제는 자신있게 말할 수 있다. 각자의 길을 가는 것이 현명하다고 말이다."
 academics.3103.f: "새 국왕이 즉위한 지 불과 몇 달 만에 하노버 왕국은 영국 통치 하에 제정되었던 헌법을 폐지하게 되었다. 이제 신임 국왕으로 나선 에른스트 아우구스트 1세는 학계의 전적인 반대에 직면해 있다. 이미 독일 전역의 사람들이 이번 논란을 입에 담고 있는 실정이다. 실로 한 국가가 영국의 영향권에 속하여 이득 보는 상황을 벗어나면 곧바로 야만 상태로 전락하고 마는 것이다."
 academics.3103.g: "영국인으로 태어나 좋았다."
 academics.3104.d: "독일 연방의 각 국가는 하노버 국왕과 반항적인 7인의 교수 사이의 갈등으로 몹시 동요하고 있다. 에른스트 아우구스트 국왕이 헌법을 폐지하자 ‘괴팅겐의 7인’이 반기를 들었던 것이다. 이들은 교수직을 잃었지만, 독일 자유주의 진영으로부터 엄청난 지지를 받았다."
 academics.3104.f: "역사학자이자 정치가인 프리드리히 크리스토프 달만은 에른스트 국왕이 본인의 의중에 맞게 헌법을 개정하려는 계획에, 자신이 헌법 초안 작성에 참여했다는 이유를 들어 반대 의사를 표했다. 괴팅겐 대학의 저명한 교수 6인도 1833년 헌법을 옹호하고 개정을 반대하며 입장 표명에 동참했다. 나머지 6인으로는 독일학자 형제인 빌헬름 그림과 야콥 그림 (유명 동화, 민담 작가이자 스토리텔러로 통칭 '그림 형제'), 법학자 빌헬름 에두아르트 알브레히트, 역사학자 게오르크 고트프리트 게르비누스, 물리학자 빌헬름 에두아르트 베버, 신학자 겸 동양학자 하인리히 게오르크 아우구스트 에발트가 저항에 나섰다. 저항으로 인한 직접적인 파장은 제한적이었으나, 독일과 유럽의 여러 국가에서 대중적인 화제와 언론의 관심을 불러일으키면서 7인의 교수들은 일반 대중들 사이에서 인기를 얻게 되었다."
 academics.3104.g: "외람되지만 국왕께서 너무했다고 생각하네."
 academics.3104.h: "이 교수란 작자들은 마땅한 죗값을 치뤄야겠지."
 academics.3105.t: "하노버를 향한 열띤 토론"
 academics.3105.d: "'괴팅겐의 7인'을 둘러싼 갈등은 독일 연방의 다른 국가에서도 주목받지 않을 수 없었다. 영국에서도 하노버 국왕이 헌법을 폐지한 것에 불만을 품는 사람들이 있다고 한다."
 academics.3105.f: "에른스트 아우구스투스 국왕의 행동을 비판한 수많은 독일계 국가 중 하나로 [SCOPE.sCountry('academics_anti_hanover_country').GetName](이)가 있었다. 하지만 권위주의 통치를 받는 국가일수록 이러한 대응 절차를 이해하는 국가들도 있었다. [SCOPE.sCountry('academics_pro_hanover_country').GetName](이)가 그 중 하나였다."
 academics.3105.g: "저들이 상관할 바는 아니야!"
 academics.3106.t: "학생 선전"
 academics.3106.d: "'괴팅겐의 7인'에 찬동하는 선전의 확산을 제지하고자 했던 국가적 차원의 움직임에도, 진보 성향의 학생 단체가 주요 대도시에서 대량의 전단지를 유포하는 데 성공했다."
 academics.3106.f: "괴팅겐의 7인을 기억하라! 우리의 영웅들을 기억하라! 그 용기를 칭송하라! 달만 교수의 하노버 국왕에 항의하는 문건은 독일의 뭇 학생과 자유주의 성향의 사람들에게 크게 지지받았습니다. 이는 독일 연방의 여러 국가에 폭발적인 반향을 불러일으키고 있습니다. 괴팅겐 대학의 학생들은 수백, 심지어 수천의 사본을 독일 전역에 퍼뜨렸습니다."
 academics.3106.g: "이런 반동 놈의 학생 떼거지 같으니!"
 academics.3107.t: "[ROOT.GetCountry.GetNameNoFlag]의 야코프 그림"
 academics.3107.d: "하노버에서 추방당한 명망 높은 독일의 학자이자 법률가인 야코프 그림이 새로운 거처를 찾고 있다. 우리가 '괴팅겐의 7인'에 보였던 공감이 그에게 이곳에서의 새로운 자리를 바라게 한 듯하다."
 academics.3107.f: "야콥 루트비히 카를 그림은 독일의 작가, 언어학자, 문헌학자, 법학자, 민속학자였다. 《독일어 사전》의 공동 저자이자 《독일 신화》의 저자이며, 《그림 동화집》의 편집자를 맡기도 했다. 카를 그림은 빌헬름 그림의 형으로 두 사람을 아울러 '그림 형제'라는 문학 2인조로 널리 알려져 있었다."
 academics.3107.g: "환영합시다."
 academics.3107.h: "괴짜 학자를 또 들일 필요는 없네."
 academics.3108.t: "[ROOT.GetCountry.GetNameNoFlag]에 머무는 빌헬름 에두아르트 베버"
 academics.3108.d: "하노버에서 추방당한 유명 물리학자 빌헬름 에두아르트 베버가 새로운 거처를 찾고 있다. '괴팅겐의 7인'에 대한 우리의 동정심이 그에게까지 전해진 만큼, 새로운 직장을 간절히 바라고 있다고 한다."
 academics.3108.f: "빌헬름 에두아르트 베버는 독일의 물리학자로, 카를 프리드리히 가우스와 함께 전자기를 이용한 전보를 최초로 발명한 사람이다."
 academics.3111.t: "그림 형제"
 academics.3111.d: "야콥 그림과 빌헬름 그림 형제가 독일어의 어휘를 전부 다루고자 독일어 사전의 제1권을 출간하였다. 엄청난 작업이지만 독일 문화권을 더욱 결속시키는 계기가 될 것이다."
 academics.3111.f: "Das Deutsche Wörterbuch (The German Dictionary) is one of the most important dictionaries of the German language. It is for German what the Oxford English Dictionary is for English, containing detailed historical information about the origin and use over time of German words, with examples taken from actual documents. In German the dictionary is also known as 'Der Grimm'. It was started by the Grimm brothers in 1838. Initially they expected the project to take ten years and produce 6 or 7 volumes. In fact, the first volume was not published until 1854. Wilhelm Grimm died in 1859, and Jacob in 1863, while working on the entry for 'Frucht' (fruit). After their deaths multiple institutions were involved in the work, including the Prussian Academy of Sciences and the Berlin Academy, with a center in Göttingen also involved. Finally completed in 1961, the dictionary will contain 32 volumes and include about 350,000 main entries. The 'Grimm' was not only a scientific, but also national work."
 academics.3111.g: "This should be published in every German State!"
 academics.3112.g: "I hoped they made a new fairy tale book instead of this..."
 academics.3113.t: "First Germanistentag in Frankfurt"
 academics.3113.d: "Several German intellectuals have invited like-minded people to a conference in Frankfurt, the 'Germanists' Day'. While many want to see this gathering as just a cultural event, the political message is just as clear."
 academics.3113.f: "The 'Germanist Days' were, contrary to what the name suggests, not an event just for Germanists. They were an initiative of German university scientists as part of the development of a German national feeling. In contrast to today, the term German studies had a broader meaning in the Vormärz: it linked historians, lawyers and linguists and literary scholars who dealt with German history, German law and the German language. At the first Germanists' Day, initiated in Frankfurt in 1846 by the Tübingen lawyer August Ludwig Reyscher, Friedrich Christoph Dahlmann, Georg Waitz and Johann Gustav Droysen spoke about the indivisibility of Schleswig-Holstein. Jacob Grimm talked about the 'value of imprecise sciences', his brother Wilhelm talked about the German dictionary. The conferences were held in the Römer in Frankfurt. A second Germanists' Day followed in Lübeck in 1847. The third Germanists' Day, which was supposed to take place in Nuremberg in 1848, did not take place due to the March Revolution."
 academics.3113.g: "Germany is a cultural nation."
 academics.3113.h: "Their liberal ideals serve as a guide for us."
 academics.3115.t: "Kneeling Controversy"
 academics.3115.d: "With the annexations of surrounding lands in the Napoleonic age, Bavaria gained large territories which were protestant. In this time, the king promoted a more tolerant politic toward his subjects. An example was the edict, that protestant soldiers had not to knee in front of a catholic mass or procession. However, Minister Karl von Abel has proposed to change this."
 academics.3115.f: "19세기 전반, 이른바 '장궤 논쟁'이 바이에른 왕국에서 불거졌습니다. 바이에른의 장관 카를 폰 아벨이 추진한 이 조례는 개신교도라 해도 복무 중의 병사라면 성체 앞에서 무릎을 꿇을 것을 종용하는 내용을 담고 있었습니다. 이 포고는 훗날 '장궤 조례'로 알려지게 됩니다. 이는 몇 년간 하원을 뜨겁게 달구었습니다."
 academics.3115.g: "우리는 가톨릭 국가이다. 국민은 무릎을 꿇으라!"
 academics.3115.h: "그러면 개신교도는 어찌하란 말인가?"
