 academics.2110.t: "박물관장의 대표 유물 소장 희망"
 academics.2110.d: "오늘 고고학 박물관장은 [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 일동을 대표하여 정부에 공개 서한을 보냈습니다."
 academics.2110.f: "우리 박물관에는 유물 소장 규모는 풍부하나 그 소장품들을 대표하는 주요 전시품이 아직 없다는 점을 매우 유감스럽게 생각하여 말씀드립니다. 정부가 지금까지 유물의 양보다 질을 중시하는 고고학계의 표준에 주력하지 못한 것을 안타깝게 생각합니다. 따라서 저는 이 문제가 향후 몇 년 안에 바로잡혀야 한다고 강력히 권고합니다. 그렇지 않으면 우리나라는 전세계 과학계에서 그저 회계 담당으로만 남게 될 것입니다.\n\n고고학 박물관 관장 서명"
 academics.2110.g: "훌륭한 시도일세."
 academics.2110.h: "그럴 가치는 없어."
 academics.2110_goal_tt: "앞으로 #n 15년 이내#!에 [concept_lepsius_major_artifact] #p 1점#!을 수집하여야 합니다."
 academics.2111.t: "박물관의 장엄함"
 academics.2111.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서 오늘 보낸 서신에 감사를 표하였습니다."
 academics.2111.f: "고고학을 국가 최우선 과제로 삼기로 한 결단에 진심으로 축하드립니다. 최근 입수한 이 특별한 유물은 앞으로 몇 주 동안 특별 전시로 선보일 예정입니다. 전 세계가 우리를 부러워할 것입니다!\n\n고고학 박물관 관장 서명"
 academics.2111.g: "경이롭구나."
 academics.2112.t: "먼지는 쌓여 가고"
 academics.2112.d: "오늘 고고학 박물관장은 [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 일동을 대표하여 보낸 공개 서한에서 고고학계의 목소리가 나라에 제대로 전달되지 않고 있다는 점에 유감을 표명했습니다."
 academics.2112.f: "이토록 소수의 사람들이, 이토록 짧은 시간 안에, 이토록 많은 것을 망친 적은 없었습니다.\n\n고고학 박물관장 서명"
 academics.2112.g: "그래서?"
 je_academics_major_artifact: "고고학 집중 과제: 대표 유물"
 je_academics_major_artifact_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서는 최소 #p 1개#!의 [concept_lepsius_major_artifact]을 찾아낼 것을 바라고 있습니다. 대표 유물은 주요 고고학 발견, 상설 발굴 조사, 탐사 도중 무작위로 벌어지는 일련의 이벤트로 획득할 수 있습니다."
 je_academics_major_artifact_success: "[concept_lepsius_major_artifact] #p 1점#! 보유"
 academics.2113.t: "박물관장이 요구하는 고고학적 탁월함"
 academics.2113.d: "고고학 박물관장은 전시를 완벽 그 자체로 만드는 데 필요한 것이 다소 부족하다고 지적했습니다."
 academics.2113.f: "저는 겸손한 사람입니다. 아시다시피, 저의 요구는 그다지 과장된 것이 아닙니다. 분에 넘치는 부탁을 드린 적도 없지 않았습니까. 이처럼 훌륭한 기관의 학예사로서 늘 자제하는 마음을 지켜 왔습니다. 허나 우리의 아름다운 소장품을 세계적인 수준으로 끌어올리려면 찍어야 할 마지막 점 하나가 부족한 상황입니다. 더도 말고 완벽한 전시만 있으면 됩니다. 특정 지역에서 유물 100점과 주요 유물 1점을 확보하는 것, 그리 어려울 건 못 되지 않겠습니까?\n\n고고학 박물관 관장 서명"
 academics.2113.g: "그 도전, 기꺼이 받아들이지."
 academics.2113.h: "위험 부담이 크다."
 academics.2112_goal_tt: "앞으로 #n 20년 이내#!에 완벽한 전시를 마련해야 합니다."
 academics.2114.t: "고고학의 정점"
 academics.2114.d: "오늘 고고학 박물관에서 거의 알아볼 수 없는 편지가 도착했습니다."
 academics.2114.f: "편지의 발신자만 겨우 알아볼 수 있었습니다. 서명은 분명 박물관장의 것이었습니다. 비서관은 관장이 편지를 쓰면서 기쁨의 눈물을 흘렸지 않겠느냐고 짐작했습니다."
 academics.2114.g: "우리나 그 자나 행복하긴 마찬가지야."
 academics.2115.t: "고고학의 좌절"
 academics.2115.d: "오늘 고고학 박물관에서 거의 알아볼 수 없는 편지가 도착했습니다."
 academics.2115.f: "편지의 발신자만 겨우 알아볼 수 있었습니다. 서명은 분명 박물관장의 것이었습니다. 비서관은 관장이 편지를 쓰면서 눈물을 흘렸을 것이라 짐작했습니다. 지난번 고고학 발굴 조사의 실패로 깊은 우울증에 빠뜨린 것이 틀림없습니다."
 academics.2115.g: "우리나 그 자나 침울하긴 마찬가지야."
 je_academics_excellent_collection: "고고학에 주력하기: 완벽한 소장품"
 je_academics_excellent_collection_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서 완벽한 전시를 구성했으면 좋겠다는 뜻을 밝혀 왔습니다. 이를 위해서 특정 고고학 조사 지역에서 나온 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] #G 100점#!과 [concept_lepsius_major_artifact] #p 1점#!이 필요합니다."
 academics.2116.t: "[SCOPE.sCountry('rival_scope').GetName]보다 더 많은 유물을 찾아야 한다"
 academics.2116.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]의 회원들은 [SCOPE.sCountry('rival_scope').GetName]에서 우리나라보다 더 많은 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]을 모은 것에 불만을 품고 있습니다. 이에 따라 향후 10년 이내에 [SCOPE.sCountry('rival_scope').GetName]보다 많은 수의 #b 유물#!을 찾아내자고 요구하고 있습니다."
 academics.2116.f: "[SCOPE.sCountry('rival_scope').GetName] 같은 보잘것없는 나라가 우리보다 더 많은 유물을 소장하고 있다니 참으로 부끄러운 일입니다! 보물만 파헤칠 줄 알지 진정한 고고학에 나서지 않는 이 도굴꾼들을 반드시 따라잡아야 합니다! 저런 야만인들 때문에 얼마나 많은 지식이 사라졌겠습니까? \n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동 서명"
 academics.2116_goal_tt: "앞으로 #n 10년#! 이내에 경쟁국 [SCOPE.sCountry('rival_scope').GetName]보다 더 많은 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]을 모아야 합니다. 저들은 [GetPlayer.MakeScope.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+]개, 우리는 [GetPlayer.MakeScope.Var('lepsius_total_artifacts').GetValue|0+]개를 보유하고 있습니다. "
 academics.2116_reward_tt: "그 보상으로 지식인은 #p 5 찬성#!을 얻고, 4년간 #p 10%#!의 추가 위신을 획득합니다."
 academics.2116.g: "내가 바로 고고학자, 구덩이를 판다네!"
 academics.2116.h: "고고학이 무슨 보물 사냥인 줄 알아!"
 academics_no_competition_with_rival_total_artifacts: "보물찾기 패배"
 academics_competition_with_rival_won_total_artifacts: "보물찾기 승리"
 je_academics_rivalry_for_artifacts: "고고학 집중 과제: 보물찾기"
 je_academics_rivalry_for_artifacts_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서는 우리 경쟁국 [SCOPE.sCountry('target').GetName]보다 더 많은 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]을 찾아내길 바라고 있습니다.\n\n우리의 #b 총 유물 수#!: [ROOT.Var('lepsius_total_artifacts').GetValue|0+]개\n[SCOPE.sCountry('target').GetName]의 #b 총 유물 수#!: [ROOT.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+]개"
 je_academics_rivalry_for_artifacts_success: "우리 ([GetPlayer.MakeScope.Var('lepsius_total_artifacts').GetValue|0+]개)는 [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+]개)보다 더 많은 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]을 보유하고 있습니다."
 academics.2117.t: "경이로운 유물 소장품"
 academics.2117.d_rival: "우리나라가 경쟁 관계에 있는 [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName]보다 더 큰 규모의 유물 소장품을 확보하였다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')](와)과 온 나라가 이번 승리에 도취되고 있다!"
 academics.2117.d_rival_gone: "유물 확보 경쟁국이 역사 속으로 사라졌다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')](와)과 온 나라가 이번 승리에 도취되고 있다!"
 academics.2117.f: "우리나라가 저런 야만인들보다 훨씬 훌륭한 고고학 소장품을 확보해야 했던 것은 자명한 사실입니다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서는 이번에 확보된 소장품에 만족하고 있습니다. 비록 저 야만인들로부터 구해내야 할 유물이 더 많기는 하지만 말입니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동 서명"
 academics.2117.g: "살려낸 유물이 이렇게나 많구나!"
 academics.2118.t: "고고학 소장품 확대 실패"
 academics.2118.d: "우리는 경쟁 관계에 있는 [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName]보다 더 많은 고고학 소장품을 확보할 수 없게 되었다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]의 회원들은 몹시 실망하는 분위기다."
 academics.2118.f: "저 야만인들의 더러운 손이 인류의 역사를 더럽히고 있다니! 어떻게 저 모든 유물들이 도굴꾼들에게 약탈당하도록 내버려 둘 수 있단 말입니까? 저들은 우리의 역사를 보존하는 것보다 보물을 탐내는 데 더 열중하고 있으니, 얼마나 많은 지식이 사라질 것인지 모릅니다! 참으로 역겹습니다!\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2118.g: "그런 먼지 쌓인 유물은 필요 없어."
 academics.2200.t: "[SCOPE.sCountry('rival_scope').GetName]보다 더 많은 표본 확보하기"
 academics.2200.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]의 회원들은 [SCOPE.sCountry('rival_scope').GetName]에서 우리나라보다 더 많은 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]을 모은 것에 불만을 품고 있습니다. 이에 따라 향후 10년 이내에 [SCOPE.sCountry('rival_scope').GetName]보다 많은 수의 #b 표본#!을 찾아내자고 요구하고 있습니다."
 academics.2200.f: "우리 표본 소장품은 [SCOPE.sCountry('rival_scope').GetName]의 것에 비하면 아무것도 아닙니다. 저들은 우리가 애타게 바라는 모든 것을 다 갖고 있습니다! 심지어 썩은 시체 냄새 나는 거대한 꽃도 있다는 소문까지 들었습니다. 우리 쪽의 자랑거리는 고작 주황색 나비 한 마리뿐입니다. 우리가 새로운 표본, 아무도 발견하지 못한 표본을 찾아 나서야 되겠습니다! 그렇지 않으면 그 표본은 동물 백정들의 손에 넘어갈지 모를 일입니다!\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동 서명"
 academics.2200_goal_tt: "앞으로 #n 10년#! 이내에 경쟁국 [SCOPE.sCountry('rival_scope').GetName]보다 많은 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]을 모아야 합니다. 저들은 [GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+]개, 우리는 [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]개를 보유하고 있습니다."
 academics.2200_reward_tt: "그 보상으로 지식인은 #p 5 찬성#!을 얻고, 4년간 #p 10%#!의 추가 위신을 획득합니다."
 academics.2200.g: "우리도 박물학자를 즉시 파견해야 하겠소!"
 academics.2200.h: "시간 낭비로다!"
 academics_no_competition_with_rival_specimen: "표본 확보 경쟁 패배"
 academics_competition_with_rival_won_specimen: "표본 확보 경쟁 승리"
 je_academics_rivalry_for_specimen: "박물학 집중 과제: 표본 확보 경쟁"
 je_academics_rivalry_for_specimen_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서는 우리 경쟁국 [SCOPE.sCountry('target').GetName]보다 더 많은 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]을 찾아내기를 바라고 있습니다.\n\n우리의 #b 총 표본 수#!: [ROOT.Var('dubois_specimen').GetValue|0+]개\n[SCOPE.sCountry('target').GetName]의 #b 총 표본 수#!: [ROOT.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+]개"
 je_academics_rivalry_for_specimen_success: "우리 ([GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]개)는 [SCOPE.sCountry('target').GetName]([GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+]개)보다 더 많은 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]을 보유하고 있습니다."
 academics.2201.t: "눈부신 수집 표본"
 academics.2201.d_rival: "우리나라가 경쟁 관계에 있는 [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]보다 더 큰 규모의 수집 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]을 확보하였다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')](와)과 온 나라가 이번 승리에 도취되고 있다!"
 academics.2201.d_rival_gone: "생물 표본 수집 경쟁국이 역사 속으로 사라졌다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')](와)과 온 나라가 이번 승리에 도취되고 있다!"
 academics.2201.f: "드디어 우리는 위대한 조국에 걸맞는 #b 수집 표본#!을 보유하게 되었습니다. 이제 우리는 지구상에서 가장 매혹적인 생명체들을 전시할 차례입니다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서는 지금 시점의 수집품에 만족합니다. 물론 다른 나라들이 불쌍한 동물과 식물들을 학살하는 것을 막으려면 우리도 계속해서 소장품을 늘려나가야 할 것입니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동 서명"
 academics.2201.g: "훌륭한 수집품이다!"
 academics.2202.t: "[ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]보다 더 많은 표본 확보 실패"
 academics.2202.d: "우리는 경쟁 관계에 있는 [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]보다 더 많은 수집 표본을 확보할 수 없게 되었다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]의 회원들은 몹시 침통한 분위기다."
 academics.2202.f: "이제 저들은 세상에서 가장 매혹적인 동물도 발견했답니다. 날아다니는 도마뱀이랍니다. 그 도마뱀에게 과학 아카데미 회장의 이름을 붙였다고 합니다. 당신네들은 실패했고요.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2202.g: "과학적으로 절대 만회할 수 없게 되었구나!"
 academics.2203.t: "[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]의 동물원 [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] 반입 요청"
 academics.2203.d: "[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] 세력이 앞으로 10년 안에 [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]을 확보하여 우리 [concept_dubois_zoo]에 들여다 놓아달라는 청원을 우리 정부 측에 보냈습니다."
 academics.2203.f: "우리 동물원에는 없는 [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]이 있습니다. 정부에서 [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]을 찾아 동물원에 들여와 주시기를 바랍니다. 우리 동물원에 이런 멋진 동물이 없도록 놔 둘 수는 없습니다.\n\n[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] 대표 서명"
 academics.2203_goal_tt: "앞으로 10년 내에 우리 [concept_dubois_zoo]에 들일 [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]을 확보해야 합니다."
 academics.2203_reward_tt: "그 보상으로 [GetPlayer.MakeScope.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]는 우리 정부에 대한 찬성 #p 5#!와 인구층 유치 #p 5%#!를 얻고, 5년간 나라에 위신 #p 5%#!가 증가하는 효과를 얻습니다."
 academics.2203.g: "자, 이제 시작이야!"
 academics.2203.h: "국가를 이끄는 내게 동물원이 무슨 소용이겠는가!"
 je_academics_get_exotic_animal: "박물학 집중 과제: 동물원에 들일 [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] 입수하기"
 je_academics_get_exotic_animal_reason: "[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]에서 우리 [concept_dubois_zoo]에 들일 [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]을 입수해 주기를 희망하고 있습니다.\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]을 입수하는 방법은 여러 가지가 있습니다."
 academics.2204.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]의 새로운 보금자리"
 academics.2204.d: "우리는 [concept_dubois_zoo]에 들일 [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')](을)를 어렵사리 입수하는 데 성공했다. 이것으로 [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]에서 틀림없이 만족하게 될 것이다."
 academics.2204.f: "우리 정부가 찬란한 조국을 위하여 [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]를 입수하는 데 성공하였습니다. 이로써 우리나라는 국민의 오락을 위해 재원을 들일 만큼 부강하기 그지없다는 것을 보여주게 되었습니다. 이에 감사드립니다!\n\n[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] 대표 서명"
 academics.2204.g: "참 멋진 동물이군!"
 academics.2205.t: "동물원의 새 동물 반입 무산"
 academics.2205.d: "우리는 동물원에 들일 [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]의 입수에 실패하였습니다. [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]에서 만족하지 않을 것입니다."
 academics.2205.f: "동물원에 들일 동물 한 마리를 입수하는 것조차 여의치 않았나 봅니다. 그래서야 당신이 어떻게 이 나라를 이끈다고 믿을 수 있겠습니까?\n\n[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] 대표 서명"
 academics.2205.g: "영문 모를 짐승들에게 할애할 시간은 없소!"
 academics_exotic_animal_acquired_ig_modifier: "이국적 동물 입수"
 academics_exotic_animal_not_acquired_ig_modifier: "이국적 동물 미입수"
 academics_exotic_animal_acquired_country_modifier: "이국적 동물 입수"
 academics.2206.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]의 동물원 설립 요구"
 academics.2206.d: "자연 탐구 분야에서 지금껏 이룬 과학적 성과는 미미하다고 볼 수 있습니다. 이에 일부 영향력 있는 과학계 인사들이 정부 측에 청원서를 전달하였니다."
 academics.2206.f: "전반적인 생물학 연구, 특히 박물학 연구를 강화하기 위해서는 희귀 동물을 소장해 두는 동물원의 존재가 필수적입니다. 그러한 시설을 갖추면 국민의 삶의 질 향상에도 기여할 것입니다. 이에 따라 [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서는 국립 동물원의 설립을 위해 모든 수단을 동원하여, 유능한 동물학자 양상에도 보탬이 되기를 제안드리는 바입니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 이사회 서명"
 academics.2206.g: "동물 몇 마리 정도는 틀림없이 찾을 수 있을 것이오."
 academics.2206.h: "이 자들은 괴롭힐 사람이 없어서 나한테 이러는가?"
 academics.2207.t: "동물원 개원"
 academics.2207.d: "새 동물원의 개원식에 과학원 대표단이 직접 참석하였습니다."
 academics.2207.f: "정말이지 훌륭하기 그지없는 동물원입니다. 저희 회원들도 즐거운 하루를 보냈지만 특히 무료 먹이를 받고서 기뻐하는 분위기였습니다. 이번 동물원 개원은 시작에 불과한 만큼, 머지않아 확장에 나서 더더욱 귀중하고 이국적이고 멋진 동물들로 가득 차기를 기원합니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 이사회 서명"
 academics.2207.g: "나도 땅콩 좀 남겨주길 바라네!"
 academics.2208.t: "동물원 건립 무산"
 academics.2208.d: "오늘 [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 측에서 새로운 동물원을 건립해달라는 건의가 받아들여지지 않은 점을 강하게 규탄하는 내용의 서신을 보냈습니다."
 academics.2208.f: "저희로서는 지금 정부가 과학, 특히 생물학과 동물학을 대놓고 적대시하는 자들, 혹은 적어도 몰인정한 동물 혐오자들로 들어찬 것으로 보여 몹시 유감스럽습니다. 이런 환경이라면 아무리 근사한 동물을 들여놓아 봤자 헛수고로 돌아갈지도 모르겠습니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 이사회 서명"
 academics.2208.g: "그렇게 고집이 세서야 어디 바라는 걸 이룰 수나 있겠는가."
 academics.2206_goal_tt: "앞으로 #n 5년 이내#!에 [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] #p 5마리#!를 모으고 [concept_dubois_zoo]을 지어야 합니다."
 academics.2206_reward_tt: "그 보상으로 우리 박물학자는 #p 경험치 50#!을 획득하고, 아직 박물학자를 보유하지 못한 경우에는 박물학자를 획득하게 됩니다."
 academics.2209.t: "동물원 확장"
 academics.2209.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서 국립 동물원이 제공하는 볼거리가 너무 적다는 사실에 개탄하는 내용의 공개 서한을 보냈습니다."
 academics.2209.f: "현재 우리 수도에는 동물원 시설을 갖추어 과학자들이 동물을 연구하고 일반인들도 관람할 수 있는 여러 볼거리를 제공하고 있으나, 그 시설만큼은 도시의 규모와 국가의 위상에 걸맞은 수준에 한참 못 미치고 있습니다. 도시의 명성을 높이고 시민들에게 즐거움을 선사하며 과학 발전에 기여하기 위하여 지금의 동물원을 적어도 중규모로 확장할 것을 권고하는 바입니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 이사회 서명"
 academics.2209.g: "더 많은 동물을 들여라!"
 academics.2209.h: "그보다 더 해야 할 일이 있어서."
 academics.2210.t: "훨씬 더 큰 동물원"
 academics.2210.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서 국립 동물원이 제공하는 볼거리가 너무 적다는 사실에 개탄하는 내용의 공개 서한을 보냈습니다."
 academics.2210.f: "지난 수 년여간 우리 동물원을 누구나 눈여겨볼 만한 규모로 확장하였음에도, 우리의 동물학에 대한 열정을 세계에 각인시킬 만큼의 수준도 아니거니와 그에 따르는 국제적인 위상 역시 누리지 못하고 있습니다. 우리에게는 더욱더 많은 이방의 동물이 필요합니다. 과학의 발전. 물론 중요합니다. 하지만, 이는 우리의 명예에 직결되는 문제입니다. 따라서 동물원을 보다 향상할 것을 당부하는 바입니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 이사회 서명"
 academics.2211.t: "성대한 동물원"
 academics.2211.d: "이번 확장으로 우리 수도의 주요 명소로 떠오른 동물원은 학계는 물론 일반 시민들로부터 엄청난 인기를 끌어모으고 있다. 과학원에서는 자신들의 바람이 이루어져 기쁘게 생각하고 있다."
 academics.2211.f: "정말 잘하셨습니다! 새로운 동물원은 공간도 훨씬 넓을 뿐더러 전세계 동물계의 스펙트럼을 넓히자는 요구 사항에 부응하고 있습니다. 혹시 오리너구리도 들여오실 생각이 있으신지요? 저희가 후원할 의향이 있습니다. 이름은 페리로 하는 것이 어떻겠습니까?\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 이사회 서명"
 academics.2211.g: "전세계의 동물을 조국에!"
 academics.2212.t: "동물학계의 유감"
 academics.2212.d: "과학원에서는 동물원 동물 몇 마리를 들여달라는 사소한 요청에도 묵살되는 상황에서 정부에 관심사를 건의하는 것이 과연 의미가 있는지를 놓고 의문을 품고 있다."
 academics.2212.f: "저희로서는 정말 정말 유감입니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 이사회 서명"
 academics.2212.g: "동물원에서 놀고 있을 게 아니라 연구를 하란 말이다."
 academics.2209_goal_tt: "앞으로 #n 10년 이내#!에 [concept_dubois_zoo]을 #p 3단계 규모#! (중규모 동물원)로 확장하여야 합니다."
 academics.2210_goal_tt: "앞으로 #n 10년 이내#!에 [concept_dubois_zoo]을 #p 4단계 규모#! (대규모 동물원)로 확장하여야 합니다."
 academics.2209_reward_tt: "그 보상으로 우리 박물학자는 #p 경험치 50#!을 획득하고, 아직 박물학자를 보유하지 못한 경우에는 박물학자를 획득하게 됩니다."
 je_academics_found_zoo: "박물학 집중 과제: 동물원 설립"
 je_academics_found_zoo_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서는 지식 그 자체는 물론 지식인의 삶의 질을 향상시키기 위하여 [concept_dubois_zoo]을 설립할 것을 희망하고 있습니다. 동물원 건설에는 [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] #p 5마리#!가 필요하며 [concept_dubois_naturalist]가 현지 동물 탐사나 사파리 사냥을 통해 확보할 수 있습니다. 다른 국가에서 동물을 매수하여 들여올 수도 있습니다."
 je_academics_medium_zoo: "박물학 집중 과제: 동물원 확장"
 je_academics_medium_zoo_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서 [concept_dubois_zoo]의 확장을 건의하였습니다. 우리는 앞으로 10년 이내에 동물원을 #p 중규모 동물원#!으로 승격시켜야 합니다. 이를 위해서는 더 많은 [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]이 필요하며 [concept_dubois_naturalist]가 현지 동물 탐사나 사파리 사냥을 통해 확보할 수 있습니다. 다른 국가에서 동물을 매수하여 들여올 수도 있습니다. "
 je_academics_large_zoo: "박물학 집중 과제: 동물원 확장"
 je_academics_large_zoo_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서 [concept_dubois_zoo]의 확장을 건의하였습니다. 우리는 앞으로 10년 이내에 동물원을 #p 대규모 동물원#!으로 승격시켜야 합니다. 이를 위해서는 더 많은 [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]이 필요하며 [concept_dubois_naturalist]가 현지 동물 탐사나 사파리 사냥을 통해 확보할 수 있습니다. 다른 국가에서 동물을 매수하여 들여올 수도 있습니다. "
 academics.2300.t: "[SCOPE.sCountry('rival_scope').GetName]보다 더 많은 화석을 찾아야 한다"
 academics.2300.d: "우리나라는 [SCOPE.sCountry('rival_scope').GetName]보다 더 많은 소장품을 마련하는 데 있어 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]의 수가 마땅치 않은 실정이다. 그렇기에 [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서는 우리가 [SCOPE.sCountry('rival_scope').GetName]보다 더 많은 수의 #b 화석#!을 찾아내기를 희망하고 있다. 경쟁국을 이길 수 있다면 그들은 틀림없이 감사를 표할 것이다."
 academics.2300.f: "우리 경쟁국 [SCOPE.sCountry('rival_scope').GetName]에서 전세계 곳곳을 누비며 여러 시대의 화석들을 갖춘 반면, 우리는 시간범위와 지리적 범위 모두에서 수집규모가 상당히 제한된 실정입니다. 이는 우리나라처럼 위대한 국가에서 용납될 수 없는 엄청난 수치입니다.\n우리 화석 소장품을 즉시 확대할 것을 요구하는 바입니다!\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동 서명"
 academics.2300_goal_tt: "앞으로 #n 10년#! 이내에 경쟁국 [SCOPE.sCountry('rival_scope').GetName]보다 많은 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]을 모아야 합니다. 저들은 [GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+]개, 우리는 [GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]개를 보유하고 있습니다."
 academics.2300_reward_tt: "그 보상으로 지식인은 #p 5 찬성#!을 얻고, 4년간 #p 10%#!의 추가 위신을 획득합니다."
 academics.2300.g: "아, 화석 경쟁이로군!"
 academics.2300.h: "분진 날리는 돌덩이는 쓸모 없네만..."
 academics_no_competition_with_rival_fossils: "화석 경쟁 패배"
 academics_competition_with_rival_won_fossils: "화석 경쟁 승리"
 je_academics_rivalry_for_fossils: "고생물학 집중 과제: 화석 경쟁"
 je_academics_rivalry_for_fossils_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서는 우리 경쟁국 [SCOPE.sCountry('target').GetName]보다 더 많은 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]을 찾아내기를 바라고 있습니다.\n\n우리의 #b 총 화석 수#!: [ROOT.Var('dubois_fossil').GetValue|0+]개\n[SCOPE.sCountry('target').GetName]의 #b 총 화석 수#!: [ROOT.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+]개"
 je_academics_rivalry_for_fossils_success: "우리 ([GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+])가 [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+]개)보다 더 많은 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]을 모아야 함"
 academics.2301.t: "근사한 화석 소장품"
 academics.2301.d_rival: "우리나라가 경쟁 관계에 있는 [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]보다 더 큰 규모의 수집 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]을 확보하였다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')](와)과 온 나라가 이번 승리에 도취되고 있다!"
 academics.2301.d_rival_gone: "화석 수집 경쟁국이 역사 속으로 사라졌다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')](와)과 온 나라가 이번 승리에 도취되고 있다!"
 academics.2301.f: "우리에게 경쟁국보다 더 큰 규모의 화석 소장품이 필요하다는 사실은 처음부터 자명했습니다. 이제 우리는 캄브리아기에서 제4기까지, 아메리카 대륙에서 태평양 도서에 이르기까지 수많은 화석들을 수집하여 가치 있는 소장품을 이룩하게 되었습니다! 진작에 이룩했어야 할 일이었고, 앞으로도 이 소장품을 더욱 확대해야 한다는 사실은 분명합니다. 지금으로서는 속된 말로 '그냥저냥'인 상황입니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]의 회원 일동 서명"
 academics.2301.g: "이것으로 불화에 종지부를 찍었군!"
 academics.2302.t: "[ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]보다 더 많은 화석 확보 실패"
 academics.2302.d: "우리는 우리와 경쟁 관계에 있는 [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]보다 더 많은 화석 표본을 확보할 수 없었다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]의 회원들은 이러한 상황을 달가워하지 않을 것이다."
 academics.2302.f: "그들의 소장품은 장구한 세월을 담아내고 있습니다. 이는 단연코 완벽이라 말할 수 있을 것입니다. 그에 비하면 우리의 소장품은 윤곽이 겨우 드러나는 흙투성이 암석에 불과하군요... 뭐라 할 말이 없습니다. 이 수치를 어떻게 감당할 수 있겠습니까! 구역질이 날 지경입니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2302.g: "이제 닳은 돌 따위 보고 싶지도 않네..."
 je_academics_get_exotic_animal_polar_loc: "#p 북극곰#!"
 je_academics_get_exotic_animal_grizzly_loc: "#p 회색곰#!"
 je_academics_get_exotic_animal_eagle_loc: "#p 대머리독수리#!"
 je_academics_get_exotic_animal_bison_loc: "#p 아메리카들소#!"
 je_academics_get_exotic_animal_panther_loc: "#p 플로리다퓨마#!"
 je_academics_get_exotic_animal_alligator_loc: "#p 악어#!"
 je_academics_get_exotic_animal_axolotl_loc: "#p 아홀로틀#!"
 je_academics_get_exotic_animal_sloth_loc: "#p 세발가락나무늘보#!"
 je_academics_get_exotic_animal_jaguar_loc: "#p 재규어#!"
 je_academics_get_exotic_animal_anteater_loc: "#p 큰개미핥기#!"
 je_academics_get_exotic_animal_armadillo_loc: "#p 아홉띠아르마딜로#!"
