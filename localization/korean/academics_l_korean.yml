 academics.2004.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사님께\n\n저희는 박사님께서 새로 찾아낸 별을 담은 성도를 새로 제작하실 수 있을 것으로 대단히 기대하고 있습니다. 박사님의 뛰어난 기량을 고려하면 별 문제되지 않을 것으로 봅니다. 이에 따라 향후 10년 이내에 훌륭한 성도가 새로 완성되기를 기대하겠습니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]의 동료 학자 일동 서명"
 academics.1.d: "수십 년간 교량과 기계, 건축물을 설계하고 구축하는 데 일생을 바친 [SCOPE.sCharacter('academics_retired_person_scope').GetFullName](이)가 마침내 은퇴를 결심했다. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U]는 더 이상 [concept_tesla_engineer]로 활동하지 않게 되었다."
 academics.1.g: "이것으로 [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U]는 은퇴에 이르게 되었다!"
 academics.2.d: "수십 년 간 새로운 별과 성운, 천문 현상을 찾아내는 데 일생을 바친 [SCOPE.sCharacter('academics_retired_person_scope').GetFullName](이)가 은퇴를 결심했습니다. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U]는 더 이상 [concept_verrier_astronomer]로 활동하지 않습니다."
