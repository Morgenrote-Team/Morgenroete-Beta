 academics.112.d: "수 년간 연구와 활동을 지속해온 우리의 [concept_dubois_paleontologist] [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] 박사가 이제 경험 많은 학자로 거듭났다!"
 academics.112.f: ""
 academics.112.g: "아주 좋아!"
 academics.113.t: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]의 저명한 고생물학자 등극"
 academics.113.d: "오랜 시간 동안 화석과 공룡 뼈를 연구하고 발굴해온 우리의 [concept_dubois_paleontologist] [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] 박사가 이제 고생물학계에서 저명한 학자로 거듭났다! "
 academics.113.f: ""
 academics.113.g: "그 명성도 공룡 뼈만큼 오래 가지 않겠는가?"
 academics.116.t: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName]의 경험 많은 고고학자 등극"
 academics.116.d: "수 년간 연구와 활동을 지속해온 우리의 [concept_lepsius_archaeologist] [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 이제 경험 많은 학자로 거듭났다!"
 academics.116.f: ""
 academics.117.t: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName]의 저명한 인류학자 등극"
 academics.117.d: "오랜 시간 동안 사라진 문명의 유물을 연구하고 발굴해온 우리의 [concept_lepsius_archaeologist] [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] 박사가 이제 고고학계에서 저명한 학자로 거듭났다!"
 academics.117.f: ""
 academics.117.g: "이제 중절모 좀 쓰고 다녀도 되겠어!"
 academics.118.t: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName]의 경험 많은 인류학자 등극"
 academics.118.d: "수 년간 연구와 활동을 지속해온 우리의 [concept_andersson_anthropologist] [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] 박사가 이제 경험 많은 학자로 거듭났다!"
 academics.118.f: ""
 academics.118.g: "스스로 진화했다!"
 academics.119.t: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName]의 저명한 인류학자 등극"
 academics.119.d: "오랜 시간 동안 원시인의 흔적을 연구하고 발굴해온 우리의 [concept_andersson_anthropologist] [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] 박사가 이제 인류학계에서 저명한 학자로 거듭났다!"
 academics.119.f: ""
 academics.119.g: "신인류가 도래했구나!"
 academics.108.t: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]의 경험 많은 지질학자 등극"
 academics.108.d: "수 년간 채굴과 학습을 지속해온 우리의 [concept_agassiz_geologist] [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 이제 경험 많은 학자로 거듭났다!"
 academics.108.f: ""
 academics.108.g: "내 맘도 쏙 파고들었어!"
 academics.109.t: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]의 저명한 지질학자 등극"
 academics.109.d: "사람보다 암석과 더 오랜 시간을 보낸 우리의 [concept_agassiz_geologist] [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] 박사가 이제 지질학계에서 저명한 학자로 거듭났다!"
 academics.109.f: ""
 academics.109.g: "돌도 눈돌아 가겠지!"
 academics.140.t: "우리의 공학자 [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName](이)가 토목 공학자로 활동"
 academics.140.d: "수 년간의 토목 공학 경력이 결실을 맺었다. 수많은 교량과 터널 공사에 참여한 [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] 박사가 이제 진정한 [concept_tesla_civil_engineer]로 인정받게 되었다. 박사가 진행하던 사업에 속도가 붙을 것이다!"
 academics.140.f: ""
 academics.140.g: "미래를 선도할 공학자로다!"
 academics.141.t: "우리의 공학자 [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName](이)가 기계 공학자로 활동"
 academics.141.d: "수 년간의 기계 공학 경력이 결실을 맺었다. 수많은 발명품과 새로운 기계를 만들어낸 [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] 박사가 이제 진정한 [concept_tesla_mechanical_engineer]로 인정받게 되었다. 앞으로도 놀라운 사업들을 기대해 본다!"
 academics.141.f: ""
 academics.141.g: "진보의 동력이 여기에 있었구나!"
 academics.142.t: "우리의 공학자 [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName](이)가 군사 공학자로 활동"
 academics.142.d: "수 년간의 군사 경력이 결실을 맺었다. 오랫동안 방어 기지를 세우고 신무기를 구축하여 우리 군의 무장을 책임진 [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] 박사가 이제 진정한 [concept_tesla_military_engineer]로 인정받게 되었다. 계속해서 조국을 위해 힘써 주기를 바란다!"
 academics.142.f: ""
 academics.142.g: "우리 군의 기반을 구축해 주었구나!"
 academics.143.t: "우리의 공학자 [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName](이)가 전기 공학자로 활동"
 academics.143.d: "오래토록 전기 동력의 활용을 꿈꿔 왔던 [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] 박사는 이 분야에서 수차례 획기적인 발전을 이룩하며 [concept_tesla_electrical_engineer]로 인정받게 되었다."
 academics.143.f: ""
 academics.143.g: "지식이 번뜩였다!"
 academics.144.t: "우리의 공학자 [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName](이)가 항공 공학자로 활동"
 academics.144.d: "오랜 시간 동안 인류는 비행을 꿈꿔 왔다. 이제 항공기의 시대가 도래하면서 항공 공학의 최전선에 서 있는 [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] 박사는 이 분야에서 수차례 획기적인 발전을 이룩하며 [concept_tesla_aeronautical_engineer]로 인정받게 되었다."
 academics.144.f: ""
 academics.144.g: "저 하늘 높이!"
 notification_academics_yearly_experience_gain_notification_name: "연간 학자 경험치 획득"
 notification_academics_yearly_experience_gain_notification_desc: "경험치 획득이 가능한 모든 학자에게 #p 0#!에서 #p 5#!의 경험치를 부여합니다."
 dubois_humanities_receive_promotion_loc: "무덤 도굴꾼과 시체 사랑꾼 주제에 우리 사회에 무슨 보탬이 된다고!"
 dubois_natural_history_receive_promotion_loc: "나비나 모으고 괴물이나 만드는 주제에, 예산은 다 잡아먹고 우린 그 남은 돈으로 연명해야 하는 이유는 뭐지?"
 dubois_mathematics_receive_promotion_loc: "저 정신나간 땜장이와 점성술사들이 해 달라고 나불대는 건 다 들어주면서, 우리는 그 남은 부스러기나 쓸어야 한다니 정말이지 모자란 짓입니다!"
 academics_engineer_focus_atmospheric_engine_loc: "저희는 증기력을 이용하여 노동자를 기계로 대체하려고 노력하고 있습니다. 이렇게 하면 자원 채굴이나 제품 생산에 들어가는 비용을 절감할 수 있을 것입니다!"
 academics_engineer_focus_computer_loc: "저희는 모든 종류의 계산을 수행할 수 있는 기계를 만들려고 노력하고 있습니다. 이것이 실현된다면 인간 계산수는 더 이상 필요하지 않게 될 것입니다. 어떤 것이든 오류 하나 없이 최고의 정확도로 계산할 수 있을 겁니다!"
 academics_engineer_focus_washing_machine_loc: "저희의 목표는 사람이 직접 빨래할 필요 없이 빨래할 수 있는 기계를 만드는 것입니다. 더 이상 더러운 옷을 빨래하느라 시간 낭비할 필요가 없다는 점에서 우리 사회를 뒤바꿔 놓을 것입니다!"
 academics_engineer_focus_lighter_loc: "주머니에 쏙 들어가는 작은 라이터가 있다면 얼마나 유용할지 떠올려 보시지 않겠습니까? 큰 불꽃을 만들어서 촛불이나 담배에 불을 붙일 수 있는 그런 라이터 말입니다. 이거 정말 대박이지 않습니까!"
 academics_engineer_focus_rocket_loc: "저희는 우주에 도달할 수 있는 로켓을 제작해 보려고 합니다. 그런 로켓이 군사적으로 활용되면 어떻게 될 지 떠올려 보십시오. 적은 아무리 공격받아도 전혀 대응할 수가 없을 겁니다!"
 academics_engineer_focus_telephone_loc: "아주 먼 거리에 있는 사람과 대화할 수 있는 기기를 상상해 보십시오! 그것이 바로 저희 연구실에서 한창 연구하고 있는 기기입니다!"
 academics_engineer_focus_combustion_engine_loc: "기차는 훌륭하지만 크기도 너무 크고 철로도 놓아야 합니다. 만약 조그마한 차량을 움직일 수 있는 소형 엔진을 만들 수 있다면 어떨까요? 누구든지 어디로든 갈 수 있게 될 겁니다. 그런 엔진의 활용도도 매우 높겠지요. 그리고 저희 팀이 한창 연구하고 있는 것이 바로 그것입니다!"
 academics_engineer_focus_basic_research_alloys_loc: "저희는 쓸모있는 합금을 최대한 많이 찾기 위해 기초 연구를 진행하고 있습니다. 꼭 알맞은 합금을 발견한다면, 현재로서는 불가능하다고 여기는 더 나은 공법, 더 효율적인 기계와 장치를 만들 수 있을 것입니다!"
 academics_engineer_focus_basic_research_factory_machinery_loc: "저희 팀은 공장에서 사용되는 기계의 개량 연구를 진행하고 있습니다. 생산량을 늘리고 국가 경제 발전에 크게 기여할 수 있을 것입니다!"
 academics_engineer_focus_basic_research_housing_loc: "저희는 저렴한 가격에 주거 공간을 확보할 수 있는 가장 효율적인 주택 건설 공법을 연구하고 있습니다. 국민들이 더 나은 주거 환경을 누릴 수 있도록, 건설업계에 활기가 돌도록 큰 보탬이 될 것입니다."
 academics_engineer_focus_basic_research_urban_planing_loc: "우리나라의 도시는 효율성이 떨어집니다. 그러므로 저희는 도시를 더욱 효율적으로 바꾸는 방법을 찾아 시민들의 삶의 질을 향상시키고자 합니다!"
 academics.2001.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서 천문 조사에 주력할 것을 건의"
 academics.2001.d: "우리나라는 아직 천문학 연구가 활발하지 않고 수석 [concept_verrier_astronomer]조차도 보유하고 있지 않다. 따라서 [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서 새로운 성도를 만들고 수석 천문학자를 임명해 달라는 건의가 올라왔다."
 academics.2001.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서는 조국이 천문학에 더욱 헌신해 주시기를 요청드립니다. 이러한 노력으로 하늘과 우주에 대한 새로운 지식을 터득할 것입니다.\n 하여 첫째로 최신 연구에 기반한 성도를 새로 제작할 것이며, 둘째로 수석 천문학자를 임명할 것을 건의드립니다. \n\n [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 이사회 서명"
 academics.2001.g: "에드 아스트라 (별을 향하여)!"
 academics.2001.h: "별이라니? 차라리 다른 게 낫겠소!"
 academics_unhappy_intelligentsia: "과학원이 불만에 빠집니다"
 academics.2001_goal_tt: "앞으로 #n 10년#! 동안 총 #p 75개#!의 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]를 발견하고 [concept_verrier_astronomer]를 보유해야 합니다."
 academics.2001_reward_tt: "그 보상으로, 천문학자는 #p 15 경험치#!를 획득하고 지식인은 #p 5 찬성#!을 얻게 되며 생산 기술 비용이 3년간 #p 5%#! 감소하는 효과를 얻습니다."
 je_academics_find_more_stars: "천문학 집중 과제: 성도"
 je_academics_find_more_stars_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서 성도를 새로 제작하기 위해 [JournalEntry.GetGoalAddValue]개의 새로운 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]를 발견하고 신임 수석 [concept_verrier_astronomer]를 임명해 달라는 뜻을 밝혀왔습니다.\n\n지금까지 우리는 [JournalEntry.GetGoalProgressValue]개의 #b 천체#!를 발견하였습니다."
 je_academics_find_more_stars_success: "#p 75개#!의 새로운 #b 천체#!를 찾음"
 je_academics_find_more_stars_event_tt: "우리의 신임 [concept_verrier_astronomer]가 새로운 성도를 제출합니다"
 je_academics_find_more_stars_goal: ""
 academics.2002.t: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사가 새로운 성도를 제출"
 academics.2002.d: "새 성도의 제작 준비가 끝나고 신임 수석 [concept_verrier_astronomer]도 섭외하였다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]도 만족을 표할 것이다!"
 academics.2002.f: "\"이 새로 만든 성도는 참으로 정확하오! 다른 나라의 성도와도 비교해 봤는데, 우리 것이 확실히 더 우수하군요. 게다가 몹시 흥미로운 별도 많이 발견했구려! 이를테면 이 별은 평소보다 붉은 빛을 더 발하는 구만.\""
 academics.2002.g: "만세!"
 academics_scientific_society_happy: "과학원이 만족합니다"
 academics.2003.t: "천문학 집중 과제 실패!"
 academics.2003.d: "우리는 [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서 제시한 목표 달성에 실패하면서 천문학에 최선을 다하지 못하게 되었다. 과학원은 만족하지 못할 것이다!"
 academics.2003.f: "\"윗분들께선 과학이란 것이 전쟁이나 경제, 심지어 와인이나 술보다도 하찮아 보이는 모양이구려. 실망스럽구만. 그토록 위대한 우리나라인데 하루빨리 과학으로도 관심을 돌려주었으면!\""
 academics.2003.g: "참으로 안타깝도다!"
 academics.2004.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서 [concept_verrier_astronomer]에게 새 성도 제작을 요청"
 academics.2004.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서는 우리나라가 천상 관측에 주력해야 한다고 보고 있다. 이에 [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사에게 새로운 별과 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]를 찾고 성도를 새로 제작해줄 것을 요청하였다."
 academics.2004_goal_tt: "앞으로 #n 10년#! 안에 #p 100개#!의 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]를 발견해야 합니다."
 academics.2004_reward_tt: "그 보상으로, 천문학자는 #p 25 경험치#!를 획득하고 지식인은 #p 5 찬성#!을 얻게 되며 생산 기술 비용이 3년간 #p 5%#! 감소하는 효과를 얻습니다."
 je_academics_create_star_chart: "천문학 집중 과제: 우리 천문학자의 성도"
 je_academics_create_star_chart_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서 성도를 새로 제작하기 위하여 우리 [concept_verrier_astronomer]가 새로운 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] [JournalEntry.GetGoalAddValue]개를 찾아달라는 뜻을 밝혀왔습니다.\n\n지금까지 우리는 [JournalEntry.GetGoalProgressValue]개의 #b 천체#!를 발견하였습니다."
 je_academics_create_star_chart_success: "#p 100개#!의 새로운 #b 천체#!를 찾음"
 je_academics_create_star_chart_event_tt: "우리의 [concept_verrier_astronomer]가 새로운 성도를 제출합니다."
 je_academics_create_star_chart_event_without_astronomer_tt: "우리의 새로운 성도가 발표됩니다."
 je_academics_create_star_chart_failed_event_tt: "우리 [concept_verrier_astronomer]가 새로운 성도를 제출하지 못했습니다."
 je_academics_create_star_chart_failed_event_without_astronomer_tt: "[concept_verrier_astronomer]를 잃게 되면 성도 제작도 실패하게 됩니다."
 je_academics_create_star_chart_goal: ""
 academics.2005.t: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사가 새로운 성도를 제출"
 academics.2005.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사는 동료 학자들과 건배를 나누었습니다.\n\n\"친구여, 그대라면 충분히 해낼 수 있을 거라고 믿었소. 당신이 새로 만든 성도는 정말 훌륭하오! 말 그대로 걸작이야!\""
 academics.2006.t: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] 박사의 실패!"
 academics.2006.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName](이)가 새로운 성도 제작에 실패하였다. 성도가 제대로 완성되는 데 필요한 별과 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]를 충분히 찾아내지 못했기 때문이다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서는 제작 실패 소식에 몹시 실망한 분위기다."
 academics.2006.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFirstName] 님께,\n\n본 학회는 귀하께서 새로운 성도를 제출하지 못한 것을 확인하였습니다. 이로써 귀하께서 과학보다는 다른 활동을 더 선호하신다는 것을 다시 한번 마주하게 되었습니다. 이는 유감스럽지만 우리 학회에 부정적 영향을 끼칠 것입니다. 앞으로는 더욱 개선되길 바라겠습니다!\n\n [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2006.g: "참으로 안타깝도다!"
 academics.2007.t: "새로운 성도"
 academics.2007.d: "안타깝게도 전임 [concept_verrier_astronomer]께서 자리를 비운 관계로, 새로운 성도는 [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서 발표하게 되었다. 학회 측에서는 새로운 성도에 상당히 만족하고 있는 것으로 보인다."
 academics.2007.f: "\"이 새로운 성도 덕분에 밤하늘을 훨씬 더 자세히 연구할 수 있게 되었소! 천체들의 움직임에 대해 새로운 통찰력을 많이 얻게 되기를 바라오!\n이 모든 게 가능해진 것은 [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]의 덕이오! 여러분, 다같이 건배합시다!\""
 academics.2008.t: "천문학자도 없고, 성도도 없고"
 academics.2008.d: "[concept_verrier_astronomer]의 부재로 항성과 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]의 발견이 예상보다 적었다. 이로 인해 새로운 성도를 제작하기에는 충분치 않은 상황이다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서는 이러한 결과에 만족하지 못하고 있다."
 academics.2008.f: "우리 정부에서 뛰어난 수석 천문학자를 잃은 것도 모자라, 천문학자들의 연구를 충분히 지원하지도 못했소. 이런 연유로 관측 횟수가 크게 줄었다 하오. 이는 천문학 연구가 퇴보했단 뜻이 아닌가. 참으로 두렵구려!"
 academics.2009.t: "[SCOPE.sCountry('rival_scope').GetName]보다 더 많은 별을 찾아야 한다"
 academics.2009.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원들은 [SCOPE.sCountry('rival_scope').GetName]에서 우리나라보다 더 많은 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]를 찾아낸 것에 불만을 품고 있다. 이에 따라 10년 안에 [SCOPE.sCountry('rival_scope').GetName]보다 더 많은 #b 천체#!를 찾아내라고 요구하고 있다."
 academics.2009.f: "[SCOPE.sCountry('rival_scope').GetName]처럼 보잘것없는 나라가 우리보다 더 많은 천체를 발견했다는 것은 유감스러운 일입니다. 우리는 이 미개한 풋내기 천문학자들을 하루빨리 따라잡아 그 나라보다 더 많은 천체를 발견해야 하겠습니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동 서명"
 academics.2009_goal_tt: "앞으로 #n 10년#! 이내에 경쟁국 [SCOPE.sCountry('rival_scope').GetName] 보다 더 많은 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]를 찾아내야 합니다. 현재 경쟁국이 찾아낸 천체의 수는 [GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+]개, 우리가 찾아낸 천체의 수는 [GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]개입니다. "
 academics.2009_reward_tt: "그 보상으로 지식인은 #p 5 찬성#!을 얻고, 4년간 #p 10%#!의 추가 위신을 획득합니다."
 academics.2009.g: "우리가 한번 이겨보자!"
 academics.2009.h: "지금이 무슨 우주 경쟁 시대도 아니고..."
 academics_no_competition_with_rival: "천체 경쟁 패배"
 academics_competition_with_rival_won: "천체 경쟁 승리"
 je_academics_rivalry_for_stars: "천문학 집중 과제: 천체 경쟁"
 je_academics_rivalry_for_stars_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서 경쟁국 [SCOPE.sCountry('target').GetName]보다 더 많은 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]를 찾아내기를 바라고 있습니다.\n\n우리가 발견한 #b 천체#!: [ROOT.Var('verrier_astronomical_objects').GetValue|0+]개\n[SCOPE.sCountry('target').GetName]에서 발견한 #b 천체#!: [ROOT.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+]개"
 je_academics_rivalry_for_stars_success: "당신이 발견한 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] ([GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]개)가 [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+]개)보다 많습니다."
 academics.2010.t: "천체 경쟁에서 승리하다"
 academics.2010.d_rival: "우리가 [ROOT.Var('je_rival_nation_var').GetCountry.GetName]보다 더 많은 천체를 발견하였다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')](와)과 온 국민이 이번 승리에 도취되고 있다!"
 academics.2010.d_rival_gone: "천체 발견 경쟁국이 역사 속으로 사라졌다.  [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')](와)과 온 나라가 이번 승리에 도취되고 있다!"
 academics.2010.f: "저희 [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동은 경쟁국에 대한 과학적 승리를 거두게 되어 대단히 기쁘게 생각합니다. 저들의 과학자들은 석기시대에 머무르고 있으며 우리 이상의 천체를 발견할 능력이 없단 것을 보여주게 되었습니다. 오늘은 우리나라에 있어 위대한 날입니다!\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동 서명"
 academics.2011.t: "천체 경쟁에서 패배하다"
 academics.2011.d: "우리는 [ROOT.Var('je_rival_nation_var').GetCountry.GetName]보다 더 많은 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]를 찾아내지 못했다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]의 회원들은 몹시 실망하고 있다."
 academics.2011.f: "우리 학계의 이번 실패는 우리나라의 관심사가 과학과 그 발전에 있지 않다는 것을 다시 한번 증명하고 있습니다. 따라서 우리는 과학을 위해 적대적 행위와 세계정복 계획을 중단할 것을 제안하는 바입니다. \n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동 서명"
 academics.2012.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]의 [concept_verrier_observatory] 설치 요구"
 academics.2012.d: "우리 [concept_academics_scientific_society]의 회원들이 앞으로 10년 이내에 근대적인 [concept_verrier_observatory]를 건설할 것을 요구하였습니다. 천문대를 건설하면 우리는 [concept_verrier_astronomy]을 수행하고 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]를 찾아낼 수 있게 됩니다."
 academics.2012.f: "바야흐로 온 강대국이 천문대를 보유하는 바, 우리 [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동은 천문대 건설을 요구하는 바입니다. 천문대가 없다면 우리는 결코 과학의 최전선에 설 수 없게 됩니다. 그렇기에 천문대는 반드시 마련할 필요가 있습니다. \n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 이사회 서명"
 academics.2012.g: "지금 바로 최고의 건축가와 공학자들을 모셔오도록 하라!"
 academics.2012.h: "천문대 같은 게 있어봤자 뭘 하겠소?"
 academics.2012_goal_tt: "앞으로 #n 10년#! 이내에 [concept_verrier_observatory]를 지어야 합니다."
 academics.2012_reward_tt: "그 보상으로, 지식인은 #p 5 찬성#!을 얻고 생산 기술 비용이 5년간 #p 5%#! 감소하며, 학자 인구의 충성도를 #p 5%#! 확보하는 효과를 얻습니다."
 je_academics_build_observatory: "천문학 집중 과제: 천문대 설치"
 je_academics_build_observatory_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서 [concept_verrier_observatory]를 설치해 달라는 뜻을 밝혀왔습니다. 천문대를 설치하려면 최소 한 개 이상의 대학을 보유하고, #b 근대 천문학#!을 연구했거나 [concept_verrier_astronomer]를 보유해야 합니다. "
 academics.2013.t: "신축 천문대의 관측 개시"
 academics.2013.d: "새로 지은 [concept_verrier_observatory]가 개관하여 천문 관측에 나서게 되었습니다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원들은 기뻐하는 모습입니다... 적어도 지금은 말입니다."
 academics.2013.f: "천문대를 건설한 덕분에 우리나라는 이제 드디어 밤하늘을 관측할 수 있게 되었습니다. 경축드립니다. 이제 우리는 진정한 과학 선진국으로 인정받을 수 있을 것입니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동 서명"
 academics.2013.g: "밤하늘의 미스터리들을 밝혀내고야 말겠다!"
 academics.2014.t: "천문학계의 실패"
 academics.2014.d: "우리는 [concept_verrier_observatory]를 지을 수 없게 되었습니다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]의 회원들은 몹시 실망한 분위기입니다!"
 academics.2014.f: "우리나라에서 천문대 설치라는 것은 10년이란 시간 내에도 해내지 못한 것을 보면 대단히 어려운 일인가 봅니다! 그 시간 동안 새로운 행성을 발견하거나 수백 개의 별을 찾거나 수많은 혜성의 움직임을 계산할 수 있었을 텐데 말입니다. 제대로 된 망원경이 없으니 꿈도 꾸지 못할 일이겠지요. 참으로 부끄러운 일입니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2014.g: "그건 혜성 탓이다!"
 academics.2015.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서 행성 X의 발견을 희망하다"
 academics.2015.d: "우리 [concept_academics_scientific_society] 회원들은 행성 X의 발견이 금세기 최고의 과학적 성과가 될 것이라고 확신하고 있다. 이들은 우리가 다른 누구보다 먼저 그 신비로운 행성을 찾는 데 주력해 줄 것을 요청하고 있다."
 academics.2015.f: "다른 나라들도 X 행성을 찾기 위해 열심이라는 소식을 들었습니다만, 이런 획기적인 발견은 우리의 공이 되어야 합니다! 이런 거대한 과제에서 다른 나라들을 전부 이겨야 하는 것입니다!\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 이사회 서명"
 academics.2015.g: "그 행성을 찾는 데 온 사력을 다하시오!"
 academics.2015.h: "행성 X라고? 행성 Y라면 했을 텐데..."
 academics.2015_goal_tt: "다른 누구보다 #b 행성 X#!를 먼저 찾아야 합니다. 행성을 발견할 기회를 얻으려면 [concept_verrier_astronomer]가 있어야 하며, 지금까지 발견한 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]의 수가 #p 1500개#!여야 합니다."
 academics.2015_reward_tt: "그 보상으로, 지식인은 #p 5 찬성#!을 얻고 생산 기술 비용이 10년간 #p 5%#! 감소하며, 학자 인구의 충성도를 #p 10%#! 확보하고 당신의 [concept_verrier_astronomer]는 [concept_academics_experience] #p 50#!을 획득합니다."
 je_academics_find_planet_x: "천문학 집중 과제: 행성 X 찾기"
 je_academics_find_planet_x_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서 미지의 #o 행성 X#!를 찾아낼 것을 희망하고 있다. 행성을 발견할 기회를 얻으려면 [concept_verrier_astronomer]가 있어야 하며, 지금까지 발견한 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]의 수가 #p 1500개#!여야 한다."
 je_academics_find_planet_x_complete_tt: "누구보다 #o 행성 X#!를 먼저 발견하십시오."
 je_academics_find_planet_x_fail_tt: "다른 나라에서 #o 행성 X#!을 먼저 발견함"
 academics.2016.t: "행성 X를 발견하다"
 academics.2016.d: "우리가 제일 먼저 행성 X를 발견하였습니다! [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서도 기뻐하는 분위기입니다."
 academics.2016.f: "편지에는 이상한 공식과 도표들이 휘갈겨 있었습니다. 누군가 액체를 쏟은 듯한 얼룩도 있었고, 굳이 짚자면 캐비어 조각도 묻어 있는 것 같습니다. 도대체 무슨 일이 있었던 건지 의문을 그칠 수가 없습니다."
 academics.2016.g: "이것은 금세기 가장 중요한 천문학계의 발견이로다!"
 academics.2017.t: "행성 X의 발견을 놓치다"
 academics.2017.d: "다른 나라에서 우리보다 먼저 행성 X를 발견하였습니다. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]의 회원들은 이 소식에 망연자실한 분위기입니다!"
 academics.2017.f: "용납할 수 없습니다. \n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 올림"
 academics.2017.g: "어차피 진짜 행성도 아니건만!"
