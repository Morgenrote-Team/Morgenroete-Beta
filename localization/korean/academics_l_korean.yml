 je_academics_found_archaeological_museum: "고고학 집중 과제: 박물관 설립"
 je_academics_found_archaeological_museum_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서는 지식 그 자체는 물론 지식인의 삶의 질을 향상시키기 위하여 고고학 박물관을 설립할 것을 희망하고 있습니다. 박물관 건설에는 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] #p 5개#!가 필요하며, 큰 행운이 따라서 우연히 선물받거나 현지 발굴을 통해 얻게 되지 않는 이상, [concept_lepsius_archaeologist]가 [concept_lepsius_expedition]에서 발견하게 됩니다.\n또 전문 고고학자들이 즐겨 쓰는 \"이건 박물관에 있어야 해!\"란 말은 실제 박물관이 없으면 아무 의미가 없기 때문에 매우 중요한 것입니다.\n\n사실 그런 상황은 몹시 난처할 수밖에 없겠지요."
 je_academics_egyptian_artifacts: "고고학 집중 과제: 이집트 유물"
 je_academics_egyptian_artifacts_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서는 최소 #p 25개#!의 이집트 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]을 찾길 바라고 있습니다. 우연히 선물받거나 현지 발굴을 통해 확보하는 등의 큰 행운이 따르지 않는 이상, [concept_lepsius_archaeologist]가 [concept_lepsius_expedition]이나 [concept_lepsius_excavation]에서 발견하게 됩니다."
 je_academics_egyptian_artifacts_success: "#p 이집트 유물#! #b 25개#! 수집"
