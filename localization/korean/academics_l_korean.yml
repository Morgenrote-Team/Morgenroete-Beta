 academics.2101.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]의 박물관 요구"
 academics.2101.d: "세계 최강국으로 꼽히는 우리나라는 지금까지 고고학 분야에서의 명성이 부족했다. 이에 따라 [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서 우리에게 고고학 박물관을 건립해 달라고 요청하고 있다."
 academics.2101.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서는 우리나라가 고고학에 더욱 헌신해 주기를 바랍니다. 과거를 탐구하고, 잊혀진 문화를 찾아내고, 귀중한 유물을 복원하는 것은 과학을 넘어서 국가적 위신에 몹시 중요합니다. \n그렇기에 옛 문화에 대한 지식과 훌륭한 예술 작품을 증진, 전파, 보존하기 위해 고고학 박물관을 설립해 주시기를 요청드립니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 이사회 서명"
 academics.2101.g: "보물 찾으러 가세!"
 academics.2101.h: "세워봤자 먼지 쌓일 걸 뭐하러 짓는다고."
 academics.2101_goal_tt: "앞으로 #n 10년 이내#!에 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] #p 5개#!를 수집하고 고고학 박물관을 건설해야 합니다."
 academics.2102.t: "고고학 박물관 개관식"
 academics.2102.d: "오늘 고고학 박물관 개관식에 참석한 [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]의 대표들은 매우 만족하는 모습입니다."
 academics.2102.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 일동은 새로운 박물관의 개관으로 많은 시민들이 소장품을 관람할 수 있게 된 것을 기쁘게 생각합니다. 이 유물들은 과학적으로도 매우 귀중한 가치를 지니고 있습니다. 하지만 이는 단지 시작에 불과하므로, 향후 유물 추가 확보에 대해 다시 한번 상기시켜 줄 것을 박물관장에게 부탁드렸습니다. 관장님은 물론 저희 학회의 회원이기도 합니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 이사회 서명"
 academics.2102.g: "이제 그곳을 채울 게 필요하겠군..."
 academics.2103.t: "고고학계의 수치"
 academics.2103.d: "우리나라의 고고학을 진흥시키겠다는 약속에도 불구하고 그런 방면으로 어떠한 노력도 이루어지지 않은 것이 오늘로서 밝혀지면서, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]에서 실망감을 감추지 못하고 있다."
 academics.2103.f: "저희 [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원들은 정부의 무지함에 깊은 실망감을 느낍니다. 박물관 하나 작게 지어달라는 것이 그렇게 과한 요구였습니까?\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동 서명"
 academics.2103.g: "그런 박물관 따위 누가 필요하겠어?"
 academics.2104.t: "박물관장의 이집트 전시회 제안"
 academics.2105.t: "박물관장의 메소포타미아 전시회 제안"
 academics.2106.t: "박물관장의 에게 문명 전시회 제안"
 academics.2107.t: "박물관장의 선컬럼비아 전시회 제안"
 academics.2104.d: "고고학 박물관장은 잊혀진 유물들을 한자리에 모아 시급히 전시하지 않으면 우리 박물관이 세계적인 수준에서 뒤처질 수 있다고 경고했습니다."
 academics.2104.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]의 자랑스러운 회원 1인으로서 아름다운 우리 박물관이 방치되고 있는 것이 대단히 안타깝습니다. 전세계가 이집트 유물을 수집하는데, 최근에는 해외에서 고양이 형상의 바스테트 여신상을 발견했다는 소식을 들었습니다. 정말이지 최신 유행이랍니다! 게다가 분홍색이라 하더이다. 그런데 우리는 제대로 된 전시회를 열기 위한 풍뎅이 장식조차 확보하지 못하고 있습니다. 조만간 중규모 전시회를 열 수 있을 만큼의 유물을 모으지 못한다면, 우리나라 고고학의 미래는 암울할지도 모르겠습니다.\n\n고고학 박물관 관장 서명"
 academics.2105.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]의 열렬한 회원으로서, 존경받는 우리 박물관의 방치된 상황에 깊은 유감을 표합니다. 메소포타미아 유물은 요즘 큰 인기를 끌고 있으며, 강대국들은 이에 아낌없이 투자하고 있습니다. 물론 라마수의 크기가 가치를 결정하는 것이 아니라, 어떻게 활용하느냐가 중요할 것입니다. 하지만 우리는 제대로 된 전시회를 열기에 충분한 쐐기 문자 점토판조차 확보하지 못하고 있습니다. 중규모 전시회를 개최할 수 있을 만큼의 유물을 시급히 수집하지 않는다면, 우리나라 고고학의 미래는 비관적일 것으로 봅니다. \n\n고고학 박물관장 서명"
 academics.2106.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]의 주요 회원으로서 자랑스러운 우리 박물관이 방치되고 있는 현실에 깊은 유감을 표합니다. 지난 몇 년간 에게 문명의 유물은 불티나게 팔리고 있습니다. 트로이가 다시 발견된 이후 호메로스 서사시는 대중문화의 한 축이 되었고, 벼락부자들은 이제 정원에 고대 조각상을 하나씩 두고 있습니다. 그런데 우리는 어떻습니까? 미케네 문명의 부장품조차 전시할 만한 것이 몇 점 없습니다! 중규모 전시회를 열 수 있을 만큼의 조속히 유물을 수집하지 못한다면, 우리나라 고고학의 미래는 비관적일 것으로 봅니다.\n\n고고학 박물관장 서명"
 academics.2107.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]의 뺴어난 회원으로서, 저는 우리 중요한 박물관이 방치되고 있는 모습에 대해 유감을 표합니다. 마야 문화는 이제 더는 국경에 한정된 것이 아닙니다. 우리 학회의 신비주의 회원들은 중남미에서 희귀하기로 제일인 유물들을 얻기 위해 거금을 쏟아붓고 있습니다. 무덤 도굴과 귀중한 역사 유물의 파괴도 기승을 부리고 있습니다. 심지어 한 탐사대장은 티칼 피라미드를 옮기려고까지 했다는 소문도 있더군요! 반면 우리 박물관에는 아이들이나 무서워할 신비로운 돌가면 몇 점조차 전무합니다. 중규모 전시회를 열 수 있을 만큼의 유물을 조속히 수집하지 못한다면, 우리나라 고고학의 미래는 부정적일 것으로 봅니다.\n\n고고학 박물관장 서명"
 academics.2104.g: "행운과 영광이 있길!"
 academics.2104.h: "그런 보물 사냥보다 더 중한 일들이 많다."
 academics.2108.t: "새로운 고고학 수집품"
 academics.2108.d: "박물관장은 새로운 유물에 대한 자신의 우려가 받아들여진 것에 기쁨을 표했으며, [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]의 동료 학자들에게 박물관이 곧 새로운 전시회를 개최할 예정임을 전했습니다."
 academics.2108.f: "본 학회는 국가의 과학적 위상을 높이는 데 도움을 준 정부에 감사를 표합니다. 수많은 새 유물들은 이 나라 최고의 남녀 과학자들의 예술적 감각과 끊임없는 연구 노력의 결과물입니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동 서명"
 academics.2108.g: "성공이야!"
 academics.2109.t: "고고학계의 낙심"
 academics.2109.d: "박물관장은 자신의 절박한 우려가 묵살당하자 큰 충격과 실망에 휩싸여 사무실로 들어가 울음을 터뜨리고 문을 잠근 채 누구와도 말을 하지 않고 있습니다."
 academics.2109.f: "그거 참 잘 하셨습니다. 박물관장님께서 지난번에 이런 상태였을 때는 창밖으로 뛰어내릴 뻔했지 않습니까. 정부 관료들은 태도가 참 냉혹하십니다. 그분은 그저 유물 몇 점을 원했을 뿐입니다만. 보잘것없고 낡은 유물 몇 점 말입니다. 세상에 가진 거라고는 먼지 쌓인 조각상 몇 개랑 깨진 꽃병 몇 개인 사람인데! 이제 만족하시겠습니까? 불쌍한 관장님은 비탄 속에 잠겨 있습니다.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] 회원 일동 서명\""
 academics.2109.g: "실패다..."
 academics.2104_goal_tt: "앞으로 #n 15년 이내#!에 이집트 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] #p 25개#!를 수집해야 합니다."
