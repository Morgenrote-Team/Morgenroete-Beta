 academics_rating_age_information_tt: "학자가 나이가 들 수록 함께 보낼 수 있는 시간도 줄어듭니다. 학자들은 65세부터 은퇴에 나설 수 있으며 70세에는 거의 무조건 은퇴를 결심하게 됩니다.\n#V 팁:#! 젊은 나이대의 학자를 임명할수록 오랜 기간 동안 역임할 수 있게 됩니다."
