 academics.2101_reward_tt: "As a reward, the #p standard of living#! of the middle class in every state with a university will rise by one point for 5 years, additionally the [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] will get #p 5 Approval#! and the cost for production technology will be reduced by #p 5%#! for 3 years."
 academics.2104_reward_tt: "As a reward, we will gain #p 5% prestige#! for 5 years, additionally the [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] will get #p 5 Approval#! and the cost for production technology will be reduced by #p 5%#! for 3 years. Our archaeologist will get #p 15 Experience#!."
