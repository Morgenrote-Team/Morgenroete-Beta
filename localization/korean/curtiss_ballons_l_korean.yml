 curtiss.655.d2: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 자신의 열기구로 비행 지속 시간 국내 신기록을 달성했다! 비행 시간은 #b #p [ROOT.Var('new_balloon_time_var').GetValue]#!시간#!을 기록하여 기존 국내 기록인 #b #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#!시간#!을 경신한 것이다. 하지만 아쉽게도 현재 세계 기록인 [GetGlobalVariable('curtiss_balloon_time_record_holder_global_var').GetCountry.GetFlagTextIcon]의 #b #p [GetGlobalVariable('curtiss_balloon_time_record_global_var').GetValue]#!시간#!을 넘어서지는 못했다."
 curtiss.655.d3: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 자신의 열기구로 비행 지속 시간 세계 신기록을 달성했다! #b #p [ROOT.Var('new_balloon_time_var').GetValue]#!시간#! 동안 비행하여 기존 국내 기록인 #b #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#!시간#!은 물론 세계 기록인 [GetGlobalVariable('curtiss_balloon_time_record_holder_global_var').GetCountry.GetFlagTextIcon]의 #b #p [GetGlobalVariable('curtiss_balloon_time_record_global_var').GetValue]#!시간#!도 가뿐히 넘어선 것이다."
