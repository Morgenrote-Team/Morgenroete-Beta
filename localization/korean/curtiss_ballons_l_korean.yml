 curtiss.656.t: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName], 고소공포증으로 열기구 비행 포기"
 curtiss.656.d: "열기구 비행을 수차례 해 보았다고 자부하던 [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName](이)가 조국 대표로 10m 높이에서 처음 비행에 나섰을 때 고소공포증이 있다는 사실을 털어놓았다. 이에 따라 열기구 비행을 그만두기로 한 상황이다."
 curtiss.656.f: "\"이렇게 끔찍할 데가! 2주 전까지만 해도 엄청난 고도에서 비행하고 있었는데 이젠... 사다리조차 오를 수가 없다네!\""
 curtiss.656.g: "정말 안타깝군..."
 curtiss.656.h: "아아악! 후원할 만한 조종사가 또 있는가?"
 curtiss.670.t: "열기구 사고로 [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] 사망"
 curtiss.670.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName](이)가 열기구 비행에 나섰다가 추락하여 사망했다. 이로써 우리는 창공의 영웅을 잃었다."
 curtiss.670.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloonist_death_type')]"
 curtiss.670.g: "참으로 끔찍하다!"
 curtiss.670.h: "끔찍하구나! 후원할 만한 조종사가 또 있는가?"
 curtiss.671.t: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName](은)는 이제 경험 많은 열기구 조종사입니다."
 curtiss.671.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName](이)가 수차례의 열기구 비행을 마치고 열기구 조종 경험도 상당한 수준에 이르렀다. 이제는 제 분야에 숙달되어 경험 많은 열기구 조종사로 여겨지고 있다."
 curtiss.671.f: "\"겁먹지 말라구! 난 이런 일은 수십 번도 더 해봤어!\""
 curtiss.671.g: "좋은 소식이군!"
 curtiss.672.t: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName](은)는 이제 유명한 열기구 조종사입니다"
 curtiss.672.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName](이)가 수백 번의 열기구 비행을 마치고 그 과정에서 기록도 몇 차례 경신하였다. 이제는 국내에 그치지 않고 유명한 조종사로 거듭나게 되었다."
 curtiss.672.f: "\"[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]라고? 열기구 조종사 말인가? 정말이지 만나보고 싶었는데!\""
 curtiss.672.g: "훌륭해!"
 curtiss.673.t: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName], 비행 도중 혜성과 추돌"
 curtiss.673.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName](이)가 열기구 비행 도중 혜성에 맞아 목숨을 잃었다."
 curtiss.673.f: "열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호가 이륙한지 얼마 되지 않아 큰 폭발음이 들렸습니다. 지상에 있던 사람들은 섬광 하나가 하늘을 가로질러 [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]의 탑승용 바구니로 직격하는 모습을 목격했습니다. 열기구는 불타오르기 시작했고 깊숙이 곤두박질쳤습니다. 열기구 잔해를 치우자 [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]의 시신이 발견되었습니다. 이번 사건을 반긴 사람은 오직 천문학자 뿐이었는데 혜성의 잔해를 조사할 수 있다는 이유에서였습니다."
 curtiss.673.g: "그 자가 혜성 조심만 했었더라면..."
 curtiss.673.h: "아, 혜성이라. 악마의 친지이자 친척 같으니... 우리가 후원할 만한 열기구 조종사는 어디 또 없는가?"
 curtiss.674.t: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName], 해변에서 열기구 비행에 나섰다가 추락사"
 curtiss.674.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName](이)가 열기구 비행 도중 해변에 추락하여 목숨을 잃었다. 이상하게도 열기구 전해에서 고래 한 마리가 발견되었다."
 curtiss.674.f: "어느 화창한 날 [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName](은)는 해변을 따라 비행에 나섰다. 아무리 기다려도 돌아오지 않자 수색대가 파견되었다. 얼마 지나지 않아 잔해가 발견됐다. 열기구와 바구니는 심하게 짓눌린 고래의 유해 밑에서 발견됐다. 인근 마을의 한 술꾼은 피튜니아 화분처럼 생긴 것이 고래와 충돌하는 것을 보았으며 이제 보니 고래가 열기구에 정면으로 부딪힌 것 같다고 목소리를 높였다. 당연하지만 이 이야기는 별 신빙성이 없었다. 흥미롭게도 근처에서 온전한 피튜니아 화분이 발견됐다. 피튜니아는 다소 시든 상태였으며 현지 식물학자의 손에 맡겨졌다.\n\n[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName](은)는 순수한 마음과 어떤 상황에서도 침착할 수 있는 능력으로 기억될 것이다."
 curtiss.674.g: "안돼! 또라니!"
 curtiss.674.h: "땅바닥아 안녕! 후원할 만한 조종사가 또 있는가?"
 curtiss.676.t: "열기구 조종사 사망"
 curtiss.676.d: "수십 년간 [concept_curtiss_balloonist]로 활동해 왔던 우리의 옛 #b #r 열기구 조종사#!#!가 세상을 떠났다. 과연 이토록 눈부신 탐험가를 대신할 사람은 누구인가?"
