 curtiss_distance_title_distance_record_country: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 열기구 비행 거리 신기록 근접"
 curtiss_distance_title_time_record_country: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 우리나라 열기구 비행 거리 기록 경신"
 curtiss_distance_title_both_records_country: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 우리나라 열기구 비행 거리 및 시간 기록 경신"
 curtiss_distance_title_distance_record_global: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 자신의 열기구를 타고 그 어떤 인간도 나아가지 못한 거리까지 나아가는 데 성공했다! "
 curtiss_distance_title_time_record_global: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 자신의 열기구를 타고 그 어떤 인간도 버티지 못한 시간 동안 비행하는 데 성공했다! "
 curtiss_distance_title_both_records_global: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 자신의 열기구를 타고 그 어떤 인간도 나아가지 못한 거리와 시간 동안 비행하는 데 성공했다! "
 curtiss_distance_description_no_record: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 자신의 열기구로 최대한 먼 거리로 나아가는 시도에 나섰다. 그 결과 #b #n [ROOT.Var('new_balloon_distance_var').GetValue]#!km#! 거리에 도달했지만 기존 국내 기록인 #b #p [ROOT.Var('curtiss_balloon_distance_record_var').GetValue]#!km#!를 넘어서지는 못했다. 비행 지속 시간 역시 #b #n [ROOT.Var('new_balloon_time_var').GetValue]#!시간#!을 기록하여, 기존 비행 지속 시간 기록인 #b #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#!시간#!을 넘어서지 못했다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName](은)는 기필코 재도전에 나설 것이다."
 curtiss_distance_description_distance_record_country: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 자신의 열기구로 비행 거리 국내 신기록을 달성했다! #b #p [ROOT.Var('new_balloon_distance_var').GetValue]#!km#! 거리에 도달하여 기존 국내 기록인 #b #p [ROOT.Var('curtiss_balloon_distance_record_var').GetValue]#!km#!를 넘어선 것이다. 다만 안타깝게도 현재 세계 기록인 [GetGlobalVariable('curtiss_balloon_distance_record_holder_global_var').GetCountry.GetFlagTextIcon]의 #b #p [GetGlobalVariable('curtiss_balloon_distance_record_global_var').GetValue]#!km#!에는 미치지 못했다. 비행 지속 시간 역시 #b #n [ROOT.Var('new_balloon_time_var').GetValue]#!시간#!을 기록하여, 기존 비행 지속 시간 기록인 #b #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#!시간#!을 넘어서지 못했다."
 curtiss_distance_description_time_record_country: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 자신의 열기구로 비행 지속 시간 국내 신기록을 달성했다! #b #p [ROOT.Var('new_balloon_time_var').GetValue]#!시간#! 동안 비행을 유지하여 기존 국내 기록인 #b #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#!시간#!을 넘어선 것이다. 다만 안타깝게도 현재 세계 기록인 [GetGlobalVariable('curtiss_balloon_time_record_holder_global_var').GetCountry.GetFlagTextIcon]의 #b #p [GetGlobalVariable('curtiss_balloon_time_record_global_var').GetValue]#!시간#!에는 미치지 못했다. 비행 거리 기록은 #b #n [ROOT.Var('new_balloon_distance_var').GetValue]#!km#!를 기록하며 국내 비행 거리 기록인 #b #p [ROOT.Var('curtiss_balloon_distance_record_var').GetValue]#!km#!을 넘어서지 못했다."
 curtiss_distance_description_both_records_country: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 자신의 열기구로 비행 거리 국내 신기록을 달성했다! #b #p [ROOT.Var('new_balloon_distance_var').GetValue]#!km#! 거리에 도달하여 기존 국내 기록인 #b #p [ROOT.Var('curtiss_balloon_distance_record_var').GetValue]#!km#!를 넘어선 것이다. 다만 현재 세계 기록인 [GetGlobalVariable('curtiss_balloon_distance_record_holder_global_var').GetCountry.GetFlagTextIcon]의 #b #p [GetGlobalVariable('curtiss_balloon_distance_record_global_var').GetValue]#!km#!에는 미치지 못했다. 비행 지속 시간은 #b #p [ROOT.Var('new_balloon_time_var').GetValue]#!시간#!을 기록하여, 기존 국내 비행 시간 기록인 #b #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#!시간#!을 돌파하였으나, 현재 세계 기록인 [GetGlobalVariable('curtiss_balloon_time_record_holder_global_var').GetCountry.GetFlagTextIcon]의 #b #p [GetGlobalVariable('curtiss_balloon_time_record_global_var').GetValue]#!시간#!은 넘어서지 못했다."
 curtiss_distance_description_distance_record_global: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 자신의 열기구로 비행 거리 세계 신기록을 달성했다! #b #p [ROOT.Var('new_balloon_distance_var').GetValue]#!km#! 거리에 도달하여 기존 국내 기록인 #b #p [ROOT.Var('curtiss_balloon_distance_record_var').GetValue]#!km#!와 세계 기록인 [GetGlobalVariable('curtiss_balloon_distance_record_holder_global_var').GetCountry.GetFlagTextIcon]의 #b #p [GetGlobalVariable('curtiss_balloon_distance_record_global_var').GetValue]#!km#!를 넘어선 것이다. 다만 안타깝게도 비행 지속 시간은 #b #n [ROOT.Var('new_balloon_time_var').GetValue]#!시간#!을 기록하여, 현재 세계 기록인 [GetGlobalVariable('curtiss_balloon_time_record_holder_global_var').GetCountry.GetFlagTextIcon]의 #b #p [GetGlobalVariable('curtiss_balloon_time_record_global_var').GetValue]#!시간#!은 넘어서지 못했다."
 curtiss_distance_description_time_record_global: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 자신의 열기구로 비행 지속 시간 세계 신기록을 달성했다! #b #p [ROOT.Var('new_balloon_time_var').GetValue]#!시간#! 동안 비행하여 기존 국내 기록인 #b #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#!시간#!은 물론 세계 기록인 [GetGlobalVariable('curtiss_balloon_time_record_holder_global_var').GetCountry.GetFlagTextIcon]의 #b #p [GetGlobalVariable('curtiss_balloon_time_record_global_var').GetValue]#!시간#!도 가뿐히 넘어선 것이다. 비행 거리는 #b #n [ROOT.Var('new_balloon_distance_var').GetValue]#!km#!를 기록하여 현재 세계 기록인 [GetGlobalVariable('curtiss_balloon_distance_record_holder_global_var').GetCountry.GetFlagTextIcon]의 #b #p [GetGlobalVariable('curtiss_balloon_distance_record_global_var').GetValue]#!km#!를 아쉽게 넘어서지 못했다."
 curtiss_distance_description_both_records_global: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 자신의 열기구로 비행 거리와 비행 시간 세계 신기록을 달성했다! #b #p [ROOT.Var('new_balloon_distance_var').GetValue]#!km#! 거리에 도달하여 기존 국내 기록인 #b #p [ROOT.Var('curtiss_balloon_distance_record_var').GetValue]#!km#!와 세계 기록인 [GetGlobalVariable('curtiss_balloon_distance_record_holder_global_var').GetCountry.GetFlagTextIcon]의 #b #p [GetGlobalVariable('curtiss_balloon_distance_record_global_var').GetValue]#!km#!를 가뿐히 넘어선 것이다. 비행 시간 세계 기록인 [GetGlobalVariable('curtiss_balloon_time_record_holder_global_var').GetCountry.GetFlagTextIcon]의 #b #p [GetGlobalVariable('curtiss_balloon_time_record_global_var').GetValue]#!시간#! 역시 #b #p [ROOT.Var('new_balloon_time_var').GetValue]#!시간#!의 비행 시간으로 경신에 성공했다."
