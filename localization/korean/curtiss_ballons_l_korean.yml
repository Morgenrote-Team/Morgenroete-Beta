 curtiss.652.t: "조국을 위한 [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]의 첫 비행"
 curtiss.652.f: " - #b 고도: #p [ROOT.Var('new_balloon_altitude_var').GetValue]m#!#!\n - #b 거리: #p [ROOT.Var('new_balloon_distance_var').GetValue]km#!#!\n - #b 시간: #p [ROOT.Var('new_balloon_time_var').GetValue]시간#!#!"
 curtiss.652.g: "시작이 좋군!"
 curtiss.653.t1: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 열기구 비행 고도 기록 경신 실패"
 curtiss.653.t2: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 열기구 비행 고도 신기록 근접"
 curtiss.653.t3: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 자신의 열기구를 타고 그 어떤 인간도 올라보지 못한 고도에 오르는 데 성공했다!"
 curtiss.653.d1: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 자신의 열기구로 최고 고도에 도달하는 비행 시도에 나섰다. 그 결과 고도 #b #n [ROOT.Var('new_balloon_altitude_var').GetValue]#!m#!에 도달했지만 기존 국내 기록인 #b #p [ROOT.Var('curtiss_balloon_altitude_record_var').GetValue]#!m#!를 넘어서지는 못했다. [SCOPE.sCharacter('curtiss_balloonist_scope').GetSheHe|U]는 기필코 재도전에 나설 것이다."
 curtiss.653.d2: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 자신의 열기구로 비행 고도 국내 신기록을 달성했다! 고도 #b #p [ROOT.Var('new_balloon_altitude_var').GetValue]#!m#!에 도달하여 기존 국내 기록인 #b #p [ROOT.Var('curtiss_balloon_altitude_record_var').GetValue]#!m#!을 넘어선 것이다. 다만 안타깝게도 현재 세계 기록인 [GetGlobalVariable('curtiss_balloon_altitude_record_holder_global_var').GetCountry.GetFlagTextIcon]의 #b #p [GetGlobalVariable('curtiss_balloon_altitude_record_global_var').GetValue]#!m#!에는 미치지 못했다."
 curtiss.653.d3: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 자신의 열기구로 세계 비행 고도 기록을 경신했다! 고도 #b #p [ROOT.Var('new_balloon_altitude_var').GetValue]#!m#!에 도달하여 기존 국내 기록인 #b #p [ROOT.Var('curtiss_balloon_altitude_record_var').GetValue]#!m#!은 물론 세계 기록인 [GetGlobalVariable('curtiss_balloon_altitude_record_holder_global_var').GetCountry.GetFlagTextIcon]의 #b #p [GetGlobalVariable('curtiss_balloon_altitude_record_global_var').GetValue]#!m#!를 넘어서고 만 것이다."
 curtiss.653.f1: "\"이번에는 성공을 거두지 못했지만, 다음 기회에는 반드시 해내고 말 것이오!\"\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloonist_altitude_flight_type')]"
 curtiss.653.f2: "\"그런 기록 누가 신경이나 쓴다고? 난 세계 기록을 원하네!\"\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloonist_altitude_flight_type')]"
 curtiss.653.f3: "\"누워서 떡 먹기군!\"\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloonist_altitude_flight_type')]"
 curtiss.653.g: "다음 번엔 행운이 있길!"
 curtiss.653.h: "수고했소!"
 curtiss.653.i: "정말 대단해! 경축드리오!"
