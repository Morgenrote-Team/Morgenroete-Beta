 curtiss_altitude_under_5000_custom_1: "고고도 비행에 나선 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]. 최대한 가벼운 무게로 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호에 올랐다. 상승 속도는 빨랐다. 머지않아 지상의 사람들을 겨우 알아볼 수 있는 높이에 도달했다. 주변 풍경에 숨이 막혔다. 제법 높은 고도에도 불구하고 구름 층과 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]의 간격은 아직도 멀리 떨어진 상태였다. 기압계가 #p [ROOT.Var('new_balloon_altitude_var').GetValue]m#!를 가리키는 것을 확인한 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]. 기상 장비로 여러 측정 값부터 기록한 뒤, 밸브를 열고 천천히 지상으로 내려왔다."
 curtiss_altitude_under_9000_custom_1: "열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호가 하늘 높이 솟아올랐다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 이번 목표는 최대한 높이 나는 것이었기 때문에 기구의 무게가 가벼워야 했다. 처음에는 주택가의 모습이 점차 작아지더니 작은 점으로 보이게 되었다. 그러다가 열기구가 구름 속으로 떠올랐습니다. 자욱한 안개로 작은 물방울들이 기상 장비에 맺히기 시작했습니다. 날씨도 조금씩 싸늘해졌다. 다행히 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]의 옷차림은 따뜻했지만, 갈수록 서서히 호흡이 힘들어지는 것을 느꼈다.\n고도 #p [ROOT.Var('new_balloon_altitude_var').GetValue]#!m에 도달한 순간, 기록 경신에 필요한 측정에 나선 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]. 그리고 기나긴 하강이 시작되었다."
 curtiss_altitude_under_12000_no_tools_custom_1: "공기는 조금씩 희박해져 갔다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 집중력도 떨어져만 간다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHis] 머리도 지끈거린다. 기압계를 보니 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]는 세계의 어느 산보다도 높은 고도에 올라 있었다. 사람이 이렇게 높이 오르려면 날개라도 달아야 하지 않겠는가. 그러는 동안 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHis] 몸은 떨리기 시작했다. 겉옷은 구름에 젖고 기온은 이미 영하로 뚝 떨어졌다.\n이에 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName](은)는 무릎을 꿇었다. 간신히 밸브를 풀어 하강에 나설 수 있었다. 머지않아 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]는 정신을 잃고 말았다.\n지상에 다다르고 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName](은)는 의식을 되찾았다. 정확히 말하면 따스한 병상 위에서였다. 다행히 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]는 발견되었던 것이다."
 curtiss_altitude_under_12000_tools_custom_1: "산소 호흡기를 달았지만 결코 쉬운 일이 아니었다. 찬 기운이 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 몸속으로 퍼져나갔다. 공기가 얼음처럼 차가워 바로 서기도 힘들었다. 허나 중요한 것은 이 고도의 측정값. 그렇기에 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName](은)는 측정에 나섰다. 기압계는 #p [ROOT.Var('new_balloon_altitude_var').GetValue]#!를 가리켰다. 세계의 어느 산보다도 높은 고도였다. 하지만 아쉽게도 이곳에서는 눈에 보이는 것이 거의 없다. 짙은 구름이 시야를 막고 있었던 것이다.\n측정을 마친 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName](은)는 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호의 외피에서 공기를 빼내기 시작했다. 열기구는 하강하기 시작했다."
 curtiss_altitude_under_16000_no_tools_custom_1: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]는 제 몸을 거의 움직일 수 없었다. 더 이상 추위를 느끼지도 않았다. 그저 호흡이 가빴을 뿐이다. 이곳에 오르면 대기가 극도로 희박해진다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 이번 모험에서 살아남을 수 있을지 장담하지 못했다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName](은)는 힘겹게 밧줄 하나를 잡고 일어섰다. 밸브에 닿아야 했다. 아슬아슬하다. 주변은 점점 어두워진다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName](은)는 이빨로 밸브를 물고 돌리기 시작했다. 그리고 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]는 의식을 잃었다.\n어째서인지 따뜻하다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]는 어디에 있는가. 눈앞에 그림자들이 스쳐 지나간다. 그 형상은 천천히 사람으로 변했다. 한 여자가 국 한 그릇을 건넸다. 아무래도 목숨을 건진 모양이다."
 curtiss_altitude_under_16000_tools_custom_1: "산소통은 희박한 대기 환경에 도움이 되었다. 그러나 추위는 두터운 겉옷을 뚫고 들어왔다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 몸을 떨었다. 허나 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호가 오를 수 있는 높이까지 올라간 듯 했다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName](은)는 학술원에서 의뢰한 자료 측정에 나섰다. 기압계는 #p [ROOT.Var('new_balloon_altitude_var').GetValue]m#!를 가리키고 있었다. 믿을 수 없는 고도였다. 안타깝게도 구름 때문에 주변 경치가 제대로 보이지 않았다.\n측정을 마친 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]는 열기구에서 바람을 빼기 시작했다. 열기구는 다시 천천히 아래로 내려오기 시작했다."
 curtiss_altitude_over_16000_custom_1: "압력실은 비교적 따스했다. 하지만 외부 온도는 견딜 수 없을 정도였다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](으)로선 밖에 있지 않고 방 안에 머물러 있는 것이 다행이었다. 이곳에서는 숨쉬기가 편했다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]는 창문을 통해 지구를 바라보았다. 여기까지 올라와 보니 지구의 곡면이 뚜렷하게 보였다. 위쪽으로 향할 수록 하늘의 푸른빛이 점점 어두워졌다. 구름이 지구 위로 움직이고 있었다. 여기서 보니 마치 솜사탕처럼 보였다. 기압계가 #p [ROOT.Var('new_balloon_altitude_var').GetValue]m#!를 가리키자 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName](은)는 압력실 안에서 밸브를 풀고 열기구가 천천히 지상으로 내려오도록 하였다."
 curtiss_distance_under_400_custom_1: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]호를 타고 가능한 한 멀리까지 비행하는 것을 목표로 삼았다. 열기구가 지면 위로 떠오르자 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName](은)는 할일이 많아 분주해졌다. 바람으로 최대한의 이득을 볼 수 있는 최적의 고도를 알아보고, 날씨 상황을 눈으로 계속 관측하고, 주변의 항로를 탐색해야 했던 것이다. 총 #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#!시간의 비행 끝에 열기구는 지면에 부드럽게 착륙했다. 현지 주민들에게 자신이 착륙한 지역이 어딘지를 물은 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName](은)는 지도를 보며 이동 거리를 계산하였다. 그 결과는 총 #p [ROOT.Var('new_balloon_distance_var').GetValue]km#!에 달했다."
 curtiss_distance_under_800_custom_1: "열기구에 올라 최대한 멀리 비행하는 것은 마냥 쉬운 일이 아니었다. 날씨가 좋아지길 기다려야 하고, 좋은 품질의 열기구를 갖추고 있으며, 항로 탐색도 능숙해야 했던 것이다. 스스로 이 모든 요건을 갖췄다고 생각한 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 거리 신기록을 세우기 위해 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호를 타고 비행에 나섰다. 그 과정에서 다채로운 풍경과 작은 산, 강 위를 떠다녔다. 날씨는 비행 내내 좋은 여건을 유지하였으며 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]도 #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]시간#!의 비행 끝에 문제없이 착륙할 수 있었다.\n지상에 다다른 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]는 현지 주민들에게 자신이 착륙한 곳을 물어보았고, 그 결과 이동한 거리가 #p [ROOT.Var('new_balloon_distance_var').GetValue]km#!에 달한다는 것을 알 수 있었다."
 curtiss_distance_under_2000_custom_1: "날씨는 비행하기 완벽한 상태로 계속해서 유지되었다. 하늘 위를 나는 동안 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 드넓고 다양한 풍경들을 눈에 담을 수 있었다. 거대한 도시에서 조그마한 마을, 그리고 아무도 살지 않는 황무지까지. 그러나 그렇게 긴 비행에는 낮 시간 동안만 열기구를 타는 것만으로는 부족했기에, [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호는 밤중에도 계속해서 하늘을 날았다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName](이)가 착륙을 결심한 것은 #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]시간#!이 지나서였다. 열기구는 사뿐히 지면에 착륙하였고 그곳에서 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName](은)는 현지 주민들에게 자신이 어디에 온 것인지를 파악했다. 이대로라면 총 #p [ROOT.Var('new_balloon_distance_var').GetValue]km#!를 이동한 것이다. 꽤나 먼 거리였다."
 curtiss_distance_over_2000_custom_1: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 계획대로 그렇게 오랜 비행을 하기 위해서는 충분한 물자와 여러 명의 인력, 이상적인 날씨를 갖춰야 했다. 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호에는 보급품을 충분히 싣고 두 명의 다른 사람도 동승했다. 다행히도 이날은 날씨도 정말 좋았다. 그렇게 열기구는 [ROOT.GetCountry.GetCapital.GetCityHubName](을)를 떠나 수십 시간 동안 비행에 나섰다. 저녁이 되자 세 사람은 미리 가져온 포도주와 구운 닭고기로 맛있는 한 끼를 즐겼다. 별이 빛나는 밤에는 교대로 경로를 지켰다. 이렇게 무려 #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]시간#! 동안 비행한 열기구는 엄청난 비행 거리를 기록했다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]의 이동 거리는 총 #p [ROOT.Var('new_balloon_distance_var').GetValue]km#!에 달했던 것이다. 그야말로 상상하기조차 힘든 거리다."
 curtiss_custom_death_sea: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 새로운 비행 기록 시도에 나서는 과정에서 경로를 이탈하여 바다에 표류하고 말았다. 모든 수색 노력은 실패로 돌아갔다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 바다에서 익사한 것으로 보인다."
 curtiss_custom_death_hydrogen_ignition: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호를 타고 하늘 높이 떠오를 때만 하더라도 그것이 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 마지막 비행일 줄은 아무도 예상하지 못했다. 사고는 비행고도 900m 즈음에서 발생했다. 열기구 안의 수소가스가 어떤 이유에서인지 발화한 것이다. 순식간에 열기구 전체가 불타오르고 곤돌라는 지면으로 추락했다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 현장에서 즉사했다."
 curtiss_custom_death_firework: "해가 질 무렵 [ROOT.GetCountry.GetCapital.GetCityHubName]의 상공을 날아다니던 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호가 불꽃놀이 속으로 휘말려 버렸다. 폭죽이 온갖 무지개색으로 반짝였고 열기구도 불꽃놀이와 함께 빛을 발했다. 불타오르던 열기구는 아래로 곤두박질쳤고, 그대로 지상에 추락하면서 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 숨을 거뒀다."
 curtiss_custom_death_redneck: "[ROOT.GetCountry.GetName]의 시골 지역 상공을 날아다니던 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호가 지역 주민이 즐거움에 겨워 발사한 총탄 여러 발에 맞고 말았다. 그 결과 열기구에서 가스가 빠르게 빠져나가며 지면에 충돌하고 말았다. 그 과정에서 열기구를 조종하던 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 물론 총을 쏜 사람도 숨을 거뒀다."
 curtiss_custom_death_belltower: "지상으로 접근하던 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 열기구가 도시 쪽으로 표류하기 시작했다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]는 주택가로 돌진하지 않기 위해 제 고도를 유지하고 있었지만, 그 일로 한눈을 판 사이에 눈앞의 종탑으로 돌진하고 있다는 것을 알아채지 못했다. 열기구는 그대로 종탑에 충돌했고 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName](은)는 열기구에서 튕겨져 나왔다. 이 과정에서 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]의 목이 부러져 사망한 것으로 보인다."
 curtiss_custom_death_stork: "오늘 [ROOT.GetCountry.GetName] 상공에서 믿을 수 없는 사고가 벌어졌다! [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호가 황새 내지는 다른 종류의 새와 추돌한 것이다. 어떻게 되었던 간에 새의 부리로 열기구 겉면이 찔렸다. 새가 곤경에서 벗어나려고 발버둥 치면서 겉면의 구멍이 더 커졌고, 그 구멍을 통해 점점 더 많은 가스가 빠져나갔다. 결국 열기구는 땅으로 추락했고 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 충돌로 사망했다."
 curtiss_custom_death_balloon_duel: "유명 오페라 가수의 마음을 놓고 우리 열기구 조종사 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](와)과 다른 조종사의 경쟁이 불붙었으나 합의에 이르지 못했다. 결국 두 사람은 열기구 대결을 통해 상황을 해결할 수밖에 없다는 결론에 이르렀으며, 각자의 열기구에 올라 서로에게 총격을 가하기 시작했다. 치열한 총격전은 한 시간 가까이 계속되었는데 하늘을 나는 열기구에서 목표물을 맞추기란 쉽지 않은 일이었기 떄문으로 보인다. 마침내 총알 한 발이 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](을)를 맞추고 그 자리에서 사망했다. 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호는 시신과 함께 흘러내려갔고 몇 시간 뒤 탁 트인 시골에서 겨우 발견되었다."
 curtiss_custom_death_stray_bullet: "어찌 된 일인지 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호에 탔던 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 전선에 너무 가까이 접근하고 말았다. 그러자 적군은 열기구를 향해 총격을 가하기 시작했다. 탄환은 열기구를 비껴갔으나 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](을)를 맞춰 죽음에 이르게 하였다. 열기구는 오랜 시간 동안 전장 위를 날아다니다가 결국 아군 진영에 추락했다."
 curtiss_custom_death_power_line: "열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호를 타고 착륙에 나서던 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 전선에 너무 가까이 다가가고 말았다. 열기구가 전선에 걸리면서 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 몸에 전류가 흘러들고 풍선에 불이 붙어 터져 버렸다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 사인이 정확히 무엇인지는 불분명하지만 끔찍한 최후였다는 것은 틀림없다."
 curtiss_custom_death_seagull: "해안 가까이로 비행하던 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 식량으로 가져온 생선을 노리는 갈매기떼에 휘말리고 말았다. 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호는 손상을 입지 않았으나, 갈매가 한 마리가 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 머리를 세게 들이받았고, [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]는 정신을 잃고 열기구 밖으로 추락했다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 그 부상을 이기지 못하고 사망했고, 열기구는 갈매기 울음소리를 따라 멀리 날아갔다."
 curtiss_custom_death_lightning: "뇌우 속에서 열기구를 타는 것은 좋은 생각이 아닐지도 모른다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 번개를 맞는 순간 그 사실을 직접 깨닫게 되었다. 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호는 불길에 휩싸여 추락하고 말았다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]도 그 여파로 목숨을 거뒀다."
 curtiss_custom_death_sabotage: "평범한 비행이 될 줄 알았던 것이 순식간에 악몽으로 변했다. 비행 도중 열기구의 밧줄 몇 개가 끊어지면서 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호의 바구니가 지면에 추락하여 산산조각나고 말았다. 이 과정에서 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 숨을 거뒀다. 잔해를 조사하는 과정에서 밧줄에 절단 흔적이 발견되었다. 이는 명백한 사보타주이지만 누가 이런 일을 저질렀는가는 아직 밝혀지지 않았다."
 curtiss_custom_death_updraft: "비행에 나선 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호가 매우 강한 상승기류에 휩쓸렸다. 열기구는 계속해서 상승했다. 고도가 오르면서 호흡이 점점 더 어려워지고 온도도 내려가게 되었다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 사인이 질식사인지, 동사인지는 밝혀지지 않았으나, 극한의 고도에서 목숨을 잃은 것으로 보인다."
 curtiss_custom_death_stampede: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 열기구 비행 도중 목초지에 착륙했다. 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호를 접는 과정에서 말들이 놀랐던 것으로 보인다. 현장의 발자국으로 미뤄보아 말들이 사방으로 흩어져 달아났고, 그 중 몇 마리가 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](을)를 들이받으면서 사망에 이르게 한 것으로 보인다."
 curtiss_custom_death_failed_fixing: "아직 저고도에 머무르고 있던 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호에 문제가 생겼음을 알아차렸다. 가스가 기구 양측에서 새어나와 조금씩 고도가 내려가고 있었던 것이다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]는 비행 중에 문제를 해결하기로 결심하고 열기구 위로 기어올라갔다. 목격자의 증언에 따르면 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 발을 헛디뎌 지상으로 떨어졌고, 그곳에서 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]의 시신이 발견되었다. 열기구는 가스가 모두 빠져나간 뒤 얼마 지나지 않아 지면으로 떨어졌다."
 curtiss_custom_death_weak_spot: "오늘 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 상공에서 추락하여 목숨을 잃었다. 처음에는 사고 경위가 불분명했으나 머지않아 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호의 잔해가 발견되었다. 바구니에는 큰 구멍이 나 있었는데, 처음부터 바구니가 헐겁게 만들어져 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 체중을 버티지 못하고 무너졌던 것으로 보인다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 죽음은 조국에 큰 손실이 아닐 수 없다."
 curtiss_custom_death_heart_attack: "열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호가 오늘 지상에 추락했다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 시신이 잔해에서 수습되었다. 사고 원인은 규명하기 어려웠다. 처음에는 열기구에서 공기가 빠져나가자 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 일부러 배기 밸브를 조작한 것으로 추정되었다. 얼마 후 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 충돌 전에 이미 숨을 거뒀다는 의사의 부검 결과가 나왔다. 비행 중에 심장마비를 일으켰고 이로 인해 근육에 경련이 일어나 밸브를 작동시킨 것으로 보인다."
 curtiss_custom_death_balloon_crash: "오늘 [ROOT.GetCountry.GetName] 상공에서 믿을 수 없는 사고가 벌어졌다. 믿기 어려울 수도 있으나 두 개의 열기구가 하늘에서 충돌하고 만 것이다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호는 큰 손상을 입고 급격히 하강하게 되었으며, 결국 지면에 추돌하여 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 목숨을 잃은 것이다. 상대편 열기구는 제대로 착륙할 수 있었지만 조종사는 사고로 큰 충격을 받고 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](을)를 도우려 애썼다. 안타깝게도 모든 노력은 허사로 돌아가고 말았다."
 curtiss_custom_death_fighter_intercepted: "우리나라의 열기구 조종사 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 실수로 우리 국경을 넘어 비행하던 중 미확인 항공기의 공격을 받았다. 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호는 수차례 피격당해 급격히 하강하였다. 열기구가 지면에 충돌하기도 전에 항공기가 다시 공격을 가하면서 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]에게 치명상을 입혔다. 우리 이웃 국가의 정부 당국은 이번 공격과 아무런 관련이 없다고 부인에 나섰다."
 curtiss_custom_death_tornado: "대평원에 폭풍이 몰아치고 있었지만 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 자신의 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호를 타고 비행하기로 마음먹었다. 열기구는 공중에서 빙빙 돌았으나 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 아랑곳않고 비행을 계속했다. 못 보던 사이에 열기구 바로 뒤로 회오리바람이 만들어져 열기구를 점점 더 가까이 끌어당겼다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 열기구가 회오리 속으로 휩쓸리기 직전에야 위험한 상황임을 알아차렸다. 안타깝게도 때는 이미 늦었다. 한동안 행방을 알 수 없던 시신은 며칠 뒤 잔해에 묻힌 상태로 발견되었다."
 curtiss_custom_death_fall: "정확한 사고 경위는 불분명하나 어떤 이유에서건 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호에서 추락하여 그대로 숨을 거두고 말았다. 열기구는 그로부터 며칠 뒤 천천히 지상으로 내려와 발견되었다. 열기구 내에서는 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]에게 정확히 무슨 일이 벌어졌는지를 결론내릴 수 있는 흔적이 전혀 발견되지 않았다."
 curtiss_custom_death_envelope_falls_apart: "이륙 직후 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 자신의 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호와 함께 지상에 추락하는 사고가 벌어졌다. 처음에는 풍선 외피가 찢어진 것처럼 보였으나, 자세히 보니 외피의 이음새가 공중에서 벌어진 것으로 드러났다. 결국 열기구는 파손되어 지면에 추락했고, 그 여파로 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 안타깝게도 목숨을 잃고 만 것이다."
 curtiss_custom_killed_by_indigenous_people: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 자신의 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호를 타고 원주민의 영토에 착륙했다. 원주민들은 열기구를 본 적이 없어 일종의 사악한 악마라 생각하였다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 모습을 보이기도 전에 총에 맞아 사망했다. 며칠 뒤 우리 순찰대원이 망가진 열기구 속에서 시신을 찾아냈다."
 curtiss_custom_death_cigar: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 마지막 비행에 나섰다가 지상으로 추락했다. 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호는 하늘에서 활활 타오르면서 떨어져 내렸다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 비행 중에 시가를 피웠다가 바구니에 불이 붙은 것으로 보인다. 그 결과 열기구 외피에도 불비 붙어 추락으로 이어졌다. 이번 사례에서 목숨을 앗아간 것은 흡연임이 분명하다."
 curtiss_custom_killed_crash_mountainside: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]호를 타고 산을 넘고자 하였다. 그 과정에서 앞이 보이지 않는 눈보라에 갇히고 말았다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 눈보라를 뚫고 나오려 했으나 열기구가 강풍에 휩쓸려 산의 암벽에 충돌하고 말았다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 충돌의 여파로 치명상을 입고 며칠이 지난 뒤에야 시신이 수습되었다."
 curtiss_custom_death_hail_storm: "이런 악천후에는 열기구를 타지 말라는 모두의 만류에도 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 고집을 부렸다. 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호에 승선하자 날씨는 점점 더 악화되기 시작했다. 어둑한 구름에서 궂은 비가 쏟아져 내리기 시작했고  머지않아 우박으로 바뀌었다. 어떤 우박은 주먹만 해서 열기구의 외피를 조금씩 찢기 시작했다. 열기구는 곤두박질쳐 지상에 충돌했다. 그 충돌로 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 목숨을 잃었다."
 curtiss_custom_killed_alcohol: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호와 함께 이륙하기에 앞서 포도주 몇 병을 마셨다. 당연하지만 술은 비행에 도움이 되지 않고 취하기라도 하면 열기구 조종은 훨씬 위험해진다. 그러나 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')](은)는 열기구에서 추락하거나 열기구에 실수로 불을 붙여서가 아니라, 이륙 직후 평형수 주머니가 전부 떨어지는 바람에 사망했다. 열기구는 솟아올라 순식간에 사라졌다. 며칠 뒤 잔해가 발견되었다. [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')](은)는 여전히 바구니 속에 있었는데 마지막 포도주 한 병을 마신 뒤 갈증으로 죽어간 것으로 보인다."
 curtiss_custom_killed_opium: "열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호를 타고 비행에 나선 뒤 들판에서 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 시신이 발견되었다. 처음에는 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 열기구 밖으로 추락한 이유가 밝혀지지 않았으나, 며칠 뒤 지상에 착륙한 열기구 안에서 아편이 발견되었다. 정황상 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 비행 중에 아편을 복용하였고 알 수 없는 이유로 열기구에서 추락한 것으로 보인다."
 curtiss_custom_death_acrobatics: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 많은 사람들 앞에서 밧줄을 이용해 한쪽 열기구에서 다른 열기구로 옮겨 타는 묘기를 보이려고 했다. 처음에는 순조롭게 옮겨 타는 듯 보였다. 하지만 그때 갑자기 강풍이 불어와 밧줄을 놓치고 말았다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]은 군중 속으로 떨어져 그 자리에서 치명상을 입고 목숨을 잃었다."
 curtiss_custom_death_goose: "비행에 나설 때마다 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 행운을 불러온다는 거위 한 마리를 열기구에 함께 태우곤 했다. 둘은 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호를 타고 공중으로 날아올랐다. 그로부터 몇 시간 뒤 열기구는 무사히 착륙했다. 놀랍게도 열기구의 탑승객 단 하나, 거위 뿐이었다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 실종되고 말았다. 며칠 동안 이어진 수색에도 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]는 발견되지 않았다."
 curtiss_custom_death_mile_high_club: "열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호의 바구니가 들판에서 발견되었다. 그 안에는 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](와)과 한 여성이 있었다. 이상하게도 두 사람 모두 나체 상태였다. 그 이유에 대해서는 여러 가지 추측이 난무했다. 대부분 사람들은 두 사람이 저체온증으로 사망했고, 죽기 직전에 옷을 벗었을 것이라고 보았다. 갑자기 극심한 열기가 느껴지면서 얼어 죽는 경우가 종종 있기 때문이다. 하지만 두 사람이 뭔가... 그렇고 그런 행동을 했을 것이라는 추측도 있었다."
 curtiss_custom_death_zoo_crocodile: "이번 비행은 완전히 성공적이었다. 착륙만 빼고 말이다... 세상에 그 많은 착륙 장소 중에서도 가장 최악인 곳은 동물원의 악어 우리일지도 모른다. 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호가 수면 한가운데에 떨어지자 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 목숨은 순식간에 끊어지고 말았다. 누가 말릴 틈도 없이 악어들이 덮쳐 먹이로 삼았던 것이다."
 curtiss_custom_death_cheap_parts: "절약은 올바른 행동일 때가 많지만, 열기구의 구성품에 있어서는 그렇지 않다. 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호의 밧줄은 제일 저렴한 공급업체에서 구입하여 몇 파운드를 아꼈다고 한다. 그러나 불행히도 품질은 믿고 산 것보다 훨씬 떨어졌다. 비행 도중 밧줄 몇 개가 끊어지고 바구니가 기울어지면서, [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')](이)가 열기구에서 떨어져 지면에 충돌하면서 사망하고 말았다."
 curtiss_custom_death_disappearance: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](이)가 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호를 타고 비행에 나선 지 어언 한 달이 지났다. 이륙 직후 모든 흔적이 자취를 감췄다. 열기구도, 잔해나 시신도 발견된 적이 없다. 수색 노력도 성과를 거두지 못했다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 열기구와 함께 실종되었으며, 그 누구도 무슨 일이 벌어졌는지를 알 수 없게 되었다."
 curtiss_custom_death_train: "불행의 연속으로 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호가 착륙 과정에서 기차에 치여 박살나고 말았다. 그 과정에서 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]도 목숨을 잃었다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 열기구가 짙은 안개 속에 착륙하면서 하필 철로 위에 있다는 사실을 알아차리지 못한 것으로 보입니다. 불과 몇 초 후, 기차가 전속력으로 열기구를 들이받았니다. 기차는 별다른 피해가 없었으며 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](을)를 제외하고는 아무도 다치지 않았다."
 curtiss_custom_death_skyscraper: "도시 상공을 비행하던 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호가 강한 기류에 휩쓸려 초고층 빌딩을 향해 돌진했다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 할 수 있는 것이 아무것도 없었던 탓에, 건물이 점점 가까워지는 것을 속수무책으로 지켜볼 수밖에 없었다. 풍선은 건물 외벽에 부딪혀 얽히게 되었다. 잠시 후, 풍선의 외피가 찢어지면서 풍선은 아래쪽으로 깊이 곤두박질쳤다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 채소 가게 가판대에 떨어져 신선한 양배추를 박살냈다. 안타깝게도 그 양배추들은 완충재로 쓰이기에는 역부족이었고 조종사는 그 자리에서 사망했다."
 curtiss_custom_death_disease: "\"그냥 감기일세!\"라는 말과 함께 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 작별 인사를 나누며 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호에 올라탔다. 하지만 단순한 감기는 아니었던 것으로 보인다. 며칠 뒤 열기구가 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]의 시신과 함께 발견되었기 때문이다. [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')](은)는 중병으로 목숨을 잃은 것으로 보인다. 열기구 비행의 위험성을 생각하면 이러한 사인은 다소 뜻밖의 상황이었다."
 curtiss_custom_death_slipped: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호와 함께 여행에 나섰다. 친구 한 명도 동승자로 데려갔다. 비행 도중 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 어떤 이유에서인지 균형을 잃고 말았다. 가벼운 비가 내려 바구니를 적셨기 때문일 수도 있고, 단순 부주의 때문이었을 수도 있다. 어찌 되었든 간에 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]는 균형을 잃고 열기구에서 떨어졌다. 그 과정에서 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 사망했다. 친구는 간신히 열기구를 다시 착륙시킬 수 있었지만, 다치지는 않았다."
 curtiss_custom_death_ladder: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]은 열기구 조종사라면 으레 그렇듯 모험 중에 사망한 것은 아니었다. 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호를 정비하던 중에 사망했다. 열기구 외피에서 기압에 약한 부위를 검사하던 중 사다리를 놓쳐 추락했던 것이다. 안타깝게도 떨어질 때 운이 없었는지 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 목숨을 잃고 말았다."
 curtiss_custom_death_angry_worker: "마지막 비행 과정에서 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호의 밧줄 여러 개가 끊어져 바구니가 지면으로 추락하고 말았다. 그 여파로 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 목숨을 잃었다. 열기구의 잔해를 조사한 결과 밧줄에 절단 흔적이 발견되었다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] 밑에서 일하던 직원이 살해를 결심하고 밤중에 밧줄을 망가뜨린 것으로 밝혀졌다. 그 직원은 \"그 흡혈귀 같은 놈이 자초한 일이지! 열기구 타는 재미 하나로 우릴 착취했단 말이다!\"라며 목소리를 높였다."
 curtiss_custom_death_sabotage_slaver: "열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호가 들판에 착륙한 뒤 밖으로 내린 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 곧바로 용병들에게 제압당해 살해당하고 말았다. 조사 결과 노예 소유주가 노예제 페지 운동을 누그러뜨리기 위해 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](을)를 죽이라는 명령을 내린 것으로 밝혀졌다. 참으로 끔찍한 죽음이 아닐수 없다!"
 curtiss_custom_death_shot_over_prison: "고객과 함께 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호를 타고 비행에 나선 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName](은)는 시시카 교도소 주변 상공을 돌고 있었다. 이를 본 교도관들이 열기구를 향해 총격을 가했다. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName](은)는 다치지 않고 무사히 벗어났으나, 아네스버그 인근의 오드리스콜이라는 갱단과 총격전을 벌이게 되었다. 이 과정에서 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]는 총에 맞아 바구니 밖으로 추락했다. 승객은 강 인근에 불시작한 것으로 추정되며, 지금까지 그 승객의 행방은 묘연한 상태다."
 curtiss.600.t: "복솔 가든-바일부르크 열기구 비행"
 curtiss.600.d: "영국의 열기구 조종사 찰스 그린이 런던의 복솔 가든에서 두 명의 대원을 데리고 열기구 로열 복솔 (Royal Vauxhall)호를 타고 출발했다. 순풍이 불어준 덕분에 열기구는 영국해협을 건너 독일 나사우의 바일부르크까지 날아갔다. 총거리 약 500마일 (800km)에 달하는 이번 비행은 역사상 가장 긴 거리를 날았던 열기구 비행으로 기록되었다."
 curtiss.600.f: "로열 복솔 호의 비행은 대성공을 거두었다. 비행 거리 기록은 80년 동안 깨지지 않았다.\n비행에 위험이 따르지 않은 것은 아니었다. 19세기의 열기구 비행은 어디에 착륙할지 전혀 알 수 없다는 점에서 특히 위험했다. 이에 따라 찰스 그린은 여정에 나서는 동안 충분한 식량을 챙겼다. 거기에 균형을 맞추기 위한 모래 1톤, 300m 길이의 밧줄, 기압계와 망원경, 여러 종류의 술과 외투, 온갖 물건들을 실었다. 이 모든 물자 뿐만 아니라 찰스 그린 본인과 토머스 몽크 메이슨, 로버트 홀랜드 두 명의 동행자가 기구 바구니에 몸을 구겨넣어야 했다.\n바일부르크에 도착한 이들은 현지 주민들의 도움, 그리고 가져온 브랜디와 함께, 열기구에 실었던 물자를 하선시키고 귀환할 준비를 했다. 바일부르크에서 세 사람은 나사우 공작을 비롯한 많은 사람들의 따뜻한 환영을 받았다. 이들은 열기구에 쓸 석탄 가스가 없어 마차를 타고 고국으로 돌아와야 했다."
 curtiss.600.g: "대영제국의 기록이 또 하나 생겼군!"
 curtiss.601.t: "립 패널의 발명"
 curtiss.601.d: "열기구에 열광하던 발명가 [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName](이)가 열기구 비행을 보다 안전하게 만드는 최신 발명품을 공개하였다. 일명 립 패널(rip panel)이란 이름의 이 발명품은 열기구 본체에 가볍게 부착된 외피의 한 부분으로, 열기구가 착륙할 때 이 부분을 뜯어낼 수 있도록 설계됐다. 그렇게 하면 열기구에 차 있던 가스가 빠른 속도로 빠져나가게 되며, 풍선이 지면에 끌리거나 어딘가에 걸리거나 충돌하는 것을 방지할 수 있다."
 curtiss.601.f: "립 패널이 발명되기 전까지 열기구 조종사들은 닻으로 열기구를 고정하거나 열기구 꼭대기로 직접 올라가 밸브를 개방하여 열기구의 공기를 빼내야 했다. 이는 기체가 빠르게 빠져나가 열기구가 찌그러진다는 점에서 매우 위험했다. 열기구 조종사들이 선체에 끼어 사망하는 사고도 빈번했다. 1839년 4월 27일 립 패널이 발명되면서 열기구 조종은 훨씬 안전해졌다."
 curtiss.601.g: "참 훌륭한 발명품이오! 이 분에게서 다시 소식이 들려왔으면 하네!"
 curtiss.601.h: "사실 새로운 열기구 조종사를 찾고 있네만!"
 curtiss.601.h.tt: "경험 많은 열기구 조종사 [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName](이)가 우리가 새로 후원하는 열기구 조종사가 됩니다."
 curtiss.602.t: "프랑시스크 아르방, 열기구 비행으로 알프스 산맥 횡단 성공"
 curtiss.602.d: "프랑스의 열기구 조종사 프랑시스크 아르방이 수소 열기구를 타고 알프스 산맥을 처음으로 횡단한 사람으로 기록되었다. 1849년 9월 2일 저녁 아르방은 마르세유에서 이륙하여 동쪽으로 향했다. 그의 열기구는 코티앙 알프스를 넘기 위해 약 15,000피트 (4,600m) 고도까지 상승하였다. 그 다음날 오전 2시 30분 경, 아르방은 토리노 인근에 착륙하였다."
 curtiss.602.f: "알프스 산맥 횡단은 오랜 세월 동안 깨지지 않는 기록으로 남았다. 이 기록이 다시 세워진 것은 1924년에 이르러서였다.\n아르방은 알프스 산맥 횡단에 앞서 이미 열기구 조종 경험을 쌓았다. 17살이 되던 1832년 무렵 첫 비행 시도에 나섰지만, 대부분의 열기구 비행은 1845년~1849년 이탈리아에서 실시하였다. 1846년에는 트리에스테 인근에서 항로를 이탈하여 어부들에게 구조되기도 하였다."
 curtiss.602.g: "굉장하군! 프랑스의 진정한 영웅일세!"
 curtiss.603.t: "열기구 비행으로 지중해 횡단에 나선 프랑시스크 아르방이 실종"
 curtiss.603.d: "알프스 산맥을 열기구로 횡단한 지 불과 한 달 만에 프랑시스크 아르방이 실종되고 말았다. 바르셀로나에서 이륙한 아르방은 바람에 휘말려 지중해 쪽을 향해 떠내려갔다. 이후로 그의 흔적은 발견되지 않고 있다. 구조대를 파견해 아르방을 찾아 나서는 것이 좋을까?"
 curtiss.603.f: "실제 역사에서도 1849년 10월 7일 프랑시스크 아르방의 열기구가 망망대해 위로 떠내려 갔다. 그 후로 아르방의 흔적은 전혀 발견되지 않았다. 정황상 이 때의 비행으로 사망한 것으로 보인다. 그러나 정확한 사고 경위는 미지의 상태로 남아 있다."
 curtiss.603.g: "나쁜 소식이군! 선박들을 파견하여 즉각 수색에 나서도록 하시오!"
 curtiss.603.h: "위험 부담을 안고 간 사람이다. 우리가 할 수 있는 것은 없어."
 curtiss.604.t: "프랑시스크 아르방 구조"
 curtiss.604.d1: "수색 작전이 결실을 맺었다! 우리 배 한 척이 프랑시스크 알방을 찾아낸 것이다! 다행히 아르방은 기민하게도 열기구에서 물건을 계속 떨어뜨려 물 위에 흔적을 남기는 버릇이 있었다. 우리 배에서 그 흔적을 발견하고 따라갔던 것이다. 아르방은 열기구에서 바구니를 분리하고 그것을 며칠 동안 붙잡고 있었다. 열기구에 실었던 몇 가지 보급픔 덕에 그러한 시련에서 살아남을 수 있었다."
 curtiss.604.d2: "한 어선이 바르셀로나 연안에서 프랑시스크 알반의 열기구를 발견했다. 상황을 고려하면 건강은 양호하겠으나 심한 탈수 증세를 보이고 있다. 하루빨리 회복되기를 바란다!"
 curtiss.604.f: "\"내 인생에서 가장 신나는 열기구 비행이었습니다! 기록도 경신이 되었다면 좋겠군요!\""
 curtiss.604.g: "정말 다행이야! 돌아온 것을 환영하오, 아르방!"
 curtiss.605.t: "속보: 아르방이 아프리카에서 노예 신세로 발견!"
 curtiss.605.d: "스페인의 여러 일간지에서 아르방이 지중해에 떨어진 것이 아니라 열기구를 타고 아프리카로 건너갔다가 그곳에 노예로 억류되어 있다고 보도했다. 아르방을 수색하여 자유의 몸에서 벗어나게 해달라는 국민들의 투서가 날이 갈수록 늘어나고 있다."
 curtiss.605.f: "실제 역사에서 1853년 여러 신문에 아르방이 아프리카에서 노예 신세가 되었다는 기사가 실린 적은 있지만, 이를 뒷받침하는 증거는 없었다. 아르방에게 정확히 무슨 일이 벌어졌는가는 불분명하나, 지중해에서 익사했을 가능성이 높다."
 curtiss.605.g: "아르방을 찾아야 한다!"
 curtiss.605.h: "누구도 그렇다 해선 안 될 믿기 어려운 이야기로군."
 curtiss.606.t: "[SCOPE.sCountry('curtiss_arban_slaver_scope').GetName]에 억류되어 있던 아르방"
 curtiss.606.d: "우리 조사단은 아르방이 정말로 아직 살아있다는 사실을 밝혀냈다. 아르방은 [SCOPE.sCountry('curtiss_arban_slaver_scope').GetName]에 있었으며 그곳에서 노예처럼 들판에 나가 일하고 있었다. 주인은 우리가 엄청난 금액을 제시하면 넘겨주겠다고 한다. 물론, 무력을 써서 풀려나게 할 수도 있다."
 curtiss.606.f: "실제 역사에서 각 신문들은 후속 보도를 이어가지 않았다. 따라서 아르방이 정말로 노예 신세가 되었는가는 확실치 않다. 다만 그렇지 않았을 것으로 추정된다."
 curtiss.606.g: "노예의 삶에서 구출해 주어야 한다!"
 curtiss.606.h: "그냥 돈 좀 쥐어주고 끝내자구..."
 curtiss.607.t: "노예에서 벗어나 조국으로 돌아온 아르방"
 curtiss.607.d1: "소규모 특공대가 아르방을 억류 상태에서 구출하는 임무를 맡았다. 짧은 교전 끝에 아르방과 여러 유럽인들을 구출하여 말에 태우고 탈출할 수 있었다. [SCOPE.sCountry('curtiss_arban_slaver_scope').GetAdjective] 당국이 대응에 나서기 전에 이미 고국으로 돌아가는 배에 몸을 싣게 되었다. 아르방은 오랜 기간 동안 억류되면서 몸이 쇠약해졌지만, 우리에게 모험적인 열기구 비행에 관한 이야기를 들려줄 수 있었다. 그의 경험담은 분명 우리나라에도 큰 도움이 되리라."
 curtiss.607.d2: "아르방이 조국으로 돌아왔다. 오랜 기간 동안 억류되면서 몸이 쇠약해졌지만, 우리에게 모험적인 열기구 비행에 관한 이야기를 들려줄 수 있었다. 그의 경험담은 분명 우리나라에도 큰 도움이 되리라."
 curtiss.607.f: "\"바람에 휘말려 망망대해로 나아갔단 말이죠. 남쪽으로 밀려가고 있었기에 발레아레스 제도에라도 도달해 보기로 마음먹었습니다. 그런데 바람이 워낙 안 좋아서 북아프리카 해안까지 밀려가 착륙할 수밖에 없었습니다. 불행히도 그곳 주민들은 그다지 친절하지 않더군요. 지중해 상공을 비행한 사람이 또 있나요? 제가 기록을 세운 겁니까?\""
 curtiss.607.g: "성공적인 구출 작전이었소!"
 curtiss.607.h: "돌아온 것을 환영하네, 아르방!"
 curtiss.608.t: "어디에도 남지 않은 아르방의 흔적"
 curtiss.608.d: "몇 달간의 수색에도 우리는 여전히 아르방의 흔적을 전혀 찾지 못했다. 북아프리카에 노예 신세로 지내고 있다는 이야기는 지어낸 이야기였던 것으로 보인다. 프랑시스크 아르방은 틀림없이 사망했을 것이다."
 curtiss.608.f: "\"프랑스인? 아 그럼! 프랑스인이라면 우리가 많이 갖다 팔지. 어떤 놈으로 줄까? 하나같이 힘 세고 바닷일 하던 놈들이여!\""
 curtiss.608.g: "수색을 중단한다."
 curtiss.609.t: "나다르, 열기구에서 최초의 항공 사진 촬영"
 curtiss.609.d: "프랑스의 사진가 나다르는 열기구 조종과 사진이라는 두 가지의 야심을 하나로 모았다. 공중에서 사진을 촬영하는 데 성공한 것이다. 이 사진은 이전까지 극소수의 사람만 보았을, 창공에서 바라본 세상을 보여주고 있었다."
 curtiss.609.f: "나다르는 1859년 솔페리노 전투에서 첫 항공 사진 촬영에 나섰다. 1863년 나다르는 항공 관련 협회인 #b 공기보다 무거운 기계를 이용한 공중수송 장려 협회#! (Société d'encouragement pour la locomotion aérienne au moyen d'appareils plus lourds que l'air)의 회장이 되었다. 이 협회의 비서는 다름아닌 소설가 쥘 베른이었는데, 나다르의 열기구 비행에서 영감을 받아 소설 '#b 열기구에서의 5주#!'를 쓰기도 하였다."
 curtiss.609.g: "상공에서 바라본 세상은 이토록 다르구나!"
 curtiss.610.t: "나다르의 르 제앙 호가 하노버에 추락"
 curtiss.610.d: "파리에서 하노버까지 아슬아슬하고 몹시 까다로운 비행에 나섰던 나다르가 초대형 열기구 '르 제앙' 호를 하노버의 들판에 추락시켰다. 나다르와 그 아내는 심각한 부상을 입었다. 하루빨리 회복하여 다시 열기구 비행에 나설 수 있기를 바란다!"
 curtiss.610.f: "'르 제앙' (Le Géant, 거인) 호는 그 이름처럼 높이 60m에 달하는 거대한 열기구였으며, 에두아르 고다르가 제작하여 나다르가 조종하였다. 두번째 비행에서 나다르는 르 제앙 호를 지면에 충돌시키고 말았다. 본인은 심각한 부상을 입은 것은 물론 열기구도 크게 망가졌으나, 나다르는 르 제앙 호를 수리하여 다시 비행에 나섰다. 1867년에는 최대 12명의 승객을 태우고 비행에 나서 차가운 닭고기와 포도주를 대접하기도 했다."
 curtiss.610.g: "참 무서운 사고로군!"
 curtiss.611.t: "글레이셔와 콕스웰, 열기구 최고 고도 비행 기록 수립"
 curtiss.611.d: "기상학자 제임스 글레이셔와 열기구 조종사 헨리 트레이시 콕스웰이 열기구 최고 고도 비행 기록을 세웠다. 이 두 사람은 열기구에 함께 승선하여 약 11,270m (37,000피트)에 달하는 고도까지 올라갔다. 8,800m 고도에서 글레이셔는 이미 의식을 잃었다. 콕스웰은 간신히 열기구를 하강시킬 수 있었다. 다행히 두 사람은 목숨을 건졌다."
 curtiss.611.f: "1862년 글레이셔와 콕스웰은 열기구 '맴모스' 호에 올랐다. 두 사람의 비행은 영국 과학 발전 협회으로부터 초고층 대기권에서 실험을 수행할 것을 의뢰받으면서 이루어지게 되었다. 8,800m (29,000ft) 고도에서 글레이셔는 정신을 잃고 콕스웰은 손에 감각을 잃고 말았다. 밸브 선이 엉켜버리는 바람에 콕스웰은 바구니에서 열기구를 조작할 수 없었던 것이다. 결국 밧줄 위로 올라가 이빨로 밸브를 개방했다. 그런 뒤 의식을 잃었으나 열기구는 하강하기 시작했다. 15분 뒤 열기구는 지상에 무사히 착륙했다."
 curtiss.611.g: "살아 있는 것이 다행이구만!"
 curtiss.612.t: "에두아르드 스펠테리니, 알프스 횡단 여객 수송애 나서"
 curtiss.612.d: "스위스의 에두아르드 스펠테리니가 승객들을 열기구에 태우고 알프스 산맥을 넘어갔다. 비행 과정에서 알프스의 최정상 중 한 곳을 지나간 것으로 전해졌다. 스펠테리니는 이제 열기구 조종의 떠오르는 별이 되었다."
 curtiss.612.f: "에두아르트 스펠테리니 (태명 알베르트 슈바이처)는 어린 시절부터 열기구 조종 훈련을 받았다. 스펠테리니는 인생 최초로 자신만의 열기구인 '우라니아'(Urania) 호를 마련한 뒤, 유럽 전역을 돌아다니며 상류층 고객을 대상으로 상공에서 바라본 세상을 보여주는 사업을 펼쳤다. 비행에는 갈빗살과 샴페인으로 구성된 간단한 도시락이 함께 포함된 것이 일반적이었다. 스펠테리니는 항공 사진 촬영도 시작했으나 자신의 명성을 가장 크게 드높인 것은 알프스 산맥 위를 나는 여객 비행이었다."
 curtiss.612.g: "전망이 기가 막히는군!"
 curtiss.613.t: "지파르가 제작한 조종형 비행선의 첫 비행"
 curtiss.613.d: "열기구 비행은 언제나 순풍에 의존한다는 것이 큰 문제였다. 열기구가 바람에 떠내려가기가 너무 쉽고 그로 인한 사고도 빈번했던 것이다. 앙리 지파르는 이 문제를 해결하기 위하여 증기 엔진과 방향타를 장착한 길쭉한 비행선을 제작하였다. 자파르는 이른바 '자파르 조종기구'라 불리는 이 비행선을 타고 파리에서 엘랑쿠르까지 27km를 비행하였다. 비행선의 속도가 너무 느린 탓에 역풍을 거스르는 것은 아직까지 불가능하다. 하지만 이런 비행선이 앞으로 어떤 방향으로 발전할지는 누가 알겠는가?"
 curtiss.613.f: "1852년 9월 24일 지파르는 동력으로 움직이고 조종이 가능한 비행선을 타고 최초로 비행에 성공했다. 그러나 증기 엔진의 추진력이 너무 약했기 때문에 아직까지는 비행선이 제대로 자리 잡지는 못했다. 이후 내연기관의 발명으로 비행선을 향한 꿈은 비로소 구현될 수 있었다."
 curtiss.613.g: "머지않아 이런 조종형 열기구가 하늘을 정복할 지도 모른다!"
 curtiss.614.t_brussels: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName], 브뤼셀행 고려 중"
 curtiss.614.t_capital: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName], [SCOPE.sCountry('curtiss_august_piccard_destination').GetCapital.GetCityHubName]행 고려 중"
 curtiss.614.d_brussels: "우리나라에서 가장 중요한 학자로 꼽히는 [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName](이)가 브뤼셀 자유 대학교로부터 교수직을 제의받았다. 대학교 측은 열기구를 이용해 성층권을 보다 심층적으로 연구할 수 있도록 상당한 재정 지원을 약속하였다. [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] 측은 이 제의를 수락할 의향이 있는 것으로 보인다. 이것이 성사되면 우리는 열기구 비행 분야에서도 풍부한 경험을 가진 훌륭한 과학자를 잃게 된다는 뜻이기도 하다."
 curtiss.614.d_capital: "우리나라에서 가장 중요한 학자로 꼽히는 [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName](이)가 [SCOPE.sCountry('curtiss_august_piccard_destination').GetCapital.GetCityHubName] 자유 대학교로부터 교수직을 제의받았다. 대학교 측은 열기구를 이용해 성층권을 보다 심층적으로 연구할 수 있도록 상당한 재정 지원을 약속하였다. [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] 측은 이 제의를 수락할 의향이 있는 것으로 보인다. 이것이 성사되면 우리는 열기구 비행 분야에서도 풍부한 경험을 가진 훌륭한 과학자를 잃게 된다는 뜻이기도 하다."
 curtiss.614.f: "피카르는 1922년 브뤼셀 자유 대학교의 교수로 임명된 후, 강의와 함께 기구를 이용한 성층권 연구에 전념했다. 성층권 연구에서 친구인 알베르트 아인슈타인과 협력해 여러 실험을 구상하기도 했다.\n또한 방사능 측정 장치와 초정밀 지진계를 발명하였으며, 원자물리학을 연구하여 세번째 우라늄 동위원소의 존재를 예측하기도 하였는데, 이것이 바로 훗날 실제로 발견된 우라늄-235이다.\n브뤼셀에서 본인의 강연은 만화 캐릭터 캘큘러스 교수(Professor Calculus)의 모티브가 되기도 했다."
 curtiss.614.g: "그 분의 후원을 이대로 멈출 수는 없어!"
 curtiss.614.h: "위대한 열기구 조종사라면 이미 또 있다!"
 curtiss.614.g.tt: "경험 많은 열기구 조종사 [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName](이)가 우리가 새로 후원하는 열기구 조종사가 됩니다."
 curtiss.615.t: "[SCOPE.sCountry('curtiss_august_piccard_destination').GetCapital.GetCityHubName](으)로 향한 [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]"
 curtiss.615.d: "스위스 과학자 [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName](이)가 [SCOPE.sCountry('curtiss_august_piccard_destination').GetCapital.GetCityHubName](으)로 건너가 [SCOPE.sCountry('curtiss_august_piccard_destination').GetCapital.GetCityHubName] 자유 대학교의 교수로 강단에 서게 되었다. 대학교 측은 열기구를 이용해 성층권을 보다 심층적으로 연구할 수 있도록 상당한 재정 지원을 약속하였다. 뛰어난 과학자이자 열기구 조종사인 [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName](은)는 열기구 분야에서 새로운 기록을 세울 전망이다."
 curtiss.615.f: "피카르는 1922년 브뤼셀 자유 대학교의 교수로 임명된 후, 강의와 함께 기구를 이용한 성층권 연구에 전념했다. 성층권 연구에서 친구인 알베르트 아인슈타인과 협력해 여러 실험을 구상하기도 했다.\n또한 방사능 측정 장치와 초정밀 지진계를 발명하였으며, 원자물리학을 연구하여 세번째 우라늄 동위원소의 존재를 예측하기도 하였는데, 이것이 바로 훗날 실제로 발견된 우라늄-235이다.\n브뤼셀에서 본인의 강연은 만화 캐릭터 캘큘러스 교수(Professor Calculus)의 모티브가 되기도 했다."
 curtiss.615.g: "이처럼 명성 높은 열기구 조종사는 우리 국가의 대표가 되어야 한다!"
 curtiss.615.h: "그의 앞날에 행운이 있길!"
 curtiss.615.g.tt: "경험 많은 열기구 조종사 [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName](이)가 우리가 새로 후원하는 열기구 조종사가 됩니다."
 curtiss.650.t: "신임 열기구 조종사 소개"
 curtiss.650.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName](은)는 성공한 열기구 조종사로서 우리의 지원을 받아 열기구 조종의 한계에 도전할 뜻을 밝혀왔다. 기록은 깨지기만 기다리고 있고 과학적 발견은 눈앞에 있다. 열기구 [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호라면 본인은 틀림없이 새로운 고도에 도달할 수 있을 것이라고 [SCOPE.sCharacter('curtiss_balloonist_scope').GetSheHe]는 자신하고 있다."
 curtiss.650.f: "\"조국의 영광을 드높이겠소!\""
 curtiss.650.g: "이 자를 지원하는 것이 성과로 돌아왔으면 좋겠군! 열기구 창으로 데려가 주시오."
 curtiss.650.h: "행운을 비네!"
 curtiss.651.t: "우리나라의 열기구"
 curtiss.651.balloonist: "우리는 열기구 조종사 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]의 후원을 결정하였다. 열기구 '[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] 호'를 타고 조금씩 점점 더 모험적인 비행에 나서는 사람이다."
 curtiss.651.noballoonist: "우리는 현재 열기구 조종사를 후원하고 있지 않다. 따라서 지금의 우리에게 열기구 기록 경신이란 머나먼 이야기일 것이다. 우리나라 출신 열기구 조종사를 후원하여 신기록 수립에 도전하고, 신형 열기구 개발에 나서도록 지원할 수도 있다."
 curtiss.651.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloonist_trait_level_type')]\n\n#b 현재 [ROOT.GetCountry.GetAdjective] 기록:#!\n - 고도 기록: #b #p [ROOT.Var('curtiss_balloon_altitude_record_var').GetValue]m#!#!\n - 거리 기록: #b #p [ROOT.Var('curtiss_balloon_distance_record_var').GetValue]km#!#!\n - 시간 기록: #b #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]시간#!#!\n\n#b 현재 세계 기록:#!\n - 고도 기록: #b #p [GetGlobalVariable('curtiss_balloon_altitude_record_global_var').GetValue]m#!#! [GetGlobalVariable('curtiss_balloon_altitude_record_holder_global_var').GetCountry.GetFlagTextIcon]\n - 거리 기록: #b #p [GetGlobalVariable('curtiss_balloon_distance_record_global_var').GetValue]km#!#! [GetGlobalVariable('curtiss_balloon_distance_record_holder_global_var').GetCountry.GetFlagTextIcon]\n - 시간 기록: #b #p [GetGlobalVariable('curtiss_balloon_time_record_global_var').GetValue]시간#!#! [GetGlobalVariable('curtiss_balloon_time_record_holder_global_var').GetCountry.GetFlagTextIcon]"
 curtiss.651.g: "열기구 조종사의 후원을 시작하게!"
 curtiss.651.h: "열기구 조종사 후원 중단"
 curtiss.651.htt: "이 선택지로 열기구 조종사가 게임에서 자취를 감추게 됩니다."
 curtiss.651.l: "하던 일을 마저 하겠다!"
 curtiss.651.w: "우리 조종사의 #yellow 비행#!에 관해서 더는 알리지 마시오!"
 curtiss.651.w.tt: "열기구 조종사의 #yellow 비행#!이나 #yellow 신규 특성 획득#!에 관한 이벤트를 더 이상 받지 않게 됩니다. 이 설정은 언제든 되돌릴 수 있습니다."
 curtiss.651.x: "우리 조종사의 #yellow 비행#!에 관해서 알려주시오!"
 curtiss.651.x.tt: "열기구 조종사의 #yellow 비행#!이나 #yellow 신규 특성 획득#!에 관한 이벤트를 받게 됩니다. 이 설정은 언제든 되돌릴 수 있습니다."
 curtiss.651.y: "우리 조종사의 #yellow 죽음#!에 관해서 더는 알리지 마시오"
 curtiss.651.y.tt: "열기구 조종사의 #yellow 죽음#!에 관한 이벤트를 더 이상 받지 않게 됩니다. 신임 열기구 조종사의 후원은 자동으로 이루어집니다. 이 설정은 언제든 되돌릴 수 있습니다."
 curtiss.651.z: "우리 조종사의 #yellow 죽음#!에 관해서 알려주시오"
