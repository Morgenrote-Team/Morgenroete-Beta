 curtiss.654.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloonist_distance_flight_description_type')]"
 curtiss.654.f1: "\"이번에는 성공을 거두지 못했지만, 다음 기회에는 반드시 해내고 말 것이오!\"\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloonist_distance_flight_type')]"
