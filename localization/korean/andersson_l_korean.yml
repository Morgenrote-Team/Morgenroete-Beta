 andersson.61.t: "The [GetPlayer.GetCustom('andersson_fossil_piltdown')] Man"
 andersson.61.d: "Two leading anthropologists today unveiled a discovery that could shock the scientific world: they found nothing more than the first modern man, who clearly originated in [ROOT.GetCountry.GetNameNoFlag]."
 andersson.61.f: "At a meeting of the Geological Society of London, Arthur Smith Woodward and Charles Dawson announced that the skull fragments of an early human found in a gravel pit near the village of Piltdown were an epoch-making find. Woodward's reconstruction based on the fragments found largely resembled the skull of a modern human, with the exception of the occiput, a region at the junction of the skull and the spine, and the size of the brain, which was only about two-thirds of that of a modern human, and only approximately human-like teeth and jawbone. Drawing on the high scientific authority of the British Museum, Woodward interpreted the Piltdown finds as a missing link between great apes and humans. Despite initial doubts, scientists at the Natural History Museum in London assigned the find an age of between 200,000 and 500,000 years. This would have made him significantly older than the Neanderthals. The announcement of the discovery immediately attracted great interest from both experts and the British population. The news of the Piltdown discovery was a sensation around the world."
 andersson.61.g: "So the first modern human was [ROOT.GetCountry.GetAdjectiveNoFormatting]. Not surprising at all!"
 andersson.61.h: "This find is extremely doubtful."
 andersson.62.d: "Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName], the leading anthropologist of our country, today unveiled a discovery that could shock the scientific world: [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe] found nothing more than the first modern man, who clearly originated in [ROOT.GetCountry.GetNameNoFlag]."
 andersson.62.f: "At a meeting of the Anthropological Society of [ROOT.GetCountry.GetCapital.GetCityHubName], [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName] announced that the skull fragments of an early human found in a gravel pit near the village of [GetPlayer.GetCustom('andersson_fossil_piltdown')] were an epoch-making find. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]'s reconstruction based on the fragments found largely resembled the skull of a modern human, with the exception of the occiput, a region at the junction of the skull and the spine, and the size of the brain, which was only about two-thirds of that of a modern human, and only approximately human-like teeth and jawbone. Drawing on the high scientific authority of the [ROOT.GetCountry.GetAdjectiveNoFormatting] Museum, [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] interpreted the [GetPlayer.GetCustom('andersson_fossil_piltdown')] finds as a missing link between great apes and humans. Despite initial doubts, scientists at the Natural History Museum in [ROOT.GetCountry.GetCapital.GetCityHubName] assigned the find an age of between 200,000 and 500,000 years. This would have made him significantly older than the Neanderthals. The announcement of the discovery immediately attracted great interest from both experts and the [ROOT.GetCountry.GetAdjectiveNoFormatting] population. The news of the [GetPlayer.GetCustom('andersson_fossil_piltdown')] discovery was a sensation around the world."
 andersson.63.t: "Paranthropus"
 andersson.63.d: "During a field trip to Transvaal, a schoolboy gave Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] some fossils to examine. The anthropologist immediately wanted to know where the boy had found them. Upon arriving at the site, [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe] was able to make some incredible discoveries - suggesting a completely unknown species, perhaps not an ancestor, but a very distant cousin of humans."
 andersson.63.f: "Paranthropus is a genus of extinct hominin which contains two widely accepted species: P. robustus and P. boisei. However, the validity of Paranthropus is contested, and it is sometimes considered to be synonymous with Australopithecus. They lived between approximately 2.9 and 1.2 million years ago (mya) from the end of the Pliocene to the Middle Pleistocene. Paranthropus is characterised by robust skulls, with a prominent gorilla-like sagittal crest along the midline, which suggest strong chewing muscles—and broad, herbivorous teeth used for grinding. They are associated with bone tools and contested as the earliest evidence of fire usage. They typically inhabited woodlands, and coexisted with some early human species, namely A. africanus, H. habilis and H. erectus."
 andersson.63.g: "The doctor should take more vacations if these are the results."
