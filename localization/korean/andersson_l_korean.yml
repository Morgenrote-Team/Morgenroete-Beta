 andersson.10.t: "인류학·민족학 연구소"
 andersson.10.d: "오늘 개소식과 함께 [SCOPE.sCharacter('andersson_ruler').GetFullName] [SCOPE.sCharacter('andersson_ruler').GetPrimaryRoleTitle]가 인류학과 민족학 연구소의 문을 열었다."
 andersson.10.f: "개소식은 엄숙하면서도 널리 환영받는 행사였으며, 언론가와 전문가, 대중의 호의를 받았으나 비판의 목소리도 없지 않았다. 수집욕에 사로잡힌 사람들이 별다른 가치도 없는 진기한 물건들을 전시하는 건물이 또 하나 생긴 것은 아닌지 하는 의문이다. 어느 야당 계열의 신문에서는 예산 낭비이자 사무적인 전시에 그쳤다고 목소리를 높였다. 정부가 새로운 것을 선보이지 못한다는 비판이었다. 어디서는 유물을 수집하고, 어디서는 약초를 수집하고, 또 어디서는 공룡에 집착하는데, 이제는 사람의 뼈까지 모은다니! 다행히 이런 부정적인 여론은 소수에 불과했고, 새 연구소를 향한 열기는 식지 않았다. [SCOPE.sCharacter('andersson_ruler').GetFullName] [SCOPE.sCharacter('andersson_ruler').GetPrimaryRoleTitle]는 그 중요성을 다시금 역설하였다."
 andersson.10.g: "연구소를 방문하겠다."
 andersson.21.t: "베로인"
 andersson.21.d: "엘라이어스 셀라즈가 플로리다에서 태고의 유골을 발견하여 전국적으로 화제를 불러모았다."
 andersson.21.f: "베로인은 지질학자 엘라이어스 셀라즈가 1915년~1916년 미국 플로리다주 베로 비치에서 발견한 플라이스토세의 대표적인 인류 유골을 가리킨다. 이 유골이 발견될 당시 빙하기의 거대 멸종 동물의 화석과 같은 지층에서 발견되어 거센 논란을 불러일으켰는데, 인류가 아메리카 대륙에 도달한 시점은 훨씬 나중의 일이라는 기존의 과학적 통념에 도전하는 것이었기 때문이다. 최신 탄소연대 측정법과 발전된 코코학 기법을 동원하여 해당 부지가 북아메리카에서 가장 오래된 인류 거주지이며 그 연대는 약 13,000여년 전으로 거슬러 올라가는 사례인 것으로 확인되었다."
 andersson.21.g: "흥미롭군."
 andersson.22.t: "라고아산타인"
 andersson.22.d: "덴마크의 학자가 브라질 동굴에서 놀라운 발견을 해냈다."
 andersson.22.f: "라고아산타인은 19세기 중반 덴마크의 박물학자 페테르 빌헬름 룬드가 브라질 미나스제라이스주의 석회암 동굴에서 발견한 구석기 시대의 원주민 유골을 가리킨다. 현대 유전학 연구와 고고학 분석을 통해 이 유골이 남아메리카에 인류가 처음으로 정착하던 시기의 것이며 그 연대는 1만 년 전에서 1만 2천 년 전으로 거슬러 올라간다는 배경을 파악해냈다."
 andersson.23.t: "크로마뇽인"
 andersson.23.d: "루이 라르테가 네안데르탈인보다 현생인류에 훨씬 더 유사한 선사시대 인류의 골격 여러 점을 찾아냈다. 이 최초의 유럽인들은 아브리 드 크로마뇽 유적에서 이름을 따와 크로마뇽인으로 불리우게 되었다."
 andersson.23.f: "크로마뇽인은 유럽 후기 구석기 시대의 초창기 현생 인류 (호모 사비엔스)를 가리키는 말로 1868년 지질학자 루이 라르테가 프랑스 레제이지의 암굴에서 발견하였다. 이 유적에서는 석기와 뿔 조각품, 동물 유해와 함께 다섯 구의 유골이 출토되었으며, 이는 플라이스토세의 멸종 동물과 함께 유럽에 현생 인류가 살았다는 최초의 결정적인 증거가 되었다. 이러한 발견은 표본의 연대를 2만 8천년 전에서 3만 년 전으로 추정하고, 과거에 발견된 강인한 체격의 네안데르탈인과 구별하는 등, 인류고생물학이라는 분야를 확립하는 데 중추적인 역할을 하였다."
 andersson.24.t: "보스코프인"
 andersson.24.d: "어느 농장에서 두개골이 발견되어 인부들 사이에서 소동이 일었다. 가장 가까운 연구 부처에 이 사실이 전해졌다."
 andersson.24.f: "보스코프인은 1913년 남아프리카 트란스발 지역의 농장 인부들이 처음 발견한 원시 인류의 화석화된 머리덮개뼈를 가리키는 말로, 뇌수용량이 비정상적으로 크다는 점에서 널리 주목받았다. 20세기 초에는 일부 인류학자들을 중심으로 이 표본을 '호모 카펜시스'라는 별개의 종으로 잘못 분류하고, 이 지역에 현생 인류보다 앞서 '큰 뇌를 가진' 인류가 살았다는 가설을 제시하였다. 이후 고인류학 연구와 더욱 정밀한 연대 측정으로 이러한 주장은 반박되고, 그 지역의 원주민인 코이산족의 조상 계통과 일치하는 현생 인류(호모 사피엔스)에 속하는 것으로 확인되었다."
 andersson.25.t: "산정동인"
 andersson.25.d: "Human fossils were found today in a cave above the Zhoukoudian site, suggesting an early settlement of northern China."
 andersson.25.f: "Shandingdong Man refers to a group of early modern humans (Homo sapiens) discovered in 1933-1934 in the Upper Cave of the Zhoukoudian site near Beijing, China. Excavated under the direction of Pei Wenzhong and later analyzed by Franz Weidenreich, these fossils date back approximately 30,000 to 10,000 years. Historically, Shandingdong Man served as the Asian counterpart to Europe's Cro-Magnon. The remains, consisting of three complete skulls and various bone fragments, were found alongside sophisticated tools, bone needles, and perforated tooth ornaments, indicating a complex culture. Weidenreich's original hypothesis suggested these individuals represented the 'proto-mongoloid' ancestors of modern Asians, though contemporary paleoanthropology views them as part of a broader, diverse migration of early humans across East Asia before regional traits fully stabilized."
 andersson.26.t: "탈가이인"
 andersson.26.d: "탈가이 역 인근에서 유골이 발견되어 인류의 첫 호주 정착에 대해 완전히 새롭게 조명되고 있다."
 andersson.26.f: "탈가이인은 1884년 오스트레일리아 퀸즐랜드 알로라 인근의 탈가이 역에서 울타리를 설치하던 사람이 발견한 선사시대의 두개골로, 인류가 호주에 정착하게 된 정황을 보여주는 가장 오래된 증거로 남아 있다. 처음에는 다부진 체격과 두터운 광물화 때문에 훨씬 더 오래된 종으로 오인되었으나, 이후 토양 탄산염을 탄소측정법으로 검사한 결과 해당 표본은 약 13,500여년 전의 것으로 판명되었다. 탈가이인의 발견은 호주 원주민의 조상이 거대 멸종 동물과 함께 살았다는 사실을 확인하였으며, 호주 원주민의 깊은 역사를 이해하는 데 중요한 연결고리의 역할을 한다는 점에서 역사적으로 뜻깊은 의미를 지니고 있다."
 andersson.31.t: "네안데르탈인"
 andersson.31.d: "오늘 독일 본 대학의 어느 연구원이 동료 과학자와 함께 멸종한 초창기 인류를 발견하였다는 사실을 일반에 공개하였다."
 andersson.31.f: "1856년 8월 중순, 이탈리아인 채석장 인부들이 네안데르탈 계곡의 석회암 채굴로 무너져 내린 지역에서 뼛조각을 발견하였다. 처음에는 돌무더기에 아무렇게나 방치되어 있던 이 뼛조각들은 채석장의 주인인 빌헬름 베커쇼프와 프리드리히 빌헬름 피퍼의 눈에 띄었고, 이후 그보다 더 큰 뼛조각 16점을 수습하여 요한 카를풀로트에게 감정을 의뢰하였다. 언론 보도로 이 소식을 접한 본 대학의 해부학자 헤르만 샤프하우젠도 유골 조사에 나섰고, 풀로트와 마찬가지로 현생 인류의 옛 모습이라는 결론을 내렸다. 풀로트와 샤프하우젠은 1857년 6월 프로이센 라인란트 자연사학회 총회에서 유골 발견 사실을 공개하였지만, 전문가들은 두 사람의 설명에 생각을 같이하지 않았다. 네안데르탈 1호로 불린 이 유골은 호모 네안데르탈의 모식표본이 되었다."
 andersson.32.t: "지브롤터인"
 andersson.32.d: "Captain Edmund Flint has made an almost unbelievable discovery near Gibraltar."
 andersson.32.f: "The Gibraltar Man (specifically Gibraltar 1) refers to a remarkably well-preserved adult female skull discovered in 1848 by Captain Edmund Flint at Forbes' Quarry, representing the first Neanderthal fossil ever found by modern science. Although the specimen was recovered eight years before the famous discovery in Germany's Neander Valley, its significance as a distinct human relative was not fully recognized until the 1860s, after the 'Neanderthal' name had already been established. Subsequent excavations at the site and nearby Gorham's Cave have revealed that Gibraltar served as one of the last known refuges for Neanderthals, with some evidence suggesting they survived there until approximately 28,000 to 32,000 years ago."
 andersson.33.t: "스피인"
 andersson.33.d: "Near Spy, scientists have made a valuable anthropological discovery that sheds light on the prehistoric history of Belgium better than ever before."
 andersson.33.f: "The Spy Man refers to two nearly complete Neanderthal skeletons discovered in 1886 by archaeologist Marcel de Puydt and geologist Maximin Lohest in the Betche aux Rotches cave near Spy, Belgium. This discovery was a watershed moment in paleoanthropology, as the remains were found in clear association with Mousterian stone tools and extinct Ice Age mammals, definitively proving that Neanderthals were ancient, prehistoric humans rather than pathological modern individuals. The Spy fossils, characterized by their robust frames and prominent brow ridges, remain some of the most important specimens for understanding the anatomy and behavior of late European Neanderthals, dating to approximately 36,000 to 40,000 years ago."
 andersson.34.t: "크라피나인"
 andersson.34.d: "Near Krapina, researchers have discovered a massive site of prehistoric human bones that are turning the history of the entire Balkans on its head."
 andersson.34.f: "The Krapina Man refers to a massive collection of approximately 800 Neanderthal fossil fragments discovered between 1899 and 1905 by paleontologist Dragutin Gorjanović-Kramberger at the Hušnjakovo Hill rock shelter in Croatia. This discovery was groundbreaking for its time, as Gorjanović-Kramberger used stratigraphic analysis and pioneered the use of X-rays to prove the fossils' antiquity and show that Neanderthals were a direct part of human evolutionary history. The site, which dates back roughly 120,000 to 130,000 years, remains the largest and most significant Neanderthal find in the world, providing extensive data on their physical variation, health, and potential ritualistic behaviors."
 andersson.35.t: "갈릴리인"
 andersson.35.d: "It seems to be confirmed that the Holy Land is indeed one of the oldest cradles of mankind - a sensational discovery that has now become known in the international scientific community."
 andersson.35.f: "The Galilee Man refers to a partial skull, specifically a frontal bone known as the 'Zuttiyeh skull,' discovered in 1925 by Francis Turville-Petre in the Mugharet el-Zuttiyeh cave in present-day Israel. It was the first fossil hominid ever found in Western Asia and initially sparked debate over whether it represented a Neanderthal or an early modern human due to its unique transitional features. Current paleoanthropological perspectives often classify the specimen, which dates to approximately 200,000 to 350,000 years ago, as a late Homo heidelbergensis or a member of a population ancestral to both Neanderthals and Homo sapiens."
 andersson.41.t: "하이델베르크인"
 andersson.41.d: "Near Heidelberg, researchers believe they have found the 'oldest German' in history."
 andersson.41.f: "The Heidelberg Man refers to the species Homo heidelbergensis, defined by a fossilized lower jaw discovered in 1907 by Daniel Hartmann in a gravel pit near Mauer, Germany. This specimen, known as the Mauer 1 mandible, dates back approximately 600,000 years and is characterized by its massive, robust structure and the absence of a chin, yet it possesses teeth strikingly similar to those of modern humans. Today, the Heidelberg Man is widely recognized as a pivotal Middle Pleistocene ancestor, believed to be the common forebear of both the Neanderthals in Europe and Homo sapiens in Africa."
 andersson.42.t: "로디지아인"
 andersson.42.d: "Swiss miner Tom Zwiglaar made one of the most significant anthropological discoveries in Africa to date, almost by accident."
 andersson.42.f: "The Rhodesian Man refers to a nearly complete fossilized skull discovered in 1921 by Swiss miner Tom Zwiglaar at the Broken Hill lead and zinc mine in Northern Rhodesia (now Kabwe, Zambia). Formally classified as Kabwe 1, the specimen was the first major human fossil ever found in Africa and is notable for its combination of primitive features, such as massive brow ridges, alongside a modern-sized brain. Recent high-precision dating suggests the skull is approximately 299,000 years old, positioning it as a member of Homo heidelbergensis (or Homo rhodesiensis) and a likely late-surviving contemporary of the earliest emerging Homo sapiens."
 andersson.43.t: "베이징인"
 andersson.43.d: "The new discovery of early humans near Beijing reinforces the theory that humans originated in Asia."
 andersson.43.f: "Fossils that were discovered from the 1920s near Zhoukoudian, around 40 km southwest of the city center of Beijing, are referred to as 'Peking Man' and are assigned to the genus Homo. In 1927, Davidson Black gave the fossil finds, essentially based on a single tooth, the new species and genus name Sinanthropus pekinensis Black & Zdansky. In 1940, the finds - based on now several dozen fossils - were interpreted by Wilfrid Le Gros Clark as being closely related to the 'Java men' and, like them, with the species and genus name Pithecanthropus erectus chosen by Eugène Dubois in 1892 named. The original fossils were lost during the Second World War."
 andersson.44.t: "자바인"
 andersson.44.d: "In the Dutch East Indies, Eugène Dubois, a physician and anatomist, has uncovered the fossilized remains of a prehistoric human ancestor—provoking both excitement and controversy within the scientific community."
 andersson.44.f: "The fossils first discovered by Eugène Dubois in 1891 on the banks of the Solo River near Trinil in East Java are called Java Man. According to current knowledge, they are said to be around one million years old. They were the first fossils of hominins to be discovered outside of Europe and, after Neanderthals, the second evidence of fossil relatives of anatomically modern humans (Homo sapiens). The finds from Java were first referred to as Anthropopithecus and later as Pithecanthropus erectus. Today they are assigned to the species Homo erectus by most paleoanthropologists, whereby their origin is occasionally - as suggested by Franz Weidenreich in 1940 - emphasized by the addition of a subspecies epithet: Homo erectus javanensis. More than 50 years after Dubois's find, Ralph von Koenigswald recollected that, 'No other paleontological discovery has created such a sensation and led to such a variety of conflicting scientific opinions.'"
 andersson.51.t: "타웅 아이"
 andersson.51.d: "The Australian Raymond Dart made an extraordinary discovery in Taung: the head of an ape-like child indicates an upright walk. The teeth and brain also appear pre-human. The Taung Child could be a 'missing link' between humans and other primates."
 andersson.51.f: "The Taung Child refers to the fossilized skull of a juvenile hominin discovered in 1924 by quarrymen at a lime works in Taung, South Africa, and later described by anatomist Raymond Dart. This specimen served as the type fossil for the species Australopithecus africanus, representing the first time the term 'Ape-man' was scientifically applied to a bipedal human ancestor found in Africa. Though initially met with skepticism by a scientific community convinced that humanity originated in Asia or Europe, the discovery eventually shifted the focus of paleoanthropology to Africa, dating the child to approximately 2.8 million years ago."
 andersson.101.t: "선사시대 동굴 발견"
 andersson.101.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName](은)는 원시인이나 인류의 조상의 유골이 있을 것으로 추정되는 동굴의 입구를 오랜 수색 끝에 발견해냈다."
 andersson.101.f: "선사시대 동굴은 인류학, 고고학적 환경을 알아낼 수 있을 뿐만 아니라 인류나 선인류의 화석을 발견할 수도 있다. 조사를 위해서는 인류학자가 탐사대장으로 나서 발견 사항들을 평가하여야 한다. 이러한 연구는 인류 기원의 규명 과정에 중요한 단서를 남길 수 있다."
 andersson.101.g: "이 동굴은 가급적 빨리 조사해 보는 것이 좋겠군."
 andersson.201.t: "원시 인류 탐색: 유형"
 andersson.201.d: "Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] has the excellent idea of launching a spectacular - or at least somewhat successful - search for human fossils within the territory of [GetPlayer.GetName]. All the available options are laid out on [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis] desk."
 andersson.201.f: "'Dear Gentlemen, I hereby invite you all to a general conversation about well-known and speculative hominid types. I hope many of you will attend. All name suggestions will be placed in a lottery drum and then selected at random. I'm counting on your creativity!'\n\nSigned: [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName]"
 andersson.201.g: "그만두겠다."
 andersson.201.h: "네오안트로푸스."
 andersson.201.i: "팔라에안트로푸스."
 andersson.201.j: "피테칸트로푸스."
 andersson.201.k: "오스트랄로피테쿠스."
 andersson.211.t: "Hominid Prospecting: Finished"
 andersson.211.d: "The anthropological research group has successfully completed its work and is now returning to [ROOT.GetCountry.GetCapital.GetCityHubName] with the results."
 andersson.211.f: "'I hope we've all learned something, gentlemen! The origin of humankind remains a mystery, but it's a mystery we've at least been able to shed some light on. Dr. Jackson has been able to draw conclusions about prehistoric dental hygiene from the wear patterns on teeth; Dr. Fittipaldi has put the discovered tools into context and identified nuances in ancient techniques; and Professor Schabernack finally knows why he shouldn't sit on stalagmites all the time!'\n\nRespectfully: [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName]"
 andersson.211.g: "An anthropological achievement."
 andersson.212.t: "Wonders in the Cave"
 andersson.212.d: "Our anthropologist has discovered a cave in [SCOPE.sState('andersson_cave_state_scope').GetName] with such overwhelming paintings that many researchers back home claim it must be a forgery - humans of this primitive stage are simply incapable of such things!"
 andersson.212.f: "'Continuing our investigation of the first gallery, precisely where the deposits containing bones and shells come to end, the observer will be amazed to find a large number of animal paintings on the cave ceiling. Of large size, these paintings seem to have been produced with black and red ochre and the majority depict animals that, from their humpbacked shape, would seem to be similar to bison, of which two are depicted complete and from the side, whilst others have no head and some are depicted in incomprehensible postures. We can also see an entire doe which is depicted very skillfully, and a head that seems to be that of a horse.' -MARCELINO SANZ DE SAUTUOLA"
 andersson.212.g: "The Sistine Chapel of the Stone Age!"
 andersson.221.t: "The [SCOPE.sState('andersson_cave_state_scope').GetMineHubName] Man"
 andersson.221.d: "Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] has made a sensational discovery! The fossils of an early human suggest a settlement dating back tens of thousands of years. It must be a completely unknown representative of Neoanthropus."
 andersson.221.f: "Neoanthropus is a historical taxonomic term utilized in 19th and early 20th-century anthropology to categorize anatomically modern humans as distinct from more 'primitive' fossil hominids. Within the linear evolutionary frameworks of the era, the term served to demarcate the final stage of human development, often used to contrast modern populations with the newly discovered 'Paleoanthropic' lineages. The classification primarily encompassed Homo sapiens, specifically focusing on Late Pleistocene finds such as Cro-Magnon man, who were viewed as the direct ancestors of contemporary Europeans. In the intellectual context of the 1800s, the concept of Neoanthropus was pivotal in establishing a chronological boundary between the 'antediluvian' extinct species, like Neanderthals, and the emergence of modern physical characteristics."
 andersson.221.g: "The [SCOPE.sState('andersson_cave_state_scope').GetMineHubName] Man? I like it."
 andersson.222.t: "The [SCOPE.sState('andersson_cave_state_scope').GetFarmHubName] Man"
 andersson.222.d: "The latest research by Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] has revealed a sensational result: apparently, a previously unknown play species of Palaeanthropus lived in the cave."
 andersson.222.f: "Palaeoanthropus is a legacy anthropological designation used in the 19th and early 20th centuries to classify middle-to-late Pleistocene hominids that exhibited more 'archaic' or 'primitive' traits than modern humans. In the developmental hierarchies of Victorian-era science, this category represented a crucial intermediate evolutionary stage, bridging the gap between the most ancient apelike ancestors and the eventual emergence of Neoanthropus. The term was most frequently applied to Neanderthals. For 19th-century researchers, the definition of Palaeoanthropus was central to the debate over whether these extinct forms were direct ancestors of modern humans or an evolutionary dead-end that had been superseded by superior lineages."
 andersson.222.g: "The [SCOPE.sState('andersson_cave_state_scope').GetFarmHubName] Man - sounds good!"
 andersson.223.t: "The [SCOPE.sState('andersson_cave_state_scope').GetCityHubName] Man"
 andersson.223.d: "The bones that Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] found during [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis] last excavation could be hundreds of thousands of years old. If this is true, then it is a Pithecanthropus, the likes of which we have never encountered before."
 andersson.223.f: "Pithecanthropus is a seminal taxonomic designation, literally meaning 'ape-man,' introduced by Ernst Haeckel and later applied by Eugène Dubois to his 1891 discovery of Java Man (Pithecanthropus erectus). In the landscape of 19th-century anthropology, the term represented the 'missing link' hypothesized to exist between non-human primates and the more advanced Palaeoanthropus or Neoanthropus lineages. The classification was initially based on fossil remains found in Indonesia, characterized by a low cranial vault and heavy brow ridges, which were seen as evidence of a transitional evolutionary stage. While modern taxonomy has reclassified these specimens as Homo erectus, the concept of Pithecanthropus was historically significant for providing the first physical evidence of human evolution occurring outside of Europe and within a much deeper chronological timeframe."
 andersson.223.g: "The [SCOPE.sState('andersson_cave_state_scope').GetCityHubName] ... ok."
 andersson.224.t: "The Australopithecus"
 andersson.224.d: "Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]'s latest find leaves [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHim] speechless. The fossils [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe] unearthed on [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis] last expedition must be at least a million years old, if not older. This Australopithecus - is it more ape or more human?"
 andersson.224.f: "Australopithecus is a genus of extinct hominids that gained scientific prominence following the 1924 discovery of the 'Taung Child,' serving as a definitive link between Miocene apes and the genus Homo. While the term was coined in the early 20th century by Raymond Dart, it fulfilled 19th-century evolutionary predictions by showcasing a creature that combined bipedal locomotion with a relatively small, ape-sized brain. For the field of paleoanthropology, the identification of Australopithecus shifted the perceived 'cradle of humankind' to Africa, fundamentally reorienting the search for human origins away from the previously favored European and Asian theaters."
 andersson.224.g: "I miss the good old days when we just put a random village and the word 'man' together."
 andersson.231.t: "Dead end?"
 andersson.231.d: "While exploring the anthropological site in [SCOPE.sState('andersson_cave_site').GetName], the team also had to contend with some rugged paths and narrow cave passages. As it turned out, the cave entrance was located in a completely different place than Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] had thought."
 andersson.231.f: "As it turns out, the cave entrance is not on a rocky outcrop, but almost 1,000 meters below. The team faces a long detour—or a very dangerous route—from the anthropological site."
 andersson.231.g: "The team will have to take a detour, whether they like it or not."
 andersson.231.h: "The doctor should risk taking the shortcut!"
 andersson.232.t: "Cave Drawings"
 andersson.232.d: "The [SCOPE.sState('andersson_cave_site').GetName] cave contains carvings and images that are thousands of years old. However, their meaning and background remain mysterious."
 andersson.232.f: "With the beginning of prehistoric archeology and anthropology, it was assumed, based on the theory of evolution, that people of earlier times did not know any abstract concepts. Artistic expression was therefore excluded. This belief led to the fact that when cave paintings were discovered - most famously in the example of Altamira - it was assumed that they must be fakes. It was only after more and more cave paintings appeared around 1900, particularly in southwestern France, that scientists came to the conclusion that they had to be authentic."
 andersson.232.g: "Our ancestors were not as primitive as we thought."
 andersson.233.t: "Fruitful studies"
 andersson.233.d: "In the last few months, [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] has deepened his studies. He has now cataloged numerous finds in the [SCOPE.sState('andersson_cave_site').GetName] cave and recorded the cave system for future generations."
 andersson.233.f: "How long humans had existed was not clear, even for long periods of the 19th century. At the beginning of the century, many scientists had already abandoned the idea that human history only consisted of a few thousand years; But when Boucher de Perthes cited much older stone tools in the 1840s as evidence that humans coexisted with extinct mammal species, it fell on deaf ears. Only the tireless collection and processing of prehistoric remains would soon complete the picture that humans had been walking the world for significantly longer than previously assumed."
 andersson.233.g: "This will be beneficial for him."
 andersson.233.h: "This will be beneficial for science."
 andersson.234.t: "Cave Accident"
 andersson.234.d: "An accident occurred during the exploration of the cave in [SCOPE.sState('andersson_cave_site').GetName]. An assistant fell with a pack donkey. There were only minor injuries, but the equipment needs to be replaced."
 andersson.234.f: "'Work with professionals for once!'"
 andersson.234.g: "Oh no!"
 andersson.236.t: "Cave Maze"
 andersson.236.d: "The collection of bones and prehistoric remains, Dr. [SCOPE.sCharacter('andersson_anthropologist_scope').GetLastName] reports, is being delayed. Several significant discoveries are postponing the transition to bone identification. These are important, very important delays. In fact, there has been no correspondence between the team and the institute for weeks. This can only mean one thing."
 andersson.236.f: "They got completely lost."
 andersson.236.g: "Fools!"
 andersson.237.t: "Stone Age tools"
 andersson.237.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] found prehistoric stone tools in the cave that can provide information about the past."
 andersson.237.f: "In the 19th century, anthropology referred to a science that dealt primarily with the prehistoric history of humanity - in addition to bone finds, this included weapons or tools from the so-called Stone Age, which at the time was less of a scientific term and more of an era perceived to be barbaric. It was dominated by the cliché of the primitive caveman and less by historical reality. Nevertheless, the search for more and more artifacts and remains from this period was an opportunity to differentiate this picture in future years and to establish a genuine prehistoric archeology."
 andersson.237.g: "Examine the tools."
 andersson.237.h: "They belong in a museum!"
 andersson.238.t: "Human Bones"
 andersson.238.d: "Our anthropologist found additional bones during his cave exploration."
 andersson.238.f: "The general opinion is that the 19th and early 20th centuries contained only a few human fossil finds. That's only partly true. It was often the case that a number of early human bone finds were not recognized as such. Although the name Neanderthal comes from the location in the Neandertal, Neanderthal bones had already been found several times before. Even after its discovery, important scientists such as Rudolf Virchow questioned its authenticity and age. The problem was not the number of finds, but rather their verification as actual human remains from ancient times."
 andersson.238.g: "Yummy."
 andersson.239.t: "Assistant finds Fossils"
 andersson.239.d: "A student assistant played a crucial role in securing an anthropological find in the cave at [SCOPE.sState('andersson_cave_site').GetName]. However, [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] points out that as head of research he is responsible for the discovery."
 andersson.239.f: "'Do you remember the story of the clever young Athenian who hat the itch of notoriety? He sought the Oracle, and asked 'What shall I do to become a great man?' The Oracle answered: 'Slay one'!' - Richard Owen."
 andersson.239.g: "This discovery was made by the young anthropologist."
 andersson.239.h: "This discovery was made by our senior anthropologist."
 andersson.240.t: "Basket Lost"
 andersson.240.d: "A somewhat embarrassing incident delayed the start of bone identification."
 andersson.240.f: "When the research team had finished their collection and was exploring another area of the anthropological site, the lead researcher, Dr. [SCOPE.sCharacter('andersson_anthropologist_scope').GetLastName], realized somewhat too late that they had lost the bones and artifacts they had collected. They must have misplaced the expedition basket containing the anthropological objects found thus far. Weeks ago."
 andersson.240.g: "Every bone is valuable."
 andersson.240.h: "Hurry up!"
 andersson_conference_anthropologist_double_vote_tt: "Thanks to our experienced anthropologist, we have #G two times#! the voting power."
 andersson_conference_anthropologist_triple_vote_tt: "Thanks to our famous anthropologist, we have #G three times#! the voting power."
 andersson_cave_exploration_decrease_10_tt: "#V 탐사 진행도#! #R 10#! 상실"
 andersson_cave_exploration_decrease_20_tt: "#V 탐사 진행도#! #R 20#! 상실"
 andersson_cave_collection_decrease_10_tt: "#V 수집 진행도#! #R 10#! 상실"
 andersson_cave_collection_decrease_20_tt: "#V 수집 진행도#! #R 20#! 상실"
 andersson.301.a: "복원 유형 선택"
 andersson.301.d: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName] retreated to his bone collection with some fossils and meticulously arranged the finds according to their location and similarity. Apparently, the bones fit together to form a skeleton. But which one?"
 andersson.301.f: "'The head bone's connected to—the rib bone\nThe rib bone's connected to the—leg bone\nThe leg bone's connected to the—hip bone\nThe hip bone is connected to the—arm bone.\nThe arm bone is connected to the—head bone.\nThe head bone is connected to the—rib bone."
