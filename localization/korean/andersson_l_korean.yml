 andersson_neolithic_scenery_modifier: "The Neolithic Age"
 andersson_mesolithic_scenery_modifier: "The Mesolithic Age"
 andersson_upper_paleolithic_scenery_modifier: "The Upper Paleolithic Age"
 andersson.601.t_neolithic: "The Neolithic Age"
 andersson.601.t_mesolithic: "The Mesolithic Age"
 andersson.601.t_upper_paleolithic: "The Upper Paleolithic Age"
 andersson.601.d: "Dr. [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] has completed the preparations for the living depiction of life in prehistoric times. Not only students and professors, but also interested members of the public are viewing the sculptures to gain an impression of life in ancient times."
 andersson.601.f_neolithic: "The Neolithic period, or New Stone Age, represents a fundamental transformation in human existence characterized by the transition from nomadic foraging to sedentary farming. During this era, humans began the systematic domestication of plants and animals, which ensured a more reliable food supply. This shift facilitated the establishment of permanent settlements, as people constructed durable dwellings made of timber, stone, or mud-brick. The resulting food surpluses supported larger populations and allowed for the emergence of specialized labor, including pottery making and weaving. Technologically, this period is defined by the use of polished stone tools and the development of social hierarchies."
 andersson.601.f_mesolithic: "The Mesolithic, or Middle Stone Age, served as a transitional phase between the Paleolithic and the Neolithic eras. Beginning after the last Ice Age, this period was defined by a warming climate and the retreat of glaciers, which forced human groups to adapt to changing ecosystems. Unlike their ancestors, Mesolithic people utilized microliths—small, sophisticated flint blades used to create composite tools like barbed spears and arrows. While populations remained largely nomadic, the increased abundance of fish, forest game, and wild plants allowed for more seasonal stability and the use of temporary base camps."
 andersson.601.f_upper_paleolithic: "The Upper Paleolithic, or Late Stone Age, marks the final stage of the Paleolithic era and is defined by a significant explosion in human creativity and cognitive complexity. During this period, Homo sapiens developed highly specialized blade technology, crafting sophisticated tools from flint, bone, and antler. Humans lived as nomadic hunter-gatherers, following large migratory herds such as reindeer and mammoths across vast tundras. Beyond survival, this era is most notable for the birth of figurative art and symbolic expression. People created intricate cave paintings, elaborate personal ornaments, and the famous 'Venus' figurines, suggesting the development of complex language and spiritual beliefs."
 andersson.601.g: "Magnificent!"
 andersson.64.t: "클로비스 석기"
 andersson.64.d: "In Clovis, New Mexico, Dr. [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] has found the oldest traces of Native Americans to date - the spearheads are significantly older than anything else researchers have found on the continent."
 andersson.64.f: "The discovery of Clovis points in the early 20th century revolutionized American archaeology and anthropology. These distinctively shaped, fluted stone spearheads were first identified in the late 1920s and early 1930s near Clovis, New Mexico. The breakthrough occurred when these tools were found in direct association with the remains of extinct Pleistocene megafauna, specifically mammoths. For decades, this discovery served as the foundation for the 'Clovis First' model, asserting that these specialized hunters were the first humans to enter the continent approximately 13,000 years ago."
 andersson.64.g: "This means that humans lived in America for more than 10,000 years longer than previously thought!"
 andersson.65.t: "Dragon Man"
 andersson.65.d: "During the construction of a bridge in Harbin, a construction worker stumbled upon a peculiar skull. Dr. [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] was immediately notified and examined the skull. The initial diagnosis is astonishing: Was there another human species besides Neanderthals that lived in China?"
 andersson.65.f: "Discovered in Harbin, China, the fossil skull known as Dragon Man was named Homo longi. Though the cranium was originally found in 1933, it only reached scientific prominence in 2021. Dating back at least 146,000 years to the Middle Pleistocene, the skull exhibits a unique blend of primitive and derived features. Characterized by a massive braincase, thick brow ridges, and nearly square eye sockets, Homo longi was physically robust. Some researchers argue that this lineage is more closely related to modern humans (Homo sapiens) than even the Neanderthals are. Today, most researchers suggest that 'Dragon Man' belonged to the Denisovan population."
 andersson.65.g: "Dragon people? How dangerous were they?"
 andersson.66.t: "Homo floresiensis"
 andersson.66.d: "During a research trip to Flores, Dr. [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] made a discovery previously considered impossible - a fossil actually suggests that a separate, dwarf-like human species lived on the island!"
 andersson.66.f: "Discovered in 2003 in the Liang Bua cave on the island of Flores, Indonesia, Homo floresiensis is an extinct species of small-bodied hominin that lived until approximately 50,000 years ago. Standing only about 1.1 meters tall and possessing a brain size of roughly 400 cubic centimeters, the species earned the nickname 'the Hobbit.' Scientists believe its small stature was a result of insular dwarfism, an evolutionary process where isolated island species shrink due to limited resources. Despite their small brains, they used sophisticated stone tools and hunted pygmy elephants. Their exact place in the human family tree remains debated, with theories linking them to Homo erectus or even more primitive ancestors."
 andersson.66.g: "Did they live in caves, smoke herbs, and have hairy feet?"
 je_andersson_craniometry: "Craniometry"
 je_andersson_craniometry_reason: "Dr. [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] has devoted himself completely to measuring numerous skulls over several months, and we are fully convinced that this is perfectly normal, scientific behavior from which a completely crazy idea could never arise."
 je_andersson_craniometry_goal: "The anthropologist completed his craniometric studies after one year."
 andersson.701.t: "Skull Measurements Complete"
 andersson.701.d: "Dr. [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] relaxed sufficiently and spent months measuring, cataloging, recording, and comparing hundreds of heads, drawing conclusions for [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetHerHis] further anthropological work. That felt good!"
 andersson.701.f: "During the 19th century, craniometry—the scientific measurement of the skull—became a dominant method for categorizing human variation. Proponents, such as Samuel Morton and Paul Broca, believed that cranial capacity and shape were direct indicators of intelligence, moral character, and evolutionary status. The Cephalic Index, developed by Anders Retzius, was used to distinguish between 'primitive' and 'advanced' populations. While craniometry was misused for the legitimation of racial politics, numerous findings proved useful for the study of human fossils."
 andersson.701.g: "That was quite bizarre."
 andersson.711.t: "Monogenism vs. Polygenism"
 andersson.711.d: "Dr. [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] has repeatedly observed correlations in [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetHerHis] skull examinations that cannot be coincidental. Clearly, humans do not share the same origin."
 andersson.711.f: "The Monogenism vs. Polygenism debate was a central anthropological conflict in the 19th century regarding human origins. Monogenists argued for a single origin (human unity), typically citing the biblical Creation or later evolutionary common ancestry. They believed environmental factors caused physical variations between populations. In contrast, Polygenists asserted that human races belonged to distinct species with separate origins. This view was often supported by early craniometric data to claim 'fixed' biological hierarchies."
 andersson.711.g: "The craniometric examinations leave no doubt!"
 andersson.711.h: "[GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] must be mistaken; humanity clearly has only one origin."
 andersson.712.t: "Evolutionism vs. Diffusionism"
 andersson.712.d: "In examining skulls from ancient Egypt, Rome, and the Native Americans, Dr. [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] repeatedly asked [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetHerselfHimself] whether there are superior cultures from which every development spreads as centers of innovation, or whether it is rather the case that all cultures must go through the stages from barbarism to civilization - and that numerous populations are merely trapped at a Stone Age level?"
 andersson.712.f: "Evolutionists argued for unilineal evolution. They believed all societies progress through identical stages—from 'savagery' to 'civilization'—driven by a universal human psyche and independent invention. Conversely, Diffusionists contested this internal progression. They posited that significant cultural traits and technologies were rarely invented twice. Instead, they argued that ideas originated in specific 'cultural centers' and spread globally through migration, trade, or conquest."
 andersson.712.g: "Every culture goes through the transition from the Stone Age to modernity."
 andersson.712.h: "There is a culture from which progress spreads concentrically."
