 andersson_evolutionist: "Evolutionist"
 andersson_evolutionist_desc: "An evolutionist is an anthropologist explaining cultures through independent development."
 andersson_diffusionist: "전파론자"
 andersson_diffusionist_desc: "전파론자는 문화라는 것이 주로 여러 사회 간의 지식 전파를 통해 형성되어 왔다는 학설에 따르는 인류학자입니다."
 country_andersson_decorative_evolutionist_add: "동굴학으로 얻는 @andersson_human_fossil! [concept_andersson_human_fossil]"
 country_andersson_decorative_diffusionist_add: "동굴학으로 얻는 @andersson_prehistoric_artifact! [concept_andersson_prehistoric_artifact]"
 andersson.401.t: "Hunting camp"
 andersson.401.d: "During his speleological search, Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] came across a suspected hunting camp in [SCOPE.sState('andersson_state_scope').GetName], which he dates back to the Mesolithic period."
 andersson.401.f: "After a brief search, the anthropologist was able to secure numerous prehistoric artifacts. These included spears and arrowheads, as well as a hand axe that may date back to the Neolithic period. More detailed examinations will be carried out back at the university."
 andersson.401.g: "This will give us new insights into the past."
 andersson.402.t: "Ceramics"
 andersson.402.d: "Anthropologists and archaeologists were able to recover some ceramics in [SCOPE.sState('andersson_state_scope').GetName]. They will look good in the museum collection."
 andersson.402.f: "The vessels that the anthropologists have found could be described as primitive if one did not know that they are already several thousand years old. From this point of view, they seem downright sophisticated. Experts have already been entrusted with examining the pottery for paint residues."
 andersson.402.g: "Handle it carefully!"
 andersson.403.t: "Neolithic Village"
 andersson.403.d: "An anthropological team [SCOPE.sState('andersson_state_scope').GetName] reports good news: with a bit of luck, they have found the remains of a settlement from the Neolithic period. Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] was assured of numerous artifacts and new knowledge from this era."
 andersson.403.f: "As it turned out, the settlement already had a palisade-like enclosure, a well and stables could also be mapped, as well as a granary. This may be one of the first documented settlements in our country."
 andersson.403.g: "A scientific sensation!"
 andersson.404.t: "Human Bones"
 andersson.404.d: "Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] has found a couple of new bones."
 andersson.404.f: "Under Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]'s leadership, a team of anthropologists secured a burial site containing bones thousands of years old, including some exceptionally well-preserved pieces."
 andersson.404.g: "I hope it won't be another disappointment like the soup bones."
 andersson.406.t: "A Prehistoric Bone Flute"
 andersson.406.d: "A hiker stumbled over a weird bone in a cave in [SCOPE.sState('andersson_state_scope').GetName]. After contacting the local University, Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] was sent to the cave. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U] found a bone, but it was not just any bone, it was a prehistoric bone flute!"
 andersson.406.f: "\"The clear, high pitched whistle of a bone flute is an angel like sound that eerily casts a spell over everyone.\""
 andersson.406.g: "Can it still play music?"
 andersson.408.t: "Bones and Stone Tools recovered"
 andersson.408.d: "A large amount of stone tools and bones were unearthed in [SCOPE.sState('andersson_state_scope').GetName]. Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] was immediately sent to investigate. ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe] did infact find a lot of bones, seemingly bones of everything as well as some stone artifacts."
 andersson.408.f: "\"I think this is a bone of a deer. Or a human? Maybe a Dinosaur? A shark? A huge monkey? Bones really are not my area of expertice...\""
 andersson.408.g: "Wait! What kind of bones are those? Modern? Prehistoric? Dinosaurs?"
 andersson.409.t: "Prehistoric Venus discovered"
 andersson.409.d: "A prehistoric Figurine from the Stone Age was discovered in [SCOPE.sState('andersson_state_scope').GetStateRegion.GetMineHubName]. Many people do not like the look of it, as the little ivory Figurine seems to have big hips and breasts. Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] is not yet sure what the Figurine was meant for, was it a Goddess or just a talisman?"
 andersson.409.f: "The Venus figurines are small prehistoric female statuettes created during the Upper Paleolithic, especially in the Gravettien period (c. 30,000-22,000 BCE). Found across Europe and into Siberia, they are typically carved from stone, ivory, bone, or modeled in clay. Many depict exaggerated breasts, hips, and abdomen, while facial details are often absent. Famous examples include the Venus of Willendorf and the Venus of Dolní Věstonice. Their purpose remains debated; interpretations include fertility symbols, ritual objects, self-representations, or expressions of social identity. Venus figurines are considered important examples of early symbolic art."
 andersson.409.g: "She will become known as the Venus of [SCOPE.sState('andersson_state_scope').GetStateRegion.GetMineHubName]."
