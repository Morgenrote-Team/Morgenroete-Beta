l_korean:
 rule_andersson_anthropology_rule: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon!#! 인류학 설정"
 setting_andersson_anthropology_historical_rule: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_andersson_anthropology_historical_rule_desc 실제 역사#!#!"
 setting_andersson_anthropology_historical_rule_desc: "실제 역사의 해당 날짜에 도달하면 [Concept('concept_andersson_human_fossil','$MR_FOSSILS$')]이 발견됩니다. 인류 화석의 발견은 역사적 이벤트로 취급되어 인류학계 위신을 획득할 수 없습니다. 실제 역사의 날짜 이전에 어떤 국가에서 인류 화석을 발견한다면, 대체로 그것이 발견된 장소의 이름을 따서 명명됩니다."
 setting_andersson_anthropology_free_rule: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_andersson_anthropology_free_rule_desc 자유로움#!#!"
 setting_andersson_anthropology_free_rule_desc: "[concept_andersson_human_fossil] 발견과 관련하여 실제 역사에 기반한 특정 이벤트는 없게 됩니다. 모든 유골은 발견된 곳의 장소를 따서 명명됩니다."
 andersson_has_active_anthropologist_tt: "분주한 상태가 아닌 [concept_andersson_anthropologist] 보유"
 andersson.106.t: "인류학 조사단 출국"
 andersson.106.d: "인류학 조사단이 모든 조사를 마치고 조국으로 돌아갔다. 이들이 발견한 동굴도 우리 학자들에게 개방되었다."
 andersson.106.f: "\"이런 깊은 곳에 우리보다 먼저 발을 들인 사람은 아무도 없고, 우리가 어디로 가고 무엇을 보는지를 아는 사람도 없으며, 이토록 기묘하고 아름다운 광경이 우리 눈앞에 펼쳐진 적도 없었다. 그래서 우리는 서로에게 자연스럽게 질문을 던진다. 지금 우리가 꿈을 꾸는 것은 아닌가?\" - 찰스 라이엘"
 andersson.106.g: "외국의 지원은 쓸모있기 마련이었지."
 andersson_anthropologist_dies_tt: "[concept_andersson_anthropologist]가 사망하면 본 일지 항목은 실패로 돌아갑니다."
 je_andersson_reconstruct_prehistoric_skeleton: "선사시대 골격 복원"
 je_andersson_reconstruct_prehistoric_skeleton_reason: "Anthropologists reconstruct skeletons based on their experience and characteristics. The first skeleton of a human type—Neoanthropus, Palaeanthropus, Pithecanthropus, or Australopithecus—is additionally displayed at the institute and grants a prestige bonus. Anthropologists can also reconstruct all other skeletons of the various human types, thereby accumulating additional anthropological prestige."
