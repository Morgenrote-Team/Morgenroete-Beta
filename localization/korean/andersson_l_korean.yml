 andersson_speleologist: "동굴학자"
 andersson_speleologist_desc: "이 인류학자는 경험 많은 동굴 탐험가이며 동굴 조사를 더욱 빨리 수행할 수 있습니다."
 andersson_monogenist: "인류일원론자"
 andersson_monogenist_desc: "인류일원론자는 인류의 기원이 하나였다고 보는 인류학자입니다."
 andersson_polygenist: "인류다원론자"
 andersson_polygenist_desc: "인류다원론자는 여러 개체군의 인류가 독자적으로 진화해 왔다고 추정하는 인류학자입니다."
