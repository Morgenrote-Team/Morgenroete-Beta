 je_andersson_anthropological_research_reason: "[ROOT.GetCountry.GetCustom('je_andersson_anthropological_default_research_active_type')]An [concept_andersson_anthropologist] who is not busy will do Anthropological Research in their country. Sometimes they may find a [concept_andersson_cave]. Anthropologists who conduct cave explorations and excavations for extended periods can acquire the #V $dubois_paleontologist$#! or the #V $lepsius_archaeologist$#! [concept_character_trait]—but only one of the two. Every year of work will result in one @andersson_human_fossil! [concept_andersson_human_fossil].\n\n$mr_divider_for_je$\nAnthropologists may also find additional @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] or @andersson_prehistoric_artifact! [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')], depending on the following factors:\n[ROOT.GetCountry.GetCustom('je_andersson_anthropological_default_research_anthropologist_paleontologist_trait_type')][ROOT.GetCountry.GetCustom('je_andersson_anthropological_default_research_anthropologist_archaeologist_trait_type')][ROOT.GetCountry.GetCustom('je_andersson_anthropological_default_research_anthropologist_speleologist_trait_type')][ROOT.GetCountry.GetCustom('je_andersson_anthropological_default_research_cave_type')]"
 je_andersson_hominid_prospecting_neoanthropus: "원시 인류 탐색: 네오안트로푸스"
 je_andersson_hominid_prospecting_neoanthropus_reason: "#p 현재 [SCOPE.sState('target').GetName]에서 원시 인류 탐색이 진행되고 있습니다.#!\n$mr_divider_for_je$\n인류학자의 인류 화석 탐색은 탐사, 수집, 식별의 세 단계로 나뉩니다. 탐사 단계에서 인류학자는 적절한 인류학적 유적지를 찾아 해당 지역을 탐색합니다. 그 단계를 거치고 나면 화석 수집에 나섭니다. 화석을 충분히 발견했다면 식별 절차에 나섭니다. 탐사와 수집은 발견 이벤트로 마무리됩니다. 식별 절차에서 신규 원시 인류 종이 확인될 수도 있습니다.\n\n$mr_divider_for_je$\n[GetGeographicRegion('andersson_geographic_region_neoanthropus').GetName]는 전세계에서 찾아볼 수 있습니다. 이 범주에 속하는 종은 다음과 같습니다.\n- [GetGeographicRegion('andersson_geographic_region_vero').GetName]\n- [GetGeographicRegion('andersson_geographic_region_lagoa_santa').GetName]\n- [GetGeographicRegion('andersson_geographic_region_cro_magnon').GetName]\n- [GetGeographicRegion('andersson_geographic_region_boskop').GetName]\n- [GetGeographicRegion('andersson_geographic_region_tianyuan').GetName]\n- [GetGeographicRegion('andersson_geographic_region_talgai').GetName]"
 je_andersson_hominid_prospecting_palaeanthropus: "원시 인류 탐색: 팔라에안트로푸스"
 je_andersson_hominid_prospecting_palaeanthropus_reason: "#p 현재 [SCOPE.sState('target').GetName]에서 원시 인류 탐색이 진행되고 있습니다.#!\n$mr_divider_for_je$\n인류학자의 인류 화석 탐색은 탐사, 수집, 식별의 세 단계로 나뉩니다. 탐사 단계에서 인류학자는 적절한 인류학적 유적지를 찾아 해당 지역을 탐색합니다. 그 단계를 거치고 나면 화석 수집에 나섭니다. 화석을 충분히 발견했다면 식별 절차에 나섭니다. 탐사와 수집은 발견 이벤트로 마무리됩니다. 식별 절차에서 신규 원시 인류 종이 확인될 수도 있습니다.\n\n$mr_divider_for_je$\n[GetGeographicRegion('andersson_geographic_region_palaeanthropus').GetName]는 유럽과 근동 지역에서 발견됩니다. 이 범주에 속하는 종은 다음과 같습니다.\n- [GetGeographicRegion('andersson_geographic_region_neanderthal').GetName]\n- [GetGeographicRegion('andersson_geographic_region_gibraltar').GetName]\n- [GetGeographicRegion('andersson_geographic_region_spy').GetName]\n- [GetGeographicRegion('andersson_geographic_region_krapina').GetName]\n- [GetGeographicRegion('andersson_geographic_region_galilee').GetName]"
 je_andersson_hominid_prospecting_pithecanthropus: "원시 인류 탐색: 피테칸트로푸스"
