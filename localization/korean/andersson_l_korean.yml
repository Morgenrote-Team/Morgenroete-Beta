 andersson_add_paranthropus_fossil_effect_tt: "@andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_special_human_fossil$')] #G 1점#! 획득 (파란트로푸스)"
 andersson.202.a: "원시 인류 탐색: 목적지"
 andersson.202.d: "원시 인류 탐사는 고고학 탐사나 태평양 탐사만큼 모험적이지는 않을 수 있어도 나름 고된 도전이 될 수 있다. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] 박사는 인류 유골을 상세히 조사하기 위한 준비를 이미 마쳤다. 남은 것은 하나, 우리 탐사단이 수색에 나서야 할 지역은 어디일까?"
 andersson.202.f: "신사 여러분, 우리는 인류의 기원을 향한 흥미로운 여정을 시작합니다! 과학적 호기심과 열정적인 탐구심, 흔들림 없는 규율을 갖추시기를 기대하겠습니다.\n\n추신: 반려견은 집에 두고 오세요. 샤베르나크 교수님도 마찬가지입니다!\n\n서명: [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName]"
