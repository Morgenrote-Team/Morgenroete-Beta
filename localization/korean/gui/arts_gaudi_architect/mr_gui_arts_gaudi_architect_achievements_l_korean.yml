l_korean:
 MR_ARCHITECT_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'gaudi_architect_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'gaudi_architect_achievements_no_architect_loc')]"
 gaudi_architect_achievements_loc: "$gaudi_architect_achievements_intro_loc$[AddLocalizationIf( Scope.Var('gaudi_architecture_treatise_var').IsSet , Scope.Var('gaudi_architecture_treatise_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_study_trip_var').IsSet , Scope.Var('gaudi_architect_achievement_study_trip_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_urban_planning_var').IsSet , Scope.Var('gaudi_architect_achievement_urban_planning_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_capital_expansion_var').IsSet , Scope.Var('gaudi_architect_achievement_capital_expansion_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_art_deco_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_art_deco_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_neoclassical_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_neoclassical_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_bauhaus_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_bauhaus_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_custom_monument_var').IsSet , Scope.Var('gaudi_architect_achievement_custom_monument_var').GetFlagName)]"
 gaudi_architect_achievements_no_architect_loc: "이 #V [concept_gaudi_architect]의 업적#!은 하나라도 달성하면 이곳에 표시됩니다."
 gaudi_architect_achievements_intro_loc: "#V 이 건축가의 업적#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName](은)는 [Scope.GetCharacter.GetCustom('gaudi_architect_achievement_experience_type')]입니다. 건축 설계 경력을 시작한 이래 지금까지 총 [Scope.Var('gaudi_character_num_blueprints_var').GetValue|V0]점의 #V 설계도#!를 제작하였습니다.#!"
 gaudi_architect_achievement_study_trip_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] has #V undertaken an Architect Study Trip#!.#!"
 gaudi_architect_achievement_urban_planning_loc: "\n #indent_newline:3 • With [Scope.GetCharacter.GetHerHis] #V Urban Planning#! [Scope.GetCharacter.GetSheHe] helped to improve life in cities.#!"
 gaudi_architect_achievement_treatise_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis|U] #V Treatise on Architecture#! is considered a standard work.#!"
 gaudi_architect_achievement_custom_monument_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] is famous for having created the blueprint for a #V Unique Monument#! - an architectural masterpiece!#!"
 gaudi_architect_achievement_art_deco_splendour_loc: "\n #indent_newline:3 • One of the most outstanding achievements of [Scope.GetCharacter.GetHerHis] career was the complete #V Urban transformation in the Art Deco style#!.#!"
 gaudi_architect_achievement_neoclassical_splendour_loc: "\n #indent_newline:3 • One of the most outstanding achievements of [Scope.GetCharacter.GetHerHis] career was the complete #V Urban transformation in the Neoclassical style#!.#!"
 gaudi_architect_achievement_bauhaus_splendour_loc: "\n #indent_newline:3 • One of the most outstanding achievements of [Scope.GetCharacter.GetHerHis] career was the complete #V Urban transformation in the Bauhaus style#!.#!"
 gaudi_architect_achievement_capital_expansion_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] worked tirelessly on the development of a capital city.#!"