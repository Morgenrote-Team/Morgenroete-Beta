 MR_ARCHITECT_CAPITAL_EXPANSION_BUTTON: "수도 확장"
 MR_ARCHITECT_CAPITAL_EXPANSION_BUTTON_TT: "#T Capital Expansion#!\nNew architectural styles and new building technologies open up the possibility of developing our capital from a sleepy little town over a century into one of the most important metropolises of our time.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HISTORICIST_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a [concept_gaudi_architect] with the #V $gaudi_historicism_style$#!, #V $gaudi_bauhaus_style$#!, #V $gaudi_neoclassical_style$#!, or #V $gaudi_art_deco_style$#! [concept_character_trait].#!"
 MR_ARCHITECT_TREATISE_BUTTON: "건축 이론"
 MR_ARCHITECT_TREATISE_BUTTON_TT: "#T Architecture Treatise#!\nAn architect can summarize his theoretical ideas on architecture once in his life. His results can be surpassed by another architect if he is better. The result depends largely on experience. An architect working on a treatise is unavailable for a year.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_NO_TREATISE_TRIGGER_TT: "#default_text The architect has #R not#! yet written a treatise.#!"
