 ARCHITECTURAL_BLUEPRINTS_VAR_TT: "[GetPlayer.GetName]에서 보유한 [Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')]의 수는 [GetPlayer.MakeScope.GetVariable('gaudi_country_num_blueprints_var').GetValue|0+]장입니다."
 MR_ARCHITECT_VISIT_CAPITAL_BUTTON: "수도 방문"
 MR_ARCHITECT_VISIT_CAPITAL_BUTTON_TT: "#T 수도 방문#!\n 우리 수도는 조국의 훌륭한 건축을 감상할 수 있는 최고의 장소입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_VISIT_CAPITAL_BUTTON_TRIGGER_TT: "#default_text #r 수도는 추후 업데이트됩니다.#!#!"
