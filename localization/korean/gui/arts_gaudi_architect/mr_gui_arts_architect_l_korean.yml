 MR_ARCHITECT_INVITE_INDEPENDENT_ARCHITECT: "건축가 초청"
 MR_ARCHITECT_INVITE_INDEPENDENT_ARCHITECT_TT: "#T 이 건축가 초빙하기#!\n[concept_gaudi_architect] 초빙은 자국에서 충분히 좋은 건축가를 구할 수 없거나, 지금의 건축가가 마음에 들지 않을 경우 새로운 건축가를 영입하는 하나의 방법입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).AddScope('chosen_architect', Scope.GetCharacter.MakeScope ).End)]"
 MR_ARCHITECT_INVITE_INDEPENDENT_ARCHITECT_EFFECT_TT: "[SCOPE.sCharacter('chosen_architect').GetFullName](이)가 당신의 신임 [concept_gaudi_architect]로 임명됩니다.[GetPlayer.GetCustom('artists_replacement_architect_custom_type')]"
 MR_ARCHITECT_NOT_HIRED_INDEPENDENT_ARCHITECT_RECENTLY_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 최근에 [concept_gaudi_independent_architect]를 #n 채용하지 않음#! (남은 시간은 변화 요인 참고)#!"
 MR_ARCHITECT_WAS_NOT_RECENTLY_SENT_AWAY_TT: "#default_text 이 건축가는 지난 5년 사이에 [GetPlayer.GetNameNoFormatting]에서 임명 제의를 거절하였기 때문에 [GetPlayer.GetName]에서 초빙할 수 없습니다.#!"
 MR_ARTISTS_ARCHITECT_GENERAL_TAB: "일반 건축"
 MR_ARTISTS_ARCHITECT_BLUEPRINTS_TAB: "설계도"
