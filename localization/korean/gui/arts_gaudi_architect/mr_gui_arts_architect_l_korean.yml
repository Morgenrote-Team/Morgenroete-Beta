 MR_ARCHITECT_TREATISE_BUTTON: "Architecture Treatise"
 MR_ARCHITECT_TREATISE_BUTTON_TT: "#T Architecture Treatise#!\nAn architect can summarize his theoretical ideas on architecture once in his life. His results can be surpassed by another architect if he is better. The result depends largely on experience. An architect working on a treatise is unavailable for a year.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
