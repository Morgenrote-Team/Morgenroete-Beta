 MR_ARCHITECT_CAPITAL_EXPANSION_BUTTON_TT: "#T Capital Expansion#!\nNew architectural styles and new building technologies open up the possibility of developing our capital from a sleepy little town over a century into one of the most important metropolises of our time.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
