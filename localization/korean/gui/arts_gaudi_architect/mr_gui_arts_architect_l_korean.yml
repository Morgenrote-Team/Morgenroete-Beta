l_korean:
 MR_ARCHITECT_MODERN_SPLENDOUR_BUTTON: "근대의 장엄함"
 MR_ARCHITECT_MODERN_SPLENDOUR_BUTTON_TT: "#T 근대의 장엄함#!\n근대 건축 양식이 갖추어져 있다면, 우리 국가의 수도를 대담한 건축 실험이 살아 숨 쉬는 진정한 꿈의 도시로 탈바꿈시킬 수 있습니다. 아르데코 양식이 가장 권위 있는 것으로 여겨지지만, 그만큼 변모에는 더 오랜 시간이 걸릴 것입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_ACTIVE_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 #V 분주한 상태#!가 아닌 [concept_gaudi_architect]가 있음#!"
 MR_MODERN_ARCHITECTURE_SCHOOL_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V 바우하우스 건축#!이나 #V 신고전주의 건축#!, #V 아르데코 건축#! 중 한 가지의 변화 요인을 보유함#!"
 MR_ARCHITECT_BLUEPRINTS_MONUMENT_BUTTON: "설계도: 도시의 기념물"
 MR_ARCHITECT_BLUEPRINTS_MONUMENT_BUTTON_TT: "#T 설계도: 도시의 기념물#!\n건축가는 '기념물' 범주에 있는 [GetBuildingType('building_gaudi_statue').GetName], [GetBuildingType('building_gaudi_fountain').GetName], [GetBuildingType('building_gaudi_arch').GetName]의 세가지 설계도를 제작할 수 있습니다. 일부 설계도는 기술이 필요하며, 일부 건물은 해당 주에서 특별한 조건을 요구합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_MONUMENT_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_statue').GetName]은 [GetTechnology('elgar_classicism_tech').GetName] 연구가 필요합니다.\n[GetBuildingType('building_gaudi_fountain').GetName]에 필요한 기술은 없습니다.\n[GetBuildingType('building_gaudi_arch').GetName]은 [GetTechnology('napoleonic_warfare').GetName] 연구가 필요합니다.#!"
 MR_ARCHITECT_BLUEPRINTS_SQUARE_BUTTON: "설계도: 공공 광장"
 MR_ARCHITECT_BLUEPRINTS_SQUARE_BUTTON_TT: "#T 설계도: 공공 광장#!\n건축가는 '광장' 범주에 있는 [GetBuildingType('building_gaudi_park').GetName], [GetBuildingType('building_gaudi_luna').GetName], [GetBuildingType('building_gaudi_parade').GetName]의 세가지 설계도를 제작할 수 있습니다. 일부 설계도는 기술이 필요하며, 일부 건물은 해당 주에서 특별한 조건을 요구합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_SQUARE_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_park').GetName]에 필요한 기술은 없습니다.\n[GetBuildingType('building_gaudi_luna').GetName]은 [GetTechnology('curtiss_tourism_tech').GetName] 연구가 필요합니다.\n[GetBuildingType('building_gaudi_parade').GetName]은 [GetTechnology('nationalism').GetName] 연구가 필요합니다.#!"
 MR_ARCHITECT_BLUEPRINTS_SERVICE_BUTTON: "설계도: 공공사업 기관"
 MR_ARCHITECT_BLUEPRINTS_SERVICE_BUTTON_TT: "#T 설계도: 공공사업 기관#!\n건축가는 '공공사업' 범주에 있는 [GetBuildingType('building_gaudi_almshouse').GetName], [GetBuildingType('building_gaudi_school').GetName], [GetBuildingType('building_gaudi_prison').GetName]의 세가지 설계도를 제작할 수 있습니다. 일부 설계도는 기술이 필요하며, 일부 건물은 해당 주에서 특별한 조건을 요구합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_SERVICE_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_almshouse').GetName]는 [GetTechnology('egalitarianism').GetName] 연구가 필요합니다.\n[GetBuildingType('building_gaudi_school').GetName]는 [GetTechnology('empiricism').GetName] 연구가 필요합니다.\n[GetBuildingType('building_gaudi_prison').GetName]는 [GetTechnology('law_enforcement').GetName] 연구가 필요합니다.#!"
 MR_ARCHITECT_BLUEPRINTS_HEALTH_BUTTON: "설계도: 보건 시설"
 MR_ARCHITECT_BLUEPRINTS_HEALTH_BUTTON_TT: "#T 설계도: 보건 시설#!\n건축가는 '보건' 범주에 있는 [GetBuildingType('building_gaudi_canalization').GetName], [GetBuildingType('building_gaudi_hospital').GetName], [GetBuildingType('building_gaudi_health').GetName]의 세가지 설계도를 제작할 수 있습니다. 일부 설계도는 기술이 필요하며, 일부 건물은 해당 주에서 특별한 조건을 요구합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_HEALTH_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_canalization').GetName]는 [GetTechnology('modern_sewerage').GetName] 연구가 필요합니다.\n[GetBuildingType('building_gaudi_hospital').GetName]은 [GetTechnology('theiler_microbiology_tech').GetName] 연구가 필요합니다.\n[GetBuildingType('building_gaudi_health').GetName]은 [GetTechnology('pharmaceuticals').GetName] 연구가 필요합니다.#!"
 MR_ARCHITECT_BLUEPRINTS_ACADEMY_BUTTON: "설계도: 국립 학술 기관"
 MR_ARCHITECT_BLUEPRINTS_ACADEMY_BUTTON_TT: "#T 설계도: 국립 학술 기관#!\n건축가는 '학술 기관' 범주에 있는 [GetBuildingType('building_gaudi_science').GetName], [GetBuildingType('building_gaudi_arts').GetName], [GetBuildingType('building_gaudi_sports').GetName]의 세가지 설계도를 제작할 수 있습니다. 일부 설계도는 기술이 필요하며, 일부 건물은 해당 주에서 특별한 조건을 요구합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_ACADEMY_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_science').GetName]은 [GetTechnology('dialectics').GetName] 연구가 필요합니다.\n[GetBuildingType('building_gaudi_arts').GetName]은 [GetTechnology('romanticism').GetName] 연구가 필요합니다.\n[GetBuildingType('building_gaudi_sports').GetName]은 [GetTechnology('vikelas_international_sports_tech').GetName] 연구가 필요합니다.#!"
 mr_gui_has_urban_planning_tech_trigger_tt: "#default_text [GetPlayer.GetName]에서 [GetTechnology('urban_planning').GetName]을 연구함#!"
 MR_ARCHITECT_PUBLIC_CONSTRUCTION_BUTTON: "공공 건설"
 MR_ARCHITECT_PUBLIC_CONSTRUCTION_BUTTON_TT: "#T 공공 건설#!\n건축가는 본인의 건축 양식을 바탕으로 공공 건설을 추진하기 위하여 전국 차원의 건설 포인트를 부여해 줍니다. 5년 동안 업무를 지속하면 추가적인 명성을 누리게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_CUSTOM_MONUMENT_BLUEPRINT_BUTTON: "건축가의 걸작"
 MR_ARCHITECT_CUSTOM_MONUMENT_BLUEPRINT_BUTTON_TT: "#T 건축가의 걸작#!\n[concept_gaudi_great_architect]는 일생에 단 한 번, 근대 양식의 고유한 국립 기념물 설계도를 설계할 수 있습니다. 이 일생일대의 작업은 건축가의 이름을 후대에 남기고, 우리 나라에는 세계적인 건축 경이를 선사할 것입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MODERN_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V $gaudi_bauhaus_style$#!나 #V $gaudi_neoclassical_style$#!, #V $gaudi_art_deco_style$#! [concept_character_trait]을 지닌 [concept_gaudi_architect]를 보유함#!"
 MR_GREAT_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 [concept_gaudi_great_architect]가 있음#!"
 MR_ARCHITECT_URBAN_PLANNING_BUTTON: "도시 계획"
 MR_ARCHITECT_URBAN_PLANNING_BUTTON_TT: "#T 도시 계획#!\n건축가가 국가의 특정 도심 지역을 방문하여 미래지향적 도시 계획과 건축 규제로 그곳의 도시 환경을 현저히 개선시킬 수 있습니다.\n이를 통해 시간이 흐르면서 건물에 $gaudi_urban_building_throughput_add_modifier_with_tooltip$, $gaudi_urban_building_production_mult_modifier_with_tooltip$, $gaudi_urban_building_goods_input_mult_modifier_with_tooltip$의 총 세가지 변화 요인이 부여됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_URBAN_PLANNING_TRIGGER_TT: "#default_text 세가지 [Concept('concept_modifier','$concept_modifiers$')]을 전부 지니고 있지 않은 1단계 이상의 [GetBuildingType('building_urban_center').GetName]을 하나 이상 보유#!"
 MR_ARCHITECT_STUDY_TRIP_BUTTON: "건축 유학"
 MR_ARCHITECT_STUDY_TRIP_BUTTON_TT: "#T 건축 유학#!\n우리 건축가가 건축 분야에서 새로운 지식과 실력을 습득할 수 있도록 2년 동안 유학을 보냅니다. 이 기간 동안 건축가를 사용할 수 없게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_NO_TRIP_TRIGGER_TT: "#default_text 우리 건축가가 아직 유학을 떠난 경험이 #R 없음#!#!"
 mr_gui_has_modern_sewerage_tech_trigger_tt: "#default_text [GetPlayer.GetName]에서 [GetTechnology('modern_sewerage').GetName]를 연구함#!"
 mr_gui_has_steel_frame_buildings_tech_trigger_tt: "#default_text [GetPlayer.GetName]에서 [GetTechnology('steel_frame_buildings').GetName]을 연구함#!"
 mr_gui_has_elevator_tech_trigger_tt: "#default_text [GetPlayer.GetName]에서 [GetTechnology('elevator').GetName]를 연구함#!"
 mr_gui_has_art_deco_tech_trigger_tt: "#default_text [GetPlayer.GetName]에서 [GetTechnology('elgar_art_deco_tech').GetName]를 연구함#!"
 mr_gui_has_neoclassicism_tech_trigger_tt: "#default_text [GetPlayer.GetName]에서 [GetTechnology('elgar_neoclassicism_tech').GetName]를 연구함#!"
 mr_gui_has_new_objectivity_tech_trigger_tt: "#default_text [GetPlayer.GetName]에서 [GetTechnology('elgar_new_objectivity_tech').GetName]을 연구함#!"
 mr_gui_has_defense_in_depth_tech_trigger_tt: "#default_text [GetPlayer.GetName]에서 [GetTechnology('defense_in_depth').GetName]를 연구함#!"
 mr_gui_has_logistics_tech_trigger_tt: "#default_text [GetPlayer.GetName]에서 [GetTechnology('logistics').GetName]를 연구함#!"
 MR_ARCHITECT_CAPITAL_EXPANSION_BUTTON: "수도 확장"
 MR_ARCHITECT_CAPITAL_EXPANSION_BUTTON_TT: "#T 수도 확장#!\n새로운 건축 양식과 시공 기술 덕분에 한 세기 넘도록 조용한 작은 동네 불과했던 우리의 수도는 이 시대 가장 중요한 대도시로 발전할 수 있는 가능성이 열렸습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HISTORICIST_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V $gaudi_historicism_style$#!나 #V $gaudi_bauhaus_style$#!, #V $gaudi_neoclassical_style$#!, #V $gaudi_art_deco_style$#! [concept_character_trait]을 지닌 [concept_gaudi_architect]를 보유함#!"
 MR_ARCHITECT_TREATISE_BUTTON: "건축 이론"
 MR_ARCHITECT_TREATISE_BUTTON_TT: "#T 건축 이론#!\n건축가는 일생에 단 한번 건축에 관한 자신의 이론적 견해를 논문으로 정리할 수 있습니다. 이 때 정리된 이론이 다른 건축가의 것을 앞선다면 그것을 대체할 수 있습니다. 정리 결과는 경험치가 크게 좌우합니다. 이론을 정리중인 건축가는 1년 동안 사용할 수 없게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )] "
 MR_ARCHITECT_NO_TREATISE_TRIGGER_TT: "#default_text 건축가가 아직 건축 이론을 #R 작성하지 않음#!#!"
 MR_ARCHITECT_TREATISE_EXPERIENCE_TRIGGER_TT: "#default_text 건축가의 #V 명성#!이 #p 250#! 이상#!"
 MR_BETTER_TREATISE_TRIGGER_TT: "#default_text 건축가의 새로운 건축 이론이 기존의 이론을 #G 앞섬#!#!"
