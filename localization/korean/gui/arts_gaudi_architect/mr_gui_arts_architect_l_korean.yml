 MR_ARCHITECT_INDEPENDENT_ARCHITECT: "독립 건축가"
 MR_INDEPENDENT_ARCHITECT_NAME: "#tooltip:[Character.GetTooltipTag],gaudi_architect_rating_tt_loc [Character.GetCustom('gaudi_architect_rating_icon_type')]#! [Character.GetLastName]"
 MR_ARCHITECT_INDEPENDENT_ARCHITECT_EXPERIENCE_TOOLTIP: "[Character.GetFullName]의 명성은 [FixedPointToFloat(Character.MakeScope.GetVariable('gaudi_architect_experience').GetValue)|+0]입니다."
