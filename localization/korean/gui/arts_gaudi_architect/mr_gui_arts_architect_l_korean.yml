 MR_ARCHITECT_INDEPENDENT_ARCHITECT_EXPERIENCE_TOOLTIP: "[Character.GetFullName]의 명성은 [FixedPointToFloat(Character.MakeScope.GetVariable('gaudi_architect_experience').GetValue)|+0]입니다."
