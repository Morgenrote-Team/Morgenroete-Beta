 GUI_gaudi_architect_experience_normal_loc: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName](은)는 #V 명성#! [ROOT.Var('gaudi_architect_var').GetVariable('gaudi_architect_experience').GetValue|+0] / 500을 보유하고 있습니다.\n#V 명성 500#!에 도달하면 [concept_gaudi_great_architect][concept_character_trait]을 획득하게 됩니다."
 GUI_gaudi_architect_famous_loc: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName](은)는 사용할 수 있는 최대 #V 명성#! #p 500#!을 확보하고 있습니다.\n 이제 [concept_gaudi_great_architect][concept_character_trait]을 보유하게 되었습니다."
