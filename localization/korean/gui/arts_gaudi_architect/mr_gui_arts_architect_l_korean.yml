l_korean:
 MR_ARCHITECT_MODERN_SPLENDOUR_BUTTON: "근대의 장엄함"
 MR_ARCHITECT_MODERN_SPLENDOUR_BUTTON_TT: "#T 근대의 장엄함#!\n근대 건축 양식이 갖추어져 있다면, 우리 국가의 수도를 대담한 건축 실험이 살아 숨 쉬는 진정한 꿈의 도시로 탈바꿈시킬 수 있습니다. 아르데코 양식이 가장 권위 있는 것으로 여겨지지만, 그만큼 변모에는 더 오랜 시간이 걸릴 것입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_ACTIVE_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V 분주한 상태#!가 아닌 [concept_gaudi_architect]를 보유함#!"
 MR_MODERN_ARCHITECTURE_SCHOOL_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V 바우하우스 건축#!이나 #V 신고전주의 건축#!, #V 아르데코 건축#! 중 한 가지의 변화 요인을 보유함#!"
 MR_ARCHITECT_BLUEPRINTS_MONUMENT_BUTTON: "설계도: 도시의 기념물"
 MR_ARCHITECT_BLUEPRINTS_MONUMENT_BUTTON_TT: "#T 설계도: 도시의 기념물#!\n건축가는 '기념물' 범주에서 세 가지 가능한 설계도, 즉 [GetBuildingType('building_gaudi_statue').GetName], [GetBuildingType('building_gaudi_fountain').GetName], [GetBuildingType('building_gaudi_arch').GetName]를 설계할 수 있습니다. 일부 설계도는 기술이 필요하며, 일부 건물은 해당 주에서 특별한 조건을 요구합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_MONUMENT_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_statue').GetName] requires [GetTechnology('elgar_classicism_tech').GetName].\n[GetBuildingType('building_gaudi_fountain').GetName] has no requirements.\n[GetBuildingType('building_gaudi_arch').GetName] requires [GetTechnology('napoleonic_warfare').GetName].#!"
 MR_ARCHITECT_BLUEPRINTS_SQUARE_BUTTON: "설계도: 공공 광장"
 MR_ARCHITECT_BLUEPRINTS_SQUARE_BUTTON_TT: "#T Blueprints: Public Squares#!\nAn architect can develop three possible blueprints in the 'Squares' category: the [GetBuildingType('building_gaudi_park').GetName], the [GetBuildingType('building_gaudi_luna').GetName], and the [GetBuildingType('building_gaudi_parade').GetName]. Some blueprints require technologies; and some buildings have special requirements in their respective states.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_SQUARE_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_park').GetName] has no requirements.\n[GetBuildingType('building_gaudi_luna').GetName] requires [GetTechnology('curtiss_tourism_tech').GetName].\n[GetBuildingType('building_gaudi_parade').GetName] requires [GetTechnology('nationalism').GetName].#!"
 MR_ARCHITECT_BLUEPRINTS_SERVICE_BUTTON: "설계도: 공공사업 기관"
 MR_ARCHITECT_BLUEPRINTS_SERVICE_BUTTON_TT: "#T Blueprints: Service Buildings#!\nAn architect can develop three possible blueprints in the 'Service' category: the [GetBuildingType('building_gaudi_almshouse').GetName], the [GetBuildingType('building_gaudi_school').GetName], and the [GetBuildingType('building_gaudi_prison').GetName]. Some blueprints require technologies; and some buildings have special requirements in their respective states.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_SERVICE_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_almshouse').GetName] requires [GetTechnology('egalitarianism').GetName].\n[GetBuildingType('building_gaudi_school').GetName] requires [GetTechnology('empiricism').GetName].\n[GetBuildingType('building_gaudi_prison').GetName] requires [GetTechnology('law_enforcement').GetName].#!"
 MR_ARCHITECT_BLUEPRINTS_HEALTH_BUTTON: "설계도: 보건 시설"
 MR_ARCHITECT_BLUEPRINTS_HEALTH_BUTTON_TT: "#T Blueprints: Health Institutions#!\nAn architect can develop three possible blueprints in the 'Health' category: the [GetBuildingType('building_gaudi_canalization').GetName], the [GetBuildingType('building_gaudi_hospital').GetName], and the [GetBuildingType('building_gaudi_health').GetName]. Some blueprints require technologies; and some buildings have special requirements in their respective states.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_HEALTH_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_canalization').GetName] requires [GetTechnology('modern_sewerage').GetName].\n[GetBuildingType('building_gaudi_hospital').GetName] requires [GetTechnology('theiler_microbiology_tech').GetName].\n[GetBuildingType('building_gaudi_health').GetName] requires [GetTechnology('pharmaceuticals').GetName].#!"
 MR_ARCHITECT_BLUEPRINTS_ACADEMY_BUTTON: "설계도: 국립 학술 기관"
 MR_ARCHITECT_BLUEPRINTS_ACADEMY_BUTTON_TT: "#T Blueprints: National Academies#!\nAn architect can develop three possible blueprints in the 'Academies' category: the [GetBuildingType('building_gaudi_science').GetName], the [GetBuildingType('building_gaudi_arts').GetName], and the [GetBuildingType('building_gaudi_sports').GetName]. Some blueprints require technologies; and some buildings have special requirements in their respective states.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_ACADEMY_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_science').GetName] requires [GetTechnology('dialectics').GetName].\n[GetBuildingType('building_gaudi_arts').GetName] requires [GetTechnology('romanticism').GetName].\n[GetBuildingType('building_gaudi_sports').GetName] requires [GetTechnology('vikelas_international_sports_tech').GetName].#!"
 mr_gui_has_urban_planning_tech_trigger_tt: "#default_text [GetPlayer.GetName] has researched [GetTechnology('urban_planning').GetName].#!"
 MR_ARCHITECT_PUBLIC_CONSTRUCTION_BUTTON: "공공 건설"
 MR_ARCHITECT_PUBLIC_CONSTRUCTION_BUTTON_TT: "#T Public Construction#!\nBased on their architectural style, an architect can contribute construction points at the national level to advance public construction. After five years of continuous work, they receive a reputation boost.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_CUSTOM_MONUMENT_BLUEPRINT_BUTTON: "건축가의 걸작"
 MR_ARCHITECT_CUSTOM_MONUMENT_BLUEPRINT_BUTTON_TT: "#T 건축가의 걸작#!\n[concept_gaudi_great_architect]는 일생에 단 한 번, 근대 양식의 고유한 국립 기념물 설계도를 설계할 수 있습니다. 이 일생일대의 작업은 건축가의 이름을 후대에 남기고, 우리 나라에는 세계적인 건축 경이를 선사할 것입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MODERN_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a [concept_gaudi_architect] with the #V $gaudi_bauhaus_style$#!, #V $gaudi_neoclassical_style$#!, or #V $gaudi_art_deco_style$#! [concept_character_trait].#!"
 MR_GREAT_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a [concept_gaudi_great_architect].#!"
 MR_ARCHITECT_URBAN_PLANNING_BUTTON: "도시 계획"
 MR_ARCHITECT_URBAN_PLANNING_BUTTON_TT: "#T Urban Planning#!\nArchitects can visit a nation's city centers and significantly improve conditions there through forward-looking planning and building regulations.\nThis will add three modifiers to your building over time: $gaudi_urban_building_throughput_add_modifier_with_tooltip$, $gaudi_urban_building_production_mult_modifier_with_tooltip$ and $gaudi_urban_building_goods_input_mult_modifier_with_tooltip$.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_URBAN_PLANNING_TRIGGER_TT: "#default_text At least one [GetBuildingType('building_urban_center').GetName] Building of level 1 or higher does not have all three [Concept('concept_modifier','$concept_modifiers$')].#!"
 MR_ARCHITECT_STUDY_TRIP_BUTTON: "건축가 연수 여행"
 MR_ARCHITECT_STUDY_TRIP_BUTTON_TT: "#T Architect Study Trip#!\nSend your architect away for two years to gain new knowledge and skills in architectural matters. The architect will be unavailable during this period.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_NO_TRIP_TRIGGER_TT: "#default_text Our architect has #R not yet undertaken#! any study trips.#!"
