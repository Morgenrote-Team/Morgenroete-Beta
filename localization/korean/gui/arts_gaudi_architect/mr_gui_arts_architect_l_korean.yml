 MR_BETTER_TREATISE_TRIGGER_TT: "#default_text The architect's potential treatise is #G better#! than the last treatise.#!"
 MR_HAS_ARCHITECTURE_SCHOOL_TT: "#default_text [GetPlayer.GetName] has a #V $pm_artists_arts_academy_school$#! in an [GetBuildingType('building_art_academy').GetName].#!"
