 THEILER_NUM_DISEASE_PATHOGENS_VAR_TT: "#header 질병의 병원체#!\n[GetPlayer.GetName]에서 발견한 @theiler_pathogens_texticon![Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')]는 전체 10종 가운데 [GetPlayer.MakeScope.Var('theiler_num_disease_pathogens_var').GetValue|V0]종에 달합니다.\n\n각 [Concept('concept_panum_disease','$concept_panum_diseases$')]의 병원체 파악 현황은 다음과 같습니다.\n[GetPlayer.GetCustom('theiler_cholera_pathogen_type')] #V 콜레라#!\n[GetPlayer.GetCustom('theiler_diphtheria_pathogen_type')] #V 디프테리아#!\n[GetPlayer.GetCustom('theiler_measles_pathogen_type')] #V 홍역#!\n[GetPlayer.GetCustom('theiler_plague_pathogen_type')] #V 페스트#!\n[GetPlayer.GetCustom('theiler_polio_pathogen_type')] #V 소아마비#!\n[GetPlayer.GetCustom('theiler_scarlet_pathogen_type')] #V 성홍열#!\n[GetPlayer.GetCustom('theiler_smallpox_pathogen_type')] #V 천연두#!\n[GetPlayer.GetCustom('theiler_tuberculosis_pathogen_type')] #V 결핵#!\n[GetPlayer.GetCustom('theiler_typhus_pathogen_type')] #V 발진티푸스#!\n[GetPlayer.GetCustom('theiler_yellow_fever_pathogen_type')] #V 황열병#!"
 mr_checkmark_loc: "@green_checkmark!"
 mr_simple_checkbox_loc: "@simple_box!"
 THEILER_NUM_DISEASE_VACCINES_VAR: "@theiler_vaccines_texticon! [GetPlayer.MakeScope.Var('theiler_num_disease_vaccines_var').GetValue|V0] / 9"
 THEILER_NUM_DISEASE_VACCINES_VAR_TT: "#header 질병의 백신#!\n[GetPlayer.GetName]에서 개발한 @theiler_vaccines_texticon![Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]은 전체 9종 가운데 [GetPlayer.MakeScope.Var('theiler_num_disease_vaccines_var').GetValue|V0]종에 달합니다.\n\n각 [Concept('concept_panum_disease','$concept_panum_diseases$')]의 백신 개발 현황은 다음과 같습니다.\n[GetPlayer.GetCustom('theiler_cholera_vaccine_type')] #V 콜레라#!\n[GetPlayer.GetCustom('theiler_diphtheria_vaccine_type')] #V 디프테리아#!\n[GetPlayer.GetCustom('theiler_measles_vaccine_type')] #V 홍역#!\n[GetPlayer.GetCustom('theiler_plague_vaccine_type')] #V 페스트#!\n[GetPlayer.GetCustom('theiler_polio_vaccine_type')] #V 소아마비#!\n[GetPlayer.GetCustom('theiler_smallpox_vaccine_type')] #V 천연두#!\n[GetPlayer.GetCustom('theiler_tuberculosis_vaccine_type')] #V 결핵#!\n[GetPlayer.GetCustom('theiler_typhus_vaccine_type')] #V 발진티푸스#!\n[GetPlayer.GetCustom('theiler_yellow_fever_vaccine_type')] #V 황열병#!"
 THEILER_BIOLOGIST_PHARMACEUTICALS_VAR: "@theiler_pharmaceuticals_texticon!  [GetPlayer.MakeScope.Var('theiler_num_pharmaceuticals_var').GetValue|*V0] / 10"
 THEILER_BIOLOGIST_PHARMACEUTICALS_VAR_TT: "#header 제약#!\n[GetPlayer.GetName]에서 개발한 @theiler_pharmaceuticals_texticon!#V 제약#!은 전체 10종 가운데 [GetPlayer.MakeScope.GetVariable('theiler_num_pharmaceuticals_var').GetValue|V0]종에 달합니다.\n\n각 #V 제약#! 개발 현황은 다음과 같습니다.\n[GetPlayer.GetCustom('theiler_pharmaceutical_aloin_type')] #V 알로인#!\n[GetPlayer.GetCustom('theiler_pharmaceutical_atropine_type')] #V 아트로핀#!\n[GetPlayer.GetCustom('theiler_pharmaceutical_digitoxin_type')] #V 디기톡신#!\n[GetPlayer.GetCustom('theiler_pharmaceutical_emetine_type')] #V 에메틴#!\n[GetPlayer.GetCustom('theiler_pharmaceutical_ephedrine_type')] #V 에페드린#!\n[GetPlayer.GetCustom('theiler_pharmaceutical_pilocarpine_type')] #V 필로카르핀#!\n[GetPlayer.GetCustom('theiler_pharmaceutical_quinine_type')] #V 퀴닌#!\n[GetPlayer.GetCustom('theiler_pharmaceutical_strophantine_type')] #V 스트로판틴#!\n[GetPlayer.GetCustom('theiler_pharmaceutical_strychnine_type')] #V 스트리크닌#!\n[GetPlayer.GetCustom('theiler_pharmaceutical_thymol_type')] #V 티몰#!"
 THEILER_BIOLOGIST_MICROORGANISMS_VAR: "@theiler_microorganisms_texticon!  [GetPlayer.MakeScope.Var('theiler_microorganisms_var').GetValue|*V0]"
 THEILER_BIOLOGIST_MICROORGANISMS_VAR_TT: "#header [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]#!\n[GetPlayer.GetName]에서 수집한 [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')] 수는 @theiler_microorganisms_texticon! [GetPlayer.MakeScope.GetVariable('theiler_microorganisms_var').GetValue|V0]마리입니다."
 THEILER_MICROSCOPE_VAR: "@theiler_microscope_texticon! #underline [GetPlayer.MakeScope.Var('theiler_microscope_var').GetFlagName]#!"
 THEILER_MICROSCOPE_VAR_TT: "[GetPlayer.GetCustom('theiler_gui_current_microscope_tooltip_type')]"
 theiler_gui_current_microscope_compound_tooltip_loc: "우리 생물학자는 현재 $theiler_early_compound_microscope_flag$을 사용하고 있습니다.\n\n[GetTechnology('theiler_microbiology_tech').GetName]을 연구했다면 $theiler_achromatic_microscope_flag$의 개발에 나설 수 있습니다. [concept_tesla_engineer]와 [concept_theiler_biologist]가 동시에 필요하며, #V 12개월#!의 시간을 거쳐 현미경 개발을 마무리하게 됩니다. 또한 [GetBuildingType('building_glassworks').GetName] 건물 단계 #V 3단계#!가 필요합니다."
 theiler_gui_current_microscope_achromatic_tooltip_loc: "우리 생물학자는 현재 $theiler_achromatic_microscope_flag$을 사용하고 있습니다.\n\n[GetTechnology('verrier_nuclear_physics_tech').GetName]을 연구했다면 $theiler_electron_microscope_flag$의 개발에 나설 수 있습니다. [concept_tesla_engineer]와 [concept_theiler_biologist]가 동시에 필요하며, #V 12개월#!의 시간을 거쳐 현미경 개발을 마무리하게 됩니다. 또한 [GetBuildingType('building_glassworks').GetName] 건물 단계 #V 5단계#!가 필요합니다."
 theiler_gui_current_microscope_electron_tooltip_loc: "우리 생물학자는 현재 $theiler_electron_microscope_flag$을 사용하고 있습니다.\n\n가장 발전된 단계의 현미경입니다."
 MR_AUTOMATE_BIOLOGIST_TT: "#T [concept_theiler_biologist] 자동화#!\n자동화를 설정하면 더 이상 생물학자에게 업무를 지시할 필요가 없습니다.\n그들은 알아서 작업하고 그때마다 알맞은 업무를 수행할 것입니다. 다만 일부 이벤트는 여전히 수신하게 됩니다."
 mr_biologist_automation_gui_tt: "[concept_theiler_biologist]의 업무 자동화를 시작합니다."
 mr_stop_biologist_automation_gui_tt: "[concept_theiler_biologist]의 업무 자동화를 중지합니다."
 MR_STOP_AUTOMATE_BIOLOGIST_TT: "#T [concept_theiler_biologist]의 자동화 중지#!\n생물학자는 더 이상 알아서 활동하지 않게 됩니다."
