l_korean:
 MR_BIOLOGIST_MICROORGANISM_RESEARCH_BUTTON: "미생물 연구"
 MR_BIOLOGIST_MICROORGANISM_RESEARCH_BUTTON_TT: "#T 미생물 연구#!\n새로운 [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]를 탐색하고, 그것을 연구하며, 연계 실험에 나서는 것은 미생물학 탐구의 필수 요건입니다. 생물학자는 병원체를 탐색하는 예비 연구에 나서는 것은 물론, 뜻밖의 발견을 이룩할 수도 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_MICROORGANISM_RESEARCH_ACTIVE_TT: "#T 미생물 연구#!\n현재 [concept_theiler_biologist]가 새로운 [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]의 탐색과 연구, 연계 실험을 진행하고 있습니다. 생물학자는 병원체를 탐색하는 예비 연구에 나서는 것은 물론, 뜻밖의 발견을 이룩할 수도 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_FIND_PATHOGEN_BUTTON: "병원체 탐색"
 MR_BIOLOGIST_FIND_PATHOGEN_BUTTON_TT: "#T 병원체 탐색#!\n[concept_theiler_pathogen] 탐색은 연이은 백신 개발의 선제 조건에 해당됩니다. 병원체에 따라 탐색 과정이 더 오래 걸리거나, 특정 조건을 갖춰야 시작할 수 있는 경우도 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_FIND_PATHOGEN_ACTIVE_TT: "#T 병원체 탐색#!\n현재 [concept_theiler_biologist]가 연이은 백신 개발의 선제 조건으로서 [concept_theiler_pathogen] 탐색을 진행하고 있습니다. 병원체에 따라 탐색 과정이 더 오래 걸리거나, 특정 조건을 갖춰야 시작할 수 있는 경우도 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACTIVE_BIOLOGIST_TRIGGER: "#default_text [GetPlayer.GetName]에 #V 분주한 상태#!가 아닌 [concept_theiler_biologist]가 있음#!"
 MR_BIOLOGIST_CAN_FIND_PATHOGEN_TRIGGER_TT: "#default_text 다음 중 하나:[GetPlayer.GetCustom('GUI_theiler_can_find_cholera_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_diphtheria_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_measles_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_plague_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_polio_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_typhus_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_scarlet_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_smallpox_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_tuberculosis_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_yellow_fever_trigger_custom_loc')]#!"
 MR_BIOLOGIST_CREATE_VACCINE_BUTTON: "백신 개발"
 MR_BIOLOGIST_CREATE_VACCINE_BUTTON_TT: "#T 백신 개발#!\n현재 [concept_theiler_biologist]가 백신 개발을 진행하고 있습니다. 백신 개발로 생물학자의 역할은 정점에 달합니다. 개발을 위해서는 특정 질병을 유발하는 [concept_theiler_pathogen]를 먼저 연구해야 합니다. 적절한 여건이 갖춰진다면 [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]은 질병의 유행을 완전히 예방할 수 있게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_CREATE_VACCINE_ACTIVE_TT: "#T 백신 개발#!\n백신 개발로 생물학자의 역할은 정점에 달합니다. 개발을 위해서는 특정 질병을 유발하는 [concept_theiler_pathogen]를 먼저 연구해야 합니다. 적절한 여건이 갖춰진다면 [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]은 질병의 유행을 완전히 예방할 수 있게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_CAN_CREATE_VACCINE_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 병원체를 발견했지만 아직 백신이 없는 동시에, 그에 알맞은 기술을 보유하고 있음#!"
 MR_10000_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 보유한 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]의 수가 #V 10000점 이상#! (현재 [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+])#!"
 MR_BOTANICAL_EXPEDITION_BUTTON_TT: "#T Botanical Expedition#!\nBotanical expeditions (sometimes called 'Plant hunting') are scientific voyages designed to explore the flora of a particular region. A [concept_dubois_naturalist] would be responsible for identification, description and collection of specimens and [concept_ito_medicinal_plants].\n\nNote that you need the [GetTechnology('malaria_prevention').GetName] [concept_technology] if you want to conduct a Botanical Expedition in a State with Malaria.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SAFARI_EXPEDITION_BANNED_TRIGGER_TT: "#default_text 식물 탐사가 #V 정치적인 사정#!으로 금지됨#!"
 MR_SAFARI_EXPEDITION_ACCESS_RAINFOREST_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 [concept_ito_medicinal_plants] 주 특성을 지닌 주가 있음. 해당 주에 #V 말라리아 특성#!이 있다면 [GetTechnology('malaria_prevention').GetName] [concept_technology]이 추가로 필요합니다.#!"
 MR_BOTANICAL_EXPEDITION_RECALL_BUTTON_TT: "#T Recall Naturalist from Botanical Expedition#!\nOrders the [concept_dubois_naturalist] back from his botanical research to use it for other purposes - such as capturing animals.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BOTANICAL_EXPEDITION_RECALL_TRIGGER_TT: "#default_text [concept_dubois_naturalist]가 #V 여행 중에 있거나 아픈 상태가 아님#!#!"
 MR_BOTANICAL_EXPEDITION_RECALL_NATURALIST_EFFECT_TT: "[concept_dubois_naturalist]가 더 이상 분주한 상태가 아니게 됩니다."
 MR_BIOLOGIST_COCHLIOMYIA_EREDICATION_BUTTON: "나선벌레 박멸"
 MR_BIOLOGIST_COCHLIOMYIA_EREDICATION_BUTTON_TT: "#T 나선벌레 박멸#!\n기술력의 드넓은 가능성에 힘입은 생물학자는 정부 지원을 받아 성가신 나선벌레파리들을 완전히 박멸하는 방법을 연구할 수 있습니다. 이것으로 해충의 영향을 받는 지역의 농업 산출량을 향상시키게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_COCHLIOMYIA_STATE_TRIGGER: "#default_text [GetPlayer.GetName]에 #V $theiler_state_trait_cochliomyia$#! [Concept('concept_modifier','$concept_modifiers$')]을 지닌 주가 하나 이상 존재함#!"
 MR_BIOLOGIST_STI_BUTTON: "불임충방사법"
 MR_BIOLOGIST_STI_BUTTON_TT: "#T 불임충방사법#!\n생물학자는 나선벌레파리가 들끓는 주를 찾아가 3년 간의 실험을 거쳐 유충 박멸 시도에 나설 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_CYDIA_PESTICIDE_BUTTON: "나방 살충제"
 MR_BIOLOGIST_CYDIA_PESTICIDE_BUTTON_TT: "#T 나방 살충제#!\n생물학자는 사과굴나방로 인한 작물 손실로 우리나라 과수업자들이 겪는 시름을 덜기 위해 효과적인 살충제를 개발할 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CYDIA_STATE_TRIGGER: "#default_text [GetPlayer.GetName]에 #V $theiler_state_trait_cydia$#! [Concept('concept_modifier','$concept_modifiers$')]을 지닌 주가 하나 이상 존재함#!"
 MR_BIOLOGIST_IMPROVE_AGRICULTURE_BUTTON: "농업 개량"
 MR_BIOLOGIST_IMPROVE_AGRICULTURE_BUTTON_TT: "#T Improve Agriculture#!\nYour Biologist can use their skill to improve agricultural buildings in your country. This will improve one of your [GetBuildingGroup('bg_agriculture').GetName], [GetBuildingGroup('bg_ranching').GetName] or [GetBuildingGroup('bg_plantations').GetName]-Buildings.\n\nModifiers that the building will gain:\n$theiler_building_throughput_add_modifier_with_tooltip$\n$theiler_building_production_mult_modifier_with_tooltip$\n$theiler_building_goods_input_mult_modifier_with_tooltip$\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_IMPROVE_AGRICULTURE_TRIGGER_TT: "#default_text 세가지 [Concept('concept_modifier','$concept_modifiers$')]을 전부 지니지 않은 1단계 이상의 [GetBuildingGroup('bg_agriculture').GetName]나 [GetBuildingGroup('bg_ranching').GetName], [GetBuildingGroup('bg_plantations').GetName]을 하나 이상 보유#!"
 MR_BIOLOGIST_IMPROVE_AGRICULTURE_ACTIVE_TT: "#T Improve Agriculture#!\n#p Your Biologist is currently improving an [GetBuildingGroup('bg_agriculture').GetName], [GetBuildingGroup('bg_ranching').GetName] or [GetBuildingGroup('bg_plantations').GetName]-Buildings.#!"
 MR_ACHROMATIC_MICROSCOPE_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 최소 #V 색지움 현미경#! 단계를 사용함#!"
