 MR_BIOLOGIST_CAN_FIND_CHOLERA_PATHOGEN_TT: "\n#default_text #indent_newline:3 #V 콜레라:#!#!#indent_newline:6 \n[GetPlayer.GetCustom('GUI_theiler_can_find_cholera_has_description_trigger_custom_loc')] \n[GetPlayer.GetCustom('GUI_theiler_can_find_pathogen_has_achromatic_microscope_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_cholera_has_microorganisms_trigger_custom_loc')]#!"
