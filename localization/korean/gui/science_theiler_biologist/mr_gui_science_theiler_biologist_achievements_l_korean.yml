 theiler_biologist_no_biologist_achievements_loc: "이 #V [concept_theiler_biologist]의 업적#!은 하나라도 달성하면 이곳에 표시됩니다."
 theiler_biologist_achievements_intro_loc: "#V 이 생물학자의 업적#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName](은)는 성공한 생물학자입니다.#!"
 theiler_microbiology_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 현대 미생물학의 창시자로 평가됩니다.#!"
 theiler_cholera_pathogen_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 콜레라를 유발하는 박테리아를 처음으로 발견하고 기술하여 분리해냈습니다.#!"
 theiler_tuberculosis_pathogen_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 결핵의 병원체를 처음 발견하고 기술하여 분리해냈습니다.#!"
 theiler_smallpox_pathogen_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 천연두를 유발하는 미생물을 처음 발견하고 기술하여 분리해냈습니다.#!"
 theiler_typhus_pathogen_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 발진티푸스의 유발 요인을 처음 확인하고 기술하여 분리해냈습니다.#!"
 theiler_yellow_fever_pathogen_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 황열병의 병원체를 발견하고 기술하여 분리해낸 선구적인 학자입니다.#!"
 theiler_measles_pathogen_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 홍역의 병원체를 처음 발견하고 기술하여 분리해냈습니다.#!"
 theiler_scarlet_pathogen_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 성홍열을 일으키는 병원체를 처음 발견하고, 기록하여 분리한 최초의 인물입니다.#!"
 theiler_plague_pathogen_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 페스트의 병원체를 처음 발견하여, 기록하고 분리하였습니다.#!"
 theiler_diphteria_pathogen_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 디프테리아를 유발하는 미생물을 처음 확인한 데 이어 기록과 분리도 이루어냈습니다.#!"
 theiler_polio_pathogen_achievement_loc: "\n #indent_newline:3 • 소아마비 병원체의 발견과 기록, 분리는 [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 처음으로 이룩하였습니다.#!"
 theiler_cholera_vaccine_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 효과적인 콜레라 백신의 개발과 시험, 생산을 주도한 인물입니다.#!"
 theiler_tuberculosis_vaccine_achievement_loc: "\n #indent_newline:3 • 결핵 백신을 처음 제조하고 시험하며 생산까지 성공한 학자는 [Scope.GetCharacter.GetLastNameNoFormatting] 박사입니다.#!"
 theiler_smallpox_vaccine_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 천연두에 약효가 있는 백신의 연구와 시험, 생산을 처음으로 이뤄냈습니다.#!"
 theiler_typhus_vaccine_achievement_loc: "\n #indent_newline:3 • 발진티푸스 예방에 효과가 있는 백신을 처음 개발하고 시험하며 생산한 사람은 [Scope.GetCharacter.GetLastNameNoFormatting] 박사입니다.#!"
 theiler_yellow_fever_vaccine_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 황열병 백신의 제조, 시험, 생산 시도를 처음으로 성공한 인물입니다.#!"
 theiler_measles_vaccine_achievement_loc: "\n #indent_newline:3 • 홍역 백신을 처음 개발하고 시험하며 생산한 사람은 [Scope.GetCharacter.GetLastNameNoFormatting] 박사입니다.#!"
 theiler_scarlet_vaccine_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 성홍열 백신의 첫 시험과 생산을 개척한 인물이었습니다.#!"
 theiler_plague_vaccine_achievement_loc: "\n #indent_newline:3 • 페스트 예방에 효과가 있는 백신의 개발과 시험, 생산은 [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 처음으로 이룩하였습니다.#!"
 theiler_diphteria_vaccine_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 디프테리아에 효과가 있는 백신을 처음으로 개발하고 시험하며 생산하는 데 성공한 사람입니다#!"
 theiler_polio_vaccine_achievement_loc: "\n #indent_newline:3 • 소아마비 예방에 효과가 있는 백신의 개발과 시험, 생산은 [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 처음으로 이룩하였습니다.#!"
 theiler_pharmaceutical_strychnine_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 스트리크닌을 재료로 한 약물을 처음 개발한 사람으로 인정받고 있습니다.#!"
 theiler_pharmaceutical_emetine_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 에멘틴을 원재료로 한 약물의 개발을 주도한 인물로 인정받고 있습니다.#!"
 theiler_pharmaceutical_atropine_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 아트로핀을 원재료로 한 약물을 처음 발견한 사람으로 기록되었습니다.#!"
 theiler_pharmaceutical_aloin_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 알로인을 원재료로 한 약물을 처음 발견한 사람으로 거론됩니다.#!"
 theiler_pharmaceutical_digitoxin_achievement_loc: "\n #indent_newline:3 • 디기톡신을 원재료로 한 약물의 발견은 [Scope.GetCharacter.GetLastNameNoFormatting] 박사의 공로입니다.#!"
 theiler_pharmaceutical_quinine_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 퀴닌을 이용한 약물을 처음으로 개발한 인물입니다.#!"
 theiler_pharmaceutical_thymol_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 티몰을 원재료로 한 약물을 처음 발견한 장본인입니다.#!"
 theiler_pharmaceutical_pilocarpine_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 필로카르핀을 원재료로 한 약물을 발견한 사람으로 인정받고 있습니다.#!"
 theiler_pharmaceutical_ephedrine_achievement_loc: "\n #indent_newline:3 • 에페드린을 원재료로 한 약물의 최초 발견은 [Scope.GetCharacter.GetLastNameNoFormatting]의 업적입니다.#!"
 theiler_pharmaceutical_strophantine_achievement_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 스트로판틴을 원재료로 한 약물을 처음 찾아낸 사람으로 인정받고 있습니다.#!"