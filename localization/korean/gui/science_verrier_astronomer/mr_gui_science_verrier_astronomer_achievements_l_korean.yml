 verrier_astronomer_achievements_no_astronomer_loc: "이 [concept_verrier_astronomer]의 #V 업적#!은(는) 하나라도 있으면 여기 표시됩니다."
 verrier_astronomer_achievements_intro_loc: "#V 이 천문학자의 업적#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName]는 [Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V]개의 [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]를 발견한 뛰어난 천문학자입니다.#!"
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\n #indent_newline:3 • 61 시그니로부터 11.4광년 떨어진 #V 거리를 측정함으로써#!, [Scope.GetCharacter.GetLastNameNoFormatting]는 우주가 이전에 생각했던 것보다 훨씬 더 크다는 것을 한 번에 증명하는 데 성공했습니다.#!"
 verrier_astronomer_achievement_helium_discovered_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis]의 가장 큰 업적 중 하나는 태양의 전자기 스펙트럼을 연구하던 중 #V 원소 헬륨의 발견#!입니다.#!"
 verrier_astronomer_achievement_uranus_discoverer_loc: "\n #indent_newline:3 • 아무도 새로운 행성이 발견될 거라 예상하지 못했지만, 교수 [Scope.GetCharacter.GetLastNameNoFormatting]가 #V 천왕성 행성을 발견#!했습니다. 이 발견은 우리 태양계의 더 많은 행성을 찾는 계기가 되었습니다.#!"
 verrier_astronomer_achievement_ceres_discoverer_loc: "\n #indent_newline:3 • 많은 천문학자들이 화성과 목성 사이의 행성을 찾았지만, Dr. [Scope.GetCharacter.GetLastNameNoFormatting]가 #V 세레스 행성을 발견#!한 사람입니다.#!"
 verrier_astronomer_achievement_pallas_discoverer_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]는 화성과 목성 사이 지역에서 #V 팔라스 행성을 발견#!했습니다.#!"
 verrier_astronomer_achievement_vesta_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 화성과 목성 사이 지역에서 #V 소행성 베스타#!를 발견했습니다.#!"
 verrier_astronomer_achievement_juno_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 화성과 목성 사이 지역에서 #V 소행성 주노#!를 발견했습니다.#!"
 verrier_astronomer_neptune_discoverer_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetHerHis]의 가장 위대한 업적 중 하나는 #V 해왕성 발견#!이었습니다. 이 발견으로 [Scope.GetCharacter.GetHerHim]는 영원히 역사에 기록될 자리를 확보했습니다.#!"
 verrier_astronomer_achievement_pluto_discoverer_loc: "\n #indent_newline:3 • #V 명왕성(Pluto)#!의 존재 자체가 논쟁거리였지만, [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 실제로 이 작은 행성을 #V 발견#!했습니다. 위대한 천문학적 업적입니다!#!"
 verrier_astronomer_achievement_discovered_1843_comet_loc: "\n #indent_newline:3 •#V  1843년#!, [Scope.GetCharacter.GetSheHe]가 처음으로 #V 거대 혜성#!을 발견했으며, 이 혜성은 따라서 [Scope.GetCharacter.GetLastNameNoFormatting]의 이름을 따서 명명되었습니다.#!"
 verrier_astronomer_achievement_discovered_1858_comet_loc: "\n #indent_newline:3 • 1858년 #V 대혜성#!이 지구를 지나갈 때, [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 처음으로 혜성을 관측했습니다. 결과적으로, 이 혜성은 [Scope.GetCharacter.GetHerHim]의 이름을 따서 명명되었습니다.#!"
 verrier_astronomer_achievement_discovered_1861_comet_loc: "\n #indent_newline:3 • 어두운 밤하늘에서 #V 1861년 대혜성#!을 처음 발견한 교수 [Scope.GetCharacter.GetLastNameNoFormatting]는 이 천체의 이름이 되었다.#!"
 verrier_astronomer_achievement_discovered_1874_comet_loc: "\n #indent_newline:3 • 어두운 밤하늘에서 #V 1861년 대혜성#!을 처음 발견한 사람은 [Scope.GetCharacter.GetLastNameNoFormatting] 박사입니다.이제 그 천체는 [Scope.GetCharacter.GetHerHis]의 이름이 갖게 될 것입니다.#!"
 verrier_astronomer_achievement_discovered_1882_comet_loc: "\n #indent_newline:3 • #V 1882년#!은 천문학적으로 눈부신 해였습니다. [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 지구를 스쳐 지나가는 #V 대혜성#!을 발견했습니다. 믿을 수 없는 장관입니다.#!"
 verrier_astronomer_achievement_finished_pacific_expedition_loc: "\n #indent_newline:3 • #V 태평양 탐험#! 중에 [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 남반구에서 다양한 새로운 #V 천체#!를 발견했습니다.#!"
 verrier_astronomer_achievement_observed_venus_transit_loc: "\n #indent_newline:3 • #V 1874년#!, [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 태평양에서 #V 금성 통과#!를 관측했습니다. 보통 일생에 한 번 있는 사건입니다.#!"
 verrier_astronomer_achievement_observed_carrington_event_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 [Scope.GetVariable('verrier_astronomer_achievement_observed_carrington_event_var').GetValue]에서 #V 거대 태양 플레어#!를 관측했습니다.#!"
 verrier_astronomer_achievement_observed_corona_loc: "\n #indent_newline:3 • #V  [Scope.GetCharacter.GetLastNameNoFormatting]의 구슬#!을 발견했으며, 이는 [Scope.GetCharacter.GetHerHim]의 이름을 따서 명명되었습니다.#!"
 verrier_astronomer_achievement_sun_photo_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 일식의 첫 사진#!의 저자입니다.#!"
 verrier_astronomer_achievement_deimos_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 화성의 자연위성 데이모스#!를 발견했습니다.#!"
 verrier_astronomer_achievement_phobos_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 #V 화성의 자연위성 포보스#!를 발견했습니다.#!"
 verrier_astronomer_achievement_amalthea_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 목성의 자연위성 아말테아#!를 발견했습니다.#!"
 verrier_astronomer_achievement_himalia_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 #V 목성의 자연위성 히말리아#!를 발견했습니다.#!"
 verrier_astronomer_achievement_elara_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 목성의 자연위성 엘라라#!를 발견했습니다.#!"
 verrier_astronomer_achievement_pasiphae_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 #V 목성의 자연위성 파시파에#!를 발견했습니다.#!"
 verrier_astronomer_achievement_sinope_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 목성의 자연위성 시노페#!를 발견했습니다.#!"
 verrier_astronomer_achievement_lysithea_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 #V 목성의 자연위성 리시테아#!를 발견했습니다.#!"
 verrier_astronomer_achievement_carme_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 목성의 자연위성 카르메#!를 발견했습니다.#!"
 verrier_astronomer_achievement_enceladus_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 #V 토성의 자연위성 엔셀라두스#!를 발견했습니다.#!"
 verrier_astronomer_achievement_mimas_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 토성의 자연위성 미마스#!를 발견했습니다.#!"
 verrier_astronomer_achievement_hyperion_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 #V 토성의 자연위성 하이페리온#!를 발견했습니다.#!"
 verrier_astronomer_achievement_phoebe_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 토성의 자연위성 포이베#!를 발견했습니다.#!"
 verrier_astronomer_achievement_titania_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 #V 천왕성의 자연위성 티타니아#!를 발견했습니다.#!"
 verrier_astronomer_achievement_oberon_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 천왕성의 자연위성 오베론#!를 발견했습니다.#!"
 verrier_astronomer_achievement_ariel_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 #V 천왕성의 자연위성 아리엘#!를 발견했습니다.#!"
 verrier_astronomer_achievement_umbriel_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 천왕성의 자연위성 엄브리엘#!를 발견했습니다.#!"
 verrier_astronomer_achievement_miranda_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 #V 천왕성의 자연위성 미란다#!를 발견했습니다.#!"
 verrier_astronomer_achievement_triton_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 해왕성의 자연위성 트리톤#!를 발견했습니다.#!"
 verrier_astronomer_achievement_nereid_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 #V 해왕성의 자연위성 네레이드#!를 발견했습니다.#!"
 verrier_astronomer_achievement_moon_fission_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 #V 달이 지구의 일부였으며 분리되어 나왔다는#! 이론의 창시자로 여겨집니다.#!"
 verrier_astronomer_achievement_moon_capture_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 #V 달이 지구에 의해 포획된 외부 천체#!라는 이론의 창시자로 여겨집니다.#!"
 verrier_astronomer_achievement_centaur_discoverer_loc: "\n #indent_newline:3 • While searching for Planet X, [Scope.GetCharacter.GetSheHe] #V found the first Centaur#!, a separate class of asteroids located between Jupiter and Neptune.#!"