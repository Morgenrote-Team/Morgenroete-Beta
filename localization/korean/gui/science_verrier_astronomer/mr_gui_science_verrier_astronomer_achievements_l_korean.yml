 verrier_astronomer_achievements_intro_loc: "#V 이 업적천문학자#![Scope.GetCharacter.GetFullName] 은 [Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V] [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] 을 발견한 저명한 천문학자입니다." #deepl:2330629282
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\#!, [Scope.GetCharacter.GetLastNameNoFormatting] 은 61궁수에서 11.4광년 거리의 #V 을 측정하여 우주가 이전에 생각했던 것보다 훨씬 크다는 것을 단숨에 보여주는 데 성공했습니다." #deepl:4180687375
 verrier_astronomer_achievement_helium_discovered_loc: "#V \ [Scope.GetCharacter.GetHerHis] 가장 큰 업적 중 하나는 태양의 전자기 스펙트럼을 연구하던 중 헬륨 원소#! 를 발견한 것입니다." #deepl:1824398573
 verrier_astronomer_achievement_uranus_discoverer_loc: "\아무도 새로운 행성이 발견될 것이라고 예상하지 못했지만 [Scope.GetCharacter.GetLastNameNoFormatting] #V  교수가 천왕성#! 을 발견했습니다. 이 발견을 계기로 태양계에서 더 많은 행성을 찾게 되었습니다." #deepl:596907633
 verrier_astronomer_achievement_ceres_discoverer_loc: "\많은 천문학자들이 화성과 목성 사이의 행성을 찾았습니다. #V 하지만 세레스#! 를 발견한 사람은 [Scope.GetCharacter.GetLastNameNoFormatting] 박사였습니다." #deepl:134698821
 verrier_astronomer_achievement_pallas_discoverer_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] #V  박사는 화성과 목성 사이의 지역에서 팔라스 행성#! 을 발견했습니다." #deepl:2895291218
 verrier_astronomer_achievement_vesta_discoverer_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] #V  교수가 화성과 목성 사이 지역에서 베스타 행성#! 을 발견했습니다." #deepl:3332363292
 verrier_astronomer_achievement_juno_discoverer_loc: "\[Scope.GetCharacter.GetSheHe|U] #V  화성과 목성 사이의 영역에서 주노 행성#! 을 발견했습니다." #deepl:2722834301
 verrier_astronomer_neptune_discoverer_loc: "\ [Scope.GetCharacter.GetHerHis] 가장 위대한 업적 중 하나는 #V 해왕성 행성 발견#! 입니다. 이 발견으로 [Scope.GetCharacter.GetHerHim] 은 역사책에 영원히 남을 자리를 확보했습니다." #deepl:740023144
 verrier_astronomer_achievement_pluto_discoverer_loc: "\ #V 명왕성#! 존재 여부에 대한 논란이 있었지만, [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 실제로 #V 이 작은 행성을#! 발견했습니다. 천문학적으로 위대한 업적입니다!" #deepl:2882859348
 verrier_astronomer_achievement_discovered_1843_comet_loc: "\1843년 #V #! [Scope.GetCharacter.GetSheHe] 은 #V 최초로 혜성#! 을 발견하여 [Scope.GetCharacter.GetLastNameNoFormatting] 의 이름을 따서 명명했습니다." #deepl:493581168
 verrier_astronomer_achievement_discovered_1858_comet_loc: "\1858년 #V 대혜성#! 이 지구를 지나갈 때, [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 이 혜성을 최초로 목격했습니다. 그 결과 이 혜성의 이름은 [Scope.GetCharacter.GetHerHim] 으로 명명되었습니다." #deepl:2184348218
 verrier_astronomer_achievement_discovered_1861_comet_loc: "\1861년 밤하늘의 어둠 속에서#! #V  대혜성을 최초로 발견한 [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 이 천체의 이름을 따서 '대혜성'이라는 별칭을 얻었습니다." #deepl:2672737780
 verrier_astronomer_achievement_discovered_1874_comet_loc: "\1874년 #V 대혜성#! 이 처음 나타났을 때, 이를 가장 먼저 발견한 사람은 [Scope.GetCharacter.GetLastNameNoFormatting] 박사였습니다. 이제 이 혜성은 영원히 [Scope.GetCharacter.GetHerHis] 라는 이름을 갖게 될 것입니다." #deepl:333537749
 verrier_astronomer_achievement_discovered_1882_comet_loc: "\ #V 1882년#! 은 천문학적 관점에서 볼 때 장관이었습니다. [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 지구를 지나가는 #V 대혜성#! 을 발견했습니다. 놀라운 광경이었죠." #deepl:3157970288
 verrier_astronomer_achievement_finished_pacific_expedition_loc: "\ #V 태평양 탐험#! 을 하던 중 [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 남반구에서 다양한 새로운 #V 천체#! 를 발견했습니다." #deepl:27168137
 verrier_astronomer_achievement_observed_venus_transit_loc: "\ #V 1874년#!, [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 태평양에서 #V 금성 통과#! 를 관측했습니다. 보통 일생에 단 한 번뿐인 이벤트입니다." #deepl:885972622
 verrier_astronomer_achievement_observed_carrington_event_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 #V 대규모 태양 플레어#! 를 관측했습니다 [Scope.GetVariable('verrier_astronomer_achievement_observed_carrington_event_var').GetValue]." #deepl:2882246181
