l_korean:
 MR_AUTOMATE_ASTRONOMER_TT: "#T [concept_verrier_astronomer] 자동화#!\n자동화를 설정하면 더 이상 천문학자에게 업무를 지시할 필요가 없습니다.\n 그들은 알아서 작업하고 그때마다 알맞은 업무를 수행할 것입니다. 다만 일부 이벤트는 여전히 수신하게 됩니다."
 mr_astronomy_automation_gui_tt: "[concept_verrier_astronomer]의 업무 자동화를 시작합니다."
 mr_stop_astronomy_automation_gui_tt: "[concept_verrier_astronomer]의 업무 자동화를 중지합니다."
 MR_STOP_AUTOMATE_ASTRONOMER_TT: "#T [concept_verrier_astronomer] 자동화 중지#!\n천문학자는 더 이상 알아서 활동하지 않게 됩니다."
