l_korean:
 MR_STANDARD_TIME_BUTTON: "표준시 도입"
 MR_STANDARD_TIME_BUTTON_TT: "#T 표준시 도입#!\n종탑의 종소리가 아닌 역 시계의 흐름에 따라 움직이는 세상에서, 전국적으로 시간을 통일하는 표준시를 정하는 일이 중요한 과제로 떠올랐습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PRIME_MERIDIAN_BUTTON: "본초 자오선"
 MR_PRIME_MERIDIAN_BUTTON_TT: "#T 본초 자오선#!\n국가별 표준시가 점점 도입되면서 새로운 문제가 생겼습니다. 바로 국제 표준시대를 위한 기준점이 될 본초 자오선을 찾는 일입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_3_GREAT_POWERS_HAVE_STANDARD_TIME_TRIGGER_TT: "#default_text 적어도 #V 3개의 강대국#!이 표준시를 도입했습니다.#!"
 MR_20_COUNTRIES_HAVE_STANDARD_TIME_TRIGGER_TT: "#default_text 적어도 #V 20개국#!이 표준시를 도입했습니다.#!"