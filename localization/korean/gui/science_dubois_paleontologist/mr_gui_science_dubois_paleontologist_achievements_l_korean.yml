 dubois_paleontologist_no_paleontologist_loc: "이 #V [concept_dubois_paleontologist]의 업적#!은 하나라도 달성하면 이곳에 표시됩니다."
 dubois_paleontologist_achievements_intro_loc: "#V 이 고생물학자의 업적#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullNameNoFormatting](은)는 [Scope.GetCharacter.GetCustom('dubois_paleontologist_experience_level_type')]으로, [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] [Scope.Var('dubois_paleontologist_total_fossils_var').GetValue|0+]개와 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] [Scope.Var('dubois_dinosaur_bone_total_paleontologist_var').GetValue|0+]개를 수집하였습니다.#!"
 dubois_paleontologist_achievement_opened_first_paleontological_museum_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 #V 세계 최초의 고생물학 박물관#!을 설립하였습니다.#!"
 dubois_paleontologist_achievement_attended_extinction_congress_loc: "[Scope.GetCharacter.GetLastNameNoFormatting] 박사는 공룡의 불가사의를 밝혀내기 위한 학술회의에 참석하였습니다.#!"
 dubois_paleontologist_achievement_fossil_amber_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 공룡의 혈액을 담고 있을지 모를 선사시대 모기가 담긴 귀한 #V 호박#! 조각을 발견하였습니다.#!"
 dubois_paleontologist_achievement_fossil_ammonite_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 #V 암모나이트#!를 발굴하여 고대 해양 퇴적물의 연구에 보탬이 되었습니다.#!"
 dubois_paleontologist_achievement_fossil_archaeopteryx_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 공룡과 조류의 핵심적인 연결고리로 받아들여졌던 #V 시조새#!를 발견하였습니다.#!"
 dubois_paleontologist_achievement_fossil_composita_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 고대의 조개인 #V 콤포시타#!를 발견하여 선사시대 생명체를 향한 통찰력을 제공하였습니다.#!"
 dubois_paleontologist_achievement_fossil_eusthenopteron_loc: "\n #indent_newline:3 • 이 분이 발견한 #V 유스테노푸테론#! 화석은 처음에 생명체가 지상 생활에 어떻게 적응했는가를 밝혀냈습니다.#!"
 dubois_paleontologist_achievement_fossil_ichthyosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 찾아낸 #V 이크티요사우루스#!는 돌고래 모양의 파충류로 살아 있는 새끼를 낳았습니다.#!"
 dubois_paleontologist_chievement_fossil_ichthyostega_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 최초의 척추동물로 꼽히는 #V 이크티요스테가#!의 존재를 밝혀냈습니다.#!"
 dubois_paleontologist_achievement_fossil_megatherium_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 크기가 6m까지 자라는 선사시대의 거대한 나무늘보인 #V 메가테리움#!을 발견하였습니다.#!"
 dubois_paleontologist_achievement_fossil_pterodactylus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 고대의 호숫가에 서식하던 날개 달린 공룡인 #V 프테로닥틸루스#!의 화석을 발견하였습니다.#!"
 dubois_paleontologist_achievement_fossil_smilodon_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 전설적인 검치 포식자였던 #V 스밀로돈#!의 완벽하게 보존된 화석을 출토하였습니다.#!"
 dubois_paleontologist_achievement_fossil_trilobite_loc: "\n #indent_newline:3 • 암석층의 연대를 파악하는 가장 중요한 지표 화석으로 꼽히는 #V 삼엽충#!을 발견하였습니다.#!"
 dubois_paleontologist_achievement_fossil_haast_eagle_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 뉴질랜드에서 거대한 조류 사냥감이었던 #V 하스트수리#!를 발견하였습니다.#!"
 dubois_paleontologist_achievement_perfect_ankylosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 #V 안킬로사우루스#!를 흠잡을 데 없는 수준으로 복원하여 동료 학자들의 존경을 받았습니다.#!"
 dubois_paleontologist_achievement_imperfect_ankylosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 #V 안킬로사우르스#!를 다소 미흡한 수준으로 복원하였습니다.#!"
 dubois_paleontologist_achievement_poor_ankylosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수의 #V 안킬로사우루스#! 복원 시도는 비웃음을 받았습니다.#!"
 dubois_paleontologist_achievement_perfect_diplodocus_loc: "\n #indent_newline:3 • #V 디플로도쿠스#!를 완벽한 수준으로 복원하여 박물관의 자랑거리가 되었습니다.#!"
 dubois_paleontologist_achievement_imperfect_diplodocus_loc: "\n #indent_newline:3 • #V 디플로도쿠스#!를 만족스러운 수준으로 복원하였습니다>#!"
 dubois_paleontologist_achievement_poor_diplodocus_loc: "#V 디플로도쿠스#!를 엉망으로 복원했다는 평가를 받았습니다.#!"
 dubois_paleontologist_achievement_perfect_triceratop_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 복원한 #V 트리케라톱스#!는 그 명성으로 박물관의 위신을 드높였습니다.#!"
 dubois_paleontologist_achievement_imperfect_triceratop_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 복원한 #V 트리케라톱스#!는 전시하기에 충분한 수준으로 평가받고 있습니다.#!"
 dubois_paleontologist_achievement_poor_triceratop_loc: "[Scope.GetCharacter.GetLastNameNoFormatting] 박사가 복원한 #V 트리케라톱스#!는 창피한 수준에 머물렀습니다.#!"
 dubois_paleontologist_achievement_perfect_tyrannosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수가 완벽하게 복원한 #V 티라노사우루스 렉스#!는 경이로운 소장품입니다.#!"
 dubois_paleontologist_achievement_imperfect_tyrannosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수가 복원한 #V 티라노사우루스 렉스#!는 인상적이지만 완벽한 수준은 아닙니다.#!"
 dubois_paleontologist_achievement_poor_tyrannosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수의 #V 티라노사우루스 렉스#!는 이상하면서도 웃긴 모습으로 복원되었습니다.#!"
 dubois_paleontologist_achievement_perfect_stegosaurus_loc: "\n #indent_newline:3 • #V [Scope.GetCharacter.GetSheHe]는 스테고사우루스#! 골격을 완벽하게 복원하여 공룡 전시에 활용하였습니다.#!"
 dubois_paleontologist_achievement_imperfect_stegosaurus_loc: "\n #indent_newline:3 • #V [Scope.GetCharacter.GetSheHe]는 스테고사우루스#! 골격을 잘 복원하여 공룡 전시에 활용하였습니다.#!"
 dubois_paleontologist_achievement_poor_stegosaurus_loc: "\n #indent_newline:3 • #V [Scope.GetCharacter.GetSheHe]는 스테고사우루스#! 골격을 어설프게 복원하였습니다.#!"
 dubois_paleontologist_achievement_perfect_antarctosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 복원한 #V 안타르크토사우루스#!는 완벽한 수준으로 박물관을 빛내는 소장품입니다.#!"
 dubois_paleontologist_achievement_imperfect_antarctosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 안타르크토사우루스#!를 썩 괜찮은 수준으로 복원하였습니다.#!"
 dubois_paleontologist_achievement_poor_antarctosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 복원한 #V 안타르크토사우루스#!는 박물관의 수치입니다.#!"
 dubois_paleontologist_achievement_perfect_argyrosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수가 복원한 #V 아르기로사우루스#! 골격은 고생물학계의 보배입니다.#!"
 dubois_paleontologist_achievement_imperfect_argyrosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수의 #V 아르기로사우루스#! 골격은 적당히 잘 복원되었습니다.#!"
 dubois_paleontologist_achievement_poor_argyrosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수의 #V 아르기로사우루스#! 골격 복원은 어설픈 시도에 불과했습니다.#!"
 dubois_paleontologist_achievement_perfect_iguanodon_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 #V 이구아노돈#! 골격을 완벽하게 복원하였습니다.#!"
 dubois_paleontologist_achievement_imperfect_iguanodon_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 #V 이구아노돈#! 골격을 복원하였습니다.#!"
 dubois_paleontologist_achievement_poor_iguanodon_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]가 복원한 #V 이구아노돈#! 골격에는 수많은 오류가 존재합니다.#!"
 dubois_paleontologist_achievement_perfect_plateosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 플라테오사우루스#! 골격을 완벽히 복원하여 소장품으로 두었습니다.#!"
 dubois_paleontologist_achievement_imperfect_plateosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 플라테오사우루스#! 골격을 복원하였습니다.#!"
 dubois_paleontologist_achievement_poor_plateosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 복원한 #V 플라테오사우루스#!는 어딘가 이상하게 변형된 것처럼 보입니다.#!"
 dubois_paleontologist_achievement_perfect_giraffatitan_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] created a magnificent #V Giraffatitan#! skeleton, utilizing the museum's space.#!"
 dubois_paleontologist_achievement_imperfect_giraffatitan_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] assembled a decent #V Giraffatitan#! skeleton.#!"
 dubois_paleontologist_achievement_poor_giraffatitan_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Giraffatitan#! is an absurd version of the dinosaur.#!"
 dubois_paleontologist_achievement_perfect_spinosaurus_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Spinosaurus#! skeleton is a true work of art.#!"
 dubois_paleontologist_achievement_imperfect_spinosaurus_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] assembled a #V Spinosaurus#! skeleton.#!"
 dubois_paleontologist_achievement_poor_spinosaurus_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Spinosaurus#! skeleton looks more like a chicken than a dinosaur.#!"
 dubois_paleontologist_achievement_perfect_psittacosaurus_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Psittacosaurus#! skeleton, with its beak-like mouth, is extraordinary.#!"
 dubois_paleontologist_achievement_imperfect_psittacosaurus_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Psittacosaurus#! skeleton is a nice addition.#!"
 dubois_paleontologist_achievement_poor_psittacosaurus_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Psittacosaurus#! reconstruction is highly questionable.#!"
 dubois_paleontologist_achievement_perfect_velociraptor_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Velociraptor#! is a perfectly assembled masterpiece.#!"
 dubois_paleontologist_achievement_imperfect_velociraptor_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] assembled a good #V Velociraptor#! skeleton.#!"
 dubois_paleontologist_achievement_poor_velociraptor_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s #V Velociraptor#! is comically small and oddly adorned.#!"
