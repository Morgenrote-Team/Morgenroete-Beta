 dubois_paleontologist_no_paleontologist_loc: "[concept_dubois_paleontologist]#! 의 #V 업적은 여기에 표시됩니다." #deepl:2334446280
 dubois_paleontologist_achievements_intro_loc: "#V 이 업적고생물학자#!\n[Scope.GetCharacter.GetFullNameNoFormatting] 은 [Scope.GetCharacter.GetCustom('dubois_paleontologist_experience_level_type')] 으로 총 [Scope.Var('dubois_paleontologist_total_fossils_var').GetValue|0+] [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] 및 [Scope.Var('dubois_dinosaur_bone_total_paleontologist_var').GetValue|0+] [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] 을 수집했습니다." #deepl:39291484

 dubois_paleontologist_achievement_opened_first_paleontological_museum_loc: "#V \[Scope.GetCharacter.GetSheHe|U] 세계 최초의 고생물학 박물관#! 을 설립하여 다양한 화석을 전시하고 있습니다." #deepl:2735413684
 dubois_paleontologist_achievement_attended_extinction_congress_loc: "[Scope.GetCharacter.GetLastNameNoFormatting] 박사는 공룡의 멸종 원인을 규명하는 학회에 참여했습니다." #deepl:3929204720
 dubois_paleontologist_achievement_fossil_amber_loc: "\[Scope.GetCharacter.GetSheHe|U] 작은 모기가 들어 있는 #V 호박색#! 의 독특한 조각을 발견했습니다. 혹시 공룡 피가 들어 있을까요?" #deepl:1354321492
 dubois_paleontologist_achievement_fossil_ammonite_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 교수가 해양 퇴적물의 연대 구분을 도와줄 #V 암모나이트#! 를 발견했습니다." #deepl:2717312690
 dubois_paleontologist_achievement_fossil_archaeopteryx_loc: "\많은 사람들이 [Scope.GetCharacter.GetLastNameNoFormatting] 박사의 발견을 최초의 조류로 간주합니다. 실제로 #V 시조새#! 는 공룡과 새 사이의 연결 고리 역할을 하는 것으로 보입니다." #deepl:3644254959
 dubois_paleontologist_achievement_fossil_composita_loc: "\#V #! 조개껍질은 거의 모든 대륙에서 수백만 년 전에 살았던 조개입니다. [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 [Scope.GetCharacter.GetHerHis] 발굴 중 하나를 발견했습니다." #deepl:1938126946
 dubois_paleontologist_achievement_fossil_eusthenopteron_loc: "\ [Scope.GetCharacter.GetSheHe] 에서 발견된 #V 유스테놉테론#! 은 이미 앞지느러미에 상완골, 척골, 요골이 뚜렷하게 존재합니다. 이러한 뼈는 모든 육상 척추동물에 존재합니다." #deepl:1906215431
 dubois_paleontologist_achievement_fossil_ichthyosaurus_loc: "\n#V 이치오사우라#!, [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 발견한 이치오사우라는 매우 독특한 파충류입니다. 돌고래를 닮았으며 알을 낳지 않고 산 채로 새끼를 낳는 파충류로서는 매우 드문 경우입니다." #deepl:1058896905
 dubois_paleontologist_chievement_fossil_ichthyostega_loc: "\ #V 이치오스테가#!, 교수 [Scope.GetCharacter.GetLastNameNoFormatting] 는 최초의 육상 동물 중 하나를 발견했습니다. 물고기와 사족동물 사이의 잃어버린 연결 고리입니다." #deepl:178680301
 dubois_paleontologist_achievement_fossil_megatherium_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사의 발견 중 하나에서 알 수 있듯이 나무늘보는 오늘날에는 작지만 과거에는 거대한 나무늘보가 있었습니다. #V  메가더리움#! 의 길이는 최대 6미터(20피트)에 달했습니다." #deepl:2625011393
 dubois_paleontologist_achievement_fossil_pterodactylus_loc: "\[Scope.GetCharacter.GetSheHe|U] 호수나 강 근처에 살았을 것으로 추정되는 날개 달린 공룡인 #V 프테로닥틸루스#! 의 화석을 발견했습니다." #deepl:1358755979
 dubois_paleontologist_achievement_fossil_smilodon_loc: "\ #V 스밀로돈#! 은 수천 년 전까지 살았던 무서운 포식자입니다. [Scope.GetCharacter.GetLastNameNoFormatting] 교수가 아주 잘 보존된 해골을 발견했습니다." #deepl:209509221
 dubois_paleontologist_achievement_fossil_trilobite_loc: "\ [Scope.GetCharacter.GetHerHis] 작은 발견 중 하나는 다양한 T#V 삼엽충#!. 화려하지는 않지만 훌륭한 지표 화석입니다." #deepl:623281739
 dubois_paleontologist_achievement_fossil_haast_eagle_loc: "\뉴질랜드에서 [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 [Scope.GetCharacter.GetSheHe] 거대한 독수리( #V 하스트 이글#!)를 발견하면서 흥미로운 발견을 했습니다." #deepl:758643186
 dubois_paleontologist_achievement_perfect_ankylosaurus_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 #V 안킬로사우루스#! 를 완벽한 방법으로 재구성했습니다. 다른 고생물학자들은 이 재구성에 놀라움을 금치 못했습니다." #deepl:2799229951
 dubois_paleontologist_achievement_imperfect_ankylosaurus_loc: "\n교수 [Scope.GetCharacter.GetLastNameNoFormatting] 는 #V 안킬로사우루스#! 를 불완전한 방식으로 재구성했습니다." #deepl:3408874547
 dubois_paleontologist_achievement_poor_ankylosaurus_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 교수가 #V 안킬로사우루스#! 를 재구성했지만 끔찍한 시도였고 다른 고생물학자들로부터 비웃음을 샀습니다." #deepl:2085395454
 dubois_paleontologist_achievement_perfect_diplodocus_loc: "\[Scope.GetCharacter.GetHerHis|U] #V  디플로도쿠스#! 의 재구성은 정말 완벽하며 모든 고생물학 박물관의 부러움을 사고 있습니다." #deepl:3626804845
 dubois_paleontologist_achievement_imperfect_diplodocus_loc: "\n[Scope.GetCharacter.GetHerHis|U] #V  디플로도쿠스#! 재구성하면 충분합니다." #deepl:412034719
 dubois_paleontologist_achievement_poor_diplodocus_loc: "[Scope.GetCharacter.GetHerHis|U] #V  디플로도쿠스#! 재건은 재앙이며 혐오스러운 것으로 간주됩니다." #deepl:3022704965
 dubois_paleontologist_achievement_perfect_triceratop_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사의 #V 트리케라톱스#! 재구성의 완벽함은 널리 알려져 고생물학 컬렉션의 명성을 높였습니다." #deepl:2010941711
 dubois_paleontologist_achievement_imperfect_triceratop_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사의 #V 트리케라톱스#! 재구성의 평범함은 우리 박물관에서 충분히 훌륭하지만 특별할 것은 없습니다." #deepl:996647347
 dubois_paleontologist_achievement_poor_triceratop_loc: "[Scope.GetCharacter.GetLastNameNoFormatting] 박사의 #V 트리케라톱스#! 재구성의 공포는 우리 컬렉션에 부끄러운 일입니다." #deepl:1193371056
 dubois_paleontologist_achievement_perfect_tyrannosaurus_loc: "\ #V 티라노사우루스 렉스#! 놀라운 광경입니다. 특히 [Scope.GetCharacter.GetLastNameNoFormatting] 교수가 완벽하게 조립한 것은 더욱 그렇습니다." #deepl:2375174801
 dubois_paleontologist_achievement_imperfect_tyrannosaurus_loc: "\ #V 티라노사우루스 렉스#! 는 놀라운 광경입니다. [Scope.GetCharacter.GetLastNameNoFormatting] 교수가 재구성한 것처럼 완벽하게 조립된 것은 아니더라도 말입니다." #deepl:2816655238
 dubois_paleontologist_achievement_poor_tyrannosaurus_loc: "\ #V 티라노사우루스 렉스#! 는 놀라운 광경입니다. 하지만 [Scope.GetCharacter.GetLastNameNoFormatting] 교수가 조립한 것은 아닙니다. 이건 그냥 터무니없는 괴물일 뿐입니다." #deepl:2924846018
 dubois_paleontologist_achievement_perfect_stegosaurus_loc: "\ [Scope.GetCharacter.GetSheHe] 이 조립한 강력한 #V 스테고사우루스#! 해골은 공룡 전시회를 위한 완벽한 작품입니다." #deepl:1011030116
 dubois_paleontologist_achievement_imperfect_stegosaurus_loc: "\ [Scope.GetCharacter.GetSheHe] 에서 조립한 #V 스테고사우루스#! 해골은 공룡 전시회에 잘 어울리는 작품입니다." #deepl:3364926958
 dubois_paleontologist_achievement_poor_stegosaurus_loc: "\ [Scope.GetCharacter.GetSheHe] 에서 조립한 끔찍한 #V 스테고사우루스#! 해골은 공룡 전시회에서 공간 낭비입니다." #deepl:1841850726
 dubois_paleontologist_achievement_perfect_antarctosaurus_loc: "\누구나 #V 남극공룡#! 을 [Scope.GetCharacter.GetLastNameNoFormatting] 박사만큼 완벽하게 조립할 수는 없습니다. 저희 컬렉션의 하이라이트 중 하나입니다." #deepl:4276626573
 dubois_paleontologist_achievement_imperfect_antarctosaurus_loc: "\ #V 남극공룡#! 을 조립하는 것은 어려운 작업이지만, [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 꽤 잘 해냈습니다." #deepl:4006286419
 dubois_paleontologist_achievement_poor_antarctosaurus_loc: "\누구나 #V 남극공룡#! 을 조립할 수 있는 것은 아닙니다. 하지만 닥터 [Scope.GetCharacter.GetLastNameNoFormatting] 만큼 끔찍하게 조립하는 사람은 많지 않습니다. 저희 컬렉션의 수치입니다." #deepl:3523325515
 dubois_paleontologist_achievement_perfect_argyrosaurus_loc: "\저희 컬렉션에 있는 멋진 #V 아르기로사우루스#! 골격은 [Scope.GetCharacter.GetLastNameNoFormatting] 교수님의 작품입니다. 정말 놀라운 골격입니다." #deepl:2395444631
 dubois_paleontologist_achievement_imperfect_argyrosaurus_loc: "\저희 컬렉션에 있는 #V 아르기로사우루스#! 골격은 [Scope.GetCharacter.GetLastNameNoFormatting] 교수의 작품입니다. 꽤 잘 만들어진 골격입니다." #deepl:2170414433
 dubois_paleontologist_achievement_poor_argyrosaurus_loc: "\저희 컬렉션에 있는 괴물 #V 아르기로사우루스#! 골격은 [Scope.GetCharacter.GetLastNameNoFormatting] 교수의 작품입니다. 분명히 어설픈 고생물학자의 작품이죠." #deepl:2917340443
 dubois_paleontologist_achievement_perfect_iguanodon_loc: "\[Scope.GetCharacter.GetSheHe|U] #V  이구아노돈#! 스켈레톤을 완벽하게 조립했습니다." #deepl:3595520963
 dubois_paleontologist_achievement_imperfect_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  이구아노돈#! 스켈레톤을 조립했습니다." #deepl:948446383
 dubois_paleontologist_achievement_poor_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  이구아노돈#! 해골을 끔찍하게 잘못 조립했습니다." #deepl:60351557
 dubois_paleontologist_achievement_perfect_plateosaurus_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 플라토사우루스#! 의 골격을 완벽하게 재구성할 수 있었습니다. 우리 컬렉션을 위한 그레이트 전시입니다." #deepl:3288975063
 dubois_paleontologist_achievement_imperfect_plateosaurus_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 플라토사우루스#! 의 골격을 재구성할 수 있었습니다." #deepl:3540574047
 dubois_paleontologist_achievement_poor_plateosaurus_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 플라토사우루스#! 의 골격을 재구성할 수 있었습니다. 하지만 매우 이상하고 변형된 모습입니다." #deepl:4210803243
 dubois_paleontologist_achievement_perfect_giraffatitan_loc: "\ #V 기라파티탄(#! )을 재구성하는 것은 힘든 작업이며 많은 공간이 필요합니다. 다행히 [Scope.GetCharacter.GetLastNameNoFormatting] 교수님이 우리 박물관의 규모를 이용해 멋진 공룡 골격을 준비해 주셨어요." #deepl:1815044749
