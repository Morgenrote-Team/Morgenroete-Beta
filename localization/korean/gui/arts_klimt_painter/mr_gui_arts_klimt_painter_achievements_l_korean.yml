l_korean:
 MR_PAINTER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'klimt_painter_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'klimt_painter_achievements_no_painter_loc')]"
 klimt_painter_achievements_loc: "$klimt_painter_achievements_intro_loc$[AddLocalizationIf( Scope.Var('klimt_painter_achievement_vernissage_var').IsSet , Scope.Var('klimt_painter_achievement_vernissage_var').GetFlagName)][AddLocalizationIf( Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').IsSet , Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').GetFlagName)]"
 klimt_painter_achievements_no_painter_loc: "이 #V [concept_klimt_painter]의 업적#!은 하나라도 달성하면 이곳에 표시됩니다."
 klimt_painter_achievements_intro_loc: "#V 이 화가의 업적#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName](은)는 [Scope.GetCharacter.GetCustom('klimt_painter_achievement_experience_type')]입니다.#!\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe]는 [Scope.Var('klimt_painter_num_paintings_var').GetValue|V0]점의 그림을 제작했으며, 그 가운데 [Scope.Var('klimt_painter_num_masterworks_var').GetValue|V0]점은 걸작으로 평가받고 있습니다.#!"
 klimt_painter_achievement_vernissage_loc: "\n#indent_newline:3 • [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName]는 자신의 작품을 대규모 전시에서 선보였습니다.#!"
 klimt_painter_achievement_inaugurated_gallery_loc: "[Scope.GetCharacter.GetSheHe]는 새로운 미술관에 자신의 훌륭한 작품들을 선보였습니다. 분명 이 미술관에는 앞으로도 많은 뛰어난 화가들이 찾아올 것입니다!#!"