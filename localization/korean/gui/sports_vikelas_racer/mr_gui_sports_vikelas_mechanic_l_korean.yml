 MR_PADDOCK_FIRE_MECHANIC_BUTTON: "정비사 해고"
 MR_PADDOCK_FIRE_MECHANIC_BUTTON_TT: "#T 정비사 해고#!\n 레이싱팀은 현 정비사가 기대하는 요건을 충족하지 못할 경우 새로운 정비사를 채용할 수 있습니다. 단 신임 정비사는 2년에 한 번씩만 채용할 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PADDOCK_FIRE_RACER_BUTTON: "선수 해고"
 MR_PADDOCK_FIRE_RACER_BUTTON_TT: "#T 선수 해고#!\n 돈 많은 사람들이 자비 부담으로 출전했던 옛날과는 달리, 레이싱팀의 선수들은 대체 불가능한 존재가 아닙니다. 레이싱 선수를 새로 채용하면 2년 동안 교체할 수 없습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HAS_MECHANIC_TT: "#default_text [GetPlayer.GetName]에서 [concept_vikelas_mechanic]을 보유함#!"
 MR_NOT_HAS_NEW_MECHANIC_TT: "#default_text [GetPlayer.GetName]에서 #V 지난 2년 간#! [concept_vikelas_mechanic]를 채용하지 #R 않음#!#!"
 MR_NOT_HAS_NEW_RACER_TT: "#default_text [GetPlayer.GetName]에서 #V 지난 2년 간#! [concept_vikelas_racer]를 #R 채용하지 않았습니다.#!#!"
 MR_PADDOCK_INNOVATION_TO_RESEARCH_BUTTON: "기계 혁신 전환"
 MR_PADDOCK_INNOVATION_TO_RESEARCH_BUTTON_TT: "#T 기계 혁신 전환#!\n 기계 혁신을 연구 점수로 전환하여 모터스포츠의 성과가 나라 전체에 혜택으로 돌아가도록 합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
