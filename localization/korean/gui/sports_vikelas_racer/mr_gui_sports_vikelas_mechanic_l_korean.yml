l_korean:
 MR_PADDOCK_IMPROVE_ENGINE_BUTTON: "엔진 개선"
 MR_PADDOCK_IMPROVE_ENGINE_BUTTON_TT: "#T 엔진 개선#!\n 새로운 엔진은 차량의 신뢰성과 속력을 향상시킵니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PADDOCK_IMPROVE_SAFETY_BUTTON: "안전성 개선"
 MR_PADDOCK_IMPROVE_SAFETY_BUTTON_TT: "#T 안전성 개선#!\n 정비사는 레이서의 생명을 보호하기 위해 여러 가지 새로운 안전 기술을 강구할 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PADDOCK_IMPROVE_BODY_BUTTON: "차체 개선"
 MR_PADDOCK_IMPROVE_BODY_BUTTON_TT: "#T 차체 개선#!\n 차체를 개선하면 공기역학적 성능 향상으로 이어져 속력을 높이고, 소재를 개선하면 안전성을 향상시킵니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MECHANIC_TRIGGER: "#default_text [GetPlayer.GetName]에서 [concept_vikelas_mechanic]을 보유함#!"
