 MR_AUTORACING_FOUND_AUTOMOBILE_CLUB_BUTTON: "자동차 클럽 창설"
 MR_AUTORACING_FOUND_AUTOMOBILE_CLUB_BUTTON_TT: "#T 자동차 클럽 창설#!\n자동차 클럽 창설은 모터스포츠에 필수적인 기타 시설들을 구축하기 위한 첫걸음입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_LONG_DISTANCE_BUTTON: "내구 레이스"
 MR_AUTORACING_LONG_DISTANCE_BUTTON_TT: "#T 내구 레이스 개최#!\n내구 레이스는 도시 간 장거리 경주의 형태인 경우가 많았으며, 초창기 자동차 경주의 표준으로 자리잡아 20세기 중반까지 이어졌습니다. 이탈리아에서는 타르가 플로리오, 밀레 밀리아 등의 레이스가 대표적인 대회로 인지도가 높았습니다. 이러한 레이스는 인간과 기계 모두에게 특별한 시험대에 오르게 하였으며 오랜 시간 동안 카레이싱계의 진정한 국가 대항전으로 평가받았습니다. \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON: "그랑프리 창설"
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON_TT: "#T 그랑프리 레이스 창설#!\n1906년 자동차 역사상 최초의 정식 그랑프리인 ACF 그랑프리 대회가 열렸다. 프랑스 자동차 업계 대표의 요청으로 참가국에 관계없이 자동차 제조사당 최대 3대의 경주용 자동차가 출전할 수 있었다. 레이스 가운데서도 으뜸이라는 위상에 걸맞게, 이틀 연속으로 1200km가 넘는 거리를 주행하였다. 1925년에는 이탈리아 자동차 클럽의 주도로 마침내 공식 세계 선수권 대회가 창설되었다. 시즌 공식 3대 그랑프리 레이스(프랑스, 이탈리아, 벨기에)는 물론 미국 최고의 레이싱 대회인 인디애나폴리스 그랑프리가 대회의 레이스로 지정되었다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON_TRIGGER_TT: "#default_text #V 자동차 클럽#!을 보유하고 [GetTechnology('vikelas_international_sports_tech').GetName]를 연구한 국가가 #V 5개국 이상#!#!"
 MR_AUTORACING_RACE_TRACK_BUTTON: "레이스 트랙 건설"
 MR_AUTORACING_RACE_TRACK_BUTTON_TT: "#T 경주 트랙 건설#!\n그랑프리 레이스의 개최로 고정형 레이스 트랙은 점차 카레이싱의 표준으로 자리잡게 되었다. 전용 레이스 트랙은 국제 레이싱 대회를 한 곳에 집중시킬 뿐만 아니라, 테스트 트랙으로서 매년 드라이버들에게 경험치 보너스를 제공하게 된다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HAS_RACER_TT: "#default_text [GetPlayer.GetName]에서 [concept_vikelas_racer]를 보유함#!"
 MR_AUTORACING_RACE_TRACK_BUTTON_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 [GetBuildingType('building_urban_center').GetName]이 #V 15단계 이상#!인 [concept_incorporated_state]를 보유함#!"
 MR_AUTORACING_FOUND_TEAM_BUTTON: "레이싱팀 창단"
 MR_AUTORACING_FOUND_TEAM_BUTTON_TT: "#T 레이싱팀 창단#!\n우리나라에서 자체적인 경주용 차량 제조사를 보유하면 수입산으로부터 자유로워지면서 우리만의 경주용 차량을 개발할 수 있게 됩니다. 이를 위해서는 자체적인 자동차 산업과 기초 계획을 맡아줄 공학자가 필요합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_FOUND_TEAM_BUTTON_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 [concept_production_method]이 #V 자동차 생산#!으로 설정된 #p 2단계 이상#!의 [GetBuildingType('building_automotive_industry').GetName]을 최소 하나 이상 보유함#!"
 MR_AUTORACING_RACE_TRACK_APPLY_BUTTON: "그랑프리 서킷 신청"
 MR_AUTORACING_RACE_TRACK_APPLY_BUTTON_TT: "#T 그랑프리 서킷 신청#!\n국제 자동차 협회의 회원국이자 최신 레이스 트랙의 보유국으로서 우리나라의 트랙을 정식 그랑프리 서킷으로 지원할 수 있습니다. 그렇게 되면 매년 그랑프리 레이스가 그곳에서 개최되며, 트랙의 위상도 크게 향상됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HAS_RACE_TRACK_TT: "#default_text [GetPlayer.GetName]에서 최소 하나 이상의 [GetBuildingType('building_vikelas_circuit').GetName]를 보유함#!"
 MR_MAXIMUM_5_RACE_TRACKS_TT: "#default_text [GetBuildingType('building_vikelas_circuit').GetName]를 보유한 국가가 5개국 미만#!"
 MR_AIACR_PRESIDENT_BUTTON: "AIACR 회장국 되기"
 MR_AIACR_PRESIDENT_BUTTON_TT: "#T AIACR 회장국 선출#!\n현임 AIACR 회장국이 없다면 그 지위를 넘겨받을 수 있습니다. 우리가 국제자동차협회 본부를 소유하고 있다는 전제 하에서 말입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AIACR_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 [GetBuildingType('building_vikelas_aiacr').GetName]를 소유함#!"
 MR_AUTORACING_RACE_TRACK_DECLARE_BUTTON: "그랑프리 서킷 지정"
 MR_AUTORACING_RACE_TRACK_DECLARE_BUTTON_TT: "#T 그랑프리 서킷 지정#!\nAIACR 회장국으로서 우리나라의 레이스 트랙 중 한 곳을 그랑프리 서킷으로 지정할 수 있는 특권을 누리게 됩니다.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IS_AIACR_PRESIDENT_TT: "#default_text [GetPlayer.GetName](이)가 #V AIACR 회장국#!임#!"
 MR_AUTORACING_FOUND_AIACR_BUTTON: "자동차 협회"
 MR_AUTORACING_FOUND_AIACR_BUTTON_TT: "#T 자동차 협회#!\n카레이싱은 드라이버들이 여러 나라의 다양한 자동차 브랜드로 겨룬다는 점에서 한층 더 국제적인 스포츠로 나아가게 되었습니다. 대다수 국가들은 별다른 협약 없이 자체적인 레이스를 개최하기 시작하였습니다. 경기 규칙과 약관을 보다 실질적으로 조율하기 위해서는 국제 자동차 협회와 같은 국제 기구의 설립이 필요합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_FOUND_AIACR_BUTTON_TRIGGER_TT: "#default_text #V 자동차 클럽#!을 보유한 국가가 #V 10개국 이상#!#!"
 MR_AUTORACING_NO_PARTICIPATION_BUTTON_TT: "#T 레이스 참가 취소#!\n드라이버의 특성이 지나치게 성급하거나, 차량의 완성도가 너무 떨어져 심각한 사고로 이어질 수 있는 등, 특정 상황에서는 레이스 참가를 잠정 중단하는 것이 합리적일 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 vikelas_no_participation_tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName](은)는 레이스 참가가 다시 허가될 때까지 어떠한 대회에도 참여하지 않게 됩니다."
 MR_AUTORACING_PARTICIPATION_BUTTON_TT: "#T 레이스 참가#!\n레이서가 모든 대회에 다시 참가하도록 허가합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 vikelas_participation_tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName](은)는 평소대로 레이스에 참가하게 됩니다."
 MR_AUTORACING_LONG_DISTANCE_NOT_ONGOING_TRIGGER_TT: "#default_text 현재 #V 내구 레이스#!를 개최하고 있는 국가가 #R 없음#!#!"
 MR_AUTORACING_LONG_DISTANCE_STATE_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 최소 #V 5개 [Concept('concept_state', '$concept_states$')]#!를 보유함#!"
 MR_AUTORACING_LONG_DISTANCE_MODIFIER_TRIGGER_TT: "#default_text 현재 [GetPlayer.GetName]에서 #V 내구 레이스#!를 개최하고 있지 #R 않습니다.#!#!"
 vikelas_no_race_team_type: "없음"