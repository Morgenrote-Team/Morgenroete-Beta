 MR_PHYSICIAN_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'panum_physician_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'panum_physician_no_physician_loc')]"
 panum_physician_achievements_loc: "$panum_physician_achievements_intro_loc$[Scope.GetCharacter.GetCustom('panum_physician_achievement_successful_treatments_type')][Scope.GetCharacter.GetCustom('panum_physician_achievement_epidemiologist_type')][Scope.GetCharacter.GetCustom('panum_physician_achievement_surgeon_type')][Scope.GetCharacter.GetCustom('panum_physician_achievement_psychiatrist_type')][Scope.GetCharacter.GetCustom('panum_physician_achievement_military_physician_type')][AddLocalizationIf( Scope.Var('panum_physician_achievement_germ_theory_inventor_var').IsSet , Scope.Var('panum_physician_achievement_germ_theory_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_pneumothorax_inventor_var').IsSet , Scope.Var('panum_physician_achievement_pneumothorax_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_thoracoplasty_inventor_var').IsSet , Scope.Var('panum_physician_achievement_thoracoplasty_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_bloodtypes_inventor_var').IsSet , Scope.Var('panum_physician_achievement_bloodtypes_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_ecg_inventor_var').IsSet , Scope.Var('panum_physician_achievement_ecg_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_transplantation_inventor_var').IsSet , Scope.Var('panum_physician_achievement_transplantation_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_stereotactic_method_inventor_var').IsSet , Scope.Var('panum_physician_achievement_stereotactic_method_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_cardiopulmonary_bypass_inventor_var').IsSet , Scope.Var('panum_physician_achievement_cardiopulmonary_bypass_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_endoscope_inventor_var').IsSet , Scope.Var('panum_physician_achievement_endoscope_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_ophthalmoscope_inventor_var').IsSet , Scope.Var('panum_physician_achievement_ophthalmoscope_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_chemotherapy_inventor_var').IsSet , Scope.Var('panum_physician_achievement_chemotherapy_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_attended_medical_congress_var').IsSet , Scope.Var('panum_physician_achievement_attended_medical_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_anthrax_disease_var').IsSet , Scope.Var('panum_physician_achievement_anthrax_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_goiter_disease_var').IsSet , Scope.Var('panum_physician_achievement_goiter_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_nephrolithiasis_disease_var').IsSet , Scope.Var('panum_physician_achievement_nephrolithiasis_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_pellagra_disease_var').IsSet , Scope.Var('panum_physician_achievement_pellagra_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_rickets_disease_var').IsSet , Scope.Var('panum_physician_achievement_rickets_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_syphilis_disease_var').IsSet , Scope.Var('panum_physician_achievement_syphilis_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_tetanus_disease_var').IsSet , Scope.Var('panum_physician_achievement_tetanus_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_military_medicine_project_finished_var').IsSet , Scope.Var('panum_physician_achievement_military_medicine_project_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_inaugurated_asylum_var').IsSet , Scope.Var('panum_physician_achievement_inaugurated_asylum_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_basketball_inventor_var').IsSet , Scope.Var('panum_physician_achievement_basketball_inventor_var').GetFlagName)]"
 panum_physician_no_physician_loc: "이 #V [concept_panum_physician]의 업적#!은 하나라도 달성하면 이곳에 표시됩니다."
 panum_physician_achievements_intro_loc: "#V 이 의사의 업적#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName](은)는 성공한 의사입니다.#!"
 panum_physician_achievement_successful_treatments_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 환자 치료 부문에서 숙련된 경험을 갖췄으며 #o [GetPlayer.MakeScope.Var('panum_physician_var').GetVariable('panum_physician_successful_treatments_var').GetValue]명의 환자를 성공적으로 치료#!하였습니다.#!"
 panum_physician_achievement_epidemiologist_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 여러 질병을 두루 연구하여 #o $panum_epidemiologist$#!가 되었습니다.#!"
 panum_physician_achievement_surgeon_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 수많은 수술에 나서선 훌륭한 #o $panum_surgeon$#!로 평가됩니다.#!"
 panum_physician_achievement_psychiatrist_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 인간의 정신을 두루 연구하여 #o 저명한 $panum_psychiatrist$#!로 알려졌습니다.#!"
 panum_physician_achievement_military_physician_loc: "\n #indent_newline:3 • #o $panum_military_physician$#!으로서 전쟁의 공포를 목격하며 끔찍한 상황에 놓인 사람을 어떻게 치료해야 하는지 대처할 수 있습니다.#!"
 panum_physician_achievement_germ_theory_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #o 매균설#!을 창시하여 수만 명의 목숨을 구해냈습니다.#!"
 panum_physician_achievement_pneumothorax_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHim] 가장 위대한 발명품은 [Scope.GetCharacter.GetHerHim] #o 인공기흉 유도 장치#!입니다. 이것으로 폐를 허탈시켜 결핵 치료에 보탬이 되었습니다.#! "
 panum_physician_achievement_thoracoplasty_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 뛰어난 수술 실력 덕분에 #o 흉곽성형술이라 부르는 폐수술의 획기적인 발전#!을 불러왔으며 결핵 환자의 치료법을 개선시켰습니다.#!"
 panum_physician_achievement_attended_medical_congress_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 #o 의학 학술회의#!에 참석하여 자신의 견해를 나눈 경험이 있습니다.#!"
 mendelejew_chemist_achievement_aspirin_inventor_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] 박사는 #o 아스피린#!의 발명에 핵심적인 역할을 한 사람으로 평가되며, 수많은 환자들의 고통을 덜었을 뿐만 아니라 제약업계에도 혁명을 불러왔습니다.#!"
 panum_physician_achievement_xray_inventor_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.GetLastNameNoFormatting] 박사는 #o X선#!의 발명으로 의학계과 물리학계에 동시에 혁신을 불러일으킨 세계를 대표하는 물리학자로 평가받고 있습니다.#!"
 panum_physician_achievement_bloodtypes_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #o A, B, AB, O로 나뉘는 혈액형#!을 발견하여 혈액에 대한 이해도를 높이고 수혈의 성공률을 향상시키는 데 중대한 역할을 하였습니다.#!"
 panum_physician_achievement_ecg_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 개발한 #o 심전도(ECG)#!는 심장의 전기활동을 측정할 수 있게 하였으며 병원 운영에 획기적인 발전을 이룩하였습니다.#!"
 panum_physician_achievement_transplantation_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #o 최초의 장기 이식 수술#!로 의학사에 한 획을 그었습니다.#!"
 panum_physician_achievement_stereotactic_method_inventor_loc: "\n #indent_newline:3 • 오늘날까지 이 분이 개발한 #o 정위수술법#!은 뇌수술 분야의 획기적인 발견으로 여겨집니다.#!"
 panum_physician_achievement_cardiopulmonary_bypass_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #o 심폐체외순환#!을 개발하여 현대 의학의 정수를 이루어냈습니다.#!"
 panum_physician_achievement_endoscope_inventor_loc: "\n #indent_newline:3 • 이 분이 개발한 #o 내시경#!은 인체의 내부를 최초로 검사할 수 있게 한 공로로 특별히 이름을 남겼습니다.#!"
 panum_physician_achievement_ophthalmoscope_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 안과 질환 검사를 용이하게 하는 #o 검안경#!의 발명으로 안과학에 상당히 귀중한 공헌을 해냈습니다.#!"
 panum_physician_achievement_chemotherapy_inventor_loc: "\n #indent_newline:3 • 박사가 개발한 #o 화학요법#!은 여러 약물을 이용하여 제일 치료하기 어려운 질병까지 치료할 수 있게 하였으며, 암 환자들에게도 살아갈 희망을 안기게 하였습니다.#!"
 panum_physician_achievement_iron_lung_inventor_loc: "\n #indent_newline:3 • 이 분이 소아마비 환자의 생명 유지를 위해 개발한 #o 최초의 음압 인공호흡기#!는 이 시대 가장 놀라운 공학적 업적으로 꼽히고 있습니다.#!"
 panum_physician_achievement_military_medicine_project_finished_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #o 군의학 분야의 최신 기술 개발#!로 군의료 체계를 세계 최고 수준으로 끌어올렸습니다.#!"
 panum_physician_achievement_inaugurated_asylum_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 정신질환자에게 포괄적이고 인도적인 보탬이 될 수 있도록 우리나라 #o 최초의 정신 병원#!을 설립하는 데 핵심적인 역할을 하였습니다.#!"
 panum_physician_achievement_anthrax_disease_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #o 탄저병을 집중 연구#!하였으며 효과적인 예방법과 치료법을 개발하였습니다.#!"
 panum_physician_achievement_goiter_disease_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #o 갑상선종을 집중 연구#!하였으며 효과적인 예방법과 치료법을 개발하였습니다.#!"
 panum_physician_achievement_nephrolithiasis_disease_loc: "Goiter\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #o 신장결석을 집중 연구#!하였으며 효과적인 예방법과 치료법을 개발하였습니다.#!"
 panum_physician_achievement_pellagra_disease_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #o 펠라그라를 집중 연구#!하였으며 효과적인 예방법과 치료법을 개발하였습니다.#!"
 panum_physician_achievement_rickets_disease_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #o 구루병을 집중 연구#!하였으며 효과적인 예방법과 치료법을 개발하였습니다.#!"
 panum_physician_achievement_syphilis_disease_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #o 매독을 집중 연구#!하였으며 효과적인 예방법과 치료법을 개발하였습니다.#!"
 panum_physician_achievement_tetanus_disease_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #o 파상풍을 집중 연구#!하였으며 효과적인 예방법과 치료법을 개발하였습니다.#!"
 panum_physician_achievement_basketball_inventor_loc: "\n #indent_newline:3 • [Scope.Var('panum_physician_achievement_basketball_inventor_year_var').GetValue|0]년 [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 #o 농구#!라는 새로운 단체 운동을 개발하였습니다.#!"