ar('panum_physician_achievement_endoscope_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_ophthalmoscope_inventor_var').IsSet , Scope.Var('panum_physician_achievement_ophthalmoscope_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_chemotherapy_inventor_var').IsSet , Scope.Var('panum_physician_achievement_chemotherapy_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_attended_medical_congress_var').IsSet , Scope.Var('panum_physician_achievement_attended_medical_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_anthrax_disease_var').IsSet , Scope.Var('panum_physician_achievement_anthrax_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_goiter_disease_var').IsSet , Scope.Var('panum_physician_achievement_goiter_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_nephrolithiasis_disease_var').IsSet , Scope.Var('panum_physician_achievement_nephrolithiasis_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_pellagra_disease_var').IsSet , Scope.Var('panum_physician_achievement_pellagra_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_rickets_disease_var').IsSet , Scope.Var('panum_physician_achievement_rickets_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_syphilis_disease_var').IsSet , Scope.Var('panum_physician_achievement_syphilis_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_tetanus_disease_var').IsSet , Scope.Var('panum_physician_achievement_tetanus_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_military_medicine_project_finished_var').IsSet , Scope.Var('panum_physician_achievement_military_medicine_project_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_inaugurated_asylum_var').IsSet , Scope.Var('panum_physician_achievement_inaugurated_asylum_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_basketball_inventor_var').IsSet , Scope.Var('panum_physician_achievement_basketball_inventor_var').GetFlagName)]"
 panum_physician_no_physician_loc: "이 #V [concept_panum_physician]의 업적#!은 하나라도 달성하면 이곳에 표시됩니다."
 panum_physician_achievements_intro_loc: "#V 이 의사의 업적#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName](은)는 성공한 의사입니다.#!"
 panum_physician_achievement_successful_treatments_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 환자 치료 부문에서 숙련된 경험을 갖췄으며 #o [GetPlayer.MakeScope.Var('panum_physician_var').GetVariable('panum_physician_successful_treatments_var').GetValue]명의 환자를 성공적으로 치료#!하였습니다.#!"
 panum_physician_achievement_epidemiologist_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 여러 질병을 두루 연구하여 #o $panum_epidemiologist$#!가 되었습니다.#!"
 panum_physician_achievement_surgeon_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 수많은 수술에 나서선 훌륭한 #o $panum_surgeon$#!로 평가됩니다.#!"
 panum_physician_achievement_psychiatrist_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 인간의 정신을 두루 연구하여 #o 저명한 $panum_psychiatrist$#!로 알려졌습니다.#!"
 panum_physician_achievement_military_physician_loc: "\n #indent_newline:3 • #o $panum_military_physician$#!으로서 전쟁의 공포를 목격하며 끔찍한 상황에 놓인 사람을 어떻게 치료해야 하는지 대처할 수 있습니다.#!"
 panum_physician_achievement_germ_theory_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #o 매균설#!을 창시하여 수만 명의 목숨을 구해냈습니다.#!"
 panum_physician_achievement_pneumothorax_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHim] 가장 위대한 발명품은 [Scope.GetCharacter.GetHerHim] #o 인공기흉 유도 장치#!입니다. 이것으로 폐를 허탈시켜 결핵 치료에 보탬이 되었습니다.#! "
 panum_physician_achievement_thoracoplasty_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 뛰어난 수술 실력 덕분에 #o 흉곽성형술이라 부르는 폐수술의 획기적인 발전#!을 불러왔으며 결핵 환자의 치료법을 개선시켰습니다.#!"
 panum_physician_achievement_attended_medical_congress_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 #o 의학 학술회의#!에 참석하여 자신의 견해를 나눈 경험이 있습니다.#!"
 mendelejew_chemist_achievement_aspirin_inventor_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] 박사는 #o 아스피린#!의 발명에 핵심적인 역할을 한 사람으로 평가되며, 수많은 환자들의 고통을 덜었을 뿐만 아니라 제약업계에도 혁명을 불러왔습니다.#!"
 panum_physician_achievement_xray_inventor_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.GetLastNameNoFormatting] 박사는 #o X선#!의 발명으로 의학계과 물리학계에 동시에 혁신을 불러일으킨 세계를 대표하는 물리학자로 평가받고 있습니다.#!"
 panum_physician_achievement_bloodtypes_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #o A, B, AB, O로 나뉘는 혈액형#!을 발견하여 혈액에 대한 이해도를 높이고 수혈의 성공률을 향상시키는 데 중대한 역할을 하였습니다.#!"
 panum_physician_achievement_ecg_inventor_loc: "\n #indent_newline:3 • The #o ECG#!, invented by Dr. [Scope.GetCharacter.GetLastNameNoFormatting], made it possible to measure the electrical activity of the heart and represents a milestone in hospital operations.#!"
 panum_physician_achievement_transplantation_inventor_loc: "\n #indent_newline:3 • With the #o First Transplantation#!, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] earned a place in medical history.#!"
 panum_physician_achievement_stereotactic_method_inventor_loc: "\n #indent_newline:3 • To this day, the #o Stereotactic Method#! [Scope.GetCharacter.GetSheHe] invented is considered groundbreaking in brain surgery.#!"
 panum_physician_achievement_cardiopulmonary_bypass_inventor_loc: "\n #indent_newline:3 • With the development of a #o Cardiopulmonary Bypass#!, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] has achieved a masterpiece of modern medicine.#!"
 panum_physician_achievement_endoscope_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis|U] invention of the #o Endoscope#!, with which the human interior could be examined for the first time, is also particularly remembered.#!"
 panum_physician_achievement_ophthalmoscope_inventor_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] invented an apparatus that makes it easier to examine eye diseases and thus rendered an invaluable service to ophthalmology: #o The Ophthalmoscope#!.#!"
 panum_physician_achievement_chemotherapy_inventor_loc: "\n #indent_newline:3 • The #o Chemotherapy#! [Scope.GetCharacter.GetSheHe] developed to treat even the most stubborn illnesses with a variety of medications gives even cancer patients hope that not everything is in vain.#!"
 panum_physician_achievement_iron_lung_inventor_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetHerHis|U] #o Construction of the First Iron Lung#! to sustain the lives of polio patients in critical need is considered one of the most fascinating engineering Achievements of this  age.#!"
 panum_physician_achievement_military_medicine_project_finished_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] has #o invented the latest methods in the field of field medicine#!, making the military medical services one of the most recognized in the world.#!"
 panum_physician_achievement_inaugurated_asylum_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 정신질환자에게 포괄적이고 인도적인 보탬이 될 수 있도록 우리나라 #o 최초의 정신 병원#!을 설립하는 데 핵심적인 역할을 하였습니다.#!"
 panum_physician_achievement_anthrax_disease_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] has #o specialized on Anthrax#! and has developed effective prevention and treatment methods for it.#!"
 panum_physician_achievement_goiter_disease_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] has #o specialized on the Goiter#! and has developed effective prevention and treatment methods for it.#!"
 panum_physician_achievement_nephrolithiasis_disease_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] has #o specialized on the Nephrolithiasis#! and has developed effective prevention and treatment methods for it.#!"
 panum_physician_achievement_pellagra_disease_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] has #o specialized on the Pellagra#! and has developed effective prevention and treatment methods for it.#!"
 panum_physician_achievement_rickets_disease_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] has #o specialized on the Rickets#! and has developed effective prevention and treatment methods for it.#!"
 panum_physician_achievement_syphilis_disease_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] has #o specialized on the Syphilis#! and has developed effective prevention and treatment methods for it.#!"
 panum_physician_achievement_tetanus_disease_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] has #o specialized on the Tetanus#! and has developed effective prevention and treatment methods for it.#!"
 panum_physician_achievement_basketball_inventor_loc: "\n #indent_newline:3 • In [Scope.Var('panum_physician_achievement_basketball_inventor_year_var').GetValue|0] Dr. [Scope.GetCharacter.GetLastNameNoFormatting] has #o invented a new team sport called Basketball#!#!"