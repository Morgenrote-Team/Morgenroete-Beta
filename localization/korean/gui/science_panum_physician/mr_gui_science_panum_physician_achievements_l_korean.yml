num_physician_achievement_inaugurated_asylum_var').IsSet , Scope.Var('panum_physician_achievement_inaugurated_asylum_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_basketball_inventor_var').IsSet , Scope.Var('panum_physician_achievement_basketball_inventor_var').GetFlagName)]" #deepl:2197070343
 panum_physician_no_physician_loc: "[concept_panum_physician]#! 의 #V 업적은 여기에 표시됩니다." #deepl:3202202811
 panum_physician_achievements_intro_loc: "#V 이 업적의 의사#!\n[Scope.GetCharacter.GetFullName] 는 성공적인 의사입니다." #deepl:2011576622

 panum_physician_achievement_successful_treatments_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 환자 치료 경험이 풍부하며 #o 환자 [GetPlayer.MakeScope.Var('panum_physician_var').GetVariable('panum_physician_successful_treatments_var').GetValue] 를 성공적으로 치료한 경험이 있습니다#!." #deepl:2185896488
 panum_physician_achievement_epidemiologist_loc: "\n[Scope.GetCharacter.GetSheHe|U] 질병을 광범위하게 연구하고 #o $panum_epidemiologist$ #! ." #deepl:1702393838
 panum_physician_achievement_surgeon_loc: "\n[Scope.GetCharacter.GetSheHe|U] 많은 수술을 수행하여 좋은 것으로 간주됩니다 #o $panum_surgeon$ #! ." #deepl:3171499380
 panum_physician_achievement_psychiatrist_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 인간의 마음을 폭넓게 연구해왔으며 #o 저명한 $panum_psychiatrist$#! ." #deepl:60079648
 panum_physician_achievement_military_physician_loc: "\ #o $panum_military_physician$ #! [Scope.GetCharacter.GetSheHe] 전쟁의 참혹함을 경험한 사람으로서 끔찍한 상황에서 사람들을 대하는 방법을 알고 있습니다." #deepl:696092700
 panum_physician_achievement_germ_theory_inventor_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 이미 수천 명의 생명을 구한 #o 세균 이론#! 을 발명했습니다." #deepl:2770995117
 panum_physician_achievement_pneumothorax_inventor_loc: "\ [Scope.GetCharacter.GetHerHim] 의 가장 위대한 발명품 중 하나는 인공 기흉을 유도하는 #o 장치#! 입니다. 이는 폐를 붕괴시켜 결핵 치료에 도움이 될 수 있습니다." #deepl:304953214
 panum_physician_achievement_thoracoplasty_inventor_loc: "\ [Scope.GetCharacter.GetHerHis] 수술 기술 덕분에 [Scope.GetCharacter.GetLastNameNoFormatting] 의사는 흉부 성형술이라는 폐 수술에 혁명을 일으킨 #o 시술법#! 을 개발하여 결핵 환자의 치료를 개선할 수 있었습니다." #deepl:3014173894
 panum_physician_achievement_attended_medical_congress_loc: "\n[Scope.GetCharacter.GetSheHe] 최소 한 번 이상의 #o 의료 회의#! 에 참가하고 [Scope.GetCharacter.GetHerHis] 아이디어를 공유했습니다." #deepl:1479296090
 mendelejew_chemist_achievement_aspirin_inventor_loc: "\ [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] 박사는 #o 아스피린#! 의 핵심 발명가로 수많은 환자들에게 통증 완화를 제공했을 뿐만 아니라 제약 산업에 혁명을 일으킨 인물입니다." #deepl:2162525717
 panum_physician_achievement_xray_inventor_loc: "\ #o 엑스레이 발견#!, [GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.GetLastNameNoFormatting] 박사는 의학과 물리학을 동시에 혁명적으로 발전시킨 세계적인 물리학자 중 한 명으로 꼽힙니다." #deepl:34275984
 panum_physician_achievement_bloodtypes_inventor_loc: "\A, B, AB 및 0#! 과 같은 다양한 #o 혈액형을 발견함으로써 [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 혈액에 대해 더 많이 이해하고 수혈이 더 성공적으로 이루어지도록 하는 데 중요한 역할을 했습니다." #deepl:3740473168
 panum_physician_achievement_ecg_inventor_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 발명한 #o ECG#! 는 심장의 전기적 활동을 측정할 수 있게 해주었으며 병원 운영의 이정표가 되었습니다." #deepl:2321856106
 panum_physician_achievement_transplantation_inventor_loc: "\ #o 첫 이식#! 을 통해 [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 의학 역사에 한 자리를 차지했습니다." #deepl:2933890993
 panum_physician_achievement_stereotactic_method_inventor_loc: "\ #o 정위법#! [Scope.GetCharacter.GetSheHe] 발명된 정위법은 오늘날까지 뇌 수술 분야에서 획기적인 것으로 평가받고 있습니다." #deepl:147308326
 panum_physician_achievement_cardiopulmonary_bypass_inventor_loc: "\ #o 심폐 우회술#! 의 개발로 [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 현대 의학의 걸작을 완성했습니다." #deepl:3531788201
 panum_physician_achievement_endoscope_inventor_loc: "\n[Scope.GetCharacter.GetHerHis|U] 인체 내부를 처음으로 검사할 수 있는 #o 내시경#! 의 발명도 특히 기억에 남습니다." #deepl:2202274893
 panum_physician_achievement_ophthalmoscope_inventor_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 안과 질환을 쉽게 검사할 수 있는 장치를 발명하여 안과에 귀중한 서비스를 제공했습니다: #o 검안경#!." #deepl:657308744
 panum_physician_achievement_chemotherapy_inventor_loc: "\다양한 약물로 가장 완고한 질병도 치료할 수 있도록 개발된 #o 화학 요법#! [Scope.GetCharacter.GetSheHe] 은 암 환자들에게도 모든 것이 헛되지 않았다는 희망을 줍니다." #deepl:1291980204
 panum_physician_achievement_iron_lung_inventor_loc: "\[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetHerHis|U] #o  소아마비 환자의 생명을 유지하기 위한 최초의 철제 폐#! 건설은 이 시대의 가장 흥미로운 공학적 성과 중 하나로 꼽힙니다." #deepl:2605796385
 panum_physician_achievement_military_medicine_project_finished_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #o 야전 의학 분야의 최신 방법#! 을 발명하여 군 의료 서비스를 세계에서 가장 인정받는 의료 서비스 중 하나로 만들었습니다." #deepl:3753274088
 panum_physician_achievement_inaugurated_asylum_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 정신질환자에게 포괄적이고 인도적인 도움을 제공하기 위해 #o 최초의 정신병원#! 을 설립하는 데 중요한 역할을 했습니다." #deepl:2471346129
 panum_physician_achievement_anthrax_disease_loc: "#o \ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 탄저균#! 을 전문으로 연구하며 효과적인 예방 및 치료 방법을 개발했습니다." #deepl:2201385397
 panum_physician_achievement_goiter_disease_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 닥터는 #o 갑상선종#! 전문의로 효과적인 예방 및 치료 방법을 개발했습니다." #deepl:693298154
 panum_physician_achievement_nephrolithiasis_disease_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #o 신결석증#! 전문의로 효과적인 예방 및 치료 방법을 개발했습니다." #deepl:3950905505
 panum_physician_achievement_pellagra_disease_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #o 펠라그라를 전문으로#! 효과적인 예방 및 치료 방법을 개발했습니다." #deepl:1987809959
 panum_physician_achievement_rickets_disease_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #o 구루병#! 전문의로 구루병에 대한 효과적인 예방 및 치료 방법을 개발했습니다." #deepl:660217329
 panum_physician_achievement_syphilis_disease_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #o 매독 전문#! 매독에 대한 효과적인 예방 및 치료 방법을 개발했습니다." #deepl:908555016
 panum_physician_achievement_tetanus_disease_loc: "#o \ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 파상풍#! 을 전문으로 하며 효과적인 예방 및 치료 방법을 개발했습니다." #deepl:1982558023
 panum_physician_achievement_basketball_inventor_loc: "\ [Scope.Var('panum_physician_achievement_basketball_inventor_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 #o 농구라는 새로운 팀 스포츠를 발명했습니다.#!" #deepl:207476415
