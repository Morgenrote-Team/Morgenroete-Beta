 vikelas_custom_no_coach_loc: "[concept_vikelas_coach]의 #V 경험치#!를 표시합니다."
 vikelas_custom_coach_loc: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName](은)는 경험치 [GetPlayer.MakeScope.Var('vikelas_coach_var').GetVariable('vikelas_coach_experience').GetValue|+0] / 150을 가진 [concept_vikelas_coach]입니다. 경험치가 150에 도달하면 기술 특성이 #V $vikelas_coach_senior$#!로 진급하게 됩니다."
 vikelas_custom_famous_coach_loc: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName](은)는 [Concept('concept_vikelas_coach','$vikelas_coach_senior$')]입니다. [ROOT.Var('vikelas_coach_var').GetCharacter.GetSheHe]는 세계 최고의 감독 중 한 명입니다."
