 MR_FIFA_BOARD_TOOLTIP: "#header FIFA 위원회#!\n FIFA 위원회 참여국은 다음과 같습니다.\n\n[GetGlobalVariable('vikelas_fifa_board_member_1_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_2_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_3_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_4_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_5_global_var').GetCountry.GetName|V]"
 MR_FIFA_PRESIDENT_TOOLTIP: "#header FIFA 회장#!\n FIFA 회장은 [GetGlobalVariable('vikelas_fifa_president_global_var').GetCountry.GetName]입니다."
 MR_HIRE_COACH_BUTTON_TT: "#T 국가대표 감독 선임#!\n 국가대표 감독은 경기 결과 향상에 주력합니다. 국가대표 감독의 주 종목은 축구, 야구, 농구, 크리켓 등 국가 체육이 무엇인지에 달렸습니다. 감독이 기대에 부응하지 못할 경우, 최소 3년이 경과한 끝에 교체될 수 있습니다. \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ADAPT_NATIONAL_SPORT_BUTTON: "국기 종목 지정"
 MR_ADAPT_NATIONAL_SPORT_BUTTON_TT: "#T 국기 종목 지정#!\n 우리나라에서 인기를 얻은 특정 체육 종목을 국기(國技) 종목으로 지정하여, 구단 수립과 해외 확산을 도모할 수 있습니다. 이는 국기 조직의 필수 조건이기도 합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHANGE_NATIONAL_SPORT_BUTTON: "국기 종목 변경"
 MR_CHANGE_NATIONAL_SPORT_BUTTON_TT: "#T 국기 종목 변경#!\n 국기(國技) 종목 변경은 최소 하나 이상의 다른 체육 종목이 인기를 얻었을 때에만 가능합니다. 기존 체육계에서 불만을 표할 수도 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_sports_coach_national_sport: "국기 종목"
 vikelas_national_sport_loc: "[Country.MakeScope.Var('vikelas_national_sport_var').GetFlagName]"
 vikelas_no_national_sport_loc: "없음"
 MR_SCHOOL_SPORTS_STADIUM_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V 체육 경기장 [concept_production_method]을 활성화한 [GetBuildingType('building_vikelas_sports').GetName]#!이 최소 한 개 이상#!"
 MR_INTERNATIONAL_SPORTS_EVENT_BUTTON: "연방권 체육 대회"
 MR_INTERNATIONAL_SPORTS_EVENT_BUTTON_TT: "#T 연방권 체육 대회#!\n 세력 블록의 대표국이거나 여러 종속국의 종주국이라면, 우리나라와 국기 종목이 동일한 속국들을 모아 국제 선수권 대회를 개최할 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_INTERNATIONAL_SPORTS_MEMBER_TRIGGER_TT: "#default_text #default_text [Country.MakeScope.Var('vikelas_national_sport_var').GetFlagName]를 국기 종목으로 채택한 [GetPlayer.GetName]의 #V 세력 구성국#!이 #G 3개국#! 이상 혹은 #V 종속국#!이 #G 4개국#! 이상#!"
 MR_INTERNATIONAL_SPORTS_NO_FIFA_TRIGGER_TT: "#default_text [GetPlayer.GetName](이)가 FIFA의 회원국이 #R 아님#!#!"
 MR_INTERNATIONAL_SPORTS_MODIFIER_TRIGGER_TT: "#default_text [GetPlayer.GetName](은)는 #V $vikelas_international_sports_event_modifier$#!나 #V $vikelas_recent_international_sports_event_modifier$#![Concept('concept_modifier','$concept_modifiers$')]를 개최하지 #R 않았습니다#!.#!"
 MR_FIFA_MEMBER_TRIGGER_TT: "#default_text #V FIFA 회원국#!의 규모가 #BLUE 16개국 이상#!이어야 합니다. 현재 FIFA의 회원국 규모는 #G [GetGlobalVariable('vikelas_num_fifa_members_global_var').GetValue]개국#!입니다.#!"
 MR_JOIN_FIFA_BUTTON: "FIFA 가입"
 MR_JOIN_FIFA_BUTTON_TT: "#T FIFA 가입#!\n 축구 월드컵에 참가하려면 FIFA 가입이 필요합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_FIFA_BUTTON: "FIFA 탈퇴"
 MR_LEAVE_FIFA_BUTTON_TT: "#T FIFA 탈퇴 #!\n FIFA는 고유의 이상에 모두 반하고 있으며, 비정부기구임에도 부패하고 상업화되었기에 탈퇴하는 것이 최선입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_FIFA_TRIGGER_TT: "#default_text [GetPlayer.GetName](이)가 FIFA의 #V 의장국#!도, #V 이사국#!도 #R 아님#!#!"
 MR_SCHOOL_SPORTS_BUTTON: "학교 체육 도입"
 MR_SCHOOL_SPORTS_BUTTON_TT: "#T [GetPlayer.GetName]에 학교 체육 도입#!\n 학교 체육 과목을 도입하면 운동선수로서의 자질을 갖춘 인재를 더 많이 확보하고 올림픽에서 더 나은 성적을 거둘 수 있게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SCHOOL_SPORTS_PUBLIC_SCHOOLS_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 [GetLawType('law_public_schools').GetName][concept_law]를 제정함#!"
 MR_SCHOOL_SPORTS_IG_ATHLETE_LEADER_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 #V [concept_in_government][concept_interest_group]#!의 대표이면서 #V 운동선수 특성#!을 지닌 인물이 존재함#!"
 MR_SCHOOL_SPORTS_SPORTS_FACILITIES_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 #V 체육 시설 [concept_production_method]을 활성화#!한 [GetBuildingType('building_government_administration').GetName]가 최소 한 개 이상#!"
 MR_WORLDCUP_BUTTON: "축구 월드컵"
 MR_WORLDCUP_BUTTON_TT: "#T 축구 월드컵 대회 조직#!\n 월드컵은 국가 대표팀이 출전하는 축구 대회입니다. 각 대표팀은 매 4년마다 월드컵 본선에 진출할 수 있습니다. 4주간의 토너먼트에서 최고의 성적을 거둔 국가 대표팀이 세계 챔피언에 등극하게 됩니다. 대회의 조직과 후원은 국제축구연맹 (FIFA)에서 전담하고 있습니다. 초대 월드컵 대회는 1930년 우루과이에서 개최되었으며 개최국 우루과이가 우승을 차지했습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_FOOTBALL_WORLDCUP_FOOTBALL_ASSOCIATION_TRIGGER_TT: "#default_text 축구 협회를 설립한 국가가 최소 #G 10개국#!에 달함#!"
 MR_FIFA_BUTTON_TT: "#T FIFA 창설#!\n 축구의 전파로 국가 간 경기 수가 증가함에 따라 범국가적 축구 조직 기구의 필요성이 대두되었습니다. 국제축구연맹(FIFA) 축구와 풋살, 비치발리볼을 관장하는 국제 자율규제 기구입니다. 1904년 5월 21일에 설립된 FIFA는 세계에서 가장 오랜 역사와 큰 규모를 자랑하는 비정부기구(NGO)입니다. FIFA의 ​​설립으로 각국 대표팀 간의 국제 경기가 가능해졌고, 각국 감독들은 경기를 통해 기량을 향상시킬 수 있게 되었습니다. 이는 곧 월드컵 창설로 이어졌습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_FIFA_TRIGGER_TT: "#default_text 축구 협회를 설립한 국가가 최소 #G 6개국#!에 달함#!"
 vikelas_fifa_board_member_tt: "[GetPlayer.GetName](이)가 FIFA 이사국이 됩니다."
 vikelas_become_fifa_president_tt: "[GetPlayer.GetName](이)가 FIFA 의장국이 됩니다."
 MR_FIFA_PRESIDENT_BUTTON: "FIFA 의장국 되기"
 MR_FIFA_PRESIDENT_BUTTON_TT: "#T FIFA 의장국 선출#!\n현임 FIFA 의장국이 없다면 그 자위를 넘겨받을 수 있습니다. 우리가 국제축구연맹 본부를 소유하고 있다는 전제 하에서 말입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_FIFA_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 [GetBuildingType('building_vikelas_fifa').GetName]를 소유함#!"
 MR_HIRE_COACH_BUTTON: "국가대표 감독 선임"
 MR_NO_RECENT_COACH_TRIGGER_TT: "#default_text #V 지난 3년 간#! [concept_vikelas_coach]이 교체되지 않았습니다."
 NATIONAL_COACH_HEADER_TEXT: "감독"
