l_korean:
 MR_SPORTS_COACH_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'vikelas_coach_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'vikelas_coach_no_coach_achievements_loc')]"
 vikelas_coach_achievements_loc: "$vikelas_coach_achievements_intro_loc$[AddLocalizationIf( Scope.Var('vikelas_coach_world_championship_var').IsSet , Scope.Var('vikelas_coach_world_championship_var').GetFlagName)][AddLocalizationIf( Scope.Var('vikelas_coach_vice_world_championship_var').IsSet , Scope.Var('vikelas_coach_vice_world_championship_var').GetFlagName)]"
 vikelas_coach_no_coach_achievements_loc: "이  #V [concept_vikelas_coach]의 업적#!은 하나라도 달성하면 이곳에 표시됩니다."
 vikelas_coach_achievements_intro_loc: "#V 이 감독의 업적#!\n#indent_newline:3 •[Scope.GetCharacter.GetFullName](은)는 성공한 감독입니다.#!"
 vikelas_coach_world_championship_loc: "\n#indent_newline:3 •[Scope.Var('vikelas_coach_world_championship_year_var').GetValue|0]년에 [Scope.GetCharacter.GetLastNameNoFormatting]는 [Scope.GetCharacter.GetHerHis] 팀을 이끌고 #V FIFA 월드컵 우승#!을 차지했습니다.#!"
 vikelas_coach_vice_world_championship_loc: "\n#indent_newline:3 •[Scope.Var('vikelas_coach_vice_world_championship_year_var').GetValue|0]년에 [Scope.GetCharacter.GetLastNameNoFormatting]는 [Scope.GetCharacter.GetHerHis] 팀을 이끌고 #V FIFA 월드컵 준우승#!을 차지했습니다.#!"