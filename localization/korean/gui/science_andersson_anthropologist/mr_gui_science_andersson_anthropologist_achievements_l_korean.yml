 andersson_anthropologist_achievement_attended_origin_congress_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 현대 인류의 기원#!에 관한 학술 대회에 참석하셨습니다.#!"
 andersson_anthropologist_achievement_exposed_piltdown_fraud_loc: "\n #indent_newline:3 • 이 분 덕분에 #V 필트다운 인류가 사기임이 밝혀졌습니다#!.#!"
 andersson_anthropologist_achievement_invented_anthropology_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 인류의 뼈와 골격을 꼼꼼하고 정확하게 기록한 최초의 과학자입니다. [Scope.GetCharacter.GetSheHe|U]는 #V 인류학의 선구자#!로 여겨집니다.#!"
 andersson_anthropologist_no_anthropologist_loc: "이 #V [concept_andersson_anthropologist]의 업적#!은 하나라도 달성하면 이곳에 표시됩니다."
