 andersson_anthropologist_achievement_normal_level_anthropologist_overview_loc: "뛰어난 [concept_lepsius_anthropologist]"
 andersson_anthropologist_achievement_total_human_fossils_anthropologist_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] has found a total of [Scope.Var('lepsius_total_human_fossils_anthropologist_var').GetValue|V0] Human Fossils. Those fossils consist of "
 andersson_anthropologist_achievement_no_human_fossils_anthropologist_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] has not found any Human Fossils yet.#!"
 andersson_anthropologist_achievement_total_cromagnon_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_cromagnon_fossils_anthropologist_var').GetValue|V0]개의 크로마뇽 화석,"
