 andersson_anthropologist_achievement_completed_erectus_anthropologist_loc: "\이전에 알려지지 않았던 #V 호모 에렉투스가 인간 종으로 파악될 수 있게 된 것은 [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHis] 의 공로#!." #deepl:991432050
 andersson_anthropologist_achievement_completed_australopithecus_anthropologist_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 오스트랄로피테쿠스의 #V 비밀을 최초로 해독하고#! 그 생활 방식과 생김새에 대한 결론을 도출하는 데 성공했습니다." #deepl:994811918
 andersson_anthropologist_achievement_completed_paranthropus_anthropologist_loc: "#V \몇 개의 뼈로 선사 시대 사람#! 을 재구성하여 그의 생활 환경에 대한 결론을 도출하는 데 성공한 사람은 많지 않습니다. [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 파란트로푸스#! 를 통해 이 작업에 성공했습니다." #deepl:2683346481
