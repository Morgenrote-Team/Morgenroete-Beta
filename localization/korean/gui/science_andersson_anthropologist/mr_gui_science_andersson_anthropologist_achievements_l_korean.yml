 andersson_anthropologist_achievement_discovered_neoanthropus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] has gained international renown due to the discovery of a previously unknown #V specimen of Neoanthropus#!.#!"
 andersson_anthropologist_achievement_discovered_palaeanthropus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] deserves the honor of having discovered a new #V species of Paleanthropus#!.#!"
 andersson_anthropologist_achievement_discovered_pithecanthropus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] went down in history because [Scope.GetCharacter.GetLastSheHe] was the first to discover a #V specimen of Pithecanthropus#!.#!"
 andersson_anthropologist_achievement_discovered_australopithecus_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] was the first to succeed in deciphering the first #V secrets of Australopithecus#!.#!"
 andersson_anthropologist_achievement_inaugurated_institute_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] played a pivotal role in the #V Establishment of the Institute of Anthropology & Ethnology#!, educating the masses about human past and present.#!"
 andersson_anthropologist_achievement_vero_skeleton_loc: "\n #indent_newline:3 • [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U] has scientifically #V reconstructed the [GetPlayer.GetCustom('andersson_fossil_vero')] Man#!.#!"
 andersson_anthropologist_achievement_lagoa_santa_skeleton_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] was able to #V reconstruct the skeleton of the [GetPlayer.GetCustom('andersson_fossil_lagoa_santa')] Man#!.#!"
 andersson_anthropologist_achievement_cro_magnon_skeleton_loc: "\n #indent_newline:3 • It was to [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis] credit that the #V [GetPlayer.GetCustom('andersson_fossil_cro_magnon')] Man could be reconstructed#!.#!"
 andersson_anthropologist_achievement_boskop_skeleton_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] was successful to #V reconstruct a [GetPlayer.GetCustom('andersson_fossil_boskop')] Man skeleton#!.#!"
 andersson_anthropologist_achievement_tianyuan_skeleton_loc: "\n #indent_newline:3 • Not many people have succeeded in #V trying to reconstruct a prehistoric man#! from a few bones, but Dr. [Scope.GetCharacter.GetLastNameNoFormatting] succeded with the #V [GetPlayer.GetCustom('andersson_fossil_tianyuan')] Man#!.#!"
 andersson_anthropologist_achievement_talgai_skeleton_loc: "\n #indent_newline:3 • [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U] reconstructed a really nice #V skeleton: The [GetPlayer.GetCustom('andersson_fossil_talgai')] Man#!.#!"
 andersson_anthropologist_achievement_neanderthal_skeleton_loc: "\n #indent_newline:3 • [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U] has scientifically #V reconstructed the [GetPlayer.GetCustom('andersson_fossil_neanderthal')] Man#!.#!"
 andersson_anthropologist_achievement_gibraltar_skeleton_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] was able to #V reconstruct the skeleton of the [GetPlayer.GetCustom('andersson_fossil_gibraltar')] Man#!.#!"
 andersson_anthropologist_achievement_spy_skeleton_loc: "\n #indent_newline:3 • It was to [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis] credit that the #V [GetPlayer.GetCustom('andersson_fossil_spy')] Man could be reconstructed#!.#!"
 andersson_anthropologist_achievement_krapina_skeleton_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] was successful to #V reconstruct a [GetPlayer.GetCustom('andersson_fossil_krapina')] Man skeleton#!.#!"
 andersson_anthropologist_achievement_galilee_skeleton_loc: "\n #indent_newline:3 • Not many people have succeeded in #V trying to reconstruct a prehistoric man#! from a few bones, but Dr. [Scope.GetCharacter.GetLastNameNoFormatting] succeded with the #V [GetPlayer.GetCustom('andersson_fossil_galilee')] Man#!.#!"
 andersson_anthropologist_achievement_heidelberg_skeleton_loc: "\n #indent_newline:3 • [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U] has scientifically #V reconstructed the [GetPlayer.GetCustom('andersson_fossil_heidelberg')] Man#!.#!"
 andersson_anthropologist_achievement_rhodesian_skeleton_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] was able to #V reconstruct the skeleton of the [GetPlayer.GetCustom('andersson_fossil_rhodesian')] Man#!.#!"
 andersson_anthropologist_achievement_peking_skeleton_loc: "\n #indent_newline:3 • It was to [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis] credit that the #V [GetPlayer.GetCustom('andersson_fossil_peking')] Man could be reconstructed#!.#!"
 andersson_anthropologist_achievement_java_skeleton_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] was successful to #V reconstruct a [GetPlayer.GetCustom('andersson_fossil_java')] Man skeleton#!.#!"
 andersson_anthropologist_achievement_australopithecus_skeleton_loc: "\n #indent_newline:3 • [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U] has scientifically #V reconstructed the Australopithecus#!.#!"
 andersson_anthropologist_achievement_our_ancestors_loc: "\n #indent_newline:3 • [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U] organized an #V exhibition on the evolutionary history of humans#!.#!"
 andersson_anthropologist_achievement_craniometry_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is considered an expert in the field of #V craniometry#!.#!"
 andersson_anthropologist_achievement_homo_sapiens_systemization_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetFullNameNoFormatting] has proposed a complete revision of the existing Neoanthropus system and assigns all the various finds to a separate species: #V Homo Sapiens#!.#!"
