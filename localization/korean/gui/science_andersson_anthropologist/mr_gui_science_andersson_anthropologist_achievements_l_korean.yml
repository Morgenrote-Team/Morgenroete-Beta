 andersson_anthropologist_achievement_homo_erectus_systemization_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetFullNameNoFormatting] has proposed a complete revision of the existing Pithecanthropus system and assigns all the various finds to a separate species: #V Homo Erectus#!.#!"
