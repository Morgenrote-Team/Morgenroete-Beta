 andersson_anthropologist_achievement_total_human_fossils_anthropologist_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 총 [Scope.Var('andersson_total_human_fossils_anthropologist_var').GetValue|V0]개의 인류 화석을 발견했습니다. 화석의 종류로는 "
