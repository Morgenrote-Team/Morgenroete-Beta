t_achievement_completed_erectus_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_erectus_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_australopithecus_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_australopithecus_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_paranthropus_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_paranthropus_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_heidelbergensis_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_heidelbergensis_anthropologist_var').GetFlagName)]"
 lepsius_anthropologist_no_anthropologist_loc: "이 [concept_lepsius_anthropologist]의 #V 업적#!은 하나 이상 달성하면 여기에 표시됩니다."
 lepsius_anthropologist_achievements_intro_loc: "#V 이 인류학자의 업적#!\n[Scope.GetCharacter.GetFullName]는 [Scope.GetCharacter.GetCustom('lepsius_anthropologist_experience_level_type')]입니다."
 andersson_anthropologist_achievement_famous_level_anthropologist_overview_loc: "유명한 [concept_lepsius_anthropologist]"
 andersson_anthropologist_achievement_experienced_level_anthropologist_overview_loc: "숙련된 [concept_lepsius_anthropologist]"
 andersson_anthropologist_achievement_normal_level_anthropologist_overview_loc: "뛰어난 [concept_lepsius_anthropologist]"
 andersson_anthropologist_achievement_total_human_fossils_anthropologist_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] 박사는 총 [Scope.Var('lepsius_total_human_fossils_anthropologist_var').GetValue|V0]개의 인류 화석을 발견했습니다. 그 화석들은 다음으로 구성되어 있습니다."
 andersson_anthropologist_achievement_no_human_fossils_anthropologist_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] 박사는 아직 인류 화석을 발견하지 못했습니다."
 andersson_anthropologist_achievement_total_cromagnon_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_cromagnon_fossils_anthropologist_var').GetValue|V0]개의 크로마뇽 화석,"
 andersson_anthropologist_achievement_total_cromagnon_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_cromagnon_fossils_anthropologist_var').GetValue|V0]개의 크로마뇽 화석"
 andersson_anthropologist_achievement_total_neanderthalensis_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_neanderthalensis_fossils_anthropologist_var').GetValue|V0]개의 네안데르탈인 화석,"
 andersson_anthropologist_achievement_total_neanderthalensis_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_neanderthalensis_fossils_anthropologist_var').GetValue|V0]개의 네안데르탈인 화석"
 andersson_anthropologist_achievement_total_erectus_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_erectus_fossils_anthropologist_var').GetValue|V0]개의 호모 에렉투스 화석,"
 andersson_anthropologist_achievement_total_erectus_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_erectus_fossils_anthropologist_var').GetValue|V0]개의 호모 에렉투스 화석"
 andersson_anthropologist_achievement_total_australopithecus_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_australopithecus_fossils_anthropologist_var').GetValue|V0] Australopithecus Fossils, "
 andersson_anthropologist_achievement_total_australopithecus_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_australopithecus_fossils_anthropologist_var').GetValue|V0] Australopithecus Fossils"
 andersson_anthropologist_achievement_total_paranthropus_fossils_anthropologist_loc: "[Scope.Var('lepsius_total_paranthropus_fossils_anthropologist_var').GetValue|V0] Paranthropus Fossils"
 andersson_anthropologist_achievement_total_identified_human_fossils_anthropologist_loc: "\n[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe|U] identified a total of [Scope.Var('lepsius_total_identified_human_fossils_anthropologist_var').GetValue|V0] Human Fossils"
 andersson_anthropologist_achievement_attended_origin_congress_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] attended the Congress on the #V Origin of the Modern Human#!."
 andersson_anthropologist_achievement_exposed_piltdown_fraud_loc: "\nThanks to [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHim] the #V Piltdown Human was exposed as a fraud#!."
 andersson_anthropologist_achievement_invented_anthropology_loc: "Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is the first scientist to record human bones and skeletons meticulously and very precisely. [Scope.GetCharacter.GetSheHe] is seen as the #V pioneer of Anthropology#!."
 andersson_anthropologist_achievement_completed_cromagnon_anthropologist_loc: "\n[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe|U] has scientifically #V classified the Cro-Magnon#! for the first time."
 andersson_anthropologist_achievement_completed_neanderthalensis_anthropologist_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] was the first person to #V position the Neanderthaler in the systematics of prehistoric man#!."
 andersson_anthropologist_achievement_completed_erectus_anthropologist_loc: "\nIt was to [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHis] credit that the previously unknown #V Homo Erectus became graspable as a human species#!."
 andersson_anthropologist_achievement_completed_australopithecus_anthropologist_loc: "\nProfessor [Scope.GetCharacter.GetLastNameNoFormatting] was the first to succeed in deciphering the first #V secrets of Australopithecus#! and to draw conclusions about its way of life and appearance."
 andersson_anthropologist_achievement_completed_paranthropus_anthropologist_loc: "\nNot many people have succeeded in #V trying to reconstruct a prehistoric man#! from a few bones, thus enabling conclusions to be drawn about his living environment. Dr. [Scope.GetCharacter.GetLastNameNoFormatting] succeeded in this with the #V Paranthropus#!."