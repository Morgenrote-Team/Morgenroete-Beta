 andersson_anthropologist_achievement_total_neanderthalensis_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_neanderthalensis_fossils_anthropologist_var').GetValue|V0]개의 네안데르탈인 화석,"
 andersson_anthropologist_achievement_total_neanderthalensis_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_neanderthalensis_fossils_anthropologist_var').GetValue|V0]개의 네안데르탈인 화석"
 andersson_anthropologist_achievement_total_erectus_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_erectus_fossils_anthropologist_var').GetValue|V0]개의 호모 에렉투스 화석,"
 andersson_anthropologist_achievement_total_erectus_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_erectus_fossils_anthropologist_var').GetValue|V0]개의 호모 에렉투스 화석"
 andersson_anthropologist_achievement_total_australopithecus_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_australopithecus_fossils_anthropologist_var').GetValue|V0]개의 오스트랄로피테쿠스 화석,"
 andersson_anthropologist_achievement_total_australopithecus_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_australopithecus_fossils_anthropologist_var').GetValue|V0]개의 오스트랄로피테쿠스 화석"
 andersson_anthropologist_achievement_total_paranthropus_fossils_anthropologist_loc: "[Scope.Var('lepsius_total_paranthropus_fossils_anthropologist_var').GetValue|V0]개의 파란트로푸스 화석"
 andersson_anthropologist_achievement_total_identified_human_fossils_anthropologist_loc: "\n #indent_newline:3 • [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe|U] identified a total of [Scope.Var('lepsius_total_identified_human_fossils_anthropologist_var').GetValue|V0] Human Fossils.#!"
 andersson_anthropologist_achievement_attended_origin_congress_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] attended the Congress on the #V Origin of the Modern Human#!.#!"
 andersson_anthropologist_achievement_exposed_piltdown_fraud_loc: "\n #indent_newline:3 • Thanks to [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHim] the #V Piltdown Human was exposed as a fraud#!.#!"
 andersson_anthropologist_achievement_invented_anthropology_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is the first scientist to record human bones and skeletons meticulously and very precisely. [Scope.GetCharacter.GetSheHe] is seen as the #V pioneer of Anthropology#!.#!"
 andersson_anthropologist_achievement_completed_cromagnon_anthropologist_loc: "\n #indent_newline:3 • [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe|U] has scientifically #V classified the Cro-Magnon#! for the first time.#!"
 andersson_anthropologist_achievement_completed_neanderthalensis_anthropologist_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] was the first person to #V position the Neanderthaler in the systematics of prehistoric man#!.#!"
 andersson_anthropologist_achievement_completed_erectus_anthropologist_loc: "\n #indent_newline:3 • It was to [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHis] credit that the previously unknown #V Homo Erectus became graspable as a human species#!.#!"
 andersson_anthropologist_achievement_completed_australopithecus_anthropologist_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] was the first to succeed in deciphering the first #V secrets of Australopithecus#! and to draw conclusions about its way of life and appearance.#!"
 andersson_anthropologist_achievement_completed_paranthropus_anthropologist_loc: "\n #indent_newline:3 • Not many people have succeeded in #V trying to reconstruct a prehistoric man#! from a few bones, thus enabling conclusions to be drawn about his living environment. Dr. [Scope.GetCharacter.GetLastNameNoFormatting] succeeded in this with the #V Paranthropus#!.#!"