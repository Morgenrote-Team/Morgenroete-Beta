t_achievement_completed_erectus_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_erectus_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_australopithecus_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_australopithecus_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_paranthropus_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_paranthropus_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_heidelbergensis_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_heidelbergensis_anthropologist_var').GetFlagName)]"
 lepsius_anthropologist_no_anthropologist_loc: "이 #V [concept_lepsius_anthropologist]의 업적#!은 하나라도 달성하면 이곳에 표시됩니다."
 lepsius_anthropologist_achievements_intro_loc: "#V 이 인류학자의 업적 #!\n#indent_newline:3 • [Scope.GetCharacter.GetFullName](은)는 [Scope.GetCharacter.GetCustom('lepsius_anthropologist_experience_level_type')]입니다.#!"
 andersson_anthropologist_achievement_famous_level_anthropologist_overview_loc: "저명한 [concept_lepsius_anthropologist]"
 andersson_anthropologist_achievement_experienced_level_anthropologist_overview_loc: "경험 많은 [concept_lepsius_anthropologist]"
 andersson_anthropologist_achievement_normal_level_anthropologist_overview_loc: "뛰어난 [concept_lepsius_anthropologist]"
 andersson_anthropologist_achievement_total_human_fossils_anthropologist_loc: "\n #indent_newline:3 [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 총 [Scope.Var('lepsius_total_human_fossils_anthropologist_var').GetValue|V0]개의 인류 화석을 발견했습니다. 그 화석들은 다음으로 구성되어 있습니다."
 andersson_anthropologist_achievement_no_human_fossils_anthropologist_loc: "\n #indent_newline:3 [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 아직 인류 화석을 발견하지 못했습니다.#!"
 andersson_anthropologist_achievement_total_cromagnon_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_cromagnon_fossils_anthropologist_var').GetValue|V0]개의 크로마뇽 화석,"
 andersson_anthropologist_achievement_total_cromagnon_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_cromagnon_fossils_anthropologist_var').GetValue|V0]개의 크로마뇽 화석"
 andersson_anthropologist_achievement_total_neanderthalensis_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_neanderthalensis_fossils_anthropologist_var').GetValue|V0]개의 네안데르탈인 화석,"
 andersson_anthropologist_achievement_total_neanderthalensis_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_neanderthalensis_fossils_anthropologist_var').GetValue|V0]개의 네안데르탈인 화석"
 andersson_anthropologist_achievement_total_erectus_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_erectus_fossils_anthropologist_var').GetValue|V0]개의 호모 에렉투스 화석,"
 andersson_anthropologist_achievement_total_erectus_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_erectus_fossils_anthropologist_var').GetValue|V0]개의 호모 에렉투스 화석"
 andersson_anthropologist_achievement_total_australopithecus_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_australopithecus_fossils_anthropologist_var').GetValue|V0]개의 오스트랄로피테쿠스 화석,"
 andersson_anthropologist_achievement_total_australopithecus_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_australopithecus_fossils_anthropologist_var').GetValue|V0]개의 오스트랄로피테쿠스 화석"
 andersson_anthropologist_achievement_total_paranthropus_fossils_anthropologist_loc: "[Scope.Var('lepsius_total_paranthropus_fossils_anthropologist_var').GetValue|V0]개의 파란트로푸스 화석"
 andersson_anthropologist_achievement_total_identified_human_fossils_anthropologist_loc: "\n #indent_newline:3 [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe|U]는 총 [Scope.Var('lepsius_total_identified_human_fossils_anthropologist_var').GetValue|V0]개의 인류 화석을 확인했습니다.#!"
 andersson_anthropologist_achievement_attended_origin_congress_loc: "\n #indent_newline:3 [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 현대 인류의 기원#!에 관한 학술 대회에 참석하셨습니다.#!"
 andersson_anthropologist_achievement_exposed_piltdown_fraud_loc: "\n #indent_newline:3 [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHim] 덕분에 #V 필트다운 인류가 사기임이 밝혀졌습니다#!.#!"
 andersson_anthropologist_achievement_invented_anthropology_loc: "\n #indent_newline:3 [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 인류의 뼈와 골격을 꼼꼼하고 정확하게 기록한 최초의 과학자입니다. [Scope.GetCharacter.GetSheHe]는 #V 인류학의 선구자#!로 여겨집니다.#!"
 andersson_anthropologist_achievement_completed_cromagnon_anthropologist_loc: "\n #indent_newline:3 [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe|U]는 과학적으로 #V 크로마뇽인#!을 최초로 분류했습니다.#!"
 andersson_anthropologist_achievement_completed_neanderthalensis_anthropologist_loc: "\n #indent_newline:3 [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 네안데르탈인을 선사시대 인류 체계에 위치시킨 최초의 인물입니다#!.#!"
 andersson_anthropologist_achievement_completed_erectus_anthropologist_loc: "\n #indent_newline:3 이전에 알려지지 않았던 #V 호모 에렉투스가 인류 종으로 이해되게 한 것은 [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHis]의 공입니다#!.#!"
 andersson_anthropologist_achievement_completed_australopithecus_anthropologist_loc: "\n #indent_newline:3 [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 최초로 #V 오스트랄로피테쿠스의 비밀#!을 해독하고 그 생활 방식과 외모에 관한 결론을 도출하는 데 성공했습니다.#!"
 andersson_anthropologist_achievement_completed_paranthropus_anthropologist_loc: "\n #indent_newline:3 몇 개의 뼈로부터 #V 선사시대 인류 재구성 시도#!에 성공한 사람은 많지 않으며, 이를 통해 그의 생활 환경에 관한 결론을 도출할 수 있습니다. [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 파란트로푸스#!로 이 일을 성공했습니다.#!"