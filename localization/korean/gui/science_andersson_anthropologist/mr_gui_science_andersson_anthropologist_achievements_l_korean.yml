 andersson_anthropologist_achievement_invented_anthropology_loc: "[Scope.GetCharacter.GetLastNameNoFormatting] 박사는 인간의 뼈와 골격을 세심하고 매우 정확하게 기록한 최초의 과학자이며, [Scope.GetCharacter.GetSheHe] 인류학의 #V 선구자#! 로 알려져 있습니다." #deepl:3155653452
