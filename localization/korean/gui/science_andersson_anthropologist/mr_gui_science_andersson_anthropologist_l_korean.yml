 PITHECANTHROPUS_VAR_TT: "#header 피테칸트로푸스 [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]#!\n[GetPlayer.GetName]에서 발견한 @andersson_pithecanthropus_fossil! 피테칸트로푸스 [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]의 수는 [GetPlayer.MakeScope.Var('andersson_pithecanthropus_fossil').GetValue|V0]점\n\n피테칸트로푸스 화석:\n[GetPlayer.GetCustom('andersson_heidelberg_fossil_discovered_type')][GetPlayer.GetCustom('andersson_rhodesian_fossil_discovered_type')][GetPlayer.GetCustom('andersson_peking_fossil_discovered_type')][GetPlayer.GetCustom('andersson_java_fossil_discovered_type')]"
 AUSTRALOPITHECUS_VAR: "@andersson_australopithecus_fossil!  [GetPlayer.MakeScope.Var('andersson_australopithecus_fossil').GetValue|V0]"
 AUSTRALOPITHECUS_VAR_TT: "#header 오스트랄로피테쿠스 [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]#!\n[GetPlayer.GetName]에서 발견한 @andersson_australopithecus_fossil! 오스트랄로피테쿠스 [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]의 수는 [GetPlayer.MakeScope.Var('andersson_australopithecus_fossil').GetValue|V0]점\n\n오스트랄로피테쿠스 화석:\n[GetPlayer.GetCustom('andersson_australopithecus_fossil_discovered_type')]"
