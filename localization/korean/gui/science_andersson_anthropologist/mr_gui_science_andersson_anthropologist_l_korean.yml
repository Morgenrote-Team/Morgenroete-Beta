 PALAEANTHROPUS_VAR: "@andersson_palaeanthropus_fossil!  [GetPlayer.MakeScope.Var('andersson_palaeanthropus_fossil').GetValue|V0]"
 PALAEANTHROPUS_VAR_TT: "#header 팔라에안트로푸스 [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]#!\n[GetPlayer.GetName]에서 발견한 @andersson_palaeanthropus_fossil! 팔라에안트로푸스 [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]의 수는 [GetPlayer.MakeScope.Var('andersson_palaeanthropus_fossil').GetValue|V0]점\n\n팔라에안트로푸스 화석:\n[GetPlayer.GetCustom('andersson_neanderthal_fossil_discovered_type')][GetPlayer.GetCustom('andersson_gibraltar_fossil_discovered_type')][GetPlayer.GetCustom('andersson_spy_fossil_discovered_type')][GetPlayer.GetCustom('andersson_krapina_fossil_discovered_type')][GetPlayer.GetCustom('andersson_galilee_fossil_discovered_type')]"
