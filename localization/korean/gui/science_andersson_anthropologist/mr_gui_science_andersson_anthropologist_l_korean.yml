 MR_ANTHROPOLOGIST_ANTHROPOLOGICAL_RESEARCH_BUTTON: "인류학 연구"
 MR_ANTHROPOLOGIST_ANTHROPOLOGICAL_RESEARCH_BUTTON_TT: "#T 인류학 연구#!\n[concept_andersson_anthropologist]가 우리나라 곳곳의 발굴지를 돌아다니며 [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]과 [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')]을 탐색하기 위한 연구에 집중할 것입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_HOMINID_PROSPECTING_BUTTON: "원시 인류 탐색"
 MR_ANTHROPOLOGIST_HOMINID_PROSPECTING_BUTTON_TT: "#T 원시 인류 탐색#!\n[concept_andersson_anthropologist]와 발굴단이 멸종 인류를 찾아내기 위하여 인류학 발굴지를 탐색할 것입니다. [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]과 [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')]를 찾아낼 수 있습니다. 연대가 오래된 원시 인류일수록 [GetBuildingType('building_andersson_institute').GetName]의 생산 방식을 최신식으로 바꾸어야 발견할 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )] "
 MR_ANTHROPOLOGIST_HOMINID_PROSPECTING_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 다음 지역에 속하는 주를 #n 하나 이상#! 보유함:  [GetGeographicRegion('andersson_geographic_region_neoanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_palaeanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_pithecanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_australopithecus').GetName]#!"
 MR_ANTHROPOLOGIST_IS_SPELEOLOGIST_TRIGGER_TT: "#default_text [concept_andersson_anthropologist]가 #V $andersson_speleologist$#! [concept_character_trait]을 보유#!"
 MR_ANTHROPOLOGIST_EXPOSE_PILTDOWN_FRAUD_BUTTON: "[GetPlayer.GetCustom('andersson_fossil_piltdown')]인의 위조 여부 밝히기"
 MR_ANTHROPOLOGIST_EXPOSE_PILTDOWN_FRAUD_BUTTON_TT: "#T [GetPlayer.GetCustom('andersson_fossil_piltdown')]인의 위조 여부 밝히기#!\n악명 높은 [GetPlayer.GetCustom('andersson_fossil_piltdown')] 화석이 위조된 것일 가능성이 높은 것으로 보입니다. 그렇지만 [GetGlobalVariable('andersson_piltdown_country_global_var').GetCountryDefinition.GetName](은)는 연구원들을 동원하여 이 화석의 엄청난 명예를 무슨 수를 써서라도 지키려 할 것입니다. 이제 거짓을 드러낼 차례가 왔습니다!\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGY_RATING_PILTDOWN_FRAUD_TT: "#default_text [GetPlayer.GetName]에서 인류학계 위신 #V 100점#! 이상 보유#!"
 MR_ANTHROPOLOGY_PILTDOWN_NO_RECENT_TRY_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V $andersson_piltdown_debate_lost_modifier$#! 변화 요인을 보유하지 않음#!"
 MR_ANTHROPOLOGY_PILTDOWN_NO_CURRENT_DEBATE_TRIGGER_TT: "#default_text [GetPlayer.GetCustom('andersson_fossil_piltdown')]인에 관한 토론이 #R 진행되고 있지 않음#!#!"
 MR_ANTHROPOLOGY_PILTDOWN_CAN_BE_EXPOSED_TRIGGER_TT: "#default_text [GetGlobalVariable('andersson_piltdown_country_global_var').GetCountryDefinition.GetName]에서 지난 5년간 [GetPlayer.GetCustom('andersson_fossil_piltdown')]인이 위조라는 주장을 방어하지 못한 적이 있음#!"
 TOTAL_HUMAN_FOSSILS_VAR: "@andersson_human_fossil!  [GetPlayer.MakeScope.Var('andersson_total_human_fossil').GetValue|V0]"
 TOTAL_HUMAN_FOSSILS_VAR_TT: "#header 총 [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] 수#!\n전체 @andersson_human_fossil![Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] [GetGlobalVariable('andersson_global_human_fossil_global_var').GetValue|V0]점 중에 [GetPlayer.GetName]에서 발견한 화석은 총 @andersson_human_fossil![GetPlayer.MakeScope.Var('andersson_total_human_fossil').GetValue|V0]점"
 SPECIAL_HUMAN_FOSSILS_VAR: "@andersson_special_human_fossil_var!  [GetPlayer.MakeScope.Var('andersson_special_human_fossil_var').GetValue|V0]"
 SPECIAL_HUMAN_FOSSILS_VAR_TT: "#header 특별 [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] 수#!\n[GetPlayer.GetName]에서 발견한 @andersson_special_human_fossil_var! 특수 [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]은 총 [GetPlayer.MakeScope.Var('andersson_special_human_fossil_var').GetValue|V0]점\n\n특수 화석:\n[GetPlayer.GetCustom('andersson_piltdown_fossil_discovered_type')][GetPlayer.GetCustom('andersson_paranthropus_fossil_discovered_type')][GetPlayer.GetCustom('andersson_clovis_fossil_discovered_type')][GetPlayer.GetCustom('andersson_dragon_fossil_discovered_type')][GetPlayer.GetCustom('andersson_floresiensis_fossil_discovered_type')]"
 PREHISTORIC_VENUSES_VAR: "@andersson_prehistoric_venus!  [GetPlayer.MakeScope.Var('andersson_prehistoric_venus_var').GetValue|V0]"
