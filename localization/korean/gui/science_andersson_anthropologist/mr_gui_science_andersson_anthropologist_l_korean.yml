 MR_ANTHROPOLOGIST_NEW_SYSTEMATIZATION_BUTTON_TT: "#T New Systematization#!\nThe current classification of finds as different 'men' depending on their location has led to an almost unmanageable abundance of fragmentary names. An experienced anthropologist can use a new theory and systematization to relegate outdated categories and modernize anthropology.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
