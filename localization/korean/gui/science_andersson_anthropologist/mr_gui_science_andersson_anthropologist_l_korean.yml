 MR_PEOPLING_CONGRESS_BUTTON_TT: "#T 인류의 아메리카 정착 학술회의#!\n선사 시대 인류의 아메리카 정착은 어떻게 이루어졌는가? 최근까지만 하더라도 아메리카 대륙에 사람이 정착하게 된 것은 수천 년 전에 불과한 것으로 여겨져 왔다. 하지만 그에 반하는 증거가 점점 더 많이 발견되면서 이러한 관점에 의문을 제기하고 있다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
