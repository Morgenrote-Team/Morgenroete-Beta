 MR_ANTHROPOLOGIST_HOMINID_EXPEDITION_BUTTON: "원시 인류 탐사"
 MR_ANTHROPOLOGIST_HOMINID_EXPEDITION_BUTTON_TT: "#T 원시 인류 탐사#!\n[concept_andersson_anthropologist]와 발굴단이 종속국으로 탐사를 떠나 멸종한 인류를 탐색할 수 있습니다. 자국 영토에서 원시 인류 조사 활동에 나설 때와 유사한 조건이 적용됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_HOMINID_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 다음 지역에 속한 주를 소유 중인 종속국을 #n 하나 이상#! 두고 있음: [GetGeographicRegion('andersson_geographic_region_neoanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_palaeanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_pithecanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_australopithecus').GetName].#!"
 MR_ANTHROPOLOGIST_NOT_HAS_EXPEDITION_MODIFIER_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V $andersson_hominid_expedition_modifier$#! 변화 요인을 #n 보유하지 않음#!#!"
 MR_ANTHROPOLOGIST_CRANIOMETRY_BUTTON: "두개측정"
 MR_ANTHROPOLOGIST_CRANIOMETRY_BUTTON_TT: "#T 두개측정#!\n두개골 측정은 인류학자에게 있어 가장 영예로운 일로 여겨집니다. 인류학자는 자신의 경력에서 단 한차례, 본인이 관심 있는 두개골에 완전히 몰두하여 경험을 증진시키고 새로운 실력을 쌓을 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANDERSSON_25_BONES_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] #V 25점#! 이상 보유#!"
 MR_ANTHROPOLOGIST_NOT_DONE_CRANIOMETRY_TRIGGER_TT: "#default_text 인류학자가 아직 두개측정을 #R 한번도 진행하지 않음#!#!"
 MR_ANTHROPOLOGIST_NEOLITHIC_BUTTON: "신석기 시대"
 MR_ANTHROPOLOGIST_NEOLITHIC_BUTTON_TT: "#T 신석기 시대#!\n일반인에게는 초기 인류의 옛 모습이 여전히 추상적인 영역에 머물러 있습니다. 인류학자가 그 시대의 생활을 생생하게 재현한 전시 공간을 대학에 마련할 수 있습니다. 대학 한 곳 당 하나의 풍경만 재현할 수 있습니다. 본 선택지는 인류학자가 신석기 시대의 풍경을 재현합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_MESOLITHIC_BUTTON: "중석기 시대"
 MR_ANTHROPOLOGIST_MESOLITHIC_BUTTON_TT: "#T 중석기 시대#!\n일반인에게는 초기 인류의 옛 모습이 여전히 추상적인 영역에 머물러 있습니다. 인류학자가 그 시대의 생활을 생생하게 재현한 전시 공간을 대학에 마련할 수 있습니다. 대학 한 곳 당 하나의 풍경만 재현할 수 있습니다. 본 선택지는 인류학자가 중석기 시대의 풍경을 재현합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_UPPER_PALEOLITHIC_BUTTON: "구석기 시대 후기"
 MR_ANTHROPOLOGIST_UPPER_PALEOLITHIC_BUTTON_TT: "#T 구석기 시대 후기#!\n일반인에게는 초기 인류의 옛 모습이 여전히 추상적인 영역에 머물러 있습니다. 인류학자가 그 시대의 생활을 생생하게 재현한 전시 공간을 대학에 마련할 수 있습니다. 대학 한 곳 당 하나의 풍경만 재현할 수 있습니다. 본 선택지는 인류학자가 구석기 시대 후기의 풍경을 재현합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
