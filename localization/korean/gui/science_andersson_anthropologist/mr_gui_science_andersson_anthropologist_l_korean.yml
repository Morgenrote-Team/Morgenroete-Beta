 MR_ANTHROPOLOGIST_NEW_SYSTEMATIZATION_BUTTON_TT: "#T 분류법 개편#!\n발굴된 유해를 발견 위치에 '-인(人)'을 붙여서 명명하는 현행 분류법은 단편적인 이름이 지나치게 많아진 관계로 관리하는 게 거의 불가능한 지경에 이르렀습니다. 경험 많은 인류학자가 새로운 이론 도입과 체계화를 통해 시대에 뒤떨어진 분류법을 개편하여 인류학에 새 물꼬를 틔울 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
