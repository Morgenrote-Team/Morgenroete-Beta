 MR_ANTHROPOLOGIST_HOMINID_EXPEDITION_BUTTON: "원시 인류 탐사"
 MR_ANTHROPOLOGIST_HOMINID_EXPEDITION_BUTTON_TT: "#T 원시 인류 탐사#!\n[concept_andersson_anthropologist]와 발굴단이 종속국으로 탐사를 떠나 멸종한 인류를 탐색할 수 있습니다. 자국 영토에서 원시 인류 조사 활동에 나설 때와 유사한 조건이 적용됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_HOMINID_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] has #n at least one#! direct subject which owns a state in these geographic regions: [GetGeographicRegion('andersson_geographic_region_neoanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_palaeanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_pithecanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_australopithecus').GetName].#!"
