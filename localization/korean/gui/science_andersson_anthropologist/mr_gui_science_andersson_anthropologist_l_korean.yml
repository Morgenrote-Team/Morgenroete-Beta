 MR_ANTHROPOLOGIST_CRANIOMETRY_BUTTON: "두개측정"
 MR_ANTHROPOLOGIST_CRANIOMETRY_BUTTON_TT: "#T 두개측정#!\n두개골 측정은 인류학자에게 있어 가장 영예로운 일로 여겨집니다. 인류학자는 자신의 경력에서 단 한차례, 본인이 관심 있는 두개골에 완전히 몰두하여 경험을 증진시키고 새로운 실력을 쌓을 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANDERSSON_25_BONES_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] #V 25점#! 이상 보유#!"
 MR_ANTHROPOLOGIST_NOT_DONE_CRANIOMETRY_TRIGGER_TT: "#default_text 인류학자가 아직 두개측정을 #R 한번도 진행하지 않음#!#!"
 MR_ANTHROPOLOGIST_NEOLITHIC_BUTTON: "The Neolithic Age"
 MR_ANTHROPOLOGIST_NEOLITHIC_BUTTON_TT: "#T The Neolithic Age#!\nFor many ordinary people, the past of early humans remains abstract. An anthropologist can set up rooms at a university to make life in that era more vivid. Only one scenery is possible per university. In this case let your Anthropologist build a scenery from the Neolithic Age.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
