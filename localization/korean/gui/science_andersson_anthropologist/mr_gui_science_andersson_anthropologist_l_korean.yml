 MR_ANTHROPOLOGIST_CAVE_EXPLORATION_BUTTON: "동굴 탐사"
 MR_ANTHROPOLOGIST_CAVE_EXPLORATION_BUTTON_TT: "#T 동굴 탐사#!\n[concept_andersson_anthropologist]의 도움으로 자국 영토 내에 존재가 알려진 [Concept('concept_andersson_cave','$concept_andersson_caves$')]을 탐사할 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
