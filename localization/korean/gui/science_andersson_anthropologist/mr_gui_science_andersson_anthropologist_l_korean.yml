 MR_ANTHROPOLOGIST_NOT_HAS_CAVE_MODIFIER_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 #V $andersson_cave_exploration_modifier$#! 특성을 지니지 않은 동굴을 #n 보유하지 않음#!#!"
 MR_ANTHROPOLOGIST_SKELETON_RECONSTRUCTION_BUTTON: "골격 복원"
 MR_ANTHROPOLOGIST_SKELETON_RECONSTRUCTION_BUTTON_TT: "#T 골격 복원#!\n[concept_andersson_anthropologist]의 도움으로 [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]을 사용하여 [concept_andersson_skeleton]으로 복원할 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_CAN_RECONSTRUCT_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 보유한 아직 복원되지 않은 골격 [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]의 수가 최소 @andersson_human_fossil! #V 5점#!#!"
 MR_ANTHROPOLOGIST_HAS_INTITUTE_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 [GetBuildingType('building_andersson_institute').GetName]가 있음#!"
 MR_RECALL_ANTHROPOLOGIST_BUTTON_TT: "#T 인류학자 소환#!\n간혹 동굴 탐사를 조기에 마무리해야 하는 상황이 생길 수 있습니다. 지정된 기한이 끝나기 전에 [concept_andersson_anthropologist]를 다시 활용할 수 있게 되는 대신, 아무런 수확을 거두지 못하게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ORIGIN_CONGRESS_BUTTON: "인류 기원 학술회의"
 MR_ORIGIN_CONGRESS_BUTTON_TT: "#T 현생 인류의 기원에 관한 학술회의#!\n선사시대 유골의 발견으로 인류의 기원에 관한 의문도 제기되었습니다. 다윈은 아프리카 기원설을 주장하였으나 여러 곳에서 동시에 기원했다고 상정하는 학자들도 있습니다. 세기가 바뀌면서 현생 인류는 아시아에서 진화했다는 설이 주류설로 떠올랐습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGY_INSTITUTE_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 [GetBuildingType('building_andersson_institute').GetName]가 있음#!"
 MR_ORIGIN_CONGRESS_SPECIAL_HUMAN_FOSSIL_TT: "#default_text [GetPlayer.GetName]에서 #V 피테칸트로푸스#!나 #V 오스트랄로피테쿠스#! 중 하나의 종에 해당되는 [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] @andersson_human_fossil! #V 5점#! 이상 보유#!"
 MR_ORIGIN_CONGRESS_GLOBAL_HUMAN_FOSSIL_TT: "#default_text 전세계에서 발견된 @andersson_human_fossil![Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]의 수가 #V 250점#! 이상 (현재 @andersson_human_fossil! [GetGlobalVariable('dubois_global_human_fossil').GetValue|+0]점 발견)#!"
