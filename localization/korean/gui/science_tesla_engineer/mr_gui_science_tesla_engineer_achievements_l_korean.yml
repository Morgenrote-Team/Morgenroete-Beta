ments_finished_locomotive_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').IsSet , Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_airport_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_airport_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_bicycle_invented_var').IsSet , Scope.Var('tesla_engineer_achievements_bicycle_invented_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievement_transatlantic_cable_var').IsSet , Scope.Var('tesla_engineer_achievement_transatlantic_cable_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievement_suez_india_cable_var').IsSet , Scope.Var('tesla_engineer_achievement_suez_india_cable_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievement_transpacific_cable_var').IsSet , Scope.Var('tesla_engineer_achievement_transpacific_cable_var').GetFlagName)]"
 tesla_engineer_achievements_no_engineer_loc: "#V 이 [concept_tesla_engineer]의 업적#!은 하나라도 달성하면 이곳에 표시됩니다."
 tesla_engineer_achievements_intro_loc: "이 공학자의 #V 업적#!\n"
 tesla_engineer_achievements_invented_steel_frame_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting]가 최초로 #V 강철 골조 건물#!을 건설했습니다. 이 건축 방식은 순식간에 전 세계로 퍼져 나갔습니다.#!"
 tesla_engineer_achievements_invented_electric_telegraph_loc: "\n#indent_newline:3  • [Scope.GetCharacter.GetSheHe]은(는) 직접 발명한 알파벳을 사용했습니다. 그리하여 [Scope.GetCharacter.GetSheHe](이)가 #V 최초로 전보를 보낸 사람#!입니다.#!"
 tesla_engineer_achievements_invented_automobile_loc: "\n#indent_newline:3 • [Scope.Var('tesla_engineer_achievements_invented_automobile_year_var').GetValue]년에 [Scope.GetCharacter.GetLastNameNoFormatting]는 #V 내연기관 자동차#!를 발명하고 먼 거리를 운전했습니다. 이것이 자동차의 급속한 확산의 시작을 알렸습니다.#!"
 tesla_engineer_achievements_finished_road_project_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetFullName]은 #V 도로망#!을 개선했습니다. [Scope.GetCharacter.GetHerHis]의 도로 현대화 작업 덕분에 현재 세계에서 가장 현대적인 도로로 평가받고 있습니다.#!"
 tesla_engineer_achievements_finished_bridge_project_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetSheHe]는 많은 #V 신교량#!을 건설하여 인프라가 크게 개선되었습니다.#!"
 tesla_engineer_achievements_finished_tunnel_project_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 작은 기술적 경이로움인 많은 #V 터널#! 건설 작업에 참여했습니다.#!"
 tesla_engineer_achievements_finished_railway_project_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetSheHe]는 새로운 기술과 다양한 개선을 도입하여 #V 철도 노선#!을 크게 향상시켰습니다.#!"
 tesla_engineer_achievements_finished_construction_project_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사#V 는 최신 장비와 건설 기법#!을 도입해 건설 분야를 크게 발전시켰습니다.#!"
 tesla_engineer_achievements_finished_topographic_map_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe]가 향후 건설 프로젝트를 용이하게 하는 새로운 #V 지형도#!를 제작했습니다.#!"
 tesla_engineer_achievements_finished_locomotive_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] #V 가 철도를 발전시킬 새로운 기관차#!를 개발했습니다.#!"
 tesla_engineer_achievements_finished_production_methods_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]가 여러 기업의 생산성을 #V 향상#!시키는 데 도움을 주었습니다.#!"
 tesla_engineer_achievements_finished_rifles_project_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사 #V 가 세계에서 가장 현대적인 소총#! 중 하나인 새로운 소총을 설계했습니다.#!"
 tesla_engineer_achievements_finished_tanks_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe]는 #V 전차 설계 및 제작 분야의 개척자#! 로서 우리 전차를 현대화했습니다.#!"
 tesla_engineer_achievements_finished_fieldworks_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] #V revolutionized Fieldworks and Defenses#! which saved many soldier's lifes.#!"
 tesla_engineer_achievements_finished_geomagnetic_observartory_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] helped conducting geomagnetical research by #V building a Geomagnetic Observatory#!.#!"
 tesla_engineer_achievements_finished_telegraphy_network_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe] built a #V Telegraphy Network#!.#!"
 tesla_engineer_achievements_finished_radio_networ_project_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V constructed a Radio Network#!.#!"
 tesla_engineer_achievements_finished_airport_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] #V modernized the Airports#!.#!"
 tesla_engineer_achievements_finished_warplane_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe] developed #V Modern Airplanes for the Military#!.#!"
 tesla_engineer_achievements_bicycle_invented_loc: "\n #indent_newline:3 • In [Scope.Var('tesla_engineer_achievements_bicycle_invented_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] #V invented the first Bycycle#!. A great new way to travel using just your own energy.#!"
 tesla_engineer_achievement_transatlantic_cable_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting]  was chief engineer during the construction of the transatlantic cable in [GetGlobalVariable('tesla_transatlantic_cable_year_global_var').GetValue|V] and is thus the author of a technical masterpiece.#!"
 tesla_engineer_achievement_suez_india_cable_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting] oversaw the laying of the Suez-India cable in [GetGlobalVariable('tesla_suez_india_cable_year_global_var').GetValue|V], establishing a crucial link between continents through disciplined engineering.#!"
 tesla_engineer_achievement_transpacific_cable_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting] directed the transpacific cable expedition in [GetGlobalVariable('tesla_transpacific_cable_year_global_var').GetValue|V], achieving one of the most demanding feats in maritime telegraphy.#!"