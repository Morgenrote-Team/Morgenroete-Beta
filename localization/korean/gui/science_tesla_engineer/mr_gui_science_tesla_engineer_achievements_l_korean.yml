 tesla_engineer_achievements_invented_steel_frame_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] 강철 프레임을 사용한 최초의 #V 건물#!. 이 건축 방식은 산불처럼 전 세계로 퍼져나갔습니다." #deepl:3716706247
 tesla_engineer_achievements_invented_electric_telegraph_loc: "\n[Scope.GetCharacter.GetSheHe] was the first person to #V Send a Telegram#! using an alphabet [Scope.GetCharacter.GetSheHe] invented." #pleace replace
 tesla_engineer_achievements_invented_automobile_loc: "\ [Scope.Var('tesla_engineer_achievements_invented_automobile_year_var').GetValue] [Scope.GetCharacter.GetLastNameNoFormatting] 내연기관을 장착한 #V 자동차를 발명하고#! 장거리 주행을 했습니다. 이것이 자동차의 폭발적인 보급의 시작이었습니다." #deepl:88145422
 tesla_engineer_achievements_finished_road_project_loc: "\n[Scope.GetCharacter.GetFullName] 개선 #V 도로 네트워크#!. 덕분에 [Scope.GetCharacter.GetHerHis] 도로 현대화 작업 덕분에 현재 세계에서 가장 현대적인 도로로 간주됩니다." #deepl:2097415548
 tesla_engineer_achievements_finished_bridge_project_loc: "\n[Scope.GetCharacter.GetSheHe] 많은 #V 새 다리#! 를 건설하여 인프라를 개선했습니다." #deepl:2671184667
 tesla_engineer_achievements_finished_tunnel_project_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 작은 기술의 경이로움인 #V 터널#! 을 많이 건설하는 작업을 하고 있었습니다." #deepl:922154902
 tesla_engineer_achievements_finished_railway_project_loc: "\[Scope.GetCharacter.GetSheHe] 대규모로 #V 철도 노선 개선#! 새로운 기술 및 기타 개선 사항을 구현하여." #deepl:721890021
 tesla_engineer_achievements_finished_construction_project_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] #V  현대식 장비와 건설 기술을 도입하여 건설 부문#! 을 개선했습니다." #deepl:987346687
 tesla_engineer_achievements_finished_topographic_map_project_loc: "\n[Scope.GetCharacter.GetSheHe] 새로운 #V 지형도#! 를 만들어 향후 건설 프로젝트를 용이하게 합니다." #deepl:2317700588
 tesla_engineer_achievements_finished_locomotive_project_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #V  철도를 활성화할 새로운 기관차#! 개발." #deepl:2246312284
 tesla_engineer_achievements_finished_production_methods_project_loc: "\n[Scope.GetCharacter.GetSheHe|U] 은 다양한 기업이 #V 프로덕션#! 을 개선하는 데 도움을 주었습니다." #deepl:3837789510
 tesla_engineer_achievements_finished_rifles_project_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] #V  박사는 세계에서 가장 현대적인 라이플 중 하나인 새로운 라이플#! 을 디자인했습니다." #deepl:373585695
 tesla_engineer_achievements_finished_tanks_project_loc: "\[Scope.GetCharacter.GetSheHe] #V  전차 설계 및 건설의 선구자#! 전차를 현대화한 사람입니다." #deepl:1266234006
 tesla_engineer_achievements_finished_fieldworks_project_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #V  야전과 방어에 혁명을 일으킨#! 많은 군인의 생명을 구했습니다." #deepl:3300715553
 tesla_engineer_achievements_finished_geomagnetic_observartory_project_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 지자기 관측소#! 를 구축하여 지자기 연구를 지원했습니다." #deepl:2611684424
 tesla_engineer_achievements_finished_telegraphy_network_project_loc: "\n[Scope.GetCharacter.GetSheHe] #V  전신망 구축#!." #deepl:3900781177
