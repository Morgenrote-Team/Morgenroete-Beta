 tesla_engineer_achievements_bicycle_invented_loc: "[Scope.Var('tesla_engineer_achievements_bicycle_invented_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] #V  에서 최초의 바이사이클#! 을 발명했습니다. 자신의 에너지만으로 여행할 수 있는 새로운 방법입니다." #deepl:1060401141
