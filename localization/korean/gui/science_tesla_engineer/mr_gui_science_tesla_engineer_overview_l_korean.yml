l_korean:
 MR_AUTOMATE_ENGINEER_TT: "#T [concept_tesla_engineer] 자동화#!\n자동화를 설정하면 더 이상 공학자에게 업무를 지시할 필요가 없습니다.\n 그들은 알아서 작업하고 그때마다 알맞은 업무를 수행할 것입니다. 다만 일부 이벤트는 여전히 수신하게 됩니다.\n\n#n 자동화를 설정하면 공학자에게 직접 업무를 맡길 때마다 다소 비효율적일 수 있다는 점에 유의해 주세요.#!"
 mr_engineering_automation_gui_tt: "[concept_tesla_engineer]의 업무 자동화를 시작합니다."
 mr_stop_engineering_automation_gui_tt: "[concept_tesla_engineer]의 업무 자동화를 중지합니다."
 MR_STOP_AUTOMATE_ENGINEER_TT: "#T [concept_tesla_engineer]의 자동화 중단#!\n 공학자는 더 이상 알아서 활동하지 않게 됩니다."
 MR_ENGINEER_RANKING_BUTTON: "공학자"
 MR_RANKING_BY_ENGINEER: "전 세계 [Concept('concept_tesla_engineer','$concept_tesla_engineers$')]의 순위를 표시합니다."
