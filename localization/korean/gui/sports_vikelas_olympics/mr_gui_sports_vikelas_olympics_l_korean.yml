 VISIT_IOC_BUTTON: "IOC 방문"
 MR_VISIT_IOC_POSSIBLE_FOUNDED_TT: "#default_text #V 국제올림픽위원회가 창설되었습니다#!.#!"
 MR_VISIT_IOC_POSSIBLE_TT: "#default_text 현재 #V IOC를 방문하고 있지 않습니다#!.#!"
 VISIT_IOC_BUTTON_TT: "#T 국제올림픽위원회 방문#!\n회원국, 차기 올림픽 대회, 국가 메달 순위에 관한 정보를 보려면 국제올림픽위원회를 방문하세요.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_FOUNDATION_BUTTON: "IOC 창설"
 MR_IOC_FOUNDATION_BUTTON_TT: "#T 국제올림픽위원회 창설#!\국제올림픽위원회 (IOC)는 협회의 형태로 수립된 비정부 기구입니다. 위원회의 목적은 근대 올림픽을 조직, 감독하는 것입니다. 창립국은 올림픽 대회 개최지를 선정하는 평의회의 상임 의석을 확보하게 됩니다. IOC 창립 직후 초대 올림픽 대회가 개최되었으며 이후 4년 주기로 대회가 개최되고 있습니다. 특정 조건을 충족한 국가는 IOC 정회원으로 가입할 수 있지만, 평의회의 의석수는 제한되어 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_FOUNDATION_HAS_ACADEMIC_TRIGGER_TT: "#default_text [GetPlayer.GetName]에는 적어도 하나의 [concept_academics_academic].이 있습니다 #!"
 MR_IOC_FOUNDATION_PEACE_TRIGGER_TT: "#default_text [GetPlayer.GetName]는 평화 상태임.#!"
 MR_IOC_MEMBER_BUTTON: "IOC 가입"
 MR_IOC_MEMBER_BUTTON_TT: "#T IOC 회원국 가입#!\n4년 주기로 열리는 올림픽 대회의 참가를 위해 국제올림픽위원회에 가입합니다. IOC 회원국은 자국에서 올림픽 대회를 개최할 기회를 얻게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_MEMBER_INFAMY_TRIGGER_TT: "#default_text [GetPlayer.GetName]의 악명은 #n 50#!보다 낮음.#!"
 MR_IOC_MEMBER_NOT_UNRECOGNIZED_TRIGGER_TT: "#default_text [GetPlayer.GetName](은)는 #V 미승인국이 아님#!.#!"
 MR_IOC_MEMBER_NOT_HOSTING_TRIGGER_TT: "#default_text [GetPlayer.GetName](은)는 #V 현재 올림픽 유치국이 아님#!.#!"
 MR_IOC_BRIBE_BUTTON: "IOC 매수"
 MR_IOC_BRIBE_BUTTON_TT: "#T IOC 매수#!\n IOC 이사회에 너그러운 '기부'를 하면 위원들의 호감을 얻어 차기 올림픽 개최지 선정에서 네 번째 후보국으로 거론될 수 있습니다. 하지만 그렇다고 해서 반드시 개최지로 선정된다는 보장은 없습니다. 우리의 너그러움을 두고 오해하는 IOC 위원들이 생길 수도 있습니다. \n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_BRIBE_NOT_BRIBING_ALREADY_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V IOC를 매수하고 있지 않음#!#!"
 MR_OLYMPIC_FLAME_BUTTON: "올림픽 성화"
 MR_OLYMPIC_FLAME_BUTTON_TT: "#T 올림픽 성화#!\n 그리스 여신 헤스티아의 영원히 타오르는 화롯불에서 영감받은 올림픽 성화는 1928년 암스테르담 올림픽에서 처음 선보였습니다. 성화 봉송의 전통은 1936년 베를린 하계 올림픽부터 시작되었습니다. 성화 봉송이란 아이디어 자체는 대중의 상식과는 달리 나치 정권이 아닌 독일계 유대인 고고학자 알프레드 쉬프에게서 나왔습니다. 성화 봉송의 도입은 올림픽에 새로운 정체성을 부여했을 뿐만 아니라, 매 대회마다 온 국민을 하나로 묶고, 다른 갈등으로부터 관심을 돌릴 수 있는 고무적인 상징으로 작용하였습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_OLYMPIC_FLAME_IS_HOST_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V 차기 올림픽 대회의 개최를 준비#!하고 있음#!"
 MR_IOC_PRESIDENT_BUTTON: "IOC 회장국 되기"
 MR_IOC_PRESIDENT_BUTTON_TT: "#T IOC 회장국 선출#!\n 현재 활동중인 IOC 회장국이 없다면 그 자위를 넘겨받을 수 있습니다. 우리가 국제올림픽위원회 본부를 지배하고 있다는 전제 하에서 말입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName](이)가 [GetBuildingType('building_vikelas_ioc').GetName]를 지배하고 있음#!#!"
 MR_IOC_DISCIPLINE_BUTTON: "올림픽 종목 도입"
 MR_IOC_DISCIPLINE_BUTTON_TT: "#T 올림픽 종목 도입#!\n IOC의 규모가 커지고 올림픽 참가국이 많아질수록 더 많은 종목을 도입할 수 있습니다. 종목이 많아지면 메달 수도 늘어납니다. 국기 종목을 비롯하여 총 20가지의 종목을 도입할 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_15_MEMBERS_TRIGGER_TT: "#default_text IOC의 #V 회원국#! 규모가 최소 #G 15개국#!에 달함#!"
 MR_IOC_20_MEMBERS_TRIGGER_TT: "#default_text IOC의 #V 회원국#! 규모가 최소 #G 20개국#!에 달함#!"
 MR_IOC_25_MEMBERS_TRIGGER_TT: "#default_text IOC의 #V 회원국#! 규모가 최소 #G 25개국#!에 달함#!"
 MR_IOC_30_MEMBERS_TRIGGER_TT: "#default_text IOC의 #V 회원국#! 규모가 최소 #G 30개국#!에 달함#!"
 MR_IOC_40_MEMBERS_TRIGGER_TT: "#default_text IOC의 #V 회원국#! 규모가 최소 #G 40개국#!에 달함#!"
 MR_IOC_50_MEMBERS_TRIGGER_TT: "#default_text IOC의 #V 회원국#! 규모가 최소 #G 50개국#!에 달함#!"
 MR_IOC_60_MEMBERS_TRIGGER_TT: "#default_text IOC의 #V 회원국#! 규모가 최소 #G 60개국#!에 달함#!"
 MR_IOC_MAKE_NATIONAL_SPORT_DISCIPLINE_BUTTON: "[GetPlayer.GetCustom('vikelas_national_sport_for_GUI_type')]의 올림픽 종목 편입"
 MR_IOC_MAKE_NATIONAL_SPORT_DISCIPLINE_BUTTON_TT: "#T [GetPlayer.GetCustom('vikelas_national_sport_for_GUI_type')]의 올림픽 종목 편입#!\n IOC 위원장은 자국의 국기 종목을 올림픽 종목으로 만들 수 있습니다. 이는 고유의 결단입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_NO_BRIBE_BUTTON: "IOC 매수 중단"
 MR_IOC_NO_BRIBE_BUTTON_TT: "#T IOC 매수 중단#!\n 만약 최근에 우리나라에서 올림픽을 개최했다면, 당분간은 다시 개최 신청에 나설 수 없으므로 위원회 매수를 중단하는 것이 현명할 것입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_BRIBE_AT_LEAST_3_YEARS_TRIGGER_TT: "#default_text IOC 매수는 #V 최소 4년간#! 지속되며 그 이후에 중단이 가능합니다.#!"