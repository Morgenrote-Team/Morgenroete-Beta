 MR_CHEMIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'mendelejew_chemist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'mendelejew_chemist_achievements_no_chemist_loc')]"
 mendelejew_chemist_achievements_loc: "$mendelejew_chemist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('mendelejew_chemist_theorized_elementes_type')][Scope.GetCharacter.GetCustom('mendelejew_chemist_discovered_elementes_type')][Scope.GetCharacter.GetCustom('mendelejew_chemist_isolated_elementes_type')][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_periodic_table_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_periodic_table_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_invented_dynamite_var').IsSet , Scope.Var('mendelejew_chemist_achievement_invented_dynamite_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_noble_gases_discoverer_var').IsSet , Scope.Var('mendelejew_chemist_achievement_noble_gases_discoverer_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_var').IsSet , Scope.Var('mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetic_oil_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetic_oil_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetic_rubber_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetic_rubber_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_attended_chemist_congress_var').IsSet , Scope.Var('mendelejew_chemist_achievement_attended_chemist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_fertilizer_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_fertilizer_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_discovered_radioactivity_var').IsSet , Scope.Var('mendelejew_chemist_achievement_discovered_radioactivity_var').GetFlagName)]"
 mendelejew_chemist_achievements_intro_loc: "#V 이 화학자의 업적#!\n#indent_newline:3 • [Scope.GetCharacter.GetFullName]은(는) 뛰어난 화학자입니다.#!"
 mendelejew_chemist_theorized_elementes_loc: "\n#indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V [Scope.Var('mendelejew_theorized_elements_character_number_var').GetValue|0]개의 원소#!를 이론화했습니다.#!"
 mendelejew_chemist_discovered_elementes_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 #V [Scope.Var('mendelejew_discovered_elements_character_number_var').GetValue|0]개의 원소를 발견#!하였습니다.#!"
 mendelejew_chemist_isolated_elementes_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V [Scope.Var('mendelejew_isolated_elements_character_number_var').GetValue|0]개의 원소를 분리#!하였습니다#!."
 mendelejew_chemist_achievement_periodic_table_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 #V 주기율표 발명#!으로 유명합니다.#!"
 mendelejew_chemist_achievement_invented_dynamite_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetFullNameNoFormatting](은)는 #V 다이너마이트 발명#!으로 광업과 건설, 전쟁 등에 있어 세상을 바꾸었습니다.#!"
 mendelejew_chemist_achievement_noble_gases_discoverer_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 비활성 기체의 발견#!으로 역사상 가장 유명한 화학자로 꼽힙니다.#!"
 mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] 박사는 프라운호퍼선의 원인을 밝혀내어 천체분광학의 기초를 다졌습니다.#!"
 mendelejew_chemist_achievement_synthetic_oil_inventor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] made it possible to #V create Oil synthetically#!.#!"
 mendelejew_chemist_achievement_synthetic_rubber_inventor_loc: "\n #indent_newline:3 • With the #V Invention of synthetic Rubber#! Dr. [Scope.GetCharacter.GetLastNameNoFormatting] freed the world from the necessity of collecting rubber from trees.#!"
 mendelejew_chemist_achievement_attended_chemist_congress_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 초대 국제 화학 학술회의#!의 참석자 중 한 명으로 나섰습니다.#!"
 mendelejew_chemist_achievement_fertilizer_improvement_finished_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] spent a lot of time researching how to #V improve fertilizers and their production#!.#!"
 mendelejew_chemist_achievement_explosives_improvement_finished_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] is a pioneer of the production of #V improved Explosives and the chemical reactions to create them#!.#!"
 mendelejew_chemist_achievement_synthetics_improvement_finished_loc: "\n #indent_newline:3 • Known for [Scope.GetCharacter.GetHerHis] work on #V improving Synthetics and their production#!, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is well regarded among other chemists and the chemical industry.#!"
 mendelejew_chemist_achievement_discovered_radioactivity_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] achieved the scientific milestone of being the #V first to discover radioactivity#!.#!"
 mendelejew_chemist_achievements_no_chemist_loc: "이 #V [concept_mendelejew_chemist]의 업적#!은 하나라도 달성하면 이곳에 표시됩니다."