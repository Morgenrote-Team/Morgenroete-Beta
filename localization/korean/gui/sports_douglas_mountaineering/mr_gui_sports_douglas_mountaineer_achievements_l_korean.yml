l_korean:
 MR_SPORTS_MOUNTAINEERN_TT: "[AddLocalizationIf( Scope.IsSet , 'douglas_mountaineer_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'douglas_mountaineer_no_mountaineer_achievements_loc')]"
 douglas_mountaineer_achievements_loc: "$douglas_mountaineer_achievements_intro_loc$[AddLocalizationIf( Scope.Var('douglas_mountaineer_achievement_mount_everest_loc').IsSet , Scope.Var('douglas_mountaineer_achievement_mount_everest_loc').GetFlagName)]"
 douglas_mountaineer_no_mountaineer_achievements_loc: "이 #V [concept_douglas_mountaineer]의 업적#!은 하나라도 달성하면 이곳에 표시됩니다. "
 douglas_mountaineer_achievements_intro_loc: "#V 이 산악인의 업적#!\n#indent_newline:3 •[Scope.GetCharacter.GetFullName](은)는 경험치 [Scope.Var('douglas_mountaineer_experience_var').GetValue|V0]의 산악인입니다. 현재 등산 횟수는 총 [Scope.Var('douglas_mountaineer_num_mountain_ascents_var').GetValue|V0]회입니다. 이 가운데 성공한 등산은 [Scope.Var('douglas_mountaineer_num_summits_reached_var').GetValue|V0]회, 도중 하산은 [Scope.Var('douglas_mountaineer_num_climbs_aborted_var').GetValue|V0]회, 참사로 끝난 것은 [Scope.Var('douglas_mountaineer_num_disasters_suffered_var').GetValue|V0]회였습니다.#!"
 douglas_mountaineer_achievement_mount_everest_loc: "\n#indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting](은)는 #V 에베레스트산 정상#!에 오른 최초의 산악인이며 그에 따라 역사상 가장 유명한 산악인으로 여겨지고 있습니다.#!"