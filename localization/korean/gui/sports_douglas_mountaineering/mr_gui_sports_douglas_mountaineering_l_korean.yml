 douglas_alpine_club_no_board_loc: "$vikelas_no_board_loc$"
 ALPINE_HERITAGE_VAR: "@douglas_alpine_heritage! [GetPlayer.MakeScope.Var('douglas_alpine_heritage_var').GetValue|*V0] #p +#![GetPlayer.MakeScope.ScriptValue('douglas_yearly_alpine_heritage_value')|+0]"
 ALPINE_HERITAGE_VAR_TT: "#header [concept_douglas_alpine_heritage]#!\n[GetPlayer.GetName]에서 보유한 @douglas_alpine_heritage![concept_douglas_alpine_heritage]의 양은 [GetPlayer.MakeScope.Var('douglas_alpine_heritage_var').GetValue|*V0]입니다.\n\n해마다 [concept_douglas_alpine_heritage]에 영향을 주는 요인: [GetPlayer.GetCustom('douglas_yearly_alpine_heritage_mountain_range_type')][GetPlayer.GetCustom('douglas_yearly_alpine_heritage_mountain_summit_type')][GetPlayer.GetCustom('douglas_yearly_alpine_heritage_volcano_type')][GetPlayer.GetCustom('douglas_yearly_alpine_heritage_mountaineering_club_type')][GetPlayer.GetCustom('douglas_yearly_alpine_heritage_alpine_club_president_type')][GetPlayer.GetCustom('douglas_yearly_alpine_heritage_mountaineering_regiment_type')][GetPlayer.GetCustom('douglas_yearly_alpine_heritage_geologist_type')]"
