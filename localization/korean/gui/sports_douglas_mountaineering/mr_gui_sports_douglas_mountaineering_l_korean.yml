l_korean:
 MR_MOUNTAIN_GENERAL_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V $douglas_mountaineer$#!이나 #V $douglas_mountaineer_veteran$#!, #V $mountain_commander$#!, #V $surveyor$#!, #V $explorer$#! [concept_character_trait]을 지닌 #V 장군#!을 보유함#!"
 MR_MOUNTAINEERING_CLUB_BUTTON: "등산회"
 MR_MOUNTAINEERING_CLUB_BUTTON_TT: "#T 등산회 창립#!\n등산회는 국가의 단체 등산 활동을 향한 첫걸음입니다. 등산회는 등산 경험이 풍부한 남녀 인물이 설립하여야 합니다. 등산회를 통해 새로운 산악인을 육성하여 세계의 정상을 정복할 수 있게 됩니다!\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_BUTTON: "산악회"
 MR_ALPINE_CLUB_BUTTON_TT: "#T 산악회 창설#!\n1857년 런던에서 창설된 산악회는 세계에서 가장 오래된 산악 단체입니다. 산악회의 창설로 빅토리아 시대 영국의 단체 등산 활동이 도래하게 되었습니다. 산악회는 알프스 산맥의 과학적, 지리적, 체육적 탐험을 장려하는 것을 창설 취지로 삼았습니다. 창설 회원 중에는 1865년 마터호른산을 처음 등정한 에드워드 윔퍼도 있었습니다. 산악회는 이른바 '산악 황금기'의 중추적인 역할을 맡았으며, 〈알파인 저널〉을 비롯한 공신력 있는 발행물을 출판하고 전세계 등산회의 표준을 제시하였습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_TRIGGER_TT: "#default_text 등산회를 보유한 국가가 #G 6개국#! 이상#!"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON: "산악회 회장국 되기"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON_TT: "#T 산악회 회장국 선출#!\n현임 산악회 회장국이 없다면 그 지위를 넘겨받을 수 있습니다. 우리가 산악회 본부를 소유하고 있다는 전제 하에서 말입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 [GetBuildingType('building_douglas_alpine_club').GetName]를 소유함#!"
 douglas_alpine_club_board_member_tt: "[GetPlayer.GetName](이)가 산악회 이사국이 됩니다."
 douglas_become_alpine_club_president_tt: "[GetPlayer.GetName](이)가 산악회 회장국이 됩니다."
 MR_ALPINE_CLUB_EXPERIENCE_TRIGGER_TT: "#default_text 산악인의 #V 경험치#!가 #p 50#! 이상#!"
 MR_RECRUIT_MOUNTAINEER_BUTTON: "산악인 모집"
 MR_RECRUIT_MOUNTAINEER_BUTTON_TT: "#T 산악인 모집#!\n등산회가 있다면 신규 산악인을 모집할 수 있습니다. 이 때 충분한 [concept_douglas_alpine_heritage]을 갖추어야 하는 것은 물론입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAINEERING_CLUB_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V 등산회#!를 두고 있음#!"
 MR_ALPINE_HERITAGE_50_TRIGGER_TT: "#default_text [GetPlayer.GetName]의 [concept_douglas_alpine_heritage]이 #G 50#! 이상#!"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON: "산악연대"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON_TT: "#T 산악연대#!\n산악 지역 가운데 현지 주민들이 조국에 대한 열의가 넘치는 곳이 있다면, 적당한 장군의 지휘로 산악보병 전술 훈련을 받은 전문 부대를 창설할 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_HERITAGE_25_TRIGGER_TT: "#default_text [GetPlayer.GetName]의 [concept_douglas_alpine_heritage]이 #G 50#! 이상#!"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON: "등산 장비"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON_TT: "#T 등산 장비#!\n#V 등산 장비#!가 개량될 수록 성공할 기회도 늘게 됩니다. 각 단계로 나아가기 위해서는 신기술 개발이 필요합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EQUIPMENT_1_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 #V $douglas_mountaineering_equipment_level_1_modifier$#! 변화 요인이 부여됨#!"
 MR_MOUNTAIN_EQUIPMENT_2_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 #V $douglas_mountaineering_equipment_level_2_modifier$#! 변화 요인이 부여됨#!"
 MR_MOUNTAIN_EQUIPMENT_3_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 #V $douglas_mountaineering_equipment_level_3_modifier$#! 변화 요인이 부여됨#!"
 MR_MOUNTAIN_EQUIPMENT_4_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 #V $douglas_mountaineering_equipment_level_4_modifier$#! 변화 요인이 부여됨#!"
 MR_MOUNTAIN_EQUIPMENT_5_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 #V $douglas_mountaineering_equipment_level_5_modifier$#! 변화 요인이 부여됨#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_1_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 정복되지 않은 한 곳 이상의 #V 1단계#! [concept_douglas_mountain_summit]을 보유하였거나, 그것을 충족하는 국가와 #V 등산 허가#!를 체결함 (자세한 정보는 [concept_douglas_mountain_summit_list]을 참고)#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_2_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 정복되지 않은 한 곳 이상의 #V 2단계#! [concept_douglas_mountain_summit]을 보유하였거나, 그것을 충족하는 국가와 #V 등산 허가#!를 체결함 (자세한 정보는 [concept_douglas_mountain_summit_list]을 참고)#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_3_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 정복되지 않은 한 곳 이상의 #V 3단계#! [concept_douglas_mountain_summit]을 보유하였거나, 그것을 충족하는 국가와 #V 등산 허가#!를 체결함 (자세한 정보는 [concept_douglas_mountain_summit_list]을 참고)#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_4_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 정복되지 않은 한 곳 이상의 #V 4단계#! [concept_douglas_mountain_summit]을 보유하였거나, 그것을 충족하는 국가와 #V 등산 허가#!를 체결함 (자세한 정보는 [concept_douglas_mountain_summit_list]을 참고)#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_5_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 정복되지 않은 한 곳 이상의 #V 5단계#! [concept_douglas_mountain_summit]을 보유하였거나, 그것을 충족하는 국가와 #V 등산 허가#!를 체결함 (자세한 정보는 [concept_douglas_mountain_summit_list]을 참고)#!"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON: "등산 원정: 1단계 정상"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON_TT: "#T 등산 원정: 1단계 정상#!\n이 부류에 속하는 산은 1단계 등산 장비로 오를 수 있습니다. 여기서 단계란 고도나 위험도를 나타낸 것이 아닙니다. 1단계에 속하는 산으로는 휘트니산, 치틀라테페틀산, 포포카테페틀산, 침보라소산, 아네토봉, 몽블랑산, 그로슈베네디거산, 카메룬산, 라스다샨산, 길루웨산이 있습니다. 자세한 정보는 [concept_douglas_mountain_summit_list]을 참고하세요.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON: "등산 원정: 2단계 정상"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON_TT: "#T 등산 원정: 2단계 정상#!\n이 부류에 속하는 산은 2단계 등산 장비로 오를 수 있습니다. 여기서 단계란 고도나 위험도를 나타낸 것이 아닙니다. 2단계에 속하는 산으로는 키보산(킬리만자로산), 두포우르슈피츠산, 쿡산, 빌헬름산이 있습니다. 자세한 정보는 [concept_douglas_mountain_summit_list]을 참고하세요.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON: "등산 원정: 3단계 정상"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON_TT: "#T 등산 원정: 3단계 정상#!\n이 부류에 속하는 산은 3단계 등산 장비로 오를 수 있습니다. 여기서 단계란 고도나 위험도를 나타낸 것이 아닙니다. 3단계에 속하는 산으로는 엘리어스산, 아콩카과산, 에기유베르트산, 마터호른산, 케냐산, 스탠리산이 있습니다. 자세한 정보는 [concept_douglas_mountain_summit_list]을 참고하세요.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON: "등산 원정: 4단계 정상"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON_TT: "#T 등산 원정: 4단계 정상#!\n이 부류에 속하는 산은 4단계 등산 장비로 오를 수 있습니다. 여기서 단계란 고도나 위험도를 나타낸 것이 아닙니다. 4단계에 속하는 산으로는 로건산, 매킨리산, 일리마니산, 피시스산, 슈카라산, 카메트산, 카우프만봉, 공가산이 있습니다. 자세한 정보는 [concept_douglas_mountain_summit_list]을 참고하세요.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON: "등산 원정: 5단계 정상"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON_TT: "#T 등산 원정: 5단계 정상#!\n이 부류에 속하는 산은 5단계 등산 장비로 오를 수 있습니다. 여기서 단계란 고도나 위험도를 나타낸 것이 아닙니다. 5단계에 속하는 산으로는 우아스카란산, 치골리사산, 카브루산이 있습니다. 자세한 정보는 [concept_douglas_mountain_summit_list]을 참고하세요.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAINEER_TRAINING_BUTTON: "등산 훈련"
 MR_MOUNTAINEER_TRAINING_BUTTON_TT: "#T 등산 훈련#!\n각 나라에서는 안전하다고 판단되는 산맥이나 등정 완료된 산봉우리를 보유하였을 경우 산악인을 훈련시킬 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPORTS_MOUNTAINEER_EXPEDITIONS_TAB: "원정"
 MR_SPORTS_MOUNTAINEER_ORGANISATION_TAB: "조직"
 MR_SPORTS_MOUNTAINEER_CLUB_TAB: "클럽"
 MR_ALPINE_CLUB_START_EXPEDITION_BUTTON: "국제 원정대 출범"
 MR_ALPINE_CLUB_START_EXPEDITION_BUTTON_TT: "#T 국제 원정대 출범#!\n산악회 회장국은 국제 산악 원정대를 조직할 권한을 가지고 있습니다. 10년에 한 번씩만 출범시킬 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_PROPOSE_EXPEDITION_BUTTON: "국제 원정대 제안"
 MR_ALPINE_CLUB_PROPOSE_EXPEDITION_BUTTON_TT: "#T 국제 원정대 출범 제안#!\n산악회 이사국은 국제 등반 원정대 출범을 제안할 권리가 있습니다. 이 방안은 회장국의 승인을 받아야 합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_JOIN_EXPEDITION_BUTTON: "국제 원정대 참여"
 MR_ALPINE_CLUB_JOIN_EXPEDITION_BUTTON_TT: "#T 국제 원정대 참여#!\n산악회의 이사국으로서 국제 등반 원정대의 성공을 보장하기 위해 참여할 의무가 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_RECENT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text 국제 원정대가 마지막으로 출범한 지 10년 이상#!"
 MR_MOUNTAIN_RECENT_INTERNATIONAL_EXPEDITION_NO_SETBACK_TRIGGER_TT: "#default_text 산악회 회장국이 국제 원정대 출범에 거부권을 행사하지 않음#!"
 MR_MOUNTAIN_EQUIPMENT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text 의장국이 국제 원정대를 주최하기 위해 필요한 수준의 장비 (3단계, 4단계, 5단계)를 갖추고 있음#!"
 MR_MOUNTAIN_UNCONQUERED_SUMMIT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text 정복 대상으로 남아 있는 2단계나 3단계, 4단게 수준의 산 정상이 한 곳 이상 존재함#!"
 MR_ALPINE_PRESIDENT_HAS_ACTIVE_MOUNTAINEER_TRIGGER_TT: "#default_text 의장국에 #V 분주한 상태#!가 아닌 [concept_douglas_mountaineer]이 있음#!"
 MR_MOUNT_EVEREST_EXPEDITION_BUTTON: "에베레스트산 원정대"
 MR_MOUNT_EVEREST_EXPEDITION_BUTTON_TT: "#T 에베레스트산 원정대#!\n세계에서 가장 높은 산인 에베레스트산은 산악인이라면 누구나 꿈꾸는 목표입니다. 그곳으로 원정을 보내면 과연 모든 산악인의 꿈을 실현하게 될까요, 아니면 그저 과대망상에 불과하게 될까요?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_7000_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 해발고도 #V 7000m#! 이상의 산을 정복함 (자세한 정보는 [concept_douglas_mountain_summit_list] 참고)#!"
 MR_ALPINE_HERITAGE_100_TRIGGER_TT: "#default_text [GetPlayer.GetName]의 [concept_douglas_alpine_heritage]이 #G 100#! 이상#!"
 DOUGLAS_ALPINE_CLUB_PRESIDENT_LOC: "[GetGlobalVariable('douglas_alpine_club_president_global_var').GetCountry.GetFlagTextIcon]"
 douglas_has_no_alpine_club_president_loc: "$vikelas_has_no_ioc_president_loc$"
 douglas_has_alpine_club_president_loc: "[GetGlobalVariable('douglas_alpine_club_president_global_var').GetCountry.GetFlagTextIcon]"
 DOUGLAS_ALPINE_CLUB_BOARD: "[Country.GetCustom('douglas_alpine_club_board_member_1_type')][Country.GetCustom('douglas_alpine_club_board_member_2_type')][Country.GetCustom('douglas_alpine_club_board_member_3_type')][Country.GetCustom('douglas_alpine_club_board_member_4_type')][Country.GetCustom('douglas_alpine_club_board_member_5_type')]"
 douglas_alpine_club_board_member_1_loc: "[GetGlobalVariable('douglas_alpine_club_board_member_1_global_var').GetCountry.GetFlagTextIcon] "
 douglas_alpine_club_board_member_2_loc: "[GetGlobalVariable('douglas_alpine_club_board_member_2_global_var').GetCountry.GetFlagTextIcon] "
 douglas_alpine_club_board_member_3_loc: "[GetGlobalVariable('douglas_alpine_club_board_member_3_global_var').GetCountry.GetFlagTextIcon] "
 douglas_alpine_club_board_member_4_loc: "[GetGlobalVariable('douglas_alpine_club_board_member_4_global_var').GetCountry.GetFlagTextIcon] "
