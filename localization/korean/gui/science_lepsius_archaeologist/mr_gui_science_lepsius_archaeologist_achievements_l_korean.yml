 lepsius_archaeologist_achievement_expert_for_oceanic_archaeology_loc: "\[Scope.GetCharacter.GetSheHe|U] 은 #V 해양 고고학#!, [Scope.GetCharacter.GetSheHe] 에서 [Scope.Var('lepsius_oceanic_artifact_minor_archaeologist_var').GetValue|0V] 마이너 유물을 수집한 전문가입니다." #deepl:2787251010
