 lepsius_archaeologist_achievement_attended_civilization_congress_loc: "\[Scope.GetCharacter.GetSheHe|U] 문명의 기원에 관한 #V 고고학 회의에 참석#!." #deepl:395174587
 lepsius_archaeologist_achievement_attended_troy_congress_loc: "\[Scope.GetCharacter.GetSheHe|U] 트로이의 역사성에 관한 고고학 회의( #V )에 참석했습니다.#!" #deepl:3218356213
 lepsius_archaeologist_achievement_invented_three_age_system_loc: "\ [Scope.GetCharacter.GetHerHis] 가장 큰 업적 중 하나는 고고학자들이 유물을 석기 시대, 청동기 시대, 철기 시대로 분류할 수 있게 한 #V 3시대 시스템#! 의 발명입니다." #deepl:3435944138
 lepsius_archaeologist_achievement_invented_early_archaeology_loc: "\층서학적 방법을 사용하고 [Scope.GetCharacter.GetHerHis] 연구 결과를 광범위하게 문서화함으로써 [Scope.GetCharacter.GetLastNameNoFormatting] #V  고고학에 혁명을 일으켜#! 진정한 과학으로 탈바꿈시켰습니다." #deepl:1482092133
 lepsius_archaeologist_achievement_inaugurated_museum_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 고고학 박물관#! 설립에 중요한 역할을 했으며, [Scope.GetCharacter.GetSheHe] 는 모든 유물을 의미 있는 방식으로 전시했습니다." #deepl:2255139215
 lepsius_archaeologist_achievement_new_methods_pompeii_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 교수가 폼페이에서 발견된 유물을 온전하게 보존하는 #V 새로운 방법#! 을 개발했습니다." #deepl:3277007049
 lepsius_archaeologist_achievement_discovered_teotihuacan_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 테오티우아칸의 태양의 신전 재건( #V )의 중심 인물입니다#!." #deepl:715105555
 lepsius_archaeologist_achievement_discovered_harappa_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] #V  교수는 하라파 유적지에서 인더스 계곡 문명#! 을 발견했습니다." #deepl:823513117
 lepsius_archaeologist_achievement_tomb_first_emperor_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] #V  박사가 병마용 군대가 지키고 있는 진나라 초대 황제의 무덤#! 을 발견했습니다." #deepl:3326302787
 lepsius_archaeologist_achievement_discovered_tikal_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] #V  교수가 과테말라 정글에서 마야의 도시 티칼#! 을 발견했습니다." #deepl:960255002
 lepsius_archaeologist_achievement_explored_petra_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] #V  박사가 중동의 뜨거운 사막에 있는 페트라#! 도시를 탐험했습니다." #deepl:230969931
 lepsius_archaeologist_achievement_found_sarcophagus_intact_loc: "\ #V 무명 파라오의 석관#! 발견은 [Scope.GetCharacter.GetLastNameNoFormatting] 박사의 가장 큰 업적 중 하나입니다." #deepl:397069606
 lepsius_archaeologist_achievement_found_sarcophagus_broken_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 #V 무명 파라오의 무덤#! 을 발견했지만, 이 발견은 불의의 사고로 파라오의 미라가 파괴되면서 무산되었습니다." #deepl:4134291227
 lepsius_archaeologist_achievement_found_tutankhamun_loc: "\ [Scope.GetCharacter.GetHerHis] 커리어의 획기적인 사건은 #V 파라오 투탕카멘#! 의 온전한 무덤을 발견한 것입니다." #deepl:830597516
 lepsius_archaeologist_achievement_found_ship_of_khufu_loc: "\ #V 쿠푸의 배#! 의 발견은 역사책에서 [Scope.GetCharacter.GetLastNameNoFormatting] 박사의 이름을 영원히 불멸의 이름으로 남길 것입니다." #deepl:263837328
 lepsius_archaeologist_achievement_found_tower_of_babylon_loc: "\ [Scope.GetCharacter.GetHerHis] 메소포타미아에서 [Scope.GetCharacter.GetSheHe] 고고학자들 사이에서 지쿠라트 에테메난키로 알려진 #V 바빌론의 탑#! 을 발견했습니다. 놀라운 발견입니다!" #deepl:3958757656
 lepsius_archaeologist_achievement_found_gardens_of_sennacherib_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 아마도 세계 7대 불가사의 중 하나를 재발견했다고 자랑할 수 있는 유일한 사람일 것입니다. |[Scope.GetCharacter.GetSheHe] 는 실제로 #V 행잉 가든#! 을 발견했습니다." #deepl:1376956218
 lepsius_archaeologist_achivement_found_treasury_of_atreus_loc: "\고고학자에게는 모든 것이 보물이지만, [Scope.GetCharacter.GetLastNameNoFormatting] 박사의 발견은 진정한 보물임이 분명합니다. #V  미케네의 보물#! 은 황금 가면처럼 대부분 금으로 만든 것들로 구성되어 있습니다." #deepl:3793568389
 lepsius_archaeologist_achievement_found_tomb_of_pakal_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 발견한 #V 파칼의 무덤#! 은 매우 인상적이었습니다. 마야의 가장 위대한 왕에 걸맞게 인상적이었습니다." #deepl:3301250790
 lepsius_archaeologist_achievement_raised_flag_on_pyramids_loc: "\이집트에서 근무하는 동안 [Scope.GetCharacter.GetSheHe] #V  기자 대피라미드에 국기를 게양#!." #deepl:453060665
 lepsius_archaeologist_achievement_reconstructed_ishtar_gate_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 #V 이쉬타르 문#! 을 발견했을 뿐만 아니라 재건했습니다. 이제 다시 그 영광의 빛을 발합니다." #deepl:3899648836
 lepsius_archaeologist_achievement_found_lamassu_loc: "\위험으로 가득한 위대한 모험에서 [Scope.GetCharacter.GetSheHe] 장엄한 #V 라마수#! 를 발견했습니다." #deepl:1325115031
 lepsius_archaeologist_achievement_escaped_labyrinth_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 위험으로 가득한 #V 신화의 미궁#! 에서 탈출했습니다." #deepl:3205955848
 lepsius_archaeologist_achievement_survived_maya_pyramid_loc: "\n때때로 고고학은 위험합니다. [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 고고학보다 더 모험이었던 신비한 #V 마야 피라미드#! 를 탐험하는 여정에서 살아 남았습니다." #deepl:2309875301
 lepsius_archaeologist_achievement_found_vilcabamba_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 #V 잉카의 마지막 피난처였던 빌라캄바#! 를 재발견했습니다." #deepl:1401010459
 lepsius_archaeologist_achievement_discovered_nazca_loc: "\[Scope.GetCharacter.GetSheHe|U] #V  나스카 사막에서 발견한 거대한 그림#! 하늘에서만 볼 수 있는 그림." #deepl:3398521121
 lepsius_archaeologist_achievement_dinosaur_myth_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 과학계에서 조롱을 받고 있습니다. 그는 자신의 #V 탐험대원들이 공룡에게 잡아먹혔다고 주장합니다#!. 이 주장이 우스꽝스러운가요 아니면 사실인가요?" #deepl:491140794
 lepsius_archaeologist_achievement_photo_evidence_independent_loc: "\아무도 믿지 않았는데도 [Scope.GetCharacter.GetLastNameNoFormatting] 교수가 #V 살아있는 공룡#! 의 사진 증거를 제공했습니다 [Scope.GetCharacter.GetHerHim]." #deepl:1970351488
 lepsius_archaeologist_achievement_photo_support_loc: "\n정부의 지원으로 [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 이전에는 조롱을 받았지만 #V 살아있는 공룡#! 의 사진 증거를 제공할 수 있었습니다." #deepl:278106961
