l_korean:
 MR_ARCHAEOLOGIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'lepsius_archaeologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'lepsius_archaeologist_no_archaeologist_loc')]"
 lepsius_archaeologist_achievements_loc: "$lepsius_archaeologist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('lepsius_archaeologist_most_artifacts_from_type')][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_invented_three_age_system_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_invented_three_age_system_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_invented_early_archaeology_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_invented_early_archaeology_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_inaugurated_museum_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_inaugurated_museum_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_attended_exodus_congress_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_attended_exodus_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_attended_troy_congress_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_attended_troy_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_attended_civilization_congress_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_attended_civilization_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_new_methods_pompeii_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_new_methods_pompeii_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_discovered_teotihuacan_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_discovered_teotihuacan_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_discovered_harappa_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_discovered_harappa_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_tomb_first_emperor_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_tomb_first_emperor_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_discovered_tikal_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_discovered_tikal_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_explored_petra_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_explored_petra_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_sarcophagus_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_sarcophagus_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_tutankhamun_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_tutankhamun_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_ship_of_khufu_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_ship_of_khufu_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_tower_of_babylon_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_tower_of_babylon_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_gardens_of_sennacherib_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_gardens_of_sennacherib_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achivement_found_treasury_of_atreus_var').IsSet , Scope.Var('lepsius_archaeologist_achivement_found_treasury_of_atreus_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_tomb_of_pakal_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_tomb_of_pakal_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_raised_flag_on_pyramids_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_raised_flag_on_pyramids_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_reconstructed_ishtar_gate_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_reconstructed_ishtar_gate_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_lamassu_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_lamassu_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_escaped_labyrinth_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_escaped_labyrinth_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_survived_maya_pyramid_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_survived_maya_pyramid_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_vilcabamba_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_vilcabamba_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_discovered_nazca_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_discovered_nazca_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_lost_world_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_lost_world_var').GetFlagName)]"
 lepsius_archaeologist_no_archaeologist_loc: "이 #V [concept_lepsius_archaeologist]의 업적#!은 하나라도 달성하면 이곳에 표시됩니다."
 lepsius_archaeologist_achievements_intro_loc: "#V 이 고고학자의 업적#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName](은)는 [Scope.GetCharacter.GetCustom('lepsius_archaeologist_experience_level_type')]으로, 총 [Scope.Var('lepsius_total_artifact_minor_archaeologist_var').GetValue|0+]점의 [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]을 수집하였습니다.#!"
 lepsius_archaeologist_achievement_famous_level_archaeologist_overview_loc: "저명한 [concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_experienced_level_archaeologist_overview_loc: "경험 많은 [concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_normal_level_archaeologist_overview_loc: "뛰어난 [concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_expert_for_egyptian_archaeology_loc: "\n#indent_newline:3 • #V [Scope.GetCharacter.GetSheHe|U]는 이집트 고고학#! 전문가이며, 그 지역에서 소형 유물 [Scope.Var('lepsius_egyptian_artifact_minor_archaeologist_var').GetValue|0V]점을 수집하였습니다.#!"
 lepsius_archaeologist_achievement_expert_for_mesopotamian_archaeology_loc: "\n#indent_newline:3 • #V [Scope.GetCharacter.GetSheHe|U]는 메소포타미아 고고학#! 전문가이며, 그 지역에서 소형 유물 [Scope.Var('lepsius_mesopotamian_artifact_minor_archaeologist_var').GetValue|0V]점을 수집하였습니다.#!"
 lepsius_archaeologist_achievement_expert_for_aegean_archaeology_loc: "\n#indent_newline:3 • #V [Scope.GetCharacter.GetSheHe|U]는 에게 문명 고고학#! 전문가이며, 그 지역에서 소형 유물 [Scope.Var('lepsius_aegean_artifact_minor_archaeologist_var').GetValue|0V]점을 수집하였습니다.#!"
 lepsius_archaeologist_achievement_expert_for_precolumbian_archaeology_loc: "\n#indent_newline:3 • #V [Scope.GetCharacter.GetSheHe|U]는 선콜럼버스 고고학#! 전문가이며, 그 지역에서 소형 유물 [Scope.Var('lepsius_precolumbian_artifact_minor_archaeologist_var').GetValue|0V]점을 수집하였습니다.#!"
 lepsius_archaeologist_achievement_expert_for_fareastern_archaeology_loc: "\n#indent_newline:3 • #V [Scope.GetCharacter.GetSheHe|U]는 동양 고고학#! 전문가이며, 그 지역에서 소형 유물 [Scope.Var('lepsius_fareastern_artifact_minor_archaeologist_var').GetValue|0V]점을 수집하였습니다.#!"
 lepsius_archaeologist_achievement_expert_for_oceanic_archaeology_loc: "\n#indent_newline:3 • #V [Scope.GetCharacter.GetSheHe|U]는 오세아니아 고고학#! 전문가이며, 그 지역에서 소형 유물 [Scope.Var('lepsius_oceanic_artifact_minor_archaeologist_var').GetValue|0V]점을 수집하였습니다.#!"
 lepsius_archaeologist_achievement_not_expert_loc: ""
 lepsius_archaeologist_achievement_attended_exodus_congress_loc: "\n#indent_newline:3 • #V 출애굽기의 역사성에 관한 고고학 학술회의#!에 참석하였습니다.#!"
 lepsius_archaeologist_achievement_attended_civilization_congress_loc: "\n#indent_newline:3 • #V 문명의 기원에 관한 고고학 학술회의#!에 참석하였습니다.#!"
 lepsius_archaeologist_achievement_attended_troy_congress_loc: "\n#indent_newline:3 • #V 트로이의 역사성에 관한 고고학 학술회의#!에 참석하였습니다.#!"
 lepsius_archaeologist_achievement_invented_three_age_system_loc: "\n #indent_newline:3 • 박사의 가장 위대한 업적으로는 고고학에서 특정 유물을 석기, 청동기, 철기 시대로 분류하게 만든 #V 3시대 분류법의 고안#!이 꼽힙니다.#!"
 lepsius_archaeologist_achievement_invented_early_archaeology_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting](은)는 층서학에 기반한 접근법과 발견 사항의 대대적인 기록으로 #V 고고학의 혁신#!을 이끌고 진정한 과학으로 탈바꿈시켰습니다.#!"
 lepsius_archaeologist_achievement_inaugurated_museum_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 고고학 박물관 설립#!에 큰 기여를 남겼으며 모든 유물에 의미가 깃든 식으로 전시를 마련하였습니다.#!"
 lepsius_archaeologist_achievement_new_methods_pompeii_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 폼페이에서 #V 출토품을 온전히 유지하는 신기법#!을 개발하였습니다.#!"
 lepsius_archaeologist_achievement_discovered_teotihuacan_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 테오티우아칸의 태양의 신전 복원#! 과정에서 중심 인물로 활동하였습니다.#!"
 lepsius_archaeologist_achievement_discovered_harappa_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 하라파 유적에서 #V 인더스 문명을 발견#!하였습니다.#!"
 lepsius_archaeologist_achievement_tomb_first_emperor_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 토용 부대가 지키고 있는 #V 진시황릉을 발견#!하였습니다.#!"
 lepsius_archaeologist_achievement_discovered_tikal_loc: "\n#indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting] 교수는 과테말라의 밀림 속에서 #V 마야 도시 티칼을 발견#!하였습니다.#!"
 lepsius_archaeologist_achievement_explored_petra_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 중동의 타오르는 사막 한가운데서 #V 고대 도시 페트라를 탐사#!하였습니다.#!"
 lepsius_archaeologist_achievement_found_sarcophagus_intact_loc: "\n #indent_newline:3 • #V 신원 불명 파라오의 관#!을 발견한 것은 [Scope.GetCharacter.GetLastNameNoFormatting] 박사의 가장 위대한 업적입니다.#!"
 lepsius_archaeologist_achievement_found_sarcophagus_broken_loc: "\n #indent_newline:3 • Although Dr. [Scope.GetCharacter.GetLastNameNoFormatting] discovered the #V Tomb of an Unknown Pharaoh#!, this discovery was ruined by the destruction of the mummy of the Pharaoh in an unfortunate accident.#!"
 lepsius_archaeologist_achievement_found_tutankhamun_loc: "\n #indent_newline:3 • A milestone in [Scope.GetCharacter.GetHerHis] career was the discovery of the intact tomb of #V Pharaoh Tutankhamun#!.#!"
 lepsius_archaeologist_achievement_found_ship_of_khufu_loc: "\n #indent_newline:3 • The discovery of the #V Ship of Khufu#! will forever immortalize the name of Dr. [Scope.GetCharacter.GetLastNameNoFormatting] in the history books.#!"
 lepsius_archaeologist_achievement_found_tower_of_babylon_loc: "\n #indent_newline:3 • During [Scope.GetCharacter.GetHerHis] time in Mesopotamia, [Scope.GetCharacter.GetSheHe] found the #V Tower of Babylon#! that is known among archaeologists as Zikurrat Etemenanki. A marvelous find!#!"
 lepsius_archaeologist_achievement_found_gardens_of_sennacherib_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is probably the only person who can boast of rediscovering one of the seven wonders of the world. [Scope.GetCharacter.GetSheHe|U] actually found the #V Hanging Gardens#!.#!"
 lepsius_archaeologist_achivement_found_treasury_of_atreus_loc: "\n #indent_newline:3 • Sure, for an archaeologist everything is a treasure, but the discovery of Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is surely a true treasure. The #V Treasures of Mycenae#! consisted of many things most of them made from gold like the Golden Masks.#!"
 lepsius_archaeologist_achievement_found_tomb_of_pakal_loc: "\n #indent_newline:3 • The #V Tomb of Pakal#!, that Dr. [Scope.GetCharacter.GetLastNameNoFormatting] discovered, was very impressive. As impressive as it should be for the greatest king of the Maya.#!"
 lepsius_archaeologist_achievement_raised_flag_on_pyramids_loc: "\n #indent_newline:3 • While working in Egypt, [Scope.GetCharacter.GetSheHe] #V raised a Flag on the Great Pyramid of Gizah#!.#!"
 lepsius_archaeologist_achievement_reconstructed_ishtar_gate_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] did not only find the #V Ishtar Gate#! but reconstructed it. Now it shines in all its glory again.#!"
 lepsius_archaeologist_achievement_found_lamassu_loc: "\n #indent_newline:3 • In a great adventure full of dangers, [Scope.GetCharacter.GetSheHe] found the majestic #V Lamassu#!.#!"
 lepsius_archaeologist_achievement_escaped_labyrinth_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] escaped from a #V Mythical Labyrinth#! full of dangers.#!"
 lepsius_archaeologist_achievement_survived_maya_pyramid_loc: "\n #indent_newline:3 • Sometimes Archaeology is dangerous. Professor [Scope.GetCharacter.GetLastNameNoFormatting] survived [Scope.GetCharacter.GetHerHis] journey through a mysterious #V Maya Pyramid#! that was more adventure than archaeology.#!"
 lepsius_archaeologist_achievement_found_vilcabamba_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] has #V rediscovered Vilacamba#!, the last refuge of the Inca."
 lepsius_archaeologist_achievement_discovered_nazca_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] #V found huge drawings in the desert of Nazca#! that are only really visible from the sky.#!"
 lepsius_archaeologist_achievement_dinosaur_myth_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is ridiculed by the scientific community. [Scope.GetCharacter.GetSheHe|U] claims that [Scope.GetCharacter.GetHerHis] #V expedition members were eaten by dinosaurs#!. Is this statement ridiculous or the truth?#!"
 lepsius_archaeologist_achievement_photo_evidence_independent_loc: "\n #indent_newline:3 • Professor [Scope.GetCharacter.GetLastNameNoFormatting] provided photographic evidence of #V live Dinosaurs#! even though no one believed [Scope.GetCharacter.GetHerHim].#!"
 lepsius_archaeologist_achievement_photo_support_loc: "\n #indent_newline:3 • With the support of the government, Professor [Scope.GetCharacter.GetLastNameNoFormatting] was able to provide photographic evidence of #V live Dinosaurs#! even though he was ridiculed before.#!"