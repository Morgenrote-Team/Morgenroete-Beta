 lepsius_archaeologist_achievement_expert_for_mesopotamian_archaeology_loc: "\[Scope.GetCharacter.GetSheHe|U] 은 #V 메소포타미아 고고학#! 의 전문가이며, [Scope.GetCharacter.GetSheHe] 에서 [Scope.Var('lepsius_mesopotamian_artifact_minor_archaeologist_var').GetValue|0V] 마이너 유물을 수집했습니다." #deepl:4145665032
