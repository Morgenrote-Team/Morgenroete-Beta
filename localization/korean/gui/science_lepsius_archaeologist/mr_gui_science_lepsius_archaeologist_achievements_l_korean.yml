 lepsius_archaeologist_achievement_expert_for_precolumbian_archaeology_loc: "\[Scope.GetCharacter.GetSheHe|U] 은 #V 선사시대 고고학#! 의 전문가이며, [Scope.GetCharacter.GetSheHe] 에서 [Scope.Var('lepsius_precolumbian_artifact_minor_archaeologist_var').GetValue|0V] 마이너 유물을 수집했습니다." #deepl:1609585460
