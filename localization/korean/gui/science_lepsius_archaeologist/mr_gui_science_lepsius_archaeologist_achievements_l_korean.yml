 MR_ARCHAEOLOGIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'lepsius_archaeologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'lepsius_archaeologist_no_archaeologist_loc')]"
 lepsius_archaeologist_achievements_loc: "$lepsius_archaeologist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('lepsius_archaeologist_most_artifacts_from_type')][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_invented_three_age_system_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_invented_three_age_system_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_invented_early_archaeology_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_invented_early_archaeology_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_inaugurated_museum_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_inaugurated_museum_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_attended_exodus_congress_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_attended_exodus_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_attended_troy_congress_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_attended_troy_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_attended_civilization_congress_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_attended_civilization_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_new_methods_pompeii_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_new_methods_pompeii_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_discovered_teotihuacan_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_discovered_teotihuacan_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_discovered_harappa_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_discovered_harappa_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_tomb_first_emperor_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_tomb_first_emperor_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_discovered_tikal_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_discovered_tikal_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_explored_petra_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_explored_petra_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_discovered_cliff_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_disocvered_cliff_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_restored_angkor_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_restored_angkor_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_sarcophagus_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_sarcophagus_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_tutankhamun_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_tutankhamun_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_ship_of_khufu_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_ship_of_khufu_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_tower_of_babylon_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_tower_of_babylon_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_gardens_of_sennacherib_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_gardens_of_sennacherib_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_treasury_of_atreus_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_treasury_of_atreus_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_tomb_of_pakal_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_tomb_of_pakal_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_raised_flag_on_pyramids_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_raised_flag_on_pyramids_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_reconstructed_ishtar_gate_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_reconstructed_ishtar_gate_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_lamassu_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_lamassu_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_escaped_labyrinth_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_escaped_labyrinth_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_survived_maya_pyramid_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_survived_maya_pyramid_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_vilcabamba_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_vilcabamba_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_discovered_nazca_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_discovered_nazca_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_lost_world_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_lost_world_var').GetFlagName)]"
 lepsius_archaeologist_no_archaeologist_loc: "이 #V [concept_lepsius_archaeologist]의 업적#!은 하나라도 달성하면 이곳에 표시됩니다."
 lepsius_archaeologist_achievements_intro_loc: "#V 이 고고학자의 업적#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName](은)는 [Scope.GetCharacter.GetCustom('lepsius_archaeologist_experience_level_type')]으로, 총 [Scope.Var('lepsius_total_artifact_minor_archaeologist_var').GetValue|0+]점의 [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]을 수집하였습니다.#!"
 lepsius_archaeologist_achievement_famous_level_archaeologist_overview_loc: "저명한 [concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_experienced_level_archaeologist_overview_loc: "경험 많은 [concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_normal_level_archaeologist_overview_loc: "뛰어난 [concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_expert_for_egyptian_archaeology_loc: "\n#indent_newline:3 • #V [Scope.GetCharacter.GetSheHe|U]는 이집트 고고학#! 전문가이며, 그 지역에서 소형 유물 [Scope.Var('lepsius_egyptian_artifact_minor_archaeologist_var').GetValue|0V]점을 수집하였습니다.#!"
 lepsius_archaeologist_achievement_expert_for_mesopotamian_archaeology_loc: "\n#indent_newline:3 • #V [Scope.GetCharacter.GetSheHe|U]는 메소포타미아 고고학#! 전문가이며, 그 지역에서 소형 유물 [Scope.Var('lepsius_mesopotamian_artifact_minor_archaeologist_var').GetValue|0V]점을 수집하였습니다.#!"
 lepsius_archaeologist_achievement_expert_for_aegean_archaeology_loc: "\n#indent_newline:3 • #V [Scope.GetCharacter.GetSheHe|U]는 에게 문명 고고학#! 전문가이며, 그 지역에서 소형 유물 [Scope.Var('lepsius_aegean_artifact_minor_archaeologist_var').GetValue|0V]점을 수집하였습니다.#!"
 lepsius_archaeologist_achievement_expert_for_precolumbian_archaeology_loc: "\n#indent_newline:3 • #V [Scope.GetCharacter.GetSheHe|U]는 선콜럼버스 고고학#! 전문가이며, 그 지역에서 소형 유물 [Scope.Var('lepsius_precolumbian_artifact_minor_archaeologist_var').GetValue|0V]점을 수집하였습니다.#!"
 lepsius_archaeologist_achievement_expert_for_fareastern_archaeology_loc: "\n#indent_newline:3 • #V [Scope.GetCharacter.GetSheHe|U]는 동양 고고학#! 전문가이며, 그 지역에서 소형 유물 [Scope.Var('lepsius_fareastern_artifact_minor_archaeologist_var').GetValue|0V]점을 수집하였습니다.#!"
 lepsius_archaeologist_achievement_expert_for_oceanic_archaeology_loc: "\n#indent_newline:3 • #V [Scope.GetCharacter.GetSheHe|U]는 오세아니아 고고학#! 전문가이며, 그 지역에서 소형 유물 [Scope.Var('lepsius_oceanic_artifact_minor_archaeologist_var').GetValue|0V]점을 수집하였습니다.#!"
 lepsius_archaeologist_achievement_not_expert_loc: ""
 lepsius_archaeologist_achievement_attended_exodus_congress_loc: "\n#indent_newline:3 • #V 출애굽기의 역사성에 관한 고고학 학술회의#!에 참석하였습니다.#!"
 lepsius_archaeologist_achievement_attended_civilization_congress_loc: "\n#indent_newline:3 • #V 문명의 기원에 관한 고고학 학술회의#!에 참석하였습니다.#!"
 lepsius_archaeologist_achievement_attended_troy_congress_loc: "\n#indent_newline:3 • #V 트로이의 역사성에 관한 고고학 학술회의#!에 참석하였습니다.#!"
 lepsius_archaeologist_achievement_invented_three_age_system_loc: "\n #indent_newline:3 • 박사의 가장 위대한 업적으로는 고고학에서 특정 유물을 석기, 청동기, 철기 시대로 분류하게 만든 #V 3시대 분류법의 고안#!이 꼽힙니다.#!"
 lepsius_archaeologist_achievement_invented_early_archaeology_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting](은)는 층서학에 기반한 접근법과 발견 사항의 대대적인 기록으로 #V 고고학의 혁신#!을 이끌고 진정한 과학으로 탈바꿈시켰습니다.#!"
 lepsius_archaeologist_achievement_inaugurated_museum_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 고고학 박물관 설립#!에 큰 기여를 남겼으며 모든 유물에 의미가 깃든 식으로 전시를 마련하였습니다.#!"
 lepsius_archaeologist_achievement_new_methods_pompeii_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 폼페이에서 #V 출토품을 온전히 유지하는 신기법#!을 개발하였습니다.#!"
 lepsius_archaeologist_achievement_discovered_teotihuacan_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 테오티우아칸의 태양의 신전 복원#! 과정에서 중심 인물로 활동하였습니다.#!"
 lepsius_archaeologist_achievement_discovered_harappa_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 하라파 유적에서 #V 인더스 문명을 발견#!하였습니다.#!"
 lepsius_archaeologist_achievement_tomb_first_emperor_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 토용 부대가 지키고 있는 #V 진시황릉을 발견#!하였습니다.#!"
 lepsius_archaeologist_achievement_discovered_tikal_loc: "\n#indent_newline:3 •[Scope.GetCharacter.GetLastNameNoFormatting] 교수는 과테말라의 밀림 속에서 #V 마야 도시 티칼을 발견#!하였습니다.#!"
 lepsius_archaeologist_achievement_explored_petra_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 중동의 타오르는 사막 한가운데서 #V 고대 도시 페트라를 탐사#!하였습니다.#!"
 lepsius_archaeologist_achievement_found_sarcophagus_intact_loc: "\n #indent_newline:3 • #V 신원 불명 파라오의 관#!을 발견한 것은 [Scope.GetCharacter.GetLastNameNoFormatting] 박사의 가장 위대한 업적입니다.#!"
 lepsius_archaeologist_achievement_found_sarcophagus_broken_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 신원 불명 파라오의 무덤#!을 발견하였지만, 불운한 사고로 파라오의 미라가 파괴되면서 그 빛이 바랬습니다.#!"
 lepsius_archaeologist_achievement_found_tutankhamun_loc: "\n #indent_newline:3 • 이 분의 경력에서 하나의 대사건으로 꼽히는 것은 #V 투탕카멘의 무덤#!을 온전히 발견한 것이었습니다.#!"
 lepsius_archaeologist_achievement_found_ship_of_khufu_loc: "\n #indent_newline:3 • #V 쿠푸의 배#!의 발견은 [Scope.GetCharacter.GetLastNameNoFormatting] 박사의 이름이 역사책에 영원히 실리게 되는 계기가 되었습니다.#!"
 lepsius_archaeologist_achievement_found_tower_of_babylon_loc: "\n #indent_newline:3 • 메소포타미아에 머물 당시 고고학계에서는 지구라트 에테멘앙키라는 이름으로 알려진 #V 바빌론의 탑#!을 발견하였습니다. 참 놀라운 발견이 아닐 수 없습니다!#!"
 lepsius_archaeologist_achievement_found_gardens_of_sennacherib_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting](은)는 세계 7대 불가사의를 재발견한 것을 자랑할 수 있는 유일한 사람일지도 모릅니다. 다름아닌 #V 공중 정원#!을 실제로 발견한 것입니다.#!"
 lepsius_archaeologist_achievement_found_treasury_of_atreus_loc: "\n #indent_newline:3 • 물론 고고학자에게 있어 모든 유물이 곧 보물이지만, [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 찾아낸 것은 정말 보물 그 자체입니다. #V 미케네의 보물#!은 황금 가면처럼 대다수가 금으로 만들어진 유물들로 이루어져 있습니다.#!"
 lepsius_archaeologist_achievement_found_tomb_of_pakal_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사가 발견한 #V 파칼의 무덤#!은 마야 문명의 가장 위대한 왕이 묻혀 있다는 점에서 대단히 인상적인 유적으로 평가받고 있습니다.#!"
 lepsius_archaeologist_achievement_raised_flag_on_pyramids_loc: "\n #indent_newline:3 • 이집트 탐사를 진행하던 중 #V 기자의 대피라미드 정상에 국기를 게양#!하였습니다.#!"
 lepsius_archaeologist_achievement_reconstructed_ishtar_gate_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 #V 이슈타르의 문#!을 발굴하였을 뿐만 아니라 복원에도 성공하였습니다. 이제 그 문은 다시금 찬란하게 빛나고 있습니다.#!"
 lepsius_archaeologist_achievement_found_lamassu_loc: "\n #indent_newline:3 • 위험천만하면서도 대단한 모험을 펼치며 장엄한 #V 라마수 석상#!을 찾아냈습니다.#!"
 lepsius_archaeologist_achievement_escaped_labyrinth_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 위험천만한 #V 신화 속 미궁#!에서 탈출하였습니다.#!"
 lepsius_archaeologist_achievement_survived_maya_pyramid_loc: "\n #indent_newline:3 • 고고학은 위험천만할 때가 있습니다. [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 정체불명의 #V 마야 피라미드#! 속을 탐험하여 고고학보다는 모험에 가까운 경험을 겪으며 무사히 살아남았습니다.#!"
 lepsius_archaeologist_achievement_found_vilcabamba_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 잉카 문명 최후의 은신처인 #V 빌라캄바를 다시 발견#!하였습니다."
 lepsius_archaeologist_achievement_discovered_nazca_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 하늘에서만 볼 수 있는 #V 나스카 사막의 거대 지상화를 발견#!하였습니다.#!"
 lepsius_archaeologist_achievement_dinosaur_myth_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 학계의 조롱을 받았습니다. 자신의 #V 탐사대원들이 공룡에게 잡아먹혔다#!는 주장을 펼쳤기 때문입니다. 이 주장은 터무니없는 이야기일까요, 아니면 진실일까요?#!"
 lepsius_archaeologist_achievement_photo_evidence_independent_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 #V 살아 있는 공룡#!의 증거 사진을 공개하였으나 아무도 믿지 않았습니다.#!"
 lepsius_archaeologist_achievement_photo_support_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 정부의 지원을 받아 본인조차 말도 안 되는 일로 생각했던 #V 살아 있는 공룡#!의 증거 사진을 공개할 수 있었습니다.#!"
 lepsius_archaeologist_achievement_discovered_cliff_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 푸에블로인의 #V 절벽 궁전을 발견#!하였습니다.#!"
 lepsius_archaeologist_achievement_restored_angkor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 캄보디아의 정글 속에서 #V 앙코르와트를 재발견#!하였습니다.#!"