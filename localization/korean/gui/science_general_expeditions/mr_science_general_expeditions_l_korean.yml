l_korean:
 MR_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T 대서양 횡단 해저 전신선#!\n전신 기술은 이전에는 상상할 수 없던 속도로 정보를 주고받을 수 있게 해줍니다. 대서양 양쪽에 전신 기지를 세움으로써, 유럽과 아메리카를 더 가깝게 연결할 수 있는 해저 전신선을 설치할 가능성이 생깁니다. 하지만 이를 위해서는 적절한 장비와, 막대한 비용을 감수하고서라도 이를 수익화할 수 있는 발달된 언론 산업이 필요합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_: "수에즈-인도 해저 전신선"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_TT: "#T 수에즈-인도 해저 전신선#!\n수에즈 운하의 개통으로, 인도로 직접 연결되는 해저 전신선을 설치하려는 계획에 새로운 긴급성이 생겼습니다. 영구적인 전신 연결망은 통신 시간을 획기적으로 단축시키고, 아시아와 유럽을 더욱 긴밀히 연결할 수 있을 것입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON: "태평양 횡단 해저 전신선"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON_TT: "#T 태평양 횡단 해저 전신선#!\n대양을 가로지르는 무역이 활발해지고 증기 항로가 아메리카, 아시아, 오세아니아를 연결함에 따라, 태평양을 가로지르는 영구적인 전신 연결망의 필요성이 뚜렷해지고 있습니다. 해저 케이블은 수개월이 걸리던 통신을 단 몇 분 만에 가능하게 하여, 광활한 해양 너머까지 영향력과 조율 능력을 확고히 다져줄 것입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSATLANTIC_CABLE_HAS_TELEGRAPH_COMPANY_TRIGGER_TT: "#default_text [GetPlayer.GetName]는 $mr_basic_telegraphy$ [concept_company]를 보유하고 있습니다.#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NO_TRANSATLANTIC_RADIO_TRIGGER_TT: "#default_text #V 아직 아무도#! #V 대서양을 넘어가는 무선 신호#!를 보내지 못했습니다.#!"
 MR_SUEZ_INDIA_CABLE_CANAL_TRIGGER_TT: "#default_text [GetBuildingType('building_suez_canal').GetName]이 존재합니다.#!"
 MR_TRANSATLANTIC_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName]는 최소 #V 500만#! 규모의 [concept_investment_pool]을 보유하고 있습니다.#!"
 MR_SUEZ_INDIA_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName]는 최소 #V 1000만#! 규모의 [concept_investment_pool]을 보유하고 있습니다.#!"
 MR_TRANSPACIFIC_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName]는 최소 #V 2000만#! 규모의 [concept_investment_pool]을 보유하고 있습니다.#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetName]는 $tesla_transatlantic_cable_expedition_failed_modifier$ 변수가 없습니다.#!"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetName]는 $tesla_suez_india_cable_expedition_failed_modifier$ 변수가 없습니다.#!"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetName]는 $tesla_transpacific_cable_expedition_failed_modifier$ 변수가 없습니다.#!"
 MR_ON_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T 대서양 횡단 해저 전신선#!\n#p 현재 대서양 횡단 해저 전신선 부설를 위한 탐사가 진행 중입니다.#!\n전신 기술은 이전에 없던 속도로 정보를 교환할 수 있게 합니다. 대서양 양쪽에 전신국을 설치함으로써 유럽과 아메리카를 더욱 가깝게 잇는 해저 전신 케이블을 부설할 수 있는 가능성이 생깁니다. 하지만 이 작업은 적절한 장비와, 이처럼 비용이 많이 드는 사업을 수익성 있게 활용할 수 있도록 상당한 투자를 할 수 있는 발달된 뉴스 산업이 필요합니다."
 MR_ON_SUEZ_INDIA_CABLE_EXPEDITION_TT: "#T 수에즈-인도 해저 전신선#!\n#p 현재 수에즈-인도 해저 전신선 부설을 위한 탐사가 진행 중입니다.#!\n수에즈 운하 개통으로 인도까지 직접 연결하는 해저 전신선 부설이 시급한 과제로 떠올랐습니다. 이 영구적인 전신 연결은 통신 시간을 크게 단축시키고 아시아와 유럽을 더욱 긴밀히 연결할 것입니다."
 MR_ON_TRANSPACIFIC_CABLE_EXPEDITION_TT: "#T 태평양 횡단 해저 전신선#!\n#p 현재 태평양 횡단 해저 전신선 부설을 위한 탐사가 진행 중입니다.#!\n대양을 가로지르는 무역이 활발해지고 증기선 노선이 미주와 아시아, 오세아니아를 연결하면서 태평양을 횡단하는 영구적인 전신 연결의 필요성이 커지고 있습니다. 해저 전신선은 수개월 걸리던 통신을 몇 분 만에 가능하게 하여, 광대한 해상 거리에 걸친 영향력과 협력을 견고히 할 것입니다."
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON: "수에즈-인도 해저 전신선"
 MR_PACIFIC_END_OF_ERA_TRIGGER_TT: "#default_text #n 아직#! 어떤 나라도 [GetTechnology('dreadnought').GetName]이나 [GetTechnology('destroyer').GetName]를 연구하지 않았습니다. 현재 연도는 #V 1896년 이전#!입니다.#!"