l_korean:
 MR_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T 대서양 횡단 전신 케이블#!\n빅토리아 시대의 과학은 전신 기술이라는 경이로움을 열어, 정보를 이전과는 비교할 수 없는 속도로 먼 거리까지 전달할 수 있게 되었습니다. 대서양 양쪽에 전신국을 설치함으로써, 해저 케이블을 놓겠다는 비전이 등장했습니다. 이는 고급 공학 기술과, 이 야심찬 사업에 기꺼이 투자할 뉴스 산업이 함께해야 가능한 업적입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_TT: "#T 수에즈-인도 해저 케이블#!\n빅토리아 시대 기술력의 결정체인 수에즈 운하의 개통은 유럽과 인도를 해저 케이블로 직결하려는 움직임에 더욱 박차를 가했습니다. 케이블 연결이 이뤄지면 통신 부문에 혁명을 일으켜 과학 발전의 위력으로 대륙들을 하나로 묶게 될 것입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON: "태평양 횡단 해저 케이블"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON_TT: "#T 태평양 횡단 해저 케이블#!\n증기선과 무역로가 넘쳐나면서 빅토리아 시대의 과학 기술은 태평양을 가로지는 해저 케이블의 부설을 부추기게 되었습니다. 이 기술적 도약은 몇 개월씩 걸리던 서신의 왕래를 단 몇 분으로 단축시켜, 세계 최대 규모의 대양을 가로질러 영향력과 조화를 확대해 나갈 것입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSATLANTIC_CABLE_HAS_TELEGRAPH_COMPANY_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 $mr_basic_telegraphy$ [concept_company]를 보유함#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NO_TRANSATLANTIC_RADIO_TRIGGER_TT: "#default_text #V 아직 아무도#! #V 대서양을 넘어가는 무선 신호#!를 보내지 못했습니다.#!"
 MR_SUEZ_INDIA_CABLE_CANAL_TRIGGER_TT: "#default_text [GetBuildingType('building_suez_canal').GetName]이 존재합니다.#!"
 MR_TRANSATLANTIC_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName](이)가 최소 #V 500만#! 규모의 [concept_investment_pool]을 보유함#!"
 MR_SUEZ_INDIA_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName](이)가 최소 #V 1000만#! 규모의 [concept_investment_pool]을 보유함#!"
