 MR_ON_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T 대서양 횡단 해저 케이블#!\n#p 현재 대서양 횡단 해저 케이블의 부설를 위한 탐사가 진행 중입니다.#!\n빅토리아 시대의 과학은 전신이라는 경이로운 기술을 탄생시켰으며, 정보가 전례 없는 속도로 먼 거리를 오갈 수 있게 만들었습니다. 대서양 양쪽에 전신국을 설치함으로써 해저 케이블을 부설한다는 구상이 실현되었는데, 이는 고도의 공학 기술을 갖추고 그런 원대한 사업에 투자할 의지가 있는 언론 산업이 번창하여야 이룰 수 있는 위업이었습니다."
 MR_ON_SUEZ_INDIA_CABLE_EXPEDITION_TT: "#T 수에즈-인도 해저 케이블#!\n#p 현재 수에즈-인도 해저 케이블 부설을 위한 탐사가 진행 중입니다.#!\n빅토리아 시대 기술력의 결정체인 수에즈 운하의 개통은 유럽과 인도를 해저 케이블로 직결하려는 움직임에 더욱 박차를 가했습니다. 케이블 연결이 이뤄지면 통신 부문에 혁명을 일으켜 과학 발전의 위력으로 대륙들을 하나로 묶게 될 것입니다."
 MR_ON_TRANSPACIFIC_CABLE_EXPEDITION_TT: "#T 태평양 횡단 해저 케이블#!\n#p 현재 태평양 횡단 해저 케이블 부설을 위한 탐사가 진행 중입니다.#!\n증기선과 무역로가 넘쳐나면서 빅토리아 시대의 과학 기술은 태평양을 가로지는 해저 케이블의 부설을 부추기게 되었습니다. 이 기술적 도약은 몇 개월씩 걸리던 서신의 왕래를 단 몇 분으로 단축시켜, 세계 최대 규모의 대양을 가로질러 영향력과 조화를 확대해 나갈 것입니다."
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON: "수에즈-인도 해저 케이블"
