 MR_NATURALIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'ito_naturalist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'ito_naturalist_no_naturalist_loc')]" #deepl:1239426788

 ito_naturalist_achievements_loc: "$ito_naturalist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_zoo_animals_type')][Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_wildlife_documentaries_type')][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').IsSet , Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').IsSet , Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').IsSet , Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').IsSet , Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').IsSet , Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').IsSet , Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').IsSet , Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_goliathus_var').IsSet , Scope.Var('ito_naturalist_achievement_found_goliathus_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').IsSet , Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').IsSet , Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').GetFlagName)]" #deepl:3859703363
 ito_naturalist_no_naturalist_loc: "[concept_dubois_naturalist]#! 의 #V 업적은 여기에 표시됩니다." #deepl:2308010664
 ito_naturalist_achievements_intro_loc: "#V 이 자연주의자의 업적자연주의자#!\n[Scope.GetCharacter.GetFullName] 는 [Scope.Var('dubois_naturalist_total_specimens_var').GetValue|0*V] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] 을 수집한 뛰어난 자연주의자입니다." #deepl:2770611838

 ito_naturalist_achievement_total_zoo_animals_loc: "\n자연주의자로 [Scope.GetCharacter.GetHerHis] 재직하는 동안 총 [Scope.GetVariable('ito_naturalist_total_zoo_animals_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] 을 캡처하여 [GetPlayer.MakeScope.GetCountry.GetName] 으로 가져왔습니다." #deepl:3523686073
 ito_naturalist_achievement_total_wildlife_documentaries_loc: "\[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetFullName] [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetVariable('ito_character_num_animal_documentations_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] 자연 서식지 문서화로 잘 알려져 있습니다." #deepl:2453492304
 ito_naturalist_achievement_invented_evolution_theory_loc: "\ [Scope.GetCharacter.GetHerHis] 가장 큰 업적 중 하나는 진화론을 처음으로 설명한 책 \"#V 종의 기원#!\"이었습니다." #deepl:510074125
 ito_naturalist_achievement_attended_hippocampus_congress_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 인간이 특별한 존재인지 아니면 다른 모든 동물과 같은 동물에 불과한지를 결정하는 토론에 참여했습니다." #deepl:1532833643
 ito_naturalist_achievement_showed_evolution_in_peppered_moths_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 #V 고추나방이 변화하는 환경에 적응하기 위해#! 진화한다는 것을 보여주었습니다. 진화론에 대한 증거입니다." #deepl:4279082533
 ito_naturalist_achievement_finished_pacific_expedition_loc: "\ #V 태평양 탐험#!, [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 이 경이로운 곳의 동식물을 광범위하게 탐험했고 [Scope.GetCharacter.GetSheHe] 새로운 종을 많이 발견했습니다." #deepl:1584400015
 ito_naturalist_achievement_wallace_line_discovered_loc: "\태평양을 여행하던 중 [Scope.GetCharacter.GetLastNameNoFormatting] 아시아 동식물과 호주 동식물 사이에 #V 명확한 분리가 있음을 발견했습니다#!. 이 발견은 진화론을 뒷받침하며 과거에 두 섬이 크게 분리되었음을 시사합니다." #deepl:970429435
 ito_naturalist_achievement_inaugurated_zoo_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 는 #V 동물원 개장에 중요한 역할을 했습니다#!. 먼 곳의 동물들을 가까이에서 볼 수 있는 곳." #deepl:915470862
 ito_naturalist_achievement_found_victoria_amazonica_loc: "\아마존 열대우림으로 떠난 식물 탐험에서 [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 #V 자이언트 수련#! 을 발견했습니다. 지름 3미터까지 잎을 키울 수 있는 독특한 식물입니다." #deepl:3652726149
 ito_naturalist_achievement_found_attacus_atlas_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 인도차이나에서 식물 탐험을 하던 중 #V 타이타닉 나방#! 을 발견했습니다. 세계에서 가장 큰 나비 중 하나이며 매우 튼튼한 실크를 생산합니다." #deepl:3954278434
 ito_naturalist_achievement_found_amorphophallus_titanum_loc: "\식물 탐험 중 보르네오를 탐험하던 [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 높이 3미터까지 자라는 #V 거대한 꽃#! 을 발견했습니다. 진정한 식물의 기적이죠." #deepl:998846928
 ito_naturalist_achievement_found_goliathus_loc: "\콩고 열대우림에는 많은 경이로움이 숨어 있습니다. 그중 하나가 식물 탐험 중이던 [Scope.GetCharacter.GetLastNameNoFormatting] 박사에 의해 발견되었습니다. #V  골리앗 딱정벌레#! 는 세계에서 가장 큰 곤충 중 하나이며 매우 희귀한 것으로 알려져 있습니다." #deepl:3755908676
 ito_natualist_achievement_forestry_improvement_finished_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 산림과 임업 개선 방법에 관한 [Scope.GetCharacter.GetHerHis] 연구로 잘 알려져 있습니다." #deepl:3521424779
 ito_naturalist_achievement_rubber_improvement_finished_loc: "\[Scope.GetCharacter.GetHerHis|U] 고무 농장에서의 작업과 최상의 재배 조건에 대한 실험을 통해 우리나라는 고무 생산량을 크게 향상시킬 수 있었습니다." #deepl:1444884744
