l_korean:
 MR_NATURALIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'ito_naturalist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'ito_naturalist_no_naturalist_loc')]"
 ito_naturalist_achievements_loc: "$ito_naturalist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_zoo_animals_type')][Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_wildlife_documentaries_type')][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').IsSet , Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').IsSet , Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').IsSet , Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_great_barrier_reef_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_great_barrier_reef_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').IsSet , Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').IsSet , Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').IsSet , Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').IsSet , Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_goliathus_var').IsSet , Scope.Var('ito_naturalist_achievement_found_goliathus_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').IsSet , Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').IsSet , Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').GetFlagName)]"
 ito_naturalist_no_naturalist_loc: "이 #V [concept_dubois_naturalist]#!의 업적은 하나라도 달성하면 여기 표시됩니다."
 ito_naturalist_achievements_intro_loc: "#V 이 박물학자의 업적#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName]는 각고의 노력 끝에 [Scope.Var('dubois_naturalist_total_specimens_var').GetValue|0*V]점의 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]을 찾아내어 과학 지식의 지평을 넓힌 뛰어난 박물학자입니다.#!"
 ito_naturalist_achievement_total_zoo_animals_loc: "\n #indent_newline:3 • 이 분께서 박물학자로 활동하는 동안 총 [Scope.GetVariable('ito_naturalist_total_zoo_animals_var').GetValue|0+]마리의 [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]을 확보하여 [GetPlayer.MakeScope.GetCountry.GetName]에 들임으로써 국가가 소장한 동물의 다양성을 높이고 대중이 계몽하는 계기를 조성하였습니다.#!"
 ito_naturalist_achievement_total_wildlife_documentaries_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.Var('ito_naturalist_var').GetCharacter.GetFullName](은)는 [GetPlayer.MakeScope.Var('ito_naturalist_var').GetVariable('ito_character_num_animal_documentations_var').GetValue|0+]종의 [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]을 자연 서식지에서 기록하여 과학계에 귀중한 공헌을 하였으며, 그 자체로 자연사의 발전에 한몫하였습니다.#!"
 ito_naturalist_achievement_invented_evolution_theory_loc: "\n #indent_newline:3 • 박사의 가장 위대한 업적으로는 진화론을 처음으로 명확히 제시하여 생물학의 흐름을 영구히 바꿔놓은 《#V 종의 기원#!》의 출간이 꼽힙니다.#!"
 ito_naturalist_achievement_attended_hippocampus_congress_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 권위 있는 해마 학술회의에 참석하여, 동물계 내에서 인류의 독자성에 관한 열띤 논쟁에 참여하였습니다.#!"
 ito_naturalist_achievement_showed_evolution_in_peppered_moths_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 #V 후추나방#!의 적응에 관한 실증적 증거를 제시하여, 세심한 관찰을 통해 진화론의 원리를 입증하였습니다.#!"
 ito_naturalist_achievement_finished_pacific_expedition_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 태평양 탐사#!에 나서 해당 지역의 동식물상을 철저히 조사하여, 종전까지 학계에 알려지지 않았던 수많은 종을 발견하였습니다.#!"
 ito_naturalist_achievement_wallace_line_discovered_loc: "\n #indent_newline:3 • 태평양을 횡단하던 중, [Scope.GetCharacter.GetLastNameNoFormatting]는 #V 아시아와 오스트레일리아 생물계 사이의 뚜렷한 경계#!를 식별해 냈고, 이는 진화론에 신빙성을 더해 주는 동시에 이 땅들이 오래전에 분리되었음을 밝히는 계기가 되었습니다.#!"
 ito_naturalist_achievement_inaugurated_zoo_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting](은)는 #V 동물원의 설립#!에 중심적인 역할을 하였으며, 이국적인 동물종을 관찰할 기회를 일반에 제공하고 과학적 교육이라는 큰 뜻을 이룩하였습니다.#!"
 ito_naturalist_achievement_found_victoria_amazonica_loc: "\n #indent_newline:3 • 아마존으로의 식물학 탐사 도중, [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 #V 거대 수련#!을 발견하였습니다. 이는 잎의 지름이 무려 3미터에 달할 수 있는 자연의 경이로움을 볼 수 있습니다.#!"
 ito_naturalist_achievement_found_attacus_atlas_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 인도차이나 지역의 거대 나방으로 몸체의 크기와 견고한 비단으로 유명한 #V 아틀라스나방#!을 발견하며, 곤충학 지식을 한층 더 강화하게 되었습니다.#!"
 ito_naturalist_achievement_found_amorphophallus_titanum_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 보르네오를 탐사하던 도중 최대 3m까지 자라는 거대 꽃인 #V 아모르포팔루스 티타눔#!의 존재를 확인하며, 식물학계에서도 엄청난 관심을 불러모은 사건으로 기록되었습니다.#!"
 ito_naturalist_achievement_found_goliathus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 콩고의 열대우림에서 현재까지 알려진 곤충 가운데 가장 크기가 큰 #V 골리앗풍뎅이#!를 만났습니다. 그 희귀함과 거대함은 학계를 사로잡았습니다."
 ito_natualist_achievement_forestry_improvement_finished_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 교수는 임학 분야에서의 선구적인 연구로 삼림 자원의 지속적인 관리와 개량 방법을 발전시킨 것으로 이름나 있습니다.#!"
 ito_naturalist_achievement_rubber_improvement_finished_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis|U] 노력은 고무 재배에 관한 실험을 성실히 수행함으로써 플랜테이션의 생산성을 크게 향상시켜 국가에 상당한 이익을 선사하였습니다.#!"
 ito_naturalist_achievement_great_barrier_reef_discovered_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 태평양 탐험에서 #V 그레이트 배리어 리프#!를 철저히 조사하고, 그 생태학적 중요성을 처음으로 인정하였습니다.#!"
