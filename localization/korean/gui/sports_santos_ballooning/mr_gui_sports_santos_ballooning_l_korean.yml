l_korean:
 MR_GORDON_BENNETT_CUP_BUTTON: "고든 베넷 컵"
 MR_GORDON_BENNETT_CUP_BUTTON_TT: "#T 고든 베넷 컵#!\n고든 베넷 컵(Gordon Bennett Cup, 또는 쿠프 아에로나우티크 고든 베넷)은 세계에서 가장 오래된 가스 기구 경주입니다. 항공학의 '블루 리본'으로 불리는 이 대회는 백만장자 스포츠맨이자 뉴욕 헤럴드 신문 소유주였던 제임스 고든 베넷 주니어의 후원으로 시작되었습니다. 주최 측에 따르면 대회의 목적은 \"단순하다. 출발 지점에서 가장 먼 거리를 비행하는 것\"입니다. 이 대회는 1906년부터 1938년까지 이어졌으며, 제1차 세계대전으로 인해 1914년부터 1919년까지, 그리고 1931년에는 중단되었습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GORDON_BENNETT_PUBLISHER_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName])(은)는 총 #V 10개 이상의 [GetBuildingType('building_manzoni_publishing_industry').GetName] 건물 단계를 보유하고 있습니다#!.#!"