l_korean:
 MR_COMPOSER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'elgar_composer_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'elgar_composer_achievements_no_composer_loc')]"
 elgar_composer_achievements_loc: "$elgar_composer_achievements_intro_loc$[Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_virtuoso_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_conductor_type')]"
 elgar_composer_achievements_no_composer_loc: "이 [concept_elgar_composer]#!의 #V 업적은, 하나라도 달성하면 여기 표시됩니다."
 elgar_composer_achievements_intro_loc: "#V 이 작곡가의 업적#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName]는 [Scope.Var('elgar_composer_experience').GetValue|V0]의 명성을 가진 작곡가입니다. 지금까지 [Scope.GetCharacter.GetSheHe]는 [Scope.Var('elgar_composer_num_tours_var').GetValue|V0]회의 순회 공연을 했습니다. [Scope.GetCharacter.GetHerHis] 수많은 작품 중에서 [Scope.Var('elgar_composer_num_compositions_var').GetValue|V0]편이 특히 돋보입니다.#!"
 elgar_composer_achievement_is_composer_virtuoso_loc: "\n#indent_newline:3 •[Scope.GetCharacter.GetSheHe|U]는 뛰어난 #V 명연주자#!입니다.#!"
 elgar_composer_achievement_is_composer_conductor_loc: "\n#indent_newline:3 • [Scope.GetCharacter.GetSheHe|U]는 유명한 #V 지휘자#!로 평가받고 있습니다.#!"