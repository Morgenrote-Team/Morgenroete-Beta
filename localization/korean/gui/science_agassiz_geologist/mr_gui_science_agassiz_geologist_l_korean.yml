l_korean:
 mr_science_geologist_tab_organization: "조직"
 MR_GEOLOGIST_HIGHEST_MOUNTAIN_BUTTON: "가장 높은 산"
 MR_GEOLOGIST_HIGHEST_MOUNTAIN_BUTTON_TT: "#T 가장 높은 산#!\n18세기 이래로 기존의 지질학적 세계관은 점차 흔들리기 시작했습니다. 오랫동안 안데스산맥이 세계에서 가장 높은 산맥으로 여겨졌지만, 이제는 히말라야가 점점 더 주목받고 있습니다. 가장 높은 산을 찾으려는 탐구는 지질학자들의 상상력을 자극해 왔지만, 그 여정은 아직도 끝나지 않았습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_HIMALAYAS_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 히말라야 지역에 이해 관계를 보유함#!"
 MR_GEOLOGIST_NO_HIMALAYA_SURVEY_TRIGGER_TT: "#default_text 현재 다른 어떤 나라도 가장 높은 산을 찾기 위해 히말라야를 탐사하고 있지 않습니다.#!"
 MR_GEOLOGIST_URANIUM_BUTTON: "우라늄 탐사"
 MR_GEOLOGIST_URANIUM_BUTTON_TT: "#T 우라늄 탐사#!\n지질학자를 해외로 파견해 우라늄 매장지를 탐색하고, 경우에 따라 그곳에 자체 광산을 설립할 수 있습니다. 다만 해당 국가의 우라늄을 우리나라로 들여오려면 별도의 계약을 체결해야 한다. 이 과정은 최대 5년이 걸릴 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_FIND_URANIUM_TRIGGER_TT: "#default_text 아직 발견되지 않은 우라늄 매장지가 하나 이상 존재함#!"
 MR_GEOLOGIST_URANIUM_STOP_BUTTON_TT: "#T 우라늄 탐사#!\n우리의 [concept_agassiz_geologist]는 현재 세계 곳곳에서 아직 알려지지 않은 우라늄 매장지를 탐색하고 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_geologist_uranium_stop_button_effect_tt: "[concept_agassiz_geologist]가 우라늄 탐사를 중단합니다."