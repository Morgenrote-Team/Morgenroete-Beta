l_korean:
 MR_GEOLOGIST_ACHIEVEMENTS: "[AddLocalizationIf( Scope.IsSet , 'agassiz_geologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'agassiz_geologist_no_geologist_loc')]"
 agassiz_geologist_achievements_loc: "$agassiz_geologist_achievements_intro_loc$[AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_seismology_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_seismology_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').IsSet , Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_explored_volcano_var').IsSet , Scope.Var('agassiz_geologist_achievement_explored_volcano_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('aagassiz_geologist_achievement_ring_of_fire_discovered_var').IsSet , Scope.Var('agassiz_geologist_achievement_ring_of_fire_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_moon_impact_var').IsSet , Scope.Var('agassiz_geologist_achievement_moon_impact_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').GetFlagName)]"
 agassiz_geologist_no_geologist_loc: "이 [concept_agassiz_geologist]#!의 #V 업적은 하나라도 달성하면 여기 표시됩니다."
 agassiz_geologist_achievements_intro_loc: "#V 이 지질학자의 업적#!\nDr. [Scope.GetCharacter.GetLastNameNoFormatting]는 뛰어난 지질학자로, [Scope.GetVariable('agassiz_geologist_minerals_var').GetValue|0V]개의 [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]과 [Scope.GetVariable('agassiz_geologist_rare_minerals_var').GetValue|0V]개의 [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]을 수집했습니다. [Scope.GetCharacter.GetHerHis|U]의 지질학 연구는 우리에게 [Scope.GetVariable('agassiz_geologist_geological_knowledge_var').GetValue|0V]의 [concept_agassiz_geological_knowledge]를 제공했습니다."
 agassiz_geologist_achievement_invented_seismology_loc: "#V 지진학의 발명#!은 Dr. [Scope.GetCharacter.GetLastNameNoFormatting]의 가장 위대한 업적 중 하나입니다.\n이는 지진과 화산 폭발을 예측할 수 있게 해줍니다."
 agassiz_geologist_achievement_invented_plate_tectonics_loc: "#V 판구조론의 발명#!은 [Scope.GetCharacter.GetLastNameNoFormatting] 박사의 가장 위대한 업적 중 하나일까요?\n[Scope.GetCharacter.GetHerHis]의 동료들 모두가 이 이론을 받아들이는 것은 아니기에, 이 이론이 [Scope.GetCharacter.GetHerHis]의 가장 중요한 발견으로 인정받을지 아니면 잊혀질지는 미래만이 알 수 있습니다."
 agassiz_geologist_achievement_attended_geologist_congress_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 판구조론에 관한 지질학 회의#!에 참석했습니다."
 agassiz_geologist_achievement_explored_volcano_loc: "\n#V 화산 탐사#!는 위험한 시도지만, Dr. [Scope.GetCharacter.GetLastNameNoFormatting]는 그 탐사에서 많은 것을 배웠습니다."
 agassiz_geologist_achievement_discovered_helium_on_earth_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 지구상에서 헬륨을 최초로 발견한 인물#!로, 이는 분명히 미래에 매우 유용한 자원이 될 것입니다."
 agassiz_geologist_achievement_finished_pacific_expedition_loc: "\n[Scope.GetCharacter.GetFullNameNoFormatting]은(는) #V 태평양 탐험#!에 참여했습니다."
 agassiz_geologist_achievement_returned_from_center_of_earth_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] 박사는 분명히 #V 지구의 중심에 도달#!했다가 다시 돌아왔다고 합니다. 하지만 이 이야기가 정말 사실일까요?"
 mr_science_geologist_tab_organization: "조직"
 MR_GEOLOGIST_HIGHEST_MOUNTAIN_BUTTON: "가장 높은 산"
 MR_GEOLOGIST_HIGHEST_MOUNTAIN_BUTTON_TT: "#T 가장 높은 산#!\n18세기 이후로 기존의 지질학적 세계관은 점점 흔들리기 시작했습니다. 오랫동안 세계에서 가장 높은 산맥으로 여겨졌던 안데스는 점차 히말라야에게 그 자리를 내주고 있습니다. 가장 높은 산을 찾기 위한 탐구는 지질학자들의 상상력을 자극해 왔지만, 그 여정은 아직 끝나지 않았습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_HIMALAYAS_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName]는 히말라야 지역에 이해관계를 가지고 있습니다.#!"
 MR_GEOLOGIST_NO_HIMALAYA_SURVEY_TRIGGER_TT: "#default_text 현재 히말라야에서 가장 높은 산을 찾기 위한 탐사를 진행 중인 국가는 없습니다.#!"
 agassiz_geologist_achievement_moon_impact_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 달이 형성된 것은 지구와 미지의 거대한 천체가 충돌했기 때문이라는 가설#!을 세웠습니다. 매우 추측적인 이론이지만, 그 독창성만큼은 인정받고 있습니다."
 agassiz_geologist_achievement_ring_of_fire_discovered_loc: "\nOn an #V Expedition to the Pacific Ocean#!, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] noted the massive concentration of volcanoes at the edge of the ocean - the #V Ring of Fire#! - and believes this was no coincidence. [Scope.GetCharacter.GetSheHe|U] thus provided an important impetus to geological research."