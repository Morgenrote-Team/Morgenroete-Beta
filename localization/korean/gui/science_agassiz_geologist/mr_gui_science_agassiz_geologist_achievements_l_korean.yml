l_korean:
 MR_GEOLOGIST_ACHIEVEMENTS: "[AddLocalizationIf( Scope.IsSet , 'agassiz_geologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'agassiz_geologist_no_geologist_loc')]"
 agassiz_geologist_achievements_loc: "$agassiz_geologist_achievements_intro_loc$[AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_seismology_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_seismology_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').IsSet , Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_explored_volcano_var').IsSet , Scope.Var('agassiz_geologist_achievement_explored_volcano_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('aagassiz_geologist_achievement_ring_of_fire_discovered_var').IsSet , Scope.Var('agassiz_geologist_achievement_ring_of_fire_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_moon_impact_var').IsSet , Scope.Var('agassiz_geologist_achievement_moon_impact_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').GetFlagName)]"
 agassiz_geologist_no_geologist_loc: "이 #V [concept_agassiz_geologist]의 업적#!은 하나라도 달성하면 이곳에 표시됩니다."
 agassiz_geologist_achievements_intro_loc: "#V 이 지질학자의 업적#!\n#indent_newline:3 [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 뛰어난 지질학자로, [Scope.GetVariable('agassiz_geologist_minerals_var').GetValue|0V]개의 [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]과 [Scope.GetVariable('agassiz_geologist_rare_minerals_var').GetValue|0V]개의 [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]을 수집했습니다. [Scope.GetCharacter.GetHerHis|U]의 지질학 연구는 우리에게 [Scope.GetVariable('agassiz_geologist_geological_knowledge_var').GetValue|0V]개의 [concept_agassiz_geological_knowledge]을 선사했습니다.#!"
 agassiz_geologist_achievement_invented_seismology_loc: "\n#indent_newline:3 • #V 지진학의 발명#!은 [Scope.GetCharacter.GetLastNameNoFormatting] 박사의 가장 위대한 업적입니다.\n 이것으로 지진과 화산 폭발을 예측할 수 있게 되었습니다.#!"
 agassiz_geologist_achievement_invented_plate_tectonics_loc: "\n #indent_newline:3 • #V 판구조론의 창안#!은 [Scope.GetCharacter.GetLastNameNoFormatting] 박사의 가장 위대한 업적인가? 박사의 동료 학자들 모두가 수용한 것은 아니므로, 판구조론이 [Scope.GetCharacter.GetHerHis]의 가장 중요한 발견으로 인정받을지 아니면 잊혀질지는 훗날 밝혀질 일입니다.#!"
 agassiz_geologist_achievement_attended_geologist_congress_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] #V attended the Geological Congress on Plate Tectonics#!.#!"
 agassiz_geologist_achievement_explored_volcano_loc: "\n #indent_newline:3 • #V Exploring a Volcano#! is a dangerous endeavour, but Dr. [Scope.GetCharacter.GetLastNameNoFormatting] learned a lot from the expedition on one of them.#!"
 agassiz_geologist_achievement_discovered_helium_on_earth_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] was the first person to #V discover Helium on Earth#! which will surely be a very useful ressource in the future.#!"
 agassiz_geologist_achievement_finished_pacific_expedition_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetFullNameNoFormatting] participated in a #V Pacific Expedition#!.#!"
 agassiz_geologist_achievement_returned_from_center_of_earth_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] apparently #V reached the Center of Earth#! and returned from there again. But is this story really true?#!"
 agassiz_geologist_achievement_moon_impact_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] hypothesized that the #V Moon was formed when an unknown, large celestial body collided with the Earth#!. A highly speculative theory, but one with great originality.#!"
 agassiz_geologist_achievement_ring_of_fire_discovered_loc: "\n #indent_newline:3 • On an #V Expedition to the Pacific Ocean#!, Dr. [Scope.GetCharacter.GetLastNameNoFormatting] noted the massive concentration of volcanoes at the edge of the ocean - the #V Ring of Fire#! - and believes this was no coincidence. [Scope.GetCharacter.GetSheHe|U] thus provided an important impetus to geological research.#!"