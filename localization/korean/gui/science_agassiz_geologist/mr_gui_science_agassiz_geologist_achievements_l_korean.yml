l_korean:
 MR_GEOLOGIST_ACHIEVEMENTS: "[AddLocalizationIf( Scope.IsSet , 'agassiz_geologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'agassiz_geologist_no_geologist_loc')]"
 agassiz_geologist_achievements_loc: "$agassiz_geologist_achievements_intro_loc$[AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_seismology_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_seismology_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').IsSet , Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_explored_volcano_var').IsSet , Scope.Var('agassiz_geologist_achievement_explored_volcano_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').GetFlagName)]"
 agassiz_geologist_no_geologist_loc: "The #V Achievements of this [concept_agassiz_geologist]#! will be displayed here, once you have one."
 agassiz_geologist_achievements_intro_loc: "#V Achievements of thisGeologist#!\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] is an accomplished Geologist who has collected [Scope.GetVariable('agassiz_geologist_minerals_var').GetValue|0V] [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] and [Scope.GetVariable('agassiz_geologist_rare_minerals_var').GetValue|0V] [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]. [Scope.GetCharacter.GetHerHis|U] research in Geology provided us with [Scope.GetVariable('agassiz_geologist_geological_knowledge_var').GetValue|0V] [concept_agassiz_geological_knowledge]."
 agassiz_geologist_achievement_invented_seismology_loc: "\nThe #V invention of Seismology#! is one of Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s greatest achievements. It allows to predict Earthquakes and Vulcanic Eruptions."
 agassiz_geologist_achievement_invented_plate_tectonics_loc: "\nIs the #V invention of the Theory of Plate Tectonics#! one of Dr. [Scope.GetCharacter.GetLastNameNoFormatting]'s greatest achievements? As not all of [Scope.GetCharacter.GetHerHis] colleagues are accepting the theory, only the future will tell if it will be considered as [Scope.GetCharacter.GetHerHis] most important discovery or if it will be forgotten."
 agassiz_geologist_achievement_attended_geologist_congress_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V attended the Geological Congress on Plate Tectonics#!."
 agassiz_geologist_achievement_explored_volcano_loc: "\n#V Exploring a Volcano#! is a dangerous endeavour, but Dr. [Scope.GetCharacter.GetLastNameNoFormatting] learned a lot from the expedition on one of them."
 agassiz_geologist_achievement_discovered_helium_on_earth_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] was the first person to #V discover Helium on Earth#! which will surely be a very useful ressource in the future."
 agassiz_geologist_achievement_finished_pacific_expedition_loc: "\n[Scope.GetCharacter.GetFullNameNoFormatting] participated in a #V Pacific Expedition#!."
 agassiz_geologist_achievement_returned_from_center_of_earth_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] apparently #V reached the Center of Earth#! and returned from there again. But is this story really true?"