 MR_GEOLOGIST_ACHIEVEMENTS: "[AddLocalizationIf( Scope.IsSet , 'agassiz_geologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'agassiz_geologist_no_geologist_loc')]" #deepl:4065666483

 agassiz_geologist_achievements_loc: "$agassiz_geologist_achievements_intro_loc$[AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_seismology_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_seismology_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').IsSet , Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_explored_volcano_var').IsSet , Scope.Var('agassiz_geologist_achievement_explored_volcano_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').GetFlagName)]" #deepl:1006055885
 agassiz_geologist_no_geologist_loc: "[concept_agassiz_geologist]#! 의 #V 업적은 여기에 표시됩니다." #deepl:2266901269
 agassiz_geologist_achievements_intro_loc: "#V 이 업적지질학자#!\n박사 [Scope.GetCharacter.GetLastNameNoFormatting] 는 [Scope.GetVariable('agassiz_geologist_minerals_var').GetValue|0V] [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] 및 [Scope.GetVariable('agassiz_geologist_rare_minerals_var').GetValue|0V] [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] 를 수집 한 뛰어난 지질학자입니다. [Scope.GetCharacter.GetHerHis|U] 지질학 연구는 [Scope.GetVariable('agassiz_geologist_geological_knowledge_var').GetValue|0V] [concept_agassiz_geological_knowledge] ." #deepl:2506244890

 agassiz_geologist_achievement_invented_seismology_loc: "\ #V 지진학#! 발명은 [Scope.GetCharacter.GetLastNameNoFormatting] 박사의 가장 큰 업적 중 하나입니다. 지진과 화산 폭발을 예측할 수 있습니다." #deepl:4027906331
 agassiz_geologist_achievement_invented_plate_tectonics_loc: "\ #V 판구조론#! 의 발명은 [Scope.GetCharacter.GetLastNameNoFormatting] 박사의 가장 위대한 업적 중 하나인가요? 모든 [Scope.GetCharacter.GetHerHis] 동료들이 이 이론을 받아들이는 것은 아니기 때문에, 이 이론이 [Scope.GetCharacter.GetHerHis] 가장 중요한 발견으로 간주될지 아니면 잊혀질지는 앞으로의 시간만이 알 수 있을 것입니다." #deepl:1012351458
 agassiz_geologist_achievement_attended_geologist_congress_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] #V  박사, 판구조론 지질학 회의에 참석#!." #deepl:941722190
 agassiz_geologist_achievement_explored_volcano_loc: "\#V #! 화산 탐험은 위험한 도전이지만, [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 화산 탐험을 통해 많은 것을 배웠습니다." #deepl:3489984187
 agassiz_geologist_achievement_discovered_helium_on_earth_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 지구에서 헬륨을 발견한 최초의 사람입니다#! 앞으로 매우 유용한 자원이 될 것입니다." #deepl:1490724762
 agassiz_geologist_achievement_finished_pacific_expedition_loc: "\[Scope.GetCharacter.GetFullNameNoFormatting] 태평양 원정대 #V 에 참여#!." #deepl:1964542330
 agassiz_geologist_achievement_returned_from_center_of_earth_loc: "\ [Scope.GetCharacter.GetLastNameNoFormatting] 박사는 #V 지구의 중심에 도달했다가#! 그곳에서 다시 돌아왔다고 합니다. 하지만 이 이야기가 정말 사실일까요?" #deepl:3298936682
