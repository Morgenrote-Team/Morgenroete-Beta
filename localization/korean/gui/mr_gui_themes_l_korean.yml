l_korean:
 theme_mr_paleontology: "모겐로테: 고생물학(흙)" #deepl:1069050187
 theme_mr_paleontology_desc: "고생물학, 화석, 공룡 뼈에서 영감을 받은 사용자 인터페이스." #deepl:415348285

 mr_papermap_coprolite: "고생물학: 코프로라이트"
 mr_papermap_coprolite_desc: "고생물학자가 현재 코프로라이트를 준비하고 있는 것 같습니다. 코프로라이트가 뭔지 궁금하신가요? 그것은 화석화된 똥입니다. 이 경우에는 아마도 공룡의 똥일 거예요."
 mr_papermap_belemnite: "고생물학: 벨렘나이트" #Please replace
 mr_papermap_belemnite_desc: "고생물학자가 발견한 벨렘나이트 화석. 이 생물은 3억 5,800만 년에서 6,600만 년 전 바다를 돌아다녔습니다." #Please replace
 mr_papermap_ammonite: "고생물학: 암모나이트" #Please replace
 mr_papermap_ammonite_desc: "가장 유명한 화석 중 하나입니다. 이 암모나이트는 수백만 년 전에 바다를 돌아다녔습니다. 이제 테이블을 장식하는 멋진 장식이 되었습니다." #Please replace
 mr_papermap_trilobite: "고생물학: 삼엽충"
 mr_papermap_trilobite_desc: "삼엽충은 최초의 절지동물 중 하나이며 매우 성공적이었어요. 안타깝게도 페름기에 멸종했습니다. 다행히도 일부는 화석화되어 기념품으로 테이블 위에 올려놓을 수 있습니다."

 mr_papermap_battenberg_cake: "요리: 바텐버그 케이크"
 mr_papermap_battenberg_cake_desc: "배고프세요? 이 맛있는 케이크를 식탁에 올려보세요. 마지팬으로 덮인 스펀지 케이크로 바텐베르그의 루이 왕자의 이름을 딴 케이크입니다."
 mr_papermap_cucumber_ice_cream: "요리: 오이 아이스크림"
 mr_papermap_cucumber_ice_cream_desc: "하늘에서 햇볕이 내리쬐는 화창한 날입니다. 놀랍도록 상쾌한 오이 아이스크림보다 더 좋은 것이 있을까요?"
