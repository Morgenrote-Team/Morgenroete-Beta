l_korean:
 theme_mr_paleontology: "모르겐뢰테: 고생물학(흙)"
 theme_mr_paleontology_desc: "고생물학, 화석, 공룡 뼈에서 영감을 받은 사용자 인터페이스."
 mr_papermap_coprolite: "고생물학: 코프로라이트"
 mr_papermap_coprolite_desc: "한 고생물학자가 현재 코프로라이트를 준비하고 있는 것 같습니다. 코프로라이트가 뭔지 궁금하신가요? 화석화된 배설물입니다. 이 경우 아마도 공룡의 것이겠죠."
 mr_papermap_belemnite: "고생물학: 벨렘나이트"
 mr_papermap_belemnite_desc: "고생물학자가 발견한 벨렘나이트 화석. 이 생물들은 약 3억 5천 8백만 년 전부터 6천 6백만 년 전까지 바다를 누볐습니다."
 mr_papermap_ammonite: "고생물학: 암모나이트"
 mr_papermap_ammonite_desc: "가장 유명한 화석 중 하나입니다. 이 암모나이트는 수백만 년 전 바다를 누비던 생물이었습니다. 이제는 당신의 책상을 장식하는 멋진 소품이 되었습니다."
 mr_papermap_trilobite: "고생물학: 삼엽충"
 mr_papermap_trilobite_desc: "삼엽충은 가장 초기의 절지동물 중 하나였으며 매우 번성했습니다. 안타깝게도 페름기 말에 멸종했지만, 일부는 운 좋게 화석으로 남아 지금은 책상 위에 놓고 감상할 수 있는 멋진 기념품이 되었습니다."
 mr_papermap_battenberg_cake: "요리: 바텐베르크 케이크"
 mr_papermap_battenberg_cake_desc: "배가 고프신가요? 그렇다면 이 맛있는 케이크를 책상 위에 올려두는 건 어떨까요? 이 케이크는 마지팬으로 덮인 스펀지 케이크로, 바텐베르크 공 루이스의 이름을 따서 만들어졌습니다."
 mr_papermap_old_fashioned: "요리: 올드 패션드"
 mr_papermap_old_fashioned_desc: "긴 하루가 끝난 후 좋은 올드 패션드 한 잔보다 더 좋은 게 있을까요? 분명 바텐더가 이 칵테일로 당신을 기분 좋게 만들어 줄 겁니다!"
 mr_papermap_cucumber_ice_cream: "요리: 오이 아이스크림"
 mr_papermap_cucumber_ice_cream_desc: "하늘에 해가 쨍쨍 내리쬐는 무더운 날, 이보다 더 좋은 건 상쾌한 오이 아이스크림일 거예요!"
 mr_papermap_croissant_hot_chocolate: "요리: 크루아상과 핫초코"
 mr_papermap_croissant_hot_chocolate_desc: "아침에 크루아상과 핫초코는 하루를 시작하는 가장 좋은 방법입니다. 어떤 일이 기다리고 있더라도요."