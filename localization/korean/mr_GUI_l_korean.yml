 MR_SAFARI_EXPEDITION_HABITAT_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 대형 사냥감을 갖춘 #V 아프리카 동물 서식지를 하나 이상 보유#!하거나, #V 분권형 국가가 보유하는 주#!에 그 서식지가 존재함#!"
