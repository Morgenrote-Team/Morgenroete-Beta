 MR_ACADEMICS_PROMOTE_ANTHROPOLOGIST_EFFECT_TT: "다음 과학자는 [concept_andersson_anthropologist]가 될 것입니다."
 MR_ACADEMICS_PROMOTE_UNIVERSITY_INVESTMENT_TT: "#T 학계 투자#!\n우리 대학을 대상으로 한 정부의 종합적인 투자로 #O 학자 양성 진행도#!가 매달 #G +1#!씩 오릅니다. 예산 지원 기한은 총 10년입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_PROMOTE_UNIVERSITY_INVESTMENT_TRIGGER_TT: "[GetPlayer.GetAdjective]에서 이미 학계에 투자하고 있지 않음"
 MR_ACADEMICS_AVANTGARDE_TT: "#T 아방가르드 지식인#!\n확고한 문화·사회·인류학 사상을 갖춘 학자들이 모여 학계의 일상을 좌우합니다. 반대로 실용적인 분야는 상대적으로 중요도가 떨어지게 됩니다.\n#R 참고:#! 매달 학자 등장 확률이 1점씩 증가합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_AVANTAGRDE_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName]에서 아직 #b 아방가르드 지식인#! 중점을 보유하지 않고 최근에 중점을 변경하지 않음#!"
 MR_ACADEMICS_AVANTGARDE_BUILDING_REQUIREMENT_TT: "#default_text [GetPlayer.GetAdjective]의 대학 중 #p 50%#!가 [concept_pm_academics_university_humanities]을 채택함#!"
 MR_ACADEMICS_PRACTICAL_TT: "#T 실용적인 학계#!\n우리나라의 학자들은 모든 분야에서 일상 생활에 유용하게 쓰일 수 있는 새로운 발견을 하고자 노력합니다. 이는 인류의 보편적 발전과 평화를 위한 것입니다.\n#R 참고:#! 매달 학자 등장 확률이 1점씩 증가합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_PRACTICAL_OR_CONFUSION_TT: "#S  [GetPlayer.GetName]에서 아직 #b 실용적인 학계#! 중점을 보유하지 않고 최근에 중점을 변경하지 않음#!"
 MR_ACADEMICS_PRACTICAL_BUILDING_REQUIREMENT_TT: "#default_text [GetPlayer.GetAdjective]의 대학 중 #p 50%#!가 [concept_pm_academics_university_natural_history]를 채택함#!"
 MR_ACADEMICS_MILITARY_TT: "#T 군산 복합체#!\n민간 기업과 군부의 협력은 부패의 기미가 살짝 보이는 가운데,  특히 중요한 인맥과 개인적 유대 관계, 지인 연결망을 발달시키는 계기로 작용해 왔습니다. 이를 통틀어 군산 복합체로 설명하는 것이 제일 적절할 것입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_MILITARY_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName]에서 아직 #b 군산 복합체#! 중점을 보유하지 않고 최근에 중점을 변경하지 않음#!"
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_TT: "#default_text [GetPlayer.GetAdjective]의 대학 중 #p 50%#!가 [concept_pm_academics_university_mathematics]을 채택함#!"
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_2_TT: "#default_text [GetPlayer.GetName]에서 #p 5단계 이상#!의 [GetBuildingType('building_automotive_industry').GetName]이나 [GetBuildingType('building_arms_industry').GetName], [GetBuildingType('building_munition_plant').GetName], [GetBuildingType('building_artillery_foundry').GetName]를 하나 이상 보유함#!"
 MR_ACADEMICS_MILITARY_ARMY_SIZE_REQUIREMENT_TT: "#default_text [GetPlayer.GetAdjective]의 육군 규모가 최소 #b 50대형#! 이상#!"
 MR_ACADEMICS_BUSINESS_TT: "#T 직업 학교와 재벌 자본주의#!\n개인의 독립적 성향이 번영하는 진보의 시대를 만나면서 직업 학교, 중소기업, 대기업이 국가 과학 발전에 결정적인 영향력을 행사한다는 인식이 생겨났습니다. 반대로 대학은 새로운 기술을 통해 국가가 이룩한 번영을 증진시키고, 기술 발전으로 사회적 이념을 발전시키는 데 기여하고 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_BUSINESS_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName]에서 아직 #b 경영 대학과 재벌 자본주의#! 중점을 보유하지 않고 최근에 중점을 변경하지 않음#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_TT: "#default_text [GetPlayer.GetAdjective]의 대학 중 #p 35%#!가 [concept_pm_academics_university_mathematics]을 채택함#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_2_TT: "#default_text [GetPlayer.GetAdjective]의 대학 중 #p 50%#!가 [concept_pm_academics_university_humanities]을 채택함#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_3_TT: "#default_text [GetPlayer.GetName]에서 #p 15단계 이상#!의 [GetBuildingType('building_textile_mill').GetName]나 [GetBuildingType('building_furniture_manufactory').GetName]을 보유하거나, #p 10단계 이상#!의 [GetBuildingType('building_tooling_workshop').GetName]이나 [GetBuildingType('building_steel_mill').GetName]를 보유하거나, #p 5단계 이상#!의 [GetBuildingType('building_motor_industry').GetName]이나 [GetBuildingType('building_electrics_industry').GetName]을 보유함#!"
 MR_ACADEMICS_SEAPOWER_TT: "#T 해상 전력과 상선#!\n해군 전력과 국제 무역은 우리나라에 큰 역할을 하고 있습니다. 첨단 생산 기술을 통한 번영 확대와 국산품의 세계 수출은 우리가 벌어들인 것을 지키는 것만큼이나 중요합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_SEAPOWER_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName]에서 아직 #b 해상 전력과 상선#! 중점을 보유하지 않고 최근에 중점을 변경하지 않음#!"
 MR_ACADEMICS_SEAPOWER_BUILDING_REQUIREMENT_TT: "#default_text [GetPlayer.GetAdjective]의 대학 중 #p 35%#!가 [concept_pm_academics_university_mathematics]을 채택함#!"
 MR_ACADEMICS_SEAPOWER_BUILDING_REQUIREMENT_2_TT: "#default_text [GetPlayer.GetAdjective]의 대학 중 #p 35%#!가 [concept_pm_academics_university_natural_history]를 채택함#!"
 MR_ACADEMICS_SEAPOWER_NAVY_SIZE_REQUIREMENT_TT: "#default_text [GetPlayer.GetAdjective]의 해군 규모가 최소 #b 50대형#! 이상#!"
 MR_ACADEMICS_USEFUL_TT: "#T 유능한 상아탑#!\n우리나라의 학계는 딱정벌레의 수를 세고, 오래된 도자기를 닦고, 별난 취미에 심취한 괴짜 석학들의 안식처로 여겨집니다. 하지만 상아탑이 사회와 단절되어 존재하는 것에도 장점이 있다는 사실은 부정할 수 없습니다. 교수들이 방해받지 않고 연구에 몰두할 수 있다는 뜻이기 때문입니다.\n#R 참고:#! 매달 학자 등장 확률이 1점씩 증가합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_USEFUL_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName]에서 아직 #b 유능한 상아탑#! 중점을 보유하지 않고 최근에 중점을 변경하지 않음#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_TT: "#default_text [GetPlayer.GetAdjective]의 대학 중 #p 50%#!가 [concept_pm_academics_university_humanities]을 채택함#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_2_TT: "#default_text [GetPlayer.GetAdjective]의 대학 중 #p 35%#!가 [concept_pm_academics_university_natural_history]를 채택함#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_3_TT: "#default_text [GetPlayer.GetName]에서 [GetBuildingType('building_lepsius_archaeological_museum').GetName]과 [GetBuildingType('building_verrier_observatory').GetName]를 보유하거나 [GetBuildingType('building_dubois_zoo').GetName]을 보유함#!"
 MR_MOUNTAIN_EXPEDITION_TT: "#T 산악 원정#!\n1786년 몽블랑산 등정으로 지구상의 최고봉들을 정복하려는 새로운 시대가 열리게 되었습니다. 이러한 흐름은 19세기와 20세기에 걸쳐 더욱 박차를 가하게 되었습니다. 우리 영토 내에 아직 등정이 이루어지지 못한 산맥이 있다면, 적당한 기술을 갖춘 유능한 장군에게 등정을 맡길 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
