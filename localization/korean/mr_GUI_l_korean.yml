 MR_CARTE_DE_CIEL_CONGRESS_UNIVERSITY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 보유한 #V [GetBuildingType('building_university').GetName] 건물 단계가 총 10단계 이상#!#!"
 MR_GREAT_DEBATE_CONGRESS_BUTTON: "대논쟁"
 MR_GREAT_DEBATE_CONGRESS_BUTTON_TT: "#T 대논쟁#!\n일명 '대논쟁'이라고도 하는 섀플리-커티스 논쟁은 20세기 초에 은하의 본질과 우주의 크기에 관한 새로운 이해로 이어지는 담론들을 집대성한 사건입니다. 천문학계의 대논쟁은 우리 은하의 크기와 당시 '나선형 성운'으로 알려졌던 은하들이 우리 은하 내에 위치한 소천체인지, 아니면 우리 은하에서 훨씬 멀리 떨어진 별개의 천치인지에 관한 논쟁을 중심으로 펼쳐졌습니다. 이날 두 과학자는 우주의 크기에 관한 별개의 기술 논문을 발표하고, 저녁에는 공개 토론이 뒤따랐습니다. 우리는 우주의 궁극적인 불가사의를 논하려는 목적에서 본 학술회의를 개최할 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GREAT_DEBATE_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text 전 세계에서 발견한 @verrier_astronomicalobject![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]의 개수가 총 #BLUE 12000개#! 이상 (현재 발견된 @verrier_astronomicalobject! 개수는 [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0]개)#!"
