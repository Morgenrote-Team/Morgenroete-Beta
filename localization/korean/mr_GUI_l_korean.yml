 MR_AERONAUTICAL_ENGINEER_SPEED_AIRPLANE_BUTTON: "고속 항공기"
 MR_AERONAUTICAL_ENGINEER_SPEED_AIRPLANE_BUTTON_TT: "#T 고속 항공기#!\n우리 항공 공학자는 기존 기록 경신을 위해 고속 항공기를 제작할 수 있습니다. 세계에서 가장 빠른 항공기를 제작하려면 공학자 뿐만 아니라 항공기를 조종할 비행사도 필요합니다. 공학자와 비행사의 경험치와 더불어 기술 발전 수준에 따라 성패 여부가 갈립니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
