 MR_READING_TOUR_BUTTON_TT: "#T 작가의 순회 낭독회 파견#!\n세계적으로 인정받는 작가가 외국 출판사와의 교류를 이어간다면 순회 낭독회를 통해 자국의 명성을 높이는 데 한몫할 수 있습니다. 이것으로 상호 관계 증진 뿐만 아니라 작가 본인의 명성을 높이는 데에도 보탬이 될 것입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
