 MR_PALEONTOLOGICAL_EXPEDITION_BUTTON_TT: "#T 고생물학 탐사#!\n우리 [concept_dubois_paleontologist]는 [concept_dubois_paleontological_expedition]를 보낼 수 있습니다. 탐사에는 1년의 시간이 소요되며 일정량의 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]과 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]를 획득할 수 있습니다.\n\n탐사가 마무리되는 시점에서 현장에 [concept_dubois_paleontological_team]을 남겨 [concept_dubois_paleontological_excavation]에 나설 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PALEONTOLOGICAL_EXPEDITION_ACTIVE_TT: "#T 진행 중인 고생물학 탐사#!\n현재 [concept_dubois_paleontologist]가 [concept_dubois_paleontological_expedition]를 진행하고 있습니다. 탐사에는 1년의 시간이 소요되며 일정량의 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]과 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]를 획득할 수 있습니다.\n\n탐사가 마무리되는 시점에서 현장에 [concept_dubois_paleontological_team]을 남겨 [concept_dubois_paleontological_excavation]에 나설 수 있습니다."
