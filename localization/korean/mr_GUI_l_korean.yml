 MR_GEOLOGIST_TECTONICS_CONGRESS_BUTTON: "대륙 이동설 학술회의"
 MR_GEOLOGIST_TECTONICS_CONGRESS_BUTTON_TT: "#T 대륙 이동설 학술회의#!\n수 세기 동안 대륙은 고정되어 불변한다는 믿음이 변함없이 이어져 왔습니다. 저명한 지질학자가 상당한 지질학 지식을 갖추었다면 이 불변의 진리를 무너뜨릴 수 있을지도 모릅니다. 과연 그것을 해낼 수 있는가는 의문의 영역입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_CONGRESS_KNOWLEDGE_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 @agassiz_geological_knowledge! [concept_agassiz_geological_knowledge]을 #V 50 이상#! 확보 (현재 [GetPlayer.MakeScope.Var('agassiz_geological_knowledge_var').GetValue|0+])#!"
