 MR_PHYSICIAN_DESCRIBE_DISEASE_FOREIGN_BUTTON_TT: "#T 의학 관찰 탐사#!\n의사는 전염병이 도는 먼 곳으로 탐사를 떠나 그곳의 질병을 기술할 수 있습니다. 이 과정은 본국에서의 진단 절차보다 긴 시간이 소요됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_DESCRIBE_DISEASE_FOREIGN_ACTIVE_TT: "#T 의학 관찰 탐사#!\n#p 현재 $concept_panum_physician$가 의학 관찰 탐사에 나서고 있습니다.#!\n의사는 전염병이 도는 먼 곳으로 탐사를 떠나 그곳의 질병을 기술할 수 있습니다. 이 과정은 본국에서의 진단 절차보다 긴 시간이 소요됩니다."
 MR_PHYSICIAN_CAN_DESCRIBE_FOREIGN_DISEASE_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 아직 완전히 기술되지 않은 전염병이 유행하는 국가에 이해 관계를 보유함#!"
 MR_PHYSICIAN_FIND_TREATMENT_BUTTON_TT: "#T 질병 치료#!\n의사는 자국 영토 내에서 유행하고 있는 특정 질병의 치료법을 탐색할 수 있습니다. 치료법 자체로는 질병을 예방할 수 없지만 그로 인한 영향을 눈에 띄게 억제할 수 있습니다. 어떤 질병은 치료법을 발견하기에 앞서 특정 기술을 연구할 필요가 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
