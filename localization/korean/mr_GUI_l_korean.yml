 MR_AERONAUTICAL_ENGINEER_GIANT_ZEPPELIN_BUTTON: "거대 비행선"
 MR_AERONAUTICAL_ENGINEER_GIANT_ZEPPELIN_BUTTON_TT: "#T 거대 비행선#!\n비행선 여행이 정점에 달했습니다. 우리나라는 세계에서 가장 크고 웅장한 비행선이 태어난 곳으로 여겨지고 있습니다. 이제 거대한 비행선으로 온 세상을 놀라게 하고 지구를 누벼야 할 차례입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
