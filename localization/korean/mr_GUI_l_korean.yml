 MR_ASTEROID_CONGRESS_BUTTON: "소행성 학술회의"
 MR_ASTEROID_CONGRESS_BUTTON_TT: "#T 소행성 학술회의#!\n1801년 세레스가 발견된 이후 천문학자들은 하나둘씩 천체를 발견해 나갔고, 그 결과 태양계 행성의 수는 계속해서 증가해 왔습니다. 그 중에서도 해왕성의 발견은 화성과 목성 사이에 있는 수많은 소천체들을 새로운 범주로 묶는 것이 더 낫지 않느냐는 의문을 제기했습니다. 특히 천문학계 일각에서는 새로운 천문학적 기호의 발명과 비교적 작은 크기로 인하여 이 천체들을 '소항성' 내지는 '소행성'으로 부르는 것이 더 적절하다고 보았습니다. 물론 이러한 분류는 이전에 행성으로 여겨졌던 일부 천체들이 행성 지위를 잃고 단순한 암석으로 격하된다는 뜻입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTEROID_CONGRESS_NEPTUNE_TT: "#default_text #V 해왕성#!이 발견됨#!"
