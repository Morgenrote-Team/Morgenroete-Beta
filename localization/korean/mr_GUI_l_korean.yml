 MR_EXTINCTION_CONGRESS_BUTTON: "공룡 멸종 학술회의"
 MR_EXTINCTION_CONGRESS_BUTTON_TT: "#T 공룡 멸종 학술회의#!\n자연사에서 가장 풀리지 않는 불가사의 중 하나는 다름아닌 공룡의 멸종입니다. 고생물학의 아버지 조르주 퀴비에르는 백악기 말에 공룡을 비롯한 대멸종이 있었다는 사실을 알아냈습니다. 그런데 수백년 동안 지구를 지배했던 무시무시한 파충류들이 어째서 갑자기 멸종하게 된 것일까요?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
