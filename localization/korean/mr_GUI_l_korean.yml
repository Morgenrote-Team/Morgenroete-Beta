 MR_PHYSICIAN_DESCRIBE_DISEASE_BUTTON_TT: "#T 질병 기록#!\n의사는 지금까지 기록되지 않았던 질병이 국내에서 전염되고 있다면 그 질병을 과학적으로 상세히 기술할 수 있습니다. 이는 후속 치료법 개발을 위한 예비 단계라는 점에서 중요합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_DESCRIBE_DISEASE_ACTIVE_TT: "#T 질병 기록#!\n#p 당신의 $concept_panum_physician$는 현재 질병을 처음으로 기술하고 있습니다.#!\n의사는 지금까지 기록되지 않았던 질병이 국내에서 전염되고 있다면 그 질병을 과학적으로 상세히 기술할 수 있습니다. 이는 후속 치료법 개발을 위한 예비 단계라는 점에서 중요합니다."
