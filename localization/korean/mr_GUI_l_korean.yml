 MR_SAFARI_EXPEDITION_BUTTON_TT: "#T 사파리 사냥 개시#!\n아프리카의 사파리(사냥)에서는 지속적인 추적과 사냥 덫 설치로 대형 야생 동물을 포획하여 [concept_dubois_zoo]으로 수송할 수 있습니다. 사파리 한번에 한 마리의 동물만 포획할 수 있습니다. 동물의 종에 따라 덫을 사용할지, 아니면 추적으로 포획할지의 여부가 갈립니다. 일반적으로 크고 움직임이 느린 동물이면 덫이 더 필요하고, 움직임이 빠른 동물이면 추적에 나서는 것이 더 효과적입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SAFARI_EXPEDITION_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 #V 분주한 상태#!가 아닌 [concept_dubois_naturalist]가 있음#! "
