 MR_RECRUIT_PHYSICIAN_BUTTON: "의사 모집"
 MR_RECRUIT_PHYSICIAN_BUTTON_TT: "#T 의사 모집#!\n대형 종합병원을 갖추면 진료 현장에서 활동하는 의사를 즉시 모집할 수 있는 특별한 기회가 주어집니다. 또한 의사는 전공 분야를 기준으로 선발할 수도 있으며, 훨씬 더 특화된 의학 연구가 가능합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
