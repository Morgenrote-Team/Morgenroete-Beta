 MR_SYSTEMIZE_FOSSILS_BUTTON: "화석 분류"
 MR_GEOLOGIST_NOT_HAS_RECENT_VOLCANO_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V 최근 화산 탐사#! 변화 요인을 #V 보유하지 않음#!#!"
 MR_PROMOTE_ENGINEER_TT: "#T 공학자 양성#!\n[Concept('concept_tesla_engineer','$concept_tesla_engineers$')]는 군사와 토목 분야에서 다재다능한 기술자입니다. 또한 기념물의 건설 속도를 두 배로 올려줍니다.\n\n#n 주의:#! 한번에 한 명의 공학자만 보유할 수 있습니다.[GetPlayer.GetCustom('mr_promote_has_engineer_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ASTRONOMER_TT: "#T 천문학자 양성#!\n[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]는 새로운 천체를 발견하고, 별과 행성을 찾아내고, 천문 학술회의에서 제 역할을 다합니다.\n\n#n 주의:#! 한번에 한 명의 천문학자만 보유할 수 있습니다.[GetPlayer.GetCustom('mr_promote_has_astronomer_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_CHEMIST_TT: "#T 화학자 양성#!\n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]는 새로운 원소의 발견과 화학 산업 개량에 중점을 두고 있는 과학자입니다.\n\n#n 주의:#! 한번에 한 명의 화학자만 보유할 수 있습니다.[GetPlayer.GetCustom('mr_promote_has_chemist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_GEOLOGIST_TT: "#T 지질학자 양성#!\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]는 광물과 화산, 누층을 연구합니다.\n\n#n 주의:#! 한번에 한 명의 지질학자만 보유할 수 있습니다.[GetPlayer.GetCustom('mr_promote_has_geologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_NATURALIST_TT: "#T 박물학자 양성#!\n[Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')]는 국내외의 동물을 확보하고, 표본을 수집하고, 식물학 탐사를 이끌 수 있습니다.\n\n#n 주의:#! 한번에 한 명의 박물학자만 보유할 수 있습니다.[GetPlayer.GetCustom('mr_promote_has_naturalist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_PALEONTOLOGIST_TT: "#T 고생물학자 양성#!\n[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]는 누층을 조사하거나 탐사 과정을 통해 화석과 공룡 뼈를 찾아낼 수 있습니다.\n\n#n 주의:#! 한번에 한 명의 고생물학자만 보유할 수 있습니다.[GetPlayer.GetCustom('mr_promote_has_paleontologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ARCHAEOLOGIST_TT: "#T 고고학자 양성#!\n[Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')]는 유물을 찾아내고, 중대한 발견을 이룩하고, 고고학 학술회의에 참석할 수 있습니다.\n\n#n 주의:#! 한번에 한 명의 고고학자만 보유할 수 있습니다.[GetPlayer.GetCustom('mr_promote_has_archaeologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ANTHROPOLOGIST_TT: "#T 인류학자 양성#!\n[Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')]는 인류의 진화가 시작된 시점부터 석기 시대에 이르기까지 인류의 기원을 연구합니다.\n\n#n 주의:#! 한번에 한 명의 인류학자만 보유할 수 있습니다.[GetPlayer.GetCustom('mr_promote_has_anthropologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_COMPOSER_TT: "#T 작곡가 후원#!\n[Concept('concept_elgar_composer','$concept_elgar_composers$')]는 음악 문화의 중흥을 이룩하는 데에 필요합니다. 국가의 [concept_elgar_musical_tradition] 생산 증가에 보탬이 됩니다.\n\n#n 주의:#! 한번에 한 명의 작곡가만 보유할 수 있습니다.[GetPlayer.GetCustom('mr_promote_has_composer_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_WRITER_TT: "#T 작가 후원#!\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')]는 이야기의 달인으로 서적과 기타 문학 작품을 집필합니다. 이들의 작품으로 국가의 [concept_manzoni_literary_tradition]에 힘을 보탤 수 있습니다.\n\n#n 주의:#! 한번에 한 명의 작가만 보유할 수 있습니다.[GetPlayer.GetCustom('mr_promote_has_writers_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_PAINTER_TT: "#T 화가 후원#!\n[Concept('concept_klimt_painter','$concept_klimt_painters$')]는 인상과 풍경, 세상의 경이로움을 화폭에 담아냅니다. 이들의 걸작을 통해 국가의 [concept_klimt_painting_tradition]에 힘을 보탤 수 있습니다.\n\n#n 주의:#! 한번에 한 명의 화가만 보유할 수 있습니다.[GetPlayer.GetCustom('mr_promote_has_painter_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
