 MR_SPECIMEN_GARDEN_BUTTON_TT: "#T 식물원 설립#!\n동물원 안에 식물원을 두면 그 위상도 더욱 높아질 것입니다. 우리 [concept_dubois_naturalist]가 수집한 이국적인 식물들을 전부 이곳에 심어둘 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
