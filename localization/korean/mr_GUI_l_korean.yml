 MR_PROMOTING_ENGINEER_TT: "#T 공학자 양성#!\n#p 현재 공학자를 양성하고 있습니다.#!\n[Concept('concept_tesla_engineer','$concept_tesla_engineers$')]는 군사와 토목 분야에서 다재다능한 기술자입니다. 또 기념물의 건설 속도를 두 배로 올려줍니다."
 MR_PROMOTING_ASTRONOMER_TT: "#T 천문학자 양성#!\n#p 현재 천문학자를 양성하고 있습니다.#!\n[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]는 새로운 천체를 발견하고, 별과 행성을 찾아내고, 천문 학술회의에서 제 역할을 다합니다."
 MR_PROMOTING_NATURALIST_TT: "#T 박물학자 양성#!\n#p 현재 박물학자를 양성하고 있습니다.#!\n[Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')]는 국내외의 동물을 확보하고, 표본을 수집하고, 식물학 탐사를 이끌 수 있습니다."
 MR_PROMOTING_PALEONTOLOGIST_TT: "#T 고생물학자 양성#!\n#p 현재 고생물학자를 양성하고 있습니다.#!\n[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]는 누층을 조사하거나 탐사 과정을 통해 화석과 공룡 뼈를 찾아낼 수 있습니다."
 MR_PROMOTING_ARCHAEOLOGIST_TT: "#T 고고학자 양성#!\n#p 현재 고고학자를 양성하고 있습니다.#!\n[Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')]는 유물을 찾아내고, 중대한 발견을 이룩하고, 고고학 학술회의에 참석할 수 있습니다.\n"
 MR_PROMOTING_ANTHROPOLOGIST_TT: "#T 인류학자 양성#!\n#p 현재 인류학자를 양성하고 있습니다.#!\n[Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')]는 인류의 진화가 시작된 시점부터 석기 시대에 이르기까지 인류의 기원을 연구합니다.#T 학계 투자#!"
 MR_ACADEMICS_INVESTMENT_ACTIVE_TT: "#T 학계 투자#!\n#p 학계 투자를 진행하고 있습니다.#!\n우리 대학을 대상으로 한 정부의 종합적인 투자로 #O 학자 양성 진행도#!가 매달 #G +1#!씩 오릅니다. 예산 지원 기한은 총 10년입니다."
 MR_PROMOTING_COMPOSER_TT: "#T 작곡가 후원#!\n#p 현재 작곡가를 후원하고 있습니다.#!\n[Concept('concept_elgar_composer','$concept_elgar_composers$')]는 음악 문화의 중흥을 이룩하는 데에 필요합니다. 국가의 [concept_elgar_musical_tradition] 생산 증가에 보탬이 됩니다."
 MR_PROMOTING_WRITER_TT: "#T 작가 후원#!\n#p 현재 작가를 후원하고 있습니다.#!\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')]는 이야기의 달인으로 서적과 기타 문학 작품을 집필합니다. 이들의 작품으로 국가의 [concept_manzoni_literary_tradition]에 힘을 보탤 수 있습니다."
 MR_PROMOTING_PAINTER_TT: "#T 화가 후원#!\n#p 현재 화가를 후원하고 있습니다.#!\n[Concept('concept_klimt_painter','$concept_klimt_painters$')]는 인상과 풍경, 세상의 경이로움을 화폭에 담아냅니다. 이들의 걸작을 통해 국가의 [concept_klimt_painting_tradition]에 힘을 보탤 수 있습니다."
 MR_AVANTGARDE_INTELLIGENTSIA_ACTIVE_TT: "#T 아방가르드 지식인#!\n#p 현재 아방가르드 지식인이 과학 중점으로 설정되어 있습니다.#!\n확고한 문화·사회·인류학 사상을 갖춘 학자들이 모여 학계의 일상을 좌우합니다. 반대로 실용적인 분야는 상대적으로 중요도가 떨어지게 됩니다.\n#R 참고:#! 매달 학자 등장 확률이 1점씩 증가합니다."
 MR_PRACTICAL_ACADEMIA_ACTIVE_TT: "#T 실용적인 학계#!\n#p 현재 실용적인 학계가 과학 중점으로 설정되어 있습니다.#!\n우리나라의 학자들은 모든 분야에서 일상 생활에 유용하게 쓰일 수 있는 새로운 발견을 하고자 노력합니다. 이는 인류의 보편적 발전과 평화를 위한 것입니다.\n#p 참고:#! 매달 학자 등장 확률이 1점씩 증가합니다."
 MR_MILITARY_INDUSTRIAL_COMPLEX_ACTIVE_TT: "#T 군산 복합체#!\n#p 현재 군산 복합체가 과학 중점으로 설정되어 있습니다.#!\n민간 기업과 군부의 협력은 부패의 기미가 살짝 보이는 가운데,  특히 중요한 인맥과 개인적 유대 관계, 지인 연결망을 발달시키는 계기로 작용해 왔습니다. 이를 통틀어 군산 복합체로 설명하는 것이 제일 적절할 것입니다."
 MR_BUSINESS_AND_TYCOON_ACTIVE_TT: "#T 직업 학교와 재벌 자본주의#!\n#p 현재 직업 학교와 재벌 자본주의가 과학 중점으로 설정되어 있습니다.#!\n개인의 독립적 성향이 번영하는 진보의 시대를 만나면서 직업 학교, 중소기업, 대기업이 국가 과학 발전에 결정적인 영향력을 행사한다는 인식이 생겨났습니다. 반대로 대학은 새로운 기술을 통해 국가가 이룩한 번영을 증진시키고, 기술 발전으로 사회적 이념을 발전시키는 데 기여하고 있습니다."
 MR_SEA_POWER_AND_MERCHANT_ACTIVE_TT: "#T 해상 전력과 상선#!\n#p 현재 해상 전력과 상선이 과학 중점으로 설정되어 있습니다.#!\n해군 전력과 국제 무역은 우리나라에 큰 역할을 하고 있습니다. 첨단 생산 기술을 통한 번영 확대와 국산품의 세계 수출은 우리가 벌어들인 것을 지키는 것만큼이나 중요합니다."
 MR_IVORY_TOWER_ACTIVE_TT: "#T 유능한 상아탑#!\n#p 현재 유능한 상아탑이 과학 중점으로 설정되어 있습니다.#!\n우리나라의 학계는 딱정벌레의 수를 세고, 오래된 도자기를 닦고, 별난 취미에 심취한 괴짜 석학들의 안식처로 여겨집니다. 하지만 상아탑이 사회와 단절되어 존재하는 것에도 장점이 있다는 사실은 부정할 수 없습니다. 교수들이 방해받지 않고 연구에 몰두할 수 있다는 뜻이기 때문입니다. \n#p 주의:#! 매달 학자 등장 확률이 1점씩 증가합니다."
 MR_ON_PACIFIC_EXPEDITION_TT: "#T 태평양 탐사#!\n#p 현재 태평양 탐사에 나서고 있습니다.#!\n태평양은 극지대와 더불어 아직도 비밀을 간직하고 있는 지구상 최후의 지역 중 하나입니다. 자연사, 고생물학, 천문학, 해양학 연구를 수행하기 위한 조사 임무에 여러 과학 분야의 학자들이 관심을 보이고 있습니다. 한편 강대국으로서는 세계의 끝자락에서 영향력을 과시할 영광스러운 사건으로 남을지 모릅니다."
 MR_ON_NORTHWEST_EXPEDITION_TT: "#T 북서항로#!\n#p 현재 북서항로 탐사에 나서고 있습니다.#!\n지난 세기에 이르면서 용감한 탐험가들이 북극해의 외곽 지역을 탐험한 바 있습니다. 아직 이루어지지 않은 오랜 꿈이 있다면 캐나다와 북극해를 잇는 북서항로의 발견이 되겠습니다. 과연 누가 그토록 위험한 탐사에 나설 수 있을까요?"
 MR_ON_ARCTICA_EXPEDITION_TT: "#T 비행선 탐사#!\n#p 현재 비행선 탐사가 진행되고 있습니다.#!\n'북극 비행선 탐험을 위한 국제 연구 학회', 줄여서 에어로액틱 (Aeroarctic)은 비행선을 극지 연구에 활용하는 것을 목표로 삼은 비정부 과학 기관이었습니다. 이 단체는 비행사이저 훗날 학회 사무총장을 역임하는 월터 브룬스의 주도로 설립되었습니다. 1924년 초대 회장으로 프리티요프 난센이 임명되었습니다. 수년간의 준비 과정 끝에 1931년 에어로액틱은 비행선을 이용한 순수 과학용 극지 탐사에 나서 처음으로 성공을 거두었습니다. LZ 127 그라프 제펠린의 북극 비행을 통해 훑고 지나간 극지방의 지리 환경 지식을 대폭 확대하게 되었습니다. 앞서 1926년에는 움베르토 노빌레가 비행선 '노르게'호를 타고 북극점 상공을 지나갔으며, 이후 '이탈리아'호를 이용해 탐사에 나서기도 했습니다."
 MR_IS_CIVIL_ENGINEER_TT: "#T [concept_tesla_civil_engineer]#!\n현재 [concept_tesla_engineer]의 집중 분야는 [Concept('concept_tesla_civil_engineer','$concept_tesla_civil_engineering$')]입니다."
 MR_IS_MECHANICAL_ENGINEER_TT: "#T [concept_tesla_mechanical_engineer]#!\n현재 [concept_tesla_engineer]의 집중 분야는 [Concept('concept_tesla_mechanical_engineer','$concept_tesla_mechanical_engineering$')]입니다."
 MR_IS_MILITARY_ENGINEER_TT: "#T [concept_tesla_military_engineer]#!\n현재 [concept_tesla_engineer]의 집중 분야는 [Concept('concept_tesla_military_engineer','$concept_tesla_military_engineering$')]입니다."
 MR_IS_ELECTRICAL_ENGINEER_TT: "#T [concept_tesla_electrical_engineer]#!\n현재 [concept_tesla_engineer]의 집중 분야는 [Concept('concept_tesla_electrical_engineer','$concept_tesla_electrical_engineering$')]입니다."
 MR_IS_AERONAUTICAL_ENGINEER_TT: "#T [concept_tesla_aeronautical_engineer]#!\n현재 [concept_tesla_engineer]의 집중 분야는 [Concept('concept_tesla_aeronautical_engineer','$concept_tesla_aeronautical_engineering$')]입니다."
 MR_SAFARI_ACTIVE_TT: "#T 사파리 사냥 개시#!\n#p 현재 박물학자가 사파리 사냥에 나서고 있습니다.#!\n아프리카의 사파리(사냥)에서는 지속적인 추적과 사냥 덫 설치로 대형 야생 동물을 포획하여 [concept_dubois_zoo]으로 수송할 수 있습니다. 사파리 한번에 한 마리의 동물만 포획할 수 있습니다. 동물의 종에 따라 덫을 사용할지, 아니면 추적으로 포획할지의 여부가 갈립니다. 일반적으로 크고 움직임이 느린 동물이면 덫이 더 필요하고, 움직임이 빠른 동물이면 추적에 나서는 것이 더 효과적입니다."
 MR_ZOOLOGICAL_EXPEDITION_ACTIVE_TT: "#T 현지 동물 포획#!\n#p 현재 박물학자가 현지 동물 포획에 나서고 있습니다.#!\n우리나라에는 [concept_dubois_zoo]에 전시할 만큼 매력적인 생물종이 사는 동물 서식지가 존재합니다. 1년 동안 [concept_dubois_naturalist]가 우리나라를 돌아보며 동물원에 들일 [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]을 포획합니다."
 MR_CHEMIST_IMPROVE_FERTILIZER_BUTTON: "비료 개량"
