 MR_TRANSFORM_FOSSILS_TO_BONES_BUTTON: "화석을 뼈로 전환"
 MR_TRANSFORM_FOSSILS_TO_BONES_BUTTON_TT: "#T 화석을 뼈로 전환#!\n경험 많거나 저명한 [concept_dubois_paleontologist]는 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] 20점을 [concept_dubois_dinosaur_bone] 1점으로 바꿀 수 있습니다. 이미 공룡 뼈를 1점 이상 보유하고 있고 각 대륙별로 공룡 뼈를 너무 많이 가지고 있지 않아야 합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
