 MR_INVITE_INDEPENDENT_PAINTER_TT: "#T 이 화가 초빙하기#!\n[concept_klimt_painter] 초빙은 자국에서 충분히 좋은 화가를 구할 수 없거나, 지금의 화가가 마음에 들지 않을 경우 새로운 화가를 영입하는 하나의 방법입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).AddScope('chosen_painter', Scope.GetCharacter.MakeScope ).End)]"
