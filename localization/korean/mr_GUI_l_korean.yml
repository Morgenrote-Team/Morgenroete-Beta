 MR_VENUS_TRANSIT_1874_EXPEDITION_BUTTON_TT: "#T 금성 일면통과 관측#!\n금성 일면통과의 관측은 19세기에 있었던 가장 중요한 천문학적 사건으로서 1872년과 1884년에 각각 실시할 수 있습니다. 이 기회를 놓치지 않도록 예상 연도에서 2년 전부터 미리 준비에 나설 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
