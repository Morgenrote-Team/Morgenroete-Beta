 MR_MINERAL_CABINET_BUTTON_TT: "#T 광물 표본실 개설#!\n우리 동물원에 광물 표본실을 마련하면 그 위상도 더욱 높아질 것입니다. 우리 [concept_agassiz_geologist]가 수집한 광물들을 전부 이곳에 전시할 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
