 MR_BABYLONIA_EXPEDITION_TT: "#T 문명의 요람으로 탐사대 파견#!\n메소포타미아 남부 지역에 해당되는 바빌로니아는 한때 강력했던 도시국가 바빌론의 명칭을 따왔습니다. 이 지역은 귀중한 고고학적 유물이 끊임없이 발견되는 '문명의 요람'으로 여겨집니다. 분명 박물관에 소장되어야 마땅할 것입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MESOPOTAMIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V 아카드어의 해독#!이 이루어져 메소포타미아의 고고학 연구가 가능해짐#!"
 MR_BABYLONIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 바빌로니아 [concept_lepsius_expedition]를 #V 지원하고 있지 않음#!#!"
 MR_BABYLONIA_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V 바그다드 주를 보유#!했거나 보유국과 [concept_lepsius_excavation_licence]를 체결함#!"
 MR_ASSYRIA_EXPEDITION_TT: "#T 아시리아의 정원으로 탐사대 파견#!\n아시리아는 메소포타미아 북부 지역을 가리키는 말로 아수르와 니네베의 두 대도시가 자리해 있었습니다. 이 지역에 대한 드문 지식은 그 출처를 따지면 성경으로 거슬러 올라가는 경우가 아직도 있지만, 그보다 더 믿을 만한 역사적 단서가 존재할지도 모릅니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )] "
 MR_ASSYRIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 아시리아 [concept_lepsius_expedition]를 #V 지원하고 있지 않음#!#!"
 MR_ASSYRIA_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V 모술 주를 보유#!했거나 보유국과 [concept_lepsius_excavation_licence]를 체결함#!"
 MR_ARGOLIS_EXPEDITION_TT: "#T 아가멤논의 도시로 탐사대 파견#!\n트로이가 발견된 후, 회의적이던 학자들조차 고대 그리스 신화가 단순한 동화 그 이상이라는 사실을 깨닫게 되었습니다. 청동기 시대 도시의 유적은 오늘날까지 아르고리스에 있다고 전해지는데, 그 중 가장 잘 알려진 곳이 미케네입니다. 우리도 그 사실을 우리 손으로 입증해야 합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GREECE_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V 슐리만의 트로이 발견#!으로 그리스의 고고학 연구가 가능해짐#!"
 MR_ARGOLIS_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 아르골리스 [concept_lepsius_expedition]를 #V 지원하고 있지 않음#!#!"
 MR_ARGOLIS_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V 펠로폰네소스 주를 보유#!했거나 보유국과 [concept_lepsius_excavation_licence]를 체결함#!"
 MR_CRETE_EXPEDITION_TT: "#T 크레타의 궁전으로 탐사대 파견#!\n전설 속의 미노스 왕은 크레타섬 전역을 다스렸다고 전해집니다. 트로이나 미케네처럼 이 설화에도 실체가 있는 것으로 보입니다. 신화로만 여겨졌던 미노아 문명의 유물이 섬에서 점차 발견되고 있기 때문입니다. 우리도 그 유물을 확보할 필요가 있겠습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CRETE_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 크레타 [concept_lepsius_expedition]를 #V 지원하고 있지 않음#!#!"
