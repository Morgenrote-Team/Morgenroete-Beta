 MR_SPECIMEN_COLLECTION_BUTTON_TT: "#T 표본 전시관 설립#!\n우리가 확보한 이국적인 곤충과 나비 등의 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]들을 빠짐없이 정리하면 이 나라의 과학 발전이 어느 정도까지 이루어졌는가를 세상에 자랑하게 될 것입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPECIMEN_GARDEN_NO_SPECIMEN_COLLECTION_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 아직 #V 표본 전시관#!을 보유하고 있지 않음#!"
