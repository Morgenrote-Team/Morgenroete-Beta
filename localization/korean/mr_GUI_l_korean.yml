 TOTAL_MINERALS_VAR_TT: "#header [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]#!\n[GetPlayer.GetName]에서 수집한 [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]의 수는 @agassiz_mineral! [GetPlayer.MakeScope.GetVariable('agassiz_generic_minerals_var').GetValue|V0]점입니다. 올해 [GetPlayer.GetNameNoFormatting]가 추가로 수집할 것으로 전망되는 [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] 수는 [GetPlayer.MakeScope.ScriptValue('agassiz_yearly_mineral_value')|+=0]점입니다.\n\n#T [GetPlayer.GetNameNoFormatting]의 연간 광물 획득량에 영향을 끼치는 요인은 다음과 같습니다.#!\n#V 기본값#! #p  +500#![GetPlayer.GetCustom('agassiz_yearly_minerals_desert_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_arctic_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_geyser_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_special_deposit_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_cave_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_mountain_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_formation_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_great_formation_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_volcano_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_uranium_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_geological_research_type')]"
