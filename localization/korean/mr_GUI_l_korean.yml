 MR_VISIT_GALLERY_BUTTON: "미술관 방문"
 MR_VISIT_GALLERY_BUTTON_TT: "#T 미술관 방문#!\n우리나라의 회화 전통 지수와 소장 중인 예술품 규모를 미술관에서 확인할 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VISIT_GALLERY_BUTTON_TRIGGER_TT: "#default_text 현재 미술관을 #V 방문하고 있지 않음#!#!"
 MR_PAINTER_TRIP_BUTTON: "유학"
 MR_PAINTER_TRIP_BUTTON_TT: "#T 유학#!\n[concept_klimt_painter_trip]을 통해 화가는 이전에는 알지 못했던 미술 양식을 익히고 이를 통해 해마다 [concept_klimt_painting_tradition]을 쌓게 됩니다. 또한 해외에 있는 [concept_artists_center_of_arts]에 머무는 동안 여러 긍정적, 부정적 특성을 새로 지니게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACQUIRE_MASTERWORK_BUTTON: "걸작 구매"
 MR_ACQUIRE_MASTERWORK_BUTTON_TT: "#T 걸작 구매#!\n우리가 보유하지 않은 해외의 미술 양식이 있을 경우, 그 양식으로 된 걸작을 구매할 수 있습니다. 단 그 양식으로 된 걸작을 하나 이상 보유한 국가가 존재해야 합니다. 또한 그림을 전시하기 위해 국립 미술관이 필요합니다. 구매에 필요한 비용 외에도 우리가 소장하고 있는 그림 몇 점과 맞바꾸어야 하며, 이 과정에서 [concept_klimt_painting_tradition] #R 100#!이 소모됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VERNISSAGE_BUTTON: "특별전"
 MR_VERNISSAGE_BUTTON_TT: "#T 특별전#!\n특별전에서는 [concept_klimt_painter]가 자신의 작품을 전시하고 그 보상으로 명성과 [concept_klimt_painting_tradition]을 획득할 수 있습니다. 특별전은 화가의 일생에서 단 한번만 개최할 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
