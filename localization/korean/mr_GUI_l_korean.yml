 MR_MOUNTAIN_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 최근에 새로운 등정을 성공했거나 산악 원정에 실패하지 않음#!"
 MR_ZEPPELIN_EXPEDITION_TT: "#T 비행선 탐사#!\n'북극 비행선 탐험을 위한 국제 연구 학회', 줄여서 에어로액틱 (Aeroarctic)은 비행선을 극지 연구에 활용하는 것을 목표로 삼은 비정부 과학 기관이었습니다. 이 단체는 비행사이저 훗날 학회 사무총장을 역임하는 월터 브룬스의 주도로 설립되었습니다. 1924년 초대 회장으로 프리티요프 난센이 임명되었습니다. 수년간의 준비 과정 끝에 1931년 에어로액틱은 비행선을 이용한 순수 과학용 극지 탐사에 나서 처음으로 성공을 거두었습니다. LZ 127 그라프 제펠린의 북극 비행을 통해 훑고 지나간 극지방의 지리 환경 지식을 대폭 확대하게 되었습니다. 앞서 1926년에는 움베르토 노빌레가 비행선 '노르게'호를 타고 북극점 상공을 지나갔으며, 이후 '이탈리아'호를 이용해 탐사에 나서기도 했습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ZEPPELIN_OBSERVATORY_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V 기상관측소 생산 방식#!이 설정된 [GetBuildingType('building_verrier_observatory').GetName]를 보유함#!"
 MR_ZEPPELIN_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V 그린란드#!, #V 노르웨이 북부#!, #V 알래스카#!, #V 누나부트#!, #V 네네츠#! 중 한 곳의 주를 소유하거나 [concept_curtiss_airspace_convention]으로 접근 허가를 받음#!"
