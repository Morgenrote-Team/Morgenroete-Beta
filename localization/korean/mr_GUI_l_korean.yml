 MR_ASTEROID_CONGRESS_ASTRONOMER_TRIGGER_TT: "#default_text [concept_verrier_astronomer] 보유#!"
 MR_ASTEROID_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text 전 세계에서 발견한 @verrier_astronomicalobject![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]의 개수가 총 #BLUE 1500개#! 이상 (현재 발견된 @verrier_astronomicalobject! 개수는 [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0]개)#!"
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON: "카르트 뒤 시엘"
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON_TT: "#T 카르트 뒤 시엘 학술회의#!\n1887년 파리 천문대장 아메데 무셰는 건판을 이용한 새로운 사진 촬영술이 성도 제작 방식을 뒤바꿀 잠재력을 가졌음을 깨닫고, 천문사에 유례 없던 대규모 국제 성도 제작 사업을 개시하였습니다. 1887년 4월 파리에서 개최된 천문사진 학술회의에 50여명의 천문학자들이 참여하여 본 사업에 참여하기로 뜻을 모았습니다. 우리도 국제 사회의 천문학 지식을 공유하는 목적에서 이러한 학술회의를 개최할 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTRONOMY_CONGRESS_5_YEARS_TRIGGER_TT: "#default_text #V 지난 5년 사이#!에#V 천문 학술회의가 개최되지 않음#! (지난 개최국이 '천문 학술회의 개최' 변화 요인을 보유하지 않음)#!"
