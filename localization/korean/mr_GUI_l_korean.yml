 MR_GEOLOGIST_AGE_EARTH_BUTTON_TT: "#T 지구의 나이 계산#!\n지질학자는 일생에 단 한번 지구의 나이를 계산할 수 있으며 자신의 학설을 다른 모든 지질학자에게 전달할 수 있습니다. 학계에서 인정을 받으면 지질학자가 제시한 지구의 나이는 그대로 결정이 됩니다. 거부당하면 일정한 좌절의 시기를 거쳐 다시 시도할 수 있습니다. 새로운 학설을 제시하려면 국가의 지질학 점수가 현 지구의 나이가 결정될 당시의 점수보다 높아야 합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
