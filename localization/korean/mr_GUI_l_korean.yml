 MR_ASTRONOMER_DISCOVER_SATELLITES_BUTTON_TT: "#T 신규 위성 발견#!\n태양계의 행성들은 지구의 달과 유사한 자연 [Concept('concept_verrier_satellite','$concept_verrier_satellites$')]들을 갖고 있으나, 아직 발견되지 않은 상태로 남아 있는 것이 많습니다. 이전에는 존재조차 몰랐던 행성 동반자를 찾아낼 가능성은 기술의 단계와 우리 천문대의 생산 방식, 천문학자의 실력에 따라 생겨나게 됩니다. 하지만 천문학자가 새로운 위성의 탐색에 집중하게 되면 기존에 발견하던 일반 천체의 수는 줄어들게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
