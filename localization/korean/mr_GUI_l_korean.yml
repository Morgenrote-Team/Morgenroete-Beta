 MR_ELECTRICAL_ENGINEER_RESEARCH_BUTTON_TT: "#T 전기 공학 연구#!\n[concept_tesla_engineer]가 전기의 새로운 응용 부문 연구에 집중하도록 합니다. 이 과제로 국가 재정에 #n 지출#!을 더하지만 정기적인 연구력 가속을 부여받게 됩니다.\n다음 가속 대상 기술: [GetPlayer.MakeScope.GetCountry.GetCustom('tesla_electrical_engineering_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AERONAUTICAL_ENGINEER_RESEARCH_BUTTON_TT: "#T 항공 공학 연구#!\n[concept_tesla_engineer]가 항공 공학 기술 연구에 집중하도록 합니다. 이 과제로 국가 재정에 #n 지출#!을 더하지만 정기적인 연구력 가속을 부여받게 됩니다.\n다음 가속 대상 기술: [GetPlayer.MakeScope.GetCountry.GetCustom('tesla_aeronautical_engineering_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_MEDICAL_RESEARCH_BUTTON_TT: "#T 의학 연구#!\n이 과제는 [concept_panum_physician]가 다른 과제로 분주한 상태가 아닐 때에 활성화됩니다.\n\n[concept_panum_physician]가 의학 연구를 발전시키면 국가에 기술 보너스를 부여할 뿐만 아니라, 간혹 일상적인 질병에 대한 치료법을 발견하는 성과로 이어질 수 있습니다.\n다음 가속 대상 기술: [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
