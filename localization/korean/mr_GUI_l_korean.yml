 MR_SYSTEMIZE_FOSSILS_BUTTON_TT: "#T 화석 분류#!\n현장 답사에 나서지 않은 고생물학자는 보다 이론적인 연구에 매진하여 화석을 분류하고, 동물의 계통을 재구성하고, 지구 역사 전반에 걸친 식물의 진화 과정을 추적하게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
