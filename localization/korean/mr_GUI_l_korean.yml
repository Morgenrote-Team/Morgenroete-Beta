 MR_HAPPY_INTELLIGENTSIA_OR_TRADE_UNIONS_TRIGGER_TT: "#default_text [GetPlayer.GetAdjective]의 [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]이나 [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName]에서 #V 5 이상#!의 [concept_approval]을 지님#!"
 MR_ART_NOUVEAU_BUTTON: "아르누보"
 MR_ART_NOUVEAU_BUTTON_TT: "#T 아르누보 채택#!\n이탈리아의 자유 양식(스틸레 리버티)과 주로 연관되기도 했던 [concept_elgar_art_nouveau]는 19세기에서 20세기로 넘어가던 시기의 미술 사조입니다. (종교 개혁 운동 이후의) 개혁 양식, (빈 분리파 이후의) 분리파 양식, 카탈루냐의 모더니즘, 스위스의 사팽 양식과 미국의 티파니 양식 등이 아르누보로 분류될 수 있습니다. 프랑스어와 영어, 이탈리아어에서 주로 쓰이는 아르누보(Art Nouveau)라는 표현 외에도 영어에서는 모던 스타일(Modern Style), 이탈리아어에서는 플로레알레(Floreale)라는 표현이 사용됩니다. 시대적으로 아르누보는 세기말에 속합니다.\n\n[GetPlayer.GetCustom('artists_center_of_arts_art_nouveau_active_custom_loc')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
