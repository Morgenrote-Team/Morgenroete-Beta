 MR_EXPRESSIONISM_BUTTON_TT: "#T 인상주의 채택#!\n[concept_elgar_expressionism]는 9세기 말에 그 유래와 선구자를 찾아볼 수 있는 하나의 예술 양식입니다. 인상주의와 상징주의, 야수파와 마찬가지로, 표현주의는 자연주의적 경향에 반하는 운동입니다. 표현주의에서는 표현적 수준이 미적, 호소적, 사실적 수준보다 우위를 차지합니다. 예술가는 자신의 경험을 관람자에게 전달하고자 합니다. 사물의 외적 모습을 묘사하는 음악적 인상주의와 달리, 표현주의 예술 운동은 인간 영혼의 감정을 형상화합니다.\n\n[GetPlayer.GetCustom('artists_center_of_arts_expressionism_active_custom_loc')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
