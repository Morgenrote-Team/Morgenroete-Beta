 MR_REMOUNT_SKELETON_BUTTON: "공룡 골격 재조립"
 MR_REMOUNT_SKELETON_BUTTON_TT: "#T 공룡 골격 재조립#!\n완벽하지 못한 상태의 [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')]을 보유하고 있다면 [concept_dubois_paleontologist]에게 재조립을 맡길 수 있습니다. 고생물학자가 경험 많은 상태라면 골격의 재조립도 더 나은 결과물로 나오게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
