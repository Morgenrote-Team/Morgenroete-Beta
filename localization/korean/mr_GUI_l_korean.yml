 MR_GEOLOGIST_GEOLOGICAL_RESEARCH_BUTTON_ACTIVE_TT: "#T 지질학 연구 활성화#!\n지질학자가 지질학 연구를 수행하기 위해 조국을 여행하고 있습니다. 이를 통해 누층과 동굴을 찾아내는 것은 물론 나중에 가서는 우라늄까지 발견할 수 있습니다. 광물학자 특성을 보유한 지질학자는 해마다 손에 넣는 광물의 수가 두 배가 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
