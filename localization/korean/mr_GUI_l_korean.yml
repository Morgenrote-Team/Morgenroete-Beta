 MR_ZOOLOGICAL_EXPEDITION_BUTTON_TT: "#T 현지 동물 포획#!\n우리나라에는 [concept_dubois_zoo]에 전시할 만큼 매력적인 생물종이 사는 동물 서식지가 존재합니다. 1년 동안 [concept_dubois_naturalist]가 우리나라를 돌아보며 동물원에 들일 [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]을 포획합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
