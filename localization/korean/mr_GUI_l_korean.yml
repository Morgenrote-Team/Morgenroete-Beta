 MR_YUCATAN_EXPEDITION_TT: "#T 마야의 잃어버린 도시로 탐사대 파견#!\n정글 숲 한가운데 미지의 거대 도시가 존재한다는 목격담이 늘고 있습니다. 한층 더 깊이 조사하여 유카탄 반도에 고고학 탐사대를 파견해야겠습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_YUCATAN_EXPEDITION_DISCOVERED_TRIGGER_TT: "#default_text #V 스티븐스와 캐터우드가 탐사를 떠나면서#! 유카탄의 고고학 연구가 가능해짐#!"
 MR_YUCATAN_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 유카탄 [concept_lepsius_expedition]를 #V 지원하고 있지 않음#!#!"
 MR_YUCATAN_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V 유카탄 주를 보유#!했거나 보유국과 [concept_lepsius_excavation_licence]를 체결함#!"
 MR_PERU_EXPEDITION_TT: "#T 잉카 문명의 숨겨진 유산을 탐색하는 탐사대 파견#!\n페루 상공을 비행하다 안데스 산맥에 이상한 요새와 성벽 유적이 세워진 것을 목격했다는 비행사들이 있습니다. 아무래도 스페인 사람들이 잉카의 문화 유산을 완전히 파괴하진 못했나 봅니다. 원주민이 저항하던 일부 마을은 오늘날까지도 발견된 적이 없습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PERU_EXPEDITION_DISCOVERED_TRIGGER_TT: "#default_text #V 빙엄의 마추픽추 발견#!으로 페루의 고고학 연구가 가능해짐#!"
 MR_PERU_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 페루 [concept_lepsius_expedition]를 #V 지원하고 있지 않음#!#!"
 MR_PERU_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V $STATE_ICA$ 주를 보유#!했거나 보유국과 [concept_lepsius_excavation_licence]를 체결함#!"
 MR_EXODUS_CONGRESS_BUTTON: "출애굽기 학술회의"
 MR_EXODUS_CONGRESS_BUTTON_TT: "#T 출애굽기 학술회의#!\n이집트와 레반트 지역에 대한 연구가 활발해지면서 성경 속 사건의 역사성에 대한 의문이 다시금 제기되고 있습니다. 특히 히브리인의 이집트 탈출, 즉 출애굽기가 실체로 확인되지 않는 점은 모세의 오경이 단순한 허구가 아닌지에 대한 의문을 불러일으켰습니다. 학계에서는 성경 속 이야기는 전부 무시해도 좋다는 급진적인 시각이 있는가 하면, 반대로 성경 이야기는 문자 그대로 받아들일 수는 없지만 과학적 가치는 지녔다고 보는 시각도 존재합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXODUS_CONGRESS_EGYPTIAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetName]에서 @lepsius_egypt_minor! 이집트 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] #V 25점 이상#! 보유 (현재 [GetPlayer.MakeScope.Var('lepsius_egyptian_artifact_minor').GetValue|0+]점 보유)#!"
 MR_EXODUS_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text 전 세계에서 발견된 @lepsius_egypt_minor![Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]의 수가 #V 150점 이상#! (현재 @lepsius_egypt_minor! [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0]점 발견)#!"
 MR_CIVILIZATION_CONGRESS_BUTTON: "문명 학술회의"
 MR_CIVILIZATION_CONGRESS_BUTTON_TT: "#T 문명 기원 학술회의#!\n수세기 동안 유럽 뿐만 아니라 지중해와 중동의 국가들도 이집트가 가장 오래된 문명이라 믿어왔습니다. 그러나 아시리아와 바빌로니아에서 발견되는 유물들이 날이 갈수록 늘어나면서 그 이론은 확실히 흔들리게 되었습니다. 문자의 경우 오히려 메소포타미아에서 발명된 것으로 보이며, 그밖에 문명의 시작을 함께 했던 여러 업적들도 그곳에서 이루어졌음이 밝혀진 것입니다. 어쩌면 모든 문명은 근원적으로 바빌론에서 비롯되었고, 모든 종교도 바빌론 신화에서 유래한 것은 아닐까요? 성경에서 호메로스 서사시에 이르기까지 모든 문학의 기원은 길가메시 서사시였던 걸까요?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVILIZATION_CONGRESS_MESOPOTAMIAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetName]에서 @lepsius_mesopotamia_minor! 메소포타미아 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] #V 25점 이상#! 보유 (현재 [GetPlayer.MakeScope.Var('lepsius_mesopotamian_artifact_minor').GetValue|0+]점 보유)#!"
 MR_CIVILIZATION_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text 전 세계에서 발견된 @lepsius_mesopotamia_minor! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]의 수가 #V 300점 이상#! (현재 @lepsius_mesopotamia_minor! [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0]점 발견)#!"
 MR_TROY_CONGRESS_BUTTON: "트로이 학술회의"
 MR_TROY_CONGRESS_BUTTON_TT: "#T 트로이 학술회의#!\n슐리만이 트로이를 찾아냈습니다. 적어도 본인은 그렇게 주장합니다. 트로이를 단순히 창작의 산물로만 여겼던 비판의 목소리는 사그라들었지만, 일련의 의문에는 여전히 답을 내놓지 못하고 있습니다. 슐리만이 발견한 트로이는 호메로스 서사시에 나왔던 그 트로이일까요? 그것보다도 트로이의 정체는 대체 무엇이었을까요? 많은 학자들이 여전히 회의적인 시각을 갖고 있습니다. 한편 아나톨리아 지역에서 새로 알아낸 정보들은 그러한 발견을 완전히 새롭게 조명할지도 모릅니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TROY_CONGRESS_AEGEAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetName]에서 @lepsius_aegean_minor! 에게 문명 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] #V 25점 이상#! 보유 (현재 [GetPlayer.MakeScope.Var('lepsius_aegean_artifact_minor').GetValue|0+]점 보유)#!"
 MR_TROY_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text 전 세계에서 발견된 @lepsius_aegean_minor! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]의 수가 #V 300점 이상#! (현재 @lepsius_aegean_minor! [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0]점 발견)#!"
 MR_INSPECT_EXCAVATION_BUTTON: "발굴 현장 시찰"
 MR_INSPECT_EXCAVATION_BUTTON_TT: "#T 발굴 현장 시찰#!\n경험 많은 고고학자를 발굴 현장으로 보내 발굴 작업을 강화할 수 있습니다. 고고학자는 약 1년 후 새로운 발굴지를 마련하여 집중 연구를 실시할 것이고, 이 과정에서 이전에 확인되지 않았던 주요 고고학 유물을 추가로 발견할 가능성이 드러나게 됩니다. 유물 발견의 성공 여부는 고고학자의 경험치가 크게 좌우합니다. 고고학회를 설립하는 것 역시 성공 확률을 높여줍니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_INSPECT_EXCAVATION_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 대표적인 고고학 발견이 이루어진 적이 없는 지역에 #V [concept_lepsius_excavation]를 최소 한 곳 이상 실시#!하고 있음#!"
 MR_INSPECT_EXCAVATION_ARTIFACT_FOR_DISCOVERY_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 특정 지역에서 단서를 찾아 나서기 전에 그 지역에서 #V [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]을 30점 이상 확보하여 연구함#!#!"
 MR_CANCEL_EXCAVATION_BUTTON: "발굴 철수"
 MR_CANCEL_EXCAVATION_BUTTON_TT: "#T 발굴 철수#!\n특정 상황에서는 발굴단을 철수하는 것이 유리할 수도 있습니다. 입수한 유물과 수집품은 그대로 우리 손에 남지만, 상시 발굴은 끝마치게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHAEOLOGY_ON_ARCHAEOLOGICAL_EXCAVATION_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 [concept_lepsius_excavation]를 진행하고 있는 [Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')]을 #V 최소 1팀#! 보유#!"
 MR_LOCAL_EXCAVATION_BUTTON: "현지 발굴"
 MR_LOCAL_EXCAVATION_BUTTON_TT: "#T 현지 발굴#!\n고고학계의 보물은 먼 지역에서만 발견되기를 기다리고 있지는 않습니다. 현지 발굴은 유명한 유물을 찾아내는 것보다 명성이 덜할지는 몰라도, 우리가 나고 자란 지역의 선사 시대가 어떠했는지를 엿볼 수 있게 해 줍니다. 탐사를 마친 뒤에 나설 수 있는 일반 발굴과는 달리, 현지 발굴은 예산이 소진되기 전까지는 끝나지 않습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
