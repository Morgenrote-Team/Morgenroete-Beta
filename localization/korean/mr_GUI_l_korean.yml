 MR_MISSING_CMF_HEADER_LOC: "모르겐뢰테의 플레이를 위해서는 #V Community Mod Framework#!가 필요합니다. 스팀이나 깃허브 페이지에서 프레임워크를 다운로드해 주세요.\n\n#V Community Mod Framework#!를 찾을 수 없다면, 스팀 창작마당의 모르겐뢰테 설명란을 확인하세요. 스팀과 깃허브 버전으로 향하는 링크가 있을 것입니다."
