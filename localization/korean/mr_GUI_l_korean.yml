 MR_PALEONTOLOGICAL_EXPEDITION_RECALL_BUTTON: "고생물학 탐사 철회"
 MR_PALEONTOLOGICAL_EXPEDITION_RECALL_BUTTON_TT: "#T 고생물학 탐사 철회#!\n고생물학자가 공룡 골격을 복원하거나 재조립하는 등의 다른 과업에 나서도록 고생물학 조사를 그만두고 돌아오라고 명합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
