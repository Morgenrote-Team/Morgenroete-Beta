 MR_UPPER_EGYPT_EXPEDITION_TT: "#T 왕가의 계곡으로 탐사대 파견#!\n고대 수도 테베와 왕가의 계곡이 있는 상이집트는 이집트학의 성지로 불립니다. 이 지역의 탐사 허가를 받아 이집트 유물을 탐색해야 합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
