 DINOSAUR_BONE_VAR_TT: "#header [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]#!\n[GetPlayer.GetName]에서 발견한 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] 수는 총 @dubois_dinosaur_bone! [GetPlayer.MakeScope.Var('dubois_dinosaur_bone_total').GetValue|V0]점입니다.\n\n#yellow 아프리카:#!\n[GetPlayer.MakeScope.Var('dubois_african_dinosaur_bone').GetValue|V0] (미사용) / [GetPlayer.MakeScope.Var('dubois_african_dinosaur_bone_total').GetValue|V0] (총합)\n#yellow 아시아:#!\n[GetPlayer.MakeScope.Var('dubois_asian_dinosaur_bone').GetValue|V0] (미사용) / [GetPlayer.MakeScope.Var('dubois_asian_dinosaur_bone_total').GetValue|V0] (총합)\n#yellow 호주:#!\n[GetPlayer.MakeScope.Var('dubois_australian_dinosaur_bone').GetValue|V0] (미사용) / [GetPlayer.MakeScope.Var('dubois_australian_dinosaur_bone_total').GetValue|V0] (총합)\n#yellow 유럽:#!\n[GetPlayer.MakeScope.Var('dubois_european_dinosaur_bone').GetValue|V0] (미사용) / [GetPlayer.MakeScope.Var('dubois_european_dinosaur_bone_total').GetValue|V0] (총합)\n#yellow 북아메리카:#!\n[GetPlayer.MakeScope.Var('dubois_north_american_dinosaur_bone').GetValue|V0] (미사용) / [GetPlayer.MakeScope.Var('dubois_north_american_dinosaur_bone_total').GetValue|V0] (총합)\n#yellow 남아메리카:#!\n[GetPlayer.MakeScope.Var('dubois_south_american_dinosaur_bone').GetValue|V0] (미사용) / [GetPlayer.MakeScope.Var('dubois_south_american_dinosaur_bone_total').GetValue|V0] (총합)\n#yellow 일반:#!\n[GetPlayer.MakeScope.Var('dubois_general_dinosaur_bone').GetValue|V0] (미사용) / [GetPlayer.MakeScope.Var('dubois_general_dinosaur_bone_total').GetValue|V0] (총합)"
 MR_AUTOMATE_PALEONTOLOGIST_TT: "#T [concept_dubois_paleontologist] 자동화#!\n자동화를 설정하면 더 이상 지질학자에게 업무를 지시할 필요가 없습니다.\n그들은 알아서 작업하고 그때마다 알맞은 업무를 수행할 것입니다. 다만 [Concept('concept_dubois_paleontological_expedition','$concept_dubois_paleontological_expeditions$')] 수행이나 [Concept('concept_dubois_paleontological_team','$concept_dubois_paleontological_teams$')] 잔류는 여전히 직접 다루게 됩니다. 일부 이벤트도 수신하게 됩니다."
