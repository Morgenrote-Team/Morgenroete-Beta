 MR_AERONAUTICAL_ENGINEER_ADVANCED_AIRCRAFTS_BUTTON: "군용기 개량"
 MR_AERONAUTICAL_ENGINEER_ADVANCED_AIRCRAFTS_BUTTON_TT: "#T 신형 군용기 개발#!\n[concept_tesla_engineer]가 신형 군용기 개발에 매진하도록 합니다. 이것으로 신형 [concept_mobilization_option]을 사용하거나 그 등급을 올릴 수 있습니다. 이 사업으로 국가 재정에 #n 지출#!을 더하게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
