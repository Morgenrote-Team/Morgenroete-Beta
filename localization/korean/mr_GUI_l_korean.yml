 MR_IMPRESSIONISM_BUTTON_TT: "#T 인상주의 채택#!\n[concept_elgar_impressionism]는 특정 풍경의 순간을 포착하여 그 분위기를 묘사한 것이 특징인 미술사의 한 양식입니다. 19세기 후반 프랑스 회화에서 부상하기 시작한 예술 운동으로, 인상주의라는 용어 자체는 음악, 문화, 영화, 사진의 특정 양식을 가리키는 말로도 쓰입니다. 하인리히 하르트와 같은 여러 자연주의자들은 '진리를 추구하는 행동주의'의 표현 수단으로 음악을 거부한 반면, 인상주의자들은 섬세하게 다듬어진 다채로운 화음을 '목적 없는 몽상'으로 여기며 즐기는 경우가 많았습니다.\n\n[GetPlayer.GetCustom('artists_center_of_arts_impressionism_active_custom_loc')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
