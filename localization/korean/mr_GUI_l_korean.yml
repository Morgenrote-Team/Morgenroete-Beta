 MR_CHEMIST_IMPROVE_EXPLOSIVES_TRIGGER_TT: "#default_text 세가지 [Concept('concept_modifier','$concept_modifiers$')]을 전부 지니고 있지 않은 1단계 이상의 폭약 공장을 하나 이상 보유#!"
 MR_CHEMIST_IMPROVE_SYNTHETICS_BUTTON: "합성 화학 물질 개량"
 MR_CHEMIST_IMPROVE_SYNTHETICS_TRIGGER_TT: "#default_text 세가지 [Concept('concept_modifier','$concept_modifiers$')]을 전부 지니고 있지 않은 1단계 이상의 합성 화학 물질 공장을 하나 이상 보유#!"
 MR_CHEMIST_CONGRESS_BUTTON: "화학 학술회의"
