 MR_AERONAUTICAL_ENGINEER_AIRPORT_BUTTON: "공항 현대화"
 MR_AERONAUTICAL_ENGINEER_AIRPORT_BUTTON_TT: "#T 공항 현대화#!\n[concept_tesla_engineer]가 [GetBuildingType('building_airport').GetName] 현대화에 집중하도록 합니다. 공항은 [concept_throughput]과 [concept_good_production]을 늘리고 [concept_input_mult]은 줄이는 변화 요인을 부여받게 됩니다. 이 사업으로 국가 재정에 #n 지출#!을 더하게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
