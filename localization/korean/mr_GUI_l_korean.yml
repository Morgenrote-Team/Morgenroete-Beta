 MR_ASTRONOMER_MOON_MAP_BUTTON_TT: "#T 월면도 제작#!\n카메라와 근대 망원경의 도움으로, 지구의 동반자를 통째로 두어 전례 없는 품질의 지도를 제작하는 것이 가능해졌습니다. 월면도는 천문학의 큰 이정표가 될 것입니다. 다만 천문학자가 월면 연구를 추진한다면 평소에 찾아내는 천체의 수가 줄어들 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
