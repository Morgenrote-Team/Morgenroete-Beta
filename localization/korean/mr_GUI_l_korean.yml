 MR_CHEMIST_SYNTHETIC_RUBBER_BUTTON: "합성 고무"
 MR_CHEMIST_SYNTHETIC_RUBBER_BUTTON_TT: "#T 합성 고무#!\n고무 생산은 대단히 좁은 기후 지역에 국한됩니다. 이렇게 귀한 원자재는 식민지나 수입을 통하지 않고서 손에 넣기란 대단히 어렵습니다. 하지만 화학의 가능성이라면 우리가 다른 면에서 부족한 것을 보완해 줄 수 있지 않을까요?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANIMAL_DOCUMENTATION_BUTTON: "현지 동물군 기록"
 MR_ANIMAL_DOCUMENTATION_BUTTON_TT: "#T 자국 동물상 기록#!\n최대한 이국적인 동물들을 탐색하겠다는 야심만으로 우리의 동물상을 소홀히 하여서는 안 될 것입니다. 박물학자가 동물들이 서식하는 핵심 지역을 면밀히 조사하여 그에 관한 과학 논문을 집필할 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANIMAL_DOCUMENTATION_ACTIVE_TT: "#T 자국 동물상 기록#!\n#p 현재 박물학자가 우리나라의 야생 동물을 기록하고 있습니다.#!\n최대한 이국적인 동물들을 탐색하겠다는 야심만으로 우리의 동물상을 소홀히 하여서는 안 될 것입니다. 박물학자가 동물들이 서식하는 핵심 지역을 면밀히 조사하여 그에 관한 과학 논문을 집필할 수 있습니다."
 MR_CAN_DOCUMENT_ANIMAL_TRIGGER_TT: "#indent_newline:6 #default_text $mr_simple_checkbox_loc$[GetPlayer.GetName]에서 미기록 상태의 [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]이 원래 살고 있던 동물 서식지를 갖춘 편입 주를 하나 이상 보유함#!#!"
