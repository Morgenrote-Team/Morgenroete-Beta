 MR_BEETHOVEN_MONUMENT_BUTTON_TT: "#T 베토벤 기념비 건설#!\n루트비히 판 베토벤이 역사상 가장 위대한 작곡가였고 모든 낭만주의 음악이 그의 작품에서 비롯되었다는 점은 의심할 여지가 없습니다. 동시대 음악인라면 그에게 경의를 표해야 하겠습니다. 그럼에도 베토벤이 아직도 제대로 평가받지 못하고 있다는 점은 놀라운 사실입니다. 하지만 로베르트 슈만의 호소가 있고 난 뒤 베토벤의 고향 본에 기념비를 건립하기 위해 여러 음악 협회와 시 당국, 귀족 가문과 정부에서 기금을 모으고 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
