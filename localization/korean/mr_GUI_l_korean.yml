 MR_GEOLOGIST_UNDERWATER_MOUNTAINS_BUTTON_TT: "#T 대서양 해령 탐사#!\n대서양 해저 케이블 부설 과정에서 해저 지형이 융기된 흔적이 발견되자 학계 유수의 지질학자들은 그 원인에 의문을 품고 있습니다. 현대적인 측정 장비와 경험 많은 지질학자가 이 미스터리를 풀어낼 수 있을 것으로 기대됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_EXPERIENCED_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #O 경험 많은#! 또는 #O 저명한#! [concept_agassiz_geologist]를 보유함#!"
 MR_PALEONTOLOGIST_FAMOUS_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #O 저명한#! [concept_dubois_paleontologist]를 보유함#!"
 MR_GEOLOGIST_ORE_VEIN_BUTTON_TT: "#T 광맥 탐사#!\n[concept_agassiz_geologist]는 기존 광산 인근에서 새로운 원자재 매장지를 탐사하여 생산량을 늘릴 수 있습니다.\n\n이것으로 광산에 $agassiz_building_production_mult_modifier_with_tooltip$ [concept_modifier]을 부여하게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_ORE_VEIN_STOP_BUTTON_TT: "#T 광맥 탐사 중단#!\n현재 [concept_agassiz_geologist]가 기존 광산 인근에서 새로운 원자재 매장지를 탐사하여 생산량을 늘리는 작업을 진행하고 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_OIL_BUTTON_TT: "#T 석유 탐사#!\n[concept_agassiz_geologist]는 기존 석유 매장지 인근에서 새로운 유정을 탐사하여 생산량을 늘릴 수 있습니다.\n\n이것으로 석유 매장지에 $agassiz_building_production_2_mult_modifier_with_tooltip$ [Concept('concept_modifier','$concept_modifiers$')]을 부여하게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 VISIT_OBSERVATORY_BUTTON: "천체투영관 방문"
 VISIT_OBSERVATORY_BUTTON_TT: "#T 천체투영관 방문#!\n천체투영관에서는 우리나라와 다른 나라, 그리고 과학계의 천문학 지식 현황을 살펴볼 수 있습니다."
 MR_SELL_MINERALS_FOR_RARE_MINERAL_BUTTON_TT: "#T 일반 광물로 희귀 광물 매입#!\n[concept_agassiz_geologist]는 동료 학자들과 수집가, 그 밖의 아마추어 지질학자에게서 [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]을 구입할 수 있습니다. 이를 위해서 상당량의 일반 광물과 교환할 필요가 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON: "학제간 심포지엄"
 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON_TT: "#T 지질학-고생물학 심포지엄#!\n지질학과 고생물학은 서로 간에 밀접한 관련을 맺고 있습니다. 우리는 양측 분야의 저명한 학자들을 한 자리에 불러모아, 교류 과정에서 발생하는 시너지를 활용하여 지구사에 관한 새로운 과학적 이론을 정립할 필요가 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTING_GEOLOGIST_TT: "#T 지질학자 양성#!\n#p 현재 지질학자를 양성하고 있습니다.#!\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]는 광물과 화산, 누층을 연구합니다."
