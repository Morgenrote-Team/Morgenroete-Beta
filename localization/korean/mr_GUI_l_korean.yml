 MR_GERMAN_MUSIC_ASSOCIATION_BUTTON: "전독일 음악 협회 창설"
 MR_GERMAN_MUSIC_ASSOCIATION_BUTTON_TT: "#T 전독일 음악 협회 창설#!\n전독일 음악 협회 (Allgemeiner Deutscher Musikverein, ADMV)는 1861년 독일의 프란츠 리스트와 프란츠 브렌델이 신독일 음악파의 음악적 이상을 구현하기 위해 창설한 음악 협회입니다. 전독일 음악 협회는 음악 공연과 실질적 지원이라는 두가지 목표를 지니고 있었습니다. 예술적 목표의 일환으로 해마다 다양한 장소에서 '음악가의 모임' (Tonkünstler-Versammlungen)을 주최하였으며, 음악 작품 가운데 중요하면서도 잘 알려지지 않고, 무엇보다도 새로운 것이라면 어떤 유형이든 가리지 않고 연주 대상으로 삼았습니다. 그러면서도 거의 혹은 전혀 들어보지 못했으나 중요성에 따라 흥미를 불러일으키는 오래된 작품들도 연주 대상에 올랐습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_RAILWAY_BUTTON_TT: "#T 철도 사업#!\n[concept_tesla_engineer]가 [GetPlayer.GetName]의 [GetBuildingType('building_railway').GetName] 개량에 집중하도록 합니다. 대상 건물의 우선순위를 정할 수 있으며, 개량된 철도는 $tesla_modernized_railway_lines_building_modifier_with_tooltip$ [concept_modifier]이 부여되어 건물의 [concept_throughput]이 향상됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_RAILWAY_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 $tesla_modernized_railway_lines_building_modifier_with_tooltip$ [concept_modifier]을 지니지 않은 [GetBuildingType('building_railway').GetName]를 보유함#!"
 MR_CIVIL_ENGINEER_IRRIGATION_BUTTON_TT: "#T 관개 사업#!\n[concept_tesla_engineer]가 [GetPlayer.GetName]의 관개 시설 개량에 집중하도록 합니다. 대상 건물의 우선순위를 정할 수 있으며, 시설 개량을 거친 주는 #V $tesla_state_trait_irrigation$#! 주 특성이 부여되어 농경 건물의 [concept_throughput]이 향상되고 다양한 [Concept('concept_harvest_condition', '$concept_harvest_conditions$')] 상황에서 저항력이 높아집니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_IRRIGATION_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V $tesla_state_trait_irrigation$#! 주 특성이 부여되지 않은 [concept_state]를 보유함#!"
 MR_TOTAL_AGRICULTURAL_LEVELS: "농업 단계"
 MR_TOTAL_AGRICULTURAL_LEVELS_TT: "#V $bg_agriculture$#!와 #V $bg_plantations$#! 건물의 총 단계 순으로 [Concept('concept_state', '$concept_states$')] 정렬"
 MR_ARABLE_LAND: "[concept_arable_land]"
 MR_ARABLE_LAND_TT: "남은 [concept_arable_land] 순으로 [Concept('concept_state', '$concept_states$')] 정렬"
 MR_RED_CROSS_BUTTON: "[concept_panum_red_cross] 창설"
 MR_RED_CROSS_BUTTON_TT: "#T [concept_panum_red_cross] 창설#!\n국제 적십자 위원회는 최초의 범국가적 기구로 꼽힙니다. 적십자의 창설은 국제법 제정의 중대한 발걸음이었습니다. 국제 적십자 위원회는 인간의 생명과 건강을 지키고, 모든 인간에 대한 존중을 보장하며, 인간의 고통을 예방하고 완화하기 위해 설립되었습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IRC_INFAMY_TRIGGER_TT: "#default_text [GetPlayer.GetName]의 #V [concept_infamy]이 35#! 이하#!"
 MR_JOIN_RED_CROSS_BUTTON: "[concept_panum_red_cross] 가입"
 MR_JOIN_RED_CROSS_BUTTON_TT: "#T [concept_panum_red_cross] 가입#!\n우리나라는 무자비한 전쟁을 마다하고 국제 적십자 위원회에 가입하여 국제 협약을 통해 명성을 올릴 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_FIRST_CONVENTION_BUTTON: "제1차 협약 서명"
 MR_SIGN_FIRST_CONVENTION_BUTTON_TT: "#T 제1차 협약 서명#!\n제1차 제네바 협약, 공식 명칭 '야전군 부상자 상태 개선에 관한 협약'에서는 무력 충돌 희생자 보호를 위한 국제법 규정의 근간을 마련하고 있습니다. 이 협약의 핵심 조항 중 하나는 부상과 질환을 겪고 있는 장병들을 치료하는 모든 시설에 대해 생포나 파괴가 이루어질 수 없다는 점과 모든 전투원를 공정하게 수용하여 치료할 것을 명시한 조항입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_SECOND_CONVENTION_BUTTON: "제2차 협약 서명"
 MR_SIGN_SECOND_CONVENTION_BUTTON_TT: "#T 제2차 협약 서명#!\n1899년·1907년 헤이그 협약은 네덜란드 헤이그에서 두 차례에 걸쳐 개최된 만국 평화회의를 계기로 채택된 일련의 국제 협약 및 선언문입니다. 두 회의 모두 군비 축소와 전쟁 규정, 전쟁 범죄에 관한 협의가 이루어졌습니다. 1907년 회의에서는 해전에 관한 논의가 더욱 집중되었습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_THIRD_CONVENTION_BUTTON: "제3차 협약 서명"
 MR_SIGN_THIRD_CONVENTION_BUTTON_TT: "#T 제3차 협약 서명#!\n질식성·독성·그 외의 가스전 및 세균전술의 전시 사용 금지 의정서, 줄임말로 제네바 의정서는 국제 무력 충돌에서 화학과 생물학 무기의 사용을 금지하는 조약입니다. 1925년 6월 17일 제네바에서 서명이 이루어졌습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
