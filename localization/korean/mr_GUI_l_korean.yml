 MR_GEOLOGIST_NOT_DEMOTIVATED_TRIGGER_TT: "#default_text [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName](이)가 의욕을 상실한 상태가 아님#!"
 MR_GEOLOGIST_OIL_STOP_BUTTON_TT: "#T 석유 탐사 중단#!\n현재 [concept_agassiz_geologist]가 기존 석유 매장지 인근에서 새로운 유정을 탐사하여 생산량을 늘리는 작업을 진행하고 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_geologist_oil_stop_button_effect_tt: "[concept_agassiz_geologist]가 유전 탐사를 중단합니다."
 MR_GEOLOGIST_GEOLOGICAL_RESEARCH_BUTTON_TT: "#T 지질학 연구#!\n지질학자는 지질학 연구를 수행하기 위해 조국을 여행할 수 있습니다. 이를 통해 누층과 동굴을 찾아내는 것은 물론 나중에 가서는 우라늄까지 발견할 수 있습니다. 광물학자 특성을 보유한 지질학자는 해마다 손에 넣는 광물의 수가 두 배가 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
