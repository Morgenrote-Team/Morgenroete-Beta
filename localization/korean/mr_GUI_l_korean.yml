 MR_BAN_ANIMAL_EXPORT_BUTTON: "동물 반출 금지"
 MR_BAN_ANIMAL_EXPORT_BUTTON_TT: "#T 동물 반출 금지#!\n동물 반출 금지령을 내리면 원칙적으로 우리 땅에 사는 어떠한 동물들도 해외에 판매할 수 없는 상황임을 분명히 할 수 있게 됩니다. 이에 다른 나라들도 반입 문의를 자제할 것입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALLOW_ANIMAL_EXPORT_BUTTON: "동물 반출 허용"
 MR_ALLOW_ANIMAL_EXPORT_BUTTON_TT: "#T 동물 반출 허용#!\n동물의 반출을 허용하면 적당한 추가 수입을 거둘 수 있게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BREEDING_ANIMALS_BUTTON: "동물 번식"
 MR_BREEDING_ANIMALS_BUTTON_TT: "#T 자연 보호 구역에 동물 번식시키기#!\n[concept_dubois_nature_reserve]가 있는 주에 새로운 [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] [concept_dubois_habitat]의 조성을 시도합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BREEDING_ANIMALS_TRIGGER: "#default_text [concept_dubois_nature_reserve]이 있는 주를 보유하고 있다면 [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]을 번식시킬 수 있습니다. 이때 아직 #V 자연 보호 구역#!과 같은 지역에 서식하는 동물이 아니어야 하고, [concept_dubois_zoo]에 반입되어 있는 상태여야 합니다.\n예를 들어 #b 자연 보호 구역#!을 보유한 유럽 국가로서 #b 알파인아이벡스#!를 번식시키려면, #b 알파인아이벡스#!의 [concept_dubois_habitat]를 갖춘 주가 없는 상황에서 #b 동물원#!에는 아이벡스를 반입한 상태여야 합니다.#!"
