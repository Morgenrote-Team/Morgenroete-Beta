 MR_LOWER_EGYPT_EXPEDITION_TT: "#T 피라미드군으로 탐사대 파견#!\n이집트의 피라미드는 태초부터 인류를 매혹 속에 빠뜨렸습니다. 하이집트의 모래 속에는 또다른 무덤과 사원, 도시까지 제 모습을 다시 드러내기만을 기다리고 있다고 전해집니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LOWER_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 하이집트 [concept_lepsius_expedition]를 #V 지원하고 있지 않음#!#!"
