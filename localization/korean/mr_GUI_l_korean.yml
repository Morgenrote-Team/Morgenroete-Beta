 MR_AERONAUTICAL_ENGINEER_GIANT_AIRPLANE_BUTTON: "거대 항공기"
 MR_AERONAUTICAL_ENGINEER_GIANT_AIRPLANE_BUTTON_TT: "#T 거대 항공기#!\n창공은 우리의 마지막 한계다. 근세에 대항해시대가 있었다면 지금은 창공을 정복할 차례다. 하지만 스페인의 갤리선과는 달리 오늘날의 항공 기체는 하찮은 수준에 불과하다. 거대한 해양선이 바다를 누비지만, 하늘은 아직 조그만 기계들이 지배하고 있을 뿐이다. 수십 명이 아니라 수백 명 단위로 태울 수 있는 거대 항공기의 제작은 이상향에서나 있을 법한 것으로 보일지 모른다. 그러나 번성하는 항공 사업과 적임자가 이끄는 탄탄한 항공사가 있다면 세상은 완전히 뒤집어질지도 모른다...\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
