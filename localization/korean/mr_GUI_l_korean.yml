 MR_MOZART_MONUMENT_BUTTON_TT: "#T 모차르트 기념비 건설#!\n볼프강 아마데우스 모차르트는 역사상 가장 중요한 작곡가로 꼽히지만, 여전히 그를 인정하지 못하는 사람들도 있습니다. 최근 들어 많은 작곡가들이 모차르트를 현대 음악의 출발점으로 다시 돌아보고 있습니다. 모차르트의 고향인 잘츠부르크에 기념비를 세우면 그의 발자취를 따라가는 미래 세대에게 동기를 불어넣을 것입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
