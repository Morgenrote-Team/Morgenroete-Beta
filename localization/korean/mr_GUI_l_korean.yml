 MR_HIPPOCAMPUS_CONGRESS_BUTTON: "해마 학술회의"
 MR_HIPPOCAMPUS_CONGRESS_BUTTON_TT: "#T 해마 학술회의#!\n인간의 독자성은 어디까지인가? 동물적인 면모는 얼마나 가지고 있는가? 고대 그리스인들은 일찍이 인간과 유인원 사이의 유사성을 인지하고 있었습니다. 칼 린네우스가 유인원과 인간을 '영장류', 즉 동물 중에서도 최상위 계급으로 분류한 것은, 한때는 이런 분야가 그닥 논란의 여지가 없었음을 보여주고 있습니다. 하지만 진화론이 정립되고 인간이 유인원과 비슷한 조상으로부터 진화해 왔다는 가설이 제기되면서, 이제는 결론을 내리지 않으면 안 될 분쟁이 수면 위로 떠오르게 되었습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 [concept_dubois_naturalist]가 있음#!"
 MR_HIPPOCAMPUS_CONGRESS_5_NATURALISTS_TRIGGER_TT: "#default_text [concept_dubois_naturalist]를 보유한 국가가 #V 5개국#! 이상#!"
 MR_HIPPOCAMPUS_CONGRESS_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 보유한 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]의 수가 #V 20000점 이상#! (현재 [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+])#!"
 MR_HIPPOCAMPUS_CONGRESS_GLOBAL_SPECIMEN_TRIGGER_TT: "#default_text 전 세계에서 수집된 [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]의 수가 #V 100,000점 이상#! (현재 [GetGlobalVariable('dubois_global_specimen').GetValue|0+]점)#!"
 MR_EXTEND_ZOO_SMALL_BUTTON: "[concept_dubois_zoo] 확장 (소규모)"
 MR_EXTEND_ZOO_SMALL_BUTTON_TT: "#T 동물원을 소규모로 확장#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]은 모두에게 행복을 안깁니다. 사람들은 동물원에 모여들고, 과학자들은 동물학 연구를 계속할 수 있으며, 국제적인 위신은 제일 많은 수의 외래종을 전시한 국가에게 돌아가기 떄문입니다. 확장을 거듭할수록 국가의 위신도 높아집니다. 어떤 확장 단계에서는 단순히 동물을 많이 수집하는 것을 넘어서 세계 각지에서 동물을 골고루 데려와야 합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_10_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 보유한 [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]의 수가 #V 총 10마리#! (현재 [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+]마리 보유)#!"
 MR_EXTEND_ZOO_SMALL_2_SPECIAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 보유한 [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] 가운데 #V 아프리카 동물 2마리#! (현재 [GetPlayer.MakeScope.Var('dubois_zoo_animal_africa').GetValue|0+]마리), #V 아시아 동물 2마리#! (현재 [GetPlayer.MakeScope.Var('dubois_zoo_animal_asia').GetValue|0+]마리), #V 오세아니아 동물 2마리#! (현재 [GetPlayer.MakeScope.Var('dubois_zoo_animal_australia').GetValue|0+]마리) 중 하나를 확보"
