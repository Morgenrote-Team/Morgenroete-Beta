 MR_HOLD_SCHNEIDER_TROPHY_RACE_BUTTON: "슈나이더 트로피 대회 개최"
 MR_HOLD_SCHNEIDER_TROPHY_RACE_BUTTON_TT: "#T 슈나이더 트로피 대회 개최#!\n우리나라는 지난 대회 우승국으로서 차기 대회를 개최할 수 있는 영예를 안게 되었습니다. 우리가 3연승을 기록하면 슈나이더 트로피를 영구히 보유하게 되는 전설을 쓸 수 있습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HOLD_SCHNEIDER_TROPHY_RACE_BUTTON_NO_BREAK_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 #V 슈나이더 트로피 연승 실패#! 변화 요인을 #V 보유하지 않음#!#!"
 MR_HOLD_SCHNEIDER_TROPHY_RACE_BUTTON_WATER_PORT_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 [GetBuildingType('building_port').GetName]와 #V 10단계 이상#!의 [GetBuildingType('building_urban_center').GetName]이 있는 [concept_incorporated_state]를 보유함, #p 또는#! #V 스위스#!로서 #V 10단계 이상#!의 [GetBuildingType('building_urban_center').GetName]이 있는 주를 보유함#!"
 MR_CURTISS_FOUND_PILOT_SCHOOL_BUTTON: "비행학교 창설"
 MR_CURTISS_FOUND_PILOT_SCHOOL_BUTTON_TT: "#T 비행학교 창설#!\n비행학교를 둔다면 비행사 특성을 지닌 인물의 무작위 출현 기회를 더욱 늘리게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CURTISS_FOUND_PILOT_SCHOOL_BUTTON_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 [concept_curtiss_pilot] 에이스 #V 특성#!을 지닌 [concept_character] 보유, #p 혹은#! 슈나이더 트로피 베테랑에 등극한 인물과 #V 3단계 이상#!의 [GetBuildingType('building_automotive_industry').GetName]을 보유, #p 혹은#! 비행사 특성을 지닌 인물과 #V 5단계 이상#!의 [GetBuildingType('building_automotive_industry').GetName]과 #V 2단계 이상#!의 [GetBuildingType('building_airport').GetName] 보유#!"
 MR_CHANGE_TO_CIVIL_EGINEER_BUTTON_TT: "#T 공학자의 특화 분야를 [concept_tesla_civil_engineer]로 변경#!\n우리 [concept_tesla_engineer]가 [Concept('concept_tesla_civil_engineer','$concept_tesla_civil_engineering$')]에 집중하게 됩니다. 이것으로 공학자의 효율이 감소할 수 있습니다. 한번 바뀐 특화 분야는 #n 5년#! 동안 다시 변경할 수 없습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHANGE_TO_CIVIL_EGINEER_BUTTON_HAS_NO_CIVIL_ENGINEER_TT: "#default_text [GetPlayer.GetName]에 [concept_tesla_civil_engineer]가 없음#!"
 MR_CHANGE_TO_MECHANICAL_EGINEER_BUTTON_TT: "#T 공학자의 특화 분야를 [concept_tesla_mechanical_engineer]로 변경#!\n우리 [concept_tesla_engineer]가 [Concept('concept_tesla_mechanical_engineer','$concept_tesla_mechanical_engineering$')]에 집중하게 됩니다. 이것으로 공학자의 효율이 감소할 수 있습니다. 한번 바뀐 특화 분야는 #n 5년#! 동안 다시 변경할 수 없습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHANGE_TO_MECHANICAL_EGINEER_BUTTON_HAS_NO_MECHANICAL_ENGINEER_TT: "#default_text [GetPlayer.GetName]에 [concept_tesla_mechanical_engineer]가 없음#!"
 MR_CHANGE_TO_MILITARY_EGINEER_BUTTON_TT: "#T 공학자의 특화 분야를 [concept_tesla_military_engineer]로 변경#!\n우리 [concept_tesla_engineer]가 [Concept('concept_tesla_military_engineer','$concept_tesla_military_engineering$')]에 집중하게 됩니다. 이것으로 공학자의 효율이 감소할 수 있습니다. 한번 바뀐 특화 분야는 #n 5년#! 동안 다시 변경할 수 없습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHANGE_TO_MILITARY_EGINEER_BUTTON_HAS_NO_MILITARY_ENGINEER_TT: "#default_text [GetPlayer.GetName]에 [concept_tesla_military_engineer]가 없음#!"
 MR_CHANGE_TO_ELECTRICAL_EGINEER_BUTTON_TT: "#T 공학자의 특화 분야를 [concept_tesla_electrical_engineer]로 변경#!\n우리 [concept_tesla_engineer]가 [Concept('concept_tesla_electrical_engineer','$concept_tesla_electrical_engineering$')]에 집중하게 됩니다. 이것으로 공학자의 효율이 감소할 수 있습니다. 한번 바뀐 특화 분야는 #n 5년#! 동안 다시 변경할 수 없습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHANGE_TO_ELECTRICAL_EGINEER_BUTTON_HAS_NO_ELECTRICAL_ENGINEER_TT: "#default_text [GetPlayer.GetName]에 [concept_tesla_electrical_engineer]가 없음#!"
 MR_CHANGE_TO_AERONAUTICAL_EGINEER_BUTTON_TT: "#T 공학자의 특화 분야를 [concept_tesla_aeronautical_engineer]로 변경#!\n우리 [concept_tesla_engineer]가 [Concept('concept_tesla_aeronautical_engineer','$concept_tesla_aeronautical_engineering$')]에 집중하게 됩니다. 이것으로 공학자의 효율이 감소할 수 있습니다. 한번 바뀐 특화 분야는 #n 5년#! 동안 다시 변경할 수 없습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHANGE_TO_AERONAUTICAL_EGINEER_BUTTON_HAS_NO_AERONAUTICAL_ENGINEER_TT: "#default_text [GetPlayer.GetName]에 [concept_tesla_aeronautical_engineer]가 없음#!"
 MR_STOP_ENGINEERING_PROJECT_BUTTON: "과제 중단"
 MR_STOP_ENGINEERING_PROJECT_BUTTON_TT: "#T 공학 과제 중단#!\n현재 진행되는 공학 과제를 중단합니다. 공학 과제의 진행도는 사라지게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_RESEARCH_BUTTON: "토목 공학 연구"
 MR_CIVIL_ENGINEER_INFRASTRUCTURE_BUTTON: "기반 시설 사업"
 MR_CIVIL_ENGINEER_INFRASTRUCTURE_BUTTON_TT: "#T 기반 시설 사업#!\n[concept_tesla_engineer]가 [GetPlayer.GetName]의 기반 시설 확충에 집중하도록 합니다. 우리 주에는 여러 사업으로 [concept_infrastructure]을 늘리는 [Concept('concept_modifier','$concept_modifiers$')]을 부여할 수 있습니다. 이 사업으로 국가 재정에 #n 지출#!을 더하게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_INFRASTRUCTURE_TRIGGER_TT: "#default_text 나라의 어떤 주도 모든 기반 시설 [Concept('concept_modifier','$concept_modifiers$')]를 지니고 있지 않음. 특정 주에 철도 변화 요인을 부여하려면 [GetBuildingType('building_railway').GetName]가 필요합니다.#!"
 MR_CIVIL_ENGINEER_CONSTRUCTION_BUTTON: "건설 사업"
 MR_CIVIL_ENGINEER_CONSTRUCTION_BUTTON_TT: "#T 건설 사업#!\n[concept_tesla_engineer]가 [GetPlayer.GetName]의 [GetBuildingType('building_construction_sector').GetName]  현대화에 주력하도록 합니다.\n\n이를 통해 시간이 흐르면서 건물에 $gaudi_new_construction_methods_modifier_with_tooltip$, $gaudi_faster_construction_methods_modifier_with_tooltip$, $gaudi_efficient_construction_methods_modifier_with_tooltip$의 총 세가지 변화 요인이 부여됩니다.\n\n이 사업으로 국가 재정에 #n 지출#!을 더하게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_CONSTRUCTION_TRIGGER_TT: "#default_text 세가지 [Concept('concept_modifier','$concept_modifiers$')]을 전부 지니고 있지 않은 1단계 이상의 [GetBuildingType('building_construction_sector').GetName]을 하나 이상 보유#!"
 MR_MECHANICAL_ENGINEER_RESEARCH_BUTTON: "기계공학 연구"
 MR_MECHANICAL_ENGINEER_LOCOMOTIVES_BUTTON: "신형 기관차"
 MR_MECHANICAL_ENGINEER_LOCOMOTIVES_BUTTON_TT: "#T 신형 기관차 개발#!\n[concept_tesla_engineer]가 [GetBuildingType('building_railway').GetName] 건물에 보너스를 부여할 수 있는 신형 기관차 개발에 집중하도록 합니다. 개발 과정에서 국가 재정에 #n 지출#!을 더하게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MECHANICAL_ENGINEER_LOCOMOTIVES_TRIGGER_TT: "#default_text 다섯 가지 기관차 [Concept('concept_modifier','$concept_modifiers$')]을 전부 지니고 있지 않은 1단계 이상의 [GetBuildingType('building_railway').GetName]를 하나 이상 보유#!"
 MR_MECHANICAL_ENGINEER_INDUSTRIES_BUTTON: "산업 현대화"
 MR_MECHANICAL_ENGINEER_INDUSTRIES_BUTTON_TT: "#T 산업 현대화#!\n[concept_tesla_engineer]가 건물의 생산 방식 현대화에 주력하도록 합니다. 이것으로 건물의 [concept_throughput], [concept_good_production], [concept_input_mult]에 소량의 보너스를 추가합니다. 이 사업으로 국가 재정에 #n 지출#!을 더하게 됩니다.\n\n건물에 부여되는 변화 요인은 다음과 같습니다.\n$gaudi_building_throughput_add_modifier_with_tooltip$\n$gaudi_building_production_mult_modifier_with_tooltip$\n$gaudi_building_goods_input_mult_modifier_with_tooltip$\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MECHANICAL_ENGINEER_INDUSTRIES_TRIGGER_TT: "#default_text 세가지 [Concept('concept_modifier','$concept_modifiers$')]을 전부 지니고 있지 않은 1단계 이상의 산업 건물을 하나 이상 보유#!"
 MR_MILITARY_ENGINEER_RESEARCH_BUTTON: "군사공학 연구"
 MR_MILITARY_ENGINEER_NAVAL_RESEARCH_BUTTON: "해군 연구"
 MR_MILITARY_ENGINEER_ADVANCED_WEAPONS_BUTTON: "신형 소총"
 MR_MILITARY_ENGINEER_ADVANCED_WEAPONS_BUTTON_TT: "#T 신형 소총 개발#!\n[concept_tesla_engineer]가 신형 소총 개발에 매진하도록 합니다. 이것으로 신형 [concept_mobilization_option]을 사용하거나 그 등급을 올릴 수 있습니다. 이 사업으로 국가 재정에 #n 지출#!을 더하게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MILITARY_ENGINEER_ADVANCED_TANKS_BUTTON: "전차 개량"
 MR_MILITARY_ENGINEER_ADVANCED_TANKS_BUTTON_TT: "#T 신형 전차 개발#!\n[concept_tesla_engineer]가 신형 전차 개발에 매진하도록 합니다. 이것으로 신형 [concept_mobilization_option]을 사용하거나 그 등급을 올릴 수 있습니다. 이 사업으로 국가 재정에 #n 지출#!을 더하게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MILITARY_ENGINEER_ADVANCED_DEFENCE_BUTTON: "신형 진지"
 MR_MILITARY_ENGINEER_ADVANCED_DEFENCE_BUTTON_TT: "#T 신형 진지 개발#!\n[concept_tesla_engineer]가 신형 진지 개발에 매진하도록 합니다. 이것으로 신형 [concept_mobilization_option]을 사용하거나 그 등급을 올릴 수 있습니다. 이 사업으로 국가 재정에 #n 지출#!을 더하게 됩니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_RESEARCH_BUTTON: "전기 공학 연구"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESEARCH_STATION_BUTTON: "지자기학회 가입"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESEARCH_STATION_BUTTON_TT: "#T 지자기 학회 가입#!\n괴팅겐의 지자기학회에 가입하는 것은 지자기 분야 연구를 시작하고 지자기장 관측소를 설립하는데 필수적인 조건입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON: "전신망 구축"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON_TT: "#T 전신망 구축#!\n전신은 국가의 통신망에 혁명을 불러일으키며, 전신망이 부설된 지역의 서비스와 기반 시설을 개량시킵니다. 국가 규모가 클수록 전신망 부설이 더욱 까다로울 수 있습니다. 전신주는 인접한 주에 전신주가 있어야만 설치가 가능합니다. 해외 전신망의 경우 해저 케이블을 설치하기 위해 전력 전신과 전자기파 기술이 모두 필요합니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_RAILWAY_CAPITAL_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 수도에 [GetBuildingType('building_railway').GetName]를 보유함#!"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_RAILWAY_65_PERCENT_TRIGGER_TT: "#default_text [GetPlayer.GetName]에서 전체 주의 #p 65%#!에 [GetBuildingType('building_railway').GetName]를 보유함#!"
 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON: "라디오망 구축"
 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON_TT: "#T 라디오 방송망 구축#!\n엉킨 케이블로 속앓이하는 시대는 끝났습니다! 이제 라디오 기술의 발명으로 안테나를 통해 메시지를 주고받을 수 있게 된 것입니다. 이것으로 뉴스를 주고받을 뿐만 아니라 라디오 프로그램을 제작하는 것도 가능해졌습니다. 물론 그 전에 전국적인 라디오 방송국 송신망을 구축해야 하겠습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON: "철 매장지 탐색"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON_TT: "#T 철 매장지 탐색#!\n지구물리학과 지자기학은 실용적인 쓰임새가 많습니다. 특히 광업에서는 매장 여부를 밝혀낸다는 점에서 큰 이득을 보았습니다. 대기업들은 지구물리학 지식을 활용하여 과거에는 몰랐던 철과 납, 석유 매장지를 찾아냈습니다. 올바른 기술과 지자기 지도가 확보된다면 오늘날의 이론 지식을 생산적으로 활용하는 것도 수월해질 것입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_OBSERVATORY_WITH_MAGNETIC_OBSERVATORY_TRIGGER_TT: "#default_text [GetPlayer.GetName]에 #V 지자기장 관측소#! [concept_production_method]이 설정된 [GetBuildingType('building_verrier_observatory').GetName]를 보유함#!"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_2_BUTTON: "납 매장지 탐색"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_2_BUTTON_TT: "#T 납 매장지 탐색#!\n지구물리학과 지자기학은 실용적인 쓰임새가 많습니다. 특히 광업에서는 매장 여부를 밝혀낸다는 점에서 큰 이득을 보았습니다. 대기업들은 지구물리학 지식을 활용하여 과거에는 몰랐던 철과 납, 석유 매장지를 찾아냈습니다. 올바른 기술과 지자기 지도가 확보된다면 오늘날의 이론 지식을 생산적으로 활용하는 것도 수월해질 것입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_3_BUTTON: "석유 매장지 탐색"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_3_BUTTON_TT: "#T 석유 매장지 탐색#!\n지구물리학과 지자기학은 실용적인 쓰임새가 많습니다. 특히 광업에서는 매장 여부를 밝혀낸다는 점에서 큰 이득을 보았습니다. 대기업들은 지구물리학 지식을 활용하여 과거에는 몰랐던 철과 납, 석유 매장지를 찾아냈습니다. 올바른 기술과 지자기 지도가 확보된다면 오늘날의 이론 지식을 생산적으로 활용하는 것도 수월해질 것입니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
