 MR_CHEMIST_CONGRESS_5_CHEMISTS_TRIGGER_TT: "#default_text [concept_mendelejew_chemist]를 보유한 국가가 #V 5개국#! 이상#!"
 MR_CHEMIST_CONGRESS_ELEMENTS_TRIGGER_TT: "#default_text 전 세계에서 확인된 [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]의 수가 #V 60원소 이상#! (현재까지 분리된 수는 [GetGlobalVariable('mendelejew_isolated_elements_global_number_var').GetValue|+0]원소)#!"
 MR_MOUNT_SKELETON_ACTIVE_TT: "#T 공룡 골격 조립#!\n#p 현재 고생물학자가 공룡 골격 조립을 진행하고 있습니다.#!\n우리 [concept_dubois_paleontologist]는 같은 대륙에서 나온 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] 5점으로 새로운 [concept_dubois_dinosaur_skeleton] 1점을 조립할 수 있습니다."
 MR_REMOUNT_SKELETON_ACTIVE_TT: "#T 공룡 골격 재조립#!\n#p 현재 고생물학자가 공룡 골격 재조립을 진행하고 있습니다.#!\n완벽하지 못한 상태의 [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')]을 보유하고 있다면 [concept_dubois_paleontologist]에게 재조립을 맡길 수 있습니다. 고생물학자가 경험 많은 상태라면 골격의 재조립도 더 나은 결과물로 나오게 됩니다."
 MR_UPPER_EGYPT_EXPEDITION_ACTIVE_TT: "#T 왕가의 계곡으로 탐사대 파견#!\n#p 현재 고고학자가 왕가의 계곡으로 탐사를 진행하고 있습니다. #!\n고대 수도 테베와 왕가의 계곡이 있는 상이집트는 이집트학의 성지로 불립니다. 이 지역의 탐사 허가를 받아 이집트 유물을 탐색해야 합니다."
 MR_LOWER_EGYPT_EXPEDITION_ACTIVE_TT: "#T 피라미드군으로 탐사대 파견#!\n#p 현재 고고학자가 피라미드군으로 탐사를 진행하고 있습니다. #!\n이집트의 피라미드는 태초부터 인류를 매혹 속에 빠뜨렸습니다. 하이집트의 모래 속에는 또다른 무덤과 사원, 도시까지 제 모습을 다시 드러내기만을 기다리고 있다고 전해집니다."
 MR_BABYLONIA_EXPEDITION_ACTIVE_TT: "#T 바빌로니아로 탐사대 파견#!\n#p 현재 고고학자가 바빌로니아로 탐사를 진행하고 있습니다. #!\n메소포타미아 남부 지역에 해당되는 바빌로니아는 한때 강력했던 도시국가 바빌론의 명칭을 따왔습니다. 이 지역은 귀중한 고고학적 유물이 끊임없이 발견되는 '문명의 요람'으로 여겨집니다. 분명 박물관에 소장되어야 마땅할 것입니다."
 MR_ASSYRIA_EXPEDITION_ACTIVE_TT: "#T 아시리아로 탐사대 파견#!\n#p 현재 고고학자가 아시리아로 탐사를 진행하고 있습니다.#!\n아시리아는 메소포타미아 북부 지역을 가리키는 말로 아수르와 니네베의 두 대도시가 자리해 있었습니다. 이 지역에 대한 드문 지식은 그 출처를 따지면 성경으로 거슬러 올라가는 경우가 아직도 있지만, 그보다 더 믿을 만한 역사적 단서가 존재할지도 모릅니다."
 MR_ARGOLIS_EXPEDITION_ACTIVE_TT: "#T 아르골리스로 탐사대 파견#!\n#p 현재 고고학자가 아르골리스로 탐사를 진행하고 있습니다. #!\n트로이가 발견된 후, 회의적이던 학자들조차 고대 그리스 신화가 단순한 동화 그 이상이라는 사실을 깨닫게 되었습니다. 청동기 시대 도시의 유적은 오늘날까지 아르고리스에 있다고 전해지는데, 그 중 가장 잘 알려진 곳이 미케네입니다. 우리도 그 사실을 우리 손으로 입증해야 합니다."
 MR_CRETE_EXPEDITION_ACTIVE_TT: "#T 크레타로 탐사대 파견#!\n#p 현재 고고학자가 크레타로 탐사를 진행하고 있습니다.#!\n전설 속의 미노스 왕은 크레타섬 전역을 다스렸다고 전해집니다. 트로이나 미케네처럼 이 설화에도 실체가 있는 것으로 보입니다. 신화로만 여겨졌던 미노아 문명의 유물이 섬에서 점차 발견되고 있기 때문입니다. 우리도 그 유물을 확보할 필요가 있겠습니다."
 MR_YUCATAN_EXPEDITION_ACTIVE_TT: "#T 유카탄으로 탐사대 파견#!\n#p 현재 고고학자가 유카탄으로 탐사를 진행하고 있습니다.#!\n정글 숲 한가운데 미지의 거대 도시가 존재한다는 목격담이 늘고 있습니다. 한층 더 깊이 조사하여 유카탄 반도에 고고학 탐사대를 파견해야겠습니다."
 MR_PERU_EXPEDITION_ACTIVE_TT: "#T 페루로 탐사대 파견#!\n#p 현재 고고학자가 페루로 탐사를 진행하고 있습니다.#!\n페루 상공을 비행하다 안데스 산맥에 이상한 요새와 성벽 유적이 세워진 것을 목격했다는 비행사들이 있습니다. 아무래도 스페인 사람들이 잉카의 문화 유산을 완전히 파괴하진 못했나 봅니다. 원주민이 저항하던 일부 마을은 오늘날까지도 발견된 적이 없습니다."
 MR_FOSSIL_IDENTIFICATION_ACTIVE_TT: "#T 화석 식별#!\n#p  현재 인류학자가 화석 식별을 진행하고 있습니다.#!\n[concept_andersson_anthropologist]는 오랜 세월이 흐른 미지의 뼈를 분석하고 그것이 인류와 선인류의 어느 종에 속하는지를 구분하는 능력을 갖추고 있습니다. 뼈 3점을 모아 동일한 종으로 식별하는 데 성공한다면, 해당 종의 체계적인 분류 작업도 성공한 것입니다. 뼈를 정확하게 식별하는 데 소요되는 시간은 인류학자의 경험치에 달려 있습니다."
 MR_CONDUCTING_ACTIVE_TT: "#p 현재 작곡가가 오페라 시즌 공연에 나서고 있습니다.#!\n[Localize('concept_elgar_conducting_desc')]"
 MR_MUSIC_TOUR_ACTIVE_TT: "#p 현재 작곡가가 순회 공연에 나서고 있습니다.#!\n[Localize('concept_elgar_musical_tour_desc')]"
 MR_NEWSPAPER_NOVEL_ACTIVE_TT: "#T 신문 연재 소설 집필#!\n#p 현재 작가가 신문 연재 소설을 집필하고 있습니다.#!\n19세기에는 신문 연재가 수많은 작가들에게 안정된 수입과 국민적 명성을 보장해 주었습니다. 톨스토이나 도스토옙스키, 플로베르, 뒤마와 같은 당대 유명 작가들 가운데 다수는 단행본 출간에 앞서 지면에 연재 소설로 실어 발표하였습니다."
 MR_READNG_TOUR_ACTIVE_TT: "#T 작가의 순회 낭독회 파견#!\n#p 현재 작가가 순회 낭독회에 나서하고 있습니다.#!\n세계적으로 인정받는 작가가 외국 출판사와의 교류를 이어간다면 순회 낭독회를 통해 자국의 명성을 높이는 데 한몫할 수 있습니다. 이것으로 상호 관계 증진 뿐만 아니라 작가 본인의 명성을 높이는 데에도 보탬이 될 것입니다."
 MR_PAINTER_TRIP_ACTIVE_TT: "#T 유학#!\n#p 현재 화가가 유학 중에 있습니다.#!\n[concept_klimt_painter_trip]을 통해 화가는 이전에는 알지 못했던 미술 양식을 익히고 이를 통해 해마다 [concept_klimt_painting_tradition]을 쌓게 됩니다. 또한 해외에 있는 [concept_artists_center_of_arts]에 머무는 동안 여러 긍정적, 부정적 특성을 새로 지니게 됩니다."
 MR_MOUNTAIN_EXPEDITION_ACTIVE_TT: "#T 산악 원정#!\n#p 현재 산악 원정이 진행되고 있습니다.#!\n1786년 몽블랑산 등정으로 지구상의 최고봉들을 정복하려는 새로운 시대가 열리게 되었습니다. 이러한 흐름은 19세기와 20세기에 걸쳐 더욱 박차를 가하게 되었습니다. 우리 영토 내에 아직 등정이 이루어지지 못한 산맥이 있다면, 적당한 기술을 갖춘 유능한 장군에게 등정을 맡길 수 있습니다."
 MR_AIR_COMBAT_MISSION_ACTIVE_TT: "#T 공중전 임무#!\n#p  현재 비행사가 공중전 임무에 나서고 있습니다.#!"
 MR_AIRCRAFT_PARADE_ACTIVE_TT: "#T 항공기 퍼레이드#!\n#p 현재 비행사가 항공기 퍼레이드에 참여하고 있습니다.#!"
 academics_academy_progress_observatory_tt_loc: "\n[concept_tesla_engineer], [concept_mendelejew_chemist], [concept_verrier_astronomer]를 #V 양성#!하고 [GetBuildingType('building_verrier_observatory').GetName]를 보유하면 #p 1점#! "
 academics_academy_progress_observatory_inactive_tt_loc: "\n#default_text [concept_tesla_engineer], [concept_mendelejew_chemist], [concept_verrier_astronomer]를 양성하고 [GetBuildingType('building_verrier_observatory').GetName]를 보유하면 1점#! "
 MR_CHEMIST_CONGRESS_BUTTON_TT: "#T 화학 학술회의#!\n카를스루에 회의는 근대 화학을 다룬 최초의 국제 심포지엄으로 기록되어 있습니다. 1860년 9월 3일부터 9월 5일까지 카를스루허의 스텐데하우스에서 개최되었으며, 아우구스트 케쿨레 폰 슈트라도니츠, 카를레스 아돌프 부르츠, 카를 벨트지엔이 주도하였습니다. 이 회의에서는 화합물의 명명법과 화학식의 표현, 화합물의 원자량과 분자량 문제가 의제로 포함되었습니다. 오늘날 이 회의는 세계 최초의 국제 화학 학술대회로 평가받습니다.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
