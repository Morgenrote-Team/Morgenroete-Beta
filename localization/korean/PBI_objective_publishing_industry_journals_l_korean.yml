l_korean:
 pbi_je_objective_the_power_of_photography: "사진의 힘"
 pbi_je_objective_the_power_of_photography_status: "국내 사진작가 후원"
 pbi_je_objective_the_power_of_photography_reason: "'고쳐야 할 것들을 보여주고 싶었습니다.\n감사해야 할 것들을 보여주고 싶었습니다.'\n루이스 하인"
 pbi_je_objective_bestseller: "인기 신문 연재소설"
 pbi_je_objective_bestseller_reason: "'잘 알려진 바, 투기 행위는 판매되는 상품의 정신적 가치를 거의 내지는 전혀 고려하지 않습니다. 상품이 잘 팔리고 사업이 잘 되기만 한다면, 그것이 공중 보건에 도움이 되든 해가 되든 상관하지 않는 것입니다. 투기는 본질적으로 맹목적이고 무감각한 것으로서 중국인에게 아편을 팔고 프랑스인에게 소설을 파는 것과 같습니다.'\n- 프랑스 하원의원"
 pbi_je_objective_bestseller_flag_character_in_writing: "소설 연재를 집필 중인 [THIS.GetCountry.GetName] [concept_character]이 있음"
