 pbi_je_objective_from_the_battlefield_reason: "'오전 11시 35분, 그 피비린내 나는 모스크바군의 대포 앞에, 죽은 자와 죽어가는 자를 제외하고 영국군은 한 명도 남아 있지 않았다…'\n- 윌리엄 하워드 러셀 (경기병대의 돌격)"
