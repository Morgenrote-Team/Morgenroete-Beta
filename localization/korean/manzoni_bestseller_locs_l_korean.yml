 manzoni_writer_crime_book_bestseller_flavor_12_loc: "해가 저물 무렵 거친 서부의 풍경 위로 어둠이 깔리고, 먼지 속에서 악명 높은 산적들이 모습을 드러낸다. 저들의 이름은 두려움과 경외심이 뒤섞인 귓속말로 전해진다. 흥미진진한 이야기 속에서 독자들은 악명 높은 무법자들과 함께 질주하고, 무법천지의 시대를 휘어잡았던 아드레날린 넘치는 결투와 대담한 탈주를 생생하게 경험할 것이다."
