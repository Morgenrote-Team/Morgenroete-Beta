 manzoni_writer_crime_book_bestseller_title_12_loc: "\"Highwaymen of The Wild West\""
 manzoni_writer_crime_book_bestseller_flavor_12_loc: "As the sun sets over the rugged landscapes of the Wild West, the shadowy figures of highwaymen emerge from the dust, their names whispered in fear and admiration. Within the pages of this gripping account, readers will ride alongside these notorious outlaws, experiencing firsthand the adrenaline-fueled showdowns and daring escapes that defined an era of lawlessness."
