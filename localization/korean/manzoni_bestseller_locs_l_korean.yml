 manzoni_writer_mystery_book_bestseller_title_12_loc: "영혼 없는 선원들의 조용한 판잣집"
 manzoni_writer_mystery_book_bestseller_flavor_12_loc: "일라이어스 업튼 선장은 튼튼한 배의 갑판에 서서 이마를 찡그리며 어두운 수평선을 응시하고 깊은 생각에 잠겼다. 섬뜩한 정적이 감돌고 선체에 부딪히는 파도 소리만이 그 정적을 희미하게 깨뜨리고 있었다. 선원들은 두려움에 질린 얼굴로 필사적으로 움직이며, 무언가 손짓하며 부르는 소리에 이끌리는 듯한 이들을 막으려 애를 썼다.\n\n카리브해 깊숙한 곳, 옛 전승의 속삭임과 잊혀진 저주의 그림자 속에는 형언할 수 없는 불가사의가 숨겨져 있다. 사라진 영혼과 유령의 출현에 대한 이야기는 수백 년 동안 이 바다를 괴롭혀 왔지만, 그 가운데서도 가장 섬뜩한 것은 무서운 가락이 아무것도 모르는 선원들을 파멸로 끌고 간다는 '침묵의 뱃노래'라는 전설이다.\n\n업튼 선장은 어둠의 심연으로 더욱 깊이 들어갈수록, 현실의 근간을 뒤흔들 비밀들을 발견하게 된다. 진실에 한걸음 다가가면서 본인보다 앞서 이곳에 왔던 자들이 겪은 운명에 빠질 위기에 처한다. 산 자와 죽은 자의 경계가 모호해지는 영혼 없는 뱃사람의 영역에서, 오직 제일 용감한 영혼만이 파도 아래 도사리는 어둠에 맞설 용기를 가지기 때문이다."
