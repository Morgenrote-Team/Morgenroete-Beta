 manzoni_writer_mystery_book_bestseller_title_2_loc: "\"The Crimson Dagger\""
 manzoni_writer_mystery_book_bestseller_flavor_2_loc: "In the moonlit shadows of the night, a crimson glimmer pierces the darkness—a harbinger of terror and despair. 'The Crimson Dagger' whispers its siren call, luring unsuspecting souls into its deadly embrace. Forged in the fires of ancient sorcery, this cursed blade thirsts for blood, its malevolent power corrupting the hearts of those who dare to wield it. Venture into the depths of madness and obsession in this chilling tale of supernatural horror and the dark allure of power."
