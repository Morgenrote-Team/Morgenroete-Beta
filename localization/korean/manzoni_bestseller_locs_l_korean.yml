 manzoni_bestseller_doyle_arthur_conan_1_t: "[ROOT.GetCharacter.GetFullName]의 《주홍색 연구》"
 manzoni_bestseller_doyle_arthur_conan_1_d: "A detective solving crimes by applying logic and his mind. This Sherlock Holmes is a fascinating character. What an interesting concept that Arthur Conan Doyle came up with."
 manzoni_bestseller_doyle_arthur_conan_1_f: "\"It was easier to know it than to explain why I know it. If you were asked to prove that two and two made four, you might find some difficulty, and yet you are quite sure of the fact.\"\n- Arthur Conan Doyle, A Study in Scarlet"