 manzoni_writer_juvenile_book_bestseller_flavor_2_loc: "안개 낀 스코틀랜드 고원에 활기 넘치고 발랄한 아가씨가 살고 있다. 피오나와 함께 그 고장의 구릉과 옛 성을 넘나드는 엉뚱한 모험을 떠나보시길. 장난꾸러기 요정을 만나고 어설픈 거인을 골탕먹이는 것처럼 각각의 이야기가 웃음과 우정, 그리고 조금의 마법으로 가득한 즐거운 여정이다. 피오나의 모험이 남녀노소 독자 모두의 마음을 사로잡는 《발랄한 스코틀랜드 아가씨 이야기》에 푹 빠져보시라."
