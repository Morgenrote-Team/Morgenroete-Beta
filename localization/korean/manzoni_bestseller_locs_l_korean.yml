 manzoni_writer_literary_fiction_book_bestseller_flavor_1_loc: "이 이야기는 한때 철권통치와 엄격한 공포 정치로 통치하며 그 누구도 부와 행복을 누리지 못했던 왕족의 시련을 그린다. 이들은 사소한 이유로 백성들에게 세금을 부과하고, 불복종은 물론 별 이유 없이도 가혹하게 처벌했다. 폭정은 제국을 번영하고 강력했던 과거에서 기아와 전쟁으로 피폐해진 가난과 역병으로 물들였다.\n\n그런데도 바라는 것은 더욱 늘어났고, 이에 제국 백성들은 반란과 봉기를 일으켜 결국 피비린내 나는 혁명으로 신 정부를 수립하고 왕족들을 붙잡았다.\n\n이제 남은 문제는 그들을 어떻게 처리해야 하는가의 문제. 어떤 이들은 즉시 참수형을 원했고, 또 어떤 이들은 장기간의 형벌을 논한다.\n\n짤막한 논란 끝에, 그 시절 권력을 휘둘렀던 자들을 끔찍한 작업장으로 보내 남은 생을 누리도록 하였다.\n\n이것으로 정의의 실현과 복수, 그리고 한때 영광스러웠던 임페리아 왕국의 부활에 대한 이야기가 시작된다!"
