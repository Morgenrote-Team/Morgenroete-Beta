 manzoni_writer_crime_book_bestseller_title_1_loc: "미친 주방장 사건"
 manzoni_writer_crime_book_bestseller_flavor_1_loc: "위험이 도사리는 드넓은 바다에서, 선박의 주방장은 자신의 주방 왕국에서 절대적인 왕권을 누린다. 하지만 연이은 실종 사건으로 선원들은 큰 충격을 받고, 유일하게 생사를 좌우할 권력을 쥔 사람에게 의심의 눈초리가 쏠린다.\n\n\"닭고기가 너무 건조해서 바닷물이라도 먹고 싶군\" 하고 뒤돌아서는 선원, 그 순간 그의 운명은 결정되었다. 주방장은 식칼 가는 소리와 함께 섬뜩한 웃음을 지으며 악의에 찬 목소리로 말했다. \"걱정 마쇼, 선장. 내일 아침에는 왕족처럼 호화로운 만찬을 맛보게 될 테니까.\"\n\n대담한 주방장과 함께 망망대해에서 벌어지는 기만과 배신의 폭풍 속으로 뛰어들어 보십시오. 스릴 넘치는 살인극 〈미친 요리사 사건〉으로 모험에 함께하십시오."
