 manzoni_writer_science_fiction_book_bestseller_flavor_1_loc: "Story of a boat that can travel to the stars and its amazing captain and crew, who face unimaginable challenges in places where no man has gone before. They sail grand distances in the darkness of space, guided by starlight and their wondrous navigation devices of tomorrow. They explore distant planets, both wondrous and dangerous—mesmerizingly beautiful and unbelievably hazardous. Find out in the pages of this book what challenges await them, what they will discover beyond the realm of man, and who they might come across on their dangerous journey through the stars!"
