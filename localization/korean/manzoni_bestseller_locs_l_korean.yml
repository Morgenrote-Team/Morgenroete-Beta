 manzoni_writer_mystery_book_bestseller_title_2_loc: "진홍색 단검"
 manzoni_writer_mystery_book_bestseller_flavor_2_loc: "달빛이 비추는 밤, 붉은 섬광이 어둠을 가르며 공포와 절망의 전조를 알린다. 《진홍색 단검》은 사이렌처럼 속삭이며 순진한 영혼을 품속에 이끌어 목숨을 앗아간다. 고대 마법의 불꽃 속에서 벼린 이 검은 저주에 걸려 피에 굶주려 있으며, 감히 휘두르는 자들의 마음을 타락시키는 사악한 힘을 지니고 있다. 오싹한 초자연적 공포와 위력의 어두운 유혹 속에서 광기와 집착의 심연으로 빠져들어 보시라."
