 manzoni_writer_mystery_book_bestseller_title_12_loc: "영혼 없는 선원들의 조용한 판잣집"
 manzoni_writer_mystery_book_bestseller_flavor_12_loc: "Captain Elyas Upton stood on the deck of his sturdy ship, his brow furrowed in deep concentration as he gazed into the dark horizon. The air was thick with an eerie silence, broken only by the faint sound of lapping waves against the hull. His crewmen moved about frantically, their faces etched with fear as they tried to restrain those who seemed drawn to the beckoning call.\n\nIn the depths of the Caribbean, amidst the whispers of ancient legends and the shadows of forgotten curses, lies a mystery that defies explanation. Tales of missing souls and ghostly apparitions have plagued these waters for centuries, but none as chilling as the legend of the Silent Shanty—a haunting melody that lures unsuspecting sailors to their doom.\n\nAs Captain Upton delves deeper into the heart of darkness, he uncovers secrets that threaten to unravel the very fabric of reality. With each step closer to the truth, he risks losing himself to the same fate that befell those who came before him. For in the realm of the Soulless Seaman, where the line between the living and the dead blurs, only the bravest souls will dare to confront the darkness that lurks beneath the waves."
