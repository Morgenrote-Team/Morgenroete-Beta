 manzoni_writer_crime_book_bestseller_title_6_loc: "블랙우드 미스터리와 실종 사건"
 manzoni_writer_crime_book_bestseller_flavor_6_loc: "가스등 켜진 블랙우드의 좁은 골목길에서 영문을 알 수 없는 실종 사건이 연이어 발생하며 마을 전체를 뒤흔드는데. 모든 것이 겉보기와 다르고, 진실은 그림자 속에 숨겨진 이 오싹한 미스터리의 심연 속으로 뛰어들어 보십시오."
 manzoni_writer_crime_book_bestseller_title_7_loc: "도둑맞은 망령의 수수께끼"
 manzoni_writer_crime_book_bestseller_flavor_7_loc: ""
 manzoni_writer_crime_book_bestseller_title_8_loc: "베니수에프 바자의 사생아 도적단"
 manzoni_writer_crime_book_bestseller_flavor_8_loc: "뜨거운 태양이 내리쬐고 상인들의 외침이 북적이는 부즈두르의 먼지 쌓인 거리에서, 한 무리의 부랑자들이 스스로의 운명을 개척하려 분투한다. 부유한 셰이크의 버림받은 아들로 태어났음에도 조상의 땅에서 쫓겨나 척박한 사막에서 홀로 살아남아야 했던 그들은 '부즈두르 시장의 사생아 도적단'이라 불렸다.\n\n굶주림과 배신의 아픔에 사로잡힌 그들은 북적이는 시장을 오가는 상인들을 약탈하며 범죄의 길로 들어선다. 허나 조금씩 대담해지는 마음과 커져가는 야망, 자신들에게 단순한 절도와 도둑질 너머의 운명이 있음을 깨닫는다. 같은 혈통과 더불어 자신들을 버린 아버지에 대한 복수심으로 뭉친 그들은 권력의 정점에 오르겠단 음모를 꾸미고, 마땅히 자신들의 것이어야 할 것을 되찾겠다고 맹세한다."
