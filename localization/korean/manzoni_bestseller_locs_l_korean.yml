 manzoni_bestseller_doyle_arthur_conan_1_t: "[ROOT.GetCharacter.GetFullName]의 《주홍색 연구》"
 manzoni_bestseller_doyle_arthur_conan_1_d: "논리와 추리력으로 범죄를 해결하는 탐정. 이름하여 셜록 홈즈는 참으로 매력적인 등장 인물이다. 아서 코난 도일이 생각해낸 상당히 흥미로운 설정이 아닐 수 없다."
 manzoni_bestseller_doyle_arthur_conan_1_f: "\"어떻게 아는지 설명하는 것보다 그냥 알고 있는 것이 쉬운 법이다. 2 더하기 2는 4라는 것을 증명해 보라 하면 어려움을 느낄지 모르나, 그렇다고 그것이 사실이란 것은 분명하다.\"\n- 아서 코난 도일의 《주홍색 연구》"