 manzoni_writer_science_fiction_book_bestseller_flavor_1_loc: "별까지 항해할 수 있는 배와 놀라운 선장, 그리고 선원들의 이야기. 그들은 인간의 발길이 닿지 않은 미지의 공간에서 헤아리기 어려운 역경에 맞서 싸운다. 별빛과 미래의 경이로운 항해 장치에 의지하여 우주의 어둠 속을 항해하는 그들. 경이롭지만 위험하고, 숨 막힐 듯 아름답지만 동시에 믿을 수 없을 만큼 위험한 행성들을 탐험한다. 그들이 어떤 도전에 직면하게 될지, 인간의 영역 너머에서 무엇을 발견하게 될지, 그리고 별들을 가로지르는 위험한 여정에서 누구를 만나게 될지 이 책을 통해 알아보시라!"
