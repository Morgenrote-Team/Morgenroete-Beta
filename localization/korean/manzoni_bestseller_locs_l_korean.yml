 manzoni_writer_crime_book_bestseller_title_12_loc: "거친 서부의 노상강도"
 manzoni_writer_crime_book_bestseller_flavor_12_loc: "해가 저물 무렵 거친 서부의 풍경 위로 어둠이 깔리고, 먼지 속에서 악명 높은 산적들이 모습을 드러낸다. 저들의 이름은 두려움과 경외심이 뒤섞인 귓속말로 전해진다. 흥미진진한 이야기 속에서 독자들은 악명 높은 무법자들과 함께 질주하고, 무법천지의 시대를 휘어잡았던 아드레날린 넘치는 결투와 대담한 탈주를 생생하게 경험할 것이다."
 manzoni_writer_crime_book_bestseller_title_13_loc: "알 수 없는 에메랄드 목걸이"
 manzoni_writer_crime_book_bestseller_flavor_13_loc: ""
 manzoni_writer_crime_book_bestseller_title_14_loc: "아편굴 거지의 죽음"
 manzoni_writer_crime_book_bestseller_flavor_14_loc: "고위층의 호화 저택에서 빈민층의 누추한 판잣집에 이르기까지, 아편굴은 악덕과 미덕이 뒤섞인 곳이다.《아편굴 거지의 죽음》은 독자들을 거친 지하세계의 이면으로 이끌어, 절망 속에서 흐릿해지는 옳고 그름의 경계를 보여준다. 범죄와 연민, 광기에 휩싸인 세상 속에서 정의를 찾아가는 여정 속에서 손에 땀을 쥐게 하는 이야기에 빠져들 준비에 나서보라."
