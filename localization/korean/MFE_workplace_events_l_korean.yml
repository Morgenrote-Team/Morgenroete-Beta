l_korean:
 MFE_workplace_events.1.t:0 "광산 사고"
 MFE_workplace_events.1.d:0 "[SCOPE.sState('mine_state').GetName] 광산에서 끔찍한 사고가 발생했다. [SCOPE.sState('mine_state').GetName] 광산의 폭발 사고로 두 명이 사망했다. 이런 작은 사고는 자주 일어나지만 이번 사고는... 달랐다. 지역 노동자들은 작업 환경이 개선될 때까지 작업을 거부하고 있다."
 MFE_workplace_events.1.f:0 "내 두 눈으로 직접 봤다. 그 둘은 산산조각 나고 사람이 상상할 수 있는 가장 끔찍한 방식으로 으스러졌다. 우리는 이 광산에서 다시는 일하지 않을 것이다, 여기는 안전하지 않다."
 MFE_workplace_events.1.a:0 "정말 안타깝다. 즉시 업무에 복귀시켜라."
 MFE_workplace_events.1.b:0 "광산에서 일하는 사람들도 우리와 같은 인간이다!"
 MFE_workplace_events.1.c:0 "애초에 채굴을 시작하지 말았어야 했다"
 MFE_workplace_events.2.t:0 "탄광에서 온 소녀"
 MFE_workplace_events.2.d:0 "석탄 가득 실은 수레는 오랜 세월 동안 탄광에서 고된 노동으로 연약하고 지친 그 소녀의 몸에 무거운 짐이었음이 틀림없으며 제 발 하나 가누지 못하게 되었을 것이다. 그렇게 저 어둠 속, 끝없이 깊은 갱도로 소녀는 미끄러져 떨어졌다.\n\n우리나라의 한 지역에 있는 탄광에서 어린 소녀 하나가 또 탄광 사고로 목숨을 잃는 비극적인 사건에 전국민이 관심을 모으고 있다."
 MFE_workplace_events.2.f:0 "어떻게 이딴 식으로 대우받을 수 있단 말인가, 우리가 사람도 아니라는 말인가."
 MFE_workplace_events.2.a:0 "그렇게 가녀린 소녀가... 우리 스스로 반성할 필요가 있소."
 MFE_workplace_events.2.tt:0 "[SCOPE.sState('mining_state').GetName] 지역 주민들이 불길한 음모를 꾸미게 됩니다..."
 MFE_workplace_events.3.t:0 "바닥난 생산량"
 MFE_workplace_events.3.d:0 "우리 군수 공장 중 한 곳이 지난 석 달 간 생산량이 심각하게 떨어지는 현상을 겪었으나, 투자자와 지역 산업계 거물들의 우려를 살까 함구했던 것으로 드러났다. 국가 비축 물자로 공장의 손실을 메우면 지역 일자리를 지킨다는 명목은 세울 수 있기 때문이다."
 MFE_workplace_events.3.f:0 "발포는 하라면서 뭘로 발포해야 하는지는 신경도 안 쓰다니. 이딴 식으로 우리 군이 어떻게 싸우겠소?!"
 MFE_workplace_events.3.a:0 "할 수 있는 게 아무것도 없다."
 MFE_workplace_events.3.b:0 "예산 지원을 좀 해 주면 뭐라도 되지 않을까."
 MFE_workplace_events.4.t:0 "도둑맞은 차 공장"
 MFE_workplace_events.4.d:0 "우리 차 생산지 중 한 곳의 중앙 계량소가 무장 강도의 습격을 당했다. 일부 지역 주민들은 경제적 어려움에 시달리던 농민들이 지역 유통업체와 소매업체들의 이윤 깎기에 지쳐 계량소를 털었을지 모른다고 입을 모으고 있다. 원인이 무엇이든 우리가 이 상황에 손 걷고 나서야 한다."
 MFE_workplace_events.4.f:0 "강도들은 한밤중에 들이닥쳐 경비대를 살해하고 우리가 가진 모든 녹차 수확품을 전부 털어갔다. 홍차는 남겨뒀지만 말이다. 어차피 홍차를 마시는 사람은 없으니까."
 MFE_workplace_events.4.b:0 "차 한잔이라면 전세계를 정복할 수도 있어! 반드시 범인을 찾아낸다."
 MFE_workplace_events.4.ttt:0 "강도 사건의 조사에 나섭니다."
 MFE_workplace_events.5.t:0 "오래된 통조림"
 MFE_workplace_events.5.d:0 "병참장군이 [SCOPE.sState('canning_state').GetName] 지역의 군수품 창고에서 존재를 까맣게 잊고 있던 통조림 더미를 발견했다고 보고했다. 내용물은 몇 년이 지났지만 여전히 먹을 수 있는 상태였다. 15톤에 달하는 이 통조림을 어떻게 처리해야 할까?"
 MFE_workplace_events.5.f:0 "통조림은 먼지가 1미터 두께로 쌓인 구석에서 발견했습니다. 식용 여부를 확인하기 위해 쥐에게 먹이로 줬더니 먹더군요. '쥐가 먹는다면 노동자도 먹는다'란 말이 있습죠."
 MFE_workplace_events.5.a:0 "역겨운걸."
 MFE_workplace_events.5.b:0 "저런 개밥도 먹어줄 사람이 분명 있겠지!"
 MFE_workplace_events.5.tt:0 "[SCOPE.sState('canning_state').GetName]의 삶의 질이 감소합니다."
 MFE_workplace_events.6.t:0 "소열병"
 MFE_workplace_events.6.d:0 "[SCOPE.sState('bovine_state').GetName] 지역의 가축들 사이에 괴질이 발병하여 떼죽음을 당하고 있다는 소식이다. 현지 수의사는 질병의 전염성이 강하다며 확산 방지를 위해 할 수 있는 모든 조치를 다하며 지역 곳곳을 누비고 있다. 질병 자체는 결국 자취를 감추겠지만, 파산에 이른 농가가 수백에 달하는 만큼 그들에 대한 보상 문제는 여전히 해결해야 할 숙제로 남아 있다."
 MFE_workplace_events.6.f:0 "어젯밤 벌판에 나가 보니 소들의 몸에 초록색 구멍이 생기고 이상한 보라색 고름이 흘러나오고 있었단 말이오. 얘들 갖다 팔면 꽤나 받는데 이제는 [GetPopType('peasants').GetName]에게라도 팔아서 고약한 냄새를 못 맡게라도 해야지 어쩌겠소."
 MFE_workplace_events.6.a:0 "필요한 만큼 모든 지원을 해 주시오!"
 MFE_workplace_events.6.b:0 "별달리 지원해 줄 도리가 없군."
 MFE_workplace_events.6.c:0 "인접 주와 협의해서 어떤 지원을 해줄 수 있는지 검토해 보겠소."
 MFE_workplace_events.7.t:0 "비단 농장의 떼죽음"
 MFE_workplace_events.7.d:0 "누에고치가 말라 죽어가고 남은 실마저 제대로 굳어지지 않아 산들바람에도 풀려버리고 있다. 비단 농장에 무언가 심각하게 돌아가고 있지만 국내 최고의 화학자들도 병해에 어떻게 대처해야 할지 갈피를 못 잡고 있는 상황이다. 지역 양잠 농가에서는 분노하며 정부의 대책을 촉구하고 있다."
 MFE_workplace_events.7.f:0 "이런 일은 듣도 보도 못했고 모든 노력이 허사로 돌아가고 있다. 떼죽음을 당하는 바람에 농부들도 희망을 잃었다. 누에고치가 없으면 일감도 없고, 일감도 없으면 살아갈 겨를도 없다고 저들은 입을 모아 말한다."
 MFE_workplace_events.7.a:0 "[SCOPE.sCharacter('guilty_silk_field_owner').GetFullName](이)가 최선을 다 했을 뿐이오."
 MFE_workplace_events.7.b:0 "[SCOPE.sCharacter('guilty_silk_field_owner').GetFullName](이)가 무지에 대한 대가를 치를 것이다."
 MFE_workplace_events.7.tt:0 "[SCOPE.sCharacter('guilty_silk_field_owner').GetFullName](을)를 체포하여 직위에서 물러나도록 할 것이다."
 MFE_workplace_events.8.t:0 "철혈"
 MFE_workplace_events.8.d:0 "\"작금의 거대한 문제 앞에 이루어져야 할 결단은 연설과 다수결이 아닌, 철과 피로써 이루어져야 할 것이외다.\"\n- 오토 폰 비스마르크\n\n[SCOPE.sState('iron_state').GetName] 철광산에서 매장량이 많은 광맥이 새로 발견되었다. 이 광맥은 광석은 풍부하지만 지금의 채굴 기술로는 도달하기 어려운 위험한 깊이에 자리해 있다. 채굴을 시도하였음에도 그 과정에서 많은 사상자와 출혈을 일으키게 된 것이다. 거대한 철광석 갱도 속에서 여러 광부들이 목숨을 저버렸지만, 이제는 그전까지 불가능하다 여겼던 속도로 철광석을 채굴할 수 있게 되었다."
 MFE_workplace_events.8.f:0 "이처럼 생산량을 네 배로 늘릴 만큼 거대한 철광맥을 본 적이 없다. 그래서 인부 몇 명을 보내 현장을 조사하고 채굴 방법을 강구하도록 하였다. 현장에 도착하기는 했으나 10명 중 1명만이 간신히 살아 돌아올 만큼 환경이 참혹했다."
 MFE_workplace_events.8.a:0 "며칠 동안 휴가를 주고 구호품을 보내주시오"
 MFE_workplace_events.8.b:0 "그깟 몇 명 죽은 게 무슨 대수라고... 다시 가서 일하시오!"
 MFE_workplace_events.9.t:0 "광산의 비극"
 MFE_workplace_events.9.d:0 "오늘은 우리 노동자들에게 또 다른 비극적인 날로 기록되었다. [SCOPE.sState('iron_tragedy_state')] 지역의 철 광산에서 사고가 발생하여 수많은 목숨이 스러져갔다는 소식이다. 여러 노동자가 부상을 당했고 일부는 아직도 실종 상태인 것으로 전해졌다. 보고에 따르면 광산 내부의 지지대가 무너지면서 사고가 벌어졌다. 이번 사건은 우리나라 광산의 작업 환경에 대한 국민들의 논쟁을 불러일으킬 것으로 전망된다."
 MFE_workplace_events.9.f:0 "어떻게 이런 일이..."
 MFE_workplace_events.9.a:0 "이런 빌어먹을 자본가들 같으니.."
 MFE_workplace_events.9.b:0 "사고는 벌어졌으니 최대한 인부들을 지원해줘야겠소."
 MFE_workplace_events.9.c:0 "아무 근심 없이 밭일이나 하던 시절로 돌아갈 순 없단 말인가."
 MFE_workplace_events.10.t:0 "목화 품질 문제"
 MFE_workplace_events.10.d:0 "[SCOPE.sState('cotton_state').GetName] 지역의 목화 농장이 평소 생산하던 목화의 품질 문제로 여러모로 골머리를 앓고 있다고 한다. 일각에서는 비에 이상한 물질이 섞여서 그렇다고 주장하지만 원인을 놓고 설왕설래가 오가는 상황이다..."
 MFE_workplace_events.10.f:0 "이딴 쓰레기는 쓸 수 없소. 이게 어떻게 목화란 말이오?!"
 MFE_workplace_events.10.a:0 "농장주들이 문제를 해결해 주겠지."
 MFE_workplace_events.10.b:0 "시골에서는 수백 년 동안 있어왔던 일이다."
 MFE_workplace_events.10.c:0 "다음에는 더 나은 목화가 나도록 종교계가 나서 기도해 주시오."
 MFE_workplace_events.11.t:0 "보일러 폭발"
 MFE_workplace_events.11.d:0 "오늘 [SCOPE.sState('steamer_state').GetName]에서 비극적인 사고가 벌어졌다. 현지 증기선 공장에 납품할 보일러를 제작하던 기계 공장에서 정기 점검을 실시하다 보일러가 폭발한 것이다. 이 사고로 인부 7명이 사망하고 수천 파운드 상당의 장비가 파손되었다. 현지 당국은 공장의 작업 환경을 조사 중에 있으며 장차 이런 사고가 재발하지 않기를 바라고 있다. 다만 현재로서는 [SCOPE.sState('steamer_state').GetName] 지역 사람들이 죽은 이의 넋을 기리는 상황이다."
 MFE_workplace_events.11.f:0 "정말 끔찍한 일일세. 지난 주에 보일러를 점검했는데 폭발할 거라곤 상상도 못했소."
 MFE_workplace_events.11.a:0 "이런 사고는 진보의 대가일 뿐."
 MFE_workplace_events.11.b:0 "노동자들이 그런 작업 환경에 투입되고 강요되어선 안 될 일이오."
 MFE_workplace_events.11.c:0 "기계는 위험해! 산업이란 것 자체가 암덩어리다."
 MFE_workplace_events.12.t:0 "염색 공장의 참사"
 MFE_workplace_events.12.d:0 "오늘 한 염색 공장에서 산업용 대형 염료통이 뜨거운 염료를 쏟아 작업장 바닥을 덮치면서 노동자 여러 명이 목숨을 잃는 참사가 벌어졌다. 지역 주민들은 고온의 위험한 작업 환경에 안전 규정이 미비했던 것이 사고 원인이라며 분노하고 있으며, 정부의 대책 마련을 촉구하고 있다. 구조대원들이 현장을 떠날 당시 여러 명의 작업자들이 현장에 방치되어 죽어가고 있었다고 전해진다."
 MFE_workplace_events.12.f:0 "셔츠를 염색하고 있었는데 갑자기 주변 사람들이 쓰러져 죽어가더라니깐요."
 MFE_workplace_events.12.a:0 "사람이라면 언젠가 염을 하기 마련이오."
 MFE_workplace_events.12.b:0 "저들의 희생이 헛되지 않아야 하오!"
 MFE_workplace_events.13.t:0 "석유 저장고 폭발"
 MFE_workplace_events.13.d:0 "오늘 [SCOPE.sState('oil_state').GetName] 지역에 위치한 정유사의 석유 저장고가 원인 모를 폭발을 일으켜 작업자 7명이 목숨을 잃고 수천 달러 상당의 회사 자산이 소실되고 말았다. 정유사 소유주는 정부의 안전 점검이 부실했을 뿐이라며 사고 책임을 회피하는 모양새다."
 MFE_workplace_events.13.f:0 "참으로 끔찍한 일이오. 며칠 전까지만 해도 잘 흐르던 석유가 갑자기 폭발하다니, 부끄럽기 짝이 없군 그래."
 MFE_workplace_events.13.a:0 "[SCOPE.sCharacter('guilty_oil_owner').GetFullName] 씨는 제 할일을 했을 뿐이오."
 MFE_workplace_events.13.b:0 "이번 일로 [SCOPE.sCharacter('guilty_oil_owner').GetFullName] 씨도 배운 게 있겠지."
 MFE_workplace_events.13.tt:0 "[SCOPE.sCharacter('guilty_oil_owner').GetFullName] 씨가 체포되어 자취를 영영 감추게 됩니다..."
 MFE_workplace_events.14.t:0 "정유소의 초과생산"
 MFE_workplace_events.14.d:0 "최근 우리 정유소 중 한 곳의 생산량이 예상 할당량보다 수천 갤런이나 초과하며 활기를 띄고 있다. 저장고 부족 문제로 인해 정유사 소유주는 정부에 석유를 대폭 할인된 가격에 판매하겠다고 제안하였다. 우리 정부는 석유를 직접 구매하거나 거절하여 정유사 측에서 저렴한 석유를 시장에 내놓도록 유도할 수 있다. 석유가 저렴해지면 지역민들에게도 큰 이익이 되겠지만 무엇보다 그 석유를 우리도 직접 사용할 수 있게 될 것이다."
 MFE_workplace_events.14.f:0 "흑색 금이 넘쳐난다!"
 MFE_workplace_events.14.a:0 "석유는 미래의 연료다!"
 MFE_workplace_events.14.b:0 "그 예산을 좀 더... 정당한 사안에 사용하시오."
 MFE_workplace_events.15.t:0 "노인과 바다"
 MFE_workplace_events.15.d:0 "[SCOPE.sState('fishing_state').GetName] 연안에서 조업하는 [SCOPE.sCharacter('fisherman').GetFullName](이)라는 어부가 오늘 엄청난 양의 생선을 잡아들였다. 노인은 풍요로운 바다의 풍족한 어자원을 저인망 어선에 가득 실은 뒤 항구에 정박하였고, 머지않아 다른 어부들도 똑같은 길을 걷게 되었다. 올해 [SCOPE.sState('fishing_state').GetName] 지역의 어획량이 유난히 좋은 모양이다. "
 MFE_workplace_events.15.f:0 "[SCOPE.sCharacter('fisherman').GetFullName] 씨를 본 것은 며칠 전 해안가에서였다. 그는 마치 홀린 듯이 생선을 낚아 올리고 있었는데, 한 시간 만에 오백 마리 쯤 되는 생선을 배로 끌어올리는 것을 목도하였다. 잡은 생선의 무게 때문에 배가 가라앉기 직전에 다다르자 [SCOPE.sState('fishing_state').GetName](으)로 돌아가야 했다. 연안으로 돌아왔을 당시 그가 잡은 생선의 양은 9인 가족이 한 달 동안 먹을 만큼 엄청났다."
 MFE_workplace_events.15.a:0 "우리가 뭐라 할 수 있겠나, 정말이지 엄청나군."
 MFE_workplace_events.15.b:0 "[SCOPE.sState('fishing_state').GetName] 사람들이 먹는 생선은 세계에서 제일 싸겠군."
 MFE_workplace_events.16.t:0 "폭약 폭발"
 MFE_workplace_events.16.d:0 "[SCOPE.sBuilding('explosion_building').GetName] 폭약 창고에서 발생한 화제로 엄청난 폭발이 일어나 그 폭발음이 [SCOPE.GetRootScope.GetCountry.GetCapital.GetName]까지 들렸다고 한다. 이 사고로 피해가 막대하여 인근 지역에서 수백 명의 사망자를 냈다. 화재가 도시 전체로 번지면서 소방당국은 우선순위를 정해야 할 차례가 되었다. 현재 불길이 번질 위험이 있는 지역은 [SCOPE.sBuilding('explosion_building').GetName] 북쪽의 부유한 주택가와 그 남쪽의 저소득층 거주구역이다."
 MFE_workplace_events.16.f:0 "[SCOPE.sBuilding('explosion_building').GetName]의 노동자들이 폭약이 폭발할 가능성이 있다고 경고했지만 그 누구도 귀기울여 주지 않았다... 비로소 들어줄 때에는 너무 늦고 말았다."
 MFE_workplace_events.16.a:0 "공장을 즉시 재건하시오!"
 MFE_workplace_events.16.b:0 "폐허밖에 남지 않은 것을 어쩌겠소..."
 MFE_workplace_events.17.t:0 "우아한 가구"
 MFE_workplace_events.17.d:0 "\"부인, 이 가구 어떠십니까? 브라질산 최고급 마호가니로 만들어서, 케냐산 상아로 섬세한 누비아 문양을 새겨넣었답니다. 가죽면의 풍부한 무늬도 좀 보십시오. [SCOPE.GetRootScope.GetCountry.GetName] 전국 어디서든 이만한 의자는 찾을 수 없다니깐요!\"\n\n[SCOPE.GetRootScope.GetCountry.GetName] 지역의 삶의 질이 증가하면서 더욱 고급스럽고 우아한 가구에 대한 수요도 늘어났다. 만인의 가정이 한층 아름다워지면서 정부 청사 역시 현대적 수준에 맞춰 재단장하는 것은 당연한 일이다."
 MFE_workplace_events.17.f:0 "이렇게 아름다운 가구는 볼 생각조차 못 했건만, 정말이지 놀랍소!"
 MFE_workplace_events.17.a:0 "가구 생산을 장려합시다!"
 MFE_workplace_events.17.b:0 "이런 탁자라면 부자들도 틀림없이 좋아하겠군!"
 MFE_workplace_events.18.t:0 "공장의 악취"
 MFE_workplace_events.18.d:0 "우리나라의 [SCOPE.sState('stinking_state').GetName] 지역 주민들이 현지 비료 공장에서 나오는 악취 때문에 불만을 제기하고 있다. 공장이 주 예산에는 이득이 될지 몰라도, 요 근래 지역 주민들의 코를 찌른다는 점에서 골칫거리인 모양이다. 생산 방식을 개선하는 조례를 제정할 수도 있지만, 그렇게 하면 지역 경영진의 반발을 사게 될 지도 모른다."
 MFE_workplace_events.18.f:0 "오늘 아침에 일어나 거리로 나갔더니 생전 처음 맡아보는 끔찍한 악취가 코를 찔렀다구요. 이렇게 역겨운 냄새가 세상에 있을 수 있다는 게 믿기지가 않았지만, 그거 하나는 틀림이 없더랬지요. 그 악취가 화학 공장에서 난다는 걸요."
 MFE_workplace_events.18.a:0 "유감스럽게도 작물은 제 혼자 자라는 법이 없단 말일세."
 MFE_workplace_events.18.b:0 "지역 내 규제 조치를 고려하지 않을 수 없군."
 MFE_workplace_events.19.t:0 "쾌속 범선의 호황"
 MFE_workplace_events.19.d:0 "우리나라 어느 주의 연안 지역에서 부두와 선착장, 건선거에서 망치질과 톱질 소리로 가득하다. 전세계에서 쏟아지는 쾌속 범선 주문을 감당하기 위해 현지 공장이 바삐 움직이고 있는 탓이다. 효율적인 공정과 경영, 그리고 뛰어난 장인 정신과 항해술이 조화되어 그 어느 해보다 더 많고 우수한 선박을 제작하고 있는 것이다! 어쩌면 지금이 바로 그 영광에 안주할 순간일지 모르나, 미래는 항상 불확실한 법이다."
 MFE_workplace_events.19.f:0 "이 범선들은 세계 최고 수준이오. 햇빛에 반짝이는 돛의 아름다움이 경이로운 수준일세."
 MFE_workplace_events.19.a:0 "이 순간을 축하합시다!"
 MFE_workplace_events.19.b:0 "해군 학교를 창설합시다."
 MFE_workplace_events.20.t:0 "[SCOPE.sState('radio_state').GetName] 라디오"
 MFE_workplace_events.20.d:0 "우리 [SCOPE.sState('radio_state').GetName] 지역의 현지 라디오 방송국이 라디오 부품 부족으로 방송을 전격 중단하고, 상황이 해결될 때까지 방송을 보류한다고 밝혔다. 지역 당국은 전선에서 전해지는 소식이 끊기면 지역민들이 불안해할 것을 우려하여 정부가 보유한 라디오 부품을 방송국에 대여하는 것이 어떻겠느냐는 방안을 내놓았다."
 MFE_workplace_events.20.f:0 "자넨 들었나? [SCOPE.sState('radio_state').GetName]의 라디오 방송국이 며칠 전부터 방송을 끊었다는 소식 말이야. 이래서야 지금 전쟁이 어떻게 돌아가는지 누가 알 수 있겠나..."
 MFE_workplace_events.20.a:0 "그럴 여유는 없다."
 MFE_workplace_events.20.b:0 "라디오를 보급해 줍시다."
 MFE_workplace_events.4.a: "헌데 우리가 차 같은걸 마시긴 했던가?"
 robbed_tea_station_mod: "강탈당한 차 계량소"