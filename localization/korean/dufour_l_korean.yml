 je_group_dufour_confoederatio_helvetica: "모르겐뢰테: 스위스 연방"
 je_dufour_carte_dufour: "스위스의 지형도"
 je_dufour_carte_dufour_reason: "1822년 이래 토지 측량은 주정부에서 스위스 연방의 소관으로 넘어갔다. 뒤푸르 장군은 통일 기준에 따라 스위스 전역을 측량하고 그 결과를 지도에 기록하는 임무를 맡았다. 이 과정은 오랜 시간과 상당한 시간이 들지만, 스위스의 발전에 큰 보탬이 될 것이다."
 je_dufour_carte_dufour_goal: "측량 조사가 끝나고 지도가 발행됨"
 dufour_creating_carte_dufour_modifier: "뒤푸르 지형도 제작"
 dufour.900.t: "뒤푸르 지형도의 출간"
 dufour.900.d: "수년 간의 고된 조사 끝에 스위스 전국의 지형도가 마침내 완성되었다. 총 25장에 달하는 지형도가 조만간 발행될 전망이다."
 dufour.900.f: "드디어 뒤푸르 지형도의 초판본을 감상할 수 있게 되었다. 섬세한 선으로 산맥과 도시, 심지어 주택 하나하나까지 표현되어 있다. 이처럼 정밀한 스위스 지도는 이전에는 존재하지 않았다!\n\n#b 실제 역사#!에서 뒤푸르와 조사단은 1832년부터 1865년까지 오랜 세월 동안 작업에 매진하였다. 처음 두 장의 지형도는 1845년에 제작되었고 나머지 총 25장이 전부 완성된 것은 1865년에 이르러서였다. 이 지형도는 동판 인쇄 방식으로 제적되었으며 축척은 1:100,000이다. 흥미로운 점은 뒤푸르가 근대 스위스 최초의 장군이며 1848년 스위스 내전(존더분트 전쟁)에서 반란 세력에 맞서 싸웠다는 사실이다.\n\n#b 오늘날#! 뒤푸르 지형도는 스위스 취리히의 스위스 국립박물관에 소장되어 있다. 하지만 여느 스위스 전국 지도와 함께 온라인으로도 열람이 가능하다."
 dufour.900.g: "뒤푸르 장군의 이름을 따서 산에 명명해야겠소!"
 dufour_carte_dufour_modifier: "뒤푸르 지형도"
 dufour_add_x_carte_dufour_progress_minus_x_tt: "#V 지도 제작 진행도#! [SCOPE.GetValue('carte_dufour_progress_amount')|0+] 상실"
 dufour_add_x_carte_dufour_progress_minus_1_tt: "#V 지도 제작 진행도#! [SCOPE.GetValue('carte_dufour_progress_amount')|0+] 상실"
 dufour_add_x_carte_dufour_progress_0_tt: "#V 지도 제작 진행도#! 0 획득"
 dufour_add_x_carte_dufour_progress_plus_1_tt: "#V 지도 제작 진행도#! [SCOPE.GetValue('carte_dufour_progress_amount')|0+] 획득"
 dufour_add_x_carte_dufour_progress_plus_x_tt: "#V 지도 제작 진행도#! [SCOPE.GetValue('carte_dufour_progress_amount')|0+] 획득"
 dufour.901.t: "측량 조사로 방해받고 있는 현지 주민들"
 dufour.901.d: "[SCOPE.sState('dufour_mapping_scope').GetName] 지역에서 측량 조사를 진행하는 과정에서 우리 측량사들이 현지 주민들과 마찰을 빚게 되었다. 측량 작업이 주민들의 장례식을 방해했던 모양이다."
 dufour.901.f: "\"지금 썩 물러가란 말이여! 사람 말을 왜 이리 못 알아듣나? 집 가는 길은 우리가 알아서들 찾아 왔는데, 당신네들 지도가 무슨 상관이란 말여!\""
 dufour.901.g: "고인의 명복을 빕니다."
 dufour.901.h: "계속 진행하시오!"
 dufour.902.t: "산 위에서 목숨을 잃은 측량사"
 dufour.902.d: "[SCOPE.sState('dufour_mapping_scope').GetName] 지역의 높은 산 위에 올라 측량을 진행하던 중 갑작스러운 폭풍우를 만났다. 거센 바람과 함께 폭우가 쏟아진 것이다. 측량사들은 텐트로 피신했으나 번개에 맞아 한 명이 사망하고 다른 한 명이 부상을 입었다."
 dufour.902.f: "\"번개에 다리를 맞았지만 며칠 지나고 보니 좀 나았소. 결국엔 무사히 내려와 안전히 대피했다오. 이런 시련이 어디 또 있을까!\""
 dufour.902.g: "이럴 수가!"
 dufour.903.t: "현지인들의 도움을 받은 측량조사단"
 dufour.903.d: "[SCOPE.sState('dufour_mapping_scope').GetName]에서 길을 잃을 뻔한 우리 측량조사단이 지역 주민들의 도움으로 하루 묵을 장소와 가장 빨리 가는 길도 알려주었다. 덕분에 지형도 제작이 훨씬 빨리 마무리될 수 있을 것 같다!"
 dufour.903.f: "\"일은 나중에 해도 돼. 일단 한잔 혀. 이건 우리가 젤 아끼는 키르슈라오!\""
 dufour.903.g: "도와주셔서 감사합니다!"
 dufour.904.t: "장비 상실!"
 dufour.904.d: "우리 측량사 한 명이 [SCOPE.sState('dufour_mapping_scope').GetName]의 산을 오르다 장비를 잃어버리고 말았다. 새로운 장비를 지급하지 않으면 진척도가 느려질 전망이다."
 dufour.904.f: "\"그냥 굴러 떨어졌습니다... 잡을 수가 있었어야 말이죠... 배낭에 장비를 고정해야 한다는 걸 누가 알았겠습니까?\""
 dufour.904.g: "그래도 감안해야겠지."
 dufour.904.h: "새 장비를 지급하라!"
 dufour.905.t: "블뤼엠리잘프인가, 프라우인가"
 dufour.905.d: "[SCOPE.sState('dufour_mapping_scope').GetName] 지역 주민들이 똑같은 산을 두고 '블뤼엠리잘프'와 '프라우'라는 두 가지 이름으로 부르고 있었다. 어느 이름으로 지도에 기록해야 할까?"
 dufour.905.f: "\"그냥 동전 던지기로 정하면 안되겠습니까?\""
 dufour.905.g: "블뤼엠리잘프!"
 dufour.905.h: "프라우!"
 dufour.906.t: "측량사의 지형도 제작 가속"
 dufour.906.d: "유명 측량사 [SCOPE.sCharacter('surveyor_scope').GetFullName]의 도움으로 지형도 제작의 진척도가 상당한 진전을 이루게 되었다."
 dufour.906.f: "\"그렇다니까. 이 도구는 측량용이지 별 보라고 있는 게 아니란 말이오.\""
 dufour.906.g: "대단하군!"
 dufour.907.t: "수학자의 계산 도움"
 dufour.907.d: "수학을 전공한 [SCOPE.sCharacter('mathematician_scope').GetFullName] 씨가 우리 조사단의 여러 계산 문제 해결에 도움을 주었다. 이것으로 지형도 제작을 훨씬 빨리 마무리할 수 있게 되었다."
 dufour.907.f: "\"수학이 이렇게 유용할 줄 누가 알았겠나!\""
 dufour.907.g: "수학자가 있어 다행이군!"
 dufour.908.t: "화가들에게 감명을 준 열기구 조종"
 dufour.908.d: "유명 열기구 조종사 [SCOPE.sCharacter('balloonist_scope').GetFullName]의 도움으로 화가와 측량사들이 상공에서 세상을 바라볼 수 있게 되었다. 화가들은 숨막힐 듯한 경치에 영감을 받고 지도 상에 국토를 어떻게 담아야 하는가에 관한 더욱 현실적인 기법을 배워가게 되었다."
 dufour.908.f: "\"아니 세상에! 이거 추락이라도 하는 건 아니겠지!\""
 dufour.908.g: "상공에서 본 세상은 아름답구나!"
 dufour.910.t: "첫 지형도 발간: 쥐라와 바젤"
 dufour.910.d: "이번에 새로 제작되는 지형도의 처음 몇 장이 발간되었다. 지형도에서 다루고 있는 대상은 바젤과 쥐라 산맥 일대 지역이다."
 dufour.910.f: "쥐라 산맥은 사보이아 지방에서 바젤까지 뻗어 있는 작은 산맥으로, 일부 구릉지가 보덴 호수까지 뻗어 있다. 보주 주와 뇌샤텔주, 베른주, 양 바젤주, 졸로투른주, 아르가우주 일부를 아우른다. 여러 대도시가 쥐라 산맥 인근에 위치해 있다.\n이를테면 바젤은 스위스의 대표적인 도시로 꼽힌다. 바젤은 알자스 지방, 바덴 지방과 경계를 면하고 있으며 라인 강이 흐르는 덕분에 교통이 편리하다.\n불과 몇년 전 바젤주가 바젤시와 바젤주 (교외)로 분리되었다. 흥미롭게도 당시 교외 지역은 자유주의 성향이 강했던 반면, 도시 지역은 귀족층이 지배하였다. 바젤은 제법 국제적인 도시로서 레온하르트 오일러와 다니엘 베르누이 같은 위대한 사상가를 배출한 오랜 대학을 갖추고 있다.\n한편 제네바는 프랑스 국경에 둘러싸인 대도시다. 나폴레옹 치세기에는 프랑스의 일부였으나 1815년 스위스로 반환되었다. 이 시기 최초의 민간 은행이 설립되면서 제네바는 점차 금융 중심지로 거듭나게 되었다. 또한 스위스가 낳은 위대한 철학가인 볼테르와 장 자크 루소의 고향이기도 하다."
 dufour.910.g: "흥미롭구만!"
 dufour.910.h: "스위스의 지리에 관해서는 더 이상 듣고 싶지 않네!"
 dufour.910.no_more_information_tt: "별다른 효과 없이 스위스를 다룬 이벤트를 #n 더 이상#! 받지 않습니다."
 dufour.911.t: "신규 지형도 발간: 샤프하우젠, 투르가우, 장크트갈렌"
 dufour.911.d: "신규 지형도가 발간되었다. 이번에는 스위스 북부와 동부의 샤프하우젠주, 투르가우주, 장크트갈렌주를 중점으로 다루었다."
 dufour.911.f: "샤프하우젠은 스위스 북동부에 위치한 도시로 대부분 독일 국경으로 둘러싸여 있다. 샤프하우젠 시 자체는 라인강 바로 옆에 위치해 있으며 노이하우젠의 라인 폭포와 매우 가깝다. 강물을 이용한 수력 발전 덕분에 샤프하우젠은 일찍이 산업화되었으며 농촌 주민들의 영향으로 1831년 자유주의 성향의 주로 거듭나게 되었다.\n투르가우는 프랑스 혁명이 스위스로 확산되기 전까지 여러 주에 속해 있었다. 정식 주가 된 것은 1815년부터이며 섬유 산업과 농업의 중심지가 되었다. 배나무가 많아 '모스틴디엔'(Mostindien)이라는 별명을 얻었는데 이는 '과일주 인도'라는 뜻으로, '동쪽'(ost, 오스트)과 '과일주' (most, 모스트)라는 단어를 합친 것이다. 투르가우는 1831년부터 자유주의 성향의 주로 거듭났으며 스위스의 중앙집권화를 바라고 있다.\n장크트갈렌은 종교에 따라 분파가 갈린 주로 한때 수도원과 주교령을 두고 있던 곳이다. 섬유 산업의 중심지이자 자유주의 성향의 주다. 장크트갈렌주는 아펜첼 지역과 알프스 산맥에 속하는 아름다운 젠티스 산맥을 둘러싸고 있다."
 dufour.912.t: "신규 지형도 발간: 그리종과 라이티아 알프스"
 dufour.912.d: "신규 지형도가 발간되었다. 이번에는 널찍한 그리종 지역과 라이티아 알프스를 중점으로 다루었다."
 dufour.912.f: "그리종은 스위스에서 가장 큰 주이자 로망슈어권 주민들의 고장이기도 하다. 로망슈어는 스위스의 소수 언어로서 알프스 로망스어군 계열 언어이며, 남티롤과 프리울리 지역에서도 사용된다.\n그리종은 알프스 산맥이 대다수 지역을 차지하고 있어 인구 밀도가 낮으며, 특히 고대 라이티아족에서 이름을 따온 라이티아 알프스가 주를 이룬다. 그리종은 주로 농업에 기반을 두고 있으나 알프스 고개를 넘는 물류 운송으로 이득을 얻고 있다. 나폴레옹 전쟁 이후 그리종의 일부 지역이 지금의 이탈리아 영토로 넘어가면서 큰 타격을 입었으나, 여전히 이탈리아어 화자가 다수를 이루는 지역도 남아 있기에, 오늘날 그리종 지역에서 사용되는 언어는 독일어, 로망슈어, 이탈리아어의 세 언어권으로 나뉜다.\n정치 면에서 그리종은 상당한 권력을 가진 지방자치단체가 주도하고 있다. 그러나 최근 주정부 단위의 중앙집권화를 꾀하는 자유주의 세력이 폭을 넓히고 있다."
 dufour.913.t: "신규 지형도 발간: 스위스 중부"
 dufour.913.d: "신규 지형도가 발간되었다. 이번에는 스위스 중부의 여러 주를 중점으로 다루었다."
 dufour.913.f: "스위스 중부는 스위스 연방이 처음 시작된 지역이다. 먼저 슈비츠주, 우리주, 운더발덴주(현재 니드발덴주와 오드발덴주로 분리)가 느슨한 동맹을 맺었고 이후 조금씩 확대되었다.\n스위스 중부의 여러 조그만 주에서 지역 경제의 핵심을 차지했던 것은 고트하르트 도로를 통한 물류 운송이었다. 그 외에도 농업과 임업, 일부 섬유 생산이 주요 산업으로 자리하였다.\n정치 면에서 스위스 중부는 보수적인 가톨릭 성향이 지배적이다. 루체른주는 루체른시의 영향으로 스위스 중부에서도 가장 자유주의 성향이 강하지만, 우리, 슈비츠, 옵발덴과 니드발덴, 글라루스, 추그 주는 더욱 보수적이며 지역 상류층의 영향력이 강한 편이다.\n슈비츠주는 1830년 주 외곽 지역의 주민들이 평등권과 정치참여권을 요구하면서 두 개의 주로 분할될 위기에 처하기도 했다. 슈비츠 내륙 지역을 스위스 정부군이 점령하고 내륙 지역에서 해당 요구를 수용하면서 슈비츠는 하나의 주로 남게 되었다."
 dufour.914.t: "신규 지형도 발간: 티치노"
 dufour.914.d: "신규 지형도가 발간되었다. 이번에는 스위스 최남단의 티치노주를 중점으로 다루었다."
 dufour.914.f: "티치노는 이탈리아 지역에 남아 있는 유일한 스위스 연방 영토다. 15세기와 16세기에 정복된 이 지역은 스위스 공화국이 건국되기 전까지 여러 옛 주(칸톤)의 지배를 받았다.  그러나 1803년부터 정식으로 하나의 주를 이루게 되었다.\n티치노의 지역 경제는 농업과 임업이 주를 차지한다. 비단 생산 역시 수익성 좋은 사업이었다. 스위스의 다른 지역에서는 재배하기 어려운 것들이 티치노에서 재배가 가능한 것이 많았는데 이를테면 담배와 밤, 비단, 여러 과일들이 있었다.\n1830년 티치노는 자유주의 헌법을 제정한 최초의 주가 되었다. 그러나 티치노의 정치 상황은 불안정한 편으로, 자유주의 세력에서는 중앙집구너화를, 보수주의 세력에서는 지역 자치를 주장하고 있기 때문이다."
 dufour.915.t: "신규 지형도 발간: 베른과 프리부르"
 dufour.915.d: "신규 지형도가 발간되었다. 이번에는 베른과 프리부르를 중점으로 다루었다."
 dufour.915.f: "베른주와 프리부르주는 프랑스어권과 독일어권이 혼재된 지역이다. 베른주는 상당히 큰 주지만 프리부르주는 규모가 작다. 베른주는 쥐라산맥에서 남쪽으로 알프스 산맥까지 뻗어 있다. 프리부르는 베른주 서부에 위치해 있으며, 프리부르와 그뤼예르 등의 마을이 있는데 이 두 마을 모두 치즈로 유명하다.\n베른주는 농업이 주를 이루지만 시계 제조 산업도 이웃한 뇌샤텔에서 베른의 쥐라산맥 지역으로 서서히 전파되었다. 앞으로는 산업화가 베른주의 발전에 보탬이 될 것으로 전망된다.\n정치 면에서 베른은 오랫동안 도시 내 귀족층이 정계를 지배하였으나, 1830년대 들어 주 내 소도시 출신의 자유주의 세력을 중심으로 베른 시민과 농촌 주민의 평등 권리를 보장한 새로운 헌법을 제정할 수 있었다.\n프리부르주는 농업, 그 중에서도 곡물과 치즈 생산이 주를 이루며, 그뤼예르 치즈가 특산품이다.\n정치 면에서 프리부르주는 보수적인 귀족층과 성직자층이 지배하였다. 1831년 신헌법 공포 이후에도 프리부르주는 여전히 보수주의 성향을 띄고 있으며, 선거에서도 보수파가 과반 득표를 얻고 있다."
 dufour.916.t: "신규 지형도 발간: 취리히와 아르가우"
 dufour.916.d: "신규 지형도가 발간되었다. 이번에는 취리히와 아르가우를 중점으로 다루었다."
 dufour.916.f: "취리히와 아르가우는 모두 스위스 북부의 비교적 평탄한 중부 지방 (미텔란트)에 자리해 있다. 두 주 모두 급격한 산업화를 겪고 있으며 머지않아 산업 지역으로 성장할 것으로 보인다.\n취리히는 옛 칸톤(주) 중 하나로서 오랫동안 도시를 중심으로 역사를 유지해 왔다. 취리히는 기계화된 섬유 산업과 기계 산업의 중심지이며 많은 공장이 강변에 자리하여 수력을 동력원으로 사용하고 있다.\n정치 면에서 취리히는 도시의 귀족층이 주도해 왔으나 1830년~1831년부터 지방 주민의 요구로 신헌법이 제정되었다. 이후 선거에서는 자유주의파와 급진파가 다수당이 되어 현재까지 취리히 지역 정계를 주도하고 있다.\n아르가우는 헬베티아 공화국 시대까지 다른 주에 속해 있었다. 오늘날 독립 주로 나아간 아르가우는 섬유 공장을 중심으로 빠르게 산업화되고 있다. 아르가우에는 여러 강이 흐르고 있으며 수력을 이용한 동력원을 공장에 공급할 수 있었으며, 이로 인해 공장 부지가 여러 곳으로 분산되는 결과를 낳았다.\n아르가우는 원래 취리히와 베른주의 견제 지역으로 나섰으며 1814년~1815년까지 하나의 독립 주를 이루지 못했다. 1815년부터는 다른 주와는 달리 상당히 자유주의 성향이 강했다. 1831년 신헌법 제정으로 지역 주민들에게 더 많은 권리가 부여되었다. 지역 정부는 국가의 교회 통제 강화에 대한 가톨릭 신자들의 반란에 대응하여 반란군 지역을 점령하기도 하였다."
 dufour.917.t: "신규 지형도 발간: 보와 발레"
 dufour.917.d: "신규 지형도가 발간되었다. 이번에는 보와 발레를 중점으로 다루었다."
 dufour.917.f: "발레 주는 스위스 최남단에 위치한 큼직한 계곡 지대로서 대부분 알프스 산맥으로 스위스의 다른 지역과 분리되어 있다. 론 강이 이 계곡을 따라 흐르다 레망 호수로 들어간다. 호수의 북쪽 연안은 보(Vaud) 지역의 일부이지만 발레주 자체는 제네바와 알프스 산맥에서부터 쥐라 산맥까지 뻗어 있다.\n보 주는 여전히 농업이 주를 이루고 있으나 1826년 이래 자유주의 세력이 산업 발전을 위한 개혁에 나서고 있다. 보 주가 농업 지역으로 남을지, 아니면 산업 중심지로 변모할지에 관하여 앞으로의 추세를 지켜볼 만하다.\n보 주는 외교적 수완을 바탕으로 나폴레옹 패배 직후 독립을 확약받을 수 있었다. 하지만 그 대가로 한층 더 보수적인 헌법을 받아들여야 했다. 권위주의 정권에 대한 반감에 힘입어 자유주의파는 그 세력을 확장하여 1830년 신헌법을 제정할 수 있었다. 한편 급진파도 세력을 키우며 민주화를 추진해나가고 있다.\n발레 주는 농업과 농촌 인구가 주를 이룬다. 발레 주에는 별다른 산업 기반이 없고 외부와의 교류도 제한적이다.\n발레 주에서의 대표적인 정치적 갈등은 독일어권에 속하는 발레 상부 지역과 프랑스어권에 속하는 발레 하부 지역 간의 갈등이 있었다. 하부 지역의 인구가 더 많았으나 주도권을 차지한 것은 상부 지역이었다. 하부 지역의 자유주의와 급진파 세력이 주 전체의 민주화를 추진할 수 있는가, 아니면 기존 세력이 권력을 다잡는가가 이 지역의 문제로 남아 있다."
 dufour.920.t: "아이벡스를 스위스로 다시 들여오라는 여론이 제기되다"
 dufour.920.d: "장크트갈렌의 '발할라' 호텔을 소유하고 있는 호텔리어인 로베르트 마더가 알파인아이벡스를 스위스로 들이고 싶어하는 모양이다. 장크트갈렌에 동물원을 짓고 그곳의 우리에 산양을 번식시킨 다음 자연으로 돌려보내려는 계획이다."
 dufour.920.f: "\"아이벡스는 스위스의 국가 상징이요. 조국에 다시 들여와야 하지 않겠소!\""
 dufour.920.g: "아이벡스를 다시 들여옵시다!"
 dufour.920.h: "그런 쓸데없는 짓을!"
