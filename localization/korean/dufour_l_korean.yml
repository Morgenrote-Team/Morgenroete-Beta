l_korean:
 dufour_celebrate_schwingfest_decision: "초대 스위스 슈빙겐 알프스 축제 개최"
 dufour_celebrate_schwingfest_decision_desc: "슈빙겐은 이제 스위스의 국민 체육의 입지에 올랐다. 슈빙겐 알프스 축제를 개최하여 슈빙겐을 진정한 국민 체육으로 만들어 보자!"
 dufour_schwingfest_modifier: "스위스 슈빙겐 알프스 축제"
 dufour_schwingerkonig: "슈빙겐의 제왕"
 dufour_schwingerkonig_desc: "이 인물은 스위스의 슈빙겐 축제에서 우승을 거두었으며 온 국민의 챔피언으로 우러러보는 존재입니다."
 dufour.1000.t: "여성 참정권을 시행하지 않는 아펜첼 지방 "
 dufour.1000.d: "스위스에서도 여성 참정권이 도입되었다. 그러나 일부 주에서는 도입 속도가 다소 느린 상황이다. 아펜첼이너호덴주와 아펜첼아우세르호덴주에서 여성은 연방 선거에 투표하고 출마할 수 있지만, 지방자치단체와 주 선거에는 투표와 출마가 제한된다. 이를 위해서는 주 헌법을 개정하고 주의회에서 승인을 받아야 하는데 그 과정만 수년에 걸릴 수 있다. 연방 차원에서 개입하여 아펜첼 주민들에게 여성 참정권 도입을 강요해야 하는가, 아니면 알아서 도입하기를 기다려야 하는가?"
 dufour.1000.f: "\"남자들만으로도 잘 하고 있구먼 뭘 그래!\"\n\n#b 실제 역사#!에서 스위스의 여성 참정권 도입은 매우 긴 과정을 거쳤다. 스위스 여성의 투표권과 출마권이 전면 보장된 것은 1971년에 이르러서였다. 일부 주의 경우에는 훨씬 더 오래 걸렸으며, 아펜첼 지방의 두 주가 가장 늦었다. 아펜첼아우세르호덴주의 여성 참정권 도입은 1989년 지방의회 의결로 제정되었으며, 아펜첼이네르호덴주의 경우 1990년 연방법원의 강제명령에 따라 도입하게 되었다.\n따라서 스위스는 세계에서 가장 늦게 여성참정권을 도입한 국가로 꼽힌다. 이보다 더 일찍 도입한 국가로는 아프가니스탄, 핀란드, 미국 등이 있다."
 dufour.1000.g: "여성참정권을 강제로 도입하시오."
 dufour.1000.h: "머지않아 여성참정권을 도입하리라 믿어 의심치 않소."
 dufour_womens_suffrage_appenzell_effects_tt:0 "두 주에 여성참정권 도입을 강요하지 않습니다. 해당 사안에 진전이 있거나 플레이어의 결정이 필요한 경우에만 이벤트가 발생하게 됩니다."
 dufour.1001.t: "아펜첼 지방의 여성참정권 도입안 부결"
 dufour.1001.d: "아펜첼아우세르호덴주와 아펜첼이네르호덴주 정부는 주정부 차원에서 여성 참정권을 도입하는 법안을 발의하였으나 부결되고 말았다. 이는 아펜첼 지역 여성들이 여전히 투표권을 행사할 수 없다는 의미다. 연방 차원에서 아펜첼 지방에 여성 참정권 도입을 강요할 수도 있지만 주민들의 반발을 불러일으킬 것이 틀림없다."
 dufour.1001.f: "\"주 차원의 여성참정권 도입을 바라는 의원은 손을 드시오!\" 손을 든 의원은 많다. 과연 그게 충분했을까? \"주 차원의 여성참정권 도입은 부결되었음을 선포합니다!\"\n\n#b 실제 역사#!에서 스위스의 여성 참정권 도입은 매우 긴 과정을 거쳤다. 스위스 여성의 투표권과 출마권이 전면 보장된 것은 1971년에 이르러서였다. 일부 주의 경우에는 훨씬 더 오래 걸렸으며, 아펜첼 지방의 두 주가 가장 늦었다. 아펜첼아우세르호덴주의 여성 참정권 도입은 1989년 지방의회 의결로 제정되었으며, 아펜첼이네르호덴주의 경우 1990년 연방법원의 강제명령에 따라 도입하게 되었다.\n따라서 스위스는 세계에서 가장 늦게 여성참정권을 도입한 국가로 꼽힌다. 이보다 더 일찍 도입한 국가로는 아프가니스탄, 핀란드, 미국 등이 있다."
 dufour.1001.g: "이쯤 기다려 줬으면 됐어! 여성참정권을 강제 도입하시오!"
 dufour.1001.h: "조금만 더 기다려 봅시다."
 dufour.1002.t: "아펜첼 지방의 여성참정권 도입"
 dufour.1002.d: "이런 걸 누가 예상이나 했는가? 아펜첼 지방의 두 지방의회에서 과반수의 찬성으로 드디어 여성참정권을 도입하게 되었다. 이는 곧 스위스의 모든 지방에서 여성이 투표를 행사할 수 있게 되었다는 뜻이다."
 dufour.1002.f: "\"주 차원의 여성참정권 도입을 바라는 의원은 손을 드시오!\" 손을 든 의원은 많다. 과연 그게 충분했을까? \"주 차원의 여성참정권 도입은 가결되었음을 선포합니다!\"\n\n#b 실제 역사#!에서 스위스의 여성 참정권 도입은 매우 긴 과정을 거쳤다. 스위스 여성의 투표권과 출마권이 전면 보장된 것은 1971년에 이르러서였다. 일부 주의 경우에는 훨씬 더 오래 걸렸으며, 아펜첼 지방의 두 주가 가장 늦었다. 아펜첼아우세르호덴주의 여성 참정권 도입은 1989년 지방의회 의결로 제정되었으며, 아펜첼이네르호덴주의 경우 1990년 연방법원의 강제명령에 따라 도입하게 되었다.\n따라서 스위스는 세계에서 가장 늦게 여성참정권을 도입한 국가로 꼽힌다. 이보다 더 일찍 도입한 국가로는 아프가니스탄, 핀란드, 미국 등이 있다."
 dufour.1002.g: "생각보다 훨씬 더 오래 걸렸군!"
 dufour.1003.t: "아펜첼 지방의 여성참정권 도입안이 또다시 부결"
 dufour.1003.d: "이번이 벌써 두 번째다. 진보 성향의 아펜첼 주민들이 여성참정권을 도입하려는 시도 말이다. 하지만 이번에도 가결에 이르지는 못했다. 여성참정권을 연방 차원에서 강제로 도입하거나, 아니면 더 관망하면서 아펜첼 주민들이 자발적으로 여성참정권을 도입하기를 기다리는 두가지 선택지는 아직 남아 있다."
 dufour.1003.f: "\"주 차원의 여성참정권 도입을 바라는 의원은 손을 드시오!\" 손을 든 의원은 많다. 과연 그게 충분했을까? \"주 차원의 여성참정권 도입은 부결되었음을 선포합니다!\"\n\n#b 실제 역사#!에서 스위스의 여성 참정권 도입은 매우 긴 과정을 거쳤다. 스위스 여성의 투표권과 출마권이 전면 보장된 것은 1971년에 이르러서였다. 일부 주의 경우에는 훨씬 더 오래 걸렸으며, 아펜첼 지방의 두 주가 가장 늦었다. 아펜첼아우세르호덴주의 여성 참정권 도입은 1989년 지방의회 의결로 제정되었으며, 아펜첼이네르호덴주의 경우 1990년 연방법원의 강제명령에 따라 도입하게 되었다.\n따라서 스위스는 세계에서 가장 늦게 여성참정권을 도입한 국가로 꼽힌다. 이보다 더 일찍 도입한 국가로는 아프가니스탄, 핀란드, 미국 등이 있다."
 dufour.1003.g: "빌어먹을 산골짝 같으니. 기회는 충분히 줬으니 강제로라도 시켜야 하오!"
 dufour.1003.h: "민주주의 절차를 훼손할 순 없다."
 dufour.1004.t: "연방 법원, 아펜첼이네르호덴주에 여성참정권 도입 강제 명령 판결"
 dufour.1004.d: "아펜첼아우서로덴주가 지난번 지방의회에서 여성참정권 도입안을 가결한 데 이어 연방법원이 아펜첼이네르로덴주의 도입에 관한 판결을 내렸다. 그 결과 아펜첼이네르로덴주는 여성 참정권을 반드시 도입해야 한다. 이로써 이 문제는 최종 해결에 이르게 되었다."
 dufour.1004.f: "\"본 연방법원은 아펜첼주에서 스위스 연방헌법의 위헌 판결을 내린다. 여성은 남성과 동등한 권리를 지닌다. 아펜첼이네르로덴주는 즉시 여성참정권을 도입해야 한다!\"\n\n#b 실제 역사#!에서 스위스의 여성 참정권 도입은 매우 긴 과정을 거쳤다. 스위스 여성의 투표권과 출마권이 전면 보장된 것은 1971년에 이르러서였다. 일부 주의 경우에는 훨씬 더 오래 걸렸으며, 아펜첼 지방의 두 주가 가장 늦었다. 아펜첼아우세르호덴주의 여성 참정권 도입은 1989년 지방의회 의결로 제정되었으며, 아펜첼이네르호덴주의 경우 1990년 연방법원의 강제명령에 따라 도입하게 되었다.\n따라서 스위스는 세계에서 가장 늦게 여성참정권을 도입한 국가로 꼽힌다. 이보다 더 일찍 도입한 국가로는 아프가니스탄, 핀란드, 미국 등이 있다."
 dufour.1004.g: "드디어!"
 dufour.2000.t: "제1회 스위스 슈빙겐 알프스 축제, 비엘에서 개최되다"
 dufour.2000.d: "제1회 스위스 슈빙겐 알프스 축제에 수많은 슈빙겐 선수들이 참가하였다. 비엘 마을에서 개최된 이 행사는 슈빙겐 종목이 점차 인기를 얻음에 따라 스위스의 여러 슈빙겐 체육단에서 공동으로 주최하였다. 대성공을 거둔 이번 행사에서 참가자와 주최자들은 3년 후에 열릴 차기 대회를 손꼽아 기다리고 있다. 여러 슈빙겐 선수들도 이번 대회 우승과 1등 상품인 튼튼한 황소를 손에 넣기 위해 열의를 불태우고 있다."
 dufour.2000.f: "두 거구의 남성이 레슬링에 나섰다. 어느 쪽도 쓰러지는 것은 생각도 않고 있다. 관중들의 환호 속에 두 선수 모두 쓰러진다. 알프레트 니클라우스가 위에 서면서 초대 슈빙겐의 제왕으로 등극했다! 그럼에도 니클라우스는 상대 선수를 먼저 일으켜 세우고 등에 묻은 톱밥을 닦아주는 여유를 보였다.\n\n#b 실제 역사#!에서 슈빙겐은 매우 엄격한 규칙을 지닌 레슬링의 일종으로서 스위스에서 인기 있는 체육 종목이었으나 그 기원은 명확하지 않다. 최초의 현지 슈빙겐 대회는 인터라켄의 운스푸넨마테에서 개최되었다. 최초의 스위스 슈빙겐 알프스 축제는 1895년 비엘에서 개최되었으며 이후로 2~3년을 주기로 개최되고 있다. 슈빙겐 알프스 축제에서는 호르누센(Hornussen, '호르누스'라 불리우는 작은 원반을 치는 아이스하키 비슷한 단체 종목)과 슈타인슈토센(Steinstossen, 돌던지기의 일종)이라는 다른 두 국민 체육 종목도 함께 열리고 있다.\n\n스위스 슈빙겐 알파인 축제는 현재까지도 성황리에 개최되고 있다. 가장 최근에는 2025년 몰리스에서 개최되었다. "
 dufour.2000.g: "다음 대회가 정말 기대되는군!"
 dufour.2001.t: "[SCOPE.sCharacter('dufour_schwingerkonig_scope').GetLastName] [SCOPE.sCharacter('dufour_schwingerkonig_scope').GetFirstName]의 스위스 슈빙겐 축제 우승!"
 dufour.2001.d: "치열한 싸움 끝에 [SCOPE.sCharacter('dufour_schwingerkonig_scope').GetLastName] [SCOPE.sCharacter('dufour_schwingerkonig_scope').GetFirstName] 선수가 올해 스위스 슈빙겐 축제에서 우승을 차지하였다."
 swiss_flavor_events.21.f1: "두 거구의 남성이 레슬링에 나섰다. 어느 쪽도 쓰러지는 것은 생각도 않고 있다. 관중들의 환호 속에 두 선수 모두 쓰러진다. 한쪽 선수가 위에 서면서 씨름의 제왕으로 등극했다. 그럼에도 그 선수는 상대 선수를 먼저 일으켜 세우고 등에 묻은 톱밥을 닦아주는 여유를 보였다."
 swiss_flavor_events.21.f2: "\n\n흥미로운 사실은 슈빙겐에서 선수의 성과 이름의 위치가 바뀌어 성부터 시작한다는 점이다. 에이브러햄 링컨이 슈빙겐 선수가 되었다면 링컨 에이브러햄으로 출전했을 것이라는 뜻이다."
 swiss_flavor_events.21.f3: "\n\n상대 선수가 슈빙겐의 제왕과 동일한 점수를 획득하면 '에르스트게크뢴터' (Erstgekrönter), 즉 처음 왕관을 쓴 자라는 칭호를 얻게 된다."
 swiss_flavor_events.21.f4: "\n\n슈빙겐 연방권 대회(Eidgenössisches)에서 상위 15%에 든 선수에게는 월계관이 수여된다. 이 선수들을 보통 '아이트겐노센'(Eidgenossen)이라 부른다."
 swiss_flavor_events.21.f5: "\n\n우승자 외 다른 참가자들도 상을 받는다. 상품은 선물 보관소에 두게 된다. 각 상품은 개인이나 단체에서 기부한 것이다."
 swiss_flavor_events.21.f6: "\n\n슈빙겐의 제왕에 등극한 슈빙겐 선수는 역대 세 명이 기록되었다. 1900년, 1902년, 1905년에 우승한 한스 슈투키(Hans Stucki), 1966년, 1969년, 1974년에 우승한 루돌프 훈슈페르거(Rudolf Hunsperger), 1998년, 2004년, 2007년에 우승한 요르크 아브데르할덴(Jörg Abderhalden)이 그 주인공이다."
 swiss_flavor_events.21.f7: "\n\n스위스에는 슈빙겐 축제가 또 있다. 대표적인 축제로는 인터라켄 인근에서 개최되는 '운스푸넨-슈빙게트'(Unspunnen-Schwinget)와 취리히주에서 열리는 '클리히베르거 슈빙게트'(Kilchberger Schwinget)가 꼽힌다. 슈빙겐 선수가 이 두 대회와 연방권 대회에서 우승하면 '슈빙거그란트슬람'(Schwinger-Grand-Slam)이라 불린다."
 swiss_flavor_events.21.f8: "\n\n슈빙겐에서는 승리한다고 해서 점수를 얻는 것이 아니다. 두 선수가 무승부를 기록했지만 멋진 경기를 펼쳤다면, 지루한 경기보다 0.25점을 가산하여 적용받는다. 패배하더라도 용감하고 훌륭하게 싸웠다면 0.75점을 더 받는다."
 swiss_flavor_events.21.f9: "\n\n가장 권위있는 슈빙겐 축제는 산에서 개최되는 '베르크슈빙페스테' (Bergschwingfeste)다. 이 축제는 민속 축제로서 전통 음악 축제를 겸한다. 대표적인 베르크슈빙페스테는 '슈토스슈빙게트', '리기 슈빙 운트 엘플러페스트', '브뤼니히슈빙게트', '슈바르츠세-슈빙게트', 바이센슈타인-슈빙게트', '슈베갈프-슈빙게트'가 꼽힌다."
 dufour.2001.g: "축하드리오!"
 ticinese: "티치노"
 SONDERBUND: "존더분트"
 SONDERBUND_ADJ: "존더분트"
 rumantsch: "알프스 로망슈"
 dufour_ig_landowners_patricians_loc: "귀족층"
