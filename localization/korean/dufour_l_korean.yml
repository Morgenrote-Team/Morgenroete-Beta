 dufour.2100.t: "풍자화가 마르틴 디스텔리"
 dufour.2100.d: "올텐 출신의 화가이자 풍자화가인 [SCOPE.sCharacter('character_1_scope').GetFullName](이)가 자유주의 진영에 지대한 관심을 두고 있다. 그의 정치풍자화는 자유주의 진영에 큰 보탬이 될 것으로 보이는데, 그렇다면 우리에게는 선동가로 더 유용하지 않을까?"
 dufour.2100.f: "\"성난 가톨릭 사제에 관한 풍자화를 또 그려드리는 건 어떻겠소? 아무렴 바라시겠지요!\""
 dufour.2100.g: "자유주의 운동에는 찰진 풍자화가 필요하지!"
 dufour.2100.h: "그 자는 화가일 뿐이오!"
