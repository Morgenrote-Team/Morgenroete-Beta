l_simp_chinese:
 MFE_workplace_events.1.t:0 "矿难"
 MFE_workplace_events.1.d:0 "A horrible accident has occurred at the mine in [SCOPE.sState('mine_state').GetName]. Two people have died after an explosion at the [SCOPE.sState('mine_state').GetName] mine. Minor accidents like this happen all the time but this one was... different. All the local workers refuse to continue their duties until conditions have improved."
 MFE_workplace_events.1.f:0 "我亲眼所见，他们都被炸成了碎片，以最痛苦的方式变得粉身碎骨。我们不会再在这些矿井里工作了，根本不安全。"
 MFE_workplace_events.1.a:0 "That really is a shame, get them back to work immediately"
 MFE_workplace_events.1.b:0 "矿工和我们都是人！"
 MFE_workplace_events.1.c:0 "我们一开始就不该采矿"
 MFE_workplace_events.2.t:0 "煤坑里的女孩"
 MFE_workplace_events.2.d:0 "“装满矿石的背袋压抑着她单薄而脆弱的身体，多年的煤矿工作严重地摧残着她的身躯，就连挪动双脚也开始变得困难不已。在伸手难见五指的矿井中，她不小心滑了一跤，从此永远地倒在了那里。”\n\n又一位年轻女孩在我国某省的矿难中不幸丧生，这起特别的悲剧正在引起全国各地的广泛关注。"
 MFE_workplace_events.2.f:0 "他们简直不把我们当人看。"
 MFE_workplace_events.2.a:0 "她只是一个女孩……我们变成了什么样子"
 MFE_workplace_events.2.tt:0 "[SCOPE.sState('mining_state').GetName]人正在密谋一些险恶的事情……"
 MFE_workplace_events.3.t:0 "产量不足"
 MFE_workplace_events.3.d:0 "我们的一家军火工厂在过去三个月里出现了严重的产量短缺，由于担心引起投资者和当地工业巨头的恐慌，这一情况没有得到报告。通过用国家储备的材料来弥补工厂的损失，我们可以被视为挽救了当地的就业机会。"
 MFE_workplace_events.3.f:0 "打仗不给枪，开什么玩笑？！"
 MFE_workplace_events.3.a:0 "我们什么也做不了"
 MFE_workplace_events.3.b:0 "给他们点钱可能管用"
 MFE_workplace_events.4.t:0 "茶厂抢劫"
 MFE_workplace_events.4.d:0 "我国某产茶省的中央茶叶称重站日前遭到武装暴徒占领，部分当地人推测，省内茶农艰难的生活环境应当被推定为事件发生的主要诱因。当地经销商与零售者合谋蚕食茶农的利益，很可能促使他们为生活所迫洗劫称重站。无论事故起因究竟如何，我们必须着手解决这一状况。"
 MFE_workplace_events.4.f:0 "暴徒们在漆黑的夜里来了，杀了守卫，然后抢走了我们所有的绿茶。虽然他们留下了所有的红茶，但无论如何没人想喝。"
 MFE_workplace_events.4.b:0 "为了一杯茶，我愿意征服整个世界！ 必须找到那些暴徒。"
 MFE_workplace_events.4.ttt:0 "对抢劫案展开调查。"
 MFE_workplace_events.5.t:0 "老罐头"
 MFE_workplace_events.5.d:0 "军需总长报告称，他们在[SCOPE.sState('canning_state').GetName]的军队库存中发现许多先前被遗忘的罐头食品。尽管其中的内容物已历经不少岁月，似乎还算能吃，我们应该如何处理这15吨食品呢？"
 MFE_workplace_events.5.f:0 "我们在后面的角落里发现了这些罐头，上面的灰尘快有一米厚了。我们试着把罐头喂给老鼠来测试还能不能吃，老鼠确实可以吃。俗话说“老鼠会吃，工人也会吃”。"
 MFE_workplace_events.5.a:0 "恶心"
 MFE_workplace_events.5.b:0 "I'm sure we can find some people to eat that goop!"
 MFE_workplace_events.5.tt:0 "[SCOPE.sState('canning_state').GetName]的人口财富将会降低。"
 MFE_workplace_events.6.t:0 "牛瘟"
 MFE_workplace_events.6.d:0 "[SCOPE.sState('bovine_state').GetName]的牲畜中爆发了一种奇怪的流感，据报道这些牲畜集体死亡。当地卫戍部队的兽医已经在该省各行各业，试图采取一些措施来避免这种显然具有传染性的疾病的影响。虽然疾病本身最终会消散，但为数百名破产农民及其家庭报销的问题仍然需要关注。"
 MFE_workplace_events.6.f:0 "昨天早上我去了田野，看着我的牛，它们身上满是绿色的毛孔，其中渗出奇怪的紫色脓液。这些奶牛曾经多么值钱，现在我们只能寄希望于没察觉到牛所散发出的恶臭的[GetPopType('peasants').GetName]买下它们。"
 MFE_workplace_events.6.a:0 "给他们需要的任何帮助。"
 MFE_workplace_events.6.b:0 "我们爱莫能助。"
 MFE_workplace_events.6.c:0 "与邻国谈判，看看他们是否愿意帮助我们"
 MFE_workplace_events.7.t:0 "丝田之死"
 MFE_workplace_events.7.d:0 "蚕茧干瘪死亡，上面的细线不能正常凝结，一点微风就散了。丝田出了点问题，即使是我们最好的化学家也没能找到治疗困扰我们农场的疾病的方法。当地的丝绸农场主感到愤怒，呼吁政府采取行动。"
 MFE_workplace_events.7.f:0 "我们以前从未见过这种情况，所有的努力都化为乌有。一切都死了，所有的工人都绝望了，他们说没有丝绸就没有工作，没有工作就无法活命。"
 MFE_workplace_events.7.a:0 "[SCOPE.sCharacter('guilty_silk_field_owner').GetFullName]只需要关心[SCOPE.sCharacter('guilty_silk_field_owner').GetHerHis]的工作。"
 MFE_workplace_events.7.b:0 "[SCOPE.sCharacter('guilty_silk_field_owner').GetFullName]将为[SCOPE.sCharacter('guilty_silk_field_owner').GetHerHis]的无知付出代价。"
 MFE_workplace_events.7.tt:0 "[SCOPE.sCharacter('guilty_silk_field_owner').GetFullName]将被逮捕，而且[SCOPE.sCharacter('guilty_silk_field_owner').GetHerHis]的职务被解除。"
 MFE_workplace_events.8.t:0 "铁与血"
 MFE_workplace_events.8.d:0 "“这个时代的重大问题不是由多数人的发言和投票决定的，而是由铁和血决定的。”\n——奥托·冯·俾斯麦\n\n在[SCOPE.sState('iron_state').GetName]发现了一个新的、储量丰富的铁矿石矿脉。虽然储量丰富，但它也位于一个危险的深度，我们目前的采矿技术刚好覆盖这个深度。我们可以尝试将之开采，但这样做会付出鲜血甚至生命的代价。"
 MFE_workplace_events.8.f:0 "我们从来没有见过这样的东西，一个如此大的铁矿脉，可以使目前铁产量翻两番。所以我们派了几个人到那里去检查，并想办法把它开采出来。矿工们到了那里，但探测并不乐观，过去的十个矿工只有一个人回来了，而且只能勉强活着讲述那里发生的事情。"
 MFE_workplace_events.8.a:0 "给他们放几天假，送些援助"
 MFE_workplace_events.8.b:0 "谁在乎死几个人……滚回去干活儿！"
 MFE_workplace_events.9.t:0 "矿井悲剧"
 MFE_workplace_events.9.d:0 "今天对我们的工人来说又是一个悲惨的日子，据报道，[SCOPE.sState('iron_tragedy_state')]铁矿发生了一起事故，夺走了好几条生命。据报道，有几名工人受伤，有些人仍然失踪。据报道称，矿井中的一个有故障的支撑梁倒塌导致了事故。这一事件至少会引起当地对我们矿山工作条件的辩论。"
 MFE_workplace_events.9.f:0 "怎么会这样……"
 MFE_workplace_events.9.a:0 "那些该死的资本家……"
 MFE_workplace_events.9.b:0 "尽我们所能帮助工人。"
 MFE_workplace_events.9.c:0 "为什么我们不能回到简单的田野时代呢？"
 MFE_workplace_events.10.t:0 "棉花质量问题"
 MFE_workplace_events.10.d:0 "[SCOPE.sState('cotton_state').GetName]的棉花种植园生产的棉花在质量方面一直存在许多问题。有人说这是因为雨中有奇怪的东西，但真凶可能是任何东西……"
 MFE_workplace_events.10.f:0 "这垃圾玩意我才不会用，这怎么能叫棉花？！"
 MFE_workplace_events.10.a:0 "庄园主会使我们摆脱困境"
 MFE_workplace_events.10.b:0 "几个世纪以来，乡村民众一直在这样种棉花……"
 MFE_workplace_events.10.c:0 "宗教领袖将祈祷更好的棉花"
 MFE_workplace_events.11.t:0 "锅炉爆炸"
 MFE_workplace_events.11.d:0 "悲剧发生在今天的[SCOPE.sState('steamer_state').GetName]，一台蒸汽锅炉在为当地蒸汽机工厂承建的机器车间进行例行测试时发生爆炸。七名工人在爆炸中丧生，价值数千英镑的设备被毁。当地官员正在调查这家车间的工作条件，希望以后能避免这些事故，但目前，[SCOPE.sState('steamer_state').GetName]只能对她的死难表示哀悼。"
 MFE_workplace_events.11.f:0 "这太糟糕了，我们上周刚检查过那些锅炉，没想到居然爆炸了。"
 MFE_workplace_events.11.a:0 "这些只不过是进步的代价罢了。"
 MFE_workplace_events.11.b:0 "不应该剥削工人，强迫他们在这种条件下工作。"
 MFE_workplace_events.11.c:0 "机器很危险！工业本身就是一种癌症。"
 MFE_workplace_events.12.t:0 "狼藉的染厂"
 MFE_workplace_events.12.d:0 "今天数名工人在一家染色工厂丧生。事故发生于当一个装满高热染料的工业用桶突然溢出时，附近工人还在目瞪口呆时立即遭到波及。当地人对事件十分不安，声称是欠缺针对高热、危险工作场所工作的安全规范导致了事故，并敦促政府采取行动。数名侥幸逃离惨剧现场的幸存工人现在还沉浸在极度的痛苦中。"
 MFE_workplace_events.12.f:0 "我只是在工作……然后……我眼前一黑……醒来只有尸体"
 MFE_workplace_events.12.a:0 "每个人都需要染色！我们应该加大人手而不是规范！"
 MFE_workplace_events.12.b:0 "他们绝不能白白地在染料中泡死！"
 MFE_workplace_events.13.t:0 "油箱爆炸！"
 MFE_workplace_events.13.d:0 "[SCOPE.sState('oil_state').GetName]的一家精炼厂的某个燃料罐今日因未知原因爆炸。在随后的大火中七名工人死亡，公司损失了数千美元的财产。精炼厂的厂主已经将一切责任推卸至政府安全检查的缺失。"
 MFE_workplace_events.13.f:0 "这真是太糟糕了，前几天明明油流得很顺畅，突然就爆炸了，真可惜。"
 MFE_workplace_events.13.a:0 "[SCOPE.sCharacter('guilty_oil_owner').GetFullName]只做[SCOPE.sCharacter('guilty_oil_owner').GetHerHis]工作"
 MFE_workplace_events.13.b:0 "[SCOPE.sCharacter('guilty_oil_owner').GetFullName]不会继续[SCOPE.sCharacter('guilty_oil_owner').GetHerHis]的无知"
 MFE_workplace_events.13.tt:0 "[SCOPE.sCharacter('guilty_oil_owner').GetFullName]将被逮捕……"
 MFE_workplace_events.14.t:0 "炼油厂生产过剩"
 MFE_workplace_events.14.d:0 "我国一家精炼厂最近运作得相当好以至于它的产量已经超过了预计定额数千加仑。因为已经无法再储存这么多，精炼厂已经向政府提出了一项以低价卖出燃油的交易。我们可以为自己买燃油，或者拒绝他的提议让廉价燃油流入市场。廉价燃油应该会让当地人高兴，但是或许我们也要用到燃油。"
 MFE_workplace_events.14.f:0 "流动的黑色黄金！"
 MFE_workplace_events.14.a:0 "石油是未来的燃料！"
 MFE_workplace_events.14.b:0 "将资金用于更多……合法事务"
 MFE_workplace_events.15.t:0 "老人与海"
 MFE_workplace_events.15.d:0 "一位在[SCOPE.sState('fishing_state').GetName]海岸的渔民[SCOPE.sCharacter('fisherman').GetFullName]今天带来了大量的渔获量。他的拖网渔船停泊在港口时，几乎装满了海洋最富饶的财富，很快其他渔民也能重复他的例子。看来，今年[SCOPE.sState('fishing_state').GetName]的捕鱼情况异常好。"
 MFE_workplace_events.15.f:0 "几天前，我在海岸边看到[SCOPE.sCharacter('fisherman').GetFullName]。他像着了魔一样把鱼钓上来，在一个小时内就有快五十条鱼被钓上他的船。他不得不返回[SCOPE.sState('fishing_state').GetName]，只是因为船被他捕到快要沉了。当他上岸的时候，他钓到的大部分鱼可以养活一个九口之家一个月！"
 MFE_workplace_events.15.a:0 "难道我们能干涉吗？这真是太神奇了"
 MFE_workplace_events.15.b:0 "[SCOPE.sState('fishing_state').GetName]的人民将拥有世界上最便宜的鱼"
 MFE_workplace_events.16.t:0 "炸药爆炸"
 MFE_workplace_events.16.d:0 "[SCOPE.sBuilding('explosion_building').GetName]炸药仓库发生火灾，引发大规模爆炸，有人说，从一路到[SCOPE.GetRootScope.GetCountry.GetCapital.GetName]都能听到爆炸声。破坏是巨大的，据报道附近有数百人丧生。随着火势在城市蔓延，消防部门需要优先考虑：火势有可能向北蔓延到富裕的[SCOPE.sBuilding('explosion_building').GetName]社区，向南蔓延到贫困地区。到底会向哪里去呢？"
 MFE_workplace_events.16.f:0 "几个在[SCOPE.sBuilding('explosion_building').GetName]的工人警告说，炸药会爆炸，但没有人相信他们，直到……"
 MFE_workplace_events.16.a:0 "立即修复工厂！"
 MFE_workplace_events.16.b:0 "什么都没有了，除了瓦砾，还能做什么……"
 MFE_workplace_events.17.t:0 "高档家具"
 MFE_workplace_events.17.d:0 "“女士，也许这张椅子？由巴西红木做成，嵌以精致的努比亚式样的肯尼亚象牙。你也可以在皮革上观察到丰富的大理石花纹。你不会在全[SCOPE.GetRootScope.GetCountry.GetName]找到另一张像这样的椅子了！”\n\n[SCOPE.GetRootScope.GetCountry.GetName]生活水平的提高已经使人们对更好更优雅的家具的需求量增长。既然连人民的家居都变漂亮了，那么显然我们的政府办公室也应该进行升级以更好地适应现代标准。"
 MFE_workplace_events.17.f:0 "人们曾经以为如此美丽的家具是不可能存在的，简直太神奇了！"
 MFE_workplace_events.17.a:0 "鼓励生产！"
 MFE_workplace_events.17.b:0 "有钱人会喜欢那些桌子！"
 MFE_workplace_events.18.t:0 "恶臭的工厂"
 MFE_workplace_events.18.d:0 "我国[SCOPE.sState('stinking_state').GetName]居民正在抱怨当地化肥厂散发出的恶臭，负责该省预算的审计人员却可能把这股异味奉若玫瑰，遗憾的是，这笔额外的税款大概没能让周围更多人感到鼻子好受些。我们可以顺应民意制定法规要求当地工厂修订作业流程，但如此而为很可能激怒当地的工业领袖。"
 MFE_workplace_events.18.f:0 "今天早上我醒来走上街头，我闻过的最腐臭的气味扑面而来。这种令人作呕的恶臭似乎不可能真的存在，但至少有一点是清楚的——它来自化工厂。"
 MFE_workplace_events.18.a:0 "可惜庄稼不会自己生长。"
 MFE_workplace_events.18.b:0 "我们应该考虑一些地方上的限制。"
 MFE_workplace_events.19.t:0 "帆船热潮"
 MFE_workplace_events.19.d:0 "我国某沿海省份的码头边嘹亮着铁锤与锯子的喧嚣声，当地造船厂正努力实现世界各地涌现出的对快速帆船的新订单。高效的工作流程与管理制度配合上卓越的造船工艺与航海技术，他们每年都能生产出更多更好的船只！这些可敬的人完全可以满足于现有的荣耀，但正如先贤所言，未来是难以琢磨的。"
 MFE_workplace_events.19.f:0 "这些船是世界上最好的，看看它们吧，帆在阳光下闪闪发光，美得不可思议。"
 MFE_workplace_events.19.a:0 "让我们欢庆！"
 MFE_workplace_events.19.b:0 "建立海军学校"
 MFE_workplace_events.20.t:0 "[SCOPE.sState('radio_state').GetName]电台"
 MFE_workplace_events.20.d:0 "[SCOPE.sState('radio_state').GetName]地方电台正面临着发射机无线电部件短缺的问题，并被迫停止广播，直到情况得到解决。地方当局建议把政府的一些无线电设备借给电台，因为它担心前线没有消息会引起当地民众的恐慌。"
 MFE_workplace_events.20.f:0 "你听说了吗，前几天[SCOPE.sState('radio_state').GetName]的广播电台坏了。谁知道目前的战争发生了什么……"
 MFE_workplace_events.20.a:0 "我们没有多余的"
 MFE_workplace_events.20.b:0 "给他们收音机"
 MFE_workplace_events.4.a: "我们不需要茶。"
 robbed_tea_station_mod: "洗劫茶栈"