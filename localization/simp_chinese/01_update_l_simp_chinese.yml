 douglas.211.t: "峰会" #deepl:3152681021
 douglas.211.d: "经过艰苦的攀登，这群登山者终于到达了山顶。[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] ，他是第一个登上这个[ROOT.GetCountry.GetNameNoFormatting] 。现在，他们只能细细品味这胜利的时刻。" #deepl:2761012191
 douglas.211.f: "'你们要问的第一个问题，也是我必须尝试回答的问题是：'攀登珠穆朗玛峰有什么用？'我的回答必须是：'没有用。哦，我们可能会学到一点关于人体在高海拔地区的行为的知识，医学专家可能会把我们的观察结果用于航空目的。但除此之外，我们将一无所获。我们不会带回一点金银，不会带回一颗宝石，也不会带回任何煤或铁。我们也找不到一尺能种庄稼养活食物的土地所以，如果你不能理解，人的内心深处有某种东西在回应这座山的挑战，并去迎接它，这种挣扎就是生命本身向上、永远向上的挣扎，那么你就不会明白我们为什么要去。我们从探险中得到的只是纯粹的快乐。我们活着不是为了吃饭和赚钱。我们吃饭赚钱是为了能够享受生活。这才是生活的意义，生活的目的。" #deepl:2116445992
 douglas.211.g: "让我们享受黎明吧" #deepl:3916807741
 douglas.212.t: "登山中止" #deepl:2889222354
 douglas.212.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]的登山尝试暂时失败。我们的登山者被迫放弃冒险，返回。" #deepl:641296697
 douglas.212.f: "登山者放弃攀登可能有多种原因。有时，天气的变化就足以让人放弃；有时，一条本应通往山顶的道路被证明过于险峻。由于一天中的某些时间段和变化使登山变得困难或不可能，登山者往往需要花费太长时间并超出时间窗口。有时，你只是选择了一条错误的道路。" #deepl:430022267
 douglas.212.g: "令人失望。" #deepl:1131565686
 douglas.213.t: "登山灾难" #deepl:285221578
 douglas.213.d: "在攀登[SCOPE.sState('douglas_location_scope').GetName] 的山峰时，[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] 犯下了一个可怕的错误，导致探险队以一场灾难告终--数人丧生，补给品和设备随之坠落。举国震惊！" #deepl:2272067559
 douglas.213.f: "'你明白吗，每天晚上，我都会看到我在马特洪峰的战友们仰面滑下，他们伸出手臂，一个接一个，在相等的距离上，秩序井然--先是向导克罗兹，然后是哈道，接着是哈德逊，最后是道格拉斯。是的，我将永远看到他们......"--爱德华-怀姆珀" #deepl:3038127729
 douglas.213.g: "一场悲剧" #deepl:1503732790

