 je_gaudi_capital_expansion_project: "资本扩张" #deepl:4033066520
 je_gaudi_capital_expansion_project_reason: "1836 年至 1936 年间，维多利亚时代的各国首都经历了深刻的城市变革。奥斯曼（Hausmann）设计的宽阔林荫大道和轴向景观重塑了巴黎。维也纳在 1857 年拆除了城墙，取而代之的是宏伟的环形大道。柏林迅速扩张，出现了公寓楼、工业区以及后来的现代主义住宅区。伦敦通过郊区铁路、基础设施项目和世界上第一条地铁向外扩张。在整个欧洲大陆，皇家城市演变成现代大都市--权力、野心和日益紧张的社会关系的象征。" #deepl:4052914498

 gaudi.41.t: "不受约束的城市" #deepl:1231776512
 gaudi.41.d: "旧墙倒塌。取而代之的是空气、光线和成长的希望。" #deepl:2117769530
 gaudi.41.f: "几个世纪以来，[ROOT.GetCountry.GetCapital.GetCityHubName] ，傲慢、紧凑、自成一体。中世纪的防御工事已被拆除。取而代之的是宽阔的林荫大道，两旁绿树成荫，高贵的外墙鳞次栉比。集市上的马车和漫步的情侣现在都踏上了曾经卫兵行军的地方。这些林荫大道不仅仅是道路，它们还是一种宣言：一种信心，一种扩张，一种大到无法容纳的未来。但是，[ROOT.GetCountry.GetCapital.GetCityHubName] ，它终于做了第一次深呼吸。" #deepl:4076900735
 gaudi.41.g: "我们以远见和活力向外拓展" #deepl:1116241139
 gaudi.42.t: "进步之环" #deepl:3156235256
 gaudi.42.d: "新的环形林荫大道将城市和州连接在一起。" #deepl:3367270166
 gaudi.42.f: "昔日泥泞不堪的堤坝，如今已变成了铁石结构。这条伟大的大道就像一条项链，环绕着[ROOT.GetCountry.GetCapital.GetCityHubName] 的中心地带，将这里的各个地区紧紧地联系在一起。这可不是简单的修路工程。整个街区都被重新描绘，公园被雕刻出来，纪念碑被镶嵌在完美的透视图中。煤气灯在黄昏时绽放，就像有序的星星。每铺设一米，[ROOT.GetCountry.GetCapital.GetCityHubName] 就变得更加清晰--更加帝王般的气派。人们呢？他们在从未见过的雕像前漫步，在他们曾经害怕走的街道上散步。" #deepl:3543082084
 gaudi.42.g: "这枚戒指不是用来防御的，而是用来指引方向的。" #deepl:2497263912
 gaudi.43.t: "权力途径" #deepl:4104296278
 gaudi.43.d: "新的 "完美 "重塑了[ROOT.GetCountry.GetCapital.GetCityHubName]--一次一轴。宽阔、笔直、毫不妥协。" #deepl:2867872335
 gaudi.43.f: "This is not expansion.整个街区都倒在了指南针和计划之下。街道像林荫大道一样穿过曾经像迷宫一样的街区。古老的小巷消失了。[ROOT.GetCountry.GetCapital.GetCityHubName] 现在说的是秩序语言：可见度、流通、控制。穷人称之为'大扫除'，官员称之为'现代化'。官员们称之为'现代化'。省长称之为必要。" #deepl:4133801679
 gaudi.43.g: "不要让任何人逃脱计划" #deepl:2017759053
 gaudi.44.t: "大都市地平线" #deepl:3803938371
 gaudi.44.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] 不再仅仅是一个首都。它正在成为世界的缩影。" #deepl:101717450
 gaudi.44.f: "旧城有棱角，而这座城市没有。钢筋和玻璃刺穿了石头曾经占主导地位的地方。铁路线在公共花园下交错。电灯模糊了黄昏与黎明的界限。大使馆、银行、画廊和咖啡馆就像兰花一样在新时代的铁温室中绽放。摩天大楼向大教堂发起挑战。[ROOT.GetCountry.GetCapital.GetCityHubName] ，它不再要求发展的许可，而是期望引领发展。从每一个地区都可以看出一个事实：这不再是一个国家的城市，而是一个民族的城市。它是一个国家的城市。" #deepl:3494578230
 gaudi.44.g: "我们站起来，因为世界已经在注视着我们。" #deepl:1129952378

