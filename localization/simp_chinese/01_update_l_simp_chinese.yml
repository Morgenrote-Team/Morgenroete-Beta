 je_gaudi_bauhaus_architecture: "包豪斯建筑" #deepl:2452320752
 je_gaudi_bauhaus_architecture_reason: "包豪斯（Bauhaus）是一所德国艺术学校，于 1919 年至 1933 年间运营，它将手工艺与美术相结合。这所学校因其设计方法而闻名，它试图将个人的艺术构想与大规模生产和强调功能的原则统一起来。它的理念是创造一个综合艺术品（Gesamtkunstwerk），最终将所有艺术融合在一起。包豪斯风格后来成为现代设计、现代主义建筑和建筑教育中最具影响力的潮流之一。" #deepl:1381087306
 je_gaudi_neoclassical_architecture: "新古典主义建筑" #deepl:3915160230
 je_gaudi_neoclassical_architecture_reason: "20 世纪初的新古典主义是一场复兴主义的建筑和艺术运动，旨在重新找回古希腊罗马时期形式上的清晰、对称和宏伟。这种风格强调纪念性、几何秩序，以及在理性的、通常是国家认可的成语中使用传统形式。它与国家身份和公民建筑紧密相连，体现了永恒、权威和严谨之美的理想。" #deepl:2628512539
 je_gaudi_art_deco_architecture: "装饰艺术建筑" #deepl:2695214977
 je_gaudi_art_deco_architecture_reason: "装饰艺术运动兴起于 20 世纪 20 年代，作为一种装饰和建筑风格，它在拥抱现代性的同时保留了古典秩序的元素。装饰艺术风格的特点是使用风格化的形式、丰富的材料和装饰性的几何图形，它将华丽的手工艺与新兴的机器美学结合在一起。它从工业、速度和异国情调中汲取灵感，通过图案来颂扬技术进步和城市活力。" #deepl:2018331500

 je_gaudi_splendour_bauhaus: "包豪斯的胜利" #deepl:1539285104
 je_gaudi_splendour_bauhaus_reason: "随着包豪斯精神的引入，建筑师们开始摒弃装饰和虚幻，转而追求清晰、精确和真实的材料。其目的不再是通过奢华来给人留下深刻印象或唤起过去帝国的宏伟，而是通过创造实用、诚实和现代的空间来为社会服务。包豪斯不仅是一种美学，更是一种设计哲学，其信念是建筑与日常生活必须通过简洁、实用以及形式与目的的统一来协调。采用包豪斯原则的首都不仅标志着现代化，而且标志着最纯粹的进步：功能高于外观，创新高于传统。" #deepl:3357423326
 je_gaudi_splendour_neoclassical: "新古典主义复兴" #deepl:3536136445
 je_gaudi_splendour_neoclassical_reason: "新古典主义风格植根于古代的理性和谐，植根于圆柱、花饰和对称布局的建筑语法。然而，在 20 世纪初，新古典主义以现代建筑技术、更简洁的线条和往往是纪念碑式的规模重新诠释了这一风格。它不仅代表着传统，也代表着对未来的严谨展望--在未来，公共生活、法律和文化将由能激发敬畏和团结的建筑来构筑。秉承这些原则的建筑将赋予首都庄严和宏伟的气质，使其成为世界眼中秩序、坚韧和力量的灯塔。" #deepl:605890088
 je_gaudi_splendour_art_deco: "装饰艺术之梦" #deepl:1198646901
 je_gaudi_splendour_art_deco_reason: "随着装饰艺术的引入，建筑师们在艺术界掀起了一场革命，例如打破了过去僵化的历史主义。但与许多现代流派不同的是，他们的建筑并不是单纯的功能性和客观性的体现。装饰艺术是在古典现代主义普遍觉醒的背景下发展起来的，它将优雅的形式、珍贵的材料、强烈的色彩和感性的主题创造性地结合在一起。在其鼎盛时期，它代表着奢华、魅力、奔放以及对社会和技术进步的信念。尊重这些原则的建筑将使我们的国家成为现代性和财富的象征。" #deepl:980834049

