 douglas.101.t: "登山俱乐部成立" #deepl:222126293
 douglas.101.d: "[SCOPE.sCharacter('douglas_president_scope').GetFullName] 呼唤--山峰回应。登山俱乐部的成立标志着所有志存高远者的新纪元。" #deepl:4067420597
 douglas.101.f: "[SCOPE.sCharacter('douglas_president_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('douglas_president_scope').GetLastName] [SCOPE.sCharacter('douglas_president_scope').GetHerHim] 经历了风暴和雪崩--但现在，[SCOPE.sCharacter('douglas_president_scope').GetSheHe] 试图继承[SCOPE.sCharacter('douglas_president_scope').GetHerHis] 的传统。在[ROOT.GetCountry.GetCapital.GetCityHubName] ，[SCOPE.sCharacter('douglas_president_scope').GetSheHe] 成立了登山俱乐部[GetPlayer.GetName] ，他不是独自一人，而是与一位前途无量的新人并肩作战：[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] [SCOPE.sCharacter('douglas_president_scope').GetFullName] 从[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHim] 身上看到的不仅仅是雄心壮志，还有未来的传奇。他们一起站在通往登顶之路的门槛上，这条路不仅通向顶峰，而且通向荣耀、勇气--也许还通向历史的一席之地。俱乐部向所有听到高山召唤的人开放。攀登开始了。" #deepl:3771164746
 douglas.101.g: "大山在召唤" #deepl:249284577

 douglas.102.t: "阿尔卑斯俱乐部" #deepl:1599559370
 douglas.102.d: "阿尔卑斯山俱乐部于[ROOT.GetCountry.GetCapital.GetCityHubName] [TimeKeeper.GetCurrentDate.Format('y')] 正式成立，被公认为世界上第一个国际登山组织。它的成立标志着现代登山运动在制度上的开端。" #deepl:3982546221
 douglas.102.f: "历史上，1857 年，一群英国绅士聚集在伦敦，成立了一个专门从事登山运动的俱乐部。在约翰-波尔（John Ball）和爱德华-肯尼迪（Edward Kennedy）等人的领导下，阿尔卑斯俱乐部致力于促进对阿尔卑斯山的系统探索，将体能挑战与地理和自然研究相结合。俱乐部为登山者分享知识、组织探险和培养群体意识提供了一个结构化的框架。俱乐部成员在后来被称为 "阿尔卑斯黄金时代 "的过程中发挥了关键作用，他们实现了无数次首次登顶，并记录了自己的经历。此后不久，《阿尔卑斯杂志》开始出版，为新兴的登山文学做出了贡献。阿尔卑斯山俱乐部的成立为全世界有组织的登山运动奠定了基础，并为登山探险设定了永恒的标准。" #deepl:4126383378
 douglas.102.g: "一起登顶" #deepl:2506053391

