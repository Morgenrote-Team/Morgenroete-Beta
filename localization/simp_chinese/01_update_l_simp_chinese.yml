 gaudi.35.d: "新的艺术发展并没有止步于[SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName] ：在这个如今被视为前卫街区的街区里，新艺术运动风格的建筑不断涌现。" #deepl:3696139674
 gaudi.35.f: "伴随着布鲁塞尔新艺术风格建筑的首次亮相，新艺术风格的装饰艺术也随之兴起。重要的艺术家包括古斯塔夫-斯特劳文（Gustave Strauven），他用锻铁在布鲁塞尔的外墙上营造出巴洛克式的效果；家具设计师古斯塔夫-塞鲁里耶-博维（Gustave Serrurier-Bovy），他以设计极富创意的椅子和铰接式金属家具而闻名；珠宝设计师菲利普-沃尔弗斯（Philippe Wolfers），他制作了蜻蜓、蝴蝶、天鹅和蛇造型的珠宝。这种风格很快受到邻国法国的关注。赫克托-吉马尔（Hector Guimard）在参观了奥尔塔的塔塞尔酒店后，建造了贝朗热尔城堡（Castel Béranger），这是巴黎第一批采用这种新风格的建筑。巴黎人对吉马尔独创的如诗如画的风格表示欢迎；贝朗热城堡被选为巴黎最好的新外墙之一，开启了吉马尔的职业生涯。1900 年巴黎世博会标志着新艺术的高潮。在 1900 年 4 月至 11 月期间，它吸引了来自世界各地的近 5000 万游客，展示了新艺术风格的建筑、设计、玻璃制品、家具和装饰品。虽然巴黎世博会是迄今为止规模最大的世博会，但其他世博会也在很大程度上普及了新艺术风格。" #deepl:3102882922
 gaudi.35.g: "充满活力的新文化" #deepl:3379987285

 gaudi.22.t: "线条与测量" #deepl:2020920879
 gaudi.22.d: "我们的建筑师回来了，这次他手持测量仪，用新的眼光来观察这片土地。" #deepl:505021070
 gaudi.22.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] 他曾满足于在城市广场上勾勒外墙，描摹阴影和装饰。现在， ，在大地上画出线条。在 旅行期间， ，他放弃了城市，选择了腹地。在加利西亚的荒野、波河三角洲的沼泽地以及中部地区的铁路沿线， 与工程师、农民和工头一起行走。 学会了阅读地形，就像其他人阅读经文一样。   现在谈论的是坡度和大地测量点。 的笔记本上写的不是华丽的词藻，而是精确到英寸的角度、高度和距离。有人说， 变得枯燥乏味--过于严谨，过于刻板。但是，当 望向空旷的田野时， 已经看到了大道可能延伸的方向。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U][ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] " #deepl:3503840059
 gaudi.22.g: "一座建筑早在奠基之前就已开始。" #deepl:960677900
 gaudi.23.t: "最重要的建筑师" #deepl:2805524520
 gaudi.23.d: "经过两年的学习，我们的建筑师回到了[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] ，他的思维更加敏锐，[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] 图纸更加陌生。" #deepl:3720893
 gaudi.23.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] 曾经凭直觉画草图。现在， 用逻辑画草图。 在 度过的时光不是在砖瓦匠或建筑工人中间，而是在演讲厅里。在巴黎、哥廷根，甚至圣彼得堡， ，坐在写满符号的黑板下，师从那些不用双手建造，却用头脑建造一切的人。 ，现在谈论的是对称性、模数、用优雅公式描述的荷载曲线。 ，新的图纸简洁、奇怪，精确度几乎与世隔绝。对某些人来说，它们显得冷酷无情，毫无人性可言。但是， 解释说：穹顶的美不在于它的装饰，而在于它完美的曲线。\nnn官员们不知道该如何处理 。 同事们窃窃私语，说这不切实际。但其他人--尤其是年轻人--在倾听。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe][ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] " #deepl:796837829
 gaudi.23.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 建造别人只能想象的东西" #deepl:2581034432
 gaudi.24.t: "先纸后石" #deepl:3533867777
 gaudi.24.d: "我们的建筑师不是带着工具或方程式回来的，而是带着印章、签名和官员网络回来的。" #deepl:223531508
 gaudi.24.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 在国外的两年时间里， 不仅学习了建筑， 还学习了行政管理。 了解到一个项目的生死如何不取决于设计，而是取决于法令。在维也纳， 观看了各部委的工作；在布鲁塞尔， 跟随许可证办事员；在马赛， 参加了下水道决定天际线的议会会议。现在，回到国内， 知道什么时候该提交哪些文件，该引用哪些法规，该奉承谁，该忽视谁。 说，规则不是墙壁，而是脚手架--它们可以移动、软化、重构。不知何故，许可证比以往任何时候都来得快。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe][ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] " #deepl:3047390249
 gaudi.24.g: "每一个伟大的结构都始于一份已签署的表格。" #deepl:3498658136
 gaudi.25.t: "建筑师归来......最终" #deepl:2911431628
 gaudi.25.d: "我们的建筑师终于从[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] 盛大巡游归来。没有人知道[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 带回来了什么--除了故事。" #deepl:3640320352
 gaudi.25.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 带着雪茄和趣闻轶事回来了。 有名字可说，有意见可提，还有债务 假装不记得。 说得很好听，甚至令人信服-- 从未测量过结构。当被问及计划时， 转移话题。有人说 是个骗子，也有人说 是个被误解的天才。也有人说 是被误解的天才。真相是什么？可能就在的里雅斯特的一家咖啡馆和那不勒斯的一列错过的火车之间。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe][ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] " #deepl:3339735037
 gaudi.25.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] 这段时间都在做什么？" #deepl:3328871879
 gaudi.26.t: "在大师的阴影下" #deepl:1494314704
 gaudi.26.d: "我们的建筑师回来了，他变得更聪明、更稳健，并带有一位伟大教师的印记。" #deepl:2040369888
 gaudi.26.f: "当其他人四处奔波时，[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] 选择了深度而非距离。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] ，他的大部分时间都是在一位人物的指导下度过的--这位年迈的建筑师具有传奇色彩。不只是在演讲厅，而是在脚手架上，在沉默中，[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] ，他学会了洞察装饰背后的结构、立面背后的意图。[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] ，线条更加简洁。[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] ，目光更加挑剔。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] ，他不仅学会了如何建造，还学会了为什么建造。[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] 师徒关系的消息早在[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] 之前就已传开。年轻的学徒们已经开始寻找[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] ，而市政官员们则以意想不到的恭敬态度迎接他。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 以一个具有连续性、传统性，或许还有一天具有传承性的人的身份回归。" #deepl:833263334
 gaudi.26.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 承载着他人智慧的重量" #deepl:1891012360

