 lepsius.1326.t: "海德堡智人完成" #deepl:2121693630
 lepsius.1326.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] 已收集到足够的骨骼，可以对这一灭绝物种得出具体结论。海德堡智人不再是科学之谜，现在可以在一定程度上确定其在人类家谱中的位置，尽管还有许多问题没有得到解答。" #deepl:4182329393
 lepsius.1326.f: "海德堡智人的下颌于 1907 年由工人丹尼尔-哈特曼（Daniel Hartmann）在海德堡附近毛尔（Mauer）附近的一个沙坑中发现，并于 1908 年由解剖学家奥托-肖滕萨克（Otto Schoetensack）进行了描述；这一发现距今约 60 万年，被认为是欧洲早期人类最古老的证据，在形态上介于直立人和智人之间，表明这种人类形态广泛分布于非洲、欧洲和亚洲，并且由于其坚固程度和估计的脑容量，可以得出有关高级身体适应、工具使用和社会组织的结论。" #deepl:2078634084
 
 lepsius.1336.t: "海德堡人" #deepl:140239375
 lepsius.1336.d: "一名工人在海德堡附近小镇毛尔的一个矿井里有了惊人的发现。海德堡大学的一位教授立即意识到了它的价值。" #deepl:3838910430
 lepsius.1336.f: "海德堡智人的下颌于 1907 年由工人丹尼尔-哈特曼（Daniel Hartmann）在海德堡附近毛尔（Mauer）附近的一个沙坑中发现，并于 1908 年由解剖学家奥托-肖滕萨克（Otto Schoetensack）进行了描述；这一发现距今约 60 万年，被认为是欧洲早期人类最古老的证据，在形态上介于直立人和智人之间，表明这种人类形态广泛分布于非洲、欧洲和亚洲，并且由于其坚固程度和估计的脑容量，可以得出有关高级身体适应、工具使用和社会组织的结论。" #deepl:2078634084

