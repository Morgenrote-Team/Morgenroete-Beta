 douglas.103.t: "山地部队团" #deepl:459726214
 douglas.103.d: "由于在征服山地和山地防御方面有着丰富的经验，[SCOPE.sCharacter('douglas_mountain_veteran').GetFullName] ，他决定利用自己高超的技能创建一支精锐的山地部队。" #deepl:3198382874
 douglas.103.f: "Gebirgsjäger、Alpini 或 Chasseurs Alpins 只是一些国家专门从事高地作战的精锐部队的几个例子。阿尔皮尼部队成立于 1872 年，是世界上历史最悠久的现役山地步兵。他们最初的任务是保护意大利与法国和奥匈帝国的边境。" #deepl:3963027024
 douglas.103.g: "他们将把他的遗产传承到未来。" #deepl:1701012348

