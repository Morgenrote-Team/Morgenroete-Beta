 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON_TT: "#T 登山探险：1 级登顶#!\n这一类山峰可以使用 1 级登山装备攀登。级别并不表示海拔高度或风险。这些山峰包括惠特尼峰、Citlaltépetl 峰、Popocatépetl 峰、钦博拉索峰、Pico Aneto 峰、勃朗峰、Großvenediger 峰、喀麦隆峰、Ras Dashen 峰和 Giluwe 峰。更多信息，请访问[concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1466134091
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON: "登山探险：2 级登顶" #deepl:4123645909
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON_TT: "#T 登山探险：2 级登顶#!\n这一类山峰可以使用 2 级登山装备攀登。级别并不表示海拔高度或风险。这些山峰包括基博峰（乞力马扎罗峰）、杜福斯皮采峰、库克山和威廉山。更多信息，请访问[concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3695051657
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON: "登山探险：3 级登顶" #deepl:2737423148
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON_TT: "#T 登山探险：3 级登顶#!\n这一类山峰可以使用 3 级登山装备攀登。级别并不表示海拔高度或风险。这些山峰包括伊利亚斯山（Mount Elias）、阿空加瓜山（Aconcagua）、维尔特山（Aiguille Verte）、马特洪峰（Matterhorn）、肯尼亚山（Batian）和斯坦利山（Mount Stanley）。更多信息，请访问[concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2490101940
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON: "登山探险：4 级登顶" #deepl:2827790528
