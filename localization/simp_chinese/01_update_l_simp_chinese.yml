 gaudi.81.t: "建筑大师作品" #deepl:681011782
 gaudi.81.d: "近年来，[THIS.GetCountry.GetName] 已崛起为建筑领域的领先国家之一。[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] 在这一发展过程中发挥了重要作用。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 接受委托，设计一座可与古代、中世纪和现代伟大奇迹相媲美的纪念碑。" #deepl:2672646441
 gaudi.81.f: "The Architect's Monument is based on the preferred style of the Great Architect： \n\nArt Deco Architects will design the[GetBuildingType('building_gaudi_people_monument').GetName].\nBauhaus Architects will offer the[GetBuildingType('building_gaudi_forum_monument').GetName].\nNeoclassical Architects will create the[GetBuildingType('building_gaudi_people_palace').GetName]." #deepl:4088582525
 gaudi.81.g: "壮观。" #deepl:573443058

