 douglas.111.t: "第一步" #deepl:1387851608
 douglas.111.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] 为队员们配备基本的登山装备。" #deepl:1200110309
 douglas.111.f: "即兴登顶的时代已经过去。在[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] 的指导下，队员们领到了第一批标准化装备：绳索、冰镐、冰锥和结实的背包。这些工具不仅仅是救生工具，它们还重塑了人们对高山的认识。登山变得更有条理，更有计划。过去，勇气和蛮力才是最重要的，而现在，技术和准备工作占据了中心位置。对于任何敢于进入无情的冰雪和岩石世界的人来说，这一步虽然不大，但却具有划时代的意义。" #deepl:444296823
 douglas.111.g: "现在，大山属于有准备的人。" #deepl:660628980
 douglas.112.t: "绳索捆绑" #deepl:263345135
 douglas.112.d: "我们的登山家[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] 有一个新想法：为了提高安全性，我们引入了固定绳索小组。" #deepl:3311883976
 douglas.112.f: "在高山上迈出的每一步都充满风险，但现在，没有人再独自攀登。绳索登山队的引入标志着思维方式的转变：不再是个人与山峰的对抗，而是由信任--由编织绳--团结起来的登山者链。这种变化带来了秩序、纪律和深刻的共同责任感。如果一个人摔倒了，其他人会扶住他。危险并没有消除，而是被重新分配了。这座山仍然充满野性，但我们对它的回应不再是英雄式的，而是合作式的。" #deepl:1978213156
 douglas.112.g: "一根绳子一个意愿一个团队" #deepl:1569127386
 douglas.113.t: "脆弱的身体" #deepl:3178580481
 douglas.113.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] 坚持为团队引入急救系统。" #deepl:887703212
 douglas.113.f: "水泡、骨折、冻伤--高山毫不留情。曾经被认为是风险的一部分，现在却得到了系统的治疗。一个小药箱，只要使用得当，就能救人一命。快速搭建的避难所可以赢得时间。基本医疗知识首次成为培训的一部分。山区仍然需要一切，但随着急救包和应急计划的引入，队员们的反应比以往更加果敢。人体不再被忽视，而是得到了保护。" #deepl:563827659
 douglas.113.g: "再坚强的人也会倒下。" #deepl:4107036891
 douglas.114.t: "石头说话" #deepl:2102994496
 douglas.114.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] 在登山运动中引入了科学方法：引入地质知识，改进地形分析。" #deepl:3612073372
 douglas.114.f: "曾经看似背景的东西--泡沫、沉积物、岩石--现在变成了可以读懂的语言。一位团队成员带来了地质方面的专业知识：地层揭示了古代的运动，岩石类型警示着雪崩，断层线指引着安全路线。大山不再是神话，而是档案。科学带着笔记本和锤子来到这里，突然之间，探险不仅仅是冒险，而是实地研究。这是一种新的观察方式--一场静悄悄的革命。" #deepl:1873707756
 douglas.114.g: "让我们先学习，再攀登。" #deepl:3896308340
 douglas.115.t: "高空呼吸" #deepl:1444940126
 douglas.115.d: "为什么不把化学战的经验用于登山运动呢？新技术允许在极高的地方使用氧气面罩。" #deepl:2351243748
 douglas.115.f: "超过一定高度，天空就会变得稀薄。呼吸变得艰难，身体发出抗议但现在，在机械设备的帮助下，人类到达了他们从未到达过的地方。氧气面罩--曾经的科学奇观--成为标准配置。它们重新定义了可能性的极限。海拔 7000 米以上的世界变得触手可及，但也付出了代价：登山者不再是真正的孤身一人，而是生命支持系统的一部分。征服高山的胜利并没有减少，只是变得更加寒冷。" #deepl:689433627
 douglas.115.g: "我们用人工呼吸，但我们胜利了。" #deepl:53945526

