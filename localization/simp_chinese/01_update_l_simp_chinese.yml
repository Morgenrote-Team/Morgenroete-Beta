 MR_ALPINE_CLUB_BUTTON_TT: "#T 成立阿尔卑斯俱乐部#!\n阿尔卑斯俱乐部于 1857 年在伦敦成立，是世界上历史最悠久的登山组织。它的成立标志着维多利亚时代英国有组织登山运动的开始。该俱乐部旨在促进对阿尔卑斯山的科学、地理和体育探索。该俱乐部的创始成员之一是爱德华-怀恩佩尔，他于 1865 年完成了马特宏峰的首次攀登。阿尔卑斯俱乐部在 "阿尔卑斯黄金时代 "发挥了重要作用，出版了包括《阿尔卑斯杂志》在内的具有影响力的著作。它为世界各地未来的登山俱乐部设立了标准。[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1435537543
