 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON: "登山探险：5 级登顶" #deepl:4268538937
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON_TT: "#T 登山探险：5 级登顶#!\n这一类山峰可以使用 5 级登山装备攀登。级别并不表示海拔高度或风险。这些山峰包括瓦斯卡兰峰（Huascarán）、奇戈利萨峰（Chigolisa）和卡布鲁峰（Kabru）。欲了解更多信息，请访问[concept_douglas_mountain_summit_list] 。[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:604200263

