 concept_douglas_mountain_summit: "山区峰会" #deepl:193458424
 concept_douglas_mountain_summits: "Mountain Summits" #You can use this for plural [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]
 concept_douglas_mountain_summit_desc: "登山峰顶是所有登山者梦寐以求的目标。它们标志着一座山的最高点。每座山峰都有三个不同的属性，它们决定了成功登顶的难度。#V 高度#! ：高度决定了攀登一座山峰需要多少个台阶--这反映了探险的总长度。每爬 1 000 米，就需要增加一个台阶。该值四舍五入，即 4421 米高的惠特尼山需要 5 个台阶，而 7134 米高的考夫曼峰需要 8 个台阶。一座山的威望是根据其高度计算的：总高度除以 250。因此，一座理想的 5000 米高的山峰可以获得 20 个声望。#V Level#! ：一座山的等级代表了攀登所需的装备要求。这与山的高度没有严格的联系。例如，Citlaltépetl 虽然海拔 5636 米，但只是 1 级，只需要基本装备。相比之下，海拔只有 4478 米的马特宏峰（Matterhorn）被认为是要求更高的 3 级山峰，至少需要做好阿尔卑斯紧急情况的急救准备。#V Risk#! ：一座山峰的风险等级表示负面事件影响探险的可能性。它与高度和级别无关。雪崩、大雾和恶劣天气是主要关注点。由于波波卡特佩特尔山周围环境宜人，因此在现代早期就可以登顶。相比之下，海拔仅为 3,666 米的格罗斯文尼迪格峰（Großvenediger）要小得多，但直到 19 世纪初，它仍然对奥地利探险队构成严重威胁。有关各个山峰的更多信息，请参见[concept_douglas_mountain_summit_list] 部分。" #deepl:3359948048
 concept_douglas_mountain_range: "山脉" #deepl:3289022657
 concept_douglas_mountain_ranges: "Mountain Ranges" #You can use this for plural [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')]
 concept_douglas_mountain_range_desc: "山脉的定义是为[concept_douglas_mountaineering] 远距离训练提供潜力的山脉。经典山脉包括洛基山脉、安第斯山脉、阿尔卑斯山脉和高加索山脉。与需要征服的[Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] 不同，也有很多挑战性较低的山脉，在这些山脉中，[concept_douglas_mountaineer] ，不会有致命摔伤的风险。相反，这些山脉应被视为训练路线。有山脉的国家比没有山脉的国家更容易培养出登山运动员。" #deepl:2685064578
 concept_douglas_alpine_heritage: "高山遗产" #deepl:3116364012
 concept_douglas_alpine_heritage_desc: "阿尔卑斯遗产是一个统称，指与山区的联系和攀登高山的专长。它还指招募新[Concept('concept_douglas_mountaineer','$concept_douglas_mountaineers$')]的潜力，因为在大多数情况下，经验丰富的登山者都来自山区。这总是会给拥有[Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')] 或[Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] 的国家带来优势。招募新的登山者以及其他各种活动都需要花费高山遗产。" #deepl:707449492

 concept_douglas_mountain_summit_list: "山峰一览表" #deepl:4208448161
 concept_douglas_mountain_summit_list_desc: "有许多[Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] 可以攀登。\n#V 北美洲：#!\n#b Mount McKinley#! (Alaska), Height 6190 meters, Level 4\n#b Mount Logan#! (Yukon Territory), Height 5959 meters, Level 4\n#b Citlaltépetl#! (México), Height 5636 meters, Level 1\n#b Mount Whitney#! (California), Height 4421 meters, Level 1\n\n#V South America：#!\n#b Aconcagua#! (Mendoza), Height 6267 meters, Level 3\n#b Huascarán#! (Lima Territory), Height 6768 meters, Level 5\n#b Illimani#! (La Paz), Height 6438 meters, Level 4\n#b Chimborazo#! (Ecuador), Height 6267 meters, Level 1\n\n#V Europe：#!\n#b Shkara#! （大高加索地区），高度 5642 米，4 级#b Dufourspitze#! （杜福斯皮采），高度 4634 米，2 级#b Matterhorn#! （瑞士西部）、高度 4478 米，第 3 层#b Aiguille Verte#! (Savoy), 高度 4122 米，第 3 层#b Pico de Aneto#! (Aragon), 高度 3404 米，第 1 层#V Africa：#!\n#b Kibo#! (Tanganyika), Height 5895 meters, Level 2\n#b Batian#! (Kenya), Height 5199 meters, Level 3\n#b Mount Stanley#! (Uganda), Height 5109 meters, Level 3\n#b Mount Cameroon#! (South Cameroon), 4095 meters, Level 1\n\n#V Asia：#!\n#b Kamet#! （德里），海拔 7756 米，5 级#b Chogolisa#! （克什米尔），海拔 7665 米，5 级#b Kabru#! （喜马拉雅山），海拔 7412 米，5 级#b Kaufmann Peak#! （塔吉克斯坦），海拔 7134 米，4 级#V Australia &amp; Oceania：#!\n#b 威廉山#! （东新几内亚），高度 4121 米，2 级#b 库克山#! （南岛），高度 3724 米，2 级" #deepl:721187631

