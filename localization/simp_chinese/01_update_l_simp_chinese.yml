 gaudi.511.d: "在美化[ROOT.GetCountry.GetCapital.GetCityHubName] 时，城市规划出现了分歧。" #deepl:2161912626
 gaudi.512.t: "环城路上的雕像" #deepl:1070850347
 gaudi.512.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] 新环路上将竖立一组新的雕像，但目前还不清楚哪个神话人物将占据特殊位置。" #deepl:275330526
 gaudi.513.f: "新的部委是政府的旗舰，然而，计划的不断变化、扩建和潜在的腐败意味着大楼的建设一拖再拖，所有资金在竣工前都已用完。只要采取一些临时措施，未完工的大楼就可以投入使用，但这可能不符合政府的利益，因为政府将不得不满足于比预期更小的办公室和更差的舒适度。继续建造是可能的，但费用可能会很高。" #deepl:3580582680

 gaudi.511.t: "喷泉还是凉亭？" #deepl:2151137688
 gaudi.511.f: "人们可能会误以为这是一场关于皇帝胡须的争吵：一场有形的政治争端已经从小题大做发展到了极致。这是在一个极具美学价值的代表性广场上的一个建设项目。一派希望在广场上修建一座亭子，让人们流连忘返；另一派则主张修建一座喷泉。由于只有一块地皮，因此只能建造其中一个项目，妥协是不可能的。" #deepl:1541667756
 gaudi.511.g: "我们建造凉亭。" #deepl:2064679099
 gaudi.511.h: "我们建造喷泉。" #deepl:2431357846
 gaudi.511.i: "我对这个地方有自己的计划..." #deepl:53271135
 gaudi.512.f: "在规划环形公路时，有几个细节还不清楚。尚未确定哪些人物将被放置在显眼的位置。显然，这些人物应该是罗马万神殿中的人物。人口中的某些部分认同相应的人物--例如，资本家建议将商业之神墨丘利放在中间。另一方面，贵族则坚持使用众神之父朱庇特。军人喜欢火星，学者则希望将阿波罗放在中间。" #deepl:3457913174
 gaudi.512.g: "木星" #deepl:641978563
 gaudi.512.h: "水星" #deepl:4064282680
 gaudi.512.i: "阿波罗" #deepl:2704921915
 gaudi.512.j: "火星" #deepl:4251022611
 gaudi.513.t: "部委大楼超出成本" #deepl:3536337121
 gaudi.513.d: "新部委大楼的建设正在演变成一桩小丑闻。" #deepl:3745484689
 gaudi.513.g: "预算是有的，而且必须遵守。" #deepl:2982007153
 gaudi.513.h: "这是不幸的，但在这一领域却很常见。" #deepl:3799202878
 gaudi.513.i: "该项目应获得所需的资金和时间。" #deepl:3703152475
 gaudi.514.t: "新咖啡馆" #deepl:760472506
 gaudi.514.d: "环形大街上新开了一家咖啡馆。" #deepl:977697169
 gaudi.514.f: "咖啡馆仍然是我们接受一切新事物教育的最佳场所。要理解这一点，就必须知道维也纳咖啡馆是一种特殊的机构，是世界上任何类似机构都无法比拟的。它实际上是一种民主俱乐部，每个人都可以在这里喝上一杯便宜的咖啡，每个客人只需支付少量的费用，就可以在这里坐上几个小时，讨论、写作、打牌、收邮件，尤其是可以无限量地阅读报纸和杂志。在更好的维也纳咖啡馆里，所有维也纳的报纸都能买到，不仅是维也纳的报纸，还有整个德意志帝国、法国、英国、意大利和美国的报纸，以及世界上所有重要的文学和艺术评论。因此，我们对世界上发生的一切都了如指掌，我们听说过每一本出版的书，每一场演出，无论它在哪里举行，我们还比较过所有报纸上的评论。在咖啡馆里，奥地利人能够如此全面地了解世界上发生的所有事件，同时还能在友好的圈子里讨论这些事件，这也许是奥地利人的智力灵活性和国际性的最大原因。我们每天在那里一坐就是几个小时，什么都不放过。- 斯蒂芬-茨威格" #deepl:1426019469
 gaudi.514.g: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] 应该去看看。" #deepl:3567062403
 gaudi.514.h: "这将提高维也纳的生活水平。" #deepl:993415000
 gaudi.515.t: "环城路宫殿" #deepl:2889767777
 gaudi.515.d: "一位贵族在[ROOT.GetCountry.GetCapital.GetCityHubName] 的新城区建造了一座宫殿。这座半成品建筑的废墟有可能成为碍眼的风景。" #deepl:3082201997
 gaudi.515.f: "环城路宫殿是维也纳环城大道上宏伟宫殿的总称。这些建筑大多由旧贵族或银行家和实业家在 19 世纪末建造。这些宫殿是新巴洛克和新文艺复兴或新形式主义风格的混合体。它们也是崛起和地位的象征。然而，其中一个建筑商最近不堪重负，面临破产。人们已经对这一有碍观瞻的建筑嗤之以鼻，最糟糕的情况是，它必须再次拆除，从而延长整个项目的竣工时间。" #deepl:2482976903
 gaudi.515.g: "我们共同承担费用。" #deepl:1778759255
 gaudi.515.h: "这不关我们的事。" #deepl:2515722656
 gaudi.516.t: "基本建设扩展：进展良好" #deepl:3725304670
 gaudi.516.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] 他表示，基本建设扩展可以提前完成。" #deepl:1876608469
 gaudi.516.f: "不知道是什么原因，一切都进展得更快：可能是对祖国的热爱、高工资、当地精英的友好支持，或者仅仅是更好的天气。" #deepl:771529955
 gaudi.516.g: "了不起" #deepl:1621308786
 gaudi.517.t: "基建延期：进展缓慢" #deepl:4246146058
 gaudi.517.d: "遗憾的是，[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] ，建筑管理部门今天不得不承认，[ROOT.GetCountry.GetCapital.GetCityHubName] ，新区的建设进度已经落后。" #deepl:984753109
 gaudi.517.f: "不知道是什么原因，一切都进展得越来越慢：是敌对政治分子的煽动，还是工会对职业道德的破坏，是光照派的阴谋，抑或仅仅是恶劣的天气。" #deepl:967308050
 gaudi.517.g: "令人遗憾。" #deepl:1477108256
 gaudi.518.t: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] 纪念碑[SCOPE.sCharacter('gaudi_ruler').GetFullName]" #deepl:4291665084
 gaudi.518.d: "计划在环形大道（Ringstrasse）上建造一座新的纪念碑：国王雕像[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] 。" #deepl:642834231
 gaudi.518.f: "环形大街展示了奥地利的历史。一方面，哈布斯堡统治家族的历代君主都受到了永恒的纪念，其中玛丽亚-特蕾莎（Maria Theresa）的纪念碑最为奢华。此外，欧根-冯-萨沃延（Eugen von Savoyen）或施瓦茨贝格（Schwarzberg）等将军也丰富了维也纳的城市景观。与此同时，资产阶级也非常重视纪念他们的代表人物，即诗人歌德和席勒王子，以及伟大的作曲家舒伯特、莫扎特和贝多芬。" #deepl:795951503
 gaudi.518.g: "成为[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] 是件好事。" #deepl:2477877691
 gaudi.518.h: "很好，但还是把重点放在完成环形大道上吧。" #deepl:1336009648
 gaudi.519.t: "火灾" #deepl:3279516897
 gaudi.519.d: "一场毁灭性大火烧毁了[ROOT.GetCountry.GetCapital.GetCityHubName] 的一个建筑工地上的几栋建筑。" #deepl:603406045
 gaudi.519.f: "环城路上最著名的灾难是 1881 年 12 月 8 日的环形剧院大火。这是 19 世纪最大的火灾灾难之一。据估计，遇难者数以百计，甚至超过千人。起火原因是煤气照明出现故障，导致煤气泄漏并在下次点火时爆炸。大火蔓延到背景火车，然后迅速蔓延到舞台的其他部分，最终烧毁了整个礼堂。这场大火对预防性防火，特别是剧院区域的防火以及奥地利剧院建设的相应法律规定产生了国内外影响。作曲家安东-布鲁克纳（Anton Bruckner）持有当晚演出的门票，但因身体不适留在家中，才幸免于难。" #deepl:1763422665
 gaudi.519.g: "糟糕的一天" #deepl:3953408834
 gaudi.520.t: "对城市扩建的偏见" #deepl:3932558777
 gaudi.520.d: "在农村人口代表看来，[ROOT.GetCountry.GetCapital.GetCityHubName] 的发展对普通农村人口不利。" #deepl:3359656956
 gaudi.520.f: "'政府在首都以其难以言表的大摇大摆清楚地表明，它是由冷漠的城市居民组成的，他们只想到几条街以外的地方，从未离开过[ROOT.GetCountry.GetCapital.GetCityHubName] 。在那里，巨额资金被挥霍一空，这些资金只流向首都，而小城镇或乡村的普通百姓却对此一无所知。它背后的意识形态倾向于中央集权，倾向于官僚主义，倾向于并协助国家机器；但这样一个腐朽的项目能为普通人提供什么视角呢？" #deepl:2119590629
 gaudi.520.g: "为勤劳的农村居民送上一份友好的礼物如何？" #deepl:1425408969
 gaudi.520.h: "城市和省份是平等的。" #deepl:154752402
 gaudi.520.i: "谁在乎这个愚蠢的农民的谈话？" #deepl:1424618973
 gaudi.521.t: "工业家住宅" #deepl:1054941492
 gaudi.521.d: "一位富商建造了一座新宫殿，从而使[ROOT.GetCountry.GetCapital.GetCityHubName] 拥有了一座宏伟的建筑。" #deepl:2324185893
 gaudi.521.f: "工业家和银行家的宫殿被视为强调他们在国家中的新地位的一种方式。犹太出身的富人也可以强调他们的解放。维也纳在 19 世纪的发展就是一个很好的例子。最著名的环路宫殿之一是爱泼斯坦宫。它是为实业家和银行家古斯塔夫-里特尔-冯-爱泼斯坦（Gustav Ritter von Epstein）建造的。建筑师是 Theophil Freiherr von Hansen，他还设计了毗邻的奥地利议会大厦。它高达五层，采用了当时典型的新文艺复兴风格。" #deepl:2653721730
 gaudi.521.g: "[ROOT.GetCountry.GetCapital.GetCityHubName] 正在不断发展壮大。" #deepl:2259204183
 gaudi.522.t: "扩建军营" #deepl:3408528723
 gaudi.522.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] 的扩建为兵营的现代化和扩建提供了机会。" #deepl:933440251
 gaudi.522.f: "弗朗茨-约瑟夫兵营（Franz-Josephs-Barracks）是维也纳的一座兵营建筑，位于今天的环形大街（Ringstrasse）地区，长期以来一直是大型项目建设的障碍。兵营以弗朗茨-约瑟夫一世皇帝的名字命名，建于 1854-1857 年，是 1848 年革命之后的产物。兵营建成后不久，就阻碍了维也纳环城大道的发展，环城大道于 1857 年开工，但过了四十年军队才再次迁出这里。因此，必须提前建造新的兵营，以弥补弗朗茨-约瑟夫兵营的损失。" #deepl:4162429863
 gaudi.522.g: "扩建军营。" #deepl:2381627455
 gaudi.522.h: "还是把时间投入到其他地方吧。" #deepl:3269234038
 gaudi.523.t: "扩展建筑部门" #deepl:2392547084
 gaudi.523.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] 的扩展为扩大建筑部门提供了机会。 " #deepl:3106227577
 gaudi.523.f: "我们通常称艺术家的天性为阻碍艺术家创作的品质的总和。- 阿瑟-施尼茨勒" #deepl:2115168723
 gaudi.523.g: "扩大建筑办公室。" #deepl:771559939
 gaudi.524.t: "美妙的公园" #deepl:3707211248
 gaudi.524.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]新公园已经完工，现在向所有市民开放，供他们散步。" #deepl:2209166008
 gaudi.524.f: "新市政公园的大门敞开。草坪如天鹅绒般滚动。小径在花坛和雕像之间蜿蜒曲折。但最吸引人的不是草坪，而是声音。一个乐队，一个小型管弦乐队，一曲华尔兹在微风中飘荡。曾经只属于沙龙和宫殿的公共音乐，如今已弥漫在空气中，让所有人都能听到。在维也纳等城市，Kursalon 已成为市民的音乐圣殿。这座意大利文艺复兴风格的宏伟建筑坐落在约翰内斯大街（Johannesgasse）上，在公园里有一个宽阔的露台。在施特劳斯兄弟的时代，库尔萨隆是跳舞和音乐会的热门场所。" #deepl:556984663
 gaudi.524.g: "我们出去走走吧" #deepl:3870101360
 gaudi.524.h: "让我们用一场音乐会来庆祝吧！" #deepl:3249539672
 gaudi.525.t: "扩展歌剧院" #deepl:3647447347
 gaudi.525.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] 的扩建为歌剧院的现代化和扩建提供了机会。" #deepl:1640821642
 gaudi.525.f: "在林荫大道和拱廊、喷泉和部委的环绕中，现有的歌剧院开始显得简陋，甚至有些土气。建议：新建或扩建。更多的座位、更好的音响效果、纪念碑式的外墙。一座与城市地位相匹配的文化殿堂。在整个欧洲，这种姿态已成为国家声望的象征。在巴黎，加尼叶歌剧院（Opéra Garnier）的大理石楼梯和金色天花板拔地而起。在维也纳，1869 年开业的国家歌剧院以其优雅和自豪屹立在环形大道上。" #deepl:2327891128
 gaudi.525.g: "扩建歌剧院。" #deepl:4005131669
 gaudi.526.t: "扩建市政厅" #deepl:857877700
 gaudi.526.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] 的扩建为市政厅的现代化和扩建提供了机会。" #deepl:3575590115
 gaudi.526.f: "老市政厅仍保留着上个世纪的纹章。内部：狭窄的楼梯、拥挤的办公室、堆得比墙裙还高的账本。市长的办公桌仅够他处理文件，更不用说行使权力了。现在的建议是：建造一座新的市政厅，以反映城市在治理、经济和公民身份方面不断扩大的作用。无论是高耸的尖塔还是内敛的古典主义，它都必须彰显权威。在整个欧洲，各城市都在迎接这一挑战。在维也纳，新哥特式的市政厅（建成于 1883 年）成为了市政自信的象征。1871 年后，巴黎以宏伟和蔑视的姿态恢复了它的市政厅。柏林的罗特斯市政厅融合了文艺复兴时期的形式和普鲁士时期的功能。" #deepl:2422046000
 gaudi.526.g: "扩建市政厅。" #deepl:5728920
 gaudi.527.t: "赫尔登广场" #deepl:959071592
 gaudi.527.d: "在英雄广场（Heldenplatz）竣工后，一些主要政治人物正在推动举行一个合适的落成典礼。" #deepl:1468121085
 gaudi.527.f: "环形大道建成时，"外城堡广场 "是弗朗茨-约瑟夫皇帝设计的，作为凯撒广场的一部分，但凯撒广场从未完工。当时的计划是建造一个长方形广场，由利奥波德翼楼、新霍夫堡、哈布斯堡收藏馆和新城堡（从未在沃尔克斯花园原址上建造）组成。海尔登广场的名称是 1878 年确定的；它来自两座马术纪念碑，这两座纪念碑都是安东-多米尼克-费恩科恩（Anton Dominik Fernkorn）的作品。较早的是卡尔大公的纪念碑，于 1860 年揭幕。与之相对应的是尤金王子的马术雕像，也于 1865 年完工。第一次世界大战失败后，哈布斯堡-洛林王朝统治下的奥匈二元君主制崩溃，奥地利第一个共和国成立，赫尔登广场成为所有政治阵营的集结地和奥地利军队的阅兵场。" #deepl:562832934
 gaudi.527.g: "举行游行，邀请我们的朋友。" #deepl:99539180
 gaudi.527.h: "在未来几年建立永久性的阅兵仪式。" #deepl:3502479331
 gaudi.527.i: "谁该为这一切买单？" #deepl:3263444788
 gaudi.528.t: "扩展大学" #deepl:2548530815
 gaudi.528.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] 的扩建为大学的现代化和扩展提供了机会。" #deepl:966048719
 gaudi.528.f: "没有思想，何谈伟大的城市？在铁路线、部委和剧院的簇拥下，大学开始因自身的成功而捉襟见肘。学生太多，校舍太少。各系分布在租来的大楼里。教授们在图书馆和实验室之间争抢空间。建议很明确：新建校区或大规模扩建--现代化的报告厅、专门的学院、不朽的图书馆。这些项目不仅仅是基础设施，更是知识雄心的宣言。在维也纳，大学于 19 世纪 70 年代沿环城大道迁址重建，拥有宏伟的外观和象征性的中心地位。在巴黎，索邦大学在儒勒-费里（Jules Ferry）的改革下进行了彻底扩建，以容纳法国日益壮大的学术阶层。" #deepl:3542359765
 gaudi.528.g: "扩大大学规模。" #deepl:4228402238
 gaudi.529.t: "扩展艺术学院" #deepl:1188603187
 gaudi.529.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] 的扩建为艺术学院的现代化和扩展提供了机会。" #deepl:2971034584
 gaudi.529.f: "随着城市的发展，人们对艺术的需求也越来越大。然而，画家和雕塑家们挤在狭小的工作室和昏暗的阁楼里，不是向大师学习，而是从传闻和借来的草图中学习。建议：建立一所正规的艺术学院，配备光线充足的工作室、解剖剧场和向公众开放的画廊。在整个欧洲，这样的学院塑造了国家的品味。巴黎的美术学院为半个欧洲大陆树立了经典标准。在维也纳，艺术学院的宏伟建筑彰显了环街的文化声望。" #deepl:2427288221
 gaudi.529.g: "扩大学院。" #deepl:3521772928
 gaudi.530.t: "天王星" #deepl:3604286803
 gaudi.530.d: "随着 "乌拉尼亚 "号的到来，维也纳也出现了一个所谓的 "人民教育中心"，但其确切目的仍有争议。" #deepl:2388110616
 gaudi.530.f: "1883 年，德国天文学家马克斯-威廉-迈耶（Max Wilhelm Meyer）来到维也纳，作为维也纳大学的助理计算历史和未来的日食。他还举办了民俗学讲座，并提出了建立民俗教育机构的想法。不过，由于他在 1885 年被召往柏林，他继续在那里发展自己的想法。维也纳的 "乌拉尼亚 "是以柏林的 "乌拉尼亚 "为蓝本建造的：它可容纳 800 人，包括一个可容纳 200 人的演讲厅、科学演示室和一个天文台。然而，这座 "临时 "的 Urania 难以应付大量涌入的参观者，因此很快就需要在环形大街上新建一座大楼。乌拉尼亚不仅扩大了教育机会的范围（如通过语言课程），还成为了音乐会的场所，拥有自己的乌拉尼亚交响乐团和乌拉尼亚合唱团。非传统的外形和建筑风格在维也纳引起了人们的关注。不过，维也纳人很喜欢这座建筑，Urania 很快就成为维也纳的地标之一。" #deepl:2564552960
 gaudi.530.g: "它是一座标志性建筑。" #deepl:631489671
 gaudi.530.h: "它主要是一个娱乐场所。" #deepl:1069754801
 gaudi.530.i: "首先，这是一座天文台。" #deepl:2017455388

 gaudi.9.t: "城市规划完成" #deepl:1330111739
 gaudi.9.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] 现在又可以全面使用了。" #deepl:60424068
 gaudi.9.f: "'建筑要达到其最高境界，就必须充满想象力和幻想力--不是涣散的想象力，也不是任性的幻想力--使有序的结构能愉悦每一个聪明观察者的眼睛，并像诗歌一样激发情感。亨利-范-布兰特" #deepl:2388189232
 gaudi.9.g: "项目太多，时间太少。" #deepl:224764128

 gaudi_architecture_treatise_modifier: "建筑学论文" #deepl:1594143488

 gaudi.8.t: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetLastName]建筑论" #deepl:1170819237
 gaudi.8.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] 关于历史和当代建筑的论文，其中丰富了 的理论思考，将对后代建筑师产生影响。[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] " #deepl:66798799
 gaudi.8.f: "建筑记录了人类的伟大思想。不仅是每一个宗教符号，人类的每一种思想都在这本巨著中留下了自己的一页"。维克多-雨果" #deepl:864116211
 gaudi.8.g: "留给后人的作品" #deepl:575316054

