 douglas.104.t: "内心的山" #deepl:2079471330
 douglas.104.d: "经过五年艰苦的攀登和训练，[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] 。" #deepl:862787273
 douglas.104.f: "大山没有声音，却能教导我们。在漫长的五年里，我们的登山者面对的是白雪皑皑、崩塌的岩壁、凛冽的寒风，以及比任何利刃都要锋利的寂静。然而，每一次艰难困苦都将知识刻进肌肉，将耐心注入呼吸。最初的雄心壮志如今已锤炼成娴熟的技巧。登山者学会了倾听石头的声音，学会了通过气味预测风暴，学会了闭着眼睛用心打结。[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] 。这就是精通的开始。" #deepl:1510753382
 douglas.104.g: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] 不再征服大山-- 理解大山[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] " #deepl:2453485277

