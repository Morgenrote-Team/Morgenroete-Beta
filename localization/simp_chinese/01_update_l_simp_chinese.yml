 je_douglas_mountaineering_expedition_reason: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]我们的登山家目前正带领一支登山队在[SCOPE.sState('douglas_location_scope').GetName] 进行探险。目标是首次登上一座山峰。登顶的速度主要取决于他的经验和性格特点。根据山峰的难度，可能会出现更大的危险。如果探险队不能在一定时间内达到目标，[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] ，就会放弃登顶。如果探险队因任何原因而陷入可以想象的最大危险之中，那么最糟糕的情况就会发生。" #deepl:488000629

