 academics.2309.t: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]的野心"
 academics.2309.d: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]教授被认为是古生物领域的权威角色。科学学会希望将[SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim]打造成国际上炙手可热的人物，将[SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim]作为学术界的领军人物。"
 academics.2309.f: "我们得出的坚定结论是，我们的同事[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastNameNoFormatting]非常适合代表我们的国家。[SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe]应该得到一切可能的支持，以提[SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim]他的声誉。这将特别激励年轻人追求自己的科学事业。\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]成员署名"
 academics.2309.g: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe]将成名！"
 academics.2309.h: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe]不应该如此狂妄。"
 academics.2310.t: "古生物学的荣耀"
 academics.2310.d: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]作为古生物学家声名鹊起，[SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHis]现在已经成为科学学会想邀请的学者。"
 academics.2310.f: "我们现在接收了许多新学生，他们都受到了国际有[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastNameNoFormatting]教授的影响，[SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe]让人们知道科学家不是一个前景渺茫的古怪职业，而是一份令人兴奋的工作，充满了名望和冒险。\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]成员署名"
