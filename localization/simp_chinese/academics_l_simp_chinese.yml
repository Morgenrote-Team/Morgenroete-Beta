 ademics_our_own_dinosaur_modifier: "新恐龙"
 ademics_no_dinosaur_modifier: "没有恐龙"
 academics.2303_goal_tt: "搭建#G 一副#![concept_dubois_dinosaur_skeleton]"
 academics.2303_reward_tt: "作为奖励，知识分子的支持度#p +5#!，且四年内威望#p +5%#!，以及中等技术投资。"
 je_academics_giant_of_the_past: "古生物学聚焦：巨人之影"
 je_academics_giant_of_the_past_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]要求收集[Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]并重建一个[concept_dubois_dinosaur_skeleton]。它的状况如何还在其次，首先我们得有。恐龙骨骼一般是在大地层中发现的，如果我们的领土上没有这样的地层，那么[concept_dubois_paleontological_licence]可以让我们的古生物学家就到国外去寻找了。"
 academics.2303.t: "巨人之影"
 academics.2303.d: "一些著名科学家感叹，尽管我们在古生物学方面取得了进步，但至今仍未展出一具完整的恐龙骨骼。我们的科学学会也在一封信中对这种不幸的情况深表遗憾，并希望看到这种情况得到补救。"
 academics.2303.f: "恐龙！现在就要！\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]成员署名"
 academics.2303.g: "一个绝妙的提案！"
 academics.2303.h: "这里不是小男孩的游乐园，而是一个科学研究所！"
 academics.2304.t: "可怕的蜥蜴"
 academics.2304.d: "恐龙是古生物收藏品中最壮观的一件。每天都有新的参观者蜂拥而至，一睹恐龙骨架的风采。"
 academics.2304.f: "能再来一架吗？\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]成员署名"
 academics.2304.g: "我们自己的恐龙！"
 academics.2305.t: "没有恐龙"
 academics.2305.d: "为计划中的恐龙骨架预留的平台仍然空着，科学学会对此非常恼火。"
 academics.2305.f: "我们还需要说得更清楚吗？\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]成员签署"
 academics.2305.g: "另辟蹊径！"
 academics.2306_goal_tt: "发现#G 三个#!#O 独特化石#!"
 academics.2306_reward_tt: "作为奖励，我们的[concept_dubois_paleontologist]将会获得#p 50点经验#!。如果没有[concept_dubois_paleontologist]，将会获得一位，且获得技术投资"
 je_academics_special_fossils: "古生物学聚焦：独特化石"
 je_academics_special_fossils_reason: "独特化石是指因其特殊地位而被单独处理的独特化石。这些化石包括始祖鸟或鱼石螈等生物进化过程中过渡形态化石，也包括大地懒或类似海豚的鱼龙等大型已灭绝哺乳动物化石，用于定义一个时代的较小化石如三叶虫也属于这一类。总共有十几种独特化石，它们不仅可以在地层中找到，也可以在科学考察中找到。"
 je_academics_special_fossils_success: "发现#G 三个#!#O 独特化石#!"
 academics.2306.t: "独特化石"
 academics.2306.d: "科学学会对我们提出了一个关于独特化石的特殊要求。"
 academics.2306.f: "动物进化的历史是大自然的一个秘密，我们的学者每天都在揭示这个秘密，寻找处于物种之间的那些形态，即所谓的“缺失环节”，同时，在地球上还有一些非同寻常的生物，它们不一定非得是恐龙才能给人留下深刻印象：如剑齿虎或巨型树懒等已灭绝的哺乳动物。如果我们能收集到至少三块块独特化石，就能进一步提高我们的威望。\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]成员签署"
 academics.2306.g: "收藏的独特化石"
 academics.2306.h: "难道我们不能将学者们集中在更有意义的事情上吗？"
 academics.2307.t: "惊人的化石收藏"
 academics.2307.d: "毫无疑问，国属古生物研究所拥有国际上最重要的收藏之一，几乎没有任何地方可以与之相比。"
 academics.2307.f: "独特化石可能并不总是像人们最初想象的那样令人印象深刻，但它们却具有巨大的科学价值。因此，科学学会寄来了一封感谢信。在接下来的日子里，将举办一个特别展览。"
 academics.2307.g: "雄伟壮丽"
 academics.2308.t: "特别失望"
 academics.2308.d: "科学学会对最近的古生物学表现失败表示失望。"
 academics.2308.f: "国家对自然历史的关注完全被忽视，这是国家的悲剧！古生物学研究是对历史的复原！但是很少有支持，甚至连最微小的愿望也被忽视！\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]成员署名"
 academics.2308.g: "哦，我的天"
 ademics_no_paleontological_hero_modifier: "古生物学无好汉"
 academics.2309_goal_tt: "拥有一个#o 著名#![concept_dubois_paleontologist]"
 academics.2309_reward_tt: "作为奖励，会获得#p 120#![concept_academics_progress]。"
 je_academics_famous_paleontologist: "古生物学聚焦：著名古生物学家"
 je_academics_famous_paleontologist_reason: "[concept_dubois_paleontologist]的晋升伴随着其经验值的提高。和其他学者一样，古生物学家每年会获得5点经验值。在对地层进行成功的古生物研究时，还会获得额外的经验。此外，古生物学家还可用于登山探险和太平洋探险。成功搭建和重新组装恐龙骨骼也可以提高古生物学家的经验。"
 academics.2310.g: "这激励了我们所有人。"
 academics.2311.t: "古生物学无好汉"
 academics.2311.d: "无论出于什么原因，我们都没能培养一位古生物学家，让其名扬世界。"
 academics.2311.f: "没有成功的造星，意味着科学继续被视为无用学科，学术研究和进入积极研究服务的热情受到限制。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]成员在交谈中感受到了这种不满，而这些知识精英将这种情况归咎于政府。"
 academics.2311.g: "令人失望。"
 academics_splendid_dinosaur_collection_modifier: "壮观的恐龙收藏"
 academics.2312_goal_tt: "#o 恐龙评级#!至少达到#G 5#!"
 academics.2312_reward_tt: "作为奖励，知识分子将获得#p 5点支持度#!，你将获得#p 10%#!威望加成，将获得持续10年的降低#p 5%#!人文科技成本。"
 je_academics_dinosaur_rating: "古生物学聚焦：恐龙评级"
 je_academics_dinosaur_rating_reason: "为了提高#O 恐龙评级#!，不仅需要新的恐龙骨骼，还需要对它们进行完美的重建。这可能需要数年时间。因此[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]决定不设定时间限制。"
 je_academics_dinosaur_rating_success: "#o 恐龙评级#!至少达到#G 5#!"
 academics.2312.t: "古生物学的辉煌"
 academics.2312.d: "我们的古生物学已经小有名声，现在是时候通过改进恐龙展览，让它享誉全球了"
 academics.2312.f: "我们可能想在展览中展示不同的恐龙。更多的恐龙骨骼不仅有利于科学研究，也有利于我们国家威望。全世界都在挖掘恐龙骨骼，但这不应该是数量问题，还应该是质量问题，我们的目标应该是成为恐龙骨架重建的领跑者。\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]成员签署"
 academics.2312.g: "这将是一项艰巨的任务！"
 academics.2312.h: "不再是这种没用的古生物学废话了。"
 academics.2313.t: "精彩的收藏"
 academics.2313.d: "今天，科学协会自豪地宣布将举办恐龙骨架特别展览。"
 academics.2313.f: "我们对政府深表感谢，因为我们终于拥有了一个恐龙收藏馆，彰显了我国古生物研究的高水平。几乎没有比这更精美的收藏了。社会可以自豪地看待这项工作，而国外则羡慕地看着它。先生们这是科学界，尤其是古生物学界的一个伟大日子！\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]成员签署"
 academics.2313.g: "太棒了"
