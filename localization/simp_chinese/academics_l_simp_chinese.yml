 academics.21.t: "我们的[concept_tesla_engineer]去世"
 academics.21.d: "在担任[concept_tesla_engineer]数十年后，我们的前任#b #ORANGE 首席工程师#!#!去世了。谁能取代这样一位卓越的科学家？"
 academics.21.g: "这将是我们巨大的损失！"
 academics.21_tt: "在个别情况下游戏中会杀死角色，即使启用修改特无法阻止这种情况发生。该事件会将该科学家的角色从游戏中删除，这样你就不会被不断秽土转生的科学家骚扰。"
 academics.22.t: "我们的[concept_verrier_astronomer]去世"
 academics.22.d: "在担任[concept_verrier_astronomer]数十年后，我们的前任#b #ORANGE 首席天文学家#!#!去世了。谁能取代这样一位卓越的科学家？"
