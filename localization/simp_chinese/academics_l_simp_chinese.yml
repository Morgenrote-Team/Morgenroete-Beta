 je_academics_found_archaeological_museum_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]希望我们建造一座考古博物馆以增进知识，同时提高知识分子的生活水平。建造博物馆需要#p 5件#![Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]，必须由一位[concept_lepsius_archaeologist]在[concept_lepsius_expedition]中发现，也可以收到随机礼物或是在当地考古发掘中得到。\n这非常重要，还有一个原因是，如果没有一座真正的博物馆，“这属于博物馆”这句口头禅就名不副实了。\n\n事实上，那肯定会相当尴尬。"
