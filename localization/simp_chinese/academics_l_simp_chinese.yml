 academics_will_not_replace_geologist_loc: "#p 你还没有#![concept_agassiz_geologist]。"
 dubois_geologist_experience_gain_tt: "你的[concept_agassiz_geologist]，[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName]，获得[SCOPE.GetValue('xp_amount')|0+]点经验。"
 academics.2101.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]要求建立博物馆"
 academics.2101.d: "作为世界列强之一，我们至今仍在考古方面声名不彰。因此，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]希望我们建造一座考古博物馆。"
 academics.2101.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]请您增加对考古学的投入。探索历史、发现被遗忘的文化并找回珍贵文物对于科学和国家声誉都至关重要。\n因此，我们请求建立一座考古博物馆，以增进、传授并保存古代文明的知识和优秀艺术品。\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]理事会"
 academics.2101.g: "我们要去寻宝啦！"
 academics.2101.h: "用不着落满灰尘的博物馆。"
 academics.2101_goal_tt: "接下来#n 10年#!内你要收集#p 5件#![Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]并建立一座考古博物馆。"
 academics.2102.t: "考古博物馆的开幕式"
 academics.2102.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]的代表今天对考古博物馆的揭幕仪式十分满意。"
 academics.2102.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]欣喜获悉新博物馆已向公众开放，众多公民如今可以欣赏新发现的文物。这些文物也具有极高的科学价值。不但这只是开始，我们已经授权博物馆馆长全权监督日后的文物购置工作。当然，他也是我们协会的成员。\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]理事会"
 academics.2102.g: "现在我们得多找些能放进博物馆的东西……"
 academics.2103.t: "考古学的遗憾"
 academics.2103.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]今天注意到尽管政府承诺促进本国的考古动作，但却没有做出任何实质性努力。"
 academics.2103.f: "我等[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]成员对政府的无知深感失望。一座小小的博物馆真的是很过分的要求吗？\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]会员"
 academics.2103.g: "到底什么人需要一座落满灰尘的博物馆？"
 academics.2104.t: "博物馆馆长建议开展一场埃及展"
 academics.2105.t: "博物馆馆长建议开展一场美索不达米亚展"
 academics.2106.t: "博物馆馆长建议开展一场爱琴海展 "
 academics.2107.t: "博物馆馆长建议开展一场前哥伦布时期展"
 academics.2104.d: "考古博物馆馆长警告说，如果不立即将失落的文物集中起来举办一场展览，我们的博物馆可能会在国际上处于落后地位。"
 academics.2104.f: "作为[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]的骄傲一员，我对我国美丽的博物馆所遭受的忽视感到遗憾。全世界都在收集埃及文物，最近我还听说了国外的猫头芭丝特雕像。我非常确信这绝对是最新的热潮！据说，它还是粉红色的。我们甚至都没有足够的古埃及石棺来举办一个像样的展览。如果不能尽快收集到至少足以举办一次中型展览的文物，我将对我国考古学的未来感到悲观。\n\n此致，考古博物馆馆长"
 academics.2105.f: "作为[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]的骄傲一员，我对我国美丽的博物馆所遭受的忽视感到遗憾。如今，美索不达米亚文物风靡全球，各大列强对它们爱不释手。当然，我认为拉马苏的价值并不取决于其大小，而是取决于其用途。然而，我们甚至没有足够的楔形文字碑来组织一次适当的展览。如果我们不能尽快收集到至少足以举办一次中型展览的文物，我将对我国考古学的未来感到悲观。\n\n此致，考古博物馆馆长"
 academics.2106.f: "作为[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]的骄傲一员，我对我国美丽的博物馆所遭受的忽视感到遗憾。过去几年里，各国对爱琴海文物趋之若鹜。自特洛伊被重新发现以来，荷马史诗已成为大众文化，现在每个新贵的花园里都有一座古典雕像。而我们呢？我们连几件面目可憎的迈锡尼随葬品都没有！如果我们不能尽快收集到至少足以举办一次中型展览的文物，我将对我国考古学的未来感到悲观。\n\n此致，考古博物馆馆长"
 academics.2107.f: "作为[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]的骄傲一员，我对我国美丽的博物馆所遭受的忽视感到遗憾。玛雅主义已经风行全球，我们学会中的神秘主义成员斥巨资从中美洲和南美洲购买最具异国情调的藏品。盗墓和破坏珍贵历史资产的行为正如火如荼地进行着。我听说一位探险队长甚至想把蒂卡尔金字塔搬走！而我们却连几个在摆博物馆里吓唬小孩的神秘石头面具都没有。如果我们不能尽快收集到至少足以举办一次中型展览的文物，我将对我国考古学的未来感到悲观。\n\n此致，考古博物馆馆长"
 academics.2104.g: "财富和荣耀！"
 academics.2104.h: "我们有比寻宝更重要的事情要做。"
 academics.2108.t: "新考古展览"
 academics.2108.d: "博物馆馆长表示很高兴他对新文物的担忧得到了回应，并告知他在[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]的朋友们，博物馆即将举办一场新展览。"
 academics.2108.f: "本机构感谢政府帮助提高国家的科学声誉。众多新文物体现了这个国家最优秀的人们的艺术才华和孜孜不倦的研究动力。\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]会员"
 academics.2108.g: "成功！"
 academics.2109.t: "对考古学的失望"
 academics.2109.d: "博物馆馆长对自己的关切被否定感到震惊沮丧，他回到自己的办公抽泣，锁上门拒绝与任何人交谈。"
 academics.2109.f: "干得好，干得好。上次博物馆馆长遇到这种情况时差点从窗户里跳出去。有些政府官员的行为真是冷酷无情。他只是想要一些文物。几件破旧的小文物。他在这个世界上一无所有，只有一些落满灰尘的雕像和破碎的花瓶！希望你现在开心了。这个可怜的人伤心欲绝。\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]会员"
 academics.2109.g: "失败……"
