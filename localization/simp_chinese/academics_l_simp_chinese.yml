 academics.2110.t: "博物馆馆长需要重要文物"
 academics.2110.d: "考古博物馆馆长今日代表[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]向政府致公开信。"
 academics.2110.f: "我不得不非常遗憾地指出，尽管拥有丰富的文物资源，但我们的博物馆仍然缺乏一件镇馆之宝。遗憾的是，政府迄今为止一直更关注文物的数量而非质量。因此，我强烈建议在未来几年内对此进行纠正，否则我国将沦为科学界的出纳员。\n\n此致，考古博物馆馆馆长"
 academics.2110.g: "声誉卓著的事业。"
 academics.2110.h: "没必要添麻烦。"
 academics.2110_goal_tt: "接下来#n 15年#!内你要收集#p 1件#![concept_lepsius_major_artifact]。"
 academics.2111.t: "镇馆之宝"
 academics.2111.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]在今天的来信中表明了态度。"
 academics.2111.f: "祝贺您决定将考古作为国家优先事务。最近获得的这一特殊物件将在未来几周的特展中展出。全世界都会羡慕我们！\n\n此致，考古博物馆馆长"
 academics.2111.g: "太棒了。"
 academics.2112.t: "门可罗雀"
 academics.2112.d: "今天，考古博物馆馆长在一封代表[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]的公开信中，表达了对于考古学在我们国家遭到忽视的遗憾。"
 academics.2112.f: "从来没有这么一点人能在如此之短的时间内毁灭如此之多的东西。\n\n此致，考古博物馆馆长"
 academics.2112.g: "所以呢？"
 je_academics_major_artifact: "考古学重心：重要文物"
 je_academics_major_artifact_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]希望我们至少找到#p 1件#![concept_lepsius_major_artifact]。重要文物可以通过重大发现、永久发掘或探险过程中的随机事件链获得。"
 je_academics_major_artifact_success: "拥有#p 1件#![concept_lepsius_major_artifact]。"
 academics.2113.t: "博物馆馆长要求卓越考古"
 academics.2113.d: "考古博物馆馆长指出，只要能弥补最后一点缺失，展览将臻于完美。"
 academics.2113.f: "大家都知道我是一个谦逊的人，不会过度索取。作为这样一所卓越机构的策展人，此前我总是克制自己，从未向政府要求过任何优待。此外：要想把我们精美的收藏提升到世界级水平，还差最后一点锦上添花的东西。只需要一个出色的展览。不需要更多。从一个地区获得100件文物和一件重要文物并不困难，对吧？\n\n此致，考古博物馆馆长"
 academics.2113.g: "欢迎挑战。"
 academics.2113.h: "太冒险了。"
 academics.2112_goal_tt: "你需要在#n 20#!年时间内安排一场卓越展览。"
 academics.2114.t: "考古学的巅峰"
 academics.2114.d: "今天，我们从考古博物馆收到一封被泡软了以至于难以辨认的信。"
 academics.2114.f: "只有寄件人一栏可供辨认。显然是博物馆馆长的签名。秘书猜测他在写信时疑似喜极而泣。"
 academics.2114.g: "我们和他一样高兴。"
 academics.2115.t: "考古学的挫败"
 academics.2115.d: "今天，我们从考古博物馆收到一封被泡软了以至于难以辨认的信。"
 academics.2115.f: "只有寄件人一栏可供辨认。显然是博物馆馆长的签名。秘书猜测他在写信时泪水夺眶而出。最后一次考古任务的失败一定让他陷入了深深的沮丧之中。"
 academics.2115.g: "我们和他一样伤心。"
 je_academics_excellent_collection: "考古学重心：优秀展览"
 je_academics_excellent_collection_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]希望我们举办一场优秀展览。我们需要来自一个考古区域的#G 100件#![Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]和#p 1件#![concept_lepsius_major_artifact]来完成这项工作。"
 academics.2116.t: "我们需要找到比[SCOPE.sCountry('rival_scope').GetName]更多的文物"
 academics.2116.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]的成员对于[SCOPE.sCountry('rival_scope').GetName]获得了比我国更多[Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]的现状感到不满。他们要求在10年时间里我们找到总数比[SCOPE.sCountry('rival_scope').GetName]更多的#b 文物#!。"
 academics.2116.f: "[SCOPE.sCountry('rival_scope').GetName]此等无足轻重的国家收藏的文物数量竟然比我们还多，真是奇耻大辱。我们必须超过这些只知道挖宝藏，甚至不懂如何真正进行考古的盗墓贼！这些野蛮人导致我们失去了多少知识？\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]会员"
 academics.2116_goal_tt: "你需要在#n 10#!年内比宿敌[SCOPE.sCountry('rival_scope').GetName]收集更多[Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]。他们有[GetPlayer.MakeScope.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+]件，而我们有[GetPlayer.MakeScope.Var('lepsius_total_artifacts').GetValue|0+]件。"
 academics.2116_reward_tt: "作为奖励，4年内知识分子将获得#p 5点支持度#!与#p 10%#!威望加成。"
 academics.2116.g: "我是考古学家，我正在挖洞！"
 academics.2116.h: "考古学不是寻宝游戏！"
 academics_no_competition_with_rival_total_artifacts: "输掉寻宝竞赛"
 academics_competition_with_rival_won_total_artifacts: "赢得寻宝竞赛"
 je_academics_rivalry_for_artifacts: "考古学重心：寻宝"
 je_academics_rivalry_for_artifacts_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]希望我们找到比宿敌[SCOPE.sCountry('target').GetName]更多的[Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]。\n\n我们的#b 文物总数#!：[ROOT.Var('lepsius_total_artifacts').GetValue|0+]\n[SCOPE.sCountry('target').GetName]的#b 文物总数#!：[ROOT.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+]"
 je_academics_rivalry_for_artifacts_success: "你（[GetPlayer.MakeScope.Var('lepsius_total_artifacts').GetValue|0+]）比[SCOPE.sCountry('target').GetName]（[GetPlayer.MakeScope.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+]）拥有更多[Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]。"
 academics.2117.t: "奇妙的文物收藏"
 academics.2117.d_rival: "我们比[ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName]收集到了更多的文物。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]与民众为国家的胜利感到兴奋！"
 academics.2117.d_rival_gone: "我国的考古对手滚蛋了。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]与民众为国家的胜利感到兴奋！"
 academics.2117.f: "很明显，我国的考古收藏远胜于那些野蛮人。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]对藏品非常满意，尽管还有更多文物需要从这些野蛮人的手中解救出来。\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]会员"
 academics.2117.g: "救下了如此之多的文物！"
 academics.2118.t: "我们未能扩大考古学收藏"
 academics.2118.d: "我们未能使考古收藏超越宿敌[ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName]。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]的成员非常不满。"
 academics.2118.f: "野蛮人的脏手正在玷污人类的历史。你们怎么能让文物被那些盗墓贼洗劫一空？如此之多的知识将会流失，因为他们宁要宝藏而不愿保存我们的历史。令人作呕！\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2118.g: "我们不需要土里挖出来的古董。"
 academics.2200.t: "我们需要找到比[SCOPE.sCountry('rival_scope').GetName]更多的标本"
 academics.2200.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]的成员对[SCOPE.sCountry('rival_scope').GetName]收集的[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]多于我们国家感到不满。他们要求我们在10年内找到比[SCOPE.sCountry('rival_scope').GetName]更多的#b 标本#!。"
 academics.2200.f: "我们的标本收藏与[SCOPE.sCountry('rival_scope').GetName]相比几乎不值一提。他们拥有我们想要的一切！我甚至听说他们有一种巨大的花，闻起来像腐尸，而我们的镇馆之宝只有一只橙色的蝴蝶。我们需要找到新的标本，前无古人的标本！否则它们可能会落入这些动物屠夫之手！\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]会员"
 academics.2200_goal_tt: "你需要在#n 10#!年中收集到比宿敌[SCOPE.sCountry('rival_scope').GetName]更多的[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]。他们有[GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+]件而我们有[GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]件。"
 academics.2200_reward_tt: "作为奖励，4年内知识分子将获得#p 5点支持度#!与#p 10%#!威望加成。"
 academics.2200.g: "立即派出博物学家！"
 academics.2200.h: "浪费时间！"
 academics_no_competition_with_rival_specimen: "输掉标本竞赛"
 academics_competition_with_rival_won_specimen: "赢得标本竞赛"
 je_academics_rivalry_for_specimen: "博物学重心：标本竞赛"
 je_academics_rivalry_for_specimen_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]希望我们找到的[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]比竞争对手[SCOPE.sCountry('target').GetName]更多。\n\n我们的#b 总标本数#!：[ROOT.Var('dubois_specimen').GetValue|0+]\n[SCOPE.sCountry('target').GetName]的#b 总标本数#![ROOT.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+]"
 je_academics_rivalry_for_specimen_success: "你（[GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]）比[SCOPE.sCountry('target').GetName]（[GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+]）拥有更多[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]。"
 academics.2201.t: "令人惊叹的标本收藏"
 academics.2201.d_rival: "我们收集了比宿敌[ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]更多的[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]收藏。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]与人民为我们国家的胜利感到兴奋！"
 academics.2201.d_rival_gone: "我们在生物收藏方面的竞争对手已经不复存在。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]和人民对我们国家的这一胜利感到兴奋！"
 academics.2201.f: "我们终于有了无愧于伟大民族的#b 标本收藏#!！是时候展示这个星球上最迷人的生物了。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]目前对我们的收藏感到满意。显然，我们必须继续增加我们的收藏，以防止其他国家屠杀这些可怜的动植物。\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2201.g: "值得收藏！"
 academics.2202.t: "我们未能收集比[ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]更多的标本"
 academics.2202.d: "我们未能使标本收藏的规模超越[ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]的成员被彻底击垮了。"
 academics.2202.f: "现在他们也发现了世界上最迷人的动物。一只会飞的蜥蜴。他们以科学院院长的名字为其命名。你失败了。\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2202.g: "我永远无法从科学上恢复过来！"
 academics.2203.t: "[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]想要为动物园取得[SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]"
 academics.2203.d: "[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]向政府请愿，希望在10年内为[concept_dubois_zoo]购得一只[SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]。"
 academics.2203.f: "我们的动物园缺少一只[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]。我们需要政府找到[SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]并将其带到动物园。毕竟我们不能允许动物园里没有这种奇妙的动物。\n\n此致，[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]代表"
 academics.2203_goal_tt: "我们需要在10年内为[concept_dubois_zoo]取得一只[GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]"
 academics.2203_reward_tt: "作为奖励，在5年内[GetPlayer.MakeScope.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]将会获得#p 5#!点支持度以及#p 5%#!人群吸引力，你的国家将获得#p 5%#!威望加成。"
 academics.2203.g: "全部抓住！"
 academics.2203.h: "我在领导伟大的国家，顾不上什么动物园！"
 je_academics_get_exotic_animal: "博物学重心：为动物园获得[GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]"
 je_academics_get_exotic_animal_reason: "[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]希望我们为[concept_dubois_zoo]获得[SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]。\n有多种方式可以获得这种[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]。"
 academics.2204.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]的新家"
 academics.2204.d: "我们成功为[concept_dubois_zoo]获得了[SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]。[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]无疑会感到开心。"
 academics.2204.f: "政府成功为我们荣耀的国家获得了[SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]。这表明我们的国家有足够的实力将其资源用于国民娱乐。谢谢你！\n\n此致，[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]代表"
 academics.2204.g: "美妙的动物！"
 academics.2205.t: "动物园未获得新动物"
 academics.2205.d: "我们没能为动物园取得[SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]。[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]并不开心。"
 academics.2205.f: "你连只动物都搞不来，我们怎么能相信你能领导好一个国家？\n\n此致，[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]代表"
 academics.2205.g: "我们没时间去找随便什么动物！"
 academics_exotic_animal_acquired_ig_modifier: "获得珍稀动物"
 academics_exotic_animal_not_acquired_ig_modifier: "未获得珍稀动物"
 academics_exotic_animal_acquired_country_modifier: "获得珍稀动物"
 academics.2206.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]要求建立动物园"
 academics.2206.d: "我国此前在自然研究领域的科学成就可谓微薄。因此，一些有影响力的科学界代表向政府请愿。"
 academics.2206.f: "为了加强通用研究，特别是动物学研究，拥有珍稀动物的动物园是必不可少的。这样的设施也将极大地改善人民的福祉。因此，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]建议应使用一切手段建立国家动物园，并协助培养一位充满活力的动物学家。\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]理事会"
 academics.2206.g: "总能找到几只动物。"
 academics.2206.h: "他们没有别人能烦了吗？"
 academics.2207.t: "新动物园"
 academics.2207.d: "科学学会的一些代表亲自出席了新动物园的落成典礼。"
 academics.2207.f: "太棒了，新动物园真的太棒了。会员们度过了美好的一天，对免费的宠物食品感到特别高兴。我们希望这只是一个开始，希望刚刚开业的动物园能尽快扩建，充满更多珍贵、特别、奇妙的生物。\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]理事会"
 academics.2207.g: "给我留点花生！"
 academics.2208.t: "没有动物园"
 academics.2208.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]今天写了一封苦涩的信，抱怨建立新动物园的愿望未能实现。"
 academics.2208.f: "令我们非常遗憾的是，我们发现现任政府似乎是由科学、生物学、特别是动物学的彻头彻尾的敌人组成的，或者他们至少是一群不人道的动物仇恨者。也许在这样的环境下，再伟大的动物也会白白浪费掉。\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]理事会"
 academics.2208.g: "如果你很固执，愿望肯定不会实现。"
 academics.2206_goal_tt: "你需要收集#p 5#!种[Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]并在#n 5#!年内建成一座[concept_dubois_zoo]。"
 academics.2206_reward_tt: "作为奖励，我们的博物学家将会获得#p 50点经验#!。如果没有博物学家，将会获得一位。"
 academics.2209.t: "扩建动物园"
 academics.2209.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]的公开信陈述了目前国立动物园多样性过低的现实。"
 academics.2209.f: "尽管我们的首都现在有了动物园设施，为科学家研究动物和付费购票的公众提供了一些物种，但几乎没有达到与城市规模和我们国家的重要性相称的标准。因此，为了提高声誉、娱乐大众并促进科学发展，我们建议将现有动物园至少扩建为一个中等规模的动物园。\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]理事会"
 academics.2209.g: "给我更多动物！"
 academics.2209.h: "我们有更重要的事要做。"
 academics.2210.t: "更大的动物园"
 academics.2210.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]的公开信陈述了目前国立动物园多样性过低的现实。"
 academics.2210.f: "尽管我们的动物园在过去发展到了相当大的规模，但它还没有享有它本可以有而且应该具有的国际重要性，以使以我们的动物学热情给其他国家留下深刻的印象。我们需要越来越多的珍稀动物。这不仅增进科学事业，也增长了我们的威望。我们强烈建议将动物园升级为大型动物园。\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]理事会"
 academics.2211.t: "蓬勃发展的动物园"
 academics.2211.d: "扩建后的动物园是首都的主要景点之一，深受学者和普通市民的欢迎。科学协会很高兴地发现到他们的愿望已经实现。"
 academics.2211.f: "做得好！新动物园更加宽敞，满足了描绘更广泛的动物世界的要求。我希望你也想到了鸭嘴兽？我们愿意为此提供赞助。它不会碰巧叫做叫派瑞吧？\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]理事会"
 academics.2211.g: "我们的动物园现在塞满了全世界的动物！"
 academics.2212.t: "动物学不满"
 academics.2212.d: "科学学会想知道，当他们的忧虑被践踏，比如对一些动物园动物的微小要求时都得不到满足时，向政府请愿是否仍然值得。"
 academics.2212.f: "我们非常，非常失望。\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]理事会"
 academics.2212.g: "他们应当在动物园开展研究，而不是一味寻欢作乐。"
 academics.2209_goal_tt: "你需要在#n 10#!年内将[concept_dubois_zoo]扩建至#p 3级#!（中型动物园）。"
 academics.2210_goal_tt: "你需要在#n 10#!年内将[concept_dubois_zoo]扩建至#p 4级#!（大型动物园）。"
 academics.2209_reward_tt: "作为奖励，我们的博物学家将会获得#p 50点经验#!。如果没有博物学家，将会获得一位。"
 je_academics_found_zoo: "博物学重心：建立动物园"
 je_academics_found_zoo_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]希望我们建造一座[concept_dubois_zoo]以增进知识，同时也提高知识分子的生活水平。建造一座动物园需要#p 5#!只[Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]，可以由[concept_dubois_naturalist]在本土动物学探险与狩猎旅行中捕捉。动物也可以从其他国家购买。"
 je_academics_medium_zoo: "博物学重心：扩建动物园"
 je_academics_medium_zoo_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]希望我们扩建[concept_dubois_zoo]。我们有十年时间将动物园扩建至#p 中型动物园#!。这需要更多的[Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]，可以由[concept_dubois_naturalist]在本土动物学探险与狩猎旅行中捕捉。动物也可以从其他国家购买。"
 je_academics_large_zoo: "博物学重心：扩建动物园"
 je_academics_large_zoo_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]希望我们扩建[concept_dubois_zoo]。我们有十年时间将动物园扩建至#p 大型动物园#!。这需要更多的[Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]，可以由[concept_dubois_naturalist]在本土动物学探险与狩猎旅行中捕捉。动物也可以从其他国家购买。"
 academics.2300.t: "我们需要比[SCOPE.sCountry('rival_scope').GetName]找到更多化石"
 academics.2300.d: "我们没有足够的[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]使收藏规模超过[SCOPE.sCountry('rival_scope').GetName]。因此[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]，希望我们发现总数比[SCOPE.sCountry('rival_scope').GetName]更多的#b 化石#!。如果能够击败这个对手，他们肯定会非常感激。"
 academics.2300.f: "我们在[SCOPE.sCountry('rival_scope').GetName]的对手拥有来自世界各地不同年代和地点的各种化石，但我们的化石在时间范围和地理范围上都非常有限。对于我们这样一个伟大的民族来说，这是不可接受的奇耻大辱。\n我们需要立即扩大化石收藏！\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]会员"
 academics.2300_goal_tt: "你需要在#n 10#!年内收集比宿敌[SCOPE.sCountry('rival_scope').GetName]更多的[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]。他们有[GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+]件而我们有[GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]件。"
 academics.2300_reward_tt: "作为奖励，4年内知识分子将获得#p 5点支持度#!，你将获得#p 10%#!威望加成。"
 academics.2300.g: "啊哈，化石之争！"
 academics.2300.h: "我们不需要落满尘土的石头……"
 academics_no_competition_with_rival_fossils: "化石之争落败"
 academics_competition_with_rival_won_fossils: "化石之争获胜"
 je_academics_rivalry_for_fossils: "古生物学重心：化石之争"
 je_academics_rivalry_for_fossils_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]希望我们收集比宿敌[SCOPE.sCountry('target').GetName]更多的[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]。\n\n我们的#b 化石总数#!：[ROOT.Var('dubois_fossil').GetValue|0+]\n\n[SCOPE.sCountry('target').GetName]的#b 化石总数#!：[ROOT.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+]"
 je_academics_rivalry_for_fossils_success: "你（[GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]）拥有比[SCOPE.sCountry('target').GetName]（[GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+]）更多的[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]。"
 academics.2301.t: "奇妙的化石展览"
 academics.2301.d_rival: "我们收集了比宿敌[ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]更多的[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]与人民为我们国家的胜利感到兴奋！"
 academics.2301.d_rival_gone: "我们在化石收藏方面的竞争对手已经不复存在。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]和人民对我们国家的这一胜利感到兴奋！"
 academics.2301.f: "从一开始就很明显，我们需要比竞争对手更多的化石收藏。现在我们收集了这么多从寒武纪到第四纪，从美洲到太平洋岛屿的化石，我们确实有了值得称道的展览！显然几年前就应如此，我们应该进一步扩展藏品。正如农民所说，目前的情况只是“足够好”。\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2301.g: "恩怨终结！"
 academics.2302.t: "我们未能收集比[ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]更多的化石"
 academics.2302.d: "我们未能使化石收藏的规模超越[ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]的成员被彻底击垮了。"
 academics.2302.f: "他们的收藏跨越了亿万年，他们拥有着一切，而我们有的是一些布满灰尘的岩石，上面的化石几乎看不到……这太可怕了。这是我们民族的耻辱！恶心！\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2302.g: "我又用不着旧石头……"
