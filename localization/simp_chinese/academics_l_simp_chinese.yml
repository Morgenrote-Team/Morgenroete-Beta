 je_academics_first_railway: "工业重心：建设[SCOPE.GetRootScope.GetCountry.GetName]的第一条铁路"
 je_academics_first_railway_reason: "现在，铁路已经传播到[SCOPE.GetRootScope.GetCountry.GetName]，我们的许多实业家都希望我们能建造这样的设备，以方便货物运输。这将有助于我们成为工业强国。"
 academics.2400.t: "我们需要铁路！"
 academics.2400.d: "铁路可以更方便地运输货物。因此，[SCOPE.GetRootScope.GetCountry.GetName]的实业家们要求在未来五年内在我国修建一条铁路。"
 academics.2400.f: "“我们仍在土路和河流上运输我们的产品。这种状况是不可接受的。如果我们有更好的方式来运输货物和资源，我们的利润就会激增，我们就可以建造更多的工厂，从而为每个人提供更好的生活条件！！”"
 academics.2400.g: "我们能建，对吧？"
 academics_industrialists_happy_modifier: "实业家很满意"
 academics_industrialists_discontent_modifier: "实业家不满"
 academics_first_railway_modifier: "第一条铁路"
 academics.2401.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_title_custom_loc')]"
 academics_spanisch_broetli_title_loc: "瑞士北部铁路"
 academics_ferrovia_torino_genova_title_loc: "都灵‑热那亚铁路"
 academics_generic_title_loc: "[SCOPE.GetRootScope.GetCountry.GetName]的第一条铁路"
 academics.2401.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_desc_custom_loc')]"
 academics_spanisch_broetli_desc_loc: "瑞士首次开通了从苏黎世到巴登的火车线路。希望这条铁路线能为货物、人员和邮件的运输提供便利，并促进巴登和苏黎世的工业发展。至少，苏黎世的富人们可以在早上派仆人到巴登去买新鲜的巴登糕，这是一种由巴登的一位著名面包师制作的著名甜面包。实业家们对这条新铁路线非常满意。"
 academics_ferrovia_torino_desc_title_loc: "都灵—热那亚铁路在[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullNameNoFormatting]的注视下正式开通。从都灵到热那亚的火车线路是意大利工程的杰作。复线全长169公里，桥梁30多座，配备全球最长的3259米隧道。\n希望这条铁路线将使都灵和热那亚之间的货物和乘客运输更快，并促进我国产业的发展。"
 academics_generic_desc_loc: "我国第一条铁路线的建设既不容易也不便宜。但多亏了卓越的[SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting]工程技术，它在创纪录的时间内完工。实业家们非常高兴，因为这条铁路线为他们提供了快速运输货物和资源的途径。"
 academics.2401.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_flavor_custom_loc')]"
 academics_spanisch_broetli_flavor_loc: "令人垂涎欲滴的巴登糕香味扑鼻而来。这种美味的糕点是随瑞士第一列火车运送的，这列火车连接着苏黎世和巴登。\n\n#b 历史背景：#!从苏黎世到巴登的铁路于1847年竣工，当时正值瑞士分离同盟战争爆发前不久。当时有4辆机车，每天可以接驳4 条线路。它们可以在大约45 分钟内行驶23公里，但它在经济上并不成功，很快就取消了向阿劳扩张的计划，并取消了其中一条日常线路。"
 academics_ferrovia_torino_genova_flavor_loc: "热那亚大主教为第一台机车洗礼。然后这个庞然大物缓缓启动——第一列从热那亚开往都灵的火车。\n\n#b 历史背景：#!该线是撒丁岛‑皮埃蒙特的第一条铁路线，于1844年7月18日由国王卡洛·阿尔贝托一世委托建造。甚至在全线完工之前，线路的第一部分已相继以单轨方式开通。1853年12月6日，线路正式开通。\n这条铁路线很快成为意大利最繁荣的铁路。主要原因是其使从热那亚港口运输货物更容易。1889年，乔维山口修建了一条替代线路，坡度低于旧线路。\n1898年，火车工作人员在乔维隧道中窒息而死，机车在没有司机的情况下继续行驶并撞上了一辆等候的火车，导致13人遇难，最终这条线路电气化了。"
 academics_generic_flavor_loc: "“我们也是时候拥有自己的铁路线了！之前我们远远落后于竞争对手！现在我们终于可以体面地运输所有产品了！”"
 academics.2401.g: "我们能办到！"
 academics.2402.t: "我们没能建成铁路"
 academics.2402.d: "自实业家门要求建造我国第一条铁路线以来，已经过去5年了。我们没能按时完工。这肯定会影响实业家对政府的看法。"
 academics.2402.f: "“连铁路都建不成，你的政府真是个彻彻底底的失败者。太丢脸了！”"
 academics.2402.g: "我们失败了。"
