 academics_constitution_confirmed_modifier: "确认宪法"
 academics_academic_purge_modifier: "学阀\n#R ‑1#!#o 学术发展点#!"
 academics_good_to_be_british_modifier: "当英国人真好"
 academics_supported_hanover_modifier: "支持汉诺威"
 academics_supported_goettinger_seven_modifier: "支持哥廷根七君子"
 academics_kneeling_decree_modifer: "屈膝令"
 academics_germanistentag_modifier: "日耳曼学者大会"
 je_goettinger_seven_monument: "哥廷根七君子纪念碑"
 je_goettinger_seven_monument_reason: "统一的德意志民族必须缅怀有人挺身而出的历史，就像哥廷根七君子一样。建造一座纪念碑可以激励几代学者！不过前提是德国政府赞同这些思想。"
 academics.3101.t: "汉诺威宪法"
 academics.3101.d: "国王恩斯特·奥古斯特强调他将废除国家基本法（Staatsgrundgesetz），作为他的第一个正式行动之一，他并不觉得应受此约束。"
 academics.3101.f: "1819年，摄政王颁布了汉诺威的第一部宪法，这部宪法只是表明汉诺威在维也纳会议下从一个选区变成了一个王国。剑桥公爵作为威廉国王在汉诺威的总督，建议对汉诺威政府进行彻底重组。威廉四世在1833年同意了一部新宪法，坎伯兰公爵既没有被征求同意，也没有得到同意，他曾正式抗议在未征得他同意的情况下通过这部宪法。国王抵达汉诺威后，立即中止有争议的宪法并召开的汉诺威议会，理由是没有征得他的同意，而且宪法不符合王国。"
 academics.3101.g: "中止宪法"
 academics.3101.h: "国王不能凌驾于法律之上"
 academics.3102.t: "哥廷根七君子"
 academics.3102.d: "历史学家和政治家弗里德里希·克里斯托夫·达尔曼对国王恩斯特·奥古斯特按照自己的喜好修改宪法的计划提出了质疑，因为达尔曼本人也为宪法的制定做出了贡献。哥廷根大学的其他六位知名教授也加入了抗议行列，共同捍卫1833年宪法。很快，这些人就被称为“哥廷根七君子”，成为国王的眼中钉。"
 academics.3102.f: "达尔曼的质疑产生了爆炸性的影响，该哥廷根大学的学生们制作了数百甚至数千份文章，并在全德国散发。其他六位抗议者是日耳曼主义作家格林兄弟（写童话故事的那位兄弟）、法学家威廉·爱德华·阿尔布雷希特、历史学家格奥尔格·哥特弗利德·格维努斯、物理学家威廉·爱德华·韦伯以及神学家和东方学家海因里希·埃瓦尔德。抗议活动的影响迫使国王采取了行动，七名不服从命令的教授受到了大学法庭的审讯。"
 academics.3102.g: "他们应该被撤职并放逐！"
 academics.3102.h: "在事态升级之前，满足他们的要求……"
 academics.3103.d: "维多利亚女王在英国登基后，人们对失去与汉诺威长达一百二十多年的联盟感到悲伤。但在德国最近发生的事件之后，我们可以自信地说：我们分道扬镳是件好事。"
 academics.3103.f: "新国王登基仅几个月后，汉诺威就废除了英国统治时期颁布的宪法。新国王恩斯特·奥古斯特都现在面临着来自学术界的全面反对。整个德意志地区都在谈论这场争端。诚然，一旦一个国家离开了英国的势力范围，它就会陷入野蛮状态。"
 academics.3103.g: "当英国人太好了"
 academics.3104.d: "汉诺威国王与七位顽固不化的教授之间的冲突震撼了德意志邦联各州。国王恩斯特·奥古斯特废除宪法后，哥廷根七君子起文反对，随后他们失去了职位，但却在德意志自由派中赢得了大量同情。"
 academics.3104.f: "历史学家和政治家弗里德里希·克里斯托夫·达尔曼反对欧内斯特修改宪法以适应自己的计划，因为达尔曼自己曾参与1833年宪法的制定。来自哥廷根大学的另外6位著名教授加入了抗议，并为1833年的宪法辩护。其他6名抗议者是日耳曼语言学家兄弟威廉和雅各布·格林(著名的童话和民间故事作家兼讲述者，统称格林兄弟)、法学家威廉·爱德华·阿尔布雷希特、历史学家格奥尔格·戈特弗里德·格尔维努斯、物理学家威廉·爱德华·韦伯和神学家兼东方学家海因里希·乔治·奥古斯特·埃瓦尔德。这些教授的抗议行动虽然直接影响有限，但在德国和欧洲大部分地区引起了极大的公众关注和媒体轰动，他们7人也因此在普通公众中获得了很高的声望。"
 academics.3104.g: "恕我直言，国王做得太过分了。"
 academics.3104.h: "这群腐儒已经受到了应有的惩罚。"
 academics.3105.t: "关于汉诺威的激烈争论"
 academics.3105.d: "与“哥廷根七君子”的冲突在德意志邦联的其他州也引起了关注。甚至在英国，人们也对国王废除宪法感到厌恶。"
 academics.3105.f: "[SCOPE.sCountry('academics_anti_hanover_country').GetName]是众多批评国王恩斯特·奥古斯特行为的德国国家之一。但仍有一些国家，尤其是实行专制统治的国家，对这一进程表示理解，其中就有[SCOPE.sCountry('academics_pro_hanover_country').GetName]。"
 academics.3105.g: "那不关他们的事！"
 academics.3106.t: "学生宣传"
 academics.3106.d: "尽管国家竭力阻止关于“哥廷根七君子”的宣传，但自由派学生还是在大城市大规模散发传单。"
 academics.3106.f: "“记住我们的英雄！记住哥廷格七君子！赞美他们的美德！”当达尔曼教授发表反对汉诺威国王的文章时，他得到了德国学生和自由主义者的普遍支持。它在德意志邦联诸国产生了爆炸性的影响。哥廷根大学的学生们制作了成百上千的副本，并在德意志各地传播。"
 academics.3106.g: "这群无法无天的学生！"
 academics.3107.t: "雅各布·格林在[ROOT.GetCountry.GetNameNoFlag]"
 academics.3107.d: "德国著名学者兼法学家雅各布·格林被放逐出汉诺威后，正在寻找新家。我们国家民众对“哥廷格七君子”的同情已经怜悯他们本身，这也是他希望找到一份新工作的原因。"
 academics.3107.f: "雅各布·路德维希·卡尔·格林是德国作家、语言学家、文字学家、法学家和民俗学家。他发现了格林定律，是《德语词典》的合著者、《德意志神话学》的作者和《格林童话》的编辑。他是威廉·格林的兄长，两人合称格林兄弟。"
 academics.3107.g: "欢迎他。"
 academics.3107.h: "我们不需要另一个脾气暴躁的学者。"
 academics.3108.t: "威廉·爱德华·韦伯在[ROOT.GetCountry.GetNameNoFlag]"
 academics.3108.d: "被逐出汉诺威后，著名物理学家威廉·爱德华·韦伯正在寻找新家。我们国家民众对“哥廷格七君子”的同情已经怜悯他们本身，这也是他希望找到一份新工作的原因。"
 academics.3108.f: "威廉·爱德华·韦伯，19世纪最重要的物理学家之一。国际单位制中磁通量的单位“韦伯”（缩写：Wb）是以威廉·韦伯的名字命名的"
 academics.3111.t: "格林童话"
 academics.3111.d: "雅各布·格林和威廉·格林兄弟推出了《德语词典》的第一卷，旨在涵盖全部日耳曼词汇。这是一项艰巨的任务，但却能将德意志民族更加紧密地联系在一起。"
 academics.3111.f: "《德语词典》是德语最重要的词典之一，它对于德语的重要性就像《牛津英语词典》对于英语一样，收录了大量详细的历史信息，描绘了德语词汇从起源到经过时间演变而在使用上发生的变化，其中例句都取材于真实文件材料。在德语世界里，这个词典也被亲切地称为《格林词典》。它是由著名的格林兄弟于1838年发起编纂的。他们最初预计这个庞大的编纂工程会持续10年时间，大概会产出6至7卷。但事实上第一卷直到1854年才终于得以出版。威廉·格林于1859年去世，雅各布于1863年去世，那时他们正在编辑“Frucht”(水果)这个词条。在兄弟两人去世后，包括普鲁士科学院和柏林科学院在内的多个机构继续参与了词典的编纂工作，哥廷根大学的一个编纂中心也参与其中。直到1961年，这个伟大的编纂工程才最终完成，最终的词典包含32卷，收录约35万个重要词条。《格林词典》不仅是一部科学巨著，也是德语世界的一部民族文化瑰宝。"
 academics.3111.g: "这应该在德意志的每个州发表！"
 academics.3112.g: "我希望他们制作一本新的童话书而不是这本……"
 academics.3113.t: "首届日耳曼学者大会将在法兰克福举行"
 academics.3113.d: "几位德意志知识分子已经邀请一些志同道合的人参加法兰克福的“日耳曼学者大会”。尽管许多人想把此事仅仅作为一个文化活动看待，但其明显的政治意味不容忽视。"
 academics.3113.f: "“日耳曼学者大会”并不是一个只为德意志学者而设的活动，而是一场所有德国德意志大学科学家的盛会，是他们为了培养德国民族感情而发起的一项倡议。在前马尔兹时期，德意志研究这个术语并不像今天那样狭隘，它涵盖了历史学家、法学家、语言学家和文学学者，他们都关注德意志历史、德意志法律和德意志语言的研究。在第一届日耳曼学者大会上，由图宾根的律师奥古斯特·路德维希·雷舍尔于1846年在法兰克福发起，一群德国的精英学者聚集在一起，讨论了德国的命运和未来。弗里德里希·克里斯托夫·达尔曼、格奥尔格·魏茨和约翰·古斯塔夫·德罗伊森强烈主张石勒苏益格‑荷尔斯泰因是德意志不可分割的一部分。雅各布·格林姆阐述了“不精确科学的价值”，他的兄弟威廉·格林姆介绍了他们正在编纂的德语词典。会议在法兰克福的罗马大厦举行，这里曾经是神圣罗马帝国的皇帝选举地。第二届德国学者日于1847年在吕贝克举行，这里是汉萨同盟的重要城市。原定于1848年在纽伦堡举行的第三届日耳曼学者大会，由于三月革命的爆发而取消了，这场革命改变了德意志的历史。"
 academics.3113.g: "德国是一个文化大国。"
 academics.3113.h: "他们的自由主义理想为我们提供了指导。"
 academics.3115.t: "跪拜之争"
 academics.3115.d: "在拿破仑时代兼并了大片周边土地后，后巴伐利亚获得了广大的新教领土。在这一时期，国王提倡对臣民采取更为宽容的政策。其中就包括了规定新教士兵不必在天主教弥撒或游行队伍前跪下的法令。然而，部长卡尔·冯·阿贝尔提议改变这一点。"
 academics.3115.f: "19世纪上半叶的巴伐利亚王国发生的所谓的跪拜之争始于巴伐利亚部长卡尔·冯·阿贝尔的一项法令，该法令还要求新教士兵在服兵役期间需在领受圣餐时跪拜。该法令被称为“屈膝令”，引发了众议院持续数年的激烈争论。"
 academics.3115.g: "我们是个天主教国家，这里的人们习惯了下跪！"
 academics.3115.h: "但我们的新教同胞又如何呢？"
