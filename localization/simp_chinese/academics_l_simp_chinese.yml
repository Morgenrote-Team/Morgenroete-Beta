 academics.140.t: "我们的工程师[ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName]现在是一名土木工程师"
 academics.140.d: "多年的土木工程规划得到了回报。在建造了许多桥梁和隧道之后，[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]现在被认为是一位大师级的[concept_tesla_civil_engineer]，其经验有助于未来的项目！"
 academics.140.f: ""
 academics.140.g: "工程师是我们的未来！"
 academics.141.t: "我们的工程师[ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName]现在是一名机械工程师"
 academics.141.d: "多年的机器工程规划得到了回报。在创造的许多发明和新机器之后，[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]现在被认为是一位大师级的[concept_tesla_mechanical_engineer]，其经验有助于未来的项目！"
 academics.141.f: ""
 academics.141.g: "真是时代进步的引擎！"
 academics.142.t: "我们的工程师[ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName]现在是一名军事工程师"
 academics.142.d: "多年的军事工程规划得到了回报。在常年建造堡垒、制造新武器和装备士兵后，[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]现在被认为是一位大师级的[concept_tesla_military_engineer]，其经验有助于未来的项目！"
 academics.142.f: ""
 academics.142.g: "军队的栋梁之材！"
 academics.143.t: "我们的工程师[ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName]现在是一名电气工程师"
 academics.143.d: "利用电力一直是[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]博士的梦想。在该领域取得多项突破后，[ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe]现在被认为是一位大师级的[concept_tesla_electrical_engineer]"
 academics.143.f: ""
 academics.143.g: "知识的火花！"
 academics.144.t: "我们的工程师[ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName]现在是一名航空工程师"
 academics.144.d: "长久以来，人类一直梦想着飞翔。现在，[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]博士站在了航空工程的最前沿。在该领域取得多项突破后，[ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe]现在被视为大师级的[concept_tesla_aeronautical_engineer]。"
 academics.144.f: ""
 academics.144.g: "直指蓝天！"
 notification_academics_yearly_experience_gain_notification_name: "年度学术经验获得"
 notification_academics_yearly_experience_gain_notification_desc: "每位可以获得经验的学者获得#p 5#!经验。"
 academics.1000.t: "[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]博士请求资助"
 academics.1000.d: "我们的[concept_tesla_engineer][ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName]博士对[ROOT.Var('tesla_engineer_var').GetCharacter.GetHerHis]的部门所获的资助感到不足。[ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe]要求大幅度增加对[ROOT.Var('tesla_engineer_var').GetCharacter.GetHerHis]研究的资助。"
 academics.1000.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')]另一方面，我正在从事真正的研究！具有科学效益的研究……\n我的部门应该获得更多的资金！我目前正在从事一个将改变我们世界的项目！\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_engineer_focus_custom_loc')]\n\n但为了实现我的研究，我们还需要更多的资金！"
 academics.1000.g: "资助他们的研究！"
 academics.1000.h: "谁在乎几个工程师？"
 academics_additional_funding_engineer_modifier: "对工程师的额外资助"
 academics_no_funding_engineer_modifier: "不资助工程师"
 dubois_humanities_receive_promotion_loc: "那些古墓奇兵和恋尸癖对我们的社会毫无贡献！"
 dubois_natural_history_receive_promotion_loc: "为什么蝴蝶收藏家和怪物建造者得到了所有的资助，而我们却只能靠剩下的钱勉强度日？"
 dubois_mathematics_receive_promotion_loc: "这太愚蠢了，那些疯癫的修补匠还有占星师嘴里说出来的愿望都得到了满足，而我们却只能靠面包屑过活！"
 academics_engineer_focus_atmospheric_engine_loc: "我们正在尝试利用蒸汽的力量，用机械代替人工。这将使开采资源或进行生产变得更便宜！"
 academics_engineer_focus_computer_loc: "我们正在尝试制造一台可以进行各种计算的机器。如果成功，我们就可以拥有精确度最高而不带有一丝一毫错误的答案，也就意味着计算诉诸人力的时代过去了。"
 academics_engineer_focus_washing_machine_loc: "我们的目标是制造一台自动洗衣机。这样我们就不必把时间浪费在洗脏衣服上了，社会会因此而大大改变。"
 academics_engineer_focus_lighter_loc: "你能想象一个能装在口袋里的小型打火机会多有用吗？一个能制造火焰点燃蜡烛或者香烟的小打火机？这意味着一大笔财富在向我们招手！"
 academics_engineer_focus_rocket_loc: "我们想要制造一枚能抵达太空的火箭。想象一下这枚火箭的军事用途吧，你可以肆无忌惮地打击你的敌人，但他们却无力反击！"
 academics_engineer_focus_telephone_loc: "想象一个能让你跨越超远距离和他人实时通话的设备！我们实验室正在制造这玩意！"
 academics_engineer_focus_combustion_engine_loc: "火车很实用，但只能在铁轨上运行，还有着难以安放的庞大车体。如果我们可以制造一个能够驱动小型车辆的小型发动机会怎样？大家可以想去哪就去哪。这样一个小型发动机会有很多用处，并且这也是我的团队目前工作的方向！"
 academics_engineer_focus_basic_research_alloys_loc: "我们正在基础研究以寻找尽可能多的有用的合金。如果我们找到了合适的合金，那些现在看来不可能的更坚固的建筑物，更高效的机械设备都将成真！"
 academics_engineer_focus_basic_research_factory_machinery_loc: "我的团队正在研究改进工厂中使用的机器。这有可能大大提高工厂的生产效率并增加国家的财富！"
 academics_engineer_focus_basic_research_housing_loc: "我们正在寻找最高效最廉价的建造住宅的办法。这可以让大家都享受得起更好的居住条件并促进我们建筑业的发展。"
 academics_engineer_focus_basic_research_urban_planing_loc: "我们城市太低效了，我们必须想办法提高城市的效率以增加人民的生活水平！"
 academics.1001.t: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士请求资助"
 academics.1001.d: "我们的[concept_verrier_astronomer][ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]要求大幅增加对[ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis]的天文台的资助。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]强烈表示，如果没有更多的资助，[ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis]的团队将不能发现新的[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]。"
 academics.1001.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')]我们的工作对于破解空间和时间的奥秘来说非常重要。只要我们有足够的钱，我们就能做出很多伟大的发现！\n我们需要一台现代化的望远镜，一台能让我们远远领先于其他国家的望远镜！这事关国家威望！"
 academics.1001.g: "给他们买新的望远镜！"
 academics.1001.h: "还有什么？他们不会再发现任何星星了吗？"
 academics_additional_funding_astronomer_modifier: "对天文学家的额外资助"
 academics_no_funding_astronomer_modifier: "不资助天文学家"
 academics.1002.t: "[ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName]博士请求资助"
 academics.1002.d: "我们的[concept_dubois_naturalist][ROOT.Var('dubois_naturalist_var').GetCharacter.GetFullName]想去某处充满了未知动植物物种的荒野进行研究考察。[ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName]认为在那样的地方能发现许多新[concept_dubois_specimen]。"
 academics.1002.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')]另一方面，我在努力尝试发现世界上所有的物种！这在未来可能相当重要，因为我们都不知道这些新物种有多大的价值。想象一下，我甚至可以用你的名字命名一种新的动物或植物！这听起来不是很酷吗？\n我只是需要足够的资金来进行这次探险。"
 academics.1002.g: "资助他们的考察！"
 academics.1002.h: "我们博物馆里已经有够多的标本了。"
 academics_additional_funding_naturalist_modifier: "对博物学家的额外资助"
 academics_no_funding_naturalist_modifier: "不资助博物学家"
 academics.1003.t: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName]博士请求资助"
 academics.1003.d: "我们的[concept_dubois_paleontologist][ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]迫切想要我们资助他的恐龙博物馆，这将能让[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetHerHim]展示更多的[Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')]与[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]，也有助于提高我国的声望。"
 academics.1003.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')]\n我拥有一座大名鼎鼎的博物馆，却负担不起它的开销。这些恐龙是世界上最伟大的奇迹，却只能在仓库里积灰！\n如果有足够的资金我就可以扩建博物馆，并展出新的骨架，这如梦如幻的展览会给我们国家带来成千上万的游客！\n没有资金，我就得解雇几个助手，没有他们的帮助，天知道我能不能给恐龙装上脑袋！"
 academics.1003.g: "给博物馆更多钱！"
 academics.1003.h: "接下来[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe]就会想要个侏罗纪公园或者什么别的名头。还是免了。"
 academics_additional_funding_paleontologist_modifier: "对古生物学家的额外资助"
 academics_no_funding_paleontologist_modifier: "不资助古生物学家"
 academics.1004.t: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士请求资助"
 academics.1004.d: "我们的[concept_lepsius_archaeologist][ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName]急需资助来组织长期考察与发掘。只有这样才能让我国不落后于其他列强。"
 academics.1004.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')]\n世界上所有其他国家都在一刻不停地派出探险队以掠夺考古宝藏，我们的博物馆里却空荡荡的。任谁也不能接受这样的事情！\n我的队伍急需资金来追赶其他队伍的进度。如果我们仅仅是因为钱不够就错过了国王的陵寝该怎么办？试想一下，我们对手的成就会被整个世界庆祝，我们却只能一事无成地待在角落里。"
 academics.1004.g: "给予他们更多资助！"
 academics.1004.h: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]只想要别人给[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]的奢侈生活买单！"
 academics_additional_funding_archaeologist_modifier: "对考古学家的额外资助"
 academics_no_funding_archaeologist_modifier: "不资助考古学家"
 academics.1005.t: "[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetLastName]博士请求资助"
 academics.1005.d: "我们的[concept_lepsius_anthropologist][ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetFullName]，急需资金来组织进一步的考察和发掘。只有这样，我们的国家才能跟上其他强国的步伐。"
 academics.1005.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')]\n\n所有其他国家都专注于寻找我们曾经进化的痕迹，而我们却只有一些来自中世纪的骨头……这是不可接受的！\n我的团队急需资金跟上步伐。试想一下，在我们国家躺着的第一个人类的骸骨，却被一些根本不在乎的工人毁掉了，是多么恐怖的损失。如果我们得不到资金，我们就没有机会找到这些骸骨！如果我们的对手找到了第一个人类，并证明他们的国家是人类的起源地，那该怎么办？"
 academics.1005.g: "给他们更多的资金！"
 academics.1005.h: "[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe|U]只会用这玩意儿伪造头骨，借此博取名声！"
 academics_additional_funding_anthropologist_modifier: "为人类学家提供额外资金"
 academics_no_funding_anthropologist_modifier: "不资助人类学家"
 academics.2001.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]要求我们专注于探索天空"
 academics.2001.d: "我国还没有进行多少天文学研究，甚至连个领头的[concept_verrier_astronomer]都没有。因此[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]想要绘制一份新的星图并任命首席天文学家。"
 academics.2001.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]要求你增加对天文学的投入。这个重心将使我们获得天空及宇宙的新知识。\n因此，我们在此要求你，首先，绘制一份最新的星图；然后招募一名首席天文学家。\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]委员会签署"
 academics.2001.g: "终成大业！"
 academics.2001.h: "星星？我们还有更重要的事要做！"
 academics_unhappy_intelligentsia: "科学学会很不高兴"
 academics.2001_goal_tt: "你将发现#p 75个#![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]并在#n 10年#!内找到一位[concept_verrier_astronomer]。"
 academics.2001_reward_tt: "作为奖励，你的天文学家将得到#p 15经验#!，并且3年内知识分子的支持度#p +5#!，生产科技的花费#p ‑5%#!。"
 je_academics_find_more_stars: "天文学重心：星图"
 je_academics_find_more_stars_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]希望我们找到[JournalEntry.GetGoalAddValue]个新的[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]以绘制新的星图，同时任命一位新的首席[concept_verrier_astronomer]。\n\n目前为止我们已经找到了[JournalEntry.GetGoalProgressValue]个#b 天体#!。"
 je_academics_find_more_stars_success: "发现#p 75个#!新#b 天体#!"
 je_academics_find_more_stars_event_tt: "我们的新[concept_verrier_astronomer]将发表这份新星图"
 je_academics_find_more_stars_goal: ""
 academics.2002.t: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士发表了新的星图"
 academics.2002.d: "我们已经能绘制新的星图并找到了新的首席[concept_verrier_astronomer]。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]该高兴了！"
 academics.2002.f: "“这份新星图非常精确！与其他国家的星图相比，我们的星图显然是最为优秀的。此外，我们还发现了许多新的恒星，其中有些非常迷人！比如这颗恒星的红光就比通常更强……”"
 academics.2002.g: "万岁！"
 academics_scientific_society_happy: "科学学会很开心"
 academics.2003.t: "我们对天文学的专注一事无成！"
 academics.2003.d: "我们未能充分专注于天文学，以实现 [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]为我们设定的目标。他们不会高兴的！"
 academics.2003.f: "“战争、经济甚至葡萄酒与烈酒对我们的领导人来说似乎都比科学更重要。我们很失望。希望伟大祖国的重心能尽快回到科学上来！”"
 academics.2003.g: "真是遗憾……"
 academics.2004.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]要求我们的[concept_verrier_astronomer]绘制新星图"
 academics.2004.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]希望我们的国家专注于勘测天空。他们请求[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士寻找新的恒星与其他[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]，并绘制一份新星图。"
 academics.2004_goal_tt: "你需要在#n 10年#!内发现#p 100个#![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]。"
 academics.2004_reward_tt: "作为奖励，你的天文学家将得到#p 25经验#!，并且3年内知识分子的支持度#p +5#!，生产科技的花费#p ‑5%#!。"
 je_academics_create_star_chart: "天文学重心：我国天文学家的星图"
 je_academics_create_star_chart_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]希望我们的[concept_verrier_astronomer]找到[JournalEntry.GetGoalAddValue]个新的[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]以绘制新的星图。\n\n目前为止我们已经找到了[JournalEntry.GetGoalProgressValue]个#b 天体#!。"
 je_academics_create_star_chart_success: "发现#p 100个#!新的#b 天体#!"
 je_academics_create_star_chart_event_tt: "我们的[concept_verrier_astronomer]将发表新的星图"
 je_academics_create_star_chart_event_without_astronomer_tt: "我们的新的星图即将出版。"
 je_academics_create_star_chart_failed_event_tt: "我们的[concept_verrier_astronomer]不能提供新的星图。"
 je_academics_create_star_chart_failed_event_without_astronomer_tt: "在失去[concept_verrier_astronomer]之后，我们将不能绘制新的星图。"
 je_academics_create_star_chart_goal: ""
 academics.2005.t: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士发表了新的星图"
 academics.2005.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士被觥筹交错的同事团团围住。\n\n“亲爱的朋友，我就知道你能轻松做到。你的新星图真是非同凡响！真正的杰作！”"
 academics.2006.t: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士失败了！"
 academics.2006.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]未能绘制新星图。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]没能找到足够的恒星与其它[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]的其他成员对这一失败失望至极。"
 academics.2006.f: "尊敬的[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFirstName]。\n\n我们注意到您未能提交新的星图，这再次表明您更偏爱科学之外的其他活动。遗憾的是，这将给我们的协会带来不利影响。我们期待您日后的更佳表现！\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2006.g: "真是遗憾……"
 academics.2007.t: "一张新的星图"
 academics.2007.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]的会议上展示了新的星图，但前任[concept_verrier_astronomer]不幸未能到场。学术界对星图似乎十分满意。"
 academics.2007.f: "“多亏了这幅新星图，我们才能更好地研究天空！希望我们能对天体的运动方式取得许多新的见解！\n这一切都要感谢[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]！为我们干杯，各位先生！”"
 academics.2008.t: "没有天文学家就没有星图"
 academics.2008.d: "失去[concept_verrier_astronomer]使我们发现的恒星与其他[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]少于预期，因此无法绘制新的星图。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]对此并不满意。"
 academics.2008.f: "“我们的政府不仅失去了杰出的首席天文学家，也无法为其他天文学家的工作提供足够的支持。导致观测次数大大减少。这意味着我们的天文研究工作将会落后。真是骇人听闻！”"
 academics.2009.t: "我们需要比[SCOPE.sCountry('rival_scope').GetName]发现更多星星"
 academics.2009.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]的成员对于[SCOPE.sCountry('rival_scope').GetName]比我国发现了更多[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]的现状感到不满。他们希望我国在10年时间内发现总数比[SCOPE.sCountry('rival_scope').GetName]更多的#b 天体#!。"
 academics.2009.f: "[SCOPE.sCountry('rival_scope').GetName]此等无足轻重的国家发现的天体数量竟然比我们还多，真是奇耻大辱。我们必须尽快超越这些未开化的业余天文学家，找到比他们更多的天体。\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]会员"
 academics.2009_goal_tt: "在#n 10年#!内，你要比对手[SCOPE.sCountry('rival_scope').GetName]发现更多的[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]。他们已发现的数量为[GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+]，我们的为[GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]。"
 academics.2009_reward_tt: "作为奖励，4年内知识分子的支持度#p +5#!，威望#p +10%#!。"
 academics.2009.g: "让我们打败他们！"
 academics.2009.h: "这个不是太空竞赛……"
 academics_no_competition_with_rival: "寻星竞赛失败了"
 academics_competition_with_rival_won: "寻星竞赛获胜"
 je_academics_rivalry_for_stars: "天文学重心：寻星竞赛"
 je_academics_rivalry_for_stars_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]希望我们比[SCOPE.sCountry('target').GetName]找到更多的[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]。\n\n我国的#b 天体数#!：[ROOT.Var('verrier_astronomical_objects').GetValue|0+]\n[SCOPE.sCountry('target').GetName]的#b 天体数#!：[ROOT.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+]"
 je_academics_rivalry_for_stars_success: "你（[GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]）找到的[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]比[SCOPE.sCountry('target').GetName]（[GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+]）更多。"
 academics.2010.t: "我们赢得了寻星竞赛"
 academics.2010.d_rival: "我国找到的天体比[ROOT.Var('je_rival_nation_var').GetCountry.GetName]更多。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]与民众为国家的胜利感到兴奋！"
 academics.2010.d_rival_gone: "我国寻星竞赛中的对手失败了。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]与民众为国家的胜利感到兴奋！"
 academics.2010.f: "我等，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]会员，为在科学领域战胜宿敌欢欣鼓舞。事实证明，他们的科学家还停留在石器时代，没有能力发现更多的天体。这是我们国家的伟大日子！\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]会员"
 academics.2011.t: "我们输掉了寻星竞赛"
 academics.2011.d: "由于我国已不可能比[ROOT.Var('je_rival_nation_var').GetCountry.GetName]找到更多的[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]的成员十分失望。"
 academics.2011.f: "我们学术界的失败再次证明，我们国家的重点不在科学和科学进步上。因此，我们建议终止敌对行动并搁置征服世界的计划，转而关注科学。\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2012.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]要求建立一座[concept_verrier_observatory]"
 academics.2012.d: "我国[concept_academics_scientific_society]的成员要求我们用不超过10年的时间建立一座现代[concept_verrier_observatory]。这将允许我们研究[concept_verrier_astronomy]并寻找[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]。"
 academics.2012.f: "如今每个大国都拥有一座天文台，我们，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]会员，要求建造一座天文台。没有天文台，我们就永远无法站在科学的前沿。因此，天文台显然是必要的。\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]理事会"
 academics.2012.g: "我现在需要我国最好的建筑师和工程师！"
 academics.2012.h: "谁还需要一座天文台？"
 academics.2012_goal_tt: "#n 10年#!内你要建立一座[concept_verrier_observatory]。"
 academics.2012_reward_tt: "作为奖励，学者中#p 5%#!的人群变为效忠派，并且5年内知识分子的支持度#p +5#!，生产科技花费#p ‑5%#!。"
 je_academics_build_observatory: "天文学重心：建立天文台"
 je_academics_build_observatory_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]想要我们建立一座[concept_verrier_observatory]。为了达成此目标，我们需要至少有一座大学，并且已经研究#b 现代天文学#!或者拥有一位[concept_verrier_astronomer]。"
 academics.2013.t: "新天文台开始观测"
 academics.2013.d: "一座新的[concept_verrier_observatory]投入使用，开始观测天空。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]成员们对此很高兴……至少暂时如此。"
 academics.2013.f: "建造了一座天文台之后，我国终于可以探索夜空。可喜可贺的是，现在我们真的可以算是一个科学先进的国家了。\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]会员"
 academics.2013.g: "我们将揭开夜空的神秘面纱！"
 academics.2014.t: "天文学失败"
 academics.2014.d: "我们没能建成[concept_verrier_observatory]。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]的成员非常失望！"
 academics.2014.f: "建造一座天文台肯定是一件极其困难的任务，因为我们的国家用了十年都没能成功！在这段时间里，我们本可以发现一颗新行星，数百颗恒星，或者计算出许多彗星的运动轨迹。但是，如果没有一架合适的望远镜，这一切都不可能。这种表现令人感到羞耻。\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2014.g: "都是彗星惹的祸！"
 academics.2015.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]想要我们寻找X行星"
 academics.2015.d: "我国[concept_academics_scientific_society]的成员坚信，X行星的发现将是本世纪最伟大的科学成就。他们要求我们集中精力，赶在其他人之前找到这颗神秘的行星。"
 academics.2015.f: "我们听说其他国家都渴望找到X行星，但这一突破应当被我国独占！我们必须在这项艰巨的任务中击败其他人！\n\n此致，[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]理事会"
 academics.2015.g: "集中所有的资源去寻找那颗行星！"
 academics.2015.h: "X行星？更像Y行星……"
 academics.2015_goal_tt: "你需要在其他国家之前发现#b X行星#!。为获得这一机会，你需要一位[concept_verrier_astronomer]并发现#p 1500#!个[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]。"
 academics.2015_reward_tt: "作为奖励，学者中#p 10%#!的人群变为效忠派，你的[concept_verrier_astronomer]获得#p 50[concept_academics_experience]#!，并且10年内知识分子的支持度#p +5#!，生产科技花费#p ‑5%#!。"
 je_academics_find_planet_x: "天文学重心：寻找X行星"
 je_academics_find_planet_x_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]希望我们发现神秘的#o X行星#!。为获得这一机会，我们需要一位[concept_verrier_astronomer]并发现#p 1500#!个[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]。"
 je_academics_find_planet_x_complete_tt: "在其他国家之前发现#o X行星#!。"
 je_academics_find_planet_x_fail_tt: "其他国家在你之前发现了#o X行星#!。"
 academics.2016.t: "我们发现了X行星"
 academics.2016.d: "我们首次发现了X行星！[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]应该会为此高兴。"
 academics.2016.f: "信纸上潦草地写满了奇怪的公式和图表。纸上还有一些污渍，看起来像是有人洒上的液体，你猜测上面还有鱼子酱的残渣。你忍不住想知道这里到底发生了什么。"
 academics.2016.g: "这是本世纪最重要的天文学发现！"
 academics.2017.t: "我们来不及找到X行星"
 academics.2017.d: "另一个国家在我们之前发现了X行星。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]的成员被失败击垮了！"
 academics.2017.f: "无法接受。\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]。"
 academics.2017.g: "反正也不是真的行星！"
