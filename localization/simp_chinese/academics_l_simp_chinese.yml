 academics.1010.t: "女专家？"
 academics.1010.d: "有几名女性申请进入我们的一所大学学习。我们是否应该同意呢？"
 academics.1010.f: "“女人只靠感性而非理性，不应该让她们玷污知识圣殿！”\n\n“你只是害怕女人比你更有能力！你的论点缺乏任何科学依据！让女性享受与男性相同的条件下学习吧！”"
 academics.1010.g: "让她们学习！"
 academics.1010.h: "等等，她们到现在还不能去学习？"
 academics.1010.i: "女人就应该呆在厨房！"
 academics.1011.t: "才华横溢的女学者"
 academics.1011.d: "[SCOPE.sCharacter('academics_female_scientist').GetFullName]以第一名的成绩毕业于大学。在这个男性占主导地位的领域，她以创纪录的速度完成了学业，并迫不及待地开始工作。她将会是一位出色的……"
 academics.1011.f: "我衷心祝贺你获得学位！谁能想到一个女人可能完成令人难以置信的学业！"
 academics.1011.g: "工程师"
