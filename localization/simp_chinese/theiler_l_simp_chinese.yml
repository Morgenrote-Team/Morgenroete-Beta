 theiler.2101.t: "微生物研究所"
 theiler.2101.d: "对病原体的深入研究促使[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]团队中的顶尖科学家们建立了一所微生物学研究院，以更高效地推进相关研究。"
 theiler.2101.f: "继成功鉴定病原体（1876年炭疽杆菌、1882年结核杆菌、1884年霍乱弧菌）后，罗伯特·科赫获得普鲁士政府支持，建立了以自己命名的研究所。这是首个以系统化、制度化方式研究微生物致病机制的研究中心。尽管路易·巴斯德在巴黎设立的生理化学实验室（自1887年）已展现出此类研究机构的雏形，但官方仍将罗伯特·科赫研究所（1891年）视为现代意义上首个微生物学研究机构。"
 theiler.2101.g: "该机构应致力于基础理论研究。"
 theiler.2101.h: "该研究所应致力于病原体研究。"
 theiler.2102.t: "改良实验方法"
 theiler.2102.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士更新了微生物学实验室的设备，引入了新的染色技术和改良的显微镜，从而在病原体研究方面取得了突破性进展。"
 theiler.2102.f: "自19世纪60年代以来，合成苯胺染料彻底改变了微生物学。亚甲蓝、品红以及后来的革兰氏染色法（1884年）和齐尔‑尼尔森染色法首次实现了细菌的鉴别。约1900年，针对孢子、荚膜和白喉杆菌的特殊染色法相继问世；1920年后，吉姆萨染色法和银染法得到广泛应用，而首批荧光染色技术则出现于20世纪40年代。"
 theiler.2102.g: "很好，很好！"
 theiler.2103.t: "国际合作"
 theiler.2103.d: "[SCOPE.sCountry('theiler_country_scope').GetName]的[SCOPE.sCharacter('theiler_biologist_scopet').GetLastName]博士来信了。这位生物学家是[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士的朋友，为[ROOT.Var('theiler_biologist_var').GetCharacter.GetHerHis]的病原体研究提供了一些线索。"
 theiler.2103.f: "自1885年起，日本医师北里柴三郎在罗伯特·科赫的柏林研究所工作。在科赫的指导下，他于1889年首次成功培养出破伤风病原体的纯培养物，这是细菌学史上的一座里程碑。二人共同为血清疗法奠定了基础，该疗法后被用于治疗破伤风与白喉。他们的合作被视为国际科研合作成功的早期典范。"
 theiler.2103.g: "这将加速病原体研究。"
 theiler.2103.h: "这一认识使我们获得了更深入的见解。"
 theiler.2104.t: "实验室事故"
 theiler.2104.d: "在寻找病原体的过程中，发生了一起严重事故——由于安全防护措施松懈，研究人员不幸被感染。大量员工被迫隔离，科研工作可能因此中断数月。"
 theiler.2104.f: "与病原体打交道极其危险。许多微生物学家在研究过程中不幸感染：罗伯特·科赫多次罹患炭疽病与结核病；埃米尔·冯·贝林在白喉毒素实验中受到感染；马克斯·冯·佩滕科弗则为了验证自身理论而吞服了霍乱弧菌。当时的防护措施极为简陋，导致许多研究人员遭受了程度不等的感染。这些经历后来促成了现代实验室安全标准的建立。"
 theiler.2104.g: "一场灾难！"
 theiler.2104.h: "我们必须不惜一切代价重组实验室！"
 theiler.2105.t: "Contaminated Samples"
 theiler.2105.d: "遗憾的是，[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士科研团队处理的部分样本受到污染，使病原体的研究进程受阻。"
 theiler.2105.f: "对炭疽病、结核病或白喉的研究常因霉菌、其他细菌或不纯血清样本的污染而受阻。巴斯德的早期疫苗实验也深受其害。这类污染导致了对病原体的错误结论，并显著推动了纯培养技术、消毒灭菌和无菌操作程序的发展。细胞培养技术的出现大大降低了此类事件的发生概率。"
 theiler.2105.g: "哪位学者对此负有责任？"
 theiler.2106.t: "研究人员争议"
 theiler.2106.d: "一场关于病原体研究的科学争议爆发了。我国顶尖医师之一[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在与[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士的交流中，批评了后者此前的发现。[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]声称这位生物学家完全走错了方向。而[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]则反驳说，这位医生对该领域根本一无所知。"
 theiler.2106.f: "“你的实验比培养皿放两周还臭！”\n“你诊断疾病就跟抛硬币一样随意！”\n“拜托，我拯救生命时你却在把细菌当宠物养！”\n“哈！养细菌总比让你的病人慌慌张张吞药丸强！”\n“显微镜掠夺者！”\n“听诊器鸡奸犯！”"
 theiler.2106.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生说得对。"
 theiler.2106.h: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士说得对。"
 theiler.2106.i: "他们应该去研究，而不是争吵！"
 theiler.2107.t: "研究助理"
 theiler.2107.d: "我们的生物学家[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士提议从学术界抽调部分学生和助手，将他们派往实验室以支持[ROOT.Var('theiler_biologist_var').GetCharacter.GetHerHis]的研究工作。"
 theiler.2107.f: "“我们可以毁掉他们的事业，但这可是为了科学！”"
 theiler.2107.g: "雇用更多助手。"
 theiler.2107.h: "年轻学者们另有任用。"
 theiler.2111.t: "军用疫苗使用"
 theiler.2111.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士正在研发的疫苗取得了重大成功。军方已对其表现出浓厚兴趣，认为这是保障士兵健康、减少下一场战争中伤亡的有效途径。"
 theiler.2111.f: "预防接种在战争中提供了决定性优势：英军在印度使用天花人痘接种和牛痘接种，有效抵御了疫情蔓延。同样，20世纪初热带地区的黄热病疫苗接种显著降低了疫情导致的伤亡。接种疫苗的士兵能保持战斗力，而未接种的部队则被疾病削弱——疫苗因此发挥了战略武器般的作用。"
 theiler.2111.g: "军队优先接种疫苗。"
 theiler.2111.h: "利用这次实地考察的知识来改进疫苗。"
 theiler.2112.t: "意外发现"
 theiler.2112.d: "一名助手意外地在废料罐中发现了一个样品，其中含有一种效果惊人的制剂。"
 theiler.2112.f: "路易·巴斯德发现，鸡霍乱的“陈旧”细菌培养物不会使鸡致病。这一偶然发现促成了减毒疫苗的研制，该疫苗可提供免疫保护。乔纳斯·索尔克利用脊髓灰质炎病毒可在细胞培养物中生长并同时被灭活的特性，由此研制出了第一种安全的脊髓灰质炎疫苗。亚历山大·弗莱明偶然注意到霉菌可杀灭细菌，这一发现促成了青霉素的问世。"
 theiler.2112.g: "奖励助手。"
 theiler.2113.t: "测试成功"
 theiler.2113.d: "新型疫苗的初步试验意外地证明效果显著。[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士正在考虑提前开始大规模生产和全民预防接种。这对疫苗学来说是个值得庆贺的日子！"
 theiler.2113.f: "疫苗试点试验的一个杰出范例是瓦尔德马尔·哈夫金在19世纪末开发的霍乱和鼠疫疫苗。这位俄罗斯犹太裔微生物学家于1892年在印度进行了霍乱疫苗的首次临床试验，该疫苗后来被大规模使用。1897年，他研制出对抗鼠疫的疫苗，并于1898年在印度进行测试，导致死亡率急剧下降。他的工作被视为现代疫苗研发史上的里程碑。"
 theiler.2113.g: "疫苗研发取得重大进展！"
 theiler.2113.h: "这是医学研究的新线索。"
 theiler.2114.t: "意外副作用"
 theiler.2114.d: "在[SCOPE.sState('theiler_state_scope').GetCityHubName]，[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士的新疫苗出现了严重的副作用。许多测试者因此身患重病，甚至有人不幸死亡。这次试验不仅动摇了公众的信心，还可能让疫苗的研发进程大幅倒退。"
 theiler.2114.f: "20世纪30年代，吕贝克发生了一起严重的疫苗接种事故：251名新生儿接种了预防结核病的卡介苗，但由于生产过程中的缺陷，疫苗被毒性结核杆菌污染。208名儿童因此患病，其中77人死亡。这起“吕贝克疫苗接种事故”引发了公众哗然，导致卡介苗在德国的推广被推迟，并促使疫苗生产领域引入了更严格的安全标准。"
 theiler.2114.g: "谁能预料到这一点？"
 theiler.2114.h: "继续在该地区进行实验。"
 theiler.2115.t: "抄袭指控"
 theiler.2115.d: "一位来自[SCOPE.sCountry('theiler_country_scope').GetName]的外国生物学家，对[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士目前正在研发的新疫苗的生产过程进行了全面调查。该生物学家提出了严重指控：[SCOPE.sCharacter('theiler_biologist_scope').GetSheHe]声称，该疫苗剽窃了[SCOPE.sCharacter('theiler_biologist_scope').GetLastName]博士本拟申请专利的一种极为相似的血清。"
 theiler.2115.f: "19世纪至20世纪初，由于缺乏专利保护与国际标准，疫苗学领域频发学术归属争议。巴斯德将牛霍乱疫苗的发明归功于己，实则其合作者图桑更早开展实验。此后卡介苗菌株、哈夫金研制的霍乱与鼠疫疫苗均引发论战。这种关于优先权与“剽窃”的争论，恰恰折射出预防接种方法在特定历史时期的高度敏感性与巨大价值。"
 theiler.2115.g: "立即道歉！"
 theiler.2115.h: "这纯属巧合。"
 theiler.2116.t: "成本爆炸"
 theiler.2116.d: "看来[SCOPE.sCharacter('theiler_biologist_scope').GetLastName]博士低估了这种新疫苗的研发成本。[SCOPE.sCharacter('theiler_biologist_scope').GetHerHis|U]过于乐观的预估现在可能会危及整个研发进程。"
 theiler.2116.f: "“钱？钱？！肮脏的铜臭！难道你不知道我是在为科学献身吗？这终究是为了最终战胜死亡！是为了根除人类的灾祸！而你竟敢拿着清单、表格和账目来找我？你算什么？会计师吗？滚出我的实验室！”"
 theiler.2116.g: "资助新疫苗。"
 theiler.2116.h: "招募更多学者作为临时工。"
 theiler.2116.i: "接受现实吧。"
 theiler_state_trait_cochliomyia: "螺旋蝇"
 theiler_state_trait_cydia: "苹果蠹蛾"
 je_theiler_cochliomyia_eredication: "消灭螺旋蝇"
 je_theiler_cochliomyia_eredication_reason: "利用新科技，或许可以根除危险的螺旋蝇，使人类和动物摆脱这一瘟疫。生物学家可以提出理论并进行实地实验，以找到解决这一问题的合适方案。\n\n若生物学家在工作中死亡，根除工作将会暂停，但一旦有新的生物学家出现，工作便会继续。"
 je_theiler_cochliomyia_eredication_success: "一位[concept_theiler_biologist]已投入至少#ORANGE 12个月#!的工作，致力于寻找根除螺旋蝇的方法。"
 je_theiler_cochliomyia_eredication_goal: ""
 theiler.21.t: "昆虫不育技术"
 theiler.21.d: "[SCOPE.sCharacter('theiler_biologist_scope').GetLastName]博士提出了一个非传统但具有突破性的构想：与其用杀虫剂消灭寄生虫，一种前景广阔的方法是通过培育不育雄性个体，使雌性无法与其繁殖后代。"
 theiler.21.f: "昆虫不育技术由雷蒙德·C·布什兰和爱德华·F·尼普林于20世纪50年代研发。该技术利用钴-60或铯-137产生的伽马射线对雄性昆虫进行绝育处理，高能辐射可破坏生殖细胞DNA，同时基本不影响昆虫的活力与交配能力。经绝育处理的雄性昆虫被大规模释放后，仍能与野生雌性正常交配，但无法产生可育后代，从而逐步导致种群崩溃。该技术在新大陆螺旋蝇的防治中成效尤为显著，其在北美和中美洲的根除避免了巨大的经济与畜牧损失。"
 theiler.21.g: "我们真的要对他们使用这种武器吗？"
 theiler.22.t: "[SCOPE.sState('theiler_state_scope').GetName]的螺旋蝇根除行动"
 theiler.22.d: "[SCOPE.sCharacter('theiler_biologist_scope').GetLastName]博士报告称，新大陆螺旋蝇已在另一地区被彻底根除。"
 theiler.22.g: "粉碎这些害虫！"
 theiler_cochliomyia_experiment_lab_modifier: "螺旋蝇实验实验室"
 je_theiler_sti: "昆虫不育技术"
 je_theiler_sti_reason: "[SCOPE.sCharacter('theiler_biologist_scope').GetLastName]博士正尝试利用现代技术在一个地区根除螺旋蝇。"
 je_theiler_sti_success: "一位[concept_theiler_biologist]为根除螺旋蝇已至少工作了#ORANGE 36个月#!。"
 je_theiler_sti_goal: ""
 je_theiler_cydia_pesticide: "苹果蠹蛾杀虫剂"
 je_theiler_cydia_pesticide_reason: "凭借对杀虫剂的基本了解，生物学家可与化学家合作，共同研发出防治苹果蠹蛾的有效药剂。\n\n若生物学家或化学家在研究过程中不幸身亡，农药研制工作将暂停，待两位学者再度就位后即可恢复研究。"
 je_theiler_cydia_pesticide_success: "一位[concept_theiler_biologist]已投入至少#ORANGE 12个月#!的时间研发新型杀虫剂。"
 je_theiler_cydia_pesticide_goal: ""
 je_theiler_lead_arsenate: "砷酸铅"
 je_theiler_lead_arsenate_reason: "我们的果农可以利用新发明的砷酸铅来控制苹果蠹蛾及其他害虫，前提是市场上铅供应充足。预计每月都能在一个地区内有效遏制这种寄生虫灾害。"
 theiler.31.t: "砷酸铅"
 theiler.31.d: "在与[SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName]博士的合作下，[SCOPE.sCharacter('theiler_biologist_scope').GetLastName]博士研发出一种高效杀虫剂，其大规模生产可能彻底改变农业。苹果蠹蛾在苹果上的最后一餐已经结束了！"
 theiler.31.f: "砷酸铅（PbHAsO₄）于1892年由马萨诸塞州的梅尔维尔·瑟斯顿·库克研发，用于防治果园中的苹果蠹蛾。相较于剧毒的亚砷酸铜，它是一种更稳定、对植物更友好的替代品。这种粉末能在昆虫取食时将其杀死，并能长时间附着在叶片和果实表面，首次实现了商业化水果生产中的有效虫害控制。尽管砷酸铅对环境和人体健康有害，但在DDT等合成农药问世前，其仍被广泛使用。"
 theiler.31.g: "我们真的要毒死他们吗？"
 theiler.31.tt: "今后，果农们将在果园中使用砷酸铅来消除害虫的影响。"
 theiler.32.t: "苹果蠹蛾蔓延至[SCOPE.sState('theiler_state_scope').GetName]！"
 theiler.32.d: "苹果蠹蛾扩大了其栖息范围：从邻近地区蔓延，侵染了[SCOPE.sState('theiler_state_scope').GetName]的果园。"
 theiler.32.f: "苹果蠹蛾原产于欧亚大陆，并于19世纪随苹果种植的扩展而传播至中欧、意大利北部、巴尔干半岛、匈牙利、乌拉尔山以西的俄罗斯部分地区、北美及澳大利亚。北欧、酷热及干旱地区则基本幸免。至20世纪，该虫已扩散至全球几乎所有温带苹果种植区，包括斯堪的纳维亚、波罗的海国家及南美洲，并成为果园中最具危害性的害虫之一。"
 theiler.32.g: "Fruit prices will rise, it seems."
 theiler.33.t: "苹果蠹蛾蔓延至南美洲！"
 theiler.33.d: "博物学家和生物学家今天提交了一份报告，让农民和贸易商都感到担忧。原产于欧洲和西亚的苹果蠹蛾首次在我们的果园中被发现，这是南美洲的首次目击！"
 theiler.33.g: "这可不是我想象中国际贸易的好处……"
 theiler.34.t: "苹果蠹蛾蔓延至南非！"
 theiler.34.d: "博物学家和生物学家今天提交了一份报告，让农民和贸易商都感到担忧。原产于欧洲和西亚的苹果蠹蛾首次在我们的果园中被发现，这是南非地区的首次目击！"
 theiler.35.t: "苹果蠹蛾蔓延至大洋洲！"
 theiler.35.d: "博物学家和生物学家今天提交了一份报告，让农民和贸易商都感到担忧。原产于欧洲和西亚的苹果蠹蛾首次在我们的果园中被发现，这是大洋洲的首次目击！"
 theiler.41.t: "[AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]"
 theiler.41.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士经多组临床治疗观察发现，#V [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#! 具备极佳的促愈功效。若要将其付诸应用，尚需扩大原料采购，并通过严谨研究提纯分离有效成分，一款全新药物或将由此诞生！"
 theiler.41.g: "所以，[AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]是一种新的神奇植物吗？"
