 theiler.2201.t: "农业改良"
 theiler.2201.d: "[SCOPE.sCharacter('theiler_biologist_scope').GetLastName]博士已达成[SCOPE.sCharacter('theiler_biologist_scope').GetHerHis]的目标。通过精心筛选并运用[SCOPE.sCharacter('theiler_biologist_scope').GetHerHis]的专业生物学知识，[SCOPE.sCharacter('theiler_biologist_scope').GetSheHe]为我国农业产业实现了可持续的强化发展。\n\n已改良建筑总数：[GetPlayer.MakeScope.Var('mr_num_improved_agriculture_buildings_var').GetValue|V0]\n来自项目的$concept_theiler_microorganisms$：[JournalEntry.MakeScope.ScriptValue('ito_specimens_from_forestry_project_value')|+0]@theiler_microorganisms_texticon!"
 theiler.2201.f: "“这些傻瓜还以为他们驯化了所有那些植物。实际上，是植物驯化了我们人类。看看我们给予它们的照料就知道了！”"
 theiler.2201.g: "我们的经济正在增长！"
