 je_theiler_improve_agriculture_project_reason: "你的[concept_theiler_biologist]博士[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]正致力于提升[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]地区[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName]的产量。\n$mr_divider_for_je$\n该项目每月将获得进度。每当进度达到24时，当前建筑将获得一个新的修正。一旦本项目选定的所有建筑都获得了修正，项目即告结束。\n\n总计有3种修正。每种新修正都需要重新累积进度。\n每座已建成的建筑都会提供一些[Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]。此外，当建筑升级完成后，你的生物学家可能会获得$ito_botanist$或$ito_zoologist$特质。\n$mr_divider_for_je$\n当前建筑：[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName]（位于[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]）\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_theiler_improve_agriculture_project_modifier_1_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_theiler_improve_agriculture_project_modifier_2_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_theiler_improve_agriculture_project_modifier_3_type')]\n\n剩余建筑总数：[JournalEntry.MakeScope.Var('mr_number_of_remaining_list_entries_var').GetValue|V0]\n来自项目的$concept_theiler_microorganisms$：[JournalEntry.MakeScope.ScriptValue('ito_specimens_from_forestry_project_value')|+0]@theiler_microorganisms_texticon!\n\n当前月度进度：#underline #tooltip:[GetRawTextTooltipTag('theiler_monthly_biologist_improvement_progress_var_tt')] [GetPlayer.MakeScope.ScriptValue('theiler_improve_agriculture_project_progress_value')|+2] #!#!"
