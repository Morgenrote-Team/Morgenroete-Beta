 theiler.10.t: "微生物学的诞生"
 theiler.10.d: "一项新研究在生物学界和医学界引起了轰动。其作者[SCOPE.sCharacter('theiler_biologist_scope').GetLastName]博士关于细菌的发现可能彻底改变我们对世界的认知。"
 theiler.10.f: "[SCOPE.sCharacter('theiler_biologist_scope').GetLastName]博士在细菌分类领域的系统性研究取得了卓越成果。其著作《细菌研究》确立了细菌作为一个特征可复现、独立的生物分类类群的地位。[SCOPE.sCharacter('theiler_biologist_scope').GetSheHe|U]证明了细菌可以像动植物一样，被严格地培养、研究与分类。更为重要的是，[SCOPE.sCharacter('theiler_biologist_scope').GetLastName] 所创立的方法，能让研究者区分无害细菌与致病菌。这套方法或将为一门全新的医学学科奠定基础 —— 这门学科有望最终阐明传染病的发病机理。"
 theiler.10.g: "微生物研究取得突破性进展。"
 theiler.10.h: "细菌理论取得突破性进展。"
