 theiler.42.f.strychnine: "#V 马钱子碱#!最初是从亚洲东南部原生植物吕宋果豆中提取出来的。它曾被用作杀虫剂，并在微量剂量下作为肌肉、心脏和肠道兴奋剂。然而，它最为人所知的可能是其神经毒性——过量使用会引发抽搐、出汗、牙关紧闭等痛苦症状并导致死亡，这使其成为潜在谋杀者和犯罪小说家的首选毒药。"
 theiler.42.f.emetine: "#V 依米丁#!是一种从吐根中提取的药物，这种原产于中南美洲的花卉植物也被称为吐根。它最初用于治疗肠道感染——阿米巴痢疾。因其具有催吐的副作用且易引发恶心呕吐的症状，故而得名。"
 theiler.42.f.atropine: "#V 阿托品#!是一种提取自颠茄的药物。颠茄又称致命茄，是一种原产于欧洲与西亚的植物。阿托品以不同剂型用于多种用途：治疗哮喘、阻断神经刺激所致的不良反应、减少唾液分泌、治疗某些中毒症状，也曾被女性用于美容目的以散大瞳孔。"
 theiler.42.f.aloin: "#V 芦荟素#!是一种天然化合物，主要存在于芦荟科植物中，含量各异。它被用作泻药，用于治疗晒伤、包扎伤口，并因其抗氧化和抗炎特性而受到重视。"
 theiler.42.f.digitoxin: "#V 洋地黄毒苷#!是一种天然化合物，存在于毛地黄（又名指顶花）中，这种植物原产于整个欧洲以及摩洛哥。洋地黄毒苷曾被用于减少肌肉中的液体潴留（水肿）、促进排尿，以及治疗心律失常和心力衰竭。然而，正如其名所示，它具有毒性，可能导致心率不齐、恶心、心脏骤停和死亡。"
 theiler.42.f.quinine: "#V 奎宁#!是一种药物，最初从原产于秘鲁的金鸡纳树皮中提取。奎宁有着辉煌的历史。这种树皮最初被克丘亚人用作肌肉松弛剂，后来由耶稣会士带到欧洲，用于治疗疟疾。从这种树皮中提炼出的奎宁很快得到广泛应用，为欧洲在非洲大陆的殖民和征服创造了更多机会。它还可用于治疗猩红热、黄热病和流感。"
 theiler.42.f.thymol: "#V 百里酚#!是一种主要提取自百里香的药物。百里香原产于南欧，但百里酚亦可从世界各地的其他多种植物中获得。百里酚具有抗菌、抗真菌与防腐等特性，因此曾被广泛用于伤口处理、口腔卫生维护及寄生虫感染的防治。"
 theiler.42.f.pilocarpine: "#V 毛果芸香碱是#!一种提取自毛果芸香属植物的药物，该属植物原产于南美热带地区。本品可刺激唾液与汗液的分泌，因此常用于治疗由疾病或其他治疗所致之口干症。此外，它亦用于治疗多种眼部疾患。"
 theiler.42.f.ephedrine: "#V 麻黄碱#!是一种提取自草麻黄的中枢神经兴奋剂。草麻黄原产于中国北方高地、蒙古及俄罗斯。本品曾用于治疗哮喘、发作性睡病、肥胖症及鼻塞。该药物具有多种副作用，包括睡眠障碍、头痛、焦虑、幻觉、高血压及心动过速。其中，高血压与心动过速两种作用导致其被用作提升运动表现的兴奋剂。"
 theiler.42.f.strophantine: "#V 毒毛旋花子苷#!是一种由原产于非洲的毒毛旋花属植物中提取制成的药物，曾被用于改善心脏功能、治疗心力衰竭，并提升神经系统机能；但在高浓度下，它也被用作箭毒。"
 theiler.42.g: "药学的里程碑！"
