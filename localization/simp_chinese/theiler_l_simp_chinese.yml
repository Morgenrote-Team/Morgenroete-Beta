 theiler.101.t: "霍乱弧菌"
 theiler.101.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士成功鉴定并分离出霍乱病原体，这是开展有效疫苗研发工作的重要里程碑。"
 theiler.101.f: "霍乱弧菌最早于1854年由意大利解剖学家菲利波·帕奇尼发现并记述，而它在霍乱疫情中的致病机理，则由罗伯特·科赫在1884年予以确凿证实。这种弧形杆状细菌多栖息于水体环境，尤以温暖的咸淡水交汇处为甚。作为革兰氏阴性菌，霍乱弧菌依靠单根端生鞭毛实现游动，并可分泌霍乱毒素；该毒素会扰乱肠道水分代谢平衡，进而引发剧烈腹泻。"
 theiler.101.g: "讨厌的小东西。"
 theiler.201.t: "结核分枝杆菌"
 theiler.201.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士成功鉴定并分离出结核病病原体，这是开展有效疫苗研发工作的重要里程碑。"
 theiler.201.f: "该细菌由罗伯特·科赫于1882年发现，他也因此于1905年荣获诺贝尔奖。结核分枝杆菌是一种生长缓慢的杆状微生物，其蜡质细胞壁富含分枝菌酸，这使得它能抵抗常规革兰氏染色和多种抗生素的作用，因此被归类为“抗酸菌”。这种病原体严格需氧，主要感染肺部，但也可扩散至其他器官。"
 theiler.201.g: "你的时代结束了，无声的潜行者。"
 theiler.301.t: "天花病毒"
 theiler.301.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士成功鉴定并分离出天花病原体，这是开展有效疫苗研发工作的重要里程碑。"
 theiler.301.f: "天花的病原体——天花病毒，属于痘病毒科。与大多数病毒不同，它完全在宿主细胞的细胞质内复制。这是一种大型砖状病毒，内含双链DNA。天花是首个成功接种疫苗的目标疾病，爱德华·詹纳于1796年引入预防接种法，使其成为人类历史上首个通过疫苗接种于1980年彻底根除的病原体。"
 theiler.301.g: "如此微小之物，怎会倾覆帝国？"
 theiler.401.t: "普氏立克次体"
 theiler.401.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士成功鉴定并分离出斑疹伤寒病原体，这是开展有效疫苗研发工作的重要里程碑。"
 theiler.401.f: "亨里克·达罗沙·利马于1916年发现了这种细菌。他以他的同事斯坦尼斯劳斯·冯·普罗瓦泽克的名字为其命名，后者于1915年死于斑疹伤寒。普罗瓦泽克和罗沙·利马都曾在德国科特布斯的战俘营医院研究其病原体时感染了斑疹伤寒。这种细菌没有鞭毛，且为需氧菌。它被归类为革兰氏阴性菌，因为其细胞壁无法保留结晶紫革兰氏染色；革兰氏阴性菌通常对许多抗生素（如青霉素）具有更强的抵抗力。"
 theiler.401.g: "一个有点阴郁的搭车客！"
 theiler.501.t: "正黄病毒属黄病毒"
 theiler.501.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士成功鉴定并分离出黄热病病原体，这是开展有效疫苗研发工作的重要里程碑。"
 theiler.501.f: "黄热病病毒于 1927 年在加纳首次从患者身上成功分离。它归属于黄病毒科，携带单股正链 RNA 基因组，主要经由伊蚊传播，其中以埃及伊蚊为主要媒介。感染者会出现发热、肌肉剧痛与黄疸，重症可引发内出血及多器官功能衰竭。"
 theiler.501.g: "大自然最残酷的把戏之一被揭晓了。"
 theiler.601.t: "麻疹病毒"
 theiler.601.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士成功鉴定并分离出麻疹病原体，这是开展有效疫苗研发工作的重要里程碑。"
 theiler.601.f: "麻疹病毒属于副粘病毒科麻疹病毒属，是一种具有单股负链RNA基因组的包膜病毒。该病毒通过呼吸道飞沫传播，是人类已知传染性最强的病原体之一。麻疹会引起发热、咳嗽、结膜炎及特征性皮疹，并可能引发肺炎或脑炎等严重并发症。"
 theiler.601.g: "一种微小的恐怖分子，对免疫系统发动攻击。"
 theiler.701.t: "化脓性链球菌"
 theiler.701.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士成功鉴定并分离出猩红热病原体，这是开展有效疫苗研发工作的重要里程碑。"
 theiler.701.f: "链球菌是一种革兰氏阳性球菌，呈链状排列。它被归类为A组β溶血性链球菌，于19世纪首次被发现与猩红热相关。其致病性源于分泌的外毒素，包括引起皮疹的红疹毒素。该微生物还可导致链球菌性咽炎、脓疱疮及风湿热。"
 theiler.701.g: "真是个狡猾的小滑头……"
 theiler.801.t: "鼠疫耶尔森菌"
 theiler.801.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士成功鉴定并分离出鼠疫病原体，这是开展有效疫苗研发工作的重要里程碑。"
 theiler.801.f: "鼠疫杆菌由亚历山大·耶尔辛于1894年香港疫情爆发期间发现。这是一种革兰氏阴性、无鞭毛的球杆菌。该细菌通过以受感染啮齿动物（最著名的是黑鼠）为食的跳蚤传播，会引发三种类型的鼠疫：腺鼠疫、败血性鼠疫和肺鼠疫。若不及时治疗，死亡率极高。"
 theiler.801.g: "所以，这就是那个微观收割者？"
 theiler.901.t: "白喉棒状杆菌"
 theiler.901.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士成功鉴定并分离出白喉病原体，这是开展有效疫苗研发工作的重要里程碑。"
 theiler.901.f: "这种革兰氏阳性、棒状杆菌于1883年被埃德温·克莱布斯确定为白喉的病原体，次年由弗里德里希·勒夫勒成功培养。白喉杆菌为需氧且无运动性，其最危险的特征是白喉毒素——由噬菌体编码的毒素会损伤心脏和神经组织。该疾病曾一度是儿童的主要杀手，如今已通过预防接种得到有效控制。"
 theiler.901.g: "看似简单，实则残酷至极。"
 theiler.1001.t: "脊髓灰质炎病毒"
 theiler.1001.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士成功鉴定并分离出脊髓灰质炎病原体，这是开展有效疫苗研发工作的重要里程碑。"
 theiler.1001.f: "脊髓灰质炎病毒属于小核糖核酸病毒科，于 1909 年首次被分离出来。它是一种无包膜的小型病毒，基因组为单股正链 RNA。该病毒主要通过粪口途径传播，攻击脊髓中的运动神经元，有时会造成不可逆的瘫痪。全球疫苗接种运动已将脊髓灰质炎病毒推向了被根除的边缘。"
 theiler.1001.g: "看不见的事物为何能摧毁如此之多？"
 theiler.102.t: "霍乱疫苗"
 theiler.102.d: "历经无数实验、曲折与测试，[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士终获突破：霍乱疫苗不再是遥不可及的梦想，而是已然成为现实。这是一场医学与生物学的伟大革命！"
 theiler.102.f: "1885年，西班牙医师海梅・费兰成功研制出全球首款霍乱疫苗，采用减毒活霍乱弧菌毒株制备。他在瓦伦西亚霍乱暴发期间开展的现场试验，开创了人类针对细菌性疾病大规模免疫接种的先河。后续疫苗工艺逐步迭代为灭活全菌制剂，并最终发展为结合了灭活菌体与重组霍乱毒素B亚单位的现代口服疫苗。"
 theiler.102.g: "科学的反击！"
 theiler.202.t: "结核病疫苗"
 theiler.202.d: "历经无数实验、曲折与测试，[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士终获突破：结核病疫苗不再是遥不可及的梦想，而是已然成为现实。这是一场医学与生物学的伟大革命！"
 theiler.202.f: "卡介苗于1921年由法国科学家阿尔伯特·卡尔梅特和卡米尔·介兰研发推出。该疫苗采用减毒活牛型分枝杆菌（结核分枝杆菌的近缘菌种）制备而成，对肺结核的保护效果存在差异，但在预防儿童重症结核病（如粟粒性结核和结核性脑膜炎）方面具有显著效力。"
 theiler.202.g: "一丝抵抗无声潜行者的火花。"
 theiler.402.t: "斑疹伤寒疫苗"
 theiler.402.d: "历经无数实验、曲折与测试，[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士终获突破：斑疹伤寒疫苗不再是遥不可及的梦想，而是已然成为现实。这是一场医学与生物学的伟大革命！"
 theiler.402.f: "第一种有效的斑疹伤寒疫苗由波兰生物学家鲁道夫·魏格尔于20世纪30年代研制成功。他通过在虱子肠道内培养普氏立克次体，并使用灭活细菌进行免疫接种。第二次世界大战期间，他在利沃夫的实验室秘密利用疫苗生产工作，为面临纳粹迫害风险的人们提供庇护和就业机会。如今，流行性斑疹伤寒的现代疫苗已极少使用。"
 theiler.402.g: "我们智取了搭便车者。"
 theiler.502.t: "黄热病疫苗"
 theiler.502.d: "历经无数实验、曲折与测试，[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士终获突破：黄热病疫苗不再是遥不可及的梦想，而是已然成为现实。这是一场医学与生物学的伟大革命！"
 theiler.502.f: "黄热病疫苗由南非病毒学家马克斯·泰勒于20世纪30年代研发，他于1951年因此获得诺贝尔奖。通过将病毒在鸡胚胎中连续传代培养，他成功获得了减毒的17D毒株。这种减毒活疫苗至今仍是全球最有效的疫苗之一，单次接种即可提供持久免疫力。"
 theiler.502.g: "对蚊子传播疾病的一记重击。"
 theiler.602.t: "麻疹疫苗"
 theiler.602.d: "历经无数实验、曲折与测试，[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士终获突破：麻疹疫苗不再是遥不可及的梦想，而是已然成为现实。这是一场医学与生物学的伟大革命！"
 theiler.602.f: "麻疹疫苗于1963年获批上市，由约翰·恩德斯及其同事在成功利用鸡胚细胞培养病毒后研发而成。这种减毒活疫苗显著降低了全球麻疹致死率。此后，该疫苗与流行性腮腺炎、风疹疫苗结合，形成了至今仍是儿童常规免疫基石的麻腮风三联疫苗。"
 theiler.602.g: "这个小怪物遇上了对手。"
 theiler.802.t: "鼠疫疫苗"
 theiler.802.d: "历经无数实验、曲折与测试，[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士终获突破：鼠疫疫苗不再是遥不可及的梦想，而是已然成为现实。这是一场医学与生物学的伟大革命！"
 theiler.802.f: "1897年，瓦尔德马尔・哈夫金在孟买鼠疫疫情期间，成功研制出全球首款鼠疫疫苗。该疫苗以热灭活的鼠疫耶尔森菌制成，为注射剂型，虽可有效降低患者病死率，但其保护效力有限且维持时间短暂。现代研究则着重于靶向该菌F1抗原与V抗原的亚单位疫苗。"
 theiler.802.g: "收割者的末日已至！"
 theiler.902.t: "白喉疫苗"
 theiler.902.d: "历经无数实验、曲折与测试，[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士终获突破：白喉疫苗不再是遥不可及的梦想，而是已然成为现实。这是一场医学与生物学的伟大革命！"
 theiler.902.f: "白喉类毒素疫苗于20世纪20年代问世，此前法国的加斯顿·拉蒙和英国的亚历山大·格伦尼发现，经甲醛处理的白喉毒素能在不引发疾病的情况下诱导免疫。该疫苗常与破伤风及百日咳抗原结合制成百白破三联疫苗，在20世纪中期显著降低了儿童死亡率。"
 theiler.902.g: "夜晚的喘息声已经平息。"
 theiler.1002.t: "脊髓灰质炎疫苗"
 theiler.1002.d: "历经无数实验、曲折与测试，[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士终获突破：脊髓灰质炎疫苗不再是遥不可及的梦想，而是已然成为现实。这是一场医学与生物学的伟大革命！"
 theiler.1002.f: "二十世纪诞生了两种有效的脊髓灰质炎疫苗。1955年，乔纳斯·索尔克利用化学灭活的脊髓灰质炎病毒研制出灭活脊髓灰质炎疫苗（IPV）。几年后，阿尔伯特·萨宾基于减毒活毒株开发出口服脊髓灰质炎疫苗（OPV），这种疫苗更易接种且能提供肠道免疫。这两种疫苗在全球根除脊髓灰质炎的行动中都发挥了核心作用。"
 theiler.1002.g: "绝不饶恕这个扼杀孩童梦想的凶手！"
