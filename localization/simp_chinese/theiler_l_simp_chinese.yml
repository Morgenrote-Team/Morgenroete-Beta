 je_group_theiler_biology: "赤色晨曦：[concept_theiler_biology]"
 je_theiler_microorganism_research_reason: "[ROOT.GetCountry.GetCustom('je_theiler_microorganism_research_active_type')][ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士正在探索奇妙的微生物世界，根据其技能和所用显微镜的性能，[ROOT.Var('theiler_biologist_var').GetCharacter.GetSheHe]每月都会发现新的微生物。全面掌握微生物知识对于检测[Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')]至关重要。\n\n若我们的[concept_theiler_biologist]尚未掌握此项技能，[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士也有可能获得$theiler_microbiologist$特质。\n该特质最多需要60个月的微生物研究才能获得。\n$mr_divider_for_je$\n当前预计每月产出@theiler_microorganisms_texticon![ROOT.Var('theiler_estimated_microorganisms_on_microorganisms_research_var').GetValue|+=0]+=0]个[Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]。[ROOT.GetCountry.GetCustom('je_theiler_microorganism_research_num_months_type')]"
 je_theiler_microorganism_research: "微生物研究"
 theiler_biologist_dies_tt: "[concept_theiler_biologist]死后该日志条目将失效。"
 je_theiler_microscope_achromatic: "消色差物镜"
 je_theiler_microscope_achromatic_reason: "恩斯特·阿贝在19世纪70年代开发出先进的消色差物镜，通过精密光学设计显著提升了图像清晰度和分辨率。他在蔡司公司的工作为现代科学显微镜奠定了基础，并规范了透镜制造标准。\n\n更先进的显微镜能更成功地观察[Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')]及其他[Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]。若同时拥有[concept_tesla_engineer]与[concept_theiler_biologist]，你将获得进度提升。"
 je_theiler_microscope_achromatic_goal: "生物学家和工程师将一起工作[JournalEntry.GetTotalGoalValue|V0]周来研制新的显微镜。"
 je_theiler_microscope_electron: "电子显微镜"
 je_theiler_microscope_electron_reason: "电子显微镜由恩斯特·鲁斯卡和马克斯·克诺尔于20世纪30年代发明，它采用电子束替代光线来实现更高的分辨率。这项技术在历史上发挥了关键作用，使科学家能够观察到纳米尺度的结构，远远突破了光学显微镜的局限。\n\n更先进的显微镜能更有效地观察[Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')]及其他[Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]。若同时拥有[concept_tesla_engineer]与[concept_theiler_biologist]，你将获得进度提升。"
 je_theiler_microscope_electron_goal: "生物学家和工程师将一起工作[JournalEntry.GetTotalGoalValue|V0]周来研制新的显微镜。"
