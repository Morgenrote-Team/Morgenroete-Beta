 theiler_cell_culture_tech: "细胞培养"
 theiler_cell_culture_tech_desc: "细胞培养，是指在生物体外的营养培养基中培育动物或植物细胞的技术。1885年，威廉·鲁克斯首次成功将鸡胚胎细胞在盐溶液中保存数日，由此验证了该技术的基本原理。1907年，罗斯·格兰维尔·哈里森培养了两栖动物的脊髓组织，并证明轴突是由单个神经细胞延伸发育而来。1913年，埃德娜·施泰因哈特、柴·伊斯雷利与罗伯特·A·兰伯特在豚鼠角膜组织块上培养出了牛痘病毒。"
 theiler.51.t: "病原体研究"
 theiler.51.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士决定更深入地研究一种危险的病原体，以获取关于这一人类灾祸的新见解，该研究项目仍在进行中。"
 theiler.51.f: "病原体的研究包括发现与分离，是后续开发有效疫苗的重要步骤。对特定病原体的研究需要疾病描述、消色差显微镜或电子显微镜（视其为细菌或病毒而定）以及一定数量的已知微生物——最终，生物学家必须能够识别出该病菌。"
 theiler.51.g: "霍乱病原体。"
 theiler.51.h: "结核病病原体。"
 theiler.51.i: "天花病原体。"
 theiler.51.j: "斑疹伤寒病原体。"
 theiler.51.k: "黄热病病原体。"
 theiler.51.l: "麻疹病原体。"
 theiler.51.m: "猩红热病原体。"
 theiler.51.n: "鼠疫病原体。"
 theiler.51.o: "白喉病原体。"
 theiler.51.p: "脊髓灰质炎病原体。"
 theiler.52.t: "疫苗研究"
 theiler.52.d: "[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士已着手研发一种革命性的疫苗，旨在消除人类的一大祸患。然而，目前尚未确定这种疫苗将针对何种疾病进行开发。"
 theiler.52.f: "疫苗是医学和生物学对抗疾病最强大的武器。在健全的医疗体系下，它们能完全预防疾病的发生。在开发疫苗之前，生物学家必须对相关病原体进行研究。某些疫苗需要特定的技术前提——例如，斑疹伤寒、黄热病和白喉的疫苗需要遗传学知识。"
