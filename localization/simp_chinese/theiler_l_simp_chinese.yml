 je_theiler_medicinal_plant_strychnine: "马钱子"
 je_theiler_medicinal_plant_strychnine_reason: "根据你的医学技术等级，一名[concept_panum_physician]会提议寻找特定的[concept_ito_medicinal_plants]用于制药，在本次情况下至少需要#V 5株[AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!。[concept_dubois_naturalist]负责采集足够的样本以分离目标物质。随后由[concept_mendelejew_chemist]分离出化学成分。一旦成功分离，[concept_theiler_biologist]即可生产出该药物。\n\n马钱子是一种原产于印度及东南亚地区的热带乔木。其种子中含有马钱子碱与布鲁辛等生物碱，二者均具有剧毒。马钱子碱会作用于神经系统，引发剧烈的肌肉痉挛，甚至可导致死亡。尽管具有毒性，但在历史上，其提取物在小剂量、严格控制的情况下，曾被用作兴奋剂，用于治疗消化系统或神经系统疾病。"
 je_theiler_medicinal_plant_strychnine_success: "[GetPlayer.GetName]已收集至少#V 5株马钱子#!。"
 theiler_medicinal_plant_project_progress_medicinal_plants_isolated_tt: "#default_text [GetPlayer.GetName]拥有一名[concept_theiler_biologist]，并与一位[concept_mendelejew_chemist]合作分离出了该物质。#!"
 theiler_biologist_medicinal_plant_project_progress_bar_at_full_tt: "制药进度已达到#variable 100%#!"
 je_theiler_medicinal_plant_emetine: "吐根"
 je_theiler_medicinal_plant_emetine_reason: "新药的研发过程通常遵循以下顺序：根据你的医学技术水平，[concept_panum_physician]会提出寻找特定的[concept_ito_medicinal_plants]以作药用，在此情况下至少需要#V 5株[AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!。随后，[concept_dubois_naturalist]受命采集足够数量的样本以完成分离。之后，[concept_mendelejew_chemist]负责分离出其中的化学物质。待该物质得以确认，[concept_theiler_biologist]便可进行药物的制备。\n\n吐根是原产于南美洲、多见于巴西境内的热带药用植物。其根部富含吐根碱与吐根酚碱等生物碱，既能催吐，又可对抗寄生虫。在传统医药里，吐根常被用作中毒急救的催吐药物，也可作为祛痰成分，用于配制止咳糖浆。"
 je_theiler_medicinal_plant_emetine_success: "[GetPlayer.GetName]已收集至少#V 5株吐根#!。"
