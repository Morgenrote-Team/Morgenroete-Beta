 theiler.41.strychnine: "马钱子是一种原产于印度及东南亚地区的热带乔木。其种子中含有马钱子碱与布鲁辛等生物碱，二者均具有剧毒。马钱子碱会作用于神经系统，引发剧烈的肌肉痉挛，甚至可导致死亡。尽管具有毒性，但在历史上，其提取物在小剂量、严格控制的情况下，曾被用作兴奋剂，用于治疗消化系统或神经系统疾病。"
 theiler.41.emetine: "吐根是原产于南美洲、多见于巴西境内的热带药用植物。其根部富含吐根碱与吐根酚碱等生物碱，既能催吐，又可对抗寄生虫。在传统医药里，吐根常被用作中毒急救的催吐药物，也可作为祛痰成分，用于配制止咳糖浆。"
 theiler.41.atropine: "颠茄，又名致命茄，是一种原产于欧洲、北非及西亚的多年生植物。其体内含有阿托品、东莨菪碱、莨菪碱等有毒生物碱，可通过阻断乙酰胆碱受体作用于神经系统。历史上，颠茄曾用作镇静剂、镇痛剂及散瞳药物。现代医学中，精制阿托品应用于眼科临床，并用于治疗心动过缓及有机磷农药中毒。"
 theiler.41.aloin: "芦荟，原产于北非与阿拉伯半岛，是一种多肉植物。其肥厚叶片中所蕴藏的凝胶，富含多糖、维生素与酶类，兼具舒缓与保湿之效。此凝胶在化妆品及医药领域应用甚广，常用于治疗烧伤、创伤及皮肤敏感等症。叶片内层干燥后析出的汁液，含有芦荟素——一种药性峻猛的致泻成分。"
 theiler.41.digitoxin: "毛地黄，又名洋地黄，是一种原产于欧洲的二年生植物。其叶片中含有强心苷类化合物，如地高辛与洋地黄毒苷，这些成分可增强心肌收缩力并调节心跳节律。在传统医学中，其提取物曾用于治疗心力衰竭和心律失常。经提纯的强心苷类药物在临床上以精确剂量用于心脏疾病的治疗，而由于存在严重中毒风险，应避免直接使用未经处理的植株。"
 theiler.41.quinine: "金鸡纳树是一种原产于南美洲、尤以安第斯地区为分布中心的乔木。其树皮中含有奎宁及其他生物碱，这些成分具有强效的抗疟疾作用。在传统医学中，其树皮曾用于治疗发热与疟疾。直至今日，奎宁及其衍生物在疟疾的临床治疗中仍占据重要地位。该树种因其树皮的药用价值，也在热带地区被广泛引种栽培。"
 theiler.41.thymol: "百里香，又称普通百里香，是一种原产于地中海地区的小型多年生草本植物。其叶片及提取的精油中含有百里酚、香芹酚及其他挥发油成分，具有抗菌、抗氧化与抗炎等特性。在传统医学中，百里香曾用于治疗呼吸道感染、咳嗽以及消化系统疾患。如今，它广泛应用于草药医学、芳香疗法，并作为天然防腐剂或食品调味剂使用。"
 theiler.41.pilocarpine: "毛果芸香是一种原产于巴西的热带灌木。其叶片中含有生物碱毛果芸香碱，该成分可刺激唾液腺与汗腺的分泌。在传统医学中，它曾用于治疗口干及眼部疾患。在现代医学中，毛果芸香碱用于治疗青光眼，通过降低眼内压发挥作用；同时也用于治疗由放疗或药物所致的口干症。该植物的价值主要在于其所含的药理活性生物碱。"
 theiler.41.ephedrine: "草麻黄，又称麻黄，是一种原产于中国及中亚地区的灌木。其茎中含有麻黄碱与伪麻黄碱，此类生物碱可兴奋中枢神经系统并扩张支气管。在传统中医中，它曾用于治疗哮喘、支气管炎及鼻塞等症。由于存在引发高血压、心血管疾病及其他副作用的风险，其使用现已受到严格限制。"
 theiler.41.strophantine: "旋花羊角拗是一种原产于西非的攀缘植物。其种子中含有强心苷类化合物，如乌本苷，此类成分可强烈增强心肌收缩力。在传统应用中，其提取物曾被用作箭毒，亦以小剂量用于治疗心脏疾患。乌本苷已被研究用于心力衰竭及心律失常的临床治疗。"
