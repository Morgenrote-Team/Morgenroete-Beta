 theiler_biologist_medicinal_plant_project_progress_bar_desc: "制药进展：#v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|1%]#!([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/12)"
