 theiler_achromatic_microscope_modifier: "Achromatic Microscope"
 theiler_electron_microscope_modifier: "电子显微镜"
 theiler.11.t: "The Achromatic Microscope"
 theiler.11.d: "[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName]与[GetPlayer.MakeScope.Var('theiler_biologist_var').GetCharacter.GetFullName]今日展示了他们研发的新型显微镜。"
 theiler.11.f: "1868年，恩斯特·阿贝发明了复消色差透镜，这种显微镜镜头能同时消除一级和二级色差。到1870年，阿贝又发明了用于显微镜照明的阿贝聚光镜。1871年，他设计了第一台折射仪，相关原理于1874年出版的手册中正式发表。至1872年，他建立了非自发光物体的成像定律。蔡司光学工厂于1872年开始销售其改良显微镜，1877年推出配备均质浸没物镜的型号，1886年更推出了搭载复消色差物镜的显微镜。"
 theiler.11.g: "微生物学的一场革命。"
 theiler.12.t: "电子显微镜"
 theiler.12.d: "[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName]与[GetPlayer.MakeScope.Var('theiler_biologist_var').GetCharacter.GetFullName]今日展示了他们研发的新型显微镜。"
 theiler.12.f: "时至今日，谁发明了透射电子显微镜仍存争议。1928年，在夏洛滕堡工业大学，阿道夫·马蒂亚斯任命马克斯·克诺尔领导一个研究团队，推进电子束和阴极射线示波器的研究。该团队包括恩斯特·鲁斯卡在内的多名博士研究生。1931年，马克斯·克诺尔和恩斯特·鲁斯卡成功获得了覆盖在阳极孔径上的网格的放大图像。与此同时，西门子‑舒克特公司的莱因霍尔德·吕登贝格似乎也在独立进行相关研究。根据专利法，他是电子显微镜的发明者，但尚不清楚他何时制造出了可工作的仪器。"
 theiler.12.g: "它甚至应该能够检测病毒！"
