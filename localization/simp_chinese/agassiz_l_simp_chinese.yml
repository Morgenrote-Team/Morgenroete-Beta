 agassiz.901.tt: "[SCOPE.sCharacter('agassiz_geologist_scope').GetFullName]会非常仔细地检查这本神秘的书，这可能会产生未知的后果。"
 agassiz.917.tt: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName]和每一个考察队成员都在黑暗和绝望中死去！"
 agassiz.909.tt: "地心之旅不可用"
 agassiz.915.tt: "一些探险队成员可能会遇难。"
 agassiz_lidenbrock_diary_modifier: "李登布洛克教授的日记"
 agassiz_journey_coe_preparation_modifier: "准备地心之旅"
 agassiz_tragic_subterranean_accident_modifier: "悲惨的地下事故"
 je_agassiz_journey_coe: "地心之旅"
 je_agassiz_journey_coe_reason: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士发现了德国地质学家奥托·李登布洛克的神秘笔记，笔记中提到了一条通往地下系统的道路。这条道路在十六世纪曾被一位名叫阿尔内·萨克努塞姆的冰岛炼金术士使用。根据笔记，我们在冰岛的一座火山中找到了入口。"
 je_agassiz_journey_coe_fail: "如果[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士去世或退休，考察将无法再进行。"
 agassiz.901.t: "李登布洛克教授的日记"
 agassiz.901.d: "在其火山考察期间，[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士发现了些奇怪的东西，直到返程后才肯提起。"
 agassiz.901.f: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName]有了一个目前正在引起轰动，甚至盖过了火山探险的重大发现。在一个被认为曾属于该地区一座已灭绝火山的洞穴中，[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetSheHe]发现了一个废弃的地质观测站。然而，当询问当地当局时，他们无法提供任何关于是否曾有探险队来过这里的信息。在仔细检查火山口时，[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士发现那里有装有私人物品的箱子和袋子，其中包括一个学者的包。包里有一本日记——属于奥托·李登布洛克教授。李登布洛克是一位来自汉堡的地质学家和矿物学家，专攻火山学和地下洞穴系统。他被认为是该领域最杰出的人物之一，但也以好斗和急躁著称。在与大学发生争执后，他在最后一次旅行中神秘失踪。这本日记可能是他生命最后驻足之地的最终线索——考虑到其中丰富的矿物学和地质学研究，对科学界而言，它的价值无法估量！然而，[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士不同意直接将这本书送到最近的大学，而是希望更仔细地研究它。探险队长认为，李登布洛克的日记可能提供了通往比单纯记录枯燥的岩石构造更伟大事物的途径……"
 agassiz.901.g: "一项有益于所有人的发现。"
 agassiz.901.h: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士应该保留并研究它。"
 agassiz.902.t: "奥托·李登布洛克教授的秘密"
 agassiz.902.d: "在火山考察期间找到的书给地质学家造成了不良影响。"
 agassiz.902.f: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName]自希腊归来后将全部精力投入了[SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe]在一处火山岩洞中发现的神秘日记，将自己的政治与科学职责抛在一旁。这几个星期里，雇员们汇报到深夜，灯火通明。奇怪的是近来送到地质学家府上的主要是斯堪的纳维亚文献。据说[SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U]甚至把自己与侄子以及家中的厨师关在一起，直到这一特别棘手的案件得以解决。我们的地质学家越是深入挖掘书中的秘密就越加狂躁，一切迹象都表明[SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe]罹患的精神疾病正日益严重。"
 agassiz.902.g: "令人不安。"
 agassiz.903.t: "地心之旅"
 agassiz.903.d: "在长时间研究李登布洛克教授的日记后，[SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName]取得了突破。"
 agassiz.903.f: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U]已经与世隔绝，只有李登布洛克的日记留在[SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerselfHimself]身旁。正如[SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe]后来告诉我们的那样，其中一段话令[SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHim]好奇数月之久。除了私人笔记外，日记还夹有一页更加古老的手稿，由16世纪的冰岛炼金术士阿尔纳·萨科努塞姆撰写。他以如尼字母留下神秘的题词，远比[SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName]预计的更难以破解。接着灵光一闪，[SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe]解开了谜题。事实证明[SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe]是对的，这本书的确确包含着一个秘密，一个如此伟大却又如此恐怖，令[SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHim]自心底为止震撼的秘密——因为那炼金术士的信息乃是：\n\n“到斯奈山冰盖中去，斯卡塔里斯的阴影将在七月来临前掠过，大胆的旅人啊，你将直抵地心，而我已到过那里。”\n\n令[SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName]更加兴奋的是，李登布洛克用自己的笔记写下了新的如尼文字——而我也是。对地质学家而言，如此耸人听闻的说法需要科学验证。因此[SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U]要求我们资助这次冰岛之旅——[SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe]想亲自造访地球的中心！"
 agassiz.903.g: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U]彻底疯了！"
 agassiz.903.h: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe]知道自己在做什么。支持[SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHim]！"
 agassiz.909.t: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName]的遗憾结局"
 agassiz.909.d: "由于[SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName]生活环境的不幸改变，我们不幸只能停止前往地心的探险计划。"
 agassiz.909.f: ""
 agassiz.909.g: "可惜，非常可惜。"
 agassiz.911.t: "冰岛"
 agassiz.911.d: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName]领导下的地心探险队已经到达了雷克雅未克港。"
 agassiz.911.f: "在雷克雅未克不大容易迷路，因此也就没有问路的必要，毕竟当你只能通过打手势交流时，误解将难以避免。这座小镇沿着两座山之间的低洼沼泽地延伸。一边是覆盖着一大片火山熔岩，缓缓沉入大海。另一面则是磅礴的法萨海湾，它的北岸则是斯奈费尔火山的巨大冰川，此时海湾里只停泊着瓦尔基里号这一艘船。通常，英国和法国的渔业巡逻船都停泊在这里，不过它们现在正在冰岛的西海岸巡逻。雷克雅未克仅有的两条街道中比较长的那条是和海岸线平行的，我迈着大步在这两条沉闷寂静的路上走着。我不时会看到一块块褪了色的草坪，它们就像被使用了很久的旧地毯一样。还有一些看上去像是菜园的地方，里面稀稀拉拉地长着一些青菜、土豆和莴苣，似乎只足够给小人国里的居民食用的蔬菜，菜园中还有几株弱不禁风的小花也在试图吸收阳光和空气。用不到三个小时，我就把这座小镇和它周围的地方都逛了个遍。总的来说，整个小镇的景色平淡无奇。没有树木，没有花草。到处是火山岩坚韧的棱角。"
 agassiz.911.g: "就这样开始了。"
 agassiz.912.t: "斯奈山冰盖"
 agassiz.912.d: "队伍已经到达冰岛火山口，即将下撤。"
 agassiz.912.f: "晚饭很快吃完了，小队的成员尽其所能找到了栖身之所。床板坚硬，居所狭小，而我们身处海平面五千英尺之上的险境。次日清晨醒来时我们几乎被凛冽的寒风冻僵，但却迎来了明朗的阳光。我从花岗岩制成的床上起身，出门观赏眼前展开的壮丽景象。我抬起头望向圆锥上方的洞口，这个洞口划出一片大大缩小了的，却圆得近乎完美无缺的天空。边缘处萨利斯山皑皑白雪覆盖的顶峰直入云霄，被无尽的虚空勾勒的格外清晰。我还没有往下看我即将进入的那个无底洞，但至关重要的时刻已经来到。正如我所说，它的直径有一百英尺宽，圆周有三百英尺长。我倚着一块突出的岩石向下望，不由得毛骨悚然。我觉得我的重心在移动，犹如喝醉了一般，眩晕感充溢了我的大脑。"
 agassiz.912.g: "这真的是个好主意吗？"
 agassiz.913.t: "寻找水源"
 agassiz.913.d: "在进入火山后，水源告急。几天后探险队就将面临极大的风险。"
 agassiz.913.f: "从来没有矿物学家如此幸运地置身于如此美妙的环境中实地研究自然。神奇的地质勘探器并不能把所有与地球内部结构有关的情况带到地面上来，而我们却能亲眼看到，亲手摸到。在美丽而泛着微绿的板岩层中间，蜿蜒着一条条发光的金属矿脉，有铜、锰，以及微量的白金或金。无论人类怎样贪婪，也永远无法享受这些埋藏在地球深处的财富。傍晚六点左右，这个“光”的派对明显开始减弱，甚至完全没有。如我所预计，在第一天的行将结束时，水源已经完全枯竭。我们现在的食物只有杜松子酒；但这种可怕的液体灼伤了我的喉咙，我甚至无法忍受看到它。我发现温度和空气都令人窒息。疲劳使我的四肢麻痹。不止一次，我一动不动地倒下。所幸我的叔叔和那个爱斯基摩人竭尽全力使我恢复。但我看到前者正在痛苦地与疲劳和干渴的折磨作斗争。我们手脚并用，筋疲力尽地来到了两条路的岔口。在那里，我像一个一具毫无生机的躯壳倒在熔岩地上。"
 agassiz.913.g: "我们进入地下太深了——必须在这里寻找水源。"
 agassiz.913.h: "我们需要回到地面上，在那里寻找水源。"
 agassiz.914.t: "地下海"
 agassiz.914.d: "沿着一条溪流穿过洞穴系统后，旅行者们发现了巨大的地下海洋。"
 agassiz.914.f: "我们奇迹般地发现了水源：一股激流将冰冷的水引入地球内部，足以供我们饮用。但当我们沿着它走到尽头时，一个更大的惊喜正等待着我们。最初的时候我什么也没有看见。由于一时间还无法适应光亮，我猛地闭上了眼睛。当我再次睁开眼的时候，我被眼前的景色给惊呆了。这里是一个湖泊或是大海的起点，宽广的水面一望无际，使我不禁地想起那片开阔的海洋，它曾吸引了色诺芬笔下的一万名经历了漫长撤退的希腊人，同声齐呼：“Thalatta！Thalatta！”海！海！海！。凹陷的海岸上铺着宽阔的闪亮的细沙，被海浪轻轻拍打着，散落着小贝壳，金黄色的沙滩上到处都是小贝壳，里面居住着地球上最原始的生命。海浪互相碰撞，发出一种只有在全封闭的巨大空间里才能听到的、奇特而响亮的声音。这是一片真正的海洋，也如同我们所知的其他海洋那样有着曲折不定的海岸线，只不过它地处偏僻，荒凉得可怕。不难想象，对于一个在狭窄的坑道中被囚禁了47天的人来说，能呼吸到这种潮湿而略带咸味的海风，是多么令人宽慰的事情。"
 agassiz.914.g: "建造木筏"
 agassiz.915.t: "巨人"
 agassiz.915.d: "神秘而原始的巨型蘑菇上刻下的如尼文字表明阿尔纳·萨克努森姆曾到过这里。但想要为这一理论找到证据，必须先得经过一个身形硕大，不可思议的史前人类。"
 agassiz.915.f: "在四散的光线下，我可以看清森林深处的任何东西。我好像看到……不，我的确看见有庞然大物在树下移动着，是乳齿象！这群巨兽不是化石，是活生生的动物，就像1801年在美国俄亥俄州的沼泽地带被发现了骸骨的那些动物！我看见这些巨象的长鼻子在树下颤动，好像大批蟒蛇一样。我还能听见它们的牙插入这些古树躯干所发出的声音。我难以置信的摇着头，但却不得不屈服于自己亲眼所见的证据。在不到四分之一英里外，一个人正靠在一棵高大的杉树上，仿佛地下世界里的普洛透斯，海神的另一个儿子，正在看守着这一大群乳齿象！是的，没错！他比这群野兽更加庞大！与我们在骸骨堆中发现过的古代人的尸体不同，他是一个巨人，可以指挥这些巨兽的巨人。他的身高有20英尺以上，和牛头一样大的脑袋被蓬乱的毛发遮住，这毛发就像是远古时期的大象的鬃毛。巨人的手里挥舞着一根巨大的树干，或许对于他这个古代的牧人而言，这就是根地地道道的牧杖！"
 agassiz.915.g: "我们不得不冒险。"
 agassiz.915.h: "这太危险了——返回地表，马上！"
 agassiz.916.t: "阿恩·萨克奴姗的手稿"
 agassiz.916.d: "逃离了巨大的人型蜜蜂之后，旅行者们发现了一个画廊，里面到处都是阿恩·萨克奴姗的姓名缩写。经过一番寻找，他们终于找到了足以证实冰岛炼金术士存在的证据——地底深处就是传说中的手稿！"
 agassiz.916.f: "一刻钟后，我们终于跑到了看不见这个可怕敌人的地方。现在，在这些事情已经发生了好几个月后的今天，我的思维也恢复了正常，我静下心来回顾了一下这件事情。它是人吗？不，不可能！我们被眼睛欺骗了，这个地下世界不可能有任何人类存在！如果真的有人类居住在地心的这个洞穴里，他们为什么没有和地面上的人有往来？不会的！这是荒谬的想法，荒谬至极！我更愿意接受另外一种说法：存在着一种结构与人类相似的动物。它很可能是一种远古时期的猴子，比如猿猴或者中猿猴，就像爱德华·拉尔岱先生在热尔省的桑桑的化石层里所发现的那种。但是，在古生物学的记载上没有任何一种猴子具有这样高大的身材！不过没关系，无论如何，反正它是一只猴子，一只猴子！绝对不是一个人！这里从来不会有人类！我们在极度的恐惧中终于走出了这片明亮而死寂的树林。我们情不自禁地奔跑起来，就和我在噩梦里那种可怕的奔跑一模一样。我的神经极度紧张，已经无法冷静地思考我们应当采取什么更有效的措施。抱着极大的兴趣，我们沿着高高的石壁检查起每一个缝隙来，这些缝隙极有可能就是通往地心的甬道。不久，我们来到了海岸的狭窄处。大海几乎碰到了石壁，中间大约只有7英尺的甬道。在这两块突出的岩石中间，我们发现了一个黑暗的坑道。那里，在一块花岗石板上，有两个神秘且模糊不清的字母，那是那位勇敢而异想天开的旅行家的姓名缩写：A.S.，”我叔叔喊道，“阿尔纳·萨克努塞姆！又是阿尔纳·萨克努塞姆！”"
 agassiz.916.g: "终于——它是我们的了！"
 agassiz.917.t: "地心探险队失踪"
 agassiz.917.d: "地心之旅失败了。我们怀疑考察队的所有成员都因缺水而死。"
 agassiz.917.f: "晚上八点钟。还是没有水，我已经痛苦至极。我叔叔走在前面，不肯停下来，他伸长耳朵期望能听到溪流的潺潺声。但他什么也没有听到。我的腿再也支撑不住我的身体了，为了不让我叔叔因为我而停下来，我忍受着折磨。对他来说这会是绝望的打击，因为属于他的最后一天即将结束。我终于精疲力竭，喊了一声“救命！”就倒了下去。我叔叔返身走过来。他交叉着双臂，注视着我，嘴里咕哝着发出一句沉闷的话来：“一切都结束了！”我的眼睛慢慢地闭上了，最后看到的是他那可怕而愤怒的手势。"
 agassiz.917.g: "真是一场悲剧！"
 agassiz.918.t: "斯特龙博利岛"
 agassiz.918.d: "地心之旅取得圆满成功——我们的学者在斯特龙博利火山喷发后英雄归来！"
 agassiz.918.f: "因此，我对接下来的几个小时时间里发生的事情都记得不太清楚了，我只隐约听到连续不断的爆炸声，模糊地感觉到岩石颤动、木筏在旋转。在那如雨的火山灰里，木筏被咆哮的火焰包围着，随着岩浆的波浪上下起伏。似乎有一只硕大的风扇吹出阵阵狂风，让来自地下的火焰更加猛烈。我最后一次看到汉斯的面庞映照在火光之中，我感觉害怕极了，就像一个罪犯被绑在炮口，只要一开炮，他的肢体就会在空中被打得四分五裂一样。\n\n当我重新张开眼睛的时候，我感到向导那强壮的手正抓着我的腰带。他的另外一只手抓住了我叔叔。我伤得并不严重，只是受了点皮外伤，混身酸痛。我发现自己躺在一个山坡上，离深渊咫尺之遥，轻微的震动就能让我掉下去。当我快要从火山口边上滚下去的时候，汉斯把我从死亡线上救了回来。我们头顶上方500英尺的地方，就是火山口。每隔一刻钟就从火山口喷出一根高高的火柱，里面夹杂着浮石、火山灰和岩浆，同时还发出剧烈的爆炸声。我能感觉到火山的震动，仿佛一条从巨大的鼻孔里不断向上喷出火和气的鲸鱼正在呼吸一样。在我们脚下，火山喷发物沿着陡峭的山坡向下层层流去，一直延伸到700至800英尺深的地方。这使火山的总高度看上去还不到2000英尺。火山脚隐藏在一片郁郁葱葱的绿色树林里，我可以辨认出橄榄树、无花果树和结满紫色葡萄的葡萄藤。"
 agassiz.918.g: "好一场冒险！"
 agassiz.919.t: "被巨人吃了？"
 agassiz.919.d: "地心之旅失败了。我们怀疑考察队的所有成员都因进了巨人的肚子。"
 agassiz.919.f: "至少我们是这么认为的。"
