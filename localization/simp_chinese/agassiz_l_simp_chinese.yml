 agassiz.103.t: "地质勘探队出发"
 agassiz.103.d: "地质勘探队完成任务后，研究助理们回到了他们的祖国。他们所发现的地质构造，现在也对我们的科学家开放。"
 agassiz.103.f: "“或许我可以引用阿加西教授的一句名言来为本章作结：每当科学中有新的惊人事实被揭示，人们总是先说，‘这不是真的’；接着说，‘这与宗教相悖’；最后又说，‘每个人早就知道了’。”\n——查尔斯·莱尔"
 agassiz.103.g: "这会是有用的外援。"
 agassiz.104.t: "铀矿勘探队出发"
 agassiz.104.d: "铀矿勘探队完成任务后，研究助理们回到了他们的祖国。他们发现的铀矿储量，现已可以被我们的公司开采。"
