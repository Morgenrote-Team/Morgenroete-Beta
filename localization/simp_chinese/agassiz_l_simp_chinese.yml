 je_agassiz_improve_mines_project_reason: "你的[concept_agassiz_geologist] [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士正狂热地勘探矿脉，并寻求改进[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName]在[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]的运营方式。\n$mr_divider_for_je$\n该项目每月都会取得进展。一旦进度达到#V 24#!，该建筑将获得新的$agassiz_building_production_mult_modifier_with_tooltip$[concept_modifier]。此外，您还将获得#p 2500#!@agassiz_mineral![Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]\n$mr_divider_for_je$\n当前建筑：[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName]位于[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_agassiz_improve_mines_project_modifier_1_type')]\n\n剩余建筑总数：[JournalEntry.MakeScope.Var('mr_number_of_remaining_list_entries_var').GetValue|V0]\n项目提供的$concept_agassiz_minerals$：[JournalEntry.MakeScope.ScriptValue('agassiz_generic_minderals_from_mine_project_value')|+0]@agassiz_mineral!\n\n当前每月进度：#underline #tooltip:[GetRawTextTooltipTag('agassiz_monthly_geologist_improvement_progress_var_tt')] [GetPlayer.MakeScope.ScriptValue('agassiz_monthly_geologist_project_progress_value')|+2]#!#!"
