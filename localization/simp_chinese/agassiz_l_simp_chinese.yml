 agassiz_deep_sea_research_tech: "深海研究"
 agassiz_deep_sea_research_tech_desc: "20世纪30年代，奥蒂斯·巴顿与威廉·毕比率先使用深海潜水球——一种球形钢制耐压舱体，专为抵御深海深渊的巨大压力而设计。这一发明使人类得以首次亲眼观察深海，并于1934年在百慕大海域创下下潜923米的深度纪录。受这些成功以及瑞士物理学家奥古斯特·皮卡德自身高空气球飞行经历的启发，皮卡德开始改造其增压舱设计，研制出深海潜水器——一种可自主航行的深潜器。"
