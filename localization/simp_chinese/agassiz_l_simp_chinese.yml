l_simp_chinese:
 agassiz_geology_tech: "地质学"
 agassiz_geology_tech_desc: "1815年，运河工程师威廉·史密斯出版了他的英格兰与威尔士地质图，其中标注了化石含量和岩土性质。史密斯认识到，某些岩石层序具有非常具体且明确无误的动物层序特征。1827年，利奥波德·冯·布赫创造了“标准化石”一词，用于指代可以进行相对年代测定的化石。地球的真实年龄从此成为了一个科学议题。"
 notification_agassiz_yearly_minerals_notification_name: "年度地质报告"
 notification_agassiz_yearly_minerals_notification_desc: "今年我们寻找并记录了[GetPlayer.MakeScope.Var('agassiz_generic_minerals_notification_var').GetValue|0+=]种新[Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]。"
 agassiz_sounding_tech: "回声测深"
 agassiz_sounding_tech_desc: "起初测深仪的发明是为了对付潜艇，但后来亦多用于科学和民用等领域，例如：用来定位鱼群或深海研究。"
 building_agassiz_volcano_observatory: "火山观测站"
 agassiz_volcano_observatory_can_construct_volcano_tt: "该地有座#ORANGE 火山#!"
 agassiz_volcano_observatory_can_construct_geologist_tt: "#default_text [GetPlayer.GetName]有个[concept_agassiz_geologist]。#!"
 pmg_agassiz_volcanology: "火山学"
 pm_agassiz_basic_volcanology: "基础火山学"
 agassiz_building_production_mult_modifier: "新矿脉"
 agassiz_building_production_2_mult_modifier: "新油井"
 agassiz_ore_search_cost_modifier: "矿物探寻成本"
 agassiz_mineralogist: "矿物学家"
 agassiz_mineralogist_desc: "矿物学家是稀土矿藏方面的专家，在探寻稀土矿藏方面经验丰富。"
 agassiz_geophysicist: "地球物理学家"
 agassiz_geophysicist_desc: "地球物理学家是研究地球内部特性的专家，对地球的历史和地壳运动的过程十分熟识。"
 agassiz_prospector: "勘探者"
 agassiz_prospector_desc: "勘探者具有特殊的勘探能力，总能寻找到新的矿脉或油田。"
 agassiz_oceanographer: "海洋学家"
 agassiz_oceanographer_desc: "海洋学家对海洋的性质和变化过程有深厚的理解。"
 agassiz_volcanologist: "火山学家"
 agassiz_volcanologist_desc: "火山学家是火山方面的专家，他们对火山的研究具有帮助。"
 agassiz.100.t: "搜寻矿产"
 agassiz.100.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士整理行装，取消了[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]的所有课程，出发搜寻矿产。问题是，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]应当调查哪种稀有矿物？"
 agassiz.100.f: ""
 agassiz.100.g: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士应该回到大学。"
 agassiz.100.h: "煤。"
 agassiz.100.i: "铁。"
 agassiz.100.j: "铅。"
 agassiz.100.k: "硫。"
 agassiz.100.l: "金。"
 agassiz.100.m: "铀。"
 agassiz.101.t: "新矿脉"
 agassiz.101.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士在为矿企勘探到新矿脉后便返回了，后续的设施基建便不是[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]关心的事情了。"
 agassiz.101.f: "“万物有其极限，点石成金是不存在的。”——马克·吐温"
 agassiz.101.g: "干得好。"
 agassiz.102.t: "石油！"
 agassiz.102.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士在为矿企勘探到新油田后，这些黑色的液体黄金便喷涌而出，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]完成了[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]所想的任务了。\n\n已改良建筑总数：[GetPlayer.MakeScope.Var('mr_num_improved_oil_rigs_buildings_var').GetValue|V0] "
 agassiz.102.f: "“成功的秘诀：早起，努力工作，找到石油（抓住机遇）。”——J·保罗·盖蒂"
 agassiz.102.g: "石油永远不嫌多。"
 je_agassiz_find_coal_project: "寻找煤矿"
 je_agassiz_find_iron_project: "寻找铁矿"
 je_agassiz_find_lead_project: "寻找铅矿"
 je_agassiz_find_sulfur_project: "寻找硫矿"
