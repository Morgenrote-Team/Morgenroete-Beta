 je_agassiz_volcano_expedition: "火山考察"
 je_agassiz_volcano_expedition_reason: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]教授与其余专家学者组成的考察队正在[SCOPE.sState('agassiz_volcano_state').GetName]工作。最长考察时间为两年，但通常情况下会在一年半左右结束。然而，那些不寻常的事件——无论是令人愉悦的科学发现还是让人恼怒的灾难都会影响考察。要牢牢记住——在危机出现前就要撤离，这不是开玩笑，火山狂暴、易怒且无情。"
 agassiz.21.t: "维苏威观测站"
 agassiz.21.d: "在地质学中，维苏威火山被视为研究火山学的典范。由于其自17世纪以来的频繁活动，并为了更好地预测和研究新的火山喷发，州政府通过法令决定在其山坡上建立一个火山观测站。"
 agassiz.21.f: "维苏威火山观测站是监测意大利坎帕尼亚地区三个火山区的中心，分别是维苏威火山、弗莱格里火山群和伊斯基亚岛。该观测站由两西西里王国国王费迪南多二世·波旁于1841年建立在维苏威火山的山坡上，是世界上最古老的火山研究所。"
 agassiz.21.g: "我国是火山学先驱。"
 agassiz_conquered_volcano_modifier: "征服火山"
 agassiz_geological_disaster_modifier: "地质灾难"
