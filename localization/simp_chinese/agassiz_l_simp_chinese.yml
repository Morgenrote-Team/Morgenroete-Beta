 agassiz.302.t: "间歇泉"
 agassiz.302.d: "在搜寻特殊地质构造时，[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName]在[SCOPE.sState('agassiz_geyser_state').GetName]的乡下发现一处非凡的自然奇观——这儿有间歇泉！"
 agassiz.302.f: "间歇泉是一种热泉，会在定期或不定期的间隔内以喷泉的形式喷射水流，这种喷发现象被称为“喷发”。间歇泉的名字源于冰岛的大间歇泉\"Geysir\"。间歇泉的形成需要特定的地质和气候条件，而这些条件在全球范围内只有少数地方能够大规模存在。间歇泉的形成依赖于三个关键因素：含水层形式的水源、热源，以及至少一个与水管系统相连且带有狭窄瓶颈的储水池。黄石国家公园拥有超过300个活跃的间歇泉，约占世界现存间歇泉总数的一半。"
 agassiz.302.g: "间歇泉也有节律吗——分钟或者小时？"
