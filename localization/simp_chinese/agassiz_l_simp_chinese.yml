 je_geologist_dies_tt: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士去世了"
 agassiz_stop_geologist_project_button: "停止地质学项目"
 agassiz_stop_geologist_project_button_desc: "停止你当前的地质学项目。你的进度将会丢失。"
 agassiz_stop_geologist_improving_project_tt: "你决定通过点击#italic 停止地质学项目#!按钮来停止项目。"
 agassiz_mid_atlantic_ridge_cost_modifier: "大西洋探险费用"
 je_agassiz_mid_atlantic_ridge: "水下山脉"
 je_agassiz_mid_atlantic_ridge_reason: "[concept_agassiz_geologist][ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士正在一艘现代化的科考船上用回声测深仪扫描大西洋的海底。这应该会为地球历史研究带来新的见解。"
 je_agassiz_mid_atlantic_ridge_goal: "12个月后，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士将有望展现成果。"
 agassiz.201.t: "大西洋中脊"
 agassiz.201.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士查看了第一批部分数据有了惊人的发现：不仅大西洋的北部，整个大西洋都可见一条状带连绵起伏，只在赤道水平处有中断迹象。地质学家将这种现象命名为大西洋中脊。未来较长一段时间里将对该数据进行进一步评估。"
 agassiz.201.f: "大西洋中脊是一条位于大西洋的山脉，大部分位于海平面以下，延伸约20000公里。这使它成为最长的洋中脊系统的一部分，这个系统遍布地球，总长度超过60000公里。1853年，海军军官马修·冯丹·莫里首次描述了大西洋中部的海底隆起，1872年挑战者号探险队证实了这一发现。当时的研究是为了铺设第一条跨大西洋深海电缆进行的初步调查。1925年至1927年间，德国气象探险队通过回声测深仪绘制了大西洋中脊的详细剖面图。大西洋中脊的发现为与魏格纳大陆漂移理论相关的板块构造地质动力学过程提供了早期线索。"
 agassiz.201.g: "这将提高地质学家对地球物理的认知。"
 agassiz.201.h: "这将提高地质学家对海洋学的认知。"
 agassiz.201.i: "这将提高地质学家对总体的认知。"
 agassiz.202.t: "地质古生物学研讨会"
 agassiz.202.d: "科学院邀请人们参加由[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]教授与[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]教授联名的科学研讨会。该会被学术界认为是地球历史研究的一次丰碑。两位大拿特别强调了南美洲和西非海岸在地质和化石有着惊人的相似相关性。"
 agassiz.202.f: "地质学和古生物学的紧密关系体现在许多在这两个领域中脱颖而出的科学人物身上。地层与化石的相互作用用于年代测定，使这两门科学密不可分。乔治·居维叶被认为是古生物学之父，同时也是地质学的教父。即使在科学争论中，例如1830年的居维叶‑杰弗罗伊辩论，争论的核心是渐变论和灾变论，主要的论据也是地质学和古生物学的发现。没有两者的协同作用，现代地质学和现代古生物学都不可能实现。"
 agassiz.202.g: "硕果累累的学术交流"
 agassiz.311.t: "来自宇宙的石头"
 agassiz.311.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]博士在我国的一处偏远地区发现了一块非凡的石块。初步研查后[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]明确表明“这是一块含铁的巨陨石”！"
 agassiz.311.f: "早在18世纪，人们就开始建立陨石收藏，但当时还不知道陨石是来自外太空的。世界上最古老的陨石收藏位于维也纳自然历史博物馆——1751年坠落的赫拉斯奇纳陨石。如今，这里拥有世界上最大的展览收藏，约有1100件展品。直到20世纪，发现的陨石总数还只有几百块。如今，全球收藏中的陨石数量超过3万块，这一变化始于哈维·H·宁宁格的发现，他认为地球表面的陨石比之前想象的要多得多。宁宁格的策略是在美国大平原上寻找陨石，因为那里的土地大部分被耕种，土壤中几乎没有岩石。"
 agassiz.311.g: "它从何而来？"
 agassiz_seismology_tech: "地震学"
 agassiz_seismology_tech_desc: "1839年，苏格兰珀斯郡科姆里附近发生了一系列地震。为进一步研究和开发新的地震探测方法，英国成立了地震调查委员会。该委员会最为人熟知的成果是詹姆斯·大卫·福布斯创造的世界上首个现代测震仪。1857年，罗伯特·马利特开始使用炸药进行地震学实验，奠定了现代仪器地震学的基础。他也是“地震学”一词的创造者之一。"
 agassiz_geologist_demotivated_modifier: "被辞退的地质学家"
 agassiz_set_new_age_of_earth_effect_tt: "[GetPlayer.GetName]提出了关于地球年龄的最新估算方法。地球年龄将会被重新估测。"
 agassiz.401.tt: "所有拥有[concept_agassiz_geologist]的国家都可以对这项研究进行投票。"
 notification_agassiz_new_earth_age_notification_name: "重新估测地球年龄"
 notification_agassiz_new_earth_age_notification_desc: "一位[concept_agassiz_geologist]使同僚们确信地球比想象中的更古老。\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('agassiz_age_of_earth_type')]"
 je_agassiz_geological_research: "地质研究"
 je_agassiz_geological_research_reason: "[ROOT.GetCountry.GetCustom('je_agassiz_geological_research_active_type')]一位空闲的[concept_agassiz_geologist]将开展地质研究。\n\n研究期间可能发生以下情况：\n• 若地质学家拥有$agassiz_mineralogist$[concept_character_trait]特质，每年获得的[Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]产量将翻倍。\n• 地质学家可能发现[Concept('concept_dubois_formation','$concept_dubois_formations$')]、[Concept('concept_andersson_cave','$concept_andersson_caves$')]以及铀矿。\n• 研究满5年后，你将获得@agassiz_mineral!#p 25000#![Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]和@agassiz_rare_mineral!#p 1#![Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]。此外，地质学家可能习得$agassiz_mineralogist$[concept_character_trait]特质。"
 agassiz.401.t: "新的估测"
 agassiz.401.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]已经总结了[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]毕生的见闻与知识来重新估测地球年龄，现在唯一的问题就是科学界是否相信[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]的理论。"
 agassiz.401.f: "从19世纪初到20世纪中叶，地球年龄的确定一直模糊不清，长时间内这一问题引发了反复的辩论和敌意。地球年龄问题往往与进化论相关，因为进化论需要足够长的时间才能成立。直到世纪之交，许多科学家仍然认为地球只有几百万年的历史——甚至在生命晚期，开尔文勋爵也认为地球大约只有2000万年的历史。然而，即使是“极限主义者”之一的查尔斯·达尔文，在捍卫自己理论时也认为地球的年龄大约为3亿年。直到放射性元素的发现，地球的年龄才得以正确测定，地球（以及整个太阳系）的真实年龄才为人们所知。"
 agassiz.401.g: "给那些闻名世界的地质学家写信。"
 agassiz.402.t: "一位地质学家提出了新的估测"
 agassiz.402.d: "[SCOPE.sCharacter('agassiz_geologist_scope').GetLastName]提出了一个新的地球年龄估测。这位学者认为之前测量手段的不精确导致了显著偏低的估测结果。由于我国的地质学家是该领域备受尊敬的代表之一，我们也收到了这篇论文的副本。"
 agassiz.402.g: "这个估测数字让人信服。"
 agassiz.402.h: "谁能相信这个“地质学家”的臆想？"
 agassiz.403.t_yes: "地质研究已被接受"
 agassiz.403.d_yes: "幸运的是，国际地质学界的大多数人都认可我国地质学家的新理论并视其为地质学的里程碑。"
 agassiz.403.f_yes: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]对地球年龄的新估测已被广泛接受。[GetGlobalVariable('agassiz_age_of_earth_yes_global_var').GetValue|+0]人#G 赞成#!，[GetGlobalVariable('agassiz_age_of_earth_no_global_var').GetValue|+0]人#R 反对#!。这意味该理论已被正式认可，地球的年龄也大大提高。"
 agassiz.403.g: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士的胜利，地质学的胜利！"
 agassiz.403.t_no: "地质研究已被拒绝"
 agassiz.403.d_no: "国际地质学界那些无知的所谓“精英”们拒绝了我国地质学家的新研究。我们尚不确定这是投票中的舞弊行为，还是一种企图削弱我国民族自豪感的敌对行动。"
 agassiz.403.f_no: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]对地球年龄的新估测已被大部分拒绝。[GetGlobalVariable('agassiz_age_of_earth_yes_global_var').GetValue|+0]人#G 赞成#!，[GetGlobalVariable('agassiz_age_of_earth_no_global_var').GetValue|+0]人#R 反对#!。地球的年龄估测将保持现状。"
 agassiz.403.h: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士的失败，地质学的失败……"
 je_agassiz_advanced_oceanography: "高等海洋学"
 je_agassiz_advanced_oceanography_reason: "早期的海洋学研究主要为了军事利益，以便战略性地利用太平洋的当前条件，而如今，科学家们主张将海洋研究的发现用于更深入了解我们的星球——纯粹为了追求知识。"
 je_agassiz_advanced_oceanography_success: "如果我们获得了#G 50#!@rapanui_oceanographic_knowledge!#E 海洋学知识#!，研究将完成。"
 je_agassiz_advanced_oceanography_goal: "如果我们获得了#G 50#!@rapanui_oceanographic_knowledge!#E 海洋学知识#!，研究将完成。"
 agassiz.312.t: "地质勘测"
 agassiz.312.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士绘制了某地的地质剖面图，并将这张地图向公众开放。"
 agassiz.312.f: "现代地层学是在19世纪逐步发展起来的：欧洲和北美洲的地质学家们以威廉·史密斯为榜样，研究并分类各自国家的岩层，寻找其中的关联。还将他们的研究成果以地图、地层表和专论的形式发表。"
 agassiz.312.g: "这些知识对理论工作很重要。"
 agassiz.312.h: "知识还是实用点最好。"
 agassiz.313.t: "矿床"
 agassiz.313.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]先前在偏远地区进行的地质调查找到了一座富矿。[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]还不确定该把研究重心放在哪里。"
 agassiz.313.f: "矿物是通常呈晶体状、由地质过程形成的元素或化合物。当今已知并被认可为独立存在的约6000种矿物物种中，绝大多数都是无机矿物。然而，一些有机物质如蜜黄晶（mellite）和埃文基石（evenkite），以及形成肾结石的草酸钙石（whewellite）和韦德利石（weddellite）也被认定为矿物，这是因为它们的形成同样涉及地质过程。如果将所有已知的矿物变种、同义名称以及尚未得到正式认可的矿物物种都计算在内，矿物名称的总数超过7000个。"
 agassiz.313.g: "数量。"
 agassiz.313.h: "质量。"
 agassiz.314.t: "一位鼓舞人心的地质学家"
 agassiz.314.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]现已在全球地质学界都出名了。像[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerselfHimself]这种人，会有很多人来寻求[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]的建议——世界各地的同行们已经把[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim]的邮箱塞满啦！"
 agassiz.314.f: "“我认为，最优秀的地质学家，是那些见过最多岩石的人。”\n——赫伯特·哈罗德·里德"
 agassiz.314.g: "这将提高[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]的声望。"
 agassiz.314.h: "这将提高[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]所在大学的声望。"
 agassiz.315.t: "地质洞察"
 agassiz.315.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]在当前的研究之旅中踏足了我国很多地方，简直是大开眼界。在一篇正在撰写的论文中，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]总结了一些关于地质学原理的新发现。"
 agassiz.315.f: "“世界就像地质学家面前的巨大谜盒；他如同一个孩子，起初对拼图的各个部分感到困惑，直到发现它们之间的联系，并看到它们如何契合，这些碎片便在他手下迅速拼成一幅完整的图画。”\n——路易·阿加西"
 agassiz.315.g: "好极了。"
 agassiz.11.t: "《地震动力学》"
 agassiz.11.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]今日引发国际关注。[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]以一部有关地震的著作彻底改变了对这一地质学领域的认识——[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]所创造的“震中”与“地震学”等词汇已被科学界采用。"
 agassiz.11.f: "1846年2月9日，罗伯特·马莱向爱尔兰皇家学院提交了他的著作《地震动力学》，该书被认为是现代地震学的基础之一。1852年至1858年间，在儿子约翰·威廉·马莱的帮助下，他编写了不列颠学会《地震目录》，该目录于1858年出版，列出了已知的地震并描述了其影响。在此期间，他还进行了爆破实验，以确定地震波在松散和坚固岩石中的传播时间。"
 pmg_agassiz_seismology: "地震学"
 pm_agassiz_basic_seismology: "基础地震学"
 pm_agassiz_advanced_seismology: "高等地震学"
 pm_agassiz_advanced_volcanology: "高等火山学"
 agassiz_congress_host_modifier: "举办地质学大会"
 agassiz_laughed_congress_modifier: "在地质学大会上被嘲笑"
 agassiz_respected_congress_modifier: "在地质学大会上受到尊重"
 agassiz_lauded_congress_modifier: "在地质学大会上受到赞扬"
 agassiz.316.f: "如果我国没有足够有趣的地质特征及构造，地质学家可能会到边境地区乃至境外去寻找它们。"
 agassiz.317.t: "外国的地质学家"
 agassiz.317.d: "一位来自外国的地质学家为了更好地开展学术研究，在我们不知情的情况下，设法进入了我们的区域并做了充足的数据记录。出于“感谢”，他将研究研究结果发给了我们。"
 agassiz.317.g: "所以……？"
 agassiz.501.t: "大陆移动了吗？"
 agassiz.501.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]在刚刚出版的一本书中提出了一项备受争议的理论。据此，当前形态的大陆是地质历史上相对近期的产物。[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士假设，今天的各大洲曾经组成了一个名为“盘古大陆”的整体。为了让国际地质学界信服这一理论，博士邀请他们参加了一次学术会议。"
 agassiz.501.f: "作为解释大陆形成的理论，大陆漂移最早可追溯到弗莱芒制图学家亚伯拉罕·奥特柳斯。在1596年出版的《寰宇全图》中，南美洲和非洲的海岸线相似性已清晰可见。亚历山大·冯·洪堡在1801年和1845年的著作中详细描述了南美洲和非洲对岸海岸线及其植被的相似性，并大胆推测大西洋可能是由灾难性洪流冲刷而成。1858年，地理学家安东尼奥·斯奈德‑佩莱格里尼更进一步，发表了首幅展示旧大陆和新大陆无海洋分隔的地图，为大陆漂移理论的发展奠定了重要基础。然而，真正引发科学界从固着论（认为大陆牢固扎根于地球）向移动论转变的关键人物是阿尔弗雷德·魏格纳。他的大陆漂移理论彻底改变了人们对地球构造的认知。尽管如此，魏格纳的理论在他有生之年仍未得到广泛认可，只有少数科学家支持。直到20世纪下半叶，这一革命性理论才最终确立了其在地球科学中的主导地位。"
 agassiz.501.g: "邀请主要的地质学国家。"
 agassiz.502.t: "地质学创新"
 agassiz.502.d: "[SCOPE.sCountry('agassiz_congress_host_country').GetName]邀请各方参加一次国际地质学大会。主办方——一位著名地质学家——竟然声称大陆正在移动……！"
 agassiz.502.g: "这一定很有意思。"
 agassiz.503.t_laughed: "地质学界的嘲弄"
 agassiz.503.t_respected: "自信的亮相"
 agassiz.503.t_lauded: "钦佩与祝贺"
 agassiz.503.d_laughed: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士的出现令人忍俊不禁。在地质学领域，[ROOT.GetCountry.GetNameNoFlag]并没有做出什么杰出成就。这显然成了私下讲的笑话。"
 agassiz.503.d_respected: "地质学大会开始之前，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]受到了热情的欢迎，并按照惯例进行了交流。[ROOT.GetCountry.GetNameNoFlag]在研究界享有盛誉。"
 agassiz.503.d_lauded: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]教授的到来受到了热烈欢迎，被视作最值得期待的客人之一。由于[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim]被公认为地质学先驱，[ROOT.GetCountry.GetNameNoFlag]周围很快聚集了很多人。"
 agassiz.503.f_laughed: "“为什么[ROOT.GetCountry.GetAdjectiveNoFlag]的地质学家没有女朋友？\n\n因为他们永远算不准时间！”"
 agassiz.503.f_respected: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]教授抵达后，与同事们愉快地交谈了几句，谈的大多是乏味的地质构造，科学界之外的人士会把它们当作更无聊的地层。"
 agassiz.503.f_lauded: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]教授似乎有些应接不暇。许多同行都想与[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim]交谈，从[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]的考察和经验中获益。有些人甚至劝[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim]举办一次私人讲座。"
 agassiz.503.g: "真尴尬！"
 agassiz.503.h: "总算能和志同道合者为伴。"
 agassiz.503.i: "我们是引领潮流的地质学大国！"
 agassiz.504.t: "动或不动？"
 agassiz.504.d: "[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName]向与会的各国地质学家进行了一次备受赞誉的演讲。[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetSheHe]主张彻底革新地质学，提出移动论——也即大陆漂移学说——的观点。但反对者为数众多，他们坚持目前盛行的固着论教条。"
 agassiz.504.f: "在20世纪60年代之前，“固着论”一直是主流的大地构造假说。该假说认为，地壳与底土牢固相连，因此大规模的构造过程是局部的。由此推论，地球的发展主要是地壳的垂直构造运动，水平构造运动则很少发生。古典地质学的大多数理论都建立在固着论的基础上。20世纪初，南美洲和非洲发现了同一物种的化石。基于固定论假设，人们提出了陆桥假说，认为曾经有陆桥连接非洲和南美洲，使动物得以迁徙到另一个大陆。在1924年至1927年期间，流星号科考船进行了回声测深仪测量，发现了大西洋中脊——一条从北向南延伸的海底山脉——而不是像人们预想的那样，发现了本应从东向西延伸的陆桥遗迹，陆桥假说开始动摇，但直到20世纪60年代才被完全抛弃。固着论的反面是移动论，它认为地壳的水平运动具有决定性的影响。移动论是在阿尔弗雷德·魏格纳发现大陆漂移的基础上发展起来的。"
 agassiz.504.g: "数百万年来，大陆从未移动过。"
 agassiz.504.h: "一切证据都指向板块构造理论。"
 agassiz.505.t: "地质学家同行"
 agassiz.505.d: "在地质学大会的茶歇时间，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]博士有机会能与世界各地的同行交流经验，但问题是该怎么利用这个机会。"
 agassiz.505.f: "“由于我们当前知识的局限性，一个奇怪的事实是，关于地球史前状况的结论可能截然相反，这取决于问题是从生物学角度还是地球物理学角度进行研究。”\n——阿尔弗雷德·魏格纳"
 agassiz.505.g: "地质知识。"
 agassiz.505.h: "海洋学知识。"
 agassiz.505.i: "稀有矿物。"
 agassiz.505.j: "新的人才。"
 agassiz.509.t_fix: "固着论胜利"
 agassiz.509.d_fix: "尽管[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName]尽了最大努力，[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetHerHis]仍未能说服大多数同事。批评者认为，[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetLastName]教授无法为其理论提供足够的证据。事实依然如故：大陆是不动的。"
 agassiz.509.f_fix: "“漂移理论的‘牛顿’尚未出现，这并不值得焦虑；毕竟，这一理论还很年轻，且常遭质疑。从长远来看，人们无法责怪理论家在缺乏广泛共识的情况下，花费时间和精力进行解释时会犹豫不决。”\n——阿尔弗雷德·魏格纳"
 agassiz.509.g: "然而它在动。"
 agassiz.509.t_tectonics: "活动论胜利"
 agassiz.509.d_tectonics: "[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName]成功说服学术界接受[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetHerHis]的理论。大陆漂移学说现已被视为最能解释未知地质现象的理论了。"
 agassiz.509.f_tectonics: "“科学家们似乎尚未充分认识到，所有地球科学都必须为揭示地球早期状态提供证据，只有综合这些证据，才能得出真相。只有整合所有地球科学提供的信息，我们才有可能找到‘真相’，即能够以最佳方式呈现所有已知事实的图景，从而具有最高的可信度。此外，我们还必须时刻准备好面对这样的可能性：每一项新发现，无论源自何种科学，都可能修改我们得出的结论。”\n——阿尔弗雷德·魏格纳"
 agassiz.509.h: "等一下——这——这真叫人惊讶！"
 agassiz_conference_geologist_double_vote_tt: "得益于经验丰富的地质学家，我们拥有#G 两倍#!的投票权。"
 agassiz_conference_geologist_triple_vote_tt: "得益于著名地质学家，我们拥有#G 三倍#!的投票权。"
 agassiz.601.t: "哪一座火山"
 agassiz.601.d: "数位学者及其助手为即将开始的火山考察联袂而至。但问题在于——[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]该带领他们探索哪座火山？我们有不少选择。"
 agassiz.601.f: "“当你在提到赫顿博士的理论时，我必须请求你不要使用‘火’这个词，‘热’是更准确描述。通常情况下我们口中的‘火’是指燃料正在燃烧过，但我们都知道地球内部并没有这样的‘火’。”\n——玛丽亚·哈克"
 agassiz.601.g: "[SCOPE.sState('agassiz_volcano_1').GetName]"
 agassiz.601.h: "[SCOPE.sState('agassiz_volcano_2').GetName]"
 agassiz.601.i: "[SCOPE.sState('agassiz_volcano_3').GetName]"
 agassiz.602.t: "火山山脚下"
 agassiz.602.d: "火山考察队已经抵达了[SCOPE.sState('agassiz_volcano_state').GetName]的火山的山脚下，并准备开始调查。"
 agassiz.602.f: "“源源不断的温泉、喷发的火山以及地震都证明了地热的存在。这些现象表明，地球内部蕴藏着巨大的能量，但这种能量在多深的地方发挥作用？其范围和强度又是怎样的呢？”\n——约翰·普莱费尔"
 agassiz.602.g: "这没听起来那么危险啊，对吧？"
 agassiz.603.t: "成功的火山考察"
 agassiz.603.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]大胆带领[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]的助手登上火山顶峰，成功进行了大量实验并采集了标本。这次火山考察为深入了解地球内部运作做出了宝贵贡献。"
 agassiz.603.f: "“地震的摇撼、火山的爆发、间歇泉的喷射、风暴的肆虐、波涛的拍击以及植物汁液的向上输送，所有这一切都是大自然的心脏那充满爱意的律动。”\n——约翰·缪尔"
 agassiz.603.g: "没人被严重烧伤！"
 agassiz.604.t: "火山考察以灾难告终"
 agassiz.604.d: "可怕的消息！尽管有多次警告信号——有毒气体、小地震、黑烟——[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]博士依然固执地坚持继续探险。这次火山喷发完全出乎参与者的意料，整个地区已成灾区。熔岩仍在淹没山脉和周围的村庄。幸存者凭借极大的努力，才得以带着研究成果和样本逃到安全地带。然而，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士失踪了。我们必须做好最坏的打算。"
 agassiz.604.f: "报纸已经报道了多起伤亡事件，该地区的大部分区域不得不疏散。建筑物受损，街道被熔岩淹没。火山口附近几乎没有生还的可能。"
 agassiz.604.g: "糟透了！"
 agassiz.605.t: "火山考察无果而终"
 agassiz.605.d: "这次火山探险耗尽了所有研究经费，现已结束并返回。不幸的是，成果寥寥。或许，领导者的谨慎态度过于保守？"
 agassiz.605.f: "“要探索火山，就需要在其上进行实地考察。”"
 agassiz.605.g: "令人失望。"
 agassiz.611.t: "洞悉化学"
 agassiz.611.d: "在[SCOPE.sState('agassiz_volcano_state').GetName]考察时，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]可以在火山口更详细地研究某些有趣的化学反应，许多矿物的化学组成仍然未知。"
 agassiz.611.f: "大多数化学元素存在于各种化合物中，尤其是在矿物中表现出极大的多样性。在现代化学的早期，地质学家们不断寻找新的样本，以便化学家从中分离出未知的元素。"
 agassiz.611.g: "这能帮到[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士。"
 agassiz.612.t: "熔岩拦路"
 agassiz.612.d: "显然，这次火山探险在向火山口推进时有些过于冒进，他们发现自己几乎被四面八方的熔岩包围。如果此时放弃前进，将意味着巨大的时间损失。"
 agassiz.612.f: "“熔岩呈现出一种昏暗的外观，正如诗人所描绘的那样，宛如冥界的河流。它缓慢地像沙流般滚动，白天呈黑褐色，夜晚则变成赤红。当它逼近时，你会听到模糊的噼啪声，这不清晰的声音引发了极大的恐惧。熔岩的光芒如此强烈，首次照亮了大地和天空，营造出持续闪电的景象；天空反射着光辉到水面上，仿佛自然界在这三重火焰的影像中燃烧。”\n——热尔梅娜·德·斯塔尔"
 agassiz.612.g: "另寻他路。"
 agassiz.612.h: "试着过去。"
 agassiz.613.t: "老练的领导者"
 agassiz.613.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]博士是一位经验丰富的火山学家，深谙应对火山的各种方法。正是由于[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]的专业知识，这次探险才能安全顺利地进行。"
 agassiz.613.f: "“我长久以来渴望目睹的事件终于发生了——维苏威火山已经连续喷发了好几天。我已经对刚喷出的熔岩进行了多次实验，如果不是因为长时间停留在这个壮观而危险的地方，距离炽热的熔岩流仅有五六英尺，导致我身体严重不适，我本可以完成这些实验。”\n——汉弗里·戴维"
 agassiz.613.g: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士是位超凡的领导者。"
 agassiz.614.t: "有毒气体"
 agassiz.614.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]带领的考察队偶然间在火山的一个角落里发现了大量喷涌而出的火山气体。地质学家决定采集些样本，尽管要冒点风险。"
 agassiz.614.f: "火山气体是火山活动期间从地表喷出的气体，可能集中在火山的某个特定区域喷出或是从火山两侧大面积地向外弥散。早在1790年，火山气体就被意大利的地质学家希皮奥内·布赖斯拉克采集和分析。如上所述，火山气体的成分是依赖于火山内岩浆的移动。这样，在气体成分的突然变化往往预示在火山活动的变化"
 agassiz.614.g: "我们得研究下这些“毒气”。"
 agassiz.614.h: "真荒唐！"
 agassiz.615.t: "火山喷发物"
 agassiz.615.d: "一阵突然的隆隆声让火山探险队的成员们惊恐不已。就在团队以为最糟糕的情况已经过去时，火山突然喷出炽热的岩石，如流星雨般砸向他们。两名助手受伤，一头驮马被砸死。"
 agassiz.615.f: "“我们听到头顶上方和岛屿周围传来一种奇怪的声音，仿佛巨大的火焰在燃烧，或是重型火炮每隔一两秒发射一次。到了五点，轰鸣声依旧持续，天空变得漆黑，一场浮石雨降临在我们身上，许多碎块体积相当大，还带着温热。”\n——沃森船长"
 agassiz.615.g: "真是不幸的转折。"
 agassiz.616.t: "熔岩样本"
 agassiz.616.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士要求考察队暂时停下来。附近似乎是一个采集熔岩样本的好地方。这是一个科学价值与风险并存的行动。"
 agassiz.616.f: "“熔岩被困在宽阔河床的深岸之间，向下流动时不像液体，而更像是一座焦炭山，有时也像充满气体的煤炭。它分裂、噼啪作响、闪烁、冒烟、燃烧，并不断向前推进，如同一个庞大而紧密的整体。脱落的碎块滚落下来，光芒如此炽烈，让我仿佛置身于铁炉口。每当岩石坠落，伴随着雷鸣般的轰鸣，树木燃烧起来，人群发出钦佩和惋惜的呼喊。”\n——路易吉·帕尔米耶里"
 agassiz.616.g: "我们来就是为了这个。"
 agassiz.617.t: "熔岩样本‑成功！"
 agassiz.617.d: "我国的地质学家冒着危险成功采集了科学价值极高的熔岩样本。"
 agassiz.617.f: ""
 agassiz.617.g: "热乎乎的科学！"
 agassiz.618.t: "熔岩样本‑失败！"
 agassiz.618.d: "让其他队员感到后怕的是——[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]采集样品不仅失败了，还被严重烧伤。现在整个团队都十分不安！"
 agassiz.618.f: ""
 agassiz.618.g: "有些学科就是需要格外注意保护双手……"
 agassiz.619.t: "多好看的晶体啊"
 agassiz.619.d: "火山区域独特的地质活动产生许多稀有的矿物晶体。[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]十分渴望把这些纳入[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]的收藏中……"
 agassiz.619.f: "大多数火山岩都包含一些常见矿物。火山岩的分异作用主要通过分离结晶来增加二氧化硅的含量。因此，经过进一步分异的火山岩通常富含二氧化硅含量较高的矿物，如片硅酸盐和架硅酸盐，包括长石、石英和白云母。尽管更原始的火山岩仍以硅酸盐为主，但其往往由二氧化硅含量较低的矿物组成，如橄榄石和辉石。鲍氏反应系列准确预测了火山岩中常见矿物的形成顺序。偶尔，岩浆可能会带入由另一岩浆结晶出的晶体，这些晶体被称为捕虏晶。金伯利岩中的钻石是稀有但著名的捕虏晶；金伯利岩并不生成钻石，而是将其捕获并运送至地表。"
 agassiz.619.g: "一份样本就足够了。"
 agassiz.619.h: "尽可能多地采集样本！"
 agassiz.619.i: "几块石头抵不上研究人员的生命。"
 agassiz.620.t: "熔岩河"
 agassiz.620.d: "一条熔岩河挡在了考察队的路上。有些队员认为这可能是威胁到整支考察队的巨大挑战，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]却视为测试新设备的天赐良机……"
 agassiz.620.f: "“大多数情况下，可以清楚地看到是炽热的物体而非燃烧在发光。正是炽热的熔岩所放出的光使得维苏威火山像是喷出了巨大火柱一般。”\n——约翰·菲利普斯"
 agassiz.620.g: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士应该研究一下这里。"
 agassiz.620.h: "这太危险了！"
 agassiz.621.t: "火山作用理论"
 agassiz.621.d: "在[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]火山之行期间，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]希望通过收集证据和探索周边区域，最终验证先前的一些火山学理论。为此，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]需要在这个称为“极其迷人且富有启发性”的区域内花费大量时间，而此时[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]的同事们则在一旁咬牙切齿地看着背景中越来越多的浓烟升起……"
 agassiz.621.f: "“火山喷发达到高潮时，一道巨大的灰柱冲天而起，形如参天巨松。灰柱攀升至极限后，逐渐倾斜。由于蕴含大量致密物质，灰柱最终不堪重负，轰然坠地。随后，规模骇人、预示灾难的炽热熔岩如洪流般倾泻而下，席卷整个山体。”\n——玛丽安娜·斯塔克"
 agassiz.621.g: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士应该花时间彻底研究一下这个现象。"
 agassiz.621.h: "别浪费时间！"
 agassiz.622.t: "地震"
 agassiz.622.d: "清晨，当考察队接近火山口时，一场地震伴随着落石和泥石流发生。这次小地震清楚表明，火山的活跃程度远高于队员之前的预期。"
 agassiz.622.f: "“在另一处，这位博学的地理学家提到西西里因地震从意大利分离的传统观点时指出，目前那一带靠近海岸的地区很少发生地震，因为现在有了可以让火焰、炽热物质和水流通的开放通道。然而，在过去，当埃特纳火山、利帕里群岛、伊斯基亚岛及其他火山的通道被封闭时，被困的火焰和气流可能会引发更为猛烈的活动。因此，火山作为安全阀的理论，以及地下震动在火山能量首次转移到新区域时可能最为剧烈的观点，并非现代才有的”\n ——查尔斯·莱尔"
 agassiz.622.g: "这次考察真不是一拍脑袋的结论吗……"
 agassiz.623.t: "满地的矿物"
 agassiz.623.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]带领的考察队在[SCOPE.sState('agassiz_volcano_state').GetName]的火山中发现了一处有着丰富矿藏的地点。"
 agassiz.623.f: "矿物就是地质学家的至交。"
 agassiz.623.g: "矿物！"
 agassiz.623.h: "不。"
 agassiz.624.t: "奇异标本"
 agassiz.624.d: "这可能令人惊讶，但在[SCOPE.sState('agassiz_volcano_state').GetName]的火山考察中，队员们竟然发现了一些生活在火山附近的稀有动物标本。这些标本无疑会引起当地动物学家的极大兴趣。"
 agassiz.624.f: "“汉弗莱！去采集一些小火山鹦鹉的蛋。早餐不多，我很想念我的周日煎蛋。”"
 agassiz.624.g: "标本！"
 agassiz.625.t: "未知化石"
 agassiz.625.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]在[SCOPE.sState('agassiz_volcano_state').GetName]中的火山考察发现了一些可能解答重要古生物学暨地质学问题的化石。"
 agassiz.625.f: "“如果我们绕过埃特纳火山南部和东部基部的肥沃地区，就会看到海洋地层中的粘土砂和火山凝灰岩从现代熔岩层下露出。这些地层中出现的海洋化石贝壳几乎全部与现在栖息于地中海的物种相同，并且它们出现在靠近卡塔尼亚的海拔600到800英尺的高度上，这清楚地证明了这一地区，像西西里岛更南部的其他地方一样，曾经经历过古海床的上升运动。因此，可以合理地推断，除那些非常现代起源的部分外，整座山都参与了这一抬升过程。”\n——查尔斯·莱尔"
 agassiz.625.g: "化石！"
 agassiz.626.t: "地磁数据"
 agassiz.626.d: "今晨，[SCOPE.sState('agassiz_volcano_state').GetName]的火山考察队收到一封地磁台的电报，要求他们收集火山口的一些数据，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]答应了。"
 agassiz.626.f: "“如果这数据真那么重要，地磁研究所怎么不自己亲自来呢？”"
 agassiz.626.g: "完美！"
 agassiz.627.t: "地球里的太阳元素"
 agassiz.627.d: "在分析一些先前被忽视的岩石时，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]有惊人的发现。通过现场光谱分析，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]成功证明这些火山岩实际上含有氦元素，而此前人们认为氦元素只存在于太空中。"
 agassiz.627.f: "路易吉·帕尔米耶里是一位杰出的意大利物理学家、气象学家、地震学家和火山学家。他的学术生涯丰富多彩，跨越多个领域，为自然科学的发展做出了重要贡献。1845年，帕尔米耶里接替帕斯夸莱·加卢皮在那不勒斯大学担任逻辑学和形而上学的教学职位。1847年加卢皮去世后，他正式继承了这一教席。到了1860年，帕尔米耶里做出了一个关键的职业转变：他放弃了原有的教席，转而接掌自己创立的地球物理学和气象学教席。这一转变标志着他学术兴趣的深化和专业方向的聚焦。随着新教席的设立，帕尔米耶里还同时负责管理与之相关的气象观测站和创建于1842年的维苏威火山观测站。这两个观测站在他的领导下，成为了重要的科研基地。帕尔米耶里一直担任这个教席并管理这两个观测站直到生命的最后一刻，为地球科学的发展奉献了毕生精力。帕尔米耶里的声名主要源于他在测量仪器方面的创新。他改进了电磁地震仪，提高了地震监测的精度；同时，他还开发了测量大气中电压的装置，为气象学研究提供了重要工具。这些创新大大推进了地球物理学和气象学的研究方法。1882年，帕尔米耶里取得了一项划时代的科学发现。通过对维苏威火山熔岩进行光谱分析，他首次在地球上探测到了氦元素的存在。"
 agassiz.627.g: "这……这带来了新的可能性。"
 agassiz.628.t: "考察队员恳求休息"
 agassiz.628.d: "经过一年多的火山考察，队员们愈发频繁地要求休息。许多人已接近疲惫的边缘，开始有人强烈呼吁回家。"
 agassiz.628.f: "“你害怕了吗？恕我直言，这样的地震事件正是我们攀登这座火山的原因！你是个科学家还是逃兵？”"
 agassiz.628.g: "他们想休息多久就休息多久。"
 agassiz.628.h: "就休息一会，不能更多了。"
 agassiz.628.i: "这些没用的助手是来工作的！不是坐着躺着睡觉的！"
 agassiz.629.t: "地狱"
 agassiz.629.d: "[SCOPE.sState('agassiz_volcano_state').GetName]的火山活动已经变得越来越活跃了。不管是突然喷出的黑烟，还是似乎在增加的熔岩流都说明探险队现在陷入了困境。队员们是应该谨慎行事，冒着被熔岩困住的风险，还是应该迅速反应，但可能面临未知的危险？"
 agassiz.629.f: "“火焰的气息如同炮弹般猛然袭向城市和海岸，灼热的灰烬扑面而来，刺痛了我们的肌肤。空气中弥漫着火焰。我们不由自主地抬起双手保护脸部。当我看到岸边那些遇难者的遗体时，也注意到了他们生前做出的相同姿势。”——菲茨-詹姆士伯爵"
 agassiz.629.g: "谨慎行事。"
 agassiz.629.h: "赌一把。"
 agassiz.630.t: "人间地狱"
 agassiz.630.d: "[SCOPE.sState('agassiz_volcano_state').GetName]火山上似乎一切都已失控。熔岩喷泉冲天而起，炽热的力量在火流中激烈交锋。对于大多数考察队成员来说，这是一个极具威胁的事件，然而，只有[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士无法摆脱那种狂热的迷恋。"
 agassiz.630.f: "“夜晚降临时，火焰的景象更加美丽。我们被炽热的红色火流和火瀑布包围；在这之间，巨大的岩块从升入空中的沥青烟柱中喷出，又坠落下来，这些岩块因极高的温度而发出白光，留下辉煌的蒸汽轨迹。”\n——乔治·戈登·拜伦"
 agassiz.630.g: "多么壮丽的景象，我们得拍张照！"
 agassiz.630.h: "别怕。"
 agassiz.630.i: "快撤！"
 agassiz.631.t: "相当活跃的火山"
 agassiz.631.d: "显然，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士正在研究的这座火山比想象的要更加活跃，下一次喷发即将到来。考察队处境已然十分危险，但是，越危险的环境下，所获得的科学知识也就越珍贵……"
 agassiz.631.f: "“人们直到岩浆吞噬他们才会相信火山的危险。”\n——乔治·桑塔亚那"
 agassiz.631.g: "更多知识！"
 agassiz.631.h: "增加经验！"
 agassiz.631.i: "矿物多弄一点！"
 agassiz.632.t: "新闻报道"
 agassiz.632.d: "该地区的领先报纸之一#YELLOW 《[SCOPE.sState('manzoni_publisher_state').GetNameNoFormatting]纪事报》#!目前通过报道火山探险来吸引读者的关注。一个小众的科学领域因此吸引了更广泛的公众兴趣。尤其是男孩和年轻人，对这些充满冒险的故事格外着迷。"
 agassiz.632.f: "“阅读最新一期内容：[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastNameNoFormatting]博士的大胆火山口攀登！勇敢的科学家们面对熔岩、有毒烟雾和炽热高温的挑战。在古人认为是通往冥界入口的边缘，人类再次跨越了一道界限。我们的记者将继续以插图记录这段旅程。别忘了，星期四是《纪事报》日！”"
 agassiz.632.g: "这将激励新一代人！"
 agassiz.633.t: "安全的扎营地"
 agassiz.633.d: "考察队在硫磺烟雾、黑烟和熔岩流之间找到了一处安全的休息地点。"
 agassiz.633.f: "“亲爱的沙贝尔纳克教授：\n\n感谢您对理想火山中水的动态发展提供的见解，但我将在稍后更加详细地表达我的异议。然而，我必须指出，在与萨尔斯派克博士的通信中，我得知您在大学里散布了我们在火山上玩乐的可耻谣言。我希望您停止这种毫无根据的假设。我要澄清的是，我最近测得的[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastNameNoFormatting]温泉最高温度仅为32°C，而非您所声称的35°C。因此，这些温泉实际上是冰冷的。请纠正这一恶劣的误传！”"
 agassiz.633.g: "歇一会！"
 agassiz_volcano_tourist_modifier: "火山旅游业"
 agassiz_small_volcano_eruption_modifier: "小型火山喷发"
 agassiz_medium_volcano_eruption_modifier: "火山喷发"
 agassiz_big_volcano_eruption_modifier: "大型火山喷发"
 agassiz_medium_earthquake_modifier: "地震"
 agassiz_big_earthquake_modifier: "大地震"
 agassiz.711.t: "壮观的火山"
 agassiz.711.d: "[SCOPE.sState('agassiz_volcano_state').GetName]的居民正在欣赏这一壮观的奇景：火山正喷涌出滚烫的岩浆，照亮了大半个夜空。看客中不乏学者和游客。"
 agassiz.711.f: "“火山的宗主呀！埃德那当着你黯然无光，\n扑不灭的黑克拉也不敢继续猖狂；\n维苏威高高的火焰，自从有了你，\n游客们看来只觉得平淡无奇；”\n\n——拜伦勋爵"
 agassiz.711.g: "美极了！"
 agassiz.712.t: "小型火山喷发"
 agassiz.712.d: "[SCOPE.sState('agassiz_volcano_state').GetName]的火山喷发了，几个小型村庄被摧毁了，大地上铺满了岩浆，但好在这次规模较小。"
 agassiz.712.f: "“我目睹的景象令人窒息！无数火舌照亮四周，烈焰在树梢上跃动。突然，一声巨响传来，眼前瞬间化作一片火海。大海早已消失，一切都被灰烬吞没。我甚至看不清眼前的手掌。最后映入眼帘的是灰烬如喷泉般从地面缝隙中涌出的诡异景象。一股巨大的压力将我掀翻在地。紧接着，仿佛空气瞬间被抽离，我感到呼吸困难，濒临窒息。”\n——约翰娜·贝耶林克"
 agassiz.712.f_basic: "\n\n#YELLOW 多亏了火山观测站的科学家们，这场灾难并未完全出乎我们的意料。因此，我们能够采取预防措施，#G 并在一定程度上减少了破坏#!。#!"
 agassiz.712.f_advanced: "\n\n#YELLOW 多亏了火山观测站的优秀科学家，我们得以及时启动疏散和防护措施，#G 大大减少了灾难的破坏#!。#!"
 agassiz.712.g: "只是一点岩浆而已。"
 agassiz.712.h: "观测站有什么新消息？"
 agassiz.712.i: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士及其学生可能会觉得这很有趣。"
 agassiz.713.t: "火山喷发"
 agassiz.713.d: "一场剧烈的火山喷发震动了[SCOPE.sState('agassiz_volcano_state').GetName]。火山碎屑和火山灰摧毁了建筑物和农作物，并夺去了部分民众的生命。"
 agassiz.713.f: "“我们听到头顶上方和岛屿周围传来一种奇怪的声音，仿佛巨大的火焰在燃烧，或是重型火炮每隔一两秒发射一次。到了五点，轰鸣声依旧持续，天空变得漆黑，一场浮石雨降临在我们身上，许多碎块体积相当大，还带着温热。\n\n\n那一晚，持续降落的火山灰使四周一片漆黑，天空和岛屿周围不断闪烁的闪电打破了黑暗。”\n——沃森船长"
 agassiz.713.g: "这些可怜人啊。"
 agassiz.713.j: "让我们尽可能帮助灾民吧。"
 agassiz.714.t: "大型火山喷发"
 agassiz.714.d: "一场史无前例的火山喷发夺去了[SCOPE.sState('agassiz_volcano_state').GetName]的许多生命。爆炸声在数百英里外都能听到，任何不幸靠近火山的事物都瞬间被摧毁。"
 agassiz.714.f: "“你能听到女人绝望的尖叫、婴儿无助的啼哭和男人凄厉的呼喊；有些人绝望地呼唤父母，另一些人在绝望中呼唤失散的孩子或妻子，声音在混乱中变得愈发模糊。人们在恐惧中为自己或亲人的命运悲号，那些无法承受恐惧的人甚至祈求死亡能快点降临。许多人向诸神徒然祈求，然而更多的人却绝望地相信，诸神早已抛弃了他们，整个宇宙被无尽的黑暗吞噬，再也看不到一丝光明。”\n——小普林尼"
 agassiz.714.g: "一场悲剧！"
 agassiz.715.t: "烟腾如龙，声隆若雷"
 agassiz.715.d: "[SCOPE.sState('agassiz_volcano_state').GetName]火山震动，烟腾于口。事止于此，居民稍安，游人及学者皆失望。"
 agassiz.715.f: "“所察繁多，而所享寡少，诚为一座糟秽阴郁之火山也！”"
 agassiz.715.g: "其觉乎，抑仍睡也？"
 agassiz.721.t: "地震波"
 agassiz.721.d: "今天早晨，一次轻微的地震扰醒了[SCOPE.sState('agassiz_earthquake_state').GetName]的居民。虽然这场小地震只造成的损害不大，却引起了地震学家的兴趣。"
 agassiz.721.f: "采访者：“如果你所在的建筑物开始晃动并且你知道已经开始地震了，你会怎么做？”\n查尔斯·弗朗西斯·里克特：“我会走——而不是跑——到最近的地震记录仪旁边去。”"
 agassiz.721.g: "有趣。"
 agassiz.722.t: "[SCOPE.sState('agassiz_earthquake_state').GetName]地震"
 agassiz.722.d: "地震袭击了[SCOPE.sState('agassiz_earthquake_state').GetName]，建筑被摧毁，人民受伤甚至丧命。"
 agassiz.722.f: "“传来一声深沉而可怕的隆隆声，接着我真的看见它沿着华盛顿街席卷而来。整条街在起伏，如同波涛汹涌的海浪向我涌来。”\n——杰西·库克"
 agassiz.722.f_basic: "\n\n#YELLOW 多亏了训练有素的地震学家，人们早已知道[SCOPE.sState('agassiz_earthquake_state').GetName]是一个地震多发地区。由于采取了预防措施，例如在建筑设计方面，损失得以轻松降到最低。#!"
 agassiz.722.g: "一场悲剧！"
 agassiz.722.h: "观测台的评估结果如何？"
 agassiz.722.i: "地质研究的完美领域。"
 agassiz.722.j: "让我们尽可能帮助灾民吧。"
 agassiz.723.t: "[SCOPE.sState('agassiz_earthquake_state').GetName]大地震"
 agassiz.723.d: "[SCOPE.sState('agassiz_earthquake_state').GetName]已经被一场前所未有的大地震夷为废墟。不计其数的建筑被摧毁，不计其数的生命被夺走。"
 agassiz.723.f: "“旧金山不复存在了！除了记忆和城市边缘的一些建筑，整个旧金山已化成了灰烬。它的工业区被夷为平地，商业和住宅区也只剩下断垣残壁。无论商业大楼、博物馆、饭店还是豪华别墅，都被地震和大火无情地吞噬掉了。”\n——杰克·伦敦"
