 agassiz.812.t: "新的最高峰？"
 agassiz.812.d: "数十年来，道拉吉里峰一直是大家所测得的最高峰，但[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]对此抱有怀疑。在几个月的测量与计算后，世界之巅的新任候选已经浮出草纸了：干城章嘉峰。"
 agassiz.812.f: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士的测量仪器虽饱经风霜，但数据确凿无疑：这座位于锡金-尼泊尔边境、海拔逾8534.4m的险峰，已刷新所有历史记录。其对地理学、制图学及民族自豪感的影响堪称深远。"
 agassiz.812.g: "这些山就没个简单名字吗？"
 agassiz.812.tt: "#V 干城章嘉峰#!现在是世界之巅。"
 agassiz.813.t: "众山之王"
 agassiz.813.d: "一切始于孟加拉山巅上几个静默的身影，他们将黄铜仪器对准苍穹。其中便有[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]，其测算证实了不可思议的事实：那座无名的偏远山峰——十五号峰——超越了所有已测量的高度。"
 agassiz.813.f: "这一宣布引发学界震动。8839.2米的高度——让干城章嘉峰和道拉吉里峰在这座喜马拉雅巨人身前显得相形见绌。虽仍无名号，学者们已开始称其为“世界屋脊”。"
 agassiz.813.g: "干脆用某个无人记得的英国测量员名字命名算了！"
 agassiz.813.tt: "#V 珠穆朗玛峰#!现在是世界之巅。"
