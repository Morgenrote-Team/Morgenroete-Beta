 agassiz.801.t: "测震仪"
 agassiz.801.d: "今日[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName]与[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName]推出了新的记录地震活动的仪器——测震仪，这将是我们研究地震的第一步。"
 agassiz.801.f: "1839年，苏格兰科姆里附近发生了一系列地震，英国成立了一个委员会，以研制更好的地震检测装置。最终，詹姆斯·大卫·福布斯设计了一种倒摆测震仪，该仪器首次在大卫·米尔恩‑霍姆1842年的报告中展示。这种测震仪通过在倒摆上方放置铅笔来记录地震活动。然而，根据米尔恩的报告，这一设计未能证明其有效性。米尔恩在1841年创造了“测震仪”一词来描述这一仪器。"
 agassiz.801.g: "我们的学者肯定用得上这个。"
 agassiz.801.h: "科学发展将因此受益。"
 agassiz.802.t: "地震记录仪"
 agassiz.802.d: "今日[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName]与[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName]推出了新的记录地震活动的仪器——相较之间的测震仪来说，简直是大升级。可以更好地检测震区并作出更精确的预测。"
 agassiz.802.f: "最早的地震仪发明于19世纪70至80年代。第一台地震仪由菲利普·切奇在约1875年制造。然而，由于灵敏度不够高，这台仪器直到1887年才产生第一张地震图，而此时约翰·米尔恩已经在日本展示了他的设计。1880年，约翰·米尔恩、詹姆斯·阿尔弗雷德·尤因和托马斯·格雷组成的团队开发了第一台水平摆式地震仪。这三位科学家在1880年至1895年期间担任日本的外国政府顾问。米尔恩、尤因和格雷都是在此前五年内受明治政府雇佣，以协助日本现代化进程。1880年2月22日，横滨发生地震。为应对这次地震，他们共同创立了日本地震学会。"
 agassiz.802.g: "地质学研究将因此受益。"
 je_agassiz_seismometer: "测震仪"
 je_agassiz_seismometer_reason: "测震仪是地动仪的进一步发展。尽管它仍然是一个能力有限的设备——只能检测地震，但至少可以作为记录地震发生的手段。\n\n如果你同时拥有[concept_tesla_engineer]和[concept_agassiz_geologist]，进度将增加。"
 je_agassiz_seismometer_goal: "地质学家和工程师将一起工作[JournalEntry.GetTotalGoalValue|V0]周来建造新设备。"
 je_agassiz_seismograph: "地震记录仪"
 je_agassiz_seismograph_reason: "在测震仪上安装地震记录仪极大地改进了地震和地面震动的记录方式。更现代化的地震学将因此成为可能。地动仪会触发设备开始记录，然后记录表面会自动生成震动的图形表示（地震图）。\n\n如果你同时拥有[concept_tesla_engineer]和[concept_agassiz_geologist]，进度将增加。"
