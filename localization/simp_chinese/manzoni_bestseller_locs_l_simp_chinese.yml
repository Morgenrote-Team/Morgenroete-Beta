 manzoni_writer_science_fiction_book_bestseller_flavor_1_loc: "《星际探索餐厅》讲述了一艘可以遨游星际的小船及其神奇的船长和船员，他们在人迹罕至的地方面临着难以想象的挑战。他们在星光和奇妙的未来导航设备的指引下，在黑暗的太空中航行了很远的距离。他们探索遥远的星球，既奇妙又危险——既美丽得令人着迷，又危险得令人难以置信。"
