 manzoni_writer_mystery_book_bestseller_title_12_loc: "《无魂海员的寂静棚屋》"
 manzoni_writer_mystery_book_bestseller_flavor_12_loc: "埃利亚斯·厄普顿船长站在甲板上，眉头紧皱，全神贯注地凝视着地平线。四周唯有寂静，只有微弱的海浪拍打声，他的船员们慌乱地走来走去，脸上写满了恐惧，他们试图阻止那些来客。\n\n在加勒比海深处，古老传说和诅咒都指向一个不寒而栗的故事——寂静棚屋，一首引诱人失踪的歌谣。\n\n随着厄普顿船长深入黑暗，他发现了一些秘密，这些秘密有可能揭开真相。每接近真相一步，他都有可能陷入与前人相同的命运。在这里，生与死的界限变得模糊，只有最勇敢的人敢于直面波涛之下的黑暗。"
