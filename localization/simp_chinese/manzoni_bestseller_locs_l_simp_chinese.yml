 manzoni_writer_crime_book_bestseller_title_1_loc: "《疯狂厨师案》"
 manzoni_writer_crime_book_bestseller_flavor_1_loc: "危机四伏的公海上，随船厨师在厨房里称王称霸。但当连环失踪事件在船员中引起轩然大波时，怀疑的矛头指向了将生杀大权握在之人。\n\n“你做的鸡肉干到让我想喝海水”，船员边说边转过身去，不知道自己的命运已经在此刻注定。厨师的声音充满了恶意，他磨着菜刀回答说：“哦，别害怕，好先生。明天早上你将品尝到国王才能享用的美食。”\n\n在《疯狂厨师案》这部惊心动魄的海上谋杀故事中，与我们无畏的厨师一起，烹饪出一场欺骗与背叛的风暴。"
