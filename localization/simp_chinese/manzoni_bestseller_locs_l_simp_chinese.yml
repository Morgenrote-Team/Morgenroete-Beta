 manzoni_writer_crime_book_bestseller_title_6_loc: "《布莱克伍德失踪之谜》"
 manzoni_writer_crime_book_bestseller_flavor_6_loc: "煤气灯照亮的布莱克伍德小巷中，一连串莫名其妙的失踪事件在社区内引发了震动。潜入这个令人不寒而栗的谜团深处，一切并不像表面看起来那样，真相隐藏在阴影之中。"
