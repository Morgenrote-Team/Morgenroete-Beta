 manzoni_bestseller_doyle_arthur_conan_1_t: "《血字的研究》——[ROOT.GetCharacter.GetFullName]著"
 manzoni_bestseller_doyle_arthur_conan_1_d: "一个侦探通过运用逻辑和他的头脑来破案。夏洛克·福尔摩斯是一个迷人的角色。亚瑟·柯南道尔想出了一个多么有趣的东西。"
 manzoni_bestseller_doyle_arthur_conan_1_f: "“知道这一点比解释我为什么知道要容易。如果让你证明二加二等于四，你可能会觉得有些困难，但你对这个事实却很有把握。”\n——阿瑟·柯南·道尔《血字的研究》"