 manzoni_writer_crime_book_bestseller_title_12_loc: "《狂野西部的公路狂徒》"
 manzoni_writer_crime_book_bestseller_flavor_12_loc: "夕阳西下，狂野西部的崎岖地貌上，公路匪徒的朦胧身影从尘土中浮现，他们的名字在恐惧和敬仰中被低声传颂。在这本扣人心弦的书中，读者将与这些臭名昭著的亡命之徒并肩作战，亲身经历令人肾上腺素飙升的对决和大胆的逃亡，感受那个无法无天的时代。"
 manzoni_writer_crime_book_bestseller_title_13_loc: "《神秘的翡翠项链》"
 manzoni_writer_crime_book_bestseller_flavor_13_loc: ""
 manzoni_writer_crime_book_bestseller_title_14_loc: "《鸦片巷的乞丐之死》"
 manzoni_writer_crime_book_bestseller_flavor_14_loc: "从上流社会的豪宅到贫民窟，鸦片巷是一个罪恶与美德的大熔炉。《鸦片巷的乞丐之死》邀请读者深入这个肮脏的地下世界，在这里，面对绝望，是与非的界限变得模糊。准备好沉醉于这个扣人心弦的故事吧，它讲述了一个疯狂的世界中那些犯罪、同情和对正义的追寻。"
