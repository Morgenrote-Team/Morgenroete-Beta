 manzoni_writer_crime_book_bestseller_flavor_7_loc: ""
 manzoni_writer_crime_book_bestseller_title_8_loc: "《贝尼苏韦夫集市上的恶棍强盗》"
 manzoni_writer_crime_book_bestseller_flavor_8_loc: "在布支杜尔尘土飞扬的街道上，烈日无情地炙烤着大地，商人的叫卖声在拥挤的集市上回荡，一群被遗弃的人正在努力开创自己的命运。他们是富裕酋长的弃子，被放逐出先祖世代居住的土地，在无情的沙漠中自生自灭，他们就是“布杰杜尔集市上的恶棍强盗”。\n\n在饥饿和背叛的驱使下，他们走上了犯罪的道路，在熙熙攘攘的集市上掠夺过往的商人。但是，随着他们胆子越来越大，野心越来越膨胀，他们意识到，他们的命运不仅仅是小偷小摸。他们因共同的血统和对抛弃自己的父亲的复仇欲望而团结起来，谋划着自己的崛起之路，发誓要夺回属于自己的一切。"
