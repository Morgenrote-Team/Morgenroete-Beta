 manzoni_writer_mystery_book_bestseller_title_2_loc: "《绯红匕首》"
 manzoni_writer_mystery_book_bestseller_flavor_2_loc: "在月夜的阴影中，一抹深红色的光芒划破黑暗——那是恐怖和绝望的预兆。“绯红匕首”低声发出呼唤，引诱毫无戒备的灵魂投入它致命的怀抱。这把被诅咒的匕首在古代巫术的火焰中锻造而成，它渴求鲜血，邪恶的力量腐蚀着那些敢于挥舞它的人的心灵。在这个令人不寒而栗的超自然恐怖故事和权力的黑暗诱惑中，你将进入疯狂和痴迷的深渊。"
