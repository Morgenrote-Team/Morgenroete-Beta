 manzoni_writer_literary_fiction_book_bestseller_title_1_loc: "《济贫院的贵族》"
 manzoni_writer_literary_fiction_book_bestseller_flavor_1_loc: "这书描述一个贵族家族的衰落史，他们铁腕统治，实行严格的恐怖统治，大肆征税，凡不从者皆受酷刑，除了他们之外，没有人能够获得财富或幸福。他们的暴政导致大公国从繁荣富强的过去变成了一个饥饿且荒废的国度。\n\n然而，这个贵族家族要求更多，引起了人民的反，最终引发了一场血腥的革命，随后建立的新政府抓获了曾经的贵族成员。\n\n随后关于如何处置他们，人们发生了分歧。一些人希望立即将他们斩首，另一些人则认为判刑即可。\n\n激烈讨论后，人们选择了一个恐怖的济贫院，让这些曾经的权贵在那里度过余生。"
