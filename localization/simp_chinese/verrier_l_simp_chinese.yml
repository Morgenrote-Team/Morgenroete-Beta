 verrier_astronomer: "天文学家"
 verrier_astronomer_desc: "这位科学家研究星空现象，并通过望远镜不知疲倦地观测天体。"
 verrier_astronomer_experienced: "经验丰富的天文学家"
 verrier_astronomer_experienced_desc: "该角色在天文学方面取得了一些非凡的发现，因此受到公众推崇。"
 verrier_astronomer_famous: "著名天文学家"
 verrier_astronomer_famous_desc: "由于他的众多发现以及对认识宇宙的贡献，这位天文学家被视作当代最受尊敬的思想家之一。"
 verrier_mathematician: "数学家"
 verrier_mathematician_desc: "该角色曾在数学上有过非凡的发现，因此受到公众的推崇。"
 verrier_physics_tech: "古典物理学"
 verrier_physics_tech_desc: "当近代早期的欧洲人使用实验证据来检视物理定律、采用数学语言来表述物理定律。物理学逐渐发展进步，成为一门独立学科。尼古拉·哥白尼打响了科学革命的第一枪，他于1543年提出了描述太阳系统的日心说，这理论推翻了托勒密的地心说。在1609年与1619年期间，约翰内斯·开普勒发表了主导行星运动的定律，他用数学方程准确估算出从天文观测获得的行星绕着太阳的公转数据，从而给予日心说强而有力的理论支持。伽利略·伽利莱做实验研究物体运动，发现落体定律，并且展示出实验方法对于科学研究的重要性。他倚赖使用实验或观测所获得的证据，而不是倚靠纯粹推理，来证实任何假说的正确性。他强调使用数学来描述物理现象，大自然的语言是数学，假若不懂数学，则无法明白大自然。1687年，艾萨克·牛顿提出的牛顿运动定律和万有引力定律为经典物理学奠定了稳固的基础。"
 verrier_astronomy_tech: "现代天文学"
 verrier_astronomy_tech_desc: "18至19世纪，莱昂哈德·欧拉、亚历克西斯·克劳德·克莱罗、让·勒朗·达朗贝尔通过研究三体问题，对月球和行星的运行做出了更准确的预测。约瑟夫‑路易斯·拉格朗日和皮埃尔·西蒙·拉普拉斯进一步改进了这项工作，使人们通过行星和卫星的扰动计算质量成为可能。"
 verrier_electromagnetism_tech: "电磁学"
 verrier_electromagnetism_tech_desc: "1600年英国医生威廉·吉尔伯特发表了《论磁、磁饱和地球作为一个巨大的磁体》。他总结了前人对磁的研究，周密地讨论了地磁的性质，记载了大量实验，使磁学从经验转变为科学。书中他也记载了电学方面的研究。然而真正对电磁现象的系统研究则要等到十七世纪以后，并且静电学的研究要晚于静磁学，这是由于难以找到一个能产生稳定静电场的方法，这种情况一直到1660年摩擦起电机发明后才开始改变。十八世纪以前，人们一直采用这类摩擦起电机来产生研究静电场，代表人物如本杰明·富兰克林，人们在这一时期主要了解到了静电力的同性相斥、异性相吸的特性、静电感应现象以及电荷守恒原理。"
 verrier_chemistry_tech_desc: "19世纪初，得益于亚历山大·伏打发明的伏打电池，约恩斯·雅各布·贝采利乌斯和汉弗里·戴维的工作推动了电化学理论的发展。英国的威廉·普洛特最早提出按原子量对所有元素进行排序，因为所有的原子的质量都是氢的原子质量的整数倍。约翰·亚历山大·雷纳·纽兰兹发明了早期的元素周期表，后来演变成了现代的元素周期表。"
 je_verrier_neptune: "未知的行星"
 je_verrier_neptune_reason: "1821年，亚历克西·布瓦尔出版了天王星轨道的天文表，根据牛顿的运动和引力定律预测了未来的位置。随后的观测结果显示与表中的数据有很大的偏差，布瓦尔遂假设在天王星周围存在其他天体造成引力摄动。这些黄经与向径（即到太阳的距离）的偏差，有以下三种解释：太阳的万有引力在这种距离下可能有不符合牛顿定律的行为；观测带来的偏差；又或者天王星的运动受到了另一颗未知行星的影响。约翰·柯西·亚当斯还在大学时就了解到了布瓦尔的发现，并对摄动理论深信不疑。他坚信，利用观测到的天王星数据以及牛顿的万有引力定律，终能推导出那颗神秘天体的质量、位置与轨道。同一时期的1845年11月10日，于尔班·勒威耶向法国科学院提交了一份关于天王星的研究报告，表明先前的理论无法解释其运动问题。在对亚当斯工作毫不知情的情况下，勒维耶进行了与之相似的研究，并在1846年7月1日向科学院的公开会议提交了第二份论文，仅给出了未知天体的位置，与其被发现的位置仅仅相差一度。此时勒维耶还没有意识到他的工作与亚当斯研究的相互印证已经引起了不列颠学界寻找该天体的热潮。在8月3日，勒维耶提交了第三份论文，给出了这个新天体的质量及轨道。现在，仅需要定位这个天体并证明其存在就行了。"
 je_verrier_neptune_fail: "拥有第二多天文观测成果的国家将获得一项安慰性奖励，其余各国的付出则将归于徒劳。"
 je_verrier_pluto: "X行星"
 je_verrier_pluto_reason: "1840年代于尔班·勒维耶通过经典力学分析天王星轨道的摄动后预测海王星的位置。十九世纪末天文学家根据对海王星的观察推测有其他行星摄动天王星轨道。1894年富有的波士顿人帕西瓦尔·罗威尔创立了罗威尔天文台；1906年罗威尔开始搜索可能存在的第九大行星——X行星。1909年罗威尔和威廉·亨利·皮克林提出若干该天体可能处于的天球坐标。此项搜索一直持续到1916年罗威尔逝世为止，但是没有任何成果。1915年3月19日的巡天已拍摄到两张带有模糊的冥王星图像的照片，但是这些图像并没有被正确辨认出来。罗威尔的遗孀康斯坦斯·罗威尔为取得其夫遗产与天文台展开十年诉讼，对X行星的搜索由此直至1929年才恢复。时任天文台主管维斯托·斯里弗在看到克莱德·汤博的天文绘图样品后将搜索X行星的任务交与汤博。汤博的任务是系统地成对拍摄夜空照片、分析每对照片中位置变化的天体。汤博借助闪烁比对器快速调换感光干板搜索天体的位置变化或外观变化。1930年2月18日汤博在经历近一年的搜索后，在当年1月23日与1月29日拍摄的照片中发现一可能移动的天体。1月21日的一张品质不佳的照片确认该天体的运动。"
 je_verrier_pluto_fail: "如果另一个国家满足了所有要求，抢在我们之前发现了行星X，我们所有的努力都将付之东流。"
 je_verrier_charter_moon: "测绘月亮"
 je_verrier_charter_moon_reason: "月面学是研究月球表面和物理特征的学科（也称为月球地理学或月球测量学）。与地理学和地形学一样，月面学是行星科学领域的一个子学科。历史上，月面学家的主要关注点是绘制和命名月球地形，识别海、陨石坑、山脉和其他各种特征。月球测绘在1779年约翰·施罗特开始对月球地形进行精密观测和测量时变得系统化。1834年，约翰·海因里希·冯·梅德勒出版了第一张由四张地图组成的大型月球地图，随后出版了《月球地形学总论》。所有的月球测量都是基于直接观察的，直到1840年3月，J·W·德拉珀使用5英寸的反射望远镜拍摄了月球的银板照片，从而将摄影引入了天文学。起初，这些图像的质量非常差，但就像200年前的望远镜一样，它们的质量迅速提高。到1890年，月球摄影已经成为天文学的一个受认可的子学科。"
 je_verrier_charter_moon_success: "收集#G 10张#!@verrier_moon_photo!#T 月球照片#!之后，我们应该能够绘制月球地图。"
