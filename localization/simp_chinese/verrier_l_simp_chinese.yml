 verrier.142.t: "太阳耀斑"
 verrier.142.d: "在观测太阳耀斑时，[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName]注意到一个不寻常的现象。如果他的理论正确，那么一场太阳风暴正冲向地球。一方面来说，这是科学界的极大突破。但是，这可能十分危险。"
 verrier.142.f: "太阳耀斑是太阳活动的重要表现，是太阳上最剧烈的活动现象之一，是太阳表面局部区域突然和大规模的能量释放过程，引起局部区域瞬时加热，向外发射各种电磁辐射，并伴随粒子辐射突然增强，所辐射出的光的波长横跨整个电磁波谱。"
 verrier.142.g: "教授，这意味着什么？"
 verrier.143.t: "[SCOPE.sCharacter('verrier_carrington_discoverer').GetLastName]事件"
 verrier.143.d: "一场磁暴袭击了地球！这一独特的自然事件导致即使在罗马、哈瓦那和中国也能看到极光。人们对这一奇观惊叹不已。显然，这与天文学家[SCOPE.sCharacter('verrier_carrington_discoverer').GetFullName]发现的太阳耀斑有关。"
 verrier.143.f: "在19世纪末的那个充满探索的时代，天文学家理查德·卡林顿记录下了一系列壮观的太阳耀斑活动，这些活动发生在1859年8月28日至9月4日之间。从日冕物质抛射中释放出的物质以超过2000公里/秒的惊人速度穿梭太空，仅用17.5小时便抵达了地球。9月1日至2日之夜，地球经历了有史以来最强烈的地磁暴。在这个夜晚，无论是北半球还是南半球，人们都能见证到那令人叹为观止的极光。在美国落基山脉，极光的光辉如此耀眼，以至于金矿工人们被其唤醒，误以为破晓已至，开始准备早餐。而在美国东北部，居民们甚至能够借助极光的照明阅读报纸。这幅天然的光影画卷不仅在极地展开，更在低纬度地区如墨西哥中南部、古巴、夏威夷、昆士兰、日本南部和中国展露风采，甚至在哥伦比亚这样接近赤道的地方，极光的奇景也同样可见。"
 verrier.143.g: "这真是既可怕又神奇。"
 verrier.144.t: "电报系统崩溃"
 verrier.144.d: "在那个电报线路横贯大陆的年代，一场太阳风暴引发的地磁暴对电磁场产生了深远的影响。这股地磁感应电流导致欧洲和北美的电报系统纷纷陷入瘫痪，有时甚至让操作员遭受电击。电报线路中感应出的高电压之强，足以让接收器中的纸条在火花中燃起熊熊火焰。"
 verrier.144.f: "波士顿接线员（向波特兰接线员）：“请暂停你的电源供应十五分钟。”\n波特兰接线员：“收到。电源现已断开。”\n波士顿接线员：“我的电源也已切断。我们正在尝试利用极光电流进行操作。我的信号接收效果如何？”\n波特兰接线员：“比使用电池时要清晰。”\n波士顿接线员：“有时我的电流非常强劲，不用电池反而效果更佳。极光似乎在增强与抵消电池效果间交替变化，导致电流时强时弱，影响继电器的工作。我们在这种情况下不妨试着不依赖电池。”\n波特兰接线员：“好的。那我现在开始传输业务信息吗？”\n波士顿接线员：“可以，继续吧。”"
 verrier.144.g: "没电还想发电报？简直是白日做梦！"
 verrier.9010.t: "科学之声"
 verrier.9010.d: "一位[SCOPE.sState('sound_of_science_state').GetCityHubName]大学的教授已经证实了#variable 克里斯蒂安·多普勒#!理论——观测发现，声波和光波的频率会随着波源或观测者的移动而变化。"
 verrier.9010.f: "一列疾驰的火车、一声响亮的铜管号角和十几对耳朵在#bold #variable [SCOPE.sState('sound_of_science_state').GetFarmHubName]至[SCOPE.sState('sound_of_science_state').GetCityHubName]#!#!铁路上，进行一场充满想象力的实验。是多普勒的恒星运动理论的验证！如果“波的频率随物体的速度而变化”的理论是正确的，那么当火车驶过观众席时，应该能观察到高音喇叭的音调明显下降。\n\n在座的观众们都是精挑细选出来的绝对音准之人，1/8差异都可以听出来，他们会在火车驶过时仔细记录下自己的观察结果。经过3天的统计，结果出来了……记录显示音调一致下降！"
 verrier.9010.g: "观察与实验是知识的基础。"
 verrier.9010.h: "人们永远不会知道新的知识会怎么发挥作用。"
 verrier_sound_of_science_prestige_modifier: "科学之声"
 verrier_sound_of_science_tech_spread_modifier: "科学之声"
 je_verrier_uranus: "另一颗行星？"
 je_verrier_uranus_reason: "在浩瀚无垠的宇宙中，是否还潜藏着未被发现的星球？自古以来，人类只认识六颗行星，它们因明亮的光芒，即便不借助望远镜也能被肉眼所见。然而，随着望远镜技术的飞速发展，我们有理由相信，第七颗行星的发现指日可待。何止七颗？宇宙的奥秘可能远超我们的想象，更多的行星正等待着我们去探索。每一次新行星的发现，都是我们解开宇宙之谜的关键一步。\n\n#b 历史背景：#!六大行星由于它们璀璨夺目，历来为人所知。而天王星、海王星和冥王星则不同，它们的光芒黯淡许多，不易被察觉。尽管在特定条件下，天王星亦可被肉眼捕捉，但其缓慢的运行速度曾让众多天文学家误以为它是一颗静止的恒星。"
 je_verrier_uranus_goal: "为了找到新行星，我们需要发现[JournalEntry.GetTotalGoalValue|0+]@verrier_astronomicalobject![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]"
 je_verrier_uranus_fail: "如果其他国家先于我们达到要求，他们可能会发现一个新的行星，或者意识到只有六个行星。"
 verrier.12.t: "一颗新行星！"
 verrier.12.d: "谁也没想到[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]发现了一颗未知的行星，现在被称为天王星！"
 verrier.12.f: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]最初以为发现了一颗新彗星。几周后，人们才发现这其实是一颗新的行星！但现在天王星被发现了，很多人就会问，会不会有更多的行星呢？\n\n#b 历史背景：#!直到1781年，威廉·赫歇尔偶然发现了天王星。起初，他以为这是一颗彗星，然而，在接下来的3个月里，科学界才意识到这是一颗新行星。"
 verrier.12.g: "不知道还有多少星球未发现？"
 verrier.13.d: "不可思议！一位来自[SCOPE.sCountry('verrier_uranus_discoverer_country').GetName]的天文学家发现了一颗名为天王星的新行星，也许我们还能找到更多！"
 verrier.13.g: "也许还有更多等待我们去发现！"
 verrier_uranus_discoverer_modifier: "天王星的发现者"
 je_verrier_dwarf_planets: "天空警察"
 je_verrier_dwarf_planets_reason: "天王星被发现后，人们发现其他行星的存在可能性大大提升。由于在火星和木星之间的巨大区域没有行星，天文学家希望在那里找到另一颗行星。因此，他们成立了天空警察，由多个天文台合作寻找行星。\n\n#b 历史背景：#!天空警察于1800年在第二届欧洲天文学家大会上成立主要任务是搜寻火星与木星轨道之间可能存在的大行星，结果他们发现了许多后来被称为小行星的小天体。"
 je_verrier_dwarf_planets_goal: "为了找到新行星，我们需要发现[JournalEntry.GetGoalAddValue|0+]@verrier_astronomicalobject![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]。"
 verrier.14.t: "发现谷神星"
 verrier.14.d: "在火星和木星之间的区域发现了一颗未知行星——[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]。多么伟大的发现！"
 verrier.14.f: "#b 历史背景：#!天文学家们长久以来一直在火星与木星之间的空隙中寻找着另一颗可能存在的行星。为此，他们成立了“天空警察”组织，并将这片未知的太空区域划分，分配给世界各地的天文台逐一仔细搜寻。在1801年的新年之夜，朱塞佩·皮亚齐在翻阅星表时，意外发现了谷神星。这一意外的发现不仅证实了他们的预测，也在太阳系的家族中增添了一位新成员。谷神星的发现开启了对小行星带的探索之门，揭示了太阳系中一个迄今未知的天体类别的存在。"
 verrier.14.g: "不知道还有多少星球未发现？"
 verrier_ceres_discoverer_modifier: "谷神星的发现者"
 notification_verrier_ceres_discovered_notification_name: "发现谷神星"
 notification_verrier_ceres_discovered_notification_desc: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]博士在太阳系的火星和木星之间中发现了一颗新行星！"
 verrier.15.t: "发现智神星"
 verrier.15.d: "在火星和木星之间的区域发现了一颗未知行星——[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]。多么伟大的发现！"
 verrier.15.f: "#b 历史背景：#!当谷神星在火星和木星之间被发现时，没有人想到在同一区域会有另一颗行星。而海因里希·欧伯斯在寻找谷神星时发现了一颗新行星，这真是一个巨大的惊喜。智神星的发现促使天空警察开始在同一地区寻找其他行星，几年后，他们的搜寻工作取得了丰硕的成果。"
 verrier_pallas_discoverer_modifier: "智神星的发现者"
 notification_verrier_pallas_discovered_notification_name: "发现智神星"
 notification_verrier_pallas_discovered_notification_desc: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]博士在太阳系的火星和木星之间中发现了一颗新行星！"
 verrier.16.t: "发现灶神星"
 verrier.16.d: "在火星和木星之间的区域发现了一颗未知行星——[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]。多么伟大的发现！"
 verrier.16.f: "#b 历史背景：#!在谷神星被发现的一年后，海因里希·奥伯斯1802年发现了智神星。他提出了这两颗天体是被摧毁行星的残骸。他给英国天文学家威廉·赫歇尔送了一封信，建议在谷神星和智神星的轨道交会处附近搜索，可能会找到更多的碎片。奥伯斯在1802年开始他的搜寻，在1807年3月29日他在室女座发现了灶神星。"
 verrier_vesta_discoverer_modifier: "发现灶神星"
 notification_verrier_vesta_discovered_notification_name: "发现灶神星"
 notification_verrier_vesta_discovered_notification_desc: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]博士在太阳系的火星和木星之间中发现了一颗新行星！"
 verrier.17.t: "发现婚神星"
 verrier.17.d: "在火星和木星之间的区域发现了一颗未知行星——[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]。多么伟大的发现！"
 verrier.17.f: "#b 历史背景：#!奥伯斯在1802年开始他的搜寻，在1807年3月29日他在室女座发现了灶神星，这是一个巧合，因为谷神星、智神星和灶神星并不是更大天体的碎片。因为在1804年已经在现在称为主小行星带发现了第三颗小行星婚神星，因而灶神星成为发现的第四颗小行星。"
 verrier_juno_discoverer_modifier: "发现婚神星"
 notification_verrier_juno_discovered_notification_name: "发现婚神星"
 notification_verrier_juno_discovered_notification_desc: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]博士在太阳系的火星和木星之间中发现了一颗新行星！"
 je_verrier_neptune_goal: "未知行星的成功发现需要对星空进行详细的研究。新发现[JournalEntry.GetTotalGoalValue|0+]颗@verrier_astronomicalobject![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]后，我们就有可能揭开新行星的神秘面纱。"
 je_verrier_pluto_goal: "X行星的成功发现需要对星空进行详细的研究。新发现[JournalEntry.GetTotalGoalValue|0+]颗@verrier_astronomicalobject![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]后，我们就有可能揭开新行星的神秘面纱。"
 MR_ASTEROID_CONGRESS_DWARF_PLANETS_TT: "#default_text #V 谷神星#!、#V 智神星#!、#V 灶神星#!和#V 婚神星#!已被发现！#!"
 je_verrier_astro_physics: "天体物理学"
 je_verrier_astro_physics_reason: "新的物理发现已经彻底改变了科学界。天文学也未能幸免于此。这两个科学学科正在进行富有成效的交流，理论物理和观测物理都能为更好地理解宇宙做出贡献。"
 verrier_astro_physics_tech: "天体物理学"
 verrier_astro_physics_tech_desc: "天体物理学是一门采用物理学与化学方法和原理研究天体及天文现象时的科学。作为该学科的创始人之一，詹姆斯·基勒曾说过，天体物理学“试图确定天体的本质，而不是它们在空间中的位置或运动——它们是什么，而不是它们在哪里”。"
 verrier_modern_physics_tech: "现代物理学"
 verrier_modern_physics_tech_desc: "现代物理学，这一20世纪初孕育而生的科学分支，以其深邃的内涵和广阔的视野，开启了人类对自然界极端条件下奥秘的探索。它包含了量子力学、狭义相对论和广义相对论等重要分支，每一分支都如同一扇窗，透过它们我们得以窥见宇宙的深层次结构。"
 verrier_nuclear_physics_tech: "核物理学"
 verrier_nuclear_physics_tech_desc: "核物理学是探索原子核结构与行为的物理学分支。它专注于揭示核结构的奥秘，也就是原子核及其反应过程的具体构造。为了达到这一目的，科学家们会从理论和实验两个层面，研究诸如核的自发转变（即放射性）、核散射过程以及核反应等现象。核裂变与核聚变技术的发展，正是立足于核物理学的深入研究之上。"
 verrier_first_sun_photo_modifier: "第一张日食照片"
 verrier_helium_discovered_modifier: "太阳元素"
 verrier_comet_observer: "彗星观测者"
 verrier_comet_observer_desc: "这位天文学家发现了一颗以他的名字命名的大彗星。"
 verrier_magnetic_storm_observer: "磁暴观测者"
 verrier_magnetic_storm_observer_desc: "这位天文学家近距离观测并研究了太阳耀斑引发的磁暴。"
 verrier_solar_observer: "太阳观测者"
 verrier_solar_observer_desc: "这位天文学家观测了一次日食，获得了宝贵的知识。"
 verrier.152.t: "日食"
 verrier.152.d: "今年出现了一个罕见的现象，[ROOT.GetCountry.GetCapital.GetCityHubName]上出现了日全食。[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName]有机会近距离观察日全食。"
 verrier.152.f: "当我们抬头仰望星空，偶尔会目睹一幕壮观的天文剧——日食。在这一现象中，月球缓缓滑过太阳，将其光芒部分或全部遮挡，只有在新月之际，这样的景象才得以上演。日食不仅是一场视觉盛宴，更是科学探索的宝贵机会。特别是1919年5月29日的日全食，它在非洲普林西比岛上的观测，由亚瑟·斯坦利·爱丁顿领导的探险队完成，这次观测对于验证阿尔伯特·爱因斯坦几年前提出的相对论至关重要。相对论预言了远处恒星光线会因太阳的引力场而发生偏折，而1919年的日食观测，正是这一预言的实证。"
 verrier.152.g: "这种现象非常罕见！"
 verrier.153.t: "[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName]珠"
 verrier.153.d: "我们的天文学家[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName]，在上一次日食期间，有幸近距离观察了日冕和突出天体。这位科学家将这些天体归为太阳大气的一部分。"
 verrier.153.f: "当日全食或环食降临之时，天文奇观中的贝利珠效应、钻石环效应，以及极为罕见的双钻石环效应便会显现。这些现象虽源于同一自然奇观，却在日食过程中各自展现独特的风采。随着月球逐渐遮挡太阳，月球边缘的崎岖不平地形造就了一幕幕绚烂剧目：在某些地方，阳光透过月球的缝隙，如同散落的珍珠般闪烁；而在其他地方，则是一片宁静的暗影。这些效应得名于弗朗西斯·贝利，他在1836年对这一现象进行了详细解释。而当这些珍珠般的光点减至仅剩一两颗时，便呈现出钻石环效应——仿佛是在月影环绕的明亮光环中镶嵌着闪耀的“钻石”。"
 verrier.153.g: "这种现象应该以[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士的名字命名。"
 verrier.154.t: "第一张日食照片"
 verrier.154.d: "通过新的技术，[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士成功拍摄了第一张日食照片。"
 verrier.154.f: "在拍摄的黎明时期，捕捉如日全食这样的罕见天文事件，摄影师们需要面临着独特的挑战。其中最为显著的是日冕与月球阴影之间的极端对比度，以及摄影设备必须调整至非常规角度的要求。直到1851年7月28日的日食之前，人们还未能制作出曝光恰当的日冕照片。针对这一次的日食，柯尼斯堡的普鲁士皇家天文台特别委托了当地一位技艺高超的银版摄影师约翰·朱利叶斯·弗里德里希·贝尔科夫斯基，来捕捉这一天文奇观的静态画面。观测团队将一架小型六厘米折射望远镜与一架15.8厘米的弗朗和夫直径计相连，贝尔科夫斯基在日全食开始后不久进行了长达84秒的曝光，成功记录下了这一历史性的瞬间。"
 verrier.154.g: "完美！"
 verrier.155.t: "太阳元素"
 verrier.155.d: "[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士使用一种新技术，在上一次日食中取得了一项重大发现。他好像发现了一种新元素。起初没有人愿意相信他，但化学家[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士刚刚证实了这一发现。"
 verrier.155.f: "首个证明氦存在的证据是太阳色球的发射光谱中的一条亮黄色谱线。1868年8月18日，日全食之际，法国天文学家皮埃尔·让森在印度的观测中捕捉到了一道独特的黄色光谱线，其波长为587.49纳米，预示着一种新元素的诞生。当时，这一发现几乎被置疑，因为在地球之外发现新元素的先例尚未有之。然而，同年10月20日，英国天文学家诺曼·洛克耶确认了这一发现，并推断这条黄色光谱线源自一种未知元素。由于这条光谱线与钠的夫琅和费谱线非常接近，洛克耶将其命名为D3线，以区别于钠的D1和D2线。他与同事爱德华·弗兰克兰共同提议，将这个新元素命名为氦，源自希腊语\"helios\"，意即太阳，以纪念这一发现的新元素。"
 verrier.155.g: "氦？明明叫太阳元素更恰当！"
