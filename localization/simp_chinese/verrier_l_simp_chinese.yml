 verrier.55.t: "暗面"
 verrier.55.d: "我们的天文学家幸运凭借娴熟的技术，成功地拍摄到了一张月球天平动的照片！"
 verrier.55.f: "几乎没有人注意到月球并不是完全朝向地球的。月球轨道上的不规则现象足以让人窥见原本不为人知的月球远端，这些微妙的线索为我们揭开月球最神秘的面纱提供了宝贵的线索。要拍下这些可能永远无法看到的景象，需要要独自拿着相机坐上几个小时靠运气要靠技术才能拍下完美的照片。\n\n但如果做到就意味着可以看到地球遥远“伴侣” 的一部分，而这部分从古至今从未被人真正看到过。"
 verrier.55.g: "总有一天，我们会从后面看到整个月球。"
