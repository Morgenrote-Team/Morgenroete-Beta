 verrier.501.t: "他国抢先发现未知卫星"
 verrier.501.d: "他国天文学家比[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士先行一步……我们已经通过报纸得知了这一消息。"
 verrier.501.f: "“某种程度上，观察是一门需要学习和训练的艺术。”\n——威廉·赫歇尔"
 verrier.501.g: "令人失望。"
 verrier.511.t: "已发现火卫二"
 verrier.511.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]持续数月的搜寻有结果啦——[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]在火星的轨道上发现了一个先前未知的卫星，并命名其为——#YELLOW 火卫二#!。"
 verrier.511.f: "“1877年8月11日，我在刚入夜的时候继续进行观察，依然一无所获。然而，数小时后再次尝试时，我在火星北侧略偏后方的区域，捕捉到一个微弱的光点。由于当时河面雾气迅速弥漫，我仅有片刻时间记录下它的精确位置。此时已是11日凌晨两点半。接下来的数日间，云层密布，观察无法继续。直至8月16日，我再度在火星背面定位到该物体，并在当晚的观测中确认，它与火星同步移动。如果这是火星的卫星，那么当时它正处于一个接近最大伸长的位置。在此之前，我并未向天文台的任何同僚透露我正在搜寻火星的卫星，但在16日凌晨三点左右离开天文台时，我首次向我的助手乔治·安德森提及，我可能发现了一颗火星的卫星。”\n——阿萨夫·霍尔"
 verrier.511.g: "又一颗行星纳入囊中。"
 verrier.512.t: "已发现火卫一"
 verrier.512.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]持续数月的搜寻有结果啦——[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]在火星的轨道上发现了一个先前未知的卫星，并命名其为——#YELLOW 火卫一#!。"
 verrier.512.f: "“1877年8月17日凌晨一点至两点之间，当我正在整理观测数据时，纽康姆教授来到我的房间用午餐。我向他展示了关于火星附近那个暗天体的测量结果，这些结果表明该天体正与火星共同运动。在8月17日等待并观测外侧卫星时，我发现了内侧卫星。17日和18日的观测无疑证实了这些天体的性质，随后罗杰斯海军上将向公众宣布了这一发现。”\n——阿萨夫·霍尔"
 verrier.521.t: "已发现木卫五"
 verrier.521.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]持续数月的搜寻有结果啦——[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]在木星的轨道上发现了一个先前未知的卫星，并命名其为——#YELLOW 木卫五#!。"
 verrier.521.f: "阿玛尔忒亚（Amalthea）是由天文学家爱德华·E·巴纳德于1892年9月9日在加利福尼亚州汉密尔顿山的利克天文台，使用一台口径91厘米的望远镜发现的。当时，巴纳德正进行对木星卫星的系统性搜寻。这一发现是继伽利略于1610年发现木星的四大卫星之后，找到的第五颗木星卫星。最初，这颗卫星被系统地命名为“木卫五”。后来，法国天文学家卡米尔·弗拉马里翁提议将其命名为“阿玛尔忒亚”，这个名字在非正式场合中使用了数十年，最终被正式定名。"
 verrier.522.t: "已发现木卫六"
 verrier.522.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]持续数月的搜寻有结果啦——[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]在木星的轨道上发现了一个先前未知的卫星，并命名其为——#YELLOW 木卫六#!。"
 verrier.522.f: "木卫六是木星的一颗自然卫星。属于不规则卫星，也是其中最大的一颗不规则卫星，1904年12月3日，它在利克天文台被查尔斯·狄龙·珀赖因发现。该卫星以宙斯的情人之一女神希玛利亚（Himalia）命名"
 verrier.523.t: "已发现木卫七"
 verrier.523.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]持续数月的搜寻有结果啦——[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]在木星的轨道上发现了一个先前未知的卫星，并命名其为——#YELLOW 木卫七#!。"
 verrier.523.f: "木卫七于1905年1月2日在利克天文台被查尔斯·狄龙·珀赖因发现。它是木星的第八大卫星以及第二大不规则卫星。该卫星以宙斯的情人之一凡人女子厄拉拉木卫七（Elara）命名"
 verrier.524.t: "已发现木卫八"
 verrier.524.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]持续数月的搜寻有结果啦——[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]在木星的轨道上发现了一个先前未知的卫星，并命名其为——#YELLOW 木卫八#!。"
 verrier.524.f: "木卫八由天文学家菲利贝尔·雅克·梅洛特于1908年1月27日首次发现。1908年2月28日晚，英国格林尼治皇家天文台在曝光的摄影板上首次发现了该天体。进一步检查其他照片后发现，这一物体早在1月27日就已被记录下来。由于当时无法确定它是小行星还是卫星，暂时将其指定为小行星1908CJ。最终在4月10日确认，这一发现是木星的第八颗卫星。该卫星以希腊神话中米诺斯的妻子、弥诺陶洛斯的母亲帕西法厄（Pasiphae）命名。帕西法厄是木星一组拥有类似轨道的卫星的名字来源，该卫星群共有十三个成员，帕西法厄是其中最大的一个。"
 verrier.525.t: "已发现木卫九"
 verrier.525.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]持续数月的搜寻有结果啦——[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]在木星的轨道上发现了一个先前未知的卫星，并命名其为——#YELLOW 木卫九#!。"
 verrier.525.f: "木卫九于1914年7月1日在利克天文台被塞思·尼科尔森发现。因其轨道性质，木卫九属于帕西法厄群。该卫星被命名为希诺佩（Sinope），希腊神话中曾先后在宙斯与阿波罗身前保全贞洁的一位水泽仙女。"
 verrier.526.t: "已发现木卫十"
 verrier.526.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]持续数月的搜寻有结果啦——[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]在木星的轨道上发现了一个先前未知的卫星，并命名其为——#YELLOW 木卫十#!。"
 verrier.526.f: "木卫十于1938年7月6日在威尔逊山天文台被塞思·尼科尔森发现。因其轨道性质，木卫十属于希玛利亚群。该卫星被命名为莱西萨（Lysithea），宙斯的情人之一。"
 verrier.527.t: "已发现木卫十一"
 verrier.527.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]持续数月的搜寻有结果啦——[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]在木星的轨道上发现了一个先前未知的卫星，并命名其为——#YELLOW 木卫十一#!。"
 verrier.527.f: "木卫十一于1938年7月30日在威尔逊山天文台被塞思·尼科尔森发现。因其轨道性质，木卫十一属于卡耳墨群。该卫星被命名为卡耳墨（Carme），宙斯的情人之一。"
 verrier.531.t: "已发现土卫二"
 verrier.531.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]持续数月的搜寻有结果啦——[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]在土星的轨道上发现了一个先前未知的卫星，并命名其为——#YELLOW 土卫二#!。"
 verrier.531.f: "土卫二由德裔英国天文学家威廉·赫歇尔于1789年8月28日发现，是土星的第六颗已发现卫星，也是太阳系中（不包括地球的月球）第十二颗已发现的卫星。由于它的轨道当时是土星的第二近轨道，因此被归类为土星七颗已知大卫星中最靠近内侧的第二颗。这颗卫星以希腊神话中的巨人恩克拉多斯（Enceladus）命名。恩克拉多斯的名字以及土星其他六颗大卫星的名字，都是由威廉·赫歇尔的儿子、天文学家约翰·赫歇尔提出的。"
 verrier.532.t: "已发现土卫一"
 verrier.532.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]持续数月的搜寻有结果啦——[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]在土星的轨道上发现了一个先前未知的卫星，并命名其为——#YELLOW 土卫一#!。"
 verrier.532.f: "“在天气允许的情况下，我持续进行观测；四十英尺反射镜的强光现在发挥了重要作用。9月17日，当第七颗卫星在轨道上达到与太阳的最大角距离的时刻，我成功探测到了它。”\n——威廉·赫歇尔"
 verrier.533.t: "已发现土卫七"
 verrier.533.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]持续数月的搜寻有结果啦——[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]在土星的轨道上发现了一个先前未知的卫星，并命名其为——#YELLOW 土卫七#!。"
 verrier.533.f: "1848年9月美国天文学家乔治·邦德和英国的威廉·拉塞尔各自独立发现了土卫七。该行星被命名为许珀里翁（Hyperion），祂是太阳和黎明之父、克洛诺斯之兄。"
 verrier.534.t: "已发现土卫九"
 verrier.534.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]持续数月的搜寻有结果啦——[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]在土星的轨道上发现了一个先前未知的卫星，并命名其为——#YELLOW 土卫九#!。"
 verrier.534.f: "土卫九由美国天文学家威廉·亨利·皮克林于1899年发现，是土星的第九颗卫星。它是一颗不规则形状的卫星，可能是被土星捕获的小行星。其名字来源于希腊神话中的泰坦女神福柏（Phoebe），象征光明与预言。发现时，皮克林使用了一系列拍摄照片，并花费了两年时间才确认其存在。作为土星最远的传统卫星，土卫九为天文学家研究行星捕获机制提供了重要线索。"
 verrier.541.t: "已发现天卫三"
 verrier.541.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]持续数月的搜寻有结果啦——[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]在天王星的轨道上发现了一个先前未知的卫星，并命名其为——#YELLOW 天卫三#!。"
 verrier.541.f: "天卫三由威廉·赫歇尔于1787年1月11日发现，是天王星的最大卫星。同一天，他还发现了第二大卫星天卫四。赫歇尔在发现天王星时，还观察到其四个主要卫星，但后来证明这些观察结果是错误的。天卫三的命名灵感来自莎士比亚的戏剧《仲夏夜之梦》中的妖精女王缇坦妮雅（Titania）。赫歇尔对这些卫星的发现感到非常兴奋，这一发现揭示了天王星系统的复杂性，并开创了对天王星及其卫星的系统研究。"
 verrier.542.t: "已发现天卫四"
 verrier.542.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]持续数月的搜寻有结果啦——[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]在天王星的轨道上发现了一个先前未知的卫星，并命名其为——#YELLOW 天卫四#!。"
 verrier.542.f: "英国天文学家威廉·赫歇尔首次于1787年1月11日观测到天卫四，并在同一天发现了天王星最大的卫星——天卫三缇坦妮雅。他随后宣称发现了四颗额外的天王星卫星，但后来证明这一声明是错误的。尽管现在使用业余望远镜即可在地球上观测到天卫四和天卫三，但在赫歇尔宣称发现这两颗卫星之后的五十年间，地球上的任何天文观测仪器都未能再次观测到它们。天王星的所有卫星都以威廉·莎士比亚和亚历山大·蒲柏作品中的人物命名，其中天卫四——奥伯隆（Oberon）即为《仲夏夜之梦》中的妖精之王。"
 verrier.543.t: "已发现天卫一"
 verrier.543.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]持续数月的搜寻有结果啦——[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]在天王星的轨道上发现了一个先前未知的卫星，并命名其为——#YELLOW 天卫一#!。"
 verrier.543.f: "天卫一是天王星的第四大卫星，也是其最明亮的卫星。1851年10月24日，英国天文学家威廉·拉塞尔使用位于利物浦的自建天文台内的60厘米反射望远镜，发现了天卫一和天卫二——天王星的第三和第四颗卫星。天卫一的名字来源于亚历山大·蒲柏的史诗《夺发记》中的角色艾瑞尔（Ariel）。"
 verrier.544.t: "已发现天卫二"
 verrier.544.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]持续数月的搜寻有结果啦——[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]在天王星的轨道上发现了一个先前未知的卫星，并命名其为——#YELLOW 天卫二#!。"
 verrier.544.f: "天卫二是天王星的第四大卫星，也是其最明亮的卫星。1851年10月24日，英国天文学家威廉·拉塞尔使用位于利物浦的自建天文台内的60厘米反射望远镜，发现了天卫一和天卫二——天王星的第三和第四颗卫星。天卫二的名字来源于亚历山大·蒲柏的史诗《夺发记》中的角色乌姆柏里厄尔（Umbriel）。"
 verrier.545.t: "已发现天卫五"
 verrier.545.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]持续数月的搜寻有结果啦——[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]在天王星的轨道上发现了一个先前未知的卫星，并命名其为——#YELLOW 天卫五#!。"
 verrier.545.f: "天卫五由行星天文学家杰拉德·柯伊伯于1948年2月16日使用麦克唐纳天文台的82英寸（2080毫米）奥托·斯特鲁维望远镜发现，其围绕天王星的运动于1948年3月1日得到确认。这是近100年来发现的首颗天王星卫星。柯伊伯选择将这一天体命名为米兰达（Miranda），灵感来自莎士比亚剧作《暴风雨》中的角色。此前发现的四颗天王星卫星——艾瑞尔、乌姆柏里厄尔、缇坦妮雅和奥伯隆——都以莎士比亚或亚历山大·波普作品中的精灵角色命名，而米兰达则是首个以人类角色命名的天王星卫星。"
 verrier.551.t: "已发现海卫一"
 verrier.551.d: "海王星被发现后不久，[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]便在该行星轨道上发现了一颗此前未被观测到的卫星！并命名其为——#YELLOW 海卫一#!。"
 verrier.551.f: "海卫一是海王星最大的天然卫星，也是其唯一一颗因自身引力而呈球形的卫星，并且拥有稀薄但结构良好的大气层。海卫一是太阳系中唯一具有逆行轨道的大型卫星，其轨道方向与行星的自转方向相反。海卫一由英国天文学家威廉·拉塞尔于1846年10月10日发现，这一发现距海王星被发现仅17天。当约翰·赫歇尔得知海王星的发现后，他写信给拉塞尔，建议他寻找可能存在的卫星。拉塞尔在八天后发现了海卫一。拉塞尔是一名酿酒师，他使用自制的61厘米口径金属镜反射望远镜发现了这颗卫星。海卫一的名字取自特里同（Triton），希腊神话中海神波塞冬之子。"
 verrier.552.t: "已发现海卫二"
 verrier.552.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]持续数月的搜寻有结果啦——[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]在海王星的轨道上发现了一个先前未知的卫星，并命名其为——#YELLOW 海卫二#!。"
 verrier.552.f: "海卫二是海王星的第三大卫星，于1949年5月1日由杰拉德·P·柯伊伯使用麦克唐纳天文台的82英寸望远镜拍摄的摄影板发现。他在发现报告中提出了这个名字，取自希腊神话中的海仙女涅瑞伊得斯（Nereid）。海卫二是旅行者2号到达海王星之前发现的第二颗也是最后一颗海王星卫星。"
 verrier.49.t: "太阳黑子"
 verrier.49.d: "我们天文台的学者观测到了太阳黑子这一不同寻常的太阳活动。"
 verrier.49.f: "太阳黑子（亦称日斑）是太阳光球上的临时现象，它们在可见光下呈现比周围区域黑暗的斑点。它们是由高密度的磁性活动抑制了对流的激烈活动造成的，在表面形成温度降低的区域。太阳黑子很少单独活动，常是成群出现。黑子的活动周期为11.2年，活跃时会对地球的磁场产生影响，主要是使地球南北极和赤道的大气环流作经向流动，从而造成恶劣天气，使气候转冷。严重时会对各类电子产品和电器造成损害。"
 verrier.49.g: "有趣得很！"
