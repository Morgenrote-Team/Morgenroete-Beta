 verrier_show_astronomical_decisions: "显示天文决议"
 verrier_show_astronomical_decisions_desc: "显示所有天文决议"
 verrier_found_observatory_decision: "建立天文台"
 verrier_found_observatory_decision_desc: "19世纪，天文学取得了巨大进步，尤其是因为民族国家的赞助。对宇宙天体的“狩猎”也就此开始了，因为通过命名新的恒星、行星或小行星可以为国家和统治者赢得声望。随着望远镜技术的现代化以及摄影技术的发展，天文望远镜的产量大大增加。大建天文台也将导致每年被动发现许多新天体；确切的数字可以在天文台建成后检查。新技术和[concept_verrier_astronomer]改善了统计数据。"
 verrier_charter_moon_decision: "测绘月亮"
 verrier_charter_moon_decision_desc: "人们已经花了几个世纪尝试为月球，这颗地球伴侣绘制地图。望远镜的发明彻底改变了这门被称为“月相学”的科学，但随着摄影术的发明，我们有了一种全新的方式来精确绘制月球地图。"
 verrier_visit_observatory_decision: "拜访天文台"
 verrier_visit_observatory_decision_desc: "参观我国的主要天文台，查看所有重要的国内和国际天文学信息。"
 verrier_asteroid_congress_decision: "关于小行星的天文大会"
 verrier_asteroid_congress_decision_desc: "自1801年谷神星的发现后，天文学家就发现了越来越多的天体，这也是太阳系中行星的数量持续增加的原因。发现海王星引发了一个问题，即是否应该为是在火星和木星之间发现的众多小天体创建一个新的类别。特别是新天文符号的发明和它们相对较小的大小，使天文学家认为它们更可能是“小星星”或“小行星”。当然，这种分类意味着一些以前被认为是行星的天体将失去它们的地位，并被降级为纯粹的巨石。"
 verrier_asteroid_congress_decision_tt: "随着被发现的天体数量日益增多，对此前的行星定义进行改革变得更加紧迫。如果天体数量超过#BLUE 1500#!个，情况很可能变得十分混乱，以至于召开一次会议变得迫在眉睫。"
 verrier_carte_congress_decision: "天空之图"
 verrier_carte_congress_decision_desc: "1887年，巴黎天文台台长阿梅德·穆切兹发起了一项规模空前的国际星图绘制项目，他意识到新的干版照相技术有可能彻底改变星图制作过程。1887年4月在巴黎召开了有50多位天文学家参加的天文大会，来自世界各地的20个天文台同意参与该项目。我们也可以举办这样一个大会，向国际社会分享天文知识。"
 verrier_great_debate_decision: "大辩论"
 verrier_great_debate_decision_desc: "沙普利‑柯蒂斯之争，也被称为“大辩论”，是20世纪初期的诸多辩论的综合，最终导致了对星系性质和宇宙大小的新认识。这次辩论围绕银河系的大小，以及当时被称为螺旋星云的星系是银河系内的小物体还是距离银河系更远且与银河系分离的天体两个问题展开。当天，两位科学家分别呈交了关于宇宙尺度的独立技术论文，晚上进行了一场公开讨论。我们可以召开这样的会议来探讨宇宙的终极奥秘。"
 notification_verrier_astronomical_observation_notification_name: "年度天文报告"
 notification_verrier_astronomical_observation_notification_desc: "今年我国[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]发现并记录了[GetPlayer.MakeScope.Var('verrier_astronomical_objects_notification_var').GetValue|0+=]新的[Concept('concept_verrier_astronomical_object','$concept_verrier_celestial_bodies$')]。"
 verrier.10.t: "发现海王星"
 verrier.10.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]发现了海王星为祖国带来了荣耀！"
 verrier.10.f: "海王星在午夜过后不久被发现，搜索只用了一个小时，其位置与勒维耶的预测只差1度，这是相当杰出的应验。接下来的两个晚上进行了进一步的观测以验证其位置和运动。[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]惊奇的给勒维耶回信：“你（计算出来）的行星真的存在！”"
 verrier.10.g: "其他国家会羡慕不已！"
 verrier.5.t: "天文台落成仪式"
 verrier.5.d: "在今天的隆重仪式上，我国的天文研究中心——天文台，正式落成。"
 verrier.5.f: ""
 verrier.5.g: "参观新天文台。"
 verrier.6.t: "观察站解体"
 verrier.6.d: "该国的天文学家决定关闭一座天文台。"
 verrier.6.f: "最近的政治事件导致我国拥有了几个天文台。为了消除竞争，并确保政府对首都主要观测站的资助，所以决定停止在分部天文台的活动，并关闭该机构。所有的研究成果都与科研人员一起转移到首都。"
 verrier.6.g: "遗憾的是，它有必要。"
 verrier.6.h: "呃……我们首都还没有天文台……把它也移到那里！"
 verrier.11.d: "来自[SCOPE.sCountry('verrier_neptune_discoverer_country').GetName]的学者今天告诉我们，他们中有人发现了新行星——海王星。"
 verrier.11.g: "祝贺……"
 verrier.20.t: "发现冥王星"
 verrier.20.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]发现了冥王星为祖国带来了荣耀！"
 verrier.20.f: "冥王星被发现后，因为其太暗淡并缺乏可见圆盘，人们怀疑它是否就是行星X。事实上，这个天体让一些学者感到非常失望。整个20世纪，对冥王星质量的估计一直不断被修正且越来越小。天文学家最初根据它对海王星和天王星的假定影响来计算它的质量。1931年，冥王星的质量被计算为约等于地球，1948年的进一步计算将其质量降至相当于火星的质量。尽管如此，这一发现还是震惊了全球。"
 verrier.20.g: "尽管小了点，它仍然是一颗行星。"
 verrier.21.d: "来自[SCOPE.sCountry('verrier_pluto_discoverer_country').GetName]的学者今天告诉我们，他们中有人发现了新行星——冥王星。"
 verrier.21.g: "这真的是一个行星吗？"
 verrier.30.t: "关于小行星的天文大会"
 verrier.30.d: "一些过去被视为行星的天体的真正分类将在这次国际会议上决定。"
 verrier.30.f: "自19世纪初以来发现的几个较小天体在很大程度上不符合人们对行星的定义，新理论由此迅速传开——尤其是发现海王星之后，海王星与那些已知的行星更像。几经犹豫后，半个世纪以来一直被定义为行星的天体智神星、灶神星和婚神星也被划为了小行星。然而，到目前为止，对由朱塞佩·皮亚齐于1801年发现的小行星谷神星的分类尚未达成共识。一群传统主义者希望保留其行星的分类。虽然谷神星比其他行星小得多，但对于小行星来说太大了。因此，一些与会者呼吁进行投票。"
 verrier.30.f_astraea: "这个想法很快被人们接受，因为自19世纪初以来发现的较小的天体在很大程度上并不符合人们对行星的实际理解。尤其是在海王星被发现之后，它与那些已知已久的行星更为相似。智神星、灶神星、婚神星和义神星等天体被称为行星已有半个世纪之久，在讨论之后才被归入新的小行星类别。然而，对于1801年由朱塞佩·皮亚齐发现的小行星谷神星，至今尚未达成共识。一群传统主义者希望将其保留为一颗行星。虽然它比其他所有行星都小得多，但作为一颗小行星，它实在是太大了。因此造成议论。"
 verrier.30.g: "我喜欢这个行星，让我们投票决定谷神星的命运吧。"
 verrier.30.h: "没这个必要。"
 verrier.31.t: "谷神星的定义"
 verrier.31.d: "我国被邀请参加由[SCOPE.sCountry('verrier_congress_host_country').GetName]举办的天文大会。最重要的问题涉及到（曾经的？）行星谷神星的命运。"
 verrier.31.f: "自19世纪初以来发现的几个较小天体在很大程度上不符合人们对行星的定义，新理论由此迅速传开——尤其是发现海王星之后，海王星与那些已知的行星更像。几经犹豫后，半个世纪以来一直被定义为行星的天体智神星、灶神星和婚神星也被划为了小行星。然而，到目前为止，对由朱塞佩·皮亚齐于1801年发现的小行星谷神星的分类尚未达成共识。一群传统主义者希望保留其行星的分类。虽然谷神星比其他行星小得多，但对于小行星来说太大了。反对方则认为，如果谷神星被定义为一颗行星，那么许多更大的天体也可以算作行星，这会给天文学研究造成更多麻烦。"
 verrier.31.f_astraea: "这个想法很快被人们接受，因为自19世纪初以来发现的较小的天体在很大程度上并不符合人们对行星的实际理解。尤其是在海王星被发现之后，它与那些已知已久的行星更为相似。智神星、灶神星、婚神星和义神星等天体被称为行星已有半个世纪之久，在讨论之后才被归入新的小行星类别。然而，对于1801年由朱塞佩·皮亚齐发现的小行星谷神星，至今尚未达成共识。一群传统主义者希望将其保留为一颗行星。虽然它比其他所有行星都小得多，但作为一颗小行星，它实在是太大了。另一方则认为，如果谷神星继续作为行星，许多较大的天体也会被算作行星，从而增加天文学的难度。"
 verrier.31.g: "谷神星是一颗行星"
 verrier.31.h: "谷神星不是行星"
 verrier.32.t_demoted: "谷神星降级"
 verrier.32.t_saved: "谷神星分类不变"
 verrier.32.d_demoted: "天文大会的结果剥夺了谷神星的行星地位。"
 verrier.32.d_saved: "天文大会确认了谷神星的行星地位。"
 verrier.32.f_demoted: "结果并不令人意外：如果智神星、婚神星和灶神星是小行星，那么逻辑上谷神星也应该是小行星。天文学家们一致认为谷神星可能是所谓小行星带中最大的天体，因此也为这颗前行星授予了在小行星中的编号“1”号；但也仅此而已。虽然有一些声音认为行星地位具有文化和学术意义，但这样的争论很可能更多涉及非理性的怀旧情结，而非科学。\n\n最终结果是#G [GetGlobalVariable('verrier_ceres_yes').GetValue]#!票赞同，#R [GetGlobalVariable('verrier_ceres_no').GetValue]#!票反对。"
 verrier.32.f_saved: "结果令许多人颇感震惊：大多数天文学家投票赞成将谷神星保留为一颗行星!传统主义者断言，谷神星的形态和质量将它与小行星带中的其他天体区分开来。这颗行星显然是独特的。科学家们在一份说明中补充说，几十年来，谷神星一直是太阳系的一部分，不仅在科学上，而且在社会和文化上也得到认可。将这颗很多人所喜爱的行星降级为小行星并剥夺它的身份近乎于狂妄。\n\n最终结果是#G [GetGlobalVariable('verrier_ceres_yes').GetValue]#!票赞同，#R [GetGlobalVariable('verrier_ceres_no').GetValue]#!票反对。"
 verrier.32.g: "谷神星只是一颗矮行星。"
 verrier.32.h: "谷神星的地位保住了！"
 verrier.33.t: "四颗行星降级"
 verrier.33.t_astraea: "五颗行星降级"
 verrier.33.d: "天文学大会已经发表了最终宣言：曾被视为行星的四个天体现在被宣布为小行星。"
 verrier.33.f: "此次大会引入了一个新的天体类别——小行星，以改善未来的天文学研究。因此，并非太空中的每一块岩石都是行星了。除了一些新发现的天体外，从1801年起被视作“行星”的谷神星、智神星、灶神星和婚神星现在也被归类为小行星。"
 verrier.33.f_astraea: "大会引入了一个新的天体类别——小行星，以改善未来的天文学。因此现在太空中的每一块岩石都不再是行星了。除了一些新天体外，从1801年起发现的谷神星、智神星、灶神星、婚神星和义神星也被归类为小行星。"
 verrier.33.g: "太阳系有八颗行星"
 verrier.34.t: "三颗行星降级"
 verrier.34.t_astraea: "四颗行星降级"
 verrier.34.d: "天文学大会已经发表了最终宣言：曾被视为行星的三个天体现在被宣布为小行星。"
 verrier.34.f: "此次大会引入了一个新的天体类别——小行星，以改善未来的天文学研究。因此，并非太空中的每一块岩石都是行星了。除了一些新发现的天体外，从1801年起被视作“行星”的智神星、灶神星和婚神星现在也被归类为小行星。谷神星保留了行星地位。"
 verrier.34.f_astraea: "大会引入了一个新的天体类别——小行星，以改善未来的天文学。因此现在太空中的每一块岩石都不再是行星了。除了一些新天体外，从1801年起发现的智神星、灶神星、婚神星和义神星也被归类为小行星。不过谷神星仍然是一颗行星。"
 verrier.34.g: "太阳系有九颗行星"
 verrier.35.t: "有争议的行星地位"
 verrier.35.d: "天文大会最近发表的一项声明影响了我国的威望。"
 verrier.35.f: "一些反对意见无济于事。剥夺我们发现的天体的行星地位会对我们在世界上的地位产生负面影响。现在几乎每个人都可以找到一颗小行星；这种发现不再带来国际认可。我们曾经吹嘘我们的一位科学家发现了这样一个天体，但随着定义的改变，这种虚荣荡然无存。"
 verrier.35.g: "投票分明是被操纵的！"
 verrier.40.t: "目击流星！"
 verrier.40.d: "我们天文台的学者发现了一颗新彗星。"
 verrier.40.f: "一颗彗星出现在天空中，有些人认为这预示着坏时代即将到来。还有人认为它们其实是在天空中飘浮的小精灵。也有人认为这颗彗星很可能是一颗巨大的冰球，在天空中漂浮，而长长的尾巴是由于太阳的能量所造成的。这三个同样可行的理论之间的争论，正在促进我国对知识的追求。"
 verrier.40.g: "谢天谢地，我们生活在一个文明的时代。"
 verrier.41.t: "一颗新的小行星"
 verrier.41.d: "天文学家在小行星中发现了一个新的天体，并将其添加到我们的星图中。"
 verrier.41.f: "19世纪，天体（尤其是小行星）测绘技术取得了迅猛发展。1850年左右，科学家们只发现了十几颗小行星，而到世纪之交，已经发现了大约300颗。除此之外，这些发现成果改变了我们天体分类的思维模式并启发我们创造新的天体类别。"
 verrier.41.g: "还有多少？"
 verrier.42.t: "流星雨"
 verrier.42.d: "一场季节性的流星雨让我们的天文学家今年能观测特别多的天体。"
 verrier.42.f: "流星雨是一种观察到一些流星从夜空的一个点辐射或起源的天文事件。这些流星是由称为流星体的宇宙碎片流在平行轨道上以极高速度进入地球大气层而引起的。大多数流星比沙子还要小，所以几乎所有的流星都会消失，不会撞击地球表面。非常强烈或不寻常的流星雨被称为流星暴或流星风暴，其中最著名的是狮子座流星雨，每小时能够产生至少1000颗流星。"
 verrier.42.g: "希望天空晴朗，能见度高！"
 verrier.43.t: "星云"
 verrier.43.d: "我们的天文台发现了一片以前不为人知的美丽星云，里面有众多未知的恒星。"
 verrier.43.f: "穆斯林波斯天文学家阿卜杜勒·拉赫曼·阿尔苏记录了第一个真正的星云并将其与星团区别开来。他注意到安达洛美达星系的位置有一个“小云朵”。从1751年到1753年，尼古拉·路易·拉卡伊在好望角发现了42个星云，其中大部分以前是未知的。威廉·赫歇尔和他的妹妹卡罗琳·赫歇尔随后发现了大量星云，总计约有2000个。从1864年开始，威廉·哈金斯观测了大约70个星云的光谱。到了1923年，在经过一场“大辩论”之后，人们清楚地认识到许多所谓的“星云”实际上是远离银河系的星系。"
 verrier.43.g: "好极了！"
 verrier.44.t: "命名一颗恒星"
 verrier.44.d: "[SCOPE.sCharacter('verrier_star_discoverer').GetFullName]偶然发现了一颗新的恒星。目前其命名仍在辩论当中。"
 verrier.44.f: "虽然天文学家起初遵循将天体命名为神话人物的不成文规则，但以君主的名字命名或与祖国相联系的风格出现了，就像探索新世界时一样。例如，天王星最初被命名为当时在位的英国国王乔治的名字“乔治”。当皮亚齐发现谷神星时，他在其上加了他的赞助人和统治者的描述词“费迪南德”。"
 verrier.44.g: "这颗恒星应该以我们国家的名字命名。"
 verrier.44.h: "这颗恒星应该以我们领袖的名字命名。"
 verrier.44.i: "这颗恒星应该以发现者的名字命名。"
 verrier.45.t: "一位新的[concept_verrier_astronomer]上场"
 verrier.45.d: "过去，[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]经常表现出对天文学的浓厚兴趣，并在闲暇时间观测星空。"
 verrier.45.f: "直到今天，许多业余天文学家做出了卓越的贡献，推动了天文学的发展。无数的事例一再证明了科学爱好者也能够帮助博学的专家处理他们的记录。这并不奇怪，因为一些著名的天文学家通常来自热情的观星者。"
 verrier.45.g: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]应该是一位专业的[concept_verrier_astronomer]。"
 verrier.45.h: "这些研究很有趣，仅此而已。"
 verrier.46.t: "星图错误"
 verrier.46.d: "很遗憾，在查阅旧星图时，我们发现有些恒星根本不存在。"
 verrier.46.f: "遗憾的是，天文记录中的谬误并不少见。不仅在现代早期如此，在19世纪也难以避免，尽管当时已经有了对其进行改进与细化的方法。例如，1861年赫尔曼·戈德施密特声称发现了土星的另一颗卫星，他将其命名为“喀戎”，但其存在从未得到证实。"
 verrier.46.g: "你说它只是望远镜上落的灰？"
 verrier.47.t: "土星的新卫星被发现"
 verrier.47.d: "在我们的一个主要天文台升级望远镜后，我们的天文学家新发现了土星的两颗卫星。"
 verrier.47.f: "土星的卫星繁多，大者有比水星更大的土卫六，小者有不足一百米宽的小卫星。土星共有83颗轨道已得到证实而又没有混进环内的自然卫星。除此之外，还有上百万颗微型卫星以及由无数细小颗粒所组成的土星环系统。有七颗卫星的质量足够大，其重力足以使其坍缩成近球体形状，不过只有土卫六达到流体静力平衡状态（土卫五也有可能）。土星的某些卫星有着独一无二的特殊地理。土卫六是太阳系第二大卫星（仅次于木卫三），而且有着类似于地球的氮大气层、液态碳氢化合物的湖泊、河流和降雨。"
 verrier.47.g: "完美"
 verrier.48.t: "难以置信的新星！"
 verrier.48.d: "我们的[concept_verrier_astronomer]，[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士，发现了一颗比周围恒星亮得多的新星。此种发现非常罕见，通常只有最优秀的天文学家才能做到。"
 verrier.48.f: "我们首先注意到了新星的出现。但很快许多其他天文台也开始将望远镜对准它。新星比周围的恒星要亮得多，而且持续了将近两周。虽然随着时间的推移它的亮度逐渐减弱，但在相当长的一段时间里它还是清晰可见。我们还不知道它为什么会出现，但这次观测一定会帮助我们更好地理解这一现象！"
 verrier.48.g: "难以置信"
 verrier.50.t: "绘制月面图"
 verrier.50.d: "经过多年的深入观察和绘图，以及使用最先进的摄影技术，我们的天文学家已经能够绘制出准确的月球地图。"
 verrier.50.f: "月球测绘在1779年约翰·施罗特开始对月球地形进行精密观测和测量时变得系统化。1834年，约翰·海因里希·冯·梅德勒出版了第一张由四张地图组成的大型月球地图，随后出版了《月球地形学总论》。所有的月球测量都是基于直接观察的，直到1840年3月，J·W·德拉珀使用5英寸的反射望远镜拍摄了月球的银版照片，从而将摄影引入了天文学。起初，这些图像的质量非常差，但就像200年前的望远镜一样，它们的质量迅速提高。到1890年，月球摄影已经成为天文学的一个受认可的子学科。"
 verrier.50.g: "壮丽"
 verrier.51.t: "月球沟渠"
 verrier.51.d: "通过摄影测绘月球的项目取得了进展。"
 verrier.51.f: "月溪或沟纹通常用来描述月球表面上任何狭长、类似河床的凹槽。典型的月溪可能有数公里宽，数百公里长。但是，这一术语的使用并不严谨，也可以用在太阳系的其它天体，包括火星、金星和一些卫星上的所有类似地形构造。"
 verrier.51.g: "很有趣。"
 verrier.52.t: "月球环形山"
 verrier.52.f: "非常古老的表面（例如月球）上的环形山记录了大约39亿年前内部太阳系中一段剧烈的早期轰击期。由于月球上的侵蚀过程很少，环形山得以保存。1893年，格罗夫·卡尔·吉尔伯特首次提出月球环形山是由大型小行星撞击形成的。"
 verrier.53.t: "月海"
 verrier.53.f: "月海，是指月球月面上比较低洼的平原，是由小天体撞击月球时，撞破月壳，使月幔流出，玄武岩岩浆覆盖了低地而形成。所谓的月海，并非月球上面的海洋。其之所以被称之为“海”，是因为早期的观察者，发现到月面有部分地区较暗。而在当时无法清晰观察到月球表面的情况下，观察者们按照其对地球的认识，猜测该地区为海洋，因为其反光度比其他地方较低。月海是月球表面的主要地理单元，总面积上约占全月面的25%，绝大多数月海分布在面向地球月球的正面，正面月海约占半球面积的一半，远处的几个月海要小得多，大部分位于非常大的陨石坑中。此外，还有被称为湖的“月湖”；被称为湾的“月湾”；被称为沼的“月沼”。"
 verrier.54.t: "月球高地"
 verrier.54.f: "月球最显著的外观是明暗对比区域。更明亮的部分是月球高地，也被称作月陆；更暗的区域被称作月海。据推测，它们形成于44亿年前，可能由月球岩浆海洋的斜长石堆积物构成。一般认为月海熔岩喷发只出现在月球正面是因为正面的月壳比背面的月壳薄，这可能是因为大部分月海熔岩喷发发生在朝向地球一面的低洼撞击盆地中，或是流入了撞击盆地而形成的。"
 verrier.61.t: "[SCOPE.sCharacter('verrier_1843_discoverer').GetLastName]的彗星"
 verrier.61.d: "[SCOPE.sCharacter('verrier_1843_discoverer').GetFullName]发现了一颗@verrier_comet!大彗星！"
 verrier.61.f: "1843年大彗星是一颗长周期彗星，它在1843年3月变得非常明亮（也被称为3月大彗星）。它在1843年2月5日被发现，很快就变亮成为一颗大彗星。它是克鲁兹族彗星的成员，克鲁兹是一个彗星族，因大约在1106年接近太阳而碎裂形成这一个族群。这个族群的彗星以非常接近太阳表面的距离（在几个太阳半径之内）通过，并且经常变得非常明亮。它在1843年3月6日最接近地球，并且在第二天达到最大亮度；不幸的是，在赤道以北的观测者看不见这颗彗星，在它最亮时只有在南半球才能看见。最后一次看见这颗彗星是在1843年4月19日。当时，这颗彗星是比人和其它已知天体都更接近太阳。"
 verrier.61.g: "荣耀归于[ROOT.GetCountry.GetNameNoFlag]！"
 verrier.62.t_name: "[SCOPE.sCharacter('verrier_1843_discoverer').GetLastName]的彗星"
 verrier.62.t_year: "1843年大彗星"
 verrier.62.d: "一颗美妙的大彗星已经连续几天充满了天空。"
 verrier.62.g: "继续仰望天空！"
 verrier.64.t: "[SCOPE.sCharacter('verrier_1858_discoverer').GetLastName]的彗星"
 verrier.64.d: "[SCOPE.sCharacter('verrier_1858_discoverer').GetFullName]发现了一颗@verrier_comet!大彗星！"
 verrier.64.f: "在1811年的大彗星之后，1858年的大彗星是19世纪最明亮的彗星。它也是第一个被拍摄照片的彗星。它在1858年10月10日最靠近地球，整个10月都相当明亮，有着长长的、弯曲如拂尘的尾巴和显著的气体尾迹。对于南半球的观察者来说，它直到11月才消失于肉眼可见的范围内。它被认为是观测到的最美丽的彗星之一，也是本世纪中最亮的彗星之一，给艺术家和公众留下了深刻印象。在之前的一段时期，人们对彗星非常恐慌，尤其是在巴黎，部分原因是由于约翰·拉塞尔·亨德的错误计算，预测该彗星将于1857年6月撞击地球。但由于它在北半球特别是欧洲黑暗天空下的良好可见性和9月和10月的良好天气，使其成为世纪中最受关注的彗星之一。英国天文学家威廉·亨利·斯密斯回忆说它是“我见过的最美丽的物体之一”。牛津的威廉·特纳在至少一幅画作中描绘了此彗星。"
 verrier.65.t_name: "[SCOPE.sCharacter('verrier_1858_discoverer').GetLastName]彗星"
 verrier.65.t_year: "1858年大彗星"
 verrier.67.t: "[SCOPE.sCharacter('verrier_1861_discoverer').GetLastName]的彗星"
 verrier.67.d: "[SCOPE.sCharacter('verrier_1861_discoverer').GetFullName]发现了一颗@verrier_comet!大彗星！"
 verrier.67.f: "“1861年5月13日晚上，我在寻找彗星时发现了一个微弱的星云状物体，位于波江座的拉卡伊1316星附近。在我的航海望远镜中，这个物体看起来非常模糊，我很难估计它与三颗已知固定星的距离。在六分仪附着的小型望远镜中，这个物体几乎难以辨认，当我将参考星南河三、天狼星和老人星纳入视野时，它微弱的光芒很容易被这些更亮的星星掩盖。每个彗星猎人都知道，拥有一份丰富的星云目录对于完成他的工作是多么必要，但我不幸地没有这个价值不菲的附件。我无法在我掌握的有限目录中找到这个物体。因此，我决定观察它，这样做非常明智，否则我就会错过一个向天文学界介绍自己的最佳机会。”"
 verrier.68.t_name: "[SCOPE.sCharacter('verrier_1861_discoverer').GetLastName]的彗星"
 verrier.68.t_year: "1861年大彗星"
 verrier.70.t: "[SCOPE.sCharacter('verrier_1874_discoverer').GetLastName]的彗星"
 verrier.70.d: "[SCOPE.sCharacter('verrier_1874_discoverer').GetFullName]发现了一颗@verrier_comet!大彗星！"
 verrier.70.f: "1874年的大彗星是一颗非周期性彗星，在当年夏季可以用肉眼观察到。毫无疑问，它是一颗美丽的，真正的大彗星。它的亮度最强时可能超过了一等星，并在彗发内显示出一系列的包层，这些包层被天文学家与16年前的大彗星进行了比较。位于合适位置的观察者还注意到，彗星在7月份经过地球时最大裸眼尾长可达70度。马克·吐温在他的短篇小说《奇怪的快乐之旅》讽刺了这颗彗星引起的公众恐慌。"
 verrier.71.t_name: "[SCOPE.sCharacter('verrier_1874_discoverer').GetLastName]的彗星"
 verrier.71.t_year: "1874年大彗星"
 verrier.73.t: "[SCOPE.sCharacter('verrier_1882_discoverer').GetLastName]的彗星"
 verrier.73.d: "[SCOPE.sCharacter('verrier_1882_discoverer').GetFullName]发现了一颗@verrier_comet!大彗星！"
 verrier.73.f: "1882年大彗星属于克鲁兹族彗星（这种彗星会以不到1个太阳半径的距离通过太阳的光球）。1882年大彗星的亮度在1882年9月达到顶点，在近日点时，位在太阳附近的彗星，甚至可以被人用裸眼来观测。1882年大彗星最早出现在1882年9月的天空中，显示它已经可以直接用裸眼来观测，因此有许多人独立发现它的存在。观测报告显示它最早被观测到是在1882年9月1日，非洲南部的好望角与几内亚湾都有许多人独立观测到该彗星。在接下来的几天之中，许多南半球的观测者都记录到这新彗星。女王陛下在开普敦的天文学家大卫·吉尔纪录了1882年9月18日于太阳升起之前观测彗星几分钟的报告，并如此描述它“核心无疑只有1个，直径则一定超过4″。事实上，彗星就像是由许多位于太阳附近的1等星所组成的。1882年大彗星的残骸会在几百年后再度回归，而且可能会分布在200或300年之间。"
 verrier.74.t_name: "[SCOPE.sCharacter('verrier_1882_discoverer').GetLastName]的彗星"
 verrier.74.t_year: "1882年大彗星"
 verrier.80.t: "天空之图大会"
 verrier.80.d: "天文大会的准备工作已经完成。是时候邀请其他国家了。"
 verrier.80.f: "1887年、1889年和1891年的三次会议基于当时最好的技术制定了统一的观测和计算方法。来自38个国家的天文学家参加了这个“天空之图大会”；最终，赤纬区域根据纬度被分配给了18个天文台。然而，计划的40分钟曝光时间不得不根据气候情况部分进行调整，同时评估现有的比较器。从1895前后年开始，一些研究所还希望为改进方法论与实验室技术做出贡献，同时也希望将资源投入到新兴天体物理学的发展中。"
 verrier.80.g: "邀请主要的天文学国家。"
 verrier.81.t: "天空之图的邀请"
 verrier.81.d: "我们的天文学家应邀参加了一次旨在更详细地探索和绘制星图的大会。"
 verrier.81.f: "1887年、1889年和1891年的三次会议基于当时最好的技术制定了统一的观测和计算方法。来自38个国家的天文学家参加了这个“天空之图大会”；最终，赤纬区域根据纬度被分配给了18个天文台。然而，计划的40分钟曝光时间不得不根据气候情况部分进行调整，同时评估现有的比较器。从1895前后年开始，一些研究所还希望为改进方法论与实验室技术做出贡献，同时也希望将资源投入到新兴天体物理学的发展中。"
 verrier.81.g: "我们来了"
 verrier.82.t_laughed: "在天文大会上受到嘲笑"
 verrier.82.t_respected: "在天文大会上受到尊重"
 verrier.82.t_lauded: "在天文大会上受到赞扬"
 verrier.82.d_laughed: "我们代表团在天文大会上被嘲笑缺乏天文知识！"
 verrier.82.d_respected: "我们的代表团在天文学大会上受到了尊重"
 verrier.82.d_lauded: "我国在天文学领域的先进知识引起了其他科学家的关注。"
 verrier.82.f_laughed: "“你是什么意思，以太理论过时了？”"
 verrier.82.f_respected: "“我希望自助餐还有一些土星形状的食物。”"
 verrier.82.f_lauded: "“晚上好，大麦哲伦云先生——我终于知道这东西为什么叫那个了。”"
 verrier.82.g: "可怖……"
 verrier.82.h: "好"
 verrier.82.i: "完美！"
 verrier.83.t: "分享星图"
 verrier.83.d: "我们的天文学家想用我们的星图交换国外同行的星图。"
 verrier.83.f: "天文学是最早开始国际合作的研究领域之一；只有第一次世界大战短暂地终止了这种努力。看到整个天空和解开宇宙之谜的挑战意味着来自各个国家的科学家们致力于共同的目标。只有政治才可能会阻碍这一目标的实现。"
 verrier.83.g: "我们想要分享我们的星图"
 verrier.83.h: "我们不感兴趣"
 verrier.84.t: "星图交换"
 verrier.84.d: "天文学家在没有咨询我们的情况下与外国科学家交换了一些星箱。"
 verrier.84.f: "天文学是最早开展国际合作的研究领域之一； 只有第一次世界大战才短暂结束了这种合作。探索整个天空和解开宇宙奥秘的挑战意味着来自各国的科学家致力于一个共同的目标。只有政治可以阻碍这一切——或者促进这一切。"
 verrier.84.g: "他们得先问问我！"
 verrier.85.t: "天文大会结束"
 verrier.85.d: "天文大会已经结束，我们最近收到了一些关于星空的重要信息。"
 verrier.85.f: "以一个国际望远镜网络创建天空地图的计划在随后的几十年中被证明是一项艰巨且难以掌控的任务。天空之图计划最终未能完成。然而，国际会议提供了交流的机会，并为未来天文研究领域的国际合作和会议奠定了基础。"
 verrier.85.g: "这很有教育意义。"
 verrier.86.t: "大辩论"
 verrier.86.d: "天文大会的准备工作已经完成。是时候邀请其他国家了。"
 verrier.86.f: "世纪天文大辩论也称为沙普利‑柯蒂斯之争，是天文学上两位具有影响力的天文学家哈罗·沙普利和希伯·柯蒂斯就螺旋星云的本质和宇宙的尺度所进行的辩论。辩论中的基本问题是当时所谓的螺旋星云是在银河系内的小天体，还是在银河系外巨大且独立的星系。沙普利作为银河系就是整个宇宙议题的代表，他认为像仙女座星云和螺旋星云是小天体，并且只是银河系的一部分。站在另一边的柯蒂斯认为仙女座星云和其它这一类的星云都是独立的星系或岛宇宙。沙普利和科蒂斯两位于大辩论中提出的技术性论文刊印在1921年5月发行的美国国家科学院期刊上，发表的论文中也包含参与了1920年会议的学者们对星云所在位置表达的意见。在公开辩论之后，科学家们已经能够验证来自两位天文学家的个别证据。"
 verrier.86.g: "邀请主要的天文学国家。"
 verrier.87.t: "大辩论"
 verrier.87.d: "我们的天文学家应邀参加一次大会，讨论关于宇宙的大小和性质的问题。"
 verrier.87.f: "世纪天文大辩论也称为沙普利‑柯蒂斯之争，是天文学上两位具有影响力的天文学家哈罗·沙普利和希伯·柯蒂斯就螺旋星云的本质和宇宙的尺度所进行的辩论。辩论中的基本问题是当时所谓的螺旋星云是在银河系内的小天体，还是在银河系外巨大且独立的星系。沙普利作为银河系就是整个宇宙议题的代表，他认为像仙女座星云和螺旋星云是小天体，并且只是银河系的一部分。站在另一边的柯蒂斯认为仙女座星云和其它这一类的星云都是独立的星系或岛宇宙。沙普利和科蒂斯两位于大辩论中提出的技术性论文刊印在1921年5月发行的美国国家科学院期刊上，发表的论文中也包含参与了1920年会议的学者们对星云所在位置表达的意见。在公开辩论之后，科学家们已经能够验证来自两位天文学家的个别证据。"
 verrier.87.g: "我猜答案是42？"
 verrier.88.t: "一个宇宙？或是还有不同的星系？"
 verrier.88.d: "天文大会的辩论围绕着银河系是否代表整个宇宙展开。"
 verrier.88.f: "沙普利作为银河系就是整个宇宙议题的代表，他认为像仙女座星云和螺旋星云是小天体，并且只是银河系的一部分。他引用相对大小的主张——如果仙女座星云不是银河系的一部分，则它的距离一定是108光年的数量级——这是当时大多数天文学家都不能接受的尺度。站在另一边的柯蒂斯认为仙女座星云和其它这一类的星云都是独立的星系或岛宇宙。他显示出现在仙女座星云中的新星比银河系还要多，从这个事例中他问到：为何在这个小范围的部分区域中，新星会比银河系其它的部分更多。由此，他推论仙女座星云是一个独立的星系，有它自己的年龄和新星的发生。"
 verrier.88.g: "宇宙由不同的星系组成"
 verrier.88.h: "只有一个银河系，其他的都是气体云"
 verrier.89.t: "宇宙中的太阳"
 verrier.89.d: "争论的另一个焦点是太阳是在银河系的中心还是在外围区域。"
 verrier.89.f: "“由于大型天文台不断兴建并投入使用，以及它们强大的分析恒星并探测太空的方法，我们已经进入了一个新纪元，但我认为需要还需要另一次进步：我们对银河系的认识必须扩大，以使望远镜所发现的物体保持适当的关系；太阳系不能继续保持中心位置。”\n\n“对于银河系的形状和结构，得出的结果也有类似共识：\n1.星星的数量不是无限的，也不均匀分布。\n2.我们的银河系，由银河系的投影轮廓为我们所确定，可能包含了十亿个恒星。\n3.这个星系的形状很像一个透镜，或者一块薄薄的手表，其厚度可能不到直径的六分之一。\n4.我们的恒星离这个星系的中心位置相当近。”"
 verrier.89.g: "太阳位于银河系内部。"
 verrier.89.h: "太阳位于银河系边缘。"
 verrier.90.t: "大辩论结束"
 verrier.90.d: "大辩论已经结束，大多数科学家已经达成了共识。"
 verrier.91.t: "奇迹年论文"
 verrier.91.d: "科学家阿尔伯特·爱因斯坦用几种理论颠覆了经典物理学。"
 verrier.91.f: "奇迹年论文指的是阿尔伯特·爱因斯坦在公元1905年在德国科学期刊《物理年鉴》所发表的四篇论文。这四篇论文推进了近代物理学的基础，并且让人重新理解空间、时间、质量与能量。第一篇论文解释了光电效应，第二篇论文解释了布朗运动。第三篇论文介绍了爱因斯坦的狭义相对论，建立了适用于所有参考系的普遍不变的光速和时空理论。第四篇论文利用狭义相对论的结论延申出质能等价原理，得出著名的质能方程表达式E=mc^2，从此开启了人类对于原子能的利用。这四篇论文与量子力学和爱因斯坦后来的广义相对论一起构成了现代物理学的基础。"
 verrier.91.g: "所以，万物都是相对的？"
 verrier.92.t: "爱因斯坦移居至[ROOT.GetCountry.GetNameNoFlag]"
 verrier.92.d: "著名物理学家阿尔伯特·爱因斯坦被我国的一所大学聘为教授——他接受了。"
 verrier.92.f: "阿尔伯特·爱因斯坦是一位出生于德国的理论物理学家，被公认为有史以来最伟大、最具影响力的物理学家之一。他创立了现代物理学的两大支柱的相对论及量子力学。他在科学哲学领域颇具影响力。爱因斯坦出生于德意志帝国，于1895年移居瑞士，次年放弃了德国国籍。1901年，他获得了瑞士国籍，应马克斯·普朗克和瓦尔特·能斯特的邀请，爱因斯坦于1914年回到德国担任威廉皇家物理研究所的第一任所长（1914‑1932）兼柏林大学教授，而且不需要在课堂担任教职。很快地，他当选为普鲁士科学院院士。1916年，又获选为德国物理学会的会长（1916‑1918）。1933年1月，纳粹党攫取德国政权，希特勒成为德国总理。那时，爱因斯坦正在美国，由于纳粹党鼓吹反犹太主义，爱因斯坦知道他无法返回德国，1940年，爱因斯坦正式获得美国公民身份。"
 verrier.92.g: "欢迎！"
 verrier.93.t: "爱因斯坦重力场理论"
 verrier.93.d: "阿尔伯特·爱因斯坦凭借革命性的理论再次改变了我们对引力和整个宇宙的看法。"
 verrier.93.f: "广义相对论是现代物理中基于相对性原理利用几何语言描述的引力理论。该理论由阿尔伯特·爱因斯坦等人自1907年开始发展，最终在1915年基本完成。广义相对论将经典的牛顿万有引力定律与狭义相对论加以推广。在广义相对论中，引力被描述为时空的一种几何属性（曲率），而时空的曲率则通过爱因斯坦场方程和处于其中的物质及辐射的能量与动量联系在一起。爱因斯坦的广义相对论理论在天体物理学中有着非常重要的应用。比如它预言了某些大质量恒星终结后，会形成时空极度扭曲以至于所有物质（包括光）都无法逸出的区域，黑洞。有证据表明恒星质量黑洞以及超大质量黑洞是某些天体例如活动星系核和微类星体发射高强度辐射的直接成因。光线在引力场中的偏折会形成引力透镜现象，这使得人们可能观察到处于遥远位置的同一个天体形成的多个像。"
 verrier.93.g: "这个男人是个天才。"
 verrier.94.t: "爱因斯坦离开了"
 verrier.94.d: "由于我国政局变动，著名物理学家阿尔伯特·爱因斯坦今天交出护照离开我国了！"
 verrier.94.f: "阿尔伯特·爱因斯坦以其对相对论的发展和他在物理学领域的工作而广为人知。然而，由于他广泛参与世界各地的政治、社会活动，至20世纪中叶大众对其政治倾向产生了浓重的兴趣。爱因斯坦是率直的和平主义者与国际主义者。在魏玛共和国期间，他成为反犹太团体的眼中钉，时常受到恶毒毁谤。爱因斯坦还强烈支持社会锡安主义，努力促进以色列‑阿拉伯合作。他支持在英属巴勒斯坦托管地建立犹太人家园，但是，他最初时极力反对建立一个有边界、军队和世俗权力的犹太国家，他青睐文化锡安主义，主张以一国两族的形式建立以色列‑阿拉伯二族混居的国家。爱因斯坦的政治观倾向于社会主义，对资本主义持批判态度，这些在他撰写的文章《为什么选择社会主义？》里有详细陈述。他对布尔什维克的看法也随着时间而改变。1925年，他批评他们没有“规范良好的政府体系”，并称他们的统治是“恐怖政权和人类历史上的悲剧”。"
 verrier.94.g: "我们不需要他"
 verrier.95.t: "爱因斯坦，政治家"
 verrier.95.d: "物理学家阿尔伯特·爱因斯坦已经获得了国内和国际的认可，很显然他正在考虑积极参与政治。"
 verrier.95.f: "1918年，爱因斯坦曾是自由主义党派德意志民主党的创始人之一。由于他广泛参与世界各地的政治、社会、学术活动，在20世纪中叶人们对他的政治倾向产生了浓厚的兴趣。阿尔伯特·爱因斯坦是和平主义者和人道主义者，也是全球联邦制和世界法的拥护者。爱因斯坦晚年的政治观倾向于社会主义，对资本主义持批判态度，这些在他撰写的文章《为什么选择社会主义？》里有详细陈述。他对布尔什维克的看法也随着时间而改变。1925年，他批评他们没有“规范良好的政府体系”，并称他们的统治是“恐怖政权和人类历史上的悲剧”。他是一位率真的和平主义者和国际主义者，而当时许多人因德国纳粹主义的兴起而保持沉默。爱因斯坦一生都是和平主义者，他认为战争阻碍了人类进步。"
 verrier.95.g: "他是一个重要的公众人物"
 verrier.95.h: "他是个学者，不是政治家"
 verrier.100.t: "天文台"
 verrier.100.d: "最重要的天文统计数据概述。"
 verrier.100.planets: "以下#G [GetGlobalVariable('verrier_planets_number').GetValue]#!天体被认为是太阳系中的#T 行星#!：\n"
 verrier.100.mercury: "\n#V 水星#!，自古为人所知。"
 verrier.100.venus: "\n#V 金星#!，自古为人所知。"
 verrier.100.earth: "\n#V 地球#!，又称泰拉，是我们的家园"
 verrier.100.mars: "\n#V 火星#!，自古为人所知。"
 verrier.100.jupiter: "\n#V 木星#!，自古为人所知。"
 verrier.100.saturn: "\n#V 土星#!，自古为人所知。"
 verrier.100.moon: "\n\n#T @verrier_moon_photo!月球照片#!收藏：#G [ROOT.Var('verrier_moon_photo').GetValue]#!/#BLUE 10#!。\n"
 verrier.100.comets: "\n#T @verrier_comet!大彗星#!目击：#G [ROOT.Var('verrier_great_comet').GetValue]#!/#BLUE [GetGlobalVariable('verrier_total_verrier_great_comet').GetValue]#!。\n"
 verrier.100.objects: "\n国际天文学界已经发现了总共#BLUE [GetGlobalVariable('verrier_total_astronomical_objects').GetValue]个#!@verrier_astronomicalobject![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]，其中我们发现了#G [ROOT.Var('verrier_astronomical_objects').GetValue]个#!。\n"
 verrier.100.no_galaxies: "\n银河系包含了#E 整个宇宙#!。仙女座星云这样的现象#E 只是气体云#!。"
 verrier.100.galaxies: "\n银河系只是组成宇宙的#E 许多星系之一#!。安德洛美达星云这样的幻影实际上是#E 其他星系#!。"
 verrier.100.sun_center: "太阳位于银河系的#E 中心#!。"
 verrier.100.sun_outer: "太阳位于银河系的#E 外围#!。"
 verrier.100.g: "历经艰难终成大业"
 verrier.100.h: "拜访[concept_verrier_astronomer]！"
 verrier.100.i: "告诉我哪些国家发现的天体数最多！"
 verrier_leave_observatory_tt: "你将离开天文台"
 verrier.101.t: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]"
 verrier.101.d: "我们的[concept_verrier_astronomer]，[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]，为揭开星空的奥秘而不懈努力。"
 verrier.101.g: "历经艰难终成大业"
 verrier.101.h: "回到天文台"
 verrier.111.t: "天空的奇迹"
 verrier.111.d: "约瑟夫·约翰·冯·利特罗是欧洲仍然在世的最重要的天文学家之一。他出版了一部天文学的典范作品。"
 verrier.111.f: "约瑟夫·约翰·冯·利特罗是一位奥地利天文学家，也是维也纳新大学天文台的创建者。作为大学天文台的主任和1838年起的教务长，他在1825年之前彻底了重建过时的天文台，并配备了优良的中型仪器。1834年至1836年，利特罗出版了科普读物《天空的奇迹》，在短短几年内印刷了14000本。这部三卷本著作成为天文学的文学经典，并使利特罗成为19世纪德语区最脍炙人口的天文学家。利特罗最初计划将他的《天空的奇迹》作为一部完整天文学历史的终章出版。然而，他未能完成这个项目，而他的天文史仍然是手稿。利特罗于1840年11月去世。"
 verrier.111.g: "这本书很有实践价值"
 verrier.111.h: "这本书很有理论价值"
 verrier.111.i: "这本书很有教育价值"
 verrier.112.t: "波恩星表"
 verrier.112.d: "普鲁士天文学家提出了一份内容丰富的星表，其中列举了以前不为人知的天体。"
 verrier.112.f: "波恩星表（Bonner Durchmusterung，BD）是一个星表（或者从中得出的36张图集），基于对北半球天空的视觉天体测量而建立。该测量由[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]在波恩大学波恩天文台进行，得到了阿道伯特·克吕格和爱德华·舒恩菲尔德的支持，并在1846年至1863年期间完成并出版。测量的范围是在赤纬89°至−2°之间，亮度达到9.5等星（有时达到10等星）的大约324198颗恒星。这是使用一台由约瑟夫·冯·夫琅和费制造的有7.7厘米口径和65厘米焦距的彗星发现仪进行的。"
 verrier.112.g: "好！"
 verrier.112.h: "毫无意义，[SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName]会发现更多的天体！"
 verrier.113.t: "火星运河"
 verrier.113.d: "我们的一位天文学家在观察我们红色的相邻恒星时有了一些奇怪的发现。"
 verrier.113.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]被认为是他那个世纪最敏锐的[concept_verrier_astronomer]，以观测水星、金星和火星而闻名。在后者上，他在1877年发现了一些细小的沟壑，很快被媒体称为火星运河，它们被研究了80年之久。这些线性结构接近于当时30至50厘米镜头望远镜的可见极限，需要特殊的观测经验。直到1879年的下一次火星冲时，其他天文学家才证实了它们的存在。[SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName]认为它们是自然形成的，长达2000公里，宽约100公里的直线性凹陷，水可以通过这些凹陷在原本干燥的表面上扩散。然而，一次错误的英语翻译（把channel翻译成了canal）让许多记者误以为这是工程结构。这导致了科幻小说流传了几十年的火星人神话。"
 verrier.113.g: "一个惊人的发现"
 verrier.113.h: "我们必须培养一名将军来对付未来的火星威胁！"
 verrier.113.i: "也许我们可以用[SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName]来命名更多东西！"
 verrier.114.t: "哈雷彗星"
 verrier.114.d: "哈雷彗星在大约 75年后会再次出现在天空中。"
 verrier.114.f: "哈雷彗星是有名的短周期彗星，每隔75‑76年就能从地球上被观测到，亦是唯一能用肉眼直接从地球看到的短周期彗星，人的一生中可能经历两次其来访。至少在公元前240年，或在更早的公元前466年，哈雷彗星返回内太阳系就已经由天文学家观测和记录到，但是当时的观测者并不知道这是同一颗彗星的再出现。英国天文学家爱德蒙·哈雷最先使用开普勒第三定律估算出他的周期，1758‑1759年彗星再次来临的时候，这颗彗星被命名为哈雷彗星，以纪念哈雷的工作。1910年回归时，哈雷彗星有了照片和光谱纪录。美国幽默作家马克吐温出生于1835年11月30日，恰好在彗星近日点后两周，在他1909年出版的自传中，他写下如下文字：我在1835年与哈雷彗星同来。明年它将复至，我希望与它同去。如果不能与哈雷彗星一同离去，将为我一生中最大的遗憾。上帝曾经说过：“现在这里有两个怪胎，他们一同来，也必将一同去。”1910年4月19日彗星果然出现，他也在第二天辞世。"
 verrier.114.g: "75年后见！"
 verrier.115.t: "勒梅特的宇宙膨胀理论"
 verrier.115.d: "一位天主教神父撰写了一篇有关宇宙起源的革命性论文，或许会改变我们之前的看法。"
 verrier.115.f: "乔治·勒梅特是比利时天主教神父、理论物理学家、数学家、天文学家和鲁汶天主教大学物理学教授。他在《原始原子的假设》首先提出了宇宙大爆炸起源论，指出宇宙学红移可通过宇宙膨胀来解释，并于1927年估算了哈勃常数。这项理论后来被爱德文·哈勃的观察所证实。故相关发现以前被命名为哈勃定律，直到2018年10月经国际天文联合会表决通过更改为哈勃–勒梅特定律，以纪念勒梅特的贡献。1927年，勒梅特受广义相对论启发，在《布鲁塞尔科学学会年鉴》上以法语发表了名为“将银河外星云的径向速度考虑在内，均质宇宙的质量不变、半径不断增加”的论文，提出宇宙不是静止的，而是在不断地膨胀。"
 verrier.115.g: "所以，“大爆炸”是耶稣会士编造的？我就知道！"
 verrier.116.t: "量子力学"
 verrier.116.d: "物理学家[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]的量子理论永久地改变了人类对原子和亚原子过程的理解。"
 verrier.116.f: "“他天性保守，毫无革命精神，对猜测持怀疑态度。然而，他对事实逻辑推理近乎强制的信仰是如此强烈，以至于他毫不犹豫地宣布了最革命的想法，这个想法曾经震撼了物理学。” ——马克斯·玻恩论马克斯·普朗克\n\n他新的推导的中心假设是现在被称为称为普朗克假设，即电磁能量只能以量子形式发射。物理学家称这些量子为光子。这种与经典物理不兼容的假设被认为是量子物理学的诞生与普朗克职业生涯中最伟大的成就。普朗克常数的发现使他能够定义一个新的基于基本物理常数的通用物理单位集，其中许多基于量子理论。为了表彰普朗克对物理学新分支的基本贡献，他被授予1918年的诺贝尔物理学奖。"
 verrier.116.g: "历史性的重大科学突破！"
 verrier.116.h: "这位杰出人士应该为我们工作！"
 verrier.117.t: "超越银河系"
 verrier.117.d: "天文学家[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]证明，许多以前被认为是尘埃和气体云并被归类为“星云”的物体实际上是银河系以外的星系"
 verrier.117.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]是一位美国天文学家，他在外星系天文学和观测宇宙学的建立中发挥了关键作用。哈勃提供证据表明遥远星系的退行速度与它们和地球的距离成正比，这一属性现在被称为“哈勃定律”，尽管它两年前已被乔治·勒梅特提出。哈勃利用位于威尔逊山的胡克望远镜发现了造父变星，这是亨利埃塔·利维特发现的一种标准烛光。比较它们的表观亮度和内在亮度可以确定它们距离地球的距离。哈勃在几个星云中发现了造父变星，包括仙女座星云和三角座星云。他于1924年进行的观测明确证明这些星云远远超出了银河系的范围，实际上是一整个星系，因此今天它们不再被认为是星云。哈勃还设计了最常用的星系分类系统，根据星系在照片中的外观将它们分组。他将不同类型的星系排列在后来被称为哈勃序列的系统中。"
 verrier.117.h: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName]将成为为我们所用！"
 verrier.118.t: "核物理学"
 verrier.118.d: "欧内斯特·卢瑟福之后所做的研究工作摸清了核过程的原子核结构本质和放射性衰变。"
 verrier.118.f: "欧内斯特·卢瑟福是一位新西兰物理学家，被誉为核物理学之父。除了在自己的祖国工作外，他的职业生涯中有相当长时间是在加拿大和英国度过的。在早期的研究中，卢瑟福发现了放射性半衰期的概念、放射性元素氡，并区分并命名了阿尔法辐射和贝塔辐射。这是他于1908年获得诺贝尔化学奖的基础，以表彰他对元素分解和放射性物质化学的研究。卢瑟福移居英国，在那里他和托马斯·罗伊德斯证明了阿尔法辐射是氦原子核。随后他提出了原子的电荷集中在一个非常小的核中的理论，从而通过他对汉斯·盖格和欧内斯特·马斯登的金箔实验的发现和解释开创了卢瑟福原子模型。他进行了第一次人工诱导的核反应实验，用阿尔法粒子轰击氮原子核，发现了一种名为质子的亚原子粒子的发射。"
 verrier.119.t: "元素周期表"
 verrier.119.d: "化学家德米特里·门捷列夫发现了一种版本的元素周期表。"
 verrier.119.f: "1863有56个已知的元素，而新元素的发现速度大约为每年一个。其他科学家此前已经发现了元素的周期性。1867年成为教师后，门捷列夫写了《化学原理》，并成为当时的权威教科书。该书在1868年至1870年间出版了两卷，门捷列夫在编写课本的同时写了这本书。在试图根据化学性质分类元素时，他发现了一些规律，这使他构想了他的周期表。他声称在梦中看到了所有元素的完整排列：“我在梦中看到了一张表，所有元素都按照要求排列。醒来后，我立即在一张纸上写下了它，只有一个地方后来需要改正。”通过按照这种模式添加其他元素，门捷列夫发展出了他的扩展版周期表。门捷列夫在一份俄语杂志上发表了他的所有已知元素的周期表，并预测了几种新元素以加以补充。"
 verrier.120.t: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]"
 verrier.120.d: "法国最著名的[concept_verrier_astronomer]写了一本关于太阳系天体的纲要。"
 verrier.120.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]是一位法国天文学家和数学家，专注于天体力学，并以仅凭数学预测了海王星的存在和位置而闻名。这些计算是为了解释天王星轨道和开普勒‑牛顿定律之间的差异。勒维耶将坐标发送给柏林的约翰·戈特弗里德·加勒，要求他进行验证。加勒在收到勒维耶的信后同一晚找到了海王星，距离预测位置仅相差1°。此后，勒维耶承担了“……在单一作品中涵盖整个行星系统，尽可能使一切协调，否则，确定有尚未知的摄动原因……”的任务，这将是他余生致力的工作。勒维耶开始重新评估被称为摄动函数的行星摄动计算技术，到第7阶导出。这个推导结果包括469个数学术语，于1849年完成。接下来，他收集了自1750年以来行星的位置观测数据。检查这些数据并校正与最新数据的不一致性，直到1852年。这些表格构成了法国国家经度局的天文年历《时间的知识》的基本历法，一直使用到约1912年。"
 verrier.120.h: "他应该为我们服务。"
 verrier_congress_attend_modifier: "参加天文大会"
 verrier.121.t: "发现义神星"
 verrier.121.d: "普鲁士业余天文学家卡尔·路德维希·亨克偶然发现了一颗新行星，并将其命名为“义神星”。"
 verrier.121.f: "卡尔·路德维希·亨克实际上曾是一名邮政秘书，退休后投身于天文学爱好。1845年12月8日，他发现了太阳系第五颗小行星“义神星”。这距离最近的一颗行星“灶神星”被发现已经过去了近40年。普鲁士国王为他的这一发现颁发了每年1200马克的退休金。义神星的发现应该是小行星带进一步发现的前奏，也是海王星发现之前最后一次重大天体发现。与此同时，义神星也引起了人们的怀疑，这种太空中的小天体是否真的配得上“行星”这个名称。当时，亚历山大·冯·洪堡建议将天体归入自己的类别：小行星。"
 verrier.121.g: "第十二颗行星！"
 verrier.122.g: "现在似乎每一块出现的岩石都被宣布为行星。"
 verrier.200.t: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]确定天鹅座61号的距离为11.4光年"
 verrier.200.d: "宇宙一下子变大了许多。利用61号天鹅座恒星的视差，[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]确定了该恒星的距离为11.4光年。这项技术将使宇宙研究取得巨大进步。"
 verrier.200.f: "1836年，德国天文学家弗里德里希·威廉·贝塞尔使用了视差法，首次成功测定了一颗恒星的距离（利用地球的运动来记录一颗固定恒星与背景的相对位置）。\n\n然后就可以根据位置的变化计算出距离。"
 verrier.200.g: "天文学的伟大一天！"
 verrier_modern_astronomy_invented_modifier: "首次测量恒星的距离"
 verrier.201.t: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]发现夫琅和费线的成因"
 verrier.201.d: "长期以来，人们对太阳光谱中黑色细线的成因有着诸多猜测。[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]博士现在终于找到了原因：特定的化学元素导致了这些线条的出现。这为我们提供了一种找出恒星上存在的元素的方法。"
 verrier.201.f: "约瑟夫·夫琅和费于1813年注意到太阳光谱中存在明显的线条。数十年后，古斯塔夫·罗伯特·基尔霍夫和罗伯特·本生发现了这些线条的成因。通过燃烧各种元素和化合物时，他们发现这些元素会吸收光谱的特定部分。因此，他们认为吸收特定部分光谱是恒星外部元素或化合物存在的证据。\n\n光谱学不仅可以根据恒星的类型对其进行分类，还可以对材料与化学品进行光谱分析。氦元素的发现也要归功于对太阳进行的光谱分析。"
 verrier.201.g: "又一个宇宙之谜被解开了！"
 verrier.1001.t: "塔拉·瓦利·科提的建造"
 verrier.1001.d: "我们的天文台塔拉·瓦利·科提建设进度缓慢。去年，[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]中校被任命为皇家[concept_verrier_astronomer]，希望能加快建设速度。除非我们为塔拉·瓦利·科提提供资金支持，否则建造工程可能还需要几年时间。但首要问题是，我们是否还想继续建造这座天文台。"
 verrier.1001.f: "塔拉·瓦利·科提是纳西尔·丁·海德尔国王委托建造的一座天文台，他对天文学和占星术很感兴趣，甚至曾在加尔各答学习过天文学。\n塔拉·瓦利·科提也译作“星空大厦”于1832年开始建造，历时9年于1841年竣工。它只使用了几年，后来在印度叛乱期间被用作总部。随后，它被用作银行。"
 verrier.1001.g: "在[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]下，我们将看到快速的进展！"
 verrier.1001.h: "這簡直是浪費錢！"
 stop_constructing_tara_wali_kothi_tt: "我们不会再继续修建塔拉·瓦利·科提！"
 verrier.1002.t: "塔拉·瓦利·科提完工"
 verrier.1002.d: "经过多年的建设，塔拉·瓦利·科提终于完工，它将容纳最新的天文仪器，并引导我们进行伟大的发现。"
 verrier.1002.f: "[ROOT.GetCountry.GetRuler.GetFullName]正透过大望远镜寻找恒星和行星。现在，塔拉·瓦利·科提终于建成了，这座建筑将容纳[ROOT.GetCountry.GetName]最伟大的思想，并为学生们提供天文课程，这是迈向未来的一大步。"
 verrier.1002.g: "“星空大厦”将指引我们发现新的天体！"
 je_verrier_tara_wali_kothi: "塔拉·瓦利·科提的建造"
 je_verrier_tara_wali_kothi_reason: "阿瓦德王国正在建造塔拉·瓦利·科提天文台。工程进度会受到不同方面的影响。"
 je_verrier_tara_wali_kothi_goal: "进度必须达到60或更高。"
 je_verrier_tara_wali_kothi_success: "进度等于或高于60。"
 verrier_add_20_tara_wali_kothi_progress_tt: "为塔拉·瓦利·科提天文台的建设增加#p 20进度#!。"
 verrier_add_10_tara_wali_kothi_progress_tt: "为塔拉·瓦利·科提天文台的建设增加#p 10进度#!。"
 verrier_kothe_buy_additional_instruments_button: "购买先进天文仪器"
 verrier_kothe_buy_additional_instruments_button_desc: "为塔拉·瓦利·科提天文台购买先进天文仪器。这将有助于我们提前完成施工。"
 verrier_kothe_employ_physics_teachers_button: "聘用教师"
 verrier_kothe_employ_physics_teachers_button_desc: "为学校聘请教师，教授物理学和天文学的最新发现。这将有助于我们更快地完成塔拉·瓦利·科提天文台项目，并为我们的研究提供动力。"
 verrier_kothe_employ_foreign_engineers_button: "聘用外国工程师"
 verrier_kothe_employ_foreign_engineers_button_desc: "聘请外国工程师为项目建造必要的天文仪器和建筑。这将有助于我们提前完成工程。"
 verrier_kothe_pay_workers_extra_button: "向工人支付额外工资"
 verrier_kothe_pay_workers_extra_button_desc: "为了更快地完成施工，我们会给工人额外的工资。这将有助于我们提前完成施工。"
 verrier.1011.t: "雅典国家天文台的建设已启动"
 verrier.1011.d: "希腊的第一座天文台标志着这个国家在现代化道路上又前进了一步。人们聚集在宁芙山顶，见证这一座希腊民族历史上的新里程碑的落成。[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullNameNoFormatting]在其他政府成员的陪同下出席了集会，并发表了重要讲话，亲自使用望远镜观察了星空，随后和随行人员一道参加了庆祝活动。"
 verrier.1011.f: "在人们的欢呼声中，这座建筑的基石被缓缓放下。这块石头上雕刻着太阳系的图案，这正是这座天文台的目标与理想。\n\n#b 历史背景：#!雅典国家天文台始建于1842年6月26日，这一天正好是日食出现的日子。这一成就的幕后推手是希腊天文学家乔治·康斯坦丁·武里斯，他是当时最享有盛名的希腊科学家之一。\n武里斯曾在奥地利长期居住，与当地的奥地利人和希腊人都有深厚的友谊。他凭借自己的人脉和才华，说服了希腊‑奥地利银行家和企业家乔治·辛纳斯为建设天文台捐赠了巨额资金。为了表彰西纳斯的慷慨捐助，天文台的第一座建筑被命名为辛纳斯楼。"
 verrier.1011.a: "不久之后，我们将能够以前所未有的精度观察星星。"
 verrier.1012.t: "天文学家们开始在雅典国家天文台观测天空。"
 verrier.1012.d: "希腊第一个天文台“雅典国家天文台”的建设今天完成。该天文台是希腊的第一个研究机构，是希腊科学界的一个巨大的里程碑。在其中研究天文学家们将专注于观测太阳、月亮和星星。希望他们的工作将带来天文学领域的新发现。"
 verrier.1012.f: "通过望远镜观测，月亮清晰可见。它看起来很神奇。你甚至可以看到上面的小环形山口。\n\n#b 历史背景：#!该天文台于1856年在希腊天文学家乔治斯·康斯坦丁诺斯·武里斯的领导下开始工作，两年后武里斯因病在维也纳退休。他的继任者约翰·弗里德里希·朱利叶斯·施密特扩建了天文台的图书馆，并观测了许多天体。他的重点观测对象之一是月球。他的主要作品《月球地形图》（Chaptre der Gebirge des Mondes）精确绘制了所有可观测的月球表面。他还注意到林奈环形山出现了形态变化。\n施密特也发表了关于地震学和气象学的研究成果，并试图找到特洛伊遗址。\n\n宁芙山上的天文台至今仍在使用，不过雅典国家天文台又新增了三个天文观测站点，即彭特利天文台、克里奥奈里天文台和赫尔莫斯天文台。"
 verrier.1012.g: "我们会发现什么奇观呢？"
 verrier.1012.h: "我相信沃里斯一定会有重大发现！"
 verrier.1013.t: "奥森大学的第一批学生"
 verrier.1013.d: "奥托国王利用他与欧洲各类科学家的联系，成立了一所新的大学，即奥森大学。大学的许多新教授是希腊人，他们在西方接受了教育。其中一位是天文学家乔治斯·康斯坦丁诺斯·武里斯，他在维也纳的约瑟夫·约翰·冯·利特罗的指导下成为一名博士。这些科学家和学者为希腊带来了至关重要的知识，并教育了新一代的希腊人。现在，大学依然位于建筑师塔马蒂奥斯·克林塞斯和爱德华·绍贝特所设计的建筑里，但将在新的主楼完工之后立刻搬入。"
 verrier.1013.g: "这些知识将帮助我们缩小与列强的差距！"
 verrier.1013.h: "我们不需要外国人的帮助！"
 verrier.1050.t: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]"
 verrier.1050.d: "数学家和天文学家[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]是莱比锡天文台的观测员。就在今年，他出版了最新的天文学著作《天文学原理》。作为一名官方天文学家，他肯定会大有用武之地。"
 verrier.1050.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]既是数学家也是天文学家。他出版了许多有关天文学的书籍，同时还在莱比锡大学教授天文学。在数学方面，他主要研究拓扑学。"
 verrier.1050.g: "太棒了！"
 verrier.1050.h: "他应该成为我们的首席[concept_verrier_astronomer]！"
 verrier.1060.t: "一颗彗星擦过太阳，为哈佛带来滚滚财源"
 verrier.1060.d: "在一颗明亮的彗星在白天也能被看到之后，波士顿市民向哈佛大学捐赠了大量善款。这些钱将用来建造一座天文台。哈佛大学的前任观测员威廉·邦德对即将建造一座现代化的天文台感到欣喜若狂。"
 verrier.1060.f: "威廉·邦德最初是一名钟表匠，同时也是一名业余天文学家。他在自己的第一个家中建造了一个简易天文台，用来测量天空。1839年，他被哈佛大学任命为无薪天文观测员，必须自带设备。在1843年，哈佛大学收到了两万美元的捐款，他才得以建造一座现代化的天文台。\n威廉·邦德成功地发现了土星的卫星希柏里翁，并与他的儿子一起发现了土星的最内环。他还是天体摄影的先驱。他成功地在美国拍摄了第一张恒星照片。"
 verrier.1060.g: "让我们开始建造天文台！"
 verrier.1060.h: "是的，我们肯定会把这笔钱用在天文学上！"
 verrier.1060.i: "我们不需要任何捐款！"
 verrier.1100.t: "工作压力"
 verrier.1100.d: "你的[concept_verrier_astronomer]，[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]，正面临着相当大的压力。或许我们应该给[SCOPE.sCharacter('verrier_astronomer_scope').GetHerHim]放个假？"
 verrier.1100.f: "我必须找到更多星星！明明有那么多！我怎么就找不到别人还没发现的恒星呢？彗星和小行星呢？我总得找到点什么！\n也许找找火星人？等等，火星人是真的吗？还是说火星运河？我不记得了——我的笔记哪儿去了？"
 verrier.1100.g: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]需要休假！"
 verrier.1100.h: "这是[SCOPE.sCharacter('verrier_astronomer_scope').GetHerHis]工作。[SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe|U]拿这份工资就是为了发现恒星，不是为了假期！"
 astronomer_on_break_tt: "你的[concept_verrier_astronomer]将会休假#n 1#!年。这段时间内你不会收到任何通常事件。"
 verrier.1101.t: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]博士疯了吗？"
 verrier.1101.d: "你的[concept_verrier_astronomer]，[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]，正在忘记越来越多的事情。也许是时候让[SCOPE.sCharacter('verrier_astronomer_scope').GetHerHim]卸下天文学家的职责了？"
 verrier.1101.f: "我把笔记放哪儿去了？等等，午餐又去哪了？望远镜上的怪东西是什么？是……我的午餐吗？\n等一下，这是什么味道？着火了？怎么回事！？"
 verrier.1101.g: "我不认为[SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe]应该继续工作。"
 verrier.1101.h: "哈，太正常了！"
 verrier.1110.t: "失踪的双子星"
 verrier.1110.d: "我们的[concept_verrier_astronomer]，[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]，肯定自己发现了两颗在夜里看起来一模一样的双星。当其他天文学家试图寻找这两颗星时，却只能找到一颗。看来[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]眼睛可能有严重问题——或者是酒精的问题。"
 verrier.1110.f: "我发誓！那里还有第二颗星星！清晰可见！完美的孪生兄弟！它一定是消失了！也许我的同事在撒谎！谁知道呢！"
 verrier.1110.g: "[SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe|U]需要回到正轨！"
 verrier.1111.t: "研究笔记被毁"
 verrier.1111.d: "[concept_verrier_observatory]发生了一起可怕的事故，大火烧毁了我们的[concept_verrier_astronomer][SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]的几本研究笔记。似乎是蜡烛点燃了笔记，但我们不确定为什么[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]没有能够扑灭火焰。"
 verrier.1111.f: "我不知道这是怎么发生的！我当时工作很忙，一定是忙着操作望远镜，所以没有注意到！"
 verrier.1111.g: "[SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe]喝醉了吗？"
 verrier.1111.h: "[SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe]嗑药了吗？"
 verrier.1111.i: "[SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe]又精神崩溃了？"
 verrier.1111.j: "[SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe]又忘记蜡烛了？"
 verrier.1112.t: "消失的恒星"
 verrier.1112.d: "几天前，我们的[concept_verrier_astronomer][SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]发现了许多新星。遗憾的是，[SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe]似乎丢失[SCOPE.sCharacter('verrier_astronomer_scope').GetHerHis]对它们的记录，再也找不到这些星星了。我们不知道是它们消失了，还是[SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe]忘记了[SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe]找到它们的地方。"
 verrier.1112.f: "那些笔记在哪里？我到处都找遍了！厨房里、垃圾桶里、书桌上……到处都找遍了！\n星星也不见了！怎么会这样！"
 verrier.1112.g: "希望[SCOPE.sCharacter('verrier_astronomer_scope').GetSheHe]能再次找到星星！"
