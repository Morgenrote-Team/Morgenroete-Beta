 je_verrier_venus_transit_1874: "1874年[SCOPE.sCountry('target').GetName]的金星凌日"
 je_verrier_venus_transit_1874_reason: "百年难遇的星象奇观正悄然临近。届时，金星将如精准的宇宙钟摆般切入日地轨道之间，在璀璨日轮上勾勒出微小的暗影轨迹。全球顶尖天文机构已进入倒计时筹备状态，这场稍纵即逝的\"金星凌日\"盛景，或将为我们丈量太阳系的浩瀚疆域提供新的标尺。\n$mr_divider_for_je$\n本次天文观测行动中，成功率将不断增加。待观测任务完结时，将根据成功率获得修正。成功率越高，修正加成就越高。\n#V 当前成功率：#![GetPlayer.MakeScope.Var('verrier_venus_transit_success_var').GetValue|0+]"
 je_verrier_venus_transit_1874_on_complete_tt: "观测计划完结时存在#n 25%概率遭遇气象扰动#!，该事件将导致成功率降低。任务结束时所获#V 修正#!具体数值将#V 根据成功率生成#!。"
 add_je_verrier_venus_transit_1874_tt: "将#V 1874年的金星凌日#!添加到[GetPlayer.GetName]的日志"
 je_verrier_venus_transit_1882: "1882年[SCOPE.sCountry('target').GetName]的金星凌日"
 je_verrier_venus_transit_1882_reason: "$je_verrier_venus_transit_1874_reason$"
 je_verrier_venus_transit_1882_tt: "将#V 1882年的金星凌日#!添加到[GetPlayer.GetName]的日志"
 verrier.308.t: "1874年的金星凌日"
 verrier.308.d: "天文学家们预计，#ORANGE 1874年#!在澳大利亚‑印度尼西亚‑太平洋地区将会发生一次日食。[ROOT.GetCountry.GetNameNoFlag]科学界呼吁观测本次百年一遇的天文学现象。"
 verrier.308.f: "金星凌日是金星运行到太阳和地球之间，三者恰好在一条直线上时，金星挡住部分日面而发生的天象。该现象约每243年出现4次。与历史上来说，因其精确测量带来的数据结果，可让确立地日之间距离数据研究中中（天文单位意义上）属于重中之重，从而衍生出了一系列的由知名科研机构、科学家们组织起的各类探险与测量科研项目活动。\n1874年的金星凌日对欧洲的学者来说是极其不利的，因其只能在东亚地区才能较长时间观测该现象，而欧洲是无法看见的；还有就是澳大利亚、南太平洋岛屿和南印度洋（尤其是凯尔盖朗群岛）几个地区能短时间观测该现象。尽管如此，欧洲诸国还是派遣了多达60支的探险科考队进行科考。"
 verrier.308.g: "我们不应错过。"
 verrier.309.t: "1882年的金星凌日"
 verrier.309.d: "天文学家们预计#ORANGE 1882年#!南美洲、中美洲和东北美洲地区将再次出现金星凌日。[ROOT.GetCountry.GetNameNoFlag]科学界呼吁进行一次观测本次百年一遇的天文学现象。"
 verrier.309.f: "金星凌日是金星运行到太阳和地球之间，三者恰好在一条直线上时，金星挡住部分日面而发生的天象。该现象约每243年出现4次。与历史上来说，因其精确测量带来的数据结果，可让确立地日之间距离数据研究中中（天文单位意义上）属于重中之重，从而衍生出了一系列的由知名科研机构、科学家们组织起的各类探险与测量科研项目活动。\n1882年的金星凌日相较于1874年的观测更具优势，因其可见区域更为便利。此次凌日现象在整个美洲大陆皆可观测，唯北美北部及东北部除外。"
 verrier.311.t: "筹备金星凌日"
 verrier.311.d: "一场罕见的天文事件即将来临：金星将横越太阳表面。全球各地的天文台和政府已开始筹备观测工作。"
 verrier.311.f: "日期已精确计算至秒。望远镜正在装箱，时钟完成对时。金星即将横越日面。天文学家认为，此次凌日将能精确测量天文单位——太阳系的基本尺度。但观测成败完全取决于可见度，包括地理位置、天气条件和协作水平。"
 verrier.311.g: "我们足不出户就能开展观测。"
 verrier.311.h: "我们得往附属国派考察队才行。"
 verrier.311.i: "我们的队伍要远行了。"
 verrier.311.j: "这得三思而后行。"
 verrier.319.t: "天空下的异国之眼"
 verrier.319.d: "为观测百年难遇的金星凌日奇景，[SCOPE.sCountry('verrier_venus_transit_leader').GetName]派遣的科学考察团已抵达我国。"
 verrier.319.f: "科考团卸下满载透镜、时计和星图的木箱后，其发言人旋即与校方代表会谈，提议开展学术通信并共享技术报告。天文台助理研究员们兴致盎然，媒体虽未置褒贬却密切关注。\n\n此事已引发多部门激辩：科学合作诚然可期，但观测数据的归属、成果署名的先后以及聚光灯应照何人却难以定夺。"
 verrier.319.g: "愿科学成为我们共通的语言。"
 verrier.321.t: "不好！风暴来袭！"
 verrier.321.d: "科考船队穿越航道时突遭暴风袭击。在惊涛拍舰、缆绳崩裂的混乱中，多箱设备——包括至关重要的凌日观测仪——被怒涛卷入深海。"
 verrier.321.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]紧抓着栏杆，天空仿佛碎裂开来。大海如敌般咆哮，将缆绳和木桶抛过甲板。两个货箱划出骇人的弧线，随即消失在漆黑之中。\n\n风平浪静后，清点损失：主测日仪、柯尼斯堡制的双合透镜、若干精密时计……\n\n[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士站在浸透海水的船员和破碎的木板之间，凝视着仪器曾经所在的位置。还有备用设备，但无一幸免于难。\n\n而时间——如金星般——不等人。"
 verrier.321.g: "继续吧，这些就够了。"
 verrier.322.t: "光自何处来？"
 verrier.322.d: "在进行夜间星场校准时，科考队的天文学家观测到异常运动轨迹和本不该存在的固定光点。进一步对照现有星图后确认：该团队可能发现了新的、未被记录的天体。"
 verrier.322.f: "科考船在丝绒夜幕中随波轻荡。破晓前散尽的云翳，留下纯净到近乎虚幻的清澈天幕。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士再次俯身目镜——在牛郎星与六分仪网格边缘之间，有物体在移动：速度太慢不似彗星，轨迹太稳不似误差。\n\n夜复一夜，[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe]回到同一片天区，绘图、计算、比对。最终，[ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis]在记录上写下：一个（很可能是两个）未被编目的微小天体。\n\n金星凌日尚需等待，但星空已赐予了别的礼物。"
 verrier.322.g: "让世人都知晓吧！星空的秘密是无穷的！"
 verrier.323.t: "星辰之间的花园"
 verrier.323.d: "科考队在航程间歇时深入内陆，试图寻找适合天文观测的制高点。然而他们发现的却是一片陌生植物群——现有植物志中均无记载。"
 verrier.323.f: "一切始于某种气息——清冽如柑橘，自林缘蕨丛中幽幽浮现。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士循香穿过密林，最终抵达一处光晕如水潭般氤氲的林间空地。\n\n那里，深紫色的花茎以完美螺旋状绽放，赤红苔藓覆满黑曜石般的岩表，高处悬垂的藤蔓如星簇摇曳。无人能识得这些物种。\n\n一位年轻助手低语：“疑是银河落九天。”\n\n他们为追逐金星而来，却在凝滞的空气与滤透的光线中，邂逅了另一种奇迹。"
 verrier.323.g: "采集样本，以备研究。"
 verrier.324.t: "有石自远方来"
 verrier.324.d: "科考队在勘测高地观测点时，意外发现了一处极具地质学研究价值的场地。周边岩体呈现出极为罕见——甚至可能从未被记录过的纹路与包裹体。"
 verrier.324.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士的手指抚过岩层裸露的断面。晨光下，那些嵌着金属光泽裂隙的岩面泛着微光，深绿色漩涡环绕橙色晶体核心，构成近乎刻意为之的图案。\n\n近旁另一块石板显露出一个中空的化石气泡，保存完好。队中地质学家提出火山成因说，另一人却摇头：\"这比我见过的任何样本都要古老。\"\n\n他们携带的仪器本为观测苍穹而造，但此刻，靴底之下的岩层中，封存着地球自身的深远记忆。"
 verrier.324.g: "我们发现了地球的故事……"
 verrier.325.t: "通往天空之障"
 verrier.325.d: "科考队已抵达入境口岸，但当局海关拒绝立即放行。数箱科学设备被扣留待检，官僚们还要求提供此前从未被要求过的额外文件。"
 verrier.325.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士站在货物清单旁，牙关紧咬。那些镜头、精密时计、抛光黄铜镜筒——如今全都无声地躺在铁门紧锁的仓库里，等待着一纸文书和几个印章。\n\n海关官员礼貌而坚决：\"科学设备也不例外，所有外国仪器必须申报、检验并缴税，除非有条约豁免。\"\n\n可他们等不起条约的慢流程。\n\n窗外，太阳照常升起。而金星，从不为官僚程序等候。"
 verrier.325.g: " 花点钱润滑一下。"
 verrier.340.t: "万事俱备"
 verrier.340.d: "经过数周筹备，金星凌日观测站终于落成。仪器完成校准，星图悉经验证。此刻唯一的变数，唯有天意。"
 verrier.340.f: "如灯塔般矗立的黄铜穹顶，静默而坚定。无论是在故国的石砌观测台，还是异邦的帆布铆钉帐篷，此刻都蔓延着屏息凝神的期待。\n\n室内，测日仪在灯光下泛着微光，齿轮轻声转动，时计滴答作响。室外，助手们拂去镜片上的尘埃，连空气都仿佛凝固。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士站在门边，手指轻触门槛。数月筹备皆为此刻，而今万事俱备，只待天时。在他们头顶不可见的苍穹某处，金星正沿着既定轨道如期而至。"
 verrier.340.g: "精准始于沉稳之手。"
 verrier.341.t: "安静的调整"
 verrier.341.d: "[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]博士提出对主望远镜内部稳定器进行一项微小但关键的改进。该调整可降低内部振动，并在凌日接触瞬间提升光学清晰度。"
 verrier.341.f: "这一发现并非诞生在观测穹顶下，而是在后方的工作帐篷里。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士正埋头核对星图时，[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]博士拿着沾满油渍的笔记本来访，提出了缓冲张力重算方案和黄铜内环支架的改进设计。\n\n其他成员起初带着敬意的怀疑聆听——直到测试证明：成像稳定度提升了零点几度。这微小的改进，恰恰是模糊与清晰的分水岭。"
 verrier.341.g: "微调见真章。"
 verrier.342.t: "清晰方程"
 verrier.342.d: "电磁理论的最新突破使得一种新的光学滤波方法能够应用于望远镜的观测方案。现在可以更好地打消大气光散射的干扰，从而获得更清晰的视觉数据。"
 verrier.342.f: "这个想法并非源自上层，亦非源自透镜制造师的工作台，而是源于一页纸。它是对波动方程的改进——光的行为不再仅仅是粒子或射线，而是振荡场。有了它，人们可以预测一种新的干涉模型，并进行修正。滤光片被重新裁剪。曝光时间被调整。工程师们重新核实了他们的疑虑。\n\n那天晚上，当[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士透过镜头观察时，星星不再闪烁。它们屹立不倒——精准、冰冷、真实，天空停止了颤动。"
 verrier.342.g: "数学使人眼光敏锐。"
 verrier.351.t: "1874年金星凌日"
 verrier.351.d: "从横滨到留尼汪岛，从凯尔盖朗岛到北京，跨越大洲大洋的天文学家们见证了金星凌日的景象，许多团队成功报告了1874年的金星凌日。"
 verrier.351.f: "工程师、植物学家、制图师乘轮船、骑骆驼、乘火车、徒步而来，他们在丛林和沙漠中建造天文台。他们研究天气，记录阴影，抛光镜片，直到它们在手中颤抖。\n\n1874年12月9日，他们连续六个小时观察着一个黑点在日面滑过。金星悄悄地进入，又像秘密般离开。测量结果并不完美，但足够了。三角测量可以开始了。人类或许第一次知道了太阳系的真实规模——不是通过神话或隐喻，而是通过数字。\n\n[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士合上[ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis]笔记本，长舒一口气：完成了。"
 verrier.351.g: "真是太美妙了！"
 verrier.352.t: "1882年金星凌日"
 verrier.352.d: "1882年12月6日，金星再次掠过太阳。这是百年来最后一次，全球各地的观测者将他们的仪器对准天空，捕捉到了金星飞行时的黑色圆盘。"
 verrier.352.f: "这一次，船只更早启航，观测台更加坚固，计时器愈发精密。1874年收获的经验指引着每个操作、每道阴影、每次计算。\n\n从新泽西到巴塔哥尼亚，从墨西哥到澳大利亚，整个世界都为日面上那个黑点静止。\n\n[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士调整好最后的滤光片。黑点缓缓滑过炽白光球——没有欢呼，只有沙沙的笔迹声、快门的咔嚓声，以及无声的胜利呼吸。下一次金星凌日还要再等121年，但此刻，人类确确实实丈量了时间本身。"
 verrier.352.g: "我们等不到下次了哟。"
 verrier.353.t: "透过光之帷幕"
 verrier.353.d: "随着期待已久的时刻临近，天气状况却开始恶化。云层渐厚——虽不至于完全遮蔽天象，却足以影响观测清晰度与时间记录精度。"
 verrier.353.f: "天幕并未完全闭合，却已不再顺从。层层游云如纱幔遮蔽日轮，光线明暗不定地起伏。每块镜片都在竭力调焦，每位助手都屏住呼吸。\n\n[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士紧贴滤光片目镜。金星的剪影时隐时现——模糊、折射、在云雾与计算之间起舞。\n\n这并非完美的弧线，亦非教科书式的观测。但终究是数据——是在反复无常的天穹下，来之不易的数据。"
 verrier.353.g: "若天赐残篇，我辈当缀玉成册。"
 verrier.354.t: "移动的残影"
 verrier.354.d: "在金星凌日期间，观测团队不仅捕获了精确数据——更留下了影像。数十张照相底片被连续曝光，最终合成动态画面。人类历史上首次，行星凌日过程被记录为活动影像。"
 verrier.354.f: "它闪烁，它微颤，但它确在移动。在一组处理过的底片上，金星从边缘进入，化作一个完美的黑点滑过日轮。这不再是计算或素描，而是动态——被时间定格的动态。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士站在暗房里，高举提灯，看着这短暂的画面循环往复。六小时的观测，凝结成数秒的奇迹。天文学家们齐齐鼓掌——他们知道自己创造了新历史——苍穹动了。"
 verrier.354.g: "多加分析，以优化行星运动模型。"
 verrier.355.t: "金星进行曲"
 verrier.355.d: "1882年金星凌日引发的世界性热情启发[ROOT.Var('elgar_composer_var').GetCharacter.GetFullName]创作了一首典礼音乐。这首进行曲面向广大听众首演，展现了这一天象的威严，奏响了科学新世纪的节奏。"
 verrier.355.f: "1882年金星凌日一年后，约翰·菲利普·索萨受命为1878年去世的美国物理学家约瑟夫·亨利铜像的揭幕仪式谱写乐曲。作为一名共济会成员，索萨对十分迷恋该组织赋予自然现象的神秘学特质。这首乐曲在索萨生前从未流行过，在乐谱手稿毁于洪水后已多年未被演奏。"
 verrier.355.g: "有些音乐是为历史而非大众而谱写。"
