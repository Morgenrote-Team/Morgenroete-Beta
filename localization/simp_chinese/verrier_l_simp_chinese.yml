 verrier.9000.t: "一名来自密歇根的教师试图乘坐木桶穿越尼亚加拉大瀑布"
 verrier.9000.d: "尝试某种方式穿越咆哮的瀑布近乎疯狂。但在木桶里？还是一个女人？安妮·艾德森·泰勒就有这样的想法。她想坐在木桶里漂下尼亚加拉大瀑布。\n我们应该阻止她的计划，还是让她冒这个险？"
 verrier.9000.f: "“赌五块钱她会淹死！”\n“十块钱赌她能活着到达谷底！”\n\n#b 历史背景：#!曾有许多人试图穿越、漂流或跳下尼亚加拉大瀑布。大多数尝试都以死亡告终。幸存者通常会面临罚款和拘留。"
 verrier.9000.g: "制止这个疯子！"
 verrier.9000.h: "与我无关。她想做什么就做什么……"
 verrier_niagara_falls_not_allow_barrel_tt: "阻止这位教师肯定不会发生什么坏事……"
 verrier_niagara_falls_allow_barrel_tt: "也许这位教师会成为第一个在桶中活着穿越尼亚加拉大瀑布的人。但或许她根本活不下来。"
 verrier.9001.t: "安妮·埃德森·泰勒成为首位用木桶穿越尼亚加拉大瀑布的人"
 verrier.9001.d: "尽管许多人认为安妮·埃德森·泰勒的这次尝试将是致命的，但她还是从尼亚加拉大瀑布上落了下来并幸免于难。她受了点伤，流了些血，但并无大碍。不过，她还是警告大家不要尝试同样的行为。当地政府已经起草了一份命令，规定类似的尝试将受到法律惩罚。"
 verrier.9001.f: "“再也没有人应该做这样的事了。”\n\n#b 历史背景：#!安妮·埃德森·泰勒在1901年成功地完成了这一惊险的壮举。然而，她一到达底部，就满身鲜血，并警告可能的模仿者。\n尽管如此，还是有人不顾生命危险，试图做同样的事情。查尔斯·斯蒂芬斯是1920年第一个在尝试中丧命的人。"
 verrier.9001.g: "她很幸运。现在禁止其他人尝试！"
 verrier.9002.t: "安妮·埃德森·泰勒在试图穿越尼亚加拉大瀑布时丧生"
 verrier.9002.d: "许多人预料之中的事情终于发生了。安妮·埃德森·泰勒在试图乘坐木桶穿越尼亚加拉大瀑布时不幸身亡。她似乎活着到达了瀑布底部，但受了重伤。然而，由于无法脱身，她被流入木桶的水淹死了。这当然死得并不漂亮。"
 verrier.9002.f: "“来自密歇根的女士试图在木桶中从大瀑布坠落时丧生。”\n\n#b 历史背景：#!安妮·埃德森·泰勒在1901年的尝试中幸存了下来。然而她到达谷底时流血不止，并警告了可能的模仿者。\n尽管如此，还是有人进行了同样的尝试。1920年的查尔斯·斯蒂芬斯是第一个在尝试中丧生的人。"
 verrier.9002.g: "玩愚蠢的游戏，赢取愚蠢的奖品……禁止任何人再尝试。"
 verrier_barrel_successful_modifier: "成功用木桶穿越尼亚加拉大瀑布"
 verrier_barrel_unsuccessful_modifier: "致命的木桶冒险"
 verrier.9003.t: "尼亚加拉瀑布结冰"
 verrier.9003.d: "寒冷的冬天导致尼亚加拉瀑布逐渐冰封。与此同时，其中一个瀑布下方形成了一座冰桥。人们蜂拥而至观看这一奇观，机智的商人已经在冰面上开设了第一家流动商店。但也有人警告说冰层随时可能破裂。我们应该采取措施保护群众吗？"
 verrier.9003.f: "“好一个冰雪仙境！看起来真是神奇！我相信这冬日仙境将作为美丽的瞬间被永远铭记！”\n\n#b 历史背景：#!北美水域曾反复结冰。尼亚加拉瀑布也不例外。落冰经常在瀑布下形成一座“冰桥”，从19世纪80年代开始，人们聚集在这里，以娱乐和饮酒的方式庆祝民间节日。"
 verrier.9003.g: "我们必须保障安全。封锁冰桥。"
 verrier.9003.h: "人们当然意识到了风险，并会小心谨慎！"
 verrier_niagara_falls_no_security_tt: "你没有封锁冰桥，希望无事发生，但#n 谁知道呢#!……"
 verrier.9004.t: "尼亚加拉瀑布冰桥坍塌——多人死亡"
 verrier.9004.d: "来自尼亚加拉瀑布的噩耗传来。冰桥已经断裂，碎冰以极快的速度顺流而下。桥上的大多数人成功自救，但也有一些不幸者被困在冰墩上。当消防员试图营救时，他们已在咆哮的冰水中丧生。\n人们对[SCOPE.sState('niagara_falls_state_scope').GetName]政府提出了强烈批评，因为这场灾难本可以轻易避免。"
 verrier.9004.f: "“听起来像在开炮，就在大瀑布下的峡谷中，巨大的冰桥突然带着人飞流而下，个别人跳入水中得以自救，在岸上瑟瑟发抖。其他人则因为动作太慢，只能无助地看着巨大的冰块顺流漂下。”\n\n#b 历史背景：#!北美水域曾反复结冰。尼亚加拉瀑布也不例外。从19世纪80年代开始，人们聚集在这里，以娱乐和饮酒的方式庆祝民间节日。1912年，冰桥断裂造成三人死亡，从那时起，游客被警告不要踩踏冰面。"
 verrier.9004.g: "真是一场没有必要的悲剧！"
 verrier.9005.t: "尼亚加拉大瀑布的冰融化了"
 verrier.9005.d: "尼亚加拉瀑布又恢复了平静。冰层只存在了很短的时间，现在已经融化。现在，水流又像往常一样咆哮着涌入盆地。短暂的时光留下的是令人陶醉的回忆和当地一些商人囊中的丰厚利润。谁知道瀑布下次结冰会是什么时候呢？"
 verrier.9005.f: "“有一天，我会告诉我的孩子们，我是怎样站在冰桥上听到一声脆响的。不过幸运的是，这并不是什么坏事。相反，我和我的妻子在冰上跳舞！”\n\n#b 历史背景：#!北美水域曾反复结冰。尼亚加拉瀑布也不例外。从19世纪80年代开始，人们聚集在这里，以娱乐和饮酒的方式庆祝民间节日。1912年，冰桥断裂造成三人死亡，从那时起，游客被警告不要踩踏冰面。"
 verrier.9005.g: "太棒了"
