 verrier.161.t: "来自地球"
 verrier.161.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士提出了一种突破性的假说：月球并非独立形成，而是曾在远古时期从地球分离而出，其成因归结于地球早期的高速自转与潮汐作用。"
 verrier.161.f: "此观点与主流的康德—拉普拉斯模型相左——后者认为地月同源，皆由原始星云凝聚而成。而[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士则大胆推断，月球是从地球外层“甩出”的产物。\n其理论基于角动量守恒原理，并得到潮汐演化的支持。月球低密度和与地球地壳相似的化学组成，也为这一假说提供了间接佐证。即便缺乏直接采样数据，该模型仍为地月关系提供了一种新的机械解释——它不仅是一次天体的诞生，更是一场宇宙级的分娩。"
 verrier.161.g: "令人着迷。"
 verrier.162.t: "被捕获的月亮"
 verrier.162.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士提出了一项突破性假说：月球并非与地球同时诞生，而是来自地球之外，并在某个时刻被引力捕获，成为我们的卫星。"
 verrier.162.f: "这与当前广泛接受的地月共形成模型截然不同。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士认为，月球曾是一颗游荡于太阳系中的自由天体。依据[ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis]的推算，早期地球可能借助大气阻力或三体相互作用，将它牵引至轨道之中。此理论有助于解释月球轨道的倾斜性及其独特的运行轨迹。然而反对者认为，若缺乏特定的动力学条件，此类捕获极难稳定存在。目前尚未发现确切的能量耗散机制支持这一设想。不过，这项理论因其对传统观念的挑战，依然引起了广泛关注。"
 verrier.162.g: "虽为假说，却也值得一探。"
 verrier.163.t: "创世之初的撞击"
 verrier.163.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士提出了一项大胆的地质假说：月球是由地球早期经历的一次剧烈撞击所抛出的地壳物质凝聚而成。"
 verrier.163.f: "面对当前主流月球起源理论中尚未解决的矛盾，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士提出了一个震撼性的替代解释。从其视角出发，在地球初生之时，一颗既非微小陨石、也非行星级天体的巨大物体以倾斜角度撞击了地球。撞击产生的碎片——主要来自地壳——进入轨道后逐渐聚合，最终形成了月球。\n这一设想与月球密度较低、成分与地球地幔相似、以及地月系统的特殊角动量相吻合。虽然该理论仍属推测且难以验证，但它将地质推理与天体力学结合，标志着一种全新的思维范式——它把行星形成看作一场动荡的碰撞史，而非平和渐进的过程。"
 verrier.163.g: "这项理论，或将重塑行星科学的未来。"
