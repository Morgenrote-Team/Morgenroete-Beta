 verrier.300.t: "金星凌日"
 verrier.300.d: "天文学家们预计，#ORANGE 1874年#!在澳大利亚‑印度尼西亚‑太平洋地区将会发生一次日食。[ROOT.GetCountry.GetNameNoFlag]科学界呼吁进行一次[concept_dubois_pacific_expedition]以观测本次百年一遇的天文学现象。"
 verrier.300.f: "金星凌日是金星运行到太阳和地球之间，三者恰好在一条直线上时，金星挡住部分日面而发生的天象。该现象约每243年出现4次。与历史上来说，因其精确测量带来的数据结果，可让确立地日之间距离数据研究中中（天文单位意义上）属于重中之重，从而衍生出了一系列的由知名科研机构、科学家们组织起的各类探险与测量科研项目活动。\n1874年的金星凌日对欧洲的学者来说是极其不利的，因其只能在东亚地区才能较长时间观测该现象，而欧洲是无法看见的；还有就是澳大利亚、南太平洋岛屿和南印度洋（尤其是凯尔盖朗群岛）几个地区能短时间观测该现象。尽管如此，欧洲诸国还是派遣了多达60支的探险科考队进行科考。\n#R 注意：观测金星凌日必须在太平洋探险船队上有一位[concept_verrier_astronomer]。#!"
 verrier.300.g: "我们不应错过。"
 verrier.301.t: "1874年的金星凌日"
 verrier.301.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察#!目睹了金星凌日。\n[SCOPE.sCharacter('rapanui_scientist').GetFullName]更是创下了新的丰碑，看来未来一段时间科学界又要忙碌起来了。"
 verrier.301.f: "1874年的金星凌日现象第一次出现的时间是该年的12月09日，与之前一样，该次金星凌日修正了测量数据并提供了更多天文现象观测机会。许多科考队被派往世界各地观测该次金星凌日，部分国家还成了官方性质的委员会来组织科考活动。以下是组织探险科考队的国家和次数：法国8次、德国3次、墨西哥2次；俄奥意亦有派出探险科考队。法国还将拍摄的照片拼接成一部记录片而闻名世界。"
 verrier.301.g: "壮观的场面。"
 verrier.401.t: "普乌图斯克流星雨"
 verrier.401.d: "马佐夫舍的居民在天空中有所目击."
 verrier.401.f: "坐落于马佐夫舍中心的普乌图斯克小镇，藏着一个来自宇宙的秘密。就在这里，一个寒冷的冬日中发生了一场前所未有的天体事件，永远地将这个宁静的村落与浩瀚神秘的宇宙联系在一起。1868年1月30日，当地居民们毫无预兆地在日常生活中与一场非凡的天文景象相遇。当太阳渐渐落下，夜色布满天幕时，小镇突然陷入一片异常的寂静之中。毫无征兆地，一道璀璨的光芒划破了长空。一颗比太阳还要耀眼的火球，在苍穹中划出一道长长的轨迹。目击者将其描述为一个燃烧的球体，拖着一条发光的尾巴，以雷鸣般的轰响声劈开天空。这颗后来被确认为陨石的火球，在进入地球大气层时发生了剧烈的破碎。成千上万的陨石碎片如同雨点般洒落在普乌图斯克及其周围地区，构成了一场壮观的陨石雨。这一天文现象，被后世称为普乌图斯克陨石雨。"
 verrier.401.g: "多么美妙的景象！"
 verrier.402.t: "The Holbrook Meteor Shower"
 verrier.402.d: "亚利桑那州的居民在天空中有所目击。"
 verrier.402.f: "晚上7点15分左右，当夜幕降临在霍尔布鲁克时，天空突然爆发出一连串灿烂的火球。数百颗大小不一、光彩各异的发光流星划过天际，从一个点出发，向四面八方散开。这些流星留下了亮白色和炽黄色的光迹，形成了令人惊叹的景象。较大的碎片带着炽热的核心，分解成更小的碎片，然后消失在低层大气中。远处传来炮声般的回响，反映出它们碎裂时产生的巨大能量。居民们起初被吓了一跳，但很快就聚集起来，惊叹于这场天文奇观。随后的一次搜寻发现了许多小陨石碎片散落在地面上，主要由铁和镍组成。"
 verrier.403.t: "克尼亚希尼亚流星雨"
 verrier.403.d: "东斯洛伐克的居民在天空中有所目击。"
 verrier.403.f: "克尼亚希尼亚陨石是欧洲历史上最重要的陨石撞击事件之一。在很长一段时间内，这块陨石被认为是世界上最重的石陨石。此次撞击发生在1866年6月9日下午4点到5点之间，地点位于克尼亚希尼亚镇北部的山区。许多目击者的报告后来被记录在绘图中。陨石进入地球大气层时，分裂成了超过1000块碎片。"
 verrier.411.t: "约克角的陨石"
 verrier.411.d: "在地质科考项目中，[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士发现了一个重大的巧事。那就是经过调查发现这块奇怪的石头是来自宇宙的物质组成的。且这石头显著的体积几乎打破了目前发现的记录了。"
 verrier.411.f: "在格陵兰冰冷的广袤土地上，地质学家[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName]发现了约克角陨石，这一天体奇观有望拓展我们的科学视野。这些巨大的铁质碎片长期以来被因纽特人用作工具，现已被确认是外星物质，展示了独特的魏德曼花纹和黄铁矿包裹体。这些陨石重达31吨，为我们提供了前所未有的机会一窥形成太阳系的原始物质。这一发现丰富了我们对早期太阳系形成的理解，并突显了人类历史与宇宙事件之间的深刻联系。陨石被运送到科学机构后，将进行详细分析，揭示宇宙宏伟设计的奥秘。通过研究这些天体遗物，我们加深了对宇宙复杂结构及其与我们位置的欣赏。"
 verrier.411.g: "这是一个不可思议的发现！"
 verrier.412.t: "巴库比里托陨石"
 verrier.412.f: "巴库比里托陨石是墨西哥发现的最大陨石。1863年，地质学家吉尔伯特·埃利斯·贝利在锡那罗亚德莱瓦镇附近的兰奇托村发现了这块铁陨石。它重达20到22吨，长4.25米，宽2米，高1.75米。"
 verrier.413.t: "蒙德拉比拉陨石"
 verrier.413.f: "蒙德拉比拉陨石是一块铁陨石，它在坠落于地球大气层过程中崩解后坠落在了西澳大利亚的纳拉伯平原上。据悉，该陨石来自几百万年前的一场流星雨撞击。其质量为24吨，是世界上最大的陨石之一。也有研究猜测它坠落的时间于6000万年前，也可能是已知世界上最早的陨石之一。"
 verrier.414.t: "威拉米特陨石"
 verrier.414.f: "威拉米特陨石于1902年在美国俄勒冈州被正式发现。然而，它早在几千年前就已经坠落地球。发现时，它被认为是世界上第三大陨石，而今天它是第六大陨石，重达15.5吨。据估算，在过去的13000年里，由于天气影响，陨石减少了约6吨。威拉米特陨石自古以来就被克拉克马斯人崇敬，远在它被移出位于现代俄勒冈州西林恩附近的威拉米特谷之前。1902年，埃利斯·休斯是第一个认识到这块陨石重要性的欧洲定居者。"
 verrier.415.t: "霍巴陨石"
 verrier.415.f: "霍巴陨石是迄今为止在地球上发现的最大陨石。它位于纳米比亚的格鲁特方丹以西约20公里的奥塔维山脉的“霍巴”农场。关于其重量的信息有所不同，介于50到60吨之间。它的原始尺寸为2.70米x2.70米x0.90米。这块铁陨石大约在8万年前撞击地球，并且至今仍保持在原位。其估计年龄在1.9亿到4.1亿年之间。"
 verrier.421.t: "[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName]想要研究陨石"
 verrier.421.d: "感谢我们的天文学家[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName]的不懈努力，他在陨石撞击后的几天内就搜集到了大量的碎片。这可能可以未我们揭开部分宇宙神秘的面纱，但[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士认为该保留[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetSheHe]发现的事物。"
 verrier.421.f: "在维多利亚时代的热潮中，这位天文学家将目光投向天空，发现了陨石碎片。他敏锐的观察力和系统的方法使他能够收集和研究这些天体遗迹。每一块碎片都被仔细分析，帮助深入了解陨石的成分和起源。他的工作体现了维多利亚时代对科学的奉献精神，驱动他的是无尽的好奇心和揭开宇宙奥秘的强烈意愿。"
 verrier.421.g: "所有碎片必须上交科学研究院！"
 verrier.421.h: "[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName]可以研究分析其中一颗陨石。"
 verrier.422.t: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetFullName]想要分析陨石"
 verrier.422.d: "该国的顶尖化学家[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士向政府请愿调查最近发现的陨石样本。当然，将陨石放在他的实验室中可比那些不知所谓的保险箱中安全得多。"
 verrier.422.f: "“外星物质！从未知领域而来！这将是科学界的一次地震，也是独占该陨石研究分析的机会。”"
 verrier.422.g: "为何这些四处奔波的学者们认为能探寻我的陨石？"
 verrier.422.h: "我相信这会推进化学的发展。"
 verrier.1013.f: "乔治斯·康斯坦蒂诺斯·沃里斯，一位知名的[concept_verrier_astronomer]，正在为新建成的大学的第一批希腊学生授课。希腊正在迎来新的时代，这是一个学习和进步的时代。\n\n#b 历史背景：#!该大学于1836年进行规划设计，并于1837年5月3日正式成立。它是希腊主陆的第一所大学。当主楼于1841年完工后，大学被迁至新楼。大学两翼的建设一直持续到1864年。\n奥森大学后来改名为国家大学，因为奥托在1862年的政变后不得不逃离了希腊。\n\n今天雅典大学（全称雅典国立卡波季斯特里安大学）是希腊的首要大学之一。该大学的培养出了两位诗人校友，他们的作品赢得了诺贝尔奖，另外15位希腊总理和3位希腊总统曾在该大学学习。"
 je_verrier_meteorites: "陨石收集"
 je_verrier_meteorites_reason: "陨石，无论是刚刚自天外坠落还是在数百万年后被发现，都为人类提供了关于地球和宇宙历史的迷人见解。足够多的发现能够推动科学进步，帮助我们更深入地理解地球和宇宙的演化过程。"
 je_verrier_meteorites_goal: "找到[JournalEntry.GetTotalGoalValue|V0]颗#!@verrier_meteorite![Concept('concept_verrier_meteorite','$concept_verrier_meteorites$')]。"
