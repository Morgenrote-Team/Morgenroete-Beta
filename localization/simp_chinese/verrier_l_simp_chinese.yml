 verrier.171.t: "铁路时间"
 verrier.171.d: "新科技的兴起不仅重塑了人类对时间的理解，也暴露了其固有的局限。铁路与电报的普及，让人们逐渐意识到：时间并非处处相同。"
 verrier.171.f: "19世纪初期，全球尚未确立统一的时间标准。各地城镇普遍采用本地太阳时——以太阳在当地升至最高点的时刻为正午。这一传统延续数百年，始终无碍，因为交通与通信本就缓慢。然而，随着远程连接日益频繁，地方时差的影响愈发显著：伦敦与布里斯托尔相差约11分钟，纽约与芝加哥则接近一小时。这种时间碎片化严重干扰了列车时刻表的精确协调。\n\n为应对这一问题，英国铁路公司自1840年代起推行“铁路时间”制度。起初，这一时间仅供内部使用，车站仍保留本地时钟。但标准化的效率优势不可阻挡。至1847年，几乎所有主要铁路公司均已采用格林尼治标准时间（GMT）作为统一调度依据，到1855年，全国绝大多数城市已同步采用。铁路时间虽无法律授权，却已成为事实上的国家时间标准。"
 verrier.171.g: "难道时间是由铁路公司和电报站决定的吗？"
 verrier.172.t: "标准时间"
 verrier.172.d: "随着[GetPlayer.GetName]通过立法确立统一时间，此前仅限铁路公司与电报局使用的计时体系，现已正式进入公众日常生活。这一理性化改革显著提升了经济与官僚系统的运作效率，尽管一些地方城镇仍对本地太阳时的消逝心怀感伤。"
 verrier.172.f: "“铁路时间”本质上是后来国家标准时间的实用先驱。它诞生于商业运营的实际需要，而非国家政策推动。直到后期，各国才陆续以法律形式确立全国统一的标准时间，使之成为全社会共同遵循的规范。英国于1880年完成这一进程，德国于1893年正式采用中欧时间，法国则在1911年将法定时间定为格林尼治标准时间加一小时。\n\n“铁路时间”与“国家标准时间”的核心差异在于其范围与强制性：前者是行业内部的协调机制，仅服务于铁路调度；后者则是国家权力主导下的全面时间统一制度。这两项变革也为1884年国际子午线会议最终确立格林尼治为本初子午线奠定了基础。"
 verrier.172.g: "马克斯·韦伯对此类现代性进程，定会有一番深刻剖析。"
 verrier.173.t: "国际子午线会议 "
 verrier.173.d: "在[ROOT.GetCountry.GetCapital.GetCityHubName]举行的会议上，多国代表共同决定：本初子午线将穿过[GetGlobalVariable('verrier_prime_meridian_global_var').GetCountry.GetName]。如今，“[GetPlayer.GetCustom('verrier_prime_meridian_city')]时间”已成为人们热议的话题。"
 verrier.173.f: "国际子午线会议旨在确立一条全球通用的本初子午线，核心议题为：“选择一条经线，作为世界统一的经度起点与计时基准”。最终，会议正式推荐以格林尼治子午线作为国际标准零度经线。这一决定不仅影响了地图绘制，更标志着全球时区体系的诞生——一个必须围绕特定地点组织的时间秩序。\n\n格林尼治之所以胜出，主要归因于英国的全球霸权及其在国际贸易中的主导地位。政治影响力、科技实力、商船队的市场优势、跨大西洋电报电缆的成功铺设、电报与铁路领域的领先企业，以及卓越的天文学家，共同决定了本初子午线的归属。"
 verrier.173.g: "时间，真的能够被全球化吗？ "
 verrier.174.t: "时区"
 verrier.174.d: "在正式确立[GetPlayer.GetCustom('verrier_prime_meridian_city')]为本初子午线、[GetPlayer.GetCustom('verrier_prime_meridian_city')]时间作为全球参考时间后，国际子午线会议将重点转向时区体系的制定。"
 verrier.174.f: "时区划分并未被所有国家接受。美国迅速实施了四时区制度，实现了国内时间的科学分区；然而，许多国家面临挑战。部分国家出于行政统一考虑，坚持全国采用首都所在地的单一标准时间，尽管这导致边远地区出现显著的时间偏差。为更精确地匹配地理与社会节奏，一些国家采用半小时间隔而非整小时划分。更有国家出于政治或战略考量，主动选择偏离其地理时区的官方时间。"
 verrier.174.g: "我们的工作，始终以国际标准为基石。"
 verrier.174.h: "[GetPlayer.GetName]优先考虑的是选择一个符合自身利益的时区，即便这一选择与国际时区体系并不完全一致。"
 verrier_radioactivity_tech: "放射性"
 verrier_radioactivity_tech_desc: "1895年，安东尼·亨利·贝克勒尔因发现底片在无光照条件下变黑，首次揭示了天然放射性的存在。然而，直到约1915年，这一现象才被正式确认为一种基本的物理过程。皮埃尔·居里与玛丽·居里在此领域取得了一系列关键突破，包括发现多种放射性元素，其中部分元素是在衰变链中产生的次级产物。1903年，贝克勒尔与居里夫妇因对放射性现象的开创性研究，共同荣获诺贝尔物理学奖，这一成就被广泛视为现代核科学研究的开端。"
 verrier_spectroscopy_tech: "光谱学"
 verrier_spectroscopy_tech_desc: "光谱学泛指一组物理分析方法，通过对辐射的波长、能量、质量等特性进行分解与检测，来研究物质的组成。其分析结果所呈现的强度分布被称为“光谱”。在发明分光镜之后，罗伯特·本生与古斯塔夫·基尔霍夫利用元素在高温下产生的发射光谱，成功发现了新元素。"
