 ACHIEVEMENT_verrier_moon: "带我飞向月球"
 ACHIEVEMENT_DESC_verrier_moon: "作为美国在69年夏天前飞向月球。"
 verrier_national_space_disaster_modifier: "国家太空灾难"
 verrier_great_national_space_disaster_modifier: "大型国家太空灾难"
 verrier_national_space_success_modifier: "从地球到月球"
 verrier_astronaut_modifier: "宇航员"
 je_from_the_earth_to_the_moon: "从地球到月球"
 je_from_the_earth_to_the_moon_reason: "巴尔的摩火器俱乐部希望建造一门巨炮，将弹丸送上月球。此外，他们还计划制造一个重量为10000千克、壁厚60厘米的铝制榴弹。他们还就长270米、内径2.70米、壁厚1.80米的铸铁炮管达成了一致。这需要有适宜的武器工业和胜任的人员来设计和建造该装置。佛罗里达州似乎是完美的发射地点。由于材料运输的原因，该地区需要自己的铁路线。"
 verrier_baltimore_president_alive_tt: "巴尔的摩火器俱乐部主席，[SCOPE.sCharacter('verrier_club_president').GetFullName]，仍然在世。"
 verrier.131.t: "从地球到月球"
 verrier.131.d: "巴尔的摩火器俱乐部是在[SCOPE.sCharacter('verrier_club_president').GetFullName]的关怀下成立的，被视为枪炮爱好者的娱乐活动。该俱乐部的最新提案已成为全国的头条新闻。"
 verrier.131.f: "巴尔的摩火器俱乐部成立于内战期间，聚集起了一批炮兵专家。内战结束后，该俱乐部的主席[SCOPE.sCharacter('verrier_club_president').GetLastName]和秘书兼工程师[SCOPE.sCharacter('gaudi_engineer_scope').GetFullName]觉得自己失去了用武之地。他们召开了一次会议，以开辟新的活动领域。在发动一场新的战争以使用新武器的提议之后，他们同意了使用大炮将弹丸从地球发射到月球的提议。其中他们计划制造一个重量为10000千克、壁厚60厘米的铝制榴弹。他们还就长270米、内径2.70米、壁厚1.80米的铸铁炮管达成了一致。发射药将使用棉火药。"
 verrier.131.g: "美国将在十年内将第一个人类送上月球！"
 verrier.131.h: "等待下一场战争会安全得多……"
 verrier.132.t: "月球飞行之旅的船员"
 verrier.132.d: "准备工作已经就绪，但仍有一个重要问题：谁应该进入太空舱？"
 verrier.132.f: "人们往往认为用巨大的炮弹将人发射到太空的自杀式任务很难找到志愿者。但对于巴尔的摩火器俱乐部的一些成员来说，这其实是一种莫大的荣誉。主席和总工程师都有权获得一个席位，还有人主张由一位著名的天文学家担任。更谨慎的人则认为，为了不危及人类生命，只应该发射两只狗进入太空作为试验。"
 verrier.132.g: "[SCOPE.sCharacter('gaudi_engineer_scope').GetFullName]，工程师。"
 verrier.132.h: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]，天文学家。"
 verrier.132.i: "[SCOPE.sCharacter('verrier_club_president').GetFullName]，俱乐部主席。"
 verrier.132.j: "让狗上去。"
 verrier.132.k: "所有人一起！"
 verrier.133.t: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]的干预"
 verrier.133.d: "在巨炮建造与安装的最后准备阶段，[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]警告了项目的发起人：根据他的计算，[SCOPE.sCharacter('gaudi_engineer_scope').GetFullName]的计算出现了错误。"
 verrier.133.f: "根据这位知名天文学家的计算，如果按照目前的规模建造大炮并瞄准弹丸，太空舱将很难从地球引力中逃逸。他提出了对建造计划的一些改进，大大提高了这次旅行的成功率。"
 verrier.133.g: "他本可以避免一场灾难。"
 verrier.134.t: "倒数"
 verrier.134.d: "在这期待已久的一天到来之前的夜晚，有多少人彻夜难眠！所有人的心都在不安地跳动。哥伦比亚号准备飞向月球。"
 verrier.134.f: "黎明过后，数不清的人群覆盖了石山周围的大草原，一眼望不到边。铁路每隔一刻钟就会带来新的观光者；根据《坦帕镇观察家报》的报道，佛罗里达州的土地上涌入了不少于500万名观众。月亮在最纯净清澈的天空中冉冉升起，闪烁的星光在她的身影中显得格外耀眼。它越过了双子星座，现在正接近地平线和天顶之间的中点。整个天空沉寂得可怕！大地上没有一丝风！无数观众的胸膛里没有一丝呼吸声！他们的心似乎不敢跳动！所有人的目光都集中在哥伦比亚号张开的炮口上。\n‘三十五！——三十六！——三十七！——三十八！——三十九！——四十！’"
 verrier.134.g: "发射！"
 verrier.135.t: "一场灾难"
 verrier.135.d_humans_dead: "人类的第一次太空任务变成了人类的第一次太空灾难。整个任务是一场巨大的失败！观众感受到了彻骨的恐惧。"
 verrier.135.d_dogs_dead: "整个任务是一场巨大的失败！可怜的动物们遭受的苦难是不幸的，但另一方面，许多人对太空舱里没有人类感到欣慰。"
 verrier.135.f: "当金字塔般的火光升到极高的空中时，耀眼的火光照亮了整个佛罗里达州；刹那间，在该国相当大的范围内，白天取代了黑夜。远在100英里之外的海上也能看到这巨大的火冠，不止一位船长在他的航海日志中记录了这颗巨大流星的出现。哥伦比亚号的爆炸伴随着一场大地震。佛罗里达州被震得摇摇欲坠。火药中的气体受热膨胀，以巨大的力量迫使大气层后退，这股人造飓风就像水柱一样在空中奔腾。\n但是，实验后来失控了：大炮显然无法产生足够的推力将弹丸推进太空。在所有奇妙的效果之后，太空舱失去了速度，冲回了地球，并在一声巨响中坠毁。"
 verrier.135.g: "还是好过《坎巴拉太空计划2》。"
 verrier.136.t: "飞向月球"
 verrier.136.d_humans_in_space: "哥伦比亚号开始取得了圆满成功。人类首次进入了太空！问题是他是否能够返回……"
 verrier.136.d_dogs_in_space: "哥伦比亚号的起航取得了圆满成功。这是人造物体首次进入太空！不幸的是，狗狗们似乎不可能把哥伦比亚号开回地球……"
 verrier.136.f: "当金字塔般的火光升到极高的空中时，耀眼的火光照亮了整个佛罗里达州；刹那间，在该国相当大的范围内，白天取代了黑夜。远在100英里之外的海上也能看到这巨大的火冠，不止一位船长在他的航海日志中记录了这颗巨大流星的出现。哥伦比亚号的爆炸伴随着一场大地震。佛罗里达州被震得摇摇欲坠。火药中的气体受热膨胀，以巨大的力量迫使大气层后退，这股人造飓风就像水柱一样在空中奔腾。\n试验成功了。"
 verrier.136.g: "这真是太……祝贺！"
 verrier.136.h: "可惜我们没有派出真正的飞行员。"
 verrier.137.t: "从月球归来！"
 verrier.137.d: "登月舱安全降落在太平洋上，被一艘美国护卫舰打捞上来。消息传遍全国：人类已经从月球往返了一周！"
 verrier.137.f_person: "我们确切地知道了弹丸沉入波涛之下的地点，但还缺少固定弹丸并将其带到海面的机器。首先必须发明机械，然后制造机械。这些琐事不足以令美国工程师感到烦恼。抓锚一旦固定好，在其帮助下一定能将弹丸拉上来，更何况它的重量还因为所处液体的浮力有所减轻。\n我们可能还记得，启程时与之相伴的是强烈的同情。如果说在冒险之初，新旧世界的人们都对这次冒险充满了这样的情感，那么在英雄归来的时候，人们又会以怎样的热情迎接他！就这样，他从一个城镇飞驰到另一个城镇，在路上发现所有的人都在向他致敬，用同样的欢呼声向他致敬，用同样的赞美辞向他致敬。"
 verrier.137.f_team: "我们确切地知道了弹丸沉入波涛之下的地点，但还缺少固定弹丸并将其带到海面的机器。首先必须发明机械，然后制造机械。这些琐事不足以令美国工程师感到烦恼。抓锚一旦固定好，在其帮助下一定能将弹丸拉上来，更何况它的重量还因为所处液体的浮力有所减轻。\n我们可能还记得，启程时与之相伴的是强烈的同情。如果说在冒险之初，新旧世界的人们都对这次冒险充满了这样的情感，那么在归来的时候，人们又会以怎样的热情迎接他们！就这样，他们从一个城镇飞驰到另一个城镇，在路上发现所有的人都在向他们致敬，用同样的欢呼声向他们致敬，用同样的赞美辞向他们致敬。"
 verrier.137.g: "我们应当庆祝！"
 verrier.1051.t: "高斯归来"
 verrier.1051.d: "曾经被认为是最伟大的天文学家之一的[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]在过去几年中专注于数学和磁学等其他领域。但现在他又回到了天文学领域。"
 verrier.1051.f: "我回来了。"
 verrier.1051.g: "他和钟有点关系，对吧？"
 verrier.1051.h: "他将会发现新的行星！"
 verrier.90.f: "大会得出以下结论：\n\n"
