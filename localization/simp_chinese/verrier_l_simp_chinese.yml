 verrier.22.t: "拍摄到未知天体"
 verrier.22.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士在[ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis]最后一次夜空摄影中发现了一个奇特的天体。它似乎既非行星，也非小行星或彗星，更不是人们苦苦追寻的X行星。"
 verrier.22.f: "一些助手曾试图说服这位天文学家，认为那可能是某种外星交通工具，如流行通俗小说中描写的那样。但[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士驳斥了这些荒诞的想法。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe|U]认为太空天使的出现反而更符合逻辑。"
 verrier.22.g: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士将获得额外助手与资源，以调查该未知天体。"
 verrier.22.h: "天文台应加大力度寻找新天体！"
 verrier.22.i: "这很可能只是一场毫无价值的骗局。"
 verrier.22g.tt: "天文台将投入全部资源彻底检查该未知天体，一年内将不再有新的天文发现。"
 verrier.22h.tt: "天文台将忽略未知天体，继续其正常工作。"
 verrier.23.t: "半人马小行星"
 verrier.23.d: "在对这一未知天体进行彻底检测后，我们的首席天文学家已确定：照片中的这一天体属于一种全新的小行星类别！这一新类别将被命名为 “半人马小行星”。现在只差起个名了。"
 verrier.23.f: "半人马小行星以希腊神话中的半人马族命名，是一类轨道位于木星与海王星之间的小行星。半人马小行星的轨道偏心率分布范围极广。尽管首个得到确认的半人马小行星喀戎于1977年才被发现，但相关拍摄资料可追溯至1895年。半人马小行星伊达尔戈发现于1920年，不过当时尚未将其归入这一独立类别。\n"
 verrier.23.g: "喀戎。"
 verrier.23.h: "伊达尔戈。"
 verrier.23.i: "奥瑞乌斯。"
 verrier.23.j: "佛罗伦萨。"
 verrier.23.k: "提雷克。"
 verrier.23.l: "巴博斯。"
