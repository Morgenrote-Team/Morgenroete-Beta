l_simp_chinese:
 matsuura.101.t: "一位年轻人想去虾夷旅行"
 matsuura.101.d: "[SCOPE.sCharacter('character_1_scope').GetFullName]是一个渴望前往北方虾夷之地的年轻人。然而松前藩已限制通行。是否应该允许这个年轻人去北方冒险？"
 matsuura.101.f: "“我想游遍天下！虾夷、唐土、天竺！请让我见识世界的奇观！”"
 matsuura.101.g: "他可以在那里研究风景！"
 matsuura.101.h: "我听说他是个诗人，也许他的旅行会给他带来灵感？"
 matsuura.101.i: "也许他可以描绘一些该地区的画作？"
 matsuura.101.j: "任何人不得离开。"
 matsuura_allowed_travels_modifier: "允许前往虾夷"
 matsuura.102.t: "西方化学"
 matsuura.102.d: "[SCOPE.sCharacter('character_1_scope').GetFullName]研习兰学多年，如今正准备撰写一部关于“化学”的著作，赞助其或许是个不错的主意。"
 matsuura.102.f: "“你看，有个来自遥远国度的人做了些实验……”  \n“你想知道什么是实验吗？如果你有个理论……”  \n“哦，你连理论是什么也不知道啊……”"
 matsuura.102.g: "这说的这个“化学”是什么意思？"
 matsuura.102.h: "野蛮人的想法！"
 matsuura_barbarian_ideas_modifier: "蛮族想法"
 matsuura_nintendo_modifier: "任天堂花札纸牌"
 matsuura.103.t: "任天堂"
 matsuura.103.d: "在京都，山内房治郎创立了一家专营热门纸牌“花札”的制造工坊。该公司迅速崛起，成为日本花札行业的领头者。这家企业的名字，正是——任天堂。"
 matsuura.103.f: "'Just sit back and relax, my friend\nToday's lesson won't take too long\nAnd to make it more interesting\nIt takes the form of this nerdy song\nThe year is 1889 before the accolades and awards\nNintendo got its start from making hanafuda cards\n\nFor a century, they grew and planned to discover just what sells\nMaking vacuums and Ultra Hand and love testers and love hotels\nBut they soon zeroed in on games like the Game & Watch and Color TV\nIn '81, they made Donkey Kong and the rest is history!\n\nThis is the history of Nintendo\nSpanning the years, Hanafuda to Mario\nStraight from Kyoto, with a guy named Miyamoto\nThis is the history of Nintendo'\n\n-Matthew Taranto"
 matsuura.103.g: "有没有什么游戏能比花札纸牌更受欢迎？"