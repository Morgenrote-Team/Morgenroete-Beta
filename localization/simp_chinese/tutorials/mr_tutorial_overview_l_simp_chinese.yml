 thriving_culture_lesson_start_tutorial_button_loc: "开始教程" #deepl:1296206908

 mr_tutorial_buttons: "Morgenröte 纽扣" #deepl:3232304745
 mr_tutorial_buttons_desc: "Morgenröte 中的大部分内容都可以在 Morgenröte 窗口中找到。您可以通过点击侧边栏上的按钮进入这些窗口。目前这些窗口有：#V 科学窗口#! ：在这里您可以找到您的[Concept('concept_academics_academic','$concept_academics_academics$')] 、他们的活动、您的[concept_academics_progress] 和科学探险。\n\n-#V Arts Window#! ：[Concept('concept_artists_artist','$concept_artists_artists$')] [concept_artistic_progress] [Concept('concept_artists_art_style','$concept_artists_art_styles$')]\n\n-#V 体育窗口#! ：在这里，您可以找到各种体育运动和与体育以及航空有关的人物、他们的活动和国际体育组织。" #deepl:3017682288

 mr_tutorial_science_window_open: "打开科学窗口" #deepl:734722697
 mr_tutorial_science_window_open_desc: "现在我们来仔细看看科学窗口。点击按钮或按键盘上的（"M"）键打开科学窗口。" #deepl:1849505402
 mr_tutorial_science_window_open_tt: "点击科学按钮或按\"M\" 打开科学窗口" #deepl:1188172678

 mr_tutorial_science_tab: "科学之窗" #deepl:1054166281
 mr_tutorial_science_tab_desc: "\n\n-#V Overview#! 。这个选项卡包含 、 General Scientific Expeditions 和 Scientific Focus ：This tab contains[concept_academics_progress],#V General Scientific Expeditions#! and the#V Scientific Focus#!\n\n-#V Mathematical-Technical#!: This tab contains the[concept_gaudi_engineer],[concept_mendelejew_chemist] and[concept_verrier_astronomer]\n\n-#V Humanities-Anthropological#! ：[concept_panum_physician] [concept_lepsius_archaeologist] [concept_lepsius_anthropologist] [concept_dubois_natural_history]: This tab contains the , and \n\n- Humanities-Anthropological : This tab contains the , and Humanities-Anthropological : This tab contains the , and Humanities-Anthropological : This tab contains the Humanities-Anthropological .[concept_agassiz_geologist] [concept_dubois_paleontologist] [concept_dubois_naturalist] #V #! [concept_panum_physician] [concept_lepsius_archaeologist] [concept_lepsius_anthropologist]" #deepl:271317186
 mr_tutorial_science_tab_tt: "打开科学窗口" #deepl:3571747254

 mr_tutorial_science_overview_tab_open: "打开 "概览 "选项卡" #deepl:2171973784
 mr_tutorial_science_overview_tab_open_desc: "通过 "概览 "选项卡，您可以访问[concept_academics_progress] 、#V 一般科学考察#! 和#V 科学焦点#! （点击 "选项卡 "按钮进入 "概览 "选项卡。" #deepl:3801100877
 mr_tutorial_science_overview_tab_open_tt: "点击选项卡按钮，进入 "概览 "选项卡。" #deepl:583115154

 mr_tutorial_science_overview_tab_promote_academics: "促进学术发展" #deepl:3127848749
 mr_tutorial_science_overview_tab_promote_academics_desc: "Morgenröte 的核心是人物。要获得新的[concept_academics_academic] ，您需要获得足够的[concept_academics_progress] 。你可以将鼠标悬停在进度条上，看看哪些因素会影响进度的获得。如果你有一所大学，[concept_academics_university_specialization] 。你也可以投资金钱来更快地获得学术进步。另外，如果你的国家不属于科学上最先进的国家，你也可以通过活动或外交行动购买来获得学术。" #deepl:3334402372

 mr_tutorial_science_overview_tab_scientific_focus: "科学焦点" #deepl:4254522642
 mr_tutorial_science_overview_tab_scientific_focus_desc: "有时，您可能想专注于某一特定类型的研究。如果您符合科学重点的要求，就可以使用科学重点。它们基本上会促进某些技术组的研究，降低其他技术组的效率。" #deepl:2966516010

 mr_tutorial_science_overview_tab_scientific_expedition: "科学考察" #deepl:3527687538
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "科学探险是贵国可以发起的探险活动。根据探险的种类，这可以为你的国家带来巨大的利益。目前有以下这些探险：\n-[concept_dubois_pacific_expedition]\n-[concept_verrier_venus_transit] Expedition\n- Expedition to find the Northwest Passage\n- Zeppelin Expedition\n- Expedition to lay a Transatlantic Cable" #deepl:413711623

 mr_tutorial_science_natural_history_tab_open: "打开 "自然历史 "选项卡" #deepl:1440158592
 mr_tutorial_science_natural_history_tab_open_desc: "现在，让我们来看看[Concept('concept_academics_academic','$concept_academics_academics$')] 。 打开 "自然历史 "选项卡继续。" #deepl:3933847545
 mr_tutorial_science_natural_history_tab_open_tt: "点击标签按钮，进入 "自然历史 "标签。" #deepl:1038657530

 mr_tutorial_science_natural_history_tab_character: "学术界" #deepl:1408513918
 mr_tutorial_science_natural_history_tab_character_desc: "Morgenröte 的核心是它的角色。在科学选项卡中，这些角色是[Concept('concept_academics_academic','$concept_academics_academics$')] 。在每个新角色的左侧，你都可以看到你的学术肖像和关于他们的其他信息。" #deepl:1020069787

 mr_tutorial_science_natural_history_tab_character_rating: "角色评级" #deepl:3205270775
 mr_tutorial_science_natural_history_tab_character_rating_desc: "大多数角色的名字旁边都有一个小图标。这个图标表示他们对角色的适应能力。图标说明：\n@mr_rating_fantastic！  Perfect （完美）@mr_rating_very_good（非常好）！  Very Good\n@mr_rating_good！  好@mr_rating_mediocre！  平庸@mr_rating_bad！  坏@mr_rating_very_bad！  非常差" #deepl:2393422146

 mr_tutorial_science_natural_history_tab_character_experience_bar: "角色体验" #deepl:356262571
 mr_tutorial_science_natural_history_tab_character_experience_bar_desc: "每个角色在自己的专业领域都有[concept_academics_experience] 。经验值越高，角色在各种任务中的表现就越好。[Concept('concept_academics_academic','$concept_academics_academics$')] ，如果经验值达到 100（资深）和 300（著名），他们就会获得更高的特质。" #deepl:4293324584

 mr_tutorial_science_natural_history_tab_character_achievements: "人物成就" #deepl:2935735490
 mr_tutorial_science_natural_history_tab_character_achievements_desc: "[Concept('concept_academics_academic','$concept_academics_academics$')] 有时会取得令人印象深刻的成就。您可以随时将鼠标悬停在该图标上，查看您的学术成果。" #deepl:1195783621

 mr_tutorial_science_natural_history_tab_currencies: "理念与价值观" #deepl:1384869411
 mr_tutorial_science_natural_history_tab_currencies_desc: "Morgenröte 中的大多数角色都有自己的价值观。这些数值显示在每个学科的中心。例如，对于地质学，你会看到发现了多少矿物，或者你掌握了多少地质知识。" #deepl:4066533914

 mr_tutorial_science_natural_history_visit_button: "访问按钮" #deepl:3858963492
 mr_tutorial_science_natural_history_visit_button_desc: "大多数[Concept('concept_academics_academic','$concept_academics_academics$')] 都有专门的访问按钮，可以告诉你更多关于这个特定学科的信息。例如，[concept_dubois_naturalist] 有一个访问动物园的按钮，你可以在那里找到更多关于动物园动物的信息。" #deepl:1189517097

 mr_tutorial_science_natural_history_ranking: "排名" #deepl:4181663012
 mr_tutorial_science_natural_history_ranking_desc: "也许您喜欢将自己与其他国家进行比较。在这种情况下，您可能会对排名感兴趣。悬停在这个图标上，您可以看到各种列表，让您了解自己在 Morgenröte 的某个方面与其他国家相比做得如何。例如，[concept_agassiz_geologist] 可以让您比较您的地质得分、地质知识、海洋知识、矿产和稀有矿产。" #deepl:394625426

 mr_tutorial_science_natural_history_project_buttons: "项目按钮和其他按钮" #deepl:430248338
 mr_tutorial_science_natural_history_project_buttons_desc: "这部分界面对你来说是最重要的部分之一。[Concept('concept_academics_academic','$concept_academics_academics$')] [concept_agassiz_geologist] 可以进行探险、改进工业、重新计算地球年龄，你还可以建立一个矿物库或召开大陆漂移大会。" #deepl:2696053152

 mr_tutorial_science_natural_history_view_switch_buttons: "更改布局" #deepl:1671308253
 mr_tutorial_science_natural_history_view_switch_buttons_desc: "如果您喜欢更密集的界面，可以使用此按钮切换界面的外观。就游戏本身而言，使用哪种变体并不重要。因此，请选择您更喜欢的变体。" #deepl:2800918764

 mr_start_culture_tutorial_button_loc: "文化教程" #deepl:231585177
 mr_tutorial_not_yet_implemented_tt: "本教程尚未完成。" #deepl:1971937521

 mr_tutorial_arts_window_open: "打开艺术之窗" #deepl:2590280325
 mr_tutorial_arts_window_open_desc: "现在我们来仔细看看艺术窗口。点击按钮或按键盘上的（Ctrl + A）键打开艺术窗口。" #deepl:53394483
 mr_tutorial_arts_window_open_tt: "点击科学按钮或按 "Ctrl + A "打开艺术窗口" #deepl:2950751548

 mr_tutorial_arts_tab: "艺术标签" #deepl:2793588649
 mr_tutorial_arts_tab_desc: "艺术是 19 世纪和 20 世纪的重要组成部分。[Concept('concept_artists_artist','$concept_artists_artists$')] Morgenröte提供各种类型的艺术家和他们的艺术作品。艺术 "窗口本身有两个选项卡，一个显示您所在国家的艺术概况，另一个可以查找您的艺术家和从外国招募艺术家。" #deepl:543699742

 mr_tutorial_arts_tab_cultural_tradition: "文化传统" #deepl:3268694731
 mr_tutorial_arts_tab_cultural_tradition_desc: "文化传统（Cultural Tradtion）是代表你的国家文化成就的价值。它由[concept_elgar_musical_tradition],[concept_manzoni_literary_tradition] 和[concept_klimt_painting_tradition] 组成。文化传统的计算公式是：音乐传统 / 4 + 绘画传统 / 3 + 文学传统 / 2 （你将从你的艺术传统中额外获得[concept_prestige] 。每 5 点艺术传统就会增加 1 点声望。" #deepl:3774927584
 mr_tutorial_arts_overview_tab_open_tt: "打开 "艺术概览 "选项卡" #deepl:3810726030

 mr_tutorial_arts_tab_artist_progress: "艺术家进展" #deepl:61174778
 mr_tutorial_arts_tab_artist_progress_desc: "您可以通过不同方式获得新的[Concept('concept_artists_artist','$concept_artists_artists$')] ：您可以招募他们，通过活动或收集足够的[concept_artistic_progress] 来获得他们。虽然活动和招募不是每个国家都能做到的，但只要您拥有一个$building_elgar_opera$ 或一个$building_arts_academy$ ，就可以通过填满艺术进度条来获得艺术家。您可以将鼠标悬停在进度条上，查看影响每月收益的全部因素列表。此外，如果您的$building_arts_academy$ 中有必要的[concept_production_method] ，您还可以通过赞助艺术来获得更多的收益并提升某些艺术家。" #deepl:1108726132

 mr_tutorial_arts_tab_center_of_arts: "艺术中心" #deepl:4265095628
 mr_tutorial_arts_tab_center_of_arts_desc: "[Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] 是 诞生的地点。有些艺术中心在游戏开始时就已经存在了。其他的可以通过 或按这里的按钮解锁。很明显，艺术中心对你和你的国家都很有用，因为它们可以让你获得奖励。[concept_artists_art_style] [Concept('concept_journal_entry','$concept_journal_entries$')] " #deepl:1287628103

 mr_tutorial_arts_tab_artists_tab_open: "打开 "艺术家 "选项卡" #deepl:974477655
 mr_tutorial_arts_tab_artists_tab_open_desc: "现在，让我们仔细看看[Concept('concept_artists_artist','$concept_artists_artists$')] 。点击 "艺术家 "选项卡按钮，打开 "艺术家 "选项卡。" #deepl:391030067
 mr_tutorial_arts_tab_artists_tab_open_open_tt: "打开 "艺术家 "选项卡" #deepl:974477655

 mr_tutorial_arts_tab_artists: "艺术家选项卡" #deepl:1211285969
 mr_tutorial_arts_tab_artists_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] 看起来与 Academics 非常相似，但它们的工作方式略有不同。目前有 3 位艺术家：\n-[concept_elgar_composer]\n-[concept_manzoni_writer]\n-[concept_klimt_painter]" #deepl:124747602

 mr_tutorial_arts_tab_artists_invite: "邀请艺术家" #deepl:1648609371
 mr_tutorial_arts_tab_artists_accquisation_desc: "正如我们已经提到的，[Concept('concept_artists_artist','$concept_artists_artists$')] 不仅可以通过获得足够多的[concept_artistic_progress] ，还可以通过简单地邀请他们来获得。每种艺术家都有不同的要求。你可以邀请世界各地的[Concept('concept_elgar_travelling_composer','$concept_elgar_travelling_composers$')] ，但你需要是一个拥有足够多$building_elgar_opera$的国家，并且有足够好的[concept_elgar_musical_tradition] 。\n\n[Concept('concept_klimt_independent_painter','$concept_klimt_independent_painters$')] 只有在文化相似的情况下才能被邀请。\n\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] 则完全不能被邀请。" #deepl:2127803597

 mr_tutorial_arts_tab_artists_character: "一般信息" #deepl:995936974
 mr_tutorial_arts_tab_artists_character_desc: "窗口最左边的部分会显示艺术家的一些基本信息： \n- The Portrait\n- Name and Rating\n- The[concept_artists_experience]\n- The Portrait\n- Name and Rating\n- The[Concept('concept_character_trait','$concept_character_traits$')]" #deepl:1445240346

 mr_tutorial_arts_tab_artists_currencies: "重要的艺术价值" #deepl:71895904
 mr_tutorial_arts_tab_artists_currencies_desc: "这部分界面允许您查看有关艺术这一特定方面的一般信息。对于[concept_elgar_composer] ，它会显示[concept_elgar_musical_tradition] 、您的作曲家作品和大师作品，以及世界五大最佳作曲家的概览。此外，您还可以将鼠标悬停在右上角的小图标上查看排名。" #deepl:1891899818

 mr_tutorial_arts_tab_artists_actions: "艺术家行动" #deepl:2320930103
 mr_tutorial_arts_tab_artists_actions_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] 还有行动。这些就是关于艺术家的最重要的信息。您可以从这里继续体育教程，或者继续您的游戏。" #deepl:746856108
 mr_start_sports_tutorial_button_loc: "体育教程" #deepl:826655861

 mr_tutorial_sports_window_open: "打开体育窗口" #deepl:1830514457
 mr_tutorial_sports_window_open_desc: "现在我们来仔细看看体育窗口。点击按钮或按键盘上的（Ctrl + S）键打开体育窗口。" #deepl:243246943
 mr_tutorial_sports_window_open_tt: "点击科学按钮或按 "Ctrl + S "打开体育窗口" #deepl:1482293542

 mr_tutorial_sports_window: "体育之窗" #deepl:4243980162
 mr_tutorial_sports_window_desc: "体育窗口允许您访问所有不同的体育项目以及与这些体育项目相关的角色。该窗口分为常规体育项目和航空项目。常规体育项目包括： \n-[concept_vikelas_olympic_games]\n-[concept_douglas_mountaineering]\n- 球类运动 \n-[concept_vikelas_car_racing]\n- 航空项目包括： \n-[concept_curtiss_balloonist]\n-[concept_curtiss_pilot]" #deepl:2523227399

 mr_tutorial_sports_tab: "体育选项卡" #deepl:2701935579
 mr_tutorial_sports_tab_desc: "与学者和艺术家不同，体育选项卡中的人物通常只是将军或政治家。" #deepl:1383542418
 mr_tutorial_sports_tab_open_tt: "打开体育选项卡" #deepl:176871982

 mr_tutorial_sports_tab_character_overview: "角色概述" #deepl:96645084
 mr_tutorial_sports_tab_character_overview_desc: "用户界面的这一部分为你提供了[concept_character] 的概览。有些角色，如[concept_vikelas_coach] 和赛车手，是你可以获得的角色，因此有[concept_academics_experience] 。其他角色如登山者则没有经验值。" #deepl:1695633540

 mr_tutorial_sports_tab_currencies: "价值观与信息" #deepl:2440189283
 mr_tutorial_sports_tab_currencies_desc: "在中间部分，您可以看到有关这项特定运动的重要信息。例如，[concept_vikelas_olympic_games] ，其中包括[concept_vikelas_ioc] 主席和董事会的概况、有多少成员以及您目前已经收集了多少枚奖牌。" #deepl:1125108675

 mr_tutorial_sports_tab_actions: "行动" #deepl:1951990429
 mr_tutorial_sports_tab_actions_desc: "右侧允许你为该运动采取具体行动。这些行动基本上是让你使用[Concept('concept_character', '$concept_characters$')] 或建立新的东西（如[concept_vikelas_ioc] ）的决定。" #deepl:2455654735

 mr_tutorial_sports_tab_aeronautics_tab_open: "打开航空标签" #deepl:2120346894
 mr_tutorial_sports_tab_aeronautics_tab_open_desc: "现在让我们仔细看看航空标签页。点击按钮打开标签页。" #deepl:2671641916
 mr_tutorial_aeronautics_tab_open_tt: "打开 "航空 "选项卡" #deepl:2187560588

 mr_tutorial_aeronautics_tab: "航空标签" #deepl:2661687945
 mr_tutorial_aeronautics_tab_desc: "航空选项卡与体育选项卡的外观基本相同。你可以赞助并自动生成[concept_curtiss_balloonist] ，而且[concept_curtiss_pilot] 会在各种情况下生成。\nnThis is the end of the overview Tutorial.如果您想了解更多有关 Morgenröte 角色的信息，请使用 Vickypedia 或我们添加的 Concepts。" #deepl:851922845
