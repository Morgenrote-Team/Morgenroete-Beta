l_simp_chinese:
 thriving_culture_lesson_start_tutorial_button_loc: "开始教程"
 mr_tutorial_buttons: "赤色晨曦按钮"
 mr_tutorial_buttons_desc: "赤色晨曦中的大多数功能都可以通过UI进行互动，你可以通过点击左侧边栏中的按钮前往赤色晨曦页面。目前有以下窗口：\n\n• #V 科学窗口#!：在这里你可以找到[Concept('concept_academics_academic','$concept_academics_academics$')]及相关的活动、你的[concept_academics_progress]和科学考察。\n\n• #V 艺术窗口#!：在这里你可以找到[Concept('concept_artists_artist','$concept_artists_artists$')]及相关的活动、你的[concept_artistic_progress]和[Concept('concept_artists_art_style','$concept_artists_art_styles$')]。\n\n• #V 运动窗口#!：在这里你可以找到各种体育运动和与体育及航空相关的角色、以及活动以及国际体育组织。"
 mr_tutorial_science_window_open: "打开科学窗口"
 mr_tutorial_science_window_open_desc: "现在我们来仔细看看科学窗口，点击按钮或按下键盘上的“M”键即可打开科学窗口。"
 mr_tutorial_science_window_open_tt: "单击科学按钮或按“M”打开科学窗口"
 mr_tutorial_science_tab: "科学窗口"
 mr_tutorial_science_tab_desc: "科学窗口是你可以找到有关科学研究信息和行动的地方。\n\n一共有四个标签页：\n• #V 概览#!：该标签页包涵[concept_academics_progress]，#V 常规科学考察#!和#V 学术焦点#!\n\n• #V 数学与技术#!：该标签页包涵[concept_tesla_engineer]、[concept_mendelejew_chemist]和[concept_verrier_astronomer]\n\n• [concept_dubois_natural_history]：该标签页包涵[concept_agassiz_geologist]、[concept_dubois_paleontologist]和[concept_dubois_naturalist]\n\n• #V 人文科学与人类学#!：该标签页包涵[concept_panum_physician]、[concept_lepsius_archaeologist]和[concept_lepsius_anthropologist]"
 mr_tutorial_science_tab_tt: "科学窗口已打开"
 mr_tutorial_science_overview_tab_open: "打开概览标签"
 mr_tutorial_science_overview_tab_open_desc: "通过概览标签，你可以访问[concept_academics_progress]、#V 常规科学考察#!和#V 学术焦点#!\n\n单击标签按钮进入概览标签。"
 mr_tutorial_science_overview_tab_open_tt: "单击标签按钮进入概览页面。"
 mr_tutorial_science_overview_tab_promote_academics: "促进学术发展"
 mr_tutorial_science_overview_tab_promote_academics_desc: "赤色晨曦的核心是各类角色，但是如何才能获得这些角色呢？\n\n要获得新的[concept_academics_academic]，你需要获得足够的[concept_academics_progress]。你可以将鼠标悬停在进度条上，查看哪些因素会影响进度增长。\n\n如果你拥有一所拥有[concept_academics_university_specialization]的大学，你可以推广特定学术，还可以投资来加快获取。\n\n或者如果你的国家是欠发达国家，那么你可以通过事件来获得学术成果，或者通过外交行动来购买学术成果。"
 mr_tutorial_science_overview_tab_scientific_focus: "学术焦点"
 mr_tutorial_science_overview_tab_scientific_focus_desc: "有时你可能想专注于特定类型的研究或者满足学者要求，那么可以使用学术焦点。它们基本上会促进某些科技群体的研究，并降低其他群体的效率。"
 mr_tutorial_science_overview_tab_scientific_expedition: "科学考察"
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "科学考察是国家可以发起的考察活动。根据考察类型，它可以为你的国家带来巨大的收益。\n\n目前存在以下考察：\n• [concept_dubois_pacific_expedition]\n• [concept_verrier_venus_transit]\n• 寻找西北航道\n• 齐柏林飞艇探险\n• 铺设跨大西洋电缆"
 mr_tutorial_science_natural_history_tab_open: "打开“自然历史”界面"
 mr_tutorial_science_natural_history_tab_open_desc: "现在让我们看一下[Concept('concept_academics_academic','$concept_academics_academics$')]之一。打开“自然历史”界面继续。"
 mr_tutorial_science_natural_history_tab_open_tt: "单击标签按钮进入“自然历史”页面。"
 mr_tutorial_science_natural_history_tab_character: "学者"
 mr_tutorial_science_natural_history_tab_character_desc: "赤色晨曦的核心是角色。在“科学”页面中，这些角色就是[Concept('concept_academics_academic','$concept_academics_academics$')]。\n\n在每个新角色的左侧，你可以看到学者肖像和有关他们的附加信息。"
 mr_tutorial_science_natural_history_tab_character_rating: "角色评分"
 mr_tutorial_science_natural_history_tab_character_rating_desc: "在多数角色名称旁均设有标识图标，用以直观展示该角色的职业评分。玩家可通过悬停操作查看构成该评分的具体参数明细。\n\n图标介绍：\n@mr_rating_fantastic!完美\n@mr_rating_very_good!杰出\n@mr_rating_good!出色\n@mr_rating_mediocre!平庸\n@mr_rating_bad!糟糕\n@mr_rating_very_bad!极差"
 mr_tutorial_science_natural_history_tab_character_experience_bar: "角色经验"
 mr_tutorial_science_natural_history_tab_character_experience_bar_desc: "每位角色在其专业领域的能力由[concept_academics_experience]证明。经验越丰富，角色在各类任务中的表现就越出色。\n\n经验可通过每年自然积累获得，也可通过完成任务并取得成功来主动获取。当[Concept('concept_academics_academic','$concept_academics_academics$')]的经验值达到100（经验丰富）和300（著名）时，将获得更高的属性加成。"
 mr_tutorial_science_natural_history_tab_character_achievements: "角色成就"
 mr_tutorial_science_natural_history_tab_character_achievements_desc: "[Concept('concept_academics_academic','$concept_academics_academics$')]有时会取得令人瞩目的成就。你可以随时将鼠标悬停在该图标上，查看你的学者迄今为止所取得的全部成就。"
 mr_tutorial_science_natural_history_tab_currencies: "发现"
 mr_tutorial_science_natural_history_tab_currencies_desc: "在赤色晨曦中，大多数角色都拥有与其相关的各项数值，这些数值显示在每位学者界面的中央。以地质学为例，你将看到已发现的矿物数量，或你所掌握的地质知识等。\n\n很多时候，你可以通过将鼠标悬停在某个数值上来查看更多相关信息。"
 mr_tutorial_science_natural_history_visit_button: "访问按钮"
 mr_tutorial_science_natural_history_visit_button_desc: "大多数[Concept('concept_academics_academic','$concept_academics_academics$')]都有特殊的“访问”按钮，可以让你了解更多关于该学者的具体信息。\n\n例如，[concept_dubois_naturalist]有一个“参观动物园”按钮，你可以通过它了解更多关于你动物园中动物的信息。"
 mr_tutorial_science_natural_history_ranking: "排名"
 mr_tutorial_science_natural_history_ranking_desc: "若你热衷于与他国一较高下，这份排行榜或将激起你的雄心。只需将鼠标轻移至这一图标之上，便可览尽诸国在赤色晨曦各领域的较量——是强盛、是落后，一目了然。\n\n以[concept_agassiz_geologist]为例，它为你打开了一扇窗，透过其中，你能细数本国在地质评分、地质学知识、海洋学知识、矿物数量乃至稀有矿物上的成就，与列国相较，何其辉煌或仍需奋进。"
 mr_tutorial_science_natural_history_project_buttons: "项目按钮及其他按钮"
 mr_tutorial_science_natural_history_project_buttons_desc: "这一部分界面对你而言至关重要。它允许你为[Concept('concept_academics_academic','$concept_academics_academics$')]分配项目任务，并启动其他重要的互动。\n\n例如，一位[concept_agassiz_geologist]可以参与勘探活动、提升你的工业水平、重新计算地球年龄，你还可以让他筹建一座矿物陈列室，或发起一场关于大陆漂移的学术会议。"
 mr_tutorial_science_natural_history_view_switch_buttons: "改变样式"
 mr_tutorial_science_natural_history_view_switch_buttons_desc: "若您倾向于更紧凑的界面风格，可通过此按钮自由切换视觉模式。两种界面方案均不影响实际游戏运行，请随心选择您喜爱的版本。"
 mr_start_culture_tutorial_button_loc: "文化教程"
 mr_tutorial_not_yet_implemented_tt: "该教程尚未完成。"
 mr_tutorial_arts_window_open: "打开艺术窗口"
 mr_tutorial_arts_window_open_desc: "现在我们来仔细看看艺术窗口，点击按钮或按下键盘上的“Ctrl+A”键即可打开艺术窗口。"
 mr_tutorial_arts_window_open_tt: "单击艺术按钮或按“Ctrl+A”打开艺术窗口"
 mr_tutorial_arts_tab: "艺术界面"
 mr_tutorial_arts_tab_desc: "艺术在十九世纪和二十世纪占据着重要地位。这一时期涌现的许多伟大[Concept('concept_artists_artist','$concept_artists_artists$')]，至今仍广为人知。\n\n赤色晨曦提供了多种类型的艺术家及其创作的艺术作品。\n\n艺术界面本身包含两个标签页。一个为你展示本国艺术的整体概览，另一个则可查看并招募本国及来自其他国家的艺术家。"
 mr_tutorial_arts_tab_cultural_tradition: "文化传统"
 mr_tutorial_arts_tab_cultural_tradition_desc: "文化传统是反映国家艺术成就的综合指标，由[concept_elgar_musical_tradition]、[concept_manzoni_literary_tradition]以及[concept_klimt_painting_tradition]构成。\n\n其数值按以下权重公式计算：\n（音乐传统 ÷ 4）+（绘画传统 ÷ 3）+（文学传统 ÷ 2）\n\n该数值同时影响 [concept_prestige]，每有5点文化传统额外获得1点威望。"
 mr_tutorial_arts_overview_tab_open_tt: "打开艺术概览界面"
 mr_tutorial_arts_tab_artist_progress: "艺术家进度"
 mr_tutorial_arts_tab_artist_progress_desc: "你可以通过多种方式获得新的[Concept('concept_artists_artist','$concept_artists_artists$')]：可以招募他们，可以通过事件获得，也可以通过积累足够的[concept_artistic_progress]来解锁。\n\n虽然并非所有国家都能通过事件或招募获得艺术家，但只要你拥有$building_elgar_opera$或$building_art_academy$，就可以通过填满进度条来获得艺术家。\n将鼠标悬停在进度条上，即可查看影响每月艺术进展的所有因素。\n\n此外，如果你的$building_art_academy$中拥有相应的[concept_production_method]，你还可以资助艺术事业，以获得更多进展并发掘特定艺术家。"
 mr_tutorial_arts_tab_center_of_arts: "艺术中心"
 mr_tutorial_arts_tab_center_of_arts_desc: "[Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')]是某种[concept_artists_art_style]诞生的地点。\n游戏开始时，部分艺术中心已存在。其他则可通过[Concept('concept_journal_entry','$concept_journal_entries$')]解锁，或点击你在此处看到的按钮来激活。将鼠标悬停在艺术中心上，即可查看获取方式。\n显然，艺术中心对你的国家非常有用，因为它们能为你带来各种加成效果。"
 mr_tutorial_arts_tab_artists_tab_open: "打开艺术家界面"
 mr_tutorial_arts_tab_artists_tab_open_desc: "现在我们来仔细看看[Concept('concept_artists_artist','$concept_artists_artists$')]，点击按钮即可打开艺术家界面。"
 mr_tutorial_arts_tab_artists_tab_open_open_tt: "打开艺术家界面"
 mr_tutorial_arts_tab_artists: "艺术家界面"
 mr_tutorial_arts_tab_artists_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')]与学者相似 ，但其工作稍有不同。\n\n当前有三种艺术家：\n[concept_elgar_composer]\n[concept_manzoni_writer]\n[concept_klimt_painter]"
 mr_tutorial_arts_tab_artists_invite: "邀请艺术家"
 mr_tutorial_arts_tab_artists_accquisation_desc: "正如我们之前所提到的，[Concept('concept_artists_artist','$concept_artists_artists$')]不仅可以依靠积累足够的[concept_artistic_progress]来获得，也可以通过直接邀请的方式招募。\n\n每种类型的艺术家都有不同的邀请条件。你可以从世界各地邀请[Concept('concept_elgar_travelling_composer','$concept_elgar_travelling_composers$')]，但你必须是一个拥有足够数量$building_elgar_opera$并具备良好[concept_elgar_musical_tradition]的国家。\n\n而要邀请[Concept('concept_klimt_independent_painter','$concept_klimt_independent_painters$')]，则只有在对方拥有相似文化背景的情况下才有可能实现。\n\n至于[Concept('concept_manzoni_writer','$concept_manzoni_writers$')]，则完全无法邀请。"
 mr_tutorial_arts_tab_artists_character: "基本信息"
 mr_tutorial_arts_tab_artists_character_desc: "窗口最左侧部分展示了关于你的艺术家的一些基本信息。\n\n在这里你可以看到：\n肖像\n姓名与评级\n[concept_artists_experience]\n[Concept('concept_character_trait','$concept_character_traits$')]"
 mr_tutorial_arts_tab_artists_currencies: "重要信息"
 mr_tutorial_arts_tab_artists_currencies_desc: "界面的这一部分让你可以查看与该艺术领域相关的总体信息。\n例如，对于[concept_elgar_composer]，它会显示[concept_elgar_musical_tradition]、你的作曲家所创作的作品与代表作，以及世界范围内排名前五的作曲家概览。\n\n此外，将鼠标悬停在右上角的小图标上，你还可以查看相关排行榜。"
 mr_tutorial_arts_tab_artists_actions: "艺术家行动"
 mr_tutorial_arts_tab_artists_actions_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')]同样具备可执行的行动选项。在此界面中，你可以查看艺术家们能够参与的工作内容，以及你可作出的相关决策。\n\n以上便是关于艺术玩法的核心信息。你可以选择继续学习“体育教程”教程，或直接返回游戏继续你的征程。"
 mr_start_sports_tutorial_button_loc: "体育运动教程"
 mr_tutorial_sports_window_open: "打开体育窗口"
 mr_tutorial_sports_window_open_desc: "现在我们来仔细看看体育窗口，点击按钮或按下键盘上的“Ctrl+S”键即可打开体育窗口。"
 mr_tutorial_sports_window_open_tt: "单击体育按钮或按“Ctrl+S”打开科学窗口"
 mr_tutorial_sports_window: "体育窗口"
 mr_tutorial_sports_window_desc: "「体育窗口」可让您浏览所有运动项目及相关角色。\n该窗口分为常规运动与航空运动两大类。\n\n常规运动包括：\n[concept_vikelas_olympic_games]\n[concept_douglas_mountaineering]\n球类运动\n[concept_vikelas_car_racing]\n\n航空运动包括：\n[concept_curtiss_balloonist]\n[concept_curtiss_pilot]"
 mr_tutorial_sports_tab: "体育运动界面"
 mr_tutorial_sports_tab_desc: "体育界面为您展示各类体育活动及相关角色概览。\n与学术和艺术不同，热衷于体育运动的角色通常仅为将军或政治家。"
 mr_tutorial_sports_tab_open_tt: "打开体育运动界面"
 mr_tutorial_sports_tab_character_overview: "角色概览"
 mr_tutorial_sports_tab_character_overview_desc: "UI的这一部分为你提供关于[concept_character]的概览信息。\n\n一些角色，例如[concept_vikelas_coach]和赛车手，是可以获得的角色，因此他们拥有[concept_academics_experience]。而像登山者这样的角色则不具备经验属性。"
 mr_tutorial_sports_tab_currencies: "重要信息"
 mr_tutorial_sports_tab_currencies_desc: "在界面中央，你可以看到与该体育项目相关的重要信息。\n\n例如，在[concept_vikelas_olympic_games]中，会显示国际奥委会（[concept_vikelas_ioc]）主席和委员会的概览信息，包括成员人数以及你至今为止所获得的奖牌总数。"
 mr_tutorial_sports_tab_actions: "行动"
 mr_tutorial_sports_tab_actions_desc: "右侧区域允许你为该体育项目执行特定操作。\n这些操作本质上是一些决策选项，使你能够动用你的[Concept('concept_character', '$concept_characters$')]，或建立新的机构，例如[concept_vikelas_ioc]。"
 mr_tutorial_sports_tab_aeronautics_tab_open: "打开航空运动界面"
 mr_tutorial_sports_tab_aeronautics_tab_open_desc: "现在我们来仔细看看航空运动界面，点击按钮即可打开。"
 mr_tutorial_aeronautics_tab_open_tt: "打开航空运动界面"
 mr_tutorial_aeronautics_tab: "航空运动界面"
 mr_tutorial_aeronautics_tab_desc: "航空运动的界面与体育运动大体相同。\n\n主要区别在于角色机制：您可以自动赞助[concept_curtiss_balloonist]，而[concept_curtiss_pilot]会在不同条件下自动生成。\n\n本次概览教程到此结束。如需深入了解赤色晨曦的角色设定，请查阅Vickypedia或我们添加的介绍。"
 mr_tutorial_lesson_button_finish: "完成教程"
