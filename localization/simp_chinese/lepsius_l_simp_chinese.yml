 lepsius_expedition_general_information_loc: "\n$mr_divider_for_je$\n你的[concept_lepsius_expedition]每月都会有一次进展来增加进度。一旦进度达到上限，远征就会结束。\n$mr_divider_for_je$\n成功值会告诉你探险的成功率，成功次数越多，探险结束时获得的[Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]就越多。如果你的成功率达到#V 15#!，结束后将获得最大数量的文物。\n许多因素都会影响您的成功，从事件到准备工作。例如，10级大学的[concept_pm_academics_university_humanities]会让你在远征开始时获得1点成功值（最多从大学重心获得4点成功值）。"
