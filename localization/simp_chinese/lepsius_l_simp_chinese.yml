 lepsius.2241.t: "高棉寺庙"
 lepsius.2241.d: "由[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士率领的一支地方考古探险队，在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]发现了一座此前不为人知的吴哥帝国寺庙！"
 lepsius.2241.f: "高棉帝国的建筑在9至13世纪之间达到顶峰，其核心特征为“寺庙山”式设计。这些砂岩结构的建造旨在象征神话中众神的家园——须弥山。建筑师运用了精妙的叠涩拱技术，营造出广阔的回廊式围合空间；这些空间通常环绕着象征宇宙海洋的宽阔护城河。其美学风格由“普拉萨特”（莲花蕾塔）以及浅浮雕所界定——后者将石墙转化为印度教神话与帝国历史的叙事长卷。正如在标志性的吴哥窟中所见，这一风格实现了对称性、宏伟规模与繁复细节之间的完美平衡。"
 lepsius.2241.g: "叹为观止。"
 lepsius.2242.t: "高棉雕塑"
 lepsius.2242.d: "丛林深处，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士发现了一批宏伟的高棉石雕，其精绝的美学造诣，令众多考古学界同仁为之倾倒。然而，关于这些雕像的处置方式，各方至今莫衷一是……"
 lepsius.2242.f: "吴哥时期的高棉雕塑，其独特之处在于从印度教图像学向一种本土化美学的嬗变——后者以宁谧与精神威仪为其圭臬。与印度艺术中常见的动感姿态迥异，高棉雕像呈现出一种僧侣式的静穆与纪念碑式的恒久。早期造像常以雄健之躯描绘毗湿奴、湿婆等印度教神祇。至“吴哥窟风格”时期，则引入了更为精雅的比例与繁缛的珠宝装饰。12世纪晚期，阇耶跋摩七世王治下，艺术重心转向大乘佛教。此期诞生了标志性的“巴戎风格”，以“高棉的微笑”名扬天下——那是一种双目轻阖、唇角微扬的面容，昭示着内心的恬静与超然之觉悟。"
 lepsius.2242.g: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士当对这些雕像详加检视，悉心研究。"
 lepsius.2242.h: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士当将雕像肢解，分送各博物馆。"
 lepsius.2243.t: "高棉器物"
 lepsius.2243.d: "位于[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]的考古队发现了一批吴哥帝国时期的器物窖藏。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士获得了其中的青铜容器与陶瓷器。"
 lepsius.2243.f: "尽管纪念性建筑与雕塑在叙事中占据主导地位，高棉人的工艺在多种媒材上同样表现卓越。青铜铸造是其冶金技艺的巅峰；工匠们采用失蜡法，制作出精美的仪式用容器、轿舆配件及铃铛，这些器物常饰以繁复的花卉纹样或如伽鲁达等神话生物。陶瓷器扮演着同等重要的角色，尤其是地方窑口烧造的独具特色的“褐釉”炻器。这些器皿常塑造成大象或猫头鹰等动物形态，用作盛放槟榔咀嚼时所用的石灰，或用于储存珍贵的油膏。此外，高棉人亦是珠宝与金器制作的大师，以锤打出的黄金锻造厚重的项链、臂环与冠冕，用以装饰王室成员及木质神像。"
 lepsius.2243.g: "我们博物馆的新展品。"
 lepsius.2244.t: "《高棉史》"
 lepsius.2244.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士将多年潜心研积的吴哥高棉帝国史识，纂为一部专著。此书甫出，即奉为学界圭臬。"
 lepsius.2244.f: "高棉帝国，亦名吴哥帝国，于9世纪初勃然而兴，雄踞东南亚，其疆域囊括今柬埔寨、泰国、老挝及越南之大部。公元802年，阇耶跋摩二世开基建业，自号“转轮圣王”（chakravartin，梵语“宇宙君主”），以印度教-佛教王权思想为体，以精绝水利工程为用，合众酋邦于一统。帝国之昌盛，端赖巴雷（大型人工蓄水池）与运河交织之巨网——是网既促稻作集约，亦养亿万黎民。12世纪极盛之时，高棉人文武并茂，艺政双绝，筑吴哥通等伟岸都城，彪炳千古。然至14、15世纪，生态崩坏、暹罗诸邦崛起、商路改辙，诸厄并至，帝国江河日下，终弃吴哥于荒榛蔓草之间。"
 lepsius.2244.g: "此书当藏于国家图书馆。"
 lepsius.2251.t: "阿克苏姆钱币窖藏"
 lepsius.2251.d: "在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]进行的一次地方性考古发掘中，出土了一批丰富的古代晚期钱币窖藏——其中获取了罗马钱币与阿克苏姆钱币。"
 lepsius.2251.f: "阿克苏姆帝国大约于公元270年，在恩杜比斯国王治下开始铸造钱币。阿克苏姆是撒哈拉以南非洲首个铸造自身货币的主要政治实体，其钱币涵盖金、银、铜三种材质。这些货币旨在促进国际贸易，尤其是与罗马及拜占庭帝国的商贸往来，币面常铸有希腊文铭文——这是红海贸易中的通用语言。早期钱币上铸有传统的多神教象征符号，如新月与日盘；而公元4世纪国王埃扎纳皈依基督教之后所铸的钱币上，则显著地带有基督教十字架。"
 lepsius.2251.g: "这一发现必将令钱币学者们欣喜不已。"
 lepsius.2252.t: "阿克苏姆宫殿"
 lepsius.2252.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士及其团队近期成功发掘，以缜密之功揭示了一座庞大宫殿建筑群的地基，此建筑无疑属于阿克苏姆帝国时期。"
 lepsius.2252.f: "阿克苏姆帝国的宫殿建筑，以建于高耸石砌平台之上的多层广厦为典型特征。其中最负盛名的当属阿克苏姆的邓古尔宫——世所称之示巴女王殿。就建筑结构而论，这些宫殿采用了一种独特的“猴头”技法：将水平木梁嵌入石墙以加固结构，木梁外露的端头于墙面上排列成韵，形成富于节奏感的外部装饰。地基以精凿的花岗岩块砌筑，墙面常作内凹之制，既增美学之纵深，亦添结构之稳固。"
 lepsius.2252.g: "无愧于所罗门王的宫殿！"
 lepsius.2253.t: "格厄兹语文献"
 lepsius.2253.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士为博物馆购得了一件来自古代阿克苏姆帝国的珍贵写本。"
 lepsius.2253.f: "阿克苏姆帝国的文献传统，与基督教的传入及格厄兹语（一种独特的南闪米特文字）的发展密不可分。尽管阿克苏姆早期石碑上的铭文常采用多语书写——包括希腊语和萨巴语——但该帝国最终孕育出了以宗教与王室文本为核心的本土文学传统。其中最重大的文献成就，莫过于公元5至6世纪间将《圣经》及多种次经从希腊语译入格厄兹语。诸如《加里马福音》等作品，以其精美的彩绘插图而著称，堪称世界上最古老的基督教抄本之一。"
 lepsius.2253.g: "一件珍贵的写本珍品！"
 lepsius.2254.t: "《阿克苏姆史》"
 lepsius.2254.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士将其关于阿克苏姆帝国积累的知识编纂成一部专著。该书已被视为一部权威著作。"
 lepsius.2254.f: "阿克苏姆帝国（约公元100–940年）兴起于今埃塞俄比亚和厄立特里亚的高原地区，发展为古代世界四大强国之一，与罗马、波斯和中国并驾齐驱。其繁荣建立在对红海贸易路线的战略控制之上——该路线连接了罗马帝国与印度。通过阿杜利斯港，阿克苏姆出口黄金、象牙和祖母绿，同时进口丝绸与香料。公元4世纪，在国王埃扎纳统治下，阿克苏姆达到其政治顶峰，并成为最早将基督教奉为国教的主要帝国之一。这一转变深刻影响了该地区的艺术、建筑以及格厄兹文字的发展。然而，公元7世纪，伊斯兰哈里发国的崛起改变了贸易路线，使该帝国陷入孤立。生态退化与内部动荡最终导致其衰落，但其文化与宗教遗产仍是现代埃塞俄比亚国家的基石。"
 lepsius.2254.g: "这本书理应入藏国家图书馆。"
 lepsius.2261.t: "密西西比人像"
 lepsius.2261.d: "今日，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士向媒体公开展示了一批工艺精湛的密西西比文化人像，这些珍品充分展现了美洲原住民非凡的艺术创造力。它们的出土地点位于[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]。"
 lepsius.2261.f: "密西西比文化石质人像的历史可追溯至公元800年至1500年左右，代表着史前北美具象艺术发展的巅峰。这些拟人雕像多以萤石、砂岩或铝土矿为材，精雕细琢而成，在东南部礼仪复合体社会中，是祖先崇拜仪式的核心器物。它们通常成对出土于土墩顶部寺庙兼陵墓的复合建筑中，其形象多为呈坐姿或跪姿的男女人物。这批雕像拥有一种纪念碑式的永恒静穆感，其肢体形态端肃僵直，头顶梳有诸如“顶髻”等标志性的程式化发式，面容则无一例外地透着超然的安详与隐忍。学界普遍认为，这些雕像即是尊贵先祖或宗族缔造者灵魂的现实载体。"
 lepsius.2261.g: "尽可能多收集这些。"
 lepsius.2262.t: "密西西比巨型土墩"
 lepsius.2262.d: "考古学家发现了一座巨型土墩，其规模之宏伟，几乎可与玛雅与阿兹特克文明的著名建筑等量齐观。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士随即奉命赶赴现场，以更细致入微的视角，对这座充满魅力的密西西比文化瑰宝展开考察。"
 lepsius.2262.f: "密西西比文化最显著的标志，便是土木巨构的营造。这种庞大的土方工程曾彻底重塑了美国中西部与东南部的冲积平原，令其蜕变为结构复杂的城市景观。与更早时期的圆锥形墓葬土堆截然不同，密西西比土墩多为平顶金字塔（即平台式土墩），旨在承载顶部的木制神庙、议事大堂，或是那些被称为“太阳”的神圣贵族们的居所。这些宏伟建筑完全依靠徒手，以数以万计的土篮搬运堆砌而成，堪称是当时酋邦的政教中枢。最负盛名的例子——卡霍基亚遗址的“僧侣土墩”，巍然拔地三十米，占地超五公顷，仅在基底范围上，便足以与雄视千古的埃及吉萨大金字塔平分秋色。"
 lepsius.2262.g: "泥筑的金字塔！"
 lepsius.2263.t: "密西西比陶器"
 lepsius.2263.d: "于[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]进行的一项地方性发掘中，出土了一批可断代为公元前一千纪末叶的陶器窖藏。这批文物似乎与盛极一时的密西西比城市文化有着密切的关联。"
 lepsius.2263.f: "密西西比陶器最为卓尔不群之处，在于其率先使用了碾碎的河蚌壳作为羼和料。这项天才的工艺创新，使得陶匠能够突破砂砾羼和料的物理限制，烧制出壁薄而质坚、器型也更为繁复多变的器皿。此派陶器尤以其千姿百态的造型闻名于世，下至日常所用的带罩盖水瓶、平盘，上至模仿神兽、头颅或精怪形态的“神偶”陶罐，无所不有。其美学范式亦随地域流转而颇具差异：“大道多彩”样式的精髓在于鲜艳欲滴的红白化妆土彩绘；而别处的手艺人则醉心于深刻纹路或负像绘画技法。在礼天敬神的用途上，众多器物身上都披着东南礼仪复合体特有的装饰语言，如那只洞悉万物的“掌中眼”，或是光芒四射的“日芒纹”。"
 lepsius.2263.g: "等等，它们是用贝壳做的？"
 lepsius.2264.t: "密西西比文化墓葬遗址"
 lepsius.2264.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士发现了密西西比文化中几处隐藏的墓葬，并取得了一系列不凡的收获。"
 lepsius.2264.f: "密西西比文化的丧葬习俗与社会等级、宇宙观念深度交织，清晰映照出一个高度分化的阶层社会。社会精英往往被安葬于平台土墩顶上的葬祭庙宇之中，或置于专门的墓葬土墩内部。这些高级别墓葬中常随葬珍贵器物，如压花铜板、海贝项饰及精制陶器，意在陪伴逝者前往来世。相较之下，平民则多葬于居住区附近较为简朴的墓地。该时期墓葬的一大特色是石箱墓——死者被安放在内衬石灰岩或砂岩板的石柜之内。"
 lepsius.2264.g: "妙极了！"
 lepsius.2281.t: "斯基泰武器"
 lepsius.2281.d: "在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]的一次当地考古发掘中，考古学家发现了一批斯基泰人的武器窖藏。马勒、弓和弯刀见证了这支古老草原民族的兵器装备。"
 lepsius.2281.f: "斯基泰人的战争风格以机动性和远程杀伤为特点。他们的主要武器是复合弓，由木材、角和筋腱制成。这种弓存放在一种名为“gorytos”的专业皮制弓袋中，弓袋内可容纳弓和多达200支青铜箭头，使他们能够在马背上进行快速、持续的射击。在近身战斗中，斯基泰人使用一种独特的铁制短剑或匕首，带有长方形护手。考古发现中还常见一种窄刃战斧，能够穿透头盔。防护装备则是由重叠的铁或青铜片缝在皮甲上制成的鳞甲。"
 lepsius.2281.g: "难怪他们统治了草原！"
 lepsius.2282.t: "斯基泰古墓"
 lepsius.2282.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士今日向博物馆宣布了一则喜讯——[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]团队发现了一座此前不为人知的斯基泰墓葬土丘。"
 lepsius.2282.f: "黑海草原地区的斯基泰古墓既是贵族陵墓，也是疆域标志。这类墓葬通常由巨大的橡木或落叶松原木搭建而成的中央木室构成，木室深埋地下。为祭奠逝者，人们在其上方堆砌大量泥土与草皮，形成高耸的土丘；其中“王室”级古墓，如切尔托姆雷克古墓，高度甚至可超过20米。除主墓室外，这些土丘还常设有侧室，用于陪葬的奴仆，以及独立的坑穴，安放数十匹全副武装、配有青铜马衔与缰绳的战马。"
 lepsius.2282.g: "每当有博士走进教室，宣布“好消息！”时，我总是忍不住一跃而起。"
 lepsius.2283.t: "斯基泰人聚居地"
 lepsius.2283.d: "考古学家发现了古代斯基泰人的一处大规模聚落。迄今为止的发掘出土了文物和人类遗骸，这些发现扩展了我们对这一古老草原文化的认识。"
 lepsius.2283.f: "斯基泰人定居点最典型的例子是别尔斯基要塞遗址，这是一个由绵延30多公里的土筑城墙包围的原始城镇复合体。这些定居点战略性地沿河道分布，以控制贸易并保护牲畜。考古发掘发现了永久性木结构住宅、储藏坑，以及专门用于炼铁、铸铜和纺织的工坊。这些中心充当经济枢纽，游牧民在此用原材料交换希腊的酒和陶器等奢侈品。"
 lepsius.2283.g: "一处巨大的村庄……"
 lepsius.2284.t: "斯基泰石碑"
 lepsius.2284.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]地区发现了一块古代石碑，它可追溯到古斯基泰人时期。"
 lepsius.2284.f: "斯基泰石雕，或称“石人”，是横跨庞蒂克草原的巨形砂岩板块，标记着库尔干丘陵的顶端。这些雕像作为祖先纪念物，描绘了已故战士僵直正面的姿态。与东方风格化的“鹿石”不同，这些人物具有拟人形态，并带有斯基泰军事装备的精细雕刻。其图像核心是战士的腰带，上面展示着匕首、弓袋和磨刀石。许多雕像将仪式饮角举至胸前，象征着崇高地位与祭祀盛宴。这些“石人”曾是领土标志和丧葬仪式的焦点。"
 lepsius.2284.g: "带回博物馆。"
 lepsius.2285.t: "金梳"
 lepsius.2285.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士在索洛卡的斯基泰考古发掘中取得了迄今为止最令人瞩目的发现：那座库尔干墓葬内藏有一批数量惊人的黄金宝藏。其中最引人注目的是一件描绘战争场景的金梳。"
 lepsius.2285.f: "索洛哈古墓位于今乌克兰境内的第聂伯河左岸，是斯基泰考古的顶级遗址，由尼古拉·韦谢洛夫斯基于1912年发现。这座规模宏大的墓葬封土高18米，其年代可追溯至公元前4世纪初。\n\n墓中设有两座王室墓室：一座较早的中央墓室，早在古代便遭盗掘；另一座保存完好的侧室墓。后者出土了一位斯基泰国王、一名斟酒官和一名侍卫的遗骸，并伴有五匹殉葬马。除了著名的金器外，随葬品还包括数量庞大的希腊双耳瓶、青铜兵器以及一件银制祭祀礼器。"
 lepsius.2285.g: "它美得简直不该用来梳头……"
 lepsius.2291.t: "维京符文石"
 lepsius.2291.d: "在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]的偏远角落，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士发现了一块可追溯到维京时代的符文石。"
 lepsius.2291.f: "维京符文石是一种凸起的纪念碑，通常由花岗岩或砂岩制成，上面刻有卢恩文字。这些石碑主要立于9至11世纪的斯堪的纳维亚各地，其中以今日瑞典境内的数量最多。与墓碑不同，符文石很少直接置于墓上；它们更多地作为公共纪念物，用以缅怀逝者、记录遗产继承，或炫耀重要的功绩与远征经历。"
 lepsius.2291.g: "破译符文石。"
 lepsius.2291.h: "把符文石带到博物馆。"
 lepsius.2292.t: "维京定居点"
 lepsius.2292.d: "一位来自[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]的农民向当局报告了在其田地中的奇怪发现。研究人员对该区域进行了挖掘，出土了维京时代的文物。随后，一支经验丰富的考古学家团队发掘出了整个定居点。"
 lepsius.2292.f: "维京定居点的基本建筑元素是长屋，这是一种长方形的公共建筑，通常长15至30米。这些建筑由木料、草皮或石材建成的弧形“船形”墙壁，中央设有用于取暖和烹饪的炉灶。在北大西洋地区，定居点因地制宜；而在像冰岛和格陵兰这样木材匮乏的地区，草皮则成为主要建材。在纽芬兰的兰塞奥兹牧草地等遗址进行的考古发掘已经证实，这些定居模式甚至曾短暂扩展到了北美洲大陆。"
 lepsius.2292.g: "真难以相信，这些杀人越货的强盗回到家竟也能是疼爱家人的好丈夫、好父亲。"
 lepsius.2293.t: "维京长船"
 lepsius.2293.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士发现了一艘前维京船只的保存残骸。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U]和其团队已经获得了若干碎片。"
 lepsius.2293.f: "维京长船是北欧人在维京时代专门开发和使用的一种航海船只，用于贸易、探险和战争。其设计特征包括修长纤细的木质船体、浅吃水深度以及对称的船首和船尾，使其既能高速航行，又能在深海和浅水内河中灵活穿梭。建造时通常采用克林克（搭接）工艺，即以铁铆钉固定重叠的木板（主要为橡木），从而使船体具备必要的柔韧性，以抵御大西洋涌浪的扭力。推进方式结合了一面大型方形帆和多排船桨，后者使这些“龙船”能够在无风条件下完成抢滩登陆和战术机动。"
 lepsius.2293.g: "你能把它修好，重新下水吗？不行？那干脆送去博物馆吧！"
 lepsius.2294.t: "维京船葬"
 lepsius.2294.d: "一项考古学轰动！在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]海岸附近，由[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士领导的考古学家发现了一艘保存完好的维京船，显然被用作墓葬。许多珍贵的文物与已故的雅尔一起被埋葬！"
 lepsius.2294.f: "维京船葬是一种丧葬习俗，逝者（通常具有较高社会地位）被安葬于航海船只之中。这一习俗反映了当时人们的信念——船只将作为前往来世（如瓦尔哈拉或Folkvangr）的运载工具。葬礼仪式的步骤为：将逝者安放于船上的墓室中，墓室中通常伴有大量随葬品，包括被献祭的动物（马和狗）、武器、奢华纺织品，有时还有人殉。这些遗址——以著名的奥塞贝格船为代表——随葬品极为丰富，包括华丽的武器、银制首饰和生活工具，为了解北欧人的工艺水平提供了宝贵窗口。"
 lepsius.2294.g: "瓦尔哈拉属于他们，文物归于我们！"
 lepsius.2106.t: "第一门的奥古斯都像"
 lepsius.2106.d: "在罗马第一门附近的莉维娅别墅中，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士取得了一项完全出乎意料的发现：[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]的团队出土了一座罗马第一位皇帝奥古斯都的巨型雕像！"
 lepsius.2106.f: "第一门的奥古斯都像是一尊罗马第一位皇帝的大理石雕像，高约2.04米，于1863年在罗马附近的莉维娅别墅中被发现。雕像以将军向士兵发表演说的姿态描绘奥古斯都。装饰华丽的胸甲具有尤为重要的历史意义。其中心浮雕表现了公元前20年从帕提亚人手中夺回的军团鹰旗——这是奥古斯都精心策划的一场外交胜利，旨在恢复罗马的荣誉。在雕像脚边，一个小丘比特骑在海豚上，以此强调尤利乌斯王朝源自维纳斯女神的神圣血统。该雕像被认为是帝国自我宣传与罗马古典主义最重要的范例之一。"
 lepsius.2106.g: "这无疑是罗马古代最美丽的雕像之一。"
 lepsius.2116.t: "居鲁士文书"
 lepsius.2116.d: "考古队在巴比伦的发掘中取得了一项惊人发现：一份归属于波斯大帝居鲁士的泥板文书。在文中，他阐述了让众多族群返回家园并让他们自由信仰宗教的做法。这是一份古代的人权宣言吗？"
 lepsius.2116.f: "我，居鲁士——世界帝国之王，伟大且强盛之王，巴比伦之王，苏美尔与阿卡德之王，四方世界之王，安善伟大国王冈比西斯之子，居鲁士一世之孙，铁伊斯佩斯之裔——贝勒与纳布二神眷顾吾辈之治。我迎回（底格里斯河对岸的）诸神。我召集四方之民，送其各归故园。于欢欣与喜乐之中，我在巴比伦的王宫设立王座。日复一日，我躬行马尔杜克之祭。我不容任何为乱者于苏美尔与阿卡德全境滋生。我保全巴比伦城及其一切圣所，使其繁荣。我使那些曾违逆神意、身负不堪重轭的百姓，在疲惫中获得安息。伟大的主马尔杜克，赐福于我，居鲁士，以及我亲子冈比西斯，并我全军将士。"
 lepsius.2116.g: "一件珍贵的波斯文物出现在巴比伦？令人震惊。"
