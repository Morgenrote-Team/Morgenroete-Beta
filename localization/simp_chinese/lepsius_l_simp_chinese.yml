 lepsius_archaeologist_desc: "这位学者对古代语言、失落文明和珍贵文物很感兴趣，希望重构历史。"
 lepsius_archaeologist_experienced: "经验丰富的考古学家"
 lepsius_archaeologist_experienced_desc: "该角色有几次重要的考古发现，享有很高的声誉。"
