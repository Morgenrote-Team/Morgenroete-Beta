 lepsius_specialization_egypt_button: "埃及学"
 lepsius_specialization_egypt_button_desc: "埃及学探讨了自公元前5000年的史前时代（如奈加代文化和拜达里文化）到公元4世纪罗马统治结束期间古埃及文明的所有领域，包括日常生活、语言和文学、历史、宗教、文化和艺术、经济、法律、伦理以及知识领域。"
 lepsius_specialization_mesopotamia_button: "亚述学"
 lepsius_specialization_mesopotamia_button_desc: "亚述学又称楔形文字研究或古代近东研究，是对使用楔形文字的文化进行考古学、人类学、历史学和语言学研究的学科。其领域涵盖前王朝时期的美索不达米亚、苏美尔、早期苏美尔‑阿卡德城邦、阿卡德帝国、埃勃拉、亚述的阿卡德语与帝国阿拉姆语诸国、巴比伦尼亚和海地王朝，以及古提人、阿摩利人、加喜特人、亚兰人、苏特人和迦勒底人等外来移民在美索不达米亚南部建立的王朝。"
 lepsius_specialization_aegean_button: "爱琴海考古学"
 lepsius_specialization_aegean_button_desc: "爱琴文明是对爱琴海周边希腊青铜时代文明的统称，涵盖了三个不同但相互沟通和互动的地理区域：克里特岛、基克拉泽斯群岛和希腊本土。克里特岛与青铜时代早期的米诺斯文明有关；基克拉泽斯文明则在希腊早期与希腊大陆交流，在米诺斯中期与克里特岛交流；约公元前1450年（希腊晚期、米诺斯晚期），来自希腊的迈锡尼文明可能通过军事征服传播到克里特岛。"
 lepsius_specialization_precolumbian_button: "美洲考古学"
 lepsius_specialization_precolumbian_button_desc: "在美洲历史上，前哥伦布时代指旧石器时代上古时期美洲的原始居民到1492年克里斯托弗·哥伦布航海开始欧洲殖民之间的时期。通常，这个时代涵盖了土著文化的历史，直到受到欧洲人的重大影响为止。对某些文化而言，这可能延续在哥伦布到来之后的几十年甚至几百年。"
 lepsius_alexander_search_clue_button: "找到更多线索"
 lepsius_alexander_search_clue_button_desc: "我们可以进行一次特殊的考古探险以寻找其余的指向亚历山大大帝陵墓的考古线索。"
 lepsius_ark_search_clue_button: "找到更多线索"
 lepsius_ark_search_clue_button_desc: "我们可以进行一次特殊的考古探险以寻找其余的指向约柜的考古线索。"
 lepsius_atlantis_search_clue_button: "找到更多线索"
 lepsius_atlantis_search_clue_button_desc: "我们可以进行一次特殊的考古探险以寻找其余的指向亚特兰蒂斯的考古线索。"
 lepsius_eldorado_search_clue_button: "找到更多线索"
 lepsius_eldorado_search_clue_button_desc: "我们可以进行一次特殊的考古探险以寻找其余的指向黄金国的考古线索。"
 lepsius_legendary_expedition_modifier: "传奇考古探险"
 lepsius_alexander_intensive_study_button: "锡瓦"
 lepsius_alexander_intensive_study_button_desc: "亚历山大一生中的重要地点之一——锡瓦绿洲，因为有人认为他被葬在这里而非亚历山大城，而且他与埃及的阿蒙神有着密切的联系，而阿蒙神神谕所就在锡瓦绿洲。由于我们在埃及地区的杰出知识，我们可以很容易地在这里找到额外的线索。我们派遣考古学家私下秘密地进行考察，不要像考古探险队那样大张旗鼓。"
 lepsius_ark_intensive_study_button: "耶路撒冷"
 lepsius_ark_intensive_study_button_desc: "耶路撒冷圣殿山是约柜失踪前最后的存放地。圣殿山下很可能还有重要的线索，可以发现巴比伦征服的混乱时期究竟发生了什么。凭借我们在亚述地区杰出知识，我们可以很容易地在这里找到额外的线索。我们派遣考古学家私下秘密地进行考察，不要像考古探险队那样大张旗鼓。"
 lepsius_atlantis_intensive_study_button: "圣托里尼"
 lepsius_atlantis_intensive_study_button_desc: "圣托里尼岛因其火山环绕而闻名于世，其中一次火山爆发影响了岛上的一座米诺斯城市，甚至可能影响了整个米诺斯文明。而火山爆发是柏拉图关于亚特兰蒂斯沉没故事的起源，是关于亚特兰蒂斯假说之一。凭借我们在爱琴海地区杰出知识，我们可以很容易地在这里找到额外的线索。我们派遣考古学家私下秘密地进行考察，不要像考古探险队那样大张旗鼓。"
 lepsius_eldorado_intensive_study_button: "波哥大"
 lepsius_eldorado_intensive_study_button_desc: "波哥大是奇布查文明首都，是大名鼎鼎的黄金国神话遗址。每一位奇布查人新统治者继位都要向太阳神献祭，他会在自己的全身涂满金粉，并到山中的圣湖中洗净，而祭司和贵族会将珍贵的黄金和绿宝石投入湖中献给神。凭借我们在美洲考古学领域的知识，我们可以很容易地在这里找到额外的线索。我们派遣考古学家私下秘密地进行考察，不要像考古探险队那样大张旗鼓。"
 lepsius_2_sub_archaeological_team_tt: "失去#R 2支#!考古发掘队。"
 lepsius_egypt_specialist: "专长：埃及学"
 lepsius_egypt_specialist_desc: "这位考古学家是古埃及领域的专家，因此更容易找到埃及文物和线索。"
 lepsius_mesopotamia_specialist: "专长：亚述考古学"
 lepsius_mesopotamia_specialist_desc: "这位考古学家是亚述领域的专家，因此更容易找到亚述文物和线索。"
 lepsius_aegean_specialist: "专长：爱琴海考古学"
 lepsius_aegean_specialist_desc: "这位考古学家是爱琴海领域的专家，因此更容易找到爱琴海文物和线索。"
 lepsius_precolumbian_specialist: "专长：美洲考古学"
 lepsius_precolumbian_specialist_desc: "这位考古学家是美洲领域的专家，因此更容易找到美洲文物和线索。"
 lepsius_state_trait_alexander: "追溯亚历山大"
 lepsius_state_trait_ark: "追溯约柜"
 lepsius_state_trait_atlantis: "追溯亚特兰蒂斯"
