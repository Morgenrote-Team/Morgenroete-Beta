l_simp_chinese:
 lepsius_upper_egypt_modifier: "帝王谷"
 lepsius_upper_egypt_modifier_desc: "帝王谷是世界上最迷人的考古遗址之一。在这座拥有着千年历史的古迹之中，有着众多宝藏在等着我们。"
 lepsius_lower_egypt_modifier: "金字塔"
 lepsius_lower_egypt_modifier_desc: "拥有古都孟菲斯的下埃及是一块有诸多未发现金字塔和未发现城市的土地，据说直到今天还有一系列遗失的文物埋藏在埃及的沙漠中。"
 lepsius_babylonia_modifier: "文明的摇篮"
 lepsius_babylonia_modifier_desc: "美索不达米亚被认为是发明文字和农业的土地，也是第一个王国兴起的地方。楔形文字碑、石像和寺庙废墟仍然是曾经辉煌文明的证据。"
 lepsius_assyria_modifier: "尼尼微和尼姆鲁德遗迹"
 lepsius_assyria_modifier_desc: "亚述不仅是最早的扩张性帝国的发源地，也是古代东方历史和《圣经》叙述的交汇点，昔日的花园和残存城墙遗迹至今仍令人神往。"
 lepsius_argolis_modifier: "迈锡尼城堡"
 lepsius_argolis_modifier_desc: "迈锡尼文化被认为是希腊第一个先进文明。希腊神话中的国王长期以来一直被认为只是童话故事。但现在考古挖掘可能证明，这些故事有一个真实的内核。"
 lepsius_crete_modifier: "米诺斯文明"
 lepsius_crete_modifier_desc: "克里特岛是欧洲最古老的城市的所在地，上面还有神秘的宫殿群。米诺斯文化是以传说中的米诺斯国王命名的，据说他曾经统治了整个爱琴海。"
 lepsius_yucatan_modifier: "尤卡坦之谜"
 lepsius_yucatan_modifier_desc: "在尤卡坦的丛林深处，据说仍有曾经繁荣玛雅文化的失落之城。当地人相传，如果有人设法冲破密不透风的灌木丛，就会产生想要去考古的想法。"
 lepsius_peru_modifier: "安第斯山脉之谜"
 lepsius_peru_modifier_desc: "印加帝国曾经是南美大陆上最强大的国家，但随着西班牙的征服而结束。据说山脉中仍有不为人知的陵墓和寺庙。有些人甚至讲述了一个隐藏在安第斯山脉中的失落之城。"
