 lepsius.714.t: "克利奥帕特拉方尖碑"
 lepsius.714.d: "与地方当局的最终谈判尘埃落定，“克利奥帕特拉方尖碑”的拆卸、运输与重建至此再无阻碍。这是一项意义非凡的考古与工程壮举！"
 lepsius.714.f: "在其历史性的迁移之前，这两座“针”作为半被遗忘的纪念碑，在亚历山大港的恺撒神庙中默默矗立了数个世纪——其中一座方尖碑仍保持直立，而另一座早已沉入沙漠的沙土之中。在早期殖民主义和“埃及热”时期，人们产生了无数设想，希望将这些独石巨碑运往西方各国的首都，作为国家主权与科学征服的有力象征，但由于当时巨大的后勤困难，这些计划最初均以失败告终。在欧洲旅行者的眼中，这两座方尖碑与宏伟的庞培柱——古代最大的独石柱之一——共同构成了亚历山大港天际线的标志性三联景观，标志着从法老时代向希腊罗马时代辉煌的过渡。庞培柱因其庞大的结构和在塞拉比尤姆高原上的牢固根基，始终作为一座不可移动的纪念碑矗立原处；而方尖碑则逐渐被视为外交贸易品，最终作为穆罕默德·阿里帕夏总督的珍贵赠礼，踏上了横渡大洋的旅程。"
 lepsius.714.g: "将方尖碑运送到[ROOT.GetCountry.GetCapital.GetCityHubName]！"
 lepsius.715.t: "克利奥帕特拉方尖碑"
 lepsius.715.d: "方尖碑于今日运抵[ROOT.GetCountry.GetCapital.GetCityHubName]。当地以一场盛大的公开仪式迎接其到来，民众亦群情振奋，热烈庆贺。"
 lepsius.715.f: "伦敦的“针”于1878年运抵该城——它被装入一艘特制的浮动铁制圆柱体中。该圆柱体在比扎亚湾遭遇狂风巨浪，险些沉没，六名船员因此丧生。纽约的方尖碑则于1881年落成于中央公园。此前，它经由一艘精心改造的蒸汽船漂洋过海，随后借助一座巨大的木制脚手架，在纽约一厘米一厘米地滚动，终抵预定之位。两座纪念碑抵达之时，皆举行了隆重的公众庆典，至今仍伫立于现代都市之中，作为古埃及的醒目象征，熠熠生辉。"
 lepsius.715.g: "这必将令我们的帝国雄心在世界舞台上愈加稳固！"
 lepsius.773.t: "彼德拉斯内格拉斯石碑"
 lepsius.773.d: "与地方当局的最终谈判尘埃落定，“彼德拉斯内格拉斯石碑”的拆卸、运输与重建至此再无阻碍。这是一项意义非凡的考古与工程壮举！"
 lepsius.773.f: "彼德拉斯内格拉斯石碑，一组出自同名玛雅古城的大型石雕纪念碑。该城坐落于今危地马拉境内。这些石碑以“佩滕风格”雕就，其上常刻有身披华服的统治者形象——或端坐于壁龛之中，或凛然立于俘虏之上。这些石纪念碑因其绝伦的艺术造诣与深远的历史意义而享誉世界。如今，其中多件碑石分别珍藏于危地马拉城的国家考古与民族学博物馆及宾夕法尼亚大学博物馆。"
 lepsius.773.g: "将彼德拉斯内格拉斯石碑运送到[ROOT.GetCountry.GetCapital.GetCityHubName]！"
 lepsius.774.t: "彼德拉斯内格拉斯石碑"
 lepsius.774.d: "今日，随着在[ROOT.GetCountry.GetCapital.GetCityHubName]的一场公开展览，考古博物馆向公众及感兴趣的参观者展示了彼德拉斯内格拉斯石碑。"
 lepsius.774.f: "这些石碑运抵费城的宾夕法尼亚大学博物馆（简称宾大博物馆）后，即成为全新改造后的玛雅展厅之核心重器，在此首度面向广大西方观众展出。为护其精密浮雕免于进一步损蚀，并便于研究，馆方动用大量技术设备对这批大型石雕进行了永久性安置。时至今日，它们仍是破译玛雅象形文字的关键密钥，亦见证着彼德拉斯内格拉斯古城往昔的恢弘气象。"
 lepsius.774.g: "巨型古物。正合我意！"
 lepsius.2256.t: "阿克苏姆方尖碑"
 lepsius.2256.d: "方尖碑于今日运抵[ROOT.GetCountry.GetCapital.GetCityHubName]。当地以一场盛大的公开仪式迎接其到来，民众亦群情振奋，热烈庆贺。"
 lepsius.2256.f: "阿克苏姆方尖碑于1937年作为法西斯意大利的战利品运抵罗马。此前，它奉墨索里尼之命在埃塞俄比亚被拆解，并在极其艰巨的后勤条件下经由船运运出。该碑被重新竖立于殖民部大楼之前，在罗马城景之中以帝国胜利象征之姿矗立了数十年。历经漫长的外交谈判与技术筹备，这座150吨重的纪念碑于2005年归还埃塞俄比亚，并于2008年在其原属的考古公园中重新巍然立起。"
 lepsius.2256.g: "这必将令我们的帝国雄心在世界舞台上愈加稳固！"
