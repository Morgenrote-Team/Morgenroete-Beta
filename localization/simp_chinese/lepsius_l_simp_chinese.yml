 je_lepsius_palmyra_reason: "#T 叙利亚的巴尔米拉遗址对考古学家来说是一个令人着迷的地方。#!\n$mr_divider_for_je$\n每个月你都会根据许多不同的因素获得进展。在发掘的某些阶段，你会经历一个事件，让你获得[Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]、经验和改变省份特质，从而获得更多的[concept_curtiss_tourism]收入。\n$mr_divider_for_je$\n$lepsius_excavation_progress_loc$"
 je_lepsius_palmyra_1_loc: "遗址大部分仍保持着几个世纪以来的原貌。"
 je_lepsius_palmyra_2_loc: "最近对贝尔神庙的发掘和修复吸引了更多的人前来参观这一古迹。"
 je_lepsius_palmyra_3_loc: "我们的考古学家发掘并修复了贝尔神庙、塔墓谷及其塔墓等多座神庙，现在游客越来越多。"
