 je_lepsius_letter_to_rosellini: "累普济乌斯手信"
 je_lepsius_letter_to_rosellini_reason: "雄心勃勃的年轻语言学家卡尔·理察·累普济乌斯即将取得突破。他将使用他的方法来改进商博良破译象形文字的基础知识——从而彻底改变考古学研究。"
 je_lepsius_stephens_catherwood_expedition: "斯蒂芬斯和卡瑟伍德远征"
 je_lepsius_stephens_catherwood_expedition_reason: "驻中美洲大使约翰·劳埃德·斯蒂芬斯表示有兴趣访问尤卡坦半岛。艺术家弗雷德里克·卡瑟伍德希望陪同他去丛林中的神秘遗迹进行考察。只要我们为其创造合适的舞台，这项冒险就能成为一个事关国家威望的问题。"
 je_lepsius_decipherment_akkadian: "揭秘阿卡德语"
 je_lepsius_decipherment_akkadian_reason: "虽然象形文字的破译让专家们悬而未决了几十年。但是奥斯丁·亨利·莱亚德对尼姆鲁德的考察使得破译古代美索不达米亚地区的阿卡德语不再是一个难题。考古界的上一次巨大突破还是贝希斯敦铭文的发现，贝希斯敦的多语言铭文让古波斯语和楔形文字展露于世。而阿卡德语的破译势必会为考古学界指出下一条明路的方向。"
 je_lepsius_support_schliemann: "海因里希·施里曼的特洛伊之梦"
 je_lepsius_support_schliemann_reason: "海因里希·施里曼是一位德国商人，自学成才，曾周游世界，积累了一笔可观的财富。然而从年轻时起，他的真正爱好就是《荷马史诗》。施里曼确信古代特洛伊不是一个童话故事，他仍在寻找支持者。"
 je_lepsius_machu_picchu: "印加的遗产"
 je_lepsius_machu_picchu_reason: "通过最新的技术和最先进的研究方法，即使是世界上最难以通行的地方，对二十世纪初的人们来说也不再是一个秘密。特别是，飞机的发明对以前偏远地区的测绘起到了巨大的帮助。也许失传已久的文明的最后一个谜团终于可以被解开了。"
 je_lepsius_epic_of_gilgamesh: "《吉尔伽美什史诗》"
 je_lepsius_epic_of_gilgamesh_reason: "《吉尔伽美什史诗》是一组来自古巴比伦地区的文学作品，其中包含了现存最古老的书面印章之一。《吉尔伽美什史诗》包含了多种语言版本，其中最为知名的版本为阿卡德语版和苏美尔语版。它围绕乌鲁克半人半神的国王吉尔伽美什和他的朋友‑曾与野兽为伴的泥人恩奇杜的之间的友谊故事展开。#T 需集齐五个片段来重现《吉尔伽美什史诗》。#!"
 je_lepsius_epic_of_gilgamesh_success: "找到至少#G 5个#!@lepsius_gilgamesh_fragment!《吉尔伽美什史诗》的片段来重现它。"
