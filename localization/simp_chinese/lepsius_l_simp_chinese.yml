 lepsius.5000.t: "巴尔米拉遗址"
 lepsius.5000.d: "我国是巴尔米拉古城遗址的所在地，我们的考古学家们正迫不及待地开始对遗址进行发掘，希望尽可能多地从中汲取知识。"
 lepsius.5000.f: "帕尔米拉是叙利亚一座存在了几个世纪的古城，这座城市以其经商而闻名。因此当地富商们建造了许多古迹，但也有许多古建筑都经过了改建，这让考古学家们很为难。\n\n这座城市不仅因其商人而闻名，还因罗马帝国分离出的割据政权帕尔米拉帝国国王奥登纳图斯的王后芝诺比娅而闻名，她曾在一段时间内控制了罗马帝国的东部，直到奥勒良皇帝重新征服东部并摧毁了帕尔米拉城。"
 lepsius.5000.g: "不知道我们会发现什么！"
 lepsius.5001.t: "修复贝尔神庙"
 lepsius.5001.d: "我们的考古学家一直在为修复贝尔神庙而努力。这座穆斯林时期的增建和改建的建筑必须拆除，埋藏部分也必须清理出来。"
 lepsius.5001.f: "贝尔神庙位于叙利亚巴尔米拉古城。贝尔神庙的历史，可以追溯到公元前3世纪中叶，遗址的大部分建于公元1世纪晚期到2世纪早期，是巴尔米拉古城保存最完好的神庙之一。\n\n#V 如今：#!已于2015年8月30日遭占据叙利亚的伊斯兰国以炸药摧毁。"
 lepsius.5001.g: "不知道我们会发现什么！"
 lepsius.5002.t: "发掘塔墓谷"
 lepsius.5002.d: "巴尔米拉西部有许多古墓，我们的考古学家将发掘并修复这些令人印象深刻的墓塔。"
 lepsius.5002.f: "在塔墓谷中，有许多塔墓。最早的一座可追溯到公元前 9年，被称为阿滕那塔。另一座塔是埃拉贝勒塔是在图拉真皇帝统治时期建造。当图拉真皇帝掌权时，埃拉贝卢斯似乎已成为罗马公民，而且从中发现来自东方的丝绸碎片。\n\n#V 如今：#!伊斯兰国摧毁了大量的塔墓。"
 lepsius.5002.g: "真是令人印象深刻！"
 lepsius.5003.t: "巴尔米拉：棕榈树之城"
 lepsius.5003.d: "我们的考古学家花费了多年时间发掘巴尔米拉的遗迹，并进行重建，它已成为一个值得再次造访的地方。"
 lepsius.5003.f: "巴尔米拉古城再次吸引游客，许多人都想看看这座曾经与罗马抗衡的伟大城市，雄伟的塔墓、柱廊、贝尔神庙和巴尔夏明神庙无不彰显这座城市的金碧辉煌，想必古时这里一定是一幅美妙的景象！"
 lepsius.5003.g: "一个值得参观的好地方！"
