 lepsius_state_trait_persepolis: "波斯波利斯——阿契美尼德帝国的明珠\n考古项目中的@lepsius_local_minor!本地文物#G +1#!"
 je_lepsius_persepolis: "阿契美尼德帝国的明珠"
 je_lepsius_persepolis_reason: "波斯波利斯早已备受古代作家与史学家的颂扬。这座遗址数百年来吸引着远方的旅人纷至沓来，但它从未真正湮没于世——这在一定程度上要归因于那则关于亚历山大大帝的神话，他正是以这座波斯帝国的古都为征伐目标。然而，一项现代的考古发掘至今仍悬而未决。"
 lepsius.69.t: "波斯波利斯"
 lepsius.69.d: "自亚历山大大帝的军队将那宏伟的波斯波利斯夷为平地，近两千五百年的光阴已然逝去——然而，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]与[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]的团队正竭力拯救一切尚可拯救的，复原一切尚可复原的，并试图理解一切尚可理解的。终于，在历经无数次的兵燹与劫掠之后，对这座古城进行的一次真正严谨的科学考察，即将拉开帷幕。"
 lepsius.69.f: "“波斯波利斯乃波斯帝国之都城。亚历山大曾对麾下的马其顿人言，此乃亚洲诸城中最令人切齿痛恨的一座，故将其交予士卒大肆劫掠，仅有王宫得以豁免。此城是当时太阳底下至为富庶的所在，其民宅历经世代搜罗，装满了世间应有尽有的奇珍异宝。马其顿人长驱直入，见男子便杀，遇宅邸则抢；其中大量房屋均属寻常百姓，但屋内仍是四壁锦绣，衣物细软，取之不尽。”\n——狄奥多罗斯·西库路斯"
 lepsius.2271.t: "泰罗纳吊坠"
 lepsius.2271.d: "一次地方考古发掘出土了多件珍贵的黄金吊坠。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士已详细检视了这些独特的器物，并认为它们是美洲前哥伦布时代艺术的杰作。"
 lepsius.2271.f: "泰罗纳是一个高度发达的美洲文明，位于今哥伦比亚境内的圣玛塔内华达山脉。他们以其卓越的工程技艺而闻名，通过建造复杂的石砌梯田、排水系统和铺砌道路，成功克服了陡峭的地形。他们的社会由相互竞争的酋邦构成，如邦达和波西圭卡，这些酋邦由一个具有影响力的祭司阶层在精神上加以统合。泰罗纳人以其“失落的黄金”著称——即采用通巴加合金工艺制作的精美金器，这些金器常描绘萨满教变形场景以及备受敬畏的美洲豹。"
 lepsius.2271.g: "哥伦比亚遍布考古宝藏！"
 lepsius.2272.t: "圣阿古斯丁雕像"
 lepsius.2272.d: "在哥伦比亚南部，有农民报告了一个被废弃的遗址，据说那里有几尊神秘的雕像。一支考古队对其中一尊谜一般的雕像进行了更仔细的检查。"
 lepsius.2272.f: "神秘的圣阿古斯丁文化在哥伦比亚高地留下了南美洲最重要的考古遗址之一。在公元前200年至公元800年间，无名的雕刻家们用火山岩创作了500多尊巨型石像，这些雕像散布在广袤的山地景观之中。其中一些雕像高达四米以上，守护着大型墓葬群和仪式中心。这些雕像的造型多为兽人同形：人类的特征与猛兽的獠牙、鹰爪或蛇类特征相结合，暗示着一种根深蒂固的萨满信仰和祖先崇拜。特别引人注目的是“双重自我”的母题——一尊雕像背负着另一尊。由于该文化在西班牙人到来前数个世纪就已消亡，且未留下任何文字记载，因此，诸如“雕像森林”等地的石像守护者，至今仍是安第斯考古学上的一个谜团。"
 lepsius.2272.g: "一个留下如此多未解之谜的文化！"
 lepsius.2273.t: "泽努文物"
 lepsius.2273.d: "考古调查出土了数件来自泽努文化的日常用品，并已向[ROOT.GetCountry.GetCapital.GetCityHubName]的博物馆进行了通报。"
 lepsius.2273.f: "泽努（亦称辛努）人在哥伦比亚北部的肥沃低地与河谷地区繁衍生息。其留存于世的重要遗产是一套宏伟的水利管理系统：数世纪以来，他们建造了广阔的人工运河网络，以可控方式排干了超过50万公顷土地上的积水，从而在极易遭受洪水的地区实现了集约化农业。在社会组织上，他们分为三个区域，各司其职，分别主管生产、宗教事务与丧葬仪式。他们的工艺体现在精美的金器——多以水栖与陆栖动物为造型——以及纺织技艺之中。“Vueltiao帽”（一种哥伦比亚传统编织帽，现为该国国家象征之一）的传统即根植于泽努人的篮筐编织技艺。"
 lepsius.2273.g: "一个技艺卓绝的民族。"
 lepsius.2274.t: "穆伊斯卡的黄金"
 lepsius.2274.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士对其团队最近在安第斯山脉获得的一批窖藏赞不绝口。该窖藏中含有数件珍贵文物。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U]确信无疑：这些宝藏曾属于传说中的穆伊斯卡人。"
 lepsius.2274.f: "穆伊斯卡人（亦称奇布查人）居住在如今哥伦比亚中部安第斯山脉凉爽的高原地区。他们与印加人、玛雅人和阿兹特克人并列为美洲四大最发达文明，不过他们弃用纪念性石质建筑，而偏爱木材与茅草。在政治上，其领土组成了穆伊斯卡联盟，由齐帕（驻于巴卡塔）和萨克（驻于洪萨）统领。其经济建立在一个覆盖盐、祖母绿及纺织品的广阔贸易网络之上。他们因“黄金国”的传说而闻名于世：在新统治者就职仪式上，他会按习俗以金粉涂满全身，并在瓜塔维塔湖中献祭黄金小雕像（通霍）。这些精美的金器并非用作货币，而是作为精神层面的祭品。"
 lepsius.2274.g: "曾经失落的黄金之惊鸿一瞥……"
 lepsius.550.tt: "拥有爱琴海考古学专长即可解密此事。"
 lepsius.550.t: "神秘米诺斯宫殿"
 lepsius.550.d: "在考察期间，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士在克诺索斯附近发现了一处遗迹，该遗迹显然从未被任何人编录过。"
 lepsius.550.f: "当然，这座昔日建筑群仅余极为有限的残迹。考古学家推测，宫殿大部分主体结构或许仍长眠于地下。然而，若要一探究竟，则需启动一项大规模发掘工程——这在本次综合性考察中实难实现。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士遂决定，来日当对该遗址详加勘查与研究。"
 lepsius.550.g: "这座宫殿里埋藏着什么秘密？"
 je_lepsius_mysterious_minoan_palace: "神秘米诺斯宫殿"
 je_lepsius_mysterious_minoan_palace_reason: "在一次考察中，我们的考古队在克诺索斯附近发现了一座神秘的宫殿。此次发掘需要高度聚焦爱琴海考古学，方能揭开其秘密。"
 je_lepsius_the_labyrinth_fail: "倘若[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting]博士迷路太多，一种极其、极其不祥的厄运，便极有可能降临在[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]的头上……"
 je_lepsius_the_labyrinth_success: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting]博士并未在迷宫中陷得太深，成功逃出生天。"
