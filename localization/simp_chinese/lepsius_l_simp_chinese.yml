 notification_lepsius_rosellini_notification_name: "累普济乌斯手信"
 notification_lepsius_rosellini_notification_desc: "德国语言学家卡尔·理察·累普济乌斯在给意大利埃及学家伊波利托·罗塞利尼的信中介绍了他改进后的象形文字翻译方法。迫不及待地想要进行下一次埃及探险了！"
 notification_lepsius_stephens_catherwood_expedition_notification_name: "斯蒂芬斯和卡瑟伍德远征"
 notification_lepsius_stephens_catherwood_expedition_notification_desc: "美国探险家约翰·劳埃德·斯蒂芬斯和英国艺术家弗雷德里克·卡瑟伍德已经从尤卡坦半岛的冒险旅程中返回——他们讲述了丛林中遇到的传奇遗迹。学者们已经表示有兴趣对玛雅文化进行更深入的探索。"
 notification_lepsius_decipherment_akkadian_notification_name: "揭秘阿卡德语"
 notification_lepsius_decipherment_akkadian_notification_desc: "全国的报纸都在报道经验丰富的考古学家领导取得的突破：美索不达米亚的古代语言不再是一个秘密。没有什么能阻挡对巴比伦和亚述的探索。"
 notification_lepsius_support_schliemann_notification_name: "施里曼发现特洛伊！"
 notification_lepsius_support_schliemann_notification_desc: "德国商人海因里希·施里曼发现了特洛伊遗址，此地长期以来一直被认为是童话故事。世界各地的考古学家对古希腊产生了新的热情——尽管这种热情存在于神话般的古代。"
 notification_lepsius_machu_picchu_notification_name: "马丘比丘"
 notification_lepsius_machu_picchu_notification_desc: "一支考古探险队发现了隐匿于安第斯山脉中的印加失落之城——马丘比丘。学者们鼓励在当地进行深入研究。"
 notification_lepsius_excavation_artifacts_notification_name: "新发掘文物"
 notification_lepsius_excavation_artifacts_notification_desc: "今天早上，我们的考古博物馆收到了一批从发掘现场运来的新文物"
 lepsius_hide_archaeological_decisions: "隐藏考古决议"
 lepsius_hide_archaeological_decisions_desc: "隐藏所有考古决定以保持更好的浏览"
 lepsius_show_archaeological_decisions: "显示考古决议"
 lepsius_show_archaeological_decisions_desc: "显示所有的考古决议"
 lepsius_cancel_excavation_decision: "召回我们的其中一支考古发掘队"
 lepsius_cancel_excavation_decision_desc: "在某些情况下，召回考古发掘队可能很有用。我们获得的文物将保留下来，但我们的永久挖掘工作将结束。"
 lepsius_gather_first_excavation_team_decision: "召集一支新的考古队"
 lepsius_gather_first_excavation_team_decision_desc: "我们可以再培养一支考古队，这意味着可以同时进行多次挖掘。"
 lepsius_gather_second_excavation_team_decision: "召集一支新的考古队"
 lepsius_gather_second_excavation_team_decision_desc: "我们可以再培养一支考古队，这意味着可以同时进行多次挖掘。"
 lepsius_gather_third_excavation_team_decision: "让考古学家组建一支新队伍"
 lepsius_gather_third_excavation_team_decision_desc: "我们可以再培养一支考古队，这意味着可以同时进行多次挖掘。"
 lepsius_upper_egypt_expedition_decision: "帝王谷"
 lepsius_upper_egypt_expedition_decision_desc: "凭借古都底比斯和帝王谷，上埃及被认为是埃及的圣地。我们应该获得该地区的考古许可证并寻找埃及的宝藏。"
 lepsius_lower_egypt_expedition_decision: "金字塔"
 lepsius_lower_egypt_expedition_decision_desc: "自古以来，埃及金字塔就令人类着迷。据说那些已经消失在下埃及沙漠中的陵墓、寺庙甚至城市都在等待被重新发现。"
 lepsius_babylonia_expedition_decision: "文明的摇篮"
 lepsius_babylonia_expedition_decision_desc: "巴比伦是美索不达米亚的南部地区，它的名字来源于曾经强大的城市巴比伦。这里被认为是“文明的摇篮”，珍贵的考古文物一次又一次地被发现。它们绝对属于博物馆。"
 lepsius_assyria_expedition_decision: "亚述空中花园"
 lepsius_assyria_expedition_decision_desc: "亚述指的是美索不达米亚北部地区，有亚述和尼尼微两个重要城市。关于这个国家的稀少的知识可以追溯到《圣经》这个来源，但也许有更可靠的历史证据？"
 lepsius_argolis_expedition_decision: "阿伽门农之城"
 lepsius_argolis_expedition_decision_desc: "在发现特洛伊城之后，即使是持怀疑态度的学者也开始意识到，古希腊人的神话不仅仅是童话故事。据说青铜时代的城市遗迹至今还在阿尔戈利斯，其中最著名的是迈锡尼，我们应该让自己相信这一点。"
 lepsius_crete_expedition_decision: "弥诺陶洛斯的故事"
 lepsius_crete_expedition_decision_desc: "传说中的米诺斯国王曾经统治过克里特岛。与特洛伊和迈锡尼相似，这个故事似乎也有道理：岛上越来越多地发现来自传说中的米诺斯文化文物，我们国家也应该确保有其中的一些。"
 lepsius_yucatan_expedition_decision: "玛雅失落之城"
 lepsius_yucatan_expedition_decision_desc: "关于丛林中未知的巨大城市报告越来越多，我们应该进一步调查并派遣考古探险队前往尤卡坦。"
 lepsius_peru_expedition_decision: "印加的遗产"
 lepsius_peru_expedition_decision_desc: "飞行员报告说，他们在秘鲁上空飞行时看到安第斯山脉的奇怪堡垒和城墙结构，也许西班牙人并没有完全摧毁印加人的文化？一些土著人抵抗的城镇至今仍未被发现。"
 lepsius_found_archaeological_museum_decision: "建造一座考古博物馆"
 lepsius_found_archaeological_museum_decision_desc: "每个有民族自尊的国家都会在其首都有一个独特的博物馆，以展示其从考古家、探险家获得所有文物。这些文物的数量和不同的收藏品不仅为其在世界范围内的传播声望，而且还具有教育价值。"
 lepsius_visit_archaeological_museum_decision: "参观考古博物馆"
 lepsius_visit_archaeological_museum_decision_desc: "查看您获得的文物统计数据，并将它们重新安排到著名的展览中。"
 lepsius_appoint_lead_scientist_decision: "任命首席学者"
 lepsius_appoint_lead_scientist_decision_desc: "为考古博物馆任命一位新的首席学者。他将担任这个职位大约15到20年，任命将使他在此期间免于从政治舞台上消失。"
 lepsius_found_archaeological_society_decision: "创立考古学会"
 lepsius_found_archaeological_society_decision_desc: "经过多年的考察、挖掘和文物发现，我国对考古学的兴趣不仅在不算增长，更已积累了惊人的专业知识。一位杰出的考古学家可以成立一个考古学会，聚合科学与知识力量并提供新的动力。这不仅可以提升我们的科学成果，还能为后世的考古学家留下宝贵的经验。"
 lepsius_inspect_excavation_decision: "组织一次深入的考古调查"
 lepsius_inspect_excavation_decision_desc: "我们可以派遣一位经验丰富的考古学家到正在进行发掘的地区以推动当地的工作。我们的考古学家会在一年左右的时间里开辟一个新的发掘现场，并进行深入的研究，在此期间，我们可以进一步探索此前未知的重大考古发现的痕迹。成功与否主要取决于我们考古学家的经验。考古学会的成立也增加了我们的机会。"
 lepsius.2.t: "致函罗塞利尼教授"
 lepsius.2.d: "德国语言学家[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]在给意大利埃及学家伊波利托·罗塞利尼的信中介绍了他改进后的象形文字翻译方法。迫不及待地想要进行下一次埃及探险了！"
 lepsius.2.f: "在弗朗索瓦·商博良去世后，象形文字的研究便陷入了停滞。1837年，年轻的德国语言学家[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]给伊波利托·罗塞利尼写了一封信。罗塞利尼曾是商博良的亲密伙伴，他们共同组织了著名的“法国‑托斯卡纳联合探险队”，于1829年前往埃及。作为后人，累普济乌斯系统性的整理了商博良的想法，并试图将埃及学转变为一门严肃的科学学科。与此同时，他还说服了欧洲的政治精英们再次对埃及进行重新考察。"
 lepsius.2.a: "我们将探索埃及的秘密！"
 lepsius.3.t: "斯蒂芬斯和卡瑟伍德"
 lepsius.3.d: "美国探险家约翰·劳埃德·斯蒂芬斯和英国艺术家弗雷德里克·卡瑟伍德已经从尤卡坦半岛的冒险旅程中返回——他们讲述了丛林中遇到的传奇遗迹。学者们已经表示有兴趣对玛雅文化进行更深入的探索。"
 lepsius.3.f: "在欧洲人到达这片大陆之前，新世界是否只是印第安的家园？探险家约翰·劳埃德·斯蒂芬斯和弗雷德里克·卡瑟伍德的经历洗刷了世人对新世界的刻板印象。几年来，美国人和英国人在尤卡坦半岛的丛林中漫游，根据他们自己的陈述，他们访问了44个不同地点，这些地点均为早已消失的中美洲文化遗迹。长期以来，当地人一直在讲述那些藏在丛林背后的古老城市和寺庙的记载；斯蒂芬斯的报告以及卡瑟伍德那令人惊叹的绘画，为世人解开了古老的面纱，带来了一个迄今为止完全未知的世界。庙宇、雕像和石碑的图像不仅激发了浪漫主义者的幻想。更引发了一股对未知文明的兴趣浪潮，从好奇到颂扬再到真正的科学兴趣。"
 lepsius.3.a: "我们应该储备精美的皮夹克。"
 lepsius.4.t: "揭秘阿卡德语"
 lepsius.4.d: "全国的报纸都在报道一位经验丰富的考古学家所取得的突破：美索不达米亚的古代语言。没有什么能阻挡对巴比伦和亚述的探索了。"
 lepsius.4.f: "楔形文字最早在十八世纪就引起了学者们的兴趣，在德国数学家卡斯滕·尼布尔的领导下，学者们对其进行解码和翻译。乔治·弗里德利希·格罗特芬、恩奎蒂尔‑杜佩龙和德·萨西等几位学者在破译古波斯楔形文字方面发挥了决定性的作用；他们的研究随着象形文字和四语凯勒斯花瓶的破译而得到证实。随着贝希斯敦铭文的发现，我们在破译美索不达米亚的古老语言方面更进一步。相信在不久之后，埃兰语、巴比伦语和阿卡德语将依次被人们所理解。在召集到各路声称了解这种古老语言的亚述学者之后，我们对他们做了单独的测试。令人惊讶的是，所有学者的译文均一模一样。现在是时候展开对古代美索不达米亚文明的探索了。"
 lepsius.4.a: "我们都是商博良的弟子。"
 lepsius.5.t: "施里曼发现特洛伊！"
 lepsius.5.d: "德国商人海因里希·施里曼发现了特洛伊遗址，此地长期以来一直被认为是童话故事。世界各地的考古学家对古希腊产生了新的热情——尽管这种热情存在于神话般的古代。"
 lepsius.5.f: "科学在哪里结束，神话在哪里开始？现在的人已经做了一切事情来分离宗教和知识。我们把几十年前被认为是传说和传奇驱逐到了童话的领域。但是它又突然出现在这个世界上，首先出现在报纸上，然后出现在学术界。特洛伊被发现了！！ 荷马在他的《伊利亚特》中歌颂的普里阿摩斯的传奇之城，每个受过教育的西方公民都知道的故事—它不仅仅是一个神话。德国商人海因里希·施里曼并不为世人的失落所打动，甚至声称他已经找到了宝贵的宝藏。考古界对这一事件感到震惊和着迷—来自遥远过去的传奇故事或许不仅仅是神话？爱琴海岸边是否还有更多的沉没的城市有待重新发现？"
 lepsius.5.a: "歌唱吧，女神！歌唱裴琉斯之子阿基琉斯的愤怒……"
 lepsius.6.t: "马丘比丘"
 lepsius.6.d: "一支考古探险队发现了隐匿于安第斯山脉中的印加失落之城——马丘比丘。学者们鼓励在当地进行深入研究。"
 lepsius.6.f: "有一些叙述主宰了我们的现在。一切都已被征服，一切都已被发现，一切都已说过！没有一块土地上没有殖民者的旗帜，没有一个村庄没有与铁路相连，也没有我们已经知道的突破性技术。然而精英的虚无主义出现了裂痕。对极地的争夺、对天空的征服和对人类最后的神秘的关注表明历史并没有结束。马丘比丘城的发现只是一个片段，表明我们对自以为了解和控制的世界所知甚少。也许关于未知印加城市的传说是有道理的，这些传说被解释为误导了西班牙人。维尔卡班巴（Vilcabamba）是印加人的最后一个首都，至今仍未被发现……"
 lepsius.6.a: "是时候拿起我的软呢帽了！"
 lepsius.10.t: "博物馆揭幕"
 lepsius.10.d: "一场庄严的仪式宣告了我国的考古博物馆于今日揭幕。"
 lepsius.10.f: ""
 lepsius.10.g: "我等不及拜访博物馆了！"
 lepsius.10.h: "香槟！香槟！"
 lepsius.11.t: "拜访博物馆"
 lepsius.11.d: "欢迎来到考古博物馆。"
 lepsius.11.f: "我们的博物馆藏品目前包括#T #G [ROOT.Var('lepsius_total_artifacts').GetValue]件#!文物。#!\n\n这些文物被分为以下几个系列：\n\n#T 埃及藏品：#!\n#G [ROOT.Var('lepsius_egyptian_artifact_minor').GetValue]件#!普通@lepsius_egypt_minor!文物和#G [ROOT.Var('lepsius_egyptian_artifact_major').GetValue]件#!重要@lepsius_egypt_major!文物。\n\n#T 美索不达米亚藏品：#!\n#G [ROOT.Var('lepsius_mesopotamian_artifact_minor').GetValue]件#!普通@lepsius_mesopotamia_minor!文物和#G [ROOT.Var('lepsius_mesopotamian_artifact_major').GetValue]件#!重要@lepsius_mesopotamia_major!文物。\n\n#T 爱琴海藏品：#!\n#G [ROOT.Var('lepsius_aegean_artifact_minor').GetValue]件#!普通@lepsius_aegean_minor!文物和#G [ROOT.Var('lepsius_aegean_artifact_major').GetValue]件#!重要@lepsius_aegean_major!文物。\n\n#T 美洲藏品：#!\n#G [ROOT.Var('lepsius_precolumbian_artifact_minor').GetValue]件#!普通@lepsius_precolumbian_minor!文物和#G [ROOT.Var('lepsius_precolumbian_artifact_major').GetValue]件#!重要@lepsius_precolumbian_major!文物。\n\n#T 考古队：#!\n我们有#G [ROOT.Var('lepsius_excavation_teams').GetValue]支#!可用的队伍，总共#G [ROOT.Var('lepsius_total_excavation_teams').GetValue]支#!"
 lepsius.11.g: "这很有教育意义，下次再见！"
 lepsius.11.h: "参观埃及展"
 lepsius.11.i: "参观美索不达米亚展"
 lepsius.11.j: "参观爱琴海展"
 lepsius.11.k: "参观美洲展"
 lepsius.11.l: "拜访首席学者"
 lepsius.11.m: "参观重要文物"
 lepsius.11.n: "参观世界文化展"
 lepsius.11.o: "告诉我哪些国家拥有最多的文物！"
 lepsius.12.t: "埃及展"
 lepsius.12.d: "包括来自上埃及和下埃及的文物"
 lepsius.12.g: "安排一个小型展览"
 lepsius.12.h: "安排一个中型展览"
 lepsius.12.i: "安排大型展览。"
 lepsius.12.j: "安排一场精彩的展览。"
 lepsius.12.k: "回到主厅"
 lepsius.12.l: "离开博物馆"
 lepsius.13.t: "美索不达米亚展"
 lepsius.13.d: "包括来自巴比伦和亚述的文物。"
 lepsius.14.t: "爱琴海展"
 lepsius.14.d: "包括来自阿尔戈利斯和克里特岛的文物。"
 lepsius.15.t: "美洲展"
 lepsius.15.d: "包括来自尤卡坦和秘鲁的文物。"
 lepsius.16.t: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]"
 lepsius.16.d: "这里是我国首席考古学家[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授的办公室。"
 lepsius.16.f: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]拥有的总考古经验为#G [ROOT.Var('lepsius_archaeologist_var').GetVariable('lepsius_archaeologist_experience_var').GetValue]#!\n\n我国资助的探险总数：#G [ROOT.Var('lepsius_total_expeditions').GetValue]#!\n\n我国取得的主要发现总数：#G [ROOT.Var('lepsius_total_discoveries').GetValue]#!"
 lepsius.16.g: "主办一次重要考古学大会"
 lepsius.17.t: "重要文物"
 lepsius.17.d: "这是博物馆中重要文物的概览"
 lepsius.17.egypt: "\n#T 埃及：#!\n"
 lepsius.17.sarcophagus: "我们在帝王谷的一处失落坟墓中发现了#E 无名法老的石棺#!。\n"
 lepsius.17.nefertiti: "#E 娜芙蒂蒂半身像#!是艰苦的挖掘与外交纠纷的回报。\n"
 lepsius.17.tut: "#E 图坦卡蒙的死亡面具#!是帝王谷中这处传奇墓葬王冠上的宝石。\n"
 lepsius.17.narmer: "#E 那尔迈调色板#!是人类最早的文字发现之一，被一些人视作埃及的开国文书。\n"
 lepsius.17.mesopotamia: "\n#T 美索不达米亚：#!\n"
 lepsius.17.lamassu: "我们在亚述冒险取得了#E 萨尔贡王的拉马苏#!。\n"
 lepsius.17.meskalamdug: "我们在巴比伦的深入发掘发现了#E 麦斯卡拉姆杜格的头盔#!。\n"
 lepsius.17.sargon: "我们在对亚述古都尼尼微的深入挖掘中发现了#E 萨尔贡面具#!。\n"
 lepsius.17.gilgamesh: "通过不断寻找新的篇章以及前沿研究，我们成功重建了#E 吉尔伽美什史诗#!的部分内容。\n"
 lepsius.17.greece: "\n#T 希腊：#!\n"
 lepsius.17.agamemnon: "#E 阿伽门农的面具#!是我们迈锡尼伟大探索的主要发现。\n"
 lepsius.17.priam: "海因里希·施里曼将#E 普里阿摩斯的宝藏#!赠与我们。\n"
 lepsius.17.snake: "通过一些非常手段，我们成功将米诺斯文明最重要的文物之一，#E 蛇女神小雕像#!，从克里特岛带回了博物馆。\n"
 lepsius.17.diskos: "经历持续的发掘工作后，我们出土了#E 斐斯托斯圆盘#!。\n"
 lepsius.17.southamerica: "\n#T 南美：#!\n"
 lepsius.17.kukulkan: "我们的一位考古学家在一次奇妙而危险的旅程中得到了#E 库库尔坎的宝石#!。\n"
 lepsius.17.pakal: "我们的考古学家在帕伦克经历多年发掘找到了#E 巴加尔的陪葬品#!。\n"
 lepsius.17.other: "\n#T 其他：#!\n"
 lepsius.17.abraham: "#E 亚伯拉罕之杖#!由我们的一位考古学家在一次通灵之旅中发现。\n"
 lepsius.17.arne: "在一次奇妙的冒险中，我们勇敢的考古学家发现了#E 阿尔纳·萨科努塞姆的手稿#!作为他曾在16世纪抵达地心的证据。\n"
 lepsius.17.skull: "我们从一位值得信赖的古董商人处获得了无比神秘的#E 水晶头骨#!。\n"
 lepsius.17.hoa: "#E “失落的朋友”#!雕像是由一位冒险家在神秘的复活节岛发现的。\n"
 lepsius.17.summer: "在焚烧中国皇家行宫时，我们已经劫掠了大量价值不菲的#E 圆明园战利品#!。"
 lepsius.18.t: "世界文化展"
 lepsius.18.d: "包括来自世界上不同文化的文物。"
 lepsius.18.f: "这批藏品既是人类学收藏，也是考古学收藏，涵盖了多种不同的文化，其中有些文化至今仍存。#G 10件#!文物就足够办一场展览了。虽然没有规模更大的整体收藏，但每一组单独的藏品本身价值更高。目前，这批藏品包括以下几个部分：\n\n#G [ROOT.Var('lepsius_oceanic_artifact_minor').GetValue]件#!来自大洋洲的@lepsius_oceanian_minor!普通文物\n#G [ROOT.Var('lepsius_oceanic_artifact_major').GetValue]件#!来自大洋洲的@lepsius_oceanian_major!主要文物\n\n#G [ROOT.Var('lepsius_fareastern_artifact_minor').GetValue]件#!来自远东的@lepsius_east_asian_minor!普通文物\n#G [ROOT.Var('lepsius_fareastern_artifact_major').GetValue]件#!来自远东的@lepsius_east_asian_major!主要文物\n"
 lepsius.18.g: "安排一场远东展。"
 lepsius.18.h: "安排一场大洋洲展"
 lepsius.22.d: "我们首都的精英们汇聚起来在考古博物馆举办了一个新展览。"
 lepsius.22.f: "上午，来自中上层社会的人们在博物馆入口前拥挤。新展览开始时，一位著名的考古学家将发表演讲，介绍最新的考察和遗址发掘的第一手资料。之后艺术爱好者和围观者可以亲自看一看展品。媒体在现场准备他们的文章。这是[ROOT.GetCountry.GetNameNoFlag]在国内和国际上的大日子，大国羡慕地看着我们的收藏！"
 lepsius.22.g: "我希望我能得到另一张票"
 lepsius.24.t: "新爱琴海展"
 lepsius.25.t: "新美洲展"
 lepsius.26.t: "考古大会结束"
 lepsius.26.d: "我国考古学会组织的大会将于今天闭幕。[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授在此过程中扩展了其知识。"
 lepsius.26.f: "数周的会议、阅读、座谈与舒适的小聚即将结束，与协会关系密切的国内外考古学家彼此交流发现、考察与理论。这次活动取得了圆满成功——也拓宽了每位参与者的视野。"
 lepsius.26.g: "总在争论谁的皮夹克最好……"
 lepsius.27.t: "新世界文化展"
 lepsius.30.t: "新首席学者"
 lepsius.30.d: "考古博物馆已经任命[SCOPE.sCharacter('lepsius_museum_lead_scientist').GetPrimaryRoleTitle][SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName]为新的首席学者。"
 lepsius.30.f: ""
 lepsius.30.g: "祝贺你！"
 lepsius.31.t: "首席学者成为博物馆馆长"
 lepsius.31.d: "[SCOPE.sCharacter('lepsius_museum_lead_scientist').GetPrimaryRoleTitle][SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName]有幸被任命为新任博物馆馆长，他将因此退出现役。"
 lepsius.31.f: "多年来，[SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName]将自己的一生献给了科学和文化，早已厌倦了政治。对许多人来说，他决定只专注于博物馆的运营，这并不奇怪。令人遗憾的是他将不再在政治中出现。"
 lepsius.31.g: "告别……"
 lepsius.80.t: "考古学的新纪元！"
 lepsius.80.d_egypt: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士使用新的考古学方法揭示了一处古代埃及村庄的许多细节。地层学与三期论的应用，以及对[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]发现的记录标志着考古学进入了一个崭新的时代。"
 lepsius.80.d_mesopotamia: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士使用新的考古学方法揭示了一处古代美索不达米亚村庄的许多细节。地层学与三期论的应用，以及对[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]发现的记录标志着考古学进入了一个崭新的时代。"
 lepsius.80.d_aegean: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士使用新的考古学方法揭示了一处古代爱琴海村庄的许多细节。地层学与三期论的应用，以及对[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]发现的记录标志着考古学进入了一个崭新的时代。"
 lepsius.80.d_precolumbian: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士使用新的考古学方法揭示了一处古代美洲村庄的许多细节。地层学与三期论的应用，以及对[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]发现的记录标志着考古学进入了一个崭新的时代。"
 lepsius.80.f: "“发现文物的地层告诉了我们很多关于这座村庄的信息。例如其中一层有大量木炭，并且这一时期的发现就此结束，这可能意味着一场大火烧毁了村庄，使得村庄被遗弃了。此外这里没有金属物品，意味着这一定是石器时代的村庄。我们发现的人类遗骸也很有趣，他们营养不良，导致了牙齿磨损。”"
 lepsius.80.g: "如此文明！"
 lepsius.100.t: "[ROOT.GetCountry.GetAdjectiveNoFlag]准备考古探险"
 lepsius.100.d: "考古考察的准备工作正在进行中。然而目前尚不清楚应该为这次旅行提供多长时间的资助。"
 lepsius.100.f: "在[ROOT.GetCountry.GetName]决定献身于其学术界的愿望并派出热切期待的探险队之后，不仅是融资这样的问题，而且探险时间也应该很快成为一个政治问题，仅仅是往返就需要许多花费宝贵的时间。而内阁中的反对者则坚持只派几个谈判人员从古董商那里获得一些文物就可以了。"
 lepsius.100.g: "不要半途而废——这将是一段漫长的旅程"
 lepsius.100.h: "中长途探险是一个很好的折衷方案。"
 lepsius.100.i: "短途旅行就足够了。"
 lepsius.110.t: "领导权争议"
 lepsius.110.d: "知识分子认为自己是最有可能让他们的代表之一担任考古探险队队长的人，但反对的声音也不少。"
 lepsius.110.f: "国家的精英们出现了分歧。国家对探险队的支持使批评者和嫉妒者纷纷登场。知识分子们将该探险队视为他们的主权。反对派和军方都要求给他们一个观察员的职位。不可否认，知识分子的代表最能胜任这项工作，但还有其他的可能性……"
 lepsius.110.g: "知识分子是最有资格担任的"
 lepsius.110.h: "一名政府代表将陪同探险队"
 lepsius.110.i: "反对派政治家适合担任"
 lepsius.110.j: "应该让有考古经验的人来担任"
 lepsius.110.k: "这种荣誉只属于王位继承人！"
 lepsius.120.t: "驻外军官"
 lepsius.120.d: "强烈建议指派一名军官参加考古学探险。"
 lepsius.120.f: "军方已推荐三名可能人选担任此次远征军官。陆军部今天通报了这一决定，具体人选有待确认。"
 lepsius.120.g: "[SCOPE.sCharacter('lepsius_military_attache_1').GetFullName]。"
 lepsius.120.h: "[SCOPE.sCharacter('lepsius_military_attache_2').GetFullName]。"
 lepsius.120.i: "[SCOPE.sCharacter('lepsius_military_attache_3').GetFullName]。"
 lepsius.130.t: "艺术家加入探险队"
 lepsius.130.d: "我们学院的一群艺术家表示有兴趣参加即将启程的考古探险。"
 lepsius.130.f: "艺术学院已经传出消息，一支探险队不久将寻找失落的城市和未知的宝藏。绘图员和画家们已经从拿破仑的埃及探险队中获得了经验。有足够的申请人想为我们绘制考古遗址的图纸和草图，不过这样的探险扩张会造成额外的费用，但这肯定是值得的。"
 lepsius.130.a: "诚挚邀请他们。"
 lepsius.130.b: "谢啦，但还是免了。"
 lepsius.140.t: "考古学家招募经验丰富的学者"
 lepsius.140.f: "共同的利益将我们绑在一起：我们的领队与其他考古学、历史学和人类学方面的学者都有联系。这样扩大考察团成员，肯定会对队伍产生积极影响。然而这并不是一种免费的服务：国家必须支付食宿和工资。有些人可能会称这种由探险队领队裙带关系找来的“朋友”会有负面影响，但他向我们保证，扩大规模的理由是纯粹的科学。"
 lepsius.140.a: "这为团队增色不少。"
 lepsius.140.b: "我们不会给考古学家小集团任何资助！"
 lepsius.150.t: "自然科学家加入探险队"
 lepsius.150.d: "学者们想在即将到来的探险中进行实验"
 lepsius.150.f: "我们国家的大学也不是没有受到当前事件的影响。一些学者希望陪同探险队研究地理条件，比较天文计算或进行天气实验。还有人认为，岩石和木材样本可以提高探险队的成果。从许多被选中的学者身上可以看出，他们在这种场合下等待前往外国的时间已经很久了：他们只是在等待一个借口，作为免费的乘客来参加。而且他们也有昂贵的愿望要实现！"
 lepsius.150.a: "好主意！"
 lepsius.150.b: "我们不能迎合每一个邋遢的学者们……"
 lepsius.200.t: "探险队到达出发地点"
 lepsius.200.d: "探险队已经到达出发地。是时候在出发前做一些最后的准备了。"
 lepsius.200.f_ex_upe: "“卢克索，卢克索！”\n当卢克索神庙出现在地平线上时，队伍中发出了这样的呼声。当探险队的成员在栏杆旁，瞥见古埃及底比斯城的轮廓时，船甚至也可能因为学者们堆积在一边导致翻船。尼罗河两岸有几千年历史的建筑遗迹，方尖碑在破旧的房屋和帐篷之间耸立。然而在尼罗河的另一岸，耸立着沙褐色的山脉，传说中的帝王谷就藏在那里，据说那里还有不为人知的法老墓。但在这之前，我们在卢克索还有一些事情要解决……"
 lepsius.200.f_ex_loe: "世界之母位于尼罗河水面之上，在阳光下闪闪发光。尖塔和圆顶装饰着全景，告诉人们这个城市重要性，它曾经和现在都有决定中东的命运的能力。五颜六色的集市和地毯是街道的特色，也是法蒂玛建筑的精美装饰。远在天边的景色更美，那里的金字塔顶端预示着一个过去的时代，这才是我们旅程的真正目标。但在此之前，我们必须在开罗采取一些预防措施。"
 lepsius.200.f_ex_bab: "巴格达，美索不达米亚最大的城市，与开罗一样热闹非凡，同时是阿拉伯世界的中心，它是权力和威望的所在地。但与开罗不同的是，遥远的吉萨金字塔预示着一个更古老的世界，而巴格达几乎没有让人想起巴比伦和阿卡德帝国的地方。即使是一个有点粗心的探险队成员从一个黑心商人那里买来的所谓古董，也被证明是假的。虽然埃及人和玛雅人的石头建筑仍然见证着失落的文明，但这里几乎没有任何可供比较的东西。我们可能不得不从头开始。"
 lepsius.200.f_ex_ass: "莱亚德在尼姆鲁德挖掘之后，在亚述还能发现什么？据摩苏尔的一位商人说，相当多的东西。就在一个月前，一个拉马苏的头颅从沙地里冒了出来。而且集市上总是有好的作品，他告诉我们，一些作品无法被发掘出来与该地区的库尔德部族有关，他们不允许所有人在他们的地区发掘‑‑无论是否有考古许可证，我们必须警惕！"
 lepsius.200.f_ex_arg: "啊，古雅典！ 对于我们的考察队来说，还不够古老，但也足够在阿提卡多呆几天了。希腊没有很多大城市，所以我们的考察队没有什么选择，只能在那里做最必要的准备工作，然后再出发到乡下。我们的考古导游使劲催促我们，因为有些学者把太多的时间花在其他地方如古典大理石。希腊葡萄酒。温暖的阳光、橄榄树的树荫和阿卡德人的田园风光都在邀请我们逗留和放松——有些人似乎已经忘记了我们真正在这里的原因。"
 lepsius.200.f_ex_cre: "当我们的探险队到达伊拉克利翁港时，一阵微风从爱琴海吹来。古老的威尼斯堡垒在向我们敬礼，让人联想到坎迪亚在中世纪是一个贸易中心的时代。在海鸥的鸣叫声中，货物被卸下，参与者上岸后，友好的接待之后面对的是痛苦的现实。虽然有些队员抱怨当地的美食，并要求更好的住宿条件，但首席考古学家对这种不太理智的要求并不表示同情。因为伊拉克利翁对他来说只是一个中转站——米诺斯人的宝藏在岛的内部等待着他。"
 lepsius.200.f_ex_yuc: "在梅里达，我们的挖掘团队正在进行出发前的最后准备工作。西班牙征服和殖民化的痕迹是这个城市的特点，尽管它的规模还可以，但它曾经和坎佩切一起，是西班牙人控制半岛的地方。不到100英里的地方据说有一些玛雅遗址，在过去的几个世纪里被丛林开垦。如果我们的探险队员想发现新的寺庙甚至城市，他们将不遗余力地在灌木丛中深入挖掘……"
 lepsius.200.f_ex_per: "安第斯山脉像国王一样耸立在臣民的头上；它们的山峰威严地俯视着我们，仿佛在考验我们是否有资格进入山谷。前往库斯科的旅程是艰辛的，但技术的进步意味着探险不再成为充满不可预测性的冒险之旅。在印加前首都的街道上，历史上的西班牙统治与安第斯建筑的魅力相结合。在这之间，无缝的环形墙仍然见证着前统治者的建筑。离市中心仅一跳之遥的印加堡垒遗址，让探险队员们领略到了此行的魅力所在。"
 lepsius.200.g: "啊，埃及。"
 lepsius.200.h: "啊，美索不达米亚。"
 lepsius.200.i: "啊，希腊。"
 lepsius.200.j: "啊，蚊子和致命的疾病。"
 lepsius.200.k: "啊，秘鲁。"
 lepsius.210.t: "翻译员与神秘向导"
 lepsius.210.d: "关于我们是应该把剩余的钱花在几个合格的翻译身上，还是聘请一位神秘的向导，探险队成员之间存在分歧。"
 lepsius.210.f: "这不是一个数量或质量的问题，即使我们探险队的一些成员这样说。口译员的优势不仅在于他们会说语言，而且当地人对他们的信任也更快。获得文物信息的机会也大大增加。另一方面，神秘的向导可以带我们去一些特殊的地方，否则我们就找不到或很难找到这些地方——这些地方有特殊的文物和未知的挑战。"
 lepsius.210.a: "我们需要一些口译员"
 lepsius.210.b: "我们需要一个了解当地秘密的向导。"
 lepsius.220.t: "考古学家购买文物"
 lepsius.220.d: "我们的探险队领队在当地市场发现并获得了一些有价值的文物"
 lepsius.220.f: "早在第一位考古学家踏上地面之前，盗墓者、寻宝者和冒险家就已经在世界的挖掘现场游荡。这是一个痛苦的事实。在许多情况下，文物被丢失得无影无踪，最终被私人收藏，如果它们是由贵金属制成的甚至被熔化。但是即使是能够找回的发现，也有一个缺陷，那就是它们的来源可能永远不会被澄清。有经验的考古学家不仅有发掘文物的天赋，而且还能在商业中找到它们并重建它们的来源。"
 lepsius.220.g: "这是个惊喜！"
 lepsius.230.t: "写日记"
 lepsius.230.d: "受到异国情调和日常的启发，我们的探险队领队开始写日记"
 lepsius.230.f: "每个国家和地方都有自己的风味。从东方的神秘主义到希腊的魔力以及玛雅人和印加人的传说都吸引着人们。另一些人则是被未知的日常生活、难以理解的语言或冒险家被推入的陌生世界所激发。有时仅仅写作就足以处理这些印象的影响并将其记录下来。"
 lepsius.230.g: "多么浪漫的行为"
 lepsius.240.t: "撰写论著"
 lepsius.240.d: "我们的探险队领队决定写一篇关于探险过程的科学论文。"
 lepsius.240.f: "这似乎令人惊讶，但不是每个人都有时间在实际工作的同时保留自己的记录。有些主题在官方报告中找不到位置，也许是因为它们偏离实际主题太远或者论文还不够成熟。尽管如此我们的探险队领队已经找到了一个他想在官方报告之外研究的课题，并在以后发表。"
 lepsius.240.g: "希望它能有用。"
 lepsius.250.t: "酒馆斗殴"
 lepsius.250.d: "探险队领队堪忧的素质导致了一场外交事故。"
 lepsius.250.g: "真尴尬……"
 lepsius.260.t: "鉴赏"
 lepsius.260.d: "我们的探险队领队的良好品质使我们的考古事业得到广泛认可"
 lepsius.260.g: "太棒了"
 lepsius.270.t: "冰淇淋和苏打水"
 lepsius.270.g: "不错的方式"
 lepsius.280.t: "观众"
 lepsius.280.f: "当地总督听说了这次探险，并召见了考古队队长。他对这些目标很感兴趣，并对这位客人极为好奇。在接下来的谈话中，我们的领队不仅成功地招待了主人，而且他的技能也给主人留下了深刻的印象，以至于总督提出要帮忙。而且他拥有一件宝贵的文物，作为一种善意的表态，他把它送给了探险队。"
 lepsius.280.g: "美妙的礼物！"
 lepsius.290.t: "守卫"
 lepsius.290.d: "我们考古队雇佣了一些佣兵来保证我们旅途的安全。"
 lepsius.290.f: "军队在挑选我们的军官时，找了一个不错的军官，他的技能为他赢得了一位当地军官的认可，并与他谈及派遣一队卫兵来保护我们的探险队。作为交换，他拜访了东道国军队中的一个部队，并分享了他的专业知识。"
 lepsius.290.g: "军方选对了人。"
 lepsius.300.t: "考古探险开始！"
 lepsius.300.d: "东西都打包好了，最后的帮手也招募好了，探险计划也到位了——旅程可以开始了"
 lepsius.300.f: ""
 lepsius.300.g: "出发！"
 lepsius.310.t: "考古探险结束"
 lepsius.310.d: "考古考察已经结束，是时候计算收获了！"
 lepsius.310.f: "这是一次艰辛的旅程，有许多艰难险阻，但我们国家在考察过程中不仅增加了对过去的了解，还为博物馆获得了珍贵的文物。有的帮手已经遣散了，有的发掘成员渴望回家。与此同时，探险队领队清点了获得的小件物品，这些物品构成了探险队的成功，浪漫的冒险之后是无趣的编目工作。"
 lepsius.310.g: "为科学喝彩！现在让孩子们回家！"
 lepsius.310.h: "这仅仅是个开始——建立一个长期的考古发掘。"
 lepsius.311.t: "考古学家发表日记"
 lepsius.311.f: ""
 lepsius.311.g: "这激励了我们所有人"
 lepsius.312.t: "考古学家发表科研论文"
 lepsius.312.f: ""
 lepsius.312.g: "我们应该为国立图书馆弄一份复制品。"
 lepsius.313.t: "探险队领队回国"
 lepsius.313.d: "[SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetFullName]在考古探险后返回，旅途中的经历给大家留下了深刻的印象。然而，现在大家必须投入繁琐的文物整理工作——即使是一些并不起眼的小物件，如陶片、布料残片和木屑，也需一一评估。"
 lepsius.313.f: "真正意义上的考古工作并不在尘土飞扬的遗址现场，而是在昏暗的大学墙壁之间悄然展开——那是一段清点、归类、解读过去的漫长旅程，远比人们想象的考古生活更枯燥、更少传奇色彩。#V 这项工作通常耗时三年。#!如果国家仍需这位考古学家执行本地发掘任务，或许最好立即让[SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetHerHis]离开大学。[SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetLastName]博士也许还会对此表示感激。"
 lepsius.313.g: "开始编目吧！"
 lepsius.401.t_bedouin: "贝都因人袭击"
 lepsius.401.t_kurdish: "库尔德人袭击"
 lepsius.401.d: "我们的考古探险队遭到了当地部落的袭击。"
 lepsius.401.f_bedouin: "并非沙漠中的所有地区都在政府的完全控制之下。一些贝都因人部落成功地抵制了国家的现代化和社会变革。这些部族仍然像他们的祖先在几个世纪前那样生活。袭击商队和旅行者是日常生活的一部分。贝都因人的袭击也影响了我们的考察。贵重物品和考古设备被抢，骆驼被绑架。探险队领队要求我们向政府说明情况，以避免这种危及考察队的事件再次发生。当然这将被视为对内部事务的干涉……"
 lepsius.401.f_kurdish: "扎格罗斯山脉北部和东部与美索不达米亚接壤，历史上一直是库尔德部落的家园，这些部落只是松散地受当地政府控制。他们中的许多人自行其是，只承认自己的部落是权威。他们一次又一次地采取突袭行动。这次库尔德人的袭击也影响到了我们的探险队。贵重物品和考古设备被盗，骆驼被绑架。探险队领队要求我们向政府反映情况，以避免这种危及考察队的事件再次发生。当然这将被视为对内部事务的干涉……"
 lepsius.401.g: "向政府提出正式控告"
 lepsius.401.h: "我们自己安排。"
 lepsius.401.i: "严惩不贷！"
 lepsius.401.j: "警卫！"
 lepsius.402.t_desert: "沙漠风暴"
 lepsius.402.t_tropical: "热带风暴"
 lepsius.402.d: "我们的考古探险队面临一场毁灭性的风暴！"
 lepsius.402.f_desert: "起初，它只是一阵轻风，把沙子吹到我们探险队的眼睛里。但后来风势越来越大，以至于压倒了人和牲畜。即使过了几个小时，沙漠风暴还是一样凶残。当我们的考古学家向当地人询问这一现象时，他说这些类型的风暴在每年的这个时候是正常的，但现在这些沙漠风暴可能会危及我们整个探险队！"
 lepsius.402.f_tropical: "一天下午，突如其来的大雨席卷了我们的探险队，在此之前没有任何雷声和闪电。起初探险队寻找庇护所，但在几个小时的过程中，他们意识到这场热带风暴与这个地区通常的降雨非常不同。我们的一个搬运工甚至认为这可能是一场全面的飓风！"
 lepsius.402.g: "这和煦的微风不会阻止我们。"
 lepsius.402.h: "情况太危险，探险队不得不原地等待"
 lepsius.403.t: "安第斯之雾"
 lepsius.403.d: "在军官再次将我们的探险队置于危险境地之后，其他参与者要求承担后果。"
 lepsius.403.f: "我们在安第斯山脉的探险队员们对军官怨声载道。有几次，他在寻找古印加遗址的过程中带领大家走错了方向。最近甚至发生了这样的事情：他想尽快到达目标，却没有考虑到山上的雾气。探险队因此差点陷入险境，一些人打算任命一个新的领导人。"
 lepsius.403.g: "他应该被解除职务。"
 lepsius.403.h: "他做得很好。"
 lepsius.404.t_aegean: "断桥"
 lepsius.404.t_peru: "毁坏的吊桥"
 lepsius.404.d: "一座被断桥阻碍了我们的探险。"
 lepsius.404.f_aegean: "希腊和克里特岛以其崎岖的地貌而闻名。当我们的探险队到达峡谷时，发现一座桥墩在最近的一次山体滑坡中被冲走了。我们必须选择是修桥前进还是去其它地方。后一种选择更快、更便宜，但可能偏离了我们原本的目标。"
 lepsius.404.f_peru: "在艰难地翻越安第斯山口和狭窄的山腰道路后，我们的考古探险队面临着一个意想不到的问题。当地人说，一座吊桥通向一个笼罩在传说中的神庙，但它已被完全摧毁。一些探险队成员打算放弃探险，前往一个更容易的考古地点而且当地人认为这样做是值得的。然而如果我们想重建这座桥，将花费我们的时间和金钱。"
 lepsius.404.g: "重建桥梁。"
 lepsius.404.h: "另辟蹊径。"
 lepsius.405.t_mesopotamia: "美索不达米亚的恶劣道路"
 lepsius.405.t_yucatan: "尤卡坦的恶劣道路"
 lepsius.405.d: "糟糕的道路状况给我们的探险队带来了迄今为止有的挑战。"
 lepsius.405.f_mesopotamia: "遗憾的是，并非所有的道路都具有人们实际应该期待的质量。特别是主要贸易路线以外的小径状况非常糟糕。而且我们旅程的潜在目的地离文明中心很远。旅程很艰难让一些探险队成员已经在抱怨，我们应该采取不同的路线。"
 lepsius.405.f_yucatan: "即使在当代，尤卡坦的丛林仍未被开发。这使得它们成为值得一去的考古目的地，因为许多遗迹几个世纪以来都没有被人类仔细研究过。另一方面旅途中充满了艰辛，除了几条人迹罕至的森林小路外，几乎没有道路。探险队成员已经在抱怨走这条路的决定了。"
 lepsius.405.g: "另辟蹊径"
 lepsius.405.h: "新队员和驮兽会使我们的旅程更加愉快。"
 lepsius.405.i: "我们呆在这条路上"
 lepsius.406.t: "考察船遭遇海难！"
 lepsius.406.d: "我们的武官要为这场悲剧负责。"
 lepsius.406.f: "我们的一艘探险船在爱琴海触礁。幸运的是，没有人受伤，但我们的许多考古设备都在随沉船沉没了。许多队员抱怨船长没能避开礁石。但他极力解释说想尽快结束这场旅行，而且那块礁石并未在地图上标明。队员们觉得这位领队并不能带领他们走向成功。"
 lepsius.406.g: "他要负责。"
 lepsius.406.h: "买新设备，假装什么都没发生。"
 lepsius.407.t: "绿洲"
 lepsius.407.d: "在旅程中，我们的考古学家发现了一个以前不为人知的绿洲并在那里补充了水。"
 lepsius.407.f: "探险队员们其实早就预料到要熬几天苦日子：旅程的目的地古埃及遗址应该在两三天路程之外的沙漠里。不过令他们惊讶的是，路途中居然又一片绿洲：结着肥枣的棕榈树和结着甜果子的无花果树等着他们。探险队的水源得到充分的补充，许多队员借此机会享受了一把埃及的阳光。"
 lepsius.407.g: "令人耳目一新的消息"
 lepsius.408.t: "纳扎尔护身符"
 lepsius.408.d: "一些雇来的搬运工坚称考古队的领袖遭到了“恶魔之眼”的诅咒，敦促后者购买护身符。"
 lepsius.408.g: "购买护身符"
 lepsius.408.h: "这是一种迷信！"
 lepsius.409.t: "友好的渔夫"
 lepsius.409.d: "一些善良的渔夫出现在海岸边，他们主动提出可以帮我们带几公里行李。"
 lepsius.409.g: "很有帮助。"
 lepsius.410.t_yucatan: "吉祥物鹦鹉"
 lepsius.410.t_peru: "秃鹰威胁"
 lepsius.410.d_yucatan: "自从我们潜入尤卡坦丛林以来，一只五颜六色的小鹦鹉就一直陪伴着我们。"
 lepsius.410.d_peru: "自从我们登上安第斯山脉后，每天都有一只威武神鹰的影子笼罩在我们头顶。"
 lepsius.410.f_yucatan: "尤卡坦的森林里充满危险：美洲豹、蛇和潜伏在灌木丛中的毒虫。与此同时，探险队的成员也对这里的动植物着迷——尤其是一只五颜六色的小鹦鹉，他在探险队头顶上飞来飞去，不会离开队员们的身边。这只小鸟很通人性，我们经常给它喂食。探险队领队宣布这只鹦鹉为公司的吉祥物，并打算在旅行结束后将它带回家。"
 lepsius.410.f_peru: "秃鹰是安第斯山脉的王者。这些大鸟统治着天空，它们的影子膨胀到难以想象的大小。从探险开始，他就一直气势汹汹地笼罩着羊驼和挑夫。当地人不信任这种动物。众所周知，秃鹰会在尸体上空盘旋，而不是在活人上空盘旋。反胃的感觉在探险队中蔓延开来。"
 lepsius.410.g: "好兆头"
 lepsius.410.h: "他应该成为一只宠物鹦鹉。"
 lepsius.410.i: "坏兆头"
 lepsius.410.j: "他会是我们的。"
 lepsius.411.t: "筋疲力尽的驮畜"
 lepsius.411.d: "看来我们的驮畜劳累过度了。"
 lepsius.411.f: "几天来过去我们的驮畜因为长时间行动，疲劳的迹象现在很明显。有些驮畜原地休息拒绝起来，只能用鞭打来强迫。今天早上，我们的第一只驮畜倒下了。"
 lepsius.411.g: "它们死了就可以安息了。"
 lepsius.411.h: "让它们休息！"
 lepsius.412.t: "考古探险失败了！"
 lepsius.412.d: "我们的考古探险队已经失去联系两个月了。"
 lepsius.412.f: "有时就是有坏运气，一些迷信的当地人甚至声称我们整个队伍都是不幸的。与我们的考古探险队的联系已经完全失去，最后的消息已经传了很久了，而我们相信考古学家很快就会回来，但就目前的情况来看，大伙似乎都失去了方向。"
 lepsius.412.g: "可恶！"
 lepsius.413.t: "外来病"
 lepsius.413.d: "我们考古探险队的一些队员病得很重。"
 lepsius.413.f: "疾病总是使长途旅行变得困难。无论是在热带、沙漠、沼泽还是高山上，我们的探险队员都不适应这些条件，未知的病原体到处潜伏。尤其是疟疾，不断地伤害我们，在旅途中，有些人病得很严重，根本无法再工作。"
 lepsius.413.g: "我们等待并治愈他们的疾病。"
 lepsius.413.h: "留下他们。"
 lepsius.414.t: "腐败"
 lepsius.414.d: "我们的探险队受到当地官员的骚扰，无法继续前进。"
 lepsius.414.f: "自从我们的考察开始以来，其参与者面临着一系列的骚扰。中小型官员用盖章和特殊费用让我们的生活变得艰难。有一位甚至质疑我们的签证，想对我们进行罚款。这种情况极其混乱。显然如果没有良好的人际关系或家庭关系，你就无法在这个国家出人头地。"
 lepsius.414.g: "真是强盗！"
 lepsius.414.h: "无耻小贼！"
 lepsius.414.i: "政客就是这样贪得无厌！"
 lepsius.415.t: "洪水"
 lepsius.415.d: "一场洪水摧毁了这个国家，我们的探险队领队亲眼目睹一名妇女被洪水冲走。"
 lepsius.415.f: "过去几天的持续降雨导致河水决堤，这是特殊的天气，而且我们的探险队员没有任何准备。河水已经变成了洪流，但我们的人仍在继续赶路直到岸边响起一阵哭声的时刻。有那么一瞬间，我们的探险队领队可以看到一个五颜六色的包袱被冲走了。现在重要的是迅速做出反应，即使这可能意味着旅程的延误。"
 lepsius.415.g: "救她！"
 lepsius.415.h: "迫不及待要去探险了！"
 lepsius.416.t: "好天气"
 lepsius.416.d: "考古探险取得了惊人的进展。"
 lepsius.416.f: "探险队行程顺利。有时候没有消息就是最好的消息，尤其在这种情况下，我们的考古学家很有信心找到一处很棒的考古地点。否则没什么要报告的——除了好天气！"
 lepsius.416.g: "多么美妙啊"
 lepsius.417.t: "热情好客的当地人"
 lepsius.417.d: "友好的当地人欢迎探险队的到来，但也许我们可以从中得到更多……"
 lepsius.417.f: "我们的探险队在一个小村庄停了下来。当地人非常热情好客，为我们提供了优渥的休息场所，并为我们的动物们提供了饲料。我们与当地人交谈时，一个人告诉我们他非常了解这个地方，包括哪里有古代遗迹……"
 lepsius.417.g: "我们必须找出一切。"
 lepsius.417.h: "维持现状就好"
 lepsius.418.t: "当地向导"
 lepsius.418.d: "一位当地向导为我们的探险提供服务。"
 lepsius.418.f: "有时你只需要那么一点幸运。我们的探险队雇佣了一位对当地十分熟悉的向导——他可能知道的更多。"
 lepsius.418.g: "完美！"
 lepsius.419.t: "捷径"
 lepsius.419.d: "探险队的武官找到了通往废墟的捷径，但要求报酬。"
 lepsius.419.f: "我们的武官发现了一条捷径。当我们昨天下午在休息的时候，他用这玩意探索这片区域，并声称发现了一条地图上没有的小路。如果情况属实，这会对我们的探险很有帮助，不过这也意味着我们得赏点儿他什么……"
 lepsius.419.g: "赏！快让他带路！"
 lepsius.419.h: "别把他看得太重要了。"
 lepsius.420.t: "积极之人"
 lepsius.420.d: "我们的探险队很幸运地雇用了特别积极的人，这大大激励了我们。"
 lepsius.420.f: "远远地就能听到哨声和歌声，考古探险队正在取得令人惊讶的进展。团队的积极性很高，对成功充满信心。大家应对障碍和问题都比较放松。我们不知道是什么原因造成的，也许是我们在选择人员时运气好。无论如何，这极大地增加了我们成功的机会。"
 lepsius.420.g: "把握光阴"
 lepsius.421.t: "圣甲虫"
 lepsius.421.f: "不幸的是，在一次马斯塔巴附近的发掘时，我们的探险队一无所获——除了一个小小的蓝色青金石圣甲虫雕塑。圣甲虫在古埃及有幸运的涵义。人们认为甲虫滚动粪球的行为与太阳神拉驱动太阳驳船穿越天空有关。我们的领队询问我们是否可以破例将一些次要的文物送给他作纪念。"
 lepsius.421.g: "他可能会留着这个文物。"
 lepsius.421.h: "发现的所有文物都将交给博物馆——无一例外！"
 lepsius.422.t: "沙中圣殿"
 lepsius.422.d: "我们的考古学家发现了一座看起来像马其顿神庙的建筑。"
 lepsius.422.f: "起初，我们的人以为那是个沙丘，但我们的考古学家发现的一个石灰石加工的小尖顶告诉他，这座藏在埃及沙漠里的沙山保守着一个秘密。接下几天里，探险队发现了一座寺庙。对某些人来说，结果令人失望，它不像是古埃及时期的，却像是亚历山大大帝时期的建筑。然而，专家表示，这座寺庙是一位希腊将军在埃及活动的证据——而他的坟墓至今下落不明。"
 lepsius.422.g: "追随亚历山大大帝的足迹……"
 lepsius.422.h: "无稽之谈。"
 lepsius.423.t: "飞狮"
 lepsius.423.d: "我们的考古学家在美索不达米亚发掘出一个看起来像小天使的小雕像。"
 lepsius.423.f: "人类与动物的混合生物在东方很普遍。我们的探险队在寻找挖掘现场时，幸运地挖掘出一尊特别漂亮且保存完好的雕像，它已经在送往我们博物馆的路上了。一个楔形文字的铭文也揭示了这尊雕像是一个寺庙的守卫。我们的考古学家推测，这些神庙守卫者代表了与《圣经》中提到的以色列基路伯的联系。它们中的两个人也保护着耶路撒冷圣殿中的约柜。"
 lepsius.423.g: "我们是在谈论失落的方舟吗？"
 lepsius.423.h: "圣马可，是你吗？"
 lepsius.423.i: "无稽之谈。"
 lepsius.424.t: "楔形文字之库"
 lepsius.424.d: "我们的考古学家发掘出许多美索不达米亚文物。"
 lepsius.424.f: "当我们的考古人员在一座郊外小镇考察一座古城墙时，他们并没有想到会有一个惊人的发现。当他们摸到石块的时候，他们意识到墙体中有一个密室。经过仔细地调查，他们在墙壁的一处薄弱处打破了它——原来刻有楔形文字的石碑是被建在墙里的！这个石碑库保存完好，并为我们提供了一些古代美索不达米亚的信息。"
 lepsius.424.g: "惊人的发现！"
 lepsius.425.t: "山铜？"
 lepsius.425.d: "我们的考古学家发现了一件由未知的奇怪材料制成的人工制品。"
 lepsius.425.f: "在我们的一次希腊考古中，我们的考古学家有一个奇怪的发现。一颗小盒子在早上来到了博物馆，主管一开始不明白为什么他的手下给他送回了一颗大理石；在正常情况下，这只是一个微不足道的发现。但这个琥珀色的球体由一种未知的材料组成，我们在其他地方从未遇到过。到目前为止，专家们对这件文物争论不休，有些人认为这是一件赝品，一些人认为这表明我们对爱琴海世界的了解是完全不够的。"
 lepsius.425.g: "柏拉图不是在他的《克里提亚斯》中提到过类似的东西吗……？"
 lepsius.425.h: "无稽之谈。"
 lepsius.426.t: "陶瓷囤积"
 lepsius.426.d: "我们的考古学家发现了许多爱琴海文物。"
 lepsius.426.f: "对古人来说是垃圾的东西，但对考古学家来说是宝库。\n这句格言直到最近才被认证，我们的考古队在一个较小的废墟上停下来寻找挖掘地点，仔细观察后发现了一个有陶器库的坑。许多碎片仍然需要修补，但众多的发现肯定会丰富我们的博物馆收藏。"
 lepsius.426.g: "而这一切都属于我们！"
 lepsius.427.t: "玛雅玉器"
 lepsius.427.d: "我们的考古学家发现了珍贵的玛雅玉器。"
 lepsius.427.f: "玛雅人在宗教和艺术领域广泛地使用玉这种材料。社会精英们用玉器来装饰自己，太阳神地雕像也大多是玉制的。然而中美洲原住民也用玉石来制作工具，因为玉是新世界最坚硬的物质之一。我们的考古学家有幸在上一次发掘中获得了一些玉器。"
 lepsius.427.g: "这在我们的收藏中会很好看。"
 lepsius.428.t: "印加神像"
 lepsius.428.d: "我们的考古学家发掘了一个神秘的金色印加神像。"
 lepsius.428.f: "今天早上，一尊印加神明因蒂的金色小雕像通过快递到达了博物馆。我们的考古学家没有说他是从那里搞来的。一个既可怕又美丽的鬼脸看着观察者。一些专家已经对这件作品是否来自印加表示怀疑。雕像的设计表明它来自一种从未被记载过的文明。但几乎所有印加黄金制品都是从秘鲁偷来的。它可能是迄今为止我们美洲收藏中最独特的藏品。博物馆馆长在门后窃窃私语，他说有些传说可能确实是真的。"
 lepsius.428.g: "黄金国，还有谁？"
 lepsius.428.h: "无稽之谈。"
 lepsius.429.t: "水晶头骨"
 lepsius.429.d: "我们的考古学家发现了……一些东西。"
 lepsius.429.f: "我们的考古队发誓说一位值得信赖的经销商最近向他们展示了一件特别有趣且不寒而栗的作品——一个人类头骨——由中美洲的石英制成。其表面的抛光程度令人惊叹，其作品超越了我们对南美大陆文化的任何了解。不过疑点重重。即使是我们的首席考古学家也不能100%确定这件文物是否是仿制品。"
 lepsius.429.g: "我们把它纳入收藏。"
 lepsius.429.h: "绝对是假的。"
 lepsius.430.t: "水晶头骨赝品"
 lepsius.430.d: "几年前轰动一时的破玩意现在被证明就是个假货！！"
 lepsius.430.f: "怎么会发生这种情况！？粗心！自大！只是因为感觉就让一个廉价的“传说中水晶头骨”放在我们博物馆这么多年，我们在考古界的地位会被动摇，要花几年才可以恢复！"
 lepsius.430.g: "考古界的耻辱！"
 lepsius.431.t: "当地废墟"
 lepsius.431.d: "一个乐于助人的当地人能够帮助我们寻找文物。"
 lepsius.431.f: "当我们的探险队在沿路小镇上停留时，我们遇到了一个通情达理老农，还换取一些面包、盐和水，他说道：“其他村民已经告诉我你们在找什么。”于是他带我们爬山涉岭，带到一个古代遗迹时，考古学家感到很惊讶，不过还是很快的开始寻找文物。"
 lepsius.431.g: "这一定是我们的幸运日！"
 lepsius.432.t: "当地文物交易"
 lepsius.432.d: "一位当地人想要卖给我们一件文物。"
 lepsius.432.f: "探险队较大的城市停留，在为牲畜购买饲料时，显然关于我们的消息在当地人中广泛传播，一位商人开口说道只要出个好价钱，他愿意出售从一个盗墓者那里得到的一件珍贵的艺术品。这件艺术品的来源尚不清楚，但这个提议很有吸引力不过需要小小代价。"
 lepsius.432.g: "它的归属应该是我们的博物馆！"
 lepsius.432.h: "我们对这种黑幕交易不感兴趣"
 lepsius.433.t: "真亦是伪？"
 lepsius.433.d: "一位声名狼藉的古董商想卖给我们一件文物"
 lepsius.433.f: "并非所有文物商人都是值得信赖的，例如眼前这个，他有点过分热情地想向我们探险队出售一件文物。这种灵活的价格谈判向我们承诺了一个“友好的价格”，这让我们的探险队领队怀疑这是否真的是一个骗局。这就是为什么他们问博物馆是否应该从文物商的狡猾手中购买文物。"
 lepsius.433.g: "我们不得不冒险。"
 lepsius.433.h: "别信他。"
 lepsius.434.t: "盗墓贼落网"
 lepsius.434.d: "我们的探险队抓获了一群盗墓贼并缴获了他们的赃物，但我们还不确定该怎么处置他们。"
 lepsius.434.f: "我们的考古学家以为他们已经找到了一个很好的发掘地点，直到意识到这个地点已经被“发掘”了几个世纪。当他们重新收拾东西的时候，几个看管篝火的人逮捕了几个企图从遗址中偷运文物的小贼。实际上我们应该把这些人交给当局，并归还被盗的艺术品。然而有些人认为我们应该把文物据为己有，并让这些小贼沉默。"
 lepsius.434.g: "这个文物应该是我们的。"
 lepsius.434.h: "押往当地警局并交出文物。"
 lepsius.435.t: "拍卖"
 lepsius.435.d: "政治压力促使我们考虑出售一件最近发现的文物。"
 lepsius.435.f: "政府内部的一些成员担心，海外考古探险只不过是在浪费金钱，为了一小撮学者的好奇欲而牺牲我们国家的经济是不值得。他们不仅想要科学成果，还想要金钱证明这些考古活动是有意义的，因此一群政客要求将最近发现的一件文物出售，以支付我们的考古探险的花费。"
 lepsius.435.g: "在拍卖会上卖掉它。"
 lepsius.435.h: "但它属于博物馆！"
 lepsius.436.t: "暗室"
 lepsius.436.d: "我们的考古学家发现了一座古墓，这座古墓似乎是被盗墓贼光顾过的。但是当他们进一步调查时，他们发现了假墙后面的一个房间。"
 lepsius.436.f: "最后一个地点是以失望开始的，一开始考古学家对这个历史遗迹抱有很大的期望，因为它是一个达官显贵的墓。但是很快考古学家从一些农民得到一些不安的消息，而到达现场时的失望就更大了，因为眼前坟墓是空的，墙壁是光的，甚至没有任何历史意义的迹象。乍看之下，它只是一个光滑的洞穴。然而当助理靠在所谓的墙壁上时，意外地发现了门框的轮廓，情况突然改变了！考古学家花了两个小时才岩石后面的隐藏通道。"
 lepsius.436.g: "别有洞天！！"
 lepsius.437.t: "废弃营地"
 lepsius.437.d: "我们找到了一个外国挖掘队的废弃营地。我们在那里得到了两件文物后，该国的大使亲自认领了这些文物。"
 lepsius.437.f: "当我们的人到达挖掘营地时，他们正在检查几个月前刚刚探索过附近寺庙的一支探险队的痕迹。事实证明，发掘人员清理该地区的速度有点马虎，因为现在在一个箱子里发现了两件没有被带走的文物。我们的考古学家保护了这一发现，但很快就被该国的大使拜访，他要求回收遗留的文物。此案引发了与一个大国的外交事件。"
 lepsius.437.g: "是我们找到的，是我们的。"
 lepsius.437.h: "让我们分享这些文物。"
 lepsius.437.i: "我们可以分享知识以作为交换。"
 lepsius.437.j: "他们是合法的所有者。"
 lepsius.438.t: "隐士"
 lepsius.438.d: "不幸的是，一个持有文物的隐士不太愿意合作。"
 lepsius.438.f: "最近考古学家从一个古怪的隐士那里听到消息，据说他拥有一件文物。他对过去的知识和广泛的记忆力令人印象深刻。即使是我们探险队的学者也对他的知识感到惊奇。这个脾气暴躁的老人可以告诉我们更多知识，但他不可能交出文物。显然我们必须使用武力……"
 lepsius.438.g: "以政府的名义没收这件文物！"
 lepsius.438.h: "听他的知识就足以……"
 lepsius.439.t: "炸药？"
 lepsius.439.d: "非常时期必须采取非常措施"
 lepsius.439.f: "在一次挖掘过程中，一个学者得出结论，一条通道可能隐藏在墙壁后面，因为他声称发现了墙壁后面的空洞。在考古学的早期阶段，采取激进的行为是当时的主流，这包括使用炸药来推进其更高的科学目标。当然如果所谓的空洞是一个骗局，而我们又危及到之前安全的挖掘现场，这可能会有些影响……"
 lepsius.439.g: "轰隆！"
 lepsius.439.h: "想想就觉得很野蛮。"
 lepsius.440.t: "碎片"
 lepsius.440.d: "我们找到了一个破损的文物，缺失的那一块也有不可忽视的知识"
 lepsius.440.f: "在一次发掘中，考古学家发现了一件珍贵的艺术珍品（至少是其中的一部分）。另一块原来在一个小国手中，几年前从一个古董商那里买下了它。我们可以利用我们的外交来获得缺失的那块，并重新复原好文物，但大使已经明确表示，这样做将是一种政治承诺。"
 lepsius.440.g: "我们“亲切地”要求他们这样做。"
 lepsius.440.h: "这件事毕竟不是那么重要。"
 lepsius.441.t: "被遗忘的方尖碑"
 lepsius.441.d: "一个未完成的方尖碑为学者提供了关于古代建筑的建造细节"
 lepsius.441.f: "在一个古埃及采石场，我们的考古学家发现了一个疑似未完成的方尖碑，这块巨大的石碑上的工作显然还可以写完。虽然上面没有象形文字，而且由于其尺寸巨大无法运走，但学者对古埃及人如何建造和竖立这些结构有了全新的认识。"
 lepsius.441.g: "很有趣。"
 lepsius.442.t: "动物木乃伊"
 lepsius.442.d: "如何保存最近发现的动物木乃伊在考古学家中引发了争议。"
 lepsius.442.f: "几天前，考古学家在一个墓室里发现了一个特殊的发现——除了埋在那里的贵族外，还发现了装有动物的小型石棺。从石棺外形来看，是一只猫、一只狗和一只猴子。在这次发现之后，学者们展开了讨论：这些木乃伊化的动物可以让人们了当时的饲养情况以及古埃及的家畜生活，但同时也意味着这些罕见的文物会被销毁。"
 lepsius.442.g: "为了学术，值得牺牲"
 lepsius.442.h: "不要碰它们，它们是博物馆的重要展品！"
 lepsius.443.t: "鳄鱼之争"
 lepsius.443.d: "关于一只死鳄鱼的奇怪争论使我们的学者和武官产生了分歧。"
 lepsius.443.f: "尼罗河的动物群让学者们对生物研究着迷，他们特别关注尼罗河鳄鱼，学者们遇到这种鳄鱼时，既感到恐惧和厌恶，又感到着迷。在我们学者的要求下，我们的武官杀死了一条鳄鱼，但现在他拒绝交出这只动物。武官宁愿把鳄鱼吃了，或挂在家里。"
 lepsius.443.g: "应该把鳄鱼交给研究人员。"
 lepsius.443.h: "制成标本？不错！"
 lepsius.443.i: "这确实是一只漂亮的鳄鱼……"
 lepsius.444.t: "法老的诅咒"
 lepsius.444.d: "几起神秘事件之后，不仅是当地的帮手，就连一些学者现在都认为我们在埃及的冒险受到了诅咒！"
 lepsius.444.f: "一切都是从我们的探险队领队打开一座埃及古墓后开始的，墓室内石棺里有一具面目狰狞的木乃伊，它在探险队的眼前不到几分钟就腐烂了。而就在几天后，一种神秘的疾病几乎折磨了所有的探险队队员，甚至有一位木乃伊揭幕仪式的研究助理死亡。一天后，一场沙尘暴使考古工作在一周内无法进行。而且今天早上，水供应受到污染，无法饮用。越来越多的参与者现在确信他们必须为坟墓的亵渎付出代价——无名法老的诅咒正在向他们袭来！"
 lepsius.444.g: "这是什么？诅咒？！"
 lepsius.445.t: "吉尔伽美什史诗的碎片"
 lepsius.445.d: "学者们发现了著名的吉尔伽美什史诗的一部分。它被认为是最古老的人类文学作品"
 lepsius.445.f: "《吉尔伽美什史诗》是一组来自古巴比伦地区的文学作品，其中包含了现存最古老的书面印章之一。《吉尔伽美什史诗》包含了多种语言版本，其中最为知名的版本为阿卡德语版和苏美尔语版。它围绕乌鲁克半人半神的国王吉尔伽美什和他的朋友‑曾与野兽为伴的泥人恩奇杜的之间的友谊故事展开。#T @lepsius_gilgamesh_fragment!需集齐五个片段来重现《吉尔伽美什史诗》。#!"
 lepsius.445.g: "我们必须找到更多的碎片。"
 lepsius.445.h: "这是最后一块了！"
 lepsius.445.i: "更多作品总是受欢迎的！"
 lepsius.446.t: "米诺斯壁画"
 lepsius.446.d: "在对克里特岛的调查研究中，我们的挖掘团队偶然发现了米诺斯文化的遗迹。"
 lepsius.446.f: "一幅美丽的壁画吸引了我们考古学家的注意。壁画上面更阶层的人可以感受到古代米诺斯文明的日常生活。考古队在克里特岛上发现的墙壁甚至显示出油漆的痕迹——在4000年后的今天！！可以肯定的是，在这个神话般的发现之后，激励学者来发现更多！"
 lepsius.446.g: "一个失落的文化在我们眼前重现生机。"
 lepsius.447.t: "独眼巨人之墙"
 lepsius.447.d: "在对阿尔戈利斯进行调查研究时，我们的挖掘团队发现了迈锡尼文化的遗迹。"
 lepsius.447.f: "在经历了几次挫折之后，希腊的考古学家们发现了当地人最初戏称为“橄榄树”的平台，但实际上是独眼巨人墙的顶部。考古团成员到目前为止还没有发现什么，但至少是一个好开始。"
 lepsius.447.g: "那时候他们是怎么无缝建造这些城墙的？"
 lepsius.448.t: "玛雅石碑"
 lepsius.448.d: "尤卡坦的考古队在破译玛雅象形文字方面取得了进展。"
 lepsius.448.f: "在尤卡坦深林中，我们的考古队员发现了玛雅时代的铭文。学者们粗略地将其追溯到公元前6世纪。这一发现大大增加了我们对这一失落文化的了解，但有些象形文字对我们的考古学家来说仍然是个谜。但是这让我们看到了希望，玛雅文字的破译只是一个时间问题！"
 lepsius.448.g: "我们必须破译它。"
 lepsius.449.t: "玛雅洞穴"
 lepsius.449.d: "探险队发现了玛雅文化的遗址，但没有什么可展示的。"
 lepsius.449.f: "玛雅人曾在洞穴里执行他们的仪式。具体内容究竟是什么，时至今日还没有弄清楚。也许我们的考古学家们将来能在这方面做更多的报告。他们在危地马拉北部发现了玛雅洞穴的入口。然而，到目前为止，发现相当有限。"
 lepsius.449.g: "你到底得到了什么？"
 lepsius.450.t: "安第斯木乃伊"
 lepsius.450.d: "在一座山顶上，我们的学者发现了印加儿童的尸体，他们是宗教仪式的受害者——寒冷使他们的尸体完整保存了几个世纪。"
 lepsius.450.f: "Capacocha是印加人的一个重要祭祀仪式，通常祭祀儿童。从印加帝国各地挑选出的男女儿童在capacocha仪式中进行献祭，这些仪式在分布于帝国各地的重要神庙进行。这种祭祀仪式的理由通常被理解为印加人试图确保将人类最好的东西送到他们的神灵那里。被选中在capanocha仪式中献祭的儿童通常会被喂下酒精混合古柯饮料，并被安排在仪式的地点。印加人特别关注一些位于高海拔地区的wak'a仪式场所。在一些情况下，通常是在这些最重要的山上，因此这些地点有在capacocha仪式中牺牲的儿童木乃伊。"
 lepsius.450.g: "看着不舒服但是很有价值"
 lepsius.451.t: "一座雕像"
 lepsius.451.d: "考古学家在旅途中发现了一座非凡的雕像。不幸的是它太大了以至于难以运走。"
 lepsius.451.f: "在前往下一个发掘点的路上，我们的考古队在一个鲜有人迹的地区发现了一座巨大的雕像。这座雕像甚至连许多当地人都不知道。所以它从一开始就吸引了学者们，我们的探险队领队建议将雕像运走，但它的大小使得搬运很困难。因此大多数考古队员认为，最好的办法是记录雕像上的所有铭文，并对雕像进行精确绘图。然而也有一些零星的观点认为这个精美的雕像应该被切割，运到我们的首都……"
 lepsius.451.g: "临摹下来就好，记录得精准点！"
 lepsius.451.h: "把雕像切成小块运回家。"
 lepsius.452.t: "文献"
 lepsius.452.d: "我们的考古队领队获得了一份古代文献，其中描述了早已被毁坏的材料。"
 lepsius.452.g: "比什么都没有强。"
 lepsius.453.t: "艺术家在纸上捕捉风景"
 lepsius.453.d: "参与我们考古行动的艺术家一如此清晰的方式记录下景观，为今后数十年的艺科学家提供了帮助。"
 lepsius.453.f: "纵观历史，参与考古的不仅有古典学者，也往往伴随着各种不同的科学人物，如地理学家、生物学家、数学家、天文学家或艺术家，他们用笔和纸记录环境。所有参与的人都带来了重要的知识，以便能够向国内未能同行的学者提供对各自考古现场的最精确的描述。正是这种跨学科的方法使得自拿破仑入侵埃及以来的考察成为一项多元工作，不同领域齐心协力，创造了科学的里程碑。"
 lepsius.453.g: "很高兴我们雇用了他们"
 lepsius.454.t: "科学家进行研究"
 lepsius.454.d: "我们的科学家在现场进行了各种实验，这不仅是为了与考古学家一较高下，同时也为后者提供了有益的建议。"
 lepsius.454.f: "纵观历史，参与考古的不仅有古典学者，也往往伴随着各种不同的科学人物，如地理学家、生物学家、数学家、天文学家或艺术家，他们用笔和纸记录环境。所有参与的人都带来了重要的知识，以便能够向国内未能同行的学者提供对各自考古现场的最精确的描述。正是这种跨学科的方法使得自拿破仑入侵埃及以来的考察成为一项多元工作，不同领域齐心协力，创造了科学的里程碑。"
 lepsius.455.t: "探险队同行"
 lepsius.455.d: "进入荒野几英里后，我们的探险队长的队伍遇到了一群瘦骨嶙峋的外国探险队。"
 lepsius.455.f: "我们的考古学家并不是唯一在未知地带冒险的人。一个由各种古怪学者组成的小型私人探险队经过了我们的探险队。与我们的队伍不同，这个探险队的人装备很差还缺乏物资。我们探险队的随行牧师建议帮助他们，这回到国内也可以被理解为大国风范。另一方面，探险队的其他成员则看到了与外国学者交流知识的机会。而且武官看到了一个提供帮助的机会，作为回报，他从探险队中获得了一件宝贵的艺术品。"
 lepsius.455.g: "帮助他们。"
 lepsius.455.h: "我们帮助换取他们的知识。"
 lepsius.455.i: "只有当他们把文物留给我们，他们才会有食物和帮助。"
 lepsius.461.t: "低语的斯芬克斯"
 lepsius.461.d: "不甚检点的生活方式令我们的领队[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]经历着令人难忘的幻觉。"
 lepsius.462.d: "不甚检点的生活方式令我们的武官[SCOPE.sCharacter('lepsius_military_attache').GetFullName]经历着令人难忘的幻觉。"
 lepsius.461.g: "他应该重新规划一下人生了。"
 lepsius.463.t: "芭丝特，猫首人身的女神"
 lepsius.463.d: "在旅程中，[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]通过研究发现了猫乃是他的软肋。"
 lepsius.463.f: "在各种具有动物形态的神灵中，古埃及崇拜猫神芭丝特。猫曾一度受到埃及人的大力推崇，因为它们能将老鼠等害虫以及蛇挡在粮仓之外。在迷恋埃及的过程中，我们的领队开始对这位女神产生了浓厚的兴趣，并开始把自己的一只猫带在身边。这位动物伴侣也意味着他坚韧的性格有所软化。"
 lepsius.463.g: "有人爱猫，有人爱狗。"
 lepsius.464.t: "与萨路基犬一起打猎"
 lepsius.464.d: "我们的武官[SCOPE.sCharacter('lepsius_military_attache').GetFullName]在美索不达米亚旅行时获得了一只本地猎犬。"
 lepsius.464.f: "狗在中东地区通常名声不佳。但萨路基这样的灰猎犬是一个例外。贝都因人将其视为高贵的伴侣，在猎取兔子或瞪羚时也有出色的表现。当地人赠送给我们的武官的就是这样一条好狗，几个星期以来，人和动物之间的深厚感情已经建立。"
 lepsius.464.g: "有人爱猫，有人爱狗。"
 lepsius.465.t: "惹麻烦的霸权行径"
 lepsius.465.d: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]的傲慢性格招致了我们考察国家的不满。"
 lepsius.465.g: "我们该怪谁？毕竟他们是野蛮人！"
 lepsius.465.h: "我们需要不计一切代价修复外交关系。"
 lepsius.466.t: "制图师"
 lepsius.466.d: "在考古远征期间，武官对制图学产生了极大的兴趣，并建立了自己的地图材料。看来他在土地测量方面很有天赋。"
 lepsius.466.f: "考察伊始，军事武官就严格记录部队的行动和进展情况，绘制自己的地图。在一次简报中，他展示了自己已经收集到的令人印象深刻的地图。在过去的一周里，一名科学助理多次陪同他并帮助扩大了他的地图发现；现在他也可以使用测量仪器。科学助理建议培训他成为一名专业测量员。"
 lepsius.466.g: "他前途无量！"
 lepsius.466.h: "他的地图很好，但他还是应该专注军务。"
 lepsius.467.t: "被遗忘的遗迹"
 lepsius.467.d: "我们考古探险队的领队与东方的一个小型基督教少数民族取得了联系。他对此有些惊人的说法。"
 lepsius.467.h: "他应该研究这个遗迹。"
 lepsius.468.t: "偷窃文物的武官被捕"
 lepsius.468.d: "今天上午，我们的一位发掘员在武官的帐篷里发现了两件被认为已经丢失了几周的文物。他显然打算将其据为己有。"
 lepsius.468.f: "对我们武官的历史，人人心知肚明，但探险队的其他人员本以为[SCOPE.sCharacter('lepsius_military_attache').GetFullName]不会重蹈覆辙。但他们错了：一日为盗，终身为盗。一名挖掘工人偶然发现了最近挖掘的两件文物，但是军官没有报告，唯一可以得出的结论是他要么想留着它们自用，要么想卖掉。探险队领队尚未直接面对指控，但他认为在这起案件产生后果前达成协议更为明智。"
 lepsius.468.g: "保持沉默。"
 lepsius.468.h: "小心处理此事，但坚持让他归还文物。"
 lepsius.468.i: "公开揭发，并对他进行惩戒！"
 lepsius.471.t_karnak: "卡纳克"
 lepsius.471.t_memphis: "孟斐斯"
 lepsius.471.t_uruk: "乌鲁克"
 lepsius.471.t_niniveh: "尼尼微"
 lepsius.471.t_tiryns: "梯林斯"
 lepsius.471.t_phaistos: "斐斯托斯"
 lepsius.471.t_itza: "奇琴伊察"
 lepsius.471.t_olla: "奥扬泰坦博"
 lepsius.471.d: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]想前往著名景点冒险，尽管那个遗址具有重要的考古意义，但这会极大地阻碍我们的探险进度。"
 lepsius.471.f_karnak: "卢克索北部的卡纳克神庙被认为是古典世界最大的神庙群之一。在底比斯的阿蒙被提升为地方神和埃及帝国神之后，中世纪早期的统治者开始建造一座神庙，经过数千年的扩建，形成了今天的神庙群，阿蒙的神职人员每天在这里进行祈祷。据说前前后后具有30位法老在此基础上进行扩建。"
 lepsius.471.f_memphis: "根据曼涅托的叙述，孟菲斯是由法老美尼斯于公元前3100年左右建立的。它是埃及古王国的首都，并直到古地中海时期都是一座重要的城市。一般认为孟非斯的保护神是卜塔，他同时也是工匠们的保护神。他的神庙Hut‑ka‑Ptah（意为“卜塔灵魂的所在”）是城市中最为杰出的建筑物之一。孟菲斯的历史和古埃及历史息息相关。它最终的衰落被认为是后来建造的亚历山大港在经济上超过它的重要性的结果。"
 lepsius.471.f_uruk: "乌鲁克是文字的发源地，它在公元前四千年就是苏美尔政治中心之一。在远古，美索不达米亚的主要城市就在河边。在神话和文学中，乌鲁克作为《吉尔伽美什史诗》的英雄吉尔伽美什的首都而闻名。学者们认为乌鲁克就是《圣经》中的埃里克（创世纪10：10），是尼姆罗德在示拿建立的第二座城市。"
 lepsius.471.f_niniveh: "尼尼微位于底格里斯河东岸，是新亚述帝国的首都和最大的城市，也是当时世界上最大的城市并持续这个头衔数十年。在新亚述帝国时期，特别是从阿淑尔纳西尔帕二世时期开始，尼尼微里建筑很大的扩展，例如一些主要的门洞两侧会有巨大的石制拉玛苏门像，重达30吨。"
 lepsius.471.f_tiryns: "梯林斯在公元前1400年至1200年之间达到其文明的顶峰，它当时成为迈锡尼世界最重要的中心之一，特别是在阿尔戈利斯。它最显著的特点是它的宫殿，梯林斯文化在青铜时代晚期修建了一座宫殿，是希腊大陆上保存最完好的遗迹之一。该城以城墙坚实著称，荷马因此给它以“铜墙铁壁”（mighty walled）的称号。在迈锡尼文明晚期它逐渐衰落，公元前468年被阿尔戈斯所消灭。"
 lepsius.471.f_phaistos: "相传，斐斯托斯城是由米诺斯国王建立的，以赫拉克勒斯的儿子或孙子命名，他被米诺斯的孙子，后来的克里特岛国王伊多墨尼斯杀死。据说斐斯托斯的第一位统治者是米诺斯的弟弟拉达曼提斯。这座城市拥有克里特岛上仅次于克诺索斯的第二大宫殿建筑群。"
 lepsius.471.f_itza: "奇琴伊察是墨西哥尤卡坦半岛上最重要的遗迹之一。它位于尤卡坦州梅里达以东约120公里。它的遗址可追溯至玛雅时代晚期。奇琴伊察占地约1.547公顷，是尤卡坦占地面积最大的建筑群之一。它的中心以宗教场所和政治建筑为主，以巨大的阶梯型金字塔最为出名。"
 lepsius.471.f_olla: "印加帝国时期，奥扬泰坦博是印加皇帝帕查库特克的皇家领地，他将此地征服之后建立了这座城市和一个宗教仪式中心。在西班牙征服秘鲁时，它是印加抵抗运动领袖曼科·印卡·尤潘基的据点。奥扬泰坦博是仅剩的唯一一个印加城市遗址。这座城市的建筑和印加梯田以及狭窄的街道仍然保持着原本的状态。这些街道将整个城市分割为15个方形街区，每个街区都有一个入口，通往被房屋包围的中央庭院。"
 lepsius.471.j: "绝对不行，探险队有优先权！"
 lepsius.472.t: "失落的世界？"
 lepsius.472.d: "探险队很长时间没有回报任何消息后，许久之后回报说人员、牲畜和工具都有大量损失。远征队队长为此给出的借口是最令人吃惊的。"
 lepsius.501.t: "未知法老的陵墓"
 lepsius.501.d: "我们的探险队队长[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]听说在帝王谷有一座隐藏的坟墓。它显然属于一个以前不知名的法老，当地人声称已经找到了它的入口。"
 lepsius.501.f: "3000多年前，埃及的法老们被埋葬在传说中的帝王谷，其中许多坟墓在古代就已为人所知，从上面的罗马和希腊的涂鸦就证明了这一点。科普特基督徒甚至将一些露天坟墓变成了小教堂。几个世纪以来，附近的盗墓者从坟墓和寺庙中盗取艺术品并在市场上出售。由于这个原因，许多坟墓里空无一物。然而，来自远近的人们一次又一次地遇到了那些后来被遗忘的坟墓，里面有发现的物品、图片或未打开的墓室。[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]最近收到了一个可能状况良好的坟墓的消息。"
 lepsius.501.g: "我们没时间说这个了。"
 lepsius.502.t: "沙子，很多沙子"
 lepsius.502.d: "考古人员到达现场后，发现确实有法老陵墓的证据，但遗址已完全被沙土掩埋。"
 lepsius.502.f: "没有人认为发掘会很容易。但当一个当地人引导考古学家可能有文物地方时，探险队成员首先看到的是一个垂直的岩头，上面附着着沙石与泥土。到处都没有坟墓的痕迹，当被问及时，当地人解释说，他从未见过坟墓的入口，但他的祖父知道它，而且他的父亲至少在童年时看到过它的一丝痕迹。由于当地降雨量大，帝王谷很容易发生泥石流再加之风沙洗刷，所以可能会掩盖数百年前的遗址。\n尽管一些考古学家对墓址是否存在表示怀疑，但[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]仍然决心寻找这个失落的坟墓。然而这将需要一些额外的资金来清理多年来堆积的大量沙子。"
 lepsius.502.g: "我们需要更多的工具！"
 lepsius.503.t: "巨石"
 lepsius.503.d: "在坚持不懈地使用方圆10英里内所有商人的铁锹存货后，探险队终于挖出入口，却一块巨大的巨石挡住了入口。"
 lepsius.503.f: "几天艰辛的铲沙和铲泥工作应该得到回报——至少考古队员们是这么希望的。当陵墓被发现时，疲惫不堪的考古队员们兴奋起来。仅仅几个小时，入口就被暴露出来。但刚往前走，就发现了这座陵墓幸免于劫的原因：一块巨石挡住了入口。\n这块巨石可能是几十年甚至几百年前从岩壁上砸出来的。即使是成年人也无法推开，瓦砾和泥土堆满了走廊的其余部分。[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]面临着一个重要的决定：应该如何尝试清除陵墓入口的障碍物？"
 lepsius.503.g: "有点复杂的方法"
 lepsius.503.h: "用精密仪器辅助清理"
 lepsius.503.i: "我们使用复杂的硝化甘油"
 lepsius.503.j: "人力清理！"
 lepsius.504.t: "被硝化甘油摧毁的坟墓"
 lepsius.504.d: "使用炸药带来的问题多于好处：爆炸不仅摧毁了岩石，还摧毁了整个陵墓群！"
 lepsius.504.f: "安装炸药，虽然不是最容易的工作，但在几天内就解决了，因为团队能够以一个好的价格从一个地质学家那里买到炸药。但没有一个探险队成员会说自己是爆破专家，不过[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]认为，处理高度危险的硝化甘油并不是特别大的挑战。也许事先咨询一下专家会更好，因为我们的人误判了所需的量，考古探险队不是仅仅爆破了巨石，还炸毁了整个岩壁！导致最近的山上落下一串巨石，将整个地区变成废墟，但幸运的是探险队成员都存活下来，这真是一个奇迹。不管入口后面是什么，现在肯定已经被不可挽回地摧毁了……"
 lepsius.504.g: "或许有点矫枉过正？"
 lepsius.505.t_archaeology: "画廊绘画"
 lepsius.505.t_engine: "一个被毁坏的画廊"
 lepsius.505.t_muscular: "画廊绘画"
 lepsius.505.d_archaeology: "经过详细的考古调查，随后用最新的方法小心翼翼地移开巨石，我们的考古学家进入了法老墓里保存完好的长廊。"
 lepsius.505.d_engine: "使用机器，该团队能够挪开巨石，但会产生负面影响"
 lepsius.505.d_muscular: "在聘请了一位强大的意大利人之后，我们能够靠他的经验移走巨石并进入保存完好的考古遗址。"
 lepsius.505.f_archaeology: "用了各种复杂的操作，考古学家们接近了这块巨石。他们对岩石进行了解剖，检查了材料，用铲子和镐头进行了挖掘。经过详细的调查，他们决定用一个复杂而长期的过程分小层清除这块石头，以保证入口处的象形文字不被损坏。这是一个劳动密集的过程，但绝对值得。他们手拿油灯，摸索着走到第一条走廊，看到古埃及的美丽：墙上有状态极佳的农民画、法老的宫廷画和审判之神。即使考古学家找不到任何文物，但单是这套壁画就能让人对墓穴进行彻底的探索。"
 lepsius.505.f_engine: "最新的技术应该有助于我们在无名法老墓的挖掘工作：用一台机器，通过灌浆将巨石拉出入口井。起初，石头没有移动或移动，所以我们的科学家将发动机设置为全功率。导致了一个致命的错误：因为尽管石头短暂地从它的支架上移动并被拖到斜坡上，但它很快就挣脱了皮带，全力向坟墓滚回，并在那里造成了致命的破坏！！！！[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]和助手们迅速冲进未被发现的通道，但他们震惊地发现，石头不仅完全拆毁了曾经的精美画廊，而且还严重损坏重要墙壁……"
 lepsius.505.f_muscular: "回到卢克索，我们的探险队员发现了一个令人印象深刻的人物。这是一个来自帕多瓦的人，他原本是来埃及向帕夏展示一种水力装置，以帮助解决尼罗河的泛滥。然而这笔生意并不成功。这个身高约两米、拥有公牛般肌肉的帕多瓦人说，他以前曾在马戏团担任过“巴塔哥尼亚的大力士”。根据他的英国仆人的可靠证词，他可以同时举起六个人。正是这些特殊技能说服了我们雇用他来解锁。几乎没有到达现场，他就以蛮力将石头推到一边。我们的考古学家手拿油灯，冲进走廊，看到了古埃及的美景：墙上有状态极佳的农民画、法老的宫廷画和审判之神，即使考古学家找不到任何文物，但单是这套壁画就能让人对墓穴进行彻底的探索"
 lepsius.505.g: "古埃及的辉煌！"
 lepsius.505.h: "哎呦。"
 lepsius.506.t_archaeology: "一个精美的石棺"
 lepsius.506.t_engine: "一个罕见的石棺"
 lepsius.506.t_muscular: "一个破碎的石棺"
 lepsius.506.d_archaeology: "我们的考古学家怀着惊奇与敬畏踏入了国王的墓室——发现了第20王朝的精妙石棺与木乃伊。"
 lepsius.506.d_engine: "机器造成的破坏在墓室里清晰可见：考古学家们几乎没有时间进行清点，而是拼命地把石棺尽快运到外面！"
 lepsius.506.d_muscular: "我们的考古学家成功进入了一位不知名法老完好无损、装饰精美的墓室，但随后发生了一起意外事件……"
 lepsius.506.f_archaeology: "当我们的考古学家在[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]的带领下进入真正的墓室时，历史将被改写。除了一些祭祀品罐和一只木乃伊狗之外，还有一个特别的惊喜在等待着他们：事实上，石棺和不知名法老的木乃伊仍然安息在他3000多年前被埋葬的地方！科学家们小心翼翼地触摸着这个惊人的发现，掸去灰尘，并在移开已被盗墓贼损坏的棺盖后，他们辨认出了了一个保存完好的木制棺材。我们的博物馆因此得到了一份独特的古埃及文化见证！"
 lepsius.506.g: "考古学拯救了这一天。"
 lepsius.506.h: "快搬！"
 lepsius.506.i: "哎呦。"
 lepsius.511.t: "荣誉之问"
 lepsius.511.d: "一些农民告诉我们，几天前一支外国探险队在胡夫金字塔上升起了他们的国旗。我们的领队感受到了挑战——并且也想做相同的事情。"
 lepsius.511.f: "考察队即将抵达开罗时，传来了令所有参与者震惊的消息：上周有人竟然将本国国旗插在了吉萨金字塔的顶端！在科学领域，这种行为实际上是被禁止的，而帕夏是否会认可这一“胜利姿态”仍是未知数。唯一明确的是，在整个考察过程中，人们热衷于此举，只为维护祖国的荣誉。"
 lepsius.511.g: "我们没时间说这个了。"
 lepsius.511.h: "我们会做到的——为了[ROOT.GetCountry.GetName]！"
 lepsius.512.t: "黎明"
 lepsius.512.d: "探险队清晨启程以攀登吉萨大金字塔！"
 lepsius.512.f_wine: "参加金字塔登顶的人早上5点就起床了。昨天他们准备了一面五米高的旗帜，把这面大旗从大狮身人面像旁边一路滚着运到了胡夫金字塔脚下。早餐是冷火鸡肉，有些人因为昨天做旗子的事还累得不行。一部分探险队员在狮身人面像脚下搭起帐篷住下，其余的人则出发前往金字塔。[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]承诺，会在金字塔顶开一瓶特意留着的葡萄酒来庆祝。"
 lepsius.512.f_no_wine: "参加金字塔登顶的人早上5点钟就已经起床了；昨天他们准备了一面5米高的旗帜，将卷起来的国旗经过狮身人面像运到胡夫金字塔下。早餐是冷火鸡肉，许多人仍然为昨天的旗帜工作感到疲惫不堪。探险队的一部分成员留在狮身人面像脚下搭起的帐篷里，其余的人则向金字塔进发。直到快要抵达时，武官才发觉[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]忘记了今天早上最重要的一件事情：用来庆祝的酒！"
 lepsius.512.g: "我希望能带来最好的酒……"
 lepsius.512.h: "忘带酒了？"
 lepsius.513.t: "登顶"
 lepsius.513.d: "考古领队和武官站在大金字塔的底部。对于谁应该领导这项勇敢的事业，大家意见不一。"
 lepsius.513.f: "我们的队伍到了法老胡夫大金字塔的脚下。一个问题冒了出来：需要爬多少级台阶才能上天堂？——[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]能准确回答：203级。要征服的台阶就这么多。与此同时，谁来领导这次登顶的问题也冒出来了。[SCOPE.sCharacter('lepsius_military_attache').GetFullName]已经放话了，说作为登山家，一样够格……"
 lepsius.513.g: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]应该带领我们前进。"
 lepsius.513.h: "[SCOPE.sCharacter('lepsius_military_attache').GetFullName]应该带领我们前进。"
 lepsius.514.t: "最初的入口"
 lepsius.514.d: "我们的团队已经爬上了金字塔的一个较低的一层。他们现在在第十七级台阶上，非常接近墓室的原始入口。"
 lepsius.514.f: "第一阶段已经完成。我们的探险队仍旧爬的不高，但已经休息了一段时间。我们的队长想更仔细地探索胡夫金字历史悠久的入口，并与一些发掘助手一起下到内部。一些考察队员利用休息时间吃了午饭。大家都知道，从现在开始，向上的旅途将更加危险。"
 lepsius.514.i: "这已经是升旗的好地方了。"
 lepsius.515.t: "100级"
 lepsius.515.d: "我们的团队已经爬上了金字塔的第一百级。如今攀登已然过半，"
 lepsius.515.f: "一百级台阶看似不多，但如果有一大群人、行李和相当逼仄的空间，挑战就变得大不相同。我们的旗帜仍然是卷起来的，由五个人抬着。一些队员已经宣布，这里看到的风景就够高了。与此同时[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]忧心忡忡地仰望着塔顶——最危险的阶段即将到来。"
 lepsius.516.t: "坠落"
 lepsius.516.d: "在金字塔的最后一级台阶上，我们的领队和他的队员显然做得太过火了——发生了毁灭性的事件！"
 lepsius.516.f: "或许是人为的错误，或许是计划不成功，但或许是命运对我们傲慢的惩罚。在攀登金字塔时，一名助手在台阶上滑倒，把其他考察队员和货物一起拖入深渊。我们的探险队长和武官没有遭遇最坏的命运，但也受了重伤。一些搬运工人带着补给品逃走了，其他人则为骨折而抱怨。我们不得不取消在大金字塔上升旗的雄心勃勃的计划。"
 lepsius.516.g: "所有人的耻辱"
 lepsius.517.t: "大金字塔的顶端"
 lepsius.517.d: "对于探险队和我们的国家来说，这是一个意义非凡的日子！[ROOT.GetCountry.GetAdjectiveNoFlag]旗帜飘扬在吉萨大金字塔上空！"
 lepsius.517.f: "考古学的伟大时刻，也是[ROOT.GetCountry.GetName]的伟大时刻。我们的远征队登上了胡夫金字塔的顶端，并为这一成就举行了一次小小的纪念。伴随着“万岁！”的欢呼声，商博良、莱普修斯与罗塞利尼的名字齐声响起，最终，爱国者们升起了国旗。在一缕暮光中，我们的旗帜照耀着整个尼罗河谷！"
 lepsius.517.g: "升起[ROOT.GetCountry.GetName]的旗帜——欢呼吧！"
 lepsius.517.h: "升起[ROOT.GetCountry.GetName]的旗帜！"
 lepsius.521.t: "伊什塔尔门"
 lepsius.521.d: "考古学家在巴比伦的挖掘工作中发现了传说中伊什塔尔门的巨大遗迹。这座历史悠久的城门保存得十分完好。"
 lepsius.521.f: "在古巴比伦都城遗址的发掘过程中，工人们首先发现了釉面砖，这表明有一座代表性的建筑物。考古学家们越往深处挖掘，发现就不断增加。最后，他们甚至可以看出保存完好的城门的墙和塔楼，上面有狮子、公牛和神话生物的浮雕。远赴此地的领队[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]向我们的政府提出了一个大胆的计划：拆卸整个城门并按原样在首都重建。这是一个昂贵的、充满不确定性的计划，但同时也非常吸引人，许多知名学者和博物馆管理人员都支持这个想法。"
 lepsius.521.g: "只带走一些部件。它应该留在老地方。"
 lepsius.521.h: "它应该被运到[SCOPE.sState('capital_scope').GetCityHubName]重新组装。"
 lepsius.522.t: "从美索不达米亚运输砖块"
 lepsius.522.d: "满满的一批砖块今天运抵[SCOPE.sState('capital_scope').GetCityHubName]的博物馆。"
 lepsius.522.f: ""
 lepsius.522.g: "我喜欢清晨美索不达米亚砖块的味道！"
 lepsius.523.t: "伊什塔尔砖块落入外国人之手"
 lepsius.523.d: "在过去的几十年里并非只有我们在巴比伦进行发掘。事实证明，另一个国家也拥有一些重建伊斯塔门所需的砖块的。我们不得不谦卑地请求。"
 lepsius.523.f: ""
 lepsius.523.g: "我们应该放低姿态。"
 lepsius.523.h: "就为了一点破砖头？不可能！"
 lepsius.524.t: "敌国阻断砖块运输！"
 lepsius.524.d: "期待已久的用于重建我国博物馆的伊什塔尔门的美索不达米亚砖块在几个月后仍未运到。我们收到的消息是运输在战时受阻。"
 lepsius.524.f: ""
 lepsius.524.g: "这是搞破坏！"
 lepsius.525.t: "特别费用"
 lepsius.525.d: "显然，伊什塔尔门所在的国家正试图从我们的冒险中获利。他们对出口的砖块收取了一笔“特别费用”。"
 lepsius.525.f: ""
 lepsius.525.g: "我们会为每块石头付钱……"
 lepsius.526.t: "从美索不达米亚运输少量砖块"
 lepsius.526.d: "不明情况导致我们的船这次只装了一半伊什塔尔门的砖块。"
 lepsius.526.f: ""
 lepsius.526.g: "运几块砖有什么难的？"
 lepsius.527.t: "一船砖块运抵港口"
 lepsius.527.d: "重建伊什塔尔门所需的相当大量的砖块今天已经到达博物馆。显然，美索不达米亚的装运工作进展比预期的要好。"
 lepsius.527.f: ""
 lepsius.527.g: "啊哈，更多砖块！"
 lepsius.528.t: "劣质砖块"
 lepsius.528.d: "不幸的是，当我们检查今天运抵[SCOPE.sState('capital_scope').GetCityHubName]的砖块时，策展人发现其中一些完全不能使用。是好是坏，我们都得在没有这批货的情况下工作了。"
 lepsius.528.f: ""
 lepsius.528.g: "我价值连城的砖块啊——不！"
 lepsius.529.t: "外交屈辱"
 lepsius.529.d: "某国在世界公众面前卑躬屈膝，只是为了向我们乞求几年前一个古董商卖给我们的一些毫无价值的考古学文物。当然，我们欣然接受了这一姿态，将自己从这些垃圾中解放出来。"
 lepsius.529.f: ""
 lepsius.529.g: "无敌！"
 lepsius.530.t: "重建伊什塔尔门！"
 lepsius.530.d: "经过多年的工作和对数以万计的巴比伦碎片的艰苦组装，传说中的伊什塔尔门以崭新的辉煌姿态重现人间——在我们的博物馆里以全尺寸展出！"
 lepsius.530.f: "伊什塔尔门是通往巴比伦内城的第八座城门。它是根据尼布甲尼撒二世国王的命令于公元前575年左右在城市的北侧建造的。它是通往城市的宏伟墙体游行路线的一部分。城墙是用大多为蓝色的釉面砖完成的，每隔一段距离就有动物和神灵的浅浮雕，也是由不同的砖块成型并着色而成。大门的正面有一个浅浮雕的设计，上面有巴比伦万神殿中两个主要神灵的图像的重复图案。马尔杜克，国家的神和首席神，和他的仆人怒蛇，被描绘成一条龙，有蛇一样的头和尾巴，狮子一样有鳞的身体，后脚有强有力的爪子。马尔杜克被视为对抗邪恶的神圣英雄，巴比伦人的咒语经常寻求他的保护。伊什塔尔门上的浮雕图案中显示的第二个神是阿达德（又称伊什库尔），他的圣兽是原牛，一种现已灭绝的牛的祖先。阿达德有能力控制破坏性的风暴和有益的雨水。伊什塔尔门的设计还包括线性边框和玫瑰花的图案，通常被视为生育的象征。伊什塔尔门的砖块由质地细腻的粘土压制成木材形状。每一个动物浮雕也是由粘土压入可重复使用的模具而形成的砖块制成的。"
 lepsius.530.g: "漂亮！"
 lepsius.531.t: "拉玛苏的传说"
 lepsius.531.d: "我们的考古学家听说过有关无比壮丽的拉玛苏的故事，据说它在很久以前就已经失落在库尔德地区的某处。"
 lepsius.531.f: "一天夜里，当我们的团队搭起帐篷，点燃篝火，准备羊肉以结束着一天的时候，黎明时分燃烧的黑色、蓝色和红色光线中，一位老牧羊人来到了营地，索要一点食物。[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]同意了，并听到了一个惊人的故事。大约30年前，据说另一支考古队在这个地区寻找珍宝和非凡的艺术品，以打动博物馆管理层并在国内获得名望和荣耀。发掘行动的亮点是一尊巨大的拉马苏，因其巨大的尺寸和良好的保存状况，至今仍为当地人所知。但是，在运输过程中发生了意外。当数十名男子移动这个古美索不达米亚混合动物的巨型雕像时，考古队领袖与当地库尔德部落发生了争执。显然，他们想在库尔德助手的工资上动手脚。于是，该部落伏击了考古队成员，并带走了他们认为属于自己的东西。然而，拉马苏仍然留在原地，正在库尔德地区等待被找回。这位牧羊人提供告诉我们传说中的拉马苏的位置，以回报我们的帮助。"
 lepsius.531.g: "不能为了童话故事以身涉险。"
 lepsius.531.h: "我们必须不计一切代价找到这个拉马苏！"
 lepsius.532.t: "寻找拉玛苏"
 lepsius.532.d: "我们的探险队已经踏上了前往库尔德地区的危险旅程。有人主张分头行动，因为这样成功的机会更大。"
 lepsius.532.g: "我们不能分开。"
 lepsius.532.h: "我们应该分头行动。"
 lepsius.533.t: "礼物"
 lepsius.533.d: "我们的探险队已经与部族领导人会面，以获得和平穿越该地区并带回拉马苏的许可。"
 lepsius.533.f: "没有分兵竟然带来了意想不到的优势：随从的迟缓意味着当地库尔德部落的领袖们找到我们的速度比预计的要快。很快，领队和武官被带到了部落的族长面前，他们被认为是这个地区的真正统治者。他们面对着一种令人不适不信任。显然，上一次考古远征那不愉快的回忆在仍然留存在他们的心中。此外，他们期望我们作为客人会带来礼物。[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]已经为这种情况做了准备，但对于如此之多的领袖而言，我们的物资或许并不足以使他们信服我们的意图。"
 lepsius.533.g: "我们送上上好的布料。"
 lepsius.533.h: "提醒他们注意自己的荣誉与好客习俗。"
 lepsius.533.i: "向他们展示服从的姿态。"
 lepsius.534.t: "侮辱"
 lepsius.534.d: "争取库尔德人长老的企图完全失败了——繁殖，他们站到了我们的对立面。局势的恶化威胁着我们的整个远征！"
 lepsius.534.g: "卫兵！"
 lepsius.534.h: "防守！"
 lepsius.534.i: "快跑！"
 lepsius.535.t: "探险队员被库尔德人绑架"
 lepsius.535.d: "在精简规模的探险队进行了一次不成功的搜索后，他们在返回时惊恐地发现，一些留守队员成了库尔德人袭击的受害者。"
 lepsius.535.f: "分头行动后来被证明是一个灾难性的错误。显然，一个库尔德部落正在等待着猎物，并趁着武官领导的武装人员与车队的其余部分分离的机会发动了攻击。由于大部分物资对抢劫者来说价值不大，他们突然绑架了约十几个助手作为人质，显然是认为他们可以获得赎金。然而，探险队决定不接受这样的提议‑这可能为未来开创先例。[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]坚持与库尔德领袖谈判，而[SCOPE.sCharacter('lepsius_military_attache').GetFullName]则坚持要进攻库尔德营地，给抢劫者一个教训。"
 lepsius.535.g: "尝试谈判"
 lepsius.535.h: "攻击他们！"
 lepsius.536.t: "谈判失败！"
 lepsius.538.t: "悲伤之夜"
 lepsius.538.d: "对拉马苏的搜寻失败了。"
 lepsius.538.f: "考察队空手离开库尔德地区。他们像垂头丧气的落水狗一般在夜里穿过山丘，走上来时的老路。人员与物资的折损使所有探险队成员感到沮丧。而整场旅行意义何在的问题令人忧郁不已。"
 lepsius.538.g: "我们会回来的……"
 lepsius.539.t: "光荣牺牲"
 lepsius.539.d: "我们的武官[SCOPE.sCharacter('lepsius_military_attache').GetFullName]，在与库尔德人的战斗中阵亡了！"
 lepsius.539.f: "这是一场激烈的战斗，但是我们未经充分训练的部队几乎无法对饱经战阵、勇猛无畏的库尔德战士们造成任何威胁。武官下令撤退，并和自己的部下留下断后。[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]最后回头一望，看到他被击败倒地的一幕。他为我们的队伍赢得了宝贵的时间，让我们得以安全撤离，但对他自己而言，任何援助都已无济于事。"
 lepsius.539.g: "他为我们献出了生命。"
 lepsius.540.t: "拉玛苏雕像"
 lepsius.540.d: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]成功说服库尔德人认同我们的诉求。带回拉马苏的道路已经明朗。"
 lepsius.540.d_victory: "我们以武力战胜了当地的库尔德部落，为我们扫清了通往传说中的拉马苏的道路！"
 lepsius.540.f: "要让库尔德人相信我们的友善意图并不容易，但我们探险队领袖的能力使得这看似不可能的任务取得了成功。在仅仅几天的搜索之后，我们在悬崖附近发现了所谓的拉马苏像。这是何等壮丽的景象，照亮了整个山谷！我们的考古学家非常欣慰地发现，这尊巨像几乎没有受损。很明显，它将成为我们美索不达米亚收藏中的主要展品。"
 lepsius.540.f_victory: "经过一场艰苦而惨烈的战斗，我们英勇的武官[SCOPE.sCharacter('lepsius_military_attache').GetFullName]，凭借其卓越的能力（以及士兵的一些帮助）令敌人溃逃。受到教训的库尔德人不再敢阻挡我们搜寻拉马苏。在寻找了几天后，我们在悬崖附近找到了所谓的拉马苏。这是何等壮丽的景象，照亮了整个山谷！我们的考古学家非常欣慰地发现，这尊巨像几乎没有受损。很明显，它将成为我们美索不达米亚收藏中的主要展品。"
 lepsius.540.g: "太棒了！"
 lepsius.551.t: "考古事故"
 lepsius.551.d: "在一处挖掘现场发生了可怕的事故——[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士失踪了！"
 lepsius.551.g: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]怎么了？"
 lepsius.552.t: "迷宫"
 lepsius.552.g: "希望不会遇到长得像牛的神话生物……"
 lepsius.553.t: "迷宫——周而复始"
 lepsius.553.g: "真是似曾相识啊！"
 lepsius.554.t: "海豚厅"
 lepsius.554.g: "宙斯——往左走。"
 lepsius.554.h: "德墨忒尔和珀尔塞福——往右走。"
 lepsius.554.i: "阿尔忒弥斯——上楼"
 lepsius.554.j: "波塞冬——下楼。"
 lepsius.555.t: "太阳厅"
 lepsius.555.d: "一条走廊的尽头分叉成三条小道。墙上可以找到壁画的遗存。"
 lepsius.555.f: "面对壁画，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting]看到了耀眼的蓝色。天空占据了整面墙。黎明女神厄俄斯站在东方，主宰着整个场景。在她对面的西边是她的丈夫阿斯特赖俄斯，只有在夜间才能辨认出他的剪影。两者之间，正午的太阳灼灼闪耀。"
 lepsius.555.g: "厄俄斯——走左边的走廊"
 lepsius.555.h: "阿斯特赖俄斯——走右边的走廊"
 lepsius.555.i: "赫利俄斯——走中间的走廊"
 lepsius.556.t: "妇人厅"
 lepsius.556.d: "迷路者到达一个房间，房间的尽头是四扇打开的门。四个女人的小雕塑站在它的前面。"
 lepsius.556.f: "这四尊雕像展现了不同年龄与性别的女性形象。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting]无法断定她们究竟是女神还是凡人。她们的形体风格原始，仅勾勒出最本质的特征。其上的色彩早已褪尽；真正令她们彼此区隔的，是手中所持之物。第一位手捧一团纱线，正从中抽出一缕细丝。第二位手持明镜，凝望着镜中的自己。第三位手中握有一条蛇。最后一位则牵引着一道拱弧。"
 lepsius.556.g: "纱线——一号门。"
 lepsius.556.h: "镜子——二号门。"
 lepsius.556.i: "蛇——三号门。"
 lepsius.556.j: "拱门——四号门。"
 lepsius.557.t: "岛屿厅"
 lepsius.557.g: "罗得岛。"
 lepsius.557.h: "提洛岛。"
 lepsius.557.i: "优卑亚岛。"
 lepsius.557.j: "纳克索斯岛。"
 lepsius.558.t: "米诺陶诺斯之怒"
 lepsius.558.g: "下面怎么了？"
 lepsius.559.t: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting]之死"
 lepsius.559.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting]博士在其公寓中被发现因不明原因身亡。"
 lepsius.559.g: "但这真的是自杀吗？"
 lepsius.560.t: "逃出迷宫！"
 lepsius.560.d: "终于逃出迷宫之后，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting]终于可以向[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]的同事们讲述这段难以置信的发现了。为了证明自己并未失心疯，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]特地从迷宫深处带回了一件铁证——那是[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]在暗无天日的地底寻获的。"
 lepsius.560.g: "这会不会是……传说中的代达罗斯迷宫？"
 lepsius.561.t: "神秘的金字塔"
 lepsius.561.d: "我们的考古探险队发现了一座迄今未被记录的玛雅金字塔，它已被尤卡坦半岛的热带丛林吞没了一半。[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]曾听闻过此地的传说，决心尝试进入……"
 lepsius.561.g: "我有一种不好的预感。"
 lepsius.561.h: "有趣，你先走。"
 lepsius.562.t: "字形之谜"
 lepsius.562.d: "在一条长拱廊的尽头，立着一块雕琢过的石板，上面刻着一道谜题。四个凹陷的浮雕框内各雕刻着一位玛雅主神的面容，这些石板可以按下；整座石砌结构明显暗藏机械机关。下方刻着两行诗句：“我自东方升起，身披烈焰；在天顶，我如玉石闪耀；在黄昏，我踏上地底归途。我执掌岁月，为君王加冕。”必须按下其中一块浮雕。"
 lepsius.562.g: "太阳神"
 lepsius.562.h: "雷雨之神"
 lepsius.562.i: "造物主"
 lepsius.562.j: "羽蛇神"
 lepsius.563.t: "神像"
 lepsius.563.d_right: "我们的考古学家达到了此行的目的，机械装置运转正常，圣殿打开了。"
 lepsius.563.d_wrong: "我们的考古学家进入了内室，然而通道的便利程度令人费解——显然这机关还留有后手。"
 lepsius.563.g: "慢点……再慢点……动作要轻……"
 lepsius.563.h: "我知道这一幕——永远不会成功。抓住那该死的东西然后死命跑！"
 lepsius.564.t: "这是个陷阱！"
 lepsius.564.g: "跑！"
 lepsius.564.h: "我早就料到了，该死！"
 lepsius.565.t_right: "逃离金字塔"
 lepsius.565.t_wrong: "考古对手"
 lepsius.565.d_right: "出乎意料的是，[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]在金字塔内的重重机关中幸存下来，并成功夺取了神像！"
 lepsius.565.g: "查理，发动引擎！"
 lepsius.565.h: "我受不了那个人。"
 lepsius.566.t: "考古提议"
 lepsius.566.d: "一位私人考古学家向我们提供了一件他以前从外国竞争对手那里抢来的好东西。"
 lepsius.566.f: "一只私人探险队在尤卡坦雨林正中发现了一座古代玛雅金字塔，并从一位头戴费多拉帽的[PREV.GetCountry.GetAdjectiveNoFlag]考古学家手中得到了一座神像。不幸的是，我们的同胞断言，这位可怜人被当地霍韦托部落的野蛮人残忍杀害了。对我们博物馆的美洲收藏而言，这件藏品将会锦上添花——只要我们支付了报价。"
 lepsius.566.g: "这件文物在我们的收藏中会很好看！"
 lepsius.566.h: "我们不会从肮脏的盗墓贼手里买文物。"
 lepsius.581.t: "回到失落的世界"
 lepsius.581.g: "他应该恢复他的荣誉。"
 lepsius.581.i: "我国的利益远胜过那些卑鄙小人的可怜自尊心。"
 lepsius.582.t: "被忽视的探险家凯旋而归"
 lepsius.582.d: "震惊整个学界的是，[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName]已经从尤卡坦回来了——并且有证据证明他的离谱理论！"
 lepsius.582.g: "他……是对的？"
 lepsius.583.t: "被忽视的探险家在尤卡坦失踪"
 lepsius.584.t: "进入失落的世界"
 lepsius.584.d: "几周后，探险队已经到达了一个完全未知的山谷。看来[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName]的说法是对的！"
 lepsius.584.g: "难以置信！"
 lepsius.585.t: "拍摄恐龙"
 lepsius.585.d: "得益于新技术的应用，我们可以用相机拍摄失落世界的动植物。"
 lepsius.585.f: "如透过一扇窗户般，我们得见数百万年前的世界：翼龙统治天空，巨大的雷龙震撼大地，而危险的暴龙猎杀着失去警惕的猎物。这里的植物也与尤卡坦的其余地区截然不同，一位科学家同伴趁此良机用他的相机拍摄了一组照片，以在回到祖国后作为证据，那里的科学家或许能够更好地重现地球的早期历史。"
 lepsius.585.g: "请听我怒吼！"
 lepsius.586.t: "玛雅遗迹"
 lepsius.586.d: "在对山谷进行了彻底的探索之后，探险队长想出了一个冒险的计划。"
 lepsius.586.g: "难得的机会！"
 lepsius.586.h: "让我们只带走最必要的证据。"
 lepsius.587.t: "探险以可怕的灾难告终"
 lepsius.587.d: "在一次暴龙袭击后，探险队落入最为不幸的境况。"
 lepsius.588.t: "库库尔坎的宝石"
 lepsius.588.d: "克服重重困难，我们的探险领队成功拿到了传说中的库库尔坎宝石！"
 lepsius.589.t: "英雄们从失落的世界归来"
 lepsius.589.f: "多么伟大的一天！在经历了前往世界尽头的危险旅程后，我们的探险队得以分享他们的非凡发现。[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName]向公众证明了自己并非狂徒，而是一位声名显赫的科学家——更是真正的英雄！媒体与大众已经彻底改变了态度，并承认政府的支持乃是正确决定。然而，探险队长已经承诺永远保守山谷真实位置的秘密，以保护那里的动植物免遭偷猎者摧残。"
 lepsius.701.t: "外国人想偷走我们的遗产"
 lepsius.701.d: "[SCOPE.sCountry('lepsius_smuggler_country').GetAdjectiveNoFlag]的考古学家在试图从我国非法移动一件重要文物时被捕。我们应该如何回应？"
 lepsius.701.f: "来自[SCOPE.sCountry('lepsius_smuggler_country').GetName]的外国人已被授予发掘许可证，今天他们试图将一件极有价值的文物带出该国时被抓住。根据当前的法律规定，外国考古学家有义务将发现的一半文物交给所在国。显然，他们试图在我们无法检查的情况下将其发现走私回家。"
 lepsius.701.g: "抗议！"
 lepsius.701.h: "我们该怎么处理这个老疯子？"
 lepsius.702.t: "外交事件"
 lepsius.702.d: "不幸的是，[SCOPE.sCountry('lepsius_protest_country').GetName]当局注意到我们试图将价值连城的古董带回我国。我们应当如何回应？"
 lepsius.702.f: "自19世纪末起，考古挖掘许可证最常见的形式是基于发现品的分享：发掘者将发现的一半文物交给进行所在国。当局检查发现的物品，并特别关注最有价值的物品没有被带出国境。然而，经常发生的情况是一些国家坚持不交出被挖掘出来的文物；在其他情况下，各方会达成一项协议以继续进行发掘。"
 lepsius.702.g: "谁找到就归谁。"
 lepsius.702.h: "我们一定能达成友好的协议。"
 lepsius.702.i: "将文物作为慈善事业的象征捐赠出去。"
 lepsius.703.t: "外国人嘲笑我们！"
 lepsius.703.d: "[SCOPE.sCountry('lepsius_smuggler_country').GetName]的野蛮人取笑我们的主张。他们想要独吞发现，一点都不留给我们，并且已经将文物走私回到本国！"
 lepsius.703.f: "维多利亚时代有无数文物被非法带出母国的故事，以欧洲列强尤甚。在某些情况下，博物馆至今背负着赔偿要求。"
 lepsius.703.g: "令人难以置信的傲慢！"
 lepsius.704.t: "让步"
 lepsius.704.d: "[SCOPE.sCountry('lepsius_smuggler_country').GetName]欣然接纳了我们的合理要求。在外交和财政上，他们希望给予我们让步。此外，他们还提供了其他一些发现，以鼓励我们交换这宝贵的宝藏。"
 lepsius.704.f: "在许多涉嫌盗墓或盗窃的情况下，欧洲大国会向文物所在国做出让步。例如，在特洛伊的挖掘之后，施里曼被要求向奥斯曼帝国出示挖掘出的文物，因为他私自将文物走私到了国外。施里曼不仅交还了一些发现的文物，还支付了要求金额的五倍。虽然这种程序可能不是国际间处理事务的最佳方式，但它总比完全欺骗所在国要好，并且常常被原告国视作可以接受的为友好解决方案。"
 lepsius.704.g: "很高兴他们意识到了错误"
 lepsius.706.t: "重要文物抵达！"
 lepsius.706.d: "经过轻微的延误，这件价值连城的文物今天终于到达了博物馆。馆长已经为它选择了一个非常特别的展位！"
 lepsius.706.f: "重要文物是每个展览和每座博物馆的骄傲。能够拥有此等宝藏的国家是幸福的！"
 lepsius.711.t: "图坦卡蒙面具"
 lepsius.711.d: "在发现了图坦卡蒙法老的陵墓之后，我们发现了一些极为特殊的文物：法老的面具！"
 lepsius.711.f: "图坦卡蒙面具是第18王朝古埃及法老图坦卡蒙的金制面具，也是世界上最著名的艺术品之一与古埃及的象征。面具高54厘米，重达10千克，即321.5金衡制盎司，镶有宝石。面具的肩部刻有《死者之书》中的古代咒语。面部代表了法老的标准形象，在陵墓的其他地方，特别是在守卫雕像中，挖掘者发现了相同的形象。埃及学家尼古拉斯·里夫斯认为，这个面具“不仅是图坦卡蒙陵墓中最具代表性的形象，也许是整个古埃及最著名的物品。”"
 lepsius.711.g: "这将是我们收藏中最棒的展品"
 lepsius.711.h: "我们得设法将这件文物带离这个国家……"
 lepsius.712.t: "娜芙蒂蒂半身像"
 lepsius.712.d: "在埃及的发掘过程中，我们的考古学家发现了一件真正的古代杰作：纳芙蒂蒂半身像！"
 lepsius.712.f: "娜芙蒂蒂半身像是一件涂上灰泥的石灰岩半身像，描绘了埃及法老埃赫那吞的王后娜芙蒂蒂。它是最常被复制的古埃及艺术品之一。娜芙蒂蒂已成为古代世界中最著名的女性之一，也是女性之美的象征。我们对娜芙蒂蒂了解甚少。有理论认为她可能是埃及皇室出身、外国公主或者一个名叫阿伊的高级政府官员的女儿，阿伊在图坦卡蒙去世后成为了法老。她也有可能是与埃赫那吞共治的埃及女王，埃赫那吞的统治从公元前1352年持续到前1336年。该半身像上没有任何铭文，但可以通过她在其他留存至今的描绘中所佩戴的特殊头冠确认其为娜芙蒂蒂。"
 lepsius.713.t: "那尔迈调色板"
 lepsius.713.d: "我们的考古学家在挖掘过程中发现了一件非凡的古代杰作：那尔迈调色板！"
 lepsius.713.f: "那尔迈调色板，也被称作那尔迈石板，是一件非常重要的埃及考古发现，测定年代为公元前31世纪，含有至今为止发现的最早象形文字铭文。调色板通常用作研磨化妆品（颜料），但是那尔迈调色板太大太重而无法用作个人的调色板，所以它更可能是有宗教用途的，专门地被制成神庙用品。有一种理论认为，它用来研磨装饰神像的颜料。它被认为是用来描述那尔迈国王统一上下埃及的。调色板分为两面，一面描述戴着上埃及王冠的那尔迈，王冠为球根状；另一面描绘了戴着下埃及王冠的那尔迈，王冠为平头状呈红色。这件文物和同样在希拉孔波利斯发现的蝎子权杖头和那尔迈权杖头一起，提供了对埃及国王的最早描述之一。调色板显示了许多埃及艺术的传统手法。埃及古物学者鲍勃·布莱尔把那尔迈调色板评论为“世界上第一件历史文档”。那尔迈调色板现存于埃及开罗博物馆。"
 lepsius.722.t: "萨尔贡面具"
 lepsius.722.d: "在发现空中花园的过程中，我们的考古学家在尼尼微发现了一件非凡的杰作：萨尔贡面具！"
 lepsius.722.f: "这件戴着古苏美尔统治者假发‑头盔的国王青铜头像可能就是萨尔贡本人。虽然缺少宝石眼睛，其他部位也略有损伤，并不影响它被视作古代艺术的杰作之一。这个真人大小的青铜像是在尼尼微发现的。复杂的胡须卷曲和图案以及复杂的发型表明了一个理想的男性在社会中的王权、权力和财富。除了其美学特征外，这件作品之所以令人惊叹，是因为它是已知使用失蜡法铸造工艺的最早的中空铸造雕塑品。在脸部和眼部左侧有蓄意的损坏，表明该半身像在后期被蓄意切削以示政治层面的偶像破坏意图。"
 lepsius.723.t: "麦斯卡拉姆杜格头盔"
 lepsius.723.d: "在巴比伦尼亚的发掘过程中，我们的考古学家有一个特别的发现：麦斯卡拉姆杜格的头盔！"
 lepsius.723.f: "麦斯卡拉姆杜格头盔是乌尔王室陵墓中最著名的发现之一。麦斯卡拉姆杜格是26世纪前乌尔第一王朝的早期苏美尔统治者。头盔是用金片浮雕而成，因此在战争中几乎不适合作为防护穿着，而可能更多地被用于仪式/崇拜功能。除了两侧制作出来的耳朵外，整个作品更像是一顶假发，因为其精细的雕刻模仿了波浪发型。另一侧有卷发，通过头上的辫子与波浪型发型分开。辫子在头部末端打了一个结扣。头盔的边缘有一系列小孔，可能用于固定衬垫。"
 lepsius.731.t: "阿伽门农黄金面具"
 lepsius.731.d: "在迈锡尼发现古人的宝藏后，一件特别的文物吸引了我们的眼球：一个金色的死亡面具，即所谓的阿伽门农面具！"
 lepsius.731.f: "“阿伽门农面具”是指在古希腊迈锡尼遗址发现的一件金质丧葬面具。德国考古学家海因里希·施里曼在1876年发现了这件文物，他认为这是迈锡尼国王阿伽门农的遗物，阿伽门农是荷马史诗《伊利亚特》中特洛伊战争时期的阿喀琉斯联军的领袖。但是现代考古研究表明，这件面具的历史可以追溯到公元前1600年左右，比传说中的特洛伊战争时期早了300到400年。该面具由黄红色的坚硬金箔制成，高约26厘米，宽约26.5厘米。金箔中浮雕了一个留有胡须、胡子和眉毛的男子面容。每个耳垂旁边都有一个孔，可能用于固定面具。该面具被卡西·热尔形容为“史前时代的蒙娜丽莎”。"
 lepsius.732.t: "斐斯托斯圆盘"
 lepsius.732.d: "在克里特岛的文物发掘中出土了一件神秘的器物：斐斯托斯圆盘！"
 lepsius.732.f: "斐斯托斯圆盘是1908年7月由意大利考古学者路易吉·佩尼尔发现于希腊克里特岛南部的斐斯托斯，为黏土质地，大约制成于公元前2000年前的米诺青铜时代。圆盘上有至今未能解读的古文字，圆盘的平均直径为15厘米，平均厚度为1厘米。在圆盘的两面分布着45种不同符号表示241个印记，如人形、鱼、鸟、昆虫、植物等。这些印记呈螺旋分布，并且由指圆盘中心的短线分成多组。圆盘的一面有122个印记，另一面有119个，初步判定是以印章的方式绘上。关于圆盘的用途众说纷纭。"
 lepsius.733.t: "蛇女神小雕像"
 lepsius.733.d: "在克里特岛的发掘过程中，我们获得了一件具有特殊艺术和历史意义的米诺斯神器：蛇女神小雕像！"
 lepsius.733.f: "两个米诺斯蛇女神小雕像于1903年在克里特岛的克诺索斯米诺斯宫遗址中被发掘出来。两个克诺索斯雕像都有明显的残缺，其年代可追溯到米诺斯文明新宫殿时代的末期，大约在公元前1600年左右。埃文斯将一对雕像中较大的一件为成为“蛇女神”，较小的一件为“蛇女祭司”。此后，人们一直在争论埃文斯是否正确，也许两个雕像都描绘了女祭司，或者两个雕像描绘了相同或不同的神明。华丽的衣着和“驯服蛇”的组合引起了相当大的关注，不仅出现了各种各样的赝品，而且较小的雕像仍然是米诺斯艺术和宗教的流行象征，现在也通常被通称为“蛇女神”。"
 lepsius.771.t: "巴加尔的陪葬品"
 lepsius.771.d: "在发现了巴加尔王的陵墓之后，我们发现了一些极为特殊的文物：巴加尔的陪葬品！"
 lepsius.771.f: "玛雅人没有金属工具，却能从非常厚重而密实的材料——翡翠（翡翠岩）中制造出许多物品，尤其是各种（皇家）服饰元素，如腰带扣——或石斧——耳塞，吊坠，以及面具。石斧（即扁平的类铜器形状的饰物）有时被雕刻成国王的石碑式形象（例如早期经典的“莱顿板”）。最著名的面具可能是帕伦克国王巴加尔的死亡面具，用不规则形状的大理石板覆盖，眼睛由珍珠母和黑曜石制成。巴加尔大帝是玛雅美洲的墨西哥美洲史上的帕伦克城邦的国王，在公元615年7月即位，直到去世。他统治了68年。"
 lepsius.772.t: "腰带饰板"
 lepsius.772.d: "在尤卡坦半岛的考古发掘中，一件具有非凡艺术与历史价值的美洲文物落入了我们之手：腰带饰板！"
 lepsius.772.f: "腰带饰板是一件重要的玛雅文物，由浅绿色翡翠制成，用作腰带垂饰。它于1864年在危地马拉的巴里奥斯港附近被发现，被誉为玛雅文明中年代最早的可溯文物之一。铭文板两面均有精细的刻绘图案。正面描绘了一位玛雅领主——常被认定为蒂卡尔的西亚赫·昌·卡威尔一世——侧身而立，脚下踩踏着一名被捆绑的俘虏。反面刻有长计历日期（8.14.3.1.12），对应公元320年9月，标记着该统治者的登基时刻。作为早期古典玛雅历史的原始资料，它为早期王权图像学和铭文研究提供了重要洞见。铭文板以其收藏城市命名，目前藏于荷兰莱顿的国立民族学博物馆。"
 lepsius.721.t: "吉尔伽美什史诗"
 lepsius.721.d: "我们的亚述学家在发现的楔形文字泥板的基础上，成功地重建了吉尔伽美什史诗的基本特征。"
 lepsius.721.f: "吉尔伽美什做了个梦：\n哦，我亲爱的母亲，\n昨夜我梦见一颗流星向我坠落，\n它像磐石，想移动但无能为力\n我的人民则全都聚集在它周围。\n如同亲吻孩子般吻着它的双足，\n而我，爱它如自己的一位妻子，\n抚摸拥抱它，将它带到您跟前，"
 lepsius.721.g: "人类历史上最古老的史诗…"
 lepsius.741.t: "普里阿摩斯的宝藏"
 lepsius.741.d: "海因里希·施里曼在发现特洛伊遗址之后正在寻找合适的博物馆收藏普里阿摩斯的宝藏。"
 lepsius.741.f: "虽然施里曼的挖掘工作令专家震惊并在整个欧洲享有盛誉，但他因其研究方法而遭遇学界的抵制。仍有一些事情值得注意。例如，历史学家和考古学家怀疑所谓的普里阿摩斯宝藏是否真的来自对应于荷马史诗中特洛伊的那一层。此外，当施里曼决定将他的发现捐赠给博物馆时，他并没有得到他所期望的反应；老赞助人对此不屑一顾。著名的博物馆，如埃尔米塔什博物馆或卢浮宫，也拒绝了。发现者将这些宝藏暂时展出在伦敦，直到他在1881年决定将这些发现“遗赠给德国人民永久拥有并保存在帝国首都”。"
 lepsius.741.g: "……我知道宝藏的准确位置！"
 lepsius.743.t: "施里曼捐赠普里阿摩斯的宝藏"
 lepsius.743.d: "[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetFullName]思来想去，还是决定把普里阿摩斯的宝藏捐赠给我们博物馆！"
 lepsius.743.g: "我们将为它建立一个大厅——并以施里曼的名字命名！"
 lepsius.743.h: "[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetLastName]是一件珍宝！"
 lepsius.744.t: "施里曼将普里阿摩斯的宝藏捐赠给博物馆"
 lepsius.744.d: "今天我们遗憾地听闻，海因里希·施里曼将普里阿摩斯的宝藏赠与一座博物馆——可惜不是我国的博物馆。"
 lepsius.744.g: "他怎么可以背叛我们？"
 lepsius.801.t: "发掘现场"
 lepsius.801.d: "我们应该派考古学家去哪个挖掘现场？"
 lepsius.801.f: "当咖啡蛋糕先生意识到那张逼真的宝藏地图实际上来自一个扭蛋机时，他不得不以前所未见的方式改变他的考古旅行计划。"
 lepsius.801.g: "上埃及"
 lepsius.801.h: "下埃及"
 lepsius.801.i: "巴比伦尼亚"
 lepsius.801.j: "亚述"
 lepsius.801.k: "阿尔戈利斯"
 lepsius.801.l: "尤卡坦"
 lepsius.801.m: "没关系。"
 lepsius.802.t: "考古学家"
 lepsius.802.d: "我们应该派哪位考古学家去建立一个新的挖掘现场？"
 lepsius.802.f: "大多数国家只有一个考古学家，通常也兼任首席科学家职位；但是，如果某个国家由于某种原因拥有更有经验的考古学家，那么可以在此处遴选第二位考古学家。"
 lepsius.802.g: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]"
 lepsius.802.h: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]"
 lepsius.803.t: "启程"
 lepsius.803.g: "祝你们好运！"
 lepsius.811.t_vok: "皇家陵墓"
 lepsius.811.t_pyr: "巴斯特神殿"
 lepsius.811.t_bab: "苏美尔陵墓"
 lepsius.811.t_ass: "亚述圣殿"
 lepsius.811.t_arg: "迈锡尼圣所"
 lepsius.811.t_yuc: "库房"
 lepsius.811.d: "我们的考古学家建立了一个普通的挖掘现场"
 lepsius.811.f_pyr: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]在下埃及尼罗河三角洲的沼泽地发现了一座古埃及神庙遗址（起初看起来就是这样）。不过事实证明这是一个小得多的发现：这座所谓的小神庙更像是一座献给猫女神巴斯特的神殿。学者我们的考古人员已经开始挖掘——毕竟千里之行始于足下。"
 lepsius.811.f_bab: "苏美尔人也许是世界上最古老的文明[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]在巴比伦意外发现了一座据说发明了轮子和文字的古人陵墓。然而不幸的是，陵墓内大部分文物已被盗或毁坏，考古学家已经开始抢救工作。"
 lepsius.811.f_arg: ""
 lepsius.811.f_yuc: "不幸的是，我们在尤卡坦的挖掘团队寻找玛雅文化遗迹方面收效甚微。在一个偏僻的山谷中，考古人员发现了一个旧仓库，该仓库曾经是提供破陶器的地方。在一封电报中，[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]告诉我们未来会有更多的发现。"
 lepsius.811.g: "一个平平无奇的地方，但它是我们的……"
 lepsius.812.t_vok: "王子之墓"
 lepsius.812.t_pyr: "太阳神殿"
 lepsius.812.t_bab: "月神塔"
 lepsius.812.t_ass: "亚述要塞"
 lepsius.812.t_arg: "墓室"
 lepsius.812.t_yuc: "玛雅天文台"
 lepsius.812.d: "我们的考古学家建立了一个优秀的挖掘现场"
 lepsius.812.f_vok: "来自埃及的喜讯！在经历了重重困难后，[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]发现了一座以前未知的墓穴。根据初步信息，这是一位古埃及王子的最终安息之所。虽然可能因为过去被当地人盗窃并出售而失去了一些文物，但这仍然是进一步考古发掘的好起点。"
 lepsius.812.f_pyr: "在埃及的晴空下，银金矿的最后残余在地平线上的一根方尖碑顶端闪烁——标志着通向太阳神拉的神庙的入口！[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]立即接管了现场并开始了挖掘工作。"
 lepsius.812.f_ass: "虽然如今的犹太人和基督徒对于亚述人的印象仍然较为负面，但圣经对于他们的描述并非完全属实。亚述人被视作战争民族，多次骚扰以色列人并最终摧毁了北部王国，成为了历史上重要的军事力量。尽管并非所有关于他们的负面传说都是真实的，但一座亚述堡垒的发现证明了中东古代的统治者们拥有令人印象深刻的军事文化。"
 lepsius.812.f_arg: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]最近发现了一座迈锡尼墓室。这种墓葬建筑形式在受爱琴海文化影响的地区晚期青铜时代时期被运用。这些墓室是从岩石上切割出来的，具有三部分结构（墓室、入口和通道），通常还有额外的壁龛和侧室，用于进行主要或次要的埋葬。我们博物馆的馆长已经把一瓶香槟冷藏好了。"
 lepsius.812.f_yuc: "玛雅人对天文学有着浓厚的兴趣。显然，他们对天体现象的独特认识在许多方面都比古希腊人更为优越。[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]在丛林中发现了一座建筑，其顶部有一条蛇形的螺旋楼梯。我们的研究人员对这一发现中可能包含的知识和文物感到兴奋。"
 lepsius.812.g: "挖掘的好地方。"
 lepsius.813.t_vok: "女王之墓"
 lepsius.813.t_pyr: "神秘金字塔"
 lepsius.813.t_bab: "巴比伦城墙"
 lepsius.813.t_ass: "亚述宫殿"
 lepsius.813.t_arg: "迈锡尼要塞"
 lepsius.813.t_yuc: "玛雅金字塔"
 lepsius.813.d: "我们的考古学家建立了一个完美的挖掘现场"
 lepsius.813.f_pyr: "当今天来自[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]的最新电报到达时，我们的研究人员起初不敢相信：显然，我们的考古学家在埃及沙漠中重新发现了一座以前未知的金字塔。尽管当地人已经谈论过这个完全被沙子覆盖的物体，但他们还没有找到入口。我们的国家可以称自己拥有来自旧王国的众多发现！"
 lepsius.813.f_arg: "这些古城是由半神或独眼巨人建造的吗？一座令人敬畏的迈锡尼城堡耸立在希腊山丘之上，我们的考古队在发现一周后接连告捷。不仅建筑令人惊叹，而且由黏土和黄金制成的发现也预示着未来的更多发现。[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]甚至称墨涅拉俄斯的戒指已被发现。"
 lepsius.813.f_yuc: "雨过天晴，只剩下柔和的薄雾笼罩着丛林树冠时，探险队看到了一幅壮丽的景象。无数被灌木和攀藤覆盖的台阶向天空延伸：一座巨大的台形金字塔在荒野中占据了全景，周围有鸟类和貘类等生物居住。[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]立即保护了其中一些首批发现，并用快递将其送到了博物馆。"
 lepsius.813.g: "完美的地点！"
 lepsius.190.t: "考古队回电"
 lepsius.190.d: "我们应该从哪个考古遗址召回我们的队伍？"
 lepsius.190.f: "一定是有人诽谤了亨利·J，有一天早晨，他被从挖掘现场召回，这不是他的错。"
 lepsius.190.g: "上埃及"
 lepsius.190.h: "下埃及"
 lepsius.190.i: "巴比伦尼亚"
 lepsius.190.j: "亚述"
 lepsius.190.k: "阿尔戈利斯"
 lepsius.190.l: "克里特"
 lepsius.190.m: "尤卡坦"
 lepsius.190.n: "秘鲁"
 lepsius.190.o: "继续前进。"
 lepsius.901.t: "图坦卡蒙之墓"
 lepsius.901.d: "今天是令国际科学界为之沸腾的日子，我们取得了一项伟大的发现：图坦卡蒙之墓已经被[ROOT.GetCountry.GetAdjectiveNoFlag]考古学家发掘出来了！"
 lepsius.901.f: "我们看着，慢慢地，似乎绝望地慢慢地清理门口下部堆积的碎石，直到最后我们清理出整个门。决定性的时刻已经到来。我颤抖着双手，在左上角小小地打了个口子。晦暗且空无一物的空间，尽管就在一根铁探针可以到达的地方，但这表明了通道外面外是空的，而不像我们刚刚清理过的通道那样填满了东西。我进行了蜡烛测试，以防万一有有害气体，然后我扩大了开口，插入了蜡烛，凝视着里面。起初我什么也看不见，热气从房间中逸出，使蜡烛的火焰闪烁，但随着我的眼睛逐渐适应光线，房间内的细节慢慢地从迷雾中浮现出来，奇怪的动物、雕像和黄金——到处都是金光。此刻我的沉默可能对于其他人来说是永恒的一瞬间，我被惊讶得说不出话来。当我的同事忍受不了悬念，焦急地询问：“能看到什么吗？”的时候，我只能说出：“是的，奇妙的东西。”"
 lepsius.901.g: "真是些好东西。"
 lepsius.902.d: "[SCOPE.sCountry('lepsius_tut_discoverer').GetName]有一个重大发现：图坦卡蒙之墓重见天日！"
 lepsius.902.f: ""
 lepsius.902.g: "希望法老的诅咒降临到他们身上。"
 lepsius.911.t: "胡夫船"
 lepsius.911.d: "今天是令国际科学界为之沸腾的日子，我们取得了一项伟大的发现：胡夫船已经被[ROOT.GetCountry.GetAdjectiveNoFlag]考古学家发掘出来了！"
 lepsius.911.f: "他深吸一口气，闭上眼睛，让它们适应挖掘时的昏暗，然后缓缓地睁开。他稳住双手。开始再次切割。随着外壳崩解，工作速度变得很快。他挖得足够深，可以扭动身体，朝不同的位置向下掘进，而头上的空间只有几英寸。一直在切割。时间毫无意义。他没有意识到自己已经累了，或者处于垂直的姿态。他搜索着，切割着。突然，奇迹出现了，他的手穿过了空气。他像在做梦躺下了。闭上了眼睛，一种几乎无法察觉也无法辨别的气味钻进他的鼻孔。这味道很甜。不可能是香料。还有呢？也许正是历史的气息？然后他知道了。那是雪松木！他的眼睛还没有睁开。他深吸了一口气，确定它确实是雪松木。他感到了一种从未有过的满足。幸福的感觉贯穿了他的全身。他的眼睛仍然闭着。他对上帝说了一声感恩的祷告。他那好奇的头脑又开始运转了。即使从从下面的太阳船中闻到雪松木的气味，也并不意味着白蚁没有活动。也许珍贵的木材已经被成群的白蚁吃掉了。“这是船！”他喊道。“这是船！”"
 lepsius.911.g: "四千年过去了，它还能在水上航行吗？"
 lepsius.912.d: "[SCOPE.sCountry('lepsius_ship_discoverer').GetName]有一个重大发现：胡夫船重见天日！"
 lepsius.912.f: ""
 lepsius.912.g: "在他们的新舰队里确实算得上一艘巨舰。"
 lepsius.921.t: "巴别塔"
 lepsius.921.d: "对于国际科学界来说今天是一个震惊的日子——[ROOT.GetCountry.GetAdjectiveNoFlag]考古学家今天发现了传说中的巴别塔！"
 lepsius.921.f: "这座山脊之外延伸开来一个相当广袤的平原，通向Amran Ibn Ali山丘，其中从我们所在的Kweiresh村庄到Hilleh的道路呈对角线穿过。它被称为“Sachn”，字面意思是平底锅，在今天的口语中，它指的是环绕大型朝觐清真寺（如卡尔巴拉或内杰夫清真寺）的拱廊所包围的自由空间。不过我们的“Sachn”不过是古代神圣区的现代外观，其中耶路撒冷的基石——埃特曼安基塔神庙、巴比伦塔，被包围着环形围墙，周围是与信仰有关的各种建筑物。我们不知道这座塔的完整高度。但是那波帕拉萨尔和尼布甲尼撒在他们的埃特曼安基柱形铭文中都特别强调了它们。前者说：“那时，马杜克命令我……重建巴比伦塔，在我之前的日子里，它已经被侵蚀并倒塌，现在要把它的基础牢固地建立在地下的胸膛上，让它的顶端直指天堂。”"
 lepsius.921.g: "所以圣经终究没有错。"
 lepsius.922.d: "[SCOPE.sCountry('lepsius_babylon_discoverer').GetName]有一个重大发现：传说中的巴别塔重见天日！"
 lepsius.922.f: ""
 lepsius.922.g: "希望他们和造塔的人一样困惑。"
 lepsius.931.t: "巴比伦空中花园"
 lepsius.931.d: "今天是令国际科学界为之沸腾的日子，我们取得了一项伟大的发现：空中花园已经被[ROOT.GetCountry.GetAdjectiveNoFlag]考古学家发掘出来了！"
 lepsius.931.f: "根据最新的发现，空中花园位于巴比伦的说法已经被证明是一种谬误。实际上，我们最有能力的考古学家通过比较历史文献发现，很少有文献记载这传说中的花园坐落在巴比伦。此外，以精细的园艺技术著称的是亚述人，而非巴比伦人。浮雕表明有数层的广阔花园。考古团队在亚述国王辛那赫里布的宫殿中进行了试掘，发现这个部分并未开发。发现的结果很明显：这个失落的世界奇观明显位于尼尼微。因此，我们的考古学家不仅从发现中获益，还澄清了持续了两千五百年的谜团。"
 lepsius.931.g: "那么这是否意味着它实际上就是尼尼微的空中花园？"
 lepsius.932.d: "[SCOPE.sCountry('lepsius_semiramis_discoverer').GetName]有一个重大发现：传说中的空中花园重见天日！"
 lepsius.932.f: ""
 lepsius.932.g: "可以说完全搞混了。"
 lepsius.941.t: "迈锡尼的宝藏"
 lepsius.941.d: "今天是令国际科学界为之沸腾的日子，我们取得了一项伟大的发现：迈锡尼的宝藏已经被[ROOT.GetCountry.GetAdjectiveNoFlag]考古学家发掘出来了！"
 lepsius.941.f: "迄今为止最重要且最有价值的发掘是直接在狮子门后面进行的。在1874年的试掘期间，施里曼已经确定了城堡最低点的岩石被深深地掩盖着。根据保萨尼亚斯的记载，他认为统治家族的墓穴可能在城堡墙内，并在工作开始后不久就想起了这些话。在深度为3至5米的地方找到了三块带有古代浮雕的墓碑。施里曼说，当这些石头被移除时，发现它们并不是像先前假定的那样站在地面上，而是在填充了垂直挖入岩石的坑道的土壤上。他们挖掘了五个这样的坑道，在一定深度去除了一层层的石头，这些石头在埋葬了受害者后曾用作祭坛。斧头敲击地面时发现深度约为6米。底部散布着15具尸体，分别放在五个坑里，身上装饰着丰富的甚至是神话般的金饰。男性的面部覆盖着金面具，女性的长袍上满载着黄金，而金盘上则装饰着螺旋图案。"
 lepsius.941.g: "阿伽门农，是你吗？"
 lepsius.942.d: "[SCOPE.sCountry('lepsius_mycenae_discoverer').GetName]有一个重大发现：传说中的迈锡尼的宝藏重见天日！"
 lepsius.942.f: ""
 lepsius.942.g: "如有疑问，这些骗子已经将这些“宝藏”藏在那里了。"
 lepsius.961.t: "巴加尔的遗产"
 lepsius.961.d: "今天是令国际科学界为之沸腾的日子，我们取得了一项伟大的发现：巴加尔的遗产已经被[ROOT.GetCountry.GetAdjectiveNoFlag]考古学家发掘出来了！"
 lepsius.961.f: "我最初的印象是一种由绿色、红色和白色组成的马赛克。然后它慢慢变得更加详细——绿色的玉饰品、红色的涂漆牙齿和骨骼，以及一些面具的碎片。我凝视着这位逝者的面容，这个惊人的工程——墓穴、雕塑、楼梯、顶部带有神殿的巨大金字塔——都是为他而建造的，他是帕伦克最伟大的人物之一！这是一座石棺，是玛雅金字塔中发现的第一座！"
 lepsius.961.g: "南美洲的图坦卡蒙墓！"
 lepsius.962.d: "[SCOPE.sCountry('lepsius_pakal_discoverer').GetName]有一个重大发现：传说中的巴加尔的陪葬品重见天日！"
 lepsius.962.f: ""
 lepsius.962.g: "这个面具太丑了"
 lepsius_local_excavation_modifier: "本土发掘"
 lepsius_local_excavation_state_modifier: "本土发掘"
 lepsius_local_excavation_cost_modifier: "本土发掘成本"
 lepsius.1101.t: "考古大会：出埃及记"
 lepsius.1101.d: "我国已为举办下一届考古大会做好了一切相关准备。大会的重点将是《圣经》在考古学和文物研究中的扮演的角色。我们将向全世界所有重要考古学家发出邀请。[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授将主持会议。"
 lepsius.1101.f: "早在罗马时代，由于缺乏有关古埃及的史料，历史著作只能以希罗多德等人的转述作为基础。这一发展延续到了中世纪。《圣经》提供了一些线索，并在很长一段时间内被视为近东历史的可靠来源——这也是因为其他传统完全不存在。随着象形文字的破译和现代埃及学的奠基，支持与反对《圣经》的派别都试图提出证据证明其正误。随着对古巴比伦的探索开始，这种趋势进一步加剧。圣经故事历史性争议的一个例子是出埃及记——以色列人离开埃及——在埃及的资料中并无证据。"
 lepsius.1101.g: "我们将迎接整个考古学界的到来。"
 lepsius.1102.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName]邀请我国参加考古大会。会议主题是以出埃及记为例探讨《圣经》的历史性。我们的考古学家[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授收到了热情的邀请。"
 lepsius.1102.g: "总在争论谁的皮夹克最好……"
 lepsius.1103.t_laughed: "考古界的嘲弄"
 lepsius.1103.t_respected: "自信的亮相"
 lepsius.1103.t_lauded: "钦佩与祝贺"
 lepsius.1103.d_laughed: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授的出现令人忍俊不禁。在埃及学领域，[ROOT.GetCountry.GetNameNoFlag]并没有做出什么杰出成就。这显然成了私下讲的笑话。"
 lepsius.1103.d_respected: "考古大会开始之前，我们的考古学家受到了热情的欢迎，并按照惯例进行了交流。[ROOT.GetCountry.GetNameNoFlag]在研究界享有盛誉。"
 lepsius.1103.d_lauded: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授的到来受到了热烈欢迎。他被视作最值得期待的客人之一。由于[ROOT.GetCountry.GetNameNoFlag]被公认为埃及学先驱，他周围很快聚集了很多人。"
 lepsius.1103.f_laughed: "“为什么[ROOT.GetCountry.GetAdjectiveNoFlag]考古学家没有女朋友？\n\n因为他们永远算不准时间！”"
 lepsius.1103.f_respected: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授抵达后，与同事们愉快地交谈了几句，谈的大多是无聊的废墟，科学界之外的人士会把它们当作更无聊的地层。"
 lepsius.1103.f_lauded: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授似乎有些应接不暇。许多同行都想与他交谈，从他的考察和经验中获益。有些人甚至劝他举办一次私人讲座。"
 lepsius.1103.g: "真是尴尬！"
 lepsius.1103.h: "总算能和志同道合者为伴。"
 lepsius.1103.i: "我们是引领潮流的考古学大国！"
 lepsius.1104.t: "出埃及记：历史功绩或是杜撰？"
 lepsius.1104.d: "针对特定主题的会议很快演变成了原则性问题。起初，人们只想讨论《圣经》中的出埃及和埃及史料，但很快就演变成了一场关于《圣经》在历史学和考古学中价值的辩论。两个学术阵营现在不可调和地对立起来。"
 lepsius.1104.f: "[SCOPE.sCharacter('lepsius_bible_defender_scope').GetFullName]其实只是想就以色列人的记忆文化和出埃及的状况发表演讲，但[SCOPE.sCharacter('lepsius_bible_attacker_scope').GetFullName]提出了一个有些挑衅但合情合理的问题：这样的发言是否只是浪费时间——因为没有任何考古传统可以证明出埃及记的历史性，所以最终必须澄清《圣经》是否可以被视为史料来源。目前已经被翻译的文本中也找不到任何传统。因此他们必须提出以下问题：摩西五经是否实际上是臆造的故事，因而百无一用？他总结道：“考古学研究的是事实，而不是真理。”对于这些指责，[SCOPE.sCharacter('lepsius_bible_defender_scope').GetFullName]回应说，不应将《圣经》文本理解为目击者的报告，而应将其理解为有关事件的第二手资料，这些事件构成了古代记忆文化的一块拼图。“全盘否定《圣经》与把《圣经》中的每一个字都当作史实一样都是无稽之谈。更重要的是提出正确的问题”，他说。"
 lepsius.1104.g: "《圣经》作为间接史料具有一定的历史价值。"
 lepsius.1104.h: "《圣经》毫无历史价值。"
 lepsius.1105.t: "考古学家同行"
 lepsius.1105.d: "在本届考古大会之余，我们的考古学家还结识了一位外国同行，并进行了交流。"
 lepsius.1105.f: "大会已经进行了好几天，起初，[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授只有在休息时才有时间与一位素不相识同事交谈。会议结束后，大家一起吃了顿饭，科学家们相互交谈的时间越长，他们对彼此的了解就越多——而且是从彼此身上学到的也越多。事实证明，[SCOPE.sCharacter('lepsius_foreign_archaeologist_scope').GetFullName]是一位拥有丰富经验的人物。"
 lepsius.1105.g: "又一位考古学界的朋友！"
 lepsius.1106.t: "掮客的文物"
 lepsius.1106.d: "一位古董商的掮客参加了在[SCOPE.sCountry('lepsius_congress_host_country').GetName]举行的考古大会。他试图代表一位神秘的贵族向感兴趣的博物馆出售一件文物。目前为止，他还没有找到客户。"
 lepsius.1106.f: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授确信这件文物的真实性。然而由于价格昂贵，他对于是否购买犹豫不决，正在等待来自首都的承诺。"
 lepsius.1106.g: "昂贵但值得。"
 lepsius.1106.h: "不够划算。"
 lepsius.1107.t: "友善交谈"
 lepsius.1107.d: "在[SCOPE.sCountry('lepsius_congress_host_country').GetName]考古大会的间隙，我们的考古学家在与几位同事交谈时非常积极地介绍了[ROOT.GetCountry.GetNameNoFlag]。"
 lepsius.1107.f: "我们不知道[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授到底说了些什么，但显然他的话打动了其他考古学家。他们一定会在自己的祖国传播这种积极的印象。"
 lepsius.1107.g: "让我们改善彼此之间的关系。"
 lepsius.1107.h: "让我们改善我们的名誉。"
 lepsius.1108.t: "助理"
 lepsius.1108.d: "一位雄心勃勃的年轻人想进入考古大会，却被门卫阻止，这引起了[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授的注意。"
 lepsius.1108.f: "这位学生理所当然地被阻止与国际考古学家们一起进入大厅，但他的坚持给 [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]留下了深刻印象，并因此想更深入地了解这位年轻人。结果教授发现他在古代语言和地理方面都相当博学。仅仅几个小时后，教授就决定在大会结束后让他担任自己的助手，希望他能尽快做出学术贡献。"
 lepsius.1108.g: "我们期待一段学术生涯。"
 lepsius.1109.t_merit: "出埃及记：不仅是故事"
 lepsius.1109.t_invention: "出埃及记：虚构而非事实"
 lepsius.1109.d_merit: "经过多次会议、辩论和争执，考古大会结束了，并拟定了最终的宣言。据此，《圣经》并非直接史料，但在某些方面仍然具有历史价值，尽管可能不应直接适用于埃及和巴比伦。"
 lepsius.1109.d_invention: "经过多次会议、辩论和争执，考古大会结束了，并拟定了最终的宣言。据此，《圣经》对考古学或历史学毫无价值。相反，它在很大程度上是一系列臆造的故事，对古代研究弊大于利。"
 lepsius.1109.f_merit: "一小部分考古学家认为该宣言是一种妥协，但其他人则认为它是一种超越绝对立场的对过去的更细致入微的态度。尽管并非直接印证《出埃及记》，但一些考古学家强调了最近发现的法老麦伦普塔的一段文字，其中提到了对以色列人的镇压。另一部分人指出，根据商博良翻译的布巴斯提斯石门铭文，法老示撒确实洗劫了耶路撒冷。这些都表明，相较于逐字逐句解读这部书籍，更应将其视为研究上古史的一块拼图。错误的解释在所难免，但所有科学领域向来如此。"
 lepsius.1109.f_invention: "最终，怀疑论者一派取得了彻头彻尾的胜利。从今往后，《圣经》故事的价值不会再高于罗马七王传说或希腊神话——《圣经》在西方世界的显赫地位从此终结，至少在这一本领域是如此。考古发现与经文之间的巧合被认为是不折不扣的巧合。因此，《圣经》只余留了文学意义。一些考古学家还提到了《圣经》故事最多不过是抄袭埃及故事或巴比伦神话的可能性。对这种借鉴还需要进行一些必要的调查，除此之外，对考古学和历史学来说，到此为止：《圣经》在相当程度上上是一部编造的故事集，毫无科学价值。"
 lepsius.1109.g: "必须对文本进行正确的分类和解释。"
 lepsius.1109.h: "《圣经》是本无用的故事书。"
 lepsius.1109.i: "我们早就知道了。"
 lepsius.1111.t: "考古大会：文明的起源"
 lepsius.1111.d: "我国已为举办下一届考古大会做好了一切相关准备。大会将重点讨论文明最早出现于何地的问题。最新信息显示答案可能是巴比伦。这进一步提出了巴比伦文化对其他文化的影响程度问题。我们将向世界上所有主要考古学家发出邀请。[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授将主持会议。"
 lepsius.1111.f: "有关巴比伦文明的知识从未完全失落——即使在希腊时代也存在着关于巴比伦人和亚述人的信息。然而，对阿卡德语的破解表明曾经存在过苏美尔等更古老的文明，他们的历史甚至比埃及人更为古早。一系列典型的文明发明塑造了这些古人的日常生活，许多语言学家和考古学家很快就怀疑巴比伦才是真正的文明摇篮。对古美索不达米亚的迷恋很快导致所有文明区域都被上溯至巴比伦：不仅《圣经》，还有黎凡特和波斯的文化，甚至埃及，都只是巴比伦文化起源的“接受者”或“传播者”。这种狭隘的科学观点很快就被其追随者自嘲为“泛巴比伦主义”。"
 lepsius.1111.g: "我们将迎接整个考古学界的到来。"
 lepsius.1112.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName]邀请我国参加考古大会。会议主题是文明最早出现于何地。我们的考古学家[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授收到了盛情邀请。"
 lepsius.1112.g: "总在争论谁的皮夹克最好……"
 lepsius.1113.d_laughed: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授的出现令人忍俊不禁。在亚述学领域，[ROOT.GetCountry.GetNameNoFlag]并没有做出什么杰出成就。这显然成了私下讲的笑话。"
 lepsius.1113.d_respected: "考古大会开始之前，我们的考古学家受到了热情的欢迎，并按照惯例进行了交流。[ROOT.GetCountry.GetNameNoFlag]在研究界享有盛誉。"
 lepsius.1113.d_lauded: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授的到来受到了热烈欢迎。他被视作最值得期待的客人之一。由于[ROOT.GetCountry.GetNameNoFlag]被公认为亚述学先驱，他周围很快聚集了很多人。"
 lepsius.1114.t: "巴比伦：文明的摇篮？"
 lepsius.1114.d: "在大会期间，有关文明起源的问题日益发展成为巴比伦是否，以及在多大程度上，影响了所有中东与东地中海文化的问题。有些人认为，此后几乎一切举足轻重的思想都是在古巴比伦孕育的！"
 lepsius.1114.f: "[SCOPE.sCharacter('lepsius_babylon_defender_scope').GetLastName]教授首先就4000多年前巴比伦的文化成就与知识水平发表了非常有趣的意见：“苏美尔‑巴比伦文化世界以一种世界理论为前提，所有国家和社会组织都被这种理论所约束。所有科学和艺术都可以追溯到上天启示的原初智慧，并依据这种智慧管理和保护财产。泛巴比伦主义旨在提供证据，证明这种星空世界观在全世界所有文化和宗教中都留下了印记。”但这一观点激起了众多学者的强烈反对，[SCOPE.sCharacter('lepsius_babylon_attacker_scope').GetFullName]很快开始了发言。他反对所有神话都源自巴比伦的观点。“[SCOPE.sCharacter('lepsius_babylon_defender_scope').GetLastName]所说的更像是构想而非事实。平行发展不存在的想法可谓牵强——例如，埃及象形文字的灵感并非来自楔形文字。泛巴比伦主义者试图创造一种等级秩序，将美索不达米亚置于中心，而将所有其他神话置于边缘，但他们完全忽视了以下事实：各种文化可以生活在一个共同的谱系中。"
 lepsius.1114.g: "巴比伦是文明的摇篮。"
 lepsius.1114.h: "文明起源于多处。"
 lepsius.1119.t_panbabylonism: "文明的起源：泛巴比伦主义胜利"
 lepsius.1119.t_antipanbabylonism: "文明的起源：泛巴比伦主义遭到驳斥"
 lepsius.1119.d_panbabylonism: "经过激烈的辩论，许多学者之间产生了分歧，但大会最终达成了宣言。据此，美索不达米亚不仅是文明的摇篮，也是中东所有神话理念的起点。"
 lepsius.1119.d_antipanbabylonism: "战斗结束了，经过一番激烈的唇枪舌剑之后，学者们终于抖擞精神，签署了一份最后宣言，宣告泛巴比伦阵营最终落败。诚然，美索不达米亚是公认的最重要的文明摇篮之一，但并非唯一的摇篮。将所有神话都追溯到巴比伦人的企图被扼杀在萌芽状态。"
 lepsius.1119.f_panbabylonism: "最后的宣言证实了泛巴比伦主义的追随者提出的所有理论：东方神话和文学对巴比伦文化的借鉴是显而易见的。《圣经》和埃及神话显然都基于《吉尔伽美什史诗》等众所周知的巴比伦思想。归根结底，整个中东地区的文化发展深受这种起源文化的天文学和占星术的影响，其思想有时体现的比较明显，有时则不那么显著。"
 lepsius.1119.f_antipanbabylonism: "泛巴比伦主义的支持者最近发现自己成了少数派。学术界确实承认美索不达米亚文化的许多成就是中东地区知识结构核心的一部分。然而，科学家们在最终宣言中拒绝了绝对的主张，甚至拒绝了所谓一种“起源文化”的主张。被视作巴比伦思想起点的天文学研究被揭露为次生的发展，只是被错误地置于起点。学者们也不承认巴比伦传统的优越性：相反，各种“巴比伦”故事实际上是该地区传统的共同遗产，巴比伦人则只是最早的记录者。其中一句话尤其尖刻，它断然宣称泛巴比伦主义是伪科学：“与大金字塔相比，这种神秘的智慧对世界所有维度的‘原初启示’并不具有更多的科学意义，不幸的是，金字塔仍在寻找它的信徒。”"
 lepsius.1119.g: "一切都始于美索不达米亚。"
 lepsius.1119.h: "并非只有一个起源。"
 lepsius.1121.t: "考古大会：特洛伊的地位"
 lepsius.1121.d: "我国已为举办下一届考古大会做好了一切相关准备。大会旨在最终解决特洛伊问题。尽管海因里希·施里曼的发掘可谓壮观，但人们完全有理由质疑施里曼究竟发现了什么，以及它是否真的是特洛伊，或特洛伊是否以这种形式存在过。我们将向全世界所有重要考古学家发出邀请。[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授将主持会议。"
 lepsius.1121.f: "在施里曼宣布发现特洛伊城之后，持怀疑态度的人们花了一些时间才缓过神来。后来的调查发现，施里曼不仅在错误的地层进行了挖掘，而且他发现的所谓“普里阿摩斯宝藏”比荷马史诗中的特洛伊城还要古老得多。很快就有传言说，施里曼可能挖错了城市。还有人坚持认为，不存在的东西是挖不出来的。还有一些人则为施里曼的发现辩护，认为施里曼是根据古代人的描述进行发掘的，这已经提供了证据。罗马时代的发现也证明希腊人和罗马人同样认为这里是特洛伊战争的发生地。特洛伊的发现并没有结束学术界的争论，而只是标志着新的阶段开始。"
 lepsius.1121.g: "我们将迎接整个考古学界的到来。"
 lepsius.1122.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName]邀请我国参加考古大会。会议旨在最终解决特洛伊问题。尽管海因里希·施里曼的发掘可谓壮观，但人们完全有理由质疑施里曼究竟发现了什么，以及它是否真的是特洛伊，或特洛伊是否以这种形式存在过。我们的考古学家 [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授收到了盛情邀请。"
 lepsius.1122.g: "总在争论谁的皮夹克最好……"
 lepsius.1123.d_laughed: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授的出现令人忍俊不禁。在爱琴海考古领域，[ROOT.GetCountry.GetNameNoFlag]并没有做出什么杰出成就。这显然成了私下讲的笑话。"
 lepsius.1123.d_respected: "考古大会开始之前，我们的考古学家受到了热情的欢迎，并按照惯例进行了交流。[ROOT.GetCountry.GetNameNoFlag]在研究界享有盛誉。"
 lepsius.1123.d_lauded: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授的到来受到了热烈欢迎。他被视作最值得期待的客人之一。由于[ROOT.GetCountry.GetNameNoFlag]被公认为爱琴海考古的先驱，他周围很快聚集了很多人。"
 lepsius.1124.t: "特洛伊：只是神话？"
 lepsius.1124.d: "关于特洛伊地位的争论比预想的还要激烈。不仅分成了两个阵营，甚至出现了第三个。第一个阵营由激情澎拜的施里曼拥簇组成，他们确信施里曼提出的所有论点都是正确的。与之分庭抗礼的是一个不可调和的对立阵营，他们认为表明荷马史诗中的特洛伊与施里曼的发掘地点有所关联的证据微乎其微。第三派认为，施里曼犯了严重的错误，但这也确实是他要寻找的那座城市。"
 lepsius.1124.f: "如果施里曼没有找到特洛伊，那他找到的是什么？他发现了一个符合《伊利亚特》和古代作家描述的地方。他发现了一座符合这个时代特征的建筑。我们还发现了一座似乎已被敌人摧毁的建筑。还需要多少证据？[SCOPE.sCharacter('lepsius_troy_defender_scope').GetLastName]教授开始了他的演讲，但随后被他的同事[SCOPE.sCharacter('lepsius_troy_attacker_scope').GetLastName]的许多问题打断。例如，古希腊人在古典时期已不知道特洛伊城的位置，并已将此地误认为特洛伊城。这座城市的名称不详，它与希腊世界的关系也没有任何线索。并且，关于特洛伊战争，从来没有任何可靠的历史资料与荷马的描述相类似。接下来，[SCOPE.sCharacter('lepsius_troy_mediator_scope').GetLastName]先生插话说：'亲爱的同事们，施里曼肯定犯了错误——但我们难道要因小失大吗？"
 lepsius.1124.g: "施里曼确实发现了特洛伊。"
 lepsius.1124.h: "施里曼确实发现了“特洛伊”，但情况更为复杂。"
 lepsius.1124.i: "没有真凭实据证明这就是特洛伊。"
 lepsius.1129.t_homeric: "特洛伊：历史而非神话"
 lepsius.1129.t_historical: "特洛伊：历史与神话"
 lepsius.1129.t_myth: "特洛伊：神话而非历史"
 lepsius.1129.t_disputed: "特洛伊：未解之谜"
 lepsius.1129.d_homeric: "经过激烈的辩论和多次演讲，支持施里曼的阵营取得了胜利，他们承认在希萨利克山所坐落的正是荷马史诗中的伊利昂。特洛伊城的历史性、特洛伊战争和荷马史诗中的其他内容都被承认为史实。"
 lepsius.1129.d_historical: "在[SCOPE.sCountry('lepsius_congress_host_country').GetName]参加大会的考古学家们得出结论，荷马史诗传统中至少有部分内容是真实的。即使施里曼的发掘存在错误，但仍有证据表明，希萨利克与文学和史学界普遍认为的特洛伊相吻合——接下来只需要澄清一些细节了。"
 lepsius.1129.d_myth: "大会得出的结论是，经过几个世纪的争论，特洛伊问题尘埃落定：所谓特洛伊的发现使批评者们更加坚定地怀疑《荷马史诗》纯属虚构。无论施里曼发现了什么，那都不可能是特洛伊，因为特洛伊从未存在过。"
 lepsius.1129.d_disputed: "最近，学者们之间的堑壕战导致了极大的失望和冷漠。特洛伊问题毫无解决办法——他们甚至无法就联署最终宣言达成一致。一些代表提前离场，另一些代表则在无意义的讨论中枯坐。"
 lepsius.1129.f_homeric: "今天，施里曼的支持者们正在庆祝伟大的胜利：他们热情洋溢地向特洛伊的发现者发出电报，称他的所有论文都将得到认可，他甚至将成为学会的荣誉会员。他确实发掘了特洛伊城，从而提供证据证明荷马史诗中的特洛伊战争并非杜撰，亦非模糊的记忆，而是历史事件。当务之急是在爱琴海地区寻找更多的文物，这些文物可以提供更多关于那个曾经被误解成“神话”的时代的信息。研究人员的热情应该会确保更深入的发掘尽快进行，以支持施里曼的论点：也许很快就能找到奥德修斯的房子、阿喀琉斯的坟墓或阿伽门农被杀的浴缸？令人惊讶的是，施里曼尚未对这封电报做出回应……"
 lepsius.1129.f_historical: "经过长时间的讨论和大量的说服工作，大多数大会成员达成了妥协。国际考古大会的绝大多数成员都认为，施里曼在特洛伊的发掘工作中犯下了严重错误——其中之一是他显然在错误的发掘层中进行了搜寻。然而，这仅仅意味着施里曼在“正确”的地方发现了“错误”的特洛伊。另一层可能确实包含着特洛伊战争时期的城市。考古学家最终无法确定这是否是真实的历史事件：事实上，特洛伊所在的山丘曾多次遭受火灾和战争。至于特洛伊城的身份，“赫梯影响”理论得到了证实。科学家们宣布，他们将以这些成果为契机进行更深入的研究，并将继续深入讨论特洛伊问题。"
 lepsius.1129.f_myth: "经过激烈的争论，考古学家和历史学家——有些人的肚子已经开始叫饿——终于签署了一份联合声明。据此，他们只将荷马史诗视作文学作品，可能指向更古老的事件，但现代考古学很难将其重建。反之，特洛伊战争被认为是“战争本身”，反映了人类的整体经历。因此，特洛伊的历史内涵可能与亚特兰蒂斯一样，是一种乌托邦，一个思想交锋的文学场域。原则上，大会宣布特洛伊研究是“伪科学边缘”活动，既无意义又无目的。考古学应该转向更有价值的领域。"
 lepsius.1129.f_disputed: "‘好吧，至少吃的还不错！’"
 lepsius.1129.g: "所以，施里曼真的找到了特洛伊！"
 lepsius.1129.h: "施里曼挖错了特洛伊，但地点是正确的。"
 lepsius.1129.i: "特洛伊很可能是纯粹的文学创作。"
 lepsius.1129.j: "整个大会完全是浪费时间！"
 lepsius.1201.t: "[SCOPE.sState('lepsius_excavation_site').GetName]的本土发掘现场"
 lepsius.1201.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]在[SCOPE.sState('lepsius_excavation_site').GetName]发现了一处新的发掘现场。他和团队立即开始工作。不过，目前还不清楚挖掘工作需要多长时间的资助。"
 lepsius.1201.f: "挖掘许可期限为5年、7年或10年。与在国外进行的发掘不同，这种发掘不能随时取消。首席考古学家将根据期限在发掘现场工作6、12或18个月直至返回。在此期间他将不可用。"
 lepsius.1201.g: "10年。"
 lepsius.1201.h: "7年。"
 lepsius.1201.i: "5年。"
 lepsius.1202.t: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授从发掘现场归来。"
 lepsius.1202.d: "在过去的几个月里，[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]一直在[SCOPE.sState('lepsius_excavation_site').GetName]帮助建立考古发掘现场，并取得了一些初步发现。他将返回大学进行评估，而考古队将在未来几年内继续独立进行发掘，直到资金用完为止。"
 lepsius.1202.f: "‘很少有哪种工作能像挖掘工作那样，其结果直接取决于工人的个性。有句古话说，一个人会找到他所寻找某一类东西，这句话说的对；或者如果他没有足够的洞察力来确保找到他所寻找的东西，至少，悲哀的是，他不会找到他没有在寻找的任何东西。’——弗林德斯·皮特里"
 lepsius.1202.g: "欢迎回来。"
 lepsius.1203.t: "本土发掘完成"
 lepsius.1203.d: "考古发掘队已经完成了当地的发掘工作，并将一些最后的发现存放起来。现在又可以用于其他发掘或考察了。"
 lepsius.1203.f: "“命运的道路是黑暗的，\n未来的前路不确定，\n而我上床睡觉之前，\n会抿一口白兰地。”\n——罗伯特·科尔德威"
 lepsius.1203.g: "我们应该很快再进行一次发掘。"
 lepsius.2000.t: "[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetLastName]发明三期论"
 lepsius.2000.d: "丹麦国家博物馆馆长[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetFullName]发明了一个将考古发现分为#b 石器时代#!、#b 青铜时代#!与#b 铁器时代#!三个阶段。这是考古学的一场革命！"
 lepsius.2000.f: "“如你所见，有些文物总是一起出现，而有些材料却从未出现在同一个发掘现场。例如，只有在发现铁制工具和武器的地方才会发现银器。而金器则既会和铁器一起出土，也可以和青铜器一起出土。\n同样有趣的是，有些材料只出现在特定形式的墓葬中。石器只能在未经焚化的尸体和石室墓中发现。铁器则出现在土堆墓室中。\n所有这些都使我们能够更精确地确定发现的年代。首先是石器，其次是青铜器，然后才是铁器。”"
 lepsius.2000.g: "如此伟大的头脑应当为我们工作！"
 lepsius.2000.h: "他可以留在博物馆……"
