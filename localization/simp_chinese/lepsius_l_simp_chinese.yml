 lepsius_antiquarianism_tech: "古董主义"
 lepsius_antiquarianism_tech_desc: "自意大利文艺复兴时期以来，艺术品收藏家们便一直对过去充满兴趣。从约翰·约阿希姆·温克尔曼推崇新古典主义到拿破仑远征埃及期间的《埃及记叙》，人们逐渐拉开古代的神秘面纱。尽管存在着这些进步，但野蛮也是同样存在的。史前考古学的领军人物——乔瓦尼·巴蒂斯塔·贝尔佐尼，他的考古行为便徘徊在寻宝和盗墓之间。"
 lepsius_early_archaeology_tech: "早期考古学"
 lepsius_early_archaeology_tech_desc: "在商博良的准备工作之后，卡尔·理察·累普济乌斯成功地破译了埃及的象形文字。它象征着考古学领域的变化：考古学会、研究所和博物馆促进了一种新的科学文化。尽管如此，古迹保护的奠基人之一奥古斯特·马里埃特在发现塞拉比尤姆神庙时，毫不犹豫地用炸药打开了它。"
 lepsius_modern_archaeology_tech: "现代考古学"
 lepsius_modern_archaeology_tech_desc: "十九世纪末，考古学领域的方法论有了进一步的发展。这方面的先驱人物之一是奥古斯都·皮特·里弗斯，他在英格兰南部的克兰伯恩蔡斯进行了细致的挖掘，强调考古不仅应该记录美丽或有价值的物品，也应该记录平凡的物品。弗林德斯·皮特里在考古学和文物保护方面引入了系统性的方法论。"
