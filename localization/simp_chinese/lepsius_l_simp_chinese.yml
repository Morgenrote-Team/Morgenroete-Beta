 lepsius_state_trait_guatavita: "瓜塔维塔湖——穆伊斯卡文明之谜\n考古项目中的@lepsius_local_minor!本地文物#G +1#!"
 country_lepsius_decorative_local_artifacts_add: "来自的考古项目的@lepsius_local_minor!#V 本地文物#!"
 je_lepsius_angkor: "高棉帝国的心脏"
 je_lepsius_angkor_reason: "吴哥遗迹从未真正消失。它们不仅为当地人所知，近代早期的欧洲传教士和旅行者也曾报道过丛林中的这些寺庙。为了彻底研究高棉人过去的统治历史，需要将遗迹上的植被完全清除，并在开展任何研究工作之前对考古遗址进行修复。"
 je_lepsius_cliff: "普韦布洛人的秘密"
 je_lepsius_cliff_reason: "与北美西部的众多其他族群迥然不同，普韦布洛印第安人过着安定的农耕生活。他们栖居于石屋与小型聚落之中，以耕种为生。传言道，在他们的领地深处，散布着无数被遗弃的城镇。难道说，在这片美洲大地之上，当真存在过一个失落的文明？"
 je_lepsius_guatavita: "穆伊斯卡之谜"
 je_lepsius_guatavita_reason: "瓜塔维塔湖至今仍笼罩于层层迷雾之中。这片水域被穆伊斯卡人奉为圣地——他们是哥伦比亚富有传奇色彩的黄金民族之一，曾与印加人往来密切，其金工技艺在美洲前哥伦布时代冠绝当世。历史的回响至今不绝：难以计数的宝藏或许仍沉眠于湖心。只需一次小小的发掘，便能揭开这一切的真相"
 lepsius.78.t: "悬崖宫"
 lepsius.78.d: "与其说是精心策划，不如说是机缘巧合——科罗拉多州的考古学家们在搜寻古代美洲原住民文物时，发现了一座凿刻于岩石之中的普韦布洛城镇。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士立即前往该地，以便更仔细地考察这处遗址。"
 lepsius.78.f: "悬崖宫是北美规模最大的悬崖民居，坐落于科罗拉多州的梅萨维德国家公园之内。这座建筑群由先祖普韦布洛人于公元1190年至1260年间建造，内含150余个房间及23座基瓦——即普韦布洛文化中用于仪式的半地下圆形建筑。尽管原住民群体与该遗址始终保有着祖先传承上的精神纽带，但欧裔美国人有据可考的发现，则发生在1888年12月18日。彼时，牧场主理查德·韦瑟里尔与查理·梅森正于一场暴风雪中寻找走失的牛群，自峡谷边缘无意中瞥见了这些遗迹。砂岩壁龛内那层层叠叠的石砌建筑令他们惊叹不已，遂将其命名为“悬崖宫”。这一发现旋即引起了国际学界对美国西南部考古学的浓厚兴趣，并最终推动该遗址于1906年获得联邦政府的立法保护。"
 lepsius.79.t: "吴哥遗迹"
 lepsius.79.d: "历经数月的不懈努力，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士及其助手们终于成功发掘出了高棉古都——吴哥的遗址。如今，这片考古遗址已可重新投入深入研究的怀抱。"
 lepsius.79.f: "“诚然，它与那些长期以来独领风骚、令我们心折不已的地中海盆地伟大经典之作，确乎大相径庭：这里不再见希腊或埃及那般庄严的列柱、那般辽阔而沉静的平面；相反，扑面而来的，是艰辛的、繁复的、饱含挣扎与悸动的形态——体量层叠堆砌，进退交错，空间宛如迷宫，低矮的廊道透入斑驳光影，塔楼参差错落，金字塔层层攀升、尖顶密如林海；装饰与雕刻纷繁至极，明与暗的变幻永不歇止——它们在不损庄严气度的同时，为整体注入无尽丰饶，又与热带地区那炽烈的光芒与葳蕤蓊郁的草木，神奇地交融共生，相得益彰。一言以蔽之：这是另一种美。”——路易·德拉波特"
 lepsius.751.t: "西查金筏"
 lepsius.751.d: "发掘出土了一件神秘而美丽的金制木筏。它已被视为已消失的穆伊斯卡文化的一件关键文物——并正在让古老的传说重新焕发生机"
 lepsius.751.f: "1856年，来自西查的华金·托瓦尔与贝尔纳迪诺·托瓦尔两兄弟将附近一处泻湖部分排干，从中发现了一只木筏。他们认为，这只木筏正是“黄金国”传说中那场仪式所用的献祭器物。该木筏随后落入外交官萨洛蒙·科佩尔之手，后者将其卖给了德国的一家博物馆——民族学博物馆。不幸的是，当它运抵德国后，竟毁于一场大火。西查金筏是穆伊斯卡文化中仅存的两只黄金木筏之一。另一只名为帕斯卡金筏，直到百年之后才重见天日。"
 lepsius.751.g: "这将是我们收藏中最棒的展品"
 lepsius.751.h: "我们没有存放它的博物馆。我们应该将其出售，以换取资金、科学援助和政治上的支持。"
 lepsius.752.d: "由于没有自己的博物馆，[SCOPE.sCountry('lepsius_raft_country').GetName]带着一件极为精美的文物找到我们。该文物出自瓜塔维塔湖畔的西查，描绘了一只金色木筏，其上装饰着排列成行、工艺繁复的人像。学者们敦促我们不惜一切代价将其购入，而政界人士则对协议条款持保留态度。"
 lepsius.752.g: "不惜一切代价，买下它！"
 lepsius.752.h: "我们不能买这个。"
 lepsius.734.t: "牛头来通杯"
 lepsius.734.d: "在克诺索斯宫殿当前的发掘工作中，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士做出了一项轰动性的发现，为围绕克里特岛及其传奇国王米诺斯的希腊神话赋予了全新的意义。"
 lepsius.734.f: "牛头来通杯由阿瑟·埃文斯爵士在克里特岛克诺索斯的“小宫殿”中发现，其年代可追溯至新宫殿时期（约公元前1550—1500年）。这件礼仪容器由一整块黑色滑石雕刻而成。它的双眼由水晶和红玉髓制成，栩栩如生；口鼻部则精细地镶嵌着白色贝壳。作为角杯，其功能是祭祀仪式中的奠酒容器：液体从颈部注入，通过鼻部的孔洞流出。它象征着权力与丰饶，体现了公牛在米诺斯宗教中的核心地位。"
 lepsius_no_artifact_export_modifier: "文物出口禁令"
 building_lepsius_needle: "克利奥帕特拉方尖碑"
 building_lepsius_obelisk: "阿克苏姆方尖碑"
 pmg_lepsius_obelisk: "方尖碑"
 pm_lepsius_obelisk: "方尖碑"
 je_lepsius_cleopatras_needle: "克利奥帕特拉方尖碑"
 je_lepsius_cleopatras_needle_reason: "数个世纪以来，矗立于亚历山大港的两座方尖碑——“克娄巴特拉方尖碑”——一直吸引着世界各国的目光。其中一座已被赠予英国，然而伦敦方面至今仍未成功将其运回。或许我们可以效仿这一先例，向埃及当局提出请求：是否能够将另一座“方尖碑”赠予我国？当然，要实现这一目标，我们必须成为埃及学领域的领军之国。"
 je_lepsius_cleopatras_needle_fail: "其他国家拥有运走克娄巴特拉方尖碑的权力。"
 je_lepsius_cleopatras_needle_transport: "克利奥帕特拉方尖碑——运输"
 je_lepsius_cleopatras_needle_transport_reason: "运输一座方尖碑，其艰难程度远超常人所想。难怪法国仅运一座，置于协和广场——而曾许诺予他们的第二座，至今仍屹立于卢克索，未曾迁移。"
 je_lepsius_cleopatras_needle_transport_success: "方尖碑一旦运抵首都，便须由考古学家进行修复与筹备，并由工程师协助将其竖立。\n\n#R 重要：#!考古学家的修复工作与工程师的重建工作，须待方尖碑运抵后方可开始。"
 je_lepsius_ishtar_gate: "伊什塔尔门"
 je_lepsius_ishtar_gate_reason: "早在1815年，克劳迪乌斯·里奇便对巴比伦遗址进行了地形测绘。即便在那个时候，他已推测这座巨大的土丘或许是一座宫殿，甚至可能就是传说中的巴别塔。这座宫殿群究竟还有多少部分留存至今，又能否从中发掘出有价值的遗存，目前尚无答案——但现代的考古调查或许能揭示这座土丘的真正面貌。当然，我们也应当确保获得许可，将这些材料带回国内。"
 je_lepsius_ishtar_gate_fail: "其他国家已发现伊什塔尔门。"
 je_lepsius_ishtar_gate_transport: "伊什塔尔门——运输"
 je_lepsius_ishtar_gate_transport_reason: "在一次对巴比伦的考察中发现了传说中的伊什塔尔门的遗迹后，我们延长了许可期限，将这些巴比伦砖块运回了我国博物馆。"
 je_lepsius_ishtar_gate_transport_success: "总共需要20万块砖，才能将城门恢复到昔日的辉煌。预计每年约有2万块砖能运抵我们这里——前提是一切顺利。只有我们继续在巴比伦尼亚进行发掘工作，新的砖块才会陆续运到。\n\n#R 注意：#! 考古学家的修复工作和工程师的重建工作，至少要等10万块砖运到之后才会开始。"
 je_lepsius_piedras_negras: "彼德拉斯内格拉斯石碑"
 je_lepsius_piedras_negras_reason: "彼德拉斯内格拉斯是危地马拉一座重要的玛雅城市，自公元前7世纪起便有人居住。它曾是一个独立的城邦，经历了文化的黄金时代——尤其是在7至9世纪期间——并拥有众多宏伟的石碑。也许我们可以为我们的博物馆征得一件尤为独特的珍品？"
 je_lepsius_piedras_negras_fail: "其他国家将彼德拉斯内格拉斯石碑运输至其博物馆。"
 je_lepsius_piedras_negras_transport: "彼德拉斯内格拉斯石碑——运输"
 je_lepsius_piedras_negras_transport_reason: "20世纪30年代，宾夕法尼亚大学博物馆在极端条件下组织了多次大规模考察，将数块重达数吨的石碑从危地马拉茂密的丛林中运送出来。由于当地没有道路，这些巨大的独块石碑不得不借助木制雪橇和木筏，在险象环生的乌苏马辛塔河上艰难穿行。"
 je_lepsius_piedras_negras_transport_success: "彼德拉斯内格拉斯石碑一旦运抵首都，便须由考古学家进行修复与筹备，并由工程师协助将其竖立。\n\n#R 重要：#!考古学家的修复工作与工程师的重建工作，须待石碑运抵后方可开始。"
 je_lepsius_axum_obelisk_transport: "阿克苏姆方尖碑——运输"
 je_lepsius_axum_obelisk_transport_reason: "从历史角度看，1937年将方尖碑从阿克苏姆运至罗马并重新竖立，是一项浩大的工程。当时，人们通过在石碑内部置入金属杆来将其固定并竖立。"
 je_lepsius_axum_obelisk_transport_success: "方尖碑一旦运抵首都，便须由考古学家进行修复与筹备，并由工程师协助将其竖立。\n\n#R 重要：#!考古学家的修复工作与工程师的重建工作，须待方尖碑运抵后方可开始。"
