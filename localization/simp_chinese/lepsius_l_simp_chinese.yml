 lepsius.81.t: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastNameNoFormatting]使用现代发掘方法"
 lepsius.81.d: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士在史前洞穴中发现了许多人类骨骼化石。但不同于其他人类学家，[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe]细致记录了化石的各种情况而非直接带走。"
 lepsius.81.f: "每块骨头都被记录在它被发现的确切位置。图纸上的网格有助于跟踪每块骨头、文物甚至木炭。一切寒冷的事物都暗示着史前人类的饮食、工作或生活方式。每个细节都很重要。"
 lepsius.81.g: "我们不再是盗墓者啦！"
