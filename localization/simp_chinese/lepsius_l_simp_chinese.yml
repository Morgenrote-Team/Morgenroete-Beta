 je_lepsius_priams_treasure_reason: "海因里希·施里曼正为普里阿摩斯的传奇财宝寻找安身之所，他自称在特洛伊发现了这些财宝。虽然严肃的学者们怀疑这些功绩是否真的符合施里曼所提出的年代，但这无关紧要。毕竟，这是拥有本世纪最伟大的考古学宝藏之一的独特机会。我们的博物馆将是绝佳场所。"
 je_lepsius_priams_treasure_fail: "如果我们的竞争者抢先一步实现了施里曼的愿望，我们就会失去获得普里阿摩斯宝藏的独特机会。"
