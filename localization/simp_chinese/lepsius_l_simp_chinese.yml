 je_lepsius_excavation_harappa: "哈拉帕的发掘"
 je_lepsius_excavation_harappa_reason: "#T 叙利亚的巴尔米拉遗址对考古学家来说是一个令人着迷的地方。#!\n$mr_divider_for_je$\n每个月你都会根据许多不同的因素获得进展。在发掘的某些阶段，你会经历一个事件，让你获得[Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]、经验和改变省份特质，从而获得更多的[concept_curtiss_tourism]收入。\n$mr_divider_for_je$\n$lepsius_excavation_progress_loc$"
 je_lepsius_excavation_harappa_0_loc: "遗址大部分仍保持着几个世纪以来的原貌。"
 je_lepsius_excavation_harappa_1_loc: "最近对哈拉帕的发掘和修复吸引了更多的人前来参观这一古迹。"
 je_lepsius_excavation_harappa_2_loc: "我们的考古学家发掘并修复了贝尔神庙、塔墓谷及其塔墓等多座神庙，现在游客越来越多。"
 lepsius.5020.t: "哈拉帕遗址"
 lepsius.5020.d: "我们对哈拉帕遗址了解不多，但我们的考古学家渴望发掘这座古城的奥秘。"
 lepsius.5020.f: "截至目前，尚不清楚该遗址在这漫长岁月里经受过多少破坏。不过，我们的考古团队已经对它进行充分探测，挖掘工作将在不久后有序开展，很快就能知道哪处地方最具备考古价值。"
 lepsius.5020.g: "对印度具有重大意义的地点"
 lepsius.5021.t: "一座网格城市"
 lepsius.5021.d: "这次挖掘发现了一个网格状的城市遗址。其规模之大，我们无从得知曾经究竟有多少人居住于此。"
 lepsius.5021.f: "“这真是令人着迷，除了美索不达米亚和埃及，竟然还存在其他的文明起源地。我从未想过印度会是世界上最大的青铜城市之一。”——你的其中一位考古学家"
 lepsius.5021.g: "新的文明摇篮"
 lepsius.5022.t: "哈拉帕的城墙"
 lepsius.5022.d: "我们的考古学家发掘了一个现在称之为城堡的建筑。目前尚不清楚哈拉帕人为何要在他们的城市中修建防御工事。"
 lepsius.5022.f: "“我敢肯定，他们绝对是害怕海民的入侵！”\n“海民只在地中海活动，不可能出现在这里。我觉得是为了防备那些讨厌的农民来抢粮食。”\n“不对，不对。这应该是为他们所信仰的神灵而建造的坚固神庙！”"
 lepsius.5022.g: "有意思！"
 lepsius.5023.t: "哈拉帕的排水系统"
 lepsius.5023.d: "我们找到了一个复杂的废水处理系统，看起来甚至有厕所与它相连通。"
 lepsius.5023.f: "“我现在用的厕所，甚至还不如哈拉帕人那样的现代化！他们的文明一定非常先进！”"
 lepsius.5023.g: "而当下的我们，却仍在因废水问题而争执不断……"
 je_lepsius_petra: "佩特拉古城——纳巴泰人的遗产"
 je_lepsius_petra_reason: "大约在1800年，少数学者知道中东有一座岩石凿成的传奇城市，但直到1812年，瑞士的阿拉伯冒险家约翰·路德维希·伯克哈特才重新发现了佩特拉，尽管后来有许多旅行者到访过该古城，但对佩特拉古城的详细考古研究仍有待进行。"
 lepsius.77.t: "纳巴泰人的遗产"
 lepsius.77.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士首次认真对佩特拉古城进行了考古调查，并找到了过去的遗迹，真是一项鼓舞人心的科学行动！"
 lepsius.77.f: "佩特拉古城位于今约旦境内，是古代纳巴泰帝国的首都，古城内的墓葬神庙外墙是直接从岩石上雕刻而成的，因此它被视为独一无二的文化古迹。这座城市的历史与纳巴泰帝国的历史密切相关，然而除了一些碑文之外，纳巴泰人几乎没有留下任何存在痕迹。因此人们只能通过《圣经》、希腊和罗马的资料，零碎且间接地了解他们和佩特拉古城的历史。佩特拉最有名的建筑是高近40米、宽25米的希腊风格的卡兹尼神殿，贝都因人称之为“法老的宝库”，它可能是为公元前1世纪在位的纳巴泰国王阿勒塔斯四世建造的。然而其他研究人员只能将阿勒塔斯王朝的历史追溯到公元2世纪，即哈德良皇帝时期。"
 lepsius.77.g: "这里还可以藏匿基督教神奇物品。"
