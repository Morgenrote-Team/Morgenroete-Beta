 andersson_anthropologist_desc: "人类学家对于研究最早的人类历史很有用，从非洲的进化到石器时代的人类。"
 andersson_anthropologist_experienced_desc: "这位人类学家在早期人类领域取得了一些成就，被视为学术界的典范。"
 andersson_anthropologist_famous_desc: "这位研究人员对人类学的众多贡献使他成为该领域最重要的国际人物之一。"
 andersson_state_trait_neanderthalensis_cave: "史前洞穴"
 andersson_state_trait_erectus_cave: "史前洞穴"
 andersson_state_trait_paranthropus_cave: "史前洞穴"
 andersson_anthropology_tech: "人类学"
 andersson_anthropology_tech_desc: "古人类学是古生物学与人类学的交叉学科，试图通过重建人类科内的亲缘关系以研究解剖学意义上的现代人的早期发展，即人类化过程。古人类学的研究基于生物学证据（如石化的骨骼遗骸、骨骼碎片、足迹）和文化证据（如石器、文物和居住地）。"
 lepsius.2105.t: "希尔德斯海姆宝藏"
 lepsius.2105.d: "考古学家在希尔德斯海姆发掘出一批数量可观的银器。令人惊讶的是，其中竟包含多件珍贵的罗马文物！"
 lepsius.2105.f: "1868年10月17日，普鲁士士兵在加尔根山附近发现了希尔德斯海姆宝藏，这至今仍是帝国边境以外最重要的罗马银器工艺发现之一。这批藏品包括约70件精美银器，其中最具代表性的是密涅瓦碗，其年代主要可追溯至公元1世纪。这批藏品是奥古斯都时代工艺的杰作，但被发现时引发了激烈的民族主义与学术争论。早期解读常将该宝藏与条顿堡森林战役（公元9年）相联系，推测其为罗马将军瓦卢斯遗落的行李。来的学者则认为，它更可能是一份外交礼物，或是某位高级军官随身携带的行旅用具。"
 lepsius.2105.g: "日耳曼尼亚腹地竟有罗马银币？"
 lepsius.2115.t: "奥克瑟斯宝藏"
 lepsius.2115.d: "在奥克苏斯河畔，考古学家发现了一批惊人的黄金文物，展现了古波斯帝国的辉煌。"
 lepsius.2115.f: "奥克瑟斯宝藏是迄今为止发现最重要的波斯阿契美尼德王朝金器。该宝藏于1877年左右在奥克瑟斯河（今塔吉克斯坦境内）附近被发现，包含约180件金银器以及200多枚钱币。这批文物展现了波斯、斯基泰和希腊艺术风格的非凡融合。其中最引人注目的是著名的微型金制战车、饰有翼狮鹫的精美臂环，以及大量描绘祭司与武士的祭祀浮雕牌。这宗珍宝曾由一名英国军官从盗匪手中救出，随后被送往大英博物馆。作为了解阿契美尼德帝国财富与艺术造诣的原始资料，奥克瑟斯宝藏反映了古代波斯世界广阔的贸易网络与文化交融。它的发现为学者们提供了首个关于该帝国传奇般富庶的重要实物证据。"
 lepsius.2115.g: "这些精美的作品值得在博物馆里拥有自己的展厅！"
 lepsius.2135.t: "索奇皮利雕像"
 lepsius.2135.d: "当地人在火山岩中发现了一尊古老雕像。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士欣喜若狂——这可能是阿兹特克帝国保存最完好的雕像！"
 lepsius.2135.f: "这尊用安山岩岩雕刻而成的男性坐像，于19世纪80年代在波波卡特佩特火山山坡上被发现，旋即引发了人们对阿兹特克文明的诸多猜测。雕像刻画了一位男子以庄严的仪式性盘腿占地姿势端坐于一座装饰繁复的基座之上。人物全身及宝座均布满了精雕细琢的浮雕，图案为风格化的花卉与蝴蝶，与墨西哥高原地区的致幻植物极为相似。头部微微后仰，双目圆睁、嘴角微启，仿佛处于狂喜的恍惚状态或与神灵对话之中。其面具般的面部特征以及花卉纹饰——包括牵牛花和烟草的描绘——使研究者们将其认定为“花之王子”，即掌管舞蹈、歌唱与神圣梦境的阿兹特克神祇休奇皮里。"
 lepsius.2135.g: "这座雕像既阴森又令人不安，同时又充满魅力。"
 lepsius.2145.t: "克斯尔埃塞夫胸甲"
 lepsius.2145.d: "考古学家在古迦太基附近的发掘过程中有了惊人发现。"
 lepsius.2145.f: "克斯尔埃塞夫胸甲是一件古代盔甲，于1909年在突尼斯克斯尔埃塞夫附近的一座迦太基墓葬中被发现。这副青铜胸甲以其独特的解剖学造型和华丽雕刻为特征，是公元前3世纪南意大利或坎帕尼亚工艺的杰作。胸甲上刻有迦太基女神塔尼特、格里芬和花卉图案，象征保护与地位。它与第二次布匿战争有关，许多学者认为它曾属于汉尼拔军队中的一位高级军官，可能是在意大利战役期间获得的。"
 lepsius.2145.g: "在布匿地区竟有一套古老的意大利盔甲！"
 lepsius.2155.t: "古恩德斯特鲁普大锅"
 lepsius.2155.d: "在日德兰半岛的希默尔兰，考古学家意外发现了一件精美的凯尔特文物。"
 lepsius.2155.f: "1891年在丹麦泥炭沼泽中出土的古恩德斯特鲁普大锅，是目前已知最大的铁器时代银器。该容器由数块最初镀银的银板组成，表面饰有高浮雕的复杂神话叙事场景。其发现震惊了考古学界，因为它在远离凯尔特核心地区的北方出土。这口大锅很可能是在多瑙河下游地区（今罗马尼亚或保加利亚）由色雷斯银匠为凯尔特客户制作。在19世纪末至20世纪初，它成为理解古代欧洲宗教习俗以及横跨巴尔干半岛至北海相互贸易网络的重要线索。"
 lepsius.2155.g: "现在还能用它煮汤吗？"
 lepsius.2185.t: "安提基西拉机械装置"
 lepsius.2185.d: "海绵潜水员在安提基特拉海岸附近发现了一艘沉船。这艘罗马时代的船只不仅包含具有考古意义的文物，还发现了一件彻底颠覆我们对希腊化时代认知的装置。"
 lepsius.2185.f: "安提基西拉机械装置被历史学家和科学家广泛认为是已知最早的模拟计算机实例。其历史可追溯至公元前2世纪或公元前1世纪早期，而它展现的复杂程度，西方世界在之后的1500年里都未能企及。该机械原本由至少30个青铜齿轮构成，装在一个大约座钟大小的木箱中。它通过手摇曲柄操作，并带有多个刻有希腊铭文的刻度盘。关于该装置的起源，学术界至今仍争论不休。尽管其确切的制造者尚不清楚，但仍有多种假说流传，其中甚至有观点认为它与叙拉古的阿基米德有关。"
 lepsius.2185.g: "指南针？天文仪器？时间机器？"
 lepsius.2205.t: "铜奔马"
 lepsius.2205.d: "我们的研究人员在前帝国北部边境地区发现了汉朝时期最杰出的人物之一。"
 lepsius.2205.f: "铜奔马，又称“马踏飞燕”，是东汉时期（公元25-220年）的一件标志性青铜雕塑。它于1969年在雷台一座将军墓中被发现，代表了中国古代青铜铸造工艺的巅峰。这件文物描绘了一匹健壮的“天马”——传说中的大宛马——正在全速奔驰。雕塑在平衡与动态表现上堪称杰作，骏马仅凭一蹄踏在一只飞燕之上，暗示其速度甚至超越了最迅捷的飞鸟。在最初的研究中，这件作品被誉为丝绸之路的象征，体现了推动中国对外扩张的军事力量与文化交流。"
 lepsius.2205.g: "它比任何鸟类都更快、更优雅！"
 lepsius.2215.t: "新罗金冠"
 lepsius.2215.d: "在新罗王国的古都庆州，考古学家们发掘并开启了王陵，他们在那里的发现轰动了学术界！"
 lepsius.2215.f: "新罗金冠是古朝鲜历史中最壮观的宝藏之一，主要出土于庆州的皇家陵墓。尽管关于黄金遗物的传说已流传数个世纪，但首次科学突破发生在1921年，当时在施工过程中意外发现了金冠冢。这些金冠由高纯度黄金制成，饰有曲玉（勾形玉珠），其直立树形结构与鹿角图案尤为突出。20世纪早期，考古学家和历史学家将这些设计解读为萨满式王权的象征，暗示其与西伯利亚及中亚草原民族存在文化关联。"
 lepsius.2215.g: "这些王冠理应在下一届展览中占据显要位置。"
 lepsius.2225.t: "埴轮武士"
 lepsius.2225.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士今天展示了一件精美的文物。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U]本人称之为[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]职业生涯的“考古学巅峰成就”。这件作品已经被视为大和时期艺术的杰出典范。"
 lepsius.2225.f: "埴轮武士是指日本古坟时代的标志性陶俑。这些陶俑被安放在大型坟丘之上，用以守护逝者并界定墓葬的神圣空间。最著名的发现发生在1924年，地点位于群马县大泉町。这尊保存极为完好的“景行天皇铠甲武士”埴轮，罕见地以三维形式展现了6世纪的军事装备，包括札甲和传统长弓。这件如今被视为国宝的文物，为历史学家深入了解大和政权初期的军事发展提供了重要线索。在浪漫主义者眼中，这位武士仿佛是武士阶层的“曾祖父”。"
 lepsius.2225.g: "日本的过去不再深埋于黑暗之中！"
 lepsius.2235.t: "祭司王"
 lepsius.2235.d: "考古队在对印度河流域文明的考察中取得了迄今为止最重要的发现：一尊处于冥想姿态的未知男子小雕像。它已被视为青铜时代最具意义的文物之一。"
 lepsius.2235.f: "1925至1926年间，在摩亨佐‑达罗的发掘过程中，发现了一尊用滑石雕刻的小型坐姿男性雕像，这一发现迅速成为学者们探讨哈拉帕文明政治与宗教结构的焦点。这尊残缺的雕像尽管只有17.5厘米高，却展现出惊人的雕刻细节：描绘了一位留着精心修剪胡须的男子，双眼半闭，仿佛陷入沉思或冥想。他身披一件从一侧肩膀垂下的带花纹披肩，上面装饰的三叶草图案与同时期美索不达米亚和埃及的宗教符号惊人相似。头戴的环形发带和臂环暗示其拥有显著的社会或宗教地位，因此当时的考古学家将其命名为“祭司王”。"
 lepsius.2235.g: "失落帝国的面孔"
 lepsius.2245.t: "卧姿毗湿奴"
 lepsius.2245.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士宣布，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]找到了整个东南亚所能提供的最宏伟的青铜佛像。然而，这实际上是一尊毗湿奴像，但[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]在兴奋中并未意识到这一点。"
 lepsius.2245.f: "西梅奔寺的卧姿毗湿奴是一尊11世纪高棉帝国的巨型青铜雕塑，发现于柬埔寨吴哥的西池水库中。雕像表现的是毗湿奴以安纳塔萨延姿势躺卧于宇宙海洋中的神蛇舍沙之上，是巴普昂风格的杰作。其重要性体现在规模与象征意义上。作为东南亚最大的古代青铜雕像之一，它展现了高棉人卓越的冶金技艺。在宗教层面，将其置于巨大人工湖中心的设计，使水库成为印度教原始宇宙海洋的物质再现，从而巩固了国王的神圣权威。自1936年起，雕像碎片被陆续发现，现存的躯干与头部已成为柬埔寨国家博物馆的标志性珍宝。"
 lepsius.2245.g: "佛陀还是毗湿奴？谁在乎呢，它就该待在博物馆里！"
 lepsius.2255.t: "阿克苏姆方尖碑"
 lepsius.2255.d: "最近，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士一直在深入研究所谓的阿克苏姆方尖碑。在[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]看来，它确实是一座用于标记墓地的石碑，并认为是古代阿克苏姆王国最宏伟的文物之一。"
 lepsius.2255.f: "阿克苏姆方尖碑（亦称石碑2号）是一座高24米的花岗岩独石，建于公元4世纪，堪称当今埃塞俄比亚境内阿克苏姆帝国工艺水平的巅峰之作。石碑上饰有精美的“假门”和“假窗”，仿若一座多层建筑，曾用作贵族的陵墓。这座纪念碑因其近代的传奇经历而闻名于世：1937年，在贝尼托·墨索里尼的命令下，它被作为战利品运往罗马。历经数十年的外交斡旋，方尖碑终于在2005年分三段运回埃塞俄比"
 lepsius.2255.g: "我们祖先的自豪象征！"
 lepsius.2255.h: "将方尖碑运送到[ROOT.GetCountry.GetCapital.GetCityHubName]！"
 lepsius.2265.t: "莫尔登铜板"
 lepsius.2265.d: "在密西西比文化核心区域之一的挖掘过程中，考古学家有了惊人发现——一件件精美的铜器在数百年后重见天日。"
 lepsius.2265.f: "莫尔登铜板由八块浮雕铜板组成，于1906年由雷·格鲁明在密苏里州莫尔登发现。这些非凡的文物属于密西西比文化（约公元1200‑1400年），发现时埋藏在一片田野中，可能是为了安全保管或作为祭祀用品而隐藏起来的。这些铜板是美洲金属工艺的杰作，展现了东南仪式复合体的复杂图像，其中最突出的图案是“猎鹰舞者”——一个兼具人形与鸟类特征、长有双翼并身着仪式礼服的拟人化形象，象征着一位强大的超自然存在或经历萨满式转化的祭司。"
 lepsius.2265.g: "美洲在被文明化之前就已经有文明了吗？"
 lepsius.2275.t: "金巴亚珍宝"
 lepsius.2275.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士发现了据信是哥伦比亚迄今最大的黄金宝藏。在挖掘过程中出土了数百件文物。看来[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]偶然发现了一个失落文明的完整宝藏。"
 lepsius.2275.f: "金巴亚珍宝是一组举世闻名的美洲黄金及金银铜合金制品，由现代哥伦比亚境内的金巴亚文明制作。这些文物主要铸造于公元4至10世纪，于1890年在菲兰迪亚附近出土。这套藏品约含122件器物，包括首饰、人偶以及被称为“波波罗”（石灰容器）的仪式器皿。这些制品展现出对失蜡铸造法的炉火纯青的掌握，其特点为表面光滑圆润，人物造型精致且高度风格化。1893年，哥伦比亚政府将这批珍宝赠予西班牙的摄政王后玛丽亚·克里斯蒂娜。"
 lepsius.2275.g: "我从没见过这么多黄金！"
 lepsius.2201.t: "汉墓壁画"
 lepsius.2201.d: "汉朝高官墓葬的发掘为我们揭示了久远时代的日常生活与作息规律。"
 lepsius.2201.f: "尽管许多汉族文物早已为人所知，但20世纪初汉墓壁画的发现揭示了自公元2世纪以来被封存的宏大壁画系列。这些壁画描绘了生动的日常生活场景：盛大的宴会、杂技表演以及喧闹的车马行列。它们证明，早在唐代之前，汉族人就已经发展出了成熟的透视与叙事绘画技法。那些鲜艳的红色、赭色和黑色颜料仍是中国早期绘画艺术中保存最完好的典范之一。"
 lepsius.2201.g: "迄今为止，我们对汉朝社会的了解仍显不足。"
 lepsius.2202.t: "汉代漆器"
 lepsius.2202.d: "考古学家在最新发现中出土了大量漆器。"
 lepsius.2202.f: "虽然漆器的使用已有数千年历史，但直到汉代（公元前206年‑公元220年），其生产才发展成为由国家严格管控的大规模产业。20世纪初的重大考古发现，尤其在乐浪（今朝鲜境内）等北方前哨据点出土的器物揭示了这些漆器惊人的耐用性和艺术造诣。在汉朝宫廷中，漆器的价值远超青铜器，因其耐热、防潮、防腐的特性而备受推崇。这些器物种类繁多，从酒杯、化妆盒到华丽的棺椁，无不以鲜明的红黑配色为基调，饰以流畅如云的卷曲纹样和神话中的瑞兽图案。"
 lepsius.2202.g: "为下一次展览准备更多文物。"
 lepsius.2203.t: "汉陶俑"
 lepsius.2203.d: "在一次发掘中出土了大量随葬品。数量众多的陶瓷制品表明死者极为富有。小雕像和微型房屋尤其引起了考古队的注意。"
 lepsius.2203.f: "汉代陶俑，即“明器”，种类繁多，从宫廷舞者、步兵，到极为精细的房屋、粮仓和望楼等微型模型，应有尽有。对于同时代的考古学家而言，这些建筑模型弥足珍贵，因为它们是迄今仅存的汉代木构建筑实例，而真实的汉代木结构早已不复存在。这些陶俑与模型被视为汉代世界的完整缩影，旨在为逝者在冥界提供一座功能齐备的庄园——内设牲畜、厨房与娱乐设施等，以供其来世享用。"
 lepsius.2203.g: "你能用这个建造一个长安模型城市吗？"
 lepsius.2204.t: "汉代青铜技艺"
 lepsius.2204.d: "在最近的一次发掘中，考古学家出土了一批汉代青铜器。研究人员对一件装饰精美的鼎尤为着迷。"
 lepsius.2204.f: "19世纪末20世纪初，汉代青铜器窖藏的发现揭示了一个在礼仪与日常生活中均将冶金技艺臻于完美的文明。这些常出土于华北及甘肃等边陲地区的窖藏，包含大量精巧的香炉、铜镜及成套器皿，它们已在地下隐藏了两千年之久。这些发现中最具标志性的当属博山炉——一种形似云雾缭绕神山的青铜熏炉。对于当时的学者而言，汉墓中出土的巨型铜灯和酒樽（壶）证明，即使在铁器普及后，青铜器仍是高贵身份的象征。"
 lepsius.2204.g: "我们博物馆的精彩新藏品。"
 lepsius.2211.t: "新罗池塘文物"
 lepsius.2211.d: "在抽干了统一新罗王国时期一座古老宫殿附近的池塘后，考古学家在淤泥中发现了大量那个时代的文物。"
 lepsius.2211.f: "与墓葬中发现的庄严肃穆的祭品不同，从池塘淤泥中打捞出的物品大多是宫殿日常生活与盛大节庆的遗存。其中最引人注目的发现包括鎏金铜佛像、精美的瓦当，以及王室宴会上使用的独特木质游戏骰子。这些文物展现了极度奢华与艺术精湛的生活方式，反映了新罗作为丝绸之路重要终端的地位，其美学风格深受唐朝中国乃至遥远波斯的影响。"
 lepsius.2211.g: "黄金时代的余晖。"
 lepsius.2212.t: "新罗钱币窖藏"
 lepsius.2212.d: "考古学家在韩国一处城市几乎偶然地发现了一大批钱币。这些钱币主要来自统一新罗王国的临国——大唐。"
 lepsius.2212.f: "古朝鲜通常以货物进行贸易，其中纺织品和谷物尤为关键，此外刀币也曾广泛流通。不过外国钱币仍频繁见于记载。特别是中国，作为新罗王国强大的邻邦，其货币体系对周边国家产生了深远影响，尤其是自汉代开始铸造的五铢钱。随后是唐代的开元通宝。作为丝绸之路的一部分，大量中国钱币通过国际贸易传入朝鲜。"
 lepsius.2212.g: "无论是朝鲜的还是中国的……这些银币都归我们了。"
 lepsius.2213.t: "新罗木版画"
 lepsius.2213.d: "在一座佛塔附近的考古发掘中，研究人员发现了多份佛教典籍。这些典籍出自新罗时期，采用木版印刷术刊印而成。"
 lepsius.2213.f: "这些文献证明新罗王国在8世纪已掌握木版印刷技术，从而为大规模印刷提供了理论可能。因此，对研究者而言，这些不仅是珍贵的宗教文本，更是此前未曾预料到的技术先进社会证据。"
 lepsius.2213.g: "真迷人！"
 lepsius.2214.t: "石窟庵"
 lepsius.2214.d: "邮递员向考古研究所报告了古都庆州附近一项惊人的发现，这一发现为新罗时代的研究带来了全新的视角。"
 lepsius.2214.f: "作为佛国寺建筑群一部分的石窟庵，是一座规模宏大的隐修道场。1909年，一位当地邮递员在躲避暴风雨时偶然重新发现了它。石窟庵坐落于庆州吐含山，是一座人工开凿的花岗岩洞窟，建于统一新罗时期的8世纪。长期以来，它逐渐湮没无闻，部分坍塌，被泥土和碎石掩埋了数百年之久。如今，石窟庵被誉为东方佛教艺术的杰作，其中供奉着一尊安详肃穆、体量巨大的释迦牟尼佛像，四周环绕着精雕细琢的浮雕，描绘着诸天神将、护法神众与佛陀弟子。20世纪初，这一发现成为殖民时期考古学研究的焦点。当时的学者与工程师对石窟庵精巧的建筑设计赞叹不已：其独特的穹顶结构能够有效调节洞内的温度与湿度。"
 lepsius.2214.g: "新罗时期的一颗宝石。"
 lepsius.2221.t: "埴轮"
 lepsius.2221.d: "近期的考古发掘中，出土了大量曾守护于墓道入口的陶制人偶。这些粘土人偶质地极其脆弱。"
 lepsius.2221.f: "埴轮，是古坟（大和）时代独有的无釉陶塑，专为置于大型坟冢之上或四周而作。这些陶土哨兵，被视为守护神圣墓域边界的屏障。埴轮兴起于公元3至6世纪，从简朴的筒形陶罐，逐渐演化为承载死者社会与物质世界图景的繁复造型。它们是日本考古学界最早进行科学分类的文物之一。"
 lepsius.2221.g: "昔日，它们守护墓葬；今朝，它们装点馆堂。"
 lepsius.2222.t: "勾玉"
 lepsius.2222.d: "我们的考古团队已发现大量可追溯至大和时代的小型玉制勾玉。"
 lepsius.2222.f: "勾玉，一种弯曲如豆、形似逗号的珠饰，是日本大和（古坟）时代最具标识度的特征之一。这些饰物多用翡翠、碧玉、软玉或红玉髓等美石雕琢而成，既被奉为精英阶层的身份徽征，亦被视为拥有护佑之力的宗教灵物。勾玉在前方后圆坟中的现身，极大地激发了学术界对日本文化起源的探寻热忱。彼时的学者们注意到，这些珠饰与朝鲜半岛新罗、伽倻诸国遗址中出土的同类器物，竟有着令人惊叹的相似之处。除却美学层面的价值，勾玉在日本民族意识中更占据着一方神圣之地——作为皇室三神器的组成部分之一，从古遗址中发掘出勾玉常常被视为与大和政权的神圣血统重新建立深刻联系的重要佐证。"
 lepsius.2222.g: "我也来一个？"
 lepsius.2223.t: "大和时代的盔甲与武器"
 lepsius.2223.d: "我们的考古学家怀疑他们发现了一处古战场。出土文物中包括大和时代的刀剑与盔甲，其中一件武士的盔甲——短甲——保存得尤为完好。"
 lepsius.2223.f: "大和时代是一个军事整合与扩张极为激烈的时期，其显著特征在于铁器技术的广泛采用。大和时代的考古发掘出土了大量军事装备，包括直刀、箭镞以及工艺精密的板甲。这一时期主要有两种类型的盔甲：其一是短甲，一种由铆接铁板锻造而成的坚固胸甲；其二是挂甲，一种更为灵活、专为骑马作战设计的片甲。"
 lepsius.2223.g: "日本拥有悠久的军事历史。"
 lepsius.2224.t: "大和铜镜"
 lepsius.2224.d: "考古学家发现了大量随葬品，其中铜镜作为辉煌的大和时代的遗物尤为引人注目。"
 lepsius.2224.f: "铜镜，或称神兽镜，是大和时代古坟出土文物中精神意义最为深远的器物之一。这些镜子常被放置于逝者头部或胸部附近，被尊奉为能够反射并捕捉光线——一种与神权及天照大神相关的神圣属性——的仪式用圣物。日本发现的许多铜镜被鉴定为从曹魏进口的“神兽镜”，另有一些则是日本本土仿制品，称为“仿制镜”。对明治及大正时代的历史学家而言，这些铜镜的分布构成了古代日本的政治版图——在相距遥远的不同墓葬中发现形制相同的铜镜，表明大和朝廷曾将这些珍贵器物作为统一政治联盟的象征，分发给各地的氏族首领。"
 lepsius.2224.g: "这映照着日本的过去。"
 lepsius.2231.t: "印度河陶器"
 lepsius.2231.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士今日宣布，在印度河流域发现了一大批陶器文物。"
 lepsius.2231.f: "四千多年前，印度河文明（哈拉帕文明）的制陶工匠已在使用高度发达的快轮制陶技术。尤为引人注目的是所谓的“红底黑纹陶”：器物表面施有一层深红色陶衣，再以细腻的黑色颜料绘制纹饰。这些纹饰要么是严格的几何图案，要么描绘了次大陆丰富的动植物群——从孔雀到标志性的菩提树叶，不一而足。大量耐久的此类陶器为印度河流域的城市化提供了关键证据，证明在该次大陆有记载的历史开始之前，一个复杂而标准化的社会已然繁荣存在。"
 lepsius.2231.g: "现在，是将这些碎片拼合起来的时候了。"
 lepsius.2232.t: "印度河珠饰"
 lepsius.2232.d: "由[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士率领的考古团队今日在一处古老的印度河聚落中获得了一项重要发现，证实了哈拉帕文明的工艺水平。"
 lepsius.2232.f: "精美珠宝与珠饰工艺品的出土，为印度河文明的巨大财富和专业化工艺传统提供了最有力的证据之一。这些饰品由多种材料制成，包括金、银、青金石、绿松石以及各种陶质制品。然而，真正体现哈拉帕工艺技术巅峰的，是长条形红玉髓珠的生产。考古学家们对这些坚硬石材被钻孔并蚀刻出精细白色碱纹图案的精度感到惊叹——这一工艺需要高度专业化的窑炉和铜合金钻头。除了美学价值之外，这些珠宝发现还为青铜时代广泛的海陆贸易网络提供了重要线索。在美索不达米亚各城邦的王室墓葬中发现的、明确无误的哈拉帕珠饰风格，进一步证实了南亚次大陆作为奢侈品主要出口地区的角色"
 lepsius.2232.g: "古代文明的贸易网络四通八达！"
 lepsius.2233.t: "印度河古文字"
 lepsius.2233.d: "考古学家在一处疑似印度河文明仓库的遗址中发现了数枚刻有文字的印章。然而，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士至今未能破译这些文字。"
 lepsius.2233.f: "小型方形滑石印章的出土，至今仍是印度河文明考古发掘中最具神秘色彩的谜团。这些印章通常以阴刻技法雕琢着精美的动物形象——最著名的当属“独角兽”公牛、大象与犀牛——其上方则刻有一系列被称为“印度河文字”的标准化符号。印章在仓库区的大量现身，暗示着它们很可能用作所有权或权威的官方标识，用于在准备运往本地及远方市场的货物所附的粘土标签上钤印。刻文的简短性与重复性特征，使学者们倾向于认为，这套文字很可能用于记录名称、头衔或行政账目符号，而非长篇叙事。尽管经历了极为严谨的语言学解析，其所承载的语言，至今仍深陷于学界激烈的论辩迷雾之中。"
 lepsius.2233.g: "文字与语言，或将永远成为后世难解的谜题。"
 lepsius.2234.t: "印度河与美索不达米亚的联系"
 lepsius.2234.d: "农民们向考古研究所报告称，在哈拉帕文明的疑似区域内发现了古代建筑遗迹。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士闻讯前往，并在那里有了一项惊人发现——美索不达米亚的圆柱印章！"
 lepsius.2234.f: "在哈拉帕与摩亨佐达罗的废墟之中，出土了一批特征鲜明的近东文物，这为印度河流域与美索不达米亚文明之间的直接联系，提供了首个确凿无疑的考古证据。其中最为重要的发现，当属那批圆柱形印章——它们与印度河流域本土常见的方形平印，形成了截然不同的对照。这些舶来品多取材于赤铁矿或青金石等石材，其上镌刻着阿卡德与苏美尔城邦所特有的叙事场景与神话图像。除印章之外，考古学家还辨识出数类特定的奢侈品器物，其中包括“波斯湾”风格的陶器残片，以及某些源自西方的铸造青铜兵器。"
 lepsius.2234.g: "美索不达米亚的文物？在这里？我们竟然连一支考察队都无需派出？"
