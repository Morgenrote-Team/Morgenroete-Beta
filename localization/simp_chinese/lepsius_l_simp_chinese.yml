 lepsius.1502_peking_d: "\n与爪哇猿人化石一同发现的北京猿人化石同是直立人化石，大大强化了人类最初来自亚洲的理论。据说这些骨骼已有40万至78万年的历史。"
 lepsius_state_trait_heidelbergensis_cave: "史前洞穴"
 lepsius.1326.t: "海德堡人完成"
 lepsius.1326.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName]已经收集了足够多的骨骼，可以对这个已经灭绝的物种得出具体的结论。海德堡人不再是科学界的一个谜，现在可以在一定程度上确定其在人类进化谱中的位置，不过还有许多问题没有得到解答。"
 lepsius.1326.f: "海德堡人下颌骨于1907年由工人丹尼尔·哈特曼在海德堡附近毛尔村的砂矿中发现，并于1908年由解剖学家奥托·肖滕萨克完成科学描述。这件距今约60万年的化石标本被认定为欧洲最古老的早期人类遗存，其形态特征介于直立人与智人之间。该发现不仅证实了此类人科成员在非洲、欧洲和亚洲的广泛分布，更因其粗壮的下颌结构和推测的脑容量，为研究古人类的生理适应性进化、工具使用行为及社会组织形态提供了重要实证依据。"
 lepsius.1336.t: "海德堡人"
 lepsius.1336.d: "一名工人在海德堡附近的小镇的毛尔矿区有重大发现。海德堡大学的教授立即意识到其价值。"
 lepsius.1336.f: "海德堡人下颌骨于1907年由工人丹尼尔·哈特曼在海德堡附近毛尔村的砂矿中发现，并于1908年由解剖学家奥托·肖滕萨克完成科学描述。这件距今约60万年的化石标本被认定为欧洲最古老的早期人类遗存，其形态特征介于直立人与智人之间。该发现不仅证实了此类人科成员在非洲、欧洲和亚洲的广泛分布，更因其粗壮的下颌结构和推测的脑容量，为研究古人类的生理适应性进化、工具使用行为及社会组织形态提供了重要实证依据。"
