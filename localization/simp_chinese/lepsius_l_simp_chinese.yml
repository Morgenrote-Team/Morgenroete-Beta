 lepsius.1601.t: "[SCOPE.sCharacter('lepsius_donator_scope').GetLastName]的捐赠"
 lepsius.1601.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName]被视为埃及珍品的收藏家。对埃及学的兴趣使他如今拥有了非凡的收藏。他慷慨地表示愿意将这些精美的文物捐赠给考古博物馆。"
 lepsius.1602.d: "众所周知，[SCOPE.sCharacter('lepsius_donator_scope').GetFullName]可能拥有最令人印象深刻的美索不达米亚文物私人收藏。他已经向政府示意可以将这些藏品转交给国家，不过一些持批评态度的观察家警告说，他可能会要求一些回报。"
 lepsius.1603.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName]可能算不上是最狂热的艺术爱好者，但他有幸在自己的庄园里发现了一些价值连城的考古珍宝，这些文物已经被他锁在家里好几年了。由于无法对其进行进一步的处理，他向政府提出将它们捐赠给考古博物馆。"
 lepsius.1604.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName]近年来多次游历南美洲，收集了中美洲和安第斯文化的重要遗物作为纪念品。现在，他宣布要将这些文物捐赠给博物馆。"
 lepsius.1605.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName]对古爱琴文化印象深刻。几年来，他一直在收集克里特岛的文物，甚至将一整块米诺斯壁画带到了自己的别墅。然而，他深知自己的社会责任，决定将自己的珍宝捐献给[ROOT.GetCountry.GetAdjectiveNoFlag]人民。"
 lepsius.1601.f: "许多考古藏品可以追溯到文艺复兴时期的王公贵族，他们收集古代艺术品并通过商人购买文物。1824年，卡洛·费利切国王收购了法国总领事贝尔纳迪诺·德罗维蒂在埃及期间建立的德罗维蒂收藏馆的藏品（5268件藏品，包括100座雕像、170张莎草纸、石碑、木乃伊和其他物品）。这后来成为都灵埃及博物馆的基础。富裕的企业家和有影响力的精英也有兴趣将收藏作为身份的象征，他们通常会在遗嘱中将其捐赠给公众。通常情况下，人们不仅希望通过这种捐赠来提高自己的声望，还希望获得更高的社会地位。"
 lepsius.1601.g: "绝佳的捐赠！"
 lepsius.1601.h: "这个谄媚的家伙就是想占点便宜。"
 lepsius.1606.t: "埃及狂热症"
 lepsius.1606.d: "一群热爱埃及的人聚集在一起。由[SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName]领导。有些人可能并不认同他们对古埃及近乎狂热的崇拜，但他们的出现可能会带来一些好处。"
 lepsius.1606.f: "尽管人们认为19世纪在许多方面都是进步的，并以科学精神为其主导，但恰恰是在这一时期，几种形式的神秘学和伪科学现象变得十分普遍。其中最著名的是唯灵论，它希望证明灵魂的存在。考古研究不仅启发了许多错误的理论，还引发了伪科学和神秘主义运动，如泛巴比伦主义、玛雅主义和亚特兰蒂斯信仰。尽管这些现象往往会对对科学产生负面影响，但其中一些却一度风行并使科学研究大众化，从而产生了相当高产的副作用。"
 lepsius.1606.g: "让他们沉溺于自己的小邪教吧。"
 lepsius.1606.h: "禁止这种欺诈。"
 lepsius.1607.t: "玛雅主义"
 lepsius.1607.d: "我国的一些精英陷入了奇怪的误区，他们认为世界遵循着一种可以追溯到玛雅人的古老历法。此外，这个民族还掌握了宇宙秘密的知识。如果不是[SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName]领导着这个有影响力的团体，人们可能会嘲笑这些荒谬的想法。"
 lepsius.1608.t: "泛巴比伦主义"
 lepsius.1608.d: "一群人在社会和科学界引起了轩然大波，他们坚持认为所有知识都来自巴比伦，甚至犹太教和基督教也只是对其的模仿而已。[SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName]也参与了这个“巴比伦主义者俱乐部”，他们正试图传播自己的思想。"
 lepsius.1608.g: "伪科学！"
 lepsius.1608.h: "很好。"
 lepsius.1609.t: "亚特兰蒂斯主义"
 lepsius.1609.d: "[SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName]领导着一个根深蒂固的伪科学团体，该团体声称亚特兰蒂斯并非神话，而是一座历史名城，在冰河时期就拥有了先进的技术。此外，所有文化都是亚特兰蒂斯的后裔。他希望通过每周一次的降神会与亚特兰蒂斯人的灵魂取得联系。"
 lepsius.1609.h: "谁能说得清这是真的还是传说？"
 lepsius.1609.i: "亚特兰蒂斯证据确凿。"
 lepsius.1610.t: "考古投资"
 lepsius.1610.d: "考古博物馆馆长表示愿意支持培训新的专家。不过，这需要额外的费用。"
 lepsius.1610.f: "本机构得知政府目前对促进我国的考古工作特别感兴趣。额外的财政支持可以帮助招聘新的前途远大的助理。"
 lepsius.1610.g: "给予博物馆额外的财政支持。"
 lepsius.1610.h: "不值得。"
 lepsius.1611.t: "博物馆门票"
 lepsius.1611.d: "为了弥补不断上涨的成本，博物馆被迫提高门票价格。国家可以获取额外的利润，但这可能会对我们的声誉造成轻微损害。"
 lepsius.1611.f: "“无需门票！”"
 lepsius.1611.g: "提高票价。"
 lepsius.1611.h: "降低票价。"
 lepsius.1611.i: "门票？博物馆不该有这种门槛！"
 lepsius.1612.t: "[SCOPE.sCharacter('lepsius_director_scope').GetLastName]馆长的遗产"
 lepsius.1612.d: "近期逝世的博物馆馆长[SCOPE.sCharacter('lepsius_director_scope').GetLastName]是一位广受尊敬的人物。他享有极高的科学声誉。但最近的一项发现可能会玷污他的遗产。"
 lepsius.1612.f: "调查显示，[SCOPE.sCharacter('lepsius_director_scope').GetFullName]在任职期间多次接受匿名人士的私人捐赠。不过，他从未将这些文物交给博物馆，而是据为己有。虽然只有几件，但它们的价值并不低。知识界面临着丑闻威胁。"
 lepsius.1612.g: "真相必须揭露！"
 lepsius.1612.h: "[SCOPE.sCharacter('lepsius_director_scope').GetFullName]是一位体面人。"
 je_lepsius_pompeii: "庞贝的现代发掘"
 je_lepsius_pompeii_reason: "公元79年，维苏威火山的爆发掩埋了古罗马城市庞贝，自18世纪以来，人们一直在对这座城市进行发掘。然而，这种发掘的方方面面在相当的程度上可以说是掠夺：通过破坏科学材料来获取艺术珍品，或者由于单纯的无知而破坏有价值的材料。新的考古方法可以大大改进庞贝古城的研究。"
 je_lepsius_teotihuacan: "特奥蒂瓦坎"
 je_lepsius_teotihuacan_reason: "早在阿兹特克人建立起统治之前，特奥蒂瓦坎就被视作一处神秘场所——对他们而言，这座荒废的城市必定是诸神的诞生地。事实上，许多证据表明这座古城早在阿兹特克帝国之前数个世纪就影响了中美洲的大部分地区，也是美洲最大的美洲遗址之一。这为墨西哥政府对此地进行更详细的研究提供了进一步的科学依据。特奥蒂瓦坎可以被视为墨西哥悠久而未曾中断的文化象征，因此也是我们国家的先驱。在独立100周年之前重建部分被毁的特奥蒂瓦坎太阳金字塔，就是为了强调这一象征意义，并纪念民族团结与历史。"
 je_lepsius_harappa: "印度河谷文明"
 je_lepsius_harappa_reason: "尽管哈拉帕遗址早已为人所知，查尔斯·马森在1844年出版的《俾路支斯坦、阿富汗和潘贾巴邦旅行记》一书中也已首次将其记述为“用砖砌成的废墟防御工事”，但其意义仍未完全阐明。也许印度也有此前完全不为人知的考古学宝藏？"
 je_lepsius_first_emperor: "始皇陵"
 je_lepsius_first_emperor_reason: "中国在考古领域尚且稚气未脱。我们的研究人员需要走向世界，积累经验，以增进学识。只有当我们取得了足够的成就，考古学家得到了充分的历练，我们才能尝试最伟大的考古探险：即考察秦始皇陵，这是一项至今无人敢于承担的任务。"
 lepsius.7.t: "庞贝的发掘"
 lepsius.7.d: "在庞贝，新的科学方法将在[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授的指导下进行测试。这是庞贝发掘史上的一个转折点。然而，研究的重点仍有待决定。"
 lepsius.7.f: "朱塞佩·菲奥雷利的发掘开启了庞贝研究和发掘的新篇章。在早期的遗址发掘中，偶尔会在灰烬层中发现含有人类遗骸的空腔。菲奥雷利意识到这是尸体腐烂后留下的空间，于是他设计了一种技术，将石膏注入其中，以重现维苏威火山遇难者的形态。这种技术一直沿用至今，现在使用透明树脂代替石膏，因为它更耐用且不会破坏骨骼，可以进行进一步分析。菲奥雷利还引入了科学的记录法。他将城市划分为今天所见的九个区域和街区，并对各个房屋的入口进行了编号。菲奥雷利还出版了第一本包含发掘报告的期刊。在他的继任者的努力下，整个城市的西部都被发掘出来。"
 lepsius.7.g: "我们主要对文物感兴趣。"
 lepsius.7.h: "我们需要更多地了解过去。"
 lepsius.7.i: "我们要训练新一代的科学家。"
 lepsius.8.t: "特奥蒂瓦坎的太阳金字塔"
 lepsius.8.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]从重建的金字塔最高点俯瞰特奥蒂瓦坎全景：这一声名远扬的已经克服了一个重要障碍，但仍不清楚国家将从发掘中获得哪些具体利益。"
 lepsius.8.f: "特奥蒂瓦坎位于墨西哥中央高原，是美洲最重要的史前大都市遗址之一，以太阳大金字塔等阶梯式神庙最为著名。早在公元前六世纪，特奥蒂瓦坎地区就有人类长期居住。公元100至650年间，该城曾是中美洲最重要的文化、经济和军事中心。在其发展的顶峰时期，该城可能拥有多达20万居民。在当时，它是美洲大陆有史以来最大的城市，也是世界上最大的城市之一。从650年左右开始，它的重要性逐渐下降，直到750年左右，由于不完全清楚的原因，城市基本上被遗弃了。但直到西班牙征服墨西哥之前，特奥蒂瓦坎人文化一直影响着墨西哥中部。"
 lepsius.9.t: "未知的文明"
 lepsius.9.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]目瞪口呆。他似乎发现了一种此前完全不为人知的文化的痕迹，这种文化几千年前就定居在了印度河流域，因此应该是与埃及或巴比伦等量齐观的文明摇篮。研究要进行数十年——但优先事项是什么？"
 lepsius.9.f: "青铜时代的印度河文明，又称印度河文明或哈拉帕文化，是最早的城市文明之一。它大约存在于公元前2800年至公元前1800年之间，位于印度次大陆西北部的印度河沿岸。印度河文明几乎遍及现在的巴基斯坦全境以及印度和阿富汗的部分地区。1912年，J·弗利特在当时的英属印度发现了带有未知文字的印章，这引起了欧洲科学界的兴趣。1921/22年，在时任英国文物局局长约翰·马歇尔的指导下对哈拉帕和摩亨佐‑达罗进行了发掘。两座发掘出来的城市的相似性很快使人们清楚地认识到，这里发现了一种以前不为人知的先进文化。"
 lepsius.70.t: "兵马俑"
 lepsius.70.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]在考察秦始皇陵周边地区时有了惊人的发现：一支完全由陶俑组成的军队至今仍守卫着死去的皇帝。"
 lepsius.70.f: "‘九月，葬始皇郦山。始皇初即位，穿治郦山，及并天下，天下徒送诣七十馀万人，穿三泉，下铜而致椁，宫观百官奇器珍怪徙臧满之。令匠作机弩矢，有所穿近者辄射之。以水银为百川江河大海，机相灌输，上具天文，下具地理。以人鱼膏为烛，度不灭者久之。’——司马迁"
 lepsius.70.g: "古中国的伟大令人震惊。"
 lepsius.61.t: "[SCOPE.sState('lepsius_excavation_state').GetName]的发掘"
 lepsius.61.d: "在占领[SCOPE.sState('lepsius_excavation_state').GetName]期间，考古队和文物落入我们手中。考古学家坚持不中断科学工作，并保护发掘现场。然而，一些官员却坚持认为，我们应该自己动手去取。"
 lepsius.61.f: "不幸的是，对重要发掘地点的进行掠夺并不少见。逼近的军队并不总能保存艺术珍品。在某些情况下，只有携带更多战利品返回的前景才会激起野心家的欲望——今天的情况与苏拉时代又有什么不同呢？"
 lepsius.61.g: "劫掠挖掘现场！"
 lepsius.61.h: "保护挖掘现场。"
 lepsius.62.t: "挖掘现场被劫掠！"
 lepsius.62.d: "战争在我们正在进行发掘的国家之一留下了痕迹：敌军占领了正在研究考古遗址的地区，并立即没收了我们的团队在那里发现的文物，留下一片狼藉。"
 lepsius.62.f: "考古挖掘地点可能成为战争和破坏的牺牲品——这也影响到不属于交战国的中立考古队。贪婪的国家可以利用尚未运抵母国的文物。别担心：挖掘队仍在现场而挖掘品不会丢失。不过，考古学家需要三年时间才能将损坏的地方修复到可以恢复正常运作的程度。在此期间，每年不会有来自该考古遗址的文物进入我们的博物馆。"
 lepsius.62.g: "这些蛮夷！"
 lepsius_excavation_sacked_state_modifier: "考古现场被劫掠"
 lepsius_excavation_protected_state_modifier: "考古现场受保护"
 lepsius_4_excavation_team_needed_tt: "拥有至少#G 4支#!考古发掘队。"
 lepsius.2101.t: "罗马古战场"
 lepsius.2101.f: "“先生，我又找到一根钉子！”\n“太神奇了！这更加证实了这里曾是古代战场的理论！我希望很快也能找到一些尸骨！”"
 lepsius.2101.g: "虽非声名显赫，但却是重要的发现！"
 lepsius.2102.t: "发现乡村别墅"
 lepsius.2102.f: "“乡村别墅不仅是农产品、食品和饮料的主要生产地，它还能让旅行者在旅途中休息，并在为军团提供补给方面发挥重要作用。通过这些遗迹，我们可以对罗马帝国时期的食品生产以及罗马人的生活和耕作得出结论。”"
 lepsius.2102.g: "我们会对乡村罗马人的生活有更多了解！"
 lepsius.2103.t: "发现古罗马木简"
 lepsius.2103.f: "克劳迪娅·塞韦拉向她的莱比迪纳问好。\n姐妹，9月11日是我的生日，我诚挚邀请你一定要来参加我们的庆祝活动，如果你能出席的话，你的到来会让我的生日过得更加愉快。代我向你的塞里亚利斯问好。我的埃利乌斯和我的小儿子向他问好。\n我在等你，姐妹。久别了，姐妹，我最亲爱的灵魂，愿你繁荣昌盛，并向你问好。\nCl.塞韦拉致塞里亚利斯之妻苏庇西娅·莱比迪纳"
 lepsius.2103.g: "并非所有宝藏都是金银！"
 lepsius.2104.t: "发现罗马钱币宝藏"
 lepsius.2104.d: "罗马钱币宝藏非常罕见。不过，在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]中发现了一处。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士重新确认了这处藏宝地点，它可能是在罗马帝国的危机时期被隐藏起来的。"
 lepsius.2104.f: "“我在想，如果将来有一天考古学家发现了我们留下的钱币，会不会想知道它们是怎么出现在那里的。”"
 lepsius.2104.g: "我的宝贝！"
 lepsius.2111.t: "古波斯棺材"
 lepsius.2111.f: "“小心点，小心点。我们不能让发现受损。请别用撬棍撬它！”"
 lepsius.2111.g: "惊人的发现！"
 lepsius.2112.t: "波斯宫殿的藏品"
 lepsius.2112.d: "一个农民的线索让[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName]找到了一座失落的阿契美尼德时代波斯宫殿。随后的发掘过程中出现了意外之喜。"
 lepsius.2112.f: "美索不达米亚是古波斯帝国的核心行省之一。在征服过程中，阿契美尼德王朝将大量艺术品和楔形文字石板带回了本土。尽管如此，考古队还是在他们发现的宫殿中出土了一整套美索不达米亚石板档案，这让他们大为惊讶。"
 lepsius.2112.g: "全部收集起来！"
 lepsius.2113.t: "波斯陵墓中的埃及雕像"
 lepsius.2113.d: "在波斯贵族墓穴中进行的一次小规模发掘发现了一座小巧的埃及托特神像。"
 lepsius.2113.f: "波斯人曾统治埃及长达一个多世纪。但在此前后，两个文明之间也有文化交流，即使两个帝国之间经常发生战争。"
 lepsius.2113.g: "这件文物怎么跑到这里的？"
 lepsius.2114.t: "碑文"
 lepsius.2114.d: "一场山体滑坡使得山中之前被认为已经遗失的碑文重现于世。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士当即着手评估这份古代报告。"
 lepsius.2114.f: "波斯岩刻或浮雕在这个没落帝国的艺术中始终占有一席之地。最有名的是大流士大帝在伊朗克尔曼沙阿省贝希斯敦山的悬崖上铭刻的多语种阿契美尼德王室碑文与大型岩石浮雕——贝希斯敦铭文。它是已知最长的三语楔形文字碑文，用古波斯语、埃兰语和巴比伦语（阿卡德语的变体）书写，对楔形文字的破译非常重要。"
 lepsius.2114.g: "重要的波斯史原始资料！"
 lepsius_state_trait_tikal: "蒂卡尔——丛林中的城市\n考古项目中的@lepsius_local_minor!本地文物#G +1#!"
 je_lepsius_tikal: "蒂卡尔——丛林中的城市"
 je_lepsius_tikal_reason: "斯蒂芬斯与卡瑟伍德的探险激发了公众的极大兴趣，特别是在书中刊登了大量玛雅失落城市的插图之后。但是，这两位冒险家并没有找到所有的地点。许多未知的遗址仍有待重新发现。传说中的蒂卡尔就是其中之一。"
 lepsius.71.t: "蒂卡尔——丛林中的城市"
 lepsius.71.d: "经过艰苦的搜寻，由[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授率领的探险队在危地马拉丛林深处终于找到了传说中的玛雅城市蒂卡尔。这是我国的一个历史性事件，但我们应该从中得出什么结论呢？"
 lepsius.71.f: "蒂卡尔是危地马拉北部佩滕雨林中的一座玛雅古城，拥有著名的台阶式神庙。它是玛雅古典时期（3至9世纪）最重要的城市之一，也是研究的最为详尽的玛雅城市之一。最早的定居痕迹可追溯到公元前1000年早期。公元2世纪，随着神庙、石碑和宫殿寺庙建筑群的建造，真正的城市发展开始了。公元5世纪，一个强大的统治王朝征服了附近的一个又一个小国，并将它们变成附庸，从而与强大的邻国卡拉克穆尔国发生了长期冲突，蒂卡尔也因此达到了第一个高峰。8世纪，对手卡拉克穆尔被击败后，蒂卡尔经历了第二个高峰。9世纪初，蒂卡尔国力衰退，建筑工程停止。最迟在10世纪，这座城市已完全荒废。"
 LEPSIUS_NO_MORE_EXPEDITIONS_FOR_YEARS_TT: "你将在#n 3‑5年内无法进行#![Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]，因为你的[concept_lepsius_archaeologist]将忙于分类上一次的收获。"
 LEPSIUS_SUB_TEAM_WITH_EXPLANATION_TT: "失去#R 1支#![Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')]。在[concept_lepsius_expedition]结束后或者从[concept_lepsius_excavation]召回（需研究#V 早期考古学#!）可#p 重新获得#!。"
 lepsius_long_expedition_tt: "长期的[concept_lepsius_expedition]将花费#V 1年#!左右。探险后[concept_lepsius_archaeologist]将忙于分类所得文物，所以你在接下来的#n 5年#!都#p 不能#!进行另一次考古探险。"
 lepsius_medium_expedition_tt: "中期的[concept_lepsius_expedition]将花费#V 10个月#!左右。探险后[concept_lepsius_archaeologist]将忙于分类所得文物，所以你在接下来的#n 4年#!都#p 不能#!进行另一次考古探险。"
 lepsius_short_expedition_tt: "短期的[concept_lepsius_expedition]将花费#V 8个月#!左右。探险后[concept_lepsius_archaeologist]将忙于分类所得文物，所以你在接下来的#n 3年#!都#p 不能#!进行另一次考古探险。"
 lepsius_leave_team_for_excavation_tt: "你的[Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')]将建立一个[concept_lepsius_excavation]，通常#V 每年#!获得#V 1件#![concept_lepsius_artifact]。"
 lepsius.2101.d: "一位市民在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]中发现了一把铁制匕首，于是[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName]召集队伍开始了挖掘工作。他们发现了一场古罗马战役的各种遗迹，从盾牌残片到钉子和钱币。这些钱币让考古学家们确定了战役发生的时间。"
 lepsius.2102.d: "一位农民在自己的田地里发现了古代遗迹。幸好他联系了大学，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士才得以在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]发现一座古罗马别墅。各种考古发现使得我们可以对罗马人的乡村生活得出结论。"
 lepsius.2103.d: "在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]发现的各种罗马薄木简牍在考古学家中闻名遐迩。虽然用当前的方法，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士只能理解几块木简的含义，但即使是这几块木简也为我们打开了一扇了解罗马生活的窗口。"
 lepsius.2111.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]发现了一件古波斯帝国的非凡宝藏。一位农民发现了古老的青铜棺材，并联系了 [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士。有赖于[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]的专业知识，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士得以打开棺材，发现了一具被奢华珠宝覆盖的骸骨。珠宝表明这是一位阿契美尼德王朝的贵族。"
 je_lepsius_dreamtime: "梦创神话"
 je_lepsius_dreamtime_reason: "英国民族学家沃尔特·鲍德温·斯宾塞和他的澳大利亚同事弗朗西斯·詹姆斯·吉伦将澳大利亚中部阿兰达语中的alcheringa一词译为“做梦”。对于原住民来说，梦境涉及宇宙的精神、自然和道德秩序。在这种语境下，做梦意味着正确理解和利用世界及其联系的集体能力，在崇拜行为的框架内对神话世界进行反思，并具有生命力。与梦创时代、其他原住民神话以及考古和人类学遗迹有关的一些崇拜场所遍布澳大利亚各地。现在是彻底研究这最后一片大陆大陆的过去的时候了。"
 lepsius_2_excavation_team_needed_tt: "拥有至少#G 2支#!考古发掘队。"
 lepsius.72.t: "梦创神话"
 lepsius.72.d: "在穿越澳大利亚的旅程中，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]教授和[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]教授进行了宝贵的科学研究，揭示了澳大利亚大陆过去未被探索的历史。"
 lepsius.72.f: "科学家们回来后为科学协会带来了一系列令人印象深刻的发现。他们绘制了洞穴壁画和草图，带回了几千年前的骸骨，找到了古代和近代的文物，还记录了原住民的神话和故事。同事们都没有想到会取得如此丰富的收获。"
 lepsius.72.g: "哦，甚至还有一支迪吉里杜管！"
 je_lepsius_gwanggaeto: "好太王碑"
 je_lepsius_gwanggaeto_reason: "好太王碑是319年起在位的高句丽国王好太王的纪念碑。石碑位于中国境内，靠近朝鲜边境。刻在石碑上的碑文是现存最古老、最详细的高句丽国历史资料。668年高句丽国及其继承者渤海国灭亡后，国内城和丸都一带的重要地位不复存在。1644年满洲人征服中国后，清朝的新皇帝宣布封禁鸭绿江以北的广大地区。直到19世纪下半叶才再次允许定居。约1876年，一位中国官员重新发现了这块石碑，当时石碑已经完全被杂草覆盖，部分埋入地下。"
 lepsius_gwanggaeto_modifier: "高句丽的遗产"
 lepsius.73.t: "好太王碑"
 lepsius.73.d: "意外发现失落的高句丽国时代的巨大石碑，不仅让人们得以一窥过去不为人所知的历史，还引发了一系列谜团——甚至可能点燃政治争端的导火索。"
 lepsius.74.t: "高句丽——高丽帝国"
 lepsius.74.d: "在广开土大王的碣碑被发现后，中国大胆宣称，这证明高句丽并非一个朝鲜国家，而是中国的一部分——或者至少是中国的附属国。而日本则声称这印证了日本在朝鲜南部的统治。"
 lepsius.75.t: "倭人入侵"
 lepsius.75.d: "最近发现的好太王碑提供了日本成功入侵朝鲜南部并征服了当地邦国的证据。"
 lepsius.73.f: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]发现的石碑体量宏大，甚至可能是世界上现存最大的石碑。虽然它是构建曾统治朝鲜北部和东北南部的高句丽国历史的独特资料，但其难以解读的部分以及高句丽国的身份争议，都会产生不可忽视的政治影响，在远东国家民族主义开始觉醒的时代尤其如此。毫无疑问，高句丽和现代朝鲜族有着很深的渊源，但中国对于曾是高句丽统治核心的东北南部多民族地区可能会被朝鲜民族主义分子宣称主权的担忧也不无道理。另一方面，一段关于日本可能入侵的记载，引发了关于日本曾统治朝鲜南部的推测，而朝鲜方面的解读则主张这是朝鲜国家入侵了日本。"
 lepsius.73.g: "这段具有启示意义的往事值得解读。"
 lepsius.73.h: "高句丽曾是中国的边疆民族政权。"
 lepsius.73.i: "这印证了南满本是朝鲜领土。"
 lepsius.73.j: "日本对朝鲜影响的例证。"
 lepsius.2131.t: "阿兹特克定居点发现头骨残片"
 lepsius.2131.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]有了可怕的发现。各类头骨碎片让[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士相信，这里是骷髅架，即Tzompantli的所在地。"
 lepsius.2131.f: "阿兹特克人倾向于将鲜花战争中的俘虏作为祭品。这些被献祭者的头骨通常会被收集到一个Tzompantli或称骷髅架中。这些头骨通常被堆放在一起，形成一面头骨墙。有些神庙甚至在石墙上雕刻头骨作为装饰。"
 lepsius.2131.g: "多残忍啊！"
 lepsius.2132.t: "当地学者保存阿兹特克碑文"
 lepsius.2132.d: "在更换[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]的一条人行道时，没人想到这些石块中会存在考古发现，但一位当地学者却在石头上发现了各种阿兹特克铭文。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]教授被叫到现场，并保存下了这些铭文。"
 lepsius.2132.f: "该发现描绘了墨西卡人发动的某场战斗。我们还不确定这些纳瓦特尔语的含义，但其中有许多地名。因此至少我们可以弄清楚里面提到了哪些地方。"
 lepsius.2132.g: "谢天谢地，他在石头被用来铺路之前发现了它。"
 lepsius.2133.t: "发现阿兹特克遗迹"
 lepsius.2133.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]发现了古老的阿兹特克遗址。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]教授立即开始了发掘工作。遗憾的是，在建筑本身之外并没有什么发现。"
 lepsius.2133.f: "“虽然这些遗址已经被洗劫一空，但它们让我们了解到欧洲人到来之前墨西卡人的生活。这对我们来说仍然是重要的发现！”"
 lepsius.2133.g: "有趣。"
 lepsius.2134.t: "发现黑曜石镜"
 lepsius.2134.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]发现了阿兹特克人的工艺杰作。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士找到了阿兹特克人在宗教仪式上使用的一面完美的黑曜石镜。"
 lepsius.2134.f: "“黑曜石镜被认为是与冥界沟通的工具。有一个名叫特斯卡特利波卡（烟雾镜）的神灵甚至被描绘成以镜代足。这是一个伟大的考古发现！”"
 lepsius.2134.g: "难以置信！"
 lepsius.2141.t: "发现迦太基沉船"
 lepsius.2141.d: "采珠人在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]发现了一艘古迦太基沉船。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士决定暂时将船留在海中，但潜水员努力分析并记录了船上的货物，对迦太基的贸易路线有了新的认识。"
 lepsius.2141.f: "“有很多紫色的布料，或许是为不同国家的贵族准备的。”"
 lepsius.2141.g: "地中海上最伟大的贸易商！"
 lepsius.2142.t: "搁浅的布匿战船"
 lepsius.2142.d: "谁能想到海上霸主迦太基人竟然也会搁浅。但这确实发生在了[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士从这艘曾经强大的战舰上找到了许多发现。不过，木材已经大部分腐烂了。"
 lepsius.2142.f: "“这是双列、三列、四列还是更多列的桨座战船？”"
 lepsius.2142.g: "曾经雄伟壮丽的船！"
 lepsius.2143.t: "发现布匿港口"
 lepsius.2143.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]发现了迦太基的一个古代港口。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]教授在那里进行了一次全面的调查。遗憾的是，由于一家财力雄厚的公司希望立即在那里开建新工厂，因此只找到了些零零碎碎。"
 lepsius.2143.f: "“至少我们能找到一些双耳瓶。这能告诉我们不少有关古代地中海贸易的信息。”"
 lepsius.2143.g: "一个完整的未知港口！多么惊人的发现！"
 lepsius.2144.t: "发现迦太基古代银币"
 lepsius.2144.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]的农民掘出了一个古代宝窟。遗憾的是，尽管[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士进行了全面的调查，依然没能找到更多的布匿文物。而且这些钱币是怎么到这儿的也是个谜。"
 lepsius.2144.f: "“这枚银币上刻着哈斯德鲁巴，汉尼拔的弟弟。显然是枚年代较近的硬币”"
 lepsius.2144.g: "我现在有钱了！"
 lepsius.2151.t: "发现凯尔特大釜"
 lepsius.2151.d: "凯尔特人使用大釜有很多原因。现在其中一口大釜被发现于[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]教授能够把这件巨大的金属器皿纳入我们的收藏。"
 lepsius.2151.f: "“有一个传说，一个伟大的战士掉进了一个装满魔药的大釜里，喝了魔药的人都会获得非人的力量。显然，那个战士非常强壮，可以举起巨大的石头。他还喜欢和罗马人战斗。”"
 lepsius.2151.g: "我希望还没有人掉进魔釜里！"
 lepsius.2152.t: "发现凯尔特青铜盾"
 lepsius.2152.d: "在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]的一条河的泥床中发现了一块青铜盘。当[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士到达时，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]能够确定这块金属板曾经是凯尔特盾牌的一部分。"
 lepsius.2152.f: "“相传凯尔特人酋长是被举在盾牌上的，但这肯定是儿童故事。不过，塔西佗告诉我们，当酋长被宣布为新酋长时，他们会被举在盾牌上。这可能就是这些故事的历史来源……”"
 lepsius.2152.g: "无愧于大酋长的盾牌！"
 lepsius.2153.t: "凯尔特青铜头盔出土"
 lepsius.2153.d: "在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]中发现了一顶有角青铜头盔。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士很快就确定，这其实不是一顶在战场上佩戴的头盔，而是一件凯尔特人的祭品。"
 lepsius.2153.f: "“你可能看到过凯尔特人头戴带翅膀或角的头盔的描述，但这些描述都是错误的。在战斗中，这样的花哨装饰不会有任何防御作用。不过这种头盔确实存在，但通常只是凯尔特人对某些神灵的祭品。”"
 lepsius.2153.g: "好漂亮的头盔！"
 lepsius.2154.t: "发现古代凯尔特长立石"
 lepsius.2154.d: "在一次乡间徒步旅行中，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]发现了一块奇怪的石头。仔细一瞧，这是一块凯尔特长立石，曾经由当地的凯尔特部落建造。现在，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士正在深入研究这座墓冢。"
 lepsius.2154.f: "“因为没有留下任何书面记录，所以我们不知道凯尔特人为什么要建造长立岩，但它很可能是某种崇拜场所。一些当地人有自己的故事，说的是一位著名的战士和他的威武的狗。这只战士显然制作了形状完美的长立岩，并且在没有任何帮助的情况下将其竖立起来，显然这只是一个愚蠢的故事”"
 lepsius.2154.g: "这真的是奥勃利的杰作？"
 lepsius.2161.t: "发现爱琴海壁画"
 lepsius.2161.d: "在当地对爱琴海遗址的发掘中，[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]出土了一幅精美的壁画。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士下令绘制发现的壁画。"
 lepsius.2161.f: "“这些图案太神奇了！真希望我们这个时代也能创造出这样的美！”"
 lepsius.2161.g: "这就是艺术！"
 lepsius.2162.t: "发现爱琴海遗迹"
 lepsius.2162.d: "在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]的施工过程中，发现了一处古代爱琴海遗址。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士开始对遗址进行彻底调查。遗憾的是，遗址中没有找到太多的发现，但遗址有助于了解曾经生活在这里的人们的生活。"
 lepsius.2162.f: "“这些拱门从几千年前就矗立在这里了。不知道我们的建筑是否也能屹立如此之久……”"
 lepsius.2162.g: "这将告诉我们很多关于古代爱琴海生活的信息。"
 lepsius.2163.t: "爱琴海珠宝出土"
 lepsius.2163.d: "幸运的是，一位农民在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]中偶然有了惊奇发现。当[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士来到这里时，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]对这件迷人的爱琴海珠宝赞叹不已。"
 lepsius.2163.f: "“如此漂亮的珠宝。真希望我们今天也能制作出类似的首饰……”"
 lepsius.2163.g: "工艺精湛！"
 lepsius.2164.t: "爱琴海金杯出土"
 lepsius.2164.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士在我们的一处当地发掘现场发现了一只金杯。如此惊人的发现出人意料，但很显然，[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]仍然有着取得伟大发现的潜力。"
 lepsius.2164.f: "“这只杯子描绘了一个男人和几头公牛的场景。这些公牛姿态各异，动感十足。”"
 lepsius.2164.g: "我想要个这样的杯子！"
 lepsius.2171.t: "埃及壁画"
 lepsius.2171.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士在[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]一次[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]之旅中发现了古埃及壁画。这些壁画描绘了古代埃及的场景。"
 lepsius.2171.f: "“令人着迷的是，墙壁上仍然保留着颜料，而在希腊，一切都是白色的。显然埃及人更喜欢色彩，或者沙漠能更好地保存色彩。”"
 lepsius.2171.g: "伟大的画作！"
 lepsius.2172.t: "发掘埃及神庙"
 lepsius.2172.d: "谁能想到[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]还有不为人知的寺庙？显然的确如此，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]教授就在黄沙覆盖下发现了一座。这是一个伟大的发现，尽管有价值的东西都早已不复存在。"
 lepsius.2172.f: "“看看这座神庙！你能想象这里举行的宗教仪式吗？是不是很神奇？”"
 lepsius.2172.g: "这里有太多值得学习的东西！"
 lepsius.2173.t: "寻回埃及雕像"
 lepsius.2173.d: "雕像已经残破，但仍是一位不知名的埃及石匠的伟大作品。在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]发现的雕像损坏前可能是一只猎鹰。至少[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]如此认为。"
 lepsius.2173.f: "“虽然看起来不起眼，但这座雕像却能告诉我们埃及人是如何制作这种雕像的！”"
 lepsius.2173.g: "石匠的杰作！"
 lepsius.2174.t: "发现埃及木乃伊"
 lepsius.2174.d: "木乃伊大概是埃及最常见的考古发现了。这是在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]发现的一个。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]教授已经非常小心地开始进行各项检查，但有些人……有其他想法。"
 lepsius.2174.f: "“想想！我们能用这些木乃伊来搞清楚古代的埃及人吃什么喝什么，他们的健康情况怎么样，这该多棒啊！”"
 lepsius.2174.g: "死亡仅仅是开始罢了。"
 lepsius.2174.h: "我听说有些人喜欢吃木乃伊！卖了！"
 lepsius.2181.t: "发现古希腊战场"
 lepsius.2181.d: "继业者战争把世界上许多地方变成了废墟。例如，似乎在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]就有一处战场——但这是否是继业者战争的一部分还尚未可知，目前[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]已发现了各种样式的武器和盔甲残片。"
 lepsius.2181.f: "“这里肯定打过一仗，不如别的战场规模大，但却一样重要。我敢肯定我们能在这发现更多的东西！”"
 lepsius.2181.g: "那些战争是多么可惜啊……"
 lepsius.2182.t: "发现希腊钱币"
 lepsius.2182.d: "从地中海到印度，古希腊人在这些遥远之地都留下了自己的足迹。而且往往可以通过像在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]发现的古希腊钱币来佐证这一点。多亏了这些[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士将能确定当时的希腊人是否来过这里。"
 lepsius.2182.f: "“我想我现在有钱了！”"
 lepsius.2182.g: "有趣得很！"
 lepsius.2183.t: "希腊废墟发掘完毕"
 lepsius.2183.d: "从西班牙到印度都有希腊人的殖民地，而在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]就发现了一个最新的希腊废墟。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]教授觉得这个特别的城市会告诉我们更多关于希腊殖民者的事。"
 lepsius.2183.f: "“你能想象一种文化横跨如此巨大的距离吗？真是令人难以置信！”"
 lepsius.2183.g: "到处都有希腊建立的城市，不是吗？"
 lepsius.2184.t: "关于希腊神灵的描述"
 lepsius.2184.d: "希腊神祇及其宗教信仰曾传播到过遥远的土地上。最近在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]发现了一幅描绘希腊神祇的画像。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士确定这必定是狄奥尼索斯，即希腊的酒神。"
 lepsius.2184.f: "“根据希腊的传说，宙斯把缝在他自己髀肉里的狄奥尼索斯刚刚带到埃及以南埃塞俄比亚的尼萨，狄奥尼索斯就降生了；至于潘恩，希腊人甚至不了解他出生以后的情况。因此，在我看来，显而易见的是，希腊人是先熟悉其他诸神的名字，最后才知晓这几个神的名字的。希腊人就把这些神的起源一直回溯到他们最早听说它们的那个时候。以上所述都是以埃及人的陈述为依据的。”\n——希罗多德"
 lepsius.2184.g: "为这个伟大的发现，来，干一杯！"
 lepsius.2500.t: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]的新考古地图"
 lepsius.2500.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]教授一直在努力记录最近几年在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]的所有考古发现的位置，并绘制了一张地图。在哪些地方可能会有进一步发现这个问题上，这张地图有助于得出结论。"
 lepsius.2500.f: "“哦，我们在这发现了些趾甲，在那边发现了绵羊骨骼，这也太不可思议了！”"
 lepsius.2500.g: "这会为更多更新的发现打开大门！"
 lepsius.2501.t: "[GetPlayer.GetName]的《考古学图录》"
 lepsius.2501.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]教授不仅是一位令人尊敬的考古学家，而且还是一位令人惊叹的艺术家。凭借这项技能，教授出版了以[GetPlayer.GetNameNoFormatting]为题材的《考古学图录》，许多非专业人士觉得这是为他们打开考古学大门的绝佳选择。"
 lepsius.2501.f: "“看看这些插图！我还以为我们就在博物馆里，抬头就能看见它们呢！哈哈哈！”"
 lepsius.2501.g: "天下无双！"
 lepsius.2502.t: "[GetPlayer.GetName]考古发现的新目录"
 lepsius.2502.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士在[GetPlayer.GetNameNoFormatting]中列出了所有考古发现的新目录，在此之前没人相信博士会这么勤奋地工作。多亏了这些出色的工作，我们现在拥有了迄今为止所有发现的最新目录，一共七卷。"
 lepsius.2502.f: "“编号7342：石器残片，大约为新石器时代，命名为'Rocky'。”"
 lepsius.2502.g: "这对将来的工作帮助很大！"
 lepsius.2503.t: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]教授停止文物盗运"
 lepsius.2503.d: "在几个月的工作后，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士成功逮捕了一个从国内走私文物到外国的盗运团伙。这些文物现在安全地保存在我们的图书馆里。"
 lepsius.2503.f: "“你们毁了多么珍贵考古文物！恶棍！”"
 lepsius.2503.g: "这些属于博物馆！"
 lepsius.2600.t: "失落星辰"
 lepsius.2600.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士总是对古代描绘的星图感到困惑，因为它们与今日所见的星象似乎并不相同。多亏[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]教授的帮助，他终于弄清了问题所在。他们一起发现了夜空中的一颗新星。"
 lepsius.2600.f: "“在那儿！就在那儿，和古埃及人说的一模一样！我们终于找到了失落的星星！”"
 lepsius.2600.g: "伟大的科学发现!"
 lepsius.2601.t: "利用日食的天文学知识估算历史事件的日期"
 lepsius.2601.d: "在[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]教授和[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]教授的共同努力下，他们能通过现代天文学知识来通过一手资料中的日食现象来确定特定历史事件的日期。"
 lepsius.2601.f: "“显然，米利都的泰勒斯谈论的是公元前585年5月28日的日食，而不是别的时候的！”"
 lepsius.2601.g: "这是考古学的一大进步"
 lepsius.2602.t: "《古文明天文学知识概览》"
 lepsius.2602.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士与[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]教授出版了一本新书，全面介绍了古代文明的天文学知识。"
 lepsius.2602.f: "“是的，他们知道地球不是任何东西的中心。不，即使在当时他们也没有愚蠢到认为地球是平的。是的，我绝对确信这一点。”"
 lepsius.2602.g: "有趣的读物！"
 lepsius.2603.t: "重建希罗蒸汽机"
 lepsius.2603.d: "当[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]教授对[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士谈及希罗的古代蒸汽机时，后者当即迫不及待地想要将其重建。他们一起建造了一个小型的汽转球模型。"
 lepsius.2603.f: "“正如你所见，汽转球没有动力传输装置，因此，与其说它是一台真正的机器，不如说是一个玩具。遗憾的是，它从未得到进一步发展。”"
 lepsius.2603.g: "他们怎么会没能工业化？"
 lepsius_illustrated_archaeological_catalog_modifier: "撰写一部《考古学图录》"
 lepsius.12.f: "目前埃及收藏品有#p [ROOT.Var('lepsius_egyptian_artifact_minor').GetValue]件#!普通文物和#p [ROOT.Var('lepsius_egyptian_artifact_major').GetValue]件#!重要@lepsius_egypt_minor!文物。\n\n埃及的收藏品有可能被#T 重新排列#!从而开启一个新的展览。然而这需要一定数量的@lepsius_egypt_major!文物。\n\n一个#T 小型展览#!需要#p 10件#!@lepsius_egypt_minor!文物，一个#T 中型展览#!需要#p 25件#!@lepsius_egypt_minor!文物，一个#T 大型展览#!需要#p 50件#!@lepsius_egypt_minor!文物，一个#T 优秀的展览#!需要100件@lepsius_egypt_minor!文物。此外#T 优秀展览#!还需要#p 1件#!重要@lepsius_egypt_major!文物。\n\n重新安排藏品和准备新的展览需要大约半年时间。一个展览的奖励是永久性的——直到它再次被重新开展。"
 lepsius.13.f: "目前美索不达米亚收藏品有#p [ROOT.Var('lepsius_mesopotamian_artifact_minor').GetValue]件#!@lepsius_mesopotamia_minor!普通文物和#p [ROOT.Var('lepsius_mesopotamian_artifact_major').GetValue]件#!@lepsius_mesopotamia_major!重要文物。\n\n美索不达米亚的收藏品有可能被#T 重新排列#!从而开启一个新的展览。然而这需要一定数量的文物。\n\n一个#T 小型展览#!需要#p 10件#!@lepsius_mesopotamia_minor!文物，一个#T 中型展览#!需要#p 25件#!@lepsius_mesopotamia_minor!文物，一个#T 大型展览#!需要#p 50件#!@lepsius_mesopotamia_minor!文物，一个#T 优秀展览#!需要100件@lepsius_mesopotamia_minor!。此外#T 优秀展览#!还需要#p 1件#!@lepsius_mesopotamia_major!重要文物。\n\n重新安排藏品和准备新的展览需要大约半年时间。一个展览的奖励是永久性的—直到它再次被重新开展。"
 lepsius.14.f: "目前爱琴海收藏品有#p [ROOT.Var('lepsius_aegean_artifact_minor').GetValue]件#!@lepsius_aegean_minor!普通文物和#p [ROOT.Var('lepsius_aegean_artifact_major').GetValue]件#!@lepsius_aegean_major!重要文物。\n\n爱琴海的收藏品有可能被#T 重新排列#!从而开启一个新的展览。然而这需要一定数量的文物。\n\n一个#T 小型展览#!需要#p 10件#!@lepsius_aegean_minor!文物，一个#T 中型展览#!需要#p 25件#!@lepsius_aegean_minor!文物，一个#T 大型展览#!需要#p 50件#!@lepsius_aegean_minor!文物，一个#T 优秀展览#!需要#p 100件#!@lepsius_aegean_minor!。此外#T 优秀展览#!还需要#p 1件#!@lepsius_aegean_major!重要文物。\n\n重新安排藏品和准备新的展览需要大约半年时间。一个展览的奖励是永久性的—直到它再次被重新开展。"
 lepsius.15.f: "目前美洲收藏品有#p [ROOT.Var('lepsius_precolumbian_artifact_minor').GetValue]件#!@lepsius_precolumbian_minor!普通文物和#p [ROOT.Var('lepsius_precolumbian_artifact_major').GetValue]件#!@lepsius_precolumbian_major!重要文物。\n\n美洲的收藏品有可能被#T 重新排列#!从而开启一个新的展览。然而这需要一定数量的文物。\n\n一个#T 小型展览#!需要#p 10件#!@lepsius_precolumbian_minor!文物，一个#T 中型展览#!需要#p 25件#!@lepsius_precolumbian_minor!文物，一个#T 大型展览#!需要#p 50件#!@lepsius_precolumbian_minor!文物，一个#T 优秀展览#!需要100件@lepsius_precolumbian_minor!文物。此外#T 优秀展览#!还需要#p 1件#!@lepsius_precolumbian_major!重要文物。\n\n重新安排藏品和准备新的展览需要大约半年时间。一个展览的奖励是永久性的—直到它再次被重新开展。"
 lepsius.99.t: "移动考古博物馆"
 lepsius.99.d: "出于某些原因，我们拥有了一座[GetBuildingType('building_lepsius_archaeological_museum').GetName]，但可惜在我们雄伟壮丽的首都中却缺少这样的建筑。很明显，我们得把它搬到首都来！"
 lepsius.99.f: "“请小心对待这些花瓶，它们非常非常脆弱！不！你不能就这样把它们随便丢进一个箱子里，它们需要一些填充物！我真的不认为这是个好主意！”"
 lepsius.99.g: "现在我能每天都去博物馆啦！"
 lepsius.140.d: "我们的考古学家利用[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]的关系网为探险招募了高素质的人员。"
 lepsius.250.f: "事件以争吵开始，随后是咒骂、威胁，最后是拳脚相加，最终一场全面的酒馆斗殴结束。我们的探险队领队的脾气让我们因[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]失去了很多声誉。今天早上，一份关于这个报告传到了一位高级政要那里。我们避免了一次重大的外交事件，但坏印象会持续很久。"
 lepsius.260.f: "好消息！事实证明，我们的探险队领队是一位无可挑剔的[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetCustom('academics_gentleman_or_gentlewoman_type')]。[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis|U]的智慧和魅力如同典型的[ROOT.GetCountry.GetAdjectiveNoFlag]行为，我国的声誉得到显著的提高。"
 lepsius.270.d: "我们探险队的领队最引人注目，因为[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]每天坐在咖啡馆里喝苏打水和吃冰淇淋"
 lepsius.270.f: "有一些雄心勃勃的领导人，除了整天工作之外什么都不做。他们想成就大事或积累财富。有些人想因其事迹而闻名。还有人对每一个细节都很执着。我们的考古主任却不是这样。[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]已经养成了一种习惯，每天通过大吃汽水和大口吃冰淇淋来战胜炎热。你可以说这是懒惰。对其他人来说，这是人类优雅的标志，良好的品味，以及在生活中拥有正确的优先权。"
 lepsius.280.d: "我们的探险队领队的外交技巧使[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]受到地方长官的邀请和嘉奖"
 lepsius.311.d: "上次出国考古探险的领队决定出版[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]在旅途中写的日记"
 lepsius.312.d: "[SCOPE.sCharacter('lepsius_scientific_writer').GetFullName]决定发表[SCOPE.sCharacter('lepsius_scientific_writer').GetSheHe]在探险旅途中写的科研论文。"
 lepsius.408.f: "纳扎尔护身符是一种护身符，旨在保护人们免受邪眼的伤害。这种迷信存在于东方的大部分地区，但也存在于地中海的部分地区。受过科学训练的人如果想用护身符来保护自己，不让邪恶力量对探险队造成破坏，那就太荒唐了。当地的帮手和搬运工的情况则不同，他们要求领队拿其中一个护身符，确信否则[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]将面临巨大的不幸。不管纳扎尔的能力如何，如果它不影响远征，那么为了我们的部下士气拿一个也无妨。"
 lepsius.409.f: "当我们的探险队沿着海岸线前进时，很快就遇到了一个宽阔的海湾，海湾的两端海角几乎相碰。一些希腊渔民没有绕道而行，而是提出带我们穿过海湾。领队很快接受了这个提议。在与渔民的交谈中，[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]还获得了关于不远处的一个遗迹的重要信息，这个遗迹可能是前古典时代的。"
 lepsius.421.d: "我们的考古学家找到了一枚小的埃及天青石，[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]想把它留着。"
 lepsius.452.f: "过去，[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]曾多次听说，该地有许多考古遗址被毁坏的记录。几天前[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe]收到了一个有用的线索，一个商人拥有一份16世纪的手稿，里面有一份早已失传的文献副本。原作可能永远失去了，但现在至少有重建的可能。"
 lepsius.461.f: "正值夜深，有一股奇怪的压迫感弥漫在这里。[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]起身，以为是沙子打在帐篷上的风声，但那声音并不是风声。是一种奇怪的低语声，渐渐升高，变成了不和谐的音调，最后又变成了一首旋律优美的歌曲。就像是美人鱼的歌声一样，让人沉迷其中，迷惑了感官。至少，这就是[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetLastName]的说法。数小时的寻找之后，人们在吉萨大金字塔前的狮身人面像下找到了[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe]，正像疯子一样挖掘，坚信狮身人面像下面有一个秘密的房间，里面藏着数千年的知识。自从那以后，[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis]的情况几乎没有好转。这个地方对[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]的影响真的很不好。"
 lepsius.462.f: "正值夜深，有一股奇怪的压迫感弥漫在这里。[SCOPE.sCharacter('lepsius_military_attache').GetFullName]起身，以为是沙子打在帐篷上的风声，但那声音并不是风声。是一种奇怪的低语声，渐渐升高，变成了不和谐的音调，最后又变成了一首旋律优美的歌曲。就像是美人鱼的歌声一样，让人沉迷其中，迷惑了感官。至少，这就是[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetLastName]的说法。数小时的寻找之后，人们在吉萨大金字塔前的狮身人面像下找到了[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe]，正像疯子一样挖掘，坚信狮身人面像下面有一个秘密的房间，里面藏着数千年的知识。自从那以后，[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis]的情况几乎没有好转。这个地方对[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]的影响真的很不好。"
 lepsius.465.f: "我们的领队毫不掩饰[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]来自哪里、说什么语言、喜欢什么食物以及[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]认为哪种文化更加优越的态度。[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]对当地人的侮辱日益加剧，无论是针对招募来的工作人员还是萍水相逢的路人。在穿越不同的村庄时，[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]已经形成了将村长当做下属的态度。即使是最好客的姿态对[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]来说也不足够。当地政府的不同部门已经对[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]的傲慢和诽谤行为提出了几次投诉，我们的探险队日益成为国家的负面宣传活动。"
 lepsius.467.f: "基督教在中东地区的遗产已经所剩无几，但分散在此的科普特、马龙、迦勒底和亚美尼亚基督徒社群存在了数百年。[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]本来没有宗教意图，但昨晚[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]让当地的牧师带[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]去了一座被遗忘的教堂。从考古和历史的角度来看，这座教堂意义非凡。牧师后来展示了一个被认为已经遗失的教父遗物。由于已经很晚了，营地也很远，考古队领队在那里住了一夜，直到第二天早上。[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]做了一个梦，这个梦一直让[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]无法安心，但[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]几乎从来不谈论这个梦，这个梦让[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]想在某些方面改变自己的生活。牧师已经给了[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]一部分失落的遗物来加强[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]的信仰。"
 lepsius.467.g: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]经历了幸福的幻象吗？"
 lepsius.471.g: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U]应该慢慢来，尽可能多地了解这个地方的情况。"
 lepsius.471.h: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U]可以在那里多待一段时间，前提是[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]要带来一些文物。"
 lepsius.471.i: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U]被允许来访这个地方，但仅是允许。"
 lepsius.472.f: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]对人员和物资的巨大损失有一个令人难以置信的解释。听完让人愤慨又羞愧（特别是对于一个开明的人来说）。探险队队长声称，[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe]和[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis]的队员迷失了一个星期，然后偶然发现了一个陌生的山谷，周围是尤卡坦森林高山。他们希望找到一个未知的玛雅遗址，于是制定了一个探索山谷的计划（事后觉得是一个巨大的错误）。因为山谷里有可怕的怪物，强大的蜥蜴。事实上，[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe]向我们解释说，已经灭绝的恐龙在这个“失落的世界”生活了数百万年，因为与世隔绝而得以生存。这些“恐龙”让探险队感到恐惧，甚至咬伤了几个探险队员。在逃亡中，[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe]不得不放弃大部分装备。现在[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe]恳求我们为整个探险队重新配备装备。我们不知道为什么[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe]认为[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe]可以用这个童话般的故事来打动我们。相反，我们对[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe]是否仍然是探险队队长合适人选产生了怀疑！"
 lepsius.472.g: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe]是说恐龙吃掉了我们的探险队员吗？！"
 lepsius.501.h: "让[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]进一步调查。"
 lepsius.506.f_engine: "很遗憾，我们的考古探险队成员几乎没有时间更详尽地探索不知名法老的墓穴。当我们的考古学家搜索墓室时，天花板上的石块掉落，沙子从上面的裂缝中渗透而进。显然，这里的地质环境比预期的更多孔，脱落的巨石使墓穴岌岌可危。[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]在危难中保持了镇定，[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]坚持留在墓道中指挥，并为所有还能活动的人争取了把石棺带出来的空间。这是一个壮丽、独一无二的发现，它可能会弥补我们失去其余发现的遗憾。毕竟，整个皇家墓穴在几分钟内就可能会崩塌……"
 lepsius.506.f_muscular: "当我们的考古队在[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]的带领下进入真正的墓室时，历史将被改写。除了一些祭祀品罐和一只木乃伊狗之外，还有一个特别的惊喜在等待着他们：事实上，石棺和不知名法老的木乃伊仍然安息在他3000多年前被埋葬的地方！身强力壮的帕多瓦人再度伸出援手，他抬起了从花岗岩制的椁中抬出了木棺和木乃伊。虽然我们的考古学家喜出望外，但悲剧随后发生了。午餐休息期间，团队正在画廊分享面包时，墓室中传来了可怕的嘎吱声和破裂声。让助手和领队惊恐的是，这位巨汉也休息了一下，不小心坐在了石棺上。现在，国王的木乃伊和棺材只剩下了一些碎片。"
 lepsius.532.f: "武官多次警告我们不要进入库尔德领土。此前的探险队在这个地区很少得到当地人的好感。库尔德人是自由、高贵的民族，但也相当倨傲。入侵他们的领土可能会惹恼他们。因此，[SCOPE.sCharacter('lepsius_military_attache').GetFullName]坚持武装多名士兵，以便更有效地应对不愉快事件。尽管军官预料到最坏的情况，[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]却希望尽快找到库尔德部落，以便与他们协商并找到一个友好的解决方案，并快速将拉马苏收入囊中。[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]计划将队伍一分为二：无武装的人、未经过训练的搬运工、大部分供应和设备应留在后方，而[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]则带着武官前往，以保持灵活机动并高效地搜索拉马苏。然而，武官表达了他的担忧，他认为如果库尔德人发动攻击，远征队的剩余部分将孤立无援。"
 lepsius.534.f: "探险队队长意识到[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]试图争取本地部落的好感的行动产生了南辕北辙的效果，但为时已晚。一声尖叫传遍帐篷，有些下属本能地已经把手放在武器上。从那时起，空气中弥漫着紧张的氛围，武官看到了[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]的担忧被证实：这场冲突不能通过外交手段解决，只能诉诸暴力。他只有很短的时间指挥士兵列队。一些研究助手已经坚持要打包行李，尽可能远离现场。"
 lepsius.551.f: "那天，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting]工作到很晚。希腊的烈日灼烤着[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]头顶，山间与海上的微风全然沉寂。为那些枯燥乏味的考古器物编制目录，是一项无聊透顶且旷日持久的苦差。发现的所谓文物，往往不过是些微不足道的碎玻璃碴与吃剩的鸡骨——在这位考古学家看来，这与其说源自米诺斯饮食文化的遗风，不如说是挖掘帮工们粗率用餐的产物。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]怀着满心的疲惫与自嘲，在一片尚鲜少有人涉足的广阔宫殿废墟间信步游荡。有人最后一次见到[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting]，是在一座被断定为青铜时代晚期或古风时代早期的建筑附近。骤然间，一声轰然巨响响彻克里特的山丘，压过了嘶鸣的蝉噪，惊起了栖息的鸽群——这位考古学家踏穿了地面。随即，尽管展开了连续两天的搜寻，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]却再也没有被找到。"
 lepsius.552.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]恢复意识时，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting]发现自己正处于一座陌生的地下建筑中。"
 lepsius.552.f: "这恐怕是这位考古领队一生中最为诡异的遭遇了。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U]原以为[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]只是跌进了一个深约一米的兔子洞；可那竖井极其狭窄，混杂着泥沙与泥浆，像流沙一般将[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]死命往下拽，过程煎熬难耐。根本不可能有人跟着[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]下来；也根本看不清任何东西，因为阳光完全无法顺着竖井照到[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]身上。重重坠地时，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U]感到手掌按在了平整的石板上。借着[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]打火机的微光，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]辨认出光滑的凿墙，上面还死死地粘着些许残漆。那是来自某个失落文明的湿壁画，起初[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]还想将其断定为米诺斯文明的遗存，但很快就再也摸不准它们究竟属于哪个世纪了。显然，此地的米诺斯与迈锡尼风格早已水乳交融，难分彼此。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting]环顾四周，发觉自己身处一间酷似正殿的大厅里。这位考古学家缓缓地摸索前行，只听得自己的足音在空旷的黑暗中声声回荡。紧接着，便是无尽的、没有任何雕饰与器物的走廊；莫辨的岔路；空寂的石室；以及森然的死胡同。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting]终于醒悟，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]已失陷于一座无法窥得全貌的古老迷宫之中。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]越是觉得正一寸寸地勘探着它，它反而变得越加庞杂，越发深不可测……"
 lepsius.553.d: "经过一段时间的试错，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting]意识到[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]已经回到了迷宫的起点……"
 lepsius.553.f: "双腿沉重，头脑昏沉——[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]会不会之前就来过这里？[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]从上方坠下时落在石板上的那个位置，是绝不会认错的。随着恐惧渐增，一个问题浮现出来：[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]在这里待了多久了？过去了多少个小时？也许已经好几天了？而[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]能否在饥饿和干渴将[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]折磨至死之前找到答案……？"
 lepsius.554.d: "在迷宫中，迷路者遇到了一幅马赛克。问题是，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]要选择两条走廊中的一条，还是走楼梯。"
 lepsius.554.f: "经过千篇一律的走廊和楼梯后，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting]到达一个较大的房间。一条走廊通向左右两边，而一部楼梯贯通上下。地板上的一块马赛克吸引了[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]的目光。海洋场景证实了墙壁可能起源自米诺斯时代的论点，而罕见的珠宝见证了迈锡尼的影响。所描绘的神灵是古希腊万神殿的前身。在海豚的环绕下，众神之父宙斯将手臂伸向空中的雷电。德墨忒尔和珀尔塞福涅指向西方，手中拿着玉米穗；阿尔忒弥斯在两只狮子的陪伴下向东看。最后是波塞冬，迈锡尼人的众神之父：三叉戟让大地在他脚下颤抖。"
 lepsius.557.d: "在这座大厅里，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting]再次遭遇了一个谜题。"
 lepsius.557.f: "四条岔路。四幅石刻。在每条岔路的上方，这位身陷迷宫的人都能看到凿刻在石头上的轮廓。过了好一会儿，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]才恍然明白，这些图案刻画的乃是诸岛的岸线。凭借[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]在克里特岛积累的经验，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]得以将它们大致分辨开来。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U]判定，第一条通道指向罗得岛；第二条指向提洛岛；第三条指向优卑亚岛；第四条则指向纳克索斯岛。遗憾的是，除此以外，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]再也找不出任何旁的线索了。"
 lepsius.558.d: "几天后，我们的挖掘队在一个悬崖附近找到了失踪的考古学家。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting]已经完全筋疲力尽了——从那时起，精神也一直处于混乱状态。"
 lepsius.558.f: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting]在过去这72小时里究竟身在何处，至今仍是一个未解之谜。人们是在距实际发掘地点数英里之外的地方发现[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]的——当时[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]的状况惨不忍睹，仿佛刚刚遭受了一头野兽的疯狂撕咬。尽管[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]现已恢复意识，但随队医生断定，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]的头部必然曾遭到猛烈撞击。至少，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]的语言中枢显然已陷入了混乱。每当被问及那几天的经历，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]就会反复陷入一种近乎谵妄的癫狂呓语中。目前，全队已被迫撤离该区域，因为他们生怕[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]会不顾一切地再次踏上那条探寻之路——只为证明自己所言非虚，并未失心疯。"
 lepsius.559.f: "警方于昨夜对这位前任考古学家的遗体进行了查验。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting]之所以进入公众视野，主因是[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]曾在克里特岛的一次发掘中离奇失踪，数日后又在一个同样离奇的状况下被寻回，此后便罹患了精神疾病。自那时起，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U]就已不再是原来的那个人了。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U]惧怕独处，总觉得阴影之中潜藏着怪物。到了末期，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]唯有在灯火通明中才能勉强入睡，因为层出不穷的梦魇令[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]彻夜不得安宁。在[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]生命的最后时光里，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting]博士不仅对药物产生了严重依赖，身与心皆肉眼可见地走向崩溃，更因其在克里特岛研究上提出的种种荒诞怪论，而饱受学术同僚的讥讽与耻笑。遭学界鄙弃，被报章嘲讽，连形貌都萎缩成了昔日自我的一幅丑陋讽刺画——调查人员一致推断，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]是亲手结束了自己的生命"
 lepsius.560.f: "起初，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting]博士颇感惊异，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]最终重见天日之处，竟距先前的发掘现场如此遥远。数小时后，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]才终于与挖掘队的其他成员重新会合，这让[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]同事们如释重负。当着在场众人，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]报告了[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]的发现，令举座皆惊——这确是一项足以重塑我们对古希腊神话既有解读的宏伟发现。[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]在那里找到的神秘织物球，使得最终的结论变得唯一且不可辩驳。"
 lepsius.561.f: "阴霾笼罩着尤卡坦的森林和山丘。雾气渐渐散去，探险队一直在野性十足的丛林中前进。远处传来美洲豹的吼声，空气中蚊虫嗡嗡作响，热病已击倒了好几位帮手。如今只剩三人小队和几名脚夫，[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]发出信号，让大家休息一会儿。整个丛林城市都是带有雕刻的石碑和岩石。考古学家的目光飞快地扫过被毁坏的、长满青苔的阶梯，是一个玛雅金字塔的古老废墟，很快其中一个人举起手向[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U]喊道：“先生！我想我找到了入口！”"
 lepsius.562.f: "探险队队长坚持要单独进入金字塔。在入口处，一个曾经的探险家的骸骨倒在那，似乎在警告人们不要太过大意。来到一堵布满玛雅象形文字的巨墙时，四个象形文字从墙上突出来，当考古学家简单地触摸它们时，发现它们可以被压在墙上。但哪个符号才是正确的呢？四种元素伴随着这些符号：水，象征着羽蛇神；空气，伴随着象征世界角落的三块石头；土，玉米植物从其中出现；火，伴随着美洲豹和一个战士形象。探险队队长确信，错误的回答可能意味着[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis]的死亡……"
 lepsius.563.f: "脚步声在狭窄的通道中回荡。火把的光亮下，墙壁上的雕刻若隐若现，树根穿过倒塌的门楣。前方豁然出现一间石室——中央低矮的祭坛上，神像在幽暗中泛着微光。[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U]左手掂量着装满沙子的布袋，右手估测着神像的重量，缓缓稳住[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis]呼吸。干净利落的一换——然后撤离。"
 lepsius.564.d: "或许是[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]误解了谜题——又或者建造者根本不信任任何人。雷声隆隆；一个石球挣脱束缚，沿着走廊朝[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]猛冲而来。"
 lepsius.564.f: "机关已动，布袋静置祭坛之上。一时间安静万分，随后沉闷的震颤渐起，尘埃从穹顶落下——那竟是翻滚袭来的巨型圆石！"
 lepsius.565.d_wrong: "当[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]跌跌撞撞地走进光线中时，更糟的意外正等着他：营地已被占领，对方要求交出神像——否则就要了[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis]的命。"
 lepsius.565.f_right: "这是一场智力的较量，而非蛮力的比拼。选择那位“执掌时日”的神明基尼奇·阿豪——让[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]避开了机关陷阱。[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]毫发无损地穿过重重机关，夺得神像迅速撤离；此时传来消息说有敌对队伍正在逼近，团队当即撤离了现场。"
 lepsius.565.f_wrong_right: "当[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]逃离通道时，[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe]绊到树根然后被打开，巨石呼啸而过砸进丛林，砸死一群试图埋伏的人。至于是不是，[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U]无法证实，但现场留有外国对手的痕迹，对方想让我们替他触发这些机关。无所谓——该继续前进了。"
 lepsius.565.f_wrong: "最后一跃，[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]勉强到达金字塔的出口，落在丛林的草地上。一个带有[SCOPE.sCountry('lepsius_archaeological_rival').GetAdjectiveNoFlag]柔和口音的声音响起，面前是一位身着白衣的人，嘲弄着[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]的逃亡之旅，“很高兴见到你，但我认为，这件古董应该被比你更合适的人拥有。”搬运工被部落民屠杀殆尽，[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U]不得不束手就擒。“可惜霍韦托人没有我这样了解你”，是他唯一的回应。我们的考古队长被允许离开，但不得不交出神像。"
 lepsius.581.d: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName]提出了一个与本人殷切相关的建议，[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]想证明”失落世界“确实存在，从而恢复自己的名誉。[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U]正在筹集资金，组织一次私人探险。"
 lepsius.581.f: "自尤卡坦探险队的大部分成员神秘消失后已过数年。[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName]沦为了学界笑柄。报纸上的漫画把[SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim]描绘成一个沉迷于“恐龙故事”的疯子。这场创伤在其心中刻下了不可磨灭的伤痕，使[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]执着于向世界证明自己所说的山谷确实存在。据说[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U]已经倾尽家财，成立了一支探险队。当然，[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]还要求国家支持[SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]完全失去理智的旅程。我们的专家建议禁止这种自杀式的探险——我们尚且记得上一次尤卡坦之旅的结局。因此，一些言论希望完全禁绝此种探险活动。然而，这只会使[SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]的精神状态恶化。还有人认为应该让[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]离开，但不要有进一步的官方干预；毕竟，没有人愿意与一个明显精神错乱的人的探险扯上关系。也有极少数人甚至想要对这种狂行倾囊相助。他们认为，我们对[SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]的现状负有一定的责任……"
 lepsius.581.h: "愿[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]猎取[SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]的恐龙。"
 lepsius.582.f: "隐没于尤卡坦丛林中数月之后，筋疲力尽的探险家在省会梅里达再度现身。[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]又一次失去了许多助手，其他队员也都处于狼狈不堪的境况。然而，除了几位目击者外，有赖于现代摄影术的发展，[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]还带来了一件令人信服的证据。数位学者一致同意照片的真实性，那疯狂的故事如今拥有了毋庸置疑的证明——这些照片上清晰可见的正是翼龙与草食的雷龙！人民将[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName]视作偶像，学界为之震惊，而我国政府则沦为一群固步自封的愚氓，竟拒绝让一位民族英雄获得[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]应有的名声！"
 lepsius.583.d: "我们已经几个月没有[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName]的消息了。显然[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]已迷失在尤卡坦森林的深处。"
 lepsius.583.f: "也许某一天此事可以被写成一出悲剧。生前不久几近疯狂的[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName]寻找所谓恐龙谷踪迹的旅程显然已走到终点。疾病与敌对的玛雅部落将[SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]的探险队屠杀殆尽，少数幸存者之一报告称[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName]最后宣称重新发现了山谷所在的高原坡地。但最后的队员弃[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]而去，返回家园，无人知晓[SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim]的结局。然而，我们有理由相信，这位孤身一人，形削骨立的探险家不大可能幸存。"
 lepsius.583.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U]真的不是坏人。确实是一个糟糕的探险家，但不是一个坏人。"
 lepsius.584.f: "实际上，每个人都预料到这次旅行不会太长——要么是因为糟糕的环境，要么就是爆发兵变而中途而返。但一早上[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName]就一直带领部队穿越危险重重的尤卡坦森林，接连好几天，就像一个狂热的勘探者，似乎[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]认识每一棵树和每一块石头。其他探险队成员认为这要么是疯了，要么是一个精心策划的计划的一部分，以欺骗他们，给他们带来虚假的希望。但现在，在一个广阔的高原斜坡上，探险队眺望着[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]谈论了许多年的山谷，一些人正在修改他们的观点。当传说中翼龙的尖叫声在空中回荡，环绕在探险队的耳边时，所有的疑虑都被打消了……"
 lepsius.586.f: "其实[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName]应当心满意足，[SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis]的一切宣称都已得到证实，而探险队已经收集到广泛的证据，足以在国内引发轰动。但在详尽探索失落世界后，[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]发现自己并非踏足这座山谷的首位人类。事实上，大概1500年前，这一区域就有大规模的玛雅人活动，显然一座迄今未知的玛雅城市居民会定期来到这座山谷。[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName]推测人祭的传统或许就起源于此。无论如何，强有力的证据表明山谷具有某种宗教职能。一位合作伙伴最近挖掘出几件玛雅文物，表明他们的发现可能比几只散居的巨大蜥蜴更加轰动。但问题是，疑似的玛雅遗址坐落在恐龙栖息地的中央！因此大多数探险队员坚持立刻掉头回家，而非迎接下一个自杀式的任务。"
 lepsius.587.f: "除了仅有的一位幸存者外，探险队全军覆没。这位年轻的大学研究助理身受重伤，因此来自尤卡坦的电报表示他无法提供太多信息。显然，我们的探险队长在试图调查失落世界的玛雅遗址时犯下了悲惨却性命攸关的错误，令几乎所有队员付出了生命的代价。这一事件引起了极大的震动，所有前往尤卡坦的非严格意义上的考古旅行都被无限期禁止。"
 lepsius.587.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U]自找的……可怜"
 lepsius.588.f: "羽蛇神——玛雅人将其唤作库库尔坎，而阿兹特克人则称之为克察尔科亚特尔。玛雅人知晓这座山谷的存在是否得自巧合？失落世界与库库尔坎崇拜是否有所关联？[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName]尚且无法笃定。但[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]已经在暴龙的巢穴之间发现了一处遗忘已久的圣地，它代表着在这个国度被称作库库尔坎的羽蛇。一颗镶嵌在护身符上的神秘宝石光彩夺目，它如此摄人心魄，以至于考古队长将其称作“库库尔坎的宝石”——传说中这位神灵拥有一颗可以掌控风向的宝石。这或许是中南美洲最伟大的考古发现之一。"
 lepsius.588.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U]做出了智慧的选择。"
 lepsius.589.d: "由[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName]率领的失落世界探险队已经返回。[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U]和[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U]的团队被人们誉为英雄。"
 lepsius.589.g: "荣耀归于[SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim]！"
 lepsius.803.d: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]已经完成了行前准备。[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe|U]将今日起程以在建立起来的发掘现场精进知识。"
 lepsius.803.f: "我们的考古学家预计缺席时间将达一年左右，但具体情况可能会有所不同。[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHis]工作结束时，[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe]将开辟一个新的挖掘现场，其质量可能会有所不同。[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe]还将发现以前未知的考古遗址的参考资料。"
 lepsius.811.f_vok: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]报告说[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe]在帝王谷发现了一个小陵墓。盗墓者显然已经偷走了大量物品，上面的壁画表明它在晚期古典也为人所知。探险队领导决定在那里进行挖掘，希望以后能够发现更多内容。"
 lepsius.811.f_ass: "亚述的发掘从一开始就困难重重。花费几天，[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]仍然找不到一个好的挖掘地点，所以[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe]只能前往下一个地点。到目前为止，他们只发现了一个神殿的地基，但神殿可能曾经是一个更大的建筑群的一部分。"
 lepsius.812.f_bab: "考古学家[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]获得了好消息，[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHis]得知在美索不达米亚还留存着巴比伦伟大辉煌的见证。当他补充了淡水供应后，当地人告诉[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHim]一个奇怪的遗址，虔诚的穆斯林因其异教源头而避之不及。事实证明，这是一座楼阁废墟的余迹。这个遗址保存完好，根据最新的报告，我们的考古学家甚至已经发掘出了第一批文物。"
 lepsius.813.f_vok: "今天早上收到了一条轰动性的电报。[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]报告说[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe]发现了一位女王的陵墓。死亡配偶的身份还不完全清楚，但据初步报告称，墓室保留得出奇地完好。壁画和珍贵的文物提供了有价值的古埃及洞见，这些内容已经被人们遗忘了很长时间。"
 lepsius.813.f_bab: "巴比伦城门和城墙的传说已经流传了数千年。但当它们出现在你面前时，感觉将完全不同。起初，[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]走过一堵墙又一堵墙，发现了这座失落城市巨大的规模，[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe]简直无法相信。这个发现将使我们忙碌数年。"
 lepsius.813.f_ass: "除了作为主要的军事强国之外，亚述人还因其花园而闻名。甚至有人声称著名的巴比伦花园实际上位于亚述首都尼尼微。在挖掘一个宫殿建筑和相邻的露台时，[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]亲眼见证了亚述文化的辉煌。博物馆管理层感到欣喜。"
 lepsius.2191.t: "印加浴场出土"
 lepsius.2191.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]发掘出了一个壮观的遗址——一个印加帝国的浴场。目前推测这个浴场是用于宗教仪式的。"
 lepsius.2191.f: "“真有趣，我们挖出了一个浴场，而现在自己也需要洗个澡了。”"
 lepsius.2191.g: "现在洗个澡该真不错！"
 lepsius.2192.t: "发现印加的钻孔头骨"
 lepsius.2192.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]有了一个奇怪的发现。在一处印加遗址的发掘期间，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]教授找到了相当数量的骨骼化石，其中一个颅骨引起了[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]的特别注意。这个颅骨上有一个特意钻出来的孔洞，并且这个人在这个钻孔手术结束后又活了下来，因为我们发现颅骨有愈合的迹象。"
 lepsius.2192.f: "“我确信那一定是一场人祭！你认为呢？”"
 lepsius.2192.g: "外星人！"
 lepsius_recent_excavation_inspection_modifier: "近期考古勘察"
 lepsius.2193.t: "高山上的印加木乃伊"
 lepsius.2193.d: "在与[SCOPE.sCharacter('lepsius_mountaineer_character_scope').GetFullName]一同进行的[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]地区的考察中，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士有一个骇人的发现——在一座山上，他们发现了一个小女孩的遗骸——木乃伊。看起来她似乎是个用于安抚神灵的童女祭品。尽管这让人非常沮丧，但我们仍可以籍此了解印加帝国。"
 lepsius.2193.f: "“那天很冷，凛冽的山风撕扯着我们的衣服，我们几乎什么也看不到。当我们注意到那具尸体时，觉得那是一位登山者，在这种无法忍受的糟糕处境下丧命。但很快我们就意识到，那不是什么登山者，是个小女孩。”"
 lepsius.2193.g: "真令人难过……"
 lepsius.2194.t: "印加遗迹"
 lepsius.2194.d: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士在[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]的偏远地区发现了许多印加帝国时代的遗迹。大部分遗迹已经变成了荒芜废墟，并在里面发现了不少产自欧洲的物品，这让人们想到这些定居点可能是被西班牙人劫掠摧毁的。除此之外并无更多的发现，任何有价值的东西都看起来被拿走了。"
 lepsius.2194.f: "“很久以前，这些遗迹肯定是经过精心建造的定居点，它们甚至能经受地震的考验。可是……西班牙人似乎比地震更强大。”"
 lepsius.2194.g: "没有黄金？那我们何必为此大动干戈？"
