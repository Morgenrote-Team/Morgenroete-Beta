 lepsius.321.t: "编目完成"
 lepsius.321.d: "经过数月艰苦而精细的整理、分类、编号与评估工作，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士终于重获行动自由。"
 lepsius.321.f: "“说到底，我们不过是历史的簿记员——只可惜，我们的账本永远赤字。我们将无知分门别类，制成表格。唯一的慰藉是：至少我们不像档案管理员，偶尔还能见见天光。”"
 lepsius.321.g: "你若沉溺于此太久，连自己也将成为博物馆角落的一份收藏。"
 je_lepsius_cataloging: "考古编目"
 je_lepsius_cataloging_reason: "考古编目，是对发掘文物或馆藏进行系统性建档的精密流程。每件器物都必须绑定多维背景数据：发掘坐标、地层关系、出土状态、物质属性、尺寸规格、断代依据。\n\n其耗时远超田野勘探，正因如此，考古团队往往经年累月方能转战新遗址。然而，能履行如此激动人心的职责，哪位考古学者不会心生自豪？"
