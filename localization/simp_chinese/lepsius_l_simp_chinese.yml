 lepsius_mascapaicha_knowledge_modifier: "长者的智慧"
 je_lepsius_mascapaicha: "解密结绳文字"
 je_lepsius_mascapaicha_reason: "在研究中，结绳文能回答的问题远比它提出的要少得多。唯一能确定的是：这是一种呈序列式的地址命名，序列中的数组代表不同部落的地址，地址的组合又呈现出一条路径。换言之——这其实是某种藏宝图。印加人如此小心翼翼，到底在隐藏什么？只有经验丰富的考古学家才能究明这样的谜团。正因如此，我们要组建一支不同以往的精锐队伍，除了考古学家和军官，还要再组上一名飞行员，带我们直飞安第斯山脉。"
 je_lepsius_mascapaicha_success: "已破解结绳文字。"
 lepsius_decode_quipu_button: "破解结绳文字"
 lepsius_decode_quipu_button_desc: "拥有一位经验丰富的考古学家或著名考古学家以及一支熟悉美索不达米亚文物的团队方可成功破解结绳文字。"
 lepsius_decode_quipu_tt: "一段时间后，结绳文字将被破解。"
 lepsius_decode_quipu_done_tt: "破解结绳文字。"
 lepsius.474.t: "神秘的结绳文字"
 lepsius.474.d: "秘鲁向导带着探险队，来到了一处连许多当地土著都不知晓的神秘地址。在一座废弃了至少四百年的寺庙废墟中，他们发现了些奇怪的东西。"
 lepsius.474.f: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]立刻就注意到了这地方的不寻常之处。这座寺庙被废弃的时代似乎是在西班牙征服之前，让建筑坍塌的也并非战争，而是时间。粗略地看一番后，结果比较令人失望，这里找不到多少在弗朗西斯科·皮萨罗抵达之前时期，关于印加人生活的考古证据。直到有个助手在祭坛状的石台上发现了一个散发不详气息的物件时，探险队才终于算是完成了考古任务——这是一串绳结，又或叫奇普，是印加人用于沟通数字，统计数据，记录日期的方式。它是如此复杂，以至于破译很难在现场进行。"
 lepsius.474.g: "带回国内，仔细研究。"
 lepsius.571.t: "结绳文字的秘密"
 lepsius.571.d: "就连国内的专家学者也对秘鲁探险队带回的结绳文字一筹莫展，科研人员认为它不止是几个数字记录那么简单。"
 lepsius.571.f: "在经过更加详实的研究，并与先前结绳体系进行比对后，来自多所大学和考古博物馆的研究人员证实了奇普来源于一个我们已知的结绳体系。到这一步为止，事情似乎没什么意义，这可能单纯是张纳税清单，又或只是一份人口普查记录。但实际上，它是一组地址的集合。地址的名称考证自其他的结绳文字记录，但与其说是地址，不如说是某些部落的定居点。最普遍的理论认为，这类似于一种方位指南。至于它会将我们引向何方，目前尚不清楚。"
 lepsius.571.g: "这串结绳……是一幅地图？"
 lepsius.572.t: "马斯卡派查的远征"
 lepsius.572.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]不仅认为[SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe]已经探明了密码地图的指向，[SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe]还找到了前去的方法。同[SCOPE.sCharacter('lepsius_pilot_scope').GetFullName]、[SCOPE.sCharacter('lepsius_archaeologist_attache').GetFullName]还有[SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe]一道，去往安第斯山脉海拔最高的地域，执行这项特殊任务。"
 lepsius.572.f: "从奇普结绳中发现这个秘密非常困难，但现在已经可以确定这些记录是地理性质的，并且指向一个遥远到难以抵达的场所。[SCOPE.sCharacter('lepsius_pilot_scope').GetLastName]指出，很难指望在如此荒凉的地带能找到一条供飞机重新起飞的跑道。不过，军事记录显示在目标地点附近就有一处方便的高地，只需步行约10英里。在飞往秘鲁的途中，[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授向两人介绍了[SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHis]关于这处地点的理论。结绳所在的建筑很可能建于瓦伊纳·卡帕克皇帝时期，即印加帝国在瓦斯卡尔和阿塔瓦尔帕的内战中陨落之前。他推测遗址中可能保存着统一而伟大的印加帝国土崩瓦解之前的价值连城的遗存。阿塔瓦尔帕一直将其藏匿于此，因为许多人将他视作篡夺弟弟瓦斯卡尔皇位的僭主。瓦伊纳·卡帕克的冠冕——马斯卡派查——是萨帕·印卡皇权的象征，但长久以来被认为已经遗失。"
 lepsius.572.g: "这绝对是重大考古发现。"
 lepsius.573.d: "[SCOPE.sCharacter('lepsius_pilot_scope').GetFullName]在目的地附近找到了合适的降落地点。然而，在前往推测中马斯卡派查所在地的途中，三人很快遭遇了惊人的发现。"
 lepsius.573.f: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]像个寻水术士一样把绳结攥在[SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHis]手里，带领小队来到了半山腰。石阶像楔子一样高，令人眼花缭乱。三人爬上最初的几米后，发现了一条杂草丛生的小路。考古学家简单检查了一下，没有发现任何疑点。这些精确放置的长方体显然是印加时代的产物。在飞机上看不到雾，但他们沿着印加道路进入的山谷却被浓雾笼罩。他们跋涉了一英里又一英里，突然，[SCOPE.sCharacter('lepsius_pilot_scope').GetLastName]有了发现。有什么东西在浓雾中闪烁着光芒。那是金子，是纯金，一大块黄金！[SCOPE.sCharacter('lepsius_pilot_scope').GetLastName]离开小路走了过去。[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]希望叫[SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHim]回来，因为那可能是一处陷阱，分散注意力会带来危险。然而，[SCOPE.sCharacter('lepsius_attache_scope').GetLastName]仍然举棋不定。"
 lepsius.573.g: "一点金子有什么坏处？"
 lepsius.573.h: "只有谦卑者才能寻获马斯卡派查。"
 lepsius.574.d: "三人组继续上路，但[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]突然发现了什么，停住了脚步。[SCOPE.sCharacter('lepsius_pilot_scope').GetFullName]和[SCOPE.sCharacter('lepsius_attache_scope').GetFullName]走出几米远，才发现教授不见了。"
 lepsius.574.f: "这是一段铭文。铭文？安第斯山脉里的金石学材料？这个社会的结绳记事系统可是没有字母表对应的，单单这一点就是不可思议的发现了！玛雅人依靠象形文字，阿兹特克人的法典以图画符号为基础。但眼前的是一种像字母一样带有音调的字体。这怎么可能呢？但令[SCOPE.sCharacter('lepsius_archaoelogist_scope').GetLastName]更为震惊的是：\n[SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe]能够读得懂。\n无需事先了解，也不必学习，甚至不需要理解这一切是如何发生的。[SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe]像是伸出手指碰了一下刻下的文字酒席是欧俄其中的内容。[SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe]没有阅读铭文，是铭文在对[SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHim]说话。[SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe]沉浸其中的时间越久，就越难以承受[SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe]学到的知识的重负。因为这里储存着千百年来南美洲与中美洲的一切知识。完全沉浸在这伟大发现中的[SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe]没注意到武官正在摇晃[SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHim]的肩膀，试图将[SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHim]拖走——飞行员站在一旁，不知所措地看着[SCOPE.sCharacter('lepsius_pilot_scope').GetHerHim]眼前这荒诞的一幕。"
 lepsius.574.g: "知识无罪。"
 lepsius.575.d: "一行人来到一座建筑前，这座建筑看起来与曾经发现神秘结绳的神庙并无二致。他们在[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]的带领下进入建筑。面前的墙上悬挂着一个恶魔的恐怖图像。"
 lepsius.575.f: "弥漫在未知山谷中的永恒迷雾也笼罩着神庙。它覆盖在墙壁和雕像上，如同一件华服。[SCOPE.sCharacter('lepsius_pilot_scope').GetLastName]点燃了一支香烟，为迷雾增添了一丝尼古丁的味道。[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]在周围寻找线索。但[SCOPE.sCharacter('lepsius_attache_scope').GetLastName]却一无所获。[SCOPE.sCharacter('lepsius_attache_scope').GetSheHe]像被催眠了一样，面对面地站在恶魔面前。[SCOPE.sCharacter('lepsius_attache_scope').GetHerHis]的眼睛注视着原始生物狰狞的面孔。风在[SCOPE.sCharacter('lepsius_attache_scope').GetHerHis]耳边低语。风变成了话语，低声要求[SCOPE.sCharacter('lepsius_attache_scope').GetHerHim]跪下。[SCOPE.sCharacter('lepsius_attache_scope').GetSheHe]站立在圣地上。这是一位[SCOPE.sCharacter('lepsius_attache_scope').GetSheHe]须向其俯首的神灵的领地。他是世界的主宰。他使乞丐成为国王，把世界上的王国托付给他们。他会令世界上所有的统治者，无论是王公贵族还是民选领袖，都在[SCOPE.sCharacter('lepsius_attache_scope').GetHerHim]面前俯首称臣。“我要把这些王国的权力和荣耀都赐给你；因为它们都属于我，为我任意处置。若向我跪拜，一切都将属于你。”\n烟雾在[SCOPE.sCharacter('lepsius_attache_scope').GetLastName]周围缭绕。飞行员语无伦次，试图让[SCOPE.sCharacter('lepsius_attache_scope').GetHerHim]清醒过来，而考古学家只是在一旁漠视。"
 lepsius.575.g: "想要得到马斯卡派查，你需得统治。"
 lepsius.576.t: "马斯卡派查"
 lepsius.576.d: "他们来到山谷后，雾气首次散去。[SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]教授打开的密室里只有一个基座，以及耸立在上面的影子。那是一个没落的帝国的影子，是流散的知识的影子，是失落的黄金的影子。它是萨帕·印卡的皇冠——马斯卡派查的影子。"
 lepsius.576.f: "马斯卡派查是帝国的象征，只有作为库斯科国王和塔万廷苏尤皇帝的萨帕·印卡才能佩戴。它是由多层彩色绳绦编织而成的头饰，上面悬挂着latu，即用最细的红色羊毛编织而成的流苏，红色流苏固定在金管上。它用金线和一束带有两三根直立羽毛的山巨隼（一种西班牙文称为corequenque的神鸟）装饰，是印加帝国最高政治权力的体现。在一些仪式上，萨帕·印卡会手持马斯卡派查，头戴战争头饰（羽毛装饰的头盔）。"
 lepsius.576.g: "这一定是瓦伊纳·卡帕克的皇冠！"
 lepsius.577.t: "安第斯山中的死亡"
 lepsius.577.d: "安第斯山脉的特殊行动再无回音，没有生还者的迹象。看来，对马斯卡派查的搜寻造成了致命的后果。"
 lepsius.577.f: "科学家和特工寻找安第斯山脉探险的进展时无法获得任何线索。只有失踪机组人员的飞机仍然能够证明它确实发生过。当地人说，着陆点离一个被诅咒的山谷很近。被诅咒是因为进入山谷的人都会在那里消失。在那里，他们会受到恶魔的诱惑并悲惨地死去。科学家推测，不明植物的孢子、硫磺烟雾或其他气体可能是造成导致幻觉的雾状霾的原因。"
 lepsius.577.g: "他们成了自己脑中幻象的受害者吗？"
 lepsius_specialization_egypt_tech: "埃及学"
 lepsius_specialization_egypt_tech_desc: "对古埃及的关注使我们的考古学家从一开始就具备“埃及考古学”特质。此外，在埃及的每一次发掘，我们每年都会额外获得一件文物。"
 lepsius_specialization_mesopotamia_tech: "亚述学"
 lepsius_specialization_mesopotamia_tech_desc: "对美索不达米亚的关注使我们的考古学家从一开始就具备“美索不达米亚考古学”特质。此外，在美索不达米亚的每一次发掘，我们每年都会额外获得一件文物。"
 lepsius_specialization_aegean_tech: "爱琴海考古学"
 lepsius_specialization_aegean_tech_desc: "对爱琴海的关注使我们的考古学家从一开始就具备“爱琴海考古学”特质。此外，在爱琴海的每一次发掘，我们每年都会额外获得一件文物。"
 lepsius_specialization_precolumbian_tech: "美洲考古学"
 lepsius_specialization_precolumbian_tech_desc: "对美洲的关注使我们的考古学家从一开始就具备“美洲考古学”特质。此外，在中南美洲的每一次发掘，我们每年都会额外获得一件文物。"
 lepsius_has_archaeologist_egypt_specialist_tt: "[GetPlayer.GetName]的[concept_lepsius_archaeologist]拥有特质#V 专长：埃及考古学#!。"
 lepsius_has_archaeologist_mesopotamia_specialist_tt: "[GetPlayer.GetName]的[concept_lepsius_archaeologist]拥有特质#V 专长：亚述考古学#!。"
 lepsius_has_archaeologist_aegean_specialist_tt: "[GetPlayer.GetName]的[concept_lepsius_archaeologist]拥有特质#V 专长：爱琴海考古学#!。"
 lepsius_has_archaeologist_precolumbian_specialist_tt: "[GetPlayer.GetName]的[concept_lepsius_archaeologist]拥有特质#V 专长：美洲考古学#!。"
 je_lepsius_mascapaicha_goal: ""
 je_lepsius_specialization: "考古学专长"
 je_lepsius_specialization_reason: "一个国家可选择一次考古重点。根据考古类别的不同，每次每年发掘可多获得一件文物（埃及、美索不达米亚、爱琴海、美洲）。新考古学家会获得相应的专业特质，并在探险结束时多发现5件文物。"
 je_lepsius_specialization_success: "[GetPlayer.GetName]已选择考古学专长。"
 lepsius_archaeological_expedition_specialization_tt: "由于我国考古学家的专业，我们将额外获得#G 5件#![Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]。"
 lepsius_add_1_specialization_clue_tt: "由于我国考古学家的专业，我们将额外获得#G 1条#!线索。"
 je_lepsius_alexander: "亚历山大大帝陵墓"
 je_lepsius_alexander_reason: "亚历山大大帝是古往今来最重要的将领之一，他建立了一个世界帝国，成为希腊化诸国赖以奠定的基础。他的陵墓在古典世界被视作令人敬畏的圣地，但最晚从公元5世纪始，陵墓的确切位置就一直不为人知。大多数资料认为亚历山大港是最终的埋葬地点，但这一理论不无争议。我们的首要目标是在已经发现过亚历山大痕迹的地点进行发掘，无论通过得到许可还是强制进行。通过追踪线索，我们可以更准确地确定陵墓的位置。然而要做到这一点，我们必须像寻宝游戏一样在发掘地点间往来。"
 je_lepsius_alexander_success: "如果我们找到了足够的指向亚历山大大帝陵墓的#V 考古线索#!，我们就能精确定位它。"
 je_lepsius_alexander_goal: ""
 je_lepsius_ark: "约柜"
 je_lepsius_ark_reason: "约柜兼具至高无上的宗教与考古学价值。以色列人认为它是他们的圣地耶路撒冷圣殿的中心。自摩西时代以来，十诫的容器始终是重新征服圣地的目标之一。自尼布甲尼撒二世征服耶路撒冷（公元前587或586年）以来，约柜被认为已经丢失。我们的首要目标是在已经发现过约柜痕迹的地点进行发掘，无论通过得到许可还是强制进行。通过追踪线索，我们可以更准确地确定它的确切位置。然而，要做到这一点，我们必须像寻宝游戏一样在发掘地点间往来。"
 je_lepsius_ark_success: "如果我们找到了足够的指向方舟的#V 考古线索#!，我们就能精确定位它。"
 je_lepsius_ark_goal: ""
 je_lepsius_atlantis: "亚特兰蒂斯的命运"
 je_lepsius_atlantis_reason: "亚特兰蒂斯是最伟大的人类神话之一，它的灭亡代表着一个天堂和一个高度发达文明的衰落。柏拉图第一次提到了这个海上强国，不过老普林尼等作家否认了亚特兰蒂斯的存在，生日克兰托尔、波希多尼和斯特拉波等人则认为亚特兰蒂斯岛是可能存在的。我们的首要目标是在已发现亚特兰蒂斯痕迹的地点进行发掘，然后追踪线索，我们可以更准确地确定这座城市的位置，我们就必须像寻宝游戏一样，从一个发掘地点到另一个发掘地点。"
 je_lepsius_atlantis_success: "如果我们找到了足够的指向亚特兰蒂斯的#V 考古线索#!，我们就能精确定位它。"
 je_lepsius_atlantis_goal: ""
 je_lepsius_eldorado: "搜寻黄金国"
 je_lepsius_eldorado_reason: "征服者们真的只是在追逐那些虚构的童话和夸大的传说吗？如果不是因为那些关于传说中黄金民族的故事，巴尔沃亚或许不会发现太平洋，埃尔南多·德·索托也不会漫步于今日之美国。新大陆的发现，本可以是另一番景象。科尔特斯和皮萨罗的案例，验证了这些传说非虚。或许，关于美洲大陆上尚有一座未被发现的重要城市的说法，不无道理——考古的事实已经自行发声。我们的首要任务，是在那些发现黄金国遗迹的地点进行挖掘——不论是合法持证，还是强行进入。通过追寻线索，我们能够更精确地锁定这座城市的位置。然而，要做到这一点，我们必须像在寻宝游戏中一样，从一个挖掘点跳转至下一个。"
 je_lepsius_eldorado_success: "如果我们找到了足够的指向黄金国#V 考古线索#!，我们就能精确定位它。"
 je_lepsius_eldorado_goal: ""
