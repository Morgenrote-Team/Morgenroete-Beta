 lepsius.1501_taxonomy_heidelbergensis: "\n#E 海德堡人#!由[SCOPE.sCountry('lepsius_heidelbergensis_systemizer_country').GetName]分类。"
 lepsius.1502_mauer_t: "#T 海德堡人#!由[SCOPE.sCountry('lepsius_heidelbergensis_finder_country').GetName]发现"
 lepsius.1502_mauer_d: "\n海德堡人下颌骨化石发现于海德堡附近，该标本不仅是欧洲迄今发现最古老的早期人类遗存，更在人类演化谱系中具有关键意义——其形态特征完美填补了直立人与晚期人科成员之间的演化缺环。"
