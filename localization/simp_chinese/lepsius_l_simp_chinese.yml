 lepsius.1001.t: "亚历山大的召唤"
 lepsius.1001.d: "一个领先世界的埃及文物馆的建成，唤起了一些学者压抑已久的记忆……"
 lepsius.1001.f: "当[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName]看着展览时，心中马其顿神庙的记忆被唤醒了。里面有来自托勒密时期的碎片，有些甚至来自希腊征服时期，以前无法解释的文物也有了新意义，如今埃及沙漠中可能有更多的东西沉睡着。亚历山大大帝的最终安息之地至今仍是一个谜。但[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士的众多发现、渊博的知识和高超的考古技艺让其他考古学家确信亚历山大是一个属于今世而非往日的人。凡找到他永恒的安息之地，都将获得无尽的声誉。"
 lepsius.1001.g: "每位考古学家的梦想......"
 lepsius.1002.t: "约柜"
 lepsius.1002.d: "一个领先世界的美索不达米亚文物馆的建成，唤起了一些学者压抑已久的记忆……"
 lepsius.1002.f: "巴比伦是以色列的命运之地，正是这里美索不达米亚的统治者摧毁了最初的犹太国家，将圣殿化为灰烬，并将人口驱逐。从那时起，放置十诫的约柜也消失得无影无踪，但[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName]发现了一些线索，表明约柜仍存于世，2500年来，它一直在等待被找回。"
 lepsius.1003.t: "最伟大的神话"
 lepsius.1003.d: "一个领先世界的爱琴海文物馆的建成，唤起了一些学者压抑已久的记忆……"
 lepsius.1003.f: "考古博物馆举办了一场爱琴海地区展，里面的文物佐证了[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName]的观点，即这是科学与神话之间照应，有人云考古学家可以做梦吗？答案是肯定的，当施里曼寻找特洛伊时，没有人相信他，巴别塔也被认为只是一个比喻，但现在神话中的米诺斯重现与世界！"
 lepsius.1004.t: "黄金的诅咒"
 lepsius.1004.d: "一个领先世界的美洲文物馆的建成，唤起了一些学者压抑已久的记忆……"
 lepsius.1004.f: "自欧洲人登陆美洲以来，黄金谣言就一直在流传，无数人因黄金而丧生，胡安·庞塞·德莱昂死于寻找青春之泉，弗朗西斯科·巴斯克斯·德·科罗纳多死于寻找黄金城，埃尔南多·德·索托不惜穿越北美大陆寻找未知的财富。现在[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName]看着眼前印加雕像，并将其与丰富的美洲展览中的其他文物进行比较，[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]担心[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]可能会屈服于同样的黄金诅咒，[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]会走上黄金国之路吗？"
 je_lepsius_archaeology_start_in_egypt: "埃及学的诞生"
 je_lepsius_archaeology_start_in_egypt_reason: "埃及沙漠中还有许多宝藏等待我们去发掘。我们的考古学家能否开创埃及学的新纪元，让[Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]前往埃及成为可能？"
 lepsius.22.t: "埃及学的诞生"
 lepsius.22.d_egyptology: "在埃及考察之后，[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士展示了[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]的研究成果。由于破译了古埃及象形文字，[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]不仅能够找到各种新的遗址，[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]的发现还重现点燃人们对该地区的兴趣。"
 lepsius.22.f_egyptology: "#b 历史背景：#!在弗朗索瓦·尚波利恩辞世后，象形文字的研究似乎也随之陷入沉寂。然而，在1837年，一位德意志青年学者卡尔·理查德·莱普修斯，挥笔给伊波利托·罗塞里尼——尚波利恩的挚友及1829年法兰西‑托斯卡纳埃及探险队的联合负责人——写下了一封信。莱普修斯不仅系统地整理了尚波利恩所积累的宝贵知识，更是将埃及学推向了一个新的高度，使其成为了一门受到严肃对待的科学。他的影响力不止于此，他还成功地说服了欧洲的政治精英们，为未来的埃及探险之路铺平了道路。"
 notification_lepsius_birth_of_egyptology_notification_name: "埃及学的诞生"
 notification_lepsius_birth_of_egyptology_notification_desc: "来自[GetGlobalVariable('lepsius_egyptology_invented_country_global_var').GetCountry.GetName]的一位考古学家踏上了前往埃及的探险之旅，开创了埃及学的新纪元。我们也应该向埃及派遣一名考古学家！"
 je_lepsius_yucatan_expedition: "尤卡坦考察队"
 je_lepsius_yucatan_expedition_reason: "尤卡坦丛林中有古代遗迹的传闻，许多神奇的宝藏在那里正等待着勇敢的探险家。也许考古学家能为我们找到玛雅宝藏？我们和其他国家可以开始[Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]前往尤卡坦半岛。"
 lepsius.23.t: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]考察"
 lepsius.23.d: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士和[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]团队在尤卡坦丛林中度过了数月，如今他们带着宝藏、信息和遗址图纸回来了，这将开启中美洲考古学的新纪元。"
 lepsius.23.f: "#b 历史背景：#!在探索新大陆之前，欧洲人是否将其视为只有野蛮人和蛮族居住的地方？探险家约翰·劳埃德·斯蒂芬斯和弗雷德里克·卡瑟伍德对这一成见提出了强烈的质疑。这对美英搭档历时数年，穿梭于尤卡坦半岛的密林深处，据他们称，他们探访了44个曾经繁荣一时的中美洲文明遗址。长久以来，当地人口耳相传，述说着丛林深处被遗忘的城市和隐秘的神庙；然而，斯蒂芬斯的报告和卡瑟伍德那些震撼人心的石版画，为世人揭开了一个全新的世界。那些庙宇、雕像和石碑的形象，不仅点燃了浪漫主义者的想象力，更引发了一场风靡美国和欧洲的未知文明探索热潮，从好奇心的驱动到对荣耀的追求，再到对科学真理的执着探求，无不涵盖其中。"
 notification_lepsius_yucatan_expedition_notification_name: "尤卡坦考察队"
 notification_lepsius_yucatan_expedition_notification_desc: "一位来自[GetGlobalVariable('lepsius_yucatan_expedition_country_global_var').GetCountry.GetName]的考古学家刚刚结束了一次在尤卡坦半岛的冒险之旅，讲述了丛林中的传奇遗迹。科学家们对更深入地探索玛雅文化表现出浓厚的兴趣。"
 lepsius.1011.t: "[SCOPE.sState('lepsius_location_state').GetNameNoFormatting]"
 lepsius.1011.d_alexander: "[SCOPE.sState('lepsius_location_state').GetName]中可能有一条线索可以帮助找到亚历山大陵墓，发掘小组和[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士已经准备就绪。"
 lepsius.1011.d_ark: "当[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士和[SCOPE.sState('lepsius_location_state').GetName]探险队到达搜索目标时，一阵来自沙漠的暖风吹拂着他们，仿佛象征着约柜的秘密即将揭开。"
 lepsius.1011.d_atlantis: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]是几千年来成千上万相信柏拉图故事的傻瓜中一个？[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士不清楚，但[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]知道这次旅行只有成功，否则职业生涯就此终结。"
 lepsius.1011.d_eldorado: "探险队员抱怨热带气候，博士 [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]用风扇为自己降温。小径通向一个偏僻的地方，一些搬运工传言，他们可能会像许多西班牙征服者部队在寻找黄金时一样迷失方向……"
 lepsius.1011.f: "扪心自问，你为什么要寻求基督之杯？是为了祂的荣耀，还是为了你自己？"
 lepsius.1011.g: "进一步勘探"
 lepsius.1012.t: "顺利归来"
 lepsius.1012.d_alexander: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士看着[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]的笔记，难以忍受的酷热瞬间消失。上面的联系为寻找亚历山大大帝陵墓提供了新的线索。一个想法闪过[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis]的脑海。要不了多久，[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]就会遇到历史……并创造历史。"
 lepsius.1012.d_ark: "寻找约柜不仅仅是寻找一件考古文物，而是在寻找一件失落的宗教物品，与上帝取得联系。在这次旅行中，[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士经历了一次又一次磨炼。但是，在这次接触之前，[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]要经历多少次经验呢？"
 lepsius.1012.d_atlantis: "亚特兰蒂斯的神话仍在继续，[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士的旅程还没有结束，当[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]眺望海港的海面，看到鸟儿在上空盘旋时，[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]思考着在他们最终到达目的地之前还有多少挑战需要克服。"
 lepsius.1012.d_eldorado: "令探险队其他成员惊讶的是，学者们活着且毫发无损回来了，一时间，人们似乎忘记了[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士让他们执行的是自杀任务。在这趟寻找黄金国旅途中，这一阶段的成功完成证明[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]是正确的。"
 lepsius.1012.f: "“寻找圣杯就是寻找我们每个人心中的神。但如果你想要事实，我也没办法给你。在我这个年纪，我已经准备好相信一些事情了。”"
 lepsius.1012.g: "又一块拼图。"
 lepsius.1013.t_alexander: "锡瓦"
 lepsius.1013.d_alexander: "伪装成贝都因人的[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士单枪匹马地找到了被毁的阿蒙神谕所通道。在调查过程中，[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]在一个无法进入的地方发现了保存完好的托勒密早期莎草纸，这些纸莎草纸提供了有关亚历山大崇拜的信息。"
 lepsius.1013.t_ark: "耶路撒冷"
 lepsius.1013.d_ark: "除了圣城，还有什么地方能更准确地找到约柜的线索？ [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士游走在违法的边缘，成功搜索到了岩石穹顶下隐藏的隧道，并找到了珍贵文物下落的关键线索。"
 lepsius.1013.t_atlantis: "圣托里尼"
 lepsius.1013.d_atlantis: "数千年前圣托里尼岛的大喷发，掩盖了米诺斯文明的痕迹，但还剩些许残余。[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士检查了一座在那场灾难中倒塌的古代宫殿，[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]发掘并修复了被掩埋的壁画。其中一幅壁画上的地图竟然精确地显示了地中海和大西洋西岸的地貌。"
 lepsius.1013.t_eldorado: "波哥大"
 lepsius.1013.d_eldorado: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士探索了波哥大周边奇布查人居住的地区，当地人提供的线索将[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]带到了一个以前不为人知的地方，那里的大量奇布查文物提供了有关“金人”仪式的更多信息。"
 lepsius.1013.f: "专注于与传奇探险目标一致的特定考古分支的国家，在寻找考古发现的过程中具有优势，可以获得额外的线索，从而加快搜索速度。"
 lepsius.1013.g: "又一块拼图。"
 lepsius_discovery_vilcabamba_modifier: "发现比尔卡班巴"
 lepsius_peru_inspection_modifier: "我们的考古学家访问了我们位于秘鲁的挖掘队以建立一个新的挖掘地点"
 lepsius_add_1_vilcabamba_clue_tt: "获得#G 1#!个关于秘鲁重大考古发现的新线索。"
 lepsius_add_2_vilcabamba_clue_tt: "获得#G 2#!个关于秘鲁重大考古发现的新线索。"
 lepsius_add_3_vilcabamba_clue_tt: "获得#G 3#!个关于秘鲁重大考古发现的新线索。"
 je_lepsius_discovery_vilcabamba: "调查秘鲁"
 je_lepsius_discovery_vilcabamba_reason: "我们有充分的理由相信，印加之谜尚未完全解开。搜索工作可能需要花费数年时间。无论谁成功做出这一发现，都将永载史册。"
 je_lepsius_discovery_vilcabamba_goal: ""
 je_lepsius_disovery_vilcabamba_success: "如果能在秘鲁找到10条线索，我们将收集到足够的材料以重新发现一个具有重大历史意义的失落之地。"
 je_lepsius_disovery_vilcabamba_fail: "如果另一个国家抢先在秘鲁发现了10条线索，我们所有的努力都将付之东流。"
 lepsius.801.n: "秘鲁"
 lepsius.811.t_per: "征服者之墓"
 lepsius.811.f_per: "考古学家们发现了一扇上锁的大门，据说这扇大门后面是印加统治者的墓地。但打开后考古队才发现，这并不是一位印加统治者的墓地，而是一位西班牙征服者的墓地。不过[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士已经确定，墓室内部和一些文物可以追溯到印加时期。"
 lepsius.812.t_per: "印加矿洞"
 lepsius.812.f_per: "在安第斯山脉深处，[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士发现了一条小径，并把他带进了一个深坑。起初，考古队以为又是一次失败之行，直到他们小心翼翼地移开碎石发现这个坑是一个复杂的人工洞穴入口，在进去调查发现了采矿工具、日常用品和壁画，这里是印加人制作艺术品的产地之一吗？"
 lepsius.813.t_per: "太阳神殿"
 lepsius.813.f_per: "幸运之神眷顾了[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士！他在秘鲁山区发现了一个以前完全不为人知的神庙群。这显然是祭祀太阳神的地方，学者们不仅在现场发现了大量文物，还发现了壁画和祭司服饰，这一发现在考古学界引起了不小的轰动。"
 lepsius.971.t: "发现比尔卡班巴"
 lepsius.971.d: "这是学术界轰动的一天！今天，[ROOT.GetCountry.GetAdjectiveNoFlag]考古学家发现了失落之城比尔卡班巴！"
 lepsius.971.f: "从1539年到1572年，比尔卡班巴一直是新印加帝国的首都也是最后的避难所，直到1572年陷于西班牙及其土著盟友之手，标志着印加人反抗西班牙统治的结束。随后，比尔卡班巴被遗弃，其位置也被遗忘。1911年，探险家海勒姆·宾厄姆误将马丘比丘认定为比尔卡班巴，但他也曾到过一个被秘鲁当地人称为埃斯皮里图·潘帕的遗址。1964年，吉恩·萨沃伊认定埃斯皮里图·潘帕就是传说中的比尔卡班巴，这一说法得到了考古学家和历史学家的广泛认可。"
 lepsius.971.g: "连征服者都做不到的事，我们做到了！"
 lepsius.972.d: "[SCOPE.sCountry('lepsius_vilcabamba_discoverer').GetName]有了重大发现，今天发现失落之城比尔卡班巴！"
 lepsius.972.f: ""
 lepsius.972.g: "可惜，他们没有迷路。"
 je_lepsius_nazca: "纳斯卡的奇怪线条"
 je_lepsius_nazca_reason: "自西班牙征服以来，纳斯卡附近地貌上的奇特线条就引起了人们的质疑。有人认为它们是道路网或水沟的遗迹，如今在飞行员的帮助下，考古学家或许能得到正确的结论。"
 lepsius.76.t: "天空中的纳斯卡之谜"
 lepsius.76.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetLastName]带着[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]博士进行了一次飞行，这位学者可以更清楚地看到地面上的线条意味着什么。如果站在适当的高度观察，这些线条就会变得更加复杂。这里有几十个美洲前哥伦布时代的动物和人物的巨画，这是一个令人难以置信的考古发现！"
 lepsius.76.f: "纳斯卡线条位于南美洲西部的秘鲁南部的纳斯卡荒原上，距利马以南约四百公里，是存在了2000年的一个谜局：一片绵延几公里的线条，构成各种生动的图案，这些线条图约刻于公元前500年到公元500年之间，有些线条图描述了活着的动物、植物、幻想的形象，还有数公里长的几何图形"
 lepsius.76.g: "但这些图像的真正含义是什么呢？"
