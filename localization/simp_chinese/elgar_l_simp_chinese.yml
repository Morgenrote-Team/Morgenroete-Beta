 elgar.9.t: "十二音技法"
 elgar.9.d: "经历了数十年的音乐停滞后，现代作曲家们提出了一个将彻底改变音乐世界的概念。"
 elgar.9.f: "十二音技法——也被称为十二音、十二音连续主义，以及（在英国）十二音创作——是一种音乐创作方法。该技法是一种确保半音阶的所有12个音符在一首乐曲中同样频繁地响起的手段，同时通过使用音列（12个音级的排序）来防止对任何一个音的强调。因此，所有的12个音都被赋予了或多或少的重要性，而音乐也避开了调性的问题。随着时间的推移，这种技法大受欢迎，最终对20世纪的作曲家产生了广泛的影响。它通常被认为是序列主义的一种形式。"
 elgar.9.g: "我不确定这是不是个好主意。"
