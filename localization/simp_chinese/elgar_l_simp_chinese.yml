 elgar.1231.f: "The 'Suite Española' is a suite for solo piano by the Spanish composer Isaac Albéniz. Together with other pieces it was written to honour the Spanish queen.\nOriginally it consistet of four parts, each representing a region of Spain and using a local music form or dance: Granada (Serenata), Catalonia (Courante), Sevilla (Sevillanas) and Cuba (Notturno). Later Cádiz (Canción), Asturias (Leyenda), Aragón (Fantasía) and Castilla (Seguidillas)."
 elgar.1232.f: "The 'Iberia' is a suite for piano by the Spanish composer Isaac Albéniz. It is composed of four books of three pieces each.\nIt is considered to be Albéniz's best but also hardest piece of music. It is jokingly said that playing it is easy if you have three hands."
 elgar.1233.f: "The 'Cataluña' is a piano piece by the Spanish composer Isaac Albéniz. Even though originally composed for the piano it later became a staple of of classical guitar music."
 elgar.1241.f: "'Le lac des fées' (The Fairy Lake) is a grand opera by French Composer Daniel Auber. The opera tells the story of Albert, a student, who fell in love with the fairy Zélia."
 elgar.1251.f: "'The Miraculous Mandarin' is a pantominme ballet composed by Hungarian Composer Béla Bartók. The work caused a scandal which led to it being banned on moral grounds. Later on it was mostly performed in the form of a concert suite, which meant that only about two thirds of it were actually played."
 elgar.1252.f: "'Concerto for Orchestra' is a orchestral work by Hungarian Composer Béla Bartók. It is considered to be one of Bartok's most well-known and most popular works."
 elgar.1253.f: "'Music for Strings, Percussion and Celesta' is a composition created by Hungarian Composer Béla Bartók and commissioned by Paul Sacher, the conductor of the Basler Kammerorchester. Interestingly the ensemble does not only include string instruments, percussion instruments and celesta, but also a piano that in this case is considered to be a percussion instruments thanks to its hammer mechanisms."
 elgar.1261.f: "'Lao Siang Thian Thao' is a Thai classical work in the Lao melodic idiom originating in the late nineteenth century, with its original composer unknown. In 1933 Luang Pradit Phairo (Sorn Silpabanleng) transformed the earlier two-tier melody into a full three-tier phleng thao, expanding it with newly composed return passages and both vocal and instrumental elaboration. The title derives from an older lyric referring to a ritual of candle divination, and the piece later became widely used in classical dance and concert performance."
 elgar.1262.f: "'Saen Kham Nueng Thao' is a Thai classical phleng thao arranged in 1940 by Luang Pradit Phairo (Sorn Silpabanleng). The original two-tier melody was an older companion piece traditionally paired with 'Lao Toi Taling.' Luang Pradit expanded and reshaped it into the full three-stage form, setting verses adapted from the epic Khun Chang Khun Phaen, thereby transforming a former auxiliary melody into a refined concert work."
 elgar.1263.f: "'Homrong Kratae Tai Mai' is an overture composed by Luang Pradit Phairo (Sorn Silpabanleng) around 1912–1913. Based on the earlier two-tier melody 'Kratae Tai Mai,' he expanded it into a three-tier ceremonial prelude used to open performances. Characterized by lively rhythms and agile melodic motion suggestive of a squirrel climbing a tree, the piece is often followed in performance by Khap Nok medley."
 elgar.1271.f: "'Sri Ayutthaya' is a historical music suite arranged in 1941 by Phra Chenduriyang (Piti Wathayakon) for the film Phrachao Chang Phueak. The work is based on the ancient melody 'Sai Samon,' a seventeenth-century Ayutthaya court song recorded in the La Loubere chronicle of 1687. Reworked into a modern orchestral setting, the suite celebrates the grandeur and spiritual legacy of the Ayutthaya Kingdom and reflects early twentieth-century efforts to revive and nationalize Siam's musical heritage."
 elgar.1272.f: "'Rabam Kridapiniharn' is a dance suite created in 1942 for the drama Kiat Saksit Thai, staged by the Fine Arts Department at the Silpakorn Theatre. The lyrics describe celestial beings rejoicing in the miraculous achievements of the Thai nation and celebrating with a blessing dance scattering flowers. While the choreography follows classical Thai dance conventions, the vocal writing and melodic treatment reflect a modernized style of the period. The suite incorporates the traditional pieces 'Rua Duekdam Ban,' 'Khruan Ha,' and 'Chin Rua' in succession, with orchestral harmonization arranged by Phra Chenduriyang (Piti Wathayakon) for Western ensemble performance."
 elgar.1273.f: "'Phama Prathet' is a traditional Thai instrumental piece in the Burmese style arranged by Phra Chenduriyang (Piti Wathayakon). Originally written for theatrical performance, it was later selected as a time-signal prelude state broadcast by the Government Public Relations Department before national flag ceremonies and news bulletins."
 elgar.1281.f: "'Phaya Sok Thao' is a Thai classical composition expanded into three tiers in the late reign of King Rama IV by Phra Pradit Phairo (Mi Duriyangkun). Originally a two-tier melody, it was enlarged into the full slow–medium–fast structure for performance in both mahori and piphat ensembles. Distinguished by its shifting tonal registers and expressive melodic contour, the work later became a model for instrumental solo elaborations. Subsequent masters adapted it for virtuosic solo performance on instruments such as the saw sam sai, khong wong yai, and ranat ek, establishing it as one of the central repertory pieces of Thai classical music."
 elgar.1282.f: "'Phra Athit Ching Duang' is a ceremonial closing piece composed by Phra Pradit Phairo (Mi Duriyangkun) at the request of Somdet Chao Phraya Borom Maha Si Suriyawong (Chuang Bunnag) in the late nineteenth century. At a time when only a few traditional farewell melodies were commonly used, the noble patron asked for a new composition for concluding performances. The resulting work was so admired that it was named after his honorific title and solar emblem, symbolizing prestige and authority within the courtly piphat tradition."
 elgar.1283.f: "'Thep Ranjuan' is a three-tier Thai classical composition written by Phra Pradit Phairo (Mi Duriyangkun) during the reign of King Rama III. The work was adapted and expanded from an older melody associated with the drama Phrom Kep Hua Waen, transforming it into the full slow–medium–fast thao structure. Elegant and expressive in character, it became part of the core piphat and mahori repertory of the nineteenth century."
 elgar.1291.f: "'Kulap Ruang' is a theatrical song composed with both lyrics and melody by Pranboon (Chuangchan Chankana) for the drama Buppachat Nakhon, first staged in 1933 by the Chantharophas troupe in Ban Don, Surat Thani. When the production was later revived under the title Mae Si Wiang in 1935, the song was retained as an interlude number and gained wider recognition. First commercially recorded in 1935, it later enjoyed renewed popularity through modern reinterpretations, securing its place in Thailand's early twentieth-century theatrical song tradition."
 elgar.1292.f: "'Kluai Mai' is a theatre song composed and written by Pranboon (Chuangchan Chankana), a leading figure of Thailand's early lakhon rong tradition. The piece was featured in the 1934 production 'Cho Cho Sang' (Cio-Cio San/Madame Butterfly) by the Si Ophas troupe. Performed in a Latin-inspired rumba rhythm reflecting contemporary global dance influences, it illustrates the hybridization of Thai theatrical music with Western popular styles during the interwar period. It stands as an important document of early Thai commercial recording and theatrical popular music."
 elgar.1293.f: "'Khwan Khong Riam', also known as 'Khwan Riam', is a film song composed with both lyrics and melody by Pranboon (Chuangchan Chankana) for the 1940 motion picture Plae Kao (Old Wounds). The composer was a principal artist of the Chantharophas theatrical troupe and an influential figure in early Thai dramatic music. The earliest commercial recording was performed by Songsri Chanthraprapha (also known as Songsri Johnson), who portrayed the character Riam in the film, opposite Somphong Chanthraprapha as Khwan. Closely associated with one of Thailand’s most iconic romantic tragedies, the song became emblematic of pre-war Thai cinema and the integration of theatrical song idioms into early sound film."
 elgar.1301.f: "'Homrong Phumi Thong, Sam Chan' is an overture in triple-tier form (sam chan) composed by Phraya Phumisen (Chit Chittasewi). The work is an expansion and transformation of the earlier piece Nok Krachok Thong, Song Chan, reconfigured from a two-tier structure into the more extended three-tier format characteristic of formal Thai court repertoire."
 elgar.1302.f: "'Champa Thong Thao' is a full thao-form expansion derived from the earlier 'Champa Thong, Song Chan'. The work adapts melodic material from the two-tier original into the complete three-tier suite structure typical of the thao genre. Its sung text is drawn from Savitri, a lakhon rong (sung drama) composed by King Vajiravudh (Rama VI), reflecting the early twentieth-century integration of royal theatrical literature into classical Thai art-music repertory."
 elgar.1303.f: "'Sot Si Thao' is a thao-form composition whose lyrics present a poetic contemplation of nature, describing flowers of various colors. Structured according to the conventional three-tier progression of the thao genre, the piece combines refined melodic elaboration with literary imagery, exemplifying the synthesis of vocal poetry and formal metric expansion in central Thai classical music."
 elgar.1311.f: "'Lao Damnoen Sai' originated as a vocal piece by Sergeant Phen Phayongying (Khom) and was later furnished with its instrumental setting by Phraya Prasan Duriyasap (Plaek Prasansap), establishing it in the classical repertoire. Cast in song chan (two-tier meter) in Lao stylistic mode with na thap song mai rhythmic pattern, the piece became widely influential. It was subsequently adapted in both the classical tradition—most notably by Luang Pradit Phairo (Sorn Silpabanleng)—and in twentieth-century Thai popular art music. Its continued reinterpretation across genres underscores its lasting musical significance."
 elgar.1312.f: "'Anong Suchada', formerly known as 'Chin Anong Suchada', is an old composition in song chan (two-tier meter) employing the na thap song mai rhythmic pattern. Consisting of two principal sections, the piece dates back to the Ayutthaya period and was traditionally performed in khon and lakhon theatre. The present arrangement is attributed to Phraya Prasan Duriyasap (Plaek Prasansap), who played an important role in its transmission within the classical repertoire."
 elgar.1313.f: "'Narai Plaeng Rup' originally existed in song chan (two-tier meter) as part of the suite 'Mon Plaeng'. The sam chan (three-tier) expansion was composed by Phraya Prasan Duriyasap (Plaek Prasansap) during the reign of King Rama VI, establishing the work in its extended formal structure."