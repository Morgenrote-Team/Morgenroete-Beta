 elgar_art_nouveau_tech_desc: "#R 此科技仅能在赤色晨曦中的艺术界面解锁。#!\n\n[concept_elgar_art_nouveau]是一种19世纪末至20世纪中期广泛存在于欧美的流行艺术风潮，由于这种艺术风格在美学中展现的特殊品位，导致它被评为人类20世纪的通俗文化中所能达到的至高点。新艺术风格的形成是对过度在乎结构、理性、无意义的新古典主义风格的一种矫正，新艺术风格摒弃立体结构，转而拥抱如梦似幻的平面化，其中的作品大多表现人性中的热情面、乐观面和进步面，像一部表面低龄、却是写给成人看的西洋童话。新艺术风格使得欧美的平民艺术和贵族艺术达到了统一，在之前的欧美艺术界中贵族艺术和平民艺术的差异非常巨大，平民在各种方面都劣化于贵族，但是在新艺术运动之后两者就结合为一，呈现出高雅精致却平等亲民的风格。"
 elgar_impressionism_tech_desc: "#R 此科技仅能赤色晨曦中的艺术界面解锁。#!\n\n[concept_elgar_impressionism]是指于1860年代法国开展的一种艺术运动或一种画风。其常见的特色是笔触未经修饰而显见，构图宽广无边，尤其著重于光影的改变、对时间的印象，并以生活中的平凡事物做为描绘对象。印象派一词也适用于某些音乐、文学、电影和摄影风格。"
 elgar_expressionism_tech_desc: "#R 此科技仅能赤色晨曦中的艺术界面解锁。#!\n\n[concept_elgar_expressionism]是艺术家通过作品着重表现内心的情感，而忽视对描写对象形式的摹写，因此往往表现为对现实扭曲和抽象化。这个做法尤其用来表达恐惧的情感——欢快的表现主义作品很少见。"
 elgar.423.d: "[SCOPE.sCharacter('elgar_conductor').GetFullName]抱怨说[SCOPE.sCharacter('elgar_conductor').GetHerHis]身兼数职，且工作条件不够好，也许金钱支持可以激发“灵感”。"
 elgar.424.d: "[SCOPE.sCharacter('elgar_conductor').GetFullName]已经这段时间一直努力作曲，但[SCOPE.sCharacter('elgar_conductor').GetSheHe]总是被某人打断。"
 elgar_irrationalism_tech_desc: "非理性主义是19世纪初兴起的一种哲学运动，否认或贬低理性思维的能力，强调乃至夸大直觉、本能等非理性因素作用的理论。非理性主义者认为世界缺乏理性的结构、意义和目的，或者认为理性天生是有缺陷的，在认识宇宙时必然会产生歪曲，或者乞灵于客观标准是无益的，或者认为人本性的主要方面是非理性的。"
