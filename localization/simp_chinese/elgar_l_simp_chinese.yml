 elgar_faido_modifier: "法多音乐文化"
 elgar.535.t: "幽思缱绻，郁结难宣，谓之Saudade"
 elgar.535.d: "一种新的音乐形式从里斯本的狭窄小巷与阿尔法玛区的酒馆中诞生——它哀婉动人、情感浓烈，是如此地葡萄牙。这种音乐被称为Fado（法多）。"
 elgar.535.f: "早在19世纪初，这一独特流派已在里斯本工人阶级聚居区和港口地带扎下根基。Fado，字面意为“命运”，由水手、妓女和城市贫民吟唱，常伴有葡萄牙吉他轻柔的低语。歌词诉说着渴望、顺从与乡愁，当地人称之为“saudade”——一种难以用他国语言准确传达的复杂情绪。\n\n尽管最初被视作街头俗乐，Fado却逐渐获得艺术上的认可。贵族开始将fadistas（法多歌手）请入沙龙，到了1840年代，法多已在里斯本的音乐厅广泛演出。一个崭新的民族音乐认同正在形成——它属于葡萄牙，也回响着这个国家变革中的悲伤与骄傲。"
 elgar.535.g: "让这旋律传遍全国——不只是哀歌，更是民族的声音。"
 elgar.535.h: "推动它的正规化，使它登上更大的舞台。"
