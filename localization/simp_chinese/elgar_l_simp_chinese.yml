 elgar_classicism_tech: "古典主义"
 elgar_classicism_tech_desc: "古典主义在艺术上主要是指包含对古希腊及古罗马的古典时代文化的高度认同。古典主义将古典时代的品味作为标准，并试图模仿其风格。古典主义出现于中世纪后的欧洲，是启蒙时代、理性时代以及部分现代主义思想所提倡的概念。"
 elgar_irrationalism_tech: "非理性主义"
 elgar_modern_art_tech: "现代艺术"
 elgar_modern_art_tech_desc: "#R 此科技仅为占位符而无法被研究。完成日志条目以获得[concept_elgar_impressionism]、[concept_elgar_expressionism]或[concept_elgar_art_nouveau]！#!"
 elgar_art_nouveau_tech: "新艺术"
 elgar_art_deco_tech: "装饰风艺术"
 elgar_art_deco_tech_desc: "装饰风艺术将现代艺术风格与精湛的工艺和丰富的材料相结合。在其鼎盛时期，它代表着奢华、魅力、繁荣以及对社会和技术进步的信念。装饰风艺术是最早的真正国际艺术风格之一，但它的统治地位随着第二次世界大战的开始而终结。"
 elgar_impressionism_tech: "印象派"
 elgar_neoclassicism_tech: "新古典主义"
 elgar_neoclassicism_tech_desc: "世纪之交后，人们重新燃起了对古典理想的热情：新古典主义。新古典主义是西方世界在19世纪对古代希腊罗马的艺术产生的复古和改造运动，在视觉艺术、文学、戏剧、音乐和建筑方面均有卓越表现，上接洛可可风、下启新艺术风格。"
 elgar_expressionism_tech: "表现主义"
 elgar_new_objectivity_tech: "新即物主义"
 elgar_new_objectivity_tech_desc: "新即物主义是绘画，文学与建筑相关的风格，特别对于1920年代深具意义。这个名称由1925年艺术评论家古斯塔夫·弗雷德礼西·哈特拉伯受到在曼海姆举办的回顾展的而联想命名。理解新即物主义，如同表现主义、达达主义与超现实主义等艺术理论的结合，且对社会写实主义有着深远的影响。"
 elgar_mass_culture_tech: "大众文化"
 elgar_mass_culture_tech_desc: "#R 此科技仅能通过日志条目解锁。#!\n\n“大众对文化代表的所有传统都不理解地敌视，尖锐而冷酷的智慧使农民的智慧相形见绌，新发现的自然主义在与所有关于性和社会的事情有关的事情上，回到了相当原始的本能和条件，饥饿和娱乐形式重新出现在工资争议和体育场中——所有这些都预示着文化的明确终结和人类存在的全新阶段的开启。” ——奥斯瓦尔德・斯宾格勒，《西方的没落》"
