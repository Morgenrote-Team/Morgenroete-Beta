 elgar.801.t: "国歌"
 elgar.801.d: "随着我国人民的民族情绪日益高涨，现在不仅是知识分子，广大普通民众也越来越渴望有一首能正确代表统治者、国家和人民的国歌。"
 elgar.801.f: "在19世纪中叶之前，欧洲和美洲就有许多国家在官方场合演奏某些歌曲，通常是为了歌颂君主。有些国歌很早就被编入法典，而有些国歌直到20世纪才被正式确定下来。因此有些国家一开始就有预先确定的国歌，但可能会因革命或宪法修改而改变。另一方面，许多国家必须从头开始创作国歌，这其中作曲家和作家可以为此提供宝贵的帮助。"
 elgar.801.g: "我们稍后再处理国歌这个问题。"
 elgar.801.h: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_monarch_anthem')]"
 elgar.801.i: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_folk_anthem')]"
 elgar.801.j: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_value_anthem')]"
 elgar.801.k: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_military_anthem')]"
 elgar.801.l: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_worker_anthem')]"
 elgar.801.m: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_internationale_anthem')]"
 elgar.802.t: "过时的国歌"
 elgar.802.d: "随着最近法律的修改，以前的国歌似乎不再合适。许多人将其解释为过时的政治制度残余，纷纷要求修改国歌。"
 elgar.802.f: "“我们有一位没有舰队的海军上将，他统治着一个没有海岸的国家，这是一个没有国王的国家！”"
 elgar.802.g: "这首国歌不再代表我们的国家。"
 elgar.803.t: "复古国歌"
 elgar.803.d: "取消以前国歌的呼声越来越高，政治家们转而呼吁创作一首新国歌，要求更明确地强调[ROOT.GetCountry.GetNameNoFormatting]所代表的现代成就。"
 elgar.803.f: "“前进吧人民们，去拯救世界，\n\n红色的旗帜，在空中飘扬，\n\n前进吧人民们，去拯救世界，\n\n红色的旗帜，象征胜利，\n\n红旗飘扬，我们必胜利。”"
 elgar.811.t: "[ROOT.GetCountry.GetNameNoFormatting]的国歌"
 elgar.811.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullNameNoFormatting]通过了一项法令，规定在正式场合必须演奏特定的乐曲。选择权落在了……"
 elgar.821.t: "[ROOT.GetCountry.GetNameNoFormatting]的音乐"
 elgar.821.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName]询问对于要写的国歌是否有什么特别的期望以及哪些方面值得特别关注。"
 elgar.821.f: "国歌分为五种： 提高合法性的君王颂歌，减少混乱的民间赞歌，改善生活条件同时提高忠诚度价值观颂歌，增强国防力量的军事赞歌，工会的政治力量的工人之歌。根据政府类别的不同，并非每个国歌都适应全部。"
 elgar.821.g: "国歌要赞美我们的君主！"
 elgar.821.h: "一首脍炙人口的民间赞歌来团结政府和人民。"
 elgar.821.i: "创作一首代表我国价值观的国歌。"
 elgar.821.j: "我们需要一首在战斗中激励人民的歌曲！"
 elgar.821.k: "只有歌颂无产阶级的歌才能被接受。"
 elgar.822.t: "国歌调子制作完成"
