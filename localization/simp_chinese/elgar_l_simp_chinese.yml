 je_elgar_accademia_santa_cecilia: "将圣切契利亚提升到学院级别"
 je_elgar_accademia_santa_cecilia_reason: "圣切契利亚会由教宗西斯笃五世于1585年发布的诏书——《属地管辖权》创立，该诏书援引了两位著名和音乐有关的圣人，1838年，圣切契利亚会被正式命名为圣切契利亚学院，然后是教宗学院。当时的成员包括路易吉·切鲁比尼、梅卡丹特、多尼采蒂、罗西尼、帕格尼尼、奥贝尔、李斯特、门德尔松、柏辽兹、古诺和梅耶贝尔。它的荣誉成员之一是维多利亚女王，随后在统一的意大利，它发展成为一个领先世界的音乐学院。"
 je_elgar_leipzig_conservatory: "成立莱比锡音乐学院"
 je_elgar_leipzig_conservatory_reason: "约翰·塞巴斯蒂安·巴赫曾在此留下不朽创作，音乐之城莱比锡是19世纪初培养音乐和学术人才的最佳地点。四位坚定的城市公民，即律师海因里希·康拉德·施莱尼茨（第二任主任）、莱比锡地区州长约翰·保罗·冯·法尔肯斯坦和皇家萨克森法院议员约翰·格奥尔格·凯尔以及布商大厦管弦乐团音乐家费利克斯·门德尔松·巴托尔迪开始资助与培养新人才。"
 je_elgar_petrograd_conservatory: "成立圣彼得堡音乐学院"
 je_elgar_petrograd_conservatory_reason: "圣彼得堡音乐学院创立于1862年，是在原俄罗斯音乐协会的基础上创建的。安东.鲁宾斯坦是学院的创立发起者，也是学院的第一任艺术总监和第一位钢琴专业教授。\n圣彼得堡（列宁格勒）音乐学院建立起，具有明显特色的俄罗斯音乐演奏风格由几代俄罗斯歌唱家、钢琴家、指挥家、弦乐、管乐演奏家信逐渐发展起来。他们在帝国时代，在私营歌剧公司，各种演出场合，管弦乐及合唱队与外国同行们进行了成功的竞争。大批来自意大利、波西米亚及德国等地的音乐家涌入俄国。他们定在俄国长期学习、研究俄罗斯音乐。到了十九世纪初，圣彼得堡已经能够与维也纳、巴黎、布拉格、伦敦及柏林平起平坐，展开了向世界艺术家的竞争。正是这样，于1824年贝多芬第九交响乐的第二场演出。曾经来圣彼得堡访问演出的著名音乐家有：李斯特、柏辽兹、舒曼、瓦格纳等。贝多芬就是在这儿获取了撰写弦乐四重奏的委托书。威尔第在此获取了为歌剧谱曲的委托。自那时起，圣彼得堡显为人知的作曲学校出现了。以伟大的民族作曲家德米特·伯特杨斯基，亚力山大·达勒加莫目斯基，米哈依·格林卡的具有当俄罗斯民族音乐特征的作品为基础状大、发展起来了。"
 elgar.201.t: "[SCOPE.sState('elgar_art_capital').GetCityHubName]奖"
 elgar.201.d: "我们热爱艺术的国家精英正在推动设立一个最佳作品艺术家奖。"
 elgar.201.f: "那些拥有非理性主义或印象派中心的国家会不时组织音乐比赛。五位技艺最高超的作曲家会被授予一项对其声望有所影响的奖项。该奖通常每五年颁发一次。大作曲家们并不会被邀请——他们已经获得了他们的奖励。"
 elgar.201.g: "我们该组织一次艺术大赛。"
 elgar.201.h: "简直是在浪费钱！"
 elgar.202.t: "[SCOPE.sState('elgar_art_capital').GetCityHubName]奖"
 elgar.202.d: "评委会讨论得出结论，选出了最佳作品，五位获奖者的名单已经公布。"
 elgar.202.f: "第一名是来自[GetGlobalVariable('elgar_prize_winner_1_global_var').GetCountry.GetName]的[SCOPE.sCharacter('elgar_character_first_winner_scope').GetFullName]\n第二名是来自[GetGlobalVariable('elgar_prize_winner_2_global_var').GetCountry.GetName]的[SCOPE.sCharacter('elgar_character_second_winner_scope').GetFullName]\n第三名是来自[GetGlobalVariable('elgar_prize_winner_3_global_var').GetCountry.GetName]的[SCOPE.sCharacter('elgar_character_third_winner_scope').GetFullName]\n第四名是来自[GetGlobalVariable('elgar_prize_winner_4_global_var').GetCountry.GetName]的[SCOPE.sCharacter('elgar_character_fourth_winner_scope').GetFullName]\n第五名是来自[GetGlobalVariable('elgar_prize_winner_5_global_var').GetCountry.GetName]的[SCOPE.sCharacter('elgar_character_fifth_winner_scope').GetFullName]"
 elgar.202.g: "为获奖者颁奖。"
 elgar.1201.t: "达夫尼与克罗埃"
 elgar.1201.f: "《达夫尼与克罗埃》（法语：Daphnis et Chloé）乃莫里斯·拉威尔根据同名音乐剧所作之芭蕾舞曲。该曲之芭蕾舞音乐，以古希腊诗人朗高斯的《达夫尼与克罗埃》全三场组成作品为基础，并由俄罗斯芭蕾舞团于1912年在萨特蕾歌剧院作巴黎首演。而拉威尔本人亦从芭蕾舞音乐摘录了一部分，改写为第1号组曲与第2号组曲，并分别在1911年及1913年首演。1909年，迪亚基勒夫带领的俄罗斯芭蕾舞团在巴黎之表演取得重大的成功。为向该成功进发，迪亚基勒夫遂委托新潮作曲家新作芭蕾舞音乐，拉威尔身在此列。"
 elgar.1202.t: "西班牙狂想曲"
 elgar.1202.f: "在1907年至1908年间创作的《西班牙狂想曲》是拉威尔为管弦乐队创作的首批重要作品之一。该作品于1908年在巴黎首演，并迅速成为国际音乐舞台上的常备曲目。这部作品汲取了作曲家西班牙血统的影响，是拉威尔诸多反映或以西班牙为背景的作品之一。《西班牙狂想曲》的首演是由Édouard Colonne指挥的管弦乐团在1908年3月15日于夏特莱剧院举行的。当时，《西班牙狂想曲》受到了普遍的正面评价。然而，也有一些不同的声音，比如皮埃尔·拉洛（Pierre Lalo），他一贯对拉威尔的音乐持批评态度，以及加斯顿·卡罗（Gaston Carraud），他认为该乐谱“单薄、不连贯且转瞬即逝”。尽管如此，大多数评论者对作品细腻而新颖的编排及音乐所描绘的生动画面给予了高度赞扬。"
 elgar.1203.t: "波莱罗"
 elgar.1203.f: "“我只创作了一部杰作，那就是《波莱罗》，可惜它并没有包含任何音乐。”——莫里斯·拉威尔"
 elgar.1211.t: "十二音技法"
 elgar.1211.f: "十二音技法——也被称为十二音、十二音连续主义，以及（在英国）十二音创作——是一种音乐创作方法。该技法是一种确保半音阶的所有12个音符在一首乐曲中同样频繁地响起的手段，同时通过使用音列（12个音级的排序）来防止对任何一个音的强调。因此，所有的12个音都被赋予了或多或少的重要性，而音乐也避开了调性的问题。随着时间的推移，这种技法大受欢迎，最终对20世纪的作曲家产生了广泛的影响。它通常被认为是序列主义的一种形式。"
 elgar.1211.g: "我不确定这是不是个好主意。"
 elgar.1212.t: "第二弦乐四重奏"
 elgar.1212.f: "这部作品共有四个乐章，创作于勋伯格一生中情绪非常激动的时期。第三和第四乐章采用斯特凡·乔治创作的诗歌，带有女高音独唱，这部作品的最后乐章没有调号，标志着勋伯格与七声调和的正式分离。"
 elgar.1212.g: "好！那么，我们现在是否可以让“音乐”暂停一下呢？"
 elgar.1213.t: "第一室内交响曲"
 elgar.1213.f: "勋伯格的第一部室内交响曲于1906年完成，并于1907年2月8日在维也纳首演，由罗斯四重奏团与来自维也纳爱乐乐团的木管乐队共同演绎，该场演出由勋伯格亲自指挥。1913年，勋伯格再次指挥了这部作品，在这场著名的“丑闻音乐会”中，勋伯格交响曲中非传统的音调风格，尤其是他的学生阿尔班·贝尔格作品中的无调性音乐风格过于前卫，导致观众强烈不满，最终出现了抗议和骚乱并提前结束了音乐会。"
 elgar.1213.g: "这永远不会结束吗？"
 elgar.1221.t: "火鸟"
 elgar.1221.f: "《火鸟》是俄罗斯作曲家伊戈尔·斯特拉文斯基创作的芭蕾舞剧音乐，是他的代表作与成名作，于1910年在巴黎首演。《火鸟》和春之祭、彼得洛希卡一同被列为斯特拉文斯基三大芭蕾舞剧，剧作内容取材自俄罗斯童话。"
 elgar.1222.t: "彼得鲁什卡"
 elgar.1222.f: "《彼得鲁什卡》是为1911年巴黎塞尔戈·佳吉列夫的俄罗斯芭蕾舞团演出季所创作的一部芭蕾舞剧。这部舞剧讲述了三个木偶之间充满爱恨情仇的故事。在1830年圣彼得堡的谢肉节期间，三个木偶由江湖艺人赋予生命。《彼得鲁什卡》通过音乐、舞蹈与设计的完美融合，构建了一个完整统一的艺术整体，成为俄罗斯芭蕾舞团最知名且最受欢迎的作品之一。现今，《彼得鲁什卡》的演出通常仍沿用其最初的舞台设计和舞蹈编排，保持原汁原味的经典再现。这部作品最具特色之处在于运用了著名的“彼得鲁什卡和弦”，这是一个标志着主人公彼得鲁什卡登场的双调性音乐手法。"
 elgar.1223.t: "春之祭"
 elgar.1223.f: "《春之祭》是俄罗斯作曲家伊戈尔·斯特拉文斯基创作的一部芭蕾舞剧及管弦乐音乐会作品。这部作品是为了1913年塞尔吉·佳吉列夫的“俄罗斯芭蕾舞团”在巴黎的演出季而创作的；最初的编舞由瓦斯拉夫·尼金斯基完成，舞台设计和服装设计则由尼古拉·罗里奇负责。1913年5月29日在香榭丽舍剧院首演时，其音乐与编舞的前卫引起了轰动。许多人将首演之夜观众的反应描述为“骚乱”或“近乎骚乱”，不过这样的表述实际上是在首演之后十余年的后续演出的评论才出现的。尽管《春之祭》最初设计是作为配合舞台表演的作品，其中包含特定段落伴随角色和动作，但其音乐同样获得了不亚于甚至超过作为音乐会作品的认可，并被广泛认为是20世纪最具影响力的音乐作品之一。"
