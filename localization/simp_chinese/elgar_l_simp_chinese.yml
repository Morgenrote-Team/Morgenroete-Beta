 elgar.91.t: "趣伏里玻璃厅"
 elgar.91.d: "多年以来，趣伏里公园一直深受哥本哈根市民的喜爱。有计划在院内建造一座可容纳约1000人的音乐厅，为观众带来动人心弦的音乐。"
 elgar.91.f: "趣伏里公园于1843年首次开放时，音乐厅就是其中的景点之一。这座长方形的木制建筑由哈拉尔·康拉德·斯蒂林设计。1843至1872年间，汉斯·克里斯蒂安·伦拜一直担任音乐总监和首席指挥。他为乐团创作了近700首曲子，以波尔卡、华尔兹与盖洛普舞曲居多。1863年，约翰·安德烈亚斯·斯蒂尔曼扩建了音乐厅。"
 elgar.91.g: "希望伦拜先生能和他著名的盖洛普舞曲一同登场！"
 elgar.92.t: "国家大剧院"
 elgar.92.d: "政府计划在墨西哥城建造一座大型歌剧院，这是该国历史上最大的建设项目之一。"
 elgar.92.f: "该剧院由建筑师洛伦佐·德拉·伊达尔加于1840年至1844年在墨西哥城建造。历史学家认为它是墨西哥城从都市大教堂建成到美术宫建成之间最重要的建筑作品。国家大剧院是在安东尼奥·洛佩兹·德·桑塔·安纳担任总统的第一个任期内落成的。它几易其名，从桑塔·安纳大剧院到韦尔加拉大剧院，然后是帝国大剧院，最后才是国家大剧院。在1852年的歌剧季中，该剧院首演了17部歌剧，提供了60多场演出。"
 elgar.93.t: "亚马逊剧院"
 elgar.93.d: "由于该地区正在经历橡胶种植的繁荣，玛瑙斯将获得一座华丽的歌剧院"
 elgar.93.f: "亚马逊剧院建于美好时代，当时正值橡胶业蓬勃发展，财富源源不断。亚马逊剧院的建设是在1881年由当地众议院议员安东尼奥·何塞·费尔南德斯·儒尼奥尔首次提出的，他设想在亚马逊雨林的中心有一颗“宝石”。剧院的建筑风格被认为是典型的文艺复兴式。屋顶瓦片从阿尔萨斯进口，钢墙从苏格兰格拉斯哥进口，楼梯、雕像和柱子用的卡拉拉大理石则来自意大利。穹顶覆盖了3,6000片巴西国旗颜色的瓷砖。内部的家具为路易十五风格，从法国进口。意大利艺术家小多米尼科·德·安吉利斯绘制了剧场与观众厅的天花饰板。"
 elgar.101.t: "贝多芬纪念碑"
 elgar.101.d: "在作曲家罗伯特·舒曼的号召下，几位知识分子，还以及公民、爱国者和艺术爱好者都发言支持在波恩为路德维希·范·贝多芬竖立一座纪念碑。"
 elgar.101.f: "“未来记忆的陵墓已赫然展现在我眼前，一个高耸的长方体，顶端立着一把竖琴，上面铭刻着出生与逝世的年份。蓝天在其上延展，旁边有几棵树在静静守护。整个国家都面对着这位教会他们伟大与荣耀的导师——贝多芬。他们难道不该为他树立一座宏伟千倍的纪念碑吗？倘若我是王子，我定会为他建造一座帕拉第奥式的神庙！塑造他为不朽伟人的形象，如同马焦雷湖上巍峨的圣博尔罗梅奥，他将俯瞰山川，与天地同在。当莱茵河上的船只驶过，若有陌生人问：‘那巨人象征何意？’那时，每个孩子都会答道：‘那是贝多芬！’——他们会将他视为德意志的皇帝。简言之：觉醒吧，抛却懒惰，未来的纪念碑将属于你自己！”\n——罗伯特·舒曼"
 elgar.101.g: "贝多芬是德意志音乐巨匠！"
 elgar.101.h: "我们很高兴为这个极具文化价值的项目提供资金。"
 elgar.101.i: "如果他这么伟大，以前为什么没有纪念碑？"
 elgar.102.t: "准备贝多芬音乐节"
 elgar.102.d: "贝多芬纪念碑的收尾工作已经完成。现在是为揭幕典礼做准备的时候了。"
 elgar.102.f: "庆祝贝多芬纪念碑落成而举行的贝多芬音乐节是一次具有国际地位的重大音乐活动。除普鲁士国王外，英国的维多利亚女王也应邀出席，亚历山大·冯·洪堡等知识界要人也是嘉宾之一，埃克托·柏辽兹、贾科莫·梅耶贝尔以及最重要的李斯特·费伦茨等作曲家也在这四天中各显身手。数以千计的来宾将要参加这个节日，对波恩这座小城而言是个棘手的问题。"
 elgar.102.g: "发送邀请！"
 elgar.103.t: "贝多芬音乐节邀请函"
 elgar.103.d: "我国政府已收到参加波恩贝多芬音乐节的正式邀请，作曲家的纪念碑将在那里揭幕。"
 elgar.103.g: "我们很乐意参加。"
 elgar.103.h: "古典音乐被高估了。"
 elgar.104.t: "建造贝多芬音乐厅"
 elgar.104.d: "由于游客人数众多，李斯特·费伦茨提议将科隆大教堂建筑工地上的人员和材料转移到波恩，以便在创纪录的时间内建造一座节日大厅。"
 elgar.104.f: "为贝多芬纪念碑正式揭幕将是为期3天的贝多芬音乐节的高潮。音乐节开始前一个月还没有合适的场地可以容纳预期的3000名与会者。李斯特反复敦促，在他提出自己承担全部费用后，委员会聘请了一位建筑师和承包商商来建造贝多芬大厅。开工时，他们只有不到两周的时间，而且必须昼夜不停地工作才能按时完成。李斯特·费伦茨还与科隆大教堂的建造方进行了交涉，使木材和饰品从科隆经莱茵河装船运到波恩。短短的11天内，一个节日大厅就凭空出现了。"
 elgar.104.g: "壮观。"
 elgar.105.t: "贝多芬音乐节"
 elgar.105.d: "经过四天的顶级音乐演奏，贝多芬音乐节可谓圆满成功，尽管如此大规模的活动不能没有丑闻。"
 elgar.105.f: "仪式也不乏尴尬的时刻。贝多芬纪念碑背弃了最重要的客人，普鲁士国王腓特烈·威廉四世和英国维多利亚女王，他们在弗尔斯滕贝格宫的阳台上就座。亚历山大·冯·洪堡挽救了这一天，他说贝多芬一直是个粗鲁的家伙。更尴尬的是，在“金色哨兵”节日宴会上的祝酒会上，李斯特冷落了柏辽兹率领的法国代表团，差点引起骚乱。此外，西班牙舞蹈家洛拉·蒙特兹，巴伐利亚著名的悲剧浪漫国王路德维希一世的情妇，在桌上疯狂跳舞，成为了一个可耻的客串。国王后来被迫结束了他的婚外情。"
 elgar.105.g: "贝多芬背对着我们？"
 elgar.105.h: "亚历山大·冯·洪堡是一位绅士。"
 elgar.105.i: "日耳曼人没有半点优雅。"
 elgar.105.j: "令人振奋。"
 elgar.106.t: "李斯特康塔塔"
 elgar.106.d: "李斯特·费伦茨非常荣幸地为贝多芬纪念碑的落成典礼创作并公演了这首大合唱。"
 elgar.106.f: "“尽管如此，他的康塔塔确实表演得很好，得到了整个大厅四分之三的热烈掌声，它是一部伟大的而美丽的作品，一下子就把李斯特在作曲家中的地位提高了。这首曲子的表达是真实的，音调是正确的，风格是崇高而新颖的，形式是精心构思和尽职尽责的，乐器的使用因其活力和多样性而引人注目。在他的乐队中，从来没有相同的声音连续出现，这使得某些曾经很珍贵的作品让听众感到厌烦；他知道如何使用大小手段，他对乐器和声音的要求都不过分；总之，他一举表自己不止精通器乐，对其它领域的音乐也有自己的风格，人们的担忧不攻自破。” ——埃克托·柏辽兹"
 elgar.106.g: "万岁！万岁！贝多芬，万岁！"
 elgar.107.t: "柏辽兹在贝多芬音乐节"
 elgar.107.d: "围绕贝多芬纪念碑揭幕举行的庆祝活动给了作曲家埃克托·柏辽兹相当大的启发。"
 elgar.107.f: "“正是在这次前往奥地利、匈牙利、波西米亚和西里西亚的旅行中，我开始创作我的《浮士德》传奇，这个计划我已经思考了很久。我一决心进行这项工作，就不得不退而求其次，自己也写了大部分歌词；我在二十年就把热拉尔·德·奈瓦尔翻译的歌德《浮士德》的法译本的片段谱成了曲子，而且打算把它列入新谱子的修订版，还有两三个场景，在我离开巴黎之前，由甘东尼埃先生按照我的指示写的，加起来也没有达到整个作品的六分之一。因此，在乘坐德国老式马车的旅途中，我试图写出打算用于我的音乐的诗句。我从浮士德对自然的呼唤开始，没有试图翻译甚至模仿歌德的杰作，而只是想从中获得灵感并提取其中的音乐内容。一旦我开始创作，我就随着音乐灵感的出现写下剩余的诗句，我以一种我在其他作品中很少体验到的轻松心情来谱写乐谱。” ——埃克托·柏辽兹"
 elgar.107.g: "那么这次旅行值得吗？"
 elgar.108.t: "维多利亚参观科隆大教堂"
 elgar.108.d: "英国女王维多利亚利用她在莱茵地区逗留的机会，参观了科隆大教堂并了解了刚刚开始的大教堂建设情况。"
 elgar.108.f: "王室成员提前离开音乐会的原因是：下午要在欢快的钟声中参观科隆大教堂。随后，各位君主通过中殿的主入口来到唱诗班座位区，在音乐总监韦伯的管风琴伴奏下，科隆男子合唱团正在演唱一首庆祝性的大合唱。"
 elgar.108.g: "我们很荣幸。"
 elgar.111.t: "莫扎特纪念碑"
 elgar.111.d: "竖立沃尔夫冈·阿玛迪斯·莫扎特纪念碑的准备工作正在全力进行。然而，捐款仍在募集之中。"
 elgar.111.f: "1835年，来自现属波兰的波森的作家朱利叶斯·席林建议在现在的莫扎特广场上为莫扎特建造一座纪念碑，当时莫扎特在萨尔茨堡相对而言并不闻名，国外和维也纳的重要赞助商最终支持了纪念碑的建造。巴伐利亚国王路德维希一世捐赠了一笔可观的款项以建造铜像的底座。"
 elgar.111.g: "莫扎特是德意志音乐巨匠！"
 elgar.113.t: "莫扎特纪念碑"
 elgar.113.d: "今天，斯拉茨堡最伟大儿子的纪念碑在他的出生地揭幕。"
 elgar.113.f: "纪念碑由路德维希·施万塔勒设计，由约翰·巴蒂斯特·斯蒂格尔铸造，于1842年9月5日举行了揭幕仪式，莫扎特的两个在世的儿子弗朗兹·克萨韦尔和卡尔·托马斯出席了仪式。但莫扎特的遗孀没能看到揭幕仪式。她不久前在莫扎特广场8号的住宅里中世。庆祝活动包括了火炬游行、游船、阿尔卑斯山火车、打靶和赛马。"
 elgar.114.t: "鲜活的纪念碑"
 elgar.114.d: "在奥地利，为莫扎特竖立纪念碑的努力正在不断进行。因此，法兰克福的一些市民想组织一场慈善音乐会——并将这一想法与政治联系起来。"
 elgar.114.f: "最初，法兰克福市民想组织一场音乐会，为建造莫扎特纪念碑收集足够的捐款。在德国，为资产阶级人物建立纪念碑是一件新鲜事。因此，为纪念艺术家或科学家等民族人物而建立的纪念碑是一个表达爱国主义情感的好机会。法兰克福的一些人甚至建议组织一次全国性的歌唱家集会，会议的收益应该流入德国音乐家基金会，以帮助年轻音乐家的发展。"
 elgar.114.g: "为我们自己鲜活的纪念碑筹集款项———纪念莫扎特的音乐节！"
 elgar.114.h: "为萨尔茨堡的纪念碑捐款。"
 elgar.115.t: "音乐节邀请函"
 elgar.115.d: "法兰克福市民邀请我们国家的爱国歌唱家参加莫扎特音乐节。"
 elgar.115.g: "音乐的机会，也是民族的机会。"
 elgar.115.h: "我就是受不了艺术歌曲。"
 elgar.116.t: "莫扎特音乐节"
 elgar.116.d: "来自莱茵兰、巴登、黑森和法兰克尼亚的42个合唱团在法兰克福聚会，庆祝为期三天的莫扎特音乐节。然而，这次活动变成了德国政治统一的一次示威。音乐节筹集的资金捐给了一个支持年轻作曲家的基金会。"
 elgar.116.f: "“全城陷入狂欢。房子里挤满了人，一直到天窗。美因茨、哈瑙和奥芬巴赫的人们在炮声中乘船而来，周围都是演奏音乐的装饰船；他们从所有的门里进入。这是令人感动的场面，艺术上的兴趣变成了次要的，但民族却有力地接近了我们；我无法否认，明亮的泪水从我的脸颊上流了下来。” _海因里希·霍夫曼"
 elgar.116.g: "音乐将国家凝聚在一起。"
 elgar.117.t: "自由主义乱党在法兰克福制造噪音"
 elgar.117.d: "我们未能注意到，一些具有雅各宾主义思想的“爱国者”利用在法兰克福举行的所谓莫扎特音乐节进行政治煽动。"
 elgar.117.f: "来自莱茵兰、巴登、黑森和弗兰肯的42个合唱团在法兰克福聚会，庆祝为期三天的莫扎特音乐节。然而，这次活动变成了德国政治统一的一次示威。该活动最初是以资助莫扎特纪念碑为目的，但发起人很快就改变了慈善目的，转而支持自己的基金会。"
 elgar.117.g: "一个破坏德意志联邦秩序的阴谋！"
 elgar.117.h: "让他们歌唱"
 elgar.121.t: "德意志音乐协会的建立"
 elgar.121.d: "今天，Allgemeiner Deutscher Musikverein，全德意志音乐协会，在[SCOPE.sState('elgar_musikverein_capital').GetCityHubName]建立。一场有关我们是否属于新德意志学派，或是应该捍卫传统音乐理念的讨论立刻开始了。"
 elgar.121.f: "新德意志乐派是1859年由《新音乐报》的编辑弗朗茨·布伦德尔提出的一个术语，用来描述德国音乐的某些趋势。它被不同的人在不同的时间使用，具有不同的含义。人们普遍认为，李斯特和理查德·瓦格纳是“新德意志乐派”的最杰出代表。还有一个共识是，约翰内斯‑勃拉姆斯并非其中一员。除此之外，还有不同的解释。这个新词应该被理解为表示贝多芬去世后的整个时期。根据布伦德尔的说法，人们通常将J.S.巴赫和亨德尔的时期称为“旧德意志乐派”。随后的时期是维也纳大师们的时代，如莫扎特，他受到了意大利风格的影响。但贝多芬将兴趣再次转向德国北部，并由此开启了“新德意志乐派”。双方的作曲家都把贝多芬看作是他们的精神和艺术英雄；保守派把他看作是一座不可超越的高峰，进步派则把他看作是音乐的新起点。"
 elgar.121.g: "我们属于新德意志乐派"
 elgar.121.h: "我们捍卫传统德意志乐派"
 elgar.122.t: "德意志音乐协会成员资格"
 elgar.122.d: "我们国家的艺术家被邀请参加新成立的德意志音乐协会。一场有关我们是属于新德意志乐派，或是应该捍卫传统音乐理念的讨论立刻开始了。"
 elgar.123.t: "下届音乐家大会的举办地"
 elgar.123.d: "德意志音乐协会的成员已经选取[SCOPE.sState('elgar_musikverein_capital').GetCityHubName]作为下一届音乐家大会的举办地。"
 elgar.123.f: "1859年，在莱比锡的《音乐新杂志》创刊25周年之际召开了第一次Tonkünstler会议。在魏玛举行的第二次音乐人会议（1861年）上，700多名创始成员通过了德意志音乐协会（ADMV）的章程。《音乐新杂志》成为该协会的机关刊物。在19世纪末，ADMV处于魏玛大公的保护之下。ADMV举办了一些大型的通俗音乐人聚会。它主要面向以李斯特和理查德‑瓦格纳为代表的新德意志乐派的方向。ADMV艺术目标的一部分是每年在不同的地点组织Tonkünstler聚会，表演重要的、很少听到的、特别是各种新的音乐作品。然而，少为人知但因其重要性而引起兴趣的老作品也将被演出。此外，新作品，无论是音乐作品还是学术作品，都将印刷出版。"
 elgar.123.g: "我们很荣幸！"
 elgar.124.t: "[SCOPE.sState('elgar_tonkunstler_state').GetCityHubName]的音乐家大会"
 elgar.124.d: "今年的Tonkünstler‑Versammlung（音乐家大会）将在[SCOPE.sState('elgar_tonkunstler_state').GetCityHubName]举行。我们的艺术家被诚挚地邀请来讨论音乐，聆听崭新的和被遗忘的音乐作品的表演。"
 elgar.124.g: "让我们享受音乐，聆听志同道合者的贡献。"
 elgar.124.h: "正是对这些音乐二流子进行盘点的好地方。"
 elgar.124.i: "这将是属于真理的一天——只有我们对音乐的看法是正确的！"
 elgar.125.t: "浪漫主义音乐之争"
 elgar.125.d: "新德意志乐派的代表和较为保守的代表之间的争执已经导致了一场公开的丑闻。两派之间的全面战争已经在席卷了媒体。现在是[ROOT.GetCountry.GetName]支持其艺术家的时候了。"
 elgar.125.f: "“浪漫主义音乐之争”是一些音乐史学家用来描述19世纪下半叶著名音乐家之间的分裂的术语。音乐结构、半音阶和声的局限性、以及标题音乐与绝对音乐之争是争论的主要领域。对立的两派在19世纪50年代最终形成。保守派最突出的成员是约翰内斯·勃拉姆斯、约瑟夫·约阿希姆、克拉拉·舒曼，以及费利克斯·门德尔松创办的莱比锡音乐学院。他们的对手，主要是来自魏玛的激进派，代表人物是李斯特·费伦茨和所谓的新德意志乐派成员，以及理查德·瓦格纳。争论源于德国和中欧；来自法国、意大利和俄罗斯的音乐家只是稍有参与。双方的作曲家都把贝多芬视为他们的精神和艺术英雄；保守派认为他是一座不可逾越的高峰，进步派则认为他是音乐的新起点。"
 elgar.125.g: "支持新德意志乐派！"
 elgar.125.h: "支持传统德意志乐派！"
 elgar.126.t_konservativ: "保守派赢得“浪漫主义音乐之争”"
 elgar.126.d_konservativ: "传统学派的绝大多数追随者赢得了关于音乐未来的争议。内容是否正确是次要的：对辩论和争执的大量贡献决定了公众形象。"
 elgar.126.f_konservativ: "两派音乐家之间的核心分歧点之一是传统和新的音乐形式之间的分歧。这是关于交响乐体裁可行性的辩论的产物，交响乐体裁在路德维希·凡·贝多芬手中已经从仅供娱乐的体裁发展成为包含社会、道德和文化理想的形式。李斯特和他的圈子倾向于新的写作风格和形式，将音乐与叙事和绘画思想相融合。为了这个目的，李斯特发展了交响诗。莱比锡/柏林学派拥护古典大师们使用的形式，这些形式由音乐学家，如19世纪初的阿道夫·伯恩哈德·马克思所编纂。节目音乐的有效性也是一个争论点。汉斯利克在他1854年出版的《音乐之声》一书中指出，音乐除了其本身之外，没有也不可能代表任何具体的东西。\n\n最终，#G [GetGlobalVariable('elgar_neudeutsch_yes').GetValue]#!名成员支持新德意志乐派，而#R [GetGlobalVariable('elgar_konservativ_yes').GetValue]#!名成员支持传统乐派。"
 elgar.126.g: "传统乐派胜利。"
 elgar.126.t_neudeutsch: "进步派赢得“浪漫主义音乐之争”"
 elgar.126.d_neudeutsch: "新德意志乐派的绝大多数追随者在关于音乐未来的争论中获胜。内容是否正确是次要的：对辩论和争执的大量贡献决定了公众形象。"
 elgar.126.f_neudeutsch: ""
 elgar.126.h: "新德意志乐派胜利。"
 elgar.131.t: "李斯特·费伦茨开启欧洲巡演"
 elgar.131.d: "在巴黎度过了一段相当不愉快的时光后，李斯特·弗朗茨决定效仿竞争对手塔尔贝格进行一次巡回演出，以期成为国际知名的音乐家。他的首个目的地是[SCOPE.sCountry('elgar_liszt_destination_scope').GetNameNoFlag]。"
 elgar.131.f: "李斯特·费伦茨是奥匈帝国作曲家、钢琴家、指挥家、戏剧导演与音乐教师。李斯特是最杰出和最有影响力的钢琴演奏家之一，他创作有1300多部作品和改编作品，是19世纪最有成就的作曲家之一。虽然他的大部分作品可以归入钢琴领域，但李斯特也通过发展交响诗对管弦乐起到了明显的推动作用。他的标题音乐概念以及新的和声和形式手段的使用，使他与理查德·瓦格纳并称为新德国学派最著名的主角。李斯特于1839年开始在欧洲进行大范围巡回演出，并在接下来的8年中持续。这一时期是李斯特作为音乐会钢琴家最辉煌的时期，他在巡回演出期间获得了许多荣誉和赞美。而首次出现了关于李斯特的乐迷强烈反应的报道，这被称为李斯特狂热。李斯特狂热的的症状是对李斯特与其的音乐会作出歇斯底里的反应。据报道，李斯特的演奏将观众的情绪提升到神秘的狂喜水平。"
 elgar.131.g: "我们祝他一切顺利。"
 elgar.132.t: "[ROOT.GetCountry.GetNameNoFlag]的李斯特狂热"
 elgar.132.d: "世界著名钢琴家李斯特·费伦茨选择我国作为欧洲巡演的下一个目的地。目前剧院和歌剧院的门票已被预订一空！"
 elgar.132.g: "这些高声喊叫的女人是从哪里冒出来的？"
 elgar.133.t: "李斯特离开"
 elgar.133.d: "李斯特在对款待致谢后结束了逗留，而李斯特狂热将在[SCOPE.sCountry('elgar_liszt_destination_scope').GetNameNoFlag]持续。"
 elgar.133.f: "据估计，李斯特在1839至1847年间公开露面的次数远超一千次。此外，鉴于他在这一阶段取得的成就，作为钢琴家的李斯特在正式退出音乐会舞台很久之后仍享有盛誉。李斯特将自己的大部分收入捐献给了慈善和人道主义事业，这也为他的声誉增色不少。他向科隆大教堂和佩斯圣斯蒂芬大教堂的建设基金捐赠了大笔资金，并向医院和学校等公共服务机构以及莱比锡音乐家养老基金等慈善组织提供私人捐款。1842年5月汉堡大火后，他为无家可归者举办了音乐会。为了满足仰慕者希望得到他一缕头发的请求，李斯特养了一只狗，而狗的皮毛在不知不觉中成为了卷发的来源。"
 elgar.301.t: "不错的排练"
 elgar.301.d: "由一位旅行作曲家指挥的管弦乐队的排练棒极了。"
 elgar.301.f: "一位旅行作曲家赢得了乐团的指挥权，并已在排练中令人印象深刻！"
 elgar.301.g: "好。"
 elgar.302.t: "平庸的排练"
 elgar.302.d: "不幸的是，由一位旅行作曲家指挥的管弦乐队排练并不像音乐厅所期望的那样好……"
 elgar.302.f: "不肯合作的同事、准备不足的表演者与音乐厅的条件——排练对于演出而言绝对不是好兆头。"
 elgar.302.g: "不好。"
 elgar.303.t: "多情的奉献"
 elgar.303.d: "与一点“小小的”礼节相关的外遇激起了愤怒。"
 elgar.303.f: "艺术家总是以其“放荡不羁的生活方式”而闻名，并时常引起一两起人际关系丑闻。人们的注意力停留在一个小小的动作上，但这一动作却具有爆炸性的力量。一位旅行作曲家将一首奏鸣曲献给了一位已婚女士，并将原谱作为礼物送给她。然而，这位女士是我们军队中一位备受尊敬的将军的妻子。这份礼物引发了人们的猜测，并可能损害该男子的公众形象。军方要求采取行动。"
 elgar.303.g: "我看不出有什么问题呀？"
 elgar.303.h: "离谱！"
 elgar.304.t: "晚间招待会"
 elgar.304.d: "我们的君主邀请一位旅行作曲家参加盛大的招待会。作曲家用一首曲子表达了他的感激之情。"
 elgar.304.f: "尽管19世纪的音乐文化日益寻求从官方赞助中解放出来，贵族和国王仍然是赞助艺术的主力，许多音乐作品仍然向亲王和国王致敬。另一方面，个人关系往往意味着被排除在学院和艺术圈之外的作曲家如果符合贵族个人口味，就能从富有的赞助人那里获得支持。例如，没有巴伐利亚国王路德维希二世的个人支持，就不会有瓦格纳的所有杰作。"
 elgar.304.g: "多么美妙的惊喜！"
 elgar.305.t: "售罄！"
 elgar.305.d: "一位大作曲家的演出门票售罄导致了争执，并进一步引发了公众的强烈抗议！"
 elgar.305.f: "在首演当天，熙熙攘攘的人群充满期待。聚集在歌剧院门口，门票已经在几天前售罄了。甚至出场的作曲家本人也只能买黄牛票。然而，由于一名剧院员工私自售卖了额外的门票，售出的票数远远超过了座位数。剧院内外出现了骚乱，音乐几乎完全被淹没了。外面的人们大声要求进去，里面的人们则呼吁安静。开场的合唱仍可演出，但之后乐队放弃了，这时骚乱才真正开始。"
 elgar.305.g: "谁该为此负责？！"
 elgar.306.t: "惊人的首演"
 elgar.306.d: "一位在自己的祖国备受冷落的作曲家的作品今日俘获了观众的心灵。"
 elgar.306.f: "历史上一些著名作品的首演失败并非罕见。这种经历有时会导致严重的自我怀疑和职业生涯的结束，但有些音乐家则会尝试为不同的观众再次演出同一部剧目。后来的经典作品往往只是在第二或第三次尝试中才获得成功。而真正点燃星星之火的并非首演地点，而是成功之处。埃克托·柏辽兹就是一个例子，他的作品在英国和德国比在法国本土更受欢迎。"
 elgar.306.g: "我们的观众更懂得感恩。"
 elgar.307.t: "音乐友谊"
 elgar.307.d: "一位旅行作曲家在现场与他的音乐家同事们坦诚相交。"
 elgar.307.f: "外国音乐家和本土音乐家之间的关系并不总是融洽。这不仅仅是国家矛盾和个人偏见的问题，有些管弦乐团无法适应客座指挥的指挥风格，有时短期演出需要做出妥协，客人反过来则责怪当地的音乐界。很多当地作曲家或指挥家也担心外国人的影响过于强大。然而，尽管面临所有这些障碍，友谊在继续发展。"
 elgar.307.g: "硕果累累的友谊。"
 elgar.308.t: "音乐竞争"
 elgar.308.d: "本地的音乐界对一位旅行作曲家的登场充满了怨恨和怀疑。"
 elgar.308.f: "“给巴黎歌剧院写两部伟大的作品，给文艺复兴剧院也写两部，给喜歌剧院再写两部，还要有一部给意大利剧院？似乎多尼采蒂先生已经把我们当成了被征服的国家，这是真正的入侵。再也没有什么巴黎的歌剧院了，只剩下多尼采蒂先生的歌剧院。” ——埃克托·柏辽兹"
 elgar.308.g: "这些音乐家应该团结起来！"
 elgar.309.t: "灵感"
 elgar.309.d: "一位外国作曲家启发了国立交响乐团的成员。"
 elgar.309.f: "外来影响经常在当地和国家音乐界中起到重要作用。陌生的作品、外来的音乐语言或者富有魅力的音乐家的出现经常能够带给当地的音乐家全新的视角。"
 elgar.309.g: "灵感？我想看结果！"
 elgar.309.h: "这对乐团是件好事。"
 elgar.310.t: "狂热"
 elgar.310.d: "一位作曲家的出现，使公众对他的作品产生了空前的、近乎歇斯底里的热情。所有人只在意这一件事情！"
 elgar.310.f: "“以前当我听说在德国，特别是柏林，李斯特露面时人们晕倒的状况，曾经不屑地耸耸肩，心想：安息日中沉闷的德国不希望错过任何一个表现自己的小小机会……我认为对他们来说，这只是为了炫耀而炫耀的问题……因此，我认为这种李斯特狂热只是莱茵彼岸政治不自由条件的标志。然而我错了，直到上周，在意大利歌剧院，李斯特举行了他的首场音乐会，我才意识到这一点……这绝不是德意志式的感伤，浪漫主义的柏林观众面对着演奏的李斯特，他独自一人，或者说只有他的天才伴随着他。但是，他的出现如此剧烈地影响了他们！掌声是多么的喧闹！……这是何等的赞美！这是一种真正的狂热，是在狂热的历史中前所未有的！” ——海因里希·海涅"
 elgar.310.g: "所以，他们完全心不在焉？"
 elgar.311.t: "音乐使人民团结"
 elgar.311.d: "一位大使问我们是否可以为他弄到一张正在我国停留的作曲家的音乐会门票。"
 elgar.311.f: "一位列强的大使是一位旅行作曲家的倾慕者，该作曲家目前正在我国访问。他想参加演出，可座位已经售罄。因此，他请求我们利用的政治影响力他可以出席。"
 elgar.311.g: "哈哈，不。"
 elgar.311.h: "给他安排一个前排位置。"
 elgar.312.t: "歌剧院里的暗杀企图！"
 elgar.312.d: "对我国一位重要政客的可怕暗杀企图为今天的歌剧演出蒙上了一层阴影！"
 elgar.312.f: "我国政府的低合法性引起民众不满已有一段时间。一名阴险的刺客趁机在一位著名作曲家的音乐会上开枪射击了一名政府高级官员。[SCOPE.sCharacter('elgar_leader_victim').GetFullName]身受重伤。凶手仍在逃跑中，生命垂危的受害者立即被送往最近的医院。"
 elgar.312.g: "保安在哪里！"
 elgar.313.t: "小品"
 elgar.313.d: "大作曲家在我国创作的一部小型作品可能不会大受欢迎，但也已经有了自己的粉丝。"
 elgar.313.f: "作曲家们偶然间创作的作品未必平庸。有时常一些小作品能比某些大作引起更多关注。尽管尼古拉·里姆斯基‑科萨科夫和爱德华·格里格都有大量的作品，但在流行文化中，他们因《大黄蜂的飞行》（取自《苏丹沙皇的故事》）和《山大王的宫殿》（取自《培尔·金特》）而闻名——尽管这未必公正，但热门音乐就是热门音乐。"
 elgar.313.g: "有些时候，正是小事带来了欢乐。"
 elgar.314.t: "缺乏灵感"
 elgar.314.d: "令人失望的是，我们的客人发现在我国停留完全不能令他获得灵感。"
 elgar.314.f: "有些时候就是没用。"
 elgar.314.g: "令人沮丧"
 elgar.315.t: "私人音乐会"
 elgar.315.d: "除了正式演出，我们的作曲家还在小圈子内举办了一场私人音乐会。"
 elgar.315.f: "大作曲家举办的小型私人音乐会有着悠久的传统。其中最著名的是以弗朗茨·舒伯特为名的“舒伯特之夜”。在第一次舒伯特之夜上，舒伯特弹奏钢琴，男中音约翰·米夏埃尔·福格尔与后来的卡尔·冯·舒恩斯坦因演唱他的歌曲。晚上还会有朗诵和遵循特定主题的有趣娱乐游戏。这些活动是友好会晤和文学音乐沙龙的混合体。"
 elgar.315.g: "那很好。"
 elgar.315.h: "从头再奏！"
 elgar.316.t: "一个有才华的学生"
 elgar.316.d: "在我国的大作曲家发现了一位政治领袖的才华，并考虑为他的作曲艺术提供指导。"
 elgar.316.f: "肯定有人会对政客的艺术才华感到震惊，认为这些坏家伙应该对音乐艺术完全麻木不仁。当然，有些作曲家具有政治抱负，但有音乐抱负的政治家相比之下要少得多。无论这位政客拥有何等才华，他或许并没有完全出卖自己的灵魂。"
 elgar.316.g: "一个有前途的候选人。"
 elgar.316.h: "他的精力最好用在别处。"
 elgar.317.t: "音乐灾难"
 elgar.317.d: "我国一座音乐厅里的表演可以作为音乐史上最严重的失败之一被载入史册。"
 elgar.317.f: "乐团没有做好准备，独奏家感冒了，指挥没有休息好，而且作曲家正在演出现场威胁说下次巡演将会绕过我们的国家。这只能说是一场灾难！"
 elgar.317.g: "国际性的耻辱！"
 elgar.318.t: "丑闻音乐会"
 elgar.318.d: "一场丑陋的音乐会只能以其“现代”化的声音唆使观众起哄，这不但分裂了社会，还造成了法律后果。"
 elgar.318.f: "新闻报道称当时出现了动荡的骚乱。作曲家的追随者、学生和反对者互相喊叫，彼此投掷，打断了演出并毁坏了家具等等。愤怒的保守派观众数次从观众席登上舞台咒骂要掌掴指挥。当指挥威胁说要暴力机关介入以维持秩序时，真正的骚乱开始了。接下来发生了一次耳光事件。在随后的司法诉讼中，一位在场的歌剧作曲家表示：“这些掌掴声是那晚最美妙的声音。”"
 elgar.318.g: "礼不下庶人。这句话说得很好！"
 elgar.318.h: "立刻把这种音乐拿下节目单。"
 elgar.319.t: "时代精神"
 elgar.319.d: "今天由一位大作曲家亲自指挥的现代作品恰好符合大众的口味。"
 elgar.319.f: "有些时候只需要一点运气。"
 elgar.319.g: "好极了！"
 elgar.320.t: "音乐宣传"
 elgar.320.d: "一些执政的政治家正在考虑是否可以……借用目前居住在我国的作曲家的音乐来进行宣传。"
 elgar.320.f: "20世纪初开始，大众社会催生了当时的极权主义政权，驯化大众的想法通过音乐得到了推广。尽管当时的一些音乐家抵制独裁统治，但还有一些人将自己的作品直接服务于意识形态，或者至少默许自己的才华被用于政治方向。"
 elgar.320.g: "音乐应该不受政治影响。"
 elgar.320.h: "有些时候，音乐也要为政治服务。"
 elgar.321.t: "大作曲家同行"
 elgar.321.d: "我们的音乐界客人遇到了受雇于我国的大作曲家。在长达一个小时的交谈与漫步中，他们交流了音乐思想与观点。"
 elgar.321.f: "英雄所见略同。"
 elgar.321.g: "一次历史性的会议。"
 elgar.406.t: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName]大师之死"
 elgar.406.d: "[GetPlayer.GetNameNoFlag]的音乐权威[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName]今日意外去世。音乐界对这一巨大损失表示哀悼。"
 elgar.406.f: "“站在这位逝者的坟前时，可以说我们是整个国家的代表，悼念着我们留存的本土艺术和爱国知识之辉煌消逝了杰出的那一大半。那位继承并发扬了亨德尔、巴赫、海顿和莫扎特不朽名声的人物已经结束了他的一生，而我们站在凋零的戏剧中为那根断裂的琴弦哭泣。\n“凋零的戏剧！就让我这样称呼他吧！因为他是一位艺术家，他之所以成为他，完全是通过艺术。” ——弗朗茨·格里尔帕尔策"
 elgar.406.g: "现在谁能来写安魂曲呢"
 elgar.411.t: "精湛的音乐会"
 elgar.411.d: "我国指挥家[SCOPE.sCharacter('elgar_conductor').GetFullName]领导的音乐会季取得了超乎意料的成功！"
 elgar.411.f: "“观众应该保持严苛，应该吹口哨，但他们的掌声对我并无意义。” ——朱塞佩·威尔第"
 elgar.411.g: "太棒了！"
 elgar.412.t: "平庸的音乐会"
 elgar.412.d: "我国指挥家[SCOPE.sCharacter('elgar_conductor').GetFullName]领导的音乐会季照常举行，没有留下什么杰出的时刻。"
 elgar.412.f: "“人不能把自己当作圣人，否则就无法偶尔改进自己的作品”。——路德维希·凡·贝多芬"
 elgar.412.g: "*打哈欠*"
 elgar.413.t: "糟糕的音乐会"
 elgar.413.d: "音乐会季甚至不能说差强人意，我国指挥家[SCOPE.sCharacter('elgar_conductor').GetFullName]的表现尤其令人失望。观众甚至不想要求返场……"
 elgar.413.f: "“《诸神的黄昏》演奏完最后一个音符之后，我觉得自己好像刚刚被释放出狱。” —— 彼得·柴可夫斯基"
 elgar.413.g: "嘘！"
 elgar.414.t: "观众席上的大使"
 elgar.414.f: "“《特里斯坦与伊索尔德》的前奏让我想起了意大利的一幅古画，画中殉道者的肠子如同卷轴一般在他的身体上缓缓铺展开来。”\n——爱德华·汉斯利克"
 elgar.414.g: "这人根本就不懂音乐。"
 elgar.414.h: "终于有人说了！"
 elgar.415.t: "芭蕾"
 elgar.415.d: "一部全新的现代芭蕾舞作品今天首演。"
 elgar.415.f: "“我喜欢《胡桃夹子》的情节——其实一点也不喜欢。” ——彼得·柴可夫斯基"
 elgar.415.g: "舞蹈！"
 elgar.416.t: "电影音乐"
 elgar.416.d: "今天我们的首席指挥家监制了为一部故事片录制的最早的电影原声带。"
 elgar.416.f: "“电影音乐与电影剧情的关系就应该像某人在我的客厅里弹奏的钢琴曲与我正在阅读的书一样。” ——伊戈尔‑斯特拉文斯基"
 elgar.416.g: "我有一个剧本情节，讲的是很久以前的一个考古学家寻找约柜，但后来约柜被盗走了。"
 elgar.417.t: "音乐季结束"
 elgar.417.d: "音乐季的最后一场表演就要结束了。各路媒体的评论也已经陆续发表。看起来[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName]干得不错且广受认可。我国管弦乐队的水平据说也大大提高了——我国在音乐上的声望也是如此。"
 elgar.417.f: "不是指挥家的作曲家可以通过在音乐季结束时的练习获得指挥能力。至多三个音乐季，作曲家即可成为指挥家。这是个训练非演奏家然后送他们去巡演的好方法。"
 elgar.417.g: "从头再奏！"
 elgar.421.d: "我们的作曲家目前正遭受着严重的写作障碍。"
 elgar.422.t: "散步"
 elgar.422.d: "在大自然中散步时，[SCOPE.sCharacter('elgar_conductor').GetFullName]发现了一些可以推动工作的灵感。"
 elgar.422.f: "大自然已经启发了许多作曲家。贝多芬到乡间隐居并在那里获得了许多启发了第6交响曲的印象。古斯塔夫·马勒甚至建起了自己的作曲小屋。"
 elgar.422.g: "追随贝多芬的脚步。"
 elgar.423.t: "不够舒适"
 elgar.423.f: "你要是给艺术家很重要工作，他们就会提出一些特殊要求。你要是让一个人尽皆知的公众人物觉得自己很重要，她很快就会变成天后级别的巨星。聚光灯照到他们头顶，你就知道他们有多出名了。"
 elgar.423.g: "把他安顿好"
 elgar.424.t: "干扰"
 elgar.424.f: "最近有人一直给[SCOPE.sCharacter('elgar_conductor').GetFullName]的生活增添负担。有的是粉丝，也有通过和大众名人攀关系来谋求政治影响力的投机分子。现在[SCOPE.sCharacter('elgar_conductor').GetLastName]的工作已经陷入中断，甚至抱怨道自己已经出现了被害妄想症。然而更难受的是，这位所谓的“粉丝”是一位政治大人物，要是刻意躲着他的话，如果发生什么奇怪的事情那就不知道咯。"
 elgar.424.g: "不要打扰他！"
 elgar.424.h: "他要自己处理这些！"
 elgar.431.t: "[SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_concerto_event_type')]"
 elgar.431.d: "After several months of effort and artistic creativity, [SCOPE.sCharacter('elgar_conductor').GetFullName] today presented [SCOPE.sCharacter('elgar_conductor').GetHerHis] [SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_concerto_event_type')] today with him at the podium."
 elgar.431.f: "从巴洛克晚期开始，协奏曲通常被视作为一种或多种独奏乐器创作的器乐作品，由管弦乐队或其他合奏团伴奏。作为一种器乐体裁，最早的协奏曲作品出现于18世纪初，并在古典主义时期得到了充分的表现。它通常分为三个乐章，中间为慢板。"
 elgar.432.t: "[SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_symphony_event_type')]"
 elgar.432.d: "A very special performance is taking place in the concert hall tonight: high society has gathered to attend the premiere of [SCOPE.sCharacter('elgar_conductor').GetFullName]'s new [SCOPE.sCharacter('elgar_conductor').GetCharacter.GetCustom('elgar_composer_masterpiece_for_event_type')]."
 elgar.432.f: "交响乐是一个跨越数个世纪的术语，指代形式和器乐组合各异的器乐作品。交响乐的经典形式始于18世纪，一直保持着在管弦乐领域的主导地位，直到20世纪。交响乐通没有独奏乐器，通常由三个或四个，或更加少见的五个乐章构成。自路德维希·凡·贝多芬的第9交响曲以来也偶尔出现了声乐部分（独唱和/或合唱），例如在古斯塔夫·马勒的作品中，但管弦乐的角色仍然占主导地位。"
 elgar.433.t: "[SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_opera_event_type')]"
 elgar.433.d: "The opera '[SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_opera_event_type')]', composed by Maestro [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] after many weeks and months of effort, is considered a new highlight in the musical work of this artistic genius. The upcoming premiere promises to be a great success."
 elgar.433.f: "歌剧是巴洛克时代兴起的一种音乐体裁，由歌唱家和伴奏管弦乐队组成，有时还包括合唱团和芭蕾舞团。除演唱外，演员还在利用绘画、建筑、道具、灯光和舞台技术设计的剧院舞台上进行表演和舞蹈。演员的角色通过面具和服装形象地表现出来。克劳迪奥·蒙特威尔第的《奥菲欧》树立了歌剧的标准，被认为是歌剧的鼻祖。19世纪，理查德·瓦格纳使歌剧的标准得到了革新。"
 elgar.440.t: "乡间音乐"
 elgar.440.d: "在我国乡村地区旅行时，[SCOPE.sCharacter('elgar_conductor').GetFullName]发现当地人对学习、记录与收集舞蹈和歌曲非常感兴趣。"
 elgar.440.f: "19世纪的民族主义使得许多以前为人鄙弃的音乐形式突然获得了关注，因为它们被视作反映了国家的民族灵魂。地方史学家和地方音乐家收集传统歌曲。一些作曲家还从人民当中汲取灵感，以全新的方式将其谱写成音乐。"
 elgar.440.g: "有趣的音乐收藏。"
 elgar.440.h: "[SCOPE.sCharacter('elgar_conductor').GetLastName]应当专注于阳春白雪而非下里巴人。"
 elgar.441.t: "船歌"
 elgar.441.d: "受到[SCOPE.sCharacter('elgar_admiral').GetLastName]将军的事迹激励，我们的作曲家[SCOPE.sCharacter('elgar_conductor').GetFullName]在旁谱写了一首船歌。"
 elgar.441.f: "在海员中，船歌在工作中的实用目的始终是最重要的，而其语言和音乐方面则无足轻重。工业革命产生了对快速船只的需求。大腹便便的东印度式商船消失了，取而代之的是快船和护卫舰。这最终使得船歌逐渐失去了航海中的实际用途，只能在休闲娱乐时传唱。音乐家们收集古老的船歌，或受其启发创作自己的作品。"
 elgar.441.g: "呦吼！"
 elgar.442.t: "进行曲"
 elgar.442.d: "受到[SCOPE.sCharacter('elgar_general').GetFullName]将军的价值观激励，我们的作曲家[SCOPE.sCharacter('elgar_conductor').GetFullName]谱写了一首军队进行曲。"
 elgar.442.f: "带有民族主义和军国主义倾向以及革命情绪的军乐进行曲在19世纪和20世纪初期非常流行，其中的范例是焦阿基诺·罗西尼，他不仅经常在歌剧中融入雄伟的进行曲，还为一些王公贵族创作乐曲，包括为土耳其苏丹阿卜杜勒·麦吉德一世创作的一首委托作品，它至今仍然是意大利军乐队的保留曲目。另一个例子是维也纳的施特劳斯家族的作品，他们在每一个适当的机会都会为爱国主义、效忠皇帝或者向军事家致敬而创作一首进行曲。"
 elgar.442.g: "军队的新材料。"
 elgar.443.t: "艺术歌曲"
 elgar.443.d: "在工作之余，[SCOPE.sCharacter('elgar_conductor').GetFullName]基于一位大诗人的诗作创作了一首艺术歌曲。"
 elgar.443.f: "在西方古典音乐传统中，“抒情诗”（lied）是将诗歌配上古典音乐以创作复调音乐作品的术语。在当代德语中，这一术语可以指任何类型的歌曲，但在英语和法语中，“lied”通常与“艺术歌曲”同义，以涵盖这一传统在其他语言中启发的作品。被创作成艺术歌曲的诗歌通常以田园诗或浪漫爱情为主题。"
 elgar.443.g: "不能来点别的吗……？"
 elgar.444.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_chord_name')][SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_major_minor_name')]钢琴奏鸣曲"
 elgar.444.d: "钢琴曲是古典音乐的典范曲目之一。为了给下一部主要作品练练手指，[SCOPE.sCharacter('elgar_conductor').GetFullName]写了一首奏鸣曲，并于昨晚在一个小型晚会上演奏。"
 elgar.444.f: "19世纪早期，奏鸣曲的形式是通过前期实践和重要的古典作曲家，尤其是海顿、莫扎特、贝多芬以及克莱门蒂等人的作品结合而定义的。在此期间，三个或四个乐章布局之间的差异成为评论的主题，重点在于协奏曲以三个乐章排列而交响曲以四个乐章排列。在明确标为钢琴奏鸣曲的作品中，有弗雷德里克·肖邦的三首作品，费利克斯·门德尔松的作品，罗伯特·舒曼的三首作品，李斯特·费伦茨的b小调奏鸣曲，以及后来约翰内斯·勃拉姆斯和谢尔盖·拉赫玛尼诺夫的奏鸣曲。"
 elgar.444.g: "经典。"
 elgar.445.t: "音乐论文"
 elgar.445.d: "近几个月来，[SCOPE.sCharacter('elgar_conductor').GetFullName]一直在撰写广泛研究了配器和乐器的新论文。这篇论文被认为是对音乐创新的贡献。"
 elgar.445.f: "“找到音乐的海洋需要很多时间，而学会在音乐的海洋中寻找方向则需要更多时间。”——赫克托1柏辽兹"
 elgar.445.g: "重要的理论著作。"
 elgar.446.t: "安魂曲"
 elgar.446.d: "一位很有影响力的天主教神职人员代表最近请求[SCOPE.sCharacter('elgar_conductor').GetFullName]在一位德高望重的主教逝世后谱写一部新的宗教音乐作品。"
 elgar.446.f: "宗教仪式中的葬礼弥撒的礼仪形式被称为\"Requiem\"。这个术语既指天主教教堂葬礼仪式上的圣弥撒礼仪，也指为纪念亡者而创作的教堂音乐作品。它源自于进堂咏的首句：“Requiem æternam dona eis, Domine, et lux perpetua luceat eis.”（主啊，请赐予他们永恒的安息，让永恒的光照耀他们）。安魂弥撒的礼仪独特之处在于其与悼亡节礼仪的相似。作为音乐弥撒的开端，进堂咏通常由作曲家谱曲，而奉献文则也一样，与之形成对比的是赞美诗，由于各种原因，有时会被缩短或完全省略。在安魂弥撒中，荣耀颂和信经不被谱曲，因为它们在葬礼弥撒的礼仪中既不唱也不朗诵。"
 elgar.446.g: "主啊，赐予他们永恒的安息。"
 elgar.447.t: "大胆的歌剧"
 elgar.447.d: "[SCOPE.sCharacter('elgar_conductor').GetFullName]的最新作品受到了审查机构的批评。它无疑具有很高的艺术价值，但可能引起骚动。国家的知识分子已然义愤填膺。"
 elgar.447.f: "在19世纪的大部分时间里，即使是当时最伟大的作曲家也不得不顺从审查制度。由于其革命主题，许多不同版本的《费加罗》都被认为是高度批判性的。涉嫌亵渎或其他不道德行为也是审查者头痛的问题。在某个特定的时刻，一些不堪其扰的作曲家会选择离开他们的赞助者。"
 elgar.447.g: "艺术应该提升人们的情操，而不是引起骚动。"
 elgar.447.h: "我们应该让审查机构放松一点。"
 elgar.448.t: "作曲家斗乐"
 elgar.448.d: "来自[SCOPE.sCountry('rival_composer_country_scope').GetName]的作曲家[SCOPE.sCharacter('rival_composer_scope').GetFullName]以该国特有的傲慢把我国的作曲家[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName]描述为一个“未知数”，并从根本上质疑我国的音乐地位。"
 elgar.448.f: "“我们的音乐风格的分散和任意性，如果不是由门德尔松的努力造成的，至少也是通过他的努力达到了最高峰。门德尔松努力将一个不清晰、几乎毫无意义的内容表达得尽可能有趣，令人眩晕。我们真正音乐英雄中的最后一个，贝多芬，具有最强烈的渴望和神奇的能力，通过他的音像的清晰、确定的设计来表达无法言喻的内容。然而，门德尔松则将这些已获得的形象在他的作品中溶解成一幅消解的、奇幻的影像，它们的不确定的色彩闪烁随意地刺激着我们多变的想象力，但我们纯粹的人类内在对于清晰艺术视野的渴望几乎不受触动，只剩下希望的期盼。”——理查德·瓦格纳评论费利克斯·门德尔松"
 elgar.448.g: "我们接受挑战。"
 elgar.448.h: "我们必输无疑。"
 elgar.449.t: "作曲家斗乐获胜"
 elgar.449.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName]向世人证明了他比那个自作聪明的小丑是更有能力、更具名望的作曲家，从而保持了我们国家作为文化中心的声誉。"
 elgar.449.f: "“没有什么比瓦格纳的力量更清楚地显示了他所释放出的风暴和压力的性质，这种颓废实际上被他的作品所神圣化，自那时以来一直在迅速发展。这个人必定是多么强大，以至于用如此能量摧毁了一种基本的音乐形式（歌剧），以至于他去世五十年后，我们仍然在垃圾和音乐剧的喧闹中挣扎！因为艺术综合体的声望仍然存在。这就是所谓的进步吗？也许吧。除非作曲家们能够通过遵循威尔第令人钦佩的号召来摆脱这个沉重的遗产：‘让我们回到过去，那才是进步。’”——伊戈尔·斯特拉文斯基评价理查德·瓦格纳"
 elgar.449.g: "现在大家都知道哪个国家才是执牛耳的文化大国了！"
 elgar.450.t: "作曲家斗乐失败"
 elgar.450.d: "不幸的是，我们的作曲家在于外国宿敌作斗争的时候失败了，现在全世界都相信我们是音乐上的蛮荒之地了！"
 elgar.450.f: "“瓦格纳甚至是一个人吗？难道他不更像是一种疾病吗？他触及的一切都变得不健康，他让音乐变得不健康。”——弗里德里希·尼采评价理查德·瓦格纳"
 elgar.450.g: "现在大家都知道哪个国家才是执牛耳的文化大国了……"
 elgar.451.t: "大师前往[SCOPE.sCountry('elgar_composer_destination_scope').GetNameNoFlag]"
 elgar.451.d: "我们的作曲家[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName]已经准备好了。这次两年半巡演的第一站将是[SCOPE.sCountry('elgar_composer_destination_scope').GetName]。"
 elgar.451.f: "“如果世界末日即将来临，我将前往维也纳，因为那里所有事情的发生都要晚上50年。” —— 古斯塔夫·马勒"
 elgar.451.g: "给我们寄张明信片！"
 elgar.452.t: "[SCOPE.sCharacter('elgar_composer_scope').GetLastName]抵达[GetPlayer.GetNameNoFlag]"
 elgar.452.d: "一位旅行的作曲家在巡演途中途经我国，并决定在此停留一段时间。"
 elgar.452.f: "[SCOPE.sCharacter('elgar_composer_scope').GetCustom('elgar_composer_achievements_switch_to_character_scope_type')]"
 elgar.452.g: "欢迎，欢迎！"
 elgar.453.t: "旅行的作曲家启程"
 elgar.453.d: "在停留了数周并进行了几场表演，赢得了当地居民的认可后，这位作曲家继续了他的巡回演出。"
 elgar.453.f: "作曲家目的地选择受一系列因素影响。一个决定性的标准是歌剧院的有无多寡以及与上一站的距离远近。但文化科技、艺术中心（印象派、表现主义、新艺术）或音乐学院的存在等因素也有影响。作曲家通常会避免那些最近曾经有竞争对手作曲家演出的地方。"
 elgar.453.g: "希望很快再见到你！"
 elgar.455.t: "作曲家从巡演中归来"
 elgar.455.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName]已经从巡演中返回。[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetHerHis]已在音乐世界上留下了属于他的印记并大大提高了他的声望。"
 elgar.455.f: "进行巡演是为了增加作曲家的声望，但增加的多少取决于他们的能力。作曲家自己的作品很重要，他们的特质如创新精神等也有作用。是指挥家或者演奏家的作曲家能获得特殊的奖励。"
 elgar.455.g: "大师，欢迎回来。"
 elgar.501.t: "意大利人之歌"
 elgar.501.d: "在意大利人民争取统一和独立的斗争气氛中，20岁的学生与爱国者戈弗雷多·马梅利创作了一首鼓舞人心的歌曲，称之为《意大利人之歌》。这首歌在短时间内就广受欢迎。"
 elgar.501.f: "《意大利人之歌》（Il Canto degli Italiani）常被意大利人称为《马梅利之歌》或以第一句歌词称作《意大利众兄弟》。歌词由米歇尔·诺瓦罗另外谱曲。这首赞美诗在整个复兴运动时期以及随后的几十年中广为流传。还被印在热那亚12月10日的传单上：这次游行的官方目的是纪念奥地利势力被驱逐出热那亚101周年——事实上，这是抗议外国占领意大利并促使卡洛·阿尔贝托支持意大利自由事业的借口。在这次活动中，人们展示了三色旗，并首次公开唱起了马梅利的赞美诗。"
 elgar.501.g: "应该有法律来针对它……"
 elgar.501.h: "意大利众兄弟，看祖国正奋起！"
 elgar.503.t: "德意志之歌"
 elgar.503.d: "为了回应法国最新的将莱茵河视作自然边界的扩张意愿，诗人霍夫曼·冯·法勒斯雷撰写了一首歌——即众所周知的“德意志之歌”。"
 elgar.503.f: "德意志人之歌，也常常称为德意志之歌，是奥古斯特·海因利希·霍夫曼·冯·法勒斯雷本在黑尔戈兰所作，他根据约瑟夫·海顿在1797年创作的“天佑吾皇弗朗茨”的曲调创作了这首歌。霍夫曼创作这首歌的特殊原因主要是法国政府在莱茵危机期间提出了对莱茵兰地区的领土宣称。正如当时别的德意志莱茵歌曲一样，他在字里行间批判了这些宣称。他还在歌中提出了更多进步的想法，特别是关于德意志统一的方方面面，单单这个提法就足以成为防御一切敌人进攻的先决条件。这首歌在一战期间变得极为重要。自1952年起，这首歌的第三节成为了德国国歌。"
 elgar.503.g: "德意志的美酒，德意志的歌声！"
 elgar.503.h: "德意志!德意志高于一切!"
 elgar.503.i: "你肯定搞错了，这首歌叫“天佑吾皇弗朗茨”。"
 elgar.504.t: "帕格尼尼之死"
 elgar.504.d: "著名小提琴演奏家尼科洛·帕格尼尼的去世引发了引发了一场关于他葬礼的争论。"
 elgar.504.f: "尼科洛·帕格尼尼是一位意大利小提琴家和作曲家，是他所处时代最负盛名的小提琴演奏家，也是现代小提琴技巧的中流砥柱之一。《廿四首小提琴随想曲（作品第1号）》是他最著名的作品之一，为许多杰出的作曲家提供了灵感。1840年5月，尼斯的主教派遣当地一位神父前来为帕格尼尼行临终圣事。帕格尼尼认为为时过早而拒绝了。一周后，即1840年5月27日，已经57岁的帕格尼尼因内出血去世，没能等到神父赶到。由于此事加上关于他与魔鬼有关的广泛传言，教会拒绝在热那亚为他举行天主教葬礼。这引起了公众对如何处理帕格尼尼的争议。有人支持向教会施加压力，让帕格尼尼在热那亚得到符合他身份的葬礼，并宣扬他的遗产。然而，这将导致与教权机构之间的公开争论。"
 elgar.504.g: "给他一个有尊严的葬礼并保护他的遗产。"
 elgar.504.h: "不要干预这一微妙的事务。"
 elgar.505.t: "拿布果"
 elgar.505.d: "朱塞佩·威尔第最新的歌剧成为了他职业生涯中迄今为止最大的成功。同时，它也煽动了意大利人民的民族感情。"
 elgar.505.f: "《拿布果》是由朱塞佩·威尔第于1841年谱写的意大利语歌剧，泰米斯托克莱·索莱拉为其了意大利语歌词。歌剧中最著名的曲目是《希伯来奴隶大合唱》，在许多歌剧院演出时，这部合唱曲常被加演。《拿布果》是被认为永久确立了威尔第作曲家声誉的歌剧。他曾说过：“这部歌剧是我艺术生涯真正的开端。虽然曾经面临重重困难，但是《拿布果》无疑是在幸运的星座之下诞生的。” 犹太人在巴比伦被囚禁的故事在整个意大利引起了轰动，尤其是在民族主义时代，意大利人深感受到了外国势力的统治。不过威尔第在《拿布果》中为意大利民族感情服务的程度究竟几何，至今仍然存在争议。"
 elgar.505.g: "飞吧，思想……"
 elgar.505.h: "又是那些叛逆的意大利人。"
 elgar.507.t: "阿依达"
 elgar.507.d: "苏伊士运河开通之际，朱塞佩·威尔第首演了他带有埃及色彩的歌剧《阿依达》——但稍有延迟。"
 elgar.507.f: "《阿依达》是朱塞佩·威尔第创作的一部四幕意大利语歌剧，其剧本由安东尼奥·吉斯兰佐尼基于法国埃及学家奥古斯特·马里埃特的情节大纲创作（尽管有人认为情节大纲实际上是由泰米斯托克莱·索莱拉编写的）。埃及赫迪夫伊斯玛仪帕夏邀约威尔第创作了这部歌剧并支付给他150000法郎，但首演却因种种原因一再推迟。《阿依达》在最终在开罗上演时取得了极大的成功。首演的服装和配饰由奥古斯特·马里埃特设计，他还负责监督巴黎的舞台设计和制造并最终运往开罗。威尔第没有亲自参加开罗首演，因为他非常不满意观众由受邀请的显要人物、政治家和评论家组成，而没有普罗大众。因此，他认为自己亲自参与了每个阶段的意大利（和欧洲）的首次演出才是真正的首演。"
 elgar.507.g: "意大利的胜利！"
 elgar.507.h: "[ROOT.GetCountry.GetNameNoFlag]的胜利！"
 elgar.509.t: "弗朗茨·舒伯特"
 elgar.509.d: "弗朗茨·舒伯特逝世13年后，他的第五交响曲被公之于众。"
 elgar.509.f: "降B大调第5交响曲也许是他年轻时代时最有成就的交响曲，被广泛认为是舒伯特的第一部“成熟”交响曲。它的精心制作达到了室内乐的完美境界，因为它的乐器比其他任何交响曲都要小，而且其比例也是相互细微调整的。它可以被理解为舒伯特对莫扎特的交响乐作品进行了富有成效的考察，并揭示了舒伯特完全的另类和独立。根据舒伯特自己在乐谱上的记录，这部作品是在1816年9月至10月3日间舒伯特寻找自己的音乐语言时创作的。舒伯特第5交响曲的首演是1816年在维也纳的一个小型业余管弦乐队进行的；而首次公演则是在迈克尔·莱特迈尔的指挥下，于舒伯特去世13年后的1841年10月17日进行的。"
 elgar.509.g: "即使身在天堂，舒伯特也会用他的音乐来愉悦我们。"
 elgar.510.t: "关于《波留托》的争议"
 elgar.510.d: "国王与作曲家多尼采蒂之间爆发了无法调和的争论，这可能导致他被解雇。"
 elgar.510.f: "加埃塔诺·多尼采蒂在1828至1839年间担任那不勒斯皇家剧院的音乐总监，尽管也曾前往其他国家旅行并接受委托，但他的确是该王国最重要的文化人物和最著名的代表。一系列著名的多尼采蒂歌剧都是在那不勒斯创作的，这巩固了两西西里王国作为音乐大国的地位。但是，尽管取得了许多成功，多尼采蒂不得不一次又一次地与那不勒斯的审查制度作斗争，后者经常修改了他的歌词或取消整场歌剧。在最近的一次争执中，国王亲自出面阻止歌剧《波留托》的演出。经过多年与审查制度的争斗，多尼采蒂已经深感厌倦，准备逃往巴黎。政客们已经联合起来支持国王；阻止多尼采蒂的计划不仅会扰乱政治和社会格局，而且会极大地损害国王的权威和声誉。"
 elgar.510.g: "国王发话了，让他卷铺盖走人。"
 elgar.510.h: "我们必须尽一切努力挽留多尼采蒂！"
 elgar.511.t: "殉教者，1840年"
 elgar.511.d: "意大利作曲家加埃塔诺·多尼采蒂抵达巴黎并上演了他的歌剧《殉教者》，深受公众欢迎。"
 elgar.511.f: "《波留托》是加埃塔诺·多尼采蒂的一部三幕悲歌剧，意大利文本由萨尔瓦多·卡马拉诺根据皮埃尔·科尔内耶于1641/42年创作的剧本《波吕克图》改编而成，反映了早期基督教殉道者圣波吕克图斯的生活。据一位作家所说，这是多尼采蒂“最个人化的歌剧”，音乐“是多尼采蒂创作的最精美的音乐之一”。《波留托》于1838年为当年晚些时候在那不勒斯的圣卡洛剧院演出而创作。然而，排练开始前，国王费迪南多二世拒绝允许基督教圣徒的殉道在舞台上被展现，并禁止了该剧的演出。多尼采蒂对此决定感到愤怒，而且他还有一份巴黎歌剧院的委托要完成，于是他支付了圣卡洛剧院的罚款，以替代未能上演的原创作品，然后离开那不勒斯前往巴黎。作为他在巴黎的第一个委托，他决定修改《波留托》，并于1839年至1840年间创作了一份法语剧本，题目为《殉教者》。"
 elgar.511.g: "对一个意大利人而言还算不错。"
 elgar.512.t: "圣母悼歌"
 elgar.512.d: "加埃塔诺·多尼采蒂到访博洛尼亚，指挥焦阿基诺·罗西尼的《圣母悼歌》首演。这次演出取得了圆满成功。"
 elgar.512.f: "在多尼采蒂前往博洛尼亚指挥《圣母悼歌》时，罗西尼参加了第三场演出，这两位同出博洛尼亚音乐学院门下的音乐家第一次会面，罗西尼表示多尼采蒂是“意大利唯一一位能按照我的想象指挥《圣母悼歌》的大师”。他的朋友，包括他的姐夫安东尼奥·瓦塞利（人称托托）一直试图说服他去博洛尼亚担任学术职位，而不非接受维也纳宫廷的聘任，至少这会为作曲家提供一个工作和教学的基地，而不必不断在城市之前奔波，使自己筋疲力尽。多尼采蒂报告了公众的反应：“热情无法描述。即使在罗西尼参加最后一次彩排时，当天中午，500多人在欢呼声中护送他回家。第一晚也是同样的情况，尽管他未在音乐厅中现身，人们还是聚集在他的窗下。”"
 elgar.512.g: "罗西尼与多尼采蒂——真是最佳拍档！"
 elgar.513.t: "多尼采蒂疯了吗？"
 elgar.513.d: "多尼采蒂的精神状况急剧恶化，导致他被送入巴黎的精神病院。"
 elgar.513.f: "多尼采蒂在信件中提到了从1820年代开始长期困扰他的头痛问题，有时还会发热，持续一整天，并且导致心情低落。他一生中完成了大量工作以及长途旅行，特别是在搬到巴黎和维也纳后，这在1842年到1843年导致了疲劳症状加剧。偶发的头痛和发热伴随着头晕，有时出现“头部感觉”。1845年，多尼采蒂的健康状况迅速恶化，他在巴黎街头晕倒。医生禁止他作曲，这使他更加沮丧。最终，在编造的借口下，他在未得到本人同意的前提下被引诱到塞纳河畔伊夫里的精神病院并强制拘留。这位病中的作曲家很快就看穿了他作为“囚犯”和“疯子”的处境，并写信给朋友和亲戚求助，这些信令人心碎。"
 elgar.513.g: "也许这样更好。"
 elgar.513.h: "把他从疯人院里救出来，让他在贝加莫好好休息。"
 elgar.514.f: "在精神病院里住了17个月后，多尼采蒂才被救了出来。医生阻止了他在原定的时间离开，但巴黎警察局长也扮演了某种难以捉摸的角色。在通过外交渠道施压后，这位已经完全失去知觉的作曲家才被他的兄弟弗朗西斯科和侄子安德烈亚带了回来。罗莎·罗塔‑巴索尼男爵夫人的女儿每天为作曲家弹钢琴，并演唱他作品中的咏叹调，他的朋友多尔奇用贝加莫方言与他交谈，男高音鲁比尼也前来看望，但多尼采蒂没有再表现出任何反应。在因中风导致偏瘫、高烧和感染一周后，多尼采蒂去世。尸检结果显示有他有“曾患”脑膜炎的症状，部分脊髓受损并发炎。"
 elgar.514.g: "悲剧般的死亡。"
 elgar.515.t: "多尼采蒂痊愈"
 elgar.515.d: "这位作曲家在经过重症治疗后已经康复，并希望以对生活的新热情进行创作。"
 elgar.515.f: "在我国政府的压力下，多尼采蒂很快离开了精神病院。按照医生的建议，他将在自己的家乡贝加莫进行为期数月的治疗，尽可能地创造最好的条件。归园田居、远离压力，回归本源，在许多个月后终于见效。多尼采蒂在几周内一直处于麻木状态，但在女男爵罗莎·罗塔‑巴索尼的女儿乔万娜演唱了他自己的一首咏叹调后，他有所反应。他每天用当地方言与家人交谈，也显示出日益好转的迹象。经过多年的治疗，这位曾经濒死的作曲家似乎已经重获新生。"
 elgar.515.g: "医学奇迹。"
 elgar.516.t: "李斯特与塔尔伯格"
 elgar.516.d: "两位最著名的钢琴家在巴黎展开对决：弗朗茨·李斯特挑战当世最出色的钢琴家西吉斯蒙德·塔尔伯格。"
 elgar.516.f: "1835年或是1836年的冬天，西吉斯蒙德·塔尔贝格在奥地利驻巴黎大使馆秘书举办的一场私人音乐会上首次亮相。他受到了包括罗西尼和梅耶贝尔在内的在场艺术家的热烈欢迎，并被称赞为新钢琴音乐风格的发明者。李斯特·费伦茨在里昂的音乐会得到了大约500‑600法郎的收入，而塔尔贝格在意大利剧院的一场音乐会就赚了1万法郎。在塔尔贝格第二次出现在巴黎之前，李斯特发表了一篇充满影射和论战的评论。据李斯特说，塔尔贝格的成功完全是通过宣传得来的。从1837年2月起，塔尔贝格再次出现在巴黎，并再次受到赞誉。3月31日，两位艺术家在贝尔吉奥约索女亲王组织的慈善活动上表演。"
 elgar.516.g: "塔尔伯格更好。"
 elgar.516.h: "李斯特更好。"
 elgar.517.t: "从摇篮到坟墓"
 elgar.517.d: "在罗马，李斯特·费伦茨完成了他的最后一首交响诗。音乐节不知应当如何看待这位作曲家最后的“错误”。"
 elgar.517.f: "在他生命的晚年，李斯特越来越多地倾向宗教音乐和教堂音乐。因此，他的最后一首交响《从摇篮到坟墓》与所有前作都迥然不同。李斯特的灵感来自匈牙利画家齐基·米哈伊的一幅画。作品的大段内容并不需要庞大的管弦乐队，尤其是开头，听起来像室内乐；其中形成了许多声音的岛屿，音乐材料很差，独奏段落也不少见，尤其是在乐章的最后。所用的谐音也是未来时代的预兆。然而，在他生前，音乐评论家将这部作品评价为“一个老人的错误”。"
 elgar.517.g: "后人会明白的。"
 elgar.518.t: "罗恩格林"
 elgar.518.d: "理查德·瓦格纳的《罗恩格林》的首映礼不仅座无虚席，而且在德国引发了对瓦格纳由衷的钦佩之情。"
 elgar.518.f: "《罗恩格林》是德国作曲家瓦格纳创作的一部三幕浪漫主义歌剧，脚本由作曲家本人编写。虽然剧中有历史成分，但其性质属于童话歌剧。歌剧灵感来源于中世纪沃尔夫拉姆·冯·埃申巴哈的诗篇《提特雷尔》和《帕西法尔》。华格纳在其最后完成的歌剧《帕西法尔》中再次采用了这两个诗篇中的故事。巴伐利亚的国王路德维希二世对《罗恩格林》极为倾倒，对天鹅武士的形象特别醉心。这位爱幻想的国王常将自己幻想或装扮成天鹅武士。他为此将自己新建的城堡命名为新天鹅堡，并且决定财政支持瓦格纳，以使得后者完成尼伯龙根的指环等大作。"
 elgar.518.g: "鼓舞人心。"
 elgar.519.t: "未来的艺术品"
 elgar.519.d: "在瑞士逗留期间，作曲家理查德·瓦格纳撰写了许多关于音乐和美术的论文，这些论文对德国和全世界对美学的理解具有开创性意义。"
 elgar.519.f: "《未来的艺术品》是理查德·瓦格纳的一篇艺术理论著作，他在苏黎世于1849年至1852年间撰写了这篇文章。与前作《艺术与革命》一样，瓦格纳哀叹艺术的衰落，并发展出了他的新艺术统一理念——“整体艺术”（Gesamtkunstwerk）。与他之前的著作一样，瓦格纳深信希腊艺术是融入了希腊宗教和神秘主义的，并且随着宗教的破坏，艺术也失去了凝聚力，变成了必定堕落的“个别的艺术”（戏剧、音乐和舞蹈）。他抱怨纯粹作为歌词伴奏的音乐艺术已经枯萎了。在接下来的解释中，他详细阐述了不同艺术从古时的理想状态到他所处的堕落时期的发展。在他接下来的最重要的著作《歌剧与戏剧》中，理查德·瓦格纳非常精确地（也非常理论化地）解释了他如何想象出最佳的音乐和诗歌“结合”。随后，他开始“实践”，并创作了《尼伯龙根的指环》作为音乐剧的典范，在经过多年的努力之后完成了作品。"
 elgar.519.g: "谁能理解这些看不懂的套话？"
 elgar.520.t: "特里斯坦与伊索尔德"
 elgar.520.d: "《特里斯坦与伊索尔德》是由理查德·瓦格纳创作的三幕德语歌剧，剧本也是由他本人撰写，主要基于戈特弗里德·冯·斯特拉斯伯格的12世纪爱情传说《特里斯坦和伊索尔德》改编。该歌剧在西方古典音乐作曲家中具有极大的影响力，并为古斯塔夫·马勒、理查德·施特劳斯、阿尔班·贝尔格、阿诺德·勋伯格和本杰明·布里顿等作曲家提供了直接灵感。其他作曲家，如克劳德·德彪西、莫里斯·拉威尔和伊戈尔·斯特拉文斯基，则通过与瓦格纳的音乐传统形成对比来构建自己的音乐风格。许多人认为《特里斯坦与伊索尔德》是从和声与调性的传统中跨出的重要一步，为20世纪古典音乐的发展奠定了基础。"
 elgar.520.f: "“最令我敬畏的作品始终是《特里斯坦与伊索尔德》。当我站在这座恢弘的建筑前，一种颤抖的惊异笼罩了我，我仍然觉得难以置信，一个人怎么能构想并实现这样的工作。我认为第二幕是精神史上最崇高的创作之一。这第二幕是美妙的、十分美妙、无与伦比的美妙。” ——朱塞佩·威尔第"
 elgar.521.t: "理查德·瓦格纳音乐节"
 elgar.521.d: "理查德·瓦格纳节日剧院的建立被认为是19世纪音乐文化的高光之一。"
 elgar.521.f: "每年一度的拜罗伊特音乐节上将会演奏19世纪德国作曲家理查德·瓦格纳的歌剧。瓦格纳本人构思并推动了这场特别的音乐节以展示他自己的作品，尤其是宏伟的《尼伯龙根的指环》与《帕西法尔》。演出在特别设计的拜罗伊特节庆剧院进行。瓦格纳亲自监督了剧院的设计和建造，并采用了许多建筑创新以容纳他作品所需的大型乐队以及舞台设计的特殊愿景。音乐节已经成为瓦格纳迷和古典音乐爱好者的朝圣地。这场独特音乐活动的出席者包括威廉皇帝、巴西皇帝佩德罗二世、路德维希国王和其他贵族，以及哲学家弗里德里希·尼采，还有其他杰出的作曲家如安东·布鲁克纳、爱德华·格里格、彼得·柴可夫斯基、弗朗茨·李斯特和年轻的阿瑟·富特。"
 elgar.521.g: "德意志文化的巅峰！"
 elgar.523.t: "唐怀瑟丑闻"
 elgar.523.d: "理查德·瓦格纳的《唐怀瑟》的演出引起了一场真正的丑闻，令整个巴黎社会感到勃然大怒。不仅仅是瓦格纳违反了法国歌剧歌剧界的良好规则，德法两国音乐界之间的敌意也推波助澜。"
 elgar.523.f: "瓦格纳在巴黎总是感到不太愉快，这不仅是因为要与备受欢迎的杰出作曲家梅耶贝尔竞争。为了在大歌剧院上演他的歌剧《唐怀瑟》，他不得不顺应法国的习惯——比如要安排芭蕾舞。但瓦格纳强烈反对这些规定，只加入了一场酒神舞。同时，瓦格纳还因为折磨人的漫长彩排而让乐手们对他产生了不满。首演引起了一场丑闻：巴黎“马术俱乐部”的绅士们觉得被欺骗了，因为在序曲之后没有出现芭蕾舞。这些绅士们并非为了音乐而来，而是为了观赏美女并在演出结束后去更衣室拜访。他们没有看到想要的节目，于是用口哨和喊叫破坏了演出。第二天的情况也没有改善：巴黎的报纸把这场演出批得体无完肤。不仅在法国，瓦格纳在德国的朋友和敌人都会密切关注我们的反应。"
 elgar.523.g: "他不应该再出现在巴黎！"
 elgar.523.h: "我们必须宽容瓦格纳先生。"
 elgar.524.t: "郝尔拜组曲"
 elgar.524.d: "在奥斯陆首演的爱德华·格里格的《郝尔拜组曲》不仅被证明是一部音乐杰作，而且还激发了挪威人的民族情感。"
 elgar.524.f: "《郝尔拜组曲》是一首五乐章组曲，由爱德华·格里格基于18世纪的舞曲形式于1884年创作，以庆祝丹麦‑挪威人文主义剧作家路德维希·郝尔拜（1684‑1754）诞辰200周年。它展现了19世纪音乐中采用上世纪音乐风格与形式的特点。《郝尔拜组曲》最初是为钢琴创作的，但一年后格里格自己为管弦乐队改编了这首组曲。该组曲包括一首序曲和一组舞蹈。它是新古典主义的早期尝试，试图回响格里格时代所了解的郝尔拜时期的音乐。虽然它不像格里格《培尔·金特》中通常作为组曲演奏的插曲音乐那样有名，但许多评论家认为这两部作品同样出色。"
 elgar.525.t: "新路线"
 elgar.525.d: "在《新音乐杂志》中，罗伯特·舒曼提到了一位一夜成名的新艺术家。他名叫约翰内斯·勃拉姆斯，给舒曼和他的妻子克拉拉都留下了深刻的印象。"
 elgar.525.f: "“年轻的血液已经到来，上帝的恩典与英雄们正在他的摇篮边默默守护。他的名字叫约翰内斯·勃拉姆斯，他来自汉堡，在那里默默无闻地工作，但在这艰难的艺术环境中，一位优秀且热情的老师训练了他。不久前，一位尊敬的著名大师向我推荐了他。他的外表显示出一切天将降大任于斯人的征兆。”—— 罗伯特·舒曼"
 elgar.525.g: "我们期待着勃拉姆斯先生的伟大成就。"
 elgar.526.t: "命运之歌"
 elgar.526.d: "约翰内斯·勃拉姆斯的《命运之歌》是在巴塞尔首演的。瑞士和维也纳一样是勃拉姆斯最重要的居住地之一。"
 elgar.526.f: "《命运之歌》（Gesang der Parzen）是约翰内斯·勃拉姆斯的最后一部合唱和管弦乐作品。在清唱剧《里纳尔多（作品第50号）》和《女低音狂想曲（作品第51号）》十多年后，勃拉姆斯再次使用了约翰·沃尔夫冈·冯·歌德的诗句作为歌词。据马克斯·卡尔贝克所说，勃拉姆斯受到了在维也纳城堡剧院扮演伊菲革涅亚角色的女演员夏洛特·沃尔特的启发，开始创作这首歌曲。1896年6月13日，勃拉姆斯写道：“我经常听到关于命运之歌的第六段的哲学探讨。我认为无忧无虑的听众的心应该因为调式进入大调而变得柔软，眼睛应该湿润；只有这样，人类的悲惨才会被感知到。”"
 elgar.526.g: "它既美妙又令人不安。"
 elgar.527.t: "会作曲的橙子农场主"
 elgar.527.d: "著名羊毛商人尤利乌斯·戴留斯的儿子曾向一位风琴师学习，并且发表了一些早期作品。"
 elgar.527.f: "弗雷德里克·戴留斯出生于英国，是德国羊毛企业家尤利乌斯·戴留斯之子。父亲希望儿子成为公司的接班人，但儿子对欧洲的生意很少关注，却对艺术和音乐更感兴趣。因此，小戴留斯被调到佛罗里达州的一个橘子种植园以使他远离欧洲大都市的影响。然而，正是这次调动对他后来的音乐创作具有突出的意义。在杰克逊维尔，戴留斯遇到了天主教管风琴师托马斯·沃德，戴留斯说他是唯一一个真正教会他东西的人。稍后，戴留斯在弗吉尼亚州的丹维尔发表了他的第一批作品。"
 elgar.527.g: "这个一无是处的家伙可怎么办？"
 elgar.528.t: "奥地利人在纽约"
 elgar.528.d: "古斯塔夫·马勒在奥地利故乡卷入纠纷后，在纽约找到了听众，他的作品在此大受欢迎。美国音乐界的一些要人希望能与他长期合作。"
 elgar.528.f: "“对一些人来说，听到马勒这个名字时仿佛德国人的双肩夹克在身上勒紧了。有些人是出于兴奋，但大多数是出于愤怒。从第一天开始就这样了。他有一种立竿见影的效果，煽动性、挑衅性、惊动性——这并不重要：他拥有一触即发的火花的电气化性质。当然，在开始时，只有他狂热的不受欢迎才使他受欢迎。在仇恨的青睐下，在嫉妒的精心照耀下，那个永远不眠不休的强大的保护者，在讥讽、嫉妒和诽谤下，在每个街角最响亮的声音载体的宣扬下，他已经成名……于是每天都听说他虐待他的乐师，鞭打他们从事非人的工作，煽动他们去死，如果可以的话他们都想用一勺水淹死他。据说他截短了他的歌手，像训练新兵一样训练他们，像土耳其苏丹对待他的奴隶一样玩弄他们……他那强烈的存在感似乎充满了整个纽约市。”——费利克斯‑萨尔滕"
 elgar.528.g: "真是个奇怪的家伙。"
 elgar.528.h: "马勒应该留在美国。"
 elgar.529.t: "斯基泰人组曲"
 elgar.529.d: "谢尔盖·普罗科菲耶夫，俄罗斯音乐界最有前途的青年才俊之一，今天以一场丑陋的表演震惊了观众。"
 elgar.529.f: "普罗科菲耶夫最初为芭蕾舞剧《阿拉和洛利》创作了这组音乐，剧本的故事发生在斯基泰人中间。这部芭蕾舞剧受谢尔盖·达基列夫的委托，根据俄罗斯诗人谢尔盖·戈罗德茨基的情节改编。但达基列夫甚至在完成之前就拒绝了乐谱，因此作曲家将音乐改编为音乐会演出的套曲。这次演出成为普罗科菲耶夫首演历史上最大的丑闻。当时的音乐学院院长亚历山大·格拉祖诺夫中途离席，大多数观众感到愤怒，评论也是毁灭性的。然而，普罗科菲耶夫对此并没有留下什么印象，第二天他在给莫斯科的信中简明扼要地写道：“演出在‘真正的喧闹’中进行着。”"
 elgar.529.g: "杰作！"
 elgar.529.h: "恶心。"
 elgar.530.t: "莱茵交响曲"
 elgar.530.d: "著名作曲家罗伯特·舒曼在莱茵河畔的杜塞尔多夫找了一份工作，他在科隆大教堂的建设工程中突然得到灵感，写下了一部新作品。"
 elgar.530.f: "舒曼被认为是浪漫主义时期最具代表性的作曲家之一。1850年，他接替斐迪南·希勒担任音乐总监，并搬到杜塞尔多夫。尽管人们批评舒曼的指挥技巧不好，嘲笑他“创造力衰退”，但舒曼还是创作了他最后一部交响曲《莱茵》。他以贝多芬和门德尔松的交响乐为榜样，但也受到了他对莱茵兰印象的启发。舒曼本人说，他到科隆的旅程和大教堂的景观是他创作这部作品的主要灵感来源，这部作品成为他最著名的作品之一。"
 elgar.530.g: "继续建造大教堂是个好主意，不是吗？"
 elgar.531.t: "舒曼尝试自杀"
 elgar.531.d: "今天，作曲家罗伯特·舒曼在最后一刻被人从河中救起——他显然是在精神错乱当中尝试自杀。现在还完全不清楚该如何处理他。"
 elgar.531.f: "1854年2月10日，舒曼的心理痛苦剧增。他主要抱怨“听力问题”。音调、和弦、整首乐曲在他脑中肆虐，让他无法入睡。与此同时，舒曼被妻子和孩子们日夜看护着，并且已经接受了医疗监护，但他还是在1854年2月27日一个无人注意的时刻离开了寓所。他走向附近的浮桥，翻过栏杆，将结婚戒指扔进水里，然后投河自尽。他被浮桥的主人和其他不明身份的人救起，被带回家，并得到一名医生的照顾。自杀未遂后，他希望住进波恩附近恩德尼希的精神病治疗和护理机构，该机构由精神病医生弗朗茨·里夏尔兹于1844年开办。"
 elgar.531.g: "我们无能为力。"
 elgar.531.h: "把他送到恩德尼希附近的现代精神病院。"
 elgar.532.t: "舒曼之死"
 elgar.532.d: "罗伯特·舒曼曾经是一位前途无量的音乐天才，但在经历了数年的精神错乱之后，他无声无息地死在了精神病院。"
 elgar.532.f: "勃拉姆斯在1854年3月31日和8月19日见到了舒曼，但未能与他交谈。但在1855年1月11日、2月23日和4月2日，两人进行了细致的交谈。舒曼的情况很好，他可以和勃拉姆斯一起在方形钢琴上弹奏音乐，并在警卫的监督下陪他走了一段路去到波恩火车站。1856年4月10日，勃拉姆斯发现舒曼的情况岌岌可危，已经不能说话了。1856年5月1日，医疗记录中最后一次提到舒曼弹奏钢琴。大多数情况下他很难无法用语言表达自己的意思。克拉拉·舒曼从1856年4月起就计划将舒曼带到杜塞尔多夫并亲自照顾他，但她未能如愿。从1856年7月中旬开始，舒曼吃得越来越少。1856年7月26日，他的“面部和四肢肌肉抽搐”。粘液性啰音提示他患有肺炎。罗伯特·舒曼于7月29日去世，当时无人在场。"
 elgar.533.t: "罗伯特·舒曼神奇康复"
 elgar.533.d: "显然，恩德尼希疗养院的现代疗法已经产生了效果。舒曼的病情有了好转的迹象，不过他重返工作岗位还需要几个月的时间。"
 elgar.533.f: "1854年9月，舒曼在他们结婚14周年纪念日前不久告诉彼得，杜塞尔多夫倒塌了，克拉拉和孩子们都死了，之后舒曼开始了奇迹般的康复。为了消除这种幻觉，彼得向克拉拉·舒曼要了一封写给丈夫的信。这是舒曼住院以后他们之间的首次书信往来。从此，舒曼又开始积极地参与精神病院之外的生活。他还与孩子们、约翰内斯·勃拉姆斯、约瑟夫·约阿希姆以及出版商通信。1854年9月至1855年5月间，他写了约25封信。在此期间，舒曼经常表示希望能够再次离开恩德尼希。他时不时地弹弹琴，还学习了勃拉姆斯的作品。1855年1月11日，约翰内斯·勃拉姆斯第一次来访。从那时起，舒曼的病情逐渐好转，直到医生允许克拉拉·舒曼前来探望。在她和勃拉姆斯的支持下，舒曼很快又开始作曲，并由此开始了自我康复的过程。"
 elgar.533.g: "可是这怎么可能呢？"
 elgar.534.t: "探戈"
 elgar.534.d: "探戈的诠释者卡洛斯·加德尔录制了他的第一张唱片《我的悲情夜》。"
 elgar.534.f: "卡洛斯·加德尔是探戈历史上最杰出的人物。他是20世纪上半叶世界流行音乐中最具影响力的演绎者之一。加德尔是举世闻名的流行探戈歌手，他于1917年演绎了帕斯夸尔·孔图尔西和塞缪尔·卡斯特里奥塔的《我的悲情夜》，创造了探戈歌曲。随着《我的悲情夜》诞生，伤感探戈也应运而生。这种怀旧、多情且悲伤的新歌词和音乐体现了布宜诺斯艾利斯及其人民的生活。"
 elgar.534.g: "阿根廷音乐的胜利。"
 elgar.601.t: "[SCOPE.sCharacter('elgar_composer_scope').GetLastName]之死"
 elgar.601.d: "[SCOPE.sCharacter('elgar_composer_scope').GetFullName]是我国最伟大的艺术思想家之一，也是音乐界一颗闪亮的明星。他的离去留下了难以填补的空白。"
 elgar.601.g: "一位音乐史上的巨人离开了我们。"
 elgar.603.t: "罗西尼离开博洛尼亚"
 elgar.603.d: "罗西尼决定离开博洛尼亚。这一消息不仅让博洛尼亚市民大吃一惊，也让整个国家为之哀伤。"
 elgar.603.f: "当焦阿基诺·罗西尼决定离开博洛尼亚与教宗国时，距离他退出歌剧舞台已经过去了约20年。尽管如此，罗西尼仍然是一位备受尊敬的人物，也是意大利最受喜爱的作曲家之一。罗西尼在佛罗伦萨短暂停留后又搬回巴黎的一个主要原因可能是他的健康状况。在作为欧洲音乐巨星的最后几年中，他的身体和精神状况都已恶化。巴黎能够提供更好的医疗条件是罗西尼考虑在那里安度晚年的原因。"
 elgar.603.g: "但他的意大利馄饨还没吃完呢！"
 elgar.609.d: "弗朗茨·拉赫纳今天宣布从指挥台上退休。他认为自己的职业生涯前途黯淡。"
 elgar.609.f: "一系列情况导致弗朗茨·拉赫纳早早离开了音乐世界。其中的决定性因素是理查德·瓦格纳的新音乐及其盟友的胜利。曾与舒伯特和贝多芬相识的拉赫纳无法也不愿追随这一发展。与罗西尼一样，拉赫纳也明白自己被视为旧时代的遗老，而世界已经向前发展，因此他退出了，特别是因为忠于瓦格纳的评论家对他的嘲笑和恶意。"
 elgar.609.g: "这是[GetPlayer.GetName]的损失。"
 elgar.613.f: "加埃塔诺·多尼采蒂在他的第二任妻子的怀抱中和他的儿子们的陪伴下度过了漫长而充实的生活，今天早上平静地去世了。由几支乐队、数百名火炬手和数千名观众组成的送葬队伍为一个可以说度过了完美一生的人送别。"
 elgar.614.f: "1867年，柏辽兹收到了他的儿子在哈瓦那死于黄热病的噩耗。麦克唐纳认为，柏辽兹可能试图通过在圣彼得堡和莫斯科举行一系列音乐会来分散自己的悲痛，但这次旅行并没有使他恢复元气，反而消耗了剩余的力量。他前往尼斯，在地中海的气候下恢复了健康，但可能因为中风在海岸边的岩石上跌倒，不得不返回巴黎，并在那里休养了几个月。1868年8月，他自觉可以短暂前往格勒诺布尔评判一次合唱节。回到巴黎后，他逐渐变得虚弱，并于1869年3月8日在位于卡莱街的房子里去世，享年65岁。他被埋葬在蒙马特公墓，与他的两个妻子葬在一起，后来她们的遗骸被重新挖掘并葬在他旁边。"
 elgar.615.f: "在与卡罗琳·祖·赛恩‑维特根斯坦的婚姻失败后，李斯特越来越多地投身宗教主题的创作。1870年前，他大部分时间都居住在罗马，过着半世俗半修道的生活，并在1863年夏天隐居修道院，教宗庇护九世也在那里拜访了他。1865年，李斯特接受了剃发礼并领受了四项小品。从那时起，作为一名教士，他戴上了罗马领并被称为修道士。1886年，李斯特参加了瓦格纳音乐节。在旅途中，李斯特已经身患重病，并在抵达后几天于1886年7月31日因肺炎去世。理查德·瓦格纳的医生和朋友伯恩哈德·施纳鲍夫在他临终前的最后几天里，记录说李斯特去世时很安静，很有尊严。医生合上死者的眼睛并制作了死亡面具，根据古老的习俗，他有权获得裹尸布和枕套。"
 elgar.616.f: "1882年9月16日，瓦格纳和家人前往威尼斯，在那里与李斯特·费伦茨共度了数周。12月25日，作为送给妻子科西玛的生日礼物，他在凤凰剧院最后举办了一场联合音乐会，指挥了他的C大调青年交响曲。1883年2月13日，他留在他和家人居住的温德拉敏宫的侧翼。大约下午3点左右，家人在餐桌上等待瓦格纳，而他却在他的书房里写一篇关于人类中女性的文章，他突然感到心脏疼痛。女佣在他桌前找到他，他倒在桌上，手边的字是“尽管如此，女性解放的过程仍只是由于狂喜的痉挛所推动。爱情——悲剧。”他说：“我的妻子和医生”，然后失去了意识，在科西玛的怀中离世，时间是下午3点30分。"
 elgar.617.f: "长期受到病痛折磨后，爱德华·格里格于1907年9月4日在挪威卑尔根市立医院因心力衰竭去世，享年64岁。他的遗言是：“好吧，如果必须这样的话。” 葬礼举行时，3至4万人走上他家乡的街头表达哀悼。遵照格里格的遗愿，他的朋友与侄女婿约翰·哈尔沃森指挥管弦乐团演奏了《为瑞卡德·诺德拉克作的葬礼进行曲》。此外，还演奏了肖邦《第2号钢琴奏鸣曲》的《葬礼进行曲》乐章。格里格在当年于卑尔根市开设的的挪威第一座火葬场被火化，骨灰被安放在其住所特洛尔豪根附近的山洞中。在他的妻子去世后，她的骨灰也被安放在他旁边。"
 elgar.618.f: "勃拉姆斯于1897年4月3日凌晨在卡尔斯街4号的公寓中去世，享年63岁，他自1872年起一直住在那里。根据一些传记，他死于肝癌，但最近的研究则认为是胰腺癌。他的最后一次公开露面是在1897年3月7日，当时他观看了汉斯·里希特指挥他的《第4交响曲》，每个乐章结束后都有掌声。在灵堂中举行了遗体告别仪式，卡尔·昆德曼移除了他的死亡面具，路德维希·米哈莱克绘制了最后一张粉笔肖像。圣餐礼于4月6日在路德宗城市教堂举行。"
 elgar.619.f: "“早晨的维也纳一片混乱。你想紧紧抓住一切细节，但无人知晓。他将被埋葬在格林钦的小公墓里，在他的小女儿身边。遗体运过来了。另一个早晨。一条穿过乡村，通向柏树的道路。礼拜堂的空间很小，只放了棺材和一些花圈。其他的人在通往坟墓的小路上排队。一个女人走过来，对另一个女人说：\"现在他在里面安息了。一切对他来说都太小了。格林钦的教堂很小，教堂的墓地很窄。而维也纳人的奇观即将到来。教堂和公墓将被封锁起来。只有持卡者才能进入。我们得知弗朗茨·沙尔克、格雷戈尔和董事会要求在葬礼当天关闭歌剧院。没有这方面的消息。法院和维也纳市政府没有动静。然后是庆祝。(因为歌剧院确实关闭了)。棺材被抬出时，我们站在教堂前。下雨了。我们通过一条葡萄园小路更快到达坟墓。火车到了。雨停了。一只夜莺在唱歌，土块落下。一道彩虹。几百个人都沉默了。” —— 保罗·斯蒂芬"
 elgar.701.g: "精彩的演出。"
 elgar.701.h: "雇用这个聪明人！"
 elgar.706.g: "20岁，做这样的工作是不是有点太年轻了？"
 elgar.701.t: "葬礼与凯旋大交响曲"
 elgar.701.d: "为纪念七月革命十周年，赫克托·柏辽兹创作了一首乐曲，引起了公众的高度赞赏。"
 elgar.701.f: "法国政府委托柏辽兹为推翻了查理十世国王并拥立路易·菲利普登基的七月革命十周年庆典创作交响曲，政府正在巴士底广场竖立七月纪念柱作为纪念。柏辽兹对这个政权没有什么同情，但欣然接受了创作这部作品的机会，因为政府给了他10000法郎的酬劳。《军乐交响曲》（后改名为《葬礼与凯旋交响曲》），与柏辽兹在《罗密欧与朱丽叶》中创造的模式不同，代表了一种前贝多芬时期的较早风格，沿袭了法国公共庆典音乐的宏伟传统。柏辽兹于1842年1月修订了乐谱，增加了弦乐的可选部分和一个最终合唱，由安东尼·德尚创作歌词。理查德·瓦格纳于1842年2月1日在维维纳大厅观看了新版本的演出。2月5日，他告诉罗伯特·舒曼，他认为柏辽兹的交响曲最后一乐章中的几个片段是“壮丽而崇高，永远无法超越的”。"
 elgar.702.t: "李斯特在魏玛"
 elgar.702.d: "经过多年的巡回演出，钢琴演奏家及作曲家李斯特·费伦茨正考虑在魏玛定居。"
 elgar.702.f: "在魏玛度过的几年是弗兰兹‑李斯特在艺术上最富有成效的时期。他在魏玛创作了许多钢琴作品，如《b小调钢琴奏鸣曲》、《诗歌与宗教和声》系列、15首《匈牙利狂想曲》，以及大量的转录、钢琴改编和对早期钢琴作品的修改，如《帕格尼尼练习曲》。他之前构思的两部钢琴协奏曲也在这里最终定稿。在魏玛，李斯特指挥了许多当代作曲家的作品，其中一些在当时尚具争议，还演出了他们的歌剧。他指挥了理查德·瓦格纳的作品，而瓦格纳与他关系特别密切，1849年春天德累斯顿起义后，李斯特帮助后者逃到了苏黎世。在随后的几年里，他在经济上和精神上支持瓦格纳，并与他保持着活跃的通信联系。后来，李斯特和瓦格纳经常作为指挥家一起出现。从1865年起，在瓦格纳与李斯特的女儿科西玛发生关系后，两人的关系冷却了很长一段时间。"
 elgar.703.t: "黎恩济"
 elgar.703.d: "一位年轻的作曲家以他的歌剧《黎恩济》给德累斯顿的观众和国际艺术家留下了深刻的印象。他的名字叫理查德·瓦格纳。"
 elgar.703.f: "“后来的一切经历都无法让我体会到与我在首演《黎恩济》的那一天相似的感受。之后我所有作品的首演都伴随着深深的忧虑，以至于我无法真正享受它们或关注观众的反应……《黎恩济》的首演注定成功。但是公众为我疯狂的方式非常特别……所有人已经预先笃定要接受这部作品，因为戏剧界的每一个人都在传播如此有利的言论......整个城市都期待着这场被宣传做一个奇迹的演出……回忆当晚我的状态，我只能说，它具备了梦境的所有特征。”—— 理查德·瓦格纳"
 elgar.704.t: "A小调钢琴协奏曲"
 elgar.704.d: "爱德华·格里格的一首钢琴协奏曲今天在哥本哈根举行了世界首演。已经可以预见，这将是他最受欢迎的作品之一。"
 elgar.704.f: "爱德华·格里格在1868年创作的《A小调钢琴协奏曲（作品第16号）》是他唯一完成的协奏曲。这一曲目是格里格最早的重要作品之一，由时年24岁的作曲家鱼1868年在丹麦瑟勒勒创作，当时他正为了宜人的气候在那里逗留。格里格的协奏曲表明了他对挪威民间音乐的兴趣；开头的华彩是基于一个下降的小二度和一个下降的大三度的动机，这是格里格的祖国民间音乐的典型特征。该作品于1869年4月3日在哥本哈根首演，由霍尔格·西蒙·保利指挥，埃德蒙·诺佩特担任独奏家。一些消息来源说，格里格本人原本计划进行独奏，由于和克里斯蒂安尼亚（今奥斯陆）的管弦乐团有合约而无法参加首演。出席首演者包括丹麦作曲家尼尔斯·加德和俄罗斯钢琴家安东·鲁宾斯坦，后者为演出提供了他的钢琴。格里格至少进行了七次修订，大多是微小的修改，但最终的修订版本与原始编曲有超过300处差异。"
 elgar.705.t: "海顿主题变奏曲"
 elgar.705.d: "作曲家约翰内斯·勃拉姆斯今天演出了一部新的杰作，但同时他也在考虑永久定居维也纳。"
 elgar.705.f: "《海顿主题变奏曲（作品56a）》是约翰内斯·勃拉姆斯创作的管弦乐变奏曲。该作品于1873年夏天的作于图青。首演由勃拉姆斯亲自指挥，于1873年11月2日在维也纳举行。创作这部作品时勃拉姆斯希望纪念自己在维也纳的生活。一方面，他多年前是心怀沮丧地离开了代特莫尔德与汉堡；另一方面，他正生活在伟大的古典典范曾经居住的地方，并努力延续维也纳的传统。"
 elgar.706.t: "马勒的首次亮相"
 elgar.706.d: "在巴特哈尔，年轻有为的指挥家古斯塔夫·马勒首次登场指挥。在接下来的几年里他将青云直上，直到维也纳国家歌剧院。"
 elgar.706.f: "“在我首次拜访波利尼后离开时，他就在剧院办公室里：苍白、瘦弱、身材瘦小、长脸、陡峭的额头被深黑色的头发框住、眼镜后面的深邃双眼、面容上深深的痛苦和幽默的皱纹，与他对话时，他的表情变化多端，就像E.T.A.霍夫曼幻想小说的年轻读者所能想象到的合唱团长克莱斯勒的化身一样，既有趣又魔幻，令人生畏；他友善地询问我的音乐能力和知识——我的回答显然让他感到满意，同时有些羞涩和自信——然后我留在了一种茫然和震撼的状态中……马勒在我眼中和他的举止中，呈现出天才和恶魔的形象……” ——布鲁诺·瓦尔特"
 elgar.707.t: "第2钢琴协奏曲"
 elgar.707.d: "历经挫折后，作曲家谢尔盖·拉赫玛尼诺夫的回归令人印象深刻：他的第2钢琴协奏曲引起了狂热的掌声。"
 elgar.707.f: "在1897年《第1交响曲》灾难性的首演之后，拉赫玛尼诺夫心理崩溃，三年来都无法创作。虽然抑郁症耗尽了他的精力，但他仍然从事表演。为了改善经济状况，他必须指挥演出并教授钢琴课。1899年，拉赫玛尼诺夫本应在伦敦演奏因病尚未创作的《第2钢琴协奏曲》，但却成功地完成了作为指挥的首次亮相。亲戚们决定把他介绍给神经学家尼古拉·达尔，从1900年1月到4月，拉赫玛尼诺夫每天都去拜访达尔，这有助于恢复他的健康和对作曲的信心。拉赫玛尼诺夫将这首协奏曲献给成功治愈了自己的达尔。在完成了1908年女王音乐厅的音乐会后，塞尔吉·库塞维茨基引导《泰晤士报》刊登了一篇奉承的评论：\"作品的直接表达，拉赫玛尼诺夫演奏的非凡精确性和准确性，甚至他饱经锻炼的手臂和双手的严格运动，都促成了表演的完整印象。”"
 elgar.708.t: "第1交响曲“古典”"
 elgar.708.d: "凭借自己的第一部交响曲，谢尔盖·普罗科菲耶夫跻身新晋作曲家之列。另一方面，它把年轻的艺术家推向了世界并获得更高的报酬。"
 elgar.708.f: "“与国家管弦乐团排练《古典交响曲》并由我自己指挥，完全是即兴发挥，因为我已经忘记了乐谱，也从未从指挥角度研究过它。我想这可能会是一个彻底的失败，但什么也没有发生，而且无论如何，这些部分有很多错误，以至于这次合练主要变成了纠正的过程。在基斯洛沃茨克，我曾担心一个‘革命性乐团’在演奏我的新作品时会有一些对立情绪，但情况恰恰相反：注入了许多年轻血液的国家乐团非常灵活和专注，并在演奏交响曲不表现出明显的兴趣。”——谢尔盖·普罗科菲耶夫"
 elgar.709.t: "罗密欧与朱丽叶"
 elgar.709.d: "年轻有为的作曲家彼得·柴可夫斯基演奏了他的序曲《罗密欧与朱丽叶》。观众对这部作品褒贬不一。"
 elgar.709.f: "在创作初期乃至整个创作生涯当中，柴可夫斯基都不得不面对评论家和竞争对手的质疑。例如，序曲《罗密欧与朱丽叶》在出版时被认为是一部失败之作。另一方面，柴可夫斯基一生中屡次受到这种批评，导致作曲家对这部作品和其他作品的修改过于苛刻；柴可夫斯基在整个职业生涯中始终是自己作品的最大的批评者之一。同样具有讽刺意味的是，具有俄罗斯民族思想的作曲家们恰恰赞扬了这部作品，尽管他们后来成为了柴可夫斯基最严厉的批评者。然而柴可夫斯基注定要在晚些时候成为这一时期最重要的俄罗斯作曲家之一，并在短短几年中获得了本世纪内无可匹敌的国际声誉。"
 elgar.710.t: "威尔第万岁"
 elgar.710.d: "在意大利民族国家建立并将米兰纳入版图之后，我们有机会接触意大利音乐史上最重要的人物之一：朱塞佩·威尔第。"
 elgar.710.f: "朱塞佩·威尔第是意大利作曲家和政治家，与十九世纪意大利音乐舞台上的其他主角：焦阿基诺·罗西尼、文森佐·贝利尼和加埃塔诺·多尼采蒂一并，被公认为有史以来最伟大的歌剧艺术家和作曲家。他同情追求意大利统一的复兴运动，并在较短的一段时期内积极参与政治生活；而在其更加漫长的人生历程中，他在同胞心目中确立了独特的地位，成为国家统一在艺术上不可磨灭的象征。正因如此，在他去世一个月后，一支庄严肃穆、绵延不绝的队伍护送他的遗体穿过米兰，奏响了他60年前创作的《拿布果》中《飞吧，思想，乘着金色的翅膀》的旋律，表现了意大利人对自己所怀念的英雄的情感。这表明威尔第的音乐在相当深刻的程度上融入了民族意识。他的作品至今仍举世闻名，并在世界各地的剧院中上演，尤其是《阿依达》（1871）、前面提到的《拿布果》（1842）和所谓的“威尔第三部曲”：《弄臣》（1851）、《游吟诗人》（1853）和《茶花女》（1853）。"
 elgar.711.t: "春之交响曲"
 elgar.711.d: "罗伯特·舒曼的第1交响曲今天在费利克斯·门德尔松·巴托尔迪的指挥下演奏。舒曼的妻子是著名钢琴家克拉拉（婚前姓维克），迄今为止，舒曼更多的是作为音乐评论家而非作曲家引起人们的注意。观众对他的钢琴作品众说纷纭。"
 elgar.711.f: "除了弗朗茨·舒伯特之外，德语作曲家中没有人曾在生前受到过像罗伯特·舒曼那样的误解。舒伯特的重要性在他早逝后才得到承认，而舒曼则被指责为江郎才尽。同时代的人往往无法接触到他的作品，或是根本无法理解。他的钢琴作品在今天颇具声誉，但在当时却基本默默无闻。许多人只把他嘲弄作钢琴家克拉拉·舒曼的枕边人。在家乡萨克森，他处于门德尔松的阴影之下。瓦格纳后来反对他，而勃拉姆斯却成为了克拉拉和罗伯特的知己。李斯特将舒曼视为德意志音乐进步的先驱，但当他将舒曼的作品纳入自己的曲目单时，却未能得到听众的青睐。舒曼在重要音乐机构获得常任职位的希望一再破灭。与舒伯特相似，他也过早地迎来了悲剧性的结局。"
 elgar.712.t: "奥拉夫王"
 elgar.712.d: "爱德华‑埃尔加近年来在康塔塔和合唱作品方面成绩斐然。《奥拉夫王的传奇场景》是他的最新作品，深受听众欢迎。"
 elgar.712.f: "1890年代，爱德华·埃尔加作为英国重要作曲家的声誉日益增长。最初，他深受欧洲大陆的影响——《奥拉夫王》也显示出了瓦格纳风格的影子——但他逐渐找到了自己的音乐语言，并将鼓励后来的英国作曲家走上全新的道路。埃尔加觉得自己是个局外人，不仅在音乐界如此，在社会上亦然。在学者主导的音乐圈中，他是一位自学成才的作曲家；在新教英国，他的罗马天主教信仰在某些方面受到怀疑；在维多利亚和爱德华时代的英国阶级社会中，他对自己卑微的出身十分敏感，即使在获得认可之后也是如此。尽管如此，埃尔加仍被认为是自亨利·珀塞尔以来最重要的英国作曲家。"
 elgar.713.t: "皇家舞会音乐总监"
 elgar.713.d: "皇家舞会音乐总监一职已空缺多年。这个显赫的职位本应由作曲家约翰·施特劳斯获得。但此前他由于政治原因被剥夺了这一荣誉。现在，越来越多的人希望将这一职位授予给这位早逝作曲家的儿子。"
 elgar.713.f: "约翰·施特劳斯是奥地利和德国的乐队指挥和作曲家，是国际公认的“圆舞曲之王”。他六岁时就创作了自己的第一首圆舞曲，并偷偷学习小提琴，因为他的父亲希望他成为公务员。在乃父与家庭决裂后，他的母亲违背了父亲的意愿，支持儿子接受音乐训练。他第一次在多迈尔赌场多玛耶尔赌场演出就获得了巨大成功，该赌场是当地著名的娱乐场所。最初，他带着自己的管弦乐队在多瑙河君主国进行巡回演出（这加剧了他与父亲的竞争）。父亲去世后，他接管了父亲的乐团，并将其与自己的乐团合并。由于他曾为1848年的革命者创作了一些作品，从而表现出对起义运动的同情，他引起了审查部门的注意，尽管他很受欢迎，但在宫廷中失去了宠信。因此，他直到1863年才获得皇家舞会音乐总监的职位。"
 elgar.713.g: "他错失了机会，但欢迎他继续作曲。"
 elgar.713.h: "给华尔兹之王应有的地位！"
 elgar.714.t: "国家作曲奖得主"
 elgar.714.d: "今年的国家作曲奖得主是捷克的一位杰出人才。他的名字叫安东宁·德沃夏克。"
 elgar.714.f: "安东宁·德沃夏克是一位捷克作曲家，他经常采用摩拉维亚和家乡波希米亚民间音乐的节奏和其他特质。德沃夏克从小就显示出音乐天赋，6岁起就开始学习小提琴。1874年，他向奥地利国家作曲奖提交了一份作品，其中包括两首交响曲和其他作品的乐谱。虽然德沃夏克当时并不知情，但评委会的主要成员约翰内斯·勃拉姆斯对他印象深刻。德沃夏克于1874年获奖，1876和1877年再度蝉联奖项，当时勃拉姆斯和同为评委会成员的著名评论家爱德华·汉斯里克都结识了德沃夏克。勃拉姆斯向他的出版商西姆罗克推荐了德沃夏克。"
 elgar.714.g: "实至名归。"
 elgar.714.h: "我们不能错过这位天才。"
 elgar.715.t: "波希米亚作曲家"
 elgar.715.d: "克劳德·德彪西以罗马奖得主的身份出道，但迄今为止，除了写出一些挑衅性的钢琴小品外，他几乎没有凭借自己公认的才华取得任何成就。这位波希米亚人将何去何从？"
 elgar.715.f: "即使在音乐学院中，对克劳德·德彪西才华的评价也大相径庭。有人称赞他是一位前途远大的钢琴家，但也有人认为他粗心大意。在此期间，他已经在柴可夫斯基的赞助人娜杰日达·冯·梅克家中演奏钢琴。1884年，德彪西赢得了罗马奖，但他在罗马逗留期间却不得志。他觉得意大利歌剧乏味，对时下流行的朱塞佩·威尔第风格也不感兴趣。他早早回到了巴黎，在那里过着浪子的生活：“我相信学院是不会同意的，因为学院自然会将自己指定的道路视为唯一正确的道路。但这是没有办法的事！我太迷恋我的自由，太喜欢我自己的想法了！”"
 elgar.715.g: "钢琴曲不错，但我们的音乐流浪汉已经够多了。"
 elgar.1011.t: "唐·帕斯夸莱"
 elgar.1011.d: "一位大作曲家刚刚完成了一部音乐杰作！"
 elgar.1011.f: "《唐·帕斯夸莱》是一部三幕喜歌剧。它是同类型歌剧中最为著名的作品之一，与《爱情灵药》和《拉美莫尔的露琪亚》一样，是多尼采蒂为数不多的自19世纪以来始终上演的传统作品之一。该剧以卡洛·哥尔多尼的喜剧为基础，人物或多或少地基于喜剧类型，但被赋予了情感特征，即通过感受和表达悲伤、痛苦或悔恨的能力，这是一种超越其类型的区别。《唐·帕斯夸莱》一炮而红，这在以前只有贝利尼的《清教徒》（1835）在巴黎实现过。"
 elgar.1011.g: "棒极了！"
 elgar.1012.t: "唐·塞巴斯蒂安"
 elgar.1012.f: "《唐·塞巴斯蒂安》是加埃塔诺·多尼采蒂的一部五幕法语大歌剧。它是一部历史剧，讲述了葡萄牙国王塞巴斯蒂安（1554‑1578）的故事和他在1578年远征摩洛哥时的不幸遭遇。当时，多尼采蒂正试图创作一部歌剧以与达尼埃尔·奥柏、弗罗芒塔尔·阿莱维和贾科莫·梅耶贝尔的相似历史歌剧竞争。一位评论家将《唐·塞巴斯蒂安》称为“五幕葬礼”。这部作品受到了不情愿的欢迎，多尼采蒂自己也觉得这是一场惨败。尽管多尼采蒂认为他的最后一部歌剧是他最重要的作品之一，但《唐·塞巴斯蒂安》今天在很大程度上已被遗忘。这部作品是在多尼采蒂“不再能无限制地控制他的想象力”的时候写成的，所以这部歌剧已经带有罹患疾病的苗头。"
 elgar.1021.t: "特洛伊人"
 elgar.1021.f: "《特洛伊人》为柏辽兹所作的法文五幕歌剧，剧本由柏辽兹本人在1856年到1858年间亲自完成，主要是根据维吉尔的叙事史诗《埃涅阿斯纪》写成。《特洛伊人》是柏辽兹最庞大也是最具有雄心的作品，也可以视为是他创作生涯的一个总结，但是在他有生之年却从未见到这出歌剧完整上演过。这出作品的最后三幕曾以《在迦太基的特洛伊人》为名，在1863年11月4日于巴黎首演。"
 elgar.1022.t: "浮士德的天谴"
 elgar.1022.f: "《浮士德的天谴》是法国作曲家埃克托·柏辽兹为四个独唱声部、七个声部的完整合唱团、大型儿童合唱团和管弦乐队创作的作品。他称其为 “戏剧传奇”（légende dramatique）。这位法国作曲家从歌德的诗剧《浮士德》的译本中获得灵感，创作了一部音乐作品，这部作品就像他改编的那部杰作一样，不易被归类。它在不同时期被设想为自由形式的清唱剧和歌剧，游记形式和宇宙观使它的歌剧舞台成为一个极大的挑战。柏辽兹本人渴望看到这部作品的上演，但当他真的看到时也不得不承认当时的制作技术无法完成将这部作品带入戏剧性生活的任务。这部作品的大部分名气都来自于音乐会的演出。"
 elgar.1023.t: "仪器仪表论"
 elgar.1023.f: "“这部《仪器仪表论》是一部非常矛盾的作品。它以几行与主题无关的序言开始，在序言中，作者反对那些滥用调式的音乐家，他们对不和谐的嗜好与某些动物对咸味植物和带刺灌木的嗜好一样。然后，他转向管弦乐器，将奇怪的论断与最坚实的真理和宝贵的建议混合在一起。……他的论文就像他的管弦乐一样，展现了柏辽兹的所有怪异之处，这简直是不可思议的。我们这一代人要感谢他的教育，而且我敢说是很好的教育。柏辽兹拥有点燃想象力和唤起人们对他所教授的艺术的热爱的宝贵天赋。……这些看似多余的音乐实例使人梦想成真，它们打开了通往新世界的大门，让人看到一个广阔的、迷人的未来，看到应许之地。”—— 卡米尔·圣桑"
 elgar.1031.t: "前奏曲"
 elgar.1031.f: "《前奏曲》是李斯特·费伦茨十三首交响诗中的第三首。这部音乐创作于1845‑54年间，最初是李斯特的合唱循环曲《四元素》的序曲，后来被修订为独立的音乐会序曲，新的标题指的是阿方斯·德·拉马丁的一首诗作。《前奏曲》是题为\"交响诗\"的管弦乐作品中最早的范例。李斯特将生命的各个阶段视为死亡旋律的前奏。这些生命阶段是挣扎和风暴，爱情的欢愉和痛苦，慰藉，体验自然。尽管《前奏曲》中反映了这些情绪的对比，但这部作品却具有极大的连贯性。它以忧郁的旋律开始，从中发展出第一个暴风雨般的主旋律，通过一个田园诗般的部分引出第二个主题。这两个主题在滑行变化的情绪中发展。在一个高潮中，原始的主题流向第一主旋律，以雄伟壮丽的小号旋律告终。"
 elgar.1032.t: "匈牙利狂想曲"
 elgar.1032.f: "《匈牙利狂想曲》是一套由19首钢琴曲组成的作品，以匈牙利民间题材为基础，由李斯特在1846‑1853年间创作，后来在1882和1885年创作。李斯特还为管弦乐队、钢琴二重奏和钢琴三重奏安排了版本。有些作品比其他作品更有名，其中第2号匈牙利狂想曲特别有名，第6号、第10号、第12号和第14号（尤其是为钢琴和管弦乐队编排的《匈牙利幻想曲》）也很有名。李斯特吸收了许多他在家乡匈牙利西部听到的主题，他认为这些主题是民间音乐，尽管许多实际上是匈牙利上层中产阶级成员或约瑟夫·科索维茨等作曲家创作的曲子。在其原始的钢琴形式中，《匈牙利狂想曲》以其难度而闻名。"
 elgar.1033.t: "但丁交响曲"
 elgar.1033.f: "《但丁交响曲》是李斯特创作的一部合唱交响曲。它以高度浪漫的风格写成，以《神曲》中描述的但丁的地狱和炼狱之旅为基础。一些评论家认为，《但丁交响曲》与其说是古典意义上的交响曲，不如说是两首描述性的交响诗。李斯特的初衷是将这部作品分为三个乐章：《地狱》、《炼狱》和《天堂》。前两个乐章是纯粹的器乐，而最后一个乐章是合唱。然而，瓦格纳说服了李斯特，认为没有一个地球上的作曲家能够忠实地表达天堂的欢乐。李斯特放弃了第三乐章，但在第二乐章的结尾处增加了一段合唱的《尊主颂》。研究李斯特的学者汉弗莱·塞尔认为，虽然李斯特可能觉得描写地狱区域比描写天国区域更自在，但用音乐描写天堂的任务不会超出他的能力。"
 elgar.1041.t: "纽伦堡的名歌手"
 elgar.1041.f: "《纽伦堡的名歌手》是理查德·瓦格纳的一部音乐剧或歌剧，共分为三幕。它是保留剧目中时间最长的歌剧，不计两次幕间休息需要近四个半小时的演出时间，并且传统上不予删减。《纽伦堡的名歌手》在瓦格纳的创作中占据了独特的地位。是他成熟时期唯一的一部喜剧，同时也与他的其他作品大相径庭，因为它是依据历史上具体的时代和地点而不是在神话或传说的背景下进行的。它是瓦格纳成熟时期唯一一部基于完全原创故事的歌剧。这部歌剧融合了许多瓦格纳在他有关歌剧理论的论文中曾经反对的歌剧传统：韵律诗、咏叹调、合唱、五重唱，甚至包括芭蕾舞。"
 elgar.1042.t: "女武神"
 elgar.1042.f: "《女武神》与歌剧《莱茵的黄金》、《齐格弗里德》和《诸神的黄昏》共同构成了完整的作品《尼伯龙根的指环》。瓦格纳在很大程度上遵循了音乐剧形式的原则，反映了作品背后的情感和情绪，并使用了一套不断重复的主题音乐以代表人物、思想和情景，而非传统的歌剧唱段、合唱和舞蹈。《女武神》的故事基于《沃尔松格传说》和《诗体埃达》中讲述的诺斯神话。"
 elgar.1043.t: "帕西法尔"
 elgar.1043.f: "理查德·瓦格纳的歌剧《帕西法尔》包含宗教元素，如神圣音乐、揭开圣餐盘（圣杯）、洗礼和圣餐仪式。在瑞士苏黎世出版的艺术著作中，他就已经发展出利用艺术阐明宗教核心的思想。瓦格纳解释说，为了转化他通过寻求帕西法尔和遭受苦难的安福塔斯来代表人类的救赎和再生的寓言式信息，他选择了一种艺术形式以通过宗教象征主义达到对心灵的“狂热效应”。瓦格纳本人将这部三幕剧称为“舞台祭献节庆剧”，并规定它只能在拜罗伊特节庆剧院上演。"
 elgar.1051.t: "培尔·金特"
 elgar.1051.f: "《培尔·金特（作品第23号）》是挪威作曲家爱德华·格里格为亨里克·易卜生同名戏剧所作的插曲音乐。虽然格里格创作了许多短小的钢琴曲和室内乐作品，但这部为易卜生所作的作品最为突出。他最初为该剧创作了90分钟的管弦乐，后来又从中提取了一些部分，制作了两个套曲。培尔·金特在世界各地的旅行和遥远的土地上的经历由格里格选择使用的乐器来代表。这些套曲中的几段音乐已经在流行文化中得到了广泛的传播，特别是《晨歌》、《山大王的宫殿》和《索尔维格之歌》这几首曲目。"
 elgar.1052.t: "抒情小品"
 elgar.1052.f: "《抒情小品》是挪威作曲家格里格的一系列钢琴作品短曲集。他共写成了十套、66首曲子。最早一首写于1867年，最后一首则在1901年完成。《抒情小品》是格里格的代表作之一，当中包含了不少挪威的民歌、当地乡村民间音乐等。而个别曲子更常被作独立演奏，如作品65第6首《特罗豪根的婚礼》、作品43第6首的《致春天》等。而作品54及作品68部分曲目更被作曲家改编成为管弦乐作品。"
 elgar.1053.t: "挪威舞曲"
 elgar.1053.f: "《挪威舞曲》是挪威对安东尼·德沃夏克的《斯拉夫舞曲》和约翰内斯·勃拉姆斯的《匈牙利舞曲》取得的巨大成功的回应。两人分别于1878年和1881年在西姆罗克出版社发表了他们的舞曲系列作品。当时，格里格不敢为自己的舞曲配器，因为他的朋友约翰·斯文森已经在这个领域占据了先机，后者的《挪威狂想曲》已经很受欢迎了。因此，《挪威舞曲》的管弦乐版是由罗伯特·亨利克斯配器的，格里格对此非常满意。第一支舞曲中格里格使用了流行的辛克莱尔进行曲，而最后三支则是传统的挪威新郎舞曲“哈灵舞”，这是一种快速而非常具有杂技性的表演形式。"
 elgar.1061.t: "德意志安魂曲"
 elgar.1061.f: "“长话短说，但我一定要告诉你，我的心完全被你的《安魂曲》占据了，它是一件非常强大的作品，以一种十分罕见的方式抓住了整个人。深刻的严肃感结合诗歌的魔力，具有奇妙、震撼和安抚的效果。你知道，我永远无法用言语表达，但我从内心深处感受到这部作品中全部的丰富宝藏，每一个部分表达出的热情都深深地打动了我，这就是为什么我忍不住要说......哦，如果我能听到它，我会愿意付出什么代价呢。” ——克拉拉·舒曼"
 elgar.1062.t: "匈牙利舞曲"
 elgar.1062.f: "约翰内斯·勃拉姆斯的《匈牙利舞曲》是基于匈牙利主题的21首活泼舞曲，完成于1879年。它们的长度从约1分钟到5分钟不等。它们是勃拉姆斯最受欢迎的作品之一，也是他经济上最成功的作品。每支舞蹈都配以各种乐器的合奏。勃拉姆斯最初为钢琴四手联弹设计了版本，后来又为前十支舞配上了钢琴独奏。小提琴家约瑟夫·约阿希姆是勃拉姆斯的朋友，他为所有《匈牙利舞曲》创作了小提琴与钢琴的精湛配器。"
 elgar.1063.t: "第4交响曲"
 elgar.1063.f: "《第4交响曲》是约翰内斯·勃拉姆斯创作的最后一部交响曲。也是当代这位作曲家最受欢迎并最经常演奏的管弦乐作品之一。乍一看，这部作品毫不妥协的设计方式让人感到不安。当勃拉姆斯和伊格纳兹·布吕尔用两架钢琴为朋友们演奏这部交响曲时，克拉拉·舒曼和勃拉姆斯后来的传记作者马克斯·卡尔贝克等人都做出了排斥的反应。据说爱德华·汉斯利克曾感叹道：“整个乐章中，我觉得自己好像被两个非常聪明的人击穿了一样。”伊丽莎白·冯·赫佐根伯格将这部作品描述为“一个聪明人和知识分子的小世界，其中在黑暗中行走的人只能有一个小角色。”1897年，当勃拉姆斯去世前不久参加该交响曲的演出时，他得到了维也纳观众雷鸣般的掌声，这部作品至今仍受到好评。"
 elgar.1071.t: "第5交响曲"
 elgar.1071.f: "像马勒的其他交响曲一样，《第5交响曲》在首演后并不受理解。1905年，在汉堡的一次不成功的演出后，马勒抱怨说：“《第5交响曲》是一部受诅咒的作品。没有人理解它。”首演后的几年里，音乐评论大多是负面的。例如，音乐评论家费迪南德·普福尔认为，《第5交响曲》是马勒较弱的作品之一。只有《新音乐杂志》对这部交响曲给予了善意的评价，并谈到了“压倒性的美丽财富”。特别是与两年前创作的《第4交响曲》相比，它在内容和形式上都代表了一种重大的差异。《第5交响曲》更粗糙的声音世界标志着马勒开始了一个新的创作阶段，这在接下来的《第6交响曲》中得到进一步发展。在马勒去世后这部作品才愈发受到赞赏。"
 elgar.1072.t: "大地之歌"
 elgar.1072.f: "“难道真的是那个‘与无限和谐’的人，构筑起了我们今日所见的人间饮酒悲歌？是哪位秋日孤客攀登到他心爱的安息之所，渴望得到滋润？谁用老去的友好眼神看着青春，用温柔的情感注视着佳人？谁在醉酒中寻求忘记无意义的尘世存在，最后在忧郁中告别？……这是同一个人，同一位作曲家。到那时为止的所有作品都产生于对生活的感受……大地正在消失，不同的空气正在吹拂，不同的光照在它上面。……当我把签名带回来给他时，几乎说不出一句话，他打开《送别》，说：'你觉得怎么样？这可以忍受吗？人们事后不会自杀吗？然后他指着节奏上的难点，开玩笑地问道：'有什么办法来指挥这个吗？别让我来！”——布鲁诺·沃尔特"
 elgar.1073.t: "悼亡儿之歌"
 elgar.1073.f: "“我完全可以理解当一个人没有孩子或失去了孩子时写出这样可怕的歌词。但我不明白，如果你在半小时前拥抱并亲吻了快乐而健康的孩子，你怎么能唱出孩子的死亡！” 阿尔玛·马勒·威尔佛，古斯塔夫·马勒之妻"
 elgar.1081.t: "第3钢琴协奏曲"
 elgar.1081.f: "“当时，马勒是我认为唯一可以与尼基施并列的指挥家。他全身心地投入到协奏曲中，直到把相当复杂的伴奏练得炉火纯青，尽管他已经经历了一次次漫长的排练。马勒认为，乐谱的每个细节都很重要——这种态度在指挥家中太罕见了。……虽然排练原定于12:30结束，但我们演奏了又演奏，远远超过了原定时间。当马勒宣布将再次排练第一乐章时，我以为乐手们会提出抗议或闹事，但我没有注意到任何恼怒的迹象。乐团以敏锐的或者说是比前一次更接近的诠释来演奏第一乐章。” ——谢尔盖·拉赫玛尼诺夫"
 elgar.1082.t: "帕格尼尼主题狂想曲"
 elgar.1082.f: "这首曲子由24个主题的变奏组成，尼科洛·帕格尼尼本人曾将其作为一系列变奏的起点。这个旋律多次成为不同作曲家的模板，包括勃拉姆斯和李斯特。在一些变奏中，拉赫玛尼诺夫使用了另一个更古老的旋律：《末日经》的序列，它曾经是拉丁语追思弥撒的组成部分。拉赫玛尼诺夫在他的作品中一再使用这个主题。它出现在所有的交响曲、交响舞曲、交响诗《死之岛》和《第1号钢琴奏鸣曲》中。帕格尼尼的主题与《末日经》的结合，促使人们去寻找作品的标题背景。根据传说，这位伟大的小提琴家为了获得乐器的完美和女人的爱，把自己的灵魂出卖给了魔鬼。《末日经》主题代表魔鬼，而帕格尼尼主题代表作曲家本人。"
 elgar.1083.t: "第3交响曲"
 elgar.1083.f: "“它在纽约、费城、芝加哥等地演出。前两场我都在场。它被演得很精彩，但公众和评论家的评价都很糟糕。有一条评论痛苦地留在我的脑海中：我心中不再有《第3交响曲》了。就个人而言，我坚信这是一部好作品。但是——有时作曲家也会犯错！尽管如此，到目前为止我还是坚持我的观点。” ——谢尔盖·拉赫玛尼诺夫"
 elgar.1091.t: "罗密欧与朱丽叶"
 elgar.1091.f: "《罗密欧与朱丽叶》是谢尔盖·普罗科菲耶夫最长且最著名的芭蕾舞剧，被普遍视作他对芭蕾艺术的最重要贡献以及他音乐作品中的亮点。丰富多样的乐器以及复杂的节奏仍然对管弦乐队和舞者构成挑战。在某些地方，不和谐的声音接近于无调性音乐。著名的“骑士之舞”，以其点状的节奏，作为一个准交响乐的主题在现代更为人所知。相比之下，与朱丽叶的爱情觉醒有关的主题既温柔又年轻活泼。普罗科菲耶夫在三部管弦乐队组曲和一部钢琴独奏作品中重新使用了芭蕾舞剧中的音乐。"
 elgar.1092.t: "基杰中尉"
 elgar.1092.f: "《基杰中尉》最初是为同名电影配乐而创作的。这是普罗科菲耶夫第一次尝试也是第一次受委托创作电影音乐。在有声电影的早期，在众多准备尝试电影音乐的杰出作曲家中，普罗科菲耶夫并非最为显而易见的选择。普罗科菲耶夫在巴黎工作了近十年，以实验性与不和谐著称。电影上映后不久，普罗科菲耶夫就收到了莫斯科广播交响乐团的邀请，请他根据自己的《基杰中尉》电影音乐创作管弦乐组曲，这可能是首次将电影配乐改编成重要的音乐作品。当普罗科菲耶夫在美国波士顿参加首映式时，他受到了电影制片人的热烈追捧，但尽管他受宠若惊并为制片人的邀请所吸引，他却从未创作过好莱坞电影配乐。"
 elgar.1093.t: "彼得与狼"
 elgar.1093.f: "《彼得与狼》是一部“儿童交响乐童话”。它是普罗科菲耶夫最常演出的作品，也是所有古典音乐剧目中最常演出的作品之一。叙述者讲述了一个儿童故事，而乐队则通过使用不同的乐器演奏代表故事中每个人物的“主题”来说明这个故事：“这个故事中的每个人物都由乐队中相应的乐器来代表：小鸟由长笛代表，鸭子由双簧管代表，猫由单簧管在低音域中演奏的跳音代表，祖父由大管代表，狼由三角铁代表，彼得由弦乐四重奏代表，猎人的射击由定音鼓和低音鼓代表。在管弦乐表演之前，最好向孩子们展示这些乐器，并为他们演奏相应的主题曲。这样一来，孩子们就能学会在表演这个故事时分辨乐器的声音。”"
 elgar.1101.t: "蝙蝠"
 elgar.1101.f: "约翰·施特劳斯的《蝙蝠》被视为歌剧时代的代表作之一。《蝙蝠》与《吉普赛男爵》、《威尼斯之夜》并称为施特劳斯最著名的三部歌剧，也是少数几部经常在大型国际歌剧院上演的歌剧之一。歌词朗朗上口，充满讽刺意味，蕴含着永恒的真理。据说，音乐的主要部分是在42天内创作完成的。以自由奏鸣曲形式写成的序曲占有特殊地位，是约翰·施特劳斯最伟大的创作之一。它概括了整部作品的众多音乐亮点，其多变的动势即使对顶级交响乐团来说也是一项挑战。"
 elgar.1102.t: "多瑙河圆舞曲"
 elgar.1102.f: "《美丽的蓝色多瑙河畔圆舞曲》，常简称为《多瑙河圆舞曲》，基于约翰·施特劳斯在早期作品中使用过的旋律而创作。它在首演时就激发了观众的热情。由于当时狂欢节期间有大量新音乐作品推出，这首圆舞曲最初并未流行起来。不过，由于施特劳斯同年在巴黎参加了1867年世界博览会，并为世博会创作了新作品，因此他没有忘记将圆舞曲列入节目单中。在展览期间，这首曲子以《美丽的蓝色多瑙河》（Le beau Danube bleu）之名大获成功。据推测，这首圆舞曲的出版版本，尤其是双手钢琴版，在短时间内就售出了近100万部。圆舞曲被视作奥地利的第二国歌，也是古典音乐史上最受欢迎的曲目之一。"
 elgar.1103.t: "威尼斯之夜"
 elgar.1103.f: "《威尼斯之夜》是一部三幕“轻喜歌剧”。故事发生在18世纪中叶的威尼斯，是一部关于伪装和误认的喜剧，两个阶级之间的爱情扑朔迷离。其剧本与许多其他的维也纳轻歌剧一样，改编自法国喜歌剧。该剧在柏林的首演以失败告终，一部分是由于混乱的剧情，但文本也为此推波助澜。因此，施特劳斯为了在维也纳剧院首演对该剧进行了重新创作，并重写了序曲。最著名的音乐片段是《泻湖圆舞曲》和《贡多拉之歌》。1923年和1931年，埃里希·沃尔夫冈·科恩戈尔德对该曲进行了大幅修改；1954年，瓦尔特·费尔森施泰因创作了另一个版本；原版现在很少上演。"
 elgar.1111.t: "弄臣"
 elgar.1111.f: "《弄臣》是朱塞佩·威尔第创作的歌剧，剧本由弗朗切斯科·马里亚·皮亚韦创作，它改编自维克多·雨果的情节剧《国王的弄臣》。这部歌剧最初受到审查人员的批评，威尔第和皮亚韦因此不得不修改原定的标题，并将背景从巴黎移至曼图亚。不过，威尔第认为必不可少的元素，如瘸腿的男主角弄臣和他奄奄一息的女儿被装进的麻袋，都保持了原样。这部歌剧被认为是威尔第的首部代表作，奠定了他的世界声誉。威尔第本人认为《弄臣》是他成就最高的作品之一，与威尔第的其他歌剧不同，《弄臣》没有过任何修订版或新版本。《弄臣》在首演时获得了巨大成功，随后几年几乎在所有欧洲歌剧院都有上演。160多年来，这部歌剧一直是许多歌剧院的保留剧目，至今仍是最常上演的意大利歌剧之一。"
 elgar.1112.t: "茶花女"
 elgar.1112.f: "《茶花女》是朱塞佩·威尔第和弗朗切斯科·马里亚·皮亚韦根据小仲马的小说《茶花女》改编的歌剧。与之前在《弄臣》和《游吟诗人》中一样，威尔第将一个被社会排斥拒绝的人物置于了演出的中心。一部关于死于肺痨的歌妓的歌剧在当时是近乎丑闻的创新。尽管威尔第曾亲自登台演出过这部作品，而且为了谨慎起见还将故事发生的时间移到了路易十四时期，但其首演还是失败告终。经过修改后，威尔第在一年后再次上演了这部歌剧——此后，它成为音乐史上最成功的歌剧之一。在有些国家，它是有史以来上演次数最多的歌剧。就录制唱片的数量而言，《茶花女》仅次于《阿依达》。由于审查原因，这部歌剧在意大利也曾以《维奥莱塔》为题演出。"
 elgar.1113.t: "安魂曲弥撒"
 elgar.1113.f: "1868年，焦阿基诺·罗西尼逝世，朱塞佩·威尔第邀请当时意大利最重要的十二位作曲家共同创作了一首葬礼弥撒曲，即《为罗西尼而做的弥撒》。他本人接手了这首安魂曲的最后乐章《解放我》。然而演出由于负面情况未能举行。诗人亚历山德罗·孟佐尼于1873年去世后，威尔第再次对安魂曲的素材进行了处理。威尔第非常钦佩德高望重的孟佐尼。他向米兰市提出创作一首弥撒曲，在孟佐尼去世一年后上演。罗西尼弥撒中的《解放我》成为了为孟佐尼创作的新安魂曲的核心。旧作中的《震怒之日》被三次用于具有相同或相似文本的序列段落。第一场演出于1874年5月22日在米兰圣马可教堂举行，时值孟佐尼逝世一周年。威尔第亲自担任指挥。"
 elgar.1121.t: "牧神午后前奏曲"
 elgar.1121.f: "“这首序曲的音乐非常自由地诠释了马拉美的优美诗篇，但它绝不是这首诗歌的综合体，而是通过一连串的场景，表现了牧神在炎热的午后的欲望和梦想。然后，他厌倦了追逐羞怯地飞翔的仙女，沉湎于醉人的睡梦中，最终在大自然中实现了他占有的梦想。”\n\n《牧神午后前奏曲》是一首管弦乐交响诗，也是德彪西最著名的作品之一。这部作品被认为是西方艺术音乐史上的转折点与印象派作曲的代表。皮埃尔·布列兹将其视作现代音乐的开端，他说：“牧神的笛声为音乐艺术带来了新的气息。”"
 elgar.1121.g: "放纵吧，做梦吧，享受这永不停息的时刻……"
 elgar.1122.t: "大海"
 elgar.1122.f: "“昨晚的音乐会一开始就在音调的调色板上涂鸦了许多印象派的色彩，除了创造新的声音组合之外，从未考虑过形式或目的。……只有一件事可以肯定的，那就是海洋对作曲家而言是一个青蛙池塘，而池塘里的一些动物已经进入了每件铜管乐器的咽喉当中。\n\n《大海》创作于1903年至1905年，于1905年10月在巴黎首演。这部作品最初并不受欢迎。尽管这首曲子展现了德彪西美学的三个关键方面：印象主义、象征主义和日本主义，但即使是德彪西作品的坚定支持者也对其不甚感冒。在首演后的几十年中，《大海》已成为管弦乐团的核心曲目。"
 elgar.1123.t: "佩利亚斯与梅丽桑德"
 elgar.1123.f: "“作为一名教师，他相当迂腐，只能用这个词来形容。真的很迂腐......他的内心充满了愤怒和怨恨——我常常觉得他很像《佩利亚斯》中的戈洛，但他又不是。他是一个非常感性的人——这在他所有的音乐中都有体现。似乎没有人喜欢他。给我的梅丽桑德演奏《佩利亚斯》的让·佩里埃一提到德彪西的名字就气得脸色发白……”\n\n《佩利亚斯与梅丽桑德》是一部五幕歌剧。作曲家克劳德·德彪西的体裁名称是“抒情歌剧”。剧本改编自莫里斯·梅特林克的戏剧《佩利亚斯与梅丽桑德》。德彪西避免了咏叹调和较大的独唱场面，从而使文本具有了现实主义的特征。《佩利亚斯》是德彪西唯一一部完成的歌剧，因此有时被与贝多芬的《费德里奥》相提并论。"
 elgar.1131.t: "天鹅湖"
 elgar.1131.f: "《天鹅湖》是一部世界著名的芭蕾舞剧，由柴可夫斯基作曲，1877年在莫斯科大剧院首演，是古典芭蕾舞团的标准剧目之一。《天鹅湖》中可以找到许多童话故事中的常见主题：特别是不幸着魔的公主被王子的爱所拯救。原剧本中的不幸结局也是天鹅姑娘或天鹅少女这一著名的童话故事主题。柴可夫斯基在创作《天鹅湖》时借鉴了以前的作品。据柴可夫斯基的两位亲戚说，作曲家早在1871年就在家中创作了一部名为《天鹅之湖》的小芭蕾舞剧。这部芭蕾舞剧包含了著名的“主题旋律”（Leitmotif）。他还利用了 1868年放弃的歌剧《总督》中的素材。1876年4月，乐谱完成，排练开始。不久，舞蹈编导莱辛格开始将一些被他称为“无法跳舞”的舞段搁置一旁，甚至开始为其他作曲家的音乐编舞，但柴可夫斯基提出了抗议，他的作品才得以恢复。"
 elgar.1132.t: "第六交响曲“悲怆”"
 elgar.1132.f: "“我现在完全投入到新作品中……很难让我从中脱身。我相信它会成为我最好的作品。我必须尽快完成它，因为我有很多事情要处理，而且我必须很快去伦敦。我告诉过你，我已经完成了一首交响曲，但我突然不满意了，于是我把它撕毁了。现在我又谱写了一首新的交响曲，我肯定不会再把它撕毁。”\n\n在E小调第5号交响曲首演两年后，正如他写给一位朋友的信中所述，柴可夫斯基计划“写一首将成为他整个作品基石的壮丽交响曲”。作曲家将这部作品命名为“热情交响曲”。该作品的特点是缓慢的最终乐章——对于交响曲来说是不寻常的——其结尾让人联想到安魂曲。"
 elgar.1133.t: "D大调小提琴协奏曲"
 elgar.1133.f: "《D大调小提琴协奏曲》是俄罗斯作曲家彼得·伊里奇·柴可夫斯基唯一的小提琴协奏曲，他于1878年3月和4月在日内瓦湖畔的葡萄酒产区克莱伦斯创作了这部协奏曲。在那里，他从抑郁症和严重的神经崩溃中恢复过来。在音乐会中，那里的积极影响得以体现，他重新找回了生活的乐趣。创作工作在三周后完成，尽管柴可夫斯基用安达拉特（称为“小调”）替换了最初计划的中间乐章。音乐评论家对这部作品的反应是负面的。柴可夫斯基保持了镇定，并坚信这部协奏曲会占上风。直至今日，这仍然是世界上最著名和最常被演奏的小提琴协奏曲之一。"
 elgar.1141.t: "威风堂堂进行曲"
 elgar.1141.f: "《威风堂堂进行曲》是英国作曲家爱德华·埃尔加在1901年至1934年间创作的一组管弦乐进行曲。这部作品包括以下六支进行曲：《D大调第一进行曲》、《a小调第二进行曲》、《c小调第三进行曲》、《G大调第四进行曲》、《C大调第五进行曲》和《g小调第六进行曲》，其中前五曲是埃德加作为作品第39号发表的，第六曲则是未完成的遗作。每支进行曲的演奏时间大约是五分钟。\n《威风堂堂进行曲》中最著名的是《D大调第一进行曲》，常作为美国高中的《毕业进行曲》，经修改填词而成的《希望与荣耀的土地》则是英国爱国歌曲，也是为英王《加冕颂歌》的终章。而《第四号进行曲》经填词成为二战时的英国爱国歌，同时也是是宗教仪式上常用的退场曲目。此曲也在流行文化中广为使用"
 elgar.1141.g: "希望与荣耀之地！"
 elgar.1142.t: "印度皇冠"
 elgar.1142.f: "《印度皇冠》是一部宏大的舞台剧，于1912年上演，以庆祝乔治五世国王和玛丽皇后去年12月访问德里，成为印度皇帝和皇后的加冕仪式。这部舞台剧，由英国作曲家爱德华·埃尔加谱曲，亨利·汉密尔顿撰词，主要由两个场景组成：“印度之城”和“万岁皇帝！”。埃尔加后来从中提取了五首乐曲，并添加了一首独奏小提琴的插曲，创作了《印度之冠组曲》。该组曲立即受到欢迎：在埃尔加的一生中，BBC进行了102场现场演出。"
 elgar.1143.t: "谜语变奏曲"
 elgar.1143.f: "《谜语变奏曲》是爱德华·埃尔加的一部管弦乐作品，以14个变奏来描绘埃尔加周围的人物。在由指挥家汉斯·里希特首演后，这部作品使埃尔加在国际上名声大噪。标题中的“谜题”并不是指哪个变奏曲是为哪位朋友而作，而是指另一个谜题。据埃尔加说，整个作品贯穿着一个不同且更大的主题，但并未被演奏，实际的主题被构思为对它的对旋律。迄今为止，已经提出了各种理论。其中，第九变奏曲（尼姆罗德）特别受到了极大的欢迎。"
 elgar.1151.t: "第9交响曲"
 elgar.1151.f: "1892年，德沃夏克移居美国，成为纽约市的美国国立音乐学院院长。在美国期间，德沃夏克创作了他最成功的管弦乐作品之一：交响曲《自新世界》，并因此享誉全球。有人说，德沃夏克的创作灵感来自美国的“广阔空间”，例如他在1893年夏天前往爱荷华州旅行时可能看到的大草原。德沃夏克还受到贝多芬和舒伯特等早期古典作曲家的风格和技巧影响。在《新世界交响曲》的慢板乐章中，四度音的下降和定音鼓的敲击让人联想到贝多芬第9交响曲的慢板。在卡内基音乐厅首演时，每个乐章结束时都会响起雷鸣般的掌声，德沃夏克不得不起身鞠躬。"
 elgar.1152.t: "斯拉夫舞曲"
 elgar.1152.f: "斯拉夫舞曲是安东宁·德沃夏克创作的两集共计十六首的器乐作品，最初为四手联弹钢琴而作，不久后每一首都被改编为管弦乐。它们是这位捷克作曲家最著名的作品之一。德沃夏克的作品采用了波西米亚和摩拉维亚民间舞蹈以及邻近国家的特色节奏模式。然而，它们仍然是作曲家完全独立的创作。在第一集中，有两首富里安特舞曲，以其节奏变化多样而著称，两首与兰德勒舞曲类似的邻舍舞曲，两首快速舞曲，一首波尔卡，以及作为唯一的非捷克舞蹈，一首乌克兰杜姆卡。在第二集中，非捷克舞蹈占主导地位，这就是为什么德沃夏克受到了一些敌意的原因。他被指责没有足够地与祖国产生共鸣，而是想在国外赢得知名度。"
 elgar.1153.t: "露莎卡"
 elgar.1153.f: "《露莎卡》是安东宁·德沃夏克最成功的歌剧。它是根据雅罗斯拉夫·克瓦皮尔的剧本创作的，源于斯拉夫民间传说中关于露莎卡（水精灵，美人鱼）的故事，类似于德国作家弗里德里希·德·拉·莫特·富凯的《乌恩迪娜》、汉斯·克里斯蒂安·安徒生的童话《小美人鱼》以及法国古老的《梅吕辛》传奇。这部带有“抒情童话”副标题的歌剧也被称为“捷克乌恩迪娜”。与贝德日赫·斯美塔纳的《被拐的新娘》一起，《露莎卡》是最著名的捷克歌剧之一。歌剧《露莎卡》在捷克戏剧音乐的发展中占据着重要的地位。"
 elgar.1161.t: "C大调幻想曲"
 elgar.1161.f: "《C大调幻想曲》是罗伯特·舒曼最重要的钢琴曲之一。与《克莱斯勒偶记》和《童年情景》一起，成为这位作曲家最著名的作品之一，书写了浪漫主义钢琴乐坛的辉煌诗篇。他把它献给了李斯特，而这位“钢琴之王”也在多年后将他那首恢宏的《b小调钢琴奏鸣曲》回赠了他。这首幻想曲“贯穿所有音调，在缤纷的尘世梦境中，画出微弱的声音”，不禁让人想起贝多芬对强弱变化的精妙处理。实际上，舒曼在第一乐章中多次引用了贝多芬的《致远方的爱人》，而在第三乐章中，他也引用并致敬了贝多芬《第七交响曲》快板乐章的主题。"
 elgar.1162.t: "A小调钢琴协奏曲"
 elgar.1162.f: "《A小调钢琴协奏曲（作品第54号）》是浪漫主义盛期创作的浪漫主义钢琴独奏与乐队协奏曲。它具有浪漫主义时期的诸多特征。与19世纪的其他一些钢琴协奏曲一样，《A小调钢琴协奏曲》也具有交响乐的特点。由于这部作品最初是作为幻想曲构思的，因此整场演奏会给人以浪漫奇幻的印象。舒曼用了五年多的时间才迟迟完成了作品。在亲笔签名的扉页上，舒曼列出了各乐章创作的不同时间。作品的基本思想是两个相爱的人的渴望与幸福。在这部作品中，舒曼将他对克拉拉·维克的思念化作了音乐。第一乐章的主旋律与贝多芬歌剧《费德里奥》中弗洛伦斯坦咏叹调的旋律相似。与贝多芬的风格一致的是，这一主题在舒曼笔下也代表着对配偶的忠诚和为自由而战的精神。"
 elgar.1163.t: "童年即景"
 elgar.1163.f: "《童年即景》（Kinderszenen）是罗伯特·舒曼的一部钢琴曲集，由13首钢琴小品组成。与《青少年曲集》不同，这些并非为儿童所作，用舒曼自己的话说，是“一位年长者为年长者所作的回忆”。其中最著名也最长的曲目是《梦幻曲》。《童年即景》的演奏时间不到20分钟，是当今最受欢迎的浪漫主义钢琴作品之一。虽然《童年即景》在舒曼生前并未大获成功，但至少对他本人来说，这部作品有着特殊的意义。1839年的一次书信往来表明，当时的舒曼坚信与克拉拉·维克结婚的可能性，而《童年即景》正是源于他乐观开朗的一面。"
 elgar.1171.t: "E小调小提琴协奏曲"
 elgar.1171.f: "费利克斯·门德尔松的E小调小提琴协奏曲是他最后的协奏曲。在首演时得到了很好的评价，它一直是最著名和备受推崇的小提琴协奏曲之一。它在小提琴曲目中占据着重要的地位，并已经建立了作为所有有抱负的音乐会小提琴家必须掌握的基本协奏曲之一的声誉，通常是他们学习的第一首浪漫时代的协奏曲之一。这部作品本身是浪漫时代最重要的小提琴协奏曲之一，对许多其他作曲家产生了影响。虽然协奏曲由三个标准的快‑慢‑快结构的乐章组成，每个乐章都遵循传统的形式，但它在当时具有创新性，并包含了许多新颖的特点。其中一些独特之处包括小提琴在作品开头的几乎立即入场，而不是像古典时代的协奏曲中那样跟随着第一乐章主题的管弦乐预览，这是典型的。"
 elgar.1181.t: "练习曲"
 elgar.1181.f: "弗雷德里克·肖邦一共写了27首钢琴练习曲：12首作品10号练习曲（于1833年出版）、12首作品25号练习曲（于1837年出版），以及为伊格纳兹·莫斯赫莱斯和弗朗索瓦·约瑟夫·菲蒂斯的钢琴教程《Méthodes des Méthodes》的第三部分（1840年出版）所写的另外三首练习曲。这三首练习曲后来单独出版，题为《三首新练习曲》。被誉为“钢琴演奏的大宪章”（卡尔·舒曼），它们是音乐史上最重要的钢琴作品之一。伟大的钢琴作曲家如阿尔坎、斯克里亚宾、德彪西和拉赫玛尼诺夫都受到了它们的启发。李斯特·弗朗茨和约瑟夫·维尼亚夫斯基是第一批公开演奏肖邦练习曲的钢琴家。"
 elgar.1191.t: "为沙皇献身"
 elgar.1191.f: "经过多年聆听不同歌手的声音、以他的音乐追求女性、以及与著名人士如门德尔松、贝里奥兹和李斯特会面后，格林卡意识到他一生的使命是回到俄罗斯，以俄罗斯的方式创作音乐，为俄罗斯音乐奉献，就像多尼采蒂和贝利尼为意大利音乐所做的那样。最初被命名为《伊凡·苏萨宁》的《为沙皇献身》是格林卡两部伟大歌剧中的第一部。剧情背景是1612年，讲述了伊凡·苏萨宁的故事，这位俄罗斯农民以及爱国英雄，通过误导一群正在追捕沙皇的波兰人，为沙皇牺牲了自己的生命。通过这部歌剧，格林卡成功地创造了一种独立的俄罗斯音乐；它被认为是第一部俄罗斯歌剧。"
 elgar.1192.t: "鲁斯兰与柳德米拉"
 elgar.1192.f: "《鲁斯兰与柳德米拉》是一部五幕“奇幻歌剧”，由米哈伊尔·格林卡谱曲，内斯托尔·库科尔尼克和其他人根据亚历山大·谢尔盖耶维奇·普希金的同名诗歌创作剧本。普希金在那场著名的决斗中去世，使他无法按计划亲自创作剧本。和《为沙皇献身》一样，《鲁斯兰与柳德米拉》运用了俄罗斯民间音乐的一些特色；它还以巧妙地运用不和谐音、半音音程和东方元素而闻名。特别重要的是，它首次在俄罗斯音乐中使用了全音音阶。这部欢快的序曲是西方最著名的管弦乐展示品之一，以其对低音提琴手来说是一场噩梦而闻名。"
 elgar.1193.t: "卡玛林斯卡娅"
 elgar.1193.f: "卡玛林斯卡娅是一种传统的俄罗斯民间舞蹈，今天大多以俄国作曲家米哈伊尔·格林卡的同名作品而闻名。格林卡于1848年创作的《卡玛林斯卡娅》是第一部完全基于俄罗斯民歌并运用该体裁的作曲原则来决定音乐形式的管弦乐作品。它成为了俄罗斯下一代作曲家的基石，从以西方为导向的彼得·伊里奇·柴可夫斯基到以“五人”为代表的民族主义者群体，都受到了启发，同时也受到了国外的赞誉，尤其是法国作曲家赫克托·贝里奥。对于柴可夫斯基来说，《卡玛林斯卡娅》运用了各种和声和对位组合，提供了民歌在交响乐结构中创造性可能性的一个可行示例。"
 elgar_great_composer: "大作曲家"
