l_simp_chinese:
 mr_swe_nor_union_decision_1: "任命新挪威总督"
 mr_swe_nor_union_decision_1_desc: "克里斯蒂安尼亚的总督职位目前出缺，我们必须做出决定，任命一人代表国王领导挪威政府。"
 mr_swe_nor_union_decision_2: "要求我国部长参加议会辩论"
 mr_swe_nor_union_decision_2_desc: "目前，部长们未被允许在挪威议会中发言，他们不应只是旁观。"
 mr_swe_nor_union_decision_3: "要求自国旗上去除一切君合象征"
 mr_swe_nor_union_decision_3_desc: "我们应当使用纯净，没有联合统治象征的的挪威国旗。"
 mr_swe_nor_union_decision_4: "要求建立挪威领事机构"
 mr_swe_nor_union_decision_4_desc: "With the increase in Norwegian shipping, the Swedish consular offices are not enough. We need Norwegian offices."
 mr_swe_nor_union_decision_5: "要求卡尔十五世履行诺言"
 mr_swe_nor_union_decision_5_desc: "卡尔十五世已加冕为瑞典与挪威国王，他应当履行废除总督职位的承诺了。"
 da_appoint_governor_general: "任命总督"
 da_appoint_governor_general_desc: "撤换[concept_subject]的总督。[concept_liberty_desire]可能因新任候选人而改变。"
 da_appoint_governor_general_action_name: "任命总督"
 da_appoint_governor_general_action_notification_name: "[TARGET_COUNTRY.GetName]的新总督"
 da_appoint_governor_general_action_notification_desc: "[INITIATOR_COUNTRY.GetName]撤换了[TARGET_COUNTRY.GetName]的总督。"
 da_appoint_governor_general_action_notification_third_party_name: "[TARGET_COUNTRY.GetName]的新总督"
 da_appoint_governor_general_action_notification_third_party_desc: "[INITIATOR_COUNTRY.GetName]撤换了[TARGET_COUNTRY.GetName]的总督。"
 mr_swe_nor_union_event.1.t: "任命新总督"
 mr_swe_nor_union_event.1.d: "克里斯蒂安尼亚的总督职位目前出缺。我们或许需要考虑指派某人担任这一职位。"
 mr_swe_nor_union_event.1.f: "根据1814年的《挪威宪法》，居住在斯德哥尔摩的国王缺席时，可以任命一位瑞典或挪威国籍的总督来领导挪威政府。在瑞典，许多人认为代表瑞典国王行事的总督必须具有瑞典国籍。任何相反的观点都被认为可能威胁国家安全。"
 mr_swe_nor_union_event.1.a: "任命一位瑞典籍总督"
 mr_swe_nor_union_event.1.b: "任命一位挪威籍总督"
 mr_swe_nor_union_event.1.c: "这一职位将在接下来的五年中保持空缺"
 mr_swe_nor_union_event.2.t: "挪威总督"
 mr_swe_nor_union_event.2.d: "议会允许挪威总督参加讨论。"
 mr_swe_nor_union_event.2.f: "挪威议会已投票通过，允许挪威部长们参与议会讨论与谈判。他们现在正等待国王对这一决定的批准。"
 mr_swe_nor_union_event.2.a: "撤回决定"
 mr_swe_nor_union_event.2.b: "批准决定"
 mr_swe_nor_union_event.3.t: "挪威国旗"
 mr_swe_nor_union_event.3.d: "挪威要求有权使用纯净的挪威国旗。"
 mr_swe_nor_union_event.3.f: "挪威议会投票决定采用一种新的纯净的且没有联合统治象征的挪威国旗。我们应该支持他们的决定，还是剥夺他们使用选择的国旗权利？"
 mr_swe_nor_union_event.3.a: "他们将保持现有国旗。"
 mr_swe_nor_union_event.3.b: "让他们使用自己选择的国旗"
 mr_swe_nor_union_event.4.t: "挪威领事馆"
 mr_swe_nor_union_event.4.d: "挪威要求有权在世界各地开设自己的领事机构。"
 mr_swe_nor_union_event.4.f: "联盟的领事机构一直由斯德哥尔摩外交部管理，但随着挪威航运业的增加，挪威人认为有必要设立挪威领事处。\n\n挪威的要求被视为建立挪威外交的第一步，也是未来实现挪威独立的潜在需求。"
 mr_swe_nor_union_event.4.a: "我们的办事处没有问题"
 mr_swe_nor_union_event.4.b: "办事处越多越好！"
 mr_swe_nor_union_event.5.t: "卡尔十五世的承诺"
 mr_swe_nor_union_event.5.d: "挪威要求新国王卡尔十五世履行其废除克里斯蒂安尼亚总督职位的承诺。"
 mr_swe_nor_union_event.5.f: "作为继承人向挪威人民许下承诺是一回事，而真正肩负起两个国家统治者的重任则是另一回事。是否应如承诺所言，废除这一职位，由一位挪威首相取代克里斯蒂安尼亚的总督？"
 mr_swe_nor_union_event.5.a: "我们需要在克里斯蒂安尼亚安插我们自己的人。"
 mr_swe_nor_union_event.5.b: "君子一言，驷马难追"
 mr_swe_nor_union_event.6.t: "王储的诺言"
 mr_swe_nor_union_event.6.d: "王位继承人卡尔·贝尔纳多特承诺将在加冕后废除克里斯蒂安尼亚的总督职位"
 mr_swe_nor_union_event.6.f: "为了争取挪威人民的支持，未来的国王郑重承诺在加冕后取消克里斯蒂安尼亚总督一职。瑞典地主和军队的反应不出所料地给这位年轻继承人的提议蒙上了阴影。"
 mr_swe_nor_union_event.6.a: "希望他知道自己在干些什么"
 mr_swe_nor_union_concessions_none: "拒绝向挪威让步"
 mr_swe_nor_union_concessions_minor: "向挪威稍作让步"
 mr_swe_nor_union_concessions_major: "对挪威的实质性让步"
 mr_swe_nor_clean_flag: "挪威从其国旗上删除了所有邦联象征"