l_simp_chinese:
 athletes.2.t: "我们的登山家[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullNameNoFormatting]准备退休"
 athletes.2.d: "在[SCOPE.sCharacter('athletes_retired_person_scope').GetHerHis]耗费数十载光阴征服险峰、开辟未知路线以及引领远征队穿越死亡地带后，[SCOPE.sCharacter('athletes_retired_person_scope').GetFullName]最终宣布挂镐退役。[SCOPE.sCharacter('athletes_retired_person_scope').GetSheHe|U]将不再担任我国的[concept_douglas_mountaineer]。"
 athletes.2.f: ""
 athletes.2.g: "巅峰从来不是终点——只是下撤前的风景"
 athletes.12.t: "我们的登山家死了"
 athletes.12.d: "我们最受尊敬的[concept_douglas_mountaineer]毕生致力于征服山峰，引领他人攀登最险峻的山路，如今他已离世。如今，谁将代表我们征服山峰？"
 athletes.12.f: ""
 athletes.12.g: "绳索依在，精神依在。"
 athletes.52.t: "一位新的登山家"
 athletes.52.d: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetFullName]是一位前途无量的天才，有朝一日其可能会跻身征服巅峰的大人物行列。"
 athletes.52.f: ""
 athletes.52.g: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetSheHe|U]有目的地攀登。"
 athletes.102.t: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]现在是一名资深登山家！"
 athletes.102.d: "在勇敢地面对冰川、跨越山脊、带领探险队探索未知后，我们的[concept_douglas_mountaineer][ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]已经足够出名，可以被称为资深登山家了！"
 athletes.102.f: ""
 athletes.102.g: "一位征服山脉的大师！"
 athletes.53.t: "新的总教练"
 athletes.53.d: "一位新的[concept_vikelas_coach]已正式加入团队，[SCOPE.sCharacter('vikelas_new_coach_scope').GetHerHis|U]名为[SCOPE.sCharacter('vikelas_new_coach_scope').GetFullName]。"
 athletes.53.f: ""
 athletes.53.g: "[SCOPE.sCharacter('vikelas_new_coach_scope').GetSheHe|U]将带来我们的队员走向胜利。"
 athletes.103.t: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName]现在是资深总教练！"
 athletes.103.d: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName]通过培养和打造整整一代球员而声名鹊起。如今，[ROOT.Var('vikelas_coach_var').GetCharacter.GetSheHe]已名声显赫，被公认为资深总教练！"
 athletes.103.f: ""
 athletes.103.g: "为那些在赛场上敢于毫无保留、放声呐喊之人设立的特别奖项。"
 curtiss_pilot_will_become_part_of_academia_tt: "[SCOPE.sCharacter('curtiss_new_pilot_scope').GetFullName] will join the [Concept('concept_character', '$NATIONAL_CAST$')] of [SCOPE.GetRootScope.GetCountry.GetName]."