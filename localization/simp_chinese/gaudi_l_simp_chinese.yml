 gaudi.35.t: "[SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]的新艺术风格街区"
 gaudi.35.d: "新的艺术发展并未止步于[SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]，如今新艺术风格建筑正在这个街区中拔地而起。"
 gaudi.35.f: "新艺术风格建筑在布鲁塞尔初现锋芒的同时，也带动了一场装饰艺术的风潮。代表性人物包括：古斯塔夫·斯特拉文，他运用锻铁工艺在布鲁塞尔建筑立面上营造出华丽的巴洛克式视觉效果；家具设计师古斯塔夫·塞鲁里耶-博维，以其造型独特、结构灵活的金属家具著称；以及珠宝大师菲利普·沃尔斯，其作品多以蜻蜓、蝴蝶、天鹅与蛇形为主题，展现自然之美。\n\n这股风格迅速传播至邻近的法国。在参观了维克多·奥塔设计的塔塞尔旅馆之后，建筑师埃克托·吉马尔回到巴黎，建成了“贝朗热城堡”——这是巴黎首批体现新艺术风格的建筑之一。这座建筑以其新颖而富于想象力的外观赢得巴黎市民的喜爱，并被评为当年巴黎最出色的新型立面之一，也由此奠定了吉马尔的地位。\n\n1900年巴黎世界博览会成为新艺术运动发展的顶峰。从1900年4月至11月，这场盛会吸引全球近五千万访客，集中展现了新艺术风格在建筑、室内设计、玻璃制品、家具与装饰艺术领域的辉煌成就。尽管巴黎世博会规模最大，但其他城市举办的展览同样为这一风格的传播做出了贡献。"
 gaudi.35.g: "一派生机勃勃的新文化气象。"
 gaudi.22.t: "线条与丈量"
 gaudi.22.d: "我们的建筑师归来了——这一次，他手握测量杆，眼中映照山川大地。"
 gaudi.22.f: "ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]曾热衷于在广场上描绘立面上的光影与装饰，如今[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]已在土地上勾勒真实蓝图。\n\n旅途之中，[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]远离都市，踏足荒野。从加利西亚的丘陵，到波河三角洲的湿地，再到英格兰中部的铁路工地，[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]与工程师、农夫、监工同行，学会如读经般解读大地。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U]能预见水流去向、泥土移动之处、乃至五年后地基裂痕之所在。\n\n如今，[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U]言必称坡度与坐标点，[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U]的笔记中再无浮华装饰，只有精确到英寸的角度、高程与距离记录。有人批评他过于理性、过于僵硬，但当[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]凝视空旷原野时，[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]早已看见街巷纵横的未来。"
 gaudi.22.g: "一座建筑，在基石尚未落下之前，早已在心中成型。"
 gaudi.23.t: "丈量世界的建筑师"
 gaudi.23.d: "经过两年深造，我们的建筑师归来——思维更加敏锐，图纸却愈发奇异。"
 gaudi.23.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]过去凭直觉绘图，如今则靠逻辑作画。\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U]没有与泥瓦匠和工匠为伍，而是走进讲堂。巴黎、哥廷根，甚至圣彼得堡。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U]坐在写满公式的黑板下，师从那些不用双手建造、却用头脑构想一切的大师。如今，[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U]谈论对称、模数、以及由优雅公式描述的荷载曲线。\n\n曾经挥洒自如的手绘风格已然消失。[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U]的新设计简洁冷峻，精准得近乎陌生。有人觉得它们冰冷而无人情味。但当他解释道：“穹顶之美不在于装饰，而在于曲线的完美”时，人们开始重新思考。\n\n官员们不知该如何看待[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]。[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U]的同行私下议论其实用性不足。但另一些人——尤其是年轻人——却开始倾听。"
 gaudi.23.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U]建造着别人只能想象的世界。"
 gaudi.24.t: "纸卷先行，石柱随后"
 gaudi.24.d: "这位建筑师归来时，未提画笔，未带蓝图，而是怀揣印信、背靠人脉，在官场之间行走如风。"
 gaudi.24.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]不再困于绘图板之前苦思冥想，而是在会议室之间运筹帷幄。\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]曾远渡重洋，两载寒暑，并非只为研习梁柱与穹顶，更是为了读懂那掌管命运的公文簿册。在维也纳，[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]窥见体制如何运转；在布鲁塞尔，[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]学会如何穿越层层关卡；在马赛街头，[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]亲历一场关于下水道与高楼的角力——原来，城市的面貌，往往不是由建筑师，而是由预算与批复所决定。\n\n今日归国，[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]已通晓何处需墨迹，何人须致意，何时可推门而入，何时宜悄然绕行。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]说：“规矩并非牢笼，而是尚未拆去的脚手架。”而事实证明，[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U]的图纸确实比别人更早抵达工地。"
 gaudi.24.g: "因为，每座伟大的建筑，其实最先立起的，是一张盖章签字的申请表。"
 gaudi.25.t: "建筑师回来了……终究是回来了"
 gaudi.25.d: "我们的建筑师终于结束了漫长的壮游归来。人们不确定[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]究竟带回了什么——除了那些令人惊叹的故事。"
 gaudi.25.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]当初带着素描本离开，如今却只带回雪茄与逸闻趣事。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U]谈起巴黎、柏林、维也纳的人物如数家珍，对各种风格高谈阔论，至于旧账，则装作已然遗忘。\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U]言辞优美，甚至颇具说服力——哪怕谈论的是[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]从未踏足的建筑。每当被要求展示设计图，[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]便巧妙岔开话题；当被催促成果时，[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]只是微笑着说：“真正的灵感，从不听命于钟表。”\n\n有人说[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]不过是个江湖术士，也有人视其为尚未被世人理解的奇才。而真相呢？也许就埋藏在的里雅斯特的某家咖啡馆，或那不勒斯错过的那一班列车上。"
 gaudi.25.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]这些日子，到底都干了些什么？"
 gaudi.26.t: "名师阴影下的归人"
 gaudi.26.d: "我们的建筑师回来了——比离开时更为成熟、沉稳，并带着一位伟大导师的精神烙印。"
 gaudi.26.f: "当他人游历四方，[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]选择了深耕一隅。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U]多年随一位年迈而声望极高的建筑大师学习。这种学习不仅发生在课堂之中，也在脚手架之间、在静默之时。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U]逐渐学会从装饰中看见结构，从表象后读懂意图。[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U]的线条变得干净利落，[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U]的眼光也更具批判性。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U]学到的不仅是“如何建造”，更是“为何建造”。\n\n关于这段师承的经历早已传开，年轻学徒纷纷前来请教，城市官员亦对[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]表现出罕见的尊重。此次归来，[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]已非当年莽撞青年，而是一位继承传统、肩负使命的人——或许终将留下自己的名字，成为后人仰望的对象。"
 gaudi.26.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U]曾站在巨人的阴影里，如今，[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U]正走向属于自己的光。"
