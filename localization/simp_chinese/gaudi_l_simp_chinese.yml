 je_gaudi_mole_phase_2: "安托内利尖塔：底座与尖塔"
 je_gaudi_mole_phase_2_reason: "安托内利不断修改他的建筑，例如增加了所谓的“小神庙”，一个两层高，有方形底座的新古典主义六边形柱廊，取代了基础柱廊风格的位置。安托内利对于践踏的最初设想是以一个五角星作为顶点，但他随后选取了一座带翅膀精灵或“genio alato”的雕像，它在安托内利去世后几个月被委托给雕塑家福马加利。设计包括一座雕花镀金的黄铜精灵像，一手持长枪，另一手持橄榄枝，头上有一个由杆子支撑的小五角星。1889年4月10日，当这颗星被安放在位置上时，尖塔总高度达到了167.5米（550英尺），使之成为当时欧洲最高的砖制建筑。"
