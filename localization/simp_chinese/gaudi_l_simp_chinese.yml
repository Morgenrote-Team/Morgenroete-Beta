 gaudi.1301.t: "新式火枪开发完成"
 gaudi.1301.d: "我们的[concept_tesla_military_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')]多年来一直致力于研制一种新式步枪。如今它已经可以武装我们的士兵了！"
 gaudi.1301.f: "“这是把别出心裁的枪，可以让我们的将士对敌时更具优势！我确信它比其他国家正在用的玩意儿更加快准狠！”"
 gaudi.1301.g: "真是一件夺人耳目的武器。我要把玩一番，现在！"
