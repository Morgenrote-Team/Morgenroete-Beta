 gaudi.74.t: "石材内的新视角"
 gaudi.74.d: "一位大胆的新建筑师吸引了神职人员和皇室的注意。他的名字是亚历山德罗·安东内利。"
 gaudi.74.f: "1798年出生于皮埃蒙特大区格梅的亚历山德罗·安东内利，一直被视为意大利建筑界一位前途无量但未经考验的天才。随着他对诺瓦拉大教堂的激进改造，人们看法发生了转变。在受托设计新古典主义祭坛时，安东内利用了一种古典几何与冲天垂直感的大胆融合，这种设计虽引发争议，却令人过目难忘。尽管部分评论家认为其设计过于夸张，但另一些人却从中看到了足以媲美意大利文艺复兴时期的精神气质。\n\n随着声望日隆，关于他未来能否担纲重塑王国的重任，学术界开始出现各种讨论。"
 gaudi.74.g: "安东尼内利将成为撒丁岛的新任首席建筑师。"
 gaudi.74.h: "给他一个学院里的席位。"
