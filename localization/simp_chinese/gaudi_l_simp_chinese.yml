 je_gaudi_dombau_phase_1: "科隆大教堂：复工"
 je_gaudi_dombau_phase_1_reason: "科隆大教堂被视作举世最为完美的哥特式主教座堂。这一规模宏大的工程始建于13世纪，但在唱诗班座位区竣工后便陷入停滞，直至15世纪完全停工。时至今日，中世纪晚期的起重机仍然耸立在半途而废的南塔之上。随着德意志资产阶级当中民族主义与浪漫主义情怀的复兴，特别是在原始建造计划被重新发现并广为传播后，人们愈发相信大教堂的完工不仅是一项荣耀上帝的工程，也是德意志文化与民族团结的象征。"
