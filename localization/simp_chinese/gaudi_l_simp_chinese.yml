 je_gaudi_dombau_phase_2: "科隆大教堂：南立面"
 je_gaudi_dombau_phase_2_reason: "在建造工程进行数年之后，建筑师们如今需要面对教堂南立面的建造与装饰。丰富的人像装饰不仅使其被视作德意志雕塑的巅峰之作，也跻身哥特复兴建筑的典范之一。仅立面本身的建造就花费了13年，而完工并装饰则长达18年之久。"
