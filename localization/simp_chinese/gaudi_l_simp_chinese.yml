 gaudi.1201.t_general: "西部与大西洋铁路3号“通用”"
 gaudi.1201.t_forney: "“福尼”0‑4‑4‑T"
 gaudi.1201.t_e6: "E6型“大西洋”"
 gaudi.1201.t_m_1000: "M‑10000"
 gaudi.1201.t_gg1: "CG1型"
 gaudi.1201.t_kkstb_30: "奥地利皇家国铁31型"
 gaudi.1201.t_fs_class_670: "意大利国铁670型"
 gaudi.1201.d: "我们的[concept_tesla_mechanical_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')]建造的机车终于驶上了[GetPlayer.GetAdjectiveNoFormatting]铁路网的轨道！我们一定会看到这些机车创造新的速度记录！"
 gaudi.1201.f: "“看看这个工程奇迹！太神奇了，不是吗？”"
 gaudi.1201.f_general: "4‑4‑0布置被证明非常出色。“通用”以及同类机车必将成为美国铁路的生力军！"
 gaudi.1201.f_forney: "福尼是一款非常适合在都市区域使用的机车，因为它的小体积可以应对城市铁路的急转弯。"
 gaudi.1201.f_e6: "E6“大西洋”型高速机车保证了乘客的平稳乘坐体验。它将用于主要客运线路。"
 gaudi.1201.f_m_1000: "M‑10000是一种流线型燃油‑电力机车。它可以达到很高的速度，是特快线路的理想机车。"
 gaudi.1201.f_gg1: "GG1级是一款流线型电力机车，能以惊人的速度牵引列车。这款机车的运行生涯肯定会相当漫长！"
 gaudi.1201.f_kkstb_30: "皇家国铁31型是一款出色的通勤列车，因为它特殊的燃煤过程不排放蒸汽与烟雾。"
 gaudi.1201.f_fs_class_670: "意大利国铁670型标志性的设计颠覆了机车的通常顺序：驾驶室位于机车前端，使得司机拥有了完美的视野。"
 gaudi.1201.g: "工程学的奇迹！"
 je_gaudi_modernizing_industries_project: "现代化生产方式"
 gaudi_engineer_focus_building: "工程学焦点"
 gaudi.1211.f: "“你看那，这台新机器可以让我少雇三个工人。这样他们仨还能操弄三台这机器，这可以让我赚很多。要不了多久我就能买艘新游艇了！”"
 gaudi.1211.g: "我们要发财啦！"
