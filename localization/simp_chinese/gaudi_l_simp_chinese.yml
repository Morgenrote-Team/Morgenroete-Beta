 gaudi.1311.d: "我们的[concept_tesla_military_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')]多年来一直致力于研制一种新式坦克。如今它已经可以武装我们的机械旅了！"
