 gaudi.901.t: "景福宫开工建设"
 gaudi.901.d: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle][SCOPE.sCharacter('gaudi_ruler').GetFullName]下令重建昔日的王宫。几年后，它将重现昔日的辉煌。"
 gaudi.901.f: "两个半世纪以来，这座宫殿一直是一片废墟。[SCOPE.sCharacter('gaudi_ruler').GetFullName]希望修复占地 40 公顷的约 500座建筑和7700个房间。这项巨大的建筑工程预计将在短短几年内完成。"
 gaudi.901.g: "此般宫殿只适合我们的[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]！"
 gaudi.902.t: "景福宫竣工"
 gaudi.902.d: "经过多年努力，景福宫终于完工。它就像首都上空的一颗明珠，熠熠生辉。我们的国家终于再度拥有了一座反映朝鲜权力和财富的宫殿。"
 gaudi.902.f: "1867年，大院君摄政时，重修了宫殿建筑，形成了一个由330座建筑和5792个房间组成的宏伟建筑群。景福宫占地4657576平方英尺（432703平方米），再次成为朝鲜民族和王室的标志。1894年，日本侵占了宫殿，逼迫高宗建立了亲日政权。景福宫作为国家主权的象征，遭到了日本在20世纪初的残酷摧毁。1911年，宫殿土地被割让给日本总督。1915年，日本借口举办展览，拆毁了90%以上的建筑。展览后，日本将余下的建筑夷平，并在原地建起了他们的殖民地总部——总督府。"
 gaudi.902.g: "朝鲜的辉煌已然回归！"
 gaudi.909.t: "景福宫失陷！"
 gaudi.909.d: "随着汉城的失陷，我们也完全失去了继续建造景福宫的机会。"
 gaudi.909.f: "如果因任何原因失去了汉城，建筑进度将#R 全部丧失#!。只有朝鲜才能继续建造景福宫。外来入侵者不会对继续建造表现出兴趣。"
 gaudi.909.g: "我们不能允许他们掌控汉城太久！"
 gaudi.911.t: "建设进度缓慢"
 gaudi.911.d: "王室官邸的建设工作进展缓慢。根据总建筑师的计算，迄今为止的进度比原定计划晚了几个月。"
 gaudi.911.f: "出于未知原因，景福宫的建设进度越来越慢：是敌对政治势力的煽动，还是工会对职业道德的破坏，是光明会的阴谋，抑或仅仅是恶劣的天气。"
 gaudi.911.g: "强制延长工作时间。"
 gaudi.911.h: "给工人发奖金。"
 gaudi.911.i: "我们等。"
 gaudi.912.t: "建设进度良好"
 gaudi.912.d: "景福宫的建设进度之快令人惊讶。据总建筑师介绍，景福宫可以提前完工。"
 gaudi.912.f: "不知是什么原因，景福宫的建设进展得越来越好：可能是对祖国的热爱、高工资、当地精英的友好支持，或者仅仅是天气更好。"
 gaudi.912.g: "棒极了。"
 gaudi.913.t: "火灾！"
 gaudi.913.d: "首都上空浓烟滚滚，几英里外都能看到——朝鲜最大的建筑工地发生了火灾！"
 gaudi.913.f: "起火原因尚未查明，但由于疏忽大意和消防组织不力，大火蔓延到许多建筑物和房间。特别是脆弱的木质结构被大火烧毁。施工计划被推迟了数周甚至数月！"
 gaudi.913.g: "糟糕！ "
 gaudi.914.t: "更多房间"
 gaudi.914.d: "在施工过程中，首席建筑师公布了新的计划，以便更加谨慎地使用该区域。这样就有可能建造更多的建筑和房间。然而，这意味着额外的费用和重大的延误。"
 gaudi.914.f: "“只有5000个房间？给我来7000个！”"
 gaudi.914.g: "我们需要为君王及其家人提供更多空间。"
 gaudi.914.h: "这是虚荣！"
 gaudi.915.t: "一位留下深刻印象的访客"
 gaudi.915.d: "最近几天，[SCOPE.sCharacter('gaudi_sycophant_leader').GetFullName]想亲眼看看正在建设中的宫殿的规模和美感。当他看到正在建造的结构时，他对这一杰作感到惊叹不已。"
 gaudi.915.f: "“我的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]。在我见到景福宫之前，我从未意识到自己的渺小。我觉得自己就像沙滩上的一粒尘埃，像夜空中的一颗迷失的星星。那一天，我只是一只面对太阳的萤火虫。真的，这座宫殿将是所有宫殿中最宏伟的宫殿，是国王、皇帝——甚至是神明的圣殿！多亏了你，我们才能一睹这份荣耀，这份你心中的绝妙构想。我舔着你的影子，即使是你的唾沫，也不配沾染我在见到这份荣耀后的可耻身躯。哦，真的，我这卑微的虫子怀疑过，怀疑过你，怀疑过这片土地，怀疑过海天之间的所有土地！但是错的是我，我错在这里，错在那里，错在上面，错在下面。就像鲑鱼鹟对草原刺猬王说的那样……”"
 gaudi.915.g: "这些奸佞小人简直是瘟疫。"
 gaudi.1005.t: "第一封电报"
 gaudi.1005.d: "今天，[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName]使用[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetSheHe]发明的编码表用发出了第一封电报。这次测试完全成功了！"
 gaudi.1005.f: "在1843年3月，美国国会拨款三万美元给塞缪尔·莫尔斯，用于铺设一条从华盛顿特区到马里兰州巴尔的摩的电报线。莫尔斯最初决定将电线埋在地下，请求埃兹拉·康奈尔使用康奈尔专门开发的电缆铺设犁来铺设电线。然而，因为线路出现了故障，该项目在铺设了大约9.3英里的电线后被中止。莫尔斯得知库克和威特斯通在英国使用电线杆支撑他们的线路，决定效仿他们。1844年5月1日，对尚未完成的电报线进行了测试，当时辉格党的亨利·克雷被提名参选总统的消息从巴尔的摩的党代表大会被发送到华盛顿特区的国会大厦。莫尔斯的电报线于1844年5月24日进行了演示，从华盛顿特区的美国国会大厦的旧最高法院大厅到巴尔的摩的铁路的蒙特克莱尔站，莫尔斯（华盛顿）将第一条消息传输给阿尔弗雷德·维尔（巴尔的摩）"
 gaudi.1005.g: "上帝创造了什么"
 gaudi.1006.t: "第一辆使用内燃机的汽车"
 gaudi.1006.d: "在今天，[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName]驾驶一辆内部装有内燃机的汽车，以16公里每小时的速度，一路从[SCOPE.sState('gaudi_car_state_1_scope').GetName]行驶到了[SCOPE.sState('gaudi_car_state_2_scope').GetName]。"
 gaudi.1006.f: "“16公里每小时？这个速度太危险了！”"
 gaudi.1006.g: "呜——"
