 je_gaudi_secession_1: "第一次新艺术分离"
 je_gaudi_secession_1_reason: "新艺术运动吸引了众多艺术家。假以特定条件，其将形成享誉世界的艺术运动，并为绘画与建筑注入新的动力。在历史上，此类组织中举足轻重者之一当属维也纳的艺术家们在世纪之交创立的维也纳分离派，或称奥地利艺术家协会。由此衍生出的新艺术运动变体也被称作分离风格或维也纳新艺术。"
 je_gaudi_secession_2: "第二次新艺术分离"
