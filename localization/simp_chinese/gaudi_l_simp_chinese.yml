 notification_gaudi_summer_palace_burned_notification_name: "圆明园被焚"
 notification_gaudi_summer_palace_burned_notification_desc: "清朝皇帝百年来的居所，壮丽的圆明园，已经被[INITIATOR_COUNTRY.GetName]焚毁。"
 gaudi_dombau_phase_1_decision: "科隆大教堂竣工"
 gaudi_dombau_phase_1_decision_desc: "科隆大教堂被视作举世最为完美的哥特式主教座堂。这一规模宏大的工程始建于13世纪，但在唱诗班座位区竣工后便陷入停滞，直至15世纪完全停工。时至今日，中世纪晚期的起重机仍然耸立在半途而废的南塔之上。随着德意志资产阶级当中民族主义与浪漫主义情怀的复兴，特别是在原始建造计划被重新发现并广为传播后，人们愈发相信大教堂的完工不仅是一项荣耀上帝的工程，也是德意志文化与民族团结的象征。"
 gaudi_dombau_phase_2_decision: "科隆大教堂的南立面"
 gaudi_dombau_phase_2_decision_desc: "在建造工程进行数年之后，建筑师们如今需要面对教堂南立面的建造与装饰。丰富的人像装饰不仅使其被视作德意志雕塑的巅峰之作，也跻身哥特复兴建筑的典范之一。仅立面本身的建造就花费了13年，而完工并装饰则长达18年之久。"
 gaudi_dombau_phase_3_decision: "科隆大教堂的屋顶结构"
 gaudi_dombau_phase_3_decision_desc: "科隆大教堂的设计以哥特式理念为其基础，但这并未妨碍建筑大师运用当时最为现代的建筑材料。其铁制屋顶结构是埃菲尔铁塔建成前全世界最大的钢铁构造。仰赖这一决定，建筑在二战期间面对盟军轰炸得以幸存。"
 gaudi_dombau_phase_4_decision: "科隆大教堂的西立面与塔楼"
 gaudi_dombau_phase_4_decision_desc: "大教堂的西立面是有史以来最大的教堂立面。它详细遵循了建筑大师萨伏伊的迈克尔1370年在立面图F中所制定的中世纪计划。科隆大教堂罗阔的特点是带有两座尖塔的双塔式立面。迈克尔大师设计了一座完全镂空的八角形花饰尖顶，上有分层顶饰。哥特式建筑师们尝试以此探索技术可能性的极限，并强调这座建筑试图成为东方三博士所居的”不朽灵堂“。"
 gaudi_gotthard_survey_decision: "圣哥达铁路的计划与勘察"
 gaudi_gotthard_survey_decision_desc: "19世纪的瑞士面临着被国际铁路交通绕行而过的风险，这不仅将使该国与现代交通系统相隔绝，更令其置身工业革命之外。布伦纳山口铁路的开通进一步加剧了这种风险。从地理学角度而言，瑞士相较奥地利处于劣势，因为布伦纳山口比瑞士的替代线路更易于穿越。在瑞士通过建造阿尔卑斯山铁路的计划之前，有关路线和资金问题的讨论进行了数十年。苏黎世政治家与企业家阿尔弗雷德·埃舍尔在圣哥达路线的确定中扮演了关键角色。"
 gaudi_gotthard_construction_decision: "建造圣哥达铁路"
 gaudi_gotthard_construction_decision_desc: "圣哥达铁路的建设被视作19世纪最大的建设项目之一，就其规模与技术难度而言堪与苏伊士运河相提并论。起初至关重要且雄心勃勃的部分是实现穿越圣哥达山的隧道。档期在1882年开通时，圣哥达山顶隧道以其15公里的长度成为全世界最长的隧道。这条路线的另一部分是约一百座钢铁制成的大小桥梁，不仅联通了欧洲南北，也是瑞士团结的象征。"
 gaudi_cristo_construction_decision: "建造救世基督像"
 gaudi_cristo_construction_decision_desc: "19世纪50年代中期，文生会神父佩德罗·玛利亚·博斯首次提议在科尔科瓦多山上建造一座基督像以向佩德罗二世皇帝之女，巴西摄政伊莎贝尔公主致敬，但计划未获批准。里约天主教徒于1920年第二次提议建造一座地标雕像。当地工程师埃克托尔·达·席尔瓦·科斯塔与艺术家卡洛斯·奥斯瓦德设计了雕像。法国雕塑家保罗·兰多斯基创作了这一作品。这座装饰风艺术风格雕像随后在全世界获得赞誉，并和临近的糖面包山一样成为了里约热内卢的地标。"
 gaudi_mole_phase_1_decision: "安托内利尖塔：从犹太会堂到国家象征"
 gaudi_mole_phase_1_decision_desc: "安托内利尖塔是一座亭楼式建筑，其高耸的尖锐锥形结构由都灵建筑师亚历山德罗·安托内利设计。它原本计划被用作代表当地犹太社区的犹太教会堂，但建筑师的远大雄心使得项目超出了最初的计划，成本急剧上升，竣工日期被推迟多年。犹太社区尝试继续筹款的企图以失败告终，然而都灵的人民呼吁当地政府接手完成这座已然初具雏形的建筑，并将其敬献给意大利的统一。"
 gaudi_custom_tt_trigger_mole: "正在扮演#yellow 意大利#!"
 gaudi_mole_phase_2_decision: "安托内利尖塔：底座与尖塔"
 gaudi_mole_phase_2_decision_desc: "安托内利不断修改他的建筑，例如增加了所谓的“小神庙”，一个两层高，有方形底座的新古典主义六边形柱廊，取代了基础柱廊风格的位置。安托内利对于践踏的最初设想是以一个五角星作为顶点，但他随后选取了一座带翅膀精灵或“genio alato”的雕像，它在安托内利去世后几个月被委托给雕塑家福马加利。设计包括一座雕花镀金的黄铜精灵像，一手持长枪，另一手持橄榄枝，头上有一个由杆子支撑的小五角星。1889年4月10日，当这颗星被安放在位置上时，尖塔总高度达到了167.5米（550英尺），使之成为当时欧洲最高的砖制建筑。"
 gaudi_ringstrasse_phase_1_decision: "维也纳环城大道：环路之王"
 gaudi_ringstrasse_phase_1_decision_desc: "维也纳环路是在19世纪中期拆除城墙后建造的。从1860年代到1890年代环城大道沿线建造了许多大型公共建筑，采用了古典主义、哥特式、文艺复兴和巴洛克等多种建筑风格，有时被称为“环路风格”（Ringstraßenstil）。整个环路上建造了许多公共和私人建筑。贵族和其他富裕阶级迫切希望建造代表性的公馆（环路宫殿），采用了宏伟的历史主义风格。"
 gaudi_ringstrasse_phase_2_decision: "维也纳环城大道：宫廷歌剧院和新市政厅"
 gaudi_ringstrasse_phase_2_decision_desc: "在决定在被拆除的维也城墙的原址上建造一条宏伟的林荫大道后仅10年，环城大道就落成了。但当时道路附近仍然被荒地所占据。在随后的几年里，最重要的项目之一是建立了一座大型的新歌剧院，也即后来成为维也纳国家歌剧院。新市政厅也是在这一时期建成的，在此期间，环城大道从一条单纯的大道变成了以宫殿和公共建筑为主的维也纳新中心。"
 gaudi_ringstrasse_phase_3_decision: "维也纳环城大道：大学与美术馆"
 gaudi_ringstrasse_phase_3_decision_desc: "环城大道已经成为实业家、银行家和贵族们梦寐以求的地址。公共建筑占据了突出的位置，以最为优雅的方式代表了国家。尽管如此，还有一些施工阶段需要完成，其中最重要的当属建立新的大学与美术馆建筑。"
 gaudi_custom_tt_trigger_ringstrasse: "正在扮演#yellow 奥地利#!"
 gaudi_sagrada_phase_1_decision: "圣家堂：安东尼·高迪之梦"
 gaudi_sagrada_phase_1_decision_desc: "安东尼·高迪‑科尔内特是西班牙加泰罗尼亚建筑师，被视为“加泰罗尼亚现代主义”（新艺术运动的分支）的代表性人物之一，他的作品以其复杂、新颖、独树一帜、个人色彩强烈的建筑作品知名。1883年高迪接手了圣家堂的设计工作，并对规划做出了彻底的调整，把原先设计的新哥特式教堂改为加泰罗尼亚现代主义建筑。高迪一生中43年的心血都花在这个教堂的设计与建造上，直到他1926年去世。几十年来，圣家堂一直是世界上最大的未完工天主教堂——介于天才与疯子之间的世纪工程。"
 gaudi_sagrada_phase_2_decision: "圣家堂：半圆后殿"
 gaudi_sagrada_phase_2_decision_desc: "高迪基本上按照德尔·维拉的计划完成了他所开始的地下圣堂，其中拱顶是高迪的修改。在19世纪80年代中期，就可以在其中举行第一次仪式，地下圣堂于1889年完工。在建造地下圣堂的同时，高迪开始对教堂的建造计划进行根本性的重新设计。1885年，他提出了一个采用哥特式设计风格的新计划，尽管规模比现在的计划要小，却有18个可以分辨的尖塔。1893年完成的半圆形后殿的外墙比德尔·维拉原本的设计更高。它包含了新哥特式元素，但在哥特式形式的独特使用、自然主义风格的滴水嘴兽雕塑以及尖顶等方面显示了高迪的个人风格。"
 gaudi_sagrada_phase_3_decision: "圣家堂：诞生立面"
 gaudi_sagrada_phase_3_decision_desc: "为了纪念耶稣的诞生，诞生立面使用可以让人联想到生活元素的场景做装饰。高迪的自然主义风格特点是，这些雕塑被恰当地安排和装饰在自然界的场景于图像上，每一个都是其自身的象征。诞生立面朝向东北方向的旭日，这象征着基督的诞生。它被分为三个门廊，每个门廊都代表一种神学美德（希望、信仰和慈善）。生命之树耸立在慈善门廊的耶稣之门上。"
 gaudi_sagrada_phase_4_decision: "圣家堂：中殿"
 gaudi_sagrada_phase_4_decision_desc: "教堂的平面图采用带有五个走廊的拉丁十字形。内部的柱子是高迪独特的设计。除了支撑重量外，它们不断变化的表面是各种几何形状交错的结果。最简单的例子是正方形底座逐渐变成八边形，然后是十六边形，最终变成圆形。基本上，内部几乎没有表面是水平的；装饰全面且丰富，主要由结合了平滑曲线和锯齿状尖角的抽象形状组成。即使是铁制的阳台和楼梯栏杆也充满了曲线的装饰。"
 gaudi_sagrada_phase_5_decision: "圣家堂：十二宗徒之尖塔"
 gaudi_sagrada_phase_5_decision_desc: "高迪的原始设计总共有十八个尖塔，从低到高代表十二宗徒、圣母玛利亚、四位福音书的作者（玛窦、马尔谷、路加和圣史若望）和最高的耶稣基督。所有的尖塔，其形状都旨在给予人们类似主教的牧杖的感觉，它们都有长长的垂直凹槽和彩色的尖顶，上面装饰着动物或神圣的符号和圣经引文。它们携带着一个小小的金色十字架，上面刻有各自使徒的名字。一些尖塔会通过狭窄的石桥相连接。"
 gaudi_sagrada_phase_6_decision: "圣家堂：受难立面"
 gaudi_sagrada_phase_6_decision_desc: "与装饰精美的诞生立面相比，受难立面朴素、简单，石材裸露，刻有粗犷的直线来比拟骷髅的骨骼。这个立面是为了纪念基督的受难，即他在被钉十字架时所遭受的痛苦，旨在描绘人类的罪恶。高迪希望这个立面能够让观看者感到恐惧。他想要“打破”拱形和“切割”柱子，并利用明暗对比的效果（暗角阴影与严酷的刚性光线对比）来进一步展示基督的牺牲所带来的严重性和残酷性。面向落日，象征基督的死亡，受难立面由六根大而倾斜的柱子支撑，设计成类似于紧绷的肌肉的形状。"
 gaudi_sagrada_phase_7_decision: "圣家堂：耳堂"
 gaudi_sagrada_phase_7_decision_desc: "装饰主题取自礼拜中的词句，其尖顶饰有“和散那”、“光荣”与“圣哉”等词语，受难立面的大门以各种语言重现《新约》中耶稣受难一段，主要是加泰罗尼亚语，荣耀立面装饰着《使徒信经》中的词语，而主入口的大门则用加泰罗尼亚语书写全篇主祷文，周围环绕着“我们日用的饮食，今日赐给我们”一句的各种语言版本。三个入口分别象征三种美德：信仰、希望与爱，也分别致敬了基督一生中的三个阶段。"
 gaudi_sagrada_phase_8_decision: "圣家堂：圣母玛丽亚与福音书作者之尖塔"
 gaudi_sagrada_phase_8_decision_desc: "福音书作者的塔尖上方装饰有他们传统象征的雕塑：有翼公牛（圣路加）、有翼人（圣玛窦）、一只老鹰（圣史若望）和有翼狮子（圣马尔谷）。塔楼的顶端高达22.5米，由三个不同部分组成：底部由四行六边形构成，上面刻有铭文“阿利路亚”和“阿门”，周围环绕着鱼骨状的陶瓷棕榈树；中间部分是镶嵌陶瓷和威尼斯玻璃覆盖的球相交的二十面体，内部包含光源；最后的装饰是四位福音书作者的雕像，带有翅膀并手持一个刻有各作者首字母的福音书。圣母塔位于后殿上方，顶部是一个象征晨星的大十二角星。此外，它还带有几个描绘圣母的图像元素，如《圣母经》和各种花朵，象征着耶稣之母的属性。"
 gaudi_sagrada_phase_9_decision: "圣家堂：荣耀立面"
 gaudi_sagrada_phase_9_decision_desc: "最大且最引人注目的立面是荣耀立面。它致力于表现耶稣在天上的荣耀，代表着通向上帝的道路：死亡、最后审判和荣耀，而地狱则留给那些背离上帝旨意的人。为了到达荣耀门廊，人们需要通过建在马略卡街上的地下通道，通道的装饰代表地狱和邪恶。门廊将被装饰上恶魔、偶像、伪神、异端和裂教等图案。炼狱和死亡也将通过地面上的墓碑被描绘出来。门廊上有七根大柱子，分别代表圣灵的七种恩赐。在柱子的基座上有七宗罪的象征，而在顶部则是七种天赐的美德。"
 gaudi_sagrada_phase_10_decision: "圣家堂：耶稣之尖塔"
 gaudi_sagrada_phase_10_decision_desc: "耶稣塔与四座福音书作者塔之间通过四座桥相连，塔顶是一座高13.5米、有六臂的巨大十字架。在其中央部分，有一只羔羊，以及刻有“因为只有袮是圣的，只有袮是主，只有袮是至高无上的。”的铭文，还有“阿门”和“哈利路亚”的字样。十字架的四臂上将射出强光，以自远处可见，以纪念圣经中定义耶稣为“我是世界的光”的经文。耶稣塔内部将分为三层，象征着宇宙的创造以及与基督相关的“我是道路、真理、生命”的段落。"
 gaudi_sagrada_support_decision: "支持圣家堂"
 gaudi_sagrada_support_decision_desc: "圣家堂的建设事实上是基于募捐，但我国目前的宪法允许对所谓“捐赠”进行更为宽泛的解释，以激励我国人民一致支持这一建造项目。这将会使我们每月多获得1点建造点数。"
 gaudi_end_sagrada_support_decision: "结束支持圣家堂"
 gaudi_end_sagrada_support_decision_desc: "我们随时可以撤回对圣家堂建造工程的支持，但真有人想要这样做吗？"
 gaudi_activate_saxon_palace_decision: "重建萨克森宫"
 gaudi_activate_saxon_palace_decision_desc: "光复华沙标志着波兰民族历史的新篇章。荒废已久的萨克森宫曾经是韦廷王朝的王室居所，如今它将重获其应有的地位，例如作为无名战士的纪念馆。"
 gaudi.31.t: "[SCOPE.sState('gaudi_art_deco_cinema_state').GetCityHubName]的装饰风艺术影院"
 gaudi.31.d: "一座全新的现代化电影院今日揭幕。"
 gaudi.31.f: "装饰风艺术建筑的一个重要类型是电影院。装饰风艺术时期正值有声电影的诞生，也是巨大豪华的电影院的时代。许多这样的电影院存留至今，尽管其中内部可能已分割成较小的放映厅。其中最著名的例子是加利福尼亚奥克兰的派拉蒙剧院，它有一个四层楼高的大厅，通过27个门进入，可以容纳3746人。"
 gaudi.31.g: "巴斯特·基顿的新片上映了吗？"
 gaudi.32.t: "[SCOPE.sState('gaudi_art_deco_skyscraper_state').GetCityHubName]的装饰风艺术摩天大楼"
 gaudi.32.d: "凭借其活泼的装饰、美丽的马赛克与引人入胜的外形，[SCOPE.sState('gaudi_art_deco_skyscraper_state').GetCityHubName]的新摩天大楼不仅仅是一座高楼。"
 gaudi.32.f: "装饰风艺术风格诞生于巴黎，但这座城市不允许兴建高于圣母院的建筑（唯一的例外是埃菲尔铁塔）。因此，美国很快在高层建筑领域后来居上。第一批摩天大楼于19世纪80年代在芝加哥建成，采用了布扎风格或新古典主义风格。20世纪20年代，纽约的建筑师运用新的装饰风艺术风格建造了克莱斯勒大厦和帝国大厦。四十年中，帝国大厦一直是世界上最高的建筑。摩天大楼的内部和外部装饰是经典的装饰风艺术风格，采用几何形状和人字形图案。克莱斯勒大厦全新演绎了哥特式教堂上的传统石像鬼，角落里有克莱斯勒轿车散热器装饰物形状的雕塑。"
 gaudi.32.g: "有风格的摩天大楼。"
 gaudi.33.t: "装饰风艺术机场"
 gaudi.33.d: "一座富丽堂皇的装饰风艺术风格机场迎接全世界的旅客，从落地那一刻起向外国人展现我们国家的伟大。"
 gaudi.33.f: "新世纪伊始，机场是进步的象征：征服天空这一长期对人类而言遥不可及的梦想突然变得理所当然。飞行员彼此竞争，打破记录，试图环游世界：在他们身上，古代英雄的理想与最为先进技术融为一体。同时，客运飞行是一种身份的象征，被精致与奢华紧紧围绕。装饰风艺术机场接纳了这一主题，并通过装饰或巨大的比例将其转化为暗示性的图像。"
 gaudi.33.g: "霍华德·休斯会为此骄傲。"
 gaudi.34.t: "装饰风艺术办公室"
 gaudi.34.d: "一座新的政府大楼今日开幕，活泼的立面宣示着装饰风艺术的胜利。"
 gaudi.34.f: "装饰风艺术风格起初与商业建筑、证券交易所、电影院和剧院等富丽奢华的机构有关，但随着时间推移也传播到国家机构。市政厅、法院与邮局等政府建筑很快也采用了这种风格。"
 gaudi.34.g: "再也没有平平无奇的写字间了！"
 gaudi.50.t: "装饰风艺术之梦"
 gaudi.50.d: "[ROOT.GetCountry.GetName]已经成为现代且奢华的建筑学的耀眼典范。这是令全世界艳羡的地位！"
 gaudi.50.f: "“Tout sert au luxe, aux plaisirs de ce monde.\nO le bon temps que ce siecle de fer ！\nLe superflu, chose tres necessaire,\nA reuni l’un et l’autre hemisphere.\n\n万物皆用于奢华，\n此世欢愉无比。\n多余的，却又极其必要，\n让两个半球相聚一起。”\n——伏尔泰"
 gaudi.50.g: "进入另一个世界的狂喜！"
 gaudi.60.t: "火烧圆明园"
 gaudi.60.d: "驻在中国的我国高级军官呼吁进行报复，因为我们国家的一些公民被逮捕并遭到谋杀。绝不能允许任何中国人蔑视我们的同胞！"
 gaudi.60.f: "“在世界的某个角落，有一个世界奇迹。这个奇迹叫圆明园。艺术有两个来源，一是理想，理想产生欧洲艺术；一是幻想，幻想产生东方艺术。圆明园在幻想艺术中的地位就如同巴特农神庙在理想艺术中的地位。这是某种令人惊骇而不知名的杰作，在不可名状的晨曦中依稀可见，宛如在欧洲文明的地平线上瞥见的亚洲文明的剪影。\n这个奇迹已经消失了。\n有一天，两个来自欧洲的强盗闯进了圆明园。一个强盗洗劫财物，另一个强盗在放火。似乎得胜之后，便可以动手行窃了。他们对圆明园进行了大规模的劫掠，赃物由两个胜利者均分。两个胜利者，一个塞满了腰包，这是看得见的，另一个装满了箱箧。他们手挽手，笑嘻嘻地回到欧洲。这就是这两个强盗的故事。\n我们欧洲人是文明人，中国人在我们眼中是野蛮人。这就是文明对野蛮所干的事情。”——维克多·雨果"
 gaudi.60.g: "统统烧光！"
 gaudi.60.h: "只有野蛮人才会这么想。"
 gaudi.61.t: "圆明园被焚！"
 gaudi.61.d: "这是世界历史上最野蛮的行径之一，敌人洗劫了清王朝的皇家居所，放火烧毁了圆明园！"
 gaudi.61.g: "我们正泪流成河……"
 gaudi.62.t: "火烧大本钟"
 gaudi.62.d: "复仇的滋味是甜美的。"
 gaudi.62.f: "“人群十分安静，相对而言比较满意；当风吹来的时候，人们会高声大喊，仿佛为它助威：“给上议院来点火花！”——“济贫法的报应！”——“他们的法案完蛋了！”这样的呼喊声无处不在。我没有看到任何一个悲伤的人。” ——托马斯·卡莱尔"
 gaudi.63.t: "威斯敏斯特议会大厦被焚！"
 gaudi.63.d: "这是世界历史上最野蛮的行径之一，敌人洗劫了不列颠议会的驻地，放火烧毁了大本钟！"
 gaudi.100.t: "沉睡巨人"
 gaudi.100.d: "浪漫主义时代对中世纪的理想化导致越来越多的人将科隆大教堂的完成视为一项国家任务。"
 gaudi.100.f: "1770年，约翰·沃尔夫冈·冯·歌德被哥特式的斯特拉斯堡大教堂深深吸引，由此激发了对这种建筑风格的浪漫式再发现。之后，公共知识分子将科隆大教堂视为一项待完成的艺术品。直到1814年，天主教公共知识分子约瑟夫·格雷斯将大教堂誉为德国的国家圣殿，并将其作为所期望的德意志民族国家的象征，这才改变了争论的方向。位于科隆的艺术品商苏尔皮兹·博伊塞雷是完成大教堂的运动的核心人物。他在1814年和1816年重新发现了西立面的正立面设计图，这为他的努力注入了新的活力。从1821年至1831年，博伊塞雷出版了一系列描绘完成后的大教堂的版画，极大地推动了全德对大教堂建设的热情。哥特式建筑在当时被视为一种真正的德国建筑风格，而大教堂则被风格化为德国的国家纪念碑，这一转变最终赢得了普鲁士王储腓特烈·威廉对大教堂项目的支持。由此，原先仅限于科隆的完成大教堂的想法，成为了普鲁士甚至全德国的问题，也首次成为现实的选择。"
 gaudi.100.g: "他是一位巨人。"
 gaudi.101.t: "第一施工阶段开始"
 gaudi.101.d: "今天，在盛大的仪式上，科隆大教堂的第二块基石被放下了。"
 gaudi.101.f: "1842年9月4日，普鲁士国王腓特烈·威廉四世和助理主教——后来的大主教约翰内斯·冯·盖塞尔为大教堂的继续建设奠定了基石。基石被吊到尚未完成的南塔，并在那里砌入墙壁。"
 gaudi.101.g: "新的建造阶段开始了。"
 gaudi.102.t: "第一施工阶段完成"
 gaudi.102.d: "我们完成了科隆大教堂的第一施工阶段。"
 gaudi.102.f: "奠基后仅仅六年，中殿与横廊中所有侧廊的拱顶都已完成，中央通道也被提升到三重通廊之上，其上方安装了一种底部开敞的桁架，以便在上方工程仍在进行时使用中殿和横廊的区域。这种桁架使得教堂内部可以投入使用，并便于后续施工。"
 gaudi.102.g: "很好，让我们继续工作。"
 gaudi.103.t: "第二施工阶段开始"
 gaudi.103.d: "我们的建筑工人已经开始搭建并装饰大教堂的南立面。"
 gaudi.103.f: "中世纪的建筑师已经完成了唱诗班座位区，但忽略了中殿和横廊。在两者的建造取得进展之后，我们现在可以集中精力设计长边的大立面，其中的北立面比南立面更加简洁。"
 gaudi.104.t: "第二施工阶段完成"
 gaudi.104.d: "我们完成了科隆大教堂的第二施工阶段。"
 gaudi.104.f: "南立面是由建筑大师恩斯特·弗里德里希·茨维尔纳设计的，他与卡尔·弗里德里希·申克尔、苏尔皮·布瓦塞雷和弗里德里希·威廉四世国王协调了他的计划。南立面建于1842年至1855年间，如今被认为是新哥特风格地位最重要也是艺术上最完美的作品之一。立面的左侧是乌尔苏拉门，中间是受难门，右侧是格里安门。"
 gaudi.105.t: "第三施工阶段开始"
 gaudi.105.d: "些许争论过后，我们的工程师开始着手建造教堂的屋顶。"
 gaudi.105.f: "尽管许多支持大教堂工程的赞助者主张采用类似于中世纪完成的木质屋顶结构，但建筑大师恩斯特·弗里德里希·茨维尔纳仍坚持使用铁制结构建造屋顶和十字交叉处的塔楼，面对强烈的反对。他认为采用这种现代化建筑技术可以节约成本，减轻重量和降低火灾风险。"
 gaudi.106.t: "第三施工阶段完成"
 gaudi.106.d: "我们完成了科隆大教堂的第三施工阶段。"
 gaudi.106.f: "1863年，大教堂的中殿和横廊已经完工，只有两座塔之间的区域尚未完成。将已经完成的完成的祭坛和未完成的区域分隔了几个世纪的隔墙如今可以拆除了，大教堂的几乎整个内部首次展现在人们面前。"
 gaudi.107.t: "第四施工阶段开始"
 gaudi.107.d: "今天，科隆大教堂南塔上的中世纪晚期起重机被拆除，这一曾经被视作这座城市地标的建筑遗迹如今已经不复存在。"
 gaudi.107.f: "在中殿和横廊完工后，教堂的建造工坊终于完成了两座塔楼。这一机构在当时雇用了500多名工人，并采用了当时最先进的建筑技术，例如使用沿着铁路轨道行驶的绞盘马车或蒸汽机等。"
 gaudi.108.t: "科隆大教堂竣工"
 gaudi.108.d: "今天是建筑学与德意志文化的光辉时刻：科隆大教堂在数十年的工作后终于竣工。这足以证明我们已经超越了哥特时代的大师们！"
 gaudi.108.f: "最终完工的大教堂以其超过157米高的两座塔楼成为当时世界上最高的建筑‑尽管它的中世纪立面图纸是在600年前的1280/90年绘制的，但建造者却非常忠实地遵循了这一图纸。直到工业时代的埃菲尔铁塔竣工后，才超过了已经在中世纪计划中的高度。"
 gaudi.108.g: "那就是它应该存在的地方！"
 gaudi.109.t: "科隆失陷！"
 gaudi.109.d: "随着北莱茵的失陷，我们也完全失去了继续建造科隆大教堂的机会。"
 gaudi.109.f: "如果因任何原因失去了北莱茵地区，建筑进度将不会全部丧失。另一个拥有德意志主流文化的国家可以在最新的施工阶段继续建造大教堂。然而，外来入侵者不会对继续建造表现出兴趣。"
 gaudi.109.g: "我们不能允许他们掌控科隆太久！"
 gaudi.111.t: "劣质材料"
 gaudi.111.d: "最近运抵科隆大教堂的一批建筑材料被发现质量低劣。"
 gaudi.111.f: "首次检查发现运来的石材存在多处多孔洞，因此主建筑师毫不犹豫地拒绝了这批货。这必然会延误工期并增加额外的成本，但最终品质胜过一切。同时，也有人认为不仅出于成本和时间考虑应该使用这些石材，还应该保留一些更好的建筑材料以便后续使用……在其他方面。"
 gaudi.111.g: "质量有其价码。"
 gaudi.111.h: "除非有人注意到。"
 gaudi.112.t: "草率施工"
 gaudi.112.d: "劣质材料终于出了问题：今天早上，科隆大教堂的一部分倒塌并造成了相当严重的损害。"
 gaudi.112.f: "科隆教堂倒塌了，\n倒塌了，倒塌了。\n科隆教堂倒塌了，\n美丽的女士。"
 gaudi.112.g: "谁能想到？"
 gaudi.113.t: "建设进度加快"
 gaudi.113.d: "科隆大教堂的施工进展出乎意料，预计将比时间表提前数个月。"
 gaudi.113.f: "现代技术，高效工作，完美无缺的材料供应与好天气都有助于建设进度。"
 gaudi.113.g: "我就知道！"
 gaudi.114.t: "事故"
 gaudi.114.d: "科隆大教堂的施工现场发生了恐怖的事故，一些工人受伤，甚至有人丧命！"
 gaudi.114.f: "不幸的是，即使最好的建筑也无法避免意外事故——特别是许多材料已经有些年头了。"
 gaudi.114.g: "真是个悲剧！"
 gaudi.115.t: "新工作"
 gaudi.115.d: "大教堂的建设导致大量人口涌入科隆。"
 gaudi.115.f: "如同中世纪一样，大教堂的建造为城市生活带来了许多新的需求，往往只能通过新的工人来满足。不仅建筑工人需要招募，还需要餐馆和商店、供应商以及新公寓，这些也需要由其他人来建造。这使得科隆的经济蓬勃发展，一些人想直接或间接地从中受益。"
 gaudi.115.g: "伟大的工程需要伟大的人民。"
 gaudi.116.t: "有关大教堂的政治争议"
 gaudi.116.d: "并不是每个人关心科隆大教堂的完工。一位工会领袖今天公开指责这种“浪费”。"
 gaudi.116.f: "“听我说，诸位先生——是什么促使国家进行如此可怕的浪费，支持教权主义、民族主义和资本主义？权贵增长了威望，富人通过参与建设获得利润，教会则通过灌输迷信和落后思想来加强无产阶级的束缚，这都是反动政策的结果。但是，我问你们，是谁来建造这些奢侈和浪费的云端之家呢？没错，是普通工人！普通的劳动者，在建造过程中遭受虐待、致残或者丧命，唯一的回报是一个不存在的天堂。这座中世纪的大教堂代表着这个国家正在走向歧途！”"
 gaudi.116.g: "天气预报呢？"
 gaudi.116.h: "言之有理。"
 gaudi.117.t: "对大教堂的政治支持"
 gaudi.117.d: "一位怀有爱国主义思想的小市民代表今日发表了一段激情洋溢的演说，支持科隆大教堂的建设。"
 gaudi.117.f: "“各位先生，别听那些叛徒、善妒者和小气鬼的反对声。科隆大教堂即将完成，我们的国家已经摆脱了早先的颓废状态，并追随着祖先的足迹。哪个国家曾经实施过如此宏伟的工程？只有中世纪的教堂建筑师甚至金字塔的建造者！我们正在名垂青史。后代在仰望巨大的塔楼时，会记得我们此时作出了正确的决定。大教堂不仅是一座教堂，它是一座纪念碑、一座鼓舞人心的建筑，将激励许许多多德意志人在未来的几十年与几百年中做出新的贡献！”"
 gaudi.117.g: "太棒了！说得好！"
 gaudi.117.h: "我们应该借此获得进一步的支持。"
 gaudi.118.t: "国家项目还是宗教项目？"
 gaudi.118.d: "议会正在进行严肃的辩论，以决定科隆大教堂的首要地位究竟是国家建筑还是宗教建筑。"
 gaudi.118.f: "从开始考虑完成这座中世纪建筑时起，大教堂对于德意志人作为一个“团结”的民族的重要性就已经十分显著了。许多人认为，德意志民族应当回顾中世纪，尤其是萨利安王朝和霍亨斯陶芬王朝治下的神圣罗马帝国被视为德国的顶峰。但也有人认为这代表了基督教思想的淡化。毕竟，这座大教堂不仅仅是一座教堂，还是德国最强大的主教之一的驻地。科隆的基督教历史始于罗马帝国，上帝与民族的问题常常会导致分裂而非和解的倾向。"
 gaudi.118.g: "这是一项国家工程。"
 gaudi.118.h: "这既是国家工程，也是宗教工程。"
 gaudi.118.i: "这是一项宗教工程。"
 gaudi.119.t: "大教堂建造彩票"
 gaudi.119.d: "大教堂建筑彩票今年的获利非常可观，使得建造可以比预期更快进行。"
 gaudi.119.f: "起初，总建筑师茨维尔纳估计教堂中殿需要120万塔勒以完工，而扶壁需要同样的费用。在此基础上，每年的建筑成本计作10万塔勒，普鲁士国王希望用建筑基金支付其中的一半。为了筹集其余的建筑成本在科隆成立了中央大教堂建筑协会（Zentral‑Dombau‑Verein），最初由捐款支持。当内部装修于1863年完成时，预计如若资金流不变，还需50年才能完成建设。因此，该协会于1864年决定设立大教堂彩票，这被证明是一个不错的筹款来源。总体而言，大教堂建筑协会承担了所有费用的60%，而国家只支付了大约32％的大教堂建筑成本。"
 gaudi.119.g: "大奖！"
 gaudi.120.t: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle][SCOPE.sCharacter('gaudi_ruler').GetFullName]支持大教堂"
 gaudi.120.d: "[SCOPE.sCharacter('gaudi_ruler').GetFullName]对浪漫主义运动颇有兴趣，因此以个人名义为大教堂的施工捐助了一笔款项。"
 gaudi.120.f: "从历史角度看，科隆大教堂的建造也在一定程度上归因于弗里德里希·威廉四世国王的个人倡议，他被视作虔诚的教徒，并与浪漫主义关系匪浅。他一生中对艺术和建筑有着浓厚的兴趣。"
 gaudi.120.g: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle][SCOPE.sCharacter('gaudi_ruler').GetFullName]万岁！"
 gaudi.121.t: "观光之旅"
 gaudi.121.d: "科隆大教堂仍在施工，但进度已然引人注目，我们可以邀请盟友来访，向他展示一切。"
 gaudi.121.f: "即使作为一座未完工的建筑，科隆大教堂也令访客印象深刻并激发了他们的想象力。大教堂再次成为建筑工地的数十年间也是如此。罗伯特·舒曼看到正在进行的建设时受到启发，创作了他的第3交响曲；维多利亚女王在访问期间前来参观并获知了有关该项目的信息。"
 gaudi.121.g: "邀请我们的盟友访问科隆。"
 gaudi.121.h: "这只会干扰我们的工作。"
 gaudi.122.t: "为科隆大教堂捐款？"
 gaudi.122.d: "我国大使受邀访问科隆大教堂工地。这是一次引人入胜的观光之旅，现在大使询问我们是否愿意为大教堂捐款，以提升我国的国际声望。"
 gaudi.122.f: "即使作为一座未完工的建筑，科隆大教堂也令访客印象深刻并激发了他们的想象力。大教堂再次成为建筑工地的数十年间也是如此。罗伯特·舒曼看到正在进行的建设时受到启发，创作了他的第3交响曲；维多利亚女王在访问期间前来参观并获知了有关该项目的信息。"
 gaudi.122.g: "这一辉煌的工程应该得到我们的支持。"
 gaudi.122.h: "不过尔尔。"
 gaudi.123.t: "盟友捐赠"
 gaudi.123.d: "在参观之后，我们盟友的大使非常热情洋溢地决定成为项目的捐助者。"
 gaudi.123.f: "即使作为一座未完工的建筑，科隆大教堂也令访客印象深刻并激发了他们的想象力。大教堂再次成为建筑工地的数十年间也是如此。罗伯特·舒曼看到正在进行的建设时受到启发，创作了他的第3交响曲；维多利亚女王在访问期间前来参观并获知了有关该项目的信息。"
 gaudi.123.g: "真正的朋友可以一眼认出。"
 gaudi.124.t: "科隆的新机器"
 gaudi.124.d: "最先进的机器使得科隆大教堂的施工提前数月完成。"
 gaudi.124.f: "蒸汽机的使用帮助将建筑材料吊升至大教堂的高处。而许多其他技术成就也有助提升工作效率，使之远超中世纪。"
 gaudi.124.g: "这就是进步！"
 gaudi.125.t: "铁路为大教堂运送石料"
 gaudi.125.d: "科隆周边铁路的建成使得建设进度加快了几个月。"
 gaudi.125.f: "向科隆运送建筑材料的传统路线是莱茵河航运。在接下来的几年里，这仍然是运送大量建筑材料到大教堂所在城市的首选方法。然而，不断增长的铁路交通也有助于在紧急情况下改变供应路线，或者更快地运输人员和设备。"
 gaudi.126.t: "风暴天气"
 gaudi.126.d: "风暴是科隆大教堂的工程被拖慢了几个月。"
 gaudi.126.f: "昨晚一场雷暴袭击了科隆。风刮掉了篷布并刮塌了脚手架，损坏了一些石像鬼和雕像。"
 gaudi.126.g: "我宁愿来的是彗星。"
 gaudi.127.t: "科隆的考古调查"
 gaudi.127.d: "访问科隆后，[SCOPE.sCharacter('gaudi_archaeologist').GetFullName]发现大教堂建立在罗马遗迹之上。他申请发掘许可。"
 gaudi.127.f: "科隆是德国最古老的城市之一，也曾是罗马帝国的一个重要殖民地。罗马的遗产在科隆的城市价值构建中继续占主导地位，无论是在市政组织的公社，基督教对圣彼得的崇敬，还是自身作为罗马之女的风格化中。城市中心已被证明立足于罗马废墟之上，甚至一些街道也幸存了下来。然而，由于密集的城市发展，没有人敢在现场挖掘。大教堂附近的发掘工作会对建筑工程产生重大影响，但可以帮助我们的考古学家获得宝贵的经验。"
 gaudi.127.g: "我们无法承受如此漫长的停工。"
 gaudi.127.h: "难得的考古机会。"
 gaudi.200.t: "阿尔弗雷德·埃舍尔的崛起"
 gaudi.200.d: "1849年，实业家阿尔弗雷德·埃舍尔首次当选国民院议长。作为一名政治家、银行家、重要铁路公司的负责人以及圣哥达隧道的执行者，他将成为瑞士历史上最有影响力的人物之一。"
 gaudi.200.f: "约翰·海因里希·阿尔弗雷德·埃舍尔·冯·格拉斯是一位瑞士政治家、商业领袖和铁路实业家，被誉为“铁路之王”。他通过担任多个政治职务以及创建并经营瑞士东北铁路、瑞士联邦理工学院、瑞士信贷机构、瑞士人寿保险和养老基金以及圣哥达铁路公司等企业，影响了瑞士政治和经济的发展，成为19世纪瑞士最具影响力的人物之一。"
 gaudi.200.g: "他将很好为瑞士服务。"
 gaudi.200.h: "这个男人太危险了"
 gaudi.201.t: "阿尔弗雷德·埃舍尔失势"
 gaudi.201.d: "圣哥达铁路的建设使阿尔弗雷德·埃舍尔倍感压力。他的竞争对手趁机敦促他先辞去瑞士信贷银行的总裁职务，然后再放弃圣哥达铁路公司的主席之位。"
 gaudi.201.f: "埃舍尔担任的多个政治职务以及创建的企业——诸如东北铁路和信贷机构，使他拥有了非凡的权力和财富，因此他被称为“国王阿尔弗雷德一世”。这种优势也引来了批评。民主运动要求人民在政治问题上拥有更多发言权。埃舍尔周围的政治家们组成的官僚集团——“埃舍尔体系”，成为了民主派的公敌。这场斗争在传单和民众集会上展开，最终削弱了他的影响力。更糟糕的是，在19世纪70年代，他的东北铁路陷入了日益严重的财务危机，令他的处境愈发艰难。"
 gaudi.201.g: "他的倒台无法避免吗？"
 gaudi.202.t: "阿尔弗雷德·埃舍尔之死"
 gaudi.202.d: "阿尔弗雷德·埃舍尔，也许是19世纪对瑞士影响最大的人物，于今日逝世。"
 gaudi.202.f: "除了遭受人身攻击，埃舍尔还必须应对健康问题。他的整个生命中一再罹患疾病，不得不接受长期治疗以恢复健康。他易感染疾病的情况与他的沉重工作负荷不相符。在各项工作压力最大的时期，即在圣哥达隧道项目的关键阶段，埃舍尔几乎筋疲力尽。随后，他的健康状况不断反复：哮喘、发热、眼部问题和疖子等。然而，这并没有妨碍埃舍尔在可能的情况下履行他的政治和经济职责。1882年11月底，他再次病倒。1882年12月6日早上，阿尔弗雷德·埃舍尔在他的庄园“贝尔沃”去世。"
 gaudi.202.g: "他引领瑞士走向现代。"
 gaudi.211.t: "规划圣哥达铁路"
 gaudi.211.d: "我们已经开始规划圣哥达项目。除了土地测量和路线确定外，这还包括募集外国捐助并成立一家公司以确保财务支持。"
 gaudi.211.f: "1852年，联邦铁路局局长戈特利布·科勒提出了通过圣哥达山脉修建铁路线的第一个项目，并于1853年8月19日组建了第一个由九个州组成的圣哥达委员会。工程师科勒为从弗吕伦到朗根湖的路线制定了第一个方案。1861年，苏黎世工程师卡斯帕·韦特利在短短五个月内测量了从埃尔斯特费尔德到卢加诺的路线，这在今天仍被认为是勘测技术的杰作。"
 gaudi.211.g: "艰巨的任务"
 gaudi.212.t: "计划结束"
 gaudi.212.d: "圣哥达铁路的规划和准备工作已经完成。万事俱备，可以开始建设了。"
 gaudi.212.f: "在圣哥达的支持者与卢克马尼尔和施普吕根替代方案的拥护者之间进行激烈争论之后，工程师韦特利和科勒于1863年首次提出了在圣哥达山下方建造隧道的想法。总部位于苏黎世的东北铁路公司时任总裁阿尔弗雷德·埃舍尔终于支持了穿越圣哥达的最短路线。“我早已确信，在瑞士及邻国的铁路网设计中，穿越圣哥达的铁路将比穿越格劳宾登州的阿尔卑斯山口更有利于苏黎世和东北铁路的利益，”埃舍尔说。"
 gaudi.212.g: "最艰难的部分刚刚开始……"
 gaudi.213.t: "建设圣哥达铁路"
 gaudi.213.d: "在北部的格谢嫩与南部的艾罗洛附近，圣哥达山区的建设工作已经开始。圣哥达铁路公司雇用了数千名工人，其中大部分来自意大利。"
 gaudi.213.f: "短短六周投标期限内收到了七个建造圣哥达隧道的报价。最终中标的是路易·法弗尔的日内瓦公司“圣哥达大隧道企业”。他最大的竞争对手是塞维里诺·格拉托尼领导的意大利公司“意大利公共工程协会”。格拉托尼已经建造了全球最长的隧道，即12公里的蒙特西斯铁路隧道。他也曾考察过圣哥达隧道的地质情况并进行了试钻。法弗尔从未建造过超过1000米的隧道，但他的报价低于对手，接受了有风险的合同条件，并支付了800万瑞士法郎的保证金。他承诺在八年内完成建造——鉴于未知的地质情况，这是一个冒险的承诺。"
 gaudi.213.g: "能参与这一载入史册的工程，法弗尔三生有幸。"
 gaudi.214.t: "圣哥达铁路竣工！"
 gaudi.214.d: "今天是我们国家的重要日子：圣哥达铁路的竣工将欧陆南北连成一体，瑞士也成为了国际铁路交通的交汇点。"
 gaudi.214.f: "“通常我讨厌山脉，因为他们寒冷，吞噬了天空的一部分，并且阻隔了我们的视线。此时此刻我最爱的幻想是用整个北方的炸药炸毁圣哥达山以及以及整个阿尔卑斯山脉，如此我们便能呼吸到意大利的空气。” ——卡尔·施皮特勒"
 gaudi.214.g: "向你致敬，圣哥达铁路！"
 gaudi.219.t: "瑞士东部失陷！"
 gaudi.219.d: "随着瑞士东部的失陷，我们也完全失去了继续建造科隆大教堂的机会。"
 gaudi.219.f: "如果因任何原因失去了瑞士东部，建筑进度将不会全部丧失。另一个国家可以在最新的施工阶段继续建造隧道。"
 gaudi.219.g: "我们不能允许他们掌控瑞士东部太久！"
 gaudi.221.t: "来自意大利的贷款"
 gaudi.221.d: "阿尔弗雷德·埃舍尔在米兰会见了一些意大利商人，他们有意投资圣哥达铁路的建设，并与政府保持着良好的关系。"
 gaudi.221.f: "在开始修建之前，未来的圣哥达铁路公司的路网建设成本估计为1.87 亿瑞士法郎。资金的最大部分（54.55%）必须从国际资本市场筹集，意大利补贴了24.05%，德国和瑞士各占10.7%。一个由德国银行领导的融资联盟被设立起来，在资本市场上筹集1.02 亿瑞士法郎。它由德国、意大利和瑞士的一组银行组成，每组必须筹集3400万瑞士法郎。"
 gaudi.221.g: "感谢所有帮助。"
 gaudi.221.h: "我们不需要外国人的帮助。"
 gaudi.222.t: "来自德国的贷款"
 gaudi.222.d: "阿尔弗雷德·埃舍尔与多位德国商人会面，他们希望投资圣哥达铁路的建设并与政府保持良好关系。"
 gaudi.222.f: "在开始修建之前，未来的圣哥达铁路公司的路网建设成本估计为1.87 亿瑞士法郎。资金的最大部分（54.55%）必须从国际资本市场筹集，意大利补贴了24.05%，德国和瑞士各占10.7%。一个由德国银行领导的融资联盟被设立起来，在资本市场上筹集1.02 亿瑞士法郎。它由德国、意大利和瑞士的一组银行组成，每组必须筹集3400万瑞士法郎。"
 gaudi.223.t: "圣哥达铁路公司"
 gaudi.223.d: "通过成立圣哥达铁路公司（Gotthardbahn‑Gesellschaft），这个宏伟的项目向最终实现迈出了重要的一步。"
 gaudi.223.f: "圣哥达铁路公司是一家股份有限公司，成立于卢塞恩，旨在建造和运营圣哥达铁路。在成立圣哥达铁路公司之前，关于圣哥达铁路的政治决策和谈判以及早期建设的管理主要由苏黎世政府委员会前主席、后来三次担任国民院议长的阿尔弗雷德·埃舍尔博士决策。瑞士国家与各州，以及1869年起的意大利和北德意志邦联及其法定继承者德意志帝国几乎提供了全部资金支持后，圣哥达铁路公司从圣哥达协会中成立，后者将其权利转让给了圣哥达铁路公司。阿尔弗雷德·埃舍尔成为了公司的总裁，约瑟夫·齐格则成为了公司的副总裁。随后，该公司着手实际建造圣哥达铁路。"
 gaudi.231.t: "隧道透水"
 gaudi.231.d: "圣哥达隧道内的透水威胁到工程进度和工人的生命安全。"
 gaudi.231.f: "圣哥达山岭中的不同岩层反复引起问题。有时沙质基础与难以穿透的岩石交替出现，而在罕见但更加危险的情况下，水或岩浆渗入隧道，这对一些工人来说是致命的。"
 gaudi.231.g: "尽一切努力封堵，安全第一。"
 gaudi.231.h: "支付工人额外的加班费来修补裂缝，但要小心。"
 gaudi.231.i: "不计代价把洞堵住然后继续工作——不管牺牲多少人！"
 gaudi.232.t: "高架桥应力测试"
 gaudi.232.d: "建筑管理团队不确定我们对众多高架桥进行的诸多应力测试是否真的必要，因为测试需要消耗大量材料和时间。"
 gaudi.232.f: "圣哥达铁路格外紧迫施工时间的无法令所有的项目都得到同等的关注。例如，一些工程师认为对于我们的一座高架桥进行多次应力测试是不必要的，因为其结构足够强大。然而，部分顾问坚持不要过早停止测试，一旦发生损毁，可能会使工作进度倒退数月并玷污我们的声誉。"
 gaudi.232.g: "我们需要再进行一次额外测试。"
 gaudi.232.h: "我毫不担心高架桥会不稳定。"
 gaudi.233.t: "高架桥倒塌！"
 gaudi.233.d: "我们的一座高架桥今天倒塌了。很显然它并不像我们预想的那样安全。"
 gaudi.233.f: "你怎么敢如此破坏瑞士精密细致的声誉？"
 gaudi.233.g: "我刚刚才说了应该进行应力测试！"
 gaudi.234.t: "更多工人假期"
 gaudi.234.d: "圣哥达隧道的工人发觉他们的班时过长，休假过短。"
 gaudi.234.f: "除了圣哥达隧道中危险的工作外，极差的空气流通也引起了问题。隧道内部的温度也升高到了33度以上（在罕见的情况下则达到40度）。尽管如此，工人们仍然不得不每天超过8个小时地进行辛苦而汗流浃背的工作。"
 gaudi.234.g: "休假？呸！这些意大利懒鬼根本不知道什么是工作！"
 gaudi.234.h: "一点假期，不能再多了。"
 gaudi.234.i: "发放奖金代替休假。"
 gaudi.234.j: "他们应该得到常规休假。"
 gaudi.235.t: "地下眩晕"
 gaudi.235.d: "圣哥达隧道内的空气质量过差，一些工人感到眩晕甚至晕倒。"
 gaudi.235.f: "圣哥达隧道内的空气质量达到了令人担忧的低水平。挖掘机和机器所激起的灰尘对此有一定影响，但是炸药才是主要原因。往往在爆炸烟雾还未完全散去之前，工人们被迫回到了隧道内。我们的一位监察员曾试图督促懒惰的工人回到工作岗位，但却在进入隧道的途中不幸遭受了心血管问题。"
 gaudi.235.g: "真是不幸。继续工作！"
 gaudi.235.h: "进一步激励工人冒生命危险……"
 gaudi.235.i: "推行更短的轮班时间。"
 gaudi.236.t: "天价"
 gaudi.236.d: "我们对食物、衣服和其他必需品的定价政策受到了圣哥达隧道工作人员的严厉批评。"
 gaudi.236.f: "格谢嫩最多有1645名工人同时工作，艾罗洛则最多有1302名，其中大多数是来自皮埃蒙特和伦巴第贫困乡村地区的意大利人。矿工和劳工住在肮脏和拥挤的小屋中，并被经济剥削。一个矿工在8小时的工作时间内赚取约3.90瑞士法郎的工资。其中三分之二的工资被扣除用于食物和住宿、矿工灯和油——每天30生丁 ——必须由自己支付。他们还每月扣除五瑞郎的服装费和两瑞郎的瑞士居留许可费。部分收入以代金券的形式支付，只能在公司自营的商店中兑换。"
 gaudi.236.g: "没人被强迫工作。想走可以走！"
 gaudi.236.h: "剥削工人并用他们自己的钱来支付加班费——真是绝妙的主意！"
 gaudi.236.i: "禁止不道德的商业行为！"
 gaudi.237.t: "肮脏棚屋"
 gaudi.237.d: "圣哥达隧道工人营房的悲惨状况已经恶化到了令铁路建设管理层十分忧虑的程度，他们担心一场暴动可能即将爆发。"
 gaudi.237.f: "“我发现格谢嫩的情况没什么变化；法弗尔的公寓还算令人满意，但数量相当不足；市民的私人公寓有好的，有差强人意的，也有糟糕的；那些投机者建造并出租的工人营房像以前一样丑闻不断，尤其是邮局旁边的大房子，住着240个人；那里的铸件从外墙上掉下来，堆在走廊和角落里；房间和家具上有污垢，窗户紧紧关闭，空气恶劣，实际上比大多数有门和通风口的猪圈还要糟糕。水管建造的很认真，但在这样的条件下整个冬天都被冻裂，一直没有供水，虽然已经几周没有结冰了，但仍然不能使用。”"
 gaudi.237.g: "各有所好。"
 gaudi.237.h: "如果他们不喜欢在屋里呆着，就该多工作。"
 gaudi.237.i: "这种不堪入目的条件应该立即在我们这样的文明国家中被废除！"
 gaudi.238.t: "活埋"
 gaudi.238.d: "圣哥达隧道内发生了一起严重事故，几位工人被埋在了瓦砾下。他们生还的希望仍然未知。"
 gaudi.238.f: "在建造圣哥达隧道的工程中，共有199名工人死亡。联邦档案馆的事故名单中提到的171人中，有53人被货车或机车压死，49人被石头击中，46人被炸药炸死。另外23人死于其他原因，其中一人溺水身亡。根据官方声明，罪魁祸首要么是偶然事件，要么是死者本身的原因。还有许多其他工人在随后的几年中死于营养不良、疾病和建造过程中受到的伤害。"
 gaudi.238.g: "不幸的是，这就是这份工作的风险。继续挖掘！"
 gaudi.238.h: "我们帮不了他们。在未来推行更好的规章制度。"
 gaudi.238.i: "尽全力搜救这些可怜的灵魂！"
 gaudi.239.t: "隧道里的新机器"
 gaudi.239.d: "引入新技术显著加速了修建圣哥达隧道的进展。"
 gaudi.239.f: "承包商路易·法弗尔从塞尼山口隧道接手了第一批索梅耶式钻探机。为此，他在现场测试了最重要的冲击钻。艾罗洛和格谢嫩的两个车间主管进一步改进了现有的机器以使其免于频繁维修，并为冲击钻配备了自动驱动装置。车间主管塞金和费鲁克斯取得了重大进展：开始时，每天需要更换三台机器，到建设结束时每三天只需要更换一台机器。同时，气动凿岩机的排出的废气可以为隧道提供些许通风。六台钻探机被安装在车架上。这些机器钻出约一米深的孔，然后用炸药填充并爆破。"
 gaudi.239.g: "为进步欢呼！"
 gaudi.240.t: "工会批评圣哥达工程"
 gaudi.240.d: "今天，一位工会领袖在议会上对建造圣哥达隧道的可怕条件悲叹不已。"
 gaudi.240.f: "“每天都在漏水，工作环境像高炉里一样炎热，悲惨的居住条件，过高的物价，以及不到4瑞郎的微薄工资！在我们国家，许多狗的生活条件都比那些为铁路公司冒生命危险的工人们要好得多，甚至有些工人，一旦碰上倒霉的日子就可能会被一堆炸药炸得粉身碎骨。我原本以为地主们已经不再像对待牲畜一样驱使农民了，但是在格谢嫩和艾罗洛发生的事情看起来比这更加糟糕！如果当务之急得不到改变，我保证，事态将会升级！”"
 gaudi.240.g: "这家伙知道工程的重要性吗？"
 gaudi.240.h: "必须进行改革。"
 gaudi.241.t: "埃舍尔捐款"
 gaudi.241.d: "阿尔弗雷德·埃舍尔将圣哥达铁路的建设视为己任，用他的股权加速铁路线的建设。"
 gaudi.241.f: "埃舍尔不仅从自始至终参与了圣哥达项目，还亲自为此做出了牺牲，且不仅在经济方面：有人认为他为了圣哥达铁路劳累而死。"
 gaudi.241.g: "谢谢你，埃舍尔先生。"
 gaudi.242.t: "多孔岩石"
 gaudi.242.d: "一种出奇松软的岩石使圣哥达隧道的工作进展比预期更加顺利。"
 gaudi.242.f: "圣哥达隧道建设中出现的许多难以预料的问题不仅会造成负面的后果，也时常产生积极的惊喜。"
 gaudi.242.g: "太棒了！"
 gaudi.243.t: "坚固岩石"
 gaudi.243.d: "一种十分坚硬的岩石意味着圣哥达隧道的进展要比预想中更加缓慢。"
 gaudi.243.f: "不断变化的岩石令工地管理层反复面临问题。当建设开始时，工程师们几乎没有为圣哥达山区的岩层做任何准备。随着时间的推移，这些讨厌的惊喜才能够被避免。首席工程师罗伯特·格维格委托德国采矿工程师弗里德里希·莫里茨·斯塔普夫进行所有必要的地质调查。他起初被派到艾罗洛建设部门，后来成为艾罗洛建设管理中心的地质和采矿部门负责人。斯塔普夫的任务包括更新现有的地质图，观察地质条件，如温度条件、水的渗入和岩石状况，以避免施工延误。斯塔普夫记录了隧道轴线上的所有岩石形态，并为每种岩石形态收集了样本。"
 gaudi.243.g: "好事多磨。"
 gaudi.243.h: "工人必须加班！"
 gaudi.243.i: "召集大学里的专家探索长期解决方案。"
 gaudi.244.t: "壮观的爆炸"
 gaudi.244.d: "我们的一家国营炸药工厂成为了圣哥达隧道建设的永久供应商，该项目和公司从中获得了同等好处。"
 gaudi.244.f: "建设工程对爆炸物的需求十分巨大，以至于在卢塞恩湖畔专门为隧道建设了一座独立的炸药工厂。"
 gaudi.244.g: "但已经检验过安全性了，对吧？"
 gaudi.245.t: "工人涌入"
 gaudi.245.d: "越来越多的人涌向瑞士东部，寻求参与修建圣哥达铁路的工作。"
 gaudi.245.f: "圣哥达铁路的建造在接近十年时间里吸引了超过5000人前来工作。"
 gaudi.245.g: "人手一般铲子，我们需要每一双手。"
 gaudi.245.h: "他们应该定居的久一点。"
 gaudi.246.t: "新的外国投资者"
 gaudi.246.d: "阿尔弗雷德·埃舍尔成功吸引了另一位富有的外国投资者以为圣哥达项目筹集新资本。"
 gaudi.246.f: "数年间，埃舍尔一再动用自己的关系在圣哥达隧道面临经济状况时募集资金已完成耗资巨大的建设——这正是燃眉之急。"
 gaudi.246.g: "我们像沙漠中的旅行者一样干渴！"
 gaudi.246.h: "不了，谢谢。"
 gaudi.247.t: "罢工！"
 gaudi.247.d: "天大的坏消息！圣哥达铁路的工人离开了工作岗位，他们要求在复工之前获得更好的薪酬、住房、食品和服装！"
 gaudi.247.f: "在建造哥特哈德隧道期间，格谢嫩的人口增加了数倍。建筑工人生活在艰苦的条件下。意大利隧道工人了举行罢工，要求更高的工资，并在镇上里引起了骚动。导火索是一个邮政局长和矿工之间的争端，矿工拒绝继续钻探，直到爆炸的烟雾消散。随后爆发了一场口水战，直到矿工愤怒地离开工地。在出口的路上，有一箱炸药着火的谣言传出。这使得其余的隧道工人也跑到外面。工人们前往村庄，在市长和邮递员居住的邮局前停下，他们宣泄了自己的愤怒。在那里路易吉·迪苏纳提出了要求，而工人鼓掌表示支持：每天多给一法郎工资，提供良好的通风和更好的安全规章。威胁说，除非完全实现这一点，没有更多的矿工会进入隧道，他们在隧道入口前扎营，以便在晚上10点的换班时不允许矿工进入隧道。"
 gaudi.247.g: "呼叫警卫。"
 gaudi.247.h: "对他们的要求让步。"
 gaudi.248.t: "瑞士的悲伤之日"
 gaudi.248.d: "我们的警卫队面对工人起义采取了相当残酷的手段。多名工人被杀害。我们的国际声誉因此受损。"
 gaudi.248.f: "第一枪是由谁开的，以及为什么开枪，目前还不清楚。没有下令开枪。枪击事件的确切过程也不清楚。之后，示威者散去。其中四人死亡，数人受伤。根据不同的消息来源，有两人或三人当场死亡，另一个在一天后因伤势过重去世，根据调查报告，第四个人在几天后去世。该事件通过控诉性的新闻报道远远超出了瑞士范围，传遍了整个欧洲。尤其当涉及到参与警察部队组建的背景时质疑声浪更加强烈。"
 gaudi.248.g: "是他们先开始的！"
 gaudi.249.t: "贯通"
 gaudi.249.d: "经过多年的艰苦努力，建筑工人们在圣哥达山体中心相遇，只有极小的位移。"
 gaudi.249.f: "七年零五个月的施工后，在南北两端挖掘隧道的队伍终于相遇。水平偏差仅有33厘米，垂直偏差则是5厘米——这在当时是一项工程和测量技术的杰作。欧洲媒体欢庆了这一事件，而隧道以其15公里的长度名列世界最长隧道之首。当时苏黎世的《信使》（Landbote）报写道：“可以说，今日整个欧洲的媒体都向圣哥达工程致敬，表达了真挚的赞赏之情。”"
 gaudi.249.g: "香槟！"
 gaudi.301.t: "救世基督像建造开始"
 gaudi.301.d: "在科尔科瓦多山上建造第一座脚手架和钢铁结构标志着基督像开始建造。"
 gaudi.301.f: "救世基督像是全世界最大的装饰风艺术风格雕像。其面部由雕塑家格奥尔基·莱奥尼达创作，他于1893年出生在罗马尼亚的加拉茨。莱奥尼达在布加勒斯特美术学院学习雕塑，之后在意大利学习三年，获得了雷维尔雕塑奖。作为法国著名的肖像雕塑家，他被保罗·多夫斯基聘为救世基督像团队的创始成员。格奥尔基·莱奥尼达对基督耶稣的面部的雕刻令他声名鹊起。一群工程师和技术人员研究了兰多斯基的设计方案，并决定采用阿尔伯特·卡科特设计的钢筋混凝土而非钢铁来建造结构，这对于一座十字式雕像来说更为合适。外层使用的是皂石，因为它耐用且易得。这座雕像花费了九年时间建造，耗资相当于25万美元（2014年价值330万美元）。"
 gaudi.301.g: "我们国家的一大步，"
 gaudi.302.t: "科尔科瓦多山上的基督"
 gaudi.302.d: "经过多年的建设工作，装饰风艺术建筑的典范：基督像，今天终于竣工并成为巴西的新象征之一！"
 gaudi.302.f: "在揭幕仪式上，这座雕像被一组泛光灯照亮，灯光原定由短波无线电先驱古列尔莫·马可尼远在9200公里之外的意大利罗马触发，但由于恶劣的天气，灯光最终在现场开启。揭幕典礼上还举行了弥撒。从1931年到1981年，救世基督像是世界上最高的基督像。"
 gaudi.302.g: "愿他保佑国家与城市。"
 gaudi.309.t: "里约失陷"
 gaudi.309.d: "随着里约热内卢的失陷，我们也完全失去了继续建造救世基督像的机会。"
 gaudi.309.f: "如果失去了里约热内卢，我们必须在重夺这一地区后重新开始建设。只有主流文化为巴西的国家可以建造救世基督像。"
 gaudi.309.g: "我们不能允许他们掌控里约热内卢太久！"
 gaudi.311.t: "进展良好"
 gaudi.311.d: "救世基督像的施工进展出乎意料，预计将比时间表提前数个月。"
 gaudi.311.f: "现代技术，高效工作，完美无缺的材料供应与好天气都有助于建设进度。"
 gaudi.311.g: "让今天变得美好的消息。"
 gaudi.312.t: "为救世基督像捐款"
 gaudi.312.d: "作为一名优秀的基督徒，[SCOPE.sCharacter('gaudi_cristo_donator').GetFullName]对救世基督像颇有兴趣，因此以个人名义为雕像的施工捐助了一笔款项。"
 gaudi.312.f: "兴建基督像的提议在实现之前已经流传了几十年，特别在虔诚的天主教圈子中引起了重大关注。当该项目最终得以实施时，许多捐助者都给予了支持。"
 gaudi.312.g: "我们欠他的。"
 gaudi.313.t: "教士欢迎建造工程"
 gaudi.313.d: "巴西的教士们准备竭尽全力完成里约热内卢的救世基督像。反教权力量担心我们的政府会受到教会的过多影响。"
 gaudi.313.f: "由于资金问题，救世基督像的建造延宕了近十年，在里约热内卢总主教区、教廷与法国的支持下才最终举行了揭幕仪式。"
 gaudi.313.g: "我们应当从中受益。"
 gaudi.313.h: "公开褒扬教会。"
 gaudi.313.i: "此事与教会无关！"
 gaudi.314.t: "工会批评救世基督像"
 gaudi.314.d: "作为工会代表，[SCOPE.sCharacter('trade_unions_leader').GetFullName]向政府递交请愿书，要求重新考虑对救世基督像的争议性支持。"
 gaudi.314.f: "巴西的工会领袖认为目前建造基督像是极其浪费钱财的行为。如果他们不能阻止建造并将资金用于更有意义的慈善渠道，他们至少要求对在危险高度工作并不断运送大量材料上山的建筑工人提供更好的待遇和与充分的关注。"
 gaudi.314.g: "无视他们。"
 gaudi.314.h: "做做表面文章。"
 gaudi.314.i: "拨款提升工人的条件。"
 gaudi.315.t: "交通问题"
 gaudi.315.d: "科尔科瓦多山确实是建造一览无遗的地标的理想地点，但它也有后勤上的劣势。"
 gaudi.315.f: "科尔科瓦多山位于里约热内卢都会区，高710米，其名在葡萄牙语中意为“驼峰”，一侧近乎垂直陡峭。虽然在19世纪末铁路线打通了山路，但是由于通往山顶的道路蜿蜒狭窄，运输较大的构件被证明比最初预想的更加困难。"
 gaudi.315.g: "我只听到抱怨！"
 gaudi.316.t: "事故"
 gaudi.316.d: "今天在基督像的建造现场发生了一起事故，导致施工推迟了几周。"
 gaudi.316.f: "尽管高度客观，但兴建基督像的危险程度比许多摩天大楼的建造要小。然而，事故仍然无法避免。甚至工地经理埃托尔·莱维险些从脚手架上坠落。莱维在最后一刻被建筑工人救下，并将这一奇迹归功于耶稣基督的干预。由于这次死里逃生的经历，这位本地犹太人后来皈依了天主教。"
 gaudi.316.g: "一个预兆？"
 gaudi.317.t: "风暴"
 gaudi.317.d: "暴风雨中，闪电击中了救世基督像，摧毁了它的一部分。"
 gaudi.317.f: "雷雨问题持续困扰着施工方，甚至在雕像建成后也是如此。雷击多次摧毁了部分皂石，甚至一些更大的部件，比如手指。"
 gaudi.317.g: "一场不幸的意外"
 gaudi.317.h: "修补受损部位。"
 gaudi.317.i: "我们们需要更多避雷针。"
 gaudi.317.j: "修补受损部位并建造新的避雷针。"
 gaudi.318.t: "赞美"
 gaudi.318.d: "来自[SCOPE.sCountry('gaudi_cristo_neighbour').GetName]的一位议员今日访问里约热内卢，并表达了基督像正在日渐成型表示喜悦。"
 gaudi.318.f: "基督像已经成为巴西的国家象征，并且超过了拉丁美洲的其他所有标志性建筑。"
 gaudi.318.g: "谢谢你。"
 gaudi.318.h: "让他在本国为我们的工程募集支持。"
 gaudi.319.t: "无神论干涉"
 gaudi.319.d: "在一次公开演讲上，[SCOPE.sCharacter('gaudi_cristo_atheist').GetFullName]指责基督像的建设是向中世纪倒退，呼吁感同身受者谴责对钱财的浪费。"
 gaudi.319.f: "“如果上帝想要自己的雕像，为什么他不说呢？如果他需要，为什么不自己建呢？巴西是一个现代国家，她不需要神灵，不需要国王，只需要人。难道人类配不上自己挥洒的汗水吗？我不相信上帝，不相信天空中的隐形人。我们为什么要崇拜一面旗帜或一位上帝，而不是崇拜我们内心最好的东西：我们伟大的意志？”"
 gaudi.319.g: "我们不要过分挑战这群人。"
 gaudi.319.h: "神的旨意！"
 gaudi.319.i: "装饰风艺术与这种话。我对这家伙有很不好的预感。"
 gaudi.320.t: "旅游投资"
 gaudi.320.d: "旅游业者认为基督像是一个积极因素，并希望支持这个项目。"
 gaudi.320.f: "救世基督像建造期间正值里约热内卢成为时尚旅游目的地的时期，这得益于空中交通的网络化，沙滩和活跃的文化场景。因此，科尔科瓦多山上的现代雕像也成为新兴旅游业的象征和受欢迎的新景点。"
 gaudi.320.g: "沙滩、阳光、酒店与救世基督像！"
 gaudi.401.t: "安托内利尖塔复工"
 gaudi.401.d: "在都灵市与犹太社区完成最后一轮谈判后，安托内利尖塔的建设工作今天又开始了。"
 gaudi.401.f: "最初，都灵的犹太社区想在撒丁‑皮埃蒙特王国的前首都获得引人注目的地位。新的犹太会堂的设计旨在展示该城市的犹太公民的存在、进步和融合。得到委托的建筑师亚历山德罗·安托内利将负责此项工作。然而，安托内利也因他的不断扩大规模的巨大建筑物而闻名。例如，在皮埃蒙特的卡斯特拉蒙特镇，安托内利计划建造一座大教堂以与罗马的圣彼得大教堂相媲美；但由于缺乏资金，这个庞大的项目仍然没有完成。现在，相似的命运威胁着犹太社区的新犹太教堂，它日渐高耸入云，但却可能成为犹太社区的经济灾难。都灵市政府买下了这座建筑，并以新土地和数年内建成的另一座犹太会堂作为补偿。而“Mole”，也即会堂的原址，应成为意大利的一个国家象征。"
 gaudi.401.g: "希望安托内利不要再改方案了……"
 gaudi.402.t: "安托内利尖塔：第一阶段完成"
 gaudi.402.d: "安托内利尖塔的基本结构已经完成。但是，安托内利对于屋顶和尖塔又有了新的古怪想法。"
 gaudi.402.f: "最初，安托内利尖塔的穹顶的设计平平无奇。然而，安东内利不断增加它的体积和高度，直到最终呈现出今日为人所知的特殊形态。这也意味着其顶部的建造需要更多时间完成。"
 gaudi.402.g: "这家伙永远不知满足吗？"
 gaudi.403.t: "与安托内利直冲云霄"
 gaudi.403.d: "安托内利尖塔的最终建造阶段已经开始。"
 gaudi.403.f: "按照最初的计划，安托内利决定用类似尖顶的结构完成安托内利尖塔，其顶部设有新哥特式与新古典主义折衷的柱廊，这参照了他之前的作品诺瓦拉圣高登扎奥大殿尖顶的设计。但90米处开始，他打破了基于正方形的建筑主题，设计了一个花岗岩柱廊，带有一个称为“灯笼”的圆形底座，放置在一个截锥形底座上。同样，建筑师还构思了一个大约50米高的尖顶，具有八角形截面，并穿插着十个圆形露台，前两个仍有柱廊，然后逐渐变小，可以通过一个小的锯齿形梯子进入。"
 gaudi.403.g: "我希望这只是收尾与装饰工作……"
 gaudi.404.t: "安托内利尖塔竣工"
 gaudi.404.d: "今天，随着灯塔安装到位，建筑工程在庆典中完成了。都灵和意大利从此拥有了一座地标建筑！"
 gaudi.404.f: "安托内利为尖塔工程鞠躬尽瘁直至他世。他曾经使用滑轮操作的原始升降机亲自检查工程进展，爬到了几十米高的位置，这一幕成为了传奇。在安托内利去世几个月后，他建议在尖塔上安装的一尊描绘“翼神”的雕像被委托给了雕塑家福马加利。这尊由凸起镀金铜制成的“翼神”高约5.46米，重约300公斤，手持一支长矛和一枝棕榈树枝。完成雕像后，建筑总高度达到了167.35米，成为当时欧洲与全世界最高的砖石建筑。安托内利尖塔与巴黎的埃菲尔铁塔展开了直接“竞争”，后者的落成仅早了十天并成为了当时世界上最高的建筑，直到1930年才被超越。"
 gaudi.404.g: "都灵万岁，意大利万岁！"
 gaudi.409.t: "都灵失陷"
 gaudi.409.d: "随着皮埃蒙特的失陷，我们也完全失去了继续建造安托内利尖塔的机会。"
 gaudi.409.f: "如果因任何原因失去了皮埃蒙特地区，建筑进度将不会全部丧失。只有意大利可以在最新的施工阶段继续建造安托内利尖塔。然而，外来入侵者不会对继续建造表现出兴趣。"
 gaudi.409.g: "我们不能允许他们掌控都灵太久！"
 gaudi.411.t: "劣质砖块"
 gaudi.411.d: "最近运抵安托内利尖塔的一批建筑材料被发现质量低劣。"
 gaudi.411.f: "在都灵的建筑工地上，安托内利尖塔每天都在不断增高，但某一刻，建造突然停顿了下来。安托内利进行了一次简短的清点，发现砖块的质量并不像平常那样可靠，他宣布自己宁愿等待也不愿令这些砖块危及他的杰作。然而，管理层中有些人认为这些砖块仍然应该使用——不仅因为施工可能会被延误，还因为他们担心安托内利会利用这段时间再次更改计划……"
 gaudi.412.t: "灾难！"
 gaudi.412.d: "劣质材料终于出了问题：今天早上，安托内利尖塔的一部分倒塌并造成了相当严重的损害。"
 gaudi.412.f: "或许我们应该听从安托内利的建议，使用劣质砖块来建造如此重要的奇观并不是一个好主意。当时应该再三考虑再下决定。但为时已晚——劣质材料今天造成了后果，一堵墙倒塌，摧毁了过去几周甚至几个月的建设进展。"
 gaudi.413.t: "都灵的考古调查"
 gaudi.413.d: "访问都灵后，[SCOPE.sCharacter('gaudi_archaeologist').GetFullName]发现安托内利尖塔建立在罗马遗迹之上。他申请发掘许可。"
 gaudi.413.f: "公元前一世纪，罗马人建立了奥古斯塔·陶里诺卢姆（Augusta Taurinorum）。现代的加里波第大道沿着罗马城市的横贯大街直抵到 Decumani 城门，后来并入了城堡（Castello）或夫人宫（Palazzo Madama）。帕拉蒂纳城门（Porta Palatina）位于当前市中心的北侧，仍保存在教堂附近的公园中而罗马时期剧院的遗迹保存在 Manica Nuova 区域。"
 gaudi.414.t: "新机器"
 gaudi.414.d: "我国汽车工业最近为安托内利尖塔的建筑工地配备了一台高度现代化的机器，加快了工程进度。"
 gaudi.414.f: "安托内利尖塔作为当时最大的砖石结构建筑之一而闻名，从许多方面来看，它遵循了传统而非进步的建筑理论。但是即使没有使用钢结构或水泥，也并不排除在建造中使用其他机械设备的可能性。都灵是米兰、热那亚并称的意大利主要工业地区之一，因此，如果安托内利大师下令，就可以交付使工作更加轻松的机器。"
 gaudi.415.t: "公民捐赠"
 gaudi.415.d: "怀有爱国主义思想的小市民在领袖[SCOPE.sCharacter('pb_leader').GetPrimaryRoleTitle][SCOPE.sCharacter('pb_leader').GetFullName]组织下为安托内利尖塔的建设捐款。"
 gaudi.415.f: "自从被市政当局接管以来，安托内利尖塔不仅成为了新兴工业城市都灵的象征，而且更成为了现代性和意大利民族精神的象征。对于爱国的中产阶级来说，这座建筑是新国家认同的象征。建成后，建筑将成为“复兴运动博物馆”的馆舍。因此，意大利民族主义者对快速完成这座建筑非常感兴趣。"
 gaudi.415.g: "我们应当心怀感激。"
 gaudi.416.t: "安托内利的新点子……"
 gaudi.416.d: "亚历山德罗·安托内利，这座纪念碑因其得名的建筑师，最近提出了一个令施工管理方震惊的变动……"
 gaudi.416.f: "仅仅把亚历山德罗·安托内利称为一个古怪的建筑师未免过于太轻描淡写了。规划一座130米高的建筑，然后因为自己对完美的要求而坚持认为不低于160米的高度有损于建筑师的尊严，对他而言是一件非常自然的事情。在皮埃蒙特大区按照罗马圣彼得教堂的尺寸规划一座教堂建筑也是理所当然的事。而且，他相当多的建筑因为不符合亚历山德罗·安托内利的要求而从未完成——这当然不是自大的表现。尽管如此，他还是有了一个新的想法，那就是再次延长安托内利尖塔的建造时间……"
 gaudi.416.g: "妈妈咪呀！"
 gaudi.416.h: "我的天啊！"
 gaudi.416.i: "见鬼！"
 gaudi.416.j: "不！"
 gaudi.417.t: "安托内利尖塔拔地而起"
 gaudi.417.d: "安托内利尖塔的建设进展比预期更快，但原因不明。"
 gaudi.417.f: "出于未知原因，宏伟的安托内利尖塔的建造正在取得进展。也许是天气好的缘故，或是向圣母祈祷的结果，或是我们丢弃了几天前使用的相当劣质的建筑材料——我们希望这些材料永远不要被发现。有一件事是确定的：这座经历了各种各样延误的巨兽，应该会比预期更快地建成——如果安托内利没有利用这个机会来提出一个新的扩建计划的话……"
 gaudi.418.t: "坠落的横梁摧毁砖墙"
 gaudi.418.d: "一根掉落的支撑梁今天造成了安托内利尖塔相当程度受损，使工程进度受到了影响。"
 gaudi.418.f: "支撑梁撑不住了。"
 gaudi.418.g: "形势恶化。"
 gaudi.419.t: "君主造访"
 gaudi.419.d: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle][SCOPE.sCharacter('gaudi_ruler').GetFullName]决定亲自访问安托内利尖塔的施工现场。"
 gaudi.419.f: "我们的君主[SCOPE.sCharacter('gaudi_ruler').GetFullName]此前已经对都灵工地上发生的事情表现出极大的兴趣，现在打算前往现场参观。准备工作正在全力进行中——当然要给陛下看些特别的东西！因此，在消息公布之后，普通的建筑工人、管理方和安托内利本人达到了前所未有的速度。"
 gaudi.419.g: "陛下知道如何动员。"
 gaudi.420.t: "建筑工地事故"
 gaudi.420.d: "今天发生了一起事故，导致几名工人受伤。安托内利尖塔的建筑管理部门认为如果不修复损坏并招募替代人员将会出现重大延误。"
 gaudi.420.f: "今天在都灵发生了一起事故，有几人受伤，其中一些伤势严重，必须送往医院。受伤者中包括在建筑工程中扮演关键角色的经验丰富的技工。如果没有他们，建筑工程可能会被延迟直到康复。"
 gaudi.420.g: "发生意外。"
 gaudi.420.h: "我们需要竭尽全力确保建设进度不受影响。"
 gaudi.421.t: "罢工威胁"
 gaudi.421.d: "如果我们不就更高的报酬展开谈判，安托内利尖塔的工人即将宣布罢工。"
 gaudi.421.f: "啊，罢工的美妙世界！如果你没有在意大利经历过因铁路工会突然决定搞点破坏而被困在火车站的感觉，那你一定错过了很多。今天只影响了一个建筑工地。我们真的很幸运！"
 gaudi.421.g: "我们绝不谈判。"
 gaudi.421.h: "雇佣一些工贼就能了事。"
 gaudi.421.i: "呼叫卡宾枪骑兵！"
 gaudi.421.j: "谈判。"
 gaudi.422.t: "风暴摧毁塔尖"
 gaudi.422.d: "一场雷暴演变成了类似龙卷风的天气现象，今晚撕下了安托内利尖塔的尖顶！"
 gaudi.422.f: "一场猛烈的风暴，可能是龙卷风，导致塔顶47米的尖顶破裂并坠落到一个小花园里。尖顶擦过顶层房间的窗户，摧毁了露台的一部分，但无人伤亡。1953年5月23日，尖塔也遭遇了类似的命运。这座带有破损尖顶的尖塔可以在1955年米开朗基罗·安东尼奥尼执导的电影《朋友们》片头的末尾看到。由于尖顶重建时没有使用砖，而是改用钢筋混凝土，欧洲最高砖石建筑的头衔传给了德国乌尔姆大教堂的钟楼（161.53米），而费城市政厅则成为了世界上最高的砖石建筑（162.53米）。"
 gaudi.422.g: "一场灾难！"
 gaudi.423.t: "尼采称赞尖塔"
 gaudi.423.d: "著名的德国哲学家弗里德里希·尼采在19世纪70年代和80年代大部分时间都在都灵度过，他非常敬佩这座城市，并称赞安托内利尖塔是他的时代最伟大的建筑之一。"
 gaudi.423.f: "“我经过了安托内利尖塔，这可能是为了绝对向上的冲动而建造的最巧妙的建筑——它只能让我想到查拉图斯特拉。我把它命名为“Ecce Homo”，并在我的心灵中辟出一片广阔的自由空间环绕着它。” ——弗里德里希·尼采"
 gaudi.423.g: "这个人有品位，不只是在写”赤色晨曦“时。"
 gaudi.424.t: "“意大利”号气球"
 gaudi.424.d: "安托内利尖塔的施工可以通过一项特别举措进行融资，并吸引更多兴趣。"
 gaudi.424.f: "市政府计划，安托内利尖塔的完工应该与一个大型展览的时间相吻合。游客应该近距离观察安托内利尖塔。该建筑没有按时建成，但为了弥补这一点，人们仍然可以乘坐气球观看建设进度，费用为5里拉。气球本身被命名为“伊塔洛”。"
 gaudi.424.g: "一个观光气球听起来是个好主意。"
 gaudi.424.h: "简直是在浪费钱"
 gaudi.425.t: "意大利遭到雷击"
 gaudi.425.d: "安托内利尖塔的观光气球在一次暴风雨被摧毁了！"
 gaudi.425.f: "1884年4月27日，“伊塔洛 ”气球被雷电击中，坠落在地面上幸运的是没有人死亡或受伤，在建造安托内利尖塔的过程中，它已经成为上层社会的一种不错的消遣，只需支付少量的游览费就可以观光。"
 gaudi.425.g: "建造一个新的观光气球。"
 gaudi.425.h: "这些气球之旅太危险了。"
 gaudi.501.t: "环城大道建设开始"
 gaudi.501.d: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle][SCOPE.sCharacter('gaudi_ruler').GetFullName]于今日签署法令，开始了环路的建设。"
 gaudi.501.f: "“我决定尽快扩建维也纳内城，并将其与郊区连接，以改善我的居所和帝都的规划和美观。为此，我授权拆除内城的城墙和防御工事，以及其周围的护城河。通过拆除城墙和护城河所得到的空地，如果没有预留为拟定的基本规划而另行确定，则应用作建筑用地，并将从中获得的收益用于建筑基金。这个基金将用于支付由这一举措引起的国家财政支出，特别是公共建筑的建设成本以及必要的军事机构的迁移成本。” ——弗朗茨·约瑟夫一世"
 gaudi.501.g: "维也纳将成为第一流的大都会"
 gaudi.502.t: "环城大道的开通典礼"
 gaudi.502.d: "今天环城大道举行了开通仪式。但只是大道本身——维也纳的伟大仍然不及伦敦和巴黎。"
 gaudi.502.f: "“皇帝陛下慷慨的决定使奥地利的首都维也纳拥有了一份最美丽的圣诞礼物，这是一份给您的全体忠实臣民的礼物——拆除城墙并扩建城市，因为维也纳应该成为欧洲最美丽也最健康的城市之一。大部分任务已经完成，压抑的帷幕已经消失，一条遍布美丽宫殿和住宅的街道已经建成，花园和公园已经已经建成，它们装点了皇宫，并为居民提供了休息场所。期待已久的下水道，保障了城市的清洁和居民的健康，将为城市扩建的伟大工程画上句号，作为其奠基者，陛下应当蒙受子孙后代的无尽感激。请陛下允许我代表维也纳市代表团表达最为诚挚的谢意，我们有幸能够在今天开通环城大道。” ——安德烈亚斯·泽林卡，维也纳市长"
 gaudi.502.g: "维也纳，你是一颗宝石！"
 gaudi.503.t: "维也纳的转折点"
 gaudi.503.d: "环路正在慢慢成形。特别是一座大型歌剧院和一座新市政厅在此阶段落成，将巩固它对维也纳城市历史所带来的重要影响。"
 gaudi.503.f: "“我认为环路的完成是城市扩张工作中举足轻重的一个阶段。我一直特别关注此事，并向您，市长先生，以及市议会表示感谢与敬意，感谢你们对美化我的居所的特别关注。将来，我将继续关注城市的进一步扩张发展，并尽可能考虑市政府对用于建造学校、仓库和公园的建筑用地的期望，价格非常合理。为了迅速解决其中最重要的问题之一，我已下令允许市政府免费为皇帝喷泉供水，并希望供水问题能够迅速顺利地解决。”——弗朗茨·约瑟夫一世"
 gaudi.504.t: "维也纳的辉煌"
 gaudi.504.d: "随着新国立歌剧院开幕与新市政厅迁入，维也纳朝着成为奥地利当仁不让首都的方向迈出了一大步。"
 gaudi.504.f: "“维也纳的街道铺满了文化。其他城市的街道则铺满了沥青。”——卡尔·克劳斯"
 gaudi.505.t: "在通往伟大的道路上"
 gaudi.505.d: "随着大学、议会和美术馆的规划，维也纳环城大道的建设进入了最后阶段。现在的任务是在这个美不胜收的区域创造一个建筑奇迹。"
 gaudi.505.f: "“维也纳有很多地标，每个维也纳人都觉得自己是一个地标。”——卡尔·克劳斯"
 gaudi.506.t: "维也纳环城大道竣工"
 gaudi.506.d: "今天起，环城大道独一无二的外观已经奠定。虽然未来仍可能会有进一步的扩展，但所谓的“环路风格住宅”已经在此刻达到了顶峰并将永载史册。整个欧洲将钦羡此等景色！"
 gaudi.506.f: "“非常好，朕很高兴。（Es war sehr schön, es hat mich sehr gefreut.）” ——弗朗茨·约瑟夫一世"
 gaudi.506.g: "很好，我感到非常荣幸。"
 gaudi.509.t: "维也纳失陷！"
 gaudi.509.d: "随着维也纳的失陷，我们也完全失去了继续建造维也纳环城大道的机会。"
 gaudi.509.f: "如果因任何原因失去了维也纳，建筑进度将不会全部丧失。只有奥地利可以在最新的施工阶段继续建造环城大道。然而，外来入侵者不会对继续建造表现出兴趣。"
 gaudi.509.g: "我们不能允许他们掌控维也纳太久！"
 gaudi.601.t: "地下圣堂"
 gaudi.601.d: "第一阶段的施工将集中在圣家堂的地下室和天顶。从一开始就可以看出，其尺寸比最初想象的要大。"
 gaudi.601.f: "“圣家堂的建设很慢，但我的客户（指上帝）并不急。”——安东尼·高迪"
 gaudi.601.g: "不会花那么长时间的，对吗？"
 gaudi.602.t: "地下圣堂完工"
 gaudi.602.d: "今天，圣家堂的地下室被祝圣了。很快就可以在那里举行首次仪式。"
 gaudi.602.f: "“人可以分为两类：有言之人和有行之人。前者是说话的，后者是行动的。我属于第二类人。我缺乏充分表达自己的手段。我无法向任何人解释我的艺术概念。我还没有把它们具体化。我从来没有时间去思考它们。我的时间都花在工作上了。”——安东尼·高迪"
 gaudi.602.g: "还有九个施工阶段……"
 gaudi.603.t: "半圆后殿"
 gaudi.603.d: "安东尼·高迪用一个全新的计划，与最初的设想几乎没有任何相似之处，为一个从未存在过的教堂打开了窗口。"
 gaudi.603.f: "“我们把这个称号给了一个疯子或天才，时间会证明一切。”——埃利斯·罗真特，巴塞罗那建筑学院院长"
 gaudi.603.g: "这是否应该在一个人的有生之年内完成？"
 gaudi.604.t: "完工"
 gaudi.604.d: "在半圆后殿完工之后，巴塞罗那居民第一次看到了高迪的构想。这座建筑已经具有不同寻常的形状。"
 gaudi.604.f: "直线属于人类，曲线属于上帝。——安东尼·高迪"
 gaudi.604.g: "还有八个施工阶段……"
 gaudi.605.t: "诞生立面"
 gaudi.605.d: "与市政府的意愿相背，诞生立面开工了。但他们最初的想法是建造面向城市的受难立面。"
 gaudi.605.f: "“每个人都能在教堂里找到自己的东西：农民看到鸡；科学家看到黄道十二宫；神学家看到耶稣；但解释，推理，只有有能力的人才知道，不应该被庸俗化。”\n——安东尼·高迪"
 gaudi.605.g: "我喜欢陆龟。"
 gaudi.606.t: "诞生立面完工"
 gaudi.606.d: "诞生立面完工了。它的趣味性外观和巨大尺寸不仅使巴塞罗那居民支持教堂的建造，也为整个工程提供了预览。"
 gaudi.606.f: "“一代人断然无法完成整座圣殿，因此让我们迈出这坚实的一步以勉励后人，同时也不要束缚了他们未来的工作（……）。我们已经完成了圣殿的一整个里面，它的重要性将使得工程不可能半途而废。” ——安东尼·高迪"
 gaudi.606.g: "还有七个施工阶段。"
 gaudi.607.t: "中殿完工"
 gaudi.607.d: "圣家堂的内部每天都在丰富细节，它更像是一片森林而不是一座房子。"
 gaudi.607.f: "“盛殿的内部将有如一座森林。（……）中殿的柱子是棕榈树：荣耀、智慧与牺牲之树。侧廊的柱子则是月桂树，它们是荣耀与智慧之树。” ——安东尼·高迪"
 gaudi.607.g: "这要花多少年？"
 gaudi.608.t: "中殿完工"
 gaudi.608.d: "教宗驻外代表在参观圣家堂时拜访了高迪。据教宗驻外代表称，根据高迪的工作和生活方式应该赋予他“建筑界的但丁”这一称号。然而，鉴于这座教堂的怪异建筑风格，批评家们不知道这座教堂是在描述天堂还是地狱。"
 gaudi.608.f: "“绘画通过色彩，雕塑通过形式，表现存在的有机体，例如人物、树木、水果……通过它们的外部性表达它们的内部性。但建筑创造了有机体。因此，它必须受一种与自然界的规律相协调的规律所支配。不遵守这一原则的建筑师就会制造出一些糟糕的工作，而而非一件艺术品。” ——安东尼·高迪"
 gaudi.608.g: "还有六个施工阶段。"
 gaudi.609.t: "十二宗徒之尖塔"
 gaudi.609.d: "高迪在诞生立面中已经强调过圣家堂应该在高度而非宽度上增长，以激发更为强烈的热情；建造单独的塔楼将会增强这一结构的效果。"
 gaudi.609.f: "“前段时间，一位童年时代就已与我相识的老邻居从家乡来看圣家堂，他天真地感叹道：唉，唉！他还在做小时候的事情！他是对的，这是一种继承得来而不断增长的资质，它不断前进，指引着我。” ——安东尼·高迪"
 gaudi.609.g: "真的能都建造完吗？"
 gaudi.610.t: "十二宗徒之尖塔完工"
 gaudi.610.d: "圣家堂的第一组尖塔已经完工了。居民们半是着迷，半是震惊。"
 gaudi.610.f: "“与巴塞罗那的大多数教堂不同，它在革命期间没有遭到破坏——据说是因其“艺术价值”得以幸免。我认为无政府主义者在有机会的时候没有炸掉它证明其品味实在低劣，尽管他们确实在它的尖顶之间挂上了红黑旗。” —— 乔治·奥威尔"
 gaudi.610.g: "还有五个施工阶段。"
 gaudi.611.t: "受难立面"
 gaudi.611.d: "圣家堂的受难立面已经建造完成，这引起了一些高迪友人的不满。"
 gaudi.611.f: "“有些人觉得这扇大门太花哨了，但我希望它令人恐惧，为此我不会抛弃明暗对比与阴阳浮雕，这些东西能够造成最为阴郁的效果。更重要的是，我愿意牺牲构造本身，打破拱门，切断柱子，让人们明白牺牲是何等血腥。” ——安东尼·高迪"
 gaudi.611.g: "石材的恐怖。"
 gaudi.612.t: "受难立面完工"
 gaudi.612.d: "与诞生立面相比，受难立面保持了简洁，具有相当的现代性效果。这使得有些人趋之若鹜，有些人则弃之如敝屣。现在我们终于可以理解高迪为什么不愿先建造这个里面。"
 gaudi.612.f: "“我在巴塞罗那看到的——高迪——是拥有如此力量、如此信念，以及非凡的技术才华的作品，展现出了一位天才，一位反复推敲雕刻图案的石匠的一生。高迪是世纪之交的”建造者“，是一个将石材、钢铁与砖块运用的出神入化的人物。他的祖国如今见证了他的荣耀。高迪是一位伟大的艺术家，只有那些打动了善良的人敏感心灵的人才能名垂青史。” ——勒·柯布西耶"
 gaudi.612.g: "只剩四个施工阶段了。"
 gaudi.613.t: "耳堂"
 gaudi.613.d: "尽管建设工程进展顺利，但批评家仍在呼吁，如今又加上了来自艺术界的声音。它们并不希望这座建筑严守规范，但也要随着建筑学的现代发展而与时俱进。但工程的管理者已经驳回了这一请求。"
 gaudi.613.f: "“在书中你很少能找到需要的东西，如果真的找到了，它往往是错误的。” ——安东尼·高迪"
 gaudi.613.g: "响彻云霄"
 gaudi.614.t: "耳堂完工"
 gaudi.614.d: "现在圣家堂已经完成了将近三分之二，教宗提升其等级为宗座圣殿。"
 gaudi.614.f: "“圣家堂的一切都是天意：它坐落在这座城市与巴塞罗那平原的中心，从圣殿到大海与山脉，到桑茨与圣安德烈，以及巴索斯河与洛布里加特河都是一样的距离。” ——安东尼·高迪"
 gaudi.614.g: "只剩三个施工阶段了。"
 gaudi.615.t: "圣母玛丽亚与福音书作者之尖塔"
 gaudi.615.d: "在策划宏伟的传教士塔时，高迪将符号、元素、星座和美德的精髓融入这座建筑之中。如今，这些伟大的构思即将在现实世界中娓娓呈现。"
 gaudi.615.f: "“圣母玛利亚啊！对于你来说，成为微不足道的存在并非一件糟糕的事情，就像鲜花和繁星一样。” ——安东尼·高迪"
 gaudi.615.g: "万福玛利亚"
 gaudi.616.t: "圣母玛丽亚与福音书作者之尖塔完工"
 gaudi.616.d: "圣家堂的五座高塔俯视着巴塞罗那；随着十二角星的归位，“玛丽亚之尖顶”建造完成。"
 gaudi.616.f: "“圣家堂不是最后一座大教堂，而是新时代的第一座大教堂。” ——安东尼·高迪"
 gaudi.616.g: "只剩两个施工阶段啦！"
 gaudi.617.t: "荣耀立面"
 gaudi.617.d: "圣家堂荣耀立面的修建问题终于要解决了。为此，需要征用新的建设用地，让市民们非常不满。目前，管理人员尚未批准这一方案。"
 gaudi.617.f: "“我不会完成或者设计荣耀立面上钟楼模型的框架。我已决定将其留给与寺院合作的下一位设计师，就像是大教堂建设历史中多次出现过的事一样，立面不仅是由不同的作者设计的，还是以不同的风格设计的。”\n——安东尼·高迪"
 gaudi.617.g: "圣哉，圣哉，圣哉"
 gaudi.618.t: "荣耀立面完工"
 gaudi.618.d: "随着荣耀立面的完工，圣家堂已经正式落成了。"
 gaudi.618.f: "“圣家堂是过去25年来最伟大的创意建筑。它是用石头象征的精神！”——路易斯·沙利文"
 gaudi.618.g: "最后一个施工阶段！"
 gaudi.619.t: "耶稣之尖塔"
 gaudi.619.d: "有了耶稣之尖塔，圣家堂不仅会耸立在巴塞罗那，还会超越乌尔姆大教堂——迄今为止欧洲最高的教堂。"
 gaudi.619.f: "“创作就是回归自然。”——安东尼·高迪"
 gaudi.619.g: "这将会是世界上最高的教堂。"
 gaudi.620.t: "拉萨格拉达"
 gaudi.620.d: "完成了！ 真的完成了！ 圣家堂将作为世界建筑奇迹，在巴塞罗那乃至全球闪耀！"
 gaudi.620.f: "在天我等父者，\n我等愿尔名见圣。\n尔国临格。\n尔旨承行于地，如于天焉。\n我等望尔，今日予我，我日用粮。\n尔免我债，如我亦免负我债者。\n又不我许陷于诱惑。\n乃救我于凶恶。"
 gaudi.620.g: "我从没想到能在有生之年得见此事。"
 gaudi.629.t: "巴塞罗那失陷！"
 gaudi.629.d: "随着巴塞罗那的失陷，我们也完全失去了继续建造圣家堂的机会。"
 gaudi.629.f: "如果因任何原因失去了巴塞罗那，建筑进度将不会全部丧失。另一个拥有伊比利亚主流文化的国家可以在最新的施工阶段继续建造大教堂。然而，外来入侵者并不会有兴趣继续建造。"
 gaudi.629.g: "我们不能允许他们掌控巴塞罗那太久！"
 gaudi.631.t: "对圣家堂的虔诚捐赠"
 gaudi.631.d: "作为一名优秀的基督徒，[SCOPE.sCharacter('gaudi_sagrada_donator').GetFullName]对圣家堂颇有兴趣，因此以个人名义为大教堂的施工捐助了一笔款项。"
 gaudi.631.f: "几十年来，圣家堂主要是通过捐赠来获取建设资金。也正是由于在建设开始前不久的一次大笔匿名捐赠，安东尼·高迪才能够大大扩展了他的建筑计划，使圣家堂成为了今天的模样。正如何塞普·玛丽亚·博卡韦拉最初计划的那样，建筑工程仍然是通过基金会的捐赠和门票收入来获得资金。每年约有2200万欧元可用于建设；2009年为1800万欧元。"
 gaudi.631.g: "我们欠他的。"
 gaudi.632.t: "圣家堂的建造令神职人员欣喜若狂"
 gaudi.632.d: "我们国家的神职人员对圣家堂的建设进展感到欣喜若狂，并表示愿意提供帮助。然而，有人担心这会使教会的影响力过大。"
 gaudi.632.f: "高迪将他生命的最后几年完全献给了这座被广为人知的“穷人大教堂”，他为了继续建造，接受了施舍。除了对这个事业的全身心投入，他参与的其他活动很少，其中大部分与他的天主教信仰有关：在1916年，他参加了由本笃会修士格雷戈里·M·苏尼奥尔在巴塞罗那音乐宫举办的关于格里高利圣咏的课程。拉戈内西主教将高迪称为“建筑界的但丁”。尽管圣家堂规模庞大，但它并非主教座堂，也未得到官方教会的资助。"
 gaudi.632.g: "我们应当从中受益。"
 gaudi.632.h: "公开褒扬教会。"
 gaudi.632.i: "此事与教会无关！"
 gaudi.633.t: "工会批评圣家堂"
 gaudi.633.d: "作为工会代表，[SCOPE.sCharacter('trade_unions_leader').GetFullName]向政府递交请愿书，要求重新考虑对圣家堂的争议性支持。"
 gaudi.633.f: "工会领袖认为目前建造圣家堂是极度浪费钱财的行为。如果他们不能阻止建造并将资金用于更有意义的慈善渠道，他们至少要求对在危险高度工作的建筑工人提供更好的待遇和与充分的关注。"
 gaudi.633.g: "无视他们。"
 gaudi.633.h: "做做表面文章。"
 gaudi.633.i: "拨款提升工人的工作环境。"
 gaudi.634.t: "事故"
 gaudi.634.d: "今天在圣家堂的建造现场发生了一起事故，导致施工推迟了几周。"
 gaudi.634.f: "在极高的高度工作并不是事故的唯一风险。在2020年，有人在圣家堂纵火，致使施工中断以及工人及游客的紧急疏散。圣器收藏室也因受纵火影响出现损毁。"
 gaudi.634.g: "令人遗憾。"
 gaudi.635.t: "无神论者冲向圣家堂"
 gaudi.635.d: "在一次公开演讲上，[SCOPE.sCharacter('gaudi_sagrada_atheist').GetFullName]指责圣家堂的建设是向中世纪倒退，呼吁感同身受者谴责对金钱的浪费。"
 gaudi.635.f: "“诸位可以出于多种理由反对圣家堂。众多充分理由，毋庸置疑。以建筑层面而言，它实在是一场噩梦，抑或说是一场可怖的噩梦。在我们这个时代的欧洲建筑中，甚至难寻像它这般庸俗而自负之作。它是一场日益蔓延的噩梦，以最晦涩荒谬之形式直指苍穹，汇聚着俗艳、迷信和人类疯狂。更为重要的是，这是一种疯狂，由我们的纳税人所负担，以供教士们使愚蠢者更愚蠢、穷人更贫困。女士们先生们，我要告诉您们：这种疯狂必须停止。不是明天，而是今天！”"
 gaudi.635.g: "我们不要过分挑战这群人。"
 gaudi.635.h: "如神所愿！"
 gaudi.636.t: "旅游投资"
 gaudi.636.d: "旅游业者认为圣家堂是一个积极因素，并希望支持这个项目。"
 gaudi.636.f: "在20世纪的进程中，圣家堂成为巴塞罗那的真正象征。尽管对于高迪而言，精神层面至关重要，但聪明的企业家们逐渐明白这座永恒的建筑工地可以成为营销的对象。因此，在后来的年份里，数以百计的热衷于文化的游客涌向巴塞罗那。如今，圣家堂已经成为西班牙最受欢迎的旅游目的地之一。"
 gaudi.636.g: "巴塞罗那将很快因一座地标建筑而变得更加丰富多彩。"
 gaudi.637.t: "建筑工地的新机器"
 gaudi.637.d: "我国汽车工业最近为圣家堂的建筑工地配备了一台高度现代化的机器，加快了工程进度。"
 gaudi.637.f: "圣家堂的建造耗时一个多世纪，同时也见证了科技的进步，加速了建筑的进程。在世纪之交，新的建筑方法和机械得以运用，但直到世纪末，计算机模拟技术才彻底革新了教堂的建造方式。"
 gaudi.637.g: "这就是进步！"
 gaudi.638.t: "罢工威胁"
 gaudi.638.d: "圣家堂的工人宣布，如果我们不就更高的报酬展开谈判，他们就会开始罢工。"
 gaudi.638.f: "啊，罢工的美妙世界！如果你没有在欧洲南部经历过因铁路工会突然决定搞点破坏而被困在火车站的感觉，那你一定错过了很多。今天只影响了一个建筑工地。我们真的很幸运！"
 gaudi.638.g: "我们绝不谈判。"
 gaudi.638.h: "雇佣一些工贼就能了事。"
 gaudi.638.i: "呼叫国民警卫队！"
 gaudi.638.j: "谈判"
 gaudi.639.t: "劣质材料"
 gaudi.639.d: "最近运抵圣家堂的一批建筑材料被发现质量低劣。"
 gaudi.639.f: "首次检查发现运来的石材存在多处多孔洞，因此主建筑师毫不犹豫地拒绝了这批货。这必然会延误工期并增加额外的成本，但最终品质胜过一切。同时，也有人认为不仅出于成本和时间考虑应该使用这些石材，还应该保留一些更好的建筑材料以便后续使用……在其他方面。"
 gaudi.639.g: "质量有其价码。"
 gaudi.639.h: "除非有人注意到。"
 gaudi.640.t: "草率施工"
 gaudi.640.d: "劣质材料终于出了问题：今天早上，圣家堂的一部分倒塌并造成了相当严重的损害。"
 gaudi.640.f: "安东尼·高迪不高兴了。"
 gaudi.640.g: "谁能想到？"
 gaudi.641.t: "建设进度加快"
 gaudi.641.d: "圣家堂的施工进展出乎意料，预计将比时间表提前数个月。"
 gaudi.641.f: "现代技术，高效工作，完美无缺的材料供应与好天气都有助于建设进度。"
 gaudi.641.g: "我就知道！"
 gaudi.642.t: "巴塞罗那的新工作"
 gaudi.642.d: "圣家堂的建设导致大量人口涌入巴塞罗那。"
 gaudi.642.f: "如同中世纪一样，大教堂的建造为城市生活带来了许多新的需求，往往只能通过新的工人来满足。不仅建筑工人需要招募，还需要餐馆和商店、供应商以及新公寓，这些也需要由其他人来建造。这使得巴塞罗那的经济蓬勃发展，一些人想直接或间接地从中受益。"
 gaudi.642.g: "伟大的工程需要伟大的人民。"
 gaudi.643.t: "大笔匿名捐赠"
 gaudi.643.d: "一位匿名的富有捐赠者赠与了一大笔资金，用于加快圣家堂的建设。"
 gaudi.643.f: "几十年来，圣家堂主要是通过捐赠来获取建设资金。也正是由于在建设开始前不久的一次大笔匿名捐赠，安东尼·高迪才能够大大扩展了他的建筑计划，使圣家堂成为了今天的模样。正如何塞普·玛丽亚·博卡韦拉最初计划的那样，建筑工程仍然是通过基金会的捐赠和门票收入来获得资金。每年约有2200万欧元可用于建设；2009年为1800万欧元。"
 gaudi.643.g: "显然有人非常关心他的拯救。"
 gaudi.644.t: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle][SCOPE.sCharacter('gaudi_ruler').GetFullName]支持圣家堂的建设"
 gaudi.644.d: "[SCOPE.sCharacter('gaudi_ruler').GetFullName]对圣家堂表现出极大的个人兴趣。"
 gaudi.644.f: "在官方的说法中，圣家堂的建造并未获得政府的正式支持。在西班牙内战期间，激进的左翼力量甚至参与阻碍进一步的建设工作。弗朗哥对于圣家堂并没有太多的兴趣，但他无力干涉。高迪坚持让西班牙天主教社群的民众来资助该项目。然而，如果国家元首对此感兴趣的话，可以通过隐秘渠道在项目中施加重要影响……无论是通过财政支持还是与通过地方政府的关联。"
 gaudi.644.g: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle][SCOPE.sCharacter('gaudi_ruler').GetFullName]万岁！"
 gaudi.645.t: "观光之旅"
 gaudi.645.d: "圣家堂仍在施工，但进度已然引人注目，我们可以邀请盟友来访，向他展示一切。"
 gaudi.645.f: "即使作为一座未完成的建筑，圣家堂也给游客留下了深刻的印象，并激发了他们的想象力。这座建筑的设计本身就是一个极具争议的话题。高迪的同行建筑师们对它的评价普遍是积极的；路易斯·沙利文非常钦佩它，将圣家堂描述为“过去25年来最伟大的创意建筑。它是用石头象征的精神！”沃尔特·格罗皮乌斯赞扬了圣家堂，称这座建筑的墙壁是“技术完美的奇迹”。然而，作家和评论家乔治·奥威尔称它是“世界上最丑陋的建筑之一”。"
 gaudi.645.g: "邀请我们的盟友拜访巴塞罗那"
 gaudi.645.h: "这只会干扰我们的工作。"
 gaudi.646.t: "支持圣家堂的建设？"
 gaudi.646.d: "我们的大使受邀参观圣家堂的建筑工地。这是一次令人印象深刻的观光之旅，现在大使正在询问我们是否想通过成为这个教堂的捐赠者来获得国际声誉。"
 gaudi.646.f: "即使作为一座未完成的建筑，圣家堂也给游客留下了深刻的印象，并激发了他们的想象力。这座建筑的设计本身就是一个极具争议的话题。高迪的同行建筑师们对它的评价普遍是积极的；路易斯·沙利文非常钦佩它，将圣家堂描述为“过去25年来最伟大的创意建筑。它是用石头象征的精神！”沃尔特·格罗皮乌斯赞扬了圣家堂，称这座建筑的墙壁是“技术完美的奇迹”。然而，作家和评论家乔治·奥威尔称它是“世界上最丑陋的建筑之一”。"
 gaudi.646.g: "这一辉煌的工程应该得到我们的支持。"
 gaudi.646.h: "如果这个“教堂”是活的，它应该早就被火烧死了。"
 gaudi.647.t: "盟友捐赠"
 gaudi.647.d: "在参观之后，我们盟友的大使非常热情洋溢地决定成为项目的捐助者。"
 gaudi.647.f: "即使作为一座未完成的建筑，圣家堂也给游客留下了深刻的印象，并激发了他们的想象力。这座建筑的设计本身就是一个极具争议的话题。高迪的同行建筑师们对它的评价普遍是积极的；路易斯·沙利文非常钦佩它，将圣家堂描述为“过去25年来最伟大的创意建筑。它是用石头象征的精神！”沃尔特·格罗皮乌斯赞扬了圣家堂，称这座建筑的墙壁是“技术完美的奇迹”。然而，作家和评论家乔治·奥威尔称它是“世界上最丑陋的建筑之一”。"
 gaudi.647.g: "真正的朋友可以一眼认出。"
 gaudi.648.t: "巴塞罗那的考古调查"
 gaudi.648.d: "访问巴塞罗那后，[SCOPE.sCharacter('gaudi_archaeologist').GetFullName]发现圣家堂建立在罗马遗迹之上。他申请发掘许可。"
 gaudi.648.f: "尽管罗马人在巴尔西诺定居，但比起塔拉戈那和凯撒劳古斯塔这些首都来，巴尔西诺要不重要得多。在罗马第一位皇帝奥古斯都统治时期末期，敲定了“巴尔西诺(Barcino)”这个名称，它是Colonia Faventia Iulia Augusta Pia Barcino的简称。巴尔西诺作为一个旨在为退休士兵提供土地的殖民地成立于公元前133年。罗马地理学家蒲蒙尼乌斯·梅拉报告说，巴尔西诺是塔拉戈那控制下的若干个小定居点。尽管如此，这座城市在奥古斯塔大道的一条支路上的战略位置使它得以经济发展，并因此享受免税待遇。"
 gaudi.648.g: "我们无法承受如此漫长的停工。"
 gaudi.648.h: "难得的考古机会。"
 gaudi.649.t: "[SCOPE.sCharacter('gaudi_chief_engineer').GetLastName]的新点子……"
 gaudi.649.d: "[SCOPE.sCharacter('gaudi_chief_engineer').GetFullName]最近提出了一个令施工管理方震惊的变动……"
 gaudi.649.f: "任何建造像圣家堂这种庞然大物的人迟早会变得古怪——或者本就古怪。"
 gaudi.649.g: "这几乎和安托内利尖塔的建造一样糟糕……"
 gaudi.650.t: "[SCOPE.sCharacter('gaudi_chief_engineer').GetLastName]加速了圣家堂的建设"
 gaudi.650.d: "[SCOPE.sCharacter('gaudi_chief_engineer').GetFullName]最近的建设进度让施工管理人员感到惊讶。"
 gaudi.650.f: "当总工程师真好。"
 gaudi.650.g: "这几乎和维也纳环城公路的建设一样令人欣喜。"
 gaudi.1001.t: "钢结构在建筑中的应用"
 gaudi.1001.d: "钢结构建筑的发明并非一个人的功劳。这是一个缓慢的过程。然而，一位著名的工程师[SCOPE.sCharacter('gaudi_engineer_scope').GetFullName]，通过建造高强度、前所未有高度的建筑，推动了这项发明的传播。"
 gaudi.1001.f: "这座未来将成为银行总部的新建筑！钢架像骨架一样矗立在那里，等待着被其他材料覆盖。\n但建筑师的梦想已经远远不止这10层楼了，未来50层，甚至100层都有可能！"
 gaudi.1001.g: "我们的建筑终将直插云霄！"
 gaudi.1002.t: "桂尔别墅"
 gaudi.1002.g: "令人印象深刻的艺术风格！"
 gaudi.1003.t: "[SCOPE.sCharacter('tesla_new_engineer_scope').GetFullName]在萨维奥赛道上获胜"
 gaudi.1003.d: "年轻的[SCOPE.sCharacter('tesla_new_engineer_scope').GetFullName]在萨维奥赛道赛中获得第一名，也许我们可以培养一下这位新秀？"
 gaudi.1003.f: "空气中弥漫的汽油味、发动机的轰鸣声、兴奋、危险、刺激，这就是人们蜂拥而至观看汽车比赛的原因。\n\n1923年，年轻的恩佐·法拉利赢得了他的第一个大奖赛冠军，并一直参加比赛，直到他的儿子出生后，他才停止了自己的赛车生涯。但他仍然忠实于赛车运动，成立了自己的法拉利车队。"
 gaudi.1003.g: "多么壮观的场面！"
