 gaudi_eiffel_phase_1_decision: "埃菲尔铁塔"
 gaudi_eiffel_phase_1_decision_desc: "工业化时代的新技术使人们建造高层建筑的想法得以实现，而塔楼建筑特别能够反应时代的精神。1886年5月1日，贸易部长爱德华·洛克卢瓦宣布面向法国建筑师和工程师举办巴黎世界博览会建筑构思竞赛。约有100名参赛者参加了比赛，其中许多人提出了塔式结构的想法。初选后有三个方案脱颖而出，包括埃菲尔的作品，以及斐迪南·杜特和让·卡米尔·福米热的设计。埃菲尔再次修改了索韦斯特尔装饰繁复的设计，但保留了一些装饰元素，并最终以这个折衷方案赢得了比赛。"
 gaudi_liberty_phase_1_decision: "自由女神"
 gaudi_liberty_phase_1_decision_desc: "雕塑家弗雷德里克·奥古斯特·巴托尔迪提议树立一座自由女神像，作为法美两国人民之间兄弟情谊的象征，并纪念独立战争中的并肩战斗与启蒙运动的理想。她应成为自由民主的美利坚象征。1876的美国百年国庆为这一想法注入了新的动力。"
 gaudi_ben_phase_1_decision: "令人起敬的议会"
 gaudi_ben_phase_1_decision_desc: "1834年10月16日，一场毁灭性的火灾烧毁了威斯敏斯特宫的大部分建筑。当时财政部决定焚烧1826年税制改革后不再使用的缺口木棒。两马车的木头被放在两个炉子里焚烧，导致上议院起火。只有威斯敏斯特厅、珠宝塔、圣斯蒂芬教堂地下室和回廊逃过一劫。1835年6月，一个委员会决定在原址重建宫殿，哥特式与都铎式风格均被纳入考虑。1836年，委员会在审查了97个竞争方案后，选择了查尔斯·巴里按照哥特式风格进行重建的方案。"
 gaudi_ben_phase_2_decision: "独一无二的钟声"
 gaudi_ben_phase_2_decision_desc: "大本钟这个名字指的是伦敦威斯敏斯特宫著名钟楼的五口大钟中最重的一口，重达13.5吨。钟楼高96.3米，底部的61米由砖砌成，立面为石灰岩，顶部由铸铁制成。威斯敏斯特宫的建筑师查尔斯·巴里委托奥古斯都·普金设计这座塔楼。1848年，乔治·艾里爵士和埃德蒙·丹尼森设计了大钟，并由钟表匠爱德华·约翰·登特制造。四个表盘的直径各为七米。表盘下均刻有拉丁文“Domine salvam fac reginam nostram Victoriam primam”（上帝保佑我们的女王维多利亚一世）。"
