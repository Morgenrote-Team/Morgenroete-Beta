 je_gaudi_urban_planning_project_reason: "你的[concept_gaudi_architect][ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]正在[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]研究[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName]现代化生产方式。\n$mr_divider_for_je$\n该研究项目每月都会获得进度，每次进度到达#V 24#!时，[GetBuildingType('building_urban_center').GetName]将获得修正。\n\n所有建筑均可在进度条走满三次后获得三个新修正。\n[GetBuildingType('building_urban_center').GetName]拥有所有修正后，你将获得#p 5#!@gaudi_architectural_splendour![concept_gaudi_architectural_splendour]。\n$mr_divider_for_je$\n当前建筑：[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]的[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_gaudi_urban_planning_project_modifier_1_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_gaudi_urban_planning_project_modifier_2_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_gaudi_urban_planning_project_modifier_3_type')]\n\n剩余建筑总数：[JournalEntry.MakeScope.Var('mr_number_of_remaining_list_entries_var').GetValue|V0]\n来自项目的$concept_gaudi_architectural_splendour$：[JournalEntry.MakeScope.ScriptValue('gaudi_architectural_splendor_from_urban_planning_value')|+0]@gaudi_architectural_splendour!"
