 je_gaudi_mole_phase_1: "安托内利尖塔：从犹太会堂到国家象征"
 je_gaudi_mole_phase_1_reason: "安托内利尖塔是一座亭楼式建筑，其高耸的尖锐锥形结构由都灵建筑师亚历山德罗·安托内利设计。它原本计划被用作代表当地犹太社区的犹太教会堂，但建筑师的远大雄心使得项目超出了最初的计划，成本急剧上升，竣工日期被推迟多年。犹太社区尝试继续筹款的企图以失败告终，然而都灵的人民呼吁当地政府接手完成这座已然初具雏形的建筑，并将其敬献给意大利的统一。"
