 gaudi.2101.t: "钢铁巨人的诞生"
 gaudi.2101.d: "在公众的热切关注下，施工工程从地基挖掘开始，为此总共将挖掘30,973立方米的土方。在铺设第一根钢梁前，埃菲尔铁塔就已经创下了一项纪录。"
 gaudi.2101.f: "“这座塔不仅象征着现代工程师的艺术，也象征着我们所处的工业和科学的世纪，十八世纪的伟大科学进展和1789年的革命为这个世纪铺平了道路，而这座纪念碑的建造表达了法兰西的感激之情。”——古斯塔夫·埃菲尔"
 gaudi.2101.g: "直抵天际，触摸星辰！"
 gaudi.2102.t: "埃菲尔铁塔的落成典礼"
 gaudi.2102.d: "这位钢铁巨人的落成令人既担心又期待，如今它已耸立在法国首都的上空。整个巴黎都笼罩在这座高塔的阴影之下——它已成为这座城市的新地标。欢庆落成典礼的激情让批评者噤若寒蝉。"
 gaudi.2102.f: "‘在既成事实面前，我们不得不低下头！和许多人一样，我也曾说过，并且确实相信埃菲尔铁塔是疯狂的，但这是一种宏伟而自豪的疯狂。当然，这座巨大的建筑压倒了博览会的其他部分，当你再次踏上香榭丽舍大街时，那些巨大的穹顶和长廊显得格外渺小。但你还想要什么呢？埃菲尔铁塔吸引着人们的想象力，它是意想不到，梦幻般的事物，让我们渺小的身躯受宠若惊。当埃菲尔铁塔刚刚建成时，梅索尼埃与左拉等最著名的艺术家和作家都曾在一份烈火般的抗议书上签名，认为这座铁塔是对艺术犯下的滔天罪行。今天你们还会在上面签名吗？不，当然不会，他们宁愿这份怒气冲天的文件不曾存在过。’"
 gaudi.2102.g: "法兰西万岁！"
 gaudi.2109.t: "巴黎陷落！"
 gaudi.2109.d: "随着巴黎的失陷，我们也完全失去了继续建造埃菲尔铁塔的机会。"
 gaudi.2109.f: "如果因任何原因失去了巴黎，建筑进度将#R 全部丧失#!。只有法国可以建造埃菲尔铁塔。外来入侵者不会对继续建造表现出兴趣。"
 gaudi.2109.g: "我们不能允许他们掌控巴黎太久！"
 gaudi.2111.t: "升降机"
 gaudi.2111.d: "电梯技术领域的新进步使埃菲尔铁塔的施工进度出乎意料地加快。"
 gaudi.2111.f: "埃菲尔铁塔共有九部不同的升降机，其中五部安装在塔柱上，在入口与二层之间运行，另外还有两对双舱升降机安装在二层和三层之间。在建造铁塔时，埃菲尔特意采用了不同的技术和制造商，以免问题出现时影响到整个系统。直到1910年，奥的斯升降机一直在南北两柱中工作。而直到1897年，东西两根支柱上使用着鲁克斯、康巴鲁齐和勒帕普生产的升降机。在无尽端双铰链的帮助下，这些升降机最多可运送200人。两个系统均由液压输送系统控制。·1900年世界博览会上，埃菲尔用电动马达取代了蒸汽动力的升降机与液压系统。"
 gaudi.2111.g: "太棒了！"
 gaudi.2112.t: "知识分子的呼声"
 gaudi.2112.d: "在一份知名的日报上，几位知识界、学术界与艺术界的头面人物抗议埃菲尔铁塔的修建，他们斥责埃菲尔铁塔丑陋碍眼。"
 gaudi.2112.f: "“我们作家、画家、雕塑家、建筑师，对巴黎迄今未受破坏的美丽充满热情的奉献者，以轻视法国品味的名义，以我们所有的力量，以我们所有的愤慨，反对建造这座无用且可怕的埃菲尔铁塔，想像一下，一座令人眩晕、荒谬的塔就像庞然大物的黑色烟囱般统治著巴黎，巴黎圣母院、圣雅克塔、卢浮宫、荣军院、凯旋门将会被压垮，我们所有纪念碑将被屈辱消失在这场可怕的梦中，二十年内……我们将看到可恨的螺栓金属板柱的可恨阴影像墨水一样延伸。”"
 gaudi.2112.g: "推迟建造。"
 gaudi.2112.h: "这些抗议声只会激励我们加快建造铁塔！"
 gaudi.2113.t: "实业家为钢铁巨人喝彩"
 gaudi.2113.d: "在法国实业家眼中，不断长高的埃菲尔铁塔是法国经济和技术进步的象征。他们满怀激情地期待着铁塔的落成。"
 gaudi.2113.f: "1889年5月24日，在正式开幕前就登上了埃菲尔铁塔的企业家兼考古学家海因里希·施里曼致信鲁道夫·维尔肖，称赞埃菲尔铁塔是工程技术的奇迹，没有它，巴黎的世界博览会将会索然无味。尽管人们对埃菲尔铁塔作为成功的国家自我写照和技术进步的展示赞不绝口，但也有着一些无情的批评。"
 gaudi.2113.g: "也许你能帮点忙？"
 gaudi.2113.h: "谢谢！"
 gaudi.2114.t: "劣质钢材"
 gaudi.2114.d: "总建筑师对一批钢材的质量提出了严厉批评并要求退货。埃菲尔铁塔的施工进度正在发生显著的变化。"
 gaudi.2114.f: "多达250人参与了施工，其中有150人负责铆接部件。除了木工和建筑工还有不少习惯高处工作的烟囱清理工。夏冬令时的轮班分别是12时和9时制。1888年9月发生了罢工事件；3个月后又因加薪问题再次罢工。古斯塔夫·埃菲尔与工人协商后，并又在站台上安置了间食堂才解决问题。整个工期仅发生一起死亡事故。在正式开放后又一意大利工人在安装电梯时发生意外。"
 gaudi.2114.g: "买批新钢材。"
 gaudi.2115.t: "优质钢材"
 gaudi.2115.d: "在埃菲尔铁塔建造中提供钢材的巴黎左近的钢材厂质量得到了证实，此举不仅提供了效率，还大大增加了客户对其的订单。"
 gaudi.2115.f: "1888年8月14日，二楼建成，顶部为悬臂式。同时，平台也安装完毕。各个零件在工厂预先钻孔，在施工时用锥形心轴在冲击下到达最终位置。总共 250万颗铆钉将埃菲尔铁塔的各个部件固定在一起。整个铆接过程由5名工人负责。第一个工人用热铆钉烫印，并用一个小锻炉使其发红。二步，另一个工人将铆钉引导到钻孔中。第三步，将锁头敲打成型。最后一步，将螺栓压缩成型。"
 gaudi.2115.g: "法国钢才是好钢。"
 gaudi.2116.t: "数学家预测倒塌"
 gaudi.2116.d: "法国一名受尊的数学家预测埃菲尔铁塔将在230米时倒塌，该消息在附近的居民间引起了恐慌。"
 gaudi.2116.f: "一名巴黎战神广场周围的居民因为担心埃菲尔铁塔会倒塌砸坏他的房子，对巴黎市和法国提起诉讼。法院判决古斯塔夫·埃菲尔对所有损坏全权负责的情况下才能继续施工。这在法国社会引发了激烈的讨论，人们质疑埃菲尔的建造和计算有多可靠。然而，实业家认为这种批评是对进步理念的侮辱。"
 gaudi.2116.g: "这太荒谬了。"
 gaudi.2116.h: "如果埃菲尔铁塔倒塌，埃菲尔必须赔偿。"
 gaudi_admires_liberty_statue_modifier: "自由女神像：崇尚美国理念"
 gaudi_liberty_impressed_modifier: "自由女神像：被自由女神所打动"
 gaudi_america_first_modifier: "自由女神像：美国项目"
 gaudi.2201.t: "美国港口的一位法国女士"
 gaudi.2201.d: "一座巨大的雕塑在法国的倡议下建设中，它将很快作为自由的象征迎接所有到达新世界的人。"
 gaudi.2201.f: "贝德罗岛于1796年被委托给纽约州，但1800年该岛最终被移交给美国联邦政府。美国决定在贝德罗岛（以及总督岛和埃利斯岛）上建造防御工事来保护纽约港。1871年6月，雕塑家巴托尔迪抵达纽约。他的目光落在了纽约湾上游的贝德罗岛。每艘抵达的船只都必须经过这座岛屿，这就是为什么它适合作为雕像的地点。"
 gaudi.2201.g: "我们已经找到了一个合适的地方。"
 gaudi.2202.t: "自由照耀世界"
 gaudi.2202.d: "今天，数十万人为自由女神像的落成举行典礼举行游行，由[SCOPE.sCharacter('gaudi_ruler_scope').GetPrimaryRoleTitle][SCOPE.sCharacter('gaudi_ruler_scope').GetLastName]亲自掌舵，一名法国委员会也参与海上游行，其目的地是贝德罗岛。"
 gaudi.2202.f: "不似希腊伟岸铜塑雕像\n拥有征服疆域的臂膀\n红霞落波之门你巍然屹立\n高举灯盏喷薄光芒\n您凝聚流光的名字——\n放逐者之母\n把广袤大地照亮\n凝视中宽柔撒满长桥海港\n“扼守你们旷古虚华的土地与功勋吧！”她呼喊\n颤栗着缄默双唇：\n把你，\n那劳瘁贫贱的流民\n那向往自由呼吸，又被无情抛弃\n那拥挤于彼岸悲惨哀吟\n那骤雨暴风中翻覆的惊魂\n全都给我!\n我高举灯盏伫立金门！高举自由的灯火"
 gaudi.2202.g: "这是新的巨像。"
 gaudi.2209.t: "纽约失陷！"
 gaudi.2209.d: "随着纽约的失陷，我们也完全失去了继续建造自由女神像的机会。"
 gaudi.2209.f: "如果因任何原因失去了纽约，筑进度将#R 全部丧失#!。只有美国可以建造自由女神像。外来入侵者不会对继续建造表现出兴趣。"
 gaudi.2209.g: "我们不能允许他们掌控纽约太久！"
 gaudi.2211.t: "电梯"
 gaudi.2211.d: "电梯技术领域的新进步使自由女神像的施工进度出乎意料地加快。"
 gaudi.2211.f: "“表面应该清晰简单，由大胆干净的设计决定，在重要地方突出。通过夸大形式以使它们更清晰可见或添加的细节，会破坏作品的比例。最后，模型与设计一样，应该具有概括性的特征，就像快速草稿一样。这个角色必须是意志和观察的产物，艺术家通过集中知识，找到最简单的形式和线条。”——弗雷德里克·奥古斯特·巴托尔迪"
 gaudi.2211.g: "好极了！"
 gaudi.2213.t: "知识分子印象深刻"
 gaudi.2213.d: "知识分子的菁英们对纽约当前的建设项目表示欢迎，这充分体现了美国的民主自由精神。艺术家们受到启发，创作了诗歌和作品。"
 gaudi.2213.f: "“你是曼哈顿湾上方西门的守望者，\n遮蔽你脸颊的怀疑之雾已散，\n你的双眼明亮，你的双手高举，\n在世上每片土地洒下自由的光芒！”——亨利·范·戴克"
 gaudi.2213.g: "也许他们可以做广告？"
 gaudi.2214.t: "这是一项法国工程。"
 gaudi.2214.d: "自由女神像工程愈是深入，曼哈顿岛上的基地愈是高耸，一些政客质疑谁才是该项目的发起国。"
 gaudi.2214.f: "“我们今天不是来向一个充满愤怒和复仇的凶猛好战之神的鞠躬，相反，我们欢欣鼓舞地想到，我们的神在美国敞开的大门前守望和保护，比古代歌曲中颂扬的任何神都更伟大。她没有抓住恐怖和死亡的霹雳，而是高举光明，照亮人类获得解放的道路。我们不会忘记自由在这里安家，也不会忽视她选择的祭坛。心甘情愿的信徒们将使火焰不断的燃烧，这些火将照耀我们姐妹共和国的海岸，在那里，与回应的光线一起，一道光束将刺穿无知的黑暗和人类的压迫，直到自由照亮世界。”——格罗弗·克利夫兰"
 gaudi.2214.g: "这是一项美国工程。"
 gaudi.2214.h: "这是一项法美工程。"
 gaudi.2214.i: "这是一项法国工程。"
 gaudi.2215.t: "优质钢材"
 gaudi.2215.d: "在自由女神像的建造过程中，纽约附近钢厂的钢材质量非常高，这不仅加快了工程效率，还增加了其他客户对钢材的需求。"
 gaudi.2215.f: "“我看到了自由女神像。我自言自语：‘女士，你真美丽！你张开双臂吸引着所有的外来者。给我个机会，让我想想是什么机会，哦，成为一个美国公民的机会！’这座巨像真是让我难以忘怀。”"
 gaudi.2215.g: "美国钢才是好钢。"
 gaudi.2216.t: "执政党支持自由女神像"
 gaudi.2216.d: "[SCOPE.sCharacter('gaudi_liberty_leader').GetFullName]被认为是自由女神像项目的坚定支持者，现在他已经在他的交际圈中为该项目取得了支持，筹集了不少捐款。"
 gaudi.2216.f: "巴托尔迪原本计划在覆盖金箔的火炬阳台上安装聚光灯来照亮它。落成典礼前一周，陆军工程兵团担心这会让过往船只的水上飞行员失明而拒绝了这一提案。于是巴托尔迪在火炬上开出舷窗，并在里头安装了大灯。"
 gaudi.2216.g: "请求再次捐赠。"
 gaudi.2216.h: "公开褒扬他！"
 gaudi.2217.t: "建筑工地事故"
 gaudi.2217.d: "在自由女神像筑工地发生了事故，造成多人受伤，建筑房屋损毁。"
 gaudi.2217.f: "“你们在纽约港树立了一座称之为自由的巨像。这座纪念碑唯一需要完成的事情就是在它的基座上刻上但丁在地狱之门上写的铭文：所有进入这里的人都将放弃希望。”——萧伯纳"
 gaudi.2217.g: "美国钢是最好的钢，我认为……"
 gaudi.2218.t: "自由价值何许？"
 gaudi.2218.d: "[SCOPE.sCharacter('gaudi_opposition_leader').GetFullName]被认为是对自由女神像坚决批评家。他认为筹集的资金应有更好的去处。"
 gaudi.2218.f: "美国委员会在筹集捐款方面举步维艰。自由女神像并不是唯一一个缺乏资金的项目；如华盛顿纪念碑在内，它施工耗时三年半，期间多次被中止。人们对巴托尔迪的雕像以及美国人必须为这份礼物支付底座费用的事实提出了批评。还有一种普遍的观点认为，这件公共艺术品应该由美国人自己设计。《哈珀周刊》杂志说，“巴托尔迪本可以捐赠雕像和基座”。《纽约时报》更指出，“在我们目前的财政状况下，没有一个真正的爱国者会为铜制女性雕像花费任何费用”。"
 gaudi.2218.g: "但这个项目很重要！"
 gaudi.2218.h: "或许我们还有更重要的事……"
 gaudi.2301.t: "伦敦伤愈"
 gaudi.2301.d: "当悠久的威斯敏斯特宫燃起熊熊大火时，伦敦人仍然感到惊诧。这场大火在曾经的伦敦政治心脏——泰晤士河岸上留下了一道深刻的疤痕。现在施工将以一个庄严的仪式正式开始，为的是愈合这道伤疤。"
 gaudi.2301.f: "火灾发生后，威廉四世国王立即将几乎完工的白金汉宫赠送给议会，希望处置掉他不喜欢的一处住所。然而议会认为这座建筑不适合使用于是回绝了国王的这份礼物。新古典主义的倡导大受赞扬。德西默斯·伯顿设计了新古典主义的议会大厦。与新哥特式风格相反，他们称赞那些建造圣保罗大教堂的人，以更美丽和普遍的罗马建筑风格，让后人喝彩。奥古斯都·威尔比·诺斯摩尔·普金因皈依了天主教会而不得不通过诸如詹姆斯·吉莱斯皮·格雷厄姆和查尔斯·巴里的设计案，但他也因查尔斯·巴里的设计案使得他赢得了议会的青睐。"
 gaudi.2301.g: "我想让政客们去露宿街头。"
 gaudi.2302.t: "议会厅完工"
 gaudi.2302.d: "随着上下议院的完工，议会已经可以在威斯敏斯特宫正常的工作了。但距离这座建筑完工还需些年月。"
 gaudi.2302.f: "上议院完工于1847年，下议院完工于1852年（此时巴里已获得爵位）。虽然大部分工作在巴里去世时已经完成了，但直到十年后，这个项目才在他的儿子爱德华·米德尔顿·巴里接手并监督下才正式完工。"
 gaudi.2302.g: "我们取得了不错的进展，不是吗？"
 gaudi.2303.t: "大本钟"
 gaudi.2303.d: "第二阶段工作正在进行。议会大楼的内部装修和钟楼上的巨型钟的安装还尚未完成。"
 gaudi.2303.f: "在阿尔伯特亲王主持的皇家美术委员会监督下，包括罗伯特·皮尔爵士在内的特别委员会于1841年开始听取专家的证词。这些专家包括皇家艺术学会会员马丁·阿彻·希爵士和查尔斯·洛克·伊斯特莱克，后者是画家，也是公认的艺术史权威。他很快将成为国立美术馆的首任馆长，也是整个威斯敏斯特宫装饰项目的实际管理者。会议决定抓住这个机会，鼓励英国国家历史绘画学校的发展，并决定用壁画的形式来创作这些画作。"
 gaudi.2303.g: "一座小钟楼有什么好大惊小怪的？"
 gaudi.2304.t: "威斯敏斯特宫已修复"
 gaudi.2304.d: "新的英国议会大厦傲然屹立在泰晤士河岸之上，塑造了这座城市的轮廓。钟楼的钟声已成为伦敦标志性特征，时刻都伴随着居民。它已然成为整个国家的地标。"
 gaudi.2304.f: "“那么，当下次咨询时间再出现这个问题时，你想让我告诉议会，‘公务员队伍臃肿’是他们的错？”\n“是的，首相，这是事实呢。”\n“我想要的不是真相，我想知道我能对议会说些啥！汉弗莱，你是我秘书，应该执行我策略。但仍旧不明白你为何这么坚决的反对他们？我必须要知道你屁股坐在哪儿！”\n“是的，首相，一个人屁股坐在哪儿取决于他的屁股。”"
 gaudi.2304.g: "叮——咚、叮——咚，叮——咚、叮——咚。"
 gaudi.2309.t: "伦敦失陷！"
 gaudi.2309.d: "随着伦敦的失陷，我们也完全失去了继续建造威斯敏斯特宫的机会。"
 gaudi.2309.f: "如果因任何原因失去了伦敦，建筑进度将#R 全部丧失#!。只有大不列颠才能继续建造威斯敏斯特宫。外来入侵者不会对继续建造表现出兴趣。"
 gaudi.2309.g: "我们不能允许他们掌控伦敦太久！"
 gaudi_ben_decoration_modifier: "威斯敏斯特宫装饰"
 gaudi_praised_by_parliament_modifier: "受到国会赞扬"
 gaudi_ben_decoration_tt: "威斯敏斯特宫落成后将更富盛名。"
 gaudi.2311.t: "质量低劣的石灰石"
 gaudi.2311.d: "最近运抵威斯敏斯特宫的一批建筑材料被发现质量低劣。"
 gaudi.2311.f: "在伦敦的建筑工地上，威斯敏斯特宫每天都在不断增高，但某一刻，建造突然停顿了下来。建筑师进行了一次简短的清点，发现石灰石的质量并不像平常那样可靠，他宣布自己宁愿等待也不愿令这些石灰石危及他的杰作。然而，管理层中有些人认为这些石灰石仍然应该使用。"
 gaudi.2311.g: "我们看重英国的高质量工艺。"
 gaudi.2311.h: "我们得完成施工计划！"
 gaudi.2312.t: "灾难！"
 gaudi.2312.f: "或许我们应该听从建筑师的建议，使用劣质石灰石来建造威斯敏斯特宫这样重要的奇观并不是一个好主意。当时应该再三考虑再下决定。但为时已晚——劣质材料今天造成了后果，一堵墙倒塌，摧毁了过去几周甚至几个月的建设进展。"
 gaudi.2313.t: "新机器"
 gaudi.2313.d: "我国汽车工业最近为威斯敏斯特宫的建筑工地配备了一台高度现代化的机器，加快了工程进度。"
 gaudi.2313.f: "“有机车就好了！”"
 gaudi.2313.g: "这就是进步！"
 gaudi.2314.t: "威斯敏斯特宫：进展良好"
 gaudi.2314.d: "威斯敏斯特宫的建设进展惊人地迅速。鉴于目前状况，当前的施工阶段可能会提前完成。"
 gaudi.2314.f: "不知是什么原因，威斯敏斯特宫的建设进展得越来越好：可能是对祖国的热爱、高工资、当地精英的友好支持，或者仅仅是天气更好。"
 gaudi.2314.g: "棒极了。"
 gaudi.2315.t: "威斯敏斯特宫：进展缓慢"
 gaudi.2315.d: "很不幸，伦敦的施工管理部门今天不得不承认威斯敏斯特宫的建设进度落后于计划，并且需要比预期更长的时间。"
 gaudi.2315.f: "出于未知原因，威斯敏斯特宫的建设进度越来越慢：是敌对政治势力的煽动，还是工会对职业道德的破坏，是光明会的阴谋，抑或仅仅是恶劣的天气。"
 gaudi.2315.g: "令人遗憾。"
 gaudi.2316.t: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]造访"
 gaudi.2316.d: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle][SCOPE.sCharacter('gaudi_ruler').GetFullName]决定亲自访问威斯敏斯特宫的施工现场。"
 gaudi.2316.f: "我们的君主[SCOPE.sCharacter('gaudi_ruler').GetFullName]此前已经对伦敦工地上发生的事情表现出极大的兴趣，现在打算前往现场参观。准备工作正在全力进行中——当然要给陛下看些特别的东西！因此，在消息公布之后，普通的建筑工人、管理方和首席建筑师本人达到了前所未有的速度。"
 gaudi.2316.g: "陛下知道如何动员。"
 gaudi.2317.t: "风暴天气"
 gaudi.2317.d: "风暴是威斯敏斯特宫的工程被拖慢了几个月。"
 gaudi.2317.f: "昨晚一场雷暴袭击了伦敦。风刮掉了篷布并刮塌了脚手架，损坏了窗户、屋顶和雕像。"
 gaudi.2317.g: "我宁愿来的是彗星。"
 gaudi.2318.t: "威斯敏斯特宫的装饰"
 gaudi.2318.d: "目前，政坛和建筑工地管理方就新议会大楼的装潢程度存在争议。一位室内设计师建议用丰富的装饰来装饰威斯敏斯特宫，但有人担心这可能会严重影响大楼的完工。"
 gaudi.2318.f: "1834年威斯敏斯特宫被大火烧毁后，查尔斯·巴里爵士聘请奥古斯都·普金为他参加建筑竞赛提供室内设计，该竞赛将决定谁将建造新的威斯敏斯特宫。随后委员会以普金是该设计的决定者任命普金协助建造新宫殿的内部。在1852年2月，普金临终时，巴里前往拉姆斯盖特拜访了他，普金为标志性的宫殿钟楼提供了详细设计。该设计非常接近普金早期的设计，包括兰开夏郡斯卡里斯布里克大厅的一个未建方案。该塔是普金在陷入疯狂之前的最后一个设计。"
 gaudi.2318.g: "这可能耗时长久，但大不列颠的议会大厦将会极尽奢华。"
 gaudi.2318.h: "接下来是什么？金箔椅套？"
 gaudi.2319.t: "支持新国会"
 gaudi.2319.d: "[SCOPE.sCharacter('gaudi_ben_leader').GetFullName]被认为是威斯敏斯特宫项目的坚定支持者，现在他已经在他的交际圈中为该项目取得了支持，筹集了不少捐款。"
 gaudi.2319.f: "新宫殿的建造始于1840年。巴里预估耗时为6年，估计成本为@money!724986，但该项目实际上耗时30多年，耗资超过@money!200万。"
 gaudi.2319.g: "请求再次捐赠。"
 gaudi.2319.h: "公开褒扬他！"
