 je_gaudi_sagrada_phase_5: "圣家堂：十二宗徒之尖塔"
 je_gaudi_sagrada_phase_5_reason: "高迪的原始设计总共有十八个尖塔，从低到高代表十二宗徒、圣母玛利亚、四位福音书的作者（玛窦、马尔谷、路加和圣史若望）和最高的耶稣基督。所有的尖塔，其形状都旨在给予人们类似主教的牧杖的感觉，它们都有长长的垂直凹槽和彩色的尖顶，上面装饰着动物或神圣的符号和圣经引文。它们携带着一个小小的金色十字架，上面刻有各自使徒的名字。一些尖塔会通过狭窄的石桥相连接。"
 je_gaudi_sagrada_phase_5_goal: "#E 建造进度#!达到#BLUE 120#!点。目前我们拥有#G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#!点，通常我们每月获得一点。"
 je_gaudi_sagrada_phase_6: "圣家堂：受难立面"
 je_gaudi_sagrada_phase_6_reason: "与装饰精美的诞生立面相比，受难立面朴素、简单，石材裸露，刻有粗犷的直线来比拟骷髅的骨骼。这个立面是为了纪念基督的受难，即他在被钉十字架时所遭受的痛苦，旨在描绘人类的罪恶。高迪希望这个立面能够让观看者感到恐惧。他想要“打破”拱形和“切割”柱子，并利用明暗对比的效果（暗角阴影与严酷的刚性光线对比）来进一步展示基督的牺牲所带来的严重性和残酷性。面向落日，象征基督的死亡，受难立面由六根大而倾斜的柱子支撑，设计成类似于紧绷的肌肉的形状。"
 je_gaudi_sagrada_phase_6_goal: "#E 建造进度#!达到#BLUE 120#!点。目前我们拥有#G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#!点，通常我们每月获得一点。"
 je_gaudi_sagrada_phase_7: "圣家堂：耳堂"
 je_gaudi_sagrada_phase_7_reason: "装饰主题取自礼拜中的词句，其尖顶饰有“和散那”、“光荣”与“圣哉”等词语，受难立面的大门以各种语言重现《新约》中耶稣受难一段，主要是加泰罗尼亚语，荣耀立面装饰着《使徒信经》中的词语，而主入口的大门则用加泰罗尼亚语书写全篇主祷文，周围环绕着“我们日用的饮食，今日赐给我们”一句的各种语言版本。三个入口分别象征三种美德：信仰、希望与爱，也分别致敬了基督一生中的三个阶段。"
