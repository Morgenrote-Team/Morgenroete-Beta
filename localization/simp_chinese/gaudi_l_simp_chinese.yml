 je_gaudi_palacio_phase_1: "墨西哥文化的核心"
 je_gaudi_palacio_phase_1_reason: "美术宫是墨西哥最重要的文化机构。这座宏伟的建筑被认为是墨西哥最高级和最重要的文化建筑，致力于戏剧、舞蹈、音乐和歌剧、视觉艺术、文学和建筑。该建筑的建设始于1904年10月1日。目的是取代之前被破坏的国家剧院，该剧院被视为殖民主义的遗迹。"
 je_gaudi_palacio_phase_1_goal: "#E 建造进度#!达到#BLUE 120#!点。目前我们拥有#G [GetGlobalVariable('gaudi_palacio_progress').GetValue]#!点，通常我们每月获得一点。"
 je_gaudi_palacio_phase_2: "墨西哥文化的核心"
 je_gaudi_palacio_phase_2_reason: "意大利建筑师阿达莫·博阿里受委托设计了美术宫，原计划在四年内完工。但是，由于各种困难，这个期限无法实现。墨西哥的沼泽地形导致建筑物沉降，并且财政也有困难，博阿里最终因墨西哥革命而回到意大利。建设的延误也意味着艺术和建筑的风格在变化，而艺术装饰风格则被引入。"
 je_gaudi_palacio_phase_2_goal: "#E 建造进度#!达到#BLUE 120#!点。目前我们拥有#G [GetGlobalVariable('gaudi_palacio_progress').GetValue]#!点，通常我们每月获得一点。"
 gaudi_palacio_phase_1_decision: "美术宫"
 gaudi_palacio_phase_1_decision_desc: "美术宫是墨西哥最重要的文化机构。这座宏伟的建筑被认为是墨西哥最高级和最重要的文化建筑，致力于戏剧、舞蹈、音乐和歌剧、视觉艺术、文学和建筑。该建筑的建设始于1904年10月1日。目的是取代之前被破坏的国家剧院，该剧院被视为殖民主义的遗迹。"
 gaudi_palacio_phase_2_decision: "墨西哥文化的核心"
 gaudi_palacio_phase_2_decision_desc: "意大利建筑师阿达莫·博阿里受委托设计了美术宫，原计划在四年内完工。但是，由于各种困难，这个期限无法实现。墨西哥的沼泽地形导致建筑物沉降，并且财政也有困难，博阿里最终因墨西哥革命而回到意大利。建设的延误也意味着艺术和建筑的风格在变化，而艺术装饰风格则被引入。"
