 je_gaudi_sagrada_phase_8: "圣家堂：圣母玛丽亚与福音书作者之尖塔"
 je_gaudi_sagrada_phase_8_reason: "福音书作者的塔尖上方装饰有他们传统象征的雕塑：有翼公牛（圣路加）、有翼人（圣玛窦）、一只老鹰（圣史若望）和有翼狮子（圣马尔谷）。塔楼的顶端高达22.5米，由三个不同部分组成：底部由四行六边形构成，上面刻有铭文“阿利路亚”和“阿门”，周围环绕着鱼骨状的陶瓷棕榈树；中间部分是镶嵌陶瓷和威尼斯玻璃覆盖的球相交的二十面体，内部包含光源；最后的装饰是四位福音书作者的雕像，带有翅膀并手持一个刻有各作者首字母的福音书。圣母塔位于后殿上方，顶部是一个象征晨星的大十二角星。此外，它还带有几个描绘圣母的图像元素，如《圣母经》和各种花朵，象征着耶稣之母的属性。"
 je_gaudi_sagrada_phase_8_goal: "#E 建造进度#!达到#BLUE 120#!点。目前我们拥有#G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#!点，通常我们每月获得一点。"
 je_gaudi_sagrada_phase_9: "圣家堂：荣耀立面"
 je_gaudi_sagrada_phase_9_reason: "最大且最引人注目的立面是荣耀立面。它致力于表现耶稣在天上的荣耀，代表着通向上帝的道路：死亡、最后审判和荣耀，而地狱则留给那些背离上帝旨意的人。为了到达荣耀门廊，人们需要通过建在马略卡街上的地下通道，通道的装饰代表地狱和邪恶。门廊将被装饰上恶魔、偶像、伪神、异端和裂教等图案。炼狱和死亡也将通过地面上的墓碑被描绘出来。门廊上有七根大柱子，分别代表圣灵的七种恩赐。在柱子的基座上有七宗罪的象征，而在顶部则是七种天赐的美德。"
 je_gaudi_sagrada_phase_9_goal: "#E 建造进度#!达到#BLUE 120#!点。目前我们拥有#G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#!点，通常我们每月获得一点。"
 je_gaudi_sagrada_phase_10: "圣家堂：耶稣之尖塔"
 je_gaudi_sagrada_phase_10_reason: "耶稣塔与四座福音书作者塔之间通过四座桥相连，塔顶是一座高13.5米、有六臂的巨大十字架。在其中央部分，有一只羔羊，以及刻有“因为只有袮是圣的，只有袮是主，只有袮是至高无上的。”的铭文，还有“阿门”和“哈利路亚”的字样。十字架的四臂上将射出强光，以自远处可见，以纪念圣经中定义耶稣为“我是世界的光”的经文。耶稣塔内部将分为三层，象征着宇宙的创造以及与基督相关的“我是道路、真理、生命”的段落。"
