 je_gaudi_gyeong_phase_1: "重建景福宫"
 je_gaudi_gyeong_phase_1_reason: "景福宫是汉城的一座宫殿。它是朝鲜王朝时期建造的五大宫殿中最早建成且规模最大的一座。景福宫由朝鲜王朝的开国君主太祖李成桂下令修建，于1395年完工。该宫殿曾作为朝鲜王室的主要居所，直至1592年在壬辰倭乱中被日军摧毁。宫殿在大火中焚毁，之后近300年未曾重建。或许现在是重建它的最佳时机？"
