 pm_gaudi_magnetic_observatory: "地磁台"
 je_gaudi_magnetic_observation: "地磁观测"
 je_gaudi_magnetic_observation_reason: "第一座地球物理观测站是由约翰·卡尔·弗里德里希·高斯在哥廷根建立的，他还在1832年时为其加造了一台磁力仪。高斯意识到，为了定位波动和更精确的测量静磁场，他必须在全球范围内同时进行测量。为此，他和威廉·爱德华·韦伯、亚历山大·冯·洪堡三人于1836年建立了哥廷根磁学协会。为了使得遍布全球各地的测量站协同测量地球磁场的波动，多达50座天文台参与了该项目，其中：欧洲35座、亚洲6座、北美洲3座、大洋洲4座；包括英国皇家学会在内都给在哥廷根的他们提供了数据，并由高斯和韦伯进行科学处理分析。"
 je_gaudi_magnetic_observation_goal: "收集#G 100#!@gaudi_magnetic_data!#O 磁测数据#!。这将依靠国际努力，磁学协会的每一个成员都会作出贡献。"
 tesla_set_magnetic_association_tt: "成立磁学协会。其余的国家将能仪器加入并建立#O 地磁台#!来收集@gaudi_magnetic_data!#O 磁测数据#!送到哥廷根。"
 tesla_add_magnetic_association_member_tt: "加入磁学协会。各位成员将向哥廷根发送@gaudi_magnetic_data!#O 磁测数据#!并从研究成果中受益。"
 tesla_add_x_magnetic_data_minus_x_tt: "失去[SCOPE.GetValue('magnetic_data_amount')|0+]@gaudi_magnetic_data!#O 磁测数据#!。"
 tesla_add_x_magnetic_data_minus_1_tt: "失去[SCOPE.GetValue('magnetic_data_amount')|0+]@gaudi_magnetic_data!#O 磁测数据#!。"
 tesla_add_x_magnetic_data_0_tt: "未获得@gaudi_magnetic_data!#O 磁测数据#!。"
 tesla_add_x_magnetic_data_plus_1_tt: "获得[SCOPE.GetValue('magnetic_data_amount')|0+]@gaudi_magnetic_data!#O 磁测数据#!。"
 tesla_add_x_magnetic_data_plus_x_tt: "获得[SCOPE.GetValue('magnetic_data_amount')|0+]@gaudi_magnetic_data!#O 磁测数据#!。"
 gaudi_geomagnetical_knowledge_modifier: "地磁知识"
 gaudi.1401.t: "磁学协会的新成员"
 gaudi.1401.d: "[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName]今天加入了哥廷根地磁学协会，受到了其他成员的热烈欢迎。"
 gaudi.1401.f: "加入协会后，[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName]博士了解了如何建造一座基础地磁台的必要知识。协会主席也给了我们的工程师一份观测站和磁强计的规划。整个协会都推动着建筑计划迅速进行，尽快将第一批数据发送至哥廷根。"
 gaudi.1401.g: "我们要立即建造一座地磁台。"
 gaudi.1402.t: "地磁台竣工"
 gaudi.1402.d: "地磁台今天竣工了。过去几个月获取的大量数据已传送至哥廷根。"
 gaudi.1402.f: "获得的测量数据除用于地球磁场的科学研究外，也有实际应用。在过去和现在，磁偏图被用于航海和航空导航。在寻找矿床和油田上，地磁测量数据也至关重要。"
 gaudi.1402.g: "为了地磁科学！"
 gaudi.1403.t: "国际磁测数据收集"
 gaudi.1403.d: "来自世界各地的地磁数据经过专业人员多年的收集和比较，哥廷根的研究人员们得出了个有趣的结果。"
 gaudi.1403.f: "在1839年，高斯证实了静磁场大多来自于地球内部，而地磁中的小型短期变化则来自于地外。他与韦伯一起发表了名为《磁学协会观测结果》的报告刊物，共6卷。并在另外一卷发布了《地球磁场图》，给出了当时地球上每个地点的有效磁测数据。图中的磁场线连接了相同的磁偏角、磁倾角、磁场强度点。这份刊物是自然科学史上的一座里程碑。"
 gaudi.1403.g: "令人印象深刻的成就。"
 gaudi.1404.t: "航海兴趣点"
 gaudi.1404.d: "[SCOPE.sCharacter('gaudi_admiral_scope').GetFullName]对[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName]的地磁研究表现出了极大的兴趣。他现在在建设中的地磁观测站的进行了一次成功的实验。"
 gaudi.1404.f: "“我该拿这条青蛙腿咋整啊？哦，没啥事，真没啥事……”"
 gaudi.1404.g: "新知识应该对他有用。"
 gaudi.1404.h: "这些知识应该能使所有人受益。"
 gaudi.1405.t: "异常现象"
 gaudi.1405.d: "尽管进行了重新测量，但[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName]博士记录的地球磁场数据与预期不符。原因尚且不明。"
 gaudi.1405.f: "地球磁场在一地与其他地不同的原因有很多。人们经常会对这类现象进行假设，如：该地有大型金属矿床什么的；这就是为什么地磁学研究与开采业并非无关联的原因。"
 gaudi.1405.g: "我们应该直接把数据送到哥廷根。"
 gaudi.1406.t: "天文学家咨询地磁台"
 gaudi.1406.d: "[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName]博士与[GetPlayer.MakeScope.GetVariable('verrier_astronomer_var').GetCharacter.GetFullName]进行了场慷慨激昂的交流。这次交流极大的拓展了[GetPlayer.MakeScope.GetVariable('verrier_astronomer_var').GetCharacter.GetLastName]的科学见解。"
 gaudi.1406.f: "‘这就是为什么面包掉地上总是蘸酱的那面朝地的原因！’"
 gaudi.1406.g: "这将帮助[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetHerHim]的实际研究。"
 gaudi.1406.h: "这将帮助[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetHerHim]在理论研究中取得进展。"
 pmg_gaudi_communication: "通信"
 pm_gaudi_no_communication: "无通信"
 pm_gaudi_telegraph_office: "电报局"
 gaudi_building_telegraph_network_modifier: "用电报连接国家"
 gaudi_telegraphy_network_modifier: "国家电报网"
 gaudi_mocked_by_telegram_modifier: "被电报嘲弄"
 je_gaudi_telegraphy_network: "建造电报网络"
 je_gaudi_telegraphy_network_reason: "原则上来说，因为铁路系统的协调需求而建造的电线杆的缘故，电报局只能建立在已建立铁路的地方。开设新的办公楼大致需要一年的时间，[concept_tesla_engineer]则可以加快这一进度，如果是[concept_tesla_electrical_engineer]还能更进一步。电磁学的发明也促进了这一进展。在他国或飞地建造电报局也需要电磁学。不然的话电报局只能在相邻的有电报局的地区修建。"
 gaudi.1411.t: "国家电报网络"
 gaudi.1411.d: "[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName]博士今天提出了修建一条新电报线来链接[GetPlayer.GetName]的计划。这让人与人之间的联系更加紧密了。"
 gaudi.1411.f: "1837年，塞缪尔·莫尔斯发明并获得了录音电报机的专利。他的助手阿尔弗雷德·韦尔发明了称为寄存器的用于记录接收信息的仪器。它通过电磁体操作触笔在纸带上印点或画线。莫尔斯和韦尔借此发明了莫尔斯电码信息字母表。1838年01月11日，莫尔斯在新泽西州莫里斯敦左近的斯皮德韦尔钢铁厂处，通过3公里的电线发出了美国第一封电报，尽管如此，莫尔斯最后还是在1844年才发出了带有信息的电报，电报带着“上帝所行之事”的信息从华盛顿的国会大厦穿越了71公里的路程抵达了巴尔的摩的旧克莱尔山车站。"
 gaudi.1411.g: "..‑. .. ‑. ."
 gaudi.1412.t: "电报网络已停止"
 gaudi.1412.d: "政府已下令停止扩建电报线路。"
 gaudi.1412.f: "今天下达了以下命令，这就是为什么从现在开始将所有工作暂停：\n\n‑.‑. ‑‑‑ ‑. ... ‑ .‑. ..‑ ‑.‑. ‑ .. ‑‑‑ ‑. / ... ‑ ‑‑‑ .‑‑. ‑‑..‑‑ / ‑. ‑‑‑ .‑‑ ‑.‑.‑‑"
 gaudi.1412.g: "我们目前正在完成施工。"
 gaudi.1413.t: "电报网络已完成"
 gaudi.1413.d: "在以前来说无法建立电报杆的地点，今日得以隆重竖立完工。我国每个地区都已经并入了电报网络，讯息将可从极南到极北的传递。"
 gaudi.1413.f: "用电报网络覆盖全国是一项壮举。与国际电报网络接轨将极大的促进思想的交流。当然了，这只是开始：如果一块新地区未能并入电网，那我们必须也在那儿设立电报局。我们幻想有一天，也有会有种无需电报线信息传递方式……"
 gaudi.1413.g: "..‑. .‑ ‑. ‑ .‑ ... ‑ .. ‑.‑."
 gaudi.1414.t: "通过电报连接的大学"
 gaudi.1414.d: "[SCOPE.sState('gaudi_university_state_1').GetName]和[SCOPE.sState('gaudi_university_state_2').GetName]通过电报线直连。科学家们希望这能促进更多交流构思。"
 gaudi.1414.f: "“在现代科学所有伟业之中，电报无疑是最超凡脱俗的，它对人类来说是最伟大且实用的……地球将被电流所环绕，因人类的思绪和情感而悸动……它是如此的强而有力，如此，如此它必将成为世界文明的枢纽！它通过一条至关重要的纽带，将世界各国紧密地联系在了一起。古老敌意和旧有的偏见将不复存在，在它被创造之时，在世界各国思想文化碰撞之时。”\n——奥古斯都·马弗里克"
 gaudi.1414.g: "这将加强技术研究。"
 gaudi.1414.h: "这将加强自然研究。"
 gaudi.1414.i: "这将加强考古研究。"
 gaudi.1415.t: "给你邻居的电报"
 gaudi.1415.d: "[SCOPE.sState('gaudi_our_telegraph_state').GetName]的电报站与相邻的[SCOPE.sState('gaudi_neigbour_telegraph_state').GetName]建立了连接。现在我们可以给邻居发电报了。"
 gaudi.1415.f: "电报能有助于国际间关系的理解与改善。但，有些电报则不然。"
 gaudi.1415.g: "发一封友好的电报以加强我们的关系。"
 gaudi.1415.h: "发一封嘲弄的电报来惹恼他们政府的元首。"
 gaudi.1416.t: "来自邻居的电报"
 gaudi.1416.d: "我们邻居[SCOPE.sCountry('gaudi_telegram_country').GetName]建立了电报线，并给了我们一封的友好消息。"
 gaudi.1416.f: "‘为了好邻居。’"
 gaudi.1416.g: "电报？给我的？我们也应该回一个！"
 gaudi.1417.d: "今天收到了一封来自[SCOPE.sCountry('gaudi_telegram_country').GetName]的第一封官方电报。显然他们是想愚弄我们！"
 gaudi.1417.f: "‘[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle][SCOPE.sCharacter('gaudi_ruler').GetFullName]有跳蚤。’"
 gaudi.1417.g: "这应该是一封小丑电报吗？"
 gaudi_building_radio_network_modifier: "老少皆宜的广播电台"
 gaudi_radio_network_modifier: "广播电台网络"
 je_gaudi_radio_network: "建造广播电台网络"
 je_gaudi_radio_network_reason: "只要该国有铁路，就可以在其任一地建造广播电台——无需事先建造电报网络。建造一座新的广播电台大致需要一年的时间，[concept_tesla_engineer]则可以加快这一进度，如果是[concept_tesla_electrical_engineer]还能更进一步。"
 gaudi.1421.t: "无线网络"
 gaudi.1421.d: "无线电报的发明使奇迹成为可能。从今往后，只要设备得当，信息就能从任一地发送至另一地，且无需任何发送塔。"
 gaudi.1421.f: "1897年，卡尔·费迪南德·布劳恩加入了无线电先驱的行列。他的主要贡献是在发射机的发电部分引入了封闭调谐电路，通过电感耦合将其与辐射部分（天线）分离，后来又使用晶体进行接收。1898年，无线电报引起了布劳恩博士的全部注意，此后的许多年里，他几乎全身心投入到解决无线电报问题的任务中。布劳恩博士在无线电领域著述颇丰，并因在《电工》和其他科学期刊上发表的许多文章而广为人知。1899年，他申请专利“远距离电报通信”。"
 gaudi.1421.g: "给各地安上天线！"
 gaudi.1422.t: "无线网络已停止"
 gaudi.1422.d: "新的天线和无线电台的建设暂时中止了。如果我们有[concept_tesla_electrical_engineer]的话，便可随时能继续施工。"
 gaudi.1422.f: "“我给世界带来的究竟是祝福还是危险？”——古列尔莫·马可尼"
 gaudi.1422.g: "我们目前正在完成施工。"
 gaudi.1423.t: "无线电网络完成"
 gaudi.1423.d: "[GetPlayer.GetName]的物理学家和工程师们可以自豪的宣布无线已经覆盖了整个国家！"
 gaudi.1423.f: "“我的主要问题是这个想法太基本，逻辑太简单了，以至于难以置信无人将其付诸实践。”——古列尔莫·马可尼"
 gaudi.1423.g: "听广播电台！"
 gaudi.1424.t: "第一个广播电台节目"
 gaudi.1424.d: "在[SCOPE.sState('gaudi_radio_state').GetName]播出的第一个私人广播节目使得人们对这种新式媒体兴趣倍增，附近的工厂做好大量生产的准备了，毕竟客户们马上就要从地里长出来了。"
 gaudi.1424.f: "1909年，位于加利福尼亚州圣何塞的查尔斯·戴维·“医生”·赫罗德和他的无线与工程学院的学生创建了世界上第一家新闻台，并以14瓦的功率定期播出维持节目运行。1921年，这个电台（现为商业电台）被赠予了KQW，后来被CBS接管。"
 gaudi.1424.g: "每家都有广播吗？"
 gaudi.1425.t: "广播煽动"
 gaudi.1425.d: "政治宣传也会随着科技变化而变化。[SCOPE.sCharacter('gaudi_opposition_leader').GetFullName]开办了一家自己的小型广播频道，他们的支持者每天都会收听。以前的无政治倾向者也乐于收听该节目。"
 gaudi.1425.f: "“早上好，亲爱的听众们，现在是早间新闻时间。足球选拔赛将在周五下午举行，当然如果我们的[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]能应付糟糕的球场的话。我有个疑问，就是[SCOPE.sCharacter('gaudi_ruler').GetFullName]实际上是做什么吃的？他是[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]吧？他有什么议程？他是在骗谁，我们？还是他？让我们问问这些问题。此外，谁真的给[SCOPE.sCharacter('gaudi_ruler').GetFullName]投票啊，拜托，我都没这么做。现在给他投票的人都摸不着头脑的说‘我可不是内阁成员，我和大家都一样，都是普通人，我也只是想知道……想知道国家发什么事了’。”"
 gaudi.1425.g: "查封这家广播电台！"
 gaudi.1425.h: "我们是自由的国家，你可以畅所欲言的广播。"
 gaudi.1426.t: "令人不安的广播剧"
 gaudi.1426.d: "广播剧中的第一幕在不知情的听众中引起了巨大恐慌，他们错把这个虚构的故事当做了新闻。"
 gaudi.1426.f: "“女士们，先生们，这里是奥逊·威尔斯。我向你们保证，《世界大战》只是个礼物，除此外没有其他意思；水星剧院自己的广播版本，就是穿着床单从灌木丛中跳出来，说‘啊哈！’从现在开始，我们无法在明天晚上之前洗完你们所有的窗户，偷走你们所有的花园大门，所以我们做了下一个最好的事情。我们就在你们耳边消灭了这个世界，彻底摧毁了CBS。我希望大伙能松一口气，因为我们不是故意的，这两家机构仍在营业。所以，再见，请大伙明天能记住今晚会学到的可怕教训。们客厅里那个咧嘴微笑、闪闪发光、球形的入侵者是南瓜地里的居民南瓜头，如果你的门铃响了，但没有人，那肯定不是火星人，因为明天是万圣节。”——奥逊·威尔斯"
 gaudi.1426.g: "火星人入侵？你信吗？"
 gaudi.1426.h: "还好我们早有准备！"
 gaudi.1420.t: "跨大西洋电缆"
 gaudi.1420.d: "现在，跨大西洋电缆连接纽芬兰和爱尔兰两个地点。大陆之间交换了第一条信息。"
 gaudi.1420.f: "“比起征服者在战场上赢得的胜利，这次胜利更加光荣，因为它对人类更加有用。愿大西洋电报在天国的祝福下，成为兄弟国家之间永久和平与友谊的纽带，成为主注定要在全世界传播宗教、文明、自由和法律的乐器。”——詹姆斯·布坎南"
 gaudi.1420.g: ".... . .‑.. .‑.. ‑‑‑ ‑.‑.‑‑"
 gaudi.1430.t: "跨大西洋传输"
 gaudi.1430.d: "人类进步的奇迹：今天第一条信息通过无线方式跨越大西洋！"
 gaudi.1430.f: "—s—"
 gaudi.1430.g: "这真管用吗？在空中发消息？"
 je_gaudi_transatlantic_cable: "跨大西洋电缆"
 je_gaudi_transatlantic_cable_reason: "通过在大西洋两岸建立电报站，有可能要铺设海底电报电缆，使欧洲和美洲更加紧密。"
 je_gaudi_transatlantic_radio: "跨大西洋传输"
 je_gaudi_transatlantic_radio_reason: "这听起来像魔法，但通过先进的科技，发送跨越大西洋的信息比电报电缆要容易得多。这将解决电缆周而复始因断裂问题导致的通信中断。"
