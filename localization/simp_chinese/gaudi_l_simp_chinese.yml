 je_gaudi_sagrada_phase_2: "圣家堂：半圆后殿"
 je_gaudi_sagrada_phase_2_reason: "高迪基本上按照德尔·维拉的计划完成了他所开始的地下圣堂，其中拱顶是高迪的修改。在19世纪80年代中期，就可以在其中举行第一次仪式，地下圣堂于1889年完工。在建造地下圣堂的同时，高迪开始对教堂的建造计划进行根本性的重新设计。1885年，他提出了一个采用哥特式设计风格的新计划，尽管规模比现在的计划要小，却有18个可以分辨的尖塔。1893年完成的半圆形后殿的外墙比德尔·维拉原本的设计更高。它包含了新哥特式元素，但在哥特式形式的独特使用、自然主义风格的滴水嘴兽雕塑以及尖顶等方面显示了高迪的个人风格。"
 je_gaudi_sagrada_phase_2_goal: "#E 建造进度#!达到#BLUE 120#!点。目前我们拥有#G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#!点，通常我们每月获得一点。"
 je_gaudi_sagrada_phase_3: "圣家堂：诞生立面"
 je_gaudi_sagrada_phase_3_reason: "为了纪念耶稣的诞生，诞生立面使用可以让人联想到生活元素的场景做装饰。高迪的自然主义风格特点是，这些雕塑被恰当地安排和装饰在自然界的场景于图像上，每一个都是其自身的象征。诞生立面朝向东北方向的旭日，这象征着基督的诞生。它被分为三个门廊，每个门廊都代表一种神学美德（希望、信仰和慈善）。生命之树耸立在慈善门廊的耶稣之门上。"
 je_gaudi_sagrada_phase_3_goal: "#E 建造进度#!达到#BLUE 120#!点。目前我们拥有#G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#!点，通常我们每月获得一点。"
 je_gaudi_sagrada_phase_4: "圣家堂：中殿"
 je_gaudi_sagrada_phase_4_reason: "教堂的平面图采用带有五个走廊的拉丁十字形。内部的柱子是高迪独特的设计。除了支撑重量外，它们不断变化的表面是各种几何形状交错的结果。最简单的例子是正方形底座逐渐变成八边形，然后是十六边形，最终变成圆形。基本上，内部几乎没有表面是水平的；装饰全面且丰富，主要由结合了平滑曲线和锯齿状尖角的抽象形状组成。即使是铁制的阳台和楼梯栏杆也充满了曲线的装饰。"
