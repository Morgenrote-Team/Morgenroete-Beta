 gaudi.801.t: "美术宫开始建设"
 gaudi.801.d: "拆除国家剧院后，墨西哥有了足够的空间来建造一座专门用于文化活动的大型宫殿。[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle][SCOPE.sCharacter('gaudi_ruler').GetFullName]今天举行了奠基仪式。"
 gaudi.801.f: "这里已知最古老的建筑是圣伊莎贝尔修道院，其建于1680年。位于圣伊莎贝尔小巷的一部分建筑在19世纪后半叶被拆除，取而代之的是国家剧院。在19世纪末20世纪初，这座剧院曾是墨西哥城大部分高级文化活动的场所，上演戏剧、歌剧、舞蹈等节目。后来，为了迎接1910年即将到来的墨西哥独立百年庆典，人们决定用一座更豪华的建筑来取代这座剧院。旧剧院于1901年被拆除，新剧院被命名为美术宫（Gran Teatro de Ópera）。"
 gaudi.801.g: "墨西哥将成为一流的文化国家！"
 gaudi.802.t: "美术宫：第一阶段完成"
 gaudi.802.d: "美术宫的雏形已经耸立在墨西哥城之中。居民们已经感觉到，在他们的眼皮底下，一座奇观正在成长。"
 gaudi.802.f: "阿达莫·博阿里在他的设计中融合了当时的各种风格，以贝尔·埃波克风格、新古典主义风格和前西班牙风格为主。宫殿的外立面由白色大理石制成，内部则使用了不同颜色的大理石。正因为如此，这座建筑的重量非常巨大，以至于宫殿现在比周围的街道低了几米。"
 gaudi.802.g: "门票预售何时开始？"
 gaudi.803.t: "美术宫的建设继续进行"
 gaudi.803.d: "美术宫已基本完工，但除了进一步的建筑工程外，美术宫内部华丽而精致的装饰工作也已开始"
 gaudi.803.f: "宫殿的墙壁上装饰着各种著名的壁画家的作品，包括何塞·克莱门特·奥罗斯科、迭戈·里韦拉和大卫·阿尔法罗·西克罗斯的壁画。宫殿里还有安德烈·阿拉尔的雕塑，这些雕塑是献给七位缪斯女神的。宫殿的十扇华丽的铁门是由意大利人亚历山德罗·马祖科特利定制的。装饰主穹顶顶部的青铜雕塑群是由匈牙利人盖扎·马罗蒂制作的，而实际的穹顶的设计则是由罗伯托·阿尔瓦雷斯·埃斯皮诺萨以装饰风艺术风格完成的。"
 gaudi.803.g: "装饰风艺术之梦"
 gaudi.804.t: "美术宫竣工"
 gaudi.804.d: "经过多年的建设和一些意外的延误，墨西哥城现在有了一个新的地标：美术宫以其文化力量超越了整个国家。"
 gaudi.804.f: "这座建筑于1934年完工，并于同年11月29日正式开放。剧院的首演作品是胡安·鲁伊斯·德·阿拉孔的《可疑的真相》，这是一部拉丁美洲巴洛克戏剧的杰作。1946年，国立美术学院成立，作为一个政府机构，旨在促进艺术的发展。"
 gaudi.804.g: "音乐、文字、绘画融为一体！"
 gaudi.809.t: "墨西哥城失陷！"
 gaudi.809.d: "由于丢失墨西哥城，我们失去了继续建造美术宫的一切机会。"
 gaudi.809.f: "如果因任何原因失去了墨西哥，建筑进度将不会全部丧失。只有墨西哥可以在最新的施工阶段继续建造美术宫。然而，外来入侵者不会对继续建造表现出兴趣。"
 gaudi.809.g: "我们不能允许他们掌控墨西哥城太久！"
 gaudi.811.t: "一项捐赠"
 gaudi.811.d: "我们政府对进一步建造美术宫的兴趣是可以理解的，现在[SCOPE.sCharacter('gaudi_government_leader').GetFullName]对此特别关注，并募集捐款。"
 gaudi.811.f: "有谣言称，这些钱很可能是党派资金中需要赶紧消失的“黑钱”。当然，这纯粹是反对党的捏造。"
 gaudi.811.g: "太感谢了。"
 gaudi.812.t: "工会批评工作条件"
 gaudi.812.d: "[SCOPE.sCharacter('trade_unions_leader').GetFullName]今天在议会上表示对美术宫建筑工地上令人震惊的工作环境遗感到失望。"
 gaudi.812.f: "“美术宫应该成为我们国家的文化中心，一个人们只致力于真善美的地方。但是政府对普通工人的剥削，让他们在最不利的条件下挣扎，只为了让其他人享受这种美，这与这个项目本应具有的审美者的品格形成了赤裸裸的矛盾。”"
 gaudi.813.t: "沼泽地面"
 gaudi.813.d: "凹凸不平的沼泽地给美术宫的设计带来了新的问题。大楼越来越有沉入地下的危险。应对措施继续实际施工。"
 gaudi.813.f: "墨西哥城是一个蔓延无际的城市，无论古今，都是世界上最大的城市之一。但这样的状况并非有利。它的前身是阿兹特克的特诺奇蒂特兰，一个坐落在湖泊中央的城市。随着时间的推移，这个湖泊被逐步抽干，泥沼般的土地早已显露出不稳固的本质。深井的开凿更是加剧了这一问题。一些巴洛克风格的教堂已经比建造时下沉了许多。美术宫也是如此。"
 gaudi.813.g: "该死的特斯科科湖！"
 gaudi.814.t: "新机器"
 gaudi.814.d: "技术进步意味着美术宫的进度比最初预计的要好。"
 gaudi.814.f: "“电梯？你不再需要楼梯了？所以，你可以让自己被推上去？建筑材料也可以？为什么以前没人告诉我们这些？”"
 gaudi.815.t: "罢工威胁"
 gaudi.815.d: "如果我们不就更高的报酬展开谈判，美术宫的工人即将宣布罢工。"
 gaudi.815.f: "啊，罢工的美妙世界！如果你没有在拉丁美洲经历过因铁路工会突然决定搞点破坏而被困在火车站的感觉，那你一定错过了很多。今天只影响了一个建筑工地。我们真的很幸运！"
 gaudi.815.i: "叫军警来！"
 gaudi.816.t: "立面倒塌导致工人死亡"
 gaudi.816.d: "美术宫的建筑工地上发生了一起严重的事故——立面倒塌，导致数十名工人受伤，数人死亡。"
 gaudi.816.f: "事故发生原因尚未确定，首席建筑师已在接受质询。有些人猜测是因为挪用资金导致建筑材料质量过于低劣。也有证据显示原本设计确实存在缺陷。可以确定的是，一整块立面的倒塌砸中了几十名工人，还完全摧毁了别的一些已经建成的部分。"
 gaudi.817.t: "美术宫建设加快"
 gaudi.817.d: "美术宫的建设进展比预期更快，但原因不明。"
 gaudi.817.f: "出于未知原因，辉煌的美术宫的建设正在顺利进行。也许是天气晴朗的缘故。也许是圣母玛利亚的祈祷。也许是我们前几天浪费的劣质建筑材料，我们希望永远不会被发现。有一件事是肯定的：这个庞然大物，由于各种各样的情况而屡次延期，应该比预期的更快完工。只要泥泞的地面不让建筑再次下沉的话……"
 gaudi.817.g: "完美！"
 gaudi.818.t: "墨西哥城的考古调查"
 gaudi.818.d: "访问建筑工地后，[SCOPE.sCharacter('gaudi_archaeologist').GetFullName]发现美术宫建立在阿兹特克遗迹之上。他申请发掘许可。"
 gaudi.818.f: "特诺奇蒂特兰是阿兹特克帝国的首都，也是墨西哥城的前身。在西班牙人的征服之后，它被大部分摧毁，一些遗迹被扔进周围的特斯科科湖，或者被用作新建筑的材料。在一些殖民时代的老房子中，仍然可以发现阿兹特克的废墟。"
 gaudi.819.t: "墨西哥城的新工作"
 gaudi.819.d: "美术宫的修建导致大量人口涌入墨西哥城。"
 gaudi.819.f: "墨西哥城的历史意义源于殖民前的特诺奇蒂特兰，这里曾是阿兹特克帝国的政治、经济和文化中心。西班牙人征服后，将其改造为殖民地的总督府。19世纪末，铁路的发展进一步提升了它的地位。20世纪初，它不仅是金融和贸易的枢纽，也是工业的重镇。为了寻求就业机会，大批人口涌入这座城市。美术宫等建筑工程也为它增添了魅力。"
