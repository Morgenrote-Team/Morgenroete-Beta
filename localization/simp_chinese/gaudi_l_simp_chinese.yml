 je_gaudi_ringstrasse_phase_2: "维也纳环城大道：宫廷歌剧院和新市政厅"
 je_gaudi_ringstrasse_phase_2_reason: "在决定在被拆除的维也城墙的原址上建造一条宏伟的林荫大道后仅10年，环城大道就落成了。但当时道路附近仍然被荒地所占据。在随后的几年里，最重要的项目之一是建立了一座大型的新歌剧院，也即后来成为维也纳国家歌剧院。新市政厅也是在这一时期建成的，在此期间，环城大道从一条单纯的大道变成了以宫殿和公共建筑为主的维也纳新中心。"
