 je_gaudi_ringstrasse_phase_1: "维也纳环城大道：环路之王"
 je_gaudi_ringstrasse_phase_1_reason: "维也纳环路是在19世纪中期拆除城墙后建造的。从1860年代到1890年代环城大道沿线建造了许多大型公共建筑，采用了古典主义、哥特式、文艺复兴和巴洛克等多种建筑风格，有时被称为“环路风格”（Ringstraßenstil）。整个环路上建造了许多公共和私人建筑。贵族和其他富裕阶级迫切希望建造代表性的公馆（环路宫殿），采用了宏伟的历史主义风格。"
