 gaudi.1321.t: "新式野战工事开发完成"
 gaudi.1321.d: "我们的[concept_tesla_military_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')]多年来一直致力于为我们的军队研发一种新式的野战和防御工事的建造法。如今我们的士兵可以用更先进的技术建造野战和防御工事来保护自己了。"
 gaudi.1321.f: "“除了挡不住耗子和虫豸，这座防御工事给人一种安如泰山的感觉！”"
 gaudi.1321.g: "只有铜墙铁壁才能保护好士兵的生命！"
