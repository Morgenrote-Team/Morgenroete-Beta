 gaudi_states_with_roads_tt: "所有[GetPlayer.GetAdjective]的地区拥有$gaudi_modern_roads_modifier_with_tooltip$[concept_modifier]（当前[GetPlayer.MakeScope.GetVariable('gaudi_num_states_roads_var').GetValue|+0]/[GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0]）。"
 gaudi.1101.t: "[GetPlayer.GetName]的现代化道路"
 gaudi.1101.d: "我们的[concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')]最终完成了[GetPlayer.GetNameNoFormatting]的道路现代化项目。现在我们的道路被认为是全世界最现代化的，这将促进我国的商业和旅游业发展。"
 gaudi.1101.f: "“我记得那时候我们连路都没有，每天我们都要在密林中自己开路！你们年轻人过得太轻松了！政府会提供你们所需的一切！你们根本不用工作！”"
 gaudi.1101.g: "现在，我们终于可以不用再颠簸出行了！"
 je_gaudi_bridge_project: "新桥"
 gaudi_states_with_bridges_tt: "所有[GetPlayer.GetAdjective]的地区拥有$gaudi_new_bridge_modifier_with_tooltip$[concept_modifier]（当前[GetPlayer.MakeScope.GetVariable('gaudi_num_states_bridge_var').GetValue|+0]/[GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0]）。"
 gaudi.1121.t: "[GetPlayer.GetName]的桥梁"
 gaudi.1121.d: "我们的[concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')]已经完成了[GetPlayer.GetNameNoFormatting]的桥梁建设。现在这些桥横跨两岸，联通南北，马上就要有大量的商人和游客要来了！"
 gaudi.1121.f: "“桥？谁需要？我年轻的时候，大家都是游过河！现在那些年轻崽甚至都不会游泳了！以后我们的乡土会变成啥样啊！”"
 gaudi.1121.g: "有整整七座桥可供通行！"
 je_gaudi_tunnel_project: "新隧道"
 gaudi_states_with_tunnels_tt: "所有[GetPlayer.GetAdjective]的地区拥有$gaudi_new_tunnel_modifier_with_tooltip$[concept_modifier]（当前[GetPlayer.MakeScope.GetVariable('gaudi_num_states_tunnel_var').GetValue|+0]/[GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0]）。"
 gaudi.1131.t: "[GetPlayer.GetName]的隧道"
 gaudi.1131.d: "我们的[concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')]已经完成了贯通[GetPlayer.GetNameNoFormatting]山脉的隧道。现在这些隧道大大便捷了商贸交通，我们的工业可能会因此受益！"
 gaudi.1131.f: "“我是个侏儒，我在挖一个洞！挖挖洞，挖个洞！”"
 gaudi.1131.g: "你有没有碰巧挖到金子？"
