 je_gaudi_splendid_architecture: "辉煌的新建筑学"
 je_gaudi_splendid_architecture_reason: "随着新艺术与装饰风艺术的涌现，建筑师们颠覆了艺术节，例如将旧时代僵化的历史主义彻底打破。但与许多现代主义流派不同的是，他们的建筑并非功能性与客观性的纯粹表现。装饰风艺术是古典现代主义普遍觉醒中的演进，因此它极致追求优雅形式、精致材料、强烈色彩与感性主题的创造性结合。在其全盛时期，装饰风艺术代表了奢华、魅力、奔放以及对社会和科技进步的信心。遵循以上原则的建筑学将领我们的国家成为现代性与财富的典范。"
 je_gaudi_splendid_architecture_goal: "#E 辉煌建筑#!点数达到#BLUE 10#!点。目前我们拥有#G [ROOT.Var('gaudi_splendid_architecture').GetValue]#!点。通过日志条目建设新艺术街区、装饰风艺术影院、装饰风艺术摩天大楼、装饰风艺术办公室以及装饰风艺术机场将会给予更多点数。"
 je_gaudi_art_nouveau_quarter: "新艺术街区"
 je_gaudi_art_nouveau_quarter_reason: "1890年代，第一批新艺术房屋与内部装饰出现在布鲁塞尔。建筑与室内设计由保罗·汉克尔、亨利·范德维尔德与维克托·奥塔完成，后者的塔塞尔公馆于1893年竣工。这一运动迅速转移到巴黎，并在那里为埃克托尔·吉马尔所接纳，他曾在布鲁塞尔见过奥塔的作品，并将其运用于新巴黎地铁的出入口。新艺术运动从比利时和法国传遍欧洲各地，在每个国家都拥有不同的名称与特质。她不仅在各国首都涌现，同时也被应用于快速发展，渴望建立自己艺术身份的城市（意大利的都灵与巴勒莫、苏格兰的格拉斯哥、德国的慕尼黑与达姆施塔特）以及独立运动的中心（芬兰的赫尔辛基，当时属俄罗斯帝国，与西班牙加泰罗尼亚的巴塞罗那）。"
 je_gaudi_art_deco_cinema: "装饰风艺术影院"
 je_gaudi_art_deco_cinema_reason: "许多现存的装饰风艺术最佳案例是建于20世纪20至30年代的电影院。装饰风艺术时代正值默片与有声片的过渡时期，电影公司建起体量恢弘的展示场所，以吸引庞大的观众群体。20年代的电影宫通常将异域主题与装饰风艺术结合，例如好莱坞的格劳曼埃及剧院（1922）受到古埃及陵墓与金字塔启发，加利福尼亚贝克斯菲尔德的福克斯剧院则在装饰风大堂上加建了一座加州传教会复兴风格的塔楼。"
 je_gaudi_art_deco_skyscraper: "装饰风艺术摩天大楼"
 je_gaudi_art_deco_skyscraper_reason: "摩天大楼是当代的钟塔，但若没有独一无二的钟鸣，钟塔又何用之有？以装饰风艺术风格改建摩天大楼将成为一次声名煊赫的努力，为全世界所敬佩。"
 je_gaudi_art_deco_airport: "装饰风艺术机场"
 je_gaudi_art_deco_airport_reason: "卡拉维尔帆船曾经为欧洲人开拓海洋，将世界各大洲和新大陆连接在一起。如今航空时代已经来临，曾经固定边界正在开放。那么还有风格比奢华而方兴未艾的装饰风艺术更合适迎接新飞船的港口呢？飞行员们，向太阳问好吧！"
 je_gaudi_art_deco_office: "装饰风艺术办公室"
 je_gaudi_art_deco_office_reason: "装饰风艺术风格主宰了商业与娱乐的世界，但政府也希望通过令人印象深刻的现代建筑展现国家的繁荣，并令民众深感自己生活在理想远大的国度。"
 je_gaudi_bauhaus: "包豪斯"
 je_gaudi_bauhaus_reason: "包豪斯是德国的一所艺术学校，始办于1919年，关闭于1933年。该学校将工艺与美术结合起来，以其将个人艺术愿景与大众生产原则相统一，并强调功能性的设计手法著称。该学校秉承着创造综合艺术品（Gesamtkunstwerk）的理念，致力于将各种艺术形式融为一体。包豪斯风格后来成为现代设计、现代主义建筑和建筑教育领域最具影响力的潮流之一。"
 je_gaudi_summer_burn: "火烧圆明园"
 je_gaudi_summer_burn_reason: "圆明园自18世纪上半叶以来一直是清朝皇室的实际居所。它是中国丰功伟绩的象征。毁坏它不仅意味着对敌人的严重羞辱，而且也为获得有价值的战利品开辟了机会……"
