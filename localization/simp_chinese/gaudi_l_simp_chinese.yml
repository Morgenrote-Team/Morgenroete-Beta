 gaudi.1407.t: "发现铁矿！"
 gaudi.1408.t: "发现铅矿！"
 gaudi.1409.t: "发现油田！"
 gaudi.1407.d: "我们的[concept_tesla_engineer]博士[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName]使用最先进的地球物理法在[SCOPE.sState('gaudi_deposit_state').GetName]找到了新铁矿。"
 gaudi.1408.d: "我们的[concept_tesla_engineer]博士[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName]使用最先进的地球物理法在[SCOPE.sState('gaudi_deposit_state').GetName]找到了新铅矿。"
 gaudi.1409.d: "我们的[concept_tesla_engineer]博士[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName]使用最先进的地球物理法在[SCOPE.sState('gaudi_deposit_state').GetName]找到了新铅矿。"
 gaudi.1407.f: "在每局游戏中，工程师可以发现三次特殊的矿脉，即铁、铅、油。这需要积年累月的地磁学识。因此建议玩家尽早开始地磁调查。"
 gaudi.1407.g: "我明白了！"
