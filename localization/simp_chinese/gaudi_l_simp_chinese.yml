 ACHIEVEMENT_DESC_gaudi_kulturnation: "作为一个德意志国家，完成科隆大教堂，发现海王星，建立全德意志音乐协会，设立理查德·瓦格纳音乐节，将伊什塔尔门运送到德国并使首都成为表现主义的发源地。同时需要一名活跃的指挥家和一名活跃的著名考古学家。"
