 je_gaudi_capital_expansion_project: "首都扩展"
 je_gaudi_capital_expansion_project_reason: "1836至1936年间，维多利亚时代的欧洲都城经历了深刻城市变革：巴黎因奥斯曼男爵的林荫大道与轴线景观脱胎换骨；维也纳在1857年拆除城墙，兴建起壮丽的环城大道；柏林凭借密集的出租公寓、工业区及后来的现代主义住宅区迅猛扩张；伦敦则通过铁路郊区、基础设施建设和世界首条地铁不断向外蔓延。这些昔日的皇家城市，最终都蜕变为彰显权力与野心、却又暗藏社会矛盾的现代大都会。"
 gaudi.41.t: "城市破墙而出"
 gaudi.41.d: "古老的城墙正被推倒，取而代之的是开放的空间、充足的光线，以及城市扩张的愿景。"
 gaudi.41.f: "数百年来，[ROOT.GetCountry.GetCapital.GetCityHubName]一直是座有城墙的城市：自守、紧凑、对外封闭。如今，石墙在镐头与炸药下崩塌瓦解。\n\n那些中世纪的防御设施已成废墟。在其原址上，宽阔的林荫大道拔地而起，沿街绿树成荫，建筑庄重典雅。曾经巡逻的兵士身影已然不见，取而代之的是市场货车与漫步的情侣。这些街道不仅仅是交通通道，更象征着城市的自信、开放与不可阻挡的发展步伐。\n\n有人怀念那失落的城门，但[ROOT.GetCountry.GetCapital.GetCityHubName]终于挣脱了枷锁，迎来自由的第一口深呼吸。"
 gaudi.41.g: "我们迈向广阔天地——带着远见，也带着行动的力量。"
 gaudi.42.t: "进步之环"
 gaudi.42.d: "一座崭新的林荫大道环路，将城市与国家紧紧相连。"
 gaudi.42.f: "昔日泥泞不堪的河堤，如今由石砖与钢铁铺就。这条主干道宛如一条珠链，环绕着[ROOT.GetCountry.GetCapital.GetCityHubName]的核心，将各城区以交通与照明重新编织为整体。\n\n它远非普通的修路工程可比。整个街区被重新布局，绿地被开凿成公园，纪念碑被安置于视觉焦点之上。夜幕降临时，煤气灯次第点亮，犹如列阵之星，照亮了秩序与文明的步伐。每一寸路面的铺设，都在书写[ROOT.GetCountry.GetCapital.GetCityHubName]的新生——一个更加井然、更具威仪的形象正缓缓浮现。\n\n政府称其为“都市和谐”，而百姓则开始流连于街头——欣赏那些前所未见的雕塑，在曾被视为禁区的道路间悠然行走。"
 gaudi.42.g: "它不是围城的壁垒，而是引领方向的轨道。"
 gaudi.43.t: "权杖下的长街"
 gaudi.43.d: "新任地方长官正在重塑[ROOT.GetCountry.GetCapital.GetCityHubName]，以轴线为纲，宽阔、笔直、毫无回旋余地。"
 gaudi.43.f: "这并非简单的城市扩展，而是一场彻底的改造手术。\n\n整片社区在测量仪和规划图下消失。曾经曲折迷宫般的街巷，如今被笔直宽阔的大道取代。旧日的小巷不复存在，取而代之的是规整有序的新街——它们总是通向纪念碑、军营或政府机关。\n\n反对的声音开始浮现，但命令已经下达，土地完成征收，建筑立面也已重新排列。如今的[ROOT.GetCountry.GetCapital.GetCityHubName]诉说一种全新的秩序语言：清晰可见、畅通无阻、尽在掌控。壮丽背后，是精密的设计。\n\n贫民称之为“扫荡”，官僚称之为“进步”，而地方长官只说：这是必要的改变。"
 gaudi.43.g: "让每一个角落，都落入蓝图之中。"
 gaudi.44.t: "城市天际线"
 gaudi.44.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]，已非昔日的都城。它是未来的镜像，是万国的倒影。"
 gaudi.44.f: "旧城曾有墙垣，新城却无疆界。钢铁与玻璃如利刃划破旧时代的天幕，轨道在绿地之下穿梭，电光抹去了晨昏的界限。这里是新时代的温床——使馆、银行、美术馆与咖啡馆如异花盛放，根植于铁与火的土地。\n\n异语在拱廊下低吟，高塔向穹顶发出挑战。[ROOT.GetCountry.GetCapital.GetCityHubName]不再等待被定义，它自己书写未来。每一座街区都在诉说同一句真理：这不是一个民族的城市，而是一个城市的众族之邦。"
 gaudi.44.g: "我们在众人目光中升起——因世界已将目光投来，我们便以辉煌回应。"
 gaudi_capital_expansion_project_progress_bar: "首都扩展"
 gaudi_capital_expansion_project_progress_bar_desc: "首都扩展：#v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|1%]#!([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/30)"
 gaudi.511.d: "有关如何美化[ROOT.GetCountry.GetCapital.GetCityHubName]，城市规划者出现了分歧。"
 gaudi.512.t: "环城路上的雕像"
 gaudi.512.d: "一组新的雕像将被树立在[ROOT.GetCountry.GetCapital.GetCityHubName]的新环城路上，但尚不清楚哪位神话人物占有特殊的地位。"
 gaudi.513.f: "建造中的一座新机构原本将成为政府的象征，然而，不断变化的计划、扩张和潜在的腐败使得施工遭到了拖延，如今，资金已经耗尽。通过一些临时措施，未完成的建筑可以投入使用，但这或许不符合政府的利益，公务员们将只能屈居于较小的办公室和比预期更少的舒适设施。继续施工并非不可能，但或许会相当昂贵。"
 gaudi.511.t: "喷泉还是凉亭？"
 gaudi.511.f: "这似乎像是在争论皇帝的胡须，却演变成一场政治纠纷。争议源于一个美学价值与象征意义极高的广场上的建筑项目。一方想在那里建造一个凉亭，另一方则主张建造一个喷泉。由于只有一块空地，只能建造其中一个项目；妥协是不可行的。"
 gaudi.511.g: "我们建造凉亭。"
 gaudi.511.h: "我们建造喷泉。"
 gaudi.511.i: "我对这个地方有自己的规划……"
 gaudi.512.f: "规划环路时，仍有一些细节尚未确定。例如将哪位罗马万神殿中的神灵放在最为险要的位置。不同人群认同各自的神祇——例如，资本家建议将商业之神墨丘利放置在中心位置。贵族则坚持要把众神之父朱庇特放在中央。军方则更喜欢战神马尔斯，学者则想让阿波罗居中。"
 gaudi.512.g: "朱庇特"
 gaudi.512.h: "墨丘利"
 gaudi.512.i: "阿波罗"
 gaudi.512.j: "马尔斯"
 gaudi.513.t: "政府建筑超支"
 gaudi.513.d: "一座新政府部门大楼的建设变成了一桩小小丑闻。"
 gaudi.513.g: "既然设立了预算，就要遵守预算。"
 gaudi.513.h: "很不幸，但很常见。"
 gaudi.513.i: "工程将充分得到所需的时间与资金。"
 gaudi.514.t: "新咖啡馆"
 gaudi.514.d: "环城大道上的一家新咖啡馆已经开张。"
 gaudi.514.f: "“使我们了解一切新鲜事物的最好的教育场所，则始终是咖啡馆。为了明白这一点，必须知道维也纳的咖啡馆是一种非常特别的设施，在世界上还找不出一种类似的设施与之相比较。它实际上是一种只要花一杯咖啡钱人人都可以进去的民主俱乐部。每一位顾客只要花上这么一点钱就可以在里面坐上几小时，可以在里面讨论、写作、玩牌、阅读自己的邮件，而最主要的是可以在里面免费阅读无数的报刊。在一家较好的维也纳咖啡馆里，摆着维也纳所有的报纸，不仅有维也纳本地的报纸，而且还有全德国的报纸，以及法国的、英国的、意大利的、美国的报纸；再加上全世界最重要的文学艺术杂志。所以，我们可以从第一手材料——从每一册新出版的书、从每一场演出中知道世界上发生的一切，并且把各种报纸上的评论进行比较。一个奥地利人能够在咖啡馆里十分广泛地了解到世界上发生的一切，而且能够随时和朋友们进行讨论，也许再也没有比这更能使他头脑灵活和掌握国际动态的了。我们每天坐在咖啡馆里几个小时，可是什么都知道。” ——斯蒂芬·茨威格"
 gaudi.514.g: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle][SCOPE.sCharacter('gaudi_ruler').GetFullName]应该光顾。"
 gaudi.514.h: "这将会提升维也纳的生活水平。"
 gaudi.515.t: "环城路上的宫殿"
 gaudi.515.d: "一位贵族在建设位于[ROOT.GetCountry.GetCapital.GetCityHubName]新城区的宫殿时耗费甚巨，完成了一半的烂尾建筑将可能有碍观瞻。"
 gaudi.515.f: "环路宫殿是指维也纳环城大道上宏伟的宫殿。这些建筑大多是19世纪末由老贵族或银行家和实业家所建造的。这些宫殿以新巴洛克、新文艺复兴与新矫饰主义的折衷风格建造。它们也是地位崛起的象征。然而，其中一位业主最近扩张过度，面临破产。人们已经在嘲笑这座烂尾楼，最坏的情况是必须再次将其拆除，从而延长整个项目的完成时间。"
 gaudi.515.g: "我们承担一部分开支。"
 gaudi.515.h: "和我无关。"
 gaudi.516.t: "首都扩建：进展良好"
 gaudi.516.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]表示首都的扩建过程将会更早完成。"
 gaudi.516.f: "不知道什么原因，建设进展更快：可能是对祖国的热爱、高工资、当地精英的友好支持，或者只是天气较好。"
 gaudi.516.g: "棒极了"
 gaudi.517.t: "首都扩建：进展缓慢"
 gaudi.517.d: "很不幸，[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]监督下的施工管理部门今天不得不承认，[ROOT.GetCountry.GetCapital.GetCityHubName]新城区的建设进度落后于计划。"
 gaudi.517.f: "出于未知原因，一切都进展得较为缓慢：或许是是敌对政治分子的煽动，或是工会对工作道德的破坏，或是妄想家的阴谋，或者仅仅是恶劣的天气。"
 gaudi.517.g: "可惜。"
 gaudi.518.t: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle][SCOPE.sCharacter('gaudi_ruler').GetFullName]的纪念碑"
 gaudi.518.d: "环城大道上正在规划一座新的纪念碑，是我们的君主[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]的雕像。"
 gaudi.518.f: "环城大道展现了奥地利历史的图景。一方面，哈布斯堡王朝的君王们排成一列，其中玛丽亚·特蕾西亚的纪念碑最为华丽。但是像萨伏伊的欧根或施瓦岑贝格这样的将军也为维也纳的城市风景增添了色彩。与此同时，资产阶级也非常注重纪念他们的代表人物，即诗人王子歌德和席勒，以及伟大的作曲家舒伯特、莫扎特和贝多芬。"
 gaudi.518.g: "当[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]是件好事。"
 gaudi.518.h: "不错——但还是专注于完成环城大道吧。"
 gaudi.519.t: "火！"
 gaudi.519.d: "一场毁灭性的火灾摧毁了[ROOT.GetCountry.GetCapital.GetCityHubName]建设工地上的一些建筑。"
 gaudi.519.f: "环城大道上最著名的灾难是1881年12月8日的环路剧院大火。这是19世纪最大的火灾之一，估计有数百甚至上千名遇难者。起火原因是煤气灯故障，导致煤气泄漏并在下次点燃时引爆。火灾随后蔓延到背景车上并迅速进一步蔓延到舞台的其余部分，最终波及到观众席。这场火灾对预防性消防保护产生了国内外的影响，特别是对维也纳剧院区域以及奥地利相关的剧院建设法规。作曲家安东·布鲁克纳原本有当晚的演出门票，但因病在家中未出门而幸免于难。"
 gaudi.519.g: "可怕的一天。"
 gaudi.520.t: "对城市扩张的偏见"
 gaudi.520.d: "乡村民众的代表认为，[ROOT.GetCountry.GetCapital.GetCityHubName]的发展可能对农村的平民人口不利。"
 gaudi.520.f: "“政府在首都展现了无法形容的傲慢气焰，表明他们都是居住在城市里的冷漠人，只看到过几条街道，从未离开过[ROOT.GetCountry.GetCapital.GetCityHubName]。在那里浪费了巨额资金，只有维也纳这个首都受益，而那些住在小城镇或乡村的普通人却察觉不到任何好处。这背后的意识形态青睐集权主义和官僚主义，支持着国家机器；但是，这样一个颓废的工程对于普普通通的人有什么用处呢？”"
 gaudi.520.g: "不如向辛勤工作的乡村人民送上一份友善的礼物？"
 gaudi.520.h: "城市和外省是平等的。"
 gaudi.520.i: "谁在乎这些愚蠢的乡巴佬说什么？"
 gaudi.521.t: "实业家住宅"
 gaudi.521.d: "一位富有的商人建立了一座崭新的公馆，为[ROOT.GetCountry.GetCapital.GetCityHubName]增添了一座伟大建筑。"
 gaudi.521.f: "工业家和银行家的宫殿被视为强调他们在国家中的新地位的一种方式。富有的犹太人后裔也可以以此表明自己得到了解放。维也纳在19世纪的发展为此提供了例证。最著名的环路宫殿之一是爱泼斯坦宫。它为工业家和银行家古斯塔夫·冯·爱泼斯坦爵士建造。建筑师是特奥费尔·翰森，他还设计了相邻的奥地利国会大厦。建筑高达五层，采用在当时典型的新文艺复兴风格。"
 gaudi.521.g: "[ROOT.GetCountry.GetCapital.GetCityHubName]蓬勃发展。"
 gaudi.522.t: "扩建兵营"
 gaudi.522.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]的扩张工程使我们获得了将兵营现代化并加以扩建的机会。"
 gaudi.522.f: "弗朗茨·约瑟夫兵营是维也纳环城大道地区的一座兵营建筑，在很长一段时间内是大型项目建设的障碍。兵营以皇帝弗朗茨·约瑟夫一世的名字命名，建于1848年革命之后的1854年至1857年。兵营建成后不久，便妨碍了从1857年开始的维也纳环路的发展，但军队用了四十年才完全撤出。因此，新的兵营必须先建立起来，以抵消失去弗朗茨·约瑟夫兵营所带来的影响。"
 gaudi.522.g: "扩建兵营。"
 gaudi.522.h: "最好把时间花在别的地方。"
 gaudi.523.t: "扩建建造部门"
 gaudi.523.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]的扩张使我们获得了扩建建造部门的机会。"
 gaudi.523.f: "“我们通常称艺术家的天性为阻止艺术家创作的素质总和。” ——亚瑟·史尼兹勒"
 gaudi.523.g: "扩建施工办公室。"
 gaudi.524.t: "一个美丽的公园"
 gaudi.524.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]的城市公园已经完工并向所有市民开放以供漫步。"
 gaudi.524.f: "新建的城市公园大门敞开。草坪如天鹅绒般铺展，小径在花坛与雕像之间蜿蜒穿行。但最吸引人群的并非绿草，而是声音——乐声从风中飘来，乐亭中小型乐队正演奏着圆舞曲。音乐从昔日专属于沙龙和宫殿的私人享受，转变为人人可听的公共体验。在维也纳这样的城市中，库尔沙龙已经成为市民心中的旋律殿堂。这座宏伟建筑采用意大利文艺复兴风格，坐落在约翰街上，并设有面向公园的宽阔露台。在施特劳斯兄弟活跃的年代，库尔沙龙是舞会与音乐会的热门场所。"
 gaudi.524.g: "让我们散散步。"
 gaudi.524.h: "举办一场音乐会以表庆祝！"
 gaudi.525.t: "扩建歌剧院"
 gaudi.525.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]的扩张使我们获得了将歌剧院现代化并加以扩建的机会。"
 gaudi.525.f: "在林荫大道、拱廊、喷泉与政府大楼之间，现有的歌剧院渐渐显得朴素，甚至有些土气。有识之士提出了新的设想：兴建一座全新的建筑，或是现有场所进行大规模扩建。更多的座位，更佳的音响效果，更具纪念性的立面——一座与城市地位相匹配的文化殿堂。在整个欧洲，这类举措已成为国家声望的象征。在巴黎，加尼叶歌剧院的大理石楼梯和金碧辉煌的穹顶拔地而起；在维也纳，1869年落成的国立歌剧院则以优雅与自豪坐镇环城路之上。"
 gaudi.525.g: "扩建歌剧院。"
 gaudi.526.t: "扩建市政厅"
 gaudi.526.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]的扩张使我们获得了将市政厅现代化并加以扩建的机会。"
 gaudi.526.f: "老市政厅依然保留着几个世纪前的徽章。内部空间逼仄：狭窄的楼梯、拥挤的办公室，账簿堆得比护墙板还高。市长的办公桌只能勉强容得下公文，遑论展现权力。如今有人提议兴建一座全新的市政厅，以回应城市在治理、经济与市民身份认同方面日益扩张的角色。无论选择高耸的塔楼还是内敛的古典主义风格，这座建筑都必须彰显威严与权力。整个欧洲的城市都在回应这一挑战：在维也纳，新哥特式的市政厅于1883年落成，成为市政自信的象征；巴黎在1871年后重建了壮丽而不屈的市政厅；柏林的红色市政厅则融合了文艺复兴形式与普鲁士式的实用主义。"
 gaudi.526.g: "扩建市政厅。"
 gaudi.527.t: "英雄广场"
 gaudi.527.d: "英雄广场竣工后，一些政治领袖正在推动一场配得上它的盛大开幕式。"
 gaudi.527.f: "当环路建成时，“外博物馆广场”作为皇帝广场的一部分由弗朗茨·约瑟夫皇帝亲自设计，但从未完成。原本计划建设一个矩形广场，由利奥波德翼、新霍夫堡宫、哈布斯堡收藏和一个位于现代人民公园位置上但未建成的新城堡所环绕。该广场在1878年被命名为“英雄广场”，得名于安东·多米尼克·费尔科恩创作的两座骑马雕像。较旧的一座是卡尔大公的，于1860年揭幕。与之相对的欧根亲王的骑马雕像也在1865年完成。在第一次世界大战的失利、哈布斯堡‑洛林王朝治下奥匈帝国的瓦解第一共和国成立后，英雄广场成为各个政治阵营的集会点和奥地利军队的游行场所。"
 gaudi.527.g: "举行一场游行并邀请我们的朋友。"
 gaudi.527.h: "在未来几年内建立一项永久阅兵式。"
 gaudi.527.i: "那么谁来付钱呢？"
 gaudi.528.t: "扩建大学"
 gaudi.528.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]的扩张使我们获得了将大学现代化并加扩建的机会。"
 gaudi.528.f: "没有思想的城市怎能称之为伟大？在铁路、政府机构与剧院之间，大学在自身成功的重压下力不从心。学生众多而教室稀缺，院系分散在租来的建筑中，教授们在图书馆和实验室的间隙中争夺空间。提议十分明确：建设一座新校区，或对现有校址进行大规模扩建——现代化的阶梯教室、专属的院系楼宇、一座纪念性的图书馆。项目不仅仅是基础设施的建设，更是对城市知识雄心的宣言。维也纳大学于19世纪70年代迁至环城大道沿线，并重建为一座拥有宏伟立面与中心地位的新校园；在巴黎，儒勒·费里推行的教育改革中，索邦大学得以大规模扩建，以容纳不断壮大的法国学术阶层。"
 gaudi.528.g: "扩建大学。"
 gaudi.529.t: "扩建艺术学院"
 gaudi.529.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]的扩张使我们获得了将艺术学院现代化并加以扩建的机会。"
 gaudi.529.f: "随着城市的扩张，人们对艺术的渴望也与日俱增。然而，画家与雕塑家们却挤在狭小昏暗的阁楼与工作室中，其所学多来自口耳相传或是借来的速写，而非师承名家。因此有人提出了新设想：兴建一所真正意义上的美术学院，设有采光良好的画室、人体解剖教室，以及对公众开放的展览画廊。在整个欧洲，此类学院正塑造着各国的审美趣味。巴黎美术学院为半个欧洲确立了古典艺术的标准；在维也纳，宏伟的造型艺术学院建筑在环城大道上锚定了不可动摇的文化声望。"
 gaudi.529.g: "扩建艺术学院。"
 gaudi.530.t: "乌拉尼亚"
 gaudi.530.d: "乌拉尼亚，所谓的“人民教育中心”已经在维也纳开幕，但其确切目标仍存在争议。"
 gaudi.530.f: "1883年，德国天文学家马克斯·威廉·迈尔作为维也纳大学助教来到维也纳，计算历史和未来的日食。他还讲授民俗学课程，并提出了了一个群众教育机构的想法。然而，由于他在1885年被召回柏林，他的想法得以在当地发展。维也纳的天文馆是根据柏林的乌拉尼亚天文馆建造的：它有800个座位的空间，包括一个可容纳200人的讲堂，科学演示室和一个天文台。然而，这个“临时”的乌拉尼亚几乎无法应对游客的涌入，因此不久之后就需要在环城大道上建造一座新建筑。乌拉尼亚不仅扩展了其教育机会的范围（例如通过语言课程），而且还成为音乐会场地，设有自己的乌拉尼亚交响乐团和乌拉尼亚合唱团。不寻常的形状和结构在维也纳颇具传统层面的争议。但维也纳人喜欢这座建筑，乌拉尼亚很快成为维也纳的地标之一。"
 gaudi.530.g: "它是一座地标建筑。"
 gaudi.530.h: "主要作为娱乐机构。"
 gaudi.530.i: "首先是一座天文台。"
 gaudi.9.t: "城市规划完成"
 gaudi.9.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]完成了[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]在多个城镇的都市规划工作。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U]现已完全恢复可用状态。\n\n已改进建筑总数：[GetPlayer.MakeScope.Var('mr_num_improved_urban_center_buildings_var').GetValue|V0]\n来自项目的$concept_gaudi_architectural_splendour$：[JournalEntry.MakeScope.ScriptValue('gaudi_architectural_splendor_from_urban_planning_for_event_value')|+0]@gaudi_architectural_splendour!"
 gaudi.9.f: "“建筑唯有承载了严谨的想象与深思熟虑的巧思，才堪称伟大。当结构本身成为一幅画卷，每一个细节都诉说秩序之美时，它便不再是冷冰冰的砖石，而是一部令人动容的诗篇。”——亨利·范布伦特"
 gaudi.9.g: "项目繁多，光阴有限。"
 gaudi_architecture_treatise_modifier: "建筑学著作"
 gaudi.8.t: "《[ROOT.Var('gaudi_architect_var').GetCharacter.GetLastName]之建筑论》"
 gaudi.8.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]完成了一部足以传世的著作。它不只是建筑的历史，更是思想的雕刻；它不单描绘砖石梁柱，更铭刻文明的脉动。[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]在其中倾注了对过去的解读、对现实的凝视，以及对未来的远见。"
 gaudi.8.f: "“建筑，是人类思想的纪念碑。每一块石头上，都镌刻着信仰与梦想。”——维克多·雨果"
 gaudi.8.g: "这部作品，不是终章，而是序曲。它属于今日，更属于未来。"
 je_gaudi_architecture_treatise: "建筑学著作"
 je_gaudi_architecture_treatise_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]潜心闭关整年，将[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]的毕生建筑艺术造诣凝练成书。这部巨著堪称[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]的生命宣言，囊括其全部建筑实践与理论精髓。[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U]的声望固然是衡量著作价值的关键标尺，但$literary$、$erudite$、$innovative$与$aesthete$等特质同样为作品增色不少。"
