 je_gaudi_custom_monument_blueprint_research_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]作为[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]那个时代最具影响力的建筑大师享誉全球。为铸就永恒传奇，[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]正潜心设计一座非凡的地标建筑蓝图，此举将使我国作为世界建筑艺术中心绽放夺目光彩。"
 gaudi.81.t: "建筑师杰作"
 gaudi.81.d: "近年来，[THIS.GetCountry.GetName]已跻身世界建筑强国之列。在此进程中，[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]功不可没。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U]所承接的这项纪念碑设计委托，其宏伟程度将直追古代文明、中世纪杰作与现代地标等人类建筑史上的不朽奇迹。"
 gaudi.81.f: "建筑师纪念碑的风格取决于建筑大师所偏好的流派：\n\n装饰艺术派建筑师将设计[GetBuildingType('building_gaudi_people_monument').GetName]；\n包豪斯建筑师将建造[GetBuildingType('building_gaudi_people_forum').GetName]\n新古典主义建筑师则会打造[GetBuildingType('building_gaudi_people_palace').GetName]。"
 gaudi.81.g: "漂亮！"
 ACHIEVEMENT_gaudi_stalin: "斯大林正嫉妒得发绿"
 ACHIEVEMENT_DESC_gaudi_stalin: "作为实施了计划经济的委员会共和国，拥有人民宫。"
 gaudi.82.t: "建筑师的毕生之作"
 gaudi.82.d: "历经数月精心筹备，[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]正式呈交了全套设计图纸、结构计算书、造价分析报告及精美手工模型。这座被建筑界誉为“梦幻杰作”的纪念碑设计方案，如今只待追问：谁人能将此建筑幻梦化为现实？"
 gaudi.82.f: "“明日，我们将成就美。”——安东尼·高迪"
 gaudi.82.g: "一座献给我们自身的丰碑。"
