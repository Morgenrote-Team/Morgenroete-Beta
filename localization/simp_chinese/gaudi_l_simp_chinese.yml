 gaudi.70.t: "圣马可钟楼坍塌"
 gaudi.70.d: "圣马可钟楼这座威尼斯的象征倒下了。不只是威尼斯人，全国人民都对此感到悲痛。没人知道接下来会发生什么。"
 gaudi.70.f: "圣马可广场上的圣马可钟楼是威尼斯的地标建筑，它是这座水城的骄傲和象征。1902年7月，钟楼北墙出现了裂痕，日益加深。终于，在7月14日星期一的上午9点45分左右，钟楼轰然倒塌，连带着小阳台一起化为废墟。令人称奇的是，除了一只看门人的猫之外，竟然没有人员伤亡。由于钟楼的位置，倒塌造成的破坏也相对较小。除了小阳台，只有马尔基亚纳图书馆的一角受损。一根用来宣读法令的大理石柱挡住了大教堂的入口，保住了它的完整。尽管如此，这座古意大利文化杰作的消失还是在全国引发了激烈的争论。"
 gaudi.70.g: "重建钟楼，原地原样。"
 gaudi.70.h: "建点新玩意儿。"
 gaudi.70.i: "我们负担不起。"
 gaudi.71.t: "重建圣马可钟楼"
 gaudi.71.d: "新的威尼斯圣马可钟楼今天在隆重的仪式上揭幕，它与其前身一模一样，无论是外观还是每一块砖头。整个威尼斯都欢庆这一地标性建筑的重生。"
 gaudi.71.f: "重建工作在1912年3月6日完成，圣马可钟楼在1912年4月25日正式开放，当时也是圣马可节举办期间。据说圣马可钟楼从建造到倒塌刚好过了一千年的时间"
 gaudi.71.g: "守护神又回来啦！"
 gaudi_captain: "船长"
 gaudi_nemo: "尼莫"
 gaudi_nautilus_modifier: "动境中之动"
 gaudi_nautilus_strikes_modifier: "反帝复仇"
 gaudi_nemo_button: "狩猎怪物"
 gaudi_nemo_button_desc: "一支拥有一个经验丰富的博物学家的小型探险队将帮助我们更深入地了解未知怪物带来的危险。"
 je_gaudi_nemo: "《海底两万里》"
 je_gaudi_nemo_reason: "一只被目击者认为是巨型独角鲸的神秘海怪正在袭击我们的商业航运路线，甚至我们的港口也遭到了攻击。在博物学家的帮助下，我们可以派出一支探险队去了解更多有关这个生物的信息——并在可能的情况下阻止他。"
 gaudi.80.t: "瓦尔哈拉神殿"
 gaudi.80.d: "随着雷根斯堡附近的瓦尔哈拉神殿的竣工，巴伐利亚建造了一个以半身像形式展示和表彰伟大德国天才们的地方。"
 gaudi.80.f: "瓦尔哈拉神殿是位于巴伐利亚州多瑙斯陶夫市镇的一座奇观。它由巴伐利亚国王路德维希一世于1830年至1842年间建造，由建筑师莱奥·冯·克伦茨设计。1806年，神圣罗马帝国解体，后来的德国大部分地区直接受到拿破仑的影响，“德意志蒙受了最稳深重的耻辱”，有鉴于此，当时的路德维希王储下令建造一系列“光荣杰出的德国人”的半身像。正如三层碑文中的第一层所述，路德维希在1807年1月就已决定尽快为50位伟大的德国人建造一座荣誉殿堂。1825年路德维希即位时，60尊半身雕像已经完工，但尚未找到建筑用地。瓦尔哈拉神殿的外形有如一座希腊神庙，以雅典的帕特农神庙为蓝本，采用了多立克围柱式风格。"
 gaudi.80.g: "纪念一位德国作曲家。"
 gaudi.80.h: "纪念一位德国文学家。"
 gaudi.80.i: "纪念一位德国画家。"
 gaudi.90.t: "神秘鲸鱼弄沉船只！"
 gaudi.90.d: "报道与日俱增，最初被认为是水手们的迷信，但现在已经不能等闲视之。本质上是这一段时间内的几艘船在海上遇到了一个“庞然大物”：一个长长的纺锤形物体，有时会发出磷光，比任何一种鲸鱼都要大得多，速度也快得多。\n\n在过去的一年里，有几艘商船在海上遭遇了奇怪的现象，许多人认为那是一种尚未发现的大型鲸鱼。"
 gaudi.90.f: "与这一幽灵有关的事实在大多数方面都彼此印证，例如这种物体或生物的形态、其不停歇的快速运动、令人惊讶的运动能力以及它似乎被赋予的奇特生命力。如果它属于鲸类，那么它的体型超过了迄今为止所有已经得到科学分类的鲸类动物。考虑到不同时间观察的平均值，我们可以得出这样的结论：这个神秘的生物大大超过了当时的鱼类学家所承认的一切尺寸。"
 gaudi.90.g: "但那真的是一头鲸鱼吗？"
 gaudi.91.t: "神秘鲸鱼再次袭击！"
 gaudi.91.d: "神秘怪物再次袭击！把船运业都吓坏了。"
 gaudi.91.f: "斯戈蒂亚号邮船上坞以后，工程师们对它进行了检查。他们都简直不敢相信自己的眼睛。船体吃水线以下两米半的地方有一个光边的等腰三角形缺口，钢板上的裂痕整齐划一，恐怕用钻孔钳也不能打得这样精确无误。钻这个窟窿的钻孔工具肯定不是普通的淬火技术能够制作的。因为它在以神奇的力量向前冲击，穿透四厘米厚的钢板之后，还能做出一个无法解释的倒退动作使自己脱身。"
 gaudi.91.g: "这一对公海的威胁必须画上休止符！"
 gaudi.92.t: "神秘鲸鱼袭击海岸！"
 gaudi.92.d: "鲸鱼——或者其他什么东西——袭击了一座港口城市，所到之处尽成废墟。"
 gaudi.92.f: "某些智商不高的人提出了诸如浮动的小岛、漂泊不定的礁石之类的假设。这样的假设理所当然地遭到了摈弃。因为，除非这座礁石内部有一台机器，否则，怎么能够以如此神奇的速度移动呢？\n同样，根据其移动的速度，认为有一只浮动的船体或遇难船只的巨大残骸存在的观点，也是不可信的。\n那么，这个问题就只剩下两种可能的解释，由此形成了两个截然对立的派别：一派认为，这事由一种力大无比的海怪所为；另一派则说它是一艘动力极大的“潜水”船。"
 gaudi.93.t: "教授和它的怪兽"
 gaudi.93.d: "在[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName]查询到那个未知生物最后的目击现场后，他决定带领一支无畏的队伍去寻找它。"
 gaudi.93.f: "“我们对海洋深层一无所知，探测器也无法深入其中。海洋深处到底是个什么样的世界呢？海平面以下12000米或15000米的深处生活着或有可能生活着什么样的动物呢？这些动物的肌体构造又是怎样的呢？这一切几乎无法猜测。\n“不过，摆在我面前的问题可以采用二难推理法加以解决。\n“生活在我们这个星球上的所有生物，我们要么了解，要么不了解。\n“倘若我们不了解所有的生物，倘若大自然还对我们掩盖鱼类学的某些秘密的话，那么最能够接受的假设就是承认某些鱼类甚或鲸类新种类或新种属的存在，而且它们有一个基本‘不能上浮’的生理构造，生活在探测器探测不到的海底水层；由于某一事件，突发奇想，抑或一时的任性，它们也会间隔很长一段时间偶尔浮出海面。”"
 gaudi.93.g: "祝你们好运！"
 gaudi.94.t: "[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]失踪!"
 gaudi.94.d: "那个海怪袭击了调查船。[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName]在与其搏斗的过程中落水了！尽管已经搜查了这么久，依然是杳无音讯。"
 gaudi.94.f: "“就在这时,我倚靠在船头栏杆上,在我脚下看见内德·兰一手抓着飞剪索,另一只手挥舞着他可怕的鱼叉,距离那动也不动的动物不过20英尺。他的胳膊突然伸直,鱼叉被投掷出去;我听见那武器发出铿锵的一击,似乎撞上了一个硬物体。电灯突然熄灭,两股巨大的水柱喷薄而出,撞击在护卫舰的桥上,如急流一般从船头冲到船尾,掀翻行人,打断桅杆的缆绳。一个可怕的震动随之而来,我被掀翻过栏杆,没有时间停下,就摔进了海里。”"
 gaudi.94.g: "不！不是教授[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]！"
 gaudi.95.t: "[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授被冲上岸！"
 gaudi.95.d: "著名博物学家[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName]今天出现在我们的海滩上。这位教授已经失踪了有好一段时间了，他加入一支探险队，试图发现神秘的可以吞噬公海船只的鲸鱼背后的真相。这位教授深深震撼于自己的经历，而他的故事确实不简单。[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]称他的船只和不明生物在一次近距离的遭遇后，他被冲到船外，然后他发现不明生物实际上是一艘可以海底航行的人类船只。[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授坚称那船的船长是一位热爱自由的义士，断绝了同陆上世界的联系，在海里享受自由的生活。无论事实如何，[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授详细记录了许多新奇的生命形式（据说是在他作为宾客参加这艘怪船的一次航行时遇上的），这将对未来数年的科学事业大有裨益。"
 gaudi.95.f: "“这显然是一只巨大的独角鲸，而且是一只带电的独角鲸。”\n——[SCOPE.sCharacter('gaudi_nemo_scope').GetFullName]"
 gaudi.95.g: "但尼莫船长真的被打败了吗？"
 gaudi.1004.t: "哥廷根磁学协会"
 gaudi.1004.d: "著名的天文学家和数学家卡尔·弗里德里希·高斯和物理学家威廉·爱德华·韦伯创立了一个国际协会，用于研究地球的磁场。"
 gaudi.1004.f: "磁学协会（又称哥廷根磁学协会），是19世纪30年代在哥廷根成立的一个研究协会。它的主要目的是开展一项全球地球物理研究项目，研究地球磁场的时空变化。它被认为是第一个国际科学协会。该协会由哥廷根教授卡尔·弗里德里希·高斯和威廉·韦伯在亚历山大·冯·洪堡的支持下创立。他们的目标是利用分布在世界各地的众多测量站，协调地测量地球磁场的波动。在1836年至1841年的六年期间，他们在28个约定日，每个约定日持续24小时，每隔五分钟进行一次测量。有多达50个天文台参与了这个项目，其中包括35个欧洲天文台，6个亚洲天文台，2个非洲天文台，3个北美天文台和4个南海天文台。他们将结果送到哥廷根，并由高斯和韦伯进行科学处理。"
 gaudi.1004.g: "磁？电？电磁学！"
 gaudi.1004.h: "闪闪发光！"
