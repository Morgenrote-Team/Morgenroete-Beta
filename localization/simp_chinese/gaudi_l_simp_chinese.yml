 gaudi.51.t: "新古典主义复兴"
 gaudi.51.d: "[ROOT.GetCountry.GetName]已成为建筑学永恒与庄严的典范，这一地位令文明世界敬仰！"
 gaudi.51.f: "“古代杰作最普遍且最卓越的特征，归根结底，是一种高贵的朴素与宁静的崇高，无论在姿态还是表情中皆是如此。”\n—— 约翰·约阿希姆·温克尔曼"
 gaudi.51.g: "这才是艺术的真正精髓所在。"
 gaudi.52.t: "包豪斯的凯旋"
 gaudi.52.d: "[ROOT.GetCountry.GetName]已经成为建筑学理性与进步的灯塔。这一地位赢得了来自全球的尊重与赞誉！"
 gaudi.52.f: "“设计并非专业，而是一种态度。”\n——拉斯洛·莫霍利-纳吉"
 gaudi.52.g: "人民的需要取代了奢侈的追求！"
 je_gaudi_bauhaus_architecture: "包豪斯建筑学"
 je_gaudi_bauhaus_architecture_reason: "包豪斯是德国的一所艺术学校，始办于1919年，关闭于1933年。该学校将工艺与美术结合起来，以其将个人艺术愿景与大众生产原则相统一，并强调功能性的设计手法著称。该学校秉承着创造综合艺术品（Gesamtkunstwerk）的理念，致力于将各种艺术形式融为一体。包豪斯风格后来成为现代设计、现代主义建筑和建筑教育领域最具影响力的潮流之一。"
 je_gaudi_neoclassical_architecture: "新古典主义建筑学"
 je_gaudi_neoclassical_architecture_reason: "新古典主义是20世纪初一场建筑与艺术领域的复兴运动，旨在重新联结古希腊罗马时代的清晰形式、对称性与宏伟感。它作为对19世纪历史主义繁复风格的反动，以及对现代艺术抽象化趋势的回应，强调纪念性、几何秩序与传统形式的理性运用，常常以国家意志为表达载体。这一风格与民族认同及市政建筑密切相关，致力于展现永恒性、权威性与节制之美的理想。"
 je_gaudi_art_deco_architecture: "装饰艺术风建筑学"
 je_gaudi_art_deco_architecture_reason: "装饰艺术运动兴起于1920年代，是一种融合了现代精神与古典秩序元素的装饰与建筑风格。其特点在于运用风格化造型、华贵材质以及几何化装饰语言，将精致的手工艺与新兴机械美学巧妙结合。装饰艺术通过受工业、速度与异域文化启发的母题，颂扬技术进步与都市活力。"
 je_gaudi_splendour_bauhaus: "包豪斯的凯旋"
 je_gaudi_splendour_bauhaus_reason: "引介包豪斯精神后，建筑师开始摒弃装饰与幻象，转而追求清晰、精确以及对材料本质的忠实表现。其目标已不再是通过奢华取悦观者，或唤起昔日帝国的辉煌，而是通过创造功能性、诚实且现代的空间来服务社会。包豪斯不仅是一种美学风格——它是一种设计哲学，基于这样一种信念：建筑与日常生活必须通过简洁、实用与形式与目的的统一来达成和解。当一座首都采纳包豪斯原则时，它所彰显的不仅是现代性，更是最纯粹意义上的进步：将功能置于立面之上，将创新置于传统之上。"
 je_gaudi_splendour_neoclassical: "新古典主义复兴"
 je_gaudi_splendour_neoclassical_reason: "新古典主义是一种植根于古典时代理性和谐的风格，其建筑语言体现在柱式、山花与对称布局中。然而，在20世纪初，它被重新构想：结合现代建造技术、更简洁的线条，往往也具有纪念碑般的尺度。这一风格不仅象征传统，更代表了一种有纪律的未来愿景——一个由令人敬仰、激发凝聚力的建筑所塑造的公共生活、法治与文化图景。采纳这些原则的建筑，将赋予我们的首都以庄严与宏伟，使其在世界眼中成为秩序、坚韧与开化之力量的灯塔。"
 je_gaudi_splendour_art_deco: "装饰艺术之梦"
 je_gaudi_splendour_art_deco_reason: "随着装饰艺术的兴起，建筑师们革新了艺术界，首当其冲打破了以往僵化的历史主义传统。但与许多现代主义流派不同，他们的建筑并不只是功能性与客观性的表达。装饰艺术是在古典现代主义全面觉醒的背景下发展而来的，其核心强调优雅形式、华贵材料、有力色彩与感性主题之间的创造性结合。在鼎盛时期，它代表了奢华、魅力、繁荣，以及对社会与技术进步的信心。尊重这些原则的建筑风格将使我们的国家成为现代性与经济实力的典范。"
