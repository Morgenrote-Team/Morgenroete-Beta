 je_gaudi_dombau_phase_4: "科隆大教堂：西立面与塔楼"
 je_gaudi_dombau_phase_4_reason: "大教堂的西立面是有史以来最大的教堂立面。它详细遵循了建筑大师萨伏伊的迈克尔1370年在立面图F中所制定的中世纪计划。科隆大教堂罗阔的特点是带有两座尖塔的双塔式立面。迈克尔大师设计了一座完全镂空的八角形花饰尖顶，上有分层顶饰。哥特式建筑师们尝试以此探索技术可能性的极限，并强调这座建筑试图成为东方三博士所居的“不朽灵堂”。"
