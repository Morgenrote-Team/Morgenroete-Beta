 gaudi.1002.d: "[SCOPE.sCharacter('gaudi_new_architect_scope').GetFullName]完成了桂尔别墅的建造，这是一处现代主义风格的庄园扩建工程，[SCOPE.sCharacter('gaudi_new_architect_scope').GetLastName]正是现代主义的代表人物。"
 gaudi.1002.f: "桂尔别墅的铁门上有一条眼珠由玻璃镶嵌成而成的铁龙。所有建筑都采用了东方主义导向的现代派风格。\n\n[SCOPE.sCharacter('gaudi_new_architect_scope').GetLastName]是加泰罗尼亚现代主义风格的最重要代表。现代主义可以视作新艺术运动在加泰罗尼亚的表现形式，其特点是采用加泰罗尼亚的传统材料与技术。“自然”和“运动”是描述现代主义风格最重要的词汇。这在桂尔公园中体现得淋漓尽致，该公园以圆形为其特色，灵感来自植物和其他自然构成形状。"
 gaudi.1002.h: "高迪前途无量！"
 gaudi_bauhaus_modifier: "包豪斯建筑"
 gaudi.21.t: "工程师回国"
 gaudi.21.d: "海外游历两载，我方建筑师载誉而归——携回的不仅是设计草图，更有一门全新建筑学派。"
 gaudi.21.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U]离去时仅是一名绘图师，归来时已是真正的建造者。\n\n漫长的两年里，[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName]踏遍欧洲——穿越伦巴第的幽谷，探访曼彻斯特的炼铁厂，徘徊于布达佩斯的桥拱之下。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U]不仅研习教堂建筑，更考察泵站设施；不仅琢磨柱头与檐口装饰，更钻研锅炉房与起重机码头的构造。[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U]曾在工学院聆听讲座，誊录工程师的笔记，更在里昂的施工现场领悟：力量无法凭空攫取，而必须透彻理解。\n\n如今，[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U]的言谈已焕然一新——承载应力、张力框架、钢铁之魂。昔日的同僚几乎认不出[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]。然而，[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]的双手依然如故，只是更加沉稳。至于[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]的目光？竟似能洞穿石墙。"
 gaudi.21.g: "建筑学的元命题是：何以为立？"
