 gaudi.1221.t: "机械计算器"
 gaudi.1221.d: "我们的[concept_tesla_mechanical_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')]博士完成了人类造物之星之一的存在——机械计算器。该发明将亘古及今的影响所有人。"
 gaudi.1221.f: "引擎轰鸣，巨物作响，万千齿轮扭动，打印机逐一排出字符千万。此绝非人能比肩的力与速！"
 gaudi.1222.t: "分析机"
 gaudi.1222.d: "[SCOPE.sCharacter('tesla_new_engineer_scope').GetFullName]是一位著名的学者，他设计了一台能够计算所有现有计算的新机器。现在他正在请求我们支持建造这样一台机械计算机。"
 gaudi.1222.f: "“一旦分析机出现，它必然会指导科学的未来发展。每当借助它寻求任何结果时，就会出现一个问题——机器通过什么计算过程才能在最短的时间内得出这些结果？” ——查尔斯·巴贝奇"
 gaudi.1222.g: "多么美妙的计划！"
 gaudi.1222.h: "我们可以建造更多的战舰！"
 tesla_mechanical_computer_project_finished_engineer_loc: "\n[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting]发明了第一台#V 机械计算机#!。这是人类最伟大的发明之一。"
