 gaudi.1441.t: "[GetPlayer.GetName]的现代化$building_power_plant$"
 gaudi.1441.d: "我们的[concept_tesla_electrical_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')]长期致力于提升我国发电厂与电力基础设施的效能，从电缆改良到发电机效率提升均有所突破。\n\n已改良建筑总数：[GetPlayer.MakeScope.Var('mr_num_improved_power_plants_buildings_var').GetValue|V0]"
 gaudi.1441.f: "“这些发电机现在威力大增。事实上，我的一名员工还不小心当了回避雷针，亲身测试了它们的威力。”"
 gaudi.1441.g: "无限能源！"
 tesla_civil_engineer_desc: "[Concept('concept_tesla_civil_engineer','$concept_tesla_civil_engineers$')]是专注于建筑和基础设施的工程师，他们可能建造新的桥梁、隧道或运河。"
 tesla_mechanical_engineer_desc: "[Concept('concept_tesla_mechanical_engineer','$concept_tesla_mechanical_engineers$')]专注于打造新颖且富有创造力的机器。他们或许能造出更出色的火车头，或是全新的创新型蒸汽机。更进一步，他们是否会造出无需马匹牵引便能行驶的车辆？"
 tesla_military_engineer_desc: "[Concept('concept_tesla_military_engineer','$concept_tesla_military_engineers$')]通常隶属于军队，专注于建造防御堡垒或打造新颖且有创意的战争机器。"
 tesla_electrical_engineer_desc: "电能有许多创新用途，从照明到发动机，甚至通讯，而[Concept('concept_tesla_electrical_engineer','$concept_tesla_electrical_engineers$')]则是利用这种力量为人类造福。"
 tesla_aeronautical_engineer_desc: "飞行的梦想自古有之。而今，人类征服天空已成现实，[Concept('concept_tesla_aeronautical_engineer','$concept_tesla_aeronautical_engineers$')]正致力于让人们飞得更高、更快、更远——通过不断研制新型飞机与飞艇。"
