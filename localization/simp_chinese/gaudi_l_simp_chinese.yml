 je_gaudi_gotthard_survey: "圣哥达铁路：计划与勘察"
 je_gaudi_gotthard_survey_reason: "19世纪的瑞士面临着被国际铁路交通绕行而过的风险，这不仅将使该国与现代交通系统相隔绝，更令其置身工业革命之外。布伦纳山口铁路的开通进一步加剧了这种风险。从地理学角度而言，瑞士相较奥地利处于劣势，因为布伦纳山口比瑞士的替代线路更易于穿越。在瑞士通过建造阿尔卑斯山铁路的计划之前，有关路线和资金问题的讨论进行了数十年。苏黎世政治家与企业家阿尔弗雷德·埃舍尔在圣哥达路线的确定中扮演了关键角色。"
 je_gaudi_gotthard_survey_goal: "#E 计划进度#!达到#BLUE 60#!点。目前我们拥有#G [GetGlobalVariable('gaudi_gotthard_progress').GetValue]#!点。通常我们每月获得一点。"
 je_gaudi_gotthard_construction: "圣哥达铁路：施工"
 je_gaudi_gotthard_construction_reason: "圣哥达铁路的建设被视作19世纪最大的建设项目之一，就其规模与技术难度而言堪与苏伊士运河相提并论。起初至关重要且雄心勃勃的部分是实现穿越圣哥达山的隧道。档期在1882年开通时，圣哥达山顶隧道以其15公里的长度成为全世界最长的隧道。这条路线的另一部分是约一百座钢铁制成的大小桥梁，不仅联通了欧洲南北，也是瑞士团结的象征。"
 je_gaudi_gotthard_construction_goal: "#E 建造进度#!达到#BLUE 120#!点。目前我们拥有#G [GetGlobalVariable('gaudi_gotthard_progress').GetValue]#!点，通常我们每月获得一点。"
 je_gaudi_gotthard_discontent: "圣哥达铁路：工人不满"
 je_gaudi_gotthard_discontent_reason: "即使按照当时的标准，圣哥达铁路工程的工作条件也可谓艰苦。工人主要由外国人充当，大部分是来自意大利北部阿尔卑斯山谷的贫苦农民，事实上并不享有任何权利。特别是隧道内部的工作需要冒生命危险且报酬低微。这一再导致工人与施工管理方的分歧，某时某刻，这将会威胁到整个项目。"
 je_gaudi_gotthard_discontent_goal: "如果#E 工人不满#!达到最高的#BLUE 10#!点，暴动将会爆发！此时这一数值达到#R [GetGlobalVariable('gaudi_gotthard_discontent').GetValue]#!点。"
 je_gaudi_cristo: "救世基督像：施工"
 je_gaudi_cristo_reason: "19世纪50年代中期，文生会神父佩德罗·玛利亚·博斯首次提议在科尔科瓦多山上建造一座基督像以向佩德罗二世皇帝之女，巴西摄政伊莎贝尔公主致敬，但计划未获批准。里约天主教徒于1920年第二次提议建造一座地标雕像。当地工程师埃克托尔·达·席尔瓦·科斯塔与艺术家卡洛斯·奥斯瓦德设计了雕像。法国雕塑家保罗·兰多斯基创作了这一作品。这座装饰风艺术风格雕像随后在全世界获得赞誉，并和临近的糖面包山一样成为了里约热内卢的地标。"
