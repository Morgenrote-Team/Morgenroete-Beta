 je_gaudi_dombau_phase_3: "科隆大教堂：屋顶结构"
 je_gaudi_dombau_phase_3_reason: "科隆大教堂的设计以哥特式理念为其基础，但这并未妨碍建筑大师运用当时最为现代的建筑材料。其铁制屋顶结构是埃菲尔铁塔建成前全世界最大的钢铁构造。仰赖这一决定，建筑在二战期间面对盟军轰炸得以幸存。"
