 gaudi_neuschwanstein_phase_1_decision_desc: "新天鹅堡被认为是历史主义和德国浪漫主义的典范。这座后来被许多人视为“完美”的童话般的城堡，由巴伐利亚国王路德维希二世设计。虽然在19世纪，君主们将中古城堡建造的富丽堂皇的做法并不罕见，但新天鹅堡依旧应当成为一个典范，它不仅是巴伐利亚的地标，更是整个德语世界的地标。"
 gaudi_neuschwanstein_phase_2_decision: "新天鹅堡：一座童话般的城堡"
 gaudi_neuschwanstein_phase_2_decision_desc: "自开始以来，新天鹅堡就是作为国王的隐居地而并非为展览或是公共场所而使用。他以中世纪的基督神话为基础并重点参考了他欣赏并以资金资助的理查德·瓦格纳的歌剧建设了这座建筑。国王源源不断的新想法和他对给新天鹅堡建造一个永恒的大理石舞台大大推迟了建设，并将路德维希二世带向了毁灭的边缘。"
