 gaudi.73.t: "热罗尼莫斯修道院的过去与未来"
 gaudi.73.d: "热罗尼莫斯修道院，这座曼努埃尔建筑的巅峰之作，镌刻着葡萄牙的黄金时代。然而连年疏于维护，如今已墙垣斑驳，廊柱倾颓。"
 gaudi.73.f: "作为贝伦区的地标，该修道院完美融合了哥特式骨架与曼努埃尔式雕饰，堪称16世纪建筑瑰宝。风雨侵蚀数百年后，19世纪中叶，民族意识觉醒催生了遗产保护浪潮。1860年代起，在浪漫主义学者的呼吁下，系统性修复拉开帷幕——每一块石料的修补，都是对昔日帝国荣光的致敬。"
 gaudi.73.g: "目前只需进行一些小修小补。"
 gaudi.73.h: "如愿重拾昔日辉煌，则应启动全面整修！"
 gaudi.73.i: "亦可出售其中最珍贵的藏品以充实国库。"
