 je_gaudi_sagrada_phase_1: "圣家堂：安东尼·高迪之梦"
 je_gaudi_sagrada_phase_1_reason: "安东尼·高迪‑科尔内特是西班牙加泰罗尼亚建筑师，被视为“加泰罗尼亚现代主义”（新艺术运动的分支）的代表性人物之一，他的作品以其复杂、新颖、独树一帜、个人色彩强烈的建筑作品知名。1883年高迪接手了圣家堂的设计工作，并对规划做出了彻底的调整，把原先设计的新哥特式教堂改为加泰罗尼亚现代主义建筑。高迪一生中43年的心血都花在这个教堂的设计与建造上，直到他1926年去世。几十年来，圣家堂一直是世界上最大的未完工天主教堂——介于天才与疯子之间的世纪工程。"
