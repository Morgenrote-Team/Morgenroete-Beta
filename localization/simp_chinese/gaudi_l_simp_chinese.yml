 gaudi.1141.t: "[GetPlayer.GetName]的现代化铁路线"
 gaudi.1141.d: "我们的[concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')]终于完成了[GetPlayer.GetNameNoFormatting]铁路基础设施的现代化项目。如今我们拥有了世界上最现代化的铁路线，必将迎来更多的客流量。"
 gaudi.1141.f: "“新铁路线上应有尽有！哪怕铁路道岔有了加热功能我也不会感到惊讶！”"
 gaudi.1141.g: "噗——"
 je_gaudi_construction_sector_project: "现代化建造部门"
 gaudi.1151.f: "“我正在砌墙的时候，来了一个西装革履的人。他告诉我，如果我用他想出的这一招，就可以节省材料。瞧，还真管用！没想到那些白领还真有办法！”"
 gaudi.1151.g: "更好的建造意味着更多的工厂！"
