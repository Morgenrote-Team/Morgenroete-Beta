 gaudi.1161.d: "我们的[concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')]绘制了一份[GetPlayer.GetName]的精良地形图。这份地形图将有助于我们的工程师规划新的基础设施与建筑，还能让我们一览[GetPlayer.GetNameNoFormatting]全貌。"
 gaudi.1161.f: "“这真是太酷啦！我都不晓得我离下个城市那么近、甚至我的花园小屋都在地图上！”"
 gaudi.1161.g: "我可以看到自己的房子！"
