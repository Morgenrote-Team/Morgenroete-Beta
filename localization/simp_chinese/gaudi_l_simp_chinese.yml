 gaudi.701.t: "新天鹅堡的施工开始了"
 gaudi.701.d: "巴伐利亚的国王选择了一块他从幼时便知晓的一块临近旧天鹅堡的地方。很明显，建筑的实际管理并不在选定的建筑师，而是在于君主本身。"
 gaudi.701.f: "“我打算在旧天鹅堡的废墟上重建城堡……一座正宗的古德国骑士城堡。”——路德维希二世"
 gaudi.701.g: "国王要么是个天才，要么是个疯子。"
 gaudi.702.t: "新天鹅堡：第一阶段完成"
 gaudi.702.d: "在菲森旁的山上，宫殿已经在巴伐利亚阿尔高地区清晰可见。新天鹅堡的门楼已经建成。"
 gaudi.702.f: "“……新天鹅堡无论在哪个方面都比旧天鹅堡更美丽、更温馨……”——路德维希二世"
 gaudi.702.g: "看起来比计划的更俗气。"
 gaudi.703.t: "新天鹅堡的施工继续进行"
 gaudi.703.d: "新天鹅堡的下一个施工阶段已经开始了，但现在有越来越多人声称建设这种浮夸的城堡完全是一种浪费。"
 gaudi.703.f: "于流言相反，路德维希二世完全使用自己的私人财产为新天鹅堡提供资金。但因为缺少资金，他还接受了前任普鲁士首相的赞助。为了在普鲁士国王威廉加冕为德意志皇帝时获得巴伐利亚的支持，俾斯麦给路德维希每年三十万帝国马克的养老金。在他死后，路德维希的私人债务已经达到了825万帝国马克。"
 gaudi.703.g: "得花多少钱？"
 gaudi.704.t: "新天鹅堡完工"
 gaudi.704.d: "新天鹅堡今天终于竣工了！这座建筑将如何在历史上留下印记呢？是作为一种对路易十四式的怀旧妄想，还是作为一种对国王童话的再现？或许，两者都不无道理。"
 gaudi.704.f: "“我想让新天鹅堡永久保留其神秘意味，无论是对我还是对世人……”——路德维希二世"
 gaudi.704.g: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle][SCOPE.sCharacter('gaudi_ruler').GetFirstName]万岁！"
 gaudi.709.t: "巴伐利亚失陷！"
 gaudi.709.d: "随着巴伐利亚的失陷，我们也完全失去了继续建造新天鹅堡的机会。"
 gaudi.709.f: "如果因任何原因失去了巴伐利亚，建筑进度将不会全部丧失。只有巴伐利亚可以在最新的施工阶段继续建造新天鹅堡。然而，外来入侵者不会对继续建造表现出兴趣。"
 gaudi.709.g: "我们不能允许他们掌控巴伐利亚太久！"
 gaudi.711.t: "劣质砖块"
 gaudi.711.d: "最近运抵新天鹅堡的一批建筑材料被发现质量低劣。"
 gaudi.711.f: "在巴伐利亚的建筑工地上，安托内利尖塔每天都在不断增高，但某一刻，建造突然停顿了下来。安托内利进行了一次简短的清点，发现砖块的质量并不像平常那样可靠，他宣布自己宁愿等待也不愿令这些砖块危及他的杰作。然而，管理层中有些人认为这些砖块仍然应该使用——不仅因为施工可能会被延误，还因为他们担心国王会利用这段时间再次更改计划……"
 gaudi.712.t: "灾难！"
 gaudi.712.d: "劣质材料终于出了问题：今天早上，新天鹅堡的一部分倒塌并造成了相当严重的损害。"
 gaudi.712.f: "或许我们应该听从国王的建议，使用劣质砖块来建造如此重要的奇观并不是一个好主意。当时应该再三考虑再下决定。但为时已晚——劣质材料今天造成了后果，一堵墙倒塌，摧毁了过去几周甚至几个月的建设进展。"
 gaudi.713.t: "反对派批评新天鹅堡"
 gaudi.713.d: "[SCOPE.sCharacter('gaudi_opposition_leader').GetFullName]向国王递交请愿书。"
 gaudi.713.f: "“国外的人们早已嘲笑这位自视甚高的君主，他根据自己的心情，或是把自己当成童话里的国王，或是把自己当成路易十四的化身。王室为了落伍的梦想而债台高筑，这种情况必须停止。巴伐利亚正在让自己成为欧洲的笑柄。这样的行为不符合一个国王的身份。”"
 gaudi.713.g: "我是国王！我能建我想的建的！"
 gaudi.713.h: "或许这就是虚荣？"
 gaudi.714.t: "新机器"
 gaudi.714.d: "技术进步也有助于建造中世纪城堡这样看似老式的建筑。"
 gaudi.714.f: "慕尼黑的机械工厂和现代化的钢架结构使新天鹅堡的重建工作得以在前所未有的时间内完成。"
 gaudi.715.t: "邻国对新天鹅堡印象深刻"
 gaudi.715.d: "我们的邻国[SCOPE.sCountry('gaudi_neighbour_nation').GetName]看到巴伐利亚为实现理想城堡的梦想所付出的努力后感到非常惊讶，并对建设进度表示了极大的兴趣。"
 gaudi.715.f: "新天鹅堡是路德维希二世的城堡中最著名的一个，也是德国最著名的景点之一。自从路德维希二世去世的那一年，这座城堡就向游客开放了，从此接待了越来越多的客人。仅在最初的八个星期里，就有大约18000人参观了这座城堡。到了1913年，游客数量超过了28000人，到了1939年，已经达到了290000人。到了2001年，游客数量增长到了大约130万人，其中包括560000名德国人，385000名美国人和英国人。那一年的第三大游客群体是149000名日本人。到了2005年，总共有超过5000万人参观了这座城堡。"
 gaudi.715.g: "带领大使参观新天鹅堡。"
 gaudi.715.h: "请求捐赠。"
 gaudi.716.t: "国王的新点子……"
 gaudi.716.d: "我们的国王最近提出了一个令施工管理方震惊的变动……"
 gaudi.716.f: "新天鹅堡的建造始于1869年。随着工程的推进，路德维希二世的愿望和要求日益增长，开支也随之增加，设计和预算不得不多次修改。原本计划的宏伟的王座厅被改为一间朴素的书房，原定的客房也被删去，为了给摩尔风格的大厅腾出空间，但这个大厅因为经费不足而无法实现。这座城堡原定于1872年完工，但却一再延期。"
 gaudi.716.g: "见鬼去吧！"
 gaudi.716.h: "圣礼啊！"
 gaudi.716.i: "天啊！"
 gaudi.716.j: "Himme, Oarsch und Zwian!（表惊讶、愤怒或失望）"
 gaudi.717.t: "新天鹅堡建设加快"
 gaudi.717.d: "新天鹅堡的建设进展比预期更快，但原因不明。"
 gaudi.717.f: "出于未知原因，宏伟的新天鹅堡的建造正在取得进展。也许是天气好的缘故，或是向圣母祈祷的结果，或是我们丢弃了几天前使用的相当劣质的建筑材料——我们希望这些材料永远不要被发现。有一件事是确定的：这座经历了各种各样延误的巨兽，应该会比预期更快地建成——如果国王没有利用这个机会来提出一个新的扩建计划的话……"
 gaudi.718.t: "国家项目还是王室的私产？"
 gaudi.718.d: "议会正在进行严肃的辩论，以决定新天鹅堡的首要地位究竟是国家建筑还是王室的私产。"
 gaudi.718.f: "新天鹅堡，隐匿于阿尔高的深山之中，原本是国王的私密居所。但是，这座建筑也蕴含着浪漫的民族主义色彩，至少对旁人而言如此：将中世纪神化为德国历史的真正巅峰，是民族运动的叙事之一。同时，这座城堡也是对理查德·瓦格纳的敬意之作，他是四分五裂的德国的民族作曲家。"
 gaudi.718.g: "这是一项国家工程。"
 gaudi.718.h: "这既是国家工程，也是王室的私产。"
 gaudi.718.i: "这是王室私产。"
 gaudi.719.t: "君主造访"
 gaudi.719.d: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle][SCOPE.sCharacter('gaudi_ruler').GetFullName]决定亲自访问新天鹅堡的施工现场。"
 gaudi.719.f: "我们的君主[SCOPE.sCharacter('gaudi_ruler').GetFirstName]此前已经对巴伐利亚工地上发生的事情表现出极大的兴趣，现在打算前往现场参观。准备工作正在全力进行中——当然要给陛下看些特别的东西！因此，在消息公布之后，普通的建筑工人、管理方达到了前所未有的速度。"
 gaudi.719.g: "陛下知道如何动员。"
 gaudi.720.t: "建筑工地事故"
 gaudi.720.d: "由于不明原因，新天鹅堡建筑工地发生了火灾，导致工程推迟数月！"
 gaudi.720.f: "”现在有人在演奏理查德·瓦格纳的《女武神的骑行》吗？“"
 gaudi.720.g: "太可怕了！就像瓦格纳一样！"
 gaudi.721.t: "为工人伸出的皇家之手"
 gaudi.721.d: "一位工会领导人要求国王对新天鹅堡建筑工地上的危险工作进行补偿，并给予更好的照顾。"
 gaudi.721.f: "这二十年里，这个大建筑工地一直是该地区最大的雇主。1880年，每天有大约200名工匠在建筑工地工作，还不包括供应商和其他间接参与建造的人。据说在国王要求特别紧迫的期限和紧急更改的时候，每天有多达300人在油灯的光下夜以继日地工作。1870年4月3日成立的社会机构——“霍亨施万高皇宫工匠协会”——非常现代化。该协会的目的是通过向工匠收取较低的月费和国王的大力资助，保证得病或受伤的建筑工人能继续领取工资。该协会类似于现代的社会保险或是职业工会，能保证前述工人在15周内每周领取0.7马克。该协会甚至为建造过程中死去的工人的后代设立了赔偿金——尽管数额很低，但当时却极为少见。"
 gaudi.721.g: "值得支持的机构。"
 gaudi.721.h: "全国人民的榜样！"
 gaudi.721.i: "社会援助？我需要的是工人，而不是抱怨者！"
