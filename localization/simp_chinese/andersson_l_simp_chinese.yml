 andersson.311.t: "新的史前人类遗骸"
 andersson.311.d: "在一次公开活动中，[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士向公众展示了这具新出土的史前遗骸。科学界已注意到这一复原成果。"
 andersson.311.f: "“你能看多远往回看，就能看多远往前看。”——雷蒙德·达特"
 andersson.311.g: "[GetPlayer.GetName]是一个世界级的科学强国！"
 andersson.911.t: "人类学大会：现代人类的起源"
 andersson.911.d: "我国将主办人类学历史上最重要的一次大会。人类的一大根本问题——即人类的起源问题——应在此得到澄清。来自世界各地的人类学家将讨论这一起源究竟发生在欧洲、亚洲还是非洲。[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName]将主持这场辩论。"
 andersson.911.f: "人从何处来？《圣经》中关于人被逐出伊甸园的故事已经包含了这一问题的核心——人显然并非来自他今天所居住的地区。因此，在欧洲很长一段时间里，古代人类骨骼被认为是那些在大洪水中灭亡之人的遗骸——正如恐龙长期被认为是没有登上诺亚方舟的动物一样。随着冰河时代理论的提出以及随后地质学与古生物学研究的开展——这些研究表明地球远比预想的古老——人们对穴居人的兴趣日益增加。最晚到进化论以及距今数千年以上的史前骨骼被发现之后，现代人类起源地的问题变得更加突出。"
 andersson.911.g: "人类的摇篮在哪里？"
 andersson.912.d: "国际科学界即将迎来一场盛会。[SCOPE.sCountry('andersson_congress_host_country').GetName]已向全球广发邀请，大会将以现代人类的起源为题，展开深入研讨。[SCOPE.sCharacter('andersson_anthropologist_scope').GetLastName]教授亦在其列，收到了一份情辞殷切的参会邀请。"
 andersson.914.t: "现代人类起源于欧洲？亚洲？还是非洲？"
 andersson.914.d: "学术界已分裂为三个阵营。人类摇篮的问题不仅与某种民族自豪感相关联，也与关于人类演化的进一步论点紧密相连。"
 andersson.914.f: "在一场激烈的辩论中，三个阵营各自的倡导者相互交锋。[SCOPE.sCharacter('andersson_europe_defender_scope').GetLastName]将欧洲列为人类起源地，因为迄今发现的化石显示欧洲化石的脑容量最大。既然大脑增大发生在直立行走之前，这一推论便不可避免。[SCOPE.sCharacter('andersson_asia_defender_scope').GetLastName]则质疑这一理论。直立行走、类似人类的代表化石已在亚洲被发现——因此大脑是在直立行走之后才发育出来的。而[SCOPE.sCharacter('andersson_africa_defender_scope').GetLastName]则指出，已知与人类最接近的猿类物种来自非洲，而非亚洲。正如进化论的创立者所依据的那样，人类的起源地必定在非洲"
 andersson.914.g: "现代人类是在欧洲发展起来的。"
 andersson.914.h: "种种迹象都指向亚洲起源。"
 andersson.914.i: "非洲才是人类的摇篮。"
 andersson.915.t: "受到尊重的演讲"
 andersson.915.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName]在[SCOPE.sCountry('andersson_congress_host_country').GetName]为济济一堂的科学同仁登台开讲，其洞见令满座听者与青年后学无不为之叹服，深受启悟。"
 andersson.915.f: "“地球是人类的摇篮，但人类不可能永远待在摇篮里。”\n——康斯坦丁·齐奥尔科夫斯基"
 andersson.915.g: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetLastName]教授令人印象深刻。"
 andersson.916.t: "对辩论的宝贵贡献"
 andersson.916.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName]教授在[SCOPE.sCountry('andersson_congress_host_country').GetName]科学大会上发表的精彩科学讲座拓宽了学术界的视野。它可能会产生持久的影响。"
 andersson.916.f: "“他对很多事情都持有非常奇怪的理论。有一次，他甚至在不列颠协会上发言，宣称猿猴和人类一样，大脑中也有河马大体。这种说法令人震惊；因为，如若确实如此，千百万不朽的信仰、希望和慈悲又会何以自处呢？你可能认为你和猿猴之间还有其他更重要的区别，比如会说话、会制造机器、会明辨是非、会祈祷，以及其他类似的小事；但那只是孩子的幻想，亲爱的。除了伟大的河马测试之外，什么都靠不住。如果你的大脑里有河马大体，你就不是猿类，尽管你有四只手，没有脚，而且比所有的猿都更像猿。”\n——查尔斯·金斯利"
 andersson.917.t: "人类学遗产"
 andersson.917.d: "大会上宣布了一个令人悲痛的消息：一位著名的人类学家几天前去世了。他的私人收藏将被拍卖。"
 andersson.917.f: "“这人没孩子、没老婆、也没朋友，但有的是老石头和骨头。多幸福的人生啊！”"
 andersson.917.g: "每块骨头对我们的收藏都很有价值。"
 andersson.917.h: "但我们自己就有很多……"
 andersson.919.t_europe: "现代人类起源于欧洲"
 andersson.919.t_asia: "现代人类起源于亚洲"
 andersson.919.t_africa: "现代人类起源于非洲"
 andersson.919.d_europe: "国际科学界已就现代人类起源于欧洲达成共识。非欧洲学者则谴责这一决定为霸权主义。"
 andersson.919.d_asia: "国际人类学大会近期达成一项妥协性共识，认为人类必然起源于亚洲。大会多数成员赞同此观点。"
 andersson.919.d_africa: "经过一场极具争议的最终辩论后，科学家们以微弱多数达成一致，将人类的起源地定于非洲。"
 andersson.919.f_europe: "从历史角度看，人类真正的起源地在20世纪初尚无定论。当时有一小部分人——部分因所谓的皮尔当人发现而受误导——怀疑现代人起源于欧洲，但这更多是出于意识形态而非科学原因。相比之下，亚洲理论获得了最多支持，爪哇的发现和北京人的出土对此起了很大作用。直到20世纪中期，越来越多的非洲发现才开始动摇这一观点。"
 andersson.919.f_asia: "从历史角度看，人类真正的起源地在20世纪初尚无定论。当时有一小部分人——部分因所谓的皮尔当人发现而受误导——怀疑现代人起源于欧洲，但这更多是出于意识形态而非科学原因。相比之下，亚洲理论获得了最多支持，爪哇的发现和北京人的出土对此起了很大作用。直到20世纪中期，越来越多的非洲发现才开始动摇这一观点。"
 andersson.919.f_africa: "从历史角度看，人类真正的起源地在20世纪初尚无定论。当时有一小部分人——部分因所谓的皮尔当人发现而受误导——怀疑现代人起源于欧洲，但这更多是出于意识形态而非科学原因。相比之下，亚洲理论获得了最多支持，爪哇的发现和北京人的出土对此起了很大作用。直到20世纪中期，越来越多的非洲发现才开始动摇这一观点。"
 andersson.919.g: "正如所料，人类是在欧洲演化而来的。"
 andersson.919.h: "所有证据都表明人类是在亚洲演化而来的。"
 andersson.919.i: "“走出非洲”如今已是公认的论点了。"
