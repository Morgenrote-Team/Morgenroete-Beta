 andersson.405.t: "The Megaliths of [SCOPE.sState('andersson_state_scope').GetFarmHubName]"
 andersson.405.d: "Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] has developed a strong interest in the megaliths in [SCOPE.sState('andersson_state_scope').GetFarmHubName] and has studied their background in detail. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U] recently published [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis] studies - largely speculative - on these Neolithic structures, thereby attracting attention in the anthropological community."
 andersson.405.f: "Megalithic culture describes a phenomenon of the Neolithic period, in which communities between 4500 and 1500 BC used massive stone blocks to construct monumental places of worship and burial sites. From the Atlantic coast to the Mediterranean, these structures shaped Europe's first permanent sacred landscape. The forms range from solitary menhirs and kilometre-long rows of stones, such as those at Carnac, to table-like dolmens that served as collective burial sites. Particularly complex are the circular henges, the most famous of which, Stonehenge, displays a precise astronomical alignment. The transport and erection of the megaliths, weighing several tonnes, required enormous social organisation as well as advanced knowledge of statics and logistics."
 andersson.405.g: "And our ancestors really built that 5,000 years ago?"
 andersson.407.t: "Skulls, Skulls and more Skulls!"
 andersson.407.d: "In [SCOPE.sState('andersson_state_scope').GetName], there is utter misery. Everyone is suffering from the widespread destruction. Everyone? No! Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] has found numerous recent human skulls, which [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe] has collected for examination!"
 andersson.407.f: "'So many beautiful skulls for my craniological studies!'"
 andersson.407.g: "That's quite macabre."
 andersson_institute_can_construct_has_fossils_tt: "We need #G 25#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]  (We have [GetPlayer.MakeScope.Var('andersson_total_human_fossil').GetValue|0])."
