 andersson_neolithic_scenery_modifier: "新石器时代"
 andersson_mesolithic_scenery_modifier: "中石器时代"
 andersson_upper_paleolithic_scenery_modifier: "旧石器时代晚期"
 andersson.601.t_neolithic: "新石器时代"
 andersson.601.t_mesolithic: "中石器时代"
 andersson.601.t_upper_paleolithic: "旧石器时代晚期"
 andersson.601.d: "[GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士已完成史前时代生活实景再现的筹备工作。不仅学生与教授，感兴趣的公众人士亦在参观这些雕塑，以领略古代生活之风貌。"
 andersson.601.f_neolithic: "新石器时代，代表了人类生存方式的一次根本性转变，其核心特征是从游牧式采集狩猎向定居式农耕的过渡。在这一时期，人类开始了对植物与动物的系统性驯化，从而确保了更为可靠的食物供给。这一转变促进了永久性定居点的建立，人们建造了由木材、石材或泥砖制成的耐久住所。由此产生的食物盈余支撑了更庞大的人口规模，并使得包括制陶与纺织在内的专业化劳动得以出现。在技术层面，这一时期的特征在于磨制石器工具的使用以及社会等级制度的形成。"
 andersson.601.f_mesolithic: "中石器时代，是介于旧石器时代与新石器时代之间的一个过渡阶段。该时期始于末次冰期之后，其核心特征在于气候变暖与冰川消退，这迫使人类群体适应不断变化的生态系统。与他们的祖先不同，中石器时代的人们使用了细石器——即小而精密的燧石刀片，用以制造复合工具，如带倒刺的矛与箭。尽管人口大体上仍保持着游牧生活方式，但鱼类、森林猎物及野生植物的日渐丰富，使得季节性的稳定居留成为可能，并促成了临时性营地的使用。"
 andersson.601.f_upper_paleolithic: "旧石器时代晚期，或称晚期石器时代，标志着旧石器时代的最后阶段，其核心特征在于人类创造力与认知复杂性的显著迸发。在这一时期，智人发展出高度专业化的石叶技术，利用燧石、骨骼与鹿角制作出精密的工具。人类作为游牧的狩猎采集者，追随驯鹿、猛犸象等大型迁徙兽群，在广袤的冻原上辗转迁徙。除生存之外，这一时代最为瞩目的是具象艺术与象征表达的发端。人们创作了繁复的洞穴壁画、精巧的个人饰物以及著名的“维纳斯”小雕像，暗示着复杂语言与精神信仰的萌生。"
 andersson.601.g: "了不起！"
 andersson.64.t: "克洛维斯矛尖"
 andersson.64.d: "在新墨西哥州的克洛维斯，[GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士发现了迄今最古老的美洲原住民生活痕迹——这些矛头的年代，远早于研究人员在这片大陆上所见的任何其他同类器物。"
 andersson.64.f: "克洛维斯矛尖的发现，于20世纪初彻底改写了美国的考古学与人类学版图。这些造型别致、带有凹槽的石质矛头，最早在1920年代末至1930年代初，于新墨西哥州克洛维斯附近被学界认识。真正的突破发生在这些工具与已灭绝的更新世巨型动物群遗骸——具体而言，猛犸象——直接伴生出土之时。此后数十年间，这一发现成为“克洛维斯第一”模型的奠基石。该模型断言，正是这批掌握精湛狩猎技术的人群，在大约13000年前率先踏入了美洲大陆。"
 andersson.64.g: "这意味着，人类在美洲的栖居史，比先前所认为的要整整多出一万多年！"
 andersson.65.t: "龙人"
 andersson.65.d: "哈尔滨一座桥梁施工期间，一名建筑工人无意间挖出一枚奇异的头骨。消息即刻传至[GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士处，由其亲自检验。初步诊断令人震惊：除了尼安德特人之外，中国大地上是否还曾生活着另一种人类？"
 andersson.65.f: "这枚被称为“龙人”的化石头骨发现于中国哈尔滨，被命名为龙人。尽管该头骨早在1933年便已出土，却直至2021年才引起科学界的广泛瞩目。其年代可上溯至至少14.6万年前的中更新世，原始特征与进步特征在此交织成独特的组合。龙人体格粗壮，脑颅巨大、眉脊粗厚、眼眶近乎方形。有研究者认为，这一支系与智人的亲缘关系，甚至比尼安德特人还要亲近。如今，大多数学者倾向于将“龙人”归入丹尼索瓦人群体。"
 andersson.65.g: "龙人一族？他们究竟有多危险？"
 andersson.66.t: "弗洛勒斯人"
 andersson.66.d: "在弗洛勒斯岛的一次研究考察中，[GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士取得了一项此前被认为绝无可能的发现——一块化石竟表明，岛上曾生活着一个独立且形似矮人的人类物种！"
 andersson.66.f: "弗洛勒斯人是一种已灭绝的小体型人亚科物种，2003年发现于印度尼西亚弗洛勒斯岛的梁布亚洞穴，其生存年代延续至约5万年前。该物种身高仅约1.1米，脑容量约400立方厘米，因而赢得“霍比特人”的别称。科学家认为，其矮小身材源于岛屿侏儒化——一种孤岛物种因资源受限而体型缩小的演化机制。尽管脑容量不大，他们却能使用精密的石器，甚至捕猎矮象。他们在人类家族树中的确切位置至今仍悬而未决，相关理论将他们与直立人乃至更为原始的祖先联系在一起。"
 andersson.66.g: "他们是否栖居洞穴、熏烤草药、还长着一双毛茸茸的脚？"
 je_andersson_craniometry: "颅骨测量"
 je_andersson_craniometry_reason: "[GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士在数月间全身心投入于测量大量头骨的工作中，我们完全确信，这是完全正常的科学行为，绝不可能从中产生出任何疯狂的念头。"
 je_andersson_craniometry_goal: "人类学家将在一年后完成颅骨测量。"
 andersson.701.t: "头骨测量告竣"
 andersson.701.d: "[GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士充分放松下来，花了数月时间对数百个头骨进行测量、编目、记录和比较，为其进一步的人类学工作得出了结论。感觉真好！"
 andersson.701.f: "在19世纪，颅骨测量学——对头骨进行科学测量的学科——成为对人类差异进行分类的主要方法。支持者如塞缪尔·莫顿和保罗·布罗卡认为，颅骨容量和形状是智力、道德品质和演化状态的直接指标。安德斯·雷丘斯提出的颅骨指数被用于区分“原始”人群与“先进”人群。尽管颅骨测量学被滥用于为种族政治提供合法性，但其中的许多发现对人类化石研究仍有参考价值。"
 andersson.701.g: "那真是相当奇怪。"
 andersson.711.t: "单一起源论VS多区域起源论"
 andersson.711.d: "[GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士在其头骨检验中反复观察到一些不可能是巧合的关联。显然，人类并非同源。"
 andersson.711.f: "单一起源论与多区域起源论的辩论是19世纪人类学中关于人类起源的核心冲突。单一起源论者主张单一起源（人类同源），通常援引《圣经》创世说或后来的演化共同祖先学说。他们认为环境因素导致了不同人群之间的体质差异。相反，多区域起源论者断言，人类各人种属于不同的物种，有着各自独立的起源。这一观点常得到早期颅骨测量数据的支持，用以主张“固定”的生物等级。"
 andersson.711.g: "颅骨测量的检验结果毋庸置疑！"
 andersson.711.h: "[GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士一定是弄错了；人类显然只有一个起源。"
 andersson.712.t: "进化论与传播论"
 andersson.712.d: "在检验古埃及、罗马和美洲原住民的头骨时，[GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士反复自问：究竟是存在若干优越的文化，作为创新中心向四周扩散一切发展成果；还是恰恰相反，所有文化都必须经历从野蛮到文明的各个阶段——而众多人群仅仅是被困在了石器时代的水平上？"
 andersson.712.f: "进化论者主张单线进化。他们认为，在普遍的人类心理和独立发明的驱动下，所有社会都经历相同的阶段——从“原始”到“文明”。相反，传播论者则质疑这种内部演进模式。他们提出，重要的文化特征和技术很少被独立发明两次。他们认为，思想发源于特定的“文化中心”，并通过迁徙、贸易或征服向全球传播。"
 andersson.712.g: "每一种文化都经历从石器时代到现代性的转变。"
 andersson.712.h: "存在一种文化，进步从中同心圆式地向外扩散。"
