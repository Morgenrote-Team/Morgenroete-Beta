 je_andersson_hominid_prospecting_neoanthropus: "古人类勘探：新人"
 je_andersson_hominid_prospecting_neoanthropus_reason: "#p 目前，[SCOPE.sState('target').GetName]正在进行古人类化石的勘探工作。#!\n$mr_divider_for_je$\n人类学家搜寻人类化石的工作分为三步：勘探、采集与鉴定。勘探阶段，人类学家会在指定区域内寻找合适的人类学遗址。只有完成此步，方可着手采集化石。待采集到足够数量的化石后，随即展开鉴定工作。勘探与采集最终会导向一次发现事件。在鉴定过程中，也有可能识别出一种全新的古人类类型。\n\n$mr_divider_for_je$\n[GetGeographicRegion('andersson_geographic_region_neoanthropus').GetName]是一支遍布全球的物种。传统上，以下类型均被归入其下：\n[GetGeographicRegion('andersson_geographic_region_vero').GetName]\n[GetGeographicRegion('andersson_geographic_region_lagoa_santa').GetName]\n[GetGeographicRegion('andersson_geographic_region_cro_magnon').GetName]\n[GetGeographicRegion('andersson_geographic_region_boskop').GetName]\n[GetGeographicRegion('andersson_geographic_region_tianyuan').GetName]\n[GetGeographicRegion('andersson_geographic_region_talgai').GetName]"
