 andersson.801.t: "智人"
 andersson.801.d: "[GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士澄清了围绕所谓“新人”各种类型所产生的困惑，并最终将其视为同一类型的变体：智人。"
 andersson.801.f: "从“新人”到智人的转变，标志着20世纪古人类学的一个关键转折。“新人”（Neoanthropus）这一术语在1920年代至1950年代间被广泛使用，属于类型学分类，旨在区分现代人与尼安德特人等古老支系。该术语是现已过时的“前人理论”的核心概念。在1950年代的现代综合演化论时期，以恩斯特·迈尔为代表的演化生物学家推动建立严格的、基于种群分类学的体系。他们反对冗余的属名泛滥，主张回归林奈命名体系中的智人（1758年命名）。这次重新分类用一种统一的生物学物种概念取代了僵化的形态学“类型”。此后，“新人”一词被弃用，所有现代人类被合并至一个分类单元，以强调演化上的连续性。"
 andersson.801.g: "人类学正在走出其初创阶段。"
 andersson.802.t: "尼安德特人"
 andersson.802.d: "[GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士澄清了围绕所谓“古人”各种类型所产生的困惑，并最终将其视为同一类型的变体：尼安德特人。"
 andersson.802.f: "从“古人”到尼安德特人的嬗变，标志着20世纪中叶人科分类学的一次整合。最初，“古人”（意即“古代人”）作为一个宽泛的类别，用以指代以尼安德特人为主要代表的古代人类，从而将他们与现代人种区分开来。这一术语折射出20世纪早期类型学的思维模式——该模式常将古代形态视作各自独立且线性排列的“演化阶段”。“现代综合演化论”时期（1940至1950年代），以恩斯特·迈尔为代表的科学家力主在“人属”之下建立统一的分类体系。于是，含义含混的“古人”一词遭弃，代之以尼安德特人之名，将尼安德特人视为一个生物种群，而非某种独特的“原始”类型。此番转变，既强调了演化的连续性，也确立了当前的研究框架。在这一框架下，尼安德特人被公认为现代人的一支特化姊妹支系"
 andersson.803.t: "直立人"
 andersson.803.d: "[GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士澄清了围绕所谓“猿人”各种类型所产生的困惑，并最终将其视为同一类型的变体：直立人。"
 andersson.803.f: "从“猿人”到直立人的嬗变，标志着将散落于各地的不同化石发现整合为单一全球性物种的历程。“猿人”一名，由欧仁·杜布瓦于1891年为他所发现的“爪哇人”创制，意即“猿人”，旨在昭示非人灵长类与现代人之间的“缺失环节”。20世纪早期，“中国猿人”（北京人）等名目迭出，令人科分类学愈加芜杂。决定性的转折发生于1950年前后的“现代综合演化论”时期，由恩斯特·迈尔所推动。迈尔指出，亚洲与非洲标本之间的解剖学差异，实属种群层面之变，而非属层面的分野。通过将这些化石重新划归直立人，科学家们从类型学的“寻链”思维转向了统一的生物学物种概念，从而确认了一个广布于大地、适应力卓绝的人属祖先。"
