 andersson_piltdown_debate_won_modifier: "[GetPlayer.GetCustom('andersson_fossil_piltdown')]：辩论获胜"
 andersson_piltdown_debate_lost_modifier: "[GetPlayer.GetCustom('andersson_fossil_piltdown')]：输掉辩论"
 andersson.501.t: "[GetPlayer.GetCustom('andersson_fossil_piltdown')]是个骗局！"
 andersson.501.d: "经[SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetLastName]博士缜密调查，[SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetSheHe]终证实：所谓的人类遗骸，纯属伪造。此一结论，令[GetGlobalVariable('andersson_piltdown_country_global_var').GetCountryDefinition.GetName]颜面尽失。而那位[SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetAdjectiveNoFormatting]首席人类学家——[SCOPE.sCharacter('andersson_piltdown_defender_scope').GetLastName]博士，亦被揭穿，不过是一名江湖骗子！"
 andersson.501.f: "自[GetPlayer.GetCustom('andersson_fossil_piltdown')]被发现以来，一些非[SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetAdjectiveNoFormatting]科学家便对其真实性深表怀疑，并倾向于将这一\"发现\"归咎于[SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetAdjectiveNoFormatting]对声誉的渴求。尽管多位德高望重的学者曾多次试图揭穿这场骗局，但均以失败告终。然而，[SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetFullName]终于向世人揭开了这项发现的真实面目：此乃人类学史上最大的骗局。该头骨不仅远比宣称的年代更近——实则仅出自中世纪；造假者更是将人类的上颌骨与猩猩的下颌骨拼凑在了一起。"
 andersson.501.g: "最终，还是严肃科学站得住脚。"
 andersson.502.t: "科学上的灾难！"
 andersson.502.g: "一场举世罕见的国际丑闻！"
 andersson.503.t: "输掉辩论"
 andersson.503.d: "尽管[SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetHerHis]据理力争，[SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetLastName]博士最终仍未能说服学术界——[GetPlayer.GetCustom('andersson_fossil_piltdown')]不过是一场骗局。[SCOPE.sCharacter('andersson_piltdown_defender_scope').GetLastName]博士则已被证明是一位出色的演说家。"
 andersson.503.f: "显然，那位[SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetAdjectiveNoFormatting]科学家在辩论当日仍藏有几张王牌。[SCOPE.sCharacter('andersson_piltdown_defender_scope').GetHerHis]败因归结为三点：偏见、贿赂，外加一顿糟糕的早餐。"
 andersson.503.g: "莫非这发现是真的也说不定……？"
 andersson.504.t: "科学胜利"
 andersson.504.d: "一个来自某个更微不足道国家的无名科学家，企图揭露我们宝贵的[GetPlayer.GetCustom('andersson_fossil_piltdown')]人类化石系伪造品，这一图谋已告破产。在这场争议中，人类学研究所反而愈发壮大。"
 andersson.504.f: "若是外国拿得出手的，不过是这些可笑的论据，那现代人类起源于[SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetName]，便是显而易见、不容置疑的事了。"
 andersson.504.g: "下一位！"
 andersson.511.t: "[GetPlayer.GetCustom('andersson_fossil_piltdown')]：辩论准备"
 andersson.511.d: "[SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetLastName]博士正准备揭穿一具重要化石的造假真相——[SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetSheHe|U]即将迎战[SCOPE.sCharacter('andersson_piltdown_defender_scope').GetLastName]博士的阻击。双方皆为各自的荣誉，乃至各自国家的荣誉而战。"
 andersson.511.f: "人类学家的辩论实力主要取决于其经验，其次取决于其性格特质。此外还存在一定的偶然因素，因为每日状态的波动也会被纳入考量。拥有化石的国家略占优势，因为新理论必须先战胜既有的理论。辩论实力得分更高的人类学家赢得辩论。若双方平局，则由辩护方获胜。\n\n[SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetFullNameNoFormatting]来自[SCOPE.sCountry('andersson_piltdown_attacker_country_scope').GetName]：[SCOPE.GetValue('andersson_piltdown_attacker_points_scope')|0+]#V 辩论实力#!\n\n[SCOPE.sCharacter('andersson_piltdown_defender_scope').GetFullNameNoFormatting]来自[SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetName]：[SCOPE.GetValue('andersson_piltdown_defender_points_scope')|0+]#V 辩论实力#!"
 andersson.511.g: "我们正将[GetGlobalVariable('andersson_piltdown_country_global_var').GetCountryDefinition.GetName]置于一场公开的科学辩论之中！"
 andersson.511.h: "仔细考虑一下的话，这是个坏主意。"
