 andersson.401.t: "狩猎营地"
 andersson.401.d: "在一次洞穴学考察途中，[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士于[SCOPE.sState('andersson_state_scope').GetName]偶然发现一处疑似狩猎营地的遗迹，并将其年代定为中石器时代。"
 andersson.401.f: "经短暂搜寻，这位人类学家便获得了大量史前遗物——包括长矛与箭镞，以及一把可能溯至新石器时代的手斧。更为精细的检验工作，将待其返校后展开。"
 andersson.401.g: "这些发现，必将为我们洞悉往昔提供新的契机。"
 andersson.402.t: "陶器"
 andersson.402.d: "人类学家和考古学家在[SCOPE.sState('andersson_state_scope').GetName]成功找到了一些陶器。它们放在博物馆藏品中会很美观。"
 andersson.402.f: "人类学家所发现的这些器皿，若不知其已有数千年历史，或许会被称为原始。从这个角度看，它们反而显得颇为精致。专家已受委托对这些陶器进行颜料残留物的检验。"
 andersson.402.g: "小心拿放！"
 andersson.403.t: "新石器时代聚落"
 andersson.403.d: "[SCOPE.sState('andersson_state_scope').GetName]的一支人类学团队报告了好消息：他们幸运地发现了一处新石器时代的聚落遗址。[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士确信将获得大量来自这一时代的人工制品和新知识。"
 andersson.403.f: "经勘察，该聚落已拥有类似栅栏的围场，还测绘出了一口水井和若干马厩，以及一个粮仓。这可能是有记载的我国最早的聚落之一。"
 andersson.403.g: "科学界为之轰动"
 andersson.404.t: "人骨"
 andersson.404.d: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士找到了几块新的骨头。"
 andersson.404.f: "在[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士的带领下，一支人类学家团队发现了一处墓葬遗址，内含数千年前的骨骼，其中几块保存得尤为完好。"
 andersson.404.g: "我希望这不会像上次那些残羹剩饭一样令人失望。"
 andersson.406.t: "一支史前骨笛"
 andersson.406.d: "一名徒步旅行者在[SCOPE.sState('andersson_state_scope').GetName]的一个洞穴中偶然发现了一块奇特的骨头。在联系当地大学后，[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士被派往该洞穴。[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U]发现了一块骨头，但这并非寻常骨头，而是一支史前骨笛！"
 andersson.406.f: "“清澈而高亢的骨笛哨声，宛如天使之音，诡异地萦绕在每个人心头。”"
 andersson.406.g: "尚能奏乐否？"
 andersson.408.t: "石器和骨骼出土"
 andersson.408.d: "[SCOPE.sState('andersson_state_scope').GetName]出土了大量石器和骨骼。[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士被立即派往调查。[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe]确实找到了许多骨头，似乎是各种动物的骨头，以及一些石制人工制品。"
 andersson.408.f: "“我想这是鹿的骨头。或者是人的？也许是恐龙的？鲨鱼的？一只大猴子的？骨头确实不是我的专长领域……”"
 andersson.408.g: "等等！那些是什么骨头？现代的？史前的？恐龙的？"
 andersson.409.t: "“史前维纳斯”被发现"
 andersson.409.d: "一件石器时代的史前小雕像在[SCOPE.sState('andersson_state_scope').GetStateRegion.GetMineHubName]被发现。许多人不太喜欢它的外观，因为这个小小的象牙雕像似乎有着硕大的臀部和胸部。[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士尚不确定这尊小雕像的用途：它是一位女神，还是仅仅是一件护身符？"
 andersson.409.f: "维纳斯小雕像属于旧石器时代晚期，尤其是格拉维特时期（约公元前3万至前2.2万年）创作的小型史前女性雕像。它们的分布范围遍及欧洲乃至西伯利亚，通常由石头、象牙、骨骼雕刻或用黏土塑造而成。许多雕像的胸部、臀部和腹部都做了夸张处理，而面部细节则常常缺失。著名的例子包括维伦多夫的维纳斯和下维斯特尼采的维纳斯。这些雕像的用途至今仍有争议；有人认为是生育符号，有人说是仪式用具，也有人解释为自我再现或社会身份的表达。维纳斯小雕像被视为早期象征艺术的重要例证。"
 andersson.409.g: "她是[SCOPE.sState('andersson_state_scope').GetStateRegion.GetMineHubName]的维纳斯！"
