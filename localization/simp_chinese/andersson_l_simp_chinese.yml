 je_andersson_hominid_expedition: "古人类考察"
 je_andersson_hominid_expedition_reason: "#p 古人类考察目前正在[SCOPE.sState('target').GetCountry.GetName]的[SCOPE.sState('target').GetName]开展活动。#!\n$mr_divider_for_je$\n人类学家寻找化石的过程分为三个步骤：勘探、采集与鉴定。勘探阶段，人类学家在区域内搜寻合适的人类学遗址。唯有寻得合适地点，方可开始采集化石。一旦化石数量充足，便着手进行鉴定。勘探与采集最终将导向一次发现事件。鉴定过程中，亦有可能识别出全新的人科类型。"
 andersson_je_no_subject_anymore_tt: "[GetPlayer.GetName]不再是考察队活动区域的拥有者。"
 andersson_hominid_expedition_modifier: "古人类考察"
 andersson.205.t: "古人类考察：物种"
 andersson.205.d: "在[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士能够组建考察队之前，首先必须就目标人科类型做出决断。"
 andersson.205.f: "“进化究竟是一种理论、一个体系，还是一种假说？它远不止于此：它是所有理论、所有假说、所有体系都必须臣服的一般性条件，从今往后，唯有满足这一条件，它们才可能是可思且真实的。”\n——皮埃尔·泰亚尔·德·夏尔丹（德日进）"
 andersson.206.t: "古人类考察：区域"
 andersson.206.d: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士已命助手取来值得前往考察的海外领地地图。决定尚未做出。"
 andersson.206.f: "“关于早更新世欧洲是否曾有人科成员活动的问题，我始终持开放态度。”\n——路易斯·利基"
 andersson.213.t: "古人类考察：结束"
 andersson.213.d: "经过一次艰苦但值得的远征，[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士及其团队已平安归来。人类学研究所现在又多了几块骨骼。"
 andersson.213.f: "“这件事总算完成了……我也差不多了。”——罗伯特·布鲁姆（在去世前不久完成关于南方古猿的专著时所言）"
 andersson.225.d: "[SCOPE.sCountry('andersson_cave_country_scope').GetName]的洞穴中，[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]弄出了个了不得的发现。"
