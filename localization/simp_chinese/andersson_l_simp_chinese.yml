 rule_andersson_anthropology_rule: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon!#!人类学规则 "
 setting_andersson_anthropology_historical_rule: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_andersson_anthropology_historical_rule_desc 史实#!#!"
 setting_andersson_anthropology_historical_rule_desc: "自某个历史日期起，[Concept('concept_andersson_human_fossil','$MR_FOSSILS$')]开始被发现。作为历史事件一部分而发现的人类化石不会获得人类学威望。如果一个国家在该历史日期之前发现了人类化石，则该发现将按其出土地点进行命名。"
 setting_andersson_anthropology_free_rule: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_andersson_anthropology_free_rule_desc 自由#!#!"
 setting_andersson_anthropology_free_rule_desc: "没有特定的历史事件与[concept_andersson_human_fossil]发现关联。所有发现都根据发现地点统一定名。"
 andersson_has_active_anthropologist_tt: "拥有一位空闲[concept_andersson_anthropologist]"
 andersson.106.t: "人类学考察队离开"
 andersson.106.d: "在人类学团队完成工作后，研究助理们返回了祖国。他们发现的洞穴现在也可供我们的学者进入。"
 andersson.106.f: "“无人曾先我们步入这片深渊，无人知晓我们将去何方、所见何物，从未有如此奇异之美呈现在我们面前，我们不约而同地问彼此同一个问题：我们难道不是在梦中吗？” ——查尔斯·莱尔"
 andersson.106.g: "这会是有用的外援。"
 andersson_anthropologist_dies_tt: "[concept_andersson_anthropologist]死后该日志条目将失效。"
 je_andersson_reconstruct_prehistoric_skeleton: "复原史前人类遗骸"
 je_andersson_reconstruct_prehistoric_skeleton_reason: "人类学家根据自身经验与特质复原骨骸。某一人种——新人、古人、猿人或南方古猿——的首具骨骸还将陈列于研究所内，并带来声望增益。人类学家亦可原各人种的所有其他骨骸，从而积累额外的人类学声望。"
