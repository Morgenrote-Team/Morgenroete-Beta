 andersson.10.t: "人类学与民族学研究所"
 andersson.10.d: "在今日的庆典上，[SCOPE.sCharacter('andersson_ruler').GetPrimaryRoleTitle][SCOPE.sCharacter('andersson_ruler').GetFullName]亲临现场，为人类学与民族学研究所揭牌。"
 andersson.10.f: "这场开幕典礼庄重而肃穆，总体上颇受嘉许，新闻界、学界专家与大众均表善意，然亦非全无杂音。无外乎又是一栋被某种收藏偏执所驱使、用来罗列一堆毫无价值的奇珍异宝的建筑？一家反对派报纸抨击此举徒靡公帑、内蕴贫乏，并指政府已是黔驴技穷，再无新意可呈。或搜罗古物，或采集草药，更有那些对恐龙情有独钟的痴人——如今，竟轮到累累白骨了！所幸，这些非议终究寥若晨星，未能消减公众对这栋新厦与日俱增的热忱，[SCOPE.sCharacter('andersson_ruler').GetPrimaryRoleTitle][SCOPE.sCharacter('andersson_ruler').GetFullName]也再次着意彰显了它的意义所在。"
 andersson.10.g: "参观研究所"
 andersson.21.t: "维罗人"
 andersson.21.d: "伊莱亚斯·塞拉德斯因在佛罗里达州发现了一些古代骨骼，引起了全国性的轰动。"
 andersson.21.f: "“维罗人”一名，所指乃地质学家伊莱亚斯·塞拉德斯于1915至1916年间在佛罗里达州维罗海滩所发掘的一组重要更新世人类遗骸。这一发现起初激起轩然大波——遗骸竟与冰期已灭绝的巨型动物群同处一地质层位，对当时甚嚣尘上的“人类晚至美洲”说构成了直接挑战。而今，经现代碳定年技术与先进考古学方法佐证，该遗址已被确认为北美最古老的人类栖居地之一，可上溯至约一万三千年前。"
 andersson.21.g: "很有趣。"
 andersson.22.t: "拉戈阿桑塔人"
 andersson.22.d: "一位丹麦科学家在巴西的一处洞穴中有了一项惊人发现。"
 andersson.22.f: "拉戈阿桑塔人指的是一批古印第安人骨骼遗存，由丹麦博物学家彼得·威廉·隆德于19世纪中期在巴西米纳斯吉拉斯州的石灰岩洞穴中发现。此后的现代遗传学研究和考古学分析将这些遗存归入南美洲最早一批人类定居者的范畴，其年代可追溯至大约一万至一万两千年前"
 andersson.23.t: "克罗马侬人"
 andersson.23.d: "路易·拉特发现了数具史前人类骨架，这些人与尼安德特人相比，与现代人的相似度显著更高。根据克罗马侬岩棚遗址的命名，这些最早的欧洲人被称为克罗马侬人。"
 andersson.23.f: "克罗马侬人是指欧洲旧石器时代晚期的第一批早期现代人（智人），由地质学家路易·拉特于1868年在法国莱塞济的一处岩棚中发现。该遗址出土了五具骨架，以及石制工具、雕刻的鹿角和动物遗骸，首次提供了确凿证据，证明解剖学意义上的现代人曾与已灭绝的更新世动物群共同生活在欧洲。这些发现在奠定人类古生物学领域基础方面作用重大，将标本年代确定为约28000至30000年前，并将其与先前发现的体格更为粗壮的尼安德特人区分开来。"
 andersson.24.t: "博斯科普人"
 andersson.24.d: "一枚头骨的发现引起了一些农场工人的骚动。已通知最近的科研部门。"
 andersson.24.f: "博斯科普人指的是一枚人亚科化石头盖骨，于1913年由南非德兰士瓦地区的农场工人发现，以其异常大的估算脑容量而引人注目。在20世纪早期，一些人类学家错误地将该标本归类为一个独特的物种——“开普人”，并推测一个“大脑容量庞大”的人种曾在该地区早于现代人群而存在。随后的古人类学研究和更为精确的年代测定已驳斥了这些说法，确认该遗骸属于一个与现代人一致的个体，与科伊桑人的祖先谱系相符。"
 andersson.25.t: "山顶洞人"
 andersson.25.d: "今天在北京周口店遗址上方的一处洞穴里发现了人类化石，这说明中国北方很早就有早期人类定居了。"
 andersson.25.f: "山顶洞人指的是1933年至1934年在中国北京附近的周口店遗址山顶洞中发现的一批早期现代人类（智人）。这批化石由裴文中主持发掘，后经魏敦瑞分析研究，年代大约在3万至1万年前。在历史上，山顶洞人相当于亚洲版的克罗马农人。出土的遗骸包括三个完整的头骨和大量骨骼碎片，同时还发现了精致的工具、骨针和穿孔的牙饰，说明当时已有相当复杂的文化。魏敦瑞最初推测这些个体是现代亚洲人的“原蒙古人种”祖先，不过当代古人类学认为，他们只是东亚区域特征完全定型之前，早期人类在东亚更大范围、更多样化迁徙中的一部分。"
 andersson.26.t: "塔尔盖人"
 andersson.26.d: "在塔尔盖站附近发现了一块骨骼，这为了解澳大利亚最早的定居历史提供了全新线索。"
 andersson.26.f: "塔尔盖人指的是一块史前人类头骨，1884年由一位修围栏的工人在昆士兰州阿洛拉附近的塔尔盖站发现。这块头骨是证明澳大利亚有人类居住的最早证据之一。起初，由于它形态粗壮、矿化层很厚，人们误以为它属于一种更古老的人科物种。后来，通过对土壤碳酸盐进行放射性碳测年，确定这件标本的年代大约在13500年前。这一发现的历史意义在于，它证实了古代澳大利亚原住民与已灭绝的巨型动物曾生活在同一时期，为了解这块大陆原住民的深远历史提供了关键线索。"
 andersson.31.t: "尼安德特人"
 andersson.31.d: "一位波恩大学的研究人员与其学界同僚，今日公开宣布发现了一个已灭绝的早期人类物种。"
 andersson.31.f: "1856年8月中旬，意大利采石场工人在尼安德河谷的一段区域内发现了一些骨骼碎片，该区域当时因开采石灰石而遭到破坏。这些碎片起初被随手扔进碎石堆，但采石场主威廉·贝克霍夫和弗里德里希·威廉·皮珀注意到了它们。他们找回了16块较大的骨骼碎片，并将其交给约翰·卡尔·富尔罗特检查。波恩解剖学家赫尔曼·沙夫豪森通过新闻报道得知此事后，也对骨骼进行了检查，并得出了与富尔罗特此前相同的结论：它们属于一种古代形态的现代人类。1857年6月，富尔罗特和沙夫豪森在普鲁士莱茵兰自然历史协会的大会上展示了这一发现。然而，他们的解读并未得到与会专家的认同。这一被命名为“尼安德特1号”的发现，是尼安德特人这一物种的正模标本。"
 andersson.32.t: "直布罗陀人"
 andersson.32.d: "埃德蒙·弗林特船长在直布罗陀附近取得了一项几乎令人难以置信的发现。"
 andersson.32.f: "直布罗陀人（特指直布罗陀1号）指的是1848年由埃德蒙·弗林特船长在福布斯采石场发现的一具保存极为完好的成年女性头骨，这是现代科学首次发现的尼安德特人化石。尽管该标本比德国尼安德河谷的著名发现早了八年，但其作为一类独特人类近亲的重要性直到19世纪60年代才得到充分认识，而彼时“尼安德特人”这一名称早已被确立。此后的遗址及邻近的戈拉姆洞穴发掘表明，直布罗陀曾是尼安德特人最后的避难所之一，部分证据显示他们在此地生存至约2.8万至3.2万年前。"
 andersson.33.t: "斯派人"
 andersson.33.d: "在斯派附近，科学家们取得了一项宝贵的人类学发现，比以往任何时候都更清晰地揭示了比利时的史前历史。"
 andersson.33.f: "斯皮人指的是1886年由考古学家马塞尔·代·普伊特和地质学家马克西明·洛赫斯特在比利时斯派附近洞穴中发现的两具近乎完整的尼安德特人骨架。这一发现是古人类学的一个分水岭时刻，因为这些遗骸与穆斯特石器工具和已灭绝的冰河时代哺乳动物明确相关，确凿证明尼安德特人是古代史前人类，而非病态的现代个体。斯皮化石以其粗壮的骨架和突出的眉脊为特征，至今仍是理解晚期欧洲尼安德特人解剖学和行为的最重要标本之一，其年代可追溯至大约3.6万至4万年前。"
 andersson.34.t: "克拉皮纳人"
 andersson.34.d: "在克拉皮纳附近，研究人员发现了一处规模宏大的史前人类骨骼遗址，这一发现正彻底改写整个巴尔干地区的历史。"
 andersson.34.f: "克拉皮纳人是指古生物学家德拉古廷·戈尔亚诺维奇‑克兰贝格于1899年至1905年间在克罗地亚的胡什尼亚科沃山岩庇处发现的一大批约800件尼安德特人化石碎片。这一发现在其时代具有开创性意义。\n\n这一发现在当时具有开创性意义，因为戈尔亚诺维奇-克兰贝格运用了地层学分析，并率先采用X射线技术，证实了这些化石的年代久远，证明尼安德特人是人类进化史上的直接组成部分。该遗址距今约12万至13万年，至今仍是世界上规模最大、最重要的尼安德特人遗址，为研究尼安德特人的体质差异、健康状况以及可能的仪式性行为提供了丰富的资料。"
 andersson.35.t: "加利利人"
 andersson.35.d: "似乎可以确定，圣地确实是人类最古老的发源地之一——这一轰动性的发现如今已在国际科学界广为人知。"
 andersson.35.f: "加利利人指的是一个部分头骨，具体来说是被称为“祖蒂耶头骨”的额骨，于1925年由弗朗西斯·图尔维尔-彼得在现今以色列的穆加雷特祖蒂耶洞穴中发现。它是西亚发现的第一件古人类化石，最初因其独特的过渡特征引发争议，究竟是尼安德特人还是早期现代人。目前的古人类学观点通常将该标本（年代约为20万至35万年前）归类为晚期海德堡人，或属于尼安德特人和智人的共同祖先群体。"
 andersson.41.t: "海德堡人"
 andersson.41.d: "在海德堡附近，研究人员认为他们发现了历史上“最古老的德意志人”。"
 andersson.41.f: "海德堡人是由1907年丹尼尔·哈特曼在德国毛尔附近的一个砾石坑中发现的一块化石下颌骨所定义。该标本被称为“毛尔1号下颌骨”，距今约60万年，其特征是巨大而粗壮的构造，没有下巴，但其牙齿与现代人类的牙齿惊人地相似。如今，海德堡人被广泛认为是中更新世的关键祖先，被认为是欧洲尼安德特人和非洲智人的共同祖先。"
 andersson.42.t: "罗得西亚人"
 andersson.42.d: "瑞士矿工汤姆·兹维格拉尔几乎是在无意之间，取得了非洲迄今最重要的人类学发现之一。"
 andersson.42.f: "罗得西亚人指的是1921年由瑞士矿工汤姆·兹维格拉尔在北罗得西亚（今赞比亚卡布韦）的布罗肯希尔铅锌矿发现的一具近乎完整的头骨化石。该标本的正式学名为卡布韦1号，是非洲有史以来发现的第一件重要人类化石。它的显著特点在于既保留了原始特征——比如粗大的眉脊——又有着与现代人相当的脑容量。近期高精度测年结果显示，这具头骨距今约29.9万年，因此被归为海德堡人（也称罗得西亚人），而且很可能是与最早一批智人同时代、并存活到较晚时期的成员。"
 andersson.43.t: "北京猿人"
 andersson.43.d: "北京附近的新发现进一步支持了人类起源于亚洲的理论。"
 andersson.43.f: "20世纪20年代，在北京中心城区西南约40公里的周口店附近发现了一批化石，被称为“北京人”，归类为人属。1927年，戴维森·布莱克基本仅凭一颗牙齿，就将这些化石定为一个新种和新属——北京猿人（布莱克与兹丹斯基）。到1940年，威尔弗里德·勒格罗·克拉克依据当时已有的数十件化石，认为北京人与“爪哇人”亲缘关系很近，因此将它们归入欧仁·杜布瓦在1892年命名的同一个种属——直立猿人。这批原始化石在第二次世界大战期间遗失。"
 andersson.44.t: "爪哇人"
 andersson.44.d: "在荷属东印度群岛，医生兼解剖学家欧仁·杜波伊斯发现了一具史前人类祖先的化石遗骸——这在科学界既引发了轰动，也招来了争议。"
 andersson.44.f: "1891年，欧仁·杜波伊斯在东爪哇特里尼尔附近的梭罗河畔首次发现的化石被称为爪哇人。根据目前的知识估计其大约有一百万年的历史。它们是在欧洲以外发现的第一批人类化石，也是继尼安德特人之后找到的第二批现代人（智人）解剖学亲属化石证据。爪哇发现的人类化石最初被称为人猿，后来又被称为直立猿人。如今，大多数古人类学家都把它们归入直立人这一物种，偶尔也会像魏敦瑞在1940年建议的那样，以爪哇直立人这一亚种名强调它们的起源。在杜布瓦的发现 50年后，拉尔夫·冯·孔尼华回忆说：“没有任何其他古生物学发现能引起如此大的轰动，并导致如此多相互冲突的科学观点。”"
 andersson.51.t: "汤恩幼儿"
 andersson.51.d: "澳大利亚人雷蒙德·达特在汤恩做出了一个非凡的发现：一个猿类幼童的头骨表明他能直立行走。牙齿和大脑也呈现出接近人类的特征。汤恩幼儿可能是人类与其他灵长类之间的“缺失环节”。"
 andersson.51.f: "汤恩幼儿指的是1924年由采石场工人在南非汤恩的一处石灰石采石场发现的一具未成年古人类头骨化石，后经解剖学家雷蒙德·达特研究并记录。这件标本是非洲南方古猿这一物种的正模标本，也是“猿人”一词首次被科学界用来称呼在非洲发现的双足行走的人类祖先。尽管当时科学界坚信人类起源于亚洲或欧洲，汤恩幼儿最初遭到了普遍怀疑，但这一发现最终将古人类学的重心转移到了非洲。经测定，这个幼儿生活在大约280万年前。"
 andersson.101.t: "发现史前洞穴"
 andersson.101.d: "历经旷日持久的探寻，[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName]终于锁定了一处洞穴的入口，[SCOPE.sCharacter('andersson_anthropologist_scope').GetSheHe]据此推断，洞内极有可能封存着史前人类或远祖的遗骸。"
 andersson.101.f: "史前洞穴之中，常封存着人类或前人类物种的化石，以及其他带有人类学或考古学意涵的遗存。探勘此类洞穴，须由人类学家带队前往，对所获进行鉴定评估。这项研究，或将为追溯人类起源之谜提供关键的突破口。"
 andersson.101.g: "这个洞穴要尽快探索。"
 andersson.201.t: "古人类勘探：物种"
 andersson.201.d: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士想出了一个绝妙的主意——在[GetPlayer.GetName]的领土上，开展一场轰动学界、或至少小有所成的人类化石搜寻。一应可行之策，皆已备于[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis]案前。"
 andersson.201.f: "“尊敬的先生们，我在此邀请诸位参与一场关于已知及推测性人科类型的公开讨论。希望诸位拨冗出席。所有命名建议将被投入摇奖筒中，随后随机抽取。期待诸位的创意！”\n\n[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName]谨署"
 andersson.201.g: "无所谓。"
 andersson.201.h: "新人。"
 andersson.201.i: "古人。"
 andersson.201.j: "猿人。"
 andersson.201.k: "南方古猿。"
 andersson.211.t: "古人类勘探：完成"
 andersson.211.d: "人类学研究小组已顺利完成任务，正携研究成果返回[ROOT.GetCountry.GetCapital.GetCityHubName]。"
 andersson.211.f: "“希望各位都有所收获！人类的起源依然是个谜，但至少我们已能为之揭开些许面纱。杰克逊博士通过牙齿的磨损痕迹，得出了有关史前口腔卫生的结论；菲蒂帕尔迪博士则将出土的工具置于其历史背景之中，辨识出古代工艺的细微差别；而沙贝纳克教授终于明白，为何不该总坐在石笋上！”\n\n[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName]敬上"
 andersson.211.g: "一项人类学成就。"
 andersson.212.t: "洞中奇观"
 andersson.212.d: "我们的人类学家在[SCOPE.sState('andersson_cave_state_scope').GetName]发现了一个洞穴，里面有如此令人震撼的画作，以至于许多国内的研究人员声称这一定是赝品——处于如此原始阶段的人类根本不可能做到这些！"
 andersson.212.f: "“继续考察第一条画廊，在恰好堆积着骨骼和贝壳的地层终止之处，观者会惊奇地发现洞穴穹顶上布满了大量的动物壁画。这些壁画尺寸宏大，似乎以黑色和红色赭石绘制而成。其中大多数描绘的是动物，从其隆起的背脊形状来看，很像是美洲野牛——有两幅完整地从侧面展现了美洲野牛的形态，而另一些则缺失头部，还有一些姿态令人费解。此外，我们还能看到一幅极为传神的整只母鹿，以及一具看似马头的头颅。”——马塞利诺·桑斯·德·索图奥拉"
 andersson.212.g: "石器时代的西斯廷教堂！"
 andersson.221.t: "[SCOPE.sState('andersson_cave_state_scope').GetMineHubName]人"
 andersson.221.d: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士取得了一项轰动性的发现！一具早期人类化石暗示着一个可追溯至数万年前的定居点。这必定是一个完全不为人知的新人代表。"
 andersson.221.f: "新人是一个历史性的分类学术语，于19世纪及20世纪初的人类学中被用来将从解剖学上界定的现代人，与更为“原始”的化石人科动物区分开来。在那个线性进化框架盛行的时代，该术语用于划定人类发展的最终阶段，常被用以对比现代人群与新发现的“古人”谱系。该分类主要涵盖智人，尤其聚焦于晚更新世的化石发现，如被视为当代欧洲人直系祖先的克罗马侬人。在19世纪的学术语境中，新人这一概念对于在“大洪水前”的灭绝物种（如尼安德特人）与现代体貌特征的出现之间，确立时间分界具有关键作用。"
 andersson.221.g: "[SCOPE.sState('andersson_cave_state_scope').GetMineHubName]人？我喜欢这个。"
 andersson.222.t: "[SCOPE.sState('andersson_cave_state_scope').GetFarmHubName]人"
 andersson.222.d: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士的最新研究揭示了一项轰动性结果：显然，一个此前不为人知的古人亚种曾生活于该洞穴之中。"
 andersson.222.f: "古人是一个传统人类学称谓，于19世纪及20世纪初被用于分类那些表现出比现代人更为“古老”或“原始”特征的中晚期更新世人科动物。在维多利亚时代科学的演化层级中，这一类别代表着一个关键的过渡演化阶段，填补了最古老的猿类祖先与最终出现的新人之间的间隙。该术语最常用于指代尼安德特人。对于19世纪的研究者而言，古人的定义对于一场争论至关重要：这些已灭绝的生物类型究竟是现代人的直系祖先，还是已被更优谱系所取代的演化死胡同。"
 andersson.222.g: "[SCOPE.sState('andersson_cave_state_scope').GetFarmHubName]人——听着不错呀！"
 andersson.223.t: "[SCOPE.sState('andersson_cave_state_scope').GetCityHubName]人"
 andersson.223.d: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士在上一次发掘中发现的骨骼，可能有数十万年之久。倘若此言不虚，那便是一具我们此前从未遭遇过的猿人。"
 andersson.223.f: "猿人是一个开创性的分类学名称，字面意为“猿人”，由恩斯特·海克尔提出，后由欧仁·杜布瓦用于其1891年发现的“爪哇猿人”（直立猿人）。在19世纪人类学的图景中，该术语代表了假想存在于非人灵长类与更高级的古人或新人谱系之间的“缺失环节”。该分类最初基于在印度尼西亚发现的化石遗存，其特征为低矮的颅顶与粗重的眉嵴，被视为过渡演化阶段的证据。尽管现代分类学已将这些标本重新归类为直立人，猿人这一概念在历史上仍具重要意义，因为它为人类演化发生于欧洲之外、且处在更为深远的时间框架之内，提供了首个实物证据。"
 andersson.223.g: "[SCOPE.sState('andersson_cave_state_scope').GetCityHubName]人……还行。"
 andersson.224.t: "南方古猿"
 andersson.224.d: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士的最新发现令其失语。[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe]在上次考察中发掘出的化石，至少应有百万年之久，甚至可能更为古老。这具南方古猿——究竟是更近于猿，还是更近于人？"
 andersson.224.f: "南方古猿是一属已灭绝的人科动物，在1924年“汤恩幼儿”发现之后获得了科学界的显赫地位，被视为中新世猿类与人属之间的确凿环节。尽管该术语于20世纪初由雷蒙德·达特创造，但它通过展示一种兼具双足行走与相对较小、猿类大小脑颅的生物，印证了19世纪的演化预言。对于古人类学领域而言，南方古猿的鉴定将“人类摇篮”的认知转向非洲，从根本上将人类起源的探寻方向从先前备受青睐的欧洲与亚洲舞台转移开来。"
 andersson.224.g: "我怀念过去的好时光，那时我们只需随意将一个村落之名与“人”字拼合在一起。"
 andersson.231.t: "死胡同？"
 andersson.231.d: "在[SCOPE.sState('andersson_cave_site').GetName]的人类学遗址勘探时，考察队还不得不应对崎岖小径与狭窄洞穴通道。结果发现，洞穴入口的实际位置与[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士原先所料完全不同。"
 andersson.231.f: "原来洞穴入口并不在岩层露头上，而是在它下方将近1000米的地方。团队要从人类学遗址过去，要么绕一大段远路，要么走一条非常危险的路线。"
 andersson.231.g: "不管团队愿不愿意，他们都只能绕行。"
 andersson.231.h: "博士该冒险走捷径！"
 andersson.232.t: "洞穴壁画"
 andersson.232.d: "[SCOPE.sState('andersson_cave_site').GetName]洞穴内保存着数千年前的雕刻与图像。然而，其含义与来历依然成谜。"
 andersson.232.f: "史前考古学和人类学兴起之初，基于进化论，人们认为早期人类不懂任何抽象概念，因此不可能有艺术表达。这种观念导致了一个结果：当洞穴壁画被发现时——最著名的例子是阿尔塔米拉洞穴——人们认定那一定是伪造的。直到1900年前后，越来越多的洞穴壁画出现，尤其是在法国西南部，科学家们才得出结论：这些壁画应该是真实的。"
 andersson.232.g: "我们的祖先并不像我们以前想的那样原始。"
 andersson.233.t: "硕果累累的研究"
 andersson.233.d: "近几个月来，[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName]深化了研究，为[SCOPE.sState('andersson_cave_site').GetName]出土的大量文物进行了分类编目，并为后世记录下了这片洞穴系统。"
 andersson.233.f: "人类究竟存在了多久，这一问题甚至在19世纪的很长一段时间里都未能明晰。本世纪初，许多科学家已经放弃了“人类历史只有几千年”的观点；但当布歇·德·佩尔蒂斯在19世纪40年代引用更古老的石器作为人类曾与已灭绝的哺乳动物共存的证据时，人们却充耳不闻。只有孜孜不倦地收集和处理史前遗骸，才能在未来充分地说明，人类在世上行走的时间远远长于之前的假设。"
 andersson.233.g: "这对他有好处。"
 andersson.233.h: "这有益于科学事业的发展。"
 andersson.234.t: "洞穴事故"
 andersson.234.d: "在[SCOPE.sState('andersson_cave_site').GetName]的洞穴勘探过程中发生了一起事故。一名助手连同一头驮驴一同跌落，所幸伤势较轻，但装备需要更换。"
 andersson.234.f: "“这次就和专业人士合作吧！”"
 andersson.234.g: "哦，不……"
 andersson.236.t: "洞穴迷宫"
 andersson.236.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetLastName]博士报告称，几项重大发现迫使团队暂缓进入骨骼鉴定阶段。这些延误非同小可，至关重要。事实上，团队与研究所之间已数周未有往来。这只能说明一件事。"
 andersson.236.f: "他们毫无进展……"
 andersson.236.g: "蠢货！"
 andersson.237.t: "石器时代工具"
 andersson.237.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName]在洞穴中发现了能够提供过去信息的史前石制工具。"
 andersson.237.f: "在十九世纪，人类学被视为一门主要探讨人类史前史的科学。这一领域不仅涉及骨骼的发掘，也包括了石器时代的武器和工具的发掘——一个当时更多被认为是野蛮时代而非科学概念的时期。这个时代的认知被原始洞穴人的老套形象所笼罩，与历史事实相去甚远。尽管如此，对这一时期遗物和遗迹的不断搜寻，为在未来年代中重塑这一形象、建立一个真正的史前考古学铺平了道路。"
 andersson.237.g: "检查这些石器"
 andersson.237.h: "该收入博物馆！"
 andersson.238.t: "人骨"
 andersson.238.d: "我们的人类学家在探索洞穴时发现了更多人类骨骼。"
 andersson.238.f: "人们普遍认为，19世纪和20世纪初只有寥寥无几的人类化石出土。这并不完全正确。事实上，有很多早期人类的骨骼发现并没有被正确地识别。虽然尼安德特人这个名字来源于尼安德谷这个地方，但其实早在那里之前，尼安德特人的骨头就已经被发现过多次了。甚至在尼安德谷的发现之后，一些著名的科学家，比如鲁道夫·维尔绍，还对其真实性和年代表示怀疑。问题的关键不是发现的数量，而是如何证明它们是真正的古代人类的遗体。"
 andersson.238.g: "美味。"
 andersson.239.t: "助理发现化石"
 andersson.239.d: "一名学生助理在确保[SCOPE.sState('andersson_cave_site').GetName]洞穴中的人类学发现方面发挥了关键作用。然而，[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName]指出，作为研究负责人，其应对这一发现负责。"
 andersson.239.f: "“你还记得那个聪明的雅典年轻人的故事吗？他寻求神谕，问道：‘我该怎么做才能成为伟人？’先知回答说：‘杀一个伟人’！”——理查德·欧文。"
 andersson.239.g: "年轻的人类学家取得了发现。"
 andersson.239.h: "资深的人类学家取得了发现。"
 andersson.240.t: "篮子丢了"
 andersson.240.d: "一件挺尴尬的事耽误了骨骼鉴定的启动。"
 andersson.240.f: "研究团队完成采集、正在遗址的另一片区域勘察时，首席研究员[SCOPE.sCharacter('andersson_anthropologist_scope').GetLastName]博士才意识到——可惜已经太晚了——他们把采集到的骨骼和文物全弄丢了。肯定是把装着那些人类学发现物的科考篮给放丢了。而且那是好几周前的事了。"
 andersson.240.g: "每块骨头对我们来说都很宝贵。"
 andersson.240.h: "快点！"
 andersson_conference_anthropologist_double_vote_tt: "得益于经验丰富的人类学家，我们拥有#G 两倍#!的投票权。"
 andersson_conference_anthropologist_triple_vote_tt: "得益于著名人类学家，我们拥有#G 三倍#!的投票权。"
 andersson_cave_exploration_decrease_10_tt: "失去#R 10#!#V 探索进度#!。"
 andersson_cave_exploration_decrease_20_tt: "失去#R 20#!#V 探索进度#!。"
 andersson_cave_collection_decrease_10_tt: "失去#R 10#!#V 收集进度#!。"
 andersson_cave_collection_decrease_20_tt: "失去#R 20#!#V 收集进度#!。"
 andersson.301.a: "复原类型"
 andersson.301.d: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName]博士带着几块化石回到他的骨骼收藏室，根据出土地点和相似度将这些发现仔细排列。显然，这些骨头可以拼成一具完整的骨架。但究竟是哪一具呢？"
 andersson.301.f: "“头骨连着——肋骨\n肋骨连着——腿骨\n腿骨连着——髋骨\n髋骨连着——臂骨\n臂骨连着——头骨\n头骨又连着——肋骨。”"
