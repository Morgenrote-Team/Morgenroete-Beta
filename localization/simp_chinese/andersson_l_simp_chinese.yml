l_simp_chinese:
 rule_andersson_anthropology_rule: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon!#!人类学规则 "
 setting_andersson_anthropology_historical_rule: "史实"
 setting_andersson_anthropology_historical_rule_desc: "自某个历史日期起，化石开始被发现。作为历史事件一部分而发现的人类化石不会获得人类学威望。如果一个国家在该历史日期之前发现了人类化石，则该发现将按其出土地点进行命名。"
 setting_andersson_anthropology_free_rule: "自由"
 setting_andersson_anthropology_free_rule_desc: "没有特定的历史事件与人类化石发现关联。所有发现都根据发现地点统一定名。"
 andersson_has_active_anthropologist_tt: "拥有一位空闲[concept_andersson_anthropologist]"
 andersson.106.t: "人类学考察队离开"
 andersson.106.d: "在人类学团队完成工作后，研究助理们返回了祖国。他们发现的洞穴现在也可供我们的学者进入。"
 andersson.106.f: "“无人曾先我们步入这片深渊，无人知晓我们将去何方、所见何物，从未有如此奇异之美呈现在我们面前，我们不约而同地问彼此同一个问题：我们难道不是在梦中吗？” ——查尔斯·莱尔"
 andersson.106.g: "这会是有用的外援。"
 andersson_anthropologist_dies_tt: "[concept_andersson_anthropologist]死后该日志条目将失效。"
 je_andersson_reconstruct_prehistoric_skeleton: "复原史前人类遗骸"
 je_andersson_reconstruct_prehistoric_skeleton_reason: "Anthropologists reconstruct skeletons based on their experience and characteristics. The first skeleton of a human type—Neoanthropus, Palaeanthropus, Pithecanthropus, or Australopithecus—is additionally displayed at the institute and grants a prestige bonus. Anthropologists can also reconstruct all other skeletons of the various human types, thereby accumulating additional anthropological prestige."
