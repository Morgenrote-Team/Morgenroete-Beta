 andersson.61.t: "[GetPlayer.GetCustom('andersson_fossil_piltdown')]"
 andersson.61.d: "两位顶尖人类学家今日公布了一项可能震惊科学界的发现：他们找到的正是第一代现代人，其明确起源于[ROOT.GetCountry.GetNameNoFlag]。"
 andersson.61.f: "在伦敦地质学会的一次会议上，阿瑟·史密斯·伍德沃德与查尔斯·道森宣布，在皮尔当村附近一处砾石坑中发现的一具早期人类颅骨碎片，是一项划时代的发现。伍德沃德根据这些碎片进行的复原，其面貌大致与现代人颅骨相似，唯枕骨——即颅骨与脊柱连接处——以及脑容量除外：后者仅为现代人的约三分之二。此外，所发现的牙齿与下颌骨亦仅近似于人类。借助大英博物馆的崇高科学权威，伍德沃德将皮尔当发现解读为大型类人猿与人类之间的缺失环节。尽管最初存有质疑，伦敦自然历史博物馆的科学家仍将这些发现的年代确定为距今20万至50万年之间。若此年代为真，则皮尔当人将显著早于尼安德特人。这一发现的公布旋即引起了专家与英国民众的极大兴趣。皮尔当发现的消息在全球引发轰动。"
 andersson.61.g: "那么，第一代现代人便是[ROOT.GetCountry.GetAdjectiveNoFormatting]人。一点也不令人意外！"
 andersson.61.h: "这发现相当可疑啊……"
 andersson.62.d: "我国人类学泰斗[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士今日公布了一项可能撼动科学界的发现：[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe]所发现的最早的现代人，显然起源于[ROOT.GetCountry.GetNameNoFlag]。"
 andersson.62.f: "在[ROOT.GetCountry.GetCapital.GetCityHubName]人类学学会的一次会议上，[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName]郑重宣布，在[GetPlayer.GetCustom('andersson_fossil_piltdown')]附近的一处砾石坑中出土的早期人类头骨碎片，堪称划时代之举。[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士根据碎片重建的头骨，其形态与今人极为相似，惟两处有别：其一是枕部——即头骨与脊柱相衔之处；其二是脑容量，仅为现代人的约三分之二；牙齿与下颌骨也只是略具人形。凭借[ROOT.GetCountry.GetAdjectiveNoFormatting]博物馆在科学界的权威地位，[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士将[GetPlayer.GetCustom('andersson_fossil_piltdown')]的发现解读为猿与人之间的“失落的环节”。尽管起初不乏质疑之声，[ROOT.GetCountry.GetCapital.GetCityHubName]自然历史博物馆的科学家仍将这批化石的年代判定为20万至50万年前，这使其远比尼安德特人更为古老。这一发现一经公布，旋即引发专家与[ROOT.GetCountry.GetAdjectiveNoFormatting]公众的强烈关注。[GetPlayer.GetCustom('andersson_fossil_piltdown')]发现的消息，更在全球范围内激起巨大反响。"
 andersson.63.t: "傍人"
 andersson.63.d: "在德兰士瓦的一次野外考察中，一名男学生将几块化石交给[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士请[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe]鉴定。这位人类学家当即追问化石的发现地点。待抵达现场后，一系列惊人的发现随之浮出水面——这些证据指向一个完全未知的物种。它或许并非人类的祖先，却是一个极为疏远的远亲。"
 andersson.63.f: "傍人属于已灭绝的人亚科，其下有两个被广泛接受的物种：粗壮傍人与鲍氏傍人。然而，傍人属是否为一个独立有效的属，学界仍有争议，有时被视为与南方古猿属，同物异名。傍人生存于约290万至120万年前，跨距从上新世末期延至中更新世。该属生物的颅骨粗壮，沿中线高耸一道状如大猩猩的矢状嵴，昭示其咀嚼肌异常发达；其牙齿宽大，适于研磨植物。傍人属与骨制工具相关，并被认为可能是人类用火的最早证据，尽管此说尚有争议。它们通常栖居于林地，与若干早期人类物种共存，包括非洲南方古猿、能人和直立人。"
 andersson.63.g: "如果这些就是结果的话，这位博士应该多休假。"
 andersson_add_piltdown_fossil_effect_tt: "获得#G 1个#!@andersson_human_fossil![Concept('concept_andersson_human_fossil','$concept_andersson_special_human_fossil$')]：[GetPlayer.GetCustom('andersson_fossil_piltdown')]。"
