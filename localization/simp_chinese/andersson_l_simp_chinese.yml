 je_andersson_our_ancestors_reason: "Dr. [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] is currently preparing an exhibition on the history of human evolution at one of our universities. This is intended to illustrate the lives of our ancestors and to educate interested members of the public about them."
