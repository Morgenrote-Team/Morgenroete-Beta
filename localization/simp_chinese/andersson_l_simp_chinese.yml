 andersson_evolutionist: "进化论者"
 andersson_evolutionist_desc: "进化论者是指那种认为文化是独立发展而来的人类学家。"
 andersson_diffusionist: "传播论者"
 andersson_diffusionist_desc: "传播论者则认为文化主要靠不同社会之间的观念传播而形成。"
 country_andersson_decorative_evolutionist_add: "@andersson_human_fossil![concept_andersson_human_fossil]（洞穴学）"
