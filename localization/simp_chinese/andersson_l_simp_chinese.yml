 andersson.405.t: "[SCOPE.sState('andersson_state_scope').GetFarmHubName]的巨石"
 andersson.405.d: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士对[SCOPE.sState('andersson_state_scope').GetFarmHubName]的巨石产生了浓厚兴趣，并详细研究了其背景。最近[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U]发表了对这些新石器时代建筑的研究——很大程度上属于推测性质——由此引起了人类学界的关注。"
 andersson.405.f: "巨石文化描述了新石器时代的一种现象：公元前4500年至1500年间，一些社群使用巨大石块建造了用于祭祀和埋葬的纪念性建筑。从大西洋沿岸到地中海，这些建筑构成了欧洲最早期的永久性神圣景观。它们的形式包括孤立的立石、长达数公里的石列（如卡纳克的石列），以及用作集体墓地的桌状支石墓。最为复杂的是环状巨石圈，其中最著名的巨石阵展现了精确的天文对准。这些重达数吨的巨石需要运输和竖立，这要求社群具备强大的组织能力，以及先进的静力学和后勤知识。"
 andersson.405.g: "而我们的祖先真的在5000年前就建造了那些？"
 andersson.407.t: "猎颅！猎颅！猎颅！"
 andersson.407.d: "在[SCOPE.sState('andersson_state_scope').GetName]，到处是极度的苦难。每个人都因大范围的破坏而受苦。每个人？不！[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName]博士发现了大量近期的人类颅骨，[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe]已经把这些颅骨收集起来用于研究了！"
 andersson.407.f: "“这么多漂亮的颅骨，正好供我进行颅骨学研究！”"
 andersson.407.g: "真够毛骨悚然的。"
