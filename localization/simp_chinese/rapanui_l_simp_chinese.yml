 pmg_rapanui_moai: "摩艾石像"
 pm_rapanui_moai: "摩艾仪式"
 pm_rapanui_moai_tourism: "摩艾旅游"
 rapanui.290.t: "大堡礁"
 rapanui.290.d: "当[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]驶过澳大利亚著名的大堡礁时，[SCOPE.sCharacter('rapanui_scientist').GetLastName]博士明确表示[SCOPE.sCharacter('rapanui_scientist').GetSheHe]想更仔细地研究它。[SCOPE.sCharacter('rapanui_scientist').GetSheHe]的发现令人震惊——珊瑚礁显然不仅仅是航运的障碍。"
 rapanui.290.f: "查尔斯·达尔文于1836年乘坐小猎犬号返航途中造访了大堡礁。他记录了几个显著特征：礁体外缘由高耸的珊瑚墙构成，这些墙体陡峭地坠入公海，某些区域落差达数百米。与之形成鲜明对比的是，他在潟湖内观察到活体珊瑚群的缺失——那里的珊瑚群落似乎已经死亡。达尔文还发现，尽管下方海床持续沉降，外层珊瑚仍能通过不断向上生长维持在海面附近的位置。这些观察成果构成了他珊瑚礁形成理论的基础。1842年，达尔文发表《珊瑚礁的结构与分布》，提出沉降理论，认为珊瑚礁可在缓慢下沉的岛屿或大陆架上形成。大堡礁作为典型的堡礁实例，成为验证其理论的核心证据。"
 rapanui.290.g: "环礁是由珊瑚形成的吗？"
 notification_rapanui_ring_of_fire_notification_name: "火环带"
 notification_rapanui_ring_of_fire_notification_desc: "一位地质学家根据其在太平洋的考察印象，整理出了关于那条称之为“环太平洋火山带”的突破性发现。"
 notification_rapanui_great_barrier_reef_notification_name: "大堡礁"
 notification_rapanui_great_barrier_reef_notification_desc: "一位外国科学家在太平洋探险中首次认识到澳大利亚大堡礁的重要性。"
