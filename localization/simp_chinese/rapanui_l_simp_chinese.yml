 rapanui_send_new_missionaries_button: "派遣新的传教士"
 rapanui_send_new_missionaries_button_desc: "有了新的传教士，我们可以增加皈依的几率。效果是随机的。"
 rapanui_trade_with_natives_button: "与原住民通商"
 rapanui_trade_with_natives_button_desc: "我们可以利用影响力获得异域礼物，而非继续号召当地人皈依。"
 rapanui_sabotage_rival_missionaries_button: "抹黑敌对传教士"
 rapanui_sabotage_rival_missionaries_button_desc: "如果当地存在敌对的传教团，我们可以试图抹黑它，并影响其未来几年传教工作的机会。我们成功的机会是50：50。这只会影响年度皈依几率。"
 rapanui_change_course_button: "改变探险队的航向"
 rapanui_change_course_button_desc: "[concept_dubois_pacific_expedition]期间可以改变船只的航向。它会离开最初选择的区域，前往另外两个目的地之一。"
 je_rapanui_catholic_mission_oceania: "在大洋洲建立天主教传教团"
 je_rapanui_catholic_mission_oceania_reason: "我们的传教士[SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName]神父不知疲倦地致力于使当地人皈依基督教信仰。预计每年约有1%的人口皈依天主教。随机事件可以改善这个结果。然而，如果传教活动因为行为过于鲁莽而引起当地人的愤怒，整项任务可能失败。如果30%的居民放弃了旧信仰转奉基督之名，我们就可以建立一个永久的传教站。"
 je_rapanui_protestant_mission_oceania: "在大洋洲建立新教传教团"
 je_rapanui_protestant_mission_oceania_reason: "我们的传教士[SCOPE.sCharacter('rapanui_missionary_scope').GetFullName]牧师不知疲倦地致力于使当地人皈依基督教信仰。预计每年约有1%的人口皈依新教。随机事件可以改善这个结果。然而，如果传教活动因为行为过于鲁莽而引起当地人的愤怒，整项任务可能失败。如果30%的居民放弃了旧信仰转奉基督之名，我们就可以建立一个永久的传教站。"
 je_rapanui_mission_fail: "如果原住民攻击性达到5点或以上，[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的基督教化将会失败。"
 je_rapanui_catholic_conversion_oceania: "统治者皈依天主教"
 je_rapanui_catholic_conversion_oceania_reason: "部落首领的皈依是最终在当地人中建立基督教会并使其成为国教的决定性一步。然而为此大多数居民必须信仰天主教。如果这个省份存在反圣母的异端传教站，我们必须尽一切努力阻止他们获得政治权力。我们的传教士 [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName]神父将确保事情不会发展到那一步，并每年带领1%的人口走向正信。每三年可以开展一次行动。"
 je_rapanui_protestant_conversion_oceania: "统治者皈依新教"
 je_rapanui_protestant_conversion_oceania_reason: "部落首领的皈依是最终在当地人中建立基督教会并使其成为国教的决定性一步。然而为此大多数居民必须信仰新教。如果这个省份存在教宗渎神信徒的异端传教站，我们必须尽一切努力阻止他们获得政治权力。我们的传教士 [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName]牧师将确保事情不会发展到那一步，并每年带领1%的人口走向正信。每三年可以开展一次行动。"
 je_rapanui_crisis_in_paradise: "如果异端国家使统治者皈依其信仰，布道就会失败。"
 je_rapanui_pacific_expedition: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察"
 je_rapanui_pacific_expedition_reason: "太平洋是南北极之外地球上最后一个尚未完全揭秘的地区。多个科学领域的学者都对以开展自然史、考古学、天文学和海洋学的研究任务颇感兴趣。同时，列强可能通过在世界尽头展现其影响力而声名显赫。"
 je_rapanui_pacific_expedition_success: "进行一般旅行时，探险队将在经过七个不同的站点后返回；而在进行专业旅行时，探险队将在经过五个不同的站点后返回。"
 je_rapanui_pacific_expedition_goal: "进行一般旅行时，探险队将在经过七个不同的站点后返回；而在进行专业旅行时，探险队将在经过五个不同的站点后返回。"
 je_rapanui_oceanographic_studies: "海洋学研究"
 je_rapanui_oceanographic_studies_reason: "海洋学研究不仅有助于我们更好地了解海洋及其行为，其成功还将给我们带来显著的优势。了解每一种洋流并正确解读海洋变化的国家总是比对手领先一步。"
 je_rapanui_oceanographic_studies_success: "如果我们获得了#G 25#!#E 海洋学知识#!，研究将完成。"
 je_rapanui_oceanographic_studies_goal: "如果我们获得了#G 25#!#E 海洋学知识#!，研究将完成。"
 notification_rapanui_challenger_notification_name: "[INITIATOR_COUNTRY.GetName]发现海底最深点"
 notification_rapanui_challenger_notification_desc: "来自[INITIATOR_COUNTRY.GetName]的探险队在太平洋海底发现了迄今为止测量到的地球最深点。"
 notification_rapanui_wallace_notification_name: "[INITIATOR_COUNTRY.GetName]研究者证实进化论"
 notification_rapanui_wallace_notification_desc: "[INITIATOR_COUNTRY.GetName]的一位科学家通过确定印度尼西亚境内的生物相边界，为证明进化论做出了重要贡献。"
 rapanui.101.t_cat: "前往[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的天主教传教团"
 rapanui.101.t_pro: "前往[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的新教传教团"
 rapanui.101.d_cat: "勇敢的神父[SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName]同意到[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]去传播主的光辉，导引当地迷途的羔羊。"
 rapanui.101.d_pro: "勇敢的牧师[SCOPE.sCharacter('rapanui_missionary_scope').GetFullName]同意到[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]去传播主的光辉，导引当地迷途的羔羊。"
 rapanui.101.f: "在19世纪，大洋洲岛屿对西方文明而言基本上是一个封闭的世界。传教士在将信仰带到这些地区的同时，还在教育和技术方面起到了重要作用。尽管到20世纪中叶，大洋洲已经完全基督教化，但传教士们最初面临着不信任和许多失败。“野蛮南海”这个陈词滥调也起源于许多传教士以最可怕的方式殉道。"
 rapanui.101.g_cat: "愿主与你同在。"
 rapanui.101.g_pro: "主与你同在。"
 rapanui.102.t_cat: "来自[SCOPE.sCountry('rapanui_mission_departure_country').GetNameNoFlag]的天主教传教团"
 rapanui.102.t_pro: "来自[SCOPE.sCountry('rapanui_mission_departure_country').GetNameNoFlag]的新教传教团"
 rapanui.102.d: "一位异国的传教士今天踏上了我国的海岸。有人觉得他将引起祸端，但也有人相信我国可以因其受益。"
 rapanui.102.f: "太平洋岛民与基督教传教士的关系非常复杂。他们将传教士视为殖民势力的前兆和传统文化潜在的破坏者。但许多时候，岛民也会从欧洲人的经验和知识中受益。传教士建立了学校，带来了现代医学，或引入了新的耕作方法。对于许多部落来说，传教士的到来标志着建立集权的第一步。当然，并不是所有太平洋居民都愿意冒这种风险，他们会迅速“处理”那些不请自来的客人。"
 rapanui.102.g: "杀了他！"
 rapanui.102.h: "饶恕但无视他。"
 rapanui.102.i: "给予其热烈的欢迎"
 rapanui.104.t: "传教士殉道！"
 rapanui.104.d_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的传教彻底失败。[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_missionary_death_type')]"
 rapanui.104.d_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的传教彻底失败。[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_missionary_death_type')]"
 rapanui.104.f: "不幸的是，许多传教尝试最终以传教士被杀害而告终，其中很大程度上是因为对当地风俗的误解。牧师皮埃尔·尚内尔在富图纳岛被杀害；约翰·威廉姆斯和同行的传教士詹姆斯·哈里斯被食人族吃掉在埃罗曼戈岛上；而卡尔·弗尔克纳则在新西兰被斩首，然后酋长将他的眼睛取出并吞下。\n在此类失败发生后，通常需要大约五年时间才能再次找到志愿者进行传教之旅。尝试皈依的次数越多，下一次成功的机会就越大。"
 rapanui.104.g_cat: "主啊，赐予他们永恒的安息。"
 rapanui.104.g_pro: "愿他寻到永恒的安息。"
 rapanui.105.t: "传教士抵达[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]"
 rapanui.105.d_cat: "神父[SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName]安全抵达了[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]。迄今为止，当地人还对他不感兴趣。但仅仅是他还活着这一事实，就已经是小小的胜利了。但他仍然还有很多事要做。"
 rapanui.105.d_pro: "牧师[SCOPE.sCharacter('rapanui_missionary_scope').GetFullName]安全抵达了[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]。迄今为止，当地人还对他不感兴趣。但仅仅是他还活着这一事实，就已经是小小的胜利了。但他仍然还有很多事要做。"
 rapanui.105.f: "传教士在抵达时不得不面对敌意十足的居民，他们想要迅速将他们赶走。另一方面，有些居民则表现出兴趣，并希望进行武器贸易或获得新技术。但基督的信息被冷漠对待的情况也时有发生。然而，对于传教士们来说，这是一个好的迹象：毕竟，不同于死者，活着的传教士多少可以做些事情。"
 rapanui.105.g_cat: "谢谢。"
 rapanui.105.g_pro: "感谢上帝。"
 rapanui.106.t: "传教士受到友好欢迎"
 rapanui.106.d_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的传教大获成功。[SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName]神父受到当地人的热烈欢迎，并进行了首次洗礼。"
 rapanui.106.d_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的传教大获成功。[SCOPE.sCharacter('rapanui_missionary_scope').GetFullName]牧师受到当地人的热烈欢迎，并进行了首次洗礼。"
 rapanui.106.f: "对传教士的当地居民态度因岛屿而异。除了敌意或恐惧，一些居民表现出了自发的兴趣。在芒加里瓦王国，法国传教士在很短的时间内成功地使大部分居民改信基督教，并给国王施洗。在他们抵达一年内，传教士就使得塔拉瓦伊、奥克纳和阿卡穆鲁的岛民皈依基督教，建立了教堂，甚至说服岛民穿上长袍。在里基泰亚，圣米迦勒大教堂被建立起来，成为南太平洋诸岛中最大的教堂。"
 rapanui.106.g_cat: "愈显主荣！"
 rapanui.106.g_pro: "为了上帝的荣耀！"
 rapanui.111.t_cat: "天主教的胜利"
 rapanui.111.t_pro: "新教的胜利"
 rapanui.111.d_cat: "我们的好神父[SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName]在[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的工作结出硕果。繁荣的基督教社区是从的轻松传教工作中发展起来的。"
 rapanui.111.d_pro: "我们的好牧师[SCOPE.sCharacter('rapanui_missionary_scope').GetFullName]在[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的工作结出硕果。繁荣的基督教社区是从的轻松传教工作中发展起来的。"
 rapanui.111.f: "随着稳定的基督教社区得以建立，传教士将不再那么容易被驱逐出国。甚至当地的亲王也不得不重新考虑他在基督教问题上的立场。从现在开始，[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]是否会皈依基督教已经毫无疑问，剩下的只是时间问题。下一个目标必须是使统治者皈依，以便使基督教成为国教，从而促进整个国家的改信。"
 rapanui.112.t: "永久设立天主教传教团"
 rapanui.113.t: "永久设立新教传教团"
 rapanui.112.d: "基督教传教团已成功地在我国永久立足。从现在开始摆脱陌生人将变得更加困难。"
 rapanui.112.f: "现在，近三分之一的人口已经放弃了他们的旧信仰转信基督教，问题是未来[ROOT.GetCountry.GetNameNoFlag]的前景将会如何。迅速的宗教转化在未来也不会停止。而萨满们正在观望未来，一些已经皈依基督教的部落领袖建议利用这个机会使国家现代化。"
 rapanui.112.g: "我们要密切监视其发展。"
 rapanui.112.h: "我们要对外来者保持开放。"
 rapanui.114.t: "异教徒之怒"
 rapanui.114.d_cat: "可怕的消息！[SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName]神父在[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的不得体行为激起了当地人的反抗。他们放火焚毁传教站并杀害了教士！"
 rapanui.114.d_pro: "可怕的消息！[SCOPE.sCharacter('rapanui_missionary_scope').GetFullName]牧师在[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的不得体行为激起了当地人的反抗。他们放火焚毁传教站并杀害了传教士！"
 rapanui.114.f: "传教工作通常需要适当平衡强硬手段与怀柔政策，过度热忱的传教士往往出师未捷身先死。在南太平洋地区，福音派传教士尤其以使用激进方法令居民改信而闻名，这些方法可能带来巨大的成功，或是惨痛的灾难。我们的传教士遭遇的很不幸是后者。"
 rapanui.115.t: "天主教传教团被摧毁"
 rapanui.115.d: "我们的人民容忍外国传教士的不当行为太久了。一场起义将传教站夷为废墟，传教士也随之丧命。"
 rapanui.115.f: "显然，欧洲人过于粗心大意了。他们没有能使居民皈依，反而让他们对自己产生了敌意。在这一事件之后，许多同胞又回归了他们的旧信仰。显然，这种基督教信仰纯粹是欺骗。"
 rapanui.115.g: "他们活该！"
 rapanui.116.t: "新教传教团被摧毁"
 rapanui.122.t: "圣经译本"
 rapanui.122.d: "我们在[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的传教士[SCOPE.sCharacter('rapanui_missionary_scope').GetFullName]将圣经翻译成了当地语言。这将促进基督信仰的传播。"
 rapanui.122.f: "早些时候，太平洋岛屿上的第一批传教士记下笔记并以此为依据编写了词典，后来还将圣经翻译成了当地语言。然而，过于热情可能会对一些传教士而言弊大于利。"
 rapanui.122.g: "这有助于当地人的皈依。"
 rapanui.122.h: "现在正是启动新传教活动的良机。"
 rapanui.123.t: "奴隶贩子袭击传教岛屿"
 rapanui.123.d: "来自[SCOPE.sCountry('rapanui_slaver_country').GetNameNoFlag]的奴隶贩子入侵了[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]。我们的传教士[SCOPE.sCharacter('rapanui_missionary_scope').GetFullName]紧急请求我国介入以终止劫掠。"
 rapanui.123.f: "直到19世纪下半叶，秘鲁的奴隶贩子经常劫掠岛屿上的人口。这种廉价劳工采购方式比澳大利亚北部常见的“黑鸟贸易”更加残酷。这些袭击对传教士来说是个负担，因为在所谓的基督徒在岛屿上肆意妄为的情况下，要说服岛民皈依基督教并不容易。这些事件为天主教和新教牧师中广泛传播的废奴主义思潮注入了新的动力。"
 rapanui.123.g: "这不关我们的事。"
 rapanui.123.h: "我们必须立刻停止这不人道的行为！"
 rapanui.124.t: "偶像崇拜"
 rapanui.124.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的许多原住民仍在崇拜偶像。[SCOPE.sCharacter('rapanui_missionary_scope').GetFullName]试图为圣波尼法爵的传统树立榜样。"
 rapanui.124.f: "偶像或神圣地点的湮灭总是会令原始民族深为震撼。有些人将此视为基督教上帝必定优越于他们的众神的证据；而其他人则将此视为更加坚决反抗基督教的理由。一些艺术爱好者指出，这些异教徒的图像可能更适合放在其他地方。"
 rapanui.124.g: "摧毁偶像！"
 rapanui.124.h: "优雅地让它们消失。"
 rapanui.124.i: "别碰它们。"
 rapanui.125.t: "祖先崇拜"
 rapanui.125.d: "关于如何处置[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的祖先崇拜的讨论甚嚣尘上。这些异教信仰使传教工作变得更加困难。"
 rapanui.125.f: "与世界上许多其他地方一样，祖先崇拜是精神生活的核心部分。天主教传教士已经与这种问题斗争了几百年，并在最初对其未来影响予以忽略，而新教传教士则对祖先崇拜表现出令人难以置信的强硬态度。尽管如此，在波利尼西亚的某些地区，祖先崇拜仍然广泛存在——直至今日。"
 rapanui.125.g: "邪教必须终止！"
 rapanui.125.h: "我们会找到可行的权宜之计。"
 rapanui.126.t: "宗教融合"
 rapanui.126.d: "尽管尽了一切努力来阻止这种情况，传教士[SCOPE.sCharacter('rapanui_missionary_scope').GetFullName]不得不在他的上一份报告中承认，在[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]已经发展出了一个融合拜物教和基督教元素的社区。"
 rapanui.126.f: "融合宗教对传教士来说一直是棘手的麻烦。一些人将其视为可以在未来克服的过渡阶段；另一些人则认为这种异端比原本的异教更为邪恶。尽管如此，始终有人认同融合宗教，因此打压这种教义会导致局势紧张。这类现象还具有有趣的文化和艺术特点，这一直吸引着人类学家和艺术爱好者。"
 rapanui.126.g: "这种异端必须铲除！"
 rapanui.126.h: "他们需要更多时间来理解。"
 rapanui.126.i: "这种融合宗教很有趣。"
 rapanui.127.t: "[SCOPE.sCharacter('rapanui_missionary_scope').GetLastName]先生的男童唱诗班。"
 rapanui.127.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的教堂唱诗班由当地男孩组成，其表现相当优秀。"
 rapanui.127.f: "'Vita vita nostra tellus nostra sic clamant sic\nVita vita nostra tellus nostra vita nostra clamant\nPoena poena nostra vires nostra poena nostra sic\nPoena poena nostra vires nostra poena nostra clamant\nIra ira nostra fides nostra ira nostra sic.\nIra ira nostra fides nostra ira nostra clamant.\nVita vita nostra tellus nostra vita nostra sic.'"
 rapanui.127.g: "这将向当地人展示信仰之美。"
 rapanui.127.h: "这将为当地人的灵魂带来安宁。"
 rapanui.127.i: "必须让欧洲人听到这种音乐！"
 rapanui.128.t: "集体洗礼"
 rapanui.128.d_cat: "[SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName]神父报告在[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的一个部落成员全体皈依耶稣基督后进行了大规模的集体洗礼。"
 rapanui.128.d_pro: "[SCOPE.sCharacter('rapanui_missionary_scope').GetFullName]牧师报告在[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的一个部落成员全体皈依耶稣基督后进行了大规模的集体洗礼。"
 rapanui.128.f_cat: "Credo in unum Deum,\nPatrem omnipotentem,\nfactorem caeli et terrae,\nvisibilium omnium, et invisibilium\net in unum Dominum Iesum, Christum,\nFilium Dei unigenitum\net ex Patre natum ante omnia saecula."
 rapanui.128.f_pro: "我相信独一的上帝，\n全能的父，\n创造天地，\n以及一切有形和无形的事物。\n我也相信独一的主，耶稣基督，\n上帝的独生子，\n在万世之前由父降生。"
 rapanui.128.g: "阿门。"
 rapanui.129.t: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的瘟疫"
 rapanui.129.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的居民抱怨一种神秘的疾病在岛上肆虐——并指责我们的传教士将其带到了岛上。"
 rapanui.129.f: "随着欧洲定居者、传教士和贸易商的到来，一些以前未知的疾病也传入了岛屿，包括流感、肺炎、麻疹、腮腺炎、猩红热、天花、百日咳与普通感冒。然而，传统医学并未能够做出太多的贡献。与此同时，这与基督教传教工作的开始存在某种的关联，这使得许多人怀疑洗礼的意义，因为基督教的上帝显然在抵御这些瘟疫方面并不起作用。"
 rapanui.129.g: "这是魔鬼所为。"
 rapanui.130.t: "传教士死于疟疾"
 rapanui.130.d_cat: "不幸的消息从[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]传来：[SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName]神父死于一种热带疾病。他对当地传教工作的勇敢献身和领导将将被永远铭记。"
 rapanui.130.d_pro: "不幸的消息从[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]传来：[SCOPE.sCharacter('rapanui_missionary_scope').GetFullName]牧师死于一种热带疾病。他对当地传教工作的勇敢献身和领导将将被永远铭记。"
 rapanui.130.f: "大洋洲的传教士们不仅经历了殉道。正如土著人因欧洲疾病而死亡一样，欧洲人在那里也会死于疾病。传教工作将继续，已经任命了继任者。然而，今年将不会进行布道工作。"
 rapanui.132.t: "高效的传教士"
 rapanui.132.d: "我们派往[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的新传教士们相当能干：他们的传教工作比与其进展得更好。"
 rapanui.132.f: "“回想一下福音为这些土著人的近亲做了什么。在我们自己的阿纳托姆岛上，已经有3500名食人族放弃了他们的异教信仰……在斐济，有79000名食人族受到了福音的影响；而教会增添了13000名承诺为耶稣生活和工作教友。在萨摩亚，有34000名食人族信奉基督教；19年内，该国的学院已培养出了206名土著教师和传教士。在新赫布里底群岛，超过12000名食人族通过基督而得救，尽管我并不是说他们都是模范基督徒，但133名土著已经接受培训，成为福音的传道者和教师。” ——约翰·G·帕顿"
 rapanui.132.g: "他们在做上帝的工作！"
 rapanui.133.t: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的新传教士"
 rapanui.133.d: "新传教士抵达宣教站后直接开始工作并取得初步成果。"
 rapanui.133.f: "他们的崇拜完全是出于对恐惧的服从，其目的是为了安抚这个或那个邪恶的灵魂，以防灾祸或寻求复仇。他们将首领奉为神明，几乎每个村庄或部落都有自己的神圣人物。这些村庄或部落的祭司对邪恶产生了非凡的影响力，人们相信可以通过神圣的仪式来支配生死。他们还通过木制或石制的偶像崇拜已故的祖先和英雄的灵魂。他们害怕这些灵魂并寻求帮助；尤其是寻求安抚那些主宰战争与和平、饥荒与丰收、健康与疾病、毁灭与繁荣、生与死的灵魂。整个崇拜是一个充满奴性恐惧的过程；据我所知，他们对于怜悯和恩典之神并没有任何概念。—— 约翰·G·帕顿"
 rapanui.133.g: "做的好。"
 rapanui.134.t: "不称职的传教士？"
 rapanui.134.d: "尽管我们向[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]派遣了一批新的传教士，其皈依努力只取得了少许进展。"
 rapanui.134.f: "我的敌人很少会放松对我生命的恶意图谋，无论此刻是否被平息或阻挡……一个蛮族酋长持着上膛的火枪跟着我走了四个小时，尽管火枪多次指向我，但上帝制住了他的手。我对他友善地说话，继续工作，仿佛他不存在一样，我深信我的上帝将我安放在这里，会保护我直到我的任务完成。我不断地向我们亲爱的主耶稣祷告，将一切交在他手中，感到在完成我的工作之前是不朽的。经历的考验和险境加强了我的信仰，似乎只是为了更多的考验而加强我，它们紧随其后。——约翰·G·帕顿"
 rapanui.134.g: "他们到底在做什么？"
 rapanui.135.t: "与原住民通商"
 rapanui.135.d: "在与当地统治者接触后，我们面临与他交易什么的问题：他拿出了一件珍贵的文物、一只[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]或价值不菲的珍珠。"
 rapanui.135.f: "贸易是互惠的：作为回报，原住民国家将获得技术红利。"
 rapanui.135.g: "我们对文物有兴趣。"
 rapanui.135.h: "我们选择动物。"
 rapanui.135.i: "我们喜欢珍珠。"
 rapanui.136.t: "蝠鲼"
 rapanui.136.d: "当地人送给我们一条优雅的巨型鳐鱼，我们当天就把它运回了家。"
 rapanui.136.f: "巨型蝠鲼是一种迷人又奇异的动物，是国立动物园的新焦点。它是澳大利亚与大洋洲动物群的典型动物之一。"
 rapanui.136.g: "太棒了！"
 rapanui.137.t: "绿蠵龟"
 rapanui.137.d: "当地人送了我们一只很棒的海龟，我们当天就把它运回了家。"
 rapanui.137.f: "绿蠵龟是一种迷人又奇异的动物，是国立动物园的新焦点。它是澳大利亚与大洋洲动物群的典型动物之一。"
 rapanui.138.t: "抹黑生效"
 rapanui.138.d: "在一些受贿的土著证人的帮助下，利用传教士的修辞技巧，我们得以向当地的一些部落通报了敌对传教站的恶意。"
 rapanui.138.f: "敌对的传教站，特别是新教和天主教团体之间的意见分歧常常会演变成冲突，通常以其中一个团体被改宗当地统治者驱逐出境为结局。在塔希提，争论甚至演变成了全面的战争，因为新教派的塔希提反对天主教传教士，而后者又得到了法国的保护。这一事件为法国军事干预塔希提铺平了道路，而作为转变信仰的塔希提的保护国，英国并没有为了这些岛屿涉足冲突。"
 rapanui.139.t: "自食其果"
 rapanui.139.d: "尽管我们善意地警告我们的羔羊——以及那些即将成为羔羊的人们——敌对宣教站的恶意，他们非常不幸地不愿相信我们。相反：我们现在被视为虚伪的麻烦制造者，想要扰乱岛上的和平！"
 rapanui.139.g: "计划不成功。"
 rapanui.140.t: "陷害！"
 rapanui.140.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的敌对传教站损害了我们的良好声誉，并指责我们进行政治影响和操纵。我们的皈依几率受到了显著影响！"
 rapanui.140.g: "这些人自称基督徒？"
 rapanui.141.t_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]接纳天主教信仰"
 rapanui.141.t_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]接纳新教信仰"
 rapanui.141.d_cat: "在今天的庄严弥撒中，[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的统治者信奉耶稣基督并接纳了天主教信仰。[SCOPE.sCharacter('rapanui_missionary_scope').GetLastName]神父的传教工作由此达到了顶峰。"
 rapanui.141.d_pro: "我们的传教士[SCOPE.sCharacter('rapanui_missionary_scope').GetFullName]牧师今天以主之名为[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的统治者洗礼。基督教在该国的传教事业由此扫清了最后的障碍。"
 rapanui.141.f: "随着异教统治者皈依基督，他将会努力使自己的人民转向真正的信仰。[SCOPE.sCharacter('rapanui_missionary_scope').GetFullName]将会在现场待一段时间，作为顾问协助这一过程，之后再回到家乡。改宗之后，[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]还要求我们提供保护，并将其他宗教信仰的传教士从国家驱逐出境。列强尊重我们在现场的影响力，我们可以在以后的某个时间将这种影响力转化为直接统治。我们在此地传教工作已经结束，但世界上可能还有其他地方急需耶稣基督的福音。"
 rapanui.141.g_cat: "奉主耶稣基督之名。"
 rapanui.141.g_pro: "以我们的主，耶稣基督的名义。"
 rapanui.142.t: "[SCOPE.sCharacter('rapanui_ruler').GetFullName]的洗礼"
 rapanui.142.d: "随着[SCOPE.sCharacter('rapanui_ruler').GetFullName]皈依天主教，我们国家的基督教化已成定局。皈依的统治者把人民的皈依作为首要任务。"
 rapanui.143.d: "随着[SCOPE.sCharacter('rapanui_ruler').GetFullName]皈依新教，我们国家的基督教化已成定局。皈依的统治者把人民的皈依作为首要任务。"
 rapanui.142.f: ""
 rapanui.144.t_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]皈依异端新教"
 rapanui.144.t_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]皈依异端天主教"
 rapanui.144.d_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的统治者接受新教传教士的洗礼后，我们在当地的皈依努力最终宣告失败。"
 rapanui.144.d_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的统治者接受天主教传教士的洗礼后，我们在当地的皈依努力最终宣告失败。"
 rapanui.144.f: "所有试图让当地人民转向正信的奴隶都是徒劳的。改宗之后，支持这些虚假传道者的势力也在岛屿上获得了影响力，可能很快会将我们自己的人驱逐出境。在这项政策变化后，我们将不得不撤回我们的传教士，看看是否有其他国家可能更愿意接受真正的信仰。"
 rapanui.144.g_cat: "魔鬼的行为。"
 rapanui.144.g_pro: "魔鬼的行为。"
 rapanui.146.t: "与外国人贸易"
 rapanui.146.d: "外国传教站的谈判代表向我们提出了贸易要约。我们可以选择最感兴趣的一项。"
 rapanui.146.f: "贸易是互惠的：作为回报，外国会收到一件文物、一只动物或一些珍珠。"
 rapanui.146.g: "新的农业科技。"
 rapanui.146.h: "现代武器。"
 rapanui.146.i: "更多教育。"
 rapanui.151.t: "传教士收集民间传说"
 rapanui.151.d: "我们在[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的传教士收集了民间的故事、歌曲和神话，以更好地了解该文化的心态和背景。"
 rapanui.151.f: "虽然一些传教士将自己看作是圣波尼法爵的传人，激烈地与土著人的特殊文化进行斗争，但始终有学者型的传教士，他们首先想要了解当地文化，以找到可以用来更有效地引导土著人走向基督的接触点。并且，耶稣会士就采用了这种技巧。这些收藏对于后世的识别常常很重要，因为传教士是首批以书面形式传承传统的人。与此同时，欧洲对异国文化及其习俗的兴趣也在增加。"
 rapanui.151.g: "利用这些知识传教。"
 rapanui.151.h: "这些收藏属于博物馆。"
 rapanui.152.t: "基督教学校"
 rapanui.152.d: "随着[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]一所教会学校的建立，该国在基督教和教育的道路上迈出了重要的一步。"
 rapanui.152.f: "基督教学校对于向与世隔绝的大洋洲引入西方主流学校传统从而促进当地人口的识字率作出了重要贡献。随着食人和部落争斗的结束，学校的引入被视为传教工作的一个重要积极副产品。"
 rapanui.152.g: "我们不是为了学校而学习，而是为了生活而学习。"
 rapanui.153.t: "与异端传教士的冲突"
 rapanui.153.d: "一名传教士的侵略行为加剧了与敌对传教站之间现有的冲突。他声称一群当地人属于他的传教团，而不属于我们的会众。"
 rapanui.153.f: "不幸的是，基督教的叙事述声称，随着传教士的到来，食人族的嗜血和部落争斗也结束了，但这种说法显然存在一些明显的缺陷：不同教派之间的对抗导致了之前并不存在的争执。"
 rapanui.153.g: "这些是我们的信众。"
 rapanui.153.h: "连左脸也转过来由他打。"
 rapanui.154.t: "贸易站"
 rapanui.154.d: "在一项明显针对我们的行动中，[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的敌对传教站支持为他们的国家建立一个贸易站，可能是希望通过邪恶的方式增进与当地人的联系。"
 rapanui.154.f: "有时候，圣诞礼物在传教方面比单调无趣的圣经用处更大。"
 rapanui.154.g: "我们应该建立自己的贸易站！"
 rapanui.155.t: "敌人的特权"
 rapanui.155.d: "一位竞争对手的传教士被授予在宫廷中担任统治者顾问的特权。这不仅是一种严重的冒犯，而且可能会损害我们在[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的地位。"
 rapanui.155.f: "传教士硬的统治者信任通常靠的是他们的教育背景与外交联系，但还有一点：人们希望他们会传授知识。这并不一定意味着真正的皈依意愿，但至少意味着来自传教士所在国家的更高权力地位——这让希望通过影响统治者来建立影子保护国的对手教派感到不满。"
 rapanui.155.g: "我们要求同等特权。"
 rapanui.171.t: "天堂危机"
 rapanui.171.d: "外国传教士之间的冲突已经达到了危险的程度。政治争端似乎不可避免。"
 rapanui.171.f: "在某种程度上，不同教派的传教士之间的分歧可能会演变成政治冲突。最著名的例子是塔希提岛。担心遭到干预的统治者可能会试图改宗为两个教派之一，以至少希望在军事干预中得到相应大国的支持，即使在实力上完全不敌。保护者的保护并不稳固，但至少提供了生存的机会，而不是陷入纯粹的殖民地地位。"
 rapanui.171.g: "皈依天主教"
 rapanui.171.h: "皈依新教"
 rapanui.172.t: "天堂危机"
 rapanui.172.d: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的局势已经升级。当地统治者承认了敌对传教站的异端邪说。一些政界人士已经呼吁进行派出海军进行干涉。"
 rapanui.172.f: "随着统治者改宗另一个教派，我们的传教士被驱逐只是时间问题：不久之后，新设立的国教将禁止他们的存在。我们要永久地将这个岛国改宗为真正的信仰并在那里施加影响的雄心壮志受到了重创；但情况并非完全无望。这件事为我们提供了一个绝佳的借口，可以直接军事干预[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]，并在政治和宗教方面推动我们的观点。当然，如果它的新保护国为其提供支持，这可能会升级为一场远超过[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]海岸线的全面战争……"
 rapanui.172.g: "偏远小岛不值得[ROOT.GetCountry.GetAdjectiveNoFlag]水手埋骨他乡。"
 rapanui.172.h: "我们国家的威望受到威胁！"
 rapanui.173.t: "天堂危机"
 rapanui.173.d: "由于[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]局势升级，那里的统治者已经皈依了我们的信仰。然而，设立敌对传教站的国家拒绝接受，并威胁发动军事入侵来强行推行其理念。"
 rapanui.173.f: "如今，控制太平洋某些岛屿对我们而言价值几何的问题比以往任何时候都更加重要：我们是否准备为了捍卫新获得的保护国而赴战？无论如何，我们的竞争对手正在显露獠牙。因此，拥有[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]可能事关国家荣誉。"
 rapanui.173.g: "不幸的是，这样的冲突会耗尽我们的资源。"
 rapanui.173.h: "我们当然会帮助新门徒。"
 rapanui.174.t: "无力的保护者"
 rapanui.174.d: "我们所谓的“保护力量”发现在即将到来的战争中保护我们太危险了。"
 rapanui.174.f: "即使在成功的传教活动和友好的互助以及地区冲突中，将南太平洋民族之一改宗的国家未必有兴趣保护他们免受其他大国的侵害。因此，当天主教的法国看到其在该地区的影响范围受到侵犯时，英国不再保护她传播了新教的塔希提。伦敦承认法国的要求——也是因为它不想为了几个偏远的岛屿而引发一场世界大战。"
 rapanui.174.g: "我们仍将为自由而战！"
 rapanui.174.h: "为了避免更糟的情况我们选择让步。"
 rapanui.175.t: "外交胜利"
 rapanui.175.d: "我们的恐吓足以改变[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]统治者的意志。他会皈依我们的宗教并请求我们的保护。"
 rapanui.175.f: "如果保护力量未能介入，当地统治者改变了他的宗教决定，那么有微弱的可能发生不流血冲突。"
 rapanui.175.g: "最好的结果。"
 rapanui.176.t: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]备战。"
 rapanui.176.d: "尽管被新的保护者背叛，当地人仍准备与我们开战以捍卫他们的自由。"
 rapanui.176.f: "虽然我们的干预不会挑起列强之间的冲突，但土著人民争取自由的斗争可能会比我们实际预期的原始人起义更加暴力。"
 rapanui.176.g: "那就开战吧。"
 rapanui.177.t: "新的基督兄弟"
 rapanui.177.d: "由于新教和天主教传教士之间的冲突不断升级，该国的统治者决定信仰我们的教派以寻求保护。"
 rapanui.177.f: "我们能够在不流血的情况下维护利益。认识到我们对这一影响区的主权后，敌对的传教士已经打包走人了。将来他们不会再成为我们的绊脚石。"
 rapanui.177.g: "皈依就是皈依。"
 rapanui.178.t: "天堂之战结束"
 rapanui.178.d: "我们已经强制推行了在[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的利益。统治者和他的国家将服从我们的统治并皈依我们的宗教。"
 rapanui.178.f: "有些人必须通过艰难的方式学习。他们稍后会感谢我们的善举。"
 rapanui.201.t: "探险队领队"
 rapanui.201.d: "[concept_dubois_pacific_expedition]需要一名经验丰富的海军上将领队。最多三名候选人可以申请参与。"
 rapanui.201.f: "一位海军上将从探险中归来应该会大大改善他的航行经验，但如果战争爆发，他将缺席并无法参战。"
 rapanui.201.g: "[SCOPE.sCharacter('rapanui_pacific_expedition_leader_1').GetFullName]"
 rapanui.201.h: "[SCOPE.sCharacter('rapanui_pacific_expedition_leader_2').GetFullName]"
 rapanui.201.i: "[SCOPE.sCharacter('rapanui_pacific_expedition_leader_3').GetFullName]"
 rapanui.202.t: "探险重心"
 rapanui.202.d: "对于研究考察是否应该有重点，以及如果有的话应该重点关注哪个领域，目前仍然存在分歧。"
 rapanui.202.f: "专业化将使我们在各个子领域获得优势。特定事件发生的可能性增加了。军事部门尤其会从我们海洋学知识的提升中受益，社会科学也会从生物学研究中获益。列强还可以表达他们的帝国野心，并采取增加在该地区的声望和影响力的行动。"
 rapanui.202.g: "这是一次通用的研究之旅。"
 rapanui.202.h: "我们主要进行海洋学研究。"
 rapanui.202.i: "我们想更多地了解自然生物。"
 rapanui.202.j: "我们国家的声誉比虫子或实验更重要。"
 rapanui.203.t: "次席学者"
 rapanui.203.d: "只要具备适当的资格，就有可能在探险队中加入一名特殊科学家。可以是测量员、博物学家、古生物学家和[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]。"
 rapanui.203.f: "太平洋探险因一大批来自不同学科的学者随船同行而声名远播，并在他们回国后拓展了留在国内的学者的视野。诚然，这主要是为了观察和收集，评估通常只在本国进行。虽然水手们对“虫子收集者”有些蔑视，但往往正是这些一丝不苟的人通过深海测量、磁性实验或金星凌日观测取得了杰出的科学成就。"
 rapanui.203.g: "没必要再加一个学者。"
 rapanui.203.h: "我们需要一位测量员。[SCOPE.sCharacter('rapanui_surveyor').GetFullName]有资格参加探险。"
 rapanui.203.i: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName]这样的[concept_dubois_naturalist]最为合适。"
 rapanui.203.j: "我们选择[concept_dubois_paleontologist][SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]。"
 rapanui.203.k: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]是一位[concept_verrier_astronomer]，这样的探险需要他。"
 rapanui.204.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察开始"
 rapanui.204.d: "[concept_dubois_pacific_expedition]已经是万事俱备，只欠东风了。[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetFullName]选择了[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]作为旗舰。这次探险将以#Yellow [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察#!的名字载入史册。"
 rapanui.204.f: "在阳光明媚的日子里，[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]的剪影倒映在碧波之上，宛如一幅静谧的画卷。码头上，学术精英们云集，一位教授正慷慨陈词，既深入探讨了科学的奥秘，又庄重提及这一历史性的时刻。这不仅是科学界的盛典，更是[ROOT.GetCountry.GetNameNoFormatting]的一次殊荣。无论前方挑战如何，众人对这场壮丽的远征满怀期待。须臾之间，[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetFullName]下达了启航的命令。随着礼炮轰鸣，探险船缓缓驶离，直至它的身影消失在遥远的天际。"
 rapanui.204.g: "向大洋州进发！"
 rapanui.204.h: "启航前往澳大利亚与新西兰。"
 rapanui.204.i: "前往印度尼西亚和美拉尼西亚的航线"
 rapanui.205.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队到达大洋洲"
 rapanui.205.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]#!的船员由指挥官[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName]率领，已安全抵达波利尼西亚东部海域，并将于近期开始研究工作。"
 rapanui.205.f: "[concept_dubois_pacific_expedition]可以前往太平洋沿岸的三个地区之一：大洋洲、澳大利亚或印度尼西亚。太平洋探险不仅要考虑探险的重点，还要考虑探险的地区。例如，袋鼠只能在澳大利亚找到。帝国主义列强可能会在没有外交利益的情况下向大洋洲派遣传教士和建立贸易站，但在印度尼西亚或澳大利亚不能这样做。在探险过程中，可以通过日志改变目的地。"
 rapanui.205.g: "啊，塔希提。"
 rapanui.206.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队到达澳大利亚"
 rapanui.206.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]#!的船员由指挥官[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName]率领，已安全抵达塔斯马尼亚海域，并将于近期开始研究工作。"
 rapanui.206.g: "啊，澳大利亚。"
 rapanui.207.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]探险队到达印度尼西亚"
 rapanui.207.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]#!的船员由指挥官[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName]率领，已安全抵达爪哇海域，并将于近期开始研究工作。"
 rapanui.207.g: "啊，巴达维亚。"
 rapanui.210.t: "改变航向"
 rapanui.210.d: "指挥官[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName]下令改变航向离开先前的探险区域。[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]该驶向哪里？"
 rapanui.210.f: "“没有信心，所有事都会做得很糟糕。”——詹姆斯·库克"
 rapanui.210.g: "波利尼西亚"
 rapanui.210.h: "澳大利亚。"
 rapanui.210.i: "印度尼西亚"
 rapanui.210.j: "保持航向不变。"
 rapanui.211.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队返回"
 rapanui.211.d: "经历多年的旅行，[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetFullName]指挥的探险队已经回到故乡。子孙后代将受益于他们的成就。"
 rapanui.211.f: "对于大规模考察旅行而言，回到祖国往往不是结束，而只是长期研究的开始。丹麦的伽拉忒亚号考察船就是其中之一。考察船运回了93箱动物学、昆虫学、植物学和地质学资料。此外，还有21箱人种学资料、来自爪哇的大量藏品，以及探险队访问过的许多城市和港口的科学家赠送的礼物。遗憾的是，由于政治原因，这些发现从未完全公布。这些藏品后来主要用作参考资料。"
 rapanui.211.g: "欢迎回家。"
 rapanui.212.t: "一位新博物学家"
 rapanui.212.d: "经过长时间的探险和相关的专注研究，旅行研究员[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName]现在被认为不仅是其领域久经考验的专家，也是一位博物学家。"
 rapanui.212.f: "“总之，在我看来，对一个年轻的博物学家来说，没有什么比在遥远的国度旅行更有益处的了。正如赫歇尔爵士所说，人的每一种肉体感官都得到了充分的满足，欲望和渴求却会在旅途中得到部分缓解。新奇的事物和成功的机会所带来的兴奋会刺激他增加活动。此外，由于许多孤立的事实很快就会变得无趣，比较的习惯就会导致概括化。另一方面，由于旅行者在每个地方逗留的时间很短，他的描述通常只能是速写，而不是详细的观察。因此，正如我发现的那样，人们总是倾向于用不准确和肤浅的假设来填补知识的空白。”——查尔斯·达尔文"
 rapanui.212.g: "他对我们未来的计划很有帮助。"
 rapanui.213.t: "随队科学家撰写报告"
 rapanui.213.d: "从研究之旅归来后，[SCOPE.sCharacter('rapanui_scientist').GetFullName]撰写了第一份关于太平洋航行的报告。结果将在未来几年内更详细地记录下来。"
 rapanui.213.f: "成功的科考旅行之后通常都会发表长篇科学论文，通常会持续数年之久。查尔斯·达尔文在“小猎犬号”上获得的知识在随后的几年中才反映在多部论文中。奥地利“诺瓦拉号”的研究之旅写了21卷。直到1895年，即探险结束19年后，爱丁堡的挑战者办公室仍在出版“挑战者号”探险队的研究成果。报告共50卷，长达29500多页。"
 rapanui.213.g: "图书馆又多了一篇科学文章。"
 rapanui.221.t: "洋流"
 rapanui.221.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]进入了强大的洋流。"
 rapanui.221.f: "洋流研究是海洋学发展的基础学科之一。早在大发现时代，西班牙和葡萄牙航海家就已经发现了快速穿越世界各大洋的潜在有利洋流；菲律宾马尼拉和墨西哥阿卡普尔科之间的贸易往来就是一个著名的例子。19世纪，为了更好、更全面地了解全球洋流系统是如何运作的，人们加深了对海洋学的认识。"
 rapanui.221.g: "科学家应该进行最必要的实验。"
 rapanui.221.h: "顺流而下以获取更多知识。"
 rapanui.222.t: "海洋学测试"
 rapanui.222.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队#!目前正在研究迄今为止探索有限的海水成分和温度。"
 rapanui.222.f: "全世界的水在不断运动。主要的驱动力是潮汐和风。此外，温度和盐度的差异也对海水的输送起着重要作用，因为由此产生的密度差异会产生洋流。因此，水温、盐度以及水流速度的变化也会对陆地产生影响，例如改变气候。最著名的例子就是墨西哥湾流。"
 rapanui.222.g: "新鲜的海盐！"
 rapanui.223.t: "磁性"
 rapanui.223.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]上的科学家正在进行各种实验来证明有关地球磁场的理论。"
 rapanui.223.f: "旅行经纬仪是一种专为探险设计的测地经纬仪，其结构尽可能小巧坚固，也可以在旅途中进行调整。据了解，奥地利的“诺瓦拉号”探险队就曾使用过这种仪器。为了测定陆地上的地磁参数，通常会在用随身携带的“砖块”形成坚实底土的地方设立站点。一系列测量通常持续数小时，同时还必须进行天文定位。通过这种方式，可以确定全球共17个地点的地磁场。"
 rapanui.223.g: "这将提高我们的物理知识。"
 rapanui.223.h: "[SCOPE.sCharacter('rapanui_scientist').GetLastName][SCOPE.sCharacter('rapanui_scientist').GetCustom('getMsMr')]应该做个特殊的实验。"
 rapanui.223.i: "这将增加我们的海洋学知识。"
 rapanui.224.t: "深海测量"
 rapanui.224.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队#!正在进行一项艰难的深海调查，以确定深海的密度、温度和盐度。以前未知的生命形式也将被从深处打捞出来。"
 rapanui.224.f: "19世纪中叶起，深海调查发挥了越来越重要的作用。一方面，这与电报初创时期为铺设电缆而进行的海底调查有关。另一方面，物理和生物理论需要得到验证。长期以来，人们一直认为在一定的水深之下不可能有生物存在，或者那里保存着“活化石”。C·W·汤姆森等科学家认为，恒定的低温、黑暗以及缺乏海流、海浪或地震事件的条件提供了一个稳定的环境，使得进化减慢或完全停止。这使得深海研究成为博物学家、古生物学家和进化论支持者关注的重要领域。"
 rapanui.224.g: "专注测量"
 rapanui.224.h: "专注获取深海[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]。"
 rapanui.225.t: "南极洲"
 rapanui.225.d: "一股强大的洋流导致[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]被吹离航线并发现自己陷入了南极洲的永久冰层中。科学家们惊喜不已，水手们则担心被困在冰里。"
 rapanui.225.f: "[concept_dubois_pacific_expedition]队发现自己来到了南极洲，这正是加强研究的好时机。但是，如果探险船过于深入冰川，就有可能失去宝贵的时间。虽然19世纪的几次探险都冒险进入了亚极地地区，但即使是“挑战者”号探险队也小心翼翼，避免在恶劣环境中度过太长时间。"
 rapanui.225.g: "进行海洋学研究的完美时机。"
 rapanui.225.h: "进行气象学研究的完美时机。"
 rapanui.225.i: "进行动物学研究的绝佳时机。"
 rapanui.225.j: "进行通识研究的绝佳时机。"
 rapanui.226.t: "冰"
 rapanui.226.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]的航程将大幅延迟。显然这艘船被困在了永久冰川中。"
 rapanui.226.f: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队#!无法进行实验。"
 rapanui.226.g: "他们失去了宝贵的时间！"
 rapanui.227.t: "未知岛屿"
 rapanui.227.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队#!发现了一座至今未知的岛屿。指挥官[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName]下令进行详细探索。"
 rapanui.227.f: "“他们说胆怯是会传染的；但另一方面，争论也是一种强大的激励。”——罗伯特·路易斯·史蒂文森"
 rapanui.227.g: "派[SCOPE.sCharacter('rapanui_scientist').GetLastName]先生去探索那个岛屿"
 rapanui.227.h: "派出一支小型陆地探险队"
 rapanui.229.t: "洋流冲走船只"
 rapanui.229.d: "也许上次科学实验的代价有点太高了。[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]正被洋流卷走，风向极其不利。"
 rapanui.229.f: "如果一艘探险船被洋流困住，它就会离开原来的研究区域并被抛入另外两个区域之一。船漂流的地方是随机的。"
 rapanui.229.g: "听起来我们正在远离探险目标。"
 rapanui.230.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]深渊"
 rapanui.230.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队#!进行的深海测量已经找到了海洋的最深点。为了表彰这一发现，这片深海从此以这艘船的名字命名！"
 rapanui.230.f: "1875年3月23日，“挑战者号”探险队在位于关岛和帕劳之间的西南太平洋第225号取样站记录到深度为8184米的探测结果，进行了另一次探测加以确认。后来使用现代设备进行的探险表明，这一区域是马里亚纳海沟的南端，也是已知海底最深的地方之一。后来在挑战者号最初探测的地点附近发现了10994米的现代探测深度。挑战者号发现的深度是本次探险的重要发现，它拓宽了海洋学对海洋深度和广度的认识，现在此地以发现它的船只命名为“挑战者深渊”。"
 rapanui.230.g: "历史性的一天。"
 rapanui.231.t: "海龟岛"
 rapanui.231.d: "在航行期间，#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队#!遇到了一群海龟。岛上到处都是这些爬行动物。"
 rapanui.231.f: "船员即使从远处也能看到，岛上的海滩似乎在移动。显然，这里是绿海龟最喜欢的产卵地。甫一上岸，一些水手就想对这些毫无防备的动物进行恶作剧，无论是偷海龟蛋，还是公开宣布他们终于想亲自尝尝著名的海龟汤。然而，科学家们向[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName]指挥官发出的紧急呼吁确保了水手们——尽管很不情愿——放弃了他们的烹饪野心。"
 rapanui.231.g: "我们得抓一只海龟。"
 rapanui.231.h: "研究海龟并收集一些标本。"
 rapanui.232.t: "蝠鲼"
 rapanui.232.d: "在对热带鱼的研究中，#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队#!的学者们发现了一种巨大的蝠鲼。"
 rapanui.232.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]号上午短暂抛锚以研究海湾中的当地鱼类数量。当一些科学家正乘坐橡皮艇采集样本时，一条美丽无比的巨型鳐鱼从船头掠过，学者们简直不敢相信自己的眼睛‑‑他们只在前现代的海员故事中见过这种非凡的标本。然而，其他船员在得知消息后产生了不同的观点。一些动物学家坚持认为，最好的办法是捕获这只动物，并将其装在一桶水中运回家。另一些学者则认为，最好在动物的栖息地观察它以便得出更精确的科学结论；还有一群人表示他们应该放过这只鳐鱼，继续收集样本。另一方面，指挥官[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName]却宣布了完全不同的计划：他建议把这只鳐鱼作为战利品射杀，献给[SCOPE.sCharacter('rapanui_ruler').GetPrimaryRoleTitle][SCOPE.sCharacter('rapanui_ruler').GetFullName]——这是出于对政府财政支持的感激还是职业原因，还是个未知数。"
 rapanui.232.g: "我们应该尝试捕捉这种神奇的动物。"
 rapanui.232.h: "对于我们的统治者来说，这将是一个伟大的纪念品。"
 rapanui.232.i: "[SCOPE.sCharacter('rapanui_scientist').GetLastName]先生应该研究这个。"
 rapanui.232.j: "只享受大自然并收集一些样本。"
 rapanui.233.t: "捕捉袋鼠"
 rapanui.233.d: "在澳大利亚海岸停留期间，[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]的斥候与当地人取得了联系。他们提醒船员注意该地区的红袋鼠。"
 rapanui.233.f: "“但它们是又大又多毛的怪物！”当动物学家巴顿霍尔托斯特教授兴高采烈地开始猎杀红袋鼠时，一位威尔士移民如此表示。巴顿霍尔托斯特教授意想不到的是，澳大利亚红袋鼠是动物王国里最爱闹腾的子民之一，而威尔士人甚至低估了这一点。虽然这位移民一再指出死猫沟臭名昭著的红袋鼠造成的血腥后果，但巴顿霍尔托斯特教授根本没有为此提高戒备。热心的同事们特别想指出，在#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察#!之前，巴顿霍尔托斯特教授已经在大学阴暗的地下室里呆了33年，他的身体状况只能说是勉强应对澳大利亚最大的陆地动物；在过去的几年里，巴顿霍尔托斯特教授所做的唯一负重训练就是把一盘盘碎樱桃蛋糕叠起来。虽然同事们都认为寻找巨型袋鼠有利于动物学研究，但对这种方法是否正确却表示怀疑。"
 rapanui.233.g: "我们需要袋鼠——能出什么问题呢？"
 rapanui.234.t: "考拉交易"
 rapanui.234.d: "在上岸休假时，一位澳大利亚流动商人——其实是个动物贩子，联系了我们。他说他为我们准备了一只在世界其他地方找不到的“毛茸茸的小熊”……"
 rapanui.234.f: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队#!中的科学家们很快确定，所谓的熊其实是考拉，因此属于有袋类动物。尽管如此，动物学家和生物学家的还是颇有兴趣。不过，有一个问题：商人想要的不是钱，而是另一只动物：他需要一只貂。这一需求让船员感到惊讶，但宠物贩子强调，澳大利亚和新西兰对黄鼠狼、雪貂和类似动物的需求很大。原因是：定居者引进的兔子，不仅损害了当地的动植物群，而且由于兔子没有天敌，也损害了农业经济。不过，貂类动物可以大量捕食兔子。这会产生什么后果吗？动物贩子只是耸耸肩——并询问我们是否拥有白鼬。"
 rapanui.234.g: "我们很乐意用白鼬换他的考拉。"
 rapanui.234.h: "白鼬在澳大利亚将造成可怕的危害！"
 rapanui.234.i: "多么奇怪的提议啊。我们对标本更感兴趣。"
 rapanui.235.t: "奇特动物"
 rapanui.235.d: "在一座港口城市，一位联系人联系上了一位著名的猎人和捕手，他向科学家介绍了一种令人惊叹的动物。"
 rapanui.235.f: "没有一个科学人员听说过这种动物，更不用说见过了。虽然人们对澳大利亚迷人的野生动物有各种猜测，但有人警告说，原住民之前曾向欧洲人讲述过像本耶普这样的神奇动物，但最终证明只是童话故事。然而，有两件事让科学家们产生了进一步的疑问。一方面，捕兽人要求不要触碰这个鸭子、海狸和水獭的嵌合体，也不能离它们太近。这引起了一些动物学家的怀疑，认为它可能是一个毛绒动物。一位生物学家怀疑他将一只鸭子放入水獭皮中，并附上一条海狸尾巴。价格引发了第二个疑问：是否需要首都的补贴来支付这些成本。不能排除动物猎人进一步加价的可能性。"
 rapanui.235.g: "买！"
 rapanui.235.h: "这种动物显然是假的。我怀疑销售政策背后的商业模式存在问题。"
 rapanui.236.t: "婆罗洲的秘密"
 rapanui.236.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队#!在婆罗洲的雨林中获得了奇特的发现。"
 rapanui.236.f: "一支由科学家、当地向导、助手以及武装护卫组成的团队在婆罗洲森林徒步旅行时发现了一只孤独的猩猩。关于如何处置它有多种选择。猩猩通常是独居的，随着欧洲人的到来，它们变得更加稀有和害羞。另一方面，昆虫学家非常喜欢标本，并希望继续寻找甲虫。"
 rapanui.236.g: "对动物园而言是完美的动物。"
 rapanui.236.h: "[SCOPE.sCharacter('rapanui_scientist').GetLastName]先生应该研究这个神奇的物种。"
 rapanui.237.t: "巨龙"
 rapanui.237.d: "在巽他群岛，[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]的船员遇到了一种像是来自史前的爬行动物。"
 rapanui.237.f: "在巽他群岛，指挥官[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName]亲眼看见一只巨大的爬行动物在岩石上等待。一位动物学家证实这是他见过的最大、最令人印象深刻的巨蜥，这让指挥官更加确信他发现了他一生中最丑陋的生物。当然，博物学家们一如既往地兴高采烈。"
 rapanui.237.g: "我们的家乡也需要这样一条龙。"
 rapanui.237.h: "应该研究这种生物的行为。但是从很远的地方。"
 rapanui.237.i: "科学家应该更关注昆虫、鸟类、鱼类或者蝴蝶。除了这个可怕的生物之外什么都行。"
 rapanui.238.t: "捕获袋鼠！"
 rapanui.238.d: "工作人员成功地将红大袋鼠引入陷阱，绑起来并运走。它现在被牢牢地锁在笼子里。"
 rapanui.238.f: "鸭子对袋鼠说，\n“请让我坐在你的背上，带我一程吧！\n我会安静地坐着，一动也不动，\n除了嘎嘎叫，什么也不说。\n一整天我都会这样子！\n我们一起去迪河，去果冻伯里，\n越过陆地，跨过海洋；\n请带上我吧！求你了！”鸭子对袋鼠说。\n\n袋鼠对鸭子说，“请让我想一想，\n也许，这样的旅程会给我带来好运，\n但是似乎有一点点小问题，\n那就是，请允许我直说，\n你的脚太湿太冷了，这样我会很不舒服。\n我还可能会患上风湿病！”袋鼠说。\n——爱德华·利尔"
 rapanui.238.g: "送回家！"
 rapanui.239.t: "船员被拳击而死"
 rapanui.239.d: "一场血腥屠杀导致数名水手倒地重伤、教授的眼镜被打歪了，大受惊吓，不幸的是，探险队不得不承认未能捕获袋鼠。一名研究助理甚至被这种狂暴的野兽活活打死。"
 rapanui.239.g: "可怕！"
 rapanui.240.t: "[SCOPE.sCharacter('rapanui_scientist').GetLastName]线"
 rapanui.240.d: "通过亚洲和澳大利亚之间生物相边界的发现，[SCOPE.sCharacter('rapanui_scientist').GetFullName]对生物学做出了重要贡献，并为进化论提供了支撑。为了纪念，这条线将以他的名字命名。"
 rapanui.240.f: "“我第一次在这里看到了许多澳大利亚的鸟类，而在更西边的岛屿上却完全没有类似的鸟。小白凤头鹦鹉非常多，它们的叫声响亮，体色洁白，头冠呈黄色，是这里一道亮丽的风景线。这里是地球上发现该科鸟类的最西端。向东旅行的博物学家首先会发现一些蝶形花科的小金银花和奇特的土墩塔（Megapodius Gouldii）\n龙目岛与巴厘岛之间有一条不到20英里宽的海峡相隔，我自然期望与巴厘岛鸟类重逢；但在那里逗留的三个月中，我从未见过它们当中的任何一种，而是发现了一系列完全不同的物种，其中大多数不仅在爪哇岛，而且在婆罗洲、苏门答腊岛和马六甲半岛都极为罕见。”——阿尔弗雷德·拉塞尔·华莱士"
 rapanui.240.g: "[SCOPE.sCharacter('rapanui_scientist').GetLastName]线？听上去不错。"
 rapanui.241.t: "稀有鸟类"
 rapanui.241.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队#!的学者助手找了一些珍奇鸟类的鸟巢。"
 rapanui.241.f: "“这些鸟的外形与智利仿声鸟或拉普拉塔的Callandra非常相似……每种鸟都是独一无二的，但习性却难以区分。我回忆起这样一个事实：西班牙人通过龟的身体形态、鳞片形状和总体大小，可以分辨出龟是从哪个岛上带来的。我发现这些岛屿彼此遥遥相望，拥有的动物数量却很少，而这些鸟类却在结构上略有不同，占据着相同的生态位，我不得不怀疑它们只是变种而已。我所知道的唯一一个类似的事实是，人们一直断言福克兰群岛东部和西部像狼一样的狐狸之间存在差异。如果这些说法有些许根据，那么群岛动物学就非常值得研究了；因为这些事实会破坏物种的稳定性。”——查尔斯·达尔文"
 rapanui.241.g: "观察并研究这些鸟类。"
 rapanui.241.h: "抓一些鸟并带走鸟蛋。"
 rapanui.242.t: "海洋标本"
 rapanui.242.d: "我们的样本搜寻者昨天捕获了大量新的海洋生物。"
 rapanui.242.f: "威尔克斯探险队对19世纪科学的发展，尤其是美国科学机构的成长起到了重要作用。探险队发现的许多物种和其他物品为新成立的史密森尼学会奠定了收藏基础。在被海军船员讥讽为“挖蚌者”和“捕虫者”的探险队科学家的帮助下，探险队收集了超过60000份植物和鸟类标本。探险期间收集到的数据和标本数量惊人，其中包括648个物种的种子，这些种子后来被交易、种植并送往全国各地。干标本被送往国家标本馆，现在是史密森尼学会的一部分。此外，还有254株活体植物，大部分来自旅途的起点，它们被放置在1850年新建的温室中，后来扩建为美国植物园。"
 rapanui.242.g: "生物学家的黄金。"
 rapanui.243.t: "了不起的化石"
 rapanui.243.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队#!在探险中发现了一个埋藏着先前不为人所知的化石的沉积层。"
 rapanui.243.f: "化石发现在“小猎犬”号探险中具有重要意义。返航后，理查德·欧文特别致力于对查尔斯·达尔文发现的化石进行描述。“小猎犬”号发现了新的巨型树懒物种，如磨齿兽和雕齿兽。在圣菲附近发现的化石中，有一颗马的牙齿曾让达尔文感到困惑，因为此前人们一直认为马是在16世纪才被引入美洲的。欧文证实，这颗马牙来自一种已经灭绝的南美物种，他于1845年将其命名为Equus curvidens。"
 rapanui.243.g: "搜寻化石"
 rapanui.244.t: "叠层石"
 rapanui.244.d: "科学家们在[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]停泊的海湾中发现了大量叠层石。"
 rapanui.244.f: "叠层石是一种生物沉积岩，由水体中微生物的生长和新陈代谢所产生的沉积物颗粒的捕获和结合或溶质的沉淀而形成。它们大多分层，通常由分层非常细的石灰岩组成。有些化石让人联想到花椰菜，它们具有管状、柱状或波浪状的壳状结构。已知最古老的化石大多是叠层石，因此它们可以提供生命如何从非常简单的形式进化到更复杂形式的线索。叠层石被认为是生物最早建立起来的可识别结构。它们起源于前寒武纪，距今已有35亿年。在西澳大利亚皮尔巴拉地区的北极点发现的瓦拉沃纳系群距今已有34.5亿年的历史。在地球历史的某些时期——早在珊瑚出现之前——叠层石是重要的珊瑚礁建造者。直到10亿年前，几乎所有沿海水域都广泛分布着叠层石。7亿年前，叠层石的多样性和分布有所减少。距今4.5亿年前的叠层石非常罕见。"
 rapanui.244.g: "收集这些[concept_dubois_specimen]。"
 rapanui.244.h: "收集这些化石。"
 rapanui.244.i: "研究叠层石。"
 rapanui.245.t: "植物化石"
 rapanui.245.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]的船员在悬崖表面发现了数百万年历史的蕨类植物的印记。"
 rapanui.245.f: "在石炭纪（距今约3.6亿至3亿年），巨大的蕨类植物（形态远较今时庞大，常称为树蕨类）与马尾草、狼尾草共同构成了辽阔的森林，这些植物群落为现今煤矿的形成奠定了基础。最古老的蕨类化石可以追溯至早泥盆纪（约4亿年前），因此蕨类植物可能比种子植物更加古老——最早的种子植物化石直到晚泥盆纪才首次被发现。"
 rapanui.245.g: "工业革命的基石。"
 rapanui.246.t: "琥珀项链"
 rapanui.246.d: "一位部落酋长提出向我们出售一条历史悠久的琥珀项链，项链上捕获了史前昆虫。然而，指挥官[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName]无法决定如何处理这一发现。"
 rapanui.246.f: "当地酋长的提议令人大吃一惊。显然，当地人已经听说了[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]的航程，并希望能谈成一笔好生意。科学家们看完这串项链后，就如何处理它展开了激烈的争论。一派坚持要把它买下来送进博物馆，向游客展示昆虫是如何保存的。另一派则坚持要将项链的琥珀拆解下来，逐一研究每一块化石。博物学家和古生物学家对如何处理这一明显的古生物学发现意见不一，而人类学家和考古学家则反对并认为这块宝石具有文化意义。另一方面，军官团认为科学讨论是一场不必要的争吵，主张不要在不值钱的东西上花钱，继续旅行。"
 rapanui.246.g: "这条项链具有古生物学意义。"
 rapanui.246.h: "这条项链具有考古学意义。"
 rapanui.246.i: "打碎项链进行研究。"
 rapanui.246.j: "这项链毫无用处。"
 rapanui.247.t: "澳大利亚骨骼化石"
 rapanui.247.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队#!的水手们一大早发现了一个非凡的古生物遗址。即使是业余爱好者也能看出这个地方有一些特别之处。"
 rapanui.247.f: "一层裸露的沉积物显示这些化石保存完好。在众多的发现之外，一块奇怪的骨头也引起了水手们和后来加入他们的科学家们的注意，这块骨头很快就得到了“澳大利亚骨头”的绰号。很快人们就发现，古生物学家有条不紊的工作可能比没有经验的工人徒手挖掘获得更多的东西。"
 rapanui.247.g: "[SCOPE.sCharacter('rapanui_scientist').GetLastName]教授应当对此进行挖掘。"
 rapanui.247.h: "收集尽可能多的化石。"
 rapanui.250.t: "爪哇猿人"
 rapanui.250.d: "[SCOPE.sCharacter('rapanui_scientist').GetLastName]教授在#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察#!中发现了非凡的化石：一具生活在一百万年前的史前人类的骨骼。这轰动了科学界！"
 rapanui.250.f: "1891年，欧仁·杜波伊斯在东爪哇特里尼尔附近的梭罗河畔首次发现的化石被称为爪哇人。根据目前的知识估计其大约有一百万年的历史。它们是在欧洲以外发现的第一批人类化石，也是继尼安德特人之后找到的第二批现代人（智人）解剖学亲属化石证据。爪哇发现的人类化石最初被称为人猿（Anthropopithecus），后来又被称为直立猿人（Pithecanthropus erectus）。如今，大多数古人类学家都把它们归入直立人（Homo erectus）这一物种，偶尔也会像魏敦瑞在1940年建议的那样，以爪哇直立人（Homo erectus javanensis）这一亚种名强调它们的起源。在杜布瓦的发现 50年后，拉尔夫·冯·孔尼华回忆说：“没有任何其他古生物学发现能引起如此大的轰动，并导致如此多相互冲突的科学观点。”"
 rapanui.250.g: "这就是缺失的那一环吗？"
 rapanui.251.t: "珍贵文物"
 rapanui.251.d: "在拜访偏远岛屿上的部落时，我们获得了一件珍贵的大洋洲文物。"
 rapanui.251.f: "指挥官[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName]实际上只想短暂上岸休息，以便与船员一起获取补给和淡水。该岛位于贸易路线的边缘，与外界的联系很少。然而，由于误会，酋长显然以为指挥官是一位王子，并赠送给他一座艺术木雕。[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]的船员用平常的玻璃弹珠作为回报，这让原住民非常高兴。"
 rapanui.251.g: "它属于博物馆。"
 rapanui.252.t: "发现新海湾"
 rapanui.252.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队#!证明了所谓的岛屿只是一个半岛，并因此发现了新的海湾。对于命名问题仍然存在分歧。"
 rapanui.252.f: "1875年8月，“瞪羚号”在太平洋上的俾斯麦群岛逗留期间，勘测了新不列颠岛（旧称新波美拉尼亚）东北部的布兰奇湾天然良港。这使得人们发现了新不列颠岛的东部其实是一个半岛，因此以该船的名字将其命名为“瞪羚半岛”。这个名字一直沿用至今。此外，新爱尔兰岛和贾乌尔岛之间的通道被称为“瞪羚海峡”，布干维尔岛西海岸的一个天然港口被称为“瞪羚港”。"
 rapanui.252.g: "以测量该海湾的学者命名：[SCOPE.sCharacter('rapanui_scientist').GetLastName]湾"
 rapanui.252.h: "以我们的国家元首命名：[SCOPE.sCharacter('rapanui_ruler').GetFullName]湾"
 rapanui.252.i: "以该海湾的发现者命名：[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName]湾"
 rapanui.252.j: "探险队不该被遗忘：[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]湾"
 rapanui.253.t: "贸易站"
 rapanui.253.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队#!找到了一处绝佳的锚地。"
 rapanui.253.f: "当指挥官[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName]进入海湾时，他注意到这个地方对于未来的贸易与探险来说是何等安全。后来的岸上考察显示，这里不仅有适合耕作的优质土壤，而且气候宜人。一些商业顾问立即建议尽一切可能为[ROOT.GetCountry.GetNameNoFlag]占据这此地。科学家们则指出，这种帝国主义行为可能会让科学使命被忽视。"
 rapanui.253.g: "建立一个贸易站。"
 rapanui.253.h: "把这里标到地图上就好。"
 rapanui.254.t: "向[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]传教？"
 rapanui.254.d_cat: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]的随队牧师，[SCOPE.sCharacter('rapanui_missionary_scope').GetLastName]神父，了解到[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的原住民从未听闻耶稣基督。他请求离船并使当地人皈依天主教。"
 rapanui.254.d_pro: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]的随队牧师，[SCOPE.sCharacter('rapanui_missionary_scope').GetFullName]牧师，了解到[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]的原住民从未听闻耶稣基督。他请求离船并使当地人皈依新教。"
 rapanui.254.f: "最近有几位商人上船向我们介绍了该地区的情况并补充了探险队的库存。他们还谈到了该地区的基督教化和异教文化。船上的牧师听得很认真，惊讶地发现，他的信徒们还没有涉足这一地区。由于害怕岛上一再出现的食人族，上帝的孩子们近年来一直没有上岸。"
 rapanui.254.g_cat: "与主同行。"
 rapanui.254.g_pro: "主与你同在。"
 rapanui.254.h: "太危险了！"
 rapanui.255.t: "敌意反应"
 rapanui.255.d: "我们访问[SCOPE.sCountry('rapanui_hostile_country').GetNameNoFlag]的目的其实是为了彰显仁慈态度，提高国际声誉。不幸的是，对方几乎没有收到这些信息。"
 rapanui.255.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]的领事建议[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetFullName]进行短暂访问，并与当地统治者进行交涉。然而，这位指挥官显然不了解当地的风俗习惯。在不知情的情况下，他侮辱了该国的一些高级官员。事实上，我们甚至不知道代表团做错了什么。我们可能犯下了严重错误。"
 rapanui.255.g: "我们应该纠正一个严重的失礼。"
 rapanui.255.h: "责怪指挥官。"
 rapanui.255.i: "我们不会为任何事道歉。"
 rapanui.256.t: "采珠人"
 rapanui.256.d: "在旅程中，#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队#!发现了一个安静的小村庄，全村人主要靠采集珍贵的珍珠为生。全体船员都对这个地方及其丰富的珍珠着迷。"
 rapanui.256.f: "指挥官[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName]发现了一个在邻近岛屿中享有盛名的渔村，南海最好的采珠人会从海洋深处打捞出最美丽的珠宝。那里的人们贫穷但诚实，似乎很少做买卖。因此，[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName]正在考虑与当地人做一笔交易，让[ROOT.GetCountry.GetNameNoFlag]也能买到珍珠。然而，船上的一些军官以及天性难测的暴躁水手们表示，我们的船只具备火力优势，可以直接夺取属于我们的东西……"
 rapanui.256.g: "建立一个小贸易点。"
 rapanui.256.h: "应该让博物学家调查此地。"
 rapanui.256.i: "这些是我们的珍珠。"
 rapanui.257.t: "外交使团"
 rapanui.257.d: "与[SCOPE.sCountry('rapanui_friendly_country').GetNameNoFlag]代表进行的会晤大获成功。[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName]正中要害，对方欣然接受。"
 rapanui.257.f: "享用提神醒脑的冰镇猴脑后，[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]的指挥官显示出他不仅在海上，而且在人际关系中也能独当一面。在惯常的外交戏谑之后，[SCOPE.sCountry('rapanui_friendly_country').GetNameNoFlag]使者们对这位英勇的绅士感到惊讶。[ROOT.GetCountry.GetNameNoFlag]应该利用这个机会在国际上再创佳绩。"
 rapanui.257.g: "重申和平意愿。"
 rapanui.257.h: "褒奖指挥官。"
 rapanui.260.t: "环球航行"
 rapanui.260.d: "指挥官[SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetFullName]已经驾驶[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]环绕了地球一周！"
 rapanui.260.f: "许多著名的考察队都借此机会进行了环球航行；在许多情况下，这也是最短且最有效的路线。著名的例子有“小猎犬号”与“挑战者号”（英国）、“诺瓦拉号”（奥地利）、“瞪羚号”（普鲁士）和“伽拉忒亚号”（丹麦）。"
 rapanui.260.g: "环游世界！"
 rapanui.261.t: "更精确的地图"
 rapanui.261.d: "#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队#!的随队科学家[SCOPE.sCharacter('rapanui_scientist').GetLastName]花时间纠正了前辈制图师犯下的一些测量错误，显著改进了地图的质量。"
 rapanui.261.f: "虽然19世纪的地图已经明显优于上世纪，但也并非没有错误。不存在的岛屿一次又一次地被绘制，不知名的岛屿也没有被标注进去。即使到了20世纪初，太平洋的一些地区仍然没有完整精确的地图。飞行员阿梅莉亚·埃尔哈特1937年失踪的原因也可能是她的目的地豪兰群岛被错误地以英里标记。"
 rapanui.261.g: "干得好。"
 rapanui.262.t: "修正距离"
 rapanui.262.d: "在修订#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队#!的地图时，随队学者[SCOPE.sCharacter('rapanui_scientist').GetLastName]确定先前地图上给出的距离是不正确的。他将更新地图材料。"
 rapanui.262.f: "更好的技术条件和科学考察的节奏极大地改善了对距离的精确测量。人尽皆知的是，自詹姆斯·库克的最后一次航行以来，在两极之外几乎没有任何新发现。但这些已有发现之间的关系并不总是那么清晰。随着全球经济的发展，时间紧迫，任务繁重，不仅要进行粗略的测量，还需要非常精确的测量，而后者正变得愈发重要。"
 rapanui.263.t: "异域种子"
 rapanui.263.d: "在上岸休假期间，#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队#!的[SCOPE.sCharacter('rapanui_scientist').GetLastName]教授发现了一些具有重大科学和农业意义的特殊种子。"
 rapanui.263.f: "来自太平洋和东亚的植物的传播并不少见。大名鼎鼎的1789年以兵变告终的“邦蒂”号探险的最初目的就是为了从面包树上采摘扦插枝条，以便在加勒比海培植并为种植园工人提供廉价的主食，避免他们挨饿。但到了19世纪，探险还增加了采集和科学研究的内容。"
 rapanui.263.g: "这些种子应当进入科学收藏。"
 rapanui.263.h: "新种子将用于农业。"
 rapanui.264.t: "新甲虫物种。"
 rapanui.264.d: "[SCOPE.sCharacter('rapanui_scientist').GetLastName]教授在一座岛上发现了一种新的甲虫，并以自己的名字命名。这是一种极其令人厌恶的动物，但对于科学家来说，这是他一生中最快乐的一天。"
 rapanui.264.f: "谁不想让一只丑陋、粘糊糊、令人作呕的虫子在某个时候以他自己的名字命名，并永远与他的姓氏联系在一起呢？"
 rapanui.264.g: "恭……喜。"
 rapanui.265.t: "小地层"
 rapanui.265.d: "在一次岸上游览期间，[SCOPE.sCharacter('rapanui_scientist').GetLastName]教授发现了一个小型地层，其中埋藏着大量化石。到目前为止，该矿床尚未在任何地图上标记。"
 rapanui.265.f: "“还有另一个与之相关的，重要得多的难题。我指的是属于动物界几个主要的门的物种突然出现在已知的最深化石地层中的方式……目前这种情况仍然无法解释；而且可以作为一个有效的论据反驳进化论。”——查尔斯·达尔文"
 rapanui.265.g: "化石永远没够。"
 rapanui.266.t: "接合贝"
 rapanui.266.d: "[SCOPE.sCharacter('rapanui_scientist').GetLastName]教授现在大喜过望：他现在已经收集到了一些稀有的泥盆纪晚期菊科植物，这可是他迄今为止发现的最古老的生命。"
 rapanui.266.f: "接合贝是一种已灭绝的腕足属动物，生活在泥盆纪晚期至二叠纪晚期。接合贝的外壳光滑，有或多或少明显的褶皱和凹槽，在腕足阀上有一个圆形的梗口供腕足移动。接合贝被列入无窗贝目无窗贝科下的旋珠贝亚科。只有无知者才会将这历史悠久的古老化石视为一个平平无奇的贝壳。"
 rapanui.266.g: "那太让人激动了。"
 rapanui.267.t: "南天"
 rapanui.267.d: "[concept_verrier_astronomer][SCOPE.sCharacter('rapanui_scientist').GetFullName]在[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察中广泛地观察南半球地夜空。在这里他看到了在北半球几乎看不到的景象。"
 rapanui.267.f: "南天显示的星星比北天略多，因为银河的中心在赤道以南约20°的人马座。在能见度良好的情况下，南天有超过2000颗肉眼可见的固定恒星，使用双筒望远镜时约有20000到40000颗。在赤道上，一年四季和夜晚都能看到一半的南天和一半的北天，而在南部纬度较高的南非或澳大利亚，任何时候都能看到大约三分之二的南天，在南美洲南部能看到超过80%的南天。"
 rapanui.268.t: "日食"
 rapanui.268.d: "随队科学家[SCOPE.sCharacter('rapanui_scientist').GetFullName]有幸在[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]观测日食，并进行了广泛的天文研究！"
 rapanui.268.f: "19世纪中叶开始，一些工业国的天文学会开始组织探险队前往更遥远的大陆观测日食，其重点是日冕的观测。1868年8月18日的日全食期间，法国天文学家朱尔·让森在印度获得了有关氦元素的线索。1919年5月29日阿瑟·斯坦利·爱丁顿率领的探险队从非洲普林西比岛观测到的日全食引起了人们的特别关注，因为它与几年前阿尔伯特·爱因斯坦提出的相对论有关。"
 rapanui.268.g: "完美！"
 rapanui_avantgarde_navy_modifier: "先锋海军"
 rapanui.300.t: "一个时代的终结"
 rapanui.300.d: "随着可以踏遍全球的现代远洋船只的不断发展，前往太平洋的考察已然是司空见惯的科考行动而不像当年那样稀少。大部分科学家都表示我们已经发现并记录在这个偏远地区我们可以找到的一切。"
 rapanui.300.f: "大航海和探险的时代终于结束了。随着帝国主义和殖民主义的不断扩张，全球的经济和联系日益密切，太平洋上的诸多岛屿现在被看作这个世界上的众多地区之一。前往世界的另一端不再是一场冒险，而仅仅是时间问题。人类正在进入一个似乎一切都已被探索过的时代，甚至南海也失去了其作为异国情调隐居地的旧有魅力。"
 rapanui.300.g: "已经没什么好发现的了。"
 rapanui.1001.t: "复活节岛的秘密"
 rapanui.1001.d: "我们的一艘调查船在复活节岛停留了一下。制图师[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]对岛上的失落文化很感兴趣。"
 rapanui.1001.f: "乍一看，很少有地方能像复活节岛这样荒凉。在这座当地人称之为“拉帕努伊”的岛屿上，森林早已消失殆尽，水果和庄稼也十分稀少。一座火山口耸立在岛上，似乎有着不为人知的伟大的过去。岛上居民如同埃及的法拉欣农民一般生活在这位巨人的肩膀上。[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]，一位雄心勃勃的冒险家，相信世界尽头的这座小岛上可能隐藏着不为人知的秘密。他主动要求上岸，并召集了一支队伍。"
 rapanui.1001.g: "多么神秘的地方……"
 rapanui.1002.t: "拉帕努伊"
 rapanui.1002.d: "探索复活节岛的船员们受到了当地拉帕努伊部落的热情欢迎。"
 rapanui.1002.f: "原住民自称拉帕努伊人，使用的语言与东波利尼西亚语十分相似。虽然拉帕努伊岛与许多偏远的波利尼西亚岛屿相比更靠近美洲大陆，但大家确信这些人一定是几个世纪前从大洋上航行至此。他们热情好客，设下宴席。但一些探险队员警告说，如果真的想找到隐藏的宝藏，就应该避开这些人。"
 rapanui.1002.g: "我们接受他们的盛情邀请。"
 rapanui.1002.h: "这些野蛮人不值得信任。"
 rapanui.1011.t: "仪式舞蹈"
 rapanui.1011.d: "这些人在[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]的带领下，与复活节岛的拉帕努伊族人相处了一段时间。"
 rapanui.1011.f: "复活节岛有着许多谜团。在与当地人共进晚餐时，探险家们才了解到拉帕努伊人历史和宗教的更多片段。拉帕努伊人最重要的仪式似乎是一年一度的比赛，为找寻一颗蛋展开竞争。这与他们的主神马基马基关系密切。会面时，[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]有机会仔细观察一些描绘鸟人和马基马基的岩画。他发现了当地人自己也无法解释的文字。他开始怀疑岛上的居民对他们的过去知之甚少……"
 rapanui.1011.g: "谁是家喻户晓的鸟人？"
 rapanui.1021.t: "摩艾石像"
 rapanui.1021.d: "在与拉帕努伊人相处了几天后，[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]和船员们有了一个重大发现。"
 rapanui.1021.f: "事实证明，拉帕努伊人确实拥有比原始鸟人崇拜更伟大的遗产。在参观一个古老的广场时，[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]发现一座玄武岩雕像的底座露出地面。这些雕像代表的是摩艾，据说它们描绘了祖先的鲜活面孔。雕像已经损坏，但可能具有很高的价值——如果探险队能把运送到我们的博物馆的话。不过，目前还不确定如何，或是否能够办到。"
 rapanui.1021.g: "在当地人发现之前，将文物偷运回国……"
 rapanui.1021.h: "说服拉帕努伊人，我们可以把文物带走。"
 rapanui.1021.i: "我们应该尊重其他民族的遗产，而不是窃取它！"
 rapanui.1022.t: "摩艾石像失窃"
 rapanui.1022.d: "虽然我们在复活节岛的船员设法将摩艾石像带上了船，但当地人发现这一盗窃行为。因此小伙子们不得不过早地逃离！"
 rapanui.1022.f: "这就是所谓的“隐秘行动”吧。尽管[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]已尽一切努力来确保这次行动的隐秘性，但缺乏纪律的水手还是在放风时睡着了。在土著们的注视下，大家把摩艾石像给挖了出来。正当船员们以为大功告成时，不远处却涌来了气势汹汹的土著。他们不得不尽快逃离那里。"
 rapanui.1022.g: "快，回家！"
 rapanui.1023.t: "摩艾石像保全"
 rapanui.1023.d: "由于[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]的卓越才能，复活节岛探险队能够在不知不觉中把伟大的摩艾石像带上我们的船。"
 rapanui.1023.f: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]竭尽全力确保……摩艾石像的迁移尽可能不被人察觉。晚上，他们在昏暗的灯光下挖掘，这样当地人就不会注意到他们用铁锹掘地，然后把石像从地底下抬起来。当太阳升起时，摩艾石像藏在满载智利鸟粪的船上。"
 rapanui.1023.g: "完美"
 rapanui.1024.t: "朋友的小帮助"
 rapanui.1024.d: "虽然拉帕努伊人对我们的要求持怀疑态度，但我们说服他们把摩艾石像搬到我们的船上。"
 rapanui.1024.f: "这次谈话并不轻松，但最终[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]还是说服了当地人，让他们帮忙挖掘并运输摩艾石像。然而，在获得他们的信任后，他在得到拉帕努伊人的同意后得以实施他的计划。作为交换，[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]把船上最值钱的一些“珍宝”诸如玻璃弹珠、两副破旧的扑克牌和一顶还没完全破旧的宽边帽作为礼物送给了当地人："
 rapanui.1025.t: "浪费时间"
 rapanui.1025.d: "尽管船员们为在岛上找到更多的文物做出了巨大的努力，但最终还是被迫放弃探险。"
 rapanui.1025.f: "可能只有少数几个地方比复活节岛更荒凉，除了岩石和草之外，这里几乎一无所有，但复活节岛的独特之处在于有成千上万的人生活在这里。[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]有理由相信，他们可能是砍伐了所有树和杀死所有动物导致荒凉的。"
 rapanui.1025.g: "而这个岛上真的没有更多的特殊用处吗？"
 rapanui.1026.t: "失落的朋友"
 rapanui.1026.d: "在复活节岛的考察中，船员们发现了一个迷人的摩艾石像。它是半埋在地下的，但造型迷人。"
 rapanui.1026.f: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]第一次发现摩艾石像时，其感到深深地震撼，并断定它一定来自这个岛上一个完全不同的时代，岩画不是那个时代的顶峰，也不是萨满教的仪式和竞赛，而是一种能够建造令人印象深刻的雕像并赋予其清晰形状的时代。[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]绝不是科学家或艺术鉴赏家，但当摩艾空洞的眼睛看着他的那一刻，他就看到了历史。他唯一的问题是如何才能把这段历史带回家？"
 rapanui.1026.g: "应该对摩艾石像进行挖掘！"
 rapanui.1026.h: "请当地人挖掘"
 rapanui.1026.i: "最好别管这个烂文物"
 rapanui.1027.t: "与拉帕努伊人的争执"
 rapanui.1027.d: "我们向拉帕努伊人发出的请求呼吁产生了相反的效果。当地人认为我们在利用他们的好客，所以他们要求我们离开。"
 rapanui.1027.f: "我们原本以为，我们之前为了赢得当地人的信任而做出的努力，会让他们觉得我们很轻视他们。但事实上并不是这样。复活节岛的长老们告诉我们，他们不会再被我们用廉价的玻璃弹珠所打动，那只是我们一次性的善意之举。一位老妇人还把我们曾经用来换取他们信任的破草帽，扔在[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]的脚下。她的动作十分激烈，仿佛是在向我们宣战——除非我们马上离开这里。"
 rapanui.1027.g: "我们只对他们的文化感兴趣……为什么这么暴躁？"
 rapanui.1028.t: "摩艾石像被破坏"
 rapanui.1028.d: "遗憾事情发生了，摩艾石像的挖掘工作进度一塌糊涂。这些人非但没有把石像从地下挖出来，反而把它损坏得无法修复。"
 rapanui.1028.f: "如果完全是无意的，就不是考古破坏行为。至少他们是这么说的。"
 rapanui.1028.g: "这是考古学和艺术界的损失。"
 rapanui.1029.t: "当地人的帮助！"
 rapanui.1029.d: "拉帕努伊人已经同意帮助挖掘。"
 rapanui.1029.f: "有时候，一根旧板球棒和一罐杏酱的作用要让人吃惊的很。假如你知道如何将它们相互结合的话。"
 rapanui.1029.g: "一个意想不到的惊喜。"
 rapanui.1041.t: "鸟人之岛"
 rapanui.1041.d: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]已经决定自己去探索复活节岛。当地人可能会带来更多的麻烦，这不是好事。"
 rapanui.1041.f: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]决定独自探索复活节岛。他不无道理地怀疑，如果岛上发现了有价值的文物，他便不得不违背拉帕努伊人的意愿将其带走。到目前为止，这些人只发现了一些神秘的岩石，岩石上的岩画刻着奇怪的符号和标记，其中鸟人的形象非常突出。但制图师确信，更有价值的猎物在等着他们。"
 rapanui.1041.g: "这肯定会确保考察的成功。"
 rapanui.1042.t: "摩艾石像"
 rapanui.1042.d: "经过多日的搜索，[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]有一个重大发现！"
 rapanui.1042.f: "事实证明，拉帕努伊人确实拥有比原始鸟人崇拜更伟大的遗产。在参观一个据称为当地各部族聚集场地的古老广场时，[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]发现一座玄武岩雕像的底座露出地面。雕像已经损坏，但可能具有很高的价值——如果探险队能把运送到我们的博物馆的话。不过，目前还不确定如何，或是否能够办到。"
 rapanui.1042.g: "把石像带上船，离开这个岛。"
 rapanui.1042.h: "继续探索该岛。"
 rapanui.1043.t: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]之死"
 rapanui.1043.d: "事实证明寻找波利尼西亚的文物完全没有用处，而且这个不毛之地也证明这里的人和物品都有问题。"
 rapanui.1043.f: "拒绝当地人的帮助，无果后继续寻找宝藏的决定，以至于整个计划，回想起来都是一场灾难。仅仅过了几天，队员就变得就缺水少粮，体质羸弱。一天早上，[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]患上了一种不知名的疾病，被发现时已经死亡。大家把他埋在了这个如今荒无人烟的小岛上，然后返回了船上。"
 rapanui.1043.g: "除了取消这次毫无意义的远征之外，已经别无他法"
 rapanui.1050.t: "拉帕努伊岛的摩艾石像"
 rapanui.1050.d: "在[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]的率领下，一群英勇的探险家在复活节岛上完成了一次惊人的壮举：他们将两件珍稀的海洋文物带回了[ROOT.GetCountry.GetNameNoFlag]。他们无疑是值得受到赞美和尊敬的英雄。"
 rapanui.1050.f: "“那原始的头颅\n如此雄心勃勃，\n却是粗鲁的艺术，\n何其轻易读懂\n经年所受的悲苦\n如同表格上的读数。\n一语道破时，\n唇角的弧度鄙夷地翘起，\n将千吨巨石\n送上远航的舟楫。”\n——罗伯特·弗罗斯特"
 rapanui.1050.g: "这些摩艾石像属于博物馆！"
 rapanui.1051.t: "与摩艾石像一起回家"
 rapanui.1051.d: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]现如今已是声名鹊起。他在荒凉的复活节岛上发现了一座罕见的摩艾石像，并且在船上已经宣布将其交给[SCOPE.sCharacter('rapanui_ruler').GetPrimaryRoleTitle][SCOPE.sCharacter('rapanui_ruler').GetFullName]。尽管水手们的收入增加了——但[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]却对未来的职业生涯忧心忡忡。"
 rapanui.1051.f: "无论人们如何看待复活节岛上的困境，这次探险都是成功的。在国内，人们已经流传着那位敢于冒险的探险家如何为祖国带回一件奇异的艺术珍宝的故事。在有些人眼中，这是一种偷窃，而在另一些人眼中，这是小说的灵感。"
 rapanui.1051.g: "复活节岛的秘密现在天下大白了吗？"
 rapanui.1052.t: "拉帕努伊的圣地"
 rapanui.1052.d: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]在探险中与当地土著结下了深厚友谊。凭借着土著对他们自己习俗、历史和秘密的了解，现在他已经被视为复活节岛研究领域的专家了。"
 rapanui.1052.f: "在乘船回国的途中，[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]思考着在复活节岛上的经历。或许别的人会更加冒失。或许他会贪婪地夺走珍贵的文物来提升自己的名声；或许他会因为自己的无知和对土著的轻视而送命。他总结道，他在岛上找到的远不止是稀奇的宝物。因为当地人对他表示了感谢。他们把他引入了他们的习俗。他现在了解了他们的历史。一个古老的、活生生的文化向他敞开了心扉。从此以后，他将全心全意地投入到这个领域。"
 rapanui.1052.g: "这是科学生涯的开始？"
 rapanui.1053.t: "唯余瓦砾"
 rapanui.1053.d: "非常不幸的是，[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]的复活节岛冒险以失望告终。但这一切并不是白费功夫。"
 rapanui.1053.f: "当船帆扬起，大家驶回祖国时，[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]却只能紧紧握住曾是摩艾石像一部分的碎片。当然，他对这次探险的结束本有着更美好的想象。不过，尽管他连一件有价值的文物都没能带回去，他也在旅途中也学到了一些东西。"
 rapanui.1053.g: "星辰会闪烁也会熄灭。"
 rapanui.1054.t: "苦乐参半的复活节岛告别"
 rapanui.1054.d: "摩艾石像的轮廓在夕阳的余晖中闪闪发光。与此同时，[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]将曾经是摩艾石像的砾石放在一起。然后，他看着前方的大海。"
 rapanui.1054.f: "他是应该为失去的战利品悲伤，还是为至少还有战利品感到高兴？[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]的胜利蒙上了阴影。一些船员想让他振作起来。但他无法说服自己，很快他决定他将会从这个故事中吸取教训。下一次，这样的事情不会再发生在他身上，这可能不是他最后一次探险！"
 rapanui.1054.g: "有总好过没有。"
 rapanui.1055.t: "血腥的成功"
 rapanui.1055.d: "船员千辛万苦从复活节岛上弄到了这些摩艾石像，但——[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]却在如此惨境下丢了小命！"
 rapanui.1055.f: "“快上船！快上船！”当那些人想要携带着偷走的摩艾石像离开复活节岛时，这是他们唯一能想到的事情。土著终于发现了异乡人的所作所为，他们感到背叛。虽然船已经做好了起航的准备，并且已经装载号了摩艾石像，但在最后关头发生了一场不幸的事故。[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]是最后一个离开的人，为了确保没有人掉队，却被一枝矛刺穿了后背，倒在地上不省人事。船员只能不顾他而驶离。[ROOT.GetCountry.GetNameNoFlag]在那一天得到了两件无价的文物，却也失去了一个同样无价的人，他本该有着灿烂的前程。"
 rapanui.1055.g: "[ROOT.GetCountry.GetNameNoFlag]永远铭记这位英雄。"
 rapanui.1056.t: "复活节岛上的惨剧"
 rapanui.1056.d: "船员们费尽千辛万苦把摩艾石像安全带上了船，但代价是什么？"
 rapanui.1056.f: "“快上船！快上船！”当那些人想要携带着偷走的摩艾石像离开复活节岛时，这是他们唯一能想到的事情。土著终于发现了异乡人的所作所为，他们感到背叛。虽然船已经做好了起航的准备，并且已经装载号了摩艾石像，但在最后关头发生了一场不幸的事故。[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]是最后一个离开的人，为了确保没有人掉队，却被一枝矛刺穿了后背，倒在地上不省人事。船员只能不顾他而驶离。[ROOT.GetCountry.GetNameNoFlag]在那一天得到了两件无价的文物，却也失去了一个同样无价的人，他本该有着灿烂的前程。"
 rapanui.1056.g: "[ROOT.GetCountry.GetNameNoFlag]将永远铭记这位英雄。"
 rapanui.1057.t: "在最后一秒逃离"
 rapanui.1057.d: "在[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]的指挥下，他们成功地将珍贵的摩艾石像运上了船，当然他们也招致了当地人无穷的愤怒。"
 rapanui.1057.f: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]很快意识到他过度消耗了土著的耐心。在找到摩艾石像后，当地人的举动越发不友好。显然，他们觉得自己被背叛了，也许是因为水手们赠出的礼物过于劣质——一匹坏掉的摇马、几个锡罐和三张彩色的动物园卡片——这就证明了他们是骗子。[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]冷静下来，立即命令部下登船。就在大家离开后不久，人们就看到拉帕努伊人拿着武器聚集在海滩上……"
 rapanui.1057.g: "这个人有点东西。"
 rapanui.1058.t: "失踪"
 rapanui.1058.d: "在复活节岛上进行搜寻的探险队突然消失无踪了。"
 rapanui.1058.f: "是一个野心勃勃的冒险家的过度自信吗？留在船上的船员已经好几天没有收到其他水手和他们的领队[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]的消息了。半周后，有三个人鼓起勇气去寻找他们，却只碰见了几个愤怒的土著，他们不得已就此打住。船也离开了这个命运多舛的岛屿。那里发生的事情仍然是一个未解之谜。"
 rapanui.1058.g: "真可怕……"
 rapanui.1059.t: "蒙上了阴影的返程"
 rapanui.1059.d: "船员们对一位有前途的领导人的去世表示哀悼。回家的路上忧郁的心情笼罩着大家。"
 rapanui.1059.f: "我听见祖国在大洋彼岸的呼唤，\n穿过荒芜的水域，她呼唤着我。\n她的剑佩在身侧，头盔戴在头上，\n她的脚边躺着垂死者和死者。\n我听到战斗的喧嚣，她枪声的雷鸣，\n我的母亲，作为你众子中的一个，我赶紧去找你。\n——塞西尔·斯普林·赖斯"
 rapanui.1059.g: "悔之莫及。"
 rapanui_custom_death_shot_arrows: "[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName]曾多次乘坐小船靠近小岛，但每次都遭到箭雨的袭击。当地人似乎不想射中[ROOT.Var('rapanui_missionary_var').GetCharacter.GetHerHim]，而只想把他赶走。第三次尝试时，他们显然已经厌倦了[ROOT.Var('rapanui_missionary_var').GetCharacter.GetHerHis]的尝试。几支箭射中了[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFirstName]，[ROOT.Var('rapanui_missionary_var').GetCharacter.GetSheHe]倒下了，毫无生命迹象。"
 rapanui_custom_death_lunch: "一开始，一切似乎进展顺利。[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName]受到当地居民热烈欢迎。他们甚至为了向[ROOT.Var('rapanui_missionary_var').GetCharacter.GetHerHim]致敬而举行了盛大的宴会。但显然，[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFirstName]并没有将当地语言翻译得很好。[ROOT.Var('rapanui_missionary_var').GetCharacter.GetSheHe]并不是要参加宴会，不，[ROOT.Var('rapanui_missionary_var').GetCharacter.GetSheHe]就是宴会的主菜。"
 rapanui_custom_death_burnt: "不知何故，[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName]似乎激怒了当地居民。在他抵达海岸不久后，载送他抵达的船员在海滩上看到了一堆巨大的篝火。数日内没有收到[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFirstName]的消息的他们决定展开调查。在海滩上，他们发现了[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName]的遭到焚烧遗骸，仅有的身份标记是 [ROOT.Var('rapanui_missionary_var').GetCharacter.GetSheHe]始终随身携带的十字架。"
 rapanui_custom_death_shipwrecked: "悲剧！在[ROOT.Var('rapanui_missionary_var').GetCharacter.GetSheHe]到达[ROOT.Var('rapanui_missionary_var').GetCharacter.GetHerHis]目的地之前，[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName]所在的船只遭遇了一场风暴，沉没在海洋中。除了[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFirstName]之外，所有乘客都幸存了下来。这是否是上帝的预兆？"
 rapanui_custom_death_clubbed: "[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName]登陆后不久，当地居民就围了上来。起初，他们似乎对[ROOT.Var('rapanui_missionary_var').GetCharacter.GetHerHim]非常感兴趣，但很快就爆发了一场大混战。混乱中岛上的居民用巨大的棍棒殴打[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFirstName]，直到[ROOT.Var('rapanui_missionary_var').GetCharacter.GetSheHe]一动不动地躺在了地上。"
 rapanui_custom_death_beheaded: "[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName]登陆该岛的第二天，他的船员们发现了一个可怕的事实。在海滩上他们发现了[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFirstName]被斩下的头颅插在一根尖刺上。没有人知道当地人为什么对[ROOT.Var('rapanui_missionary_var').GetCharacter.GetHerHim]这样做。"
 rapanui_custom_death_join_natives: "已经好几周没有收到[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName]的任何消息了。因此一支小队前去调查[ROOT.Var('rapanui_missionary_var').GetCharacter.GetSheHe]曾经访问过的村庄，以了解发生了什么事情才使得[ROOT.Var('rapanui_missionary_var').GetCharacter.GetHerHim]失去了联系。结果证明，[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFirstName]一切都很好。只不过他已经决定加入这些野蛮人。怎么会这样呢？"
