 rapanui_northwest_expedition_location_lost_tt: "探险队迷路了。"
 rapanui_northwest: "西北航道的发现者"
 je_rapanui_northwest_expedition: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]考察"
 je_rapanui_northwest_expedition_reason: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]考察队正在北极地区探寻西北航道。政府预计该考察任务将持续多年。考察队将在夏天进行探索，在冬天休养生息。如果四年内未取得重大突破，则可认定考察队已迷路。\n考察任务的#V 成功点#!决定了考察的结局——取得进展、迷路的考察队归国或国家灾难。#V 成功点#!不低于#G 80#!意味着将能打通西北航道；不低于#YELLOW 60#!则说明考察队未能取得进展，但仍会带给国家一些新知识；如果#V 成功点#!低于#R 30#!，则意味着一起国家悲剧将要发生。\n\n当前考察任务的#V 成功点#!为#ORANGE [ROOT.Var('rapanui_northwest_success').GetValue]#!。"
 je_rapanui_northwest_expedition_fail: "如果四年内未取得关于西北航道的突破性进展，考察将失败。"
 je_rapanui_northwest_expedition_success: "如果#V 成功点#!至少达到#G 80#!，就有可能发现西北航道，前提是一年内保持在80以上。"
 je_rapanui_northwest_expedition_invalid: "如果另一个国家在我们之前发现西北航道，船员们将一无所获地返回。"
 rapanui.401.t: "西北航道：成功概率"
 rapanui.401.d: "准备工作已经开始。[SCOPE.sCharacter('rapanui_ship_scope').GetLastNameNoFormatting]已经准备就绪，学者和水手们正在计算我们目前的成功概率。"
 rapanui.401.f: "西北航道成功概率取决于几个因素\n• 在准备过程中所研究的海军技术的总和（真空装罐、巴氏灭菌法会增加成功率）。\n• 完成太平洋探险的海洋学研究或拥有一支先锋海军会带来额外的奖励。\n• 工程师和天文学家等科学家也会增加成功率。\n• 在旅途中，天气等随机事件会影响成功率。"
 rapanui.401.g: "为了[ROOT.GetCountry.GetNameNoFormatting]的荣耀——我们要打通西北航道！"
 rapanui.401.h: "三思之后，我们发现这项事业比我们当初想的要更危险。"
 rapanui.402.t: "异议！"
 rapanui.402.d: "[SCOPE.sCharacter('rapanui_ig_leader').GetFullName]所在的政党是当前政府的成员，该党强烈反对寻找西北航道，[SCOPE.sCharacter('rapanui_ig_leader').GetSheHe]认为这是自杀任务"
 rapanui.402.f: "昨天，[SCOPE.sCharacter('rapanui_ig_leader').GetLastName]政党的代表对这一行动表示抗议，他们说这是背着他们进行的。在他们看来，穿越北极的探险既昂贵又毫无意义且风险很大，并认为这笔钱可以更好地用在其他地方。"
 rapanui.402.g: "他们只能忍受。"
 rapanui.402.h: "在政治上让步他们。"
 rapanui.403.t: "西北航道探险队队长"
 rapanui.403.d: "北极探险是最危险的海上行动之一，需要一位优秀的船长来接受这一挑战，并带领这次冒险圆满结束。"
 rapanui.403.f: "只有经验丰富的船长才能领导这次任务，这些优秀的船长能为探险队带来更大的成功概率。#YELLOW 有经验的海军指挥官或海军指挥专家#!有助于提高成功率。而如果船长甚至#YELLOW 完成过环球航行#!，他就会被认为是最佳人选。但是如果探险以灾难告终，船长也有可能随船消逝……"
 rapanui.403.g: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader_1').GetFullName]"
 rapanui.403.h: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader_2').GetFullName]"
 rapanui.403.i: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader_3').GetFullName]"
 rapanui.404.t: "船上牧师"
 rapanui.404.d: "即将开始的未知海上航行意味着一段漫长期。[SCOPE.sCharacter('rapanui_ig_leader').GetFullName]提出利用[SCOPE.sCharacter('rapanui_ig_leader').GetHerHis]的人脉，任命船上的牧师来提高船上的士气。"
 rapanui.404.f: "“这纯粹是照顾海上迷失灵魂的牧师职责，额？因纽特人？你怎么会认为我们想改变因纽特人的信仰？你这是在羞辱我！当然，我们会事先礼貌地询问他们。”"
 rapanui.404.g: "在如此危险且紧张的旅途中，水手们需要牧师。"
 rapanui.404.h: "理论和经验将能让我们在这汪洋中幸存，上帝不能。"
 rapanui.405.t: "工程师改进考察船"
 rapanui.405.d: "[SCOPE.sCharacter('rapanui_engineer_scope').GetFullName]利用[SCOPE.sCharacter('rapanui_engineer_scope').GetHerHis]的科学知识升级了我们考察北冰洋的舰队。"
 rapanui.405.f: "在富兰克林探险队穿越西北航道之前，皇家海军“埃里伯斯”号和“恐怖”号进行了现代化改造，包括在船头和船体侧面增加钢筋，以防止船只被冰群的压力压垮。为了使“埃里伯斯”号和“恐怖”号在风平浪静或风向不利的情况下也能在流冰中保持机动性，每艘船上都安装了一台重约15吨的蒸汽机，驱动一个两米高的螺旋桨。它们是英国皇家海军第一批装备蒸汽机和螺旋桨的舰船。"
 rapanui.405.g: "科技会打破僵局！"
 rapanui.406.t: "天文学家的气象学研究"
 rapanui.406.d: "[SCOPE.sCharacter('rapanui_astronomer_scope').GetFullName]利用[SCOPE.sCharacter('rapanui_astronomer_scope').GetHerHis]的气象学知识为我们的舰队提供天气预报并预测启航时间。"
 rapanui.406.f: "“我在气象站，经过几周的实验、细致的观察和彻夜研究，认识到低温对这次旅行的成功没有什么好处。”"
 rapanui.406.g: "科学助胜！"
 rapanui.407.t: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]考察开始"
 rapanui.407.d: "寻找西北航道探险队的船只已经准备就绪。[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]探险队的名字是以他们的领队[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName]命名的，这个名字已经深入人心。"
 rapanui.407.f: "19世纪上半叶，许多探险队分别探索了西北航道的某些部分，1845年，约翰·富兰克林爵士率领一支装备豪华的探险队驶往加拿大北极地区，为西北航道最后一片未知区域绘制地图。探险队信心十足，因为他们估计未开发的北极大陆海岸仅剩不到500公里。"
 rapanui.407.g: "祝好运！"
 rapanui.410.t: "阿蒙森穿越西北航道"
 rapanui.410.d: "挪威冒险家罗阿尔德·阿蒙森是第一个乘船穿越西北航道的人。这次航行历时三年，真是我国的一个伟大日子！"
 rapanui.410.f: "1903年至1906年间，阿蒙森率领船只和六名船员，成功地从大西洋航行到太平洋。旅途中，阿蒙森的探险队发现了迷失的约翰·富兰克林探险队骸骨和装备。"
 rapanui.410.g: "荣耀归于挪威！"
 rapanui.411.t: "打通西北航道！"
 rapanui.411.d: "#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]探险队#!在加拿大和北极之间的北冰洋上取得进展，从而证明这条海上航线并不是不可逾越的障碍。现在[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName]探险队所有人被誉为英雄！"
 rapanui.411.f: "穿越西北航道并没有开辟出一条全新且有利可图的贸易路线，这与人们的希望背道而驰。尽管如此，这一发现仍是一个里程碑。绘制了以前未知区域的地图，前往北极或南极不再是不可能的事。航海、制图、气象、地磁和生物知识都得到了扩展。对于一些勇敢的冒险家来说，该地区不再是未知之地。"
 rapanui.411.g: "为了[ROOT.GetCountry.GetNameNoFormatting]的荣耀！"
 rapanui.412.t: "失踪的[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]探险队"
 rapanui.412.d: "我们已经有大约四年没有听到有关#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]探险队#!的任何消息了。因此海军宣布探险队正式失踪。目前的普遍看法是，船员和船只被困在冰层中。"
 rapanui.412.f: "探险队失利并不一定意味着这是最坏的情况。然而可以肯定的是发现并穿越西北航道探险计划肯定已经失败。如果探险队的#V 成功点#!不是太低，那么就有希望，不至于一无所获。"
 rapanui.412.g: "这可不妙……"
 rapanui.413.t: "失踪的探险队归来！"
 rapanui.413.d: "让所有[ROOT.GetCountry.GetNameNoFormatting]感到惊喜的是，#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]考察队#!再次出现了。虽然船员死了几个，船况也很差，但他们带回了宝贵的科学知识。"
 rapanui.413.f: "麦克卢尔北极探险队是为寻找失踪的富兰克林探险队而进行的众多尝试之一，其重要意义在于它是第一个成功发现并穿越西北航道的探险队，探险队通过乘船和雪橇两种方式完成了这一任务，然而能否将其视为一次真正的穿越有待商榷，因为只有罗阿尔德·阿蒙森在1903至1905年间首次真正穿越了西北航道。"
 rapanui.413.g: "这真让人松一口气。"
 rapanui.414.t: "探险队员返回"
 rapanui.414.d: "几天前，#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]考察队#!所剩无几的残余人员越过边境，进入加拿大。憔悴的队员们解释说，他们不得不在冰原上弃船而逃。士兵们把所需的东西保存在几只小雪橇上。船长[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName]病得很重，但现在已经安全返回家园。其他船员在寒冷、饥饿、疾病和疲惫中未能幸免。"
 rapanui.414.f: "1852年，爱德华·贝尔彻受命指挥北极探险队寻找富兰克林。不过这次探险并不成功，贝尔彻不受下属欢迎，这点很致命，而且他也不太适合在冰层中指挥船只。五艘船中的四艘（坚决号、先锋号、援助号和无畏号）被遗弃在冰海中，贝尔彻因此被送上军事法庭，但被无罪释放。其中一艘坚决号最终被一艘美国捕鲸船完好无损地打捞上岸并送回英国。"
 rapanui.414.g: "至少所有人都活着。"
 rapanui.415.t: "没有[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]考察队的踪迹"
 rapanui.415.d: "经过数周的等待，一个可怕的猜测慢慢浮现，那就是寻找西北航道的探险队将一去不返。我们大概不得不承认这是[ROOT.GetCountry.GetAdjectiveNoFormatting]航海史上最大的悲剧之一。"
 rapanui.415.f: "富兰克林探险队是英国极地探险家约翰·富兰克林爵士的第三次也是最后一次大型科考旅行。他们的目标是首次从东向西完全穿越西北航道，绘制西北航道地图，从而找到一条从欧洲到亚洲的更短海路，不过探险队以失败告终，1845年至1848年，所有参与探险的人都死在了加拿大北极群岛。探险队成员最后的踪迹多年后才在威廉王岛附近被发现。富兰克林探险队的悲惨命运长期被掩盖，随后在19世纪中期引起了广泛关注。报纸对富兰克林命运的报道和猜测获得了很高的发行量，并按照现代大众传媒的所有规则利用了这一话题。探险本身，以及简·富兰克林夫人为拯救丈夫而派出新的探险队所做的巨大努力，多年来一直让英国公众感兴趣。"
 rapanui.415.g: "我们不得不接受所有人都牺牲了……"
 rapanui.415.h: "派出救援队"
 rapanui.415.tt: "找到活着的探险队员的几率很小。在大多数情况下，我们会一无所获，或者至少找到一些遗骸。甚至这支探险队也有非常小概率失踪。"
 rapanui.416.t: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]探险队的痕迹"
 rapanui.416.d: "[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName]在加拿大北部找到了失踪探险队的残骸，而且探险队的所有成员都已死亡。但是，[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetSheHe]还是获得了一些发现——[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetHerHis]任务为[ROOT.GetCountry.GetNameNoFormatting]带回了新知识。"
 rapanui.416.f: "几周后，救援队成员发现了失踪船员的一些隐藏信息。由[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName]带领的船只从一些因纽特人那里买到了一些物品，从而发现这些物品就来自其中一艘失事的船上，最终确定了#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]探险队#!是在哪里失踪的了。现在，船员和船长的死亡已成定局。但是救援行动绘制了以前未知区域的地图，获得了新的研究成果，还找回了丢失的测量数据。[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetLastName]船长获得了丰富的经验。"
 rapanui.416.g: "至少，我们能够为此事提供一些线索。"
 rapanui.417.t: "失踪探险队之谜"
 rapanui.417.d: "即使经过数周的搜寻，[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName]也未能找到任何蛛丝马迹，而且恶劣的天气不得不中止任务避免重蹈覆辙，#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]探险队#!命运已经被宣告了……"
 rapanui.417.f: "失联探险队的成员很可能已经死亡，他们的船只也已沉没，但可能留下了印记。新闻媒体上流传着各种说法，有吃人或恶魔的故事，有绅士变成野兽并陷入疯狂的故事。#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]探险队#!的命运可能永远不会得到答案，并将为许多恐怖故事提供素材。"
 rapanui.417.g: "大概是罐头焊接得不好吧？"
 rapanui.418.t: "北极奇迹"
 rapanui.418.d: "谁也没想到会这样，一封电报传到了首都……[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastName]船长还活着，尽管病恹恹且非常憔悴。但他还活着！稍后，[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName]带着剩下的船员到达了母港。营救任务圆满成功。"
 rapanui.418.f: "#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]探险队的所有船只#!都被困在了冰层中。几个月前就有人被遗弃了，在那里的病弱者必死无疑。还有一些人在用船上的木头做成的简易雪橇逃离时死去。饥饿和寒冷夺走了更多人的生命，但庆幸的是他们回家，[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName]就像奇迹一样在海湾发现了他们，并把他们带上了船。这次成功探险的发现也被保存了下来。虽然[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName]失去了他的舰队，但他和[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetLastName]一起在国内受到了庆祝，就像他成功穿越了航道一样。"
 rapanui.418.g: "这些人都是英雄！"
 rapanui.419.t: "救援任务失败！"
 rapanui.419.d: "最糟糕的事情发生了！#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]探险队#!失联之后，[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName]带领的救援队也失踪了。恐怕他们的命运都是一样的。"
 rapanui.419.f: "1854年4月，爱斯基摩人在佩利湾报告说他们看到一些人在冰面上拖着一条木船；几周后，在美洲大陆海岸发现了30具白人的尸体，随后爱斯基摩人还发现了火药、枪弹、手表、指南针、望远镜和枪支，因为这些物品中至少有一部分以及银汤匙、银叉等被发现并被雷伊买走了 "
 rapanui.419.g: "这片冰海受到了诅咒！"
 rapanui.420.t: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]探险队归来"
 rapanui.420.d: "在另一个国家找到西北航道突破口之后，我们的探险队也回来了。虽然没有取得成功，但也有收获，不过这是同类探险的最后一次。"
 rapanui.420.f: ""
 rapanui.420.g: "欢迎回家！"
 rapanui.421.t: "温和的天气"
 rapanui.421.d: "不寻常的解冻使得一些原本的冰层解冻。因此#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]探险队#!的进展比计划的要好。"
 rapanui.421.f: "变幻莫测的天气已经夺去了许多北极探险者的生命，我国天文学家可以在探险前预测一个更有利的时间，增加出现好天气事件的概率。"
 rapanui.421.g: "太好了。"
 rapanui.422.t: "恶劣天气"
 rapanui.422.d: "今年北极地区的冬季似乎持续时间更长，结冰期从9月份就开始了。这大大降低#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]探险队#!的成功概率。"
 rapanui.422.g: "真衰啊。"
 rapanui.423.t: "因纽特向导"
 rapanui.423.d: "在穿越加拿大北部的旅途中，[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName]成功招募了一名因纽特人参加探险。他不仅提供了地理知识，还掌握了一两种在恶劣气候下生存的技巧。"
 rapanui.423.f: "在19世纪上半叶的北极探险中，欧洲人已经利用过因纽特人的知识，其中一些探险队员甚至会说因纽特语。例如，失踪的富兰克林探险队参与者的命运在采访了一些因纽特人目击者后得以重现。然而，对当地人的尊重还有待提高。罗阿尔·阿蒙森正是在相当程度上依靠依赖极地居民的生存技巧，才成功完成了自己的西北航程和南极之旅。"
 rapanui.423.g: "好极了！"
 rapanui.424.t: "野味"
 rapanui.424.d: "一些船员要求上岸几天，猎杀海豹、驯鹿或鸟类。"
 rapanui.424.f: "加拿大北部贫瘠的苔原，使得大型野生动物几乎无法生存。不过也有例外，富兰克林探险失败的原因之一是严重依赖自己的补给，没有通过当地补给食物。后来的探险队则充分利用狩猎当地动物的机会，从而补充食物。然而，并非每次狩猎都能取得成功。"
 rapanui.424.g: "他们应该利用这段时间去打猎。"
 rapanui.424.h: "这就是在浪费时间！"
 rapanui.425.t: "中毒"
 rapanui.425.d: "#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]考察队#!的几名队员出现中毒症状。目前尚不清楚是食物腐烂还是其他原因，现在队员们就如何处理剩余的食物发生了争执，毕竟目前几乎没有任何替代品。"
 rapanui.425.f: "时至今日，人们仍在讨论富兰克林探险队失败的真正原因。人们经常使用的说法是，罐子没有焊接好，导致铅中毒，还有人推测是汞中毒，当然也有可能是食物中毒，因为食物中毒并不是一种独特的现象。"
 rapanui.425.g: "食物有那么糟糕吗？"
 rapanui.425.h: "把食物扔到海里，到陆地上找吃的。"
 rapanui.426.t: "结核病疫情"
 rapanui.426.d: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName]在北冰洋上已然是进退两难——某艘考察队的船上爆发了结核病，这样一个狭小的空间，得病的人只会越来越多。"
 rapanui.426.f: "“所以，无论何事，你们愿意人怎样待你们，你们也要怎样待人，因为这就是律法和先知的道理。”\n——马太福音 7:12"
 rapanui.426.g: "尽你全力来照顾他们。"
 rapanui.426.h: "把那些病人扔到海里！"
 rapanui.427.t: "浮冰"
 rapanui.427.d: "船身寸步难行，温度也越来越低，被困于浮冰中的#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]考察队#!已是回天乏术。"
 rapanui.427.f: "“强者不是能做大事的人，而是能以坚定的决心面对困难、失败和挫折的人。”\n——欧内斯特·沙克尔顿"
 rapanui.427.g: "这是最糟糕的转折。"
 rapanui.427.h: "幸运的是，我国的工程师已经预料到了这种情况。"
 rapanui.428.t: "地磁数据"
 rapanui.428.d: "#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]探险队#!的物理学小组在极地冰盖附近获得了新的科学知识。"
 rapanui.428.f: "“人类的历史是从黑暗走向光明的持续斗争。因此，讨论如何使用知识是没有意义的；人想要求知，当人失去求知欲时，便不再是人类了。”——弗里乔夫·南森"
 rapanui.428.g: "好！"
 rapanui.429.t: "极地动植物"
 rapanui.429.d: "尽管环境恶劣，#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]探险队#!的研究人员还是收集到了动植物样本，增进了对这一偏远地区的了解。"
 rapanui.429.f: "“许多人认为，在极地地区长期逗留会使人比其他普通人更不容易受寒，这种想法是完全错误的。”——罗阿尔·阿蒙森"
 rapanui.430.t: "未知之地"
 rapanui.430.d: "#YELLOW [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]探险队#!在加拿大北部发现了以前未知的岛屿和海湾，从而获得了海洋学和制图学知识。"
 rapanui.430.f: "在詹姆斯·库克的航行之后，人们相信地球上已经不存在未被发现的事物。周边国家可能会为此争执到头破血流，但[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName]已经绘制出了此前不为人所知的新陆地，从而证明最终的边界远未抵达。"
 rapanui.431.d: "挪威冒险家罗阿尔·阿蒙森是第一个乘船穿越西北航道的人。这次航行持续了三年。"
 rapanui.431.g: "恭喜……"
 rapanui.432.d: "来自[SCOPE.sCountry('rapanui_northwest_country_scope').GetName]的一支探险队今天完成了不可能的任务：穿越西北航道。"
 rapanui.433.t: "失踪的[SCOPE.sCountry('rapanui_franklin_country').GetAdjectiveNoFormatting]探险队"
 rapanui.433.d: "航海史上最严重的灾难之一发生在[SCOPE.sCountry('rapanui_franklin_country').GetName]：一支拥有最先进设备的探险队在北极失踪。探险队本应找到并穿越西北航道，但四年来一直没有进行任何联系。国家沉浸在悲痛之中，有人猜测所有队员可能都已丧命。"
 rapanui.433.g: "发电报表达我们诚挚的哀悼。"
 rapanui.433.h: "凡是寻求危险的人，都应在危险中灭亡。"
 rapanui.434.t: "[SCOPE.sCountry('rapanui_franklin_country').GetAdjectiveNoFormatting]探险队的踪迹"
 rapanui.434.d: "[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName]在加拿大北部的一次艰苦旅程中找到了失踪探险队的残骸。有证据表明所有队员均已死亡。但[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetSheHe]还是取得了一些发现——[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetHerHis]的任务还为[ROOT.GetCountry.GetNameNoFormatting]带回了知识。"
 rapanui.434.f: "几周后，救援队成员发现了失踪船员的一些隐藏起来的状态与位置报告。由[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName]指挥的船只终于能够确定[SCOPE.sCountry('rapanui_franklin_country').GetAdjectiveNoFormatting]远征队在哪个特定的地区失联。事实上，他们从一些因纽特人那里购买到了来自其中一艘失联船只的物品。现在，队长和他的队员们的死亡已经确定无疑。但救援行动绘制了以前未知区域的地图，获得了新的研究成果，还找回了丢失的测量数据。队长[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetLastName]获得了丰富的经验。"
 rapanui.435.t: "失踪探险队之谜"
 rapanui.435.d: "即使经过数周的搜寻，[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName]也未能找到任何可以指向[SCOPE.sCountry('rapanui_franklin_country').GetAdjectiveNoFormatting]探险队命运的蛛丝马迹。恶劣的天气使这次任务不得不中止，以避免遭受类似的命运。"
 rapanui.435.f: "失踪探险队的成员很可能已经死亡，他们的船只也已沉没。然而未知在此留下了印记。媒体上流传着各种说法：人相食、恶魔，或是善良的绅士变成野兽，陷入了疯狂。这支探险队的命运可能永远无法确定，它将为许多恐怖故事提供素材。"
 rapanui.436.t: "又发现一艘船！"
 rapanui.436.d: "失踪探险队的一艘船幽灵般出现在北美海岸，引起了轰动。[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName]已经掌控了船只。这艘船几乎完好无损，但距离疑似失踪地点约有1200英里。它属于漂浮物还是他人财产的问题引起了一场争论。"
 rapanui.436.f: "皇家海军坚决号是19世纪中期英国皇家海军的一艘三桅帆船，配备了北极探险专用设施。在寻找失踪的富兰克林探险队的过程中，坚决号被困在冰层中，于1854年被遗弃。英国政府在《伦敦公报》上宣称，这艘船仍然是女王陛下的财产，但并未尝试进行打捞。1855年9月16日，美国捕鲸船乔治·亨利号在巴芬湾发现了这艘幽灵船，距离其最后停泊地近2000公里。随后，坚决号再次被巴芬岛附近戴维斯海峡的冰群困住，但它仍然可以航行，因此捕鲸船拖带其进入了康涅狄格州的新伦敦港。最终，美国国会以4万美元的价格购买了这艘船，并对其进行改造，于1856年12月17日正式赠送给英国维多利亚女王，以示两国和平。"
 rapanui.436.g: "物归原主。"
 rapanui.436.h: "船上的科学知识可能对我们有用……"
 rapanui_add_x_oceanographic_understanding_minus_x_tt: "减少@rapanui_oceanographic_knowledge![SCOPE.GetValue('understanding_amount')|0+]点海洋学知识。"
 rapanui_add_x_oceanographic_understanding_0_tt: "不会增加或减少@rapanui_oceanographic_knowledge!海洋学知识"
 rapanui_add_x_oceanographic_understanding_x_tt: "增加@rapanui_oceanographic_knowledge![SCOPE.GetValue('understanding_amount')|0+]点海洋学知识。"
 rapanui.501.t: "新大西洋电报公司"
 rapanui.501.d: "在[SCOPE.sCharacter('rapanui_telegraph_boss_scope').GetFullName]主持下，一家有影响力的股份公司成立了。这位电报大亨计划为冒险铺设穿越大西洋的电报电缆筹集资金。[SCOPE.sCharacter('rapanui_telegraph_boss_scope').GetLastNameNoFormatting]大西洋电报公司将尝试完成不可能完成的任务。"
 rapanui.501.f: "[SCOPE.sCharacter('rapanui_telegraph_boss_scope').GetLastName]第一次提出他的想法时遭到了嘲笑——简直是拿钱打打水漂。但与此同时，我们也找到了认为这个项目切实可行的其他赞助商。"
 rapanui.501.g: "让我们把大陆连接起来吧！"
 rapanui.502.t: "科学支持"
 rapanui.502.d: "在铺设电缆的船只出发前可以增加一名科学家以支持该项目。"
 rapanui.502.f: "在海上发生事故时，[concept_tesla_engineer]可以提供帮助，保护跨洋电缆项目不受损害。他还能增加电缆铺设后真正发挥作用的机会。另一方面，[concept_dubois_naturalist]则可以利用他在大西洋的停留时间来观察大自然。"
 rapanui.502.g: "我们的工程师[SCOPE.sCharacter('gaudi_engineer_scope').GetFullName]。"
 rapanui.502.h: "我们的博物学家[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName]。"
 rapanui.511.t: "鲸鱼和海豚"
 rapanui.511.d: "鲸鱼和海豚穿过航线时，大自然呈现出独特的景象。[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName]希望通过观察获得新的生物知识，但船员们对这种学术好奇兴趣不大。"
 rapanui.511.f: "当教授再次指出屠杀这些迷人的海洋生物所采用的狩猎方法何其卑劣时，船上发生了争执。对于大多数水手来说，鲸鱼不过是一种储油设施，因此这次讲座让他们感到不安。"
 rapanui.511.g: "得好好研究下这些奇妙生物。"
 rapanui.511.h: "我们没闲工夫做这些。"
 rapanui.512.t: "好多好多鱼啊！"
 rapanui.512.d: "[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName]在北大西洋注意到一群此前未被发现的鱼类，这令[SCOPE.sCharacter('rapanui_cable_guy_scope').GetSheHe]大为震惊。教授请求船长停止工作以捕捉一些标本，但[SCOPE.sCharacter('target_character').GetFullName]指出，他们所在的是一艘电缆铺设船，而非研究设施。"
 rapanui.512.f: "“请相信我！我们错过了科学研究！这些娇嫩的小鱼是完全未被发现的物种。你没看到吗——你说我现在就能和它们一起在水里游泳是什么意思？”"
 rapanui.512.g: "摸些鱼吧。"
 rapanui.513.t: "大西洋上的实验"
 rapanui.513.d: "[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName]利用海上的时间在电缆船上安装了些实验仪器，想籍此进行科学研究，但还没想好做什么。"
 rapanui.513.f: "“海洋中有一条河流。在最严重的干旱中，它从不枯竭；在最凶猛的洪水中，它从不泛滥。冷水构成了它的河床与干岸，以供暖流流动。墨西哥湾是它的源头，北冰洋是它的入海口。它就是墨西哥湾流。”——马修·方丹·莫里"
 rapanui.513.g: "开展磁学实验"
 rapanui.513.h: "开展海洋学实验."
 rapanui.521.t: "深渊中的秘密"
 rapanui.521.d: "在查看勘测数据时，[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName]有了一个奇怪的发现。在大西洋的某一区域，海底上升到了异常高的水平面。到目前为止，[SCOPE.sCharacter('rapanui_cable_guy_scope').GetSheHe]对这一现象只有一种理论。"
 rapanui.521.f: "事实上，人们一直认为海洋的中部应该更深。但今天的发现颠覆了这一想法。地面和海面之间的距离不但没有增加，反而缩短了。这对公司来说是个好消息，因为所需的电缆长度比最初设想的要少。但对于[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName]来说，这显然意味着必须纠正以前对深海的所有看法。显然，海底有山丘和峡谷。而这座山不仅仅是一座小小的丘陵。"
 rapanui.521.g: "深海中是否也会有山脉？"
 rapanui_cable_guy.option: "[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName]将解决这个问题。"
 rapanui_transatlantic_cable_start_button: "开始大西洋海底电缆铺设工程"
 rapanui_transatlantic_cable_start_button_desc: "在为该项目争取到了足够的投资者后，海底电缆的铺设工程终于要开始了。"
 rapanui_transatlantic_cable_start_tt: "[GetPlayer.GetName]的#V 进度#!已达到#G 8#!。"
 subject_type_rapanui_protectorate: "#O 大洋洲保护国#!"
 alert_rapanui_pacific_expedition_possible_alert_hint: "我国可以派遣一支[concept_dubois_pacific_expedition]。可以通过#V 赤色晨曦界面#!中的学术概览界面将他们派遣出去。"
 rapanui.248.t: "矿物"
 rapanui.248.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]号的船员在旅途中发现了一些富含原矿的岩层。他们目前正在更细致的研查这些岩土。"
 rapanui.248.f: "丹麦太平洋探险队的“加拉泰亚”号上有一位地质学家辛辛里奇·若阿内斯·林克，他参与了当时丹麦殖民地尼科巴群岛的地理研究。五个月后，他患上了尼科巴热病，不得不返回丹麦并且余生都因病而十分虚弱，不过他在回程时没有在太平洋或印度洋，而是在开罗和马耳他收集了大部分地质资料。"
 rapanui.248.g: "尽可能多的收集矿物。"
 rapanui.248.h: "在这个地质区域进行更深入的研究。"
 rapanui.249.t: "奇怪的瘤块"
 rapanui.249.d: "最后一回，船员们撒网收集海底事物时捞出了一块奇特的金属块，它看起来是复数材料的集合体。[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]船上的众人不知该如何处理该发现。"
 rapanui.249.f: "“在太平洋海底……我们找到了红色黏土，在北太平洋的深海中尤其多。这种红色黏土中遍布着由近乎纯净的过氧化锰组成的结核，其大小从西米或金丝雀虉草的种子到小孩头颅或橘子不等。这些结核数量巨大。拖网……拖上来的是大量的凝块，很像被称为‘叠’的矿物块，几乎所有的凝块内部都有一个核，内核里有鱼的牙齿，或一点点海绵，或某种化石，它们形成了锰积聚的核。”——查尔斯·怀韦尔·汤姆生"
 rapanui.249.g: "粉碎并利用它。"
 rapanui.249.h: "[SCOPE.sCharacter('rapanui_scientist').GetLastName]博士将其小心地拆开。"
 rapanui.249.i: "这个奇怪的节点应该在科研机构进行研究和展出。"
 rapanui.249.j: "[SCOPE.sCharacter('rapanui_scientist').GetLastName]博士应该将其留作纪念品并研究它。"
 rapanui.269.t: "宝石"
 rapanui.269.d: "在澳大利亚整休期间，[SCOPE.sCharacter('rapanui_scientist').GetFullName]副研究员探索了不少以前未有机会探索的地区。[SCOPE.sCharacter('rapanui_scientist').GetSheHe]除了发现不少蛋白石和水晶外，还发现了不少的稀有矿物。"
 rapanui.269.f: "迄今为止，澳大利亚仍是矿车上的国家，它的稀土、矿物、各类金属依然从此流向世界。所以[SCOPE.sCharacter('rapanui_scientist').GetLastName]能在此处发现仍未有归入收藏的稀有矿物并不是个巧合。"
 rapanui.269.g: "我的宝贝！"
 rapanui.270.t: "火环带"
 rapanui.270.d: "[SCOPE.sCharacter('rapanui_scientist').GetFullName]参与[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]及在太平洋上航行的时间越长，[SCOPE.sCharacter('rapanui_scientist').GetSheHe]就越能意识到这一地区的火山活动有多么频繁。它们在海边形成了一个环，学者得以靠近这些喷烟的岩石怪兽，并做了重要记录。"
 rapanui.270.f: "火环带是一条环绕太平洋三面的火山带。约三分之二的全新世火山喷发和约90%的世界地震都与该现象有关。环太平洋火山带包括大约850至1000座火山，这些火山在过去11700年中一直处于活跃状态。"
 rapanui.270.g: "太平洋难道是一个带有侧面通风口的火山口吗？"
 rapanui.203.l: "这对[concept_agassiz_geologist][SCOPE.sCharacter('dubois_geologist_scope').GetFullName]来说是个独特的机会。"
 rapanui.280.t: "一只奇怪的狼"
 rapanui.280.d: "一名猎人接近了#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]考察队#!，其带来了一只奇怪的狼，并提出将狼卖给我们。"
 rapanui.280.f: "“那些野兽正在杀害我们的牲畜！我一开始想杀了它，但后来我看到了你的船，觉得你们可能会感兴趣。”"
 rapanui.280.g: "我们的动物园需要这样一种珍稀动物！"
 rapanui.280.h: "我们更愿意在它的自然栖息地观察它。"
 rapanui.280.i: "不，谢了。"
 rapanui.502.i: "其他地方也需要我们的学者。"
