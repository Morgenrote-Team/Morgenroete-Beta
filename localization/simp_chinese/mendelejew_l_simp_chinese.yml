 mendelejew.11.t: "爆炸发展的产业"
 mendelejew.11.d: "[SCOPE.sCharacter('mendelejew_chemist_scope').GetFullName]在[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetHerHis]的使用硝酸甘油改进炸药并取得了巨大的成功。[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetHerHis]已就该发明申请了专利，并在[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetHerHis]自己的工厂中进行试验性生产。"
 mendelejew.11.f: "1850年在巴黎学习时，阿尔弗雷德·诺贝尔遇到了三年前发现硝酸甘油的阿斯卡尼奥·索布雷洛，索布雷洛认为硝酸甘油的实用性因其受热或加压时的不稳定性而大打折扣。但诺贝尔对硝酸甘油很感兴趣，并自1862年始，就致力于将其应用到炸药中。在诺贝尔研究硝酸甘油炸药的过程中曾发生了很多事故，1864年实验室中的大爆炸夺去了包括他弟弟艾弥尔在内五人的性命。在1866年，诺贝尔终于在硝酸甘油实用化上取得重大的突破，并将其命名为''dynamite''（古希腊语δύναμις/dý.na.mai̯/“力量”和英语diatomite“硅藻土”的结合），同时在他盖斯特哈赫特附近的克吕默尔炸药厂进行生产。"
 mendelejew.11.g: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetSheHe]也是个实业家吗？"
 mendelejew.12.t: "[SCOPE.sCharacter('mendelejew_chemist_scope').GetFullName]发现夫琅和费线的成因"
 mendelejew.12.d: "长期以来，人们对太阳光谱中黑色细线的成因有着诸多猜测。[SCOPE.sCharacter('mendelejew_chemist_scope').GetFullName]博士现在终于找到了原因：特定的化学元素导致了这些线条的出现。这为我们提供了一种找出恒星上存在的元素的方法。"
 mendelejew.12.f: "约瑟夫·夫琅和费于1813年注意到太阳光谱中存在明显的线条。数十年后，古斯塔夫·罗伯特·基尔霍夫和罗伯特·本生发现了这些线条的成因。通过燃烧各种元素和化合物时，他们发现这些元素会吸收光谱的特定部分。因此，他们认为吸收特定部分光谱是恒星外部元素或化合物存在的证据。\n\n光谱学不仅可以根据恒星的类型对其进行分类，还可以对材料与化学品进行光谱分析。氦元素的发现也要归功于对太阳进行的光谱分析。"
 mendelejew.12.g: "又一个宇宙之谜被解开了！"
 building_mendelejew_hydrogenation_plants: "合成油厂"
