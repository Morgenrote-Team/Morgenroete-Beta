 mendelejew.990.t: "[SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName]逝世"
 mendelejew.990.d: "今日，举国上下都在为去世的[SCOPE.sCharacter('mendelejew_chemist_scope').GetFullName]哀悼。此人是最伟大的思想家之一，也是化学领域的卓越巨擘，在学术的殿堂中留下了无法填补的空白。"
 mendelejew.990.f: "一种观念的根深蒂固常常让我们全然相信它的真实性，它掩盖了其中的脆弱与漏洞，使我们无法正视与之对立的证据。\n——永斯·贝采利乌斯"
