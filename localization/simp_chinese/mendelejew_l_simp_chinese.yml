 mendelejew_synthetic_fuel_tech: "合成燃料"
 mendelejew_synthetic_fuel_tech_desc: "贝吉乌斯法是一种通过煤炭直接加氢实现大规模煤炭液化的工艺。煤的大分子在高压和高温下被氢气分解成小分子。生成的气态和液态碳氢化合物可用作燃料和润滑剂。1910至1925年间，德国化学家弗里德里希·贝吉乌斯开发了这一工艺的基本原理。从1925年起，巴斯夫在马蒂亚斯·皮埃尔的项目管理下进行了商用工艺和催化剂的开发。"
 mendelejew.501.t: "为人权服务"
 mendelejew.501.d: "[SCOPE.sCharacter('mendelejew_chemist_scope').GetFullName] has initiated a revolution in the country's fertilizer factories. New chemical processes and methods have significantly improved production and efficiency. There is already talk that Dr. [SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName] has made a significant contribution to combating world hunger.\n\nTotal improved buildings: [GetPlayer.MakeScope.Var('mr_num_improved_chemical_plants_buildings_var').GetValue|V0]"
 mendelejew.501.f: "农民会用我们的超级新肥料一鸣惊人！这真是人类迈出的一大步，也是教授取得的一项了不起的成就！他是个非常聪明的人。我赚了一大笔钱，这只是副作用，你可以不写。不过，你可以随意提及我在上次高尔夫锦标赛上取得的胜利。"
 mendelejew.501.g: "给每个人都来点硝酸盐！"
 mendelejew.502.t: "为矿业服务"
 mendelejew.502.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] has initiated a new phase of mining in our country by patenting new processes in the production of explosives. With the new formula that Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] has developed, production has become more efficient and fewer materials are required.\n\nTotal improved buildings: [GetPlayer.MakeScope.Var('mr_num_improved_explosives_factory_buildings_var').GetValue|V0]"
 mendelejew.502.f: "当然，这些炸药不会让矿工们更安全。但如果他们已经取得了成功，那么他们现在就更加成功了。我对由 [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士发明的新炸药的威力充满信心，并发现矿工们现在需要完成的劳动更少了。可以说，矿工们应该付钱给我，因为除了清扫一些碎石之外，他们已经无事可做。"
 mendelejew.502.g: "给每个人都来点硝化甘油！"
 mendelejew.503.t: "为主权服务"
 mendelejew.503.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] has initiated a significant change in the production of synthetic products. With the refinement of some formulas and improved processes, even more products can now be produced with less effort. [GetPlayer.GetName] has become more independent than ever from abroad and Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] is already considered a national hero.\n\nTotal improved buildings: [GetPlayer.MakeScope.Var('mr_num_improved_synthetics_factory_buildings_var').GetValue|V0]"
 mendelejew.503.f: "归根结底，购买我们的新型合成产品是一种爱国责任。它们是由[ROOT.GetCountry.GetAdjectiveNoFlag]科学家[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士发明的，由[ROOT.GetCountry.GetAdjectiveNoFlag]工人在[ROOT.GetCountry.GetAdjectiveNoFlag]工厂利用[ROOT.GetCountry.GetAdjectiveNoFlag]资源——或多或少——制造出来的。您想必是一位爱国的好公民吧？那么更高的价格对您来说也是有价值的，毕竟这与祖国有关。"
 mendelejew.503.g: "给每个人都来点合成产品！"
 mendelejew.601.t: "化学家大会"
 mendelejew.601.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]国际化学家大会的筹备工作已经接近尾声，[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]特意确保了本次活动将吸引最为重要的专家参会，现在只需发出邀请了。"
 mendelejew.601.f: "作为一门科学的化学是在19世纪中叶建立起来的，但当时它在理论方面仍有很大的欠缺。不同的“学派”代表着不同的观点，尤其是对于原子和分子结构问题。人们普遍根据约翰·道尔顿的观点认为原子和分子是化合物的最小构件，但对它们的结构几乎一无所知；对于其他基本理论问题如原子量的基数大小等也有不同的看法；命名法和化学式的书写也极不一致。然而，当时并没有可以讨论当当下问题的论坛。因此，三位年轻的化学教授主动组织了一次大会，与该领域的同行们一起讨论澄清有争议的问题，并邀请这一领域最重要的代表于1860年9月3日至5日来到卡尔斯鲁厄。"
 mendelejew.601.g: "我们的宾客就像汤里的氯化钠。"
 mendelejew.602.d: "[SCOPE.sCountry('mendelejew_congress_host_country').GetName]受邀参加国际化学家大会。大家显然想就原子重量的国际标准展开辩论。[SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName]博士收到了盛情邀请。"
 mendelejew.602.g: "我们得快点作出“反应”！"
 mendelejew.604.t: "原子的重量"
 mendelejew.604.d: "尽管会议开始时充满希望，但最终，在国际范围内确定原子重量的努力很快陷入僵局。一派具有民族意识的化学家不愿放弃他们原有的体系。"
 mendelejew.604.f: "1860年的卡尔斯鲁厄会议上未能就几个议题达成一致。最重要的议题之一是原子和分子的质量，也即原子量和分子量。根据前辈化学家的研究成果，与会者一致认为原子是独立的粒子，而分子则是由原子构成的，但用于计算原子量的系统却各不相同。其中一种将氢原子的质量定为1，于是碳原子的质量为6，氧原子则为8。如果原子量未能确定，化合物的元素组成就值得怀疑。有多达五种不同的计量方式可供选择，由于其换算十分复杂，一些化学家倾向于不做任何改变。"
 mendelejew.604.g: "在这样的分歧之下，没理由抛弃旧有的系统。"
 mendelejew.604.h: "我们需要统一的国际原子量。"
 mendelejew.605.t: "化学家相互交流"
 mendelejew.605.d: "在学术会议的茶歇时间，[SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName]博士有机会能与世界各地的同行交流经验，但问题是该怎么利用这个机会。"
 mendelejew.605.f: "“确实，通过假设来帮助我们理解定律并不令人惊讶。一个新学习某学科的人往往需要经历该学科在其历史演变中所经历的所有阶段。”\n——斯坦尼斯劳·坎尼扎罗"
 mendelejew.605.g: "我国的化学家应该探讨关于未来的见解。"
 mendelejew.605.h: "我国的化学家应该当下研究中问题的解决方法。"
 mendelejew.605.i: "我国的化学家应该让他的助手先行一步，这样他们可以学到点东西。"
 mendelejew.609.t_national: "化学家大会无果而终"
 mendelejew.609.d_national: "这三天来，会议的组织者和化学大师们都在试着解决这个问题，但最终还是没能找到一个可供全行业内通行的原子量规范，各国仍将使用传统的体系来描述原子量。"
 mendelejew.609.f_national: "卡尔斯鲁厄会议是第一个专门讨论某一学科的学术会议，尽管该次大会并未取得任何成果，但仍可被视为化学史中十九世纪最为重要的大事。海内外的化学家齐聚一堂，大大促进了未来理论化学的发展。"
 mendelejew.609.g: "这会让我们的研究倒退数年。"
 mendelejew.609.t_international: "化学家大会以达成共识结束"
 mendelejew.609.d_international: "幸运的是，会议上的化学家们已经找到了国际认可的原子量规范解决方案——阿梅代奥·阿伏伽德罗的工作相当完美的解决了这个问题。[SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName]博士将在今天的信中高兴地宣布这个大成功。"
 mendelejew.609.f_international: "卡尔斯鲁厄会议所达成的一个重要的长期共识就是如今大家都熟悉的原子量规范。会议之后，大致采取了氢原子的原子量为1、碳原子为12、氧原子为16等数值。这是基于对某些元素单质的重新认识而规定的，现在大家都认为氢氮氧的单质为双原子分子而非单原子分子。"
 mendelejew.609.h: "化学研究中的重大突破！"
 mendelejew.201.d: "筛选矿物花了很长时间，但[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士已经确定了——如果上一次的实验结果无误，那么人们长时间以来寻找的#YELLOW [ROOT.Var('mendelejew_searched_variable').GetValue|0]号元素#!就已被发现了。[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士决定将该元素命名为#YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('mendelejew_element_name')]#!。"
 mendelejew.301.d: "无需多言：#YELLOW [ROOT.Var('mendelejew_examined_variable').GetValue|0]号元素#!不仅真切存在，还能用现代化学实验方法分离出单质。这对我们国家来说是个大日子！"
 je_mendelejew_element_isolation_reason: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]正不辞辛劳地分离新元素。经验、技能与角色特质，以及天文台建筑中实验室的装备情况都对这一过程所需的时间有显著影响。本次研究意在发现#YELLOW [ROOT.Var('mendelejew_examined_variable').GetValue|0]号元素#!。"
