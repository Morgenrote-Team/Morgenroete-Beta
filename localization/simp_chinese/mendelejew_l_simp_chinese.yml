 pm_mendelejew_coal_liquefaction: "煤液化"
 mendelejew_chemist_synthetic_oil_cost_modifier: "合成油研究"
 je_mendelejew_synthetic_oil: "研究煤液化"
 je_mendelejew_synthetic_oil_reason: "煤液化，也称为煤加氢，今天主要被称为煤制油，是一种将褐煤或硬煤转化为液体基础化学品和合成燃料（如汽油、柴油、煤油）的碳化学过程。在1910年至1925年间，弗里德里希·贝吉乌斯开发了一种高压工艺，随后由马蒂亚斯·皮尔进行了改进：这是第一个大规模的煤液化工艺。这是一种分两阶段进行的直接加氢反应。1925年，时任威廉皇帝煤炭研究所所长的弗朗茨·费歇尔和他的同事汉斯·特罗普施发现了一种反应，这是异质催化领域中最重要的反应之一，其科学、经济和社会意义至今仍然显而易见。"
 je_mendelejew_synthetic_oil_goal: "#E 化学家进展#!达到#ORANGE 100#!。"
 mendelejew.701.t: "煤转油 "
 mendelejew.701.d: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetFullName]的伟大功绩已已经永远印在了化学史上。经过数十年的研究与实验后，我们的首席化学家成功生产出了合成油。这将带动整个化工产业的变革。"
 mendelejew.701.f: "第一次世界大战后，德国开始系统地研究生产汽油的替代品。一方面，由于经济形势的影响，魏玛共和国的各届政府不断质疑石油进口，并越来越多地寻求自给自足的供应。另一方面，美国科学家在一项被全球广泛重视的研究中预测，全球石油储量将在短时间内耗尽，而汽车化进程却在不可阻挡地加速。在这种背景下，在政府的支持下，研究人员和公司将大量精力投入到德国丰富的能源资源——煤炭上。早在19世纪初，人们就已经知道可以从煤炭中提取苯——这远早于石油汽油的发现。德国化学家弗里德里希·贝吉乌斯在1913年首次申请了碳氢化的专利，并因此与卡尔·博施一起获得了诺贝尔奖。"
 mendelejew.701.g: "这意味着我们的石油能自给自足了。"
 mendelejew_chemist_periodic_table_inventor: "元素周期表的发明者"
 mendelejew_chemist_periodic_table_inventordesc: "作为元素周期表的首位提出者，该角色相当擅长推定元素存在。"
 mendelejew.801.t: "元素周期表"
 mendelejew.801.d: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetFullName]费尽心力地罗列整合了现存的已知元素并大胆预测了几种表中尚未发现的缺失元素。如前所料，元素的性质会有可预测性的周期重复——这也就是[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士将其命名为——元素周期表。"
 mendelejew.801.f: "现代元素周期表是由洛塔尔·迈耶和德米特里·伊万诺维奇·门捷列夫开发的。两人都在1869年发表了他们的研究成果，并于1882年共同获得了英国皇家学会颁发的戴维奖章。门捷列夫比迈耶更常被提及为现代元素周期表的创始人，一方面是因为迈耶的周期表发表得稍晚几个月，另一方面是因为门捷列夫对尚未发现的元素性质做出了预测。在俄罗斯，元素周期表仍被称为“门捷列夫表”。门捷列夫和迈耶都不知道对方在元素周期表上的工作。门捷列夫也不知道贝居耶·德·尚库尔托瓦（1862年）、纽兰兹（1863/64年）或欣里希斯（1866/67年）的研究。"
 mendelejew.801.g: "化学现在是真正意义上的科学了。"
 je_mendelejew_periodic_table: "元素排序"
 je_mendelejew_periodic_table_reason: "19世纪初，人们已经开始寻找元素之间关系的规律。然而，障碍包括原子质量的不确定性以及许多元素尚未被发现。多贝莱纳是第一个建立原子质量与单个元素化学性质之间联系的人。1824年，法尔克纳发表了一个自然元素家族的系统。然而，重大突破尚未发生。"
