 mendelejew_chemist_analyst: "化学家专长：分析家"
 mendelejew_chemist_analyst_desc: "这位化学家擅长发现新的元素，速度较其他同行更胜一筹。"
 mendelejew_chemist_inspector: "化学家专长：调查者"
 mendelejew_chemist_inspector_desc: "这位化学家是研究物质的专业人士，分离元素的速度比任何人都快。"
 je_mendelejew_element_theory: "推定未知元素存在"
 je_mendelejew_element_theory_reason: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]推定存在一种未知元素。经验、技能与角色特质，以及天文台建筑中实验室的装备情况都对这一过程所需的时间有显著影响。本次研究意在发现#YELLOW [ROOT.Var('mendelejew_thought_variable').GetValue|0]号元素#!。"
 je_chemist_dies_tt: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士去世了"
 je_element_theory_failed_tt: "他国化学家比[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士先行一步……"
 je_mendelejew_element_discovery: "寻找新元素"
 je_mendelejew_element_discovery_reason: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]正不辞辛劳地寻找新元素。经验、技能与角色特质，以及天文台建筑中实验室的装备情况都对这一过程所需的时间有显著影响。本次研究意在发现#YELLOW [ROOT.Var('mendelejew_searched_variable').GetValue|0]号元素#!。"
 je_element_discovery_failed_tt: "他国化学家比[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士先行一步……"
 je_mendelejew_element_isolation: "分离新元素"
 je_element_isolation_failed_tt: "他国化学家比[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士先行一步……"
 mendelejew.101.t: "推定存在未知元素"
 mendelejew.101.d: "经过大量的研究与调查后，[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士推定有一种未知元素存在，并将其称为——#YELLOW [ROOT.Var('mendelejew_thought_variable').GetValue|0]号元素#!。但，还是得靠实验来说话。"
 mendelejew.101.f: "今日，“化学元素”一词的含义要追溯到17世纪，彼时人们越来越认识到炼金术中的“元素”一词不足以科学地描述物质的性质及彼此间的反应。罗伯特·波义耳在他1661年出版的大作《怀疑派化学家》中，将“化学元素”定义为不由其他物质产生、亦不能由彼此产生，可一同构成其他物质的“基底物质”。本著作影响深远，批判了当时炼金术化学的不足之处，堪称实验化学的里程碑之作。"
 mendelejew.101.g: "但是，这就是个猜测。还算不上什么理论呢！"
 mendelejew.102.t: "一种未知的元素？"
 mendelejew.102.d: "在最近的研究中，[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士基于现有的知识，断定必然存在一种未知的元素。尽管我们不知道为什么此人这么确定，但一个清楚明白的假说正在路上。"
 mendelejew.102.f: "“元素”一词在公元前360年被希腊哲学家柏拉图首先使用，在他的语录《蒂迈欧篇》中，讨论了一些有机和无机的物质，这可算是最早期的化学著作。柏拉图认为希腊哲学家恩培多克勒一个世纪前提出的元素由一些特别的几何结构组成：正四面体（火）、正八面体（风）、正二十面体（水）、正六面体（土）及正十二面体（气）。"
 mendelejew.102.g: "你怎么可能丢了你不能确定是否存在的东西呢？"
 mendelejew.103.t: "他国化学家推定存在新元素"
 mendelejew.103.d: "让我国首席化学家懊恼不已的是——[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetSheHe]今天读到了一篇外国杂志刊载的论文——似乎[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士已经提出了一个#YELLOW [ROOT.Var('mendelejew_thought_variable').GetValue|0]号#!元素可能存在的假说——这也正是[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetHerselfHimself]最近的工作。现在所有的研究都得停下了。"
 mendelejew.103.f: "“机遇总是垂青那些有准备的人。”\n——路易·巴斯德"
 mendelejew.103.g: "无礼！我国的论文已经进入印刷阶段了！"
 mendelejew.111.t: "一位缺席的教授？"
 mendelejew.111.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]曾被视为一名优秀的研究者和教师。但现在，似乎到了鱼与熊掌不可得兼的地步。已经有人在抱怨此人因研究新元素而缺席了太多研讨会和讲座了。"
 mendelejew.111.f: "德意志化学家尤斯图斯·冯·李比希因其现代实验室导向的教学方法而广受学生欢迎。他的发现和著作让他足以闻名世界，除去德国学生外，还有大批外国学生，包括84名英国人和48名美国人，慕名到吉森来求学，聆听李比希关于药学和化学的真知灼见。"
 mendelejew.111.g: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士应专注于研究。"
 mendelejew.111.h: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士应专注于授课。"
 mendelejew.111.i: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士得学会中庸之道。"
 mendelejew.112.t: "梦？"
 mendelejew.112.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]讲述了一个不可思议的梦——在梦中他解决了一个之前未能解决的化学理论问题。"
 mendelejew.112.f: "“我正坐在书桌前写我的教材，但进展缓慢，思绪早就飘到九霄云外。我转过椅子，面对火炉，打起了瞌睡。眼前的原子又开始跳舞了。这次，小的原子群体谦虚地退到了背景中。因为多次看到这种幻象，我的心灵之眼变得更加敏锐，现在能辨认出更大、更复杂的结构；长长的队列有时紧密地缠绕在一起，像蛇一样扭动和盘旋。看！那是什么？一条蛇咬住了自己的尾巴，形状在我眼前嘲弄地旋转。仿佛一道闪电，我猛然惊醒，这次我也花了整晚时间来推导这个假设的后果。让我们学会做梦吧，先生们，也许我们就能学会真理……但在我们的梦被清醒的理解所验证之前，我们需谨慎地发表它们。”\n——奥古斯特·凯库勒"
 mendelejew.112.g: "你是说他在梦里也工作？"
 mendelejew.113.t: "化学论文"
 mendelejew.113.d: "在研究未知元素时，[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士将与之相关的研究汇总成了一篇论文且不打算发表，但是一位助手坚持应当完成这篇论文并发表，而不仅仅是将其看作是无用之作。"
 mendelejew.113.f: "不仅仅化学，几乎每一个学科都会碰到研究成果非所求乃至根本没有研究成果的问题。在此过程中，许多有趣的现象仅仅是匆匆落在了纸上。这很正常，人们常常为了做出惊人的发现而忽视眼前的事务。"
 mendelejew.113.g: "这是私人研究。"
 mendelejew.113.h: "这该上黑板，讲给别人听。"
 mendelejew.113.i: "这篇论文学术价值很高——公开发行！"
 mendelejew.114.t: "白日梦"
 mendelejew.114.d: "我国的化学家[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]指出，[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetSheHe]需要特殊的休息与度假，特别是那种能激发灵感的睡眠，以便能完成[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetHerHis]的研究。然而，之后也没发生什么。"
 mendelejew.114.f: "“如果假设没问题，化学式也对，那这该是——等等——松鼠？”"
 mendelejew.114.g: "这个搞化学的就是在家里闲逛了这么久？"
 mendelejew.115.t: "天文学与化学的合作"
 mendelejew.115.d: "与我国的天文学家[ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]博士的思想碰撞使化学家[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士在[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetHerHis]推定新元素存在的研究中取得了突破性进展。"
 mendelejew.115.f: "在光谱学被发现之前，化学和天文学就已经相互影响了，尤其是在光谱学发现之后。光谱学最初是作为一种天文技术被使用的，威廉·海德·沃拉斯顿进行了实验，建造了第一个显示太阳光谱线的光谱仪。这些光谱线后来由约瑟夫·冯·夫琅和费进行了详细的描述。之后，古斯塔夫·罗伯特·基尔霍夫和罗伯特·威廉·本生发现，每种化学元素都有特定数量和排列的光谱线。他们由此得出结论，沃拉斯顿与夫琅和费观察到的光谱线是由于这些元素在太阳上层的吸收特性造成的，因此这些元素也一定存在于光球层中。"
 mendelejew.115.g: "学科交叉！"
 mendelejew.201.t: "发现新元素"
 mendelejew.201.f: "“我们必须期待发现许多尚未知晓的元素，比如类似铝和硅的元素，它们的原子量会在65到75之间。” ——德米特里·门捷列夫"
 mendelejew.201.g: "这尝起来什么味？"
 mendelejew.202.d: "我国的首席化学家[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]坚定认为#YELLOW [ROOT.Var('mendelejew_searched_variable').GetValue|0]号元素#!是真实存在的，并决定找到它。"
 mendelejew.202.f: "在今天意义上的元素中，只有十种元素在古代以单质形式为人所知，这些元素要么自然存在，要么可以从矿石中提炼出来：碳、硫、铁、铜、锌、银、锡、金、汞和铅。在中世纪的采矿历史中，尤其是在矿山中，人们发现了矿石中含有少量未知金属的混合物，并以山灵的名字命名这些金属（如钴和镍）。1669年，亨尼格·布兰德发现了磷，这标志着大多数元素发现时代的开始，包括1789年马丁·海因里希·克拉普罗特从沥青铀矿中发现的铀。"
 mendelejew.202.g: "元素研究。"
 mendelejew.203.t: "他国化学家发现新元素"
 mendelejew.203.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士在一处学术会议上得知一位外国化学家已先成功发现#YELLOW [ROOT.Var('mendelejew_searched_variable').GetValue|0]号元素#!。得知这个消息后，[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetSheHe]浑身无力，停下了所有工作。"
 mendelejew.203.f: "“我尝试了物理和化学论文中描述的各种实验，结果有时出乎意料。有时，一点意外的成功会让我备受鼓舞；而有时，由于我的经验不足，事故和失败让我陷入深深的绝望。”——玛丽·居里"
 mendelejew.203.g: "我们必须证明这种元素是假的！"
 mendelejew.211.t: "一座新的实验室？"
 mendelejew.211.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士抱怨其所在大学的实验室条件极差，亟需购买新的仪器和设备，否则新元素的发现很可能被推迟。"
 mendelejew.211.f: "建立实验室和购买新设备可不是理所当然的事。在19世纪初，很多地方对化学的看法还很负面。尽管化学家尤斯图斯·冯·李比希地位很高，但还得自己掏钱买实验室设备。"
 mendelejew.211.g: "用最先进的设备建立一间新的实验室。"
 mendelejew.211.h: "在大学里攒点钱买新仪器就好。"
 mendelejew.211.i: "谁付钱？"
 mendelejew.212.t: "未知化合物"
 mendelejew.212.d: "在尝试发现#YELLOW [ROOT.Var('mendelejew_searched_variable').GetValue|0]号元素#!的工程中，[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士发现了一种此前未知的化合物，可以用于工业生产。"
 mendelejew.212.f: "化合物是一种由许多相同分子（或分子实体）组成的化学物质，这些分子包含来自多个化学元素的原子，通过化学键结合在一起。因此，只由一种元素的原子组成的分子不是化合物。化合物可以通过化学反应转变成不同的物质，这可能涉及与其他物质的相互作用。在这个过程中，原子之间的键可能会断裂或形成新的键。"
 mendelejew.212.g: "好极了！"
 mendelejew.213.t: "化学家的助手"
 mendelejew.213.d: "在研究尚未发现的#YELLOW [ROOT.Var('mendelejew_searched_variable').GetValue|0]号元素#!时，[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士有幸雇到了一位极有天分的助手，帮了大忙。有些同僚认为当个助手实在太屈才了。"
 mendelejew.213.f: "“我完全被化学现象迷住了，那些反应中出现的物质，常常有着截然不同的性质，我希望能更多地了解世界的这一面。” ——莱纳斯·鲍林"
 mendelejew.213.g: "先继续工作。"
 mendelejew.213.h: "激励这位天才更进一步。"
 mendelejew.214.t: "劣质样品"
 mendelejew.214.d: "事实证明，[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士几个月来一直在用不纯的样品，难怪实验一直失败。"
 mendelejew.214.f: "“你说什么？就是因为石英被污染了！”"
 mendelejew.214.g: "科研时有挫折。"
 mendelejew.215.t: "地质学与化学的合作"
 mendelejew.215.d: "与我国的地质学家[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士的思想碰撞使化学家[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士在寻找新元素的研究中取得了突破性进展。"
 mendelejew.215.f: "如果没有地质学家记录的新矿物，许多化学元素的发现是不可能的。1839年，德裔瑞士化学家克里斯提安·弗里德里希·尚班创造了“地球化学”这个词。这个概念不仅仅是描述矿物，还包括理解它们的物质基础和背后的化学动态。"
 mendelejew.301.t: "分离新元素"
 mendelejew.301.f: "“在自然界中，没有什么是被创造的，也没有什么是消失的，一切都在变化。我们只能相信事实：这些是大自然呈现给我们的，不会欺骗我们。” ——安托万·拉瓦锡"
 mendelejew.301.g: "科学的胜利。"
 mendelejew.302.d: "尽管#YELLOW [ROOT.Var('mendelejew_examined_variable').GetValue|0]号元素#!已被宣告为“已发现”，但其单质依旧未被分离出来以证明其存在。[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]决定更细致地研究该元素，来看看能否分离出其单质。"
 mendelejew.302.f: "第一份现代元素列表出现在安托万·拉瓦锡1789年的《化学元素》中，包含了33种元素，包括光和热。到1818年，永斯·雅各布·贝采利乌斯已经确定了当时49种公认元素中的45种的原子量。1869年，德米特里·门捷列夫的元素周期表中包含了63种元素。"
 mendelejew.302.g: "我希望有人给实验室投保了。"
 mendelejew.303.t: "他国化学家分离新元素"
 mendelejew.303.d: "糟糕！看起来一位外国的化学家已经成功分离得到了#YELLOW [ROOT.Var('mendelejew_examined_variable').GetValue|0]号元素#!的单质。[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]所投入的一切努力与希望都白费了。或许我们该给他换个方向？"
 mendelejew.303.f: "“这是个好主意，但时机不对。如果我比周围的许多人更成功，那主要——可以说几乎完全……是因为我一直都非常勤奋。” ——约翰·道尔顿"
 mendelejew.303.g: "这尊科学的圣杯本该握在我们手上……"
 mendelejew.311.t: "化学合成"
 mendelejew.311.d: "在分离#YELLOW [ROOT.Var('mendelejew_examined_variable').GetValue|0]号元素#!的研究中，[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士成功了简化了此前一种条件非常苛刻的合成方法，这对经济与工业发展的意义同对科学一样重要。"
 mendelejew.311.f: "化学合成是通过人工执行化学反应来获得一种或多种产品的过程。这通常通过物理和化学操作来实现，涉及一个或多个反应。在现代实验室中，这个过程是可重复且可靠的。化学合成涉及一种或多种化合物（称为试剂或反应物），在特定条件下会发生转变。可以应用各种反应类型来制备所需的产品。这需要将化合物混合在反应容器中，如化学反应器或简单的圆底烧瓶。许多反应需要某种形式的处理或纯化程序来分离最终产品。"
 mendelejew.311.g: "好极了。"
 mendelejew.312.t: "化学分离"
 mendelejew.312.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士分离#YELLOW [ROOT.Var('mendelejew_examined_variable').GetValue|0]号元素#!的工作进展很快。一种化学分离手段让他迈出了关键一步。"
 mendelejew.312.f: "在化学中，解离是一个常见的过程，分子（或者像盐类、络合物这样的离子化合物）会分裂成其他物质，比如原子、离子或自由基，而且通常是可逆的。举个例子，当酸溶解在水中时，通过异裂作用，电负性原子和氢原子之间的共价键会被打破，产生一个质子（H⁺）和一个负离子。解离正好和结合或重组相反。"
 mendelejew.312.g: "完美！"
 mendelejew.313.t: "被忽视的职责"
 mendelejew.313.d: "毋庸讳言，[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]以其分离#YELLOW [ROOT.Var('mendelejew_examined_variable').GetValue|0]号元素#!的研究工作任务为借口来逃避应履行的学术职责。由于此人不出席学校的会议与讲座，校长已要求其做出解释。"
 mendelejew.313.f: "任何借口都不足以让你远离那些通常被称为“学生”的讨厌生物。"
 mendelejew.313.g: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士有更重要的事情要做。"
 mendelejew.313.h: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士必须履行其义务。"
 mendelejew.314.t: "意料之外的化学反应"
 mendelejew.314.d: "在最后一次实验里，[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士显然误解了一些不重要的地方并低估了反应的影响。"
 mendelejew.314.f: "各家报社还在持续报道消防队失败的行动，水不仅没能灭火，反而大大加剧了化学反应。许多学生因吸入了烟雾而止不住地抱怨，还有不少人在实验室受伤了。大学里的理学院楼遭到了难以想象的破坏，可能得维修几个月甚至几年。本地报社都在等[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士发表声明，但似乎此人因网球比赛受伤而住院了，短期内很难出现在公众视野里。"
 mendelejew.314.g: "一场灾难！"
 mendelejew.315.t: "工程学与化学的合作"
 mendelejew.315.d: "我国工程师[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]博士改进了许多科研设备以协助[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士分离新元素的研究。"
 mendelejew.315.f: "在20世纪初，化学家和机械工程师在化学工业中紧密合作，比如设计反应器和锅炉，其中一些设备承受了相当大的压力（600°C和100个大气压）。这种合作催生了新的学科——化学工程。如今，化学工程专业的毕业生在化学工业中占据了主导地位。"
 mendelejew.401.t: "一次化学实验"
 mendelejew.401.d: "为了从其日常的工作中休息一会，[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士想利用国家最重要的实验室来进行一次化学实验，实验仪器已经准备好了。"
 mendelejew.401.f: "有时候，化学家们会想着追求自己的兴趣，而不是只做分配给他们的任务。偶尔这样的尝试还真能带来一些有价值的发现，比如改良肥料或者在工业上生产化学品。这种成功能否实现，很大程度上取决于化学家的性格特点、技能和经验。"
 mendelejew.401.g: "我很期待看到这个实验的结果！"
 mendelejew.401.h: "停止胡闹。"
 mendelejew.402.t: "成功的实验"
 mendelejew.402.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士是正确的！[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetHerHim]从最新的实验里得到了不少有用的新知识，新发现的化学流程将在未来几十年持续影响农业和工业发展。或许可以把这个流程命名为[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]法？"
 mendelejew.402.f1: "通过[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetHerHis]的实验研究，[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]已成功生产了一种更好的肥料，预计明年将要大丰收啦！"
 mendelejew.402.f2: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]使用[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetHerHis]研发的革命性生产方法，为种植园特用肥料的生产奠定了基础。"
 mendelejew.402.f3: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]向工业界提供的新工艺应该会显著改善化工厂的生产。"
 mendelejew.402.g: "大成功！"
 mendelejew.403.t: "实验失败"
 mendelejew.403.d: "虽然同事们对[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]的工作寄予厚望，但[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetHerHis]的实验并不成功。相反，[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetSheHe]浪费了本可以更好地用于元素研究的宝贵时间。"
 mendelejew.403.f: "“嗯，结果不如预期。至少实验室没有爆炸！”"
 mendelejew.403.g: "令人失望。"
