 je_noble_gases: "空气中的未知元素"
 je_noble_gases_reason: "亨利·卡文迪许在1783年首次发现空气中含有一种惰性气体的迹象。他将空气和氧气混合，使其中的氮气和氧气在摩擦电的帮助下完全反应生成氮氧化物，留下未反应的残留物。然而，他并未意识到这一发现的价值，也没有继续他的实验。这可能是以前未知元素的证据，需要使用最现代的方法进行研究。"
 je_mendelejew_noble_gases_has_famous_chemist_tt: "有一位著名[concept_mendelejew_chemist]。"
 je_mendelejew_noble_gases_invalid: "他国发现稀有气体。"
 mendelejew.901.t: "稀有气体"
 mendelejew.901.d: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士成功地分离出了之前理论上的氦元素，地球上也检测到了这种元素。他有了一个惊人的发现：空气中不只有一种，而是有多种未知元素。由于这些元素的反应性很低，他将它们命名为稀有气体。"
 mendelejew.901.f: "卡文迪许对空气的研究实验在1888年由瑞利勋爵继续进行。他注意到，从空气中获得的氮气与从氨分解中获得的氮气密度不同。因此，瑞利怀疑空气中一定存在一种未知的惰性成分。于是，他和威廉·拉姆齐尝试通过与镁反应完全去除空气样本中的氮气，以分离出这种未知气体。最终，在1894年，他们成功地通过光谱检测发现了一种新元素，称为氩气。在确定了氦气和氩气的主要性质后，发现这些气体是单原子的，与其他大气气体不同。威廉·拉姆齐随后怀疑一定存在一整组这样的气体，它们在元素周期表中形成自己的一个组，并开始寻找它们。1898年，他和莫里斯·威廉·特拉弗斯通过空气的分馏蒸馏成功分离出了氖气、氪气和氙气。"
 mendelejew.901.g: "稀有气体？我更喜欢叫它惰性气体。"
 mandelejew_noble_gases_901.tt: "推定，发现并分离#YELLOW 氩#!、#YELLOW 氖#!、#YELLOW 氪#!与#YELLOW 氙#!。"
 mendelejew_chemist_synthetic_rubber_cost_modifier: "合成橡胶研究"
 mendelejew_synthetic_rubber_tech: "人工合成橡胶"
 mendelejew_synthetic_rubber_tech_desc: "合成橡胶是一种人工合成的高弹性聚合物，在热稳定性及抗腐蚀性等方面性能均优于天然橡胶。"
 building_mendelejew_synthetic_rubber_factory: "合成橡胶厂"
 pmg_mendelejew_isoprene: "异戊二烯"
 pm_mendelejew_isoprene: "异戊二烯"
 je_mendelejew_synthetic_rubber_reason: "大约在1860年，查尔斯·汉森·格雷维尔·威廉姆斯成功从天然橡胶中蒸馏出异戊二烯，并确定了其分子式为C5H8。这使得古斯塔夫·布沙达在1879年首次通过加热从橡胶中提取的异戊二烯与盐酸反应，经过数月的过程，生产出合成橡胶。大约在1900年，伊万·康达科夫首次用2,3‑二甲基丁二烯生产出完全合成的橡胶。1909年，弗里茨·霍夫曼获得了第一个合成橡胶生产的专利。所谓的甲基橡胶是由2,3‑二甲基丁二烯聚合而成的。"
 je_mendelejew_synthetic_rubber_goal: "#E 化学家进展#!达到#ORANGE 75#!。"
 mendelejew.702.t: "实验室中的橡胶"
 mendelejew.702.d: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetFullName]的伟大功绩已已经永远印在了化学史上。经过数十年的研究与实验后，我们的首席化学家成功生产出了合成橡胶。这将带动整个化工产业的变革。"
 mendelejew.702.f: "在两次世界大战期间，德国失去了橡胶来源，因而鼓励寻找替代品。在第一次世界大战期间，1915年至1918年间，拜耳公司在勒沃库森使用弗里茨·霍夫曼工艺生产了约2500吨甲基橡胶。第一个商业上可用的合成橡胶是苯乙烯‑丁二烯橡胶（SBR），由德国化学家沃尔特·博克和爱德华·楚库尔于1926年在法本公司勒沃库森工厂开发，并于1927年1月15日申请了专利。"
 mendelejew.702.g: "再也没有乳胶过敏啦！"
