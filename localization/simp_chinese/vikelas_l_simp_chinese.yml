 vikelas.21.h: "但是，谁会对这样一款游戏感兴趣呢？"
 vikelas.31.t: "从草地游戏到“美国的国民运动”"
 vikelas.31.d: "在[SCOPE.sState('vikelas_baseball_state').GetName]，一种体现美国精神的新游戏逐渐流行起来。"
 vikelas.31.f: "19世纪40年代，棒球逐渐脱离早期球类游戏的模糊形态，发展出自身独特的结构。彼时，美国正经历迅猛的城市化进程，不断扩张的城市亟需一种既能增强社区凝聚力，又能体现国家新精神的大众娱乐。关键转折发生在1845年——亚历山大·卡特赖特与纽约尼克博克棒球俱乐部成员共同制定了历史上首套标准化比赛规则。这套“尼克博克规则”确立了现代棒球的基本框架：菱形球场、四垒制、每局三出局、每队九人上场。其系统性远超此前在草地与空地间随意进行的非正式比赛。1846年6月19日，尼克博克俱乐部在新泽西州霍博肯与“纽约九人队”展开对决，完成史上首场有正式记录的规则化比赛。尽管尼克博克队落败，但这场赛事被广泛视为组织化棒球运动的诞生时刻。"
 vikelas.31.g: "全垒打！"
 vikelas.41.t: "现代足球的起源"
 vikelas.41.d: "为了规范众多相互冲突的球类运动规则并组织联合比赛，[SCOPE.sState('vikelas_football_state').GetName]地区的俱乐部提出了一套新的足球规则。"
 vikelas.41.f: "19世纪前半叶，英格兰的“足球”并非一项统一的运动，而是对各地城镇、乡村和学校中流行的各种球类游戏的统称，其规则差异极大。迈向统一的第一步是1848年诞生的《剑桥规则》，旨在为剑桥大学学生制定一套通用比赛规范。尽管该规则并未成为最终标准，却为后续改革铺平了道路。真正的转折点出现在1863年10月26日——十一家俱乐部于伦敦共济会酒馆集会，正式成立足球协会。仅数周后，他们便确立了一套新规则：只允许用脚触球，严禁持球奔跑或抛掷。这一决定引发橄榄球派系的强烈反对，最终导致其脱离并独立发展出自己的规则体系。足球协会的成立，标志着现代足球的真正诞生。"
 vikelas.41.g: "球进了！"
 vikelas.51.t: "桃篮游戏"
 vikelas.51.d: "在[SCOPE.sState('vikelas_basketball_state').GetName]体育馆里，一项新的游戏被发明了——这项游戏可能会在世界各地引起反响。"
 vikelas.51.f: "“不准踢，不准带球跑，两个桃篮要钉在走廊上。”在[TimeKeeper.GetCurrentDate.Format('y')]中，在[SCOPE.sState('vikelas_basketball_state').GetFarmHubName]的一所学校，[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]博士面临一个问题：如何让[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]这些焦躁不安的学生在冬天也能在室内活动。[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U]的解决方案很简单也很奇怪——一个足球，两个高高的桃篮，以及十三条规则。\n\n孩子们一开始觉得很奇怪，只是小心翼翼的传球和弧线投掷。但它很快传播到其他学校，然后又传播到其他城市。不到十年的时间，从纽约到东京的体育馆里就回荡着球的弹跳节奏和“投篮成功！”的欢呼声。这项最初只是寒冷天气的消遣，如今或许会发展成一项更伟大的运动。它节奏快，注重团队合作，适合现代生活——最重要的是，它源于[ROOT.GetCountry.GetAdjectiveNoFormatting]。"
 vikelas.51.g: "在学校和体育馆中介绍它。"
 vikelas.302.h: "被高估的比赛。"
 vikelas.303.h: "多么无聊的游戏。"
 vikelas.311.g: "赛事胜负永不错过！"
 vikelas.312.t: "体育广播"
 vikelas.312.d: "[SCOPE.sState('vikelas_radio_state').GetName]的一家收音机制造商正大力推广其产品，主打功能为体育赛事的无线电广播。民众不愿错过任何一场[Country.MakeScope.Var('vikelas_national_sport_var').GetFlagName]比赛的需求，促使该工厂优化了生产流程。 "
 vikelas.312.f: "收音机天生适合成为体育传播的新媒介：它能实时传递比赛的紧张氛围、转播观众的欢呼声浪，并让解说员的声音化作听众心中的脉搏。在美国，这一变革始于1921年8月5日——匹兹堡电台KDKA直播了首场棒球比赛：匹兹堡海盗队对阵费城费城人队。解说员哈罗德·阿林坐在记者席中，手持简易麦克风，将每一个动作娓娓道来，仿佛在向朋友讲述故事。听众们被这新奇设备深深吸引，仿佛比赛已走进他们的客厅。 \n\n在欧洲，BBC紧随其后：1927年1月11日，它首次直播了一场足球比赛——阿森纳对阵谢菲尔德联，由解说员泰迪·沃克勒姆担任实况播报。 "
 vikelas.312.g: "你懂不懂什么叫身临其境？"
 vikelas.318.t: "[GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName]协会"
 vikelas.318.g: "成立国家[GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName]协会！"
 vikelas.318.f: "当35%的本国地区拥有相应体育项目的俱乐部时，一个体育协会——无论是板球、棒球、足球还是篮球协会——便可成立。一个协会是举办联赛和冠军决赛的基础，但前提是一个国家至少拥有两个俱乐部。此外，足球协会是参加国际足联世界杯的先决条件。"
 vikelas.318.d: "[GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName]已在[GetPlayer.GetNameNoFormatting]全国范围内广为流行。充满活力的俱乐部文化如今促成了国家协会在[ROOT.GetCountry.GetCapital.GetCityHubName]的成立。"
 vikelas.321.g: "全垒打！"
 vikelas.322.t: "棒球卡"
 vikelas.322.d: "我国一家知名企业开始印制棒球卡用于宣传推广，由此掀起了一股真正的收藏热潮。"
 vikelas.322.f: "棒球交易卡的历史与棒球从地方消遣升华为美国“国球”的进程同步展开。早在1860年代，随着国家棒球运动员协会（NABBP）组建首批正式俱乐部，球员肖像便以摄影形式问世。这类被称为“橱柜卡”（cabinet cards）或“商业卡”（trade cards）的照片由专业影楼制作，多为经济条件较好的球迷收藏，但尚无系列化生产特征。 \n\n现代意义的交易卡真正兴起于19世纪80年代。彼时，烟草厂商开始将小型图像卡片装入香烟盒中。最初，这些卡片仅用于保护香烟，但企业很快察觉其巨大的宣传潜力。纽约的古德温公司（Goodwin & Company）推出的“老法官”系列（1887–1890）被视为该领域的开创者。卡片以黑白照片呈现球员形象，印刷于轻质纸板之上，首次使球迷得以系统收藏偶像的成套卡牌，开启了体育收藏文化的新篇章。 "
 vikelas.322.g: "剪贴簿将于何时推出？"
 vikelas.331.t: "敌对足球俱乐部建立"
 vikelas.331.d: "在与邻省的一家足球俱乐部发生争执后，[SCOPE.sState('vikelas_football_club_state_scope').GetName]的工人聚集在一起，成立了自己的俱乐部，并将其命名为[SCOPE.sState('vikelas_football_club_state_scope').GetCustom('vikelas_historical_football_club_names_type')]。两家俱乐部之间显然存有敌意。"
 vikelas.331.f: "相当多的体育俱乐部起源于与其他俱乐部的分歧。例如，国际米兰就是由米兰板球和足球俱乐部（现在的 AC 米兰）的几名心怀不满的世界主义者在一家名为“时钟餐馆”的米兰餐厅成立的。该俱乐部的正式名称是“国际米兰足球俱乐部”，它从民族主义的米兰CFC中分离出来的，因为后者只允许意大利人参加比赛。"
 vikelas.331.g: "这是正在酝酿的敌意吗？"
 vikelas.332.t: "足球宿敌"
 vikelas.332.d: "来自[SCOPE.sState('vikelas_rival_state_1_scope').GetName]的足球俱乐部[SCOPE.sState('vikelas_rival_state_1_scope').GetCustom('vikelas_historical_football_club_names_type')]与来自[SCOPE.sState('vikelas_rival_state_2_scope').GetName]的[SCOPE.sState('vikelas_rival_state_2_scope').GetCustom('vikelas_historical_football_club_names_type')]今天将举行联赛角逐，本场比赛或许将决定本赛季冠军花落谁家。双方将彼此视作宿敌并觊觎冠军宝座，使得气氛愈发紧张。"
 vikelas.332.f: "踢开球，界外投，进行一场小混战，\n保持低调向前冲，喝彩无论胜与败；\n开球，城队！\n别在乎危险，\n稳住，机会就在眼前，\n万岁！我们进了一个球。\n——阿尔伯特·T·史密斯"
 vikelas.332.g: "我支持[SCOPE.sState('vikelas_rival_state_1_scope').GetName]的球队！"
 vikelas.332.h: "[SCOPE.sState('vikelas_rival_state_2_scope').GetName]的球队更好！"
 vikelas.333.t: "足球流氓"
 vikelas.333.d: "[GetPlayer.GetAdjective]的足球冠军赛被暴力球迷的骚乱蒙上了阴影。他们对比赛结果不满，袭击了对方球队与裁判，并在[ROOT.Var('vikelas_rival_state_var').GetState.GetName]肆意打砸商店，造成了严重破坏。幸运的是无人死亡。"
 vikelas.333.f: "“胆小鬼裁判，你躲去哪儿了！都是因为你我们才输的！他在那儿！抓住他，孩子们！”"
 vikelas.333.g: "啊！怎么这么乱呀！"
 vikelas.334.t: "足球冠军诞生！"
 vikelas.334.d: "新的[GetPlayer.GetAdjective]冠军尘埃落定，那就是来自[ROOT.Var('vikelas_rival_state_var').GetState.GetName]的球队。[ROOT.Var('vikelas_rival_state_var').GetState.GetNameNoFormatting]的人民正在欢庆自家球队的胜利。"
 vikelas.334.f: "“Ole! Ole! Ole! Oleeee! Oleeee! Oleeee!”"
 vikelas.334.g: "我们是冠军！"
 vikelas.391.t: "调整国民体育项目"
 vikelas.391.d: "[GetPlayer.GetNameNoFormatting]该推行那种国民体育项目？"
 vikelas.391.f: "“你听说过一种名叫‘牛角球’（Hornussen）的有趣运动吗？”"
 vikelas.391.g: "板球。"
 vikelas.391.h: "棒球。"
 vikelas.391.i: "足球。"
 vikelas.391.j: "篮球。"
 vikelas.391.k: "算了。"
 vikelas.392.t: "改变国民体育项目"
 vikelas.392.d: "[GetPlayer.GetNameNoFormatting]该改为推行那种国民体育项目？"
 vikelas.392.f: "“[ROOT.GetCountry.MakeScope.Var('vikelas_national_sport_var').GetFlagName]太无聊了，改成滚奶酪大赛怎么样？”"
 vikelas.393.t: "新的国民体育项目"
 vikelas.393.d: "[SCOPE.sCountry('vikelas_overlord_country_scope').GetName]的外交使团已正式建议我国引入其国民体育项目，并为推动实施，特派一名教练前来协助推行此项计划。"
 vikelas.393.f: "“游戏就像休息，既然不能连续工作，就需要休息。”\n——亚里士多德"
 vikelas.393.g: "把球棒递给我！"
 vikelas.393.h: "全垒打！"
 vikelas.393.i: "球进了！"
 vikelas.393.j: "哗！"
 vikelas.394.t: "共同的志趣"
 vikelas.394.d: "国内越来越多的民众开始将[ROOT.GetCountry.MakeScope.Var('vikelas_national_sport_var').GetFlagName]视为凝聚社会共识、承载意识形态价值的重要象征，甚至延伸至国际关系领域。这种共享的国民体育项目使人们相信，[GetPlayer.GetNameNoFormatting]与宗主国[SCOPE.sCountry('vikelas_overlord_country_scope').GetName]之间不仅存在权力依附，更拥有一种文化上的亲近与认同。"
 vikelas.394.f: "如果附属国的国民运动项目与宗主国相同，其独立倾向会降低。"
 vikelas.394.g: "一起运动，同享平乐。"
 vikelas.395.t: "英联邦[GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName]锦标赛"
 vikelas.395.d: "来自各盟国及友好国家的运动员与观众齐聚盛会，共襄英联邦[GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName]锦标赛。本届赛事释放出明确信号：[ROOT.GetCountry.GetAdjectiveNoFormatting]的影响力正从政治领域延伸至文化层面，其势力范围正在实现更深层次的凝聚与融合。"
 vikelas.395.f: "自19世纪末以来，英格兰与帝国其他地区之间已开展多场测试系列赛，这些比赛具有准锦标赛性质。1909年帝国板球会议的成立，为帝国内部各板球强国之间的正式交流奠定了基础。最初的成员包括英格兰、澳大利亚和南非，后来印度、新西兰及西印度群岛相继加入。 \n\n与此同时，英伦本土锦标赛是英格兰、苏格兰、威尔士和北爱尔兰这四个本土国家之间的年度足球赛事，也是世界上最古老的常规性国际足球赛事，被视为英国在足球领域霸权地位的象征。 \n\n尽管“大英帝国杯”这一全面赛事构想从未真正实现，但曾有过若干尝试与系列赛，几乎接近这一设想。 "
 vikelas.395.g: "让我们开始这场比赛！"
 vikelas.396.t: "英联邦[GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName]锦标赛——大胜！"
 vikelas.396.d: "在英联邦[GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName]锦标赛的决定性比赛中我们击败了大敌[SCOPE.sCountry('vikelas_second_winner_team_scope').GetName]队，我们获胜了！"
 vikelas.396.f: "[SCOPE.sCharacter('vikelas_schaefer_scope').GetFullNameNoFormatting]传球给[SCOPE.sCharacter('vikelas_morlock_scope').GetFullNameNoFormatting]，但被[SCOPE.sCountry('vikelas_second_winner_team_scope').GetNameNoFormatting]球员拦截——球到了[SCOPE.sCharacter('vikelas_bozsik_scope').GetFullNameNoFormatting]脚下，永远是[SCOPE.sCharacter('vikelas_bozsik_scope').GetFullNameNoFormatting]，这位[SCOPE.sCountry('vikelas_second_winner_team_scope').GetAdjectiveNoFormatting]右路飞翼！他控球在脚——这次失误了，球被[SCOPE.sCharacter('vikelas_schaefer_scope').GetFullNameNoFormatting]断下！[SCOPE.sCharacter('vikelas_schaefer_scope').GetFullNameNoFormatting]突入禁区传中！头球攻门——被挡出！[SCOPE.sCharacter('vikelas_rahn_scope').GetFullNameNoFormatting]后点包抄准备射门——[SCOPE.sCharacter('vikelas_rahn_scope').GetFullNameNoFormatting]起脚射门——球进了！！！球进了！！！球进了！！！球进了！！"
 vikelas.396.g: "[GetPlayer.GetNameNoFormatting]赢得英联邦杯！"
 vikelas.397.t: "英联邦[GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName]锦标赛落幕"
 vikelas.397.d: "英联邦[GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName]锦标赛圆满结束。[SCOPE.sCountry('vikelas_first_winner_team_scope').GetName]在决赛中战胜[SCOPE.sCountry('vikelas_second_winner_team_scope').GetName]，捧起桂冠。各盟国及友好国家的代表团与观众已相继离场。而[GetPlayer.GetNameNoFormatting]——作为本次盛会的主办国与组织者——将以卓越的风范与周到的安排，长存于各国友人温暖的记忆之中。"
 vikelas.397.f: "“或许我们并不只是失去话语权的附庸、战争中的炮灰，或为宗主国利益服务的一盘散沙——而是一个真正的共同体……一个家庭。”"
 vikelas.397.g: "这有助于增进国际间的理解。"
 vikelas.403.d: "国际足联今日在[SCOPE.sState('vikelas_fifa_state').GetStateRegion.GetCityHubName]召开的会议上任命了新理事会成员。"
