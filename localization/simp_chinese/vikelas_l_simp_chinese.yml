 vikelas.100.t: "奥林匹克之梦"
 vikelas.100.d: "[SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]希望以现代的面貌恢复古代奥运会，提议每四年举行一次国际体育比赛。"
 vikelas.100.f: "古代人的理想是“拥有良好的心智和身体”，受此启发，奥林匹克思想日益发展。考古学也对此做出了贡献：19世纪末，恩斯特·库尔提乌斯发掘了奥林匹亚，重新激发了人们对奥林匹克运动会的兴趣。此外，进化论所孕育的“适者生存”的社会观念，以及在工业化体育锻炼必不可少的信念也起到了推波助澜的作用。作为一项国际赛事，现代奥运会克服民族主义，根据更快、更高、更强的座右铭，来象征社会进步，促进和平。"
 vikelas.100.g: "成立国际奥林匹克委员会"
 vikelas.102.t: "国际奥林匹克委员会"
 vikelas.102.d: "为了振兴奥运会，[SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]成立了国际奥林匹克委员会，负责维护和组织奥运会的现代形式。"
 vikelas.102.f: "第一届国际奥委会主要由[SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]的亲信组成，他们分散成一个小圈子。后来，其他国际奥委会成员也加入进来，这个由志同道合者组成的团体便成为了一个国际组织。"
 vikelas.102.g: "国内和国际体育进度向前迈出了一步。"
 vikelas.103.t: "奥林匹克运动会：希腊举行？"
 vikelas.103.d: "国际奥林匹克委员会成立后，出现了这样一个问题，奥运会是永远在希腊举行，还是每四年换一个举办地。"
 vikelas.103.f: "实际上，国际代表希望奥运会作为一项国际赛事在国际上举行。因此，比赛场地应每四年轮换一次。比赛场地应由理事会决定。但由于希腊恢复了奥运会，这一立场并非没有争议。最后[SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]将场地问题归结为一个简单的公式：我们的比赛，我们的规则。这将导致奥运会纯属荣誉问题，其权利将受到严格限制。"
 vikelas.103.g: "奥林匹克运动会是希腊人的事"
 vikelas.103.h: "奥运会是一项国际赛事。"
 vikelas.104.t: "国际奥林匹克委员会"
 vikelas.104.d: "为了振兴奥林匹克运动会，[SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]成立了国际奥林匹克委员会，负责维护和组织奥运会的现代形式，还计划每四年在希腊举行一次。"
 vikelas.104.f: "第一届国际奥委会主要由[SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]的亲信组成。他们分散成一个小圈子。后来，其他国际奥委会成员也加入进来，这个由志同道合者组成的团体就变成了一个国际组织。国际代表们实际上希望奥运会作为一项国际赛事在国际上举行。然而由于希腊的强大影响力，国际奥委会不得不放弃轮流举办不同场馆的想法，因此奥运会每四年在希腊举行一次。"
 vikelas.104.g: "他们的游戏，就应该按他们的规则"
 vikelas.105.t: "奥运会的复兴"
 vikelas.105.d: "国际奥林匹克委员会召开会议后，委员会决定在希腊举办第一届现代奥运会。"
 vikelas.105.f: "国际奥委会的首要任务之一是确定新一届奥运会的举办地点。委员会仿效古代的做法，一致决定在希腊举办奥运会，以纪念最初的奥林匹克运动会。此后，奥运会每四年在不同的国家举办一次。举办地由委员会选定，委员会每四年改组一次。"
 vikelas.105.g: "等不及了！"
 vikelas.106.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_olympic_games_number_type')]奥林匹克运动会开始"
 vikelas.106.d: "第一届现代奥运会开幕了！全世界都来到了希腊。来自#BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]个#!国家的运动员参加了这一国际盛会。"
 vikelas.106.f: "[TimeKeeper.GetCurrentDate.Format('wy')]年，第一届现代奥林匹克运动会正式开始，此前，罗马皇帝狄奥多西一世于393年以崇拜异端为由禁止举办古代奥林匹克运动会。虽然在当时也很难创造出一流的体育成就，但人们普遍认为这是一次巨大的成功，对确保奥林匹克运动会能够永久立足起到了重要作用。"
 vikelas.106.g: "运动会重回故地！"
 vikelas.107.g: "更快！更高！更远！"
 vikelas.108.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_olympic_games_number_type')]奥林匹克运动会结束"
 vikelas.108.d: "第一届奥运会落下帷幕。观众、媒体和运动员都为之振奋，千年之前传统得以复兴，并被赋予了现代形式。"
 vikelas.108.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_winners_type')]但其他国家也取得了优异的体育成绩。在[GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue|0V]个参赛国家中，这些国家获得了金牌：\n[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_1_this_year_global_type')]\n[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_2_this_year_global_type')]\n[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_3_this_year_global_type')]\n[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_4_this_year_global_type')]\n[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_5_this_year_global_type')]\n[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_6_this_year_global_type')]\n[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_7_this_year_global_type')]\n[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_8_this_year_global_type')]\n[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_9_this_year_global_type')]\n[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_10_this_year_global_type')]"
 vikelas.108.g: "更快！更高！更强！"
 vikelas.109.d: "希腊再次邀请世界参加奥运会，来自#BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]#!国家的运动员参加了这次国际盛会。"
 vikelas.109.f: "自希腊成立国际奥委会以来，很明显，今后的奥运会将一如既往，只在希腊的土地上举行。这不仅确保了一定的连续性，也确保希腊在国际上受到尊重，使这个曾经的小国发挥了非常特殊的作用。"
 vikelas.110.t: "奥林匹克的热情"
 vikelas.110.d: "[SCOPE.sCharacter('vikelas_olympics_enthusiast_scope').GetFullName]对即将在希腊举行的奥运会非常着迷。他决定让[ROOT.GetCountry.GetName]加入新成立的国际奥林匹克委员会。"
 vikelas.110.f: "许多学者为奥林匹克运动会的成功举办贡献了一份力，即使他们往往没有亲自参加，也会试图与国际奥委会取得联系。他们还认为，如果自己的国家有代表参加国际赛事，那将是国家的荣誉。"
 vikelas.110.g: "值得称赞的举措。"
 vikelas.112.t: "新国际奥委会理事会选举"
 vikelas.112.d: "新当选的国际奥委会理事会"
 vikelas.112.f: "国际奥委会理事会每四年选举一次。只有创始国和主席所属国仍留在理事会。除此以外，理事会成员的分配如下5个大国、2个欧洲国家、2个美洲国家、2个亚洲国家、1个非洲国家、1个大洋洲国家，理事会从国际奥委会成员中选出一个国家主办下一届奥运会。"
 vikelas.113.t: "下一次奥运场址"
 vikelas.113.d: "国际奥委会理事会召开会议，决定下届奥运会的举办地点。"
 vikelas.113.f: "三个国际奥委会成员国在过去20年中没有举办过奥运会，它们是可能的候选国。第四个国家可能因贿赂败而被列入名单。评选取决于国家的威望和国际关系。附属国、宗主国、盟国和关税同盟将相互投票，关系状况和恶名也很重要。"
 vikelas.113.g: "[SCOPE.sCountry('vikelas_olympics_candidate_1').GetName]"
 vikelas.113.h: "[SCOPE.sCountry('vikelas_olympics_candidate_2').GetName]"
 vikelas.113.i: "[SCOPE.sCountry('vikelas_olympics_candidate_3').GetName]"
 vikelas.113.j: "[SCOPE.sCountry('vikelas_olympics_candidate_4').GetName]"
 vikelas.113.k: "[SCOPE.sCountry('vikelas_olympics_candidate_fallback').GetName]"
 vikelas.114.t: "下一届奥运会将在[SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFlag]举办"
 vikelas.114.d: "国际奥委会已经决定[SCOPE.sCountry('vikelas_olympics_candidate_scope').GetName]拥有举办下届奥运会的最佳条件"
 vikelas.114.f: "举办奥运会是一件声誉卓著的事情。筹备工作需要一些费用，但付出是值得的。"
 vikelas.114.g: "我们[SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFlag]见！"
 vikelas.115.g: "等一下？是我们吗？好耶！"
 vikelas.116.d: "全世界都来到了[ROOT.GetCountry.GetName]。来自#BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]#!国家的运动员参加了这一国际赛事。作为东道主，我们深感自豪！愿我们的运动员从主场优势中获益！"
 vikelas.116.f: "“奥运会重要的不是胜利,而是参与;生活的本质不是索取,而是奋斗。”\n——顾拜旦"
 vikelas.116.g: "让我们开始这场比赛！"
 vikelas.117.d: "全世界都来到了[SCOPE.sCountry('vikelas_olympic_country').GetName]。来自 #BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]#!国家的运动员参加了这一国际赛事。"
 vikelas.118.d: "我们的运动员已经英勇奋战，现在是将荣誉带回家的时候了。"
 vikelas.119.t: "国际奥林匹克委员会"
 vikelas.119.d: "为了振兴奥林匹克运动会，[SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]成立了国际奥林匹克委员会，负责维护和组织奥运会的现代形式。决定在[ROOT.GetCountry.GetName]举办现代第一届奥运会。"
 vikelas.119.f: "第一届国际奥委会主要由[SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]的亲信组成。他们分散成一个小圈子。后来，其他国际奥委会成员也加入进来，这个由志同道合者组成的团体就变成了一个国际组织。最初的决定之一涉及首届奥运会的举办地点。由于目前没有一个希腊主权国家可以承担这项任务，因此决定在创始国[ROOT.GetCountry.GetName]举办奥运会。此后，理事会将每四年指定一个不同的地点。"
 vikelas.119.g: "然后在我们的场地组织比赛"
 vikelas.120.t: "国际奥林匹克委员会"
 vikelas.120.d: "为了振兴奥运会，[SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]成立了国际奥林匹克委员会，负责维护和组织奥运会的现代形式。决定在[SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFormatting]举办现代第一届奥运会。"
 vikelas.120.f: "第一届国际奥委会主要由[SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]的亲信组成，他们分散成一个小圈子。后来，其他国际奥委会成员也加入进来，这个由志同道合者组成的团体就变成了一个国际组织。最初的决定之一涉及首届奥运会的举办地点。由于目前还没有一个希腊民族国家可以承担这项任务，因此决定在创始国[SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFlag]举办奥运会。此后，理事会将每四年指定一个不同的地点。"
 vikelas.120.g: "我们[SCOPE.sCountry('vikelas_olympics_candidate_scope').GetNameNoFlag]见！"
 vikelas_3_winners_loc: "今年的奥运会不仅是一位到两位位获奖者，而且有 3 位！[GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName]、[GetGlobalVariable('vikelas_medal_rank_2_this_year_global_var').GetCountry.GetName]和[GetGlobalVariable('vikelas_medal_rank_3_this_year_global_var').GetCountry.GetName]都赢得了[GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|0V]@vikelas_gold_medals!金牌。"
 vikelas_2_winners_loc: "[GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName]和[GetGlobalVariable('vikelas_medal_rank_2_this_year_global_var').GetCountry.GetName]获得了[GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|0V]枚@vikelas_gold_medals!金牌，这意味着这两个国家都拥有世界顶级运动员。"
 vikelas_1_winner_loc: "[GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName]以[GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|0V]@vikelas_gold_medals!金牌数，称霸本届奥运会"
 vikelas_medal_rank_1_this_year_global_loc: "\n1.[GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|V0]‑[GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName]"
 vikelas_medal_rank_2_this_year_global_loc: "\n2.[GetGlobalVariable('vikelas_medal_rank_2_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|V0]‑[GetGlobalVariable('vikelas_medal_rank_2_this_year_global_var').GetCountry.GetName]"
 vikelas_medal_rank_3_this_year_global_loc: "\n3.[GetGlobalVariable('vikelas_medal_rank_3_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|V0]‑[GetGlobalVariable('vikelas_medal_rank_3_this_year_global_var').GetCountry.GetName]"
 vikelas_medal_rank_4_this_year_global_loc: "\n4.[GetGlobalVariable('vikelas_medal_rank_4_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|V0]‑[GetGlobalVariable('vikelas_medal_rank_4_this_year_global_var').GetCountry.GetName]"
 vikelas_medal_rank_5_this_year_global_loc: "\n5.[GetGlobalVariable('vikelas_medal_rank_5_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|V0]‑[GetGlobalVariable('vikelas_medal_rank_5_this_year_global_var').GetCountry.GetName]"
 vikelas_medal_rank_6_this_year_global_loc: "\n6.[GetGlobalVariable('vikelas_medal_rank_6_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|V0]‑[GetGlobalVariable('vikelas_medal_rank_6_this_year_global_var').GetCountry.GetName]"
 vikelas_medal_rank_7_this_year_global_loc: "\n7.[GetGlobalVariable('vikelas_medal_rank_7_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|V0]‑[GetGlobalVariable('vikelas_medal_rank_7_this_year_global_var').GetCountry.GetName]"
 vikelas_medal_rank_8_this_year_global_loc: "\n8.[GetGlobalVariable('vikelas_medal_rank_8_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|V0]‑[GetGlobalVariable('vikelas_medal_rank_8_this_year_global_var').GetCountry.GetName]"
 vikelas_medal_rank_9_this_year_global_loc: "\n9.[GetGlobalVariable('vikelas_medal_rank_9_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|V0]‑[GetGlobalVariable('vikelas_medal_rank_9_this_year_global_var').GetCountry.GetName]"
 vikelas_medal_rank_10_this_year_global_loc: "\n10.[GetGlobalVariable('vikelas_medal_rank_10_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|V0]‑[GetGlobalVariable('vikelas_medal_rank_10_this_year_global_var').GetCountry.GetName]"
 vikelas.121.t: "共产主义体操运动员"
 vikelas.121.d: "[SCOPE.sCharacter('vikelas_communist_athlete_scope').GetFullName]被认为是我国最有天赋的体操运动员之一，很有可能获得奖牌。然而其共产主义观念触怒了一些体育官员，因为害怕一些组织会利用其观念大做文章。"
 vikelas.121.f: "体操是最古老的奥林匹克运动项目之一，也是每届奥运会都有代表参加的四个项目之一。该运动由竞技体操、艺术体操和蹦床体操三个项目组成。艺术体操自1896年雅典奥运会以来一直是奥运会项目的一部分。"
 vikelas.121.g: "只要拿奖牌，什么都好说！"
 vikelas.121.h: "我们不是还有一个运动员吗？"
 vikelas.122.t: "反动的网球运动员"
 vikelas.122.f: "在1896年的第一届奥运会上，羽毛球和草地网球都被列入了比赛项目。不过，由于法国、英国和美国的知名选手不愿参赛，草地网球的参赛选手主要是希腊的无名选手。此外，还招募了其他项目的运动员，如英国掷铁饼运动员乔治·S·罗伯逊和匈牙利举重运动员莫姆契洛·塔帕维察。根据一个流传甚广的传说，运动员弗里德里希·阿道夫·特劳恩在雅典一家商店购买网球拍时，被爱尔兰人约翰·博兰劝说参加比赛。"
 vikelas.123.t: "运动员缺席比赛"
 vikelas.123.d: "我们的一名运动员因为不同的日历造成了混淆而错过比赛"
 vikelas.123.f: "“什么？又是日历？为什么会有这么多的日历？为什么没人告诉我？”\n\n#b 历史背景：#!特别是在第一届现代奥运会期间，希腊使用的儒略历法造成了一些问题，这意味着一些运动员甚至错过了他们的比赛。"
 vikelas.123.g: "他们为什么使用另一种日历？"
 vikelas_negative_influence_on_score_tt: "这可能会对[GetPlayer.GetName]赢得奖牌的概率产生#n 负面#!影响。"
 vikelas.124.t: "荣誉骑手"
 vikelas.124.d: "我们的单车手[SCOPE.sCharacter('vikelas_honorable_cyclist_scope').GetFullName]在他的竞争对手[SCOPE.sCharacter('vikelas_cyclist_with_problems_scope').GetFullName]的单车出现故障并需要修理时停下了骑车。在自行车修好后，两人又继续比赛。最终[SCOPE.sCharacter('vikelas_honorable_cyclist_scope').GetLastName]赢得了比赛。"
 vikelas.124.f: "“你的自行车[SCOPE.sCharacter('vikelas_cyclist_with_problems_scope').GetLastNameNoFormatting]怎么了？”\n“哦，只是链条出了点小问题。卡住了。谢谢你等我，[SCOPE.sCharacter('vikelas_honorable_cyclist_scope').GetLastNameNoFormatting]！”"
 vikelas.124.g: "一位真正的绅士！"
 vikelas.125.t: "被汽车撞倒的骑手"
 vikelas.125.d: "我们的自行车手[SCOPE.sCharacter('vikelas_cyclist_with_accident_scope').GetFullName]在参加街道赛时突然被一辆汽车撞倒。他受伤了，现在正在医院接受治疗。幸运的是，他似乎只受了点轻伤。"
 vikelas.125.f: "事故责任司机在接受采访时说：“真是个愚蠢的想法。在公共道路上进行自行车比赛。这条路属于我和我的车，而不是某个赛车手！”"
 vikelas.125.g: "怎么会这样……"
 vikelas.126.t: "街道赛中的大规模事故"
 vikelas.126.d: "在今年的街道赛中，狭小的街道造成了一起重大事故。幸运的是没有伤亡惨重，经过短暂休息后，比赛再次开始。"
 vikelas.126.f: "“谁能想到，参加比赛的数百名自行车手在3米宽的道路上出发却引发了事故？我们本以为参赛者在这种情况下会小心谨慎”，一位组织者对记者这样说。"
 vikelas.126.g: "棒极了！没有人因此而死！"
 vikelas.127.t: "醉酒骑手"
 vikelas.127.d: "[SCOPE.sCharacter('vikelas_drunken_cyclist_scope').GetFullName]为我国参赛的一名自行车手在比赛中喝醉了，然后掉头骑向了错误的方向。"
 vikelas.127.f: "“这位骑自行车的人本来并列第一，但后来下车来到酒馆，喝了整整两瓶白酒。我从没见过有人喝得这么快。之后，他走到外面就睡着了。我们试着叫醒他，不知什么时候，他醒了过来，骑着车急匆匆地走了。遗憾的是，他走错了方向。”"
 vikelas.127.g: "多么可耻的表现！"
 vikelas.128.t: "免费啤酒！"
 vikelas.128.d: "[SCOPE.sCharacter('vikelas_cheating_cyclist_scope').GetFullName]赢得了今年的街道赛，但不是因为他跑得最快，而是因为他没有停下来喝免费啤酒。"
 vikelas.128.f: "今年的奥林匹克街道赛出现了一个非常奇怪的胜利。在很长一段时间里，[SCOPE.sCharacter('vikelas_cheating_cyclist_scope').GetFullNameNoFormatting]都远远落在后面，但一张免费啤酒桌让他的对手们停下了脚步。在他们喝酒的时候，[SCOPE.sCharacter('vikelas_cheating_cyclist_scope').GetLastNameNoFormatting]偷偷超越并遥遥领先，最终取得了胜利。有人说，免费啤酒并非巧合，[SCOPE.sCharacter('vikelas_cheating_cyclist_scope').GetLastNameNoFormatting]实际上是花钱买的。但没有实际证据。"
 vikelas.128.g: "哈！这就是喝酒的后果！"
 vikelas_positive_influence_on_score_tt: "这可能会对[GetPlayer.GetName]赢得奖牌的概率产生#p 正面#!影响。"
 vikelas.129.t: "摔跤王赢得摔跤比赛"
 vikelas.129.d: "摔跤比赛[SCOPE.sCharacter('vikelas_schwingerkonig_scope').GetFullName]是本届奥运会摔跤比赛项目之一。"
 vikelas.129.f: "“我只能得到一枚金牌？要是在瑞士，我们能得到一头公牛！”"
 vikelas.129.g: "当之无愧的赢家！"
 vikelas.130.t: "拔河比赛"
 vikelas.130.d: "在奥运会上一场备受关注的拔河比赛中，我们的对手[SCOPE.sCountry('vikelas_rival_country_scope').GetName]多次侮辱我们，拿我们的国家、文化和语言开玩笑，扰乱了我们的团队，然后取得了胜利。"
 vikelas.130.f: "从1900年到1920年，拔河一直是奥运会项目的一部分。在现代拔河被认为是一项独立的运动，不过在过去，它被认为是重竞技或田径运动的一部分。只有两支队伍参加了在巴黎举行的比赛，一支是法国队，另一支是由丹麦人和瑞典人组成的混合队。每支队伍由六名运动员组成。比赛最多进行三轮，谁赢得其中两轮，谁就是获胜者。"
 vikelas.130.g: "他们终有一天会后悔的！"
 vikelas.131.t_fencing: "剑术名将"
 vikelas.131.t_shooting: "射击名将"
 vikelas.131.t_riding: "骑行名将"
 vikelas.131.d_fencing: "[SCOPE.sCharacter('vikelas_olympic_general_scope').GetFullName]参加了奥运会，并以其非凡的击剑技巧令对手大吃一惊。虽然只获得了一枚银牌，但对于他的同胞来说，他才是真正的赢家。"
 vikelas.131.d_shooting: "[SCOPE.sCharacter('vikelas_olympic_general_scope').GetFullName]参加了奥运会，他对枪械的技巧无人能及。虽然未能赢得金牌，但在国内仍被视为英雄。"
 vikelas.131.d_riding: "在奥运会上，[SCOPE.sCharacter('vikelas_olympic_general_scope').GetFullName]的骑术令人印象深刻，许多观众将其视为冠军。虽然成绩被取消了，但他仍被认为是运动会上最受观众喜爱的选手。"
 vikelas.131.f_fencing: "击剑是1896年雅典奥运会的创始项目之一，在雅典奥运会的击剑项目有三项。1900年在巴黎增加了重剑比赛，1920年在安特卫普增加了团体击剑比赛。1920年，女子花剑首次在安特卫普进行。此外，重剑是现代五项中的五个项目之一，现代五项被重新设计为奥运会比赛项目，并于1912年斯德哥尔摩夏季奥运会期间首次出现。"
 vikelas.131.f_shooting: "国际奥委会在第二届奥林匹克运动会的奥运项目中安排了九个射击项目。在6000多名参赛射手中，只有72名运动员参加了奥运会比赛。有奖射击在当时非常普遍，而且利润丰厚，但以体育成绩换取金钱并不符合奥林匹克精神，这也是为什么不允许专业运动员参加奥运会比赛的原因。其他不具有奥林匹克性质的比赛还有实弹射击、弩射击和大炮射击。"
 vikelas.131.f_riding: "国际奥委会在第二届奥林匹克运动会的奥运项目中安排了三项马术比赛，这是骑马首次成为奥运项目。参加这三项比赛的确切人数已无从考证。只有来自5个国家的15名骑手的名字为人所知。不过，还有50名运动员参加了比赛，但不能排除其中有一些人是多次参赛。在巴黎、伦敦和斯德哥尔摩举行的比赛最初只允许官员参加。直到在安特卫普举行的第七届奥运会期间，这一规定才有所放宽。"
 vikelas.131.g: "一位优秀的运动员"
 vikelas.132.t_rowing: "赛艇名将"
 vikelas.132.t_sailing: "帆船名将"
 vikelas.132.t_swimming: "游泳名将"
 vikelas.132.d_rowing: "[SCOPE.sCharacter('vikelas_olympic_admiral_scope').GetFullName]不仅是一名优秀的海军，还是一名出色的赛艇运动员。他与自己的团队一起参加了奥运会，赢得了同事和观众的尊重。"
 vikelas.132.d_sailing: "[SCOPE.sCharacter('vikelas_olympic_admiral_scope').GetFullName]利用在奥运会上学习的经验，成功地与其帆船队一起赢得了银牌，这一骄人成绩鼓舞了整个国家。"
 vikelas.132.d_swimming: "奥运会上出现了一个意外。在同事不知情，也没有通知政府的情况下，[SCOPE.sCharacter('vikelas_olympic_admiral_scope').GetFullName]以一名普通运动员的身份参加了奥运会。谁能想到他会是如此出色的游泳运动员？虽然不足以获得金牌，但足以给人留下深刻印象，真是个多面手！"
 vikelas.132.f_rowing: "在巴黎举行的第二届奥运会上，赛艇比赛的组织工作非常糟糕，委员会不得不组织了两场决赛。这两场决赛都被列入国际奥委会的获奖名单，这表明人们对当年夏季奥运会举办时的环境已难以接受。"
 vikelas.132.f_sailing: "自1900年以来，帆船比赛一直是奥运会项目的一部分，在巴黎举行的第二届现代奥林匹克运动会上，参赛队首次通过帆船比赛争夺奖牌。帆船比赛本应于1896年在雅典举行的奥运会上首次亮相，但由于天气条件恶劣，比赛未能举行。除1904年夏季奥运会外，每届奥运会都有帆船比赛。大多数奥运会帆船比赛都采用所谓的船队比赛形式。不过，也有一些奥运会采用对抗赛船队或对抗赛混合赛制。"
 vikelas.132.f_swimming: "在1896年夏季奥运会上，共有四项游泳比赛，均为男子项目，均于玉米湾举行。玉米湾是雅典地区的一个海港和码头，之所以将其用作游泳比赛场地，是因为奥运会组织者希望避免花钱建造一个专门的游泳比赛场地。共有来自4个国家的13名选手参赛。女子游泳于1912年被引入奥运会。"
 vikelas.133.t_boxing: "拳击政治家"
 vikelas.133.t_wrestling: "摔跤政客"
 vikelas.133.t_archery: "射箭政客"
 vikelas.133.d_boxing: "许多人知道[SCOPE.sCharacter('vikelas_olympic_politician_scope').GetFullName]是一个思维敏捷的演讲者。但他在奥运比赛中展示出良好的体力，也许他的政治对手们今后应该更加小心？"
 vikelas.133.d_wrestling: "如果有人怀疑[SCOPE.sCharacter('vikelas_olympic_politician_scope').GetFullName]是一名天才摔跤手，他的政敌们一定会让你三思而后行。在奥运会上，他赢得的同情几乎与他所在的政党一样多。这几乎足以让他赢得金牌！"
 vikelas.133.d_archery: "[SCOPE.sCharacter('vikelas_olympic_politician_scope').GetFullName]的演讲一直被视作有的放矢。然而，在参加奥运会之前，只有他最亲密的朋友才知道他在业余时间是个天才射手。如果选民们像国际体育节上的观众一样喜爱他，那么他很快就会成为国家的最高领导人！"
 vikelas.133.f_boxing: "拳击是最古老的奥林匹克运动项目之一。作为现代拳击前身的空手搏斗起源可追溯到公元前688年的奥林匹克运动会。在1904年圣路易斯奥运会上，拳击作为现代奥林匹克运动项目首次亮相。不过，只有美国人参加了比赛，7个重量级共44人参赛。1912年没有举行奥运会拳击比赛，因为当时瑞典禁止拳击。"
 vikelas.133.f_wrestling: "1896年夏季奥运会上举行了一项摔跤比赛。该比赛由摔跤和体操小组委员会组织和筹备。来自四个国家的五名选手参加了比赛。摔跤比赛最初采用希腊罗马式摔跤，1904年开始采用自由式摔跤。摔跤之所以在奥运会上占有重要地位，主要是因为古代奥运会就已经有了这一项目。"
 vikelas.133.f_archery: "国际奥委会（IOC）在第二届奥林匹克运动会的奥运项目中安排了六项射箭比赛，因为根据现代奥运会创始人皮埃尔·德·顾拜旦和国际奥委会的说法，国际参与是射箭成为奥运比赛的基本要求。射箭在当时是一项很受欢迎的运动，因此开幕式上举行了盛大的游行，有1723名射箭运动员参加。5254名射手参加了整个比赛。在奥运会项目的六项比赛中，只有来自法国和比利时的 17名参赛者的名字为人所知。然而，参加这些比赛的射手人数要多得多。体育史学家认为，参加比赛的总人数为153人，其中包括来自荷兰的运动员。"
 vikelas.134.t: "奥运冠军"
 vikelas.134.d: "多少次的努力、积年累月的训练以及永不服输的精神最终带给了[SCOPE.sCharacter('vikelas_olympic_champion_scope').GetFullName]期待已久的胜利：这位奥运会选手已经作为奥运会冠军满怀骄傲地戴上了金牌！"
 vikelas.134.f: "我们今天所知的奥运会奖牌体系——冠亚季军分别获得金银铜牌实际上在一开始的奥运会上并不存在。在1896年和1900年中只有冠军获得银牌而亚军获得铜牌。从1904年开始，才第一次开始颁给冠军金牌而银牌和铜牌依次顺延。"
 vikelas.134.g: "民族英雄！"
 vikelas.141.t: "没有帆船？！"
 vikelas.141.d: "尽管今年的奥林匹克运动会应该举办帆船比赛，但却不知为什么没人准备帆船。这可能意味着今年的帆船比赛已经结束了。"
 vikelas.141.f: "“帆船在哪儿？”\n“我想你该问问自己这个问题，你才是负责这个的人。”\n“我？我已经负责操办了赛艇比赛。你才应该负责帆船比赛！”\n\n#b 历史背景：#!第一届奥运会中帆船比赛没能正常举办就是因为运动员和赛事举办方都没准备帆船。"
 vikelas.141.g: "这是我们国家的奇耻大辱！不管从哪儿，给我把帆船弄来！"
 vikelas.141.h: "我估计今年是没有帆船项目了。"
 vikelas.142.t: "被操纵的足球比赛？"
 vikelas.142.d: "有人怀疑我国与[SCOPE.sCountry('vikelas_olympics_football_country_scope').GetName]之间的足球比赛是否公平公正。观察家们表示裁判明显满怀偏见并且会做出有利于我们的判罚。"
 vikelas.142.f: "在1908年奥运会上足球比赛才成为了正式项目，此前只是表演赛项目，直到1908年才开始举办正式的国际比赛。记载中1908年奥运会的第一次正式比赛是丹麦国家队赢得了法国国家B队（仅次于正式的法国国家队）。直到1928年，夏季奥林匹克运动会足球比赛的地位几乎与世界杯相当。但在1930奥运会和足球职业化后，其重要性急剧下降。特别是在上世纪二三十年代的欧洲和南美洲的某些国家，夏季奥林匹克运动会足球比赛几乎成了业余选手参加的比赛，因为这些国家最好的运动员被禁止参赛。"
 vikelas.142.g: "这可是明显越位！"
 vikelas.142.h: "[SCOPE.sCountry('vikelas_olympics_football_country_scope').GetName]无可置疑地赢得了比赛。"
 vikelas.143.t: "新的马拉松传奇"
 vikelas.143.d: "马拉松运动员[SCOPE.sCharacter('vikelas_olympic_marathon_athlete_scope').GetFullName]以如此令人印象深刻的方式赢得了比赛，现在被视作民族英雄！"
 vikelas.143.f: "戴着白色手套的[SCOPE.sCharacter('vikelas_olympic_rival_athlete_1_scope').GetFullName]是[SCOPE.sCountry('vikelas_olympic_rival_country_1_scope').GetName]的明星，他甩开了[SCOPE.sCountry('vikelas_olympic_rival_country_2_scope').GetName]的[SCOPE.sCharacter('vikelas_olympic_rival_athlete_2_scope').GetFullName]与[SCOPE.sCountry('vikelas_olympic_rival_country_3_scope').GetName]的[SCOPE.sCharacter('vikelas_olympic_rival_athlete_3_scope').GetFullName]，这三人在最初的1500米中一马当先。据说，[SCOPE.sCharacter('vikelas_olympic_marathon_athlete_scope').GetLastName]在22千米处的棚屋喝下了一杯葡萄酒，并高声宣告了自己的胜利。他守住了自己的承诺，超越了所有人，只有[SCOPE.sCharacter('vikelas_olympic_rival_athlete_2_scope').GetFullName]可以望其项背，但随后就倒在地上。[SCOPE.sCharacter('vikelas_olympic_marathon_athlete_scope').GetLastName]据传在路上吃了羊奶奶酪，喝了白兰地，还听了同胞们热切的话语。他跑进体育场，筋疲力竭地跪在君主面前：‘我只是一个农民的儿子，我的[SCOPE.sCharacter('vikelas_ruler').GetPrimaryRoleTitle]。’"
 vikelas.143.g: "一位真正的奥林匹克运动会选手！"
 vikelas.144.t: "组织良好的奥运会"
 vikelas.144.d: "奥运会的其他参赛国对良好的组织工作赞不绝口。一切都进行得很顺利。"
 vikelas.144.f: "‘举办奥运会就是创造历史。’——皮埃尔·德·顾拜旦"
 vikelas.144.g: "优秀。"
 vikelas.145.t: "广受赞誉的东道主"
 vikelas.145.d: "运动员和外国观众对我国的热情好客赞不绝口。我们给世界留下了美好的印象。"
 vikelas.145.f: "‘奥运会是为全世界举办的，所有国家都应当参加。’——皮埃尔·德·顾拜旦"
 vikelas.151.t_sailing: "问题重重，但帆船比赛如期进行"
 vikelas.151.t_no_sailing: "没有帆船比赛"
 vikelas.151.d_sailing: "尽管[SCOPE.sCountry('vikelas_olympics_host_scope').GetName]最初没有为帆船比赛组织船只，但还是从其他城镇和国家获得了一些帆船。"
 vikelas.151.d_no_sailing: "由于[SCOPE.sCountry('vikelas_olympics_host_scope').GetName]没有为帆船比赛组织船只，今年的比赛将不会举行。"
 vikelas.151.f_sailing: "由于附近港口的帆船到来，帆船比赛在最后一刻才得以继续。值得庆幸的是，天气也为比赛提供了良好的条件。\n\n#b 历史背景：#!第一届奥运会中帆船比赛没能正常举办就是因为运动员和赛事举办方都没准备帆船。"
 vikelas.151.f_no_sailing: "帆船赛未能举行的原因是一些特殊船只的登船问题没有得到解决。\n——查拉兰博斯·安尼诺斯\n\n#b 历史背景：#!第一届奥运会中帆船比赛没能正常举办就是因为运动员和赛事举办方都没准备帆船。"
 vikelas.151.g: "希望我们的运动员能赢！"
 vikelas.151.h: "我们的对手少了一枚奖牌！"
 vikelas.151.i: "我有更重要的事情要处理。别烦我。"
 vikelas.161.t: "马拉松漫游指南"
 vikelas.161.d: "当我们的选手[SCOPE.sCharacter('vikelas_hitchhiker_scope').GetFullName]第一个冲过终点线时，所有人都欢呼雀跃。但不久之后，人们发现他在途中11公里处搭乘了一辆马车。因此[SCOPE.sCharacter('vikelas_hitchhiker_scope').GetLastName]被取消了资格。他说自己只是想开个玩笑，但这可能会损害我们国家的地位。"
 vikelas.161.f: "“他随身带着一条毛巾。我怎么知道他参加了奥运会？如果你随身带着一条毛巾，你就做好了一切准备！。”\n"
 vikelas.161.g: "别慌！"
 vikelas.162.t: "野狗袭击"
 vikelas.162.d: "我们的马拉松运动员[SCOPE.sCharacter('vikelas_chased_by_dogs_scope').GetFullName]不小心冲进了草丛中，里面跳出来一只野狗并开始追着他跑。直到他跑到玉米地里躲起来，狗才停下。"
 vikelas.162.f: "“汪！汪汪！”"
 vikelas.162.g: "他怎么能进到草里去！？"
 vikelas.163.t: "瞄准错误目标"
 vikelas.163.d: "我们的一位射手[SCOPE.sCharacter('vikelas_bad_shooter_scope').GetFullName]在此前取得了满分，只剩下最后一枪了。最后一枪也击中了靶心……但打错了目标。这一枪被视为0分，[SCOPE.sCharacter('vikelas_bad_shooter_scope').GetLastName]因此失去了胜利。"
 vikelas.163.f: "“我发誓我打中了！我百分之百确信！我从来不会射错目标！从来没有过！”\n"
 vikelas.163.g: "多么糟糕的失败！"
 vikelas.182.t: "奥林匹克火炬"
 vikelas.182.d: "前往[SCOPE.sCountry('vikelas_olympic_country').GetName]为奥运会揭幕的奥林匹克火炬手今天途经[SCOPE.sState('capital_scope').GetName]。这是一次鼓舞人心的活动！"
 vikelas.182.f: "奥林匹克圣火，传闻取自希腊女神赫斯提亚（炉灶女神）永不熄灭的炉火，在1928年阿姆斯特丹奥运会上首次亮相。而奥运火炬传递的传统是在1936年柏林夏季奥运会上正式确立的。与普遍看法相反，这个想法并非来自国家社会主义者，而是来自德国犹太考古学家阿尔弗雷德·希夫。这一传统的引入不仅会给奥运会带来新的身份象征，而且每年都会将人们聚集在一起，并成为一个令人振奋的象征，分散人们对其他不满的注意力。"
 vikelas.182.g: "面包和马戏。"
 vikelas.183.t: "奥林匹克圣火"
 vikelas.183.d: "在精彩纷呈的开幕式上，世界各国的运动员列成壮观的队伍亮相，随后，奥运圣火被点燃，成为全场的亮点。观众们激动不已！"
 vikelas.183.f: "在20世纪，奥林匹克运动会日益转变为一种大众现象，其仪式与世俗理念使一个与宗教和民族理想格格不入的社会找到了某种意义——无论是在民族意义上还是在世界意义上。一些人认为这是一个强调本国杰出地位的机会，而对另一些人来说，各国和平相聚参加体育比赛的理念则发挥了更大的作用。然而，对于主办国来说，这是一个以前所未有的方式向本国人民和世界展示自己的机会。"
 vikelas.183.g: "我国人民将我们视为一个伟大的国家。"
 vikelas.183.h: "世界各国把我们视为一个伟大的国家。"
 vikelas.191.t: "[ROOT.GetCountry.GetNameNoFlag]的国际奥委会"
 vikelas.191.d: "由于政局变动，国际奥委会不得不迁移其总部。他们认为[ROOT.GetCountry.GetNameNoFlag]是合适地点，并且提出将委员会主席之位授予该国。"
 vikelas.191.f: "如果国际奥委会最初的创始国由于某种原因从地图上消失，国际奥委会将把总部迁往另一个国家，并完全重新选举。作为回报，该流亡国可以担任主席。这种情况下的典型候选国是瑞士或希腊。如果这两个国家也不存在，主席职位就会提供给一个已经在理事会拥有席位的列强。"
 vikelas.191.g: "选举新的国际奥委会。"
 vikelas_no_more_olympic_flavor_notification_events_tt: "你将#n 不再#!收到有关奥林匹克运动会的风味事件。"
 vikelas_ioc_president_modifier: "国际奥委会主席"
 vikelas_our_games_our_rules_modifier: "我们的比赛，我们定规则"
 vikelas_olympics_preparation_modifier: "预备举办奥林匹克运动会"
 vikelas_olympics_hosting_modifier: "举办奥林匹克运动会"
 vikelas_olympics_hosted_modifier: "已举办奥林匹克运动会"
