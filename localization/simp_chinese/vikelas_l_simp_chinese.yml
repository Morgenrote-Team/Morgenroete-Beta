 je_vikelas_baseball: "棒球运动员"
 je_vikelas_baseball_reason: "19世纪，棒球正式确立为美国的国民运动，并由此踏上全球传播之路。历史上首场有正式记录的比赛于1846年在新泽西州霍博肯举行。1860年代，该项目实现快速职业化发展；1876年，首个顶级职业联赛——国家联盟正式成立。与此同时，随着美国大兵、商人与传教士的脚步，棒球开始跨越国界，向世界其他地区扩散。"
 je_vikelas_baseball_fail: "有其他国家在[GetPlayer.GetName]之前发明棒球。"
 je_vikelas_football: "足球"
 je_vikelas_football_reason: "统一的足球规则最早于1840年代在英格兰出现，足球协会于1863年成立，而首场正式国际比赛则于1872年在英格兰与苏格兰之间举行。足球从大不列颠传播至欧洲大陆和南美洲。自19世纪90年代起，德国、法国、意大利和西班牙相继成立了国家足协和联赛。与此同时，足球也传入阿根廷、巴西和乌拉圭，英国铁路工人和移民在当地建立了最早的俱乐部。"
 je_vikelas_football_fail: "有其他国家在[GetPlayer.GetName]之前发明足球。"
 je_vikelas_cricket: "板球"
 je_vikelas_cricket_reason: "板球的起源可追溯至中世纪晚期：早在16世纪，肯特郡的儿童就已玩一种简单的击球游戏，古文献中称之为“creckett”或“creag”。然而，直到18世纪，这项运动才逐渐发展为一项复杂且有规则的竞技活动。在此期间，首批有组织的俱乐部相继出现；1787年，伦敦玛丽勒本板球俱乐部（MCC）成立，标志着板球拥有了核心机构。MCC制定了首套具有约束力的比赛规则，成为现代板球运动的起点。"
 je_vikelas_cricket_fail: "有其他国家在[GetPlayer.GetName]之前发明板球。"
 je_vikelas_cricket_national_league: "国家板球联赛"
 je_vikelas_cricket_national_league_reason: "19世纪，板球在英格兰早已是贵族与平民共爱的消遣活动，此时开始走向更加组织化的结构。决定性时刻出现在1890年——世界上首个正式国内板球联赛郡际锦标赛诞生。在此之前，各郡之间的比赛虽自18世纪便已存在，但并无正式积分制度或排名表。郡际锦标赛为英格兰板球带来了标准化竞赛体系，约克郡、萨里郡和兰开夏郡在早期成为主导力量。英格兰以外的板球俱乐部，尤其是澳大利亚和南非，也陆续开始组织有体系的赛事。"
 je_vikelas_baseball_national_league: "国家棒球联赛"
 je_vikelas_baseball_national_league_reason: "19世纪60年代，此前主要流行于纽约的棒球运动在美国风靡全国。美国内战期间士兵们在军营中进行的棒球比赛在这项运动的普及中扮演了决定性因素。1857年，美国第一个棒球协会——全国垒球运动员协会成立。到1867年，已有400多个俱乐部加入该协会。不过，实力最强的球队仍分布在美国东北部，特别是纽约。NABBP的后继组织全国职业棒球运动员协会 (NAPBBP) 成立于1871年，也被称为全国协会(NA)，被视作世界上第一个职业棒球联盟。"
 je_vikelas_football_national_league: "国家足球联赛"
 je_vikelas_football_national_league_reason: "19世纪末，足球在英国已从公学与地方社区中松散组织的消遣活动，转变为一场全国性的社会现象。推动这一转变的关键，是1863年英格兰足球协会的成立，该组织统一了比赛规则，使有组织的竞赛成为可能。到了1870年代，这项运动迅速流行开来，尤其在工业城市的工人阶层中广受欢迎。1888年，英格兰正式成立“足球联赛”，成为世界上首个职业足球联赛。它汇集了来自中部和北部地区的12家俱乐部，普雷斯顿北区、阿斯顿维拉等球队在早期便展现出强大实力。 "
 je_vikelas_basketball_national_league: "国家篮球联赛"
 je_vikelas_basketball_national_league_reason: "20世纪初，由詹姆斯·奈史密斯于1891年发明的篮球运动，从基督教青年会（YMCA）的训练活动演变为竞技项目。关键发展节点是1898年美国国家篮球联盟（NBL）的成立——该联盟被公认为全球首个职业篮球联赛，由来自宾夕法尼亚州与新泽西州的六支球队组成，标志着篮球职业化的开端。但初创的NBL仅存续至1904年便宣告解散。直至1946年，随着篮球协会（BAA）的成立（后合并改组为NBA），职业篮球才真正成为一项稳定的全国性产业。"
