 je_vikelas_bicycle_race_reason: "企业家、出版商和自行车制造商正在提议举办一场长距离公开比赛，以证明新型安全自行车的速度、强度和前景。"
 je_vikelas_basketball: "篮球"
 je_vikelas_basketball_reason: "快速、以团队为基础、为现代城市而打造——它可能是本世纪的游戏。"
 vikelas.21.t: "绅士的游戏"
 vikelas.21.d: "在[SCOPE.sState('vikelas_cricket_state').GetName]，一群板球运动员首次聚集在一起，按照既定规则进行比赛。该俱乐部由此确立了在这项运动中的开创性地位。"
 vikelas.21.f: "19世纪见证了板球从一项乡村娱乐活动，逐步演变为具有国家乃至国际意义的重要运动。英国上层阶级将其奉为钟爱的休闲方式——伊顿、哈罗等贵族寄宿学校大力推广，板球因而被推崇为“绅士的运动”。与此同时，这项运动也迅速在工人阶级中普及，尤其是在英格兰北部，工厂工人自发组织起众多俱乐部。这种日益大众化的趋势，催生了俱乐部数量与观众规模的空前扩张。 \n\n国际赛事紧随其后。1844年，首场有正式记录的国际板球赛在纽约举行，由加拿大对阵美国。"
 vikelas.21.g: "把球板递给我！"
 vikelas.601.t: "人行道上的踏板"
 vikelas.601.d: "林荫大道上出现了一种新发明——一种直接连接在前轮上的踏板驱动的双轮装置，它被称为“自行车”。"
 vikelas.601.f: "在首都的公园和宽阔的街道上，人们纷纷转头。戴着帽子和穿着背心的绅士们骑在奇形怪状的铁架上，猛踩着踏板，摇摇晃晃地穿过惊慌失措的人群。有人摔倒，有人飞起。孩子们哈哈大笑，资深政客们则扬起了眉毛。报纸称之为“le vélocipède”（一半玩具，一半希望）。这款由马车制造商发明的“摇骨车”既沉重又有革命性。在鹅卵石路上，它会震得人脊背发凉。但在平坦的人行道上，它却以惊人的优雅姿态前进。有人低声说，这不仅仅是一种新奇事物，而是一种新型运动的种子。"
 vikelas.601.g: "有趣！时尚！"
 vikelas.602.t: "未来的自行车"
 vikelas.602.d: "一种新型自行车问世了，其特点是车轮尺寸均匀，后轴采用链条传动，平衡性也得到了提升。与那些摇摇欲坠的高轮自行车不同，这种“安全自行车”稳定可靠、价格实惠，而且迅速风靡一时。它的发明者是谁？是[SCOPE.sCharacter('vikelas_bicycle_inventor_scope').GetFullName]！"
 vikelas.602.f: "老式自行车既让人骨头酸痛，又让人神经紧绷。高耸的新自行车速度很快，但很少有人愿意为此付出代价——稍有不慎，骑手就会飞驰而去。如今，一种新型自行车正在首都中风靡，它后轮采用链条传动，轮胎为充气轮胎，就连女士和工人也开始骑车。曾经被马车统治的街道，如今回荡着橡胶在石板上轻柔摩擦的嗡嗡声。无论是在咖啡馆还是工厂，人们的评价都是一样的：这不是玩具。它是自由！快速、安静，而且触手可及。"
 vikelas.602.g: "让每一位公民都驰骋。"
 vikelas.611.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.611.d: "这一天已经到来，来自全国各地的车手聚集在起跑线上，渴望在开阔的道路上检验人和机器的能力，空气中弥漫着期待的气息。"
 vikelas.611.f: "太阳升起，大道上早已挤满了观赛者。横幅飘扬，清晨的空气中弥漫着油污和尘土的气味。数十名骑手骑上自行车——有些是刚从工厂出厂的闪闪发光机器，有些则是在后巷作坊里拼凑起来的。一声枪响。欢呼声响起，车轮开始转动。他们骑出城门，驶入乡村。农民在田间驻足。孩子们在路边奔跑。牧师为他们祝福。愤世嫉俗的人则嗤之以鼻。然而，随着他们身后尘土飞扬，人群中涌起一种奇特的感觉：这感觉像是某种更伟大事件的开端。"
 vikelas.611.g: "让每个城镇都听到进步的呼啸声。"
 vikelas.621.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.621.d: "这位全国自行车赛的冠军，赢得的不只是终点线，更是整个民族的心与目光。如今，他不再只是一个选手，而是一种象征——一种被千万人注视、期待、甚至信仰的象征。"
 vikelas.621.f: "报纸称他为“铁骑手”。他出身织工家庭，十二岁便成了孤儿，十六岁就在工厂做工。他骑着一辆破旧的安全自行车——补了又补、刮痕累累，却保养得一丝不苟——赢得比赛，这不仅仅是一场体育上的胜利，更是一个寓言。\n\n人群高呼他的名字，画家为他作像，孩子们模仿他的姿势。但更重要的是，思想家们注意到了他。有人称他是劳动力量的象征，有人说他证明了国家的生命力。媒体争论着他究竟是工人、爱国者——还是某种全新的存在。\n\n而这位车手本人却鲜少发言。他微笑、点头、继续骑行。"
 vikelas.621.g: "让他成为工人阶级的英雄。"
 vikelas.621.h: "为他成为民族象征庆祝。"
 vikelas.621.i: "将他树立为进步与现代精神的象征。"
 vikelas.622.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.622.d: "全国自行车赛事期间发生了一起悲惨事故，一名选手不幸身亡，数人受伤。现场的欢呼声骤然停止。"
 vikelas.622.f: "一个车轮卡进了车辙。一声惊叫，一场撞击，接着是此起彼伏的尖叫。观众纷纷向前涌去，自行车如多米诺骨牌般接连倒下。鲜血混入尘土，头盔破裂，骨骼折断。一名年仅十七岁的青年——一位工厂学徒——当场身亡。媒体意见不一，有人称之为进步必须付出的代价，也有人谴责公众体育赛事的鲁莽与危险。"
 vikelas.622.g: "缅怀逝者。"
 vikelas.623.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.623.d: "这场赛事中的某一段落已深深打动民众。观众谈及它时，不再仅仅将它看作一场比赛，而更像是一段传奇。"
 vikelas.623.f: "黎明时分，骑手们驶入群山之间。此后的征程，早已不再是单纯的竞技，而是一次意志的试炼。十余人逐渐落后，三人因体力不支倒下，一人在发卡弯处发生事故，满身是血地站起来，挥手拒绝救援。唯有一人，在晨雾中奋勇前行，直抵万千人心。全国上下，无人不谈此事。"
 vikelas.623.g: "愿这条道路铭记他的付出，流传百世。"
 vikelas.623.h: "为这一时刻委托创作一幅画作。"
 vikelas.624.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.624.d: "最新赛段结束后，争议骤然爆发。一名车手被查出作弊——不过也有人表示，他不过是做了圈内司空见惯的事，只是手段不够隐秘而已。"
 vikelas.624.f: "“有人说他在谷仓后换了车；也有人说是靠一根隐蔽的滑索上了山。”\n\n真相早已模糊难辨。但有一点确凿无疑：这名车手快得离谱，快得令人咋舌。在经历了一段极其艰难的爬坡后，他却显得精力充沛。他的对手愤怒不已，观众震惊莫名，媒体则紧咬不放。一张照片显示，有人穿着相同的服装出现在同一地点；另一位证人坚称，在夜赛过程中曾看见一辆车暗中推动他前进。面对指控，他坚决否认，称这一切不过是出于嫉妒和政治动机。"
 vikelas.624.g: "取消该选手的参赛资格，并公开其舞弊行为。"
 vikelas.624.h: "为了赛事的声誉，糊弄过去。"
 vikelas.625.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.625.d: "今年的赛季被一场激烈的竞争所主导。两位车手——实力相当，风格迥异——将全国分成了两个阵营。"
 vikelas.625.f: "一位如火——鲁莽、大胆，深受年轻人喜爱。他将帽子抛向人群，边骑车边狂笑，大开大合。\n\n另一位似冰——冷静、缜密，几乎像数学般精确。他保存体力，以秒定胜负，只在必要时开口说话。\n\n他们的名字被人们从屋顶高喊而出。城镇各选其主，海报以红蓝两色印制，裁缝售卖他们代表色的帽子，孩子们则骑着木制自行车模仿他们的姿势。\n\n报纸谈论的已不只是比赛。他们在探讨人格、理念，乃至一个民族渴望的身份认同。而两位车手，谁也不愿退让一步。"
 vikelas.625.g: "这对新闻文化有益。"
 vikelas.625.h: "将这场竞争转化为政治资本加以利用。"
 vikelas.626.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.626.d: "今年的赛季被一场激烈的竞争所主导。两位车手——实力相当，风格迥异——将全国分成了两个阵营。"
 vikelas.626.f: "“他们在村庄的铁匠铺里找到了他，手里握着锤子，脸上满是煤灰，独自一人。”\n\n这段下坡异常凶险。一个判断失误的弯道，一阵碎石滑动——前叉应声断裂。他的自行车像一只受伤的鸟般塌陷下来。大多数人在这种情况下都会选择放弃。但他没有。\n他一瘸一拐地推着车架走了好几公里，最终在一个偏远村庄找到了一家铁匠铺。这里没有机械师，也没有支援车队，只有风箱、铁砧和他自己的双手。\n他连续工作了数小时——卷起衣袖，咬紧牙关，仅凭记忆与手感重新打造了前叉。当赛事官员赶到时，他只是冷冷地瞪了一眼，说道：“别碰它。”\n比领先者落后了八个小时，他再次骑上自行车踏上征途。已无夺冠可能，但沿途的人群却纷纷起身欢呼——他们不是在为胜利者喝彩，而是在为那个拒绝停下脚步的人鼓掌。"
 vikelas.626.g: "多么振奋人心的故事。"
 vikelas.626.h: "批准进行紧急修复。"
 vikelas.626.i: "对他加以礼遇！"
 vikelas.401.t: "国际足球联合会"
 vikelas.401.d: "今日，国际足球联合会在[GetGlobalVariable('vikelas_fifa_seat_global_var').GetStateRegion.GetCityHubName]正式成立。其全名为Fédération Internationale de Football Association（简称FIFA）。"
 vikelas.401.f: "1904年5月21日，来自七个国家——比利时、丹麦、法国、荷兰、西班牙、瑞典和瑞士的代表签署了一份章程。目标是统一足球规则、组织国际比赛，并将这项运动推向全球舞台。国际足球联合会（FIFA）由此诞生。\n\n在成立的最初几十年里，FIFA规模尚小：主席为兼职，球员皆为业余选手，地区争端频发。但在表象之下，一场全球性的运动正在悄然兴起。英格兰犹豫不决，担心外国干涉；南美国家则开始建立自己的洲际联盟。1924年与1928年的奥运会赛事展现了足球真正的影响力：巴黎赛场涌入六万名观众，他们不是为军队而是球队欢呼。"
 vikelas.401.g: "加入FIFA并支持国际赛事。"
 vikelas.411.t: "足球世界杯[TimeKeeper.GetCurrentDate.Format('y')]"
 vikelas.411.d: "国际足联已决定，今年的世界杯将在[SCOPE.sCountry('vikelas_fifa_host_scope').GetName]举行。预赛结束后，夺冠热门球队被缩小至八支。"
 vikelas.411.f: "#V 以下国家队已成功晋级四分之一决赛：#!\n\n[SCOPE.sCountry('vikelas_first_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_second_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_third_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fourth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fifth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_sixth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_seventh_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_eighth_qualified_team_scope').GetName]"
 vikelas.411.g: "愿最强者胜出！"
 vikelas.412.t: "世界冠军"
 vikelas.412.d: "我们的队伍在世界赛场上夺冠，战胜了来自各大洲的顶尖强队。举国上下，欢腾如沸！"
 vikelas.412.f: "在与[SCOPE.sCountry('vikelas_second_winner_team_scope').GetName]展开的激烈对决中，我们的球队于[SCOPE.sCountry('vikelas_fifa_host_scope').GetName]举行的世界杯决赛中脱颖而出。国家队成功捧起金杯，荣耀加冕。终场哨声通过广播、咖啡馆与军营回荡全国——北至矿区，南至港口，举国上下同庆胜利。队长在颁奖台上热泪盈眶，而新一代的少年们，则静静注视，心生向往。"
 vikelas.412.g: "我们是冠军！"
 vikelas.413.t: "[SCOPE.sCountry('vikelas_fifa_host_scope').GetName]的亚军"
 vikelas.413.d: "我们的球队打入了决赛——却与荣耀擦肩而过。在全国各地，自豪与失落交织，悲喜参半。"
 vikelas.413.f: "遗憾的是，我们的队伍拼尽全力，却仍未能胜出。面对[SCOPE.sCountry('vikelas_first_winner_team_scope').GetName]的强劲挑战，我们的球员最终惜败。过去数周，他们承载着全国人民的期待，在泥泞中奔跑，在酷暑中奋战，在信念中前行。一场比赛接着一场比赛，他们已然成为传奇。当对手的国歌奏响，他们依旧昂首挺胸。没有泪水，只有沉静——随后，掌声缓缓响起，敬献英雄。"
 vikelas.413.g: "他们偷走了冠军！"
 vikelas.414.t: "夜半梦醒"
 vikelas.414.d: "我国球队在[SCOPE.sCountry('vikelas_fifa_host_scope').GetName]举行的世界杯中早早出局。最终，[SCOPE.sCountry('vikelas_first_winner_team_scope').GetName]在决赛中击败[SCOPE.sCountry('vikelas_second_winner_team_scope').GetName]，夺得冠军。"
 vikelas.414.f: "曾几何时，那份希望真实而具体地存在过：工厂院落里爆发出欢呼，教堂角落低语着赛事解说，孩子们在街头巷尾重现精彩进球。这支球队承载的意义远超绿茵赛场——它是雄心，是荣耀，是一种“我们可以超越自己”的信念。然而，那场决赛改写了所有。一粒失球、一次漏判的手球、一次错失的良机，让梦想戛然而止。如今，世界已向前奔去，只留下我们面对现实的沉默。"
 vikelas.414.g: "我们曾相信。这就足够了。"
