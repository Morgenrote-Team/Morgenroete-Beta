 notification_vikelas_national_sports_match_lost_desc: "我国代表队在一场国际[GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName]赛事中惨败于[SCOPE.sCountry('vikelas_rival_scope').GetName]队握。主教练[GetPlayer.MakeScope.Var('vikelas_coach_var').GetCharacter.GetFullName]因此#R 未获得#![concept_academics_experience]。本场比赛最终比分为#V [GetPlayer.MakeScope.Var('vikelas_first_match_number_var').GetValue]：[GetPlayer.MakeScope.Var('vikelas_second_match_number_var').GetValue]#!。"
