 vikelas_autoracing_found_automobile_club_button: "成立汽车俱乐部"
 vikelas_autoracing_found_automobile_club_button_desc: "建立汽车俱乐部是建设赛车运动所必需的其他设施的第一步。"
 vikelas_autoracing_long_distance_button: "组织一场耐力赛"
 vikelas_autoracing_long_distance_button_desc: "一直到20世纪中叶，早期赛车的耐力赛这种通常在城市间进行。在意大利有弗洛里奥盾或一千英里耐力赛这样出色的例子。这种对人车特设的考验在很长一段时间被人们认为是真正的全国性赛车比赛。"
 vikelas_autoracing_found_grand_prix_button: "创办大奖赛"
 vikelas_autoracing_found_grand_prix_button_desc: "赛车历史上的第一次大奖赛是1906年的法国汽车俱乐部大奖赛。在法国工业代表的要求下，每家制造商至多获批三辆赛车。为保持其在所有赛事中的主导地位，比赛安排了持续2天的赛时和超过1200公里的赛程。\n1925年，在意大利汽车俱乐部的推动下，正式的宣布引入世界竞标赛项目。该赛季三场官方大奖赛被（法国、意大利和比利时）指定为正赛，印第安纳波利斯则作为美国最重要的赛车赛事。"
 vikelas_autoracing_race_track_button: "建造一条赛道"
 vikelas_autoracing_race_track_button_desc: "随着大奖赛的举行，固定赛道成为赛车比赛的常态。专用赛道不仅可以让国际赛事集中于一地，还能让选手们在赛道上磨炼自己的车技从而更加轻车熟路。"
 vikelas_coach: "总教练"
 vikelas_coach_desc: "该角色是一支国家运动队的教练。"
 vikelas_coach_senior: "资深总教练"
 vikelas_coach_senior_desc: "该教练凭借其多年的经验成为体育界的传奇人物。"
