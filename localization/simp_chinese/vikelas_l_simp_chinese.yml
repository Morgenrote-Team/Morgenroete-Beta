 vikelas.300.t: "新运动"
 vikelas.300.d_football: "我国越来越多的人迷上了一种新游戏：足球。尽管许多人对这项从[SCOPE.sCountry('vikelas_overlord_country_scope').GetName]引进的“舶来品”颇有微词，但这项运动如今已变得如此流行，几乎无法回避。"
 vikelas.300.d_baseball: "我国越来越多的人迷上了一种新游戏：棒球。尽管许多人对这项从[SCOPE.sCountry('vikelas_overlord_country_scope').GetName]引进的“舶来品”颇有微词，但这项运动如今已变得如此流行，几乎无法回避。"
 vikelas.300.d_cricket: "我国越来越多的人迷上了一种新游戏：板球。尽管许多人对这项从[SCOPE.sCountry('vikelas_overlord_country_scope').GetName]引进的“舶来品”颇有微词，但这项运动如今已变得如此流行，几乎无法回避。"
 vikelas.300.f: "‘游戏就像休息，既然不能连续工作，就需要休息。’——亚里士多德"
 vikelas.300.g: "球进了！"
 vikelas.300.h: "把球棒给我！"
 vikelas.300.i: "好球。"
 vikelas.300.football.tt: "足球将成为[GetPlayer.GetName]的全民运动。"
 vikelas.300.baseball.tt: "棒球将成为[GetPlayer.GetName]的全民运动。"
 vikelas.300.cricket.tt: "板球将成为[GetPlayer.GetName]的全民运动。"
 vikelas.301.t: "成立板球俱乐部"
 vikelas.301.d: "一些有影响力的人物成立了一个体育俱乐部，以进行他们最喜爱的消遣：[SCOPE.GetRootScope.GetState.GetStateRegion.GetCityHubName]板球俱乐部。"
 vikelas.301.f: "19世纪见证了板球从一项乡村娱乐活动，逐步演变为具有国家乃至国际意义的重要运动。英国上层阶级将其奉为钟爱的休闲方式——伊顿、哈罗等贵族寄宿学校大力推广，板球因而被推崇为“绅士的运动”。与此同时，这项运动也迅速在工人阶级中普及，尤其是在英格兰北部，工厂工人自发组织起众多俱乐部。这种日益大众化的趋势，催生了俱乐部数量与观众规模的空前扩张。 \n\n国际赛事紧随其后。1844年，首场有正式记录的国际板球赛在纽约举行，由加拿大对阵美国。"
 vikelas.301.g: "把球棒给我！"
 vikelas.301.h: "多么矫揉造作的运动。"
 vikelas.302.t: "成立棒球俱乐部"
 vikelas.302.d: "棒球已在[SCOPE.sState('vikelas_baseball_club_state_scope').GetName]扎根，成为广受喜爱的大众娱乐。一支全新的棒球俱乐部正式成立，并开始定期举行比赛——[SCOPE.sState('vikelas_baseball_club_state_scope').GetCustom('vikelas_historical_baseball_club_names_type')]就此登场。"
 vikelas.302.f: "19世纪40年代，棒球逐渐脱离早期球类游戏的模糊形态，发展出自身独特的结构。彼时，美国正经历迅猛的城市化进程，不断扩张的城市亟需一种既能增强社区凝聚力，又能体现国家新精神的大众娱乐。关键转折发生在1845年——亚历山大·卡特赖特与纽约尼克博克棒球俱乐部成员共同制定了历史上首套标准化比赛规则。这套“尼克博克规则”确立了现代棒球的基本框架：菱形球场、四垒制、每局三出局、每队九人上场。其系统性远超此前在草地与空地间随意进行的非正式比赛。1846年6月19日，尼克博克俱乐部在新泽西州霍博肯与“纽约九人队”展开对决，完成史上首场有正式记录的规则化比赛。尽管尼克博克队落败，但这场赛事被广泛视为组织化棒球运动的诞生时刻。"
 vikelas.302.g: "全垒打。"
 vikelas.303.t: "成立足球俱乐部"
 vikelas.303.d: "[SCOPE.sState('vikelas_football_club_state_scope').GetName]的工人和劳工们几周来一直在一起踢足球。现在，他们成立了一个俱乐部：[SCOPE.sState('vikelas_football_club_state_scope').GetCustom('vikelas_historical_football_club_names_type')]。"
 vikelas.303.f: "19世纪前半叶，英格兰的“足球”并非一项统一的运动，而是对各地城镇、乡村和学校中流行的各种球类游戏的统称，其规则差异极大。迈向统一的第一步是1848年诞生的《剑桥规则》，旨在为剑桥大学学生制定一套通用比赛规范。尽管该规则并未成为最终标准，却为后续改革铺平了道路。真正的转折点出现在1863年10月26日——十一家俱乐部于伦敦共济会酒馆集会，正式成立足球协会。仅数周后，他们便确立了一套新规则：只允许用脚触球，严禁持球奔跑或抛掷。这一决定引发橄榄球派系的强烈反对，最终导致其脱离并独立发展出自己的规则体系。足球协会的成立，标志着现代足球的真正诞生。"
 vikelas.303.g: "球进了！"
 vikelas.304.t: "成立篮球俱乐部"
 vikelas.304.d: "一家篮球俱乐部已在[SCOPE.sState('vikelas_basketball_club_state_scope').GetName]正式成立，致力于在全[GetPlayer.GetName]范围内推广篮球运动。"
 vikelas.304.f: "篮球是现代主流体育项目中诞生最晚的一项，其发展根源深植于19世纪末的社会变革浪潮。1891年，加拿大籍医生兼体育教育家詹姆斯·奈史密斯面临一项紧迫任务：为马萨诸塞州斯普林菲尔德市的基督教青年会（YMCA）培训学院设计一项适合冬季室内开展的运动，以应对新英格兰严寒气候带来的活动限制。YMCA旨在通过体育锻炼提升青年的体魄与道德品质——这是一项融合新教伦理与城市现代化理念的教育实践。篮球以其明确的规则与快速轮换机制，完美契合了这一目标。它不仅强化了团队精神与集体认同，也为迅速扩张的美国城市提供了崭新的大众休闲方式。"
 vikelas.304.g: "哗！"
 vikelas.304.h: "多蠢的比赛。"
 vikelas.311.t: "体育公报"
 vikelas.311.d: "在[SCOPE.sState('vikelas_gazette_state').GetName]，一位出版商推出了一种全新类型的报纸——专营体育新闻，并以[Country.MakeScope.Var('vikelas_national_sport_var').GetFlagName]为核心报道内容。这份报刊一经面世，便如热饼般抢售一空。"
 vikelas.311.f: "19世纪末，体育不再局限于赛场，而是走向城市街头、咖啡馆与大众心灵。它迫切需要一种新的传播载体。不仅是现场观众渴望胜负消息，工厂门口的工人与手执报纸的职员同样翘首以盼。在意大利，这份需求由《米兰体育报》填补，开启了现代体育新闻的纪元。 \n该报于1896年4月3日在米兰创刊，仅比首届现代奥运会在雅典开幕早三周。自创刊伊始，它便超越了简单的赛果通报，立志成为新兴运动的喉舌——为自行车、田径、足球、击剑，以及一切体现速度、竞技与激情的项目发声。起初每周发行两期，采用黑墨印刷于普通纸张，但它所传递的不仅是事实，更是叙事：它将运动员塑造为英雄，将赛事升华为戏剧。 \n1899年，一次变革让它成为传奇：报纸变为粉色。这本是出于成本考量的务实之举——粉色纸张价格更低——却意外成就了一个标志性的品牌符号。 "
 vikelas.321.t: "棒球"
 vikelas.321.d: "一些有影响力的人物成立了一个体育俱乐部，以进行他们最喜爱的消遣：[SCOPE.GetRootScope.GetState.GetStateRegion.GetCityHubName]板球俱乐部。"
 vikelas.321.f: "18世纪，板球成为英国的国球。贵族和富商开始组建自己的球队。在19世纪，这项运动成为英国与其殖民地之间的纽带。板球运动在19世纪中后期的发展得益于铁路网的建设。相距甚远的球队首次可以互相比赛而无需耗费过多的时间。观众可以长途跋涉观看比赛，这增加了观赛人数。板球对英国文化产生了广泛影响，并影响了英语的词汇。"
 vikelas.403.t: "世界杯结束"
 vikelas.403.f: "‘足球比赛很简单：22个人在90分钟里争夺一个球，最终总是德国人获胜。’"
 vikelas.403.g: "这项运动本来就无足轻重。"
 vikelas.403.h: "我们是冠军。"
