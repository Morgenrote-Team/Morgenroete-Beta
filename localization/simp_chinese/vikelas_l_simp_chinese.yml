 vikelas.122.d: "在奥运代表队中，[SCOPE.sCharacter('vikelas_reactionary_athlete_scope').GetFullName]的网球技艺堪称一绝，无人能出其右。然而，这位网坛奇才却因其反动言论屡屡掀起轩然大波。传统主义政党将他奉为英雄，视若珍宝，他的每一次胜利都可能成为他们手中的一张王牌，在政治博弈中不无妙用。"
