 vikelas_become_ioc_president_tt: "[GetPlayer.GetName]成为国际奥委会新任主席"
 vikelas_ioc_foundation_button: "成立国际奥委会"
 vikelas_ioc_foundation_button_desc: "国际奥林匹克委员会（国际奥委会）是一个协会形式的合法非政府组织。奥委会旨在组织和监督开展现代的奥林匹克运动会。奥委会的创始国在决定奥运会举办地点的理事会为常任理事国。奥委会成立后即可举行第一届奥运会，此后每四年可以举办一届，在一定条件下，其他国家也可以作为正式成员加入国际奥委会，但理事会的席位始终是固定的。"
 vikelas_ioc_statistics_button: "拜访国际奥委会"
 vikelas_ioc_statistics_button_desc: "拜访国际奥委会以获取成员国信息，比如下一届奥运会的主办国或是国际奖牌榜。"
 vikelas_ioc_member_button: "成为国际奥委会的成员国"
 vikelas_ioc_member_button_desc: "加入国际奥林匹克委员会即可参与到四年一度的奥运会中，并有机会在自己的国家举办奥运会。"
 vikelas_ioc_bribe_button: "贿赂国际奥委会"
 vikelas_ioc_bribe_button_desc: "只要向国际奥委会理事会慷慨“捐款”，我们就能获得各成员的好感，并在下届奥运会的分配中被列为第四个候选国。然而，我们并不能保证之后一定会入选。其他国际奥委会委员也可能误解我们的慷慨。"
 vikelas_olympic_flame_button: "奥林匹克圣火"
 vikelas_olympic_flame_button_desc: "奥林匹克圣火，传闻取自希腊女神赫斯提亚（炉灶女神）永不熄灭的炉火，在1928年阿姆斯特丹奥运会上首次亮相。而奥运火炬传递的传统是在1936年柏林夏季奥运会上正式确立的。与普遍看法相反，这个想法并非来自国家社会主义者，而是来自德国犹太考古学家阿尔弗雷德·希夫。这一传统的引入不仅会给奥运会带来新的身份象征，而且每年都会将人们聚集在一起，并成为一个令人振奋的象征，分散人们对其他不满的注意力。"
 vikelas_school_sport_button: "向校园中引入体育运动"
 vikelas_school_sport_button_desc: "通过引入学校体育，我们可以增加具有运动员特质的概率，并提高参加奥运会的概率。"
 vikelas_football_worldcup_button: "举办足球世界杯"
 vikelas_football_worldcup_button_desc: "世界杯是足球的国家比赛。每四年，参赛队可获得参加世界杯决赛的资格。在为期四周的比赛中，最优秀的国家队将决出世界冠军。国际足球联合会负责组织和推广这项赛事。第一届世界杯于1930年在乌拉圭举行，且东道主乌拉圭队夺冠。"
 vikelas_football_worldcup_tt: "至少有#G 16个#!国家已成立足协。"
 je_vikelas_sports: "体育运动"
 je_vikelas_sports_reason: "19世纪，有组织的体育运动被赋予了新的含义。许多民族国家成立了俱乐部，运动场地成为公共设施，体育活动成为广泛的休闲活动。足球和棒球发展成为国家体育运动，自行车赛和汽车赛很快成为大众社会的娱乐方式。这一发展的最高成就确立奥林匹克运动会。"
