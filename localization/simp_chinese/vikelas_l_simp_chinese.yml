 je_vikelas_endurance_race_reason: "一场横跨数州的耐力赛正在我国的土地上如火如荼地进行着。来自世界各地的赛车好手齐聚一堂，为荣耀而战。东道主国家略占地利，有额外事件相助。与追求极致速度的大奖赛不同，这项赛事更注重车辆的可靠性——赛车必须经受漫长赛程的严酷考验。在这漫长的征途中，发动机故障的阴影时刻笼罩，其威胁甚至超过了致命事故的风险。"
 je_vikelas_endurance_race_success: "[GetPlayer.GetName]已至少有#ORANGE 8耐力赛进度#!."
 je_vikelas_endurance_race_goal: ""
 vikelas.501.t: "[ROOT.GetCountry.GetAdjectiveNoFormatting]汽车俱乐部"
 vikelas.501.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]，这位满怀热忱的赛车手，与志同道合的伙伴们携手创立了汽车俱乐部，以此铭记这一辉煌时刻。此举不仅为国内汽车工业注入了强劲动力，更在全国范围内掀起了赛车赛事的热潮。"
 vikelas.501.f: "早在19世纪90年代中期，法国汽车俱乐部（ACF）——这一成立于1895年的世界首个汽车俱乐部，便每年举办一次赛事，成为赛季的璀璨明珠。这些赛事，即所谓的“城市到城市”比赛，在乡村的公共道路上展开，参赛者们如同孤独的骑士，间隔出发，驰骋在广袤的田野间。ACF的成立，部分源于阿尔伯特·德·迪翁在1894年巴黎‑鲁昂比赛中的降级事件，这一事件如同催化剂，加速了俱乐部的诞生。\n随后的几年里，随着车辆性能的日益强大，赛车运动的危险性也水涨船高。因此，ACF在1901年首次颁布了一系列规则，这些规则堪称世界上首个赛车运动法规。其中一项核心创新是将比赛划分为不同类别，这些类别必须适用于ACF支持的所有赛事。由此产生的重量限制，初衷是为了减少因超载而引发的轮胎故障，这一创新如同为赛车运动装上了一个安全阀，为车手们的安全保驾护航。"
 vikelas.501.g: "一项充满刺激的运动！"
 vikelas.502.t: "第一届大奖赛"
 vikelas.502.d: "赛车运动正经历着一场革命性的蜕变：随着大奖赛的璀璨启幕，国际比赛的烽火将在所有热爱赛车运动的国度接连点燃。由此，一个国际锦标赛的宏伟蓝图应运而生。[SCOPE.sCountry('vikelas_gp_founder_scope').GetName]已向所有拥有汽车俱乐部的国家发出邀请，共襄其来年首届大奖赛的盛举！"
 vikelas.502.f: "1900年至1905年间，每年一度的戈登·贝内特杯，犹如初试啼声的雏鹰，首次尝试振翅高飞，举办汽车世界锦标赛。鉴于车速的不断攀升，1902年，ACF首次以方程式赛车的形式颁布了技术规定，参赛车辆必须严格遵守这些规定。然而，事故的频发如同阴霾，始终笼罩在赛场上空。因此，自1903年起，赛道比赛只能在封闭的赛道上进行，如同将狂野的骏马驯服于围栏之内。\n作为戈登·贝内特杯的继承者，ACF组织的主要比赛于1906年首次以“大奖赛”的名义隆重举行。在这场历史的盛宴中，匈牙利车手费伦茨·西斯驾驶着雷诺汽车，摘得了历史上第一位大奖赛冠军的桂冠。"
 vikelas.502.g: "那么，我们能否从中有所斩获？"
 vikelas.503.t: "国际公认汽车俱乐部协会"
 vikelas.503.d: "今日，国际汽车联合会于[GetGlobalVariable('vikelas_aiacr_seat_global_var').GetStateRegion.GetCityHubName]正式成立，其全称为“国际公认汽车俱乐部协会”（AIACR）。"
 vikelas.503.f: "为了让汽车制造商得以驰骋于所有国际赛场，必须将法国汽车俱乐部此前为其赛事独立制定的技术与竞技规则，以大奖赛的形式，通过一个国际性的汽车协会在各国间实现统一规范。1904年6月20日，这一划时代的组织在巴黎正式诞生，名为“国际公认汽车俱乐部协会”（AIACR）。就在此前数日，在巴特洪堡举行的戈登·贝内特杯赛事期间，来自全球最重要赛车国家的汽车俱乐部代表们已达成共识，决定成立这一国际性组织。二战结束后，AIACR更名为如今广为人知的国际汽车联合会（FIA），继续引领着世界赛车运动的发展。"
 vikelas.503.g: "从此，赛车运动走向国际化！"
 vikelas.504.t: "新的大奖赛赛道"
 vikelas.504.d: "AIACR的另一位成员建造了一条官方大奖赛赛道。现在年度赛车日历中有#G [GetGlobalVariable('vikelas_num_grand_prix_tracks_global_var').GetValue]条#!#V 大奖赛赛道#!。"
 vikelas.504.f: "“赛车、斗牛与登山，乃是仅存的真正运动……其余，不过是游戏罢了。”——欧内斯特·海明威"
 vikelas.504.g: "预订看台上的VIP座位。"
 vikelas.505.t: "赛车制造商所在地"
 vikelas.505.d: "随着[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')]的崛起，[GetPlayer.GetName]迎来了其首个系列赛车队。[SCOPE.sState('vikelas_team_state').GetName]的汽车工厂因这一品牌的建立而订单如潮，需求激增。"
 vikelas.505.f: "随着赛车运动从个人车手的孤军奋战，逐渐演变为拥有工厂车手的专业团队的协同作战，这一领域发生了翻天覆地的变化。昔日，业余爱好者们驾驶着自制的赛车在赛道上驰骋的景象已日渐稀少。尽管仍有那些持有其他汽车制造商执照、寻求刺激的古怪贵族在赛场上留下他们的足迹，但汽车开发已然成为赛车运动的真正核心，引领着这项运动向着更快、更远的目标迈进。"
 vikelas.505.g: "我们现在可以设计自己的赛车了！"
 vikelas.506.t: "赛车机械师"
 vikelas.506.d: "首席工程师[SCOPE.sCharacter('gaudi_engineer_scope').GetLastName]博士从[SCOPE.sCharacter('gaudi_engineer_scope').GetHerHis]的团队中精心挑选了一位卓越的助手，足以胜任新成立的赛车队的机械师一职。\n[SCOPE.sCharacter('vikelas_new_mechanic_scope').GetFullName]，[SCOPE.sCharacter('vikelas_new_mechanic_scope').GetHerHis]的专业领域是……"
 vikelas.506.f: "机械师可在汽车的三大领域施展才华：发动机、安全与车身。专业化能在特定领域以双倍的速度推进现代化改造。一般而言——尽管并非绝对——发动机的改进提升可靠性（及速度），安全装置的升级增强安全性，而车身的优化则提速（并兼顾安全性）。"
 vikelas.506.h: "发动机。"
 vikelas.506.i: "安全性。"
 vikelas.506.j: "车身。"
 vikelas.511.t: "[SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]‑[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName]大赛"
 vikelas.511.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]的[SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')]在最新一期周刊中，犹如号角般宣告了一场规模空前的汽车赛事。这场横跨城市的竞速之旅，将从[SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]启程，如同一条巨龙，蜿蜒驰骋至[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName]。据悉，众多国际顶尖赛车手也将如群星般齐聚一堂，共襄这场速度与激情的盛举。"
 vikelas.511.f: "赛车运动的黎明时分，以“绅士车手”为标志性人物，他们驾驭着亲手打造的汽车，与机械师（通常也兼任司机）并肩驰骋于城市间的赛道上。这种比赛形式，如同初绽的花朵，多由报纸和汽车俱乐部精心宣传、组织并提供支持。由于当时的机械技术尚在襁褓之中，能够成功抵达终点已是一项了不起的壮举。然而，诸如马塞尔·雷诺在巴黎‑马德里比赛中不幸殒命的悲剧，犹如一声惊雷，揭示了这种组织形式不过是赛车历史长河中的一段短暂插曲，终将被更安全、更规范的赛事所取代。"
 vikelas.511.g: "为三个月后的盛会做好充分准备。"
 vikelas.512.t: "参赛"
 vikelas.512.d: "即将在[SCOPE.sCountry('vikelas_race_country').GetName]拉开帷幕的 [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]‑[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName]大赛，犹如一颗重磅炸弹，引发了人们对我们国家顶级车手[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]是否会参赛的热烈讨论。这位车手的名字，如同赛道上的一道闪电，激起了无数赛车迷的期待与猜测。"
 vikelas.512.g: "一个绝好的机会！"
 vikelas.512.h: "这太危险了。"
 vikelas.512.tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]三个月内就会做好参赛准备。"
 vikelas.513.t: "随风自由行"
 vikelas.513.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]正沐浴在幸运女神的眷顾之下：眼前是开阔笔直的赛道，[ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]可以尽情释放引擎的全部潜能。发动机运转如丝般顺滑，每一个弯道都平稳流畅。这正是每一位赛车手梦寐以求的完美状态."
 vikelas.513.f: "“当速度成为生命的律动，驾驶便是一场与命运的抗争。”——鲁道夫·卡拉乔拉"
 vikelas.513.g: "好极了！"
 vikelas.514.t: "美丽、未受破坏的自然"
 vikelas.514.d: "当[ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]驾着爱车穿梭于城市之间时，[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]的目光被沿途未受破坏的自然美景所吸引。[ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]不禁思忖，或许应该为这段难忘的旅程带回一些独特的纪念品？"
 vikelas.514.f: "在赛车运动初期，穿越原始而未经雕琢的自然景观成为了这项运动独特的魅力所在。蜿蜒的山路、崎岖的海滩、险峻的峡谷，这些充满野性的赛道不仅考验着车手的驾驶技艺，更挑战着他们的适应能力与勇气。相比之下，早期的人造赛道因缺乏变化而备受诟病，被认为难以充分展现车手的真正实力。"
 vikelas.514.g: "我们得赢得比赛！"
 vikelas.514.h: "收集植物。"
 vikelas.514.i: "收集些石头。"
 vikelas.515.t: "使绊子"
 vikelas.515.d: "在短暂的休憩间隙，[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]敏锐地发现[ROOT.Var('vikelas_racer_var').GetCharacter.GetHerHis]的劲敌[SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName]的座驾竟孤零零地停在不远处。令人惊讶的是，这辆本该被严密看管的赛车此刻竟完全无人值守，。"
 vikelas.515.f: "“如果你没有作弊，你就没有尽力。”"
 vikelas.515.g: "甜蜜的复仇"
 vikelas.516.t: "帮朋友一个小忙？"
 vikelas.516.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]正处于比赛的有利位置，然而眼前的一幕令[ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]不得不放慢速度——[SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName]的赛车正停在路边，引擎盖下冒出缕缕青烟。或许[ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]应该停车查看，确保对手安然无恙？"
 vikelas.516.f: "在赛车运动初期，发动机故障和事故如同家常便饭。即便后来封闭赛道上配备了专业的救援团队，但在那些绵延数百英里的长距离赛事中，一旦在无人区发生故障，危险程度可想而知。特别是在1930年代的一千英里耐力赛中，赛车手们不仅要与对手较量，还要面对亚平宁山脉的险峻地形，甚至不时会遇到狼群的踪迹。在这种极端环境下，赛车手们自然而然地形成了一种默契：无论竞争多么激烈，在危急时刻伸出援手是每位车手的本能。"
 vikelas.516.g: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]该停下来帮帮别人。"
 vikelas.516.h: "哈哈！蠢货！"
 vikelas.517.t: "引擎故障"
 vikelas.517.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]的发动机正经历着一些难以解释的异常——即便是经验丰富的[ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U]也无法准确诊断问题的根源。尽管已竭尽全力排查，但至今仍未找到症结所在。面对如此棘手的情况，[ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U]或许不得不降低车速，以更谨慎的姿态继续比赛。"
 vikelas.517.f: "发动机故障，这一赛车运动永恒的梦魇，从过去到现在始终如影随形。多少车手在领先的大好形势下，因引擎的突然罢工而抱憾退赛。如今，[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]也面临着同样的困境。虽然[ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U]仍有机会完成比赛，但必须将车速控制在安全范围内。这意味着[ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U]将眼睁睁地看着对手一个个超车，夺冠的希望也随之渐行渐远。"
 vikelas.517.g: "使用所有可用的机械微调措施。"
 vikelas.517.h: "赛车必须这样坚持到比赛结束。"
 vikelas.518.t: "钉子"
 vikelas.518.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]已经成功与其他车手拉开了一段可观的距离。此刻，[ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]是否该抓住“机会”，进一步扩大领先优势，给对手制造更大的压力？"
 vikelas.518.f: "“我知道他在作弊，因为我也在作弊，但他还是赢了我。”"
 vikelas.518.g: "“拿钉子来，马特利。”"
 vikelas.518.h: "体育精神有可取之处。"
 vikelas.519.t: "取消资格"
 vikelas.519.d: "令人扼腕的是，[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]的不当行为终究未能逃过众人的眼睛。赛车委员会在确凿证据面前，果断做出了将[ROOT.Var('vikelas_racer_var').GetCharacter.GetHerHim]除名的决定。"
 vikelas.519.f: "“根据城市间竞速赛的规定，依据第12条第6款第9行，参赛者违反了一般规则，因此将被提前排除。上诉不予受理。”"
 vikelas.519.g: "除名？这不公平！"
 vikelas.520.f: "#V 比赛结果#!\n\n冠军：[SCOPE.sCountry('vikelas_first_winner_scope').GetName]的[SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName]\n亚军：[SCOPE.sCountry('vikelas_second_winner_scope').GetName]的[SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName]\n季军：[SCOPE.sCountry('vikelas_third_winner_scope').GetName]的[SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName]"
 vikelas.520.g: "香槟！"
 vikelas.521.t: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]的胜利"
 vikelas.521.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]在[SCOPE.sCountry('vikelas_race_country').GetName]的城市间竞速赛中赢得了冠军。[ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]驾驶的是[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]‑[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]。"
 vikelas.521.g: "香槟！"
 vikelas.522.t: "亚军[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]"
 vikelas.522.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]在[SCOPE.sCountry('vikelas_race_country').GetName]的城市间竞速赛中赢得了亚军。[ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]驾驶的是[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]‑[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]。"
 vikelas.522.g: "下一次见!"
 vikelas.523.t: "季军[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]"
 vikelas.523.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]在[SCOPE.sCountry('vikelas_race_country').GetName]的城市间竞速赛中赢得了季军。[ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]驾驶的是[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]‑[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]。"
 vikelas.524.t: "城市间竞速赛结束了"
 vikelas.524.d: "在[SCOPE.sCountry('vikelas_race_country').GetName]举办的盛大城市间竞速赛已圆满落幕，冠军花落别家。[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]驾驶[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]‑[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]驰骋赛场，虽未斩获佳绩，但车手与座驾均安然无恙，顺利完赛。"
 vikelas.531.t: "耐力赛"
 vikelas.531.d: "[GetPlayer.GetName]组织了一场大型耐力赛，并邀请了来自世界各地的赛车手参与。"
 vikelas.531.f: "20世纪初，汽车比赛的帷幕由距离赛缓缓拉开，这些赛事如同勇士的试炼，旨在挑战赛车的极限速度与可靠性。尽管法国在赛车运动的黎明时分独领风骚，但他们很快将兴趣投向了大奖赛的璀璨舞台。然而，国际耐力赛事的光辉并未因此黯淡。其中，西西里岛的塔加·弗洛里奥犹如一颗璀璨的明珠，堪称最具传统色彩的赛事。自1906年至1977年，这项赛事主要在5月绽放，不仅是国际车坛的盛事，部分比赛更享有世界杯级别的尊荣。继弗洛里奥盾之后，千里赛被誉为公路赛的经典之作（20世纪50年代，卡雷拉·泛美公路赛也加入了这一行列），并奠定了“Gran?Turismo”（GT）这一术语的基石。GT特指那些专为长距离竞速而生的快速旅行跑车，例如法拉利为千里赛量身打造的传奇车型，它们如同风驰电掣的骏马，在赛道上书写着不朽的传奇。"
 vikelas.531.g: "终点线见！"
 vikelas.533.t: "轮胎磨损"
 vikelas.533.d: " 赛事正酣，[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]座车突遭爆胎，被迫紧急停赛。所幸车手并无大碍，其临危不乱的镇定表现令人称道，却也因此痛失争胜良机。"
 vikelas.533.f: "1931年的一千英里耐力赛，注定被载入赛车史册。那一年，轮胎的剧烈磨损成为了赛事最鲜明的印记。当车队驶向永恒之城罗马时，阿尔坎杰利的座驾已历经九次轮胎更迭，每一次更换都见证着赛道的残酷。传奇车手努沃拉里虽数次遭遇爆胎之险，却仍以两分钟的优势将卡拉乔拉甩在身后。\n沿着亚得里亚海岸线返程的征途上，阿尔法·罗密欧车队顶着轮胎的频频抗议，依然保持着令人惊叹的竞速节奏。博尔扎基尼在此段赛程中一骑绝尘，将对手远远抛离18分钟之遥。当地中海北岸的微风拂过赛道，坎帕里以四分钟的优势压制着状态回升的阿尔坎杰利。在这场惊心动魄的角逐中，阿尔法·罗密欧车队内部的领先地位如潮汐般更迭，当赛程行至三分之二时，意大利人似乎已将胜利收入囊中。这得益于遍布赛道的密集服务站网络，使得频繁的轮胎更换成为可能。\n然而，命运在最后80公里处投下了戏剧性的转折。倾盆大雨不期而至，阿尔法·罗密欧车队的轮胎在雨水的冲刷下再度告急，最终酿成事故，为这场史诗般的赛事画上了令人扼腕的句点。"
 vikelas.533.g: "厄运不散。"
 vikelas.534.t: "铁道路口"
 vikelas.534.d: "在激烈的追逐中，刺耳的警报声骤然划破长空——前方的铁路道闸正缓缓降下。领先的赛车猛然加速，在道闸完全落下前的刹那惊险穿过。[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]面临生死抉择：是稳妥停车，还是冒险一搏，以免被对手拉开难以逾越的距离？"
 vikelas.534.f: "千里赛的车手们常常采取大胆的操作，比如1954年参赛的汉斯·赫尔曼，他驾驶汽车从正在关闭的铁路道闸下穿过，以致于他和他的乘客不得不低头躲避。"
 vikelas.534.g: "冒险吧。"
 vikelas.534.h: "太鲁莽了！"
 vikelas.538.t: "狼群与左轮"
 vikelas.538.d: "在漆黑的山区夜色中，赛车团队不慎偏离了既定路线。突然，一声凄厉的狼嚎划破夜空，令人毛骨悚然。紧接着，此起彼伏的嚎叫声从四面八方传来，仿佛有一群饥饿的狼正在暗处逡巡。"
 vikelas.538.f: "“我们遭遇了肆虐的暴风雪，更被一群饥饿的狼紧追不舍。就在危急时刻，我抽出常年置于座椅垫下的左轮手枪，枪声在风雪中炸响。幸运的是，一队手持火把与猎枪的养路工人及时赶到，狼群在火光与枪声中四散奔逃。”\n——恩佐·法拉利"
 vikelas.538.g: "杀光狼群。"
 vikelas.538.h: "绕开该区域行驶。"
 vikelas.538.i: "这一发现远比一场愚蠢的比赛重要。"
 vikelas.539.t: "赛车冲入观众席！"
 vikelas.539.d: "赛事进行中，突发惨烈意外，一辆赛车失控冲出跑道，冲撞人群，酿成弥天大祸。赛车界一片哗然，安全标准问题再次成为舆论焦点。"
 vikelas.539.f: "自1927年一千英里耐力赛初启帷幕，纵使道旁观者如云，却始终未曾遭遇重大灾祸。然世事难料，1938年4月3日午后四时三十分，这一平静终被打破。热那亚车手安杰洛·米尼亚内戈与其副驾路易吉·布鲁佐博士，驾乘蓝旗亚·阿普利亚驰骋于博洛尼亚的贝尔蒂·皮卡特大道路段。当车速略低于百公里之时，经验尚浅的米尼亚内戈在电车轨道上失控。蓝旗亚先是与一株古树猛烈相撞，继而冲入了密集的观赛人群之中。\n车内二人虽侥幸几乎毫发无损，然此劫难却夺去了十条无辜生命，其中七名为天真孩童。更有二十六名观众受伤，其中数人伤势危重。祸不单行，另一起事故中，一名十二岁女童在斯坦盖拉香消玉殒。这一日，千里赛的赛道上，留下了难以磨灭的悲怆印记。"
 vikelas.539.g: "赛车史上黑暗的一天。"
 vikelas.540.t: "新平均速度记录"
 vikelas.540.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]于耐力赛中缔造了史无前例的平均时速，此项壮举必将彪炳于赛车运动史册，成为一座永恒的丰碑。"
 vikelas.540.f: "[GetPlayer.GetCustom('vikelas_race_team_name_type')]车队以鬼斧神工般的精准操控与炉火纯青的技艺，缔造了前人难以企及的平均时速，这一纪录必将长久铭刻于赛车运动的黄金时代，成为一座不朽的丰碑。"
 vikelas.545.t: "粉丝集结！"
 vikelas.545.d: "在这场横跨双城的耐力赛中，沿途民众夹道欢呼，竞相目睹[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]的风采。这一盛况，也昭示着赛车运动正日益风靡，成为举世瞩目的焦点。"
 vikelas.545.f: " 街道两侧，人潮涌动，只为一睹风驰电掣的赛车掠影。孩童挥舞着手中的旗帜，成人则高声呼喊着那令他们心驰神往的车手之名。当赛车戛然而止，欢呼、掌声与如潮的鲜花瞬间将他淹没。短暂的停留后，引擎再次轰鸣，赛车绝尘而去。那一刻，速度与科技的激情，如燎原之火般在人们心中奔腾——也由此开启了赛车运动在未来数十年波澜壮阔的篇章。"
 vikelas.545.g: "赛车开始流行。"
 vikelas.541.t: "耐力赛结束"
 vikelas.541.d: "来自[SCOPE.sCountry('vikelas_first_winner_scope').GetName]的[SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName]，力克群雄，勇夺桂冠，不仅赢得了这场享誉盛名的耐力赛冠军，更赢得了现场观众的倾心喝彩。"
 vikelas.541.f: "最后数公里，上演了一场震撼人心的速度史诗：赛道之上，尘烟滚滚，引擎咆哮声响彻云霄，现场气氛沸腾至极。当冠军最终冲破终点线的那一刻，雷霆般的欢呼声瞬间爆发。他的战车，遍体鳞伤，满载着这场残酷鏖战的印记，也成为了他钢铁般意志的最好诠释。人们欢声雷动，车迷们更是将他高高抛起，以示敬意。凭借此役的辉煌胜利，[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]一举奠定了其在赛车运动界的殿堂级地位，而[GetPlayer.GetCustom('vikelas_race_team_name_type')]车队也由此荣膺备受景仰的传奇品牌。"
 vikelas.542.d: "[SCOPE.sCountry('vikelas_endurance_race_country_scope').GetName]"
 vikelas.551.t: "[GetPlayer.GetName]大奖赛"
 vikelas.551.d: "赛车赛季已悄然降临[GetPlayer.GetNameNoFormatting]。来自世界各地的顶尖赛车手与他们的精英团队纷至沓来，为即将在这片土地上展开的大奖赛厉兵秣马。"
 vikelas.551.f: "“赛车就是生活。其余的一切都只是等待。”——鲁道夫·卡拉乔拉"
 vikelas.551.g: "最速者胜。"
 vikelas.552.t: "最快圈速"
 vikelas.552.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]在训练中创造了令人瞩目的最快圈速纪录！这预示着正式比赛的无限可能。"
 vikelas.552.f: "“甚至在比赛开始前，我就确信自己会赢。”——埃托雷·布加迪"
 vikelas.553.t: "油渍滑滑"
 vikelas.553.d: "在大奖赛的激烈角逐中，[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]不幸驶入了事故车辆遗留的油渍区域。赛车虽尚能继续行进，但这次意外已让宝贵的比赛时间悄然流逝。"
 vikelas.553.f: "“我制造汽车是为了行驶，而不是为了停下。”——埃托雷·布加迪"
 vikelas.553.g: "哦不……"
 vikelas.554.t: "雨天"
 vikelas.554.d: "正当大奖赛如火如荼之际，天空骤然变色，一场突如其来的雨锋席卷赛道。部分车手当机立断，驶入维修站更换雨胎。此刻，[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]面临着艰难的抉择：[ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]是应该冒险继续比赛，在湿滑的赛道上与天公一较高下；还是放慢速度，以确保安全完赛？"
 vikelas.554.f: "“无所畏惧。只需相信。”——阿尔芒·标致"
 vikelas.554.g: "这不会让车手开出赛道！"
 vikelas.554.h: "减速。"
 vikelas.555.t: "超车动作"
 vikelas.555.d: "当[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]逼近来自[SCOPE.sCountry('vikelas_race_country_scope').GetName]的劲敌[SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName]时，一个千载难逢的机遇赫然呈现！此刻，[ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]必须决定是否超车。"
 vikelas.555.f: "“完美的赛车会率先冲过终点线，然后解体成各个零件。”——费迪南德·保时捷"
 vikelas.555.g: "加油！"
 vikelas.555.h: "这太冒险了。"
 vikelas.556.t: "超车成功"
 vikelas.556.d: "超车大火成功。[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]现在领先并拥有速度优势。"
 vikelas.556.f: "“当我看到一辆阿尔法·罗密欧驶过时，我会脱帽致敬。”——亨利·福特"
 vikelas.556.g: "万岁！"
 vikelas.557.t: "超车失败"
 vikelas.557.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]超车未遂，对手成功挡住了来犯之敌并赢得了时间。"
 vikelas.557.f: "“这确实令人扼腕，但这就是赛车运动的本质。我已倾尽全力，既然与胜利失之交臂，我愿向那位摘得桂冠的勇者致以最诚挚的祝贺。”\n——拉尔夫·德帕尔马"
 vikelas.557.g: "真可惜。"
 vikelas.558.t: "主场观众激励赛车手"
 vikelas.558.d: "在[GetPlayer.GetNameNoFormatting]的赛道上，[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]俨然成为了本土英雄的化身。观众席上山呼海啸般的助威声此起彼伏，无数面旗帜在观众手中挥舞，形成一片沸腾的海洋。这份来自家乡父老的鼎力支持，让这位赛车手的斗志熊熊燃烧。"
 vikelas.558.f: "“没有人记得第二名是谁，而那永远不会是我。”——恩佐·法拉利"
 vikelas.558.g: "太好了！"
 vikelas.559.t: "汽车锦标赛"
 vikelas.559.d: "[SCOPE.sCountry('vikelas_first_winner_scope').GetNameNoFlag]在本赛季占据主导地位，并赢得了汽车锦标赛冠军。"
 vikelas.559.f: "#V 最终结果#!\n\n第一名：[SCOPE.sCountry('vikelas_first_winner_scope').GetName]，[SCOPE.GetValue('vikelas_first_winner_points_scope')]分，[SCOPE.GetValue('vikelas_first_winner_victories_scope')]场胜利\n第二名：[SCOPE.sCountry('vikelas_second_winner_scope').GetName]，[SCOPE.GetValue('vikelas_second_winner_points_scope')]分，[SCOPE.GetValue('vikelas_second_winner_victories_scope')]场胜利\n第三名：[SCOPE.sCountry('vikelas_third_winner_scope').GetName]，[SCOPE.GetValue('vikelas_third_winner_points_scope')]分，[SCOPE.GetValue('vikelas_third_winner_victories_scope')]场胜利\n第四名：[SCOPE.sCountry('vikelas_fourth_winner_scope').GetName]，[SCOPE.GetValue('vikelas_fourth_winner_points_scope')]分，[SCOPE.GetValue('vikelas_fourth_winner_victories_scope')]场胜利\n第五名：[SCOPE.sCountry('vikelas_fifth_winner_scope').GetName]，[SCOPE.GetValue('vikelas_fifth_winner_points_scope')]分，[SCOPE.GetValue('vikelas_fifth_winner_victories_scope')]场胜利"
 vikelas.559.g: "且奏曲。（此处应有比才的曲子）"
 vikelas.559.h: "对统计数字不感兴趣。"
 vikelas.559.tt: "年度汽车锦标赛统计数据不再显示。"
 vikelas.561.t: "[GetPlayer.GetName]大奖赛闭幕"
 vikelas.561.d: "[GetPlayer.GetName]大奖赛的帷幕已然落下，冠军的荣耀归于[SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName]！这位车手以精湛的技艺和无畏的精神征服了赛道，赢得了观众山呼海啸般的喝彩。这场赛事注定将成为传奇，每一个惊心动魄的瞬间都将被载入史册。"
 vikelas.561.f: "#V 比赛结果#!\n\n冠军：[SCOPE.sCountry('vikelas_first_winner_scope').GetName]的[SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName]\n亚军：[SCOPE.sCountry('vikelas_second_winner_scope').GetName]的[SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName]\n季军：[SCOPE.sCountry('vikelas_third_winner_scope').GetName]的[SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName]"
 vikelas.561.g: "香槟！"
 vikelas.571.t: "第一届“勒芒24小时耐力赛”"
 vikelas.571.d: "1923年，勒芒24小时耐力赛首度鸣锣开赛，旋即跻身世界顶级赛车盛事之林，吸引着全球顶尖车手与汽车制造商竞逐桂冠。"
 vikelas.571.f: "1923年5月26日至27日，由西方汽车俱乐部倾力打造的首届勒芒24小时耐力赛，正式拉开其传奇序幕。萨尔特地区那条绵延17.3公里的赛道，迎来了33辆蓄势待发的赛车。天公不作美，比赛全程阴雨不断，加之道路泥泞不堪，且赛道横贯勒芒市区与周边乡间小路，种种严苛条件无疑是对车手与赛车的双重考验。最终，安德烈·拉加什与勒内·莱昂纳德驾驶着谢纳‑瓦克尔运动型赛车，历经24小时的艰苦卓绝，完成了2209公里的征程，勇夺首届桂冠。这场开创性的赛事，亦由此奠定了一项伟大的传统，直至今日，这项传统仍在热情讴歌赛车运动的创新精神与不朽的耐力传奇。"
 vikelas.571.g: "一整天？疯了吧！"
 vikelas.572.t: "弗洛里奥盾的诞生"
 vikelas.572.d: "1906年，弗洛里奥盾横空出世，这项在西西里岛峰回路转的山道上进行的壮丽赛事，由文森佐·弗洛里奥一手创办，并由此将这片土地推向了世界赛车运动的中心舞台。"
 vikelas.572.f: "1906年5月6日，首届弗洛里奥盾在风光旖旎的西西里岛隆重揭幕，这场横贯山峦与村落的长途竞速，将当地险峻的山路与如诗如画的村庄巧妙地融合成一条极富挑战性的赛道。由满怀赛车热忱的文森佐·弗洛里奥倾力创办并组织，此项赛事充分展现了他对极限体育挑战的卓越远见。赛道全程长达446公里，分为三圈，每圈148公里。最终，亚历山德罗·卡尼奥驾驶着一辆伊塔拉赛车，以平均46.8公里/小时的时速率先冲过终点线，荣膺首届桂冠。弗洛里奥盾也由此迅速成为象征着勇气、精湛技艺以及对速度无限渴求的传奇赛事。"
 vikelas.572.g: "弗洛里奥盾开启竞速传奇"
 vikelas.573.t: "首届塞默灵爬山赛"
 vikelas.573.d: " 1899年，首届塞默灵爬山赛盛大开幕，这场对早期汽车工程技术与车手精湛技艺的终极考验，亦由此在赛车运动发展史上，镌刻下了一座重要的里程碑。"
 vikelas.573.f: "1899年8月27日，由奥地利汽车俱乐部鼎力举办的首届塞默灵爬山赛，在其传奇征程上正式揭幕。这条从塞默灵小镇克拉姆蜿蜒攀升至山口的9.8公里赛道，是对早期汽车工业技术与车手精湛技艺的严酷试炼。高达7%的陡峭坡度与连续不断的险峻弯道，无不考验着人与机械的极限。最终，捷诺·齐奇伯爵驾驶着一辆莫尔斯汽车，以平均22.2公里/小时的时速，率先冲过终点线，荣耀登顶。这场开创性的赛事不仅吸引了无数狂热的观众，更由此奠定了欧洲爬山赛运动蓬勃发展的坚实根基。"
 vikelas.573.g: "爬山竞速，万人空巷。"
 vikelas.581.t: "赛车新引擎"
 vikelas.581.d_level_2: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName]对发动机进行了全面升级。如今，最新款赛车已配备#V 六缸发动机#!，性能更上一层楼，如虎添翼，势不可挡。新车名为[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]‑[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]。"
 vikelas.581.d_level_3: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName]对发动机进行了全面升级。如今，最新款赛车已配备#V 四缸发动机#!，性能更上一层楼，如虎添翼，势不可挡。新车名为[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]‑[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]。"
 vikelas.581.d_level_4: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName]对发动机进行了全面升级。如今，最新款赛车已配备#V 八缸增压发动机#!，性能更上一层楼，如虎添翼，势不可挡。新车名为[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]‑[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]。"
 vikelas.581.f: "“我铸造引擎，将轮辋装点其上。”——恩佐·法拉利"
 vikelas.581.g: "加油！"
 vikelas_new_engine_tt: "现有的发动机将迎来全面升级。"
 vikelas.582.t: "新型赛车安全装置"
 vikelas.582.d_level_2: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName]对安全装置进行了升级。如今，最新款赛车配备了#V 后视镜#!，为车手保驾护航。新车名为[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]‑[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]。"
 vikelas.582.d_level_3: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName]对安全装置进行了升级。如今，最新款赛车配备了#V 液压制动器#!，为车手保驾护航。新车名为[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]‑[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]。"
 vikelas.582.d_level_4: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName]对安全装置进行了升级。如今，最新款赛车配备了#V 现代轮胎#!，为车手保驾护航。新车名为[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]‑[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]。"
 vikelas.582.f: "“欲登顶峰，必先完赛。”——胡安·曼努埃尔·范吉奥"
 vikelas_new_safety_tt: "现有的安全装置将迎来全面升级。"
 vikelas.583.t: "赛车车身新设计"
 vikelas.583.d_level_2: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName]对车身进行了全新升级。如今，新赛车搭载了#V 鱼雷车身#!，尽显速度与力量之美。新车名为[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]‑[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]。"
 vikelas.583.d_level_3: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName]对车身进行了全新升级。如今，新赛车搭载了#V 冲压钢车身#!，尽显速度与力量之美。新车名为[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]‑[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]。"
 vikelas.583.d_level_4: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName]对车身进行了全新升级。如今，新赛车搭载了#V 流线型车身#!，尽显速度与力量之美。新车名为[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]‑[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]。"
 vikelas.583.f: "“第二辆汽车问世不过五分钟，赛车运动便应运而生。”——亨利·福特"
 vikelas_new_body_tt: "现有的车身将迎来全面升级。"
 vikelas.584.t: "V型发动机"
 vikelas.584.d: "我们的工程师[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]博士提出了一个关于赛车新发动机的突破性建议，并联系了机械师[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName]。"
 vikelas.584.f: "V型发动机，这一精妙的机械杰作，是一种往复式活塞发动机的独特变体。其核心在于将多个气缸巧妙地分为两组，以特定的角度相对排列。这种匠心独运的设计在气缸数量众多且安装空间受限的情况下大放异彩，成为工程师们的首选。其紧凑的结构不仅节省了宝贵的材料，更显著减轻了整体重量。\n889年，天才工程师威廉·迈巴赫开创性地设计出世界上首台V型发动机——一台精巧的V型双缸发动机，并将其应用于戴姆勒钢轮车，开启了V型发动机的传奇篇章。时光流转至1903年，莱昂·勒瓦瓦瑟以其非凡的创造力，为赛艇和飞机量身打造了首台V8发动机，即著名的安托瓦内特发动机，将V型发动机的设计推向了新的高度。"
 vikelas.584.g: "我明白了！"
 vikelas.585.t: "燃料改进"
 vikelas.585.d: "我们的化学家[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士进一步开发了内燃机燃料，使其在提高赛车效率和性能方面可能发挥关键作用。[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName]对试运行表现出极大的兴趣。"
 vikelas.585.f: "在汽油燃料发展的最初数十年间，其形态与成分经历了翻天覆地的变革。众多企业热衷于将燃料稀释，或与其他纯净燃料混合使用。早在19世纪，内燃机先驱尼古拉斯·奥古斯特·奥托便已开始使用精馏酒精作为燃料。在一些石油资源匮乏的国度，这种稀缺性反而催生了替代燃料的开发热潮，同时也推动了提高现有燃料效率的技术革新。\n在赛车领域，燃料与润滑油的改良更是达到了登峰造极的地步。工程师们不断研发新型配方，只为确保赛车性能的极致优化。"
 vikelas.585.g: "我明白了！"
 vikelas.586.t: "空力"
 vikelas.586.d: "我们的物理学家[ROOT.Var('curie_physicistvar').GetCharacter.GetLastName]博士提供了一些关于空气动力的计算，可能对车辆制造有用。赛车机械师[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName]收到了论文的副本。"
 vikelas.586.f: "“只有造不好引擎的人才会去研究空气动力学。”——恩佐·法拉利"
 vikelas.586.g: "我明白了！"
 vikelas.590.t: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]现在是著名赛车手！"
 vikelas.590.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]赢得了世界各地的比赛，并以其赛车风格而闻名。[ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]现在出名到可以被认作著名赛车手了！"
 vikelas.590.f: ""
 vikelas.590.g: "一个活着的传奇！"
 vikelas.591.t: "我们的赛车手[SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullNameNoFormatting]准备退休"
 vikelas.591.d: "当[SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullName]在世界各地的赛车之旅中度过了多年后，[SCOPE.sCharacter('vikelas_retired_racer_scope').GetHerHis]现在要退休了。[SCOPE.sCharacter('vikelas_retired_racer_scope').GetSheHe]将不再作为[concept_vikelas_racer]活跃在台前。"
 vikelas.591.g: "[SCOPE.sCharacter('vikelas_retired_racer_scope').GetSheHe|U]配得上[SCOPE.sCharacter('vikelas_retired_racer_scope').GetHerHis]的退休金！"
 vikelas.591.h: "他将成为一位伟大的工程师！"
 vikelas.591.new_racer_replace_tt: "[SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullName]即将退休，并且[SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName]将成为[GetPlayer.GetName]的新[concept_vikelas_racer]。"
 vikelas.591.racer_to_engineer_tt: "[SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullName]将成为你的新[concept_tesla_engineer]。[SCOPE.GetRootScope.GetCountry.GetCustom('academics_replacement_engineer_custom_loc')]"
 vikelas.591.new_racer_tt: "[SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName]将会成为[GetPlayer.GetName]的新[concept_vikelas_racer]。"
 vikelas.592.t: "我们的[concept_vikelas_racer]死亡"
 vikelas.592.d: "在成为[concept_vikelas_racer]多年后，我国的知名赛车手去世了。我们能找到替代这位不世出的天才的人选吗？"
 vikelas.592.g: "这将是我们巨大的损失！"
 vikelas.592_tt: "有时游戏会杀死角色。模组无法阻止这种情况的发生。此事件将从游戏中删除该[concept_character]，这样您就不会被他们的鬼魂所困扰。"
 vikelas.593.t: "惨烈车祸"
 vikelas.593.d: "赛车手[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]过于追求极限，终因车速过快冲出赛道，酿成惨剧，不幸殒命。"
 vikelas.593.f: "“赛车是一种令人痴狂的信仰，为之奉献一切，义无反顾，无怨无悔。”——恩佐·法拉利"
 vikelas.593.g: "下一位！"
 vikelas.594.t: "故障"
 vikelas.594.d: "令人遗憾的是，赛车手[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]未能在比赛中坚持到最后。[ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe]坦言，因车辆故障无奈退赛。"
 vikelas.594.f: "“所谓坏运气，不过是弱者的托词。”——恩佐·法拉利。"
 vikelas.594.g: "是车辆的问题，还是车手过度压榨了发动机？"
 vikelas.595.t: "新赛车手"
 vikelas.595.d: "一位新的[concept_vikelas_racer]已正式加入团队，[SCOPE.sCharacter('vikelas_new_racer_scope').GetHerHis|U]名为[SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName]。"
 vikelas.595.g: "让我们祈祷[SCOPE.sCharacter('vikelas_new_racer_scope').GetSheHe]运气更好些。。"
