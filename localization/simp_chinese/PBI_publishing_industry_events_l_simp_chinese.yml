 pbi_publishing_industry_events.100.t: "随你喜欢"
 pbi_publishing_industry_events.100.d.1: "在[ROOT.GetCountry.GetName]中，有支持[SCOPE.sParty('target_party_1').GetName]的报纸，也有支持[SCOPE.sParty('target_party_2').GetName]的报纸，甚至还有支持[SCOPE.gsInterestGroup('target_ig_3').GetName]的报纸，各种报纸给民众选择"
