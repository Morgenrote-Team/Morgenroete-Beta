 pbi_publishing_industry_events.100.d.3: "在[ROOT.GetCountry.GetName]中，有支持[SCOPE.gsInterestGroup('target_ig_1').GetName]的报纸，有支持[SCOPE.gsInterestGroup('target_ig_2').GetName]的报纸，甚至还有[SCOPE.gsInterestGroup('target_ig_3').GetName]的报纸，各种报纸给民众选择。"
 pbi_publishing_industry_events.100.d.4: "在[ROOT.GetCountry.GetName]中，有支持[SCOPE.gsInterestGroup('target_ig_1').GetName]的报纸，有支持[SCOPE.gsInterestGroup('target_ig_2').GetName]的报纸，各种报纸给民众选择。"
 pbi_publishing_industry_events.100.f: "“你提供图片，我就会提供战争！”\n——威廉·伦道夫·赫斯特"
 pbi_publishing_industry_events.100.a: "有选择就好"
 pbi_publishing_industry_events.100.b: "人们满足于让报纸替他们发言"
 pbi_publishing_industry_events.105.t: "政府公共关系文件"
 pbi_publishing_industry_events.105.d.1: "[SCOPE.sParty('target_party_2').GetName]的[SCOPE.sCharacter('target_character_2').GetFullName]批评了[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]、[SCOPE.sParty('target_party_1').GetName]的报纸，并认为[SCOPE.sState('target_state').GetName]的[SCOPE.sCharacter('target_character_1').GetFullName]是幕后控制者，是代表政府的口舌。"
 pbi_publishing_industry_events.105.d.2: "[SCOPE.gsInterestGroup('target_ig_2').GetName]的[SCOPE.sCharacter('target_character_2').GetFullName]批评了[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]、[SCOPE.sParty('target_party_1').GetName]的报纸，并认为[SCOPE.sState('target_state').GetName]的[SCOPE.sCharacter('target_character_1').GetFullName]是幕后控制者，是代表政府的口舌。"
 pbi_publishing_industry_events.105.d.3: "[SCOPE.sParty('target_party_2').GetName]的[SCOPE.sCharacter('target_character_2').GetFullName]批评了[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]、[SCOPE.gsInterestGroup('target_ig_1').GetName]的报纸，并认为[SCOPE.sState('target_state').GetName]的[SCOPE.sCharacter('target_character_1').GetFullName]是幕后控制者，是代表政府的口舌。"
 pbi_publishing_industry_events.105.d.4: "[SCOPE.gsInterestGroup('target_ig_2').GetName]的[SCOPE.sCharacter('target_character_2').GetFullName]批评了[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]、[SCOPE.gsInterestGroup('target_ig_1').GetName]的报纸，并认为[SCOPE.sState('target_state').GetName]的[SCOPE.sCharacter('target_character_1').GetFullName]是幕后控制者，是代表政府的口舌。"
 pbi_publishing_industry_events.105.f: "“既然从工人阶级到上层阶级的人显然都是为了自身利益而行动，那么毫无疑问，国家的意志应该由代表国家的政府来行使，而人民有义务支持和配合政府的决定。”"
 pbi_publishing_industry_events.105.a: "这也是新闻的力量"
 pbi_publishing_industry_events.105.b: "反对党应该有一个报纸来代表口舌"
 pbi_publishing_industry_events.110.t: "优先媒体权"
 pbi_publishing_industry_events.110.d: "一个[SCOPE.gsInterestGroup('target_ig').GetName]成员，[SCOPE.sCharacter('target_character').GetFullName]，坚持认为他的报纸应该优先报道政府新闻。"
 pbi_publishing_industry_events.110.f: "“在我们的政策被不负责任和道德沦丧的三无记者污蔑之前，我们应该优先选择准确的报纸来告诉公众我们打算做什么。”"
 pbi_publishing_industry_events.110.a: "政府的使命是正确沟通民众"
 pbi_publishing_industry_events.110.b: "这种偏袒是不可接受的"
 pbi_publishing_industry_events.115.t: "报纸支持新法律"
 pbi_publishing_industry_events.115.d.1: "[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]是一家[SCOPE.sParty('target_party').GetName]的报纸，其出版商[SCOPE.sCharacter('target_character').GetFullName]每天发表文章歌颂[SCOPE.sLaw('target_law').GetName]，但其他报纸对此评价是过度赞扬的。"
 pbi_publishing_industry_events.115.d.2: "[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]是一家[SCOPE.gsInterestGroup('target_ig').GetName]的报纸，其出版商[SCOPE.sCharacter('target_character').GetFullName]每天发表文章歌颂[SCOPE.sLaw('target_law').GetName]，但其他报纸对此评价是过度赞扬的。"
 pbi_publishing_industry_events.115.f: "“如果说这个法律有什么问题，那就是很难指望反对党的绅士们能正确理解这个法律的重要性。”"
 pbi_publishing_industry_events.115.a: "舆论由我们创造，由我们引导"
 pbi_publishing_industry_events.115.b: "指出法案的问题是媒体的职责！"
 pbi_publishing_industry_events.120.t: "政治丑闻"
 pbi_publishing_industry_events.120.d: "一些报纸针对报道[SCOPE.sCharacter('target_character').GetFullName]的丑闻，他属于[SCOPE.gsInterestGroup('target_ig').GetName]，但[SCOPE.sCharacter('target_character').GetSheHe]声称，报纸上的文章是不真实且诽谤的。"
 pbi_publishing_industry_events.120.f: "“考虑到[SCOPE.sCharacter('target_character').GetLastName]在[SCOPE.sCharacter('target_character').GetHerHis]获得令人尊敬的地位之前一直与什么样的人交往，[SCOPE.sCharacter('target_character').GetSheHe]参与这些丑闻并不意外。事实上，本报非常幸运的能够与当年熟悉[SCOPE.sCharacter('target_character').GetHerHim]的其中一个人交谈。这些惊人的细节将在我们的下一个报纸专题中揭晓！”"
 pbi_publishing_industry_events.120.a: "也许我们可以利用这点……"
 pbi_publishing_industry_events.120.b: "这是整个[SCOPE.gsInterestGroup('target_ig').GetName]都有的问题！"
 pbi_publishing_industry_events.125.t: "谁的报纸？"
 pbi_publishing_industry_events.125.d: "[SCOPE.sState('target_state').GetName]民众认为报纸只写对政府有利的内容。"
 pbi_publishing_industry_events.125.f: "在[SCOPE.sState('target_state').GetName]有许多报纸出版，而[SCOPE.sCharacter('target_character').GetFullName]是所有报纸的股东，所以其可以决定在报纸上刊登什么，什么不能刊登。所有！报纸！只能按照[SCOPE.sCharacter('target_character').GetHerHis]的意愿来发表文章！！可以这么说！[SCOPE.sState('target_state').GetName]只有一家报纸！"
 pbi_publishing_industry_events.125.a: "新闻不是小说，不能胡编乱造"
 pbi_publishing_industry_events.125.b: "该死的民众从不满足于他们所得到的"
 pbi_publishing_industry_events.200.t: "请告诉我，圣诞老人真的有吗？"
 pbi_publishing_industry_events.200.d: "记者先生：\n我8岁。\n我的朋友里边，有的小孩说：“圣诞老人并不存在”。\n我问爸爸，爸爸说：“去问《太阳报》看，报社说有，那就真的有了。”\n因此，拜托了，请告诉我，圣诞老人真的有吗？\n帕吉尼娅，欧汉劳恩纽约市西95街115号。"
 pbi_publishing_industry_events.200.f: "说没有圣诞老人？\n哪儿的话！让我们高兴的是，圣诞老人的确存在。不止如此，他大概永远不会死亡。\n一千年以后，一百万年以后，圣诞老人也会同现在一样，让孩子们的心高兴起来。——太阳报"
 pbi_publishing_industry_events.200.a: "这些小报的人……看来还有人性"
 pbi_publishing_industry_events.200.b: "爱的力量！"
 pbi_publishing_industry_events.205.t: "权威报纸批评小报"
 pbi_publishing_industry_events.205.d: "[ROOT.GetCountry.GetName]中享有盛誉的报社批评在[SCOPE.sState('target_state').GetName]的小报——因其发表了诸多带有耸人听闻的虚假新闻但收获许多读者。"
 pbi_publishing_industry_events.205.f: "“我们国家的媒体态度只会越来越傲慢。他们所刊登的都是关于政治家和社会名流的八卦，或者丑闻、罪行和审判。而且这些文章大多是捏造的，背后没有任何真实的报道或来源！”"
 pbi_publishing_industry_events.205.a: "实在是太可惜了"
 pbi_publishing_industry_events.205.b: "至少他们可以培育群众读报"
 pbi_publishing_industry_events.210.t: "名誉有损"
 pbi_publishing_industry_events.210.d: "[SCOPE.sState('target_state').GetName]的小报正在报道[SCOPE.sCharacter('target_character').GetPrimaryRoleTitle|l][SCOPE.sCharacter('target_character').GetFullName]的丑闻，后者以该报道不真实和有损名誉为由要求政府处置。"
 pbi_publishing_industry_events.210.f: "“考虑到[SCOPE.sCharacter('target_character').GetLastName]在[SCOPE.sCharacter('target_character').GetHerHis]获得令人尊敬的地位之前一直与什么样的人交往，[SCOPE.sCharacter('target_character').GetSheHe]参与这些丑闻并不意外。事实上，本报非常幸运的能够与当年熟悉[SCOPE.sCharacter('target_character').GetHerHim]的其中一个人交谈。这些惊人的细节将在我们的下一个报纸专题中揭晓！”"
 pbi_publishing_industry_events.210.a: "在这种情况下，新闻报道的真实性不是问题"
 pbi_publishing_industry_events.210.b: "[SCOPE.sCharacter('target_character').GetLastName]的名誉需要恢复"
 pbi_publishing_industry_events.215.t: "拼凑而成的报纸"
 pbi_publishing_industry_events.215.d: "[SCOPE.sState('target_state').GetName]小报的大部分文章中抄袭现象司空见惯。"
 pbi_publishing_industry_events.215.f: "“[SCOPE.sState('target_state').GetName]的小编们就像饥饿的土狼。他们找到一篇他们认为可以获得一些读者的文章，然后在他们的报纸上发表，现在要找到一篇没有抄袭的文章是很难的。有一家报纸甚至直接刊登了另一家报纸的社论！”"
 pbi_publishing_industry_events.215.a: "这篇文章的奖励应该给真正写这篇文章的人"
 pbi_publishing_industry_events.215.b: "好文章应该传播，不需要在意是否抄袭"
 pbi_publishing_industry_events.220.t: "令人激动"
 pbi_publishing_industry_events.220.d: "残忍的凶杀案，情人争吵，真假难辨的丑闻。[SCOPE.sState('target_state').GetName]的市民每天都被小报上的故事所吸引。"
 pbi_publishing_industry_events.220.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_publishing_industry_flavor_220')]"
 pbi_publishing_industry_events.220.f.1: "“在一个旧巷子里有一个极其惊人的发现。房东雇用了一个建筑承包商来进行装修。当工人们拆除部分墙壁时，他们感到很惊讶，因为一条通向地下室的通道显露出来。工人们战战兢兢地进入地窖。炽热的手电筒光清楚地显示出两具人体的残骸！！！这些骷髅穿着近两个世纪的衣服！邻近的居民提供了各种信息。然而目前无法得出结论，这两个人是被困在地下室里惨死，还是被抛尸在此。”"
 pbi_publishing_industry_events.220.f.2: "“在这个星期六下午，这个挺安静的小镇却相当紧张。据报道，这是因为一起针对一个七岁女孩的可怕谋杀案！当天下午1点半左右，三个孩子被一个律师事务所的年轻职员找去。那人给了女孩一个硬币，并邀请她一起去一个空地上。另外两个孩子也收到了硬币，并被要求保证不跟随该男子。然而女孩不想跟那个人走。但是没多久凶手就残暴把她拖走。到了七八点钟，仍然不见女孩的踪影，邻居们开始议论她。邻居们根据孩子们的消息进入农场后不久，他们发现失踪女孩的头在地上。显然是被利刃砍掉的！她的脸上从嘴到耳朵，还有左边的太阳穴都布满了伤口！！！！被肢解的、没有四肢的尸体的每一部分都散落在种植园里。”"
 pbi_publishing_industry_events.220.f.3: "“一名劳工男子被指控虐待他的妻子。这名男子前几天晚上带着马鞭回家，鞭打躺在床上的妻子还丢掉她的化妆品。她已经怀孕七个月，无法反抗！！他的鞭打几乎使她丧命！！甚至恶毒的男人还爬到床上，用脚踩她，踩断了三根肋骨。她被送往医院，伤势严重。在第一次听证会上，被告低声说，这是因为他的妻子有酗酒陋习。所以法官判处他一个星期的拘留。”"
 pbi_publishing_industry_events.220.f.4: "“这个二十三岁的农夫之子以无与伦比的残暴手段屠杀了他的父母、五个兄弟姐妹和一个女仆。他只是解释了他的杀人动机和方法，没有显示出忏悔的迹象。他拿着一根六英尺长的棍子，从后面把他的兄弟一个接一个地打死。接下来就轮到父亲了，他告诉他们牛跑了，当他的父亲从前门出来时，他在田野前把他的父亲打死了。他把父亲的尸体放在马车上，抬到房子后面挖开土壤，掩盖尸体。然后他回到自己的房间，解决了他的弟弟妹妹们。他的母亲被他用斧头砍倒在地。最后他跑进仆人的房间，在黑暗中对着女仆的床挥两下斧子，女仆在毫不知情之中死去。他被审判并被判处死刑。罪犯离开法庭时表现得异常镇定。”"
 pbi_publishing_industry_events.220.f.5: "“里德街的居民约翰·沃特被指控酗酒并对其父母施暴。约翰是一个有问题的38岁男子，而他的父亲已经93岁，母亲88岁。据称他曾多次喝醉并对其父母施暴。母亲觉得自己的儿子很可怜，不太愿意把他送进监狱。”"
 pbi_publishing_industry_events.220.f.6: "“当汤森夫人因为要买白兰地‘给孩子们洗头’而向丈夫要两先令时，丈夫不相信她并拒绝她。他认为如果妻子买了白兰地等，她会把它灌进自己的嘴里，然后再倒在孩子们的头上。夫妻俩立即开始争吵，愤怒的妻子把丈夫赶出了家门。当丈夫晚上回到家时，他发现他的妻子处于癫狂状态。当他指责她时，汤森夫人一把抓起火钳，敲向丈夫的头部。丈夫也不甘示弱，将妻子打得遍体鳞伤。判决结果是丈夫和妻子都有罪！”"
 pbi_publishing_industry_events.220.f.7: "“'苏珊·伯克一个没有住所的太太，已经有三个月没有房子住了。法官说是时候让她有个家了，于是给了她一套房子，让她住六个月。”"
 pbi_publishing_industry_events.220.a: "这就是人性之恶"
 pbi_publishing_industry_events.220.b: "这太可怕了……我们要保持人性善良……"
 pbi_publishing_industry_events.225.t: "天文学突破"
 pbi_publishing_industry_events.225.d: "[SCOPE.sState('target_state').GetName]的小报报道说非洲好望角的一个天文台利用一个巨大的望远镜，在一个全新的原理下工作，取得了一个惊人的发现！"
 pbi_publishing_industry_events.225.f: "“利用这个巨大的望远镜，约翰·赫歇耳爵士能够清楚地看到月球上存在的东西。最终他确信月球上有生命存在，他根据宇宙的规律，并以此判断确定生命的存在。”"
 pbi_publishing_industry_events.225.a: "我们并不孤独！"
 pbi_publishing_industry_events.226.t: "类人蝙蝠"
 pbi_publishing_industry_events.226.d: "[SCOPE.sState('target_state').GetName]的廉价报纸——《太阳报》发表了关于月球发现的后续报道，公众对这些惊人的细节感到兴奋。"
 pbi_publishing_industry_events.226.f: "“突然我看到有大翅膀的生物从悬崖上慢慢降到平原上。我可以清楚地看到，它们的翅膀与蝙蝠的翅膀很相似。翅膀是由半透明的薄膜制成的，呈圆形，从它们的背上长出，一个奇怪的结构。他们中的一些人面对面，挥舞手和胳膊，这似乎表明，他们在通过手势进行交流。天文学家将这种意想不到的新生物命名为类人蝠。这种生物有男有女，我们继续对其习性进行了详细的观察。我们怀疑他们天性乐观的生物，但他们的生活方式以地球上的礼仪标准来说太无礼了。”"
 pbi_publishing_industry_events.226.a: "如果这个故事是真的，那将是有史以来最美妙的事情！"
 pbi_publishing_industry_events.227.t: "真假谁知"
 pbi_publishing_industry_events.227.d: "近期在[SCOPE.sState('target_state').GetName]的廉价报纸——《太阳报》发布的月球上发现生物的消息，现在已经成为整个美国的话题，学者和知识分子都参与其中。"
 pbi_publishing_industry_events.227.f: "“学者和地区读者以前所未有的热情，日复一日地期待着从纽约寄来的邮件。你知道约翰·赫歇耳爵士的伟大发现了吗？你知道在月球上已经有类人生物吗？！无论我走到哪里，都有人问我同样的问题。这是一个当时所有人都着迷的话题，没有人质疑真假。”\n——耶鲁大学的一名学生"
 pbi_publishing_industry_events.227.a: "就算是谎言，也给这位记者记上一功"
 pbi_publishing_industry_events.230.t: "乔治·华盛顿的保姆"
 pbi_publishing_industry_events.230.d: "[SCOPE.sState('target_state').GetName]报纸都是关于一个叫乔伊斯·赫斯的黑人妇女，她声称自己是乔治·华盛顿的保姆。"
 pbi_publishing_industry_events.230.f: "“这位老妇人已经足足161岁了。这一事实毋庸置疑。就算她说自己500岁，恐怕也无人质疑。更何况，演出推手P.T.巴纳姆向我们展示了一份他拿到的收据作为证明，那是她还是奴隶时的交货单。这张单子日期标注为1727年，上面写明乔伊斯·赫斯在五十四岁时被乔治·华盛顿的父亲奥古斯丁·华盛顿买下。”"
 pbi_publishing_industry_events.230.a: "世界充满惊喜！"
 pbi_publishing_industry_events.235.t: "尼斯湖水怪"
 pbi_publishing_industry_events.235.d: "在[SCOPE.sState('target_state').GetName]的尼斯湖，[SCOPE.sState('target_state').GetOwner.GetName]看到一个不明生物的报道，成为新闻头条。"
 pbi_publishing_industry_events.235.f: "“当地居民声称看到一个形状像木头或翻转的小船的物体，随着它的起伏搅动着水面，起初缓慢移动，然后逐渐加速，消失在水中。”"
 pbi_publishing_industry_events.235.a: "世界充满惊喜！"
 pbi_publishing_industry_events.236.t: "尼斯湖奇观"
 pbi_publishing_industry_events.236.d: "在[SCOPE.sState('target_state').GetName]的尼斯湖，[SCOPE.sState('target_state').GetOwner.GetName]看到一个不明生物的报道，成为新闻头条。"
 pbi_publishing_industry_events.236.f: "“一位来自阿布里安的石匠，那天看到一只巨大动物从尼斯湖中出现，离岸边大约50码。”"
 pbi_publishing_industry_events.236.a: "世界充满惊喜！"
 pbi_publishing_industry_events.237.t: "外科医生的照片"
 pbi_publishing_industry_events.237.d: "在[SCOPE.sState('target_state').GetName]的尼斯湖，[SCOPE.sState('target_state').GetOwner.GetName]的一个不明生物的照片，正在成为新闻头条。"
 pbi_publishing_industry_events.237.f: "“长期以来，围绕在尼斯湖看到的不明生物的争议一直很激烈，但这张由伦敦的妇科医生罗伯特·肯尼斯·威尔逊拍摄的照片结束了争议，他提供了无可辩驳的证据，证明尼斯湖水怪仍然生活在那里。”"
 pbi_publishing_industry_events.237.a: "世界充满惊喜！"
 pbi_publishing_industry_events.240.t: "花仙子"
 pbi_publishing_industry_events.240.d: "在[SCOPE.sState('target_state').GetName], 拍摄的照片位于[SCOPE.sCountry('target_country').GetName]附近，照片显示一个精灵与一个年轻女孩玩耍。"
 pbi_publishing_industry_events.240.f: "“在[SCOPE.sCountry('target_country').GetName]，有人拍摄了一张引人注目的照片。这张照片是通过神学会发布的，清楚地显示了一个精灵在和一个小女孩玩耍。该协会请摄影专家对照片进行鉴定，得出的结论是照片不是伪造的。小说家柯南·道尔在一份灵媒杂志上声称，这张照片是灵媒现象的明确证据！”"
 pbi_publishing_industry_events.240.a: "世界充满奇妙！"
 pbi_publishing_industry_events.245.t: "聪明的汉斯"
 pbi_publishing_industry_events.245.d: "在[SCOPE.sCountry('target_country').GetName]的[SCOPE.sState('target_state').GetName]中，一匹能做数学和日历计算的马是镇上的话题。"
 pbi_publishing_industry_events.245.f: "“汉斯问道：‘如果8号是星期二，那么下一个星期五的日期是什么？’它的回答是马蹄跺地11次。德国教育委员会成立了一个由13名成员组成的调查委员会，其中包括一名兽医、一家动物园的负责人和一名骑兵军官，以调查这匹令人惊讶的马。委员会的结论是，在汉斯的表演中没有作弊的迹象。”"
 pbi_publishing_industry_events.245.a: "世界充满惊喜！"
 pbi_publishing_industry_events.246.t: "智慧的秘密"
 pbi_publishing_industry_events.246.d: "心理学家奥斯卡·芬斯特揭开了汉斯的秘密，这匹聪明马已成为[SCOPE.sCountry('target_country').GetName]热议的主要话题。"
 pbi_publishing_industry_events.246.f: "“当提问者本人不知道答案时，汉斯就鲜少能给出正确回答。芬斯特还发现了一项共性：随着汉斯敲击蹄子的次数逐渐接近正确答案，提问者的面部表情和身体姿态会徐徐浮现出紧张感，而这种紧张恰在答案正确的那一刹那得以释放。由此，芬斯特断定，汉斯是以提问者的身体讯息作为回答的线索。”\n汉斯这种通过感知周遭反应来迎合观察者期望的行为，被称为“聪明汉斯效应”。即便在今天，人们依然在警犬的气味识别工作中，观察到了这一效应的存在。"
 pbi_publishing_industry_events.246.a: "名副其实的聪明汉斯！"
 pbi_publishing_industry_events.250.t: "吹口哨的男孩"
 pbi_publishing_industry_events.250.d: "读者被[SCOPE.sState('target_state').GetName]报纸上一篇关于谎言的小文章逗乐了。"
 pbi_publishing_industry_events.250.f: "“佛蒙特州的一个男孩习惯于独自工作，一看到周围没有人，他就开始吹口哨。他的口哨声大得出奇，甚至在他失去意识、睡着的时候，他甚至也会吹口哨。他的母亲很担心这个现象，急忙采取了行动。她要求另一个男孩一直呆在他身边，一旦开始吹口哨，就打她。”"
 pbi_publishing_industry_events.250.a: "世界充满惊喜！"
 pbi_publishing_industry_events.300.t: "新闻的功效"
 pbi_publishing_industry_events.300.d: "在[ROOT.GetCountry.GetName]中，从[concept_upper_strata]到[concept_lower_strata]的每个人都会读报纸。群众通过报纸了解各种各样的新闻，了解从远在大洋彼岸的国家之间的紧张事件到当地妓女的离奇谋杀。"
 pbi_publishing_industry_events.300.f: "“从这个角度来看，这些劣质报纸做出了一个实际的贡献：它教会了人们如何阅读，让他们对报纸有了兴趣。”\n——埃米尔·左拉（《巴黎报》）"
 pbi_publishing_industry_events.300.a: "我们应该关注报纸的政治作用"
 pbi_publishing_industry_events.300.b: "报纸作为大众娱乐的价值是巨大的"
 pbi_publishing_industry_events.305.t: "划时代印刷机"
 pbi_publishing_industry_events.305.d: "在[SCOPE.sCountry('target_country').GetName]的[SCOPE.gsInterestGroup('target_ig').GetName]的聚会上，[SCOPE.sCharacter('target_character').GetFullName]介绍的新印刷机性能被公认为优秀。"
 pbi_publishing_industry_events.305.f: "轮转印刷机是一种令印刷的图像围绕滚筒弯曲的印刷机，并将纸张送入其中进行印刷，每小时可印刷8000多张，比传统印刷机快得多。"
 pbi_publishing_industry_events.305.a: "好主意"
 pbi_publishing_industry_events.305.b: "我们不需要他们的帮助"
 pbi_publishing_industry_events.310.t: "计划成立报业公司"
 pbi_publishing_industry_events.310.d.1: "[SCOPE.sCharacter('target_character').GetFullName]计划在[SCOPE.sState('target_state').GetName]建立第一家报社。\n该报纸将是[SCOPE.gsInterestGroup('target_ig').GetName]的一份报纸。"
 pbi_publishing_industry_events.310.d.2: "[SCOPE.sCountry('target_country').GetName]的[SCOPE.sCharacter('target_character').GetFullName]计划在[SCOPE.sState('target_state').GetName]建立其第一家报纸。\n这将与[SCOPE.sCountry('target_country').GetName]的关系产生一定影响……"
 pbi_publishing_industry_events.310.f: "“我们构想在[SCOPE.sState('target_state').GetName]中出版报纸的想法最初主要与各个社区的商业需求有关。这个想法得到了广泛的认同，这一点从对我们的回应中得到了证明。”\n——《广告人报》"
 pbi_publishing_industry_events.310.a: "好主意"
 pbi_publishing_industry_events.310.b: "不应该让他们创办报刊！"
 pbi_publishing_industry_events.315.t: "报纸上的争论"
 pbi_publishing_industry_events.315.f: "“我相信本报的明智读者会明白，他们的任何说法都没有任何依据，只会编造谎言来攻击我们。他们的报纸充其量只是一张废纸！”"
 pbi_publishing_industry_events.315.c: "报纸只是在胡编乱造"
 pbi_publishing_industry_events.320.t: "禁止发行"
 pbi_publishing_industry_events.320.d: "法院已对[SCOPE.sState('target_state').GetName]报纸“[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]”发布禁令，该报纸多次提出批评政府的主张。"
 pbi_publishing_industry_events.320.f: "他们没有任何政治权威，却利用公众对报纸的信任多次无端恶意批评政府，向公众灌输他们想要的理论"
 pbi_publishing_industry_events.320.a: "正义得到伸张"
 pbi_publishing_industry_events_320_tt.1: "[SCOPE.sState('target_state').GetName][GetBuildingType('building_manzoni_publishing_industry').GetName]将在一年内处于非活跃状态。"
 pbi_publishing_industry_events_320_tt.2: "[SCOPE.sState('target_state').GetName][GetBuildingType('building_manzoni_publishing_industry').GetName]将在六个月内处于非活跃状态"
 pbi_publishing_industry_events.320.b: "纪律处分应保持在最低限度"
 pbi_publishing_industry_events.325.t: "报童罢工"
 pbi_publishing_industry_events.325.d: "[SCOPE.sState('target_state').GetName]的报童发起了一场大规模罢工，要求报纸出版商给予更好的待遇。"
 pbi_publishing_industry_events.325.f: "“同志们！在这一个考验道德的时代，这是我们必须像胶水一样互相狠狠的并肩作战！我们知道我们想要什么！我们会得到也必须得到我们所声张的！”\n——路易·巴勒蒂"
 pbi_publishing_industry_events.325.a: "这种乱象必须纠正"
 pbi_publishing_industry_events.325.b: "只是罢工，对吧？"
 pbi_publishing_industry_events.330.t: "被谋杀的妓女"
 pbi_publishing_industry_events.330.d: "[SCOPE.sState('target_state').GetName]的报纸报导了一起妓女谋杀案，引起了广泛关注。\n一些报纸甚至刊登了对真凶的虚假采访。"
 pbi_publishing_industry_events.330.f: "“绿衣女郎”海伦·朱厄特是当时曼哈顿最出名的妓女，因常穿绿衣而得名。如今23岁妓女海伦·朱伊特的尸体在一家妓院被发现，尸体在床上被烧成焦糊状，头部被斧子砍得深陷了进去。\n很快警方逮捕了19岁的鲁滨逊，因为他是受害人的最后一位客人，他的审判定于两个月后进行。"
 pbi_publishing_industry_events.330.a: "有趣"
 pbi_publishing_industry_events.331.t: "有争议的审判"
 pbi_publishing_industry_events.331.d: "当因谋杀海伦·朱厄特而被捕的理查德·P·鲁滨逊的审判在[SCOPE.sState('target_state').GetName]法院开庭时，同情朱厄特的人和同情鲁滨逊在报纸之间展开了激烈的讨论，说妓女没有同情余地的人大部分来自工人阶级背景，但审判很快就结束了。"
 pbi_publishing_industry_events.331.f: "“尽管出示的所有证据和证词都表明被告有罪，因为大多数作证的证人都是妓女，所以法官和陪审团无视了证词。结果不到30分钟，被告就被宣告无罪！”"
 pbi_publishing_industry_events.331.a: "这怎么能叫公平审判呢？"
 pbi_publishing_industry_events.331.b: "有为青年和妓女能一样吗？"
 pbi_publishing_industry_events.335.t: "大屠杀"
 pbi_publishing_industry_events.335.d: "在[SCOPE.sState('target_state').GetName]的[SCOPE.sState('target_state').GetOwner.GetName]郊区一系列谋杀案的肇事者已落网，而肇事者接连披露的残酷犯罪描述及其动机也引起了广泛关注。"
 pbi_publishing_industry_events.335.f: "“一个在巴黎郊区的田地里工作的工人从地里挖出了一个女人和她的五个孩子的尸体，这名妇女尸体上被人用刀刺了30多处，而且她的孩子们被以各种方式杀害，包括割喉、勒死和剖腹。这起令人难以置信的谋杀案肇事者是一位名叫让‑巴蒂斯特·特罗普曼的机械师。他承认是在受害者丈夫的指使下实施谋杀的，因为受害者丈夫怀疑受害者不忠。但是目前受害者丈夫失踪了，警方仍在寻找他。”"
 pbi_publishing_industry_events.335.a: "魔鬼再世的恶棍！！"
 pbi_publishing_industry_events.336.t: "公开处决"
 pbi_publishing_industry_events.336.d: "在[SCOPE.sState('target_state').GetOwner.GetName]的[SCOPE.sState('target_state').GetName]郊区发生的连环杀人案元凶被用断头台公开处决，吸引了大批围观者。"
 pbi_publishing_industry_events.336.f: "警方发现受害人的丈夫已经死亡，他已被追为重要证人。但是让‑巴蒂斯特·特罗普曼很快承认他的证词是编造的谎言，并说本案从一开始就是为了抢劫妇女的金钱。"
 pbi_publishing_industry_events.336.a: "该死的人渣没有饶恕的余地！"
 pbi_publishing_industry_events.340.t: "幸好电报让我们及时抓住罪犯！"
 pbi_publishing_industry_events.340.d: "在[SCOPE.sState('target_state').GetName]、[SCOPE.sState('target_state').GetOwner.GetName]中，一名乘火车逃跑的罪犯利用车站逃跑，结果被目击者通过电报被成功抓获，这则电报已成为热议的话题。"
 pbi_publishing_industry_events.340.f: "“从斯劳车站到帕丁顿车站，这之间一起谋杀案。不过目击者看到嫌疑人买了一张去伦敦的头等车票，并从这个车站登上了早上7点42分的火车。嫌疑人穿着贵格会教徒的服饰，一件一直垂到脚棕色斗篷，他在同一列火车的第二节头等车厢的倒数第二个车厢里。”"
 pbi_publishing_industry_events.340.a: "这是科学的胜利"
 pbi_publishing_industry_events.400.t: "第四阶级"
 pbi_publishing_industry_events.400.d: "[SCOPE.gsInterestGroup('target_ig').GetName]的[SCOPE.sCharacter('target_leader').GetFullName]在国会敲响了警钟，将新闻报纸描述为“第四阶级”。"
 pbi_publishing_industry_events.400.f: "“现在我们的社会中有一个第四阶级，它比皇室成员、神职人员、贵族总和还要强大且更有影响力，这就是新闻业！\n它的力量是强大到可以摧毁一个国家的繁荣，国家权力应该保障新闻业的独立和自由，！但前提是报纸新闻应举止合法！”"
 pbi_publishing_industry_events.400.a: "他们无法控制新闻报纸，或许他们连自己也无法控制！"
 pbi_publishing_industry_events.400.b: "一切都需要保障"
 pbi_publishing_industry_events_400_tt: "对国内所有[GetBuildingType('building_manzoni_publishing_industry').GetName]进行如下修正："
 pbi_publishing_industry_events.405.t: "报纸出版商被捕"
 pbi_publishing_industry_events.405.d: "[SCOPE.sState('target_state').GetName]当地警方逮捕了[SCOPE.sCharacter('target_character').GetFullName]，[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]的出版商多次发表批评政府的文章。"
 pbi_publishing_industry_events.405.f: "“选民们！\n 先生们！你们被骗了！ \n 以我们的力量对抗武装力量！\n 关闭每家工厂！\n 关闭每家公司！\n 关闭证券交易所！\n 关闭剧院！\n 所有人都必须罢工。”\n——埃米尓·德·吉拉丹（人民委员）。"
 pbi_publishing_industry_events.405.a: "让我们为同行做个榜样"
 pbi_publishing_industry_events.405.b: "[SCOPE.sCharacter('target_character').GetSheHe]必须受到法律的保护"
 pbi_publishing_industry_events.405.c: "让他们冷静一下"
 pbi_publishing_industry_events.410.t: "停止报纸出版的命令"
 pbi_publishing_industry_events.410.d: "法院驳回了一份多次过度批评政府[SCOPE.sState('target_state').GetName]报纸的上诉，并暂停其出版报纸。"
 pbi_publishing_industry_events.410.f: "他们没有任何政治权威，却利用公众对报纸的信任多次无端恶意批评政府，向公众灌输他们想要的理论"
 pbi_publishing_industry_events.410.a: "让我们为同行做个榜样"
 pbi_publishing_industry_events.410.b: "必须保护新闻自由"
 pbi_publishing_industry_events.410.c: "凡事都有个限度"
 pbi_publishing_industry_events.415.t: "色情小说"
 pbi_publishing_industry_events.415.d: "法院已下令要求[SCOPE.sState('target_state').GetName]出版商出版的爱情小说中删除色情和淫秽段落，因为这些段落过于露骨和淫秽。"
 pbi_publishing_industry_events.415.f: "“最终，男人的大手摸向少女的■■，“■■■■■■”，男人他低下头用■■■■■住■■■的■■。“停下！这里是■■■■■■，不可以，■■■■■■■”，说罢少女连忙站起整理了一下裙摆，一副深怕被人察觉的羞涩模样，又故作悠闲的用她那娇俏的眼眸仍不断的扫视着四周”"
 pbi_publishing_industry_events.415.a: "黄色风气如同洪水猛兽，危害帝国青年！"
 pbi_publishing_industry_events.415.b: "我不知道这是什么！"
 pbi_publishing_industry_events.420.t: "泄露国家机密"
 pbi_publishing_industry_events.420.d: "[SCOPE.sState('target_state').GetName]报纸——[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]经常发布只有政府内部人士知道的独家新闻信息，"
 pbi_publishing_industry_events.420.f: "“法国报纸非常乐意谈论政治秘闻以增加公众订阅量。”\n——奥诺雷·德·巴尔扎克（新闻学）"
 pbi_publishing_industry_events.420.a: "相关人员立即撤离！"
 pbi_publishing_industry_events.420.b: "最好不要碰这个"
 pbi_publishing_industry_events.425.t: "呼吁法律改革"
 pbi_publishing_industry_events.425.d: "[SCOPE.sState('target_state').GetName]报纸发表支持[SCOPE.gsInterestGroup('target_ig').GetName]领导的[SCOPE.sPoliticalMovement('target_movement').GetName]声明。"
 pbi_publishing_industry_events.425.f: "“毋庸置疑，我们[SCOPE.gsInterestGroup('target_ig').GetName]多年来一直领导的[SCOPE.sPoliticalMovement('target_movement').GetName]是这个国家未来的支柱”"
 pbi_publishing_industry_events.425.a: "报纸的说法被某些团体用来宣传"
 pbi_publishing_industry_events.425.b: "在报纸上的反击"
 pbi_publishing_industry_events.425.c: "这是展示政府民主的机会"
 pbi_publishing_industry_events.430.t: "报纸正在煽动社会动荡"
 pbi_publishing_industry_events.430.d.1: "[SCOPE.sState('target_state').GetName]报纸——[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]只报道了在[SCOPE.sState('target_state_2').GetName]关于[SCOPE.sBuilding('target_building').GetName]流行病爆发的猜测，助长了社会动荡和恐慌。"
 pbi_publishing_industry_events.430.d.2: "[SCOPE.sState('target_state').GetName]报纸——[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]只报道了在[SCOPE.sState('target_state_2').GetName]关于[SCOPE.sBuilding('target_building').GetName]事故爆发的猜测，助长了社会动荡和恐慌。"
 pbi_publishing_industry_events.430.d.3: "[SCOPE.sState('target_state').GetName]报纸——[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]只报道了在[SCOPE.sState('target_state_2').GetName]关于[SCOPE.sBuilding('target_building').GetName]贫穷的报道。除了猜测没有真实情况，助长了社会动荡和恐慌。"
 pbi_publishing_industry_events.430.f.1: "“我们的记者报道说，由于疾病的爆发，许多工人已经死亡或正在患病，种植园和邻近的村庄现在已经成为一片废墟。经营种植园的公司高管也已开始离开本国，现在这种情况对我们生活的影响将是不可避免的。”"
 pbi_publishing_industry_events.430.f.2: "“我们从通讯记者处获悉，落石引发了重大事故，矿场已经关闭。我们还被告知，投资于该矿的资本家已经决定关闭该矿，现在这种情况对我们生活的影响将是不可避免的。”"
 pbi_publishing_industry_events.430.f.3: "“记者告诉我们，干旱的影响将持续几个月，几乎肯定会导致歉收。粮食短缺对我们生活的影响将是不可避免的。”"
 pbi_publishing_industry_events.430.a: "我们不应该容忍这种谎言"
 pbi_publishing_industry_events.430.b: "我们需要采取行动"
 pbi_publishing_industry_events.315.d.1: "在[SCOPE.sState('target_state').GetName]中，一份支持[SCOPE.sParty('target_party_2').GetName]的报纸锐评了一份支持[SCOPE.sParty('target_party_1').GetName]的报纸，导致两家报纸每天都在激烈地相互表达意见。"
 pbi_publishing_industry_events.315.d.2: "在[SCOPE.sState('target_state').GetName]中，一份支持[SCOPE.gsInterestGroup('target_ig_2').GetName]的报纸锐评了一份支持[SCOPE.sParty('target_party_1').GetName]的报纸，导致两家报纸每天都在激烈地相互表达意见。"
 pbi_publishing_industry_events.315.d.3: "在[SCOPE.sState('target_state').GetName]中，一份支持[SCOPE.gsInterestGroup('target_ig_2').GetName]的报纸锐评了一份支持[SCOPE.gsInterestGroup('target_ig_1').GetName]的报纸，导致两家报纸每天都在激烈地相互表达意见。"
