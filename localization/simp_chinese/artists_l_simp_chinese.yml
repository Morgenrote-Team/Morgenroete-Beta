 artists.2002.d: "我们的首都[SCOPE.sState('elgar_culture_capital').GetCityHubName]已经发展为表现主义艺术的中心。"
 artists.2002.f: "[concept_elgar_expressionism]音乐特点为直接表现人类的精神与体验，与旧有传统完全相反，它完全无视过去的调性规律，它反对印象主义的客观性，它认为艺术既不应该被“描写”，也不应该被“象征”，而更应该直接表现人类的精神与体验，也就是说要把作者的心灵世界、即所谓内在精神表现出来，这就是所谓的表现主义，表现主义音乐的节奏难以捉摸，拍子也被无视，却具有独特的、流动的、无限发展的奇妙特色。"
 artists.2003.t: "新艺术的诞生"
 artists.2003.d: "我们的首都[SCOPE.sState('elgar_culture_capital').GetCityHubName]已经发展为新艺术风格的中心。"
 artists.2003.f: "[concept_elgar_art_nouveau]，在意大利多被称为自由风格，是19与20世纪之交的一个一个艺术史时期。可被归为新艺术的潮流包括改革运动后的改革风格、维也纳分离后的分离风格、加泰罗尼亚的现代风、瑞士的萨宾风格以及美国的蒂芙尼风格。除了法语、英语与意大利语中主要使用的“新艺术”这一表述外，英语中还称之为“现代风格”，意大利语则会使用“花卉风格”一词。总而言之，新艺术属于世纪之交的时代。"
 artists.2004.t: "[concept_elgar_impressionism]传播"
 artists.2004.d: "印象派的潮流已经从邻国传播到我们的首都，并成为主导的艺术运动。"
 artists.2004.g: "印象深刻。"
