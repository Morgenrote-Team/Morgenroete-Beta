 je_artists_realism: "艺术沙龙"
 je_artists_realism_reason: "现实主义——一种新的艺术形式，正日益受到欢迎。各地的画家已经致力研究这种新风格。然而，现实主义仍然缺乏自己的真正中心。传统艺术精英对这种新风格的厌恶意味着到目前为止它还不能登大雅之堂。我们需要自己的艺术学院来教授现实主义风格，并有一座美术馆来陈列现实主义画作——当然还需要一个国内的现实主义[concept_klimt_painter]标杆。建立一个艺术沙龙也将使我们能够组织绘画比赛。"
 je_artists_realism_success: "我们需要#G 250#!@klimt_painting_tradition![concept_klimt_painting_tradition]。"
 je_artists_realism_goal: ""
 je_artists_realism_trigger: "现实主义[concept_artists_center_of_arts]#G 不存在#!。"
 je_artists_realism_fail: "现实主义[concept_artists_center_of_arts]#R 存在#!。"
 je_artists_irrationalism: "音乐节"
 je_artists_irrationalism_reason: "一种新的、革命性的音乐形式正在形成，它将自己阐述为“整体艺术”。唯有一位卓越的作曲家才能引领这种音乐形式的诞生。这种音乐在音乐节中无所不包、无处不达，让国际音乐爱好者纷纷至此朝圣：它将成为非理性主义的中心！音乐节的建立也将使我们能够组织音乐比赛。"
