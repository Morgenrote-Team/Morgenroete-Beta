 je_artists_impressionism: "印象派"
 je_artists_impressionism_reason: "[concept_elgar_impressionism]是艺术史上的一种风格，以对转瞬即逝的风景进行光影的速写描绘为其特点，起源于19世纪后半叶的法国绘画运动。印象派这一概念也被用于描述音乐、文学、电影与摄影的特定风格。尽管海因里希·哈特等许多自然主义者拒绝将音乐视为表达“追求真理的行动主义”的一种手段，但印象派常常将“无目标的前瞻梦想”，即对色彩层次丰富的和弦的追求，视为一种乐趣。"
 je_artists_impressionism_success: "我们需要#G 850#!@elgar_music_tradition![concept_elgar_musical_tradition]。"
 je_artists_expressionism: "表现主义"
 je_artists_expressionism_reason: "[concept_elgar_expressionism]音乐特点为直接表现人类的精神与体验，与旧有传统完全相反，它完全无视过去的调性规律，它反对印象主义的客观性，它认为艺术既不应该被“描写”，也不应该被“象征”，而更应该直接表现人类的精神与体验，也就是说要把作者的心灵世界、即所谓内在精神表现出来，这就是所谓的表现主义，表现主义音乐的节奏难以捉摸，拍子也被无视，却具有独特的、流动的、无限发展的奇妙特色。"
 je_artists_expressionism_success: "我们需要#G 850#!@elgar_music_tradition![concept_elgar_musical_tradition]。"
 je_artists_art_nouveau: "新艺术"
 je_artists_art_nouveau_reason: "[concept_elgar_art_nouveau]，在意大利多被称为自由风格，是19与20世纪之交的一个一个艺术史时期。可被归为新艺术的潮流包括改革运动后的改革风格、维也纳分离后的分离风格、加泰罗尼亚的现代风、瑞士的萨宾风格以及美国的蒂芙尼风格。除了法语、英语与意大利语中主要使用的“新艺术”这一表述外，英语中还称之为“现代风格”，意大利语则会使用“花卉风格”一词。总而言之，新艺术属于世纪之交的时代。"
 je_artists_mass_culture: "大众文化"
 je_artists_mass_culture_reason: "“大众对文化代表的所有传统都不理解地敌视，尖锐而冷酷的智慧使农民的智慧相形见绌，新发现的自然主义在与所有关于性和社会的事情有关的事情上，回到了相当原始的本能和条件，饥饿和娱乐形式重新出现在工资争议和体育场中——所有这些都预示着文化的明确终结和人类存在的全新阶段的开启。” ——奥斯瓦尔德・斯宾格勒，《西方的没落》"
 je_artists_mass_culture_goal: ""
 je_artists_biennale: "双年展"
 je_artists_biennale_reason: "双年展是每两年举办一次的展览，最出名的是威尼斯双年展，其迅速享誉国际，成为各领域艺术家竞相角逐的圣地。来自世界各地的艺术家将使自己的祖国获得国际认可视为己任。"
 je_artists_biennale_fail_tt: "如果有其他国家抢先一步，我们就无法举办双年展。"
 artists.1001.t: "创办双年展"
 artists.1001.d: "[SCOPE.sState('artists_biennale_city').GetCityHubName]被认为是举办当代艺术作品展览的绝佳场地。组织者已经开始筹备在明年举办第一届双年展。"
 artists.1001.f: "继首届双年展后，我国每两年将举行一次双年展，以表彰在艺术领域表现出色的国家。决定因素因素是一个国家所有艺术家的综合声望价值。双年展总是由拥有双年展场地的国家组织。如果[SCOPE.sState('artists_biennale_city').GetCityHubName]被外国势力征服，新所有者也将可以主办双年展"
 artists.1001.g: "我们将开始筹备首届双年展。"
 artists.1002.t: "[TimeKeeper.GetCurrentDate.Format('y')]年[SCOPE.sState('artists_biennale_city').GetCityHubName]双年展"
 artists.1002.d: "[SCOPE.sState('artists_biennale_city').GetCityHubName]双年展已经进行了几星期。参展艺术家之间已然分出高下。[SCOPE.sCountry('artists_biennale_first_winner_scope').GetName]的参展者最受青睐，而[SCOPE.sCountry('artists_biennale_second_winner_scope').GetName]与[SCOPE.sCountry('artists_biennale_third_winner_scope').GetName]也拿出了有趣的作品，不过这还不够。"
 artists.1002.f: "威尼斯双年展创办于1895年，在20世纪的头几十年里，其国际地位日益增强。从1907年起，多个国家在展览中设立了国家馆，第一个国家馆来自比利时。1910年，第一批国际知名艺术家包括古斯塔夫·克里姆特、雷诺阿个人展、库尔贝的作品都有亮相。其中毕加索的作品《卖艺人家》被移走，因为人们担心它的新颖性会让公众感到震惊。到1914年，共建立了七个展馆：比利时（建于1907年）、匈牙利（建于1909年）、德国（建于1909年）、英国（建于1909年）、法国（建于1912年）和俄罗斯（建于1914年）。"
 artists.1002.g: "评委们该开个会。"
 artists.1003.d: "经过[SCOPE.sState('artists_biennale_city').GetCityHubName]双年展评委们的一致决定，我们的艺术家们展示了今年最具创新性和高质量的展品，在绘画、文学和音乐领域都处于领先地位，恭喜！"
 artists.1003.f: "[GetPlayer.GetName]无疑在今年的双年展上占据了主导地位，并获得了第一名。[SCOPE.sCountry('artists_biennale_second_winner_scope').GetName]获得了第二名。而[SCOPE.sCountry('artists_biennale_third_winner_scope').GetName]的产品也似乎不错。"
 artists.1003.g: "这是新文化的曙光！"
 artists.2001.t: "印象派的诞生"
 artists.2001.d: "我们的首都[SCOPE.sState('elgar_culture_capital').GetCityHubName]已经发展为印象主义艺术的中心。"
 artists.2001.f: "[concept_elgar_impressionism]是艺术史上的一种风格，以对转瞬即逝的风景进行光影的速写描绘为其特点，起源于19世纪后半叶的法国绘画运动。印象派这一概念也被用于描述音乐、文学、电影与摄影的特定风格。尽管海因里希·哈特等许多自然主义者拒绝将音乐视为表达“追求真理的行动主义”的一种手段，但印象派常常将“无目标的前瞻梦想”，即对色彩层次丰富的和弦的追求，视为一种乐趣。"
 artists.2001.g: "我们是引领潮流的文化大国"
