 artists.2007.t: "现实主义中心"
 artists.2007.d: "[SCOPE.sState('elgar_culture_capital').GetCityHubName]已成为现实主义艺术的中心。[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]在其中扮演了极为重要的角色并被视作现实主义画派的领军人物。"
 artists.2007.f: "兴起于19世纪的欧洲，又称为现实主义画派，或现实画派。\n\n这是一个在艺术创作尤其是绘画、雕塑和文学、戏剧中常用的概念，更狭义的讲，属于造型艺术尤其是绘画和雕塑的范畴。无论是面对真实存在的物体，还是想象出来的对象，绘画者总是在描述一个真实存在的物质而不是抽象的符号。这样的创作往往被统称为写实。遵循这样的创作原则和方法，就叫现实主义。与现实主义（或者大致可称为具象主义）相对的概念是抽象主义。人们借由感官知能接收讯息，加以分析组织，以自然为题材（例如自然风景或时事议题）用任何技法将其具体表现出来，但也因生长环境及认知不同，产生不一样的经验，这种组织过后的观点差别，让同个题材的作品有不同呈现。"
 artists.2007.g: "但是你能在现实中寻到真正之美吗？"
 artists.2008.t: "非理性主义中心"
 artists.2008.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName]节日大厅的建立被认为是19世纪音乐文化的亮点之一。"
 artists.2008.f: "每年一度的[SCOPE.sState('elgar_culture_capital').GetCityHubName]音乐节上将会演奏19世纪作曲家[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName]的歌剧。[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName]本人构思并推动了这场特别的音乐节以展示他自己的作品，尤其是宏伟的《尼伯龙根的指环》与《帕西法尔》。演出在特别设计的[SCOPE.sState('elgar_culture_capital').GetCityHubName]节庆剧院进行。[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName]亲自监督了剧院的设计和建造，并采用了许多建筑创新以容纳他作品所需的大型乐队以及舞台设计的特殊愿景。音乐节已经成为[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName]迷和古典音乐爱好者的朝圣地。"
 artists.2008.g: "[GetPlayer.GetDefinition.GetPrimaryCulture.GetName]文化的巅峰！"
 artists.2011.t: "世纪末"
 artists.2011.d: "随着新世纪的到来，世界日新月异，艺术领域也不例外。曾经作为革新先锋的印象派正在为新兴的艺术运动腾出空间。最终的结果完全敞开——这场变革将会孕育出哪些艺术家也尚未可知。"
 artists.2011.f: "世纪末（Fin de Siècle），也被称为“颓废”（Décadence），是指19世纪最后二十年的艺术潮流以及生活态度，更广泛地来说，它与美好时代（Belle Époque）并行，直至第一次世界大战初期。这一术语指的是它作为一种文化运动，将文化衰落作为研究对象。这一时期的特点在于，社会情绪在乐观主义、对未来充满欣喜、对未来模糊的恐惧和倒退、末日情结、厌倦生活、世态炎凉、对死亡和转瞬即逝事物的迷恋、轻浮放纵、颓废之间摇摆不定。由于社会生活的基本价值似乎面临威胁，一种普遍的危机感笼罩着主导阶层。知识分子、艺术家和作家们感到无力，他们在面对一方面受市场法则和匿名大众支配的大都会社会，另一方面又日益被自然科学和技术塑造的世界时，既感到吸引又感到排斥。因此，他们纷纷逃遁至审美的反世界中去。"
 artists.2011.g: "音乐是艺术之王。"
 artists.2011.h: "绘画是我们的力量。"
 artists.2011.i: "我们专注于文学。"
 artists.2012.d: "随着新世纪的到来，世界日新月异，艺术领域也不例外。曾经作为革新先锋的表现主义正在为新兴的艺术运动腾出空间。最终的结果完全敞开——这场变革将会孕育出哪些艺术家也尚未可知。"
 artists.2013.d: "随着新世纪的到来，世界日新月异，艺术领域也不例外。曾经作为革新先锋的新艺术正在为新兴的艺术运动腾出空间。最终的结果完全敞开——这场变革将会孕育出哪些艺术家也尚未可知。"
