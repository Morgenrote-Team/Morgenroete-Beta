 dufour.2100.t: "马丁·迪斯特利‑漫画家"
 dufour.2100.d: "来自奥尔滕的[SCOPE.sCharacter('character_1_scope').GetFullName]是一位画家兼漫画家，对自由主义事业深感兴趣。他的政治漫画或许能为自由派带来巨大助益，也许让他担任鼓动者对我们更为有利？"
 dufour.2100.f: "“你还想再来一幅关于天主教神父的讽刺画吗？哦，我敢肯定你想！”"
 dufour.2100.g: "自由主义事业需要优秀的讽刺漫画！"
 dufour.2100.h: "他是一位画家！"
