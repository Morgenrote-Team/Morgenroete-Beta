l_simp_chinese:
 dufour_celebrate_schwingfest_decision: "成立瑞士摔跤和高山牧人节"
 dufour_celebrate_schwingfest_decision_desc: "瑞士摔跤已成为瑞士的一项民族运动，让我们通过高山牧人节庆祝，使瑞士摔跤成为真正的民族运动吧"
 dufour_schwingfest_modifier: "瑞士摔跤和高山牧人节"
 dufour_schwingerkonig: "摔跤王"
 dufour_schwingerkonig_desc: "该角色赢得了瑞士摔跤比赛，被大众视为“摔跤王”"
 dufour.1000.t: "阿彭策尔没有实行妇女选举权"
 dufour.1000.d: "瑞士已开始实行妇女选举权。遗憾的是，一些州进展缓慢，在内阿彭策尔州和外阿彭策尔州，妇女可以参加联邦投票和选举，但不能参加市和州的投票和选举。这首先需要修改州宪法，并在州议会上获得批准。这一过程可能需要数年时间。我们是应该进行干预，让阿彭策尔实行妇女选举权，还是应该等待并希望他们自己实行妇女选举权？"
 dufour.1000.f: "“我们必然会做的更好！”\n\n#b 历史背景：#!瑞士妇女的选举权历经了漫长的岁月。直到1971年，瑞士才开始实行投票和选举制度，因此，瑞士是最晚引入妇女选举权的国家之一。较早实行妇女选举权的国家包括阿富汗、芬兰、美国等。"
 dufour.1000.g: "强迫他们让妇女选举"
 dufour.1000.h: "他们很快就会决定给予妇女投票权。"
 dufour_womens_suffrage_appenzell_effects_tt:0 "你不能强迫两个州实行妇女选举权，如果此事有新进展或需要你的决定，你将收到通知。"
 dufour.1001.t: "阿彭策尔获得妇女选举权投票失败"
 dufour.1001.d: "外阿彭策尔州和内阿彭策尔州政府提议在州一级立法推行妇女选举权，但法案被否决。这意味着阿彭策尔州的妇女仍然没有选举权。我们可以迫使两个阿彭策尔州赋予妇女选举权，但这肯定会让当地居民反对我们。"
 dufour.1001.f: "“想在州一级推行妇女选举权的请举手！”许多人举起了手，但是并没有足够票数\n“因此拒绝在州一级引入妇女选举权！”\n\n#b 历史背景：#!瑞士妇女的选举权历经了漫长的岁月。直到1971年，瑞士才开始实行投票和选举制度，因此，瑞士是最晚引入妇女选举权的国家之一。较早实行妇女选举权的国家包括阿富汗、芬兰、美国等。"
 dufour.1001.g: "太过分了！迫使他们引入妇女选举权法律！"
 dufour.1001.h: "我们再等等吧。"
 dufour.1002.t: "阿彭策尔引入妇女选举权法律"
 dufour.1002.d: "谁会想到呢？阿彭策尔地区议会以举手表决的方式通过妇女选举权法律。这意味着女性现在可以在瑞士任何地方投票。"
 dufour.1002.f: "“如果你想在州一级引入妇女选举权，请举手！”许多人举起了手\n“州一级现在实施妇女选举权法律！”"
 dufour.1002.g: "他们花的时间比我想象的要长！"
 dufour.1003.t: "在两个阿彭策尔州，都没有成功通过妇女选举权法律"
 dufour.1003.d: "阿彭策尔地区的一些进步派第二次尝试引入妇女选举权。但这次尝试也没有成功。我们仍然可以强制推行，或者等待更长的时间，希望阿彭策尔人能自愿推行妇女选举权法律。"
 dufour.1003.f: "“想在州一级推行妇女选举权的请举手！”许多人举起了手，但是并没有足够票数\n“因此拒绝在州一级引入妇女选举权！”\n\n#b 历史背景：#!瑞士妇女的选举权历经了漫长的岁月。直到1971年，瑞士才开始实行投票和选举制度，因此，瑞士是最晚引入妇女选举权的国家之一。较早实行妇女选举权的国家包括阿富汗、芬兰、美国等。"
 dufour.1003.g: "该死的乡巴佬他们本来有自愿通过，现在要我们逼他们！"
 dufour.1003.h: "我们不能损害民主进程。"
 dufour.1004.t: "联邦迫使内阿彭策尔推行妇女选举权法律"
 dufour.1004.d: "继外阿彭策尔州在上届地方议会中通过了妇女选举权之后，联邦法院对内阿彭策尔州也做出了裁决。内阿彭策尔州也必须引入妇女选举权，至此这一问题一劳永逸地得到了解决。"
 dufour.1004.f: "“联邦法院认为内阿彭策尔违反了瑞士联邦宪法。妇女享有与男子同等的权利。内阿彭策尔必须立即实行妇女选举权法律”"
 dufour.1004.g: "终于！"
 dufour.2000.t: "比尔首届高山牧人节"
 dufour.2000.d: "许多施文格人参加了在比尔镇举行第一届施高山牧人节，由瑞士施文格俱乐部策划，因为这项运动越来越受欢迎。在高山牧人节取得巨大成功后，参与者和策划者都期待着三年后的下一届活动。"
 dufour.2000.f: "两个巨大的身躯在互相搏斗，谁也不想倒下。在观众的欢呼声中，双方都倒下了。阿尔弗雷德·尼克劳斯领先。他是第一届摔跤王！但他首先帮助对手站起来，并清理他身上的灰尘。\n\n#b 历史背景：#!瑞士摔跤是一种规则非常严格的摔跤运动，在瑞士很受欢迎，但其起源却无从考究。但第一个摔跤节是在因特拉肯举行的。1895年在比尔举办了第一届高山牧人节，之后两三年都会定期举办。在瑞士冰球节上还会举行另外两项瑞士民族运动。"
 dufour.2000.g: "我迫不及待地想参加下一次活动！"
 dufour.2001.t: "[SCOPE.sCharacter('dufour_schwingerkonig_scope').GetLastName][SCOPE.sCharacter('dufour_schwingerkonig_scope').GetFirstName]赢得了瑞士摔跤冠军！"
 dufour.2001.d: "经过激烈角逐，[SCOPE.sCharacter('dufour_schwingerkonig_scope').GetLastName][SCOPE.sCharacter('dufour_schwingerkonig_scope').GetFirstName]荣获今年瑞士摔跤的冠军。"
 swiss_flavor_events.21.f1: "两个巨大的身躯在互相搏斗，谁也不想倒下。在观众的欢呼声中，双方都倒下了。但很快其中一个人站了起来，他赢得了这场比赛！随后他帮助对手站起来，并清理对方身上的灰尘。"
 swiss_flavor_events.21.f2: "\n\n有趣的是，在瑞士摔跤中，摔跤选手的名字都是以姓氏开头的。如果亚伯拉罕·林肯是摔跤选手，他就会被称为林肯·亚伯拉罕。"
 swiss_flavor_events.21.f3: "\n\n如果对手拥有与摔跤王相同的积分，他将获得“先登者”的称号，这意味着首先加冕。"
 swiss_flavor_events.21.f4: "\n\n在瑞士摔跤上表现最好的15%的人将获得一个花环。他们通常被称为“誓言兄弟”"
 swiss_flavor_events.21.f5: "\n\n其他参与者也会得到奖励，其中每件礼物都由某人或某个组织捐赠。"
 swiss_flavor_events.21.f6: "\n\n三个不同的摔跤选手曾三次成为摔跤王。汉斯·斯图基在1900年、1902年和1905年夺冠。鲁道夫·亨斯佩尔格在1966年、1969年和1974年夺冠。约尔格·阿伯德哈尔登于1998年、2004年和2007年获此殊荣。"
 swiss_flavor_events.21.f7: "\n\n瑞士还有其他的摔跤比赛。其中最重要的两个分别在因特拉和苏黎世。如果一位摔跤选手在这些比赛中获胜，则被称为“摔跤大满贯”"
 swiss_flavor_events.21.f8: "\n\n在瑞士摔跤中，并不是赢了就能得到分数。如果两个对手打成平手，但打得很有吸引力，那么他们得到的奖励要比无聊的比赛多0.25 分。即使输了，但打得很勇敢、很精彩，也会多得0.75 分。"
 swiss_flavor_events.21.f9: "\n\n声望较高的节日是在山上举行的“山秋千节”。它们是民间节日，也有传统音乐。"
 dufour.2001.g: "恭喜！"
 ticinese: "提契诺"
 SONDERBUND: "独立联盟"
 SONDERBUND_ADJ: "独立联盟"
 rumantsch: "阿尔卑斯罗曼什"
 dufour_ig_landowners_patricians_loc: "贵族"
 NEUCHATEL: "纳沙泰尔"
 NEUCHATEL_ADJ: "纳沙泰尔"
 je_group_dufour_confoederatio_helvetica: "赤色晨曦：赫尔维蒂联邦"
 je_dufour_carte_dufour: "瑞士的地形图"
 je_dufour_carte_dufour_reason: "自1822年起，瑞士联邦便将土地测量的责任归于己身而非各地方。由纪尧姆·亨利·杜福尔将军主要负责联邦的委托，按照统一标准对瑞士的土地进行测量，并汇总在地图上。这将费时费力，但能有助于瑞士地区进一步的发展。"
 je_dufour_carte_dufour_goal: "调查完成，地图已经公布。"
 dufour_creating_carte_dufour_modifier: "绘制瑞士地形图"
 dufour.900.t: "瑞士地形图的出版"
 dufour.900.d: "历经多年磨难，瑞士地形图终于完成了，所有的25张地图要么已经出版，要么在出版社嗷嗷待印。"
 dufour.900.f: "最后，你可以看到《地图》的第一版印刷品。精细的线条显示了山脉、城市，甚至房屋。以前从未出现过如此精确的瑞士地图！\n\n#b 历史背景：#!杜福尔和他的团队从1832年到1865年一直致力于该地图的制作。25张地图中，前两张是在1845年出版的，最后一张是在1865年出版的。地形图的印刷采用的是雕版印刷工艺，比例尺1:100000。有意思的是，杜福尔是瑞士的第一位将军，在1848年的瑞士内战（分离同盟战争）中率领瑞士军队对抗分离同盟。\n\n#b 如今现状：#!杜福尔地图位于苏黎世的瑞士国家博物馆。但实际上你可以在网上找到这张地图，因为它和其他许多瑞士国家地图一起发布出来了。"
 dufour.900.g: "我们应该以杜福尔的名字命名一座山！"
 dufour_carte_dufour_modifier: "瑞士地形图"
 dufour_add_x_carte_dufour_progress_minus_x_tt: "失去[SCOPE.GetValue('carte_dufour_progress_amount')|0+]#V 绘图进度#!。"
 dufour_add_x_carte_dufour_progress_minus_1_tt: "失去[SCOPE.GetValue('carte_dufour_progress_amount')|0+]#V 绘图进度#!。"
 dufour_add_x_carte_dufour_progress_0_tt: "未获得#V 绘图进度#!。"
 dufour_add_x_carte_dufour_progress_plus_1_tt: "获得[SCOPE.GetValue('carte_dufour_progress_amount')|0+]#V 绘图进度#!。"
 dufour_add_x_carte_dufour_progress_plus_x_tt: "获得[SCOPE.GetValue('carte_dufour_progress_amount')|0+]#V 绘图进度#!。"
 dufour.901.t: "当地人受到调查惊扰"
 dufour.901.d: "在[SCOPE.sState('dufour_mapping_scope').GetName]的勘测期间，我们的测量员与该地区的乡民发生了冲突。看来是他们的工作打扰了对方的葬礼。"
 dufour.901.f: "“现在就滚好嘛！没听清？我们不需要你那地图，我们认路！”"
 dufour.901.g: "节哀顺变。"
 dufour.901.h: "继续吧！"
 dufour.902.t: "测量员在山区遇难"
 dufour.902.d: "他们在[SCOPE.sState('dufour_mapping_scope').GetName]一座高山上勘测时，突然下起了倾盆大雨夹杂着雷暴，我们的测量员被吓坏了。他们躲入帐篷中避险，但雷击还是造成了一人死亡一人受伤。"
 dufour.902.f: "“我之前是一名测量员，直到我的腿中了一道雷击。不过几天后我就好了，我总算能下地爬到安全的地方了。这真是一场试炼！”"
 dufour.902.g: "天哪！"
 dufour.903.t: "当地人帮助测量员"
 dufour.903.d: "我们的测量员在[SCOPE.sState('dufour_mapping_scope').GetName]迷路了，幸亏有当地居民的帮助，他们还给测量员们提供了休息地和小路的消息。这肯定能极大的帮助到地图的绘制！"
 dufour.903.f: "“工作先放一边。我们走一杯。这可是我们最好的樱桃果酒！”"
 dufour.903.g: "感谢帮助！"
 dufour.904.t: "设备丢失！"
 dufour.904.d: "我们的一名测量员在[SCOPE.sState('dufour_mapping_scope').GetName]攀登时意外丢失了设备。我们要么提供新设备，要么只能延缓进度了。"
 dufour.904.f: "“它就这么掉下去了……我没抓住它……我们事先谁能想到把设备固定在背包上？”"
 dufour.904.g: "他们必须处理这事。"
 dufour.904.h: "给他们新的仪器！"
 dufour.905.t: "布吕姆利萨尔普或霍勒"
 dufour.905.d: "[SCOPE.sState('dufour_mapping_scope').GetName]的当地人对同一座山有两种称呼：布吕埃姆利萨尔普和霍勒。我们该选取哪个名字好呢？"
 dufour.905.f: "“我们为何不能抛硬币决定？”"
 dufour.905.g: "布吕埃姆利萨尔普！"
 dufour.905.h: "霍勒！"
 dufour.906.t: " 测量员加快绘图进度"
 dufour.906.d: "感谢著名测量员[SCOPE.sCharacter('surveyor_scope').GetFullName]的支持，地形图绘制的进度极大提升了。"
 dufour.906.f: "“没错，这个仪器是用来测量的，而不是用来看星星的。”"
 dufour.906.g: "巨作！"
 dufour.907.t: "数学家协助计算"
 dufour.907.d: "[SCOPE.sCharacter('mathematician_scope').GetFullName]受过数学培训，这能够帮我们的团队解决各种计算问题。这将有助于绘图的速度。"
 dufour.907.f: "“谁能想数学真的有用！”"
 dufour.907.g: "还好我们有数学家！"
 dufour.908.t: "气球飞行启迪艺术家灵感"
 dufour.908.d: "感谢著名气球飞行家[SCOPE.sCharacter('balloonist_scope').GetFullName]，让我们的艺术家和测量员能从高空俯瞰世界。他们被壮丽的景色所启发，现在对如何在地图上绘制我国有了更切实的想法。"
 dufour.908.f: "“哦，我的上帝！希望我们不会坠毁！”"
 dufour.908.g: "俯瞰世界真是一种宁人感独特且难忘的角度！"
 dufour.910.t: "第一张表单：汝拉和巴塞尔"
 dufour.910.d: "我们的前几份新地形图已经发布了，它们着重关注了巴塞尔和汝拉地区。"
 dufour.910.f: "汝拉山是一系列小山脉，从萨瓦一直延伸到巴塞尔，一些山麓甚至延伸到康斯坦茨湖。它包括沃州、纳沙泰尔州、伯尔尼州、巴塞尔州、索洛图恩州和阿尔高州的部分地区。许多大城市都靠近汝拉山脉。\n例如，巴塞尔是瑞士最重要的城市之一。巴塞尔与阿尔萨斯和巴登接壤，并因莱茵河而四通八达。\n就在几年前，巴塞尔州被分为巴塞尔城（城市）和巴塞尔地（农村）。有趣的是，当时的农村更加自由，而城市则由贵族统治。巴塞尔是一座相当国际化的城市，拥有一所历史悠久的大学，培养了莱昂哈德·欧拉和丹尼尔·伯努利等伟大的思想家。\n另一方面，日内瓦是一个被法国环绕的大城市。拿破仑时期，日内瓦是法国领土，1815年才重归瑞士。如今，首批私人银行成立，日内瓦逐渐成为金融业中心。此外，它还是瑞士两位最伟大的哲学家伏尔泰和让‑雅克·卢梭的故乡。"
 dufour.910.g: "有趣！"
 dufour.910.h: "我不想再听到有关瑞士的事了！"
 dufour.910.no_more_information_tt: "你将#n 不再#!收到有关瑞士的事件且无任何影响。"
 dufour.911.t: "新表发布：沙夫豪森、图尔高和圣加仑"
 dufour.911.d: "更多东西已发布。这次的重点是瑞士北部和东部的沙夫豪森、图尔高和圣加仑。"
 dufour.911.f: "沙夫豪森位于瑞士东北部，大部分被德国环绕。这座城市本身毗邻莱茵河，又十分接近诺伊豪森的莱茵瀑布。得益于河流量与农村人口的原因，该地区很早就实现了工业化，并于1831年成为自由州。\n自法国大革命时期到瑞士，图尔高州每年由另一个不同的州管辖。自1815年以来，它一直作为纺织业和农业的中心，是个繁荣的地区。大量种植的梨树让它也被叫做“莫斯丁丁”，意思是印度苹果酒，Ost（东方）和Most（苹果酒）的戏仿。图尔高州是1831年以来的自由州之一，希望在瑞士实现更多的中央集权。\n圣加伦是个宗教分裂的地区，曾经是修道院与主教区的所在地。它是一个自由州和纺织业中心。圣加仑州环绕阿彭策尔州和阿尔卑斯山脉著名的一部分——桑蒂斯山脉。"
 dufour.912.t: "新表发布：格劳宾登州和雷蒂亚阿尔卑斯山脉"
 dufour.912.d: "更多东西已发布。这次的重点是广阔的格劳宾登州和雷蒂亚阿尔卑斯山脉。"
 dufour.912.f: "格劳宾登州不仅是瑞士最大的州，也是罗曼什人的家园。罗曼什是阿尔卑斯罗曼族的一支，它除了是瑞士的少数民族外，还在意大利的南蒂罗尔和弗留利‑威尼斯朱利亚也有分布。\n因为阿尔卑斯山脉占该地区绝大面积，所以该地人口稀疏。特别是以古代雷蒂部族命名的雷蒂亚阿尔卑斯山脉。该地主要以农业和山脉隘口的货运业盈利。拿破仑战争后它灾难性的失去了部分意大利地区的土地，但任有部分地区以意大利语为主，这使得它成为了一个拥有德、意、罗曼什，三种语言的州郡。\n政治上，该州由自由市作为主导地位，但近年来更加集权的自由派取得了不错的结果。"
 dufour.913.t: "新表发布：瑞士中部"
 dufour.913.d: "更多东西已发布。这次的重点是瑞士中部的诸州郡。"
 dufour.913.f: "瑞士中部是瑞士联邦一词中“联邦”的发源地。最早由乌里、施维茨和下瓦尔登（如今其分为了上下瓦尔登）三州形成了一个松散的联盟，后其不断的扩大由来。\n瑞士中部的许多小型州郡的主要经济来源为是圣哥达基线的运输业。此外还伴随着不可或缺的林木业与纺织业。\n政治上，瑞士中部由保守的天主教教徒管理。虽然有最自由的琉森州的卢塞恩市，但在乌里、施维茨、上瓦尔登、下瓦尔登、格拉鲁斯和楚格这几个州郡的保守态度下，当地以上层阶级为主导。\n1830年，施维茨几乎分裂为两个州，当时该州的外围地区要求平等和政治参与。在瑞士政府军成功攻占施维茨内城后，它进行了让步，使得施维茨并未分裂。"
 dufour.914.t: "新表发布：提契诺"
 dufour.914.d: "更多东西已发布。这次的重点是瑞士最南端的提契诺州。"
 dufour.914.f: "提契诺州是瑞士联邦在意大利地区仅存的国土。作为15、16世纪的征服领土，该地一直由旧地方（州郡）领导，直到海尔维第共和国的建立。虽是如此，但自1803年以来，它已然成为一块完善的瑞士州郡。\n经济上，提契诺州以林木业与农业为主，因其拥有瑞士其他地区无法种植的栗子、烟草、丝绸和各类水果，该地区还有繁荣的丝绸业。\n政治上，提契诺州是1830年成为首批获得自由宪法的州之一，但该地政局并不稳定，自由派希望集权化，而保守派更倾向于地方自治。"
 dufour.915.t: "新表发布：伯尔尼和弗里堡"
 dufour.915.d: "更多东西已发布。这次的重点是瑞士西部的伯尔尼和弗里堡。"
 dufour.915.f: "伯尔尼州和弗里堡州都有法语和德语的地区。伯尔尼州面积远远大于弗里堡州。伯尔尼位于汝拉山脉一直延伸到南部的阿尔卑斯山。弗里堡则位于伯尔尼以西，但其坐拥弗里堡和格鲁耶尔等著名的奶酪产地城镇。\n伯尔尼州主要以农业为主，但制表业已慢慢从邻近的纳沙泰尔传播到伯尔尼汝拉地区。希望工业化能加速该地区的发展速度。\n伯尔尼州政治上长期由贵族主导，但1830年起，该州的各个小城市内，自由主义者能制定新的宪法来平衡城乡人口权利。\n弗里堡是一个农业州郡，特产为谷物和奶酪。格鲁耶尔奶酪尤其出名。\n弗里堡政治上由保守派的贵族和神职人员主导。即使是1831年颁布的新宪法也无法更改该州的保守态势，在选举时保守派都占据了绝大多数选票。"
 dufour.916.t: "新表发布：苏黎世和阿尔高"
 dufour.916.d: "更多东西已发布。这次的重点是瑞士中北部的苏黎世和阿尔高。"
 dufour.916.f: "苏黎世和阿尔高都位于瑞士北部相对平坦的中部地区。这两州如今都在迅速的工业化，很快就能成为工业强州。\n苏黎世是一座历史悠久的州郡，因为周围的河流带来的水力协助，许多工厂都坐落于此，让其成为了机械纺织业和工业的中心。\n政治上，苏黎世一直由贵族主导，直到1830~1831年间，乡村民众迫使他们颁布了新的宪法，使得现下自由派和激进派在选举中占据了许多席位，从而引领着苏黎世的政治导向。\n阿尔高在海尔维第共和国之前一直由其他州统治。因为河流的水力，使得许多工厂分散建立，引导了其高速的工业化带来的纺织业蓬勃发展，现在它也是一个繁华的州郡。\n因为阿尔高是苏黎世和伯尔尼的政治平衡点，使得它在1814~1815年间都没有成为一个完整的州郡。即使是1815年之后，它任比其他州更自由。1831年间，新的宪法给予了人民更多权利，而天主教徒则抵制政府约束教会，让政府军不得不占领叛乱地区来反治其身。"
 dufour.917.t: "新表发布：沃州和瓦莱州"
 dufour.917.d: "更多东西已发布。这次的重点是瑞士西南部的沃州和瓦莱州。"
 dufour.917.f: "瓦莱州是瑞士南部的一个大山谷，被阿尔卑斯山脉与瑞士其他地区隔开。罗纳河流经山谷，然后注入莱芒湖。湖的北岸是沃州的一部分，但该地区从日内瓦和阿尔卑斯山脉一直延伸到汝拉山。\n沃州以农业为主，不过从1826年起，自由党在此地进行变革发展工业。时间会证明它究竟以何种生产方式为主。\n在拿破仑战争后，沃州因出色的外交周旋被确立。但也因如此，该地区必须接受更保守的宪法。在威权主义的统治下，自由党取得了成果，在1830年通过了新的宪法。同时，激进派也有收获，并开始促进沃州民主化。\n瓦莱州以农业和乡民人口为主。没有值得注意的工业，且与外界交流甚少。\n瓦莱州的主要政治冲突在德语系的上瓦莱州和法语系的下瓦莱州之间。尽管人口集中于下瓦莱州，但上瓦莱州才是该州的主导地区。该地的主要问题是下瓦莱州的自由主义者和激进派能否促进该州的民主化，亦或者保守派能稳固其统治地位。"
 dufour.920.t: "将羱羊带回瑞士的呼声越来越高"
 dufour.920.d: "在圣加仑的瓦尔哈拉酒店的老板罗伯特·马德尔希望将羱羊带回瑞士。他建议在圣加伦建座动物公园来培育阿尔卑斯羱羊，直到它们能回归大自然。"
 dufour.920.f: "“阿尔卑斯羱羊是瑞士的国宝。我们必须把它带回来！”"
 dufour.920.g: "我们将归还阿尔卑斯羱羊！"
 dufour.920.h: "这就是在浪费时间！"
