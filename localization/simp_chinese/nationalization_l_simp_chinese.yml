l_simp_chinese:
 je_nationalization_germanization: "德意志化"
 je_nationalization_germanization_goal: "#O 民族认同进度#!达到#G 250#!"
 je_nationalization_german_national_identity: "德意志身份认同"
 je_nationalization_german_national_identity_reason: "经过几次改革与长时间共存后，德意志民族认同在普通民众中日益蔓延。无论国家如何制定正确的框架，这种认同都会在有政府行政机构、大学、军营或海军基地等服务完善的地区蔓延，整合地区更有可能形成德意志认同。城市化程度高的地区更有可能接触到以前只有知识分子才研究的概念。在这种情况下，每年都会有一个省份采用新的身份认同。"
 nationalization.101.t: "[SCOPE.sState('united_german_culture_state').GetName]中的德意志意识"
 nationalization.101.d: "经过多年的社会和政治影响，[SCOPE.sState('united_german_culture_state').GetName]的人民已经对整个德意志民族产生了归属感，他们现在完全倾向于泛德意志认同。"
 nationalization.101.f: "“作为德国人，意味着要为自己而做些什么。”——理查德·瓦格纳"
 nationalization.101.g: "团结、正义、自由！"
 nationalization.102.t: "泛德意志意识"
 nationalization.102.d: "现在，德意志全体人民不再以地区来认同自己的身份，而把自己当做整个德意志一员，这不仅对德国意义深远，对世界亦然。"
 nationalization.102.f: "随着德意志民族国家的建立和泛德意志意识融合的加强，那些在境外，无论是移民还是出生在异国他乡的德意志人，也将自己视为德意志的一员。"
 nationalization.102.g: "就德语而言！"
 nationalization.103.d: "随着德意志民族国家的建立和泛德意志意识融合的加强，那些在境外，无论是移民还是出生在已过他乡的德意志人，也将自己视为德意志的一员。在国内，现在人们也有强烈的认同感，认同自己是德意志的一员，而非以前是某地区的一员。"
 nationalization.103.g: "但这发明会危害人类吗？"
 united_german: "德意志"
 nationalization_pan_german_identity_tt: "在世界范围内，南德意志与北德意志人群都将视自己为泛德意志的一员。其本土也将成为德意志本土。"
 nationalization_german_consiousness_tt: "南北德意志的人民成为了德意志的人民，南北德意志本土也成了德意志本土地区。"
 nationalization_german_consiousness_capital_tt: "我们首都的北德意志人和南德意志人将成为一个德意志民族。这里将变成德意志人的家园。我们的主流文化将转变为德意志，我们要使我们的国家变成日耳曼人的国家！"
 je_nationalization_german_national_identity_tt: "所有北德意志、南德意志和阿勒曼尼本土都已转变为德意志本土。"
 nationalization.104.t: "整合北德意志"
 nationalization.104.d: "北德意志文化现在已完全融入德国。"
 nationalization.105.t: "整合南德意志"
 nationalization.105.d: "南德意志文化现在已完全融入德国。"
 nationalization.106.t: "整合阿勒曼尼"
 nationalization.106.d: "阿勒曼尼文化现在已完全融入德国。"
 nationalization.104.f: "“我并不担心德国不能统一；我们的良好道路和未来的铁路会发挥作用。最重要的是，让他们彼此相爱，永远团结对抗外敌；让德国塔勒和格罗申在整个帝国内都有相同的价值；让我的手提箱能够在三十六个州之间自由通行。”——约翰·沃尔夫冈·冯·歌德"
 nationalization.104.g: "欢迎，兄弟！"
 nationalization.111.t: "[SCOPE.sCharacter('german_character_scope').GetLastName]支持德国事业"
 nationalization.111.d: "随着泛德意志认同的呼声日益高涨，[SCOPE.sCharacter('german_character_scope').GetFullName]已完全认同德意志民族国家的理想。他认为自己的出身是次要的，并强调自己的德意志民族身份。"
 nationalization.111.f: "“我不再认识任何党派，我只认识德意志人”——威廉二世"
 nationalization.111.g: "德意志邦国林立的时代结束了。"
 nationalization.112.t: "德意志文化"
 nationalization.112.d: "德国被誉为诗人和思想家的国度。即使在政治统一之前，文化就已经塑造了这个民族。德国的文学和音乐享誉世界——并且可以作为凝聚民族认同的粘合剂。"
 nationalization.112.f: "“人，尤其是德国人，创造了自己的世界，他学会了忍受那些不接受教育的事物。”——弗里德里希·席勒"
 nationalization.112.g: "德国有着丰富的音乐史。"
 nationalization.112.h: "德国有着丰富的文学史。"
 nationalization.112.i: "未来属于德意志文化！"
 nationalization.113.t: "德意志纪念碑"
 nationalization.113.d: "很多俱乐部、协会以及爱国者和民族主义者致力于建造众多纪念碑，以赞颂德国的英雄，庆祝国家的新生统一。在莱茵河畔的尼德瓦尔德，将建造一座巨大的德意志妇女像。"
 nationalization.113.f: "德国统一之后，各地掀起了一场轰轰烈烈的建筑热潮，这在众多壮观的纪念碑中得到了体现。尼德瓦尔德纪念碑与基夫豪森山的巴巴罗萨纪念碑、科布伦茨的德意志角、泰通堡森林南部德特莫尔德附近的赫尔曼纪念碑、韦斯特法利亚门的威廉皇帝纪念碑、莱比锡的大会战纪念碑、汉堡的俾斯麦纪念碑和多瑙施陶夫附近的瓦尔哈拉一同，是德国在德意志帝国时期主要建造的纪念性建筑之一。这座纪念碑的建造历时12年。"
 nationalization.113.g: "支持纪念碑文化并建造尼德瓦尔德纪念碑。"
 nationalization.113.h: "还是算了。"
 je_nationalization_frenchization: "法兰西化"
 je_nationalization_frenchization_reason: "从1881年起，根据茹费理部长的建议，在学校讲奥克语的孩子将受到惩罚，这导致了一种被称为“羞辱（la vergonha）”的语言的废弃。自法国大革命以来，法国其他地区一直在中央集权的阴影下苦苦挣扎。从19世纪末开始，法国政府加大缩小地区差异的力度，以促进统一的身份认同。"
 nationalization_frenchization_tt: "当地的奥克人、法兰克‑普罗旺斯人、布列塔尼人和瓦隆人都将成为法兰西人。其本土也将转变为法兰西本土。"
 je_nationalization_french_national_identity_tt: "所有的奥克、法兰克‑普罗旺斯、布列塔尼和瓦隆文化本土都已转变为法兰西本土。"
 nationalization_pan_french_identity_tt: "全世界的奥克人、法兰克‑普罗旺斯人、布列塔尼人和瓦隆人现在都将自己视为泛法兰西民族的一部分。"
 nationalization.201.t: "[SCOPE.sState('frenchization_state').GetName]的法兰西化"
 nationalization.201.d: "经过多年的政治影响和教育强化，[SCOPE.sState('frenchization_state').GetName]的人已经与法国公民无任何区别。他们的文化和生活方式同巴黎相比已是别无二致。"
 nationalization.201.f: "“巴黎人之于法国人，犹如雅典人之于希腊人：没有人比他睡得更香，没有人比他更公然地轻佻和懒散，没有人比他更显得漫不经心。但这是一种误解。他对各种无聊事物都不感兴趣，但当有荣誉可争时，他却会激发出各种狂热。给他一根长矛，他就会上演八月十日的暴动；给他一支火枪，你就会看到奥斯特里茨的胜利。他是拿破仑的跳板，也是丹东的支柱。在‘祖国’的呼唤下，他报名参军；在自由的号召下，他掀起街头革命。小心他！”——维克多·雨果"
 nationalization.201.g: "保持文明，说法语。"
 nationalization.202.t: "法兰西化完成"
 nationalization.202.d: "多年的努力是值得的。法国是一个拥有一种语言、一种文化和一座首都的国家。法语教育是我们历史上的一个里程碑。"
 nationalization.202.f: "随着法兰西意识融合的加强，那些在境外，无论是移民还是出生在异国他乡的法国人，也将自己视为法兰西的一员。"
 nationalization.202.g: "此刻便是荣耀之日！"
 nationalization.204.t: "整合奥克"
 nationalization.204.d: "经过多年的教育、宣传以及对地方主义的打压，奥克文化已经与法兰西文化难分彼此。"
 nationalization.205.t: "整合法兰克‑普罗旺斯"
 nationalization.205.d: "经过多年的教育、宣传以及对地方主义的打压，法兰克‑普罗旺斯文化已经与法兰西文化难分彼此。"
 nationalization.206.t: "整合布列塔尼"
 nationalization.206.d: "经过多年的教育、宣传以及对地方主义的打压，布列塔尼文化已经与法兰西文化难分彼此。"
 nationalization.207.t: "整合瓦隆"
 nationalization.207.d: "经过多年的教育、宣传以及对地方主义的打压，瓦隆文化已经与法兰西文化难分彼此。"
 nationalization.204.f: "“法国之所以伟大，是因为她是法国。”——维克多·雨果"
 nationalization.204.g: "欢迎，兄弟！"
 nationalization.301.t: "[SCOPE.sState('united_swiss_culture_state').GetName]的瑞士意识。"
 nationalization.301.d: "经过多年的社会和政治影响，[SCOPE.sState('united_swiss_culture_state').GetName]的人民已经对整个瑞士德意志民族产生了归属感，他们现在完全倾向于瑞士德意志认同。"
 nationalization.301.f: "“如果末日降临，我愿为瑞士人。”——阿尔伯特·爱因斯坦"
 nationalization.301.g: "我为人人，人人为我！"
 nationalization.302.t: "瑞士化完成"
 nationalization.302.d: "现在，瑞士全体人民不再以地区来认同自己的身份，而把自己当做整个瑞士的一员。从今天起，法兰西、德意志与意大利国家都不能继续轻言我们只是不同民族的混合体。"
 nationalization.302.f: "我们要成为一胞同族，\n无论苦难，永不离弃，\n我们要自由，如先辈那般，\n宁死不为奴作婢，\n我们瞻仰着至高至上的主，\n永不惧那人间王权。"
 nationalization.302.g: "我们是同一意志国家。"
 nationalization.313.t: "威廉·退尔纪念碑"
 nationalization.313.d: "威廉·退尔在传说中被视作瑞士的奠基人之一，在民众的历史记忆中与吕特利誓言有着同等地位。许多爱国者希望为他竖立一座雕像，以激励新近觉醒的民族意识。"
 nationalization.313.f: "“善良的人通常把自己放在最后考虑。”——弗里德里希·席勒"
 nationalization.313.g: "我们需要颂扬过去。"
 nationalization.313.h: "谁来买单？"
 united_swiss: "瑞士"
 nationalization_swiss_consiousness_capital_tt: "我们首都的阿勒曼尼、法兰克‑普罗旺斯、提契诺与罗曼什人口将成为一个瑞士民族。这里将变成瑞士文化的本土。我们的主流文化将转变为瑞士，并且可以开始全国上下的瑞士化。"
 nationalization_swiss_consiousness_tt: "当地的阿勒曼尼、法兰克‑普罗旺斯、提契诺与罗曼什人口将成为瑞士人，其本土也将转变为瑞士本土。"
 je_nationalization_swiss_national_identity_tt: "所有的阿勒曼尼、法兰克‑普罗旺斯、提契诺与罗曼什文化本土都已转变为瑞士本土。"
 nationalization_pan_swiss_identity_tt: "所有剩余的阿勒曼尼、法兰克‑普罗旺斯、提契诺与罗曼什文化人口都将成为一个瑞士民族，这些文化的所有角色也将成为瑞士人。"
 nationalization_disunited_italy_modifier: "意大利统一后果"
 nationalization_disunited_germany_modifier: "德意志统一后果"
 nationalization_brigants_modifier: "土匪"
 nationalization_anti_regionalism_ig_modifier: "反地方主义"
 nationalization_anti_regionalism_country_modifier: "反地方主义"
 nationalization_linguistic_impurity_modifier: "语言不纯正"
 nationalization_no_foscolo_modifier: "拒绝福斯科洛"
 je_nationalization_italianization: "意大利化"
 je_nationalization_italianization_reason: "在意大利统一后，马西莫·达泽利奥说过：“我们已经缔造了意大利，现在我们必须铸就意大利民族。”即使这句话在历史上有争议，但它仍然道出了一个事实，那就是意大利在政治上实现统一后，内部的团结却远非稳固。这不仅适用于南方，那里经常土匪横行——甚至在北方，除了资产阶级精英之外，大多数人仍然感觉自己与地方身份有着紧密的联系。联合作战、联合兵役、国家教育制度和国家机构（如兵营、军港和行政设施）的建设，有望在未来几年内，通过艰苦的国家统一过程，确保形成一个更加牢固的全意大利的认同感。"
 je_nationalization_italianization_goal: "#O 民族认同进度#!达到#G 250#!。"
 je_nationalization_germanization_reason: "1871年德意志帝国成立后，德国人的统一意识在各邦已非常普遍。统一德意志各邦的迫切需求自1848年就已存在。只有在巴伐利亚，直到20世纪还存在着一种特殊的地域性情感，但这种感情越来越淡。联合作战、高额威望以及大学、艺术学院和行政设施等国家机构的建设，都有可能确保在未来几年内在艰巨的国家统一进程中产生出更加强烈的全德意志认同。"
 nationalization.12.f: "自古以来，意大利南部就存在着各种形式的强盗活动。但是，它们从袭击随机旅客的歹徒，演变成了政治抵抗运动的形式。1861年，撒丁王国（后来的意大利王国）征服了两西西里王国后，该地区最著名和最广为人知的强盗活动兴起了。强盗们来自各行各业，有着不同的动机；他们中既有意大利政府视为普通罪犯的前囚犯、土匪等，也有前士兵和波旁王朝的忠实拥护者。他们不仅对意大利当局和占有土地的上层阶级发动攻击，而且对普通百姓也毫不留情，经常洗劫村庄、城镇和农场，对个人和团体，无论是农民、城镇居民还是敌对的强盗团伙，进行武装抢劫。"
 nationalization.12.g: "又是这些打着行侠仗义口号的强盗！"
 nationalization.13.t: "对地区传统的恐惧"
 nationalization.13.f: "在1848/1849年的革命失败后，新教宗党这一意大利统一运动的领导力量，就实际上失去了影响力。他们最初主张在教宗的同侪之首的领导下，建立一个联邦制的意大利。作为回应，中央集权的势力获得了绝对的优势——这一现象一直延续到20世纪。地方的敏感性不再被考虑，相反，地方的情感被视为危险的倾向，可能破坏意大利的统一努力。"
 nationalization.13.h: "我们应该考虑到这些特色传统。"
 nationalization.14.t: "方言还是语言？"
 nationalization.14.d: "为了推广意大利语在公共机构和日常生活中的应用，我们国家的主要教师、讲师和教授们都表达了支持。这将对新意大利的科学和政治进程有着重要的改善作用——然而，这项要求在普通民众，特别是农村人口中却遭到了强烈的反对，因为他们仍旧坚持只使用方言交流。"
 nationalization.14.f: "在18世纪，意大利半岛上的各种语言都是独立的语言，这一点毫无疑问。托斯卡纳语因为但丁·阿利吉耶里而声望卓著，但并非唯一。威尼斯语是威尼斯共和国的官方和书面语言，卡洛·哥尔多尼的戏剧和其他文学作品都是用威尼斯语写成的，而且威尼斯语在亚得里亚海地区也是一种重要的通用语言。那不勒斯语也有类似的地位。然而，到了19世纪，人们普遍认为意大利只有一种标准的语言变体，而其他的都是方言——即使北部的意大利语已经具有了特殊的语言特征。但随着政治运动的发展，现实越来越明显：语言和方言的区别在于，前者拥有海军和陆军。"
 nationalization.14.g: "我们多样性的语言就是我们的声誉。"
 nationalization.14.h: "把意大利语说清楚。其他都是方言。"
 nationalization.15.t: "福斯科洛的命运"
 nationalization.15.d: "随着民族情绪愈演愈烈，人们呼吁着将属于意大利的伟大诗人乌戈·福斯科洛的遗蜕从英国运回意大利，让其落叶归根。"
 nationalization.15.f: "“新生的意大利国家需要寻找自己的标志：不仅有历史事件，还有历史人物。他们早就有了一个想法，要仿造帕特农神庙，建立一个纪念艺术家、科学家和其他伟大人物的陵墓，就像法国那样（指先贤祠）。佛罗伦萨的圣十字教堂，曾是杰出公民的安息之地，似乎很适合这个目的。像马基雅维利、米开朗基罗和伽利略这样的人物，已经不仅仅是托斯卡纳的骄傲，而是整个意大利的荣耀。”——乌戈·福斯科洛，一位出生在扎金索斯岛的威尼斯诗人，生活在动荡的年代，被视为早期意大利自由主义和民族主义的代表人物。他无疑是这个意大利思想家画廊的完美补充。可惜的是，福斯科洛于1827年在流亡中去世——在伦敦郊区的特纳姆格林。"
 nationalization.15.g: "让他们把福斯科洛交给我们。"
 nationalization.15.h: "如果他们拒绝会显得我们很尴尬。"
 nationalization.16.d: "意大利政府要求将意大利的著名诗人、民族主义斗士乌戈·福斯科洛的遗蜕交还于他们。"
 nationalization.16.g: "他们应该有自己的小诗人。他叫什么名字？"
 nationalization.16.h: "福斯科那家伙留在这里。"
 nationalization.17.t_foscolo: "福斯科洛归来"
 nationalization.17.d_foscolo: "大不列颠的政府已经同意意大利将乌戈·福斯科洛的遗蜕送回意大利的国土，并将其安置在圣十字教堂永眠。"
 nationalization.17.f_foscolo: "乌戈·福斯科洛的归国被视为年轻的意大利国家的一个重要转折点。福斯科洛受到了热烈的欢迎，他的葬礼就像一场盛大的游行——人们为他哭泣和欢呼。在佛罗伦萨的圣十字教堂里，一个意大利民族主义的象征被建立起来，人们可以以此为指引。意大利的英雄们成为了这种思想的核心，而不是天主教的圣徒。"
 nationalization.17.g: "意大利的伟人归乡了！"
 nationalization.17.t_no_foscolo: "福斯科洛仍然流亡海外"
 nationalization.17.d_no_foscolo: "很不幸，该死的约翰牛虚与委蛇的找个各种理由阻扰乌戈·福斯科洛回归意大利。"
 nationalization.17.f_no_foscolo: "他们如此的狗眼看人低，居然把这位伟大的意大利诗人叫做“福斯科那家伙”！"
 nationalization.17.h: "这群约翰牛的崽子居然拒绝了归还我们福斯科洛！"
 nationalization.18.t: "意大利音乐文化"
 nationalization.18.d: "意大利是对音乐文化发展有决定性影响的国家之一——无论是乐器制作、歌剧发展、歌唱家培养还是作曲家创作。自文艺复兴时期起，意大利半岛就形成了一种独具特色的音乐文化，赢得了欧洲的敬仰，并带来了新的灵感。意大利语一直是歌剧的唯一语言，直到19世纪，这就体现了这一伟大的传承。"
 nationalization.18.f: "“把洗衣女工的账单给我，我甚至会把它谱成音乐。”\n——焦阿基诺·罗西尼"
 nationalization.18.g: "意大利有着丰富的音乐史。"
 nationalization.18.h: "未来属于意大利音乐文化！"
 nationalization.19.t: "但丁崇拜"
 nationalization.19.d: "但丁·阿利吉耶里被认为是意大利文化的终极象征，他的《神曲》是中世纪的文学见证，也是世界经典文学之一。对但丁的崇拜已成为意大利爱国者真正的崇拜，这也是外界认为泛意大利认同的情感的可靠证据——毕竟是但丁首先将意大利的边界定义为说“Sì”语言的区域。佛罗伦萨将建立一座纪念碑来纪念这位“至高至上诗人”。"
 nationalization.19.f: "“走到我们生命的半途，\n由于我迷失了正路，\n我发现在一片昏昧的密林。”\n——但丁·阿利吉耶里"
 nationalization.19.g: "支持但丁崇拜并在佛罗伦萨建立纪念碑。"
 nationalization.19.h: "还用骈四俪六折磨子孙？"
 nationalization.12.t: "[SCOPE.sState('nationalization_brigants_modifier').GetName]的强盗"
 nationalization.12.d: "[SCOPE.sState('nationalization_brigants_modifier').GetName]的恶劣条件使得越来越多人加入了[SCOPE.sCharacter('manzoni_brigant_character').GetFullName]团伙。这群土匪的肆意妄为已经成为周围地区的一个大麻烦。但就如此也有普通民众支持他们，民众们认为他们是政府和意大利化的反对者，也是政党和地区上的抵抗者。"
 nationalization.13.d: "[SCOPE.sState('nationalization_regionalist_state').GetName]的普通民众担心新的意大利政府和意大利语普及会破坏他们的传统。[SCOPE.sCharacter('nationalization_rural_leader_scope').GetFullName]认为不该忽略当地传统，意大利文化的同质化太过了。"
 nationalization.13.g: "[SCOPE.sState('nationalization_regionalist_state').GetName]和其他地区一样，也是意大利的地区。"
 nationalization.11.t: "《烹饪中的科学和饮食的艺术》"
 nationalization.11.d: "[TimeKeeper.GetCurrentDate.Format('y')]年，意大利出版了一本永远改变烹饪文化的开创性食谱，作者佩莱格​​里诺·阿图斯为建立国际公认的意大利美食体系做出了贡献，这种烹饪体系强调了民族的团结与伟大。"
 nationalization.11.f: "佩莱格​​里诺·阿图斯的《烹饪中的科学和饮食的艺术》出版于1891年，被认为是第一本现代意大利烹饪书籍。在意大利刚刚开始形成民族认同的时期，阿图斯的作品在将不同的地区美食统一为一个连贯烹饪传统发挥了关键作用。他精心收集的食谱，以诙谐明晰的语言呈现，不仅为烹饪文献树立了新的标杆，还通过提升美食的品质、创新和对当地美食的自豪感，为提高意大利国民的生活水平做出了重大贡献。"
 nationalization.11.g: "烹饪艺术的胜利！"