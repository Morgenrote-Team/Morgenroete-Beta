 pius.101.t: "拉撒勒德圣母幻影"
 pius.101.d: "法国东南部山区的两个孩子声称目睹了圣母玛利亚的显灵，这在整个天主教世界引发了狂热和担忧。"
 pius.101.f: "“孩子们，过来，别害怕。我来给你们带来好消息……”\n\n在法国东南部拉撒勒德村的高山牧场上，两个牧童报告了一个震惊基督教世界的异象。一位光芒四射、满脸悲伤的女士出现在他们面前。祂哭泣——为背弃上帝的世界而流泪。祂讲述了人们肆无忌惮地亵渎神明、亵渎星期日，以及人类若不悔改将面临饥荒和毁灭。这个最初看似乡村传说的异象，如今已演变成一场运动。朝圣者、僧侣和记者蜂拥而至，来到偏远的山坡。如今教会摇摆不定：一些人将这一景象视为神圣的号召忏悔；另一些人则担心民间神秘主义和非理性狂热的兴起。\n格勒诺布尔‑维埃纳教区主教谨慎表示同意，而世俗高层仍持怀疑态度。\n罗马方面并未表态，但钟声已然敲响。"
 pius.101.g: "这是来自天国的警告。"
 pius.101.h: "保持理性。"
 pius.102.t: "在卢尔德的显灵"
 pius.102.d: "在卢尔德小镇，一名十四岁的女孩声称在石窟中见到了一位光芒四射的女子。这个话题很快吸引了朝圣者，引发了争议，也引起了罗马的关注。"
 pius.102.f: "“她年轻、赤脚、贫穷。但很美，美地无可言喻。”\n在比利牛斯山麓卢尔德附近一个偏僻的石窟里，一位名叫贝尔纳黛特·苏比碧的农家女孩讲述了一位身着白衣、系着蓝色腰带、脚上戴着金色玫瑰女士幻象的故事。幻象起初什么也没说，只有微笑。然后她开口说话：忏悔、祈祷。她简单地自称：圣母无染原罪。起初，村民们嗤之以鼻。但当贝尔纳黛特发现了一处隐藏的泉水，并声称它是治愈的源泉时，成千上万的人开始涌入——他们满怀希望、祈祷，甚至哭泣。人们留下了拐杖，而怀疑论者谴责这种歇斯底里。\n教会展开调查。政府警惕地旁观，但人们仍然络绎不绝。"
 pius.102.g: "治愈与希望的圣地"
 pius.102.h: "都是幻觉！"
 pius.103.t: "诺克的无声幻象"
 pius.103.d: "在爱尔兰诺克村，十五位目击者称圣母玛利亚、圣若瑟和圣约翰福音传教士默默显灵。这一景象激励了长期饱受贫困、流亡和外国统治之苦的人民。"
 pius.103.f: "“他们未曾吐露一字。可就在那沉寂之中，整个民族听见了希望的低语。”\n\n雨丝绵密地洒落在爱尔兰梅奥郡诺克镇的教区教堂屋顶上。十五位村民却仿佛被某种神秘力量定住脚步，凝望着前方。在南侧山墙那柔和的光晕中，静静伫立着三位神圣的身影：双手合十、神情虔诚的圣母玛利亚；立于其旁的圣若瑟；还有披着长袍、手中捧着福音书的圣约翰。他们的背后，一只羔羊立于祭坛之上，一座十字架熠熠生辉。\n无人言语，亦无动静。然而，那些见证者——无论年少还是年迈，无论男子还是妇人——都以灵魂起誓，亲眼目睹了这一切。\n在那个饥馑肆虐、人口流失、信仰干涸的年代，这份无声的显现，胜过千篇布道。人们从四面八方纷至沓来，只为寻找治愈的奇迹、神启的讯息与心灵的抚慰。英国当局冷眼旁观，教会之内亦有质疑之声。然而在爱尔兰贫苦而虔诚的百姓心中，诺克已不只是一个村庄的名字，它成为了一声穿越苦难、直指尊严的神圣呐喊。"
 pius.103.g: "雨中虹光"
 pius.103.h: "将其视为民间传说而置之不理。"
 pius.104.t: "法蒂玛的三个秘密"
 pius.104.d: "在葡萄牙中部，三位年幼的牧童声称多次目睹圣母玛利亚显灵，最终引发一场数千人共同见证的神迹。其中蕴含着关于战争、苦难，以及教会未来命运的深远预言。"
 pius.104.f: "“终有一日，我的无玷圣心必得凯旋。”\n\n在葡萄牙法蒂玛郊外的科瓦达伊里亚山谷，三名牧童——露西娅、弗朗西斯科与哈辛塔——向世人讲述了那位比烈日更明亮、身披荣光与忧戚的神秘女子。六个月来，她屡次显现，预示世界大战将至，无神思潮崛起，忠信之人或将受难。她恳切呼召悔改、祈祷，并嘱托将俄罗斯奉献于她的圣心。\n1917年10月13日，成千上万的人冒着滂沱大雨聚集于此。就在那一刻，太阳仿佛挣脱苍穹，在天幕中旋转坠落。有人伏地跪拜，有人仓皇奔逃。而当那奇异的光芒缓缓隐去，众人的衣衫竟已全然干爽。人群在敬畏与战栗中无声离去，如同经历了一场超越尘世的启示。\n教会持审慎之态，舆论亦各执一词。然而在百姓之间，尤其在那些困顿、伤痛与虔诚的灵魂深处，一种全新的火焰悄然燃起——它是希望的微光，是警醒的钟声，更是一种信念：圣母不仅是慈悲的母亲，更是守望未来的神圣哨兵。"
 pius.104.g: "听从法蒂玛的警示。"
 pius.104.h: "揭露所谓“太阳奇迹”的真实面目。"
 pius.105.t: "[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]圣母"
 pius.105.d: "[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]附近的一个偏远村庄传出了圣母玛利亚显灵的消息，并迅速广为人知，吸引了朝圣者、怀疑论者和教会的关注。"
 pius.105.f: "“祂屹立于田野之上，头戴光芒之冠，注视着我们，仿佛洞悉每个灵魂。” 第一个开口说话的是一个孩子——她双眼圆睁，充满敬畏，声音颤抖。\n\n她讲述着一位比黎明更灿烂的女士，披着光芒与悲伤，默默地出现，用悲痛注视着世界，其他人也声称看到了祂。有人跪倒在地；有人奔逃；所有人都记得随之而来的寂静。\n\n这个故事传出了村庄。朝圣者手持蜡烛抵达。信徒们祈祷。受难者充满希望。牧师们争论不休。官员们皱起了眉头，但人们不断前来，吸引他们的并非确定性，而是信仰的渴望。无论是奇迹、幻象还是神话，这件事已经塑造了那些见证者的心灵——以及那些决定它意义的人的生活。"
 pius.105.g: "信徒的标志。"
 pius.105.h: "抑制混乱"
 pius.111.t: "不请自来的游行"
 pius.111.d: "尽管官方下令禁止公开展示，但一群信徒仍自发地开始游行，前往[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]圣母显灵地点。"
 pius.111.f: "“我们没有点燃火把，也没有举起旗帜。只有念珠、寂静和踏在尘土中的双脚。”，黎明时分，他们三三两两地来到这里，穿过田野和村庄，低声祈祷。到了中午，他们已达数百人，沿着乡间小路涌来，有的赤脚，有的哭泣。妇女们手捧鲜花，老人低声吟诵着连祷文，孩子们紧握着木雕圣像。\n\n政府已宣布关闭该地点，士兵们驻守在岗。然而没有人阻止人群。或许是因为歌声，或许是因为寂静，或许是因为某种看不见的东西。当信徒们到达显现的地方时，他们跪下，低声祈祷，并点燃蜡烛。天上没有雷鸣般的声音，也没有奇迹。但有些事情已经改变。"
 pius.111.g: "让他们祈祷。"
 pius.111.h: "静静地观察。"
 pius.111.i: "武力驱散他们。"
 pius.112.t: "圣地之血"
 pius.112.d: "政府与信徒在被禁的圣母游行现场发生冲突，并演变成暴力冲突。这片曾充满希望的土地，如今已沾满鲜血。"
 pius.112.f: "“起初是祷告，继而是惨叫。”\n\n士兵抵达时，烛光仍在微弱跳动。人群的声音由混乱转为哀求。一名女子倒下，一个男孩发出惊呼。无人知晓是谁下令——但枪声骤响，警棍横飞，皮靴踏碎香火与尘土。待一切归于沉寂，那静默却比先前更加沉重。\n\n教会为之震动，信徒怒不可遏。舆论众说纷纭——有人称其为事故，有人斥之为屠杀。昔日被奉为圣地之所，如今已被血的记忆染上阴影。而人民依旧聚集——不再献上鲜花，而是带着愤怒、沉默，以及一双法律也难以压制的眼睛。"
 pius.112.g: "我们对所发生的一切深感遗憾。"
 pius.112.h: "他们自找的。"
 pius.113.t: "讲坛上的布道声"
 pius.113.d: "在[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]，一位本地神父挺身而出，成为圣母显真实相最坚定的守望者。他的布道引万人空巷，他的话语点燃信仰之光——却也动摇了权力的根基。人们称他为[SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName]神父。"
 pius.113.f: "“她向卑微者显灵，而非权贵。或许正因为如此，他们才试图抹去她的回音。”\n\n在村庄之上，那座石砌教堂中，[SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName]神父开始发声——不只是诉说圣母的慈悯，更是宣告她的公义。他的声音穿透穹顶，响彻山谷：“倘若天堂曾在此言说，那么凡世再无权将其噤声。”\n\n人们从四面八方赶来听他布道，他的名字在低语中流传，在圣咏中不朽。他劝人和睦，却成了风暴的中心；他被唤作先知，也被指为叛徒。\n\n政权动摇，军队谴责他煽动民心，教会高层踌躇于真理与妥协之间。一封密函悄然递至你手：无声无息，不留痕迹，可立除此人。\n\n然而有些人的沉默，恰是最有力的呐喊。他们不再开口，却令世界震耳欲聋。"
 pius.113.g: "让他布道吧。"
 pius.113.h: "召他前往首都进行谈判。"
 pius.113.i: "让他消失。"
 pius.114.t: "震惊全国的游行"
 pius.114.d: "全国各地的天主教信徒已经开始公开示威，支持圣母显灵。这场最初只是乡村的朝圣活动，如今已发展成为一场全国性的运动。"
 pius.114.f: "“他们手握念珠，肩上扛着孩子，口中喃喃诵着圣母之名。”\n\n从渔村到工厂城镇，处处可见相同的景象：窗前烛火摇曳，广场上传来圣歌回响，成千上万的人聚集在一起，沉默无声。没有旗帜飘扬——只有雕像、圣像，以及一个被反复低语的名字：玛利亚。起初是虔诚的信仰，如今却已化为一种抗争。\n在[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]的圣地发生暴力事件后，信徒们走上街头。他们不喊口号，只是祈祷。然而，人数日日增长。\n政府中有人主张宽容，也有人要求镇压。军队躁动不安。而在全国各地的家庭中，就连怀疑者也开始思索：若如此多人相信，那它还能是一场谎言吗？"
 pius.114.g: "允许举行全国性宗教游行。"
 pius.114.h: "禁止全国性宗教游行。"
 pius.115.t: "田野静默"
 pius.115.d: "[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]的田野正经历一场罕见的饥荒，庄稼枯死，土地失收。而在信众之间，一个低沉而炽热的声音悄然蔓延：那位曾被权力封缄的圣母，如今正在流泪——她不是宽恕，而是审判。"
 pius.115.f: "“她曾要求我们祈祷，我们却派出军队回应。”\n\n雨季迟迟未至，麦田早早枯黄，地下的马铃薯悄然腐烂，苦不可食。村民说起这些田地时，总觉得它们被遗弃了——不仅被人类，更被怜悯本身所舍弃。\n于是流言悄然蔓延：关于那位曾在光辉中显现、却被世人讥讽的女子；关于那位神秘失踪的神父；关于那座被封锁的圣地与遭驱逐的信徒。如今人们低语着：她已收回目光，不再眷顾。\n烛火再度燃起，却藏于紧闭的窗帘之后。母亲们悄悄为婴孩施洗，老人将干硬的面包皮埋入土地，当作献礼。教会上层沉默不语，而百姓早已深信：这是一场圣母的哀伤——亦或是警示。"
 pius.115.g: "迷信罢了！但愿……"
 pius.116.t: "钟声后的沉寂"
 pius.116.d: "在多年压制与否认奇迹之后，许多曾虔诚信仰的市民开始放弃对[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]的信仰。越来越多的人不再自称为天主教徒——而是“无信仰者”。"
 pius.116.f: "“她不再来，不在梦中，不在光中。连烛火，也熄灭了。”\n\n圣所紧锁，神父远去，田野静默无声。\n昔日，哪怕最穷困的灵魂也在枕边低吟《万福玛利亚》，圣像高悬于灶台之上，钟声一响，泪水便从眼眶坠落。如今，长椅空置，彩窗蒙尘，孩童问：“忏悔……是什么？”青年则谈着理性、进步、以及那名为‘虚无’的新信仰。\n他们不曾拥抱任何主义，只是走入灰烬。他们不是叛教者，只是倦极之人。而在那深不见底的寂静中，一个古老的问题仍在回响——\n是我们遗忘了她？还是她终于放开了我们？"
 pius.116.g: "信仰的时代已经过去。"
 pius.119.t: "圣地关闭"
 pius.119.d: "新成立的无神论政府下令关闭圣母朝圣地。昔日光耀与祈祷之所，今已警戒封锁，在国家监视下归于沉寂。"
 pius.119.f: "“无人鸣钟，无人点灯。黎明未至，门已落锁。”\n\n曾经吸引成千上万人的圣地，如今孤零零地矗立着。教堂门上钉着一张告示：“根据人民大会命令，本建筑被宣布为非必要设施。”守卫驻守于此，并非为了保护，而是为了阻止。\n没有人使用武力，也没有人允许抗议。这场变化悄然发生，通过官僚程序完成——不是一场爆炸，而是一种逐渐加深的空缺。然而，在全国各地的家庭中，年迈的手在颤抖。祖母们藏起她们的念珠，孩子们问：“为什么朝圣者不再歌唱？”\n神职人员保持沉默，政党则高谈科学、理性与进步。而在某扇紧闭的门后，一个问题仍在微弱地闪烁，如一支即将燃尽的蜡烛：这一切，真的有必要吗？"
 pius.119.g: "我们不再为这些虚幻之物建造纪念碑。"
 pius.121.t: "她什么意思？"
 pius.121.d: "[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]的圣母显灵事件已被正式认定为一个积极的征兆。但即便在今日，其真正含义仍众说纷纭，有待解读。"
 pius.121.f: "自从那道光辉身影向村民们显现以来，已过去数周，却再无任何进一步的迹象。没有天火降下，也没有云中传来声音。只有宁静的天空，以及人们心中久久未散的惊叹。\n然而，人们仍在谈论——关于和平，关于治愈，关于国家灵魂深处某种悄然发生的变化。朝圣者并非狂热而来，而是带着敬畏前来。神职人员轻声布道，媒体这一次也未带讥讽地报道：这奇迹究竟意味着什么？"
 pius.121.g: "这是给予普通百姓的祝福。"
 pius.121.h: "对我们的神职人员来说，这是一个神圣的征兆。"
 pius.121.i: "这是我们政府合法性的象征。"
 pius.122.t: "[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]的圣地"
 pius.122.d: "圣母显灵的地点如今已成为正式认可的朝圣之地，吸引了越来越多来自四面八方的信徒前来朝拜。"
 pius.122.f: "“昔日空旷的牧场之上，如今燃起烛火，铺满鲜花，回响着千万人虔诚的脚步声。”\n\n道路已然拓宽，田野重归整洁。当初孩子们口中的光辉女子显现之地，如今矗立起一座朴素的礼拜堂。每日皆有信徒前来：农夫携子同行，寡妇身披黑纱，士兵利用假期远道而来，母亲低声为未出世的孩子祈祷。\n教会已正式认可此地为圣地，并开始修建纪念性圣坛。周边集市悄然兴盛，出售面包、圣像徽章、念珠与红酒。那个曾被贵族沙龙质疑的传说，如今已深植人心，成为国家灵魂的一部分。\n当山谷的钟声再次响起，一个问题悄然浮现：这究竟是信仰的复兴——还是更大变革的前奏？"
 pius.122.g: "我全属于你。"