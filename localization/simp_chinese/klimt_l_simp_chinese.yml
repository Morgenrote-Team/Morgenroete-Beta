 je_klimt_painter_trip: "教育之旅"
 je_klimt_painter_trip_reason: "在[concept_klimt_painter_trip]中，画家可以学习以前未曾接触的艺术风格并增加年度[concept_klimt_painting_tradition]获取。他们在国外[concept_artists_center_of_arts]学习的时候也会获得正面/负面特质。"
 je_klimt_painter_trip_goal: "一个画家通常情况下要在#G 12个月#!内完成学业，事件会延长或缩短这个时间。"
 je_klimt_secession: "新艺术分裂"
 je_klimt_secession_reason: "新艺术运动吸引了众多艺术家。假以特定条件，其将形成享誉世界的艺术运动，并为绘画与建筑注入新的动力。在历史上，此类组织中举足轻重者之一当属维也纳的艺术家们在世纪之交创立的维也纳分离派，或称奥地利艺术家协会。由此衍生出的新艺术运动变体也被称作分离风格或维也纳新艺术。"
 je_klimt_secession_fail: "另一个国家在我们之前弥合了裂缝。"
