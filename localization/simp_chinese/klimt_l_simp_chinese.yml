 klimt.403.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]携带着丰富的经验、前沿知识以及更多的灵感结束了[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis]的研修旅行。此外，[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe|U]提高了[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis]在艺术界的声望。"
 klimt.425.d: "自从来到[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]之后[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]就给[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis]留下了深刻印象，脑海中想法马不停蹄的蹦出来。[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName]可以真切地感受到这个地方是如何让[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHim]振奋的。"
