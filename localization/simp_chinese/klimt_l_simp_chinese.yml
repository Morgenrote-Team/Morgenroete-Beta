 klimt.2.f: "[concept_klimt_painter]在40岁左右，会定型自己的绘画风格，具有专门绘画风格的画家会在特定条件下创作出这种艺术风格的杰作。你也可以在美术馆中开始收藏符合自己品味的艺术品。专业画家认为自己的绘画训练已经完成，不再进行教育旅行。"
 klimt.2.g: "画风已经成熟"
 klimt.10.t: "美术馆落成"
 klimt.10.d: "新上任的馆长为新美术馆举行了开幕庆祝仪式，邀请了[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]出席了这一活动。"
 klimt.10.f: "国立美术馆的建成将有许多收益，画家将自动创建一个符合其风格的艺术收藏馆，这样的艺术藏品还可以通过一幅杰作得到进一步的提升，使其成为优秀的藏品。杰作可以是画家随机绘制的，也可以是从国外购得的"
 klimt.10.g: "我们终于不用再把这些东西存放在阁楼上了！"
 klimt.20.t: "国立美术馆"
 klimt.20.d: "美术馆中陈列着各个时代的代表作。我们目前拥有以下独一无二的画作："
