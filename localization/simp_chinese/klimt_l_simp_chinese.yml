 klimt.11.t: "美术馆不再开放"
 klimt.11.d: "政府已决定不再维持位于[SCOPE.sState('klimt_gallery_state').GetName]的国立美术馆的正常运转。该美术馆会被关闭，其中的重要展品会运往我国首都。"
 klimt.11.f: "首都外的国立美术馆会自动关闭并将展品运往首都已存在的或新建的国立美术馆。"
 klimt.11.g: "这些精美的画作将丰富我们的国立美术馆。"
 klimt.11.h: "以这些画作为基础，建设新的国立美术馆。"
 alert_klimt_painter_trip_possible_alert_hint: "你有一位可在[concept_artists_center_of_arts]学习新的艺术风格的[concept_klimt_painter]。点击#V 赤色晨曦界面#!中艺术概览界面的按钮来选择这种风格。"
