 klimt.30.t: "艺术的新鲜空气"
 klimt.30.d: "[SCOPE.sState('klimt_secession_state').GetCityHubName]已经成为一个与新艺术风格联系紧密的杰出国际艺术运动的中心。这个艺术家团体自称“[SCOPE.sState('klimt_secession_state').GetCityHubName]分离派”。"
 klimt.30.f: "维也纳分离派是一场与新艺术运动密切相关的艺术运动，由一群奥地利画家、平面艺术家、雕塑家和建筑师于1897年组成，其中包括约瑟夫·霍夫曼、科罗曼·莫塞尔、奥托·瓦格纳和古斯塔夫·克里姆特。他们退出奥地利艺术家协会以抗议其对传统艺术风格给予更多支持。其最有影响力的建筑作品当属约瑟夫·马里亚·欧尔布里希为该团体的展览设计的分离派展览馆。他们的官方杂志名为《Ver Sacrum》（拉丁语意为“神圣的春天”），出版了高度风格化且影响深远的平面艺术作品。1905年，该团体本身发生了分裂，当时一些最著名的成员，包括克里姆特、瓦格纳和霍夫曼，在关于优先权的争议中辞职，但它继续运作至今，其总部设在分离派展览馆。目前分离派展览馆由艺术家独立领导与管理。"
 klimt.30.g: "这一吻送给全世界！"
 klimt.30.h: "克里姆特？你是说古斯塔夫·克里姆特吗？"
 klimt.30_tt: "触发#white #b 第一次新艺术分离#!#!事件"
 klimt.40.t: "预览会"
 klimt.40.d: "[SCOPE.sState('klimt_vernissage_state').GetCityHubName]中的展览完全是为了展示[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]的作品。该活动广受好评，对我国来说，它证明了我们是一个先进的文明国家。"
 klimt.40.f: "“大多数人眼中，我是一个无足轻重、古怪、不讨人喜欢的人，在社会上不曾也不将会有什么位置。简而言之，一个底层中的最低微的人。好的，就算这是完全正确，有一天，我会通过我的作品表明，这样一个无名小卒，这样一个怪人，在他的心中到底有些什么。” ——文森特·威廉·梵高"
 klimt.40.g: "冷餐会怎么样？"
 klimt.101.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]"
 klimt.101.d: "在预览会上，[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]大师向公众展示了[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis]的最新作品——[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]，一幅典型的古典主义画作，且已被视为该风格的重要作品。"
 klimt.101.f: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName]的新作品立即引起了艺术家们的注意。尤其是思想保守派的学者，他们喜欢克里姆特作品中的美学形式以及线条和色彩的平衡。艺术作品的道德完整性和崇高性尤其受到重视。这幅画已被视为我们国家的优秀文化遗产，应该成为任何画廊的装饰品。"
 klimt.101.g: "这个属于……画廊！"
 klimt.102.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]"
 klimt.102.d: "画家[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]向公众展示了[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis]的作品，并邀请了几位嘉宾。这些作品给观众留下了深刻印象，甚至被视为浪漫主义的重要作品。"
 klimt.102.f: "“[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]”在首次展出的当晚就给一些观众留下了深刻印象。这幅杰作背后的精神意蕴清晰可见。虽然有评论家抱怨某些地方的轮廓模糊不清，但也有人认为，正是这种朦胧感与丰富的色彩相结合，凸显了主题的力量。通过这幅画作，[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName]已经在艺术史上为自己赢得了一席之地。"
 klimt.103.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]"
 klimt.103.d: "在晚会上，[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]利用这个机会展示了一幅明显是现实主义风格的画作，在场的不少艺术家都称赞了这幅作品。"
 klimt.103.f: "在场的一些宾客原本担心会看到一幅更具挑衅性的作品，但《[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]》却呈现出一种极为沉稳的表现手法。乍看之下，有些宾客甚至误以为这是一幅风俗画。然而，随着观看时间的延长，画作所描绘的日常场景背后那微妙而又激进的理念，以及作者所暗示的社会问题，逐渐变得清晰起来。[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName]的这种社会批判性手法或许疏远了晚会上的少数宾客，但主流观点认为，如此艺术珍品理应在国家级的展览中获得一席之地。"
 klimt.104.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]"
 klimt.104.d: "在国家绘画协会高层代表举办的一场盛大艺术展览上，[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]展出了一幅作品。这幅画虽然引起了相当大的关注，却也招致了一些评论家的嘲讽。然而，一位外国艺术商人开出的高价收购要约，却让这幅作品突然间声名鹊起，备受追捧。"
 klimt.104.f: "当《[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]》首次亮相时，观众意见纷纷。有人认为这幅田园风光近乎天真，缺乏政治或社会抱负；也有人批评其形式和线条的缺失。甚至有人嘲讽道，画面中那融化般的景象恐怕源于画家溶解的大脑。支持者们一时难以占据上风，直到一位来自[SCOPE.sCountry('klimt_art_dealer_country').GetName]的画商特别强调了这幅杰作的品质和创新精神。他当即表示愿意以惊人的高价购买这幅画作，并将其带回自己的国家。这一插曲过后，人们对这幅画的兴趣骤然增加，随即有关部门宣布将其列为国家文化遗产。对此，[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName]可谓是喜出望外。"
 klimt.105.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]"
 klimt.105.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]的最新作品引起了大众和批评家们不绝于耳的憎恶、厌恨、恐惧以及愤怒。不过，也可以说这是一次——“酣畅大胜”。"
 klimt.105.f: "\"《[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]》？这到底是什么意思？有什么意义吗？这些颜色，像是幼儿园涂鸦本里的？这些粗糙的人物？这些癫狂的场景？你管这叫艺术？艺术？！你这个江湖骗子！就算朝画上吐口唾沫，都比现在更像艺术！\"\n\n而这居然还算是展览现场较为正面的评论之一。[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName]此举引发了一场史无前例的轰动，反而更加凸显了这幅画作的重要性。"
 klimt.106.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]"
 klimt.106.d: "在新作品《[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]》公开发表后，[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]被视作世界上最重要的艺术家。这让传统主义者和先锋派都感到激动。"
 klimt.106.f: "“这是什么？新艺术？艺术永远不会是新的。”——阿尔丰斯·慕夏"
 klimt.110.t: "一份谨慎的订单"
 klimt.110.d: "一位经验丰富的艺术品与古董商人提议从国外购买一件罕见的杰作。在这件事上需要格外慎重——该商人也从我们的宿敌甚至战争中的敌国那里购买艺术品。[SCOPE.sCharacter('klimt_art_dealer').GetFullName]保证他将悄悄完成订单——前提是报酬丰厚并以一些画作作为交换。"
 klimt.110.f: "要购买外国画作，国外的艺术品商人必须提出一个合适的报价。不仅需要付出金钱，还需要几幅画作作为回报——这会损害我们的[concept_klimt_painting_tradition]。艺术品商人只能在拥有多幅相同风格画作的国家购买杰作，他们不会出售独一无二的作品。同样，一个国家也不能在国外购买一幅以上同一风格的杰作。从交易完成到画作运抵我国国家美术馆大约需要六个月的时间。"
 klimt.110.g: "获得一件古典主义杰作。"
 klimt.110.h: "获得一件浪漫主义杰作。"
 klimt.110.i: "获得一件现实主义杰作。"
 klimt.110.j: "获得一件印象派杰作。"
 klimt.110.k: "获得一件表现主义杰作。"
 klimt.110.l: "获得一件新艺术杰作。"
 klimt.111.t: "一件古典主义杰作。"
 klimt.111.d: "《[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]》今日作为新的杰作被收入国立美术馆。政府对这件作品非常满意，而艺术品商人认为他的工作已经完成。"
 klimt.111.f: "这幅画作不负众望，完全符合预期。“[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]”恰如其分地满足了所有要求，无疑将加入[GetPlayer.GetNameNoFlag]的艺术珍藏。业内专业媒体也一致认为，这笔收购物有所值。下个月，一场专门聚焦于这一古典主义巅峰之作的展览已经在筹划之中。"
 klimt.111.g: "我们藏品中的又一件艺术瑰宝！"
 klimt.112.t: "浪漫主义杰作"
 klimt.112.d: "今日，国立美术馆门前聚集了不少围观者。从清晨开始，本地和全国各大媒体的记者就已经蜂拥而至，将美术馆团团围住。一个消息不胫而走：一幅浪漫主义的杰作“[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]”即将入驻美术馆的珍藏画廊。"
 klimt.112.f: "关于《[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]》的流言已经传开了。这应该是一幅色彩斑斓、刺激感官的画作。有关其主题的更多信息尚不得而知。一位不知名的艺术品商人应该所知甚多，但据说他已经带着一大笔钱去了国外，并为自己的退休生活做了打算，不再接受采访。"
 klimt.113.t: "现实主义杰作"
 klimt.113.d: "新的杰作《[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]》作为特别展览的一部分，在今天举行的仪式上向公众展出。这幅作品属于现实主义流派，被认为是这一艺术分期的重要画作之一。观众摩肩接踵，活动门票在几周前就已全部售罄。"
 klimt.113.f: "”作为国立美术馆馆长，在今天为各位呈现这样一幅全新的杰作并将其收入馆藏对我来说既是荣耀也是一种欢乐。如各位所知，我们曾经长期致力于拥有一幅现实主义艺术的关键作品，《[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]》正是其中之一。不用我多说，大家都知道这位画家。这幅画描绘冷静，贴近生活，起初被评论家误解为风俗画或缺乏精神的作品。但实际上它的内容是深刻的。请注意着色的细节，它们给人的印象是……“"
 klimt.114.t: "印象派杰作"
 klimt.114.d: "艺术品商人今天完成了任务，将《[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]》交予国立美术馆的管理者，并且得到了丰厚的报酬。整个过程非常顺利，馆长对交易给予了积极评价，但抱怨颜色有点模糊。"
 klimt.114.f: "“我很沮丧，对绘画深感厌恶。这实在是一种持续不断的折磨。”——克劳德·莫奈"
 klimt.115.t: "表现主义杰作"
 klimt.115.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]由值得信赖的艺术品商人从国外购得，其终于来到了[GetPlayer.GetNameNoFlag]，也谈不上完全认可。艺术品商人也在付款后离开了，现在已经找不到了。"
 klimt.115.f: "在《[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]》到达后，一些艺术鉴赏家表示惊讶，甚至批评。这幅作品不寻常的构图给人的印象是觉得这不可能是一位著名艺术家的作品，这也让人怀疑是否遇到了一个开玩笑的江湖骗子，但在上面发现的真实亲笔签名让事情变得更糟……"
 klimt.116.t: "新艺术杰作"
 klimt.116.d: "国立美术馆馆长今天欣慰地发现，这幅杰作已从海外运抵。[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]纯粹是为了吸引眼球。"
 klimt.116.f: "当[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]终于从盒子里拿出来时，它就像动物园里的一只新生儿一样，立刻俘获了在场所有人的心。"
 klimt.116.g: "里面是施耐德杯奖杯？"
 klimt.301.t: "[SCOPE.sState('klimt_art_capital').GetCityHubName]奖"
 klimt.301.d: "我们热爱艺术的国家精英正在推动设立一个最佳画作艺术家奖。"
 klimt.301.f: "拥有美术馆的国家偶尔会组织艺术比赛，其中技艺最精湛的五位画家会被授予一项对其声望有所影响的奖项。该奖通常每五年颁发一次。大作曲家们并不会被邀请——他们已经获得了他们的奖励。"
 klimt.301.g: "我们该组织一次艺术大赛。"
 klimt.301.h: "浪费资金！"
 klimt.302.t: "[SCOPE.sState('klimt_art_capital').GetCityHubName]奖"
 klimt.302.d: "评委会经过讨论选出了最佳作品，五位获奖者的名单已经公布。"
 klimt.302.f: "第一名是来自[GetGlobalVariable('klimt_prize_winner_1_global_var').GetCountry.GetName]的[SCOPE.sCharacter('klimt_character_first_winner_scope').GetFullName]\n第二名是来自[GetGlobalVariable('klimt_prize_winner_2_global_var').GetCountry.GetName]的[SCOPE.sCharacter('klimt_character_second_winner_scope').GetFullName]\n第三名是来自[GetGlobalVariable('klimt_prize_winner_3_global_var').GetCountry.GetName]的[SCOPE.sCharacter('klimt_character_third_winner_scope').GetFullName]\n第四名是来自[GetGlobalVariable('klimt_prize_winner_4_global_var').GetCountry.GetName]的[SCOPE.sCharacter('klimt_character_fourth_winner_scope').GetFullName]\n第五名是来自[GetGlobalVariable('klimt_prize_winner_5_global_var').GetCountry.GetName]的[SCOPE.sCharacter('klimt_character_fifth_winner_scope').GetFullName]"
 klimt.302.g: "为获奖者颁奖。"
 klimt.401.t: "画家游历目的地"
 klimt.401.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]已经打包好了[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetHerHis]的行李。[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe]应该到哪个艺术中心去学习？"
 klimt.401.f: "踏上教育之旅的[concept_klimt_painter]在他缺席的时候不会产生[concept_klimt_painting_tradition]。[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe]仅能学习以前未接触过的艺术风格。一般来说，游历会持续一年，但在游历中[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe]会有机会延长游历时间或遇到阻碍而不得不缩短。"
 klimt.401.g: "古典主义。"
 klimt.401.h: "浪漫主义。"
 klimt.401.i: "现实主义。"
 klimt.401.j: "印象派。"
 klimt.401.k: "表现主义。"
 klimt.401.l: "新艺术。"
 klimt.401.m: "算了。"
 klimt.402.t: "抵达[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]"
 klimt.402.d: "好消息！[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]已成功抵达[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]。[ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe|U]还在寻找免费住宿并将很快开始[ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis]的学习。"
 klimt.402.f: ""
 klimt.402.g: "啊……[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]"
 klimt.403.t: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]从教育之旅中归来"
 klimt.403.f: "“艺术成为艺术，只有在其自身为目的时；只有在它绝对自由、独立存在时；只有在它以真实与美为最高法则时。”——路德维希·费尔巴哈"
 klimt.403.g: "整个旅行不是仅仅寻欢作乐？"
 klimt.411.t: "画家之间"
 klimt.411.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]在教育之旅中碰到了一位来自[SCOPE.sCharacter('klimt_fellow_painter').GetHomeCountry.GetName]的同行画家。他们俩个彼此尊重。[SCOPE.sCharacter('klimt_fellow_painter').GetFullName]看起来是个天资卓越且善于交际的人。"
 klimt.411.f: "如果有几个国家同时派出一名画家进行艺术之旅，那么他们就有可能相遇，并因共同的艺术热情产生协同效应，竞争和敌意很快就会消失。"
 klimt.411.g: "他们应该交流艺术知识。"
 klimt.411.h: "他们可以学习彼此的技能。"
 klimt.411.i: "熟人有利于在艺术界相互支持。"
 klimt.421.t: "追随巨人的脚步"
 klimt.421.d: "我们学习中的画家来信表示，[ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis]已经预见到了自己未来的辉煌。然而，[ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis]仍旧需要多一点点的时间与金钱。"
 klimt.421.f: "在罗马，[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]将面对许多历史上举足轻重的画家与罗马建筑学的一级来到罗马的旅行者一次又一次地与这座城市及其历史结下了不解之缘。追随古典大师足迹的愿望感动了许多艺术家。[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]的野心与日俱增，希望有一天能够与[ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis]的偶像一样伟大。正如[ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe]在一封信中所说的，这可能近乎于自大，但最重要的是时间、耐心与进一步的学习。"
 klimt.421.g: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]应该花时间临摹米开朗基罗与拉斐尔。"
 klimt.421.h: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]应该去画画，少做白日梦！"
 klimt.422.t: "浪漫主义的精神"
 klimt.422.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]尚未从班贝格寄来回信。显然[ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe]已经沉湎于白日梦中。"
 klimt.422.f: "班贝格不仅仅是一座风景如画，以其众多半木结构房屋和丰富的巴洛克遗产让人流连忘返的城市。其中的的某些特质还让它对浪漫主义者有着难以置信的吸引力。重要的浪漫主义者路德维希·蒂克和海因里希·瓦肯罗德实际上都来自柏林，但法兰克尼亚却在他们身上留下了印记。他们对自己的学习兴致寥寥，而对这个国家、它的人民和这个地区中城市的丰富遗产更感兴趣。另一位来自普鲁士的浪漫主义者霍夫曼在班贝克逗留的五年中取得了文学上的突破。这片德意志土地对年轻的浪漫主义者来说，意义堪比歌德的意大利之旅。在当地的文化景观中，他们不仅找到了与理想化的德意志中世纪的联系，还找到了与纽伦堡的阿尔布雷希特·丢勒的绘画和天主教的联系，天主教的精神信仰比世俗化的新教更吸引浪漫主义者。"
 klimt.422.g: "一无是处的生活……"
 klimt.423.t: "转变"
 klimt.423.d: "实际上，[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]迄今为止与信仰并无十分深刻的联系。然而，他在艺术和日常生活中接触到的浓厚的天主教氛围触发了[ROOT.Var('klimt_painter_var').GetCharacter.GetHerHim]的某种想法。[ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe]越来越多地感受到了[ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe]在此之前从未想到过的联系。受此启发，[ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe]绘制了[ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis]第一幅宗教画。"
 klimt.423.f: "“见班堡，此生归顺基督”是德国浪漫主义者的座右铭。事实上，德国浪漫主义是少数几个受天主教而非新教思想家影响较大的主义之一，其中包括许多皈依者，在唯物主义时代，进步和科学在社会中发挥着主导作用，这或许令人惊讶，但恰恰是对反回应的需求最终将享乐主义者引向了修道院。"
 klimt.423.g: "我希望这不是张俗气的圣母像。"
 klimt.423.tt: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]将失去所有负面特质并改信#YELLOW 天主教#!（如果[ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe]不是天主教徒的话）。"
 klimt.424.t: "注重细节"
 klimt.424.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]在[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]找到了一位能帮助他提高[ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis]绘画技巧的大师。不过，这需要几个月的时间，而且费用不菲。"
 klimt.424.f: "“绘画本质上是一种具体的艺术，只能表现真实存在的事物”——古斯塔夫·库尔贝"
 klimt.424.g: "这可能需要一些时间，但这是值得的。"
 klimt.424.h: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]应该全身心投入创作并得到认可。"
 klimt.425.t: "思如泉涌"
 klimt.425.f: "“自从印象派出现后，过去棕色的官方沙龙变成了蓝色、绿色和红色……但薄荷或巧克力，它们仍然是甜点”——克劳德·莫奈"
 klimt.425.g: "这些新想法将激发他创作出大量画作。"
 klimt.425.h: "这些新理念应该对我们的国内文化有所启发。"
 klimt.426.t: "艺术家的生命"
 klimt.426.d: "[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]的精致生活也在[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]生命中留下了印记。[ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe|U]经常流连于酒馆，并使用酒精来提高创作力。如果没有醉酒，[ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe]很难在如此短的时间内完成工作量。"
 klimt.426.f: "“一杯苦艾酒下肚，你见如所愿；两杯之后，事与愿违；酒过三巡，世间真相如实展现，而这才是最可怕的时刻。”——王尔德"
 klimt.426.g: "如果这激发了[ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis]的艺术灵感——问题出在哪里呢？"
 klimt.426.h: "那就需要更长的时间。"
 klimt.427.t: "艺术家的恶习。"
 klimt.427.d: "[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]]获得令人担忧的报告。[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]的嗜好达到了令人恐惧的程度，[ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe]沉溺于恶习和放荡并经常缺席，而且这对[ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis]的健康造成了巨大的压力。"
 klimt.427.f: "卡米耶·毕沙罗、亨利·德·图卢兹·劳特累克、保罗·高更、奥斯卡·王尔德和查尔斯·波德莱尔等人都是苦艾酒中毒的受害者，梵高也是如此。而加布里埃尔·邓南遮则在寻找色情冒险，让·谷克多自己沉溺鸦片，并写下了关于鸦片使用和影响的日记。这些嗜好和恶习导致了自我毁灭和过早死亡，这是艺术家人生的悲剧之一。"
 klimt.427.g: "人无完人。"
 klimt.427.h: "我们必须介入！"
 klimt.427.tt: "教育之旅取消。[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]被我们在[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]的警察拘留，并带回[GetPlayer.GetName]。他将在那里接受六个月的康复治疗。"
 klimt.428.t: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]已可用"
 klimt.428.d: "经过几个月的休息，我们的画家[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]又开始了[ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis]的日常工作，[ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis]并没有放弃原本生活方式，但至少可以避免更糟糕的事情发生。"
 klimt.428.f: "“绑架？ 不不先生，那是干预。绑架会给你带来痛苦，干预只是为了你好……你什么意思，我们不知道什么对你最好？”"
 klimt.428.g: "但愿现在能恢复稳定。"
 klimt.431.t: "维都塔"
 klimt.431.d: "感到[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]的美丽，启发了我们的画家的灵感，于是开始画出一幅精湛的作品，然而这可能会延长[ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis]的逗留时间。"
 klimt.431.f: "维都塔（veduta）是一种高度注重细节，描绘城市景观或其他景色作品，通常采用大画幅，部分为绘画，但版画更为常见。绘制维都塔的画家被称为vedutisti。19世纪晚期，对城市景观的个人“印象”更多取代了对景观准确性的追求，而绘画以及后来的全景摄影则满足了这种倾向。这一时期最重要的维都塔画家包括大卫·罗伯茨和爱德华·盖特纳。"
 klimt.431.g: "好主意！"
 klimt.431.h: "专注学习。"
 klimt.432.t: "美术界"
 klimt.432.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]被邀请至[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]的当地艺术家社群中，就像是他们的自己人一样。"
 klimt.432.f: "“我必须独自一人，知道我是孤独的，才能完全沉思和感受大自然；我必须投入到环绕我的一切中，我必须与我的云彩和岩石融为一体，才能成为我自己。孤独对我与大自然的对话是不可或缺的。”——卡斯帕·大卫·弗里德里希"
 klimt.432.g: "我们需要美术界的认可。"
 klimt.433.t: "快速理解"
 klimt.433.d: "在[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]的旅途中，我们的艺术家取得了比预期更快的进步，也许[ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe]可以早点回来。"
 klimt.433.f: "“天才想做什么就做什么。”"
 klimt.433.g: "那家伙一看就知道是个人才。"
 klimt.434.t: "艺术品经销商"
 klimt.434.d: "在游历期间，[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]遇到了一名知名的艺术品经销商——想卖给我们几幅画。"
 klimt.434.f: "“我是一个非常严肃认真的商人。我的竞争对手诽谤我卖假货只是出于嫉妒。现在我能不能让你对这幅画感到兴奋呢？一幅达·芬奇真品：《怀抱西斯廷八齿鼠的夫人》。一件稀世之宝！这样的优惠再也不会出现了！”"
 klimt.434.g: "买几幅画。"
 klimt.434.h: "我们才不需要二等的外国货。"
 klimt.435.t: "最新时尚潮流"
 klimt.435.d: "在教育之旅中，我们的艺术家了解到了新的时尚、新的建筑风格和新的消遣方式，这些都是[ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis]以前所不知道的。"
 klimt.435.f: "“英格兰人会告诉他们吃惊的朋友——尽管海峡对面的人都很明事理，但却都沉溺在童趣中无法自拔。有的年轻人在草地上踢球，还有人用拍子把球打过网，并且这种疯狂的行为吸引了众多观众。甚至其中不乏位高权重之人——有时候他们甚至也不介意亲自下场参与。”"
 klimt.435.g: "来自新文化的新鲜空气。"
 klimt.435.h: "但跟着时代的潮流涌动就是正确的吗？"
 alert_klimt_painter_trip_possible_alert_name: "你的[concept_klimt_painter]可以学习一种新的艺术风格"
 klimt_painter_trip_possible_alert_setting_name: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon!#!你的[concept_klimt_painter]可以学习一种新的艺术风格"
 klimt_great_painting_modifier: "巨幅肖像"
 klimt_excellent_taste_modifier: "卓越品位"
 klimt_disgusting_painting_modifier: "令人厌恶的肖像"
 klimt_disgusting_taste_modifier: "低品位"
 klimt_art_censorship_modifier: "画作审查"
 je_klimt_rossetti: "前拉斐尔兄弟会"
 je_klimt_rossetti_reason: "前拉斐尔派，亦即前拉斐尔兄弟会，是1848年开始的一个艺术团体（也是艺术运动），由3名年轻的英国画家所发起——约翰·艾佛雷特·米莱、加百利·罗塞蒂和威廉·霍尔曼·亨特。\n他们的目的是为了改变当时的艺术潮流，反对那些在米开朗基罗和拉斐尔的时代之后在他们看来偏向了机械论的风格主义画家。他们认为拉斐尔时代以前古典的姿势和优美的绘画成分已经被学院艺术派的教学方法所腐化了，因此取名为前拉斐尔派。他们尤其反对由约书亚·雷诺兹爵士所创立的英国皇家艺术学院的画风，认为他的作画技巧只是懒散而公式化的学院风格主义。他们主张回归到15世纪意大利文艺复兴初期的，画出大量细节、并运用强烈色彩的画风。"
 je_klimt_fattori: "斑痕派"
 je_klimt_fattori_reason: "斑痕派画派是一个独特的意大利艺术家团体，他们预见了印象派的革新，但在当时却鲜为人知。这一画派的名称Macchiaioli得自意大利语macchia，意为斑点（亦有“灌木丛”之意），其最重要的代表人物当属乔瓦尼·法托里。"
 je_klimt_barbizon: "巴比松派"
 je_klimt_barbizon_reason: "巴比松画派是由一群法国风景画家在1830年前后组建的，他们居住在枫丹白露森林附近的巴比松村。这个由泰奥多尔·卢梭创立的画家聚落一直存在到1870年左右，对整个欧洲的风景画，尤其是印象派，产生了重大影响。"
 klimt.501.t: "前拉斐尔"
 klimt.501.d: "前拉斐尔派，一个因反对古典主义和现实主义而建立的兄弟会，同时又把他们自己视作艺术上的革新派。他们的支持可能会让有才华的新人脱颖而出，但这不可避免地会与我们当前的画家[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]的风格相矛盾。"
 klimt.501.f: "“曾留遗踪于此，\n但忘了何年何月何因。\n还记得门前芳草如旧时，\n无言暗送香轻。\n潮卷吹息，岸畔灯火低迷。”\n——但丁·加布里埃尔·罗塞蒂"
 klimt.501.g: "推广前拉斐尔兄弟会。"
 klimt.501.h: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]更好一些。"
 klimt.502.t: "斑痕派"
 klimt.502.d: "斑痕画派的艺术家群体今天在佛罗伦萨成立。虽然其影响力有限，但却激励着年轻艺术家在艺术道路上寻求新的发展。"
 klimt.502.f: "“斑痕是光线下体量的坚实程度”——乔瓦尼·法托里"
 klimt.502.g: "所以他们是前卫派之前的前卫？"
 klimt.503.t: "巴比松派"
 klimt.503.d: "在泰奥多尔·卢梭的领导下，枫丹白露附近的画家组成了圈子，风景画在整个艺术界掀起了新的热潮。"
 klimt.503.f: "“如果我的画忠实而不加修饰地描绘了你常去的那个地方的朴素而真实的特征，如果我成功地……为那个植被世界赋予了自己的生命，那么你就会听到树木在冬风中呻吟，鸟儿在呼唤自己的幼鸟，并在它们离去后啼叫；你会感觉到古老的城堡在颤抖；它会告诉你，就像你所爱的妻子一样，它也会……消失，并以多种形式重生……你不是在用数学精确地复制所看到的事物，而是在感受并诠释一个真实的世界，它的宿命将你牢牢束缚。”——泰奥多尔·卢梭"
 klimt.503.g: "美好的风景！"
 klimt.601.t: "[SCOPE.sCharacter('klimt_painter_scope').GetLastName]之死"
 klimt.601.d: "[SCOPE.sCharacter('klimt_painter_scope').GetFullName]是一位在国内外享有盛誉的画家，也是我国艺术节的杰出人物。他的离去留下了难以填补的空白。"
 klimt.601.f: "1835年6月26日，卡斯帕·大卫·弗里德里希中风并伴有瘫痪症状。他在特普利茨接受了治疗，但只能通过向俄国沙皇的宫廷出售一些有关诗人茹科夫斯基的画作来支付治疗费用。治疗结束后，弗里德里希又艰难地开始了绘画。尽管如此，他还是在1835到36年间年创作了油画《月下海滨》。1839年前，他主要创作棕褐素描和水彩画，风景画较少，而死亡寓言画较多。弗里德里希在1836年和1838年的德累斯顿艺术展上展出了几幅棕褐素描。他在生命的最后一年停止了工作。1840年5月7日，65岁的弗里德里希在德累斯顿去世，葬于三一公墓。"
 klimt.601.g: "但谁又能为[ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis]画临终肖像呢？"
 klimt.602.f: "透纳随着年龄增长变得愈发古怪。除了陪伴他30年并为为他担任画室助手的父亲之外，他几乎没有没有什么知心朋友。1829年父亲的去世对透纳影响巨大，他此后常常郁郁寡欢。1851年12月19日，透纳在切尔西切恩步道上索菲亚·卡罗琳·布斯的家中因霍乱去世，死后被安葬于圣保罗大教堂，与画家约书亚·雷诺兹爵士比邻而居。他广为人知的遗言是“太阳（或儿子？）即上帝”，尽管这可能出自后人虚构。"
 klimt.603.f: "1848年2月6日，科尔一家到卡茨基尔的圣路加圣公会教堂参加晨祷。午餐后科尔抱怨自己感到疲倦，到了午夜，他的病情恶化并且请来了医生，随后诊断为胸膜炎发作导致肺部出血。1848年2月11日周五晚8点，托马斯·科尔在锡达格罗夫的大宅中去世。"
 klimt.604.f: "1862到63年的冬天对德拉克洛瓦而言非常难熬，他的喉咙严重感染，并且似乎整个冬天都在恶化。在一次前往尚普赛的旅行中，他在火车上遇到了一位朋友，两人的交谈令他筋疲力尽。6月1日，他返回巴黎就医。两周后，即6月16日，他的病情有所好转，回到了乡下的家中。但7月15日病情再度发作，医生表示对此无能为力。这时德拉克洛瓦只能吃下水果，他意识到自己已经病入膏肓，于是在遗嘱中为每位朋友都留下了一份礼物；他还为最信任的女管家珍妮·勒吉尤留下了充裕的生活费，并禁止出售画室内的任何东西；他同时也加入了一个条款，禁止以任何方式表现他的面容：“无论死亡面具、素描还是摄影，我一概禁止”。8月13日，德拉克洛瓦去世。"
 klimt.605.f: "在生命的最后几年中，埃克斯伯格的视力开始衰退，使得他最终不得不完全放弃绘画。1853年7月22日，他在哥本哈根霍乱大流行期间死于霍乱，被安葬在哥本哈根的阿西斯滕斯公墓。"
 klimt.901.t: "[GetPlayer.GetNameNoFlag]苍穹"
 klimt.901.d: "[GetPlayer.GetNameNoFlag]在天文学领域遥遥领先。[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]的杰作启发[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]创造一幅描绘夜空与宇宙的画作。"
 klimt.901.f: "国家的里程碑也会对该国的画家产生影响。非凡的文化事件、技术进步和科学发现都能激发艺术家们的灵感，将它们记录在画布上，成为永恒。"
 klimt.901.g: "漂亮得很呐！"
 klimt.902.t: "太平洋的珍宝"
 klimt.902.d: "一支从太平洋归来探险队收获颇丰：异国情调的物件、迷人的艺术珍品、新的海洋学知识和野生动物已经抵达[GetPlayer.GetNameNoFlag]。[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]受此启发，创作了一幅画作，展现了我们民族探索发现的意志。"
 klimt.903.t: "远东艺术"
 klimt.903.d: "日渐频繁的中东探险唤起了社会对名为“东方主义”的艺术运动的狂热。[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]也受到东方的魅力吸引，以《一千零一夜》作为蓝本绘制了一幅幻想画。"
 klimt.904.t: "新时代的脉搏"
 klimt.904.d: "[GetPlayer.GetNameNoFlag]站在征服天空的最前沿。飞机与飞艇等崭新的飞行器统治着天空。每天都有新的记录被打破，我们的飞行员被视为民族英雄。[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]用色彩描绘了新时代的精神，歌颂了技术、意志和英雄主义的胜利。"
 klimt.905.t: "老虎与狮子的肖像"
 klimt.905.d: "最近参观动物园时，[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]得以亲眼目睹[GetPlayer.GetNameNoFlag]从世界各地带到首都的珍奇动物。作为一名合格的动物学家，[ROOT.Var('ito_naturalist_var').GetCharacter.GetLastName]教授带领[ROOT.Var('klimt_painter_var').GetCharacter.GetHerHim|U]参观了动物园，并告诉他一些关于动物的有趣知识。逗留结束时，[ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe|U]创作了一幅非凡的自画像。"
 klimt.906.t: "恐龙示意图"
 klimt.906.d: "受[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName]教授的成功鼓舞，[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]想让已经灭绝的恐龙在画纸上复生。"
 klimt.907.t: "丛林之谜"
 klimt.907.d: "在不断冒险的情况下，[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]教授源源不断地发现了许多新的玛雅遗迹，这鼓舞了[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]把我们在尤卡坦的考古发现记录在画纸上。"
 klimt.908.t: "[ROOT.Var('elgar_composer_var').GetCharacter.GetFullName]的肖像"
 klimt.908.d: "孜孜不倦的[ROOT.Var('elgar_composer_var').GetCharacter.GetLastName]大师不断推陈出新的作品鼓舞着[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]绘制了一幅大师的肖像。不仅仅是为了大师无与伦比的音乐，也能增加画家的名气。"
 klimt.911.t: "[SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle]的肖像？"
 klimt.911.d: "[GetPlayer.GetNameNoFlag]的国家元首[SCOPE.sCharacter('klimt_ruler_scope').GetFullName]的肖像仍未出现在国立美术馆里。很明显大家都考虑着让[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]来绘制领袖的肖像。"
 klimt.911.f: "新人上任或登基时，画家应为政府首脑或国家元首绘制一幅肖像，至于成功与否则取决于该画家的声誉。"
 klimt.911.g: "绘制一幅肖像。"
 klimt.911.h: "如果出了岔子——那谁来买单？"
 klimt.912.t: "一幅……一幅非凡的肖像"
 klimt.912.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]近日公开了为[SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle]绘制的肖像。尽管有些艺术家着力赞扬了这幅画的“大胆”与“创新”，部分政府官员仍对此感到震惊。"
 klimt.912.f: "“这真叫人厌恶！”\n“这是立体派，先生。”"
 klimt.912.g: "艺术就是艺术。"
 klimt.912.h: "毁了这幅画！"
 klimt.913.t: "巨幅肖像"
 klimt.913.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]为[SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle]所作的肖像超越了之前的所有作品。该画作迅速激起了大众源源不断的赞美，并被视作其最棒的作品。"
 klimt.913.f: "“高六英尺半，肌肉如海格力斯，坚定的眼神如拿破仑，面容如阿佛洛狄忒——是的，没错，那就是我！向这位艺术家展示我的慷慨吧。”"
