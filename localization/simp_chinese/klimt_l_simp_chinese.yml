 klimt_painter: "画家"
 klimt_painter_desc: "该角色是一位以绘画为主业的艺术家。也许有一天，其画作会闻名世界？"
 klimt_great_painter: "大画家"
 klimt_great_painter_desc: "该角色是世界上最伟大的画家之一，其画作被挂在艺术画廊里，收藏家们为之不惜重金购买。"
 klimt_spitzweg_not_funny_modifier: "可疑的施皮茨韦格"
 klimt.1300.t: "卡尔·施皮茨韦格，《穷诗人》"
 klimt.1300.d: "《穷诗人》是德国画家卡尔·施皮茨韦格最为著名且最受欢迎的作品。该画作于1839年，有三个版本，被视为一幅早期的杰作。"
 klimt.1300.f: "卡尔·施皮茨韦格是德国浪漫主义画家与诗人。被视作毕德麦雅时代最重要的艺术家之一。卡尔的父亲是一位富商，曾让他接受药剂师培训并获得慕尼黑大学的文凭，但在养病期间，卡尔也开始学习绘画。作为一名艺术家，施皮茨韦格从临摹佛兰德大师的作品开始自学成才，并在讽刺杂志上发表了第一部作品。1833年获得了一笔遗产后，他开始专注于绘画。他后期的绘画和素描通常是幽默的风俗画，许多画作都描绘了性格鲜明的怪人。"
 klimt.1300.g: "啊哈哈哈，一位有趣的画家！"
 klimt.1300.h: "等等！他要讽刺谁？"
