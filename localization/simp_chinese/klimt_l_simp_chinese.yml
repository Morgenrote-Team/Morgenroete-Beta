 klimt.2.t: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName]致力于一种风格"
 klimt.2.d: "多年来，[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]不断学习，吸取百家之长，改进技艺，[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe]最终确定了自己的风格。"
 je_klimt_painter_trip_fail: "如果[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]提前结束旅程或在外国逗留期间死亡，将不会获得新[concept_character_trait]。"
 klimt.2.h: "古典绘画优于任何其他形式。"
 klimt.2.i: "只有浪漫主义才能赋予绘画灵魂。"
 klimt.2.j: "现实主义真的有对手吗？"
 klimt.2.k: "我觉得印象派应该给人留下深刻的印象。"
 klimt.2.l: "咕咕霍夫！"
 klimt.2.m: "新艺术运动就是艺术，仅此而已。"
