 panum.2007.t: "医学创新发明"
 panum.2007.d: "在大会上，有消息不胫而走，一些专家在医学创新领域取得了突破性进展。他们已准备好分享自己的知识与经验。"
 panum.2007.f: "医学领域的独特创新，如移植手术、X光的开发或化疗，对人类具有深远的意义，因此发明者们毫无保留地分享这些知识。毕竟，这一切都关乎全人类的福祉。"
 panum.2007.g: "为人类的进步干杯！"
 panum.2205.t: "动物试验"
 panum.2205.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生被视作一位冷酷无情的科学家，且对残忍实验有着某种执念。据传，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]“以科学之名”牺牲的动物数量已逾百只。尽管如此，这些实验也取得了一些突破性的成果。"
 panum.2205.f: "尽管为了医学利益而进行的动物实验自古就有，但直到19世纪，这种实验才达到了前所未有的规模。特别是在细菌理论发现的过程中及其之后，进行了大量实验，动物被有意感染病原体无数次，并真正成为了新药的“实验品”。在这一阶段，动物实验和活体解剖也广泛引入大学，成为学生的教学内容。"
 panum.2205.g: "这位医生可以随心所欲地自由行动。"
 panum.2205.h: "学生们应当掌握解剖动物的技能。"
 panum.2205.i: "这就搞得有些过火了。"
 panum.2411.t: "阿司匹林"
 panum.2411.d: "我们的化学家[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]博士发明了一种真正的医学奇迹，或将彻底革新药学领域：阿司匹林。[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生已证实了其显著的镇痛效果。"
 panum.2411.f: "水杨酸自古以来便被用于医药领域。由柳木及其他富含水杨酸盐的植物制成的药物，早在古代苏美尔的泥板和古埃及的埃伯斯纸草书中便有记载。希波克拉底在公元前400年便提及使用水杨酸茶来退烧。富含水杨酸盐的植物是古典古代和中世纪西方医学药典的重要组成部分。到了18世纪中叶，柳树皮提取物因其对发热、疼痛和炎症的显著疗效而广为人知。19世纪，药剂师们开始试验并开出多种与水杨苷（柳树提取物的活性成分）相关的化学物质。1853年，化学家查尔斯·弗雷德里克·格哈特首次用乙酰氯处理水杨酸钠，成功合成了乙酰水杨酸。1897年，拜耳制药和涂料工厂的科学家们开始研究乙酰水杨酸，旨在开发一种对胃部刺激较小的替代品，以取代常见的水杨酸盐药物，并成功创建了一种无杂质的新合成路线。到1899年，拜耳将这种药物命名为阿司匹林，并将其推向全球市场。"
 panum.2411.g: "这种药物将成为未来医学研究的重要基石。"
 panum.2411.h: "化学必将开启更多令人惊叹的发现之门。"
 panum.2411.i: "制药行业将因此获益良多。"
 panum.2412.t: "X光"
 panum.2412.d: "我们的物理学家[ROOT.Var('curie_physicist_var').GetCharacter.GetLastName]博士取得了一项令人瞩目的发现：[ROOT.Var('curie_physicist_var').GetCharacter.GetSheHe]发现了一种此前未知的射线，可用于透视人体。[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生进一步强调了这一发现在医学领域的广阔前景。"
 panum.2412.f: "X射线是一种电磁波，其量子能量高于约100电子伏特，对应波长低于约10纳米。在电磁光谱中，X射线的能量范围高于紫外线。1895年，德国科学家威廉·康拉德·伦琴发现了X射线，并将其命名为X辐射，以表示一种未知类型的辐射。X射线能够穿透多种固体物质，如建筑材料和活体组织，因此X射线成像技术被广泛应用于医学诊断（例如，检查骨折）和材料科学（例如，识别某些化学元素及检测建筑材料中的薄弱点）。"
 panum.2412.g: "令人不寒而栗——仿佛窥见了自己的死亡。"
 panum.2413.t: "血型"
 panum.2413.d: "[ROOT.Var('curie_physicist_var').GetCharacter.GetLastName]医生取得了一项令人震撼的发现，揭示了人类血液有时会混合、有时会凝结的原因：显然，血液分为不同的类型。这一发现为献血和输血领域带来了决定性的突破。"
 panum.2413.f: "“我最近观察并指出，正常人的血清能够使其他健康个体的红细胞发生凝结……通常可以这样表述，在这些情况下至少存在两种不同的凝集素，一种存在于A型血中，另一种存在于B型血中，而C型血中则同时包含这两种凝集素。红细胞对自身血清中的凝集素自然是不敏感的。”\n——卡尔·兰德施泰纳"
 panum.2413.g: "必须大力推动血型研究的发展。"
 panum.2413.h: "诊所应负责收集血型信息并建立血库，以备输血之需。"
 panum.2414.t: "心电描记法"
 panum.2414.d: "[ROOT.Var('curie_physicist_var').GetCharacter.GetLastName]医生发明了一种非凡的设备，能够记录心肌纤维的电活动。医生将这一设备命名为心电图仪——ECG。"
 panum.2414.f: "1843年，卡洛·马泰乌奇通过对鸽子心脏的实验发现，心脏活动基于电生理过程。1882年，生理学家奥古斯都·德西雷·沃勒在他的狗吉米身上进行了首次心电图检查，方法是将它的四只爪子浸入导电的氯化钠溶液中。1887年，他首次使用毛细管静电计成功记录了心脏电流。1903年，威廉·埃因托芬对这些仪器进行了重大改进，基于他在1895年开发的弦线电流计，将心电图发展为一种实用的诊断工具，并将其引入临床实践。他提出的术语至今仍被广泛使用。"
 panum.2414.g: "这种设备应成为每家医院的标配。"
 panum.2415.t: "第一次移植"
 panum.2415.d: "[ROOT.Var('curie_physicist_var').GetCharacter.GetLastName]医生的外科技艺享誉全国，但[ROOT.Var('curie_physicist_var').GetCharacter.GetSheHe]最近以一项大胆的手术令医学界为之震撼：这位医生成功将人类的甲状腺组织移植到了一名年轻人的皮下和腹腔内。"
 panum.2415.f: "现代意义上的首次移植——为替代器官功能而进行的器官组织植入——是1883年的甲状腺移植。这一手术由瑞士外科医生、后来的诺贝尔奖得主西奥多·科歇尔完成。在之前的几十年里，科歇尔已将甲状腺肿病例中多余甲状腺组织的切除技术完善到能够在确保患者存活的前提下切除整个器官的水平。在某些情况下，科歇尔会完全切除甲状腺，以防止甲状腺肿复发。在随后的几年里，科歇尔及其他外科医生还利用甲状腺移植来治疗自发出现的甲状腺功能减退，而无需预先切除器官。甲状腺移植由此成为了一种全新治疗策略的典范：器官移植。"
 panum.2415.g: "而人们竟以为《弗兰肯斯坦》只是一部恐怖小说！"
 panum.2416.t: "立体定向脑外科手术"
 panum.2416.d: "[ROOT.Var('curie_physicist_var').GetCharacter.GetLastName]博士的外科才华无远弗届：这位医生凭借一项全新的脑部手术，彻底改写了神经外科的历史。"
 panum.2416.f: "立体定向脑外科手术是一种微创神经外科手术和放射治疗技术，通过将患者的头部和医疗仪器固定在一个紧密拧紧的框架中，以实现最大精度。在19世纪末的最后几年里，首次使用当时已知的立体定向技术对暴露的大脑进行了孤立的手术。在手术过程中，患者的身体，尤其是头部，被牢固地固定在一个可靠的刚性框架系统中。当时，在研究好奇心和精神病手术背景下进行的可能性测试仍然非常有限且简单。在随后的几十年里，相关工具和方法得到了显著改进。"
 panum.2416.g: "天才！"
 panum.2417.t: "心肺转流"
 panum.2417.d: "随着心肺旁路技术的突破，哈森拜因医生创造了现代医学的一项伟大成就。不久的将来，人们将能够安全无忧地接受心脏手术。"
 panum.2417.f: "在心肺旁路过程中，血液通过插管和管道系统离开人体，经过氧合后再被泵回体内。这一过程被称为体外循环。血液通常从腔静脉或右心房，以及心脏腔室和手术区域打开的冠状动脉流出，经过过滤、氧合、二氧化碳清除、加热和进一步过滤后，再通过主动脉或股动脉返回体内。法国生理学家勒加卢瓦于1812年首次提出了体外循环的构想。1885年，马克西米利安·冯·弗雷与其同事马克斯·冯·格鲁伯在莱比锡大学建造了现代心肺机的前身，采用薄膜氧合器和活塞泵，首次实现了血液在封闭体外系统中的循环。"
 panum.2417.g: "这标志着现代心脏手术的诞生！"
 panum.2418.t: "内窥镜"
 panum.2418.d: "[ROOT.Var('curie_physicist_var').GetCharacter.GetLastName]医生的一项新发明或将提供无价的医学检查服务——它能够透视人体内部！"
 panum.2418.f: "内窥镜是一种能够检查和操作生物体内部或技术腔体的设备。内窥镜的使用，即内窥镜检查，最初是为人类医学诊断而开发的。托马斯·爱迪生发明电灯后，电灯的应用成为内窥镜技术改进的重要一步。最初的电灯是外置的，但其照明能力足以支持膀胱镜检查、宫腔镜检查和乙状结肠镜检查，以及鼻腔（及后来的胸腔）腔体的检查。到1865年，弗朗西斯·克鲁斯爵士在爱尔兰都柏林的仁慈圣母医院使用他自己商业化的内窥镜，已经能够常规为人类患者进行这些检查。"
 panum.2418.g: "这是一款极具实用价值的医疗设备。"
 panum.2419.t: "眼底镜"
 panum.2419.d: "[ROOT.Var('curie_physicist_var').GetCharacter.GetLastName]医生发明了一种设备，极大简化了眼部疾病的检查，为眼科学领域作出了不可估量的贡献。"
 panum.2419.f: "眼底镜检查或眼底检查是通过眼底镜对眼睛可见部分进行的检查，尤其是视网膜及其供血血管的检查。眼底镜于1850年发明，其发明者赫尔曼·冯·亥姆霍兹在1851年10月初首次详细描述了这一设备。眼底镜可用于检测视神经、视网膜、脉络膜和玻璃体的疾病，这标志着眼科学作为一门独立医学和科学学科的历史开端。此后，眼底镜在内部疾病的诊断中逐渐占据了重要地位。"
 panum.2419.g: "这是一款有趣的医疗设备。"
 panum.2420.t: "化疗"
 panum.2420.d: "[ROOT.Var('curie_physicist_var').GetCharacter.GetLastName]医生目前正在测试的一种新治疗手段，或许能为许多病人带来一线希望——即便癌症无法治愈，但至少可以部分治疗。"
 panum.2420.f: "化疗，这一用于对抗癌症或感染的药物疗法，其概念最初由保罗·埃尔利希提出，用以描述通过直接针对病原体的化学物质来治疗传染病的方法。1904年，埃尔利希取得了重大突破，发现了第一种有效的化疗药物——锥虫红，并成功治愈了患有昏睡病的老鼠。这一发现为医学界带来了新的希望。\n1909年8月31日，埃尔利希在美因河畔法兰克福展开了进一步的实验。他将梅毒病原体注射到老鼠体内，随后通过化疗程序进行治疗。这些实验成果斐然，被誉为医学对抗传染病的“新武器”。埃尔利希因此被尊称为“化疗之父”。这些化疗药物，无论是人工合成还是天然物质的衍生物，都展现了其在治疗疾病中的巨大潜力。"
 panum.2420.g: "这能否成为缓解癌症患者痛苦的答案？"
 panum.2100.t: "招募医生"
 panum.2100.d: "综合医院中，[SCOPE.sCharacter('panum_new_physician_scope').GetFullName]堪称最具潜力的医生之一。[SCOPE.sCharacter('panum_new_physician_scope').GetSheHe|U]无疑是新任首席医生的不二人选。[SCOPE.sCharacter('panum_new_physician_scope').GetHerHis|U]的专精领域是……"
 panum.2100.f: "$concept_panum_physician_desc$\n\n#V 新#!医生[SCOPE.sCharacter('panum_new_physician_scope').GetFullName]是一位#tooltip:[SCOPE.sCharacter('panum_new_physician_scope').GetTooltipTag],panum_physician_rating_tt_loc [SCOPE.sCharacter('panum_new_physician_scope').GetCustom('panum_physician_rating_new_physician_icon_text_type')]#!的医生。[GetPlayer.GetCustom('panum_physician_rating_display_existing_physician_type')]"
 panum.2100.g: "流行病学。"
 panum.2100.h: "外科手术。"
 panum.2100.i: "精神病学。"
 panum.2100.j: "军事医学。"
 panum_cholera_condition: "霍乱"
 panum_cholera_condition_desc: "霍乱是一种危险的小肠传染病，被认为是19世纪最危险的流行病，造成全球数百万人死亡。"
 panum_tuberculosis_condition: "结核病"
 panum_tuberculosis_condition_desc: "结核病与霍乱并列为维多利亚时代最常见的死亡原因之一。结核病也被称为痨病，主要侵袭肺部。"
 panum_smallpox_condition: "天花"
 panum_smallpox_condition_desc: "天花以其使面部和身体毁容的脓疱而闻名，长期以来一直是历史上最致命的疾病之一。"
 panum_typhus_condition: "斑疹伤寒"
 panum_typhus_condition_desc: "几个世纪以来，斑疹伤寒一直令士兵们闻风丧胆，尤其是在拿破仑战争期间，它夺走了数千名军人的生命。自然灾害后，它一次又一次地卷土重来。"
 panum_yellow_fever_condition: "黄热病"
 panum_yellow_fever_condition_desc: "黄热病主要侵袭南美洲和非洲的热带地区。在加勒比地区，这种疾病夺走的驻军生命甚至超过了任何一场战争。"
 panum_measles_condition: "麻疹"
 panum_measles_condition_desc: "麻疹是一种高度传染性的疾病，以其典型的红色皮肤斑块而闻名。它可能带来灾难性后果，尤其是在缺乏免疫力的人群中。"
 panum_scarlet_condition: "猩红热"
 panum_scarlet_condition_desc: "猩红热是一种广泛传播的疾病，直到20世纪初，它一直是儿童最常见的死亡原因之一。"
 panum_plague_condition: "鼠疫"
 panum_plague_condition_desc: "中世纪的“黑死病”就是鼠疫，这是历史上最严重的灾难之一。其名称源自肿胀、疼痛的肿块。"
 panum_diphteria_condition: "白喉"
 panum_diphteria_condition_desc: "白喉是一种危险的疾病，可能导致危及生命的并发症和长期后遗症。"
 panum_polio_condition: "脊髓灰质炎"
 panum_polio_condition_desc: "脊髓灰质炎是一种主要侵袭儿童的疾病，常导致死亡或终身的身体残疾。"
