 je_panum_measles: "麻疹疫情"
 je_panum_measles_reason: "麻疹是一种传染性极强的疾病，以典型的红色皮肤斑块而闻名。它可能会造成灾难性的后果，尤其是对缺乏免疫力的人群。作为一种跨区域疾病，麻疹可以传播到其他地区\n\n#ORANGE 抗生素#!的发明对于抗击麻疹具有特殊意义。有了这项科技，[concept_panum_physician]可以找到#V 麻疹的治疗方法#!，且只有非常好的卫生部门才有助于更好地预防和治疗这种疾病。\n\n但可惜的是#V 麻疹疫苗#!发明要求超出了维多利亚的科技水平。"
 je_panum_scarlet: "猩红热疫情"
 je_panum_scarlet_reason: "猩红热是一种传染性疾病，直到20世纪初一直是儿童最常见的死亡原因之一。\n\n#ORANGE 抗生素#!的发明对于抗击麻疹具有特殊意义。有了这项科技，[concept_panum_physician]可以找到#V 猩红热的治疗方法#!，且只有非常好的卫生部门才有助于更好地预防和治疗这种疾病。\n\n以维多利亚时代的科技，[concept_theiler_biologist]发现#V 猩红热疫苗#!极为困难，但是有一定概率。"
 je_panum_plague: "鼠疫疫情"
 je_panum_plague_reason: "中世纪的黑死病是历史上最严重的灾难之一，其罪魁祸首就是鼠疫，不过人们以为鼠疫已经消失，但直到19世纪末才再次出现。在财富较少、卫生系统薄弱的国家，鼠疫可以蔓延到多个地区。\n\n#ORANGE 现代排水系统#!的发明在对抗霍乱方面可发挥巨大作用，基于这项科技，[concept_panum_physician]可以找到一种#V 治疗霍乱的方法#!。中等水平的优秀医疗系统也有助于预防或治愈霍乱。拥有基本卫生系统的地区可以更好地预防和治疗这种疾病。\n\n为了一劳永逸地战胜疾病，需要[concept_theiler_biologist]开发出#V 鼠疫疫苗#!。"
 je_panum_diphteria: "白喉疫情"
 je_panum_diphteria_reason: "白喉是一种危险的疾病，可能导致危及生命的并发症和长期后遗症。由于白喉高发导致儿童死亡和呼吸问题，因此白喉被称为“儿童杀手”。\n\n#ORANGE 现代排水系统#!的发明在对抗霍乱方面可发挥巨大作用，基于这项科技，[concept_panum_physician]可以找到一种#V 治疗白喉的方法#!。中等水平的优秀医疗系统也有助于预防或治愈霍乱。拥有良好卫生系统的国家可以更好地预防和治疗这种疾病。\n\n为了一劳永逸地战胜疾病，需要[concept_theiler_biologist]开发出#V 白喉疫苗#!。"
 je_panum_polio: "脊髓灰质炎"
 je_panum_polio_reason: "脊髓灰质炎是一种主要影响儿童的疾病，以致死率高或终身身体并发症而闻名。虽然脊髓灰质炎在过去只是偶尔发生，但在19世纪却成为地方性流行病。\n\n#ORANGE 抗生素#!的发明对于抗击麻疹具有特殊意义。有了这项科技，[concept_panum_physician]可以找到#V 脊髓灰质炎治疗方法#!，且只有非常好的卫生部门才有助于更好地预防和治疗这种疾病。\n\n但可惜的是#V 脊髓灰质炎疫苗#!发明要求超出了维多利亚的科技水平。"
