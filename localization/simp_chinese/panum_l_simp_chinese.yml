 je_panum_military_medicine_project_reason: "军医和红十字会医护人员拥有独特的机会，能够提升战场医疗护理水平，从而挽救众多生命——甚至可能左右一场战争的胜负。根据角色特质和经验，这种提升的速度会有所不同。在[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]的军事医疗改革之后，将解锁[concept_mobilization_option]或更高级别的选项。"
