 je_panum_disease_investigation: "疾病检测"
 je_panum_disease_investigation_reason: "有时可能会出现这样的情况：一位医生在日常医学研究过程中，全身心投入到对某一特定疾病的研究中。这并非是流行病，而是日常疾病、儿童疾病或常见疾病。比如佝偻病、肾结石或梅毒。\n\n与其他情况不同，这位医生是在业余时间开展这项研究，这意味着他并不忙碌，还能参与其他活动。如果这位医生去世，该项目不会就此终止，而是会暂停，直到另一位医生接手。"
 panum_woolsorters_disease_modifier: "羊毛工的疾病"
 panum_litholapaxy_modifier: "碎石术"
 panum_salvarsan_modifier: "洒尔佛散"
 panum_tetanus_antitoxin_modifier: "破伤风抗毒素"
 goods_output_meat_mult: "建筑@meat!肉类产出"
 goods_output_meat_mult_desc: "对建筑生产的@meat!肉类数量的增益或惩罚"
 panum.2221.t: "羊毛工人病"
 panum.2221.d: "在检测所谓的“羊毛工人病”时，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生发现其实这就是炭疽。"
 panum.2221.f: "炭疽在人类中多以职业病的形式出现，尤其高发于制革厂工人，以及从事毛皮、鬃毛和动物毛发加工的人群。此外，那些负责运输和装卸此类材料的港口工人、运输工人，以及剥皮工人，也面临着感染炭疽的风险。在皮革行业陷入危机的时期，炭疽病的发病率达到顶峰，因为大量廉价的动物皮革从几乎没有兽医屠宰监管的地区被进口，带来了更大的隐患。在很长一段时间里，这种疾病的来源一直笼罩在谜团之中。人们曾误以为它是由中毒引起的，因此称其为“羊毛工人病”。随着微生物学的飞速发展以及病菌理论的确立，这种对经济造成严重损害的动物疾病与对人类致命的疾病之间的联系终于被揭示。这一科学突破促使制定了新的法规，以更好地保护工人免受炭疽的侵害。"
 panum.2221.g: "采用严格的监管措施。"
 panum.2222.t: "甲状腺肿"
 panum.2222.d: "在检查了几位身患巨大甲状腺肿的偏远山谷中的患者后，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生尝试了碘的治疗方法。经过几次尝试，治疗终于取得了成效。"
 panum.2222.f: "在斯蒂利亚州、蒂罗尔州、瑞士的阿尔卑斯山区，以及其他山地地区或英格兰中部，甲状腺肿大（俗称“大脖子”）曾是一种常见病。很早以前，人们就怀疑这种疾病的形成与某些地区的水质有关。帕拉塞尔苏斯推测，原因可能在于缺乏某些矿物质，他甚至建议饮用含铅的水来弥补。在古代中国，医生则推荐通过食用海藻和海绵来治疗这一疾病。随着人们逐渐深入了解甲状腺的功能及碘对身体的重要性，针对甲状腺肿大的治疗终于迈出了实质性的一步。从1918年开始，瑞士医生奥托·拜亚德在他实践的尼古拉谷地区，通过在食盐中科学添加碘化钾，推广了碘盐的使用。他的研究表明，这种方法不仅能够有效消除发育障碍、甲状腺肿大及结节的形成，还没有任何副作用，从而为这一长期困扰人类的疾病提供了简单而有效的治疗方案。"
 panum.2222.g: "所以，这原来是一种与饮食相关的疾病！"
 panum.2223.t: "肾结石"
 panum.2223.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生开发了一种用于治疗肾结石的术式。"
 panum.2223.f: "肾结石，这种贯穿人类历史的疾病，甚至连拿破仑都曾饱受其折磨。尽管自文艺复兴以来，人们已研发出多种用于移除肾结石的手术方法，但这些手术的风险始终居高不下。美国外科医生亨利·雅各布·比格洛带来了革命性的突破：他发明了碎石吸石术。1878年，比格洛发表了《单次操作碎石术》，其中详尽描述了他的创新方法——“在一次手术中将膀胱结石击碎并彻底取出”。在此之前，外科医生通常只能将膀胱结石击碎，但仅有几分钟时间移除部分碎片。而比格洛的方法显著降低了手术风险，将死亡率从约24%降低到了仅2.4%。"
 panum.2223.g: "想到这个我就坐立不安。"
 panum.2224.t: "糙皮病"
 panum.2224.d: "正如[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生经过多年研究发现的那样，糙皮病是一种由烟酸缺乏引起的疾病。"
 panum.2224.f: "克里斯托弗·哥伦布发现美洲后，玉米成为最早被引入欧洲的植物之一。凭借高产量，玉米迅速在欧洲广泛种植。然而，不久之后，在玉米消费量较高的地区，一种被称为“粗皮病”的怪病开始流行。这种疾病因其典型症状——糙皮——而得名。早在18世纪，人们便怀疑糙皮病与大量食用玉米（如玉米粥）之间存在关联。当时的解释五花八门，包括玉米发霉或被毒化、感染、甚至遗传因素。直到20世纪初，约瑟夫·戈德伯格及其团队证明，糙皮病在人类中的发病，以及黑舌病在狗中的发病，均源于营养不良。随后，康拉德·埃尔维海姆进一步确认，这两种疾病的根本原因是烟酸（一种维生素B3）的缺乏。更重要的是，研究发现，使用啤酒酵母治疗糙皮病能显著缓解病症。这一突破性发现直接导致受影响地区精神病院的住院人数骤然下降。"
 panum.2224.g: "仅仅是饮食不均衡导致的？"
 panum.2225.t: "佝偻病"
 panum.2225.d: "在多年研究佝偻病患者之后，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生得出结论，该骨骼疾病与营养缺乏有关——并建议使用鱼肝油和晒太阳作为预防措施。"
 panum.2225.f: "尽管历史上对佝偻病的科学描述屡见不鲜，其病因却在很长时间内始终是未解之谜。19世纪，许多著名的病理学家提出了各种假说，包括先天性梅毒以及父系结核感染。然而，现代对佝偻病病理生理学的理解，直到20世纪初才逐渐明晰。1919年，爱德华·梅兰比发现并发表了关于“第四种维生素”的研究成果。他写道：“佝偻病是一种由于缺乏某种或某些辅食因子而发展的缺乏性疾病。因此，很可能佝偻病的病因是抗佝偻因子的摄入不足，这种因子要么是脂溶性因子A，要么其分布与之类似。”"
 panum.2225.g: "我们是在说维生素D吗？"
 panum.2226.t: "梅毒"
 panum.2226.d: "梅毒，这种古老而顽固的人类顽疾，似乎即将被科学彻底征服。[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生（声称，他利用最先进的医学技术，成功发明了一种神奇的治愈药物，为这一疾病的根治带来了前所未有的希望。"
 panum.2226.f: "直到20世纪初，梅毒的治疗主要依赖于有毒的水银，将其大面积涂抹在患者身上。然而，这种治疗方法除了带来严重的副作用外，还常常导致患者体毛和牙齿的完全脱落，并迅速引发身体机能的全面衰退。事实上，汞早在几个世纪前就已被用作治疗麻风病及其他皮肤病的“疗法”，但效果始终备受争议。在1907至1908年间，保罗·乌伦胡特与保罗·埃尔利希开发并测试了多种含砷制剂，包括阿托昔尔、阿沙赛汀以及418号制剂。尽管这些制剂在动物实验中显示了一定的效果，但由于严重的副作用，最终未能用于临床治疗。1909年，秦佐八千代与保罗·埃尔利希合作开发了有机砷化合物洒尔佛散，这是医学史上首次尝试通过靶向化学疗法治疗梅毒的革命性进展。这一突破为梅毒的科学治疗带来了前所未有的希望。"
 panum.2226.g: "洒尔佛——佛啥？"
 panum.2227.t: "破伤风"
 panum.2227.d: "经过多次试验，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生今天宣布已经找到了治疗破伤风的抗毒素。"
 panum.2227.f: "破伤风作为一种致命疾病，早在古代文明中就已为人所知，人们很早就意识到伤口与致命性肌肉痉挛之间的密切关联。1884年，亚瑟·尼科莱尔通过将花园土壤接种到实验动物身上，首次从自由生活的厌氧土壤细菌中分离出了类似士的宁的破伤风毒素，并确认了破伤风病原体存在于土壤中。同年，都灵大学的两位病理学家安东尼奥·卡尔与乔治奥·拉特内进一步阐明了破伤风的病因，并首次证明了其传染性。1891年，日本科学家北里柴三郎成功从一名破伤风患者身上分离出了破伤风梭菌，并通过实验表明，这种病菌在注射到动物体内后可以引发疾病，其毒素也可通过特异性抗体进行中和。1890年，北里柴三郎与埃米尔·冯·贝林合作，成功研发出特异性的破伤风抗毒素，使动物能够获得破伤风免疫。这一突破不仅标志着破伤风治疗的重大进展，也为冯·贝林的“血清疗法”奠定了坚实基础（包括同年发现的白喉抗毒素）。"
 panum.2227.g: "谁能料到花园的黑土也这么危险？"
 country_panum_kidney_stone_treatment_success_chance_mult: "肾结石治疗成功率"
 country_panum_syphilis_treatment_success_chance_mult: "梅毒治疗成功率"
 panum.922.t: "哮吼"
 panum.922.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生发现，许多医生往往难以区分相对无害的哮吼与危险的白喉，并在一篇文章中详细阐述了两者的差异。"
 panum.922.f: "1860年，一位来自普鲁士的医者亚伯拉罕·雅各比在医学会议上掷地有声地指出，纽约城竟有约122例白喉病例，此言一出，四座皆惊——他的同僚们在同一时期竟未诊断出一例白喉。这一惊人的发现，犹如一记重锤，敲响了儿童疾病领域知识匮乏的警钟。正是这番振聋发聩的言论，催生了美国首批儿童医院的建立，而白喉这一顽疾，也在这些医院中占据了举足轻重的地位。雅各比因此被后世尊称为“美国儿科学之父”。"
 panum.923.t: "皮革样喉膜"
 panum.923.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生指出，白喉的主要特征之一是延伸至喉部并引发窒息的皮革样假膜。这一特征是区分白喉与其他疾病的关键标志。"
 panum.923.f: "“吾等可通过四种方式确定恶性咽峡炎之诊断：\n\n通过对疾病之病理解剖进行广泛研究，于数月内进行六十次尸检；\n\n通过临床观察，吾等证明咽峡炎若任其发展，几皆侵袭喉部，从而引发哮吼之症；\n\n通过化学检查，彼证明咽部假膜与气管假膜于成分上之同一性；\n\n通过研究早期作家之著作。”"
 panum.940.t: "白喉的特效药"
 panum.940.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生今日正式宣布，生产白喉抗毒素的实验已取得重大成功。"
 panum.940.f: " 在一片惊叹声中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生向公众详细讲解了这一突破：[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]使用减弱后的白喉毒素感染马匹，随后从它们的血液中提取了一种高效血清，这种血清对治疗白喉展现出了卓越的效果。尽管这一进展令人欣喜，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]也郑重提醒，这并不是疫苗，因为它并未激活患者的免疫系统。“我们在这一领域还有许多未解的问题需要解决，”[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]坦言道。然而，对于那些曾经在夜晚不眠不休、恐惧孩子因喘息而失去生命的父母来说，从今往后，他们终于可以怀着更多的安慰与希望安心入睡了。"
 panum.940.g: "在白喉向我们发难前，我们扼住了它的“喉咙”。"
 panum.941.t: "铁酸剂"
 panum.941.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在旧档案中发现，曾推荐过铁酸剂作为白喉的治疗方法。事实上，看来它确实有效。"
 panum.941.f: "“令人惊讶的是，这种近乎炼金术般的配方竟对一些患者产生了效果。显然，它是为数不多的白喉治疗方法之一。”\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在白喉疫情期间的便签"
 panum.941.g: "但这真的能让我们有所突破吗？"
 panum.942.t: "插管法"
 panum.942.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生尝试通过插管为患者输送空气。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]在对抗白喉方面取得了一些初步成功。"
 panum.942.f: "“这个方法繁杂苛刻，但此时任何能对付白喉的信息都对我有用。”\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在白喉疫情期间的便签"
 panum.942.g: "但这法子怎么看也不长久啊……"
 panum.943.t: "气管切开术"
 panum.943.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在气管切开术方面的经验有好有坏，但[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]所有医学同僚都已采用这一外科手术来治疗白喉。"
 panum.943.f: "“我实在无法理解，那些自称为白喉专家的人，究竟是如何声称取得成功的。特鲁索声称他挽救了近一半白喉患者的生命，而根据我的专业经验，实际能够存活的患者甚至不到十分之一。”\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在白喉疫情期间的便签"
 panum.943.g: "现在呢？"
 panum.944.t: "水银"
 panum.944.d: "不幸的是，水银疗法对白喉的疗效正如[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]所料——有毒。"
 panum.944.f: "“我本该更清楚这一点吗？是的！但专业文献却笃定地声称，几个世纪以来，水银一直被认为能有效治疗白喉——据说如此！从现在开始，我要寻找其他那些所谓有效的疗法，比如硝酸银，甚至盐酸！到底有没有人真正深入研究过这种疾病？”\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在白喉疫情期间的便签"
 panum.944.g: "这听起来白喉都致命！"
 panum.945.t: "放血"
 panum.945.d: "=专家建议对白喉进行有效的放血治疗。[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生亲自尝试了这种方法，在两个病例中进行实施——然而，结果却发现这种治疗反而适得其反。"
 panum.945.f: "“让一个已经虚弱的病人更加虚弱，就像在一座摇摇欲坠的桥上再拆掉一根支柱。这个道理每个工程师都能理解，然而在医学中，却常被视为异端。”\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在白喉疫情期间的便签"
 panum.945.g: "就没有点进展吗？"
 panum.951.t: "临终喉鸣"
 panum.951.d: ""
 panum.951.f: "夕阳早已隐匿在房屋后方，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]缓步行走在街道的阴影中。这又是失败的一天，又有三个孩子被白喉夺去了生命。即便疫情的高峰期已经过去，白喉的阴影却依然游荡在街头，仿佛一个冷酷的死神，挥舞着镰刀，随时夺取那些尚在襁褓中的生命。溺亡和窒息，无疑是最残酷的死法之一。\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]一生致力于流行病的研究，但白喉却是完全不同的存在。这不是麻疹或猩红热这样的儿童疾病，这些疾病有时甚至可以轻微发作。白喉却让孩子在痛苦中挣扎着喘息。白喉，是复仇的天使，在夜晚悄然降临，无情地掐住孩子的咽喉，将他们推向痛苦与绝望的深渊。\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]向白喉宣战，但这场战争却充满了无力感。每当[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]向前迈出一步，疾病便紧随其后，将[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]再度击退。那些被流传下来的治疗方法全都显得苍白无力。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]与死亡缠斗，与恶魔抗争。\n\n这一切让[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]深深地感到绝望与无助。那天晚上，当[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]拖着疲惫的身体回到家时，一声微弱的喘息从黑暗中迎面而来。那是[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]未曾预料到的患者。白喉，已经蔓延到了[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]的街区，蔓延到了[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]的家中。\n\n最终，蔓延到了[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]儿子的床边。"
 panum.951.g: "是医生的实验——？"
 panum.952.t: "治疗白喉"
 panum.952.d: ""
 panum.952.f: "绝望的吞咽声。[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]早已熟悉了这种声音。通常，吞咽声是微不可闻的，但这种带着痛苦的吞咽却异常清晰，清晰到仿佛刻进了[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]的记忆中。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]无数次听到过它。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]可以为儿子的额头敷上一块冰冷的湿布，可以用温柔的语气安慰他。\n\n但[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]无法拯救他。就像[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]无法拯救其他那些孩子一样。那些被白喉夺走生命的孩子，数以十计，数以百计。\n\n如果有人真正明白这些治疗白喉的药物有多么无效，那便是[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]。汞只会毒害身体；硝酸银和铁酸剂的作用微乎其微。而那被视为外科奇迹的气管切开术——几乎从未带来真正的希望。\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]做过这一切，许多次。但这一次却不一样。这次，这已经不仅仅是关于疾病的斗争。这次，它关乎[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]自身。那个可憎的瘟疫正在复仇。因为[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]敢于反抗它。因为[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]试图根除它，就像它曾抹杀那些幼小生命一样。它正在复仇。它要夺走[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]最珍贵的东西。不是[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]的职业荣誉，也不是[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]对治愈的信念。\n\n夜晚，那令人不寒而栗的喉鸣再次响起。小瓶中的药液在昏暗中微微闪烁。一把手术刀，在月光下冷冷发亮。"
 panum.952.g: "用铁酸剂试试。"
 panum.952.h: "气管切开术——"
 panum.952.i: "用显微镜观察组织样本。"
 panum.953.t: "扼喉“天使”"
 panum.953.d: ""
 panum.953.f: "嘶哑的喘息声终于消失了。那个曾经折磨着[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]的声音，伴随着[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]度过每一个绝望的夜晚，并教会[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]恐惧的声音，终于不再响起。然而，这并非胜利，尽管[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]始终厌恶这种声音。\n\n但现在，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]竟渴望它再次响起。\n\n寂静笼罩着四周。死一般的寂静，正如[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]过去几个月所熟悉的那种。这种寂静是可以“听到”的，一种坟墓般的寂静，像潮水般扩散，吞噬了每一丝生命的气息。这种寂静不仅能够听见，还能感受到。它渗透进人的身体，留下彻骨的空虚。这并非矛盾，而是合乎逻辑的，是经验的结论。\n\n然而，那天晚上，逻辑与经验却在[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]面前失效了。[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U]的手指紧握着一只冰冷的孩子的手，苍白如透过窗户洒落的月光。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]曾试图向白喉发起挑战。\n\n但白喉却将[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]践踏进尘埃，并以折磨[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]为乐。因为[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]的傲慢曾蒙蔽了[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]的双眼。"
 panum.953.g: "医生的苦日子将时时刻刻折磨自己。"
 panum.954.t: "不在喉，而在心、在眼"
 panum.954.d: ""
 panum.954.f: "月亮早已隐没，太阳又一次升起。几天的时间在夜晚的黑暗与窗帘的阴影中悄然流逝。[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]一直守在床边，从未离开。直到现在，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]都未真正治愈过一个病人。[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]的目光始终停留在疾病本身，而非病人。在实验中，使用硝酸银是如此轻而易举；作为试验，将血清注射进动物体内更是轻松简单；甚至，当气管切开术的对象不再是一个人，而仅仅是肌肤、血肉和骨骼时，手术也变得没有负担。\n\n过去，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]始终面对的是疾病。白喉让鲜活的生命变成了病人，将他们的生活化作病历，将他们的痛苦归纳为症状。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]的目标是让人们摆脱呼吸的桎梏。可[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]真正需要治愈的，竟是[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]自己。需要被治愈的伤口，不在喉头，而是在[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]的眼中，更在[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]的心中。\n\n现在，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]终于可以看清一切。而一抹温柔的微笑，朝着[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]悄然绽放。"
 panum.954.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]做到了！"
 panum.955.t: "牺牲"
 panum.955.d: ""
 panum.955.f: "一个灵魂逝去，一个世界获救。在显微镜下，微生物活跃地跳动着，就像那些曾在无数病例中被发现的微生物那样。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]曾试图否定它们的可能性，但现在，这却是唯一合理的解释。[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U]的儿子，从未接触过白喉患者。\n\n这孩子接触过的，只有[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]自己。是[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]亲手将这些病菌带回了家。一次次的接触，日复一日，甚至可能持续了数周，而[ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself]对此一无所知。这些病菌，来自那些患病的孩子，来自那些早已安静长眠的孩子。\n\n如今，这份名单上，又多了一位受害者。\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]的手中握着一个样本。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]还有几只豚鼠和兔子——那些再没有孩子呵护，再没有孩子嬉戏的动物。它们将成为新的牺牲品，正如[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]已经付出的牺牲一样。如果它们感染了疾病，那将是最有力的证据。一切，都是为了根除白喉。这是一个比[ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself]更伟大的目标。\n\n也是比任何其他目标都更加伟大的目标。"
 panum.955.g: "一个不会被原谅的牺牲。"
 panum.956.t: "理论的激进变革"
 panum.956.d: ""
 panum.956.f: "过去的几周，对[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]而言，是人生中一个无法忽视的间奏。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]不会称之为一场哥白尼式的革命，但很少有事件像这次一样，让[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]如此深刻地质疑自己的信念与方法。面对白喉的无力感，已深深地烙印在[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]心中。而[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]明白，这样的情景，只要没有答案，就必然会重演。\n\n只有找到一种成功且持久的解决方案，才能阻止悲剧再次发生。\n\n于是，医生的办公室中堆满了玻璃器皿、医学书籍、论文与各种药物。[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U]的双手疯狂地翻遍每一份与白喉相关的资料：\n\n每一种声称有效的疗法，每一本所谓权威的手册，每一篇自诩权威的论文。\n\n但最终，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]清空了桌面，将这一切统统扔进垃圾桶。他们错了。他们全都错了。布雷托诺、盖尔桑、特鲁索、博休、达维奥！\n\n要揭示白喉的病因，才能真正治愈白喉。而在[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]所读、所试过的所有方法中，唯一可能的结论便是：白喉具有传染性。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]在接触其他患者后，无意中将病菌带回了家，感染了[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]的儿子。这不是推测，而是事实。无论那些所谓的专家怎么说，这都是唯一的真相。\n\n一定有一种病原体。"
 panum.956.g: "所有的力量现在都倾注在寻找病原体上。"
 panum.956.h: "研究的重点应该已经转向可能的疫苗。"
 panum.961.t: "白喉毒素"
 panum.961.d: ""
 panum.961.f: "毒素，是突破的关键。一种由白喉病原体分泌的致命毒素。[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]听说过，有一位生物学家正在研究这种毒素。然而，这种毒素的威力强大得令人绝望，几乎无法被遏制。任何被感染的动物，几乎无一幸免，都会迅速死去。\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]深知，这项研究的意义足以撼动整个科学界。这些成果的片段，已经在专业期刊中出现。而与此同时，世界各地也有许多学者在努力尝试分离这种毒素。他们的目标，是希望能够在不致死的情况下，诱导动物产生免疫反应。而他们所抗争的，是白喉这场浩劫——数百万儿童的生命，已无声地陷入白喉腹中。\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]必须调查，必须找到这种毒素，并且，亲自展开实验。"
 panum.961.g: "这可能是关键的一步……"
 panum.961.h: "这一过程已经成功应用于破伤风毒素的生产中……"
 panum.961.i: "适量的碘会有帮助。"
 panum.962.t: "白喉特效药——抗毒素"
 panum.962.d: ""
 panum.962.f: "一个突破。一个决定性的突破，弥补了所有的牺牲、所有的痛苦，以及[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]必须面对的死亡。这些死亡背后，是那些痛失挚爱的父母和亲人，是泪水中无言的告别，是深渊般的绝望与无助。\n\n一切竟是如此简单，却又如此高效。毒素，必须被削弱。最终，碘溶液成为了关键。马，是完美的试验对象。接下来的过程变得水到渠成。试验动物成功对毒素产生免疫，进而成为血清的供应者。这种血清，正是一种抗毒素，足以对抗白喉。\n\n那一天，当[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]将那支小小的药瓶握在手心时，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]感到了一种深切的满足。最初的测试已经完成，并非所有的孩子都对血清有反应，但结果却比[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]所能梦想的要好得多。现在，这种对抗看不见敌人的武器必须被大规模生产，必须被送往每一个诊所，交到每一位医生的手中。\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]与白喉的战争远未结束。这，仅仅是开端。"
 panum.962.g: "务必尽可能大量订购这种血清！"
 panum.963.t: "光下之影"
 panum.963.d: ""
 panum.963.f: "“白喉必须被根除！它必须消失！”\n\n或许，这是一个近乎疯狂的念头。但正是这个念头支撑着[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生一路走来。对抗白喉的战斗结出了丰硕的果实——无数的生命得以延续，无数本应在剧痛与绝望中离世的孩子，因为[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U]的坚持而获救。\n\n在[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]的信念中，群体的福祉凌驾于个体之上。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]甚至愿意以自己的生命为代价，只为彻底消灭这病魔。但命运对[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]并不仁慈。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]并未出卖自己的灵魂，而是献出了[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]的儿子。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]亲手做出了这个选择，为了“更伟大的事业”。\n\n从那一晚开始，一片无形的阴影笼罩在[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]的心头。这是一种对疾病的刻骨仇恨。然而，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]用理性的思维将愤怒压制，用无尽的工作掩埋了对自己的怨恨。然而，就在几天前，这份仇恨突然消失了。矛盾的是，救下的孩子越多，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]越能看清真相。\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]看清了自己，同时也厌恶自己所看到的一切。\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U]的自负欺骗了[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]以为自己在拯救生命，但[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]擅自决定了一个生命的归宿，仿佛一个冷酷无情的刽子手。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]甚至未曾动用手术刀，甚至未曾拿起一瓶硝酸银。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]将样本和病原体的价值置于病人——一个活生生的人——的生命之上。\n\n而那个病人，是[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U]的骨肉。\n\n从那时起，恶心与悔恨深深植根于[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]的内心。在那间孤独的公寓里，陪伴[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]的，只有墙上的证书、奖章，以及与达官显贵和学界名流的合影。除此之外，只剩下那张冰冷的空床和一个挥之不去的念头。[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U]的头开始隐隐作痛，痛感渐渐加剧，直到令人窒息：“我必须被根除。我必须消失。”\n\n“我的儿子，我亲爱的儿子……”"
 panum.963.g: "医生……[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生！"
 panum.640.t: "《麻疹疫情期间的观察》"
 panum.640.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生已提出[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]关于麻疹治疗的建议，旨在更深入地理解该疾病的病因与传播途径，从而有效减轻并预防未来的爆发。"
 panum.640.f: "“在人口稠密的托尔斯港，传染病迅速蔓延，随即被船只带往其他岛屿。贸易站的往返、教堂和学校的聚集活动，以及围捕鲸鱼的行动，成为了疫情扩散到其他村庄的重要途径。疫情由一位身份已确认的个人从托尔斯港带至苏德勒岛。经过调查，我们几乎能够清晰地追溯到每个村庄感染的传播路径，以及具体的传播者。至于感染是否会通过衣物、洗涤物或信件等媒介传播，这一点似乎颇为可疑。在整个疫情期间，我既未见到，也未听闻任何此类传播的实例。”\n——彼得·潘努，《1846年法罗群岛麻疹疫情观察》"
 panum.640.g: "“彼得·潘努二世”！"
 panum.52.m: "[SCOPE.sCountry('panum_scarlet_country_scope').GetName]的猩红热疫情。"
 panum.52.q: "糟糕的计划……"
 panum_no_expedition_effect_tt: "你的[concept_panum_physician]现已可以开展其他活动。"
 panum.51.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]，[GetPlayer.GetName]医学界的翘楚之一，已同意前往疫情肆虐的地区，深入研究这种疾病。这位医生希望此举能为该疾病提供一份完整的描述。"
 panum.53.d: "疫情的肆虐促使[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]对其进行更深入的研究，以查明病因并开发治疗这一可怕疾病的新方法。"
