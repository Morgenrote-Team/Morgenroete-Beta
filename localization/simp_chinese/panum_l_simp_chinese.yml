 je_panum_medical_system_project: "扩建医疗系统"
 je_panum_medical_system_project_reason: "一位致力于扩展医疗系统的医生，主要在当地努力改善医疗服务。然而，这一过程同样需要强有力的行政基础设施。在此，具有卓越才能、能够在官僚体制中留下深刻印象的医生显得尤为重要。他的专业技能和经验推动了每月新建医院和诊所的顺利进展。\n\n医生们将首先在发达地区设立诊所，随后再转向较为滞后的区域。通常，他们会优先选择政府行政机构级数更高的地区。\n\n每当进度条完成时，一个新的诊所或医院将投入运营，随后工作将在下一个适合的州继续。医生们会尽力激活更多诊所和医院，作为生产手段，直到没有更多符合条件的地区，或工作被手动暂停为止。"
 panum.2101.t: "医疗系统已扩建"
 panum.2101.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生已圆满完成工作，不仅扩建了当地医疗设施，还对其进行了全面升级。如今，这位医生可以再次投身于其他事务了。"
 panum.2101.f: "“医学乃社会科学，而政治无非是医学在宏观层面的延伸。”\n——鲁道夫·菲尔绍"
 panum.2101.g: "回去工作。"
 panum.2102.t: "[SCOPE.sState('panum_clinic_state').GetName]的专科诊所"
 panum.2102.d: "在[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的鼎力支持下，我国首座专科诊所于[SCOPE.sState('panum_clinic_state').GetCityHubName]落成。[ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself]表示将亲自执掌诊所，并致力于某一专业领域的研究——尽管目前专家们应聚焦的具体方向仍待明确。"
 panum.2102.f: "“医学教育之意义，不在于为学生谋生计，而在于为社区守安康。”\n——鲁道夫·菲尔绍"
 panum.2102.g: "外科手术。"
 panum.2102.h: "精神病学。"
 panum.2102.i: "流行病学。"
 panum.2102.j: "军事医学。"
 panum.2102.k: "普通医学。"
 panum.2103.t: "[SCOPE.sState('panum_clinic_state').GetName]的医院"
 panum.2103.d: "今日，在公众的热切瞩目与媒体的共同见证下，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生于[SCOPE.sState('panum_clinic_state').GetCityHubName]正式启用了该国首座现代化医院。这座医院以其完备的手术室和先进的医疗设备，标志着医疗事业迈入了一个崭新的里程碑。"
 panum.2103.f: "“人类之不幸，在于因习以为常而容忍了最可怖的处境。”\n——鲁道夫·菲尔绍"
 panum.2103.g: "好啊！"
