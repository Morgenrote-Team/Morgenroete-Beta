 panum.1007.t: "脊髓灰质炎诊所"
 panum.1007.d: "修女[SCOPE.sCharacter('panum_polio_nurse').GetFirstName]在[SCOPE.sState('panum_disease_state').GetName]创立了一家脊髓灰质炎诊所，旨在为那里的众多患者提供悉心照料。"
 panum.1007.f: "“她是一位身材高挑、气质优雅的女性，仅凭她的举止和仪态便能让人心生信任。她带着一种迷人的口音，令人不禁想要倾听她的每一句话。如今，当我闭上双眼，我仍能清晰地看见她站在我的床边，身着一袭长长的黑色连衣裙，头戴一顶装饰着美丽鸵鸟羽毛的大帽子……她不佩戴任何珠宝，也不施粉黛。她的脸庞棱角分明，眼神锐利而深邃。当她直视你的双眼时，那种专注力仿佛能穿透你的灵魂，而当她开口时，所有人都会凝神倾听……每个人都清楚谁是这里的主宰，我们都会毫不犹豫地接受她推荐的任何治疗。我从未见过像她那般果决的人。”\n\n——雷·G，脊髓灰质炎幸存者"
 panum.1007.g: "谢谢你，修女[SCOPE.sCharacter('panum_polio_nurse').GetFirstName]。"
 panum.1008.t: "脊髓灰质炎引发的抑郁"
 panum.1008.d: "许多终身残疾的儿童不仅对下一代的身体健康造成了深远影响，也让他们的父母对政府提出了强烈指责，认为政府行动不力。"
 panum.1008.f: "“我至今仍清晰地记得我第一次戴着支架去上学的那一天。那是学校的一天中午。显然，那天早上我去医生那里安装了支架。妈妈把我送到门口，当我转身离开时，我看到了她眼中闪烁的泪光。”\n\n——埃德蒙·萨斯，脊髓灰质炎幸存者"
 panum.1008.g: "虽显荒谬，却并非难以理解。"
