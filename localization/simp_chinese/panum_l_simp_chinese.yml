 je_panum_cholera_description_reason: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生正在检查几名病人，确定是#YELLOW 霍乱#!的症状，工作结束后，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]将疾病的描述公之于众，以便后人有更好的方式认识区分疾病并找到治疗方法。"
