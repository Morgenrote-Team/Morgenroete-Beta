 panum.165.t: "疫病之源"
 panum_physician_health_bonus_modifier: "宁可稳妥，勿留遗憾"
 panum.168.f: "“等等！这么晚了，谁还在外面晃悠——[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生？大半夜的，您在这儿干嘛呢？”\n\n“我有巡查的任务，哪能等到天亮？每一分每一秒都很宝贵，就算是半夜也不能闲着。”\n\n“天啊！这条街晚上可不安全！”\n\n“白天也不见得安全，除非霍乱彻底结束。警官，要是您不介意，我还有一堆事要忙呢。灯油烧完之前，我得从运河和水泵那儿打水，装满十几个小瓶子，还得去居民家里看看，检查下水道。”\n\n“好吧，既然这样，我陪您走一趟，免得出什么意外。”"
 panum.3033.d: "绝大多数红十字会成员已批准《关于使用化学武器的第三次国际公约》。该公约现对所有成员具有法律约束力。"
 notification_panum_technology_boost_from_physician_notification_name: "[GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]研究加成"
 notification_panum_technology_boost_from_physician_notification_desc: "多亏了[GetPlayer.MakeScope.GetVariable('panum_physician_var').GetCharacter.GetLastName]博士，[GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]得到了研究加成。"
 je_panum_medical_research_project_reason: "[ROOT.GetCountry.GetCustom('panum_medical_research_project_active_type')]除了医学发展之外，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]还可以找到不属于十大经典流行病的治疗方法。\n\n这是[concept_panum_physician]的默认项目，当医生不开展其他项目时激活。\n每当进度达到[JournalEntry.GetTotalGoalValue|V0]时，我们都会获得小幅科技提升。\n正在增加研究进度的科技：[GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]"
 panum.2611.t: "制度化"
 panum.2611.d: "鉴于一些精神病院的环境令人难以忍受，医生与政治家们正竭力推动一场深刻的改革。他们主张在远离喧嚣尘世的地方，建立僻静的疗愈场所，让精神病学家能够与患者共同生活，沉浸在宁静与孤独之中。"
 panum.2611.f: "精神病患者制度化护理的现代时代始于19世纪初，当时国家主导了一场规模空前的改革运动。1808年，英国通过了《郡精神病院法案》，标志着公共精神病院的建立。该法案授权地方法官在每个郡设立由税收支持的精神病院，专门收容那些“贫民精神病患者”。\n1845年的《精神错乱法案》则是精神病患者治疗史上的一个重要里程碑。该法案明确将精神病患者的身份从“社会边缘人”转变为“需要治疗的病人”，并成立了由沙夫茨伯里勋爵领导的“精神错乱委员会”，专注于推动精神错乱立法的改革。\n与此同时，在德国，制度化精神病学的进程也在稳步推进。1830年至1860年间，海因里希·达默罗与卡尔·弗里德里希·弗莱明、克里斯蒂安·弗里德里希·威廉·罗勒于1844年共同创办了《精神病学总刊》。"
 panum.2611.g: "精神病学和心理学研究正在取得进展。"
 panum.2612.t: "脑部疾病"
 panum.2612.d: "在精神病学的领域中，进化论的引入掀起了一场深刻的变革。新一代的精神病学家开始以全新的视角审视精神疾病，将其视为大脑的疾病，而非单纯的心理或道德问题。这一科学导向的思潮逐渐取代了此前盛行的人文主义观点，为精神病学注入了更多的实证研究与生物学基础。"
 panum.2612.f: "威廉·格里辛格堪称精神病学科学转型的领军人物。他与实验生理学之父、现代生理学教科书鼻祖弗朗索瓦·马让迪的结识，为其研究方法注入了深远的影响。1839年，他迁居至康斯坦茨湖畔的腓特烈港，悬壶济世。次年，即1840年，他受聘为温南塔尔精神病院的助理医师。在此后的两年间，他潜心实践，积累了丰富的临床经验，这些宝贵的经历为他1845年出版的划时代巨著《精神疾病的病理学和治疗学》奠定了坚实的基础。这部著作开创了精神病学的新纪元。书中，他力图将精神病学根植于医学生理学和病理学的沃土之中。翻开扉页，格里辛格的著名论断赫然在目：欲解疾病之症候，必先定位其现象，且当视一切精神疾患为大脑之疾。"
 panum.2613.t: "精神障碍的分类"
 panum.2613.d: "精神病学家与心理学家们开始借鉴医学其他领域沿用的分类方案，为精神疾病绘制新的图谱。昔日，他们仅识得“低能”与“精神错乱”这两片模糊的疆域；而今，他们已能辨识出七大类别：躁狂症、忧郁症、偏执狂、麻痹性痴呆、痴呆、酗酒症与癫痫。"
 panum.2613.f: "德国精神病学传统的三元系统，乃是一种以病因为经纬编织的精神疾病分类体系。其雏形可追溯至埃米尔·克雷佩林的笔下；而克雷佩林本人，则是在卡尔·路德维希·卡尔鲍姆的奠基之上，构筑起这座分类学的殿堂。克雷佩林宣称，他开辟了一条审视精神疾病的新径，将传统视角冠以“症状学”之名，而将自己的洞见称为“临床学”。这一创见，成为他对19世纪数百种精神障碍进行范式设定的综合之钥——他依据综合征（即随时间推移而显现的常见症状模式）将疾病归类，而非如先贤般仅凭主要症状的相似性进行简单划分。"
 panum.2614.t: "话疗"
 panum.2614.d: "尽管质疑之声不绝于耳，心理学方法却在精神病学家中渐成风尚。一位年轻女性，经过漫长的讨论，竟似痊愈，这一案例被奉为精神病治疗新纪元的模板。"
 panum.2614.f: "约瑟夫·布洛伊尔在1880至1881年间治疗贝尔塔·帕彭海姆（化名安娜·O）的经历，犹如一颗种子，深深埋入了精神医学的沃土。至1895年，这颗种子与西格蒙德·弗洛伊德的思想交融，共同孕育出关于癔症研究的丰硕成果。弗洛伊德视这部作品及其背后的病例史为精神分析的源头与起点，它们如同涓涓细流，最终汇成了精神分析的浩瀚江河。随着弗洛伊德的开创性工作，精神分析理论的思潮开始在精神病学领域激荡回响。这一理论之所以在精神病学家中风靡一时，正因它让患者得以在私人诊所的温馨环境中接受治疗，而非被禁锢于精神病院的冰冷围墙之内，为精神疾病的治疗开辟了一条更为人性化的新径。"
 panum.2615.t: "心理学与哲学"
 panum.2615.d: "除了心理学派对精神病学的影响外，人们对哲学影响的认识也在日益加深。自然科学的支配地位似乎正在瓦解。"
 panum.2615.f: "卡尔·雅斯贝尔斯，作为20世纪率先审视并反思其学科哲学根基的精神病学家之一，其著作《普通精神病理学》（1913年）犹如一盏明灯，照亮了系统性反思精神病理学研究的新征程。他与威廉·格里辛格（将精神疾病定义为脑部疾病）和埃米尔·克雷佩林（首次在精神病学中引入实用分类参考系统）并驾齐驱，共同构筑了精神病理学的理论大厦。雅斯贝尔斯汲取了胡塞尔早期关于描述性心理学的精髓，以及威廉·狄尔泰广受瞩目的“解释”与“理解”之辨，进而从方法论的角度丰富了精神病理学的内涵，为这一领域注入了新的活力与深度"
 panum.2131.t: "盘中餐，分胜负"
 panum.2131.d: "随着佝偻病与贫困之间隐秘联系的揭示，工会成员们毅然肩负起了为免费学校餐与牛奶而战的重任！"
 panum.2131.f: "起初，这一切如同涓涓细流，缓缓前行——一辆辆马车停驻在学校门外，为孩子们分发着牛奶、热汤与几片面包。然而，如今这涓流已汇成澎湃江河：遍布全国的工会、社会主义者与劳工活动家们，不仅为无产阶级的权益而战，更将战旗插向了他们孩子们的福祉。街道上，印有孩子们手持空碗、眼神恳切的海报如雨后春笋般涌现，政府未能为其最年轻、最脆弱的公民提供保障，成为谴责政府及其制度的锋利匕首。\n\n免费学校餐与牛奶的构想，犹如野火燎原，迅速蔓延，甚至点燃了运动中最激进派别的热情——若政府不能被委以重任，为国家的未来——孩子们提供保障，那么它究竟为谁而存在？"
 panum.2131.g: "我们必将迎来我们的免费牛奶法案，是的，我们必将，我们必将！"
 panum.2131.h: "没有免费牛奶这回事。"
