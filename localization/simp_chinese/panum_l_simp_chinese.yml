 panum.3031.t: "第一公约已具约束力"
 panum.3031.d: "绝大多数红十字会成员已批准《关于照顾战争伤员的第一次国际公约》。该公约现对所有成员具有法律约束力。"
 panum.3031.f: "国际公约通常是非约束性的意向声明。然而，若足够多的红十字会成员签署，随着时间的推移，它将演变为具有效力的国际法，所有签署国均需遵守——其他成员也将随之签署。当65%的成员及大多数列强同意该公约时，所有其他成员将被迫遵守。此时，该公约将无法如往常般被废除。若要避免约束性公约，必须彻底退出红十字会——并承担一切后果。"
 panum.3031.g: "一项具有全球效力的国际法正式诞生。"
 panum.3032.t: "第二公约已具约束力"
 panum.3032.d: "绝大多数红十字会成员已批准《关于裁军和海战的第二次国际公约》。该公约现对所有成员具有法律约束力。"
 panum.3033.t: "第三公约已具约束力"
 panum.3034.t: "国际公约具有法律约束力"
 panum.3034.d: "绝大多数红十字会成员已批准一项公约。该公约现对所有成员具有法律约束力。"
 panum.3034.g: "我们将评估这是否符合我们的利益。"
