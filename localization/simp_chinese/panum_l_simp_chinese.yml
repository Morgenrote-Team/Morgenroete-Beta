 je_panum_functionalism: "功能主义学派"
 je_panum_functionalism_reason: "功能心理学，或称功能主义，是一种深深植根于达尔文思想的心理学流派，致力于探究在漫长人类历史演变中行为的效用与目的。这一学派摒弃了内省原则，不再执着于人类思维的内在机制，而是转向理解人类意识的生物过程。爱德华·L·桑代克以其开创性的试错学习实验，成为这一松散定义运动的领军人物，为功能主义的发展奠定了坚实的基础。\n\n每个国家仅能建立#R 一个#!心理学派。"
 je_panum_psychoanalysis: "精神分析学派"
 je_panum_psychoanalysis_reason: "精神分析，这一由维也纳医生西格蒙德·弗洛伊德于1890年左右创立的心理学理论、文化理论、心理治疗形式以及自我意识的方法，如同一把钥匙，开启了人类心灵深处的隐秘之门。‘精神分析’这一术语不仅指代基于弗洛伊德无意识心理动力学理论的描述与解释模型，还涵盖了分析性心理治疗及精神分析方法论，后者亦涉及文化现象的探究。时至今日，临床医生与研究人员仍在不断发展与革新精神分析在这三个方面的应用，使其在现代心理学与文化研究中焕发出新的生机与活力。\n\n每个国家仅能建立#R 一个#!心理学派。"
 je_panum_analytical_psychology: "分析心理学学派"
 je_panum_analytical_psychology_reason: "分析心理学，这一由瑞士精神病学家卡尔·古斯塔夫·荣格于1913年创立的心理学流派，深深植根于精神分析的沃土之中。与精神分析相似，它深入探讨人类心理的无意识层面，认为无意识的影响力远超有意识的感知，如同冰山之下潜藏的庞大力量。荣格及其追随者尤为重视无意识的象征性表达，将其视为通往心灵深处的桥梁，并致力于将这些象征应用于心理治疗中，帮助人们解开内心的谜团，找到自我与世界的和谐。\n\n每个国家仅能建立#R 一个#!心理学派。"
 je_panum_behaviorism: "行为主义学派"
 je_panum_behaviorism_reason: "行为主义，这一科学理论概念，旨在运用严谨的科学方法（即不依赖内省或共情）来研究和解释人类与动物的行为，如同一位冷静的观察者，透过实验与数据的棱镜，揭示行为的规律与本质。行为主义由约翰·B·华生于20世纪初创立，此前爱德华·李·桑代克已为其奠定了重要基础，而伊万·彼得罗维奇·巴甫洛夫则通过其关于行为经典条件反射的实验，为行为主义的发展做出了开创性贡献。在美国，行为主义的支持者数十年来一直是大学中最具影响力的行为研究者，他们不仅是科学方法的坚定拥护者，也是同期兴起的心理分析学派的坚定反对者，致力于将心理学推向更为客观与实证的领域。\n\n每个国家仅能建立#R 一个#!心理学派。"
