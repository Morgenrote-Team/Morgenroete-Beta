 notification_panum_foreign_treatment_possible_notification_desc: "你可以派遣[concept_panum_physician]进行医学研究，描述一种疾病。"
 panum.131.t: "已停止疾病研究"
 panum.131.d: "由于[GetPlayer.GetName]的最后一批流行病病人已经康复，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生暂时结束了[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]的研究，此前已经收集到一些重要信息，可以简化未来对该疾病的科学描述，但[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]尚未取得突破性进展。"
 panum.131.f: "“如果能找到足以引起如此巨大骚乱的原因，那么关于其起源和原因的所有猜测，我留给其他作家，无论是外行还是专业人士；至于我自己，我将简单地描述它的性质，并解释如果再次爆发，学生可能通过哪些症状来识别它。我更能做到这一点，因为我自己也得过这种病，并在其他人的病例中观察过它的作用。”——修昔底德"
 panum.131.g: "又迈出了新的一步。"
 panum.133.t: "停止医学观察"
 panum.133.d: "疫情已经结束，医学观察队的工作暂时告一段落。[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生未能完成科学描述，但 [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]的研究对未来应该很有价值。"
 panum.134.d: "这场席卷我们国家的可怕流行病终于过去。然而，这也意味着[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生不得不暂时中止[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]的研究，因为[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]无法继续开展实验以寻找治疗该疾病的方法。尽管如此，医生已积累了宝贵的经验，这些经验定将在未来发挥重要作用。"
 panum.134.f: "“传染病从一件事传到另一件事，最初是由不可察觉的粒子感染引起的。”——吉罗拉莫·弗拉卡斯托罗"
 panum.134.g: "找到治疗方法只是时间问题。"
 panum.136.d: "医学研究暂时告一段落，没有任何收获。由于疫情已消失，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生没有验证[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]的理论，只能临时将结果提供给 [ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]和后人，以便最终找到治疗方法。"
