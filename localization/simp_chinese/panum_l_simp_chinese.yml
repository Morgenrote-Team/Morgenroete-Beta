 panum.440.t: "斑疹伤寒——社会问题"
 panum.440.d: "在论文[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生特别指出，斑疹伤寒是一种可预防的疾病，但前提是政治和社会力量能够协同合作。"
 panum.440.f: "“环境拥挤，虱满衣衫，破旧公寓或兵营之室，皆令吾印象深刻。斑疹伤寒，彼处无处不在。于人们同处拥挤然卫生良好之医院病房，未见传播。医学不应视为对个人之照料，而应视为公共卫生之一部，亦意味着解决社会问题。毋庸置疑，如吾等近日所见，斑疹伤寒之流行传播，仅见于贫困与缺乏教育等生活条件下。消除此等情状，吾信吾等于对抗此疾上将见显著改善。”\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生于致政府之备忘录中写道"
 panum.440.g: "斑疹伤寒之恐怖，渐失其势。"
 panum.441.t: "尸检"
 panum.441.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在[SCOPE.sState('panum_disease_state').GetCityHubName]对斑疹伤寒死亡病例进行了多次尸检，并得出了重要结论。"
 panum.441.f: "“人们早就知道伤寒和斑疹伤寒是两种不同的疾病。但仍有少数研究人员认为，营养不良、肠道感染或营养缺乏可能与斑疹伤寒的爆发有关。饮食原因仍被认为是许多疾病原因。但在我检查期间，我没有发现任何表明消化系统疾病的迹象，因此斑疹伤寒与饮食或消化无关。”\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]医生写于[SCOPE.sState('panum_disease_state').GetCityHubName]的尸检报告，[TimeKeeper.GetCurrentDate.Format('y')]年"
 panum.441.g: "那会是什么呢？"
 panum.442.t: "头未洗，发蓬乱"
 panum.442.d: "在[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]探寻斑疹伤寒疫情根源的过程中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生意识到，必须对以往的发现提出质疑。"
 panum.442.f: "“在我的职业生涯中，我屡次听闻，不良的卫生习惯为瘴气或细菌——无论人们信奉何种理论——提供了滋生的温床，进而导致疾病。这一观点在细节上或许值得推敲，但其核心思想却无可辩驳。士兵、囚犯、穷人、罪犯与妓女，皆是斑疹伤寒的典型受害者。然而，穷人究竟是因不愿洗澡而肮脏，还是因贫穷而无力保持清洁？我无法认同肺结核是艺术家的专利，正如我无法相信斑疹伤寒只会侵袭道德败坏的罪犯。在此次疫情中，许多富有的罪犯安然无恙；而在贫民窟中，那些无私的牧师为他人奉献，自己却不幸染病。那么，在这些受害者之间，究竟隐藏着怎样更为深刻的联系呢？”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]医生的日记，[TimeKeeper.GetCurrentDate.Format('y')]于[SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.442.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]难道是想说，斑疹伤寒也会波及正直的人吗？"
 panum.443.t: "暖与冷"
 panum.443.d: "在多次走访斑疹伤寒患者家庭后，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生得出结论，斑疹伤寒并不像人们常说的那样是一种季节性疾病。"
 panum.443.f: "“某些疾病具有季节性，斑疹伤寒似乎也不例外。先前的报告显示，在寒冷的季节，包括潮湿的春秋两季，病例数量有所上升。我认为，寒冷与炎热对疾病的影响已得到证实。然而，是否与季节直接相关，则值得进一步探讨。在拥挤且供暖的房间里，温度同样可能升高。这种疾病并非在一年中的同一时间在所有地方爆发。若果真如此，不仅城市的某些区域，整个城市都会受到同等程度的影响。然而，它总是出现在人群密集的地方。这一点，我在多次家访中得以确认。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]医生的日记，[TimeKeeper.GetCurrentDate.Format('y')]于[SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.443.g: "这与之前的研究相矛盾。"
 panum.444.t: "汗水和呼吸"
 panum.444.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生完全相信斑疹伤寒一定是一种传染病，尽管还没有弄清楚情况。"
 panum.444.f: "“在我调查的开始，我坚信斑疹伤寒不是一种传染病。然而随着我的家人中患斑疹伤寒的人越来越多，我逐渐相信这种疾病具有传染性，并且是汗液导致。我看到一位护士在给一个垂死的病人刮胡子时，吸入了病人周围的空气就病倒了。同样，一位助手在照顾另一位不久后死去的病人时，他感觉到病人刺鼻的汗水流到他的皮肤上，助手立即出现了斑疹伤寒的症状。很明显，接近斑疹伤寒患者会使人面临感染这种疾病的风险。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]医生的日记，[TimeKeeper.GetCurrentDate.Format('y')]于[SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.444.g: "这可能会有所帮助，但它真的会在人与人之间传播吗？"
 panum.445.t: "饥饿？"
 panum.445.d: "在[SCOPE.sState('panum_disease_state').GetCityHubName]与同事的激烈争论中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生驳斥了对方的理论。"
 panum.445.f: "“这是一种特殊的斑疹伤寒，饥饿性斑疹伤寒吗？” \n\n“饥饿性斑疹伤寒？”\n\n“可以观察到，凡是发生斑疹伤寒的地方，营养不良现象就很普遍。因此饥饿是斑疹伤寒的诱因。血液的变化可能也与此有关。”\n\n“1726、1727和1728年是饥荒之年，但没有斑疹伤寒。1829年是繁荣之年，但却有斑疹伤寒。体质虚弱的人更容易生病，这是可以理解的——但原因是什么呢？”"
 panum.445.g: "因此“饥饿热”这一术语是不正确的。"
 panum.446.t: "不是位置，而是环境。"
 panum.446.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生认为[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]发现，重要的不是斑疹伤寒患者如何生活，而是他们生活在哪里。"
 panum.446.f: "“在我访问[SCOPE.sState('panum_disease_state').GetCityHubName]期间，我发现整个疾病只影响了城市的一个部分。该地区以贫穷和道德败坏而闻名，因此一些理论认为斑疹伤寒是一种道德低下的人所患的疾病。但据我所知，这是因为人口稠密的社区和受影响者的经济状况。在我看来，疾病的传播不是因为道德堕落，而是因为生活环境接近。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]医生的日记，[TimeKeeper.GetCurrentDate.Format('y')]于[SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.446.g: "这至少意味着这种疾病是可以治疗的……"
 panum.447.t: "虱"
 panum.447.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生提出了一个极具争议性的理论，虽然[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]无法证明它，但它可能会在未来改变人们对斑疹伤寒病的认识。"
 panum.447.f: "“我在多次观察中注意到了一件事，那就是几乎所有的病人都处于虱子泛滥的地方。从拥挤营房里的士兵、无数孩子的家庭，再到破旧牢房里的罪犯。我不再相信这是巧合。当然，我缺乏证据。近年来，几位科学家已经一次又一次地证明疾病可以在动物和人之间传播。如果在这种情况下情况有所不同，我很高兴有人证明情况并非如此。就目前而言，我相信，如果不仔细研究虱子的作用，就无法解开斑疹伤寒之谜。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]医生的日记，[TimeKeeper.GetCurrentDate.Format('y')]于[SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.447.g: "如此微小的东西怎么会造成如此巨大的破坏？"
 panum.447.h: "如此这种小东西肯定会造成巨大的破坏。"
 panum.448.t: "一家卫生条件良好的医院"
 panum.448.d: "在参观一家模范医院时，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生确信，在良好的卫生条件下，疾病的传播几乎可以忽略不计。"
 panum.448.f: "“当病人开始被送往各地的医院时，人们忧心忡忡，担心可能的感染会使局势雪上加霜。人们推测，新的感染源可能会形成，从而让疫情以更加猛烈的势头卷土重来。然而，这一切并未发生，尽管在许多发热病房中曾出现过类似的现象。正如我在其他案例中所观察到的，更优越的卫生条件，正是扭转局面的关键所在。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]医生的日记，[TimeKeeper.GetCurrentDate.Format('y')]年于[SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.448.g: "所以问题的关键并非空间狭窄，而是卫生条件。"
 panum.449.t: "疫情援助"
 panum.449.d: "通过向[SCOPE.sState('panum_disease_state').GetCityHubName]运送食物、毯子和药品，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生成功使疫情带来的焦灼得到一定程度的缓解。"
 panum.449.f: "”这听起来或许平淡无奇，但通过运送旨在缓解居民痛苦的物资，上周的疫情爆发有所减少。类似的情况在过去斑疹伤寒肆虐的其他地区也曾被观察到。救援人员分发了大米和豌豆，搭建了临时帐篷医院，还带来了药品和新衣服。这一案例尤其证明：斑疹伤寒并非遗传性疾病。它绝对与环境因素有关。“\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]医生致德门蒂夫医生的信"
 panum.449.g: "有时，唯一能接近解决方案的方法，就是运用排除标准。"
 panum.450.t: "衣物被污染了？"
 panum.450.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在一个发热棚里发现了一个奇怪的病例，与类似的经历相符。"
 panum.450.f: "“这是所谓传染病的证据吗？毫无疑问，这种情况与我在其他地方遇到的非常相似。有时是大衣，有时是夹克或衬衫，一位斑疹伤寒患者的兄弟拿走了他的大衣，几天后，他也病倒了。据说，玩过这件大衣的孩子也以类似的方式被感染，在贫困阶层，从亲戚那里传衣服是很常见的事，尤其是在寒冷的季节。无论衣服是否被污染，更换衣服似乎都是避免斑疹伤寒的明智措施之一。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]医生的日记，[TimeKeeper.GetCurrentDate.Format('y')]于[SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.450.g: "男人应该换袜子和内裤？不可能！"
 panum.451.t: "斑疹伤寒天气"
 panum.451.d: "在一位外国医生对斑疹伤寒的起源提出新的假设后，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生怀疑[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]自己的研究。"
 panum.451.f: "“两天前，一位同事把他那本关于斑疹伤寒病因的书寄给了我。我非常惊讶，而且感到沮丧了。他非常准确、严谨地阐述了天气和气候条件与疾病发生的关系。据此，瘴气在土壤中有湿气时形成，然后上升到空气中。这就解释了为什么伤寒会在寒冷潮湿的月份频繁发生。那么，这到底是不是瘴气所为呢？”\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]医生日志写道"
 panum.451.g: "但这真的是正确的解决方案吗？"
 panum.452.t: "腐败"
 panum.452.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士最近总结的一些发现根本不符合[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]以前的理论。"
 panum.452.f: "“到目前为止，我还没有认真考虑过腐烂过程在疾病传播中起关键作用。但无论我走到哪里，无论斑疹伤寒在哪里肆虐，我都会发现动物，发现呼出的气体，发现人类、动物和植物的物质。它真的会溶解并留下瘴气吗？”\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生，写于[SCOPE.sState('panum_disease_state').GetCityHubName]，[TimeKeeper.GetCurrentDate.Format('y')]年"
 panum.452.g: "一次不快的挫折。"
 panum.453.t: "负压气流"
 panum.453.d: "一位知名德国医生的文章动摇了[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生迄今为止的进展。因此，已经证明空气流动是斑疹伤寒发生的原因。"
 panum.453.f: "“这种温暖潮湿的空气可以通过赤道气流带到北纬地区，随后我们会在相对温暖的季节中，在西南风的主导下看到斑疹伤寒的爆发。这种关系在夏季最为显著，当太阳位于北半球时，地中海沿岸被纳入信风的扩展范围，而在我国，与北风的斗争发生在多变的雨季。这就是夏季和初秋斑疹伤寒疫情的解释。”\n——安吉莉卡·哈森拜因医生，《气流如何引发斑疹伤寒及秋雨如何引发流感》"
 panum.453.g: "这确实令人信服。"
 panum.454.t: "生病"
 panum.454.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生这几天感觉更糟了。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]是否也被感染了？"
 panum.454.f: "“[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生去哪儿了？[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]今天不是要去看五号病房的斑疹伤寒患者吗？”\n\n“看来医生[ROOT.Var('panum_physician_var').GetCharacter.GetHerselfHimself]也病倒了。”"
 panum.454.g: "医生该休息了。"
 panum.454.h: "医生得继续干啊！"
 panum.455.t: "文档丢失"
 panum.455.d: "这位医生不慎遗失了一些本可能对开发斑疹伤寒治疗方法大有裨益的笔记。"
 panum.455.f: "\n\n\n\n并非摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记"
 panum.455.g: "真尴尬！"
 panum.461.t: "阶级与门第"
 panum.461.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生制作了一张表格，详细记录了居住在[SCOPE.sState('panum_disease_state').GetCityHubName]的各类斑疹伤寒患者的居住地和生活水平。由此可见，斑疹伤寒是一种“社会性”疾病。"
 panum.461.f: "“统计表清晰地展示了公寓对居民健康的深远影响。例如，在对城市郊区的一项研究中，我发现二类街道的死亡率比一类街道高出18%，而三类街道的死亡率更是比一类街道高出68%；二类房屋的死亡率比一类房屋高出31%，三类房屋的死亡率则比一类房屋高出78%。然而，那些经过改善的贫困街道，死亡率下降了25%。”\n——[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生，《[SCOPE.sState('panum_disease_state').GetCityHubName]斑疹伤寒疫情统计表与数据》"
 panum.461.g: "这么说，这位医生还是一位社会批评家？"
 panum_typhus: "斑疹伤寒"
 panum_typhus_desc: "这个人正遭受斑疹伤寒的折磨，这是一种危险的疾病。"
 panum.12.t: "第一支疫苗"
 panum.12.d: "[SCOPE.sCharacter('panum_physician_scope').GetFullName]完成了一项划时代的发明。通过一种全新的方法——疫苗接种——一种有效预防可怕天花的手段。"
 panum.12.f: "根据爱德华·詹纳的传记作者约翰·巴伦的说法，詹纳巧妙地利用了当时流行的观点，即感染牛痘的挤奶女工通常不会得天花（“挤奶女工神话”）。约翰·菲斯特曾观察到，曾经感染过（无害的）牛痘的患者无法通过接种天花病毒获得免疫。因此，詹纳提出假设，认为接种牛痘将提供与牛痘相同的免疫力，从而预防天花。詹纳首先收集了之前感染过牛痘或马痘的人的病例和观察研究，这些人后来在天花接种或实际天花爆发时被证明具有免疫力。1796年5月14日，詹纳用从挤奶女工莎拉·内尔姆斯手上的牛痘脓包中提取的牛痘或疫苗病毒，为8岁的詹姆斯·菲普斯接种。大约六周后，即1796年7月1日，詹纳用天花脓液为这个男孩接种；他被证明具有免疫力。"
 panum.12.g: "医学界的英雄！"
 je_panum_vaccine: "疫苗"
 je_panum_vaccine_reason: "我们国家正在引入一种已知疫苗，并在全国范围内推广分发，这实属首次。"
 je_panum_vaccine_success: "[GetPlayer.GetName]已收集#ORANGE 至少4条疫苗线索#!"
 je_panum_smallpox_treatment_success: "[GetPlayer.GetName]已收集#ORANGE 至少3条治疗线索#!"
 panum.351.t: "旧日之敌"
 panum.351.d: "天花，或许是人类历史上最为致命的瘟神，如今竟在我们的土地上死灰复燃，卷土重来。"
 panum.351.f: "天花，这个我们既熟悉又危险的宿敌，如今在[GetPlayer.GetName]的疆域内肆虐横行。它如同一位冷酷无情的刽子手，每三个感染者中便有一人难逃其魔掌，而幸存者亦难逃终生失明的厄运。几乎每一位感染者身上都会永远烙下这位杀手的印记——那些遍布面庞与躯干的标志性疤痕，宛如文明长河中亘古不变的警示符号。从古老的中东到新发现的大陆，这支无声的军队所向披靡，摧毁了无数帝国，夺走了数百万生灵，就连历史上最伟大的领袖们也不得不向其低头。人类迁徙的脚步所至之处，天花如影随形，犹如一位永不停歇的猎手。\n\n而今，在我们的土地上，它又寻得了新的猎物，足以从一隅之地的蛰伏中骤然爆发，再度化身为肆虐人间的瘟疫。"
 panum.351.g: "因此，我们再度与天花展开殊死搏斗……"
 panum.352.t: "天花疗法的传言"
 panum.352.d: "随着天花疗法的谣言传播，我们的人民开始尝试与脓疱本身有关的奇特做法！"
 panum.352.f: "目睹一位博学的绅士吞食天花患者的痂疮，这景象或许令人作呕且毛骨悚然，但这不过是一个绝望之人抓住的最后一根救命稻草。坊间传闻，在世界某个遥远的角落，存在着一种能够治愈这种可怕疾病的方法，据说其原理与此相似……但究竟是什么呢？是何种巫术或科学，竟能让他们摆脱这场可怕的瘟疫？从遥远的欧洲传来捷报，天花的魔爪已被击退，整座城市竟无一人染病。\n\n对一些人而言，这无疑是希望的曙光。若它能在彼处被击败，那么我们或许也能在此地战胜它。\n\n而对另一些人来说，这不过是一个谎言。我们最伟大的智者尚未寻得良方，但也许，也许……希望仍在。"
 panum.352.g: "……他们是否在我们失败的地方取得了成功？"
 panum.353.t: "天花的祸害"
 panum.353.d: "未经治疗且无法治愈的天花正在摧毁我们的社会……尤其是我们的年轻一代。"
 panum.353.f: "恸哭之声，哀嚎之音，绝望者濒死前的凄厉尖叫，交织成一曲令人心碎的悲歌。父亲们以拳击墙，直至掌心染血，指骨断裂，仍难解心头之痛。母亲们爆发出惊人的力量，推开医护人员，只为最后一次触摸，最后一次轻抚那已然冰冷苍白的小脸。这些惨状在[GetPlayer.GetName]的土地上司空见惯，因为天花对我们最脆弱的群体——无论是已降临人世还是尚在母腹中的婴孩——有着无尽的贪婪。超过八成的染病婴儿难逃死劫，这场瘟疫正在无情地吞噬我们土地的未来。\n\n然而，在缺乏有效治疗手段的情况下，我们除了为那些本应绽放的生命垂泪哀悼，竟别无他法。"
 panum.353.g: "这场噩梦必须终结……"
 panum.354.t: "天花疫苗"
 panum.354.d: "我们的外交官带回的不仅仅是新闻，还带来了天花“疫苗”样本！"
 panum.354.f_generic: "在一次对欧洲访问中，我们的外交官发现了一件令人着迷的事情——他们似乎有一种“有效”的天花治疗方法，而且他们了解了这种疾病的历史！显然，在奥斯曼帝国曾观察到接种人痘的做法，是用康复病人身上的干燥天花痂样本给孩子接种这种“较弱”形式的疾病……但这是一种有缺陷的解决方案，很危险，因为它是与魔鬼共舞——天花会轻易地把你夺走，就像你可以战胜它一样。\n\n然而，今天欧洲人已经开发出一种利用牛痘这种几乎无害的疾病来预防其致命的“天花”的方法。这为预防天花瘟疫提供了一种安全、经济且切实有效的方法。\n\n起初，我们持怀疑态度的医生们亲身试验了这种疗法……结果发现它确实有效，这是我们历史上第一次能够对抗天花。"
 panum.354.g_generic: "我们……我们需要立即进口这个！"
 panum.354.f_fareast: "在一次对欧洲访问中，我们的外交官发现了一件令人着迷的事情——他们似乎有一种“有效”的天花治疗方法，而且他们了解了这种疾病的历史！显然，在奥斯曼帝国曾观察到接种人痘的做法，是用康复病人身上的干燥天花痂样本给孩子接种这种“较弱”形式的疾病……但这是一种有缺陷的解决方案，很危险，因为它是与魔鬼共舞——天花会轻易地把你夺走，就像你可以战胜它一样。\n\n我们最有学识的大夫几乎都不敢相信这一点，只有那些受过欧洲教育并被称为“医生”的人才能保证它是一种安全、经济且有效的预防天花药物。不仅如此，他们已经开始在我们的人民中测试它，并发现这些说法不仅仅是说法，而是事实。\n\n有了这个，我们就有对抗天花的武器了。"
 panum.354.g_fareast: "看来我们的新......医生......已经展示出其价值，立即进口这些。"
 panum.354.f_latino: "在对欧洲访问中，我们的外交官发现了一件令人着迷的事情——他们似乎有一种“有效”的天花治疗方法。虽然我们很早就熟悉了这种疗法，即“人痘法”，但他们后来开发出了一种更为先进的治疗方法。他们没有使用冒着感染风险的“人痘法”，而是使用从牛痘中提取的材料，这是一种常见的、通常无害的疾病。这种新型血清既便宜又常见，最重要的是，它很有效。\n\n现在，我们的医生可以查阅最新的医学期刊，为这一发现感到庆幸。天花对美洲人来说并不陌生，因为它曾使这片土地上的原住民遭受灭顶之灾......但现在我们有了一种强大的武器，可以让这一灾难成为过去。"
 panum.354.g_latino: "向欧洲致谢，并请求进口一批立即使用的货物。"
 panum.355.t: "预防接种开始"
 panum.355.d: "随着[GetPlayer.GetName]天花疫苗的出现，政府开始了疫苗接种计划。"
 panum.355.f: "至少在一开始，疫苗接种运动受到了一些抵制。担心孩子受到惊吓的母亲们、对这一新奇事物持怀疑态度的老大夫们、担心科学会篡改的虔诚教徒们都在反对。但是教育解决了这个问题，教解释了它的工作原理和原因，现在孩子们恢复了视力和健康，当看到他们没有伤疤、充满生机时，几乎没有人需要说服他们。\n\n渐渐地，排队的人越来越多。在学校、医生办公室和工作场所，疫苗接种运动开始逐渐兴起......天花也随之开始减少。"
 panum.355.g: "打针真讨厌，但如果能保护安全的话……"
 panum.356.t: "疾病退缩"
 panum.356.d: "在经历了无数个世纪的死亡和苦难之后，天花疫苗的普及让这个老对手彻底退却。"
 panum.356.f: "经过无数人的不懈努力，在[GetPlayer.GetName]，天花这个威胁正在缓慢成为过去。广泛开展疫苗接种活动后，天花正在被消灭，今天的孩子们将不会带着他们祖辈留下的伤疤。随着针头的每一次刺入，天花变得越来越少，也越来越成为过去。\n\n这是一项重大成就，是我们历史上光荣的一天，虽然战斗尚未胜利，但胜利在望。天花将消灭，如果不是死在我们手里，也会死在我们的后人手里。"
 panum.356.g: "总有一天……我们会永远打倒天花。"
 panum_smallpox_vaccination_character_modifier: "已接种疫苗"
 panum.340.t: "人痘接种"
 panum.340.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士找到了一种治疗天花的方法，尽管它有一定风险。"
 panum.340.f: "人痘接种法是指通过接种将天花的脓疱在人与人之间传播。这是一种预防性疫苗接种技术，直到18世纪在中国和中东地区都广泛使用，当时人们使用从天花患者的伤口中提取的病毒，然后通过涂抹在健康人的手臂或腿部。这意味着给健康人注射的是减毒的病毒，然而，病毒在繁殖过程中可能再次致病，这就导致这种方法治疗的患者死亡率相对较高（2%到3%）。"
 panum.340.g: "新进步？"
