 panum.561.t: "通往疫苗之路？"
 panum.561.d: "遵照首都的指示，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生已着手研究如何治疗乃至根治黄热病。"
 panum.561.f: "“……然而，我不禁怀疑，自己是否过于自信，认为自己真的能够战胜黄热病。这种疾病充满了未知，甚至连它的传播方式都是一个谜，更别提它的起源了。或许有人会说，这是否是古老的瘴气理论的死灰复燃？面对如此深不可测的谜团，谁敢说自己有十足的把握？\n\n尽管如此，我们仍知道一些事实。并非所有遭遇这种神秘死亡的人都会被它夺去生命；有些人几乎没有表现出任何黄热病的症状，甚至有不少人在病情恶化之前就已康复。遭遇黄热病无疑是与死神共舞，但这并不意味着死神一定会将你带走……”"
 panum.561.g: "……若我们能在任何一处阻止它，便有可能在每一处阻止它。"
 panum.562.t: "孤儿院"
 panum.562.d: "通过研究所有黄热病康复的案例，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生来到了一所拥有许多幸存者的地方——一家孤儿院。"
 panum.562.f: "“啊，您好，想必您就是这家孤儿院的院长吧……我注意到孩子们今天玩得不亦乐乎，颜料可是随处可见呢。”\n“哎呀，说真的，我也搞不清他们是从哪儿弄来的——哦，您一定是他们提到的那位要来的医生吧！不过，恐怕咳嗽已经好了，所以没什么大碍——”\n“恐怕您误会了，女士。我并非那位医生。我从首都而来，正在调查黄热病。我听说……这种病曾经在这里肆虐过？”\n“哦，是的，那些可怜的小家伙们。他们中不少人都得过这病，甚至有些孩子来自被黄热病摧毁的家庭。唉，真是命苦的小天使们。不过，说来也怪，这病似乎对孩子们格外‘仁慈’呢。”\n“真是耐人寻味。您对此有什么看法——”\n“孩子们！快过来，快过来！这位从首都来的好先生想和你们说说话！”\n“哦……你们好，孩子们。我是[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士，想和你们聊聊黄热病的事……”"
 panum.562.g: "为什么父母会死，而孩子们却能活下来？"
 panum.563.t_america: "古血"
 panum.563.d_america: "为了进一步了解黄热病，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生决定拜访这片土地上一些早期定居者的家庭。"
 panum.563.f_america: "“……然而，并非所有这些土地上的第一批家庭都已湮没在历史的尘埃中。仍有一些家族的血脉可以追溯到最早踏上这片土地的探险队，无论他们的规模是大是小。我将目光转向了这些家族，因为他们中的一些人至今仍珍藏着祖辈的日记和手稿，为我们打开了一扇通往正式历史档案之前的时光之门。这些泛黄的纸页揭示了一个尤为引人入胜的细节：黄热病最早在这片土地上肆虐的时间，大约可以追溯到1685年。\n\n然而，自那时起，[ROOT.GetCountry.GetNameNoFlag]的一些杰出人物——那些曾以探险家和冒险家身份远渡重洋的勇者——却在异国他乡与这种疾病重逢。有趣的是，那些曾在这里感染黄热病并康复的人，在非洲再次遭遇这种疾病时，竟奇迹般地安然无恙。这一发现，如同一道闪电，照亮了我心中的迷雾，让我窥见了一个惊人的真相。”"
 panum.563.g_america: "它们是同一种疾病。对其中一种的免疫力就是对另一种的免疫力。"
 panum.563.t_africa: "部落民"
 panum.563.d_africa: "为了进一步了解黄热病，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生找到了对黄热病最有经验的人——非洲原住民。"
 panum.563.f_africa: "“……然而，尽管我们可能会迅速死亡，但非洲本地人却能忍受。这是一种他们非常熟悉的疾病；尽管语言障碍是一个重大障碍，但只要稍加描述，他们就能理解我所谈论的疾病。他们是否对这种疾病有天然的抵抗力，就像欧洲人对天花有抵抗力一样，而天花曾摧毁了美洲？也许吧，但在我们城市中劳作的非洲裔人却以与我们相同的速度死亡——那么，一定有其他因素在起作用。是饮食？还是文化？\n\n关键可能在于部落中的童年暴露。他们可能在年轻时接触到黄热病，从而发展出持久的免疫力，就像牛痘可能提供对天花的保护一样。”"
 panum.563.g_africa: "如果他们能够获得免疫力……那么就有可能制造出疫苗。"
 panum.564.t: "大敌的本质"
 panum.564.d: "对抗疾病需要更多地了解其本质，而[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生设计了一项引人入胜的测试。"
 panum.564.f: "“……然而，自从发现霍乱是一种水源传播的疾病以来，我们就有机会研究通过适当的过滤从水中去除此类疾病的可能性。虽然花了一些时间才拿到，但我现在手头有一个贝克菲尔德过滤器，这是一种神奇的装置，可以通过硅藻土过滤水。它是一种极其精密的设备，甚至能够去除细菌。我准备了一个小瓶，里面装了几名感染者的血液，用蒸馏水稀释后，将其倒入过滤器。流出来的是清澈、纯净的液体……或者说我以为是这样。\n\n然而，令人惊讶的是：无论它是什么，它都通过了过滤器，这一点被一位勇敢的志愿者证实，他接受了注射。他们现在已经病倒，正在为生命而战。然而，这证明了黄热病病原体不仅仅是一种微生物，它是比细菌更小的东西，是我们无法看到的东西。\n\n我本会认为这是不可能的，但我在一本医学期刊上看到了关于这种东西的记录。他们称之为病毒。”"
 panum.564.g: "知己知彼，百战不殆。"
 panum.565.t: "不可治愈？"
 panum.565.d: "怀着对任何有效治疗方法的希望，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] 医生走访了当地的诊所和医院，调查他们的治疗实践。"
 panum.565.f: "“啊，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生，很高兴见到您！我们诊所这里——”\n“恐怕我们得省去客套了，医生。我需要在日落前走访其他诊所、医院、病房，大约二十多家。告诉我你们的治疗效果如何。”\n“啊，呃……我们遵循了既定的指南——”\n“成功了吗？让我记一下。”\n“呃……没有。”\n“死亡率呢？”\n“相当……高。”\n“这周你们失去了多少人？”\n“一百七十六人。”\n“加上你们和之前六家诊所的数据，总死亡人数已经超过三千人了。你们是按照治疗指南操作的，对吧？”\n“是的，医生！”\n“那就排除了草药、电疗、放射疗法、水疗、民间疗法、现代医学……嗯，几乎我们已知的所有治疗方法，包括为了防止天象影响而让他们远离夜空的做法。”\n“那么……这是不是意味着没有治疗方法，医生？”\n“确实，似乎任何治疗都可能无效。真是遗憾。”"
 panum.565.g: "那么，战术需要改变——我们必须拥有疫苗。"
 panum.566.t: "第一次突破"
 panum.566.d: "尽管迄今为止研究尚未成功，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生仍尝试用猴子进行实验，以期研制出疫苗。"
 panum.566.f: "对许多人来说，看到笼子里死去的猴子可能没什么值得庆祝的，但对[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生和[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]团队来说，这却是显著的进展。开发针对这种可怕疾病的疫苗，需要在实验室中随时制造出病症，然而无论他们如何尝试，始终未能成功……直到今天。由于非洲本地的猴子和黑猩猩似乎对这种疾病免疫，直到一只印度猕猴的到来，才为他们提供了合适的实验对象。这只猕猴被注射了从感染者静脉中提取的血清后，最终病倒并死亡。\n\n对某些人来说，这或许显得残忍而无意义，但在此刻，它却意味着巨大的进步。终于，他们有了可供实验的对象。"
 panum.566.g: "嗯，也算进展……至少在杀死猴子方面"
 panum.567.t: "血清的秘密"
 panum.567.d: "有了可靠的“测试对象”，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生开始测试利用康复患者血液进行接种的可能性。"
 panum.567.f: "1. 猕猴到猕猴输血：疾病成功转移，未产生免疫力，猕猴死亡。证实了疾病通过血液传播，且可能由昆虫（如蚊子）携带。\n2. 人类到猕猴输血：疾病成功转移，未产生免疫力，猕猴存活。证实了感染可以直接跨物种传播。\n3. 南美和非洲黄热病对存活猕猴的测试：猕猴产生免疫力并存活。证实了两种形式的疾病具有共同的免疫机制。\n4. 高温灭菌后的死病原体血清：未能提供保护，猕猴在接种活病原体后死亡。重大失败，排除了死病原体疫苗的可能性。\n5. 将康复期血清转移至猕猴：成功预防了未来感染！前景光明！这可能是疫苗研发的起点？"
 panum.567.g: "不打破几个猕猴的“蛋”，就做不成煎蛋卷……"
 panum.568.t: "原型"
 panum.568.d: "经过一段时间继续研发疫苗，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生已到达一个关键阶段——原型疫苗。"
 panum.568.f: "这本该是一个令人振奋的时刻，但我却发现自己难以保持冷静。通过使用大量从康复患者体内提取的血清，我和我的团队成功将其提炼成一种浓缩形式，可能能够为志愿者提供免疫力。这是一个重要的初步成果，也是一个关键的前进基石。于是，我们开始在猕猴身上进行测试。许多猕猴死亡，但也有许多存活了下来，但猕猴毕竟不是人类。\n\n我们需要进行活体实验。十名志愿者，从各处招募而来。一些来自当地驻军的士兵，一名我团队的成员，还有一些被几便士报酬吸引的失业者。总共大约二十多名志愿者，接受了近二十次注射。结果如何？七人没有任何症状，一周后确认免疫；五人出现轻微病症，随后获得免疫；另外六人病情较重，但最终也获得了免疫。剩下的呢？所有人都发展成了典型的黄热病，其中一人死亡。这无疑是朝着正确方向迈出的一步，但是……那些死去的人呢？"
 panum.568.g: "进步的代价太大了。"
 panum.569.t: "新课题"
 panum.569.d: "尽管第一次尝试疫苗的效果喜忧参半，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生决心改进这一过程。"
 panum.569.f: "令一些饲养员如释重负，却又使另一些人不寒而栗的是，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生揭示了一个关键发现——猕猴并非唯一能够培育这种可怕疾病的宿主。一种更新、更合适的实验对象浮出水面：普通的研究用小鼠。这些小家伙在蓬勃发展的医学研究领域中扮演着举足轻重的角色，而在此刻，它们的重要性更是无与伦比。它们脑脊液——那包裹着它们微小大脑的粘稠液体——竟是黄热病病毒的理想温床。然而，这一发现却带来了一个意想不到的转机。\n\n随着病毒在小鼠之间一次次传递，每次传代所需的时间逐渐缩短，而病毒的毒性也在悄然减弱。就这样，一点一滴地，这个曾经肆虐人间的杀手正在被驯服，一次一只小鼠，仿佛命运之轮在缓缓转动。"
 panum.569.g: "哦，太好了，先有猕猴，现在是老鼠……"
 panum.570.t: "第二代疫苗原型"
 panum.570.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的疫苗经过持续优化，现已成功研发出一种更为高效的改良版本。"
 panum.570.f: "“尽管上一次尝试并未失败，但我仍不敢称之为成功。那些勇敢的年轻人为了人类摆脱这种疾病的希望献出了生命，我深感有责任尽一切可能改进疫苗，如同肩负着一座沉重的山岳。我相信，我已经朝着这个目标迈出了坚实的一步。通过将病毒从猕猴转移到小鼠身上，我逐步但有效地削弱了病毒的毒性，使其随着时间的推移大幅减弱，如同将猛兽驯服为温顺的家畜。经过三十多次传代，最终得到的黄热病病毒已经变得极为温和，远比最初的尝试更适合用于疫苗研发，仿佛在黑暗中点亮了一盏希望的灯。\n\n我采用了与之前相同的方法，将免疫血清与弱化活病毒相结合，血清的存在有效降低了某些免疫并发症的风险，如同为脆弱的幼苗筑起了一道防护墙。这次的志愿者人数虽不及上次，但我的一位同事毅然决定冒险尝试。他们既未接种过疫苗，也未曾接触过黄热病，接种前被严格隔离了一周，如同在无菌的实验室中培育珍贵的样本。除了接种部位出现轻微红肿外，他们并未出现任何黄热病症状。截至目前，实验结果令人倍感振奋，仿佛在漫长的黑夜中，终于看到了黎明的曙光。”"
 panum.570.g: "看来我们终于迈出了关键的一步……"
 panum.570.h: "……那么，让我们携手开启这场疫苗接种的征程吧！"
 panum.571.t: "野火"
 panum.571.d: "灾难降临！[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生研发的血清疫苗在分发过程中不慎引发了血液传播疾病的扩散！"
 panum.571.f: "如今回想，使用人类血清制作疫苗或许是一个极其糟糕的决定。尽管人类血液的奥秘已被部分揭开，但在显微镜不断揭示新微生物、病毒理论逐渐兴起的时代，总有一种挥之不去的隐忧：可能会发生一些难以预料的灾难性事件。\n\n如今，这场灾难已成现实：数以万计的人在毫不知情的情况下被注射了受病毒污染的血清，这种病毒已导致从士兵到政府官员的许多人出现黄疸症状。这种病毒此前在我们的科学领域是未知的，至今仍难以被许多顶尖科学家检测到……然而，对我们国家形象的损害却显而易见。尽管几乎没有死亡病例，但这次疫苗接种项目的明显失败使我们的医学界陷入混乱，成为全球的笑柄。"
 panum.571.g: "这对我们的医学研究而言无疑是一场巨大的灾难……"
 panum.572.t: "最终调整完成了吗？"
 panum.572.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的疫苗研发已接近尾声，目前正处于最后的完善阶段。"
 panum.572.f: "若是不知情的人看到[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的实验室，或许会误以为这是一个极为古怪的厨房。盐、水、油和鸡蛋散落在台面上，旁边还摆放着加热板、各式各样的玻璃器皿和一台最先进的冰箱。这场景看似是为了准备早餐，而非进行医学突破，然而，这正是医生此刻的工作。血清制作疫苗的成本过高，难以大规模分发，且在需要为整个殖民地或城市接种的规模下操作起来也极为不便。必须找到替代方案，但如果不是血清，那又该用什么？\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生低声喃喃自语，仿佛濒临疯狂，但他仍在不知疲倦地工作，如同一位执着的炼金术士，在实验室中寻找点石成金的奥秘。他小心翼翼地将精心准备的小鼠组织浸入蛋黄中，然后，小心翼翼地，总是小心翼翼地，放入冷冻干燥室。早前的一批已经完成，其内容物现在变成了一种细粉末。将其加入盐溶液中……\n\n医生笑了，那笑容中透露出疲惫与欣慰的交织。\n\n“终于，”这位好医生说道，“我成功了。”"
 panum.572.g: "我找到了！"
 panum.573.t: "最终版疫苗原型"
 panum.573.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生已完成疫苗的研发工作，并开始在一个最终测试组中展开接种试验。"
 panum.573.f: "“这是一条漫长而艰辛的道路，但终点终于近在眼前，如同在迷雾中跋涉的旅者，终于望见了远方的灯塔。最后的阶段是使疫苗更易于推广，而如今这一目标已经实现：用盐水溶液替代了血清，最终的疫苗包装与天花疫苗类似。无需注射，只需采用同样的划痕接种法。事实上，这两种疫苗甚至可以同时接种。从各方面来看，这应该是一种可靠、安全且高效的疫苗分发方式，不仅可以覆盖数千人，还可以惠及数百万人，如同在广袤的土地上播撒希望的种子。\n\n然而，过去的测试让我心中充满忧虑。志愿者寥寥无几，远不足以组成一个测试组……但如果算上我自己，人数就足够了。我已经做好了安排——一位将军只能派遣这么多士兵上战场，最终自己也必须亲临前线。今晚八点，我将接种这种疫苗。如果它有效，那么两周后当我感染黄热病时，我只会出现轻微的不适。这不仅是科学的探索，更是对生命的承诺，如同在未知的海洋中，我愿做那第一个扬帆的舵手。”"
 panum.573.g: "愿[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]无灾。"
 panum.574.t: "对抗黄热病的疫苗"
 panum.574.d: "消息已传至首都：[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生成功研制出了黄热病疫苗！"
 panum.574.f: "“……但最终，我和我的团队克服了重重困难，取得了成功，如同在荆棘丛生的荒野中开辟出一条通向光明的道路。尽管黄热病的许多谜团仍未解开，但我们成功研制出了一种可行的疫苗，并已准备好大规模生产。它可能需要一些由杰出人才管理的专业设施，但它可以大规模生产，而数百万乃至数千万人将受益于快速的疫苗接种行动，使黄热病成为历史，如同将一场肆虐的瘟疫封印在时光的尘埃中。\n\n然而，许多生命已经逝去，包括我团队中的一些成员——从为研究献身的普通助手到参与测试的志愿者，他们都应被铭记为真正的英雄，如同夜空中最亮的星辰，照亮了人类前行的道路。此外，猕猴和小鼠也应得到赞扬，它们在这场冒险中发挥了关键作用，如同无声的战士，为人类的健康献出了生命。\n\n通过他们的牺牲和我们的共同努力，我们现在拥有了一种疫苗，可以在几年内终结地方性黄热病，甚至可能有一天彻底根除这一祸患。这不仅是对科学的胜利，更是对人类坚韧与勇气的颂歌，如同在漫长的黑夜中，终于迎来了黎明的曙光。”"
 panum.574.g: "干得好，医生！现在，让我们立即展开部署吧！"
