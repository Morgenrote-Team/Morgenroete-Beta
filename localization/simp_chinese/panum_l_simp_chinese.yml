 building_panum_tuberculosis_sanatorium_tt: "在山区爆发结核病疫情后，可以建立结核病疗养院。#R 仅能通过事件激活。#!"
 panum_tuberculosis: "结核病"
 panum_tuberculosis_desc: "结核病，又名“白死病”，是维多利亚时代非自然死亡的主因之一。"
 panum_forbidden_spitting_modifier: "禁止随地吐痰"
 panum_tuberculosis_quarantine_modifier: "结核病隔离"
 panum_tuberculosis_sanatorium_cost_modifier: "疗养院花费"
 panum_help_against_tuberculosis_modifier: "协力对抗结核病"
 panum_praised_for_tuberculosis_initiative_modifier: "因关于结核病的演讲而获得赞誉"
 panum_supports_health_care_initiative_modifier: "支持卫保提议"
 panum_opposes_health_care_initiative_modifier: "反对卫保提议"
 panum_tuberculosis_hospital_modifier: "结核病医院"
 panum.201.t: "结核病传播至[SCOPE.sState('panum_disease_state').GetName]"
 panum.201.d: "尽管我们竭尽全力，结核病仍在蔓延。现在[SCOPE.sState('panum_disease_state').GetName]也遭灾了。"
 panum.201.g: "“白色死神”看起来不可阻挡。"
 panum.202.t: "遗传病？？"
 panum.202.d: "尽管进行了全面的医学检查，结核病的起源仍然存在争议。部分医务人员认为这是一种遗传性疾病，或至少由“内部因素”引发。另一些医生则认为这是一种典型的传染病，并建议采取更为激进的应对措施。"
 panum.202.f: "在18世纪和19世纪的欧洲各国，关于疾病发生机制的概念存在不同的认知传统。许多当时的医学作家认为结核病，或称“痨病”（尽管并不总是与结核病同义），是当时最严重的流行病之一。他们将其成因归结为体液的不均衡分布、土壤中的不洁气体、城市化进程或风俗的衰退。相比之下，在意大利，传统上更倾向于认为结核病是一种传染性疾病，即可传播的病症。因此，18世纪中叶，威尼斯共和国引入了对“痨病”病例进行书面报告的义务。为降低感染风险，死于此病者的个人物品会被焚毁。而在英国和北欧国家，人们普遍认为这种疾病是由遗传原因导致的。"
 panum.202.g: "我们现在解决不了遗传病。"
 panum.202.h: "这是传染病，我们得不惜一切代价消灭它！"
 panum.203.t: "随地吐痰"
 panum.203.d: "由于对结核病病因缺乏充分了解，所采取的防控措施也备受争议。那些认为结核病由传染引起的人主张采取严厉的禁令——包括禁止在公共场所随地吐痰——以遏制疾病的传播。这些措施尤其影响了底层群众。而持怀疑态度者则认为此类规定不过是骚扰普通民众的手段。"
 panum.203.f: "尽管18世纪的礼仪规范在上层和中产阶级中消除了某些“坏习惯”，许多在卫生上令人质疑的行为在大众中仍广泛存在了很长时间。19世纪初，手帕和痰盂尚未在社会上普及，直到世纪之交，禁止在公共交通工具上吐痰等行为才逐渐成为常规。"
 panum.203.g: "这种恶习早该禁止了！"
 panum.203.h: "用最严厉的禁令让那些混蛋付出代价！"
 panum.203.i: "随地吐痰是不可能被消灭的人性。"
 panum.204.t: "[SCOPE.sCharacter('disease_victim_scope').GetFullName]已感染结核病！"
 panum.204.d: "我国的艺术家[SCOPE.sCharacter('disease_victim_scope').GetFullName]已感染肺结核，但谢天谢地，[SCOPE.sCharacter('disease_victim_scope').GetSheHe]并不认为这是命运最糟糕的打击。"
 panum.204.f: "在19世纪初及更长的时间内，肺结核被视为一种“浪漫疾病”。它给予患者足够的时间来准备死亡，许多人认为由此带来的苍白气色甚至显得高贵。作家们通过许多作品为肺结核树立了丰碑，例如小仲马的《茶花女》。在威尔第的歌剧《茶花女》和普契尼的《波西米亚人》中，这种疾病也得到了类似的升华。乔治·桑，据称是肖邦的伴侣，曾写道：“肖邦咳嗽得极其优雅。”"
 panum.204.i: "激发灵感的契机吗？这难道不会成为创作安魂曲的灵感来源吗？"
 panum.204.j: "肺结核难道不一直是作家们笔下的主题吗？"
 panum.204.k: "但正是这种疾病激发了人们对痛苦的想象，不是吗？"
 panum.205.t: "结核病疗养院"
 panum.205.d: "鉴于[SCOPE.sState('panum_disease_state').GetName]肆虐的肺结核疫情，一位医生建议将一些富有的患者转移到山上。据说，高海拔的气候和清新的空气有助于治愈他们的疾病。因此，应该建立一个专门的肺病疗养院，而[SCOPE.sState('panum_davos_scope').GetName]似乎是设立此疗养院的理想地点。"
 panum.205.f: "空气疗法是一种气候疗法，自19世纪以来长期被认为是治疗肺结核的标准疗法。患者每天需要在户外或开放式休息区的躺椅上躺卧数小时。空气疗法通常在专门的肺病疗养院中进行。在德国，医生赫尔曼·布雷默首次描述了这种此前被认为无法治愈的疾病可通过空气疗法治愈。1856年，他撰写了关于慢性肺结核可治愈性的论文。他认为，一些由于气候原因形成的“免疫地带”不仅能有效保护居民免受肺结核的侵害，还在疾病爆发后具有治愈作用。在瑞士，出生于德国的医生亚历山大·斯彭格勒是空气疗法的先驱之一。他于1853年开始在达沃斯担任乡村医生，并很快得出结论，达沃斯地区的居民普遍不患肺结核，这归因于当地的高山气候。托马斯·曼在其小说《魔山》中，将达沃斯描绘为一个气候疗养胜地。"
 panum.205.g: "在[SCOPE.sState('panum_davos_scope').GetName]建立疗养院！"
 panum.205.h: "这不过是华丽的骗局。"
 panum.206.t: "无产者的梦魇"
 panum.206.d: "[SCOPE.sState('panum_disease_state').GetName]的肺结核疫情对底层群众的打击最为严重。对此，[SCOPE.sCharacter('union_leader').GetFullName]特别批评了当前状况，并呼吁进行深远的变革。"
 panum.206.f: "19世纪和20世纪初，结核病作为城市贫民的地方病受到广泛关注。1815年，英国四分之一的死亡病例和1918年法国六分之一的死亡病例都是由结核引起的。大约在1880年，德国15至40岁年龄段的每两例死亡中就有一例是由结核病引起的。"
 panum.206.g: "或许穷人该多洗澡？"
 panum.206.h: "在这一领域进行针对性的改进是必要的。"
 panum.206.i: "卫生保健问题是国民性的。"
 panum.206.j: "为这一举措鼓掌！"
 panum.207.t: "认真的提议"
 panum.207.d: "[SCOPE.sCharacter('devout_leader').GetFullName]已经亲自为[SCOPE.sState('panum_disease_state').GetName]的众多病患发声，[SCOPE.sCharacter('devout_leader').GetSheHe|U]希望尽快在当地设立一家非营利医院。"
 panum.207.f: "“几乎所有国家都以某种方式开展了与肺结核的斗争，令人欣慰的是，如今这场针对这一危险敌人的战斗已经普遍展开，而且力度相当大。”\n——罗伯特·科赫"
 panum.207.g: "小说家又开始厉兵秣马了！"
 panum.208.t: "白疫正在屠戮活着的人们"
 panum.208.d: "[SCOPE.sState('panum_disease_state').GetName]的肺结核疫情正在恶化，每天都有更多的人染病去世。这种情况的发展超出了所有医生的预期。"
 panum.208.f: "“我的脸色看起来多么苍白！——我想，我倒是愿意死于肺痨……因为那样的话，夫人们都会说，看那可怜的拜伦——他在弥留时看起来多么迷人！”\n——拜伦勋爵"
 panum.208.g: "这永远不会结束吗？"
