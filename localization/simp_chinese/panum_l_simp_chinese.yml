 panum.101.t: "第三次霍乱大流行"
 panum.101.d: "来自恒河三角洲的令人担忧的消息今日传到了首都。当地的病例数量激增。经过当地医生的初步检查后，他们震惊地发现，霍乱再次卷土重来，令人不安。"
 panum.101.g: "不论如何，霍乱又来了。"
 panum.1000.t: "脊髓灰质炎疫情"
 panum.1000.d: "最新疫情——#YELLOW 脊髓灰质炎#!正在摧毁[SCOPE.sState('panum_disease_state').GetName]！"
 panum.1000.f: "早在古埃及的壁画中，就可以找到小儿麻痹症（脊髓灰质炎）存在已久且为地方性流行病的迹象。然而，直到19世纪末，它才发展为一种流行性疾病，当时小儿麻痹症突然在瑞典和美国爆发。到1910年，频繁的流行病已成为发达国家，尤其是在其夏季城市中的常见现象。在20世纪40至50年代的高峰期，每年有超过50万人因小儿麻痹症而瘫痪或死亡。对这些流行病的恐惧和社会的集体应对，引发了巨大的公众反应和全面动员，推动了预防和治疗方法的研发，并彻底革新了医学慈善事业。"
 panum.1000.g: "拐杖和轮椅也要走入寻常人家了……"
