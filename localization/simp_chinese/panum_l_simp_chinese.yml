 panum.139.d: "经过巨大的努力，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]终于发现关于[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]的成功治疗方法。这被认为是[ROOT.GetCountry.GetAdjectiveNoFlag]医学的一个里程碑"
