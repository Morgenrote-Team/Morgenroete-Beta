 panum.112.t: "希望的曙光"
 panum.112.d: "在[SCOPE.sState('panum_disease_state').GetName]的霍乱医院中，有一位医生——[SCOPE.sCharacter('panum_new_physician_scope').GetFullName]在本次疫情中表现尤为突出，[SCOPE.sCharacter('panum_new_physician_scope').GetHerselfHimself]的工作方式已经在全国引起了重视，有可能在[GetPlayer.GetName]未来的流行病抗击中发挥重要作用。"
 panum.209.t: "“结核病”医生"
 panum.209.d: "结核病疗养院院长[SCOPE.sCharacter('panum_new_physician_scope').GetLastName]医生在疫情肆虐时提供了服务。"
 panum.112.f: "“上帝对我说话，召唤我为祂服务。”——弗洛伦丝·南丁格尔"
 panum.112.g: "立刻授予[SCOPE.sCharacter('panum_new_physician_scope').GetHerHim]官职！"
 panum.112.h: "医生应该培训下一代，以对抗下一次流行病。"
 panum.122.t: "霍乱潜伏期"
 panum.122.d: "经过多次观察和访谈，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生发现​​，患者需要经过一段时间才会出现典型的霍乱症状。"
 panum.122.f: "[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]医生估计这段时间大约为半天到五天，平均为三天，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]与患者及其亲属进行了多次讨论并根据几位目击者的报告重建事件。即使原因仍不清楚，以后也可以从这些观察中得出结论，了解第一天到底发生了什么。"
 panum.122.g: "观察得真细致。"
 panum.124.g: "观察得极为精准。"
 panum.123.t: "霍乱症状"
 panum.123.d: "今天，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生向医学院发送了一份霍乱症状的完整列表。"
 panum.123.f: "众所周知，但迄今为止仅初步研究，霍乱是一种人类小肠疾病。其后果是极度的腹泻，伴有典型的蓝色“米汤样粪便”和严重的呕吐。据说[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生有一种虐待狂倾向，因为[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]在学术晚宴前及时发送了这些及其他极其令人不适的症状的详细描述。"
 panum.124.t: "霍乱弧菌"
 panum.124.d: "在一份备受赞誉的报告中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生发现霍乱与其他类霍乱疾病的区别，这被认为是未来疾病描述的一个里程碑。"
 panum.124.f: "霍乱这一名称源于希腊语中的胆汁（胆汁流出）一词，最初指所有可能的腹泻或肠道问题。尽管雅各布·德·邦特早在1642年就描述过一种专门针对印度人的霍乱疾病，但霍乱仍然纯粹是一个统称。直到19世纪霍乱大流行的出现，这种特殊且新型的霍乱才有了一个明确的名称来区分它，而这种霍乱也成为了本世纪最具破坏性的疾病：亚洲霍乱。"
 panum.222.t: "结核病潜伏期"
 panum.222.d: "在对结核病的研究中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生注意到了一些与这种疾病有关的奇怪现象，患病者可能需要数周时间才能真正出现典型症状。"
 panum.222.f: "无论是瘴气理论还是细菌理论，结核病仍然是个谜。如果它是一种传染病，症状似乎需要数周时间才会爆发。此外，并不是每个与病人住在一起的人都会直接被感染，正如[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]在对病人和亲属进行的大量调查中发现的那样。要么学者们的理论是正确的，即结核病不是传染病，其他因素是罪魁祸首，要么感染风险低于最初的想法。"
 panum.223.t: "结核病症状"
 panum.223.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生深入研究了结核病的症状后，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]得出了一个甚至让同事都感到惊讶的结论——结核病是一种更为复杂的疾病，其症状多种多样，远远不是肺部问题。"
 panum.223.f: "虽然结核病的典型症状咳嗽，但只是众多症状之一。肺结核只是结核病的一种类型，它还会影响其他器官。疲劳、发烧、食欲不振、冒汗或吐血是以前已知的症状，结核病不仅侵袭肺部以外的器官，而且两种不同类型的结核病可以同时发生，这一事实极大地改变了医学院成员的世界观。"
 panum.224.t: "结核病和淋巴结核"
 panum.224.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生深入研究了各种可能的结核病，尽管与其他疾病的症状有许多相似之处，但他还是找出了结核病与淋巴结核之前的具体区别，也同时强调了两者之间的联系。"
 panum.224.f: "关于肺结核的描述已经存在了几个世纪，由于此前城市化程度较低，肺结核并没有产生严重的破坏性，但直到19世纪。而结核病的另一个名字“肺痨”一词一直沿用到20世纪。此外勒内·拉埃内克被认为是肺结核研究的先驱之一，他发明了用于肺部检查的听诊器；约翰·卢卡斯·舍恩来因于1832年创造了肺结核一词，并将其与特定的临床症状联系起来。这些年的一个重要发现是，淋巴结核和肺结核是两种不同的疾病，但由于肺结核症状较多，很难将它们区分开来。"
 panum.322.t: "天花潜伏期和症状"
 panum.322.d: "在最近的一份总结中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生指出，天花在脓疱出现之前与其他流感症状并无不同。可以推测，从感染到出现症状需要一到两周的时间。"
 panum.322.f: "“在我看来，那些容易从瘟疫中恢复健康的人，似乎在此之前全身都已被风干和净化，因为他们中的一些人出现了呕吐，所有人的胃都受到了干扰。同样，在那些已经被净化过的即将获救的人身上，全身明显出现了黑色的脓疱，大多数是溃疡，所有的都很干燥……从外表看，身体摸起来不热，也不苍白；皮肤相当红，发紫，并爆发出小水泡和溃疡。”——盖伦"
 panum.323.t: "水痘还是天花？"
 panum.323.d: "在[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]观察天花患者期间，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生能够提出报告，表明水痘是一种独立、无害的疾病。到目前为止，这是一个非常有争议的理论。"
 panum.323.f: "“许多人在出水痘之前都没有任何疾病或先兆，其他人在出水痘之前会感到持续三天的寒冷、乏力、咳嗽、半夜起来、疼痛难忍、食欲不振和发烧。大多数水痘的大小与天花的大小相同，但有些则较小。我从未见过它们汇合在一起，也从未见过它们数量很多。我观察到的最大数量是脸上大约有十二个，身体其他部位有两百个。在出疹后的第二天或最晚第三天，许多没有破损的水痘似乎已经完全成熟，而那些充满黄色液体的水痘在第五天或第六天与真正的天花非常相似，尤其是当渗出的血清占据的空间比平时更大时。”——威廉·赫伯登"
 panum.324.t: "麻疹和天花的区别"
 panum.324.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生非常仔细地比较了天花患者、麻疹患者和水痘患者的症状，并能够非常准确地对它们进行分类。"
 panum.324.f: "“天花爆发前，患者会持续发烧、背痛、鼻子发痒，做噩梦。这些是天花爆发时最严重的症状，同时伴有明显的背部疼痛，患者全身发烧和发痒。面部出现肿胀，患者整个脸颊和双眼周围出现明显的颜色，全身疲惫和极度不安，临床表现为打哈欠，喉咙和胸部疼痛，呼吸困难和咳嗽，呼吸干燥、唾液浓稠、声音嘶哑、头部疼痛和沉重、不安、恶心和焦虑。麻疹患者比天花患者更容易出现不安、恶心和焦虑。另一方面，天花引起的背痛比麻疹更明显。”——拉泽斯"
 panum.422.t: "斑疹伤寒症状和潜伏期"
 panum.422.d: "在第一份报告中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生列出了斑疹伤寒的症状，以及它们在疾病过程中首次出现时间的初步估计。"
 panum.422.f: "发热、寒战、头痛、咳嗽、皮疹、呕吐这些都是斑疹伤寒的症状。然而，所有这些症状在类似疾病中也会出现。而恶心和精神错乱则是斑疹伤寒的典型症状，此外会发高烧两到三天，然后持续发烧十天左右，随后几天出现虚脱。根据我的计算，从感染到出现最初症状大约需要十到十四天。"
 panum.423.t: "营地热"
 panum.423.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生将军队中流行病的历史报告与斑疹伤寒患者目前的症状进行比较后，他得出结论——将斑疹伤寒与“营地热”等同起来没有什么帮助。"
 panum.423.f: "这当然是一种营地热，但它是“那种”营地热吗？[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生提出了这样的问题，引起了其他医生的思考。营地热在历史上长期以来一直是军营中的流行病，尤其给拿破仑军队造成了巨大伤亡。但并非所有有营地热的军队疾病都与斑疹伤寒等同。例如在美国内战期间尤其肆虐的疾病通常被称为斑疹伤寒，但实际上是伤寒。"
 panum.424.t: "斑疹伤寒：合二为一？"
 panum.424.d: "在检查斑疹伤寒患者时，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生发现​​，很多假设都是完全错误的。如果之前的医生诊断出肠道有“病态变化”，那么[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]无法在死于斑疹伤寒的患者身上发现任何此类变化。相反，医生认为肠道疾病是一种必须与斑疹伤寒区分开来的疾病，而将其称为“伤寒”。"
 panum.424.f: "直到19世纪中叶，医生们还没有区分斑疹伤寒和伤寒，它们被简单地认为是同一种疾病，只是症状程度不同而已。1836年，美国医生威廉·格哈德观察到，一些斑疹伤寒患者的肠道并没有受到疾病的影响，尽管在此之前，肠道一直是被诊断出的常见症状之一。此外，类似的观察还使他相信斑疹伤寒并非肠道疾病，而是损害其他器官。几个世纪以来，斑疹伤寒和伤寒不仅在名称上相似，而且在某些语言中也将伤寒称为斑疹伤寒，例如德语。"
 panum.522.t: "两疗程黄热病"
 panum.522.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在对黄热病进行密切观察后，[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]发现这种疾病可以通过两种方式发展。"
 panum.522.f: "医生发现，在许多已知病例中，黄热病的表现都很轻微，几天后就会过去。据估计，每六名患者中就有五名会出现这种轻度黄热病，而另一种黄热病十分危险的，可能致命，患者会出现反复发热，伴有因肝脏受损而引起的黄疸以及腹痛，口腔、鼻腔、眼睛和胃肠道出血且会口吐含血呕吐物，因此黄热病在西班牙语中被称为黑色呕吐。据估计，达到第二阶段的黄热病患者中有 20%至50%会死。"
 panum.523.t: "黄热病季节"
 panum.523.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生发现黄热病疫情遵循一定的时间。"
 panum.523.f: "历史记录和数据表明，黄热病主要发生在夏季。[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生还无法解释为什么这种疾病不像流感那样每年都会发生，而是在很长一段时间内完全消失。令人吃惊的是，黄热病在多雨的年份尤为猖獗。"
 panum.524.t: "局部疾病？"
 panum.524.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在描述黄热病这种疾病时，其强调黄热病是一种仅限于特定地区的疾病，主要传播在沼泽和热带地区，但也有少数例外。"
 panum.524.f: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生查阅了其他黄热病疫情的报告和记录。令人惊讶的是，这些疫情发生在非常有限的地区，主要是非洲和美洲的热带地区和沼泽地区受到影响。尽管在某些情况下，疫情正在进一步向北蔓延，例如到美国的费城和西班牙的巴塞罗那。但医生确信某些气候区与该疾病的发生有关，英国港口曾发生过该疾病的零星爆发，但[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]并不担心，因为该疾病的传播范围并未超出港口城市的周边地区。"
 notification_panum_description_progress_notification_name: "疾病描述进展"
 notification_panum_description_progress_notification_desc: "我们的[concept_panum_physician][ROOT.Var('panum_physician_var').GetCharacter.GetLastName]通过观察流行病获得了新的见解，并获得了额外的线索。"
