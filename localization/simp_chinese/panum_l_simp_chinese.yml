 panum_antitoxins_tech_desc: "抗毒素是一种能够中和特定毒素的抗体，埃米尔·阿道夫·冯·贝林及其同事从1890年开始研制白喉和破伤风的抗毒素，它们被认为是医学史上的伟大里程碑之一。"
