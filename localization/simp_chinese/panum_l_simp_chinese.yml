 panum.2600.t: "新病院"
 panum.2600.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生今天在新精神病院的落成典礼上发表了演讲。"
 panum.2600.f: "许多知名人士也出席了落成典礼，包括反对派政治家。虽然医生指出了新的方法和一系列明确的症状，这些症状会导致患者被送入诊所，但持怀疑态度的政府反对者怀疑这样的机构也可能被滥用。"
 panum.2600.g: "终于为政客、记者、演员找到了合适的地方……"
 panum.2601.t: "紧急遣送"
 panum.2601.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生今天在新精神病院的落成典礼上发表了演讲。"
 panum.2601.f: "“因为某天可能需要找到一个受害者\n我有一个小名单——我有一个小名单\n那些社会上的冒犯者，他们或许应该被埋在地下\n而那些永远不会被想念的人——永远不会被想念！\n那些写签名请求的讨厌鬼\n所有手软无力、笑声刺耳的人\n所有熟记日期并用它们让你哑口无言的孩子\n所有握手时像那样握手的人\n以及所有坚持破坏两人谈话的第三者\n他们一个也不会被想念——他们一个也不会被想念！”"
 panum.2601.g: "[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]已经把他们列入了名单——而他们一个也不会被遗漏！"
 panum.2601.tt: "[SCOPE.sCharacter('chosen_character').GetFullName]永远消失在了精神病院的深处……"
 panum_physician_recent_asylum_conducted_modifier: "最近入住精神病院"
 panum_send_leader_to_asylum_modifier: "精神病学的政治滥用"
 panum_checkmark_loc: "@green_checkmark!"
 panum_cross_loc: "@red_cross!"
 panum.21.t: "“病患分散”原则"
 panum.21.d: "哈辛拜因博士因开发了一种根据伤情严重程度对病患和伤员进行分类的现代系统而受到赞誉，从而提高了患者的生存机会。"
 panum.21.f: "从高加索战争到克里米亚战争的硝烟中，俄罗斯外科医生尼古拉·伊万诺维奇·皮罗戈夫汲取了宝贵的经验，开创性地提出了分级外科治疗程序以及“病患分散”原则。这一原则旨在整顿混乱拥挤的包扎区域，将伤员按照伤情的轻重缓急分为五个阶段（即皮罗戈夫的筛查原则），从而更高效地分配医疗资源。1866年，普鲁士军队率先采纳了俄罗斯的这一先进理念，随后，这一原则迅速在欧洲盟军的医疗服务中推广开来。\n随着时间的推移，许多医学和外科技术的进步也被融入军事医疗服务的组织与实践中。然而，尽管医学领域日新月异，皮罗戈夫的原则在第一次世界大战期间依然屹立不倒，成为战时医疗救治的基石。他的智慧与远见，不仅拯救了无数生命，也为现代军事医学奠定了坚实的基础。"
 panum.21.g: "所以病患还有等级喽？"
 panum.22.t: "疟疾治疗"
 panum.22.d: "通过有效提取金鸡纳树皮中的奎宁，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生发明了一种治疗疟疾的方法。"
 panum.22.f: "在近代早期的欧洲，耶稣会士几乎垄断了使用金鸡纳树皮治疗疟疾的知识与实践，尽管这一疗法最初在一些新教国家引发了不小的争议。然而，随着19世纪初吗啡的发现，奎宁——这一决定金鸡纳树皮疗效的关键成分——也被揭示出来，并迅速成为新兴植物化学领域的基石。1792年，安托万·弗朗索瓦·德·富尔克洛伊首次以不纯的形式提取出了奎宁；而到了1820年，皮埃尔·约瑟夫·佩尔蒂埃与约瑟夫·比奈梅·卡文图通过酒精提取法，成功从金鸡纳树皮中分离出了纯净的奎宁。\n这一突破性的发现很快催生了工业化生产。1823年，药剂师弗里德里希·科赫在奥本海姆首次实现了奎宁的大规模工业化提取，标志着金鸡纳树皮的应用迈入了新的时代。奎宁的发现与生产不仅为疟疾治疗带来了革命性的进展，更推动了植物化学研究的蓬勃发展，为后来的药物学奠定了坚实的基础。"
 panum.22.g: "无价的药物。"
 panum.23.t: "只是另一种类型的患者"
 panum.23.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生今天向政府发送了一封紧急信件。在信中，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]批评了对精神病患者的治疗方式，并主张将他们视为值得更好治疗的患者，而不是需要被社会排斥的反社会人士。"
 panum.23.f: "心理治疗患者的历史迈出决定性的一步，是在18世纪。那时，精神病患者终于不再与普通罪犯一同被“关押”在阴暗的牢房中，而是被安置在专门的机构里——尽管这些机构的条件依然远低于任何人道标准。随后，另一项重要的进步是，精神病患者身上沉重的铁链被废除，取而代之的是更大的行动自由。\n从19世纪初开始，社会逐渐意识到，这些被边缘化的人并非罪人，而是病人，他们同样有权利接受治疗。在英国，1845年通过的《精神错乱法案》成为这一转变的重要里程碑。这部法案明确将精神病患者的身份从“罪犯”转变为“病人”。尽管前路依然漫长，但这一步无疑为现代心理治疗的发展铺平了道路。"
 panum.23.g: "这些人的精神生活也很重要。"
 panum.24.t: "医学与护理知识"
 panum.24.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生提醒我们，资质较低的人员有时可以作为护士在战场上为众多伤员提供巨大帮助，并主张更多地使用女性作为护士。"
 panum.24.f: "在欧洲大陆，尤其是法国和德国，天主教修会长期以来将培训护士视为其神圣使命的一部分。然而，在英国及其他新教国家，这一传统却几乎销声匿迹——宗教改革的风暴席卷之下，鲜有修道院和修会得以幸存。这一缺憾通过弗洛伦斯·南丁格尔的著作被英国公众深刻意识到，并引发了广泛的反思与行动。\n随后，护士的培训被提升为国家的重要任务，社会各界纷纷慷慨解囊，为这一事业筹集资金。南丁格尔在伦敦圣托马斯医院创办的南丁格尔护理学校，迅速成为护理专业化的核心阵地。她以一句简洁而深刻的话语——“医生治病，护士安人”——奠定了现代护理哲学的基石。"
 panum.24.g: "姑娘上前线。"
 je_panum_spanish_flu_research: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]大流感：研究"
 je_panum_spanish_flu_research_reason: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生决定深入探究这场神秘疫情的根源。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]能否取得重大突破尚属未知，但凭借丰富的医学经验，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]无疑更有可能揭开谜团。"
 je_panum_spanish_flu_research_complete_tt: "一位[concept_panum_physician]可以从这场疫情中汲取宝贵的知识：例如，追溯疾病的起源地、详细描述其症状，乃至识别病原体的真面目。"
 state_harvest_condition_panum_spanish_flu_condition_impact_mult: "[GetHarvestConditionType('panum_spanish_flu_condition').GetName][concept_panum_disease]影响"
 state_harvest_condition_panum_spanish_flu_condition_impact_mult_desc: "提高或降低疫情的影响。"
 panum_spanish_flu_physician_help_modifier: "医生对抗疫情"
 panum.1110.t: "医生与疫情"
 panum.1110.d: "疫情的爆发是[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的关键时刻：如今[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]可以大展身手！但问题随之而来：是应该积极对抗疫情，还是深入研究它"
 panum.1110.f: "“在明确我们面对的并非普通流感的那一天，我感到一种强烈的使命感，决心尽自己的一份力。与此同时，我也感受到肩上的巨大压力。期望是如此之高。我是否能够不负众望，实现寄托在我身上的希望？”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]的日记"
 panum.1110.g: "抗击疫情！"
 panum.1110.h: "研究它……"
 panum.1111.t: "瘟疫的病原体"
 panum.1111.d: "我们的首席医师[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士与首席生物学家[ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]博士今天有一惊人的发现——引发[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]大流感的病原体。"
 panum.1111.f: "甲型H1N1流感病毒（A/H1N1），这一甲型流感病毒的亚型，属于正黏液病毒科，如同一位隐形的猎手，潜伏在鸭子、人类和猪中，同时也悄然侵袭着许多其他哺乳动物。H1N1流感病毒因1918年的西班牙流感而在人类和猪中确立，其凶猛的传播力与致命性，已导致数千万人丧生，成为历史上最为惨烈的瘟疫之一。\n\n在西班牙流感肆虐的年代，病原体仍然笼罩在迷雾之中，如同一个未解的谜题。一些研究人员曾怀疑是一种“可过滤病毒”，而当时的教科书中，流感嗜血杆菌被认为是流感的病因。然而，使用常规的细菌学方法却无法检测到病原体：它既不能被染色，也无法在人工培养基上生长。如果说西班牙流感带来了知识的进步，那便是当时这种流感变种的实际病原体仍然未知，从而排除了流感嗜血杆菌作为病原体的可能性。直到1996年，该病毒的基因组才被成功测序，揭开了这一世纪之谜的面纱，为人类对抗流感病毒提供了新的武器。"
 panum.1111.g: "我明白了！"
 panum.1112.t: "疫情的起源"
 panum.1112.d_historical: "经过一项结合历史、犯罪学与医学知识的杰出科学调查，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生取得了突破性发现：这场疫情并非如常言所说出自西班牙，而是源自美国！"
 panum.1112.f_historical: "医生的发现源于一项细致入微的调查，如同一位侦探在迷雾中寻找真相。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]仔细比对患者档案，追溯了我国的首批病例，以重建感染网络，仿佛在拼凑一幅复杂的拼图。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]还收集了国外同行的数据，有时甚至亲自拜访他们，如同一位求知的旅者，跨越国界追寻答案。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]评估了其他医生在其国家进行的类似研究的结果，如同在浩瀚的文献海洋中寻找灯塔的光芒。虽无法确定首次感染的具体地点，但所有线索都指向堪萨斯州。这场疾病实际上起源于美国。"
 panum.1112.g_historical: "这是否意味着我们应该将其称为美国流感？"
 panum.1112.d_dynamic: "经过一项结合历史、犯罪学与医学知识的杰出科学调查，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生取得了突破性发现：这场疫情并非如常言所说出自[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetName]，而是源自[SCOPE.sCountry('panum_pandemic_country').GetName]"
 panum.1112.f_dynamic: "医生的发现源于一项细致入微的调查，如同一位侦探在迷雾中寻找真相。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]仔细比对患者档案，追溯了我国的首批病例，以重建感染网络，仿佛在拼凑一幅复杂的拼图。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]还收集了国外同行的数据，有时甚至亲自拜访他们，如同一位求知的旅者，跨越国界追寻答案。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]评估了其他医生在其国家进行的类似研究的结果，如同在浩瀚的文献海洋中寻找灯塔的光芒。虽无法确定首次感染的具体地点，但这场疾病实际上起源于[SCOPE.sCountry('panum_pandemic_country').GetNameNoFormatting]，却是无疑的科学事实。"
 panum.1112.g_dynamic: "这是否意味着我们应该将其称为[SCOPE.sCountry('panum_pandemic_country').GetAdjectiveNoFormatting]流感？"
 panum.1113.t: "疫情治疗方法"
 panum.1113.d: "在[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]对[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]流感的研究过程中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生发明了多种治疗方法并实践，制定了一套行动计划以遏制疾病。尽管这些发现为时已晚，但它们将为后代提供宝贵的参考。"
 panum.1113.f: "“今天感觉好多了，也穿得整齐了些。因担忧和失眠几乎筋疲力尽。这周有如此多的疾病和死亡，但战争的结果带来了一线光明和希望，因为和平已于过去的11日到来。”\n——海伦·维奥拉·杰克逊·肯特，[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]大流感幸存者"
 panum.1113.g: "好吧，我们总算有所收获。"
 panum.1114.t: "疫情描述"
 panum.1114.d: "遗憾的是，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在疫情期间进展甚微。然而，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]撰写了一份疾病描述，或许有助于识别[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]流感变种的症状。"
 panum.1114.f: "“这些人起初看起来像是患了流感或感冒，被送到医院后，他们却如同被无形的魔爪攫住，迅速发展成有史以来最严重的肺炎。入院两小时后，他们的颧骨上出现了红木色的斑点，如同死亡的印记悄然浮现。几小时后，发绀从耳朵开始蔓延，如同墨色的潮水，逐渐吞噬整个脸庞，直到难以区分有色人种和白人。随后，死亡只是几个小时的事，他们只是挣扎着呼吸，直到窒息，如同溺水者在无尽的深渊中沉沦。这太可怕了。看到一个人、两个人或二十个人死去，你还能勉强忍受，但看到这些可怜的家伙像苍蝇一样倒下，真的会让你神经崩溃，仿佛置身于地狱的边缘，目睹生命的脆弱与无常。”\nN·罗伊·格里斯特，[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]大流感幸存者"
 panum.1114.g: "我们期望再多一点。"
 panum.1115.t: "疫情的秘密"
 panum.1115.d: "遗憾的是，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生未能应对疫情的挑战。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]未能找到关于疾病起源、如何对抗或描述疾病的任何答案。不过，医生写了一首小诗。"
 panum.1115.f: "“我有一只小鸟，\n它的名字叫恩扎（Enza）。\n我打开了窗户，\n流感就飞了进来（in‑flu‑enza）。”"
 panum.1115.g: "令人失望。"
