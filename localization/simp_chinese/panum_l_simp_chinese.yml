 panum_character_treatment_wounded_loc: "#V 伤口#!"
 panum_character_treatment_seriously_injured_loc: "#V 严重外伤#!"
 panum_character_treatment_kidney_stones_loc: "#V $kidney_stones$#!"
 panum_character_treatment_cancer_loc: "#V $cancer$#!"
 panum_character_treatment_syphilis_loc: "#V $syphilis$#!"
 panum_character_treatment_sickly_loc: "#V 身体状况不佳#!"
 panum_character_treatment_cholera_loc: "#V $panum_cholera$#!"
 panum_character_treatment_tuberculosis_loc: "#V $panum_tuberculosis$#!"
 panum_character_treatment_typhus_loc: "#V $panum_typhus$#!"
 panum_character_treatment_yellow_fever_loc: "#V $panum_yellow_fever$#!"
 panum_character_treatment_psychological_affliction_loc: "#V $psychological_affliction$#!"
 panum_character_treatment_shellshocked_loc: "#V 炮弹休克#!"
 panum_character_treatment_alcoholic_loc: "#V 酗酒#!"
 panum_character_treatment_opium_addiction_loc: "#V $opium_addiction$#!"
 panum_character_treatment_fatal_fallback_loc: "“谁能想到，切断那条血管，病人就会丧命呢？”"
 panum_character_treatment_fatal_tripple_death_loc: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生计划进行一次快速手术来治疗[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]患者。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]在短短两分多钟内完成了手术，但不幸截断了一名助手的手指——这名助手后来因感染去世。令人痛心的是，患者后来也因感染去世。此外，一名旁观者的外套下摆也被意外割断，他因误以为自己的重要器官受伤而晕倒，后来被发现死于休克。"
 panum_character_treatment_fatal_unwashed_hands_loc: "手术非常成功。患者当时还活着，所有问题都得到了解决，大家都认为会迅速康复。然而几天后，发现了一种迅速蔓延的感染。仅仅几小时后，患者便去世了。[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生对此感到非常困惑，因为[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]在几分钟前刚做完上一台手术后更换了手术刀。"
 panum_character_treatment_fatal_forgotten_snack_loc: "患者去世后进行了尸检。在患者体内，令所有人惊讶的是，发现了一个被吃掉一半的三明治。直到一名助手回忆起[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在手术期间吃了一个三明治，大家才明白它是如何进入患者体内的。"
 panum_character_treatment_fatal_blood_loss_loc: "起初手术进行得很顺利。看起来[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生成功治疗了患者。然而，患者始终未能康复。似乎失血过多使患者极度虚弱，最终在三天后不幸去世。"
 panum_character_treatment_fatal_morphine_overdose_loc: "手术似乎进行得很顺利，由于使用了吗啡，患者在手术过程中没有感到任何疼痛。然而，遗憾的是，患者再也感觉不到任何疼痛了，因为吗啡的剂量过大，最终导致患者死亡。"
 panum_character_treatment_fatal_drunken_doctor_loc: "当[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在手术期间开始喝医用酒精时，大家都感到有些困惑。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]开始在错误的地方切割，对助手大喊大叫，最终切到了大动脉，这更是雪上加霜。遗憾的是，即使叫来了另一位医生帮忙，患者也未能得救。"
 panum_character_treatment_fatal_forgotten_instruments_loc: "手术成功后，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的患者似乎有所好转。但仅仅一天后，患者便不幸去世。尸检发现，一把手术刀不知为何被遗留在患者体内。当患者再次活动时，手术刀开始搅动组织和血管，导致内出血"
 panum_character_treatment_fatal_deadly_anaesthesia_loc: "一场非常成功的手术却以悲剧告终。患者始终未能从麻醉中苏醒。没有人知道具体原因，但[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生推测，患者的身体已经过于虚弱。"
 panum_character_treatment_fatal_fake_doctor_loc: "起初手术似乎进行得相当顺利。医生一离开房间，情况便急转直下。突然，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生冲进房间，表示[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]对迟到深感抱歉。大家都感到困惑，因为医生刚刚完成了手术。似乎是一个陌生人冒充外科医生进行了手术。遗憾的是，最终患者不幸去世，没有人知道谁该为这起死亡负责。"
 panum_character_treatment_fatal_slippery_floor_loc: "手术进行得非常顺利，直到[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的脚踩到了地上的一滩血。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]滑倒，直接摔在了患者身上。遗憾的是，手术刀刺穿了患者的心脏，导致患者不幸去世。"
 panum.242.t: "病魔钟爱人群"
 panum.242.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生注意到，肺结核始终在人口密集的地区发生，而在人口稀少的地区却极为罕见。"
 panum.242.f: "“我仔细研读了一些推荐气候疗养地治疗肺结核的论文。其中一篇令我深感怀疑，我认为我的同事混淆了相关性与因果关系。他断言山区居民更健康是因为空气更清新，因此不易罹患肺结核。然而，这难道不是显而易见的吗？从根本上说，我们观察到肺结核在山区鲜有发生，正是因为那里人迹罕至。这正契合了南欧的观点，即我们面对的并非瘴气，而是传染源。肺结核，或许终究是一种传染病。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]医生的日记，[TimeKeeper.GetCurrentDate.Format('y')]年于[SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.242.g: "这一理论进一步证实了肺结核是一种传染性疾病。"
 panum.242.h: "这一理论进一步证明了瘴气理论的错误。"
 panum.243.t: "结核病隐士"
 panum.243.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在与一位肺结核幸存者的交流中，获得了一个引人入胜的发现。"
 panum.243.f: "“你说你的兄弟死于肺结核？”\n\n“没错。那时我十九岁。我亲眼看着他死去。”\n\n“而你后来也患上了肺结核？”\n\n“正是。我以为我会像他一样很快死去。这对我来说是安全的。所以我退到一个偏远的地方等死。我想在自然中度过最后的时光，远离文明。”\n\n“但你活了下来。你认为原因是什么？”\n\n“健康的饮食和锻炼。在某个时刻，我积累了足够的力量来战胜疾病。”\n\n“嗯。”"
 panum.243.g: "真的仅此而已吗？"
 panum.244.t: "并非遗传所致"
 panum.244.d: "经过长时间的检查，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生得出结论，几乎没有证据表明肺结核是一种遗传性疾病。"
 panum.244.f: "“如果你在我受训期间告诉我，有一天我会从事家谱研究，我定会感到十分惊讶。然而，除了询问受影响的家庭本身以及当局和神职人员外，几乎没有其他方法可以证实我的理论。如果肺结核确实是一种遗传性疾病，那么它可能会在几代人中未被察觉。有些完整的家族树中没有一例肺结核病例，但它却突然摧毁了整个家庭。一个引人注目的事实是，肺结核并非一种静态的、可控制的疾病，而是在过去几十年中才演变为今天所代表的威胁。让我这样说吧：如果肺结核是一种遗传性疾病，那么我们显然都有这种倾向。正如你在我研究的附录中所看到的，统计数据不言自明。”\n\n——[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]在医学院的演讲"
 panum.244.g: "那么从理论上讲，任何人都可能被感染吗？"
 panum.245.t: "小瘤"
 panum.245.d: "在一次解剖检查中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生对肺组织中的肿瘤有了新的见解，这些肿瘤正是这种疾病得名的原因。"
 panum.245.f: "雷内·拉埃内克发明了听诊器，最初是为了检查肺结核。在随后的几年里，听诊器帮助人们通过早期听诊呼吸系统的变化，更早地检测出这种疾病。与此同时，关于肺结核在体内发展的知识也在不断积累。"
 panum.245.g: "虽是小步前进——但终究是进步。"
 panum.246.t: "生活方式 &免疫"
 panum.246.d: "在深入检查了几位患者及其生平后，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生对关于肺结核病因的传统理论产生了深刻的质疑。"
 panum.246.f: "“在[SCOPE.sState('panum_disease_state').GetCityHubName]对几名患者的检查，包括他们的个人病史，引发了更多疑问而非答案；前提是人们期望真相尽可能简洁明了，而非支离破碎的片段。诚然，无产阶级尤其深受肺结核之苦，但我质疑，在同一环境中，富人是否就能幸免于难。我深信，良好的营养、新鲜的空气与适度的体育锻炼能增强身体的抗病能力——但这并不意味着可以完全杜绝患病的可能。简而言之：我认为，将肺结核归因于某人身为艺术家或无产阶级的观点，在科学上难以立足。若果真如此，肺结核在近年便已选定其‘归属’，如今应更青睐工厂工人而非音乐家与诗人作为其‘精神化’的受害者。然而，无人会真正信服这种说法。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]医生的日记，[TimeKeeper.GetCurrentDate.Format('y')]年于[SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.246.g: "这对一些未被认可的天才而言，无疑是一个沉重的打击。"
 panum.247.t: "法定报告疾病"
 panum.247.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生一直在[SCOPE.sState('panum_disease_state').GetCityHubName]试验一种报告系统，或有助于遏制肺结核的蔓延。"
 panum.247.f: "“[SCOPE.sState('panum_disease_state').GetCityHubName]将肺结核列为法定报告疾病，引发了部分民众的不满，因为许多人视其为私事。然而，事实并非如此，尤其是当它以流行病的形式肆虐时。一旦一种疾病被认定为具有传染性——而肺结核的种种迹象正指向这一点——它便成为可能危及公共福祉的公共事务。与其采取隔离措施，不如将其列为报告疾病。隔离个别感染源的经验表明，无需将整座城市置于紧急状态，亦可遏制肺结核的蔓延。然而，不幸的是，肺结核患者如今所背负的污名，将为他们带来沉重的个人后果。他们如同麻风病人般，遭受着社会的排斥与歧视。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]医生的日记，[TimeKeeper.GetCurrentDate.Format('y')]于[SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.247.g: ""
 panum.248.t: "消灭微生物"
 panum.248.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生开发了一种基于先前微生物学知识的化学工艺，有望在未来预防肺结核。"
 panum.248.f: "巴氏杀菌法是指将液体或糊状食品短期加热至至少72°C至最高100°C，以杀死微生物的营养体，从而温和地保存食品。这一工艺从19世纪中叶开始用于葡萄酒。直到后来才用于生牛奶，因为生牛奶可能传播牛结核病病原体给人类。因此，生牛奶的巴氏杀菌在控制结核病方面发挥了重要作用。这一发现比人们最初想象的更为重要：长期以来，医生、生物学家和化学家认为牛结核病不会传染给人类。甚至结核病专家罗伯特·科赫在这方面也犯了错误，他后来才修正了自己的观点——在这段时间里，许多儿童通过结核病牛奶和黄油感染了结核病。"
 panum.248.g: "我还一直以为牛奶是健康的！"
 panum.249.t: "私人痰盂"
 panum.249.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生注意到一种在患有肺结核的女性中特别流行的配饰。它拥有精致的蓝色玻璃外壳，时尚得让人几乎忘记它其实是一个痰盂。"
 panum.249.f: "“我们这儿大多数人都有这个。它还有个名字，一个绰号，颇有趣味。”她毫无拘束，脸上挂着一副固执而无知的神情，冷冷地吐出了那个令人不寒而栗的词——“蓝海因里希”。\n——托马斯·曼，《魔山》"
 panum.249.g: "倘若每位病人都带着这样的东西……"
 panum.251.t: "一种细胞疾病？"
 panum.251.d: "一位德国专家关于结核病的研究备受瞩目，推翻了[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生之前的结论——因为[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]尚未找到有力的反驳依据。"
 panum.251.f: "“有同僚热情主张，结核病可通过感染传播。当面对众多患者未近结核病者而罹患此疾之事实时，彼等声称或为多年前某处感染所致。应如何证之？反之，吾之研究显示，肺组织之结核结节应释为细胞增殖。故结核病须如癌症般，释为局部细胞增殖之果。其可明确识别为一种体质性疾病。\"\n\n安吉莉卡·哈森拜因博士，《结核病，一种类似癌症之疾》"
 panum.251.g: "所以结核病的机制类似于细胞肿瘤？"
 panum.252.t: "支气管扩张症"
 panum.252.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生发现，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]自以为从结核病患者身上获得的一些所谓发现其实是错误的。这些患者患的是一种完全不同的疾病。"
 panum.252.f: "‘遗憾的是，一些研究结果最终被证明是行不通的。我曾一度认为，在特定情况下，一些结核病患者已经康复。然而，事实却是他们患的并非结核病，而是支气管扩张症。尽管不能完全排除结核病可能会促进支气管扩张的发生，但这两种疾病本质上是截然不同的。因此，研究结果并非普遍适用。这一发现可能会显著延缓找到成功治疗方法的进程。’\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]医生的日记，[TimeKeeper.GetCurrentDate.Format('y')]于[SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.252.g: "浪费时间！"
 panum.253.t: "庸医的玩意"
 panum.253.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生访问了[SCOPE.sState('panum_disease_state').GetCityHubName]的一家疗养院，结果却大失所望。"
 panum.253.f: "“许多同行与知名医学专家纷纷向我推荐[SCOPE.sState('panum_disease_state').GetCityHubName]的疗养院，称其为肺结核领域的典范机构，采用极其严谨的治疗方法。更有患者声称，那里曾创造医学奇迹。\n\n然而，经过数周的实地考察，我意识到这不过是精心策划的营销。尽管院方医生信誓旦旦地向我保证康复率极高，我却发现了截然相反的真相。翻阅患者档案后，我震惊地发现，近50%的入院患者在第一周内便不幸离世。这所疗养院，根本是一场彻头彻尾的骗局！”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]医生的日记，[TimeKeeper.GetCurrentDate.Format('y')]年于[SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.253.g: "可是……可是……晚餐很丰盛啊！"
 panum.254.t: "与“白色死神”的接触"
 panum.254.d: "显然，频繁探访结核病患者带来了意想不到的后果：[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生今天咳血了！"
 panum.254.f: "“这是多么不幸的一天啊。我与肺结核的交集，以及我对这种疾病的所谓了解，如今正以残酷的方式报复着我。一方面，我在诸多层面上都犯了错，我的傲慢理应受到惩罚；另一方面，这也印证了肺结核确为一种传染病。然而，我为这一发现，究竟付出了何等沉重的代价？”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]医生的日记，[TimeKeeper.GetCurrentDate.Format('y')]年于[SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.254.g: "医生会康复的——对吧……对吧？"
 panum.264.t: "论传染"
 panum.264.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生对历史的浓厚兴趣，让[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]偶然发现了一本文艺复兴时期的古籍——其价值难以估量。"
 panum.264.f: "早在1546年，维罗纳医生吉罗拉莫·弗拉卡斯托罗便提出，疾病主要是由类似于后来细菌的微小颗粒感染引起的。因此，他在300多年前就对瘴气理论提出了质疑。关于肺结核，弗拉卡斯托罗也认为这是一种由这些病原体传播的传染病。这本书有时比许多现代论文更具说服力。其革命性在于，弗拉卡斯托罗假设这些所谓的“传染媒介”通过呼吸系统或身体毛孔进入体内，以寻找食物，从而推动疾病的发展。"
 panum.264.g: "这将极大地推动治疗方法的探索"
 panum.264.h: "这远比瘴气理论更具说服力。"
 panum.264.i: "一种微小的病原体，真的能引发肺结核吗？"
 panum.240.t: "肺结核：一种蔓延的疫病"
 panum.240.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生通过大量实验与患者观察，不仅确证肺结核为传染性疾病，更在其专著《[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]》中提炼出多项行之有效的预防策略"
 panum.240.f: "“肺结核是一种可在人际及动物与人之间传播的疾病，这一发现推动了一系列防控措施的出台。\n其一，肺结核患者须与公众隔离，以防扩散。\n其二，将该疾病纳入法定报告范畴，以有效遏制其蔓延。\n其三，颁布公共卫生条例，例如严禁公共场所随地吐痰，或推广使用公共及个人痰盂。\n其四，提升公共卫生水平，最大限度减少无产阶级群体的感染风险。\n其五，严格执行生牛奶的巴氏消毒，确保食品安全。”\n\n摘自：[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]"
 panum.240.g: "肺结核，不再是不可逃脱的命运。"
 panum_add_dubious_yellow_fever_treatment_clues_effect_tt: "这或许是一条线索……大概如此。"
 panum.540.t: "预防？早已预防了！"
 panum.540.d: "历经数周的潜心研究与探索，我们的医生终于找到了一种遏制黄热病蔓延的有效方法！"
 panum.540.f: "“……但最终，一个证据依然确凿无疑，无可辩驳。无论是通过蚊帐、烟雾还是杀虫剂，我的调查表明，只要蚊子的活动路径因任何原因被阻断，黄热病的传播便会戛然而止。因此，这必然是一种由昆虫传播的疾病。若能阻断蚊子的繁殖过程，我们便能有效防止新的蚊子滋生并感染我们的人民。这只是一个方法问题，而我已拟定了一个三点计划。\n\n其一，在当地的池塘、沼泽和湿地上喷洒杀虫剂，使其不再适合蚊子繁殖。若条件允许，彻底排干较小的水体。\n其二，在公共建筑的所有开口处，尤其是医院，部署经过杀虫剂处理的蚊帐和织物覆盖物。\n其三，向民众普及这种疾病由蚊子传播的本质，并鼓励他们使用蚊帐、杀虫剂和烟雾来熏蒸家园。\n\n我深信，若这些方法得以实施，我们便有望在我们的有生之年见证地方性黄热病的终结，彻底击败这个最顽固的敌人。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]"
 panum.540.g: "做得好，医生。接下来，去筹备些蚊帐和杀虫剂吧……"
 panum.541.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生，我们的首席医师，已亲临[SCOPE.sState('panum_disease_state').GetName]，着手调查这场神秘的黄热病。"
 panum.541.f_america: "“我们在黎明前抵达了[SCOPE.sState('panum_disease_state').GetCityHubName]，火车缓缓驶入站台，只见站台空无一人，唯有司机与机车上的同事们携着一壶热汤。鲜少有人会在如此清晨时分下车，而我却几乎无法入眠；当地政府的信件与笔记如重石般压在我心头，信中提及一种奇特的疾病——黄热病。此名源于疾病伴随的黄疸，然而，这仅仅是灾难的开始——呕吐、腹痛、眼内出血，这些症状无情地夺走了无数生命。\n\n尽管这些症状对我们而言并不陌生，早在这些土地首次殖民时期的记载中便有所描述，但这种疾病的本质却始终未被科学所揭示。正是这一谜团，赋予了我唤醒同事们的动力，带领他们走下火车，踏入城市，在煤气灯的光芒下，蚊虫嗡嗡作响，仿佛在嘲弄我们的无知。若我们欲战胜此疾，必须回答一个至关重要的问题：我们究竟在与何物抗争？”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetName]黄热病大疫 "
 panum.541.f_africa: "“正午刚过，我们的船只缓缓驶入港口，船长告知我们已抵达目的地。作为殖民帝国的重要前哨，当地政府向首都报告了一种令他们困惑不已的致命疾病——并非普通的流感，而是臭名昭著的黄热病。对于我，或任何熟谙热带疾病历史的人而言，此病并不陌生……然而，尽管我们深知其诸多致命手段，对疾病本身却知之甚少。\n\n在助手与武装护卫的陪同下，我们在离市中心不远处建立了一间实验室。那里，我们将保存样本、安顿起居，并开展必要的研究，以揭开黄热病的神秘面纱……但首先，我们必须找到这些样本，而蚊虫的无休止侵扰令人不胜其烦。尽管如此，这绝不会阻碍我们前行的脚步。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetName]黄热病大疫 "
 panum.541.g: "跟我来，先生们……（打了个哈欠）。"
 panum.541.h: "……这些可恶的蚊子。"
 panum.542.t: "昨日硝烟"
 panum.542.d: "为了深入探寻这片土地上黄热病的历史渊源，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生决定与当地驻军的指挥官展开深入交流。"
 panum.542.f: "“啊，医生，见到您真是太好了。我的士兵们总是很安心，知道如果疾病来袭，他们会得到您的悉心照料。我能为您做些什么？”\n\n“这是我的荣幸，上校。我听说您可能保存了这里过去战役的记录？不知您是否有关于部队中爆发黄热病的记载？”\n\n“哦，当然有……在这里。那是一场噩梦般的战役，相信我，不仅仅是敌人。许多在战争中倒下的士兵，都是因为恶劣的环境、疾病和暴露。他们称之为消耗。”\n\n“那么……这种消耗特别严重吗？”\n\n“比严重还要糟糕。在疾病和雨季的双重夹击下，士兵们在营地里的恐惧甚至超过了战场。酷热难当，还有无尽的昆虫。”"
 panum.542.g: "昆虫肆虐、疾病横行、雨水连绵……仿佛是大自然亲手编织的一场噩梦。"
 panum.543.t: "悲怆原野"
 panum.543.d: "为了继续[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]探寻黄热病真相的使命，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生离开了定居点，前往一处疑似感染源头的乡村农场。"
 panum.543.f: "“我不得不承认，我花了近一个小时才勉强听懂这种乡村口音，但农场的主人确实提供了不少有价值的信息。尽管这片地区常年潮湿，却仍需依赖灌溉工程。然而，挖掘这些沟渠需要大量人力，由数十名当地劳工承担，他们通常挤在杂乱无章的营房里。这样的环境极易滋生疾病，因此不久后黄热病在此地出现，并不令人意外。\n\n农场主本人推测，这种疾病或许源自某位旅行商人，或是前来收购农作物、运送工具的商队，他无法确定。然而，我对此心存疑虑。黄热病更像是自行在此地冒出的……但若果真如此，它又是如何出现的呢？”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetName]黄热病大疫 "
 panum.543.g: "一种疾病怎么可能就这样……无端地突然爆发？"
 panum.544.t: "水源？"
 panum.544.d: "为了验证黄热病可能是一种水源性疾病的假设，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生从当地的水道和水井中采集了样本进行研究。"
 panum.544.f: "“我曾一度猜测，这种疾病或许与霍乱相似，通过受污染的水源传播。为验证这一假设，我令助手们采集样本，随后寻得一处静谧之地，安放显微镜，以便我能心无旁骛地工作。潮湿的热带空气与蚊虫不绝于耳的嗡鸣令人分神，但不久后，样本逐一置于镜头之下，让我得以窥探那微观世界的奥秘。\n\n然而，这番努力终究徒劳无功。部分样本污浊不堪，甚至夹杂着微小的蠕虫之类，但这些与感染者的分布模式并不吻合——感染者如同散弹般遍布地图。无论如何，我无法从这些水中寻得任何关于黄热病本质的线索……”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetName]黄热病大疫 "
 panum.544.g: "……但如果它们不在那里，那它们究竟隐匿于何处？"
 panum.545.t: "那座岛"
 panum.545.d: "对感染模式中似乎出现的“断层”深感不解，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生毅然前往一处非同寻常的地点——一座岛屿渔场。"
 panum.545.f: "“啊，您一定是医生……哦。请见谅这气味，医生。也请小心别掉进去，那些吃我们丢弃的内脏的鱼，若有机会，恐怕连您也不会放过。”\n\n“……请快说吧。告诉我这个地方的情况。”\n\n“好的，我想您会很高兴知道，这里完全没有疾病。至少没有那种黄热病。”\n\n“为什么？有什么可能让您的人幸免于难吗？”\n\n“或许是因为他们很少在岸上停留。大多数时候他们都在海上，有些人甚至走得更远，一两天都不回来。但我觉得肯定不止这个原因。他们的休息时间都在岛上，在营房或家里，而这里完全没有黄热病。”\n\n“我会调查的……不，等我回去后，我的助手可以来调查。”\n\n“我会确保通知大家的，医生……他们甚至没道别就走了。”"
 panum.545.g: "……但首先，得好好洗个肥皂浴。一个彻彻底底的肥皂浴。"
 panum.546.t: "沼泽气体？"
 panum.546.d: "在古老的瘴气理论可能以一种令人不安的方式回归之际，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生发现了一些惊人的报告——黄热病或许与沼泽的毒气有关！"
 panum.546.f: "“令我深感困扰的是，这里的一切似乎都难以理喻。没有任何现象与我们已知的既定理论相吻合，我仿佛在绝望中抓住最后一根稻草。然而，有一线希望值得深究——沼泽。我的助手们为显微镜准备了载玻片，其上充斥着繁盛的微生物，但我们却无法辨识出任何有价值的线索。尽管如此，瘟疫却在岸边肆虐。靠近这些沼泽的房屋，受黄热病的荼毒最为深重。甚至有人提及，他们在孩提时代便曾染上此病。\n\n然而，我们却找不到任何迹象表明……它是如何传播的。他们不饮此处之水，亦不食此地之鱼，但沼泽的腐臭却随风飘入他们的家园，弥漫于每个角落，疾病随之接踵而至。古老的典籍会高呼‘瘴气’，但这显然无法成立……若非如此，疾病又是如何从沼泽蔓延至家中的呢？”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetName]黄热病大疫 "
 panum.546.g: "……或者也许是占星学的原因……不，这毫无道理……不是吗？"
 panum.547.t: "劲敌"
 panum.547.d: "为了寻求当地专家的支持，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生决定拜访一位潜在的盟友——当地的验尸官。"
 panum.547.f: "“啊，医生，很高兴见到您。如果我不和您握手，请见谅，因为另一个房间里还有一具尸体等着我处理。”\n\n“黄热病？”\n\n“您可能会这么想，但不是。是疟疾，您能相信吗？偏偏在这个时候，我们同时遇到了这两种疾病的爆发。”\n\n“不幸的巧合？”\n\n“也许吧，但我在这里待得够久，已经发现了一种规律。这两种病往往如影随形，更糟糕的是，它们的症状和死亡方式都极为相似。我告诉您，要区分它们真是件令人头疼的事。我差点以为它们是同一种病。”\n\n“这……其实非常有趣。您有详细的记录吗？”\n\n“哦，当然。我会让我的助手把这些记录送给您，尽管我不知道它们能有多大帮助。医生，我不知道这种病是如何传播的，但我敢说，如果您能找到其中一种的源头，您可能也会找到另一种。”"
 panum.547.g: "那么，或许我们能一举两得。"
 panum.548.t: "歧路何终"
 panum.548.d: "对黄热病的本质深感不解，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生已向首都致函，请求进一步的指示。"
 panum.548.f: "“……然而，尽管我竭尽全力，我仍感到茫然无措，不知该如何继续。几乎没有明确的线索来指引我的研究方向，尽管我查阅了大量医学期刊并咨询了当地专家，但我仍无法完全确定黄热病究竟是什么。它无疑是一种疾病，但属于哪种类型？是空气中的疾病，如瘴气？还是水源或食物中的问题？它是如何在人与人之间传播的，或者，是否是从沼泽传播到人？\n\n这些问题我无法回答，甚至可能永远无法揭开真相。如果我不能找到这种疾病的源头，我就无法直接与之对抗，但我的调查也并非毫无成果。我或许找到了两条可能的研究路径：\n\n首先，我们可以尝试找出其传播的某种规律。或许通过集中调查，我们可以发现疾病传播的逻辑，从而阻断它。也许阻止传播会揭示真正的病因。\n\n其次，我们可以尝试开发某种治疗方法或疫苗，或许可以通过研究那些在幼年感染但完全康复的儿童，以及那些幸存者。我们可能不知道它的起源，但我们或许仍能战胜它。\n\n因此，我写信给首都，向你们——尊敬的学者和科学家们——请教：我在这里的研究重点应该是什么？”\n\n来自[SCOPE.sState('panum_disease_state').GetName]的[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的信，[TimeKeeper.GetCurrentDate.Format('y')]年。"
 panum.548.g: "防患未然，事半功倍。"
 panum.548.h: "我们倾尽全力，必将研制出疫苗。"
 panum.551.t: "预防之道"
 panum.551.d: "遵照首都的指示，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生已着手研究如何遏制黄热病的蔓延。"
 panum.551.f: "“……诚然，面对一种我们对其传播方式几乎一无所知、仅知其致命性的疾病，要确定预防措施实非易事。然而，若这是我必须迎接的挑战，那便坦然接受吧。迄今为止，我已发掘出若干颇具希望的线索；尽管我的感染地图零散无序，但某些地方却出现了不规则的‘孤岛’——在这些区域，疫情显著消退，甚至完全绝迹。\n\n我无法佯装自己已洞悉这种疾病的本质，但疾病绝非毫无规律可循。这里隐藏着一种模式，正待我们去揭示。若能将其破解，我们或许便能解开这一谜题，从此彻底摆脱黄热病的阴霾。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetName]黄热病大疫 "
 panum.551.g: "我们正在一砖一瓦地建造一座坚固的堡垒。"
 panum.552.t: "生活切片"
 panum.552.d: "在研究预防黄热病传播的方法时，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的一位助手前来拜访[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]。"
 panum.552.f: "“啊，很高兴再次见到你，小伙子，还有——天哪！这是什么味道？”\n\n“抱歉，医生……我刚从渔场回来，就是您派我去调查的那个地方。我发现了一些非常有趣的事情！”\n\n“看来有趣到你连洗澡的时间都省了……”\n\n“请原谅我，但确实如此。我调查了为什么黄热病没有影响到渔场的工人，并开始追踪到内陆。海岸边有一个熏制房，工人们从那里离开，那里没有人得黄热病。这让我想到……也许烟雾能驱赶它？于是，我开始寻找有大量烟雾的地方，然后找到了这个肥皂制造商，他们在燃烧器中加入了草药和油。他们家里没有一个人得黄热病。”\n\n“嗯……这真是引人入胜的研究。继续你的观察，随时向我汇报，哦，干得漂亮。”"
 panum.552.g: "助手匆匆离去……却让医生陷入了沉思。"
 panum.553.t_america: "使命之地"
 panum.553.d_america: "沿着疫情爆发中的空白区域，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的研究将他们带到了一座古老的殖民传教站。"
 panum.553.f_america: "“我们很快便找到了这里的传教站。它是殖民时期最早建成的建筑之一，我们的先辈们刚从他们可能再也无法踏足的故土远道而来。它并非宏伟的大教堂，却饱含爱心而建。随着时间的推移，传教士与母教会的成员们见证了它的成长，逐渐扩展出独立的病房与厅堂。它是最早收治病患的场所之一，由修女与虔诚的志愿者悉心照料。\n\n按理说，它本应成为另一处死亡之地……然而，事实却并非如此。其他医院在统计死亡人数时，目睹疾病在病房间肆虐，而这里却安然无恙。一户人家在火灾后被送至此处，尽管他们被安置在仅隔几间房的地方，一周后却无一人感染黄热病。这令我深感困惑，因为传教站与医院颇为相似，但有一处显著不同：蚊帐。布道乃神圣之事，岂容蚊虫嗡鸣打扰？因此，神职人员在每扇窗户上都安装了蚊帐，以阻挡蚊虫，甚至连病房也不例外。\n\n就这样，黄热病仿佛彻底销声匿迹。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetName]黄热病大疫 "
 panum.553.g: "因我将使你重获健康……"
 panum.553.t_africa: "贫民窟"
 panum.553.d_africa: "沿着疫情爆发中的空白区域，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的研究将他们带到了一个奇特的地方——贫民窟。"
 panum.553.f_africa: "“贫民窟近在咫尺，其惨状足以令任何人对我们在这片土地上的伟大殖民事业心生疑虑。肮脏破败的房屋中，挤满了妇女与孩童，她们翘首以盼，等待着男人们从种植园、矿山或其他劳作的场所归来。过度使用的水泵旁，水壶满溢，苍蝇嗡鸣，卫生设施的极度匮乏，使此地宛如疾病的熔炉。事实也的确如此。\n\n在这般地方，像我这样的医生实属罕见。在当地向导与警察的护送下，我被急切地带往一户又一户人家，为各种疾病提供诊断。作为交换，我向他们询问：黄热病呢？我见到了霍乱与痢疾的病例，却未寻得我正追查的疾病。一位妇女指向窗户，或者说窗户的位置——那里并无玻璃，而是一层织物，一张网。对她们而言，这不仅能阻挡疟疾，或许也能抵御黄热病……她们相信，黄热病极有可能是由昆虫传播的。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetName]黄热病大疫 "
 panum.553.h: "……或许，仅仅是或许，当地人的看法是对的？"
 panum.554.t: "头号杀手"
 panum.554.d: "在仔细研读当地军队提供的记录后，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生有了重大发现。"
 panum.554.f: "“啊，很高兴再次见到您，上校。关于您给我的这些记录，我有一些问题想问。您有时间吗？”\n\n“哦，当然！只要能帮上忙。”\n\n“这里提到，上一次战役是由一位军官领导的，他似乎深受虫咬困扰。”\n\n“恐怕不仅是困扰，还非常非常恼火。虫咬是这片土地生活的一部分，但它们从哪儿来的……没人知道。”\n\n“我明白了，我明白了……但这里还提到，军队同时感染了疟疾和黄热病，因病死亡的人数比战死的还多。”\n\n“恐怕消耗战一直是战争的一部分。”\n\n“……但一旦他们下令使用除虫菊，黄热病和疟疾的病例就急剧下降。然后，一周后，他下令对当地进行喷洒，病例再次下降。这个除虫菊到底是什么？”"
 panum.554.g: "哦，除虫菊？那是用来给士兵们除虱的。你知道，它能杀死昆虫。"
 panum.555.t_america: "往昔的回忆"
 panum.555.d_america: "在与困扰南美洲数百年的疾病展开激烈斗争的过程中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在一个意想不到的地方寻找答案——过去。"
 panum.555.f_america: "“有人说，过去是一个截然不同的国度。在美洲，这一点或许比其他任何地方都更为真切，因为自哥伦布以来，沧海桑田，世事变迁。然而，令我惊讶的是，我所对抗的疾病却未曾改变。我耗费数周时间，终于寻得这片土地上首批殖民者的日记与记录，它们如今已落入我手。这是一项弥足珍贵的发现。通过这些记载，我得以窥见昔日医者的描述，那些才智超群却缺乏我们今日视为理所当然的工具的先驱们。\n\n尽管我们或许继承了这场未竟之战，但他们为我们留下了宝贵的信息，这些信息或许能助我完成他们未竟的事业。其中隐藏着一个珍贵的启示，若无这些记录，实难察觉。每隔一段时间，这片区域便会爆发黄热病，几乎如时钟般规律。这一点本身或许无甚价值，但它几乎与那些提及强降雨甚至洪水的记录完全吻合——这里记载着房屋在洪水中被冲毁，随后黄热病肆虐。这两者之间，是否存在着某种关联？”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetName]黄热病大疫 "
 panum.555.g: "我们都站在巨人的肩膀上……只是他们当时能依靠的巨人更少。"
 panum.555.t_africa: "民间偏方"
 panum.555.d_africa: "或许颇具争议，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生向可能最了解黄热病的人——当地居民——寻求了建议。"
 panum.555.f_africa: "“或许有人会因我选择咨询当地人而非医学期刊而斥我为疯子，但我认为，他们的判断缺乏合理的依据。黄热病是一种在非洲这片土地上发现的疾病，而当地人在这里生活的岁月远比我们悠久。事实上，这种疾病最初或许便是在这片土地上诞生的。也许正是如此，这里的疫情往往能轻易夺走欧洲人的性命，而对非洲当地人而言，症状却仅如轻微的流感。\n\n然而，尽管如此，他们对此有着深刻的理解。我与多位当地治疗师，甚至内陆部落的代表交谈过，他们提及了一些预防措施……燃烧大象粪便与各种植物，甚至将烟雾引入室内，以驱赶他们认为与疟疾有关的蚊子，或许黄热病亦在其中。不仅如此，他们还有一种方法，能够解读周围的土地，预测‘雨季’的到来，他们认为这与疟疾和黄热病的高发期息息相关。这需要进一步的研究与思考，但这一发现无疑令人充满希望。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetName]黄热病大疫 "
 panum.555.h: "智慧，往往藏于最意想不到之处。"
 panum.556.t: "新式织物？"
 panum.556.d: "尽管这些浸有杀虫剂的新织物原本是为了支援前线驻军，但它们已经抵达了[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生正在调查的同一座城镇。"
 panum.556.f: "“你是来这儿的吗——哦，我明白了，你是从首都来的医生。我不知道这里有什么能帮到你的，医生。这里没有一例那种发烧的病例。”\n\n“……据我所知。这是什么？”\n\n“后方的将军们发现，他们可以直接把杀虫剂浸入织物里，把那些该死的虫子挡在外面。看到了吗？看看地上。几十个家伙，已经死了。”\n\n“这么快就能杀死它们，一定非常有效。有多少人住这些帐篷？”\n\n“差不多一个营，大概六百人。这些织物是新的，因为去年季风把旧的都毁了。那段时间真是糟糕，到处都是发烧和疟疾。现在我们有了这个，什么都没有了。”"
 panum.556.g: "……你刚才说，自从有了这种新织物后，就没有一例发烧病例？"
