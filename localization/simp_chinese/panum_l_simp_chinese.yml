 panum_cholera_desc: "霍乱是一种危险的小肠传染病。它被认为是19世纪的最危险流行病，在全球范围内导致数百万人死亡。"
 panum.2626.t: "[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]医生电台"
 panum.2626.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在电台推出了一档全新节目，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]以专业视角为听众排忧解难，节目形式新颖，深受大众喜爱。"
 panum.2626.f: "“你好，伊森。我在听。”\n“你好，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生。”\n“你多大了？”\n“我十三岁。”\n“那么，我能为你做些什么呢？”\n“嗯，我在学校和其他孩子有很多矛盾。他们总是欺负我。”\n“你觉得这是为什么？”\n“可能因为我聪明。我的智商有160。我参加了天文俱乐部，而且我讨厌运动。”\n“嗯，伊森，你知道的，其他孩子只是出于嫉妒和不成熟才这样做的。我知道现在这对你没什么帮助，但几年后，你会笑到最后的。”\n“就这样？”\n“是的。”\n“坦白说，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生，我觉得这个建议居高临下、过于简单，而且说实话，毫无新意。真正让我惊讶的是，他们居然付钱让你说这些空话。”\n“伊森，你从哪里打来的电话？”\n“家里。”\n“好吧，如果伊森的同学正在收听节目，你们知道他在哪儿，而他不可能永远待在那里。感谢你的来电。”"
 panum.2626.g: "等等，我听过这个电台！"
