 je_group_panum_medicine: "赤色晨曦：#ORANGE 潘努的医学#!"
 je_panum_cholera: "霍乱疫情"
 je_panum_cholera_reason: "霍乱被认为是19世纪最严重的流行病，如同鼠疫之于中世纪。它的传播速度比其他任何疾病都要快，而且种类繁多，足以致命。\n\n#ORANGE 现代排水系统#!的发明在对抗霍乱方面可发挥巨大作用，基于这项科技，[concept_panum_physician]可以找到一种#V 治疗霍乱的方法#!。中等水平的优秀医疗系统也有助于预防或治愈霍乱。如果[concept_gaudi_architect]为首都配备了现代化的下水道系统，那么霍乱基本上上将不会在当地爆发。\n\n为了根除霍乱，[concept_theiler_biologist]需要开发出一种#V 霍乱疫苗#!。"
 je_panum_tuberculosis: "结核病疫情"
 je_panum_tuberculosis_reason: "与霍乱一样，结核病是19世纪最常见的致死原因之一。这种被称为“白死病”的病症，最初被视为一种浪漫的疾病，但逐渐演变为患者主要为无产阶级得疾病。结核病主要集中于生活水平较低、城市化程度较高的地区。\n\n#ORANGE 巴氏灭菌法#!的发明在对抗结核病方面可发挥巨大作用，基于这项科技，[concept_panum_physician]可以找到一种#V 治疗结核病的方法#!。优秀医疗系统也有助于预防或治愈结核病。这一切促进了对疾病的更有效预防和治疗。在某些情况下，气候疗养胜地可能被用作应对结核病的一种措施，尽管其治疗效果尚存疑虑。\n\n为了根除结核病，[concept_theiler_biologist]需要开发出一种#V 结核病疫苗#!。"
 je_panum_smallpox: "天花疫情"
 je_panum_smallpox_reason: "天花是人类历史上最严重的灾难之一，曾导致整个民族的灭绝。随着种痘术和天花疫苗的推广，这种疾病在18世纪逐渐失去了它的威胁性，但若不采取预防措施，它仍有可能卷土重来\n\n#ORANGE 预防接种#!的发明在对抗天花方面可发挥巨大作用，基于这项科技，[concept_panum_physician]可以找到一种#V 治疗天花的方法#!。初步发展的医疗系统也有助于预防或治愈霍乱。这都将促进了对疾病的更有效预防和治疗。\n\n为了根除天花，[concept_theiler_biologist]需要开发出一种#V 天花疫苗#!。"
 je_panum_typhus: "斑疹伤寒疫情"
 je_panum_typhus_reason: "尽管斑疹伤寒自中世纪晚期就已为人所知，但其最具毁灭性的影响出现在拿破仑战争期间。因此，1815年后的几代人中，斑疹伤寒仍然令人恐惧，它能够迅速传播至多个国家，受灾严重的地区尤其容易受到打击。因此，斑疹伤寒被视为一种典型的战争疾病，特别对士兵及其拥挤的营房影响显著。\n\n#ORANGE 抗生素#!的发明在对抗斑疹伤寒方面可发挥巨大作用，基于这项科技，[concept_panum_physician]可以找到一种#V 治疗斑疹伤寒的方法#!。初步发展的医疗系统也有助于预防或治愈霍乱。这都将促进了对疾病的更有效预防和治疗。\n\n为了根除斑疹伤寒，[concept_theiler_biologist]需要开发出一种#V 斑疹伤寒疫苗#!。"
 je_panum_yellow_fever: "黄热病疫情"
 je_panum_yellow_fever_reason: "黄热病是一种通常在热带地区附近发生的区域性疾病，但在19世纪，它扩散到了美国南部和欧洲。尽管这种疾病通常只在少数几个国家传播，但其造成的损失同样严重。\n\n#ORANGE 疟疾预防#!的发明在对抗黄热病方面可发挥巨大作用，基于这项科技，[concept_panum_physician]可以找到一种#V 治疗黄热病的方法#!。初步发展的医疗系统也有助于预防或治愈霍乱。这都将促进了对疾病的更有效预防和治疗。\n\n为了根除天花，[concept_theiler_biologist]需要开发出一种#V 黄热病疫苗#!。"
 panum.100.t: "[TimeKeeper.GetCurrentDate.Format('y')]年的霍乱疫情"
 panum.100.d: "#YELLOW 霍乱#!，人类历史上最大的灾难之一，已经蔓延到我们的一个城市！黑暗时代又要开始了——霍乱将在全国蔓延并造成损失。"
 panum.100.f: "霍乱是东亚特有的疾病，可能以局部流行病的形式在印度次大陆出现，但在其他地区并不为人所知。第一次霍乱大流行发生在1817年至1824年间，影响了亚洲部分地区、东非和小亚细亚，随后影响了俄罗斯和欧洲。1830年，它出现在东加利西亚和匈牙利，1831年6月出现在维也纳。它在全球共经历了六次大流行，成为新兴工业社会的祸害。虽然大多数感染者没有症状，但如果不及时治疗，初期死亡率高达20%至70%。"
 panum.100.g: "死神即在眼前。"
 panum.102.t: "霍乱疫情波及[SCOPE.sCountry('panum_infected_country').GetName]"
 panum.102.d: "我们收到报告称，[SCOPE.sCountry('panum_infected_country').GetName]出现首例霍乱病例，当局指责我们没有采取足够措施来防止霍乱蔓延。"
 panum.102.g: "这都要怪我们？"
 panum.103.t: "工厂霍乱"
 panum.103.d: "[SCOPE.sState('panum_disease_state').GetName]的几家工厂报告了工人中的首例霍乱患者，当地政府正在提议制定相关法规，以防止霍乱蔓延。这将对该行业产生巨大影响。"
 panum.103.f: "上周，城郊的一座水磨坊里出现了首位霍乱患者。尽管该建筑已被隔离，但下游的几家工厂中还是有人感染了霍乱。目前。疾病的传播途径尚未厘清，但已有当地政客提议实行严厉的隔离措施以挽回民心。"
 panum.103.g: "这些工厂要进行隔离！"
 panum.103.h: "工厂要运作，工人要上班。"
 panum.104.t: "[SCOPE.sCharacter('disease_victim_scope').GetFullName]已感染霍乱！"
 panum.104.d: "就在几天前，[SCOPE.sCharacter('disease_victim_scope').GetFullName]看起来还健康得很，但就在昨晚，[SCOPE.sCharacter('disease_victim_scope').GetSheHe]身上就已经出现了那种席卷[ROOT.GetCountry.GetNameNoFlag]的疾病的早期症状。[SCOPE.sCharacter('disease_victim_scope').GetHerHis|U]的健康状况让人十分担忧。"
 panum.104.f: "19世纪的前两次霍乱疫情中也夺去了许多著名人物的生命。在普鲁士，哲学家格奥尔格·弗里德里希·威廉·黑格尔和将军奥古斯特·奈德哈特·冯·格奈森瑙都死于1831年的霍乱疫情。作曲家彼得·伊里奇·柴可夫斯基也被认为是霍乱的受害者，尽管他的死亡原因——有意或无意地摄入受污染的水——仍存在争议。"
 panum.104.g: "搞好医疗保障服务！"
 panum.104.h: "我们最好的医生将亲自照顾[SCOPE.sCharacter('disease_victim_scope').GetHerHim]。"
 panum.104.i: "[SCOPE.sCharacter('disease_victim_scope').GetSheHe|U]没那么重要……"
 panum.105.t: "富人的“出埃及记”"
 panum.105.d: "[SCOPE.sState('panum_disease_state').GetName]的上流人士们为了尽快逃到乡下而不吝“金玉”，大笔大笔的贿赂不断冲击着隔离规定，大众对此嗤之以鼻。"
 panum.105.f: "霍乱与中世纪瘟疫的一个相似特点就是——镰刀下不分贫富，难怪在贵族们看来不区分阶级的霍乱颇具革命意味。有权有钱的家庭都在尽力逃离霍乱的魔爪——对他们的纵容也使得霍乱在这些社会冲突中成了一个政治问题。人们常说，19世纪30年代初期欧洲的霍乱疫情与革命运动有一定的联系。"
 panum.105.g: "让他们走吧。"
 panum.105.h: "某些事情面前——众生平等。"
 panum.106.t: "反对派试图借霍乱发难"
 panum.106.d: "反对派正利用疫情清算现政府——指责他们在应对疫情时犯了大错。"
 panum.106.f: "霍乱疫情的政治及社会影响使其成为了人们特别是自由派狠狠鞭笞保守派的领域。更新更进步的措施与办法被纷纷提出以取代“落后”的精英。令人惊讶的是，这种保守派与自由派的对立，在不同的环境下和与不同的政党之间不断重演。"
 panum.106.g: "我方就携手抗疫一事愿意让步。"
 panum.106.h: "一切尽在本届政府掌握之中。"
 panum.107.t: "集体坟墓"
 panum.107.d: "在[SCOPE.sState('panum_disease_state').GetName]新挖的大规模墓穴引发了越来越多的批评，尤其是下层阶级对此表示强烈不满。他们认为，这种做法更像是一种机械化的处理过程，而不是对逝者应有的尊重和照料。"
 panum.107.f: "随着大规模死亡和可能的感染风险的增加，集体埋葬死者成为了一种不可避免的现象。富裕的市民能够负担起传统形式的葬礼，而穷人的遗体则只是草草埋葬，这种现象加剧了社会的不满情绪，带来了巨大的社会紧张局势。"
 panum.107.g: "我们没时间浪费在葬礼上！"
 panum.107.h: "每个人都该有体面的葬礼。"
 panum.108.t: "霍乱医院"
 panum.108.d: "某些政党出于自身利益，决定为底层大众设立霍乱医院。然而，这些医院并不受欢迎。"
 panum.108.f: "在霍乱或肺结核等疫情期间建立大规模收治医院常常引发争议。人们更乐意在家中照看病患而不是把他们送去与其他病人挤在某个狭小空间的医院里去，许多人坚信那里远不如家中安全。\n另有一种广为流传的说法——这种医院是为了保护有钱人，而非穷人。"
 panum.108.g: "有必要就把他们抓进医院！"
 panum.108.h: "倔牛拽不回头啊。"
 panum.109.t: "大众恐慌"
 panum.109.d: "尽管[SCOPE.sState('panum_disease_state').GetName]政府已经竭尽全力，民众还是开始陷入任何疫情中最危险的部分之一：恐慌。"
 panum.109.f: "以下是《[SCOPE.sState('panum_disease_state').GetName]时报》关于[TimeKeeper.GetCurrentDate.Format('y')]年疫情爆发的新闻报道摘录：\n\n“当我们轻易地将自己置于地球上其他生物之上时，理性的面具似乎为我们提供了一层薄弱的安慰。但当这层伪装被撕下，你会看到一个真相：人类依旧是动物，依旧被对未知明天的恐惧与忧虑无情地支配。疾病的爆发与传播，无情地摧毁了人类的自信，甚至连最老练的军队都难以抵御，因为谁能与看不见的敌人对抗？不，恐惧深深侵蚀了他们的内心，让他们在每个阴影中都看见潜伏的威胁。每一个角落都充满了敌意，每一处敌意都需付出鲜血来平息。染病的人被石块砸中，他们的存在成为必须被驱逐的罪名。那户人家从未出门的传闻如瘟疫般扩散。原本宁静而诚实的灵魂，现在手握枪械，返回家中，不再祈求下一个敲门声带来援助，他们只惧怕迎来的会是劫掠与毁灭。\n\n“这不是世界的终结，而是虚妄的崩塌：人类，不过是被恐惧奴役的动物。”"
 panum.109.g: "该死的恐慌！说不通道理的话我们还能做什么？"
 panum.110.t: "共同目的"
 panum.110.d: "[SCOPE.sState('panum_disease_state').GetName]中的霍乱大爆发似乎促进了民族团结意识的形成，该地区的人民已经团结一致抗击疫情。"
 panum.110.f: "以下是《[SCOPE.sState('panum_disease_state').GetName]时报》关于[TimeKeeper.GetCurrentDate.Format('y')]年疫情爆发的新闻报道摘录：\n\n“医院的病房总是弥漫着一种阴郁，因为它迫使我们正视一个不愿面对的现实：我们生活在一个充满疾病与脆弱的世界。而疾病，从不在乎你是谁，不在乎你的宗教信仰、社会地位、肤色，或是你心中藏着的任何政治倾向。当你环顾四周，望向那些躺在病床上的人，你不会看到身份或标签，只会看到一个男人、一位女人，或是一个孩子，他们都是需要帮助的灵魂。在此时此刻，他们不在乎谁来提供帮助，无论医生是神父、士兵，还是一个默默无闻的普通工人，只要有人愿意牺牲时间，冒险去拯救这些素不相识的生命，他们便感激涕零。那些平日里将人区分为君主主义者、共和主义者，或是煽动者的标签，在此刻全都失去了意义。患者们看到的，不是一个被冠以任何头衔的角色，而只是一个人。\n\n“在他们的眼中，映现的不过是一个兄弟、一个儿子、一个同胞，而最重要的，一个和他们一样在痛苦中挣扎的人类个体。”"
 panum.110.g: "面对霍乱，我们将团结一致！"
 panum.111.t: "地狱之景"
 panum.111.d: "[SCOPE.sState('panum_disease_state').GetName]的尸体已经堆积成山，家家户户都有霍乱患者，该地区已经成了霍乱疫情的重灾区。"
 panum.111.f: "柏林在1831‑1873这42年间，共经历了13次霍乱流行，其中1848/1849、1852、1855及1866这四次疫情在整个普鲁士中都显得尤为严重。1866年，仅官方数据就有114683人死于霍乱。而在伦敦，1848/1849年疫情的破坏性远超1832年，当时伦敦约有15000人——多于城市总人口的0.5%——因此丧生。1849年9月的第一周，每天约有300人去世。在俄罗斯，1852‑1860的第三次大流行期间，约有100万人因此而死——正在进行的克里米亚战争大大加剧了霍乱的破坏性。英国总司令拉格伦勋爵和法国舰队指挥官阿曼·约瑟夫·布鲁阿都死于霍乱。据信，死于霍乱的人数超过了战争中的伤亡人数。"
 panum.111.g: "还有多少？！"
 panum.120.t: "霍乱疫情结束"
 panum.120.d: "整个[ROOT.GetCountry.GetNameNoFlag]都松了一口气——当局声称——已无新增霍乱病例，紧急状态结束了。现在该缅怀死者并继续生活下去了。"
 panum.120.f: "“愿天佑我垂怜，愿神明护佑此新年。愿这一年虽苦，仍能结出果实；愿这一年虽乱，仍得片刻安宁；愿全人类在苦难中不至离散；愿霍乱虽猖獗，终有一日得以消弭。”\n——贾科莫·梅耶贝尔"
 panum.120.g: "但代价是什么呢？"
 panum.200.t: "结核病疫情"
 panum.200.d: "最新疫情——#YELLOW 结核病#!正在摧毁[SCOPE.sState('panum_disease_state').GetName]！"
 panum.200.f: "中世纪早期，结核病对人口稀少的欧洲影响不大，只在几个拥挤的大都市里才有比较强的存在感。继15世纪下半叶在意大利爆发之后，历史上规模最大、持续时间最长的结核病流行始于17世纪。19世纪和20世纪初，结核病作为城市贫民的地方病受到广泛关注。1815年，英国四分之一的死亡病例和1918年法国六分之一的死亡病例都是由结核引起的。大约在1880年，德国15至40岁年龄段的每两例死亡中就有一例是由结核病引起的。结核病也是农村地区最常见的死亡原因。"
 panum.200.g: "结核——浪漫之死。"
 panum.220.t: "结核病疫情结束"
 panum.220.d: "城市和乡村的医生报告称，结核病的高峰已经过去了几个星期。尽管这种疾病尚未完全消失，但其发病率已恢复到通常的水平。"
 panum.220.f: "“你最后的、最可爱的希望已成泡影；\n他是一朵鲜花，花瓣还没有张开\n便受到寒气，没有结实而丧了命”\n——珀西·比希·雪莱，《阿多尼》"
 panum.300.t: "天花疫情"
 panum.300.d: "最新疫情——#YELLOW 天花#!正在摧毁[SCOPE.sState('panum_disease_state').GetName]！"
 panum.300.f: "天花可能早在一万二千年前的东北非洲的第一个人类定居点就出现了。之后，该病毒又可能被埃及商人带往印度。欧洲殖民者又把天花带到了美洲，自1518年起，可能有数百万印第安土著在天花大流行中丧生。从十八世纪起，天花病例显著增加，逐渐取代鼠疫成为最严重的疾病之一。据估计，每年有40万人死于天花，幸存者中约有三分之一失明。在欧洲，直到十八世纪末，高达10%的幼儿因天花而死，人们都把这看作是“儿童病”。通常，只有在孩子们幸存过天花后，他们才被视为家庭的一部分。尽管天花疫苗在18世纪末被成功引入，但天花仍然在19世纪下半叶保持着流行的状态。"
 panum.300.g: "我想——化妆品很快就要供不应求了。"
 panum.320.t: "天花疫情结束"
 panum.320.d: "人类所知的最恐怖的瘟疫之一——天花正在慢慢从[ROOT.GetCountry.GetNameNoFlag]中消失。那些幸存幸存下来的患者要与他们的瘢痕相伴一生了。"
 panum.320.f: "“未来的人们将铭记天花的可憎，而正是你将其驱逐。”\n——托马斯·杰斐逊"
 panum.400.t: "斑疹伤寒疫情"
 panum.400.d: "最新疫情——#YELLOW 斑疹伤寒#!正在摧毁[SCOPE.sState('panum_disease_state').GetName]！"
 panum.400.f: "斑疹伤寒——战争与荒难之友，虽然直到十六世纪才出现可靠的记载，但其作恶的时间可能远早于此。在拿破仑远征俄罗斯时，斑疹伤寒是法军面临的一大问题。大军团于1812年6月渡过涅曼河，又在1813年秋撤退到法国领土上的第一个驻扎点美因茨，仅在此处，就有15000至17000名法军士兵及相同数量的平民因病去世——当时的人们将其称为“神经性发热”——主要是因其引发的神经系统症状。1814年10月末，仅维尔茨堡大公国的法兰克尼亚地区记载中的14000例斑疹伤寒中就有2500人死亡。1918至1922年的俄国大流行期间，由于接踵而至的战争乃至内战，可能有250万人因斑疹伤寒而死。"
 panum.400.g: "或许你能换件衣服？"
 panum.420.t: "斑疹伤寒疫情结束"
 panum.420.d: "看来斑疹伤寒疫情的最严重阶段已经过去。尽管尸体统计尚未完成，但目前已显而易见，这场可怕的疫情没有人可以为之负责。"
 panum.420.f: "“斑疹伤寒患者是我所知的唯一会拒绝喝茶的英国患者，而重新升腾起喝茶的欲望则是他们好转的第一个迹象。”\n——弗洛伦丝·南丁格尔"
 panum.500.t: "黄热病疫情"
 panum.500.d: "最新疫情——#YELLOW 黄热病#!正在摧毁[SCOPE.sState('panum_disease_state').GetName]！"
 panum.500.f: "黄热病是非洲与南美洲等热带/亚热带地区的地方性疾病，可能起源于非洲并经由三角贸易传往新世界。在十八、十九世纪，中美洲、加勒比海以及现今美国南部地区都深受黄热病影响。有可靠记载的流行可能是在1648年的尤卡坦——当时人们称之为“黑吐病”。此后，至少有25次大流行，如1793年费城疫情——时任美国总统乔治·华盛顿及其政府都不得不逃离此地。北美洲黄热病最早的医学描述应该出自查尔斯顿的医生约翰·莱宁之手（1756年），该地曾于1728年与1732年两度爆发过黄热病。1867年佛罗里达州杰斐逊堡与1878年密西西比河谷都有过大流行，后者约有两万人死亡。1905年新奥尔良是美国最后一次大流行。欧洲也有零散的黄热病爆发记录——1821年巴塞罗那有数千人因此丧生。"
 panum.500.g: "是腐烂的水果引发的吗？"
 panum.520.t: "黄热病疫情结束"
 panum.520.d: "在整个街区和无数家庭被暗中为害的黄热病摧毁后，医生和当局宣布解除警报，疫情终于结束了。"
 panum.520.f: "“它被称为黄热病，但与医生所知道或从书上读过的任何病症都不同。”\n——托马斯·杰斐逊"
 building_panum_tuberculosis_sanatorium: "结核病疗养院"
 pmg_panum_sanatorium: "结核病疗养院"
