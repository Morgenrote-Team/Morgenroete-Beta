 panum.600.t: "麻疹疫情"
 panum.600.d: "最新疫情——#YELLOW 麻疹#!正在摧毁[SCOPE.sState('panum_disease_state').GetName]！"
 panum.600.f: "如天花一般，麻疹于10世纪为波斯医者拉齐所提及，似于中世纪时已广布欧亚之地。麻疹在欧洲乃地方性疫病，直至19世纪，随城市化之推进，其重要性愈增。麻疹之特征，乃皮疹始于面颈，数日内遍及全身。与天花并论，麻疹亦被视为16世纪肆虐印度土著之疫病之一。"
 panum.600.g: "但这只是一种无害的儿童疾病……对吧？"
 panum.620.t: "麻疹疫情结束"
 panum.620.d: "麻疹疫情似已告终。最后一对父母，含泪葬其夭儿。"
 panum.620.f: "“如麻疹般，爱情于暮年最为凶险。”\n——拜伦勋爵"
 panum.602.t: "麻疹疫情波及[SCOPE.sCountry('panum_infected_country').GetName]"
 panum.602.d: "我们收到报告称，[SCOPE.sCountry('panum_infected_country').GetName]出现首例麻疹病例，当局指责我们没有采取足够措施来防止麻疹蔓延。"
 panum.602.g: "别无他法……"
 panum.603.t: "儿童杀手——麻疹"
 panum.603.d: "[SCOPE.sState('panum_disease_state').GetName]麻疹疫情之严峻，远超预期。此疫于婴幼之间尤为肆虐，令整整一代人元气大伤，难以复原。"
 panum.603.f: "麻疹一直被视为一种儿童疾病，尽管它也可能影响成年人。它在2至3岁之间表现出最具破坏性的影响。随后死亡率迅速下降。1963年，在疫苗发明之前，官方统计数据显示，全球每年有200万人死于麻疹。大约5%到10%的病例以死亡告终。"
 panum.603.g: "这种可怕的疾病难道无药可治？"
 panum.604.t: "麻疹令水手瘫痪"
 panum.604.d: "由于某些神秘的原因，[SCOPE.sState('panum_disease_state').GetName]的麻疹尤其侵袭了渔民和水手。虽然死亡率微乎其微，但在渔场和捕鲸者中，工作损失却显而易见。"
 panum.604.f: "在法罗群岛的研究中，彼得·潘努发现麻疹同样会侵袭成年人，尤其是在较为孤立的人群中。这一现象的原因长期以来一直成谜；然而，值得注意的是，那些远离繁华城镇的渔民及其家人尤其容易受到影响。"
 panum.604.g: "但现在谁还会出海呢？"
 panum.605.t: "麻疹中的儿童诊所"
 panum.605.d: "[SCOPE.sCharacter('panum_government_leader').GetFullName]注意到[SCOPE.sState('panum_disease_state').GetName]有大量儿童感染麻疹，尤其是在死亡率较高的贫困家庭中。这位政治家计划为一家麻疹儿童诊所提供资金支持，并已向公众发起捐款倡议。"
 panum.605.f: "“目睹[SCOPE.sState('panum_disease_state').GetName]善良之父母受此恶疾所困，实乃憾事。政界人士须挺身而出，肩负责任。长久以来，众人所为，实属寥寥。儿童医院当护佑父母之至宝。吾等必施以援手。吾向汝等立誓。只要吾名仍为[SCOPE.sCharacter('panum_government_leader').GetFullNameNoFormatting]……汝言吾在作竞选之辞，何意？”"
 panum.605.g: "这是一项值得大力支持的倡议。"
 panum.605.h: "这个政党不过是想借疾病之名谋取政治利益。"
 panum.606.t: "麻疹带来的痛苦"
 panum.606.d: "“[SCOPE.sState('panum_disease_state').GetName]中众多患病与夭折之孩童，令无数父母心碎。有人言，众多家庭正陷于生活危机之中。”"
 panum.606.f: "“米勒夫人本月痛失第三子，她不过是众多失孤母亲之一。米勒先生于镇上经营面包店，已闭店数周。此间众多家庭，皆如米勒一家，几无一家未失孩童。然数周以来，宿命之论渐转为不满之声。若情势持续恶化，此间民众将愈发敏感。今众多百姓，皆将其苦难归咎于政府。”\n\n摘自《[SCOPE.sState('panum_disease_state').GetCityHubName]先驱报》文"
 panum.606.g: "观此情势，实可同悲。"
 panum.622.t: "麻疹潜伏期"
 panum.622.d: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName]医生精心编制了一份详尽的麻疹病例清单，几乎完整地揭示了麻疹的潜伏期。"
 panum.622.f: "“诚然，脱屑阶段或具传染性，然接纳此观点时须慎之又慎，盖因常理观之，人皆疑其反。几可断言，因无法设想如此漫长之潜伏期，故择疾病后期为传染期。于苏德罗岛之霍夫与洛布雷村，疫情将尽之际，同一家庭中皮疹之间隔逾十四日，然吾无法证其源于外部新染；然此二例，或可归因于康复期之传播。据此处所呈数据，吾信麻疹之潜伏期可确估为约十四日，然不必坚称此间隔不因特定情状（如旅行）而变；诸多因素先验地驳斥此绝对论断，正如他疾潜伏期之不确定性。”\n——彼得·潘努"
 panum.623.t: "麻疹的独特性"
 panum.623.d: "在一个新的研究阶段中，[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName]医生区分了不同形式的麻疹，不仅指出了其与天花、风疹和皮疹等其他类似疾病的差异，还特别强调了其独特的症状。"
 panum.623.f: "“相较于猩红热与天花等急性皮疹病，麻疹之文献实显匮乏且残缺。除期刊中零星记载之个别疫情外，仅有寥寥专著，其中数部可追溯至上世纪。此皮疹热病，希腊与阿拉伯医者定然未识，即便于上世纪亦未得充分区分，乃至德·哈恩据症状断言麻疹与天花实为一疾，而17世纪末前之著者，皆将此二病归为同族。”\n——彼得·潘努"
 panum.624.t: "未染疫群体与终身免疫"
 panum.624.d: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName]医生最近明确证实，麻疹感染一个人后不会再次发作。因此，从未接触过这种疾病的人群尤其容易受到威胁。"
 panum.624.f: "“然于此，有一事颇为瞩目：法罗群岛上，诸多1781年曾患麻疹之老者，至今健在，经吾详查，无一人二次染疫。吾亲见九十八位如此老者，皆因年少时罹患此疾而得免。此点尤值关注，盖因高龄并未减其染疫之易感，据吾所知，凡早年未患麻疹之老者，一旦接触感染，皆难幸免；而某些年轻人，虽常处疫区，却得免于难。若六十五年前自麻疹康复可保人不再二次染疫，则可推知，更近期之康复或能提供更大之保护。”\n——彼得·潘努"
 panum.700.t: "猩红热疫情"
 panum.700.d: "最新疫情——#YELLOW 猩红热#!正在摧毁[SCOPE.sState('panum_disease_state').GetName]！"
 panum.700.f: "猩红热自古便为人所知，并在17世纪得到了详细描述，尤其是托马斯·西德纳姆的记载。尽管猩红热在18世纪似乎变得不那么致命，但在19世纪它以新的形式卷土重来。例如，皮埃尔·菲德尔·布雷托诺提到，大约在1800年，他未曾见过一例猩红热致死病例，而在1824年，他在图尔观察到一场死亡率极高的猩红热疫情，以至于他将猩红热与瘟疫和霍乱相提并论。猩红热伴随有特征性的皮疹。与天花或麻疹不同，猩红热的特征是扁桃体区域肿胀和草莓色的舌头。"
 panum.700.g: "每个孩子都注定会在某个时刻经历这个。但愿如此。"
 panum.720.t: "猩红热疫情结束"
 panum.720.d: "这场席卷我们国家的猩红热疫情正逐渐从城市和乡村退去。无数父母如释重负。"
 panum.720.f: "“这就像猩红热：每个人都得经历一次。”\n\n列夫·托尔斯泰：“那么，人们应该发明一种接种爱情的方法，就像接种疫苗一样。”"
 panum.722.t: "古代知识"
 panum.722.d: "通过一位古董商，[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName]寻获了几本古籍，这些书不仅总结了过去对猩红热的描述，在当下也可能大有裨益。"
 panum.722.f: "无法确定猩红热在古代是否为人所知，或者是否与白喉、麻疹和风疹等类似疾病混淆。关于类似猩红热的疾病的证据已经存在于塞尔苏斯、凯利乌斯·奥雷利亚努斯、卡帕多西亚的阿拉泰乌斯和阿米达的埃提乌斯的著作中。从中世纪开始，在阿拉伯-波斯地区也可以找到类似的描述，尤其是阿维森纳、阿里·阿巴斯和拉齐的记载。猩红热的第一个明确描述是乔瓦尼·菲利波·英格拉西亚于1553年提出的。另一位重要人物是同样来自16世纪的医生丹尼尔·森纳特。“Scarlatina”这一名称可以追溯到托马斯·西德纳姆及其1675年的描述。尽管西德纳姆的描述被认为是权威的，但其中存在显著遗漏，而且“猩红热”这一术语似乎在16世纪中叶的英格兰已经广泛使用。"
 panum.723.t: "猩红热症状"
 panum.723.d: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName]医生在猩红热的描述研究上取得了重要进展，并首次系统总结了其症状。"
 panum.723.f: "“患者寒战战栗，一如他疾发热之状。然症状尚属温和；继而周身肌肤遍生小红斑，较麻疹之斑更厚、更阔、更红且不甚均匀。此斑持续二三日，旋即消散。患者非但有皮疹，亦患扁桃体炎。或并发风湿、水肿等症。”\n\n[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]医生致医学院函"
 panum.724.t: "猩红热不喜喉部"
 panum.724.d: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName]医生已成功辨明猩红热与白喉之间的具体差异。"
 panum.724.f: "“猩红热之炎症，广布于扁桃体、腭部及咽部，不似白喉初起时仅限一处；其次，猩红热之咽部炎症，无向呼吸道蔓延之势。简言之：猩红热不喜喉部。”\n\n[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]医生致医学院函"
 panum_plague_quarantine_modifier: "鼠疫隔离"
 panum_plague_hospitals_modifier: "鼠疫隔离屋"
 panum_plague_burn_everything_modifier: "焚毁一切！"
 panum_plague_rat_killer_modifier: "杀光一切！"
 panum_plague_loss_of_trust_modifier: "失去信任"
 panum.800.t: "黑死病又来了？"
 panum.800.d: "多年来一直有传言称，黑死病已悄然重返我们国家的部分地区。此前，这种情况仅限于偏远的农村地区。然而，随着[SCOPE.sState('panum_disease_state').GetName]的疫情爆发，真相终于浮出水面：黑死病再次伸出了它那狰狞的魔爪！"
 panum.800.f: "第三次鼠疫大流行（继6世纪的查士丁尼瘟疫和14世纪的“黑死病”之后）于19世纪末在中国爆发。据推测，这场大流行起源于云南，该地早在1792年、1855年和1866年就曾多次爆发疫情。1894年1月起，邻近的广州市爆发疫情，夺走了8万人的生命。1894年3月，香港的英国科学家和医生开始意识到疫情的严重性。在过去几十年的霍乱疫情之后，这场瘟疫预计将造成大量死亡，尤其是在中国和印度，并最终引发国家动荡。据估计，全球将有1500万人因此丧生。"
 panum.800.g: "岂有此理！黑死病早就死在尘封往事中了！"
 panum.820.t: "鼠疫疫情结束"
 panum.820.d: "人类最严重的祸害——鼠疫又一次离开了我们的国家。希望它能回到深渊之中。"
 panum.820.f: "“但瘟疫意味着什么？它就是生活，仅此而已。”\n——阿尔贝·加缪"
 panum.802.t: "鼠疫蔓延到[SCOPE.sCountry('panum_infected_country').GetName]"
 panum.802.d: "如今，鼠疫已蔓延至境外，他国亦有病例出现。显然，我当局未能有效遏制这种疾病。[SCOPE.sCountry('panum_infected_country').GetAdjectiveNoFlag]大使对我们提出了严厉的指控。"
 panum.802.g: "从长远来看，瘟疫会降临到每个人身上……"
 panum.803.t: "鼠疫疫情"
 panum.803.d: "最新疫情——#YELLOW 鼠疫#!正在摧毁[SCOPE.sState('panum_disease_state').GetName]！"
 panum.803.g: "黑死神正敲门呢。"
 panum.804.t: "鼠疫：第三次大流行"
 panum.804.d: "我们听到[SCOPE.sCountry('panum_plague_country').GetName]传来了令人不安的消息。据称，几周前那里爆发了一场来势汹汹的疫情。医生们忧心忡忡：这恐怕是那令人闻风丧胆的鼠疫。"
 panum.804.g: "我们应当组建一支医疗考察队，以应对这一情况。"
 panum.805.t: "鼠疫隔离"
 panum.805.d: "[SCOPE.sState('panum_disease_state').GetName]的局势正面临失控的风险。有影响力的政界人士、当局负责人和私人个体纷纷呼吁实施隔离，以阻止鼠疫进一步扩散。这些人大多并非[SCOPE.sState('panum_disease_state').GetName]的居民。"
 panum.805.f: "广泛而严格的隔离措施在中世纪已被证明行之有效。事实上，“隔离”一词源于意大利语中的“40”，并且显然是在鼠疫时期首次使用的。尤其是作为贸易国家的威尼斯共和国，以其繁忙的航运交通而闻名，也因此措施而广为人知，因为港口和贸易城市尤其容易受到流行病的侵袭。"
 panum.805.g: "整个地区都应隔离。"
 panum.805.h: "我们不应过分夸大其词。"
 panum.806.t: "鼠疫隔离屋"
 panum.806.d: "[SCOPE.sState('panum_disease_state').GetName]的地方当局提议设立鼠疫隔离屋，以更好地将健康人群与病患隔离开来。这将尤其影响较贫穷的阶层，因为他们无法像富人一样逃离疫区。"
 panum.806.f: "鼠疫隔离屋用于在鼠疫流行期间照料患者。由于在中世纪晚期和近代早期的疾病高峰期，鼠疫被认为是不治之症，医疗护理仅能起到缓解作用，因此鼠疫隔离屋的主要目的是将病患与健康人群隔离开来。为此，通常在城市外或郊区建造类似于麻风病院的鼠疫隔离屋。另一种类型的鼠疫隔离屋则旨在起到预防作用，类似于隔离期。在鼠疫发生地附近的人被带到鼠疫隔离屋，只有在确认未感染的情况下才能离开。"
 panum.806.g: "这完全是为了他们好。即便他们心有不甘。"
 panum.806.h: "这只会激起不安。"
 panum.807.t: "鼠疫医生"
 panum.807.d: "我们在[SCOPE.sState('panum_disease_state').GetName]的一家鼠疫医院的首席医生在这一领域积累了丰富的经验，他可以在全国范围内发挥重要作用。"
 panum.807.f: "“让我过去！我是一名医生，对这种疾病了如指掌。”"
 panum.807.g: "授予这位医生高级医师的职位。"
 panum.808.t: "富人走，阔佬遁"
 panum.808.d: "[SCOPE.sState('panum_disease_state').GetName]的移民数量与日俱增。尤其是那些经济条件允许的家庭，正试图逃离鼠疫的威胁。而那些无力逃离的人则对此深感愤懑。另一些人则警告称，这将导致鼠疫进一步扩散。"
 panum.808.f: "“更有甚者，或为众人中判断最准、性情最厉者，断言治此疾无药可及逃离之效；依此方，众多男女，除己身外，漠视一切，弃其城郭、家宅、产业、亲族与财物，自愿流亡，或迁往乡野，似上帝降此疫以惩人之不义，然其怒不追人于任何处所，唯欲灭城中墙内之人；或彼等以为，今乃众人逃离之时，其末日已至。”\n——薄伽丘"
 panum.809.t: "尸堆"
 panum.809.d: "鼠疫导致的死亡人数已攀升至难以控制的地步。一些人甚至提议公开焚烧尸体并集体掩埋。"
 panum.809.f: "在1894年香港鼠疫的高峰期，医院平均每天接收80名患者，死亡人数峰值超过每天100人。通过海上交通，疫情在1894年后迅速蔓延至全国，并最终传播到英属印度，导致约1000万印度人死亡。主要的预防措施包括设立鼠疫医院并派遣医务人员治疗和隔离患者；开展挨家挨户的搜查，发现并转移患者，同时对感染的房屋和区域进行清洁和消毒；此外，还设立了指定的墓地，并指派专人负责运送和埋葬鼠疫死者。"
 panum.810.t: "黑死病肆虐，夺走了无数生命"
 panum.810.d: "近日，鼠疫在[SCOPE.sState('panum_disease_state').GetName]疯狂蔓延。据报道，死亡人数急剧上升，远超以往。"
 panum.810.f: "这种疾病在传播前曾在中国西南某地持续数年。自1894年1月起，广州的疫情在短短六个月内已夺走8万人的生命。与邻近城市香港的日常水上交通迅速将瘟疫传播至彼处，在1894年香港瘟疫期间，短短两个月内便有超过2400人丧生。"
 panum.810.g: "无人能逃过死神的召唤！"
 panum.811.t: "焚毁一切！"
 panum.811.d: "对患者的住所进行清洁和消杀往往是遏制鼠疫蔓延的唯一手段。这通常意味着焚烧与鼠疫患者接触过的一切物品。"
 panum.811.f: "“我要说的是，这种瘟疫的传染性如此之强，不仅在人之间传播，更令人震惊的是，人们经常观察到，那些属于患病或死于该病的人的物品，如果被其他非人类的生物触碰，不仅会导致其生病，甚至几乎会立即死亡。我亲眼目睹了这一点，有一天，我经历了以下事件：一个死于该病的穷人的破布被扔在开阔的街道上，两头猪走了过来，像它们习惯的那样，用鼻子嗅了嗅，然后用牙齿叼起破布，在嘴里翻来覆去；几乎立刻，它们转了几圈，便像中毒一样倒在破布上死去，仿佛它们在不祥的时刻打扰了这些破布。”\n——薄伽丘"
 panum.811.g: "如有必要，衣物、家具乃至房屋，皆可付之一炬！"
 panum.811.h: "没必要。"
 panum.812.t: "杀光一切！"
 panum.812.d: "早在初期，便有人怀疑老鼠可能是瘟疫的传播媒介。[SCOPE.sState('panum_disease_state').GetName]有人呼吁彻底清除动物与害虫，以遏制疾病的扩散。"
 panum.812.f: "在第三次鼠疫大流行之后，欧洲城市成立了专门的“灭鼠队”，负责搜寻并消灭老鼠，甚至将它们浸入汽油桶中。然而，人们普遍认为，其他瘟疫来源，如感染人类的特定寄生虫或叮咬人类的寄生虫（如跳蚤和虱子），在第三次大流行期间对欧洲的传播起到了至关重要的作用。在欧洲疫情爆发期间，发现的感染鼠疫的老鼠数量较少，这表明它们在鼠疫传播中的作用相对有限。然而，一些研究人员指出，当局难以找到感染鼠疫的老鼠，因为它们往往会躲藏起来。"
 panum.812.g: "杀杀杀杀杀杀杀！"
 panum.812.h: "这么做的代价太高了！"
 panum.813.t: "失去信任"
 panum.813.d: "[SCOPE.sState('panum_disease_state').GetName]的许多居民对当前的医疗状况深感愤慨。大量的死亡与政府的明显失职，使得民众对政府的信任普遍崩塌。"
 panum.813.f: "19世纪的鼠疫大流行夺走了无数生命，尤其是在中国，这场灾难严重动摇了人们对清政府及清朝皇帝天命的信任。"
 panum.813.g: "那你们自己收拾这烂摊子吧！"
 panum.822.t: "黑死病"
 panum.822.d: "通过查阅多份历史资料，[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName]医生成功证实，新一轮的鼠疫实际上是一种与中世纪黑死病相吻合的疾病。"
 panum.822.f: "鼠疫在印度传播的发现，对于将其视为一种现代疾病的当前意义具有决定性影响。最初，这导致人们认为疾病只有一种传播途径。如今，研究范围已扩展至大量啮齿动物和多种跳蚤物种。殖民地的高死亡率促使研究力度加大，以描绘流行病的特征。作为起点，鼠疫的身份从未受到质疑。这种疾病被赋予了历史术语“鼠疫”。中世纪瘟疫与在印度研究的瘟疫被认定为同一疾病。"
 panum.823.t: "瘟疫季节"
 panum.823.d: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName]医生仔细查阅了所有记录。无论是这次流行病还是之前，无论是近期还是遥远的过去：冬季从未爆发过瘟疫。这一现象的原因尚不明确，但它可能为探寻疾病爆发的根源提供线索。"
 panum.823.f: "“是岁终矣……诚然，吾等因大疫历经巨恸，吾为此付出巨大代价，将家人久留于伍尔维奇，而吾与另一部分家人，吾之职员，则自费居格林威治……然今瘟疫几已消退至无……然吾所识多人已逝。然令吾等甚慰者，城镇速复，商铺重开。祈上帝续减瘟疫——因朝廷远离商埠，故一切公务皆陷混乱，彼等于此距上不复虑之。”\n——塞缪尔·佩皮斯"
 panum.824.t: "腺鼠疫与肺鼠疫"
 panum.824.d: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName]医生成功证实，鼠疫并非只有单一形式。"
 panum.824.f: "瘟疫通常指的是鼠疫。其潜伏期为几小时至七天，症状包括发热、头痛、全身疼痛、强烈的病感和头晕，随后可能出现意识障碍。鼠疫的名称源自颈部、腋窝和腹股沟处严重肿胀且剧痛的肿块。肺鼠疫则相对罕见，尽管其症状可能与流感相似，但传播能力较弱。其传播方式极为特殊，只有在特定有利条件下才会演变为流行病。首先，感染源较为稀少。只有少数感染鼠疫的人群会发展为肺鼠疫，例如在腺鼠疫和免疫力低下的情况下。"
 panum.241.t: "兔子实验"
 panum.241.d: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName]博士提出了一个大胆的实验，最终用兔子来证明肺结核的传染性。"
 panum.241.f: "“为了进行第一次实验，我买了一对三周大的可爱兔子，目的是确定结核病的传染性。我在其中一只兔子身上洒了从33小时前死去的结核病患者组织中提取的结核菌提取物。我重复了两次这个过程。几天后，我解剖了这些动物，发现兔子感染了结核病。\n\n一个月后，我又用三只漂亮的小兔子重复了这个实验，后来又加了一只兔子。然后我连续四天每天解剖其中一只兔子，它们都患有结核病，尽管病情处于四个不同的阶段。我只给第一只兔子接种了疫苗。在第三次尝试中，我得到了四对三个月大的年轻可爱的兔子......”\n\n——[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]医生的实验小册子《结核病的病因和性质》节选"
 panum.241.g: "停止这些可怕的动物实验！"
 panum.241.h: "让我们重复这个实验以确保无误。"
 panum.241.i: "第三次兔子实验！"
 panum.241.j: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetSheHe|U]可以尽可能多地用兔子来证明理论。"
 panum.261.t: "人工气胸"
 panum.261.d: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName]医生发明了一种能通过人工方式在胸腔中引入气体，使胸腔内的积气排出，以恢复正常肺功能的装置，这有助于对抗结核病。"
 panum.261.f: "在兄弟的协助下，卡洛·弗拉尼尼设计并制造了一种能能通过人工方式在胸腔中引入气体，使胸腔内的积气排出，以恢复正常肺功能的装置。弗拉尼尼在制造出这一装置后，尝试通过诱发气胸来治疗两例结核病病人，并取得了良好的效果。多年来，弗拉尼尼的技术得到了进一步的发展和改进，从而提高了手术的成功率。在链霉素问世之前，人工气胸一直是一种治疗方法。"
 panum.262.t: "胸廓成形术"
 panum.262.d: "凭借[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetHerHis]精湛的外科技艺，[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName]医生发明了一种彻底革新肺部手术的技术，从而为肺结核患者带来了更好的治疗."
 panum.262.f: "胸廓成形术是一种外科手术，通过切除胸部一侧的肋骨或部分肋骨，使肺部或部分肺部塌陷。这一手术由埃杜瓦尔德·德·塞伦维尔首创，主要用于治疗肺结核，但随着有效抗生素的问世，其重要性逐渐式微。"
 panum.263.t: "医生又干了！"
 panum.263.d: "为了再次验证肺结核的传染性，[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName]医生不得不牺牲了无数可爱的兔子。"
 panum.263.f: "“这次我获得的四对兔子中，我立即处死了第一对中的第一只。它的肺部未见任何病变。”\n摘自[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]医生的实验手册《肺结核的病因与性质》"
 panum.263.g: "这一切，都是为了拯救人类的生命。"
 panum.263.h: "这位医生的问题可不小。"
 panum_pneumothorax_modifier: "人工气胸"
 panum_thoracoplasty_modifier: "胸廓成形术"
