 panum.2621.t: "焦虑的概念"
 panum.2621.d: "丹麦的顶尖哲学家索伦·克尔凯郭尔出版了《焦虑的概念》，这是一部美学、哲学和心理学的著作，引起了哥本哈根大众的广泛关注。"
 panum.2621.f: "“自由的可能性并非仅仅是选择善或恶的能力。可能性，本质上是一种“能够”。在逻辑的框架中，我们可以轻易地说可能性转化为现实。然而，在现实的混沌中，这种转化却远非如此简单，它需要一个中介的术语来衔接。这个中介的术语，便是焦虑。然而，焦虑既无法解释质的飞跃，也无法在伦理的层面上为其辩护。焦虑既不属于必然性的范畴，也不完全属于自由的范畴；它是自由的一种纠缠状态。在这种状态中，自由本身并非真正自由，而是被自身所束缚——不是被必然性所纠缠，而是被它自己的本质所困扰。”\n——索伦·克尔凯郭尔"
 panum.2621.g: "丹麦最伟大的头脑之一。"
 panum.2621.h: "克尔凯郭尔将成为丹麦新的国家级作家。"
 panum.2622.t: "[SCOPE.sCharacter('panum_phineas_gage').GetFullName]的奇异经历"
 panum.2622.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生深入调查了工头[SCOPE.sCharacter('panum_phineas_gage').GetFullName]那令人匪夷所思的案例。在一次突如其来的爆炸中，一根铁棒自下而上贯穿了他的头骨，留下了一道触目惊心的伤口通道。据[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的描述，几周后，他的身体竟奇迹般地康复了，感知、记忆、智力、语言能力乃至运动技能都完好如初。然而，事故后的那段日子里，[SCOPE.sCharacter('panum_phineas_gage').GetLastName]却经历了一场性格的剧变，仿佛某种无形的力量悄然重塑了他的灵魂。"
 panum.2622.f: "“可怕的事故。——[SCOPE.sCharacter('panum_phineas_gage').GetFullName]，[SCOPE.sState('panum_phineas_gage_state').GetName]铁路的工头，昨天在填装炸药时，炸药爆炸，将一根铁制工具穿过他的头部，该工具周长一又四分之一英寸，长三英尺八英寸，当时他正在使用。铁器从右脸进入，击碎了上颚，穿过左眼后方，从头顶穿出。\n\n与这一悲惨事件相关的最奇特的情况是，他在今天下午两点仍然活着，神志清醒，且没有疼痛。”\n\n[ROOT.GetCountry.GetCapital.GetCityHubName]纪事报"
 panum.2622.g: "所以心理和大脑区域是有关的？"
 panum.2623.t: "跨文化心理学"
 panum.2623.d: "在访问[SCOPE.sState('panum_colonial_state').GetName]期间，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生惊讶地发现，像在[ROOT.GetCountry.GetCapital.GetCityHubName]经常发生的精神疾病，在这个地区几乎不存在。"
 panum.2623.f: "1904年，埃米尔·克雷佩林踏上了一段为期四个月的爪哇之旅，并在Buitenzorg（今茂物）精神病院对225名患者进行了细致的检查。作为当时唯一一位对精神病学中的跨文化现象深感兴趣的顶尖学者，他怀揣着双重目的：其一，他想探究“某些形式的精神错乱——这些是我们欧洲精神病院的主要病例——是否在截然不同的生活环境和部落文化中，以同样的方式和频率存在”；其二，他预言道，“精神疾病的频率与形式，终将成为我们深入了解一个民族特性的珍贵钥匙”。他的目光穿透了疾病的表象，直指文化与心灵的交织之处。"
 panum.2623.g: "显然，一些神经症与文化背景有关。"
 panum.2624.t: "药？"
 panum.2624.d: "首席化学家[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]最近在[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的建议下，多次实验了多种物质，以生产有效的精神药物。然而，结果却……令人惊讶。"
 panum.2624.f: "“你急着要见我？”\n“是的。我怀疑实验成功了。”\n“你怀疑？”\n“这种新药确实有止痛效果。它能有效对抗疲劳。还能帮助克服恐惧。也许效果有点太好了。”"
 panum.2624.g: "麦角酸二乙酰胺？这是什么？"
 panum.2624.h: "我们的士兵可以从一些装甲巧克力中受益。"
 panum.2625.t: "心理物理学"
 panum.2625.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生提出了一些关于主观心理体验与可量化的物理刺激之间相互关系的有趣理论。"
 panum.2625.f: "心理物理学是一门定量研究物理刺激与其引发的感知和知觉之间关系的学科。它被定义为“刺激与感觉之间关系的科学研究”。1860年，古斯塔夫·西奥多·费希纳开创了这一领域，提出了许多经典的心理物理学方法及理论。正是他创造了“心理物理学”这一术语，用以描述那些试图将物理刺激与意识内容（如感觉）联系起来的研究。作为一名物理学家兼哲学家，费希纳的目标是找到一种方法，将物质世界与心灵世界相连接，从而架起外部可观察世界与个人内在体验之间的桥梁。\n费希纳的开创性工作后来被查尔斯·S·皮尔斯深入研究并扩展，而皮尔斯的研究又得到了他的学生约瑟夫·贾斯特罗的协助。贾斯特罗很快崭露头角，成为了一位杰出的实验心理学家，为这一领域注入了新的活力与深度。"
 panum.2625.g: "我一个字也没听懂，但奖励看起来不错！"
