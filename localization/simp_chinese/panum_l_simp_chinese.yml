 je_panum_cholera_description_expedition_reason: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生带领一支医疗队前往[SCOPE.sCountry('target').GetName]，希望获取有关#YELLOW 霍乱#!的知识。只要这种疾病在该国肆虐，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]每月都有概率获得新知识，从而撰写一份全面的科学报告。\n\n如果疫情缓解了，科学报告进度就不会消失，还会出现在下一次考察中。"
