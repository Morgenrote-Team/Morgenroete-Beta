 panum.52.t: "医学观察"
 panum.52.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生组建了一支专家和助手团队，打算密切观察国外的流行病并从中得出结论。现在应该去哪个国家观察疾病。"
 panum.52.f: "医生可以进行两种不同类型的医学考察，医学考察和研究考察。医学考察有助于完成对疾病的描述，研究考察则有助于发现治疗方法。然而考察不如现场研究效率高，可能需要多次考察才能全面了解一种疾病。"
 panum.52.g: "在[SCOPE.sCountry('panum_cholera_country_scope').GetName]的霍乱疫情"
 panum.52.h: "[SCOPE.sCountry('panum_tuberculosis_country_scope').GetName]的结核病疫情"
 panum.52.i: "[SCOPE.sCountry('panum_smallpox_country_scope').GetName]的天花疫情"
 panum.52.j: "[SCOPE.sCountry('panum_typhus_country_scope').GetName]的斑疹伤寒疫情"
 panum.52.k: "[SCOPE.sCountry('panum_yellow_fever_country_scope').GetName]的黄热病疫情"
