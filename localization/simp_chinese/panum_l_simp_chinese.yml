 panum.2500.t: "先进医疗支援"
 panum.2500.d: "我们的[concept_panum_physician][ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士多年来致力于提升战场医疗支持水平。如今，这些新方法和手段已可在战场上投入使用！"
 panum.2500.f: "“务必严格按照规范使用这支注射器。同时，确保手头常备足量的血清和绷带，最好配备一个完整的急救箱。话说，你真的了解灭菌的含义吗？”"
 panum.2500.g: "总有一天，士兵们会为这位医生矗立一座丰碑，以铭记他们的功绩。"
