 panum_vitamins_tech: "维生素"
 panum_vitamins_tech_desc: "通过分离出人体所需的某些营养素，有可能使更多人有健康平衡的饮食。"
 panum.2006.t: "细菌理论得到强化"
 panum.2006.d: "医学大会还为多位医生提供了交流病因的机会。显然，越来越少的研究人员相信传统的瘴气理论，细菌理论现在已被学者视为标准。"
 panum.2006.f: "“最近确实出现了某种调整，各个国家不再像以前那样采取有偏见的做法，一个国家从另一个国家那里发现有效的防御手段。然而，在抗击结核病的方法和手段不断多样化的情况下，仍然有必要问一问，哪些措施确实最能满足抗击传染病的科学要求和发现。\n\n但是，在回答这个问题之前，我们必须先弄清楚结核病是如何引起的，即结核杆菌是如何侵入人体的？因为所有针对传染病的预防措施都只能是防止病菌侵入人体。”——罗伯特·科赫"
 panum.2006.g: "这一证据不容轻易否定。"
 panum.2201.t: "瘴气理论丧失主导地位"
 panum.2201.d: "随着[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生越来越多地关注新的研究方法，传统的瘴气理论变得越来越不重要，病菌理论似乎更有说服力。"
 panum.2201.f: "“微生物造就了人类！”——路易斯·巴斯德"
 panum.2201.g: "瘴气理论值得怀疑吗？"
 panum_physician_recent_treatment_modifier: "近期治疗"
 panum_physician_recent_treatment_conducted_modifier: "最近进行的治疗"
 panum_physician_botched_treatment_modifier: "治疗不力"
 panum_physician_botched_treatment_ig_modifier: "治疗不力"
 panum.2301.t: "成功治疗[SCOPE.sCharacter('chosen_character').GetFullName]的[SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]"
 panum.2301.d: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName]医生成功治疗[SCOPE.sCharacter('chosen_character').GetFullName]的[SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]"
 panum.2301.f: "“先生，不用担心，这种治疗一定有效！我已经至少做过两次了，只有一个病人死了！”"
 panum.2301.g: "好好好"
 panum.2302.t: "对[SCOPE.sCharacter('chosen_character').GetFullName]的[SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]进行无效治疗"
 panum.2302.d: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName]医生对[SCOPE.sCharacter('chosen_character').GetFullName]的[SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]进行了治疗，但并没有什么变化。"
 panum.2302.f: "“我真的认为喝足够的水就可以解决问题！”"
 panum.2302.g: "至少没有受伤。"
 panum.2303.t: "对[SCOPE.sCharacter('chosen_character').GetFullName]的[SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]恶化治疗"
 panum.2303.d: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName]医生对[SCOPE.sCharacter('chosen_character').GetFullName]的[SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]进行了治疗，结果反而恶化了病情。"
 panum.2303.f: "“这已经是本周第三次发生这种情况了……”"
 panum.2303.g: "这不应该发生！"
 panum.2304.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]致命治疗"
 panum.2304.d: "[GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName]医生在[SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]治疗过程中不幸导致病人死亡。"
 panum.2304.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_fatal_flavor_text_type')]"
 panum.2304.g: "真是悲剧！"
 panum_foreign_medical_expedition_modifier: "国外医疗考察"
 panum.137.t: "考察队希望研究疾病"
 panum.137.d: "一支由医生、学者和助手组成的外国考察队已经抵达我国边境，他们显然想研究这种猖獗的流行病。"
 panum.137.f: "医疗考察队可远赴他国，深入探究疾病治疗方法，并为祖国撰写详尽的疾病报告。与此同时，东道国亦能从中受益，因为医生们会在疫区为患者提供专业的诊疗服务。"
 panum.137.g: "让我们向这些勇敢的男女致以热烈的欢迎。"
 panum.2202.t: "古人患病"
 panum.2202.d: "我们的医生以其独到的见解，为人类学家的研究注入了新的活力！"
 panum.2202.f: "“……不过，如果你仔细观察他们头骨的这一部分，你会发现他们的伤势其实已经开始愈合。”\n\n“那么，这显然不是死因了？”\n\n“没错！虽然是一记重击，但并不致命。我推测他们又活了大约半年，直到另一处伤势夺去了他们的生命，或者伤口发生了恶化。”\n\n“嗯，真有意思。从打击的痕迹来看，我原以为可能是某种……钝器所致。”\n\n“很可能是棍棒，或者是带有钝石的工具。我认为这根肋骨才是真正的死因。你看，这里和这里的骨骼明显变窄了。”\n\n“是受伤导致的吗？”\n\n“很可能是肺结核。我敢说，你的这位研究对象是在与这种‘白色瘟疫’抗争多年后去世的。”"
 panum.2202.g: "跨学科研究，始终是科学探索的最佳路径。"
 panum.2203.t: "奇怪的药物"
 panum.2203.d: "在难得的闲暇时光中，我们的医生与考古学家畅谈彼此的研究成果！"
 panum.2203.f: "“啊，但这正是有趣之处，医生！这些罐子来自埃及，里面装着我们推测为古代药物的样本。”\n\n“真是令人着迷。这是木乃伊油吗？”\n\n“……那不是从尸体上提取的、据说有治疗功效的东西吗？就是包裹他们的树脂？”\n\n“哦，不，完全不是！木乃伊油是一种从地下提取的油，类似于石油。为什么这么问？”\n\n“……我想我们最好仔细研究一下这些药物。这里有各种各样的酊剂。请先看看，我马上回来。我需要处理……一些东西。”\n\n“嗯，这些看起来可能是经过香薰处理的——你是在里面吃东西吗？”"
 panum.2203.g: "……你该不会是在吃木乃伊吧？"
 panum.2204.t: "草药治疗？"
 panum.2204.d: "经过深入研究，我们的博物学家将一批可能具有药用价值的植物送到了医生的办公室。"
 panum.2204.f: "“啊，你来了！我正在整理我们上次植物考察带回来的一些样本，发现了一些可能会让你感兴趣的东西。”\n\n“哦，真的吗？怎么说？”\n\n“其中一些与已知具有药用价值的植物相关，比如抗炎或退烧。还有一些对我们来说完全陌生，但当地人对其评价很高，值得进一步研究。”\n\n“草药学并不是一门很严谨的科学……但谁知道呢。这些植物中可能藏着有趣的东西。毕竟，你也知道他们在罂粟植物中发现的奇迹。”\n\n“啊，吗啡！”\n\n“没错，没错！我会让助手们准备一些粉末样本，以便更仔细地研究。”"
 panum.2204.g: "医生，我认为古柯叶格外“引人入胜”。"
