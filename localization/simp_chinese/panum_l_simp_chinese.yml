 panum_congress_host_modifier: "最近主持了一次医学大会"
 panum_congress_attend_modifier: "出席医学大会"
 panum.2000.t: "医学大会筹备工作"
 panum.2000.d: "在下一届国际医学大会在我国召开之前，人们想知道大会是否应侧重于某种特定疾病。"
 panum.2000.f: "如果主办国至少有一种疾病的描述，医学大会可以集中讨论一种特定疾病。每种疾病只能举行一次大会， 其中医生和微生物学家可以获得更多线索，从而更快地推进他们的研究。在普通医学大会上，与会国只需获得学术发展点。"
 panum.2000.g: "这应该是一次综合性医学大会。"
 panum.2001.t: "医学大会"
 panum.2001.d: "首都正在为国际医学大会做准备。[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]将担任主席主持会议。[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]"
 panum.2001.f: "医学大会是交流医学知识的地方，医学大会只能由医生组织，但也可以邀请微生物学家参加，他们可以分享病原体和疫苗领域的知识。如果一个国家既有医生又有微生物学家，那么两人都可以参加。"
 panum.2001.g: "发送邀请函！"
 panum.2002.t: "医学大会邀请函"
 panum.2002.d: "[SCOPE.sCountry('panum_congress_host_country').GetName]将邀请主要医学大国参加在国际医学大会。医生和微生物学家都将受到邀请。[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]。"
 panum.2002.g: "别忘了听诊器和显微镜！"
 panum.2003.t: "描述和处理"
 panum.2003.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生有独特的概率在[SCOPE.sCountry('panum_congress_host_country').GetName]的医学大会上获得重要的流行病学见解。那么重点关注哪种疾病？"
 panum.2003.f: "如果参加医学大会的国家知道另一个国家不知道的疾病描述或治疗方法，那么后者可以在大会上学习。只能增进对一种疾病的了解。如果在大会上无法获得新知识，也有可能积累常识，改进医疗技术。"
 panum.2003.g: "医生应从同事那里收集一些医学知识。"
 panum.2003.h: "霍乱。"
 panum.2003.i: "结核病。"
 panum.2003.j: "天花。"
 panum.2003.k: "伤寒。"
 panum.2003.l: "黄热病。"
 panum.2003.m: "麻疹。"
 panum.2003.n: "猩红热。"
 panum.2003.o: "鼠疫。"
 panum.2003.p: "白喉。"
 panum.2003.q: "脊髓灰质炎。"
 panum.2004.t: "病原体&疫苗"
 panum.2004.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生欣喜地发现，在[SCOPE.sCountry('panum_congress_host_country').GetName]大会上，有许多志同道合的人愿意分享他们的微生物知识。唯一的问题是，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]今后还想了解哪种疾病？"
 panum.2004.f: "如果参加医学大会的国家知道一种疾病的病原体或疫苗，而另一个国家却不知道，那么后者就可以在大会上学习，增进对一种疾病的了解。如果大会不可能产生新的知识，也有可能积累知识，改进生物技术。为此，具有微生物学家特质的生物学家参与至关重要。"
 panum.2004.g: "我们的科学家应该从同行那里收集一些生物学常识。"
 panum.2005.t: "医学意见"
 panum.2005.d_general: "与会的医生和生物学家们决定对未来的医科学生进行现代化培训，并就此撰写了一份联合宣言。"
 panum.2005.d_special: "鉴于此次会议的主要重点，医生和生物学家们投票决定，在未来几年内，将所有精力转移到抗击一种特定疾病上。"
 panum.2005.f: "如果在医学大会开始时宣布某个主题为主要议题，所有与会国家将收到有关该疾病的额外线索——取决于是否有物理学家和微生物学家。如果是一般性大会，则重点是培训新的医务人员。"
 panum.2005.g: "这次活动非常值得。"
 panum.2009.t: "医学大会闭幕"
 panum.2009.d: "昨天，在[SCOPE.sCountry('panum_congress_host_country').GetName]举行的医学大会结束了。医生和微生物学家们带回了众多研究成果。"
 panum.2009.f: "国际医学大会是一个国际医学科学会议，从1867年至1913年定期举行。最初由亨利·朱特拉克教授在1865年第三届法国医学年会期间提出了召开这样一次大会的想法，他建议在1867年召开一次国际医学大会，因为届时来自世界各地的医生肯定会到巴黎参加当年的国际博览会。"
 panum.2009.g: "希望自助餐不错"
 panum_surgeon: "外科医生"
 panum_surgeon_desc: "外科医生在日常医疗中游刃有余，而且在医学研究或解剖学中也会有所帮助。"
 panum_psychiatrist: "精神科医生"
 panum_psychiatrist_desc: "精神科医生对改善精神病患者的状况很感兴趣，并推动着这一领域的研究和新的治疗方法。"
 panum_military_physician: "军医"
 panum_military_physician_desc: "这位医生专门负责照顾战场上的伤员，尤其擅长急救。"
