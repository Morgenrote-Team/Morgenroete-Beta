 panum.3000.t: "红十字"
 panum.3000.d: "鉴于现代战争的残酷，一家名为“国际救援协会联合会”的组织在[SCOPE.sState('panum_red_cross_state').GetName]成立。该组织旨在跨国协作，为战争中的伤者提供援助。"
 panum.3000.f: "红十字会已通过以下决议：\n成立国家伤兵救护协会；\n对伤兵的保护及其中立性；\n在战地开展救护援助的志愿队伍的使用；\n召集补充会议将这些理念载入具有法律约束力的国际条约中；\n并且引入一个战场医务人员普遍使用的独一无二的保护性标志，即带有红十字的白色臂环。"
 panum.3000.g: "迈向国际协作的决定性一步。"
 panum.3001.d: "鉴于现代战争的残酷现实，一个名为“国际援助伤兵协会委员会”的组织在[SCOPE.sState('panum_red_cross_state').GetName]成立。该组织致力于跨国合作，为战争中受伤的人员提供援助。一位特使询问我国是否愿意加入这一协会。"
 panum.3001.g: "我们以创始成员的身份，正式加入这一组织。"
 panum.3001.h: "有趣。"
 panum.3002.d: "有感于现代战争的残酷，瑞士商人亨利·杜南创立了“国际援助伤兵委员会”。该组织致力于跨国协作，为战争中受伤的人员提供救助。"
 panum.3002.f: "1859年，瑞士商人亨利·杜南在穿越索尔费里诺战场时，意外目睹了约四万名濒死与负伤士兵的惨烈景象。他们的哀号与求助声如同利刃刺入他的内心。面对这片生灵涂炭的大地，他深感震撼，随即号召当地志愿者伸出援手，不分敌友，拯救伤员。1862年，杜南将自己的经历与思考撰写成《索尔费里诺回忆录》，以笔为剑，将现代战争的血腥残酷公之于世，引发了各国政府与民众对限制战争暴行的深切思索。\n1863年2月17日，杜南与其他四位志同道合者成立了国际红十字委员会。同年10月26日至29日，来自16个国家的代表齐聚第一次日内瓦会议，为杜南的崇高理念注入新的生命。白底红十字旗帜从此成为救援人员受国际保护的象征。1901年，杜南以其杰出的贡献，成为首届诺贝尔和平奖的荣耀得主。"
 panum.3011.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]公约"
 panum.3011.d: "一场国际会议在[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]召开，旨在确立对伤员的保护、医疗人员的中立地位以及红十字作为保护象征的地位。"
 panum.3011.f: "“然而，卡斯蒂廖内的妇女们看到我对国籍毫无偏见，便纷纷效仿，对那些出身迥异、对她们而言皆是异乡人的男人们展现出同样的仁慈。‘Tutti fratelli（都是兄弟），’她们深情地重复道。向这些卡斯蒂廖内的妇女和女孩们致以最崇高的敬意！她们沉着冷静、不知疲倦、坚定不移，她们默默无闻的自我牺牲精神让疲劳与恐怖显得微不足道，也让她们的奉献更加熠熠生辉。”\n——亨利·杜南"
 panum.3011.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]公约听起来不错。"
 panum.3012.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]条约"
 panum.3012.d: "为了推动裁军，并将以往针对陆战的国际法规则扩展至海战，计划在[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]召开一场国际会议。"
 panum.3012.f: "“对生命价值的道德认知；减轻这些可怜人痛苦的仁慈愿望，或重振他们破碎勇气的渴望；一个人在这种时刻激发出的狂热而无情的行动力；所有这些共同汇聚成一种能量，让人迫切地想要尽可能多地救助他人。\n在这可怕而庄严的悲剧场景中，哀伤已不再占据主导。”\n——亨利·杜南"
 panum.3012.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]条约听起来不错。"
 panum.3013.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]协定"
 panum.3013.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]举办了一场国际会议，旨在禁止在战争中使用毒气。"
 panum.3013.f: "“由于新的、可怕的毁灭方法每天都在被发明，其坚持不懈的精神本可用于更崇高的目标；由于这些毁灭工具的发明者在大多数欧洲大国中备受赞扬与鼓励，而这些国家正深陷军备竞赛的泥潭；由于欧洲的心态与诸多其他迹象交织，预示着未来战争的可能性，而避免这些战争似乎迟早都难以实现。鉴于这一切，为何不趁相对平静的时期，从人道与基督教的角度，深入探讨并尝试解决这一具有全球深远意义的问题呢？”\n——亨利·杜南"
 panum.3013.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]协定听起来不错。"
 panum.3021.t: "红十字会医务人员"
 panum.3021.d: "在一次惨烈的战败之后，一名医护人员在战地医院中展现出非凡的能力。[SCOPE.sCharacter('panum_new_physician_scope').GetSheHe|U]，作为红十字会的一员，或许注定肩负着比普通战地服务更为崇高的使命。[SCOPE.sCharacter('panum_new_physician_scope').GetHerselfHimself]的双手不仅医治伤痛，更是象征着希望与人道主义。"
 panum.3021.f: "“在克雷莫纳的一家医院里，一位意大利医生曾说道：我们把好东西留给盟军的朋友，而只给敌人提供最基本的必需品。如果他们死了，那就更糟了！他还补充道，为了为这些野蛮的话开脱，他从一些从维罗纳和曼图亚返回的意大利士兵那里听说，奥地利人让法撒联军的伤员无人照料而死。克雷莫纳的一位高贵女士，伯爵夫人……听到医生的话后，立即表示反对，并声明她对奥地利人和盟军一视同仁，对朋友和敌人毫无区别。因为她说，我们的主耶稣基督在行善时对人并无此类区分。”\n——亨利·杜南"
 panum.3021.g: "欢迎，[SCOPE.sCharacter('panum_new_physician_scope').GetLastName]医生。"
 panum.740.t: "少了一场儿童惊魂"
 panum.740.d: "经过不懈的努力，医生[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]终于完成了关于[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]成功治疗[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]的方法论著。这一成果被视为[ROOT.GetCountry.GetAdjectiveNoFlag]医学史上的重要里程碑。"
 panum.740.f: "医学院正翘首以盼[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]关于治疗方法的科学论文。在这篇论文中，这位医生系统性地提出了一系列高效对抗猩红热的措施。现代医学提供了多种手段，即便在疾病爆发后也能有效遏制其蔓延。其中，一种新发明的抗毒素发挥了至关重要的作用。[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的这部著作，题为[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]，堪称医学界的里程碑。"
 panum.740.g: "如今，无数父母将能安然入眠，再无后顾之忧。"
 panum.741.t: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]试验"
 panum.741.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生开创了一种以[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]命名的检测方法，用于精准判断患者是否对猩红热具有免疫力。"
 panum.741.f: "狄克试验由乔治·F·狄克和格拉迪斯·狄克于1924年共同研发，旨在识别猩红热易感人群。该试验通过注射一种已知引发猩红热的链球菌稀释株，观察注射部位皮肤的反应来判定易感者。注射后四小时即可观察到反应，24小时后更为显著。若皮肤未见任何反应，则表明该人已对猩红热产生免疫力，无患病风险。"
 panum.741.g: "这是一种极具实用价值的检测手段。"
 panum.742.t: "猩红热血清"
 panum.742.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生成功研制出一种高效的猩红热血清，其原料正是从马血中提取的。"
 panum.742.f: "猩红热血清于1900年11月正式投入使用，其研发工作完成于奥地利维也纳鲁道夫医院的血清治疗实验室。该血清从马血中提取，并由保罗·莫泽医生为感染猩红热的儿童进行腹部皮肤注射。血清的应用使猩红热的死亡率显著下降，莫泽的抗毒素更是将死亡率降低了40%。"
 panum.742.g: "马血？呕……"
 panum.743.t: "抗毒素"
 panum.743.d: "经过多次试验，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生今天宣布已经找到了治疗猩红热的抗毒素。"
 panum.743.f: "“尽管近期在猩红热的认知与治疗领域取得了显著进展，但这种令人闻风丧胆的疾病在其季节性流行中仍大幅攀升。若能及时使用抗毒素，将有效缓解猩红热的威胁及其常见的后续并发症。然而，这种疾病仍存在一些难以忽视的特点，使其根除变得尤为迫切。研究表明，对易感者逐步增加毒素剂量，可使其产生免疫力。”"
 panum.743.g: "这是一次具有决定性意义的突破！"
