 panum.51.t: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士正前往流行病爆发地"
 panum.51.f: "对疾病的完整描述是了解疾病和日后防治的第一步。疾病描述还不能直接起到缓解作用，但却是日后治疗方法的基础。在本国研究流行病的医生比出国旅行的医生工作更有效率。"
