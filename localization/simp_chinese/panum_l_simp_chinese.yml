 panum.840.t: "黑死病之谜"
 panum.840.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生撰写了一篇关于瘟疫的病因、传播途径及防治措施的详尽论文。其中尤为引人注目的部分深入探讨了老鼠和跳蚤的影响。"
 panum.840.f: "在关于鼠疫的论文中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生总结了许多新发现。除了推荐一种轮换消毒系统和一种由[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]特别研制的血清外，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]还揭示了跳蚤作为瘟疫杆菌携带者与老鼠感染之间的关联。传播途径包括从跳蚤到老鼠、从老鼠到老鼠，以及从老鼠到人类。"
 panum.840.g: "这个与我们纠缠千年的古老宿敌，竟在转瞬间显露出了一丝驯服的可能。"
 panum.841.t: "大传播"
 panum.841.d: "在最近几周，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生对鼠疫的首次出现及其传播地点进行了深入研究。"
 panum.841.f: "“过去数周，我收到了商务部寄来的地图，并将其与国外同僚的文件逐一比对。那些断言疾病与特定气候或地理环境息息相关的医生，实乃大谬。相反，我们可观察到疾病在陆地上如波浪般蔓延，亦通过最狭窄的港口扩散。此现象不足为奇，因中世纪的鼠疫大流行亦曾肆虐于斯堪的纳维亚、地中海及中东。然而，此举能否说服我的同僚们？”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，写于[TimeKeeper.GetCurrentDate.Format('y')]年"
 panum.841.g: "因此，鼠疫与地理因素关系甚微。"
 panum.842.t: "轮换清洁"
 panum.842.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在[SCOPE.sState('panum_disease_state').GetName]试验了一种新方法，结果证明其效果极为显著。"
 panum.842.f: "“尝试对城镇进行系统消毒，然此举耗资甚巨，故弃之，转而采用‘全面房屋清洁’之计划，其中欧洲卫生检查员与苦力常被雇佣。各区轮流处理，故每栋公寓每年至少清洁三次。此法兼具简便、高效与经济之优点。每位检查员每日分配若干楼层；住户将其家什搬出，地板与隔间皆被清洗，床板于便携铁罐中清洁。检查是否存在轻微结构违规，鼠道及类似之洞即刻以水泥填满，所有垃圾皆被运走。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生关于更好地消毒[SCOPE.sState('panum_disease_state').GetName]之指示"
 panum.842.g: "这一系统应在各地推广实施。"
 panum.843.t: "奇怪的死亡率"
 panum.843.d: "在查阅统计数据时，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生发现捕鼠者的死亡率高得惊人。"
 panum.843.f: "“该机构负责人直言不讳地指出，我将相关性与因果关系混为一谈。他几乎一字不差地表示，在鼠疫爆发前，对老鼠感染的关注实属过度。如今，我深表怀疑，若多数权威人士认定鼠疫爆发与老鼠有关，那么在面对类似数量的纯热带疾病迹象时，他们是否会固守己见。对我而言，捕鼠者相较于其他人群的显著高死亡率，实为一个‘相关性’过度的例证。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，写于[TimeKeeper.GetCurrentDate.Format('y')]年"
 panum.843.g: "还需要多少证据才能令人信服？"
 panum.844.t: "笨蛋！问题是老鼠！"
 panum.844.d: "在对[SCOPE.sState('panum_disease_state').GetName]鼠疫爆发的深入调查中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生获悉，在鼠疫爆发之前，该地区所有的老鼠都已死亡。"
 panum.844.f: "“举目所见，遍地皆是死鼠横陈，”亚历山大·耶尔森于1894年6月15日抵达香港时如是写道，“此等鼠辈，确为疫病蔓延之真凶无疑。”"
 panum.844.g: "此论可谓惊世骇俗，胆识非凡。"
 panum.845.t: "样本"
 panum.845.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生成功从停尸房的一名鼠疫受害者身上获取了组织样本。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]不得不费尽口舌，甚至贿赂了几个人才得以如愿。"
 panum.845.f: "“彼等卧于棺中，棺尽覆以石灰。一棺启之。吾拨开石灰，现腹股沟之区。肿块清晰可见。吾于不及一分钟内将其切除。”\n——亚历山大·耶尔森"
 panum.845.g: "我们将承担相关费用。"
 panum.851.t: "无非贫困与污垢"
 panum.851.d: "[SCOPE.sState('panum_disease_state').GetName]的地区医生代表当地政府驳回了[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生目前的研究，认为其缺乏依据。瘟疫的病因和治疗方法“早已明确”。"
 panum.851.f: "“吾等须表惊讶，虽局势已得充分掌控，然[ROOT.GetCountry.GetCapital.GetCityHubName]之中央政府仍觉有必要遣一医官。消毒与卫生措施已见成效，尤以房屋清洁与居民生活条件之改善为著。毒素或源于某些地区房屋下方之气候条件，而此仅因贫困与污垢所致。于普通意义上，此疾并无传染性或传播性。”\n\n摘自地区医生致政府函"
 panum.851.g: "成功本身便是最好的证明……"
 panum.852.t: "受污染之食"
 panum.852.d: "几位科学家在与[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的激烈争论中明确指出，该瘟疫是一种因营养不良而引发的肠道疾病。"
 panum.852.f: "“[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]医生或有些许令人振奋之理论，然[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]处理此疾之经验实属匮乏。[SCOPE.sState('panum_disease_state').GetName]之当地医生屡次吁请当局勿质疑已确立之发现。事实如下：四成瘟疫患者有呕吐之症，另三成有腹泻，近二成有腹痛。总体而言，近六成患者有胃肠道不适之记录。故显而易见，此乃消化道之感染，而更显明者，此显然因变质、不良或其他营养不足所致。”\n\n"
 panum.852.g: "医生——您作何回应？"
 panum.853.t: "一种热带疾病"
 panum.853.d: "几位国际知名的医生提出了一种理论，认为该瘟疫是另一种热带疾病，几乎不会在特定气候区以外发生，即使发生，也只是零星出现。因此，它是一种气候性疾病。"
 panum.853.f: "“吾等昔已发现，较冷之气候致瘟疫浪潮消退。其意昭然：此疫乃与气候变化紧密相关之疾。气象数据与幸存之艺术品显示，上一次瘟疫浪潮发生于较今明显更暖之环境中。17世纪末瘟疫之消失，与天气转冷相关，直至瘟疫全然消逝。另一方面，过去数年气温之上升，与瘟疫于昔日被视为较冷地区之传播相关。吾尚需进一步阐明乎”\n\n安吉莉卡·哈森拜因博士致[ROOT.Var('panum_physician_var').GetCharacter.GetFullNameNoFormatting]医生函"
 panum.853.g: "所以不过是黄热病的一种变体罢了。"
 panum.854.t: "误报"
 panum.854.d: "在过去几天里，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生被派往多家医院检查那里的患者。结果发现，这些患者并非感染了鼠疫，而是患上了斑疹伤寒。"
 panum.854.f: "“黑死病、斑疹伤寒、霍乱、肺结核、腺鼠疫……唉，彼时岁月。”\n——一位无名殡葬师"
 panum.854.g: "令人遗憾。"
 panum.854.h: "如果我们在浪费时间，或许医生可以善加利用？"
 panum.861.t: "鸦片无用论"
 panum.861.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生对鸦片在治疗瘟疫疾病中的所谓疗效进行了细致研究，并得出了明确的结论。"
 panum.861.f: "“此物无用。”\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士关于使用鸦片之结论"
 panum.861.g: "这既令人略感失望，又颇具启发性。"
 panum.862.t: "败血症"
 panum.862.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生成功证实，一些旨在表明胃肠道疾病是瘟疫病因的实验被彻底曲解了。"
 panum.862.f: "由于特定污染的食物，通过消化道感染的观点多年来被广泛接受，尽管有人认为“呼吸和皮肤的散发物”是最重要的病因。大量使用鼠疫材料进行的动物喂养实验为胃肠道假说提供了支持，因为许多动物和鸟类死于类似瘟疫的败血病。然而，这些结果并不确定，最终在1904年被香港现任卫生医疗官员质疑，他完全不同意这一观点。"
 panum.862.g: "这对鼠疫源于食物污染的理论是一个沉重打击。"
 panum.863.t: "抗生素"
 panum.863.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生通过一系列实验证实，鼠疫患者对抗生素治疗反应极佳，并强烈推荐这一方法。"
 panum.863.f: "“若仅言我的实验大获成功，实为轻描淡写。事实上，抗生素的疗效令我倍感惊讶。部分患者甚至坦言，他们自觉已然痊愈。倘若此效得以确证，寻觅鼠疫疫苗之举，或将成为多余。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，写于[TimeKeeper.GetCurrentDate.Format('y')]年"
 panum.863.g: "抗生素就没点不好处吗？"
 panum.864.t: "杀虫剂"
 panum.864.d: "在瘟疫热点地区大规模使用杀虫剂并未见效。然而，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生却认为，这反而是一个出人意料的成功。"
 panum.864.f: "“汝问吾为何对此失败而喜，确有其理。然科学家亦从感知之败中学习。就此而言，此非失败，乃为证明。吾之若干同僚以为，鼠疫或为类疟疾之热带疾病，而疟疾乃由蚊虫传播。至少吾等可将此假设搁置一旁。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士于当地报纸之访谈"
 panum.864.g: "又排除一个选项。"
 panum.865.t: "公共厕所"
 panum.865.d: "在对[SCOPE.sState('panum_disease_state').GetName]的卫生状况展开深入调查时，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生敏锐地察觉到，那些本应守护民众健康的现代化污水处理与厕所设施，竟在瘟疫横行的区域显露出令人忧心的缺陷。这位医者当即挥毫致函，与当地政府取得联系，以期及时补救这一关乎生死的要务。"
 panum.865.f: "“尽管眼下尚未寻得应对瘟疫的万全之策，无论是我个人秉持的理论，抑或是同僚们各执己见的学说——过往的经验无不昭示着一个真理：那些被秽物玷污的土地与淤积的死水，理应被彻底清除。不论是因为它们被怀疑会滋生致命的瘴气，还是因其确为病菌滋生的温床。倘若我们不仅希冀遏制眼前的瘟疫，更欲在未来斩断其他疾病的根源，那么未雨绸缪、防患未然的举措，便是我们不得不采取的上上之策。”\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在致当地政府的信中写道"
 panum.865.g: "此举虽耗资甚巨，然无可避免。"
 panum.870.t: "鼠疫杆菌"
 panum.870.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生通过显微镜观察了组织样本，并最终确认：鼠疫是由杆菌传播的！"
 panum.870.f: "“1894年6月20日。肿块中清晰可见，含大量杆菌。其形短小，末端圆润。此无疑为鼠疫之病原微生物。”\n——亚历山大·耶尔森"
 panum.870.g: "这改变了一切……"
 panum.871.t: "跳蚤"
 panum.871.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生或许已经取得了瘟疫史上最为关键的发现之一：跳蚤、老鼠与鼠疫爆发之间的关联。"
 panum.871.f: "在[TimeKeeper.GetCurrentDate.Format('y')]年，[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]发现了推动这种疾病传播的老鼠‑跳蚤媒介。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]注意到，患病者并不需要彼此密切接触才会感染这种疾病。在中国云南，居民一看到死老鼠就会逃离家园；而在台湾岛，居民认为处理死老鼠会增加感染瘟疫的风险。这些观察使[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]怀疑跳蚤可能是瘟疫传播的中间因素，因为人们只有在接触死亡不到24小时的老鼠时才会感染瘟疫。在一个如今已成为经典的实验中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]展示了健康的小鼠是如何在感染跳蚤从最近死于瘟疫的老鼠身上跳到它后，死于瘟疫的。"
 panum.871.g: "很有趣。"
 panum.872.t: "抗鼠疫血清"
 panum.872.d: "基于对鼠疫传播和起源的深入研究，以及对鼠疫杆菌的实验，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生成功研制出一种高效的抗鼠疫血清，并在首位患者身上进行了成功测试。"
 panum.872.f: "“自午夜始，患者渐趋平静，至晨六时……其醒而宣告，自觉已愈。”\n——亚历山大·耶尔森"
 panum.872.g: "起效了！"
