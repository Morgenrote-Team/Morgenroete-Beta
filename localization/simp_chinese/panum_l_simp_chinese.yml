 panum.1001.t: "新疫情"
 panum.1001.d: "脊髓灰质炎在19世纪曾以诸多不同的名称为人所知。令人震惊的是，在[SCOPE.sState('panum_disease_state').GetName]，越来越多关于脊髓灰质炎病例以残疾甚至死亡告终的消息不断涌现。这种曾经只是零星出现的疾病，如今似乎已变得司空见惯。脊髓灰质炎现已演变为一种肆虐的流行病。"
 panum.1001.g: "真让人烦心。"
 panum.1002.d: "多家报纸纷纷独立报道，一场严重的脊髓灰质炎疫情正在[SCOPE.sState('panum_disease_country').GetName]肆虐。这种曾经只是零星出现的疾病，如今似乎已演变成了一场大规模的流行病！"
 panum.1003.t: "一场来势汹汹的疫情"
 panum.1003.d: "[SCOPE.sState('panum_disease_state').GetName]的脊髓灰质炎疫情已被证实异常严峻。死亡人数正逐日攀升，形势令人忧心。"
 panum.1003.f: "“住院第三天的早晨，大概是九月一日或二日，我的早餐是麦片、果汁和巧克力牛奶。我记得我试图拿起那杯巧克力牛奶，但它却从我的手中滑落。我感到无比沮丧，因为我已无法再控制自己的动作。护士们急忙冲进来清理了洒出的牛奶。我依然记得我多么想要那杯巧克力牛奶，但最终未能如愿。相反，他们递给我一根吸管，我喝了一些果汁。随后，几位医生走进我的房间，让我倒数，10、9、8、7、6，我记得我数了很久。那时我正躺着，因为我已无力坐起。”\n\n——玛丽琳·R，小儿麻痹症幸存者"
 panum.1003.g: "难道无药可治？"
 panum.1004.t: "被毁掉的一代"
 panum.1004.d: "[SCOPE.sState('panum_disease_state').GetName]的疫情持续得越久，一个残酷的现实就越发清晰：将有一整代人不得不在肢体残缺与瘫痪的阴影下度过一生。"
 panum.1004.f: "“我至今仍清晰地记得被诊断出小儿麻痹症的那一天。那天早上，我在学校的体育课上，我们在足球场上玩触式橄榄球。我注意到，当我跑步时，我的腿会突然变得无力，甚至像是无法支撑我的身体。我当时并未多想，但那天晚些时候，我在希宾市的一场为小儿麻痹症筹款的游行中与高中军乐队一起演奏，希宾市距离我长大的科勒雷恩大约30英里。在游行队伍中行进时，我的腿再次变得无力。事实上，它们无力到我不得不退出游行队伍，回到校车上躺下休息。”\n\n——大卫·K，小儿麻痹症幸存者"
 panum.1004.g: "这种影响将长久地持续下去……"
 panum.1005.t: "脊髓灰质炎幸存者"
 panum.1005.d: "据说，那些在这场疫情中幸存下来的人，内心深处燃烧着愤怒的火焰。这是对这场疾病的一种抗争，因为它给他们的生活带来了难以磨灭的创伤。如今，在我们国家，越来越多的脊髓灰质炎幸存者协会如雨后春笋般涌现。"
 panum.1005.f: "“在高中时期，与众不同真的是一种煎熬。最终，我放弃了许多我本可能参与的活动，如果不是因为我的残疾的话。我本想去试试啦啦队，但人们仅仅因为我提到这件事就嘲笑我。于是，我选择将许多感受深埋心底。我不想参加舞会，因为我对自己的跛行感到无比自卑。我不想让人们在我走过舞池时投来异样的目光。我厌恶人们对我指指点点和嘲笑。我明白所有青少年都会有不安全感，但当你身患残疾时，这种不安全感会被无限放大。直到今天，我依然无法忍受人们在我穿短裤时盯着我的腿看。”\n\n——盖尔·B，小儿麻痹症幸存者"
 panum.1005.g: "民间社会正齐心协力，共同抗击小儿麻痹症。"
 panum.1006.t: "政治家创立脊髓灰质炎基金会"
 panum.1006.d: "面对肆虐的脊髓灰质炎疫情、悲痛欲绝的父母、肢体残缺者和逝者，[SCOPE.sCharacter('panum_opposition_leader').GetFullName]提出了设立基金会以抗击该疾病的计划。然而，批评者指出，此举不过是他试图为自己镀金的政治手段。"
 panum.1006.f: "美国总统富兰克林·D·罗斯福自1924年起定期在温泉疗养院疗养，并于1945年在这里逝世。1921年，他因双腿瘫痪而被诊断为脊髓灰质炎；然而，根据更近期的研究，他患的是当时还鲜为人知的格林‑巴利综合征。1927年，罗斯福创立了乔治亚温泉基金会，其最初的主要使命是治疗脊髓瘫痪。如今，该机构已更名为罗斯福温泉康复研究所，下设二十六个不同科室，为各类残疾患者提供全面的康复护理。"
 panum.1006.g: "一位真正的慈善家。"
 panum.1006.h: "而即将到来的选举，我想，不过是巧合罢了？"
 panum.1009.t: "大众恐慌"
 panum.1009.d: "尽管[SCOPE.sState('panum_disease_state').GetName]地方政府不遗余力，但民众已逐渐陷入任何疫情中最危险的境地之一：恐慌。"
 panum.1009.f: "1916年6月17日星期六，纽约布鲁克林正式宣布脊髓灰质炎疫情爆发。那一年，美国共报告了27363例脊髓灰质炎病例，导致7130人死亡，其中仅纽约市就有超过2000人丧生。这场疫情引发了大规模的恐慌，成千上万的人逃离城市，涌向附近的山间度假胜地；电影院纷纷关闭，会议被迫取消，公共集会几乎绝迹，孩子们被警告不要饮用喷泉的水，并被告知要远离游乐园、游泳池和海滩。"
 panum.1009.g: "该死的恐慌！"
 panum.1010.t: "隔离"
 panum.1010.d: "尽管脊髓灰质炎是否具有传染性仍无定论，但在[SCOPE.sState('panum_disease_state').GetName]，越来越多的声音呼吁采取隔离措施，以遏制其可能的传播。"
 panum.1010.f: "这种疾病突如其来，毫无预警，并需要漫长的隔离期，迫使父母与孩子分离：无人能预知谁会染病，谁会幸免。确诊脊髓灰质炎患者的姓名和地址每日刊登于报端，他们的房屋被贴上醒目标识，家人也被迫隔离。"
 panum.1010.g: "此举恐将得不偿失。"
 panum.1010.h: "强制执行严格的隔离令。"
 panum.1020.t: "脊髓灰质炎疫情结束"
 panum.1020.d: "[SCOPE.sState('panum_disease_state').GetName]的诊所报告表明，脊髓灰质炎病例已明显下降。然而，这场疫情的深远影响仍将在未来数年内持续笼罩该地区。"
 panum.1020.f: "“我并非生病，只是身体残缺。但只要我还能执笔作画，我便为生命的存在而欣喜。”\n——弗里达·卡罗"
 panum.1022.t: "脊髓灰质炎的肇始"
 panum.1022.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生今日整理并提交了一份关于早期脊髓灰质炎症状的简明概述。"
 panum.1022.f: "“6至36个月大、健康且大多看起来生机盎然的儿童，在之前健康状况良好的情况下突然发病，个别病例可能稍大一些。发病前可能伴有或不伴有不适的征兆，例如：眼球转动、突发高热、充血和刺激状态、发烧、口渴、烦躁不安、哭闹不止、嗜睡却无法真正入睡，有时还伴有急性皮疹性疾病的症状。不久后，轻度或重度的抽搐发作，并会在较短或较长的间隔内反复出现。\n\n在其他病例中，疾病突然发作，没有上述症状，而是伴随抽搐或恶心、身体瘫软、口鼻流沫、面色发青等。\n\n然而，有时所有这些症状都未出现，或仅表现为非常轻微的程度，而麻痹则悄然无声地逐渐显现。”"
 panum.1040.t: "《关于海因‑梅丁病的认知贡献》"
 panum.1040.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生今天向医学院提交了一篇革命性的论文，这将作为控制脊髓灰质炎流行并改善脊髓灰质炎幸存者治疗的起点。"
 panum.1040.f: "在[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]的《关于海因‑梅丁病的认知贡献》中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生提出了若干有助于预防和控制脊髓灰质炎传播的关键见解。其中最为重要的发现是，脊髓灰质炎是一种传染病。基于这一认识，衍生出了一系列防控措施。此外，高蛋白饮食、物理治疗项目以及诸如铁肺等新发明的应用，为脊髓灰质炎患者带来了新的希望。尽管这一疾病或许无法彻底根除，但未来有望得到更为有效的管理。"
 panum.1040.g: "我们要建一个脊髓灰质炎名人堂。"
 panum.1041.t: "物理疗法"
 panum.1041.d: "这位医生邂逅了一位护士，她的见解彻底推翻了[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]以往对脊髓灰质炎治疗的固有认知。"
 panum.1041.f: "“那么，你从事这项工作已经多久了？”\n“十年了，医生。”\n“你在病人身下放置了加热垫？”\n“是的，医生。”\n“你说这确实有效？”\n“您的质疑无法抹去事实的成功。这不仅仅是加热垫的作用。按摩和放松练习同样不可或缺。被夹板固定的肌肉无法生长，它需要锻炼。”\n“嗯……”"
 panum.1041.g: "然而……小儿麻痹症患者最需要的是休息和静养！"
 panum.1042.t: "街头巷尾"
 panum.1042.d: "在巡查脊髓灰质炎疫情爆发区域时，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生以严谨有序的方式展开了工作。"
 panum.1042.f: "“若有人追踪[SCOPE.sState('panum_disease_state').GetCityHubName]肆虐的脊髓灰质炎的传播路径，便会发现一个耐人寻味的现象。这些病例宛如一串珍珠，紧密相连。你可以沿着一条道路前行，目睹病例依次出现。我得以按时间顺序追溯该地区一条铁路线上的病例分布。这绝非巧合。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，写于[SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1042.g: "然而，仅凭这些证据，是否足以断定存在传染？"
 panum.1043.t: "教区"
 panum.1043.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生深入疫区的一个偏远社区，致力于进一步揭开脊髓灰质炎的病因之谜。"
 panum.1043.f: "“这个社区竟然有49例病例？”\n“作为市长，我不得不遗憾地告知您，是这样的。医生。”\n“当您绘制这些病例在教区内的分布图时，是否有所发现？”\n“恕我直言，我并非科学家，难以洞察其中奥秘。”\n“疾病的传播始于一个源头——正是村里的学校。”"
 panum.1043.g: "脊髓灰质炎是否并非遗传所致，而是具有传染性？"
 panum.1044.t: "慈善事业"
 panum.1044.d: "脊髓灰质炎的幸存者们纷纷来到[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生处。你计划通过创立基金会，为脊髓灰质炎的相关科研工作提供支持。"
 panum.1044.f: "20世纪初，脊髓灰质炎因其病因不明且不分阶层地侵袭，成为令社会广泛恐慌的疾病。一些在病后获得财富的幸存者，终其一生投身于对抗这一疾病的斗争，并大力支持私人与政府的相关倡议。在抗击脊髓灰质炎的历史中，慈善事业扮演了举足轻重的角色。"
 panum.1044.g: "一份弥足珍贵的支持"
 panum.1044.h: "资金应均衡地投入到疫苗研究领域。"
 panum.1044.i: "基金会的资金也将为广泛的研究领域注入活力。"
 panum.1045.t: "抗生素"
 panum.1045.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生凭借抗生素，在脊髓灰质炎治疗领域取得了显著成功。"
 panum.1045.f: "“脊髓灰质炎尚无治愈之法。遗憾的是，我亦未能在未来看到这一可能。我们所能做的，唯有预防、探究病因、遏制传播，以及通过治疗缓解症状。抗生素可助虚弱的肌肉抵御感染，这无疑是朝着正确方向迈出的一步。愿未来能有更多突破。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，写于[SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1045.g: "为抗生素干杯！"
 panum.1046.t: "社会孤立"
 panum.1046.d: "在一篇改革论文中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生向学术界同仁阐明，脊髓灰质炎幸存者的社会重归不仅在于疾病的治愈、治疗或缓解，更在于减少乃至彻底消除他们背负的社会污名。"
 panum.1046.f: "“我记忆中最艰难的挑战，莫过于登上那辆校车。那一步台阶仿佛高不可攀，而我却始终无法迈上去。有一段时间，妈妈会带着一个小凳子来帮我，这让我倍感尴尬。然而，我终究无法忍受这种窘境，于是爸爸和校车司机比尔（他的名字我至今记忆犹新）一起商量对策。爸爸走到校车停靠的地方，在泥土中挖了一条沟。比尔将校车的前轮驶入沟中，台阶便降低到接近地面的高度。就这样，我终于可以轻松上车了。而这一切，几乎无人察觉……\"\n\n——詹妮弗·W，脊髓灰质炎幸存者"
 panum.1046.g: "脊髓灰质炎患者绝非二等公民。"
 panum.1047.t: "进步的代价"
 panum.1047.d: "在对多年脊髓灰质炎疫情根源的深入调查中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生触及了一个令人难以接受的真相。"
 panum.1047.f: "“脊髓灰质炎自古便为人所知，但据我的研究，直至19世纪末，它才如现今般成为一种流行病。其原因，若得以证实，实为一悖论：医疗保健的进步。在污水系统与卫生设施尚未普及之前，儿童更早地接触到脊髓灰质炎，约在6个月至4岁之间。在此期间，病症较为轻微，并能赋予免疫力。感染脊髓灰质炎者，年龄愈大，瘫痪的风险愈高。卫生标准的提升，意味着获得免疫力者减少，从而更易遭受此病危险后果的侵袭。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，写于[SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1047.g: "难道这种疾病的传播，竟是源于公共卫生的改善？"
 panum.1048.t: "究竟是杆菌，还是病毒？"
 panum.1048.d: "关于脊髓灰质炎的病原体，至今仍是一个未解之谜。正因如此，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生与同事们展开了一场针锋相对的激烈辩论。"
 panum.1048.f: "尽管脊髓灰质炎早已为世人所知，且随着微生物学的进步，其病原体的性质得以明确，但关于其究竟是细菌还是病毒，学术界长期争论不休。"
 panum.1048.g: "种种迹象表明，病毒才是真正的元凶。"
 panum.1048.h: "这些毫无意义的闲谈，正让医生分心，干扰工作进程！"
 panum.1049.t: "轮椅友好"
 panum.1049.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生意识到，为患者提供轮椅固然关键，但更重要的是让他们获得社会的接纳，从而使脊髓灰质炎幸存者能够顺利重返正常生活。"
 panum.1049.f: "“我曾天真地以为大学生活会很顺利，却惊讶地发现，校园对轮椅使用者并不友好。然而，那个时代就是如此。四处都是台阶，不像高中时有一群朋友可以帮我移动……很多时候，我不得不召集志愿者，或者临时拦下匆匆赶课的同学求助，有时他们会说，‘我没时间，帮不了你。’由于没有一栋宿舍楼是无障碍的，我不得不选择在校外租房。”\n\n——大卫·K，脊髓灰质炎幸存者"
 panum.1049.g: "我们全力支持一项旨在推动社会更广泛接纳轮椅使用者的倡议。"
 panum.1049.h: "资助一项计划，为公共建筑增设无障碍坡道，方便轮椅使用者通行。"
 panum.1051.t: "脊髓灰质炎治疗建议"
 panum.1051.d: "眼下，一份关于脊髓灰质炎的行动建议在学术界不胫而走，这给[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生平添了不少困扰，使其在推行[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]独到的脊髓灰质炎治疗理论时举步维艰。"
 panum.1051.f: "“以正电之力，自下肢输送氧气。常以杏仁粉或氧化水沐浴。外敷之药，取罗马洋甘菊、滑榆、山金车、芥末、斑蝥、甜杏仁油，尤以甘松油与黄木酚为佳。内服之剂，用咖啡因、可乐酊、干燥奎宁盐酸盐、金鸡纳酊、镭水、氯化金、石灰液及胃蛋白酶酒。”\n\n——安吉莉卡·哈森拜因医生，《脊髓灰质炎（小儿麻痹症）流行病的专著》"
 panum.1051.g: "这听起来确实令人信服。"
 panum.1052.t: "石膏绷带与支架"
 panum.1052.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生从几位“脊髓灰质炎专家”那里了解到，腿部夹板是改善患者初始状况的最佳方法——但[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]对此并不信服。"
 panum.1052.f: "那些饱受残余瘫痪之苦的患者，接受了支架治疗，并学会了借助卡钳、拐杖和轮椅来弥补失去的功能。诸如刚性支架和身体石膏等设备，虽被吹捧为有效的治疗手段，却往往因限制使用者的活动而导致肌肉萎缩。事实证明，这些治疗方法大多疗效甚微，难以带来实质性的改善。"
 panum.1052.g: "或许这能有所帮助……？"
 panum.1053.t: "无用的手术"
 panum.1053.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生被外科医生们告知，手术对脊髓灰质炎有积极效果。"
 panum.1053.f: "“我耗费无数时光，采访同行、研读书籍、审查病例，只为说服自己相信脊髓灰质炎手术干预的成功。医生们对其成果颇为自豪。他们处理畸形的手法，宛如精密机械师在组装钟表，以精密工具修缮人体机器。然而，我的印象是，此处的焦点并非疾病，亦非患者——而是医生的声誉。迄今为止，我尚未听闻此法真正成功治愈脊髓灰质炎的案例。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，写于[SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1053.g: "错误的线索。"
 panum.1054.t: "康复血清"
 panum.1054.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生尝试了一种备受赞誉的血清，这种血清在当前的脊髓灰质炎医学中被认为是一种有效的治疗方法。尽管[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]的同事们对此方法深信不疑，但这位医生认为这是在浪费时间。"
 panum.1054.f: "“当时，人们普遍认为这是一种传染病，因此我被注射了所谓的‘康复血清’，这种血清是从脊髓灰质炎康复者的血液中提取的。那种治疗方法在当时颇为流行。然而，现在看来，它似乎并未产生任何效果，因为我的病情发展到了相当严重的瘫痪，双腿和腹部肌肉都无法活动。我被隔离了，我想我可能被告知我患有脊髓灰质炎。然而，我并不知道脊髓灰质炎是什么。没有人告诉我我患有小儿麻痹症，否则我会认出来，因为罗斯福当时是总统，我知道他因这种疾病而严重瘫痪。”\n\n——理查德·O，脊髓灰质炎幸存者"
 panum.1054.g: "但每个医生都开这种药？"
 panum.1055.t: "完全隔离"
 panum.1055.d: "除了限制肢体活动外，一些脊髓灰质炎专家认为完全隔离患者是可取的。[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生亲自进行了这样的实验——并得出结论，认为这是一种低效且不人道的疗法。"
 panum.1055.f: "“在完成腰椎穿刺并确诊为脊髓灰质炎后，我立即被隔离，并被告知不要抬头。我记得他们把我放在婴儿床里！我当时九岁，无法理解为什么我被放在婴儿床里。这让我感到非常屈辱。我当然不会从床上爬出来，也不太可能翻身掉下来。事实上，我几乎无法动弹。当我躺在婴儿床里时，我能感觉到病毒真的开始发作了。就像一扇门猛地关上。我感觉我的世界完全改变了。更糟糕的是，天气非常炎热潮湿，当然，那时还没有空调；我记得感到非常不舒服……”\n\n——莎伦·K，脊髓灰质炎幸存者"
 panum.1055.g: "这是不可接受的！"
 panum.1055.h: "这或许会成为第二段生涯的起点。"
 panum.1055.i: "让这些记录尽快消失。"
 panum.1056.t: "脊髓灰质炎后遗症"
 panum.1056.d: "在最近的一次检查中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生发现，在脊髓灰质炎感染及其影响之后，可能会出现后遗症，即脊髓灰质炎后综合征。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]对这一发展感到彻底绝望。"
 panum.1056.f: "“当我大约35岁或40岁时，我开始感到关节和肌肉剧烈疼痛。我很容易感到疲劳。我去看了医生，做了X光和血液检查。我服用了一些药物并进行了物理治疗。但没有任何帮助。\n在我等待他们找到记录时，我向帮助我的人解释说，我正在经历所有这些新的疼痛，我希望这些记录能帮助解释原因。她问我是否听说过脊髓灰质炎后综合征。我说，‘没有，那是什么？’她解释说，大约在患脊髓灰质炎30或40年后，你会再次经历类似的情况。\n想到要再次应对脊髓灰质炎，我无法承受。我彻底崩溃了。我打电话给我嫂子，告诉她我了解到的情况。我也告诉了我的家人。我哭了很多次。我向我的当地医生展示了我的医疗记录，并解释了我去肯尼修女研究所的预约。他们再次告诉我，脊髓灰质炎已经是过去的事了。我说，‘是的，但我现在就在这里，我再次经历了它！’”\n\n——珍妮丝·G，脊髓灰质炎幸存者"
 panum.1056.g: "真是令人绝望的局面。"
 panum.1061.t: "实验"
 panum.1061.d: "在一次颇具争议但同样成功的实验中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生让猴子感染了脊髓灰质炎。"
 panum.1061.f: "“我近来研读了一则关于让‑安托万·维尔明用以证实肺结核传染性的实验。他通过对兔子进行实验，刻意使其接触肺结核患者的组织。在数十只兔子相继死亡后，他终得以验证其论点。我对猴子的实验，亦基于相似的假设。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，写于[SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1061.g: "如果动物可以被感染，那么人类之间同样可以相互传染。"
 panum.1062.t: "铁肺"
 panum.1062.d: "才华横溢的工程师[ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName]协助[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生建造了一台精巧的设备，彻底革新了脊髓灰质炎的治疗方式"
 panum.1062.f: "铁肺，作为最早实现人体机械通气的临床设备之一，约在1920年由美国工程师菲利普·德林克匠心独运地发明，专为肺部疾病患者提供呼吸支持。患者除头部外，整个身躯被安置于一个空心圆柱体内，颈部通过密封装置与外界隔绝，形成负压环境。这一巧妙设计使得外界气压能够迫使空气经由患者的鼻腔与口腔进入肺部，而呼气则依靠舱内积聚的过压自然完成。\n对于众多脊髓灰质炎患者而言，铁肺仅在疾病的急性期成为他们的生命支柱，直至肌肉功能逐渐恢复。然而，也有部分患者仅在夜间依赖这一设备，更有甚者，需长期与之相伴。铁肺的出现，无疑为那些在呼吸困境中挣扎的患者带来了重获新生的希望。"
 panum.1062.g: "这或许能挽救无数生命。"
 panum.1063.t: "心理支持"
 panum.1063.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生身为一名精神病医生，[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]的经验为小儿麻痹症患者带来了便利。"
 panum.1063.f: "“当我们论及脊髓灰质炎时，我们理所当然地关注其生理层面的影响。然而，在受损的躯体之侧，尚有一颗受伤的灵魂。脊髓灰质炎不仅留下身体的创伤。尤其是在与儿童共事时，我深切体会到这种可怕疾病对其私人生活与社会交往的深远影响。言语虽无法治愈，却能带来慰藉。我们必须为幸存者点燃希望之火，使他们不仅得以生存，更拥有生存的意志。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，写于[SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1063.g: "谢谢你，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生。"
 panum.1064.t: "食谱"
 panum.1064.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生提倡为脊髓灰质炎患者提供营养丰富的饮食"
 panum.1064.f: "“昔日在对抗佝偻病、碘缺乏症、坏血病与糙皮病方面取得的成功，已然表明饮食在抵御疾病中扮演着举足轻重的角色。脊髓灰质炎虽非缺乏性疾病，然众所周知，蛋白质于肌肉构建中至关重要。故而，必须强调，脊髓灰质炎患者的饮食，理应比常人更为丰盈。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，写于[SCOPE.sState('panum_disease_state').GetCityHubName]"
 panum.1064.g: "终于有了吃T骨牛排的医生证明。"
