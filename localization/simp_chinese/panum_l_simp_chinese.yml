 panum.1100.t: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]大流感"
 panum.1100.d: "多家医院、诊所和医生办公室报告了一种奇怪疾病的高发情况，最初他们以为这只是普通流感。如今，病床已人满为患，公共房间不得不被清空。最令人担忧的猜测得到了证实，这显然是邻国肆虐的可怕的[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]流感。"
 panum.1100.f: "起初，医生们认为这只是一场普通的流感疫情。在最初的几天里，媒体声称这是一种奇怪的流行病，但它是无害的，且没有死亡病例。\n\n然而，事实却截然相反。每天，流感疫情都会蔓延到一个新的城市、一个新的地区，迫使医疗体系进行全面调整。昨天，军营里只有两人出现症状，而今天感染人数已飙升至700人。这种疾病的可怕之处在于，它不像往常那样夺走儿童和老人的生命，而是主要侵袭20至40岁的年轻人。每20名患者中就有一人无法幸存。它从何而来，如何传播，究竟是什么：这场疫情仍然笼罩在谜团之中。\n\n然而，已经显而易见的是，这种流感可能会彻底颠覆我们以往所知的常态。要求政府采取行动的呼声日益高涨。[GetPlayer.GetName]将如何应对？"
 panum.1100.g: "这是一种无害的疾病，对吧？"
 panum.1101.t: "西班牙大流感"
 panum.1101.d: "多家医院、诊所和医生办公室报告了一种奇怪疾病的高发情况，最初他们以为这只是普通流感。如今，病床已人满为患，公共房间不得不被清空。最令人担忧的猜测得到了证实，这显然是一场前所未有的大疫。"
 panum.1101.f: "西班牙大流感，这场由一种异常致命的流感病毒变种引发的全球大流行，如同死神挥舞的镰刀，在1918年至1920年间分三波席卷全球，无情地夺走了2000万至5000万人的生命。当时全球人口约为18亿至1亿，这意味着死于西班牙流感的人数甚至超过了第一次世界大战中的战争死亡人数（约1700万人）。据估计，全球约有5亿人感染，死亡率在5%至10%之间，远高于其他流感病原体引发的疾病，令人不寒而栗。\n\n西班牙流感的一个显著特点是，它主要侵袭年轻人（20至40岁），而其他流感病毒通常对幼儿和老年人构成更大威胁。1918年6月29日，西班牙卫生局局长马丁·萨拉萨尔宣布，他没有收到欧洲其他地区有关类似疾病的报告，此后流感被称为“西班牙大流感”。从1918年6月底开始，国际媒体越来越多地使用“西班牙大流感”一词，一些参战国政府也鼓励使用这一名称，以掩盖实际的传播情况。这场灾难被誉为“所有大流行病之母”，其影响之深远，至今仍令人心悸。"
 panum.1101.g: "所以人们已经在讨论西班牙大流感了吗？"
 panum.1102.t: "大疫"
 panum.1102.d: "多家医院、诊所和医生办公室报告了一种奇怪疾病的高发情况，最初他们以为这只是普通流感。如今，病床已人满为患，公共房间不得不被清空。最令人担忧的猜测得到了证实，这显然是一场前所未有的大疫。"
 panum.1102.f: "起初，医生们认为这只是一场普通的流感疫情。在最初的几天里，媒体声称这是一种奇怪的流行病，但它是无害的，且没有死亡病例。\n\n然而，事实却截然相反。每天，流感疫情都会蔓延到一个新的城市、一个新的地区，迫使医疗体系进行全面调整。昨天，军营里只有两人出现症状，而今天感染人数已飙升至700人。这种疾病的可怕之处在于，它不像往常那样夺走儿童和老人的生命，而是主要侵袭20至40岁的年轻人。每20名患者中就有一人无法幸存。它从何而来，如何传播，究竟是什么：这场疫情仍然笼罩在谜团之中。\n\n然而，已经显而易见的是，这种流感可能会彻底颠覆我们以往所知的常态。要求政府采取行动的呼声日益高涨。[GetPlayer.GetName]将如何应对？"
 panum.1102.g: "所以人们已经在讨论[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]大流感了吗？"
 panum.1103.t: "疫情应对方案"
 panum.1103.a.tt: "严格的措施将抑制经济发展，但更有可能更快见效，并在至少部分地区遏制疫情的蔓延。"
 panum.1103.b.tt: "这些措施需要更长的时间才能见效并产生影响，但对经济的冲击会更小。"
 panum.1103.c.tt: "疫情正按照其自然进程发展，已采取的措施将被彻底取消。"
 panum.1104.t: "[SCOPE.sState('panum_flu_fading_state').GetName]的[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]大流感消退"
 panum.1104.d: "显然，[SCOPE.sState('panum_flu_fading_state').GetName]的限制措施已初见成效。几周后，该地区的死亡人数显著下降。"
 panum.1104.f: "在某些条件下，疫情可能会在几周后在一个地区逐渐消退。严格的防控措施、完善的医疗体系、顶尖的医生或高度发达的医疗技术，都有助于加速这一进程。"
 panum.1104.g: "希望的曙光。"
 panum.1105.t: "[SCOPE.sState('panum_flu_disappearing_state').GetName]的[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]大流感消失"
 panum.1105.d: "在过去的几周里，[SCOPE.sState('panum_flu_disappearing_state').GetName]的疫情已显著消退，最近几天未再出现新病例。该地区已彻底摆脱了流感！"
 panum.1105.f: "要使疫情从一个地区彻底消失，它必须已经进入消退阶段。在这种情况下，某些地区可能会在疫情实际结束之前摆脱流感。严格的防控措施、完善的医疗体系、顶尖的医生或高度发达的医疗技术，都有助于消除流感。"
 panum.1105.g: "这些措施是否起到了作用？"
 panum.1106.t: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]大流感的受害者"
 panum.1106.d: "[SCOPE.sCharacter('panum_pandemic_victim').GetFullName]几天前感染了[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]流感，病情急剧恶化。医生们预计情况不容乐观。"
 panum.1106.f: "“大约12点时，我开始感到发热。我烧得厉害，甚至担心会点燃衣服。我咳嗽得如此剧烈，无法抑制时仿佛五脏六腑都要被撕裂。周围一片漆黑；我确信自己得了肺炎，这辈子从未如此孤独和痛苦。……然后，我发现我开始大量出汗，虽然本应感到舒适，但我却比以往任何时候都更加煎熬。当天终于亮时，我已经成了一个痛苦的标本——每次呼吸都伴随着剧烈的咳嗽，心中毫无希望”\n——富兰克林·马丁，[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]大流感幸存者"
 panum.1106.g: "我们无能为力。"
 panum.1107.t: "流感报导引发反战情绪"
 panum.1107.d: "关于[SCOPE.sState('panum_disease_state').GetName]因[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]大流感导致大量死亡的报道，正在动摇民众对我们战争努力的支持。"
 panum.1107.f: "“在这场瘟疫肆虐家园的同时，我们却将人们送上战场，这简直是疯了。国家难道不应该将公民的生命置于死亡之上吗？”"
 panum.1107.g: "我们不会干涉出版自由。"
 panum.1107.h: "分发有医学支持的稳定人心的宣传。"
 panum.1107.i: "有关死亡率和感染的新闻，一律不准报道。"
 panum.1108.t: "抗疫措施助长贫困"
 panum.1108.d: "由于我们的抗疫措施导致许多人无法工作，[SCOPE.sState('panum_disease_state').GetName]愈发贫穷的市民们快要付不起房租了。房东们拒绝暂缓收缴房租，许多失业的劳工面临流离失所的困境。"
 panum.1108.f: "“他们告诉我，由于工厂人满为患，我无法工作。每家工厂都人满为患！房东——愿他在永恒之火中燃烧——对我们的困境漠不关心，冷酷地要求我们在本周末之前交租，否则将面临驱逐。我的家人，必将被赶出家门，流落街头。”"
 panum.1108.g: "颁发租金冻结和禁止驱逐条令。"
 panum.1108.h: "暂时提升社会保障。"
 panum.1108.i: "对此事我们无能为力。"
 panum.1109.t: "反口罩联盟"
 panum.1109.d: "[SCOPE.sCharacter('anti_mask_ig_leader').GetFullName]组建了反口罩同盟，对抗我们的防疫措施。他们质疑我们政策的有效性，并要求我们为了岌岌可危的经济废除这些政策。"
 panum.1109.f: "“戴上口罩，拯救你的生命！我国目前面临的紧急情况已经超出了卫生部门的承受能力。\n不戴口罩会生病。现在不戴口罩的男人、女人和小孩都是些害群之马！”"
 panum.1109.g: "无视这个组织。"
 panum.1109.h: "放弃防疫措施。"
 panum.1109.i: "用医学让这个组织名声扫地。"
 panum.1120.t: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]大流感结束"
 panum.1120.d: "许多人早已不再期待这一天的降临。历经数月的磨难，[GetPlayer.GetName]从未面对过如此严峻的考验，[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]大流感终于在我们的国家逐渐消退。这堪称一场史无前例的全球疫情！"
 panum.1120.f: "“禁令今日终于解除。再也不必佩戴……口罩了。所有场所也重新开放，仿佛一场漫长的噩梦终于苏醒。《泰山情缘》正在大剧场上映，大约六周前便是如此。我无比渴望去观看，仿佛那银幕上的故事能抚慰我疲惫的心灵。学校这周开学——居然定在周四！你能相信吗？仿佛他们连等到周一都等不及！” \n——维尔莉特·哈里斯，[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]大流感幸存者"
 panum.1120.g: "我们希望这疫情永远不要再回来。"
 je_panum_spanish_flu: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]大流感"
 je_panum_spanish_flu_reason: "[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]流感，这场由一种异常致命的流感病毒变种引发的全球性大流行，如同一场无声的风暴，在20世纪初席卷全球，夺走了2000万至5000万人的生命。据统计，约有5亿人感染，死亡率高达5%至10%，远超其他流感病原体引发的疾病，令人不寒而栗。\n\n[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]流感的一大特点是，它主要侵袭年轻人（20至40岁），而其他流感病毒通常对幼儿和老年人威胁更大。因此，它被誉为“所有大流行病之母”，如同一把锋利的镰刀，收割着最富活力的生命。当[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]卫生部长宣称未收到世界其他地区类似疾病的报告时，这种流感被冠以“[GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective]流感”之名。此后，国际媒体广泛使用这一名称，一些政府也借此掩盖实际的传播情况，仿佛在历史的迷雾中，真相被悄然掩埋。"
 panum_remove_spanish_flu_effect_tt: "全面解除所有疫情政策及其带来的影响。"
