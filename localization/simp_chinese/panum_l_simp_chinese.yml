 panum.138.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')]"
 panum.138.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生今天介绍了[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]对[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]的疾病描述，医学院已将其视为经典。"
 panum.138.f: "在[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')]这篇论文中，[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]对该疾病的论述比我国以往任何一位医生都更为详细。[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]向读者介绍了该疾病的症状、潜伏期以及与其他疾病的区别，以及过去流行年表和其他传统的流行病学描述。"
 panum.138.g: "现在我们对这野兽有了更详细的见解。"
 panum.139.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]"
 panum.139.f: "医学院正翘首以待[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]的治疗方法论文。这项研究能否带来突破性的进展？[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]或许能够挽救无数生命。它揭示了[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]爆发的根本原因，以及预防和治疗的创新方法，可能会从根本上改变人们对该疾病的认知。"
 panum.139.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]正不再恐怖。"
 panum.140.t: "霍乱——一种水源传播的疾病！"
 panum.140.d: "感谢 [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的英勇工作，[SCOPE.sState('panum_disease_state').GetCityHubName]的霍乱疫情已被彻底扑灭！"
 panum.140.f: "“自打我来到[SCOPE.sState('panum_disease_state').GetCityHubName]以来，我搜集了大量信息，所有这些证据都指向一个结论：霍乱是一种水源性疾病。几个世纪以来，夺走无数生命的并非空气中的瘴气，而是藏匿于水滴中的微小生物。它们被摄入后，在肠道中滋长，最终演变为我们所熟知的霍乱。这是一个用鲜血换来的教训，但我们迅速采取了行动。上周，他们拆除了疫情中心水泵的把手。今晚，我结束了一天的工作，桌上未添一例新病例。铁证如山。这头肆虐的野兽终于被制服。\n\n然而，我心中仍有一丝怅然。我并非想独占我们在此的发现，只愿这些发现能更早一些。无数生命因缺乏清洁的饮用水而消逝，无论老少。若天佑我等，愿这是我们与霍乱的最后一场交锋。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetCityHubName]霍乱大疫"
 panum.140.g: "难以置信！这对瘴气理论来说是一个致命打击！"
 panum.141.t: "啤酒厂"
 panum.141.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的调查把[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]带到了疫情中的一个区域——啤酒酿造厂。"
 panum.141.f: "“你好！有人告诉我你一定是这家啤酒厂的领班。我是[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生，我来这里是为了调查疫情，请告诉我更多消息。”\n\n“嗯，这里没什么大问题。其他大多数工厂都关门了，但我们没有。”\n\n“霍乱对您影响不大，对吧？您知道为什么吗？”\n\n“恐怕这不是一条线索，但要我说的话，那是因为小伙子们不愿意回到臭气熏天的家里。”\n\n“他们在酿酒厂吃饭？”\n\n“是的，还有喝酒！老板让我们在午餐时喝一些卖得不好的旧酒，以便宜的价格给孩子们提点精神。我们不用井水，只要一品脱啤酒，几乎相当于酿造成本。”"
 panum.141.g: "“嗯……所以你不喝当地的水，非常有趣。”"
 panum.142.t: "习惯的产物"
 panum.142.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的调查仍在继续，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]已经找到了可能是疫情爆发中心的东西。"
 panum.142.f: "“……但这个地区的病情如此普遍，我意识到自己需要更多的指导。幸运的是，当地的验尸官办公室给予了极大的帮助：他们详细记录了每座房屋的尸体运输地址或疾病的发生地点，这使我能够将这些信息准确地标注在一张简易的地图上。结果显示，受影响的区域异常广泛，涉及了超过一百户家庭，同时也形成了一个巨大的圆形区域。\n\n这与传统的观念相悖。如果这是瘴气传播，那么它应该随着微风沿着主导风向扩散才对。可是，结果却超出了风的范围，呈现出一种怪异而规整的圆形。我走到了这一切的中心，也许心中怀有一丝希望能找到某种线索……而我找到的，正是一口水泵。地图上的每一座房屋，都在步行可达的范围内。这里面一定存在某种深刻的联系。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]的日记，写于[TimeKeeper.GetCurrentDate.Format('y')]年，记录了[SCOPE.sState('panum_disease_state').GetCityHubName]的霍乱大疫"
 panum.142.g: "难道……是在泵里面吗？"
 panum.143.t: "怪人"
 panum.143.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生发现了点有趣的东西——疫情爆发有其规律。"
 panum.143.f: "“哦，谢天谢地！您一定就是他们提到的那位医生，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生！拜托，您一定要救救我们！”\n\n“我一定会尽全力帮助您，夫人。请尽可能详细地告诉我关于您和您的家人的情况，哪怕是最细微的细节也不要遗漏。据我了解，您家似乎是这一片唯一出现病例的家庭？”\n\n“是的，是的，我们家确实是唯一的！这病就像凭空冒出来的一样！我们采取了所有预防措施，甚至戴了那些插满花的面具，用来遮挡臭味！”\n\n“那么，您进入了疫区？是什么原因呢？”\n\n“是我母亲，我亲爱的母亲……她总是觉得那边水泵的水更好喝。可是，当我从那儿取水回来时，疾病一定是沾在了我的衣服上，跟着我回到了家里。”"
 panum.143.g: "……你是说——你从那边的水泵取水？"
 panum.144.t: "过滤器"
 panum.144.d: "在[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]试图揭开更多疫情线索的过程中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生发现，所有受害者的饮水均由同一家公司提供！"
 panum.144.f: "“……这真是最奇怪的事情。当我沿着道路向前或者顺着河流向上，到达由新河公司供水的住户时，霍乱病例的数量显著减少。即使有，也不过是零星的几例。然而，当我返回南方时，却发现街道上霍乱肆虐，空气中弥漫着未消化肠胃排泄物和死亡的恶臭。这难道是瘴气土壤的局部化现象吗？\n\n我认为并非如此。边界似乎过于分明。我联系了新河公司的几位尊敬的先生，他们告诉我，公司最近关闭了一段时间管道，以便为泵站安装昂贵的新过滤器。这些过滤器是否在其中发挥了某种潜在作用？是水的洁净偶然间阻止了瘴气的传播，还是另有更深层的原因？”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetCityHubName]霍乱大疫"
 panum.144.g: "……是水中的不洁物带来了瘟疫吗？"
 panum.145.t: "褐水"
 panum.145.d: "配备了最先进的研究仪器后，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生通过[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]的显微镜仔细检查了霍乱爆发的样本。"
 panum.145.f: "将显微镜一路带到[SCOPE.sState('panum_disease_state').GetCityHubName]并非易事，路途的颠簸几乎震碎了每一块镜片……但现在，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生手中掌握了现代医学最强大的工具之一。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]从当地水源中收集了几十个样本，小心翼翼地进行处理，并逐一放在显微镜下观察。一些样本来自霍乱较少的地区，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]注意到，那些水相对较为干净。\n\n而那些污浊的样本呢？那些充满了最污秽之物的样本？\n\n正是来自受灾最严重地区的水样。医生擦了擦额头的汗水，陷入短暂的沉思。液体中漂浮的污垢如同肮脏的雪片般翻滚。在这里，在那里，那些无害的微生物在这恶臭的“汤”中无辜地游动。"
 panum.145.g: "……还是你不像看上去那般无害？"
 panum.145.h: "印证其他理论的更多证据。"
 panum.145.i: "肯定有更多的原因。"
 panum.146.t: "首例死亡"
 panum.146.d: "经过不懈的努力和深入调查，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生追溯到了记录中的首例患者——一名新生儿。"
 panum.146.f: "没有什么比走访一位陷入深切哀悼的女人家更能让[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生直面工作的沉重。这位女人曾是妻子，也曾是母亲，但如今，二者皆已失去。医生刚踏下她家门口的台阶，便开始记录下这些令人心碎的笔记：\n\n新生男婴被抱离家中，去探望祖母，返家后染上霍乱。尿布被清洗，或许携带了病菌。\n\n丈夫下班回家。钢铁厂的工作让他口渴难耐。吃得好，喝得好，但不到一周，便死于霍乱。\n\n身后是撕心裂肺的哭号，眼前是雨中萧瑟的街道。在这片哀伤之中，隐约传来低低的呓语。"
 panum.146.g: "主啊，让这一切结束吧！"
 panum.147.t: "“深渊”"
 panum.147.d: "在[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]进行调查时，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生发现了一个被忽视的线索——一个垃圾坑。"
 panum.147.f: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生虽然对瘴气理论不以为然，但[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]还是很感激那些用来抵御瘴气的花香面具。垃圾坑里堆满了腐烂的垃圾，散发出令人作呕的恶臭，甚至连警察督察都不敢靠近坑边。\n\n“医生！这样的垃圾坑一定是瘴气的来源，还有那可怕的霍乱就是它带来的！”\n\n“或许是这样，但请看看这里，督察。您注意到雨水是如何沿着地面渗入地下的吗？”\n\n“是的，我看到了，可这又能说明什么呢？”\n\n“雨水从这个垃圾坑渗流下去，最终汇入下水沟。如果真是这样，那水流很可能会经过靠近水泵的位置。如果水泵的管件受到了破坏……”\n\n“……那就会把污水直接吸进水泵的手柄里。呃，还好疾病不会通过水传播……”"
 panum.147.g: "……对吗？"
 panum.147.h: "不对！"
 panum.148.t: "富人宅邸"
 panum.148.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的调查将[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]引导到了疫情蔓延的一个不寻常地点——一位富人家中。"
 panum.148.f: "“我今天拜访了一位当地绅士的住所，这是一栋位于城市内颇为宏伟的宅邸，靠近疫情的中心地带，十分危险。这座住宅仿佛是城市早期历史的遗迹，在那个时期，这片地区远比如今富裕得多。宅邸的主人对我的调查表现出了浓厚的兴趣，并慷慨提供了许多关于当地历史的书籍，希望这些书籍能够揭示过去疫情爆发的线索。更令人惊讶的是，他明确表示霍乱尚未侵入他们的宅邸。\n\n这一发现让我深感兴趣。按照瘴气理论的原则，疾病应通过空气和气味传播，不应在贫富之间有所区分。然而，甚至连他的仆人——至少那些居住在宅邸内的仆人——也没有感染。他们的食物取自储藏室，饮水则来自宅邸内的自流井，而这一切似乎让他们免受感染。这是一个令人费解的难题。是他们拥有了某种其他人所没有的东西吗？”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetCityHubName]霍乱大疫"
 panum.148.g: "或许……患者有仆人们所没有的东西？"
 panum.149.t: "微型死神"
 panum.149.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的调查或许揭示了罪魁祸首——一种微生物！"
 panum.149.f: "“……但即便如此，我仍然必须更加谨慎，力求无误。我要求取来新鲜样本，既包括水中的，也包括从病患身上专门提取的污物。将这些样本置于显微镜的载玻片上，我得以仔细观察这些液体，并确认了它们无疑是我们这场战斗中的最大敌人：弧菌。\n\n乍一看，这些微生物似乎无害，更像是一根根管状物，而不像什么强大的捕食者。但每一份来自病患的样本都证明了它们的存在，因此可以有把握地说，这些生物在疾病中起到了重要作用。它们……或许就是霍乱的元凶？或许是。如果真是如此，那么这将成为有力的证据，支持病菌引发疾病的理论。\n\n但有一点可以肯定：我们已经找到了敌人。接下来，我们必须消灭它们。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetCityHubName]霍乱大疫"
 panum.149.g: "清洁并治疗，直到一切完成。"
 panum.149.h: "这一发现远远超出了霍乱的范畴。"
 panum.150.t: "亲手料理"
 panum.150.d: "在与疾病的艰苦斗争中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生与少有的盟友——验尸官在[SCOPE.sState('panum_disease_state').GetCityHubName]相聚，分享并讨论各自的发现。"
 panum.150.f: "“啊，您一定是[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生！请原谅我没有与您握手，这几天我一直忙着解剖尸体。”\n\n“……相信我，无需向我道歉。您是本地的验尸官，请尽管告诉我您的发现。”\n\n“正如您所知，霍乱是一种影响肠道的疾病。这些细节我无需赘述。呕吐、腹泻、肠道堵塞得像凝固的蛋清……像您这样博学多识的人，肯定对这些症状再熟悉不过了。”\n\n“确实如此。但您发现了什么特别之处吗？”\n\n“嗯……他们一直说这是瘴气，是空气中的死亡之气……但说实话，我并不认同。如果真是这样，我恐怕早已丧命。这些天，我的解剖台上摆满了尸体，医生。我闻出了某种‘食物中毒’的味道，但这却又不是那么简单。”"
 panum.150.g: "真有趣，请多讲讲。"
 panum_physician_health_malus_modifier: "孜孜不倦"
 panum.151.t: "工具厂之行"
 panum.151.d: "在[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]进行调查时，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生访问当地工具厂的举动，带来了更多的问题，而非答案。"
 panum.151.f: "“几天前，我去了那家工具工厂。一开始，一切似乎都说得通。这家工厂以生产刀具和屠夫工具为主，因此设有一个打磨站。水车推动着大量磨刀石和磨轮，工人们趴在靠近磨轮的位置，为每一把刀具打磨刃口，他们的确可能会被溅起的水花弄湿。所有这些都合乎逻辑。如果疫情只发生在打磨站，那也是情理之中。\n\n然而，奇怪的是，这里的情况却违背了其他地方的普遍规律。工厂里有些人病倒了，但他们既没有靠近疫情暴发的街道核心区域，也从未接触过打磨站。这怎么可能呢？”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetCityHubName]霍乱大疫"
 panum.151.g: "误导性的线索。"
 panum.151.h: "理论出了问题！"
 panum.152.t: "罐子"
 panum.152.d: "令人遗憾的是，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的努力徒劳无功——他所调查的不过是一起与霍乱毫无关联的本地食物中毒事件。"
 panum.152.f: "“今天简直是令人抓狂的一天。我接到宪兵队的通知，前往调查一家知名酒店突发的疾病，据说是一场霍乱爆发。我带齐了所有工具，通知相关部门为患者准备床位和护理。但一到现场，我立刻明白，这根本不是霍乱。症状完全不对，发病速度也太快了。显然，这次疾病的根源是本地因素。果然，所有患者都吃了同样的一顿饭。\n\n走进厨房后，罪魁祸首显而易见：一罐显然早已变质的鸭肝酱，被一位因感冒堵住鼻子的厨师涂抹在面包上，完全没有察觉到腐败的气味。如果这还不算浪费时间，我真不知道还有什么更荒唐的事情了。食物中毒绝不是霍乱。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetCityHubName]霍乱大疫"
 panum.152.g: "……不过，至少我们明白了该彻底清理橱柜。"
 panum.153.t: "放错地方"
 panum.153.d: "在[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的调查中，竟发生了一个令人啼笑皆非的失误——[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]不慎将样本混淆了！"
 panum.153.f: "正当我沉浸于工作中时，一阵突如其来的喧闹打断了我的思绪。街上传来此起彼伏的喊叫声与打斗声，原来是一场因醉酒而起的斗殴。警察迅速赶来平息了骚乱，将闹事者拖走，但喧嚣声仍久久未散。\n\n我起身关上百叶窗，又匆匆回到工作台前。然而，我竟粗心地将样本放错了顺序，结果导致整个工作流程混乱不堪，连记录也一一错位。真是大意失荆州啊！\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetCityHubName]霍乱大疫"
 panum.153.g: "几周的工作，全白费了。真是该死。"
 panum.154.t: "模仿犯？"
 panum.154.d: "对[SCOPE.sState('panum_disease_state').GetCityHubName]霍乱疫情的调查，突现令人不安的转折——似乎另有隐疾潜伏！"
 panum.154.f: "“啊，%Name%医生，幸会。上周我这工作台可真是忙得不可开交。”\n\n“验尸官，我倒不觉得见到你是件幸事。有何发现？”\n\n“尸体源源不断。我本以为仍是霍乱，或许确实如此，但这情况有些不对劲。”\n\n“食物中毒？”\n\n“非也，以这般夺命速度，绝非食物中毒。且死者多为孩童与老者。”\n\n“霍乱对老弱妇孺尤为致命。你确定这不是霍乱？”\n\n“它又不会在血管里刻下自己的名号。痢疾、霍乱、斑疹伤寒？抑或寻常食物中毒？谁能断言？我只知此病与彼病不尽相同。虽无霍乱之苍白，然死亡无异。”\n\n“如此看来，我们或许正面临第二种疾病……真是祸不单行。我们该如何区分二者？”\n\n“你是医生，我可不是。”"
 panum.154.g: "若不知敌为何物，何以谋定而后动？"
 panum.155.t: "瘴气……"
 panum.155.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生与其调查团队遭遇了一道难题——瘴气之说，莫非确有其事？"
 panum.155.f: "“……然而，这次调查的最新结果却与细菌理论的逻辑背道而驰，令我百思不得其解。这些房屋毗邻一条浅运河，常有驳船穿梭其间，将煤炭运往铸造厂。它们距离任何水泵都不在步行范围内，唯有一口古老的水井。井水清澈纯净，或许是全城最为洁净的。\n\n然而，不知为何，霍乱却在此地悄然蔓延。人们已竭力驱散那刺鼻的臭味，而那臭味，那瘴气，却依旧挥之不去。运河中污水横流，恶臭扑鼻……但若他们未曾饮用这里的水，那除了这令人作呕的气味，他们又何以染上霍乱呢？”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetCityHubName]霍乱大疫"
 panum.155.g: "瘴气之说，岂能当真……然否？"
 panum.156.t: "破家拆屋"
 panum.156.d: "在无尽土地开发欲望的驱使下，[SCOPE.sState('panum_disease_state').GetCityHubName]的发展步伐未曾停歇，纵使[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的调查亦无法令其止步。"
 panum.156.f: "“……您是谁啊？”\n\n“我是来调查这次疫情的医生。这条街以前住了很多病人，现在他们去哪儿了？”\n\n“不清楚。我和伙计们是奉命来拆这房子的。”\n\n“拆房子？为什么？这里曾经住着十几户人家，他们都得了霍乱！”\n\n“现在情况不一样了。房东已经把他们全都赶到了街上。”\n\n“他们现在怎么样了？”\n\n“被赶走了！他们哪还付得起房租？不过也没关系。这块地要改建成纺织厂了。如果您不介意，我和伙计们得马上开始拆房子了。”"
 panum.156.g: "唉，真是倒霉，事情又变成这样了。现在我还得重新找病人……记住啊，啥也别喝。"
 panum.157.t: "感疾染疫"
 panum.157.d: "坏消息！医生也染上霍乱了！"
 panum.157.f: "“我无从知晓这一切是如何发生的。是瘴气作祟吗？几周来，我日夜与病患、亡者以及那些将死之人相伴，比任何人都更接近他们。是细菌感染吗？我未曾饮用这里的水，但污染呢？它是否通过接触传播？在空气中，在物体表面？我不得而知。\n\n但我深知这些症状。胃部翻江倒海，永无宁日。我吃什么都无济于事。这一切揭示了一千个真相，但只有一个结论。\n\n我，染上了霍乱。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetCityHubName]霍乱大疫"
 panum.157.g: "唉，我真希望[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]能早日康复。"
 panum.161.t: "来杯杜松子酒"
 panum.161.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生暂且搁置手头工作，转而“探究”其另一心头好：杯中物。"
 panum.161.f: "“……然而，当我啜饮第二杯那神奇的饮料时，一种奇特的现象引起了我的注意。来越多的人光顾此地饮酒，他们感染霍乱的几率便越低。确实如此！我亲手绘制的分布图清晰地显示，那些毗邻此地的房屋，感染这种可怕疾病的概率显著降低。\n\n我隐约察觉到一种规律。我与店主及几位和善的当地人攀谈，他们似乎也深以为然。此地仿佛蕴藏着某种抵御疾病的神秘力量。我决定深入调查，一探究竟。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetCityHubName]霍乱大疫"
 panum.161.g: "啊，生意与享乐，二者兼得，妙不可言。"
 panum.162.t: "干杯！"
 panum.162.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生行惊人之举——[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]竟饮下污水，令自身染上霍乱！"
 panum.162.f: "“……诚然，再精妙的理论若缺乏实践，也不过是空中楼阁。尽管我倾尽全力，但我的批评者仍将其视为偶然，他们坚称缺乏无可辩驳的证据来支撑我的观点。既然如此，我便以最直接的方式迎战：喝下由一位忠实的信使送来的、这次疫情中心的水。若他们所言不虚，即便远离此地，我亦安然无恙；若我言之有理，我或将与死神搏斗，但与若我能证明自己的观点、拯救无数生命相比，区区一条性命，又何足挂齿？\n\n于是，我最亲爱的日记，让我们为健康举杯。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetCityHubName]霍乱大疫"
 panum.162.g: "“哎呀，我这是……糟了。”"
 panum.162.h: "劝阻医生不要进行这种鲁莽的行为！"
 panum.163.t: "通往成功的地图"
 panum.163.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生成功绘制出一幅精妙的疫情核心地图，令疾病进展一目了然。"
 panum.163.f: "“诸位先生，容我向您展示这幅[SCOPE.sState('panum_disease_state').GetName]疫情地图。其详尽无遗地标注了该地区每一处感染点的位置，并辅以时间戳记，记录了死亡人数、感染人数等关键信息。此图清晰呈现了该社区霍乱爆发的完整时间线。譬如，此处可见一水泵及其步行范围内的房屋数量。\n\n此外，我还编制了以下表格，数据皆源自该地图。若诸位先生肯垂目一观，便会发现，由该水泵供水的区域，死亡率冠绝全城。此表格显示，[SCOPE.sState('panum_disease_state').GetName]供水公司与这些水泵直接相关，进而表明，在所有服务区域中，该公司所辖区域的霍乱风险最高……”"
 panum.163.g: "终有一天这将成为科学的范式。"
 panum.164.t: "烈焰与雷霆"
 panum.164.d: "[SCOPE.sState('panum_disease_state').GetName]抗击霍乱疫情的进展迟缓，已令[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的耐心消磨殆尽。"
 panum.164.f: "怒吼声几乎响彻整个街区，书本与杯盏从桌上飞掷而出的声响，即便在门外亦清晰可闻。一连串的咒骂，助手们惊慌失措的哀求，随后是更激烈的咆哮，不绝于耳。\n“你们这些笨蛋！真是蠢到家了！我们在这里，难道是没有原因的吗？外面的人正在受苦受难，他们把希望寄托在我们身上，等着我们去救他们，我们绝对不能辜负他们的期望！”\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生紧紧握住了拳头。\n“如果你们连最简单的命令都没法遵守，那就不配留在这里！凡是能听从命令的人，必须严格遵守我的指示，我们一定要把这该死的瘟疫彻底消灭！听明白了吗？”\n“明白了，博士！”\n“赶紧出去，给我找到更多的样本！这次绝对不能出错！”"
 panum.164.g: "于是，医生率其麾下之师，整装待发，誓与病魔一决高下。"
 panum.165.d: "在无畏的时刻，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生亲临[SCOPE.sState('panum_disease_state').GetCityHubName]中疫情最为严峻的医院之一，探访了那里的病患。"
 panum.165.f: "这所临时医院的病房拥挤不堪，充斥着各种景象与声响，但最为刺鼻的，莫过于那疾病与死亡的气息。人们带来鲜花与熏香，试图驱散恶臭，然即便如此，鲜有人愿踏入这被诅咒之地。他们言道，此地太过凶险，恐危及自身健康。若己身亦卧病榻，奄奄一息，又如何助人？\n\n然虽鲜有人至，却非无人问津。[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生便是其中之一，他们以无尽的勇气与无穷的精力，穿梭于这死亡与垂危交织之地。他们坐于病患与孤独者之侧，询问病情，记录笔记。每一思绪，每一回答，皆弥足珍贵。此乃救赎之线索，死亡源头之提示，亦为消灭此疫之关键。"
 panum.165.g: "在这死亡殿堂中，一位生命天使手持笔记，翩然穿行。"
 panum.166.t: "祷告之力"
 panum.166.d_christian: "为求洞见，亦或慰藉，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生于当地大教堂寻得一位神父。"
 panum.166.d_muslim: "为求洞见，亦或慰藉，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生于当地清真寺寻得一位伊玛目。"
 panum.166.d_other: "为求洞见，亦或慰藉，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生于当地佛寺寻得一位主持。"
 panum.166.f_christian: "“神父，愿平安归于您。我乃[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生，奉京城之命前来查考此次瘟疫，并尽我所能施以援手。若蒙您恩准，我恳求您的帮助。”\n\n“我不过是主的仆人，卑微如尘土，非全能者，然而我必尽心竭力。孩子，请告诉我，你有何所求？”\n\n“我愿知晓这瘟疫起初的情形。谁是那首先受害的人？何处是这灾祸的起源？您对这瘟疫的来由有何见解？”\n\n“这些事唯有耶和华能全然知晓，但我对会众的情形略知一二。请随我来，我也一直在记录这一切。”"
 panum.166.f_muslim: "“愿安拉之平安与您同在，伊玛目。吾乃医者[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]，奉都城之命，特来查探此疫之端，并竭力施以援手。若蒙您垂怜，愿得您的相助。”\n\n“吾不过安拉座下一卑微仆人，非全能者，然必尽吾所能，以应天命。请言明，汝需何助？”\n\n“吾欲详知此疫初起之状。何人首遭其殃？何处为其源头？您对此疫之来源有何高见？”\n\n“此中诸问，唯安拉全知全能，然吾对此地社区略知一二。请随我来，吾亦一直在记录此事。”"
 panum.166.f_other: "“祭司，向您致意。我乃[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生，奉首都之命前来调查此次疫情，并竭尽所能提供援助。若您愿施以援手，我恳请您的协助。”\n\n“吾不过此庙一介卑微守护者，非神明之一，然必竭尽所能。医生，请告知，汝需何助？”\n\n“吾欲尽可能详知此疫初起之况。何人首当其冲？何处为源？您对其来源有何见解？”\n\n“此中诸问，唯神明可答，然吾对此地民众知之甚详。请随我来，吾亦一直在记录。”"
 panum.166.g_christian: "洁净近于神圣。"
 panum.166.g_muslim: "每一种疾病都有其治愈之法。"
 panum.166.g_other: "明察何者引你前行，何者阻你脚步。"
 panum.167.t: "宁可稳妥，勿留遗憾"
 panum.167.d: "为确保调查期间的安全，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生将自身妥善隔离，远离病患。"
 panum.167.f: "“或许有人会讥讽此为怯懦，但我更愿称之为务实。这场战斗并非一蹴而就，无法像将刺刀刺入敌人心脏般迅速了结。这是一场更为艰巨的战役，对手无形无影，却可能潜伏于我们四周。\n\n缺乏周全的防护，实为愚行。隔离，乃是最关键的防线。从安全区域获取食物与水源，置身于洁净的研究场所，与感染者及其物品的接触皆通过中介进行。远离疾病的威胁，我得以潜心研究，全力以赴揭开这场疫病背后的真相。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，其中记述了[TimeKeeper.GetCurrentDate.Format('y')]年的[SCOPE.sState('panum_disease_state').GetCityHubName]霍乱大疫"
 panum.167.g: "……然纵使[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]，终须亲力亲为。"
 panum.168.t: "孜孜不倦"
 panum.168.d: "为探明霍乱疫情之根源，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生挑灯夜战，废寝忘食。"
 panum.168.g: "那么，警官，我们不妨一起在这条街上走走。"
 je_panum_cholera_treatment_goal: ""
 je_panum_germ_theory: "细菌与瘴气"
 je_panum_germ_theory_reason: "希波克拉底被视为瘴气理论之鼻祖，瘴气乃土壤中散发之毒气，随空气扩散，致疾病蔓延。19世纪时，因对细菌与病毒知之甚少，医者与研究者将霍乱等疫病简单归咎于“瘴气”所携之恶臭。此理论后被证实为医学之歧途，然瘴气模型已部分阐明疫病之源及其传播之道。19世纪中叶，主张人传人之传染论者与支持瘴气理论之反传染论者，时有激烈冲突。虽瘴气模型之弊在伦敦已为人所识，然清洁与隔离等应对瘴气之临时举措，确在一定程度上遏制了疫病之蔓延。\n\n若一国寻得充分证据，佐证细菌理论而驳斥瘴气理论，则此范式之变将减少探寻疗法或应对疫病时之负面事件。细菌理论之首位发现者，将获额外研究之嘉奖。"
 je_panum_germ_theory_goal: ""
 notification_panum_germ_theory_notification_name: "细菌理论的突破"
 notification_panum_germ_theory_notification_desc: "来自[GetGlobalVariable('panum_germ_theory_invented_global_var').GetCountryDefinition.GetName]的一位[concept_panum_physician]首次从各个方面确凿地证实细菌理论，瘴气理论被彻底否定。"
 panum.11.t: "细菌理论"
 panum.11.d: "鉴于细菌理论的证据确凿，而反对瘴气理论的证据同样确凿，医学范式发生了转变。细菌学说之所以能够确立，至少要归功于[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士。"
 panum.11.f: "瘴气理论是难以反驳的科学论断例子，因为它可能在任何地方都得到了证实。在19世纪，清洁空气的卫生规定确保了一些疾病的实际消失，这一事实似乎证实瘴气理论的“真实”，但这也阻碍了医学科学在多个领域的突破，因为真正的病因和实际的治疗方法仍不为人知。从现在起，医生们将更容易找到治疗方法，病原体和疫苗研究的道路也将畅通无阻。"
 panum.11.g: "但是我们真的想知道水中发生了什么吗……？"
 panum.53.t: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生正前往疫情地区"
 panum.53.f: "治疗方法是战胜疾病的核心环节，更是未来研发预防性疫苗的重要基石。即便是一种成功的治疗方法，也足以有效遏制未来流行病的蔓延，大幅缩短其持续时间并减轻其危害，从而显著降低受害者的数量。相较于在国外出差的医生，那些在本国研究流行病的医生往往能够更高效地开展工作。"
 panum.53.g: "这场噩梦必须终结！"
 panum.54.t: "医学研究考察"
 panum.54.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生精心组建了一支由专家和助理组成的小型团队，他们有能力深入探究国外的流行病，并有望研发出全新的治疗方法。眼下亟待解决的问题是，究竟该选择哪个国家，以及针对哪种疾病展开深入观察。"
 notification_panum_epidemic_spread_notification_name: "疫情正在蔓延"
 notification_panum_epidemic_spread_notification_desc: "尽管我们全力以赴，疫情依然蔓延到了另一个地区。"
 panum_add_germ_theory_effect_tt: "[concept_panum_germ_theory]取代#ORANGE 瘴气理论#!成为了主流医学范式。"
