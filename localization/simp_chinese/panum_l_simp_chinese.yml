 je_panum_medical_techniques_project: "引进医疗技术"
 je_panum_medical_techniques_project_reason: "医生[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]的目标是在[GetPlayer.GetName]全面推广最新的医疗技术。这一过程的推进速度取决于[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]的特质和经验。完成医疗改革后，我们的国家将获得一个更好的修正，用以取代原有修正。在某些情况下，一位[concept_panum_physician]甚至可能研发出具有里程碑意义的发明，从而彻底改写医学发展的历史。"
 panum_medical_techniques_advance_tt: "[GetPlayer.GetName]的医疗技术已提高一级"
 panum.2401.t: "预防接种"
 panum.2401.d: "全民疫苗接种计划的引入最初在民众中引起了怀疑，但在[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生访问了多个地区并展示了接种过程后，大多数民众已经习惯了这一程序。"
 panum.2401.f: "最初，疫苗接种的提议遭遇了某些人的抵触。那些忧心忡忡的母亲，紧紧牵着害怕的孩子；那些对这一新事物持怀疑态度的年迈绅士；以及一些虔诚的宗教信徒，他们忧虑科学的步伐已经越过了他们理解的界限。然而，随着时间的推移，教育逐渐化解了这些疑虑——人们了解了疫苗的原理，明白了接种的必要性，但更重要的，还是疫苗所带来的显著成果。那些原本可能深受致命疾病摧残的孩子，幸运地保住了健康与视力，免去了人类历史上最为可怕疾病带来的后遗症。看着这些孩子焕发活力、毫无疤痕，几乎没有人再需要劝说。"
 panum.2401.g: "医疗革命！"
 panum.2401.h: "我国的医疗卫生标准正在提高。"
 panum.2402.t: "麻醉"
 panum.2402.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生已在多家诊所成功展示了这种创新的麻醉技术。如今，它已成为特别复杂手术中不可或缺的标准麻醉方案。"
 panum.2402.f: "呼——呼……呼！"
 panum.2402.g: "在患者无意识的状态下实施手术？这种做法是否合乎规范？"
 panum.2403.t: "注射器和钳子"
 panum.2403.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生引入的新医疗设备起初虽需磨合，但如今已悄然成为每位医生诊所的标配。"
 panum.2403.f: "“医生，那是什么工具？”\n“不是工具，是注射器，用来注射液体的。”\n“我猜那是牙科手术用的？”\n“不，那是钳子。”\n“哦，明白了。那是个新手术刀吗？”\n“那是我的午餐餐具。”"
 panum.2403.g: "这一领域的专业化进程，着实令人叹为观止。"
 panum.2404.t: "消毒"
 panum.2404.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生以无可辩驳的事实证明了灭菌的重要性，并已将其推行至[GetPlayer.GetName]全体医生，要求他们严格执行洗手与工具消毒的规范。"
 panum.2404.f: "“诚然，仍有一些人认为这些举措多此一举，其中不乏曾挽救过无数生命的博学之士。对这些德高望重的先生们，我恳请你们：倾听科学的证据。细菌理论的发现已揭示，疾病源于微生物，而这些微生物可以在感染发生前被彻底消灭，从而拯救本可能逝去的生命。这一点在[ROOT.GetCountry.GetCapital.GetCityHubName]最大医院的产科病房中得到了最有力的印证，新产妇的死亡率从18.3%骤降至仅2.2%，而这仅仅用了一个月的时间。”\n“显然，尊敬的先生们，数据胜于雄辩。”"
 panum.2404.g: "谁能料到，接触病人后洗手竟有如此举足轻重的意义？"
 panum.2404.h: "啊，原来医生随身携带一瓶酒，还另有深意！"
 panum.2404.i: "嗯，这倒像是个冠冕堂皇的托辞……"
 panum.2405.t: "病历"
 panum.2405.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生通过优化登记流程与建立病历系统，显著提升了患者就诊的现代化水平，无论是在诊所还是医院。"
 panum.2405.f: "病历是对某一特定医疗机构管辖范围内单个患者医疗历史与护理过程的系统性记录。医疗历史是从患者出生至今所经历事件的纵向档案，囊括了重大与轻微的疾病，以及生长发育的重要里程碑。它为临床医生提供了患者过往的背景信息，从而常常为当前疾病状态提供重要线索。医疗历史包含多个子集，如手术史、药物与医疗过敏史、生活习惯或免疫接种史。在病历中，每次医疗接触都会由医生、执业护士或医师助理以独立的形式对患者的医疗历史进行总结，并可以呈现为多种形式。当患者住院时，病历会每日更新，详细记录临床变化。"
 panum.2405.g: "统计学、数学、官僚体系与医学——终于实现了完美的融合！"
 panum.2406.t: "救护车的正式启用"
 panum.2406.d: "数日前，[ROOT.GetCountry.GetCapital.GetCityHubName]的一位富商慷慨解囊，向当地医院捐赠了一辆新车——这是全[GetPlayer.GetName]上下首辆自驱动救护车。"
 panum.2406.f: "“……在那里，我见到了它。它通体洁白如雪，十字标志熠熠生辉，这辆新式救护车不再需要马匹的牵引或人力的推动，而是凭借自身的引擎动力疾驰。这是破天荒的第一次，那些生命垂危的伤员得以迅速被送往医院，接受最及时的救治与护理，此举必将拯救无数本可能消逝的生命。见此情景，我心潮澎湃，因为在这里，人类最光辉的一面——对陌生人的无私大爱——正毫无保留地展现在世人眼前。”\n\n摘自[TimeKeeper.GetCurrentDate.Format('y')]年《[ROOT.GetCountry.GetCapital.GetCityHubName]公报》"
 panum.2406.g: "真是了不起！现在，它只差一个警报器了……"
 panum.2406.h: "真是太好了！我们的医院将充分发挥这些资源的作用！"
 panum.2407.t: "空中救护车"
 panum.2407.d: "刚刚有消息传到首都，发生了一件令人惊叹的壮举：一名飞行员将一名临产妇女从农村地区紧急飞往医院，这是[GetPlayer.GetName]历史上首次医疗飞行急救！"
 panum.2407.f: "“……当然，集中注意力并非易事。要知道，飞机上座位有限，而产妇的哭喊声几乎压过了螺旋桨与引擎的轰鸣。然而，与眼前的情形相比，这些都显得微不足道——这世上没有人能对一位急需帮助的女性的呼救无动于衷。因此，当她在观景场突然分娩时，我毫不犹豫地做了任何善良之人都会做的事，以最快的速度将她送往医院，交给了医术精湛的医生。后来我得知，这原本可能是一次危险的臀位分娩，但正是由于及时赶到，医生得以调整胎儿的位置，最终实现了健康的自然分娩。\n是的，我深信那个孩子是以我的名字命名的。”\n\n摘自[TimeKeeper.GetCurrentDate.Format('y')]年《[ROOT.GetCountry.GetCapital.GetCityHubName]公报》"
 panum.2407.g: "原来婴儿真的是乘着飞机降临人间的！"
 panum.2407.h: "这是天下母亲共同的欣慰！"
 panum.52.l: "[SCOPE.sCountry('panum_measles_country_scope').GetName]的麻疹疫情。"
 panum.52.n: "[SCOPE.sCountry('panum_plague_country_scope').GetName]的鼠疫疫情。"
 panum.52.o: "[SCOPE.sCountry('panum_diphteria_country_scope').GetName]的白喉疫情。"
 panum.52.p: "[SCOPE.sCountry('panum_polio_country_scope').GetName]的脊髓灰质炎疫情。"
 country_panum_surgical_treatment_success_chance_mult: "外科治疗成功率"
 country_panum_psychological_treatment_success_chance_mult: "心理治疗成功率"
 panum.641.t: "法定报告疾病"
 panum.641.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生已向当局递交了一封紧急信函，呼吁停止将麻疹视为一种良性疾病，并将其列为法定报告疾病。"
 panum.641.f: "“吾不得不听同事之责，乃至极有影响力之同僚于最高国家与大学机构中之指责，谓吾夸大麻疹之险。吾甚至被指为提升己位而夸大麻疹问题。诚然，麻疹之死亡率介乎2%至5%之间。然若吾等仅假设每百人中二人死于麻疹，则于千万人口之国，此意味数千人死亡。全球范围内，数百万死亡可借简单防护措施避免。若吾等皆稍加留意，循规以救生灵，岂不更善？吾等欲犯与刚分娩之妇及医生不洗手之傲慢相同之误乎？纵此仅时间之小投，然其影响巨大。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]医生致[SCOPE.sState('panum_disease_state').GetName]地方政府函"
 panum.641.g: "小事亦可成大效。"
 panum.642.t: "动物感染麻疹"
 panum.642.d: "在一次备受瞩目的动物实验中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生成功使猴子感染了麻疹。"
 panum.642.f: "“鉴于此课题之重要性，加之他种动物显不易感，吾等以为，进一步测试猴子对麻疹感染之易感性，实属必要。\n\n吾等一年前着手，今欲报告若干结果，吾等深信，此结果可证恒河猴可通过麻疹病例全身循环之血液感染，且此感染之猴或现明确发热反应，类人麻疹之体温变化，无论是否伴全身皮疹。\n\n吾等工作之详节，将于正在筹备之论文中详述。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]医生致医学院之报告"
 panum.642.g: "这将为找到成功的治疗方法提供助力。"
 panum.642.h: "这将为寻找病原体提供帮助。"
 panum.643.t: "一种随年龄变化的疾病"
 panum.643.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在[SCOPE.sState('panum_disease_state').GetName]审查了多例病例，并注意到患者死亡率存在显著差异。"
 panum.643.f: "“麻疹常被视为一种无害的儿童疾病。然而，我的研究揭示，此说仅适用于幼儿园年龄的孩童。相比之下，6个月至3岁幼儿的死亡率尤为高企。此后，死亡率则迅速下降。尽管成人麻疹被认为无甚大碍，但卢德维格·潘努于法罗群岛的报告表明，免疫接种最好在儿童时期完成——经验丰富的渔民亦报告了该病的严重病程，甚至死亡案例。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，写于[TimeKeeper.GetCurrentDate.Format('y')]年"
 panum.643.g: "因此，存在一些特殊的高风险群体。"
 panum.644.t: "高度传染性"
 panum.644.d: "在访问[SCOPE.sState('panum_disease_state').GetName]的一所学校时，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生亲眼目睹，一旦疾病爆发，其传播之势几乎无法阻挡。"
 panum.644.f: "“感谢博士莅临。”\n“吾心甚慰，小姐。贵校现下麻疹病例几何？”\n“不幸已失其踪。昨日有三十五例，然今应逾四十矣。”\n“首例麻疹何时记录？”\n“上周。\""
 panum.644.g: "真让人担心。"
 panum.645.t: "喷嚏与咳嗽"
 panum.645.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生建议采取类似于流感或肺结核的隔离措施，以遏制麻疹的蔓延。"
 panum.645.f: "“麻疹虽未被视作呼吸道疾病，但我的疑虑已得证实，此乃遏制其传播的唯一途径。麻疹——人类最具传染性的疾病之一——显然通过飞沫传播。有报告称，即便离开房间两小时，室内之人仍可能被感染。显然，传染性分泌物在之后依然具有传染性。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，写于[TimeKeeper.GetCurrentDate.Format('y')]年"
 panum.645.g: "所幸，此皆广为人知之法。"
 panum.646.t: "抗生素"
 panum.646.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生发现一些新型抗生素可能减轻麻疹副作用。"
 panum.646.f: "“麻疹常被视为无需过分担忧的疾病，部分原因在于其通常不伴随进一步的副作用。然而，不幸的是，情况并非总是如此。继发性疾病，如耳部或肺部感染，往往在轻度、重度乃至致命病程之间起到决定性作用。抗生素虽无法根治麻疹，却能减轻其带来的恐惧。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，写于[TimeKeeper.GetCurrentDate.Format('y')]年"
 panum.646.g: "抗生素！越多越好！"
 panum.646.h: "这些研究成果将为寻找真正的病原体提供重要线索。"
 panum.647.t: "统计数字"
 panum.647.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在麻疹病例统计、感染家庭处理及数据评估方面展现了非凡的才能。"
 panum.647.f: "“于过去数年可用数据之细致研究中，吾检视二十二国麻疹患者之死亡率，结论如下：\n\n智利4.84%，匈牙利4.43%，澳大利亚0.24%，苏格兰0.35%，西班牙3.85%，意大利、英格兰与威尔士2.91%，美国1.08%。于麻疹为地方病之国，每三至五年，随人口更新，疫情爆发。其后，死亡率更高，达10%，尤见于太平洋诸岛屿与非洲。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]医生致医学院之报告"
 panum.647.g: "有用。"
 panum.647.h: "这位医生才华横溢，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]应在其领域深耕细作，更进一步。"
 panum.648.t: "更多数据"
 panum.648.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生发布了一组关于麻疹传播与感染的惊人数据，令人瞩目。"
 panum.648.f: "“麻疹传染性极强，据估，九成未免疫者接触感染者后皆会染疾。数学模型估其基本传染数为12至18；即单个感染者引入易感人群后，平均引发之二次感染人数。其传染性极剧：十名未免疫且与感染者共处一室者，九人皆会染疫。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]医生致医学院之报告"
 panum.648.g: "昔日仅凭直觉捕捉的真相，如今已被科学之光所照亮。"
 panum.649.t: "无症状感染"
 panum.649.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生经过实地观察后提出，麻疹在症状显现前，便可通过无症状感染者传播，这一推测合乎逻辑。”"
 panum.649.f: "“麻疹高流行率乃众所周知之现象，自古便知感染之险。一大问题在于，表面健康者亦携此疾，纵使其似未爆发。此推翻了先前诸多有效之假设。传染性——如[SCOPE.sState('panum_disease_state').GetName]数次观察所示——于皮疹出现前四日始，通常持续至皮疹出现后四日。似传染性恰在皮疹发作之前。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]医生致医学院之报告"
 panum.649.g: "鉴于此，进一步开展全面而深入的调查势在必行。"
 panum.650.t: "营房消毒"
 panum.650.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生走访了[SCOPE.sState('panum_disease_state').GetName]的一处军营，该军营采取了一系列示范性措施，有效防止了麻疹在年轻人中的传播。"
 panum.650.f: "“部分措施包括对新入伍士兵实施较以往更为严格且持久的隔离；加强监管，杜绝士兵在营房、食堂、剧院及其他场所聚集；相邻床铺采取头脚交错排列；持续湿拖并消毒地板、墙壁、桌面及门把手。全体工作人员皆着长袍与纱布口罩，勤加更换，并于接触患者前后以肥皂、清水或消毒剂洗手，此举在以往并不常见。部分病房更要求工作人员佩戴橡胶手套。患者被安置于隔离小隔间内，床单悬挂于床周金属线之上，且须佩戴口罩。隔间床单不时喷洒消毒剂。佩戴口罩之患者，仅能在护理人员监督下，逐一使用洗手间。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，写于[TimeKeeper.GetCurrentDate.Format('y')]年"
 panum.650.g: "抗击麻疹的现代方法"
 panum.651.t: "接种失败"
 panum.651.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士仿天花接种之法，欲免疫麻疹，然终告惨败。"
 panum.651.f: "1757年，苏格兰医生弗朗西斯·霍姆发现麻疹是由病原体引起的：他利用感染者的血液将疾病传播给健康个体，并证明其由传染性病原体所致。他对一组12名儿童进行了试验，其中10名在6至7天的潜伏期后出现了典型的中度发热皮疹，另外2名则未感染。然而，由于技术困难，尤其是在合适时机获取麻疹材料以进行接种的难题，这种方法很快被摒弃。"
 panum.651.g: "浪费时间。"
 panum.652.t: "漱口"
 panum.652.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生尝试了几种多年来被同行医生推崇的漱口疗法，用于治疗麻疹。然而，这些方法最终都以失败告终。"
 panum.652.f: "“最后一次实验过后，我心中所留，远非仅是一抹苦涩的余味。一方面，纵使是蛇油，其效果亦胜于此；另一方面，我们的医学行会竟容忍了如此之多的蛇油贩子与江湖郎中，此辈亟需被肃清。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生的日记，写于[TimeKeeper.GetCurrentDate.Format('y')]年"
 panum.652.g: "汝言蛇油无用，何意？"
 panum.653.t: "消毒喷雾"
 panum.653.d: "在一处军营中，感染麻疹的士兵最近开始服用消毒剂。医生认为此举极为荒谬，并不得不费尽心思进行劝说。"
 panum.653.f: "“吾等确应在化学与医疗产品之标签上附以小图，纵使愚者亦能明晓，何者不可施于液体、喷雾或其他物质。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]医生致安吉莉卡·哈森拜因医生函"
 panum.653.g: "这是我们为寻找治疗方法而白白浪费的宝贵时间！"
 panum.661.t: "吃一片维他命！"
 panum.661.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生研究发现，麻疹患者服用维生素可显著缓解不适症状，减轻副作用。"
 panum.661.f: "“维他命之效，广为人知，然于麻疹之例，其效令吾惊异。缺乏维他命A之孩童，或罹重疾，甚或失明。维他命A补充剂可强健整体免疫系统，然其无法治愈此疾。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]医生致医学院之报告"
 panum.661.g: "好得很啊！"
 panum.900.t: "白喉疫情"
 panum.900.d: "最新疫情——#YELLOW 白喉#!正在摧毁[SCOPE.sState('panum_disease_state').GetName]！"
 panum.900.f: "白喉是一种主要侵袭儿童的急性传染病，由上呼吸道感染（咽白喉）引发。1826年，皮埃尔·菲德尔·布雷托诺将'diphtherite'（白喉炎）一词引入医学领域。该词特指喉部的假膜，即由坏死的黏膜和血液成分构成的深色伪膜（喉部和气管中的褐色沉积物）。白喉自古便为人所知，希波克拉底早在其著作中描述过这种疾病。白喉的致死率为5%至10%，而在五岁以下儿童和四十岁以上成人中，致死率甚至可能高达20%。"
 panum.900.g: "我的喉咙也感到一阵紧缩。"
 panum.920.t: "白喉疫情结束"
 panum.920.d: "这场曾令我们国家陷入困境的严重白喉疫情终于画上了句号。医生和当局宣布解除警报，孩子们重新走上街头，老年人也如释重负。"
 panum.920.f: "“在一个潮湿寒冷的季节，新罕布什尔州内陆小镇金斯顿爆发了一种被称为‘喉疾’的疾病，主要侵袭儿童，病情极为凶险，堪称该国迄今为止最致命的疾病。”\n——诺亚·韦伯斯特"
