 panum.301.t: "天花传播至[SCOPE.sState('panum_disease_state').GetName]"
 panum.301.d: "根据最新报告，天花已泛滥于[SCOPE.sState('panum_disease_state').GetName]，我们的抗疫举措并不很成功。"
 panum.301.g: "到处都是天花！"
 panum.302.t: "天花疫情波及[SCOPE.sCountry('panum_infected_country').GetName]"
 panum.302.d: "我们收到报告称，[SCOPE.sCountry('panum_infected_country').GetName]出现首例天花病例，当局指责我们没有采取足够措施来防止天花蔓延。"
 panum.302.g: "谁能想到……"
 panum.303.t: "天花失控"
 panum.303.d: "[SCOPE.sState('panum_disease_state').GetName]的医疗系统已濒临崩溃。医生们害怕感染也已经开始离开该地区，现在我们不得不上调该地区的死亡人数。"
 panum.303.f: "“无人尝试统计受害者之数，亦无法准确计算此等部落中之人；据信，若密苏里河上游印第安人之17200人数字翻倍，则落基山脉以东之死亡总数亦不为过。”"
 panum.303.g: "这种可怕的疾病难道无药可治？"
 panum.401.t: "斑疹伤寒蔓延到[SCOPE.sState('panum_disease_state').GetName]"
 panum.401.d: "斑疹伤寒已蔓延到另一个省份。[SCOPE.sState('panum_disease_state').GetName]的报告显示，越来越多的人感染了这种疾病。"
 panum.401.g: "斑疹伤寒似乎势不可挡……"
 panum.402.t: "道德败坏的疾病？"
 panum.402.d: "关于斑疹伤寒是什么、怎么发病以及如何有效防治都是一团迷雾，因此感染原因有很多说法，主流观点认为，斑疹伤寒是一种与生活方式而非传播方式有关的疾病。"
 panum.402.f: "与肺结核类似，许多医生也认为斑疹伤寒不是一种传染病，甚至人们以一种近乎浪漫的方式看待肺结核——一种浪漫主义者的才会有的疾病。而斑疹伤寒则被视为道德败坏的耻辱，因为上层阶级不受影响。正如在中世纪，人们常常将疾病归因于神的影响或惩罚一样，性格缺陷或堕落在某种程度上与某些疾病相关，这似乎已成为公认的事实，只是从十九世纪后，这种观点才开始发生变化。"
 panum.402.g: "斑疹伤寒主要影响罪犯、妓女和逃兵，这是有原因的。"
 panum.402.h: "这些人住在哪里比是什么人更不重要。"
 panum.403.t: "隔离"
 panum.403.d: "中上层阶级，希望为受斑疹伤寒影响的下层社会自己提供设施，因此这些“发烧隔离区”的费用也将由非营利组织支付。然而，一些贫困阶层的代表认为这与其说是一种医疗保健手段，不如说是一种排斥手段。另一方面，一些政府成员则希望实行完全隔离，但中产阶级认为这是一种过分的措施。"
 panum.403.f: "与许多其他流行病一样，斑疹伤寒自身有隔离的作用，因此全面隔离的呼吁在许多地方并不受欢迎，而且人们认为某些人可能会患病甚至会遗传，这也是许多地方建造发烧房的原因。在1847年北美斑疹伤寒大流行期间，人们普遍认为这是一种传染病，以至于大量受感染的爱尔兰移民被驱逐到了这些隔离区。"
 panum.403.g: "整个地区都应隔离。"
 panum.403.h: "把斑疹伤寒患者送到隔离区里。"
 panum.403.i: "斑疹伤寒不是传染病，因此隔离没有意义。"
 panum.404.t: "肮脏的隔离院"
 panum.404.d: "[SCOPE.sState('panum_disease_state').GetName]的所谓“隔离院”已经成为一个严重的问题，这些隔离院越来越多地变成了满是粪便和痛苦的拥挤棺材。牧师和护工已经写了一封信，呼吁拆除这些可怕的房屋。"
 panum.404.f: "发热棚不仅肮脏，而且极其拥挤，患者被迫躺在双层床铺上，顶层的污物常常掉落到下层。据参议院委员会的报告，两到三名病患常被安排在同一个床铺上，不分年龄与性别。棚内没有面包供应：每日三餐仅有茶、水粥或肉汤。由于饮用水需要运送，发热病人经常面临饮水不足的困境。一位名叫莫伊兰的天主教神父曾报告，他为一个帐篷中的病患送水，这些病人已连续18小时无法喝到水。这些棚屋原本并非为安置发热病人而设计，因此完全没有通风设施；而新建的棚屋甚至连厕所都没有。参议院委员会进一步指出，由于人手和空间极度匮乏，病患往往只能在自己的排泄物中躺上数天，而夜间去世的病人也无法及时运走。"
 panum.404.g: "我们不能冒险让更多的人受到感染。"
 panum.404.h: "改善斑疹伤寒患者的状况，提供医疗救助。"
 panum.404.i: "拆除这些不人道的房屋！"
 panum.405.t: "反对发热棚的骚乱"
 panum.405.d: "由于担心斑疹伤寒会在[SCOPE.sState('panum_disease_state').GetName]传播，一些非常激进的市民暴动，甚至有传言说，他们想把发烧房和病人推到河里！"
 panum.405.f: "1847年，蒙特利尔的发热棚数量增至22个，军队封锁了这一地区，以防病人逃出。当一群暴民威胁要将发热棚推入河中时，蒙特利尔市长约翰·伊斯顿·米尔斯挺身而出，平息了骚乱。他不仅安抚了人群，还亲自照顾病人，为他们送水、更换床单。然而，这位市长在任不足一年，便于11月因病逝世。"
 panum.405.g: "这种野蛮行径在我国家完全不允许！"
 panum.405.h: "不管怎样，他们都会死。"
 panum.406.t: "未埋葬的尸体"
 panum.406.d: "[SCOPE.sState('panum_disease_state').GetName]中的死亡人数急剧上升，以至于殡葬业难以处理。未埋葬的尸体有可能导致更大的问题。"
 panum.406.f: "19世纪60年代，当时的芬兰因异常恶劣的气候条件和作物损失，导致饥荒和流行病。1866至1868年间，饥饿被认为是斑疹伤寒的疾病，导致该地区27万人死亡。"
 panum.406.g: "利用一切可用的手段，防止出现更坏情况。"
 panum.406.h: "挖掘万人坑"
 panum.406.i: "我们机关算尽，他们必须自己安排！"
 panum.407.t: "军营的斑疹伤寒"
 panum.407.d: "斑疹伤寒目前主要感染[SCOPE.sState('panum_disease_state').GetName]军事设施，并造成了致命的损失。"
 panum.407.f: "许多历史学家认为，拿破仑军队中爆发的斑疹伤寒是他进军俄国停滞不前的真正原因，而不是饥饿或寒冷。在美国内战期间，斑疹伤寒是一个重要的杀手，在1853年克里米亚战争期间，多达90万人死于斑疹伤寒。在第一次世界大战之前，斑疹伤寒在波兰和几个邻国流行，在战争期间成为流行病并肆虐东线军队，仅在塞尔维亚就有超过15万人死亡，感染者的死亡率一般在10%至40%之间，该病也是护工主要死因。"
 panum.407.g: "看不见的敌人比任何军队都更致命……"
 panum.408.t: "在疾病中受折磨，而不是在战争中"
 panum.408.d: "我们军营里的斑疹伤寒疫情每天都在蔓延。[SCOPE.sState('panum_disease_state').GetName]中士兵是死亡频率最高的人群之一，而且是在没有敌人影响的情况下。"
 panum.408.f: "“战争不是冒险。它是一种疾病，就像斑疹伤寒一样”————安托万·德·圣埃克苏佩里"
 panum.408.g: "太可怕了！"
 panum.501.t: "黄热病蔓延到[SCOPE.sState('panum_disease_state').GetName]"
 panum.501.d: "根据最新报告，黄热病已泛滥于[SCOPE.sState('panum_disease_state').GetName]！"
 panum.501.g: "为什么不能阻止这一切？"
 panum.502.t: "传染病？"
 panum.502.d: "虽然还不清楚黄热病是一种传染病还是其他，但许多注重安全的市民都呼吁进行隔离，以阻止黄热病的传播。如果我们不这样做，他们可能会认为我们无知或不关心他们的需求。"
 panum.502.f: "17世纪首次爆发的黄热病造成了恐慌和混乱，即使到了18世纪，人们对黄热病的起因仍然众说纷纭。尽管政府和个人都采取了严格的措施或预防措施，但都没有取得成功，人们对黄热病的恐惧意味着要不惜一切防止黄热病进一步蔓延，有时会采取试验性或严厉的措施，因此有些行动可能是出于心理原因而非医学原因，以避免加剧民众的不满情绪。"
 panum.502.g: "没有证据表明这是一种传染病。"
 panum.503.t: "黄热病影响种植园"
 panum.503.d: "每天都有报告称，[SCOPE.sState('panum_disease_state').GetName]的种植园黄热病发病率特别高。一些政府顾问正在推动完全停止那里的工作，以减少传播。"
 panum.503.f: "“一个名叫桑普森的贫穷黑人，经常挨家挨户地寻找有困难的人，却得不到任何帮助，既不给钱，也不给报酬。他被疾病折磨而死。他死后，他的家人被他曾经帮助过的人冷落了。莎拉·巴斯是一个贫穷的黑人寡妇，她为好几个家庭提供了力所能及的帮助，但她没有得到任何回报。”"
 panum.503.g: "让工人们离开田地！"
 panum.503.h: "种植园必须不惜一切代价继续经营下去！"
 panum.504.t: "疏散"
 panum.504.d: "[SCOPE.sState('panum_disease_state').GetName]的卫生状况继续恶化。当地政府要求离开城市，到农村去组织管理。一些人认为这是一个聪明的建议，另一些人则认为这纯粹是一种懦弱。"
 panum.504.f: "在1793年费城黄热病流行期间有至少5000人被列入死亡登记册，其中绝大多数人死于黄热病，使这座拥有5万人口的城市成为美国历史上疫情最严重的城市之一。到9月底，有2万人逃离了这座城市，其中包括国会和联邦政府的行政官员。大多数人直到11月底疫情减弱后才返回，期间华盛顿总统离开城市前往庄园， 一些邻近城镇拒绝让难民从费城入境，担心他们携带了病毒。"
 panum.504.g: "当局撤离。"
 panum.504.h: "地方行政机构绝不能垮台。"
 panum.505.t: "黄热病蔓延到军营"
 panum.505.d: "黄热病目前主要感染[SCOPE.sState('panum_disease_state').GetName]军事设施，并造成了致命的损失。"
 panum.505.f: "在新世界，黄热病是对抗从欧洲军队的盟友，古巴独立斗争的领导人谈到了“六月、七月和八月的无敌战将”，因为这几个月雨水多，蚊子也多。英国人在1741年围攻卡塔赫纳时也有过类似的经历，2.9万名士兵围攻该要塞，雨季开始后，就有两万名士兵在几周内遭到感染，英国在牙买加驻军的死亡率是加拿大驻军的七倍，主要原因是黄热病和其他热带疾病。"
 panum.505.g: "不！他们注定要在战场上光荣牺牲！"
 panum.506.t: "水手病"
 panum.506.d: "受黄热病影响，[SCOPE.sState('panum_disease_state').GetName]的港口作业几乎陷入停顿，一方面，许多码头工人和海员生病；另一方面，尽可能多的船只试图避开这个被诅咒的地区。"
 panum.506.f: "黄热病正在新奥尔良造成最严重的破坏，每天都有200人死于黄热病，死人被一伙人埋在壕沟里，与此同时，娱乐活动、帆船赛、舞会等照常进行，就好像这座注定要毁灭的城市里没有发生过骇人听闻的瘟疫一样"
 panum.506.g: "航运崩溃啊！"
 panum.507.t: "黑色呕吐物"
 panum.507.d: "在[SCOPE.sState('panum_disease_state').GetName]，黄热病比预期来得更猛烈。医生报告说，死于黄热病的人数比以往更多。"
 panum.507.f: "“那些冒险出国的人，都用带着沾有樟脑醋的手帕或海绵盖住鼻子，还有一些人手里或口袋里装着涂了柏油的绳子，或者脖子上系着樟脑……人们一看到灵车驶来，就急忙改变方向。许多人从不在人行道上行走，而是走到街道中间，以免经过有人死亡的房屋时被传染。熟人和朋友在街上互相躲避，只是冷冷地点头示意。握手这一古老的习俗已被普遍废弃，穿着丧服或有任何丧服样子的人都像看到毒蛇一样避之唯恐不及。”\n——马修·凯里"
 panum.507.g: "疫情什么时候能结束？"
