 panum.2111.t: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]解剖学"
 panum.2111.d: "在与地方当局为扩大医疗服务而展开的角力中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生敏锐地察觉到年轻外科医生的培训现状令人堪忧。为此，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]倾力撰写了一部经典著作，以期扭转这一局面。"
 panum.2111.f: "亨利·格雷的《人体解剖学》，常被简称为《格雷解剖学》，是一部关于人体解剖学的传世之作。它被誉为该领域的经典，尤其在英语国家享有盛誉。首版于1858年在英国面世，次年在美国以《格雷解剖学：描述与外科》之名出版，成为医学界的里程碑。"
 panum.2111.g: "每一位医学生在求学之路上，都应细细品读这部经典之作。"
 panum.2111.h: "实践的价值，远胜于纸上谈兵。"
 panum.2112.t: "死因图表"
 panum.2112.d: "在巡视军事医院的过程中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生敏锐地察觉到，年轻医生在认识战场上传染病的威胁时，所依赖的统计数据寥寥无几。为此，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]倾力绘制了一系列极具价值的图表，以填补这一空白。"
 panum.2112.f: "因在克里米亚战争期间染疾，弗洛伦斯·南丁格尔无法亲临军营、医院或贫民窟，实地考察其状况。于是，她将全部心力倾注于数据的收集、整理与分析，并从中提炼出深刻的结论。问卷调查是她工作中的利器，同时她也充分利用了现有数据。她的研究无情地揭露了军事医疗保健中的严重缺陷。在呈递给英国政府的报告中，南丁格尔以犀利的言辞指出：若每年每1000名平民中有11人死亡，而在英格兰驻扎的线列步兵、炮兵和卫兵中，每1000人分别有17、19和20人死亡，那么这与每年将1100人押至索尔兹伯里平原并枪决，其罪恶程度别无二致。弗洛伦斯·南丁格尔，正是此类数据图形化处理的开路先锋之一。"
 panum.2112.g: "这些统计数据，值得战场上的每一位医护人员潜心研读。"
 panum.2112.h: "实践的价值，远胜于纸上谈兵。"
 panum.2113.t: "一切细胞来源于细胞"
 panum.2113.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生在细胞理论的基础上进一步拓展，提出了‘细胞皆源于细胞’的核心理念，并由此揭示疾病亦源自病变细胞。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]在其细胞病理学的鸿篇巨制中，对此理论进行了深入剖析，这部著作如今已成为新诊所与医院的圭臬之作。"
 panum.2113.f: "细胞病理学，这一疾病理论，揭示了疾病的本质源于身体细胞或其功能的失调。鲁道夫·魏尔肖于19世纪50年代开创了这一理论，并于1855年首次提出‘细胞病理学’这一术语。他的同名著作，堪称该领域的里程碑之作。作为一种基于细胞理论的疾病概念，它彻底颠覆了自古以来的体液病理学，在疾病发展的观念上掀起了一场划时代的革命。它与实验药理学、生理学和微生物学相辅相成，共同构筑了临床医学的统一基石，成为科学医学的坚实根基。"
 panum.2113.g: "关于病变细胞的深入认知，理应成为大学教育中不可或缺的一部分。"
 panum.2113.h: "这一洞察，意义非凡，影响深远。"
 panum.2114.t: "天生犯罪人"
 panum.2114.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生潜心钻研罪犯心理与人类遗传学，揭示了面相与犯罪特征之间的关联。[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U]在推动医疗体系改革的征程中，与病患、精神病以及懒政官员的频繁接触，始终为[ROOT.Var('panum_physician_var').GetCharacter.GetHerHim]注入了不竭的动力。"
 panum.2114.f: "在进化论的启迪下，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生对数百名身陷囹圄与精神病院的人展开了深入研究，发现罪犯中普遍存在一种返祖现象。因此，某些犯罪特征可通过面相与颅骨形态得以辨识。罪犯并非自愿堕入犯罪深渊，而是因其遗传倾向，陷入一种‘身不由己’的困境。罪犯代表了一种独特的人类学类型，即‘犯罪人’。他们是进化链条上较为滞后、更为原始的人类类型，其行为往往受本能驱使，道德观念淡薄。"
 panum.2114.g: "所以你生来就是预备着要犯罪的？"
 panum.2121.t: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生之爱颅"
 panum.2121.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生继续从事人类学犯罪学研究，因此测量了全国成千上万的颅骨。[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe|U]甚至将其中一些保存在家中。"
 panum.2121.f: "“犯罪学本是一门严谨的自然科学，却长期困于哲学的泥沼之中。我的使命，便是为其注入与本世纪所有现代科学同等的实证精神。生物学与数学，乃是坚不可摧的学科；精神病学与犯罪学，正可从中汲取智慧。倘若你测量并比较每一个颅骨——我已对数千名罪犯、精神病患与死刑犯进行过此类研究——你便能收集到反复印证相同统计结果的数据。由此，几乎可以提炼出完美的数值，用以揭示罪犯面部的非对称特征。这些精准的测量，远比对人类心理的凭空揣测更为可靠：在这里，数字与事实构筑起实证研究的基石；而在那里，唯有空洞无物的喋喋不休。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]的《人类犯罪学》"
 panum.2121.g: "啊……别致的爱好。"
 panum.2122.t: "生物决定论"
 panum.2122.d: "“历经数月的潜心研究，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生进一步完善了他关于‘天生犯罪人’的学说，并揭示了更多令人震撼的发现。”"
 panum.2122.f: "“罪犯是退化的产物。当人类在进化的长河中不断前行时，罪犯却如逆流而上的孤舟，象征着一种倒退，一种对人类文明的背叛。他们是‘现代野蛮人’，让我们得以窥见石器时代的人类——粗犷、对痛苦麻木、缺乏同理心。罪犯对他人的苦难视若无睹，他们的同情心也如荒漠般贫瘠。由于犯罪行为根植于其犯罪倾向，而这种倾向很可能是遗传的，有人或许会主张，若犯罪行为并非出于自由意志，而是由生物本能驱使，那么在量刑时应予以从轻。然而，事实却恰恰相反。罪犯不会被威慑性刑罚所震慑，他们既无法重新融入社会，也难以被预测。我们的首要任务是保护社会。因此，终身监禁乃至死刑，才是更为妥当的选择。我们绝不能容许这些危险的罪犯荼毒无辜之人。”\n\n摘自[ROOT.Var('panum_physician_var').GetCharacter.GetFullName]的《人类犯罪学》"
 panum.2122.g: "“除此之外，我们是否别无选择，只能将该理论奉为圭臬？”"
 panum.2123.t: "一个极具威胁的犯罪个体"
 panum.2123.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生对[SCOPE.sCharacter('panum_victim_scope').GetFullName]的面相——尤其是[SCOPE.sCharacter('panum_victim_scope').GetHerHis]头骨的轮廓——进行了深入剖析，，最终得出结论：[SCOPE.sCharacter('panum_victim_scope').GetSheHe]是一个危险至极、犯罪能量充沛的人，必须立即解除其一切职务——以捍卫社会的安全！"
 panum.2123.f: "“小偷的面容与双手往往异常灵活；他们的眼睛小而闪烁不定，时常眯成一条缝；眉头紧锁，仿佛永远在盘算着什么；鼻子歪斜或扁平，胡须稀疏，头发鲜少浓密，额头窄小而内缩，耳朵如把手般突兀地外翻……\n\n杀人犯则目光冰冷，如玻璃般呆滞无情；他们的双眼有时布满血丝，令人不寒而栗。鼻子硕大，常呈鹰钩状或如鹰喙般尖锐；颧骨宽大，耳朵修长，脸颊宽阔，头发卷曲、浓密且乌黑，胡须却常常稀疏；嘴唇薄如刀锋，犬齿硕大……总体而言，天生犯罪人的耳朵形如把手，头发浓密，胡须稀疏，额窦高耸，下颌巨大，下巴方正或前突，颧骨宽阔。”\n——切萨雷·龙勃罗梭"
 panum.2123.g: "这人长着一张罪犯的脸。"
 panum.2123.h: "这位医生在[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]的指控上，实在是有些言过其实了！"
 panum.2124.t: "又一个颅骨爱好者！"
 panum.2124.d: "今日，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生引荐了一位痴迷颅骨的年轻学者，其热情几乎与[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]比肩。然而，[SCOPE.sCharacter('andersson_new_anthropologist_scope').GetLastName]医生的专注点，则更多地落在了死者的颅骨之上。"
 panum.2124.f: "“[SCOPE.sCharacter('andersson_new_anthropologist_scope').GetFullName]是一位卓越的科学家，深谙通过颅骨研究来揭示其人特质的重要性。然而，令人遗憾的是，[SCOPE.sCharacter('andersson_new_anthropologist_scope').GetSheHe]却只将目光投向那些早已湮没于历史长河中的死者颅骨。这简直令人匪夷所思！你无从得知他们是否确为罪犯。这样的研究，又能带来怎样的启示呢？”"
 panum.2124.g: "这真是……意外之喜。"
 panum.4003.t: "天花的终结"
 panum.4003.d: "出乎所有人的意料，我们在与天花的抗争中取得了前所未有的成功——这种疾病如今已经被彻底根除。"
 panum.4003.f: "对大多数人而言，这一天平静如常，没有人意识到，这其实是一个何等辉煌的清晨。而对于那些知情者来说，这一天标志着数代人辛勤努力的巅峰，是一个曾经不敢想象的梦想终于化为现实的时刻。许多人原以为，这样的成就不可能在他们的有生之年达成，或许只有在遥远的20世纪末甚至21世纪才会实现。然而，现在，这一壮举就在[TimeKeeper.GetCurrentDate.Format('y')]年得以完成。最后一例确诊病例未引发任何新的感染，这种疾病被彻底封印在了历史的长河中。\n\n人类历史上第一次，这种疾病的威胁已彻底消失。\n\n这只能意味着一件事：天花，已然不复存在。\n\n曾经，许多人以为这只是幻想……但即便是那些毫不知情的人，也无法忽视大学与医院中传出的欢庆之声，看着医生与科学家们举杯祝贺，也能感受到——这一天，是值得铭记的美好日子。"
 panum.4003.g: "今日人类也有自己的奇迹。"
 panum.2211.t: "疾病研究"
 panum.2211.d: "在[ROOT.Var('panum_physician_var').GetCharacter.GetHerHis]的医学检查中，[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生意识到，[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]希望深入研究一种在我国鲜有出现但在某些地区已广泛流行的疾病。"
 panum.2211.f: "除了那些主要的流行性疾病外，世间还有许多日常出现却普遍忽视的疾病，以及一些困扰人类多年的顽疾，其病因和治疗方法依然未解。[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]医生开始思索是否该将研究的重心放在某一种特定的疾病上，以寻求突破性的答案。"
 panum.2211.g: "研究炭疽。"
 panum.2211.h: "研究甲状腺肿。"
 panum.2211.i: "研究肾结石。"
 panum.2211.j: "研究糙皮病。"
 panum.2211.k: "研究佝偻病。"
 panum.2211.l: "研究梅毒。"
 panum.2211.m: "研究破伤风。"
 panum.2211.z: "医生应该利用这段时间提升自己。"
