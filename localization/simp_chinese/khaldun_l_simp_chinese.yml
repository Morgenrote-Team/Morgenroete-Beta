 khaldun.101.t: "卡鲁因大学：学术中心"
 khaldun.101.d: "卡鲁因学院是世界上最古老的大学，几个世纪以来却日渐衰落，但如今又重回学术界前沿。"
 khaldun.101.f: "“卡鲁因大学的历史比欧洲所有大学都悠久。它收藏了众多书籍，但它衰落许久，今天是这所大学重回其应有地位的日子！”"
 khaldun.101.g: "卡鲁因大学将成为学术界的灯塔！"
 khaldun.101.h: "卡鲁因大学将成为数学和工程学的灯塔！"
 khaldun.101.i: "卡鲁因博物馆将成为自然历史的灯塔！"
 khaldun.101.j: "卡鲁因大学将成为人文学科的灯塔！"