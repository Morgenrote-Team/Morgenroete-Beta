 dubois.1039.t: "兔狲围栏"
 dubois.1039.d: "在动物园，一处连人类肉眼都无法探测的地方，正是袋狼的休憩地...那具备着优美的条纹和细长曲线的身躯，宛如传说的既视感的生物——袋狼，正以一种优雅的步伐在围栏边徘徊游荡。游客们都被这不似人间的气质所吸引，纷纷围观着这神奇动物。你更是好奇它的来历，便向动物园管理询问起更多消息。"
 dubois.1039.f1: "“它是袋狼，有的人叫它塔斯马尼亚虎，是趋同进化中令人着迷的鲜明案例，”动物园管理如是解释着，“它的身子和皮毛像犬科动物一般，但它其实是有袋类动物，其亲缘更接近袋鼠和考拉这些动物。它主要生活在塔斯马尼亚岛和澳洲大陆，曾是那里的顶级掠食者。你看它身上的条纹了吗？这更有助于它融入当地的植被环境当中进行狩猎。”"
 dubois.1039.f2: "“袋狼是夜间捕食者，”动物园管理接着分享道，“它们具有着敏锐的视觉和听觉来寻觅猎物，常常是单独或成对进行狩猎。和其他掠食者不同在于，袋狼的捕猎过程往往更加的安静，它会耐心且偷地接近猎物。它们捕食的对象通常是中小型的动物，包含了鸟类、啮齿类和一些小袋鼠。”"
 dubois.1039.f3: "“袋狼的叫声虽然罕见，却令人印象深刻，”动物管理员说道。“它们会发出短吠、低吼和嚎叫声，尤其是在繁殖季节或感到威胁时。这些声音主要用来与其他袋狼进行远距离的交流，特别是在塔斯马尼亚茂密的森林中。尽管它们的声带范围不如某些捕食者那般丰富，袋狼的叫声却是其行为的重要部分，也为其增添了神秘而独特的魅力。”"
