 dubois.1021.t: "The Asiatic Natural History Galleries"
 dubois.1021.d: "Within the Zoological Gardens, the Asiatic Pavilions are arranged with sober didactic purpose: timbered kiosks and pagodas, lacquered screens, and discreet emblems frame the characteristic fauna. The thoughtful visitor is invited to a measured promenade through the varied realms of Asia."
