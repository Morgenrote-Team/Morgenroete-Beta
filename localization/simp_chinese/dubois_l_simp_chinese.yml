 dubois.443.f: "众人已等候那位学者一个小时。此前[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]在斜坡某处驻足，突然取出勘探工具。队员们起初摇头不解，最终决定统筹安排，提前用餐以节省时间。然而[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士既无进食之意，亦无归队之念。当领队威胁要抛下这位地质学家继续行程时，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]突然重返队伍——手中紧握的璀璨矿石，令所有同僚为之震撼。"
