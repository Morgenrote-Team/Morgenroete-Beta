 dubois.158.t: "袋狼"
 dubois.158.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 袋狼#!搬进了新的展区。"
 dubois.158.f: "袋狼曾广泛分布在澳大利亚大陆（以及新几内亚岛），栖息于开阔的林地、草原和石砾中。白天多栖身于石砾中，夜间外出捕食，多单独或以家族形式狩猎。奔跑速度并不快，但会紧追不舍，直到猎物疲惫不堪为止。以袋鼠类、小型兽类和鸟类为食。袋狼在塔斯马尼亚存活了相当长的时间，却被英国早期的殖民者疯狂杀灭。到1910年在野外就已很少见到了；最后一只袋狼于1936年9月7日死于塔斯马尼亚岛上的霍巴特动物园。"
 dubois.158.g: "多么可爱！"
