 dubois.1032.t: "海龟展区"
 dubois.1032.d: "#o 绿蠵龟#!展区以水域为主，周围有一些小沙滩。大多数人都聚集在一个小洞周围，以便观察水中的海龟。"
 dubois.1032.f1: "绿蠵龟是一种令人赞叹的生物。它身披橄榄色甲壳，拥有强壮的鳍状肢，穿梭于热带和亚热带海域，凭借惊人的记忆能力长途迁徙至固定海滩。看似悠然自若的举止下，隐藏着足以纵横大洋的非凡耐力。"
 dubois.1032.f2: "繁衍的循环始于重力的形成。雌性在海中完成交配后，于夜间爬上适宜的沙滩，以持久的劳作挖掘巢穴，产下卵后用沙掩埋。到了适当季节，幼体在星光与本能的共同指引下，匆匆奔向大海，开始它们危机四伏的成长试炼。"
 dubois.1032.f3: "在自然的经济体系中，绿蠵龟绝非无用的装饰。它以海草为食，修剪并更新着海底草场，偶尔捕食水母的行为也有助于维持有益的生态平衡。正是通过这种方式，这种爬行动物守护着海底牧场和远洋领域免遭过度繁衍之害。"
 dubois.1032.k: "回到澳洲与大洋洲展区"
 zoo_australian_enclosures_tt: "你将会到动物园的澳洲与大洋洲展区。"
 dubois.1033.t: "蝠鲼展区"
 dubois.1033.d: "一座宏伟的水族馆饲养着数条#o 巨型蝠鲼#!，一条玻璃隧道让游客能观赏这些温和的巨兽以庄严优雅的姿态盘旋游动。"
 dubois.1033.f1: "巨型蝠鲼是鳐类中最尊贵的物种之一。它拥有菱形的体盘和宽阔的胸鳍，如同活风筝般划破水面，部分个体翼展可超六米。其习性温和，以最微小的远洋生物为食。"
 dubois.1033.f2: "作为阳光海域忠实的清道夫，蝠鲼通过精致的鳃耙过滤无数浮游生物，从而调节这些微小宿主的过度繁殖。在特定清洁站，它们会吸引小型鱼类前来清洁皮肤——这种互利共生的现象在自然界中并不罕见。"
 dubois.1033.f3: "自然学家观察到这些鳐鱼具有社交倾向：它们会进行有序的环形游动，反复回到熟悉的觅食地，甚至通过有节奏的盘旋进行初步的求偶行为。这些观察表明它们拥有值得关注的记忆力和恒定性。"
 dubois.1034.t: "考拉展区"
 dubois.1034.d: "一片精心种植的桉树林，考虑到遮荫与庇护，为#o 考拉#!提供了与其树栖家园极为相似的场景。"
 dubois.1034.f1: "考拉习性树栖且怠于移动。凭借抓握能力强的掌部与对生趾爪，攀附桉树而居，几乎完全以桉叶为食。其迟缓心搏与规律呼吸，印证了这副躯体对寡淡饮食的完美适应。"
 dubois.1034.f2: "母兽堪称典范。幼崽出生时极其微小且发育不全，却能立即进入育儿袋的安全庇护所，在那里吸吮乳汁并成长。待到适当时机，母兽会引导幼崽适应该物种特有的饮食习性，之后幼崽便攀附于母亲背上，学习如何在树丛间辨识方位与掌握生存之道。"
 dubois.1034.f3: "尽管这种生物更倾向于沉默而非发声，但它们会利用低沉的吼叫和粗哑的音调——尤其是雄性个体——来宣示领地和求偶季节。这些声音出人意料地浑厚，在寂静的树林中能传得很远。"
 dubois.1035.t: "袋鼠展区"
 dubois.1035.d: "一片类似草原的维修区，长草与散落的红色岩石相间，被分配给了#o 红大袋鼠#!，它们独特的行进方式在此可让人悠闲习得。"
 dubois.1035.f1: "红大袋鼠是跳跃运动的奇才。其后肢的弹性肌腱与强健尾巴使其能持续高速弹跳；目睹其群体行进之姿，堪称自然界机械构造的生动一课。"
 dubois.1035.f2: "袋鼠的母性照料尤为引人关注。幼崽出生时微小如活体胚胎，无需协助便能自行爬入育儿袋，在那里依附乳头完成发育。博物学家记载，母袋鼠能以惊人的自然节俭方式同时哺育连续出生的幼崽。"
 dubois.1035.f3: "社会秩序通过姿态与信号得以维持：警觉时的跺脚、争执中的嘶嘶低吼，以及雄性间的正式展示。如此，等级与权利无需过度暴力便能确立。"
 dubois.1036.t: "鸭嘴兽展区"
 dubois.1036.d: "一条清澈凉爽、两岸绿荫遮蔽的溪流构成了#o 鸭嘴兽#!的活动场景，它们大部分时间都在水中或洞穴里度过。"
 dubois.1036.f1: "鸭嘴兽是一种单孔目卵生哺乳动物，其奇特形态在首次被报道时震惊了学术界。它拥有柔软的喙、带蹼的脚掌以及浓密的皮毛，这些特征使其完美适应水生环境。需特别注意的是，雄性鸭嘴兽后足带有一根毒刺，需谨慎对待。"
 dubois.1036.f2: "雌性会挖掘洞穴，用树叶筑巢，并产下少量卵。幼崽孵化时双目紧闭且浑身无毛，依靠母体皮肤分泌的乳汁（因无乳头存在）获取营养，直至能够自行觅食。"
 dubois.1036.f3: "尽管鸭嘴兽很少发声，它们却通过标记和气味宣示自己的存在；雄性的领地意识尤为强烈，尤其在繁殖季节。它们潜入水底、在河床搜寻昆虫幼虫的行为，堪称勤劳本性的生动展示。"
 dubois.1036.f4: "#o 鸭嘴兽佩里从花园神秘失踪#!\n今晨发现我们的一只鸭嘴兽佩里——未能在其栖息处寻获，引发短暂骚动。饲养员菲尼亚斯·弗林和费布·弗莱彻先生安抚道：“我们的佩里总爱藏在意想不到之处，但日落前必定现身。”\n\n#o 科学家幸免于实验室事故#!\n海因茨·杜芬舒茨博士的实验突发爆炸，所幸某位神秘救助者及时介入——这位学者未受实质性伤害。"
 dubois.1032.g: "鸭嘴兽？鸭嘴兽派瑞！"
 dubois_unknown_hero_modifier: "无名英雄"
 dubois.1037.t: "鹤鸵展区"
 dubois.1037.d: "鹤鸵展区为这种色彩斑斓的鸟儿提供了一个丛林般的环境。这是雨林园丁的家园。"
 dubois.1037.f1: "鹤鸵是雨林多样性和恢复力的真正象征，这些不会飞的大型鸟类在维持生态系统平衡方面发挥着至关重要的作用。它们被称为‘雨林园丁’，因为它们的饮食包括各种水果和植物。通过食用这些水果并通过粪便传播种子，鹤鸵有助于雨林的再生和可持续发展。"
 dubois.1037.f2: "南方鹤鸵以其独特的特征和行为而闻名，它们的头冠是头上的头盔状结构，据信可以起到放大声音的作用，并可能吸引异性。它们的脚上也有锋利的匕首状爪子，可用于防御或挖掘食物。这些适应证明了它们在雨林环境中的进化。”"
 dubois.1037.f3: "鸵的筑巢行为展示了它们独特的母性本能，雌性承担着孵化蛋和抚养雏鸟的责任，而雄性则扮演不太积极的角色。母亲对保护自己的幼崽和抚养幼崽的奉献展示了这些鸟类复杂的社会动态及其对雨林生态系统的重要贡献。"
 dubois.1038.t: "新西兰海狮展区"
 dubois.1038.d: "一片宽阔的岩石环绕水池为#o 新西兰海狮#!提供了栖息地与潜水场；水下的景致无疑会让后代为之欣喜。"
 dubois.1038.f1: "新西兰海狮是南大洋真正的象征，这些海狮是新西兰特有的，以其顽皮的天性和与海洋环境的紧密联系而闻名。它们是熟练的游泳者和潜水者，能够长途跋涉寻找食物。"
 dubois.1038.f2: "新西兰海狮是出色的游泳者和潜水员，它们拥有流线型的身体和强壮的鳍状肢，使它们能够在洋流中航行并捕食它们喜欢的鱼类、鱿鱼和其他海洋生物。它们的大眼睛提供了出色的水下视力，即使在浑浊的水域也能发现猎物。观看它们游泳证明了它们对海洋环境的适应。"
 dubois.1038.f3: "发声是新西兰海狮社会动态不可或缺的一部分，在繁殖季节，雄性海狮利用其独特的吼叫声来建立统治地位并保卫自己的领地。这些声音在吸引雌性交配方面也发挥着作用。海狮发出的各种声音和表现证明了它们复杂的沟通和社交结构。"
