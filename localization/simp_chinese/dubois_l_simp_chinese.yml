 dubois.1022.t: "Giant Panda Enclosure"
 dubois.1022.d: "This retreat for the #o Giant Panda#! combines shaded pagoda and thickets of bamboo, contrived to recall its temperate montane forests."
 dubois.1022.f1: "A dam with her tiny cub holds court beneath the bamboo. Reproduction in the Giant Panda is notoriously parsimonious; the female is in oestrus but briefly each year, and the new-born—often little more than two hundred grams—arrives blind and helpless. Maternal solicitude is therefore extreme, the young being nursed and guarded until sufficient strength and coordination are attained."
 dubois.1022.f2: "Play, though seemingly idle, has manifest utility. Juveniles engage in wrestling and tumbling which quicken the limbs, train balance upon uneven ground, and rehearse the elementary courtesies of their kind. Even adult animals will indulge occasional sport, a reminder that exercise conduces to health as much in the menagerie as in the wild."
 dubois.1022.f3: "The Giant Panda is a singular ursid whose diet is composed almost wholly of bamboo. Its molar batteries are broadened for crushing fibrous shoots, and a remarkable radial sesamoid—the so‑called false thumb—assists in grasping culms. To compensate for meagre nourishment it must feed for protracted periods and conserve its strength by a deliberate gait."
 dubois.1022.k: "回到亚洲展区"
 zoo_asian_enclosures_tt: "你将回到动物园的亚洲展区。"
 dubois.1023.t: "猩猩展区"
 dubois.1023.d: "In the Malay tongue, orang‑utan signifies 'man of the forest'. Here these #o Bornean Orangutans#! enjoy elevated walks, nets, and ample timber, as befits a life conducted chiefly among the boughs."
 dubois.1023.f1: "The orangutan is the most arboreal of the apes. With prodigious arm‑span and highly flexible hands and feet, it negotiates the canopy by brachiation and cautious climbing. Each evening it constructs a neat sleeping platform from bent branches, a habit observed both in liberty and in well-provisioned captivity."
 dubois.1023.f2: "The maternal tie is prolonged and exemplary. A calf remains years with its dam, learning the arts of nest‑building, fruit selection, and cautious travel. Such patience and instruction bespeak high intelligence and a social economy fitted to solitary woodland life."
 dubois.1023.f3: "Adult males, especially those with developed cheek flanges, utter long, resonant calls that carry across great distances. These vocal advertisements proclaim presence, discourage rivals, and are believed to assist in the spacing of individuals in dense forest."
 dubois.1024.t: "老虎展区"
 dubois.1024.d: "At first the paddock appears empty; then, from shade to sun, a #o Bengal Tiger#! moves with unhurried mastery, its striped pelage dissolving the outline as if by artifice."
 dubois.1024.f1: "The Bengal Tiger is the grandest of Asiatic felids. Solitary and territorial, it hunts chiefly by stealth, relying upon powerful forequarters, retractile claws, and a sudden rush at short range. The celebrated livery—bars upon rufous ground—serves to break the form amid reeds and woodland shadows."
 dubois.1024.f2: "The tigress is a vigilant mother. After a short gestation she retires to a secluded den, where two to four cubs are whelped. By degrees she introduces them to flesh, to scent and spoor, and to the indispensable lessons of caution, patience, and decisive spring."
 dubois.1024.f3: "The tiger’s voice includes coughs, moans, and the reverberant roar which, at dusk, proclaims occupation of a range. Such utterances reduce needless contention and, in the season, advertise the presence of a fit consort."
 dubois.1025.t: "马来貘展区"
 dubois.1025.d: "This shaded compound for the #o Malayan Tapir#! offers cover, browse, and water, in imitation of its native evergreen forests."
 dubois.1025.f1: "The Malayan Tapir is distinguished by a bold black-and-white livery, which, in broken light, disguises the creature’s outline. Chiefly nocturnal, it browses with a prehensile snout upon shoots and leaves, and takes readily to water both for relief from heat and for escape."
 dubois.1025.f2: "After a protracted gestation the dam brings forth a single calf, prettily striped and spotted—an infant camouflage which fades with age. The mother guides it with gentle insistence, leading by safe paths to forage and pool."
 dubois.1025.f3: "Tapirs communicate by delicate whistles and low rumbles. These notes serve for contact in thicketed cover, for courtship, and, it is thought, for the quiet regulation of their solitary traffic through the wood."
 dubois.1026.t: "科莫多巨蜥展区"
 dubois.1026.d: "Within this warm, rocky close several #o Komodo Dragons#! bask or patrol with stately tread, their tongues sampling the air."
 dubois.1026.f1: "The Komodo Dragon, largest of living lizards, is an ambuscade hunter and carrion‑finder of notable power. Its serrated teeth and formidable neck deliver deep wounds; aided by venomous secretions and infection, even stout quarry may succumb after a brief pursuit."
 dubois.1026.f2: "Adapted to austere islands, the species thrives upon frugality and patience. Vision and chemoreception are acute; a distant carcass may be discovered with surprising certainty. In carriage and mien the animal conveys an impression of the primeval."
 dubois.1026.f3: "Displays of ascendancy include inflation of the throat, head‑bobbing, and hissing. Such ceremonies, though impressive, spare the combatants more ruinous contest and suffice to settle precedence at carcass or basking site."
 dubois.1027.t: "雪豹展区"
 dubois.1027.d: "A precinct of rocks and ledges suits the #o Snow Leopard#!, whose native dominion lies upon the cold heights of Asia."
 dubois.1027.f1: "The Snow Leopard is exquisitely formed for alpine country: broad‑furred feet for purchase, a long tail for balance and warmth, and a pallid, spotted pelage that merges with scree and snow. It moves with a silent, elastic grace, crossing ground that would baffle lesser beasts."
 dubois.1027.f2: "Its diet consists chiefly of wild sheep and goats, with marmots and hare taken as occasion offers. Solitary by habit, it ranges widely and is most active in the crepuscular hours."
 dubois.1027.f3: "In the pairing season, low mews and other subdued calls announce proximity and purpose. Such voices, though modest compared with the lion’s, suffice in the thin air to bring consorts together across broken ground."
 dubois.1028.t: "亚洲猎豹展区"
 dubois.1028.d: "This broad, open run recalls the austere plains of the Middle East, where the #o Asiatic Cheetah#! once ranged more widely."
 dubois.1028.f1: "The Asiatic Cheetah is the very emblem of speed. Its slight frame, deep chest, and long limbs, coupled with semi‑retractile claws that afford purchase, permit a burst unmatched among quadrupeds. Alas, it is now reduced to a remnant, and must be the object of earnest protection."
 dubois.1028.f2: "The hunter’s art lies in stealth, sprint, and tripping stroke. Dark streaks beneath the eyes diminish glare, and the flexible spine aids in prodigious stride. Gazelles and other small antelopes are its customary game."
 dubois.1028.f3: "Males utter low, pulsing calls to advertise tenure and fitness, notes that lessen quarrel amongst rivals and guide prospective mates. In husbandry, careful study of these voices has proven serviceable to the species’ welfare."
