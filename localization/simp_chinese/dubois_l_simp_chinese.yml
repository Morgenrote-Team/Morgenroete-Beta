 building_dubois_national_park: "野生动物保护区"
 building_dubois_national_park_desc: "野生动物保护区是让野外得以保护的场所——古老的森林、广袤的草原和隐秘的山谷在这里可以远离文明的侵蚀。无论是作为皇家猎场被保留下来，还是被尊为国家公园，这些保护区都为珍稀生物提供了避难所，让人们得以一窥未受侵扰、永恒壮丽的自然奇观。"
