 dubois.1022.t: "熊猫展区"
 dubois.1022.d: "#o 熊猫#!展区是这种温顺熊类的家。一座宝塔提供了一片阴凉，几片竹林则模仿了熊猫的家乡。"
 dubois.1022.f1: "一只大熊猫妈妈带着她的小幼崽在竹林下安家。众所周知，大熊猫的繁殖极为吝啬——雌性每年仅短暂发情一次，而新生儿往往仅有200克重，出生时既看不见也无法自理。因此母熊猫会表现出极致的呵护，持续哺乳和守护幼崽，直至其具备足够的力量与行动能力。"
 dubois.1022.f2: "玩耍看似闲散，实则效用显著。幼兽们通过摔跤翻滚来敏捷四肢，在崎岖地面训练平衡，并演练同类间的基本礼仪。即便是成年动物也会偶尔嬉戏，这提醒我们：无论在兽栏还是荒野，运动对健康的裨益同样重要。"
 dubois.1022.f3: "大熊猫是一种独特的熊科动物，其饮食几乎完全由竹子构成。它宽大的臼齿适合碾碎纤维质的竹笋，而显著延伸的籽骨有助于抓握竹秆。为了弥补营养的不足，它必须长时间进食，并通过缓慢的步伐来保存体力。"
 dubois.1022.k: "回到亚洲展区"
 zoo_asian_enclosures_tt: "你将回到动物园的亚洲展区。"
 dubois.1023.t: "猩猩展区"
 dubois.1023.d: "在马来语中，#o 婆罗洲猩猩#!的意思是森林人。这些#o 婆罗洲猩猩#!享受着高架步道、绳网和充足的木材，正适合它们主要在树枝间度过的一生。"
 dubois.1023.f1: "猩猩是类人猿中最擅长树栖的物种。凭借惊人的臂展和高度灵活的手脚，它们通过臂行和谨慎攀爬在林冠间移动。每晚它们都会用弯曲的树枝搭建整洁的睡眠平台，这个习性在野生环境和食物充足的圈养环境中都能观察到。"
 dubois.1023.f2: "母系纽带持久而堪称典范。幼崽会与母亲共处数年，学习筑巢技巧、果实挑选以及谨慎行进的生存之道。这种耐心教导彰显了高度的智慧，也印证了适应独居林间生活的社会性生存策略。"
 dubois.1023.f3: "成年雄性，尤其是那些面颊具有发达凸缘的个体，会发出悠长而洪亮的叫声，这些声音能传播到很远的地方。这些声音广告用于宣告存在、威慑对手，并被认为有助于在茂密森林中调节个体间的距离分布。"
 dubois.1024.t: "老虎展区"
 dubois.1024.d: "起初维修区看似空无一人；接着，从阴影到阳光下，一只#o 孟加拉虎#!从容不迫地移动着，它条纹状的皮毛仿佛通过某种技巧消融了轮廓。"
 dubois.1024.f1: "孟加拉虎是亚洲猫科动物中最雄伟的存在。它们独居且领地意识强，主要依靠潜行捕猎，凭借强健的前肢、可伸缩的利爪以及短距离内的突然冲刺。其著名的赤褐色底纹上的黑色条纹皮毛有助于在芦苇丛和林间阴影中隐藏身形。"
 dubois.1024.f2: "母虎是一位警觉的母亲。经过短暂的妊娠期后，她会退隐到僻静的巢穴中，产下两到四只幼崽。她会逐步引导幼崽接触血肉、熟悉气味与踪迹，并传授至关重要的生存课——谨慎、耐心以及果断出击。"
 dubois.1024.f3: "老虎的叫声包括咳嗽声、呻吟声以及回荡的咆哮声，这些在黄昏时分宣示着领地的占有。此类发声既能减少不必要的争斗，也在交配季节展示出强壮配偶的存在。"
 dubois.1025.t: "马来貘展区"
 dubois.1025.d: "这处为#o 马来貘#!设计的荫蔽区域模拟了其原生常绿森林环境，提供了遮蔽物、觅食植物和水源。"
 dubois.1025.f1: "马来貘以其醒目的黑白毛色著称，这种斑驳的毛色在破碎的光线下能有效隐藏其轮廓。这种主要在夜间活动的动物，会用灵活的鼻子啃食嫩枝和树叶，并习惯借助水域来消暑或躲避敌害。"
 dubois.1025.f2: "经过漫长的孕育，母鹿产下一只幼崽，身上有着漂亮的条纹和斑点——这种幼时的伪装会随着年龄增长而褪去。母亲以温和而坚定的方式引导它，带领它沿着安全的路径觅食和饮水。"
 dubois.1025.f3: "貘通过轻柔的哨声和低沉的隆隆声进行交流。这些声音在茂密丛林中用于保持联系、求偶，据信还能安静地协调它们在林间独行的路线。"
 dubois.1026.t: "科莫多巨蜥展区"
 dubois.1026.d: "在这片温暖而岩石密布的封闭区域内，数只#o 科莫多巨蜥#!正慵懒地晒着太阳或迈着步伐巡视领地，它们不时吞吐信子探测空气中的气息。"
 dubois.1026.f1: "科莫多巨蜥作为现存体型最大的蜥蜴，是具备惊人力量的伏击型猎手与腐食搜寻者。其锯齿状牙齿与强健颈部可造成深重创伤，配合毒腺分泌物与细菌感染，即便强健猎物在短暂追逐后亦会毙命。"
 dubois.1026.f2: "该物种适应了贫瘠的岛屿环境，凭借节俭与耐心茁壮成长。其视觉与化学感应极为敏锐，能够以惊人的准确度发现远处的腐尸。这种动物在举止与神态间流露出原始的气息。"
 dubois.1026.f3: "支配地位的展示包括喉部膨胀、头部摆动和发出嘶嘶声。这些仪式虽然令人印象深刻，却能让争斗双方免于更惨烈的对抗，足以在争夺尸体或晒太阳的地点时确定优先权。"
 dubois.1027.t: "雪豹展区"
 dubois.1027.d: "崎岖的地形充满了岩石和砾石，是#o 雪豹#!的完美家园。"
 dubois.1027.f1: "雪豹是亚洲高山的真正象征，凭借其美丽的图案皮毛和长尾，它完全适应了寒冷和崎岖的栖息地。这些大型猫科动物以其隐秘的狩猎技术而闻名，依靠它们强大的腿和敏锐的感官来跟踪和伏击猎物。不幸的是，雪豹正受到偷猎和栖息地丧失的威胁。"
 dubois.1027.f2: "“雪豹是真正高超的猎人，它们适应在高海拔环境中繁衍生息，捕食多种动物，如岩羊、野山羊和土拨鼠。它们的斑点皮毛在白雪皑皑的环境中提供了极好的伪装，使它们能够在不被发现的情况下接近猎物。雪豹是独居动物，只有在繁殖季节才会聚集在一起。"
 dubois.1027.f3: "雪豹的发声在它们的交流中发挥着关键作用，在交配季节，雌性雪豹会发出叫声来吸引潜在的配偶。雄性雪豹会用自己的叫声做出回应，帮助确定自己的存在和意图。这些声音交流对于维持这些难以捉摸的猫科动物的种群和遗传多样性至关重要。"
 dubois.1028.t: "亚洲猎豹展区"
 dubois.1028.d: "亚洲猎豹的展区试图模仿其在中东的家园。它像波斯沙漠一样提供了自然主义的环境。"
 dubois.1028.f1: "亚洲猎豹是速度和稀有的象征，凭借其修长的体格和有力的腿部，它非常适合高速追逐。这些大型猫科动物可以在短时间内达到每小时60英里的速度，使它们成为最快的陆地动物。不幸的是，亚洲猎豹正濒临灭绝，野外只剩下少数个体。保护工作对于拯救这个伟大的物种至关重要。"
 dubois.1028.f2: "亚洲猎豹是出色的猎人，它们依靠非凡的速度和敏捷性来追捕猎物。它们眼睛下方独特的黑色‘泪痕’可以作为天然的防晒霜，减少眩光并提高白天狩猎时的注意力。这些猎豹主要捕食瞪羚和其他小型有蹄类动物，在猛扑之前利用它们令人难以置信的爆发速度接近目标。"
 dubois.1028.f3: "亚洲猎豹的发声在交流中发挥着至关重要的作用，雄性猎豹利用它们的叫声来建立领地并吸引潜在的配偶。这些声音交流也有助于减少雄性之间的冲突和对抗。鉴于亚洲猎豹的数量极少，了解它们的声音行为对于保护工作和它们的生存至关重要。"
