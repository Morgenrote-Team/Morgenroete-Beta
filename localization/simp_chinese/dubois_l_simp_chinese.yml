 dubois_theory_of_evolution_tech: "进化论"
 dubois_theory_of_evolution_tech_desc: "通过自然选择进行进化的理论是生物学中打破固定物种概念的关键。达尔文指出，人口增长会导致“生存斗争”，在这场斗争中，有利的变异会占上风，而其他变异则会消亡。这可以解释从共同祖先演化而来的植物和动物彼此间的多样性。有些人对此感到不安，因为这意味着人类在宇宙中并不占有特殊地位。"
 dubois_paleontology_tech: "古生物学"
 dubois_paleontology_tech_desc: "人们对地球历史和已灭绝动物的兴趣可以追溯到古典时代，并在1800年左右乔治·居维叶的研究中达到第一个高峰。但《物种起源》的出版是所有生命科学特别是是古生物学的分水岭。《物种起源》出版后立即引发了科学辩论，促使人们齐心协力在化石记录中寻找过渡化石和其他进化证据。"
 dubois_genetics_tech: "遗传学"
 dubois_genetics_tech_desc: "现代遗传学始于奥斯定会修士格雷戈尔·约翰·孟德尔的研究。1900年，孟德尔的研究成果被重新发现，使遗传学突飞猛进。到1915年，孟德尔遗传学的基本原理已在多种生物中得到了研究，其中最著名的是黑腹果蝇。进行试验的同时，数学家们还建立了群体遗传学的统计框架，将遗传学解释引入了进化论研究。"
 dubois_naturalist: "博物学家"
 dubois_naturalist_desc: "一位研究自然世界的学者，肩负采集标本与活捉珍稀动物的使命。"
 dubois_naturalist_experienced: "经验丰富的博物学家"
 dubois_naturalist_experienced_desc: "这位博物学家因增进自然知识和收集标本的不懈努力而获得了广泛认可。"
 dubois_naturalist_famous: "著名博物学家"
 dubois_naturalist_famous_desc: "由于对自然科学的开创性贡献，这位博物学家被认为是其领域在全世界最杰出的代表。"
 dubois_paleontologist: "古生物学家"
 dubois_paleontologist_desc: "一位致力于研究化石遗迹的学者，揭示史前生命的失落世界。"
 dubois_paleontologist_experienced: "经验丰富的古生物学家"
 dubois_paleontologist_experienced_desc: "这位古生物学家因一系列著名的发掘工作而受到认可，在地质学界赢得了尊敬。"
 dubois_paleontologist_famous: "著名古生物学家"
 dubois_paleontologist_famous_desc: "通过丰硕的研究和备受赞誉的发现，这位古生物学家被认为是古生物学的权威专家。"
