 je_dubois_improve_forestry_project_reason: "你的[concept_dubois_naturalist][ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName]专注于在[JournalEntry.GetTarget.GetBuilding.GetState.GetName]中的[JournalEntry.GetTarget.GetBuilding.GetName]里更好地培育与选苗。\n$mr_divider_for_je$\n该研究项目每月都会获得进度，每次进度到达[JournalEntry.GetTotalGoalValue|V0]，建筑将获得修正。\n共可获得三个修正（$dubois_building_throughput_add_modifier_with_tooltip$、$dubois_building_production_mult_modifier_with_tooltip$、$dubois_building_goods_input_mult_modifier_with_tooltip$）。只有再次走完进度条方可获得新修正。\n$mr_divider_for_je$\n当前每月进度：#underline #tooltip:[GetRawTextTooltipTag('dubois_monthly_naturalist_improvement_progress_var_tt')] [GetPlayer.MakeScope.GetVariable('dubois_monthly_naturalist_improvement_progress_var').GetValue|2+]#!#!"
