 dubois.3000.t: "[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]博士疯了吗？"
 dubois.3000.d: "你的[concept_dubois_naturalist]，[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName]，正在忘记越来越多的事情。也许是时候让[SCOPE.sCharacter('dubois_naturalist_scope').GetHerHim]卸下博物学家的重担了？"
 dubois.3000.f: "等等……我的茶呢？放这儿了？这怎么像毒草啊？还有就是为啥房角呢有只大蜘蛛？"
 dubois.3000.g: "我不认为[SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe]应该继续工作。"
 dubois.3000.h: "哈，太正常了！"
 dubois.3010.t: "标本无影无踪"
 dubois.3010.d: "[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]博士突然发现[SCOPE.sCharacter('dubois_naturalist_scope').GetHerHis]的收藏中少了些标本。[SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe]说那些标本就……无影无踪了。"
 dubois.3010.f: "我非常确定，我刚刚把它们放儿，但现在它们不见了，也许我把它们放在别的地方了？"
 dubois.3010.g: "它们是怎么消失的？我还以为它们死了……"
 dubois.3011.t: "博物学家出售部分藏品"
 dubois.3011.d: "[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授已经背负了巨额债务，而且，[SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe]认为唯一的解决办法就是出售我们的部分藏品。"
 dubois.3011.f: "“她没有做错什么！我会想尽一切办法筹到钱！请！别！伤！害！她！她只是一只无辜的小蜘蛛！”"
 dubois.3011.g: "[SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe|U]做了什么？！"
 dubois_botanist: "植物学家"
 dubois_botanist_desc: "从沙漠到密林，从苔藓到巨树，该角色耗费其毕生心力来研究这世界上的植物。"
 dubois_entomologist: "昆虫学家"
 dubois_entomologist_desc: "为什么会有人想要研究虫子呢？然而这家伙却反其道而行之，甚至已经成为了一名专家。"
 dubois_marine_biologist: "海洋生物学家"
 dubois_marine_biologist_desc: "大海！在那里度过一生不是很好吗？但这家伙可不是水手吗，其一辈子都在研究海里的各种生物。"
 dubois_zoologist: "动物学家"
 dubois_zoologist_desc: "动物！多么迷人！多么让人兴奋！这个角色想弄清楚和动物有关的一切！"
