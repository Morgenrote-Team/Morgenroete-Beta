 dubois_nature_protection_tech: "自然保护"
 dubois_nature_protection_tech_desc: "自然保护起自保护森林的需求，接下来对濒危动物及其栖息地的保护也纳入其中。在十九世纪和二十世纪，数不清的自然保护项目都大获成功，例如，瑞士阿尔卑斯地区的阿尔卑斯羱羊再引入。"
