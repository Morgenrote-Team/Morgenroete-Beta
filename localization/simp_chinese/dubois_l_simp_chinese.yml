 dubois.10.t: "动物园不再开放"
 dubois.10.d: "政府没有兴趣继续维持[SCOPE.sState('dubois_zoo_state').GetName]的动物园，因此解散动物园并出售动物。"
 dubois.10.f: "一个国家只能在首都维持一个动物园，动物园的规模决定获得资金和标本的数量。"
 dubois.10.g: "可……可是，这些动物多可爱！"
 alert_dubois_zoo_extension_possible_alert_hint: "你可以扩建[concept_dubois_zoo]。可以通过#V 赤色晨曦界面#!中的学术概览界面进行扩建。"
 alert_dubois_mountain_expedition_possible_alert_hint: "我国可以派遣一支登山探险队。在#V 赤色晨曦界面#!中的体育概览界面派遣该队伍。"
 alert_dubois_naturalist_unused_alert_hint: "你的[concept_dubois_naturalist]目前无所事事，可以进行一些工作。可以通过#V 赤色晨曦界面#!中的学术概览界面将其派遣出去。"
