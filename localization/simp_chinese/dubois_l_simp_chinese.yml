 dubois.251.t: "未知人类骨骼"
 dubois.251.d: "在他的古生物学研究中，[SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]发现了许多来自史前时代的骨骼化石，期中大部分可能已经有数万年的历史了。他把这些化石安全地运回国内使得专家可以对此进行研究。"
 dubois.251.f: "让其他古生物学家惊讶的是，[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe]在岩石的表层发现了人类骨骼的遗存。然而[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe]不能重新构建起其中的来呢西。[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]的古人类学知识非常基础，因此不想发表可能会影响科学结论的意见。"
 dubois_add_fossil_java_tt: "获得#G 1#!个@dubois_human_fossil!#O 特殊人类化石#!：爪哇猿人。"
 dubois_add_fossil_neanderthaler_tt: "获得#G 1#!个@dubois_human_fossil!#O 特殊人类化石#!：尼安德特人。"
 dubois_add_fossil_taung_tt: "获得#G 1#!个@dubois_human_fossil!#O 特殊人类化石#!：汤恩幼儿。"
 dubois_add_fossil_peking_tt: "获得#G 1#!个@dubois_human_fossil!#O 特殊人类化石#!：北京猿人。"
 dubois_add_fossil_cromagnon_tt: "获得#G 1#!个@dubois_human_fossil!#O 特殊人类化石#!：克罗马侬人。"
 dubois_add_fossil_piltdown_tt: "获得#G 1#!个@dubois_human_fossil!#O 特殊人类化石#!：皮尔当人。"
 dubois.901.t: "博物学大会：人类在自然中的位置"
 dubois.901.d: "可能是过去和未来几年中最重要的科学大会已经完成了准备。会议将讨论人类的分类学地位，这是[SCOPE.sCharacter('dubois_darwin_scope').GetFullName]提出进化论后争论最为激烈的话题之一。我们将向全世界的博物学家发出邀请。[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授将主持会议。"
 dubois.901.f: "19世纪中，有关人类分类的争论与进化论联系起来，并达到了高潮。尽管早先已知道了人类与大猩猩相似，而卡尔·林奈已经将其一并归入灵长目，但仍存在一些保留意见。为了强调人类的独特性，约翰·弗里德里希·布卢门巴赫将人类与其他灵长目动物区分开来，称之为“双手类”（Bimana），而将其他灵长目动物称为“四手类”（Quadrumana）。这种分类尽管相对较新，但在学术界获得了英国著名古生物学家理查德·欧文等人的广泛认可。进化论的支持者对此无法接受，对于解剖学家来说这则可谓骇人听闻——根据这种分类方法，一只大猩猩与草原狒狒的亲缘关系比与人类更近。"
 dubois.901.g: "我们将迎接整个科学界的到来。"
 dubois.902.d: "[SCOPE.sCountry('dubois_congress_host_country').GetName]受邀参加国际科学大会。会议主题是在进化论背景下讨论人类的分类学地位。[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授收到了盛情邀请。"
 dubois.902.g: "我们不会错过。"
 dubois.904.t: "人类在自然中的位置：独一无二，或是一种猿猴？"
 dubois.904.d: "仅仅两次讲座之后，人们就清楚地意识到，动物学中的例行公事竟然如此具有富有争议。甚至学者们的友谊也因人类分类的问题而产生分歧。显然，现在占据上风的不再是科学问题本身，而是相关的影响和意义。"
 dubois.904.f: "在形态学要素首次引入这一领域后，争论集中在解剖学的一个特定方面：大脑。[SCOPE.sCharacter('dubois_hippocampus_defender_scope').GetFullName]提出了关于猿类和人类解剖差异的若干论文并强调了猿不可能变成人的观点。他主张，人类不仅仅是独一无二的灵长目动物，而且属于哺乳动物中的一个独立亚纲，与所有其他灵长类动物和哺乳动物都不同。[SCOPE.sCharacter('dubois_hippocampus_defender_scope').GetLastName]教授基于三个特征进行了这一分类，其中最重要的是，他声称只有人类的大脑拥有海马小体。这遭到了[SCOPE.sCharacter('dubois_hippocampus_attacker_scope').GetFullName]的反驳，他坚持认为这些所谓的特征其实可以在大猩猩身上找到。当被他是否能够接受自己是一种改良的猴子这一想法时，[SCOPE.sCharacter('dubois_hippocampus_attacker_scope').GetLastName]教授回答：“成为一种改良的猴子与成为改良的尘土一样值得尊敬。”"
 dubois.904.g: "人类在动物界独一无二。"
 dubois.904.h: "人类比此前的观点更接近猿类。"
 dubois.905.t: "受到尊重的演讲"
 dubois.905.d: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName]向[SCOPE.sCountry('dubois_congress_host_country').GetName]济济一堂的科学界人士发表了演讲，激励了观众与年轻学者。"
 dubois.905.f: "欧文说道，你可以看到\n黑猩猩的大脑是那么小，\n带着尾端的“角”\n被剪得干干净净，\n根本没有“海马小脑”。\n\n赫胥黎的回应，\n说欧文在撒谎，\n拉丁引语彻底颠倒；\n他的事实陈旧，\n他的错误不少，\n声誉因此直线下降。\n——菲利普·艾格顿爵士"
 dubois.905.g: "[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授令人印象深刻。"
 dubois.906.t: "对辩论的宝贵贡献"
 dubois.906.d: "[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授在[SCOPE.sCountry('dubois_congress_host_country').GetName]科学大会上发表的精彩科学讲座拓宽了学术界的视野。它可能会产生持久的影响。"
 dubois.906.f: "‘他对很多事情都持有非常奇怪的理论。有一次，他甚至在不列颠协会上发言，宣称猿猴和人类一样，大脑中也有河马大体。这种说法令人震惊；因为，如若确实如此，千百万不朽的信仰、希望和慈悲又会何以自处呢 ？你可能认为你和猿猴之间还有其他更重要的区别，比如会说话、会制造机器、会明辨是非、会祈祷，以及其他类似的小事；但那只是孩子的幻想，亲爱的。除了伟大的河马测试之外，什么都靠不住。如果你的大脑里有河马大体，你就不是猿类，尽管你有四只手，没有脚，而且比所有的猿都更像猿。’——查尔斯·金斯莱"
 dubois.907.t: "河马体问题"
 dubois.907.d: "对于人类在动物界中的角色的辩论已经引起了公众的广泛关注——但这种关注的方式并不讨喜。作家[SCOPE.sCharacter('dubois_hippopotamus_writer').GetLastName]已经在一部作品中对这场学术争论进行了嘲讽。"
 dubois.907.f: "“我们非常高兴，也可以说是兴致勃勃地发现，我们的大脑里都有河马。当然，我从来没有感觉到我的脑子里有河马；但也许它已经死了，所以没有动静，当然也就不算数了，你清楚的。每个人的脑壳里都有大脑，除非是个骷髅；它像猴子一样把尾巴卷起来，这我知道，因为我亲眼看见过。赫胥黎教授说河马在他的尾巴里——当然不是赫胥黎先生的尾巴——而是猿猴的尾巴：只是猿类没有尾巴，所以我不太明白。最后起立的另一位先生，也就是弗劳尔先生，你知道的，他说猿猴的身上到处都是，到处都是河马。从头到脚都是河马，可怜的动物，就像狗身上长满了虱子一样！我想知道他们为什么不在它脖子后面涂上一点青石粉，就像给指示猎犬涂的那样。好吧，我说到哪儿了？哦，欧文教授说猿类根本没有这种病，只有双手目才有，也就是咱们俩。他知道得最清楚，他们也都清楚，因为他们都是聪明绝顶的家伙，所以一定有一个人是对的，其他人都是错的，或者其中一个人是错的，其他人都是对的——明白了吗？我想知道他们为什么不折腾一下。”——查尔斯·金斯莱"
 dubois.907.g: "太搞笑了。"
 dubois.908.t: "知识或物质的交换"
 dubois.908.d: "我们的博物学家在大会当中获得了一些闲暇时间，现在正在考虑如何更好地利用这些时间。"
 dubois.908.f: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName]在科学大会上遇到了一些有趣的同事，他们希望就一些科学话题交换意见。经验交流将非常有成效。另一方面，教授还可以利用他的时间与其他同事交换一些甲虫和植物藏品……"
 dubois.908.g: "与同事交流想法。"
 dubois.908.h: "与同事交换标本。"
 dubois.909.t_unique: "人类独一无二"
 dubois.909.t_primate: "人类与猿类有关"
 dubois.909.d_unique: "博物学家们结束了漫长的争论。人类在动物界中拥有特殊的地位——这是学者们在最终宣言中的表述，大会主席今天隆重宣读了该宣言。"
 dubois.909.d_primate: "大会结束并宣读最终宣言时有几位教授愤然离席。学者们发现，人类与猴子的关系比以前认为的更加密切。"
 dubois.909.f_unique: "'在人类身上，大脑的发育呈现出一个上升的阶梯，比前后两个亚纲的区别更高、更明显。大脑半球不仅与嗅叶和小脑重叠，而且在前端和后端都延伸得更远。它们的后部发育非常明显，以至于解剖学家将该部分称为第三脑叶；这是人属所特有的，同样奇特的还有“后侧脑室角”和“海马小体”，它们是每个半球后叶的特征。人的大脑表层灰质在沟回的数量与深度上达到了最大程度。独特的智力与这种特征相关联，其结果奇妙地说明了大脑特征的价值；根据我对大脑特征的估计，我认为人属不仅是哺乳纲中的一个目，而且还是一个独特的亚纲，我建议将其命名为“首脑亚纲”（ARCHENCEPHALA）。——理查德·欧文"
 dubois.909.f_primate: "‘可以肯定的是，最接近人类的猿类是黑猩猩或大猩猩。在身体和四肢的一般比例上，大猩猩和人类有着显著的差异，但其他猿类与大猩猩的差异相比之下将会更大。在颅骨容量这一重要问题上，人与人之间的差异比人与猿之间的差异更大；而在比例上，最低等的猿与最高等的猿之间的差异与后者与人之间的差异一样大。显而易见的是，相比人类，最高等的猿与较为低等乃至最低等的猿类之间的差异更大。因此，无论研究那种器官系统，比较它们在猿类系谱中的变化都会得出相同的结果——将人与大猩猩和黑猩猩区分开来的结构差异并没有将大猩猩与低等猿类区分开来的差异那么大。’——托马斯·亨利·赫胥黎"
 dubois.909.g: "人是造物的王冠。"
 dubois.909.h: "我们只是没毛的猿猴吗？"
 dubois.911.t: "人类学大会：现代人类的起源"
 dubois.911.d: "我国将主办人类学历史上最重要的大会。人类的一个重大问题，即人类起源的问题，应该得到澄清。来自世界各地的人类学家将讨论人类起源于欧洲、亚洲或是非洲。[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName]将主持这场辩论。"
 dubois.911.f: "人类从哪里来？《圣经》中关于人类被逐出天堂的故事已经包含了这个问题的核心——人类显然并非来自现今生活的地区。因此，很长一段时间内，欧洲人相信古人类的骨骼是在大洪水中丧生的遗骸——就像恐龙长期以来被认为是没能在方舟上获得位置的动物一样。随着冰河时代理论的提出，以及随后的地质学和古生物学研究发现地球的年龄比预期的更加久远，人们对“穴居人”的兴趣与日俱增。最近，随着进化论的提出，以及距今几千年以上的史前骸骨被发现，现代人类的起源地问题变得更加尖锐。"
 dubois.911.g: "何处是人类的摇篮？"
 dubois.912.d: "[SCOPE.sCountry('dubois_congress_host_country').GetName]受邀参加国际科学大会。会议主题是现代人类的起源。[SCOPE.sCharacter('lepsius_anthropologist_scope').GetLastName]教授收到了盛情邀请。"
 dubois.914.t: "现代人类出现在欧洲、亚洲或是非洲？"
 dubois.914.d: "学术界分为三个阵营。人类摇篮的问题不仅与某种民族自豪感有关，也与人类进化的进一步论述有关。"
 dubois.914.f: "在一场激烈的辩论中，三个阵营各自的支持者交换了观点。[SCOPE.sCharacter('dubois_europe_defender_scope').GetLastName]首先提出了欧洲理论，因为迄今为止的发现显示，欧洲化石的脑容量是最大的。而更大的大脑对于直立行走不可或缺。[SCOPE.sCharacter('dubois_asia_defender_scope').GetLastName]对这一理论表示怀疑。在亚洲已经发现了直立行走的类人物种化石，因此大脑是在直立行走后才发展起来的。另一方面，[SCOPE.sCharacter('dubois_africa_defender_scope').GetLastName]指出，已知最接近人类的猿类物种来自非洲而非亚洲。正如进化论的发明者所言，人类的起源必须在非洲。"
 dubois.914.g: "现代人类发展于欧洲。"
 dubois.914.h: "所有证据都指向亚洲起源。"
 dubois.914.i: "人类的摇篮是非洲。"
 dubois.915.t: "受到尊重的演讲"
 dubois.915.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName]向[SCOPE.sCountry('dubois_congress_host_country').GetName]济济一堂的科学界人士发表了演讲，激励了观众与年轻学者。"
 dubois.915.f: "地球是人类的摇篮，但人类不可能永远生活在摇篮中。’\n——康斯坦丁·齐奥尔科夫斯基"
 dubois.915.g: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetLastName]教授令人印象深刻。"
 dubois.916.t: "对辩论的宝贵贡献"
 dubois.916.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName]教授在[SCOPE.sCountry('dubois_congress_host_country').GetName]科学大会上发表的精彩科学讲座拓宽了学术界的视野。它可能会产生持久的影响。"
 dubois.916.f: "‘他对很多事情都持有非常奇怪的理论。有一次，他甚至在不列颠协会上发言，宣称猿猴和人类一样，大脑中也有河马大体。这种说法令人震惊；因为，如若确实如此，千百万不朽的信仰、希望和慈悲又会何以自处呢 ？你可能认为你和猿猴之间还有其他更重要的区别，比如会说话、会制造机器、会明辨是非、会祈祷，以及其他类似的小事；但那只是孩子的幻想，亲爱的。除了伟大的河马测试之外，什么都靠不住。如果你的大脑里有河马大体，你就不是猿类，尽管你有四只手，没有脚，而且比所有的猿都更像猿。’——查尔斯·金斯莱"
 dubois.917.t: "神秘头骨"
 dubois.917.d: "一位业余人类学家带着一块的未知化石出席会议。他想把它卖给科学协会，但价格高得吓人。许多人类学家不愿相信其中的猫腻。"
 dubois.917.f: ""
 dubois.917.g: "每一块骨骼对我们的收藏都很有价值。"
 dubois.917.h: "……但这块骨头显然一文不值。"
 dubois.919.t_europe: "现代人类来自欧洲"
 dubois.919.t_asia: "现代人类来自亚洲"
 dubois.919.t_africa: "现代人类来自非洲"
 dubois.919.d_europe: "国际科学界一致认为现代人类起源于欧洲。非欧洲学者谴责这一决定体现了白人至上主义。"
 dubois.919.d_asia: "最近，国际人类学大会达成妥协，认为人类一定来自亚洲。大会大多数成员都同意这一观点。"
 dubois.919.d_africa: "经过最后一场极具争议的辩论，科学家们以微弱多数达成一致，认为人类的起源应该在非洲。"
 dubois.919.f_europe: "历史上，人类真正的起源地问题在20世纪初未能解决。一小部分人受到所谓的“皮尔当人”发现的误导，认为现代人起源于欧洲，这更多是出于意识形态而非科学因素考量。亚洲理论拥有最多的支持者，爪哇猿人的发现和北京猿人的复原在很大程度上起到了推动作用。直到20世纪中叶，越来越多的非洲发现才使得这一观点得以动摇。"
 dubois.919.f_asia: "历史上，人类真正的起源地问题在20世纪初未能解决。一小部分人受到所谓的“皮尔当人”发现的误导，认为现代人起源于欧洲，这更多是出于意识形态而非科学因素考量。亚洲理论拥有最多的支持者，爪哇猿人的发现和北京猿人的复原在很大程度上起到了推动作用。直到20世纪中叶，越来越多的非洲发现才使得这一观点得以动摇。"
 dubois.919.f_africa: "历史上，人类真正的起源地问题在20世纪初未能解决。一小部分人受到所谓的“皮尔当人”发现的误导，认为现代人起源于欧洲，这更多是出于意识形态而非科学因素考量。亚洲理论拥有最多的支持者，爪哇猿人的发现和北京猿人的复原在很大程度上起到了推动作用。直到20世纪中叶，越来越多的非洲发现才使得这一观点得以动摇。"
 dubois.919.g: "不出所料，人类是在欧洲进化的。"
 dubois.919.h: "所有证据都表明，人类是在亚洲进化的。"
 dubois.919.i: "‘走出非洲’理论现在得以证实了。"
 dubois.921.t: "古生物学大会：恐龙的灭绝"
 dubois.921.d: "我国有幸筹备古生物学领域最重要的大会之一。来自世界各地的科学家将云集[SCOPE.sCountry('dubois_congress_host_country').GetName]解答恐龙灭绝的原因。[SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]已经选好了他最喜欢的木髓帽，准备在开幕演讲时戴上。"
 dubois.921.f: "从发现第一块恐龙骨骼并将其归类为未知物种的那一天起，“什么导致了恐龙灭绝”的问题就一直困扰着人类。19世纪以前，人们认为恐龙在大洪水中未能登上诺亚方舟，因而对其不屑一顾。随着新的地质学和古生物学方法的发展，人们对恐龙的认识变得更加细致入微。洪水理论在乔治·居维叶的研究中占有一席之地，不过调转了方向：他认为海平面下降导致他在湿地发现的蜥蜴失去了栖息地。这只是在接下来的一个半世纪里涌现出的众多理论之一——答案并不令人满意。"
 dubois.921.g: "这个问题真能得到解答吗？"
 dubois.922.d: "[SCOPE.sCountry('dubois_congress_host_country').GetName]受邀参加国际科学大会。会议主题是恐龙灭绝的原因。[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]教授收到了盛情邀请。"
 dubois.922.f: "这将是十年来的盛事。"
 dubois.923.t: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]的革命性理论"
 dubois.923.d: "大会开始前不久，我国最富声望的天文学家[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]宣布，他对导致恐龙灭绝的原因有自己的看法：小行星撞击！他要求将这一观点传达给古生物学家们。"
 dubois.923.f: "虽然[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]教授并非古生物学家，但他熟悉宇宙现象，知道它们的破坏力。19世纪的人们在天空中观测到了一些令人惊叹的大彗星，但与此同时，在通古斯卡事件中，人们也感受到了外星岩石的威力。这位天文学家不仅进行了理论计算，还采集了样本，在某些岩层（包括白垩纪末期的岩层）中发现了不同寻常的物质。在与[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]教授的不断交流中，两位著名的科学家交换了意见，并在现代物理知识的帮助下得出结论：小行星撞击是恐龙时代结束的最合理原因——与其说是撞击，不如说是撞击造成的生态和气候后果。"
 dubois.923.g: "有趣的观点。"
 dubois.923.h: "荒诞不经。"
 dubois.924.t: "恐龙为何灭绝？"
 dubois.924.d: "古生物学家们聚集在一起，对白垩纪末期的大灭绝问题众说纷纭。这里没有两个或三个阵营，而是各种论点的大杂烩，大部分只是在可能性和愚蠢程度上略有不同。"
 dubois.924.f: "自从恐龙被发现以来，关于它们为何从地球上消失的各种奇思妙想一直在流传。下面只是其中的一部分。"
 dubois.924.a: "原因是小行星撞击。"
 dubois.924.g: "海平面下降破坏了栖息地。"
 dubois.924.h: "地球大气中的氧气含量上升到更适合鸟类与哺乳动物生存的水平。"
 dubois.924.i: "适应不良的特征导致了生物进化的终结。"
 dubois.924.j: "性活动的减少导致灭绝。"
 dubois.924.k: "病理性巨人症！"
 dubois.924.l: "与吃恐龙蛋的哺乳动物竞争。"
 dubois.924.m: "气候变化。"
 dubois.924.n: "火山爆发。"
 dubois.924.o: "宇宙或紫外线辐射的轰击。"
 dubois.924.p: "恐龙的脑容量在中生代逐渐减小，直到它们愚蠢到无法生存。"
 dubois.929.t: "古生物学大会结束"
 dubois.929.d_asteroid: "在最终宣言中，古生物大会宣布了决定：小行星撞击导致恐龙灭绝似乎是令人信服的理论。"
 dubois.929.d_climate: "今天，东道国的教授以沮丧的叹息开始了讲座，指出气候变化导致恐龙灭绝。"
 dubois.929.d_sex: "古生物学大会主席有点腼腆，清了清嗓子，解释说缺乏有性生殖是恐龙灭绝的原因。托特纳姆教授插话说，他一直以为自己的妻子是一头雷龙，但会议记录中删去了这句话。"
 dubois.929.d_mammals: "经过几天的讨论，古生物学家得出结论：与哺乳动物的竞争预示着恐龙的终结。他们怀疑啮齿类动物喜欢吃恐龙蛋。"
 dubois.929.d_fat: "今天，古生物学大会主席以坚定的语气语重心长地宣读了一份文件，该文件支持这样一种观点，即恐龙只是变得太大、太胖，才导致它们不可避免地灭绝。托特纳姆教授评论说这意味着主席的位置很快就会出缺，结果遭到了公开斥责。"
 dubois.929.d_stupid: "今天，古生物大会宣读的最终宣言详细解释了恐龙的大脑在几百万年的时间里变得越来越小，直到愚蠢到无法生存。托特纳姆教授表示，在大会召开之前，一些科学同行也呈现出同样的倾向，但这一说法没有写入会议记录。"
 dubois.929.f: "这是19世纪和20世纪初一些重要科学家的真实想法。"
 dubois.929.g: "小行星撞击是罪魁祸首。"
 dubois.929.h: "尴尬的理论，但却是唯一被接受的理论。"
