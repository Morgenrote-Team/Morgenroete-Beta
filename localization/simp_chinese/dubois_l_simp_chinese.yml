 dubois.35.t: "它要跑！"
 dubois.35.d: "当游猎队伍试图尾随这只动物时，它突然跑开了——[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授的助手们有被甩掉的危险！"
 dubois.35.f: "“我们离全面了解动物还有很长的路要走，研究动物仍然是我们更好理解自身的一部分。”\n——阿尔弗雷德·埃德蒙德·布雷姆"
 dubois.35.g: "我们对此无能为力了……"
 dubois.36.t: "它会咬人！"
 dubois.36.d: "游猎队伍在布置陷阱时惊动了那只动物，结果它开始凶性大发！"
 dubois.36.f: "“认为大象是易怒的动物是错误的。大象天性温和、平静，能够与其他生物和睦相处，生活在友谊与和平之中。”n——阿尔弗雷德·埃德蒙德·布雷姆"
 dubois.36.g: "快逃，蠢货们！"
 dubois.36.h: "不管怎样，还是布置陷阱吧！"
 dubois.36.i: "一切尽在博物学家掌控之中。"
 dubois.37.t: "游猎事故"
 dubois.37.d: "由于疏忽，游猎队伍惹怒了错误的动物。它不仅破坏了所有陷阱，还弄伤了助手，随后逃之夭夭。几周的努力在短短几小时内化为乌有，最终迫使[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授取消了这次探险。"
 dubois.37.f: "“如果我见过魔法，那一定是在非洲。”\n——欧内斯特·海明威"
 dubois.37.g: "糟透了！"
 dubois.36.success_tt: "游猎队伍成功设下了陷阱。"
 dubois.36.fail_tt: "狩猎探险因一起严重的事故不得不提前结束"
 dubois_safari_zoologist_tt: "该选项可用是因为博物学家有动物学家特质。"
 dubois.38.t: "狩猎探险DLC"
 dubois.38.d: "技术进步正在彻底改变狩猎探险，无论是在新型武器的使用还是交通工具的升级。"
 dubois.38.f: "“我还不记得哪一个在非洲的早晨是灰色的。”\n——欧内斯特·海明威"
 dubois.38.machine_guns_tt: "机枪的应用让我们在面对不管是人还是动物时都能立于不败之地。"
 dubois.38.combustion_engine_tt: "内燃机的发明能让我们更轻松地追猎动物。"
 dubois.38.g: "啊哈，完全不同的“狩猎探险”啊。"
 dubois.40.d: "在一次除了困难之外一无所获的搜寻结束后，[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授放弃了，并带队返回[ROOT.GetCountry.GetNameNoFlag]。"
