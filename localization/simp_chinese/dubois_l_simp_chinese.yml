 dubois.2011.d_other: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName]教授是我国首席[concept_dubois_paleontologist]。[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe]目前正忙于其他工作。"
 dubois.2011.f: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]的总古生物学[concept_academics_experience]为#G [ROOT.Var('dubois_paleontologist_var').GetVariable('dubois_paleontologist_experience_var').GetValue]#!\n\n古生物学家每年都能在地层中发现新化石。大地层中还有机会发现稀有的恐龙骨骼，可以用来重建骨架。为此必须将[concept_dubois_paleontologist]分配到一个地层。如果本国境内没有地层，也可以与拥有大地层的国家协商签订古生物许可协议。古生物学家如果没有被分配到某个地层，就会一直处于非激活状态。不过在此期间，[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe]可以进行探险、恐龙骨骼重建、骨架构建或骨架重构。"
