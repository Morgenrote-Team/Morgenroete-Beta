 dubois.1030.t: "兔狲围墙"
 dubois.1030.d: "兔狲栖息地是一片布满裂缝和小洞穴的岩石地形。乍一看，这毛茸茸的猫科动物几乎看不见，与周围的环境完美地融为一体。但是观众发现了一只，它又圆又大的眼睛小心翼翼地从一块巨石后面探出来，静静地观察着周围的一切。"
 dubois.1030.f1: "在动物园里，兔狲从一块巨石后面探出头来，又大又圆的眼睛扫视着四周。它厚厚的银色皮毛被寒风吹得鼓鼓的，看起来就像一个野性十足的小绒球。与许多其他野生猫科动物不同，兔狲腿短，但完全适应寒冷的高海拔地区。"
 dubois.1030.f2: "当兔狲从岩石间的藏身之处出来时，它小巧的体型和蓬松的毛发常常让游客感到惊讶，这有助于它融入周围的雪地环境。兔狲在野外很少露面，白天喜欢藏在岩石缝隙和洞穴中，黎明或黄昏时才出来捕食。"
 dubois.1030.f3: "在围栏内，兔狲安静地移动着，粗大的尾巴像翎羽一样拖在后面，它依靠毛皮的伪装来避免被捕食者和猎物发现，兔狲的食物主要是小型哺乳动物，它是一个熟练的猎手，能利用敏锐的视力发现动静。"
