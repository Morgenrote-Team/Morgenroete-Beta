 dubois.52.t: "优质林业"
 dubois.52.d: "[ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName]博士实现了[ROOT.Var('dubois_naturalist_var').GetCharacter.GetHerHis]目标。通过精心挑选抗性特别强的树苗、采取自然虫害防治措施并研究几种动物和植物的共生关系，[ROOT.Var('dubois_naturalist_var').GetCharacter.GetSheHe]可持续地增强了我国的林业。这些生态措施还可能带来经济效益。"
 dubois.52.f: "“抱歉，你说什么？你要砍掉这些树木？我费尽心机养育它们、培植它们、照顾它们，现在这些资本主义怪物却要杀害我的宝贝？天啊，我都做了些什么！”"
 dubois.52.g: "给每个人都来点木材！"
 dubois.53.t: "优质橡胶树"
 dubois.53.d: "[ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName]博士实现了[ROOT.Var('dubois_naturalist_var').GetCharacter.GetHerHis]目标。通过精心挑选抗性特别强的树苗、采取自然虫害防治措施并研究几种动物和植物的共生关系，[ROOT.Var('dubois_naturalist_var').GetCharacter.GetSheHe]可持续地增强了我国的林业。这些生态措施还可能带来经济效益。"
 dubois.53.f: "“为什么大家都对毫无用处的橡胶感兴趣？我这么做只是因为对新西沼泽蚊感兴趣。这种容易致命的小动物只能在这种气候下繁殖。”"
 dubois.53.g: "给每个人都来点橡胶！"
 dubois.22.t: "[ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName]教授记录[SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_name')]"
 dubois.22.d: "在动物栖息地进行过数个月的研究后，[ROOT.Var('dubois_naturalist_var').GetCharacter.GetFullName]完成了观察，并撰写了题为#YELLOW 《[SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_title')]》#!的论文。[SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_topic')]"
 dubois.22.g: "在国立图书馆中保存一份副本。"
 dubois_document_new_animal_tt: "[ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName]教授记录#ORANGE [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_name')]#!"
 je_dubois_native_animal: "记录本土动物"
 je_dubois_native_animal_reason: "[ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName]教授研究本国原有的动物。经验、技能与角色特质，以及重心为自然历史的大学都会影响该研究花费的时间。[ROOT.Var('dubois_naturalist_var').GetCharacter.GetSheHe]研究的动物为#ORANGE [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_name')]#!。"
 je_dubois_native_animal_goal: "#E 博物学进度#!达到#GREEN [JournalEntry.GetTotalGoalValue|V0]#!。"
 je_naturalist_dies_tt: "[ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName]教授去世"
 dubois.442.t: "地质知识"
 dubois.442.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]在山中逗留的期间详细调查了一边该山，他绘制了地图并对该山进行了科学的解释。最让登山队惊讶的是在第二日清晨，他拿给登山队一张地形图，上面详细的记录了山险和易攀援之处。"
 dubois.442.f: "“嗯？我为啥要这么做？哦，我的朋友，我只是有点无聊，在空余期间我还对发现的矿物进行了分类。嗯...这没什么特别的，我还没给它们上色呢...”"
 dubois.442.g: "谢天谢地，还好我们有[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士"
 dubois.443.t: "优质矿物"
 dubois.443.d: "登山队开始抱怨地质学家的拖拖拉拉，登山队里的科学家更像是个累赘而非帮手；不过事实证明这人还是有用的，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士在登山时发现了一种稀有材料。"
 dubois.443.g: "这是个小小的惊喜。"
