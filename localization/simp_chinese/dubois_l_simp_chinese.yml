 dubois_rating_naturalist_zoologist_information_tt: "拥有#V $dubois_zoologist$#!特质的博物学家可遇到更多与动物相关的事件且加快动物繁育速度。如果[concept_dubois_pacific_expedition]中有博物学家随队，则有更有可能找到[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]。"
