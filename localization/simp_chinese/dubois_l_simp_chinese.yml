 dubois.1021.t: "亚洲展馆"
 dubois.1021.d: "动物园的亚洲区域装饰有传统的亚洲图案、亚洲小屋和宝塔。甚至还有一些龙和著名亚洲动物的雕像。让人仿佛置身于亚洲。"
