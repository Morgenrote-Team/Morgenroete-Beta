 dubois.1101.no_more_babies: "我不想再听到有关动物园动物的消息！"
 dubois_no_more_baby_animals_tt: "你将#n 不再收到有关动物宝宝的消息。无法撤销这一决定。#!"
 dubois_lion_baby: "#b 狮子宝宝#!"
 dubois_otter_baby: "#b 水獭宝宝#!"
 dubois_jaguar_baby: "#b 美洲豹宝宝#!"
 dubois_koala_baby: "#b 考拉宝宝#!"
 dubois_panda_baby: "#b 熊猫宝宝#!"
 dubois_lion_baby_birth_flavor: "两只狮子幼崽在它们的妈妈身边爬来爬去。这两只小狮子几周前刚刚出生，但妈妈把他们藏起来了一段时间。现在，它们终于可以看看这个世界，玩耍并打滚了。它们真的很可爱！"
 dubois_otter_baby_birth_flavor: "这是小水獭首次下水游泳。对于第一次来说，它看起来还不错。接下来小水獭从水里出来了，躺在一块温暖的石头上。"
 dubois_jaguar_baby_birth_flavor: "小美洲豹只有六周大，跟在妈妈的后面。它看起来相当笨拙，但很快就会成长为危险的掠食者。"
 dubois_koala_baby_birth_flavor: "小考拉紧紧抓住妈妈的背。它已经足够大了，但仍然依赖着妈妈。突然，它抓起树上的一片叶子开始啃。"
 dubois_panda_baby_birth_flavor: "小熊猫看起来很天真。它在地上滚来滚去，看起来笨手笨脚的。但妈妈一直关注着它，这个小东西不会有事的。"
 dubois.1250.t: "优胜美地国家公园？"
 dubois.1250.d: "一些有影响力的自然保护主义者希望在优胜美地山谷建立一个国家公园，以保护其独特的景观。优胜美地山谷风景独特，令人叹为观止。问题是，我们应当建立自然保护区，还是将山谷用于农业、伐木和采矿？"
 dubois.1250.f: "“但任何人工建造的寺庙都比不上优胜美地。它峭壁上的每一块岩石都焕发着生命的光彩。”\n——约翰·缪尔"
 dubois.1250.g: "好主意！"
 dubois.1250.h: "事实上，这里看起来很适合采矿！"
 dubois.1251.t: "最后的欧洲野牛"
 dubois.1251.d: "欧洲野牛，又称韦森特牛，已然濒临灭绝。比亚沃韦扎的森林中还存有最后几只个体。森林在1830年前受到保护，但十一月起义后，几乎全部的护林员职位都被废除。[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullNameNoFormatting]的到访可能将会使得森林中重新建立[concept_dubois_nature_reserve]。"
 dubois.1251.f: "“比亚沃韦扎是欧洲最后一片原始森林，也是野牛最后的家园。这是一个自然奇迹！”\n“但伐木业可以促进经济增长！”"
 dubois.1251.g: "我们要保护欧洲野牛！"
 dubois.1251.h: "这片森林是伐木的绝佳地点。"
 dubois.1252.t: "大帕拉迪索皇家狩猎保护区？"
 dubois.1252.d: "在大帕拉迪索打猎是件美妙的事情，因为那里是#b 阿尔卑斯羱羊#!最后的栖息地。在结束狩猎后，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullNameNoFormatting]考虑在当地建立一座[Concept('concept_dubois_nature_reserve','$concept_dubois_royal_hunting_reserve$')]以保护最后的几只羱羊。"
 dubois.1252.f: "“这些平民怎么敢杀我的羱羊？只有我才能猎杀它们！必须保护我的猎物不受野蛮人的伤害！”\n\n#b 历史背景：#!大帕拉迪索国家公园成立于1922年，当时维托里奥·埃马努埃莱三世捐赠了皇家狩猎保护区的土地，创建了意大利的第一个国家公园。保护羱羊仍然是公园最重要的任务之一。1922年，公园里大约有3000只羱羊。这个数字在法西斯统治和第二次世界大战期间急剧下降，但后来数量恢复了，今天国家公园里大约有4000只羱羊。"
 dubois.1252.g: "立即建立皇家狩猎保护区！"
 dubois.1252.h: "或许再等等……"
