 dubois_rating_naturalist_entomologist_information_tt: "拥有#V $dubois_entomologist$#!特质的博物学家可遇到更多与昆虫有关的事件并在[Concept('concept_dubois_botanical_expedition','$concept_dubois_botanical_expeditions$')]中找到更多[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]。"
