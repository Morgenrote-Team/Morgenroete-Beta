 dubois.139.t: "大猩猩"
 dubois.139.d: "我们的动物园增添了一种新的珍稀动物：今天，期待已久的#O 大猩猩#!搬进了新的展区。"
 dubois.139.f: "大猩猩是灵长目中体型最大与智力仅次于人类和黑猩猩的动物，它们生存于非洲大陆赤道附近丛林中，食性为草食性。大猩猩主要是草食动物，以树叶、茎和果实为食。尽管它们体型庞大，力大无穷，但一般都很温顺害羞，大部分时间都在森林栖息地觅食和休息。"
 dubois.139.g: "它们真巨大！"
 visit_gorilla_tt: "你将参观#o 大猩猩#!展区"
