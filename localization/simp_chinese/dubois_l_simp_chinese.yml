 dubois.39.d: "经过数周的挫折与无数次努力，期待已久的动物终于被捕获。[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授欣喜若狂。英雄们带着捕获的动物凯旋而归。毫无疑问，它在美丽的[ROOT.GetCountry.GetNameNoFlag]国家动物园里会比在这艰苦的自然环境中更为快乐！"
