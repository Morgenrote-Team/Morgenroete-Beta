 je_dubois_paleontological_expedition_reason: "古生物考察队正在进行[concept_dubois_paleontological_expedition]。\n$mr_divider_for_je$\n完成考察项目需耗时12个月。完成后，您将根据考察的#V 成功率#!获得[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]和[Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]。\n$mr_divider_for_je$\n每月#V 成功率#!都会自动增加小量，随事件变化可能增减。\n\n当前预估每月成功率变动：#underline #tooltip:[GetRawTextTooltipTag('je_dubois_paleontological_expedition_monthly_progress_tt')] [Country.MakeScope.Var('dubois_paleontological_expedition_estimated_progress_var').GetValue|2+]#!#!（最大值1）\n$mr_divider_for_je$\n若您拥有空闲的[concept_dubois_paleontological_team]，可建立[concept_dubois_paleontological_excavation]。该站点将被动产出更多化石与骨骼。\n$mr_divider_for_je$\n当前#tooltip:[GetRawTextTooltipTag('je_dubois_paleontological_expedition_yield_tt')] #underline #b 预计考察项目收益：#!#!#!\n[GetPlayer.GetCustom('je_dubois_paleontological_expedition_yield_type')]"
 je_dubois_paleontological_expedition_yield_tt: "根据#V 成功率#!，可以获得更多化石和骨骼：\n0至3：$je_dubois_paleontological_expedition_yield_level_1_loc$\n4至7：$je_dubois_paleontological_expedition_yield_level_2_loc$\n8至11：$je_dubois_paleontological_expedition_yield_level_3_loc$\n12至14：#p 4#!@dubois_fossil![Concept('concept_dubois_fossil','$concept_dubois_fossils$')]和#p 1#!@dubois_dinosaur_bone![concept_dubois_dinosaur_bone]\n15：#p 5#!@dubois_fossil![Concept('concept_dubois_fossil','$concept_dubois_fossils$')]和#p 2#!@dubois_dinosaur_bone![Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]"
