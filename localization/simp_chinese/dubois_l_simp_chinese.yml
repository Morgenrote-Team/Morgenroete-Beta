 dubois.138.t: "狐獴"
 dubois.138.d: "我们的动物园增添了一种新的珍稀动物：今天，期待已久的#O 狐獴#!搬进了新的展区。"
 dubois.138.f: "狐獴是一种生活在非洲的小型獴科动物。狐獴的社会性极强，喜欢成群结队的生活，群体大小从2只到50只不等，而且至少有一只狐獴要负责警惕危险，并向狐獴群发出警告。放哨的工作由两只狐獴轮流承担。它们通常生活在洞穴中，可以躲避捕食者。"
 dubois.138.g: "多么可爱！"
