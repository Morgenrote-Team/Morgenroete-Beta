 dubois.1020.t: "大猩猩围墙"
 dubois.1020.d: "大猩猩围栏的特点是植被茂盛，攀爬结构庞大。在这里可以注意到几只令人印象深刻的灵长类动物在茂密的树叶间优雅地移动，有的在攀爬绳索，有的则在树荫下休息。它们强壮的体格和宁静的举止让人着迷。"
 dubois.1020.f1: "在大猩猩围栏里，一只占主导地位的银背大猩猩威风凛凛地坐在一块大石头上，用警惕的目光注视着它的族群。它那镇定自若、颐指气使的样子立刻吸引了游客的注意，动物园管理员解释道，“大猩猩是高度社会化的动物，银背大猩猩作为群体的领袖，在维持秩序和保护群体方面发挥着至关重要的作用。每个成员都有特定的角色，银背大猩猩的职责包括决定行动和应对威胁。”"
 dubois.1020.f2: "在大猩猩栖息地，一只小猩猩在绳索和树枝上来回攀爬，而年长的大猩猩则在下面观察。\n动物园管理员分享道：“年轻的大猩猩非常活泼好动。攀爬和荡秋千有助于它们发展日后生活所需的身体技能。这些活动还能刺激他们的精神，增进他们与其他大猩猩的关系。游戏是小猩猩们成长的重要组成部分，有助于他们茁壮成长和社交能力的提高”"
 dubois.1020.f3: "在大猩猩的围栏里，它们围着一大堆水果和蔬菜，相互喂食和分享。动物园管理员对此解释道，“大猩猩以其和平、合作而闻名，它们经常一起进食，并在群体内分享食物，这加强了社会纽带，确保每个人都能吃饱。这种集体行为是它们社会性的一个重要方面，可以促进和谐，减少成员之间的竞争。”"
