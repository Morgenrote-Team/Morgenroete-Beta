 dubois_paleontological_excavation_explanation_loc: "你的[concept_dubois_paleontological_team]正在运营[concept_dubois_paleontological_excavation]。该站点每年将稳定产出[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]与[Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]。\n你可派遣[concept_dubois_paleontologist]驻站以提升每年化石产量。但若召回古生物学家，则需等待1年冷却期方可再次派遣。  "
