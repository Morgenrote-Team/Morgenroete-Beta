 dubois.1019.t: "狐獴围墙"
 dubois.1019.d: "狐獴围墙内有岩石，岩石上有洞穴，可以发现许多狐獴站在那里跑来跑去。"
 dubois.1019.f1: "“狐獴因其高度组织化的社会结构而引人注意，”动物园管理员解释道。“每个狐獴都轮流担任哨兵，在其他成员觅食或休息时监视捕食者。它们的交流清晰明了，不同的叫声预示着不同程度的威胁。这种持续的警惕和合作是它们在野外生存的关键。”"
 dubois.1019.f2: "动物园管理员分享道，“狐獴是挖掘专家，它们能在短短几分钟内挖出数米深的洞穴，来寻找昆虫、小型爬行动物和树根等食物。这种挖掘行为对它们建立复杂的洞穴系统也起着至关重要的作用，它们在洞穴中群居并抚养幼崽，这些地下网络可以保护它们免受捕食者和极端天气的侵袭。”"
 dubois.1019.f3: "“狐獴的叫声种类繁多，”动物园管理员解释说，“它们的叫声包括警报声，也包括联系不同群体。当一个成员发现食物时，它通常会发出叫声，与其他成员分享发现的食物，这强调了它们的社会性。这些声音交流是它们生存不可或缺的一部分，帮助它们保持联系和协调。”"
