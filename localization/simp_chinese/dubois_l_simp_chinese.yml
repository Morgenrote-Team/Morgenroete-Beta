 dubois.1302.elk: "马鹿"
 dubois.128.t: "马鹿"
 dubois.128.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 马鹿#!搬进了新的展区。"
 dubois.128.f: "马鹿是鹿科动物中最大的成员，产于欧洲和亚洲的森林中，马鹿以其巨大的鹿角而闻名，雄性鹿角每年脱落并重新生长。马鹿是食草动物，以树叶、树皮和水生植物为食。尽管体型庞大，但它们行动敏捷，非常适合寒冷的森林。"
 dubois.128.g: "多么雄伟威严！"
 visit_elk_tt: "你将参观#o 马鹿#!展区"
