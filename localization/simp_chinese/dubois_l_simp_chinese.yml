 dubois.1059.t: "美国毒蜥展区"
 dubois.1059.d: "美国毒蜥的围栏呈现出一片崎岖的景观，沙质地形与岩石缝隙交错分布。乍一看，这种蜥蜴鲜艳的黑橙色鳞片与周围环境融为一体。片刻后，你发现了它——正缓缓地从一个阴暗的洞穴中爬出，厚实的珠状皮肤在光线下微微闪烁，动作谨慎而小心地穿行于栖息地中。"
 dubois.1059.f1: "在动物园烈日炙烤的围栏中，一只孤独的美国毒蜥正缓缓穿越岩石地形，它鲜明的黑橙色鳞片在阳光下微微闪耀。这只毒蜥缓慢而沉稳的动作吸引了好奇的游客们。出于对它独特外貌和行为的兴趣，你走近一位动物管理员了解更多信息。\n“吉拉毒蜥是世界上少数几种有毒蜥蜴之一，”动物管理员解释道，“它动作缓慢，是为了在严酷的沙漠环境中节省能量。与其他捕食者不同，它不依赖速度，而是凭借强效毒液来制服小型哺乳动物和鸟类等猎物。它鲜艳的颜色是一种警告，向潜在捕食者表明它不好惹。”"
 dubois.1059.f2: "在布满岩石的围栏中，美国毒蜥部分隐匿在一块巨大的岩石下，只见它分叉的舌头时不时吐出，感知空气中的气味。这种带有史前气息的生物，其珠状的皮肤和强壮的下颌令游客们深深着迷。对它的捕食习性感到好奇的你，再次向一位动物管理员请教。\n“美国毒蜥的新陈代谢非常缓慢，它们每年只需进食几顿大餐就能维持生存，”动物管理员解释道，“它们用强壮的下颌咬碎鸟蛋或爬行动物的蛋，这是它们最喜爱的食物之一。进食后，它们将脂肪储存在尾部，用以支撑长时间没有食物的情况。这种适应能力是它们在干旱沙漠中生存的关键。”"
 dubois.1059.f3: "当你继续观察美国毒蜥在沙漠般的栖息地中活动时，注意到它小心翼翼地攀爬岩石并检查缝隙。它谨慎的步伐和对环境的细致探索引起了你的浓厚兴趣。为了解这种行为的原因，你再次向动物管理员询问。\n“美国毒蜥是夜行性动物，”动物管理员说道，“它们白天大多躲藏在洞穴或岩石下，以避开炽热的高温。等到夜晚，它们才会外出活动，凭借敏锐的嗅觉寻找猎物，或是寻找一个安全的地方休息。它们孤独而隐秘的生活方式，使它们能够在最严酷的环境中顽强生存。”"
