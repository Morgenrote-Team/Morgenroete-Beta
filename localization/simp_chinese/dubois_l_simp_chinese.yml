 dubois.108.t: "美国毒蜥"
 dubois.108.d: "我们的动物园增添了一种新的珍稀动物：今天，期待已久的#O 美国毒蜥#!搬进了新的展区。"
 dubois.108.f: "美国毒蜥是一种毒蜥，原产于美国西南部和墨西哥西北部。它身上有独特的黑色和橙色斑纹，是世界上为数不多的毒蜥蜴之一，美国毒蜥行动缓慢，主要在夜间活动，以小型哺乳动物、鸟类和蛋为食。它们在尾巴中储存脂肪，使它们能够在长时间没有食物的情况下生存。"
 dubois.108.g: "这看起来真危险……"
 visit_gila_tt: "你将参观#o 美国毒蜥#!展区"
