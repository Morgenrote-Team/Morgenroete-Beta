 dubois.2171.t: "一般骨架展区"
 dubois.2171.d: "参观哪组骨架？"
 dubois.2171.f: "一些骨骼可以在世界各地找到。它们大多数是海洋类恐龙或其他海洋生物。"
 dubois.2171.g: "沧龙。"
 dubois.2172.t: "沧龙"
 dubois.2172.f: "沧龙实际上并非恐龙，而是一种海洋爬行动物。它们生活在白垩纪的海洋中。沧龙有许多不同的种类，适应不同的环境。它们中的许多都是顶级捕食者，捕食鱼类、鲨鱼以及其他恐龙和海洋爬行动物。"
