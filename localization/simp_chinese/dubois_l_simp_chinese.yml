 dubois.1012.t: "河马展区"
 dubois.1012.d: "#o 河马#!展区豢养着一群庞然大物，幸好他们与游客之间有一条壕沟。"
 dubois.1012.f1: "展区里的河马漂浮在水面上一动不动。你还在想它们在做什么的时候，一位动物园管理员出现在你身边。\n\n“有趣的是河马白天通常只是漂浮在水面上。但黄昏过后，它们变得非常活跃，开始觅食。如果你知道河马的自然栖息地有多热，就会明白为什么。水在白天能给它们降温，到了傍晚和晚上，它们终于可以开始四处游荡了”"
 dubois.1012.f2: "突然，一只河马从水里窜了出来。虽然你在展区里里观察了好几分钟，但你还没见过这只河马。它一定在水里待了很久。\n\n你旁边一个人开始说道：“是不是很有趣？河马可以在水下待五分钟。当它们潜入水中时鼻孔和耳朵都是紧闭的，所以水无法进入。”"
 dubois.1012.f3: "其中一只河马张开大嘴，露出又长又弯的牙齿。然后，它开始哼哼唧唧，溅起水花。\n\n你曾经读到过，雄性河马这样做是为了警告对手，因为它们非常看重自己的领地。雄性河马还用粪便来标记领地中的特定地点。有时，它们甚至会瞪着其他雄性河马，宣示自己的统治。"
 dubois.1012.k: "回到非洲展区"
 zoo_african_enclosures_tt: "您将回到动物园的非洲展区"
 dubois.1013.t: "非洲狮展区"
 dubois.1013.d: "#o 狮子#!展区内有一棵树用于遮阳，还有一个供狮群饮水的小池塘。"
 dubois.1013.f1: "这位成熟的雄性躺在家族之中，展示着浓密的深色鬃毛——这一装饰随着年龄与活力而愈发丰盈。博物学家认为鬃毛具有双重功能：其一作为性选择工具，彰显持有者的健康与地位；其二作为防御颈环，在与竞争对手搏斗时保护咽喉与颈部。在气候较凉的地区，尤其是远离非洲的动物园中，鬃毛往往生长得更为修长浓密，有时长度超过16厘米，这种现象很可能与温度和体质相关。"
 dubois.1013.f2: "非洲狮群居生活，形成以血缘雌狮及其幼崽为核心的群体，通常由一至数只临时驻留的雄狮统领。雌狮终身不离出生地，承担主要觅食与狩猎职责，其协作捕猎策略对大型有蹄类动物尤为有效。雄狮则负责守卫狮群及领地，当成功猎获大型猎物时，成年雄狮单次可吞食多达40公斤鲜肉。"
 dubois.1013.f3: "狮子那被细心的游客频频提及的规律踱步，恰似哨兵的巡逻步调，映射出这种动物与生俱来的习性——巡视领地边界、侦察气味踪迹、在晨昏时分保持警戒。在野外，它们通过咆哮、用尿液和腺体分泌物标记气味，以及有意识地巡查熟悉路径和地标来维护领地；而在圈养环境中，这些祖传的本能则表现为对围栏区域进行井然有序的循环巡视。"
 dubois.1013.f4: "[SCOPE.sCharacter('dubois_prinz_eugen').GetFullName]每天都会去动物园看围栏里的老狮子。这位老兵觉得自己与这只动物有着深厚的感情。两者似乎都是往昔光辉荣耀的见证者。动物园的游客们都说，这只特殊的动物和这个人之间有一种羁绊。\n\n但终于，狮子有三天没有见到他的主人了，它拒绝吃任何东西，在围栏里不安地上下踱步。凌晨三点左右，它发出一声怒吼，饲养员跑到围栏外面察看。与此同时，它听到了教堂里的丧钟响起，知道它的主人，伟大的 [SCOPE.sCharacter('dubois_prinz_eugen').GetLastName]将军就在那个时候去世了。即使是最坚强的士兵也会为之动容。"
 dubois.1014.t: "非洲象展区"
 dubois.1014.d: "非洲象在广阔的区域里四处游荡。它们是动物园最具吸引力的动物，总是有很多人前来观看。"
 dubois.1014.f1: "你观察大象已经有一段时间了。其中一头大象向您招了招手。这是一头巨大的母象，长着长长的象牙。它有时似乎会领头，其他大象似乎也很尊敬它。\n\n“我发现你找到了大象的族长！”，你甚至没有注意到旁边站着一位动物园管理员，“这些雄伟的动物生活在被称为象群的紧密家庭单位中。在象群中，你经常会看到一位女族长，她是一位智慧而经验丰富的女性，领导并保护着整个象群。在家庭中，大象有着牢固的社会纽带。它们甚至会为失去同伴而哀悼。幸运的是，我们已经很多年没有大象死亡了！”"
 dubois.1014.f2: "其中一只大象在鸣叫。这声音听起来非常响亮，甚至可能在几百米外都能听到。\n\n这让你想起曾经读过的一篇关于大象的文章：“非洲大象拥有惊人的远距离沟通能力。它们通过各种发声方式，如喇叭声、隆隆声和吼叫声，向象群中的其他成员传递信息，无论是发出危险警告，还是号召它们重新集结。”"
 dubois.1014.f3: "那非凡的长鼻——融合了鼻子与上唇——堪称肌肉构造的奇迹，据说由数万条肌纤维组成，能完成最精细的操作。象牙实际上是不断生长的门齿延长体，在挖掘、剥树皮及自卫时用途广泛。大象对地点与个体具有长期记忆能力，能准确回忆起多年前造访过的水坑，即使相隔漫长岁月，仍能通过气味与外形辨识特定个体。"
 dubois.1015.t: "长颈鹿展区"
 dubois.1015.d: "#o 长颈鹿#!从远处就能看到，它们高昂的头颅在较高的树枝间觅食，这正是大自然的本意。"
 dubois.1015.f1: "长颈鹿的舌头呈淡蓝色，长度近半肘，这种精妙的构造使其能够灵巧地卷食带刺枝条——这些荆棘会伤害其他适应性较差的动物。通过精准的抓取动作，它能剥下金合欢树的叶片而不被尖刺所伤，每日可摄取近三十公斤的枝叶。事实上，这种特化的进食方式为长颈鹿提供了充足养分，使其几乎无需低头饮水。"
 dubois.1015.f2: "雄性长颈鹿在争夺地位时，会进行一种奇特的“颈部击打”行为——像钟摆般甩动头部撞击对手侧腹。经年累月，它们颅顶的角状突起（骨锥）会变得愈发粗大，尖端常因磨损而裸露，这正是年龄与地位的象征。长颈鹿通常结成松散的群体，随着它们在草原上迁徙，群体成员不断更迭，不过带着幼崽的雌鹿往往会结伴同行。"
 dubois.1015.f3: "这件外套，由浅色底上的斑块拼缀而成，既能在斑驳的光线中提供伪装，又据信通过每块斑块下方丰富的血管网络调节体温。长颈鹿那颗巨大的心脏和强健的动脉支撑着它高昂的头颅对抗重力；然而这生物却以与其体型负担不符的优雅姿态移动着。"
 dubois.1016.t: "黑脚企鹅展区"
 dubois.1016.d: "一些#o 非洲企鹅#!在水中嬉戏，而另一些则成群结队地站在岸边，梳理着它们漂亮的羽毛。"
 dubois.1016.f1: "这种名为非洲企鹅的物种因其嘶鸣声被称为“公驴企鹅”，栖息于非洲南部温带海岸，尤其是纳米比亚和开普地区。与南极的近亲不同，它们在较温和的海域繁衍生息，其黑白相间的羽色能有效抵御来自水面和水下的天敌。它们主要以小型鱼类和头足类动物为食，在水下展现出惊人的敏捷捕食能力。"
 dubois.1016.f2: "非洲企鹅通常会在古老的鸟粪沉积层中挖掘洞穴，用于产卵和抚育幼崽，父母双方轮流承担孵化和觅食的职责。每窝通常产下两枚卵。在人类清除鸟粪的地区，适宜的筑巢环境随之减少；我们期待通过科学管理最终能修复这种生态损害。"
 dubois.1016.f3: "它们的羽毛异常浓密且富含油脂，既保暖又防水。在水中，这些鸟类能游出惊人的速度，并通过僵硬的鳍状肢和尾巴实现令人赞叹的精准转向。在陆地上它们喜欢群居，通过一系列叫声交流，每种声音都能在嘈杂的栖息地中被同伴清晰辨识。"
 dubois.1017.t: "裸鼹鼠展区"
 dubois.1017.d: "作为一种主要生活在地下的动物，裸鼹鼠的展区基本只是一堆泥土。但通过巧妙地使用玻璃，人们可以实际观察到住所中的小动物。"
 dubois.1017.f1: "裸鼹鼠因其无毛皮肤、体温随环境变化的习性以及对稀薄空气的惊人耐受性，在哺乳动物中独树一帜——这些特质使其完美适应深埋地下的恶臭隧道生活。其巨大的门齿能在闭合的嘴唇前活动，犹如挖掘用的镐头；嘴唇则紧贴牙齿后方闭合，有效阻隔尘土。这种外形不起眼却极度勤勉的生物，以不知疲倦的热情开凿出绵长的通道与宽敞的储藏室。"
 dubois.1017.f2: "裸鼹鼠是高度社会化的动物，它们生活在具有复杂社会结构的群体中，类似于蜜蜂或蚂蚁。群体中有一个正在繁殖的雌性，被称为女王，负责生育大多数幼崽。其余的种群由非繁殖个体（称为工人）组成，他们负责挖掘隧道、觅食和照顾幼崽等任务。"
 dubois.1017.f3: "在它们温暖的栖息地中，这些动物们紧挨在一起，通过频繁的梳理来交换体温和亲昵。它们的声音虽小却变化多端，维系着群体成员间的亲密关系。这种小兽被记录到拥有异常长寿的特性，并对某些疾病表现出显著的抵抗力，这引起了医生和动物学家的共同兴趣。"
 dubois.1018.t: "斑马展区"
 dubois.1018.d: "斑马展区相当平坦，长满了青草，里面有一些孤零零的树可以遮荫。它看起来有点像非洲。"
 dubois.1018.f1: "斑马不仅以其独特的黑白条纹而闻名，还以其迷人的行为和社会动态而为人所知，这些条纹起到了一种伪装的作用，帮助它们融入草原并迷惑捕食者。斑马是高度社会化的动物，通常以被称为“后宫”的家庭群体出现。它们的合作行为，例如梳理毛发和预警，有助于安全并增进团体的福祉。"
 dubois.1018.f2: "斑马的行为通常涉及令人着迷的统治和交流表现，雄性斑马通过各种行为在群体中建立自己的等级制度，例如发声、摆出姿势和身体互动。它们也有独特的相互交流方式，包括嘶叫声和高音调的呜呜声。这些行为维持了斑马后宫的社会秩序。”"
 dubois.1018.f3: "斑马驹充满活力的行为确实令人着迷，马驹以其顽皮为特点，这对于发展具有重要意义。玩耍可以让它们练习身体技能，发展社会联系，并从与群体中成年斑马的互动中学习。通过这些顽皮的行为，马驹逐渐获得它们所需的技能并在野外茁壮成长。”"
