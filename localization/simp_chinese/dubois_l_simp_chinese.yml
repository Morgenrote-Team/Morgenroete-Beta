 dubois.1062.t: "褐喉树懒展区"
 dubois.1062.d: "#o 褐喉树懒#!展区里郁郁葱葱的绿植非常适合这种慢吞吞的动物。这里有很多树，它们可以挂在上面。"
 dubois.1062.f1: "在动物园充满郁郁葱葱植被的栖息地中，一只缓慢移动、讨人喜欢的生物，褐喉树懒，轻松地贴在一根树枝上，其慢吞吞的动作和温和的性格吸引了游客的注意。被它独特的适应性所吸引，您走近一位知识丰富的动物园管理员，怀着想要更多了解这种迷人的树栖哺乳动物的渴望。\n\n“褐喉树懒是慢节奏生活的高手，”动物园管理员开始解释道。“这些卓越的生物进化出了适应中美洲和南美洲雨林树冠生活的能力。通过它们的长而弯曲的爪子和特殊适应的肌肉，树懒非常适合颠倒地悬挂生活。它们悠闲的动作和缓慢的新陈代谢有助于节省能量，并使它们能够以主要由叶子组成的饮食生存下去。”"
 dubois.1062.f2: "在动物园宁静的树冠栖息地中，一只褐喉树懒悠闲地穿行于树冠之间，其蓬松的毛发和睁大的眼睛表情传达出一种宁静感。被它的生活方式所吸引，您走近一位知识丰富的动物园管理员，希望能更多地了解这些迷人的哺乳动物的有趣行为。\n\n“褐喉树懒以其独特的适应性和迷人的行为而闻名，”动物园管理员解释道。“它们在树上度过了大部分的时光，经常保持静止，融入周围的环境。树懒有一套专门的消化系统，用于消化它们吃下的坚硬纤维状的叶子，可能需要数天。它们的毛发上还附着着藻类，这有助于为它们提供伪装并获得额外的营养。”"
 dubois.1062.f3: "在树懒栖息地的郁郁葱葱的绿地中，一只褐喉树懒倒挂在树枝上，似乎对动物园的繁忙活动毫不在意。被它看似轻松的性格所吸引，您走近一位知识丰富的动物园管理员，希望能理解其缓慢的生活方式的意义。\n\n“褐喉树懒的缓慢生活方式真是令人称奇，”动物园管理员分享道。“它们悠闲的动作不仅能节省能量，还能为它们提供一定程度的防护，使其免受捕食者的侵害。通过大部分时间倒挂在上面，它们最大程度地减少了自己的可见性，并依靠其特殊的毛发与周围的树叶融为一体。这是一个引人入胜的适应，展示了树懒在树冠栖息地中生存的独特策略。”"
 dubois.1062.k: "返回南美洲展区"
 zoo_south_american_enclosures_tt: "你将返回动物园的南美洲展区。"
 dubois.1063.t: "美洲豹展区"
 dubois.1063.d: "雨林般的展区是#o 美洲豹#!的领地。这里长满了绿色的灌木、树木和植被，是美洲豹藏身的绝佳地点。"
 dubois.1063.f1: "在动物园的沉浸式丛林主题栖息地中，一只强大而难以捉摸的生物，即美洲豹，正在向着某个目标潜行，其光滑而肌肉发达的身躯与葱茏的环境完美融合。被其作为捕食能手的声誉所吸引，你走近一位知识丰富的动物园管理员，渴望了解更多关于这种标志性的大猫。\n\n“美洲豹以其独特的花斑图案和强壮的体型，是丛林的主人，”动物园管理员开始说道。“它们的强大下颌和锋利的爪子使其成为顶级捕食者，能够捕食各种猎物，包括大型哺乳动物、爬行动物和鱼类。美洲豹以其隐秘的捕猎技巧而闻名，常常通过迅速而精确的攻击伏击猎物。它们在生态系统中的存在有助于调节猎物种群，维持丛林的微妙平衡。”"
 dubois.1063.f2: "在动物园的迷人美洲豹栖息地中，一只光滑而敏捷的美洲豹优雅地爬上一棵树，展示出其非凡的树栖能力。它肌肉发达的四肢和敏锐的视力吸引着游客的注意。被其攀爬技能所吸引，您寻找一位知识渊博的动物园管理员，希望了解更多关于这种神秘的猫科动物的生活。\n\n“美洲豹以其非凡的攀爬技能而闻名，这使其与其他大猫不同，”动物园管理员解释道。“它们有着强大的四肢和可收缩的爪子，使其能够精确地在树上行走。美洲豹经常使用树枝作为观察点，以便监视周围的环境，或者在成功捕猎后稍事休息。它们能够攀爬穿越森林里的树冠，这证明了它们作为熟练捕食者的多才多艺。”"
 dubois.1063.f3: "在美洲豹的蓊郁植被展区中，一只强壮的雄性美洲豹发出低沉共鸣的咆哮，回荡在空中，展示着其力量和领地性。被其声音所吸引，你走近一位知识丰富的动物园管理员，希望能够理解这些声音的意义。\n\n“美洲豹的叫声有多种用途，”动物园管理员分享道，“它们深沉的咆哮是一种建立存在感和保卫领地的方式。这些叫声还在与潜在伴侣之间的交流中发挥作用，尤其是在繁殖季节。美洲豹拥有多样的叫声，包括咆哮、吼叫和呼哧声。通过聆听这些独特的叫声，研究人员可以获得对这些威武猫科动物行为和社会动态的宝贵洞察。”"
 dubois.1064.t: "大食蚁兽展区"
 dubois.1064.d: "#o 大食蚁兽#!的展区里有许多巨大的红色蚁丘，在青草当中显得格外醒目。在那里，大食蚁兽可以轻松地享用小昆虫。"
 dubois.1064.f1: "在动物园引人入胜的栖息地中，一种独特且迷人的生物：大食蚁兽，在其独特的长吻和蓬松尾巴的陪衬下漫游，引起了游客们的关注。对其特殊适应性感到好奇，你走近一位知识渊博的动物园管理员，渴望更多地了解这种有趣的昆虫食肉哺乳动物。\n\n“大食蚁兽是捕食昆虫的专家，”动物园管理员开始说道。“凭借其长吻、黏性舌头和锋利的爪子，它完全适应了专门的饮食。食蚁兽每天会用其引人注目的舌头消耗数千只蚂蚁和白蚁，其舌头可伸展长达两英尺。它们敏锐的嗅觉帮助它们找到昆虫的栖息地，而其锋利的爪子则使其能够轻松地撕开白蚁丘。”"
 dubois.1064.f2: "在动物园引人入胜的食蚁兽栖息地中，一只大食蚁兽漫步在栖息地中，其独特的黑白斑纹的皮毛与透过树木的斑驳阳光相融合。对其独特的外观感到好奇，你寻找一位知识渊博的动物园管理员，希望更多地了解这种富有魅力的哺乳动物的迷人生活方式。\n\n“大食蚁兽是一种具有迷人行为的动物，”动物园管理员解释道。“它们主要是独居动物，花费时间觅食昆虫，并在树洞或洞穴中休息。这些食蚁兽具有较慢的新陈代谢和较低的体温，使其能够节约能量。它们还是出色的游泳者，可以轻松地利用其浮力较大的身体和作为浮潜管的长吻穿越水域。”"
 dubois.1064.f3: "在食蚁兽栖息地的茂密环境中，一只大食蚁兽利用其强大的爪子撕开一个白蚁丘，舌头快速地伸出并缩回，捕捉着微小的昆虫。对其觅食技巧感到好奇，你寻找一位知识渊博的动物园管理员，希望理解其行为的意义。\n\n“大食蚁兽的觅食行为真是令人惊叹，”动物园管理员分享道。“它们拥有一种专门的进食技巧，包括使用锋利的爪子打开蚂蚁和白蚁丘。食蚁兽的舌头每分钟可以快速伸出和缩回多达160次，以卓越的精准度捕捉昆虫。这种觅食行为有助于调节昆虫种群数量，对生态系统起着至关重要的作用。”"
 dubois.1065.t: "九带犰狳展区"
 dubois.1065.d: "#o 九带犰狳#!在多种栖息地繁衍生息，从温暖潮湿的地区到灌木丛、草原和热带雨林。动物园混合了这些栖息地以建造展区。"
 dubois.1065.f1: "在动物园的迷人展区内，一只身披装甲的好奇生物，也就是九带犰狳，在其中快速穿梭，它分段的外壳和独特的吻部引起了游客的注意。受到其独特适应能力的吸引，你走向一位知识渊博的动物园管理员，渴望更多地了解这种有趣的哺乳动物。\n\n“九带犰狳是防御和适应的大师，”动物园管理员开始介绍。“那引人注目的像盔甲一样的壳由骨质板块构成，提供了免受捕食者侵害的保护。在受到威胁时，它们有能力卷成一团，露出装甲，使它几乎没有什么潜在威胁。它们强大的爪子非常适合挖掘和觅食偏爱的昆虫，如蚂蚁和白蚁。”"
 dubois.1065.f2: "在动物园迷人的犰狳栖息地里，一只九带犰狳利用其敏锐的嗅觉嗅出埋藏在地下的昆虫，其独特的吻部在地面上搜索食物。对其觅食行为感到好奇，你找到了一位知识渊博的动物园管理员，希望揭示更多关于这种装甲哺乳动物迷人的生活方式。\n\n“九带犰狳是非常有趣的生物，具有出色的觅食技能，”动物园管理员解释道。“它们高度依赖嗅觉来寻找土壤中的昆虫。借助其锋利的爪子和强大的前肢，犰狳轻松地挖掘地面，暴露出它们的猎物。它们有一种专门的舌头，可以深入到蚂蚁和白蚁的隧道中，使它们能够精准地提取出最喜欢的小吃。”"
 dubois.1065.f3: "在犰狳栖息地的沙质地表上，一只九带犰狳蹦蹦跳跳，留下一串浅浅的洞，寻找下一顿饭。对其挖掘行为感到好奇，你找到了一位知识渊博的动物园管理员，希望理解其行为的意义。\n\n“挖掘是九带犰狳的重要行为，”动物园管理员分享道。“它们挖掘浅浅的洞，被称为‘躲避洞’，在那里它们可以躲避极端温度和潜在的威胁。这些洞还为犰狳提供了一个安全的地方，让它们休息，并在那里产仔。犰狳挖掘和创造这些洞的能力展示了它们适应各种环境的能力。”"
 dubois.1066.t: "安第斯神鹫鸟舍"
 dubois.1066.d: "为了模仿安第斯山脉，#o 安第斯神鹫#!的鸟舍遍布岩石，建立在山坡与悬崖之上。"
 dubois.1066.f1: "在动物园广阔的鸟类园区中，一只威严且令人敬畏的生物——安第斯神鹫，展翅飞翔，其巨大的体型和引人注目的外貌吸引着游客的注意。被它的壮丽所吸引，你走近一位知识渊博的动物园管理员，渴望了解更多关于这种安第斯山区的标志性鸟类。\n\n“安第斯神鹫是力量和自由的象征，”动物园管理员开始说道。“它拥有长达三米的庞大翼展，是世界上最大的飞行鸟类之一。这些壮丽的鸟类以其优雅的飞行方式以及轻松滑翔于安第斯山脉而闻名。它们具有独特的能力，可以乘风而上，使其能够在搜寻食物时穿越广阔的距离。”"
 dubois.1066.f2: "在动物园迷人的鸟类园区中，一只安第斯神鹫栖息在岩石悬崖上，阳光下它的羽毛闪烁着，用敏锐的视力观察周围的环境。被它令人印象深刻的视力所吸引，你寻找一位知识渊博的动物园管理员，希望揭示更多关于这种威严鸟类的卓越能力。\n\n“安第斯神鹫具备令人难以置信的视力，”动物园管理员解释道。“敏锐的视力使得它们能够从高处发现潜在的食物来源，如腐肉或动物的尸体。它们在生态系统中扮演着重要的角色，像是自然的清洁队，通过食用腐肉来防止疾病传播。它们能够在广阔的距离上找到食物，这充分证明了它们令人难以置信的视觉敏锐度。”"
 dubois.1066.f3: "在神鹫展区的如画风景中，一只壮丽的雄性安第斯神鹫展示着令人惊叹的羽毛，展开翅膀，发出深沉的共鸣呼叫，声音在空中回荡。被它的行为所吸引，你寻找一位知识渊博的动物园管理员，希望理解这些展示行为的意义。\n\n动物园管理员分享道：“安第斯神鹫的展示行为具有多重目的。它们用于沟通和求偶仪式。雄性神鹫进行复杂的展示来吸引雌性，其中包括展开翅膀，蓬松羽毛，并发出深沉的声音。这些行为展示了它们的力量、活力和作为潜在伴侣的称职。目睹这些展示是一种非凡的体验，也是这些壮丽鸟类求偶仪式的证据。”"
 dubois.1067.t: "西印度海牛展区"
 dubois.1067.d: "西印度海牛拥有一个可以游泳的大水池，还有一些可以躺下的沙滩。"
 dubois.1067.f1: "在动物园宁静的水生栖息地里，一种被称为西印度海牛的温柔而雄伟的生物在水中滑行，其庞大的体型和平静的神态吸引着游客的注意力。你对其平和的存在感到好奇，并找到了一位知识渊博的动物园管理员，渴望更多地了解这种标志性的海洋哺乳动物。\n\n“西印度海牛是优雅和脆弱的象征，”动物园管理员开始说道。“这些温和的巨型动物生活在温暖的沿海水域和流速缓慢的河流中。尽管体型巨大，但它们是草食动物，主要以水生植物为食。它们缓慢的新陈代谢和温水栖息地有助于它们保存能量。不幸的是，海牛受到栖息地丧失和船只碰撞的威胁。保护工作对于保护这些温和的生物至关重要。”"
 dubois.1067.f2: "在海牛保护区宁静的水域中，一头西印度海牛漂浮在水面附近，每次移动时，它的鳍都会轻轻地拍打水面。活泼的行为吸引了游客的注意力。你对它的游泳习惯很感兴趣，于是找到了一位知识渊博的动物园管理员，希望更多地了解这种非凡海洋哺乳动物的生活。\n\n“海牛有一种独特的漂浮能力，有助于它们的运动，”动物园管理员解释道。“它们又大又厚的身体和充满空气的肺部有助于自然浮力，使它们能够漂浮在水面附近。这种浮力帮助它们保存能量并毫不费力地滑过它们的水生栖息地。它们缓慢而从容的运动证明了它们适应水生环境的能力。” "
 dubois.1067.f3: "在海牛栖息地的宁静水域中，西印度海牛发出一系列柔和而富有旋律的叫声，在空气中产生共鸣，展示了它的存在和潜在的交流。你对它的叫声很感兴趣，于是找到一位知识渊博的动物园管理员，希望了解这些声音的意义。\n\n“海牛以其独特的声音而闻名，”动物园管理员分享道。“这些温柔的生物通过各种声音相互交流，包括叽喳声、口哨声和咔嗒声。这些声音交流在维持社会联系、在水下环境中定位彼此以及潜在地表明交配意图方面发挥着作用。海牛的发声提供了一睹这些海洋哺乳动物复杂的社会动态的机会。”"
 dubois.1068.t: "松鼠猴展区"
 dubois.1068.d: "松鼠猴展区里长满了树木和其他可以爬上去玩耍的东西，对猴子而言这是完美的场所。"
 dubois.1068.f1: "在充满活力的热带雨林主题动物园内，一群精力充沛、善于社交的松鼠猴在树林中敏捷地摇摆，它们迅捷的动作和俏皮的滑稽动作吸引着游客的注意力。你对它们活泼的行为很感兴趣，于是走近一位知识渊博的动物园管理员，渴望更多地了解这些迷人的灵长类动物。\n\n“观察松鼠猴真的很有趣，”动物园管理员开始说道。“这些小型灵长类动物以其无穷无尽的能量和紧密的社会群体而闻名。它们具有独特的特征，例如白色的面部花纹和浓密的尾巴。松鼠猴通过各种声音进行交流，从尖锐的警报声到舒缓的咕噜声。它们的合作行为与动态的社会互动使它们成为一个令人着迷的研究物种。”"
 dubois.1068.f2: "在猴子栖息地热闹的雨林环境中，松鼠猴精心地梳理同伴的毛发，它们的亲密互动和温柔的动作揭示了的社会纽带的强度。梳洗行为吸引了游客的注意力。你对它们的互动很感兴趣，于是找到一位知识渊博的动物园管理员，希望能更多地了解这些魅力十足的灵长类动物的生活。\n\n“梳理毛发是松鼠猴社交互动的一个重要方面，”动物园管理员解释道。“它有多种用途，从保持卫生、清除寄生虫到加强群体内部的社会联系。松鼠猴会互相梳理毛发甚至清洁彼此的脸。这些梳理行为加强了社会联系，有助于促进团体的凝聚。”"
 dubois.1068.f3: "在猴舍茂密的树叶中，一只顽皮的松鼠猴发出一系列高亢的叫声，在空气中回荡，显示出它的存在和交流。你对它的叫声很感兴趣，于是找到一位知识渊博的动物园管理员，希望了解这些声音的意义。\n\n“松鼠猴是一种善于发声的生物，”动物园管理员分享道。“它们的声音范围从响亮的警报声到柔和的咕咕声。这些声音交流帮助它们与群体中的其他成员进行交流，提醒它们潜在的危险或表明它们的意图。松鼠猴还使用肢体语言，例如梳理毛发和手势，以在动态的社会结构中传达信息。”"
 dubois.1101.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('dubois_zoo_baby_type')]在动物园诞生！"
 dubois.1101.d: "最近几天动物园的游客比平日多出很多，因为[SCOPE.GetRootScope.GetCountry.GetCustom('dubois_zoo_baby_type')]在动物园里诞生了。现在我们要给这只小动物取个名字。"
