 dubois.1042.t: "伊比利亚猞猁展区"
 dubois.1042.d: "要在这个展区里找到#o 伊比利亚猞猁#!并不容易。它在这片森林里有很多藏身之处。"
 dubois.1042.f1: "在动物园质朴的展区里，一种迷人的生物，被称为伊比利亚猞猁，以威严的姿态踱步，它的耳朵上的毛饰和强烈的凝视引起了游客们的注意。被它的稀有性和异国情调所吸引，您走近一位知识丰富的动物学家，渴望更多地了解这只非凡的猫科动物。\n\n“伊比利亚猞猁是一种极为罕见和迷人的物种，” 动物学家开始说道。“它们来自欧洲西南部的伊比利亚半岛，是一种充满神秘感的威严野猫。不幸的是，伊比利亚猞猁在野外面临许多挑战，包括栖息地丧失和其主要猎物欧洲兔数量的减少。作为我们使命的一部分，我们致力于保护这种壮丽的生物并提高人们对它困境的认识。”"
 dubois.1042.f2: "在动物园迷人的景观展区里，一只母伊比利亚猞猁引导她好奇的幼崽们穿越模拟的自然栖地，教授它们狩猎的技巧。它们惊人的琥珀色眼睛和光滑的皮毛唤起了敬畏和惊奇之感。被它们独特的家庭动态所吸引，您寻找一位知识丰富的动物园管理员，希望能够更多地了解这些神秘猫科动物的生活。\n\n“伊比利亚猞猁拥有迷人的母性本能和独特的家庭结构，” 动物园管理员解释道。“母猞猁在养育和指导幼崽方面发挥着重要作用。经过大约两个月的妊娠期后，她会生下一窝两到三只幼崽。她传授关键的狩猎技能，教导它们追踪和突袭猎物所需的技巧。在这个探索和发现的时代，目睹母猞猁和幼崽之间的纽带是一个非凡的景象。”"
 dubois.1042.f3: "在猞猁展区的宜人环境中，一只雄性伊比利亚猞猁发出一系列独特的叫声，它喉咙里深沉不休咆哮声和吸引了好奇旁观者的注意。被它们的声音所吸引，您走近一位知识丰富的动物园管理员，希望能够理解这些声音的意义。\n\n“伊比利亚猞猁通过一系列的声音来交流，这些声音对于它们的社会动态至关重要，” 动物园管理员分享道。“雄性利用深沉的咆哮声和喋喋不休的呼叫来显示他们的优势和建立领地边界，展示了他们的力量和能力。这些声音信号在猞猁种群内的互动和求偶仪式中发挥着重要作用。这是在这探索时代窥探这些非凡猫科动物的那引人入胜的世界的机会。”"
 dubois.1042.k: "回到欧洲展区"
 zoo_european_enclosures_tt: "你将回到动物园的欧洲展区。"
 dubois.1043.t: "欧亚狼展区"
 dubois.1043.d: "#o 欧亚狼#!的展区规模相当之大，里面有许多岩石、乔木与灌木。狼经常出现在参观者面前，但有时也很隐蔽。"
 dubois.1043.f1: "在宽敞的狼展区里，一只威严的狼，以野性的优雅在其中漫步，它的锐利凝视和光滑的皮毛吸引着游客们的想象。被它未驯服的本性所吸引，您走近一位知识丰富的动物学家，渴望更多地了解这个标志性的捕食者。\n\n“狼，这个神话与现实并存的生物，是野性荒原的象征，” 动物学家开始说道。“它们分布在世界各地的不同栖地，这些威严的犬科动物已经惊人地适应了各种生态系统。凭借其锐利的牙齿、强大的肌肉和敏锐的感觉，狼是高超的猎手，能够击败比它们大得多的猎物。”"
 dubois.1043.f2: "在迷人的动物园里，一群狼如同一只狼般一起行动，它们协调的动作与和谐的嚎叫在空中回荡。这一景象唤起了对自然野性之美的敬畏和尊重。被它们的社会动力所吸引，你寻找一位知识丰富的动物园管理员，希望能够更多地了解狼的迷人生活。\n\n“狼是高度社会性的动物，生活在紧密结合的群体中，有着明确的等级制度，” 动物园管理员解释道。“在一个群体中，每个成员都有特定的角色，从占主导地位的阿尔法伴侣到次级成员。它们通过一系列的声音交流，包括嚎叫、吠叫和咆哮，用来协调狩猎、标记领地并加强社会纽带。”"
 dubois.1043.f3: "在风景如画的动物园里，一只孤独的狼在围栏里不断踱步，它锐利的凝视既映照出孤独，又流露出坚强。被它神秘的本性所吸引，你走近一位知识丰富的动物园管理员，希望能够理解它这种行为的意义。\n\n“一些狼独居的个性是它们行为中引人入胜的方面，” 动物园管理员分享道。“某些情况下，狼可能会选择独自漫游和狩猎，通常是为了寻找新的领地或者到达了离群的年龄。这种孤独的存在使它们能够漫游广阔的距离并探索新环境。然而，即使是独狼也会与它们的群体保持社会关联，因为它们的本能驱使它们寻求陪伴或是建立新的联系。”"
 dubois.1043.f4: "今天，动物园里出现了一幕奇异的景象。著名作曲家谢尔盖·普罗科菲耶夫来到围栏边上散心。他看到一只狼时惊讶地站立了很久。两者彼此对视；普罗科菲耶夫以一种固定的、近乎惊讶的眼神看着这只动物。狼也回过头来，惊讶的神情丝毫不减。人们只能猜测大师的内心在想些什么，但在场的人都相信，他从这一刻中获得了灵感。"
 dubois.1044.t: "狗獾展区"
 dubois.1044.d: "展区里到处都是小山、灌木丛和树木，简直就是#o 狗獾#!的天堂。尤其是灌木丛中的浆果和野果，它们是獾的膳食计划中受欢迎的代餐。"
 dubois.1044.f1: "在宁静的动物园林地展区里，一种名叫狗獾的坚韧生物在夜间活动，它粗壮的身体和独特的黑白脸部斑纹为其存在增添了一丝魅力。被它神秘的本性所吸引，你走近一位知识丰富的动物园管理员，渴望更多地了解这种神秘的鼬科动物。\n\n“狗獾是林地的迷人居民，” 动物园管理员开始说道。“它们拥有结实的体型和强大的爪子，善于挖掘被称为巢穴的复杂系统。这些地下网络为獾提供了庇护与交流的安全场所。它们还以在巢穴外建造厕所的独特行为而闻名，有助于标记领地和交流。”"
 dubois.1044.f2: "在宁静的动物园围栏里，一群狗獾从它们的地下住处中走了出来，它们光滑的皮毛和低伏的强壮身体与其自然栖息地的土褐色调相融合。被它们的社会动态所吸引，您寻找一位知识丰富的博物学家，希望能够更多地了解这些夜行性哺乳动物迷人的生活。\n\n“狗獾是一种高度社会性的动物，生活在称为氏族的紧密群体中，” 博物学家解释道。“这些氏族通常由有血缘关系的个体组成，它们表现出合作行为，如互相梳理或共同抚养幼崽。獾通过各种声音交流，包括咆哮、吠叫和咕噜声，每种声音在它们的社会结构中都是独特的表达形式。”"
 dubois.1044.f3: "在林地展区的斑驳阴影中，一只狗獾穿过灌木丛，敏锐的嗅觉引导它寻找蚯蚓和其他小型猎物。被它的觅食习性所吸引，你走近一位知识丰富的动物园管理员，希望能够理解这些生物的生态角色。\n\n“狗獾在林地生态系统中扮演着重要的角色，” 动物园管理员分享道。“它们杂食性的饮食包括蚯蚓、昆虫、小型哺乳动物、水果和根茎，有助于调节物种的种群数量，并促进养分循环。它们的挖洞活动还能够为土壤通风，促进植物生长并增强土壤肥力。作为生态系统的工程师，獾对环境的整体健康和生物多样性产生积极影响。”"
 dubois.1045.t: "白鼬展区"
 dubois.1045.d: "对于#o 白鼬#!来说，一个多样化的展区是理想之选。里面有小片的草地、灌木丛和一些树木。一些老树已经枯死，但为小动物提供了一个很好的藏身之处。"
 dubois.1045.f1: "在动物园生机勃勃的展区里，一只活泼而敏捷的生物，白鼬，以惊人的速度优雅地穿梭，它光滑的身体和短腿使它能够在最复杂的空间中穿行。被它充满活力的本性所吸引，您走近一位知识丰富的动物园管理员，渴望更多地了解这种迷人的鼬科动物。\n\n“白鼬，也被称为短尾鼬，是一种小而可怕的捕食者，” 动物园管理员开始说道。“凭借其纤细的身体、敏锐的感觉和迅捷的反应，白鼬是技艺高超的猎手。它们具有令人印象深刻的改变毛色的能力，其毛发在夏季呈褐色，在冬季则变为纯白，使它们能够与周围环境融为一体。”"
 dubois.1045.f2: "在动物园迷人的白鼬展区里，一对活泼的白鼬进行着一场令人兴奋的追逐游戏，它们迅捷的动作和调皮的把戏吸引了游客们的注意。被它们的嬉戏行为所吸引，你走近一位知识丰富的动物园管理员，希望能够更多地了解白鼬那迷人的生活。\n\n“白鼬以其活泼和好玩的本性而闻名，” 动物园管理员解释道。“它们是高度活跃且好奇的生物，经常参与追逐、跳跃和摔跤等嬉戏行为。这些活动有助于磨练它们的敏捷性和狩猎技能。白鼬还是熟练的攀爬者和游泳者，使他们成为探索周边环境的多面手。”"
 dubois.1045.f3: "在白鼬展区的自然栖息地中，一只白鼬穿梭于洞穴中，其纤细的身体灵活地扭动和转动，令人印象深刻。被它的敏捷所吸引，您走近一位知识丰富的动物园管理员，希望能够理解这种行为的意义。\n\n“白鼬以其敏捷和灵活性而闻名，” 动物园管理员分享道。“凭借其纤长的身体和强壮的后腿，它们可以轻松地在狭窄的隧道和狭小的空间中操纵。这种适应能力使它们能够追捕猎物，通常包括小型哺乳动物和鸟类。白鼬是真正令人着迷的生物，展示了它们的自然优雅和本领。”"
 dubois.1046.t: "欧亚水獭展区"
 dubois.1046.d: "#o 欧亚水獭#!展区的中心是一个大湖。它为水獭最喜欢的游泳活动提供了足够的空间。湖的周围是岩石和小块草地。"
 dubois.1046.f1: "在动物园风景如画的水生动物展区里，一只光滑而有趣的生物，被称为欧亚水獭，在如镜的水中滑行，纤细的身体和蹼足以轻松的优雅推动着它前进。被它的水生本领所吸引，你走近一位知识丰富的动物园管理员，渴望更多地了解这种迷人的哺乳动物。\n\n“欧亚水獭是适应水上生活的真正奇迹，” 动物园管理员开始说道。“凭借其流线型的身体、蹼足和浓密的皮毛，水獭非常适合在水中生活。它们将大部分时间都花在水中，潜水、游泳并捕猎鱼类、两栖动物和甲壳动物。奇特的本性和灵活的动作使它们成为令人愉悦的观赏对象。”"
 dubois.1046.f2: "在动物园宁静的河畔栖息地里，欧亚水獭一家欢快地在水边嬉戏，它们协调一致的动作和欢快的啁啾声在空中回荡。被它们的社会互动所吸引，你寻找一位知识丰富的动物园管理员，希望能够更多地了解这些善于社交的哺乳动物的迷人生活。\n\n“欧亚水獭是高度社交性的动物，通常会形成被称为‘巢穴’的家庭群体，”动物园管理员解释道。“这些家庭单位通常由一对生殖年龄的成年个体和它们的后代组成。它们会为彼此梳毛、玩游戏，甚至一起狩猎。水獭之间的紧密家庭纽带有助于它们在水域栖息地中的整体健康和成功。”"
 dubois.1046.f3: "在茂密的植被和蜿蜒的小溪中，欧亚水獭通过用爪子操纵一颗小石头展示了它卓越的灵巧性，这种行为被称为“杂耍”。被它的认知能力所吸引，你走近一位知识丰富的动物园管理员，希望能够理解这种有趣的行为的意义。\n\n“欧亚水獭是高智慧生物，” 动物园管理员分享道。“在水獭中，把石头玩耍起来是一种常见的行为，特别是在它们年幼的时候。这不仅是一种玩耍的形式，还有助于它们发展协调和灵巧性。水獭以其聪明的解决问题的能力以及利用工具（如石头）打开贝壳或破开猎物而闻名。智慧使它们更加可爱，成为动物园游客喜爱的对象。”"
 dubois.1047.t: "阿尔卑斯羱羊展区"
 dubois.1047.d: "羱羊的展区主要由天然和人造的岩石组成，这为羱羊提供了绝佳的攀爬机会。"
 dubois.1047.f1: "在动物园崎岖的高山主题展区内，一群坚韧而稳健的阿尔卑斯羱羊在岩石地形中精确导航，它们令人印象深刻的角和适应性强的外观吸引了游客的注意力。你对它们在充满挑战的环境中茁壮成长的能力很感兴趣，于是你找到了一位知识渊博的动物园管理员，渴望更多地了解这些非凡的山地居民。\n\n“阿尔卑斯羱羊是适应性和生存能力的证明，”动物园管理员开始说道。“这些脚步稳健的动物非常适合高山地区的生活。它们弯曲的角不仅引人注目，而且有多种用途，包括防御掠食者与在社会群体中建立统治地位。尽管它们的栖息地条件恶劣，但阿尔卑斯羱羊已经进化出独特的策略来寻找食物并在岩石地形中穿行。”"
 dubois.1047.f2: "在动物园的高山栖息地，两只雄性阿尔卑斯羱羊进行了激烈的头撞表演，它们令人印象深刻的角以巨大的力量相互冲击。他们的行为吸引了游客的注意。你对它们的互动很感兴趣，于是找到了一位知识渊博的动物园管理员，希望能更多地了解这些雄伟的山地居民的社会行为。\n\n“抵角是雄性阿尔卑斯羱羊的一种重要行为，”动物园管理员解释道。“在繁殖季节，雄性通过这些正面交锋来争夺接近雌性的机会。角的冲突决定了统治地位和获得配偶的机会。这些互动是群体内力量和社会等级制度的壮观展示。这些动作可能看起来具有攻击性，但它们在维持平衡和繁殖成功方面发挥着至关重要的作用。”"
 dubois.1047.f3: "在阿尔卑斯羱羊展区的岩石景观中，一群阿尔卑斯羱羊挤在一起，厚厚的皮毛保护它们免受高山环境的刺骨寒冷。你对它们挤在一起的行为很感兴趣，于是找到一位知识渊博的动物园管理员，希望了解它们行为的意义。\n\n“挤在一起是阿尔卑斯羱羊的常见行为，”动物园管理员分享道。“在寒冷和充满挑战的山区条件下，挤作一团可以提供温暖和保护。如此，阿尔卑斯羱羊可以保存体温并互相遮挡风雨。这种行为还加强了群体内的社会联系，有助于他们的合作在严酷的栖息地中生存。”"
 dubois.1048.t: "欧洲野牛展区"
 dubois.1048.d: "欧洲野牛围场是一片大草地，中间有一个小池塘。野牛在这里看上去很高兴。"
 dubois.1048.f1: "在动物园广阔的草原栖息地里，一种被称为欧洲野牛的强大而雄伟的动物正在安静地吃草，它巨大的体型和健壮的外表吸引着游客的注意力。你对它的存在很感兴趣，于是你找到了一位知识渊博的动物园管理员，他渴望更多地了解这头令人印象深刻的欧洲野牛。\n\n“欧洲野牛是力量和生存的象征，”动物园管理员开始说道。“这些巨大的动物曾经濒临灭绝，但由于保护工作，其数目已经取得了显著的恢复。欧洲野牛是欧洲最重的陆地动物，雄性重达一吨。它们在维持草原生态系统平衡方面发挥着至关重要的作用，通过进食习惯塑造植被。”"
 dubois.1048.f2: "在动物园宁静的草原环境中，一群欧洲野牛和谐地同步移动，它们协调的动作和社交互动吸引着游客的注意力。您对它们的行为很感兴趣，于是找到一位知识渊博的动物园管理员，希望更多地了解这些魅力十足的食草动物的生活。\n\n“欧洲野牛是高度群居的动物，在家庭群体中茁壮成长，”动物园管理员解释道。“它们会进行合作行为，例如梳理毛发和互相照看。这些食草动物主要以草、灌木和其他植被为食，利用它们强大的角和巨大的头部来清除积雪，并在冬季抵达它们喜欢的食物来源。欧洲野牛的活动和放牧习惯有助于其生态系统的健康。”"
 dubois.1048.f3: "在欧洲野牛栖息地的广阔草地中，一只占主导地位的雄性高举令人印象深刻的弯曲角，发出低沉、共鸣的吼叫，展示了他的权威和存在。你对他的声音很感兴趣，于是找到一位知识渊博的动物园管理员，希望了解这些声音的意义。\n\n“欧洲野牛的发声在其社会结构中具有多种用途，”动物园管理员分享道。“雄性利用它们的吼叫声来建立统治地位并维护自己的领地。这些声音交流也在与群体其他成员的沟通中发挥着作用，有助于协调动作和行为。欧洲野牛的共鸣吼叫证明了它们在栖息地中强大的存在。”"
 dubois.1051.t: "北美洲展区"
 dubois.1051.d: "尽管在听到北美洲时，你可能会想到加拿大茂密的森林，但北美大陆有许多不同的生物群落。北美洲展区展示了其中一些，包括茂密的森林和大草原以及热带地区。"
