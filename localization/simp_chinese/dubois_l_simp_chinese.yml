 dubois_catch_local_animal_decision_desc: "我们国家的栖息着许多可以在[concept_dubois_zoo]中展示的迷人物种。一位动物学者将在一年的时间里走遍全国，为动物园收集[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]。"
