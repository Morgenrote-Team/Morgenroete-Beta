 dubois_paleontological_research_modifier_desc: "这片土地上充满了探索的激情，每一块出土的化石都是通往失落世界的窗口，每一次挖掘都激荡着科学家与公众的想象力。追寻远古生命已成为全民热潮，既点燃学术研究热情，又激发了大众的好奇心。"
 dubois_paleontologist_travell_to_location_modifier_desc: "手持笔记本，怀揣着对史前巨兽的梦想，我们的古生物学家踏上了征途，无畏风雨，只为探寻岩石中封存的秘密。这段旅程既是科学的探索，也是一场冒险——一场与时间赛跑的竞赛，只为揭开地球遥远过去的遗迹。"
 dubois_paleontologist_travell_from_location_modifier_desc: "在野外度过了数月后，这位古生物学家归来，疲惫却满怀胜利的喜悦。背包里塞满了化石、草图以及发现的传奇故事。每一件发现都预示着将重写历史书籍，并激励新一代人。"
 notification_dubois_paleontological_report_notification_tooltip: "探险队发来了一份古生物学报告，其中包含惊人的化石发现。"
 notification_dubois_java_man_notification_tooltip: "教授的一份新古人类学报告表明发现了一种古老的人类祖先，暂定名为“爪哇猿人”。"
 notification_dubois_animal_breeding_notification_tooltip: "我们动物园的一只动物已在人工饲养环境下成功繁殖。这标志着我们对该物种的认识取得了突破性进展。"
