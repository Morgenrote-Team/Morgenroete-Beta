 dubois.1012.t: "河马展区"
 dubois.1012.d: "#o 河马#!展区豢养着一群庞然大物，幸好他们与游客之间有一条壕沟。"
 dubois.1012.f1: "展区里的河马漂浮在水面上一动不动。你还在想它们在做什么的时候，一位动物园管理员出现在你身边。\n\n“有趣的是河马白天通常只是漂浮在水面上。但黄昏过后，它们变得非常活跃，开始觅食。如果你知道河马的自然栖息地有多热，就会明白为什么。水在白天能给它们降温，到了傍晚和晚上，它们终于可以开始四处游荡了”"
 dubois.1012.f2: "突然，一只河马从水里窜了出来。虽然你在展区里里观察了好几分钟，但你还没见过这只河马。它一定在水里待了很久。\n\n你旁边一个人开始说道：“是不是很有趣？河马可以在水下待五分钟。当它们潜入水中时鼻孔和耳朵都是紧闭的，所以水无法进入。”"
 dubois.1012.f3: "其中一只河马张开大嘴，露出又长又弯的牙齿。然后，它开始哼哼唧唧，溅起水花。\n\n你曾经读到过，雄性河马这样做是为了警告对手，因为它们非常看重自己的领地。雄性河马还用粪便来标记领地中的特定地点。有时，它们甚至会瞪着其他雄性河马，宣示自己的统治。"
 dubois.1012.k: "回到非洲展区"
 zoo_african_enclosures_tt: "您将回到动物园的非洲展区"
 dubois.1013.t: "African Lion Enclosure"
 dubois.1013.d: "A pride of #o African Lions#! may be observed in this enclosure, furnished with shade-giving trees and a shallow pool, as befits the habits of the species."
 dubois.1013.f1: "Reclining amidst his family, the mature male displays a luxuriant mane of dark hue—an adornment which increases with age and vigor. Naturalists hold that the mane serves a double office: first, as an instrument of sexual selection, proclaiming the health and station of the bearer; and secondly, as a defensive ruff, affording some protection to the throat and neck in combat with rival males. In cooler climes, and particularly in menageries far from Africa, the mane tends to grow longer and fuller, sometimes attaining lengths of more than 16 cm, a circumstance likely connected to temperature and constitution."
 dubois.1013.f2: "African Lions dwell in social communities termed prides, typically composed of related females and their offspring, with one or more adult males in temporary tenure. The females, remaining philopatric, undertake most of the foraging and hunts; their cooperative endeavors yield notable success against large ungulates. Males, for their part, defend the pride and its range, and when they do bring down great prey, an adult may consume upwards of 40 kilograms of flesh in a single repast."
 dubois.1013.f3: "The lion’s measured pacing—so often remarked by the attentive visitor—may be likened to a sentinel’s perambulation, for it reflects the animal’s native inclination to patrol boundaries, to reconnoitre scents, and to keep watch in the crepuscular hours. In the wild, territory is maintained by roaring, scent–marking with urine and glandular secretions, and the deliberate inspection of familiar paths and landmarks; in confinement, these ancestral impulses disclose themselves in orderly circuits of the enclosure."
 dubois.1013.f4: "At the zoo, [SCOPE.sCharacter('dubois_prinz_eugen').GetFullName] was long observed to visit the aged lion each day, as though veteran and beast recognized in one another a history of trials and triumphs. When, for three days, the man no longer appeared, the creature refused sustenance and paced in evident disquiet. At the third hour of the morning the lion gave forth a tremendous roar; in that instant, the chapel bell tolled the passing of the great General [SCOPE.sCharacter('dubois_prinz_eugen').GetLastName]. Such concordances, though not to be construed as scientific proof, nevertheless move even the most martial breast."
 dubois.1014.t: "African Bush Elephant Enclosure"
 dubois.1014.d: "In this broad paddock the #o African Bush Elephants#! take their ease. Their size and sagacity render them among the foremost attractions of the Gardens."
 dubois.1014.f1: "Behold the matriarch—most experienced of her kin—about whom the herd is ordered. Elephant society is distinctly matrilineal: adult females remain together with their daughters and sisters, directing movements to water and forage, and displaying conspicuous solicitude toward calves and kin. Naturalists have recorded instances suggestive of mourning and remembrance at the loss of companions, a testimony to the animal’s uncommon memory and social feeling."
 dubois.1014.f2: "The trumpet, so stirring to the ear, is but one voice in the elephant’s wide vocabulary. Besides these sonorous blasts and guttural rumbles, the species utters infrasounds beneath the threshold of human hearing, which travel over great distances through air and ground alike. By such means do herds coordinate their marches, summon assistance, and announce their presence upon the savannah."
 dubois.1014.f3: "The prodigious proboscis—uniting nose and upper lip—is a marvel of muscular contrivance, consisting, it is said, of many tens of thousands of fibres and capable of the most delicate manipulation. The tusks are in fact elongated incisors, continually growing, and put to manifold uses in digging, debarking, and defense. Elephants exhibit long retention of places and persons; waterholes visited in seasons past are recalled unerringly, and individuals distinguished by scent and form even after lengthy intervals."
 dubois.1015.t: "长颈鹿展区"
 dubois.1015.d: "The #o Giraffes#! are visible from afar, their lofty heads browsing amongst the higher branches as nature intended."
 dubois.1015.f1: "The tongue, of bluish cast and measuring near half a cubit in length, is admirably adapted to seize thorny sprays which would injure a less specialized mouth. By delicate prehension the animal strips acacia leaves whilst avoiding the prickles, and thus may consume in a day near thirty kilograms of foliage. Indeed, so well is the giraffe provisioned by its diet that it need seldom stoop to drink."
 dubois.1015.f2: "When males contend for preferment, they engage in the curious exercise termed ‘necking,’ swinging the head as a pendulum to strike the rival’s flank. Over years, the cranial knobs (ossicones) become more massive and their tips often bare, a sign of age and rank. Giraffes commonly form loose companies, the composition of which alters as they traverse the plains, though cows with young consort together."
 dubois.1015.f3: "The coat, a mosaic of patches upon a lighter ground, affords both concealment amidst broken light and, it is thought, regulation of heat by means of richly supplied vessels beneath each panel. The giraffe’s prodigious heart and stout arteries sustain the lofty head against gravity’s demands; yet the creature moves with a grace that belies the burdens of its stature."
 dubois.1016.t: "黑脚企鹅展区"
 dubois.1016.d: "Some #o African Penguins#! are at sport in the water whilst others stand in company ashore, preening their excellent plumage."
 dubois.1016.f1: "This species (Spheniscus demersus), the so–called ‘jackass’ penguin from its braying call, inhabits the temperate coasts of southern Africa, notably Namibia and the Cape. Unlike their Antarctic cousins, they prosper in milder seas, their counter–shaded livery protecting them from foes above and below. They subsist chiefly upon small fishes and cephalopods, pursuing them with great agility beneath the waves."
 dubois.1016.f2: "African penguins commonly fashion burrows in ancient guano deposits, wherein they lay and rear their young, the parents alternating the duties of incubation and foraging. A clutch most often consists of two eggs. Where guano has been removed by man, suitable nesting is diminished; it is to be hoped that enlightened management will in time repair the injury."
 dubois.1016.f3: "Their plumage is extraordinarily dense and well–oiled, conferring both insulation and waterproofing. In the water the birds attain notable speed and steer with admirable precision by their stiffened flippers and tail. On land they are gregarious and communicate by a repertoire of calls, each note intelligible to their fellows amidst the din of the rookery."
 dubois.1017.t: "裸鼹鼠展区"
 dubois.1017.d: "As these rodents pass most of life underground, the enclosure is contrived as an earthen mound with glazed passages that reveal their chambers and galleries to the inquisitive eye."
 dubois.1017.f1: "The Naked Mole–Rat (Heterocephalus glaber) is singular among mammals for its hairless skin, thermoconforming habit, and remarkable tolerance of thin air—qualities well–suited to life in deep, mephitic tunnels. Its prodigious incisors, which operate before the closed lips, are employed as picks in excavation; the lips themselves seal behind the teeth and exclude the dust. Of slight appearance but great industry, the creature composes long corridors and ample store–rooms with indefatigable zeal."
 dubois.1017.f2: "This species presents a rare eusocial polity: a single breeding ‘queen,’ attended by consorts, presides over a multitude of sterile workers and soldiers. The former extend the burrows, fetch provisions, and tend the young; the latter defend the commonwealth against serpents and other intruders. Such organization, more often met with in insects, furnishes the natural philosopher with much material for reflection."
 dubois.1017.f3: "Within their warm retreats the animals bunch together, exchanging heat and caresses by frequent grooming. Their voices, though small, are various, and maintain familiarity amongst members of the colony. Longevity of unusual degree has been recorded for this little beast, and a notable resistance to certain ailments, which has awakened the interest of physicians as well as zoologists."
 dubois.1018.t: "Plains Zebra Enclosure"
 dubois.1018.d: "This level paddock of grass and scattered shade resembles, in miniature, the African veld; here the #o Plains Zebra#! finds itself at home."
 dubois.1018.f1: "The zebra’s bold raiment of black and white, though conspicuous to our eye, serves in the shimmer and shadow of the savannah to confound the judgments of flies and foes alike. Each individual’s pattern is unique, as a signature. These equids live commonly in family ‘harems’: one stallion, several mares, and their young, the members keeping order by mutual grooming and a vigilant watch against predators."
 dubois.1018.f2: "Dominance amongst males is ascertained by formal display—ears back, neck arched, forelegs striking—and at times by biting and swift kicks. Communication includes brays, snorts, and high whinnies, with an expressive language of ear and tail. Bachelor bands of younger males consort separately until such time as they contest for mares."
 dubois.1018.f3: "The foal, being precocial, stands and runs within a short hour of birth, for upon the open plain safety lies in early fleetness. It imprints upon the dam by her smell and pattern, and is attended by her with notable devotion. In due time, the young learn the ways of the herd—where to graze, when to travel, and how to profit by the many eyes of their companions."
