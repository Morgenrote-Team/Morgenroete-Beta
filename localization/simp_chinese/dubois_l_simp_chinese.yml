 dubois_nature_reserve_survey_decision: "自然保护区调查"
 dubois_nature_reserve_survey_decision_desc: "进行调查以寻找自然保护区的场地，将会花费#n 几个月#!时间。"
 dubois.1210.t: "[ROOT.GetState.GetName]的栖息地受到威胁"
 dubois.1210.d: "不断扩张的人类文明与[ROOT.GetState.GetName]的[Concept('concept_dubois_habitat','$concept_dubois_animal_habitat$')]产生了冲突。如果不建立一处[concept_dubois_nature_reserve]来保护本土野生动物，它们将在大约10年后灭绝。"
 dubois.1210.f: "贪婪的机器蚕食着大地，不断扩张的城市吞噬了越来越多的领土，而铁路分割了繁花似锦的原野。动物们每天都在失去更多的领地：人类正在一步步将其占据。"
 dubois.1210.g: "我们必须保护这些动物！"
 dubois.1210.h: "发展才是硬道理！"
 dubois_endangered_habitat_tt: "一处受到威胁的[concept_dubois_habitat]将于10年后消失。你可以通过在当地建立[concept_dubois_nature_reserve]阻止这一过程，并使得[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]免于灭绝。"
 dubois_habitat_endangered_modifier: "栖息地受到威胁"
 dubois_habitat_endangered_timer_modifier: "距离栖息地消失的时间"
 dubois_habitat_protection_path_modifier: "保护栖息地意愿"
 dubois_habitat_destruction_path_modifier: "发展胜于一切"
 dubois.1211.t: "[ROOT.GetState.GetName]的栖息地被毁"
 dubois.1211.d: "我们没能通过建立[concept_dubois_nature_reserve]保护[ROOT.GetState.GetName]的[Concept('concept_dubois_habitat','$concept_dubois_animal_habitat$')]。栖息地现已遭到摧毁。"
 dubois.1211.f: "不幸的是，矿业公司的成立是以破坏我国一种动物的栖息地为代价的。但谁会在乎这些呢？利润等着我们！"
 dubois.1211.g: "哦不。随便吧。"
 dubois_breeding_animal_trigger_tt: "建立了[concept_dubois_nature_reserve]的地区，且该#b 自然保护区#!内尚未拥有来自同一地区的特定动物时，你可以繁育[concept_dubois_zoo]内拥有的一种[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]。\n\n例如，如果你在欧洲地区拥有一座#b 自然保护区#!并希望繁育#b 阿尔卑斯羱羊#!，则只能在该省份尚无阿尔卑斯羱羊[concept_dubois_habitat]且#b 动物园#!中有#b 阿尔卑斯羱羊#!的情况下这样做。"
