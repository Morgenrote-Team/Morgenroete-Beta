 dubois.31.l: "大猩猩"
 dubois.32.t.gorilla_1: "一头强壮的大猩猩"
 dubois.32.t.gorilla_2: "第二次目击大猩猩"
 dubois.32.t.gorilla_3: "另外的大猩猩"
 dubois.32.f.gorilla.1: "在薄雾笼罩的森林中，一阵低沉、嘹亮的拍动胸膛声音回荡在森林中，这声音让每一个生物都不寒而栗。银背大猩猩彰显着它的存在！它高大威猛，既是己种群的保护者，又是统治者。[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授敬畏地看着这只巨猿，他准备好了设备，他知道为动物园捕捉这种雄伟的生物可能是最艰巨的任务。"
 dubois.32.f.gorilla.2: "当太阳开始落山后时，丛林里便响起了声音，一个大猩猩家族出现了，它们的行为充满目的性。最小的大猩猩紧紧抱着妈妈的背，威风凛凛的银背大猩猩在后面追赶，警惕的目光扫视着任何危险的迹象。 [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授屏住呼吸，用望远镜观察着这些高贵生物。一想到要拆散这样一个家庭，他的心情就十分沉重，但动物园赞助人的压力让他别无选择，他必须继续，即使这意味着要破坏自然和谐。"
 dubois.32.f.gorilla.3: "密林幽深，空气被泥土的气息和不可见生灵若有若无的呼唤所充盈，大猩猩在此筑巢为家。那高耸的银背，银色的皮毛与深邃的眼眸，无不昭示着，这是一位无可争议的族群领袖。只见他那巨掌轻柔地拥抱着一只年幼的大猩猩，流露出罕见的柔情。[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授在远处默默注视着这一温馨时刻，心中却为伦理所纠结困扰。身后，是翘首以盼的动物园访客；眼前，是错综复杂的动物社会网络。[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]不禁沉思，樊笼真能囚禁这些不羁的荒野之魂吗？"
 dubois.33.d.gorilla: "搜寻#O 大猩猩#!时，我们的游猎队伍在一处遇到了令人惊叹的植物群系。[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授倾向于在此扎营休息。"
 dubois.34.d.gorilla: "捕捉# O 大猩猩#!的游猎队因[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授的失踪不得不中止搜寻。"
 je_dubois_safari_gorilla: "非洲狩猎探险：大猩猩"
 je_dubois_safari_gorilla_reason: "在非洲狩猎探险中，通过追踪和诱捕可以捕捉到大型动物，然后运到[concept_dubois_zoo]。每次狩猎探险只能捕获一只动物。根据动物种类的不同，是否需要捕兽夹或是否必须跟踪它们也不尽相同。体型大、行动迟缓的动物需要更多的陷阱，而速度快的动物则需要更多的追踪。狩猎探险会持续300天，如果没有成功捕捉到动物，游猎队伍会在到期后离开。\n\n攻击性动物在被捕捉时会进行自卫和反击，而害羞的动物则会选择逃跑。拥有动物学家特质的[concept_dubois_naturalist]能够在这种情况下游刃有余地应对这些问题。诸如#ORANGE 机枪#!或#ORANGE 内燃机#!等新技术让追踪和捕捉动物变得更加容易。"
 dubois.228.d: "谁能想到新西兰这小地方会发现一种如此巨大的鹰？[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]教授发现了这种鹰的许多骨骼化石，推测其翼展可达2.6米。[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]教授认为这可能是毛利人神话传说波瓦凯的来源。"
