 je_dubois_safari_giraffe_reason: "在非洲狩猎探险中，通过追踪和诱捕可以捕捉到大型动物，然后运到[concept_dubois_zoo]。每次狩猎探险只能捕获一只动物。根据动物种类的不同，是否需要捕兽夹或是否必须跟踪它们也不尽相同。体型大、行动迟缓的动物需要更多的陷阱，而速度快的动物则需要更多的追踪。狩猎探险会持续300天，如果没有成功捕捉到动物，游猎队伍会在到期后离开。\n\n攻击性动物在被捕捉时会进行自卫和反击，而害羞的动物则会选择逃跑。拥有动物学家特质的[concept_dubois_naturalist]能够在这种情况下游刃有余地应对这些问题。诸如#ORANGE 机枪#!或#ORANGE 内燃机#!等新技术让追踪和捕捉动物变得更加容易。"
