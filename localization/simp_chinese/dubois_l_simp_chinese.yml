 dubois.261.t: "系统化完成"
 dubois.261.d: "经过多年研究，[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]博士发表了[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis]关于史前动植物界中亲缘关系的工作，并因其崭新的见解被视作生物谱系的地基。"
 dubois.261.f: "“我将采集植物和化石，并用最好的仪器进行天文观测。然而，这并不是我旅程的主要目的。我将努力找出自然力量如何相互作用，地理环境如何影响动植物。简言之，我必须了解自然界的和谐。”\n——亚历山大·冯·洪堡"
 dubois.261.g: "这真是……非常有趣。"
 dubois.262.t: "一种动物的系谱"
 dubois.262.d: "在[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]博士比较了关于某种动物的地方性报告和国际性报告后，[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe]对该物种进化的先前认知提出了根本性的质疑。"
 dubois.262.f: "“全神贯注进行专门研究时，我全然没有注意到与此同时无意识地建立起来的体系。然而，当我在巴黎完成了对化石物种的比较后，为了方便时时回顾它们，我决定按照它们在地质构造中出现的顺序列出清单，以便更精确地确定它们的特征，并通过这些列举使其更加突出。令我惊喜的是，按照地质顺序对鱼类化石进行的最简单列举，也完全表明了各个家族之间的自然关系；因此，人们可以在创造历史中读到整个类群的遗传发展，各个家族中的属和种的表现也因此得以确定。简而言之，鱼类的遗传顺序与它们的动物学分类完全吻合，而且正好符合我所提出的分类体系。”\n——路易·阿加西"
 dubois.262.g: "我们动物园里有这种动物吗？"
 dubois.263.t: "花点小钱"
 dubois.263.d: "在研究期间，[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]博士开始与另一个同行打交道。通过谈判渠道，[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe]能够获得一个支持[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe]最新论点的化石——大学出钱。"
 dubois.263.f: "“\n在比较解剖学的启示下，每一块骨骼及其碎片都回到了应有的位置。我难以用言语表达我内心的喜悦，当我发现一个特征时，所有从中推测出的结果都一一得到证实；脚部特征与牙齿预示的一致，牙齿的特征也与脚部先前暗示的相吻合；腿骨、股骨以及四肢的每个连接部分都准确地排列在一起，正如我在完整骨骼被发现之前所预见的那样。简而言之，每一个物种仿佛都可以从其单一的组成部分被重新构建出来。”\n——威廉·布克兰"
 dubois.263.g: "值得吗？"
 dubois.264.t: "来自地质学家的建议"
 dubois.264.d: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName]与[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetFullName]对岩层中化石的分布进行了讨论，后者并获得了关于年代测定的重要新见解。"
 dubois.264.f: "“没有人曾经注意到，正是化石的发现催生了一种关于地球形成的理论。如果没有化石，可能没有人会想到地球的形成经历了一个又一个的时代。”\n——乔治·居维叶"
 dubois.264.g: "啊，地质学和古生物学的协同效应真是令人惊叹！"
 dubois.265.t: "引人瞩目的讲座"
 dubois.265.d: "这个学期，[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]博士在大学里开设了一系列备受赞誉的讲座，对古生物学很有启发性。这个学科因此多了许多新学生。"
 dubois.265.f: "“当人们在蒙马特尔的石矿或乌拉尔的片岩之下，一片一片，一层一层地发掘出属于洪水前文化期的兽类骸骨的化石时，不禁为瞥见几十亿年的时间，数以百万计的民族被人类的微弱记忆和不可摧毁的神圣传统所遗忘而感到惊骇，而这些民族的尸灰堆积在地球的表层，构成那几尺给我们带来面包和鲜花的土壤。”\n——奥诺雷·德·巴尔扎克"
 dubois.265.g: "极受欢迎的教授！"
