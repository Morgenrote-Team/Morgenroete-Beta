 dubois.1061.t: "南美洲展区"
 dubois.1061.d: "南美洲展区提供了各种高度多样化的栖息地。从热带雨林到干燥地区、巨大的岩石和潘帕草原。"
 dubois.1061.g: "参观#o 褐喉树懒#!"
