 dubois.228.t: "哈斯特鹰"
 dubois.228.f: "“一开始我们发现了一个巨大的爪形化石并认为这是恐龙的一部分，但后来我们发现了越来越多的化石，也就是越来越多的证据表明这是一只鹰。幸好这种生物已经灭绝了，不然它们很可能以人类为食。”"
 dubois.228.g: "可怕极了！"
