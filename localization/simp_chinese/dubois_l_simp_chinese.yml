 dubois.11.no: "毕竟，不能让围栏里过于拥挤。"
 dubois.12.t: "走私者到达动物栖息地"
 dubois.12.d: "[ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName]教授已成功潜入[SCOPE.sCountry('dubois_animal_country').GetName]的一处偏远动物栖息地。随之而来的，是一个敏感而复杂的问题：在追求科学进步的名义下，应选择哪一类生物作为“采集”对象？"
 dubois.12.f: "“捕获一只野生生物何来违法之说？它本身并不具备法律权利，更无所有权可言。”当考察队中一位成员谨慎地提出，他们的行为是否已逾越法律边界时，教授归来后如此低语沉思。"
 dubois.13.t: "走私者被捕！"
 dubois.13.d: "坏消息：我们派往[SCOPE.sCountry('dubois_animal_country').GetName]的一小队走私者被抓了个现行。这毫无疑问引发了国际丑闻——我们被公开指控为偷猎者！"
 dubois.13.f: "据报纸报道，我们的人被护林员抓住，安全部队闻讯赶来。外交部长随后召见了我国大使。唯一幸运的一点是[ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName]教授及时脱身。很难想象这件事对他的声誉会有什么影响。"
 dubois.13.g: "计划赶不上变化。"
 dubois.21.t: "[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授带着动物归来。"
 dubois.21.d: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName]教授出发寻找非凡动物一年后回来了。在当地向导、猎人和捕兽人的帮助下，此次考察成功捕获了数只极具科研与展示价值的[Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]。"
 dubois.21.f: "捕获动物数量：#G [ROOT.Var('dubois_catch_animal_total').GetValue]#!"
 dubois.21.g: "科学与国家的胜利！"
 dubois.31.t: "狩猎旅行开始"
 dubois.31.d: "由[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName]博士率领的探险队已抵达非洲大陆。他们的目标是为[concept_dubois_zoo]获取一份捕获野兽，那么应该优先于什么呢？"
 dubois.31.f: "并非所有生物都以相同方式屈服于捕获，例如大象需要大量陷阱，而长颈鹿更容易被诱捕，狮子则比河马更频繁地变换位置。"
 dubois.31.g: "优先捕获河马。"
 dubois.31.h: "优先捕获狮子。"
 dubois.31.i: "优先捕获大象。"
 dubois.31.j: "优先捕获长颈鹿。"
 dubois.31.k: "斑马抵达"
 dubois.32.t.hippopotamus_1: "巨大的河马"
 dubois.32.t.hippopotamus_2: "第二次目击河马"
 dubois.32.t.hippopotamus_3: "另一只河马"
 dubois.32.t.lion_1: "雄伟的狮子"
 dubois.32.t.lion_2: "第二次目击狮子"
 dubois.32.t.lion_3: "另一只狮子"
 dubois.32.t.elephant_1: "参天大象"
 dubois.32.t.elephant_2: "第二次目击大象"
 dubois.32.t.elephant_3: "另一只大象"
 dubois.32.t.giraffe_1: "优雅的长颈鹿"
 dubois.32.t.giraffe_2: "第二次目击长颈鹿"
 dubois.32.t.giraffe_3: "另一只长颈鹿"
 dubois.32.t.zebra_1: "迅捷的斑马"
 dubois.32.t.zebra_2: "第二次目击斑马"
 dubois.32.t.zebra_3: "另一只斑马"
 dubois.32.d: "[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授已锁定目标的踪迹。现在，团队需要凭借耐心与技巧，将其诱导至适合捕获的位置。"
 dubois.32.f.hippopotamus.1: "大河的阴影之下，村民低声谈论着那些在黄昏时分搅动河水的庞然巨物。一名本地猎人描述了不久前的一夜：一只护崽的母河马竟将一条鳄鱼生生压碎。[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授检查了那头爬行动物碎裂的残骸，证实了这一惊人场景。它们低沉的吼声彻夜不息，仿佛在宣告：河马并非寻常生灵——而是这片水域的真正君主。"
 dubois.32.f.hippopotamus.2: "当朝阳刺破晨雾，团队目睹一个巨影自河中升起——蒸腾的水汽在其厚皮上流转，仿佛初光洗山峦。村民称其为“幽灵公牛”：它们无声潜入水中，又以雷霆之势出击。獠牙如象牙般光亮，性情暴烈难驯。连狮子也避之唯恐不及。然而，[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授却手握笔记，目光坚定，毫不退缩。"
 dubois.32.f.hippopotamus.3: "传奇河马的传闻让探险家们浮想联翩，其描述在非洲大草原茂密的灌木丛中回荡。这头所谓的“长牙巨兽”拥有象牙般的甲片，在阳光下闪闪发光，其他掠食者的牙齿和爪子完全无法伤它分毫。当地部落敬畏这种生物，认为它的存在具有神话般的力量。为了亲眼目睹这只雄伟的野兽，[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授必须穿越险恶的沼泽，克服野外的危险，仅凭自己的知识和希望捕捉到一个活生生的传奇，让世人惊叹不已。"
 dubois.32.f.lion.1: "在广袤无垠、桀骜不驯的非洲平原上，一种威严的掠食者占据着至高无上的地位。狮子金色的鬃毛和锐利的目光是力量和威严的化身。它威武的吼声响彻云霄，令猎物和掠食者都不寒而栗。当地人将这头雌狮称为 “大草原女王”，它以一己之力捍卫狮群，抵御敌对部族，甚至击退凶猛的鬣狗。为了捕捉到这壮美的造物，[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授必须涉险深入大草原腹地亲眼目睹自然君王的原始力量，哪里的每一道阴影都潜藏着危险。"
 dubois.32.f.lion.2: "在非洲荒野的深处，有一位猫科动物的君主，以坚定不移的权威统领着它的领地。这头狮子被称为“黄金君王”，它的鬃毛像太阳一样闪闪发光，是权力和统治的象征。关于它惊人的力量和隐蔽性的传说流传甚广，令冒险家和博物学家心驰神往。当地人中间流传着一次罕见的目击事件，黄金君王和一头可怕的开普水牛之间发生了两个巨人的冲突。为了亲眼目睹这场史诗般的交锋，[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授必须小心翼翼地穿越大草原，在无畏勇士的领域前行。"
 dubois.32.f.lion.3: "蝉鸣风拂草丛，暗流涌动。狮吼低沉粗犷，如远方雷鸣般掠过平原。传说有位狮王，仅凭威仪便能震慑敌手、喝止象群。此刻，[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授正踏入这场掠食者与猎物间的古老戏剧，作为追寻动物君主的孤独学者。"
 dubois.32.f.elephant.1: "烈日炙烤着大草原，远处传来的隆隆声越来越近。那不是雷声——而是大象的脚步声。一位母大象带领着她的族人穿过平原，在一处金合欢树林下稍作停留，它们的鼻子像潜望镜一样伸向树冠。[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]博士通过望远镜默默注视着，打动他的不仅是它们的体型，还有它们之间温柔的陪伴节奏。然而博士身后，不耐烦的赞助者们说着国家资助这次旅程可不是为了多愁善感。"
 dubois.32.f.elephant.2: "兽群以一种与其庞大身躯不符的优雅行进着，在历经多次迁徙的年长母象带领下，它们统一地前进。黄昏时分，在浅浅的水坑旁，它们的吼叫声回荡——那声音介于音乐与哀鸣之间。[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]博士手中的笔记本静静躺着，心中泛起疑虑。驱使他追寻的，究竟是科学，还是奇观？"
 dubois.32.f.elephant.3: "在猴面包树下，时间仿佛静止，[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]博士目睹了一幅既庄严又哀伤的景象：一群大象悠闲站立，耳朵轻摇，象牙似打磨过一般熠熠生辉。它们既不显露威胁，也不仓皇逃窜——只是安然站立。然而若将其中一员从这共生关系中剥离，将必将损害象群。博士熟稔骨骼与物种的学名，但眼前此景——却全然是另一种存在。"
 dubois.32.f.giraffe.1: "许多天来[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]博士的游猎队伍一直在寻找长颈鹿的踪迹却没有发现任何线索。但一个早晨，这种优雅动物的脖颈在初升的旭日下伸展，映在红色火球上形成剪影。游猎队伍立刻出发，以免错失良机。"
 dubois.32.f.giraffe.2: "阳光如碎金般透过树梢，长颈鹿们缓步走入视野。它们身形高耸、神态安详，斑驳花纹如同抽象的马赛克。[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]博士屏息凝神，手持笔记本和望远镜缓缓靠近。这些生物的优雅无与伦比——每步足迹彰显从容，[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]博士明白，这不仅是难得的观测机遇，更是窥见造物神性的刹那。"
 dubois.32.f.giraffe.3: "远离最近的聚居地，深入草原一隅，团队发现了一头独处的长颈鹿，与任何已知描述都截然不同。它的皮毛带有奇特的星形斑纹，动作异常迅捷。当地向导低声谈论称这是人类极少得见的神圣生物。[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]博士兼具怀疑精神与学者素养，正准备进行细致观察。这究竟是一个独特亚种——抑或只是光影与传说的捉弄？"
 dubois.32.f.zebra.1: "当太阳低垂时，平原上一片寂静，直到多刺的灌木与风化的树木间闪现出黑白相间的条纹。一群斑马，安详而毫无戒备，正在触手可及之处啃食草叶。[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授默默注视着，被它们身上的条纹深深吸引——那是进化之谜的鲜活呈现，等待太久，这一刻可能永远逝去。"
 dubois.32.f.zebra.2: "数周徒劳无功的追踪后，团队突然想起当地追踪者提供的关键线索：斑马很少远离水源活动。他们在下一个可靠的水源地附近扎营，果然，当暮色降临时，熟悉的喷鼻声和甩尾声宣告了条纹族群的到来。终于，第二次机会降临——或许凭借运气与谨慎，还能实现活抓。"
 dubois.32.f.zebra.3: "一具斑马残缺的尸体，刚遭遇狮子的伏击，横陈在前方。它的死亡虽惨烈，却留下了线索——足迹、声响、动静。在紧迫感的驱使下，小队继续前进。翻过一道低矮的山脊，他们目睹了狂野而和谐的一幕：斑马群正在移动，它们的叫声奇异，介于马与驴之间，身上的条纹随风舞动。对[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授而言，这景象交织着悲剧与胜利。"
 dubois.32.g: "命令团队设置陷阱。"
 dubois.32.h: "让团队开始追踪那只动物。"
 dubois.33.t: "一片珍稀花卉的草地"
 dubois.33.d.hippopotamus: "搜寻#O 河马#!时，我们的游猎队伍在一处遇到了令人惊叹的植物群系。那些来历不明的鲜艳花朵引起了教授的注意。[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]现在考虑暂时偏离狩猎路线，他的好奇心被激发了。"
 dubois.33.d.lion: "搜寻#O 狮子#!时，我们的游猎队伍在一处遇到了令人惊叹的植物群系。[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授倾向于在此扎营休息——这些植物可能蕴藏着与任何野兽同等重大的秘密。"
 dubois.33.d.elephant: "搜寻#O 大象#!时，我们的游猎队伍在一处遇到了令人惊叹的植物群系。[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授似乎很想逗留并采集这些奇特的植物。"
 dubois.33.d.giraffe: "搜寻#O 长颈鹿#!时，我们的游猎队伍在一处遇到了令人惊叹的植物群系。[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授倾向于在此扎营休息。"
 dubois.33.d.zebra: "搜寻#O 斑马#!时，我们的游猎队伍在一处遇到了令人惊叹的植物群系。[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授倾向于在此扎营休息。"
 dubois.33.f: "当[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授察觉到一股异常芬芳时，他下令队伍停止前进。眼前是一片空地，点缀着鲜艳而陌生的花朵。即便粗略观察也能发现它们潜在的药用价值。教授此刻面临两难抉择——是分心采集这些珍贵的植物标本，还是继续追踪那只动物的踪迹。"
 dubois.33.g: "我们必须不计一切代价收集这些花。"
 dubois.33.h: "时间紧迫，我们的首要目标仍是追捕猎物。"
 dubois.34.t: "未知的昆虫"
 dubois.34.d.hippopotamus: "当团队深入湿地追寻#O 河马#!时，他们突然发现[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授失踪了，其的足迹通向一座布满甲虫的倒塌白蚁丘——这证明他可能又被自然界的另一奇观吸引而离开了。"
 dubois.34.d.lion: "捕捉#O 狮子#!的游猎队因[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授的失踪不得不中止搜寻，或许是被某种与狮子同样凶猛或迷人的生物引开了。"
 dubois.34.d.elephant: "捕捉#O 大象#!的游猎队因[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授的失踪不得不中止搜寻。或许是为了追寻那头巨兽，又或许是在探寻只有他自己才能解答的更深层问题。"
 dubois.34.d.giraffe: "捕捉#O 长颈鹿#!的游猎队因[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授的失踪不得不中止搜寻。"
 dubois.34.d.zebra: "捕捉#O 斑马#!的游猎队因[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授的失踪不得不中止搜寻。"
 dubois.34.f: "短暂休息后，探险队突然发现领队不见了。很快，[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授被发现蹲在一座干枯的白蚁丘顶上，正痴迷地观察着一群扭动的甲虫，教授像个孩子般兴奋地记录着，这些甲虫似乎是几种未被记录的昆虫新种。"
 dubois.34.g: "收集昆虫标本用于科学研究。"
 dubois.34.h: "现在不是研究甲虫的时候，继续狩猎！"
 dubois.39.t: "成功的捕猎！"
 dubois.39.f: "“非洲的一切都会叮人，但最糟糕的还是狩猎旅行中的虫子。”\n——欧内斯特·海明威"
 dubois.39.g: "太棒了！"
 dubois.40.t: "游猎结束"
 dubois.40.d.success: "狩猎圆满完成，[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授凯旋而归。这次为[ROOT.GetCountry.GetNameNoFlag]动物园新增的成员无疑将激发公众的惊叹与学术界的浓厚兴趣。"
 dubois.40.d.fail: "经过数月的艰辛跋涉与徒劳无功的探索，[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授空手而归，回到了[ROOT.GetCountry.GetNameNoFlag]。这次探险就此终结，未能达成所愿。"
 dubois.40.f: "“我所渴望的一切只是回到非洲。尽管我们还未离开，但每当夜晚醒来时，我都会躺下倾听，已经对它感到不舍……”\n——欧内斯特·海明威"
 dubois.40.g: "向着下一次探险前进。"
 dubois.41.t: "热带植物"
 dubois.41.d: "探险队遇到了发现了多种异域植物，但此地的安全状况尚未知晓。"
 dubois.41.f: "探险队成员们被迷住了。他们曾在河流、山脉和森林中漫游，还征服过瀑布。但那些雄奇的植物和壮丽的花朵让他们感到无法抵挡的震撼。实际上，[SCOPE.sCharacter('expedition_leader').GetFullName]说他们不会在这里待太久，但随后允许一位研究助理收集了一些样本。一方面，即使是他也不能否认这个发现的科学价值。另一方面：丛林中有一些奇怪的声音，他无法确定那是来自人类、动物还是妖魔……"
 dubois.41.g: "收集些植物样本。"
 dubois.41.h: "尽可能多地收集标本。"
 dubois.42.t: "蝴蝶"
 dubois.42.d: "探险队在非洲丛林中的一片空地叹为观止，那里有数万只色彩缤纷的蝴蝶在嬉戏。"
 dubois.42.f: "“但这些都是会飞、会唱歌的花朵。” ——罗伯特·弗罗斯特"
 dubois.42.g: "我们家里的博物学家该很开心了。"
 dubois.43.t: "河鱼"
 dubois.43.d: "在涉水过河时，探险队的一些同伴发现水中游动着未知的鱼类物种。然而，[SCOPE.sCharacter('expedition_leader').GetFullName]对如何处理这些[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]却另有想法。"
 dubois.43.f: "它们是五颜六色、闪闪发光的鱼儿。美丽，未知。神秘的鱼类，同时也是美味的鱼类。这对科学家来说是一个重大发现，而对探险队队长来说则是提高探险成功率的可喜食物。"
 dubois.43.g: "收集并研究这些鱼。"
 dubois.43.h: "把鱼煮了吃掉。"
 dubois.44.t: "样本丢失"
 dubois.44.d: "几天前，考察队采集到了一些极具科学价值的未知昆虫和植物样本。然而，今天清点发现发现这些样本已经丢失！"
 dubois.44.f: "大约中午时分，一声惊慌的呼喊震撼了了整支探险队。起初，[SCOPE.sCharacter('expedition_leader').GetFullName]担心敌对土著发动了入侵。结果只是一位脸色惨白、惊慌失措的研究助理。装满昆虫、树叶和标本保存箱全都消失无踪。助理要求探险队立即折返，但挑夫们视而不见，领队也驳回了这个提议：折返太危险，况且采集这些杂草已经浪费了太多时间。助理威胁要向科学界和政界某些身居高位的朋友举报这种玩忽职守的行为。"
 dubois.44.g: "返回原路并找回藏品。"
 dubois.44.h: "一文不值的垃圾丢掉也没关系。"
 dubois.45.t: "珍贵藏品"
 dubois.45.d: "在一片偏远的林间空地，探险队发现了一位多年前离群索居的博物学家，他收集了大量珍稀标本。"
 dubois.45.f: "他是个瘦削的身影，头发蓬乱，双眼因孤独而深陷。然而他的栖身之所却堆满了精心保存的甲虫、蝴蝶、种子和带注解的草图。[SCOPE.sCharacter('expedition_leader').GetFullName]博士立刻意识到这人并非疯子，而是个天才——同时是个怪人。这个隐士既害怕债主，也畏惧声望，迟迟不敢返乡。但他的收藏蕴含着难以估量的价值，无论是科学层面还是其他方面。这里藏着机遇，远不止植物学领域。"
 dubois.45.g: "我们想要他的藏品。"
 dubois.45.h: "我们更关心他知道些什么。"
 dubois.72.t: "发现地层"
 dubois.72.d: "[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]在[SCOPE.sState('dubois_formation_state').GetName]发现了几百万年前的岩层。他们怀疑那里有目前未知的化石。"
 dubois.72.f: "拥有古老岩石的地层是古生物学家的天堂。所有地层中都可以找到较小的化石。大型地层中甚至可以找到巨大恐龙的骨骼。它们在古生物学上分为几个阶段。需要一位古生物学家在地层中挖掘化石。他们会自行研究地层并每年发现化石。"
 dubois.72.g: "我们靠近看看。"
 dubois.73.t: "发现大地层"
 dubois.73.d: "古生物学家在[SCOPE.sState('dubois_formation_state').GetName]发现了数百万年前的地层。在这个巨大的地层中可能沉睡着无数的化石，甚至可能有我们梦寐以求的，保存完好的骨架。"
 dubois.101.t: "北极熊抵达"
 dubois.101.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 北极熊#!搬进了新的展区。"
 dubois.101.f: "北极熊是一种高度食肉的熊科物种。它的栖息地主要位于北极圈内，涵盖了北极洋及其周围的海洋和陆地，包括北美和欧亚大陆的最北部地区。北极熊通常在海冰边缘捕猎它们偏好的食物：海豹，没有海冰时，它们通常依靠脂肪储备生活。由于它们对海冰的依赖，北极熊被归类为海洋哺乳动物。与棕熊不同，北极熊没有领地意识。尽管常被刻板印象视作凶猛的侵略者，它们在面对冲突时通常是谨慎的，往往选择逃跑而不是战斗。"
 dubois.101.g: "真酷！"
 dubois.102.t: "灰熊抵达"
 dubois.102.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 灰熊#!搬进了新的展区。"
 dubois.102.f: "灰熊，也被称为北美棕熊，它是棕熊中最大的亚种之一，仅次于堪察加棕熊和科迪亚克熊。灰熊的大小因时机和种群而异。灰熊最早的分布范围包括北美的西部和中部大部分地区。它是从一群迁徙穿越干涸的白令海峡的欧亚棕熊后裔演化而来。"
 dubois.102.g: "太可怕了。"
 dubois.103.t: "白头海雕抵达"
 dubois.103.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 白头海雕#!搬进了新的展区。"
 dubois.103.f: "白头海雕是一种分布在北美洲的猛禽。它的分布范围包括加拿大的大部分地区、阿拉斯加、美国本土的所有地区以及墨西哥北部。它主要栖息在附近有丰富食物供应的大型开放水域附近，在老树上筑巢。白头海雕是一种机会主义的食物消费者，主要以鱼类为主食，它会俯冲到水面上并用爪子从水中抓取食物。它的英文名“Bold Eagle”字面上是“秃鹰”，但实际上并不是秃头的，而是来自于“bold”一词“白头”的旧意。白头海雕是美利坚合众国的国鸟，并出现在其国徽上。"
 dubois.103.g: "一只高贵的猛禽。"
 dubois.104.t: "美洲野牛抵达"
 dubois.104.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 美洲野牛#!搬进了新的展区。"
 dubois.104.f: "美洲野牛，又称美洲水牛或简称为水牛，是一种原产于北美洲的野牛物种。它是两种现存的野牛物种之一，另一种是欧洲野牛。1616年，萨缪尔·德·尚普兰将\"buffles\"（“水牛”的法语）用于描述美洲野牛，他在看到尼皮辛原住民展示的兽皮和一张画后做出了这个命名。而\"bison\"这个词则是在1690年代开始使用的。野牛有一层毛茸茸的、长而深棕色的冬季毛皮，以及一层较轻的、浅棕色的夏季毛皮。雄性野牛显著地比雌性更大更重。曾经在广阔的草原上成群结队地游荡，这种物种在19世纪因商业狩猎、屠杀和从家养牛类引入的牛类疾病的综合作用下几乎灭绝。"
 dubois.104.g: "一只毛茸茸的泰坦。"
 dubois.105.t: "佛罗里达山狮抵达"
 dubois.105.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 佛罗里达山狮#!搬进了新的展区。"
 dubois.105.f: "佛罗里达山狮是北美美洲狮的一种，也被称为佛罗里达美洲狮或佛罗里达猎豹。它生活在松木林、热带硬木林和混合淡水沼泽森林中。佛罗里达山狮在出生时有斑点，并且通常有蓝色的眼睛。成长中斑点会褪色，毛皮变成完全的棕褐色，而眼睛通常会呈现出黄色的色调。山狮的腹部是奶油白色，尾巴和耳朵上有黑色的尖。佛罗里达山狮不会吼叫，而是发出独特的声音，包括哨声、吱吱声、咆哮声、嘶嘶声和呼噜声。"
 dubois.105.g: "这不是更像美洲狮吗？"
 dubois.106.t: "短吻鳄抵达"
 dubois.106.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 短吻鳄#!搬进了新的展区。"
 dubois.106.f: "美洲短吻鳄是湿地中令人敬畏的爬行动物与生态系统工程师。作为顶级掠食者，它通过挖掘水坑和调控猎物数量塑造着周围环境。它们低沉的吼声在求偶与示威时回荡于沼泽之间。尽管外表凶猛，这种古老生物对栖息地生态平衡至关重要，如今也成为公众教育的重要载体。"
 dubois.106.g: "尖牙。"
 dubois.107.t: "墨西哥钝口螈抵达"
 dubois.107.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 墨西哥钝口螈#!搬进了新的展区。"
 dubois.107.f: "墨西哥钝口螈是一种终生水栖的蝾螈，原产于墨西哥的古湖泊。其独特之处在于能终身保持幼体特征，无需经历变态发育即可性成熟。这种生物令人惊叹的再生能力——能重新长出断肢甚至部分心脏或大脑组织——几个世纪以来始终令科学家着迷。自洪堡教学时代起就被长期研究，至今仍是生物界神秘性与适应力的象征。"
 dubois.107.g: "这……奇怪的生物是什么？"
 dubois.111.t: "褐喉树懒抵达"
 dubois.111.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 褐喉树懒#!搬进了新的展区。"
 dubois.111.f: "褐喉树懒是一种生活在中美洲和南美洲新热带地区的三趾树懒物种。褐喉树懒每天会睡眠15到18个小时，只在短暂的时间内活动，可能是在白天或晚上。尽管它们可以在地面上行走，甚至游泳，但它们大部分时间都在高处的树枝上度过，大约每八天左右下来一次，到土壤中排便。它们的移动范围不远，根据当地环境的不同，家域范围仅约为0.5至9公顷。在一个典型的5公顷范围内，一只褐喉树懒会访问约40棵树，并可能专门选择一种特定的树种，甚至将20%的时间花费在一棵特定的树上。"
 dubois.111.g: "它是整个动物园里最像贵族的生物。"
 dubois.112.t: "美洲豹抵达"
 dubois.112.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 美洲豹#!搬进了新的展区。"
 dubois.112.f: "美洲豹是美洲地区现存的唯一原生豹属动物。它的体长可达到1.85米，体重可达到158公斤，是美洲最大的猫科动物，也是世界上第三大的猫科动物。它独特的斑点覆盖在浅黄色到棕色的毛皮上，在身体两侧过渡成玫瑰花状斑纹，虽然个别个体会由于黑色素而呈现黑色毛皮。"
 dubois.112.g: "令人敬畏。"
 dubois.113.t: "大食蚁兽抵达"
 dubois.113.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 大食蚁兽#!搬进了新的展区。"
 dubois.113.f: "大食蚁兽是一种原产于中美洲和南美洲的食虫哺乳动物。它是四种现存的食蚁兽之一，也是最大的一种。它主要以蚂蚁和白蚁为食，使用前爪挖掘然后用长而有粘性的舌头收集它们。尽管大食蚁兽生活在重叠的领地范围内，但它们大多是独居的，除了母子关系、雄性之间的攻击性互动以及交配时。大食蚁兽是现存食蚁兽中最适应陆地生活的物种。它的祖先可能起初适应了树栖生活。"
 dubois.113.g: "优雅，实在是太优雅了。"
 dubois.114.t: "九带犰狳抵达"
 dubois.114.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 九带犰狳#!搬进了新的展区。"
 dubois.114.f: "九带犰狳是一种分布在北美洲、中美洲和南美洲的哺乳动物，是犰狳中分布最广泛的一种。它的祖先起源于南美洲，并一直留在那里，直到巴拿马地峡的形成使它们作为“美洲大交换”的一部分进入北美洲。九带犰狳是一种独居的、主要夜行的动物，在许多种环境中都可以找到，从成熟和次生的雨林到草原与干旱的灌木丛。它的外壳由骨化的皮肤鳞片组成，外面覆盖着不重叠的角质表皮鳞片，这些鳞片由柔软的皮肤带连接。盔甲覆盖了背部、侧面、头部、尾巴和腿的外部表面。"
 dubois.114.g: "全副武装。"
 dubois.115.t: "安第斯神鹫抵达"
 dubois.115.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 安第斯神鹫#!搬进了新的展区。"
 dubois.115.f: "安第斯神鹫是一种生活在南美的巨型美洲鹫科秃鹫，是安第斯鹫属中唯一的成员。它分布在安第斯山脉及其毗邻的西南美洲太平洋海岸，安第斯神鹫是世界上以重量和翼展的综合测量为标准最大的飞鸟。它是一种黑色大型秃鹫，颈部基部有一圈白色的羽毛，尤其是雄性，在翅膀上有大片的白色斑块。它的头部和颈部几乎没有羽毛，呈暗红色，可能会因为鸟的情绪而变色，从而变化颜色。安第斯神鹫是玻利维亚、智利、哥伦比亚、厄瓜多尔和秘鲁的国家象征，它在安第斯地区的民间传说和神话中扮演着重要角色。"
 dubois.115.g: "神圣。"
 dubois.116.t: "西印度海牛抵达"
 dubois.116.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 西印度海牛#!搬进了新的展区。"
 dubois.116.f: "西印度海牛是一种行动缓慢的水生草食动物，栖息于加勒比海、墨西哥湾及美国东南部的温暖沿海水域。它们有时被称为“海牛”，以水下植物为食，性情温顺。尽管体型庞大，但凭借强壮的桨状尾巴，它们能灵活游动。由于缺乏天敌，它们主要受到人类活动侵占、船只撞击及栖息地丧失的严重威胁。"
 dubois.116.g: "纤巧。"
 dubois.117.t: "松鼠猴抵达"
 dubois.117.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 松鼠猴#!搬进了新的展区。"
 dubois.117.f: "松鼠猴是活跃于中美洲和南美洲热带森林的高度社会化灵长类动物。这些体重不足一公斤的小家伙是敏捷的攀爬者、迅捷的跳跃者，更是充满无尽好奇心的生物。它们生活在由雌性主导的大型族群中，通过复杂的鸣叫声——包括啁啾声、咯咯声和哨音——维系着精密的社会纽带。其丰富的面部表情与旺盛的精力使它们既是重要的研究对象，也备受游客喜爱。"
 dubois.117.g: "迷人。"
 dubois.121.t: "伊比利亚猞猁抵达"
 dubois.121.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 伊比利亚猞猁#!搬进了新的展区。"
 dubois.121.f: "伊比利亚猞猁是一种西南欧洲伊比利亚半岛特有的野生猫科动物。伊比利亚猞猁有短而明亮的黄褐色斑点皮毛。这些斑点的形状和大小各异，从小圆形到细长形都有。它们呈线状排列，从背部向两侧逐渐变小。在小三角耳朵的末端有着长约三厘米的刷毛。与欧亚猞猁一样，它们对这些猞猁的听觉能力非常重要。实验证明失去这种刷毛会降低伊比利亚猞猁的听觉和定位能力。伊比利亚猞猁要比分布更广泛的欧亚猞猁小得多，后者主要分布在北方。伊比利亚猞猁的体重在9到15公斤之间，比欧亚猞猁的体重要轻约三分之二。"
 dubois.121.g: "好！"
 dubois.122.t: "欧亚狼抵达"
 dubois.122.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 欧亚狼#!搬进了新的展区。"
 dubois.122.f: "欧亚狼，是灰狼的一个亚种，原产于欧洲和亚洲。欧亚狼的毛皮呈黄灰色、灰棕色或深灰色。下颚和喉部的下侧较浅，耳朵的背面略带红色。在大多数情况下，背部的颜色呈现出黑色至深色的鞍状斑块。尾巴的尖端和前腿的前部通常也会更暗一些。欧亚狼的嚎叫比北美灰狼亚种的嚎叫更为持久和悠扬，而北美灰狼亚种的嚎叫声更大且更强调第一个音节。"
 dubois.122.g: "危险！"
 dubois.123.t: "狗獾抵达"
 dubois.123.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 狗獾#!搬进了新的展区。"
 dubois.123.f: "狗獾，又称欧亚獾，是鼬科动物家族中的一种獾，分布于几乎整个欧洲地区。狗獾身体强壮，毛色为黑色、白色、棕色和灰色，头部较小，体型健壮，有黑色的小眼睛和短尾巴。它的体重有所变化，春季时为7‑13公斤，但在秋季冬眠前会增加到15‑17公斤。它是夜行动物，也是一种社交性的穴居动物，白天睡在其领域范围内的几个巢穴中的一个。它们建造的巢穴（称为sett）是最复杂的，会代代相传。"
 dubois.123.g: "有趣。"
 dubois.124.t: "白鼬抵达"
 dubois.124.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 白鼬#!搬进了新的展区。"
 dubois.124.f: "白鼬又称欧亚鼬、白令鼬或鼬，是一种鼬科动物，原产于欧亚大陆和北美洲的北部地区。鼬（ermine）这个名称用于所有鼬属的物种，有时也特指拥有纯白色冬季毛皮的白鼬。白鼬在总体比例、姿势和移动方式上与伶鼬相似，尽管尾巴相对较长，始终超过身体长度的三分之一，但比长尾伶鼬的尾巴要短。与伶鼬一样，类鼠啮齿动物在白鼬的食物中占主导地位。然而，与几乎专门捕食小田鼠的伶鼬不同，白鼬经常捕食较大的啮齿类和兔形目物种，甚至能够捕食体型远大于自身的个体。"
 dubois.124.g: "最适合君主与总督的动物。"
 dubois.125.t: "欧亚水獭抵达"
 dubois.125.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 欧亚水獭#!搬进了新的展区。"
 dubois.125.f: "欧亚水獭是一种半水生哺乳动物，原产于欧亚大陆。欧亚水獭主要以鱼类为食，具有强烈的领地意识。与其他一些鼬科物种一样，水獭能够击败并杀死比自己大得多的猎物，有时甚至会捕食大型水鸟，如成年灰雁。由于其毛发的特殊结构，水獭的毛皮在寒冷和潮湿环境下提供了特别有效的保温作用：就像拉链一样，毛发与微观的、互锁的楔形和槽形相互交错。形成了密集的毛发编织物，可以容纳保温的气泡同时排斥水分。这使水獭的皮肤保持干燥，身体保持温暖。"
 dubois.125.g: "奇妙。"
 dubois.126.t: "阿尔卑斯羱羊抵达"
 dubois.126.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 阿尔卑斯羱羊#!搬进了新的展区。"
 dubois.126.f: "阿尔卑斯羱羊是欧洲阿尔卑斯山脉的野生山羊物种，以其壮观的犄角和稳健的山地步伐闻名。雄性羱羊长有巨大的弯曲犄角，用于繁殖季节的仪式性争斗。这些动物特别适应垂直地形，以稀疏的高山植被为食，并能耐受陡峭多岩的恶劣气候。该物种曾因狩猎濒临灭绝，后通过王室法令和保护行动被重新引入山脉地区。"
 dubois.126.g: "固执。"
 dubois.127.t: "欧洲野牛抵达"
 dubois.127.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 欧洲野牛#!搬进了新的展区。"
 dubois.127.f: "欧洲野牛是欧洲现存最重的陆地哺乳动物。它们曾广泛分布于从西班牙至乌拉尔山脉的广大区域，却在20世纪初因人类活动导致野外灭绝。如今所有存活的个体都源自动物园中仅存的十几头圈养个体。与美洲野牛相比，欧洲野牛体型更为高挑精瘦，适应混交林与落叶林的生活环境。这个物种堪称逆境求生的活体象征。"
 dubois.127.g: "稀有。"
 dubois.131.t: "河马抵达"
 dubois.131.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 河马#!搬进了新的展区。"
 dubois.131.f: "河马是一种大型的半水生哺乳动物，原产于撒哈拉以南的非洲。它的名字源自古希腊语，意为“河里的马”。在大象和犀牛之后，河马是体型第三大的陆生哺乳动物。它也是现存最大的陆地偶蹄动物。河马栖息在河流、湖泊和红树林沼泽中。领地性的雄性河马各自统治着一片水域，以及由五到三十只母河马和幼仔组成的群体。白天，河马通过待在水中或泥浆中保持凉爽，在黄昏时分出来吃草。尽管河马在水中靠近彼此休息，但觅食是一种个体活动，通常它们在陆地上不会展示领地行为。由于其攻击性和不可预测性，河马被认为是世界上最危险的动物之一。"
 dubois.131.g: "威武雄壮。"
 dubois.132.t: "狮子抵达"
 dubois.132.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 狮子#!搬进了新的展区。"
 dubois.132.f: "狮子是豹属的一种大型猫科动物，原产于非洲和印度。它有着肌肉发达的胸膛，短而圆的头部，圆形的耳朵，以及尾巴末端的毛茸茸的簇毛。狮子有性二态性，雄性狮子比雌性更大，并有引人注目的鬃毛。它是一种社会性动物，形成被称为“狮群”的群体。狮子栖息在草原、大草原和灌木丛地区。它通常比其他野生猫科动物更多在白天活动，但当受到威胁时，它会适应在夜间和黄昏活动。作为人类文化中广泛认可的动物象征之一，狮子在雕塑和绘画中得到了广泛描绘，出现在国旗上，并在当代电影和文学作品中有所体现。"
 dubois.132.g: "雄伟威严。"
 dubois.133.t: "非洲象抵达"
 dubois.133.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 大象#!搬进了新的展区。"
 dubois.133.f: "非洲草原象是两种现存的非洲象之一，也是现存的三种大象之一。它是目前最大的陆生动物，雄性个体的肩高可达3.96米，体重可达10.4吨。它是一种社会性哺乳动物，以由母象和它们的后代组成的群体旅行。非洲草原象的皮肤呈灰色，毛发很少。它的大耳朵覆盖整个肩膀，有助于散热；摇动耳朵会产生气流，大血管暴露在内侧，以在炎热的天气中增加散热。非洲丛林象使用它们的鼻子进行触觉交流。在问候时，低级别的个体会把鼻子的尖端插入尊长的嘴里。大象还会把鼻子伸向接近的个体，以示问候。"
 dubois.133.g: "伟大。"
 dubois.134.t: "长颈鹿抵达"
 dubois.134.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 长颈鹿#!搬进了新的展区。"
 dubois.134.f: "长颈鹿是一种长颈鹿属的大型有蹄类哺乳动物，分布在非洲。它是地球上最高的陆生动物，也是最大的反刍动物。长颈鹿的主要特征是它极长的脖子和腿，犹如牛角的骨角，以及斑纹状的皮毛图案。长颈鹿通常栖息在大草原和森林地区。它们的食物来源是木本植物的叶子、水果和花朵，主要是金合欢属植物，它们在大多数其他草食动物无法到达的高度上进食。长颈鹿通常会成群栖息，群体的大小和组成会根据生态、人为因素、时间和社会因素而变化。因其其瘦长的体形和斑纹的皮毛，长颈鹿一直是人类历史上的一个引人入胜的对象，它的形象在文化中广泛传播。"
 dubois.134.g: "优雅。"
 dubois.135.t: "黑脚企鹅抵达"
 dubois.135.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 黑脚企鹅#!搬进了新的展区。"
 dubois.135.f: "黑脚企鹅是一种栖息在南非水域的企鹅物种。它与其他所有现存的企鹅物种一样无法飞行，具有流线型的体形和硬化的扁平鳍状的翅膀，适应了海洋生活。这种物种在眼睛上方有独特的粉色皮肤斑块和黑色标记。身体的上半部分为黑色，与白色的下半部分形成鲜明的对比，下半部分有斑点，带有一条黑色的带状标记。非洲企鹅是一种追逐潜水动物，主要以鱼类和乌贼为食，也是唯一在非洲繁殖的企鹅物种。非洲企鹅在世界各地的动物园中常见。由于它们不需要特别低的温度而通常安置在室外围栏中。"
 dubois.135.g: "我们终于有企鹅了。"
 dubois.136.t: "裸鼹鼠抵达"
 dubois.136.d: "我们的动物园增添了一种新的珍稀动物：今天，期待已久的#O 裸鼹鼠#!搬进了新的展区。"
 dubois.136.f: "裸鼹鼠是一种适应东非地下生活的非凡啮齿动物。这种几乎无毛且冷血的生物，是唯一一种体温随环境变化的哺乳动物，也是少数具有真社会性的哺乳动物之一，其群体由繁殖期的女王及其配偶统治。这种不起眼的生物对癌症具有显著抵抗力，并能忍受近乎无氧的环境，因此已成为科学界深入研究的对象，尤其在长寿和细胞修复领域备受关注。"
 dubois.136.g: "可爱。"
 dubois.137.t: "斑马抵达"
 dubois.137.d: "我们的动物园增添了一种新的珍稀动物：今天，期待已久的#O 斑马#!搬进了新的展区。"
 dubois.137.f: "斑马是仅分布于非洲的野生马科动物。它们以醒目的黑白条纹著称，栖息于稀树草原、草地甚至山区。关于其独特皮毛的进化意义仍存在争议——可能涉及伪装、迷惑捕食者、调节体温或驱避吸血昆虫等多种假说。作为群居动物，斑马拥有敏锐的视觉和强健的蹄子，兼具优雅体态与高度警觉性。"
 dubois.137.g: "像马一样。"
 dubois.141.t: "大熊猫抵达"
 dubois.141.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 大熊猫#!搬进了新的展区。"
 dubois.141.f: "大熊猫是一种以醒目的黑白色皮毛和圆胖的身体为特征的熊科动物。“大熊猫”这个名字是为了将其与比邻而居的犬科动物小熊猫区别开来。尽管属于食肉目，但大熊猫是一种食叶动物，竹笋和竹叶占其饮食的99%以上。大熊猫通常是独居的。每只成年熊猫都有一片明确的领地，雌性熊猫不会容忍领地内的其他雌性熊猫。社会性互动主要发生在繁殖季节，在这个季节中，靠近的熊猫会聚集在一起。竹子的低营养含量意味着大熊猫需要更频繁地进食，因为没有天敌，它们可以在一天中的任何时间活动。"
 dubois.141.g: "不可思议。"
 dubois.142.t: "猩猩抵达"
 dubois.142.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 猩猩#!搬进了新的展区。"
 dubois.142.f: "猩猩是生活在印度尼西亚和马来西亚雨林中的大型类人猿。作为大型类人猿中树栖性最强的一种，猩猩大部分时间都在树上度过。它们有比例较长的胳膊和较短的腿，全身覆盖红褐色毛发。处于统治地位的成年雄性猩猩会长出独特的颊垫或耳翼，并发出长鸣叫声以吸引雌性并威慑竞争对手；年幼的从属雄性则没有这种特征，更类似于成年雌性。它们是大型类人猿中最喜独居的：社会联系主要在母猩猩和依赖他们的幼崽之间形成。猩猩是最聪明的灵长类动物之一。它们使用各种复杂的工具，并每天晚上用树枝和叶子构建精致的睡巢。"
 dubois.142.g: "一个枝节学者！"
 dubois.143.t: "孟加拉虎抵达"
 dubois.143.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 孟加拉虎#!搬进了新的展区。"
 dubois.143.f: "孟加拉虎是虎的指名亚种。它是当今世界上最大的野生猫科动物之一。孟加拉虎的皮毛呈黄色至浅橙色，带有从深褐色到黑色不等的条纹；腹部和四肢内部是白色的，尾巴呈橙色并有黑色的环纹。虎的基本社会单元由雌虎和她的幼仔组成。成年动物只在特殊条件允许的情况下暂时聚集在一起，比如食物供应丰富的时候。否则，它们会独自生活并狩猎森林和草原动物。在大多数情况下，虎会从侧面或背后接近猎物，尽可能靠近，然后用爪子抓住猎物的喉咙来击杀它。"
 dubois.143.g: "高贵。"
 dubois.144.t: "马来貘抵达"
 dubois.144.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 马来貘#!搬进了新的展区。"
 dubois.144.f: "马来貘是美洲以外现存的唯一一种貘科动物。它的特征很容易辨认，最明显的是从肩膀延伸到后躯的浅色斑块。它的身体被黑色的毛覆盖，耳朵的尖端除外，与其他貘类一样，它们的耳朵周围是白色的。这种斑纹是为了伪装：混乱的颜色使其轮廓更难以辨认；当它趴下睡觉时，其他动物可能会将之误认为是一块大石头而非猎物。马来貘的视力非常差，主要依赖嗅觉和听觉。"
 dubois.144.g: "异域风情。"
 dubois.145.t: "科莫多巨蜥抵达"
 dubois.145.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 科莫多巨蜥#!搬进了新的展区。"
 dubois.145.f: "科莫多巨蜥是一种巨蜥科巨蜥属动物，特有于印度尼西亚的科莫多岛、林查岛、弗洛雷斯岛和吉利莫塘岛。它是现存最大的蜥蜴物种，最大长度可达3米，体重高达70公斤。科莫多巨蜥凭借其体型成为顶级捕食者，主导了它们所生活的生态系统。科莫多巨蜥猎食并伏击猎物，包括无脊椎动物、鸟类和哺乳动物。科莫多巨蜥在捕猎中的群体行为在爬行动物中十分独特。它们的主要食物是爪哇鹿，虽然它们也吃相当多的腐肉。它们最早于1910年被西方科学家记录。它们巨大的体型和令人生畏的名声使其成为受欢迎的动物园展品。"
 dubois.145.g: "可怕。"
 dubois.146.t: "雪豹抵达"
 dubois.146.d: "我们的动物园增添了一种新的壮美动物：今天，期待已久的#O 雪豹#!搬进了新的展区。"
 dubois.146.f: "雪豹栖息于中亚及南亚的严寒高地。它身披烟灰色皮毛，拥有厚实的毛发、强健的四肢和用于保持平衡的长尾，完美适应山地环境。这种沉默寡言、行踪诡秘的大猫游荡在高山隘口间，捕食野生绵羊与山羊。与其他大型猫科动物不同，雪豹无法咆哮，而是通过嘶嘶声、低吼和哀怨的喵鸣进行交流。在中亚民间传说中长期被尊崇的雪豹，至今仍是自然与文化中一道幽灵般的存在。"
 dubois.146.g: "崇高。"
 dubois.147.t: "亚洲猎豹抵达"
 dubois.147.d: "我们的动物园增添了一种新的雄伟动物：今天，期待已久的#O 亚洲猎豹#!搬进了新的展区。"
 dubois.147.f: "亚洲猎豹是猎豹的极危亚种，曾广泛分布于中东至印度地区。其毛色较浅、体型更为纤细，仍保持着地球陆上最快哺乳动物的地位——爆发性冲刺会产生巨大体内热量。历史上印度贵族曾驯养它们用于狩猎，使其成为优雅与衰落的双重象征。如今仅存于伊朗的脆弱种群，亚洲猎豹成为栖息地消失的活体纪念碑。"
 dubois.147.g: "迅捷。"
 dubois.148.t: "小熊猫抵达"
 dubois.148.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 小熊猫#!搬进了新的展区。"
 dubois.148.f: "小熊猫是哺乳纲下的一个属，原产于喜马拉雅山脉东部和中国西南部，主要以竹子为食。与当代的推测不同的是，小熊猫与大熊猫的关系并不密切。从外形上看，它们与浣熊相似，但更瘦小。它们的皮毛长而柔软，上半部分呈红褐色至铜红色，有时还带有淡黄色，下半部分呈有光泽的黑色。脸部颜色各异——主要是红褐色，带有白色泪痕，口吻很短，漆黑的鼻子裸露。小熊猫是非常熟练的杂技攀爬者。它们在傍晚和晚上外出觅食，白天则通常伸展身体睡在树叉上，在树洞里蜷缩起来，把尾巴放在脸前保护自己。它们对热非常敏感；温度超过25摄氏度会让它们十分不适。"
 dubois.148.g: "这家伙可不好找到。"
 dubois.151.t: "绿蠵龟抵达"
 dubois.151.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 绿蠵龟#!搬进了新的展区。"
 dubois.151.f: "绿蠵龟是海龟科的一个大型物种。其背腹扁平的身体被水滴形状的巨大背甲覆盖；它有一对大大的桨状鳍。它通常呈浅色，尽管在东太平洋的种群中，背甲的部分有时几乎是黑色的。成年个体通常栖息在浅水的泻湖中，主要以各种海草为食。像其他海龟一样，绿蠵龟在觅食地和孵化滩之间迁徙很长的距离。全球许多岛屿因绿蠵龟在它们的海滩上筑巢而被称为“海龟岛”。绿蠵龟在野外可能会活到90岁。"
 dubois.151.g: "沧桑。"
 dubois.152.t: "巨型蝠鲼抵达"
 dubois.152.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 蝠鲼#!搬进了新的展区。"
 dubois.152.f: "巨大洋蝠鲼是鲼科的一种鳐鱼物种，也是世界上最大的鳐鱼。它分布广泛，通常生活在热带和亚热带水域，但也可以在温带水域找到。巨大洋蝠鲼的最大长度可以达到9米，翼盘直径可达7米，体重约为3000千克，但通常观察到的平均大小是4.5米。皮肤光滑，散布着锥形和脊状小疙瘩。背部表面的颜色是黑色、深褐色或钢蓝色，有时有一些淡色斑点，通常带有浅色的边缘。由于巨大的体型和速度，在危险情况下，蝠鲼几乎没有能够对其构成致命威胁的天敌。"
 dubois.152.g: "巨大。"
 dubois.153.t: "红大袋鼠抵达"
 dubois.153.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 红大袋鼠#!搬进了新的展区。"
 dubois.153.f: "红大袋鼠是所有袋鼠中最大的一种，也是澳大利亚本土最大的陆生哺乳动物和现存最大的有袋动物。它是一种体型非常大的袋鼠，长着尖长的耳朵和方形的口吻。在性别上有差异，雄性的毛发短而红褐色，下部和四肢淡褐色。雄性的头体长可达1.3‑1.6米，尾巴再增加1.2米的长度，澳大利亚人称其为“大红”。红袋鼠的腿运作方式类似橡皮筋，跟腱在动物着地时伸展，然后释放能量将动物向上和向前推动，从而实现特有的跳跃运动。它们的速度可以达到大约60公里/小时。"
 dubois.153.g: "令人惊叹。"
 dubois.154.t: "考拉抵达"
 dubois.154.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 考拉#!搬进了新的展区。"
 dubois.154.f: "考拉是一种原产于澳大利亚的树栖草食有袋动物。其粗壮、无尾的身体、大头、圆乎乎的耳朵和硕大的勺形鼻子使其相当容易辨认。毛色从银灰色到巧克力棕色不等。考拉通常栖息在开阔的桉树林地，因为这些树的叶子构成了它们大部分的食物。这种桉树的食物具有较低的营养和卡路里含量，含有毒素，阻止了大多数哺乳动物摄食。考拉大部分时间都很安静，一天可以睡上20个小时。它们是非社交性的动物，只在母亲和幼仔之间存在联系。由于其独特的外观，考拉和袋鼠被全球视作澳大利亚的象征。"
 dubois.154.g: "可爱。"
 dubois.155.t: "鸭嘴兽抵达"
 dubois.155.d: "我们的动物园增添了一种新的迷人动物：今天，期待已久的#O 鸭嘴兽#!搬进了新的展区。"
 dubois.155.f: "鸭嘴兽是五种现存的卵生哺乳动物之一。与其他卵生哺乳动物一样，它通过电感知来探测猎物。鸭嘴兽是极少数几种有毒哺乳动物之一，雄性鸭嘴兽后脚上有一只刺，能释放出一种能够引起人类严重疼痛的毒液。这种鸭嘴、鸟嘴、海狸尾巴、水獭脚的哺乳动物的独特外观让欧洲的博物学家们在首次见到它时感到困惑。1799年，首批对保存的鸭嘴兽尸体进行检查的科学家认为它是假的，是由几种动物缝在一起的。鸭嘴兽的独特特征使其成为进化生物学研究的重要对象，也成为澳大利亚的一个标志性象征。"
 dubois.155.g: "真是个悖论。"
 dubois.156.t: "鹤鸵抵达"
 dubois.156.d: "我们的动物园增添了一种新的卓越动物：今天，期待已久的#O 鹤鸵#!搬进了新的展区。"
 dubois.156.f: "鹤鸵是不会飞的鸟类，胸骨上没有龙骨。现存有三种鹤鸵。最常见的是南方鹤鸵，它是现存鸟类中第三高、第二重的鸟类，仅比鸵鸟和鸸鹋小。鹤鸵约90%的食物主要是水果，但所有种类都是机会性杂食动物。通常情况下，所有鹤鸵都是生活早深林中的害羞鸟类。善于在人类发现它们之前消声觅迹，但如果受到挑衅，它们能够对狗和人造成严重甚至致命的伤害。鹤鸵经常被称为“世界上最危险的鸟”。"
 dubois.156.g: "这顶帽子有什么用？"
 dubois.157.t: "新西兰海狮抵达"
 dubois.157.d: "我们的动物园增添了一种新的卓越动物：今天，期待已久的#O 新西兰海狮#!搬进了新的展区。"
 dubois.157.f: "新西兰海狮是世界上最稀有且分布最局限的鳍足类动物之一。雄性体型魁梧，披着深色鬃毛，体长可达2.45米；而体型较小的雌性则呈黄褐色，外形更为优雅。19世纪因捕猎濒临灭绝后，如今在保护措施下其种群正逐步恢复，尤其在偏远的奥克兰群岛。这种群居性海岸物种凭借强健的体格、丰富的表情和紧密的家庭纽带，成为兼具持久魅力与科研价值的研究对象。"
 dubois.157.g: "健壮。"
 dubois.200.t: "自然历史博物馆开幕"
 dubois.200.d: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]教授今天开放了自然历史博物馆，展示生物的发展进化历程。"
 dubois.200.f: "当[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]教授满怀自豪地宣布我国第首个自然历史博物馆开放时，有些人已经忘却了为推动这一项目所付出的努力。之前曾承载自然历史的国家博物馆与其领导一同反对这一举措。许多人仅仅将自然历史视作一个附属部门。[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]教授力挽狂澜，他在政府内部疏通关系，毫不妥协地推动了自己的理念。古生物学的研究将来会因此而受益匪浅，访客已经表现出了对已灭绝生物的浓厚兴趣，同时还询问了有关人类起源的问题。古生物学曾经只是地质学家的临时副业，现在拥有了自己的机构，并成为与其他自然科学平起平坐的确立学科。"
 dubois.200.g: "这听起来是一个值得参观的好地方！"
 dubois_natural_history_museum_modifier: "自然历史博物馆"
 dubois.201.t: "古生物学考察目的地"
 dubois.201.f: "[concept_dubois_paleontologist]可以被派往地层，在那里每年挖掘化石，直到被召回为止。大地层也可能包含恐龙骨骼。各大洲具有的恐龙各不相同。进入大地形的最简单方法就是控制相关省份。也可以通过古生物许可和平进入。"
 dubois.201.g: "下次吧。"
 dubois.202.t: "鲨齿化石"
 dubois.202.d: "在检查了岩层后，古生物考察队收集了一系列鲨鱼牙齿化石。"
 dubois.202.f: "除了脊椎骨，鲨鱼牙化石通常是已经灭绝的鲨鱼唯一保存下来的化石。由于鲨鱼具有不断替换的牙齿，这些是被发现最为普遍的化石之一。早在1616年，法比奥·科隆纳在他的论文中就指出，所谓的蝰蛇信子实际上是鲨鱼牙。鸦鲨具有扁平三角形的牙齿，最大可达三厘米长。切割边缘有细小的锯齿，类似今日的虎鲨。在白垩纪时期，鸦鲨属在全球范围内广泛分布。化石牙齿已在美洲、非洲、日本、澳大利亚、印度、俄罗斯、中东和欧洲的中生代沉积层中被发现。"
 dubois.202.g: "收藏中的精品。"
 dubois.203.t: "恐龙的足迹？"
 dubois.203.d: "[SCOPE.sCharacter('pb_leader').GetFullName]对[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]教授的最新发现提出了质疑。"
 dubois.203.f: "当[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]教授公布他在地层中的新发现时候，小市民的领袖也亲自到场观看了这一古生物学的轰动事件。然而，他对所谓的恐龙脚印却知之甚少。事实上，[SCOPE.sCharacter('pb_leader').GetFullName]解释说，他看不出这些奇怪的凹痕有什么特别之处。这位政治领袖的一己之见引发了与教授的全面争吵，教授要求他当场道歉。争吵很快演变成[SCOPE.sCharacter('pb_leader').GetLastName]的支持者和[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]教授的学者同僚之间的冲突。"
 dubois.203.g: "这些毫无疑问是恐龙足迹。"
 dubois.203.h: "这些凹痕可以是随便什么东西。"
 dubois.204.t: "古新诺兽"
 dubois.204.d: "科学家最近发现了早期哺乳动物的骨骼。这是一个保存特别完好的例子。"
 dubois.204.f: "古新诺兽是已灭绝的大古猬科下的一个属。这些动物类似于今天的食虫动物，生存于约5900万到4800万年前的后古新世到前始新世。其主要证据来源于北美，偶尔也出现在欧洲。重要的发现，包括一些来自美国西北部的完整骨骼化石。约5200万年前的绿河组化石坡段以及地层稍旧的威尔伍德组都是非常杰出的产地。古新诺兽属以结实的体格和长尾巴为特征。相对较长的后腿与较短的前腿在外貌上较为原始。由于体型，人们推测这些动物是半水生生活方式，而牙齿结构则表明它们主要以动物为食。因此，古新诺兽属似乎曾栖息在与今天的水獭相似的栖息地中。"
 dubois.204.g: "一个极具启发性的标本。"
 dubois.204.h: "送给同事的合适礼物"
 dubois.205.t: "矿井里的骨头"
 dubois.205.d: "[SCOPE.sState('dubois_excavation_state').GetName]的矿工们发掘出一种史前物种的骨骼化石。[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]教授已被召集前来展开研究。"
 dubois.205.f: "在矿井内发现骨骼引发了复杂反应。古生物学家迫切希望展开科学发掘，而矿场管理层则担忧作业中断。[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]教授判定规范发掘需暂时停止采矿，这引发了实业家们的抗议。该发现随即成为公众关注焦点，学术界主进行科研调查。有人提议折中方案——仅作记录而不发掘——以避免阻碍工业运作，但此举将无法直接获取化石标本。"
 dubois.205.g: "这些化石必须为科学研究妥善保存。"
 dubois.205.h: "仅允许粗略检查。"
 dubois.205.i: "让矿工们不受干扰地继续工作。"
 dubois.206.t: "接合贝"
 dubois.206.d: "今年,[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]在[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]教授带领下在位于[SCOPE.sState('dubois_excavation_state').GetName]的发掘场地发现了一些特别漂亮的接合贝标本。"
 dubois.206.f: "接合贝是一种已灭绝的腕足属动物，生活在泥盆纪晚期至二叠纪晚期。接合贝的外壳光滑，有或多或少明显的褶皱和凹槽，在腕足阀上有一个圆形的梗口供腕足移动。接合贝被列入无窗贝目无窗贝科下的旋珠贝亚科。只有无知者才会将这历史悠久的古老化石视为一个平平无奇的贝壳。"
 dubois.206.g: "那可真的……令人激动。"
 dubois.207.t: "三叶虫"
 dubois.207.d: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]教授今天向古生物收藏馆捐赠了一个极好的三叶虫标本。它大约有4亿年的历史，具有极高的科学价值。至少他是这么说的。"
 dubois.207.f: "三叶虫是一类已经灭绝的海生节肢动物。它们存在于几乎整个古生代，从5亿2100万年前的寒武纪二叠纪开始，直到2亿5100万年前泥盆纪末期的大规模物种灭绝事件。大量覆盖着方解石的三叶虫外骨骼化石得以保存下来，使我们能够重建这一物种不同种类的进化和形态特征。加之它们在地层中持续存在的特征和广泛的地理分布，使三叶虫成为古生代特别是寒武纪的重要指标化石。已灭绝的三叶虫门包含9个确认的目，超过150个科，5000多个属以及超过15000个种。"
 dubois.207.g: "谢谢你，教授。"
 dubois.208.t: "菊石"
 dubois.208.d: "在[SCOPE.sState('dubois_excavation_state').GetName]发现的菊石化石进一步丰富了我国古生物标本的收藏。"
 dubois.208.f: "菊石是一种已灭绝的头足纲动物。这个类群非常多样，已知的属超过1500个。种的数量可能在3万到4万之间。成年动物壳的大小通常在1到30厘米范围内。从它们在泥盆纪早期首次出现，到白垩纪末期(白垩‑第三纪界线)灭绝，菊石在约3.5亿年的时段内成为了标准化石;在一定程度上，海相沉积层的年代划分完全依据菊石进行。因此，它们对地质学和古生物学非常重要。菊石这个分类名词首次是在1884年由卡尔·阿尔弗雷德·冯·齐特尔在他的《古生物学手册》中提出的。这个名称来源于古代，老普林尼就曾提到过这些化石，称之为“阿蒙的犄角”(Ammon's horns)。"
 dubois.208.g: "为博物馆预留一件。"
 dubois.209.t: "植物化石"
 dubois.209.d: "[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]在采石场中发现了距今数百万年的植物化石。"
 dubois.209.f: "在石炭纪（距今约3.6亿至3亿年），巨大的蕨类植物（形态远较今时庞大，常称为树蕨类）与马尾草、狼尾草共同构成了辽阔的森林，这些植物群落为现今煤矿的形成奠定了基础。最古老的蕨类化石可以追溯至早泥盆纪（约4亿年前），因此蕨类植物可能比种子植物更加古老——最早的种子植物化石直到晚泥盆纪才首次被发现。"
 dubois.209.g: "工业革命的基石。"
 dubois.210.t: "恐龙蛋"
 dubois.210.d: "曾被误认为石块的物体，经仔细检查后证实是化石蛋——几乎可以确定属于某种恐龙物种。"
 dubois.210.f: "1859年，第一批科学记载的恐龙蛋化石，是由一位名叫让‑雅克·普埃赫的天主教神父兼业余博物学家在法国南部发现的。不过他当时认为这些是某种巨型鸟类下的蛋。直到1923年，美国自然历史博物馆的一个挖掘团队在蒙古寻找早期人类遗址时，意外发现了第一批被科学界公认的恐龙蛋化石。这些蛋起初被误认为是当地大量存在的草食恐龙原角龙下的，后来证实其实是属于窃蛋龙。在随后的年代，世界各地继续发现大量恐龙蛋化石，导致多个竞争的分类方案出现。"
 dubois.210.g: "我们务必谨慎处理这些事务。"
 dubois.211.t: "恐龙挖掘"
 dubois.211.d: "在调查一处大地层时，[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]教授偶然取得了轰动得发现：一块恐龙骨骼！[concept_dubois_paleontologist]立即安排开始全面的挖掘工作，希望能找到更多的碎片。"
 dubois.211.f: "“这些特征的组合，有些，如脊椎骨，在爬行动物中是完全独特的，而其他一些则是从现在互不相干的动物群中借鉴而来，而且这些特征都表现在远远超过现存最大爬行动物体型的生物身上，据此我认为足以为建立一个独特的蜥脚类爬行动物分类或亚目提供足够的理由，我提议将其命名为恐龙（Dinosauria）。” ——理查德·欧文"
 dubois.211.g: "拿起铲子！"
 dubois.213.t: "化石碎片"
 dubois.213.d: "在恐龙挖掘现场，科学家发现了一些小块的化石。"
 dubois.213.f: "“这或许并非我们追寻的奖赏，但每一块碎片都让我们更接近真相。”——[SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]"
 dubois.213.g: "收集化石！"
 dubois.214.t: "恐龙骨骼"
 dubois.214.d: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]教授的科学团队在恐龙挖掘现场取得了新的发现。"
 dubois.214.f: "“当我看到一根骨头或者只是一片骨骼时，我就认出并且重建了它所来自的整体的一部分。这块碎片所属的整体出现在我的脑海中。”——乔治·居维叶"
 dubois.214.g: "又收藏了一块骨骼。"
 dubois.215.t: "恐龙头骨"
 dubois.215.d: "恐龙发掘坑中出土了一个雄伟的头骨。"
 dubois.215.f: "“头部的长度相当于一只成年灰熊的头部甚至更长，而颚部与长度相比更深。嘴比斗牛犬更短更深。牙齿都是锋利的圆柱形尖牙，光滑而闪亮，并且大小不规则。牙齿在每个颚骨的一定距离处从牙龈上方伸出三英寸，深入颚缘一英寸，因此与老虎的獠牙一样长但更细。两只这样的尖牙在每侧的正中交叉。除了较小的鱼类，毫无疑问爬行动物也满足它的胃口需求。”\n——爱德华·德林克·科普"
 dubois.215.g: "惊人的发现！"
 dubois.216.t: "恐龙骨架"
 dubois.216.d: "通过艰苦的工作，[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]成功为一具令人印象深刻的恐龙骨架揭幕，其中一些骨骼保存得特别良好。"
 dubois.216.f: "“据此进行复原得附加在费城科学院的博物馆里进行了展示，当科普教授向我展示它并解释其特点时，我注意到椎骨的关节连接被颠倒了，并委婉地提出他把整件事搞错了。他非常气愤，并以强烈的措辞断言他已经研究了这种动物好几个月，至少应该知道哪一端是头哪一端是尾。”——奥塞内尔·查利斯·马什"
 dubois.216.g: "有趣。"
 dubois.220.t: "发掘结束"
 dubois.220.d: "[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]结束了现场的恐龙挖掘。一次重要的科学调查结束了。"
 dubois.220.f: "“化石猎人首先必须是科学的狂热者。他必须愿意忍受各种困难，忍受初春、深秋和初冬的寒冷，忍受夏季月份的酷热和刺眼的阳光，他必须做好和喝碱水的准备，在某些地区还必须抵御蚊子和其他害虫的袭击。他必须在一定程度上具备工程师的素质，以便能够处理大块的石头，并将它们运送到最近的装运点，穿越荒芜的沙漠。他必须具备细致熟练的技巧，保存断裂的最小骨片；他必须安贫乐道，因为这个职业很少甚至几乎得不到公平的报酬；他必须将发现的感觉视为最大的回报和动力，向从未谋面的博物馆送递标本，为了那些几乎不了解或不欣赏化石猎人所作出的牺牲的公众的利益而奋斗。” ——亨利·费尔菲尔德·奥斯本"
 dubois.220.g: "我期待着展出一具新的恐龙骨架——最终。"
 dubois.221.t: "真掌鳍鱼"
 dubois.221.d: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]教授发现了一种稀有的史前鱼类，可能代表海洋动物向陆地进化的第一步。"
 dubois.221.f: "真鳍鱼属是一属已经灭绝的肉鳍鱼，生存在泥盆纪晚期的北美洲和欧洲。它被认为是四足形类的早期代表之一。真鳍鱼除了鳃外，还具有肺，游泳鱼浮袋器官和强健的鳍鳞骨骼，因此有可能短时间离开水面生存。在前鳍的骨骼中，可以分辨出陆生脊椎动物的三个末端骨头——上臂骨、尺骨和桡骨。两个尖锐的背鳍位于非常后方，与它们的腹鳍和臀鳍相对。"
 dubois.221.g: "一个显著的进化关联。"
 dubois.222.t: "始祖鸟"
 dubois.222.d: "在索尔恩霍芬附近的巴伐利亚石灰岩山区进行发掘时，[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]教授取得了惊人的发现，引起了科学界的轰动——一块可能填补爬行动物与鸟类之间进化空白的化石。"
 dubois.222.f: "始祖鸟是最著名的过渡化石之一，可追溯至侏罗纪晚期。它拥有带羽毛的翅膀、牙齿和长长的骨质尾巴，兼具鸟类和爬行动物的特征。这一发现为达尔文的进化论提供了有力证据，表明鸟类是从小型兽脚类恐龙演化而来的。"
 dubois.223.t: "大地懒"
 dubois.223.d: "在一次古生物调查中，[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]教授的团队找到了一种巨型树懒的骨骼。"
 dubois.223.f: "大地懒是巨型地懒的一个属，它们曾漫步于南美洲，直到约一万年前才灭绝。这些行动缓慢的草食动物体型可达大象级别，通过拔起树木和挖掘根系塑造了它们的生存环境。它们的灭绝与气候变化和人类活动有关。"
 dubois.224.t: "鱼龙"
 dubois.224.d: "古生物发掘负责人报告发现了一种既像鱼又像海豚的史前爬行动物。"
 dubois.224.f: "鱼龙是一种生活在侏罗纪时期的海洋爬行动物，适应了远洋生活。它拥有流线型的身体、长吻部和大眼睛，使其成为高效的捕食者。与大多数爬行动物不同，鱼龙是胎生动物，其与现代海豚的趋同进化现象令人瞩目。"
 dubois.225.t: "刃齿虎"
 dubois.225.d: "自然历史部门将会为此骄傲：我们的古生物学家显然发现了一种牙齿如剑刃的老虎骨架。"
 dubois.225.f: "剑齿虎是更新世时期美洲地区一种令人生畏的掠食者。它修长的犬齿和强壮的体格使其成为顶级肉食动物。从沥青坑中发现的化石揭示了它们的群居习性，以及与其它冰河时代巨型动物之间激烈的遭遇。"
 dubois.226.t: "翼手龙"
 dubois.226.d: "新近发现的小型翼龙骨骼令科学界欣喜若狂。它们已经被送往古生物收藏馆。"
 dubois.226.f: "翼手龙是最早的翼龙之一，属于侏罗纪晚期的飞行爬行动物。其翼展可达1.5米，常在沿海泻湖上空翱翔，捕食鱼类和小型动物。它的发现为确立史前生物多样性及飞行演化研究作出了重要贡献。"
 dubois.227.t: "鱼石螈"
 dubois.227.d: "飞艇着陆时，探险队在永冻冰川上发现了一块非同寻常的化石，它可能会彻底改变古生物学的面貌。化石很快被送到了我国著名的古生物学家[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]教授手中。据说它是鱼类和陆地动物之间缺失的一环！"
 dubois.227.f: "鱼石螈是泥盆纪晚期已知最早的四足动物之一。其强壮的四肢和肺部标志着从水生到陆生进化过程中的关键阶段。化石显示出鱼类与两栖类特征的混合，揭示了脊椎动物陆地生命的起源。"
 dubois.301.t: "植物学探险目的地"
 dubois.301.d: "我们的博物学家[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授在做临行前的最后准备，他应当启程前往哪里？"
 dubois.301.f: "[concept_dubois_naturalist]可以被派往雨林，他每年在那里寻找新的标本，直到被召回。在亚马逊、刚果、婆罗洲和印度支那，拥有雨林的省份由省份修正表示。进入雨林的最简单方法是控制相关省份。然而，也可以通过植物学许可和平地获得通行权。"
 dubois.301.g: "前往亚马逊。"
 dubois.301.h: "前往刚果。"
 dubois.301.i: "前往婆罗洲。"
 dubois.301.j: "前往印度支那。"
 dubois.302.t: "亚马逊王莲"
 dubois.302.d: "在植物学探险中，[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授发现了一种前无古人的巨大睡莲。"
 dubois.302.f: "亚马逊王莲，又名亚马逊大睡莲，是睡莲科睡莲属的一个植物物种。它原产于亚马逊河流域的浅水区，如牛轭湖和河汊。它以英国女王维多利亚的名字命名。沉水叶柄长7到8米。浮叶的边缘高约6厘米，有两个相对的切口。这些切口可确保叶片边缘在剧烈运动时不会撕裂，也可确保大雨过后多余的水能轻松排出。在自然界中，每片叶子的直径可达3米，而植物园中的植物叶子直径通常不超过2米。"
 dubois.302.g: "这个标本将在我们的展览中大放异彩。"
 dubois.302.h: "对标本进行编目与研究以用于科学目的。"
 dubois.303.t: "皇蛾"
 dubois.303.d: "虽然探险队的本意是寻找植物，但当[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授在雨林中遇到一群壮观的飞蛾时，他还是无法掩饰自己对昆虫学的偏好。"
 dubois.303.f: "皇蛾是天蚕蛾科的一种蝴蝶（蛾）。它是世界上最大的蝴蝶之一，以希腊神话中的泰坦巨人阿特拉斯命名。雌性比雄性大。法加拉丝绸就是由阿特拉斯蛾的茧制成。它呈浅棕色，比普通蚕丝要结实得多。"
 dubois.304.t: "巨花魔芋"
 dubois.304.d: "在印度尼西亚，[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授发现了一株巨大的疆南星属植物，也许是世界上最大的花。博物学家大喜过望，但探险队的其他成员却对难闻的气味抱怨不休。"
 dubois.304.f: "魔芋属包含200多个物种，分布在在从新几内亚到西非的旧大陆热带雨林中。巨花魔芋是植物界最大的不分枝花序。这种花有三米多高，闻起来像腐肉，会产生高达37°C的热量，因此会吸引甲虫来授粉。巨花魔芋壮观的花期是世界各地植物园的一大亮点。"
 dubois.305.t: "大角金龟"
 dubois.305.d: "[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]发现了大角金龟，这让他从植物学搜寻中暂时抽身。"
 dubois.305.f: "大王花金龟是花金龟亚科中的一个甲虫属。以体型、体积和重量衡量，大王花金龟是地球上最大的昆虫之一。大王花金龟的幼虫重达110克，是所有昆虫中最重的。死虫很受收藏家欢迎，在市场上价格不菲。"
 dubois.306.t: "新种兰花"
 dubois.306.d: "植物探险队在热带雨林深处发现了多个兰花新品种，并进行了编目。"
 dubois.306.f: "没有其他哪个植物科能像兰科一样拥有如此丰富的花形和花色。每朵花的大小从几毫米到20厘米不等，甚至更大。颜色范围从柔和的白色、绿色和蓝色到鲜艳的红色和黄色。许多兰花都是多色的。兰科是仅次于菊科的第二大开花植物科。植物学家已确认约有1000个属，15000至30000个种。"
 dubois.306.g: "更多的标本没有坏处。"
 dubois.307.t: "雨林疗法"
 dubois.307.d: "热带雨林研究考察队发现了一些可能具有药用价值的神奇草药。"
 dubois.307.f: "许多药物都有被作为草药的背景，准确地说，有一半以上的植物都是如此。例如，柳树皮含有水杨苷，这是现代阿司匹林的前身，几个世纪以来一直用于缓解疼痛和退烧。雨林中丰富的植物群可能还蕴藏着新的治疗方法，等待着被习得和理解。"
 dubois.307.g: "分析植物以进行科学研究。"
 dubois.307.h: "采集草药以备后用。"
 dubois.308.t: "神秘绽放"
 dubois.308.d: "植物探险队在探索热带雨林的一个未知区域时，发现了许多不知名的花朵。"
 dubois.308.f: "尽管这些植物很美，但是[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName]考察队队长在采摘之前还是犹豫不决。当地人认为这些植物受到了诅咒；这表明它们可能有毒。他想法是让助手们集体采摘这些植物，而不考虑将来对他们健康的影响。当然，[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授也可以先研究并采集这些植物，但这也会带来未知的后果。"
 dubois.308.g: "探险队员应采集这些花朵。"
 dubois.308.h: "让探险队长收集并研究那些花朵。"
 dubois.308.i: "不要碰这些花。"
 dubois.309.t: "在野党质疑植物考察队"
 dubois.309.d: "[SCOPE.sCharacter('dubois_sceptical_leader').GetLastName]认为植物学探险是对税金的无用浪费，这些钱用在其他地方会更好。"
 dubois.309.f: "“又一支探险队？先是飞艇，然后是太平洋，现在又轮到植物学家在丛林里跋涉。考古学家、古生物学家、动物学家什么时候才是个头？这纯粹是官僚主义的过度扩张！”"
 dubois.309.g: "立刻召回[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授。"
 dubois.309.h: "我们不应该把科学政治化。"
 dubois.310.t: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName]生病！"
 dubois.310.d: "[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授在雨林中进行植物学工作时不幸中毒。严重的疾病使他被迫暂停工作。"
 dubois.310.f: "如果我们的博物学家生病了，他就会被困在植物考察队中而无法召回。在生病期间，他不会寄回任何新标本。"
 dubois.310.g: "事态变得棘手起来。"
 dubois.311.t: "异国种子"
 dubois.311.d: "在植物学探险期间，[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授发现了一些特殊的种子，具有重大的科学和农业意义。"
 dubois.311.f: "近代早期，世界不同地区之间的农作物交换已经很正常。例如地中海地区的甘蔗就在南美洲得到广泛种植。反之，英格兰人亨利·威克姆于1876年从巴西将橡胶种子走私到亚洲。"
 dubois.311.g: "这些种子在科学收藏中将大有作为。"
 dubois.311.h: "将新种子引入农业。"
 dubois.1000.t: "动物狂欢节"
 dubois.1000.d: "最近，我们的作曲家在参观动物园时，受到狮子、大象、袋鼠和乌龟的启发，创作了一部幽默的小品，并命名为 《动物狂欢节》。"
 dubois.1000.f: "《动物狂欢节》，副标题为《动物园大幻想曲》，是由卡米尔·圣桑于1886年1月在奥地利的一个小村庄中创作的。在这里他用了几天时间将早期的《狂欢节》草稿进行了加工，这些草稿可以追溯到他在巴黎一家私立音乐学校担任教师时的时期，当时他受到亚里斯蒂德·迪切斯（1861/1865）的委托，在那里教授音乐模仿课程，圣桑被他的学生说服，将他许多幽默音乐作品的其中一个想法变为现实。然而，由于担心自己的声誉，圣桑决定不将这部作品作为室内乐出版。因为作曲家除了在作品中通过乐器模仿动物的叫声外，还模仿了一些他的专业同行。虽然这些作曲家当时已经去世了，但圣桑不想惹恼他们的崇拜者。这部作品直到后来由出版商雅克·杜朗在圣桑去世后才发表出版。"
 dubois.1000.g: "这是动物园交响曲吗？"
