 dubois.2171.h: "蛇颈龙"
 dubois.2171.i: "龙王鲸"
 dubois.2171.j: "巨齿鲨"
 dubois.2173.t: "蛇颈龙"
 dubois.2173.f: "蛇颈龙属是种大型的海生爬行动物，属于鳍龙超目，存在于早期的侏罗纪，身长约3到5米。在德国与英国的里阿斯统发现了接近完整的骨骸，在西欧地区发现较多。它们的特色在于小头、细长的颈部、像乌龟般宽阔的身体、短尾巴，与两对大且长的鳍状肢。它的名字后来成为蛇颈龙目的名称来源，但蛇颈龙本身年代相当早，是该目典型的属。\n蛇颈龙经常被描绘成和翼手龙争抢鱼肉的形象，但实际上它生存的年代比翼手龙要早很多，两者不可能相遇。"
 dubois.2174.t: "龙王鲸"
 dubois.2174.f: "龙王鲸，已经绝种的古代海洋哺乳动物，现代鲸鱼的近亲，是鲸下目中的一个属，生存于4000万至3500万年前的始新世晚期。\n\n龙王鲸刚开始被误认为是巨大的海洋爬虫类的化石，所以被命名为帝王蜥蜴。它最早是在美国路易斯安纳州被发现的，随后古生物学家从埃及与巴基斯坦发现的化石中辨认出至少存在一个其他的种。"
 dubois.2175.t: "巨齿鲨"
 dubois.2175.f: "巨齿鲨是耳齿鲨科拟噬人鲨属已灭绝的史前鲨鱼，也是已知体积最大、咬合力最大的顶级海洋掠食者。成熟的成年巨齿鲨平均长度为16米，最长或可达25米；体重在30至60吨之间。其身体呈鱼雷形，有圆锥形的鼻子，巨大的胸鳍和背鳍，以及强有力的新月形尾巴。 该物种拥有强大的咬合力，其下颌力量足以压碎一辆小型汽车。"
