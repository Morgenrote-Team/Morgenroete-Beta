 dubois.2001.f_paleontologist: "我们的收藏现由[concept_dubois_paleontologist][ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]管理。其中包括：\n\n#G [ROOT.Var('dubois_fossil').GetValue]件#!@dubois_fossil!化石\n\n#G [ROOT.Var('dubois_special_fossil').GetValue]件#!@dubois_special_fossil!特殊化石\n\n#G [ROOT.Var('dubois_human_fossil').GetValue]件#!@dubois_human_fossil!人类化石\n\n#G [ROOT.Var('dubois_dinosaur_bone_total').GetValue]件#!@dubois_dinosaur_bone!恐龙骨骼\n\n#G [ROOT.Var('dubois_dinosaur_skeleton').GetValue]具#!@dubois_dinosaur_skeleton!恐龙骨架\n\n所有正在展出的#T 恐龙骨架评级#!为[ROOT.Var('dubois_dinosaur_rating').GetValue]。"
 dubois.2001.f_no_paleontologist: "我们的收藏目前#R 无人#!管理。其中包括：\n\n#G [ROOT.Var('dubois_fossil').GetValue]件#!@dubois_fossil!化石\n\n#G [ROOT.Var('dubois_special_fossil').GetValue]件#!@dubois_special_fossil!特殊化石\n\n#G [ROOT.Var('dubois_human_fossil').GetValue]件#!@dubois_human_fossil!人类化石\n\n#G [ROOT.Var('dubois_dinosaur_bone_total').GetValue]件#!@dubois_dinosaur_bone!恐龙骨骼\n\n#G [ROOT.Var('dubois_dinosaur_skeleton').GetValue]#!组@dubois_dinosaur_skeleton!恐龙骨架\n\n所有正在展出的#T 恐龙骨架评级#!为[ROOT.Var('dubois_dinosaur_rating').GetValue]。"
