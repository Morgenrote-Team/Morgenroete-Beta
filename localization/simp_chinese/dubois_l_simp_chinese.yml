 dubois.1069.t: "水豚展区"
 dubois.1069.d: "水豚的围栏中，一片郁郁葱葱的草地环绕着一个宽阔的池塘。你立刻注意到，这些温顺的大型啮齿动物，有几只正懒洋洋地躺在水边，另一些则悠闲地在浅水中踱步。它们从容不迫的姿态和紧密的群体互动立刻吸引了游客的注意力。"
 dubois.1069.f1: "在阳光斑驳的水豚围栏中，一小群水豚聚集在水边，有些懒散地咀嚼着青草，有些则躺在树荫下休息。它们安静祥和且充满社交性的行为迅速成为游客关注的焦点。出于对它们生活方式的好奇，你走近一位动物管理员，试图了解更多信息。\n“水豚是高度社交的动物，”动物管理员解释道，“它们总是以群体形式生活，有时群体规模可以达到20只甚至更多。独自行动的情况非常罕见。它们之间紧密的社交纽带对生存至关重要，不仅能帮助它们抵御捕食者，还能维持稳固的家庭结构。它们通过多种声音进行交流，比如咕噜声和口哨声，以保持彼此的联系。”"
 dubois.1069.f2: "在热闹的水豚栖息地中，一只特别活跃的水豚缓缓走入池塘，将身体浸入水中，只露出鼻子在水面上呼吸。其他水豚很快跟随它，兴奋地在水中戏水溅花。这些大型啮齿动物游泳的场景充满活力，让游客们着迷不已。你对它们的这一行为产生了兴趣，于是向动物管理员了解详情。\n“水豚是半水栖动物，也是出色的游泳高手，”动物管理员说道，“它们在水中花费大量时间，这不仅帮助它们调节体温，还能在遇到捕食者时快速逃脱。它们甚至可以在水中睡觉，只露出鼻子呼吸。对水的这种亲近感是它们生活中不可或缺的一部分，也是它们感到最安全、最舒适的地方。”"
 dubois.1069.f3: "当你继续观察水豚群体时，突然注意到一阵动静。一只年轻的水豚发现了一片鲜嫩的青草，兴奋地埋头大口啃食。其他水豚立刻围了过来，一起享用这块特别的“美食”。这种群体觅食的场景充满温馨，让人不禁微笑。出于对它们饮食习惯的好奇，你再次向动物管理员询问。\n“水豚是严格的食草动物，它们经常花费大量时间一起觅食，”动物管理员解释道，“它们主要以草类和水生植物为食，并且愿意与其他成员分享食物。水豚拥有独特的消化系统，可以充分提取纤维丰富的食物中的营养，有时还会对食物进行二次消化，以确保摄取足够的养分。它们这种群体觅食的习惯，不仅强化了社交纽带，也帮助群体保持和谐与稳定。”"
