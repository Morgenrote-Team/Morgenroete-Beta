 dubois_extend_zoo_small_decision: "[concept_dubois_zoo]（小型扩建）"
 dubois_extend_zoo_small_decision_desc: "[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]可以在动物园里安家，科学家可以继续动物研究，而那些能够展示尽可能多的外来动物的国家则会获得国际名望。每次扩建，名望都会提高。扩建不仅需要收集许多动物，还需要从世界各地收集动物。"
