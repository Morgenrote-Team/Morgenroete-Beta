 dubois.1041.capybara: "参观#o 水豚#!"
 dubois.1302.capybara: "水豚"
 dubois.118.t: "水豚"
 dubois.118.d: "我们的动物园增添了一种新的珍稀动物：今天，期待已久的#O 水豚#!搬进了新的展区。"
 dubois.118.f: "水豚是世界上体型最大的啮齿类动物，产于南美洲。它的脚有蹼，过着半水栖的生活，在湿地和河岸边繁衍生息。水豚是一种高度社会化的动物，通常一个水豚社会有10到20只成员。它们主要以青草和水生植物为食，以性格温顺而著称。尽管体型庞大，但它们却是游泳健将，能潜入水中避开捕食者。"
 dubois.118.g: "好大一只几内亚猪！"
 visit_capybara_tt: "你将参观#o 水豚#!展区"
