 dubois.2021.t: "特殊化石"
 dubois.2021.d: "这里收藏了迄今为止发现的最为奇特的化石。"
 dubois.2021_amber: "#T 琥珀#!\n这种树脂保存了几百万年前的昆虫。\n"
 dubois.2021_ammonite: "#T 菊石#!\n在长达3.5 亿年的时间里，数万种菊石塑造了海洋。\n"
 dubois.2021_archaeopteryx: "#T 始祖鸟#!\n这种“最早的鸟”被一些科学家视作爬行类与鸟类之间可能的连接。\n"
 dubois.2021_composita: "#T 接合贝#!\n接合贝是一种广泛分布的物种，生活在泥盆纪晚期到二叠纪晚期。\n"
 dubois.2021_eusthenopteron: "#T 真掌鳍鱼#!\n这种鱼类可能在干燥河床上幸存下来，因此被视作迈向两栖动物的第一步。\n"
 dubois.2021_ichthyosaurus: "#T 鱼龙#!\n这种爬行动物不仅与海豚十分相似，而且还是胎生的。\n"
 dubois.2021_ichthyostega: "#T 鱼石螈#!\n可能是爬行动物和鸟类之间缺失的联系。\n"
 dubois.2021_megatherium: "#T 大地懒#!\n居住在地面上的巨大树懒。不幸已经灭绝。\n"
 dubois.2021_pterodactylus: "#T 翼手龙#!\n一种可能生活在海岸上的小型短尾翼龙。\n"
 dubois.2021_smilodon: "#T 刃齿虎#!\n最著名的尖牙掠食者之一。\n"
 dubois.2021_trilobite: "#T 三叶虫#!\n这些节肢动物的大量出现和分层使它们成为古生代的重要标准化石。\n"
 dubois.2041.t: "恐龙骨骼"
 dubois.2041.d: "在这里，可以根据化石重建恐龙骨骼，也可以将恐龙骨骼构建成恐龙骨架。"
 dubois.2041.f: "如果有五块来自同一大陆的恐龙骨骼，一位[concept_dubois_paleontologist]可以重建一只完整的恐龙。经验丰富的古生物学家也也可以尝试使用20块化石碎片重建一块恐龙骨骼。只有在拥有一块恐龙骨骼作为参考的前提下才能重建恐龙骨骼。要执行任何一项操作，古生物学家都不能处于劳累或忙碌状态。成功概率在很大程度上取决于古生物学家的经验。\n\n#G [ROOT.Var('dubois_north_american_dinosaur_bone').GetValue]#!块北美洲恐龙骨骼\n#G [ROOT.Var('dubois_south_american_dinosaur_bone').GetValue]#!块南美洲恐龙骨骼\n#G [ROOT.Var('dubois_european_dinosaur_bone').GetValue]#!块欧洲恐龙骨骼\n#G [ROOT.Var('dubois_african_dinosaur_bone').GetValue]#!块非洲恐龙骨骼\n#G [ROOT.Var('dubois_asian_dinosaur_bone').GetValue]#!块亚洲恐龙骨骼\n#G [ROOT.Var('dubois_australian_dinosaur_bone').GetValue]#!块澳洲恐龙骨骼"
 dubois.2041.g: "用化石重建恐龙骨骼。"
 dubois.2042.t: "恐龙骨骼重建"
 dubois.2042.d: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName]教授取得了彻底的成功：在科学知识的帮助下，他利用化石碎片重建了恐龙骨骼。"
 dubois.2042.f: "这是一个令人兴奋的拼图游戏，但与我们[concept_dubois_paleontologist]高超的技能相比完全是小问题。经过几个月的研究和复杂组合，他成功地从火柴棍大小的化石残骸中重建了骨骼碎片，从而找到了一个恐龙物种的关键部位，而在此之前，人们对这个物种的了解仅限于散乱的骨头。"
 dubois.2042.g: "棒极了！"
 dubois.2043.t: "困惑的教授"
 dubois.2043.d: "尝试了几个月，[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName]教授还是无法用他的材料得出任何结果。对化石来说太遗憾了！"
 dubois.2043.f: "这部分又应该属于哪里？那部分呢？但是，如果这一部分属于这里，那么另一部分就不合适了。最后，[concept_dubois_paleontologist]受够了。他整晚绞尽脑汁，但无法也不可能从目前发现的物品中获得有用的知识，得出恐龙骨架的原貌。"
 dubois.2043.g: "教授浪费了我们的化石！"
 dubois.2044.t: "完美组装的骨架"
 dubois.2044.d: "我们的[concept_dubois_paleontologist]完成了令人惊叹的工作，将骨架组合在一起，为自然历史收藏增添了一件引人注目的展品。"
 dubois.2044.f: "当教授向公众展示新组装的恐龙骨架时，展览现场响起了雷鸣般的掌声。这一壮举解决了困扰专家多年的难题，展示了解读恐龙骨骼的全新方法。与会的国际古生物学家们纷纷向教授请教，并希望以相同方式在自己的收藏中建立类似的发现。有些人甚至称[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]为拼图天才，因为他成功地做到了别人耗费了数十年时光的事情。"
 dubois.2044.g: "干得好，[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName]教授。"
 dubois.2045.t: "不完美组装的骨架"
 dubois.2045.d: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName]教授竭尽全力，但不幸的是组装起来的恐龙骨架有些许错误。"
 dubois.2045.f: "当新的恐龙骨架在自然历史展览中展出时，现场响起了礼貌但相当克制的掌声。虽然这位国内顶尖的古生物学家已经试尽一切办法，但同行还是在布展当天发现了一些瑕疵，给展览蒙上了一层阴影。尽管如此，这具骨架还是称得上差强人意，而且应该会丰富展览的内容，即使在未来还需要进行修整。"
 dubois.2045.g: "管用了，对吧？"
 dubois.2046.t: "组装不良的骨架"
 dubois.2046.d: "由[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]拼凑出的骨架让专家们……大吃一惊，但并非以古生物学会期待的方式。"
 dubois.2046.f: "这是一个令人难忘的日子，只是事件的离奇性质更让人难以忘怀。[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName]教授揭开了油布下新恐龙骨架的面纱，他的手势十分夸张，期待着雷鸣般的掌声。但结果却是：一片寂静。接着是窃窃私语。然后是哄堂大笑。在场的研究人员面带微笑，其他人则兴奋起来，直到最后，一位同事半笑半难以置信地指着这个拼凑起来的嵌合体叫道：“那是三个头的恐龙吗？”"
 dubois.2046.g: "开玩笑吧！"
 dubois.2051.t: "恐龙骨架"
 dubois.2051.d: "恐龙骨架是每一个自然历史展览的骄傲。完美组装的恐龙骨架会对我们的恐龙评级产生积极影响。"
 dubois.2051.f: "我们的恐龙展拥有以下恐龙骨架：\n\n"
 dubois.2051.ankylosaurus: "甲龙"
 dubois.2051.diplodocus: "梁龙"
 dubois.2051.triceratops: "三角龙"
 dubois.2051.tyrannosaurus: "暴龙"
 dubois.2051.stegosaurus: "剑龙"
 dubois.2051.antarctosaurus: "南极龙"
 dubois.2051.argyrosaurus: "银龙"
 dubois.2051.iguanodon: "禽龙"
 dubois.2051.plateosaurus: "板龙"
 dubois.2051.giraffatitan: "长颈巨龙"
 dubois.2051.spinosaurus: "棘龙"
 dubois.2051.psittacosaurus: "鹦鹉嘴龙"
 dubois.2051.velociraptor: "伶盗龙"
 dubois.2051.muttaburrasaurus: "木他龙"
 dubois.2051.rhoetosaurus: "瑞拖斯龙"
 dubois.2051.g: "参观北美洲骨架。"
 dubois.2051.h: "参观南美洲骨架。"
 dubois.2051.i: "参观欧洲骨架。"
 dubois.2051.j: "参观非洲骨架。"
 dubois.2051.k: "参观亚洲骨架。"
 dubois.2051.l: "参观澳洲骨架。"
 dubois.2101.t: "改进的骨架"
 dubois.2101.d: "我国[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]的努力结出硕果，以前有缺陷的骨架已得到明显改善。"
 dubois.2101.f: "在考虑了史前动物的运动方式、生态环境和许多其他情况之后，[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName]教授想到了一个关键的主意，把一些骨头放到了它们的正确位置上。整个骨架因此得到了极大的提升。"
 dubois.2101.g: "看起来好多了！"
 dubois.2102.t: "没有变化的骨架"
 dubois.2102.d: "尽管进行了多次改进骨架的尝试，[concept_dubois_paleontologist]没能成功。"
 dubois.2102.f: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName]教授对骨架的处理非常谨慎。为了避免过多破坏，他一直小心翼翼，几乎什么都没有改动。"
 dubois.2102.g: "没有变化？这个[concept_dubois_paleontologist]干什么吃的？"
 dubois.2103.t: "恶化的骨架"
 dubois.2103.d: "也许不让[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]改动恐龙骨架是一个更好的选择。"
 dubois.2103.f: "当[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName]教授展示“修正版”的骨架时，所有到场者都感到非常惊讶。因为现在臀部靠在了一侧肩膀上，而且在动物的前额上又多了一条可怕的尾巴。"
 dubois.2103.g: "这个傻瓜搞得更糟了！"
 dubois.2111.t: "北美洲恐龙展区"
 dubois.2111.d: "参观哪组骨架？"
 dubois.2111.f: "北美恐龙在其同类中最为著名。19世纪末，莫里森地层中发现了许多种类的恐龙。著名的物种有甲龙，梁龙，三角龙和暴龙。"
 dubois.2111.g: "甲龙"
 dubois.2111.h: "梁龙"
 dubois.2111.i: "三角龙"
 dubois.2111.j: "暴龙。"
 dubois.2111.k: "剑龙。"
 dubois.2112.t: "甲龙"
 dubois.2112.f: "甲龙是白垩纪晚期（距今约6800万年至6600万年）兴盛一时的非凡装甲恐龙。这种史前生物属于被称为甲龙科的食草恐龙，因其独特且令人印象深刻的防御适应性而闻名。\n甲龙的特点是身体强壮、装甲厚实，拥有宽阔、低矮的轮廓，皮肤上嵌有骨板或骨膜，为抵御潜在的掠食者提供了强大的保护。它最具标志性的特征是尾棒，尾棒由尾部顶端的密集骨节组成，很可能既是对攻击者的威慑，也是种内作战的工具。\n甲龙身长约20至30英尺，是一种四足草食动物，利用宽大的喙来收割植被。与庞大的身躯相比，它的头部相对较小，这表明它有选择性地捕食低矮植物和灌木的习惯。"
 dubois.2113.t: "梁龙"
 dubois.2113.f: "梁龙是一种巨大的长颈恐龙，是侏罗纪晚期（距今约1.54亿年至1.52亿年前）繁盛时期的标志性恐龙属。作为长颈龙的一种，梁龙以其非凡的长颈和巨大的体型而闻名，是史前生活宏伟壮观的缩影。\n梁龙具有独特的身体结构，它的脖子和尾巴都很长，头部相对较小，长有适合啃食植物的钉状牙齿。它长达90英尺，令人印象深刻，是有史以来最长的陆地动物之一，而它相对较轻的骨架和四足的姿态则有利于高效运动。\n据信梁龙是一种食草动物，它利用长长的脖子啃食离地面很高的植被，避免与其他食草动物竞争。化石证据表明，这些恐龙很可能栖息在河岸环境中，那里有大量的茂盛植物。"
 dubois.2114.t: "三角龙"
 dubois.2114.f: "三角龙是白垩纪晚期（距今约6800万年至6600万年）繁盛一时的标志性有角恐龙属。三角龙属于角龙科，因其独特的外形而闻名于世，令人印象深刻的是其面部的角和后脑勺的骨质边缘。\n三角龙的特点是具有强大的防御功能，它的身体庞大而结实，头部硕大，鼻孔上方有一个突出的鼻角，眼睛上方有两个拉长的眉角。它的褶饰上有复杂的花纹，很可能起到识别物种、调节体温和提供潜在战斗力的作用。\n三角龙是一种食草的四足动物，栖息在从林地到平原的各种环境中。它坚固的喙使它能够有效地收割植被，有力的下颚可以磨碎坚硬的植物。三角龙骨骼的化石证据表明，它可能有社会行为和种群中的等级互动。"
 dubois.2115.t: "暴龙"
 dubois.2115.f: "霸王龙是一种标志性的巨型食肉恐龙，在大约6800万年前到6600万年前的白垩纪晚期横行地球。霸王龙属于兽脚类恐龙，是史前食物链中最大的陆地掠食者之一。\n霸王龙以其独特的特征而闻名，它身材高大，体长可达40英尺，高约15到20英尺。它的头骨威武雄壮，长有香蕉大小的锯状牙齿，表明它以肉食为主，主要吃其他恐龙。它强有力的后肢适于迅速移动，而它不成比例的小手臂让人联想到残余结构，继续吸引着科学界的关注。\n古生物学证据表明，霸王龙可能是一种顶级掠食者，它利用敏锐的嗅觉、双目视觉和强大的颚部力量，确保自己在史前生态系统中的顶级地位。关于霸王龙是主动捕食者还是食腐动物的争论，仍然是一个受到持续研究和推测的主题。"
 dubois.2116.t: "剑龙"
 dubois.2116.f: "剑龙是侏罗纪晚期（距今约1.55亿至1.5亿年前）兴盛一时的标志性食草恐龙属。剑龙被归类为甲龙类，因其独特而引人注目的外形而闻名于世。\n剑龙背部有双排大骨板，尾部有一排可怕的尖刺或尾刺，是一种具有独特外形的中型恐龙。关于骨板的用途，是用于调节温度、展示还是防御，科学界仍争论不休。\n剑龙身长达30英尺，头部相对较小，有喙和颊齿，可以加工植物材料，是一种专门的草食动物。它很可能在侏罗纪环境中以低洼植被为食。\n剑龙化石主要是在北美洲西部发现的，包括科罗拉多州和犹他州，为了解装甲类恐龙的解剖、行为和进化史提供了宝贵的资料。剑龙的独特性使其成为古生物学和大众文化中一个广受欢迎、经久不衰的形象。"
 dubois.2112.h: "回到北美洲展区。"
 dubois.2121.t: "南美洲恐龙展区"
 dubois.2121.d: "参观哪组骨架？"
 dubois.2121.f: "19世纪末，南美洲的巴塔哥尼亚高原发现了越来越多的恐龙骨骼，其早期代表包括南极龙与银龙。"
 dubois.2121.g: "南极龙。"
 dubois.2121.h: "银龙。"
 dubois.2122.t: "南极龙"
 dubois.2122.f: "南极龙是一种著名的蜥脚下目恐龙，栖息于距今约 7000万年至 6500万年前白垩纪晚期的冈瓦纳古陆。南极龙被归入泰坦龙类，是曾经在地球上漫游的蜥脚下目恐龙多样性的典范。\n南极龙的特点是体型庞大，是一种巨大的四足食草动物，体长可达60英尺以上。它的颈部和尾部较长，头部相对较小，这表明它适应了在高空以植被为食。这种泰坦龙以其健壮的四肢结构而著称，这种结构很可能支撑着它的体重，并有利于它的移动。\n南极龙化石主要是在包括南美洲和南极洲的南部大陆发现的，它们为我们了解白垩纪晚期蜥脚类恐龙的演化和分布提供了宝贵的资料。这些发现有助于我们认识这一时期冈瓦纳地区独特的生态系统。"
 dubois.2123.t: "银龙"
 dubois.2123.f: "银龙是一个重要的蜥脚类恐龙属，大约在9000万年前到7000万年前的白垩纪晚期在南美洲的古老地貌上游荡。银龙属于被称为泰坦龙的蜥脚类恐龙亚群，它为人们了解该地区多样的史前动物群提供了线索。\n虽然其生物学和行为学的某些方面仍属于猜测，但银龙仍是一个引人注目的古生物学研究课题，它揭示了南半球地球史前历史的宏伟性和复杂性。"
 dubois.2122.h: "回到南美洲展区。"
 dubois.2131.t: "欧洲恐龙展区"
 dubois.2131.d: "参观哪组骨架？"
 dubois.2131.f: "自19世纪初以来，由于采矿活动的增加，在欧洲的山区不断有新的恐龙化石出土。已知的恐龙化石包括禽龙和板龙。"
 dubois.2131.g: "禽龙。"
 dubois.2131.h: "板龙。"
 dubois.2132.t: "禽龙"
 dubois.2132.f: "禽龙是白垩纪早期（距今约1.4至1.2亿年前）一种繁盛的重要食草恐龙。禽龙类恐龙在了解恐龙解剖学和行为学方面发挥了关键作用。\n禽龙以其独特的拇指穗和喙状鼻为特征，拥有中等大小的身体，用两条腿和四条腿走路，展示了两足和四足运动的奇妙结合。它的拇指尖曾被认为是一个角，现在人们认为它是用来防御掠食者或操纵植被的。\n禽龙栖息在森林和平原等多种环境中，是一种熟练的食草动物，它用无齿的喙来收割植被。它的体长可达33英尺，是当时著名的食草动物，影响着它所栖息的生态系统。禽龙的化石最早是在欧洲发现的，特别是比利时和英国，研究对古生物学领域的发展起到了至关重要的作用。"
 dubois.2133.t: "板龙"
 dubois.2133.f: "板龙是三叠纪晚期（距今约2.14亿年至2.04亿年）兴盛起来的一个重要的食草恐龙属。板龙被归类为原蜥脚类恐龙，它为人们了解恐龙的早期进化及其对不同环境的适应提供了重要的线索。\n板龙的特点是脖子长、头小、尾巴相对较长，两足和四足运动，反映了恐龙进化的一个过渡阶段。强健的四肢和负重能力使它能够有效地觅食和在栖息地中穿梭。\n板龙的体长估计可达30英尺，是当时的主要食草动物，占据着从洪泛平原到高地森林的各种地貌。它的牙齿宽大呈叶状，这为它食用植物提供了便利。"
 dubois.2132.h: "回到欧洲展区。"
 dubois.2141.t: "非洲恐龙展区"
 dubois.2141.d: "参观哪组骨架？"
 dubois.2141.f: "直到20世纪初，非洲的古生物学才有了显著发展，坦桑尼亚与南非尤其重要，埃及也有一席之地。重要的发现有长颈巨龙和棘龙。"
 dubois.2141.g: "长颈巨龙。"
 dubois.2141.h: "棘龙。"
 dubois.2142.t: "长颈巨龙"
 dubois.2142.f: "长颈巨龙旧称布氏腕龙，是著名的巨大长颈恐龙属，在大约1.54亿到1.5亿年前的侏罗纪晚期繁盛。作为蜥脚类恐龙，长颈巨龙以其惊人的体型和独特的适应性而闻名。\n长颈巨龙以其细长的脖子和相对较短的尾巴而著称，其独特的姿态表现为前肢比后肢更长，使其能够够到地面上方较高的植物。高达39英尺，长度超过80英尺，它是有史以来最高和最长的陆地动物之一。\n长颈巨龙是一种草食动物，可能栖息在植被茂密的环境中，如河谷和洪泛平原，以获取丰富的植物食物。其庞大的体重由强健的肢骨和巨大的圆桶状胸部支撑。长颈巨龙的化石证据主要在非洲被发掘出土，特别是今天的坦桑尼亚和津巴布韦。"
 dubois.2143.t: "棘龙"
 dubois.2143.f: "棘龙是著名的食肉恐龙属，生活在约1.12亿到9300万年前白垩纪时期的北非地区。作为兽脚类恐龙，棘龙因其与众不同特征和独特的适应性而受到著称。\n棘龙以其细长的嘴、像帆一样的背鳍和强力的鳄鱼般的颚部而著称，据信它是一种半水生的捕食者，可能专门猎食鱼类和其他海洋动物。它的背鳍可能在热调节或种群识别方面发挥了作用。\n棘龙的预计长度可达50到59英尺，被认为是最大的兽脚类恐龙之一。其结实的四肢和细长的颅骨表明其适应了捕捉和食用水生猎物，突显了其生态位。棘龙的化石遗骸最初在埃及，后来又在摩洛哥被发现。"
 dubois.2142.h: "回到非洲展区。"
 dubois.2151.t: "亚洲恐龙展区"
 dubois.2151.d: "参观哪组骨架？"
 dubois.2151.f: "20世纪的前三十年内第一支美国探险队前往蒙古，在亚洲发现了新类型的恐龙。鹦鹉嘴龙和伶盗龙是其中已知的最早物种。"
 dubois.2151.g: "鹦鹉嘴龙。"
 dubois.2151.h: "伶盗龙。"
 dubois.2152.t: "鹦鹉嘴龙"
 dubois.2152.f: "鹦鹉嘴龙是一个著名的小型草食恐龙属，生活在大约1.26亿到1.01亿年前白垩纪早期的亚洲。作为角龙类恐龙，鹦鹉嘴龙以其引人入胜的特征和对恐龙进化的理解的贡献脱颖而出。\n鹦鹉嘴龙因其鹦鹉般的嘴、粗壮的身体和沿着尾巴和身体的独特羽状鳞片构成的一排突出具有独特的外貌特征。这些羽状鳞片被认为支撑着可能用于展示或热调节的刷状结构。\n鹦鹉嘴龙长度约为3到6.5英尺，栖息在多种环境中，包括森林和平原。它的喙和特殊的牙齿表明其适应处理各种植物材料。鹦鹉嘴龙的化石遗骸主要在中国和蒙古被发现。"
 dubois.2153.t: "伶盗龙"
 dubois.2153.f: "伶盗龙是一个著名的中小型食肉恐龙属，生存在大约7500到7100万年前白垩纪晚期的亚洲的部分地区。作为驰龙类兽脚恐龙，伶盗龙因其卓越的适应性以及在塑造公众对恐龙印象的作用而闻名。伶盗龙以其尖锐、弯曲的脚爪和发达的捕食特征而著称，它是一种敏捷而具有高度智慧的捕食者。它拥有流线型的身体和长尾巴，每只脚上都有一个独特的镰刀形爪子，很可能用于撕裂猎物。伶盗龙与较早的捕食者相比相对较小，长度约为6.5英尺，体重约50磅左右。根据化石证据和研究推断，它敏锐的感知能力、锋利的牙齿和群体狩猎行为都有助于其成为一种可怕的捕食者。"
 dubois.2152.h: "回到亚洲展区。"
 dubois.2161.t: "澳洲恐龙展区"
 dubois.2161.d: "参观哪组骨架？"
 dubois.2161.f: "1926年，澳大利亚首次发现了恐龙化石，标志着深入研究的开始。后来，澳大利亚的木他龙成为了众所瞩目的焦点。"
 dubois.2161.g: "木他龙。"
 dubois.2161.h: "瑞拖斯龙。"
 dubois.2162.t: "木他龙"
 dubois.2162.f: "木他龙是一个著名的鸟脚类恐龙属，生活在大约1.12亿到9900万年前白垩纪早期的澳大利亚。作为鼻龙类恐龙，蒙塔布拉龙为我们提供了有关该地区史前动植物的宝贵见解。\n木他龙以其独特、中空且圆形的头冠而著称，拥有中等大小的体型，长度约为20到30英尺。它强大的颚部装备有适合碾碎植物材料的牙齿，表明它是草食动物。\n颅部冠状物的存在，可能作为共鸣腔用于发声或作为展示结构，使木他龙与其他鸟脚类恐龙区分开来。其强健的四肢和相对较大的体型表明其适应了高效的运动和草食。"
 dubois.2163.t: "瑞拖斯龙"
 dubois.2163.f: "瑞拖斯龙是一种引入注目的剑龙属恐龙，在大约1.65亿年前的侏罗纪中期栖息在澳大利亚。喙龙被归入剑龙类，是了解澳大利亚恐龙远古历史的重要线索。\n瑞拖斯龙体型庞大，是一种巨大的草食性四足恐龙，拥有长长的脖子、粗壮的四肢和相对较小的头部。虽然它的体型相对于一些剑龙类近亲要小一些，身长仍然达到了5英尺左右，使它成为澳大利亚当时最大的动物之一。\n瑞拖斯龙的化石最早是在澳大利亚昆士兰发现的，是该地区最早的剑龙类恐龙证据。它的解剖学特征，如长脖子和相对较长的尾巴，反映了它适应草食和利用各种植物资源的能力。"
 dubois.2162.h: "回到澳洲展区。"
 dubois.2112.d_perfect_dinosaur: "这具恐龙骨架组装得相当完美。它无需更改，并获得了最高的恐龙评级。"
 dubois.2112.d_imperfect_dinosaur: "这具恐龙骨架组装得并不完美，只获得了恐龙评级的一半。它可以由一位不忙碌且不疲倦的[concept_dubois_paleontologist]重新组装。"
 dubois.2112.d_poor_dinosaur: "这具恐龙骨架组装得很差。这大大损害了其恐龙评级。它可以由一位不忙碌且不疲倦的[concept_dubois_paleontologist]重新组装。"
 dubois.2112.g: "重组这具恐龙骨架。"
