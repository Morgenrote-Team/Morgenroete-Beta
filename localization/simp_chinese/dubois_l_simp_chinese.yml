 dubois.1052.t: "北极熊展区"
 dubois.1052.d: "#o 北极熊#!展区可能是每个动物园中最不自然的区域。并非由于因为动物园不努力，而是因为动物园所在的地区只有不在北极才能引来游客。尽管如此，遍布岩石的展区还是北极熊的好去处。"
 dubois.1052.f1: "在动物园广阔的北极主题展区里，一只威武的北极熊在岩石栖息地中漫游，其浓密的白色皮毛和强大的体格引人注目。被它的威严所吸引，你走近一位知识丰富的动物园管理员，渴望更多地了解这标志性的北极掠食者。\n\n“北极熊是北极荒野的象征，是适应极端寒冷的真正奇迹，” 动物园管理员开始说道。“凭借其浓密的皮毛、脂肪层和蹼足，北极熊在严寒的气温中独特地适应生存。它们是出色的游泳者，能够在寻找食物时穿越广阔的距离，主要的食物来源是海豹。”"
 dubois.1052.f2: "在动物园引人入胜的北极景观中，一只母北极熊小心翼翼地照顾着她的幼崽，它们蓬松的白色皮毛和有趣的动作吸引着各个年龄段的游客。被它们的母子纽带所吸引，寻你找一位知识丰富的动物园管理员，希望能够更多地了解这些北极巨兽的生活。\n\n“北极熊是充满爱的母亲，为她们的幼崽提供细心的照顾，” 动物园管理员解释道。“经过大约八个月的妊娠期，雌性北极熊在雪堆中建造的巢穴里产下一到三只幼崽。幼崽依赖母亲的温暖和营养生存，吮吸她丰富的乳汁，直到准备好涉足冰冷的世界。母北极熊教导她的幼崽必要的技能，如捕猎和在危险的海冰上导航。”"
 dubois.1052.f3: "在北极主题的栖息地中，一只北极熊斜躺在雪堆上，其威严的存在既有力量感又平静安详。被它的行为所吸引，你走近一位知识丰富的动物园管理员，希望能够理解这些行为的意义。\n\n“北极熊以其节约能量的能力而闻名，展现出一种被称为‘行走冬眠’的行为，” 动物园管理员分享道。“在夏季月份食物稀缺时，它们会进入一种减少活动的状态，依靠脂肪储备来维持生命。这种适应有助于它们在缺乏食物的时期存活，直到海冰回归，带回了它们的主要食物来源——海豹。通过了解这些行为，我们可以为动物园里的北极熊提供适当的照料和丰富环境。”"
 dubois.1052.k: "回到北美洲展区"
 zoo_north_american_enclosures_tt: "你将会到动物园的北美洲展区。"
 dubois.1053.t: "灰熊展区"
 dubois.1053.d: "粗木制成的区域覆盖了#o 灰熊#!展区的大部分面积。这里提供了灰熊所需的一切，不仅有藏身处，还有一个可以降温的小池塘。"
 dubois.1053.f1: "在动物园崎岖的荒野主题展区里，一只强大而令人敬畏的灰熊威严地漫游，其浓密的皮毛和硕大的体格引起了游客的注意。被它强大的存在所吸引，你走近一位知识丰富的动物园管理员，渴望更多地了解这只标志性的北美熊类。\n\n“灰熊，也被称为北美棕熊，是力量和荒野的象征，” 动物园管理员开始说道。“这些雄伟的熊凭借其肌肉发达的身体、锋利的爪子和敏锐的嗅觉在栖息地中适应良好。它们是杂食动物，寻找各种食物，包括浆果、鱼、小型哺乳动物，甚至植物。作为一个关键种，灰熊对所在生态系统的平衡产生影响。”"
 dubois.1053.f2: "在动物园广阔的灰熊栖息地里，一只母熊引导着她活泼的幼崽穿越岩石地形，它们蓬松的毛皮和活泼的动作引发旁观者的微笑。被它们的家庭互动所吸引，你寻找一位知识丰富的动物园管理员，希望能够更多地了解这些壮美熊类的生活。\n\n“灰熊以其强烈的母性本能和紧密的家庭纽带而闻名，” 动物园管理员解释道。“在一个冬眠期后，母灰熊会带着她的幼崽出现，教导它们关键的生存技能，如捕鱼、觅食和辨识潜在的威胁。她确保它们的幸福，并传授她的智慧，为它们在荒野中独立生活做好准备。目睹母熊与幼崽之间的互动是这些强大生物养育行为的明证。”"
 dubois.1053.f3: "在崎岖的灰熊栖息地景色中，一只巨大的雄性灰熊跨越地形，其有力的步伐和偶尔的喘息声显示出它的优势和所拥有的领地。被它的行为所吸引，您走近一位知识丰富的动物园管理员，希望能够理解这些展示的意义。\n\n“灰熊表现出令人着迷的领地行为，” 动物园管理员分享道。“雄性建立自己的领地，通过气味和声音来标记，以表现出优势并吸引潜在的配偶。它们进行各种展示，比如用后腿站立并在树上擦拭身体以留下气味标记并传达自己的存在。这些行为对这些壮美熊类的社会动态和繁殖成功至关重要。”"
 dubois.1053.f4: "小报记者狂喜！我们闻名遐迩的灰熊从动物园逃走了，当官员们还在拉响警报时，这只灰熊在附近的公园里撞上了一位来访的希腊壮汉。这位壮汉当时正与本地的一位年轻女子乘坐马车打发时间，他迅速采取行动，与这头野兽搏斗，并将熊打昏在地。当警察赶到现场时，他们简直不敢相信自己的眼睛，这的确是一项壮举。当地媒体迅速将这位壮汉命名为“新赫拉克勒斯”，并对他的英勇行为大加赞扬。尽管由于口音太重，没有人能听懂他在说些什么，但他还是受到了年轻移民和本地人的喜爱。不过，这也导致了一系列不幸的事故，因为情侣们故意寻求到野外寻求遭遇，好让年轻男子向他们的女伴证明自己的能力。\n我们的灰灰并未受伤，并已经回到动物园。"
 dubois.1054.t: "白头海雕鸟舍"
 dubois.1054.d: "#o 白头海雕#!的家在一个崎岖不平、布满岩石的鸟舍里。多亏了围栏上的一张网使这种动物无法脱逃。"
 dubois.1054.f1: "屹立在动物园广阔鸟舍中的一根高大的树枝上，一只壮丽的白头海雕用锐利的眼睛审视着周围，它引人注目的白头和强健的黑色翅膀展翅的镜像引起了游客们的钦佩。被它的威严所吸引，您走近一位知识丰富的动物园管理员，渴望更多地了解这只标志性的猛禽。\n\n“白头海雕是力量与自由受人崇敬的象征，” 动物园管理员开始说道。“凭借其令人印象深刻的翅膀展幅和锐利的爪子，这些猛禽是强大的猎手。它们主要以鱼类为食，利用敏锐的视力从高处发现猎物。白头海雕保护成功的故事展示了保护栖息地和保护这些壮丽鸟类对于未来世代的重要性。”"
 dubois.1054.f2: "在动物园自然主题的鸟舍里，一对白头海雕毫不费力地翱翔在天空中，它们同步飞行，悦耳的叫声在空中回响。被它们的空中技巧所吸引，你 寻找一位知识丰富的动物园管理员，希望能够更多地了解这些标志性的鸟类的生活。\n\n“白头海雕以其卓越的飞行技巧和复杂的求偶仪式而闻名，” 动物园管理员解释道。“在求偶展示期间，雄性和雌性将进行令人惊叹的空中舞蹈，一同翱翔俯冲。这些展示不仅加强了它们的伴侣关系，也成为了一场视觉盛宴。目睹这些鸟类在飞行中展示的优雅和敏捷真是令人惊叹。”"
 dubois.1054.f3: "在猛禽栖息地的风景下，一只白头海雕栖息在一根高高的树枝上，发出其独特的呼叫声，这声音与荒野的精神产生共鸣。被它的声音所吸引，你走近一位知识丰富的动物园管理员，希望能够理解这些声音的意义。\n\n“白头海雕将声音作为一种交流形式，” 动物园管理员分享道。“它们标志性的高音呼叫，常常与它们在野外出现相关，有多种用途。这些声音有助于建立领地、与伴侣沟通以及保卫巢穴。白头海雕的声音库证明了它的适应能力，以及在多样化的栖息地中生存的能力。”"
 dubois.1055.t: "佛罗里达山狮展区"
 dubois.1055.d: "#o 佛罗里达山狮#!的领地主要是亚热带植物和一条小河。有些树木可以攀爬。"
 dubois.1055.f1: "在动物园郁郁葱葱的亚热带栖息地中，一只强大而敏捷的掠食者，被称为佛罗里达山狮，以静默的优雅徘徊，肌肉发达的体型和炯炯有神的绿色眼睛吸引着旁观者的目光。被它独特的地位所吸引，你走近一位知识丰富的动物园管理员，渴望更多地了解这只引人入胜的大猫。\n\n“佛罗里达山狮是美洲狮的一个卓越亚种，” 动物园管理员开始说道。“这些美洲狮特有于佛罗里达湿地和森林的丰富多样的栖息地，已经适应并在这个独特的环境中繁荣生存。凭借敏锐的感官、强大的颚部和令人难以置信的敏捷性，它们在捕猎和在自然栖息地中生存方面拥有很好的适应能力。佛罗里达美洲狮是这个地区丰富多样的野生动植物的杰出代表。”"
 dubois.1055.f2: "在栖息地的本土植被中，一只雄性佛罗里达山狮发出低沉而回响的呼叫声，声音在空中回荡，显示出它的存在和领地性。被它的声音所吸引，您走近一位知识丰富的动物园管理员，希望能够理解这些声音的意义。\n\n“佛罗里达山狮通过一系列声音来交流，” 动物园管理员分享道。“雄性利用呼叫，包括咆哮、嘶嘶声和尖叫，来建立他们的优势地位并保卫他们的领地。这些声音有助于赶走潜在的竞争对手并与附近的雌性进行交流。通过聆听它们的声音库，研究人员和保育人员可以获得有关佛罗里达山狮行为和种群动态的宝贵见解。”"
 dubois.1055.f3: "在栖息地的本土植被中，一只雄性佛罗里达山狮发出低沉而回响的呼叫声，声音在空中回荡，显示出它的存在和领地性。被它的声音所吸引，您走近一位知识丰富的动物园管理员，希望能够理解这些声音的意义。\n\n“佛罗里达山狮通过一系列声音来交流，” 动物园管理员分享道。“雄性利用呼叫，包括咆哮、嘶嘶声和尖叫，来建立他们的优势地位并保卫他们的领地。这些声音有助于赶走潜在的竞争对手并与附近的雌性进行交流。通过聆听它们的声音库，研究人员和保育人员可以获得有关佛罗里达山狮行为和种群动态的宝贵见解。”"
 dubois.1055.f4: "受到被囚禁的山狮命运启发，[SCOPE.sCharacter('manzoni_literary_scope').GetFullName]写下了一首诗歌：\n\n它的目光被那走不完的铁栏\n缠得这般疲倦，什么也不能收留。\n它好像只有千条的铁栏杆，\n千条的铁栏后便没有宇宙。\n\n强韧的脚步迈着柔软的步容，\n步容在这极小的圈中旋转，\n仿佛力之舞围绕着一个中心，\n在中心一个伟大的意志昏眩。\n\n只有时眼帘无声地撩起。——\n于是有一幅图像浸入，\n通过四肢紧张的静寂——\n在心中化为乌有。"
 dubois.1056.t: "美洲野牛展区"
 dubois.1056.d: "#o 美洲野牛#!生活的巨大展区栏试图重现美国中西部的景观。其大部分被草原覆盖，野牛可以在其中吃草。"
 dubois.1056.f1: "在动物园广阔的草原主题栖息地中，一只威武而雄伟的美洲野牛以一种令人敬畏的姿态漫游，其庞大的体型和令人印象深刻的角引起了游客的注意。被它的历史意义所吸引，你走近一位知识丰富的动物园管理员，渴望更多地了解这个美国西部的标志性象征。\n\n“美洲野牛，又被称为水牛，具有重要的文化和生态意义，” 动物园管理员开始说道。“这些壮丽的草食动物在广阔的草原上成群结队地漫游，塑造了这片土地，维持了许多其他物种的生存。野牛拥有难以置信的力量和韧性，能够经受严酷的天气条件，穿越长距离寻找食物和水源。”"
 dubois.1056.f2: "在动物园宁静的野牛栖息地中，一群美洲野牛平和地吃草，它们庞大的身躯在草原上一起移动。蹄子敲击地面的声音在空中回荡，创造出一种韵律的和谐。被它们的社交动态所吸引，您走近一位知识丰富的动物园管理员，希望能够揭示更多关于这些标志性草食动物的生活。\n\n“美洲野牛是高度社会性的动物，生活在有凝聚力的群体中，被称为兽群，” 动物园管理员解释道。“在兽群内，有一个由优势雄性（所谓公牛）领导的等级结构。这些雄壮的生物进行相互的梳理，通过各种声音交流，并在繁殖季节展示迷人的行为。观察野牛兽群内的互动能够一窥它们复杂的社会动态。”"
 dubois.1056.f3: "在野牛栖息地起伏的草原风景中，一头巨大的公牛屹立在那里，其蓬松的毛发和威武的气势引起了游客的赞叹。被它的行为所吸引，您走近一位知识丰富的动物园管理员，希望能够理解它的行动的意义。\n\n“公牛展示出的优势和力量是一个引人入胜的景象，” 动物园管理员分享道。“在繁殖季节，雄性动物通过出色的展示来建立它们的地位，争夺交配的机会。这可能包括扒地、在土中打滚，以及与对手锁角进行令人印象深刻的力量之战。这些展示对于维持兽群的社会结构，确保他们的物种能够生存下去，具有重要意义。”"
 dubois.1057.t: "短吻鳄展区"
 dubois.1057.d: "短吻鳄展区是一片大沼泽，看起来像是直接从佛罗里达运来的。"
 dubois.1057.f1: "在动物园迷人的湿地栖息地中，一种被称为短吻鳄的史前强大生物潜伏在水面之下，它的鳞片和警惕的眼睛吸引着游客的注意力。你对它古老的外观很感兴趣，于是你找到了一位知识渊博的动物园管理员，渴望更多地了解这种标志性的爬行动物。\n\n“短吻鳄是过去时代的活化石，”动物园管理员开始说道。“这些古老的爬行动物数百万年来一直保持相对不变。它们以其有力的下巴和强大的咬合而闻名，这有助于它们捕捉并进食各种猎物。短吻鳄通过控制小动物的数量维护湿地栖息地的平衡。”"
 dubois.1057.f2: "在动物园宁静的水生环境中，短吻鳄在阳光普照的河岸上晒太阳，它覆盖装甲的身体和令人印象深刻的体型让人产生敬畏之感。它晒太阳的行为吸引了游客的注意。你对它的晒太阳习惯很感兴趣，于是找到了一位知识渊博的动物园管理员，希望能更多地了解这种古老爬行动物的行为。\n\n“短吻鳄是变温动物，这意味着它们依靠外部热源来调节体温，”动物园管理员解释道。“晒太阳对它们来说是至关重要的行为。通过晒太阳，短吻鳄可以提高体温，从而提高它们的新陈代谢和能量水平。这种行为在寒冷的月份尤其重要，因为它们的体温因环境而下降。”"
 dubois.1057.f3: "在鳄鱼栖息地郁郁葱葱的环境中，一只巨大的雄性鳄鱼发出低沉、隆隆的咆哮声，在水中回荡，展示着它的统治地位和领地。你对他的声音很感兴趣，于是找到一位知识渊博的动物园管理员，希望了解这些声音的意义。\n\n“鳄鱼的发声是它们交流的一个重要方面，”动物园管理员分享道。“在繁殖季节，雄性鳄鱼会用它们独特的吼叫声来建立统治地位并吸引雌性。这些声音交流有助于防止竞争的雄性鳄鱼之间发生冲突。鳄鱼还使用各种其他声音，例如嘶嘶声和咕噜声，来相互交交流并维护它们在湿地栖息地的存在。”"
 dubois.1058.t: "墨西哥钝口螈展区"
 dubois.1058.d: "墨西哥钝口螈展区与其说是展区，不如说是一个岩石中的小池塘。由于蝾螈体型很小，游客可以非常接近甚至几乎触摸到这些小动物。"
 dubois.1058.f1: "在动物园迷人的水生栖息地中，一种被称为墨西哥钝口螈的迷人而超凡脱俗的生物在水中滑行，其褶边的外鳃和独特的外观吸引了游客的注意力。您对其独特的特征很感兴趣，于是您找到一位知识渊博的动物园管理员，渴望更多地了解这种非凡的两栖动物。\n\n“墨西哥钝口螈是再生能力和适应能力的真正奇迹，”动物园管理员开始说道。“与大多数两栖动物不同，墨西哥钝口螈在其一生中都保留着幼年特征，这种现象被称为幼态持续。它们以其非凡的再生能力而闻名，能够再生失去的四肢甚至部分脊髓。这些能力引起了科学家和研究人员的注意，为组织再生提供了宝贵的见解。”"
 dubois.1058.f2: "在动物园宁静的水生环境中，墨西哥钝口螈栖息在水下的岩石上，羽毛状的鳃在水下呼吸时轻轻移动。其独特的呼吸适应性吸引了参观者的注意力。你对它的呼吸行为很感兴趣，于是找到一位知识渊博的动物园管理员，希望更多地了解这种非凡的两栖动物的生活。\n\n“墨西哥钝口螈具有独特的呼吸系统特征，使它们有别于其他两栖动物，”动物园管理员解释道。“虽然大多数两栖动物都会经历变态并发育出用于陆地呼吸的肺，但墨西哥钝口螈仍然是水生动物，依靠外部的鳃从水中获取氧气。它们的鳃效率很高，使它们能够终生在水下呼吸。这种适应证明了它们对水生环境中生活的专业化。”"
 dubois.1058.f3: "在墨西哥钝口螈展区的水生植物中，一群幼年蝾螈嬉戏互动，它们精致的动作和好奇的行为揭示了它们迷人的个性。你对它们的互动很感兴趣，于是找到一位知识渊博的动物园管理员，希望了解它们行为的意义。\n\n“墨西哥钝口螈以其好奇心和社交性而闻名，”动物园管理员分享道。“它们是相对和平的生物，经常与它们的同伴和平共处。这些两栖动物有敏锐的触觉，可以察觉水中的振动。墨西哥钝口螈利用这些感官来探索环境、寻找食物并相互互动，增加了他们的吸引力和魅力。”"
