 dubois.1032.t: "海龟展区"
 dubois.1032.d: "The #o Sea Turtle#! pavilion consists chiefly of a broad basin of limpid water, surrounded by modest sand beaches. A glazed aperture below the waterline admits the curious to observe the animals in their native medium."
 dubois.1032.f1: "The Green Sea Turtle (Chelonia mydas) is a creature of admirable design. With olive carapace and puissant flippers, it traverses tropical and subtropical seas, performing migrations of prodigious length to beaches remembered with unfailing fidelity. Its placid carriage belies an endurance suited to the ocean’s breadth."
 dubois.1032.f2: "The cycle of generation is conducted with becoming gravity. After pairing at sea, the female ascends a suitable strand by night, excavates with patient labour a nest‑pit, and deposits her eggs before veiling them with sand. In due season the young, guided by celestial light and instinct alike, hasten seaward to begin their perilsome probation."
 dubois.1032.f3: "In the economy of nature the Green Sea Turtle is no idle ornament. Its grazing upon seagrass prunes and renews the submarine meadows, while its occasional predation upon medusae contributes to a salutary balance. Thus does this reptile preserve both pasture and pelagic realm from excess."
 dubois.1032.k: "回到澳洲与大洋洲展区"
 zoo_australian_enclosures_tt: "你将会到动物园的澳洲与大洋洲展区。"
 dubois.1033.t: "蝠鲼展区"
 dubois.1033.d: "A grand aquarium houses several #o Manta Rays#!; a glazed tunnel permits the visitor to behold these gentle leviathans as they wheel with solemn grace."
 dubois.1033.f1: "The Giant Oceanic Manta Ray (Mobula, commonly called Manta) is among the noblest of the rays. With rhomboid disk and vast pectoral fins, it cleaves the water like a living kite, some attaining a span of more than six metres. Its habits are peaceable, its diet composed of the smallest pelagic creatures."
 dubois.1033.f2: "As faithful scavengers of the sunlit seas, Mantas strain innumerable plankters through delicate gill rakers, thereby tempering the exuberance of those minute hosts. At favored stations they solicit the attentions of lesser fishes, which cleanse their skin—an economy of mutual service not uncommon in nature."
 dubois.1033.f3: "Naturalists have noted sociable tendencies in these rays: ordered circuits, reiterated returns to well‑known feeding grounds, and even a rudimentary courtship conducted by measured gyres. Such observances bespeak a memory and constancy worthy of remark."
 dubois.1034.t: "考拉展区"
 dubois.1034.d: "A grove of eucalyptus, planted with thoughtful regard to shade and shelter, affords the #o Koala#! a scene much akin to its arboreal home."
 dubois.1034.f1: "The Koala (Phascolarctos cinereus) is by habit arboreal and sedentary. With grasping hands and opposable digits it ascends and reposes among the eucalypts, subsisting almost wholly upon their leaves. A slow pulse and measured respiration attest to an economy adapted to austere fare."
 dubois.1034.f2: "Maternal offices are exemplary. The minute and altricial joey, at birth, attains the safety of the pouch, where it nurses and grows. In due time the dam accustoms it to the peculiar diet of the species, and thereafter it rides upon her back, learning the stations and proprieties of the trees."
 dubois.1034.f3: "Though given more to silence than to speech, the species employs low bellows and gruff notes—most notably in the male—to declare tenure and season. These utterances, with their unexpected depth, carry far in the stillness of the grove."
 dubois.1035.t: "袋鼠展区"
 dubois.1035.d: "A steppe‑like paddock, with long grass and scattered red rocks, is allotted to the #o Kangaroos#!, whose singular mode of progression here may be studied at one’s leisure."
 dubois.1035.f1: "The Red Kangaroo (Osphranter rufus) is a prodigy of leaping locomotion. The elastic tendons of the hind limbs and powerful tail enable sustained bounds at notable speed; the spectacle of a company in motion affords a lesson in nature’s mechanical contrivance."
 dubois.1035.f2: "The maternal care of Kangaroos is of especial interest. The tiny newborn, little more than a living germ, attains the pouch unassisted and there perfects its development upon the teat. Naturalists record that the dam can accommodate successive young with admirable thrift of nature."
 dubois.1035.f3: "Social order is maintained by attitude and sign: the stamping of the foot upon alarm, hisses and low growls in contention, and formal displays among the males. Thus are rank and right asserted without undue violence."
 dubois.1036.t: "鸭嘴兽展区"
 dubois.1036.d: "A clear, cool stream with shaded banks forms the scene for the #o Platypus#!, which spends the greater part of its hours in the water or within a burrow."
 dubois.1036.f1: "The Platypus (Ornithorhynchus anatinus) is a monotreme—an egg‑laying mammal whose conformation startled the learned world at its first report. With soft bill, webbed feet, and dense pelage, it is exquisitely adapted to the stream; the male bears a venomous spur upon the hind foot, of which caution is advised."
 dubois.1036.f2: "Its domestic economy is curious. The female prepares a burrow, fashions a nest of leaves, and deposits a small clutch of eggs. The young, hatched blind and naked, are nourished by milk exuded upon the skin—no teat being present—until they may forage for themselves."
 dubois.1036.f3: "Though sparing of voice, the Platypus advertises its presence by sign and scent; the territories of the males are maintained with some vigour, especially in the season. Their diving and probing of the bed for insect larvae furnish a pleasing exhibition of industry."
 dubois.1036.f4: "#o Platypus Perry Misplaced from the Gardens#!\nA brief commotion attended the discovery that one of our Platypi—styled Perry—could not be readily found within his retreat. The keepers, Messrs. Phineas Flynn and Ferb Fletcher, counsel patience: 'Our Perry is wont to conceal himself where none would look, and invariably reappears before the day is out.'\n\n#o Man of Science Preserved from a Laboratory Mischap#!\nDr. Heinz Doofenshmirtz narrowly escaped injury when an experiment issued in an explosion. By fortune—or timely intervention from an unknown benefactor—the savant sustained no lasting harm."
 dubois.1032.g: "鸭嘴兽？鸭嘴兽派瑞！"
 dubois_unknown_hero_modifier: "无名英雄"
 dubois.1037.t: "鹤鸵展区"
 dubois.1037.d: "A densely planted quarter, contrived as a strip of rainforest, accommodates the #o Southern Cassowaries#!—the famed 'gardeners' of those realms."
 dubois.1037.f1: "The Southern Cassowary (Casuarius casuarius) is a large, flightless bird whose sombre plumage and cobalt skin are set off by a horn‑like casque. A capital frugivore, it disperses many forest seeds intact, and so contributes materially to the renewal of the woods."
 dubois.1037.f2: "The casque, the office of which is debated, may aid in the shearing of dense herbage or the conduct of sound. The legs are puissant, armed with a formidable inner claw; the bird employs them more for resolve than for aggression, yet respect is prudent."
 dubois.1037.f3: "In their domestic arrangements the sexes share the charge unequally. It is commonly the cock that broods and escorts the striped chicks, while the hen resumes her liberty. Such economy, though unusual among birds, is constant in this tribe."
 dubois.1038.t: "新西兰海狮展区"
 dubois.1038.d: "A broad pool set about with rocks and ledges affords the #o New Zealand Sea Lions#! both basking‑place and diving‑ground; an underwater prospect would no doubt delight future generations."
 dubois.1038.f1: "The New Zealand Sea Lion (Phocarctos hookeri), confined by nature to the southern isles, is a robust pinniped of engaging manners. In the water it is a creature of grace; on land, social and steadfast to its colony."
 dubois.1038.f2: "With streamlined form and strong fore‑flippers, it courses beneath the waves in pursuit of fish and cephalopods. The capacious eyes, well adapted to the penumbra, assist in the apprehension of prey where light is scant."
 dubois.1038.f3: "In the breeding season the bulls proclaim their tenure by deep roars and posture upon the rocks; such demonstrations suffice, in the main, to settle precedence and secure the attention of the cows. Thus order is kept upon the rookery without perpetual strife."
