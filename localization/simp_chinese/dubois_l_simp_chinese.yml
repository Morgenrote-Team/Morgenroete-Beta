 dubois.7.t: "桦尺蛾的进化！"
 dubois.7.d: "[ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName]博士注意到桦尺蛾的外观在最近几年发生了变化，这是进化论的明显证据。"
 dubois.7.f: "“污染使桦尺蛾生活的桦树变得越来越黑，我们可以看到，黑蛾的数量明显增加。更多的白蛾因为更加显眼而被天敌吃掉，所以黑蛾开始取代白蛾。\n这就是短时间进化的明显证据。我的观察结果令人着迷，这证明了进化论显然是正确的。”\n\n#b 历史背景：#!早在1848年，桦尺蛾颜色的进化转变就在曼彻斯特被发现了。直到1896年，J·W·塔特才证明这是自然选择的结果。如今，桦尺蛾的白色表型又占了优势，因为空气质量的改善使得大部分白桦树又变成了白色。"
 dubois.7.g: "进化论的明证！"
