 dubois.1049.t: "马鹿展区"
 dubois.1049.d: "一只雄壮的欧洲马鹿威风凛凛的在动物园的森林展区矗立着，它那耸立的头角直插天际。"
 dubois.1049.f1: "马鹿平静的性情与庞大的身躯吸引了游客的目光，他们无不为这位温顺巨人的宏伟体型感到惊叹。出于对其壮观鹿角的好奇，你走近一位动物管理员，想了解更多信息。\n“欧洲马鹿，也被北美称为麋鹿，是鹿科中体型最大的成员，”动物管理员解释道。“它们的鹿角横展宽度可达六英尺，主要用于发情季节雄性之间的配偶竞争。这些鹿角每年都会脱落并重新生长，而新生的鹿角会随着马鹿的年龄增长变得更加宽大且复杂。”"
 dubois.1049.f2: "在欧洲马鹿栖息地的角落，一只大型雄性欧洲马鹿低下巨大的头，啃食嫩芽和树叶。这吸引了一群围观者。一位动物园管理员对此解释道：“欧洲马鹿是食草动物，与主要吃草的食草动物不同，欧洲马鹿喜欢以各种植物为食，包括树叶、树皮和水生植物。它们嗅觉灵敏，这有助于它们找到环境中最有营养的植物。在野外，它们一天可以吃掉多达70磅的食物，这是维持它们庞大身体所必需的。”"
 dubois.1049.f3: "在围栏内沙沙作响的树木间，一只欧洲马鹿突然发出低沉嘹亮的吼声，叫声在空中回荡。这声音吸引了附近所有人的注意，大家都停下来倾听这原始的叫声。动物园管理员解释说：“这是欧洲马鹿发情的叫声。在繁殖季节，雄性欧洲马鹿用这种响亮的叫声来确立统治地位，吸引雌性。”"
