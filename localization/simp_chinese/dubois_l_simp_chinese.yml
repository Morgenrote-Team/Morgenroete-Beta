 dubois.149.t: "兔狲"
 dubois.149.d: "我们的动物园增添了一种新的珍稀动物：今天，期待已久的#O 兔狲#!搬进了新的展区。"
 dubois.149.f: "兔狲主要分布在亚洲中部和西部地区，它们主要栖息于草原和山地草原地带，偏好峡谷和岩石区域，如内陆悬崖、山峰和破坏性植被覆盖的地形。兔狲通常选择弯曲且深达2米以上的岩石缝隙或旱獭的洞穴作为巢穴。作为一种夜行性动物，兔狲多在黄昏时分活动和觅食。它们的视觉和听觉极为敏锐，对周围环境的微小变化能够迅速做出反应。兔狲的食物主要包括小型啮齿动物和鼠兔。"
 dubois.149.g: "漂亮得很呐！"
