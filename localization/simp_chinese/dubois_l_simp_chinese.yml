 dubois_visit_zoo_decision_desc: "开放参观动物园，看看当前收集的所有动物。"
 dubois_ban_animal_export_decision: "禁止动物出口"
 dubois_ban_animal_export_decision_desc: "原则上明确禁止动物出口，因此我们不准备向国外出售我们的任何动物。"
 dubois_allow_animal_export_decision: "允许动物出口"
 dubois_allow_animal_export_decision_desc: "为特定动物颁发出口许可证既能增进外交友好关系，又能带来可观的额外收入。"
 dubois_collect_specimen_decision: "收集[concept_dubois_specimen]"
 dubois_collect_specimen_decision_desc: "收集各种动植物[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]，不仅有利于研究人员，也将展示我国探索和发现。"
 dubois_safari_decision: "非洲狩猎探险"
 dubois_safari_decision_desc: "派遣一支探险队深入非洲荒野，为我们的[concept_dubois_zoo]寻找强动物。通过追踪和巧设陷阱，或许能捕获活体标本。每次狩猎只能获取一种生物。体型越庞大笨重的野兽，需要的陷阱就越多；行动敏捷的生物则需要不懈的追踪。"
 je_dubois_safari: "非洲狩猎探险"
 je_dubois_safari_reason: "一队经验丰富的猎人和博物学家已被派往非洲进行狩猎探险，任务是为我们的[concept_dubois_zoo]获取一件稀有标本。探险队必须同时运用智慧、耐力和科学方法才能成功。大型野兽需要设置大量陷阱；敏捷的野兽则需依靠娴熟的追踪技巧。每次探险只能带回一只动物。"
 je_dubois_safari_goal: "非洲狩猎探险为期半年。如果在此期间未能捕获动物，他们将空手而归，所有努力都将付诸东流。"
 je_dubois_safari_fail: "狩猎探险以失败告终，团队空手而归，未能带回任何动物。"
 je_dubois_dinosaur_excavation: "恐龙挖掘"
 je_dubois_dinosaur_excavation_reason: "在发现一块恐龙骨骼后，[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName]教授开始了大规模的挖掘工作。在长达一年的调查中，根据经验，我们的[concept_dubois_paleontologist]有可能再发现一到三块恐龙骨骼。发掘结束时，如果我们还没有找到一具恐龙骨架的所有可能骨骼，可能还会发现另一块骨骼。在古生物展览中，需要5块恐龙骨骼才能构建一具骨架。"
 je_dubois_dinosaur_excavation_goal: "十二个月后我们的[concept_dubois_paleontologist]将会记录结果。"
 dubois_specimen_tt: "至少有#G 50000个#!@dubois_specimen!#O 生物学[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]#!（代表着动物学和植物学发现的档案。）"
 notification_dubois_paleontological_report_notification_name: "年度古生物学报告"
 notification_dubois_paleontological_report_notification_desc: "近年我国[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]发现了[GetPlayer.MakeScope.Var('dubois_fossils_notification_var').GetValue|0+=]件新化石。"
 notification_dubois_java_man_notification_name: "[INITIATOR_COUNTRY.GetName]发现爪哇人"
 notification_dubois_java_man_notification_desc: "[INITIATOR_COUNTRY.GetName]的一位[concept_dubois_paleontologist]在爪哇岛上发现了一件重要的骨架，这可能解答人类进化的问题。"
 dubois.1.t: "动物园揭幕"
 dubois.1.d: "新[concept_dubois_zoo]开放当天，游客们蜂拥而至，争相观赏动物。不久之后人们就希望加建的围栏以安置更多的动物。"
 dubois.1.f: "“两天前的晚上，我在埃克塞特交易所看到了老虎。除了莫雷亚的维利帕夏的狮子像狗一样跟着阿拉伯饲养员外，鬣狗对饲养员的喜爱最让我开心。多么有趣的交流！——有一只“河马”，脸长得像利物浦勋爵；还有一只“树懒”，声音和举止都像我的贴身男仆——但老虎话太多了。大象拿了我的钱又还给我——摘下我的帽子，打开门，甩起尾巴，它表现得那么好，我真希望它能做我的管家。地球上最英俊的动物是豹子，但可怜的羚羊都死了。我真不愿意在这里看到羚羊：看到骆驼，我又开始向往小亚细亚了。” ——拜伦勋爵"
 dubois.1.g: "国家动物园的辉煌开端。"
 dubois.2.t: "《物种起源》"
 dubois.2.d: "[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]教授在新出版的著作中做出了开创性的科学贡献：解释了各个物种的起源。"
 dubois.2.f: "“由于这种斗争，不管怎样轻微的、也不管由于什么原因所发生的变异，只要在一个物种的一些个体同其他生物的、以及同生活的物理条件的无限复杂关系中多少有利于它们，这些变异就会使这样的个体保存下来，并且一般会遗传给后代。……我把每一个有用的微小变异被保存下来的这一原理称为“自然选择”，以表明它和人工选择的关系。” ——查尔斯‑达尔文"
 dubois.2.g: "这一理论将彻底改变科学。"
 dubois.2.h: "科学再一次推翻了宗教迷信。"
 dubois.3.t: "小猎犬号返航"
 dubois.3.d: "经过几年的科学考察后，终于返航。这艘船带回了丰富的自然标本、化石、详细草图及观测数据。船员中包括著名的[concept_dubois_naturalist][SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]，其贡献意义重大。"
 dubois.3.f: "“当我以博物学者的身份参加小猎犬号皇家军舰航游世界时，我曾在南美洲看到有关生物的地理分布以及现存生物和古代生物的地质关系的某些事实，这些事实深深地打动了我。正如本书以后各章所要论述的那样，这些事实似乎对于物种起源提出了一些说明一一这人问题曾被我们最伟大的哲学家之一称为神秘而又神秘的。”——查尔斯·达尔文"
 dubois.3.g: "一段奇妙的旅程——会产生什么样的后果？"
 dubois.4.t: "《宇宙》"
 dubois.4.d: "《宇宙》（英文作Cosmos）是德国科学家和探险家亚历山大·冯·洪堡撰写的一部关于科学和自然的影响深远的论文。《宇宙》最初是洪堡在柏林大学的系列讲座，如今这部百科全书式的自然与人类探索已传遍全球读者。"
 dubois.4.f: "“在繁忙生活的深夜，我将为德国人民献上一部作品，近半个世纪以来，它的模糊形象一直在我的脑海中徘徊。我常常认为这部作品无法完成：但每当我想要放弃时，又一次次或许是漫不经心地重新动笔。带着对自己能力的不自信，我把它献给我的同时代人，我试着忘记，翘首以盼的著作通常不会得到过多的宽容。” ——亚历山大·冯·洪堡"
 dubois.4.g: "当代科学思想的基石。"
 dubois.4.h: "这项工作将激励子孙后代。"
 dubois.5.t: "孟德尔的遗产"
 dubois.5.d: "格雷戈尔·孟德尔修士的工作被重新发现，为遗传学领域带来了重大突破。他的论文已被称为“孟德尔定律”。"
 dubois.5.f: "“为了获得新的颜色变化，我们对观赏植物进行了人工授粉。每当同一物种之间发生授粉时，相同的杂交形式总是会重新出现，这种惊人的规律性促使我们进行进一步的实验，其目的是跟踪杂交子代的发展情况。” ——格雷戈尔·孟德尔"
 dubois.5.g: "现代遗传学的兴起。"
 dubois.6.t: "爪哇化石的发现"
 dubois.6.d: "在荷属东印度群岛，一位医生兼解剖学家[SCOPE.sCharacter('dubois_new_paleontologist_scope').GetFullName]发现了史前人类祖先的化石遗骸，这一发现在科学界引发了轰动。"
 dubois.6.f: "1891年，[SCOPE.sCharacter('dubois_new_paleontologist_scope').GetFullName]在东爪哇特里尼尔附近的梭罗河畔首次发现的化石被称为爪哇猿人。根据目前的知识估计其大约有一百万年的历史。它们是在欧洲以外发现的第一批人类化石，也是继尼安德特人之后找到的第二批现代人（智人）解剖学亲属化石证据。爪哇发现的人类化石最初被称为人猿，后来又被称为直立猿人。如今，大多数古人类学家都把它们归入直立人这一物种，偶尔也会像魏敦瑞在1940年建议的那样，以爪哇直立人这一亚种名强调它们的起源。在杜布瓦的发现50年后，拉尔夫·冯·孔尼华回忆说：“没有任何其他古生物学发现能引起如此大的轰动，并导致如此多相互冲突的科学观点。”"
 dubois.11.t: "新[concept_dubois_zoo_animal]"
 dubois.11.d: "[SCOPE.sCountry('dubois_animal_country').GetName] has graciously consented to the transfer of a rare specimen for exhibition within our esteemed Zoological Gardens."
 dubois.11.f: "In accordance with the protocols of scientific exchange, only a single animal may be procured for the Zoological Gardens at any given time. Upon acquisition, a period of several weeks shall elapse as the creature is conveyed and acclimatized to its new environs. Only after a proper and dignified introduction to the collection may further diplomatic overtures for additional specimens be undertaken. Which distinguished animal shall grace our menagerie?"
