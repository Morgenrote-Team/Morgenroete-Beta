 je_dubois_paleontological_expedition_yield_level_4_loc: "#p 4#!@dubois_fossil![Concept('concept_dubois_fossil','$concept_dubois_fossils$')]\n#p 1#!@dubois_dinosaur_bone![concept_dubois_dinosaur_bone]"
