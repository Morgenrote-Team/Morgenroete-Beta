 dubois.271.t_cretaceous: "史前景观：白垩纪"
 dubois.271.t_jurassic: "史前景观：侏罗纪"
 dubois.271.t_triassic: "史前景观：三叠纪"
 dubois.271.d: "[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]博士今日邀请了一群同行来欣赏新的史前景观。学者们一致赞扬[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis]的作品在细节之处的真实性。"
 dubois.271.f_cretaceous: "白垩纪是中生代的最后一个时期，历时近8000万年，是显生宙中最长的阶段，始于约1.455亿年前，结束于6550万年前。白垩纪因欧洲西部的白垩沉积层而得名，它既是恐龙的辉煌巅峰，也是它们的最终谢幕。在这一时期，恐龙主宰了陆地的各大生态位，鸟类的演化也在此时开始。尽管鱼龙和上龙在海洋中逐渐衰退，但蛇颈龙和沧龙迅速崛起，成为新的海洋霸主。在天空中，翼龙仍然称霸，但种类有所减少，低空生态位则被反鸟亚纲占据。白垩纪末期的灭绝事件终结了恐龙的统治，揭开了新生代的序幕。"
 dubois.271.f_jurassic: "侏罗纪是中生代的第二个时期，始于约两亿一百三十万年前，持续了五千三百六十万年。在这一时期，地球气候温暖，裸子植物和蕨类植物繁茂，广袤的森林遍布全球，为现代煤炭资源的形成奠定了基础。盘古大陆的分裂导致南美与非洲分离，大西洋和墨西哥湾逐渐形成。侏罗纪初期，恐龙开始在陆地上崛起，逐渐成为地球的主宰；翼龙首次飞向天空，蛇颈龙和上龙则在海洋中称霸。侏罗纪标志着恐龙统治地球的开端，这一统治一直延续到白垩纪末的灭绝事件终结。"
 dubois.271.f_triassic: "三叠纪是中生代的第一个时期，始于2.51亿年前，结束于2.01亿年前，介于二叠纪和侏罗纪之间。在这一时期，四足动物经历了重大的演化转折。古生代繁盛的离片椎类两栖动物逐渐衰落，兽齿类虽然曾一度繁盛，但最终仅存的犬齿兽演化为哺乳形类。由于三叠纪气候干旱，蜥形纲中的主龙类迅速崛起，成为陆地上的主导物种。同时，部分非主龙类爬行动物重返海洋，开启了中生代的海洋革命。在晚三叠纪，恐龙和翼龙的崛起宣告了它们对地球长达1.4亿年的统治开始。"
 dubois.271.g: "漂亮得很呐！"
 dubois.272.t: "材料"
 dubois.272.d: "[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetFullName]在完成史前场景布置时表现出极高的完美主义倾向，因此，[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe]已经用光了所有的预算。"
 dubois.272.f: "是为了展览特别订购的恐龙蛋？还是那些精美的种子？亦或是搬运工因运送天然泥土而收到的300英镑小费？无论出于何种原因，[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]博士都难以解释，钱就这样从指缝间流走了。"
 dubois.272.g: "还要更多钱来买些人造植物和蜥蜴？没门！"
 dubois.272.h: "我们想要的就要做到尽善尽美——钱不是问题！"
 dubois.273.t: "荒谬的工作？"
 dubois.273.d: "一些学术“同事”因[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]对史前场景的痴迷，不仅在背后嘲笑[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis]，现在甚至当面讽刺。一些研究人员认为，[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis]的活动不过是一个荒谬的爱好，而这个项目本质上也是可笑的。"
 dubois.273.f: "“记录过渡形态的化石极为罕见，简直就像是古生物学的商业机密。”\n——索伦·奥比·克尔凯郭尔"
 dubois.273.g: "古生物学是一门严肃的科学！"
 dubois.273.h: "诚然，我国的古生物学家有点古怪。"
 dubois.273.i: "买几瓶雪利酒送给那些令人厌烦的学者，好让他们别再打扰那位博士。"
 dubois.274.t: "学生们的兴趣"
 dubois.274.d: "几周以来，大学的学生们怀着日益浓厚的兴趣，关注着[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]博士构建史前场景的过程。对一些人来说，这或许是个古怪的项目，但对另一些人而言，它却是一种灵感——让遥远的过去突然变得触手可及。"
 dubois.274.f: "伦敦南部的水晶宫公园恐龙园是一个以地质和古生物学为主题的公园，以19世纪中期本杰明·沃特豪斯·霍金斯创作的动物雕塑而闻名。这些雕塑是世界上首批按实际大小制作的灭绝动物形象展示，旨在为维多利亚时代的游客提供娱乐和教育。公园内的湖岛被设计为英国风景园林，并建成了一个反映英国地质历史的主题园区。根据地质学家大卫·托马斯·安斯特德的设想，每个岛屿对应显生宙的一个时代，并采用该时代形成的沉积物进行设计。霍金斯在制作这些雕塑时得到了古生物学家理查德·欧文的指导。尽管这些史前动物形象在同一世纪后来的研究中已不再符合最新的科学发现，但它们仍引起了极大的关注，并为公众普及了基础的古生物学知识。"
 dubois.274.g: "新一代的学者！"
 dubois.274.h: "他们应该帮帮可怜的博士。"
 je_dubois_safari_hippopotamus: "非洲狩猎探险：河马"
 je_dubois_safari_hippopotamus_reason: "在非洲狩猎探险中，通过追踪和诱捕可以捕捉到大型动物，然后运到[concept_dubois_zoo]。每次狩猎探险只能捕获一只动物。根据动物种类的不同，是否需要捕兽夹或是否必须跟踪它们也不尽相同。体型大、行动迟缓的动物需要更多的陷阱，而速度快的动物则需要更多的追踪。狩猎探险会持续300天，如果没有成功捕捉到动物，游猎队伍会在到期后离开。\n\n攻击性动物在被捕捉时会进行自卫和反击，而害羞的动物则会选择逃跑。拥有动物学家特质的[concept_dubois_naturalist]能够在这种情况下游刃有余地应对这些问题。诸如#ORANGE 机枪#!或#ORANGE 内燃机#!等新技术让追踪和捕捉动物变得更加容易。"
