 dubois.231.t: "宿敌摧毁挖掘场"
 dubois.231.d: "[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]博士正在追踪一个很有希望的矿藏。然而到达那里时，却发现竞争对手已经挖出了许多骨头，并炸毁了现场。"
 dubois.231.f: "如果我没有拿到那些化石，那谁也不能有！"
 dubois.231.g: "他们为什么要这么做！"
 dubois.232.t: "当地人分享信息"
 dubois.232.d: "一个小村庄的居民在附近发现了各种化石。他们高兴地与[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]博士分享了这些化石。让[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHim]离发现新的挖掘地点更近一步！"
 dubois.232.f: "我的祖父曾找到过一只独角兽的角。我知道你在想什么！但我觉得那是恐龙的骨头！可惜他把它卖了。但他告诉我是在哪里找到的化石，就在河床下面。我相信你会在河边找到一些骨头的。"
 dubois.232.g: "谢谢你！"
 dubois.233.t: "当地古生物学家分享研究成果"
 dubois.233.d: "一个小村庄的居民显然也是一位业余古生物学家。由于[SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]年事已高，无法再挖掘可能，所以他将自己所有的知识与[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]博士分享。"
 dubois.233.f: "我从小就开始收集化石，从未间断。但现在我太老了，已经不能跪在地上自己挖了。所以我希望我至少能帮你找到一些恐龙骨头和化石。如果你找到了，请让我看看！"
 dubois.233.g: "这是一个了不起的收藏！"
 dubois.234.t: "泥石流掩埋了一个充满希望的场地"
 dubois.234.d: "就在[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]博士和[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis]团队发现一个有希望的地点后的第二天，它就被一场巨大的泥石流掩埋了。要揭开隐藏在泥土下的东西，需要数月甚至数年的时间。"
 dubois.234.f: "先是天气太热不适合挖地，后是天气太湿不适合挖地，现在又是泥泞不堪不适合挖地？真倒霉！"
 dubois.234.g: "该死的天气！"
 dubois.235.t: "一条新的线索"
 dubois.235.d: "[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]博士的辛勤工作终于要看到回报了。在总结了关于岩石和地层的报告后，[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe]确定了一些很可能有发现的地点。希望[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe]能在这些地方找到恐龙的骨骼化石。"
 dubois.235.f: "你看，这些沉积物通常埋有恐龙骨骼化石。它们会在这些地方露出来，所以我们一定会在这些地方之一找到化石的！我们很有希望……或许。"
 dubois.235.g: "干得好！"
