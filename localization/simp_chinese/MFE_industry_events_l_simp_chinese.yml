 mfe_industry_events.1.t:0 "铁路公司的兴起"
 mfe_industry_events.1.d:0 "一个有关系的政治家[SCOPE.sCharacter('rich_dude').GetFullName]想资助一家新的铁路公司，但[SCOPE.gsInterestGroup('ig_intelligentsia').GetName]不支持这个新提议。"
 mfe_industry_events.1.f:0 "“铁路热正在席卷整个世界，有很多赚钱的机会，我们必须迅速行动！你看怎么样？”"
 mfe_industry_events.1.a:0 "允许[SCOPE.sCharacter('rich_dude').GetFullName]继续营业"
 mfe_industry_events.1.b:0 "阻挠提议"
 mfe_industry_events.1.c:0 "资助他们！"
 mfe_industry_events.2.t:0 "欣欣向荣的铁路公司"
 mfe_industry_events.2.d:0 "在[SCOPE.sState('railway_state').GetName]中的新铁路在当地人中引起了轰动，他们接受了这些铁路。"
 mfe_industry_events.2.f:0 "“过去，从[SCOPE.sState('railway_state').GetName]到[ROOT.GetCountry.GetCapital.GetName]需要三个小时的行程，但新路线将行程时间缩短了一半！”"
 mfe_industry_events.2.a:0 "真好！"
 mfe_industry_events.3.t:0 "铁路公司遇到麻烦"
 mfe_industry_events.3.d:0 "市场的突然变化给[SCOPE.gsInterestGroup('ig_industrialists').GetName]带来压力，大量资本外逃现在财政枯竭，[SCOPE.sState('railway_state').GetName]中过度扩张的铁路公司正在面临倒闭问题。"
 mfe_industry_events.3.f:0 "“当然，媒体总喜欢在这方面大做文章，每天都有[SCOPE.gsInterestGroup('ig_intelligentsia').GetName]的成员写文章抨击我们，现在应该做些什么来回应？”"
 mfe_industry_events.3.a:0 "补贴铁路！"
 mfe_industry_events.3.b:0 "那些[SCOPE.gsInterestGroup('ig_industrialists').GetName]是想要自由市场的人……"
 subsidize_rail_state_tt:0 " 在[SCOPE.sState('railway_state').GetName]开始补贴铁路。"