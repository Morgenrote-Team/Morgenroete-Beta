 curtiss.231.t: "新奇事物：飞机上提供食物"
 curtiss.231.d: "飞机上提供了一项新服务！乘客首次可以在飞机上以低廉的价格购买三明治，这招使我们的航空公司成为世界上最具创新精神的公司之一！"
 curtiss.231.f: "“您想吃三明治吗？” \n“三明治听起来棒极了！你们也卖饮料吗？”\n"
 curtiss.231.g: "至少不会饿死！"
 curtiss.231.h: "他们一个三明治要多少钱？！"
