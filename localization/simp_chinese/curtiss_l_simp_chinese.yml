 curtiss_tourism_tech: "旅游业"
 curtiss_tourism_tech_desc: "[concept_curtiss_tourism]是现代旅游可以追溯到壮游，指的是欧洲上层阶级的年轻人环游欧洲，直到1840年代大规模的铁路运输的出现，形成了标准的旅游行程。虽然这主要限于英国贵族和有钱的乡村贵族，但是北欧新教徒有类似的旅行，并从18世纪中叶开始有南美、美国和其他海外年轻人加入。铁路和蒸汽船的出现使得旅游变得简单，中产阶级也因此受益。"
