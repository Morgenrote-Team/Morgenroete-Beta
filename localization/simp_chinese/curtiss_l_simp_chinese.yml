 mobilization_option_bomber_squadron_desc: "世界大战过后，世界上大多数地方的民众常常害怕战略轰炸的使用将毁灭人类。"
 mobilization_option_ballon_recon_desc: "拿破仑战争期间就已经开始使用气球作为侦察工具，自美国内战以来，其在侦察上的价值在不断提高。"
