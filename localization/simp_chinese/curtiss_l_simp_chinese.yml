 curtiss_aerobatic_team_modifier: "特技飞行队"
 curtiss_giant_aircraft_propaganda_modifier: "巨型飞机宣传"
 mr_seriously_injured: "重伤"
 mr_seriously_injured_desc: "该角色身受重伤，恢复之路会很漫长。"
 curtiss_recalled_pilot_tt: "如果[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]提前从前线召回，则任务结束。"
 curtiss.300.t: "飞行员抵达前线"
 curtiss.300.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]已到达前线并加入了[SCOPE.sCharacter('flying_circus_general').GetFullName]战斗小组。"
 curtiss.300.f: "空战是一件英勇而危险的事情。只有健康的飞行员才能积累经验。对于一些人来说，战争的经历可能会挥之不去，既有积极的一面，也有消极的一面。"
 curtiss.300.g: "他应该从空中支援！"
 curtiss.301.t: "飞行员从前线返回"
 curtiss.301.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]已从战斗中返回，现在又可以派遣任务了。"
 curtiss.301.f: "“我们的自信心受到了打击：如果巴拉卡都能被击落，我该怎么避免同样的命运？但同时，我们也感到了一种意外的安慰：巴拉卡不是被敌方战斗机击落的。他作为猎手的威望没有受到损害。就像齐格弗里德一样，只有卑鄙的偷袭才能击败他。敌人无法为这种结局自夸。而这才是最重要的。” ——马里奥·富奇尼"
 curtiss.301.g: "这是我对飞行员的要求只有安全一个标准。"
 curtiss.321.t: "地狱之门"
 curtiss.321.d: "[SCOPE.sCharacter('curtiss_bomber_general').GetFullName]已同意使用轰炸机中队轰炸[SCOPE.sState('curtiss_bomber_state').GetName]的大部分地区，使现有基础设施遭到严重破坏，会对平民造成的高附带损害。"
 curtiss.321.f: "“在我之前，没有创造的东西，\n  只有永恒的事物；而我永存：\n  你们走进这里的，把一切希望捐弃吧。”——但丁·阿利吉耶里"
 curtiss.321.g: "将该地区炸得面目全非。"
 curtiss.321.h: "战争也有其局限性。"
 curtiss.322.t: "来势汹汹的钢铁怪兽"
 curtiss.322.d: "在这场战争中，齐柏林飞艇被视为现代化武器。我们国家对这些设备的重视正在得到回报。[SCOPE.sCharacter('curtiss_zeppelin_general').GetFullName]的齐柏林飞艇舰队名声远扬，敌人听到这个名字就会胆战心惊！"
 curtiss.322.f: "尽管齐柏林飞艇的袭击造成较小的损失，但却在敌军和平民中散布了巨大恐惧和惊吓，为此不惜占用了对大量资源来对抗德国飞艇，不过齐柏林飞艇的攻击既没有永久性地动摇敌军的士气，也没有严重造成战争阻碍。"
 curtiss.322.g: "如此美丽的事物，为何如此残忍？"
 curtiss.323.t: "受伤的猎物"
 curtiss.323.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]的中队击退了敌人空袭，并造成重创。飞行员现在想追击逃跑的敌人，将其干掉。"
 curtiss.323.f: "“当时许多飞行员认为战斗机飞行员在封闭的驾驶舱内是不可能做到的事情，但你应该闻到敌人的气味，闻到他们身上的燃油味”——阿道夫·加兰德"
 curtiss.323.g: "干得好！"
 curtiss.323.h: "这很有可能是个陷阱。"
 curtiss.324.t: "缴获敌机"
 curtiss.324.d: "我军在敌方领土的军事行动中，夺取了一个机场并缴获了几架飞机。"
 curtiss.324.f: ""
 curtiss.324.g: "研究他们的飞机！"
 curtiss.325.t: "空中决斗"
 curtiss.325.d: "敌方飞行员 [SCOPE.sCharacter('duel_participant_2').GetFullName]率领中队袭击我军阵地。S[SCOPE.sCharacter('duel_participant_1').GetFullName]能否与他抗衡，成为天空中的英雄？"
 curtiss.325.f: "空中对决的胜算主要取决于两名飞行员的特质和经验。"
 curtiss.325.g: "进攻！"
 curtiss.325.h: "撤退！"
 curtiss.325.i: "智胜！"
 curtiss.325.tt: "这要归功于[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]的#YELLOW 特技飞行员特质#!"
 curtiss.326.t: "战时航空工程师"
 curtiss.326.d: "我们的航空工程师在前线修理损坏的飞机，并用新飞机替换被毁坏的飞机。在此过程中，[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName]获得了宝贵的经验。"
 curtiss.326.f: "“航空航天不是一个工业，也不是一门科学，是一个奇迹。”——伊戈尔·伊万诺维奇·西科斯基"
 curtiss.326.g: "重要援助"
 curtiss.327.t: "特殊空中侦察"
 curtiss.327.d: "在一次大胆的演习中，我们的飞行员继续飞越敌区，拍摄了敌军营地以及地理和基础设施状况的照片。[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]宝贵的侦察工作有助于军队更快地占领敌方领土。"
 curtiss.327.f: "“起初，人们可能对航空侦察的成功并无多大信心，机场总是在战场后方几公里处，大约在总指挥部附近。你在机场接到命令。然后，你要飞到离敌人大约1200米的高空。低空飞行并不行，因为法国人射程相当高。我的机翼已经被他们打了好几个洞。天气好的时候，从这个高度可以很好地观察敌情。我们的双层飞机速度很快，因此可以在很短的时间内飞越很远的距离。观察员记录下他所看到的情况，然后你再飞回来。然后从机场乘车将报告送到总指挥部”——柏林1914年9月26日《世界报》，匿名飞行员著"
 curtiss.327.g: "这对我们非常有用。"
 curtiss.328.t: "飞行员受伤"
 curtiss.328.d: "最后一次空战结束后，[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]因受伤不得不暂时放弃任务。医生随后发现伤势比最初想象的还要严重。我们的飞行员将有一段时间无法飞行。"
 curtiss.328.f: "受伤的飞行员不能执行飞行任务，因此不能记录任何空中击杀或获得经验，一到三个月后飞行员才会痊愈。"
 curtiss.328.g: "这意味着要住院几周……"
 curtiss.329.t: "坠机！"
 curtiss.329.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]在任务中中弹，发生了严重事故，紧急迫降在方前线，尽管救援人员成功将飞行员救出，但其伤势严重。"
 curtiss.329.f: "受重伤的飞行员要休养六个月，最坏的情况下可能要休养整整一年，甚至还有可能出现严重的战争创伤。"
 curtiss.329.g: "糟透了！"
 curtiss.331.t: "战争创伤"
 curtiss.331.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]已从坠机事故中恢复过来，但是精神上的损失难以回复。"
 curtiss.331.f: "“你们都是迷惘的一代。”\n——欧内斯特·海明威"
 curtiss.331.g: "令人担忧的消息。"
 curtiss.400.t: "特技飞行表演"
 curtiss.400.d: "一场真正的飞行表演通常包含由特定飞机编队进行的特技表演。这些危险性十足的表演既能展示我国空军的实力，又能取悦我国民众。[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]是该尝试一下危险但精彩的大范围机动？还是常规飞行动作变变花样就好？"
 curtiss.400.f: "完成精彩的特技表演动作的飞行员可以获得\"特技飞行员\"特质。然而,在进行这些富有挑战性的动作时,也存在失败的风险,可能导致灾难性的事故。为了预防这种情况,飞行员应当具备足够的经验,以及诸如“战斗机飞行员”、“施耐德杯资深飞行员”、“勇敢”或“机智”等积极特质。获得“特技飞行员”特质后,他们总是能够完美地展现令人惊叹的特技动作。"
 curtiss.400.g: "来段大范围机动。"
 curtiss.400.h: "常规飞行动作就够了。"
 curtiss.411.t: "完美的飞行表演"
 curtiss.411.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]在飞行表演中做出了令人叹为观止的完美飞行动作，令军官和观众大饱眼福。"
 curtiss.411.g: "完美！"
 curtiss.412.t: "完美动作"
 curtiss.412.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]在飞行展上展示了一个令人赞誉的飞行动作，甚至与绝对完美之间只差几个小细节。"
 curtiss.412.g: "好。"
 curtiss.413.t: "平庸的动作"
 curtiss.413.d: "飞行表演变成了一场相当无聊的活动，[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]的动作一板一眼让人不感兴趣。"
 curtiss.413.g: "没什么特别的……"
 curtiss.414.t: "飞行灾难"
 curtiss.414.d: "飞行表演变成了恐怖事件！[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]在执行一个危险动作时飞机失控坠毁！几名观众受伤，这位倒霉的飞行员在表演中丧生，活动随即取消。"
 curtiss.414.g: "真是灾难！"
 curtiss.411.f: "航展是飞行员展示飞行技巧的户外活动，他们经常展示精彩的飞行动作和飞行状态，例如特技飞行（单独或以编队飞行的方式展示这些动作）。飞行员用快速连续的飞行动作娱乐观众并给观众留下深刻印象。军事飞行员展示的许多飞行动作都是常见的军用飞机飞行动作。除其他外，飞行员还定期训练这些动作，为空战做准备。1909年8月22日至29日在法国兰斯举行的“兰斯航展”是第一次公开的国际航展，在这次航展上展示和试飞了多种不同类型的飞机。同年9月，另一场航展在意大利布雷西亚举行。过去，在航展和航展训练期间发生过许多事故，有时甚至是灾难事故（主要原因是飞机之间的距离窄、飞行高度低和飞行速度）。"
 curtiss.421.t: "特技飞行队"
 curtiss.421.d: "[SCOPE.sCharacter('curtiss_general_scope').GetFullName]不仅是一位高明的指挥官，还以高超的驾驶技术而闻名。在飞机阅兵典礼上，将军将几名军官组成特技飞行队，展示编队动作。"
 curtiss.421.f: "特技飞行队是由一群精通并展示特技飞行的飞行员组成的。多个飞行器组成一个叫做中队的单位。许多特技飞行队都是空军中队。英国被认为是特技飞行的发源地。20世纪20年代，英国的航空技术得到了极大的完善，无论是单独飞行还是团队飞行。也是在那个时候，第一次在机场举行的公众活动吸引了成千上万的观众。"
 curtiss.421.g: "精彩的表演。"
 curtiss.422.t: "飞行表演上的新原型机"
 curtiss.422.d: "在飞行表演进行之际，[SCOPE.sCharacter('gaudi_engineer_scope').GetFullName]制造了一架新飞机的测试型号。"
 curtiss.422.f: "飞行表演不仅是证明特技飞行技巧和展露空军军事潜力的方式，也是向世界宣告科技成就与工程壮举的机会。"
 curtiss.422.g: "航空灵感。"
 curtiss.423.t: "飞行表演中的[ROOT.GetCountry.GetCapital.GetCityHubName]"
 curtiss.424.t: "飞行表演中的[ROOT.GetCountry.GetNameNoFormatting]"
 curtiss.423.d: "[GetPlayer.MakeScope.Var('curtiss_airline_tycoon_var').GetCharacter.GetFullName]与其巨型飞机一同出席本次飞行表演，技惊四座。"
 curtiss.424.d: "巨大的飞艇在飞行表演中令观众惊叹。人们对进步和意志能实现的成就感到着迷。"
 curtiss.423.f: "没什么比这么一架巨型飞行器更能让人们相信我国的优越与伟大了。"
 curtiss.423.g: "飞啊！亲爱的！飞！"
 curtiss.425.t: "大众影响"
 curtiss.425.d: "飞行表演唤起了越来越多人的独特感受。这是一种迷恋与恐惧的交织：一方面，飞机展示了我们国家的规模和力量；另一方面，这种美丽中隐含着一种破坏的欲望。空中优势是否是人类优势的一个方面？"
 curtiss.425.f: "“航空学为人类开辟了一个新的行动领域——空中领域。这样一来，它必然创造了一个新的战场；因为只要两个人相遇，冲突是不可避免的。事实上，航空学在被民用之前就已经广泛用于战争。第一次世界大战爆发时，这门新科学还处于起步阶段，但却因此得到了强大的军事发展动力。” ——朱利奥·杜黑"
 curtiss.425.g: "毕竟，我们可是大国。"
 curtiss.431.t: "飞行表演结束了"
 curtiss.431.d: "飞行表演已经结束了，但它留下的印象会持续很长时间，激励军队、平民以及未来和现役的飞行员们——同时也向外国展示我们国家的伟大。"
 curtiss.431.f: "“什么时候再来一场？”"
 curtiss.431.g: "这件事让人振奋。"
 curtiss_airplane_speed_record_modifier: "飞机时速纪录"
 curtiss_testplane_cost_modifier: "测试机生产"
 je_curtiss_testplane_build: "测试机生产"
 je_curtiss_testplane_build_reason: "测试机的性能主要取决于航空工程师的经验与已研究的科技。关键科技有：#O 现代物理学#!、#O 电弧焊#!、#O 水上飞机#!和#O 现代航空#!。为了充分发挥测试机的潜力，一位#V 活跃的飞行员#!是不可或缺的，其经验也会直接影响最高时速。"
 je_curtiss_testplane_build_goal: "制造一架新飞机将花费一年左右的时间。"
 notification_curtiss_speed_record_broken_notification_name: "[SCOPE.sCountry('curtiss_record_breaking_country').GetName]打破了我们的速度纪录！"
 notification_curtiss_speed_record_broken_notification_desc: "来自[SCOPE.sCountry('curtiss_record_breaking_country').GetName]的飞行员[SCOPE.sCountry('curtiss_record_breaking_country').MakeScope.GetVariable('curtiss_pilot_var').GetCharacter.GetFullName]以[GetGlobalVariable('curtiss_airplane_speed_record_global_var').GetValue|V0]km/h的时速打破了我们的世界纪录。"
 curtiss.60.t: "[SCOPE.sCharacter('curtiss_cook_scope').GetFullNameNoFormatting]父子公司"
 curtiss.60.d: "[SCOPE.sCharacter('curtiss_cook_scope').GetFullName]创办了我国第一个旅游公司——为本土的旅游业奠定了基础。尽管收入可能很少，但国家越有趣，来的游客就会更多。"
 curtiss.60.f: "旅游业会为文化强国提供额外的收入。独一无二的奇观、博物馆、画廊、考古展览、艺术中心以及高额的艺术传统都会吸引更多游客。促进移民自由与经济活动自由的法律也会怎加旅游业收入。基础设施也在旅游业中扮演了重要的一环——毕竟，人们还是很难到达偏远地区。便利通行的机场将大幅增加旅游业的收入，带来革命性的变革。"
 curtiss.60.g: "游客为艺术和文化买单吗？"
 curtiss.700.t: "新的测试机准备好啦！"
 curtiss.700.d: "我国工程师[ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName]已完成了测试机的收尾工作。这架测试机的技术名称是[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_letter_name')]‑[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_second_number_name')]。[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]更喜欢叫它[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_nick_name')]。"
 curtiss.700.f: "#V 飞机数据#!\n\n名称：[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_letter_name')]‑[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_nick_name')]\n型号：[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_type')]\n特征：[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_plane')]\n材料：[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_material')]\n发动机：[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_engine')]\n预估时速：[ROOT.Var('test_airplane_speed_var').GetValue]km/h"
 curtiss.700.g: "准备起飞！"
 curtiss.700.h: "这太冒险了！"
 curtiss.701.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_nick_name')]！起飞！"
 curtiss.701.d1: "[SCOPE.sCharacter('curtiss_pilot_scope').GetSheHe]#b #n [ROOT.Var('new_airplane_speed_var').GetValue]#!#!的时速还不够打破我国之前#b #p [ROOT.Var('curtiss_airplane_speed_record_var').GetValue]#!km/h#!的纪录。我国的航空业今天很失望。"
 curtiss.701.d2: "[ROOT.Var('curtiss_pilot_var').GetCharacter.GetFullName]驾驶[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_letter_name')]‑[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_second_number_name')]创造了新的速度纪录。[SCOPE.sCharacter('curtiss_pilot_scope').GetSheHe]#b #p [ROOT.Var('new_airplane_speed_var').GetValue]#!km/h#!已足以打破我国之前#b #p [ROOT.Var('curtiss_airplane_speed_record_var').GetValue]#!km/h#!的纪录，但还不够打破[GetGlobalVariable('curtiss_airplane_speed_record_holder_global_var').GetCountry.GetFlagTextIcon]#b #p [GetGlobalVariable('curtiss_airplane_speed_record_global_var').GetValue]#!km/h#!的世界纪录。"
 curtiss.701.d3: "机械天才[ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName]和飞行大师[ROOT.Var('curtiss_pilot_var').GetCharacter.GetFullName]携手达成这一举世无双的成就——[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_nick_name')]同时打破了#b #p [ROOT.Var('curtiss_airplane_speed_record_var').GetValue]#!km/h#!的国家纪录与[GetGlobalVariable('curtiss_airplane_speed_record_holder_global_var').GetCountry.GetFlagTextIcon]的#b #p [GetGlobalVariable('curtiss_airplane_speed_record_global_var').GetValue]#!km/h#!的世界纪录。#b #p [ROOT.Var('new_airplane_speed_var').GetValue]#!km/h#!的时速将永远被镌刻在航空史上。[ROOT.GetCountry.GetName]现在已是航空业的领头羊了！"
 curtiss.701.f1: "“我希望被记住的只有一件事：我对航空事业的贡献。”\n——霍华德·休斯"
 curtiss.701.f2: "“去做不可能的事情，因为几乎每个人都告诉我，我的想法只是幻想。”\n——霍华德·休斯"
 curtiss.701.f3: "“如果我在设计上出了岔子，那该由我负责。我永远不会让别人去飞我不飞的飞机。”\n——霍华德·休斯"
 curtiss.701.g: "那是飞机还是飞行员？"
 curtiss.701.h: "很好，但还不够。"
 curtiss.701.i: "太棒了！恭喜！"
 curtiss.702.t: "飞机事故"
 curtiss.702.d: "对速度纪录的追求最终还是以失败告终。在飞行时，[ROOT.Var('curtiss_pilot_var').GetCharacter.GetFullName]丧失了对[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_letter_name')]‑[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_second_number_name')]的控制。[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_nick_name')]将[SCOPE.sCharacter('curtiss_pilot_scope').GetHerHim]拖入火海。整个机组都还没缓过来。"
 curtiss.702.f: "“他不是个坏人。一个糟糕的飞行员，但不是一个坏人。”"
 curtiss.702.g: "不！不——不——"
