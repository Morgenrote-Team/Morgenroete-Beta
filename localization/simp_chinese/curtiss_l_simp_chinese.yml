 curtiss_arctica_expedition_decision: "齐柏林北极探险队"
 curtiss_arctica_expedition_decision_desc: "极地航空，即“用飞艇探索北极的国际研究会”是一个非政府的科学协会，它为自己设定的目标是利用飞艇进行极地研究。它主要是在飞行员和后来的协会秘书长瓦尔特‑布鲁斯的倡议下成立的。1924年的创始主席是弗里乔夫·南森。经过几年的准备工作，该协会于1931年首次成功地使用飞艇进行了纯粹的科学极地考察。通过齐柏林伯爵号的北极飞行，对飞过的极地地区的地理知识有了很大扩展。早在1926年，翁贝托·诺比莱就用他的飞艇“挪威号”飞过了北极，后来又用“意大利号”进行了一次探险。"
 curtiss_hold_schneider_trophy_race_decision: "主办下一届施耐德杯比赛"
 curtiss_hold_schneider_trophy_race_decision_desc: "作为上届比赛的获胜者，我们有幸承办来年的施耐德杯。如果我们连续赢得三届比赛，我们就能永久保留传奇的施耐德杯。"
 curtiss_found_pilot_school_decision: "成立一所飞行员学校"
 curtiss_found_pilot_school_decision_desc: "飞行员学校将使随机出现的人物更有可能拥有飞行员特质。"
 curtiss_lost_horizon_decision: "失踪的飞行员"
 curtiss_lost_horizon_decision_desc: "一位知名的飞行员[GetPlayer.MakeScope.Var('curtiss_conway_var').GetCharacter.GetFullName]，同时也是在印度的名誉领事，神奇地在喜马拉雅山脉地区失踪了。我们应当组织一个救援团队到西藏去。"
 curtiss_lost_horizon_continue_decision: "失踪的飞行员"
 curtiss_lost_horizon_continue_decision_desc: "继续搜寻[GetPlayer.MakeScope.Var('curtiss_conway_var').GetCharacter.GetLastName]。"
 curtiss_lost_horizon_archaeologist_decision: "香格里拉之路"
 curtiss_lost_horizon_archaeologist_decision_desc: "需要一位经验丰富的考古学家来揭开这三件文物的秘密并找到通往香格里拉的道路。"
 je_curtiss_found_schneider_trophy: "举办施耐德杯"
 je_curtiss_found_schneider_trophy_reason: "雅克·施耐德是一位法国工程师，同时是有执照的飞机和气球飞行员，并在很长一段时间内保持着气球的高度纪录。由于一次严重的事故，他被剥夺了飞行的权利，但他在经济上支持各种比赛和航空俱乐部。作为1912年摩纳哥会议的比赛裁判，他注意到，水上飞机的设计远远落后于其他飞机。由于水上飞机有望成为远程客运服务的最佳解决方案，施耐德先生认为，水上飞机比赛可以使这些飞机更快地改进。"
 je_curtiss_found_schneider_trophy_goal: "至少有#BLUE 5#!个国际地位不低于主要政权且拥有三个港口的国家已经发明了#E 水上飞机#!。目前仅有#G [GetGlobalVariable('curtiss_seaplane_nations').GetValue]#!个国家满足要求。"
 je_curtiss_schneider_trophy_race: "施耐德杯比赛"
 je_curtiss_schneider_trophy_race_reason: "施耐德杯是为当时技术最好的飞行准备的竞赛。甚至在比赛实际开始之前，就能够计算出各方获胜的概率。飞行员的数量、王牌飞行员、飞机的重点、现代航空的发明、机场和飞机工厂的数量、成功的培训和政府的支持等因素，在比赛前就能得到相当多的胜点，从而使获胜更有可能。航空公司的规模大小和成功与否也起到一定的作用。剩下的获胜机会是通过给予胜点的比赛计算的，第一个获取30个@curtiss_schneider_point!#E Schneider Trophy Points#!施耐德杯胜点的国家获胜的机会最大。\n\n#b 参赛者：[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_1_type')]、[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_2_type')]、[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_3_type')]、[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_4_type')]、[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_5_type')]、[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_6_type')]、[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_7_type')]、[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_8_type')]、[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_9_type')]、[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_10_type')]、[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_11_type')]、[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_12_type')]、[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_13_type')]、[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_14_type')]、[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_15_type')]"
 je_curtiss_schneider_trophy_race_goal: "我们率先获得#BLUE 30#!@curtiss_schneider_point!施耐德杯胜点就可以赢得比赛。我们目前有#G [ROOT.Var('curtiss_schneider_trophy_point_var').GetValue]#!@curtiss_schneider_point!胜点。"
 je_curtiss_schneider_trophy_race_invalid: "如果其他国家在我们之前得到#BLUE 30#!@curtiss_schneider_point!#E 施耐德杯胜点#!，那么他们就会赢得比赛。"
 curtiss_custom_schneider_participiant_1: "\n[GetGlobalVariable('curtiss_schneider_participiant_1_global_var').GetCountry.GetName]：#p [GetGlobalVariable('curtiss_schneider_participiant_1_global_var').GetVariable('curtiss_schneider_trophy_point_var').GetValue]#!/30"
