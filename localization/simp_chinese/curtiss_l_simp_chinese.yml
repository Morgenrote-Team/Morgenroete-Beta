 curtiss_montgolfier_balloon_tech: "孟格菲气球"
 curtiss_montgolfier_balloon_tech_desc: "孟格菲是第一个气球的名字，以法国发明家孟格菲兄弟约瑟夫‑米歇尔·孟格菲和雅克‑艾蒂安·孟格菲命名。在此“一个天生静止飞行的载具”的消息迅速传遍欧洲。飞行器的首次军事用途发生在法国大革命期间，当时法国人在弗勒鲁斯战役（1794年）中使用氢气球来观察奥地利军队的动向。"
 curtiss_messenger_pidgeons_tech: "信鸽"
 curtiss_messenger_pidgeons_tech_desc: "在19世纪20年代之前，信鸽邮递是很罕见的。1860年，保罗·路透首先成立路透社然后在亚琛和布鲁塞尔之间用一支超过45只鸽子的“车队”传递新闻，甚至用它来连接柏林和巴黎，亚琛是早期电报线路的终点站。在普法战争期间，鸽子被用来在战败的巴黎和法国未被占领的领土之间运送邮件。1870年12月，一只携带微缩胶片的鸽子花了十个小时从佩皮尼昂飞到布鲁塞尔。"
 curtiss_reconnaissance_balloon_tech: "侦察气球"
 curtiss_reconnaissance_balloon_tech_desc: "侦察气球是一个充满气体混合物的气球，它配备军事侦察技术。在美国内战和法德战争期间，气球被用作观察哨。载人系留气球升空并通过绳索固定在地面上，以便观察敌方防线并将情况传递给下面的自己的队伍。"
 curtiss_early_aviation_tech: "早期航空学"
 curtiss_early_aviation_tech_desc: "1867年至1896年间，德国航空先驱奥托·李林塔尔开发滑翔飞行。他也是第一个做出有据可查、反复成功的滑翔飞行的人。奥托·李林塔尔的工作使他提出现代机翼的概念，这在很大程度上激发机翼进一步的发展。美国莱特兄弟在1903年的飞行被认为是“首次重于空气的航空器持续而且受控的动力飞行”。"
 curtiss_seaplanes_tech: "水上飞机"
 curtiss_seaplanes_tech_desc: "第一架水上飞机是由法国工程师亨利·法布尔于1910年3月展示的鸭式水上飞机。这架飞机的首次飞行是1910年3月28日在马赛附近的海面上。年方28岁的法布尔以前从未飞行过。第一次试飞时，飞机以55公里/小时的速度在水面上滑行，却未能飞起来。第二次试飞中，飞机终于飞离了水面，直线飞行约500米。随后法布尔又驾机试飞了两次，并作了小坡度转弯飞行。第二天，飞行距离达到6公里。世界上第一架浮筒式水上飞机诞生了。第一次正式有水上飞机这个称呼则是1913年英国丘吉尔所提出的。"
 curtiss_modern_aviation_tech: "现代航空"
 curtiss_modern_aviation_tech_desc: "民用航空是两大类飞行之一，代表所有非军事和非国家的航空，包括私人和商业航空。在航空的黄金时代，它变得很普遍。豪华旅行者的长途飞行第一次成为可能；早期的飞行服务使用飞艇，但在兴登堡号空难之后，飞艇不再使用，飞机开始占主导地位。"
