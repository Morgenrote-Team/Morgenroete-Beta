 je_curtiss_found_private_airline: "[ROOT.GetCountry.GetAdjectiveNoFormatting]航空公司"
 je_curtiss_found_private_airline_reason: "随着飞机在日常生活中的普及，这已不再是军队的专利。虽然运输费用昂贵，但仍有许多政策激励货物运输和乘客乘坐。在如此的条件下，第一家私营航空公司应该很快成立。"
 je_curtiss_found_state_airline: "国立航空公司"
 je_curtiss_found_state_airline_reason: "在征服天空的全球竞争中，[ROOT.GetCountry.GetNameNoFlag]必须占据一个突出的位置。为了确保我国公民的快速旅行，建立一个国立航空公司是一个好主意。"
 je_curtiss_spruce_goose_plan: "天空中的赫拉克勒斯"
 je_curtiss_spruce_goose_plan_reason: "天空是最后的极限，曾经是现代早期的发现时代，现在是对天空的征服。但与西班牙人的大帆船相比，今天的飞机仅仅是小舟而已。今天，轮船这些庞然大物在海上航行，但天空至今只被小型机器所支配。建造一架巨大的飞机，不是运送几十人几百人的梦想似乎是乌托邦。但是，一个繁荣的飞机工业和一个由合适的人领导的强大航空公司可以把世界颠覆……"
 je_curtiss_spruce_goose_build_reason: "疯狂，妄想，天才，这些词语是什么意思？[SCOPE.sCharacter('howard_hughes').GetFullName]在这个项目中有什么疯狂的想法？它超越了人类的技术和智慧所能想象的极限。它是一架史无前例的巨型飞机，可以载运一个村庄的人口。政府出于对声望的追求，承诺给予这个项目资助。他可以得到高达@money!#R 200000#!的款项。但这对于他的公司来说，只是九牛一毛罢了。如果[SCOPE.sCharacter('howard_hughes').GetLastName]能够让[ROOT.GetCountry.GetCapital.GetCityHubName]飞上天空，他将开创航空业的新纪元。如果他失败了，他的公司和整个航空业都将遭受重创。但这就是像[SCOPE.sCharacter('howard_hughes').GetLastName]这样的怪人的魅力：只有在最终结果揭晓之后，你才能判断你面对的是一个疯子还是一个天才。"
 je_curtiss_spruce_goose_build_goal: "全国最优秀的工程师们一刻不停地为这个巨型飞机的工程工作。他们预估工程总时间大约在#BLUE 36#!个月。自从工程开始后已经过了#G [ROOT.Var('curtiss_spruce_goose_progress').GetValue]#!个月。"
 je_curtiss_hindenburg_plan: "迷人之旅"
 je_curtiss_hindenburg_plan_reason: "飞艇旅行已经达到顶峰，我们国家被认为是世界上最大飞艇的诞生地。现在是时候用一艘更巨大的飞艇惊艳整个世界，周游全球了。"
 je_curtiss_hindenburg_build_reason: "欣欣向荣的航空公司已经委托一个巨大的项目，打算建造一艘可以运载更多的人，乘客们应该被各种奢华所包围，从他们自己的带有三角钢琴的酒吧，以及拥有最好的国际葡萄酒的优秀餐厅。"
 je_curtiss_hindenburg_build_goal: "全国最优秀的工程师们一刻不停地为这个巨型齐柏林飞艇的工程工作。他们预估工程总时间大约在#BLUE 60#!个月。自从工程开始后已经过了#G [ROOT.Var('curtiss_hindenburg_progress').GetValue]#!个月。"
 je_curtiss_lindbergh_generic: "奥尔泰格奖"
 je_curtiss_lindbergh_generic_reason: "奥尔泰格奖是对第一个从纽约市直飞巴黎或反方向直飞的飞行员的奖励。在相对不知名的美国人查尔斯·林德伯格于1927年驾驶他的“圣路易斯精神号”飞机赢得该奖之前，几位著名的飞行员曾尝试过纽约‑巴黎的飞行，但都没有成功。然而，有许多人在竞争该奖项时死亡。该奖引发了对航空业的大量投资，并推动了公众的兴趣和航空技术水平的提高。该奖于1919年由纽约酒店老板雷蒙德·奥尔泰格首次提出。该奖颁布后五年都没有人领奖，其目标似乎超出了当时飞机的能力，导致没有吸引任何竞争者。在最初的期限结束后，奥尔泰格于1925年6月1日重新发行该奖，在布莱恩特银行存入25000美元的可转让证券，颁奖工作由一个七人的董事会控制。"
 je_curtiss_lindbergh_usa: "奥尔泰格奖"
 je_curtiss_lindbergh_usa_reason: "奥尔泰格奖是对第一个从纽约市直飞巴黎或反方向直飞的飞行员的奖励。在相对不知名的美国人查尔斯·林德伯格于1927年驾驶他的“圣路易斯精神号”飞机赢得该奖之前，几位著名的飞行员曾尝试过纽约‑巴黎的飞行，但都没有成功。然而，有许多人在竞争该奖项时死亡。该奖引发了对航空业的大量投资，并推动了公众的兴趣和航空技术水平的提高。该奖于1919年由纽约酒店老板雷蒙德·奥尔泰格首次提出。该奖颁布后五年都没有人领奖，其目标似乎超出了当时飞机的能力，导致没有吸引任何竞争者。在最初的期限结束后，奥尔泰格于1925年6月1日重新发行该奖，在布莱恩特银行存入25000美元的可转让证券，颁奖工作由一个七人的董事会控制。"
 je_curtiss_zeppelin_expedition: "齐柏林北极飞艇探险队"
 je_curtiss_zeppelin_expedition_reason: "极地航空，即“用飞艇探索北极的国际研究会”是一个非政府的科学协会，它为自己设定的目标是利用飞艇进行极地研究。它主要是在飞行员和后来的协会秘书长瓦尔特‑布鲁斯的倡议下成立的。1924年的创始主席是弗里乔夫·南森。经过几年的准备工作，该协会于1931年首次成功地使用飞艇进行了纯粹的科学极地考察。通过齐柏林伯爵号的北极飞行，对飞过的极地地区的地理知识有了很大扩展。早在1926年，翁贝托·诺比莱就用他的飞艇“挪威号”飞过了北极，后来又用“意大利号”进行了一次探险。"
 je_curtiss_zeppelin_expedition_goal: "我们的齐柏林飞艇探险队将在#BLUE 16#!周后回来。现在已经过了#G [ROOT.Var('curtiss_zeppelin_progress').GetValue]#!周。"
 je_zeppelin_expedition_fail: "如果探险队积累的风险不少于#R 3点#!，我们将失败。"
 je_curtiss_lost_horizon: "消失的地平线"
 je_curtiss_lost_horizon_reason: "如果按照手稿的解释，那么据说喜马拉雅山上有一个神秘的地方，既没有路标也没有痕迹。然而，据说在西藏的高山上有三件文物。在有经验的考古学家的帮助下，应该可以为通往这个秘密山谷铺平道路。"
 je_curtiss_lost_horizon_goal: "到目前为止，我们已经发现了#G [ROOT.Var('curtiss_shangrila_progress').GetValue]#!的#BLUE 3件#!文物。"
 curtiss.10.t: "天空与海洋的统治者"
 curtiss.10.d: "水上飞机和飞行船的时代不仅彻底改变了交通，开辟了以前未知的可能性，而且还激发了想要突破最后障碍的精神。"
 curtiss.10.f: "在20世纪初，水上飞机的发明具有意想不到的优势。它们可以在湖泊、河流和港湾中降落，既可以在城市中心附近降落，也可以在没有机场或跑道的荒野中降落。同时，各国在水上运动飞机比赛中争夺新的记录。"
 curtiss.10.g: "这就是最后的英雄时代！"
 curtiss.12.t: "让‑亨利·法布尔"
 curtiss.12.d: "航空先驱亨利‑法布尔今天在马赛湾测试了一架水上飞机，标志着航空业的一个突破。"
 curtiss.12.f: "亨利‑法布尔是一名工程师，他研究了路易‑布莱里奥和加布里埃尔‑沃伊桑的飞机。然后他在1909年决定开始建造第一架水上飞机的原型。法布尔在建造浮筒方面投入了大量的时间。这些知识后来帮助他为外国的飞机型号配备了浮筒。然而，原型机只有一个薄弱的18千瓦（25马力）发动机，因此没有飞起来。下一个机器收到了一个强大的37千瓦（50马力）Gnôme径向发动机。他将这架飞机命名为“Hydravion”（水上飞机）。1910年3月28日，在马赛附近的马提格的贝尔湖上空开始了发射尝试。第二次发射成功，飞机飞行了约600米，第二天甚至达到6公里。事实证明，丝状型水上飞机是非常稳定的。在一次坠落后，飞机进行了大修。1911年4月，新版本飞机在摩纳哥与飞行员让·布伊兹一起开始飞行。亨利‑法布尔很快就被格伦‑柯蒂斯和加布里埃尔‑沃伊桑联系上了，他们利用他的发明开发了自己的水上飞机。1984年，法布尔以101岁的高龄去世，他是最后一位活着的航空先驱之一。"
 curtiss.12.g: "我喜欢这架水上飞机……或者它是一艘飞行船？"
 curtiss.13.t: "[SCOPE.sState('curtiss_water_airport_state').GetName]的水上航空港"
 curtiss.13.d: "[SCOPE.sState('curtiss_water_airport_state').GetName]港口的良好基础设施以及极高的城市化水平促进了当地蓬勃发展的水上飞机交通。"
 curtiss.13.f: "1923年，往返海峡群岛的航班成为了第一次成功的商业水上飞机服务。1928年，英国皇家空军远东飞行队的四架超级南安普顿普顿水上飞机抵达澳大利亚墨尔本。这次飞行证明了水上飞机已经成为可靠的远距离交通工具。在1930年代，水上飞机使得美国和欧洲之间能够建立定期的航空交通，为南美、非洲和亚洲开辟了新的航空旅行路线。爱尔兰的福因斯和纽芬兰与拉布拉多的波特伍德成为许多早期跨大西洋航班的终点站。在没有适合陆地飞机的机场的地区，水上飞机可以在小河流、湖泊或海岸站点停靠加油和补给。泛美航空的波音314“飞剪船”水上飞机将远东这样的新异国目的地带入了变得触手可及，成为了飞行浪漫主义的象征。"
 curtiss.13.g: "未来属于水上飞机。"
 curtiss.20.t: "[ROOT.GetCountry.GetAdjectiveNoFormatting]航空公司成立"
 curtiss.20.d: "这位大企业家[SCOPE.sCharacter('howard_hughes').GetFullName]创办该国的第一家航空公司。人们已经在怀疑这位古怪的商人是否会在这个昂贵的项目上取得成功。对于[ROOT.GetCountry.GetName]来说，这无疑是迈向未来的重要一步。"
 curtiss.20.f: "“'我不是一个偏执且疯狂的百万富翁。该死的，我是个亿万富翁！ ”——霍华德·休斯"
 curtiss.20.g: "恭喜。"
 curtiss.20.h: "未来在航空业！支持公司！"
 curtiss.21.t: "国营航空公司成立"
 curtiss.21.d: "随着国营航空公司的建立，[ROOT.GetCountry.GetNameNoFlag]已成为人类进步的关键。"
 curtiss.21.f: "国营航空公司比起私营的同行来说价格高得多，却没有同私营公司一样的收益。然而，他们不会陷入财务困境这一特点使得他们能更好地抵御风险。"
 curtiss.21.g: "拿香槟来！"
 curtiss.22.t: "国营航空公司的私人化"
 curtiss.22.d: "在最近一次的宪法修正案颁布后，政府宣布国营航空公司将不再存在，并将转为一家私营公司。"
 curtiss.22.f: "经济私有化意味着我们的国有航空公司在这种形式下不再有前途。事实上，有很多政治家都松了一口气，因为航空公司是一个烧钱行业。在[SCOPE.sCharacter('howard_hughes').GetFullName]中也找到了一个富有的投资者，他将在未来管理该公司。这次出售将带来高额的私有化收益，但一些说客认为，为了帮助新公司起步，应该放弃这些收益。我们应该仅仅满足于摆脱运行成本。"
 curtiss.22.g: "私有化的收益应当落进我们的钱包。"
 curtiss.22.h: "公司应当留下这笔钱以发展壮大自己。"
 curtiss.23.t: "[ROOT.GetCountry.GetAdjectiveNoFormatting]航空公司的国有化"
 curtiss.23.d: "[ROOT.GetCountry.GetAdjectiveNoFormatting]航空公司仍被视作国内最大的私营企业。将其国有化的呼声越来越高。"
 curtiss.23.f: "很明显，像[SCOPE.sCharacter('howard_hughes').GetFullName]的[ROOT.GetCountry.GetAdjectiveNoFormatting]航空公司这种大公司应该被拆散或国有化。因此，高级官员已经提出了将这家私营公司转为国有的计划。一派人主张进行尽可能合法的交易，以掩盖这一程序。另一方面，其他人则认为有机会树立榜样，没收[SCOPE.sCharacter('howard_hughes').GetFullName]的资产，并将其捐献给公众。"
 curtiss.23.g: "以合法合理的方式将公司收归国有。"
 curtiss.23.h: "这些老鼠蛆虫已经侵蚀人民的利益太久了。"
 curtiss.30.t: "诗人"
 curtiss.30.d: "大作家[SCOPE.sCharacter('curtiss_dannunzio').GetFullName]听到了战争的号召并成为了一名飞行员。"
 curtiss.30.f: "加布里埃尔·邓南遮是意大利诗人、剧作家、演说家、记者、贵族和第一次世界大战期间的意大利皇家军队军官。邓南遮在他的文学作品中与颓废主义运动联系在一起，与法国象征主义和英国审美主义密切相关。这类作品代表了对之前的浪漫主义的自然主义的一种转向，既感性又神秘。他受到了尼采的影响，这在他的文学和后来的政治贡献中找到了出路。第一次世界大战期间，意大利人对邓南遮的看法从文学人物转变为民族战争英雄。他与意大利军队的精锐阿尔迪蒂风暴部队有联系，并参加了诸如飞越维也纳的行动。"
 curtiss.30.g: "狮子的第二次怒吼！"
 curtiss.31.t: "红男爵"
 curtiss.31.d: "德国可以通过[SCOPE.sCharacter('curtiss_richthofen').GetFullName]，声称其是世界历史上最伟大的王牌飞行员之一"
 curtiss.31.f: "曼弗雷德·阿尔布雷希特·冯·里希特霍芬男爵是第一次世界大战期间的德国军官和战斗机飞行员，他在那场战争中作为单一飞行员取得了最高数量的空中胜利。里希特霍芬成为世界上最著名的飞行员之一，至今仍被电影、书籍和其他媒体所铭记。诸如 “红男爵”这样的绰号是由于他的贵族血统和他飞机的红色涂装。"
 curtiss.31.g: "一个传奇诞生了。"
 curtiss.40.t: "不停地穿越大西洋"
 curtiss.40.g: "准备一场精彩之旅！"
 curtiss.42.g: "一股热潮"
 curtiss.50.t: "航空学的未来"
 curtiss.50.d: "随着航空技术的进一步发展和民用航空的发展，我们国家是要投资发展飞机还是飞船，这将是一个问题。"
 curtiss.50.f: "“确实，同伴脆弱的身体不会拖累他的飞机，而那些脆弱者的焦虑思绪亦未填满他拥挤的舱室。然而，在他的飞机划破苍穹之时，他与那些罕见的灵魂沟通交融，这些灵魂注入勇气，点燃壮志，在无尽的激励中赐予他的臂膀力量，丰富他的思维，滋养他的灵魂。孤身一人？若给予人类选择，还有何等伴侣能与他同飞于蓝天之上呢？”——查尔斯·林德伯格"
 curtiss.50.g: "飞机"
 curtiss.50.h: "飞艇"
 curtiss.51.t: "发现氦气"
 curtiss.51.d: "在钻探石油时，我们的工人在[SCOPE.sState('curtiss_helium_state').GetName]中发现一个氦矿。这一发现可能对我们的航空业有帮助。"
 curtiss.51.f: "1868年8月18日，关于氦的首次观测证据浮现出来。法国天文学家皮埃尔·让森在印度甘图尔的一次全日食期间，发现了太阳色球层光谱中一道明亮的黄色线，其波长为587.49纳米。这条谱线后来被确认为氦元素的存在。这个发现是对氦这一元素的首次观测，为后来的研究奠定了基础。在随后的研究中，洛基尔和英国化学家爱德华·弗兰克兰德为这个新元素命名，选择了希腊语中代表太阳的词汇\"helios\"。这个命名充分体现了氦元素与太阳活动有着密切的关系。然而，直到1895年3月26日，苏格兰化学家威廉·拉姆齐才在地球上成功地分离出氦气体。这一里程碑的实验为人类对氦的研究开辟了新的篇章。而在1903年的堪萨斯州一次石油钻探活动中，一个意外的发现引起了科学家们的关注。一股无法燃烧的气体喷泉出现了，这引起了堪萨斯州地质学家埃拉斯莫斯·霍沃思的兴趣。他采集了逸散的气体样品，而后的分析发现，其中含有1.84%的氦气。这一发现证明了尽管在地球上氦元素整体上相对稀有，但在美国大平原地区却以大量存在，成为天然气的副产物。虽然低温气体液化的提取过程在第一次世界大战期间并未得到重要发展，但氦气的生产仍在持续进行。作为轻于空气的飞艇中的升降气体，氦气发挥着重要的作用。这种独特的性质使得氦气在航空工业中得到广泛应用，为飞艇提供了浮力和稳定性。"
 curtiss.51.g: "我们需要战略储备。"
 curtiss.52.t: "氦气储备损失"
 curtiss.52.d: "如果不能进入油田和气田，我们就无法再开采氦气。"
 curtiss.52.g: "这不是什么大问题……对吧？"
 curtiss.53.t: "[SCOPE.sCharacter('tesla_new_engineer_scope').GetFullName]伯爵寻求帮助以建造飞行器"
 curtiss.53.d: "没人知道[SCOPE.sCharacter('tesla_new_engineer_scope').GetFullName]伯爵是个疯子还是天才，但我们要不要支持他的飞行器建造计划？"
 curtiss.53.f: "“显然，气球有一个主要缺点：人不能操纵驾驶它们。我在各种战争中亲眼目睹了这个事实，并注意到这个问题是可以解决的。我只需要足够的钱来建造一艘能够驾驶的飞艇。”"
 curtiss.53.g: "新的伊卡洛斯，对金钱的浪费。"
 curtiss.53.h: "棒极了！支持他！"
 curtiss.54.t: "齐柏林伯爵的飞船一号起飞了！"
 curtiss.54.d: "斐迪南·冯·齐柏林的飞艇意味着航空业的一个新时代就要来了。"
 curtiss.54.f: "1898年8月13日，齐柏林获得了帝国专利号98580，专利涵盖了一种“可操纵的飞行器，其支撑体依次排列”。齐柏林设计的飞艇具有一些关键特点，包括由环形和纵向构件构成的坚固铝制框架，将两个舱体与框架紧密连接，将气体空间分割成相等大小的圆柱形舱室，并在空气阻力中心高度处安装螺旋桨。这些飞艇被称为“齐柏林飞艇”。然而，齐柏林的设计理念当时遭到专家和公众的广泛拒绝和嘲笑；威廉二世皇帝甚至将齐柏林称为“最愚蠢的南德意志人”。然而，齐柏林始终坚持自己的目标，并相信自己的计划是正确的。在那个时候，他曾说过：“当然没有人为我辩护，因为没有人愿意跳入黑暗之中。但是我的目标是清晰明确的，我的计算是准确无误的。”他的坚定信念驱使着他继续前进。1900年，齐柏林的技术经理弗里茨·伯尔在康斯坦茨湖上主持了飞艇的三次试飞。随着越来越好的飞行结果，人们的热情迅速蔓延开来。公众的热情反响对于齐柏林能够进一步发展飞艇技术和改进操作方式起到了至关重要的推动作用。齐柏林飞艇的设计和技术的不断完善为航空领域带来了重大的突破。这种飞行器的独特之处在于其刚性铝制框架和优化的气囊结构，使得飞艇能够在空中自由操控。作为轻于空气的飞行器，齐柏林飞艇成为当时最引人注目的航空技术之一。"
 curtiss.54.g: "我就知道他能做到！"
 curtiss.100.t: "施耐德杯"
 curtiss.100.d: "一切准备工作已经完成，争夺施耐德杯的比赛将在3个月后开始，这是有史以来最受关注的航空比赛！"
 curtiss.100.f: "施耐德海上航空杯，又被称为施耐德大奖赛、施耐德杯赛或施耐德杯，是一项每年（后来改为每两年）颁发给水上飞机和飞艇比赛冠军的著名奖杯。这项比赛对飞机设计的推进，特别是在空气动力学和发动机设计领域，发挥了重要作用，并在二战时期的顶尖战斗机中得以体现。施耐德杯设计所倡导的流线型外形和低阻力、液冷发动机在飞机设计领域产生了深远影响。这些理念在英国超级海鸥式、美国北美P‑51野马以及意大利麦基C.202飞箭等标志性战斗机中得到了广泛应用。这些比赛广受欢迎，吸引了超过20万名观众蜂拥而至。"
 curtiss.100.g: "发出邀请！"
 curtiss.101.d: "我们收到施耐德杯比赛的邀请！该比赛由[SCOPE.sCountry('curtiss_schneider_trophy_host').GetName]组织。"
 curtiss.101.g: "男孩们，把飞行员护目镜扔给我！"
 curtiss.101.h: "算了吧"
 curtiss.102.d: "一切就绪，很快，整个世界将涌向[SCOPE.sState('curtiss_schneider_trophy_state').GetName]，见证3个月后最先进的水上飞机之间的世界级比赛。"
 curtiss.103.t: "支持我们的队伍"
 curtiss.103.d: "争夺施耐德杯的比赛即将开始。全世界包括我们国家都会关注我们的飞行员的表现。如果我们在经济上帮助团队，就能提高胜率，当然，这一切都有其代价……"
 curtiss.103.f: "施耐德杯最初只是一个由各个飞行员和他们的飞机参加的比赛，几乎没有政府的支持。然而，到了20世纪20年代，这场比赛获得了如此之大的关注度，成千上万的人亲临现场观看。比赛的影响力也随之扩大，呈现出全新的意义。当美国和意大利官方支持他们的代表队后，比赛逐渐演变成了一个各国之间的对抗赛。起初，这种干预被认为是不可接受的，然而为了避免竞争劣势，其他国家（如英国）不得不正式支持自己的队伍，以免落后于其他参赛国家。"
 curtiss.103.g: "为了国家的荣誉，任何代价都不为过！"
 curtiss.103.h: "现在就不错"
 curtiss.104.t: "施耐德杯培训"
 curtiss.104.d: "考虑到即将举行的著名的施耐德杯的竞争，我们的飞行员是否应该完成额外的训练。"
 curtiss.104.f: "没有一个运动员会在比赛中毫无准备，飞行员参加即将到来的比赛也不例外。然而，关于比赛前的训练总是存在一些讨论。高速飞行和冒险动作是我们的队伍在比赛中取得更好成绩的保证。甚至在一些训练过程中，一些记录也被打破。但与此同时，这些训练也被认为是具有风险的。与施耐德杯比赛不同的是，在1923年至1931年的准备期间，竟然有十位飞行员在训练中不幸丧生。这个数字让人深感忧虑，但在施耐德杯比赛中并未发生严重事故。"
 curtiss.104.g: "我们的飞行员需要更好的训练！"
 curtiss.104.h: "这太危险了。"
 curtiss.105.t: "新纪录！"
 curtiss.105.d: "为了比赛进行的额外训练是值得的。我们的队伍不仅零失误完成了比赛，还打破了速度纪录。对于即将到来的比赛来说，这意味着光明的未来！"
 curtiss.105.f: "“我飞行是因为我的思维能远离琐碎之事的倾轧。“——\n圣埃克絮佩里（《小王子》作者）"
 curtiss.105.g: "干得好，伙计们！"
 curtiss.106.t: "表现正常"
 curtiss.106.d: "不管是天气原因还是我们飞行员的激情问题——总之，不幸的是，我们的队伍在施耐德杯特训中成绩平平。这虽然不是最差的结果，但我们本有更高的期望。"
 curtiss.106.f: "“对任何人来说，特别是在面对朋友的愿望时，制定并坚持自己的行动路线已经很困难了；而对一名飞行员来说，要在地面上等待升空的最佳时机，更是难上加难。”——格伦·柯蒂斯"
 curtiss.106.g: "总比没有好。"
 curtiss.107.t: "训练事件！"
 curtiss.107.d: "施耐德杯的最后一次训练以灾难性结局收场——出于至今仍不清楚的原因，我们的一名飞行员失去了对飞机的控制，以全速坠入水中。尽管经过艰苦努力成功营救了这位伤员，但修复损失和查明错误原因将需要数周的时间。而在即将到来的比赛中，我们将因为失去一位最出色的飞行员而降低了争夺施耐德杯的机会。这一不幸的事件对我们的团队造成了沉重打击，需要我们重新调整策略和备战。"
 curtiss.107.f: "“飞机保持上升，因为它没有时间下降”——奥维尔·莱特"
 curtiss.107.g: "真是灾难！"
 curtiss.108.t: "施耐德杯飞行员"
 curtiss.108.d: "关于哪位飞行员将带领团队参加施耐德杯比赛的问题仍然悬而未决。"
 curtiss.108.f: "施耐德杯通常不是国家之间的比赛，而是飞行员之间的比赛；然而，来自一个国家的几名飞行员作为一个团队参赛很快就成为惯例，通常是三名飞行员一组，三架飞机一组。很快就形成了对单个飞行员的崇拜，而在后来的几年中，团队的力量占了上风。"
 curtiss.108.g: "[SCOPE.sCharacter('curtiss_schneider_pilot_1').GetFullName]"
 curtiss.108.h: "[SCOPE.sCharacter('curtiss_schneider_pilot_2').GetFullName]"
 curtiss.108.i: "[SCOPE.sCharacter('curtiss_schneider_pilot_3').GetFullName]"
 curtiss.108.j: "[SCOPE.sCharacter('curtiss_schneider_pilot_4').GetFullName]"
 curtiss.108.k: "新成员"
 curtiss.110.t: "在[SCOPE.sState('curtiss_schneider_trophy_state').GetName]的施耐德杯比赛"
 curtiss.110.d: "一阵阵引擎的轰鸣声从空中传来！比赛日终于到了——全世界都来到了[SCOPE.sCountry('curtiss_schneider_trophy_host').GetNameNoFlag]，亲眼目睹这一场施耐德杯争夺战。"
 curtiss.110.f: "“最重要的是，飞翔的时候彷佛每一根神经都绷到了极限，但这兴奋却让你感到无与伦比的宁静。如果你可以想象这种感觉的话。”——威尔伯·莱特（莱特兄弟中的哥哥）\n#b 参赛者：#!\n\n[GetGlobalVariable('curtiss_schneider_participiant_1_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_2_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_3_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_4_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_5_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_6_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_7_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_8_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_9_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_10_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_11_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_12_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_13_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_14_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_15_global_var').GetCountry.GetName]"
 curtiss.110.g: "旋转！"
 curtiss.111.t: "胜利！"
 curtiss.111.d: "在一番艰难地对胜利的角逐后，[ROOT.GetCountry.GetNameNoFormatting]赢得了本年度的施耐德杯！这也就意味着我国将举办明年的比赛。"
 curtiss.111.f: "获得三连胜的国家可以永久保留施耐德杯。这个久负盛名的奖杯不仅是一场体育赛事的奖杯，还是一个国家超越自我，征服天空的意志的象征，代表着该国出色的技术实力。无论捧杯者是谁，都会收获全世界的羡慕。历史上只要在五年内赢得三次比赛就可以保留施耐德杯，但现在必须要达成三连胜才可以。上一个赢得施耐德杯的国家将有幸举办下一场比赛。"
 curtiss.111.g: "我们国家的伟大日子！"
 curtiss.112.t: "[SCOPE.sCountry('curtiss_schneider_trophy_recent_winner').GetNameNoFlag]赢得了施耐德杯"
 curtiss.112.d: "不幸的是，我们最好的飞行员依然不够好。[SCOPE.sCountry('curtiss_schneider_trophy_recent_winner').GetName]的队伍赢得了本年度的施耐德杯。"
 curtiss.112.f: "获得三连胜的国家可以永久保留施耐德杯。这个久负盛名的奖杯不仅是一场体育赛事的奖杯，还是一个国家超越自我，征服天空的意志的象征，代表着该国出色的技术实力。无论捧杯者是谁，都会收获全世界的羡慕。历史上只要在五年内赢得三次比赛就可以保留施耐德杯，但现在必须要达成三连胜才可以。上一个赢得施耐德杯的国家将有幸举办下一场比赛。"
 curtiss.112.g: "祝贺……"
 curtiss.113.t: "施耐德杯"
 curtiss.113.d: "随着三连胜的达成，施耐德杯的争夺终于落下帷幕。[ROOT.GetCountry.GetNameNoFormatting]向全世界展示了它在人员、材料和技术方面的优越性。我们的飞行员将作为民族英雄载入史册，几十年后，人们仍然会谈论那些使让我们赢得最终胜利的勇敢飞行员。施耐德杯现在是我们的了，全世界都在羡慕我们！"
 curtiss.113.f: "随着第三次胜利，施耐德奖杯终于落入了一个国家的手中。一方面，这是航空业的一个大日子；但另一方面，令人忧虑的是，随着航空业破纪录的发展，航空业的先锋时代即将结束，取而代之的是一个白银时代，在这个时代，主导一切的不再是人类的雄心壮志，而是纯粹的机械。"
 curtiss.113.g: "我们已经征服了天空！"
 curtiss.114.t: "永远失去的奖杯"
 curtiss.114.d: "随着三连胜的达成，[SCOPE.sCountry('curtiss_schneider_trophy_winner').GetName]成功捧回了世界上最令人垂涎的奖杯。真是明珠蒙尘，宝器暗投。可惜，可惜。"
 curtiss.114.f: "随着第三次胜利，施耐德奖杯终于落入了一个国家的手中。一方面，这是航空业的一个大日子；但另一方面，令人忧虑的是，随着航空业破纪录的发展，航空业的先锋时代即将结束，取而代之的是一个白银时代，在这个时代，主导一切的不再是人类的雄心壮志，而是纯粹的机械。"
 curtiss.114.g: "真是一个苦涩的消息"
 curtiss.121.t: "机械问题"
 curtiss.121.d: "施耐德杯因许多飞行员无法参加比赛而声名狼藉，因为旅行已经成为问题。有些飞机损坏了，有些则是发动机出了问题，无法在出发信号发出时排除故障。机械故障导致整个团队退出比赛。"
 curtiss.121.f: "有个人声称，施耐德杯已经不再光荣了。因为持续不断问题比如旅途中的困难以及试飞员的死亡都会导致许多参赛队无法完成比赛。这也导致了比赛的越来越少人。法国是水上飞机的历史发源地，但由于这些问题，法国几乎无法参加比赛。英国或意大利等国则多次夺冠，因为他们提供了唯一能参加比赛的飞机。"
 curtiss.121.g: "该死！"
 curtiss.122.t: "空难！"
 curtiss.122.d: "在一次飞行训练中，我们的飞行员过于自信，最终撞向了水面！"
 curtiss.122.f: "尽管过程充满挑战，但施耐德杯赛在其二十年的历史中并未发生过致命事故。然而，考虑到极高的速度以及当时飞机制造技术仍处于初级阶段，若出现失误，发生灾难性事故的可能性依然存在。"
 curtiss.122.g: "呀！"
 curtiss.123.t: "被忽视的浮标"
 curtiss.123.d: "我们队在施耐德杯中表现出色，但有一名飞行员被裁判指责漏看浮标，因此将面临扣分处罚。"
 curtiss.123.f: "1919年，意大利队在英国伯恩茅斯毛茅斯雾天获胜。但斯旺奇弯道裁判声称冠军古伊多·雅内洛没有正确绕过浮标。雅内洛称是组织混乱导致一艘非官方船只使他出错。尽管如此，雅内洛还是被取消资格，该年施耐德杯未颁发。为弥补意大利，下一场移至威尼斯举行。时至今日，这次取消资格仍引起意大利航空怀旧主义者的极大痛苦，因为意大利队此后又于1920和1921年获胜，本可能永远获得施耐德杯。"
 curtiss.123.g: "那当然仅仅是因为坏运气。"
 curtiss.123.h: "尝试贿赂裁判……"
 curtiss.124.t: "最高速度"
 curtiss.124.d: "一路上，我们的飞行员可以展示我们的[ROOT.GetCountry.GetAdjectiveNoFormatting]机器是如何制造的。"
 curtiss.124.f: "施耐德杯主要是一项高速竞赛，在这项竞赛中，最新的飞机技术和飞行员个人发挥着重要作用。为了取得好成绩，最新技术、国家对飞机制造的重视以及飞行员的个人素质都很重要。王牌飞行员和施耐德杯的老将会取得更好的成绩，但特别大胆的人也会取得更好的成绩。"
 curtiss.124.g: "最大功率！"
 curtiss.125.t: "回旋机动"
 curtiss.125.d: "施耐德杯是最著名的速度比赛，但在高速行驶时可能会失误，从而导致丧失资格。"
 curtiss.125.f: "施耐德杯的大部分比赛都是在三角形路线上进行的，因此转弯动作非常罕见。但这并不是说转弯没有作用，不过一个失误就会让很多飞行员失去胜利。在演习中，飞行员的素质至关重要：经验丰富的飞行员和谨慎的飞行员会比过于急躁的飞行员取得更好的成绩。"
 curtiss.125.g: "优雅地飞行"
 curtiss.126.t: "迷雾"
 curtiss.126.d: "在水路上，雾是更常见的问题。即使是经验丰富的飞行员也可能在这突如其来的障碍中失败。"
 curtiss.126.f: "水上比赛的主要缺点是雾带来了额外的挑战。与所有的操作一样，飞行员经验是主要因素。采用非正统方法的飞行员可以做得更好，谨慎的飞行员也可以做得更好。"
 curtiss.126.g: "我们的飞行员会找到方向的。"
 curtiss.127.t: "卓越的飞行性能"
 curtiss.127.d: "我们飞行员的卓越品质让我们更有可能赢得施耐德杯。"
 curtiss.127.f: "康斯坦丁·约翰·菲普斯于1774年首次在他关于1773年北极探险的报告中将北极熊描述为一种独立的物种。它是现存最大的熊科物种，也是现存最大的陆地食肉动物。尽管它是棕熊的近亲，但它已经进化适应了更为狭窄的生态位，具有许多适应寒冷温度、在雪地、冰面和开放水域中移动以及捕食海豹（其主要食物）的身体特征。虽然大多数北极熊在陆地上出生，但它们大部分时间都在海冰上度过。"
 curtiss.127.g: "完美！"
 curtiss.128.t: "水天之间的比拼"
 curtiss.128.d: "为了领先，[SCOPE.sCharacter('duel_participant_1').GetFullName]和[SCOPE.sCharacter('duel_participant_2').GetFullName]接近的已经有些危险了。通过一次有针对性的操作，我们可以提高赢率，削弱直接竞争对手。"
 curtiss.128.f: "“别逃跑，不然我会让所有人知道！”——唐纳德·柯蒂斯"
 curtiss.128.g: "狗斗！"
 curtiss.128.h: "向前飞。"
 curtiss.129.t: "赢得空中决斗"
 curtiss.129.d: "一名对手国的飞行员想淘汰[SCOPE.sCharacter('curtiss_schneider_pilot').GetFullName]，不仅徒劳无功，还大大增加了我们赢得奖杯的胜算！"
 curtiss.129.f: "“你好蠢。我喜欢男人这一点。”——吉娜夫人"
 curtiss.130.t: "施耐德杯上的较量"
 curtiss.130.d: "我们参加施耐德杯的王牌飞行员[SCOPE.sCharacter('duel_participant_1').GetFullName]与[SCOPE.sCharacter('duel_participant_2').GetFullName]有笔老账要算。他做出大胆的机动动作，想把该死的敌人淘汰。"
 curtiss.130.f: "“别逃跑，不然我会让所有人知道！”——唐纳德·柯蒂斯"
 curtiss.130.g: "为了[ROOT.GetCountry.GetNameNoFormatting]的荣耀！"
 curtiss.131.t: "激烈的竞争"
 curtiss.131.d: "在施耐德杯上，我们必须面对[SCOPE.sCountry('curtiss_schneider_failed_rival').GetName]的仇视与戕害。但这一次对手失败了！ 一名飞行员妄图让我们的王牌[SCOPE.sCharacter('curtiss_schneider_pilot').GetFullName]退出比赛，但他自己却遭遇了事故。"
 curtiss.131.f: "“你好蠢。我喜欢男人这一点。”——吉娜夫人"
 curtiss.132.t: "有利的天气状况"
 curtiss.132.d: "良好的天气条件可以增加我们获胜的机会。"
 curtiss.132.f: "海面平静，天空晴朗，微风和煦。好几个星期没有看到雾了。安全比赛的最佳条件！"
 curtiss.132.g: "天气站在我们这边。"
 curtiss.133.t: "飞行员生病"
 curtiss.133.d: "我们施耐德杯参赛团队的一名飞行员在比赛前请病假。"
 curtiss.133.f: "我们需要几天时间才能找到人救场。我们并没有因此失去任何优势，但本周我们也没有获得任何优势。"
 curtiss.133.g: "坏兆头"
 curtiss.134.t: "伟大的比赛"
 curtiss.134.d: "飞行员和观众都承认，本年度施耐德杯的比赛相当特殊。"
 curtiss.134.f: "外国贵宾、社会代表、飞行员和游客都向今年比赛的组织者表示祝贺。这次活动取得了圆满成功，人群比往常更多，人们可能会在未来的岁月里对这些日子津津乐道。许多观众在离开[SCOPE.sState('curtiss_schneider_trophy_state').GetName]后相当满意，成为这独特的壮观场面的一员使他们忘却了日常烦恼。"
 curtiss.134.g: "好极了！"
 curtiss.135.t: "破坏"
 curtiss.135.d: "有时候像施耐德杯这样重要的比赛不仅需要熟练的技巧或是更好的飞行器，可能还需要一点……特殊的手段。"
 curtiss.135.f: "历史上并没有证据显示施耐德杯的参赛国家进行过破坏行动。但机器频繁的故障引发了传言，有人认为这不是简单的机械问题。我们有一半机会我尝试严重破坏一个竞争对手。然而，如果行动失败，我们将扣除相同数量的积分。应该对哪个国家实施破坏行动呢？"
 curtiss.135.g: "这种下作的伎俩让我蒙羞。"
 curtiss.135.h: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_1').GetName]"
 curtiss.135.i: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_2').GetName]"
 curtiss.135.j: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_3').GetName]"
 curtiss.135.k: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_4').GetName]"
 curtiss.135.l: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_5').GetName]"
 curtiss.135.m: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_6').GetName]"
 curtiss.135.n: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_7').GetName]"
 curtiss.135.o: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_8').GetName]"
 curtiss.135.p: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_9').GetName]"
 curtiss.136.t: "发动机的奇怪故障"
 curtiss.136.d: "发动机的奇怪故障让我们的工程师很是绝望。"
 curtiss.136.f: "实际上，就在几天前，机械师们已经仔细检查了这架飞机，本应该确保我们在施耐德杯比赛中获胜，他们检查了每一颗螺丝。但今天早上开始，飞机就再也无法启动了。一些专家认为，机械问题可能是由于破坏导致的，尽管无法证实。另一方面，显然这次损害将使我们使我们的进度倒退了数周。"
 curtiss.136.g: "对我们获胜的机会造成沉重打击。"
 curtiss.137.t: "维持比赛秩序！"
 curtiss.137.d: "另一位参赛者蓄意扰乱比赛的行为在最后一秒被阻止。"
 curtiss.137.f: "昨晚，我们的机械师抓住了一名外国间谍，他试图破坏我们比赛飞机的引擎。我们将他扭送到当局，并向比赛组委会报告了这一严重的违规行为。负有责任的比赛参与国将被处以积分扣除的处罚。"
 curtiss.137.g: "就差一点了！"
 curtiss.138.t: "破坏成功"
 curtiss.138.d: "我们的间谍昨晚潜入了机棚并成功破坏了那里的飞机。"
 curtiss.138.f: "对方队伍获胜的机会明显下降。"
 curtiss.138.g: "我喜欢执行计划。"
 curtiss.139.t: "破坏被发现！"
 curtiss.139.d: "不幸的是，我们的间谍在试图破坏敌方飞机时被当场抓获。"
 curtiss.139.f: "比赛管理人员对我们进行了扣分惩罚，其他队伍也理所当然地感到愤怒。"
 curtiss.139.g: "混蛋！"
 curtiss.201.t: "航空公司投资了一个机场"
 curtiss.201.d: "[SCOPE.sCharacter('howard_hughes').GetFullName]的航空公司超出了人们的预期并取得了还像样的盈利。他们正考虑在[SCOPE.sState('curtiss_new_airport_state').GetName]建造一个新的机场。"
 curtiss.201.f: "有时，只有自信到狂妄自大的人才能使航空业这样的高风险业务得以盈利，[SCOPE.sCharacter('howard_hughes').GetFullName]证明了自己正是这一种人。他的生意蒸蒸日上，已经可以开始建造自己的机场，或者大规模扩充机队。"
 curtiss.201.g: "建造一个新的机场。"
 curtiss.201.h: "扩建航空公司，但是把资金投资到其他方面。"
 curtiss.202.t: "航空公司扩张"
 curtiss.202.d: "这家最近成立的航空公司取得了第一次成功，并购买了不少新飞机。"
 curtiss.202.f: "尽管航空业涉及了不计其数的问题，但总有成功的故事。"
 curtiss.202.g: "完美。"
 curtiss.203.t: "航空公司停滞不前"
 curtiss.203.d: "不幸的是，新成立的航空公司的发展没有达到预期。"
 curtiss.203.f: "尽管在20世纪初，航空业产有巨大的魅力，对技术和进步感到欣喜，但航空公司仍然是一种高经济风险的行业。大多数航空公司的利润很少或没有利润。在某些情况下，由于客运量低，成本高，需要几年或几十年的时间才能盈利。"
 curtiss.203.g: "令人失望。"
 curtiss.203.h: "派我们的一名飞行员为航空公司做广告。"
 curtiss.204.t: "飞行员再次活跃"
 curtiss.204.d: "在为航空公司成功地进行了飞行推广后，我们的飞行员[SCOPE.sCharacter('curtiss_pilot').GetFullName]再次活跃起来。"
 curtiss.204.f: ""
 curtiss.204.g: "干得好"
 curtiss.211.t: "驶往境外机场的新航线"
 curtiss.211.d: "我们国家的航空公司建立一条驶往[SCOPE.sCountry('curtiss_airline_country').GetName]的新航线。"
 curtiss.211.f: "‘我离开纽约的时候带了四个三明治。但整个旅途中我就喝了一点儿水，才吃了一个半。我不认为还有时间吃更多，你知道的，因为它让我惊讶于原来到欧洲的旅程是这么短暂。’‑查尔斯·林德伯格"
 curtiss.211.g: "希望这次投资能回本。"
 curtiss.212.t: "外国航空公司建立了一条新航线"
 curtiss.212.d: "一家外国航空公司建立了一条新的飞行路线。飞机降落在[SCOPE.sState('curtiss_foreign_airline_state').GetName]"
 curtiss.213.t: "齐柏林飞船在摩天大楼之间的飞行路线"
 curtiss.213.d: "今天，一条专属的飞艇路线被设置为[SCOPE.sCountry('curtiss_airline_country').GetName]，目的是各自国家的摩天大楼。"
 curtiss.213.f: "曾有让飞艇停泊在摩天大楼上，最早是在1931年开放的帝国大厦的顶部，最初是作为一个锚定的桅杆。桅杆的支撑力很强，可以承受飞艇停泊时的50吨拉力。一些绞盘已经安装完毕，第86层准备作为离境休息室，设有售票处和海关。这个想法符合当时对空中巨人的幻想。然而建造时没有考虑到飞艇只能非常缓慢地操纵，而且由于自然因素，总是出现风的湍流，这可能会严重干扰飞艇。"
 curtiss.213.g: "齐柏林飞船是最奢侈的旅行艺术。"
 curtiss.214.t: "风景航班"
 curtiss.214.d: "[ROOT.GetCountry.GetAdjectiveNoFormatting]航空公司有一个新的经营项目：为游客提供观光航班，为其增收。"
 curtiss.214.f: "Flieger, grüß mir die Sonne\nGrüß mir die Sterne und grüß mir den Mond\nDein Leben, das ist ein Schweben\nDurch die Ferne, die keiner bewohnt.\n（看不懂德语）"
 curtiss.214.g: "我希望我能得到一张票"
 curtiss.215.t: "乘飞机的殖民地货物"
 curtiss.215.d: "在我们的一个非洲殖民地开设了一个小型机场，飞机从那里直接将殖民地的货物运送到[SCOPE.sState('curtiss_colonial_goods_state').GetName]"
 curtiss.215.f: "随着[SCOPE.sState('curtiss_airport_state').GetName]和[SCOPE.sState('curtiss_colonial_goods_state').GetName]之间建立了直接的航班连接，非洲正在向[ROOT.GetCountry.GetNameNoFlag]靠近。现在不必为椰子、香蕉和钻石等待那么久。"
 curtiss.215.g: "即使是世界上最偏远的地区也通过航空与核心地带相连。"
 curtiss.216.t: "旅游业"
 curtiss.216.d: "开通一条飞往[SCOPE.sCountry('curtiss_tourist_country').GetName]的航线，利润很高。由于乘客数量迅速增加，游客显然被吸引到了这个国家，因此航空公司需要将其运力增加一倍。"
 curtiss.216.f: "与拥有重要文物的国家进行空域交易利润颇多。"
 curtiss.216.g: "啊！[SCOPE.sCountry('curtiss_tourist_country').GetName]！"
 curtiss.217.t: "航空竞选活动"
 curtiss.217.d: "一家航空公司提供载运政府候选人的服务。"
 curtiss.217.f: "随着飞机成为可选择的交通工具，竞选形式也发生了变化。拥有飞机的候选人不仅被认为更具机动性，而且展现出了现代感。至少，这样的广告媒介应该给执政党带来一点小小的好处。"
 curtiss.217.g: "我们乐意接受。"
 curtiss.217.h: "如果有人制造空难怎么办？"
 curtiss.218.t: "飞行员做广告？"
 curtiss.218.d: "航空公司目前正在经历一场小危机。管理层向我们提出了一个不寻常的想法：他们希望请到[SCOPE.sCharacter('curtiss_pilot').GetFullName]为他们的线路飞行作为广告。"
 curtiss.218.f: "在航空业起步的早期阶段，著名飞行员经常成为象征性的领袖人物。因此，查尔斯·林德伯格在推广航空邮件方面产生了重要影响。例如，在西印度航空快递的所有者巴西尔·L·罗的请求下，他携带了约3000份特别纪念邮件，分别在圣多明各、太子港和哈瓦那之间飞行。在拉丁美洲之旅两周后，林德伯格进行了一系列特别飞行。成千上万封自寄的纪念信封从世界各地寄来。这些信封随后被盖上戳记并退还给寄件人，以促进航空邮件服务。"
 curtiss.218.g: "当然！"
 curtiss.218.h: "我们不能没有他，但我们会想其他办法帮忙。"
 curtiss.218.i: "不好意思，我们办不到。"
 curtiss.219.t: "新机场通航"
 curtiss.219.d: "航空公司努力扩大其现有的航线网络。"
 curtiss.219.f: "“飞行可能不会一帆风顺，但它的乐趣值得付出代价。”——阿梅莉亚·埃尔哈特"
 curtiss.219.g: "完美。"
 curtiss.219.h: "我们负担不起。"
 curtiss.220.t: "机场扩张"
 curtiss.220.d: "[SCOPE.sState('curtiss_airport_state').GetName]的机场已经成了国际航空交通中心。"
 curtiss.220.f: "在空中交通现代化和当地经济繁荣的过程中，我们的一座国有航空站已发展成为重要的转运中心。因此，当地商业协会和市政府将其扩建为真正的机场。"
 curtiss.220.g: "[SCOPE.sState('curtiss_airport_state').GetName]将成为世界中心！"
 curtiss.221.t: "新机场"
 curtiss.221.d: "该国最大的航空公司已宣布计划扩充机队。"
 curtiss.221.f: "“一旦尝到了飞行的滋味，你在陆地上行走时将永远望向天空，因为你曾经去过那里，因此将永远渴望回到那里。” ——列奥纳多·达·芬奇"
 curtiss.222.t: "空难"
 curtiss.222.d: "一场严重的飞机事故粉碎了人们对航空业特别是航空公司的信心。"
 curtiss.222.f: "一场造成多人死亡的空难使我国主要航空公司陷入危机。向受害者亲属赔偿、飞机损失和乘客人数下降可能会导致投资减少。干预主义者主张注入资金以防止重大危机。"
 curtiss.222.g: "叫做自由市场是有原因的。"
 curtiss.222.h: "国家会干预。"
 curtiss.223.t: "[ROOT.GetCountry.GetAdjectiveNoFormatting]航空公司处于困境"
 curtiss.223.d: "一场严重的危机大大打击了国家的主要航空公司。[SCOPE.sCharacter('howard_hughes').GetFullName]宣布将进行大规模裁员以避免公司破产。"
 curtiss.223.f: "[ROOT.GetCountry.GetAdjectiveNoFormatting]航空公司的危机占据了报纸头条。数百个工作岗位岌岌可危，股价暴跌。为了拯救他的公司，[SCOPE.sCharacter('howard_hughes').GetFullName]宣布了严厉措施，迫使工会走上街头。这位大亨的声望急转直下。政府干预可以避免危机，但这将是一项长期的金融投资。"
 curtiss.223.h: "这家公司是全国的要点！"
 curtiss.224.t: "[ROOT.GetCountry.GetAdjectiveNoFormatting]航空公司的长臂"
 curtiss.224.d: "[SCOPE.sCharacter('howard_hughes').GetFullName]的阴谋变得路人皆知：这位大亨在政治领域建立了一个运作良好的偏袒制度。"
 curtiss.224.f: "在这片土地上，很少有人能像 [SCOPE.sCharacter('howard_hughes').GetFullName]那样拥有如此大的权力。与此同时，这位大亨在政府内部建立了令一些人畏惧的系统。现在已经证明，他通过行贿在一个省获得优势，以便为机场提供税收优惠。内阁内，要求进行澄清和重新评估的声音越来越多。其他人则认为这些与工业的直接联系非常有益。"
 curtiss.224.g: "有什么问题？你和认识的人互相帮助。"
 curtiss.224.h: "腐败是一种罪恶，应当全面铲除。"
 curtiss.225.t: "航空运输无利可图"
 curtiss.225.d: "由于成本上升和乘客数量下降，[ROOT.GetCountry.GetAdjectiveNoFormatting]航空公司必须限制其在机场的参与。"
 curtiss.225.f: "最近的行动是一项糟糕的投资吗？[SCOPE.sCharacter('howard_hughes').GetFullName]的商业本能失灵了吗？无论如何，由于机场运营无利可图，该公司不得不削减对该机场的投资，以避免陷入重大危机。受到失业威胁的当地工人正在向政府求助，看看政府是否可以介入并避免惨案。"
 curtiss.225.g: "机场是国家要务！"
 curtiss.226.t: "与[SCOPE.sCountry('curtiss_rival_airline_country').GetNameNoFlag]航空公司竞争"
 curtiss.226.d: "在竞争对手的航空公司破坏了我们的海外业务后，我国航空公司要保持竞争力变得更加困难。"
 curtiss.226.f: "我国航空公司的董事总经理认为他们在[SCOPE.sCountry('curtiss_third_country').GetName]拥有良好的成功前景。事实上，这种情况只持续到[SCOPE.sCountry('curtiss_rival_airline_country').GetName]扩大其当地航空公司的规模之前。此后，该公司一直发动价格战。由于乘客稀少，人们已经在考虑减少国内机场的运力并节省开支。管理层敦促政府干预[SCOPE.sCountry('curtiss_third_country').GetName]以巧妙地制裁竞争对手。"
 curtiss.226.g: "我们不管这种小事。"
 curtiss.226.h: "尝试在[SCOPE.sCountry('curtiss_third_country').GetNameNoFlag]进行外交干预"
 curtiss.227.t: "[SCOPE.sCharacter('howard_hughes').GetFullName]遇到麻烦"
 curtiss.227.d: "由于[ROOT.GetCountry.GetAdjectiveNoFormatting]航空公司未能取得承诺的利润，这位著名的航空大亨面临着压力。"
 curtiss.227.f: "其实这只是威胁着该国重要的实业家的一个小危机。但多年来，公司内部的贪婪与日俱增，坚持要驱逐这位成功的商人。该国某机场的一项糟糕投资可以成为摆脱这位强大大亨并任命新人的机会。我们可以利用这种情况来发挥我们的优势。"
 curtiss.227.g: "他应该退居二线了。"
 curtiss.227.h: "[SCOPE.sCharacter('howard_hughes').GetFullName]会处理这件小事。"
 curtiss.228.t: "[SCOPE.sState('curtiss_factory_state').GetName]蓬勃发展的飞机工厂"
 curtiss.228.d: "我们的一家飞机工厂在与航空公司建立合作伙伴关系后，产能和效率大幅提高。"
 curtiss.228.f: "[SCOPE.sState('curtiss_factory_state').GetName]经历了崭新的协同效应。当地产业极大地受益于机场和航空公司。最近签订的合同使[SCOPE.sState('curtiss_factory_state').GetName]成为[ROOT.GetCountry.GetNameNoFlag]飞机文化的中心。合同伙伴之间将进行紧密的协调，以满足可能的需求。"
 curtiss.228.g: "航空业的伟大一天！"
 curtiss.229.t: "[SCOPE.sState('curtiss_factory_state').GetName]的新飞机工厂"
 curtiss.229.d: "到目前为止，大亨[SCOPE.sCharacter('howard_hughes').GetFullName]主要专注经营航空公司，但现在他想直接为自己的公司生产飞机。"
 curtiss.229.f: "[ROOT.GetCountry.GetNameNoFlag]的航空业务正在蓬勃发展。为了满足与日俱增的新飞机的需求，不再依赖承包商，该国领先的航空业大亨决定开创一个新的业务领域。据说[SCOPE.sCharacter('howard_hughes').GetLastName]飞机公司将成为世界市场上的新竞争对手。然而，有些人想要知道，一个人手中握有如此大的权力是否会变得危险。"
 curtiss.229.h: "绝对是个陷阱。"
 curtiss.230.t: "[SCOPE.sCharacter('howard_hughes').GetLastName]，赞助人"
 curtiss.230.d: "著名亿万富翁[SCOPE.sCharacter('howard_hughes').GetFullName]是音乐与电影之友。他想在[SCOPE.sState('curtiss_opera_state').GetName]建立一所新剧院。"
 curtiss.230.f: "多年来，[SCOPE.sCharacter('howard_hughes').GetFullName]一直在感叹他的航空公司缺乏核心文化。这座城市可以拥有更迷人的夜生活，也可以吸引更多的游客。与此同时，这位大亨以其对音乐的品味和对新兴电影的热情而闻名。有传言说他甚至想制作自己的电影。因此，[SCOPE.sState('curtiss_opera_state').GetName]的扩建应该符合他自己的利益——并且提高他的声誉。"
 curtiss.230.g: "文化的伟大一天！"
 curtiss.251.t: "消失的地平线"
 curtiss.251.d: ""
 curtiss.251.f: "人类已经夺走了世界的奥秘。进步和技术令他们节节败退，退入最后的偏远角落——这些角落正是吸引[SCOPE.sCharacter('curtiss_conway_scope').GetFullName]的地点。他给熟人留下了深刻印象。他就像那些无处不在的冒险家，这些人之所以被人们记住，因为他们是乏味副本中最后的原创者。但[SCOPE.sCharacter('curtiss_conway_scope').GetLastName]不仅想要环游世界。他是我国驻印度的名誉领事，几个月前在喜马拉雅山尼泊尔和西藏边境的某个地方消失得无影无踪。如果不是因为一个关键细节，人们可能会蒙受悲痛的损失。[SCOPE.sCharacter('curtiss_conway_scope').GetLastName]正在寻找某些东西。有什么大事：比许多宝藏更伟大的东西。疯了——如一些人所说，但疯狂背后还有什么东西，因为今天早上 [SCOPE.sCharacter('curtiss_conway_scope').GetLastName]的前助理向国务院转发了一份手稿。私人笔记指向山中一个秘密的、未知的山谷。一个不被世人注意的山谷。我们怀疑名誉领事正在前往这个山谷的路上——他可能出了什么事，因为他已经失踪了几周。"
 curtiss.251.g: "我们应该组织救援队找到他。"
 curtiss.251.h: "我们没时间处理这些逃避现实的事情。"
 curtiss.252.t: "营救[SCOPE.sCharacter('curtiss_conway_scope').GetLastName]"
 curtiss.252.d: ""
 curtiss.252.f: "在对手稿进行了详细检查后，[SCOPE.sCharacter('curtiss_conway_scope').GetLastName]可能已在喜马拉雅山失踪的假设得到证实。我们询问了其他外交官并贿赂了线人，但仍找不到名誉领事的踪迹。手稿本身显然是[SCOPE.sCharacter('curtiss_conway_scope').GetLastName]的笔迹，描述了三个指向某一隐藏地点的文物。我们不知道为什么[SCOPE.sCharacter('curtiss_conway_scope').GetLastName]想要前往那里，我们也不知道他想要在那里做什么；但即使这只是一个疯狂的梦境，也应该把[SCOPE.sCharacter('curtiss_conway_scope').GetLastName]带回[ROOT.GetCountry.GetCapital.GetCityHubName]。只有经验丰富的飞行员才能执行这项任务。[SCOPE.sCharacter('curtiss_conway_scope').GetLastName]生还的希望似乎微乎其微，但如果发生不幸，那么至少可以找出[SCOPE.sCharacter('curtiss_conway_scope').GetLastName]发生了什么。也许答案也可以在神秘的山谷中找到。它的名字叫作：香格里拉。"
 curtiss.252.g: "[SCOPE.sCharacter('curtiss_expedition_leader_1').GetFullName]应当寻找他。"
 curtiss.252.h: "[SCOPE.sCharacter('curtiss_expedition_leader_2').GetFullName]将会做好这件事。"
 curtiss.252.i: "[SCOPE.sCharacter('curtiss_expedition_leader_3').GetFullName]是我们的人。"
 curtiss.253.t: "搜寻开始"
 curtiss.253.d: ""
 curtiss.253.f: "[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]已经飞行了数个小时。无尽山脉的巨大雪覆山峰已从云海中伸展出来。微光的黎明在其上闪耀。关于三件文物的具体位置只有粗略的线索。然而，在[SCOPE.sCharacter('curtiss_conway_scope').GetLastName]留下的手稿指引下，我们知道一些可能的去处。飞机的引擎在横跨辽阔的西藏地区时隆隆作响，[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]制定了最终的航线——希望能找到一些关于 [SCOPE.sCharacter('curtiss_conway_scope').GetLastName]或他一直在寻找的山谷的线索。"
 curtiss.253.g: "拉达克"
 curtiss.253.h: "拉萨"
 curtiss.253.i: "阿里"
 curtiss.253.j: "结束无意义的旅程。"
 curtiss.254.t: "搜索继续"
 curtiss.254.d: ""
 curtiss.255.t: "文物之谜"
 curtiss.255.d: ""
 curtiss.255.f: "[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]找到的所有三件香格里拉文物之后都需要进行更详细的检测因此，飞行员返回了[ROOT.GetCountry.GetNameNoFormatting]一段时间，以便让专业的考古学家现场检查并分析这些文物。"
 curtiss.255.g: "我们需要正确的人去做这件事。"
 curtiss.260.t: "沉默的长者"
 curtiss.260.d: ""
 curtiss.260.f: "一片寂静。长者垂下眼帘，双手合十，不在看着面前的人。\n“我认为你最好现在就离开这。”"
 curtiss.260.g: "他生气了吗？"
 curtiss.261.t: "拉达克"
 curtiss.261.d: ""
 curtiss.261.f: "飞行时间已经过去。一座座山峰的森林伴随着他走过了几个小时。当[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]看了一眼克什米尔和西藏之间喜马拉雅山脉的一个小镇时，双引擎飞机的螺旋桨还在旋转。当他降落漫步在街道上时，祈祷轮在他耳边响起。一群雇佣兵正等在村口；很难说他们是为谁而战，还是与谁为敌。他们的武器和盔甲看起来像是来自另一个时代，但他们的危险性并不低。居住区的中心是一个小市场，出售来自附近克什米尔的羊毛和织物。不远处一座油漆鲜艳的房子，飘扬的旗帜表明村里的长者住在那里。"
 curtiss.261.g: "拜访雇佣兵。"
 curtiss.261.h: "逛集市"
 curtiss.261.i: "探望长者。"
 curtiss.261.j: "飞回文明世界。"
 curtiss.262.t: "雇佣兵？"
 curtiss.262.d: ""
 curtiss.262.f: "卫兵们守卫着一座房子。严肃神情清楚地表明，他们不仅不信任陌生人，而且不信任任何太靠近门阶的人。两者都适用于[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]。他呲牙咧嘴的意识到自己最好离开。"
 curtiss.262.g: "试着和他们谈谈。"
 curtiss.262.h: "试着收买他们。"
 curtiss.262.i: "给他们展示科拉刀。"
 curtiss.262.k: "给他们展示武器。"
 curtiss.262.j: "返回村庄。"
 curtiss.263.t: "雇佣兵们不以为然"
 curtiss.263.d: ""
 curtiss.263.f: "雇佣兵都沉默不语没有回应，消极的反应也比扔沉默要好，这沉默比喜马拉雅山的雪峰还要冷。寒冷很快从[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]的脖子蔓延到他的脚趾尖。显然，最好是继续前进。"
 curtiss.263.g: "陌生的伙伴们……"
 curtiss.264.t: "香格里拉的守护者"
 curtiss.264.d: ""
 curtiss.264.f: "传统的剑在冰冷的阳光下闪闪发光，[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]的目光从一个雇佣兵游移到另一个，全都没有反应，他起初想放下了剑——然后突然听到了一个声音。\n“了不起”\n[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]眨了眨眼。一方面是终于有人开口说话了，另一方面陌生人并没有用藏语和他说话。而是用他的母语且没有口音。\n[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]问道：“你是[ROOT.GetCountry.GetAdjectiveNoFormatting]？”，但他没有得到答案。\n“你通过了测试，现在随我来吧。”\n就在那一秒，一个迷人的、不可思议的想法在[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]脑里闪过。如果这些人真的是香格里拉的守护者，那么他们亲自到过这个山谷也不是不可能，也许他们现在拥有不可估量的智慧，所以精通各国语言；也许他们拥有特殊的天赋，可以看到每个陌生人的内心，读懂他们的想法；但也可能是他不是第一个从远方来寻找传说中的山谷的人。[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]有成千上万的问题，寻求数以万计的答案，但他却没有找到一个答案。默默地，其中一个人把他领进了屋子，屋子里只有一个房间，里面有一件藏族的文物，那人用不是不友好而是很清楚的语气指着它。\n守卫开口说道：“我们不对人类隐藏香格里拉，我们保护人类远离尘世。那些不通过测试的人会半路而亡”，然后把[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]领回去。"
 curtiss.264.g: "似乎长老测试了我们……"
 curtiss.265.t: "武器"
 curtiss.265.d: ""
 curtiss.265.f: "[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]拔出了他的武器。金属武器指向守护者。他等待着看他是否做出了正确的选择；直到一个人从队伍中走出。他走向他，看着 [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]，然后看着他的武器。\n骇人的金铁交鸣。\n被蹂躏的钢铁落在小路上闪闪发光，然后黯淡下去。陌生人用他的双手拿起武器并将其这段。这明显的迹象表明，[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]已经自动失去了进入这座房屋的资格。"
 curtiss.265.g: "这也太……残酷了。"
 curtiss.266.t: "羊毛市场"
 curtiss.266.d: ""
 curtiss.266.f: "酥油的气味掩盖了市场中的各种香气。寥寥几人在小摊位之间拥挤着。各种织物，尤其是羊毛，引人注目。来自邻近的克什米尔的货物通过这个城镇前往西藏。那里相当需要这种材料。当 [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]路过摊位时，一位商人走近他，想以优惠的价格卖给他一整捆羊毛。他情不自禁地停了下来。"
 curtiss.266.g: "这羊毛看起来质量不错。"
 curtiss.267.t: "长者"
 curtiss.267.d: ""
 curtiss.267.f: "沐浴在酥油茶的香气中，时光在一个本以为相当简陋的大厅里流逝，但在喜马拉雅山脉这里却如亲王的殿堂般辉煌。墙壁上悬挂着的挂毯、面具和旗帜俯瞰着一张低矮的桌子，在那里长者和[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]喝了一碗又一碗。此地的主人非常好客。尽管[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]的话不多，只谈论最重要的事情，但老人似乎有一定的兴趣。一开始，[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]以为这是因为他的出身，因为像他这样的人在这个偏远地区很罕见。但长者似乎知道他为什么会在这里。[SCOPE.sCharacter('curtiss_conway_scope').GetLastName]的名字被提及。而[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]暗示了他真正想要的东西。谈话将要结束时，友善的氛围允许[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]再提出一个话题……"
 curtiss.267.g: "谁是雇佣兵？"
 curtiss.267.h: "你知道多少和香格里拉有关的事？"
 curtiss.268.t: "雇佣兵的秘密"
 curtiss.268.d: ""
 curtiss.268.f: "长者稍事休息，他似乎在仔细斟酌接下来要说谢什么。[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]熟悉这样的时刻；它们出现在那些反复权衡什么应当说的人身上。\n“他们被称为雇佣兵，但其实并非如此。他们是守护者，”老人说道。“他们守护着蓝月谷。”\n“蓝月谷？他们守护一座房子，而不是一个谷地。”\n“想要进入谷地先要通过这所房子。有时候要绕道才能直走，”长者解释道。“他们只让那些证明自己值得的人通过。为此，他必须出类拔萃。他必须携带古代勇士的武器：一把光荣的武器，也是在蓝月谷中使用的武器。”\n“已经有人通过守护者并穿过这所房子了吗？”\n长者微笑。\n“你所称之为[SCOPE.sCharacter('curtiss_conway_scope').GetLastName]的人已经进去过了。”"
 curtiss.268.g: "这栋房子是去往香格里拉的关键。"
 curtiss.269.t: "关于香格里拉"
 curtiss.269.d: ""
 curtiss.269.f: "亲切的氛围突然消失不见。长者放下他的酥油茶碗。他的目光锁定在[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]身上。声音变得严厉起来。长者审视着他。\n“你要在香格里拉寻找什么？”"
 curtiss.269.g: "我在追求和平。"
 curtiss.269.h: "我在寻找真相。"
 curtiss.269.i: "我在寻找[SCOPE.sCharacter('curtiss_conway_scope').GetLastName]。"
 curtiss.269.j: "我正在寻找启蒙。"
 curtiss.270.t: "一个建议"
 curtiss.270.d: ""
 curtiss.270.f: "长者微笑着。\n“真相是最崇高的燃料。拯救一个生命是好事，但如果你不知道为什么要这样做，那又有什么意义呢？香格里拉也是如此。数不尽的人们几个世纪以来一直在寻找蓝月谷。很多人被永无止境的和平追求所驱使，或是对满足的渴望。甚至是想要给一个患绝症的爱人一个长生之所。无论动机如何，难道不应该先问一问什么是香格里拉吗？\n“我听说那是个完美的地方。”\n“即使它只是另一个山谷，受到同样的折磨，同样的灾祸，同样的罪恶，过着同样痛苦的生活，和任何其他地方一样？”\n“我不在乎，” [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]说。“我想要确定。而且我需要找到 [SCOPE.sCharacter('curtiss_conway_scope').GetLastName]。”\n长者点了点头。\n“有一个特殊的原因，为什么[SCOPE.sCharacter('curtiss_conway_scope').GetLastName]能够进入那所房子但其他人却不能。他知道蓝月谷的传统武器并不是西藏的武器，而是尼泊尔的武器。那是一把柯拉刀。”\n[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]大惊失色。“但他怎么知道？”\n“因为[SCOPE.sCharacter('curtiss_conway_scope').GetLastName]并不是第一次去香格里拉……”"
 curtiss.270.g: "一把柯拉刀……"
 curtiss.271.t: "拉萨"
 curtiss.271.d: ""
 curtiss.271.f: "拉萨，一个神秘的地方。达赖喇嘛的宝座——布达拉宫高耸于城市之上，宛如一座巍峨的宝塔。这童话般的景象让[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]忘却了自己置身于世界何处。或许有人会将其错认为是荒野中的文明，然而将拉萨描述为文明却是个错误。在这里，时间仿佛停滞。对于进步者来说，这里是一个停滞在野蛮的落后之地；而对于浪漫主义者来说，这是一个避世之所，远离科技与傲慢所笼罩的世界。[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]漫步于街头巷尾，狭窄的巷弄与酒馆相伴，一旁还有传统的铁匠铺。他并不确定这些地方是否能为他的探索提供帮助，但或许它们会给出他迄今为止所未曾提出的问题的答案。此刻，他仿佛置身于一幅绘画之中，画面中充满了神秘的气息与未知的可能。"
 curtiss.271.g: "参观布达拉宫"
 curtiss.271.h: "拜访铁匠。"
 curtiss.271.i: "在酒馆里喝一杯。"
 curtiss.271.k: "在街上散步。"
 curtiss.271.j: "飞回文明世界。"
 curtiss.272.t: "布达拉宫"
 curtiss.272.d: ""
 curtiss.272.f: "[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]没有走远。守卫们在雄伟宫殿的门口拦住了他，拒绝让他进入。当 [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]尝试解释他的关切时，守卫表示他的任何关切都没有重大到足以打扰达赖喇嘛。[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]察觉到对他的极大不信任：他或许被误认为了间谍。"
 curtiss.272.g: "亮出护身符。"
 curtiss.272.h: "返回拉萨"
 curtiss.273.t: "喇嘛"
 curtiss.273.d: ""
 curtiss.273.f: "护身符闪耀着光芒，投射出璀璨的光辉，令守护者们眼眸放大。“伟大第五世的护身符！”一人惊叹道。此刻，他们不再阻挠[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]的前进，反而将他引领入宫殿之中。沿着色彩斑斓的墙壁、华丽织物和妖异雕像，他们快速地带领他前行，超乎他的预料——直至抵达达赖喇嘛的面前。[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]未曾料到这一情景，心中充满惊讶。而当他们像俘虏一般将他押送时，他几乎难以相信自己的耳朵——他被指控从宫殿中盗走一件重要的文物。一脚迫使他跪地，直至室内陷入寂静之中。\n“他并未有过错。”\n达赖喇嘛的声音响起，如天籁之音。[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]只能缓缓抬起头，触目所及是西藏的精神领袖，他静默而自得地闭上双眼。唯有护身符闪烁的光芒唤醒了他。一名卫兵从[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]手中夺过那纪念品，将其奉上给达赖喇嘛。\n“这枚护身符数年前失落于布达拉宫，多年来，我一直等待着有人将其归还。这是它注定的命运。”\n[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]抬起头，师者示意他站起身来，他默默点头。然而，他心中仍有疑惑。\n“您所言是否指向命运？”\n“命运是个抽象的概念。我更喜欢活生生的、有血有肉的东西，”达赖喇嘛缓缓道出，眼中流露着智慧与深思。\n“我不明白。”[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]追问道。\n“你的命运被称为[SCOPE.sCharacter('curtiss_conway_scope').GetLastName]。而我这里有一样东西，正等待着你的到来，如果有人将护身符带回给我……”"
 curtiss.273.g: "这是香格里拉著名的工艺品之一！"
 curtiss.274.t: "无铁"
 curtiss.274.d: ""
 curtiss.274.f: "“我们关门了！没有铁就没法工作。过几个月再回来！\n刚走进店里，屋内就响起了沙哑的声音。客户友好显然不是这家铁匠铺的首要任务。"
 curtiss.274.g: "“真巧，我带了点铁过来。”"
 curtiss.275.t: "铁匠"
 curtiss.275.d: ""
 curtiss.275.f: "这位不大友好的铁匠看到一整块免费的铁时，感到相当惊讶。他看了看货物，然后看了看 [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]，搓了搓手。他明确表示目前首都的金属制品短缺，并向旅行者展示了一些精美的西藏传统武器。可以确定的是，没有什么地方会有更好的铁匠可以锻造如此优质的兵器。事实上，这也是世界上最后一处了。[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]借此机会开始谈正事。但是铁匠应该制作哪种武器呢？"
 curtiss.275.g: "一把侧剑"
 curtiss.275.h: "一把直刃剑。"
 curtiss.275.i: "一把短剑。"
 curtiss.275.j: "一把柯拉刀。"
 curtiss.276.t: "新武器"
 curtiss.276.d: ""
 curtiss.276.f: "几天过去了，一把新锻武器的剑刃终于出现在灯光下。[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]看着它。工作完成后，铁匠要求付款，并指出他在其他山谷中找不到如此美丽的作品。"
 curtiss.276.g: "它将教会别人敬畏！"
 curtiss.277.t: "一把柯拉刀"
 curtiss.277.d: ""
 curtiss.277.f: "这个订单令铁匠深感惊讶。尼泊尔武器？这仿佛冒犯了他的荣誉，但[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]坚持要订货，那好吧：他的铁、他的钱。即使铁匠在工作中一连几天保持沉默，只在被问及时以抱怨、轻蔑或肯定的声音回答，最终的产品也同样令人信服。科拉剑与加德满都发现的传统武器没有什么区别。"
 curtiss.278.t: "乞丐"
 curtiss.278.d: ""
 curtiss.278.f: "寒冷的喜马拉雅空气吹过街道。居民们已经回到自己的家中。墙上挂着脏旗帜和旧地毯。路边的雪深及脚踝。一个乞丐在阴影中颤抖着，举起一个木碗，里面放着半枚铜钱。"
 curtiss.278.g: "继续前行。"
 curtiss.278.h: "给一点施舍。"
 curtiss.278.i: "给他羊毛。"
 curtiss.279.t: "僧侣的秘密"
 curtiss.279.d: ""
 curtiss.279.f: "乞丐热情地接受了羊毛。他把它放在肩膀、胸前、腰上，然后双手搓在一起。[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]想要再给他一些。但男人阻止了他。\n“你和我分享了一些东西。现在我想与你分享一些东西。\n[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]回复说他认为乞丐没有任何东西可以与他分享。乞丐也同意：他真的一无所有。但他知道有人可以给他一些东西：阿里山区的孤独僧人，一位圣人。他在人们不知道想要什么的情况下提供他们需要的东西。他生活在旷野，任何人寻找他都会迷失方向，除非他认得路。但凡找到他的，都会得到丰厚的赏赐——如果他认为那人配得上。\n“那么我该如何显得自己配得上呢？” [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]闻道。\n乞丐搓了搓羊毛。\n“你已经做到了。”"
 curtiss.279.g: "他很快就会成为不那么神秘的僧侣。"
 curtiss.280.t: "酒馆"
 curtiss.280.d: ""
 curtiss.280.f: "巨大的填充乌鸦标本展翅飞翔，装饰在喧闹、拥挤的长吧台后面。深夜的景象中，千姿百态的顾客混杂在一起：西藏本地人、勇猛的夏尔巴山地向导、猥琐的国际走私者和逃犯，当然还有来自世界各个角落的登山者。一个高大的尼泊尔人是这里的酒保。\n[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]明确表示他正在寻找信息：关于山中的一个失落的山谷的信息。酒保把他推荐给了一位夏尔巴人。他了解该地区的所有山口和山谷。酒精在血液中涌动。但是夏尔巴人并不知道符合描述的山谷。然后[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]提到了香格里拉。夏尔巴人竖起耳朵倾听，但随后又沉默了下来。接着是关于三件据说能通往隐藏山谷的文物的讨论。酒精再度涌动，一遍又一遍。"
 curtiss.280.g: "一条有价值的信息。"
 curtiss.281.t: "阿里"
 curtiss.281.d: ""
 curtiss.281.f: "一个聚落，隐藏于一片崎岖难行的山谷之中。高耸的冈仁波齐峰，圣洁的巅峰昂然耸立在山脊之上，吸引着众多朝圣者前来膜拜。犹如一座水晶金字塔从那形状模糊、粗犷的山岭中耸立，它璀璨夺目地照亮了整个山谷中的小小聚居地。在这荒凉之地寻找一个着陆场所，成为一项艰巨的任务。[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]聪明地将飞机停靠在一个安全的地方，然后开始了一段漫长的徒步，直至他发现了一片村落。这里有一位流浪商贩，他以贩卖铁器为生计。而就在不远处，是一座古老的神殿。除此之外，尽是无尽的荒野，散发着神秘而浩渺的气息。"
 curtiss.281.g: "前往荒野。"
 curtiss.281.h: "拜访铁商。"
 curtiss.281.i: "参观圣地。"
 curtiss.282.t: "荒凉山脉"
 curtiss.282.d: ""
 curtiss.282.f: "狂风呼啸，残酷地穿梭在群山之间。它如同一只凶猛的怪兽，贪婪地吞噬着周围的一切。风雪交织，卷动着整个景色。漆黑的天空和飘舞的雪花一同将视线掩盖，只能望见几米之内的景象。数英里的范围内，无论是房屋还是人影，乃至一只鸟儿，都无踪影可寻。生命的气息似乎被彻底抹去，山间空灵的寂静中弥漫着一片死寂。在与自然元素搏斗的过程中，登山浪漫早已消失殆尽，眼下这里完全毫无生机可言。[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]的脚步变得愈发沉重，不仅因为他已连续徒步行走数日，更是因为每迈出一步，积雪愈厚，逐渐堆积到膝盖之上。他已经漫步了数个小时，陷入一片模糊的世界，完全无法看清前方的路途。如同一个迷失的旅人，他在这茫茫白色中孤独而艰难地前行。"
 curtiss.282.g: "继续前进。"
 curtiss.282.h: "寻找僧侣。"
 curtiss.282.j: "返回。"
 curtiss.283.t: "迷失于荒野"
 curtiss.283.d: ""
 curtiss.283.f: "视线所及之处，尽是寒冰、碎石和积雪。一位夏尔巴人独自背着行李和牲畜穿越一个山口。过去几天的积雪已经消退。四下寂静，天空晴朗。一块衣物碎片在一个山坡上飘动。夏尔巴人看到了它并靠近——迅速做出了反应。他发现了[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]严重失温、瘫倒在地的身体。他的生命迹象虚弱，但还活着。"
 curtiss.283.g: "侥幸逃过一劫……"
 curtiss.284.t: "值吗？"
 curtiss.284.d: ""
 curtiss.284.f: "暴风雪中出现了一个轮廓。就在 [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]正要放弃，倒在地上向自然投降的时刻，一位身穿红橙袈裟的僧侣出现在他眼前；雪风刹那减弱，呼啸和恐惧声渐渐消退，直至只剩下和煦的微风。只有[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]和那位僧侣留下了。但[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]说不出话，于是僧人举起了手。\n“你认为，为什么所有人中，是你应该获得通往渴望之地的道路？你认为，什么样的人配得上进入这个地方？”\n没有自我介绍。没有问候。没有询问他是谁或他想要什么。[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]持怀疑态度；这个人不可能知道他是谁和他想要什么。直到他想到，僧人一定有线索‑他是否知道只有拉萨的乞丐才能让他来到这里？"
 curtiss.284.g: "忏悔者"
 curtiss.284.h: "虔信者"
 curtiss.284.i: "谦卑者"
 curtiss.284.j: "勇敢者"
 curtiss.285.d: ""
 curtiss.285.f: "“寻找某个地方的人必须知道在那里等待着他的是什么。但寻找这个地方的动机与在那里找到的东西往往不同。你所寻找的地方有什么特点？”"
 curtiss.285.g: "生生不息，繁荣昌盛"
 curtiss.285.h: "鸡犬相闻，怡然自乐。"
 curtiss.285.i: "智慧与真诚"
 curtiss.285.j: "启迪与疗愈。"
 curtiss.286.d: ""
 curtiss.286.f: "你正在寻找的地方有许多名字，就像给掌握宇宙的力量起了许多不同的名字一样。人们赋予名字，但这并不意味着他们能够真正理解那个地方。相反，他们对其存在有一种直觉。即使这些名字指代相同的事物，也并不意味着它们完全相同。如果你想控制某样东西，只有当你知道正确、真实的名字时，你才能够控制它。那么，你正在寻找的地方叫什么名字？"
 curtiss.286.g: "这个地方被称为香格里拉"
 curtiss.286.h: "消失的地平线之山。"
 curtiss.286.i: "香巴拉王国"
 curtiss.286.j: "蓝月谷"
 curtiss.287.t: "护身符"
 curtiss.287.d: ""
 curtiss.287.f: "“我看得出你已经做好了充分准备。你并非第一个寻找这片山谷的人。世界各地的男男女女都曾为之追寻。然而，我无法为你指引道路；但我可以为你简化它。一个寻找蓝月谷的人需要的是远超过个人力量所能胜任的东西。”\n僧人将一物交至[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]的手中，那是一枚护身符。\n“第五世达赖喇嘛曾统治这片土地。据说，这护身符曾属于他。而你已经证明自己配得上佩戴它。”\n[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]心中升起更多问题。他渴望了解僧人对香格里拉的了解，同时他也心生疑惑，这枚护身符是否仅仅是当地人迷信的物件。然而，僧人视自己的使命已完成，他在一阵飞雪的拂袖声中离去。[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]独自留在那里，思绪万千。这个物品并非香格里拉的遗物，他的来意是否徒劳无益？他是否被误导了？"
 curtiss.287.g: "护身符？但这有什么用……？"
 curtiss.288.t: "铁商"
 curtiss.288.d: ""
 curtiss.288.f: "轻柔的风雪中，毛绒绒的牦牛发出喷鼻声。一个行商调整着手套，显然正在奔波。小铁锭被堆放在一个木头和布料构成的庇护结构下，看起来像是被拆毁的帐篷。当看到[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]时，他做出手势打了打招呼。"
 curtiss.288.g: "买点铁。"
 curtiss.289.t: "圣地"
 curtiss.289.d: ""
 curtiss.289.f: "一个神龛独自矗立在定居点外。数英里内，它是人类劳动最显著的成果。除了一些色彩缤纷的花朵、转经筒、飘动的经卷和一个佛像，[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]还看到了一段显眼的铭文。令人惊讶的是，它是用拉丁字母书写的——而且还是欧洲语言。[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]本以为这是一个佛教神龛，但随后又意识到在西藏这种类型的神龛非常不寻常。当地人更喜欢如山的佛塔。然而，铭文看起来很古老，至少有几个世纪的历史。根据[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]的判断，这种语言是法语。他不知道这个牌子从哪里来，也不知道它为什么会出现在这里；但他利用自己生疏的语言知识来解读上面写的内容。个别字母已经风化褪色了。\n“追求真理的人才有资格。慷慨的人才有资格。忠诚的人才有资格。他将生活在丰富多彩的岁月中，在智者和启迪之间找到宁静。但那些受贪婪驱使的人将被大地吞噬。”"
 curtiss.289.g: "推动佛像。"
 curtiss.290.t: "圣地的秘密"
 curtiss.290.d: ""
 curtiss.290.f: "佛像沉入壁龛之中。一个机械装置嘎嘎作响。秘密隔间打开了，露出一个华丽的盒子。[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]面对宝藏弯下腰。他知道这可能是什么——并迅速打开了锁。"
 curtiss.290.g: "香格里拉的文物！"
 curtiss.291.t: "香格里拉之路"
 curtiss.291.d: ""
 curtiss.291.f: "经过数日的努力，享有盛誉的考古学家[SCOPE.sCharacter('curtiss_shangrila_archaeologist').GetFullName]终于完成了他的研究。他在一场令人印象深刻的演讲中告诉学院职工，这是一种只能通过准确解读三件文物才能解密的密码。当然，完全归功于他卓越的智慧，他仅用数天时间就找到了答案。描述内容基本上十分原始，依据着几座山脉、山口和河流，然而在最现代的制图技术的帮助下，简单的坐标也能被推导出来。如今，探索传说中的山谷已经不再困难重重。\n然而，在考古学家冗长的陈述之后，无论是政府代表还是[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]都得出了同样的结论：如果他没来这里更好。"
 curtiss.291.g: "知道的人越少越好。"
 curtiss.292.t: "湍流"
 curtiss.292.d: ""
 curtiss.292.f: "不到一百英里的距离，[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]已经忘记了确切的距离。一个小时以来，他一直在与一堵无法穿透的云墙作斗争。飞机升高，但没有找到云层的尽头。如果他飞到地面，那时云层就会消散；但与此同时，他又危险地接近山脊和雪峰。他看不见山谷。尽管心知肚明，他不得不降低高度，否则就会错过目标。他考虑找个地方在夜里着陆，第二天再飞到那些坐标上；但有种感觉告诉他，像这样的山谷总是被神秘的薄雾所环绕，使其不为人所发现。无论他今天、明天还是一个月后来到这里，云层和雾气都会阻碍他。但是当[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]操纵操纵杆时，整个飞机都会震动，引擎呼啸——湍流牢牢控制住飞机！山脉的风像玩弄玩具一样，与空中旋转的机器嬉戏，飞行员拼命试图驯服这些装置……"
 curtiss.292.g: "发生了什么？！"
 curtiss.293.t: "迫降"
 curtiss.293.d: ""
 curtiss.293.f: "一片破碎的金属机翼在喜马拉雅山的岩石上闪着光芒。碎片散落在草地和土地之间。一枚破碎的螺旋桨卡在了灌木丛中。事故的痕迹穿过花田，尽头是机身冒烟的飞机，发动机发出最后一声叹息。飞机的门摇摆着打开，却断裂并砰地摔到了地面上。[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]紧紧抓住金属机身，蹒跚着走出机舱。一种强烈的感觉涌上心头。这次迫降只是一个小细节。雾气、云层、雪花、寒冷都已经成为过去。他望着山峰上洁白的积雪，下方是葱翠的森林、蜿蜒的河流和飞流直下的瀑布。阳光照耀在湛蓝的天空中，附近的温泉冒着袅袅蒸汽。[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]脱下飞行员的夹克，这里不仅气候宜人，而是温暖至极。空气中弥漫着茶和蜂蜜的香气。他望着坡上种满桃树的景象，一座宝塔屹立在山岗上，中午时分传来钟声。远处是一个城镇的轮廓，高耸在城上的寺庙建筑别具一格，不同于传统的西藏寺庙。他注意到这座城市没有城墙，而麦田和稻田在微风中轻轻摇曳。远处装饰华丽的窗户传来音乐的声音。"
 curtiss.293.g: "这是……一个山谷？"
 curtiss.294.t: "蓝月谷"
 curtiss.294.d: ""
 curtiss.294.f: "在喧嚣的街道上，[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]漫步着，穿过古老的墙壁和熙攘的摊位。这个地方充满了一种轻盈的氛围和自由的味道，仿佛是一个全新的世界，是他从未有过的体验。尽管他是个陌生人，但街上的人们却用一种亲切的目光和热情的问候迎接他，仿佛他只是他们曾经见过的朋友，暂时失散了一段时间。一位酒馆老板邀请他进入自己的小屋，一位橙衣少女慷慨地递给他一颗水果。而更让[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]惊奇的是，这座城市竟然展现着一种奇妙的欧洲风情。他原本期待着见到佛教寺庙的庄严和沉静，却不曾想到迎接他的是法式风格的教堂。这里的人们的面容上不见岁月的痕迹，只有友好与宁静的光芒。他确信在这个多元的人群中，有着几位与他同胞的存在，只要他与他们交谈一番。香格里拉并非一个西藏城市，它超越了国界的束缚，成为一个属于全人类的神秘之地。\n“终于来到了这里……”\n他心头涌起一股喜悦的情绪，突然明白并非是他在寻找[SCOPE.sCharacter('curtiss_conway_scope').GetFullName]，而是[SCOPE.sCharacter('curtiss_conway_scope').GetFullName]正在寻找他。面前的这个身着卡普奇尼修士袍的男子，虽然有着[ROOT.GetCountry.GetAdjectiveNoFormatting]的面貌，却是他真正的目标。"
 curtiss.294.g: "[SCOPE.sCharacter('curtiss_conway_scope').GetFullName]是这里的主人吗？"
 curtiss.295.t: "[SCOPE.sCharacter('curtiss_conway_scope').GetFullName]"
 curtiss.295.d: ""
 curtiss.295.f: "[SCOPE.sCharacter('curtiss_conway_scope').GetFullName]的猜测得到了证实。寻找香格里拉的整个过程是一场艰辛的考验。他并非第一个经历这段寻找三件神器的旅程的人，而这些神器随后都被归还到原本的位置。最后到达香格里拉的人有责任将它们再次隐藏起来，以吸引下一个配得上揭开这个地方秘密的人进入山谷。而[SCOPE.sCharacter('curtiss_conway_scope').GetFullName]并不打算被拯救：在最后一位统治者去世后，他成为了新的统治者；这并非来自权力，而是源于他的才干和功绩。香格里拉的宫殿不仅仅是一个舒适的住所：它收藏着无数经典文献、来自世界各地的艺术珍品，还有休闲运动场所，如网球场、游泳池，甚至高尔夫球场。[SCOPE.sCharacter('curtiss_conway_scope').GetFullName]毫不掩饰他欲将[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]如同家人般引领至此的心愿。他将得到一切指导，摆脱一切疾病，并享受长寿的福祉。前提是他愿意留在这片山谷之中。"
 curtiss.295.g: "也许……必须救出[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]……"
 curtiss.296.t: "决定"
 curtiss.296.d: ""
 curtiss.296.f: "“我们非能创造奇迹者，亦无能征服死亡，或甚至腐朽之力。我们所能做之事，不过是减缓这被称为生命的短暂间隔。在此，我们运用的法术既简单又离奇，它只在此地行之有效，他处不可企及。但切莫误解，末日必将降临于我们所有。你将有机会品味阅读之乐——不再匆匆略过文字以省时，亦不需避免深入研习，唯恐其过于沉醉其中。而你对音乐亦颇有爱好——在此，乐谱和乐器皆将为你而备，时光流转恬静而不可衡量，将赋予你最为丰盈的味蕾体验。我们怀揣着梦想与远见。这一愿景最初降临于老佩鲁尔，当年他于1789年临终躺卧于此。他回首自己漫长的人生，正如我曾告诉你的那样，他深感世间所有的美好事物皆短暂易逝，而战争、欲望和残暴或许有朝一日将彻底摧毁它们，使世间再无留存。他回忆起亲眼目睹的景象，并以心灵描绘其他景象；他见证了各国崛起，非因智慧，而因粗俗的激情与毁灭的意愿；他目睹他们的机械力量日益繁衍，以至单个身怀武器之人或可与整个“大君”的军队匹敌。他预见到一个时代，当人们为杀戮技艺而陶醉时，热衷于席卷全球，使每一珍爱之物蒙受威胁，每一本书、每一幅画、每一段和谐乐章，每一处珍藏千年之宝，无论其微小、精致、无可抵御——皆将湮灭，如同消失无踪。而这，我的孩子，便是我在此的缘由，亦是你在此的原因，亦是我们祈愿逃离厄运的理由。”"
 curtiss.296.g: "这个地方必须保密。[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]会明白的。"
 curtiss.296.h: "这个地方必须得到保护。[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]会留下来。"
 curtiss.296.i: "以[ROOT.GetCountry.GetNameNoFormatting]之名，我们将征服此处！"
 curtiss.298.t: "恶业"
 curtiss.298.d: ""
 curtiss.298.f: "在[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]向我们展示了通往蓝月谷的道路，并将香格里拉的珍贵宝藏洗劫一空后，远征队终于归来了。但出于神秘的原因，[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]失踪了。其余的远征队员无法确定他的去向。他在休息时离开了队伍——然后滑落到一个山坡上，在那里他的足迹在一个深谷中消失。我们的博物馆现在因众多宝藏而更加丰富，但却失去了一个为了我们国家的考古财富冒险牺牲自己的有为爱国者。"
 curtiss.298.g: "被大地吞噬……"
 curtiss.311.t: "新的飞行员"
 curtiss.311.f: "“我将子弹射入目标，就像亲手把它们放在那里一样。” ——勒内·丰克"
 curtiss.311.g: "这将是一段非凡生涯的开始。"
 curtiss.311.h: "我们需要他进行国内宣传。"
 curtiss.312.t: "王牌飞行员"
 curtiss.312.d: "我们的飞行员[SCOPE.sCharacter('curtiss_ace').GetFullName]在这场战争中多次展示了他的技能，击落了大量敌机。战友们认为他是一位崭露头角的王牌飞行员。"
 curtiss.312.f: "“并不是每个人都能在最后一刻保持完全的冷静，平静地瞄准，并低下机头。” ——曼弗雷德·冯·里希特霍芬"
 curtiss.312.g: "新的民族英雄！"
 curtiss.500.t: "[SCOPE.sCharacter('howard_hughes').GetFullName]之梦"
 curtiss.500.d: "[ROOT.GetCountry.GetAdjectiveNoFormatting]航空公司的负责人宣布了他富有远见且古怪的计划，即建造世界上最大的飞机。目前它只缺乏政府的些许参与。"
 curtiss.500.f: "昨晚，[SCOPE.sCharacter('howard_hughes').GetFullName]在位于[ROOT.GetCountry.GetCapital.GetCityHubName]的总部召开了一场非同寻常的新闻发布会。近一段时间记者们对他的精神健康状况产生了怀疑，据说[SCOPE.sCharacter('howard_hughes').GetLastName]患有强迫症和精神分裂症。然而，他的维护者认为即使确实如此他也仍然成功地经营着自己的业务。但是，连后者听到这位大亨的发言后也陷入了沉默：他想要建造世界上最大的飞机，大到可以搭载一千人飞越大西洋。他将投资投入全部财富以建造这个空中巨兽，并且希望政府能够做出一点贡献，因为如果他的愿景能够成为现实，对于航空业、基础设施的扩展以及国家的声望也大有裨益。他提出了了小额资金。飞机将以我国首都命名：[ROOT.GetCountry.GetCapital.GetCityHubName]号。"
 curtiss.500.g: "伟大的远见！[ROOT.GetCountry.GetCapital.GetCityHubName]号将成为现实。"
 curtiss.500.h: "疯掉了。"
 curtiss.501.t: "飞机型号"
 curtiss.501.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]号飞机的设计师尚未这台机器应该是传统飞机还是水上飞机。"
 curtiss.501.f: "水上飞机并非一时之流，它们在20世纪10年代至40年代期间相较传统飞机拥有显著优势。其独特之处在于无需依赖跑道，能够在任何水面上着陆，无论是海洋还是较大的湖泊。这一特性不仅适用于海上，也适用于更大的湖泊。而传统机场常位于城市外围，而水上飞机则可以利用旧有的海港作为起降点。像意大利这样拥有漫长海岸线的国家，明确认识到水上飞机和飞艇的实用性；即便是像米兰这样的内陆城市，也拥有一个靠近利纳特的人工湖水上机场。因此，水上飞机也为英国和美国这样大西洋沿岸的国家提供了诸多优势。"
 curtiss.501.g: "经典的飞机构型。"
 curtiss.501.h: "飞行船。"
 curtiss.502.t: "建造材料"
 curtiss.502.d: "在计划[ROOT.GetCountry.GetCapital.GetCityHubName]号时候，对于使用哪种材料仍然存在分歧。"
 curtiss.502.f: "当航空业刚起步时，木材和织物主导了飞机的构造材料。在第一次世界大战中，人们已经意识到这些材料的轻便优势，然而与此同时，它们也面临着一些不足之处。它们几乎不具备防水性，且容易受损。因此，在随后的几年中，部分金属结构逐渐兴起，最终完全金属结构得到普及。在当时，金属材料在没有铝合金的情况下通常比木材更重。然而，金属材料的韧性使其成为更受欢迎的选择，即使在面临新问题，例如金属腐蚀或金属疲劳等情况下，也能够应对。"
 curtiss.502.g: "仅在必要时使用金属。这架飞机将主要由木材制成。"
 curtiss.502.h: "全部用金属包裹。"
 curtiss.503.t: "引擎问题"
 curtiss.503.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]号的工作取得了进展，飞机初具雏形。但发动机的问题尚未敲定：有两种变体可选。"
 curtiss.503.f: "在第二次世界大战期间及其后至20世纪50年代中期，涌现出一系列具有卓越性能的活塞式飞机发动机，这些发动机用于驱动战斗机、轰炸机和大型客机，具备超过3680千瓦（5000马力）的起飞功率和70升以上的排量。其中，Wright R‑3350和Pratt & Whitney R‑4360发动机被公认为活塞式飞机发动机技术的巅峰，也是在喷气式飞机兴起之前的巅峰之作。Wright R‑3350是一款18缸发动机，而Pratt & Whitney R‑4360是一款28缸发动机。"
 curtiss.503.g: "十台18缸发动机堪称完美。"
 curtiss.503.h: "我们需要8台28缸发动机。"
 curtiss.504.t: "螺旋桨"
 curtiss.504.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]进展良好。据[SCOPE.sCharacter('howard_hughes').GetLastName]所说，预计它将如期竣工，即使还有一些问题尚待解决。最近对螺旋桨的叶片数量进行了修改。"
 curtiss.504.f: "从原理上来说，单叶螺旋桨是最高效的，因为旋转螺旋桨叶片的气流受到前导叶片湍流的最小干扰。然而，单叶螺旋桨需要配重来平衡不对称负载，并且由于振动相对较大，因此这种设计方案很少被采用。较多叶片的设计对振动行为有积极的影响，尤其是当各个叶片在螺旋桨周围受到不同的气流流动时。在由活塞发动机驱动的飞机中，双叶螺旋桨是最常见的选择。而对于较大型飞机上的涡轮螺旋桨和推力风扇发动机，则常常采用3至7个乃至更多叶片的设计方案。"
 curtiss.504.g: "四叶螺旋桨会适合。"
 curtiss.504.h: "我们需要五叶螺旋桨。"
 curtiss.505.t: "历史上最伟大的一天"
 curtiss.505.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]即将首飞，与之相关的还有很多奇迹。[SCOPE.sCharacter('howard_hughes').GetFullName]坚持坚持亲自驾驶飞机，并邀请商界、政界和新闻界的代表参加飞行。其他声音则更为谨慎，坚持只允许选定的代表或完全排除公众——如果第一次飞行出现问题……"
 curtiss.505.f: "“大力神是一项具有划时代意义的巨大工程。它堪称人类历史上最宏伟的飞行器。高度超过五层楼，翼展更长过足球场。这个巨兽几乎超过了一个城市街区的长度。我将毕生的心血倾注在这个项目中。我的声誉和荣誉都与之紧密相连。我曾多次讲，如果这个项目失败，我可能会离开这个国家，再也不回来。这不只是口头上的承诺，我是认真的。” ——霍华德·休斯"
 curtiss.505.g: "邀请媒体、商界与政界代表。[SCOPE.sCharacter('howard_hughes').GetLastName]先生将亲自驾驶飞机。"
 curtiss.505.h: "我们会邀请记者。一位知名飞行员将驾驶飞机。"
 curtiss.505.i: "秘密试飞，由无名飞行员驾驶。"
 curtiss.506.t: "“四十万磅空运”"
 curtiss.506.d: "一个技术奇迹得以成功：[ROOT.GetCountry.GetCapital.GetCityHubName]尽管尺寸巨大但成功起飞！"
 curtiss.506.f_hughes: "这是属于他的日子，是他生命中最重要的一天。成功与愿景交织，[SCOPE.sCharacter('howard_hughes').GetFullName]将一切都押在了这张牌上。他不做半途而废的人，他邀请了整个新闻界，最大的企业领袖，甚至国会议员和部长们。他们不是坐在看台上，而是与他一同翱翔蓝天。整个世界将目睹他的命运，嘲笑他的事业，或者他将如同古代凯撒一样凯旋而归。\n[SCOPE.sCharacter('howard_hughes').GetLastName]亲自掌握着控制权，点燃了发动机，向[ROOT.GetCountry.GetCapital.GetCityHubName]号发出指令。庞然巨兽隆隆作响，激起滔天巨浪。这巨兽在水面上奔驰数小时，水花四溅，不知何时[ROOT.GetCountry.GetCapital.GetCityHubName]号已经腾空而起，抑或仍悄然踏浪。接着，只有发动机咆哮的声音，再无水波的回响。[ROOT.GetCountry.GetCapital.GetCityHubName]冲破束缚，傲然升入天际。记者们罕见地保持了沉默，政要们努力掩饰激动的情绪，企业家们目不转睛。而[SCOPE.sCharacter('howard_hughes').GetLastName]，脸上洋溢着微笑。恍如众人刚刚意识到前所未想的事实，一位记者不禁问道：“[SCOPE.sCharacter('howard_hughes').GetFirstName]，这都在你的计划之内吗？”[SCOPE.sCharacter('howard_hughes').GetLastName]的回答充满神秘感：\n“我喜欢给人们带来惊喜。”"
 curtiss.506.f_pilot: "[ROOT.GetCountry.GetNameNoFlag]来说是历史性的一天。[ROOT.GetCountry.GetCapital.GetCityHubName]号带着帝王的尊严升入空中，展示了人类的聪明才智和进步能力。[SCOPE.sCharacter('howard_hughes').GetFullName]已经后悔自己没有亲自驾驶了。受邀记者们对这座庞然大物从水中起飞感到惊讶——他们报道称第一批买家已经现身。"
 curtiss.506.f_test: "何等壮观的奇迹！不幸的是，只有寥寥几人得以见证。[ROOT.GetCountry.GetCapital.GetCityHubName]号的飞行本来可能成为吸引众多用户的促销活动。但只有性能最重要。虽然该机型需要时间才能在市场上站稳脚跟，但[SCOPE.sCharacter('howard_hughes').GetFullName]因其始终正确而受到赞誉。[ROOT.GetCountry.GetNameNoFlag]正式成为有史以来建造最大飞机的国家——这项纪录许多年内都不会有人打破。"
 curtiss.506.g: "令人惊讶——但是好的一面！"
 curtiss.507.t: "像块石头"
 curtiss.507.d: "最糟糕的担忧已经得到证实。[ROOT.GetCountry.GetCapital.GetCityHubName]号的适航性就一块石头。如果有一个弹射器，至少还能将其发射到空中。"
 curtiss.507.f_hughes: "[ROOT.GetCountry.GetCapital.GetCityHubName]号隆隆作响，引擎轰鸣。[SCOPE.sCharacter('howard_hughes').GetLastName]脸上的紧张表情逐渐加重。75英里，85英里，95英里——然而这座巨兽却未能起飞。巨大的庞然物仍然紧贴着地面。经过几分钟的观察，第一声讥讽的评论从一位记者口中传出。紧接着，那些事先得知此事的批评家们纷纷发表意见。政界人士对此提出指责，大企业的代表们也开始质疑之前的协议。这位飞机业巨头试图最后一次将他的创造物带上天空，但一切都徒劳无功。这是他职业生涯中最为不幸的一天。最终，[SCOPE.sCharacter('howard_hughes').GetLastName]终止了尝试。当被问及这次失败对他的公司意味着什么时，他简单地回答道自己不再是[ROOT.GetCountry.GetAdjectiveNoFormatting]航空公司的主席。\n一天后，[SCOPE.sCharacter('howard_hughes').GetLastName]辞去了所有职务，并永远离开了[ROOT.GetCountry.GetNameNoFlag]。"
 curtiss.507.f_pilot: "有些日子你想要忘记——或者怀着让明天变得更加难忘的愿望，以此让他人抹去记忆。就在[ROOT.GetCountry.GetCapital.GetCityHubName]号未能翱翔腾空的失望仍在心头时，[SCOPE.sCharacter('howard_hughes').GetFullName]以一篇广受赞誉的声明宣布辞职。不仅仅是放弃航空公司的职位，他还将辞去所有身份。股市动荡，股票价格一落千丈，订单纷纷被取消，雄心壮志早已荡然无存。而[ROOT.GetCountry.GetCapital.GetCityHubName]号的巨额开支使得公司岌岌可危，正在经历着有史以来最为严峻的危机。与此同时，[SCOPE.sCharacter('howard_hughes').GetLastName]宣告他将永远离开[ROOT.GetCountry.GetNameNoFlag]。他的去向成谜，他搭乘私人飞机消失在天际。"
 curtiss.507.f_test: "在幕后进行[ROOT.GetCountry.GetCapital.GetCityHubName]号的测试是一个明智的决定。幸运的是，一场可能引起轩然大波的可怕事故并未发生。然而，每一次成功的消息也同样如此。尽管经过多次尝试，[ROOT.GetCountry.GetCapital.GetCityHubName]依然无法翱翔于蓝天，这是由于设计上的缺陷所致。对于[SCOPE.sCharacter('howard_hughes').GetLastName]来说，这是一次个人的失败。他并未在公众面前丢尽颜面。然而，几个月后，人们将会怀疑那个[ROOT.GetCountry.GetCapital.GetCityHubName]号计划的命运，从而得出自己的结论。真相将永远无法完全浮出水面，政府也将竭力避免纳税人的资金浪费成为利于反对派的丑闻。这对于[SCOPE.sCharacter('howard_hughes').GetLastName]来说是一种帮助，他并不真正渴望如此。他突然变得异常沉默，仿佛一位即将退休的老人。"
 curtiss.507.g: "这或许是有史以来对纳税人钱财的第二大浪费。"
 curtiss.508.t: "一场噩梦"
 curtiss.508.d: "[SCOPE.sCharacter('howard_hughes').GetFullName]成了新的伊卡洛斯。他的创作点燃了世界。这场毁灭性的飞机失事造成数十人死亡，留下一片废墟。多个设计错误累积起来酿成了一场灾难。"
 curtiss.508.f_hughes: "就在[SCOPE.sCharacter('howard_hughes').GetLastName]启动引擎的那一刻，他的内心犹豫不决。直觉告诉他，有些事情不对劲。然而，计划是正确的，计算也是正确的，不可能出现差错。事实上，[ROOT.GetCountry.GetCapital.GetCityHubName]号的表现比预期要好得多。[SCOPE.sCharacter('howard_hughes').GetLastName]相信他已经踏上了胜利的道路。这正是他所期望的。他驱散了所有的怀疑。他将巨型飞机与苍穹结合在一起，唯有他察觉到小数点后面的微小变化，而记者和商界代表们则在幕后欢庆和欢呼。然而，他的直觉并没有欺骗他。剩下的机组成员需要更多时间，才能从欢呼声转变为恐惧的尖叫声。接下来，一切变成了噪音和火焰。[ROOT.GetCountry.GetCapital.GetCityHubName]号撞向屋顶，粉碎墙壁，将一排排房屋浸泡在燃油中，然后像一位倒塌的巨人一般，摧毁了整个燃烧的社区。[ROOT.GetCountry.GetCapital.GetCityHubName]号成为了[SCOPE.sCharacter('howard_hughes').GetLastName]的地狱。他夺走了无辜路人的生命，无论是无意中与他们相遇，还是他最亲密的信任者，都被卷入了死亡的阴影。在废墟和尸体之外，[SCOPE.sCharacter('howard_hughes').GetLastName]留下了一家破产的公司，以及一个将在多年内无法复苏的航空工业。[ROOT.GetCountry.GetNameNoFlag]或许永远无法完全从那一天的灾难中恢复过来。"
 curtiss.508.f_pilot: "[SCOPE.sCharacter('howard_hughes').GetLastName]幸存于那个注定灾难的日子，因为他并未亲自操控飞机。然而，有时候，死亡胜过生存。当有人问及他是否为未能如计划那样成为飞行员而庆幸时，他的回答是否定的。因为[SCOPE.sCharacter('howard_hughes').GetLastName]不仅肩负着历史上最为惨痛的航空灾难的责任，这也是[ROOT.GetCountry.GetNameNoFlag]历史上最为重大的灾难之一。他的肩头承担着数十条生命的丧失以及毁灭性的破坏。随着[ROOT.GetCountry.GetCapital.GetCityHubName]号的毁灭，不仅是他毕生的心血被彻底摧毁，一切都被夷为平地。在那个巨型飞机失去控制、如同一颗坠落的彗星，撞向一个社区的瞬间，他的公司遭受了难以承受的损失。他的梦想化为泡影，他的公司陷入破产的深渊，他的名誉也化为乌有。[SCOPE.sCharacter('howard_hughes').GetLastName]曾希望在失败之后流亡他乡，但如今，许多人要求的已不仅仅是他的流放，而是他的脑袋。随着[SCOPE.sCharacter('howard_hughes').GetLastName]的离世，航空史上的一页也被翻过；那是[ROOT.GetCountry.GetNameNoFlag]曾经璀璨辉煌的一页。"
 curtiss.508.f_test: "控制失灵。没有其他方法可以描述[ROOT.GetCountry.GetCapital.GetCityHubName]号第一次飞行的情况。令少数观众惊讶的是，飞机其实已经从地面起飞，只是稍后就失去了控制。试飞员在试图操纵空中巨人远离一排房屋时丧生。即使这一努力也没有完全成功，并导致一些建筑物严重受损。多人受伤，试飞员死亡。[ROOT.GetCountry.GetCapital.GetCityHubName]号被无可挽回地摧毁。此次事件也使得秘密测试再也无法保密。公众知晓了 [SCOPE.sCharacter('howard_hughes').GetLastName]的失败。这位大亨已宣布退休并离开我国，留下就是一家陷入困境、濒临破产的公司。但情况可能还会更糟。考虑到损失，这算不上什么安慰，但至少一个疯狂的亿万富翁的古怪追求目前无法获得更多的敬意。"
 curtiss.508.g: "航空业从未经历过如此黑暗的一天。"
 curtiss.510.t: "[ROOT.GetCountry.GetNameNoFormatting]号"
 curtiss.510.d: "在航空公司和必要工厂的扩建之后，巨型飞艇的建造工作已经开始。国家将尽自己的一份力量。"
 curtiss.510.f: "“你只需要渴望它，相信它，然后它就会成功。”——费迪南德·冯·齐柏林伯爵"
 curtiss.510.g: "科技史上的里程碑！"
 curtiss.511.t: "[ROOT.GetCountry.GetNameNoFormatting]号的处女航"
 curtiss.511.d: "历时两年的建造已经完成：[ROOT.GetCountry.GetNameNoFormatting]号优雅地升入天空，准备进行首次飞行。门票已经售罄几个月了。现在只需做出这次首航是国内航班还是国际航班的最终决定。"
 curtiss.511.f: "1900年，斐迪南·冯·齐柏林的LZ1在德国实现了第一次成功的刚性飞艇飞行。1910年至1914年期间，德国飞艇航空公司（DELAG）通过飞艇运送了数千名乘客。1917年，德国的LZ 104（L 59）成为首艘实现洲际飞行的飞艇，从保加利亚的詹博尔飞往喀土穆，并成功完成了往返的连续航程，总计6800公里（4200英里；3700海里）。在战争期间及战后，英国和美国建造了飞艇，法国和意大利则尝试研究没收的德国飞艇。1924年10月，齐柏林飞艇制造公司将LZ 126作为战争赔款交付给美国海军。公司主席雨果·艾克纳博士亲自指挥交付飞行，并将飞艇编入美国海军，命名为USS洛杉矶号（ZR‑3）。1925年，凡尔赛条约限制得到盟国放宽，使得齐柏林飞艇制造公司主席雨果·艾克纳博士能够追寻自己的梦想，开发适用于洲际航空客运服务的飞艇。于是，齐柏林飞艇制造公司开始建造新一代飞艇中的第一艘——LZ 127齐柏林伯爵号。1928年9月18日，这艘飞艇完成了首次飞行。在其运行期间，齐柏林伯爵号飞越南大西洋的次数共计136次。"
 curtiss.511.g: "首航将在国内进行。"
 curtiss.511.h: "处女航将会前往海外。"
 curtiss.512.t: "[ROOT.GetCountry.GetNameNoFormatting]号之旅"
 curtiss.512.d: "我们飞艇舰队的旗舰结束航行归来。接下来选择哪个目的地？"
 curtiss.512.g: "飞艇应当主要在境内飞行。"
 curtiss.512.h: "飞艇应该飞往国外彰显我国的名誉。"
 curtiss.513.t: "[ROOT.GetCountry.GetNameNoFormatting]号灾难"
 curtiss.513.d: "在一次着陆尝试中，[ROOT.GetCountry.GetNameNoFormatting]号因不明原因起火并坠毁！数十人伤亡，堪称航空史上最严重的事故之一！"
 curtiss.513.f: "“飞艇如一片巨大的羽毛，庄严地朝着我们驶来，它仿佛一个奇迹——对自己在世界航空界的角色非常骄傲。我们看到飞艇充满了活力。指令被传达给机组人员，乘客们也许正站在舷窗钱俯视着眼前的场地，瞥见系泊桩。现在飞艇几乎是静止的；艇艏放下的绳索被场地上的几名工作人员牵住。空中又开始下雨了——雨稍稍减小了。飞艇的后部引擎只能勉强维持位置静止，足够防止它失去平衡——\n起火了！快躲开！快躲开！它在燃烧，它在坠毁！太可怕了！哦，我的天，快躲开！它燃烧成了一团火焰，它——它坠落在系泊桩上，所有人都认为这太恐怖了。这是世界上最严重的灾难之一！现在有烟和火焰，飞艇的骨架正在坠向地面，没撞到系泊桩，但离它也不远了。哦！所有的乘客在我周围尖叫；人类的命运在发出哀嚎！“——赫伯特·莫里森"
 curtiss.513.g: "对飞艇工业的沉重打击"
 curtiss.514.t: "氦气取代氢气"
 curtiss.514.d: "得益于我们的氦气储备，建造[ROOT.GetCountry.GetNameNoFormatting]号飞艇使完全不需要使用高度易燃的氢气。"
 curtiss.514.f: "充氦飞艇比充氢飞艇安全得多，这将使旅程变得更加安全。即使永远不能完全避免航空事故，发生灾难的可能性也会大大降低。"
 curtiss.514.g: "我以为那东西只能拿来变声。"
 curtiss.520.t: "齐柏林飞艇探险队领队"
 curtiss.520.d: "北极探险队还需要一个能力出众的飞行员。"
 curtiss.520.f: "一次飞艇探险最多可配备三名不同的飞行员。在某些情况下，王牌飞行员有更好的机会避免险情。然而，如果飞艇发生事故，飞行员有可能死亡。"
 curtiss.520.g: "[SCOPE.sCharacter('curtiss_expedition_leader_1').GetFullName]。"
 curtiss.520.h: "[SCOPE.sCharacter('curtiss_expedition_leader_2').GetFullName]。"
 curtiss.520.i: "[SCOPE.sCharacter('curtiss_expedition_leader_3').GetFullName]。"
 curtiss.521.t: "齐柏林飞艇探险任务"
 curtiss.521.d: "选择胜任的飞行员后，我们现在需要确定具体的研究目标。"
 curtiss.521.f: "一次成功的探险将增进我们国家的研究。我们可以提前决定在探险期间将特别关注哪些主题领域。地理增加了我们的军事知识，气象学增加了生产，生物学增加了社会研究。我们在旅途中进行的科学研究越多，奖金就越高。"
 curtiss.521.g: "地理学。"
 curtiss.521.h: "气象学"
 curtiss.521.i: "生物学"
 curtiss.522.t: "齐柏林飞艇探险活动开始！"
 curtiss.522.d: "今天，我们的飞艇离开了系泊杆，直飞极地。"
 curtiss.522.f: "“冒险只是糟糕的计划。” ——罗阿尔·阿蒙森"
 curtiss.522.g: "为了科学，前往寒冷的北方！"
 curtiss.523.t: "齐柏林飞艇探险队返回"
 curtiss.523.d: "我们的齐柏林飞艇北极探险队已成功返回，并带来了许多新的科学发现。"
 curtiss.523.f: "“以下是我认为最重要的因素：探险队的装备，预见每一个困难，并采取预防措施以迎接或避免。胜利等待着那些将一切安排的井然有序的人，人们称之为幸运。而对于那些没有及时采取必要预防措施的人，失败是必然的，这被称为倒霉。”——罗阿尔·阿蒙森"
 curtiss.523.g: "欢迎回家，最可爱的人们！"
 curtiss.524.t: "探险灾难"
 curtiss.524.d: "稻草压倒了骆驼：与齐柏林飞艇探险队的联系已经中断。我们预料到了最坏的情况。"
 curtiss.524.f: "不幸的是，北极的飞艇事故并不鲜见。在1928年，翁贝尔托·诺比莱指挥的“意大利号”飞艇在距离诺德奥斯特兰（斯瓦尔巴群岛东部）不到30公里的地方坠毁在浮冰上。船员中的16人中，十人被从毁坏的吊舱里抛出冰面上；剩下的六名机组人员被困在浮空艇体中，由于失去了吊舱而升上天空，这六人的命运从此成了未解之谜。冰面上的十人中，波梅拉因撞击而死亡；诺比莱的手臂、腿部、肋骨和头部受伤；塞乔尼的两条腿严重骨折；马尔姆格伦肩膀严重受伤，肾脏可能受伤；扎皮有几根肋骨骨折。事故发生后，包括苏联、挪威、瑞典、芬兰和意大利在内的多个国家发起了第一次极地空中和海上救援行动。"
 curtiss.524.g: "我们只能在期盼中等待。"
 curtiss.524.h: "我们必须不计一切代价发动其他国家搜索他们！"
 curtiss.525.t: "探险队员逝世"
 curtiss.525.d: "几天后我们确定：齐柏林飞艇探险任务完全失败，而且所有成员都去世了，包括飞行员 [SCOPE.sCharacter('curtiss_expedition_leader').GetFullName]。"
 curtiss.525.f: ""
 curtiss.525.g: "迷失并冻结在永恒的冰川中……"
 curtiss.526.t: "探险队领队还活着！"
 curtiss.526.d: "令所有人惊讶的是，齐柏林飞艇飞行员[SCOPE.sCharacter('curtiss_expedition_leader').GetFullName]能够从被摧毁的飞艇中脱身，还救出了一些幸存者。"
 curtiss.526.f: ""
 curtiss.526.g: "松了一口气！"
 curtiss.527.t: "北极航线"
 curtiss.527.d: "[SCOPE.sCharacter('curtiss_expedition_leader').GetFullName]指挥的我们齐柏林飞艇探险队第一个飞到了北极点。"
 curtiss.527.f: "“其他人没能成功：这是促使我走向北极事业的关键事实。我充满了雄心壮志的人。我渴望新事物。我已经建造了一种新型飞艇，但我对飞行员和空军的使用它的方式并不满意。我想想要亲自驾驶，因为我知道它的潜力远远超出了人们的想象。” ——翁贝尔托·诺比莱"
 curtiss.527.g: "我有块冰送给你。"
 curtiss.528.t: "与[ROOT.GetCountry.GetNameNoFormatting]号汇合"
 curtiss.528.d: "在北极，我们的探险队遭遇了计划已久的豪华齐柏林飞艇[ROOT.GetCountry.GetNameNoFormatting]号。双方船员之间进行了富有成效的交流。"
 curtiss.528.f: "1928年，德国政府同意使用正在建造中的LZ‑127飞艇开展两次研究之旅。计划已久的北极之旅最终在1931年7月24日至31日进行。除了机组人员外，飞艇上还搭载了15名探险队员。飞艇首先从腓特烈港经由柏林和列宁格勒飞往弗朗茨·约瑟夫地。在胡克岛的贝塔提恰亚与苏联破冰船马利金号会面，进行了邮件交换以筹措经费。在短暂盘旋弗朗茨·约瑟夫地上空后，埃克纳将飞艇引向尚未完全绘制地图的共青团员岛，并沿着北地群岛的西海岸前往切柳辛角。经过泰梅尔半岛的贝兰加山脉，回到了卡拉海和迪克森附近的新地岛北端。飞艇在飞越阿尔汉格尔斯克和列宁格勒，并再次停留柏林后，沿着双岛的东南海岸返回腓特烈港。LZ‑127总共飞行了约10，600公里。此次旅行展示了飞艇在北极作为交通和研究平台的出色适用性，获得了丰富的科学结果。"
 curtiss.528.g: "您好，美丽的女士。"
 curtiss.531.t_geo: "发现不冻航道"
 curtiss.531.t_meo: "极光"
 curtiss.531.t_bio: "北极熊"
 curtiss.531.d_geo: "在飞越此前未知的北极地区时，飞艇探险队的研究人员发现了一条新航道。"
 curtiss.531.d_meo: "飞艇探险队的研究人员经历了一些极光异常活跃的夜晚。"
 curtiss.531.d_bio: "研究人员在飞艇上观察了一群北极熊并研究了它们的行为数天。"
 curtiss.531.f_geo: "极地探险的早期主要问题之一是新航道的发现，例如开辟东北航道和西北航道。虽然这两条路线都因结冰而无利可图，但极地地图后来的探索中的作用不应被忽视。"
 curtiss.531.f_meo: "极光是太阳风引起磁层扰动的结果。主要扰动是由日冕洞和日冕物质抛射产生的太阳风速度的增强造成的。这些扰动改变了磁层等离子体中带电粒子的轨迹。极光呈现出绚丽光芒的动态图案，表现为覆盖整个天空的幕布、光线、螺旋或动态闪烁。"
 curtiss.531.f_bio: "康斯坦丁·约翰·菲普斯于1774年首次在他关于1773年北极探险的报告中将北极熊描述为一种独立的物种。它是现存最大的熊科物种，也是现存最大的陆地食肉动物。尽管它是棕熊的近亲，但它已经进化适应了更为狭窄的生态位，具有许多适应寒冷温度、在雪地、冰面和开放水域中移动以及捕食海豹（其主要食物）的身体特征。虽然大多数北极熊在陆地上出生，但它们大部分时间都在海冰上度过。"
 curtiss.531.g: "太棒了！"
 curtiss.531.h: "这种庄严的动物属于[concept_dubois_zoo]！"
 curtiss.532.t_geo: "新地图"
 curtiss.532.t_meo: "磁学研究"
 curtiss.532.t_bio: "独角鲸"
 curtiss.532.d_geo: "北极飞艇探险队的制图师正在绘制新的北极地图。他们请求稍作停留以便能够继续他们正在进行的研究。"
 curtiss.532.d_meo: "极地探险队的气象学家希望更近距离地观察某个地区的磁现象。"
 curtiss.532.d_bio: "极地飞艇上的海洋研究人员发现了独角鲸。他们计划花两天时间更仔细地研究这种动物的行为。"
 curtiss.532.f_geo: "与早些时候的航海相比，乘坐齐柏林飞艇飞越北极大部分地区有一个巨大的优势：飞艇不存在被困在冰中的风险。全新的空中视野还方便绘制该区域的地图。"
 curtiss.532.f_meo: "由于地球外核中的液态流体运动，地球的实际磁极在不断变动。这种运动导致磁极的位置不断移动，而其方向则以地球的自转轴为平均参考。大约每隔50万年左右，磁极会经历一次翻转，这一过程的时间跨度可以从1万年到5000万年不等。虽然我们无法直接定位地磁极的精确位置，但它对我们了解地球磁场的特性至关重要。与磁（倾角）极相比，地磁极更具实际意义，因为它提供了有关地球磁场的重要信息，例如极光的可观测位置。"
 curtiss.532.f_bio: "海独角鲸是一种适应北极环境的捕食者，主要分布在加拿大北极、格陵兰和俄罗斯的海域。它们是北极地区的顶级掠食者之一。在冬季，海独角鲸在厚密的浮冰下捕食底栖猎物，主要以比目鱼为食。而在夏季，海独角鲸主要以北极鳕鱼和格陵兰比目鱼为主要食物，同时也摄食其他鱼类，如北极鳕。雄性海独角鲸最引人注目的特征是它们独特而壮观的长牙，实际上这是一颗特殊的犬齿。一些中世纪的欧洲人曾认为海独角鲸的牙齿是传说中的独角兽的角。"
 curtiss.532.g: "我们应该多留一会儿"
 curtiss.532.h: "天气有变化的风险——继续飞行！"
 curtiss.533.t_geo: "北极考察"
 curtiss.533.t_meo: "气象站"
 curtiss.533.t_bio: "寻找化石"
 curtiss.533.d_geo: "飞艇任务的成员非常需要验证他们的理论并测量北极的部分地区。然而，这需要并非完全无风险的着陆。"
 curtiss.533.d_meo: "飞艇上的气象学家宣布希望在北极建立临时气象站进行地面实验。然而，这意味着齐柏林飞艇必须完成着陆。"
 curtiss.533.d_bio: "极地飞艇上的生物学家确信，史前动植物的化石可能埋藏在永冻冰层中，并说服飞行员让飞艇着陆。然而这是有风险的。"
 curtiss.533.f_geo: "在极地地区的降落虽然不常见，但也并非不可能。1931年，齐柏林伯爵号飞艇在北极海航行中展现了一项令人惊叹的壮举。她在漂浮的冰块之间巧妙地降落在水面上。这个并非毫无风险的操作进行得完美无缺。装有5万封信件的邮袋上盖着齐柏林特别邮戳，并交给了附近抛锚的苏联冰船。这项额外的业务带来了可观的利润。地理、气象和地理测量的结果令人印象深刻：“在106小时的北极飞行中，飞艇所完成的工作相当于普通破冰船需要两到三年才能完成的工作量”，列宁格勒北极研究所的科学领队、著名教授萨莫伊洛维奇如此赞叹道。"
 curtiss.533.f_meo: "在极地地区的降落虽然不常见，但也并非不可能。1931年，“格拉夫·齐柏林飞艇”在北极海航行中展现了一项令人惊叹的壮举。她在漂浮的冰块之间巧妙地降落在水面上。这个并非毫无风险的操作进行得完美无缺。装有5万封信件的邮袋上盖着齐柏林特别邮戳，并交给了附近抛锚的苏联冰船。这项额外的业务带来了可观的利润。地理、气象和地理测量的结果令人印象深刻：“在106小时的北极飞行中，飞艇所完成的工作相当于普通破冰船需要两到三年才能完成的工作量”，列宁格勒北极研究所的科学领队、著名教授萨莫伊洛维奇如此赞叹道。"
 curtiss.533.f_bio: "在极地地区的降落虽然不常见，但也并非不可能。1931年，“格拉夫·齐柏林飞艇”在北极海航行中展现了一项令人惊叹的壮举。她在漂浮的冰块之间巧妙地降落在水面上。这个并非毫无风险的操作进行得完美无缺。装有5万封信件的邮袋上盖着齐柏林特别邮戳，并交给了附近抛锚的苏联冰船。这项额外的业务带来了可观的利润。地理、气象和地理测量的结果令人印象深刻：“在106小时的北极飞行中，飞艇所完成的工作相当于普通破冰船需要两到三年才能完成的工作量”，列宁格勒北极研究所的科学领队、著名教授萨莫伊洛维奇如此赞叹道。"
 curtiss.533.g: "尝试着陆"
 curtiss.533.h: "这太冒险了"
 curtiss.534.t: "强风"
 curtiss.534.d: "突然兴起的极地风使穿越变得困难。"
 curtiss.534.f: "历史上没有证据表明施耐德杯的参赛国家进行过破坏行动。然而，机器的频繁故障引发了传言，有人认为这不是纯粹的机械问题。我们有50%的机会可以尝试严重挫败对手。然而如果行动失败，我们会被扣除相同数量的积分。我们应该破坏哪个国家？"
 curtiss.534.g: "这些风将让我们的飞艇与科学事业一帆风顺！"
 curtiss.534.h: "愚蠢至极！改变航线！"
 curtiss.534.i: "我们的高级飞艇将轻松应对这一挑战。"
 curtiss.535.t: "极地风暴"
 curtiss.535.d: "飞艇任务遭遇了危险的极地风暴。"
 curtiss.535.f: "历史上没有证据表明施耐德杯的参赛国家进行过破坏行动。然而，机器的频繁故障引发了传言，有人认为这不是纯粹的机械问题。我们有50%的机会可以尝试严重挫败对手。然而如果行动失败，我们会被扣除相同数量的积分。我们应该破坏哪个国家？"
 curtiss.535.g: "我们必须冒险通过"
 curtiss.535.h: "不惜一切代价，尽力让我们脱离危险！"
 curtiss.535.i: "[SCOPE.sCharacter('curtiss_expedition_leader').GetFullName]将会挽救局势。"
 curtiss.536.t: "天气晴朗"
 curtiss.536.d: "晴朗的天气和平稳的飞行让齐柏林飞艇的机组人员可以利用额外的时间。"
 curtiss.536.f: "“任何没有领略过极地国家的壮丽冰川、闪耀浮冰色彩交响，以及奇形怪状岛屿和丘陵地带的人，对我们地球上最美丽的事物一无所知。”——雨果·埃克纳"
 curtiss.536.g: "进行试验"
 curtiss.536.h: "维修飞船"
 curtiss.537.t: "螺旋桨结冰"
 curtiss.537.d: "寒冷的天气正在造成影响：螺旋桨结冰并有破裂的危险。"
 curtiss.537.f: "螺旋桨上的冰不仅意味着我们必须调整引擎来除冰。如果坚硬的冰脱落，还可能会损坏飞艇的气囊或仪器。飞艇已经在显著下降。一些人认为舍弃“不必要的压载物”以获取高度是更好的策略，这让研究人员感到不悦。"
 curtiss.537.g: "保持冷静，坚持下去"
 curtiss.537.h: "扔掉配重！"
 curtiss.538.t: "齐柏林飞艇锚地"
 curtiss.538.d: "极地探险队找到了休息、进行维护与实验的好地方。"
 curtiss.538.f: "早在1910年，德国的研究人员就进行了一次前往斯匹次卑尔根岛的探险，为使用飞艇进行研究航行做准备。在当时寻找合适的飞艇港口起到了重要作用。这次探险的成果之一是在斯匹次卑尔根建立了德国的第一个全年天气站。"
 curtiss.538.g: "一个休息的好地方"
 curtiss.538.h: "我们要建立一个永久科考站。"
 curtiss.539.t: "发动机故障！"
 curtiss.539.d: "齐柏林飞艇的一个发动机今天突然停止工作了！团队认为这个问题无法解决。"
 curtiss.539.f: "一台引擎的故障不一定会造成灾难；飞艇通常有多个引擎。然而，这种故障与其他事故的组合可能会产生严重后果。"
 curtiss.539.g: "命运多舛的旅程。"
 curtiss.540.t: "捕获北极熊"
 curtiss.540.d: "短暂着陆后，我们的齐柏林飞艇团队成功捕获了北极熊并将它关入笼子。我们会直接送他回家。"
 curtiss.540.f: "尽管其体型壮硕，相当耐心的齐柏林飞艇船员使用陷阱成功伏击了这只巨大的[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]并将其囚禁。为了不危及进一步的探险，这只熊将被一支小队单独带到斯瓦尔巴群岛的下一个港口，在那里，私营贸易商将有偿将它带到首都。"
 curtiss.541.t: "北极熊展开屠杀！"
 curtiss.541.d: "短暂着陆捕捉北极熊结果是一次自杀任务——我们的一些人在尝试中受了重伤，甚至有人丧命！"
 curtiss.541.f: "北极熊通常将人类视为猎物——这与大多数已知的熊科物种不同。攻击可能会毫无来由地发生，尽管这种情况很少见。这会导致最糟糕的后果：即使使用了枪支，[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]的自卫仍然相当激烈，并对研究人员造成了严重的伤害。一名不幸的助手被这只庞大的生物撕裂并拖走。他的尸体无法找到。"
 curtiss.541.g: "该死。"
 building_airport_throughput_add: "$building_airport$建筑[concept_throughput]"
 building_airport_throughput_add_desc: "对$building_airport$投入和产出的增益或惩罚"
 curtiss_scenic_flights_modifier: "观光航班"
 curtiss.140.t: "[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastNameNoFormatting]博士为我们的飞机制造了新的引擎"
 curtiss.140.d: "我们的[concept_tesla_aeronautical_engineer][ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]博士发明了新的飞机引擎。这将大大提高我们赢得施耐德杯的机会。"
 curtiss.140.f: "新引擎真是棒极了！我从没享受过这种突破天际的快感！我要为这个引擎请[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastNameNoFormatting]博士喝一杯！"
 curtiss.140.g: "科技奇迹！"
 curtiss_schneider_trophy_new_engine_tt: "新的引擎将#g 增大#!我们赢得施耐德杯的概率。"
