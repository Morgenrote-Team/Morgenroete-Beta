 curtiss_air_war_doctrin_tech: "空战理论"
 curtiss_air_war_doctrin_tech_desc: "“轰炸机总能突破防线！”这句话出自意大利将军朱利奥·杜黑之口，1932年斯坦利·鲍德温在英国议会上引用了它。这句话体现了杜黑关于现代空战的开创性观点。作为空袭战略的先驱，他对英国和美国的空战理论产生了深远影响。"
 curtiss_airlines_tech: "航空公司"
 curtiss_airlines_tech_desc: "DELAG（德意志航空运输股份公司）是全球首家从事客运与商业运营的航空公司。公司成立于1909年，自1910年6月起正式提供定期空中客运服务。其所运营的飞艇均由齐柏林公司制造。"
 curtiss.681.t: "戈登•贝内特杯"
 curtiss.681.d: "首届大型国际热气球赛事的筹备已进入高潮。来自全球的飞行家齐聚[ROOT.GetCountry.GetCapital.GetCityHubName]，准备在这场长途竞速中一决高下。这项赛事已被誉为传奇，并将在未来年复一年地延续下去。"
 curtiss.681.f: "“在过往的任何一次飞行中，我都不曾像这次飞往1907年戈登·贝内特杯时，收获如此之多的祝福——从启程之时，到飞行途中，人们的祝愿始终伴随左右。我也从未为任何一次飞行做过如此周密的准备。1906年9月巴黎赛事一结束，我便决心参与今年的竞逐。我由衷感谢德国航空协会推选我为代表，也感谢冯·赫瓦尔德男爵与希尔德布兰特上尉慷慨提供大型气球‘波美拉尼亚号’（POMMERN），正是他们的支持，成就了我今年的胜利。\n\n此次飞行让我深刻领略了北美的热气球文化与待客之诚。我唯一遗憾的是，这片大陆还不够广阔，未能让我充分施展航程，一举打破世界距离纪录。”——奥斯卡·埃尔布勒"
 curtiss.681.g: "太棒了！"
 notification_curtiss_gordon_bennett_cup_notification_name: "[GetPlayer.MakeScope.Var('curtiss_balloonist_var').GetCharacter.GetFullName]赢得戈登•贝内特杯"
 notification_curtiss_gordon_bennett_cup_notification_desc: "我们的气球飞行家赢得了传奇的戈登·贝内特杯，并获得了#G 25#![concept_academics_experience]。下一届赛事将在两年后于我国举行。"
 curtiss_gordon_bennett_cup_modifier: "戈登•贝内特杯"