 notification_curtiss_altitude_record_broken_notification_name: "[SCOPE.sCountry('curtiss_record_breaking_country').GetName]打破了我们的海拔纪录。"
 notification_curtiss_altitude_record_broken_notification_desc: "[SCOPE.sCountry('curtiss_record_breaking_country').GetName]的气球飞行家[SCOPE.sCountry('curtiss_record_breaking_country').MakeScope.GetVariable('curtiss_balloonist_var').GetCharacter.GetFullName]打破了我们的海拔世界纪录。现在新的纪录是[GetGlobalVariable('curtiss_balloon_altitude_record_global_var').GetValue|V0]米。"
 notification_curtiss_distance_record_broken_notification_name: "[SCOPE.sCountry('curtiss_record_breaking_country').GetName]打破了我们的飞行距离纪录。"
 notification_curtiss_distance_record_broken_notification_desc: "[SCOPE.sCountry('curtiss_record_breaking_country').GetName]的气球飞行家[SCOPE.sCountry('curtiss_record_breaking_country').MakeScope.GetVariable('curtiss_balloonist_var').GetCharacter.GetFullName]打破了我们的飞行距离世界纪录。现在新的纪录是[GetGlobalVariable('curtiss_balloon_distance_record_global_var').GetValue|V0]千米。"
 notification_curtiss_time_record_broken_notification_name: "[SCOPE.sCountry('curtiss_record_breaking_country').GetName]打破了我们的飞行时间纪录。"
 notification_curtiss_time_record_broken_notification_desc: "[SCOPE.sCountry('curtiss_record_breaking_country').GetName]的气球飞行家[SCOPE.sCountry('curtiss_record_breaking_country').MakeScope.GetVariable('curtiss_balloonist_var').GetCharacter.GetFullName]打破了我们的飞行时间世界纪录。现在新的纪录是[GetGlobalVariable('curtiss_balloon_time_record_global_var').GetValue|V0]小时。"
 pm_curtiss_modern_weather_station: "现代气象站"
 curtiss.40.d: "这位年轻的飞行员[SCOPE.sCharacter('curtiss_new_pilot_scope').GetFullName]完全是独自一人，靠自己的力量完成了纽约和巴黎之间的航线，成为了第一个不停歇穿越大西洋的人。虽然有些人称[SCOPE.sCharacter('curtiss_new_pilot_scope').GetHerHim]为“飞行傻瓜”，但[SCOPE.sCharacter('curtiss_new_pilot_scope').GetSheHe]却在民众中引发了一场热情的风暴，被誉为民族英雄。"
 curtiss.40.f: "经过一次惊心动魄的飞行，以前不为人知的飞行员[SCOPE.sCharacter('curtiss_new_pilot_scope').GetFullName]达成了飞行艺术中的辉煌成就。一群人听到[SCOPE.sCharacter('curtiss_new_pilot_scope').GetHerHis]的成功后，欣喜若狂地迎接[SCOPE.sCharacter('curtiss_new_pilot_scope').GetHerHim]。在33.5小时的飞行中，[SCOPE.sCharacter('curtiss_new_pilot_scope').GetLastName]面临许多挑战，其中包括在3000米的风暴云上和3米的波顶上滑行。飞机与结冰作斗争，在雾中盲飞了几个小时，[SCOPE.sCharacter('curtiss_new_pilot_scope').GetLastName]只能依靠脑海的地图来寻路（[SCOPE.sCharacter('curtiss_new_pilot_scope').GetSheHe]不精通星象导航，且拒绝使用无线电导航设备——因其又重又不可靠）。[SCOPE.sCharacter('curtiss_new_pilot_scope').GetLastName]很幸运，大西洋上空的风相互抵消，使[SCOPE.sCharacter('curtiss_new_pilot_scope').GetHerHim]的风向漂移为零，从而在海洋上进行了长时间的飞行。[SCOPE.sCharacter('curtiss_new_pilot_scope').GetHerHim]的成就将鼓励全球对商业航空和航空邮件投以更大的关注，这将彻底改变全球的航空业。"
 curtiss.42.t: "[SCOPE.sCharacter('curtiss_new_pilot_scope').GetLastName]的斗争"
 curtiss.42.d: "随着富有魅力的年轻飞行员[SCOPE.sCharacter('curtiss_new_pilot_scope').GetFullName]完成了跨大西洋飞行，我们的民众对航空的热情已在燃起。现在已经掀起谈论[SCOPE.sCharacter('curtiss_new_pilot_scope').GetLastName]的热潮。"
 curtiss.314.t: "王牌飞行员"
 curtiss.314.d: "由于无数的空战胜利，[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]现在被认为是无可争议的空战大师——[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetSheHe]是王牌飞行员！"
