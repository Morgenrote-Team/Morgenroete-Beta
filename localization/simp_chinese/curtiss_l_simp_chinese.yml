 je_curtiss_airline_company: "航空公司"
 je_curtiss_airline_company_reason: "一位富有魅力且雄心勃勃的特立独行者成立了一家航空公司，为航空业的发展带来了独特机遇。"
 je_curtiss_air_combat: "空中战斗"
 je_curtiss_air_combat_reason: "只要有一个单位拥有空中支援，就可以在前线行动中部署[concept_curtiss_pilot]。根据特质的不同，他们可以为部队提供额外的攻击力。在前线行动中，飞行员每月可获得10点经验值。在此期间，还可能发生其他事件，有些事件会带来危险后果。飞行员服役后，必须在前线驻扎至少六个月，才可以再次撤回，此外受伤的飞行员不会获得任何经验。"
