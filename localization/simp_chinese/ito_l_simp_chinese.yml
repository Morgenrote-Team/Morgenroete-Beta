l_simp_chinese:
 mr_botanical_expedition_no_current_expedtion_tt: "#default_text [GetPlayer.GetName]没有活跃的[concept_dubois_botanical_expedition]或当前正在#V 选择派遣地点#!。#!"
 je_ito_botanical_expedition: "植物学考察"
 je_ito_botanical_expedition_reason: "你的[concept_dubois_naturalist]目前正在进行一次[concept_dubois_botanical_expedition]以收集新的[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]。\n\n$mr_divider_for_je$\n这次探险每月将产出[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]，并有概率触发事件，从而获得额外的[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]或特殊植物。\n$mr_divider_for_je$\n当前探险产出：@dubois_specimen![GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0][Concept('concept_dubois_specimen','$concept_dubois_specimens$')]\n预计每月产出：@dubois_specimen![GetPlayer.MakeScope.Var('ito_estimated_specimen_on_botanical_expedition_var').GetValue|=+0][Concept('concept_dubois_specimen','$concept_dubois_specimens$')]"
 je_ito_botanical_expedition_goal_tt: "dubois_paleontological_expedition_progress_bar_monthly_progress_tt"
 ito_botanical_expedition_progress_bar: "探险进度"
 ito_botanical_expedition_progress_bar_desc: "探险进度：#v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#!（[JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/24）"
 ito_botanical_expedition_progress_bar_monthly_progress_tt: "每月进度"
 ito_naturalist_is_dead_tt: "#default_text 你没有[concept_dubois_naturalist]。"
 dubois.390.t: "植物学考察队归来"
 dubois.390.d: "由[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName]率领的[concept_dubois_botanical_expedition]已经归来。总共收集了@dubois_specimen![GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0][Concept('concept_dubois_specimen','$concept_dubois_specimens$')]"
 dubois.390.f: "“我在这里发现了一种迷人的植物，还没人认识呢！我要叫它[SCOPE.sCharacter('dubois_naturalist_scope').GetLastNameNoFormatting]！”"
 dubois.390.g: "欢迎回来！"
 ito_total_specimen_collected_on_expedition_tt: "本次[concept_dubois_botanical_expedition]共收集到@dubois_specimen![GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0][Concept('concept_dubois_specimen','$concept_dubois_specimens$')]。"
 ito_state_trait_medicinal_plant_aloe_vera: "芦荟"
