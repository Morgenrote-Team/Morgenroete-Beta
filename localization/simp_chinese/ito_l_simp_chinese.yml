 ito_state_trait_madagascar_forest: "马达加斯加雨林"
 je_ito_improve_forestry_project: "改进伐木营地"
 je_ito_improve_forestry_project_reason: "你的[concept_dubois_naturalist][ROOT.Var('ito_naturalist_var').GetCharacter.GetLastName]正专注于提升[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]地区[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName]的生产效率。\n$mr_divider_for_je$\n该项目每月都会取得进展。每当进度达到24时，当前建筑将获得一个新的修正。当本项目选定的所有建筑都获得修正效果后，项目即告结束。\n一旦[GetBuildingType('building_logging_camp').GetName]拥有所有修正，你还将获得 #p 500#!@dubois_specimen![Concept('concept_dubois_specimen','$concept_dubois_specimens$')]\n\n总计有3种修正效果。每项新修正都需要重新累积进度。\n$mr_divider_for_je$\n当前建筑：[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]地区的[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_ito_improve_forestry_project_modifier_1_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_ito_improve_forestry_project_modifier_2_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_ito_improve_forestry_project_modifier_3_type')]\n\n剩余建筑总数：[JournalEntry.MakeScope.Var('mr_number_of_remaining_list_entries_var').GetValue|V0]\n$concept_dubois_specimens$来自项目：[JournalEntry.MakeScope.ScriptValue('ito_specimens_from_forestry_project_value')|+0]@dubois_specimen!\n\n当前月度进度：#underline #tooltip:[GetRawTextTooltipTag('dubois_monthly_naturalist_improvement_progress_var_tt')] [GetPlayer.MakeScope.ScriptValue('ito_naturalist_improvement_project_progress_value')|+2]#!#!"
