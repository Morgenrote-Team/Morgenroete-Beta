l_simp_chinese:
 mr_botanical_expedition_no_current_expedtion_tt: "#default_text [GetPlayer.GetName]没有活跃的[concept_dubois_botanical_expedition]。#!"
 je_ito_botanical_expedition: "植物学考察"
 je_ito_botanical_expedition_reason: "你的[concept_dubois_naturalist]目前正在进行[concept_dubois_botanical_expedition]以收集[ROOT.Var('ito_botanical_expedition_target_var').GetFlagName|V]和新的[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]。\n\n$mr_divider_for_je$\n考察每月都会获得收集[ROOT.Var('ito_botanical_expedition_target_var').GetFlagName|V]的进度，每次考察最多获得十种[concept_ito_medicinal_plants]。\n\n考察每月将产出[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]，并有概率触发事件，从而获得额外的[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]或特殊植物。\n$mr_divider_for_je$\n当前探险产出：@dubois_specimen![GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0][Concept('concept_dubois_specimen','$concept_dubois_specimens$')]\n预计每月产出：@dubois_specimen![GetPlayer.MakeScope.Var('ito_estimated_specimen_on_botanical_expedition_var').GetValue|=+0][Concept('concept_dubois_specimen','$concept_dubois_specimens$')]"
 je_ito_botanical_expedition_goal_tt: "$ito_botanical_expedition_progress_bar$进度条已到达#V 12#!。"
 ito_botanical_expedition_progress_bar: "探险进度"
 ito_botanical_expedition_progress_bar_desc: "探险进度：#v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#!([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/12)"
 ito_botanical_expedition_progress_bar_monthly_progress_tt: "每月进度"
