 dubois_botany_sickness_modifier: "植物病"
 je_ito_specimen_collection: "标本收藏"
 je_ito_specimen_collection_reason: "[ROOT.GetCountry.GetCustom('je_ito_specimen_collection_active_type')]一位空闲的[concept_dubois_naturalist]会在本国内搜寻[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]。只要没有其他项目在进行，你将自动获得标本。\n$mr_divider_for_je$\n当前预计产量为@dubois_specimen![ROOT.Var('ito_estimated_specimen_on_specimen_collection_var').GetValue|+=0][Concept('concept_dubois_specimen','$concept_dubois_specimens$')]"
