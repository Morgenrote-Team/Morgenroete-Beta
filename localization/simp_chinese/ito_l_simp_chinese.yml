 ito_state_trait_medicinal_plant_pilocarpus_pennatifolius: "翼叶毛果芸香"
 ito_state_trait_medicinal_plant_strophanthus_gratus: "旋花羊角拗"
 ito_state_trait_medicinal_plant_strychnos_nuxvomica: "马钱子"
