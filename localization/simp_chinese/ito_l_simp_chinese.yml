 dubois.390.t: "植物学考察队归来"
 dubois.390.d: "由[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName]开展的[concept_dubois_botanical_expedition]已经结束。总共收集了[SCOPE.GetValue('medicinal_herbs_scope_value')|0+][ROOT.Var('ito_botanical_expedition_target_var').GetFlagName|V]和@dubois_specimen![GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*0+][Concept('concept_dubois_specimen','$concept_dubois_specimens$')]"
 dubois.390.f: "“我在这里发现了一种迷人的植物，还没人认识呢！我要叫它[SCOPE.sCharacter('dubois_naturalist_scope').GetLastNameNoFormatting]！”"
