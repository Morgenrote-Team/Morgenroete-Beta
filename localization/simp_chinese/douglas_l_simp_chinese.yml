 je_douglas_international_mountaineering_expedition_reason: "The success of a mountaineering expedition lead by the Alpine CLub is usually guaranteed. However, its duration depends largely on the number of board members participating. The club president, in the event of a successful ascent, is entitled to the first ascent and receives the most prestige, but all other executive committee members who participated are also rewarded."
