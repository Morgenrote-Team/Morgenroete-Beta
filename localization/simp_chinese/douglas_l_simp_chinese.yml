 je_douglas_mountaineering_expedition: "登山探险"
 je_douglas_mountaineering_expedition_reason: "我们的登山家[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]正带领团队首次攀登#V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!。这次的目标是完成某座山峰的首登。攀登速度很大程度上取决于登山家经验和角色特质。根据山峰难度不同，可能会遭遇更大危险。如果探险队未能在限定时间内达成目标，[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]将放弃冲顶。若探险因任何原因陷入可预见的最大危险，最坏的情况就会发生。"
