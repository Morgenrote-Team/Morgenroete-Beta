 je_douglas_mountaineering_expedition_reason: "登山家[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]正率队在[SCOPE.sState('douglas_location_scope').GetName]进行首登远征。攀登速度主要取决于其经验值与性格特质。根据山体难度可能触发更高风险。若超时未达目标，[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]将终止冲顶。若探险队陷入极端危险，最坏情况将发生。"
