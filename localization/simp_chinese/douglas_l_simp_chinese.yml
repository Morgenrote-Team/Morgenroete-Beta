 douglas.203.d: "登山俱乐部精心遴选了一系列需配备优秀登山装备方可挑战的高山。"
 douglas.204.t: "登山探险：四级山峰"
 douglas.204.d: "登山协会严格筛选出若干必须配备精良登山装备才能挑战的险峰。"
 douglas.205.t: "登山探险：五级山峰"
 douglas.205.d: "登山协会严格筛选出若干必须配备顶尖登山装备方可挑战的绝险之巅。"
