 douglas.103.t: "山地兵团"
 douglas.103.d: "凭借在高山征战与防御方面的丰富经历，[SCOPE.sCharacter('douglas_mountain_veteran').GetFullName]决定发挥所长，创建一支精锐的山地部队。"
 douglas.103.f: "山地猎兵（德）、阿尔皮尼步兵团（意）和阿尔卑斯山猎兵（法）均为各国历史上著名的山地战斗单位。其中，阿尔皮尼步兵团成立于1872年，是目前全球现存最古老的山地步兵部队，最初职责便是守卫意大利与法国和奥匈帝国之间的边境高岭。"
 douglas.103.g: "他们将把精神传承到未来。"
