 douglas.211.t: "顶峰"
 douglas.211.d: "艰苦的攀登过后，登山者的团队终于到达了山顶。[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]成为了地球上[ROOT.GetCountry.GetNameNoFormatting]第一位冲顶的人。现在我们应当细细品味这凯旋时刻了。"
 douglas.211.f: "“你们要问的第一个问题，也是我必须尝试回答的问题就是：“攀登珠穆朗玛峰有什么用？”，而我的回答只能是：“没有用”。登山没有任何取得收益的前景。\n\n哦，我们没准会获得一些人体在高海拔地区的行为学知识，而医学家或许会把这些观察结果用于航空领域。但除此之外，我们将一无所获。我们带不回一点金银、一颗宝石，或是哪怕一块煤炭与钢铁，也找不到一寸可供耕作的土地。登山是没有用的。\n\n所以，如果你不能理解人的内心深处有某种东西——生命本身向上的，永远向上的奋斗——在回应并渴望迎接这座山的挑战，你就不会明白我们为什么要去。我们从探险中得到的只是纯粹的快乐。\n\n而快乐归根结底是生命的终极。我们活着不是为了吃饭或赚钱。我们吃饭赚钱是为了能够享受生活。这才是生活的意义，生活的目的。” ——乔治·里·马洛里"
 douglas.211.g: "让我们享受黎明！"
 douglas.212.t: "登山中止"
 douglas.212.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]的登峰尝试暂未成功。由于环境与条件所限，我们的登山者不得不中止行动，返回基地。"
 douglas.212.f: "登山者放弃攀登可能有多种原因。有时，天气的变化就足以让人放弃；有时也可能是道路过于险峻。由于一天中的某些时间段和变化使登山变得困难或不可能，登山者往往需要花费太长时间并超出时间窗口。有时，你只是选择了一条错误的道路。"
 douglas.212.g: "令人失望。"
 douglas.213.t: "山难！"
 douglas.213.d: "在[SCOPE.sState('douglas_location_scope').GetName]登山时，[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]犯下了致命的错误，使探险以灾难告终——数人死亡，补给和装备随之坠落。举国震惊！"
 douglas.213.f: "“每天晚上，你明白吗，我都会看到马特洪峰上的战友们仰面滑下，他们伸出手臂，一个接一个，距离相等，几乎是秩序井然——先是向导克罗，然后是哈多、哈德逊，最后是道格拉斯。是的，我将永远看得见他们……” ——爱德华·温珀"
 douglas.213.g: "悲剧！"
