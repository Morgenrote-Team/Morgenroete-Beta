 douglas.101.t: "登山协会成立"
 douglas.101.d: "[SCOPE.sCharacter('douglas_president_scope').GetFullName]发出号召——群山响应。登山协会的成立，为所有志在攀登更高处的人们开启了一个新时代。"
 douglas.101.f: "[SCOPE.sCharacter('douglas_president_scope').GetPrimaryRoleTitle][SCOPE.sCharacter('douglas_president_scope').GetLastName]的探险生涯曾历经风暴与雪崩的洗礼——而今，[SCOPE.sCharacter('douglas_president_scope').GetSheHe]决意将[SCOPE.sCharacter('douglas_president_scope').GetHerHis]的精神传承下去。在[ROOT.GetCountry.GetCapital.GetCityHubName]，[SCOPE.sCharacter('douglas_president_scope').GetSheHe]并非孤身一人，而是与一位目光如炬、意志刚毅的登山新锐——[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]携手，共同创立了[GetPlayer.GetName]登山协会。[SCOPE.sCharacter('douglas_president_scope').GetFullName]在[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHim]身上看到的不仅是抱负，更是一位未来传奇的雏形。他们并肩立于征程的起点，这条道路不仅通往山巅，更通向荣光、勇毅——或许还将载入史册。俱乐部向所有心向群山者敞开大门。攀登，自此启程。"
 douglas.101.g: "山在召唤！"
 douglas.102.t: "阿尔卑斯俱乐部"
 douglas.102.d: "阿尔卑斯俱乐部于[TimeKeeper.GetCurrentDate.Format('y')]年在[ROOT.GetCountry.GetCapital.GetCityHubName]正式创立，被广泛认可为全球首个国际登山组织。该组织的成立标志着现代登山活动迈入了制度化发展的新阶段。"
 douglas.102.f: "#b 历史背景：#!\n早在1857年，一群英国绅士便在伦敦聚首，创立了世界上第一个专注于登山活动的俱乐部——阿尔卑斯俱乐部。在约翰·鲍尔与爱德华·肯尼迪等先驱者的引领下，该组织旨在推动对阿尔卑斯山脉的系统性探索，将身体挑战与地理及自然科学考察融为一体。\n\n俱乐部为登山知识的共享、远征计划的统筹以及登山者之间的联系提供了制度化的平台。其成员在后世所称的“阿尔卑斯黄金时代”中扮演了核心角色，完成多项首次登顶壮举，并详实记录每一次攀登历程。\n\n随后不久，《阿尔卑斯期刊》问世，成为登山文献的重要开端。阿尔卑斯俱乐部的诞生，不仅开创了有组织登山的历史，也为现代山地探险确立了影响深远的标准与规范。"
 douglas.102.g: "齐齐登顶！"
