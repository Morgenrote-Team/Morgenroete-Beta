 douglas.104.t: "心中山"
 douglas.104.d: "经历了五年的攀登与训练，[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]归来。"
 douglas.104.f: "高山不语，却最懂人心。这五年间，登我们的山家面对雪盲、崩岩、凛冽狂风，还有那深如刀割的沉默。而这些苦难，也铸就成长：知识融于筋骨，忍耐凝成气息。起初只是野心勃勃的一腔热血，如今已淬炼为沉稳娴熟的技术。[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U]学会了倾听石语，凭风知雨，闭目结绳，心静如水[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U]不再是当初那个莽撞的挑战者，而是真正的掌控者。"
 douglas.104.g: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U]不再试图战胜群山——而是学会与它们共舞。"
