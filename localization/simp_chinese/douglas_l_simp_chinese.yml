 douglas.217.t: "Footprints in the Snow"
 douglas.217.d: "'They were too large for any man and far too deep for any snow leopard,' [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] explained to the correspondent from The Penny Illustrated Paper. The article quickly spread across teashops and salons from London to Calcutta, stirring equal parts laughter and awe. A creature, tall as a bear and silent as a drifting flake, was said to roam the icy flanks of Kabru, Kamet and Everest. Even the Sherpa guides had no doubt — they called it the Metoh-Kangmi."
 douglas.217.f: "'I have seen many things on these mountains — icefalls, sudden storms, men who lost fingers and found God. But I swear by Her Majesty's boots, I saw something walk beyond our campfire. And it was watching us.'\n\nLetter from [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], published in [TimeKeeper.GetCurrentDate.Format('y')]"
 douglas.217.g: "People are interested in stories like this."
 douglas.217.h: "These reports damage the reputation of our mountaineer!"
