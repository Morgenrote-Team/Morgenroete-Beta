 douglas.210.t: "科学支持"
 douglas.210.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士已提出让[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]助手协助考察队研究山脉结构。"
 douglas.210.f: "这封信字迹工工整整，封条至今未破损。信中，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]教授临时任命了[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]最有前途的助手——一位安静、善于观察的年轻人，擅长矿物分类和坡度分析。教授希望得到详细的报告。助手带着测量杆、笔记本和好奇心来了。他对攀岩知之甚少，但对石头却了如指掌。"
 douglas.210.g: "欢迎！"
 douglas.214.t: "山区交响乐"
 douglas.214.d: "受到[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]近期成功的启发，[ROOT.Var('elgar_composer_var').GetCharacter.GetFullName]宣布[ROOT.Var('elgar_composer_var').GetCharacter.GetSheHe]想要创作一部关于人类与自然抗争的大型音乐作品。音乐界已一致认为这将是一部重要作品。"
 douglas.214.f: "《阿尔卑斯交响曲》，作品64，是作曲家理查德·施特劳斯的最后一首交响诗。这部作品基于作曲家的构想，即用音乐手段描绘在一天之内登上阿尔卑斯山顶并返回山谷的过程。创作这首曲子的灵感来源于施特劳斯童年的一段经历。1879年夏天，他在巴伐利亚阿尔卑斯山的海姆加滕迷路，并遭遇雷雨。第二天，他就在钢琴上演奏了这首曲子。他从这段记忆中发展出了这一概念。作曲家宣称，他的意图是让听众以一种直接感性的方式体验到声音画中的登山过程。许多音乐评论家认为，这部作品以令人印象深刻的方式实现了这一目标。"
 douglas.214.g: "希望作品里面不会有阿尔卑斯号角。"
 douglas.215.t: "从登顶到科学"
 douglas.215.d: "登山队的[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]被在高山所见所闻所打动，因此[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]开始了地质学的职业生涯。"
 douglas.215.f: "当积雪在[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]靴底嘎吱作响，朝阳从峰顶升起时，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]内心被岩层褶皱的沉默、火山遗留的斑驳伤痕的景象震撼，比任何山巅都更深地镌刻进[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]记忆。下山后众人欢庆之际，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]却埋头于书籍与地图之间。这次探险竖起的不仅是旗帜，它唤醒了一个灵魂。"
 douglas.215.g: " 鼓励[ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]学习！"
 douglas.221.t: "轻松攀登"
 douglas.221.d: "登山队在征服#V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!的尝试中进展顺利。目前没有值得注意的事件发生。"
 douglas.221.f: "“在人生的巅峰时期，能够体验到自己最渴望的人是幸运的。在这个动荡剧变的时代，当今日的价值成为明日的幻梦时，一种主张在机会尚存时活出充实人生的哲学便显得尤为可贵。鲜有什么财富比体验一种本身完全令人满足的生活方式更具持久价值。毕竟，唯有这些经历是任何命运、任何宇宙灾难都无法剥夺的；只要在永恒中我们曾真正活过一刻，这一事实便永不改变。”——埃里克·希普顿"
 douglas.221.g: "前进！"
 douglas.222.t: "斜坡"
 douglas.222.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]发现了山脉上的一个小小斜坡，但对于登山者而言似乎不是大问题。"
 douglas.222.f: "登山队爬得越高挑战就越大。斜坡可能是一个初始的障碍，但对于装备适当的探险队来说应该不成问题。"
 douglas.222.g: "登山队能搞定。"
 douglas.222.h: "这太冒险了"
 douglas.223.t: "陡壁"
 douglas.223.d: "悬崖是登山者攀登高峰的一大障碍，但[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]有信心完成这项任务。"
 douglas.223.f: "从海拔2000米的山峰开始，登山队就会遇到悬崖峭壁。对于低山来说，悬崖是登顶前的最后一个障碍，但高山中很多情况下，它更像是一个热身项目。从这里开始，普通的登山远足就与真正的登山不同了。"
 douglas.224.t: "雪崩！"
 douglas.224.d: "#V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!的高处发生了危险的雪崩，威胁到登山活动。由于碎石已经影响到了登山的直接路线，寻找替代路线可能会更安全，但也会耗费宝贵的时间。一些登山者建议等待，但山路有可能变得更加堵塞。"
 douglas.224.f: "雪崩发生在积雪覆盖的高地，自古以来不仅威胁登山者，也影响着山区的居民。危险的雪崩已经导致许多人丧生。现在是辨别良莠的时刻了。"
 douglas.224.g: "无法动摇登山者的意志。"
 douglas.224.h: "寻找替代路线。"
 douglas.225.t: "深渊"
 douglas.225.d: "当[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]到达最后一个岩层时，前方出现了危险的峡谷。这个似乎无法逾越的障碍给登山者带来了挑战。"
 douglas.225.f: "“登山是一门以最谨慎的态度面对最严重的危险的艺术。这里的‘艺术’是指在行动中获取知识。你不能永远停留在山顶而必须再次下山。那么重点是什么呢？那就是：上知下，下不知上。人在攀登时能看见。下山的时候却看不见，但你已经见过了。攀登时注意沿途的所有困难。下山时你看不到它们，但如果你仔细观察，就会知道它们就在那里。” ——勒内·道马尔"
 douglas.226.t: "死亡阶梯"
 douglas.226.d: "即将登顶时，[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]面临着最后的终极挑战：面前几乎垂直耸立的悬崖将决定成败。登山者们已经在传言这是一个死亡陷阱，或者叫做死亡台阶。"
 douglas.226.f: "“稳步前进一小时后，我们到达了山脊上目视可见的最大难题。我们意识到，在这样的海拔高度，它很可能就是成功与失败的分水岭。岩石本身很光滑，几乎没有固定点，这对于英格兰湖区的一群攀岩高手来说可能是一个周日下午的有趣难题，但在这里却是我们的薄弱力量无法逾越的障碍。在西面陡峭的岩崖上，我看不到任何转身的可能，但幸运的是，还有另一种方法可以解决这个问题。它的东侧是另一道巨大的凸起，在凸起和岩石之间有一条狭窄的裂缝，一直延伸到整整四十英尺的台阶上。我让丹增尽力帮我系好安全绳，自己钻进了裂缝，然后用登山杖向后一踢，将登山杖的钉子深深地插入身后的冰雪中，把自己从地面上撬了起来。我利用岩石上的每一个小缺口，使出膝盖、肩膀和双臂的所有力量，沿着裂缝向后蹬去，并虔诚地祈祷凸起能一直固定在岩石上。” ——埃德蒙·希拉里"
 douglas.226.i: "已经没有希望了……"
 douglas.227.t: "天气变化"
 douglas.227.d: "[SCOPE.sState('douglas_location_scope').GetName]山区的天气给登山者带来了生命危险。如果肯冒相当大的风险，在更高的海拔上可能找到遮蔽。登山者也可以返回大本营的安全庇护所，但这将使得过去几天甚至几周的进展付之东流。"
 douglas.227.f: "山区的天气变化例如降雨和暴风雪，可能是登山旅行中最具威胁性的事件之一。特别是在海拔最高的地方，突如其来的大雪可能意味着登顶尝试不得不中止，因为不可预知的因素可能导致悲剧发生。"
 douglas.227.g: "无法动摇登山者的意志。"
 douglas.227.h: "回到最近的营地！"
 douglas.228.t: "落石！"
 douglas.228.d: "营地突然发生山体滑坡！多名登山者受伤，重要装备也已丢失！"
 douglas.228.f: "起初是一声尖锐的爆裂——紧接着便是轰鸣。营地上方的山坡像一头沉睡的野兽般崩塌。岩石、尘土与巨石以骇人的声势倾泻而下。一名挑夫被飞石击中，绳索断裂，一箱补给品摔得粉碎。那些侥幸脱险的人此刻正沉默地凝视着这片狼藉。无人说出口，但所有人都明白：这本可能以悲剧收场。这条路线看似安全——但高山从来不是人类的朋友。"
 douglas.228.g: "确保营地安全并救助伤员。"
 douglas.229.t: "眩晕高度"
 douglas.229.d: "随着峰顶越来越近，稀薄的空气和裸露的山脊线开始对登山者造成影响。"
 douglas.229.f: "正午时分天色依然昏暗，空气稀薄得如同刀锋。每迈出一步都像在搬动巨石，呼吸变得短促而浅薄，凛冽的寒风仿佛要将灵魂直接从肺里抽离。有人凝视深渊太久，双膝开始颤抖；还有人产生幻觉——冰层里的低语，雪地中的魅影。这座山在此处毫无慈悲，唯有高度、狂风与寂静。在这样的海拔，连勇气都会渐渐冻结。"
 douglas.229.g: "继续前进"
 douglas.229.h: "也许是时候休息一下了……"
 douglas.230.t: "读石"
 douglas.230.d: "我们的地质助手已对地形进行了详细分析，并在潜在风险地形识别出来。"
 douglas.230.f: "当其他人解开绳索检查靴子时，地质学家正仔细研究那块岩石。一层又一层，一粒又一粒，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士的助手记录下裂缝、颜色的微妙变化以及沉积岩层的倾角。\n\n“这个斜坡不稳定，”他低声说道，指着那条看似安全的路径，事实证明他是对的。一支小型侦察队证实了先前山体滑坡的迹象。多亏了他细致入微的观察，路线及时改变——或许因此挽救了许多生命。山峦或许浩瀚无垠，但那些仔细观察的人总能读懂它的规律。"
 douglas.230.g: "相信科学"
 douglas.231.t: "山地科学"
 douglas.231.d: "#V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!不同寻常的海拔为助理提供了全新的视野，他在山地旅行的途中完成了收集与撰写工作。"
 douglas.231.f: "在登山探险的早期阶段，科学家们经常研究该地区不同寻常的动植物。地质调查尤其引人关注，这不仅是出于通常的科学原因，而且往往也简化了未来的攀登过程。"
 douglas.231.g: "为了科学！"
 douglas.232.t: "优质矿物"
 douglas.232.d: "登山队开始抱怨地质学家的拖拖拉拉，登山队里的科学家更像是个累赘而非帮手；不过事实证明这人还是有用的，地理助理在登山时发现了一种稀有材料。"
 douglas.232.f: "众人已等候那位学者一个小时。此前他在斜坡某处驻足，突然取出勘探工具。队员们起初摇头不解，最终决定统筹安排，提前用餐以节省时间。然而[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士既无进食之意，亦无归队之念。当领队威胁要抛下这位地质学家继续行程时，[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]突然重返队伍——手中紧握的璀璨矿石，令所有同僚为之震撼。"
 douglas.232.g: "这是个小小的惊喜。"
 douglas.233.t: "迷路的动物"
 douglas.233.d: "在喜马拉雅山下，我们的博物学家[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]取得了奇怪地发现：一只离群的动物正饥寒交迫地游荡。"
 douglas.233.f: "对于[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]教授来说，在这片荒芜的土地发现这样一种据说生活在尼泊尔竹林中的娇小动物实在是太奇怪了。他见过书本上的插图，也知道有当地人在附近的树林里居住；但单独一只动物怎么会跨越如此之远的距离，出现在没有食物的地方？这仍然是个谜团。或许小熊猫也染上了登山的癖好，或是在躲避天敌？尽管如此，博物学家还是照顾着这只精疲力竭的动物，让它恢复健康。[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U]不喜欢这样的场面：他害怕登山活动被这种动物学情感所威胁。双方商定，由研究助理将小熊猫带到大本营，并准备将其送往我国动物园。"
 douglas.233.g: "这就是传说中的43号动物吗？"
