 douglas.209.d: "在攀登#V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!之初，[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]就意识到装备几乎超出了这座山的实际需求。"
 douglas.209.f: "如果登山探险的装备等级高于山脉等级，这会降低登山探险的初始风险并提供进度奖励。"
 douglas.209.g: "山顶见！"
 douglas.216.t: "失去动力"
 douglas.216.d: "我们的登山队今天收到消息，另一个国家率先征服了#V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!。队伍内部开始出现分歧，有些人正在折返，而[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]更是公开表达了放弃攀登的想法。"
 douglas.216.f: "如果另一个国家率先登顶某座山峰，那么后续的登山尝试几乎会放弃。"
 douglas.216.g: "这次探险已经失去了意义。"
 douglas_mountaineer_speech_tt: "登山探险将在#YELLOW 60天后#!超时。"
 douglas.208.t: "攀登前的言辞"
 douglas.208.d: "在向#V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!发起最后冲刺前，[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]向团队发表讲话。"
 douglas.208.f: "“我们头顶是那冰冷、寂静的峰顶。它不在乎勇气，也不向我们提问。但我们用每一步作答。那里没有战鼓，没有荣光。只有身后的风景，以及敢于挑战的自豪。我们来此不是为了遇见高山，而是为了征服它。你们每个人都有权感到恐惧。但今天，任何恐惧都无法阻挡我们。”"
 douglas.208.g: "与[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFirstName]一起，我们向山顶发起挑战！"
 douglas_alpine_club_new_board_tt: "高山俱乐部的新一届理事会已选举产生。"
 douglas.302.t: "高山俱乐部：新理事会"
 douglas.302.d: "高山俱乐部今日在[SCOPE.sState('douglas_alpine_club_state').GetStateRegion.GetCityHubName]召开的会议上任命了新理事会成员。"
 douglas.302.f: "高山俱乐部已确定以下人员构成：\n\n#V 主席：[GetGlobalVariable('douglas_alpine_club_president_global_var').GetCountry.GetName|V]#!\n\n#V 理事会成员：[GetGlobalVariable('douglas_alpine_club_board_member_1_global_var').GetCountry.GetName|V][GetGlobalVariable('douglas_alpine_club_board_member_2_global_var').GetCountry.GetName|V][GetGlobalVariable('douglas_alpine_club_board_member_3_global_var').GetCountry.GetName|V][GetGlobalVariable('douglas_alpine_club_board_member_4_global_var').GetCountry.GetName|V][GetGlobalVariable('douglas_alpine_club_board_member_5_global_var').GetCountry.GetName|V]"
 douglas.302.g: "我们祝贺新任理事会成员。"
 douglas.302.h: "没有涉及贿赂吗？"
 douglas_mountaineering_international_expedition_modifier: "近期国际登山探险"
 douglas_mountaineering_international_expedition_setback_modifier: "高山俱乐部遭遇挫折"
 douglas.311.t: "国际登山探险计划提案"
 douglas.311.d: "高山俱乐部的[SCOPE.sCountry('douglas_board_scope').GetName]请求组织一次国际登山探险活动。该国将支付佣金。然而，俱乐部主席可以否决此提议。"
 douglas.311.f: "“先生们，山脉不在乎旗帜或疆界。它们凌驾于国家之上，对我们的敌意无动于衷。正因如此，今天我站在这里提出一个超越政治、超越血缘的愿景。让我们集结来自欧洲、美洲乃至遥远亚洲最优秀的登山者，不以葡萄牙人、法兰西人或撒克逊人的身份——而是以挑战者的共同体直面这座高山。这不仅是意志与绳索的胜利，更是外交、信任与荣耀的胜利。让合作而非征服成为我们留给后世的遗产。”"
 douglas.311.g: "好提议。"
 douglas.311.h: "不行！"
 douglas.312.t: "否决"
 douglas.312.d: "高山俱乐部的主席国[SCOPE.sCountry('douglas_president_scope').GetName]，宣布否决一项国际登山探险活动。"
 douglas.312.f: "“和法国人？瑞士人？一起爬山？我宁愿穿着拖鞋跟熊摔跤。你试过跟英国人统一对茶的看法吗，更别提帐篷了？免了吧。上次我们邀请外国队伍，他们带了四桶烈酒却忘了地图。再说了，先生们，山又不会长腿跑掉——我也一样。要赢得荣耀，就该让我们的靴子踏进雪地，而不是在冰川上搞什么联合国野餐。我们要么体面地攀登，要么干脆别爬！”"
 douglas.312.g: "究竟是谁选出了这位领导人？"
 douglas.321.t: "选择顶峰"
 douglas.321.d: "随着国际探险获得批准，俱乐部现在正讨论终极问题：哪座山峰将成为荣耀的战场？"
 douglas.321.f: "高山俱乐部可以决定攀登位于任何设有登山协会国家的山峰，无需许可证。但该山峰必须属于2级、3级或4级难度。"
 douglas.321.g: "这座山应该不会太难爬。"
 douglas.321.h: "让我们选一座常见的山脉。"
 douglas.321.i: "这座山应该是个挑战！"
 douglas.331.t: "高山俱乐部探险队"
 douglas.331.d: "高山俱乐部宣布了一个大胆的目标：由该俱乐部顶尖成员组成的国际登山队将征服一座山峰——目标是#V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!"
 douglas.331.f: "高山俱乐部执行委员会的所有成员均可参加由高山俱乐部组织的国际登山探险活动。这要求一名现役登山家加入探险队。国际探险几乎必定成功，但极少举行。俱乐部主席在成功登顶的情况下有权获得首登资格并赢得最高声望，但所有其他参与的执委会成员也将获得奖励。"
 douglas.331.g: "让顶峰见证共同的旗帜。"
 douglas.341.t: "国家的崛起"
 douglas.341.d: "旗帜已升起，补给已打包。国际探险队准备攀登无人涉足之地。"
 douglas.341.f: "营地一片寂静，来自世界各地的口音与清晨凛冽的空气交织在一起。有人默默系紧靴带，还有人交换着最后紧张的玩笑。在营地边缘，[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]静静伫立，凝视着云雾缭绕的山巅。\n\n“据说从来没人登顶过，”法国人点燃香烟低声说道。\n\n“那现在是时候了，”英国女人轻声回答，嘴角挂着平静的微笑。"
 douglas.341.g: "让世界一起攀登。"
 douglas.351.t: "胜利登顶"
 douglas.351.d: "历经数周的艰难跋涉，[GetGlobalVariable('douglas_alpine_club_president_global_var').GetCountry.GetName|V]代表高山俱乐部宣布终于成功登顶。"
 douglas.351.f: "他们肩并肩站在稀薄的空气中，冰晶凝结在胡须和睫毛上，疲惫刻进每一道皱纹。当高山俱乐部主席展开探险队旗帜并牢牢插入雪中时，没有人后退半步。\n\n众人围拢过来。一台历经千辛万苦才运抵这不可思议高度的相机被架设妥当。在他们身后，云层突然散开，下方的山谷如同画卷般铺展。\n\n“别动，”摄影师说道，“这张照片将流传千古。”\n\n快门声响起。\n\n这张照片随后装点了世界各地的客厅、讲堂和报纸。画面中，主席手持旗帜昂然挺立，周围笑容灿烂的登山者们——将他们凝聚在一起的不是国籍，而是荣耀。"
 douglas.351.g: "为了科学，为了荣耀，为了人类。"
 douglas_add_international_expedition_effect_tt: "#default_text [GetPlayer.GetName]完成了一次高山俱乐部探险"
 je_douglas_international_mountaineering_expedition_preparation: "高山俱乐部探险准备"
 je_douglas_international_mountaineering_expedition_preparation_reason: "高山俱乐部的所有成员均可参加由高山俱乐部组织的国际登山探险活动。这要求一名活跃的登山家加入俱乐部探险队。国际探险几乎必定成功，但很少举行。若登顶成功，俱乐部主席有权获得首登资格并赢得最高声望，但所有参与活动的其他执成员也将获得奖励。\n\n要参加国际探险，你必须在登山家菜单的“俱乐部”选项下加入探险队。只要本日志条目尚未过期，即可进行此操作。"
 je_douglas_international_mountaineering_expedition: "高山俱乐部探险队"
 je_douglas_international_mountaineering_expedition_reason: "高山俱乐部领导的登山探险通常都能确保成功。然而，其持续时间很大程度上取决于参与成员人数。俱乐部主席在成功登顶的情况下有权获得首登资格并赢得最高荣誉，但所有其他参与的成员也将获得奖励。"
 douglas_international_mountain_expedition_progress_bar: "高山俱乐部探险队"
 douglas_international_mountain_expedition_progress_bar_desc: "探险进度：#v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#!([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/10)"
 douglas_international_mountain_expedition_progress_bar_at_full_tt: "登山探险进度条达到#variable 100%#!"
 douglas_mountain_expedition_progress_1_member_tt: "#default_text 至少一名俱乐部成员参与了此次探险。#!"
 douglas_mountain_expedition_progress_2_member_tt: "#default_text 两名俱乐部成员参与了此次探险。#!"
 douglas_mountain_expedition_progress_3_member_tt: "#default_text 三名俱乐部成员参与了此次探险。#!"
 douglas_mountain_expedition_progress_4_member_tt: "#default_text 四名俱乐部成员参与了此次探险。#!"
 douglas_mountain_expedition_progress_5_member_tt: "#default_text 五名俱乐部成员参与了此次探险。#!"
 ACHIEVEMENT_GROUP_douglas_achievement_group: "道格拉斯成就"
 ACHIEVEMENT_douglas_president: "国会山"
 ACHIEVEMENT_DESC_douglas_president: "成为高山俱乐部的主席。"
 ACHIEVEMENT_douglas_seven: "七大高峰"
 ACHIEVEMENT_DESC_douglas_seven: "攀登七大洲最高峰。"
 ACHIEVEMENT_douglas_everest: "马洛里的最终愿望"
 ACHIEVEMENT_DESC_douglas_everest: "在1953年前攀登珠穆朗玛峰。"
 je_douglas_mount_everest_expedition_preparation: "珠穆朗玛峰探险准备"
 je_douglas_mount_everest_expedition_preparation_reason: "征服世界最高峰不仅需要一位出色的登山者，还需要全面的准备。我们为攀登所做的准备越充分，基础风险就越低。"
 je_douglas_mount_everest_expedition: "珠穆朗玛峰探险"
 je_douglas_mount_everest_expedition_reason: "珠穆朗玛峰是群山之王，这里的进度完全取决于事件的结果。登山家能否成功取决于其能力。由于珠穆朗玛峰的风险非常高，探险队可以在出发前已寻求全面的科学建议，以防止小疏忽演变成灾难。"
 je_mount_everest_metereologist_tt: "#default_text [GetPlayer.GetName]有一位带有#V $curie_meteorologist$#![concept_character_trait]的[concept_curie_physicist]#!"
 je_mount_everest_mechanical_engineer_tt: "#default_text [GetPlayer.GetName]有一位带有#V $tesla_mechanical_engineer$#![concept_character_trait]的[concept_tesla_engineer]。#!"
 je_mount_everest_good_physician_tt: "#default_text [GetPlayer.GetName]有一位带有#V $panum_physician_experienced$#!或#V $panum_physician_famous$#![concept_character_trait]的[concept_panum_physician]#!"
 je_mount_everest_good_ethnologist_tt: "#default_text [GetPlayer.GetName]有一位带有#V $roy_ethnologist_famous$#!或#V $roy_ethnologist_experienced$#![concept_character_trait]的[concept_roy_ethnologist]#!"
 je_mount_everest_good_geologist_tt: "#default_text [GetPlayer.GetName]有一位带有#V $agassiz_geologist_famous$#!或#V $agassiz_geologist_experienced$#![concept_character_trait]的[concept_agassiz_geologist]#!"
 douglas.401.t: "圣山脚下"
 douglas.401.d: "探险队抵达喜马拉雅山脉，现在必须选择通往世界之巅的路线。"
 douglas.401.f: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]展开地图铺在岩石上。两条路线。两种选择。\n\n往北是穿越西藏的已知路线，外交许可、旧时勘测数据、以及前人探险队的坟墓。\n\n往南是尼泊尔。未知地形、神明震怒的传闻，但山坡或许更为平缓。\n\n他们无法同时攀登两条路线。\n\n这座山只允许一次尝试。"
 douglas.401.g: "沿着北面路线前进。"
 douglas.401.h: "沿着南面路线前进。"
 douglas.411.t: "禁谷"
 douglas.411.d: "经过数月的谈判，探险队进入尼泊尔境内，尝试从南坡攀登珠穆朗玛峰。"
 douglas.411.f: "数十年来，没有外国人敢越过大吉岭最后的哨所——“禁忌之谷”。但那天清晨，迷雾散去，[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]和队伍悄然翻越了最后一道山脊。\n\n蜿蜒穿过森林的河流已从所有地图上消失。这里没有道路，只有山羊踏出的小径和附近村庄。就连夏尔巴人也面露不安。夜晚的风中传来阿尔卑斯或安第斯山脉从未有过的声响——一种低沉的、呼吸般的寂静，仿佛从冰川本身倾泻而下。队员们很少交谈。驮畜开始躁动不安。医生报告的首例高原反应病例比预期早得多。然而没有人回头。因为在树丛之外，在迷雾之外，在山谷最后的拐弯处，矗立着从未有人从南坡征服的珠穆朗玛峰。\n\n它美得惊心动魄，却仿佛要将他们置于死地。"
 douglas.411.g: "这条路上没有道路。"
 douglas.412.t: "上方的冰塔"
 douglas.412.d: "探险队抵达昆布冰瀑脚下——一片由浮冰和巨大冰裂缝构成的迷宫。"
 douglas.412.f: "冰川在寂静中移动。它在他们脚下嘎吱作响、缓缓移位、发出叹息，仿佛拥有生命。[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]见过冰，但从未见过这样的冰。这不是阿尔卑斯的雪坡——它们是巨大的冰体，中空而倾斜，蓝得像冻结的肺，同样脆弱。\n\n到了中午，气温上升。左侧传来一声沉闷的断裂声，接着又是一声——一栋房子大小的冰块崩裂，像玻璃般坠落。夏尔巴人四散逃开。一名队员在冰裂缝附近失足，在最后一刻被拉了回来。地图毫无用处。绳索冻结、断裂。阳光融化了落脚点，速度比他们攀爬还快。\n\n他们才走了一半路程。\n\n他们可以继续前进，寄希望于冰川能撑住。或者撤退，在黎明前寒冷使冰层稳定时再尝试。\n\n但在这里浪费的每一小时，都意味着在八千米以上缺氧地带多待一小时。"
 douglas.412.g: "继续前进，我们来这里就是为了攀登。"
 douglas.412.h: "这是一个无法逾越的障碍。"
 douglas.413.t: "白色熔炉"
 douglas.413.d: "队伍进入了西冰斗——这是一个宽阔的冰川谷地，四周耸立着高耸的冰壁，阳光从各个方向反射下来。"
 douglas.413.f: "这原本应该是较轻松的一段路程，大家前往洛子峰冰壁前的短暂喘息，但没人警告过他们这里的高温。\n\n到了正午，西谷已变成一座熔炉。积雪在他们靴下化作雪泥。太阳镜要么起雾要么碎裂。两侧的冰壁将阳光向下反射，炫目刺眼，仿佛他们正行走在燃烧的玻璃上。[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]试图说话，却发现[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe]已经感受不到[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHis]舌头的存在。\n\n一名担夫倒下了，另一个开始呕吐。冻伤未愈又添晒伤。冰川在脚下发出呻吟，仿佛在抗议他们的重量，没有风，没有声响，没有荫蔽——只有眩光、高温，以及在这世界屋脊上被活活炙烤的窒息感。\n\n然而前方的冰壁仍在召唤。洛子峰南壁耸立着，泛着蓝光，陡峭如削。\n\n等待意味着消耗更多时间、食物和体力。\n\n前进则要与烈日对赌。"
 douglas.413.g: "前进，我们现在不能停下。"
 douglas.413.h: "停止这个疯狂行为！"
 douglas.414.t: "蓝墙"
 douglas.414.d: "为了抵达南坳，队伍必须在不断恶化的条件下攀登陡峭且暴露的洛子峰。"
 douglas.414.f: "这已不再是攀登——而是在对抗重力本身。脚下的冰层如大理石般坚硬，泛着钢铁般的蓝光。[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]用靴跟狠狠踢进冰面，冰镐奋力凿入，心中默祷它能撑住。每一步都耗费数分钟。每一次呼吸，都是场战斗。\n\n远处下方的西谷冰川闪烁着虚假的宁静。而上方的冰墙无限延伸。寒风再度袭来——不是暴风雪，而是干燥刺耳的嘶嘶声，将体温从骨髓中抽离。绳索结冰，手指僵硬，但容不得半点差错。一次失足就可能葬送三条性命。\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]身后传来咳嗽声。雪地上溅开血迹。某个夏尔巴人脚步踉跄。海拔太高，上升太快。但他们已无退路。\n\n冰墙不提供任何庇护。没有喘息。唯有向上。\n\n而上方那道山脊，看起来仍和两小时前一样遥不可及。"
 douglas.414.g: "攀登，我们已经走得太远，无法回头。"
 douglas.414.h: "快跑，你们这些傻瓜！"
 douglas.415.t: "最后的营地"
 douglas.415.d: "队伍抵达南坳，前方只剩最后一道山脊——以及最终的决定。"
 douglas.415.f: "那感觉就像在月球上扎营。空气凛冽刺骨，狂风毫无怜悯。帐篷在每次风袭下颤抖如受伤的动物。没有飞鸟，没有人声，连冰川的碎裂声都听不见。只有稀薄刺耳的呼吸声。南坳不是休憩之地——而是等待荣耀或死亡的场所。\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]蜷缩在帐篷的布料外壳里，颤抖的手紧盯着地图。通往顶峰的路线很明确：沿着东南山脊就能抵达世界之巅。\n\n但氧气即将耗尽。补给所剩无几。手指已经冻得发黑。有个人自日出后就再没开过口。\n\n剩下的燃料只够最后一次尝试。峰顶垂直距离不足1000米——但在死亡地带，这距离堪比千里之外。\n\n帐外，狂风如活物般咆哮，是时候做决定了。\n\n向上还是撤退？苟活还是拼搏？"
 douglas.415.g: "发起登顶行动。"
 douglas.415.h: "取消攀登计划，留待来年再战。"
 douglas.416.t: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]的步伐"
 douglas.416.d: "就在顶峰下方，一道意想不到的障碍挡住了最后的山脊——那是一面垂直的岩冰墙。"
 douglas.416.f: "太阳尚未升起，山脊线在黎明前的微光中泛着苍白，有那么一瞬间，[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]以为前路畅通。稀薄的空气让人无法交谈。寒风穿透手套和护目镜。\n\n但紧接着——一面陡峭的山壁，约十米，或许十二米。陡峭得无法步行，暴露得无法绕行。一块垂直的巨石如刀刃般横贯山脊——没有绳索，没有岩钉，没有路线，地图上未曾标注，任何记载都未提及，无人警告过他们。\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]仰望着岩壁。积雪已变得稀薄，这是花岗岩，漆黑且覆着霜冻。一名夏尔巴人尝试向左探路——也是悬崖峭壁，另一人尝试向右——只见天空。\n\n这座山最后的屏障，无路可绕，唯有翻越。\n\n后来，他们将用第一个发现者的名字为它命名。"
 douglas.416.g: "攀登[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]。"
 douglas.416.h: "太危险了，我们回头吧。"
 douglas.421.t: "禁忌之脸"
 douglas.421.d: "在获得当地政府许可后，探险队将从北坡出发，经由绒布河谷攀登珠穆朗玛峰。"
 douglas.421.f: "没有欢迎，只有褪色的经幡在风中翻飞。山顶的僧人如幽灵般凝视着他们，一动不动，一言不发。小径在冰川起始处戛然而止——而冰川延伸向永恒的寂静。\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]读过那些记载。马洛里、诺顿、芬奇……他们的地图残缺不全，笔记晦涩难解。但这座山正如他们所描述的那样矗立着：巍峨、灰暗、冷峻。\n\n牦牛队在绒布寺附近停下。从这里开始，他们将背负所有物资前行。\n\n有个挑夫低声说起住在山上的神灵尚未得到安抚。\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]没有要求翻译。"
 douglas.421.g: "北坡给予许可，但并非欢迎。"
 douglas.422.t: "冰川裂隙"
 douglas.422.d: "东绒布冰川显露其危险之处——崩塌的冰塔与隐蔽的冰裂缝威胁着驮队的行进。"
 douglas.422.f: "当第一声异响传来时，阳光几乎无法温暖谷底——那是冰层深处传来的空洞呻吟般的断裂声。接着又是一声，众人僵在原地。牦牛开始躁动不安。悬崖上的积雪如嘶嘶作响的帷幕缓缓滑落。\n\n远眺东绒布冰川看似静止，近观却是蓝色冰脊、裂隙地带与倾斜冰塔构成的迷宫。每一步都是试探，每个脚印都是赌注。\n\n他们试图绕行左侧，但冰层突然塌陷。一名背夫无声无息地消失了。另一人悬在绳索上惨叫，他的稿子在光滑冰面上徒然刮擦。人们把他拉上来时，他满身是血，双眼圆睁，漫长的寂静笼罩着队伍。\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]凝视前方。距离坡度平缓处还有三公里冰川，就可以强行突破，或是撤回等待低温时段，待冰层坚固再尝试。\n\n但天气正在转变。云层如擂鼓般翻涌，延误可能意味着暴风雪。"
 douglas.423.t: "冰墙"
 douglas.423.d: "要到达北坳，队伍必须攀爬一段陡峭且暴露在外的冰坡，那里狂风肆虐，阴影笼罩。"
 douglas.423.f: "路线陡然向上延伸。一道如钢铁般坚硬的冰川舌直插天际。北坳在他们上方若隐若现，但这里没有路径——只有斜坡，狂风，恐惧。\n\n他们爬得越高，风就越猛烈。那不是呼啸——而是尖啸。风从岩壁上剥落积雪，像碎玻璃般砸向他们脸庞。岩钉无法咬住岩壁，绳索冻得僵硬，太阳躲进云层，仿佛羞于见证这一切。\n\n有人滑坠了，他的惨叫转瞬即逝。他们勉强拽住了他——但绳索已经磨损。而上方的山脊看起来依旧遥不可及。\n\n几个夏尔巴人跪在雪地里，向看不见的神明低声祈祷，拒绝继续前进。\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]站在最后一段峭壁前。山脊线在上方闪烁，如同幻觉。他们可以强行攀登——或者下撤休整，等换上更结实的绳索、遇上更温暖的天气再尝试。\n\n但拖延可能遭遇暴风雪，或者更糟以导致信念的动摇。"
 douglas.424.t: "呼吸的边缘"
 douglas.424.d: "队伍在北坳上方建立了最后一个营地，暴露在狂风和上方峰顶的重压之下。"
 douglas.424.f: "没有庇护所。只有呼啸的风声，和肺部徒劳搜寻不存在空气的喘息。帐篷在每次狂风袭来时向内凹陷，仿佛整座山正试图吞噬他们。\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]爬进结着霜的睡袋。温度计已毫无意义——寒冷不再是数字，而是生存的状态。没有篝火，没有食欲，只有颤抖，以及面罩里持续不断的嘶嘶漏气声。\n\n有个夏尔巴人不再说话，他静坐着，睁着眼睛，一动不动。手指已呈现灰白色。另一个则不断喃喃念叨着家乡，尽管无人询问。\n\n此刻他们身处八千米以上的死亡地带，肌肉停止修复，身体开始自我消耗以维持生命，连呼吸都成了需要抉择的事。\n\n峰顶山脊就在前方，他们要么在明日抵达——要么永远不再提起它。"
 douglas.425.t: "第二步"
 douglas.425.d: "就在峰顶下方，队伍遇到了一处陡峭的岩石与冰壁——这是北脊路线上最大的障碍。"
 douglas.425.f: "它如巨人之墙般从山脊拔地而起。十米高，漆黑，垂直，覆满冰霜。毫无预兆的出现，地图上从未标注。\n\n道路在此终结。一侧是千米深渊，另一侧是仅容一靴之宽的窄崖。狂风撕扯着他们的冲锋衣，氧气面罩嘶嘶作响如同蒸汽。\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]仰头凝视。岩壁光秃无裂缝，唯有结霜的呼吸凝成的冰层。夏尔巴人拒绝前行。其余人眼神空洞地等待着，疲惫得说不出话。\n\n有人提议卸下背包尝试。另一人自告奋勇攀岩固定绳索。但绳索早已用尽。\n\n他们抵达了人类的折返点，或是消失点。"
 douglas.425.g: "尝试攀登第二台阶。"
 douglas.425.h: "一切都结束了……"
 douglas.431.t: "世界屋脊"
 douglas.431.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]登顶珠穆朗玛峰——成为首位站在世界之巅的人类。"
 douglas.431.f: "没有风，没有声音，只有[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHis]靴子踩在雪地上的嘎吱声，以及空洞寂静。\n\n最后几步如同梦境，肺部灼烧，视线模糊，身体颤抖——然后上方空无一物。\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]独自站在顶峰，阳光如火焰般照耀在雪地上。远处下方，云层如海洋般漂移。曾经看似雄伟的山峰如今像皱巴巴的羊皮纸般铺展。\n\n地球的弧度清晰可见，时间仿佛停止，冰雪与天空只留下了片刻的痕迹。"
 douglas.431.g: "第三极是我们的！"
 douglas.432.t: "山在等待"
 douglas.432.d: "面对损失、疲惫和绝望，探险队在抵达顶峰前被叫停。"
 douglas.432.f: "没有决定是轻易做出的。终结一切的并非暴风雪，也非冻伤或饥饿，而是死寂的沉默。那些不再抬起的眼睛。那些不再问“还有多远”、只问“为什么”的人们。\n\n地图被撕碎，绳索冻成冰棍。背夫们在黑暗中低声祷告。就连[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]也不再望向峰顶——只凝视着天空。\n\n他们掩埋了无法带走的物品，在垭口下方的石堆上留下一面旗帜。\n\n漫长的下撤途中无人言语，但这沉默里没有羞愧。"
 douglas.432.g: "珠峰上的失败并非挫败，只是暂时的延迟。"
 douglas.433.t: "他们从未倒下"
 douglas.433.d: "最后一次推挤之后，再也没有听到任何声音，山峰保持着沉默。"
 douglas.433.f: "最后的信号在黄昏时分传来。山脊上一闪而过的微光然后，归于虚无。\n\n数日来，人们搜遍了山麓两侧。夏尔巴人仔细搜寻着冰川，没有绳索，没有手套，唯有被风吹散的足迹。\n\n无人知晓他们抵达了多远，是否登顶，是否将世界尽收眼底。\n\n唯有一点确凿无疑——他们未曾归来。\n\n有人说他们坠落了，也有人说他们长眠于积雪之下。\n\n但少数人低语着另一种可能——群山接纳了他们。他们仍在那里，与冰雪岩石同在，静候后继之人。"
 douglas.433.g: "这次探险已无从考证。"
 douglas_third_pole_modifier: "第三极"
 douglas_mount_everest_physicist_button: "喜马拉雅山的天气预报"
 douglas_mount_everest_physicist_button_desc: "多变的天气条件往往是过去探险失败的原因。一位拥有气象学家特质的物理学家能够计算出适合探险的日期，那时登顶尝试将获得最佳视野。"
 douglas_mount_everest_engineer_button: "改善氧气供应"
 douglas_mount_everest_engineer_button_desc: "在高海拔极限登山中使用氧气瓶仍处于起步阶段，工程师可以从这项实验性技术中开发出更好的设备。"
 douglas_mount_everest_physician_button: "高原反应研究"
 douglas_mount_everest_physician_button_desc: "高原反应被认为是喜马拉雅山登山的危险副作用之一，经验丰富的医生可以进一步检查病情。"
 douglas_mount_everest_ethnologist_button: "当地夏尔巴人"
 douglas_mount_everest_ethnologist_button_desc: "通往喜马拉雅山峰最成功的路线，往往依赖于当地人的知识，他们最了解当地情况，民族学家可以招募一位技艺精湛的夏尔巴人作为探险伙伴。"
 douglas_mount_everest_geologist_button: "地质勘测"
 douglas_mount_everest_geologist_button_desc: "地质学家可以绘制山脉的剖面图，标出山上更有希望的路线，并提出更好的攀登方式。"
 douglas_mount_everest_risk_decrease_tt: "攀登珠穆朗玛峰的初始风险较低。"
 douglas.402.t: "预报"
 douglas.402.d: "[ROOT.Var('curie_physicist_var').GetCharacter.GetLastName]博士发布了喜马拉雅山脉的首个长期天气模型——就在[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]登山队出发前几天。"
 douglas.402.f: "数月来，这位物理学家一直默默工作，图表、气压数据、印度的风力记录，以及一个或许激进却又优雅的理论：中亚的强风遵循着季节性，而非混沌。\n\n此刻，袖口沾满粉笔灰、指尖皲裂的[ROOT.Var('curie_physicist_var').GetCharacter.GetLastName]博士站在登山委员会前，指向那份手绘的等压线图纸——它预示着喜马拉雅山脉沿线将出现持续十天的窗口期。\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]眯起[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHis]眼睛：“你确定？”\n\n物理学家扶了扶眼镜，“这已是最大程度的确定。”"
 douglas.402.g: "利用预报来安排攀登时间。"
 douglas.403.t: "死亡地带的空气"
 douglas.403.d: "[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]博士展示了一款专为高海拔生存设计的新型氧气装置。"
 douglas.403.f: "迄今为止，海拔8000米以上的氧气供应一直是一项实验，绑在那些几乎无法行走的人们背上。阀门漏气，管子冻僵，氧气罐对于喘不过气的肩膀来说太重了，而[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]改变了这一切。\n\n通过微调至微观公差级别的压力调节器、绝缘管道以及模块化背带系统，新设备的重量减轻了一半，气流稳定性却提高了一倍。现在气罐可以穿在外套内层，防止冻结，面罩像潜水员的第二层皮肤般紧密贴合面部。\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]用戴着手套的手举起设备，点了点头，“能在两万六千英尺以上用吗？”\n\n工程师笑了，“它的建造就是为了在其他任何东西都无法发挥作用的地方发挥作用。”"
 douglas.403.g: "为团队配备改进后的系统。"
 douglas.404.t: "无形的危险"
 douglas.404.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]博士向团队简要介绍了如何在攀登过程中识别和预防高原反应。"
 douglas.404.f: "冻伤是显而易见的。跌落是可以预防的。但这种情况——却截然不同。\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName]站在考察队面前，开始描述症状：头痛、呼吸困难、意识混乱。\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetSheHe]说道，“它开始时像醉酒，但结局如同溺水。”\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]沉默地听着，这是一份生存指南。"
 douglas.404.g: "严格按照医生的治疗方案执行。"
 douglas.405.t: "识山之人"
 douglas.405.d: "通过低调协商与文化洞察，[ROOT.Var('roy_ethnologist_var').GetCharacter.GetLastName]博士成功赢得了一位经验丰富夏尔巴人的支持，这位向导对珠峰坡道了如指掌。"
 douglas.405.f: "他不带地图。英语也说不了几句，然而当他手指之处，群山必有回应。\n\n[ROOT.Var('roy_ethnologist_var').GetCharacter.GetLastName]发现了他——不是在名单里，而是在隔了两道山谷的寂静村落中。\n\n这位民族学家说道，“他登顶的次数比我们任何人都多，而且不止一次活着回来。”\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]伸出手，夏尔巴人默默握住，没有仪式，毫不迟疑。\n\n[ROOT.Var('roy_ethnologist_var').GetCharacter.GetLastName]博士轻声说，“你们或许习得了登顶的技巧，但他聆听过群山的低语。”"
 douglas.405.g: "聘请经验丰富的夏尔巴人担任领队向导。"
 douglas.406.t: "山骨"
 douglas.406.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士勘察地形，通过地质构造发现了一条更安全的攀登路线。"
 douglas.406.f: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe|U]用手指抚过岩石上黑色的条纹，缓缓点头。\n\n“山脉并非静止，”地质学家说道，“只是移动得缓慢。”\n\n数小时里，[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士手持地质锤走在队伍前方，敲击、倾听、解读。这位科学家标记出一条能避开危险冰瀑的山脊，又发现另一条斜穿迎风坡碎石带的路线，节省了两天的攀登时间。\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]默默注视着。\n\n“你能预测哪里稳固吗？”\n\n[ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]博士耸了耸肩，“不能，但我能告诉你过去一千万年里哪里始终稳固。”\n\n有时候这就足够了。"
 douglas.406.g: "遵循地质学家的建议。"
 douglas.121.t: "在家锻造的勇气"
 douglas.121.d: "多年在[ROOT.GetCountry.GetAdjective]山区的训练，让曾经犹豫不决的人变得冷静下来。[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]带着更稳健的步伐和更勇敢的心回归。"
 douglas.121.f: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]说道，“我曾以为恐惧是需要克服的东西，但实际上，它需要你承受，但不能被它控制。”\n\n数月来，[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe]独自沉默地攀登着家乡的山脊与冰川——常常重复同一条路线，只为觉察那些曾被忽视的细节。\n\n山峰并未增高，但[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe]成长了。落石、严寒与白茫天空成了熟悉的对手。尽管这些攀登都没有成为头条新闻，但每一次都留下了印记——不是名声，而是勇气。"
 douglas.121.g: "让高处降临。"
 douglas.122.t: "脚步永不停歇"
 douglas.122.d: "当别人转身离去时，[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]依然坚持前行。连失败都化为动力——每一条小径，都是一课。"
 douglas.122.f: "顶峰从来都不是终点。至少不完全是。\n\n在某道山脊上，暴风雪在[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]抵达最后一段岩壁前就已逼近。另一处山脊，夜间发生的雪崩抹去了攀登路线。有时补给耗尽，向导们放弃努力。但[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe]留了下来。从头再来。调整策略。\n\n高山不会向固执低头，但它会认可坚持。\n\n数月间，[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]用各种方式攀登熟悉的山峰——尝试新路线，测试装备，测绘隐蔽岩架。在旁人眼中徒劳的重复，却是比荣耀更难获得的耐力。"
 douglas.122.g: "没有走过的路会完全相同。"
 douglas.123.t: "已知地图之外"
 douglas.123.d: "好奇心驱使[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]踏上了别人不敢尝试的路线。在那片未知的空白地带，[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe]找到了目标——以及一条属于自己的道路。"
 douglas.123.f: "旧地图描绘的不仅是疆界，更是认知的边界。多数登山者止步于此。[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]却不然。\n\n当旁人循着既定路线攀登时，[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe]独自走向无人测绘的崩塌山脊、没有名字的幽谷、那些远离城镇令游客与追名逐利者却步的绝壁。\n\n某次这样的旅途中，[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe]在被人遗忘的冰川旁扎营，记录下暗示远古剧变的岩层，并绘制了当地人口耳相传却无人敢涉足的峡谷地图。这并非首次登顶的荣耀，却是首次真正读懂这片土地。"
 douglas.123.g: "发现无人预料之事，其乐无穷。"
 douglas.124.t: "钢铁与石头"
 douglas.124.d: "当[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]遇见[SCOPE.sCharacter('douglas_general_scope').GetLastName]将军时，经验与本能激烈碰撞——最终双方都发生了蜕变。"
 douglas.124.f: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U]的站姿透着习惯在炮火轰鸣中发号施令的气势，制服上还沾着雪。[SCOPE.sCharacter('mountain_general').GetFullName]将军曾在崇山峻岭中作战，带领士兵穿越冰封与寂静，在他眼中山脉不是障碍，而是战场。\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]本是来向[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHim]求教的。但不出几日，双方都清楚这场交流是相互的。\n\n“我们谋划战役。你们谋划生存，”将军低声说道，此时[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe]正仔细检查着岩钉和等高线地图。\n\n对方回答，“你们调动士兵，而我独来独往。但大山对我们的评判标准并无二致。”"
 douglas.124.g: "山以不同的语言教导众生。"
 douglas_mount_everest_highest_mountain_flag: "珠穆朗玛峰（喜马拉雅山脉）"
 douglas_kangchenjunga_highest_mountain_flag: "干城章嘉峰（喜马拉雅山脉）"
 douglas_dhalaugiri_highest_mountain_flag: "道拉吉里峰（喜马拉雅山脉）"
 douglas_chimborazo_highest_mountain_flag: "钦博拉索山（厄瓜多尔）"
 douglas.217.t: "雪中足迹"
 douglas.217.d: "“那些脚印对人类来说太大，对雪豹来说又太深，”[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]向《便士画报》的记者解释道。这篇报道迅速从伦敦到加尔各答的茶馆和沙龙间流传开来，激起人们既感好笑又觉敬畏。据说有一种生物，像熊一样高大，像飘落的雪花一样寂静，出没于卡布鲁峰、卡美特山和珠穆朗玛峰的冰封山脊间。就连夏尔巴向导也深信不疑——他们称之为“人熊雪人（Metoh‑Kangmi）”。"
 douglas.217.f: "\"我在这些山脉上目睹过许多景象——冰瀑、突袭的暴风雪、丢了手指却寻得信仰的人。但以女王陛下的皮靴起誓，我确实看见有东西从营火外围走过。它在注视着我们。\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]的信件，发表于[TimeKeeper.GetCurrentDate.Format('y')]"
 douglas.217.g: "人们对这样的故事很感兴趣。"
 douglas.217.h: "这些报告损害了我们登山家的声望！"
