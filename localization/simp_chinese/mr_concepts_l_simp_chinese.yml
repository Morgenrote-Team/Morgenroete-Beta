l_simp_chinese:
 ag_morgenroete_name: "[concept_morgenroete]"
 ag_morgenroete_tooltip: "我们拥有至少一项可行的[concept_morgenroete]特色行动。"
 concept_morgenroete: "#r 赤色晨曦#!"
 concept_morgenroete_mr: "赤色晨曦"
 concept_morgenroete_concept: "概念"
 concept_pm_academics_university_humanities: "#b #BLUE 人文科学重心#!#!"
 concept_pm_academics_university_natural_history: "#b #GREEN 自然历史重心#!#!"
 concept_pm_academics_university_mathematics: "#b #ORANGE 数学与技术重心#!#!"
 concept_academics_university_specialization: "大学重心"
 concept_academics_academic: "学者"
 concept_academics_academics: "学者"
 concept_academics_scientist: "学者"
 concept_academics_scientists: "学者"
 concept_academics_academic_desc: "In [concept_morgenroete] #b Academics#! are special characters that allow you to use certain mechanics of the mod. You can get #b Academics#! in some events or by aquiring enough [concept_academics_progress].\nCurrently these #b Academics#! exist:\n - [concept_tesla_engineer]\n - [concept_mendelejew_chemist]\n - [concept_verrier_astronomer]\n - [concept_agassiz_geologist]\n - [concept_dubois_paleontologist]\n - [concept_dubois_naturalist]\n - [concept_theiler_biologist]\n - [concept_panum_physician]\n - [concept_lepsius_archaeologist]\n - [concept_lepsius_anthropologist]"
 concept_academics_progress: "学术发展点"
 concept_academics_progress_desc: "每360#b 学术发展点#!，你就可以获得一位新[concept_academics_academic]，只有拥有#b 学术界#!科技和一所大学的国家才可以获得#b 学术发展点#!\n#b 学术发展点#!的获取受很多因素影响。例如，[concept_literacy]越高，获取速度越快。知识分子的人口比例（高于2%）也会影响获取速度。更好的学校以及高支持度的知识分子利益集团也有助于#b 学术发展点#!的获取。特殊的科技重心和[concept_dubois_zoo]、[concept_verrier_observatory]等特殊建筑也会提供额外#b 学术发展点#!。"
 concept_academics_scientific_society: "科学学会"
 concept_academics_scientific_societies: "科学学会"
 concept_academics_scientific_society_desc: "#b 科学学会#!是一个由一个国家科学家和学者组成的协会，允许你访问拜访或者招揽[Concept('concept_academics_academic','$concept_academics_academics$')]。\n\n#b 科学学会#!可能会让你进行[Concept('concept_academics_academic_mission','$concept_academics_missions$')]任务，这些任务会给你带来一些奖励。"
 concept_academics_experience: "经验"
 concept_academics_experience_desc: "在[concept_morgenroete]中学者积累#b 经验#!，角色在创建时就会获得#b 经验#!，通常每30岁就会获得10#b 经验#!，如60岁时#b 经验#!为20。\n此外，他们还能在工作中也可以获得#b 经验#!，例如找到新的[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]。每年也会被动获得#b 经验#!。\n当角色累计获得100#b 经验#!时，角色会获得#b 经验丰富#!特质；累计获得300#b 经验#!时，角色会获得#b 著名#!特质\n角色的#b 经验#!越高，其工作效率就越高。例如有特质的[concept_dubois_paleontologist]会发现更多的[Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]，并且更擅长构建[concept_dubois_dinosaur_skeleton]"
 concept_academics_academic_mission: "学术使命"
 concept_academics_academic_missions: "学术使命"
 concept_academics_mission: "使命"
 concept_academics_missions: "使命"
 concept_academics_academic_mission_desc: "你的[concept_academics_scientific_society]有时会要求你达到某个目标。这些目标可能是找到一定数量的[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]、[Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]或类似的东西。其他#b 使命#!可能需要你找到X号行星或获得一个[Concept('concept_lepsius_exhibition','$concept_lepsius_excellent_exhibition$')]\n如果你的#b 使命#!未完成，#b 科学界#!会很不高兴，但完成任务会给你带来有用的奖励。"
 concept_curtiss_aviation: "航空业"
 concept_curtiss_aviation_desc: "#b 航空#!是[concept_morgenroete]的主要特色之一。19世纪至20世纪，人类的飞行技术兴起，首当其冲是各式#b 气球#!和#b 飞艇#!，然后是#b 飞机#!。飞行慢慢变成一项声誉卓著的活动，它使人们能够探索新的天地。\n\n在游戏开局，许多国家会开始赞助[Concept('concept_curtiss_balloonist_role','$concept_curtiss_balloonist_role_only_balloonist$')]开始飞行之旅，而从打破其中一项纪录为国添光，甚至可以带来技术提升和声望加成。\n\n研究科技【齐柏林飞艇】后，你能招揽一名[concept_curtiss_pilot]前往北极并进行[concept_curtiss_arctic_expedition]。\n进一步研究航空科技树将使你能够使用多种新机制，例如可以建造能提供#b 航班#!（相当于#b 服务#!）的[concept_curtiss_airport]；#b 机场#!将有助于[concept_curtiss_airline]壮大，并允许各国进行签订[concept_curtiss_airspace_convention]的外交行动，#b 《航空公约》#!让你可以进入各国和[Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')]以及北极。如果你的#b 航空公司#!发展得足够大，你就可以建造一艘巨大的飞艇或世界上最大的飞机。\n\n在游戏时间来到20世纪初：可以参加一项水上飞机比赛——[concept_curtiss_schneider_trophy]比赛，不同的国家都会参加。如果获胜，将获得声望，并主办下一届比赛。如果成功赢得比赛3 次，你将永久保留#b 施耐德杯#!"
 concept_curtiss_balloonist_role: "气球飞行家"
 concept_curtiss_balloonist_role_only_balloonist: "气球飞行家"
 concept_curtiss_balloonists_role: "气球飞行家"
 concept_curtiss_balloonist_role_desc: "#b 气球飞行家#!是一个可以由国家赞助的特殊职业。通常，西方或发达国家会赞助#b 气球飞行家#!，并争夺纪录和新发现。#b 气球飞行家#!将随机进行飞行，并获得最远距离、最长飞行时间或最高飞行的纪录。每次气球飞行，#b 气球飞行家#!都会获得经验，从而提高创造新纪录的机会。但要注意的是，#b 气球飞行家#!是个高危职业，许多#b 气球飞行家#!都会早早死去，尤其是生病、酗酒或吸毒的#b 气球飞行家#!。"
 concept_curtiss_arctic_expedition: "极地探险"
 concept_curtiss_arctic_expeditions: "极地探险"
 concept_curtiss_arctic_expedition_desc: "如果你研究了#b 齐柏林飞艇#!科技，拥有一个带有#b 气象站#!的[concept_verrier_observatory]、一个[concept_curtiss_pilot]和一个靠近北极的省份，你就可以进行一次#b 极地探险#!。这些省份是：#b 格陵兰岛#!、#b 挪威北部#!、#b 阿拉斯加#!、#b 努纳武特地区#!和#b 涅涅茨地区#!。您可以通过自己拥有该省份或与该省份拥有者签订[concept_curtiss_airspace_convention]来获得进入该省份的权利。\n在#b 极地探险#!中，您可以进行考察旅行，建立极地站，获得北极地理、气象和生物方面的新知识，并成为第一个乘坐飞艇穿越极地的国家！"
 concept_curtiss_pilot: "飞行员"
 concept_curtiss_pilots: "飞行员"
 concept_curtiss_pilot_desc: " 飞行员是具有 #b 飞行员特质#!的角色。在研究#b 早期航空学#!后，#b 飞行员#!会有极低的几率出现。此外在战争中，有几率通过事件出现#b 飞行员#!。在研究更好的科技后，以及建立飞行员学校，都能让角色有更大获得拥有#b 飞行员#!特质。\n#b 飞行员#!会以不同的方式帮助你。在争夺[concept_curtiss_schneider_trophy]中，经验丰富的#b 飞行员#!有更大概率获胜；#b 飞行员#!是进行[concept_curtiss_arctic_expedition]的必要条件。如果部署在前线，#b 飞行员#!还可以通过事件升级为王牌飞行员。"
 concept_curtiss_airport: "机场"
 concept_curtiss_airports: "机场"
 concept_curtiss_airport_desc: "机场是由#b 现代航空#!科技解锁的建筑。它是一座纯民用建筑，提供[GetGoods('air_travel').GetName]和#b 服务#!，但也消耗各种物品，包括[GetGoods('tools').GetName]、[GetGoods('paper').GetName]、[GetGoods('aeroplanes').GetName]以及[GetGoods('oil').GetName]。之后还需要[GetGoods('electricity').GetName]、[GetGoods('telephones').GetName]和[GetGoods('radios').GetName]\n如果拥有足够多的机场，则会成立[concept_curtiss_airline]，随着#b 机场#!扩张，[concept_curtiss_airline]也会扩大"
 concept_curtiss_airline: "航空公司"
 concept_curtiss_airlines: "航空公司"
 concept_curtiss_airline_desc: "#b 航空公司#!是一家公司或政府管理的机构，在游戏时提供[GetGoods('air_travel').GetName]从本地到国际航班的服务。#b 航空公司#!还提供其他各种奖励。#b 航空公司#!需要[Concept('concept_curtiss_airport','$concept_curtiss_airports$')]来操控这些航班。如果#b 机场#!发展壮大，#b 航空公司#!也会随之发展壮大。\n如果#b 航空公司#!是由政府经营的，则将有机会建造一艘巨大的飞艇，让它飞越遥远的距离。如果你#b 航空公司#!是公有或私有的，你可能会有机会建造有史以来最大的飞机。"
 concept_curtiss_airspace_convention: "《航空公约》"
 concept_curtiss_airspace_conventions: "《航空公约》"
 concept_curtiss_airspace_convention_desc: "#b 《航空公约》#!是一项重要的[concept_diplomatic_pact]，可以与远离你的势力范围的地区进行互动。如果你与另一个拥有[concept_lepsius_excavation_site]的国家签订#b 《航空公约》#!，你就可以在该地区进行[concept_lepsius_expedition]，而无需拥有[concept_active_interest]。\n如果你不拥有所需的省份之一，#b 《航空公约》#!将允许你派遣一次[concept_curtiss_arctic_expedition]。"
 concept_curtiss_schneider_trophy: "施耐德杯"
 concept_curtiss_schneider_trophy_desc: "第一次世界大战前不久，法国人雅克·施耐德举办施耐德杯，主要目的是促进水上飞机的发展。随着时间的推移，这个奖杯的争夺变成了一场国家间的竞赛，尤其是英国、美国和意大利，为了赢得这个梦寐以求的奖杯，国家会给予了团队巨大的支持。事实上，技术的发展也使#b 施耐德杯#!的比赛受益匪浅，比赛中使用的水上飞机速度越来越快，性能越来越先进。\n如果有五个国家发明#b 水上飞机#!科技，并且在其中一个省份拥有港口和10级城镇中心，就可以设立#b 施耐德杯#!。\n该奖杯的获胜者由多种因素决定。例如，拥有飞行员学校和大型[concept_curtiss_airline]的国家会更有优势。优秀的[concept_curtiss_pilot]和大量的资金也有助于赢得奖杯。\n如果上届奖杯的获胜者拥有一个港口或（像瑞士一样的）众多湖泊，那么他们就能举办下一届比赛。如果连续三次获得奖杯，获胜国家将永久保留奖杯，并因此获得威望奖励。"
 concept_curtiss_balloonist: "气球飞行家"
 concept_curtiss_balloonist_desc: "该角色是一个经常驾驶气球冒险的飞行家。"
 concept_curtiss_experienced_balloonist: "经验丰富的气球飞行家"
 concept_curtiss_experienced_balloonist_desc: "该角色是一个经验丰富的气球飞行家，经常驾驶气球（具有这种特质的角色更有可能创造更好的纪录）。"
 concept_curtiss_famous_balloonist: "著名的气球飞行家"
 concept_curtiss_famous_balloonist_desc: "该角色是一个著名的气球飞行家，经常驾驶气球进行冒险活动（具有这种特质的角色更有可能创造更好的纪录）。"
 concept_dubois_natural_history: "自然历史"
 concept_dubois_natural_history_desc: "#b 自然历史#!是[concept_morgenroete]的主要特色之一。19世纪伴有许多伟大的自然发现、探险，如小猎犬号环球航行，进化论的出现，成千上万新物种的发现，当然，最重要的是恐龙的发现。\n\n拥有海军将领和海军的国家可以派遣一艘船进行[concept_dubois_pacific_expedition]。在#b 太平洋探险#!中，可以找到稀有的植物、动物和化石，进行海洋学研究或观察日食等天文现象。\n\n在此期间，如果找到的大型[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]，可以来建造一个[concept_dubois_zoo]，并展出这些动物。动物越多，#b 动物园#!的效果就越大。除了在探险中寻找#b 动物#!之外，也可以在自己的领土上收集或者让其他国家把它们卖给你。\n\n较小的动物、植物和其他生物会被制成[concept_dubois_specimen]。[concept_dubois_naturalist]可以收集这些#b 标本#!。#GREEN #b 博物学家#!#!可以被派遣到具有雨林特质的地区进行[Concept('concept_dubois_botanical_expedition','$concept_dubois_botanical_expeditions$')]。如果国内没有这种地区，可以从其他国家取得[concept_dubois_botanical_licence]。#GREEN #b 博物学家#!#!将会在找到稀有标本时获得[concept_academics_experience]。\n\n[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]是[concept_dubois_paleontologist]的研究领域，无论是植物、昆虫还是其他小动物的化石。这些#b 化石#!可以在#b 探险#!中找到，也可以在有[Concept('concept_dubois_formation','$concept_dubois_formations$')]的地区中找到，如果你有#b 大地层#!，你甚至可以找到[Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]。除此之外，你还可以通过购买[concept_dubois_paleontological_licence]来获得化石。\n\n如果国内拥有山脉，将领可以参加[concept_douglas_mountaineering]活动，获得更好的特质与威望奖励。"
 concept_dubois_naturalist: "#b #GREEN 博物学家#!#!"
 concept_dubois_naturalists: "#b #GREEN 博物学家#!#!"
 concept_dubois_naturalist_desc: "#b #GREEN 博物学家#!#!是可以收集[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]和[concept_dubois_specimen]的学者。他们可以被派遣进行[concept_dubois_pacific_expedition]或[concept_dubois_botanical_expedition]，并找到提供小型增益的珍稀动植物。#b #GREEN 博物学家#!#!在找到稀有标本时获得[concept_academics_experience]。"
 concept_dubois_paleontologist: "#b #GREEN 古生物学家#!#!"
 concept_dubois_paleontologists: "#b #GREEN 古生物学家#!#!"
 concept_dubois_paleontologist_desc: "#b #GREEN 古生物学家#!#!是乐于发掘[Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]和[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]的学者。为了收集上述物品，你需要拥有[concept_dubois_formation]的通行权。在通过自己拥有或取得[concept_dubois_paleontological_licence]的方式进入#b 地层#!后，你可以派遣#b 古生物学家#!进行[concept_dubois_paleontological_expedition]。\n在收集或者重建完5块#b 恐龙骨骼#!后，你的#b 古生物学家#!就可以构建一具[concept_dubois_dinosaur_skeleton]。#b #GREEN 古生物学家#!#!获得的[concept_academics_experience]越多，就能重建越良好的#b 恐龙骨架#!，而#b 恐龙骨架#!越完善，你的[concept_dubois_paleontological_collection]提供的威望就越多。"
 concept_dubois_pacific_expedition: "太平洋探险"
 concept_dubois_pacific_expeditions: "太平洋探险"
 concept_dubois_pacific_expedition_desc: "当你为主要政权或者列强时，就可以向太平洋派遣探险队。同时，你需要研究完#b 经验主义#!、#b 螺旋桨蒸汽护卫舰#!和#b 辩证法#!三项科技，并且拥有港口和大学以及至少15营海军以及1位海军将领。\n在#b 太平洋探险#!中，你可以发现稀有的植物、[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]和[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]，进行海洋学研究，或者观测日食这样的天文现象。在#b 探险#!开始时，你可以选择随队的#b 学者#!，可以是#b 测量员#!、[concept_dubois_naturalist]、[concept_dubois_paleontologist]和[concept_verrier_astronomer]。每位学者都可以通过他们的专业知识帮助我们在特殊事件中收获更好。\n你的探险队可以选择一个具体的探险重心。你可以致力于探索海洋的奥秘并增加你的海洋学与天文学的知识，这种情况下，只会触发海洋学事件。如果你选择研究自然生物，那就会碰到植物学、动物学以及古生物学事件。列强还能够选择威望任务，将会发现文物、建立贸易站或者是派出传教团。如果你未在大洋洲宣告利益却又想通过传教士获取此地的一小块殖民地的话，派出传教团这一操作将相当有用。\n你还必须选择探险队的目的地：大洋洲、澳大利亚或是印度尼西亚。不同的目的地的事件与奖励均不同。"
 concept_dubois_habitat: "栖息地"
 concept_dubois_habitats: "栖息地"
 concept_dubois_animal_habitat: "动物栖息地"
 concept_dubois_habitat_desc: "#b 栖息地#!是地区内[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]生活的区域。在#r 赤色晨曦#!中，许多动物的#b 栖息地#!存在于不同地区。如果拥有#b 栖息地#!，你可以将#b 动物#!运送到[concept_dubois_zoo]或是出售给其他国家。\n\n如果地区的[concept_urbanization]大于等于2000或是没有[concept_arable_land]，#b 珍稀动物#!将会在#n 10年内灭绝#!。\n\n为了拯救#b 动物#!免于灭绝，你可以在有#b 栖息地#!的地区建造[concept_dubois_nature_reserve]。"
 concept_dubois_nature_reserve: "自然保护区"
 concept_dubois_nature_reserves: "自然保护区"
 concept_dubois_royal_hunting_reserve: "皇家狩猎保护区"
 concept_dubois_nature_reserve_desc: "#b 自然保护区#!是可以保存或建立[Concept('concept_dubois_habitat','$concept_dubois_habitats$')]的受保护区域。\n\n如果已经拥有#b 栖息地#!，可以通过在拥有#b 栖息地#!的地区建造#b 自然保护区#!使其免受人类的破坏。要建造#b 自然保护区#!，需要解锁#b 遗传学#!科技，并拥有一个有#b 栖息地#!的已整合地区，且该地区是任意主流文化的本土。\n\n如果没有#b 栖息地#!，你可以进行勘察以确定#b 自然保护区#!的选址。这需要研究 #b 遗传学#!科技并在[concept_dubois_zoo]拥有至少一种来自国家所在大洲的[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]。\n\n#b 自然保护区#!不仅保护动物的#b 栖息地#!，还可以安置本大陆的#b 珍稀动物#!。由此，你可以在一个地区内保护所在大洲的所有#b 珍稀动物#!。"
 concept_dubois_zoo_animal: "动物园动物"
 concept_dubois_zoo_animals: "动物园动物"
 concept_dubois_exotic_animal: "珍稀动物"
 concept_dubois_exotic_animals: "珍稀动物"
 concept_dubois_zoo_animal_desc: "你的[concept_dubois_naturalist]可以收集世界上的许多动物。要捕捉#b 珍稀动物#!，你需要拥有[concept_dubois_habitat]的省份。或者，也可以从拥有#b 栖息地#!的国家购买#b 珍稀动物#!。\n一旦捕获，#b 动物园动物#!将被送到[concept_dubois_zoo]，之后你可以扩建#b 动物园#!。"
 concept_dubois_zoo: "动物园"
 concept_dubois_zoos: "动物园"
 concept_dubois_zoo_desc: "在你收集了5种[concept_dubois_zoo_animal]后便可以建造特殊建筑#b 动物园#!。#b 动物园#!内有你收集的各种#b 动物#!，并为[concept_dubois_specimen]收藏与古生物收藏提供了场所。"
 concept_dubois_specimen: "标本"
 concept_dubois_specimens: "标本"
 concept_dubois_specimen_desc: "[concept_dubois_naturalist]收集的各种昆虫、植物与小动物称作#b 标本#!。你可以使用#b 标本#!在[concept_dubois_zoo]中建造植物园或标本馆。"
 concept_dubois_botanical_expedition: "植物学探险"
 concept_dubois_botanical_expeditions: "植物学探险"
 concept_dubois_botanical_expedition_desc: "You can send a [concept_dubois_naturalist] on a #b Botanical Expedition#! if you have access to a state with [concept_ito_medicinal_plants] either by owning such a state or by acquiring a [concept_dubois_botanical_licence].\nYour #b Naturalist#! will collect [concept_ito_medicinal_plants] and [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] during the one year journey. Sometimes they will find a rare plant that will make a great addition to the botanical collection of a [concept_dubois_zoo]."
 concept_dubois_botanical_licence: "植物学许可"
 concept_dubois_botanical_licences: "植物学许可"
 concept_dubois_botanical_licence_desc: "如果你的国家境内没有地区有雨林特质，也可以通过从拥有雨林的国家获得#b 植物学许可#!以便进行[concept_dubois_botanical_expedition]。你需要支付一小笔费用，但将可以收集[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]并发现珍稀植物。"
 concept_dubois_fossil: "化石"
 concept_dubois_fossils: "化石"
 concept_dubois_fossil_desc: "在发现[concept_dubois_formation]后，[concept_dubois_paleontologist]可以发现灭绝动植物的#b 化石#!。"
 concept_dubois_dinosaur_bone: "恐龙骨骼化石"
 concept_dubois_dinosaur_bones: "恐龙骨骼化石"
 concept_dubois_dinosaur_bone_desc: "[concept_dubois_paleontologist]可以在[Concept('concept_dubois_formation','$concept_dubois_formations$')]中发现恐龙骨骼。\n#b 经验丰富的古生物学家#!也可以尝试使用20块[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]碎片重建一块#b 恐龙骨骼#!。只有在拥有一块已发现的恐龙骨骼作为参照时才能重建#b 恐龙骨骼#!。\n要执行任何一项操作，古生物学家都不能处于劳累或忙碌状态。成功概率在很大程度上取决于古生物学家的[concept_academics_experience]。\n#b 恐龙骨骼#!可以用于重建[Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')]。"
 concept_dubois_dinosaur_skeleton: "恐龙骨架"
 concept_dubois_dinosaur_skeletons: "恐龙骨架"
 concept_dubois_dinosaur_skeleton_desc: "[concept_dubois_paleontologist]使用五块来自同一大陆地区的[Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]可以重建一头完整的恐龙。要重建#b 恐龙骨架#!，需要来自同一地区的5块#b 恐龙骨骼#!。\n#b 古生物学家#!最好具有充足的经验以正确地重建#b 恐龙骨架#!，否则将会出现使[concept_dubois_paleontological_collection]失去声望的危险。然而，如果#b 恐龙骨架#!被错误重建，你可以尝试进行修复并获得略佳的重建。"
 concept_dubois_paleontological_collection: "古生物收藏馆"
 concept_dubois_paleontological_collections: "古生物收藏馆"
 concept_dubois_paleontological_collection_desc: "#b 古生物收藏馆#!是[concept_dubois_paleontologist]的王国，在这里可以找到你的国家所有的[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]、[Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]与[Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')]。\n#b 古生物学家#!装配的#b 恐龙骨架#!越好，就可以给#b 展览#!增加更多声望。如果#b 古生物学家#!组装的#b 骨架#!出现了荒谬的错误，可能导致失去声望。但同一位或是另一位#b 古生物学家#!可以更好地重新组装它！"
 concept_dubois_formation: "地层"
 concept_dubois_formations: "地层"
 concept_dubois_geological_formation: "地层"
 concept_dubois_formation_desc: "共有两种#b 地层#!，即允许[concept_dubois_paleontologist]收集[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]的普通地层与可以发现[Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]的大地层。\n#b 地层#!可以由古生物学家发现或在研究古生物学科技后发现。\n如果本国没有#b 大地层#!，你可以向拥有大地层的国家购买[concept_dubois_paleontological_licence]并取得发掘权。"
 concept_dubois_paleontological_expedition: "古生物学考察"
 concept_dubois_paleontological_expeditions: "古生物学考察"
 concept_dubois_paleontological_licence: "古生物发掘许可"
 concept_dubois_paleontological_licences: "古生物发掘许可"
 concept_dubois_paleontological_licence_desc: "如果你没有[concept_dubois_formation]，可以通过#b 古生物发掘许可#!获得发掘权。这一外交行动使你可以使用#b 大地层#!。要使用这一行动，需要成为主要政权或列强，对方国家需要拥有一个#b 大地层#!。你需要支付一小部分收入，希望这物有所值。"
 concept_dubois_mountain: "山峰"
 concept_dubois_mountains: "山峰"
 concept_dubois_mountain_desc: "世界上有许多可供攀登征服的#b 山峰#!。\n\n#V 北美洲：#!\n#b 麦金利山#!（阿拉斯加），6190米\n#b 洛根山#!（育空领地），5959米\n#b 奥里萨巴山#!（墨西哥），5636米\n#b 惠特尼峰#!（加利福尼亚），4421米\n\n#V 南美洲：#!\n#b 阿空加瓜山#!（门多萨），6267米\n#b 瓦斯卡兰山#!（利马），6768米\n#b 伊宜马尼峰#!（拉巴斯），6438米\n#b 钦博拉索山#!（厄瓜多尔），6267米\n\n#V 欧洲：#!\n#b 希卡拉陶山#!（大高加索），5642米\n#b 杜富尔峰#!（瑞士），4634米\n#b 马特洪峰#!（瑞士西部），4478米\n#b 艾吉耶维尔特山#!（萨伏依），4122米\n#b 阿内托峰#!（阿拉贡），3404米\n\n#V 非洲：#!\n#b 基博峰#!（坦噶尼喀），5895米\n#b 肯尼亚山#!（肯尼亚），5199米\n#b 斯坦利山#!（乌干达），5109米\n#b 喀麦隆火山#!（南喀麦隆），4095米\n\n#V 亚洲：#!\n#b 卡美特山#!（德里），7756米\n#b 乔戈里萨峰#!（克什米尔），7665米\n#b 卡布鲁峰#!（喜马拉雅），7412米\n#b 考夫曼山#!（塔吉克斯坦），7134米\n\n#V 澳大利亚&大洋洲：#!\n#b 威廉山#!（东新几内亚），4121米\n#b 库克山#!（南岛），3724米"
 concept_elgar_music: "音乐文化 "
 concept_elgar_opera: "歌剧"
 concept_elgar_operas: "歌剧"
 concept_elgar_opera_house: "歌剧院"
 concept_elgar_opera_houses: "歌剧院"
 concept_elgar_musical_tradition: "音乐传统"
 concept_elgar_impressionism: "印象派"
 concept_elgar_expressionism: "表现主义"
 concept_elgar_art_nouveau: "新艺术"
 concept_elgar_architecture: "建筑学"
 concept_elgar_architectural_project: "建筑学项目"
 concept_elgar_architectural_projects: "建筑学项目"
 concept_lepsius_archaeology: "考古学"
 concept_lepsius_archaeology_desc: "#b 考古学#!是[concept_morgenroete]的主要特色之一。\n\n地图上共有8个[Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')]。\n\n完成古董主义科技研究，拥有一支[concept_lepsius_archaeological_team]并且可以使用其中一个古迹发掘点之后，方可派遣[concept_lepsius_expedition]。可以是本国内的古迹发掘点或向拥有古迹发掘点的国家申请[concept_lepsius_excavation_licence]。\n\n你可以向古迹发掘点派遣考古队。你的队伍将会发现[Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]，在非常罕见的情况下，加上优秀[concept_lepsius_archaeologist]的帮助，甚至可能会发现[concept_lepsius_major_artifact]。\n\n在考古队携带文物归来后，你可以建造一座[concept_lepsius_museum]。在考古博物馆中可以检视文物、策划[concept_lepsius_exhibition]并拜访#b #BLUE 考古学家#!#!。\n\n拥有更多的文物与展览将会增加威望。\n\n#b 人类学#!也是考古学的一部分。如果你的国家有[concept_lepsius_anthropologist]和[concept_lepsius_cave]，你就可以寻找[Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils$')]并重构史前人类物种。每个骨架都会增加你的人类学威望，如果你的人类学威望达到一定值，将会给你的国家增加一威望收益修正。"
 concept_lepsius_archaeologist: "#b #BLUE 考古学家#!#!"
 concept_lepsius_archaeologists: "#b #BLUE 考古学家#!#!"
 concept_lepsius_archaeologist_desc: "#b #BLUE 考古学家#!#!是可以派遣到[Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]的学者，他们可以在当地收集[Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]。有时他们还会发现[concept_lepsius_major_artifact]。\n考古学家会通过工作或每年被动获得[concept_academics_experience]。获得足够的#b 经验#!后，考古学家特质的等级将会提升。"
 concept_lepsius_anthropologist: "#b #BLUE 人类学家#!#!"
 concept_lepsius_anthropologists: "#b #BLUE 人类学家#!#!"
 concept_lepsius_anthropologist_desc: "#b #BLUE 人类学家#!#!是从古生物学与考古学角度出发研究人类史前史的学者。他们在[Concept('concept_lepsius_cave','$concept_lepsius_caves$')]中寻找[Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils$')]或鉴别先前找到的不知名化石。三件#b 人类化石#!就足以重构出一具早期人类骨架。骨骼化石的发现和鉴定以及早期人类物种的系统化会带来人类学威望。他们在探索洞穴时还可以找到当地的文物。"
 concept_lepsius_museum: "考古博物馆"
 concept_lepsius_museum_desc: "#b 考古博物馆#!是你可以展览所发现的所有[Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]的建筑。"
 concept_lepsius_excavation_site: "古迹发掘点"
 concept_lepsius_excavation_sites: "古迹发掘点"
 concept_lepsius_excavation_site_desc: "位于不同国家的#b 古迹发掘点#!包括：上下埃及、巴比伦尼亚、亚述、克里特、阿尔戈利斯、尤卡坦与秘鲁。每个#b 历史地点#!都会提供不同的[Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]以及事件。"
 concept_lepsius_expedition: "考古探险"
 concept_lepsius_expeditions: "考古探险"
 concept_lepsius_expedition_desc: "#b 考古探险#!是一位[concept_lepsius_archaeologist]与他的[concept_lepsius_archaeological_team]进行的远征。它将会花费数个月，并尝试取得尽可能多的[Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]。#b 探险#!是取得[Concept('concept_lepsius_major_artifact','$concept_lepsius_major_artifacts$')]的唯一方式。\n如果你研究了早期考古学科技，可以将成功的#b 考古#!结束后将考古队留在发掘点以创造[concept_lepsius_excavation]。"
 concept_lepsius_archaeological_team: "考古队"
 concept_lepsius_archaeological_teams: "考古队"
 concept_lepsius_excavation_team: "考古发掘队"
 concept_lepsius_archaeological_team_desc: "需要至少一支#b 考古队#!才能进行[Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]。你可以拥有最多3支#b 考古队#!，但每增加一支都需要更高的要求。\n\n可以通过研究古董主义科技，拥有一座等级至少为3的大学并使识字率达到33%获得第一支#b 考古队#!。\n\n可以通过研究现代考古学科技，拥有一座等级至少为15的大学并使识字率达到66%获得另一支#b 考古队#!。\n\n可以通过研究古董主义科技并拥有一位经验丰富的[concept_lepsius_archaeologist]获得另一支#b 考古队#!。\n\n[Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]与[Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')]需要#b 考古队#!。"
 concept_lepsius_excavation_licence: "考古许可"
 concept_lepsius_excavation_licences: "考古许可"
 concept_lepsius_excavation_licence_desc: "如果本国不拥有[Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')]，你仍然可以通过使用#b 考古许可#!外交活动使用它们。\n为了获得#b 发掘许可证#!你需要至少成为主要政权并且在该地区有一个[concept_active_interest]。\n为了保持#b 考古许可#!，需要向其他国家支付一小笔费用。"
 concept_lepsius_artifact: "文物"
 concept_lepsius_artifacts: "文物"
 concept_lepsius_minor_artifact: "次要文物"
 concept_lepsius_minor_artifacts: "次要文物"
 concept_lepsius_oceanic_artifact: "大洋洲文物"
 concept_lepsius_oceanic_artifacts: "大洋洲文物"
 concept_lepsius_artifact_desc: "可以通过派遣[Concept('concept_lepsius_archaeological_team','$concept_lepsius_archaeological_teams$')]前往[Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]、[Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')]、[Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')]或事件获得文物。\n\n通常会获得#b 普通文物#!。可以使用#b 普通文物#!在[concept_lepsius_museum]中举办[Concept('concept_lepsius_exhibition','$concept_lepsius_exhibitions$')]。\n\n[Concept('concept_lepsius_major_artifact','$concept_lepsius_major_artifacts$')]则是特殊的#b 文物#!，只能被发现一次并拥有特别的名字。你可以在探险、挖掘以及考古学发现中找到它们。"
 concept_lepsius_major_artifact: "重要文物"
 concept_lepsius_major_artifacts: "重要文物"
 concept_lepsius_major_artifact_desc: "#b 重要文物#!是特殊的[Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]，有专门的名字和标识。\n可以通过不同的方式找到#b 重要文物#!。其中一些会在[Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]期间找到，另一些需要保持长期[concept_lepsius_excavation]。还有一些需要重要考古发现。\n将#b 重要文物#!带出国境是非法的，可能引发得不偿失的外交事件。但同时，#b 重要文物#!允许你举办[Concept('concept_lepsius_exhibition','$concept_lepsius_excellent_exhibition$')]，将会带来大量的威望加成，并且是某些[Concept('concept_academics_academic_mission','$concept_academics_academic_missions$')]的要求。"
 concept_lepsius_exhibition: "展览"
 concept_lepsius_exhibitions: "展览"
 concept_lepsius_excellent_exhibition: "精彩的展览"
 concept_lepsius_excavation: "发掘现场"
 concept_lepsius_excavations: "发掘现场"
 concept_lepsius_excavation_desc: "如果研究了早期考古学并完成了[concept_lepsius_expedition]，可以决定将您的[concept_lepsius_archaeological_team]留在现场，被动地挖掘[Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]。可以随时从#b 发掘#!中召回考古队。"
 concept_lepsius_human_fossil: "人类化石"
 concept_lepsius_human_fossils: "人类化石"
 concept_lepsius_human_fossils_fossils: "化石"
 concept_lepsius_human_bones: "人类骨骼"
 concept_lepsius_human_fossil_desc: "有五种不同的#b 人类化石#!：克罗马侬人、尼安德特人、直立人、南方古猿和傍人。[Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')]可以在[Concept('concept_lepsius_cave','$concept_lepsius_caves$')]中发现人类化石并做出鉴别和分类。然而，考古学家和古生物学家却很少能发现人类化石。仅#b #BLUE 人类学家#!#!可以正确地鉴别“未知人类化石”属于哪一种。3件骨骼化石就可以复原完整的骨架，同时带来人类学威望。第一次完成某种早期人类的鉴别会给予更多的威望。人类化石可以根据需要多次完成。"
 concept_lepsius_cave: "洞穴"
 concept_lepsius_caves: "洞穴"
 concept_lepsius_cave_desc: "#b 史前洞穴#!早期人类或前人类物种可能遗留下[Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils_fossils$')]或进化更先进的物种制造工具的地点。洞穴可以被[Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')]发现并探索，有些洞穴还可以通过历史事件解锁。每个洞穴中只会有一个物种的化石——也就是说，克罗马侬人与尼安德特人的谷歌不会出现在同一个洞穴中。有些洞穴在真实历史中存在，有些洞穴则是在游戏开始时随机分布在非洲、亚洲和欧洲。这些洞穴大致遵循前人类的分布区域——例如，南方古猿只能在非洲找到。"
