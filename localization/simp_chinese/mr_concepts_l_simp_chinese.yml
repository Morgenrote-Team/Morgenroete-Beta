 concept_verrier_comet: "大彗星"
 concept_verrier_comets: "大彗星"
 concept_verrier_comet_desc: "维多利亚时代有数颗#b 大彗星#!进入过公众视野。如果拥有一位[concept_verrier_astronomer]，就有机会首先发现其中一颗#b 大彗星#!，为威望与研究提供增益。"
 concept_verrier_moon_photo: "月球照片"
 concept_verrier_moon_photos: "月球照片"
 concept_rapanui_christian_mission: "基督教传教团"
 concept_rapanui_christian_missions: "基督教传教团"
 concept_rapanui_christian_mission_desc: "位于大洋洲的[Concept('concept_major_power','$concept_major_powers$')]或[Concept('concept_great_power','$concept_great_powers$')]与[Concept('concept_interest','$concept_interests$')]可以尝试转换该地区一个岛国的信仰（注：前提是国家不世俗化且信仰体系利益集团不处于弱小）\n\n当你派出一名传教士，其会受到善意的接待、被忽视、被立即杀死三种随机选项，一旦传教士死亡就得等上几年再找一个新的传教士来传播宗教。之后，传教士每年将使1%的人口改变信仰，亦或者通过事件帮助或阻挠传教。\n\n当皈依的当地人达到30%时，则会进入第二阶段\n第二阶段中传教站将成为永久性的。如果有51%的土著人口皈依基督教，那么酋长就会皈依你的宗教，并将自己置于你的保护之下，成为一个[concept_protectorate]。多年后，如果你拥有预防疟疾科技，这些地区可以被吞并。\n\n在第三阶段，您可以通过“日志条目”做出决定。直接派遣更多传教士来加强使团，也可以尝试进行贸易。您可以获得稀有的[Concept('concept_lepsius_artifact','$concept_lepsius_oceanic_artifacts$')]、[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]或珍珠，从而提高生活水平。"
 concept_manzoni_literary_tradition: "文学传统"
 concept_klimt_painters: "#PURPLE #b 画家#!#!"
 concept_klimt_painting_tradition: "绘画传统"
 concept_vikelas_sports: "体育运动"
 concept_vikelas_sports_desc: "#b 体育#!是[concept_morgenroete]的主要特色之一。\n\n当一个国家研究完#b 组织运动#!后，将能举办多种体育运动赛事。其中最重要的是[concept_vikelas_ioc]的成立，使各国将开始组织[concept_vikelas_olympic_games]。奥运会将给你的国家赢得金牌并提高[concept_prestige]的机会。"
 concept_vikelas_olympic_games: "奥林匹克运动会"
 concept_vikelas_olympic_games_desc: "[concept_vikelas_ioc]成立后，每四年可以举办一届#b 奥林匹克运动会#!。每次奥委会都将投票选出#b 主办国#!，主办国将获得巨大的[concept_prestige]收益。\n奥运会期间，你的运动员将积极地为了获取奖牌而战。有许多因素会影响你能获得的奖牌数。你的人口数有影响较小，而[concept_sol]则影响很大，某些事件和[Concept('concept_general', '$concept_generals$')]与[Concept('concept_admiral', '$concept_admirals$')]也都会有影响。有着#b 运动员#!特质的角色以及市中心的#b 体育设施#!也会给予微小的增益。\n所有这些因素都会影响你在12枚金牌中获得多少枚奖牌。每枚金牌都将给予你5[concept_prestige]。"
 concept_vikelas_ioc: "国际奥林匹克委员会"
 concept_vikelas_ioc_desc: "已研究#V $vikelas_international_sports_tech$#!的国家可以成立#b 国际奥林匹克委员会#!（简写为#b 奥委会#!）。通过奥委会可以组织举办[concept_vikelas_olympic_games]。每个奥委会的成员国都可以参加奥林匹克运动会。\n奥委会最重要的成员国是#b 理事会成员国#!。奥委会的创立国将成为自动成为#b 主席国#!及常任理事国，其余理事会成员国则需每四年改选得到。理事会成员国将包括五位列强，两个欧洲国家，两个亚洲国家，两个美洲国家，一个非洲国家和一个大洋洲国家，\n理事会成员国的主要任务是从3个国家中选出下一届奥运会的主办国（如果有国家贿赂理事会，则将变为4个候选国家）。\n如果希腊成立了奥委会，则奥运会将只能在希腊举办。这将大大降低理事会成员国的重要性，因为主办国再也不需要他们来选出了。"
 concept_lepsius_exhibition_desc: "如果你有足够的来自同一地区的[Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')]，[concept_lepsius_museum]将以[concept_production_method]的形式自动设置展览。对于正常文物来说，小型展览需要10件及以上的文物，中型展览需要25件，大型展览需要50件。而优秀展览则需要100件次要文物和1件[concept_lepsius_major_artifact]。\n\n本地展览只有常规展览和宏大展览两种，前者需要25件本地文物，后者需要50件。"
 concept_vikelas_racer: "赛车手"
 concept_vikelas_racers: "赛车手"
 concept_vikelas_racer_desc: "赛车手是参与[concept_vikelas_car_racing]的特殊[concept_character]。"
 concept_vikelas_car_racing: "赛车比赛"
 concept_vikelas_car_racing_desc: "赛车比赛是一项[Concept('concept_vikelas_racer','$concept_vikelas_racers$')]在特定赛道或者普通道路上相互竞争的运动。"
 concept_lepsius_archaeological_exhibition: "考古展"
 concept_elgar_opera_desc: "#b 歌剧院#!是全国音乐文化的中心，最著名的音乐家聚集于此为公众演奏。\n#b 歌剧院#!是一座独立建筑，可以建造在城镇中心至少5级的地区。#b 歌剧院#!将会产出音乐并消费乐器。#b 歌剧院#!的等级越高，每年就会获得更多的[concept_elgar_musical_tradition]。\n拥有一座#b 歌剧院#!也可以使你获得访问歌剧院等特殊决议。"
 concept_elgar_impressionism_desc: "#b 印象派#!是艺术史上的一种风格，以对转瞬即逝的风景进行光影的速写描绘为其特点，起源于19世纪后半叶的法国绘画运动。印象派这一概念也被用于描述音乐、文学、电影与摄影的特定风格。尽管海因里希·哈特等许多自然主义者拒绝将音乐视为表达“追求真理的行动主义”的一种手段，但印象派常常将“无目标的前瞻梦想”，即对色彩层次丰富的和弦的追求，视为一种乐趣。\n\n在游戏中，#b 印象派#!仅能通过日志条目解锁，并需要1000点[concept_elgar_musical_tradition]，一座[concept_elgar_opera]，举足轻重的地主，非举足轻重的实业家以及支持度超过5的知识分子。一旦选择了#b 印象派#!就无法解锁另外两条分支路线。\n\n#b 印象派#!在游戏中聚焦于音乐。因此将会给予最大的[concept_elgar_musical_tradition]加成。"
 concept_elgar_expressionism_desc: "#b 表现主义#!是一种艺术风格。其起源与先驱出现于19世纪末。与印象派、象征主义与野兽派一样，表现主义是一种反对自然主义潮流的运动。在表现主义中，表现层面比审美、诉求和事实的层次更为重要。艺术家希望向观众展现他的经历。与描绘事物外在表现的音乐印象派不同，表现主义艺术运动表达了人类灵魂的情感。\n\n在游戏中，#b 表现主义#!仅能通过日志条目解锁，并需要1000点[concept_elgar_musical_tradition]，一座[concept_elgar_opera]，举足轻重的知识分子或工会与非举足轻重的地主，知识分子与工会的支持度需要超过5。一旦选择了#b 表现主义#!就无法解锁另外两条分支路线。\n\n#b 表现主义#!在游戏中聚焦于文学，但尚未实现。"
 concept_elgar_art_nouveau_desc: "#b 新艺术#!是一种由#italic 工艺与手工艺运动#!发展而来并受到自然形式启发的艺术风格，它时常关注动态运动，并使用现代材料。\n\n在游戏中，#b 新艺术#!仅能通过日志条目解锁，并需要1000点[concept_elgar_musical_tradition]，一座[concept_elgar_opera]与举足轻重的实业家，知识分子支持度需要超过5。一旦选择了#b 新艺术#!就无法解锁另外两条分支路线。\n\n#b 新艺术#!与本条分支的下一个科技#b 装饰风艺术#!聚焦于建筑。你将得到多个与建筑进步相关的事件与日志条目并可以获得[concept_gaudi_architectural_splendour]。"
 concept_elgar_composer: "#PURPLE #b 作曲家#!#!"
 concept_elgar_composers: "#PURPLE #b 作曲家#!#!"
 concept_elgar_composer_desc: "#b 作曲家#!是从事谱曲的特殊角色，在游戏中你可以通过事件获得、也可以在[concept_artistic_progress]足够的情况下在国内培养，又或者聘用[concept_elgar_travelling_composer]。\n一旦你拥有一位#b 作曲家#!，你就可以让他们开始[Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')]、[Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')]、进行[Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')]或者谱写[Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')]。每个行动在作曲家所做的事情、他们的要求以及你从中获得的东西上都是不同的。每次行动后，#b 作曲家#!都会变得[Concept('concept_elgar_composer_exhaustion','$concept_elgar_composer_exhaustion_exhausted$')]，必须休息至能再工作为止。\n在#b 作曲家#!的一生中，他们会不断获得以及失去[concept_artists_experience]。#b 声望#!越高，#b 作曲家#!的行动的好处就更大。#b 作曲家#!的#b 声望#!达到500后即成为[Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')]——名垂青史的音乐巨人。"
 concept_elgar_great_composer: "#PURPLE #b 大作曲家#!#!"
 concept_elgar_great_composers: "#PURPLE #b 大作曲家#!#!"
 concept_elgar_great_composer_desc: "#b 大作曲家#!是名垂青史的音乐巨人。[concept_artists_experience]到达500的[Concept('concept_elgar_composer','$concept_elgar_composers$')]能成为#b 大作曲家#!。这将大大提高他们的工作效率并允许你的国家获得更多[concept_elgar_musical_tradition]。例如，#b 大作曲家#!谱写[concept_elgar_musical_masterwork]的速度更快。"
 concept_elgar_travelling_composer: "旅行的作曲家"
 concept_elgar_travelling_composers: "旅行的作曲家"
 concept_elgar_travelling_composer_desc: "#b 旅行的作曲家#!是未受雇于任何国家的[Concept('concept_elgar_composer','$concept_elgar_composers$')]。他们在世界各地巡回演出。\n你可以获得一位#b 旅行的作曲家#!，但是他们的[concept_artists_experience]越高，他们的要求也就越高。\n你在拥有一座[Concept('concept_elgar_opera','$concept_elgar_opera_house$')]后方可邀请#b 旅行的作曲家#!。#b 声望#!高的#b 作曲家#!会要求等级高的歌剧院，现代化音乐[Concept('concept_technology', '$concept_technologies$')]，一定量的[concept_elgar_musical_tradition]，并且某些作曲家只会接受[Concept('concept_major_power', '$concept_major_power_short$')]或[Concept('concept_great_power', '$concept_great_powers$')]的邀请。\n一个特殊的情况是[Concept('concept_elgar_national_composer','$concept_elgar_national_composers$')]仅适用于具有相同或非常相似的民族身份的国家。"
 concept_elgar_national_composer: "民族作曲家"
 concept_elgar_national_composers: "民族作曲家"
 concept_elgar_national_composer_desc: "#b 民族作曲家#!是更倾向于自己民族的[Concept('concept_elgar_composer','$concept_elgar_composers$')]，他们很难被其他国家雇佣。\n\n你是否能雇佣#b 民族作曲家#!主要取决于他们的文化[Concept('concept_cultural_trait','$concept_cultural_traits$')]。只有当你的任一主流文化与其文化拥有相同#b 非传承特质#!以及[concept_cultural_heritage_trait]."
 concept_elgar_composing: "作曲"
 concept_elgar_composing_lower_case: "作曲"
 concept_elgar_composing_compose: "作曲"
 concept_elgar_composing_desc: "#b 谱曲中#!的[concept_elgar_composer]每年可获得[concept_artists_experience]并为国家增加5[concept_elgar_musical_tradition]，还能谱写随机数量的乐曲。拥有某些特质（指挥家、演奏家、创新精神、谨小慎微）的#b 作曲家#!每年可额外多谱写一首乐曲。乐曲的数量多寡对[Concept('concept_elgar_musical_tour','$concept_elgar_musical_tour_tours$')]的成败至关重要。在停止日志条目前，#b 作曲家#!的谱曲不会停止，且每年国家要为此花一笔小钱。"
 concept_elgar_conducting: "指挥"
 concept_elgar_conducting_lower_case: "指挥"
 concept_elgar_conducting_conduct: "指挥"
 concept_elgar_conducting_desc: "[concept_elgar_composer]将在两年内专注于#b 指挥乐团#!并组织一次音乐季。这将随机提高某个[concept_elgar_opera]的音乐产出五到十年、给予国家[concept_elgar_musical_tradition]的微小增益以及#b 作曲家#![concept_artists_experience]的中等增益。如果你的#b 作曲家#!未拥有指挥家特质，在音乐季结束时即可获得该[concept_character_trait]。在#b 作曲家指挥乐团#!期间，你需要提供资金支持。"
 concept_elgar_musical_tour: "巡回演出"
 concept_elgar_musical_tours: "巡回演出"
 concept_elgar_musical_tour_tour: "巡演"
 concept_elgar_musical_tour_tours: "巡演"
 concept_elgar_musical_tour_desc: "[concept_elgar_composer]可到国外进行30个月的#b 巡回演出#!，可增加他所在国家的[concept_prestige]。#b 巡演#!结束后，根据#b 作曲家#!演奏的乐曲数和他的特质，#b 作曲家#!将获得关于[concept_artists_experience]的增益。\n乐曲数少于20的#b 作曲家#!很可能不会开启#b 巡演#!，拥有#b 内敛#!特质的#b 作曲家#!无法进行巡演。"
 concept_elgar_musical_masterwork: "音乐杰作"
 concept_elgar_musical_masterworks: "音乐杰作"
 concept_elgar_musical_masterwork_masterwork: "杰作"
 concept_elgar_musical_masterwork_masterworks: "杰作"
 concept_elgar_musical_masterwork_of_music: "音乐杰作"
 concept_elgar_musical_masterworks_of_music: "音乐杰作"
 concept_elgar_musical_masterwork_desc: "[concept_elgar_composer]可以花费数年谱写一部#b 杰作#!，其[concept_artists_experience]越高，完成速度就越快。#b 杰作#!谱成后，#b 作曲家#!将获得50[concept_artists_experience]，根据[concept_rank]，国家最多可获得150[concept_elgar_musical_tradition]。\n每位#b 作曲家#!一生最多可谱成3部#b 杰作#!，在其谱曲期间，国家将给予其资金支持。"
 concept_elgar_composer_exhaustion: "作曲家精疲力尽"
 concept_elgar_composer_exhaustion_exhausted: "精疲力尽"
 concept_elgar_composer_exhaustion_desc: "[concept_elgar_composer]完成[Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')]、[Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')]、[Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')]谱写或[Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')]，将会变得#b 精疲力尽#!，在一段时间内无法工作。#b 作曲家#!年龄越大，恢复所需时间就越长。"
 concept_manzoni_writer: "#PURPLE #b 作家#!#!"
 concept_manzoni_writers: "#PURPLE #b 作家#!#!"
 concept_klimt_painter: "#PURPLE #b 画家#!#!"
 concept_pm_artists_academy_conservatory: "#b #PURPLE 音乐学校#!#!"
 concept_pm_artists_academy_conservatory_desc: "音乐学校将改变艺术学院的专业方向为音乐。如果你启用了音乐学校，你就可以培养[Concept('concept_elgar_composer','$concept_elgar_composers$')]。当你改变艺术学院的生产方式时，艺术学院将会获得一个#n 吞吐量减益修正#!并且你的[concept_artistic_progress]也会受到#n 不良影响#!。"
 concept_pm_artists_academy_salon: "#b #PURPLE 文学沙龙#!#!"
 concept_pm_artists_academy_salon_desc: "文学沙龙将改变艺术学院的专业方向为文学。如果你启用了艺文学沙龙，你就可以培养[Concept('concept_manzoni_writer','$concept_manzoni_writers$')]。当你改变艺术学院的生产方式时，艺术学院将会获得一个#n 吞吐量减益修正#!并且你的[concept_artistic_progress]也会受到#n 不良影响#!。"
 concept_pm_artists_academy_studio: "#b #PURPLE 艺术工作室#!#!"
 concept_pm_artists_academy_studio_desc: "艺术工作室将改变艺术学院的专业方向为绘画。如果你启用了艺术工作室，你就可以培养[Concept('concept_klimt_painter','$concept_klimt_painters$')]。当你改变艺术学院的生产方式时，艺术学院将会获得一个#n 吞吐量减益修正#!并且你的[concept_artistic_progress]也会受到#n 不良影响#!。"
 concept_pm_artists_academy_specialization: "艺术学院焦点"
 concept_pm_artists_academy_specialization_desc: "每一所艺术学院都可以通过改变生产方式来实现专业化。\n启用[concept_pm_artists_academy_conservatory]的艺术学院将允许你培养[Concept('concept_elgar_composer','$concept_elgar_composers$')]。\n启用[concept_pm_artists_academy_salon]的艺术学院将允许你培养[Concept('concept_manzoni_writer','$concept_manzoni_writers$')]。\n启用[concept_pm_artists_academy_studio]的艺术学院将允许你培养[Concept('concept_klimt_painter','$concept_klimt_painters$')]。\n改变专业化方向将使艺术学院和你的[concept_artistic_progress]获得#n 短期不良影响#!"
 concept_artists_artist: "艺术家"
 concept_artists_artists: "艺术家"
 concept_artistic_progress: "艺术进度"
 concept_artistic_progress_desc: "每1000#b 艺术发展点#!，你就可以获得一位新[concept_artists_artist]，只有拥有#b 歌剧院#!或#b 艺术学院#!的国家才可以获得#b 学术发展点#!\n#b 艺术发展点#!的获取受很多因素影响。例如，[concept_literacy]越高，获取速度越快。你可以在艺术界面查看详细的影响因素。"
 concept_artists_experience: "声望"
 concept_artists_experience_desc: "#b 声望#!是用于衡量[concept_artists_artist]名气的数值，艺术家可通过在领域内不懈地工作来获取声望，当其声望到达500时，将成为伟大的艺术家并获得相应[concept_character_trait]。"
 concept_manzoni_great_writer: "大作家"
 concept_manzoni_local_writer: "本土作家"
 concept_artists_center_of_arts: "艺术中心"
 concept_artists_centers_of_arts: "艺术中心"
 concept_artists_center_of_classicism: "古典主义中心"
 concept_artists_center_of_romanticism: "浪漫主义中心"
 concept_artists_center_of_realism: "现实主义中心"
 concept_artists_center_of_impressionism: "印象派中心"
 concept_artists_center_of_expressionism: "表现主义中心"
 concept_artists_center_of_art_nouveau: "新艺术中心"
 concept_klimt_great_painter: "#PURPLE #b 大画家#!#!"
 concept_klimt_great_painters: "#PURPLE #b 大画家#!#!"
 concept_klimt_great_painter_desc: "#b 大画家#!是那些流芳百世的[Concept('concept_klimt_painter','$concept_klimt_painters$')]。#b 画家#!的[concept_artists_experience]达到500后即可成为#b 大画家#!。这将大大增加他们的工作效率并让你的国家获得更多[concept_klimt_painting_tradition]。"
 concept_klimt_independent_painter: "独立画家"
 concept_klimt_independent_painters: "独立画家"
 concept_klimt_painter_trip: "画家的教育之旅"
 concept_klimt_painter_trip_journeys: "游历"
 concept_elgar_music_desc: "#b 音乐文化#!是[concept_morgenroete]的主要特色之一。19与20世纪，音乐在愉悦大众与展现国家实力方面具有同等重要的作用。\n\n为了体验#r 赤色晨曦#!中的大部分音乐相关内容，你需要建造一座[concept_elgar_opera]。#b 歌剧院#!可以通过消耗乐器会产出音乐。除了产出供人口消费的#b 音乐#!外，#b 歌剧院#!也会缓慢增加国家的[concept_elgar_musical_tradition]。\n\n#b 音乐传统#!反映了国家的音乐上的成就与传统。根据#b 音乐传统#!的数量，你可以获得威望加成并选择国家的艺术发展方向。你可以选择[concept_elgar_impressionism]、[concept_elgar_expressionism]与[concept_elgar_art_nouveau]的路线。每种艺术风格都各有侧重。\n\n获得更多#b 音乐传统#!的好方法是雇用一位[concept_elgar_composer]。作曲家能够[Concept('concept_elgar_composing','$concept_elgar_composing_compose$')]、[Concept('concept_elgar_conducting','$concept_elgar_conducting_conduct$')]、举办[Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')]以及创作[Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterworks_of_music$')]。这些行动将提高#b 作曲家#!的[concept_artists_experience]或增加你的国家的#b 音乐传统#!。"
 concept_artists_center_of_arts_desc: "某种[concept_artists_art_style]的发源[concept_state_region]即为#b 艺术中心#!，每种#b 艺术风格#!仅有一个#b 艺术中心#!。\n#b 艺术中心#!对[Concept('concept_klimt_painter','$concept_klimt_painters$')]来说尤为重要，因为他们可以通过[concept_klimt_painter_trip]在那里学习其他#b 艺术风格#!。除此之外，#b 艺术中心#!还有一些独有的事件，譬如，你的艺术家可以在那赢得[Concept('concept_klimt_art_prize','$concept_klimt_art_prizes$')]。"
 concept_klimt_painting_culture: "绘画文化"
 concept_klimt_painting_culture_desc: "#b 绘画文化#!是[concept_morgenroete]的主要特色之一。在19世纪和20世纪，急速发展的绘画中涌现出了数种崭新的[Concept('concept_artists_art_style','$concept_artists_art_styles$')]，带给了个人和国家许多进步。\n\n为了享受#r 赤色晨曦#!中和绘画有关的内容，你需要建造#b 艺术学院#!，这能让你获得[concept_klimt_painting_tradition]并雇佣新的[Concept('concept_klimt_painter','$concept_klimt_painters$')]。\n\n#b 画家#!可以为你的国家绘制一般画作和#b 杰作#!，并藉此获得大量#b 绘画传统#!。有多种[Concept('concept_artists_art_style','$concept_artists_art_styles$')]可供#b 画家#!选择，你可让画家通过[concept_klimt_painter_trip]学习额外的#b 艺术风格#!。在#b 画家#!四十岁时，他们将专注于一种#b 艺术风格#!并持续创作属于#b 该风格#!的画作。"
 concept_artists_art_style: "艺术风格"
 concept_artists_art_styles: "艺术风格"
 concept_artists_art_style_style: "风格"
 concept_artists_art_style_desc: "#b 艺术风格#!一种特殊的艺术焦点。有些#b 艺术风格#!是开局时就存在的，如#b 古典主义#!和#b 浪漫主义#!。其余的（#b 现实主义#!、#b 非理性主义#!、[concept_elgar_impressionism]、[concept_elgar_expressionism]和[concept_elgar_art_nouveau]）则会在满足特定条件后出现。每种#b 艺术风格#!都会在其首次出现的[concept_state_region]有一个相应的[concept_artists_center_of_arts]。"
 concept_klimt_painter_desc: "#PURPLE #b 画家#!#!是从事美术作品创作的特殊角色，在游戏中你可以通过事件获得、也可以在[concept_artistic_progress]足够的情况下在国内培养，又或者聘用[concept_klimt_independent_painter]。\n#b 画家#!一年内能绘制的作品多少取决于他们的[Concept('concept_character_trait','$concept_character_traits$')]，甚至有些时候他们还能创作出将给予你大量[concept_klimt_painting_tradition]的#b 杰作#!。\n#b 画家#!可以在[Concept('concept_klimt_painter_trip','$concept_klimt_painter_trip_journeys$')]中学习不同的[Concept('concept_artists_art_style','$concept_artists_art_styles$')]。在#b 画家#!四十岁后，他们将专注于某一#b 艺术风格#!并能绘制该风格的#b 杰作#!。"
 concept_klimt_independent_painter_desc: "#b 独立画家#!是未受雇于任何国家的[Concept('concept_klimt_painter','$concept_klimt_painters$')]。如果某国的[Concept('concept_primary_cultures','$concept_primary_culture$')]与#b 独立画家#!的文化有同一[concept_cultural_trait]，则该国可雇佣这位#b 画家#!。\n取决于#b 画家#!的[concept_artists_experience]，#b 独立画家#!有其受雇标准——拥有#b 艺术学院#!、研究特定[Concept('concept_technology', '$concept_technologies$')]抑或是最低[concept_klimt_painting_tradition]。而且你还要根据他们的#b 声望#!和你财政收入付给他们钱。"
 concept_klimt_painter_trip_desc: "[concept_klimt_painter]可以在前往某个[Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')]的#b 教育之旅#!中学到新的[Concept('concept_artists_art_style','$concept_artists_art_styles$')]。\n在#b 教育之旅#!中，画家可能会获得影响他们未来创作的正面/负面[Concept('concept_character_trait','$concept_character_traits$')]。每个#b 艺术中心#!都会有不同的事件以给予#b 画家#!独一无二的#b 特质#!，并在之后成为画家的#b 专业化方向#!。"
 concept_klimt_art_prize: "艺术奖"
 concept_klimt_art_prizes: "艺术奖"
 concept_klimt_art_prize_desc: "能提高艺术家声誉的比赛会不时举办并未艺术家颁发奖品。拥有非理性主义或[concept_elgar_impressionism][concept_artists_center_of_arts]的国家可每五年举办一次比赛以选出最优秀的作曲家。拥有[concept_klimt_art_gallery]或#b 现实主义艺术中心#!的国家可每五年举办一次比赛以选出最优秀的画家。获胜者所服务的国家将能获得音乐传统或绘画传统。每两年举办一次的双年展是一种特殊的比赛形式，会将综合艺术奖颁发给最高声誉艺术家所服务的国家，该国的所有文化传统都会增加。"
 concept_klimt_art_gallery: "美术馆"
 concept_klimt_art_gallery_desc: "#b 美术馆#!是仅能建造在国家首都的特殊建筑。研究#b 现实主义#!后解锁，拥有一位专注于某一[Concept('concept_artists_art_style','$concept_artists_art_style_style$')]的[concept_klimt_painter]后可建造，并能解锁该风格的画作收藏，例如，专注于浪漫主义风格的画家可解锁浪漫主义收藏。同时，画家绘制或外购所得的该风格的杰作还可升级该收藏为精选收藏。"
 concept_manzoni_writer_novelist: "小说家"
 concept_manzoni_writer_desc: "#b 作家#!是一位为国家创作文学作品的特殊角色，他们会以[concept_manzoni_local_writer]发表#b 刊物#!（这些刊物有可能变为[Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')]）。而#b 畅销书#!将给予#b 作者#!带来大量[concept_artists_experience]以及给所属国家带来[concept_manzoni_literary_tradition]。根据作家写作的[concept_manzoni_genre]和[concept_manzoni_popular_taste]，作家#b 每年#!都有概率产出畅销书。\n\n当[concept_interest_group]中有一个#b 著名作家#!，其可以成为[concept_manzoni_national_writer]。国家级作家可以给予[Concept('concept_manzoni_book_licence','$concept_manzoni_book_licences$')]或创建报刊小说。如果一个作家累计获得#b 500声望#!则可晋升为[concept_manzoni_great_writer]并让所属国家获得更多的#b 文学传统#!\n\n注意！！如果#b 作家#!对当前政治局势不满，他们可以成为[Concept('concept_agitator', '$concept_agitators$')]并干涉政治。"
 concept_manzoni_great_writer_desc: "#b 大作家#!是举世闻名的[concept_manzoni_writer]。当一位#b 作家#!的[concept_artists_experience]到达#V 500#!时，方可成为#b 大作家#!。如果你的[concept_manzoni_national_writer]是#b 大作家#!，则你的年度获得[concept_manzoni_literary_tradition]会更多。"
 concept_manzoni_local_writer_desc: "几乎每一位[concept_manzoni_writer]都是从#b 本土作家#!一步一步成长起来。每个国家最多可以有3个#b 本土作家#!，他们将创办#b 出版物#!如果他们的[concept_manzoni_genre]符合[concept_manzoni_popular_taste]，就会让你获得[concept_manzoni_literary_tradition]，并且其自身获得[concept_artists_experience]\n当#b 本土作家#!的声望达到150且所在的[concept_interest_group]不满，其可以成为[concept_manzoni_national_writer]，让你获得文学传统和其他加成。\n请注意！对当前政治局势不满的#b 本土作家#!可能会开始干预政治讨论，甚至成为[concept_agitator]"
 concept_manzoni_national_writer: "国家级作家"
 concept_manzoni_national_writer_desc: "国家级作家是一种[concept_manzoni_writer]，被认为是所属国家文学的代言人，并让你获得1‑5点[concept_manzoni_literary_tradition]\n你可以通过任命一位[Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')]来获得一位#b 国家级作家#!，候选人必须至少有#V 150点#![concept_artists_experience]，而且他们的[concept_interest_group]必须有正面的[concept_approval]。"
 concept_manzoni_bestseller: "畅销书"
 concept_manzoni_bestsellers: "畅销书"
 concept_manzoni_bestseller_desc: "畅销书是[concept_manzoni_writer]的一种#b 出版物#!，其销量非常好，通常是因为作家的[concept_manzoni_genre]符合或接近当前的[concept_manzoni_popular_taste]\n每年都有概率让一位[concept_manzoni_national_writer]或[concept_manzoni_local_writer]写出一本#b 畅销书#!。第一本#b 畅销书#!将获得大量的[concept_manzoni_literary_tradition]，第一本之后的每一本#b 畅销书#!都将授予该国大量的#b 文学传统#!。"
 concept_manzoni_genre: "体裁"
 concept_manzoni_genres: "体裁"
 concept_manzoni_genre_desc: "每个[Concept('concept_manzoni_writer','$concept_manzoni_writer_novelist$')]的作品都有特定的#b 体裁#!。作家出现时自动获得体裁（取决于多种因素）。\n当#b 作家#!的#b 体裁#!符合或接近该国的[concept_manzoni_popular_taste]时，他们将获得更多的[concept_artists_experience]，并写出更多的[Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')]。"
 concept_manzoni_popular_taste: "大众审美"
 concept_manzoni_popular_taste_audience: "读者审美"
 concept_manzoni_popular_tastes_audience: "受众审美"
 concept_manzoni_popular_taste_desc: "每个国家的人民都#b 偏好#!特定的[concept_manzoni_genre]。大约每隔10年，这种#b 偏好#!就会根据国家本身的政治、社会和文化变化而发生变化。\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')]的#b 体裁#!接近或相匹配这种#b 偏好#!时，就会获得更多的[concept_artists_experience]，写出更多的[Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')]。\n\n#V 相似审美#!\n• #b $manzoni_taste_adventure_var_loc$#!：$manzoni_genre_science_fiction$、$manzoni_genre_juvenile$、$manzoni_genre_crime_mystery$\n• #b $manzoni_taste_crime_var_loc$#!：$manzoni_genre_science_fiction$、$manzoni_genre_adventure$、$manzoni_genre_romance$\n• #b $manzoni_taste_devotional_var_loc$#!：$manzoni_genre_juvenile$、$manzoni_genre_romance$、$manzoni_genre_adventure$\n• #b $manzoni_taste_juvenile_var_loc$#!：$manzoni_genre_adventure$、$manzoni_genre_devout$、$manzoni_genre_crime_mystery$\n• #b $manzoni_taste_literary_var_loc$#!：$manzoni_genre_social_critic$、$manzoni_genre_science_fiction$、$manzoni_genre_romance$\n• #b $manzoni_taste_romance_var_loc$#!：$manzoni_genre_devout$、$manzoni_genre_juvenile$、$manzoni_genre_literary_fiction$\n• #b $manzoni_taste_science_var_loc$#!：$manzoni_genre_adventure$、$manzoni_genre_social_critic$、$manzoni_genre_literary_fiction$\n• #b $manzoni_taste_social_var_loc$#!：$manzoni_genre_literary_fiction$、$manzoni_genre_juvenile$、$manzoni_genre_crime_mystery$"
 concept_manzoni_book_licence: "书籍许可"
 concept_manzoni_book_licences: "书籍许可"
 concept_manzoni_book_licence_desc: "外国出版商可以与[concept_manzoni_national_writer]签订合同，并在本国市场上提供其作品的译本。当作家在国外符合[Concept('concept_manzoni_popular_taste','$concept_manzoni_popular_tastes_audience$')]要求时，就会出现这种情况。如果一位作家获得至少五个书籍许可，他的书就被视为世界文学精品，这样他就可以进行阅读之旅。"
 concept_manzoni_local_writers: "本土作家"
 concept_manzoni_library: "国立图书馆"
 concept_manzoni_library_desc: "如果有足够多的[concept_manzoni_publications]，#b 国立图书馆#!将自动建立收藏（以 [concept_production_method]的形式）。第一个图书合集将为1000个或更多。从这里开始，可以创建 2500 册（小型图书收藏）、5000册（中型图书收藏）、10000册（大型图书收藏）、25000册巨型图书收藏）、50000册（宏伟图书收藏）和 100000册（智慧宫）来收藏。"
 concept_manzoni_publications: "出版物"
 concept_manzoni_publications_desc: "出版物是包括一个国家新出版的所有书刊、报纸、论文和其他类似的纸质产品。它们与@manzoni_prints!不一致！$manzoni_prints$作为商品流通。出版物也可以独立于出版商而出现，例如通过政府大楼或大学的内部印刷机。学者和个人也会根据自己的文化水平制作出版物。然而，出版商占据了绝大部分份额，其决定性因素在于是否采用了现代生产方式。大量出版物是[concept_manzoni_library]扩展的基础。"
 concept_curtiss_tourism: "旅游业"
 concept_curtiss_tourism_desc: "旅游业为国家提供了额外收入。独特古迹、博物馆和艺术馆、考古遗址、艺术中心以及各种文化传统都是一个国家成为有吸引力的旅游目的地的因素。增加行动自由和经济法律也有助于提高旅游收入，基础设施也起着至关重要的作用，机场尤其能彻底改变旅游业，大幅增加收入。"
 concept_curtiss_private_airline: "私营航空公司"
 concept_mendelejew_chemist: "#b #ORANGE 化学家#!#!"
 concept_manzoni_literature: "文学文化"
 concept_manzoni_literature_desc: "#b 文学文化#!是[concept_morgenroete]的主要机制之一。印刷和报纸，尤其是在19世纪和20世纪报纸经历了重大的变革，大量日常使用的印刷产品所产生的文学文化价值体现在[concept_manzoni_literary_tradition]中。后者主要取决于一个国家的[Concept('concept_manzoni_writer','$concept_manzoni_writers$')]，有[Concept('concept_manzoni_local_writer','$concept_manzoni_national_writers$')]和[Concept('concept_manzoni_national_writer','$concept_manzoni_local_writers$')]之分。作家们是寂寂无名，还是赫赫有名，都要取决于[concept_manzoni_popular_taste]。"
 concept_morgenroete_desc: "#r 赤色晨曦#!是一款为《维多利亚3》时间线中的文化、科学、艺术方面而制作的沉浸式MOD，它包含以下风味包：\n\n#V 勒普修斯之书：#![concept_lepsius_archaeology]\n#V 勒维耶的观测：#![concept_verrier_astronomy]\n#V 工程师高迪：#![concept_elgar_architecture]&[concept_tesla_engineering]\n#V 杜波依斯发现：#![concept_dubois_natural_history]\n#V 化学家门捷列夫：#![concept_mendelejew_chemistry]\n#V 作曲家埃尔加：#![concept_elgar_music]\n#V 小说家曼佐尼：#! [concept_manzoni_literature]\n#V 画家克里姆特：#![concept_klimt_painting_culture]\n#V 发明家柯蒂斯：#![concept_curtiss_aviation]\n#V 维凯拉斯的奥林匹克：#![concept_vikelas_sports]"
 concept_agassiz_mineral: "矿物"
 concept_agassiz_minerals: "矿物"
 concept_agassiz_mineral_desc: "矿物指所有不属于已知工业资源的特殊岩石。国家在研究#b 地质学#!科技后，每年可以获得一定数量的矿物。为国家服务的[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]可以找到更多矿物。矿物的位置由省份修正决定，包括山脉、沙漠、极地、原料矿藏（例如煤、铁和硫）以及地质学地层[Concept('concept_dubois_formation','$concept_dubois_formations$')]和火山。沙漠和极地矿物贫乏，而大型地层和火山的矿物则特别丰富。最具价值的矿物称为[Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]"
 concept_agassiz_rare_mineral: "稀有矿物"
 concept_agassiz_rare_minerals: "稀有矿物"
 concept_agassiz_rare_mineral_desc: "[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]能在勘测矿脉或[concept_douglas_mountaineering]、[Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')]和[concept_agassiz_volcano]等考察中找到稀有矿物。稀有矿物不同于一般的[Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]，其数量极其有限，值得用矿石陈列柜来珍藏。"
 concept_agassiz_geologist: "#b #GREEN 地质学家#!#!"
 concept_agassiz_geologists: "#b #GREEN 地质学家#!#!"
 concept_agassiz_geologist_desc: "#b #GREEN 地质学家#!#!是主要研究地球的起源、历史与结构的[Concept('concept_academics_academic','$concept_academics_academics$')]。他们能定位[Concept('concept_lepsius_cave','$concept_lepsius_caves$')]、[Concept('concept_dubois_formation','$concept_dubois_formations$')]和[Concept('concept_curie_uranium','$concept_curie_uranium$')]矿，这让他们成为[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]、[Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')]和[Concept('concept_curie_physicist','$concept_curie_physicists$')]不可或缺的同行。在他们的考察中，他们可能会发现[concept_mendelejew_chemist]用以分析新[Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]的[Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]、稀有矿物的新矿床以及作为火山学家对当地的[Concept('concept_agassiz_volcano','$concept_agassiz_volcanoes$')]进行详细地研究。地质学家还能与[Concept('concept_tesla_engineer','$concept_tesla_engineers$')]一同开发地震仪等新设备用以研究地球的内部构造，并可参与[Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')]考察和[concept_douglas_mountaineering]。"
 concept_agassiz_volcano: "火山"
 concept_agassiz_volcanoes: "火山"
 concept_curie_physicist: "#b #ORANGE 物理学家#!#!"
 concept_curie_physicists: "#b #ORANGE 物理学家#!#!"
 concept_curie_physicist_desc: "#n 即将被添加到赤色晨曦#!"
 concept_curie_uranium: "铀"
 concept_curie_uranium_desc: "铀是一种极其稀有的材料，只能[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]勘定的几个历史省份发现。铀是现代物理学研究的基础。起初看来，铀是一种次要的矿石，只用于陶瓷生产。但接下来它将派上用场，特别是在[concept_verrier_observatory]中。只有提供铀，最高等级的物理和化学生产方法才能实现，以研究核物理和以前未知的元素。没有铀，放射性领域的所有科学活动都不可能进行。因此，在维多利亚 3的最终阶段，[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]和[Concept('concept_curie_physicist','$concept_curie_physicists$')]对铀有着特别的兴趣。"
 concept_mendelejew_chemistry: "化学"
 concept_mendelejew_chemistry_desc: "#b 化学#!是[concept_morgenroete]的主要特色之一。自十八世纪始，#b 化学#!迅速发展为一门现代科学。数十种新元素被人们发现，数不清的化工流程被实际应用。十九世纪和二十世纪见证了更多化学上的发现——从新元素到炸药到哈伯法合成氨。\n\n在#b 赤色晨曦#!中，你将通过[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]开展种种项目来体验#b 化学#!方面的内容。\n你可以开展提高#b $building_chemical_plant$#!、#b $building_explosives_factory$#!与#b $building_synthetics_plant$#!等[Concept('concept_building', '$concept_buildings$')]生产效率的改进项目。\n如果你更关心国家的威望，则可以让#b 化学家#!推定、发现并分离新[Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]，每个元素都会根据你的项目增加小额[concept_prestige]。\n在游戏后期，#b 化学家#!将能开展#b 合成油#!以及#b 合成橡胶#!的研究。这将解锁#b $building_mendelejew_hydrogenation_plants$#!与#b $building_mendelejew_synthetic_rubber_factory$#!。"
 concept_mendelejew_chemists: "#b #ORANGE 化学家#!#!"
 concept_mendelejew_chemist_desc: "#b #ORANGE 化学家#!#!是推定、发现并分离[Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]的[Concept('concept_academics_academic','$concept_academics_academics$')]。\n#b #ORANGE 化学家#!#!在研究#b 元素#!或参加大会时会获得[concept_academics_experience]。他们也会每年被动获得#b 经验#!，使得#b #ORANGE 化学家#!#!获得更好的特质。化学家生成时或通过事件可以获得专长（理论家、分析家、调查者）。"
 concept_mendelejew_element: "化学元素"
 concept_mendelejew_element_no_chemical: "元素"
 concept_mendelejew_elements: "化学元素"
 concept_mendelejew_element_desc: "古人普遍认为世界由火、土、水、气四种元素组成。随着化学从炼金术中分离，人们开始对化学元素进行科学分析，但这一过程在19世纪时还远未完成。\n\n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]可以通过逐一推定、发现和分离元素来继续这项研究。只有完全分离出来的元素才会被命名，在此之前则仅由序数代表。元素的分类带来了科学进步和化学家的[concept_academics_experience]。\n在游戏开始时，并非所有元素都能被推定、发现和分离。\n\n前提条件是[concept_verrier_observatory]的化学实验室拥有足够的设备，有时还要拥有现代物理研究所。许多元素只能通过光谱仪进行适当的研究；在游戏接近结束时，可能需要回旋加速器。[Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]是发现和分离化学元素的必要条件。除了生产方式外，化学家的经验和性格对研究时间的长短也起决定性作用。\n\n经过研究的元素是制定元素周期表和组织化学大会的必要条件。"
 concept_verrier_meteorite: "陨石"
 concept_verrier_meteorites: "陨石"
 concept_manzoni_national_writers: "国家级作家"
 concept_verrier_astronomy_desc: "#b 天文学#!是[concept_morgenroete]的主要特色之一。\n\n为了体验#b 天文学#!需要一座[concept_verrier_observatory]或一位[concept_verrier_astronomer]。\n\n一旦天文台建成，你将能被动发现[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]。\n\n如果有一位[concept_verrier_astronomer]，你将能寻找新的行星、[Concept('concept_verrier_satellite','$concept_verrier_satellites$')]以及[Concept('concept_verrier_comet','$concept_verrier_comets$')]，并能拍摄[Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')]。\n有时，[concept_agassiz_geologist]会发现[Concept('concept_verrier_meteorite','$concept_verrier_meteorites$')]并交予#b 天文学家#!和[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]进行研究。\n\n每一次的天文发现都将增加你的[concept_verrier_astronomical_prestige]与[concept_prestige]，通过$verrier_astronomical_prestige_modifier$[concept_modifier]来查看你的#b 天文学威望#!。"
 concept_verrier_observatory_desc: "#b 天文台#!是各国[concept_verrier_astronomy]与[concept_mendelejew_chemistry]的支柱。在那里[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]可以发现行星、[Concept('concept_verrier_satellite','$concept_verrier_satellites$')]、[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]、[Concept('concept_verrier_comet','$concept_verrier_comets$')]并拍摄[Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')]。\n要建造#b 天文台#!，需要一所大学并已研究$verrier_astronomy_tech$或$verrier_chemistry_tech$[concept_technology]。#b 天文台#!只能在首都建造一座。"
 concept_verrier_astronomer_desc: "#b 天文学家#!是探索星空并发现[Concept('concept_verrier_satellite','$concept_verrier_satellites$')]、[Concept('concept_verrier_comet','$concept_verrier_comets$')]与[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]的学者\n#b 天文学家#!在发现#b 天体#!或参加大会时会获得[concept_academics_experience]。他们也会每年被动获得#b 经验#!，使得#b 天文学家#!获得更好的特质。\n\n#b 天文学家#!可以专注于发现新#b 卫星#!或#b 拍摄月球照片#!，但这会减少他们所发现的#b 天体#!的数量。"
 concept_verrier_astronomical_prestige: "天文学威望"
 concept_verrier_astronomical_prestige_desc: "#b 天文学威望#!是你从天文学中所获得的[concept_prestige]。其影响因素如下：\n发现新行星：#V +15‑100#!（取决于难易程度）。\n发现一个[concept_verrier_satellite]：#V +10#!。\n成功绘制[Concept('concept_verrier_moon_photo','$concept_verrier_moon_map$')]：+#V 25#!。\n大彗星：#V +10#!。\n每块[concept_verrier_meteorite]：#V +1#!。\n每#V 100颗#![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]：#V +1#!。"
 concept_verrier_astronomical_object_desc: "你可发现的小行星与恒星称为#b 天体#!。拥有[concept_verrier_observatory]可以发现这些天体。天文学科技越先进，就能发现越多天体。在拥有一位[concept_verrier_astronomer]时也能发现更多#b 天体#!。\n发现足够的#b 天体#!后你将可以发现新行星或研究天体物理学科技。"
 concept_verrier_moon_map: "月球地图"
 concept_verrier_moon_photo_desc: "如果你拥有一座[concept_verrier_observatory]并研究了相机科技，就可以派遣[concept_verrier_astronomer]来拍摄月球照片。尽管这会降低#b 天文学家#!每年发现的[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]数量，但你每年都会获得#b 月球照片#!。\n在收集到足够#b 月球照片#!后，你可以绘制一张这位地球伙伴的准确地图。绘制月球地图将给予你的国家些许[concept_verrier_astronomical_prestige]。"
 concept_verrier_satellite: "卫星"
 concept_verrier_satellites: "卫星"
 concept_verrier_satellite_desc: "#b 卫星#!是围绕行星运行的[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]。一些#b 卫星#!，如地球的卫星月球，已经被发现，但[concept_verrier_astronomer]仍在尝试发现更多卫星。\n国家发现的每颗#b 卫星#!都会提供少量[concept_verrier_astronomical_prestige]。"
 concept_verrier_meteorite_desc: "陨石是起源于外太空的物体穿越地球大气层后坠落的碎片。在某些罕见的情况下，人们能在流星雨后找到陨石碎片。[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]可在沙漠与极地等难以通行的地形中找到数千年前坠落在地球上的陨石。[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]和[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]对陨石极感兴趣并乐于分析它们。\n\n#b 陨石#!有助于提高[concept_agassiz_geological_score]并为[concept_agassiz_age_of_earth]估测带来更精确的结果。"
 concept_agassiz_volcano_desc: "#b 火山#!是#r 赤色晨曦#!新添加的地区特质。与维多利亚3原版游戏不同，火山活动不再以战略区域为尺度，而是仅发生在拥有火山的省份。火山活动的频率显著增加，但并非总是具有破坏性。拥有火山的国家可以建造一座#b $building_agassiz_volcano_observatory$#!，这一建筑不仅可以通过观测火山预测喷发并减轻其损害，也可以作为火山考察的起点。[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]可以在火山考察中获得新的[concept_agassiz_geological_knowledge]、[Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]、经验与火山学家特质。"
 concept_agassiz_geological_knowledge: "地质知识"
 concept_agassiz_geological_knowledge_desc: "#b 地质知识#!是一个国家对地球的总体认识。地质知识主要可以在地质里程碑的过程中获得。#b 地质知识#!与[concept_agassiz_geological_score]不同，但它是[concept_agassiz_geological_score]中最重要的组成部分，被认为特别有价值。"
 concept_agassiz_geological_score: "地质学评分"
 concept_agassiz_geological_score_desc: "#b 地质学评分#!包含了国家所有地质学相关的成就和知识。其中最重要的是[concept_agassiz_geological_knowledge]，重要性稍次的有：[concept_agassiz_geologist]的经验、[concept_agassiz_oceanographic_knowledge]、[Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')][Concept('concept_dubois_fossil','$concept_dubois_fossils$')][Concept('concept_dubois_specimen','$concept_dubois_specimens$')]的数量以及地质学科技。地质学评分对重新估测[concept_agassiz_age_of_earth]来说至关重要。"
 concept_agassiz_oceanographic_knowledge: "海洋学知识"
 concept_agassiz_oceanographic_knowledge_desc: "#b 海洋学知识#!是[concept_agassiz_geological_knowledge]中涉及海洋的部分，特别是对洋流的研究以及以及结合地球物理学的综合海洋研究。#b 海洋学知识#!主要通过[Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')]获得。获取[concept_agassiz_geological_knowledge]需要50#b 海洋学知识#!。"
 concept_agassiz_age_of_earth: "地球年龄"
 concept_agassiz_age_of_earth_desc: "19世纪的重大问题之一是#b 地球年龄#!的确定。这个问题对自然史有深远影响，特别是在验证进化论和地质事件序列方面。只有[concept_agassiz_geologist]才能确定一个新的地球年龄。要做到这一点，他所在的国家必须拥有比上一个确定地球年龄的国家更高的[concept_agassiz_geological_score]。成功后，他将与其他同行分享研究成果。然而，这并不意味着每次尝试都必然成功——年轻且缺乏经验的地质学家的观点往往不会受到重视。不过，如果多年来没有新理论被提出，其他国家可能会对新的尝试稍微宽容一些。地质学家一生中只能对地球年龄进行一次成功的估算。但这仅适用于成功的情况——如果失败了，他们可以在调整心态后再次尝试。"
 concept_agassiz_geology: "地质学"
 concept_agassiz_geology_desc: "#b 地质学#!是[concept_morgenroete]的主要特色之一。早在维多利亚时代开始之前，地质学就已经经历了显著的发展，这就是为什么在游戏开始时，许多国家都能够研究这门学科。\n\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]可以在多个方面发挥作用：他们能在地质勘探中发现[Concept('concept_dubois_formation','$concept_dubois_formations$')]、[Concept('concept_lepsius_cave','$concept_lepsius_caves$')]和[concept_curie_uranium]矿藏，进行[concept_agassiz_volcano]考察，测定[concept_agassiz_age_of_earth]，寻找新的矿脉和石油储藏，或者作为科学伙伴参与[concept_dubois_pacific_expedition]和[concept_douglas_mountaineering]探险。[concept_agassiz_geological_score]用于评估一个国家的整体地质知识水平，这在确定地球年龄时至关重要。[Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]和[Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]是地质学的核心组成部分；后者可用于在[concept_dubois_zoo]中建立矿石陈列柜。#b $building_agassiz_volcano_observatory$#!是一种专门进行火山学和地震学研究的特殊地质设施。"
 concept_theiler_biologist: "#b #GREEN 生物学家#!#!"
 concept_theiler_biologists: "#b #GREEN 生物学家#!#!"
 concept_theiler_biologist_desc: "A Biologist is an [concept_academics_academic] who researches all aspects of life.\nIn [concept_morgenroete] the Biologist is mostly responsible for researching [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')], improving your Agriculture and finding [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] and [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')].\nBiologists gain [concept_academics_experience] passively or by finishing projects."
 concept_gaudi_architect: "#b #PURPLE 建筑师#!#!"
 concept_gaudi_architects: "#b #PURPLE 建筑师#!#!"
 concept_academics_university_specialization_desc: "每所大学都可以通过改变生产方式来实现专业化。\n拥有[concept_pm_academics_university_humanities]的大学将允许你把国家研究的重点放在社会创新上，并允许专门招募[Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')]和[Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')]。\n拥有[concept_pm_academics_university_natural_history]的大学将允许你把国家研究的重点放在自然历史上，并允许专门招募[Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')]和[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]。\n拥有[concept_pm_academics_university_mathematics]的大学将允许您把国家研究重点放在生产和军事创新上，并允许专门招[Concept('concept_tesla_engineer','$concept_tesla_engineers$')]或[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]。\n改变专业化方向将使大学和你的[concept_academics_progress]获得#n 短期不良影响#!。\n大学专业化会影响相关项目的进展，例如，使用$concept_pm_academics_university_mathematics$的大学就会提高工程项目的进展。"
 concept_pm_academics_university_humanities_desc: "人文科学重心使大学专业化，并使社会研究成为国家重点，专门招收[Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')]和[Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')]。当你改变大学的生产方式时，大学将会获得一个#n 吞吐量减益修正#!并且你的[concept_academics_progress]也会受到#n 不良影响#!。\n大学专注于人文科学领域，可以为考察活动增加成功点（最大四十级，+4），同时提高各类项目的进度。"
 concept_pm_academics_university_natural_history_desc: "A Natural History Focus specializes the University and allowsa national focus on Society Research and to specifically recruit [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')], [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] and [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]. You will get a #n negative throughput modifier#! for the University as well as a #n negative effect#! on your [concept_academics_progress] when you change this production method.\nSpecializing your Universities with the Natural History Focus will give you a bonus to various projects of your Natural scientists."
 concept_pm_academics_university_mathematics_desc: "数学与技术重心使大学专业化，并使军事与生产成为国家重点，专门招[Concept('concept_tesla_engineer','$concept_tesla_engineers$')]或[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]。当你改变大学的生产方式时，大学将会获得一个#n 吞吐量减益修正#!并且你的[concept_academics_progress]也会受到#n 不良影响#!。\n将大学专注于数学与技术领域，可以为您的[Concept('concept_tesla_engineer','$concept_tesla_engineers$')]和[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]参与的各类项目提供额外的助力。"
 concept_panum_physician: "#b #BLUE 医生#!#!"
 concept_panum_physicians: "#b #BLUE 医生#!#!"
 concept_panum_physician_desc: "#b #BLUE 医生#!#!是[Concept('concept_academics_academic','$concept_academics_academics$')]在[concept_panum_medicine]领域从事工作和研究的人员。他们的主要任务是撰写[Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')]、寻找[Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')]，还可以提高医学研究水平，改善医疗保健，治疗其他角色。医生在工作中和每年被动地获得[concept_academics_experience]。他们可以通过获得足够的#b 经验#!来提高医生特质的等级。"
 concept_panum_medicine: "医学"
 concept_panum_medicine_desc: "医学是维多利亚3[concept_morgenroete]的大型扩展之一。本扩展重点之一是流行[Concept('concept_panum_disease','$concept_panum_diseases$')]，#b 例如霍乱、肺结核和斑疹伤寒等疾病#!，这些疾病已经困扰人类几个世纪，最终由科学进步而得到控制。\n\n因此它们将在[concept_morgenroete]中以负面事件出现，玩家通过委托[concept_panum_physician]寻找[concept_panum_disease_treatment]来遏制流行病，这些医师探究疾病找到线索和治疗方法。治疗方法前置条件需要[concept_panum_disease_description]和一项科技。\n\n医师还可以通过医院改进医疗技术研究或扩大医疗保健，以及推广新的医疗技术并治愈其他角色。医学会议有助于在国际上传播医学知识。医学现代化的重要一步也是从瘴气理论向[concept_panum_germ_theory]的转变。在医学发现方面处于领先地位的国家也可以获得高[concept_panum_medical_prestige]。"
 concept_panum_disease: "疾病"
 concept_panum_diseases: "疾病"
 concept_panum_disease_desc: "在赤色晨曦中，疾病机制会在一个国家每隔几年出现疫情，[concept_panum_physician]可以通过制定[Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')]和提供[Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')]来控制它们。\n\n通常情况下疾病不会同时出现，而流行疾病更是需要一段时间才会爆发。根据类型的不同，流行疾病可能会造成毁灭性的影响并蔓延到多个省份。有各种[concept_panum_disease_prevention]方法来延迟爆发或减轻其影响。疾病的诱因可能不同，例如黄热病只发生在热带地区，霍乱和肺结核需要最低城市化才能产生影响。一个国家的生活水平和破坏程度也起着一定的作用。\n\n除了这些特别令人恐惧的流行病之外，医师在医学研究中随机检查的日常疾病还包括佝偻病、糙皮病和梅毒。"
 concept_panum_disease_description: "疾病描述"
 concept_panum_disease_descriptions: "疾病描述"
 concept_panum_disease_description_desc: "疾病描述是理解[concept_panum_disease]的第一步，这些描述对疾病的严重程度没有影响，但对于找到[Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')]、[Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')]和[Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]至关重要，而且疾病描述完成门槛低，只需要有一种流行疾病和[concept_panum_physician]。"
 concept_panum_disease_treatment: "疾病治疗"
 concept_panum_disease_treatments: "疾病治疗"
 concept_panum_disease_treatment_desc: "一名[concept_panum_physician]拥有正确的技术和[concept_panum_disease_description]，历经时间便能找到[concept_panum_disease]的治疗方法。治疗与治愈不同，医师会在治疗的基础上制定方法来预防或限制疾病的爆发，将[concept_panum_disease_prevention]限制在几个月或几周内，并防止其蔓延到多个省份。"
 concept_panum_disease_prevention: "疾病预防"
 concept_panum_disease_prevention_no_disease: "疾病预防"
 concept_panum_disease_prevention_desc: "有几种方法可以避免或至少减轻流行[concept_panum_disease]的危害。最有效的方法是[concept_panum_physician]开发[concept_panum_disease_treatment]，可以大大减少了疾病肆虐的时间，也降低了它传播到另一个地方的可能性。\n\n生活水平、医院、科技和高水平的医疗机构也会产生影响。最终的预防措施是[concept_theiler_vaccine]，它可以从一开始就防止疾病发生。疫苗是由[Concept('concept_theiler_biologist','$concept_theiler_biologists$')]开发的。然而只有当卫生机构至少一定水平时，它才有效。毕竟疫苗的分发需要组织和监督。"
 concept_panum_disease_type: "疾病类型"
 concept_panum_disease_types: "疾病类型"
 concept_panum_disease_type_desc: "流行[Concept('concept_panum_disease','$concept_panum_diseases$')]可根据其分布程度进行区分。#V 地方性疾病#!像是猩红热，仅限于其爆发的省份。#V 区域性疾病#!例如肺结核，可以传播到一些周边省份，但不会传播得更远。#V 跨区域性疾病#!像是疟疾可以传播到全国各地，即使各省份不彼此接壤。"
 concept_panum_local_disease: "地方性疾病"
 concept_panum_local_diseases: "地方性疾病"
 concept_panum_regional_disease: "区域性疾病"
 concept_panum_regional_diseases: "区域性疾病"
 concept_panum_transregional_disease: "跨地域性疾病"
 concept_panum_transregional_diseases: "跨地域性疾病"
 concept_panum_germ_theory: "细菌理论"
 concept_panum_germ_theory_desc: "细菌理论是一项19世纪医学进步，它取代了之前在欧洲广为流传的瘴气理论及其他古老理论，并解释[Concept('concept_panum_disease','$concept_panum_diseases$')]病因。细菌理论的发现不仅使第一个发现者受益，在寻找[Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')]时，成功的概率会略微提高，还可以防止一些负面事件并解锁更多正面事件。"
 concept_panum_medical_prestige: "医学权威"
 concept_panum_medical_prestige_desc: "医学权威是通过[concept_panum_physician]治愈日常疾病、发明特殊治疗方法或全面改善医疗系统获得，完成以下几项分别会获得不同点数的医学权威：[Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')]（2点）、[Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')]（4点）、[Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')]（3点）和[Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]（4点）\n此外首次发现可获得双倍点数。"
 concept_theiler_pathogen: "病原体"
 concept_theiler_pathogens: "病原体"
 concept_theiler_pathogen_desc: "A Pathogen is the name for something that causes a [concept_panum_disease]. This could be anything from an organism to a [concept_theiler_microorganism]. Often it is a Bacterium, parasite or Virus.\nA Biologist with access to enough Microorganisms can try to find the Pathogen that causes a Disease. This can help tp prevent the disease and to discover and produce a [concept_theiler_vaccine]"
 concept_theiler_vaccine: "疫苗"
 concept_theiler_vaccines: "疫苗"
 concept_theiler_vaccine_desc: "The discovery of Vaccines has allowed humans to become immune to [Concept('concept_panum_disease','$concept_panum_diseases$')] without contracting them and can potentially save millions of lives.\nTo create a Vaccine, A [concept_theiler_biologist] must first find the [concept_theiler_pathogen] that causes a Disease. Then the development of a Vaccine can start if enough [Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')] are available."
 concept_panum_red_cross: "红十字会"
 concept_panum_red_cross_desc: "红十字会是最早的国际组织之一，极少数情况下会在战争中提供接收红十字会医护人员的概率。根据游戏规则，红十字会成员还能获得某些奖励，而且红十字会可以按照历史或动态成立；被承认的国家可以在一定的技术要求下加入。创建者可在其首都获得红十字会总部建筑，成员最多可加入三个具有国际法约束力的[Concept('concept_panum_convention','$concept_panum_conventions$')]。"
 concept_panum_convention: "国际公约"
 concept_panum_conventions: "国际公约"
 concept_panum_convention_desc: "国际公约是各国为制定国际规则而共同发布的声明，例如《日内瓦公约》或《海牙公约》。所有这些公约的共同目标都是尽力减轻战争的恐怖。因此，尽管伤员的安全医疗至关重要，但军事行动方案往往更受青睐，而一些强大武器的使用也被禁止，这在一定程度上抑制了战争的升级。这样做的好处是灵活性更大，制定新公约往往会受到欢迎，而废除公约则可能引发国际社会的强烈反应。\n\n国际公约通常不具备强制性约束力，然而，如果有足够多的[concept_panum_red_cross]成员国签署该公约，随着时间的推移，它将逐步成为有效的国际法，所有签署国都必须遵守，而其他国家也可能陆续加入。当65%的成员国及大多数列强达成一致时，其他国家将不得不遵守该公约。为了避免被约束，必须完全退出红十字会，并承担由此产生的一切后果。"
 concept_manzoni_literary_tradition_desc: "#b 文学传统#!代表了国家的文学成就与传统。\n有许多方式获得#b 文学传统#!。拥有至少一座$building_art_academy$、一位或更多[Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')]、一位[concept_manzoni_national_writer]以及特定的[Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')]都会为国家被动增加#b 文学传统#!。\n#b 文学传统#!越高，国家的威望加成就越高，同时也会允许你解锁[concept_elgar_expressionism][concept_artists_art_style]。"
 concept_elgar_musical_tradition_desc: "#b 音乐传统#!代表了国家的音乐成就与传统。\n有许多方式获得#b 音乐传统#!。拥有至少一座[concept_elgar_opera]时，你将被动获得#b 音乐传统#!，并随#b 歌剧院#!的数目增加。你也可以通过音乐与艺术科技获得更多#b 音乐传统#!。每种科技会基于不同的加成。也可以通过事件获得#b 音乐传统#!，特别是在拥有[concept_elgar_composer]时。\n#b 音乐传统#!越高，国家的威望加成就越高，同时也会允许你解锁[concept_elgar_impressionism][concept_artists_art_style]。"
 concept_klimt_painting_tradition_desc: "#b 绘画传统#!代表了国家的绘画成就与传统。拥有#b 艺术学院#!、雇佣[concept_klimt_painter]、研究特定[Concept('concept_technology', '$concept_technologies$')]以及通过某些事件都可以获得绘画传统。\n#b 绘画传统#!可解锁[concept_elgar_art_nouveau][concept_artists_art_style]并用于计算你的#b 文化传统#!。"
 concept_mendelejew_theorized_elements: "已推定元素"
 concept_mendelejew_discovered_elements: "已发现元素"
 concept_mendelejew_isolated_elements: "已分离元素"
 concept_panum_psycho_point: "心理治疗点数"
 concept_panum_psycho_points: "心理治疗点数"
 concept_panum_psycho_point_desc: "心理治疗点数象征着一个国家在精神病学与心理学领域的进步。它们每月通过科技、精神病院或具备#V 精神病学家#! [concept_character_trait]的[concept_panum_physician]生成。此外，心理治疗点数也可以通过特定事件获取。拥有更多的心理治疗点数将显著提高治愈精神疾病患者的成功率。提升心理治疗等级不仅能带来研究加成，还能推动[concept_academics_progress]。大多数心理学派的解锁都需要达到一定的心理治疗点数要求。"
 concept_vikelas_mechanic: "机械师"
 concept_vikelas_mechanic_desc: "乱数假文"
 concept_vikelas_mechanical_innovation: "机械革新"
 concept_vikelas_race_car: "赛车"
 concept_vikelas_race_car_desc: "乱数假文"
 concept_vikelas_race_car_reliability: "赛车可靠性"
 concept_vikelas_race_car_safety: "赛车安全性"
 concept_vikelas_race_car_speed: "赛车速度"
 concept_dubois_dinosaur_bone_no_dinosaur: "骨骼"
 concept_dubois_dinosaur_bones_no_dinosaur: "骨骼"
 concept_dubois_paleontological_expedition_desc: "[concept_dubois_paleontologist]可以被派往[Concept('concept_dubois_formation','$concept_dubois_formations$')]。一年后，根据考察成功与否，你将获得[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]和[Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]。当你完成考察且恰好有一支空闲的[concept_dubois_paleontological_team]时，你可在此设立[concept_dubois_paleontological_excavation]以获取骨骼化石。\n前往地层的最简单方式是控制相关地区，但也可以通过[Concept('concept_dubois_paleontological_licence','$concept_dubois_paleontological_licences$')]来和平取得通行权。"
 concept_dubois_paleontological_team: "古生物考察队"
 concept_dubois_paleontological_teams: "古生物考察队"
 concept_dubois_paleontological_team_desc: "完成一次[concept_dubois_paleontological_expedition]后，古生物考察队能够设立一处[concept_dubois_paleontological_excavation]。如此一来，你便能持续收获[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]以及[Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]。"
 concept_dubois_paleontological_excavation: "古生物发掘点"
 concept_dubois_paleontological_excavations: "古生物发掘点"
 concept_dubois_paleontological_excavation_desc: "若你的[concept_dubois_paleontological_team]空闲，在完成一次[concept_dubois_paleontological_expedition]后，即可开展新的古生物学考察。古生物发掘点将使你的团队持续收获[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]与[Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]。"
 concept_verrier_venus_transit: "金星凌日"
 concept_verrier_venus_transit_desc: "金星凌日是金星运行到太阳和地球之间，三者恰好在一条直线上时，金星挡住部分日面而发生的天象。由于观测金星凌日天象能够帮助我们推断太阳系的大小，并更精确地确定天文单位的大小，因此它曾是重大的科学事件。位于[concept_verrier_venus_transit_zone]的国家可以从那里观测金星凌日；其他国家则必须派出考察队。观测的成功取决于[concept_verrier_astronomer]的经验、[concept_tesla_engineer]的能力以及一些运气：有时天气状况会阻碍拍摄到良好的图像。观测越好，奖励就越大。"
 concept_verrier_venus_transit_zone: "金星凌日区"
 concept_verrier_venus_transit_zone_desc: "金星凌日区是指地球上可以观测到完整（而非部分）金星凌日的区域。1874年，金星凌日主要出现在东亚和太平洋地区；1882年，金星凌日几乎出现在整个美洲大陆。下文将对该区域进行详细划分。\n\n#V 1874年金星凌日区：#!\n印度尼西亚、印度支那、大洋洲、华南、华北、满洲、日本、印度中部、马德拉斯、孟加拉、喜马拉雅山；还有印度洋。\n\n#V 1882年金星凌日区：#!\n巴西、拉普拉塔、安第斯山脉、大哥伦比亚、墨西哥、中美洲、加勒比地区、中西部、迪克西、新英格兰，安大略省和魁北克省。"
 concept_vikelas_coach: "总教练"
 concept_vikelas_coaches: "总教练"
 concept_vikelas_coach_desc: "国家体育总教练是一国在特定国家运动项目中的教练。国家运动项目包括[concept_vikelas_football]、棒球、篮球和板球。总教练会在比赛中为相应的球队提供奖金——无论是在国际世界锦标赛还是国际比赛中。后者会定期秘密进行，获胜后总教练的经验值会增加。高经验值和有正面的[Concept('concept_character_trait','$concept_character_traits$')]会增加赢得世界锦标赛的机会。正面特质是指那些能够激励运动员的特质，例如雄心勃勃或魅力非凡，而负面特质则会降低赢得比赛的机会。这些特质包括冷酷无情或残忍。\n\n#R 注意：目前赤色晨曦只做了足球机制。#!"
 concept_vikelas_football: "足球"
 concept_vikelas_football_desc: "足球有可能成为一项全民运动。首批足球俱乐部可以在欧洲和南美洲建立，但需要相对自由的法律体系、强大的市民阶级和有较高的生活水平。\n之后可以举办足球比赛。随着国际足联的成立，国际比赛和世界杯也成为可能。排名前八的球队将自动获得世界杯参赛资格。球队的排名是根据国家足球队价值来计算的，该价值由生活水平、资产阶级实力（俱乐部体系）、文化水平（战术）和传统（是否是全民运动？）等参数得出。比赛中，不仅要考虑足球队价值，还要考虑[concept_vikelas_coach]的性格特征和经验。"
 concept_gaudi_architectural_splendour: "建筑辉煌"
 concept_gaudi_architectural_splendour_desc: "“建筑辉煌”是对现代建筑领域辉煌进步的统称，主要指20世纪初兴起的装饰艺术、包豪斯和新古典主义。其价值体现了将过时的建筑形式转变为面向未来的建筑。装饰艺术需要达到更高的门槛才能实现装饰艺术城市的梦想，但其带来的益处也更大。"
 concept_artists_artist_desc: "在[concept_morgenroete]中，#b 艺术家#!是一些可以让MOD中的某些机制运行的特殊角色。你可以通过某些活动或获得足够的[concept_artistic_progress]来获得#b 艺术家#!。艺术家的[concept_artists_experience]可以反映他们的水准。\n目前#b 艺术家#!有以下几种类型：\n[concept_elgar_composer]\n[concept_klimt_painter]\n[concept_manzoni_writer]\n[concept_gaudi_architect]"
 concept_elgar_architecture_desc: "建筑学是[concept_morgenroete]的主要特色之一，其可分为两大组成部分：\n\n其一，[concept_gaudi_monuments]已完全重构——不再直接建造，而是通过决议逐步扩建；其二，新增大量奇观建筑，部分需玩家建造，部分在游戏初始即存在。\n\n另一关键创新是引入[concept_gaudi_architect]，可通过研究[Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')]升级城市并设计最多15种独特建筑。建筑师还能以包豪斯、新古典主义及装饰艺术风格重塑国家风貌。[concept_gaudi_great_architect]更可定制专属的[concept_gaudi_custom_monument]！"
 concept_gaudi_architect_desc: "#PURPLE #b 建筑师#!#!是[Concept('concept_artists_artist','$concept_artists_artists$')]，其技能涉及城市规划、建筑设计和施工，可以通过事件、积累足够的[concept_artistic_progress]在国家中出现或向[concept_gaudi_independent_architect]提供职位来获得。\n\n虽然其他艺术家可以积累产出文化传统，但建筑师在参与城市规划或首都扩建、或改造国家时会产生及其宝贵的[concept_gaudi_architectural_splendour]，因此他们的任务更具实用性，通过从事公共建设，为国家提供额外的建造点数。通过规划改善基础设施，并将首都提升为宜居之地。建筑师还可以通过游学磨练技能或撰写建筑论文。\n\n最重要的是设计新的独特建筑，为此他们会创建[concept_gaudi_architectural_blueprint]。总共可以研究15种[concept_gaudi_blueprint_buildings]，不过由于建造漫长，因此你需要考虑哪些值得建造。\n\n建筑师还提供被动加成：他们本身就能将[concept_gaudi_monuments]的建造速度提高100%。建筑师的最大成就是设计自己的[concept_gaudi_custom_monument]。这只有[concept_gaudi_great_architect]才能实现。"
 concept_douglas_mountaineering: "登山"
 concept_douglas_mountaineering_desc: "拥有至少一座[concept_douglas_mountain_summit]或与拥有山脉的国家签订#b 登山许可#!的国家可以参与登山活动。要发起#b 登山探险#!，你需要同时研究#b 勘探#!与#b 民族主义#!科技，且需任命拥有#b 登山家#!、#b 探险家#!、#b 山地指挥官#!或#b 测绘师#!特质的将领。\n\n当启动#b 登山探险#!时，需首先选定主登山将领，随后确定目标峰顶。海拔越高攀登风险越大，山脉按海拔高度分级（4000米以下至8000米以上）。成功率受军事科技、将领年龄、健康状况及特性影响，雪崩与陡坡等地形威胁可能造成重大风险。\n\n你可额外派遣[Concept('concept_academics_academic','$concept_academics_scientist$')]随行，选择[concept_dubois_naturalist]或[concept_dubois_paleontologist]将有助于山地科考。最终可获得威望奖励，且将领将获得适用于山地作战与攀登的双重特质强化。\n\n最终你将获得威望加成，将领也会有新特质。"
 concept_gaudi_great_architect: "#PURPLE #b 建筑大师#!#!"
 concept_gaudi_great_architects: "#PURPLE #b 建筑大师#!#!"
 concept_gaudi_great_architect_desc: "#b 建筑大师#!是[Concept('concept_gaudi_architect','$concept_gaudi_architects$')]领域内公认的顶尖人物。#b 建筑师#!达到500[concept_artists_experience]即成为#b 建筑大师#!。如果艺术家获得这一特殊称号，那么其可以设计一座[concept_gaudi_custom_monument]蓝图，以体现民族精神。"
 concept_gaudi_monuments: "#R 赤色晨曦#!的奇观"
 concept_gaudi_monuments_desc: "[concept_morgenroete]中许多国家获得了新的#b 奇观#!：德意志的#b 科隆大教堂#!。瑞士的#b 圣哥达铁路#!、巴西的#b 救世基督像#!、意大利的#b 安托内利尖塔#!、奥地利的#b 维也纳环城大道#!、中国的#b 圆明园#!、西班牙的#b 圣家堂#!、巴伐利亚的#b 新天鹅堡#!、墨西哥的#b 美术宫#!以及朝鲜的#b 景福宫#!。\n除#b 圆明园#!、#b 萨克森宫#!及#b 圣马可钟楼#!外的所有建筑都需要由所有者建造，此外#b 萨克森宫#!可由波兰国家激活。游戏初始即包含#b 巴米扬大佛#!与#b 布达拉宫#!等新增奇观。\n玩家还可通过[concept_gaudi_great_architect]设计专属的[concept_gaudi_custom_monument]。\n\n与原版系统不同，#b 奇观#!不再可直接建造，而是通过决议逐步扩建。根据建筑规模差异，建造过程可能持续数年甚至数十年，且成本显著提升。"
 concept_athletes_athlete: "运动员"
 concept_athletes_athletes: "运动员"
 concept_athletes_athlete_desc: "在[concept_morgenroete]中，#b 运动员#!是一些可以让MOD中的某些机制运行的特殊角色。你可以通过某些事件或招募来获得#b 运动员#!。运动员的经验可以反映他们的水准。\n目前#b 运动员#!有以下几种类型：\n[concept_curtiss_balloonist]\n[concept_curtiss_pilot]\n[concept_vikelas_olympian]\n[concept_douglas_mountaineer]\n[concept_vikelas_coach]\n[concept_vikelas_racer]"
 concept_gaudi_independent_architect: "独立建筑师"
 concept_gaudi_independent_architects: "独立建筑师"
 concept_gaudi_independent_architect_desc: "未被国家聘用的[Concept('concept_gaudi_architect','$concept_gaudi_architects$')]即为#b 独立建筑师#!。与其他艺术家不同，招募#b 独立建筑师#!除最低科技要求外几无限制。他们堪称真正的世界公民，通常仅需丰厚报酬即可合作。"
 concept_gaudi_architectural_blueprint: "建筑蓝图"
 concept_gaudi_architectural_blueprints: "建筑蓝图"
 concept_gaudi_architectural_blueprint_desc: "[Concept('concept_gaudi_architect','$concept_gaudi_architects$')]可绘制建筑蓝图，这些蓝图对建造全国限建一座的[concept_gaudi_blueprint_buildings]至关重要。共有5大类15种特殊建筑，部分蓝图需先解锁相关科技。因研发可能耗时数年，提前规划蓝图优先级至关重要。此类建筑理论上可建于任何地区，但需满足一定城市化水平，部分建筑另有特殊要求。"
 concept_gaudi_blueprint_buildings: "蓝图建筑"
 concept_gaudi_blueprint_buildings_desc: "蓝图建筑需由[Concept('concept_gaudi_architect','$concept_gaudi_architects$')]研发对应蓝图方可建造，每地区同类建筑限建一座。共15种建筑分为五大类：\n\n#b 纪念类#!\n[GetBuildingType('building_gaudi_statue').GetName]\n[GetBuildingType('building_gaudi_fountain').GetName]\n[GetBuildingType('building_gaudi_arch').GetName]\n\n#b 广场类#!\n[GetBuildingType('building_gaudi_park').GetName]\n[GetBuildingType('building_gaudi_luna').GetName]\n[GetBuildingType('building_gaudi_parade').GetName]\n\n#b 服务类#!\n[GetBuildingType('building_gaudi_almshouse').GetName]\n[GetBuildingType('building_gaudi_school').GetName]\n[GetBuildingType('building_gaudi_prison').GetName]\n\n#b 医疗类#!\n[GetBuildingType('building_gaudi_canalization').GetName]\n[GetBuildingType('building_gaudi_hospital').GetName]\n[GetBuildingType('building_gaudi_health').GetName]\n\n#b 学术类#!\n\n[GetBuildingType('building_gaudi_science').GetName]\n[GetBuildingType('building_gaudi_arts').GetName]\n[GetBuildingType('building_gaudi_sports').GetName]"
 concept_gaudi_custom_monument: "定制奇观"
 concept_gaudi_custom_monument_desc: "定制奇观是[concept_gaudi_architect]所能创作的终极杰作，其价值可超越一般奇观。唯有[concept_gaudi_great_architect]方能设计此类建筑，且需掌握最前沿的建筑科技。建筑师的设计风格将决定奇观类型：\n\n装饰艺术派 ： [GetBuildingType('building_gaudi_people_monument').GetName]\n包豪斯派： [GetBuildingType('building_gaudi_people_forum').GetName]\n新古典主义派 ： [GetBuildingType('building_gaudi_people_palace').GetName]"
 concept_douglas_mountaineer: "登山家"
 concept_douglas_mountaineers: "登山家"
 concept_douglas_mountaineer_desc: "#b 登山者#!也是[Concept('concept_athletes_athlete','$concept_athletes_athletes$')]，能够攀登尚未被征服的[concept_douglas_mountain_summit]。他们可以在登山协会成立后，花费[concept_douglas_alpine_heritage]招募。拥有山脉、高峰或火山等地形特征的国家，在招募登山者方面具有优势。登山技能特质与经验是征服一座山峰或在危险环境中生存下来的最关键因素。"
 concept_vikelas_olympian: "奥林匹斯"
 concept_vikelas_olympian_desc: "#n 该条目正在修改。#!"
 concept_douglas_mountain_summit: "山峰"
 concept_douglas_mountain_summits: "山峰"
 concept_douglas_mountain_summit_desc: "山峰是所有登山者梦寐以求的目标，标志着山脉的最高点。每座山峰由三大属性定义攀登难度：\n\n#V 海拔#!：决定攀登所需步数——反映远征整体时长。每1000米需1个进度步（向上取整）。如4421米的惠特尼峰需5步，7134米的考夫曼峰需8步。攀登山峰所获声望值=高度/300，如4500米高峰可获15声望。\n\n#V 装备等级#!：代表装备需求强度，与高度无必然关联。如海拔5636米的奥里萨巴山仅需基础装备（等级1），而4478米的马特洪峰则需高山急救准备（等级3）。\n\n#V 风险#!：指远征遭遇负面事件的概率，独立于高度和等级。雪崩、浓雾与极端天气是主要威胁。波波卡特佩特火山因环境友好早在近代即可登顶，而仅3666米的大韦内迪格山直至19世纪初仍对奥地利远征队构成致命威胁。\n\n更多山峰详情请查阅[concept_douglas_mountain_summit_list]。"
 concept_douglas_mountain_range: "山脉"
 concept_douglas_mountain_ranges: "山脉"
 concept_douglas_mountain_range_desc: "山脉指适合开展长距离[concept_douglas_mountaineering]训练的山地构造，经典代表包括落基山脉、安第斯山脉、阿尔卑斯山脉及高加索山脉。与需征服的[Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]不同，此类区域多含低风险山峰，可视为训练路线——[concept_douglas_mountaineer]几乎无坠落致命风险。拥有山脉的国家更易培养登山人才。"
 concept_douglas_alpine_heritage: "阿尔卑斯传承"
 concept_douglas_alpine_heritage_desc: "阿尔卑斯传承是与山脉建立联结并专精登山技术的统称，亦代表招募新[Concept('concept_douglas_mountaineer','$concept_douglas_mountaineers$')]的潜力——因多数资深登山者皆源自山区。拥有[Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')]或[Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]的国家将永久享有此项优势。需注意：招募登山者及多项行动均需消耗阿尔卑斯传承值。"
 concept_douglas_mountain_summit_list: "山峰名录"
 concept_douglas_mountain_summit_list_desc: "世界上有许多可供攀登征服的[Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]。\n\n#V 北美洲：#!\n#b 麦金利山#!（阿拉斯加），6190米\n#b 洛根山#!（育空领地），5959米\n#b 奥里萨巴山#!（墨西哥），5636米\n#b 惠特尼峰#!（加利福尼亚），4421米\n\n#V 南美洲：#!\n#b 阿空加瓜山#!（门多萨），6267米\n#b 瓦斯卡兰山#!（利马），6768米\n#b 伊宜马尼峰#!（拉巴斯），6438米\n#b 钦博拉索山#!（厄瓜多尔），6267米\n\n#V 欧洲：#!\n#b 希卡拉陶山#!（大高加索），5642米\n#b 杜富尔峰#!（瑞士），4634米\n#b 马特洪峰#!（瑞士西部），4478米\n#b 艾吉耶维尔特山#!（萨伏依），4122米\n#b 阿内托峰#!（阿拉贡），3404米\n\n#V 非洲：#!\n#b 基博峰#!（坦噶尼喀），5895米\n#b 肯尼亚山#!（肯尼亚），5199米\n#b 斯坦利山#!（乌干达），5109米\n#b 喀麦隆火山#!（南喀麦隆），4095米\n\n#V 亚洲：#!\n#b 卡美特山#!（德里），7756米\n#b 乔戈里萨峰#!（克什米尔），7665米\n#b 卡布鲁峰#!（喜马拉雅），7412米\n#b 考夫曼山#!（塔吉克斯坦），7134米\n\n#V 澳大利亚&大洋洲：#!\n#b 威廉山#!（东新几内亚），4121米\n#b 库克山#!（南岛），3724米"
 concept_panum_disease_description_describe: "描述"
 concept_panum_disease_description_described: "已描述"
 concept_panum_disease_treatment_treat: "治愈"
 concept_panum_disease_treatment_treated: "已治愈"
