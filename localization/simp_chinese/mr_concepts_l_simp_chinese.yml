 concept_roy_ethnologists: "#b #ORANGE 民族学家#!#!"
 concept_roy_ethnologist_desc: "#n 即将被添加到赤色晨曦#!"
 ag_morgenroete_desc: "[concept_morgenroete]警报可开启。"
 concept_tesla_engineer: "#b #ORANGE 工程师#!#!"
 concept_tesla_engineers: "#b #ORANGE 工程师#!#!"
