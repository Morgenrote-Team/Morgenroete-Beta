 concept_tesla_civil_engineering: "#b #ORANGE 土木工程#!#!"
 concept_tesla_mechanical_engineer: "#b #ORANGE 机械工程师#!#!"
 concept_tesla_mechanical_engineers: "#b #ORANGE 机械工程#!#!"
 concept_tesla_mechanical_engineering: "#b #ORANGE 机械工程#!#!"
 concept_tesla_military_engineer: "#b #ORANGE 军事工程师#!#!"
 concept_tesla_military_engineers: "#b #ORANGE 军事工程师#!#!"
 concept_tesla_military_engineering: "#b #ORANGE 军事工程#!#!"
 concept_tesla_electrical_engineer: "#b #ORANGE 电气工程师#!#!"
 concept_tesla_electrical_engineers: "#b #ORANGE 电气工程师#!#!"
 concept_tesla_electrical_engineering: "#b #ORANGE 电气工程#!#!"
 concept_tesla_aeronautical_engineer: "#b #ORANGE 航空工程师#!#!"
 concept_tesla_aeronautical_engineers: "#b #ORANGE 航空工程师#!#!"
 concept_tesla_aeronautical_engineering: "#b #ORANGE 航空工程#!#!"
 concept_tesla_engineering: "工程学"
 concept_tesla_engineering_desc: "#b 工程学#!是[concept_morgenroete]的主要特色之一。\n\n你需要拥有一位[concept_tesla_engineer]来开启#b 工程学#!特色。#b 工程师#!可以根据他们的不同专业进行不同的#b 工程项目#!。共有五种不同的#b 工程师#!：\n[concept_tesla_civil_engineer]专注于改进国家基础设施。\n[concept_tesla_mechanical_engineer]专注于有益于工业生产的机械发明。\n[concept_tesla_military_engineer]专注于改进国家陆军和海军的装备。\n[concept_tesla_electrical_engineer]专注于国家的电气基础设施建设。\n[concept_tesla_aeronautical_engineer]专注于人类航空事业，包括但不限于飞行器的改进。"
 concept_tesla_engineer_desc: "#b #ORANGE 工程师#!#!是使用专业能力帮助建造特殊建筑的学者。\n额外的#b #ORANGE 工程师#!#!将为你的国家的[concept_technology_spread]提供增益，该增益的效果有多少国家的科技研究领先于你。"
 concept_tesla_civil_engineer_desc: "#b 土木工程师#!专注于改进国家基础设施。\n他们可以进行如下#b 工程项目#!：给予[Concept('concept_modifier','$concept_modifiers$')]（增加国家的[concept_infrastructure]）、改进#b 建造部门#!、研究[Concept('concept_technology', '$concept_technologies$')]。"
 concept_tesla_mechanical_engineer_desc: "#b 机械工程师#!专注于有益于工业生产及日常生活的机械发明。\n他们可以进行如下#b 工程项目#!：给予[Concept('concept_modifier','$concept_modifiers$')]（增加工业建筑的[concept_throughput]、[concept_good_production]及[concept_input_mult]）、使用新机车改进#b 铁路#!、研究[Concept('concept_technology', '$concept_technologies$')]。"
 concept_tesla_military_engineer_desc: "#b 军事工程师#!专注于通过新发明改进国家陆军和海军的装备。\n他们可以进行如下#b 工程项目#!：通过发明武器、工事及更好的坦克来获得新的[Concept('concept_mobilization_option','$concept_mobilization_options$')]、研究陆海军[Concept('concept_technology', '$concept_technologies$')]。"
 concept_tesla_electrical_engineer_desc: "#b 电气工程师#!专注于通过电气发明来改进国家。\n他们可以进行如下#b 工程项目#!：研究地球产生的磁场、建设无线电通讯网络、研究电气[Concept('concept_technology', '$concept_technologies$')]。"
 concept_tesla_aeronautical_engineer_desc: "#b 航空工程师#!专注于专注于开发飞行方法并改进飞机和齐柏林飞艇。\n他们可以进行如下#b 工程项目#!：给予[Concept('concept_modifier','$concept_modifiers$')]（增加#V 机场#!的[concept_throughput]、[concept_good_production]及[concept_input_mult]）、解锁[Concept('concept_mobilization_option','$concept_mobilization_options$')]#V 改进飞行器#!、研究航空[Concept('concept_technology', '$concept_technologies$')]。"
 concept_vikelas_national_sport: "国民体育项目"
 concept_vikelas_national_sport_desc: "任何国家均可将以下运动之一设为其国民体育项目：板球、棒球、足球或篮球。这四项运动中除板球外，其余三项均诞生于19世纪。最先发明某项运动的国家被视为该运动的“母国”。此后，运动开始向全球传播，但传播条件不尽相同：板球与棒球的传播范围较有限，而足球与棒球的传播限制相对宽松。宗主国可通过向属国推广运动以改善关系。不同运动可在同一国家共存，但若要在全国所有体育设施中普及，则必须成为该国的国家运动。"
 concept_theiler_microorganism: "微生物"
 concept_theiler_microorganisms: "微生物"
 concept_theiler_microorganism_desc: "Microorganisms are tiny organisms like bacteria, viruses and single celled organisms.\nThey can be found by a [concept_theiler_biologst] through the $je_theiler_microorganism_research$ [concept_journal_entry] which Biologists conduct when they are not busy.\nMicroorganisms can mainly be used to discover [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] and [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] which help a country to protect their population from [Concept('concept_panum_disease','$concept_panum_diseases$')]."
 concept_theiler_biology: "生物学"
 concept_theiler_biology_desc: "#n 即将被添加到赤色晨曦#!"
 concept_ito_medicinal_plants: "Medicinal Plants"
 concept_ito_medicinal_plants_desc: "Medicinal Plants are plants that have medicinal properties which can be used to create pharmaceuticals and other useful chemicals.\nYou can gather Medicinal Plants by sending a [concept_dubois_naturalist] on a [concept_dubois_botanical_expedition]. Once enough Medicinal Plants are gathered a [concept_mendelejew_chemist] can start to isolate the chemical substance. Once that is done a [concept_theiler_biologist] will be able to start producing a pharmaceutical"