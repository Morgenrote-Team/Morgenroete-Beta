 je_mr_archaeology: "考古学"
 je_mr_archaeology_reason: "19世纪和20世纪初是文物研究飞速发展的时代，挖掘宝藏转变成严肃的科学研究。海因里希·施里曼发掘特洛伊与霍华德·卡特发现图坦卡蒙墓是这一时期最著名的两件创举。同时它们也表明，在发掘珍贵文物的过程中，国家的声望发挥着与求知欲同等重要的作用。1837年，卡尔·理查德·累普济乌斯几乎完全破译了埃及象形文字，新时代从此开始。"
 mr_romantic_composer_button: "雇用一位新[concept_elgar_composer]（浪漫主义）"
 mr_composer_button_desc: "与[Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')]不同，普通[Concept('concept_elgar_composer','$concept_elgar_composers$')]负责日常运营。他们可以被聘为指挥，并给他们的国家带来被动的[concept_elgar_musical_tradition]奖励。每场音乐会可以聘请3次作曲家，这需要研究特定科技（浪漫主义、非理性主义、新古典主义/新客观主义/装饰风艺术）。一个国家只能养活一个普通的作曲家，需要对国家的音乐文化进行十年的投资。"
 mr_wagnerian_composer_button: "雇佣一位新[concept_elgar_composer]（非理性主义）"
 mr_modern_composer_button: "雇佣一位新[concept_elgar_composer]（现代主义）"
 mr_appoint_conductor_button: "任命首席指挥"
 mr_appoint_conductor_button_desc: "首席指挥掌管着国家的音乐事业，特别是在国家[Concept('concept_elgar_opera','$concept_elgar_opera_house$')]中。在歌剧院里，他们可以被委托完成一项为期三年的具体任务：指挥、作曲或巡演。这样，他们就与[Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')]相似，尽管他们对[concept_elgar_musical_tradition]的获得会相对比较少。"
 mr_national_conservatory_button: "成立国家音乐学院"
 mr_national_conservatory_button_desc: "国家音乐学院会随着时间的推移，让具有作曲家特质的人物有可能出现（这个概率非常小），而不需要雇用他们。如果我们有芭蕾舞学校，这个概率可以提高。"
 mr_santa_cecilia_button: "将圣切契利亚提升到学院级别"
 mr_santa_cecilia_button_desc: "圣切契利亚会由教宗西斯笃五世于1585年发布的诏书——《属地管辖权》创立，该诏书援引了两位著名和音乐有关的圣人，1838年，圣切契利亚会被正式命名为圣切契利亚学院，然后是教宗学院。当时的成员包括路易吉·切鲁比尼、梅卡丹特、多尼采蒂、罗西尼、帕格尼尼、奥贝尔、李斯特、门德尔松、柏辽兹、古诺和梅耶贝尔。它的荣誉成员之一是维多利亚女王，随后在统一的意大利，它发展成为一个领先世界的音乐学院。"
 mr_leipzig_conservatory_button: "成立莱比锡音乐学院"
 mr_leipzig_conservatory_button_desc: "约翰·塞巴斯蒂安·巴赫曾在此留下不朽创作，音乐之城莱比锡是19世纪初培养音乐和学术人才的最佳地点。四位坚定的城市公民，即律师海因里希·康拉德·施莱尼茨（第二任主任）、莱比锡地区州长约翰·保罗·冯·法尔肯斯坦和皇家萨克森法院议员约翰·格奥尔格·凯尔以及布商大厦管弦乐团音乐家费利克斯·门德尔松·巴托尔迪开始资助与培养新人才。"
 mr_petrograd_conservatory_button: "成立圣彼得堡音乐学院"
 mr_petrograd_conservatory_button_desc: "圣彼得堡音乐学院创立于1862年，是在原俄罗斯音乐协会的基础上创建的。安东.鲁宾斯坦是学院的创立发起者，也是学院的第一任艺术总监和第一位钢琴专业教授。\n圣彼得堡（列宁格勒）音乐学院建立起，具有明显特色的俄罗斯音乐演奏风格由几代俄罗斯歌唱家、钢琴家、指挥家、弦乐、管乐演奏家信逐渐发展起来。他们在帝国时代，在私营歌剧公司，各种演出场合，管弦乐及合唱队与外国同行们进行了成功的竞争。大批来自意大利、波西米亚及德国等地的音乐家涌入俄国。他们定在俄国长期学习、研究俄罗斯音乐。到了十九世纪初，圣彼得堡已经能够与维也纳、巴黎、布拉格、伦敦及柏林平起平坐，展开了向世界艺术家的竞争。正是这样，于1824年贝多芬第九交响乐的第二场演出。曾经来圣彼得堡访问演出的著名音乐家有：李斯特、柏辽兹、舒曼、瓦格纳等。贝多芬就是在这儿获取了撰写弦乐四重奏的委托书。威尔第在此获取了为歌剧谱曲的委托。自那时起，圣彼得堡显为人知的作曲学校出现了。以伟大的民族作曲家德米特·伯特杨斯基，亚力山大·达勒加莫目斯基，米哈依·格林卡的具有当俄罗斯民族音乐特征的作品为基础状大、发展起来了。"
 mr_bayreuth_button: "举办理查德·瓦格纳音乐节"
 mr_bayreuth_button_desc: "理查德·瓦格纳长期以来一直梦想着拥有属于自己的音乐大厅，每年在这里演出他最伟大的作品。这样一个地方可以迅速成为所有音乐爱好者的朝圣之地，并将成为纪念他的纪念馆。"
