 dlc_morgenrote: "赤色晨曦——维多利亚风味包"
 dlc_morgenrote_desc: "赤色晨曦是一个旨在通过文化、奇观及不同的生活方式来丰富V3世界的mod。我们并不是靠重绘地图或者改进经济系统来达成这一目的，而是通过完善所有影响维多利亚世纪的元素，它们在之前无趣的游戏世界中只是乏善可陈。在赤色晨曦中，你将能享受更具沉浸感的科学考察，通过文化来增加国家威望，以及培养属于你的艺术家和科学家。\n\n别担心，赤色晨曦#p 已启用#!。"
 rule_mr_tech_bonus_rule: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon!#!科技研究增益"
