 je_mr_scientific_conferences: "学术会议"
 je_mr_scientific_conferences_reason: "地球有多古老？人类从何处来？《圣经》作为史料的可信度有多高？宇宙是否无限大——星系究竟是什么？一百年来，不仅科学本身，人们对世界的看法也发生了重大变化。进化论和相对论一样动摇了人类一度确信的概念。学术会议旨在通过国际科学家的讨论来澄清一些基本问题。"
