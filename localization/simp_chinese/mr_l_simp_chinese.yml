 objective_thriving_culture_name_BAV: "巴伐利亚"
 objective_thriving_culture_desc_BAV: "文化上，巴伐利亚一向是德意志诸侯中数一数二的强国。十九世纪时期，慕尼黑的艺术与建筑学十分繁荣。除去瓦尔哈拉神殿和新天鹅堡，巴伐利亚还第一次出土了始祖鸟化石，慕尼黑分离派在此发源，并且卡尔·施皮茨韦格也出生于此。作为一个中等体量的德意志诸侯，巴伐利亚能否以科学与艺术而非大炮和刺刀来抵御强邻？"
 objective_thriving_culture_name_MEX: "墨西哥"
 objective_thriving_culture_desc_MEX: "乍一看，墨西哥似乎不是个以繁荣文化为目标的好选择。但是，墨西哥国土上近乎无穷的古代遗迹却让此充满希望。理论上，墨西哥甚至还能打通西北航道。如果这个被危机动荡的国家能达成大同，美术宫的落成将为其加冕。"
 je_mr_morgenrote_introduction_reason: "[concept_morgenroete]是一个专注于科学、艺术和文化的mod，囊括了许多内容与新机制。为了高屋建瓴地了解这个mod，可以多看概念解释、或是通过菜单中的维基百科以及将鼠标悬停于——[Concept('concept_morgenroete','$concept_morgenroete_concept$')]——之上。\n该日志条目中的按键及侧边栏的按键均可使用。"
 je_objective_cradle_of_culture_tt: "成为第一个研究#ORANGE 印象派#!、#ORANGE 表现主义#!或#ORANGE 新艺术#!的国家。"
