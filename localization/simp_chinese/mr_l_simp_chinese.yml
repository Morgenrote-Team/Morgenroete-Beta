l_simp_chinese:
 objective_thriving_culture: "繁荣文化"
 objective_thriving_culture_desc: "蛮族的国家亦可开疆拓土，但高等文明则作为科学与文化之邦屹立于世。挖掘宝藏，发现星辰，聘请作曲家，收集异域生物，开展科研旅行，或是在飞行的时代创造纪录。崭新的黎明即将降临！"
 objective_thriving_culture_name_AUS: "奥地利"
 objective_thriving_culture_desc_AUS: "让别人去打仗，你，幸运的奥地利，去结婚吧！奥地利的时代已经终结了吗？维也纳会议与梅特涅最后一次将这个国度推向欧洲舞台的中央，但普鲁士与俄罗斯的野心使哈布斯堡帝国的妥协政策岌岌可危。奥地利能否一如既往地成为万众瞩目的文化与生活中心，从而在未来再度凯旋？捍卫维也纳作为音乐之都的声誉，并将其发展为欧洲最具吸引力的城市。"
 objective_thriving_culture_name_BEL: "比利时"
 objective_thriving_culture_desc_BEL: "比利时不仅是一个雄心勃勃的经济强权，在科学领域也面对着诸多走向繁荣的路径：通过古生物学、天文学与太平洋探险，纵然是小国也可以牢牢巩固其他国家为之兵戈相向的声誉。刚果这片平平无奇的殖民领能否成为植物学考察的目的地？而布鲁塞尔，这作曲家巡演途中的中转站，是否会为这个国家建立起自己的音乐传统？"
 objective_thriving_culture_name_SAR: "撒丁‑皮埃蒙特"
 objective_thriving_culture_desc_SAR: "撒丁‑皮埃蒙特发觉自己正处于两难境地：它既要尝试集结政治与军事力量统一意大利，又不可辜负意大利作为文化之邦的美誉。一个统一的意大利将取得新的机遇，建造安托内利尖塔，创造音乐成就，并在施耐德杯上谱写飞行纪录。"
 objective_thriving_culture_name_SWI: "瑞士"
 objective_thriving_culture_desc_SWI: "作为内陆国的瑞士在探险领域或许先天不足，但其国境之内也蕴含着巨大的潜力。推广古典音乐的明智决定可能说服有史以来最大作曲家之一在阿尔卑斯之国定居。拥有地层对古生物学大有助益。而阿尔弗雷德·埃舍尔曾经设想过一个世纪计划：一条穿越山脉的巨大隧道……"
 objective_thriving_culture_idle_header: "继续前进"
 objective_thriving_culture_idle_hint: "接下来将会出现更多的挑战"
 thriving_culture_welcome: "欢迎游玩赤色晨曦！"
 thriving_culture_welcome_desc: "祝贺你选择了文化道路！这正是“赤色晨曦”的方案。尝试完全依赖文化与科学的手段，和平地将国家推向世界之巅。"
 thriving_culture_lesson_button_skip: "加油！"
 thriving_culture_complete_desc: "恭喜！你的国家真是这个时代的文化先锋！不过，你真的发现了赤色晨曦的每个方面吗？你到过地心旅行吗？失落的世界被重新发现了吗？找到亚特兰蒂斯？发现了香格里拉？没有吗？那怎么能说你已经完成了呢！"
 thriving_culture_lesson_button_complete: "还有更多？"
 je_objective_promote_an_academic: "培养一位[concept_academics_academic]"
 je_objective_promote_an_academic_reason: "想要开展丰富多彩的科学与文化活动，一位学者是必不可少的。"
 je_objective_a_great_step_forward: "向前一大步"
 je_objective_a_great_step_forward_reason: "我们的国家应当发现一项关键的科学技术，在历史上树立一座里程碑。"
 je_objective_a_great_step_forward_theory_of_evolution_tt: "首先发现#b 进化论#!。"
 je_objective_a_great_step_forward_early_archaeology_tt: "首先发现#b 早期考古学#!。"
 je_objective_a_great_step_forward_modern_astronomy_tt: "首先发现#b 现代天文学#!。"
 je_objective_a_great_step_forward_steel_frame_tt: "首先发现#b 钢框架结构建筑#!。"
 je_objective_major_discovery: "一个重大发现"
 je_objective_major_discovery_reason: "我们时代的浮士德精神呼唤着极致的尝试。我们应该为民族荣耀做出伟大的发现！"
 je_objective_go_on_scientifical_expedition: "资助科学考察"
 je_objective_go_on_scientifical_expedition_reason: "科学考察是学者持续开展研究并丰富我们的博物馆藏品的基础。我们应该尽快聘请一位学者来进行考察。"
 je_objective_go_on_scientifical_expedition_archaeology: "开启[concept_lepsius_expedition]。"
 je_objective_go_on_scientifical_expedition_paleontology: "开启[concept_dubois_paleontological_expedition]。"
 je_objective_go_on_scientifical_expedition_botany: "开启[concept_dubois_botanical_expedition]。"
 je_objective_go_on_scientifical_expedition_pacific: "开启[concept_dubois_pacific_expedition]。"
 je_objective_dawn_of_a_new_era: "新时代的曙光"
 je_objective_dawn_of_a_new_era_reason: "19世纪，纯粹出于热情的收藏为科学方法和系统理论所取代。地球上已经没有无法触及的角落，多么黑暗的过去也不再显得深不可测。一切事物都可以得到测量、分析和解释。现在是时候创建一个科学收藏来实现这一目标了。"
 dawn_of_new_era_fossil_tt: "收集#G 25件#![Concept('concept_dubois_fossil','$concept_dubois_fossils$')]。"
 dawn_of_new_era_specimen_tt: "收集#G 35000件#![Concept('concept_dubois_specimen','$concept_dubois_specimens$')]。"
 dawn_of_new_era_artifacts_tt: "收集#G 50件#![Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]。"
 dawn_of_new_era_astronomical_objects_tt: "测绘#G 75个#![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]。"
 je_objective_more_than_politics: "胜于政治"
 je_objective_more_than_politics_reason: "与卑劣的权力斗争相比，美与真理具有更大的价值。建设重要的科学和文化机构应是真正名留青史的标志。"
 je_objective_assemble_dinosaur_skeleton: "复现恐龙"
 je_objective_assemble_dinosaur_skeleton_reason: "我国的古生物学工作不容忽视。一具气势恢宏的恐龙骨架可能就是精美收藏的开始！"
 je_objective_relevant_culture: "与国际接轨的文化"
 je_objective_relevant_culture_reason: "我们已经在国内展示了对艺术和科学的亲和力，但要让全世界都了解这一点还需继续努力——至于专攻哪个领域，完全取决于我们自己。"
 relevant_culture_astronomy_tt: "举办#O 天文大会#!。"
 relevant_culture_music_tt: "拥有#O 地区级重要#!的[concept_elgar_musical_tradition]。"
 je_objective_cradle_of_culture: "文化摇篮"
 je_objective_cradle_of_culture_reason: "新的艺术形式正在取代历史主义、风格主义和现实主义等僵化的艺术形式。新纪元已经来临。我们的国家必须站在这全新黎明的前列，成为前卫艺术的旗舰！"
 je_objective_thriving_culture: "繁荣文化"
 je_objective_thriving_culture_reason: "为了成为世界上最重要的文化国家，我们必须全方位地展示我们的审美意识和科学见解。"
