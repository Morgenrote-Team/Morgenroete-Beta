 setting_mr_tech_normal_rule_desc: "赤色晨曦中的许多事件将给予科技研究增益，该选项将使用#V 高增益#!。"
 setting_mr_tech_half_rule: "#n 中#!#V 增益#!"
 setting_mr_tech_half_rule_desc: "赤色晨曦中的许多事件将给予科技研究增益，该选项将使用#n 中等增益#!。这可能导致科技研究速度下降。"
 setting_mr_tech_quarter_rule: "#n 低#!#V 增益#!"
