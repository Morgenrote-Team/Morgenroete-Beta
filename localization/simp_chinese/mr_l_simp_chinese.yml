 objective_thriving_culture_name_SWE: "瑞典"
 objective_thriving_culture_desc_SWE: "在过去的100年里，瑞典已成为一个领先的科技大国，对科学做出了重大贡献，包括生物命名系统、摄氏温标和化学元素符号系统。\n瑞典能否继续保持其在科学领域的领先地位，还是应该将注意力转向文化追求？去培养作家和作曲家？"
