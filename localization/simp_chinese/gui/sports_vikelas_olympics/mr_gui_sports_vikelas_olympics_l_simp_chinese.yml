 VISIT_IOC_BUTTON: "拜访国际奥委会"
 MR_VISIT_IOC_POSSIBLE_FOUNDED_TT: "#default_text #V 国际奥林匹克委员会#!已经成立了。#!"
 MR_VISIT_IOC_POSSIBLE_TT: "#default_text 你目前#V 目前没有参观国际奥委会#!。#!"
 VISIT_IOC_BUTTON_TT: "#T 拜访国际奥委会#!\n拜访国际奥委会以获取成员国信息，比如下一届奥运会的主办国或是国际奖牌榜。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_FOUNDATION_BUTTON: "成立国际奥委会"
 MR_IOC_FOUNDATION_BUTTON_TT: "#T 成立国际奥林匹克委员会#!\n国际奥林匹克委员会（国际奥委会）是一个协会形式的合法非政府组织。奥委会旨在组织和监督开展现代的奥林匹克运动会。奥委会的创始国在决定奥运会举办地点的理事会为常任理事国。奥委会成立后即可举行第一届奥运会，此后每四年可以举办一届，在一定条件下，其他国家也可以作为正式成员加入国际奥委会，但理事会的席位始终是固定的。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_FOUNDATION_HAS_ACADEMIC_TRIGGER_TT: "#default_text [GetPlayer.GetName]至少有一位[concept_academics_academic]。#!"
 MR_IOC_FOUNDATION_PEACE_TRIGGER_TT: "#default_text [GetPlayer.GetName]处于和平。#!"
 MR_IOC_MEMBER_BUTTON: "加入国际奥委会"
 MR_IOC_MEMBER_BUTTON_TT: "#T 成为国际奥委会的成员国#!\n加入国际奥林匹克委员会即可参与到四年一度的奥运会中，并有机会在自己的国家举办奥运会。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_MEMBER_INFAMY_TRIGGER_TT: "#default_text [GetPlayer.GetName]的恶名低于#n 50#!。#!"
 MR_IOC_MEMBER_NOT_UNRECOGNIZED_TRIGGER_TT: "#default_text [GetPlayer.GetName]#V 不是未受认可国家#!。#!"
 MR_IOC_MEMBER_NOT_HOSTING_TRIGGER_TT: "#default_text [GetPlayer.GetName]#V 不是当前的奥运会主办国#!。#!"
 MR_IOC_BRIBE_BUTTON: "贿赂国际奥委会"
 MR_IOC_BRIBE_BUTTON_TT: "#T 贿赂奥委会#!\n只要向国际奥委会理事会慷慨“捐款”，我们就能获得各成员的好感，并在下届奥运会的分配中被列为第四个候选国。然而，我们并不能保证之后一定会入选。其他国际奥委会委员也可能误解我们的慷慨。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_BRIBE_NOT_BRIBING_ALREADY_TRIGGER_TT: "#default_text [GetPlayer.GetName]#V 未贿赂国际奥委会#!。#!"
 MR_OLYMPIC_FLAME_BUTTON: "奥林匹克圣火"
 MR_OLYMPIC_FLAME_BUTTON_TT: "#T #!\n奥林匹克圣火，传闻取自希腊女神赫斯提亚（炉灶女神）永不熄灭的炉火，在1928年阿姆斯特丹奥运会上首次亮相。而奥运火炬传递的传统是在1936年柏林夏季奥运会上正式确立的。与普遍看法相反，这个想法并非来自国家社会主义者，而是来自德国犹太考古学家阿尔弗雷德·希夫。这一传统的引入不仅会给奥运会带来新的身份象征，而且每年都会将人们聚集在一起，并成为一个令人振奋的象征，分散人们对其他不满的注意力。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_OLYMPIC_FLAME_IS_HOST_TRIGGER_TT: "#default_text [GetPlayer.GetName]#V 正在准备主办下一届奥运会#!。#!"
 MR_IOC_PRESIDENT_BUTTON: "成为国际奥委会主席"
 MR_IOC_PRESIDENT_BUTTON_TT: "#T 成为国际奥委会主席#!\n倘若国际奥委会无在任主席，我国可以担任此职。前提是我们已经控制奥委会的总部。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName]控制了[GetBuildingType('building_vikelas_ioc').GetName]#!。#!"
 MR_IOC_DISCIPLINE_BUTTON: "引进奥运项目"
 MR_IOC_DISCIPLINE_BUTTON_TT: "#T 引进奥运项目#!\n国际奥委会的规模越大，且参与奥运会的国家越多，可引入的比赛项目就越多。更多的项目意味着更多的奖牌。可引入的比赛项目总数可达20项，这其中包含了国民体育项目。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_15_MEMBERS_TRIGGER_TT: "#default_text 国际奥委会拥有至少#G 15个#!#V 成员国#!。#!"
 MR_IOC_20_MEMBERS_TRIGGER_TT: "#default_text 国际奥委会拥有至少#G 20个#!#V 成员国#!。#!"
 MR_IOC_25_MEMBERS_TRIGGER_TT: "#default_text 国际奥委会拥有至少#G 25个#!#V 成员国#!。#!"
 MR_IOC_30_MEMBERS_TRIGGER_TT: "#default_text 国际奥委会拥有至少#G 30个#!#V 成员国#!。#!"
 MR_IOC_40_MEMBERS_TRIGGER_TT: "#default_text 国际奥委会拥有至少#G 40个#!#V 成员国#!。#!"
 MR_IOC_50_MEMBERS_TRIGGER_TT: "#default_text 国际奥委会拥有至少#G 50个#!#V 成员国#!。#!"
 MR_IOC_60_MEMBERS_TRIGGER_TT: "#default_text 国际奥委会拥有至少#G 60个#!#V 成员国#!。#!"
 MR_IOC_MAKE_NATIONAL_SPORT_DISCIPLINE_BUTTON: "使[GetPlayer.GetCustom('vikelas_national_sport_for_GUI_type')]成为奥运项目"
 MR_IOC_MAKE_NATIONAL_SPORT_DISCIPLINE_BUTTON_TT: "#T 使[GetPlayer.GetCustom('vikelas_national_sport_for_GUI_type')]成为奥运项目#!\n国际奥委会主席有权将其本国的国民体育项目设定为一项强制性的奥运比赛项目。这是一项专有的权力。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_NO_BRIBE_BUTTON: "停止贿赂国际奥委会"
 MR_IOC_NO_BRIBE_BUTTON_TT: "#T 停止贿赂国际奥委会#!\n若我国近期已成功举办奥运会，则应立即终止相关贿赂行为——毕竟，我们无法在短期内再次申办。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_BRIBE_AT_LEAST_3_YEARS_TRIGGER_TT: "#default_text 对国际奥委会的贿赂计划被设定为一项长期操作，至少需持续#V 四年#!方可中止。#!"