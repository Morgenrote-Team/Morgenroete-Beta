 MR_PADDOCK_FIRE_MECHANIC_BUTTON: "解雇机械师"
 MR_PADDOCK_FIRE_MECHANIC_BUTTON_TT: "#T 解雇机械师#!\n如果当前的机械师不符合预期要求，赛车队可以填补机械师职位。然而，新的机械师只能在两年间隔后招募。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PADDOCK_FIRE_RACER_BUTTON: "解雇赛车手"
 MR_PADDOCK_FIRE_RACER_BUTTON_TT: "#T 解雇赛车手#!\n与过去的绅士车手不同，赛车队的车手并非不可替代。在雇佣新的赛车手后，这一职位将空缺两年。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
