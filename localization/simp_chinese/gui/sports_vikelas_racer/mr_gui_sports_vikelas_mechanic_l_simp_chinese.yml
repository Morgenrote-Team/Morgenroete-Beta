 MR_PADDOCK_IMPROVE_ENGINE_BUTTON: "改进引擎"
 MR_PADDOCK_IMPROVE_ENGINE_BUTTON_TT: "#T 改进引擎#!\n新型发动机的引入，显著提升了车辆的可靠性与速度表现。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PADDOCK_IMPROVE_SAFETY_BUTTON: "确保安全"
 MR_PADDOCK_IMPROVE_SAFETY_BUTTON_TT: "#T 确保安全#!\n机械师能够设计出多种创新安全技术，为车手的生命安全保驾护航。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PADDOCK_IMPROVE_BODY_BUTTON: "重塑车身"
 MR_PADDOCK_IMPROVE_BODY_BUTTON_TT: "#T 重塑车身#!\n优化车身设计能提升空气动力学性能，进而提高速度；而材料改进则能进一步增强安全性。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
