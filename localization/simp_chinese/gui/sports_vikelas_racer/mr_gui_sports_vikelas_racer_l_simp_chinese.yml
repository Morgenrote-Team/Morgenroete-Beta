 MR_AIACR_BOARD_TOOLTIP: "#header 国际公认汽车俱乐部协会理事会#!\n以下国家是国际公认汽车俱乐部协会理事会成员国：\n\n[GetGlobalVariable('vikelas_grand_prix_country_1_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_grand_prix_country_2_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_grand_prix_country_3_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_grand_prix_country_4_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_grand_prix_country_5_global_var').GetCountry.GetName|V]"
