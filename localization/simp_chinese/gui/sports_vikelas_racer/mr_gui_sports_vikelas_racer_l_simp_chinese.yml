 MR_MECHANIC_EXPERIENECE_TT: "[Country.GetCustom('GUI_vikelas_mechanic_experience_type')]"
 vikelas_custom_no_racer_loc: ""
 vikelas_custom_racer_loc: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]是一位[concept_vikelas_racer]。（当前经验[GetPlayer.MakeScope.Var('vikelas_racer_var').GetVariable('vikelas_racer_experience').GetValue|+0]/150）【达到150的经验值会将其特质提升为#V 著名赛车手#!】"
 vikelas_custom_famous_racer_loc: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]是一位#V 著名[concept_vikelas_racer]#!。[ROOT.Var('vikelas_racer_var').GetCharacter.GetSheHe|U]是世界上最好的赛车手之一。"
 MR_AUTORACING_FOUND_AUTOMOBILE_CLUB_BUTTON: "成立汽车俱乐部"
 MR_AUTORACING_FOUND_AUTOMOBILE_CLUB_BUTTON_TT: "#T 成立汽车俱乐部#!\n建立汽车俱乐部是建设赛车运动所必需的其他设施的第一步。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_LONG_DISTANCE_BUTTON: "耐力赛"
 MR_AUTORACING_LONG_DISTANCE_BUTTON_TT: "#T 组织一场耐力赛#!\n一直到20世纪中叶，早期赛车的耐力赛这种通常在城市间进行。在意大利有弗洛里奥盾或一千英里耐力赛这样出色的例子。这种对人车特设的考验在很长一段时间被人们认为是真正的全国性赛车比赛。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON: "创办大奖赛"
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON_TT: "#T 创办大奖赛#!\n赛车历史上的第一次大奖赛是1906年的法国汽车俱乐部大奖赛。在法国工业代表的要求下，每家制造商至多获批三辆赛车。为保持其在所有赛事中的主导地位，比赛安排了持续2天的赛时和超过1200公里的赛程。1925年，在意大利汽车俱乐部的推动下，正式的宣布引入世界竞标赛项目。该赛季三场官方大奖赛被（法国、意大利和比利时）指定为正赛，印第安纳波利斯则作为美国最重要的赛车赛事。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON_TRIGGER_TT: "#default_text 至少有#V 5个其他国家#!拥有#V 汽车俱乐部#!且已研究[GetTechnology('vikelas_international_sports_tech').GetName]。#!"
 MR_AUTORACING_RACE_TRACK_BUTTON: "建造一条赛道"
 MR_AUTORACING_RACE_TRACK_BUTTON_TT: "#T 建造一条赛道#!\n随着大奖赛的举行，固定赛道成为赛车比赛的常态。专用赛道不仅可以让国际赛事集中于一地，还能让选手们在赛道上磨炼自己的车技从而更加轻车熟路。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HAS_RACER_TT: "#default_text [GetPlayer.GetName]拥有一位[concept_vikelas_racer]。#!"
 MR_AUTORACING_RACE_TRACK_BUTTON_TRIGGER_TT: "#default_text [GetPlayer.GetName]中的一个[concept_incorporated_state]拥有#V 15级及以上的#![GetBuildingType('building_urban_center').GetName]。#!"
 MR_AUTORACING_FOUND_TEAM_BUTTON: "组建赛车队伍"
 MR_AUTORACING_FOUND_TEAM_BUTTON_TT: "#T 组建赛车队伍#!\n我们需要拥有属于自己的汽车产业和工程师来策划计划，来帮助我们开发新的赛车，从而让我们的赛车摆脱进口的依赖。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_FOUND_TEAM_BUTTON_TRIGGER_TT: "#default_text [GetPlayer.GetName]至少拥有一个#p 不低于2级#!且启用#V 汽车生产#![concept_production_method]的[GetBuildingType('building_automotive_industry').GetName]。#!"
 MR_AUTORACING_RACE_TRACK_APPLY_BUTTON: "申请列入大奖赛赛道"
 MR_AUTORACING_RACE_TRACK_APPLY_BUTTON_TT: "#T 申请列入大奖赛赛道#!\n作为国际汽车联合会的资深成员，加之我们拥有的一座世界级赛道，我们完全可以申请将其列为官方大奖赛赛道。一旦获批，这座赛道将成为每年大奖赛的固定举办地，其地位将因此扶摇直上，跻身世界顶级赛道之列。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HAS_RACE_TRACK_TT: "#default_text [GetPlayer.GetName]至少有一座[GetBuildingType('building_vikelas_circuit').GetName]。#!"
 MR_MAXIMUM_5_RACE_TRACKS_TT: "#default_text 至少5个国家拥有[GetBuildingType('building_vikelas_circuit').GetName]。#!"
 MR_AIACR_PRESIDENT_BUTTON: "成为国际公认汽车俱乐部协会主席"
 MR_AIACR_PRESIDENT_BUTTON_TT: "#T 成为国际公认汽车俱乐部协会主席#!\n若AIACR主席职位空缺，我们便可争取这一要职。当然，前提是我们已经控制国际公认汽车俱乐部协会的总部。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AIACR_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName]控制[GetBuildingType('building_vikelas_aiacr').GetName]。#!"
 MR_AUTORACING_RACE_TRACK_DECLARE_BUTTON: "指定大奖赛赛道"
 MR_AUTORACING_RACE_TRACK_DECLARE_BUTTON_TT: "#T 指定大奖赛赛道#!\n身为AIACR主席，我们有权将旗下的一条赛道指定为大奖赛赛道。[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IS_AIACR_PRESIDENT_TT: "#default_text [GetPlayer.GetName]是国际公认汽车俱乐部协会的#V 主席#!。#!"
 MR_AUTORACING_FOUND_AIACR_BUTTON: "汽车联合会"
 MR_AUTORACING_FOUND_AIACR_BUTTON_TT: "#T 汽车联合会#!\n赛车运动正经历一场前所未有的全球化浪潮，来自世界各地的车手们驾驶着不同国家的汽车品牌，在赛道上展开激烈角逐。然而，在这股热潮中，许多国家已开始自行举办赛事，却缺乏统一的规则与条款。为了规范这项日益国际化的运动，成立一个权威的国际机构已刻不容缓：国际汽车联合会。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_FOUND_AIACR_BUTTON_TRIGGER_TT: "#default_text #V 至少十个国家#!拥有#V 汽车俱乐部#!。#!"
 MR_AUTORACING_NO_PARTICIPATION_BUTTON_TT: "#T 取消参赛#!\n在某些情况下，例如当车手被认为过于冲动或赛车尚未成熟，可能导致灾难性事故时，暂停参赛或许是明智之选。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 vikelas_no_participation_tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]将不会参加任何比赛，直到再次允许参赛。"
 MR_AUTORACING_PARTICIPATION_BUTTON_TT: "#T 参赛#!\n允许车手重新参与所有赛事。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 vikelas_participation_tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]将像往常一样再次参加比赛。"
 MR_AUTORACING_LONG_DISTANCE_NOT_ONGOING_TRIGGER_TT: "#default_text #R 目前没有#!其他国家举办#V 耐力赛#!。#!"
 MR_AUTORACING_LONG_DISTANCE_STATE_TRIGGER_TT: "#default_text [GetPlayer.GetName]至少拥有#V 5个[Concept('concept_state', '$concept_states$')]#!。#!"
 MR_AUTORACING_LONG_DISTANCE_MODIFIER_TRIGGER_TT: "#default_text [GetPlayer.GetName]最近#R 未举办#!#V 耐力赛#!。#!"
 vikelas_no_race_team_type: "无"