 PITHECANTHROPUS_VAR: "@andersson_pithecanthropus_fossil![GetPlayer.MakeScope.Var('andersson_pithecanthropus_fossil').GetValue|V0]"
 PITHECANTHROPUS_VAR_TT: "#header 猿人[Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]#!\n[GetPlayer.GetName]已找到@andersson_pithecanthropus_fossil![GetPlayer.MakeScope.Var('andersson_pithecanthropus_fossil').GetValue|V0]件猿人[Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]\n\n猿人化石：\n[GetPlayer.GetCustom('andersson_heidelberg_fossil_discovered_type')][GetPlayer.GetCustom('andersson_rhodesian_fossil_discovered_type')][GetPlayer.GetCustom('andersson_peking_fossil_discovered_type')][GetPlayer.GetCustom('andersson_java_fossil_discovered_type')]"
