 MR_ANTHROPOLOGIST_SKELETON_RECONSTRUCTION_BUTTON: "骨架复原"
 MR_ANTHROPOLOGIST_SKELETON_RECONSTRUCTION_BUTTON_TT: "#T 骨架复原#!\n在[concept_andersson_anthropologist]的帮助下，可以使用[Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]来复原一具[concept_andersson_skeleton]。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_CAN_RECONSTRUCT_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least #V 5#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] of a skeleton which has not been reconstructed yet.#!"
 MR_ANTHROPOLOGIST_HAS_INTITUTE_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有一座[GetBuildingType('building_andersson_institute').GetName]。#!"
 MR_RECALL_ANTHROPOLOGIST_BUTTON_TT: "#T 召回人类学家#!\n有时可能会出现要求洞穴探索提前结束的情况。[concept_andersson_anthropologist]可以在原定日期之前返回，但不会带来任何成果。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ORIGIN_CONGRESS_BUTTON: "人类起源大会"
 MR_ORIGIN_CONGRESS_BUTTON_TT: "#T 人类起源大会#!\n史前人类骨骼的发现使得人类的起源问题随之产生。虽然达尔文假定人类起源于非洲，但也有人推测存在多处平行发展。从世纪之交开始，主流观点认为现代人类是从亚洲发展起来的。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGY_INSTITUTE_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有一座[GetBuildingType('building_andersson_institute').GetName]。#!"
 MR_ORIGIN_CONGRESS_HUMAN_FOSSIL_TT: "#default_text [GetPlayer.GetName]至少拥有#V 30件#!@andersson_human_fossil![Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]。#!"
 MR_ORIGIN_CONGRESS_SPECIAL_HUMAN_FOSSIL_TT: "#default_text [GetPlayer.GetName]至少拥有#V 10件#!来自下列物种之一的@andersson_human_fossil![Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]：#V 南方古猿或爪哇直立猿人#!。#!"
 MR_ORIGIN_CONGRESS_GLOBAL_HUMAN_FOSSIL_TT: "#default_text 全世界的国家至少已经发现了#V 250件#!@andersson_human_fossil![Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]（当前已发现[GetGlobalVariable('dubois_global_human_fossil').GetValue|+0]件@andersson_human_fossil!）。#!"
 NEOANTHROPUS_VAR: "@andersson_neoanthropus_fossil![GetPlayer.MakeScope.Var('andersson_neoanthropus_fossil_var').GetValue|V0]"
 NEOANTHROPUS_VAR_TT: "#header 新人[Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]#!\n[GetPlayer.GetName]已找到@andersson_neoanthropus_fossil![GetPlayer.MakeScope.Var('andersson_neoanthropus_fossil_var').GetValue|V0]件新人[Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]\n\n新人化石：\n[GetPlayer.GetCustom('andersson_vero_fossil_discovered_type')][GetPlayer.GetCustom('andersson_lagoa_santa_fossil_discovered_type')][GetPlayer.GetCustom('andersson_cro_magnon_fossil_discovered_type')][GetPlayer.GetCustom('andersson_boskop_fossil_discovered_type')][GetPlayer.GetCustom('andersson_tianyuan_fossil_discovered_type')][GetPlayer.GetCustom('andersson_talgai_fossil_discovered_type')]"
