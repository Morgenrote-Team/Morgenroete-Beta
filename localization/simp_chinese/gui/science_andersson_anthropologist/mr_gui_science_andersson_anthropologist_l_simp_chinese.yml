 SPECIAL_HUMAN_FOSSILS_VAR: "@andersson_special_human_fossil_var![GetPlayer.MakeScope.Var('andersson_special_human_fossil_var').GetValue|V0]"
 SPECIAL_HUMAN_FOSSILS_VAR_TT: "#header 特殊[Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]#!\n[GetPlayer.GetName]已找到@andersson_special_human_fossil_var![GetPlayer.MakeScope.Var('andersson_special_human_fossil_var').GetValue|V0]件特殊[Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]\n\n特殊化石：\n[GetPlayer.GetCustom('andersson_piltdown_fossil_discovered_type')][GetPlayer.GetCustom('andersson_paranthropus_fossil_discovered_type')][GetPlayer.GetCustom('andersson_clovis_fossil_discovered_type')][GetPlayer.GetCustom('andersson_dragon_fossil_discovered_type')][GetPlayer.GetCustom('andersson_floresiensis_fossil_discovered_type')]"
 PREHISTORIC_VENUSES_VAR: "@andersson_prehistoric_venus![GetPlayer.MakeScope.Var('andersson_prehistoric_venus_var').GetValue|V0]"
 PREHISTORIC_VENUSES_VAR_TT: "#header [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_venuses$')]#!\n[GetPlayer.GetName]已找到@andersson_prehistoric_venus![GetPlayer.MakeScope.Var('andersson_prehistoric_venus_var').GetValue|V0]件[Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_venuses$')]"
 MR_ANTHROPOLOGIST_HOMINID_EXPEDITION_BUTTON: "古人类考察"
 MR_ANTHROPOLOGIST_HOMINID_EXPEDITION_BUTTON_TT: "#T 古人类考察#!\n[concept_andersson_anthropologist]及其团队可以出发前往目标国家，寻找已灭绝的人类物种。相关条件与其在本国领土上进行古人类搜寻时适用的条件相同。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_HOMINID_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName]在下列地理区域#n 至少拥有一个地区#!：[GetGeographicRegion('andersson_geographic_region_neoanthropus').GetName]、[GetGeographicRegion('andersson_geographic_region_palaeanthropus').GetName]、[GetGeographicRegion('andersson_geographic_region_pithecanthropus').GetName]、[GetGeographicRegion('andersson_geographic_region_australopithecus').GetName]。#!"
 MR_ANTHROPOLOGIST_NOT_HAS_EXPEDITION_MODIFIER_TRIGGER_TT: "#default_text [GetPlayer.GetName]#n 没有#!#V $andersson_hominid_expedition_modifier$#!修正。#!"
 MR_ANTHROPOLOGIST_CRANIOMETRY_BUTTON: "颅骨测量"
 MR_ANTHROPOLOGIST_CRANIOMETRY_BUTTON_TT: "#T 颅骨测量#!\n颅骨测量被认为是一位人类学家所能从事的最具声望的工作之一。在职业生涯中，人类学家可有一次机会完全沉浸于他们所钟爱的颅骨之中，从而丰富自身经验并掌握新技能。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANDERSSON_25_BONES_TRIGGER_TT: "#default_text [GetPlayer.GetName]至少拥有#V 25件#!@andersson_human_fossil![Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]。#!"
 MR_ANTHROPOLOGIST_NOT_DONE_CRANIOMETRY_TRIGGER_TT: "#default_text 我们的人类学家#R 没有完成#!任意颅骨测量。#!"
 MR_ANTHROPOLOGIST_NEOLITHIC_BUTTON: "新石器时代"
 MR_ANTHROPOLOGIST_NEOLITHIC_BUTTON_TT: "#T 新石器时代#!\n对许多普通人而言，早期人类的历史仍然是抽象的。人类学家可以在大学内设立主题展室，使那个时代的生活更为生动。每所大学仅能设立一种场景。在此情况下，请让您的人类学家搭建一个新石器时代的场景。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_MESOLITHIC_BUTTON: "中石器时代"
 MR_ANTHROPOLOGIST_MESOLITHIC_BUTTON_TT: "#T 中石器时代#!\n对许多普通人而言，早期人类的历史仍然是抽象的。人类学家可以在大学内设立主题展室，使那个时代的生活更为生动。每所大学仅能设立一种场景。在此情况下，请让您的人类学家搭建一个中石器时代的场景。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_UPPER_PALEOLITHIC_BUTTON: "旧石器时代晚期"
 MR_ANTHROPOLOGIST_UPPER_PALEOLITHIC_BUTTON_TT: "#T 旧石器时代晚期#!\n对许多普通人而言，早期人类的历史仍然是抽象的。人类学家可以在大学内设立主题展室，使那个时代的生活更为生动。每所大学仅能设立一种场景。在此情况下，请让您的人类学家搭建一个旧石器时代晚期的场景。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
