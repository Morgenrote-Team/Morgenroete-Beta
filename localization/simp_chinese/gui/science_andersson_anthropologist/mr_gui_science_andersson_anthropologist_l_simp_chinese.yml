 SPECIAL_HUMAN_FOSSILS_VAR: "@andersson_special_human_fossil_var![GetPlayer.MakeScope.Var('andersson_special_human_fossil_var').GetValue|V0]"
 SPECIAL_HUMAN_FOSSILS_VAR_TT: "#header Special [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]#!\n[GetPlayer.GetName] has found @andersson_special_human_fossil_var! [GetPlayer.MakeScope.Var('andersson_special_human_fossil_var').GetValue|V0] Special [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]\n\nSpecial Fossils:\n[GetPlayer.GetCustom('andersson_piltdown_fossil_discovered_type')][GetPlayer.GetCustom('andersson_paranthropus_fossil_discovered_type')][GetPlayer.GetCustom('andersson_clovis_fossil_discovered_type')][GetPlayer.GetCustom('andersson_dragon_fossil_discovered_type')][GetPlayer.GetCustom('andersson_floriensis_fossil_discovered_type')]"
 PREHISTORIC_VENUSES_VAR: "@andersson_prehistoric_venus![GetPlayer.MakeScope.Var('andersson_prehistoric_venus_var').GetValue|V0]"
 PREHISTORIC_VENUSES_VAR_TT: "#header [Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_venuses$')]#!\n[GetPlayer.GetName]已找到@andersson_prehistoric_venus![GetPlayer.MakeScope.Var('andersson_prehistoric_venus_var').GetValue|V0]件[Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_venuses$')]"
 MR_ANTHROPOLOGIST_HOMINID_EXPEDITION_BUTTON: "古人类考察"
 MR_ANTHROPOLOGIST_HOMINID_EXPEDITION_BUTTON_TT: "#T 古人类考察#!\n[concept_andersson_anthropologist]及其团队可以出发前往目标国家，寻找已灭绝的人类物种。相关条件与其在本国领土上进行古人类搜寻时适用的条件相同。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_HOMINID_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] has #n at least one#! direct subject which owns a state in these geographic regions: [GetGeographicRegion('andersson_geographic_region_neoanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_palaeanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_pithecanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_australopithecus').GetName].#!"
 MR_ANTHROPOLOGIST_NOT_HAS_EXPEDITION_MODIFIER_TRIGGER_TT: "#default_text [GetPlayer.GetName] does #n not#! have the #V $andersson_hominid_expedition_modifier$#! Modifier.#!"
 MR_ANTHROPOLOGIST_CRANIOMETRY_BUTTON: "Craniometry"
 MR_ANTHROPOLOGIST_CRANIOMETRY_BUTTON_TT: "#T Craniometry#!\nSkull measurement is considered one of the most prestigious tasks for an anthropologist. Once in their career, an anthropologist can completely immerse themselves in their beloved skulls, thereby enhancing their experience and acquiring new skills.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANDERSSON_25_BONES_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least #V 25#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')].#!"
 MR_ANTHROPOLOGIST_NOT_DONE_CRANIOMETRY_TRIGGER_TT: "#default_text Our anthropologist has #R not yet done#! any craniometry.#!"
 MR_ANTHROPOLOGIST_NEOLITHIC_BUTTON: "The Neolithic Age"
 MR_ANTHROPOLOGIST_NEOLITHIC_BUTTON_TT: "#T The Neolithic Age#!\nFor many ordinary people, the past of early humans remains abstract. An anthropologist can set up rooms at a university to make life in that era more vivid. Only one scenery is possible per university. In this case let your Anthropologist build a scenery from the Neolithic Age.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_MESOLITHIC_BUTTON: "The Mesolithic Age"
 MR_ANTHROPOLOGIST_MESOLITHIC_BUTTON_TT: "#T The Mesolithic Age#!\nFor many ordinary people, the past of early humans remains abstract. An anthropologist can set up rooms at a university to make life in that era more vivid. Only one scenery is possible per university. In this case let your Anthropologist build a scenery from the Mesolithic Age.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_UPPER_PALEOLITHIC_BUTTON: "The Upper Paleolithic Age"
 MR_ANTHROPOLOGIST_UPPER_PALEOLITHIC_BUTTON_TT: "#T The Upper Paleolithic Age#!\nFor many ordinary people, the past of early humans remains abstract. An anthropologist can set up rooms at a university to make life in that era more vivid. Only one scenery is possible per university. In this case let your Anthropologist build a scenery from the Upper Paleolithic Age.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
