 MR_ANTHROPOLOGIST_CAVE_EXPLORATION_BUTTON_TT: "#T 洞穴探索#!\n在[concept_andersson_anthropologist]的帮助下，可以探索本国境内此前已知的[Concept('concept_andersson_cave','$concept_andersson_caves$')]。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_HAS_CAVE_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有一个[concept_andersson_cave]。#!"
