 AUSTRALOPITHECUS_VAR_TT: "#header 南方古猿[Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]#!\n[GetPlayer.GetName]共找到了@andersson_australopithecus_fossil![GetPlayer.MakeScope.Var('andersson_australopithecus_fossil').GetValue|V0]件南方古猿[Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]\n\n南方古猿化石：\n[GetPlayer.GetCustom('andersson_australopithecus_fossil_discovered_type')]"
 PREHISTORIC_ARTIFACTS_VAR: "@andersson_prehistoric_artifact![GetPlayer.MakeScope.Var('andersson_prehistoric_artifact_var').GetValue|V0]"
