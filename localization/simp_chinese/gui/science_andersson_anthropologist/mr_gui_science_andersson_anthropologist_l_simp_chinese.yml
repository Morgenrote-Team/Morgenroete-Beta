 MR_ANDERSSON_20_PREHISTORIC_ARTIFACTS_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有至少#V 20件#!!@andersson_prehistoric_artifact![Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')]。#!"
 MR_PEOPLING_CONGRESS_BUTTON: "美洲人口迁徙大会"
