 MR_ANTHROPOLOGIST_NEW_SYSTEMATIZATION_BUTTON: "新分类系统"
 MR_ANTHROPOLOGIST_NEW_SYSTEMATIZATION_BUTTON_TT: "#T 新分类系统#!\n当前根据出土地点将考古发现归类为不同“人种”的做法，导致了近乎难以驾驭的零散名称的大量涌现。一位经验丰富的人类学家可借助新理论与系统化方法，将过时的分类归入历史，并使人类学迈向现代化。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_AT_LEAST_200_EXPERIENCE_TRIGGER_TT: "#default_text [GetPlayer.GetName]的[concept_andersson_anthropologist]至少有#V 200#!经验。#!"
 MR_ANTHROPOLOGIST_CAN_SYSTEMIZE_NEOANTHROPUS_TRIGGER_TT: "#default_text 新人的六个不同物种皆已发现。#!"
