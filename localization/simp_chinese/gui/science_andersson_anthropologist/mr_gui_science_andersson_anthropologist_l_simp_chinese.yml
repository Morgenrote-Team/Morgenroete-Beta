 MR_ANTHROPOLOGIST_ANTHROPOLOGICAL_RESEARCH_BUTTON: "人类学研究"
 MR_ANTHROPOLOGIST_ANTHROPOLOGICAL_RESEARCH_BUTTON_TT: "#T 人类学研究#!\n[concept_andersson_anthropologist]将主要致力于在全国范围内寻找[Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]和[Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')]。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_HOMINID_PROSPECTING_BUTTON: "古人类勘探"
 MR_ANTHROPOLOGIST_HOMINID_PROSPECTING_BUTTON_TT: "#T 古人类勘探#!\n[concept_andersson_anthropologist]及其团队可以专门寻找已灭绝的人类物种。可以回收[Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')]和[Concept('concept_andersson_prehistoric_artifact','$concept_andersson_prehistoric_artifacts$')]，且只能通过在我们的[GetBuildingType('building_andersson_institute').GetName]中使用现代生产方法找到。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_HOMINID_PROSPECTING_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] has #n at least one#! state in these geographic regions: [GetGeographicRegion('andersson_geographic_region_neoanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_palaeanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_pithecanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_australopithecus').GetName].#!"
 MR_ANTHROPOLOGIST_IS_SPELEOLOGIST_TRIGGER_TT: "#default_text [concept_andersson_anthropologist]拥有#V $andersson_speleologist$#![concept_character_trait]。#!"
 MR_ANTHROPOLOGIST_EXPOSE_PILTDOWN_FRAUD_BUTTON: "揭露[GetPlayer.GetCustom('andersson_fossil_piltdown')]骗局"
 MR_ANTHROPOLOGIST_EXPOSE_PILTDOWN_FRAUD_BUTTON_TT: "#T 揭露[GetPlayer.GetCustom('andersson_fossil_piltdown')]骗局#!\n[GetPlayer.GetCustom('andersson_fossil_piltdown')]化石极有可能是伪造品。然而，[GetGlobalVariable('andersson_piltdown_country_global_var').GetCountryDefinition.GetName]很可能会不惜一切代价让学者来助纣为虐，是时候揭露这个谎言了！\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGY_RATING_PILTDOWN_FRAUD_TT: "#default_text [GetPlayer.GetName] has at least #V 100#! Anthropological Prestige.#!"
 MR_ANTHROPOLOGY_PILTDOWN_NO_RECENT_TRY_TRIGGER_TT: "#default_text [GetPlayer.GetName]没有#V $andersson_piltdown_debate_lost_modifier$#!修正。#!"
 MR_ANTHROPOLOGY_PILTDOWN_NO_CURRENT_DEBATE_TRIGGER_TT: "#default_text #R 当前尚无关于[GetPlayer.GetCustom('andersson_fossil_piltdown')]的争论#!。#!"
 MR_ANTHROPOLOGY_PILTDOWN_CAN_BE_EXPOSED_TRIGGER_TT: "#default_text [GetGlobalVariable('andersson_piltdown_country_global_var').GetCountryDefinition.GetName]过去5年内未能守住[GetPlayer.GetCustom('andersson_fossil_piltdown')]。#!"
 TOTAL_HUMAN_FOSSILS_VAR: "@andersson_human_fossil![GetPlayer.MakeScope.Var('andersson_total_human_fossil').GetValue|V0]"
