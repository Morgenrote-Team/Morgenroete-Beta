 MR_ANTHROPOLOGIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'andersson_anthropologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'andersson_anthropologist_no_anthropologist_loc')]"
 andersson_anthropologist_achievements_loc: "$andersson_anthropologist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('andersson_anthropologist_achievement_total_human_fossils_anthropologist_type')][Scope.GetCharacter.GetCustom('andersson_anthropologist_achievement_total_cromagnon_fossils_anthropologist_type')][Scope.GetCharacter.GetCustom('andersson_anthropologist_achievement_total_neanderthalensis_fossils_anthropologist_type')][Scope.GetCharacter.GetCustom('andersson_anthropologist_achievement_total_erectus_fossils_anthropologist_type')][Scope.GetCharacter.GetCustom('andersson_anthropologist_achievement_total_australopithecus_fossils_anthropologist_type')][Scope.GetCharacter.GetCustom('andersson_anthropologist_achievement_otal_paranthropus_fossils_anthropologist_type')][Scope.GetCharacter.GetCustom('andersson_anthropologist_achievement_total_identified_human_fossils_anthropologist_type')][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_attended_origin_congress_var').IsSet , Scope.Var('andersson_anthropologist_achievement_attended_origin_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_exposed_piltdown_fraud_var').IsSet , Scope.Var('andersson_anthropologist_achievement_exposed_piltdown_fraud_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_invented_anthropology_var').IsSet , Scope.Var('andersson_anthropologist_achievement_invented_anthropology_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_cromagnon_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_cromagnon_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_neanderthalensis_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_neanderthalensis_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_erectus_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_erectus_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_australopithecus_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_australopithecus_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_paranthropus_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_paranthropus_anthropologist_var').GetFlagName)][AddLocalizationIf( Scope.Var('andersson_anthropologist_achievement_completed_heidelbergensis_anthropologist_var').IsSet , Scope.Var('andersson_anthropologist_achievement_completed_heidelbergensis_anthropologist_var').GetFlagName)]"
 andersson_anthropologist_no_anthropologist_loc: "当你拥有一位[concept_andersson_anthropologist]后，其#V 成就#!将会展示在此处。"
 andersson_anthropologist_achievements_intro_loc: "#V 该人类学家的成就#!\n#indent_newline:3 ※[Scope.GetCharacter.GetFullName]是一位[Scope.GetCharacter.GetCustom('andersson_anthropologist_experience_level_type')]。#!"
 andersson_anthropologist_achievement_famous_level_anthropologist_overview_loc: "著名[concept_andersson_anthropologist]"
 andersson_anthropologist_achievement_experienced_level_anthropologist_overview_loc: "经验丰富的[concept_andersson_anthropologist]"
 andersson_anthropologist_achievement_normal_level_anthropologist_overview_loc: "老练的[concept_andersson_anthropologist]"
 andersson_anthropologist_achievement_total_human_fossils_anthropologist_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士共发现 [Scope.Var('lepsius_total_human_fossils_anthropologist_var').GetValue|V0]块人类化石。其中包括"
 andersson_anthropologist_achievement_no_human_fossils_anthropologist_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士尚未发现任何人类化石#!"
 andersson_anthropologist_achievement_total_cromagnon_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_cromagnon_fossils_anthropologist_var').GetValue|V0]克罗马侬人化石"
 andersson_anthropologist_achievement_total_cromagnon_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_cromagnon_fossils_anthropologist_var').GetValue|V0]克罗马侬人化石"
 andersson_anthropologist_achievement_total_neanderthalensis_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_neanderthalensis_fossils_anthropologist_var').GetValue|V0]尼安德特人化石"
 andersson_anthropologist_achievement_total_neanderthalensis_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_neanderthalensis_fossils_anthropologist_var').GetValue|V0]尼安德特人化石"
 andersson_anthropologist_achievement_total_erectus_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_erectus_fossils_anthropologist_var').GetValue|V0]直立人化石"
 andersson_anthropologist_achievement_total_erectus_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_erectus_fossils_anthropologist_var').GetValue|V0]直立人化石"
 andersson_anthropologist_achievement_total_australopithecus_fossils_anthropologist_comma_loc: "[Scope.Var('lepsius_total_australopithecus_fossils_anthropologist_var').GetValue|V0]南方古猿化石"
 andersson_anthropologist_achievement_total_australopithecus_fossils_anthropologist_no_comma_loc: "[Scope.Var('lepsius_total_australopithecus_fossils_anthropologist_var').GetValue|V0]南方古猿化石"
 andersson_anthropologist_achievement_total_paranthropus_fossils_anthropologist_loc: "[Scope.Var('lepsius_total_paranthropus_fossils_anthropologist_var').GetValue|V0]傍人化石"
 andersson_anthropologist_achievement_total_identified_human_fossils_anthropologist_loc: "\n#indent_newline:3 ※[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U]共鉴定出[Scope.Var('lepsius_total_identified_human_fossils_anthropologist_var').GetValue|V0]块人类化石#!"
 andersson_anthropologist_achievement_attended_origin_congress_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]教授出席了#V 现代人类起源大会#!#!"
 andersson_anthropologist_achievement_exposed_piltdown_fraud_loc: "\n#indent_newline:3 ※[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHim]揭露#V 皮尔当人骗局#!#!"
 andersson_anthropologist_achievement_invented_anthropology_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士是第一位对人类骨骼进行细致且精确记录的学者。[Scope.GetCharacter.GetSheHe]被视为#V 人类学先驱#!。#!"
 andersson_anthropologist_achievement_completed_cromagnon_anthropologist_loc: "\n#indent_newline:3 ※[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U]首次对克罗马侬人#V 进行了科学分类#!。#!"
 andersson_anthropologist_achievement_completed_neanderthalensis_anthropologist_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士是第一个将#V 尼安德特人置于史前人类学#!中的人#!"
 andersson_anthropologist_achievement_completed_erectus_anthropologist_loc: "\n#indent_newline:3 ※[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis]将此前未知的#V 直立人#!考究为可以被理解的人类物种。#!"
 andersson_anthropologist_achievement_completed_australopithecus_anthropologist_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]教授是首位成功破译#V 南方古猿奥秘#!并推断其生活形态的学者。#!"
 andersson_anthropologist_achievement_completed_paranthropus_anthropologist_loc: "\n#indent_newline:3 ※在仅凭少量骨骼#V 重建史前人类#!的挑战中鲜有成功者，而[Scope.GetCharacter.GetLastNameNoFormatting]博士凭借#V 傍人#!取得突破，由此揭示其生存环境。#!"