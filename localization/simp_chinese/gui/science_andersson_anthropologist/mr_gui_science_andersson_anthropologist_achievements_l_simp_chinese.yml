 andersson_anthropologist_achievement_famous_level_anthropologist_overview_loc: "著名[concept_andersson_anthropologist]"
 andersson_anthropologist_achievement_experienced_level_anthropologist_overview_loc: "经验丰富的[concept_andersson_anthropologist]"
 andersson_anthropologist_achievement_normal_level_anthropologist_overview_loc: "老练的[concept_andersson_anthropologist]"
 andersson_anthropologist_achievement_total_human_fossils_anthropologist_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士共发现[Scope.Var('andersson_total_human_fossils_anthropologist_var').GetValue|V0]块人类化石。其中包括"
 andersson_anthropologist_achievement_no_human_fossils_anthropologist_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士尚未发现任何人类化石#!"
 andersson_anthropologist_achievement_attended_origin_congress_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]教授出席了#V 现代人类起源大会#!#!"
 andersson_anthropologist_achievement_exposed_piltdown_fraud_loc: "\n#indent_newline:3 ※[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHim]揭露#V 皮尔当人骗局#!#!"
 andersson_anthropologist_achievement_invented_anthropology_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士是第一位对人类骨骼进行细致且精确记录的学者。[Scope.GetCharacter.GetSheHe|U]被视为#V 人类学先驱#!。#!"
 andersson_anthropologist_no_anthropologist_loc: "当你拥有一位[concept_andersson_anthropologist]后，其#V 成就#!将会展示在此处。"
 andersson_anthropologist_achievements_intro_loc: "#V 该人类学家的成就#!\n#indent_newline:3 ※[Scope.GetCharacter.GetFullName]是一位[Scope.GetCharacter.GetCustom('andersson_anthropologist_experience_level_type')]。#!"
 andersson_anthropologist_achievement_total_neoanthropus_fossils_anthropologist_comma_loc: "[Scope.Var('andersson_neoanthropus_fossils_anthropologist_var').GetValue|V0]件新人化石"
 andersson_anthropologist_achievement_total_neoanthropus_fossils_anthropologist_no_comma_loc: "[Scope.Var('andersson_neoanthropus_fossils_anthropologist_var').GetValue|V0]件新人化石"
 andersson_anthropologist_achievement_total_palaeanthropus_fossils_anthropologist_comma_loc: "[Scope.Var('andersson_palaeanthropus_fossils_anthropologist_var').GetValue|V0]件傍人化石"
 andersson_anthropologist_achievement_total_palaeanthropus_fossils_anthropologist_no_comma_loc: "[Scope.Var('andersson_palaeanthropus_fossils_anthropologist_var').GetValue|V0]件傍人化石"
 andersson_anthropologist_achievement_total_pithecanthropus_fossils_anthropologist_comma_loc: "[Scope.Var('andersson_pithecanthropus_fossils_anthropologist_var').GetValue|V0]件爪哇直立猿人化石"
 andersson_anthropologist_achievement_total_pithecanthropus_fossils_anthropologist_no_comma_loc: "[Scope.Var('andersson_pithecanthropus_fossils_anthropologist_var').GetValue|V0]件爪哇直立猿人化石"
 andersson_anthropologist_achievement_total_australopithecus_fossils_anthropologist_loc: "[Scope.Var('andersson_australopithecus_fossils_anthropologist_var').GetValue|V0]件南方古猿化石"
 andersson_anthropologist_achievement_discovered_neoanthropus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] has gained international renown due to the discovery of a previously unknown #V specimen of Neoanthropus#!.#!"
 andersson_anthropologist_achievement_discovered_palaeanthropus_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]因发现一种此前未知的#V 古人类物种#!，实至名归，当享此誉。#!"
 andersson_anthropologist_achievement_discovered_pithecanthropus_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]因[Scope.GetCharacter.GetLastSheHe]率先发现了一件#V 爪哇直立猿人标本#!而名垂青史。#!"
 andersson_anthropologist_achievement_discovered_australopithecus_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]教授是第一位成功破译#V 南方古猿奥秘#!的人。#!"
 andersson_anthropologist_achievement_inaugurated_institute_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]在#V 人类学与民族学研究所的建立#!中发挥了关键作用，并致力于向大众普及人类的过去与现在。#!"
 andersson_anthropologist_achievement_vero_skeleton_loc: "\n#indent_newline:3 ※[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U]科学地#V 复原了[GetPlayer.GetCustom('andersson_fossil_vero')]#!。#!"
 andersson_anthropologist_achievement_lagoa_santa_skeleton_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士成功#V 复原了[GetPlayer.GetCustom('andersson_fossil_lagoa_santa')]骨架#!。#!"
 andersson_anthropologist_achievement_cro_magnon_skeleton_loc: "\n#indent_newline:3 ※#V [GetPlayer.GetCustom('andersson_fossil_cro_magnon')]的成功复原#!要归功于[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis]。#!"
 andersson_anthropologist_achievement_boskop_skeleton_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]成功#V 复原了一具[GetPlayer.GetCustom('andersson_fossil_boskop')]男性骨架#!。#!"
 andersson_anthropologist_achievement_tianyuan_skeleton_loc: "\n#indent_newline:3 ※在仅凭少量骨骼#V 重建史前人类#!的挑战中鲜有成功者，而[Scope.GetCharacter.GetLastNameNoFormatting]博士凭借#V [GetPlayer.GetCustom('andersson_fossil_tianyuan')]#!取得突破，由此揭示其生存环境。#!"
 andersson_anthropologist_achievement_talgai_skeleton_loc: "\n#indent_newline:3 ※[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U]复原了一具非常精美的#V 骨架：[GetPlayer.GetCustom('andersson_fossil_talgai')]#!。#!"
 andersson_anthropologist_achievement_neanderthal_skeleton_loc: "\n#indent_newline:3 ※[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U]科学地#V 复原了[GetPlayer.GetCustom('andersson_fossil_neanderthal')]#!。#!"
 andersson_anthropologist_achievement_gibraltar_skeleton_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士成功#V 复原了[GetPlayer.GetCustom('andersson_fossil_gibraltar')]骨架#!。#!"
 andersson_anthropologist_achievement_spy_skeleton_loc: "\n#indent_newline:3 ※#V [GetPlayer.GetCustom('andersson_fossil_spy')]的成功复原#!要归功于[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis]。#!"
 andersson_anthropologist_achievement_krapina_skeleton_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]成功#V 复原了一具[GetPlayer.GetCustom('andersson_fossil_krapina')]男性骨架#!。#!"
 andersson_anthropologist_achievement_galilee_skeleton_loc: "\n#indent_newline:3 ※在仅凭少量骨骼#V 重建史前人类#!的挑战中鲜有成功者，而[Scope.GetCharacter.GetLastNameNoFormatting]博士凭借#V [GetPlayer.GetCustom('andersson_fossil_galilee')]#!取得突破，由此揭示其生存环境。#!"
 andersson_anthropologist_achievement_heidelberg_skeleton_loc: "\n#indent_newline:3 ※[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U]科学地#V 复原了[GetPlayer.GetCustom('andersson_fossil_heidelberg')]#!。#!"
 andersson_anthropologist_achievement_rhodesian_skeleton_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士成功#V 复原了[GetPlayer.GetCustom('andersson_fossil_rhodesian')]骨架#!。#!"
 andersson_anthropologist_achievement_peking_skeleton_loc: "\n#indent_newline:3 ※#V [GetPlayer.GetCustom('andersson_fossil_peking')]的成功复原#!要归功于[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetHerHis]。#!"
 andersson_anthropologist_achievement_java_skeleton_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]成功#V 复原了一具[GetPlayer.GetCustom('andersson_fossil_java')]男性骨架#!。#!"
 andersson_anthropologist_achievement_australopithecus_skeleton_loc: "\n#indent_newline:3 ※[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U]科学地#V 复原了南方古猿#!。#!"
 andersson_anthropologist_achievement_our_ancestors_loc: "\n #indent_newline:3 • [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U] organized an #V exhibition on the evolutionary history of humans#!.#!"
 andersson_anthropologist_achievement_craniometry_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is considered an expert in the field of #V craniometry#!.#!"
 andersson_anthropologist_achievement_homo_sapiens_systemization_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetFullNameNoFormatting] has proposed a complete revision of the existing Neoanthropus system and assigns all the various finds to a separate species: #V Homo Sapiens#!.#!"
 andersson_anthropologist_achievement_homo_neanderthalensis_systemization_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetFullNameNoFormatting] has proposed a complete revision of the existing Palaeanthropus system and assigns all the various finds to a separate species: #V Homo Neanderthalensis#!.#!"
 andersson_anthropologist_achievement_homo_erectus_systemization_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetFullNameNoFormatting] has proposed a complete revision of the existing Pithecanthropus system and assigns all the various finds to a separate species: #V Homo Erectus#!.#!"