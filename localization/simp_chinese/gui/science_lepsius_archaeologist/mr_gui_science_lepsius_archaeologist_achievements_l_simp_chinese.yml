 lepsius_archaeologist_achievement_expert_for_egyptian_archaeology_loc: "\[Scope.GetCharacter.GetSheHe|U] 是#V 埃及考古#! 的专家，从[Scope.GetCharacter.GetSheHe] 收集了[Scope.Var('lepsius_egyptian_artifact_minor_archaeologist_var').GetValue|0V] 少量文物。" #deepl:2806539652
 lepsius_archaeologist_achievement_expert_for_mesopotamian_archaeology_loc: "\[Scope.GetCharacter.GetSheHe|U] 是#V Mesopotamian Archaeology#! 的专家，从[Scope.GetCharacter.GetSheHe] 收集[Scope.Var('lepsius_mesopotamian_artifact_minor_archaeologist_var').GetValue|0V] Minor Artifacts。" #deepl:4145665032
 lepsius_archaeologist_achievement_expert_for_aegean_archaeology_loc: "\[Scope.GetCharacter.GetSheHe|U] 是#V Aegean Archaeology#! 的专家，从[Scope.GetCharacter.GetSheHe] 收集[Scope.Var('lepsius_aegean_artifact_minor_archaeologist_var').GetValue|0V] Minor Artifacts。" #deepl:3137059405
 lepsius_archaeologist_achievement_expert_for_precolumbian_archaeology_loc: "\[Scope.GetCharacter.GetSheHe|U] 是#V Preolumbian Archaeology#! 的专家，从[Scope.GetCharacter.GetSheHe] 收集[Scope.Var('lepsius_precolumbian_artifact_minor_archaeologist_var').GetValue|0V] Minor Artifacts。" #deepl:1609585460
 lepsius_archaeologist_achievement_expert_for_fareastern_archaeology_loc: "\[Scope.GetCharacter.GetSheHe|U] 是#V Fareastern Archaeology#! 的专家，从[Scope.GetCharacter.GetSheHe] 收集[Scope.Var('lepsius_fareastern_artifact_minor_archaeologist_var').GetValue|0V] Minor Artifacts。" #deepl:3392738081
 lepsius_archaeologist_achievement_expert_for_oceanic_archaeology_loc: "\[Scope.GetCharacter.GetSheHe|U] 是#V Oceanic Archaeology#! 的专家，从[Scope.GetCharacter.GetSheHe] 收集[Scope.Var('lepsius_oceanic_artifact_minor_archaeologist_var').GetValue|0V] Minor Artifacts。" #deepl:2787251010
 lepsius_archaeologist_achievement_not_expert_loc: ""
 lepsius_archaeologist_achievement_attended_exodus_congress_loc: "\[Scope.GetCharacter.GetSheHe|U] 出席了#V 出埃及历史考古大会#! 。" #deepl:3946194799
 lepsius_archaeologist_achievement_attended_civilization_congress_loc: "\[Scope.GetCharacter.GetSheHe|U] 出席了#V 文明起源考古大会#! 。" #deepl:395174587
 lepsius_archaeologist_achievement_attended_troy_congress_loc: "\n[Scope.GetCharacter.GetSheHe|U] 出席了#V 特洛伊历史性考古大会。#!" #deepl:3218356213
 lepsius_archaeologist_achievement_invented_three_age_system_loc: "\[Scope.GetCharacter.GetHerHis] 最伟大的成就之一是#V 发明了三个时代系统#! ，使考古学家能够将文物分为石器时代、青铜时代和铁器时代。" #deepl:3435944138
 lepsius_archaeologist_achievement_invented_early_archaeology_loc: "\通过使用地层学方法和广泛记录[Scope.GetCharacter.GetHerHis] 发现，[Scope.GetCharacter.GetLastNameNoFormatting] #V  使考古学#! 发生了革命性变化，并将其转变为一门真正的科学。" #deepl:1482092133
 lepsius_archaeologist_achievement_inaugurated_museum_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士在#V 建立考古博物馆#! 的过程中发挥了重要作用，在该博物馆[Scope.GetCharacter.GetSheHe] 以有意义的方式展出了所有文物。" #deepl:2255139215
 lepsius_archaeologist_achievement_new_methods_pompeii_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 教授开发了#V 新方法，以保持在庞贝发现的#! 。" #deepl:3277007049
 lepsius_archaeologist_achievement_discovered_teotihuacan_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士是#V 特奥蒂瓦坎太阳神庙重建工作的核心人物#! 。" #deepl:715105555
 lepsius_archaeologist_achievement_discovered_harappa_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #V  教授在哈拉帕遗址发现了印度河流域文明#! 。" #deepl:823513117
 lepsius_archaeologist_achievement_tomb_first_emperor_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #V  博士发现了由兵马俑军团守卫的秦始皇陵#! 。" #deepl:3326302787
 lepsius_archaeologist_achievement_discovered_tikal_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #V  教授在危地马拉丛林中发现了玛雅城市蒂卡尔#! 。" #deepl:960255002
 lepsius_archaeologist_achievement_explored_petra_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #V  博士探索了中东灼热沙漠中的佩特拉城#! 。" #deepl:230969931
 lepsius_archaeologist_achievement_found_sarcophagus_intact_loc: "\#V 无名法老的石棺#! 的发现是[Scope.GetCharacter.GetLastNameNoFormatting] 博士最伟大的成就之一。" #deepl:397069606
 lepsius_archaeologist_achievement_found_sarcophagus_broken_loc: "\虽然[Scope.GetCharacter.GetLastNameNoFormatting] 博士发现了#V 无名法老墓#! ，但这一发现因法老木乃伊在一次不幸的事故中被毁而毁于一旦。" #deepl:4134291227
 lepsius_archaeologist_achievement_found_tutankhamun_loc: "\[Scope.GetCharacter.GetHerHis] 职业生涯的一个里程碑是发现了#V 法老图坦卡蒙完好无损的陵墓#! 。" #deepl:830597516
 lepsius_archaeologist_achievement_found_ship_of_khufu_loc: "\#V 胡夫之船#! 的发现将使[Scope.GetCharacter.GetLastNameNoFormatting] 博士的名字永远载入史册。" #deepl:263837328
 lepsius_archaeologist_achievement_found_tower_of_babylon_loc: "\[Scope.GetCharacter.GetHerHis] 在美索不达米亚期间，[Scope.GetCharacter.GetSheHe] 发现了#V 巴比伦塔#! ，考古学家称之为 Zikurrat Etemenanki。这是一个了不起的发现！" #deepl:3958757656
 lepsius_archaeologist_achievement_found_gardens_of_sennacherib_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士可能是唯一一个能以重新发现世界七大奇迹之一而自豪的人。|U[Scope.GetCharacter.GetSheHe] 实际上发现了#V 悬空花园#! 。" #deepl:1376956218
 lepsius_archaeologist_achivement_found_treasury_of_atreus_loc: "\当然，对于考古学家来说，一切都是宝藏，但[Scope.GetCharacter.GetLastNameNoFormatting] 博士的发现肯定是真正的宝藏。#V 迈锡尼的宝藏#! 包括许多东西，其中大部分都是用黄金制成的，比如黄金面具。" #deepl:3793568389
 lepsius_archaeologist_achievement_found_tomb_of_pakal_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士发现的#V Pakal#! 陵墓令人印象深刻。作为玛雅最伟大的国王，它应该给人留下深刻的印象。" #deepl:3301250790
 lepsius_archaeologist_achievement_raised_flag_on_pyramids_loc: "\在埃及工作期间，[Scope.GetCharacter.GetSheHe] #V  在吉萨大金字塔上升起一面旗帜#! 。" #deepl:453060665
 lepsius_archaeologist_achievement_reconstructed_ishtar_gate_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 教授不仅找到了#V 伊什塔尔门#! ，还重建了它。现在，它又重新焕发了光彩。" #deepl:3899648836
 lepsius_archaeologist_achievement_found_lamassu_loc: "\在一次充满危险的大冒险中，[Scope.GetCharacter.GetSheHe] 找到了雄伟的#V Lamassu#! 。" #deepl:1325115031
 lepsius_archaeologist_achievement_escaped_labyrinth_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士从#V 充满危险的神话迷宫#! 逃了出来。" #deepl:3205955848
 lepsius_archaeologist_achievement_survived_maya_pyramid_loc: "\有时考古是危险的。[Scope.GetCharacter.GetLastNameNoFormatting] 教授在神秘的#V 玛雅金字塔#! 的旅程中幸存下来，这次旅程与其说是考古，不如说是探险。" #deepl:2309875301
 lepsius_archaeologist_achievement_found_vilcabamba_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #V  重新发现了印加人最后的避难所维拉康巴#! 。" #deepl:1401010459
 lepsius_archaeologist_achievement_discovered_nazca_loc: "\[Scope.GetCharacter.GetSheHe|U] #V  在纳斯卡沙漠中发现了巨大的图画#! ，这些图画只有在天空中才能真正看到。" #deepl:3398521121
 lepsius_archaeologist_achievement_dinosaur_myth_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士受到科学界的嘲笑。他声称，他的#V 考察队员被恐龙吃掉了#! 。这种说法是荒谬还是真实？" #deepl:491140794
 lepsius_archaeologist_achievement_photo_evidence_independent_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 教授提供了#V 活恐龙的照片证据#! ，尽管没有人相信[Scope.GetCharacter.GetHerHim] 。" #deepl:1970351488
 lepsius_archaeologist_achievement_photo_support_loc: "\在政府的支持下，[Scope.GetCharacter.GetLastNameNoFormatting] ，教授得以提供#V 活恐龙#! 的照片证据，尽管他之前曾遭到嘲笑。" #deepl:278106961
