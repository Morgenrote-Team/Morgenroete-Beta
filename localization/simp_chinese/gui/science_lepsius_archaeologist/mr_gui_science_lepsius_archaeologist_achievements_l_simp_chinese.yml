chaeologist_achievement_tomb_first_emperor_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_discovered_tikal_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_discovered_tikal_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_explored_petra_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_explored_petra_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_sarcophagus_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_sarcophagus_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_tutankhamun_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_tutankhamun_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_ship_of_khufu_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_ship_of_khufu_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_tower_of_babylon_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_tower_of_babylon_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_gardens_of_sennacherib_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_gardens_of_sennacherib_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achivement_found_treasury_of_atreus_var').IsSet , Scope.Var('lepsius_archaeologist_achivement_found_treasury_of_atreus_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_tomb_of_pakal_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_tomb_of_pakal_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_raised_flag_on_pyramids_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_raised_flag_on_pyramids_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_reconstructed_ishtar_gate_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_reconstructed_ishtar_gate_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_lamassu_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_lamassu_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_escaped_labyrinth_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_escaped_labyrinth_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_survived_maya_pyramid_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_survived_maya_pyramid_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_vilcabamba_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_vilcabamba_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_discovered_nazca_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_discovered_nazca_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_lost_world_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_lost_world_var').GetFlagName)]"
 lepsius_archaeologist_no_archaeologist_loc: "当你拥有一位[concept_lepsius_archaeologist]后，其#V 成就#!将会展示在此处。"
 lepsius_archaeologist_achievements_intro_loc: "#V Achievements of this Archaeologist#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] is [Scope.GetCharacter.GetCustom('lepsius_archaeologist_experience_level_type')] who collected a total of [Scope.Var('lepsius_total_artifact_minor_archaeologist_var').GetValue|0+] [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')].#!"
 lepsius_archaeologist_achievement_famous_level_archaeologist_overview_loc: "著名[concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_experienced_level_archaeologist_overview_loc: "经验丰富的[concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_normal_level_archaeologist_overview_loc: "老练的[concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_expert_for_egyptian_archaeology_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]是#V 埃及考古学#!专家，[Scope.GetCharacter.GetSheHe]共收集了[Scope.Var('lepsius_egyptian_artifact_minor_archaeologist_var').GetValue|0V]件次要文物。#!"
 lepsius_archaeologist_achievement_expert_for_mesopotamian_archaeology_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]是#V 美索不达米亚考古学#!专家，[Scope.GetCharacter.GetSheHe]共收集了[Scope.Var('lepsius_mesopotamian_artifact_minor_archaeologist_var').GetValue|0V]件次要文物。#!"
 lepsius_archaeologist_achievement_expert_for_aegean_archaeology_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]是#V 爱琴海考古学#!专家，[Scope.GetCharacter.GetSheHe]共收集了[Scope.Var('lepsius_aegean_artifact_minor_archaeologist_var').GetValue|0V]件次要文物。#!"
 lepsius_archaeologist_achievement_expert_for_precolumbian_archaeology_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]是#V 前哥伦布时期考古学#!专家，[Scope.GetCharacter.GetSheHe]共收集了[Scope.Var('lepsius_precolumbian_artifact_minor_archaeologist_var').GetValue|0V]件次要文物。#!"
 lepsius_archaeologist_achievement_expert_for_fareastern_archaeology_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]是#V 远东考古学#!专家，[Scope.GetCharacter.GetSheHe]共收集了[Scope.Var('lepsius_fareastern_artifact_minor_archaeologist_var').GetValue|0V]件次要文物。#!"
 lepsius_archaeologist_achievement_expert_for_oceanic_archaeology_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]是#V 大洋洲考古学#!专家，[Scope.GetCharacter.GetSheHe]共收集了[Scope.Var('lepsius_oceanic_artifact_minor_archaeologist_var').GetValue|0V]次要文物。#!"
 lepsius_archaeologist_achievement_not_expert_loc: ""
 lepsius_archaeologist_achievement_attended_exodus_congress_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]出席了#V 《出埃及记》考古大会#!#!"
 lepsius_archaeologist_achievement_attended_civilization_congress_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]出席了#V 文明起源考古大会#!#!"
 lepsius_archaeologist_achievement_attended_troy_congress_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]出席了#V 特洛伊考古大会#!#!"
 lepsius_archaeologist_achievement_invented_three_age_system_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetHerHis]最伟大的贡献是创立#V 三期分期法#!（石器时代、青铜时代、铁器时代），为考古学建立时间框架。#!"
 lepsius_archaeologist_achievement_invented_early_archaeology_loc: "\n#indent_newline:3 ※通过地层学方法和系统记录，[Scope.GetCharacter.GetLastNameNoFormatting]#V 将考古学革新为真正的科学#!。#!"
 lepsius_archaeologist_achievement_inaugurated_museum_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士主导#V 创建考古博物馆#!，以学术逻辑陈列文物。#!"
 lepsius_archaeologist_achievement_new_methods_pompeii_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]教授在庞贝古城开发了#V 文物原位保护新技术#!。#!"
 lepsius_archaeologist_achievement_discovered_teotihuacan_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士是主导#V 特奥蒂瓦坎太阳神庙重建#!的关键人物。#!"
 lepsius_archaeologist_achievement_discovered_harappa_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]教授在哈拉帕#V 发现了印度河谷文明遗址。#!#!"
 lepsius_archaeologist_achievement_tomb_first_emperor_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士发现了#V 兵马俑守卫的始皇陵#!。#!"
 lepsius_archaeologist_achievement_discovered_tikal_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]教授在危地马拉丛林中#V 发现了蒂卡尔玛雅城邦#!。#!"
 lepsius_archaeologist_achievement_explored_petra_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士在中东沙漠中探索了#V 佩特拉古城#!。#!"
 lepsius_archaeologist_achievement_found_sarcophagus_intact_loc: "\n#indent_newline:3 ※#!#V 无名法老石棺#!的发现，是[Scope.GetCharacter.GetLastNameNoFormatting]博士最伟大的成就之一！"
 lepsius_archaeologist_achievement_found_sarcophagus_broken_loc: "\n#indent_newline:3 ※尽管[Scope.GetCharacter.GetLastNameNoFormatting]博士发现了#V 无名法老陵墓#!，但由于一场意外事故导致法老木乃伊损毁，这一发现功亏一篑。#!"
 lepsius_archaeologist_achievement_found_tutankhamun_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetHerHis]职业生涯的里程碑是发现完整的#V 法老图坦卡蒙#!陵墓#!"
 lepsius_archaeologist_achievement_found_ship_of_khufu_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士因发现#V 胡夫船#!而永远载入史册。#!"
 lepsius_archaeologist_achievement_found_tower_of_babylon_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetHerHis]在美索不达米亚发现了#V 巴别塔#!，并将其命名为Zikurrat Etemenanki。#!"
 lepsius_archaeologist_achievement_found_gardens_of_sennacherib_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士可能是唯一一位重新发现世界七大奇迹之一的人，[Scope.GetCharacter.GetSheHe|U]发现了#V 空中花园#!。#!"
 lepsius_archaeologist_achivement_found_treasury_of_atreus_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士完成其他考古学家无法完成的伟业，发现了真正的宝藏——#V 迈锡尼的宝藏#!，里面甚至有黄金面具#!"
 lepsius_archaeologist_achievement_found_tomb_of_pakal_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士的发现了玛雅最伟大的国王陵墓——#V 巴加尔之墓#!#!"
 lepsius_archaeologist_achievement_raised_flag_on_pyramids_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe]在埃及工作期间，前往#V 大金字塔顶端#!升起了一面旗帜。#!"
 lepsius_archaeologist_achievement_reconstructed_ishtar_gate_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]教授不仅找到了还重建了#V 伊什塔尔门#!，使它再次闪耀着昔日的辉煌。#!"
 lepsius_archaeologist_achievement_found_lamassu_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe]在一次大探险中找到了雄伟的#V 拉玛苏雕像#!#!"
 lepsius_archaeologist_achievement_escaped_labyrinth_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士从充满危险#V 迷宫#!中逃出#!"
 lepsius_archaeologist_achievement_survived_maya_pyramid_loc: "\n#indent_newline:3 ※考古学有时充满危险。[Scope.GetCharacter.GetLastNameNoFormatting]教授曾深入一座神秘的#V 玛雅金字塔#!，那更像是一场冒险而非学术考察，[Scope.GetCharacter.GetHerHis]最终幸存了下来。#!"
 lepsius_archaeologist_achievement_found_vilcabamba_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士#V 重新发现了比尔卡班巴#!——印加帝国最后的避难所。#!"
 lepsius_archaeologist_achievement_discovered_nazca_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]还在纳斯卡沙漠中#V 发现了巨大的地画#!，这些图案只有从空中才能真正看清。#!"
 lepsius_archaeologist_achievement_dinosaur_myth_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士却被科学界嘲笑。[Scope.GetCharacter.GetSheHe|U]声称自己的#V 探险队成员被恐龙吃掉了#!。这番话是荒诞无稽，还是事实真相？#!"
 lepsius_archaeologist_achievement_photo_evidence_independent_loc: "\n#indent_newline:3 ※尽管无人相信，[Scope.GetCharacter.GetLastNameNoFormatting]教授仍提供了#V 活体恐龙#!的照片证据。#!"
 lepsius_archaeologist_achievement_photo_support_loc: "\n#indent_newline:3 ※在政府的支持下，尽管此前饱受嘲讽，[Scope.GetCharacter.GetLastNameNoFormatting]教授仍成功拍摄并公布了#V 活体恐龙#!的存在证据。#!"