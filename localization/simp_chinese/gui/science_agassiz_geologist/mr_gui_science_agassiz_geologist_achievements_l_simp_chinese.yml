 MR_GEOLOGIST_ACHIEVEMENTS: "[AddLocalizationIf( Scope.IsSet , 'agassiz_geologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'agassiz_geologist_no_geologist_loc')]" #deepl:4065666483

 agassiz_geologist_achievements_loc: "$agassiz_geologist_achievements_intro_loc$[AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_seismology_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_seismology_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').IsSet , Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_explored_volcano_var').IsSet , Scope.Var('agassiz_geologist_achievement_explored_volcano_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').GetFlagName)]" #deepl:1006055885
 agassiz_geologist_no_geologist_loc: "#V  [concept_agassiz_geologist] #! 的成就，一旦您有了成就，就会显示在这里。" #deepl:2266901269
 agassiz_geologist_achievements_intro_loc: "#V 这位地质学家的成就#! [Scope.GetCharacter.GetLastNameNoFormatting] 博士是一位杰出的地质学家，他收集了[Scope.GetVariable('agassiz_geologist_minerals_var').GetValue|0V] [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] 和[Scope.GetVariable('agassiz_geologist_rare_minerals_var').GetValue|0V] [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] 。[Scope.GetCharacter.GetHerHis|U] 地质学研究为我们提供了[Scope.GetVariable('agassiz_geologist_geological_knowledge_var').GetValue|0V] [concept_agassiz_geological_knowledge] 。" #deepl:2506244890

 agassiz_geologist_achievement_invented_seismology_loc: "\#V 发明的地震学#! 是[Scope.GetCharacter.GetLastNameNoFormatting] 博士最伟大的成就之一。它可以预测地震和火山爆发。" #deepl:4027906331
 agassiz_geologist_achievement_invented_plate_tectonics_loc: "#! \#V "板块构造理论 "的发明是否是[Scope.GetCharacter.GetLastNameNoFormatting] 博士最伟大的成就之一？由于并非所有[Scope.GetCharacter.GetHerHis] 的同行都接受这一理论，因此只有未来才能证明它是否会被视为[Scope.GetCharacter.GetHerHis] 最重要的发现，或者是否会被遗忘。" #deepl:1012351458
 agassiz_geologist_achievement_attended_geologist_congress_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #V  博士出席了板块构造地质大会#! 。" #deepl:941722190
 agassiz_geologist_achievement_explored_volcano_loc: "\#V 勘探火山#! 是一项危险的工作，但[Scope.GetCharacter.GetLastNameNoFormatting] 博士从对其中一座火山的考察中学到了很多东西。" #deepl:3489984187
 agassiz_geologist_achievement_discovered_helium_on_earth_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士是#V 在地球上发现氦气的第一人#! ，氦气必将成为未来非常有用的资源。" #deepl:1490724762
 agassiz_geologist_achievement_finished_pacific_expedition_loc: "\[Scope.GetCharacter.GetFullNameNoFormatting] 参加了#V 太平洋探险#! 。" #deepl:1964542330
 agassiz_geologist_achievement_returned_from_center_of_earth_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] ，显然#V ，到达地球中心#! ，然后又从那里返回。但这个故事真的是真的吗？" #deepl:3298936682
