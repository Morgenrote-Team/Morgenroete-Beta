l_simp_chinese:
 MR_GEOLOGIST_ACHIEVEMENTS: "[AddLocalizationIf( Scope.IsSet , 'agassiz_geologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'agassiz_geologist_no_geologist_loc')]"
 agassiz_geologist_achievements_loc: "$agassiz_geologist_achievements_intro_loc$[AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_seismology_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_seismology_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').IsSet , Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_explored_volcano_var').IsSet , Scope.Var('agassiz_geologist_achievement_explored_volcano_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('aagassiz_geologist_achievement_ring_of_fire_discovered_var').IsSet , Scope.Var('agassiz_geologist_achievement_ring_of_fire_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_moon_impact_var').IsSet , Scope.Var('agassiz_geologist_achievement_moon_impact_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').GetFlagName)]"
 agassiz_geologist_no_geologist_loc: "当你拥有一位[concept_agassiz_geologist]后，其#V 成就#!将会展示在此处。"
 agassiz_geologist_achievements_intro_loc: "#V 该地质学家的成就#!\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士是一位老练的地质学家。\n[Scope.GetCharacter.GetHerHis|U]共收集了[Scope.GetVariable('agassiz_geologist_minerals_var').GetValue|0V]种[Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]和[Scope.GetVariable('agassiz_geologist_rare_minerals_var').GetValue|0V]种[Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]。[Scope.GetCharacter.GetHerHis|U]在地质学上的研究为了我们提供了[Scope.GetVariable('agassiz_geologist_geological_knowledge_var').GetValue|0V]点[concept_agassiz_geological_knowledge]。#!"
 agassiz_geologist_achievement_invented_seismology_loc: "\n#indent_newline:3 ※#V 地震学的创立#!是[Scope.GetCharacter.GetLastNameNoFormatting]博士最杰出的成就之一，该学科为预测地震与火山喷发提供了理论基础。#!"
 agassiz_geologist_achievement_invented_plate_tectonics_loc: "\n#indent_newline:3 ※#V 板块构造理论的提出#!是否算得上[Scope.GetCharacter.GetLastNameNoFormatting]博士最重要的成就？由于[Scope.GetCharacter.GetHerHis]的同事们并未完全接受这一理论，它究竟会成为[Scope.GetCharacter.GetHerHis]学术生涯的里程碑，还是湮没在历史中，唯有时间能给出答案。#!"
 agassiz_geologist_achievement_attended_geologist_congress_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士#V 出席了板块构造理论地质学大会#!。 #!"
 agassiz_geologist_achievement_explored_volcano_loc: "\n#indent_newline:3 ※#V 火山考察#!充满危险，但[Scope.GetCharacter.GetLastNameNoFormatting]博士从对其中一座火山的考察中获得了重要发现。#!"
 agassiz_geologist_achievement_discovered_helium_on_earth_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士作为#V 地球上氦元素发现者#!，这一成就将为未来资源利用带来重大突破。#!"
 agassiz_geologist_achievement_finished_pacific_expedition_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetFullNameNoFormatting]参加了#V 太平洋探险#!。#!"
 agassiz_geologist_achievement_returned_from_center_of_earth_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士宣称#V 抵达地心区域#!并成功返回，但这一说法缺乏科学依据。#!"
 mr_science_geologist_tab_organization: "组织"
 MR_GEOLOGIST_HIGHEST_MOUNTAIN_BUTTON: "世界之巅"
 MR_GEOLOGIST_HIGHEST_MOUNTAIN_BUTTON_TT: "#T 世界之巅#!\n自18世纪以来，传统的地质学世界观不断受到冲击。安第斯山脉曾长期被视为地球最高山脉，而喜马拉雅山脉正逐渐崭露头角。这场对最高峰的追寻，激发了地质学家们的无限遐想——但探索之路，依然漫长。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_HIMALAYAS_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName]在喜马拉雅地区拥有利益。#!"
 MR_GEOLOGIST_NO_HIMALAYA_SURVEY_TRIGGER_TT: "#default_text 当前没有其他国家在喜马拉雅搜索世界最高峰。#!"
 agassiz_geologist_achievement_moon_impact_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士提出假说，认为#V 月球是由一颗未知巨型天体撞击地球形成的#!。这一理论虽是高度推测所得，但展现了非凡的独创性。#!"
 agassiz_geologist_achievement_ring_of_fire_discovered_loc: "\n#indent_newline:3 ※在#V 太平洋远征#!中，[Scope.GetCharacter.GetLastNameNoFormatting]博士注意到海洋边缘密集的火山群——#V 火环带#!——并认为这绝非偶然。[Scope.GetCharacter.GetSheHe|U]由此为地质学研究提供了重要推动证据。#!"