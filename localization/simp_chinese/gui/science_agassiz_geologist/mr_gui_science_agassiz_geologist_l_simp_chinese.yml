l_simp_chinese:
 mr_science_geologist_tab_organization: "组织"
 MR_GEOLOGIST_HIGHEST_MOUNTAIN_BUTTON: "世界之巅"
 MR_GEOLOGIST_HIGHEST_MOUNTAIN_BUTTON_TT: "#T 最高峰#!\n自18世纪以来，现存的地质学世界观不断受到动摇。虽然安第斯山脉长期被视为世界最高山脉，但喜马拉雅山脉正日益崭露头角。对最高峰的追寻激发了地质学家的想象力——但这场探索远未结束。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_HIMALAYAS_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName]对喜马拉雅地区很感兴趣。#!"
 MR_GEOLOGIST_NO_HIMALAYA_SURVEY_TRIGGER_TT: "#default_text 目前没有其他国家在喜马拉雅山脉探索最高峰。#!"
 MR_GEOLOGIST_URANIUM_BUTTON: "铀矿勘探"
 MR_GEOLOGIST_URANIUM_BUTTON_TT: "#T 铀矿勘探#!\n地质学家可以在国外寻找铀矿藏，并可能在那里建立自己的矿场。然而，要获取我国境内的铀矿资源，我们必须另行签订合同。这一过程可能长达五年。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_FIND_URANIUM_TRIGGER_TT: "#default_text 至少存在一个未被发现的铀矿床。#!"
 MR_GEOLOGIST_URANIUM_STOP_BUTTON_TT: "#T 铀矿勘探#!\n你的[concept_agassiz_geologist]正在全球范围内搜寻未知铀矿资源。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_geologist_uranium_stop_button_effect_tt: "你的[concept_agassiz_geologist]将停止勘探铀矿。"