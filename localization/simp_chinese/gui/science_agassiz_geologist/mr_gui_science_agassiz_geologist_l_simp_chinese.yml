l_simp_chinese:
 mr_science_geologist_tab_organization: "Organization"
 MR_GEOLOGIST_HIGHEST_MOUNTAIN_BUTTON: "The Highest Mountain"
 MR_GEOLOGIST_HIGHEST_MOUNTAIN_BUTTON_TT: "#T The Highest Mountain#!\nSince the 18th century, the existing geological worldview has been increasingly shaken. While the Andes were long considered the world's highest mountain range, the Himalayas are increasingly coming to the fore. The search for the highest mountain has fueled the imagination of geologists—but is still far from over.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_HIMALAYAS_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] has an interest in the Himalayas region.#!"
 MR_GEOLOGIST_NO_HIMALAYA_SURVEY_TRIGGER_TT: "#default_text No other nation is currently exploring the Himalayas for the highest mountain.#!"
 MR_GEOLOGIST_URANIUM_BUTTON: "Uranium Expedition"
 MR_GEOLOGIST_URANIUM_BUTTON_TT: "#T Uranium Expedition#!\nA geologist can search for uranium deposits abroad and possibly establish their own mine there. However, to obtain the uranium in our country, we must conclude a separate contract. This process can take up to five years.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_FIND_URANIUM_TRIGGER_TT: "#default_text There is at least one undiscovered uranium deposit.#!"
 MR_GEOLOGIST_URANIUM_STOP_BUTTON_TT: "#T Uranium Expedition#!\nYour [concept_agassiz_geologist] is currently searching for unknown uranium deposits around the world.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_geologist_uranium_stop_button_effect_tt: "Your [concept_agassiz_geologist] will stop prospecting for uranium."