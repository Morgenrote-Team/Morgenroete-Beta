l_simp_chinese:
 MR_MOUNTAIN_GENERAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a #V General#! with the #V $douglas_mountaineer$#!, #V $douglas_mountaineer_veteran$#!, #V $mountain_commander$#!, #V $surveyor$#! or #V $explorer$#! [concept_character_trait].#!"
 MR_MOUNTAINEERING_CLUB_BUTTON: "登山协会"
 MR_MOUNTAINEERING_CLUB_BUTTON_TT: "#T 建立登山协会#!\n登山协会是有组织的登山运动的第一步。它必须由一位经验丰富的登山家创立。有了协会，新的登山者会源源不断地涌现，征服世界之巅！\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_BUTTON: "阿尔卑斯俱乐部"
 MR_ALPINE_CLUB_BUTTON_TT: "#T 建立阿尔卑斯俱乐部#!\n阿尔卑斯俱乐部于1857年在伦敦成立，是世界上历史最悠久的登山组织。它的成立标志着维多利亚时代英格兰有组织的登山运动开端。俱乐部旨在促进对阿尔卑斯山的科学、地理和运动探索。爱德华·温珀是俱乐部的创始成员之一，他于1865年首次登顶马特洪峰。阿尔卑斯俱乐部在“登山黄金时代”发挥了关键作用，出版了包括《阿尔卑斯杂志》在内的多部具有影响力的著作，它为世界各地未来登山俱乐部树立了典范。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_TRIGGER_TT: "#default_text 至少有#G 6个#!国家已成立登山协会。#!"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON: "成为阿尔卑斯俱乐部主席"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON_TT: "#T 成为阿尔卑斯俱乐部主席#!\n倘若阿尔卑斯俱乐部无在任主席，我国可以担任此职。前提是我们已经控制阿尔卑斯俱乐部的总部\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName]控制[GetBuildingType('building_douglas_alpine_club').GetName]#!。"
 douglas_alpine_club_board_member_tt: "[GetPlayer.GetName]成为阿尔卑斯俱乐部的理事会成员。"
 douglas_become_alpine_club_president_tt: "[GetPlayer.GetName]成为阿尔卑斯俱乐部的主席。"
 MR_ALPINE_CLUB_EXPERIENCE_TRIGGER_TT: "#default_text The mountaineer has at least #p 50#! #V Experience#!.#!"
 MR_RECRUIT_MOUNTAINEER_BUTTON: "招募登山家"
 MR_RECRUIT_MOUNTAINEER_BUTTON_TT: "#T 招募登山家#!\n拥有登山协会与足够的[concept_douglas_alpine_heritage]即可招募新的登山家。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAINEERING_CLUB_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有#V 登山协会#!。#!"
 MR_ALPINE_HERITAGE_50_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least #G 50#! [concept_douglas_alpine_heritage].#!"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON: "山地兵团"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON_TT: "#T 山地兵团#!\n倘若某山区民众对其祖国怀有赤诚之心，一位合格的将领便能在此组建一支受过专业山地步兵战术训练的兵团。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_HERITAGE_25_TRIGGER_TT: "#default_text [GetPlayer.GetName] has at least #G 50#! [concept_douglas_alpine_heritage].#!"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON: "登山装备"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON_TT: "#T Mountaineering Equipment#!\nBetter #V Mountaineering Equipment#! provides better success chances. This requires new technologies for each step.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EQUIPMENT_1_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有#V $douglas_mountaineering_equipment_level_1_modifier$#!修正。#!"
 MR_MOUNTAIN_EQUIPMENT_2_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有#V $douglas_mountaineering_equipment_level_2_modifier$#!修正。#!"
 MR_MOUNTAIN_EQUIPMENT_3_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有#V $douglas_mountaineering_equipment_level_3_modifier$#!修正。#!"
 MR_MOUNTAIN_EQUIPMENT_4_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有#V $douglas_mountaineering_equipment_level_4_modifier$#!修正。#!"
 MR_MOUNTAIN_EQUIPMENT_5_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有#V $douglas_mountaineering_equipment_level_5_modifier$#!修正。#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_1_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName]需至少拥有一座未登顶的#V 一级#![concept_douglas_mountain_summit]，或与拥有此类山峰的国家签订#V 登山许可#!。详情参见[concept_douglas_mountain_summit_list]。#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_2_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName]需至少拥有一座未登顶的#V 二级#![concept_douglas_mountain_summit]，或与拥有此类山峰的国家签订#V 登山许可#!。详情参见[concept_douglas_mountain_summit_list]。#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_3_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName]需至少拥有一座未登顶的#V 三级#![concept_douglas_mountain_summit]，或与拥有此类山峰的国家签订#V 登山许可#!。详情参见[concept_douglas_mountain_summit_list]。#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_4_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName]需至少拥有一座未登顶的#V 四级#![concept_douglas_mountain_summit]，或与拥有此类山峰的国家签订#V 登山许可#!。详情参见[concept_douglas_mountain_summit_list]。#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_5_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName]需至少拥有一座未登顶的#V 五级#![concept_douglas_mountain_summit]，或与拥有此类山峰的国家签订#V 登山许可#!。详情参见[concept_douglas_mountain_summit_list]。#!"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON: "Expedition: Level 1 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON_TT: "#T 登山探险：一级山峰#!\n这是可用一级登山装备完成攀登的山峰，该等级与海拔及登山风险无关：\n惠特尼峰、奥里萨巴山、波波卡特佩特火山、钦博拉索山、阿内托峰、勃朗峰、大韦内迪格山、喀麦隆火山、拉斯·达善峰和吉卢韦山。详情参见[concept_douglas_mountain_summit_list]。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON: "Expedition: Level 2 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON_TT: "#T 登山探险：二级山峰#!\n这是需用二级登山装备完成攀登的山峰，该等级与海拔及登山风险无关：\n基博峰、杜富尔峰、库克山和威廉山。详情参见[concept_douglas_mountain_summit_list]。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON: "Expedition: Level 3 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON_TT: "#T Mountaineering Expedition: Level 3 Summits#!\nThis category of mountains can be climbed with Level 3 mountaineering equipment. The level does not indicate the altitude or risk. These peaks include: Mount Elias, Aconcagua, Aiguille Verte, Matterhorn, Mount Kenya(Mount Kenya), and Mount Stanley. For more information, have a look at the [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON: "Expedition: Level 4 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON_TT: "#T 登山探险：四级山峰#!\n这是需用四级登山装备完成攀登的山峰，该等级与海拔及登山风险无关：\n洛根山、麦金利山、伊宜马尼峰、皮西斯峰、希卡拉陶山、卡美特山、考夫曼山和贡嘎山。详情参见[concept_douglas_mountain_summit_list]。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON: "Expedition: Level 5 Summits"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON_TT: "#T 登山探险：五级山峰#!\n这是需用五级登山装备完成攀登的山峰，该等级与海拔及登山风险无关：\n瓦斯卡兰山、乔戈里峰和卡布鲁峰。详情参见[concept_douglas_mountain_summit_list]。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAINEER_TRAINING_BUTTON: "Mountaineering Training"
 MR_MOUNTAINEER_TRAINING_BUTTON_TT: "#T Mountaineering Training#!\nCountries can train their mountaineers if they have mountain ranges or conquered summits which are considered safe.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPORTS_MOUNTAINEER_EXPEDITIONS_TAB: "Expeditions"
 MR_SPORTS_MOUNTAINEER_ORGANISATION_TAB: "Organization"
 MR_SPORTS_MOUNTAINEER_CLUB_TAB: "Club"
 MR_ALPINE_CLUB_START_EXPEDITION_BUTTON: "Start International Expedition"
 MR_ALPINE_CLUB_START_EXPEDITION_BUTTON_TT: "#T Start International Expedition#!\nThe President of the Alpine Club has the right to initiate an international mountaineering expedition. This is only possible every ten years.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_PROPOSE_EXPEDITION_BUTTON: "Propose International Expedition"
 MR_ALPINE_CLUB_PROPOSE_EXPEDITION_BUTTON_TT: "#T Propose International Expedition#!\nAlpine Club board members have the right to propose an international mountaineering expedition. This must be approved by the president.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_JOIN_EXPEDITION_BUTTON: "Join International Expedition"
 MR_ALPINE_CLUB_JOIN_EXPEDITION_BUTTON_TT: "#T Join International Expedition#!\nAs a board member of the Alpine Club, we are called upon to participate in the International Mountaineering Expedition to ensure its success.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_RECENT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text The last international expedition was at least 10 years ago.#!"
 MR_MOUNTAIN_RECENT_INTERNATIONAL_EXPEDITION_NO_SETBACK_TRIGGER_TT: "#default_text The President of the Alpine Club did not veto an international expedition.#!"
 MR_MOUNTAIN_EQUIPMENT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text The President has the necessary equipment (Level 3, Level 4, or Level 5) to host an International Expedition.#!"
 MR_MOUNTAIN_UNCONQUERED_SUMMIT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text There is at least one summit still to be conquered with level 2, level 3 or level 4.#!"
 MR_ALPINE_PRESIDENT_HAS_ACTIVE_MOUNTAINEER_TRIGGER_TT: "#default_text The President has a [concept_douglas_mountaineer] who is #V not busy#!.#!"
 MR_MOUNT_EVEREST_EXPEDITION_BUTTON: "Mount Everest Expedition"
 MR_MOUNT_EVEREST_EXPEDITION_BUTTON_TT: "#T Mount Everest Expedition#!\nAs the highest mountain in the world, Mount Everest is the dream destination of all mountaineers - but is an expedition there really the fulfillment of all mountaineering dreams, or rather delusions of grandeur?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_UNCONQUERED_MOUNT_EVEREST_SUMMIT_TRIGGER_TT: "#default_text The Mount Everest has #R not#! been conquered yet.#!"
