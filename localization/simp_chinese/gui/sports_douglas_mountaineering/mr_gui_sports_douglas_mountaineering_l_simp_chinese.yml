l_simp_chinese:
 MR_MOUNTAIN_GENERAL_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有一位带#V $douglas_mountaineer$#!、#V $douglas_mountaineer_veteran$#!、#V $mountain_commander$#!、#V $surveyor$#!或#V $explorer$#![concept_character_trait]的#V 陆军将领#!#!"
 MR_MOUNTAINEERING_CLUB_BUTTON: "登山协会"
 MR_MOUNTAINEERING_CLUB_BUTTON_TT: "#T 建立登山协会#!\n登山协会是有组织的登山运动的第一步。它必须由一位经验丰富的登山家创立。有了协会，新的登山者会源源不断地涌现，征服世界之巅！\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_BUTTON: "高山俱乐部"
 MR_ALPINE_CLUB_BUTTON_TT: "#T 建立高山俱乐部#!\n高山俱乐部（现实中名字为阿尔卑斯俱乐部）于1857年在伦敦成立，是世界上历史最悠久的登山组织。它的成立标志着维多利亚时代英格兰有组织的登山运动开端。俱乐部旨在促进对阿尔卑斯山的科学、地理和运动探索。爱德华·温珀是俱乐部的创始成员之一，他于1865年首次登顶马特洪峰。阿尔卑斯俱乐部在“登山黄金时代”发挥了关键作用，出版了包括《阿尔卑斯杂志》在内的多部具有影响力的著作，它为世界各地未来登山俱乐部树立了典范。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_TRIGGER_TT: "#default_text 至少有#G 6个#!国家已成立登山协会。#!"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON: "成为高山俱乐部主席"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON_TT: "#T 成为高山俱乐部主席#!\n倘若高山俱乐部无在任主席，我国可以担任此职。前提是我们已经控制高山俱乐部的总部\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName]控制[GetBuildingType('building_douglas_alpine_club').GetName]#!。"
 douglas_alpine_club_board_member_tt: "[GetPlayer.GetName]成为高山俱乐部的理事会成员。"
 douglas_become_alpine_club_president_tt: "[GetPlayer.GetName]成为高山俱乐部的主席。"
 MR_ALPINE_CLUB_EXPERIENCE_TRIGGER_TT: "#default_text 登山家拥有至少#p 50#!#V 经验#!。#!"
 MR_RECRUIT_MOUNTAINEER_BUTTON: "招募登山家"
 MR_RECRUIT_MOUNTAINEER_BUTTON_TT: "#T 招募登山家#!\n拥有登山协会与足够的[concept_douglas_alpine_heritage]即可招募新的登山家。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAINEERING_CLUB_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有#V 登山协会#!。#!"
 MR_ALPINE_HERITAGE_50_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有至少#G 50#![concept_douglas_alpine_heritage]。#!"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON: "山地兵团"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON_TT: "#T 山地兵团#!\n倘若某山区民众对其祖国怀有赤诚之心，一位合格的将领便能在此组建一支受过专业山地步兵战术训练的兵团。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_HERITAGE_25_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有至少#G 50#![concept_douglas_alpine_heritage]。#!"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON: "登山装备"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON_TT: "#T 登山装备#!\n更好的#V 登山装备#!能提高成功率，但每次装备升级均需新科技。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EQUIPMENT_1_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有#V $douglas_mountaineering_equipment_level_1_modifier$#!修正。#!"
 MR_MOUNTAIN_EQUIPMENT_2_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有#V $douglas_mountaineering_equipment_level_2_modifier$#!修正。#!"
 MR_MOUNTAIN_EQUIPMENT_3_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有#V $douglas_mountaineering_equipment_level_3_modifier$#!修正。#!"
 MR_MOUNTAIN_EQUIPMENT_4_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有#V $douglas_mountaineering_equipment_level_4_modifier$#!修正。#!"
 MR_MOUNTAIN_EQUIPMENT_5_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有#V $douglas_mountaineering_equipment_level_5_modifier$#!修正。#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_1_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName]需至少拥有一座未登顶的#V 一级#![concept_douglas_mountain_summit]，或与拥有此类山峰的国家签订#V 登山许可#!。详情参见[concept_douglas_mountain_summit_list]。#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_2_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName]需至少拥有一座未登顶的#V 二级#![concept_douglas_mountain_summit]，或与拥有此类山峰的国家签订#V 登山许可#!。详情参见[concept_douglas_mountain_summit_list]。#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_3_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName]需至少拥有一座未登顶的#V 三级#![concept_douglas_mountain_summit]，或与拥有此类山峰的国家签订#V 登山许可#!。详情参见[concept_douglas_mountain_summit_list]。#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_4_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName]需至少拥有一座未登顶的#V 四级#![concept_douglas_mountain_summit]，或与拥有此类山峰的国家签订#V 登山许可#!。详情参见[concept_douglas_mountain_summit_list]。#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_5_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName]需至少拥有一座未登顶的#V 五级#![concept_douglas_mountain_summit]，或与拥有此类山峰的国家签订#V 登山许可#!。详情参见[concept_douglas_mountain_summit_list]。#!"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON: "探险：一级山峰"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON_TT: "#T 登山探险：一级山峰#!\n这是可用一级登山装备完成攀登的山峰，该等级与海拔及登山风险无关：\n惠特尼峰、奥里萨巴山、波波卡特佩特火山、钦博拉索山、阿内托峰、勃朗峰、大韦内迪格山、喀麦隆火山、拉斯·达善峰和吉卢韦山。详情参见[concept_douglas_mountain_summit_list]。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON: "探险：二级山峰"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON_TT: "#T 登山探险：二级山峰#!\n这是需用二级登山装备完成攀登的山峰，该等级与海拔及登山风险无关：\n基博峰、杜富尔峰、库克山和威廉山。详情参见[concept_douglas_mountain_summit_list]。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON: "探险：三级山峰"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON_TT: "#T 登山探险：三级山峰#!\n这类山峰可使用三级登山装备攀登。该级别不体现海拔高度或风险等级。这类山峰包括：圣埃利亚斯山、阿空加瓜山、艾吉耶维尔特山、马特洪峰、肯尼亚山和斯坦利山。详情参见[concept_douglas_mountain_summit_list]。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON: "探险：四级山峰"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON_TT: "#T 登山探险：四级山峰#!\n这是需用四级登山装备完成攀登的山峰，该等级与海拔及登山风险无关：\n洛根山、麦金利山、伊宜马尼峰、皮西斯峰、希卡拉陶山、卡美特山、考夫曼山和贡嘎山。详情参见[concept_douglas_mountain_summit_list]。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON: "探险：五级山峰"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON_TT: "#T 登山探险：五级山峰#!\n这是需用五级登山装备完成攀登的山峰，该等级与海拔及登山风险无关：\n瓦斯卡兰山、乔戈里峰和卡布鲁峰。详情参见[concept_douglas_mountain_summit_list]。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAINEER_TRAINING_BUTTON: "登山训练"
 MR_MOUNTAINEER_TRAINING_BUTTON_TT: "#T 登山训练#!\n国家若拥有被视为安全的山脉或已征服的山峰，便可训练其登山家。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPORTS_MOUNTAINEER_EXPEDITIONS_TAB: "探险队"
 MR_SPORTS_MOUNTAINEER_ORGANISATION_TAB: "组织"
 MR_SPORTS_MOUNTAINEER_CLUB_TAB: "协会"
 MR_ALPINE_CLUB_START_EXPEDITION_BUTTON: "开始国际探险"
 MR_ALPINE_CLUB_START_EXPEDITION_BUTTON_TT: "#T 启动国际探险#!\n高山俱乐部的主席有权发起国际登山远征活动，每十年可行使一次。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_PROPOSE_EXPEDITION_BUTTON: "提议国际探险"
 MR_ALPINE_CLUB_PROPOSE_EXPEDITION_BUTTON_TT: "#T 提议国际探险#!\n高山俱乐部成员有权提议国际登山探险活动，该提议必须获得主席批准。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_JOIN_EXPEDITION_BUTTON: "加入国际探险"
 MR_ALPINE_CLUB_JOIN_EXPEDITION_BUTTON_TT: "#T 加入国际探险队#!\n作为高山俱乐部的董事会成员，我们被召集参与国际登山探险活动以确保其成功。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_RECENT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text 上一次国际探险至少是10年前的事了。#!"
 MR_MOUNTAIN_RECENT_INTERNATIONAL_EXPEDITION_NO_SETBACK_TRIGGER_TT: "#default_text 高山俱乐部主席并未否决一次国际探险。#!"
 MR_MOUNTAIN_EQUIPMENT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text 主席拥有举办国际探险所需的必要装备（3级、4级或5级）。#!"
 MR_MOUNTAIN_UNCONQUERED_SUMMIT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text 至少还有一座难度等级为2级、3级或4级山峰有待征服。#!"
 MR_ALPINE_PRESIDENT_HAS_ACTIVE_MOUNTAINEER_TRIGGER_TT: "#default_text 主席拥有一位#V 空闲#![concept_douglas_mountaineer]。#!"
 MR_MOUNT_EVEREST_EXPEDITION_BUTTON: "珠穆朗玛峰探险"
 MR_MOUNT_EVEREST_EXPEDITION_BUTTON_TT: "#T 珠穆朗玛峰远征#!\n作为世界最高峰，珠穆朗玛峰是所有登山家梦寐以求的目标，但征服珠穆朗玛峰真的能实现所有登山家的梦想吗？还是说这只是妄想？\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
