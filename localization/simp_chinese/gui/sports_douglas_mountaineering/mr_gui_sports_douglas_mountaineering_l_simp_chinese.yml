 MR_MOUNTAIN_UNCONQUERED_LEVEL_1_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName]需至少拥有一座未登顶的#V 一级#![concept_douglas_mountain_summit]，或与拥有此类山峰的国家签订#V 登山许可#!。详情参见[concept_douglas_mountain_summit_list]。#!"
