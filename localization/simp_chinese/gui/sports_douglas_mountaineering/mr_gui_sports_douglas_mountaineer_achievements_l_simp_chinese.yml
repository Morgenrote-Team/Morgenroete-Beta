l_simp_chinese:
 MR_SPORTS_MOUNTAINEERN_TT: "[AddLocalizationIf( Scope.IsSet , 'douglas_mountaineer_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'douglas_mountaineer_no_mountaineer_achievements_loc')]"
 douglas_mountaineer_achievements_loc: "$douglas_mountaineer_achievements_intro_loc$[AddLocalizationIf( Scope.Var('douglas_mountaineer_achievement_mount_everest_loc').IsSet , Scope.Var('douglas_mountaineer_achievement_mount_everest_loc').GetFlagName)]"
 douglas_mountaineer_no_mountaineer_achievements_loc: "当你拥有一位[concept_douglas_mountaineer]后，其#V 成就#!将会展示在此处。"
 douglas_mountaineer_achievements_intro_loc: "#V 该登山家的成就#!\n[Scope.GetCharacter.GetFullName]是一位有着[Scope.Var('douglas_mountaineer_experience_var').GetValue|V0]年经验的登山家。迄今为止，[Scope.GetCharacter.GetSheHe]进行了[Scope.Var('douglas_mountaineer_num_mountain_ascents_var').GetValue|V0]次登山，其中成功登顶[Scope.Var('douglas_mountaineer_num_summits_reached_var').GetValue|V0]次，[Scope.Var('douglas_mountaineer_num_climbs_aborted_var').GetValue|V0]次中途放弃，[Scope.Var('douglas_mountaineer_num_disasters_suffered_var').GetValue|V0]次以灾难告终。"
 douglas_mountaineer_achievement_mount_everest_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting]被认为是第一个#V 登顶珠穆朗玛峰#!的人，因此也是有史以来最著名的登山家之一。"