l_simp_chinese:
 MR_SPORTS_COACH_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'vikelas_coach_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'vikelas_coach_no_coach_achievements_loc')]"
 vikelas_coach_achievements_loc: "$vikelas_coach_achievements_intro_loc$[AddLocalizationIf( Scope.Var('vikelas_coach_world_championship_var').IsSet , Scope.Var('vikelas_coach_world_championship_var').GetFlagName)][AddLocalizationIf( Scope.Var('vikelas_coach_vice_world_championship_var').IsSet , Scope.Var('vikelas_coach_vice_world_championship_var').GetFlagName)]"
 vikelas_coach_no_coach_achievements_loc: "当你拥有一位[concept_vikelas_coach]后，其#V 成就#!将会展示在此处。"
 vikelas_coach_achievements_intro_loc: "#V 该总教练的成就#!\n[Scope.GetCharacter.GetFullName]是一位成功的总教练。"
 vikelas_coach_world_championship_loc: "\n在[Scope.Var('vikelas_coach_world_championship_year_var').GetValue|0]年，[Scope.GetCharacter.GetLastNameNoFormatting]率领[Scope.GetCharacter.GetHerHis]的球队夺得了#V 国际足联世界杯冠军#!。"
 vikelas_coach_vice_world_championship_loc: "\n[Scope.Var('vikelas_coach_vice_world_championship_year_var').GetValue|0]年，[Scope.GetCharacter.GetLastNameNoFormatting]率领[Scope.GetCharacter.GetHerHis]的球队夺得了#V 国际足联世界杯亚军#!。"