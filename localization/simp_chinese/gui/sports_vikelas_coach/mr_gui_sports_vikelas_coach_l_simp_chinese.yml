 MR_FIFA_BOARD_TOOLTIP: "#header 国际足联#!\n以下国家是国际足联成员国：\n\n[GetGlobalVariable('vikelas_fifa_board_member_1_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_2_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_3_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_4_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_5_global_var').GetCountry.GetName|V]"
 MR_FIFA_PRESIDENT_TOOLTIP: "#header 国际足联主席#!\n[GetGlobalVariable('vikelas_fifa_president_global_var').GetCountry.GetName]担任国际足联主席。"
 MR_HIRE_COACH_BUTTON_TT: "#T 聘请国家总教练#!\n国际足联成立并举办首届国际比赛后，可以聘请国家总教练。总教练的背景——板球、棒球、足球、篮球——取决于该国的主流运动项目。如果教练未能达到预期，至少三年后即可被替换。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ADAPT_NATIONAL_SPORT_BUTTON: "调整国民体育项目"
 MR_ADAPT_NATIONAL_SPORT_BUTTON_TT: "#T 调整国民体育项目#!\n我们可以将国内流行的某项运动宣布为国民体育项目，从而鼓励俱乐部建设并推动该运动在其他国家的传播。这是成立全国性体育组织的先决条件。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHANGE_NATIONAL_SPORT_BUTTON: "改变国民体育项目"
 MR_CHANGE_NATIONAL_SPORT_BUTTON_TT: "#T 改变国民体育项目#!\n只有至少另一项体育运动已经流行起来时，才能更改国家体育项目，不过现有的体育界人士对此会感到不满。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_sports_coach_national_sport: "国民体育项目"
 vikelas_national_sport_loc: "[Country.MakeScope.Var('vikelas_national_sport_var').GetFlagName]"
 vikelas_no_national_sport_loc: "无"
 MR_SCHOOL_SPORTS_STADIUM_TRIGGER_TT: "#default_text [GetPlayer.GetName]至少需要一座激活了#V 体育场馆[concept_production_method]的[GetBuildingType('building_vikelas_sports').GetName]#!。#!"
 MR_INTERNATIONAL_SPORTS_EVENT_BUTTON: "英联邦锦标赛"
 MR_INTERNATIONAL_SPORTS_EVENT_BUTTON_TT: "#T 联邦锦标赛#!\n作为国家集团的领导者或若干附属国的宗主国，若附属国与我国拥有相同的国家运动项目，即可在附属国间举办国际锦标赛。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_INTERNATIONAL_SPORTS_MEMBER_TRIGGER_TT: "#default_text #default_text [GetPlayer.GetName]拥有至少#G 3#!个其他#V 集团成员国#!或#G 4#!个#V 附属国#!将[Country.MakeScope.Var('vikelas_national_sport_var').GetFlagName]作为国民体育项目。#!"
 MR_INTERNATIONAL_SPORTS_NO_FIFA_TRIGGER_TT: "#default_text [GetPlayer.GetName]#R 不是#!国际足联的成员。#!"
 MR_INTERNATIONAL_SPORTS_MODIFIER_TRIGGER_TT: "#default_text [GetPlayer.GetName]#R 未拥有#V $vikelas_international_sports_event_modifier$#!或#V $vikelas_recent_international_sports_event_modifier$#![Concept('concept_modifier','$concept_modifiers$')]。#!#!"
 MR_FIFA_MEMBER_TRIGGER_TT: "#default_text 至少有#BLUE 16#!个国家是#V 国际足联成员#!。目前国际足联拥有#G [GetGlobalVariable('vikelas_num_fifa_members_global_var').GetValue]#!个成员。#!"
 MR_JOIN_FIFA_BUTTON: "加入国际足联"
 MR_JOIN_FIFA_BUTTON_TT: "#T 加入国际足联#!\n加入国际足联是参加足球世界杯的先决条件。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_FIFA_BUTTON: "退出国际足联"
 MR_LEAVE_FIFA_BUTTON_TT: "#T 告别国际足联#!\n国际足联已背弃其所有理想，沦为腐败且过度商业化的非政府组织，最好与之划清界限。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_FIFA_TRIGGER_TT: "#default_text [GetPlayer.GetName]#R 既不是#!国际足联的主席，#R 也不是#!董事会成员。#!"
 MR_SCHOOL_SPORTS_BUTTON: "向校园中引入体育运动"
 MR_SCHOOL_SPORTS_BUTTON_TT: "#T 向[GetPlayer.GetName]的校园中引入体育运动#!\n通过向校园中引入体育运动，可以增加出现拥有运动员特质的人物的概率，并有助于赢得奥运会。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SCHOOL_SPORTS_PUBLIC_SCHOOLS_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有[GetLawType('law_public_schools').GetName][concept_law]。#!"
 MR_SCHOOL_SPORTS_IG_ATHLETE_LEADER_TRIGGER_TT: "#default_text [GetPlayer.GetName]的#V [concept_interest_group][concept_in_government]#!的领导人拥有#V 运动员#!特质。#!"
 MR_SCHOOL_SPORTS_SPORTS_FACILITIES_TRIGGER_TT: "#default_text [GetPlayer.GetName]至少激活了一个#V [GetBuildingType('building_government_administration').GetName]的体育设施[concept_production_method]#!。#!"
 MR_WORLDCUP_BUTTON: "足球世界杯"
 MR_WORLDCUP_BUTTON_TT: "#T 举办足球世界杯#!\n世界杯是国家队的足球比赛。每四年，参赛队可获得参加世界杯决赛的资格。在为期四周的比赛中，最优秀的国家队将决出世界冠军。国际足球联合会负责组织和推广这项赛事。第一届世界杯于1930年在乌拉圭举行，东道主乌拉圭队夺冠。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_FOOTBALL_WORLDCUP_FOOTBALL_ASSOCIATION_TRIGGER_TT: "#default_text 至少有#G 10个#!国家已成立足协。#!"
 MR_FIFA_BUTTON_TT: "#T 建立FIFA#!\n随着足球的普及，国际比赛的数量不断增加，一个全球性管理机构的需求也应运而生——国际足联，它是世界上历史最悠久、规模最大的非政府组织之一，成立于1904年5月21日。国际足联的成立允许各个国家之间进行国际比赛，各国教练可以通过赢得比赛来提高水平。这最终促成了世界杯的设立。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_FIFA_TRIGGER_TT: "#default_text 至少有#G 6个#!国家已成立足协。#!"
