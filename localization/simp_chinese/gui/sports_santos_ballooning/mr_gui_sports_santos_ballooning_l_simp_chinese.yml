 MR_GORDON_BENNETT_CUP_BUTTON: "戈登•贝内特杯"
 MR_GORDON_BENNETT_CUP_BUTTON_TT: "#T 戈登•贝内特杯#!\n戈登·贝内特杯（又称国际航空杯）是全球历史最悠久的气球赛事，被誉为航空界的“蓝丝带奖”。这项比赛由百万富翁体育爱好者、《纽约先驱报》业主詹姆斯·戈登·贝内特二世赞助。据主办方介绍，该赛事的目标非常纯粹：“从起飞点飞出最远距离”。赛事于1906年至1938年期间举办，其间因第一次世界大战在1914至1919年中断，1931年也曾停办一届。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GORDON_BENNETT_PUBLISHER_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName]的[GetBuildingType('building_manzoni_publishing_industry').GetName]#V 总等级不低于10#!。#!"