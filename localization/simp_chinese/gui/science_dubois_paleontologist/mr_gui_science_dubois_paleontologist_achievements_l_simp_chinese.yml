me)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').IsSet , Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_velociraptor_var').IsSet , Scope.Var('dubois_paleontologist_achievement_velociraptor_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_megalodon_var').IsSet , Scope.Var('dubois_paleontologist_achievement_megalodon_var').GetFlagName)]" #deepl:3270133421

 dubois_paleontologist_no_paleontologist_loc: "#V  [concept_dubois_paleontologist] #! 的成就，一旦您有了成就，就会显示在这里。" #deepl:2334446280
 dubois_paleontologist_achievements_intro_loc: "#V 这位古生物学家的成就#!\n[Scope.GetCharacter.GetFullNameNoFormatting] 是[Scope.GetCharacter.GetCustom('dubois_paleontologist_experience_level_type')] ，他共收集了[Scope.Var('dubois_paleontologist_total_fossils_var').GetValue|0+] [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] 和[Scope.Var('dubois_dinosaur_bone_total_paleontologist_var').GetValue|0+] [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] 。" #deepl:39291484

 dubois_paleontologist_achievement_opened_first_paleontological_museum_loc: "\[Scope.GetCharacter.GetSheHe|U] 创建了#V 世界上第一个古生物博物馆#! ，展出各种化石。" #deepl:2735413684
 dubois_paleontologist_achievement_attended_extinction_congress_loc: "[Scope.GetCharacter.GetLastNameNoFormatting] 博士参加了一个试图确定恐龙是如何灭绝的大会。" #deepl:3929204720
 dubois_paleontologist_achievement_fossil_amber_loc: "\[Scope.GetCharacter.GetSheHe|U] 发现了一块独特的#V Amber#! ，里面包裹着一只小蚊子。也许里面还有恐龙的血？" #deepl:1354321492
 dubois_paleontologist_achievement_fossil_ammonite_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 教授发现了一个#V 铁鲑鱼#! ，这将有助于对海洋沉积物进行年代划分。" #deepl:2717312690
 dubois_paleontologist_achievement_fossil_archaeopteryx_loc: "\许多人认为[Scope.GetCharacter.GetLastNameNoFormatting] 博士的发现是第一只鸟类。事实上，#V Archaeopteryx#! 似乎是恐龙和鸟类之间缺失的一环。" #deepl:3644254959
 dubois_paleontologist_achievement_fossil_composita_loc: "\#V Compositas#! 是几百万年前生活在几乎所有大陆上的贝壳。[Scope.GetCharacter.GetLastNameNoFormatting] 教授在[Scope.GetCharacter.GetHerHis] 的一次发掘中发现了一个。" #deepl:1938126946
 dubois_paleontologist_achievement_fossil_eusthenopteron_loc: "\有趣的是，[Scope.GetCharacter.GetSheHe] 发现的#V Eusthenopteron#! 的鳍中已经有了明显的肱骨、尺骨和桡骨。所有陆生脊椎动物都有这些骨骼。" #deepl:1906215431
 dubois_paleontologist_achievement_fossil_ichthyosaurus_loc: "\n#V 鱼龙（Ichthyosaura）#! ，[Scope.GetCharacter.GetLastNameNoFormatting] 博士发现了其中一只，它是一种非常独特的爬行动物。它像海豚，不产卵，而是活产，这在爬行动物中非常罕见。" #deepl:1058896905
 dubois_paleontologist_chievement_fossil_ichthyostega_loc: "\随着#V Ichthyostega#! 的发现，[Scope.GetCharacter.GetLastNameNoFormatting] 教授发现了最早的陆生动物之一。它是鱼类和四肢四足动物之间缺失的一环。" #deepl:178680301
 dubois_paleontologist_achievement_fossil_megatherium_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting]"博士 "的一项发现表明，今天的懒汉体型很小，但过去也有体型巨大的懒汉。#V Megatherium#! 长达 6 米（20 英尺）。" #deepl:2625011393
 dubois_paleontologist_achievement_fossil_pterodactylus_loc: "\[Scope.GetCharacter.GetSheHe|U] 发现了#V 翼龙的化石#! ，翼龙可能生活在湖泊和河流附近。" #deepl:1358755979
 dubois_paleontologist_achievement_fossil_smilodon_loc: "\#V Smilodon#! 是一种生活在几千年前的可怕掠食者。[Scope.GetCharacter.GetLastNameNoFormatting] 教授发现了一具保存完好的骨骼。" #deepl:209509221
 dubois_paleontologist_achievement_fossil_trilobite_loc: "\[Scope.GetCharacter.GetHerHis] 的一个小发现是各种 T#V 三叶虫#! 。虽然它们并不引人注目，但却是很好的索引化石。" #deepl:623281739
 dubois_paleontologist_achievement_fossil_haast_eagle_loc: "\在新西兰，[Scope.GetCharacter.GetLastNameNoFormatting] 博士有了一个惊人的发现，他在[Scope.GetCharacter.GetSheHe] 发现了一只巨大的鹰，现在被称为#V Haast Eagle#! 。" #deepl:758643186
 dubois_paleontologist_achievement_perfect_ankylosaurus_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 教授以完美的方式重建了#V Ankylosaurus#! 。其他古生物学家也为这一重建作品惊叹不已。" #deepl:2799229951
 dubois_paleontologist_achievement_imperfect_ankylosaurus_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 教授重建了#V Ankylosaurus#! ，但并不完美。" #deepl:3408874547
 dubois_paleontologist_achievement_poor_ankylosaurus_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 教授重建了#V Ankylosaurus#! ，但这是一个可怕的尝试，被其他古生物学家嘲笑。" #deepl:2085395454
 dubois_paleontologist_achievement_perfect_diplodocus_loc: "\[Scope.GetCharacter.GetHerHis|U] 重建的#V Diplodocus#! 绝对完美，令所有古生物博物馆羡慕不已。" #deepl:3626804845
 dubois_paleontologist_achievement_imperfect_diplodocus_loc: "\[Scope.GetCharacter.GetHerHis|U] 重建一个#V Diplodocus#! 已经很不错了。" #deepl:412034719
 dubois_paleontologist_achievement_poor_diplodocus_loc: "[Scope.GetCharacter.GetHerHis|U] #V Diplodocus 的重建是灾难性的，被视为一种可憎的行为。#! " #deepl:3022704965
 dubois_paleontologist_achievement_perfect_triceratop_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士的#V 三角龙#! 完美的重建广为人知，并提高了我们古生物收藏的声望。" #deepl:2010941711
 dubois_paleontologist_achievement_imperfect_triceratop_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士的#V Triceratops#! 重建工作平平庸庸，对于我们的博物馆来说已经足够好了，但并没有什么特别之处。" #deepl:996647347
 dubois_paleontologist_achievement_poor_triceratop_loc: "[Scope.GetCharacter.GetLastNameNoFormatting] 博士的#V 三角龙#! 重建的恐怖是我们收藏的耻辱。" #deepl:1193371056
 dubois_paleontologist_achievement_perfect_tyrannosaurus_loc: "\一个#V 霸王龙#! 令人叹为观止。尤其是[Scope.GetCharacter.GetLastNameNoFormatting] 教授完美组装的那只。" #deepl:2375174801
 dubois_paleontologist_achievement_imperfect_tyrannosaurus_loc: "\#V 霸王龙#! 令人叹为观止。即使它不像[Scope.GetCharacter.GetLastNameNoFormatting] 教授重建的那只那样完美地组装在一起。" #deepl:2816655238
 dubois_paleontologist_achievement_poor_tyrannosaurus_loc: "\#V 霸王龙#! 是一个奇妙的景象。但不是[Scope.GetCharacter.GetLastNameNoFormatting] 教授组装的这只。这只是一个荒诞的怪兽。" #deepl:2924846018
 dubois_paleontologist_achievement_perfect_stegosaurus_loc: "\[Scope.GetCharacter.GetSheHe] 组装的强大#V 剑龙#! 骨架是我们恐龙展览的完美作品。" #deepl:1011030116
 dubois_paleontologist_achievement_imperfect_stegosaurus_loc: "\[Scope.GetCharacter.GetSheHe] 组装的#V 剑龙#! 骨架是我们恐龙展览的好作品。" #deepl:3364926958
 dubois_paleontologist_achievement_poor_stegosaurus_loc: "\[Scope.GetCharacter.GetSheHe] ，组装起来的可怕的#V 剑龙#! 骨架在我们的恐龙展览中浪费了空间。" #deepl:1841850726
 dubois_paleontologist_achievement_perfect_antarctosaurus_loc: "\不是每个人都能像[Scope.GetCharacter.GetLastNameNoFormatting] 博士一样完美地组装#V 南极龙#! 。它是我们收藏的亮点之一。" #deepl:4276626573
 dubois_paleontologist_achievement_imperfect_antarctosaurus_loc: "\组装#V 南极龙#! 是一项艰巨的任务，但[Scope.GetCharacter.GetLastNameNoFormatting] 博士做得相当出色。" #deepl:4006286419
 dubois_paleontologist_achievement_poor_antarctosaurus_loc: "\不是每个人都能组装出#V 南极龙#! 。但像[Scope.GetCharacter.GetLastNameNoFormatting] 博士这样组装得糟糕透顶的人并不多。这是我们收藏的耻辱。" #deepl:3523325515
 dubois_paleontologist_achievement_perfect_argyrosaurus_loc: "\我们收藏的这具奇妙的#V Argyrosaurus#! 骨架是[Scope.GetCharacter.GetLastNameNoFormatting] 教授的作品。这是一具真正奇妙的骨骼。" #deepl:2395444631
 dubois_paleontologist_achievement_imperfect_argyrosaurus_loc: "\我们收藏的#V Argyrosaurus#! 骨架是[Scope.GetCharacter.GetLastNameNoFormatting] 教授的作品。这是一具相当出色的骨架。" #deepl:2170414433
 dubois_paleontologist_achievement_poor_argyrosaurus_loc: "\#V Argyrosaurus#! 骷髅是[Scope.GetCharacter.GetLastNameNoFormatting] 教授的作品。这显然是一位笨拙的古生物学家的杰作。" #deepl:2917340443
 dubois_paleontologist_achievement_perfect_iguanodon_loc: "\[Scope.GetCharacter.GetSheHe|U] 完美地组装了一具#V 恐龙#! 的骨架。" #deepl:3595520963
 dubois_paleontologist_achievement_imperfect_iguanodon_loc: "\[Scope.GetCharacter.GetSheHe|U] 组装了一具#V 恐龙#! 骨骼。" #deepl:948446383
 dubois_paleontologist_achievement_poor_iguanodon_loc: "\[Scope.GetCharacter.GetSheHe|U] 组装了一具#V 鬣蜥人#! 骨骼，但却大错特错。" #deepl:60351557
 dubois_paleontologist_achievement_perfect_plateosaurus_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士能够完美地重建#V 板龙的骨架#! 。这是我们收藏的一个很好的展品。" #deepl:3288975063
 dubois_paleontologist_achievement_imperfect_plateosaurus_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士能够重建#V 板龙的骨架#! 。" #deepl:3540574047
 dubois_paleontologist_achievement_poor_plateosaurus_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士能够重建#V 板龙的骨架#! 。但它看起来非常怪异和畸形。" #deepl:4210803243
 dubois_paleontologist_achievement_perfect_giraffatitan_loc: "\重建#V Giraffatitan#! 是一项艰巨的工作，需要很大的空间。幸运的是，[Scope.GetCharacter.GetLastNameNoFormatting] 教授利用我们博物馆的空间，制作了一具宏伟的恐龙骨架。" #deepl:1815044749
 dubois_paleontologist_achievement_imperfect_giraffatitan_loc: "\nReconstructing a#V Giraffatitan#! 是一项艰巨的工作，需要很大的空间。幸好[Scope.GetCharacter.GetLastNameNoFormatting] 教授能够利用我们博物馆的面积来准备恐龙的骨架。" #deepl:3585680135
 dubois_paleontologist_achievement_poor_giraffatitan_loc: "\nReconstructing a#V Giraffatitan#! 是一项艰苦的工作，需要很大的空间。尽管[Scope.GetCharacter.GetSheHe] 有整个博物馆的工作空间，但[Scope.GetCharacter.GetLastNameNoFormatting] 教授只能制作出一个荒诞版本的恐龙。" #deepl:2737374971
 dubois_paleontologist_achievement_perfect_spinosaurus_loc: "\我们收藏的可怕的#V 棘龙#! 骨架由[Scope.GetCharacter.GetLastNameNoFormatting] 博士组装而成，是一件艺术品。" #deepl:493475787
 dubois_paleontologist_achievement_imperfect_spinosaurus_loc: "\我们收藏的可怕的#V 棘龙#! 骨架是由[Scope.GetCharacter.GetLastNameNoFormatting] 博士组装的。" #deepl:1960639131
 dubois_paleontologist_achievement_poor_spinosaurus_loc: "\我们收藏的有趣的#V 棘龙#! 骨架是由[Scope.GetCharacter.GetLastNameNoFormatting] 博士组装的。它做得很糟糕，看起来更像一只鸡而不是恐龙。" #deepl:308117810
 dubois_paleontologist_achievement_perfect_psittacosaurus_loc: "#V #! \[Scope.GetCharacter.GetLastNameNoFormatting] ，它的嘴像喙一样，是一具非同寻常的骨架。" #deepl:3089964090
 dubois_paleontologist_achievement_imperfect_psittacosaurus_loc: "#V #! \[Scope.GetCharacter.GetLastNameNoFormatting] ，它的嘴像鸟喙，是一具漂亮的骨架。" #deepl:1049217798
 dubois_paleontologist_achievement_poor_psittacosaurus_loc: "\#V ，难道鹦鹉嘴龙（Psittacosaurus#! ）的背上真的有一个奇怪的喙，而且躯干不是嘴巴？至少[Scope.GetCharacter.GetLastNameNoFormatting] 教授是这么认为的，但他可能是唯一这么认为的人。" #deepl:4134331305
 dubois_paleontologist_achievement_perfect_velociraptor_loc: "\可怕的#V 迅猛龙#! 是[Scope.GetCharacter.GetLastNameNoFormatting] 博士的杰作之一。它组装得非常完美。" #deepl:2793253329
 dubois_paleontologist_achievement_imperfect_velociraptor_loc: "\吓人的#V 迅猛龙#! 是[Scope.GetCharacter.GetLastNameNoFormatting] 博士的佳作。[Scope.GetCharacter.GetSheHe] 把它组装得相当好。" #deepl:4153443130
 dubois_paleontologist_achievement_poor_velociraptor_loc: "\可怕的#V 迅猛龙#! 是[Scope.GetCharacter.GetLastNameNoFormatting] 博士最糟糕的作品之一。首先，它太小了；其次，它肯定没有 10 只爪子作为冠冕......" #deepl:3768344000
 dubois_paleontologist_achievement_perfect_muttaburrasaurus_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 教授重建的#V Muttaburrasaurus#! 令人印象深刻，不仅仅是因为它的大小。" #deepl:877060609
 dubois_paleontologist_achievement_imperfect_muttaburrasaurus_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 教授重建的#V Muttaburrasaurus#! 令人印象深刻，主要是因为它的大小。" #deepl:2230628960
 dubois_paleontologist_achievement_poor_muttaburrasaurus_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 教授重建的#V Muttaburrasaurus#! 非常可怕。首先，每一位古生物学家都注意到，它的头部与尾部并不相连，膝盖也弯曲到了另一边。" #deepl:1428907282
 dubois_paleontologist_achievement_perfect_rhoetosaurus_loc: "\#V Rhoetosaurus#! 的大小令人印象深刻。但是，如果没有[Scope.GetCharacter.GetLastNameNoFormatting] 博士的高超技艺，它肯定不会给人留下如此深刻的印象。" #deepl:2002445198
