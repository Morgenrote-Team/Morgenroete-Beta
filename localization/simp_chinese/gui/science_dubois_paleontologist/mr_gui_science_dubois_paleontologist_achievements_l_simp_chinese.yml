l_simp_chinese:
 MR_PALEONTOLOGIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'dubois_paleontologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'dubois_paleontologist_no_paleontologist_loc')]"
 dubois_paleontologist_achievements_loc: "$dubois_paleontologist_achievements_intro_loc$[AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_opened_first_paleontological_museum_var').IsSet , Scope.Var('dubois_paleontologist_achievement_opened_first_paleontological_museum_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_attended_extinction_congress_var').IsSet , Scope.Var('dubois_paleontologist_achievement_attended_extinction_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_amber_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_amber_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_ammonite_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_ammonite_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_archaeopteryx_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_archaeopteryx_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_composita_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_composita_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_eusthenopteron_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_eusthenopteron_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_ichthyosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_ichthyosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_chievement_fossil_ichthyostega_var').IsSet , Scope.Var('dubois_paleontologist_chievement_fossil_ichthyostega_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_megatherium_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_megatherium_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_pterodactylus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_pterodactylus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_smilodon_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_smilodon_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_trilobite_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_trilobite_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_fossil_haast_eagle_var').IsSet , Scope.Var('dubois_paleontologist_achievement_fossil_haast_eagle_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_ankylosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_ankylosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_diplodocus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_diplodocus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_triceratop_var').IsSet , Scope.Var('dubois_paleontologist_achievement_triceratop_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_tyrannosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_tyrannosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_stegosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_stegosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_antarctosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_antarctosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_argyrosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_argyrosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_iguanodon_var').IsSet , Scope.Var('dubois_paleontologist_achievement_iguanodon_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').IsSet , Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_velociraptor_var').IsSet , Scope.Var('dubois_paleontologist_achievement_velociraptor_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_megalodon_var').IsSet , Scope.Var('dubois_paleontologist_achievement_megalodon_var').GetFlagName)]"
 dubois_paleontologist_no_paleontologist_loc: "当你拥有一位[concept_dubois_paleontologist]后，其#V 成就#!将会展示在此处。"
 dubois_paleontologist_achievements_intro_loc: "#V 该古生物学家的成就#!\n#indent_newline:3 ※[Scope.GetCharacter.GetFullNameNoFormatting]博士是一位共收集了[Scope.Var('dubois_paleontologist_total_fossils_var').GetValue|0+]种[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]和[Scope.Var('dubois_dinosaur_bone_total_paleontologist_var').GetValue|0+]种[Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]的[Scope.GetCharacter.GetCustom('dubois_paleontologist_experience_level_type')]。#!"
 dubois_paleontologist_achievement_opened_first_paleontological_museum_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]创立了全球首家#V 古生物博物馆#!，系统展示各类化石标本。#!"
 dubois_paleontologist_achievement_attended_extinction_congress_loc: "[Scope.GetCharacter.GetLastNameNoFormatting]博士曾出席过一场旨在破解恐龙灭绝之谜的国际学术会议。#!"
 dubois_paleontologist_achievement_fossil_amber_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]发现了一件独特的#V 琥珀#!标本，其中封存着一只史前蚊子。或许其中还存留着恐龙血液？#!"
 dubois_paleontologist_achievement_fossil_ammonite_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]教授发掘出一枚#V 菊石#!，该化石标本将显著提升海相沉积物的年代界定精度。#!"
 dubois_paleontologist_achievement_fossil_archaeopteryx_loc: "\n#indent_newline:3 ※学界普遍将[Scope.GetCharacter.GetLastNameNoFormatting]博士的发现认定为最早的鸟类化石。确凿无疑，#V 始祖鸟#!标本完美填补了恐龙与鸟类间的演化缺环。#!"
 dubois_paleontologist_achievement_fossil_composita_loc: "\n#indent_newline:3 ※#V 接合贝#!是数亿年前曾遍布全球各大洲的贝类生物。[Scope.GetCharacter.GetLastNameNoFormatting]教授在一次发掘中发现了该物种的完整标本。#!"
 dubois_paleontologist_achievement_fossil_eusthenopteron_loc: "\n#indent_newline:3 ※值得注意的是，[Scope.GetCharacter.GetSheHe]发现的#V 真掌鳍鱼#!化石，其胸鳍中已具备明确的肱骨、尺骨与桡骨结构——这些骨骼成分现存于所有陆生脊椎动物中。#!"
 dubois_paleontologist_achievement_fossil_ichthyosaurus_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士所发现的#V 鱼龙#!是种极为特殊的爬行动物。其外形酷似海豚，且具有胎生繁殖特性——这在爬行纲中极为罕见。#!"
 dubois_paleontologist_chievement_fossil_ichthyostega_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]教授发现的#V 鱼石螈#!化石，正是鱼类向四足动物演化的关键证据。#!"
 dubois_paleontologist_achievement_fossil_megatherium_loc: "\n#indent_newline:3 ※现今树栖的树懒体型娇小，但[Scope.GetCharacter.GetLastNameNoFormatting]博士的发现证实：史前曾存在巨型树懒——#V 大地懒#!体长可达6米。#!"
 dubois_paleontologist_achievement_fossil_pterodactylus_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]发现的#V 翼手龙#!化石表明这种飞行生物曾栖息在河湖附近。#!"
 dubois_paleontologist_achievement_fossil_smilodon_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]教授获得传说中的掠食者——#V 剑齿虎#!化石骨架保存极为完整，这种猛兽直到数千年前才灭绝。#!"
 dubois_paleontologist_achievement_fossil_trilobite_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetHerHis]收集的#V 三叶虫#!化石是确定岩层年代的重要索引化石。#!"
 dubois_paleontologist_achievement_fossil_haast_eagle_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士在新西兰发现的巨型#V 哈斯特鹰#!化石令人叹为观止。#!"
 dubois_paleontologist_achievement_perfect_ankylosaurus_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]教授完美复原的#V 甲龙#!骨架令同行交口称赞。#!"
 dubois_paleontologist_achievement_imperfect_ankylosaurus_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]教授复原的#V 甲龙#!骨架尚有改进空间。#!"
 dubois_paleontologist_achievement_poor_ankylosaurus_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]教授拙劣的#V 甲龙#!复原沦为古生物学界的笑柄。#!"
 dubois_paleontologist_achievement_perfect_diplodocus_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetHerHis|U]博士重建了每个古生物博物馆都羡慕的完美#V 梁龙#!骨架#!"
 dubois_paleontologist_achievement_imperfect_diplodocus_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetHerHis|U]重建的#V 梁龙#!骨架还算不错。#!"
 dubois_paleontologist_achievement_poor_diplodocus_loc: "[Scope.GetCharacter.GetHerHis|U]重建的#V 梁龙#!只能用灾难来形容，学界谈之色变。"
 dubois_paleontologist_achievement_perfect_triceratop_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士的#V 三角龙#!重建标本完美无瑕，极大提升了我们收藏的声誉。#!"
 dubois_paleontologist_achievement_imperfect_triceratop_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士的#V 三角龙#!重建勉强合格，虽无亮点但也够用。#!"
 dubois_paleontologist_achievement_poor_triceratop_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting]博士的#V 三角龙#!重建堪称我们收藏史上的耻辱。#!"
 dubois_paleontologist_achievement_perfect_tyrannosaurus_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]教授完美组装的#V 暴龙#!骨架令参观者震撼不已。#!"
 dubois_paleontologist_achievement_imperfect_tyrannosaurus_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]教授组装的#V 暴龙#!骨架虽非完美，但仍具威慑力。#!"
 dubois_paleontologist_achievement_poor_tyrannosaurus_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]教授组装的#V 暴龙#!骨架形如滑稽的畸形怪物。#!"
 dubois_paleontologist_achievement_perfect_stegosaurus_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]组装的#V 剑龙#!骨架是我们恐龙展区的镇馆之宝。#!"
 dubois_paleontologist_achievement_imperfect_stegosaurus_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]组装的#V 剑龙#!骨架还算合格。#!"
 dubois_paleontologist_achievement_poor_stegosaurus_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]组装的#V 剑龙#!骨架纯属浪费展览空间。#!"
 dubois_paleontologist_achievement_perfect_antarctosaurus_loc: "\n#indent_newline:3 ※并非每个人都能像[Scope.GetCharacter.GetLastNameNoFormatting]博士那样完美地组装一具#V 南极龙#!，这是我们馆藏之一。#!"
 dubois_paleontologist_achievement_imperfect_antarctosaurus_loc: "\n#indent_newline:3 ※组装一只一具#V 南极龙#!是一项艰巨的任务，但[Scope.GetCharacter.GetLastNameNoFormatting]博士做得相当出色。#!"
 dubois_paleontologist_achievement_poor_antarctosaurus_loc: "\n#indent_newline:3 ※不是每个人都能组装出#V 南极龙#!，但像[Scope.GetCharacter.GetLastNameNoFormatting]博士这样糟糕地组装起来的人也不多，堪称我们收藏史上的耻辱。#! "
 dubois_paleontologist_achievement_perfect_argyrosaurus_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士组装的#V 银龙#!是我们收藏史上令人叹为观止的杰作。#!"
 dubois_paleontologist_achievement_imperfect_argyrosaurus_loc: "\n#indent_newline:3 ※我们收藏的#V 银龙#!骨架是[Scope.GetCharacter.GetLastNameNoFormatting]教授的作品，做得相当不错。#!"
 dubois_paleontologist_achievement_poor_argyrosaurus_loc: "\n#indent_newline:3 ※我们收藏的那具巨大且搭建的不如人意的#V 银龙#!骨架是[Scope.GetCharacter.GetLastNameNoFormatting]教授的作品。#!"
 dubois_paleontologist_achievement_perfect_iguanodon_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]完美地组装了一具#V 禽龙#!骨架#!#!"
 dubois_paleontologist_achievement_imperfect_iguanodon_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]组装了一具#V 禽龙#!骨架#!"
 dubois_paleontologist_achievement_poor_iguanodon_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]组装了一具#V 禽龙#!骨架，但成品差强人意。#!"
 dubois_paleontologist_achievement_perfect_plateosaurus_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士完美地组装了一具#V 板龙#!骨架，这是一件很棒的藏品。#!"
 dubois_paleontologist_achievement_imperfect_plateosaurus_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士能够重建#V 板龙#!骨架#!"
 dubois_paleontologist_achievement_poor_plateosaurus_loc: "\n#indent_newline:3 ※虽然[Scope.GetCharacter.GetLastNameNoFormatting]博士重建了#V 板龙#!的骨架。但它看起来非常怪异，而且变形了。#!"
 dubois_paleontologist_achievement_perfect_giraffatitan_loc: "\n#indent_newline:3 ※重建一只#V 长颈巨龙#!是一项艰巨的工作，需要很大的空间。幸好[Scope.GetCharacter.GetLastNameNoFormatting]教授利用我们博物馆的空间来完成一切。#!"
 dubois_paleontologist_achievement_imperfect_giraffatitan_loc: "\n#indent_newline:3 ※重建一只#V 长颈巨龙#!是一项艰巨的工作，需要很大的空间。幸好[Scope.GetCharacter.GetLastNameNoFormatting]教授利用我们博物馆的空间来完成一切。#!"
 dubois_paleontologist_achievement_poor_giraffatitan_loc: "\n#indent_newline:3 ※复原#V 长颈巨龙#!骨架不仅费时费力，更需广阔的空间。尽管拥有整座博物馆作为场地，[Scope.GetCharacter.GetLastNameNoFormatting]教授却只完成了一具略显滑稽的版本。#!"
 dubois_paleontologist_achievement_perfect_spinosaurus_loc: "\n#indent_newline:3 ※馆中那具骇人的#V 棘龙#!骨架，正是由[Scope.GetCharacter.GetLastNameNoFormatting]博士亲手拼装而成——堪称一件古生物学的艺术杰作。#!"
 dubois_paleontologist_achievement_imperfect_spinosaurus_loc: "\n#indent_newline:3 ※馆藏中那具#V 棘龙#!骨架由[Scope.GetCharacter.GetLastNameNoFormatting]博士组装完成，虽非完美无瑕，但也颇具水准。#!"
 dubois_paleontologist_achievement_poor_spinosaurus_loc: "\n#indent_newline:3 ※馆中那具滑稽#V 棘龙#!骨架是[Scope.GetCharacter.GetLastNameNoFormatting]博士的作品——它看起来与其说是恐龙，不如说更像一只长满爪子的鸡。#!"
 dubois_paleontologist_achievement_perfect_psittacosaurus_loc: "\n#indent_newline:3 ※嘴巴形似鸟喙，那是#V 鹦鹉嘴龙#!最显著的特征之一。[Scope.GetCharacter.GetLastNameNoFormatting]教授的复原工作极其精细，再现了这一史前奇兽的真实面貌。#!"
 dubois_paleontologist_achievement_imperfect_psittacosaurus_loc: "\n#indent_newline:3 ※嘴巴如喙般突出，这是#V 鹦鹉嘴龙#!的标志性特征。[Scope.GetCharacter.GetLastNameNoFormatting]教授的复原虽非顶级水准，但仍不失为一次成功的尝试。#!"
 dubois_paleontologist_achievement_poor_psittacosaurus_loc: "\n#indent_newline:3 ※#V 鹦鹉嘴龙#!真的背上长着奇怪的喙、脸上没有嘴巴反而有个象鼻吗？至少[Scope.GetCharacter.GetLastNameNoFormatting]教授是这么认为的——或许是唯一一个这么想的人。#!"
 dubois_paleontologist_achievement_perfect_velociraptor_loc: "\n#indent_newline:3 ※这具#V 伶盗龙r#!骨架是[Scope.GetCharacter.GetLastNameNoFormatting]博士的代表作之一，细节精确、姿态生动，堪称古生物学中的艺术品。#!"
 dubois_paleontologist_achievement_imperfect_velociraptor_loc: "\n#indent_newline:3 ※#V 伶盗龙#!骨架是[Scope.GetCharacter.GetLastNameNoFormatting]博士的手笔，虽不完美，却也展现了[Scope.GetCharacter.GetSheHe]扎实的技术与专注精神。#!"
 dubois_paleontologist_achievement_poor_velociraptor_loc: "\n#indent_newline:3 ※#V 伶盗龙#!真有十根爪子戴在头上，而且体型还如此迷你吗？至少在[Scope.GetCharacter.GetLastNameNoFormatting]博士手中，它是这样的。#!"
 dubois_paleontologist_achievement_perfect_muttaburrasaurus_loc: "\n#indent_newline:3 ※#V 木他龙#!骨架的庞大令人震撼，而[Scope.GetCharacter.GetLastNameNoFormatting]教授的还原技艺更是锦上添花。它之所以引人注目，绝不仅仅是因为它的体积。#!"
 dubois_paleontologist_achievement_imperfect_muttaburrasaurus_loc: "\n#indent_newline:3 ※#V 木他龙#!骨架的确壮观，而[Scope.GetCharacter.GetLastNameNoFormatting]教授的还原让它更具视觉冲击力——主要归功于它的巨大身躯。#!"
 dubois_paleontologist_achievement_poor_muttaburrasaurus_loc: "\n#indent_newline:3 ※#V 木他龙#!骨架由[Scope.GetCharacter.GetLastNameNoFormatting]教授复原完成——可惜，几乎所有同行都指出：它的头没接对，尾巴反了，膝盖方向也不太对劲。#!"
 dubois_paleontologist_achievement_perfect_rhoetosaurus_loc: "\n#indent_newline:3 ※#V 瑞拖斯龙#!的巨大体型本身就足以令人惊叹，但在[Scope.GetCharacter.GetLastNameNoFormatting]博士的巧手下，它才真正焕发了史前巨兽应有的威仪。#!"
 dubois_paleontologist_achievement_imperfect_rhoetosaurus_loc: "\n#indent_newline:3 ※#V 瑞拖斯龙#!骨架的确庞大惊人，而在[Scope.GetCharacter.GetLastNameNoFormatting]博士的努力下，它得以重现昔日风采。#!"
 dubois_paleontologist_achievement_poor_rhoetosaurus_loc: "\n#indent_newline:3 ※把尾巴安在#V 瑞拖斯龙#!背上的主意，可能是[Scope.GetCharacter.GetLastNameNoFormatting]博士迄今为止最离谱的一次尝试。#!"
 dubois_paleontologist_achievement_perfect_mosasaurus_loc: "\n#indent_newline:3 ※[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting]教授重建的#o 沧龙#!骨架完美呈现了这种远古海洋霸主的威仪。#!"
 dubois_paleontologist_achievement_imperfect_mosasaurus_loc: "\n#indent_newline:3 ※[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting]教授搭建的#o 沧龙#!是一只来自海洋的巨大怪物。#!"
 dubois_paleontologist_achievement_poor_mosasaurus_loc: "\n#indent_newline:3 ※[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting]教授搭建的#o 沧龙#!化石非常凶恶，可以肯定沧龙生活在海洋中，但不知何故，这具化石最终长出了腿。#!"
 dubois_paleontologist_achievement_perfect_plesiosaurus_loc: "\n#indent_newline:3 ※#o 蛇颈龙#!是史前海洋中最具标志性的爬行动物之一，而[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting]教授的复原作品堪称典范。#!"
 dubois_paleontologist_achievement_imperfect_plesiosaurus_loc: "\n#indent_newline:3 ※#o 蛇颈龙#!曾活跃于恐龙时代的海洋深处。[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting]教授的复原虽非惊艳，却也忠实再现了其基本形态。#!"
 dubois_paleontologist_achievement_poor_plesiosaurus_loc: "\n#indent_newline:3 ※#o 蛇颈龙#!骨架由[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting]教授复原完成——它确实与众不同，四只“蛇肢”，一个短得离谱的脑袋，以及完全没有尾巴。#!"
 dubois_paleontologist_achievement_perfect_basilosaurus_loc: "\n#indent_newline:3 ※#o 龙王鲸#!是史前海洋的霸主之一。在[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting]教授的手中，这条远古巨鲸重现了千万年前的风采。#!"
 dubois_paleontologist_achievement_imperfect_basilosaurus_loc: "\n#indent_newline:3 ※#o 龙王鲸#!是一种生活在遥远过去的史前巨鲸，由[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting]教授复原。虽非完美，但已足够令人信服。#!"
 dubois_paleontologist_achievement_poor_basilosaurus_loc: "\n#indent_newline:3 ※#o 龙王鲸#!在[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting]教授的手中变成了一个怪胎——它看起来像个球，显然哪里出错了。#!"
 dubois_paleontologist_achievement_perfect_megalodon_loc: "\n#indent_newline:3 ※[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting]教授搭建的#o 巨齿鲨#!，令人印象深刻。#!"
 dubois_paleontologist_achievement_imperfect_megalodon_loc: "\n#indent_newline:3 ※[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting]教授搭建的#o 巨齿鲨#!，是一只来自海洋的巨大怪物。#!"
 dubois_paleontologist_achievement_poor_megalodon_loc: "\n#indent_newline:3 ※#o 巨齿鲨#!骨架由[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting]教授复原完成——只是它的巨首与纤细颈部之间的比例实在令人咋舌，更别提全身布满的诡异尖刺了。#!"