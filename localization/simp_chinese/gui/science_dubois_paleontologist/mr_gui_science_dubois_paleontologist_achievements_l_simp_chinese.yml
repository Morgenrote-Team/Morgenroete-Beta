 dubois_paleontologist_achievement_perfect_mosasaurus_loc: "\[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 教授重建的#o Msasaurus#! 是来自海洋的巨大怪物。" #deepl:4291663506
 dubois_paleontologist_achievement_imperfect_mosasaurus_loc: "\#o Mosasaurus#! [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 教授从海里重建了一个大怪物。" #deepl:2251013384
 dubois_paleontologist_achievement_poor_mosasaurus_loc: "\[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 教授重建的#o Mosasaurus#! 太可怕了。可以肯定的是，沧龙生活在海洋中，但不知何故，骨架最终长出了腿。" #deepl:2727769146
 dubois_paleontologist_achievement_perfect_plesiosaurus_loc: "\[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 教授重建的#o Plesiosaurus#! 是一种巨大的海洋爬行动物。" #deepl:1469085529
 dubois_paleontologist_achievement_imperfect_plesiosaurus_loc: "\[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 教授重建的#o Plesiosaurus#! 是一种生活在恐龙时代的海洋爬行动物。" #deepl:1871243527
 dubois_paleontologist_achievement_poor_plesiosaurus_loc: "\[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 教授重建的#o Plesiosaurus#! 略显怪异。它有四条像蛇一样的四肢，有一条非常短的尾巴，而且没有尾巴。" #deepl:1919744229
 dubois_paleontologist_achievement_perfect_basilosaurus_loc: "\[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 教授重建的#o Basilosaurus#! 是一种生活在几千年前的史前鲸鱼。" #deepl:142765907
 dubois_paleontologist_achievement_imperfect_basilosaurus_loc: "\[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 教授重建的#o Basilosaurus#! 是一种史前鲸鱼。" #deepl:1354996810
 dubois_paleontologist_achievement_poor_basilosaurus_loc: "\[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 教授重建的#o Basilosaurus#! 具有非常奇怪的生理结构。它看起来更像一个球，而不是其他任何东西，这似乎很不对劲。" #deepl:1206625829
 dubois_paleontologist_achievement_perfect_megalodon_loc: "\[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 教授重建的#o Megalodon#! 是一条巨大的鲨鱼。它的骨骼确实令人印象深刻。" #deepl:1878769616
 dubois_paleontologist_achievement_imperfect_megalodon_loc: "\[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 教授重建的#o Megalodon#! 是一种巨大的鲨鱼。" #deepl:117332675
 dubois_paleontologist_achievement_poor_megalodon_loc: "\[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] 教授重建的#o Megalodon#! 似乎有点......不对劲。巨大的头颅安装在非常细的脖子上，而且显然这条鲨鱼全身都长满了奇怪的尖刺。" #deepl:3797074524
