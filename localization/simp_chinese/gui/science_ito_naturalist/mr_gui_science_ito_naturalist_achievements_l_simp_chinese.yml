 MR_NATURALIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'ito_naturalist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'ito_naturalist_no_naturalist_loc')]" #deepl:1239426788

 ito_naturalist_achievements_loc: "$ito_naturalist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_zoo_animals_type')][Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_wildlife_documentaries_type')][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').IsSet , Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').IsSet , Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').IsSet , Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').IsSet , Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').IsSet , Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').IsSet , Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').IsSet , Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_goliathus_var').IsSet , Scope.Var('ito_naturalist_achievement_found_goliathus_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').IsSet , Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').IsSet , Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').GetFlagName)]" #deepl:3859703363
 ito_naturalist_no_naturalist_loc: "#V  [concept_dubois_naturalist] #! 的成就，一旦您有了成就，就会显示在这里。" #deepl:2308010664
 ito_naturalist_achievements_intro_loc: "#V 这位自然学家的成就#!\n[Scope.GetCharacter.GetFullName] 是一位杰出的自然学家，他收集了[Scope.Var('dubois_naturalist_total_specimens_var').GetValue|0*V] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] 。" #deepl:2770611838

 ito_naturalist_achievement_total_zoo_animals_loc: "\在[Scope.GetCharacter.GetHerHis] 担任博物学家期间，共有[Scope.GetVariable('ito_naturalist_total_zoo_animals_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] 被捕获并带到[GetPlayer.MakeScope.GetCountry.GetName] 。" #deepl:3523686073
 ito_naturalist_achievement_total_wildlife_documentaries_loc: "\[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetFullName] 以记录自然栖息地的[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetVariable('ito_character_num_animal_documentations_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] 而闻名。" #deepl:2453492304
 ito_naturalist_achievement_invented_evolution_theory_loc: "\[Scope.GetCharacter.GetHerHis] 最伟大的成就之一是《物种起源》（#V On the Origin of Species#! ）一书，该书首次描述了进化论。" #deepl:510074125
 ito_naturalist_achievement_attended_hippocampus_congress_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士参加了关于人类是独一无二的，还是和其他动物一样只是一种动物的辩论。" #deepl:1532833643
 ito_naturalist_achievement_showed_evolution_in_peppered_moths_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] ，证明了#V ，胡椒蛾通过进化#! ，以适应不断变化的环境。这是进化论的证明。" #deepl:4279082533
 ito_naturalist_achievement_finished_pacific_expedition_loc: "\在对太平洋#V #! 的一次探险中，[Scope.GetCharacter.GetLastNameNoFormatting] 博士对这片仙境的动植物进行了广泛的探索。[Scope.GetCharacter.GetSheHe] 发现了许多新物种。" #deepl:1584400015
 ito_naturalist_achievement_wallace_line_discovered_loc: "\在太平洋旅行时，[Scope.GetCharacter.GetLastNameNoFormatting] ，发现#V ，亚洲和澳大利亚的动植物之间有明显的分隔#! 。这一发现支持了进化论，并表明这些岛屿在过去曾大规模分离。" #deepl:970429435
 ito_naturalist_achievement_inaugurated_zoo_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] 在#V 动物园开幕式上发挥了重要作用#! 。一个可以近距离观赏来自遥远地方的动物的地方。" #deepl:915470862
 ito_naturalist_achievement_found_victoria_amazonica_loc: "\在亚马逊雨林的一次植物考察中，[Scope.GetCharacter.GetLastNameNoFormatting] 教授发现了一种#V 巨型睡莲#! 。这是一种独特的植物，可以长出直径达 3 米的叶子。" #deepl:3652726149
 ito_naturalist_achievement_found_attacus_atlas_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士在印度支那的一次植物考察中发现了#V 泰坦蛾#! 。它是世界上最大的蝴蝶之一，生产的蚕丝非常结实。" #deepl:3954278434
 ito_naturalist_achievement_found_amorphophallus_titanum_loc: "\在一次植物探险中，[Scope.GetCharacter.GetLastNameNoFormatting] 教授在婆罗洲发现了一种#V 巨大的花#! ，它能长到 3 米高。这是一个真正的植物奇迹。" #deepl:998846928
 ito_naturalist_achievement_found_goliathus_loc: "\刚果雨林中有许多奇观。其中之一是[Scope.GetCharacter.GetLastNameNoFormatting] 博士在一次植物探险中发现的。#V 巨甲虫#! 是世界上最大的昆虫之一，而且显然相当罕见。" #deepl:3755908676
 ito_natualist_achievement_forestry_improvement_finished_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 教授因其在[Scope.GetCharacter.GetHerHis] 森林和如何改善林业方面的工作而闻名。" #deepl:3521424779
 ito_naturalist_achievement_rubber_improvement_finished_loc: "\[Scope.GetCharacter.GetHerHis|U] 橡胶种植园的工作和最佳种植条件的试验使我国的橡胶产量大幅提高。" #deepl:1444884744
