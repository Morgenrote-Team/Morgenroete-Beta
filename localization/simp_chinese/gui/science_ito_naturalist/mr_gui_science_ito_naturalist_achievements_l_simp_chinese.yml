l_simp_chinese:
 MR_NATURALIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'ito_naturalist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'ito_naturalist_no_naturalist_loc')]"
 ito_naturalist_achievements_loc: "$ito_naturalist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_zoo_animals_type')][Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_wildlife_documentaries_type')][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').IsSet , Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').IsSet , Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').IsSet , Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_great_barrier_reef_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_great_barrier_reef_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').IsSet , Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').IsSet , Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').IsSet , Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').IsSet , Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_goliathus_var').IsSet , Scope.Var('ito_naturalist_achievement_found_goliathus_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').IsSet , Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').IsSet , Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').GetFlagName)]"
 ito_naturalist_no_naturalist_loc: "当你拥有一位[concept_dubois_naturalist]后，其#V 成就#!将会展示在此处。"
 ito_naturalist_achievements_intro_loc: "#V 该博物学家的成就#!\n#indent_newline:3 ※[Scope.GetCharacter.GetFullName]是一位共收集了[Scope.Var('dubois_naturalist_total_specimens_var').GetValue|0*V]种[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]的老练博物学家。#!"
 ito_naturalist_achievement_total_zoo_animals_loc: "\n#indent_newline:3 ※在[Scope.GetCharacter.GetHerHis]担任博物学家期间，累计将[Scope.GetVariable('ito_naturalist_total_zoo_animals_var').GetValue|0+]只[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]捕获并运送至[GetPlayer.MakeScope.GetCountry.GetName]。#!"
 ito_naturalist_achievement_total_wildlife_documentaries_loc: "\n#indent_newline:3 ※[GetPlayer.MakeScope.Var('ito_naturalist_var').GetCharacter.GetFullName]以在自然栖息地记录了[GetPlayer.MakeScope.Var('ito_naturalist_var').GetVariable('ito_character_num_animal_documentations_var').GetValue|0+]种[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]的成就闻名于世。#!"
 ito_naturalist_achievement_invented_evolution_theory_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetHerHis]最伟大的成就莫过于其著作#V 《物种起源》#!，该书首次系统阐述了进化论学说。#!"
 ito_naturalist_achievement_attended_hippocampus_congress_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士曾参与那场决定性的辩论——人类究竟是独一无二的造物，抑或仅是芸芸众生中的普通一员。#!"
 ito_naturalist_achievement_showed_evolution_in_peppered_moths_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]教授通过#V 桦尺蛾适应性进化#!现象，为进化论提供了实证——该物种因环境变迁而产生的体色演化，成为自然选择理论的活体见证。#!"
 ito_naturalist_achievement_finished_pacific_expedition_loc: "\n#indent_newline:3 ※在#V 太平洋远征#!中，[Scope.GetCharacter.GetLastNameNoFormatting]博士系统探索了这片自然奇境的动植物群落，成功发现诸多新物种。#!"
 ito_naturalist_achievement_wallace_line_discovered_loc: "\n#indent_newline:3 ※在太平洋考察期间，[Scope.GetCharacter.GetLastNameNoFormatting]注意到#V 亚洲与澳大利亚动植物群存在明确分界#!。该发现不仅为进化论提供关键证据，更暗示远古时期存在大规模岛屿分离事件。#!"
 ito_naturalist_achievement_inaugurated_zoo_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]在#V 动物园创立#!过程中发挥了关键作用，该场所使公众得以近距离观察远国的珍禽异兽。#!"
 ito_naturalist_achievement_found_victoria_amazonica_loc: "\n#indent_newline:3 ※在亚马逊雨林植物学考察中，[Scope.GetCharacter.GetLastNameNoFormatting]教授发现了#V 巨型睡莲#!——其叶片直径可达3米，实属举世罕见的植物奇观。#!"
 ito_naturalist_achievement_found_attacus_atlas_loc: "\n#indent_newline:3 ※在印度支那植物考察中，[Scope.GetCharacter.GetLastNameNoFormatting]博士发现了#V 泰坦巨蛾#!——该物种位列全球最大鳞翅目昆虫之一，其吐丝具有非凡的坚韧特性。#!"
 ito_naturalist_achievement_found_amorphophallus_titanum_loc: "\n#indent_newline:3 ※在婆罗洲植物考察期间，[Scope.GetCharacter.GetLastNameNoFormatting]教授发现了高达3米的#V 巨型大王花#!，此乃植物学界确凿的奇迹。#!"
 ito_naturalist_achievement_found_goliathus_loc: "\n#indent_newline:3 ※刚果雨林蕴藏无数奇观，[Scope.GetCharacter.GetLastNameNoFormatting]博士在植物学考察中发现的#V 大角金龟#!便是其一。作为全球最大昆虫物种之一，该甲虫极为罕见#!"
 ito_natualist_achievement_forestry_improvement_finished_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]教授以其在森林改良及可持续林业领域的开创性研究闻名学界。#!"
 ito_naturalist_achievement_rubber_improvement_finished_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetHerHis|U]在橡胶种植园的耕耘与生长条件实验，使我国橡胶产量获得质的飞跃。#!"
 ito_naturalist_achievement_great_barrier_reef_discovered_loc: "\n#indent_newline:3 ※在太平洋远征中，[Scope.GetCharacter.GetLastNameNoFormatting]博士是首位系统探索#V 大堡礁#!并意识到其重要性的科学家。#!"