 theiler_gui_current_microscope_compound_tooltip_loc: "你的学者目前正在使用$theiler_early_compound_microscope_flag$。\n\n一旦研究出[GetTechnology('theiler_microbiology_tech').GetName]，你将能够开始研发一台$theiler_achromatic_microscope_flag$。要完成这项研发，你的[concept_tesla_engineer]和[concept_theiler_biologist]需要花费#V 12个月#!的时间进行工作。此外，你还需要一座等级为#V 3#!的[GetBuildingType('building_glassworks').GetName]建筑。"
 theiler_gui_current_microscope_achromatic_tooltip_loc: "你的学者目前正在使用$theiler_achromatic_microscope_flag$。\n\n一旦研究出[GetTechnology('verrier_nuclear_physics_tech').GetName]，你将能够开始研发一台$theiler_electron_microscope_flag$。要完成这项研发，你的[concept_tesla_engineer]和[concept_theiler_biologist]需要花费#V 12个月#!的时间进行工作。此外，你还需要一座等级为#V 5#!的[GetBuildingType('building_glassworks').GetName]建筑。"
 theiler_gui_current_microscope_electron_tooltip_loc: "你的学者目前正在使用$theiler_electron_microscope_flag$。\n\n这是最先进的显微镜。"
