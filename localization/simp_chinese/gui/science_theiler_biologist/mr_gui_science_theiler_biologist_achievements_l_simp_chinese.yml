e_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_smallpox_vaccine_achievement_var').IsSet , Scope.Var('theiler_smallpox_vaccine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_typhus_vaccine_achievement_var').IsSet , Scope.Var('theiler_typhus_vaccine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_yellow_fever_vaccine_achievement_var').IsSet , Scope.Var('theiler_yellow_fever_vaccine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_measles_vaccine_achievement_var').IsSet , Scope.Var('theiler_measles_vaccine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_scarlet_vaccine_achievement_var').IsSet , Scope.Var('theiler_scarlet_vaccine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_plague_vaccine_achievement_var').IsSet , Scope.Var('theiler_plague_vaccine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_diphteria_vaccine_achievement_var').IsSet , Scope.Var('theiler_diphteria_vaccine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_polio_vaccine_achievement_var').IsSet , Scope.Var('theiler_polio_vaccine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_pharmaceutical_strychnine_achievement_var').IsSet , Scope.Var('theiler_pharmaceutical_strychnine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_pharmaceutical_emetine_achievement_var').IsSet , Scope.Var('theiler_pharmaceutical_emetine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_pharmaceutical_atropine_achievement_var').IsSet , Scope.Var('theiler_pharmaceutical_atropine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_pharmaceutical_aloin_achievement_var').IsSet , Scope.Var('theiler_pharmaceutical_aloin_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_pharmaceutical_digitoxin_achievement_var').IsSet , Scope.Var('theiler_pharmaceutical_digitoxin_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_pharmaceutical_quinine_achievement_var').IsSet , Scope.Var('theiler_pharmaceutical_quinine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_pharmaceutical_thymol_achievement_var').IsSet , Scope.Var('theiler_pharmaceutical_thymol_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_pharmaceutical_pilocarpine_achievement_var').IsSet , Scope.Var('theiler_pharmaceutical_pilocarpine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_pharmaceutical_ephedrine_achievement_var').IsSet , Scope.Var('theiler_pharmaceutical_ephedrine_achievement_var').GetFlagName)][AddLocalizationIf( Scope.Var('theiler_pharmaceutical_strophantine_achievement_var').IsSet , Scope.Var('theiler_pharmaceutical_strophantine_achievement_var').GetFlagName)]"
 theiler_biologist_no_biologist_achievements_loc: "当你拥有一位[concept_theiler_biologist]后，其#V 成就#!将会展示在此处。"
 theiler_biologist_achievements_intro_loc: "#V 该生物学家的成就#!\n#indent_newline:3 ※[Scope.GetCharacter.GetFullName]是一位成功的生物学家。#!"
 theiler_microbiology_achievement_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士被誉为现代微生物学之父。#!"
 theiler_cholera_pathogen_achievement_loc: "\n#indent_newline:3 ※霍乱杆菌的首位发现者是[Scope.GetCharacter.GetLastNameNoFormatting]博士，其随后对该病菌进行了详细描述与分离培养。#!"
 theiler_tuberculosis_pathogen_achievement_loc: "\n#indent_newline:3 ※结核病病原体最初由[Scope.GetCharacter.GetLastNameNoFormatting]博士发现，并由其完成鉴定与分离工作。#!"
 theiler_smallpox_pathogen_achievement_loc: "\n#indent_newline:3 正是[Scope.GetCharacter.GetLastNameNoFormatting]博士首次发现了引发天花的微生物，并对其进行了记录和分离。#!"
 theiler_typhus_pathogen_achievement_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士识别出导致斑疹伤寒的病原体，并成功对其进行了描述与分离。#!"
 theiler_yellow_fever_pathogen_achievement_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士是首位发现黄热病病原体，并对其进行描述和分离的学者。#!"
 theiler_measles_pathogen_achievement_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士发现了麻疹病原体，并对其进行了描述和分离。#!"
 theiler_scarlet_pathogen_achievement_loc: "\n#indent_newline:3 ※猩红热致病细菌最初由[Scope.GetCharacter.GetLastNameNoFormatting]博士发现，并由其完成鉴定与分离工作。#!"
 theiler_plague_pathogen_achievement_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士识别出导致鼠疫的病原体，并成功对其进行了描述与分离。#!"
 theiler_diphteria_pathogen_achievement_loc: "\n#indent_newline:3 正是[Scope.GetCharacter.GetLastNameNoFormatting]博士首次发现了引发白喉的微生物，并对其进行了记录和分离。#!"
 theiler_polio_pathogen_achievement_loc: "\n#indent_newline:3 ※脊髓灰质炎病病原体最初由[Scope.GetCharacter.GetLastNameNoFormatting]博士发现，并由其完成鉴定与分离工作。#!"
 theiler_cholera_vaccine_achievement_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士率先开发、测试并生产出有效的霍乱疫苗。#!"
 theiler_tuberculosis_vaccine_achievement_loc: "\n#indent_newline:3 ※最初由[Scope.GetCharacter.GetLastNameNoFormatting]博士率先开发、测试并生产出有效的结核病疫苗。#!"
 theiler_smallpox_vaccine_achievement_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士率先开发、测试并生产出有效的天花疫苗。#!"
 theiler_typhus_vaccine_achievement_loc: "\n#indent_newline:3 ※最初由[Scope.GetCharacter.GetLastNameNoFormatting]博士率先开发、测试并生产出有效的斑疹伤寒疫苗。#!"
 theiler_yellow_fever_vaccine_achievement_loc: "\n#indent_newline:3 ※最初由[Scope.GetCharacter.GetLastNameNoFormatting]博士率先开发、测试并生产出有效的黄热病疫苗。#!"
 theiler_measles_vaccine_achievement_loc: "\n#indent_newline:3 ※最初由[Scope.GetCharacter.GetLastNameNoFormatting]博士率先开发、测试并生产出有效的麻疹疫苗。#!"
 theiler_scarlet_vaccine_achievement_loc: "\n#indent_newline:3 ※最初由[Scope.GetCharacter.GetLastNameNoFormatting]博士率先开发、测试并生产出有效的猩红热疫苗。#!"
 theiler_plague_vaccine_achievement_loc: "\n#indent_newline:3 ※最初由[Scope.GetCharacter.GetLastNameNoFormatting]博士率先开发、测试并生产出有效的鼠疫疫苗。#!"
 theiler_diphteria_vaccine_achievement_loc: "\n#indent_newline:3 ※最初由[Scope.GetCharacter.GetLastNameNoFormatting]博士率先开发、测试并生产出有效的白喉疫苗。#!"
 theiler_polio_vaccine_achievement_loc: "\n#indent_newline:3 ※最初由[Scope.GetCharacter.GetLastNameNoFormatting]博士率先开发、测试并生产出有效的脊髓灰质炎疫苗。#!"
 theiler_pharmaceutical_strychnine_achievement_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士被认为是首位发现基于马钱子碱开发出药物的人。#!"
 theiler_pharmaceutical_emetine_achievement_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士被公认为研发依米丁类药物领域的先驱。#!"
 theiler_pharmaceutical_atropine_achievement_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士被公认为首个研发出以阿托品为基础成分药物的人。#!"
 theiler_pharmaceutical_aloin_achievement_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士因首次发现以芦荟素为原料的药物而备受赞誉。#!"
 theiler_pharmaceutical_digitoxin_achievement_loc: "\n#indent_newline:3 ※洋地黄毒苷类药物的发现可追溯到[Scope.GetCharacter.GetLastNameNoFormatting]博士。#!"
 theiler_pharmaceutical_quinine_achievement_loc: "\n#indent_newline:3 [Scope.GetCharacter.GetLastNameNoFormatting]博士是首位利用奎宁研制出药物的人。#!"
 theiler_pharmaceutical_thymol_achievement_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]因首次发现基于百里酚的药物而获得赞誉。#!"
 theiler_pharmaceutical_pilocarpine_achievement_loc: "\n#indent_newline:3 [Scope.GetCharacter.GetLastNameNoFormatting]博士被公认为毛果芸香碱类药物的发现者。#!"
 theiler_pharmaceutical_ephedrine_achievement_loc: "\n#indent_newline:3 ※麻黄碱类药物的首次发现须归功于[Scope.GetCharacter.GetLastNameNoFormatting]博士。#!"
 theiler_pharmaceutical_strophantine_achievement_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士被认为是首位发现基于康毗箭毒子素药物的人。#!"