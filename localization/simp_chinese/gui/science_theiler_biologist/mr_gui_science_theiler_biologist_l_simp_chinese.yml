l_simp_chinese:
 MR_BIOLOGIST_MICROORGANISM_RESEARCH_BUTTON: "微生物研究"
 MR_BIOLOGIST_MICROORGANISM_RESEARCH_BUTTON_TT: "#T 微生物研究#!\n寻找新的[Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]，对其开展研究以及相关实验是微生物学工作的核心组成部分。生物学家不仅能为此后寻找病原体做好前期准备，还可能获得意外发现。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_MICROORGANISM_RESEARCH_ACTIVE_TT: "#T #!微生物研究\n你的[concept_theiler_biologist]目前正在寻找新的[Concept('concept_theiler_microorganism','$concept_theiler_microorganisms$')]，对它们进行研究与实验。生物学家不仅能开展寻找病原体的前期工作，还可能获得意外发现。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_FIND_PATHOGEN_BUTTON: "寻找病原体"
 MR_BIOLOGIST_FIND_PATHOGEN_BUTTON_TT: "#T 寻找病原体#!\n寻找[concept_theiler_pathogen]是后续开发疫苗的先决条件。根据病原体的不同，发现过程可能需要更长时间，或仅在特定条件下才会开始。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_FIND_PATHOGEN_ACTIVE_TT: "#T 寻找病原体#!\n你的[concept_theiler_biologist]正在寻找[concept_theiler_pathogen]，这是后续开发疫苗的先决条件。根据病原体的不同，发现过程可能需要更长时间，或仅在特定条件下才会开始。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACTIVE_BIOLOGIST_TRIGGER: "#default_text [GetPlayer.GetName]拥有一位#V 空闲#![concept_theiler_biologist]。#!"
 MR_BIOLOGIST_CAN_FIND_PATHOGEN_TRIGGER_TT: "#default_text 以下任意一种：[GetPlayer.GetCustom('GUI_theiler_can_find_cholera_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_diphtheria_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_measles_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_plague_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_polio_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_typhus_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_scarlet_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_smallpox_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_tuberculosis_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_yellow_fever_trigger_custom_loc')]#!"
 MR_BIOLOGIST_CREATE_VACCINE_BUTTON: "研发疫苗"
 MR_BIOLOGIST_CREATE_VACCINE_BUTTON_TT: "#T 研发疫苗#!\n你的[concept_theiler_biologist]正在研发疫苗，这是生物学家的巅峰成就。首先需要对引发疾病的[concept_theiler_pathogen]进行研究。在特定条件下，[Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]能够完全阻止疾病爆发。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_CREATE_VACCINE_ACTIVE_TT: "#T 研发疫苗#!\n疫苗研发是生物学家的巅峰成就。它首先需要对引发疾病的[concept_theiler_pathogen]进行研究。在特定条件下，[Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')]能够完全阻止疾病的爆发。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_CAN_CREATE_VACCINE_TRIGGER_TT: "#default_text [GetPlayer.GetName]发现了一种尚无疫苗应对的病原体，并掌握了相关技术。#!"
 MR_10000_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有的[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]#V 不少于10000件#!（当前[GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]件）。#!"
 MR_BOTANICAL_EXPEDITION_BUTTON_TT: "#T 植物学考察#!\n植物学考察（有时称为“植物狩猎”）是旨在探索特定地区植物区系的科学考察。[concept_dubois_naturalist]将负责标本与[concept_ito_medicinal_plants]的识别、描述和采集。\n\n注意：若要在存在疟疾的地区开展植物科考探险，必须研发[GetTechnology('malaria_prevention').GetName][concept_technology]。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SAFARI_EXPEDITION_BANNED_TRIGGER_TT: "#default_text 植物学考察因#V 政治原因#!被禁止。#!"
 MR_SAFARI_EXPEDITION_ACCESS_RAINFOREST_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有一个具备[concept_ito_medicinal_plants]地区特质的地区。若该地区为#V 疟疾地区#!，则你还需研究[GetTechnology('malaria_prevention').GetName][concept_technology]。#!"
 MR_BOTANICAL_EXPEDITION_RECALL_BUTTON_TT: "#T 从植物学考察中召回博物学家#!\n命令[concept_dubois_naturalist]从植物学研究中返回以从事其他工作——例如捕捉动物。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BOTANICAL_EXPEDITION_RECALL_TRIGGER_TT: "#default_text 你的[concept_dubois_naturalist]#V 未在旅行或生病#!。#!"
 MR_BOTANICAL_EXPEDITION_RECALL_NATURALIST_EFFECT_TT: "你的[concept_dubois_naturalist]不再处于忙碌中。"
 MR_BIOLOGIST_COCHLIOMYIA_EREDICATION_BUTTON: "消灭螺旋蝇"
 MR_BIOLOGIST_COCHLIOMYIA_EREDICATION_BUTTON_TT: "#T 消灭螺旋蝇#!\n凭借技术和政府支持下，生物学家可以研究出一种方法，最终根除这种恼人的螺旋蝇。这将提高受影响地区的农业产量。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_COCHLIOMYIA_STATE_TRIGGER: "#default_text [GetPlayer.GetName]至少有一个地区拥有#V $theiler_state_trait_cochliomyia$#![Concept('concept_modifier','$concept_modifiers$')]。#!"
 MR_BIOLOGIST_STI_BUTTON: "昆虫不育技术"
 MR_BIOLOGIST_STI_BUTTON_TT: "#T 昆虫不育技术#!\n在遭受螺旋蝇侵扰的省份，生物学家可以尝试通过为期三年的试验来根除这种寄生虫。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_CYDIA_PESTICIDE_BUTTON: "苹果蠹蛾杀虫剂"
 MR_BIOLOGIST_CYDIA_PESTICIDE_BUTTON_TT: "#T 苹果蠹蛾杀虫剂#!\n生物学家可以开发出一种有效的杀虫剂，以减轻我国果农因苹果蠹蛾造成的作物损失。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CYDIA_STATE_TRIGGER: "#default_text [GetPlayer.GetName]至少有一个地区拥有#V $theiler_state_trait_cydia$#![Concept('concept_modifier','$concept_modifiers$')]。#!"
 MR_BIOLOGIST_IMPROVE_AGRICULTURE_BUTTON: "农业改良"
 MR_BIOLOGIST_IMPROVE_AGRICULTURE_BUTTON_TT: "#T 农业改良#!\n你的生物学家可运用专业技能改良本国农业，提升一座[GetBuildingGroup('bg_agriculture').GetName]、[GetBuildingGroup('bg_ranching').GetName]或[GetBuildingGroup('bg_plantations').GetName]建筑产出。\n\n建筑将获得以下修正：\n$theiler_building_throughput_add_modifier_with_tooltip$\n$theiler_building_production_mult_modifier_with_tooltip$\n$theiler_building_goods_input_mult_modifier_with_tooltip$\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_IMPROVE_AGRICULTURE_TRIGGER_TT: "#default_text 至少有一个级别不低于1且没有三个[Concept('concept_modifier','$concept_modifiers$')]的[GetBuildingGroup('bg_agriculture').GetName]、[GetBuildingGroup('bg_ranching').GetName]或[GetBuildingGroup('bg_plantations').GetName]。#!"
 MR_BIOLOGIST_IMPROVE_AGRICULTURE_ACTIVE_TT: "#T 改良农业#!\n#p 生物学家正在改良一座[GetBuildingGroup('bg_agriculture').GetName]、[GetBuildingGroup('bg_ranching').GetName]或[GetBuildingGroup('bg_plantations').GetName]建筑。#!"
