 tesla_engineer_achievements_invented_steel_frame_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 建造了第一座使用钢架的#V 建筑#! 。这种建筑方式像野火一样在全世界蔓延开来。" #deepl:3716706247
 tesla_engineer_achievements_invented_electric_telegraph_loc: "\n[Scope.GetCharacter.GetSheHe] was the first person to #V Send a Telegram#! using an alphabet [Scope.GetCharacter.GetSheHe] invented." #pleace replace
 tesla_engineer_achievements_invented_automobile_loc: "\[Scope.Var('tesla_engineer_achievements_invented_automobile_year_var').GetValue] [Scope.GetCharacter.GetLastNameNoFormatting] 发明了带有内燃机的#V 汽车#! ，并将其开出了很远的距离。这标志着汽车爆炸性普及的开始。" #deepl:88145422
 tesla_engineer_achievements_finished_road_project_loc: "\[Scope.GetCharacter.GetFullName] 改进后的#V 公路网络#! 。由于[Scope.GetCharacter.GetHerHis] 在道路现代化方面所做的工作，这些道路现在被认为是世界上最现代化的道路。" #deepl:2097415548
 tesla_engineer_achievements_finished_bridge_project_loc: "\[Scope.GetCharacter.GetSheHe] 建造了许多#V 新桥#! ，从而改善了基础设施。" #deepl:2671184667
 tesla_engineer_achievements_finished_tunnel_project_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士正在建造许多#V 隧道#! ，这些隧道都是技术上的小奇迹。" #deepl:922154902
 tesla_engineer_achievements_finished_railway_project_loc: "#V \[Scope.GetCharacter.GetSheHe] 通过采用新技术和其他改进措施，大规模改进了铁路线#! 。" #deepl:721890021
 tesla_engineer_achievements_finished_construction_project_loc: "\nDr.[Scope.GetCharacter.GetLastNameNoFormatting] #V  通过引进现代设备和建筑技术，改善了建筑部门#! 。" #deepl:987346687
 tesla_engineer_achievements_finished_topographic_map_project_loc: "\[Scope.GetCharacter.GetSheHe] 创建了一个新的#V 地形图#! ，为未来的建设项目提供便利。" #deepl:2317700588
 tesla_engineer_achievements_finished_locomotive_project_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #V  开发了新的机车#! ，这将促进铁路的发展。" #deepl:2246312284
 tesla_engineer_achievements_finished_production_methods_project_loc: "\[Scope.GetCharacter.GetSheHe|U] 帮助各公司#V 改善其生产#! 。" #deepl:3837789510
 tesla_engineer_achievements_finished_rifles_project_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #V  博士设计的新型步枪#! 是世界上最现代化的步枪之一。" #deepl:373585695
 tesla_engineer_achievements_finished_tanks_project_loc: "\n[Scope.GetCharacter.GetSheHe] 是#V 坦克设计和建造的先驱#! ，他使我们的坦克实现了现代化。" #deepl:1266234006
 tesla_engineer_achievements_finished_fieldworks_project_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #V  彻底改变了战地工程和防御#! ，挽救了许多士兵的生命。" #deepl:3300715553
 tesla_engineer_achievements_finished_geomagnetic_observartory_project_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 帮助开展地磁研究，#V 建立了一个地磁观测站#! 。" #deepl:2611684424
