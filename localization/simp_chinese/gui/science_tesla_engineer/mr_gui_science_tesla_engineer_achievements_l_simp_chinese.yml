 tesla_engineer_achievements_finished_airport_project_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #V  现代化的机场#! 。" #deepl:4174187253
 tesla_engineer_achievements_finished_warplane_project_loc: "\[Scope.GetCharacter.GetSheHe] 开发的#V 现代军用飞机#!." #deepl:3583316823
