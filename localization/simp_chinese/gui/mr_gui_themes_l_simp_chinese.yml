l_simp_chinese:
 theme_mr_paleontology: "赤色晨曦：古生物学（土质）"
 theme_mr_paleontology_desc: "受古生物学、化石和恐龙骨骼启发的用户界面。"
 mr_papermap_coprolite: "古生物学：粪石"
 mr_papermap_coprolite_desc: "好像有位古生物学家正在处理粪石。你想知道粪石是什么吗？大部分都是恐龙的粪便化石"
 mr_papermap_belemnite: "古生物学：箭石"
 mr_papermap_belemnite_desc: "一位古生物学家发现的箭石，这些生物在3.58亿至6600万年前漫游在海洋中。"
 mr_papermap_ammonite: "古生物学：菊石"
 mr_papermap_ammonite_desc: "最著名的化石之一。数百万年前，这只菊石曾在海洋中遨游，现在它是餐桌上的一件精美装饰品。"
 mr_papermap_trilobite: "古生物学：三叶虫"
 mr_papermap_trilobite_desc: "三叶虫是最古老的节肢动物之一，而且演化非常成功。可惜它们在二叠纪灭绝了。不过有些已经变成了化石，你可以把它们放在桌子上作为纪念品。"
 mr_papermap_battenberg_cake: "饮食：巴滕伯格蛋糕"
 mr_papermap_battenberg_cake_desc: "此刻是否正与饥意缠绵？何不让这款宫廷级甜点登堂入室。松软如云的海绵蛋糕身披杏仁糖衣华袍，其尊贵名号可追溯至巴滕伯格的路易亲王。"
 mr_papermap_old_fashioned: "饮食：古典鸡尾酒"
 mr_papermap_old_fashioned_desc: "在漫长的一天结束后，还有什么比一杯上好的古典鸡尾酒更惬意呢？您的调酒师必定能用这款鸡尾酒让您心情愉悦！"
 mr_papermap_cucumber_ice_cream: "饮食：黄瓜口味冰淇淋"
 mr_papermap_cucumber_ice_cream_desc: "骄阳当空，正是暑气逼人的大晴天。此时此刻，最令人向往的莫过于那清新怡人的黄瓜口味冰淇淋了。"
 mr_papermap_croissant_hot_chocolate: "饮食：可颂与热可可"
 mr_papermap_croissant_hot_chocolate_desc: "一份酥脆可颂配上一杯香浓热可可，堪称晨间仪式的完美组合。无论今日将迎来何种挑战。"