l_simp_chinese:
 theme_mr_paleontology: "摩根罗特 古生物学（土）" #Already in English Folder
 theme_mr_paleontology_desc: "用户界面的灵感来自古生物学、化石和恐龙骨。" #Already in English Folder

 mr_papermap_coprolite: "古生物学 科普洛莱石"
 mr_papermap_coprolite_desc: "似乎一位古生物学家正在准备一块桡足石。你想知道 coprolite 是什么吗？就是大便化石。在这种情况下，可能是恐龙的粪便。"
 mr_papermap_belemnite: "古生物学 白云石" #Please replace
 mr_papermap_belemnite_desc: "古生物学家发现的贝叶石化石。这些生物在距今 3.58 亿年至 6600 万年前的海洋中游荡。" #Please replace
 mr_papermap_ammonite: "古生物学 鲑鱼" #Please replace
 mr_papermap_ammonite_desc: "最有名的化石之一。数百万年前，这只鲑鱼曾在海洋中遨游。现在，它是您餐桌上的一件精美装饰品。" #Please replace
 mr_papermap_trilobite: "古生物学 三叶虫"
 mr_papermap_trilobite_desc: "三叶虫是最早的节肢动物之一，而且非常成功。不幸的是，它们在二叠纪灭绝了。幸运的是，有些已经成为化石，您可以把它们作为纪念品放在桌上。"

 mr_papermap_battenberg_cake: "烹饪 巴腾堡蛋糕"
 mr_papermap_battenberg_cake: "您饿了吗？也许您应该在餐桌上摆上这款美味的蛋糕。它是一种杏仁蛋白糖包裹的海绵蛋糕，以巴腾堡的路易王子命名。"
