l_simp_chinese:
 MR_PAINTER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'klimt_painter_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'klimt_painter_achievements_no_painter_loc')]"
 klimt_painter_achievements_loc: "$klimt_painter_achievements_intro_loc$[AddLocalizationIf( Scope.Var('klimt_painter_achievement_vernissage_var').IsSet , Scope.Var('klimt_painter_achievement_vernissage_var').GetFlagName)][AddLocalizationIf( Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').IsSet , Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').GetFlagName)]"
 klimt_painter_achievements_no_painter_loc: "当你拥有一位[concept_klimt_painter]后，其#V 成就#!将会展示在此处。"
 klimt_painter_achievements_intro_loc: "#V 该画家的成就#!\n#indent_newline:3 ※[Scope.GetCharacter.GetFullName]是一位[Scope.GetCharacter.GetCustom('klimt_painter_achievement_experience_type')]。#!\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]共创作了[Scope.Var('klimt_painter_num_paintings_var').GetValue|V0]幅画作，其中有[Scope.Var('klimt_painter_num_masterworks_var').GetValue|V0]幅被视为杰作。#!"
 klimt_painter_achievement_vernissage_loc: "\n#indent_newline:3 ※[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName]在一次盛大的开幕日上展出了其画作。#!"
 klimt_painter_achievement_inaugurated_gallery_loc: "[Scope.GetCharacter.GetSheHe|U]主持了新艺术画廊的开幕仪式，并展出了[Scope.GetCharacter.GetHerHis]的精彩作品。可以预见，这座画廊未来将成为众多杰出画家展示才华的舞台。"