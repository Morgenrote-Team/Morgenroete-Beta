l_simp_chinese:
 MR_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T The Transatlantic Cable#!\nVictorian science has unlocked the marvel of telegraphy, allowing information to traverse great distances at unprecedented speed. By establishing telegraph stations on both sides of the Atlantic, the vision of laying an undersea cable emerges—a feat requiring advanced engineering and a thriving news sector willing to invest in this ambitious enterprise.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_TT: "#T The Suez India Cable#!\nThe opening of the Suez Canal, a triumph of Victorian ingenuity, has intensified the drive to connect Europe and India with a direct submarine cable. Such a link would revolutionize communication, binding continents together through the power of scientific progress.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON: "跨太平洋电缆"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON_TT: "#T The Transpacific Cable#!\nAs steamships and trade routes flourish, Victorian science beckons the laying of a submarine cable across the Pacific. This technological leap would shrink months of correspondence to mere minutes, extending influence and coordination across the world's largest ocean.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSATLANTIC_CABLE_HAS_TELEGRAPH_COMPANY_TRIGGER_TT: "#default_text [GetPlayer.GetName]有$mr_basic_telegraphy$[concept_company]#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NO_TRANSATLANTIC_RADIO_TRIGGER_TT: "#default_text #V 迄今为止#!，尚未有人能跨越大西洋#V 发送消息#!#!"
 MR_SUEZ_INDIA_CABLE_CANAL_TRIGGER_TT: "#default_text 存在[GetBuildingType('building_suez_canal').GetName]#!"
 MR_TRANSATLANTIC_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName]的[concept_investment_pool]#V 至少有5M#!。#!"
 MR_SUEZ_INDIA_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName]的[concept_investment_pool]#V 至少有10M#!。#!"
 MR_TRANSPACIFIC_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName]的[concept_investment_pool]#V 至少有20M#!。#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetName]没有$tesla_transatlantic_cable_expedition_failed_modifier$修正#!"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetName]没有$tesla_suez_india_cable_expedition_failed_modifier$修正#!"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetName]没有$tesla_transpacific_cable_expedition_failed_modifier$修正#!"
 MR_ON_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T The Transatlantic Cable#!\n#p There is currently an ongoing Expedition to lay the Transatlantic Cable.#!\nVictorian science has unlocked the marvel of telegraphy, allowing information to traverse great distances at unprecedented speed. By establishing telegraph stations on both sides of the Atlantic, the vision of laying an undersea cable emerges—a feat requiring advanced engineering and a thriving news sector willing to invest in this ambitious enterprise."
 MR_ON_SUEZ_INDIA_CABLE_EXPEDITION_TT: "#T The Suez India Cable#!\n#p There is currently an ongoing Expedition to lay the Suez India Cable.#!\nThe opening of the Suez Canal, a triumph of Victorian ingenuity, has intensified the drive to connect Europe and India with a direct submarine cable. Such a link would revolutionize communication, binding continents together through the power of scientific progress."
 MR_ON_TRANSPACIFIC_CABLE_EXPEDITION_TT: "#T The Transpacific Cable#!\n#p There is currently an ongoing Expedition to lay the Transpacific Cable.#!\nAs steamships and trade routes flourish, Victorian science beckons the laying of a submarine cable across the Pacific. This technological leap would shrink months of correspondence to mere minutes, extending influence and coordination across the world's largest ocean."
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON: "苏伊士印度海底电缆"
 MR_PACIFIC_END_OF_ERA_TRIGGER_TT: "#default_text #n 无国家#!已研究[GetTechnology('dreadnought').GetName]或[GetTechnology('destroyer').GetName]，且游戏时间在#V 1896年之前#!#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NOT_ONGOING_TRIGGER_TT: "#default_text [GetPlayer.GetName] does not have the #V $je_tesla_transatlantic_cable$#! Journal Entry.#!"