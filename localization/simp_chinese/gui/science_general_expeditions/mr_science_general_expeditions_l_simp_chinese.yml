l_simp_chinese:
 MR_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T 跨大西洋电报电缆#!\n维多利亚时代的科学揭开了电报奇迹般技术，使信息能够以前所未有的速度跨越遥远距离。通过在两岸建立电报站，铺设海底电缆的构想应运而生——这一壮举需要先进的工程技术，以及一个蓬勃发展的新闻行业愿意投资于这项雄心勃勃的事业。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_TT: "#T 苏伊士印度海底电缆#!\n苏伊士运河的开通是维多利亚时代智慧的胜利，它进一步推动了欧洲与印度之间直接铺设海底电缆。这样将通过科学的力量将各大洲紧密联系在一起，彻底改变通信方式。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON: "跨太平洋电缆"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON_TT: "#T 跨太平洋电缆#!\n随着跨洋贸易的日益频繁，蒸汽航线将美洲与亚洲及大洋洲紧密相连，建立一条横跨太平洋的永久电报线路需求变得愈发重要。一条海底电缆将把原本需要数月的通讯时间缩短至几分钟，从而巩固跨越广阔海域的影响力与协调能力。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSATLANTIC_CABLE_HAS_TELEGRAPH_COMPANY_TRIGGER_TT: "#default_text [GetPlayer.GetName]有$mr_basic_telegraphy$[concept_company]#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NO_TRANSATLANTIC_RADIO_TRIGGER_TT: "#default_text #V 迄今为止#!，尚未有人能跨越大西洋#V 发送消息#!#!"
 MR_SUEZ_INDIA_CABLE_CANAL_TRIGGER_TT: "#default_text 存在[GetBuildingType('building_suez_canal').GetName]#!"
 MR_TRANSATLANTIC_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName]的[concept_investment_pool]#V 至少有5M#!。#!"
 MR_SUEZ_INDIA_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName]的[concept_investment_pool]#V 至少有10M#!。#!"
 MR_TRANSPACIFIC_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text [GetPlayer.GetName]的[concept_investment_pool]#V 至少有20M#!。#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetName]没有$tesla_transatlantic_cable_expedition_failed_modifier$修正#!"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetName]没有$tesla_suez_india_cable_expedition_failed_modifier$修正#!"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text [GetPlayer.GetName]没有$tesla_transpacific_cable_expedition_failed_modifier$修正#!"
 MR_ON_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T 跨大西洋电报电缆#!\n#p 目前正在进行铺设跨大西洋电报电缆的探险。#!\n电报技术使得信息以前所未有的速度进行交换。通过在大西洋两岸建立电报站，有可能铺设一条海底电报电缆，使欧洲和美洲更加紧密相连。然而，这需要合适的设备和一个发达的新闻行业，它们将进行大量投资，以便从这一昂贵的事业中获利。"
 MR_ON_SUEZ_INDIA_CABLE_EXPEDITION_TT: "#T 苏伊士印度海底电缆#!\n#p 目前正在铺设苏伊士印度海底电缆。#!\n随着苏伊士运河的开通，直接铺设通往印度的潜艇电缆的前景变得更加紧迫。一条永久性的电报线路将大幅缩短通信时间，并使亚洲与欧洲的联系更加紧密。"
 MR_ON_TRANSPACIFIC_CABLE_EXPEDITION_TT: "#T 跨太平洋电报电缆#!\n#p 目前正在铺设跨太平洋电报电缆。#!\n随着跨洋贸易的日益频繁，蒸汽航线将美洲与亚洲和大洋洲连接起来，横跨太平洋的永久电报线路需求越来越重要。一条海底电缆将把数月的通讯时间缩短至几分钟，在广阔的海域上巩固影响力并加强协调。"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON: "苏伊士印度海底电缆"
 MR_PACIFIC_END_OF_ERA_TRIGGER_TT: "#default_text #n 无国家#!已研究[GetTechnology('dreadnought_tech').GetName]或[GetTechnology('destroyer').GetName]，且游戏时间在#V 1896年之前#!#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NOT_ONGOING_TRIGGER_TT: "#default_text [GetPlayer.GetName]没有#V $je_tesla_transatlantic_cable$#!日志条目#!"