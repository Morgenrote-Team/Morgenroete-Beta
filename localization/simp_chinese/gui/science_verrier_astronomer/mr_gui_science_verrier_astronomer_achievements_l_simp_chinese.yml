 verrier_astronomer_achievements_no_astronomer_loc: "当你拥有一位[concept_verrier_astronomer]后，其#V 成就#!将会展示在此处。"
 verrier_astronomer_achievements_intro_loc: "#V 该天文学家的成就#!\n#indent_newline:3 ·[Scope.GetCharacter.GetFullName]是一位共发现了[Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V]颗[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]的老练天文学家。#!"
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\n#indent_newline:3 ·通过测定#V 地球距天鹅座61恒星11.4光年#!，[Scope.GetCharacter.GetLastNameNoFormatting]一举证明宇宙远比既往认知更为浩瀚。#!"
 verrier_astronomer_achievement_helium_discovered_loc: "\n#indent_newline:3 ·[Scope.GetCharacter.GetHerHis]最伟大成就之一，是在研究太阳光谱时#V 发现氦元素#!。#!"
 verrier_astronomer_achievement_uranus_discoverer_loc: "\n#indent_newline:3 当无人预期新行星存在时，[Scope.GetCharacter.GetLastNameNoFormatting]教授#V 发现了天王星#!，由此开启太阳系行星搜寻热潮。#!"
 verrier_astronomer_achievement_ceres_discoverer_loc: "\n#indent_newline:3 ·众多天文学家搜寻火星与木星之间的行星未果，而[Scope.GetCharacter.GetLastNameNoFormatting]博士#V 发现了谷神星#!。#!"
 verrier_astronomer_achievement_pallas_discoverer_loc: "\n#indent_newline:3 ·[Scope.GetCharacter.GetLastNameNoFormatting]博士在火星与木星之间#V 发现了智神星#!。#!"
 verrier_astronomer_achievement_vesta_discoverer_loc: "\n#indent_newline:3 ·[Scope.GetCharacter.GetLastNameNoFormatting]博士在火星与木星之间#V 发现了灶神星#!。#!"
 verrier_astronomer_achievement_juno_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]在火星与木星之间#V 发现了婚神星#!。#!"
 verrier_astronomer_neptune_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetHerHis]最伟大的功绩莫过于#V 发现海王星#!，这一成就使其永载史册。#!"
 verrier_astronomer_achievement_pluto_discoverer_loc: "\n#indent_newline:3 ※尽管学界曾质疑#V 冥王星#!是否存在，[Scope.GetCharacter.GetLastNameNoFormatting]教授仍成功#V 发现#!这颗微小行星，成就天文伟业。#!"
 verrier_astronomer_achievement_discovered_1843_comet_loc: "\n#indent_newline:3 ※#V 1843年#!，[Scope.GetCharacter.GetSheHe]首度#V 发现大彗星#!，该彗星因此得名[Scope.GetCharacter.GetLastNameNoFormatting]彗星。#!"
 verrier_astronomer_achievement_discovered_1858_comet_loc: "\n#indent_newline:3 ※当#V 1858年大彗星#!掠过地球时，[Scope.GetCharacter.GetLastNameNoFormatting]博士率先观测，彗星遂以其命名。#!"
 verrier_astronomer_achievement_discovered_1861_comet_loc: "\n#indent_newline:3 ※作为首位在夜空中#V 发现1861年大彗星#!者，[Scope.GetCharacter.GetLastNameNoFormatting]教授成为该天体的命名者#!"
 verrier_astronomer_achievement_discovered_1874_comet_loc: "\n#indent_newline:3 ※#V 1874年大彗星#!初现时，[Scope.GetCharacter.GetLastNameNoFormatting]博士率先察觉，彗星将永载其名。#!"
 verrier_astronomer_achievement_discovered_1882_comet_loc: "\n#indent_newline:3 ※#V  1882年#!的天文奇观中，[Scope.GetCharacter.GetLastNameNoFormatting]教授在彗星飞掠地球时#V 发现大彗星#!。#!"
 verrier_astronomer_achievement_finished_pacific_expedition_loc: "\n#indent_newline:3 ※在#V 太平洋探险#!期间，[Scope.GetCharacter.GetLastNameNoFormatting]博士于南半球发现了不少新#V 天体#!。#!"
 verrier_astronomer_achievement_observed_venus_transit_loc: "\n#indent_newline:3 ※#V 1874年#!，[Scope.GetCharacter.GetLastNameNoFormatting]教授在太平洋观测#V 金星凌日#!——这种天象通常一生仅见一次。#!"
 verrier_astronomer_achievement_observed_carrington_event_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士在[Scope.GetVariable('verrier_astronomer_achievement_observed_carrington_event_var').GetValue]年观测到#V 巨型太阳耀斑#!。#!"
 verrier_astronomer_achievement_observed_corona_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetHerHim]发现了日冕中的#V [Scope.GetCharacter.GetLastNameNoFormatting]珠#!现象，该术语由此得名。#!"
 verrier_astronomer_achievement_sun_photo_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士拍摄了#V 首张日食照片#!。#!"
 verrier_astronomer_achievement_deimos_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士#V 发现了火星的天然卫星火卫二#!。#!"
 verrier_astronomer_achievement_phobos_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]#V 发现了火星的天然卫星火卫一#!。#!"
 verrier_astronomer_achievement_amalthea_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士#V 发现了木星的天然卫星木卫五#!。#!"
 verrier_astronomer_achievement_himalia_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]#V 发现了木星的天然卫星木卫六#!。#!"
 verrier_astronomer_achievement_elara_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士#V 发现了木星的天然卫星木卫七#!。#!"
 verrier_astronomer_achievement_pasiphae_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]#V 发现了木星的天然卫星木卫八#!。#!"
 verrier_astronomer_achievement_sinope_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士#V 发现了木星的天然卫星木卫九#!。#!"
 verrier_astronomer_achievement_lysithea_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]#V 发现了木星的天然卫星木卫十#!。#!"
 verrier_astronomer_achievement_carme_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士#V 发现了木星的天然卫星木卫十一#!。#!"
 verrier_astronomer_achievement_enceladus_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]#V 发现了土星的天然卫星土卫二#!。#!"
 verrier_astronomer_achievement_mimas_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士#V 发现了土星的天然卫星土卫一#!。#!"
 verrier_astronomer_achievement_hyperion_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]#V 发现了土星的天然卫星土卫七#!。#!"
 verrier_astronomer_achievement_phoebe_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士#V 发现了土星的天然卫星土卫九#!。#!"
 verrier_astronomer_achievement_titania_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]#V 发现了天王星的天然卫星天卫三#!。#!"
 verrier_astronomer_achievement_oberon_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士#V 发现了天王星的天然卫星天卫四#!。#!"
 verrier_astronomer_achievement_ariel_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]#V 发现了天王星的天然卫星天卫一#!。#!"
 verrier_astronomer_achievement_umbriel_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士#V 发现了天王星的天然卫星天卫二#!。#!"
 verrier_astronomer_achievement_miranda_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]#V 发现了天王星的天然卫星天卫五#!。#!"
 verrier_astronomer_achievement_triton_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士#V 发现了海王星的天然卫星海卫一#!。#!"
 verrier_astronomer_achievement_nereid_discoverer_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]#V 发现了海王星的天然卫星海卫二#!。#!"
 verrier_astronomer_achievement_moon_fission_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]被视作#V 月球曾是地球的一部分并随后分离#!这一理论的奠基人。#!"
 verrier_astronomer_achievement_moon_capture_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]被认为是#V 月球是一个后来被地球捕获的外来天体#!这一理论的创始人。#!"
 verrier_astronomer_achievement_centaur_discoverer_loc: "\n#indent_newline:3 在搜寻X行星的过程中，[Scope.GetCharacter.GetSheHe]在[GetGlobalVariable('verrier_centaur_year_global_var').GetValue|V]年#V 发现了第一颗半人马小行星#!，这是位于木星和海王星之间的一类独立小行星。#!"