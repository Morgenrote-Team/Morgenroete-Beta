 verrier_astronomer_achievements_no_astronomer_loc: "#V  [concept_verrier_astronomer] #! 的成就，一旦有了成就，就会显示在这里。" #deepl:2150212353

 verrier_astronomer_achievements_intro_loc: "#V 这位天文学家的成就#![Scope.GetCharacter.GetFullName] 是一位杰出的天文学家，他发现了[Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V] [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] 。" #deepl:2330629282
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\通过测量天鹅座61号11.4光年处的#V 距离#! ，[Scope.GetCharacter.GetLastNameNoFormatting] ，成功地一举证明了宇宙比以前想象的要大得多。" #deepl:4180687375
 verrier_astronomer_achievement_helium_discovered_loc: "\[Scope.GetCharacter.GetHerHis] 最伟大的成就之一是#V 在研究太阳电磁波谱时发现了氦元素#! 。" #deepl:1824398573
 verrier_astronomer_achievement_uranus_discoverer_loc: "\没有人想到会发现一颗新的行星，但是[Scope.GetCharacter.GetLastNameNoFormatting] #V  教授发现了天王星#! 。这一发现促使人们开始寻找太阳系中更多的行星。" #deepl:596907633
 verrier_astronomer_achievement_ceres_discoverer_loc: "\许多天文学家都在寻找火星和木星之间的行星。但[Scope.GetCharacter.GetLastNameNoFormatting] 博士是#V 发现谷神星#! 的人。" #deepl:134698821
 verrier_astronomer_achievement_pallas_discoverer_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #V  博士在火星和木星之间的区域发现了帕拉斯行星#! 。" #deepl:2895291218
 verrier_astronomer_achievement_vesta_discoverer_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #V  教授在火星和木星之间的区域发现了灶神星#! 。" #deepl:3332363292
 verrier_astronomer_achievement_juno_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  在火星和木星之间的区域发现了朱诺行星#! 。" #deepl:2722834301
 verrier_astronomer_neptune_discoverer_loc: "\[Scope.GetCharacter.GetHerHis] 最伟大的事迹之一是#V 发现海王星#! 。这一发现使[Scope.GetCharacter.GetHerHim] 在史书中永远占有一席之地。" #deepl:740023144
 verrier_astronomer_achievement_pluto_discoverer_loc: "\尽管人们对#V 冥王星#! 是否存在存在争议，但[Scope.GetCharacter.GetLastNameNoFormatting] 教授真的#V 发现了#! 这颗小行星。这是一项伟大的天文学成就！" #deepl:2882859348
 verrier_astronomer_achievement_discovered_1843_comet_loc: "\1843 年，#V #! [Scope.GetCharacter.GetSheHe] 最先#V 发现了大彗星#! ，并因此以[Scope.GetCharacter.GetLastNameNoFormatting] 命名。" #deepl:493581168
 verrier_astronomer_achievement_discovered_1858_comet_loc: "\当#V 1858 年的大彗星#! 擦过地球时，[Scope.GetCharacter.GetLastNameNoFormatting] 博士是第一个看到这颗彗星的人。因此，这颗彗星以[Scope.GetCharacter.GetHerHim] 命名。" #deepl:2184348218
 verrier_astronomer_achievement_discovered_1861_comet_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 作为第一个在黑暗的夜空中发现#V 1861 年大彗星#! 的人，教授成为了这一天体的命名者。" #deepl:2672737780
 verrier_astronomer_achievement_discovered_1874_comet_loc: "\当#V 1874 年的大彗星#! 第一次出现时，是[Scope.GetCharacter.GetLastNameNoFormatting] 博士首先注意到了它。现在，这颗彗星将永远以[Scope.GetCharacter.GetHerHis] 。" #deepl:333537749
 verrier_astronomer_achievement_discovered_1882_comet_loc: "\从天文学的角度来看，1882 年的#V #! 非常壮观。[Scope.GetCharacter.GetLastNameNoFormatting] 教授发现了飞越地球的#V 大彗星#! 。这是一个令人难以置信的奇观。" #deepl:3157970288
 verrier_astronomer_achievement_finished_pacific_expedition_loc: "#V #!\[Scope.GetCharacter.GetLastNameNoFormatting] ，博士在南半球发现了各种新的#V 天文天体#! 。" #deepl:27168137
 verrier_astronomer_achievement_observed_venus_transit_loc: "\#V 1874#! 年，[Scope.GetCharacter.GetLastNameNoFormatting] 教授在太平洋上观测到#V 金星凌日#! 。这通常是一生中仅有一次的事件。" #deepl:885972622
 verrier_astronomer_achievement_observed_carrington_event_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士在[Scope.GetVariable('verrier_astronomer_achievement_observed_carrington_event_var').GetValue] 观测到了#V 大规模太阳耀斑#! 。" #deepl:2882246181
 verrier_astronomer_achievement_observed_corona_loc: "\nDiscovered the#V [Scope.GetCharacter.GetLastNameNoFormatting] 's Beads#!, which wer named after[Scope.GetCharacter.GetHerHim] 。" #deepl:2736282257
 verrier_astronomer_achievement_sun_photo_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士是#V 第一张日食照片的作者。#!" #deepl:3755032771
