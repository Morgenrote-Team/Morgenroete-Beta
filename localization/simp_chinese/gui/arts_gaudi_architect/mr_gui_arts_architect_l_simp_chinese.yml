 MR_ARCHITECT_INVITE_INDEPENDENT_ARCHITECT: "邀请建筑师"
 MR_ARCHITECT_INVITE_INDEPENDENT_ARCHITECT_TT: "#T 邀请建筑师#!\n如果你的国家不能培养出足够优秀的建筑师抑或你对现在的建筑师感到不满意的话，邀请一位[concept_gaudi_architect]是个好方法。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).AddScope('chosen_architect', Scope.GetCharacter.MakeScope ).End)]"
 MR_ARCHITECT_INVITE_INDEPENDENT_ARCHITECT_EFFECT_TT: "[SCOPE.sCharacter('chosen_architect').GetFullName]将成为你的新[concept_gaudi_architect]。[GetPlayer.GetCustom('artists_replacement_architect_custom_type')]"
