l_simp_chinese:
 MR_ARCHITECT_MODERN_SPLENDOUR_BUTTON: "辉煌的摩登"
 MR_ARCHITECT_MODERN_SPLENDOUR_BUTTON_TT: "#T 辉煌的摩登#!\n在我们具备现代化建筑学院后，一系列大胆且充满幻想的建筑试验便可在首都进行。其中装饰艺术最是璀璨，不过这一切都需要时间。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_ACTIVE_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有一位#V 空闲#![concept_gaudi_architect]。#!"
 MR_MODERN_ARCHITECTURE_SCHOOL_TRIGGER_TT: "#default_text [GetPlayer.GetName]具有以下修正：#V 包豪斯风格#!，#V 新古典主义风格#!，又或是#V 装饰艺术风格#!。#!"
 MR_ARCHITECT_BLUEPRINTS_MONUMENT_BUTTON: "蓝图：城市纪念碑"
 MR_ARCHITECT_BLUEPRINTS_MONUMENT_BUTTON_TT: "#T 蓝图：城市纪念碑#!\n建筑师可以在“纪念碑”中设计三种设计蓝图：[GetBuildingType('building_gaudi_statue').GetName]、[GetBuildingType('building_gaudi_fountain').GetName]和[GetBuildingType('building_gaudi_arch').GetName]。\n科技可以解锁部分设计蓝图，也有一部分则需要特定的地区区块。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_MONUMENT_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_statue').GetName]需研究[GetTechnology('elgar_classicism_tech').GetName]。\n[GetBuildingType('building_gaudi_fountain').GetName]无要求。\n[GetBuildingType('building_gaudi_arch').GetName]需研究[GetTechnology('napoleonic_warfare').GetName]。#!"
 MR_ARCHITECT_BLUEPRINTS_SQUARE_BUTTON: "蓝图：公共广场"
 MR_ARCHITECT_BLUEPRINTS_SQUARE_BUTTON_TT: "#T 蓝图：公共广场#!\n建筑师可以在“广场”中设计三种设计蓝图：[GetBuildingType('building_gaudi_park').GetName]，[GetBuildingType('building_gaudi_luna').GetName]和[GetBuildingType('building_gaudi_parade').GetName]。\n科技可以解锁部分设计蓝图，也有一部分则需要特定的地区区块。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_SQUARE_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_park').GetName]无要求。\n[GetBuildingType('building_gaudi_luna').GetName]需研究[GetTechnology('curtiss_tourism_tech').GetName]。\n[GetBuildingType('building_gaudi_parade').GetName]需研究[GetTechnology('nationalism').GetName]。#!"
 MR_ARCHITECT_BLUEPRINTS_SERVICE_BUTTON: "蓝图：服务大楼"
 MR_ARCHITECT_BLUEPRINTS_SERVICE_BUTTON_TT: "#T 蓝图：服务大楼#!\n建筑师可以在“服务”中设计三种设计蓝图：[GetBuildingType('building_gaudi_almshouse').GetName]、[GetBuildingType('building_gaudi_school').GetName]和[GetBuildingType('building_gaudi_prison').GetName]。\n科技可以解锁部分设计蓝图，也有一部分则需要特定的地区区块。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_SERVICE_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_almshouse').GetName]需研究[GetTechnology('egalitarianism').GetName]。\n[GetBuildingType('building_gaudi_school').GetName]需研究[GetTechnology('empiricism').GetName]。\n[GetBuildingType('building_gaudi_prison').GetName]需研究[GetTechnology('law_enforcement').GetName]。#!"
 MR_ARCHITECT_BLUEPRINTS_HEALTH_BUTTON: "蓝图：卫生机构"
 MR_ARCHITECT_BLUEPRINTS_HEALTH_BUTTON_TT: "#T 蓝图：卫生机构#!\n建筑师可以在“卫生”中设计三种设计蓝图：[GetBuildingType('building_gaudi_canalization').GetName]、[GetBuildingType('building_gaudi_hospital').GetName]和[GetBuildingType('building_gaudi_health').GetName]。\n科技可以解锁部分设计蓝图，也有一部分则需要特定的地区区块。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_HEALTH_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_canalization').GetName]需研究[GetTechnology('modern_sewerage').GetName]。\n[GetBuildingType('building_gaudi_hospital').GetName]需研究[GetTechnology('theiler_microbiology_tech').GetName]。\n[GetBuildingType('building_gaudi_health').GetName]需研究[GetTechnology('pharmaceuticals').GetName]。#!"
 MR_ARCHITECT_BLUEPRINTS_ACADEMY_BUTTON: "蓝图：国家学院"
 MR_ARCHITECT_BLUEPRINTS_ACADEMY_BUTTON_TT: "#T 蓝图：国家学院#!\n建筑师可以在“学院”中设计三种设计蓝图：[GetBuildingType('building_gaudi_science').GetName]、[GetBuildingType('building_gaudi_arts').GetName]和[GetBuildingType('building_gaudi_sports').GetName]。\n科技可以解锁部分设计蓝图，也有一部分则需要特定的地区区块。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_ACADEMY_TRIGGER_TT: "#default_text [GetBuildingType('building_gaudi_science').GetName]需研究[GetTechnology('dialectics').GetName]。\n[GetBuildingType('building_gaudi_arts').GetName]需研究[GetTechnology('romanticism').GetName]。\n[GetBuildingType('building_gaudi_sports').GetName]需研究[GetTechnology('vikelas_international_sports_tech').GetName]。#!"
 mr_gui_has_urban_planning_tech_trigger_tt: "#default_text [GetPlayer.GetName]已研究[GetTechnology('urban_planning').GetName]。#!"
 MR_ARCHITECT_PUBLIC_CONSTRUCTION_BUTTON: "公共建设"
 MR_ARCHITECT_PUBLIC_CONSTRUCTION_BUTTON_TT: "#T 公共建设#!\n建筑师可根据其建筑风格为国家贡献建设点数，推进公共建设进程。连续工作五年后，将获得声望提升。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_CUSTOM_MONUMENT_BLUEPRINT_BUTTON: "建筑师代表作"
 MR_ARCHITECT_CUSTOM_MONUMENT_BLUEPRINT_BUTTON_TT: "#T 建筑师代表作#!\n一位[concept_gaudi_great_architect]能以现代风格设计独一无二的国家纪念碑蓝图。这项毕生杰作将使建筑师名垂青史，并为我国缔造属于世界的建筑奇观。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MODERN_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有一位有#V $gaudi_bauhaus_style$#!、#V $gaudi_neoclassical_style$#!或#V $gaudi_art_deco_style$#![concept_character_trait]的[concept_gaudi_architect]。#!"
 MR_GREAT_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有[concept_gaudi_great_architect]。#!"
 MR_ARCHITECT_URBAN_PLANNING_BUTTON: "城市规划"
 MR_ARCHITECT_URBAN_PLANNING_BUTTON_TT: "#T 城市规划#!\n建筑师可造访国家各城市核心区，通过实施前瞻性规划与建筑法规，显著改善当地发展条件。\n随时间推移，你的建筑将获得修正：$gaudi_urban_building_throughput_add_modifier_with_tooltip$、$gaudi_urban_building_production_mult_modifier_with_tooltip$和$gaudi_urban_building_goods_input_mult_modifier_with_tooltip$。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_URBAN_PLANNING_TRIGGER_TT: "#default_text 至少有一个1级或更高级别的[GetBuildingType('building_urban_center').GetName]，且没有三个[Concept('concept_modifier','$concept_modifiers$')]。#!"
 MR_ARCHITECT_STUDY_TRIP_BUTTON: "建筑师考察之旅"
 MR_ARCHITECT_STUDY_TRIP_BUTTON_TT: "#T 建筑师考察之旅#!\n可选派建筑师离岗进修两年，专攻建筑领域前沿知识与技能。进修期间该建筑师将暂停一切活动。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_NO_TRIP_TRIGGER_TT: "#default_text 建筑师#R 尚未#!进行考察之旅。#!"
 mr_gui_has_modern_sewerage_tech_trigger_tt: "#default_text [GetPlayer.GetName]已研究[GetTechnology('modern_sewerage').GetName]。#!"
 mr_gui_has_steel_frame_buildings_tech_trigger_tt: "#default_text [GetPlayer.GetName]已研究[GetTechnology('steel_frame_buildings').GetName]。#!"
 mr_gui_has_elevator_tech_trigger_tt: "#default_text [GetPlayer.GetName]已研究[GetTechnology('elevator').GetName]。#!"
 mr_gui_has_art_deco_tech_trigger_tt: "#default_text [GetPlayer.GetName]已研究[GetTechnology('elgar_art_deco_tech').GetName]。#!"
 mr_gui_has_neoclassicism_tech_trigger_tt: "#default_text [GetPlayer.GetName]已研究[GetTechnology('elgar_neoclassicism_tech').GetName]。#!"
 mr_gui_has_new_objectivity_tech_trigger_tt: "#default_text [GetPlayer.GetName]已研究[GetTechnology('elgar_new_objectivity_tech').GetName]。#!"
 mr_gui_has_defense_in_depth_tech_trigger_tt: "#default_text [GetPlayer.GetName]已研究[GetTechnology('defense_in_depth').GetName]。#!"
 mr_gui_has_logistics_tech_trigger_tt: "#default_text [GetPlayer.GetName]已研究[GetTechnology('logistics').GetName]。#!"
 MR_ARCHITECT_CAPITAL_EXPANSION_BUTTON: "首都扩展"
 MR_ARCHITECT_CAPITAL_EXPANSION_BUTTON_TT: "#T 首都扩展#!\n崭新的建筑思潮与革新建造技术，将我们的首都从百年前名不见经传的边陲小镇，塑造成了当今举足轻重的世界级大都会。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HISTORICIST_ARCHITECT_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有一位有#V $gaudi_historicism_style$#!、#V $gaudi_bauhaus_style$#!、#V $gaudi_neoclassical_style$#!或#V $gaudi_art_deco_style$#![concept_character_trait]的[concept_gaudi_architect]。#!"
 MR_ARCHITECT_TREATISE_BUTTON: "建筑学著作"
 MR_ARCHITECT_TREATISE_BUTTON_TT: "#T 建筑师著作#!\n建筑师毕生仅可完成一次建筑理论体系的系统总结。该学术成果可能被更卓越的建筑师超越，其水准主要取决于实践经验的深厚程度。进行专著创作期间，建筑师需全年专注研究，不得承接其他项目。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_NO_TREATISE_TRIGGER_TT: "#default_text 建筑师#R 尚未#!著书。#!"
 MR_ARCHITECT_TREATISE_EXPERIENCE_TRIGGER_TT: "#default_text 建筑师的#V 声望#!至少为#p 250#!。#!"
 MR_BETTER_TREATISE_TRIGGER_TT: "#default_text 该建筑师待完成的专著#G 学术价值超越#!前作。#!"
 MR_HAS_ARCHITECTURE_SCHOOL_TT: "#default_text [GetPlayer.GetName]的[GetBuildingType('building_art_academy').GetName]中有#V $pm_artists_arts_academy_school$#!。#!"
