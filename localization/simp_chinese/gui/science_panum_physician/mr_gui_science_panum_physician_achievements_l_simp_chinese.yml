ar('panum_physician_achievement_endoscope_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_ophthalmoscope_inventor_var').IsSet , Scope.Var('panum_physician_achievement_ophthalmoscope_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_chemotherapy_inventor_var').IsSet , Scope.Var('panum_physician_achievement_chemotherapy_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_attended_medical_congress_var').IsSet , Scope.Var('panum_physician_achievement_attended_medical_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_anthrax_disease_var').IsSet , Scope.Var('panum_physician_achievement_anthrax_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_goiter_disease_var').IsSet , Scope.Var('panum_physician_achievement_goiter_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_nephrolithiasis_disease_var').IsSet , Scope.Var('panum_physician_achievement_nephrolithiasis_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_pellagra_disease_var').IsSet , Scope.Var('panum_physician_achievement_pellagra_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_rickets_disease_var').IsSet , Scope.Var('panum_physician_achievement_rickets_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_syphilis_disease_var').IsSet , Scope.Var('panum_physician_achievement_syphilis_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_tetanus_disease_var').IsSet , Scope.Var('panum_physician_achievement_tetanus_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_military_medicine_project_finished_var').IsSet , Scope.Var('panum_physician_achievement_military_medicine_project_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_inaugurated_asylum_var').IsSet , Scope.Var('panum_physician_achievement_inaugurated_asylum_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_basketball_inventor_var').IsSet , Scope.Var('panum_physician_achievement_basketball_inventor_var').GetFlagName)]" #deepl:2197070343
 panum_physician_no_physician_loc: "#V  [concept_panum_physician] #! 的成就，一旦您有了成就，就会显示在这里。" #deepl:3202202811
 panum_physician_achievements_intro_loc: "#V 这位医生的成就#!\n[Scope.GetCharacter.GetFullName] 是一位成功的医生。" #deepl:2011576622

 panum_physician_achievement_successful_treatments_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 医生在治疗病人方面经验丰富，曾成功治疗过#o  [GetPlayer.MakeScope.Var('panum_physician_var').GetVariable('panum_physician_successful_treatments_var').GetValue] 病人#! 。" #deepl:2185896488
 panum_physician_achievement_epidemiologist_loc: "\[Scope.GetCharacter.GetSheHe|U] 广泛研究疾病，并成为#o $panum_epidemiologist$ #! 。" #deepl:1702393838
 panum_physician_achievement_surgeon_loc: "\[Scope.GetCharacter.GetSheHe|U] 进行了许多手术，因此被认为是一个很好的#o $panum_surgeon$ #! 。" #deepl:3171499380
 panum_physician_achievement_psychiatrist_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士对人类心智有着广泛的研究，是著名的#o  $panum_psychiatrist$ #! 。" #deepl:60079648
 panum_physician_achievement_military_physician_loc: "\n 作为#o $panum_military_physician$ #! [Scope.GetCharacter.GetSheHe] 我见过战争的恐怖，知道如何在可怕的环境下对待人们。" #deepl:696092700
 panum_physician_achievement_germ_theory_inventor_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士发明的#o 细菌理论#! 已经挽救了成千上万人的生命。" #deepl:2770995117
 panum_physician_achievement_pneumothorax_inventor_loc: "\[Scope.GetCharacter.GetHerHim] 最伟大的发明之一是#o 人工气胸装置#! 。这将导致肺部塌陷，有助于治疗肺结核。" #deepl:304953214
 panum_physician_achievement_thoracoplasty_inventor_loc: "\得益于[Scope.GetCharacter.GetHerHis] 的外科技术，医生[Scope.GetCharacter.GetLastNameNoFormatting] 发明了一种#o 程序，彻底改变了肺部外科手术，即胸廓成形术#! ，从而改善了肺结核患者的治疗。" #deepl:3014173894
 panum_physician_achievement_attended_medical_congress_loc: "\[Scope.GetCharacter.GetSheHe] 至少参加了一次#o 医学大会#! 并分享了[Scope.GetCharacter.GetHerHis] 的观点。" #deepl:1479296090
 mendelejew_chemist_achievement_aspirin_inventor_loc: "\[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] 博士被认为是#o 阿司匹林#! 的主要发明者，他不仅为无数患者解除了痛苦，还为制药业带来了革命性的变化。" #deepl:2162525717
 panum_physician_achievement_xray_inventor_loc: "\随着#o X 射线的发现#! ，[GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.GetLastNameNoFormatting] 博士被认为是国际领先的物理学家之一，他为医学和物理学带来了同等程度的革命。" #deepl:34275984
 panum_physician_achievement_bloodtypes_inventor_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士发现了不同的#o 血型，即 A、B、AB 和 0#! ，他在确保我们对血液本身有更多了解方面发挥了重要作用，并使输血更加成功。" #deepl:3740473168
 panum_physician_achievement_ecg_inventor_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士发明的#o ECG#! 使测量心电活动成为可能，是医院运作的一个里程碑。" #deepl:2321856106
 panum_physician_achievement_transplantation_inventor_loc: "\#o "首例移植手术 "#! ，[Scope.GetCharacter.GetLastNameNoFormatting] 医生在医学史上赢得了一席之地。" #deepl:2933890993
 panum_physician_achievement_stereotactic_method_inventor_loc: "\时至今日，他发明的#o 立体定向法#! [Scope.GetCharacter.GetSheHe] 仍被认为是脑外科的开创性技术。" #deepl:147308326
 panum_physician_achievement_cardiopulmonary_bypass_inventor_loc: "\随着#o 心肺分流术#! 的问世，[Scope.GetCharacter.GetLastNameNoFormatting] 医生成就了现代医学的一项杰作。" #deepl:3531788201
 panum_physician_achievement_endoscope_inventor_loc: "\[Scope.GetCharacter.GetHerHis|U] 发明的#o 内窥镜#! ，首次对人体内部进行了检查，这一点也特别令人难忘。" #deepl:2202274893
 panum_physician_achievement_ophthalmoscope_inventor_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士发明了一种仪器，使检查眼疾变得更加容易，从而为眼科提供了宝贵的服务：#o #! 。" #deepl:657308744
 panum_physician_achievement_chemotherapy_inventor_loc: "\#o 化疗#! [Scope.GetCharacter.GetSheHe] 研制出的多种药物可治疗最顽固的疾病，即使是癌症患者也能看到希望，并非一切都是徒劳。" #deepl:1291980204
 panum_physician_achievement_iron_lung_inventor_loc: "\n[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetHerHis|U] #o  建造第一个铁肺#! 以维持急需救助的小儿麻痹症患者的生命，被认为是这个时代最引人入胜的工程成就之一。" #deepl:2605796385
 panum_physician_achievement_military_medicine_project_finished_loc: "#o \[Scope.GetCharacter.GetLastNameNoFormatting] 博士发明了野战医疗领域的最新方法#! ，使军队医疗服务成为世界上最知名的医疗服务之一。" #deepl:3753274088
 panum_physician_achievement_inaugurated_asylum_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] 博士在创建该国#o 第一精神病院#! 以向精神病患者提供全面和人道的帮助方面发挥了至关重要的作用。" #deepl:2471346129
 panum_physician_achievement_anthrax_disease_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #o  ，专门研究炭疽病#! ，并开发了有效的预防和治疗方法。" #deepl:2201385397
 panum_physician_achievement_goiter_disease_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #o  专门研究甲状腺肿大#! ，并制定了有效的预防和治疗方法。" #deepl:693298154
 panum_physician_achievement_nephrolithiasis_disease_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #o  ，专门研究肾炎#! ，并制定了有效的预防和治疗方法。" #deepl:3950905505
 panum_physician_achievement_pellagra_disease_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #o  ，专门研究糙皮病#! ，并开发了有效的预防和治疗方法。" #deepl:1987809959
 panum_physician_achievement_rickets_disease_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #o  专门研究佝偻病#! ，并制定了有效的预防和治疗方法。" #deepl:660217329
 panum_physician_achievement_syphilis_disease_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #o  专门研究梅毒#! ，并开发了有效的预防和治疗方法。" #deepl:908555016
 panum_physician_achievement_tetanus_disease_loc: "\[Scope.GetCharacter.GetLastNameNoFormatting] #o  专门研究破伤风#! ，并制定了有效的预防和治疗方法。" #deepl:1982558023
 panum_physician_achievement_basketball_inventor_loc: "\在[Scope.Var('panum_physician_achievement_basketball_inventor_year_var').GetValue|0] 中，[Scope.GetCharacter.GetLastNameNoFormatting] 博士在#o 发明了一项新的团队运动，名为 "篮球"。#!" #deepl:207476415
