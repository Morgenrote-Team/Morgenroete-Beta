l_simp_chinese:
 MR_PHYSICIAN_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'panum_physician_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'panum_physician_no_physician_loc')]"
 panum_physician_achievements_loc: "$panum_physician_achievements_intro_loc$[Scope.GetCharacter.GetCustom('panum_physician_achievement_successful_treatments_type')][Scope.GetCharacter.GetCustom('panum_physician_achievement_epidemiologist_type')][Scope.GetCharacter.GetCustom('panum_physician_achievement_surgeon_type')][Scope.GetCharacter.GetCustom('panum_physician_achievement_psychiatrist_type')][Scope.GetCharacter.GetCustom('panum_physician_achievement_military_physician_type')][AddLocalizationIf( Scope.Var('panum_physician_achievement_germ_theory_inventor_var').IsSet , Scope.Var('panum_physician_achievement_germ_theory_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_pneumothorax_inventor_var').IsSet , Scope.Var('panum_physician_achievement_pneumothorax_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_thoracoplasty_inventor_var').IsSet , Scope.Var('panum_physician_achievement_thoracoplasty_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_bloodtypes_inventor_var').IsSet , Scope.Var('panum_physician_achievement_bloodtypes_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_ecg_inventor_var').IsSet , Scope.Var('panum_physician_achievement_ecg_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_transplantation_inventor_var').IsSet , Scope.Var('panum_physician_achievement_transplantation_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_stereotactic_method_inventor_var').IsSet , Scope.Var('panum_physician_achievement_stereotactic_method_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_cardiopulmonary_bypass_inventor_var').IsSet , Scope.Var('panum_physician_achievement_cardiopulmonary_bypass_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_endoscope_inventor_var').IsSet , Scope.Var('panum_physician_achievement_endoscope_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_ophthalmoscope_inventor_var').IsSet , Scope.Var('panum_physician_achievement_ophthalmoscope_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_chemotherapy_inventor_var').IsSet , Scope.Var('panum_physician_achievement_chemotherapy_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_attended_medical_congress_var').IsSet , Scope.Var('panum_physician_achievement_attended_medical_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_anthrax_disease_var').IsSet , Scope.Var('panum_physician_achievement_anthrax_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_goiter_disease_var').IsSet , Scope.Var('panum_physician_achievement_goiter_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_nephrolithiasis_disease_var').IsSet , Scope.Var('panum_physician_achievement_nephrolithiasis_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_pellagra_disease_var').IsSet , Scope.Var('panum_physician_achievement_pellagra_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_rickets_disease_var').IsSet , Scope.Var('panum_physician_achievement_rickets_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_syphilis_disease_var').IsSet , Scope.Var('panum_physician_achievement_syphilis_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_tetanus_disease_var').IsSet , Scope.Var('panum_physician_achievement_tetanus_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_military_medicine_project_finished_var').IsSet , Scope.Var('panum_physician_achievement_military_medicine_project_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_inaugurated_asylum_var').IsSet , Scope.Var('panum_physician_achievement_inaugurated_asylum_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_basketball_inventor_var').IsSet , Scope.Var('panum_physician_achievement_basketball_inventor_var').GetFlagName)]"
 panum_physician_no_physician_loc: "当你拥有一位[concept_panum_physician]后，其#V 成就#!将会展示在此处。"
 panum_physician_achievements_intro_loc: "#V 该医生的成就#!\n#indent_newline:3 ※[Scope.GetCharacter.GetFullName]是一位成功的医生。#!"
 panum_physician_achievement_successful_treatments_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]医生在治疗患者方面经验丰富，已经成功治疗了#o [GetPlayer.MakeScope.Var('panum_physician_var').GetVariable('panum_physician_successful_treatments_var').GetValue]位病患。#!#!"
 panum_physician_achievement_epidemiologist_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]深入研究了疾病，并成为一名#o $panum_epidemiologist$#!#!"
 panum_physician_achievement_surgeon_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]操刀多次手术，最终成为一名有名的#o $panum_surgeon$#!#!"
 panum_physician_achievement_psychiatrist_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士对人类思维进行了深入的研究，是一位著名#o $panum_psychiatrist$#!#!"
 panum_physician_achievement_military_physician_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe]身为#o $panum_military_physician$#!在战场上历练多年，知晓如何在可怕的环境下救治他人。#!"
 panum_physician_achievement_germ_theory_inventor_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士发明了#o 细菌理论#!，它已经拯救了数千人的生命。#!"
 panum_physician_achievement_pneumothorax_inventor_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetHerHim]发明了#o 人工气胸#!，使胸腔内的积气排出，以恢复正常肺功能的装置，这有助于对抗结核病。#!"
 panum_physician_achievement_thoracoplasty_inventor_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]医生发明了一种名为#o 胸廓成形术#!的手术技巧，进一步改善了结核病患者的治疗。#!"
 panum_physician_achievement_attended_medical_congress_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe|U]不止一次的参加了#o 医学大会#!，并在上面分享了[Scope.GetCharacter.GetHerHis]的想法#!"
 mendelejew_chemist_achievement_aspirin_inventor_loc: "\n#indent_newline:3 ※[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting]博士被认为是#o 阿司匹林#!的主要发明者，这一发明不仅为无数患者缓解了疼痛，还彻底改变了制药行业。#!"
 panum_physician_achievement_xray_inventor_loc: "\n#indent_newline:3 ※[GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.GetLastNameNoFormatting]博士发现了#o X光#!因此被认为是国际前沿的物理学家之一，对医学和物理学做出了同等程度的革命。#!"
 panum_physician_achievement_bloodtypes_inventor_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士发现了#o 不同血型#!，为血液以及使输血方面发挥了重要作用。#!"
 panum_physician_achievement_ecg_inventor_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士发明了一种可以测量心脏的电活动的设备——#o 心电图#!，是医学的一个里程碑。#!"
 panum_physician_achievement_transplantation_inventor_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士凭借#o 首例移植手术#!在医学史上赢得了一席之地。#!"
 panum_physician_achievement_stereotactic_method_inventor_loc: "\n#indent_newline:3 ※时至今日，[Scope.GetCharacter.GetSheHe]发明的#o 立体定向脑外科手术#!仍被认为是脑外科手术领域的突破性成果。#!"
 panum_physician_achievement_cardiopulmonary_bypass_inventor_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士发明#o 心肺旁路技术#!，使得现代医学进一步发展。#!"
 panum_physician_achievement_endoscope_inventor_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetHerHis|U]发明的#o 内窥镜#!使得人类第一次可以检查人体内部。#!"
 panum_physician_achievement_ophthalmoscope_inventor_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士发明了一种可以更容易地检查眼部疾病的仪器——#o 检眼镜#!，从而发展了眼科技术。#!"
 panum_physician_achievement_chemotherapy_inventor_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetSheHe]用多种药物组合治疗的#o 化疗#!手段，给癌症患者带来了希望。#!"
 panum_physician_achievement_iron_lung_inventor_loc: "\n#indent_newline:3 ※[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetHerHis|U]打造的#o 第一台铁肺#!，为生命垂危的脊髓灰质炎患者提供了至关重要的支持，堪称这个时代最令人叹为观止的工程壮举之一。#!"
 panum_physician_achievement_military_medicine_project_finished_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士发明了#o 野战医疗#!，使军事医疗服务成为世界上最受认可的服务之一。#!"
 panum_physician_achievement_inaugurated_asylum_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士首次创办了#o 精神病院#!的，为精神病患者提供全面且人道的帮助。#!"
 panum_physician_achievement_anthrax_disease_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士专门研究#o 炭疽病#!，并开发出有效的预防和治疗方法。#!"
 panum_physician_achievement_goiter_disease_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士专门研究#o 甲状腺肿大#!，并开发了有效的预防和治疗方法。#!"
 panum_physician_achievement_nephrolithiasis_disease_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士专门研究#o 肾结石#!，并开发出有效的预防和治疗方法。#!"
 panum_physician_achievement_pellagra_disease_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士专门研究#o 糙皮病#!，并开发出有效的预防和治疗方法。#!"
 panum_physician_achievement_rickets_disease_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士专门研究#o 佝偻病#!，并开发出有效的预防和治疗方法。#!"
 panum_physician_achievement_syphilis_disease_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士专门研究#o 梅毒#!，并开发出有效的预防和治疗方法。#!"
 panum_physician_achievement_tetanus_disease_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士专门研究#o 破伤风#!，并开发出有效的预防和治疗方法。#!"
 panum_physician_achievement_basketball_inventor_loc: "\n#indent_newline:3 ※[Scope.GetCharacter.GetLastNameNoFormatting]博士于[Scope.Var('panum_physician_achievement_basketball_inventor_year_var').GetValue|0]年发明了一项名为#o 篮球#!的团队运动#!"