 manzoni.1001.t: "《霍比特人：去而复归》"
 manzoni.1001.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]的作品很快登上了畅销榜首。这本书主要讲述了一个霍比特人在[SCOPE.sCharacter('manzoni_writer_scope').GetLastName]创作的奇幻世界中冒险的经历。希望[SCOPE.sCharacter('manzoni_writer_scope').GetSheHe]能创作更多中土世界的故事！"
 manzoni.1001.f: "“在一个地洞里，住着一个半身人。这不是一个讨厌的、肮脏的、潮湿的洞，也不是一个干燥的、光秃秃的、沙子的洞，洞里面充满了虫子的尾巴和油腻的气味，里面有一些东西可以坐下来，也有很多食物。那是一个半身人的洞，那意味着舒适。”\n"
 manzoni.1001.g: "[SCOPE.sCharacter('manzoni_writer_scope').GetSheHe]创造了一个多么奇妙的世界啊！"
 manzoni.1002.t: "《世界大战》"
 manzoni.1002.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]所著的《世界大战》是一部关于外星人驾驶三足战争机器入侵地球的科幻小说，并留下人类将获胜还是毁灭的悬念？"
 manzoni.1002.f: "“这不是战争，”炮兵说“这从来就不是战争！简直就是人类和蚂蚁之间戏弄一样。”\n"
 manzoni.1002.g: "真的有外星入侵者吗？"
 manzoni.1100.t: "《海蒂》"
 manzoni.1100.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]创作了一个关于孤儿女孩的故事，她和她的祖父一起住在“阿尔卑斯山”。经过一段艰难的开始，海蒂和她的祖父建立了深厚的感情，他们一起快乐地生活。但是他们很快就被分开了，因为海蒂不得不搬到法兰克福去和克拉拉·施特雷斯曼——一个商人的女儿一起住。她还能再见到她的祖父吗？"
 manzoni.1100.f: "“我如山羊般步履轻盈的四处游荡。”"
 manzoni.1101.t: "《人靠衣装》"
 manzoni.1101.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]并非一个无名之辈。他出版了《绿衣亨利》和《塞尔德维拉的人们》等作品。他的最新故事《人靠衣装》是《塞尔德维拉的人们》第二部分中的一个故事。讲述了一个小裁缝擅作主张，把客户定制的衣服按照自己的尺寸裁剪，雇主很愤怒地解雇了他。当他到达戈尔达赫村时，人们以为他是一个贵族，因为他乘坐马车，穿着奢华的衣服，还有修剪整齐的胡子。由于他很害羞，他没有澄清误会。人们会发现他的秘密吗？"
 manzoni.1101.f: "“当一个王子占有土地和人民，当一个牧师没有信念地宣讲教义，却以尊严享受他的闲职果实，当一个自负的教师享有教育职位的荣誉和利益，却丝毫不考虑他的学问的重要性，也不推进它，当一个艺术家通过轻浮的交易和空洞的把戏获得名声，偷走那些诚实劳动者的面包和声誉，或者当一个骗子继承或通过欺诈获得一个大商业家的名字，然后分掉成千上万的储蓄时，这些人都不会为他们的前景哭泣，而是为他们的好运感到高兴，每晚都有愉快的伙伴和好友。”\n"
 manzoni.1102.t: "《佃户乌利》"
 manzoni.1102.d: "瑞士牧师阿尔伯特·比齐乌斯以“[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]”为笔名出版了他的小说《佃户乌利》。这是戈特赫尔夫的典型作品，以佃户乌利（乌尔里克）为主角，讲述了他如何克服自己的懒散，并找到人生的意义。为了达到这个目标，他需要多个榜样，并且遵从不同的权威人物。"
 manzoni.1102.f: "“听着，乌利，”主人说，“这样下去不行，你太野了，你的胡闹太频繁了；我不想把我的马和牛交给一个脑袋里装满面包或酒的人，我不能让这样的人拿着灯笼进马厩，尤其是如果他像你一样胖，已经有太多房子被搞成那样了。我不知道你在想什么，也不知道你要干什么。”乌利回答说他还没想过什么，他一直在做他的工作，没人需要替他做，也没人为他喝的东西付钱；他喝的东西是他自己的事，他喝的是他自己的钱。“但你是我的仆人，”主人回答道。\n"
 manzoni.1103.t: "《荒原狼》"
 manzoni.1103.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]在巴塞尔期间创作了他的最新作品《荒原狼》并出版了，已经以他的其他作品如《悉达多》而闻名。在他的最新故事中，中年人哈里·哈勒尔对资产阶级社会感到不满。他甚至考虑过自杀，但是遇到了年轻的赫敏和她的同事，改变了他的生活。赫敏不会被认为是最好的影响，因为她有时会卖淫，但她可以帮助哈里体验他以前不知道的事情，释放他内心的“荒原狼”。"
 manzoni.1103.f: "“我一直以来最痛恨、最厌恶、最诅咒的，就是这种满足，这种健康和舒适，这种中产阶级小心翼翼保持的乐观，这种肥胖而繁荣的平庸之辈。”\n"
 manzoni.1104.t: "《阿尔伯特史》"
 manzoni.1104.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]出版了他的最新作品《阿尔伯特史》，这不是一本传统意义上的书，通篇由图片和简短的文字组成。故事以漫画的形式讲述了日内瓦动荡的年代中一位年轻人试图找到自己的方向，但最终成为激进分子的故事。"
 manzoni.1104.f: "“用敌人污秽的血，\n灌溉我们的农田！\n灌溉我们的农田！”\n"
 manzoni.1105.t: "《山顶恐惧》"
 manzoni.1105.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]在瑞士阿尔卑斯山创作了一部文学巨著。[SCOPE.sCharacter('manzoni_writer_scope').GetSheHe]探讨了恐惧对我们的影响。一些评论家认为《山顶恐惧》一书反映了[GetPlayer.GetNameNoFormatting]的动荡。"
 manzoni.1105.f: "“太阳不见了。只有一个巨大的阴影笼罩着我们，然后我们看到它在我们身后迅速爬上山坡，先是草坡，然后是第一块岩石；与此同时，事物的面貌发生了变化，一切的颜色甚至气候都变了。”\n"
 manzoni.1105.g: "恐惧对我们有什么影响？"
 manzoni.1400.t: "《八十天环游地球》"
 manzoni.1400.d: "《八十天环游地球》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]写就的又一本佳作。菲利斯·福格与人打赌能否在八十天内环绕地球，为此，他与仆人万事通踏上了一次伟大的冒险之旅，途径多国，并最终获胜。"
 manzoni.1400.f: "“但凡人能想象到的事物，必定有人能将它实现。”\n——儒略·凡尔纳，《八十天环游地球》"
 manzoni.1400.g: "我想，或许未来我们能在一天里走遍世界？"
 manzoni.1401.t: "《人间喜剧》"
 manzoni.1401.d: "《人间喜剧》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]撰写的多卷本相互关联的故事集。通过这些故事，[SCOPE.sCharacter('manzoni_writer_scope').GetLastNameNoFormatting]试图让我们了解彼时法国人民的日常生活。"
 manzoni.1401.f: "“人不可能一直做坏事，即使是在海盗的船上，也总会有一些甜蜜的时刻，让你感觉仿佛置身于一艘游艇上。”\n——奥诺雷·德·巴尔扎克，《人间喜剧》"
 manzoni.1401.g: "所以，普通人在法兰西是怎么生活的？"
 manzoni.1402.t: "《三个火枪手》"
 manzoni.1402.d: "《三个火枪手》此书描写了达达尼昂与三位火枪手兼挚友——阿托斯、阿拉密斯与波尔多斯——在路易十三统治时期的冒险故事。这本[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]创作的小说在短短几天内就已经声名鹊起了。"
 manzoni.1402.f: "“无赖的笑声与诚实人的笑声不同；伪君子的眼泪也与真诚人的眼泪不同。所有的虚伪都是一张面具；无论这张面具做得多么精致，只要稍加注意，我们总能将它与真实的面孔区分开来。”\n——亚历山大·仲马，《三个火枪手》"
 manzoni.1402.g: "我为人人，人人为我！"
 manzoni.1500.t: "《乌鸦》"
 manzoni.1500.d: "《乌鸦》是 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]创作的一首叙事诗。诗中描述一个男子在失去心爱的恋人后，在一个冬夜遇到一只乌鸦，乌鸦反复说出“永不再”。"
 manzoni.1500.f: "从前一个阴郁的子夜，我独自沉思，慵懒疲竭，\n沉思许多古怪而离奇、早已被人遗忘的传闻——\n当我开始打盹，几乎入睡，突然传来一阵轻擂，\n仿佛有人在轻轻叩击，轻轻叩击我的房门。\n“有人来了，”我轻声嘟喃，“正在叩击我的房门——\n唯此而已，别无他般。”\n"
 manzoni.1500.g: "一个何等悲哀的人啊……"
 manzoni.1600.t: "《尼尔斯骑鹅旅行记》"
 manzoni.1600.d: "《尼尔斯骑鹅旅行记》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]创作的一本儿童读物。书中尼尔斯·霍尔格森被变成了了一个小矮人，并因此获得了与动物交谈的能力。之后他就与家鹅马丁随着一群野雁周游瑞典各地，在整个旅程中，尼尔斯改掉了自己欺负动物的缺点，培养了自己的优秀品德"
 manzoni.1600.f: "“那孩子没什么用处。他最大的乐趣就是吃和睡；除此之外，他最喜欢的就是捣乱。”\n"
 manzoni.1600.g: "听上去这是一次多么不可思议的的旅行啊！"
 manzoni.1700.t: "《变形记》"
 manzoni.1700.d: "《变形记》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]所写的小说，故事中主人公格里高尔·萨姆沙在一家公司任旅行推销员，长年奔波在外，辛苦支撑着整个家庭的花销。当萨姆沙还能以微薄的薪金供养他那薄情寡义的家人时，他是家中受到尊敬的长子，父母夸奖他，妹妹爱戴他。当有一天他变成了甲虫，丧失了劳动力，对这个家再也没有物质贡献时，家人一反之前对他的尊敬态度，逐渐显现出冷漠、嫌弃、憎恶的面孔。父亲恶狠狠地用苹果打他，母亲吓得晕倒，妹妹厌弃他。渐渐地，萨姆沙远离了社会，最后孤独痛苦地在饥饿中默默地死去。"
 manzoni.1700.f: "“多么悲惨的命运：被迫在一个公司工作，在那里，稍有疏忽就会引起最严重的怀疑！难道所有员工都是一群无赖吗？难道其中没有一个忠诚敬业的人，他如果早上浪费了公司一个小时的时间，会被良心折磨得发疯，甚至无法起床吗？”\n"
 manzoni.1700.g: "令人反感的地方！"
 manzoni.1701.t: "《没有个性的人》"
 manzoni.1701.d: "《没有个性的人》由[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]创作，故事发生在第一次世界大战前夕的维也纳，这部思想小说讲述了乌尔里希的故事，他曾是一名士兵和学者，也曾是一名骗子和怀疑论者，他发现自己被卷入了弗朗茨·约瑟夫皇帝在位70周年庆典的宏伟计划中。"
 manzoni.1701.f: "“一个好图书管理员的秘诀在于，他从不阅读他所管理的书籍的内容，最多只看书名和目录。任何放任自己开始读书的图书管理员都会迷失方向……他注定会失去全局观。”\n"
 manzoni.1701.g: "令人反感的地方！"
 manzoni.1702.t: "《人类群星闪耀时》"
 manzoni.1702.d: "《人类群星闪耀时》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]所写的故事系列集，共收入他的历史特写14篇，分别向我们展现了14个决定世界历史的瞬间：巴尔沃亚眺望水天一色的太平洋、千年帝国拜占庭的陷落、亨德尔奇迹的精神复活、马赛曲神佑般的创作、滑铁卢的一分钟、老年歌德热恋的悲歌、黄金国的发现、 英雄的瞬间、飞越大洋的一次通话、逃向上帝、南极探险的斗争、封闭的列车、西塞罗、威尔逊的梦想与失败。而这14个历史瞬间神奇地降临到14位传主的身上，他们或是被命运高高举起，送入英雄们的殿堂；或是被狠狠嘲弄，抛入千秋遗恨的行列。当强烈的个人意志与历史宿命碰撞之际，火花闪烁，那样的时刻从此照耀着人类文明的天空。"
 manzoni.1702.f: "“此刻，巴尔博亚命令船员停下。没有人应该跟随他，因为他不想与任何人分享这第一次看到未知海洋的时刻。他希望自己是第一个，也是唯一一个西班牙人，第一个欧洲人，第一个基督徒，在穿越了我们宇宙中那浩瀚的大西洋之后，现在也看到了另一个，仍然未知的太平洋。瓦斯科·努涅斯·德·巴尔博亚看啊看，骄傲而幸福地意识到，他的眼睛是第一个反映出这片海洋无限蓝色的欧洲人的眼睛。”\n——斯特凡·茨威格，《人类的群星闪耀时刻》"
 manzoni.1702.g: "令人反感的地方！"
 manzoni.1800.t: "《小美人鱼》"
 manzoni.1800.d: "《小美人鱼》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]所写的故事，讲述的美人鱼被吸引到陆地上的故事。海王的小女儿从死亡线上拯救了一位王子，并爱上了他。她用自己的尾巴和双腿换取王子的双腿，希望能让王子爱上自己，她的故事会有美好的结局吗？"
 manzoni.1800.f: "“我知道你想要什么。这对你来说非常愚蠢，但你会如愿以偿，这会给你带来悲伤，我美丽的小公主。”\n"
 manzoni.1800.g: "等等，她的名字不是爱丽儿？！"
 manzoni.1900.t: "《德古拉》"
 manzoni.1900.d: "作者[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]笔下的《德古拉》以书信、日记、电报、报纸通讯等形式，时空交叉描写了一个吸血鬼的施暴和灭亡的故事。在故事中，吸血鬼德古拉暴虐无边，遭到一群吸血鬼猎人的追杀。猎人们能否幸存下来，德古拉是否会继续纠缠人类？"
 manzoni.1900.f: "“你难道不认为有些事情你无法理解，但它们确实存在；有些人能看到别人看不到的东西？但是有些古老和新的事物不应被人类的眼睛所注视，因为他们知道——或者认为他们知道——一些别人告诉他们的事情。啊，这是我们科学的错误，它想解释一切；如果解释不了，它就说没有什么可解释的。”\n"
 manzoni.1900.g: "我得去买点大蒜了……"
 manzoni.2000.t: "《马格斯·哈弗拉尔》"
 manzoni.2000.d: "《马格斯·哈弗拉尔》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]对荷兰在印度尼西亚殖民制度的反思而作的小说。在这本书中，主人公揭示了殖民体系的无能和腐败，同时预见到了对资产阶级体制的弊端，并对其进行了讽刺。"
 manzoni.2000.f: "“全世界的良知都在呼喊，反对欧洲商人王公贵族们施加的这种残酷暴政。”\n——爱德华·道维斯·德克尔（笔名：穆尔塔图里），《马格斯·哈弗拉尔》"
 manzoni.2000.g: "这听起来太可怕了！我们得做点什么！"
