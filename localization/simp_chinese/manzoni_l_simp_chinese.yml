 manzoni_je_freedom_of_the_press: "新闻自由"
 manzoni_je_freedom_of_the_press_reason: "受一种不可抑制的意志驱使或仅仅因为自己所属的政党未执政——出版商已多次挑战政府。在这样的时期，新闻自由比以往任何时候都更为重要。\n\n当出版公司的[concept_executive]属于#R 非执政#!的利益集团时，“新闻自由”机制便会触发，并将从事反对派工作。"
