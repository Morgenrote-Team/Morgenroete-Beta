 manzoni.902.g: "卢卡终归吾等。"
 manzoni_italian_irredenta_decision: "尚未收复的意大利"
 manzoni_italian_irredenta_decision_desc: "历史上，达尔马提亚、伊奥尼亚群岛、马耳他和科西嘉岛是意大利祖国的一部分。科西嘉岛属于热那亚，马耳他岛属于西西里，达尔马提亚和伊奥尼亚群岛是威尼斯的一部分，并且当地意大利人社区仍然存在。在我们国家的光荣统一和我们取得的巨大进步之后，是时候收回最后仍在外国统治下的意大利领土了。Viva Italia, viva l'esercito! Va fuori, stranier'!（意大利万岁，军队万岁！外国人滚出去！）"
 united_italian: "意大利"
 je_manzoni_italianization: "意大利化"
 je_manzoni_italianization_reason: "在意大利统一后，马西莫·达泽利奥说过：“我们已经缔造了意大利，现在我们必须铸就意大利民族。”即使这句话在历史上有争议，但它仍然道出了一个事实，那就是意大利在政治上实现统一后，内部的团结却远非稳固。这不仅适用于南方，那里经常土匪横行——甚至在北方，除了资产阶级精英之外，大多数人仍然感觉自己与地方身份有着紧密的联系。联合作战、联合兵役、国家教育制度和国家机构（如兵营、军港和行政设施）的建设，有望在未来几年内，通过艰苦的国家统一过程，确保形成一个更加牢固的全意大利的认同感。"
 manzoni_italian_consiousness_capital_tt: "我们首都的北意大利人和南意大利人将成为一个意大利民族。这里将变成意大利人的家园。我们的主流文化将转变为意大利，并且可以开始全国上下的意大利化。"
 je_manzoni_italianization_goal: "#O 民族认同进度#!达到#G 250#!."
 je_manzoni_italianization_ai: "意大利化"
 je_manzoni_italianization_ai_reason: "在意大利统一后，马西莫·达泽利奥说过：“我们已经缔造了意大利，现在我们必须铸就意大利民族。”即使这句话在历史上有争议，但它仍然道出了一个事实，那就是意大利在政治上实现统一后，内部的团结却远非稳固。这不仅适用于南方，那里经常土匪横行——甚至在北方，除了资产阶级精英之外，大多数人仍然感觉自己与地方身份有着紧密的联系。联合作战、联合兵役、国家教育制度和国家机构（如兵营、军港和行政设施）的建设，有望在未来几年内，通过艰苦的国家统一过程，确保形成一个更加牢固的全意大利的认同感。"
 je_manzoni_italianization_ai_goal: "#O 民族认同进度#!达到#G 250#!."
 je_manzoni_italian_national_identity: "意大利认同"
 je_manzoni_italian_national_identity_reason: "经过几次改革与长时间共存后，意大利民族认同在普通民众中日益蔓延。无论国家如何制定正确的框架，这种认同都会在有政府行政机构、大学、军营或海军基地等服务完善的地区蔓延，整合地区更有可能形成意大利认同。城市化程度高的地区更有可能接触到以前只有知识分子才研究的概念。在这种情况下，每年都会有一个省份采用新的身份认同。如果国家内的所有意大利人都有这种认同，那么这也会影响到国外的意大利人，他们会日益觉得自己是我们的同胞，而不是伦巴第人、西西里人或托斯卡纳人。"
 manzoni.911.t: "[SCOPE.sState('united_italian_culture_state').GetName]的意大利意识"
 manzoni.911.d: "经过多年的社会和政治影响，[SCOPE.sState('united_italian_culture_state').GetName]的人民已经对整个意大利半岛产生了归属感，他们现在完全倾向于泛意大利认同。"
 manzoni.911.f: "意大利人想要建立一个新的意大利，却又想保持他们过去的古意大利人身份，带着他们从古代就继承下来的恐惧和道德困境；因为他们只想着改革意大利，却没有人意识到要实现这一目标，他们必须先改变自己。”——马西莫·达泽利奥"
 manzoni.911.g: "马基雅维利的古老梦想成为了现实！"
 manzoni_italian_consiousness_tt: "当地的南北意大利人口成为意大利人，南北意大利本土也将转变为意大利本土。"
 manzoni.912.t: "泛意大利意识"
 manzoni.912.d: "现在，意大利全体人民不再以地区来认同自己的身份，而把自己当做整个意大利的一员，这不仅对意大利意义深远，对世界亦然。"
 manzoni.912.f: "随着意大利民族国家的建立和泛意大利意识融合的加强，那些在境外，无论是移民还是出生在异国他乡的意大利人，也将自己视为意大利的一员。"
 manzoni.912.g: "我们已经创造了意大利人！"
 manzoni_pan_italian_identity_tt: "在世界范围内，南意大利与北意大利人群都将视自己为泛意大利的一员。其本土也将成为意大利本土。"
 manzoni.913.d: "现在，意大利全体人民不再以地区来认同自己的身份，而把自己当做整个意大利的一员，这不仅对意大利意义深远，对世界亦然。在我们国内也产生了一种认同意大利身份的潮流，而非像之前那样仅仅指向地域性的血统。"
 manzoni.913.g: "你的意思是西西里的渔夫和特伦蒂诺的牧羊人之间没有区别吗？"
 rule_manzoni_united_cultures_rule: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon!#!文化融合"
 setting_manzoni_united_cultures_rule: "文化融合：#G 启用#!"
 setting_manzoni_united_cultures_rule_desc: "意大利化、德意志化和瑞士化可用：独立文化可以合并为意大利、德意志和瑞士文化。这可以提高游戏过程中的性能，但可能导致与其他模组不兼容。"
 setting_manzoni_no_united_cultures_rule: "文化融合：#R 禁用#!"
 setting_manzoni_no_united_cultures_rule_desc: "意大利化、德意志化和瑞士化#R 不可用#!。这提高了与其他模组的兼容性，但可能影响游戏性能。"
 manzoni_brigants_modifier: "土匪"
 manzoni_anti_regionalism_ig_modifier: "反地方主义"
 manzoni_anti_regionalism_country_modifier: "反地方主义"
 manzoni_linguistic_impurity_modifier: "语言不纯正"
 manzoni_no_foscolo_modifier: "拒绝福斯科洛"
 manzoni.914.t: "[SCOPE.sCharacter('manzoni_character_scope').GetLastName]支持意大利事业"
 manzoni.914.d: "随着泛意大利认同的呼声日益高涨，[SCOPE.sCharacter('manzoni_character_scope').GetFullName]已完全认同复兴运动的理想。他认为自己的出身是次要的，并强调自己的意大利民族身份。"
 manzoni.914.f: "即使在意大利统一之前，知识精英们也大多自我认同为意大利人，而将地方出身视为乡间风俗。从统一的那一刻起，这种意识特别在意大利军队中传播开来——陆军和海军成为了“国家的学校”。在政治领域，中央集权派很早就战胜了地方主义势力。"
 manzoni.914.g: "守着家乡的钟楼的时代结束了。"
 manzoni.915.t: "[SCOPE.sState('manzoni_brigant_state').GetName]的强盗"
 manzoni.915.d: "[SCOPE.sState('manzoni_brigant_state').GetName]的恶劣条件使得越来越多人加入了[SCOPE.sCharacter('manzoni_brigant_character').GetFullName]团伙。这群土匪的肆意妄为已经成为周围地区的一个大麻烦。但就如此也有普通民众支持他们，民众们认为他们是政府和意大利化的反对者，也是政党和地区上的抵抗者。"
 manzoni.915.f: "自古以来，意大利南部就存在着各种形式的强盗活动。但是，它们从袭击随机旅客的歹徒，演变成了政治抵抗运动的形式。1861年，撒丁王国（后来的意大利王国）征服了两西西里王国后，该地区最著名和最广为人知的强盗活动兴起了。强盗们来自各行各业，有着不同的动机；他们中既有意大利政府视为普通罪犯的前囚犯、土匪等，也有前士兵和波旁王朝的忠实拥护者。他们不仅对意大利当局和占有土地的上层阶级发动攻击，而且对普通百姓也毫不留情，经常洗劫村庄、城镇和农场，对个人和团体，无论是农民、城镇居民还是敌对的强盗团伙，进行武装抢劫。"
 manzoni.915.g: "又是这些打着行侠仗义口号的强盗！"
 manzoni.916.t: "对地区传统的恐惧"
 manzoni.916.d: "[SCOPE.sState('manzoni_regionalist_state').GetName]的普通民众担心新的意大利政府和意大利语普及会破坏他们的传统。[SCOPE.sCharacter('manzoni_rural_leader_scope').GetFullName]认为不该忽略当地传统，意大利文化的同质化太过了。"
 manzoni.916.f: "在1848/1849年的革命失败后，新教宗党这一意大利统一运动的领导力量，就实际上失去了影响力。他们最初主张在教宗的同侪之首的领导下，建立一个联邦制的意大利。作为回应，中央集权的势力获得了绝对的优势——这一现象一直延续到20世纪。地方的敏感性不再被考虑，相反，地方的情感被视为危险的倾向，可能破坏意大利的统一努力。"
 manzoni.916.g: "[SCOPE.sState('manzoni_regionalist_state').GetName]和其他地区一样，也是意大利的地区。"
 manzoni.916.h: "我们应该考虑到这些特色传统。"
 manzoni.917.t: "方言还是语言？"
 manzoni.917.d: "为了推广意大利语在公共机构和日常生活中的应用，我们国家的主要教师、讲师和教授们都表达了支持。这将对新意大利的科学和政治进程有着重要的改善作用——然而，这项要求在普通民众，特别是农村人口中却遭到了强烈的反对，因为他们仍旧坚持只使用方言交流。"
 manzoni.917.f: "在18世纪，意大利半岛上的各种语言都是独立的语言，这一点毫无疑问。托斯卡纳语因为但丁·阿利吉耶里而声望卓著，但并非唯一。威尼斯语是威尼斯共和国的官方和书面语言，卡洛·哥尔多尼的戏剧和其他文学作品都是用威尼斯语写成的，而且威尼斯语在亚得里亚海地区也是一种重要的通用语言。那不勒斯语也有类似的地位。然而，到了19世纪，人们普遍认为意大利只有一种标准的语言变体，而其他的都是方言——即使北部的意大利语已经具有了特殊的语言特征。但随着政治运动的发展，现实越来越明显：语言和方言的区别在于，前者拥有海军和陆军。"
 manzoni.917.g: "我们多样性的语言就是我们的声誉。"
 manzoni.917.h: "把意大利语说清楚。其他都是方言。"
 manzoni.918.t: "福斯科洛的命运"
 manzoni.918.d: "随着民族情绪愈演愈烈，人们呼吁着将属于意大利的伟大诗人乌戈·福斯科洛的遗蜕从英国运回意大利，让其落叶归根。"
 manzoni.918.f: "“新生的意大利国家需要寻找自己的标志：不仅有历史事件，还有历史人物。他们早就有了一个想法，要仿造帕特农神庙，建立一个纪念艺术家、科学家和其他伟大人物的陵墓，就像法国那样（指先贤祠）。佛罗伦萨的圣十字教堂，曾是杰出公民的安息之地，似乎很适合这个目的。像马基雅维利、米开朗基罗和伽利略这样的人物，已经不仅仅是托斯卡纳的骄傲，而是整个意大利的荣耀。”——乌戈·福斯科洛，一位出生在扎金索斯岛的威尼斯诗人，生活在动荡的年代，被视为早期意大利自由主义和民族主义的代表人物。他无疑是这个意大利思想家画廊的完美补充。可惜的是，福斯科洛于1827年在流亡中去世——在伦敦郊区的特纳姆格林。"
 manzoni.918.g: "让他们把福斯科洛交给我们。"
 manzoni.918.h: "如果他们拒绝会显得我们很尴尬。"
 manzoni.919.d: "意大利政府要求将意大利的著名诗人、民族主义斗士乌戈·福斯科洛的遗蜕交还于他们。"
 manzoni.919.g: "他们应该有自己的小诗人。他叫什么名字？"
 manzoni.919.h: "福斯科那家伙留在这里。"
 manzoni.920.t_foscolo: "福斯科洛归来"
 manzoni.920.d_foscolo: "大不列颠的政府已经同意意大利将乌戈·福斯科洛的遗蜕送回意大利的国土，并将其安置在圣十字教堂永眠。"
 manzoni.920.f_foscolo: "乌戈·福斯科洛的归国被视为年轻的意大利国家的一个重要转折点。福斯科洛受到了热烈的欢迎，他的葬礼就像一场盛大的游行——人们为他哭泣和欢呼。在佛罗伦萨的圣十字教堂里，一个意大利民族主义的象征被建立起来，人们可以以此为指引。意大利的英雄们成为了这种思想的核心，而不是天主教的圣徒。"
 manzoni.920.g: "意大利的伟人归乡了！"
 manzoni.920.t_no_foscolo: "福斯科洛仍然流亡海外"
 manzoni.920.d_no_foscolo: "很不幸，该死的约翰牛虚与委蛇的找个各种理由阻扰乌戈·福斯科洛回归意大利。"
 manzoni.920.f_no_foscolo: "他们如此的狗眼看人低，居然把这位伟大的意大利诗人叫做“福斯科洛那家伙”！"
 manzoni.920.h: "这群约翰牛的崽子居然拒绝了归还我们福斯科洛！"
 manzoni_gbr_hits_ita_prestige_tt: "这会降低意大利的威望。"
 manzoni_roma_aeterna_decision: "罗马永恒之城"
 manzoni_roma_aeterna_decision_desc: "罗马，哦，永恒之城，你自古以来便是罗马之都、意大利之心。正因如此，我们将首都迁往该处毫无不利。如果我们旧都有博物馆、天文台、动物园都将会被拆除，但它们会在罗马得到重建。"
 manzoni.910.t: "罗马永恒之城"
 manzoni.910.d: "只有还于罗马旧都，意大利才能说回到了全意大利人真正的首都。的确，现在的意大利可以戴上西庇阿之盔了！"
 manzoni.910.f: "“竞技场倒塌，罗马倒塌；\n罗马倒塌——整个世界都会崩溃。”\n——拜伦勋爵"
 manzoni.910.g: "罗马，世界之都"
 manzoni_add_x_national_identity_progress_minus_x_tt: "失去[SCOPE.GetValue('national_identity_progress_amount')|0+]#O 民族认同进度#!。"
 manzoni_add_x_national_identity_progress_minus_1_tt: "失去[SCOPE.GetValue('national_identity_progress_amount')|0+]#O 民族认同进度#!。"
 manzoni_add_x_national_identity_progress_0_tt: "未获得#O 民族认同进度#!。"
 manzoni_add_x_national_identity_progress_plus_1_tt: "获得[SCOPE.GetValue('national_identity_progress_amount')|0+]#O 民族认同进度#!。"
 manzoni_add_x_national_identity_progress_plus_x_tt: "获得[SCOPE.GetValue('national_identity_progress_amount')|0+]#O 民族认同进度#!。"
 manzoni.921.t: "意大利音乐文化"
 manzoni.921.d: "意大利是对音乐文化发展有决定性影响的国家之一——无论是乐器制作、歌剧发展、歌唱家培养还是作曲家创作。自文艺复兴时期起，意大利半岛就形成了一种独具特色的音乐文化，赢得了欧洲的敬仰，并带来了新的灵感。意大利语一直是歌剧的唯一语言，直到19世纪，这就体现了这一伟大的传承。"
 manzoni.921.f: "“把洗衣女工的账单给我，我甚至会把它谱成音乐。”——焦阿基诺·罗西尼"
 manzoni.921.g: "意大利有着丰富的音乐史。"
 manzoni.921.h: "未来属于意大利音乐文化！"
 manzoni.922.t: "但丁崇拜"
 manzoni.922.d: "但丁·阿利吉耶里被认为是意大利文化的终极象征，他的《神曲》是中世纪的文学见证，也是世界经典文学之一。对但丁的崇拜已成为意大利爱国者真正的崇拜，这也是外界认为泛意大利认同的情感的可靠证据——毕竟是但丁首先将意大利的边界定义为说“Sì”语言的区域。佛罗伦萨将建立一座纪念碑来纪念这位“至高至上诗人”。"
 manzoni.922.f: "“走到我们生命的半途，\n  由于我迷失了正路，\n  我发现在一片昏昧的密林。”\n——但丁·阿利吉耶里"
 manzoni.922.g: "支持但丁崇拜并在佛罗伦萨建议纪念碑。"
 manzoni.922.h: "还用骈四俪六折磨子孙？"
 manzoni_italian_consiousness_2_tt: "当地的科西嘉、提契诺、马耳他与罗曼什人口将成为意大利人，其本土也将转变为意大利本土。"
 je_manzoni_italian_greater_national_identity: "但丁的遗产"
 je_manzoni_italian_greater_national_identity_reason: "意大利人的身份认同在哪里终结？对于但丁来说，答案很明确：就是语言！即使对于那些远离意大利文化中心的爱国者，他们也清楚地知道什么才是真正的边界和真正的语言。阿尔卑斯山上的叛逆民族，他们使用粗俗的拉丁语，还有在法国枷锁下使用托斯卡纳语的科西嘉岛人，他们也必须成为国家的一部分——不仅在政治上，而且在精神上。马耳他是一个例外——但迷失的意大利人民很快就会重新拾起他们的语言，就像脱离母亲怀抱太久的孩子一样。"
 manzoni.924.t: "说Sì的语言"
 manzoni.924.d: "在但丁·阿利吉耶里确定意大利语言边界的五百多年之后，曾经的语言社群现在已成为一个国家。从阿尔卑斯山谷到马耳他岛，从撒丁和科西嘉的海岸到伊斯特里亚，意大利语言共同体传承着这位伟大诗人的遗产。"
 manzoni.924.f: "那不勒斯语？方言！威尼斯语？方言！拉定语？方言！罗曼什语？马耳他语？用闪语词汇的方言！"
 manzoni.924.g: "意大利在语言上也统一起来了！"
 manzoni_italian_irredenta_decision_tt: "已使用决议——#YELLOW 尚未收复的意大利#!。"
 manzoni.925.t: "整合科西嘉"
 manzoni.925.d: "科西嘉的语言文化现已完全融入意大利。一个曾经分离的意大利文化已经回家了。"
 manzoni.926.t: "整合提契诺"
 manzoni.926.d: "提契诺的语言文化现已完全融入意大利。一个曾经分离的意大利文化已经回家了。"
 manzoni.927.t: "整合马耳他"
 manzoni.927.d: "马耳他的语言文化现已完全融入意大利。一个曾经分离的意大利文化已经回家了。"
 manzoni.928.t: "整合罗曼什"
 manzoni.928.d: "罗曼什的语言文化现已完全融入意大利。一个曾经分离的意大利文化已经回家了。"
 manzoni.925.f: "“有些人说Oc，有些人说Oil，有些人说Si，这就是西班牙人、法国人和拉丁人。但有一个迹象表明，这三个民族的语言都源自同一种方言，因为他们用相同的词语来命名许多事物，例如Deum、Caelum、Amorem、Mare、Terram和Vivit、Moritur、Amat，几乎所有的事物都是如此。在这些人中，说Oc的人从热那亚的边界开始，占据了南欧的西部。而说Si的人则占据了上述边界的东部，即从意大利的那个海角开始，一直到亚得里亚海的入口，直到西西里岛。”——但丁·阿利吉耶里"
 manzoni.925.g: "欢迎，兄弟！"
 je_manzoni_italian_greater_national_identity_tt: "所有的科西嘉、提契诺、马耳他和罗曼什文化本土都已转变为意大利本土。"
