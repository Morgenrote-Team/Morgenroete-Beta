 manzoni.711.t: "对[SCOPE.gsInterestGroup('target_ig_1').GetName]的赞扬"
 manzoni.711.d: "隶属于[SCOPE.sCharacter('target_character_1').GetFullName]的一家报纸特别赞扬了[SCOPE.gsInterestGroup('target_ig_1').GetName]的治理工作。[SCOPE.sCharacter('target_character_1').GetLastName][SCOPE.sCharacter('target_character_1').GetHerselfHimself]本人就属于这个利益集团，这绝非巧合。"
 manzoni.711.f: "“新闻界如同女人，当它撒谎时显得崇高，不达目的誓不罢休，直到迫使你信以为真。公众则像愚蠢的丈夫，总是屈服。”——奥诺雷·德·巴尔扎克"
 manzoni.711.g: "这篇文章应该尽可能广泛地传播！"
 manzoni.711.h: "这是一种令人作呕的讨好尝试。"
 manzoni.712.t: "微妙的联盟"
 manzoni.712.d: "[SCOPE.sCharacter('target_character_1').GetFullName]最近的婚事已经引起了关注。现在有消息透露，[SCOPE.sCharacter('target_character_1').GetHerHis]的配偶是[SCOPE.sCharacter('target_character_2').GetLastNameNoFormatting]家族的成员，而该家族与[SCOPE.sCharacter('target_character_2').GetFullName]一起掌控着[SCOPE.gsInterestGroup('target_ig_1').GetName]的领导权。这不禁让人质疑该报与政府的关系，以及[SCOPE.sCharacter('target_character_1').GetLastName]帝国的真正实力。"
 manzoni.712.f: "当财政部长妻子任职的报社同属[SCOPE.sCharacter('target_character_1').GetLastName]出版集团的消息传出后，一些官员开始反思自己人生中做错了什么——竟然没能找到更般配的伴侣。"
 manzoni.712.g: "爱坠落之处！"
 manzoni.712.h: "这是一个值得批评的事态。"
 manzoni.713.t: "政府宣传"
 manzoni.713.d: "在某个地区，[SCOPE.sCharacter('target_character_1').GetFullName]的报纸已成为日常生活中如此主导的力量，以至于几乎所有关于时事的信息都仅由这一媒体提供。实际上，[SCOPE.sCharacter('target_character_1').GetLastName]可以决定什么是真相。幸运的是，这些报道是支持政府的。"
 manzoni.713.f: "“我是记者。”——[SCOPE.sCharacter('target_character_1').GetFullNameNoFormatting]"
 manzoni.713.g: "当媒体为政府服务时为什么审查制度存在？"
 manzoni.714.t: "隐性补贴"
 manzoni.714.d: "[SCOPE.sCharacter('target_character_1').GetFullName]的报纸多年来一直暗中接受国库补贴。政府正在收买友好媒体。中间人是[SCOPE.sCharacter('target_character_1').GetLastName]的党内同僚[SCOPE.sCharacter('target_character_2').GetFullName]。该事件削弱了公众对媒体的信任。"
 manzoni.714.f: "“我在剧院大厅里常遇见记者，一看到他们我就浑身发抖。新闻业是个地狱，是无底的不义、背叛与谎言的深渊，除非像但丁那样有维吉尔的圣月桂庇护，否则无人能毫发无损地穿越其中。”——奥诺雷·德·巴尔扎克"
 manzoni.714.g: "合作进展顺利，最近怎么样？"
 manzoni.714.h: "这种媒体与政府的勾结必须停止！"
 manzoni.721.t: "[SCOPE.gsInterestGroup('target_ig_2').GetName]成为众矢之的"
 manzoni.721.d: "[SCOPE.sCharacter('target_character_1').GetFullName]已指示[SCOPE.sCharacter('target_character_1').GetHerHis]的报纸将矛头指向目前担任政府部长职务的[SCOPE.gsInterestGroup('target_ig_2').GetName]。[SCOPE.sCharacter('target_character_1').GetSheHe|U]发动了一场名副其实的政治迫害——每一条耸人听闻的标题都让报纸销量节节攀升。"
 manzoni.721.f: "“谁在邮区编码上动手脚？\n谁沿铁路线暗中策划？\n谁在扇后低语‘真理’，\n质疑君权、教会与人性？\n是[SCOPE.gsInterestGroup('target_ig_2').GetName]！这群学究害虫！\n他们永不停歇无谓的抗争！”"
 manzoni.721.g: "谎言！全是谎言！"
 manzoni.721.h: "文章不会再次分享。"
 manzoni.721.i: "但如果报纸上说的是真的呢？"
 manzoni.722.t: "反对派的声音"
 manzoni.722.d: "利用[SCOPE.sCharacter('target_character_1').GetFullName]在媒体影响力，[SCOPE.sCharacter('target_character_1').GetHerHis]在一篇颇具影响力的文章中赞扬了[SCOPE.gsInterestGroup('target_ig_1').GetName]。相关媒体已经掌控了舆论导向，正在大力宣传造势。"
 manzoni.722.f: "“新闻业，远非掌握在神职人员手中，起初沦为党派斗争的武器，继而变成一种商业投机，像其他商业投机一样毫无良知与顾忌。正如布隆代所言，每家报纸都是一间店铺，人们来此购买合乎心意的观点。倘若有一份专为驼背者办的报纸，它早晚会在专栏里堂而皇之地阐述畸形的美感、实用性与必要性”——奥诺雷·德·巴尔扎克"
 manzoni.722.g: "我们才不在乎这种低劣的宣传呢。"
 manzoni.722.h: "在一家对我们持同情态度的报纸上资助了一篇反驳文章。"
 manzoni.723.t: "[SCOPE.sCharacter('target_character_2').GetLastName]事件"
 manzoni.723.d: "[SCOPE.sCharacter('target_character_1').GetFullName]因发表重磅社论并配合调查报道，引发了一场全国性危机：据披露，[SCOPE.sCharacter('target_character_2').GetFullName]涉嫌挪用公款。公众对税款浪费感到愤怒，政府逐渐陷入危机，[SCOPE.gsInterestGroup('target_ig_2').GetName]更是陷入极度恐慌——而[SCOPE.sCharacter('target_character_1').GetLastName]的出版社却迎来了空前繁荣。"
 manzoni.723.f: "[SCOPE.sCharacter('target_character_1').GetLastName]多年来一直被低估了，[SCOPE.sCharacter('target_character_1').GetSheHe|U]被视为不过是个普通出版商。但[SCOPE.sCharacter('target_character_1').GetHerHis]想要扩大[SCOPE.gsInterestGroup('target_ig_1').GetName]影响力、将[SCOPE.sCharacter('target_character_1').GetSheHe]所鄙视的政府赶下台。数月来，[SCOPE.sCharacter('target_character_1').GetSheHe]派出[SCOPE.sCharacter('target_character_1').GetHerHis]最优秀的记者针对政府机构和官员展开调查，揭露了一起历史性的贪污丑闻。就连昔日的批评者也不得不承认，这是卓越的新闻调查工作，其影响将持续惠及业界多年。然而对国家和政府成员而言，这次攻击带来了难以估量的后果——辞职、政府改组甚至可能重新选举的传闻甚嚣尘上。"
 manzoni.723.g: "这就是反对派的宣传！"
 manzoni.723.h: "辞职早就该提了。"
 manzoni.723.i: "重组整个内阁。"
 manzoni.723.j: "让人民在投票箱前做出决定！"
 manzoni.731.t: "无论如何都要提高发行量"
 manzoni.731.d: "[SCOPE.sCharacter('target_character_1').GetFullName]坚信发行量下滑的唯一原因是[SCOPE.sCharacter('target_character_1').GetHerHis]杂志不够八卦。"
 manzoni.731.f: "“我感觉我们已经与普通人脱节了。我们不能退缩到象牙塔里。我们需要再次加快节奏。我们需要短小精悍的文章——最多三四个段落。更多爆款！更多涉及暴力事件的报道！必须让鲜血喷涌而出！”——[SCOPE.sCharacter('target_character_1').GetFullNameNoFormatting]"
 manzoni.731.g: "哦耶！"
 manzoni.731.h: "难道连一点新闻职业道德都没有吗？"
