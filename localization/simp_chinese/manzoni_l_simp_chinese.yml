 manzoni_je_pro_government_newspaper: "亲政府报纸"
 manzoni_je_pro_government_newspaper_reason: "第四权力本应监督政府，但宫廷式报道往往导致权贵与记者关系过从甚密。这对新闻自由固然有害，但谁愿意被负面消息打扰呢？\n\n当出版公司的[concept_executive]隶属于#G 政府利益集团#!时，将触发“亲政府报纸”。其负责人会开始撰写亲政府文章。"
