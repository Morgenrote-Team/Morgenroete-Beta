 manzoni_writer_poem_bestseller_title_11_loc: "垂柳荫下"
 manzoni_writer_poem_bestseller_title_12_loc: "晨曦的呼唤"
 manzoni_writer_poem_bestseller_title_13_loc: "大海与夜空相遇"
 manzoni_writer_poem_bestseller_title_14_loc: "献给流浪灵魂的歌"
 manzoni_writer_poem_bestseller_title_15_loc: "野花低语的地方"
 manzoni.2600.t: "《弗拉芒之狮》"
 manzoni.2600.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]的《弗拉芒之狮》是一部历史小说，重点讲述金马刺战役，里面描述弗拉芒民兵在这场战役中击败了法国入侵部队，因此这本书被认为是弗拉芒民族史诗。"
 manzoni.2600.f: "“读过这本书的弗拉芒人，请通过书中所叙述的光荣事迹，思考一下弗拉芒斯曾经是什么样子，现在是什么样子，以及如果你们忘记了祖先的榜样，弗拉芒将会变成什么样子！”\n——《弗拉芒之狮》"
 manzoni.2600.g: "为了弗拉芒！"
 manzoni.1601.t: "《红房间》"
 manzoni.1601.d: "《红房间》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]创作的关于瑞典——尤其是斯德哥尔摩——的讽刺小说，重点讲述了十九世纪瑞典的青年知识分子，特别是年轻艺术家在社会上立足、谋生的艰难历程，他们的艺术探索与社会的奇特碰撞，他们的炽热爱情受到匪夷所思的愚弄……对瑞典的政府议会、银行证券、慈善机构、新闻报业、剧院酒吧等等各个社会层面进行了真实而深刻的描写，在大师冷酷无情的调子背后隐藏着一种对世界的怜悯，一种暗中的悲伤，同时流露出他对人生和社会的真知灼见，读来发人深省。"
 manzoni.1601.f: "“……一旦一件艺术品具有实用性，暴露出目的或倾向，它的美就消失了。”\n——奥古斯特·斯特林堡，《红房间》"
 manzoni.1601.g: "社会需要变革！"
 manzoni.1602.t: "《没关系》"
 manzoni.1602.d: "《没关系》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]对终身婚姻制度和女性无法实现经济独立而写的小说。在小说中，阿尔伯特中士在斯德哥尔摩和利德雪平之间的轮船旅行中爱上了玻璃工女儿萨拉·维德贝克，但萨拉提出了一种没有正式婚礼和没有共同财产的平等婚姻，小说的结尾为女主角问阿尔伯特是否介意，而他的回答是“没关系。”"
 manzoni.1602.f: "“这样真的好吗？阿尔伯特”\n“没关系”\n——《没关系》"
 manzoni.1602.g: "没关系"
 manzoni.1603.t: "《金钱》"
 manzoni.1603.d: "《金钱》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]对当代婚姻法的一部深刻批判。这部作品描绘了塞尔玛从十六岁到二十三岁的人生轨迹。在这段时光中，她从一个怀揣艺术梦想的活泼少女，蜕变为一个以自由为唯一目标的坚韧女性。十六岁时，塞尔玛嫁给了年长许多的帕尔·克里斯特松，一个通过辛勤劳动积累财富的富人，主要是因为她相信他在经济上是个稳妥的选择。然而，她从未对他产生过任何爱意，甚至似乎逐渐遗忘了爱的真谛。她的丈夫被形容为“一头剃了毛的猪”。在婚姻的岁月里，她逐渐洞悉了他们关系中的所有裂痕，同时也看清了更广泛的社会问题，包括女性的地位、她们在法律上的无力以及她们的权利。"
 manzoni.1603.f: "“……她的自我欺骗编织了一幅扭曲的幻象，一幅与幸福几近相同的幻象。”\n——维多利亚·贝奈迪克特松，《金钱》"
 manzoni.1603.g: "自由属于塞尔玛"
 manzoni.1604.t: "《赫莎》"
 manzoni.1604.d: "《赫莎》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]的一部小说，旨在为女性的法律自主权和受教育权发声。小说的主人公赫莎是一位倔强的年轻女性，生活在一个由专制父亲掌控的家庭中。他们居住在一个名为昆斯雪平的家长制小镇——一个瑞典社会的缩影。一天夜里，一场大火突然爆发，几乎将整个小镇夷为平地。这场大火成为了一个转折点，揭示了居民的真实面目，也暴露了瑞典社会的狭隘与偏见。然而，在救援行动中，小镇的男女、富人和穷人首次并肩作战。旧的一切在火焰中化为灰烬，新的希望得以萌芽。赫莎成为了这场变革的推动者，而在火灾后的小镇新现实中，女性被赋予了核心角色。"
 manzoni.1604.f: "“……我今晚就愿意结婚，只要明天就能成为寡妇！”\n——弗雷德里卡·布雷默，《赫莎》"
 manzoni.1604.g: "将其付之一炬！"
 manzoni.1605.t: "《点滴与片段》"
 manzoni.1605.d: "《点滴与碎片》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]创作的一部诗集。其中收录的情诗《晨梦》寓意深远，其核心是对那个时代——尤其是教会——在道德、裸体与性观念上的尖锐批判。"
 manzoni.1605.f: "“……她赤裸地躺着，毫无遮掩地展现她美丽的需求，双膝微张，身体轻颤，再次回应她爱人的渴望。”\n—古斯塔夫·弗勒丁，《点滴与碎片》"
 manzoni.1605.g: "这得认真审查！"
 manzoni.1606.t: "《在新年》"
 manzoni.1606.d: "《在新年》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]创作的一首简短却极具感染力的诗篇。它被誉为死硬个人主义者的战斗颂歌。"
 manzoni.1606.f: "“孤身一人，驾一叶扁舟，水手无畏地驶向浩瀚的海洋……”\n——埃里克·古斯塔夫·盖耶，《在新年》"
 manzoni.1606.g: "前进！——这是他命运的号令"
 manzoni.1607.t: "《晚安，大地》"
 manzoni.1607.d: "《晚安，大地》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]创作的一部集体小说，生动描绘了南曼兰一处庄园中佃农的生活图景——日复一日的劳苦与贫瘠的环境，深藏心底的渴望以及质朴的喜悦。在繁忙的集体生活中，一个个鲜活的个人故事以独特的亲密感跃然纸上。而环绕着他们的，是南曼兰大地的芬芳，橡树郁郁葱葱，罂粟花绚烂夺目。"
 manzoni.1607.f: "人们说，车前草叶多生于小径，任人践踏。佃农的命运，亦是如此。\n——洛‑约翰松，《晚安，大地》"
 manzoni.1607.g: "晚安！"
 manzoni.1608.t: "《刽子手》"
 manzoni.1608.d: "《刽子手》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]创作的一部小说。故事跨越两个时空：中世纪与现代。两部分通过一家酒馆的场景和贯穿其中的刽子手角色紧密相连。在书的结尾，刽子手向客人们发表了一番演讲，道出了他对人性的冷酷洞见。"
 manzoni.1608.f: "“暴力，是人类肉体与精神力量的终极宣泄。”\n——佩尔·拉格奎斯特，《刽子手》"
 manzoni.1608.g: "多恐怖啊！"
 manzoni.1609.t: "《荨麻花开》"
 manzoni.1609.d: "《荨麻花开》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]笔下的一部半自传体小说。书中描绘了孤儿马丁的坎坷命运，他仿佛是作者的另一个自我，透过孩童纯真而脆弱的双眼，窥视着这个残酷的世界。马丁的父亲溘然长逝，母亲则毅然决然地抛下孩子们，远赴加州追寻新生活。在他稚嫩的童年里，他所珍视的一切如同沙堡般被命运的海浪无情吞噬。他在数个农场间辗转漂泊，或被送走，或主动逃离，直面农场帮工的艰辛与苦涩。马丁被刻画成一个自私、愚蠢、幼稚、自怜、谄媚、懦弱且虚伪的角色，书中并未对孩子的形象进行任何理想化的粉饰，而是赤裸裸地展现了人性的复杂与矛盾。"
 manzoni.1609.f: "“他想得太多，却懂得太少。”\n——哈里·马丁松，《荨麻花开》"
 manzoni.1609.g: "可怜的孩子。"
 manzoni.1610.t: "《母亲结婚了》"
 manzoni.1610.d: "《母亲结婚了》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]笔下的一部半自传体小说，细腻地刻画了七岁的米娅的困惑与成长。她仿佛对世界了如指掌，却又在现实的迷雾中茫然无措。她无法理解母亲为何要嫁给那个英俊却无可救药的男人——他酗酒、打架、欺骗，将家庭的平静撕得粉碎。母亲为他们的日常生计日夜操劳，努力让那间漏风的出租屋生活变得勉强可以忍受。然而，这个家庭的生活却逐渐演变成一系列痛苦而屈辱的离别，米娅在现实的磨砺中被阶级社会的冷酷所塑造。她梦想有一个安静的家，炉壁上画着蓝色的花朵，但她渐渐发现，这个世界没有空间容纳每个人的梦想——甚至对许多人来说，连一个栖身之所都难以寻觅。"
 manzoni.1610.f: "“当悲痛如潮水般汹涌，试图将人吞噬时，死者会从坟墓中起身，伸出援手。”\n——莫阿·马丁松，《母亲结婚了》"
 manzoni.1610.g: "这确实是一场充满欢愉的婚姻。"
 manzoni.1611.t: "《拉斯肯斯》"
 manzoni.1611.d: "《拉斯肯斯》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]创作的一部小说。故事背景设定在19世纪后半叶的斯莫兰东南部，讲述了贫穷的农场帮工古斯塔夫加入士兵分配制度，成为一名士兵的经历。他被分配了一处士兵的小屋，并获得了“拉斯克”的名字，随后与同样深陷贫困的女仆艾达结为夫妻。小说生动地描绘了他们在小屋中的挣扎与坚韧，同时也为读者呈现了一幅瑞典历史生活的鲜活画卷。"
 manzoni.1611.f: "“来吧！我甚至可以和你打上八天，连背心都不用脱。”\n——维尔海姆·莫伯格，《拉斯肯斯》"
 manzoni.1611.g: "这该死的刺人猫！"
 manzoni.1612.t: "《格拉斯医生》"
 manzoni.1612.d: "《格拉斯医生》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]创作的一部书信体小说，深刻描绘了19世纪瑞典一位医生在道德与爱情之间的艰难抉择。小说的主人公是斯德哥尔摩一位备受尊敬的医生泰科·加布里埃尔·格拉斯，故事以日记的形式徐徐展开，记录了他与抑郁症的激烈抗争。反派的角色由道德沦丧的牧师格雷戈里乌斯担当，他的存在如同一片阴霾，笼罩着整个故事。格雷戈里乌斯年轻貌美的妻子向格拉斯医生倾诉，她的性生活令她痛苦不堪，并恳求他的帮助。格拉斯不可自拔地爱上了她，尽管她已另有情人，他仍决心伸出援手。他试图干预，但牧师却顽固地坚持他的“婚姻权利”——无论她是否愿意，她都必须与他发生关系。于是，为了让他的爱人获得幸福，格拉斯开始策划一场谋杀，目标直指她的丈夫。"
 manzoni.1612.f: "“人渴望被爱，若不能，则被钦佩；若不能，则被畏惧；若不能，则被憎恨与鄙视。”\n——雅尔玛·瑟德尔贝里，《格拉斯医生》"
 manzoni.1612.g: "把氰化钾给我拿来！"
 manzoni.1613.t: "《辛戈拉》"
 manzoni.1613.d: "《辛戈拉》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]笔下的一部小说，将读者带入中世纪的瑞典，展开一段融合了冒险、悲剧与民间传说元素的浪漫历史篇章。故事围绕美丽而神秘的吉普赛女孩辛戈拉与痴情于她的贵族约兰展开，他们的爱情如同一朵在荆棘中绽放的玫瑰，既绚烂又脆弱。小说背景设定在一个充满政治阴谋与权力斗争的时代，辛戈拉与约兰的情感纠葛与社会阶级的冲突、命运的无常以及个人欲望的挣扎紧密交织，构成了一幅波澜壮阔的历史画卷。"
 manzoni.1613.f: "“走吧！离开这里！去找你的陌生人！”\n——维克多·里德贝里，《辛戈拉》"
 manzoni.1613.g: "如此浪漫！"
 manzoni.1614.t: "《新诗》"
 manzoni.1614.d: "《新诗》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]笔下的一部诗集，如同一幅绚丽的画卷，展现了瑞典历史、自然与民族身份的深邃主题。这部诗集常被视为诗人对浪漫民族主义的深情拥抱，他以细腻的笔触聚焦于瑞典人民及其遗产的美丽与力量，字里行间流淌着对故土的炽热情感。诗集中鲜明地表达了对过去的尊崇与对国家遗产的颂扬，仿佛在历史的回响中寻找民族的根脉；同时，诗人也对未来进行了深刻的思考，以诗意的语言勾勒出对前路的憧憬与思索。"
 manzoni.1614.f: "“倾听一根断弦的声音，胜过从未拉过弓的寂静。”\n——维尔纳·冯·海登斯坦，《新诗》"
 manzoni.1614.g: "一段多么可傲的历史！"
 manzoni.1504.t: "《汤姆·索亚历险记》"
 manzoni.1504.d: "在密西西比河畔，一个名叫汤姆·索亚的顽皮男孩与他最好的朋友哈克·费恩展开了一系列惊险刺激的冒险，从恶作剧到寻宝，甚至目睹了一起谋杀案。在这些冒险中，汤姆逐渐领悟了关于友谊、道德与责任的深刻人生哲理。"
 manzoni.1504.f: "“工作是一个人不得不做的事，而玩耍则是一个人不必做的事。”\n——塞缪尔·“马克·吐温”·克莱门斯，《汤姆·索亚历险记》"
 manzoni.1504.g: "这小崽子！"
