 manzoni.1300.t: "《德国，一个冬天的童话》"
 manzoni.1300.d: "海因里希·海涅作为最重要的德语诗人之一，写下了一首针对德国政治局势的讽刺史诗。当自由派人士赞颂这本书时，一些政客却想将其查禁。"
 manzoni.1300.f: "1843年，自1831年起就离开德国前往法国的德国诗人海涅回到国内几周，在汉堡拜访了他的母亲和出版商尤利乌斯·坎佩。海涅并非一位典型的浪漫主义作家，而是一位讽刺作家，他不仅批评德意志专制国家的反动政策和审查制度，还批评他的民族主义和沙文主义同胞。在返回巴黎的途中，他完成了《德国，一个冬天的童话》的初稿。根据1819年卡尔斯巴德会议的审查规定，超过20对开页的手稿不在审查员的审查范围内。因此，这首诗与其他诗歌一起发表在一本名为《新诗》的诗集中。这部作品以紧凑的篇幅展示了海涅的形象世界和他的民歌式诗歌辞藻，并对祖国的环境进行了讽刺批评。"
 manzoni.1300.g: "应该出版。"
 manzoni.1300.h: "查禁并没收！"
 manzoni.1300.i: "审查……"
 manzoni.1301.t: "海因里希·海涅嘲弄科隆大教堂"
 manzoni.1301.d: "在最新作品中，海因里希断然嘲讽了科隆大教堂的复工。"
 manzoni.1301.f: "生于杜塞尔多夫的海涅曾是普鲁士公民，他反对本国的军国主义。在诗集中，他批评了“普鲁士人的行为”，同时也反对德国浪漫主义的变形。事实上，他取笑了不合时宜的德国人，他们宁愿完成一座中世纪的大教堂，而不愿向前看。"
 manzoni.1301.g: "该死的海涅！"
 manzoni.1302.t: "《月夜》——约瑟夫·冯·艾兴多夫著"
 manzoni.1302.d: "约瑟夫·冯·艾兴多夫的一首新诗被认为是德国诗歌的巅峰之作。"
 manzoni.1302.f: "约瑟夫·冯·艾兴多夫男爵是德国后期浪漫派诗人和小说家。艾兴多夫的诗歌主题是，人应该在充分享受大自然的美景和不断变化的情绪中找到幸福。艾申多夫诗歌的抒情性备受赞誉，舒伯特、舒曼、门德尔松、勃拉姆斯、胡戈·沃尔夫、理查德·施特劳斯、弗里德里希·尼采、汉斯·普菲茨纳和亚历山大·泽姆林斯基等许多作曲家都曾为他的诗歌谱曲。1837年，他的诗作《月夜》发表，这首诗通常被视为德国浪漫主义抒情诗的“珍珠中的珍珠”。"
 manzoni.1302.g: "美妙。"
 manzoni.1302.h: "德国人不为了政治自由而战，反而被愚蠢的诗歌所困扰？"
 manzoni.1303.t: "纺织工人起义"
 manzoni.1303.d: "[SCOPE.sState('manzoni_weberaufstand_state').GetName]的社会、经济和政治问题显而易见。即将到来的自由主义理想和传统手工业者的贫困造成了危险的冲突局势。有传言称当地纺织工人即将发动起义。"
 manzoni.1303.f: "工业化的开端使许多纺织工人陷入困境。当地的纺织厂老板向他们购买纱线，但由于供大于求，价格被压低了。因此，纺织工并非传统意义上的工厂工人，而是依附于工厂的贫困个体户。面对遭遇剥削的痛苦和未来可能被进一步剥削的危险，该地区的一些人已经联合起来，现在正在威胁他们认为对这种苦难负有责任的实业家。政治精英们已经在用自己的方式解读这一困难局面。实业家尤其呼吁采取强硬行动，避免今后再发生类似事件。那些要求改善工资条件的人将之视作侮辱。"
 manzoni.1303.g: "派出部队。"
 manzoni.1303.h: "谈判。"
 manzoni.1304.t: "《织工之歌》"
 manzoni.1304.d: "[SCOPE.sCountry('manzoni_weberaufstand_country').GetAdjectiveNoFlag][SCOPE.sState('manzoni_weberaufstand_state').GetName]对纺织工人起义的镇压已成为德意志联邦境内尚未解决的社会和政治问题的象征。海因里希·海涅在一首诗中对当局进行了批判。"
 manzoni.1304.f: "忧郁的眼里没有眼泪，\n他们坐在织机旁，咬牙切齿：\n“德意志，我们在织你的尸布，\n  我们织进去三重的诅咒——\n  我们织，我们织！”\n\n“一重诅咒给那个上帝，\n  饥寒交迫时我们向他求祈;\n  我们希望和期待都是徒然，\n  他对我们只是愚弄和欺骗——\n  我们织，我们织！”\n\n“一重诅咒给阔人们的国王，\n  我们的苦难不能感动他的心肠，\n  他榨取我们最后的一个钱币，\n  还把我们像狗一样枪毙——\n  我们织，我们织！”\n\n“一重诅咒给虚假的祖国，\n  这里只繁荣着耻辱和罪恶，\n  这里花朵未开就遭到摧折，\n  腐尸和粪土养着蛆虫生活——\n  我们织，我们织！”\n\n“梭子在飞，织机在响，\n  我们织布，日夜匆忙——\n  老德意志，我们在织你的尸布，\n  我们织进去三重的诅咒，\n  我们织，我们织！”"
 manzoni.1304.g: "又是你，海涅？"
 manzoni.1304.h: "审查！审查！"
 manzoni.1305.t: "《织工》"
 manzoni.1305.d: "盖哈特·霍普特曼推出了他职业生涯中最重要的一部戏剧。该剧巩固了他作为德国文学的代表在国内外的声誉。1912年，霍普特曼因“在戏剧艺术领域中丰硕、多样的出色成就”而获得诺贝尔文学奖。"
 manzoni.1305.f: "《织工》中的大多数人物都是为争取自身权利而斗争的无产者。与任何时期的大多数戏剧不同，正如文学评论和介绍中多次指出的那样，该剧没有真正的中心人物，从而提供了合演的充分机会。霍普特曼没有塑造英雄，而是创造了一个暴民。因此，这个暴民就是主角，或者说主要角色，即使有个人从普通人中脱颖而出，他们也不会被推到前台久留。其历史背景是19世纪40年代在[SCOPE.sState('manzoni_weberaufstand_state').GetName]发生的纺织工人起义。"
 manzoni.1305.g: "在德国，即使是血淋淋的悲剧也会成为文化遗产。"
 maria_luigia_died_tt: "#O 帕尔马的玛丽亚·路易莎#!去世"
 je_manzoni_lucca: "卢卡的命运"
 je_manzoni_lucca_reason: "维也纳会议在1815年复辟期间遇到了一些问题。其中包括恢复波旁‑帕尔马王朝的统治以及拿破仑的妻子玛丽亚·路易莎（哈布斯堡家族成员）的财产问题。在波拿巴将帕尔马并入法兰西帝国后，波旁‑帕尔马王朝获得了伊特鲁里亚王国，然而，伊特鲁里亚王国必须让位给由哈布斯堡王朝继承人统治的托斯卡纳复辟。最终妥协的结果是波旁‑帕尔马家族的王公们可以将卢卡公国据为己有，而玛丽亚·路易莎则可以将帕尔马作为附属领地保留到她去世。玛丽亚·路易莎死后，波旁‑帕尔马家族本应归还帕尔马，而卢卡则归属托斯卡纳。"
 manzoni.901.t: "卢卡的命运"
 manzoni.901.d: "根据维也纳会议的规定，波旁‑帕尔马家族在哈布斯堡的玛丽亚·路易莎去世后再次登上帕尔马的王位。作为回报，必须割让卢卡给托斯卡纳。"
 manzoni.901.f: "维也纳会议在1815年复辟期间遇到了一些问题。其中包括恢复波旁‑帕尔马王朝的统治以及拿破仑的妻子玛丽亚·路易莎（哈布斯堡家族成员）的财产问题。在波拿巴将帕尔马并入法兰西帝国后，波旁‑帕尔马王朝获得了伊特鲁里亚王国，然而，伊特鲁里亚王国必须让位给由哈布斯堡王朝继承人统治的托斯卡纳复辟。最终妥协的结果是波旁‑帕尔马家族的王公们可以将卢卡公国据为己有，而玛丽亚·路易莎则可以将帕尔马作为附属领地保留到她去世。玛丽亚·路易莎死后，波旁‑帕尔马家族本应归还帕尔马，而卢卡则归属托斯卡纳。"
