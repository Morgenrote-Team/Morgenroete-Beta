 je_manzoni_literary_circle: "文学社团"
 je_manzoni_literary_circle_reason: "如果国家的精神生活丰富多彩，文学沙龙和众多作家身上更是数不胜数，现在成立一个文学社团只是时间问题。"
 manzoni.3.t_juvenile: "少年文学"
 manzoni.3.t_crime: "犯罪与悬疑"
 manzoni.3.t_adventure: "冒险故事"
 manzoni.3.t_science: "科幻小说"
 manzoni.3.t_social: "社会批判"
 manzoni.3.t_literary: "文学小说"
 manzoni.3.t_devotional: "宗教文学"
 manzoni.3.t_romance: "浪漫故事"
 manzoni.3.d: "由于政治、社会和文化的巨变，[Concept('concept_manzoni_popular_taste','$concept_manzoni_popular_tastes_audience$')]剧烈变化，让[GetPlayer.GetName]对文学[concept_manzoni_genre]的偏好也随之变动。"
 manzoni.3.f_juvenile: "17至18世纪，英国和美国的清教徒出版了充满新教理论的儿童读物。约翰·纽伯里在17世纪40年代首次出版单存教育意义和娱乐价值的儿童读物，而在几年前，托马斯·博尔曼写了《巨人史》。尽管从18世纪中叶开始，宗教主义逐渐被理性道德主义所取代，但直到19世纪末，道德主义价值观仍在影响着许多儿童读物，尽管19世纪中叶以来，幻想和冒险故事越来越多地成为儿童文学作品主流。"
 manzoni.3.f_crime: "犯罪小说的起源可以追溯到更久远的年代，但它直到19世纪才成为一种文学体裁。它通常关注的是一起犯罪的全部流程（警察、侦探或个人对犯罪的起诉和调查）。犯罪小说中描写驱使罪犯作案的心理段，也有对环境进行描述，还可以让调查者陷入自己的良知困扰中，这些都经过了复杂的文学处理，费奥多尔·陀思妥耶夫斯基的《罪与罚》可以理解为一部犯罪小说。"
 manzoni.3.f_adventure: "探险文学与文学本身一样古老，可以追溯到古代（具体到中东），中世纪的亚瑟王和骑士小说被认为是现代冒险小说的先驱。19世纪以来出现了各种冒险文学作者，其中最著名的代表是大仲马、罗伯特·路易斯·史蒂文森、卡尔·迈和儒勒·凡尔纳。"
 manzoni.3.f_science: "早在科幻小说一词出现之前，中世纪就有对未来技术发展的憧憬。1851年，英国诗人兼散文家威廉·威尔逊首次使用了科幻小说一词。科学小说在相信科学的同时，也有对科学技术的恐惧，形成了一种划时代且崭新的分裂生活态度，即成为一个惧怕自身力量的新神话巨人，这就是乌托邦出现的原因，像阿道司·赫胥黎和乔治·奥威尔的乌托邦小说是这种矛盾心理的特点。"
 manzoni.3.f_social: "社会批评小说可以追溯到启蒙运动时期，这些小说可以产生社会影响2，1852年哈里特·伊莉莎白的小说《汤姆叔叔的小屋》推动了美国的反奴隶制运动。而《动物庄园》和《双城记》，表达了对社会和人性的失望。"
 manzoni.3.f_literary: "文学小说又称主流小说、非类型小说、严肃文学、高雅文学、艺术文学等，指的是文学市场上不属于任何一种类型小说的文学虚构作品。一般而言，文学小说是由人物驱动而不是情节驱动的小说，通过实验或诗意的方式使用语言，来考察人类状况。文学小说通常被用作文学的同义词，是指专门被认为具有相当大的艺术价值的作品。虽然文学小说通常被认为在艺术上优于类型小说，但两者并不相互排斥"
 manzoni.3.f_devotional: "宗教文学指具有宗教动机的通俗作品，它不是神学典籍，也不追求科学，甚至也没有教条意图。相反，随着社会剧变，人们开始注重内在精神，宗教文学特点是虔诚，在从情感上振奋精神，或指导生活。"
 manzoni.3.f_romance: "浪漫故事是一种广泛且琐碎文学体裁，主要面向女性读者，而且易于理解。个别浪漫故事的文学价值也会极高，还因其独特的情感表达和深刻的主题而受到读者的喜爱。"
 manzoni.3.g: "审美潮流来来去去，沉沉浮浮"
 manzoni.10.t: "新出版商"
 manzoni.10.d: "一家新出版社[SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting]今天在[SCOPE.sState('manzoni_publisher_state').GetName]开门营业。从今天中午开始，印刷机就一直在嗡嗡作响。[GetPlayer.GetName]的社交生活变得更加丰富多彩。"
 manzoni.10.f: "[SCOPE.sState('manzoni_publisher_state').GetName]的一家新出版社引起公众兴趣。[SCOPE.sCharacter('manzoni_publisher_scope').GetFullName]今天在一份特别印制的传单上宣布，他的公司从现在起将向市场推出大量新出版物，导致大楼前聚集了很多围观者，现在新出版社将专注于哪个领域的问题已经开始让大家讨论。"
 manzoni.10.g: "当然是专注高质量文学！"
 manzoni.10.h: "也许是科幻出版社呢？"
 manzoni.10.i: "可能是耕耘大众喜闻乐见的出版社！"
 manzoni.10.j: "或许是专注于艺术前线的出版社！"
 manzoni.11.t: "公共出版商"
 manzoni.11.d: "凭借[SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting]，[GetPlayer.GetName]在[SCOPE.sState('manzoni_publisher_state').GetName]拥有了最受欢迎的的出版社。该出版社希望在未来进一步扩张，其所有者[SCOPE.sCharacter('manzoni_publisher_scope').GetFullName]已经是业内最重要的代表之一。"
 manzoni.11.f: "商业出版社是19世纪的先驱机构之一，其更注重数量而非质量，商业出版社让文学不再是少数富裕阶层的特权，让越来越多的人可以接触文学。"
 manzoni.11.g: "这家出版社是我们图书行业的基石。"
 manzoni.12.t: "文学出版商"
 manzoni.12.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]今天与出版社[SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting]签订了出版合同。该出版社位于 [SCOPE.sState('manzoni_publisher_state').GetName]，很有可能因此爆火。"
 manzoni.12.f: "享有盛誉是任何出版业的最高成就。如果一个[concept_manzoni_national_writer]能够成为大作家，那么出版业可以成为其作品的保存者和传播者，在其去世后也会继续传播，成为一个活着的墓志。"
 manzoni.12.g: "这家出版社是我们文学基石。"
 manzoni.13.t: "科学出版商"
 manzoni.13.d: "一段时间以来，[SCOPE.sCharacter('manzoni_scientist_scope').GetFullName]的发现一直在整个世界引起剧烈热议，而其论文和书籍定期由[SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting]出版。该出版社现已宣布将继续扩大规模，成为[GetPlayer.GetName]领域的主要学术出版商之一。"
 manzoni.13.f: "科学出版社可以从出版和科学之间相互辅佐，例如当科学家撰写论文时，专注于科学著作的出版社可以告知新发现和新技术，为学生提供重要的支持。"
 manzoni.13.g: "这家出版社是我们学术界的基石。"
 manzoni.14.t: "艺术出版商"
 manzoni.14.d: "[SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting]出版商宣布，将出版我们艺术家[SCOPE.sCharacter('manzoni_artist_scope').GetFullName]的作品，这很可能是爆火，让人蜂拥而至。"
 manzoni.14.f: "想要一位艺术家的杰作变重要，那就要有人将其出版，谱集或绘本不仅对受过教育的普通人来说是精美的作品，对未来但目前还不是艺术家的人来说，它们也是灵感和教诲。"
 manzoni.14.g: "这家出版社是我们文化的基石。"
 artists.52.h: "我们持续关注[SCOPE.sCharacter('manzoni_new_writer_scope').GetHerHis]的职业生涯！"
 manzoni.101.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_bestseller_title_work_type')]，[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]著"
 manzoni.101.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_local_or_national_short_text_type')]创作了一部畅销的[SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_work_type')]——[SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_bestseller_title_work_type')]，一本[SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_work_genre_type')][SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_work_type')]"
 manzoni.101.f: "[SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_bestseller_flavor_work_type')]"
 manzoni.101.g: "完美！"
 manzoni.201.g: "我喜欢这本书！"
 manzoni.102.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]的世界名气"
 manzoni.102.d: "我们的作家[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]名震国内，享誉海外，[SCOPE.sCharacter('manzoni_writer_scope').GetHerHis|U]作品如今已被视为世界文学！"
 manzoni.102.f: "世界各地的知名出版商都将我们作家的作品纳入了他们的出版计划。"
 manzoni.102.g: "希望它不会进入[SCOPE.sCharacter('manzoni_writer_scope').GetHerHis]的脑子。"
 manzoni_universal_writer: "文豪"
 manzoni_universal_writer_desc: "这位作家被认为是大文豪。"
 manzoni_writer_local_or_national_short_text_national_writer_loc: "我们的国家级作家——[ROOT.GetCharacter.GetFullName]，"
 manzoni_writer_local_or_national_short_text_local_writer_loc: "本土作家[ROOT.GetCharacter.GetFullName]"
 manzoni.301.t: "[SCOPE.sCulture('print_addict_culture').GetName]人的藏书癖"
 manzoni.301.d: "[GetPlayer.GetName]的图书产业蓬勃发展，文学精英辈出。受过良好教育的公民对文化生活越来越感兴趣，有些人已经开始无限渴求书籍和印刷品。[SCOPE.sCulture('print_addict_culture').GetName]人市民尤其容易受到这种新兴趋势的影响。"
 manzoni.301.f: "“藏书癖”是一指对收藏图书的过度热情，展现出成瘾或强迫症的特征。与常伴私人图书馆积累而来的无害的爱书癖不同，藏书狂涉及强迫性囤积、因收藏导致的经济破产，甚或为满足这种狂热而犯罪。德国首例犯罪藏书癖是萨克森牧师约翰·格奥尔格·提尼乌斯。他挪用教会资金，甚至几次企图实施抢劫谋杀（其中使用了麻醉剂），只为满足他的收藏热情。仅提尼乌斯剩余藏书的拍卖目录就包含了16650部作品，可见其收藏之丰。另一个极端的例子是利涅罗尔伯爵，这位“藏书癖”据说从1848年起完全退出社交生活，一心致力于扩充和维护他的藏书。他将藏书存放在巴黎一间专门设计的公寓里，对外界守口如瓶，甚至否认拥有某些书籍。直到他去世后，当这些书籍被拍卖时，其藏书的规模和价值才真正显露人前，令世人惊叹不已。"
 manzoni.301.g: "每个人都知道偷书有多危险！"
 manzoni.302.t: "藏书狂热是否已不是主流？"
 manzoni.302.d: "出版业正面临着一场危机，由于书籍质量低劣或休闲方式的改变，大部分人显然失去了阅读的欲望。"
 manzoni.302.f: "外面的世界没有书也可以生存，电影、体育、酗酒和赌博也有类似都可以引导书呆子重返社会生活。"
 manzoni.302.g: "书籍越来越无聊了。"
 manzoni.302.h: "发起一场唤醒阅读爱好的运动！"
 manzoni.303.t: "[SCOPE.sCharacter('manzoni_bookmadame_scope').GetLastNameNoFormatting]女士的书友会"
 manzoni.303.d: "[SCOPE.sState('manzoni_book_state').GetName]中一位有影响力且受过良好教育的女士创办了一个书友会，成为文学爱好者的聚集地。现在嗜书如命的人们被吸引到这里来。"
 manzoni.303.f: "虽然自17世纪起，女性就已经开始组织圣经学习小组，但直到18世纪末，世俗的读书会才在美国和欧洲悄然兴起。这些读书圈并不局限于特定的种族或阶级。1827年，在马萨诸塞州的林恩市，一个最早的黑人女性读书小组应运而生，为知识的平等播下了希望的种子。随着19世纪的推进，女性读书会如雨后春笋般蓬勃发展。其中一些小组开始对社会问题直言不讳，尤其在废奴运动上表现突出。这些先锋们的勇气，为世纪末轰轰烈烈的俱乐部运动铺平了道路。步入20世纪，读书会继续发挥着双重角色：既是知识的温床，又是激进政治的沃土。"
 manzoni.303.g: "了不起的创举。"
 manzoni.304.t: "繁荣的图书业"
 manzoni.304.d: "于[SCOPE.sState('manzoni_book_state').GetName]的[SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting]和[SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting]新兴出版社已发展成为市场上的重要参与者。显然，它的所有者[SCOPE.sCharacter('manzoni_publisher_scope').GetFullName]抓住了时代的脉搏。"
 manzoni.304.f: "在过去[SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting]和[SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting]只是一个内行人的名字，以小型印刷产品扬名。然而现在小种图书已成为读者的最爱，这也是该公司扩大部门，现在希望更加注重大众口味的原因。"
 manzoni.304.g: "出版更多书籍！"
 manzoni.304.h: "制作高质量的图书才是硬道理。"
 manzoni.311.t: "出版社沦为政治棋子"
 manzoni.311.d: "[SCOPE.sState('manzoni_book_state').GetName]的一家传统出版社濒临破产。一家与之竞争的出版社提出收购提议。然而这家出版社与反对党关系密切，更确切地说，是与[SCOPE.sCharacter('publisher_ig_leader').GetInterestGroup.GetName]关系密切。"
 manzoni.311.f: "上周，一家大型出版社宣布濒临破产，不得不裁员无数，这让各界震惊不已。不过很快就有另一家出版社愿意接管，并承诺不会裁员。不过慷慨收购的背后金主是[SCOPE.sCharacter('publisher_ig_leader').GetInterestGroup.GetName]，其持有这家出版社的大量股份。一些评论家们已经指出，这可能会对市场产生相关影响，有些人甚至怀疑此事背后有一个[SCOPE.sCharacter('publisher_ig_leader').GetFullName]的计划。"
 manzoni.311.g: "如果他们能拯救公司，我们为什么要阻挠呢？"
 manzoni.311.h: "我们不能容许这种政治影响！"
 manzoni.312.t: "反对派出版商"
 manzoni.312.d: "在[SCOPE.sState('manzoni_book_state').GetName]中，一家出版社已变得举足轻重。它认为自己是政府政策的制衡力量，希望扩大规模并与反对党关系密切。一些政府成员认为，可以通过一些政策障碍来阻止这家问题公司的发展。"
 manzoni.312.f: "“他人的意见和言论自由是一笔宝贵的财富。难道我们不应该更加珍视自己的言论吗，先生？”"
 manzoni.312.g: "一些行政阻碍可能会使他们的业务更加困难。"
 manzoni.312.h: "我们不需要下作的伎俩。"
 manzoni.321.t: "书籍许可"
 manzoni.321.d: "[SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting]出版商今天与来自[SCOPE.sCountry('manzoni_country_scope').GetName]的作家[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]签订了独家合同，[SCOPE.sCharacter('manzoni_writer_scope').GetHerHis]的作品深受民众喜爱。"
 manzoni.321.f: "出版商无法回避受众审美。与时俱进的国外作家有机会在我国出版作品。"
 manzoni.321.g: "但人们为何不看国内作家的作品呢？"
 manzoni.322.t: "外国低俗作品"
 manzoni.322.d: "一段时间以来，一家本地出版社一直在出版[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]的外国作品。评论家们一致认为，这种低俗文学对我国图书市场的质量造成了破坏性影响，尽管这些媚俗作品却卖得很火。"
 manzoni.322.f: "“有些文学作品就是垃圾！”"
 manzoni.322.g: "禁了这些洋垃圾！"
 manzoni.322.h: "如果人们想读，那它就不会那么糟糕。"
 manzoni.323.t: "盗版"
 manzoni.323.d: "今天，[SCOPE.sCountry('manzoni_country_scope').GetName]商务部的一位代表向我们投诉。[SCOPE.sState('manzoni_book_state').GetName]的一家出版社在没有许可证的情况下出版其本国作家[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]的重要作品，并以此大发横财，现在他们要求我们制止盗版行为。"
 manzoni.323.f: "在18世纪，盗版现象司空见惯，尽管19世纪开始，保护作者和出版社权利的措施不断完善，但这些措施往往只能在局限本国内。国外的出版商仍在盗版，甚至影响到凡尔纳等国际知名作家，他们的书未经许可就在英语国家发行，有时还被大肆篡改。"
 manzoni.323.g: "停止印刷，直到谈妥。"
 manzoni.323.h: "文学属于每个人。"
 manzoni.331.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetLastName]的国际阅读之旅"
 manzoni.331.d: "[GetPlayer.GetNameNoFlag]的大文豪[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]在与一家外国出版社进行了初步讨论后，决定也通过公开阅读[SCOPE.sCharacter('manzoni_writer_scope').GetHerHis]自己的作品来向国外的[SCOPE.sCharacter('manzoni_writer_scope').GetHerHis]读者表示感谢。第一个目的地将是[SCOPE.sCountry('manzoni_writer_destination_scope').GetName]。"
 manzoni.331.f: "作家可以在其职业生涯中进行一次阅读之旅。阅读之旅的目的地是读者偏好与作家作品类型相匹配的地区，每到一个新的站点，声望、文学传统和人际关系都会得到改善。一位作家最多可以访问5个国家，当不再有国家对其作品类型感兴趣时，阅读之旅也就结束了。"
 manzoni.331.g: "祝好运！"
 manzoni.332.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetLastName]抵达[GetPlayer.GetNameNoFlag]"
 manzoni.332.g: "安排本地出版商与其会面。"
 manzoni.332.h: "在文学沙龙中组织一次公开的读书会。"
 manzoni.332.i: "陛下希望进行一次[SCOPE.sCharacter('manzoni_writer_scope').GetHerHis]的作品的内部展演。"
 manzoni.332.j: "热烈欢迎[SCOPE.sCharacter('manzoni_writer_scope').GetHerHim]。"
 manzoni.333.t: "文学巨人的会面"
 manzoni.333.d: "世界著名作家[SCOPE.sCharacter('manzoni_writer_2_scope').GetFullName]与我国作家[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]在新书发布会上会面，他们之间的交谈让大家受益良多。"
 manzoni.333.f: "“你很了不起。”\n“多谢多谢，你也很了不起。”\n“不，您才了不起。”\n“不不，您是。”"
 manzoni.333.g: "灵感多多！"
 manzoni.334.t: "下一个目的地？"
 manzoni.334.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]结束了在国外的逗留，[SCOPE.sCharacter('manzoni_writer_scope').GetSheHe]接下来应该回国还是选择新的目的地。"
 manzoni.334.f: "作家可以在其职业生涯中进行一次阅读之旅。阅读之旅的目的地是读者偏好与作家作品类型相匹配的地区，每到一个新的站点，声望、文学传统和人际关系都会得到改善。一位作家最多可以访问5个国家，当不再有国家对其作品类型感兴趣时，阅读之旅也就结束了。"
 manzoni.334.g: "[SCOPE.sCountry('manzoni_writer_destination_scope').GetName]会是个好去处。"
 manzoni.334.h: "[SCOPE.sCharacter('manzoni_writer_scope').GetLastName]应该回来。"
 manzoni.341.t: "文学社团"
 manzoni.341.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]在[ROOT.GetCountry.GetCapital.GetCityHubName]杂志上组织了一个全国知名作家会议。这次活动引起了公众的极大关注。人们对这一定期会议寄予厚望。"
 manzoni.341.f: "文学圈一直是具有影响力的文化机构，有正式如法国的高蹈派或德国的格奥尔格圈，也有如迹象文学社这样非正式文学社团（里面有托尔金、路易斯等人，这个圈子推崇小说叙事，鼓励幻想小说的写作）"
 manzoni.341.g: "这将显著增加我国的文学传统。"
 manzoni.341.h: "这将激励新一代人！"
 manzoni.341.i: "这个圈子将对我们的社会产生巨大影响。"
 manzoni.400.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]对我国政府持批评态度"
 manzoni.400.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]对[GetPlayer.GetName]的政治局势感到不满，如果我们不再调整政府，[SCOPE.sCharacter('manzoni_writer_scope').GetSheHe]可能会考虑不再担任我们的[concept_manzoni_national_writer]。"
 manzoni.400.f: "“如此过分！如此不公！”——[SCOPE.sCharacter('manzoni_writer_scope').GetFullNameNoFormatting]"
 manzoni.400.g: "也许我们应该改变一些东西……"
 manzoni.400_tt: "如果[concept_manzoni_national_writer]的[concept_interest_group]的[concept_approval]低于#n ‑2#!，他们将考虑辞职，你有一年的时间来提高支持率。"
 manzoni.401.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]不再是国家级作家"
 manzoni.401.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]已经无法忍受[GetPlayer.GetName]现状。因此，[SCOPE.sCharacter('manzoni_writer_scope').GetSheHe]决定不再担任我们的[concept_manzoni_national_writer]，不再是我们国家的代言人。"
 manzoni.401.f: "“我受够与一群虫豸在一起！无能且腐败！”——[SCOPE.sCharacter('manzoni_writer_scope').GetFullNameNoFormatting]"
 manzoni.401.g: "你爱怎么样就怎么样！"
 manzoni.500.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]对政府感到厌烦"
 manzoni.500.f: "“我们需要变革！人民正在受苦！我此后的作品将仅专注于变革与改进！打到那些独裁者！”\n——[SCOPE.sCharacter('manzoni_writer_scope').GetFullNameNoFormatting]"
 manzoni.500.g: "好。"
 manzoni.500.h: "尽一切可能来阻止[SCOPE.sCharacter('manzoni_writer_scope').GetHerHim]"
 manzoni.500.i: "不。"
 manzoni.500.j: "不错的笑话！"
 manzoni.510.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]专注于写作"
 manzoni.510.d: "鉴于[SCOPE.gsInterestGroup('manzoni_writer_ig_scope').GetName]的政治局势相当不错，[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]认为现在是卸任的好时机，并投身于写作，毕竟这是[SCOPE.sCharacter('manzoni_writer_scope').GetHerHis]的爱好之一。"
 manzoni.510.f: "“我终于又有灵感了！经过这么多年的奋斗，我终于可以回去写作了！也许我应该写一个关于政治的故事，毕竟我见过的故事足够精彩！”——[SCOPE.sCharacter('manzoni_writer_scope').GetFullNameNoFormatting]"
 manzoni.510.g: "我希望[SCOPE.sCharacter('manzoni_writer_scope').GetSheHe]能够创作出精彩的作品！"
 manzoni.510.h: "我认为[SCOPE.sCharacter('manzoni_writer_scope').GetSheHe]应该继续从政。"
 set_character_as_local_writer_scope_effect_tt: "[SCOPE.sCharacter('wannabe_writer_scope').GetFullName]成为[concept_manzoni_local_writer]。"
 manzoni.590.t: "本土作家出名"
 manzoni.590.d: "一位[concept_manzoni_local_writer][SCOPE.sCharacter('manzoni_new_writer_scope').GetFullName]正变得越来越出名。显然[SCOPE.sCharacter('manzoni_new_writer_scope').GetSheHe]将前途无量。"
 manzoni.590.f: "“我已经迫不及待地变成[GetPlayer.GetName]最著名的作家啦！我要成为最棒的！”——[SCOPE.sCharacter('manzoni_new_writer_scope').GetFullNameNoFormatting]"
 manzoni.590.g: "作家越多越好！"
 manzoni.600.t: "国立图书馆的落成仪式"
 manzoni.600.d: "随着[GetPlayer.GetNameNoFlag]国立图书馆的开放，在知识交流和人民教育又迈出了重要一步。[SCOPE.sCharacter('manzoni_librarian_scope').GetFullName]被任命为首任图书管理员。"
 manzoni.600.f: "国立图书馆于18世纪末在欧洲兴起，并在漫长的19世纪达到鼎盛时期。国立图书馆目的是为公民提供受教育的机会，这被视为一项国家任务。与此同时，英国和法国的教育机构被视为榜样，因为它们传达了各自文化民族的主张及其使命，让随后的美国和俄罗斯的模仿者也接受了这一主张。通过科学领域的扩展和分化，国立图书馆也取代了私人学术图书馆。"
 manzoni.600.g: "香槟！香槟！"
 manzoni.601.t: "图书馆不再开放"
 manzoni.601.d: "行政管理部门努力确保首都的国立图书库存。因此决定关闭[SCOPE.sState('manzoni_library_state').GetName]中的图书馆并转移图书库存。"
 manzoni.601.f: "如果由于某种原因，[concept_manzoni_library]存在于首都之外，一半的藏书将自动转移到首都，首都以外的图书馆将被关闭。"
 manzoni.601.g: "这些精美的藏书将丰富我们的国立图书馆。"
 manzoni.601.h: "以这些藏书为基础，建设新的国立图书馆"
 manzoni.610.t: "[SCOPE.sCountry('manzoni_library_country').GetName]的国立图书馆"
 manzoni.610.d: "随着敌方首都被占领，[SCOPE.sCountry('manzoni_library_country').GetName]国立图书馆也落入我方控制之下。一些士兵在混乱中偷窃珍贵书籍，我们应该没收这些书籍并将其转移到我们自己的国立图书馆！"
 manzoni.610.f: "古列尔莫·利布里是意大利伯爵和数学家，因喜爱和盗窃珍贵的古代手稿而闻名于世。他有伽利略、费马、笛卡尔、莱布尼兹和其他名人的大约1800份手稿和书籍，他声称这些手稿和书籍是收集的（事实上，其中一些手稿和书籍是老楞佐图书馆偷来的）。1841年，古列尔莫·利布里通过与法国警察局长弗朗索瓦·吉佐的友谊，获任法国图书馆总督察。这项工作部分涉及贵重书籍和珍贵手稿的编目，这让他得以更好的窃取。他滥用职权，假装身体欠佳（无论刮风下雨都穿着大斗篷），独自一人在全国各地的图书馆档案室度过时光。在那里，他“借”来的东西从未归还。他成功盗走了3万多册图书。"
 manzoni.610.g: "没收书籍！"
 manzoni.610.h: "这是对艺术和文化的亵渎！"
 manzoni.611.t: "国立图书馆在战乱中被洗劫一空！"
 manzoni.611.d: "敌军洗劫了我国的国立图书馆！不知要花费多少年才能重现往日的辉煌！"
 manzoni.611.f: "古列尔莫·利布里是意大利伯爵和数学家，因喜爱和盗窃珍贵的古代手稿而闻名于世。他有伽利略、费马、笛卡尔、莱布尼兹和其他名人的大约1800份手稿和书籍，他声称这些手稿和书籍是收集的（事实上，其中一些手稿和书籍是老楞佐图书馆偷来的）。1841年，古列尔莫·利布里通过与法国警察局长弗朗索瓦·吉佐的友谊，获任法国图书馆总督察。这项工作部分涉及贵重书籍和珍贵手稿的编目，这让他得以更好的窃取。他滥用职权，假装身体欠佳（无论刮风下雨都穿着大斗篷），独自一人在全国各地的图书馆档案室度过时光。在那里，他“借”来的东西从未归还。他成功盗走了3万多册图书。"
 manzoni.611.g: "他们做了什么？！"
