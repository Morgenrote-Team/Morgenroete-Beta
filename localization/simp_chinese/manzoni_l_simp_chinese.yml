 manzoni.1000.t: "《血字的研究》"
 manzoni.1000.d: "一个运用逻辑和头脑侦破罪案的侦探。福尔摩斯是一个多么迷人的角色啊，阿瑟·柯南·道尔想出了一个如此有趣的概念。"
 manzoni.1000.f: "“知道它比解释为什么我知道它容易得多。如果你被要求证明二加二等于四，你可能会遇到一些困难，但你却对这个事实非常确定。”\n——阿瑟·柯南·道尔，《血字的研究》"
 manzoni.1000.a: "这是最基本的，我亲爱的华生。"
 manzoni.1100.g: "我希望我能住在阿尔卑斯山上！"
 manzoni.1101.g: "我是以貌取人还是以人格取人？"
 manzoni.1102.g: "如果我也听从权威人士的意见，也许可以找到人生的意义？"
 manzoni.1103.g: "我内心的狼也在嗥叫吗？"
 manzoni.1104.g: "我能再多看一些连环画吗？"
 manzoni.1200.t: "《约婚夫妇》"
 manzoni.1200.d: "《约婚夫妇》是亚历山德罗·曼佐尼创作的意大利历史小说，1827年首次出版，共三卷。它是意大利第一部历史小说，也是后来意大利文学小说的典范与现代意大利语的基础。19世纪初，关于意大利文学标准语的形式仍存在一些争议。原籍米兰的曼佐尼坚定地支持佛罗伦萨方言，在“阿诺河畔洗刷了他的词汇”之后（如他本人所说），他修改了小说的语言，以便在1842年重新出版。"
 manzoni.1200.f: "小说以1628年的北意大利为背景，讲述了住在科莫湖畔一个村庄里的两个年轻人伦佐和卢西娅想要结婚，却遭到当地封建主的阻止和迫害，封建主看上了卢西娅，因此他们不得不逃离村庄。小说中的许多表达、名言和人名在意大利语中仍被广泛使用，如“佩佩图亚”（意为牧师家的女佣人）与“这桩婚事不能举行”，该书至今仍被视为名副其实的世界文学名著。由于书中的故事发生在西班牙占领时期，《约婚夫妇》常常被解读为对奥地利在19世纪意大利统治的隐晦攻击。"
 manzoni.1200.g: "谁会在乎一本傻乎乎的意大利语小说？"
 manzoni.1200.h: "意大利文化的巅峰！"
 manzoni.1202.t: "《金雀花》"
 manzoni.1202.d: "贾科莫·莱奥帕尔迪创作了一部杰出且著名的浪漫主义相关诗作。莱奥帕尔迪与亚历山德罗·孟佐尼一同对意大利语产生了巨大影响，是意大利爱国主义运动的代表人物之一，但他对民族主义和进步信仰持保留态度。他经常写一些关于诗歌的文章，以及他自己对诗歌、诗歌语言和诗歌题材的看法。莱奥帕尔迪于1837年去世，年仅38岁。"
 manzoni.1202.f: "《金雀花》是贾科莫·莱奥帕尔迪的倒数第二首抒情诗。开篇描写了维苏威山麓，这座火山于公元79年爆发，在曾经矗立着别墅、花园和繁华都市的土地播下了毁灭和死亡的种子。从这一刻起，诗人转向了金雀花，金雀花成为了他诗歌话语中的重要对话者：莱奥帕尔迪将自己交给了记忆，他告诉金雀花，他已经在荒芜的乡村看到过它。因此，金雀花被认为是美丽的象征，是面对毁灭的抵抗。然而，即使是金雀花也终究要向不可避免的命运低头，这首诗强调了人类生存的短暂性与自然力量的对比。莱奥帕尔迪以此嘲讽了人类主宰自然或将物质财富和权力凌驾于更高理想之上的观点。"
 manzoni.1202.g: "多么忧郁。"
 manzoni.1203.t: "《新韵集》"
 manzoni.1203.d: "焦苏埃·卡尔杜奇被视为是现代意大利的官方民族诗人，是意大利文化和政治生活的一部分。卡尔杜奇是一位受欢迎的演讲者，也是一位对文学和社会的激进批评家。他的诗集《新韵集》和《野蛮颂歌》包含了他最伟大的作品。他还将歌德和海涅的一些作品翻译成意大利文。在去世前一年，卡尔杜奇成为第一位获得诺贝尔文学奖的意大利人。"
 manzoni.1203.f: "诗集《新韵》以一首间奏作为前导，捕捉到了雨果、冯·普拉滕、歌德、海涅、波德莱尔和坡的回声与主题。其中的内容和形式在很大程度上源于之前的作品，但更加深入和成熟。在《新韵》中出现的主题中，对过去和历史记忆的崇拜占据了重要位置，人们首先通过对自治城市时代的赞美，感受到了建立平等自由社会的梦想，自治城市时代被视为道德健康和公民生活的典范。卡杜尔奇还以法国大革命作为民主扩张的另一个范例，在《Ça ira》的十二首十四行诗中对大革命进行了回顾。"
 manzoni.1203.g: "可是，你能相信一个为撒旦写赞美诗的人吗？"
 manzoni.1204.t: "《柽柳》"
 manzoni.1204.d: "就读于博洛尼亚大学时，乔瓦尼·帕斯科利曾受到焦苏埃·卡尔杜奇的指导。即使在实证主义和科学盛行的时代，帕斯科利也认为生命是一个谜团。只有在大自然的卑微事物中发现象征性的联想，才能让人窥见表象背后的真相。他后来的诗歌主题相似，但更具实验性，反映了他对古典文物的了解。这些诗歌对后来的意大利诗人影响很大，他们将帕斯科利的忧郁主题融入了自己的作品当中。帕斯科利用意大利语和拉丁语写作。"
 manzoni.1204.f: "《柽柳》是乔瓦尼·帕斯科利的诗集，其题目取自维吉尔《牧歌·其四》的第二句。这部诗集几乎贯穿了作者诗歌创作的整个过程，因此可以说其创作历程与帕斯科利诗歌意识的发展相吻合。《柽柳》中的诗歌展现了一种象征性的世界观，直观地揭示了事物之间的类比和神秘的对应关系，是一种充满困惑和迷茫的生命意识。生命的神秘感、痛苦、死亡和忧郁是帕斯科利诗歌中广泛存在的主体，他的诗歌还以巢穴隐喻家园。"
 manzoni.1204.g: "一位伟大的小诗人。"
 manzoni.1205.g: "作者是在取笑西格蒙德·弗洛伊德吗？"
 manzoni.1206.t: "《欢乐》"
 manzoni.1206.d: "加布里埃尔·邓南遮在意大利文学和政治生活中占有重要地位。他被昵称为“诗人”和“先知”。邓南遮的文学作品与颓废运动有着密切的联系，颓废运动与法国象征主义和英国唯美主义有着密切的关系。在他成功的巅峰时期，邓南遮因其作品的独创性、力量和颓废性而闻名，他的作品在整个欧洲和几代意大利作家中产生了巨大的影响。"
 manzoni.1206.f: "《欢乐》是邓南遮的第一部小说。正如一个世纪前乌戈·福斯科洛的《雅科波·奥尔蒂斯的最后书简》一书在意大利传播了浪漫主义思潮和敏感心理一样，《欢乐》及其主人公安德烈亚·斯佩雷利在十九世纪末将颓废倾向和唯美主义引入了意大利文化。邓南遮开创了一种新型的心理内省散文，注定会取得巨大成功，这也使他得以探究“知识分子种族最后的后裔”生活中的错误和逆境。"
 manzoni.1206.g: "这是象征主义还是已经颓废了？"
 manzoni.1207.g: "这部儿童故事如果能拍成电影肯定会更加成功。"
 manzoni.1208.g: "意大利年轻人的爱国主义小说！"
 manzoni_great_writer: "大作家"
 manzoni_great_writer_desc: "该角色是当代最伟大的作家之一，其文学作品闻名世界。"
