 manzoni.332.d: "一位举世闻名的作家向我国致敬，[SCOPE.sCharacter('manzoni_writer_scope').GetSheHe|U]正在进行阅读之旅。"
 manzoni.332.f: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]是来自[SCOPE.sCharacter('manzoni_writer_scope').GetHomeCountry.GetName]的作家，其声望为[SCOPE.sCharacter('manzoni_writer_scope').MakeScope.GetVariable('manzoni_writer_experience').GetValue|V0]。在[SCOPE.sCharacter('manzoni_writer_scope').GetHerHis]数不清的作品中，有[SCOPE.sCharacter('manzoni_writer_scope').MakeScope.GetVariable('manzoni_num_bestsellers_var').GetValue|V0]部畅销书，[SCOPE.sCharacter('manzoni_writer_scope').GetHerHis]的作品在[SCOPE.sCharacter('manzoni_writer_scope').MakeScope.GetVariable('manzoni_num_book_licenses_var').GetValue|V0]个国家中均有出版。"
