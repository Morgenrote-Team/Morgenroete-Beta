 manzoni.1205.t: "《泽诺的意识》"
 manzoni.1205.d: "阿隆·埃托雷·施米茨，更广为人知的笔名是伊塔洛·斯韦沃，是一位[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]和商人，著有长篇小说、剧本和短篇小说。斯韦沃是爱尔兰小说家和诗人詹姆斯·乔伊斯的密友，被视作是意大利心理小说的先驱，他最著名的作品是现代主义小说《泽诺的意识》，这部小说成为广受赞赏的意大利文学经典。斯韦沃还是乔伊斯《尤利西斯》中主人公利奥波德·布鲁姆的原型。"
 manzoni.1205.f: "“与其他疾病不同，生命总是致命的。它不容忍治疗。就像堵住我们身体上的孔洞，把它们当作伤口一样。我们会在接受治疗的那一刻窒息而死。”\n"
 manzoni.1207.t: "《木偶奇遇记》"
 manzoni.1207.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]原名卡洛·洛伦齐尼，是一名记者与作家，他最广为人知的作品是木偶匹诺曹复活的故事，《木偶奇遇记》最初以连载故事的形式出现在1880年的《儿童报》上，1883年分两卷出版。故事讲述了一个名叫匹诺曹的木偶和他的创造者穷木匠之间的淘气冒险故事。"
 manzoni.1207.f: "“良心是那微弱的声音，人们却不愿意听从。”\n"
 manzoni.1208.t: "《爱的教育》"
 manzoni.1208.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]斯是意大利作家与记者，后来以儿童文学而闻名。亚米契斯是一名爱国者，参加过意大利独立战争，但因对军队的失望而辞职。作为一名公开的共济会成员，亚米契斯在其作品中努力用世俗美德和对国家的承诺取代意大利人灵魂深处的天主教观念。晚年，社会主义思想对他产生了重要影响。"
 manzoni.1208.f: "“特将此书奉献给九岁至十三岁的小学生们。也可以用这样的书名：一个意大利市立小学三年级学生写的一学年之纪事。——然而我说：一个三年级的小学生，我不能断定他就能写成恰如此书所印的一般。他是本自己的能力，慢慢的笔记在校内校外之见闻及思想于一册而已。年终他的父亲为之修改，仔细地未改变其思想，并尽可能保留儿子所说的这许多话。四年后，儿子入了中学，重读此册，并凭自己记忆力所保存的新鲜人物又添了些材料。亲爱的孩子们，现在读这书吧，我希望你们能够满意，而且由此得益！”\n——爱德蒙多·德·亚米契斯"
 manzoni.1208.h: "多好的书啊。"
 manzoni.1306.t: "《柏林，亚历山大广场》"
 manzoni.1306.d: "《柏林，亚历山大广场》由[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]创作，讲述了工人弗兰茨·毕勃科普夫出狱后无法重新适应正常生活，又重新走上犯罪道路的故事。毕勃科普夫不仅要与内心魔鬼和外在诱惑的作斗争，还要与大都市柏林作斗争，时时刻刻面临着灭亡的威胁。"
 manzoni.1306.f: "“你不应该担心你的命运。我是命运的反对者。我不是希腊人，我是柏林人。”\n"
 manzoni.1306.g: "真是一部现代主义的开创性作品……"
 manzoni.1403.t: "《小王子》"
 manzoni.1403.d: "《小王子》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]写的书，书中描写一个来自小星球的小王子来到了其他星球，在那里他遇到了不同的人，这些人都是不同类型的成年人的漫画形象。王子希望在旅行中了解宇宙。他能找到答案吗？"
 manzoni.1403.f: "“所有大人都曾是小孩, 可惜只有少数人记得这件事。”\n"
 manzoni.1403.g: "了解宇宙？ 这听起来不可思议……"
 manzoni.1901.t: "《尤利西斯》"
 manzoni.1901.d: "《尤利西斯》是一部现代小说，作者是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]。在这部小说中，作者笔下的主人公詹姆斯·乔伊斯在旅途中访问了多个地方，仿佛在带领读者游历都柏林。其中小说的一大特色是展现了人们的思想和联想，表达为在人的脑海中闪过的情景。"
 manzoni.1901.f: "“我是山上的一朵花，是的，当我把玫瑰插在发梢像安达卢西亚女孩那样，也许我该身着红衣，是的，他在摩尔人的墙下吻我，而我在想好吧，他也许和其他人一样，然后他问我是否愿意说同意，我山上的花朵。我先抱住他，是的，然后让他俯下身来好感觉到我的双乳所有的香水，是的，而他的心狂跳着，是的，我会说，是的，我会，是的。”\n——詹姆斯·乔伊斯，《尤利西斯》"
 manzoni.1901.g: "这是一种有趣的新写法！"
 manzoni_company_basic_publishing_industries: "印刷厂"
 manzoni_company_basic_publishing_industries_dynamic_name_tag_singular: "印刷厂"
 manzoni_company_basic_publishing_industries_dynamic_name_tag_plural: "印刷厂"
 manzoni.500.d: "本土作家[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]表示已经无法再忍受当前的政府了。[SCOPE.sCharacter('manzoni_writer_scope').GetSheHe|U]决定投身政治来把国家变得更好。问题在于——我们会同意吗？"
 manzoni.801.t: "漂亮的插图"
 manzoni.801.d: "为了[SCOPE.sCharacter('manzoni_writer_scope').GetHerHis]的最新作品，[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]得以说服画家[SCOPE.sCharacter('klimt_painter_scope').GetFullName]提供一些插图。第一批完成的插图无比精美，令[SCOPE.sCharacter('manzoni_writer_scope').GetLastName]激动不已。"
 manzoni.801.f: "这幅插图非常精美！我想知道画家是否隐藏了一些小细节，以便让我们了解更多的故事？"
 manzoni.801.g: "这些细节令人难以置信！"
 manzoni.801.h: "这将成为畅销书！"
 manzoni.801.h_tt: "这将提高[GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetLastName]撰写[concept_manzoni_bestseller]的概率。"
 manzoni.802.t: "外星生命理论"
 manzoni.802.d: "科幻小说作家[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]和我们的天文学家[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]博士会面讨论了外星生命的可能性。他们一起假设了这种生命可能是什么样子的，以及在哪里可能存在。他们将自己的理论作为[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]‑[SCOPE.sCharacter('manzoni_writer_scope').GetLastName]假说发表。"
 manzoni.802.f: "“显然，这些生物会生活在气态巨行星的气态海洋中。我认为它们无法与外界交流，但如果它们能找到一种方法，让它们在新的气态巨行星上殖民呢？ 我们甚至有可能在其中一个殖民地看到一场革命！”"
 manzoni.802.g: "也许我们应该寻找外星人？"
 manzoni.802.h: "他们应该把自己的理论写成一本书！"
 manzoni.802.i: "有趣得很！"
 manzoni.803.t: "[SCOPE.sCharacter('manzoni_adventurer_scope').GetFullName]奇遇记"
 manzoni.803.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]听说了[SCOPE.sCharacter('manzoni_adventurer_scope').GetLastName]博士的冒险经历，决定与[SCOPE.sCharacter('manzoni_adventurer_scope').GetHerHim]面谈。他们聊了很久，[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]为[SCOPE.sCharacter('manzoni_writer_scope').GetHerHis]的下一本书收集到很多想法。"
 manzoni.803.f: "“既然你提到了，我记得有海盗！ 事实上，他们是拿食人鱼当宠物的海盗”"
 manzoni.803.g: "我希望这将证明是有效的！"
 manzoni.804.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]受气球飞行感发"
 manzoni.804.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]陪同我国的诗人[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]进行了一次气球飞行。[SCOPE.sCharacter('manzoni_writer_scope').GetLastName]归来后似乎诗兴大发。"
 manzoni.804.f: "“我们在云海中徜徉，地上行人如蚁。真似登仙一般！”"
 manzoni.804.g: "啊，飞行之美——"
 manzoni.804.h: "或许[SCOPE.sCharacter('manzoni_writer_scope').GetHerHis]现在是个更好的诗人！"
 manzoni.804.i: "他要是能独立飞行会怎么样？"
 manzoni.805.t: "群山之美"
 manzoni.805.d: "[SCOPE.sCharacter('mountaineer_scope').GetFullName]和著名登山家[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]一起游览了一座山峰。登山的过程很艰辛，但登上山顶后[SCOPE.sCharacter('manzoni_writer_scope').GetLastName]对眼前的景色赞叹不已。"
 manzoni.805.f: "“雾海环绕，只有几座山峰将我阻隔，我凝视着冉冉升起的太阳，美景尽收眼睑。”"
 manzoni.805.g: "山给了许多诗人灵感！"
 manzoni.805.h: "我希望山里的空气能帮助[SCOPE.sCharacter('manzoni_writer_scope').GetHerHim]写出更好的诗！"
 manzoni.805.i: "也许这家伙应该成为一名登山家[SCOPE.sCharacter('manzoni_writer_scope').GetHerselfHimself]?"
 manzoni.1003.t: "《金银岛》"
 manzoni.1003.d: "《金银岛》由[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]编写，讲述了小男孩吉姆·霍金斯寻找宝藏的旅程。吉姆发现了一张藏宝图并把给了当地的乡绅、医生和船长，众人决定带吉姆一起去金银岛寻宝。他们雇了一艘大船——伊斯帕尼奥拉号，并招募了一些船员，其中有个一条腿的厨子。快到金银岛的时候，吉姆无意间偷听到了几个船员的对话，才发现一些海盗混入了船员中，并把大部分船员都招募了，承诺找到财宝后杀掉船长和医生，瓜分宝藏，吉姆能在这次冒险中幸存下来吗？"
 manzoni.1003.f: "“这就是我们万里迢迢来寻找的弗林特的宝藏，伊斯班袅拉号上已有十七个人为此送了命。这些财宝聚集了多少人的血和泪，多少艘大船沉入海底，多少勇敢的人被逼着蒙住眼睛走在伸出船外的板子上，然后一头栽进海水里，多少次战火硝烟，多少耻辱、欺诈和残暴的行为，恐怕没有一个活着的人能够讲清楚。”\n"
 manzoni.1003.g: "啊哈！"
 manzoni.1004.t: "《弗兰肯斯坦》"
 manzoni.1004.d: "《弗兰肯斯坦》的作者是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]，在这部小说讲述主角弗兰肯斯坦是个热衷于生命起源的生物学家，他怀着犯罪心理频繁出没于藏尸间，尝试用不同尸体的各个部分拼凑成一个巨大人体。当这个怪物终于获得生命睁开眼睛时，弗兰肯斯坦被他的狰狞面目吓得弃他而逃，他却紧追不舍地向弗兰肯斯坦索要女伴、温暖和友情；接踵而至的更是一系列诡异的悬疑和命案。"
 manzoni.1004.f: "“即使他精神崩溃，也没有人比他更能深刻地感受到大自然的美丽。星空、大海以及这些奇妙地域所提供的每一处景象，似乎仍然有能力将他的灵魂从尘世中提升出来。这样的人有双重存在：他可能遭受痛苦，被失望压垮；然而，当他退回到自己内心时，他就像一个被光环围绕的天使，在他的光环内，没有悲伤或愚蠢敢于靠近。”\n"
 manzoni.1004.g: "让死亡复活，那不是很好吗？"
 manzoni.1005.t: "《爱丽丝漫游仙境》"
 manzoni.1005.d: "在《爱丽丝漫游奇境记》中，年轻的爱丽丝掉进了兔子洞，发现自己来到了一个陌生的世界。这本由[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]撰写，书中出现了各种奇妙的生物和成年人创造的怪异规则，全书嘲笑了维多利亚时代的道德主义世界。"
 manzoni.1005.f: "“如果我有一个属于自己的世界，一切都会是胡说八道。没有什么会是它本来的样子，因为一切都会是它不是的样子。反过来说，什么是，它就不会是。什么不是，它就会是。你明白吗？”\n"
 manzoni.1005.g: "有趣的读物！"
 manzoni.1006.t: "《小熊维尼》"
 manzoni.1006.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]受儿子克里斯多福·罗宾·米尔恩的和他的毛绒玩具启发，创作了《小熊维尼》。这是一本短篇故事集，主要讲述了小熊维尼和他的朋友们的故事，维尼在其中经历了各种冒险。"
 manzoni.1006.f: "“‘嗯，’小熊维尼说，‘我最喜欢的，’然后他不得不停下来思考。因为虽然吃蜂蜜是一件非常好的事情，但在你开始吃之前的那一刻，比你正在吃的时候还要好，但他不知道那叫什么。”\n——艾伦·亚历山大·米尔恩，《小熊维尼》"
 manzoni.1006.g: "把玩具熊当朋友听起来很棒！"
 manzoni.1007.t: "《斯泰尔斯庄园奇案》"
 manzoni.1007.d: "《斯泰尔斯庄园奇案》是一部侦探小说，作者是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]。小说介绍斯泰尔斯庄园的主人中毒身亡，离奇的死亡令整座宅子陷于风雨飘摇之中。这时，住在附近的一个比利时人出面调查此案，而他正是在比利时享有神探美誉的主角赫尔克里·波洛。波洛后来共出现在[SCOPE.sCharacter('manzoni_writer_scope').GetLastNameNoFormatting]的33部小说中。"
 manzoni.1007.f: "“你给了你的想象力太多的自由。想象力是一个好的仆人，但却是一个坏的主人。最简单的解释往往是最可能的。”\n"
 manzoni.1007.g: "不知道我还能不能再见到赫尔克里·波洛？"
 manzoni.1008.t: "《丛林奇谭》"
 manzoni.1008.d: "《丛林奇谈》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]编写的图书。作品中塑造了机智勇敢的“狼孩”毛克利以及憨厚的老熊巴鲁、机敏的黑豹巴希拉、不畏艰险的白海豹柯迪克和不惧强暴的大蟒蛇卡阿等诸多个性鲜明、令人难忘的形象，故事情节惊险曲折、引人入胜。"
 manzoni.1008.f: "“丛林法则的美妙之处在于，惩罚能解决所有问题。事后不会有任何纠缠。”\n"
 manzoni.1008.g: "寻找最基本的必需品！"
 manzoni.1009.t: "《彼得兔的故事》"
 manzoni.1009.d: "《彼得兔的故事》讲述了比得兔闯入麦格雷戈先生的花园，随后在花园里被追逐的故事。由 [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]撰写的这个故事对于一本儿童读物来说是激进和创新的，其中有许多创新在以前的儿童文学作品中并不常见。"
 manzoni.1009.f: "“从前有四只小兔子，他们的名字分别是—— 弗洛普希、莫普希、棉花尾和彼得。”\n"
 manzoni.1009.g: "进入禁园，听起来很有趣！"
 manzoni.1010.t: "《到灯塔去》"
 manzoni.1010.d: "《到灯塔去》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]所著的现代小说，描绘了斯凯岛上拉姆齐一家的假日生活，以思想和观察而非对白和动作为主线。"
 manzoni.1010.f: "”人生的意义是什么？就这么一个简单的问题；随着岁月的流逝，不断向你逼近的一个问题。那个伟大的启示从未出现。那个伟大的启示也许永远不会出现。取而代之的是日常生活中的小小奇迹和启发，如同黑夜里不经意间被擦亮的一根火柴。“\n"
 manzoni.1010.g: "家庭……"
 manzoni.1307.t: "《布登勃洛克家族：一个家族的衰落》"
 manzoni.1307.d: "《布登勃洛克家族：一个家族的衰落》是第一部德语社会小说。在这部小说中，[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]描述了汉萨城市吕贝克一个富商家庭四代人的衰落过程。"
 manzoni.1307.f: "“往往，幸福和成功的外在和可见的物质标志和象征，只有在衰退过程已经开始时才会显现出来。这些外在表现需要时间——就像那颗星星的光芒，实际上可能已经熄灭了，但在我们看来却是最亮的。”\n"
 manzoni.1307.g: "我希望家族没有衰落。"
 manzoni.1404.t: "《茶花女》"
 manzoni.1404.d: "《茶花女》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]所作，该小说讲述玛格丽特是个农村姑娘，长得异常漂亮。她来巴黎谋生，不幸做了妓女。富家青年阿尔芒赤诚地爱她，唤起了她对爱情生活的向往。但是阿尔芒的父亲反对这门婚事，迫使她离开了阿尔芒。阿尔芒不明真相，便寻机羞辱她，终于使她在贫病交加之中含恨死去。"
 manzoni.1404.f: "“她对细微事物的喜悦就像孩子一样。有些日子，她会像十岁的孩子一样在花园里追逐蝴蝶或蜻蜓。这位花费了比养活一个家庭还多的钱在花束上的交际花，有时会坐在草地上一个小时，仔细观察那朵与她同名的简单花朵。”\n"
 manzoni.1404.g: "永不消逝的爱啊！"
 manzoni.1405.t: "《包法利夫人》"
 manzoni.1405.d: "《包法利夫人》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]创作的小说。作品讲述的是一个受过贵族化教育的农家女爱玛的故事。她瞧不起当乡镇医生的丈夫包法利，梦想着传奇式的爱情。可是她的两度偷情非但没有给她带来幸福，却使她自己成为高利贷者盘剥的对象。最后她积债如山，走投无路，只好服毒自尽。"
 manzoni.1405.f: "“然而，在她心底，她一直在等待某件事情的发生。像遇难的水手一样，她绝望地注视着她生活的孤独，远远地在地平线的雾霭中寻找一片白帆。她不知道这个机会会是什么，什么风会带给她，驶向哪个岸边，是一艘小船还是三桅帆船，满载着痛苦还是幸福。然而，每天早晨，当她醒来时，她希望那天会到来；她倾听每一个声音，猛然惊起，奇怪它为什么没有到来；然后在日落时分，总是更加悲伤，她渴望着明天。”\n"
 manzoni.1405.g: "这本书有点……奇怪。"
 manzoni.1406.t: "《羊脂球》"
 manzoni.1406.d: "《羊脂球》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]所作的一篇短篇小说。当普鲁士人占领诺曼底部分地区时，一群法国人逃离家园，但他们却意外进入了占领区，并被拘留。普鲁士军官提出要羊脂球陪自己过夜。羊脂球面对侵略者的无耻要求断然拒绝了，于是同行的一车人都扣留了下来。除了羊脂球外其余的人都急坏了，为了达到自己的目的、为了维护自己的利益，九个人想尽了办法、施展了种种阴谋想迫使羊脂球就范，但几天后情况发生了变化……"
 manzoni.1406.f: "“镇上的人们在黑暗的房间里茫然若失，仿佛遭遇了某种灾难，某种毁灭性的地震，所有的智慧和抵抗都无济于事。每当既定秩序被打破，安全被摧毁，一切受人类或自然法则保护的事物突然暴露在野蛮无理的暴力之下时，这种感觉就会产生。”"
 manzoni.1406.g: "把自己的救人竟如此中伤……"
 manzoni.1407.t: "《怪盗：亚森·罗宾》"
 manzoni.1407.d: "《怪盗：亚森·罗宾》是一本短篇小说集，主人公是怪盗绅士亚森·罗宾。由[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]笔下的故事描述了罗宾如何先是被捕，然后越狱，并在最后一个故事中面对夏洛克·福尔摩斯。"
 manzoni.1407.f: "“真遗憾，我不是一个诚实的人！”\n"
 manzoni.1407.g: "谁能赢到最后——夏洛克·福尔摩斯？还是亚森·罗宾？"
 manzoni.1408.t: "《追忆似水年华》"
 manzoni.1408.d: "《追忆似水年华》讲述的是19世纪末20世纪初上流社会法国的叙述者对童年和成年经历的回忆。作者[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]尤其将不由自主的记忆作为情节发展的手段。"
 manzoni.1408.f: "“我们与他人之间的联系只存在于我们的心中。随着记忆的淡化，这些联系也会松动。尽管我们希望被爱、友谊、礼貌、尊重、责任等所欺骗，并因此欺骗他人，但我们实际上是孤独的。人是无法逃离自己的生物，他只能在自己身上认识他人，当他声称相反时，他是在撒谎。”\n"
 manzoni.1408.g: "这本书让我想起了一些事情……"
 manzoni.1409.t: "《小法黛特》"
 manzoni.1409.d: "《小法黛特》中，一对双胞胎兄弟爱上了法黛特。起初，他们的关系违背了村里的父权规定和期望，但当法黛特继承了一笔财产后，一切都改变了。[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]利用她的农村出身来准确描述村庄及其居民。"
 manzoni.1409.f: "“上帝只抛弃那些自我放弃的人，而那些有勇气将悲伤埋藏在心中的人，比那些抱怨的人更有力量去对抗它。”\n"
 manzoni.1409.g: "聪明的年轻人！"
 manzoni.1501.t: "《汤姆叔叔的小屋》"
 manzoni.1501.d: "《汤姆叔叔的小屋》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]描写奴隶制罪恶和恐怖的书，这部小说以动人的笔触描绘了奴隶制下的生活惨状。"
 manzoni.1501.f: "“……心中无泪可流，只能滴血，默默地流尽。”\n"
 manzoni.1501.g: "这听起来糟透了！"
 manzoni.1502.t: "《宾虚：基督的故事》"
 manzoni.1502.d: "在《宾虚：基督的故事》中，[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]描述了犹太人犹大·宾虚被罗马人奴役后成为战车手的一生，通篇故事暗示了耶稣的一生。"
 manzoni.1502.f: "“信任上帝更美好。这个世界上的美丽都是出自他的手，宣告着品味的完美；他是所有形式的创造者；他为百合穿上衣裳，他为玫瑰上色，他蒸馏露珠，他创造自然的音乐；总之，他为我们安排了这生命，并规定了其条件；这些条件对我来说是如此的保证，以至于像一个小孩子一样信任他，我将灵魂的安排和死后生活的每一个安排都交给他。我知道他爱我。”\n——刘·华莱士，《宾虚：基督的故事》"
 manzoni.1502.g: "一位真正的基督徒！"
 manzoni.1503.t: "《白鲸》"
 manzoni.1503.d: "《白鲸》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]的一部小说，小说以年轻水手以实玛利的视角展现了亚哈船长对白鲸的痴迷。在鲸鱼咬掉亚哈膝盖以下的腿后，亚哈只知道一个人生目标：复仇。"
 manzoni.1503.f: "“每当我发现自己绷紧了嘴角；每当我的心情有如潮湿阴雨的十一月天气；每当我发现自己不由自主地在棺材铺门前驻足流连，遇上一队送葬的行列必尾随其后；特别是每当我的忧郁症发作到了这等地步：我之所以没有存心闯到街上去把行人的帽子一顶顶打飞，那只是怕触犯了为人处世的道德准则——一到这种时候，我便心里有数：事不宜迟，还是赶紧出海为妙。”\n"
 manzoni.1503.g: "我的鲸鱼是什么？"
 manzoni.2100.t: "《桑沧偶录》"
 manzoni.2100.d: "《桑沧偶录》是由范廷琥和阮案编写的故事集，记录了18世纪末和19世纪初越南的宗教和社会事件。该书共收录了89个故事，分为上下两册，包括伟人传记、风景游记、历史遗迹以及地方传说。这些记录为我们提供了一个独特的视角，了解在后黎朝晚期和阮朝早期动荡的越南生活。"
 manzoni.2100.f: "“自李、陈、黎、郑之来，上下数百载，间有国史所未详，稗官所未载，二公皆于桑沧眼界收之。使二公者一以桑沧忘之，几何不为火上之灰，酱中之覆。幸以桑沧录之，而犹为迷津渡筏，暗室传灯，谓之《桑沧偶录》，意可知矣。”"
 manzoni.2100.g: "黑暗时代的故事，我们必须要做得更好。"
 manzoni.2200.t: "荣誉决斗"
 manzoni.2200.d: "在[SCOPE.sCharacter('manzoni_writer_scope').GetLastName]向乔治·丹特斯（他妻子的所谓仰慕者）寄出一封极尽侮辱之能事的信后，后者向他提出了决斗的挑战。现在，两人面对面的时候到了。"
 manzoni.2200.f: "“决斗规则规定，两个对手在约定的距离一字排开。他们必须背对对手，信号发出后，两名决斗者转身走向对方。他们决定何时开枪。谁先开枪，谁就必须站在原地不动。你们都同意这些规则吗？”"
 manzoni.2200.g: "我希望他能活下去！"
 manzoni.2200.h: "这个惹祸精还是赶紧死掉吧！"
 manzoni.2201.t: "《罪与罚》"
 manzoni.2201.d: "《罪与罚》的作者[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]讲述了圣彼得堡贫困的大学生拉斯柯尔尼科夫的精神痛苦和道德困境。"
 manzoni.2201.f: "“痛苦和苦难对于一个有着巨大智慧和深刻心灵的人来说总是不可避免的。我认为，真正伟大的人在世上必定有着巨大的悲伤。”\n"
 manzoni.2201.g: "好在我什么都不欠！"
 manzoni.2202.t: "《战争与和平》"
 manzoni.2202.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]创作的《战争与和平》以不同的笔触描写从平民到贵族的俄国社会的种种图景。该书的背景年代是拿破仑战争，三个主人公的命运都因此而改变。"
 manzoni.2202.f: "“人们无法判断什么是对什么是错。人们一直以来都在犯错，并且将继续犯错，尤其是在他们认为对与错的事情上。”\n"
 manzoni.2202.g: "一部真正的杰作！就是有点长……"
 manzoni.2300.t: "《当世书生气质》"
 manzoni.2300.d: "《当世书生气质》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]创作的日本第一批现代小说之一。与他创作的文学理论作品《小说神髓》一样，这些书让小说和戏剧在日本更为普及了。"
 manzoni.2300.f: ""
 manzoni.2300.g: "现在日本也有小说了！"
 manzoni.2400.t: "《布拉斯·库巴斯死后的回忆》"
 manzoni.2400.d: "《布拉斯·库巴斯死后的回忆》中的主人公正是布拉斯·库巴斯，[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]准许他在死后报道自己的生活，并由此批判巴西社会。这是马查多的第一部现实主义作品，一些人物和元素在后来的作品中再次出现。"
 manzoni.2400.f: "“我将这些死后的回忆录献给最先啃食我尸体冰冷肉体的蠕虫，作为美好的回忆。”\n——马查多·德·阿西斯，《布拉斯·库巴斯死后的回忆》"
 manzoni.2400.g: "被一个死人批评！"
 manzoni.2401.t: "《伊拉西马》"
 manzoni.2401.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]所著的《伊拉西马》尝试展示第一个巴西人的诞生故事。故事中，原住民伊拉西马与葡萄牙殖民者马蒂姆生下一个儿子，取名莫阿西尔。书名“伊拉西马”（Iracema）是“美洲”（America）的变位词，寓示其殖民主题。"
 manzoni.2401.f: "“鹦鹉在棕榈叶中歌唱，那是我出生的绿色海洋。“\n——若泽·德·阿伦卡尔，《伊拉西马》"
 manzoni.2401.g: "一个故事建立了一个国家……"
 manzoni.2402.t: "《贫民窟》"
 manzoni.2402.d: "《贫民窟》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]的一部自然主义小说。[SCOPE.sCharacter('manzoni_writer_scope').GetLastName]描绘了贫民窟中葡萄牙人和其他移民形形色色的生活。这些人尝试适应自己的新家园，并变得与以往不同。"
 manzoni.2402.f: "”在那片潮湿、蒸腾的土地上，在那片炙热、泥泞的湿气中，一个世界开始蠕动、萌芽、生长，一个生命体，一代人，似乎自发地从泥土中涌现出来，像粪便中的蛆一样繁殖。“\n——阿卢伊西奥·阿泽维多，《贫民窟》"
 manzoni.2402.g: "我们怎能容许这样的贫民窟存在？"
 manzoni.2500.t: "《狂人日记》"
 manzoni.2500.d: "《狂人日记》是[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]所著的现代汉语白话文小说。在故事中，叙述者的兄弟变得日渐疯狂，并怀疑其他人是试图迫使他自杀的食人者。"
 manzoni.2500.f: "“我忍不住，便放声大笑起来，十分快活。自己晓得这笑声里面，有的是义勇和正气。老头子和大哥，都失了色，被我这勇气正气镇压住了。”\n"
 manzoni.2500.g: "至少我周围没有吃人的人！"
