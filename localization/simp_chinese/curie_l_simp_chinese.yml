 curie.11.t: "发现铀矿！"
 curie.11.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]博士在[SCOPE.sState('curie_uranium_state_scope').GetName]进行样本采集时，发现了极为丰富的铀矿资源。目前，物理学家与化学家均建议对该矿藏进行直接开采。"
 curie.11.f: "铀是92号化学元素，符号为U。含铀化合物在19世纪被广泛用于着色，如玻璃、陶瓷、花瓶及其他装饰品，乃至日常生活用品如碗或眼镜等等。在波希米亚的约阿希姆斯塔尔，玻璃制造商早在1826年就掌握了使用含铀化合物上色的技术。这一技术直到20世纪中叶才被其他危害更小的着色矿物取代。从橙色到鲜红色的含铀陶瓷釉料曾被用于从餐具到建筑配件的各种物品上。这种陶瓷在美国因其制造商而得名“Fiestaware”，这可能是许多美国家庭中仍能找到的放射性最强的物品。"
 curie.11.g: "在那开采铀矿！"
 curie.12.t: "约阿希姆斯塔尔"
 curie.12.d: "截至目前，波希米亚约阿希姆斯塔尔的铀矿仅产出少量矿石。然而，随着铀在工业制造与科学领域的应用前景逐渐明朗，需求显著增长，现已制定计划，将大幅扩大开采规模。"
 curie.12.g: "约阿希姆斯塔尔将成为铀生产的心脏！"