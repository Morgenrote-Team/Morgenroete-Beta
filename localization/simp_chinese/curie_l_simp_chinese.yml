 curie.10.t: "在[SCOPE.sState('curie_uranium_state_scope').GetName]发现铀矿"
 curie.10.d: "一位地质学家在[SCOPE.sState('curie_uranium_state_scope').GetName]的样品采集过程中发现了异常丰富的铀矿。物理学家和化学家对此非常感兴趣。"
 curie.10.f: "铀是92号化学元素，符号为U。含铀化合物在19世纪被广泛用于着色，如玻璃、陶瓷、花瓶及其他装饰品，乃至日常生活用品如碗或眼镜等等。在波希米亚的约阿希姆斯塔尔，玻璃制造商早在1826年就掌握了使用含铀化合物上色的技术。这一技术直到20世纪中叶才被其他危害更小的着色矿物取代。从橙色到鲜红色的含铀陶瓷釉料曾被用于从餐具到建筑配件的各种物品上。这种陶瓷在美国因其制造商而得名“Fiestaware”，这可能是许多美国家庭中仍能找到的放射性最强的物品。"
 curie.10.g: "广阔前景！"
