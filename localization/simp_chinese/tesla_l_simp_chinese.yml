 je_tesla_transatlantic_cable: "跨大西洋电缆"
 je_tesla_transatlantic_cable_reason: "海底电报电缆的建造分为三个阶段。第一阶段需要寻找更多投资者并开始规划。第二阶段进行电缆铺设。第三阶段则完成投入使用的最终准备工作。\n\n项目的成功与否取决于两个关键指标：#O 电缆进度#!和#O 股东信心#!。进度决定了建造所需时间，而[concept_tesla_engineer]的技能在此至关重要。信心则很大程度上取决于公司的[concept_executive]。如果信心降至零，项目将被视为毫无希望并注定失败，必须不惜一切代价避免信心归零。\n\n水下铺设电缆并不保证成功。\n#b 历史背景：#!第一条跨大西洋电缆就曾以失败告终。但只要股东信心保持强劲，公司仍能从挫折中恢复。届时将重新铺设电缆。若首次尝试失败，第二次尝试的成功率将得到保证。"
 je_tesla_suez_india_cable: "苏伊士印度电缆"
 je_tesla_suez_india_cable_reason: "海底电报电缆的建造分为三个阶段。第一阶段需要寻找更多投资者并开始规划。第二阶段进行电缆铺设。第三阶段则完成投入使用的最终准备工作。\n\n项目的成功与否取决于两个关键指标：#O 电缆进度#!和#O 股东信心#!。进度决定了建造所需时间，而[concept_tesla_engineer]的技能在此至关重要。信心则很大程度上取决于公司的[concept_executive]。如果信心降至零，项目将被视为毫无希望并注定失败，必须不惜一切代价避免信心归零。\n\n水下铺设电缆并不保证成功。\n#b 历史背景：#!第一条跨大西洋电缆就曾以失败告终。但只要股东信心保持强劲，公司仍能从挫折中恢复。届时将重新铺设电缆。若首次尝试失败，第二次尝试的成功率将得到保证。"
