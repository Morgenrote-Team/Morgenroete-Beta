 tesla_state_trait_irrigation: "灌溉系统"
 je_tesla_irrigation_project: "灌溉系统"
 tesla_states_with_irrigation_tt: "[GetPlayer.GetAdjective]的所有地区均拥有#V $tesla_state_trait_irrigation$#![concept_modifier]（当前[GetPlayer.MakeScope.GetVariable('tesla_num_states_irrigation_var').GetValue|+0]/[GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0]）。"
 tesla_irrigation_project_finished_engineer_loc: "\n[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName]博士致力于[GetPlayer.GetName]新的#b 灌溉系统#!并对其进行了拓宽，从而极大改善了农业系统。"
 gaudi.1111.t: "[GetPlayer.GetName]的灌溉系统"
 gaudi.1111.d: "我们的[concept_gaudi_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')]已经完成了[GetPlayer.GetNameNoFormatting]的现代灌溉系统建设。 现在我们驯服了河流，将水引入田野，我们的农业一定会发展壮大！"
 gaudi.1111.f: "“我们驯服了荒野的河流，一切神秘都已不复存在，只有笔直的河道横在眼前。甚至河狸都消失了。”"
 gaudi.1111.g: "我希望这不会产生无法预料的后果……"
