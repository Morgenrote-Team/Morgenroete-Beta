 je_gaudi_magnetic_station: "建造地磁台"
 je_gaudi_magnetic_station_reason: "在哥廷根提供的仪器和指导下，我们的工程师将在未来两年内建造一座地磁台。这是一项国际合作，不同国家的数据发送到哥廷根越多，那里的科学家就能越快地对地球磁场获得新的认识。"
