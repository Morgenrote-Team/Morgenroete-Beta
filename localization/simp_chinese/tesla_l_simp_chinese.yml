l_simp_chinese:
 tesla_prototype_mechanical_computer_modifier: "机械计算机原型"
 tesla.223.t: "第一个原型"
 tesla.223.d: "在[ROOT.Var('tesla_engineer_var').GetCharacter.GetHerHis]组件计算器的项目中，[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]博士组装好了可执行简单运算的计算原型机。差强人意，也可用这设备来协助我们的科学家。"
 tesla.223.f: "它还不算完备，但还是能进行一些简单的计算。计算加减乘除算法应该不是太大问题。不过要小心，我的助手在运行它时差点少了根指头。"
 tesla.223.g: "我希望[ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe]不仅能整好一个原型......"
 tesla.224.t: "特征蔓延"
 tesla.224.d: "[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]博士看起来充满了灵感。博士现在每天都对机械计算器进行各项调整，现在我们唯一要担心的问题是该项目真能完工嘛。"
 tesla.224.f: "“但，试想一下，如果它也能用来播放乐曲，岂不美哉？”"
 tesla.224.g: "你真的能组件那台计算器吗？"
 tesla.224.h: "威胁削减资金开支"
 tesla.225.t: "火情损坏了机械计算器"
 tesla.225.d: "[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]博士的计算器的部分因为一场火情损毁了不少，导致了该项计划的部分受阻。我们无法得知这将会对项目带来多大的困境。"
 tesla.225.f: "火情似乎是发生在计算器的打印模块。无人能知其缘由，有推测可能是因为该计算器打印了太多纸质文件导致的。"
 tesla.225.g: "真的能造出这台计算机吗？"
 tesla.225.h: "给他们提供额外的资金。"
