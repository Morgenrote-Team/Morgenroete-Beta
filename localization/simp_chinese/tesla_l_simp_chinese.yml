l_simp_chinese:
  ### 2.3.0 ### 
  
 tesla_prototype_mechanical_computer_modifier: "Mechanical Computer Prototype" #NT!
 tesla.223.t: "A first Prototype" #NT!
 tesla.223.d: "In [ROOT.Var('gaudi_engineer_var').GetCharacter.GetHerHis] quest to build a Mechanical Computer, Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] was able to finish a first prototype that can perform simple calculations. Although not as powerful as a real computer, this device could help our scientists." #NT!
 tesla.223.f: "It is not yet able to do all calculations, but at least a few. Addition, Subtraction, Multiplication and Division shouldn't be a probblem. But be aware that one of my assistants nearly lost his finger, when the machine was running." #NT!
 tesla.223.g: "I hope [ROOT.Var('gaudi_engineer_var').GetCharacter.GetSheHe] will finish more than just a prototype..." #NT!
 tesla.224.t: "Feature Creep" #NT!
 tesla.224.d: "It seems as if Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] is full of ideas. Not a day goes by without adjustments to the Mechanical Computer's plans. The only question is whether the project will ever be completed." #NT!
 tesla.224.f: "\"But just imagine if it could also play music! Wouldn't that be great?\"" #NT!
 tesla.224.g: "Would you please just build that computer?" #NT!
 tesla.224.h: "Threaten to cut funding" #NT!
 tesla.225.t: "Fire damages Mechanical Computer" #NT!
 tesla.225.d: "A huge fire has damaged parts of Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName]'s mechanical computer and destroyed some plans for it. We do not yet know how much this will set the project back." #NT!
 tesla.225.f: "The fire broke out at the printer module of the computer. No one knows exactly what caused it but it seems that the printer produced large amounts of paper." #NT!
 tesla.225.g: "Will this computer ever be built?" #NT!
 tesla.225.h: "Send them additional funding." #NT!
  
  ### 2.3.1 ### 
  
 tesla_modernized_railway_lines_state_modifier: "Modernized Railway Lines" #NT!
  
 tesla_railway_project_new_priority_button: "$tesla_topographic_map_project_new_priority_button$" #NT!
 tesla_railway_project_new_priority_button_desc: "$tesla_topographic_map_project_new_priority_button_desc$" #NT!
 tesla_topographic_map_project_new_priority_button: "Change prioritized States" #NT!
 tesla_topographic_map_project_new_priority_button_desc: "#T Change prioritized States#!\nChange the [Concept('concept_state', '$concept_states$')] that are prioritized for this project.\n#n Warning: Pause the game to make sure that the prioritization works properly.#!" #NT!
  
 tesla_state_trait_irrigation: "Irrigation System" #NT!
 je_tesla_irrigation_project: "Irrigation System" #NT!
  
 tesla_states_with_irrigation_tt: "All [GetPlayer.GetAdjective] States have the $tesla_state_trait_irrigation$ State Trait (currently [GetPlayer.MakeScope.GetVariable('tesla_num_states_irrigation_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0])." #NT!
  
 tesla_irrigation_project_finished_engineer_loc: "\nDr. [GetPlayer.MakeScope.GetVariable('gaudi_engineer_var').GetCharacter.GetLastName] worked on the new #b Irrigation Systems#! of [GetPlayer.GetName] and was able to extend it which massively improved our agricultural sector." #NT!
 gaudi.1111.t: "The Irrigation System of [GetPlayer.GetName]" #NT!
 gaudi.1111.d: "Our [concept_gaudi_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] has finally completed the project to construct a modern irrigation system in [GetPlayer.GetNameNoFormatting]. Now that we tamed rivers and brought water to the fields our agriculture will surely grow!" #NT!
 gaudi.1111.f: "\"The wild rivers are now tamed. The magic has disappeared. It is just straight waterways now. Even the beaver disappeared...\"" #NT!
 gaudi.1111.g: "I hope this won't have unforseen consequences..." #NT!
  
