 MR_ASTEROID_CONGRESS_BUTTON: "关于小行星的天文大会"
 MR_ASTEROID_CONGRESS_BUTTON_TT: "#T 关于小行星的天文大会#!\n自1801年谷神星的发现后，天文学家就发现了越来越多的天体，这也是太阳系中行星的数量持续增加的原因。发现海王星引发了一个问题，即是否应该为是在火星和木星之间发现的众多小天体创建一个新的类别。特别是新天文符号的发明和它们相对较小的大小，使天文学家认为它们更可能是“小星星”或“小行星”。当然，这种分类意味着一些以前被认为是行星的天体将失去它们的地位，并被降级为纯粹的巨石。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTEROID_CONGRESS_NEPTUNE_TT: "#default_text #V 海王星#!已被发现。#!"
 MR_ASTEROID_CONGRESS_OBSERVATORY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有一座[GetBuildingType('building_verrier_observatory').GetName]。#!"
 MR_ASTEROID_CONGRESS_ASTRONOMER_TRIGGER_TT: "#default_text 拥有一位[concept_verrier_astronomer]。#!"
 MR_ASTEROID_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text 全世界的国家至少已经发现了#BLUE 1500颗#!@verrier_astronomicalobject![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]（当前已发现[GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0]颗@verrier_astronomicalobject!）。#!"
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON: "天空之图"
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON_TT: "#T 天空之图大会#!\n1887年，巴黎天文台台长阿梅德·穆切兹发起了一项规模空前的国际星图绘制项目，他意识到新的干版照相技术有可能彻底改变星图制作过程。1887年4月在巴黎召开了有50多位天文学家参加的天文大会，来自世界各地的20个天文台同意参与该项目。我们也可以举办这样一个大会，向国际社会分享天文知识。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTRONOMY_CONGRESS_5_YEARS_TRIGGER_TT: "#default_text #V 过去5年#!没有召开#V 天文大会#!（上一届天文大会的主办国没有“举办天文大会”修正）。#!"
 MR_CARTE_DE_CIEL_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text 全世界的国家至少已经发现了#BLUE 7000颗#!@verrier_astronomicalobject![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]（当前已发现[GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0]颗@verrier_astronomicalobject!）。#!"
 MR_CARTE_DE_CIEL_CONGRESS_UNIVERSITY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有一座#V 10级及以上的#![GetBuildingType('building_university').GetName]。#!"
 MR_GREAT_DEBATE_CONGRESS_BUTTON: "大辩论"
 MR_GREAT_DEBATE_CONGRESS_BUTTON_TT: "#T 大辩论#!\n沙普利‑柯蒂斯之争，也被称为“大辩论”，是20世纪初期的诸多辩论的综合，最终导致了对星系性质和宇宙大小的新认识。这次辩论围绕银河系的大小，以及当时被称为螺旋星云的星系是银河系内的小物体还是距离银河系更远且与银河系分离的天体两个问题展开。当天，两位科学家分别呈交了关于宇宙尺度的独立技术论文，晚上进行了一场公开讨论。我们可以召开这样的会议来探讨宇宙的终极奥秘。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GREAT_DEBATE_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text 全世界的国家至少已经发现了#BLUE 12000颗#!@verrier_astronomicalobject![Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]（当前已发现[GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0]颗@verrier_astronomicalobject!）。#!"
 SPECIMEN_VAR: "@dubois_specimen![GetPlayer.MakeScope.Var('dubois_specimen').GetValue|*V0]"
 SPECIMEN_VAR_TT: "#header [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]#!\n[GetPlayer.GetName]已收集了@dubois_specimen![GetPlayer.MakeScope.GetVariable('dubois_specimen').GetValue|V0][Concept('concept_dubois_specimen','$concept_dubois_specimens$')]。"
 MR_SAFARI_EXPEDITION_BUTTON_TT: "#T 太棒了，狩猎探险#!\n在非洲狩猎探险中可以通过不断地追踪与诱捕捕捉到大型猎物，然后将其运送到[concept_dubois_zoo]。每次狩猎探险只能捕捉一只动物。根据动物种类的不同，设置陷阱与追踪的必要性也不尽相同。根据经验，体型大、行动迟缓的动物需要更多的陷阱，而速度快的动物则需要更多的追踪。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SAFARI_EXPEDITION_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有一位#V 空闲#![concept_dubois_naturalist]。#!"
 MR_SAFARI_EXPEDITION_HAS_SMALL_OR_BIGGER_ZOO_TRIGGER_TT: "#default_text 你至少有一座规模为#V 小型#!的[concept_dubois_zoo]。#!"
 MR_SAFARI_EXPEDITION_HABITAT_TRIGGER_TT: "#default_text [GetPlayer.GetName]#V 至少拥有一个有大型猎物的非洲动物栖息地，或者在一个松散部族拥有的省份内有这样一个栖息地#!"
 MR_SAFARI_EXPEDITION_RECENT_TRIGGER_TT: "#default_text [GetPlayer.GetName]#V 最近及现在#!没有开展#V 狩猎探险#!。#!"
 MR_ZOOLOGICAL_EXPEDITION_BUTTON_TT: "#T 捕捉本土动物#!\n我们国家的栖息着许多可以在[concept_dubois_zoo]中展示的迷人物种。一位[concept_dubois_naturalist]将在一年的时间里走遍全国，为动物园收集[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ZOOLOGICAL_EXPEDITION_LOCAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName]至少拥有一处我们[concept_dubois_zoo]中没有的[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]生活的栖息地。#!"
 MR_ZOOLOGICAL_EXPEDITION_CURRENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName]#V 当前未在捕捉本土动物#!。#!"
 MR_HIPPOCAMPUS_CONGRESS_BUTTON: "海马体大会"
 MR_HIPPOCAMPUS_CONGRESS_BUTTON_TT: "#T 海马体大会#!\n人类有多特别，又与动物有多少相似？古希腊人已经注意到人类和猿类之间的紧密关系。卡尔·林奈曾将猿类和人类一并归为灵长类动物——动物中的“最高”等级——因此这一领域曾经并不如此富有争议。然而，随着进化论的提出以及人类被假定为其类猿近亲的后裔，亟待解决的冲突再次浮现。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有一位[concept_dubois_naturalist]#!"
 MR_HIPPOCAMPUS_CONGRESS_5_NATURALISTS_TRIGGER_TT: "#default_text 至少#V 五个国家#!拥有一位[concept_dubois_naturalist]。#!"
 MR_HIPPOCAMPUS_CONGRESS_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有的[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]#V 不少于20000件#!（当前[GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]件）。#!"
 MR_HIPPOCAMPUS_CONGRESS_GLOBAL_SPECIMEN_TRIGGER_TT: "#default_text 全世界的国家已收集的[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]#V 不少于100000件#!（当前[GetGlobalVariable('dubois_global_specimen').GetValue|0+]件）。#!"
 MR_EXTEND_ZOO_SMALL_BUTTON: "扩建[concept_dubois_zoo]（小型）"
 MR_EXTEND_ZOO_SMALL_BUTTON_TT: "#T 扩建至小型动物园#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]寄托了全民的欢乐：民众可以在动物园内漫游，科学家可以继续动物研究，而那些能够展示尽可能多的外来动物的国家则会获得国际威望。每次扩建，威望都会提高。扩建不仅需要收集许多动物，还需要从世界各地收集动物。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_10_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName]共拥有#V 10只#![Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]。你目前拥有[GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+]只。#!"
 MR_EXTEND_ZOO_SMALL_2_SPECIAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有#V 2只非洲#![Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]（当前[GetPlayer.MakeScope.Var('dubois_zoo_animal_africa').GetValue|0+]只）、#V 2只亚洲#![Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]（当前[GetPlayer.MakeScope.Var('dubois_zoo_animal_asia').GetValue|0+]只）或#V 2只大洋洲#![Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]（当前[GetPlayer.MakeScope.Var('dubois_zoo_animal_australia').GetValue|0+]只）。"
 MR_EXTEND_ZOO_SMALL_CURRENT_EXPANSION_TRIGGER_TT: "#default_text [GetPlayer.GetName]没有#V 正在扩建#![concept_dubois_zoo]。#!"
 MR_EXTEND_ZOO_MEDIUM_BUTTON: "扩建[concept_dubois_zoo]（中型）"
 MR_EXTEND_ZOO_MEDIUM_BUTTON_TT: "#T 扩建至中型动物园#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]寄托了全民的欢乐：民众可以在动物园内漫游，科学家可以继续动物研究，而那些能够展示尽可能多的外来动物的国家则会获得国际威望。每次扩建，威望都会提高。扩建不仅需要收集许多动物，还需要从世界各地收集动物。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_20_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName]共拥有#V 20只#![Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]。你目前拥有[GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+]只。#!"
 MR_EXTEND_ZOO_SMALL_5_SPECIAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有#V 5只非洲#![Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]（当前[GetPlayer.MakeScope.Var('dubois_zoo_animal_africa').GetValue|0+]只）、#V 5只亚洲#![Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]（当前[GetPlayer.MakeScope.Var('dubois_zoo_animal_asia').GetValue|0+]只）、#V 5只大洋洲#![Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]（当前[GetPlayer.MakeScope.Var('dubois_zoo_animal_australia').GetValue|0+]只）或#V 5只南美洲#![Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]（当前[GetPlayer.MakeScope.Var('dubois_zoo_animal_south_america').GetValue|0+]只）。#!"
 MR_EXTEND_ZOO_LARGE_BUTTON: "扩建[concept_dubois_zoo]（大型）"
 MR_EXTEND_ZOO_LARGE_BUTTON_TT: "#T 扩建至大型动物园#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]寄托了全民的欢乐：民众可以在动物园内漫游，科学家可以继续动物研究，而那些能够展示尽可能多的外来动物的国家则会获得国际威望。每次扩建，威望都会提高。扩建不仅需要收集许多动物，还需要从世界各地收集动物。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_30_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName]共拥有#V 30只#![Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]。你目前拥有[GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+]只。#!"
 MR_EXTEND_ZOO_FAMOUS_BUTTON: "扩建[concept_dubois_zoo]（著名）"
 MR_EXTEND_ZOO_FAMOUS_BUTTON_TT: "#T 扩建至著名动物园#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]寄托了全民的欢乐：民众可以在动物园内漫游，科学家可以继续动物研究，而那些能够展示尽可能多的外来动物的国家则会获得国际威望。每次扩建，威望都会提高。扩建不仅需要收集许多动物，还需要从世界各地收集动物。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_40_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName]共拥有#V 40只#![Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')]。你目前拥有[GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+]只。#!"
 MR_SPECIMEN_GARDEN_BUTTON: "建立植物园"
 MR_SPECIMEN_GARDEN_BUTTON_TT: "#T 建立植物园#!\n动物园内开设的植物园能带来更多威望。我们可以在此种植我们[concept_dubois_naturalist]收集的所有异域植物。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPECIMEN_GARDEN_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有的[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]#V 不少于50000件#!（当前[GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]件）。#!"
 MR_SPECIMEN_GARDEN_NO_BOTANICAL_GARDEN_TRIGGER_TT: "#default_text [GetPlayer.GetName]尚无#V 植物园#!。#!"
 MR_SPECIMEN_GARDEN_EFFECT_TT: "你的[GetBuildingType('building_dubois_zoo').GetName]将启用#V 植物园#!，并给予你50威望以及少量生活水平增益。"
 MR_SPECIMEN_COLLECTION_BUTTON: "建造标本馆"
 MR_SPECIMEN_COLLECTION_BUTTON_TT: "#T 建造标本馆#!\n按条目整理展示包括我国所收集的异域昆虫、动植物在内的[Concept('concept_dubois_specimen','$concept_dubois_specimens$')]可以证明我国的科学有多先进。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPECIMEN_GARDEN_NO_SPECIMEN_COLLECTION_TRIGGER_TT: "#default_text [GetPlayer.GetName]尚未启用#V 标本馆#!。#!"
 MR_SPECIMEN_COLLECTION_EFFECT_TT: "你的[GetBuildingType('building_dubois_zoo').GetName]将启用#V 标本馆#!，并给予你50威望以及少量研究增益。"
 MR_BAN_ANIMAL_EXPORT_BUTTON: "禁止动物出口"
 MR_BAN_ANIMAL_EXPORT_BUTTON_TT: "#T 禁止动物出口#!\n原则上明确禁止动物出口，因此我们不准备向国外出售我们的任何动物。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALLOW_ANIMAL_EXPORT_BUTTON: "允许动物出口"
 MR_ALLOW_ANIMAL_EXPORT_BUTTON_TT: "#T 允许动物出口#!\n允许动物出口可以让我们赚到额外收入。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BREEDING_ANIMALS_BUTTON: "繁育动物 "
