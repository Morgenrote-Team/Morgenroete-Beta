 MR_PAINTER_TRIP_BUTTON_TT: "#T 艺术游学#!\n在[concept_klimt_painter_trip]中，画家可以学习以前未曾接触的艺术风格并增加年度[concept_klimt_painting_tradition]获取。他们在国外[concept_artists_center_of_arts]学习的时候也会获得正面/负面特质。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACQUIRE_MASTERWORK_BUTTON: "购买杰作"
 MR_ACQUIRE_MASTERWORK_BUTTON_TT: "#T 购买杰作#!\n我们可以在国外购买一幅我们尚未拥有的艺术风格的杰作。然而，这前提是另一个国家至少拥有该风格的杰作多于一幅。此外，我们需要一个国立美术馆来展示这幅画。除了采购成本之外，我们还必须交换掉我们的一些画作，这将花费我们#R 100#![concept_klimt_painting_tradition]。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
