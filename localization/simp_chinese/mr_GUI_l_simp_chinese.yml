 MR_GEOLOGIST_TECTONICS_CONGRESS_BUTTON_TT: "#T 大陆漂移学说讨论大会#!\n数个世纪以来，人们坚信大陆是固定不动的。然而，一位具有相当丰富地质知识的杰出地质学家可能会打破这一观念。至于他是否能够成功，仍然充满疑问。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_CONGRESS_KNOWLEDGE_TRIGGER_TT: "#default_text [GetPlayer.GetName]的@agassiz_geological_knowledge![concept_agassiz_geological_knowledge]#V 不低于50#!（当前[GetPlayer.MakeScope.Var('agassiz_geological_knowledge_var').GetValue|0+]）。#!"
 MR_ASTRONOMER_ACTIVE_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有一位#V 空闲的#![concept_verrier_astronomer]。#!"
 MR_ASTRONOMER_MOON_MAP_BUTTON_TT: "#T 测绘月亮#!\n现代望远镜与相机的应用让人们能以史无前例的精度来测绘地球的卫星——月球。月球地图的绘制将是整个天文学的里程碑。然而，当天文学家过分专注于月面学研究时，他能发现的天体就更少了。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTRONOMER_MOON_MAP_ACTIVE_TT: "测绘月亮\n#p 你的[concept_verrier_astronomer]正在通过拍摄[Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')]来测绘月球。#!"
