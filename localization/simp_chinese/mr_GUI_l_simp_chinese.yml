 MR_PROMOTING_ENGINEER_TT: "#T 培养工程师#!\n#p 你正在培养工程师。#!\n[Concept('concept_tesla_engineer','$concept_tesla_engineers$')]是军事和建筑领域的多才多艺的技术人员。他们还能将奇观的建造速度提高一倍。"
 MR_PROMOTING_ASTRONOMER_TT: "#T 培养天文学家#!\n#p 你正在培养天文学家。#!\n[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]负责寻找新的天体，发现恒星与行星，并参加天文学大会。"
 MR_PROMOTING_NATURALIST_TT: "#T 培养博物学家#!\n#p 你正在培养博物学家。#!\n[Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')]可以捕捉本土或者海外的动物，发现新物种，以及领导植物学考察。"
 MR_PROMOTING_PALEONTOLOGIST_TT: "#T 培养古生物学家#!\n#p 你当前正在培养古生物学家。#!\n[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]可以在地层中发现化石和恐龙化石，或者在探险中发现它们。"
 MR_PROMOTING_ARCHAEOLOGIST_TT: "#T 培养考古学家#!\n#p 你当前正在培养考古学家。#!\n[Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')]可以发现文物，调查重要线索，并参加考古学大会。"
 MR_PROMOTING_ANTHROPOLOGIST_TT: "#T 培养人类学家#!\n#p 你当前正在培养人类学家。#!\n[Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')]能够研究人类的起源，从人类物种出现直至石器时代。#T 学术投资#!"
 MR_ACADEMICS_INVESTMENT_ACTIVE_TT: "#T 学术投资#!\n#p 你正在投资学术界。#!\n政府对我国大学的整体性投资将使#O 学术发展点#!每月增加#G 1#!点。该项预算为期10年。"
 MR_PROMOTING_COMPOSER_TT: "#T 培养作曲家#!\n#p 你当前正在培养作曲家。#!\n只有[Concept('concept_elgar_composer','$concept_elgar_composers$')]才能繁荣我们的音乐文化，他们能为国家创造更多[concept_elgar_musical_tradition]。"
 MR_PROMOTING_WRITER_TT: "#T 培养作家#!\n#p 你当前正在培养作家。#!\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')]是讲故事的大师，致力于出版小说和其他文学作品。他们的作品能增加国家的[concept_manzoni_literary_tradition]。"
 MR_PROMOTING_PAINTER_TT: "#T 培养画家#!\n#p 你当前正在培养画家。#!\n[Concept('concept_klimt_painter','$concept_klimt_painters$')]能在画布上描摹脑海中的想象，定格世界的风景与奇观。他们的作品会大大增加国家的[concept_klimt_painting_tradition]。"
 MR_AVANTGARDE_INTELLIGENTSIA_ACTIVE_TT: "#T 前沿知识#!\n#p 前沿知识目前是你的科学焦点#!\n具有明确文化、社会学和人类学思想的学术集团主宰日常的科学生活。相比之下，实用领域的重要性则较低。\n#R 注#!：学者出现进度每月增加1点。"
 MR_PRACTICAL_ACADEMIA_ACTIVE_TT: "#T 实践学#!\n#p 实践学目前是你的科学焦点#!\n学者们孜孜不倦地努力使各个领域的发现适合日常实用，致力于人类的普世进步与和平。\n#p  注#!：学者出现进度每月增加1点。"
 MR_MILITARY_INDUSTRIAL_COMPLEX_ACTIVE_TT: "#T 军工复合#!\n#p 军工复合目前是你的科学焦点#!\n关系网、私人关系与交情使得私营实业家与军队合作。让军工业得以发展，其中还夹杂着一丝腐败，可以称之为军工复合体的最佳写照。"
 MR_BUSINESS_AND_TYCOON_ACTIVE_TT: "#T 商学与资本主义#!\n#p 商学与资本主义目前是你的科学焦点#!\n独立个体与繁荣的进步时代相结合，形成了这样一种思维模式：商贸学校、中型企业和大型集团对国家的科学发展具有决定性的影响。反之亦然，大学致力于通过新技术提高国家的繁荣程度，并借助进步推动社会思想的发展。"
 MR_SEA_POWER_AND_MERCHANT_ACTIVE_TT: "#T 海权与商业#!\n#p 海权与商业目前是你的科学焦点#!\n海军和国际贸易在我国发挥着巨大作用。通过先进生产和产品的全球贸易来促进繁荣，与捍卫已经赢得的成果同样重要。"
 MR_IVORY_TOWER_ACTIVE_TT: "#T 实用学#!\n#p 实用学目前是你的科学焦点#!\n这个学院被视为研究甲虫、擦洗旧花瓶与涉猎奇闻异事的怪人天堂。然而，不可否认的是，这里与社会隔绝也有其好处。许多教授不受外界干扰，从而更好地工作。\n#p  注#!：学者出现进度每月增加1点。"
 MR_ON_PACIFIC_EXPEDITION_TT: "#T 太平洋探险#!\n#p 太平洋探险正在进行中。#!\n太平洋是南北极之外地球上最后一个尚未完全揭秘的地区。多个科学领域的学者都对以开展自然史、考古学、天文学和海洋学的研究任务颇感兴趣。同时，列强可能通过在世界尽头展现其影响力而声名显赫。"
 MR_ON_NORTHWEST_EXPEDITION_TT: "#T 西北航道#!\n#p 发现西北航道的探险正在进行中。#!\n早在上世纪之初，大胆的冒险家们就探索了北冰洋的外围地区，但一个古老的梦想尚未实现——发现加拿大与北冰洋之间的西北航道。不过，谁敢进行这样危险的考察呢？"
 MR_ON_ARCTICA_EXPEDITION_TT: "#T 齐柏林飞艇探险#!\n#p 齐柏林飞艇探险正在进行中。#!\n极地航空，即“用飞艇探索北极的国际研究会”是一个非政府的科学协会，它为自己设定的目标是利用飞艇进行极地研究。它主要是在飞行员和后来的协会秘书长瓦尔特‑布鲁斯的倡议下成立的。1924年的创始主席是弗里乔夫·南森。经过几年的准备工作，该协会于1931年首次成功地使用飞艇进行了纯粹的科学极地考察。通过齐柏林伯爵号的北极飞行，对飞过的极地地区的地理知识有了很大扩展。早在1926年，翁贝托·诺比莱就用他的飞艇“挪威号”飞过了北极，后来又用“意大利号”进行了一次探险。"
 MR_IS_CIVIL_ENGINEER_TT: "#T [concept_tesla_civil_engineer]#!\n你的[concept_tesla_engineer]正专注于[Concept('concept_tesla_civil_engineer','$concept_tesla_civil_engineering$')]。"
 MR_IS_MECHANICAL_ENGINEER_TT: "#T [concept_tesla_mechanical_engineer]#!\n你的[concept_tesla_engineer]正专注于[Concept('concept_tesla_mechanical_engineer','$concept_tesla_mechanical_engineering$')]。"
 MR_IS_MILITARY_ENGINEER_TT: "#T [concept_tesla_military_engineer]#!\n你的[concept_tesla_engineer]正专注于[Concept('concept_tesla_military_engineer','$concept_tesla_military_engineering$')]。"
 MR_IS_ELECTRICAL_ENGINEER_TT: "#T [concept_tesla_electrical_engineer]#!\n你的[concept_tesla_engineer]正专注于[Concept('concept_tesla_electrical_engineer','$concept_tesla_electrical_engineering$')]。"
 MR_IS_AERONAUTICAL_ENGINEER_TT: "#T [concept_tesla_aeronautical_engineer]#!\n你的[concept_tesla_engineer]正专注于[Concept('concept_tesla_aeronautical_engineer','$concept_tesla_aeronautical_engineering$')]。"
 MR_SAFARI_ACTIVE_TT: "#T 太棒了，狩猎探险#!\n#p 你的博物学家正在进行狩猎探险。#!\n在非洲狩猎探险中可以通过不断地追踪与诱捕捕捉到大型猎物，然后将其运送到[concept_dubois_zoo]。每次狩猎探险只能捕捉一只动物。根据动物种类的不同，设置陷阱与追踪的必要性也不尽相同。根据经验，体型大、行动迟缓的动物需要更多的陷阱，而速度快的动物则需要更多的追踪。"
 MR_ZOOLOGICAL_EXPEDITION_ACTIVE_TT: "#T 捕捉本土动物#!\n#p 你的博物学家正在捕捉本土动物。#!\n我们国家的栖息着许多可以在[concept_dubois_zoo]中展示的迷人物种。一位[concept_dubois_naturalist]将在一年的时间里走遍全国，为动物园收集[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]。"
 MR_CHEMIST_IMPROVE_FERTILIZER_BUTTON: "改进肥料"
 MR_CHEMIST_IMPROVE_FERTILIZER_TRIGGER_TT: "#default_text 至少有一个1级或更高级别的肥料厂，且没有三个[Concept('concept_modifier','$concept_modifiers$')]。#!"
 MR_CHEMIST_IMPROVE_EXPLOSIVES_BUTTON: "改进炸药"
 MR_CHEMIST_IMPROVE_EXPLOSIVES_TRIGGER_TT: "#default_text 至少有一个1级或更高级别的炸药厂，且没有三个[Concept('concept_modifier','$concept_modifiers$')]。#!"
 MR_CHEMIST_IMPROVE_SYNTHETICS_BUTTON: "改进合成"
 MR_CHEMIST_IMPROVE_SYNTHETICS_TRIGGER_TT: "#default_text 至少有一个1级或更高级别的合成厂，且没有三个[Concept('concept_modifier','$concept_modifiers$')]。#!"
 MR_CHEMIST_CONGRESS_BUTTON: "化学家大会"
 MR_CHEMIST_TRIGGER_TT: "#default_text 拥有一位[concept_mendelejew_chemist]。#!"
 MR_CHEMIST_CONGRESS_5_CHEMISTS_TRIGGER_TT: "#default_text 至少#V 5个国家#!拥有[concept_mendelejew_chemist]。#!"
 MR_CHEMIST_CONGRESS_ELEMENTS_TRIGGER_TT: "#default_text 全世界的国家至少已经验证了#V 60种#![Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]（当前已分离[GetGlobalVariable('mendelejew_isolated_elements_global_number_var').GetValue|+0]种）。#!"
 MR_MOUNT_SKELETON_ACTIVE_TT: "#T 构建恐龙骨架#!\n#p 你的古生物学家正在搭建恐龙骨架#!\n你的[concept_dubois_paleontologist]可以使用自同一大陆五个[Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]来搭建新的[concept_dubois_dinosaur_skeleton]"
 MR_REMOUNT_SKELETON_ACTIVE_TT: "#T 重构恐龙骨架#!\n#p 你的古生物学家正在重构恐龙骨架#!\n如果你拥有1具不完美的[Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')]，则你可以然你的[concept_dubois_paleontologist]尝试去重构该骨架。如果你的古生物学家经验足够丰富，重构的恐龙骨架可能会有更好的质量。"
 MR_UPPER_EGYPT_EXPEDITION_ACTIVE_TT: "#T 帝王谷探险#!\n#p 你的考古学家目前正在帝王谷探险。#!\n凭借古都底比斯和帝王谷，上埃及被认为是埃及的圣地。我们应该获得该地区的考古许可证并寻找埃及的宝藏。"
 MR_LOWER_EGYPT_EXPEDITION_ACTIVE_TT: "#T 金字塔探险#!\n#p 你的考古学家目前正在金字塔探险。#!\n自古以来，埃及金字塔就令人类着迷。据说那些已经消失在下埃及沙漠中的陵墓、寺庙甚至城市都在等待被重新发现。"
 MR_BABYLONIA_EXPEDITION_ACTIVE_TT: "#T 巴比伦探险#!\n#p 你的考古学家目前正在巴比伦探险。#!\n巴比伦是美索不达米亚的南部地区，它的名字来源于曾经强大的城市巴比伦。这里被认为是“文明的摇篮”，珍贵的考古文物一次又一次地被发现。它们绝对属于博物馆。"
 MR_ASSYRIA_EXPEDITION_ACTIVE_TT: "#T 亚述探险#!\n#p 你的考古学家目前正在亚述探险。#!\n亚述指的是美索不达米亚北部地区，有亚述和尼尼微两个重要城市。关于这个国家的稀少的知识可以追溯到《圣经》这个来源，但也许有更可靠的历史证据？"
 MR_ARGOLIS_EXPEDITION_ACTIVE_TT: "#T 派遣探险队到阿尔戈利斯#!\n#p 你的考古学家目前正在阿尔戈利斯探险。#!\n在发现特洛伊城之后，即使是持怀疑态度的学者也开始意识到，古希腊人的神话不仅仅是童话故事。据说青铜时代的城市遗迹至今还在阿尔戈利斯，其中最著名的是迈锡尼，我们应该让自己相信这一点。"
 MR_CRETE_EXPEDITION_ACTIVE_TT: "#T 派遣探险队到克里特#!\n#p 你的考古学家目前正在克里特探险。#!\n传说中的米诺斯国王曾经统治过克里特岛。与特洛伊和迈锡尼相似，这个故事似乎也有道理：岛上越来越多地发现来自传说中的米诺斯文化文物，我们国家也应该确保有其中的一些。"
 MR_YUCATAN_EXPEDITION_ACTIVE_TT: "#T 尤卡坦探险#!\n#p 你的考古学家目前正在尤卡坦探险。#!\n关于丛林中未知的巨大城市报告越来越多，我们应该进一步调查并派遣考古探险队前往尤卡坦。"
 MR_PERU_EXPEDITION_ACTIVE_TT: "#T 秘鲁探险#!\n#p 你的考古学家目前正在秘鲁探险。#!\n飞行员报告说，他们在秘鲁上空飞行时看到安第斯山脉的奇怪堡垒和城墙结构，也许西班牙人并没有完全摧毁印加人的文化？一些土著人抵抗的城镇至今仍未被发现。"
 MR_FOSSIL_IDENTIFICATION_ACTIVE_TT: "#T 鉴别化石#!\n#p 你的人类学家正在鉴别化石。#!\n[concept_andersson_anthropologist]可以花费一定的时间来鉴别未知的骨骼化石，并将其归为特定的人类或史前人类物种。如果他能发现同一物种的三块骨骼化石，这一物种就将被顺利分类。正确鉴别骨骼化石所需的时间取决于人类学家的经验。"
 MR_CONDUCTING_ACTIVE_TT: "#p 你的作曲家目前正在指挥音乐会季。#!\n[Localize('concept_elgar_conducting_desc')]"
 MR_MUSIC_TOUR_ACTIVE_TT: "#p 你的作曲家目前正在进行巡演。#!\n[Localize('concept_elgar_musical_tour_desc')]"
 MR_NEWSPAPER_NOVEL_ACTIVE_TT: "#T 报纸小说#!\n#p 你的作家目前正在写作报纸小说。#!\n19世纪，报纸小说为许多作家带来了稳定的收入和名誉。如托尔斯泰、陀思妥耶夫斯基、福楼拜和大仲马都是先在报纸上连载小说，然后才出版书籍。"
 MR_READNG_TOUR_ACTIVE_TT: "#T 阅读之旅#!\n#p 你的作家目前正在进行阅读旅行。#!\n一位国际知名作家如果与外国出版商有联系，那么如果他进行阅读之旅，提高本国的知名度。这不仅能促进双方的关系，还能提升他的声誉。"
 MR_PAINTER_TRIP_ACTIVE_TT: "#T 艺术游学#!\n#p 你的画家正在进行艺术游学。#!\n在[concept_klimt_painter_trip]中，画家可以学习以前未曾接触的艺术风格并增加年度[concept_klimt_painting_tradition]获取。他们在国外[concept_artists_center_of_arts]学习的时候也会获得正面/负面特质。"
 MR_MOUNTAIN_EXPEDITION_ACTIVE_TT: "#T 登山探险#!\n#p 登山探险正在进行。#!\n1786年登顶勃朗峰后，征服地球高峰的新时代开始了，并在19与20世纪更加风行。如果领土上有尚未攀登过的山脉，我们可以指派拥有适当技能的陆军将领将之征服。"
 MR_AIR_COMBAT_MISSION_ACTIVE_TT: "#T 空战任务#!\n#p 你的飞行员正在执行空战任务。#!"
 MR_AIRCRAFT_PARADE_ACTIVE_TT: "#T 飞行表演#!\n#p 你的飞行员正在参加飞行表演。#!"
