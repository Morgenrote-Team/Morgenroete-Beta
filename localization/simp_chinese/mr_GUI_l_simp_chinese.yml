 MR_MOZART_MONUMENT_BUTTON: "建造莫扎特纪念碑"
 MR_MOZART_MONUMENT_BUTTON_TT: "#T 建造莫扎特纪念碑#!\n沃尔夫冈·阿玛迪斯·莫扎特是有史以来最重要的作曲家之一，但有些人仍然否认他的功绩。最近，一代作曲家把他当成是当代音乐的起点。在莫扎特的出生地萨尔茨堡竖立一座莫扎特纪念碑将激励后代追随他的脚步。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
