 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESEARCH_STATION_BUTTON_TT: "#T 加入磁学协会#!\n加入哥廷根磁学协会是我们开始地磁领域研究和建立地磁台的强制性要求。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON: "电报网络"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON_TT: "#T 建设电报网络#!\n电报技术的出现于国家而言无异于通讯上的“革命”，大大改善了已建成电报网络地区的基础设施服务。但随着国家规模的增大，在全国范围内实现联网变得更加困难，只能在已有电线杆的相邻地区建设电线杆。至于海外，需测要同时运用电报技术和电磁学原理来铺设海底电缆。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_RAILWAY_CAPITAL_TRIGGER_TT: "#default_text [GetPlayer.GetName]已在首都中建成[GetBuildingType('building_railway').GetName]。#!"
