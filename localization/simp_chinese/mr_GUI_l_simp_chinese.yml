 MR_SEND_CHARACTER_TO_ASYLUM_BUTTON: "将某人送入精神病院"
 MR_SEND_CHARACTER_TO_ASYLUM_BUTTON_TT: "#T 将某人送入精神病院#!\n许多政治家、煽动者甚至统治者因心理障碍、成瘾或痴呆而不再胜任其职责，如同航行中的舵手失去了方向。精神病学家可以宣布这些人精神失常——即便他从未对其进行过检查，这一权力如同一把双刃剑，既可能维护社会的稳定，也可能成为政治斗争的工具。然而，精神病学的政治滥用若被民众和反对派识破，便可能引发严重的后果。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
