 MR_BEETHOVEN_MONUMENT_BUTTON: "建造贝多芬纪念碑"
 MR_BEETHOVEN_MONUMENT_BUTTON_TT: "#T 建造贝多芬纪念碑#!\n毫无疑问，贝多芬是有史以来最伟大的作曲家，所有浪漫主义音乐起源出自他作品。每位当代艺术家都应该向他致敬。更令人吃惊的是，他仍然很少受到赞赏。然而在罗伯特·舒曼的呼吁下，一些协会、城市、皇室、贵族和政府筹集资金，在他的出生地波恩建立了一个纪念碑。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
