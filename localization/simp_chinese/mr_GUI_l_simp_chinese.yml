 MR_SELL_MINERALS_FOR_RARE_MINERAL_BUTTON_TT: "#T 出售矿物换取稀有矿物#!\n[concept_agassiz_geologist]可以从同僚、收藏家、地质学爱好者等人处购买[Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]。不过这需要用其他矿物进行交换。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON: "跨学科研讨会"
