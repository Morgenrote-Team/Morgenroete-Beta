 MR_AERONAUTICAL_ENGINEER_GIANT_ZEPPELIN_BUTTON_TT: "#T 巨型齐柏林飞艇#!\n飞艇旅行已发展到了巅峰。我国被视为这世上最大最令人感到无力的齐柏林飞艇的诞生地。是时候让世界感到震惊并用巨型飞艇环游全世界了。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
