 MR_IMPRESSIONISM_BUTTON: "印象派"
 MR_IMPRESSIONISM_BUTTON_TT: "#T 选择印象派#!\n[concept_elgar_impressionism]是艺术史上的一种风格，以对转瞬即逝的风景进行光影的速写描绘为其特点，起源于19世纪后半叶的法国绘画运动。印象派这一概念也被用于描述音乐、文学、电影与摄影的特定风格。尽管海因里希·哈特等许多自然主义者拒绝将音乐视为表达“追求真理的行动主义”的一种手段，但印象派常常将“无目标的前瞻梦想”，即对色彩层次丰富的和弦的追求，视为一种乐趣。\n\n[GetPlayer.GetCustom('artists_center_of_arts_impressionism_active_custom_loc')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_POWERFUL_LANDOWNERS_TRIGGER_TT: "#default_text [GetPlayer.GetAdjective][GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]是[concept_powerful]。#!"
 MR_NOT_POWERFUL_INTELLIGENTSIA_TRIGGER_TT: "#default_text [GetPlayer.GetAdjective][GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]不是[concept_powerful]。#!"
 MR_HAPPY_INTELLIGENTSIA_TRIGGER_TT: "#default_text [GetPlayer.GetAdjective][GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]的[concept_approval]#V 不低于5#!。#!"
 MR_EXPRESSIONISM_BUTTON: "表现主义"
 MR_EXPRESSIONISM_BUTTON_TT: "#T 选择表现主义#!\n[concept_elgar_expressionism]音乐特点为直接表现人类的精神与体验，与旧有传统完全相反，它完全无视过去的调性规律，它反对印象主义的客观性，它认为艺术既不应该被“描写”，也不应该被“象征”，而更应该直接表现人类的精神与体验，也就是说要把作者的心灵世界、即所谓内在精神表现出来，这就是所谓的表现主义，表现主义音乐的节奏难以捉摸，拍子也被无视，却具有独特的、流动的、无限发展的奇妙特色。\n\n[GetPlayer.GetCustom('artists_center_of_arts_expressionism_active_custom_loc')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_POWERFUL_INTELLIGENTSIA_OR_TRADE_UNIONS_TRIGGER_TT: "#default_text [GetPlayer.GetAdjective][GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]或[GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName]是[concept_powerful]。#!"
 MR_NOT_POWERFUL_LANDOWNERS_TRIGGER_TT: "#default_text [GetPlayer.GetAdjective][GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]不是[concept_powerful]。#!"
 MR_HAPPY_INTELLIGENTSIA_OR_TRADE_UNIONS_TRIGGER_TT: "#default_text [GetPlayer.GetAdjective][GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]或[GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName]的[concept_approval]#V 不低于5#!。#!"
 MR_ART_NOUVEAU_BUTTON: "新艺术"
 MR_ART_NOUVEAU_BUTTON_TT: "#T 选择新艺术#!\n[concept_elgar_art_nouveau]，在意大利多被称为自由风格，是19与20世纪之交的一个一个艺术史时期。可被归为新艺术的潮流包括改革运动后的改革风格、维也纳分离后的分离风格、加泰罗尼亚的现代风、瑞士的萨宾风格以及美国的蒂芙尼风格。除了法语、英语与意大利语中主要使用的“新艺术”这一表述外，英语中还称之为“现代风格”，意大利语则会使用“花卉风格”一词。总而言之，新艺术属于世纪之交的时代。\n\n[GetPlayer.GetCustom('artists_center_of_arts_art_nouveau_active_custom_loc')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
