 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON: "无线电网络"
 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON_TT: "#T 建立无线电网络#!\n缠人电缆的时代已经过去了！随着无线电技术的发明，现在可以通过天线来发送信息。这不仅能让我们进行高效的信息交换，甚至还可以建立一档广播节目。当然，在此之前，需要建立一个全国性的无线电网络。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON: "寻找铁矿"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON_TT: "#T 寻找铁矿#!\n地球物理学和地磁学有许多实际的应用——特别是采矿业——能利用这些知识发现存在的矿藏。大型公司利用地球物理知识来找到之前未知的铁、铅和石油矿藏。结合正确的技术和对地球磁场的绘制，应该很容易将当前的理论知识转化为生产力。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
