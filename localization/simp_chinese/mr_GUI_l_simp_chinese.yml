 MR_AERONAUTICAL_ENGINEER_ZEPPELIN_FOCUS_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有#V “$curtiss_zeppelin_focus_modifier$”#![concept_modifier]。#!"
 MR_AERONAUTICAL_ENGINEER_GIANT_AIRPLANE_BUTTON: "巨型飞机"
 MR_AERONAUTICAL_ENGINEER_GIANT_AIRPLANE_BUTTON_TT: "#T 巨型飞机#!\n天空是最后的极限，近代早期的探索时代如今已演变成征服天空的时代。今天的飞机与当年西班牙的风帆战舰相比宛如一叶小舟。今天钢铁巨兽在海上航行，但天空还仍只被小型机器所统治。建造一架能搭载不止几十而是几百人的巨型飞机似乎是乌托邦之梦。但是，一个繁荣的飞机工业和一个由强人领导的强大航空公司能颠覆世界……\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
