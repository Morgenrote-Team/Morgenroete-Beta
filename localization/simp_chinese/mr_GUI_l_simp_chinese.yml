 MR_GEOLOGIST_AGE_EARTH_BUTTON_TT: "#T 估测地球年龄#!\n地质学家一生中可以估测一次地球年龄并将其理论送与同行审阅。如果该理论被接受，他的判断将成为决定性的理论；但如果他不受认可，则可以在一段时间的消沉后重新尝试。只有当国家的地质学评分高于上次估测地球年龄时的评分方可发表新理论。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
