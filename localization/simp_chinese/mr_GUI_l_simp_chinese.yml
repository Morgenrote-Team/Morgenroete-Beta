 MR_GEOLOGIST_OIL_STOP_BUTTON_TT: "#T 停止勘探油田#!\n你的[concept_agassiz_geologist]正在已建成的油井附近寻找新油田，从而提高产量。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_geologist_oil_stop_button_effect_tt: "你的[concept_agassiz_geologist]将停止勘探油田。"
 MR_GEOLOGIST_GEOLOGICAL_RESEARCH_BUTTON_TT: "#T 地质研究#!\n地质学家可以在国内各地游历，开展地质研究。通过这种方式，他还能发现地质构造、洞穴，后续甚至能找到铀矿。拥有矿物学家特质的地质学家，每年获取的矿物数量翻倍。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_geologist_geological_research_stop_effect_tt: "你的[concept_agassiz_geologist]将停止地质研究。"
