 MR_REMOUNT_SKELETON_BUTTON: "重构恐龙骨架"
 MR_REMOUNT_SKELETON_BUTTON_TT: "#T 重构恐龙骨架#!\n如果你拥有1具不完美的[Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')]，则你可以然你的[concept_dubois_paleontologist]尝试去重构该骨架。如果你的古生物学家经验足够丰富，重构的恐龙骨架可能会有更好的质量。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
