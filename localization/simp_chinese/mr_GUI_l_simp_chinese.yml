 MR_GERMAN_MUSIC_ASSOCIATION_BUTTON: "建立德意志音乐协会"
 MR_GERMAN_MUSIC_ASSOCIATION_BUTTON_TT: "#T 成立德国音乐协会#!\n德意志音乐协会（ADMV）于1861年由李斯特·弗朗茨和弗朗茨·布伦德尔创建，以发扬新德意志乐派的音乐理念。ADMV旨在提供音乐表演及其背后的理论支持。作为ADMV艺术目标的一部分，一年一度的音乐家大会将在不同地点安排并表演各种新式音乐作品。除此之外，也将演奏那些很少或根本听不到但经典的旧作品。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_RAILWAY_BUTTON_TT: "#T 铁路项目#!\n让你的[concept_tesla_engineer]专注于改进[GetPlayer.GetName]的[GetBuildingType('building_railway').GetName]。你可以指定优先进行项目的地区，这些地区的铁路获得$tesla_modernized_railway_lines_building_modifier_with_tooltip$[concept_modifier]，这将增加铁路[concept_throughput]。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
