 MR_ASTRONOMER_DISCOVER_SATELLITES_BUTTON_TT: "#T 搜索未发现的卫星#!\n太阳系中的许多行星都有如地球之月球般的未发现的天然[Concept('concept_verrier_satellite','$concept_verrier_satellites$')]。科技发展水平、天文台的生产方式以及天文学家的技能都将影响发现未知新卫星的可能性。当然，天文学家在全力搜寻新卫星时会发现更少的其他天体。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTRONOMER_CAN_DISCOVER_SATELLITES_TRIGGER_TT: "#default_text 尚有天然[Concept('concept_verrier_satellite','$concept_verrier_satellites$')]可供发现。#!"
