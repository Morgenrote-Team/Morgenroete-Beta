 MR_PHYSICIAN_DESCRIBE_DISEASE_BUTTON_TT: "#T 疾病描述#!\n如果一种疾病在全国范围内肆虐，医生可以更科学的方法描述一种从未描述过的疾病，这是开发后续治疗方法的重要前期步骤。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_DESCRIBE_DISEASE_ACTIVE_TT: "#T 疾病描述#!\n#p 你的$concept_panum_physician$目前正在对一种疾病进行首次描述#!\n如果一种疾病在全国范围内肆虐，医生可以更科学的方法描述一种从未描述过的疾病，这是开发后续治疗方法的重要前期步骤。"
 MR_ACTIVE_PHYSICIAN_TRIGGER: "#default_text [GetPlayer.GetName]有一位#V 处于空闲#!的[concept_panum_physician]#!"
 MR_PHYSICIAN_CAN_DESCRIBE_LOCAL_DISEASE_TRIGGER_TT: "#default_text [GetPlayer.GetName]现有一种尚未被完全描述的瘟疫。#!"
 MR_PHYSICIAN_DESCRIBE_DISEASE_FOREIGN_BUTTON_TT: "#T 医学观察#!\n一名医生可能会远赴一个流行病肆虐的遥远国度，观察当地的病情。这个过程比在自己国家进行诊断花费的时间更长。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_DESCRIBE_DISEASE_FOREIGN_ACTIVE_TT: "#T 医学观察#!\n#p 你的$concept_panum_physician$目前正在进行医学观察#!\n医生可能会前往疫情肆虐的遥远国度，并描述那里的疾病。这个过程要比在本国进行要花费更长的时间。"
 MR_PHYSICIAN_CAN_DESCRIBE_FOREIGN_DISEASE_TRIGGER_TT: "#default_text [GetPlayer.GetName]对一个国家有兴趣，这个国家正在遭受一种尚未被完全描述的疫情折磨。#!"
 MR_PHYSICIAN_FIND_TREATMENT_BUTTON_TT: "#T 疾病治疗#!\n医生能够为在国家范围内肆虐的流行病找到一种有效的治疗方法。尽管这种治疗无法彻底预防疾病，但它可以大幅度缓解疾病带来的影响。对于某些特定疾病，在开发治疗方法之前，往往需要研究某些特定科技。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_FIND_TREATMENT_ACTIVE_TT: "#T 疾病治疗#!\n#p 你的$concept_panum_physician$正在修找某种疾病的治疗方法。#!\n医生能够为在国家范围内肆虐的流行病找到一种有效的治疗方法。尽管这种治疗无法彻底预防疾病，但它可以大幅度缓解疾病带来的影响。对于某些特定疾病，在开发治疗方法之前，往往需要研究某些特定科技。"
 MR_PHYSICIAN_CAN_FIND_LOCAL_TREATMENT_TRIGGER_TT: "#default_text [GetPlayer.GetName]目前正经历的疫病已有详细描述及相应科技，但尚无治疗方法。#!"
 MR_PHYSICIAN_FIND_TREATMENT_FOREIGN_BUTTON_TT: "#T 医学研究考察#!\n一位医生可能会远赴疫情肆虐的偏远地区展开考察，深入研究当地的疾病以寻找有效的治疗方法。相比在本国进行研究，这一过程往往需要耗费更多的时间。对于某些疾病，在找到治疗方法之前，通常需要研究某些特定科技。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_FIND_TREATMENT_FOREIGN_ACTIVE_TT: "#T 医学研究考察#!\n#p 你的$concept_panum_physician$正在寻找一种疾病的治疗方法。#!\n一位医生可能会远赴疫情肆虐的偏远地区展开考察，深入研究当地的疾病以寻找有效的治疗方法。相比在本国进行研究，这一过程往往需要耗费更多的时间。对于某些疾病，在找到治疗方法之前，通常需要研究某些特定科技。"
 MR_PHYSICIAN_CAN_FIND_FOREIGN_TREATMENT_TRIGGER_TT: "#default_text [GetPlayer.GetName]对一个发生流行病的国家感兴趣，这种疾病已被描述，但目前尚无治疗方法，并且拥有相应的技术。#!"
