 MR_PROMOTE_CHEMIST_TT: "#T 培养化学家#!\n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]是专注于元素研究及改进化工生产的学者。\n\n#n 注意：#!同一时间你仅能拥有一位化学家。[GetPlayer.GetCustom('mr_promote_has_chemist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_GEOLOGIST_TT: "#T 培养地质学家#!\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')]会研究矿物、火山以及其他地质构造。\n\n#n 注意：#!同一时间你仅能拥有一位地质学家。[GetPlayer.GetCustom('mr_promote_has_geologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_NATURALIST_TT: "#T 培养博物学家#!\n[Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')]可以捕捉本土或者海外的动物，发现新物种，以及领导植物学考察。\n\n#n 注意：#!同一时间你仅能拥有一位博物学家。[GetPlayer.GetCustom('mr_promote_has_naturalist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_PALEONTOLOGIST_TT: "#T 培养古生物学家#!\n[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]可以在地层中发现化石和恐龙化石，或者在探险中发现它们。\n\n#n 注意：#!同一时间你仅能拥有一位古生物学家。[GetPlayer.GetCustom('mr_promote_has_paleontologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ARCHAEOLOGIST_TT: "#T 培养考古学家#!\n[Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')]可以发现文物，调查重要线索，并参加考古学大会。\n\n#n 注意：#!同一时间你仅能拥有一位考古学家。[GetPlayer.GetCustom('mr_promote_has_archaeologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ANTHROPOLOGIST_TT: "#T 培养人类学家#!\n[Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')]能够研究人类的起源，从人类物种出现直至石器时代。\n\n#n 注意：#!同一时间你仅能拥有一位人类学家。[GetPlayer.GetCustom('mr_promote_has_anthropologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_COMPOSER_TT: "#T 培养作曲家#!\n只有[Concept('concept_elgar_composer','$concept_elgar_composers$')]才能繁荣我们的音乐文化，他们能为国家创造更多[concept_elgar_musical_tradition]。\n\n#n 注意：#!同一时间你仅能拥有一位作曲家。[GetPlayer.GetCustom('mr_promote_has_composer_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_WRITER_TT: "#T 培养作家#!\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')]是讲故事的大师，致力于出版小说和其他文学作品。他们的作品能增加国家的[concept_manzoni_literary_tradition]。\n\n#n 注意：#!同一时间你仅能拥有一位1位国家级作家及3位本土作家。[GetPlayer.GetCustom('mr_promote_has_writers_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_PAINTER_TT: "#T 培养画家#!\n[Concept('concept_klimt_painter','$concept_klimt_painters$')]能在画布上描摹脑海中的想象，定格世界的风景与奇观。他们的作品会大大增加国家的[concept_klimt_painting_tradition]。\n\n#n 注意：#!同一时间你仅能拥有一位画家。[GetPlayer.GetCustom('mr_promote_has_painter_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
