 MR_CIVIL_ENGINEER_IRRIGATION_BUTTON_TT: "#T 灌溉项目#!\n让你的[concept_tesla_engineer]专注于改进[GetPlayer.GetName]的灌溉系统。你可以指定优先进行项目的地区，这些地区会获得#V $tesla_state_trait_irrigation$#!地区特质，这将增加农业建筑的[concept_throughput]以及对种种[Concept('concept_harvest_condition', '$concept_harvest_conditions$')]的抵抗力。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
