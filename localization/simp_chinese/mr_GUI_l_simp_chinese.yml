 MR_CHEMIST_CONGRESS_BUTTON_TT: "#T 化学家大会#!\n卡尔斯鲁厄大会是第一次现代化学的国际研讨会。该会议于1860年9月3日至5日在卡尔斯鲁厄的议会大厦举行，由弗里德里希·奥古斯特·凯库勒·冯·斯特拉多尼茨、查尔斯·阿道夫·武尔茨和卡尔·韦尔茨因发起。会议讨论的主题包括化合物的命名法及其公式表示，以及化合物的原子量和分子量问题。这是世界上第一次国际化学会议。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
