 MR_UPPER_EGYPT_EXPEDITION_TT: "#T 派遣探险队到帝王谷#!\n凭借古都底比斯和帝王谷，上埃及被认为是埃及的圣地。我们应该获得该地区的考古许可证并寻找埃及的宝藏。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V 累普济乌斯手信#!将开启埃及地区的考古活动。#!"
 MR_UPPER_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName]#V 当前未资助#!前往上埃及的[concept_lepsius_expedition]。#!"
 MR_UPPER_EGYPT_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName]要么#V 拥有#!上埃及，要么有其拥有者的[concept_lepsius_excavation_licence]。#!"
 MR_LOWER_EGYPT_EXPEDITION_TT: "#T 派遣探险队到金字塔遗迹#!\n自古以来，埃及金字塔就令人类着迷。据说那些已经消失在下埃及沙漠中的陵墓、寺庙甚至城市都在等待被重新发现。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LOWER_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName]#V 当前未资助#!前往下埃及的[concept_lepsius_expedition]。#!"
 MR_LOWER_EGYPT_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName]要么#V 拥有#!下埃及，要么有其拥有者的[concept_lepsius_excavation_licence]。#!"
 MR_BABYLONIA_EXPEDITION_TT: "#T 派遣探险队到文明的摇篮#!\n巴比伦是美索不达米亚的南部地区，它的名字来源于曾经强大的城市巴比伦。这里被认为是“文明的摇篮”，珍贵的考古文物一次又一次地被发现。它们绝对属于博物馆。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MESOPOTAMIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V 阿卡德语的秘密已被揭开#!，允许在美索不达米亚开展考古活动。#!"
 MR_BABYLONIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName]#V 当前未资助#!前往巴比伦的[concept_lepsius_expedition]。#!"
 MR_BABYLONIA_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName]要么#V 拥有#!巴格达，要么有其拥有者的[concept_lepsius_excavation_licence]。#!"
 MR_ASSYRIA_EXPEDITION_TT: "#T 派遣探险队到亚述空中花园#!\n亚述指的是美索不达米亚北部地区，有亚述和尼尼微两个重要城市。关于这个国家的稀少的知识可以追溯到《圣经》这个来源，但也许有更可靠的历史证据？\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASSYRIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName]#V 当前未资助#!前往亚述的[concept_lepsius_expedition]。#!"
 MR_ASSYRIA_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName]要么#V 拥有#!摩苏尔，要么有其拥有者的[concept_lepsius_excavation_licence]。#!"
 MR_ARGOLIS_EXPEDITION_TT: "#T 派遣探险队到阿伽门农之城#!\n在发现特洛伊城之后，即使是持怀疑态度的学者也开始意识到，古希腊人的神话不仅仅是童话故事。据说青铜时代的城市遗迹至今还在阿尔戈利斯，其中最著名的是迈锡尼，我们应该让自己相信这一点。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GREECE_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V 施里曼发现特洛伊#!，允许在希腊开展考古活动。#!"
 MR_ARGOLIS_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName]#V 当前未资助#!前往阿尔戈利斯的[concept_lepsius_expedition]。#!"
 MR_ARGOLIS_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName]要么#V 拥有#!伯罗奔尼撒半岛，要么有其拥有者的[concept_lepsius_excavation_licence]。#!"
 MR_CRETE_EXPEDITION_TT: "#T 派遣探险队到克里特岛的宫殿#!\n传说中的米诺斯国王曾经统治过克里特岛。与特洛伊和迈锡尼相似，这个故事似乎也有道理：岛上越来越多地发现来自传说中的米诺斯文化文物，我们国家也应该确保有其中的一些。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CRETE_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName]#V 当前未资助#!前往克里特岛的[concept_lepsius_expedition]。#!"
 MR_CRETE_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName]要么#V 拥有#!克里特岛，要么有其拥有者的[concept_lepsius_excavation_licence]。#!"
 MR_YUCATAN_EXPEDITION_TT: "#T 派遣探险队到玛雅的失落之城#!\n关于丛林中未知的巨大城市报告越来越多，我们应该进一步调查并派遣考古探险队前往尤卡坦。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_YUCATAN_EXPEDITION_DISCOVERED_TRIGGER_TT: "#default_text #V 斯蒂芬斯和卡瑟伍德远征#!，允许在尤卡坦开展考古活动。#!"
 MR_YUCATAN_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName]#V 当前未资助#!前往尤卡坦的[concept_lepsius_expedition]。#!"
 MR_YUCATAN_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName]要么#V 拥有#!尤卡坦，要么有其拥有者的[concept_lepsius_excavation_licence]。#!"
 MR_PERU_EXPEDITION_TT: "#T 派遣探险队去搜寻印加帝国的遗产#!\n飞行员报告说，他们在秘鲁上空飞行时看到安第斯山脉的奇怪堡垒和城墙结构，也许西班牙人并没有完全摧毁印加人的文化？一些土著人抵抗的城镇至今仍未被发现。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PERU_EXPEDITION_DISCOVERED_TRIGGER_TT: "#default_text #V 宾汉发现了马丘比丘#!，允许在秘鲁开展考古活动。#!"
 MR_PERU_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName]#V 当前未资助#!前往秘鲁的[concept_lepsius_expedition]。#!"
 MR_PERU_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName]要么#V 拥有#!$STATE_ICA$，要么有其拥有者的[concept_lepsius_excavation_licence]。#!"
 MR_EXODUS_CONGRESS_BUTTON: "《出埃及记》大会"
 MR_EXODUS_CONGRESS_BUTTON_TT: "#T 《出埃及记》大会#!\n随着对埃及和黎凡特的研究不断增加，圣经事件历史真实性的问题再度浮现。尤其是埃及文本中未有提及《出埃及记》中希伯来人离开埃及的事实，引发了摩西五经是否不仅是创作的争议。激进的科学家甚至要求完全忽略所有圣经故事。另一派则认为，圣经故事不能按字面意思理解，但确实具有科学价值。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXODUS_CONGRESS_EGYPTIAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetName]至少拥有#V 25件#!@lepsius_egypt_minor!埃及[Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]（当前[GetPlayer.MakeScope.Var('lepsius_egyptian_artifact_minor').GetValue|0+]件）。#!"
 MR_EXODUS_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text 全世界的国家至少已经发现了#V 150件#!@lepsius_egypt_minor![Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]（当前已发现[GetGlobalVariable('lepsius_global_artifacts').GetValue|+0]件@lepsius_egypt_minor!）。#!"
 MR_CIVILIZATION_CONGRESS_BUTTON: "文明起源大会"
 MR_CIVILIZATION_CONGRESS_BUTTON_TT: "#T 文明起源大会#!\n几个世纪以来，欧洲乃至地中海与中东各国都公认埃及是最为古老的文明。但随着来自亚述和巴比伦的发现日益增加，这一理论无疑然已经开始动摇。相反，事实证明文字显然是在美索不达米亚发明的——文明开端的其他许多成就也是如此。也许所有文明归根结底都起源于巴比伦——所有宗教都源于巴比伦神话？《吉尔伽美什史诗》也许是从圣经到荷马史诗的等各种文学的灵感来源？\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVILIZATION_CONGRESS_MESOPOTAMIAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetName]至少拥有#V 25件#!@lepsius_mesopotamia_minor!美索不达米亚[Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]（当前[GetPlayer.MakeScope.Var('lepsius_mesopotamian_artifact_minor').GetValue|0+]件）。#!"
 MR_CIVILIZATION_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text 全世界的国家至少已经发现了#V 300件#!@lepsius_mesopotamia_minor![Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]（当前已发现[GetGlobalVariable('lepsius_global_artifacts').GetValue|+0]件@lepsius_mesopotamia_minor!）。#!"
 MR_TROY_CONGRESS_BUTTON: "特洛伊大会"
 MR_TROY_CONGRESS_BUTTON_TT: "#T 特洛伊大会#!\n施里曼发现了特洛伊，至少他本人如此宣称。尽管认为特洛伊城纯属杜撰的批判已经减少，但仍有一系列问题继续解答。施里曼发现的特洛伊就是荷马史诗中的特洛伊吗？特洛伊究竟是什么？许多学者仍旧保持怀疑。安纳托利亚的新发现可以提供全新的视角。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TROY_CONGRESS_AEGEAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetName]至少拥有#V 25件#!@lepsius_aegean_minor!爱琴海[Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]（当前[GetPlayer.MakeScope.Var('lepsius_aegean_artifact_minor').GetValue|0+]件）。#!"
 MR_TROY_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text 全世界的国家至少已经发现了#V 300件#!@lepsius_aegean_minor![Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]（当前已发现[GetGlobalVariable('lepsius_global_artifacts').GetValue|+0]件@lepsius_aegean_minor!）。#!"
 MR_INSPECT_EXCAVATION_BUTTON: "检查发掘现场"
 MR_INSPECT_EXCAVATION_BUTTON_TT: "#T 检查发掘现场#!\n我们可以派遣一位经验丰富的考古学家到正在进行发掘的地区以推动当地的工作。我们的考古学家会在一年左右的时间里开辟一个新的发掘现场，并进行深入的研究，在此期间，我们可以进一步探索此前未知的重大考古发现的痕迹。成功与否主要取决于我们考古学家的经验。考古学会的成立也增加了我们的机会。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_INSPECT_EXCAVATION_TRIGGER_TT: "#default_text [GetPlayer.GetName]正在尚未取得重大考古发现的地区#V 进行[concept_lepsius_excavation]#!。#!"
 MR_INSPECT_EXCAVATION_ARTIFACT_FOR_DISCOVERY_TRIGGER_TT: "#default_text 在寻找线索之前，[GetPlayer.GetName]必须#V 研究过#!至少30件特定区域的[Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]。#!"
 MR_CANCEL_EXCAVATION_BUTTON: "召回考古发掘队"
 MR_CANCEL_EXCAVATION_BUTTON_TT: "#T 召回考古发掘队#!\n在某些情况下，召回考古发掘队可能很有用。我们获得的文物将保留下来，但我们的永久挖掘工作将结束。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHAEOLOGY_ON_ARCHAEOLOGICAL_EXCAVATION_TRIGGER_TT: "#default_text [GetPlayer.GetName]至少有#V 1支#![Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')]在进行[concept_lepsius_excavation]。#!"
 MR_LOCAL_EXCAVATION_BUTTON: "本土发掘"
 MR_LOCAL_EXCAVATION_BUTTON_TT: "#T 本土发掘#!\n不仅只在远方有着等待发掘的考古宝藏，尽管当地发掘的声望不如寻找著名文物，但这确实让我们深入了解了家乡的史前时代。与探险后的挖掘不同，当地挖掘在资金耗尽之前无法完成。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
