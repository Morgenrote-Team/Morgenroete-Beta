 MR_TRANSFORM_FOSSILS_TO_BONES_BUTTON_TT: "#T 将化石碎片拼成完整的骨骼#!\n如果你已经至少有1块骨骼且没有太多来自其他大陆的骨骼，则一个经验丰富或者著名的[concept_dubois_paleontologist]可以将20块[Concept('concept_dubois_fossil','$concept_dubois_fossils$')]并凑成1块[concept_dubois_dinosaur_bone]。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
