 MR_FOUND_ASYLUM_BUTTON_TT: "#T 建立精神病院#!\n将监狱中的罪犯与精神障碍者分别安置于不同机构，是迈向现代精神病学的第一步。一家专业的精神病院将为需要帮助的人提供更好的照料。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
