 MR_GEOLOGIST_GEOLOGICAL_RESEARCH_BUTTON_ACTIVE_TT: "#T 地质研究进行中#!\n地质学家正在国内各地游历，开展地质研究。通过这种方式，他还能发现地质构造、洞穴，后续甚至能找到铀矿。拥有矿物学家特质的地质学家，每年获取的矿物数量翻倍。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTRONOMER_SEARCHING_THE_SKIES_BUTTON_ACTIVE_TT: "#T 探索星空进行中#!\n你的[concept_verrier_astronomer]正在观测星空，以寻找新的[Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]。这将根据天文学家的技能和[Concept('concept_character_trait','$concept_character_traits$')]提升你每年发现的天体数量。"
 MR_SYSTEMIZE_FOSSILS_BUTTON_TT: "#T 化石系统化#!\n那些不在外考察的古生物学家可以从事更多的理论工作，尝试对化石进行系统化研究，重建动物的谱系，或是追踪植物在地球历史上的发展过程。这些理论研究可以为进一步的实地考察提供有力的指导，并深化对古生物世界的理解。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SYSTEMIZE_FOSSILS_BUTTON_ACTIVE_TT: "#T 化石系统化进行中#!\n你的古生物学家目前正致力于更理论性的工作，尝试将化石系统化，以重建动物的族谱并追溯植物在地球历史中的演化历程。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
