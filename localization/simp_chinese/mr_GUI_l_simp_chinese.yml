 MR_ACADEMICS_PROMOTE_ANTHROPOLOGIST_EFFECT_TT: "你的下一位学者将是[concept_andersson_anthropologist]。"
 MR_ACADEMICS_PROMOTE_UNIVERSITY_INVESTMENT_TT: "#T 学术投资#!\n政府对我国大学的整体性投资将使#O 学术发展点#!每月增加#G 1#!点。该项预算为期10年。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_PROMOTE_UNIVERSITY_INVESTMENT_TRIGGER_TT: "[GetPlayer.GetAdjective]尚未进行学术投资。"
 MR_ACADEMICS_AVANTGARDE_TT: "#T 前沿知识#!\n具有明确文化、社会学和人类学思想的学术集团主宰日常的科学生活。相比之下，实用领域的重要性则较低。\n#R 注#!：学者出现进度每月增加1点。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_AVANTAGRDE_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName]尚未选择#b 前沿知识#!且最近未更换其学术焦点。#!"
 MR_ACADEMICS_AVANTGARDE_BUILDING_REQUIREMENT_TT: "#default_text 至少有#p 50%#!的[GetPlayer.GetAdjective]大学使用[concept_pm_academics_university_humanities]。#!"
 MR_ACADEMICS_PRACTICAL_TT: "#T 实践学#!\n学者们孜孜不倦地努力使各个领域的发现适合日常实用，致力于人类的普世进步与和平。\n#R 注#!：学者出现进度每月增加1点。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_PRACTICAL_OR_CONFUSION_TT: "#S [GetPlayer.GetName]尚未选择#b 实践学#!且最近未更换其学术焦点。#!"
 MR_ACADEMICS_PRACTICAL_BUILDING_REQUIREMENT_TT: "#default_text 至少有#p 50%#!的[GetPlayer.GetAdjective]大学使用[concept_pm_academics_university_natural_history]。#!"
 MR_ACADEMICS_MILITARY_TT: "#T 军工复合#!\n关系网、私人关系与交情使得私营实业家与军队合作。让军工业得以发展，其中还夹杂着一丝腐败，可以称之为军工复合体的最佳写照。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_MILITARY_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName]尚未选择#b 军工复合#!且最近未更换其学术焦点。#!"
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_TT: "#default_text 至少有#p 50%#!的[GetPlayer.GetAdjective]大学使用[concept_pm_academics_university_mathematics]。#!"
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_2_TT: "#default_text [GetPlayer.GetName]至少有1家#p 5级#!及以上的[GetBuildingType('building_automotive_industry').GetName]、[GetBuildingType('building_arms_industry').GetName]、[GetBuildingType('building_munition_plant').GetName]或[GetBuildingType('building_artillery_foundry').GetName]。#!"
 MR_ACADEMICS_MILITARY_ARMY_SIZE_REQUIREMENT_TT: "#default_text [GetPlayer.GetAdjective]的军队规模为#b 50#!及以上。#!"
 MR_ACADEMICS_BUSINESS_TT: "#T 商学与资本主义#!\n独立个体与繁荣的进步时代相结合，形成了这样一种思维模式：商贸学校、中型企业和大型集团对国家的科学发展具有决定性的影响。反之亦然，大学致力于通过新技术提高国家的繁荣程度，并借助进步推动社会思想的发展。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_BUSINESS_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName]尚未选择#b 商学与资本主义#!且最近未更换其学术焦点。#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_TT: "#default_text 至少有#p 35%#!的[GetPlayer.GetAdjective]大学使用[concept_pm_academics_university_mathematics]。#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_2_TT: "#default_text 至少有#p 35%#!的[GetPlayer.GetAdjective]大学使用[concept_pm_academics_university_humanities]。#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_3_TT: "#default_text [GetPlayer.GetName]拥有一座[GetBuildingType('building_textile_mill').GetName]（不低于#p 15级#!）或[GetBuildingType('building_furniture_manufactory').GetName]（不低于#p 15级#!）或[GetBuildingType('building_steel_mill').GetName]（不低于#p 10级#!）或[GetBuildingType('building_tooling_workshop').GetName]（不低于#p 10级#!）或[GetBuildingType('building_motor_industry').GetName]（不低于#p 5级#!）或[GetBuildingType('building_electrics_industry').GetName]（不低于#p 5级#!）。#!"
 MR_ACADEMICS_SEAPOWER_TT: "#T 海权与商业#!\n海军和国际贸易在我国发挥着巨大作用。通过先进生产和产品的全球贸易来促进繁荣，与捍卫已经赢得的成果同样重要。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_SEAPOWER_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName]尚未选择#b 海权与商业#!且最近未更换其学术焦点。#!"
 MR_ACADEMICS_SEAPOWER_BUILDING_REQUIREMENT_TT: "#default_text 至少有#p 35%#!的[GetPlayer.GetAdjective]大学使用[concept_pm_academics_university_mathematics]。#!"
 MR_ACADEMICS_SEAPOWER_BUILDING_REQUIREMENT_2_TT: "#default_text 至少有#p 35%#!的[GetPlayer.GetAdjective]大学使用[concept_pm_academics_university_natural_history]。#!"
 MR_ACADEMICS_SEAPOWER_NAVY_SIZE_REQUIREMENT_TT: "#default_text [GetPlayer.GetAdjective]的海军规模为#b 50#!及以上。#!"
 MR_ACADEMICS_USEFUL_TT: "#T 实用学#!\n这个学院被视为研究甲虫、擦洗旧花瓶与涉猎奇闻异事的怪人天堂。然而，不可否认的是，这里与社会隔绝也有其好处。许多教授不受外界干扰，从而更好地工作。\n#R 注#!：学者出现进度每月增加1点。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_USEFUL_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName]尚未选择#b 实用学#!且最近未更换其学术焦点。#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_TT: "#default_text 至少有#p 35%#!的[GetPlayer.GetAdjective]大学使用[concept_pm_academics_university_humanities]。#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_2_TT: "#default_text 至少有#p 35%#!的[GetPlayer.GetAdjective]大学使用[concept_pm_academics_university_natural_history]。#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_3_TT: "#default_text [GetPlayer.GetName]拥有一座[GetBuildingType('building_lepsius_archaeological_museum').GetName]、[GetBuildingType('building_verrier_observatory').GetName]或[GetBuildingType('building_dubois_zoo').GetName]。#!"
 MR_MOUNTAIN_EXPEDITION_TT: "#T 登山探险#!\n1786年登顶勃朗峰后，征服地球高峰的新时代开始了，并在19与20世纪更加风行。如果领土上有尚未攀登过的山脉，我们可以指派拥有适当技能的陆军将领将之征服。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_UNCONQUERED_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有至少一座#V 尚未征服的山峰#!或拥有前者国家的#V 登山许可#!。#!"
 MR_MOUNTAIN_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName]最近没有成功登顶或者登山探险失败。#!"
 MR_ZEPPELIN_EXPEDITION_TT: "#T 齐柏林飞艇探险#!\n极地航空，即“用飞艇探索北极的国际研究会”是一个非政府的科学协会，它为自己设定的目标是利用飞艇进行极地研究。它主要是在飞行员和后来的协会秘书长瓦尔特‑布鲁斯的倡议下成立的。1924年的创始主席是弗里乔夫·南森。经过几年的准备工作，该协会于1931年首次成功地使用飞艇进行了纯粹的科学极地考察。通过齐柏林伯爵号的北极飞行，对飞过的极地地区的地理知识有了很大扩展。早在1926年，翁贝托·诺比莱就用他的飞艇“挪威号”飞过了北极，后来又用“意大利号”进行了一次探险。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ZEPPELIN_OBSERVATORY_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有一座使用#V 气象站#!生产方式的[GetBuildingType('building_verrier_observatory').GetName]。#!"
 MR_ZEPPELIN_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有或可通过[concept_curtiss_airspace_convention]涉足这些地区：#V 格陵兰#!、#V 挪威北部#!、#V 阿拉斯加#!、#V 努纳武特#!或#V 涅涅茨#!。#!"
 MR_ZEPPELIN_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName]#V 最近及现在#!没有开展#V 齐柏林飞艇探险#!。#!"
 MR_PACIFIC_EXPEDITION_TT: "#T 太平洋探险#!\n太平洋是南北极之外地球上最后一个尚未完全揭秘的地区。多个科学领域的学者都对以开展自然史、考古学、天文学和海洋学的研究任务颇感兴趣。同时，列强可能通过在世界尽头展现其影响力而声名显赫。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PACIFIC_RANK_TRIGGER_TT: "#default_text [GetPlayer.GetName]是#V 主要政权#!或#V 列强#!。#!"
 MR_PACIFIC_PORT_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有[GetBuildingType('building_port').GetName]。#!"
 MR_PACIFIC_UNIVERSITY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有[GetBuildingType('building_university').GetName]。#!"
 MR_PACIFIC_15_FLOTILLAS_TRIGGER_TT: "#default_text [GetPlayer.GetName]#V 有十五队海军#!#!"
 MR_PACIFIC_ADMIRAL_AVAILABLE_TRIGGER_TT: "#default_text [GetPlayer.GetName]拥有一位#V 空闲的#!#V 海军将领#!。#!"
 MR_PACIFIC_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName]#V 最近及现在#!没有开展#V 太平洋探险#!。#!"
