 MR_RED_CROSS_BUTTON: "建立[concept_panum_red_cross]"
 MR_RED_CROSS_BUTTON_TT: "#T 成立[concept_panum_red_cross]#!\n国际红十字会是最早的一批超国家组织，其成立标志着迈向国际法的一大步。红十字会的宗旨为护生命，保尊严，减疾苦。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IRC_INFAMY_TRIGGER_TT: "#default_text [GetPlayer.GetName]的[concept_infamy]不超过#V 35#!。#!"
 MR_JOIN_RED_CROSS_BUTTON: "加入[concept_panum_red_cross]"
 MR_JOIN_RED_CROSS_BUTTON_TT: "#T 加入[concept_panum_red_cross]#!\n我国可以加入国际红十字会并通过国际协定提高其声望——哪怕以残酷的战争为代价。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_FIRST_CONVENTION_BUTTON: "签署《日内瓦第一公约》"
 MR_SIGN_FIRST_CONVENTION_BUTTON_TT: "#T 签署第一公约#!\n《日内瓦第一公约》（全称《改善战地武装部队伤者病者境遇之日内瓦公约》）旨在为保护冲突各方的战地武装部队的伤者、病者、医护人员及随军牧师等获得人道待遇与照顾，禁止对其生命之任何危害或对其人身之暴行，并不得对其加以谋杀或消灭，施以酷刑或供生物学的实验。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_SECOND_CONVENTION_BUTTON: "签署《海牙公约》"
 MR_SIGN_SECOND_CONVENTION_BUTTON_TT: "#T 签署《海牙公约》#!\n1899年和1907年的《海牙公约》是一系列国际条约和宣言，是在荷兰海牙举行的两次国际和平会议上谈判达成的。两次会议都包括有关裁军、战争法和战争罪的谈判，1907年的会议更加关注海战。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_THIRD_CONVENTION_BUTTON: "签署《日内瓦议定书》"
 MR_SIGN_THIRD_CONVENTION_BUTTON_TT: "#T 签署《日内瓦议定书》#!\n《日内瓦议定书》（全称为《禁止在战争中使用窒息性、毒性或其他气体和细菌作战方法的议定书》），让各缔约国同意在战争中不使用窒息性、毒性或其他气体，以及使用一切类似的液体、物体或器件，即化学武器与生物武器。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_RED_CROSS_BUTTON: "退出红十字会"
 MR_LEAVE_RED_CROSS_BUTTON_TT: "#T 退出红十字会#!\n凡人皆狼。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_INTRODUCE_MEDICAL_TECHNIQUES_LEVEL_BUTTON_TT: "#T 引进医疗技术#!\n医生可向全国范围内的医疗机构推广现代化设备、先进的治疗方法和创新型治疗手段。有时，医生甚至能够研发出令人瞩目且颠覆传统的新发明。\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_INTRODUCE_MEDICAL_TECHNIQUES_LEVEL_BUTTON_ACTIVE_TT: "#T 引进医疗技术#!\n你的医生正在全国范围内的医疗机构推广现代化设备、先进的治疗方法和创新型治疗手段。有时，医生甚至能够研发出令人瞩目且颠覆传统的新发明。"
