 MR_EXTINCTION_CONGRESS_BUTTON: "恐龙灭绝原因大会"
 MR_EXTINCTION_CONGRESS_BUTTON_TT: "#T 恐龙灭绝原因大会#!\n自然历史中最令人费解的谜团之一仍然是恐龙的消失。古生物学之父乔治·居维叶发现白垩纪末期发生过一次导致恐龙绝种的大灭绝。但统治了地球数百万年的可怕蜥蜴怎么会突然被时代淘汰呢？\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
