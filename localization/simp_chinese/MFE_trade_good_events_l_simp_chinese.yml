l_simp_chinese:
 MFE_trade_good_events.1.t: "为[SCOPE.sW('active_war').GetName]而生的子弹"
 MFE_trade_good_events.1.d: "我们收到报告说[SCOPE.sC('munitions_state').GetName]的弹药厂最近升级了设备。"
 MFE_trade_good_events.1.f: "“[SCOPE.sC('munitions_state').GetAdjective]的媒体一直在为这一令人印象深刻的成就欢呼雀跃，我们也理解他们的兴奋。”"
 MFE_trade_good_events.1.a: "战争打响了"
 MFE_trade_good_events.2.t: "乞求军火"
 MFE_trade_good_events.2.d: "[SCOPE.sW('active_war').GetName]所涉及的战争暴露了[SCOPE.sC('ally').GetName]弹药库存的匮乏，他们正在恳求我们提供弹药"
 MFE_trade_good_events.2.f: "请你开个价，[ROOT.GetCountry.GetName]，等我们赢得这场战争后，就按这个价格支付"
 MFE_trade_good_events.2.a: "我们可以留几颗子弹"
 MFE_trade_good_events.2.b: "没有子弹，我们如何射杀敌人？"
 MFE_trade_good_events.3.t: "[SCOPE.sC('ally').GetName]提出秘密请求"
 MFE_trade_good_events.3.d: "看来[SCOPE.sW('active_war').GetName]让[SCOPE.sC('ally').GetName]对这样的冲突措手不及，他们的物资，尤其是弹药已经所剩无几。\n\n他们秘密派遣了外交官来找我们，如果我们能帮助提供炮弹，他们就会向我们许下各种承诺。"
 MFE_trade_good_events.3.f: "“相信我——[SCOPE.sC('ally').GetName]绝对能赢得这场战争，只是我们需要一些帮助！不要在我们最绝望的时候抛弃我们！”"
 MFE_trade_good_events.3.a: "我们可以腾出几门大炮"
 MFE_trade_good_events.3.b: "恐怕，我们自己的储备也太少了"
 MFE_trade_good_events.4.t: "安全漏洞"
 MFE_trade_good_events.4.d: "据我们的间谍机构报告，[SCOPE.sS('arms_state').GetName]的军事工厂遭受了某种形式的入侵，大量的炸药已经失踪。"
 MFE_trade_good_events.4.f: "他们怎么能让这样的事情发生？"
 MFE_trade_good_events.4.a: "希望它们没有落入坏人之手"
 MFE_trade_good_events.5.t: "[SCOPE.sS('arable_state').GetName]获得了丰收"
 MFE_trade_good_events.5.d: "我们不断听到报告说，[SCOPE.sS('arable_state').GetName]地区的降雨对该地区的农场起到了奇效，使本已十分可观的农业产出超出了任何人的预期。"
 MFE_trade_good_events.5.f: "今年的收成如此丰盛，以至于我们这个季节需要雇佣更多的劳工，尤其幸运的是我们刚好负担得起。"
 MFE_trade_good_events.5.a: "真是再好不过的时机了"
 MFE_trade_good_events.6.t: "坦克工厂的疯子"
 MFE_trade_good_events.6.d: "当地报纸上充斥着来自[SCOPE.sS('tank_state').GetName]的可怕头条——一个疯子不知怎的夺取了一辆坦克，并进行了残暴的疯狂行径，摧毁了一个整个村庄，并在被警方制止前杀害了数十名无辜者。"
 MFE_trade_good_events.6.f: "没有人知道为什么会发生这种毫无意义的悲剧，我们永远也无法找出原因"
 MFE_trade_good_events.6.a: "我们与他们一样悲伤，奈何也是无能为力"
 MFE_trade_good_events.6.b: "他们要啥给啥——这太可怕了……"
 MFE_trade_good_events.7.t: "[SCOPE.sS('plane_state').GetName]的投资飞速增长"
 MFE_trade_good_events.7.d: "航空业投资者不断涌入[SCOPE.sS('plane_state').GetName]，竞相出价，以争取与当地工厂签订合同。"
 MFE_trade_good_events.7.f: "我们以前从未见过这样的情况——工业家们都在争先恐后地分一杯羹，以免为时已晚"
 MFE_trade_good_events.7.a: "这是生活在[SCOPE.GetRootScope.GetCountry.GetName]的最美好的时光"
 MFE_trade_good_events.8.t: "粗制滥造"
 MFE_trade_good_events.8.d: "[SCOPE.sS('ironclad_state').GetName]在出口船只方面，很快就获得了工艺劣质的恶名。"
 MFE_trade_good_events.8.f: "这些船下水还不到一个月，就已经完全生锈了？这说明使用的钢铁的质量太差了。"
 MFE_trade_good_events.8.a: "希望他们的供应会越来越好"
 MFE_trade_good_events.9.t: "吃力不讨好的活"
 MFE_trade_good_events.9.d: "[SCOPE.sS('grain_state').GetName]的粮食短缺开始引发社会问题，知识分子中的激进人士趁机攻击[SCOPE.GetRootScope.GetCountry.GetName]对管理失责。"
 MFE_trade_good_events.9.f: "“不能养活公民的政府不应被人民赋予权力”"
 MFE_trade_good_events.9.a: "但他们真的需要食物来生存吗？"
 MFE_trade_good_events.9.b: "将部分资金资向[SCOPE.sS('grain_state').GetName]倾斜"
 MFE_trade_good_events.9.c: "据我所知，[SCOPE.sS('grain_state').GetName]的商店里有很多蛋糕可吃。"
 MFE_trade_good_events.10.t: "辛辣的虾和鲈鱼"
 MFE_trade_good_events.10.d: "最近，[SCOPE.sS('fish_state').GetName]的拖网渔船带来的渔获物味道很臭，所有类型的海鲜都有一种油腻腻的口感，吃起来像腐烂的鱼。"
 MFE_trade_good_events.10.f: "“唉，你闻到了吗？我看你一进这栋楼就想离开，就连巷子里的猫都不想要这东西。”"
 MFE_trade_good_events.10.a: "鱼怎么可能太腥呢？"
 MFE_trade_good_events.11.t: "[SCOPE.sS('ship_state').GetName]的造船厂"
 MFE_trade_good_events.11.d: "[SCOPE.sS('ship_state').GetName]的港务局长报告说那里建造的军舰已经完工了。"
 MFE_trade_good_events.11.f: "“我希望你带来了一瓶香槟，因为按照惯例，军舰下水时要举行掷酒礼。”"
 MFE_trade_good_events.11.a: "提前完工？这消息太棒了！"
 MFE_trade_good_events.11.b: "这种情况下，我们需要更多的香槟！"
 MFE_trade_good_events.12.t: "[SCOPE.sS('fabric_state').GetName]的纺织品"
 MFE_trade_good_events.12.d: "[SCOPE.sS('fabric_state').GetName]生产的织物以其精湛的工艺赢得了良好的国际声誉。"
 MFE_trade_good_events.12.f: "看看这布料在阳光下的华光流转，你觉得这是埃及棉吗？"
 MFE_trade_good_events.12.a: "我们很高兴总是听到各行各业蓬勃发展的消息"
 MFE_trade_good_events.12.b: "这是高级定制时装！"
 MFE_trade_good_events.13.t: "锯木厂的火灾"
 MFE_trade_good_events.13.d: "[SCOPE.sS('sawmill_fire_state').GetName]的报纸报道了一场可怕的大火，大火烧毁了整个城市。"
 MFE_trade_good_events.13.f: "“城郊的一堆油渍斑斑的破布着火了，引起的大火致使139人死亡。”"
 MFE_trade_good_events.13.a: "真是一场灾难！那些可怜的无辜魂灵"
 MFE_trade_good_events.13.b: "立即派出救援人员！"
 MFE_trade_good_events.14.t: "[SCOPE.sS('hardwood_state').GetName]的上好木材"
 MFE_trade_good_events.14.d: "[SCOPE.sS('hardwood_state').GetName]各地的家具制造商都使用当地森林中的硬木而闻名。"
 MFE_trade_good_events.14.f: "“来吧，看看这木纹，敲一下木板……您听到那声音了吗？这是多么结实坚固的东西……能让您用上足足一百年呐。”"
 MFE_trade_good_events.14.a: "这是件好事，对吧？"
 MFE_trade_good_events.14.b: "听起来太棒啦！让我们用这些木材制造乐器吧！"
 MFE_trade_good_events.15.t: "[SCOPE.sS('grocery_state').GetName]出现一股有组织犯罪狂潮"
 MFE_trade_good_events.15.d: "在[SCOPE.sS('grocery_state').GetName]，饥肠辘辘的当地人正在合伙抢劫杂货店和熟食店。"
 MFE_trade_good_events.15.f: "'在一磅烤牛肉的价格在六个月内翻倍的时候，作为普通人能有什么选择？'"
 MFE_trade_good_events.15.a: "希望警方能平息此事"
 MFE_trade_good_events.15.b: "我们需要救济而非武力！"
 MFE_trade_good_events.16.t: "乏善可陈的现状"
 MFE_trade_good_events.16.d: "棉花价格的上涨导致[SCOPE.sS('clothes_state').GetName]的服装价格飞涨。"
 MFE_trade_good_events.16.f: "“哦，是的，情况肯定会变得更糟。我还看见街头的小子们套着面粉袋来当衣服，相信我，最起码他们这样已经挺幸运了。”"
 MFE_trade_good_events.16.a: "这是一场悲剧，但超出了我们的控制范围……"
 MFE_trade_good_events.16.b: "我想我们每个人都能买得起一袋面粉……"
 MFE_trade_good_events.17.t: "陈列室里的悲剧"
 MFE_trade_good_events.17.d: "[SCOPE.GetRootScope.GetCountry.GetRuler.GetFullName]在视察完[SCOPE.sS('furniture_state').GetName]的家具厂后，毫无预兆地坐在椅子上暴毙了。"
 MFE_trade_good_events.17.f: "“[SCOPE.sS('furniture_state').GetName]中驻扎了大量的警察，导致我们很难获知事情的一切细节，但这确实是出人意料的灾难。”"
 MFE_trade_good_events.17.a: "这是不幸的意外，还是有些什么不好的事情发生了？"
 MFE_trade_good_events.17.b: "嗯……谋杀之椅。我们的收藏品里正少一把。"
 MFE_trade_good_events.18.t: "世界上最好的纸"
 MFE_trade_good_events.18.d: "[SCOPE.sS('paper_state').GetName]的纸张产量超出了所有人的预期，该地区正成为众所周知的纸业重镇。"
 MFE_trade_good_events.18.f: "“就在二十年前，镇子上还没工厂，现在每个街区上都有一个。”"
 MFE_trade_good_events.18.a: "我们会把这种纸折起来卖，你懂我意思吧。"
 MFE_trade_good_events.18.b: "请用纸！"
 MFE_trade_good_events.19.t: "星星？"
 MFE_trade_good_events.19.d: "[SCOPE.sS('power_state').GetName]对电力的需求和使用越来越高，特别是街边路灯的增多，加剧了光污染。"
 MFE_trade_good_events.19.f: "“以前，在晴朗的夜晚，你可以在城镇广场上看到北斗七星，但现在如果你想好好看星星，就必须得到乡村去。”"
 MFE_trade_good_events.19.a: "你可以说，进步会带来意想不到的后果。"
 MFE_trade_good_events.19.b: "晚上关掉一些灯！"
 MFE_trade_good_events.20.t: "频临爆炸的局势"
 MFE_trade_good_events.20.d: "在[SCOPE.sS('sulfur_state').GetName]附近的硫矿发生的大爆炸摧毁了工地并带走了上百名工人的性命。"
 MFE_trade_good_events.20.f: "“这似乎就像其他的普通日子一样，但是突然地面震动起来并发出可怕的声音……”"
 MFE_trade_good_events.20.a: "有其他的人被困在地下吗？这真是糟透了。"
 MFE_trade_good_events.20.b: "硫磺在哪？它安全吗？一切是否正常？"
 MFE_trade_good_events.21.t: "铅矿内的怪异场景"
 MFE_trade_good_events.21.d: "[SCOPE.sS('lead_state').GetName]的铅矿发生了事故；一切都完了。"
 MFE_trade_good_events.21.f: "“工人们仍在努力营救被困地下的人，但情况看起来不太好……”"
 MFE_trade_good_events.21.a: "我们对这种悲惨的、毫无意义的生命损失表示哀悼"
 MFE_trade_good_events.21.b: "这是我们的主要的铅矿！"
 MFE_trade_good_events.22.t: "有害化学物质渗入地下"
 MFE_trade_good_events.22.d: "[SCOPE.sS('lead_state').GetName]附近的铅矿正在污染当地的饮用水源。"
 MFE_trade_good_events.22.f: "“农民们说这些水会导致肾脏疾病和脱发，并要求[SCOPE.GetRootScope.GetCountry.GetRuler.GetFullName]从当地的一口井里喝水，以示团结。”"
 MFE_trade_good_events.22.a: "我才不要这样！把那杯水拿开"
 MFE_trade_good_events.22.b: "这是我喝过的味道最好的水！"
 MFE_trade_good_events.23.t: "新时代的曙光"
 MFE_trade_good_events.23.d: "被称为“橡胶”的神奇材料改变了所有人的生活，无论是繁华的大都市还是荒僻的乡村。"
 MFE_trade_good_events.23.f: "“虽然这听起来有些夸张，但平心而论，我们正在进入一个新时代——这种奇妙的材料几乎可以制成任何东西！”"
 MFE_trade_good_events.23.a: "我们欢迎这种材料所带来的技术进步"
 MFE_trade_good_events.23.b: "越多越好！"
 MFE_trade_good_events.24.t: "[SCOPE.sS('oil_state').GetName]的黑色黄金"
 MFE_trade_good_events.24.d: "[SCOPE.sS('oil_state').GetName]中发现的石油让不知多少人一夜之间成为百万富翁，增加了国人对挖油的兴趣。"
 MFE_trade_good_events.24.f: "“这东西看起来不贵，但我可要告诉你，它与同等重量的黄金一样值钱！”"
 MFE_trade_good_events.24.a: "我们的重工业需要我们能找到的一切石油，所以这真是让人开心。"
 MFE_trade_good_events.24.b: "我更喜欢真正的黄金！"
 MFE_trade_good_events.25.t: "炼钢厂摧毁当地社区"
 MFE_trade_good_events.25.d: "[SCOPE.sState('steel_state').GetName]的人们开始对镇上的钢铁工厂感到不满，为他们传统生活方式的丧失而哀叹。"
 MFE_trade_good_events.25.f: "“起初，我们只是对这份工作心怀感激，但是每周7天，每天16小时……这就是我们的生活吗？”"
 MFE_trade_good_events.25.a: "[ROOT.GetCountry.GetName]的未来要求我们建立一个强大的钢铁工业！"
 MFE_trade_good_events.25.b: "至少他们可以少上班了……"