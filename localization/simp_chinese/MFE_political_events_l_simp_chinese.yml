l_simp_chinese:
 test_event_title:0 "测试"
 test_event_desc:0 "测试"
 test_event_flavor:0 "测试"
 test_event.a:0 "测试"
 test_event.b:0 "测试"
 MFE_political_events.1.t:0 "匿名文章"
 MFE_political_events.1.d:0 "[SCOPE.gsInterestGroup('ig_intelligentsia').GetName]的成员在当前的政治局势下有恃无恐，正在报纸上发表无耻的反政府言论。"
 MFE_political_events.1.f:0 "“在这个时代，人民对[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]有什么用？我们为[ROOT.GetCountry.GetName]设想了一个更美好的未来，一个从暴君的控制中解放出来的未来。”"
 MFE_political_events.1.a:0 "什么傻卵？打压这些议论！"
 MFE_political_events.1.b:0 "允许这些出版物自由发行"
 MFE_political_events.2.t:0 "地方选举受阻"
 MFE_political_events.2.d:0 "在[ROOT.GetCountry.GetCapital.GetName]，政治局势高度紧张，导致党报的当地办公室受到攻击。"
 MFE_political_events.2.f:0 "“我看到他们这些人，来自[SCOPE.sParty('harassing_party').GetName]的人，拿着撬棍和斧头说他们要砸掉[SCOPE.sParty('harassed_party').GetName]印刷机，并对妨碍的人动粗。”"
 MFE_political_events.2.a:0 "为[SCOPE.sParty('harassed_party').GetName]辩护"
 MFE_political_events.2.b:0 "谴责[SCOPE.sParty('harassing_party').GetName]暴徒"
 MFE_political_events.3.t:0 "投票舞弊"
 MFE_political_events.3.d:0 "[ROOT.GetCountry.GetCapital.GetName]的选举结果因反对党被指控恶意重复投票和收买选票，而不公正。"
 MFE_political_events.3.f:0 "“今天我见过你多少次了，年轻人？我发誓你已经来过这里了……”"
 MFE_political_events.3.a:0 "[SCOPE.sParty('party_1').GetName]显然伪造了选票……"
 MFE_political_events.3.b:0 "[SCOPE.sParty('party_2').GetName]不值得信任……"
 MFE_political_events.4.t:0 "工人委员会"
 MFE_political_events.4.d:0 "[SCOPE.sState('workers_state').GetName]中的[SCOPE.gsInterestGroup('ig_tradeunions').GetName]准备筹办相劳工建立一个委员会，并正在鼓动在工作场所争取更多权利。"
 MFE_political_events.4.f:0 "“工厂十二小时轮班是不人道的，是对人类尊严的侮辱；我告诉你们，工人们，另一种方式是可行的。”"
 MFE_political_events.4.a:0 "我们将允许他们集会……暂时"
 MFE_political_events.4.b:0 "这是无法接受的！集会必须暂停。"
 MFE_political_events.5.t:0 "地方管理冲突"
 MFE_political_events.5.d:0 "我们一个省的工会抗议工厂经理虐待工人。这名工厂经理在工人恰好达到他心中懒惰的标准时，甚至会用手杖打他们。我们可以让他撤职，但工厂老板坚持说经理做得很好。"
 MFE_political_events.5.f:0 "所以我们要他撤职。不仅是撤职，而且是好好地撤职。你知道吗？我们不再需要他了。他是个讨厌鬼，让我来告诉你。"
 MFE_political_events.5.a:0 "对此我们什么也做不了……"
 MFE_political_events.5.b:0 "我们需要立即介入"
 MFE_political_events.6.t:0 "公众集会举行"
 MFE_political_events.6.d:0 "基于邻国的公众集会成功，[ROOT.GetCountry.GetCapital.GetName]的[SCOPE.gsInterestGroup('ig_trade_unions').GetName]也开始开始举行公众集会。"
 MFE_political_events.6.f:0 "“一个人的力量不算什么，但当我们联合起来！整个[ROOT.GetCountry.GetName]都得听我们的！”"
 MFE_political_events.6.a:0 "这些集会是无害的……让他们继续"
 MFE_political_events.6.b:0 "尽我们所能阻止这种活动"
 MFE_political_events.7.t:0 "袭击济贫院"
 MFE_political_events.7.d:0 "[SCOPE.sState('attacked_state').GetName]的示威活动已经失控，已演变成街头流血事件。"
 MFE_political_events.7.f:0 "“钢厂的那帮该死的混混开始在厂外聚集，在警察赶到驱散人群之前，……好吧，你知道发生了什么。”"
 MFE_political_events.7.a:0 "民主本身就是一项混乱的工作"
 MFE_political_events.7.b:0 "尽我们所能……"
 MFE_political_events.8.t:0 "济贫院罢工"
 MFE_political_events.8.d:0 "[ROOT.GetCountry.GetCapital.GetName]的工资拖欠和面包短缺导致了工人罢工。"
 MFE_political_events.8.f:0 "“我们的辛苦劳作得到的是什么？是肚子空空！而那些资本家指望我们从日出到日落地劳动！却不肯给我们任何大修！去街垒吧！同志！”"
 MFE_political_events.8.a:0 "派出警察！"
 MFE_political_events.8.b:0 "不是啥大事……"
 MFE_political_events.9.t:0 "教授批评投票制度"
 MFE_political_events.9.d:0 "一位被[SCOPE.gsInterestGroup('ig_intelligentsia').GetName]追捧的大学教授[SCOPE.sCharacter('professor').GetFullName]，一直在一系列公开讲座中抨击[ROOT.GetCountry.GetName]的选举。"
 MFE_political_events.9.f:0 "“我现在提请你注意这些更细微的问题，经过进一步思考，不言而喻，[ROOT.GetCountry.GetRuler.GetFullName]的存在是一个站不住脚的结构。”"
 MFE_political_events.9.a:0 "这些是有效的论点……"
 MFE_political_events.9.b:0 "警告[SCOPE.sCharacter('professor').GetFullName]不要公开演讲"
 MFE_political_events.10.t:0 "贸易政策谈判"
 MFE_political_events.10.d:0 "经过一段时间的争论，[ROOT.GetCountry.GetCapital.GetName]的贸易政策谈判终于有了突破性进展。"
 MFE_political_events.10.f:0 "“俗话说，一个好的妥协会让双方都满意。现在每个人都能从目前的协议中获益！这确实是外交技巧的高超展示。”"
 MFE_political_events.10.a:0 "这要归功于[SCOPE.gsInterestGroup('ig_industrialists').GetName]。"
 MFE_political_events.10.b:0 "[ROOT.GetCountry.GetRuler.GetFullName]单枪匹马实现了这一目标！"
 MFE_political_events.11.t:0 "面包暴动"
 MFE_political_events.11.d:0 "国外粮食短缺导致[SCOPE.sState('bread_riot_state').GetName]的面包价格暴涨。"
 MFE_political_events.11.f:0 "“以前一个便士可以买六个面包，现在呢？能找到一家还开着的面包店就已经走运了。”"
 MFE_political_events.11.a:0 "国家尽力救济灾民"
 MFE_political_events.11.b:0 "如果他们想要面包，他们可以买！"
 MFE_political_events.12.t:0 "艰难岁月"
 MFE_political_events.12.d:0 "在[SCOPE.sState('bread_queue_state').GetName]的旱灾开始危急当地的农民，在[ROOT.GetCountry.GetName]造成粮食危机"
 MFE_political_events.12.f:0 "“雨？我们在[SCOPE.sState('bread_queue_state').GetName]这里已经几个月没有看到过！我们将失去一切……”"
 MFE_political_events.12.a:0 "立即援助"
 MFE_political_events.12.b:0 "好吧，他们得自己搞定"
 MFE_political_events.13.t:0 "跨境枪支贸易"
 MFE_political_events.13.d:0 "有报道称，无良商人走私大量武器到[SCOPE.sState('neighbor_neighbor_state').GetName]，这加剧了暴力！！"
 MFE_political_events.13.f:0 "“[SCOPE.sState('neighbor_neighbor_state').GetName]目前是一个火药桶，只需一个火星就能引爆。”"
 MFE_political_events.13.a:0 "自由主义市场的局限性让我们什么都做不了……"
 MFE_political_events.13.b:0 "要求他们立即停止！"
 MFE_political_events.14.t:0 "地方企业失败"
 MFE_political_events.14.d:0 "在[SCOPE.sState('failing_building').GetName]发生的事故迅速成为国际头条——一家工厂的爆炸导致32名工人死亡。"
 MFE_political_events.14.f:0 "“我们怎么会知道锅炉会爆炸？忘了[SCOPE.gsInterestGroup('ig_trade_unions').GetName]吧，要过几个月才能恢复营业！”"
 MFE_political_events.14.a:0 "行贿来解决"
 MFE_political_events.14.b:0 "我们需要人民的支持"
 MFE_political_events.15.t:0 "征兵运动"
 MFE_political_events.15.d:0 "在[SCOPE.sState('conscription_state').GetName]涌现建功立业狂热，导致了前所未有的大量应征者自愿入伍。"
 MFE_political_events.15.f:0 "“让孩子们尝尝荣耀的滋味并没有错——反正他们会在圣诞节前回家。”"
 MFE_political_events.15.a:0 "完成征兵运动"
 MFE_political_events.15.b:0 "我们不需要额外的士兵"
 MFE_political_events.16.t:0 "世俗化政策"
 MFE_political_events.16.d:0 "[SCOPE.sCharacter('ig_leader').GetFullName]是一位颇有名气的宗教人士，他一直公开呼吁[ROOT.GetCountry.GetName]政府采取更多措施来支持社会中最贫穷的人。"
 MFE_political_events.16.f:0 "“在[ROOT.GetCountry.GetRuler.GetFullName]过着柔软奢华生活的[ROOT.GetCountry.GetCapital.GetName]，怎么可能知道贫穷的苦楚是什么滋味？我们国家上层已何不食肉糜也！”"
 MFE_political_events.16.a:0 "“说服”教会保持安静"
 MFE_political_events.16.b:0 "他们不相信我们的政策吗？！"
 MFE_political_events.17.t:0 "贸易保护主义游说集团"
 MFE_political_events.17.d:0 "与贸易保护主义游说集团的政治分子提出了一系列大胆的改革，在整个[ROOT.GetCountry.GetName]引起了争论。"
 MFE_political_events.17.f:0 "“势在必行，趁热打铁，抓住人心！”"
 MFE_political_events.17.a:0 "也许我们可以采取更多限制措施……"
 MFE_political_events.17.b:0 "他们以为他们是谁……"
 MFE_political_events.18.t:0 "自贸与废法会社"
 MFE_political_events.18.d:0 "一群自称“自由贸易与废除工会”的煽动者在[ROOT.GetCountry.GetCapital.GetName]开设演讲，并散发煽动性的宣传单。"
 MFE_political_events.18.f:0 "“打破人为边界、让贸易在地球各国之间自由流动的时候到了，只要消除监督，普通人就会富裕！”"
 MFE_political_events.18.a:0 "自由贸易也许是个好主意……"
 MFE_political_events.18.b:0 "[SCOPE.sParty('liberal_party').GetName]不会影响我们的政策！"
 MFE_political_events.19.t:0 "自由贸易和经济道德"
 MFE_political_events.19.d:0 "[ROOT.GetCountry.GetCapital.GetName]的一家报纸的编辑部发表了一系列关于自由贸易的文章，激怒了农民群体。"
 MFE_political_events.19.f:0 "“为什么我们这些普通人必须被迫为所有事情缴纳重税？在现行制度下我们受的苦还不够多吗？我们拥抱自由贸易是当务之急！” "
 MFE_political_events.19.a:0 "自由贸易才是未来。"
 MFE_political_events.19.b:0 "什么都不会改变"
 MFE_political_events.20.t:0 "工会改革"
 MFE_political_events.20.d:0 "[SCOPE.gsInterestGroup('ig_trade_unions').GetName]代表提议进行全面改革"
 MFE_political_events.20.f:0 "一位有商业关系的立法者名为[SCOPE.sCharacter('trade_leader').GetFullName]，正在利用他的政治影响力推动一系列有利于他的企业的改革。"
 MFE_political_events.20.a:0 "无法接受这些提议"
 MFE_political_events.20.b:0 "我们会安抚他们……现在"
 MFE_political_events.21.t:0 "超负荷的审查部门"
 MFE_political_events.21.d:0 "审查部门向[ROOT.GetCountry.GetRuler.GetFullName]申请增加预算"
 MFE_political_events.21.f:0 "“每天早上，我们都会收到一千多份文件——报纸、公报、政治小册子、私人信件——这些都需要通读，但我们目前没有人手。”"
 MFE_political_events.21.a:0 "嗯……我们需要审查民众"
 MFE_political_events.21.b:0 "告诉他们利用现有资源做力所能及的事"
 MFE_political_events.22.t:0 "自由市场受到批判"
 MFE_political_events.22.d:0 "关于贸易的争论对立我们的人民，每个人似乎都站在一边。"
 MFE_political_events.22.f:0 "“我们的政府更关心[SCOPE.gsInterestGroup('ig_industrialists').GetName]而不是他们自己的人民！我们如何才能在如此残酷的市场中生存？”"
 MFE_political_events.22.a:0 "Censorship Bureau Overworked"
 MFE_political_events.22.b:0 "时过境迁……你必须适应"
 MFE_political_events.23.t:0 "反奴隶制公约"
 MFE_political_events.23.d:0 "#Y 奴隶问题#!是[ROOT.GetCountry.GetName]的两极分化原因，越来越多的声音在批评该制度，但也有根深蒂固的利益集团坚决抵制任何改变。"
 MFE_political_events.23.f:0 "“这是一个棘手的问题，目前最好不要触及。例如谁来赔偿奴隶主的财产损失？我们目前甚至无力讨论这个问题。”"
 MFE_political_events.23.a:0 "我们无能为力"
 MFE_political_events.23.b:0 "没错，奴隶制确实很不人道"
 MFE_political_events.24.t:0 "女性教育"
 MFE_political_events.24.d:0 "[ROOT.GetCountry.GetCapital.GetName]中有影响力的社交俱乐部一直在敦促扩大女性的权利，尤其是女性在学术界。"
 MFE_political_events.24.f:0 "“为什么我们的女儿不能接受教育？她们不是[ROOT.GetCountry.GetName]社会的贡献者吗？”"
 MFE_political_events.24.a:0 "受教育是一项基本权利！"
 MFE_political_events.24.b:0 "渐进式变革是更安全的进步之路。"
 MFE_political_events.25.t:0 "绝食斗争"
 MFE_political_events.25.d:0 "[ROOT.GetCountry.GetCapital.GetName]正在进行大规模绝食抗议，工人们得到了[SCOPE.gsInterestGroup('ig_industrialists').GetName]的支持。"
 MFE_political_events.25.f:0 "“我们怎么能连续工作12 小时不休息不吃饭？如果老板继续不给我们提供食物，那么我们拒绝进食，直到政策改变！”"
 MFE_political_events.25.a:0 "他们说的有点道理……毕竟人是铁饭是钢"
 MFE_political_events.25.b:0 "逮捕这些闹事的。"
 MFE_political_events.26.t:0 "本地诗人"
 MFE_political_events.26.f:0 "“现在，朗读《少年维特的烦恼》……嗯哼。\n\n金发少女，请告诉我，你的袜子是在哪里买的？\n因为我的脚冰凉冰凉的，硬硬的石块\n让我浑身发冷。”"
 MFE_political_events.26.a:0 "我们应该聘请他来教我们的学生"
 MFE_political_events.26.b:0 "我们应该关注实际问题而不是“艺术”"
 MFE_political_events.27.t:0 "地下报纸"
 MFE_political_events.27.d:0 "[SCOPE.gsInterestGroup('ig_intelligentsia').GetName]的一些匿名成员一直在自行出版讽刺[ROOT.GetCountry.GetRuler.GetFullName]的报纸。"
 MFE_political_events.27.f:0 "在第六页，有一幅裸体[ROOT.GetCountry.GetRuler.GetFirstName]从猪槽里喝水的漫画，标题是‘哼，哼，我会吃资本家给我吃的任何污泥！’"
 MFE_political_events.27.a:0 "令人作呕！必须重拳出击"
 MFE_political_events.27.b:0 "允许这些出版物自由发行"
 MFE_political_events.28.t:0 "贵族煽动农民"
 MFE_political_events.28.d:0 "我们正在听取来自[SCOPE.sCulture('discriminated_culture').GetName]人的投求；他们声称贵族一直在骚扰他们。"
 MFE_political_events.28.f:0 "上流社会普遍的看法是“[SCOPE.sCulture('discriminated_culture').GetName]人只适合在[ROOT.GetCountry.GetName]疏通下水道和赶骡子，因为他们闻起来像下水道，睡在马厩里”。"
 MFE_political_events.28.a:0 "确实有点意思"
 MFE_political_events.28.b:0 "这些侮辱真是太过分了！支持[SCOPE.sCulture('discriminated_culture').GetName]人"
 MFE_political_events.29.t:0 "愤慨的当地商人"
 MFE_political_events.29.d:0 "大量廉价的外国商品涌入[ROOT.GetCountry.GetCapital.GetName]激怒了当地商人，他们声称自己的生意快被淘汰了。"
 MFE_political_events.29.f:0 "“如果政府对此不采取任何措施，那么我们将别无选择，只能鼓动改革——但我们这些诚实的商人怎么能指望取得成功呢？”"
 MFE_political_events.29.a:0 "支持自由贸易！"
 MFE_political_events.29.b:0 "我们的市场需要这些商人！"
 MFE_political_events.26.d: "诗人[SCOPE.sCharacter('manzoni_new_writer_scope').GetFullName]，已抵达[ROOT.GetCountry.GetCapital.GetName]，现在在巡回演讲，宣传他的最新诗集。"
 MFE_political_events.26.g: "毕竟[SCOPE.sCharacter('manzoni_new_writer_scope').GetSheHe|U]也许是个天才。"