 curtiss_altitude_under_5000_custom_1: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]展开了一场高空飞行的壮举。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]轻装简行，敏捷地攀上了[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]，气球以惊人的速度直冲云霄，转瞬之间，地面的喧嚣与人群已然消失无踪。俯瞰大地，景象磅礴，令人心驰神往。尽管此时已攀升至惊人的高度，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]与云海之间仍有一段距离。当气压计显示高度为#p [ROOT.Var('new_balloon_altitude_var').GetValue]#!米时，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]首先使用气象仪器采集了各类数据，随后才缓缓开启阀门，悠然下降，结束这次壮美的空中旅程。"
 curtiss_altitude_under_9000_custom_1: "带着尽可能少的负重，[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]飞向天空，这是因为[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]想飞得尽可能高。最开始，建筑越来越小，直至变成一个个小点。然后，气球飘上了云层，像是地面上起雾一样，气象设备上有了凝结的小水珠。渐渐地，气温越来越低，但幸好[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]穿得够暖和。最后慢慢地，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]感觉到呼吸也是越来越困难了。\n在#p [ROOT.Var('new_balloon_altitude_var').GetValue]#!米的海拔上，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]进行了一系列必要的测量，然后开始了漫长的降落过程。"
 curtiss_altitude_under_12000_no_tools_custom_1: "空气越来越稀薄。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]也越发难以集中注意力，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHis]的脑袋也是嗡嗡作响。瞥了一眼气压计发现，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]已经比世界上左右的山峰都还要高了。人类只有靠飞行才能达到如此高度。与此同时，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHis]身上的衣物被云雾浸湿，气温趋于零下的，整个人的身子也开始发颤。\n所以[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]只能伏在[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHis]的膝盖上，艰难地松开阀门，开始下降。然后[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]就昏倒了。\n直至回到地面上，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]才恢复了意识，更确切的说，是在温暖的床上。万幸我们发现了[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]。"
 curtiss_altitude_under_12000_tools_custom_1: "即使带着空气瓶，这次飞行也称不上轻松。冷气逼人，寒意在[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]全身上下蔓延，连站起来都十分困难。但是考虑到这个海拔高度下数据的重要性，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]还是强忍着开始测量。气压计显示此时的海拔为#p [ROOT.Var('new_balloon_altitude_var').GetValue]#!米。比世界上所有的山峰都要高。但不幸的是，从这里几乎什么都看不到，厚密的云层几乎遮住了一切。\n测量工作完成后，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]开始从[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]的气囊中放气，气球开始缓缓下降。"
 curtiss_altitude_under_16000_no_tools_custom_1: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]几乎不能控制[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHis]的身体了。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]甚至连寒冷都感觉不到了。只剩下了沉重的呼吸声。在这个高度上，空气已经是极度稀薄。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]也不知道[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]能不能在这次飞行之后存活下来。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]艰难地用绳子拉起[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHim]。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]必须关上阀门。随着距离的接近，眼前的事物开始逐渐发黑。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]用[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHis]的牙咬住阀门，开始旋转。然后[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]就失去意识了。\n怎么如此温暖？[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]在哪里？有影子在[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHim]面前不停移动，原来是有人慢慢走了过来。一位女士递给[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHim]一碗热汤。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]显然是活下来了。"
 curtiss_altitude_under_16000_tools_custom_1: "空气瓶有助于抵御稀薄的空气。但寒意还是透过了厚厚的衣服。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]不住地颤抖。但似乎[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]已经达到了[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]所能达到的最大高度。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]开始为科学学会测量数据。气压计显示海拔为#p [ROOT.Var('new_balloon_altitude_var').GetValue]#!米。一个不可思议的高度，但可惜的是，因为云层的遮蔽，视野并不好。\n[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]完成测量后，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]开始从气囊中放气。慢慢地，气球开始下降。"
 curtiss_altitude_over_16000_custom_1: "加压舱里还算温暖，外面的温度却让人难以忍受。幸好[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]不是坐在外面。呼吸也很轻松。透过窗户，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]看着地球。自此向上，地球的曲率清晰可见。上方天空的蓝色变得越来越黑。云朵在地球上方移动，从这里看就像棉花糖一样。当气压计读到#p [ROOT.Var('new_balloon_altitude_var').GetValue]#!米时，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]在加压舱的保护下打开了一个阀门，让气球缓慢地飘回地面。"
 curtiss_distance_under_400_custom_1: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]已经设定了一个目标，要让[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]气球飞得尽可能远。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]忙于完成必要的事情，没有闲暇观看气球经过的风景。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]必须找到合适的高度，以最大限度地利用风力，密切关注天气并进行导航。经过#p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#!小时的飞行后，气球轻轻降落在地面上。在[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]向当地居民询问了降落地点后，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]拿出一张地图来计算旅程距离。大约应该是#p [ROOT.Var('new_balloon_distance_var').GetValue]#!公里。"
 curtiss_distance_under_800_custom_1: "驾驶气球飞行尽可能远并不容易。必须等待适宜的天气，拥有优秀的气球，并成功导航。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]相信这一切对于[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHim]而言是成立的。因此，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]乘坐[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]气球起飞，以创造新的距离纪录。途中，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]飘过了各种不同的风景、小山和河流。整个飞行期间天气都很好，所以[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]在#p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#!小时后毫发无损地降落。\n\n在地面上，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]询问了当地居民[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]所降落的地点。因此，能够确定旅程的距离大约为#p [ROOT.Var('new_balloon_distance_var').GetValue]#!公里。"
 curtiss_distance_under_2000_custom_1: "天气一直风和日丽，堪称飞行的绝佳良机。在长途飞行的过程中，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]纵览万千美景，既见繁华都市，亦过宁静乡村，甚至还穿越了无人问津的广袤荒原。然而，随着飞行的时日渐长，仅靠白昼的飞行已不足以满足远航之梦，[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]在夜幕之下依然平稳滑翔，穿越苍穹。直至#p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#!小时后，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]才终决定降落。气球缓缓下沉，当地居民告知[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]当前身处何方。显然，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]已飞行了惊人的#p [ROOT.Var('new_balloon_distance_var').GetValue]#!公里，堪称一段壮举。"
 curtiss_distance_over_2000_custom_1: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]计划中的如此长时间的飞行需要有足够的补给、多名人员和理想的天气条件。[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]气球备有足够的补给，并有另外两名人员陪同驾驶员。幸运的是，当天的天气也非常好。所以，气球从[ROOT.GetCountry.GetCapital.GetCityHubName]起飞，在空中航行了数小时。夜里他们三人享用了一顿美味的晚餐，包括葡萄酒和自带的烤鸡。在星空下的夜晚，他们轮流守夜。在这#p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#!小时的飞行中，气球飞跃了漫长的距离。总共，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]飞行了#p [ROOT.Var('new_balloon_distance_var').GetValue]#!公里。这是一个几乎难以置信的距离。"
 curtiss_custom_death_sea: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]进行了一次新的破纪录飞行尝试。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]在途中偏离了航线，漂流到了海上。所有试图营救[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHim]的尝试都没有成功。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]很可能在海中溺水。"
 curtiss_custom_death_hydrogen_ignition: "当[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]气球与[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]一同升向高空时，没人预料到这将是[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]的最后一次飞行。约900米的高度，事故发生了。不知怎地，气球内的氢气被点燃了。转眼间，整个气囊燃烧起来，吊舱坠落地面。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]在撞击中丧生。"
 curtiss_custom_death_firework: "傍晚时分，在[ROOT.GetCountry.GetCapital.GetCityHubName]，[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]误入了一场烟火表演。爆炸的火箭在彩虹的各种颜色中闪闪发光，气球也向烟火表演投射出同样的光芒。在燃烧中，它猛然下降并坠毁。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]在撞击中丧生。"
 curtiss_custom_death_redneck: "在飞越[ROOT.GetCountry.GetName]的乡村地区时，[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]气球被当地居民为了庆祝而发射的多发子弹击中。结果，气球迅速漏气，坠毁到地面上。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]与射击者都在此过程中丧生。"
 curtiss_custom_death_belltower: "在降落过程中，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]的气球飘入了城市。为了避免撞到房屋，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]尝试重新获得高度。由于分心，他没有注意到自己正直奔一座塔楼。气球撞上了塔楼，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]被从气球中抛出。在这个过程中，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]的脖子似乎折断了。"
 curtiss_custom_death_stork: "今天在[ROOT.GetCountry.GetName]的天空中发生了难以置信的事故！[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]的气球[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]被一只鹳或是其他鸟类撞击。鸟的喙戳破了气球的气囊。当鸟试图从困境中挣脱时，它在气囊上撕开了一个越来越大的洞，越来越多的气体从中逸出。气球随后坠毁，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]在撞击中丧生。"
 curtiss_custom_death_balloon_duel: "在关于著名歌剧演员对谁倾心的问题上，我们的气球驾驶员 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]与另一名气球驾驶员之间意见不一。他们认为唯一的解决方法是进行气球决斗。于是，他们登上各自的气球，开始互相射击。这场激烈的火拼持续了将近一个小时——可能是因为从飞行的气球中击中目标并不容易。最终，一颗子弹击中了 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]，并致[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHim]丧生。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHis]的气球，[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]随着尸体飘向远处，数小时后才在乡村地区被找到。"
 curtiss_custom_death_stray_bullet: "不知何故，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]的气球与前线过于接近。敌军部队开始向气球射击。子弹没有击中[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]气球，但致命地击中了[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]。气球在战场上方盘旋了很长时间，最终在我方阵地降落。"
 curtiss_custom_death_power_line: "在驾驶[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]气球着陆时，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]与电线过于接近。气球被电线卡住，导致电流从[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]的身体流过，并使气球突然燃起火焰。不清楚[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]的确切死因，但这肯定不是愉快的经历。"
 curtiss_custom_death_seagull: "靠近海岸飞行时，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]被一群尝试抢食[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]带来的鱼的海鸥包围。尽管气球[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]没有受损，但其中一只海鸥撞击了 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]的头部，导致[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]失去了意识并从气球上摔落。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]不治身亡，而[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHis]气球随着海鸥的尖叫飘飞而去。"
 curtiss_custom_death_lightning: "在雷暴天气乘气球飞行绝非明智之举。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]用生命验证了这一点——[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]所乘坐的[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]遭雷击后燃爆坠毁，不幸遇难。"
 curtiss_custom_death_sabotage: "原本一次普通的飞行迅速变成了噩梦。在飞行过程中，气球的几根绳子突然断裂，导致[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]的吊篮坠落并在地面上粉碎。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]在事故中丧生。在对残骸进行检查时，发现了绳子上的切割痕迹。显然这是一起蓄意破坏案件。目前尚不清楚谁应当为此负责。"
 curtiss_custom_death_updraft: "在一次气球飞行中，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]的气球[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]被强劲的上升气流卷走。气球不断上升。随着高度的增加，呼吸变得更加困难，温度变得更加寒冷。目前尚不清楚[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]是否死于窒息还是失温，但他的生命在高空终结了。"
 curtiss_custom_death_stampede: "一次气球飞行中，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]降落在一个牧场上。在折叠[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]时，他可能惊扰了马匹。痕迹表明这些动物四处奔逃，其中几匹马撞击并践踏[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]致死。"
 curtiss_custom_death_failed_fixing: "仍处于低空飞行时，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]注意到气球[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]存在问题。气体从侧面泄漏，气球略微失去高度。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]决定在飞行中解决问题，爬上了气球的气囊。正如一些目击者所述，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]失足坠落地面，后来被发现死亡。气球在一段时间后飘落到地面，因为气体已经泄露。"
 curtiss_custom_death_weak_spot: "今天，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]从空中坠落，并在撞击中死亡。起初还不清楚发生了什么，但过了一会儿，人们发现了[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]气球的残骸。篮子上有一个大洞，说明其做工粗糙，在[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]的重压下破裂了。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]的死是我们国家的巨大损失。"
 curtiss_custom_death_heart_attack: "[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]气球今天坠毁。从残骸中找到了[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]的尸体。事故原因难以查明。起初，人们怀疑是 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]故意操作排气阀放气。后来，医生发现[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]在坠毁前已经死亡。看来他是在空中心脏病发作。这导致他的肌肉痉挛，从而开启了阀门。"
 curtiss_custom_death_balloon_crash: "今天，在[ROOT.GetCountry.GetName]的上空发生了一起令人难以置信的事故。两个气球在空中相撞了，虽然这很离谱但是确实发生了。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]的[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]气球受损，迅速下降。它在地面上弹了几下，导致[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]死亡。另一个气球得以着陆，但飞行家被这次事故彻底击垮了，他试图帮助[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]。不幸的是，一切努力都是徒劳的。"
 curtiss_custom_death_fighter_intercepted: "当我们的气球手[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]意外飞出我国边境时，他遭到了不明飞行器的攻击。[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]气球被击中数次，并迅速失去高度。气球还未着地，飞机就再次发动攻击，并致命地击中了 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]。我们邻国的当局否认与这次袭击有关。"
 curtiss_custom_death_tornado: "虽然大平原上暴风肆虐，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]还是决定驾驶[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHis]的[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]升空。气球在空中打转，但[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]毫不气馁，继续[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHis]的飞行。不知不觉中，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHim]身后形成了一股龙卷风，将气球不断拉近。在气球被旋风卷走之前，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]才注意到危险，但可惜为时已晚。直到几天后才在瓦砾下发现[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHis]的尸体。"
 curtiss_custom_death_fall: "目前还不清楚事情的具体经过，但 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]不知何故从气球[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]中掉落，并在撞击中死亡。几天后，人们发现气球慢慢飘回地面。气球中没有发现任何痕迹，无法断定[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]到底发生了什么。"
 curtiss_custom_death_envelope_falls_apart: "起飞不久，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]与[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHis]的[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]一同坠毁。乍一看，气囊似乎是被撕碎了。但仔细观察后发现，气囊的接缝已经在空中裂开。因此气球散架并坠落到地面上。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]不幸在撞击中丧生。"
 curtiss_custom_killed_by_indigenous_people: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]驾驶[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHis]气球[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]降落在原住民的领地上。这些人从未见过气球，还以为是邪恶的魔鬼。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]还没来得及现身，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]就被弓箭射死了。几天后，我们的一支巡逻队在被摧毁的气球里发现了他的尸体。"
 curtiss_custom_death_cigar: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]在[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHis]最后一次飞行时坠毁。气球[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]从空中坠落时还在熊熊燃烧。看来 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]在飞行过程中抽了一根雪茄，不知怎么就点燃了篮子。结果，气球外壳也开始燃烧，导致坠毁。在这种情况下，吸烟无疑是致命的。"
 curtiss_custom_killed_crash_mountainside: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]试图驾驶[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]越过高山。途中[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]被暴风雪卷走，导致[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]不能观察周围的情况。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]试图在暴风雪中爬升，但气球被强风卷走，撞上了一座山的岩壁。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]在撞击中受了致命伤，直到几天后尸体才被找到。"
 curtiss_custom_death_hail_storm: "大家都劝[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]不要在这样恶劣的天气里驾驶气球，但他坚持要去。当[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]乘坐气球[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]上升时，天气开始变差。大雨先是从阴沉的云层中汹涌而下，没过多久就变成了冰雹。有些冰雹有拳头大小，把气球的气囊逐渐撕裂。气球急速下坠，坠落在地面上。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]在坠毁中丧生。"
 curtiss_custom_killed_alcohol: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]在驾驶气球[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]起飞前喝了几瓶酒。当然，酒精并不能帮助飞行，醉酒会使气球飞行更加危险。然而，[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]的死因并不是从气球上摔了下来，也不是因为不小心点燃了气球，而是因为起飞后不久所有的压载袋都掉了下来。气球瞬间升空并消失了。几天后，人们才发现了气球残骸。[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]还在气球篮子里，而且是在喝完最后一瓶酒后渴死的。"
 curtiss_custom_killed_opium: "在[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]随气球[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]飞走后，我们在一块田地里发现了[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]的尸体。起初还不清楚[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]为什么会从气球里掉出来，但几天后气球也着陆了，里面发现了鸦片。显然，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]在飞行过程中吸食了鸦片，然后由于无法解释的原因掉出了气球。"
 curtiss_custom_death_acrobatics: "在一大群人面前，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]试图通过绳子从一个系着的气球转移到第二个气球。起初似乎很容易就成功了。但一阵强风把他从绳子上吹了下来。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]掉到了人群中间，当场伤重身亡。"
 curtiss_custom_death_goose: "和每次飞行一样，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]带着一只幸运的鹅乘坐气球。一人一鹅在[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]上飞走了。几个小时后，气球成功着陆。令人惊讶的是，气球上只剩下了一只鹅。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]消失了。即使找了好几天，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]仍然不见踪影。"
 curtiss_custom_death_mile_high_club: "[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]气球的篮子是在田野里发现的。里面躺着[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]和一个女人。奇怪的是，两人都没有穿衣服。人们纷纷猜测其中的原因。大多数人认为，两人死于体温过低，不久前脱掉了衣服。这通常是冻死的情况，因为突然出现一种很热的感觉。但也有人认为两人做了什么……不雅的事情。"
 curtiss_custom_death_zoo_crocodile: "飞行非常成功。除了降落……在世界上所有地方中，动物园的鳄鱼围栏可能是最不适合气球降落的之一。当气球[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]落到水中央时，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]的生命很快就迎来了终结。还没来得及干预，鳄鱼们就过去吃零食了。"
 curtiss_custom_death_cheap_parts: "节俭通常是一种美德。但涉及到气球的结构部件时就不一样了。[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]气球的绳索是从最便宜的供应商处购买的，这样可以节省几英镑。不幸的是，质量比承诺的差很多。在飞行过程中，几条绳索断裂，吊篮倾斜，[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]掉出气球，在撞击中死亡。"
 curtiss_custom_death_disappearance: "自从[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]乘坐[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]气球起飞以来，已经过去一个月了。起飞后不久，所有痕迹都消失了。没有看到气球、残骸或尸体。我们也没有搜寻到。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]和他的气球一起消失了，没人知道发生了什么。"
 curtiss_custom_death_train: "一连串不幸的巧合中，[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]气球在着陆时被火车撞毁。在此过程中，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]死亡。气球降落在浓雾中时，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]似乎没有注意到气球正在铁轨上。几秒钟后，火车全速撞向气球。火车毫发无损，除了 [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]之外没有人受伤。"
 curtiss_custom_death_skyscraper: "在飞越城市上空时，[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]气球被一股强大的气流卷向摩天大楼。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]对此无能为力，只能无助地看着大楼越来越近。气球撞上了外墙，缠在了一起。几分钟后，气囊被撕开，气球坠入深渊。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]直接掉进了菜农的摊位，摧毁了新鲜的卷心菜。不幸的是，卷心菜没有成功地缓冲[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHis]坠落，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]当场死亡。"
 curtiss_custom_death_disease: "他声称只是感冒而已，然后[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]说完就爬上了气球[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]。然而，这似乎并不仅仅是一场感冒，因为几天后，人们发现了气球和[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]的尸体。[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]似乎得了重病。气球运动危险重重，而这是一个不大常见的死因。"
 curtiss_custom_death_slipped: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]驾驶[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]气球旅行，并有一位友人陪同。在飞行途中，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]失足滑倒——也许是小雨打湿了篮子，也许只是粗心大意。但最终[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]失去了平衡，从气球上摔了下来，不幸遇难。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]的朋友好不容易才迫降气球，幸免于难。"
 curtiss_custom_death_ladder: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]并没有像人们想象中的气球运动员那样死于冒险。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]是在制作气球[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]时死去的。正当[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]检查气球外壳在压力下的薄弱点时，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]从梯子上摔了下来，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]摔得很不走运，当场死亡。"
 curtiss_custom_death_angry_worker: "在最后一次飞行中，[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]气球的几根绳索断裂，导致吊篮坠地。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]在撞击中死亡。在对气球残骸进行检查时，发现绳索上有割伤的痕迹。原来，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]的一名工人在夜间破坏了绳索，杀死了[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetHerHim]。工人说：“这个吸血鬼是自找的！他剥削我们，好让自己享受气球的乐趣！”"
 curtiss_custom_death_sabotage_slaver: "就在气球[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]降落在田野里，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]从中脱身时，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]被一群雇佣兵制伏并杀死。我们的调查显示，一个奴隶主下令杀害[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]，以削弱废奴运动声势！"
 curtiss_custom_death_shot_over_prison: "在与客户一起乘坐气球时，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]的气球[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]到达了西西卡监狱的上空。狱警向气球开火。[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName]安然逃脱，但在安尼斯堡附近与一个名叫奥德里斯科的帮派再次交火。在此过程中，[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe]中弹，从篮子里掉了出来。乘客随后似乎坠落在一条河边。到目前为止还没有找到乘客的踪迹。"
 curtiss.600.t: "从沃克斯豪尔花园到魏尔堡的气球飞行"
 curtiss.600.d: "英国气球飞行家查尔斯·格林和两名机组人员乘坐皇家沃克斯豪尔号气球从伦敦沃克斯豪尔花园出发。得益于顺风，气球成功越过英吉利海峡，飞往德国拿骚的魏尔堡。飞行距离约为800公里，是有史以来气球飞行的最远距离。"
 curtiss.600.f: "皇家沃克斯豪尔号的飞行取得了令人难以置信的成功。飞行距离纪录保持了80年。\n飞行并非一帆风顺。19世纪的气球飞行尤其危险，因为你永远不知道会在哪里着陆。因此，格林在旅途中携带了大量补给品。他还携带了作为压舱物的一吨沙子、一根1000英尺长的绳子、气压计、望远镜、各种酒精饮料、大衣和其他各种物品。除了所有行李，格林和他的两个同伴托马斯·蒙克·梅森和罗伯特·霍隆德还得挤在吊舱里。\n到达魏尔堡后，他们与当地人分享了带来的白兰地，并在其帮助下将气球里的东西取出，准备返程。在魏尔堡，三人受到了包括拿骚亲王在内的热烈欢迎。由于气球用光了煤气，他们不得不乘坐马车返回。"
 curtiss.600.g: "大不列颠的又一项纪录！"
 curtiss.601.t: "放气裂幅的发明"
 curtiss.601.d: "气球爱好者和发明家[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]公布了他的最新发明——放气裂幅。放气裂幅是在着陆时用于快速放气的气球顶部装置，通过撕去放气裂幅，可以使大量气体快速放出，避免气球在地面上拖行造成的事故，能使气球飞行更安全。"
 curtiss.601.f: "在放气裂幅发明之前，飞行员需要用锚来固定气球或者爬到气球顶部打开阀门完成放气。这些操作极其危险，因为气体的快速大量逸出会导致气球迅速塌陷，飞行员被船体卡住致死的事一次又一次地发生。1839年4月27日发明的放气裂幅大大改善了飞行的安全性。"
 curtiss.601.g: "干得漂亮！希望我们能再次听到这家伙的声音！"
 curtiss.601.h: "事实上，我们需要一位新的气球飞行家！"
 curtiss.601.h.tt: "我们新赞助的气球飞行家是经验丰富的[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]"
 curtiss.602.t: "弗朗西斯科·阿尔班首次乘气球穿越阿尔卑斯山"
 curtiss.602.d: "法国气球飞行家弗朗西斯科·阿尔班是第一个乘坐氢气球飞越阿尔卑斯山的人。1849年9月2日傍晚，他从马赛起飞，向东飞行。为了翻越阿尔卑斯山脉科蒂安山，他的气球飞到了约15000英尺（即4600米）的高度。第二天早晨两点半，他在都灵附近降落。"
 curtiss.602.f: "直到1924年才有人打破穿越阿尔卑斯山这一长期无人打破的纪录。\n阿尔班在穿越阿尔卑斯山之前就已经积累了驾驶气球的经验。1832年，也就是阿尔班17岁左右，他就进行了第一次尝试，但他的大部分气球飞行是在1845年和1849年在意大利进行的。1846年，他在的里雅斯特附近偏离航向，不得不被渔民从海中救出。"
 curtiss.602.g: "太棒了！法兰西真正的英雄！"
 curtiss.603.t: "弗朗西斯科·阿尔班在地中海上空的气球飞行中失踪"
 curtiss.603.d: "在驾驶气球穿越阿尔卑斯山仅一个月后，弗朗西斯科·阿尔班就失踪了。他从巴塞罗那起飞后，被风吹向地中海。在此以后，便没人再发现过他的踪迹。我们应该派救援队去寻找阿尔班吗？"
 curtiss.603.f: "历史上，1849年10月7日，弗朗西斯科·阿尔班的气球尚漂浮在公海上空。从那以后，就再也没有他的踪迹。据推测，他死于这次气球飞行。然而，究竟发生了什么，我们仍不得而知。"
 curtiss.603.g: "太糟糕了！立刻派遣舰队去搜寻他！"
 curtiss.603.h: "他清楚可能的风险。我们无能为力。"
 curtiss.604.t: "弗朗西斯科·阿尔班已被救起"
 curtiss.604.d1: "搜索大获成功！我们的一艘船发现了弗朗西斯科·阿尔班！自从失联后，阿尔班镇定自若，不断地从他漂浮在水面上的气球中抛掷东西作为标志。让我们可以顺着踪迹找到了他。几天里，阿尔班一直牢牢地抓住他从气球上解下的篮子。多亏了气球里的补给品，他才能熬过难关。"
 curtiss.604.d2: "一艘渔船在巴塞罗那海岸附近发现了弗朗西斯科·阿尔班的气球。尽管他严重脱水，但考虑到当时的情况，他的情况还算可以。希望他快点好起来！"
 curtiss.604.f: "“那是我一生中最激动人心的一次气球飞行！我希望我在这次飞行中我打破了纪录！”"
 curtiss.604.g: "多么幸运！欢迎阿尔班的归来！"
 curtiss.605.t: "额外内容：阿尔班在非洲沦为奴隶！"
 curtiss.605.d: "各种西班牙报纸报道说，阿尔班并没有淹死在地中海，而是乘着他的气球到达了非洲，并在那里被奴役。越来越多的公民来信要求我们寻找阿尔班并将他从奴役中解救出来。"
 curtiss.605.f: "历史上，1853年的各种报纸上确实有文章声称阿尔班在非洲沦为奴隶。但是此事缺乏证据。目前尚不清楚阿尔班身上到底发生了什么，但他很可能已在地中海溺水身亡。"
 curtiss.605.g: "我们找到了阿尔班！"
 curtiss.605.h: "这都是些令人难以置信的故事，任何人都不该相信。"
 curtiss.606.t: "阿尔班在[SCOPE.sCountry('curtiss_arban_slaver_scope').GetName]沦为奴隶"
 curtiss.606.d: "我们的搜索表明阿尔班确实还活着。他被发现在[SCOPE.sCountry('curtiss_arban_slaver_scope').GetName]的田间作为奴隶劳作。奴隶主表示我们可以花巨资从他们那里买回他。当然，我们也可以诉诸武力。"
 curtiss.606.f: "历史上，报纸并没有进一步的报道。因此，阿尔班是否沦为奴隶尚不清楚。但这确实不太可能。"
 curtiss.606.g: "我们将把他从奴隶主手中解救出来！"
 curtiss.606.h: "让我们花点钱然后用……结束这一切"
 curtiss.607.t: "阿尔班被从奴隶主手中救出，并已回家"
 curtiss.607.d1: "一个小分队已被派遣去解救被囚禁的阿尔班。短暂的交锋后，他们救出了阿尔班和其他几名欧洲人，并骑马逃脱。在[SCOPE.sCountry('curtiss_arban_slaver_scope').GetAdjective]当局做出反应之前，他们已经乘船归国。由于长期囚禁，阿尔班已经筋疲力尽，虚弱不堪，但他能够告诉我们他的气球飞行冒险经历。他的专业知识肯定会帮到我们。"
 curtiss.607.d2: "由于长期囚禁，阿尔班已经筋疲力尽，虚弱不堪，但他能够告诉我们他的气球飞行冒险经历。他的专业知识肯定会帮到我们。"
 curtiss.607.f: "“我被风吹到了公海。因为风向朝南，所以我决定尝试到巴利阿里群岛着陆。但由于风向不正，所以我被吹到了可以着陆的北非海岸。不幸的是，那里的居民不是很友好。有没有人曾经飞越过地中海？我是不是创造了一项纪录？"
 curtiss.607.g: "一次成功的救援！"
 curtiss.607.h: "欢迎阿尔班的归来！"
 curtiss.608.t: "没有阿尔班的踪迹"
 curtiss.608.d: "经过几个月的搜寻，我们仍然没有找到阿尔班的任何踪迹。看来他在北非被奴役的消息有可能是虚构的。弗朗西斯科·阿尔班无疑已经死了。"
 curtiss.608.f: "“法国人？当然！我们卖的法国奴隶很多，你要哪个？都是强壮的水手！”"
 curtiss.608.g: "取消搜寻。"
 curtiss.609.t: "纳达尔在气球上拍摄了第一张航拍照片"
 curtiss.609.d: "法国摄影师纳达尔将他的两大爱好：气球和摄影，结合了在一起。他成功从空中拍摄了照片。这些照片从高空展示了少有人见过的世界。"
 curtiss.609.f: "1859年，纳达尔在索尔费里诺战役中拍摄了他的第一张航拍照片。1863年，纳达尔成为#b 重于空气飞行器空中运输促进协会#!的主席，这是一个致力于航空事业的组织。该协会的秘书正是儒勒·凡尔纳，他受到纳达尔气球的启发，写下了#b 《气球上的五星期》#!的故事。"
 curtiss.609.g: "从上面看，世界是如此不同！"
 curtiss.610.t: "纳达尔的“巨人号”在汉诺威坠毁"
 curtiss.610.d: "在经历了从巴黎到汉诺威紧张而又极其艰难的飞行之后，纳达尔的巨型气球 “巨人号”在汉诺威的一片田野上坠毁。他和妻子都受了重伤。希望他能早日康复，继续驾驶气球！"
 curtiss.610.f: "“巨人号”是一个高 60米（196 英尺）的气球，其命名恰如其分。它由欧仁·戈达尔制造，纳达尔驾驶。仅仅第二次飞行纳达尔就使“巨人号”坠毁。但纳达尔不顾自己身受重伤、气球严重损坏，修复了“巨人号”，并再次驾驶它飞行。1867年，他在气球飞行中搭载了多达十几名乘客，并提供冷鸡肉和葡萄酒。"
 curtiss.610.g: "多么可怕的事故啊！"
 curtiss.611.t: "格莱舍和考克斯威尔创下气球飞行高度纪录"
 curtiss.611.d: "气象学家詹姆斯·格莱舍和气球飞行家亨利·特雷西·考克斯威尔创造了气球飞行的高度纪录。他们一起乘坐气球飞到了大约11270米（37000英尺）的高度。在海拔 8800米时，格莱舍已经昏迷不醒。考克斯威尔只能艰难地让气球下降。幸运的是，两人在这次冒险中幸存了下来。"
 curtiss.611.f: "1862年，格莱舍和考克斯威尔乘坐“猛犸”号气球升空。他们受英国科学促进会的委托，在高层大气中进行实验。在海拔 8800米（29000英尺）时，格莱舍晕倒了，考克斯威尔的手也失去了知觉。由于气阀线缠绕在一起，考克斯威尔无法在吊舱中让气球下降。他不得不爬上索具，用牙齿打开阀门。随后，他失去了知觉，但气球开始下降。15 分钟后，气球落到地面，安全着陆。"
 curtiss.611.g: "他们能活下来真是幸运！"
 curtiss.612.t: "爱德华·斯佩尔泰里尼运送乘客穿越阿尔卑斯山"
 curtiss.612.d: "在一次载客飞行中，瑞士人爱德华·斯佩尔泰里尼带领乘客飞越了阿尔卑斯山。在此过程中，他穿越了阿尔卑斯山的几个最高点。斯佩尔泰里尼现在是气球界的明星。"
 curtiss.612.f: "爱德华·斯佩尔泰里尼原名阿尔伯特·施韦泽，年轻时曾接受过气球训练。他的第一个气球被命名为“乌拉尼亚”号，之后他在欧洲各地旅行，向上流社会展示高空世界。通常，他还会携带由牛排和香槟组成的小型野餐。斯佩尔特里尼还开始拍摄航拍照片，但最让他声名鹊起的还是阿尔卑斯山上空的载客飞行。"
 curtiss.612.g: "令人难以置信的景色！"
 curtiss.613.t: "吉法德建造的动力飞艇的首次飞行"
 curtiss.613.d: "气球飞行的一大问题就是对好风的过度依赖。而且气球非常容易漂移，导致事故频发。亨利·吉法德建造了一艘带有方向舵的蒸汽动力细长飞艇，想以此解决气球飞行的问题。亨利驾驶他的“吉法德飞艇”从巴黎飞往埃朗库尔，飞行距离为27公里。因为动力不足，所以飞艇还不能逆风飞行。谁知道这些飞艇未来的发展方向是哪？"
 curtiss.613.f: "1852年9月24日，吉法德成功实现了动力可操纵飞艇的首次飞行。然而，飞艇的蒸汽动力过于弱小，以至于不能认为真正的飞艇已经造成了。后来，随着内燃机的发明，飞艇的梦想才算真正实现。"
 curtiss.613.g: "或许那些动力气球将很快征服天空！"
 curtiss.614.t_brussels: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]考虑移居到布鲁塞尔"
 curtiss.614.t_capital: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]考虑搬到[SCOPE.sCountry('curtiss_august_piccard_destination').GetCapital.GetCityHubName]去"
 curtiss.614.d_brussels: "布鲁塞尔自由大学为我们最重要的学者之一[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]提供了一份教授职位。该大学承诺给皮卡尔天文数字的研究经费，这样他就可以用气球更深入地研究平流层了。皮卡尔觉得这份工作邀请十分诱人，这也就意味着我们可能失去一位在气球飞行上有着丰富经验的大学者。"
 curtiss.614.d_capital: "我们最重要的科学家之一：[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]被[SCOPE.sCountry('curtiss_august_piccard_destination').GetCapital.GetCityHubName]自由大学邀请成为那里的教授。该大学承诺提供大量财政资源，使皮卡尔能够利用气球更彻底地研究平流层。皮卡尔似乎很乐意接受这个提议。这也将意味着失去一位在气球方面拥有丰富经验的伟大科学家。"
 curtiss.614.f: "皮卡尔1922年被任命为布鲁塞尔自由大学的教授，除了教学之外，他还致力于利用气球进行平流层研究。在他的平流层研究中，他还与他的朋友阿尔伯特·爱因斯坦合作，与他一起开发了实验。\n除了平流层研究之外，皮卡尔还发明了放射性测量装置和非常精确的地震仪。他还研究了原子物理学并预测了第三种铀同位素，这种同位素后来被发现，现在被称为铀235。\n在布鲁塞尔，他的讲座也使他成为漫画人物卡尔库鲁斯教授的灵感来源。"
 curtiss.614.g: "我们不能拒绝皮卡尔的赞助提议！"
 curtiss.614.h: "我们已经有一位非常棒的气球飞行家了！"
 curtiss.614.g.tt: "我们新赞助的气球飞行家是经验丰富的[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]"
 curtiss.615.t: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]移居[SCOPE.sCountry('curtiss_august_piccard_destination').GetCapital.GetCityHubName]"
 curtiss.615.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]这位瑞士科学家，移居[SCOPE.sCountry('curtiss_august_piccard_destination').GetCapital.GetCityHubName]并在[SCOPE.sCountry('curtiss_august_piccard_destination').GetCapital.GetCityHubName]自由大学担任教授。该大学承诺提供大量财政资源，使皮卡尔能够利用气球更彻底地研究平流层。作为一位杰出的科学家和气球飞行者，皮卡尔也许能够创造气球飞行的新纪录。"
 curtiss.615.f: "皮卡尔1922年被任命为布鲁塞尔自由大学的教授，除了教学之外，他还致力于利用气球进行平流层研究。在他的平流层研究中，他还与他的朋友阿尔伯特·爱因斯坦合作，与他一起开发了实验。\n除了平流层研究之外，皮卡尔还发明了放射性测量装置和非常精确的地震仪。他还研究了原子物理学并预测了第三种铀同位素，这种同位素后来被发现，现在被称为铀235。\n在布鲁塞尔，他的讲座也使他成为漫画人物卡尔库鲁斯教授的灵感来源。"
 curtiss.615.g: "如此知名的气球飞行家应该成为我们的官方气球飞行家！"
 curtiss.615.h: "我们祝他的事业顺利！"
 curtiss.615.g.tt: "我们新赞助的气球飞行家是经验丰富的[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]"
 curtiss.650.t: "介绍我们新的气球飞行家"
 curtiss.650.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]是一位志在突破气球飞行极限的勇敢气球家，渴望借助我们的力量再创辉煌。旧日的纪录必会作古，全新的科学奥秘即将揭晓。[SCOPE.sCharacter('curtiss_balloonist_scope').GetSheHe]坚信，[SCOPE.sCharacter('curtiss_balloonist_scope').GetHerHis]凭借[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]，定能冲破云霄，攀登前所未至的高度。"
 curtiss.650.f: "“我要为祖国增光添彩！”"
 curtiss.650.g: "希望对[SCOPE.sCharacter('curtiss_balloonist_scope').GetHerHim]的投资能回本。带我到气球飞行观察窗那去。"
 curtiss.650.h: "祝你们好运！"
 curtiss.651.t: "我国的气球飞行"
 curtiss.651.balloonist: "我们赞助了[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]，一个驾驶[SCOPE.sCharacter('curtiss_balloonist_scope').GetHerHis]的[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]多次开展飞行冒险的气球飞行家。"
 curtiss.651.noballoonist: "我们现在没有赞助气球飞行家。因此，我们将基本不可能创造新的气球飞行纪录。我们可以开始赞助我们国家的气球飞行家，他会努力创造新纪录并为我们开发更好的气球。"
