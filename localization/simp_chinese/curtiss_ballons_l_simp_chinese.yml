 curtiss.655.t3: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]驾驶[SCOPE.sCharacter('curtiss_balloonist_scope').GetHerHis]的气球的飞行时间比过去任何人都长！"
 curtiss.655.d1: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]想使用[SCOPE.sCharacter('curtiss_balloonist_scope').GetHerHis]的气球飞行尽可能长的时间。但凭借#b #n [ROOT.Var('new_balloon_time_var').GetValue]#!小时#!的飞行时间，[SCOPE.sCharacter('curtiss_balloonist_scope').GetSheHe]还不能打破我国先前#b #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#!小时#!的纪录。[SCOPE.sCharacter('curtiss_balloonist_scope').GetSheHe]肯定会再试一次。"
 curtiss.655.d2: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]使用[SCOPE.sCharacter('curtiss_balloonist_scope').GetHerHis]的气球创造了我国新的持续飞行时间纪录！凭借#b #p [ROOT.Var('new_balloon_time_var').GetValue]#!小时#!的飞行时间，[SCOPE.sCharacter('curtiss_balloonist_scope').GetSheHe]打破了我国先前#b #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#!小时#!的纪录。但可惜还不足以打破[GetGlobalVariable('curtiss_balloon_time_record_holder_global_var').GetCountry.GetFlagTextIcon]#b #p [GetGlobalVariable('curtiss_balloon_time_record_global_var').GetValue]#!小时#!的世界纪录。"
 curtiss.655.d3: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]使用[SCOPE.sCharacter('curtiss_balloonist_scope').GetHerHis]的气球创造了新的持续飞行时间世界纪录！凭借#b #p [ROOT.Var('new_balloon_time_var').GetValue]#!小时#!的飞行时间，[SCOPE.sCharacter('curtiss_balloonist_scope').GetSheHe]打破了我国先前#b #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#!小时#!的纪录，同时还打破了#b [GetGlobalVariable('curtiss_balloon_time_record_holder_global_var').GetCountry.GetFlagTextIcon]#p [GetGlobalVariable('curtiss_balloon_time_record_global_var').GetValue]#!小时的世界纪录。#!"
 curtiss.655.f1: "“我这次没成功，但下次我一定要成功！”"
 curtiss.655.f2: "“谁在乎那种纪录？我想要的是世界纪录！”"
 curtiss.655.f3: "“手到擒来！”"
 curtiss.655.g: "祝下次好运！"
 curtiss.655.h: "干得漂亮！"
 curtiss.655.i: "太棒了！恭喜！"
 curtiss.656.t: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]因恐高而放弃了气球飞行"
 curtiss.656.d: "尽管[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]声称自己进行过多次飞行，但他在我国的第一次十米海拔飞行时发现自己恐高，因此他放弃了气球飞行。"
 curtiss.656.f: "“太糟糕了！两周前我还在高空飞翔，现在……现在我甚至连梯子都爬不上了！”"
 curtiss.656.g: "多么不幸……"
 curtiss.656.h: "啊！还有别的气球飞行家我们可以赞助吗？"
 curtiss.670.t: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]死于一次气球飞行事故"
 curtiss.670.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]在使用[SCOPE.sCharacter('curtiss_balloonist_scope').GetHerHis]的气球飞行时坠落遇难。我们因此失去了一位航空英雄。"
 curtiss.670.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloonist_death_type')]"
 curtiss.670.g: "糟透了！"
 curtiss.670.h: "糟糕！还有别的气球飞行家我们可以赞助吗？"
 curtiss.671.t: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]现在是一个经验丰富的气球飞行家"
 curtiss.671.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]已经完成了多次气球飞行并获得许多相关经验。他现在被视作一位经验丰富的气球飞行家，因为他清楚自己在做什么。"
 curtiss.671.f: "“别怕！我已经做过几十次了！”"
 curtiss.671.g: "好消息！"
 curtiss.672.t: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]现在是著名气球飞行家"
 curtiss.672.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]已经完成了上百次气球飞行，其中还打破了许多纪录。现在他已经是海内外著名人物了。"
 curtiss.672.f: "“[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]？这不是那位气球飞行家吗？我真的很想见见他！”"
 curtiss.672.g: "太棒了！"
 curtiss.673.t: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]在飞行中被彗星击中"
 curtiss.673.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]在飞行中被彗星击中而死。"
 curtiss.673.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]气球起飞后不久就听到了一声巨响。地面上的人们看到一道闪光划过天空，直接击中了[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]的吊舱。气球开始燃烧，坠入海中。残骸清理完毕后，人们发现了[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]的尸体。只有我们的天文学家对这一事件感到高兴，因为他们能够检查彗星的残余。"
 curtiss.673.g: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetSheHe]要是有对彗星的常识就好了……"
 curtiss.673.h: "啊，彗星，恶魔的亲朋好友……还有别的气球飞行家我们可以赞助吗？"
 curtiss.674.t: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]在海滩上飞行时坠机遇难了"
 curtiss.674.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]在飞行期间坠毁在海滩上并死亡。奇怪的是，在气球残骸上发现了一头鲸鱼。"
 curtiss.674.f: "在一个阳光明媚的日子里，[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]沿着海滩飞行。但[SCOPE.sCharacter('curtiss_balloonist_scope').GetSheHe]一去不复返，于是派出了搜索队。过了一会儿，残骸被找到了。奇怪的是，气球和篮子是在一条被严重压扁的鲸鱼的残骸下被发现的。邻村的一个酒鬼报告说，他看到一条鲸鱼和一盆牵牛花坠落，鲸鱼直接地撞在气球上。很显然，这个故事并不可信。有趣的是，人们的确在附近发现了一盆完好无损的牵牛花。这盆牵牛花看起来有些破烂，被当地的植物学家妥善保管。\n[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]会因为他金子般的心和临危不乱的镇定被人们铭记。"
 curtiss.674.g: "哦不，别再来了！"
 curtiss.674.h: "你好，大地！我们还能赞助其他气球飞行家吗？"
 curtiss.676.t: "气球飞行家去世"
 curtiss.676.d: "在数十年的[concept_curtiss_balloonist]生涯后，我们的前任#b #r 气球飞行家#!#!去世了。谁能取代这样一位卓越的探索者？"
