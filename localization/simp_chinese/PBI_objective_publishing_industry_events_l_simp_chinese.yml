l_simp_chinese:
 pbi_objective_publishing_industry_events.200.t: "一部成功的报刊小说"
 pbi_objective_publishing_industry_events.200.d: "[SCOPE.sCharacter('target_character').GetFullName]的小说在[SCOPE.sState('target_state').GetName]报纸上连载，在非常受欢迎的情况下，该系列完结了。"
 pbi_objective_publishing_industry_events.200.f: "在连载期间，报纸销量最终增加了两倍。出版商出版了一本总结连载的书，甚至为国际市场翻译了这本书，这些书的销量也稳步上升。"
 pbi_objective_publishing_industry_events.200.a: "干得好！"
 pbi_objective_publishing_industry_events.200.good: "小说写作进度会#positive_value 增加#!"
 pbi_objective_publishing_industry_events.200.bad: "小说写作进度会#negative_value 减少#!"
 pbi_objective_publishing_industry_events.200.stop: "#negative_value 增加未来新进展重置的可能性#!"
 pbi_objective_publishing_industry_events.201.t: "取消连载"
 pbi_objective_publishing_industry_events.201.d: "这部正在[SCOPE.sState('target_state').GetName]一家报纸上连载的小说，在作者无法继续写作的情况下以未完结告终。"
 pbi_objective_publishing_industry_events.201.f: "许多读者将不再能够阅读他们热切期盼的连载小说。"
 pbi_objective_publishing_industry_events.201.a: "太糟糕了"
 pbi_objective_publishing_industry_events.202.t: "未来的大作家"
 pbi_objective_publishing_industry_events.202.d: "一家[SCOPE.sState('target_state').GetName]报社正在寻找出版一份新爆款报纸。\n他们正在为这份报纸寻找一位新的小说家。"
 pbi_objective_publishing_industry_events.202.f: "如今，决定报纸销量的不是政治、主编的诙谐社论，也不是耸人听闻的凶案，而是连载小说！！"
 pbi_objective_publishing_industry_events.202.a: "[SCOPE.sCharacter('target_character_1').GetFullName]是未来的大作家！"
 pbi_objective_publishing_industry_events.202.a.tt: "开始写作系列小说"
 pbi_objective_publishing_industry_events.202.b: "我从[SCOPE.sCharacter('target_character_2').GetFullName]中感受到了一种智慧！"
 pbi_objective_publishing_industry_events.202.c: "[SCOPE.sCharacter('target_character_3').GetFullName]的文章有一种不可抗拒的吸引力！"
 pbi_objective_publishing_industry_events.202.e: "大浪淘沙！"
 pbi_objective_publishing_industry_events.202.e.tt: "我们将寻找其他作家"
 pbi_objective_publishing_industry_events.203.t: "无法继续写作"
 pbi_objective_publishing_industry_events.203.d: "[SCOPE.sCharacter('target_character').GetFullName]在[SCOPE.sCharacter('target_character').GetHerHis]小说上的写作进程很艰难。如果这种情况继续下去，系列小说很可能会被腰斩。"
 pbi_objective_publishing_industry_events.203.f: "一位主管编辑一大早就到[SCOPE.sCharacter('target_character').GetLastName]的家中催促稿件的进度，但[SCOPE.sCharacter('target_character').GetSheHe]不在。其家仆回忆说[SCOPE.sCharacter('target_character').GetSheHe]已经三天没回家了，不知道人在哪里。"
 pbi_objective_publishing_industry_events.203.a: "把[SCOPE.sCharacter('target_character').GetHerHim]绑在椅子上！！！让[SCOPE.sCharacter('target_character').GetHerHim]继续写！"
 pbi_objective_publishing_industry_events.203.b: "[SCOPE.sCharacter('target_character').GetSheHe]需要散散心"
 pbi_objective_publishing_industry_events.204.t: "手稿在哪里！！"
 pbi_objective_publishing_industry_events.204.d: "作者拒绝允许出版商审查[SCOPE.sCharacter('target_character').GetFullName]正在连载的小说内容。"
 pbi_objective_publishing_industry_events.204.f: "出版商担心小说中对某些人物的描写可能会被认为是在映射政客。"
 pbi_objective_publishing_industry_events.204.a: "出版商有审查权"
 pbi_objective_publishing_industry_events.204.b: "应尊重作者的意愿"
 pbi_objective_publishing_industry_events.205.t: "不道德的内容"
 pbi_objective_publishing_industry_events.205.d: "[SCOPE.gsInterestGroup('target_ig').GetName]要求修订[SCOPE.sCharacter('target_character').GetFullName]的连载小说，因为其内容不道德不健康。"
 pbi_objective_publishing_industry_events.205.f: "“[SCOPE.sCharacter('target_character').GetLastName]那本有争议的小说，已经在报纸上连载，其内容各方看法不同”"
 pbi_objective_publishing_industry_events.205.a: "伟大作品之所以伟大是因为打破了旧价值观！"
 pbi_objective_publishing_industry_events.205.b: "我们需要审核内容"
 pbi_objective_publishing_industry_events.206.t: "涉嫌抄袭"
 pbi_objective_publishing_industry_events.206.d: "一些小说家声称[SCOPE.sCharacter('target_character').GetFullName]连载的小说中剽窃了他们的作品。"
 pbi_objective_publishing_industry_events.206.f: "“作家解释说，这个想法极大地激发了我的想象力，我渴望表达出来，把脑海的场景表达出来，但我们在那件作品中看到的不是他的想象力，而是剽窃品。”"
 pbi_objective_publishing_industry_events.206.a: "这是诬告"
 pbi_objective_publishing_industry_events.207.t: "像预言一样的小说"
 pbi_objective_publishing_industry_events.207.d: "[SCOPE.sCharacter('target_character').GetFullName]连载小说内容与[SCOPE.sState('target_state').GetName]最近发生的一起离奇的谋杀案惊人地相似，引起了人们的注意。"
 pbi_objective_publishing_industry_events.207.f: "“毫无疑问，我们的社会目前所面临的贫困问题是此类事件发生的背后原因！而令人惊讶的是，目前正在连载的[SCOPE.sCharacter('target_character').GetLastName]小说，里面的描述完全相同，似乎预见了这种情况。”"
 pbi_objective_publishing_industry_events.207.a: "这是一篇捕捉时代脉络的作品"
 pbi_objective_publishing_industry_events.208.t: "名人的好评"
 pbi_objective_publishing_industry_events.208.d: "[SCOPE.sCharacter('target_character_1').GetFullName]是[SCOPE.gsInterestGroup('target_ig_1').GetName]有影响力的成员，对[SCOPE.sCharacter('target_character').GetFullName]正在连载的小说发表褒赞看法。"
 pbi_objective_publishing_industry_events.208.f: "“所有的报纸都在发表小说，但要我说，我肯定认为[SCOPE.sCharacter('target_character').GetFullName]的小说是其中最有趣的。坦率地说，我对[SCOPE.sCharacter('target_character').GetSheHe]小说内容感到拍案叫绝 ！”"
 pbi_objective_publishing_industry_events.208.a: "希望[SCOPE.sCharacter('target_character_1').GetLastName]看到的赞赏！"
 pbi_objective_publishing_industry_events.208.b: "我觉得[SCOPE.sCharacter('target_character_1').GetHerHis]不需要他人评价"
 pbi_objective_publishing_industry_events.209.t: "名人锐评"
 pbi_objective_publishing_industry_events.209.d: "[SCOPE.sCharacter('target_character_1').GetFullName]是[SCOPE.gsInterestGroup('target_ig_1').GetName]有影响力的成员，对[SCOPE.sCharacter('target_character').GetFullName]正在连载的小说发表锐评。"
 pbi_objective_publishing_industry_events.209.f: "“[SCOPE.sCharacter('target_character').GetLastName]的连载小说与近几年的连载小说相比，只能说玷污了小说这个词汇。尤其是本周出版的新篇章，更是毫无亮点可言，甚至重构都无法挽救。我甚至同情[SCOPE.sCharacter('target_character').GetLastName]，如果不是为了钱谁会愿意写一坨屎呢，可以这么说[SCOPE.sCharacter('target_character').GetSheHe]已成为世界的笑柄。”"
 pbi_objective_publishing_industry_events.209.a: "[SCOPE.sCharacter('target_character_1').GetLastName]暴露了自己浅薄的文学知识"
 pbi_objective_publishing_industry_events.210.t: "连载小说引起关注"
 pbi_objective_publishing_industry_events.210.d: "[SCOPE.sCharacter('target_character').GetFullName]的小说，在[SCOPE.sState('target_state').GetName]报纸上连载，每一期都获得了越来越多的关注。"
 pbi_objective_publishing_industry_events.210.f: "这本小说讲述了主人公的艰辛和努力，牵动了许多读者的心。"
 pbi_objective_publishing_industry_events.210.a: "我等不及要看剩下的部分了！"
 pbi_objective_publishing_industry_events.211.t: "狂热的粉丝"
 pbi_objective_publishing_industry_events.211.d.rich: "[SCOPE.sCharacter('target_character').GetFullName]的连载小说受到[SCOPE.sState('target_state').GetName][concept_upper_strata]的欢迎。"
 pbi_objective_publishing_industry_events.211.d.middle: "[SCOPE.sCharacter('target_character').GetFullName]的连载小说受到[SCOPE.sState('target_state').GetName][concept_middle_strata]的热捧"
 pbi_objective_publishing_industry_events.211.d.poor: "[SCOPE.sCharacter('target_character').GetFullName]的连载小说受到[SCOPE.sState('target_state').GetName][concept_lower_strata]的欢迎。"
 pbi_objective_publishing_industry_events.211.f: "虽然人们可以在[SCOPE.sState('target_state').GetName]的各种报纸中阅读各种小说，但[SCOPE.sCharacter('target_character').GetFullName]的作品在近几年来却大受欢迎。"
 pbi_objective_publishing_industry_events.211.a: "有签售计划吗？"
 pbi_objective_publishing_industry_events.212.t: "暂停连载"
 pbi_objective_publishing_industry_events.212.d: "法院以[SCOPE.sCharacter('target_character').GetFullName]的连载小说中人物诽谤某些政客为由，下令要其停止连载。"
 pbi_objective_publishing_industry_events.212.f: "看过的人都知道，[SCOPE.sCharacter('target_character').GetFullName]小说中的人物都是以某些政客为原型的。"
 pbi_objective_publishing_industry_events.212.a: "我的天啊"
 pbi_objective_publishing_industry_events.300.t: "战地记者"
 pbi_objective_publishing_industry_events.300.d: "在[SCOPE.sFront('target_front').GetName]战争中服役的记者以[SCOPE.sWar('target_war').GetName]为题材，发表文章引起了很大的兴趣。"
 pbi_objective_publishing_industry_events.300.f: "“[SCOPE.sCharacter('target_character').GetFullName]将军下令反复突击，终于成功迫使敌人撤退，但我军也遭受了巨大的损失。这场持续了半天的战斗让我们的阵地前进了一百米。”"
 pbi_objective_publishing_industry_events.300.a: "让我们招募志愿军"
 pbi_objective_publishing_industry_events.300.b: "让我们征集捐款"
 pbi_objective_publishing_industry_events.400.t: "赢得外交战"
 pbi_objective_publishing_industry_events.400.d: "我们与[SCOPE.sCountry('target_country').GetName]的公开会谈被[SCOPE.sCountry('target_country').GetName]媒体大肆报道。虽然这给[SCOPE.sCountry('target_country').GetName]的[Concept('concept_radical', '$concept_radicals$')]带来了动力，但也招致[SCOPE.sCountry('target_country').GetName]的谴责。"
 pbi_objective_publishing_industry_events.400.f: "“为了回应[SCOPE.sCountry('target_country').GetName]外交官的#bold 大胆无礼请求#!，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullName]#bold 拒绝#!与外交官见面并通过#bold 一个军官#!通知了他！#bold 他无话可说！#!”"
 pbi_objective_publishing_industry_events.400.a: "在聪明人的手中，无论是傻瓜还是报纸都可以发挥作用"
 pbi_objective_publishing_industry_events.402.t: "舆论战"
 pbi_objective_publishing_industry_events.402.d: "报纸现在比任何政治家的演讲都更有力量，如果我们能够利用这股力量，那么可以给我们的敌人一记痛击。"
 pbi_objective_publishing_industry_events.402.f: "“你提供照片，我来提供战争。”\n威廉·伦道夫·赫斯特"
 pbi_objective_publishing_industry_events.402.a: "[SCOPE.sCountry('target_country_1').GetName]是我们的敌人"
 pbi_objective_publishing_industry_events.402.b: "我们不能放任[SCOPE.sCountry('target_country_2').GetName]继续发展"
 pbi_objective_publishing_industry_events.402.c: "我们需要处理[SCOPE.sCountry('target_country_3').GetName]的问题"
 pbi_objective_publishing_industry_events.402.e: "我们应该仔细考虑"
 pbi_objective_publishing_industry_events.402.tt: "我们将推迟一个月对目标国家作出决定"
 pbi_objective_publishing_industry_events.403.t: "火药库"
 pbi_objective_publishing_industry_events.403.d: "[SCOPE.sCountry('target_country').GetName]的报纸谴责我们在[SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName]地区的宣称并不合理。"
 pbi_objective_publishing_industry_events.403.f: "对于[SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName]，我们和[SCOPE.sCountry('target_country').GetName]的[concept_strategic_region]会谈，而[SCOPE.sCountry('target_country').GetName]报纸不断呼吁其权利的合法性。这方面的舆论强烈刺激[SCOPE.sCountry('target_country').GetName]公众的情绪。"
 pbi_objective_publishing_industry_events.403.a: "没办法利用这点吗……"
 pbi_objective_publishing_industry_events.404.t: "无礼要求"
 pbi_objective_publishing_industry_events.404.d: "[SCOPE.sCountry('target_country').GetName]政府通过其外交官向我们寻求让步，并希望与[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]秘密会面。"
 pbi_objective_publishing_industry_events.404.f: "[SCOPE.sCountry('target_country').GetName]舆论坚持认为，如果他们在[SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName]地区的地位得不到承认，就会用战争手段来争取。几乎可以肯定的是，[SCOPE.sCountry('target_country').GetName]政府的行动反映了他们希望通过打压国内舆论来避免战争，而国内舆论正逐渐被战争呼声所主导。"
 pbi_objective_publishing_industry_events.404.a: "他们想拉开帷幕。\n以他们想的方式！"
 pbi_objective_publishing_industry_events.405.t: "关乎命运的电报"
 pbi_objective_publishing_industry_events.405.d: "一封电报被送到[SCOPE.sCharacter('target_character').GetFullName]，通知[SCOPE.sCharacter('target_character').GetHerHim]与[SCOPE.sCountry('target_country').GetName]的外交官在[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullName]位于[SCOPE.sState('target_state_2').GetName]的别墅举行秘密会议的内容。[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]说，[ROOT.GetCountry.GetRuler.GetSheHe]将由政府决定是否将其内容公开。"
 pbi_objective_publishing_industry_events.405.f: "“[SCOPE.sCountry('target_country').GetName]外交官不仅强烈要求与[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullName]会面，他们还要求我们撤退[SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName]区域的[concept_interest]，并作为承诺的证明。[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的回应是通知外交官，[ROOT.GetCountry.GetRuler.GetSheHe]不能也不应该做出这样的承诺，[ROOT.GetCountry.GetRuler.GetSheHe]在会议上无话可说，因此谈判破裂。”"
 pbi_objective_publishing_industry_events.405.a: "公开！"
 pbi_objective_publishing_industry_events.405.a.tt: "事情发展成[concept_diplomatic_incident]"
 pbi_objective_publishing_industry_events.405.b: "不予出版"
 pbi_objective_publishing_industry_events.405.b.tt: "情况将得到解决"
 pbi_objective_publishing_industry_events.500.t: "光明"
 pbi_objective_publishing_industry_events.500.d: "随着报纸开始刊登拍摄的照片而不是画师的插图，我们社会的矛盾正在被曝光。"
 pbi_objective_publishing_industry_events.500.f: "照片上的贫民窟，治安差卫生条件差。许多工人被迫从事低工资的危险工作，孩子们不被允许上学而是去工作。"
 pbi_objective_publishing_industry_events.500.a: "我们需要把重点放在扩大福利上。"
 pbi_objective_publishing_industry_events.500.b: "[SCOPE.sCharacter('target_character_1').GetLastName]似乎改变了他对[GetLawGroup('lawgroup_childrens_rights').GetName]的看法"
 pbi_objective_publishing_industry_events.500.c: "[SCOPE.sCharacter('target_character_2').GetLastName]似乎改变了他对[GetLawGroup('lawgroup_welfare').GetName]的看法"
 pbi_objective_publishing_industry_events.500.e: "[SCOPE.sCharacter('target_character_3').GetLastName]似乎改变了他对[GetLawGroup('lawgroup_citizenship').GetName]的看法"
 gaudi_transatlantic_cable_expedition_modifier: "跨大西洋电缆考察"
 gaudi_transatlantic_cable_expedition_failed_modifier: "跨大西洋电缆考察失败"