 elgar_art_nouveau_tech_desc: "#R Эта технология доступна только через кнопку на вкладке «Искусство» в интерфейсе Morgenröte!#!\n\n[concept_elgar_art_nouveau] — это международный стиль искусства, архитектуры и прикладного искусства, особенно декоративного. Стиль известен под разными названиями в разных языках: югендстиль в немецком, стиль либерти в итальянском, модернизме в каталанском, а также известен как модерн в английском. Он часто вдохновлялся природными формами, такими как извилистые изгибы растений и цветов. Архитекторы и дизайнеры стремились к духовно возвышающему гезамткунстверку («полному произведению искусства»), которое объединило бы все искусства."
 elgar_impressionism_tech_desc: "#R Эта технология доступна только через кнопку на вкладке «Искусство» в интерфейсе Morgenröte!#!\n\n[concept_elgar_impressionism] — это стиль искусства XIX века, характеризующийся атмосферным изображением мимолётных мгновений. Термин «импрессионизм» также применялся к определённым стилям в музыке, литературе, кино и фотографии."
 elgar_expressionism_tech_desc: "#R Эта технология доступна только через кнопку на вкладке «Искусство» в интерфейсе Morgenröte!#!\n\n[concept_elgar_expressionism] — это модернистское движение, первоначально в поэзии и живописи. Его типичной чертой является представление мира исключительно с субъективной точки зрения, радикально искажая его для эмоционального эффекта, чтобы вызвать настроения или идеи."
 elgar.423.d: "[SCOPE.sCharacter('elgar_conductor').GetFullName] жалуется, что [SelectLocalization(SCOPE.sCharacter('elgar_conductor').IsFemale, 'её', 'его')] условия труда недостаточно хороши, учитывая [SelectLocalization(SCOPE.sCharacter('elgar_conductor').IsFemale, 'её', 'его')] многочисленные служебные обязанности. Возможно, денежная поддержка могла бы улучшить [SelectLocalization(SCOPE.sCharacter('elgar_conductor').IsFemale, 'её', 'его')] «вдохновение»."
 elgar.424.d: "[SCOPE.sCharacter('elgar_conductor').GetFullName] уже некоторое время пытается сочинять, но [SelectLocalization(SCOPE.sCharacter('elgar_conductor').IsFemale, 'её', 'его')] постоянно прерывает определённый человек."
 elgar_irrationalism_tech_desc: "Иррационализм — философское движение, возникшее в начале XIX века, подчёркивающее нерациональное измерение человеческой жизни. Иррационалисты заявляют, что человеческий разум сам по себе неспособен познать основы, связи и законы объективной реальности. В качестве альтернативы для описательных и нормативных объяснений мира предлагаются высшие когнитивные функции, такие как, например, интуиция, вера или непосредственный опыт."
