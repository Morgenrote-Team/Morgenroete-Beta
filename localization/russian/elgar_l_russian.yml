 elgar.801.t: "Национальный гимн"
 elgar.801.d: "С ростом национального самосознания нашего народа желание иметь национальный гимн, который бы достойно представлял правителя, страну и народ, теперь растёт не только среди интеллигенции, но и среди широких слоёв простого населения."
 elgar.801.f: "Ещё до середины XIX века во многих странах Европы и Америки было принято исполнять определённые песни на официальных мероприятиях, часто для представления монарха. Некоторые гимны были кодифицированы рано, в то время как другие оставались неофициальными до XX века. Поэтому некоторые страны начинают с предопределёнными национальными гимнами, которые могут меняться из-за революции или конституционных изменений. Многие страны, с другой стороны, должны создавать свои национальные гимны с нуля — в этом могут оказать ценную помощь композиторы и писатели."
 elgar.801.g: "Мы займёмся этим позже."
 elgar.801.h: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_monarch_anthem')]"
 elgar.801.i: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_folk_anthem')]"
