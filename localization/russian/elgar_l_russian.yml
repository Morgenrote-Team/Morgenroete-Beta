 elgar_classicism_tech: "Классицизм"
 elgar_classicism_tech_desc: "В искусстве классицизм в целом означает высокое уважение к классическому периоду и античности в западной традиции, которые задают стандарты вкуса. В своей чистейшей форме классицизм — это эстетическая позиция, основанная на принципах культуры, искусства и литературы Древней Греции и Рима, с акцентом на форму, простоту, пропорциональность, ясность структуры, совершенство, сдержанность эмоций, а также явное обращение к интеллекту."
 elgar_irrationalism_tech: "Иррационализм"
 elgar_modern_art_tech: "Модерн"
 elgar_modern_art_tech_desc: "#R Эта технология — лишь заглушка, её нельзя исследовать. Выполняйте записи в дневнике, чтобы получить [concept_elgar_impressionism|l], [concept_elgar_expressionism|l] или [concept_elgar_art_nouveau|l]!#!"
 elgar_art_nouveau_tech: "Ар-нуво"
 elgar_art_deco_tech: "Ар-деко"
 elgar_art_deco_tech_desc: "Ар-деко сочетал современные стили с изысканным мастерством и богатыми материалами. В период своего расцвета он олицетворял роскошь, гламур, изобилие и веру в социальный и технологический прогресс. Ар-деко — один из первых подлинно международных стилей, но его доминирование закончилось с началом Второй мировой войны."
 elgar_impressionism_tech: "Импрессионизм"
 elgar_neoclassicism_tech: "Неоклассицизм"
 elgar_neoclassicism_tech_desc: "На рубеже веков возродился интерес к классическим идеалам — неоклассицизм. Он охватывал как минимум музыку, философию и литературу. В то время как архитекторы вновь обращались к римским и греческим образцам, композиторы заново открывали для себя музыку барокко как источник вдохновения."
 elgar_expressionism_tech: "Экспрессионизм"
 elgar_new_objectivity_tech: "Новая вещественность"
 elgar_new_objectivity_tech_desc: "Хотя этот термин в основном описывает течение в немецкой живописи, он зажил своей жизнью и стал характеризовать общественную жизнь в Веймарской Германии, а также искусство, литературу, музыку и архитектуру, созданные для неё. Это была не столько философская объективность, сколько поворот к практическому взаимодействию с миром — деловой подход, который немцы считали исконно американским."
 elgar_mass_culture_tech: "Массовая культура"
 elgar_mass_culture_tech_desc: "#R Эта технология доступна только через запись в дневнике!#!\n\n«Непонимающая враждебность „массы“ ко всем традициям, представляющим культуру, острый и холодный ум, который посрамляет мудрость крестьянина, новообретённый натурализм, который во всех вопросах пола и общества возвращается к довольно примитивным инстинктам и условиям, возрождение panem et circenses в виде споров о заработной плате и спортивных стадионов — всё это свидетельствует об окончательном закате культуры и начале совершенно новой фазы человеческого существования», — Освальд Шпенглер, «Закат Европы»."
