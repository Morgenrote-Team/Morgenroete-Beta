 elgar_faido_modifier: "Музыкальная культура фаду"
 elgar.535.t: "Звук саудаде"
 elgar.535.d: "Из узких улочек Лиссабона и таверн Алфамы рождается новая музыкальная форма — печальная, грубая и глубоко португальская. Её называют фаду."
 elgar.535.f: "К началу XIX века в рабочих кварталах и портовых районах Лиссабона укоренился особый жанр. Фаду — буквально «судьба» — пели моряки, проститутки и городская беднота, часто под тихий плач португальской гитары. Тексты говорили о тоске, смирении и ностальгии, о том, что местные называли «саудаде» — чувстве, слишком сложном для перевода.\n\nХотя изначально фаду отвергали как вульгарную уличную музыку, постепенно оно завоевало художественное признание. Аристократы начали приглашать фадишт в салоны, и к 1840-м годам публичные выступления стали обычным явлением в мюзик-холлах Лиссабона. Формировалась новая музыкальная идентичность — уникально португальская, отражающая горести и гордость меняющейся нации."
 elgar.535.g: "Пусть фаду процветает как символ национальной идентичности."
 elgar.535.h: "Поощрять формализацию и профессиональное исполнение."
