 elgar.30.conducting: "\n\n#E [SCOPE.sCharacter('elgar_conductor').GetFullName] сейчас полностью занят[SelectLocalization(SCOPE.sCharacter('elgar_conductor').IsFemale, 'а', '')] репетициями оркестра.#!"
 elgar.30.composing: "\n\n#E [SCOPE.sCharacter('elgar_conductor').GetFullName] полностью посвятил[SelectLocalization(SCOPE.sCharacter('elgar_conductor').IsFemale, 'а себя', ' себя')] сочинению музыки.#!"
 elgar.30.touring: "\n\n#E [SCOPE.sCharacter('elgar_conductor').GetFullName] находится в заграничном концертном турне и поэтому [SelectLocalization(SCOPE.sCharacter('elgar_conductor').IsFemale, 'недоступна', 'недоступен')].#!"
 elgar.30.masterpiece: "\n\n#E [SCOPE.sCharacter('elgar_conductor').GetFullName] работает над шедевром и поэтому [SelectLocalization(SCOPE.sCharacter('elgar_conductor').IsFemale, 'недоступна', 'недоступен')].#!"
 elgar.30.free: "Наш композитор сейчас свободен."
 elgar.30.exhausted: "Наш композитор всё ещё слишком истощён после последнего задания."
 elgar.30.g: "Пусть [SCOPE.sCharacter('elgar_conductor').GetFullName] сосредоточится на следующих концертных сезонах."
 elgar.30.h: "Пусть [SCOPE.sCharacter('elgar_conductor').GetFullName] сосредоточится на сочинении музыки."
 elgar.30.i: "Пусть [SCOPE.sCharacter('elgar_conductor').GetFullName] полностью сосредоточится на заграничном турне."
 elgar.30.j: "Пусть [SCOPE.sCharacter('elgar_conductor').GetFullName] напишет шедевр."
 elgar.40.t: "Национальный вещательный канал"
 elgar.40.d: "Сегодня правительство выдало новую лицензию вещательной компании, и теперь возникает вопрос, на какой области сосредоточиться."
 elgar.40.f: "Новую лицензию с новой специализацией можно будет выдать через пять лет, когда истечёт срок действия старой."
 elgar.40.g: "Новости"
 elgar.40.h: "Образование"
 elgar.40.i: "Государственная политика"
 elgar.40.j: "Монарх"
 elgar.40.k: "Пропаганда"
 elgar.90.g: "Построить оперный театр"
 elgar.90.h: "Нам следует активизировать культурную деятельность в столице."
 elgar.91.t: "Стеклянный зал Тиволи"
 elgar.91.d: "Парк Тиволи уже много лет пользуется огромной популярностью у жителей Копенгагена. Существует план постройки концертного зала на 1000 человек, чтобы развлекать публику вдохновляющей музыкой."
 elgar.91.f: "Концертный зал был одним из аттракционов, когда сады Тиволи впервые открыли свои двери в 1843 году. Это было прямоугольное деревянное здание, спроектированное Харальдом Конрадом Стиллингом. Ханс Кристиан Лумбю был музыкальным руководителем и главным дирижёром с 1843 по 1872 год. Он написал для оркестра почти 700 произведений, в основном польки, вальсы и галопы. Концертный зал был расширен Йоханом Андреасом Стиллманном в 1863 году."
 elgar.91.g: "Надеюсь, господин Лумбю исполнит свои знаменитые галопы!"
 elgar.92.t: "Большой национальный театр"
 elgar.92.d: "Правительство планирует построить большой оперный театр в Мехико, что станет одним из крупнейших строительных проектов в истории страны."
 elgar.92.f: "Театр был построен в Мехико между 1840 и 1844 годами архитектором Лоренсо де ла Идальга. Историки считают его важнейшим архитектурным произведением в Мехико между завершением строительства Кафедрального собора и возведением Дворца изящных искусств. Большой национальный театр был открыт во время одного из президентских сроков Антонио Лопеса де Санта-Анны. Его название неоднократно менялось: от Большого театра Санта-Анны до Большого театра Вергара, затем Большого императорского театра и, наконец, Большого национального театра. В течение оперного сезона 1852 года в театре состоялись премьеры 17 опер и было дано более 60 представлений."
 elgar.93.t: "Амазонский театр"
 elgar.93.d: "Благодаря каучуковому буму, который переживает регион, в Манаусе планируется построить роскошный оперный театр — прямо посреди джунглей!"
 elgar.93.f: "Амазонский театр был построен в прекрасную эпоху, во времена каучукового бума. Впервые строительство театра было предложено в 1881 году членом местной Палаты представителей Антониу Жозе Фернандесом Жуниором, который представлял себе «жемчужину» в сердце тропических лесов Амазонии. Архитектурный стиль театра — неоренессанс. Черепица для крыши была импортирована из Эльзаса, стальные конструкции — из Глазго, а каррарский мрамор для лестниц, статуй и колонн — из Италии. Купол покрыт 36 000 декоративных керамических плиток, окрашенных в цвета национального флага Бразилии. Внутреннее убранство было привезено из Франции в стиле Людовика XV. Итальянский художник Доменико де Анджелис-младший расписал панно, украшающие потолки зрительного зала и фойе."
 elgar.101.t: "Памятник Бетховену"
 elgar.101.d: "По призыву композитора Роберта Шумана несколько интеллектуалов, а также простые граждане, патриоты и ценители искусства высказались за установку памятника Людвигу ван Бетховену в Бонне."
 elgar.101.f: "«Мавзолей будущей памяти уже стоит передо мной воочию — довольно высокий кубоид, на нём лира с годами рождения и смерти, над ним небо, а рядом несколько деревьев. Целая нация, перед которой стоит Бетховен, на каждой странице учащий её величию и гордости, — неужели она не сможет воздвигнуть ему памятник в тысячу раз более величественный? Будь я государем, я бы построил ему храм в палладианском стиле! Изобразил бы его в гигантском виде, как святого Карло Борромео на Лаго-Маджоре, чтобы он, как и при жизни, мог взирать на горы и долины. И когда мимо проплывают рейнские корабли, а чужестранцы спрашивают: „Что означает этот гигант?“, — каждый ребёнок мог бы ответить: „Это Бетховен“, — и они подумали бы, что это германский император. Одним словом: воспряньте, отбросьте свою флегму и подумайте, что этот памятник станет и вашим собственным!» — Роберт Шуман"
 elgar.101.g: "Бетховен был немецким титаном музыки!"
 elgar.101.h: "Мы с радостью профинансируем этот культурно значимый проект."
 elgar.101.i: "Не таким уж он был и великим, если ему до сих пор не поставили памятник."
 elgar.102.t: "Подготовка к фестивалю Бетховена"
 elgar.102.d: "Последние штрихи в работе над памятником Бетховену завершены. Теперь пора готовиться к торжественному открытию."
 elgar.102.f: "Фестиваль в честь открытия памятника Бетховену стал крупным музыкальным событием международного масштаба. Помимо прусского короля, была приглашена и британская королева Виктория, среди гостей были такие интеллектуальные гиганты, как Александр фон Гумбольдт, а композиторы уровня Гектора Берлиоза, Джакомо Мейербера и, прежде всего, Ференца Листа определили облик этих четырёх дней. Ожидалось, что в фестивале примут участие тысячи людей, что создало серьёзные проблемы для маленького города Бонна."
 elgar.102.g: "Разослать приглашения!"
 elgar.103.t: "Приглашение на фестиваль Бетховена"
 elgar.103.d: "Наше правительство получило официальное приглашение на фестиваль Бетховена в Бонне, где будет открыт памятник композитору."
 elgar.103.g: "Мы с радостью приедем."
 elgar.103.h: "Классическая музыка переоценена."
 elgar.104.t: "Строительство зала Бетховена"
 elgar.104.d: "Из-за большого количества посетителей Ференц Лист предложил перебросить людей и материалы со стройплощадки Кёльнского собора в Бонн, чтобы в рекордно короткие сроки построить фестивальный зал."
 elgar.104.f: "Кульминацией трёхдневного фестиваля Бетховена должно было стать официальное открытие памятника. За месяц до начала фестиваля не было подходящего места для размещения ожидаемых 3000 посетителей. По настоянию Листа и только после того, как он предложил взять на себя все расходы, комитет нанял архитектора и строителей для возведения зала Бетховена. К тому времени, как они наконец начали, у них было меньше двух недель, и им пришлось работать круглосуточно, чтобы закончить в срок. Ференц Лист также договорился со строителями Кёльнского собора. Древесину доставляли из Кёльна в Бонн по Рейну. Декорации, изготовленные в Кёльне, также были быстро доставлены в Бонн. Всего за одиннадцать дней на пустом месте был возведён фестивальный зал."
 elgar.104.g: "Великолепно."
 elgar.105.t: "Фестиваль Бетховена"
 elgar.105.d: "После четырёх дней первоклассной музыки фестиваль Бетховена можно считать полным успехом, хотя события такого масштаба и не обходятся без скандалов."
 elgar.105.f: "Церемония не обошлась без неловких моментов. Памятник Бетховену оказался повёрнут спиной к самым важным гостям, королю Пруссии Фридриху Вильгельму IV и британской королеве Виктории, которые заняли места на балконе дворца Фюрстенбергов. Александр фон Гумбольдт спас положение, заметив, что Бетховен всегда был грубияном. Ещё более неловким было то, что во время тостов на праздничном банкете в «Золотой звезде» Лист оскорбил французскую делегацию во главе с Берлиозом и чуть не спровоцировал бунт. Банкет был сорван поведением Лолы Монтес, которая танцевала на столе и поставила Листа в неловкое положение, настаивая на том, что она его гостья на торжествах, и требуя места, соответствующего её заявленному статусу, тем самым нарушив заранее организованную рассадку."
 elgar.105.g: "Бетховен повернулся к нам спиной?"
 elgar.105.h: "Александр фон Гумбольдт — настоящий джентльмен."
 elgar.105.i: "У этих немцев нет элегантности."
 elgar.105.j: "Это было вдохновляюще."
 elgar.106.t: "Кантата Листа"
 elgar.106.d: "Ференцу Листу выпала великая честь написать и публично исполнить кантату к открытию памятника Бетховену."
 elgar.106.f: "«Как бы то ни было, его кантата, прекрасно исполненная и тепло встреченная тремя с половиной четвертями зала, — это великое и прекрасное произведение, которое сразу же возносит Листа очень высоко среди композиторов. Выражение в ней истинно, интонация верна, стиль возвышен и нов, форма хорошо продумана и добросовестно исполнена, инструментовка замечательна своей силой и разнообразием. В его оркестре никогда не бывает последовательности одних и тех же звуков, что делает некоторые, некогда ценимые, произведения такими утомительными для слушателя; он умеет использовать малые и большие средства, он не требует слишком многого ни от инструментов, ни от голосов; одним словом, он одним махом показал, что у него есть стиль в инструментовке и в других частях музыкального искусства, хотя некоторые опасались, что он его ещё не нашёл», — Гектор Берлиоз."
 elgar.106.g: "Славься! Славься! Славься, Бетховен!"
 elgar.107.t: "Берлиоз на фестивале Бетховена"
 elgar.107.d: "Торжества, посвящённые открытию памятника Бетховену, принесли композитору Гектору Берлиозу немалое вдохновение."
 elgar.107.f: "«Именно во время этой поездки в Австрию, Венгрию, Богемию и Силезию я начал сочинять свою легенду о Фаусте, план которой я обдумывал уже давно. Как только я решился взяться за неё, мне пришлось смириться с тем, чтобы написать большую часть либретто самому; фрагменты французского перевода „Фауста“ Гёте, выполненного Жераром де Нервалем, которые я уже положил на музыку двадцатью годами ранее и которые я намеревался включить в новую партитуру в переработанном виде, а также две или три другие сцены, написанные до моего отъезда из Парижа господином Гандоньером по моим указаниям, не составляли и шестой части всей работы. Поэтому во время путешествия в старом немецком дилижансе я пытался писать стихи для своей музыки. Я начал с воззвания Фауста к природе, не пытаясь переводить или даже имитировать шедевр Гёте, а лишь черпая в нём вдохновение и извлекая музыкальную субстанцию, которую он содержал. Начав, я писал остальные стихи по мере того, как ко мне приходили музыкальные идеи, и я сочинял партитуру с лёгкостью, которую редко испытывал при работе над другими своими произведениями», — Гектор Берлиоз."
 elgar.107.g: "Значит, поездка того стоила?"
 elgar.108.t: "Виктория посещает Кёльнский собор"
 elgar.108.d: "Королева Великобритании Виктория воспользовалась своим пребыванием в Рейнской области, чтобы посетить Кёльнский собор и узнать больше о только что начавшемся строительстве."
 elgar.108.f: "Ранний уход королевской четы с концерта был обусловлен тем, что во второй половине дня была запланирована экскурсия по Кёльнскому собору, которая проходила под праздничный перезвон колоколов. Затем их величества проследовали через главный вход центрального нефа к хорам, где кёльнское мужское хоровое общество исполняло праздничную кантату под органный аккомпанемент музыкального руководителя Вебера."
 elgar.108.g: "Для нас это большая честь."
 elgar.111.t: "Памятник Моцарту"
 elgar.111.d: "Подготовка к установке памятника Вольфгангу Амадею Моцарту идёт полным ходом. Однако сбор пожертвований всё ещё продолжается."
 elgar.111.f: "В 1835 году писатель Юлиус Шиллинг, родом из Позена в современной Польше, предложил установить памятник на нынешней Моцартплац в честь Моцарта, который в то время был относительно неизвестен в Зальцбурге. В конечном итоге строительство памятника поддержали значительные спонсоры за границей, а также в Вене. Баварский король Людвиг I пожертвовал значительную сумму и предоставил основание для бронзовой статуи."
 elgar.111.g: "Моцарт был немецким титаном музыки!"
 elgar.113.t: "Памятник Моцарту"
 elgar.113.d: "Сегодня в родном городе величайшего сына Зальцбурга был открыт памятник в его честь."
 elgar.113.f: "Памятник, спроектированный Людвигом Шванталером и отлитый Иоганном Баптистом Штигльмайером, был торжественно открыт 5 сентября 1842 года в присутствии обоих выживших сыновей Моцарта, Франца Ксавера и Карла Томаса. Однако вдова Моцарта не смогла увидеть это событие. Она умерла незадолго до этого в доме на Моцартплац, 8. Праздник сопровождался факельным шествием, катанием на лодках, альпийскими поездами, стрельбой по мишеням и скачками."
 elgar.114.t: "Живой памятник"
 elgar.114.d: "В Австрии растёт число сторонников установки памятника Моцарту. В связи с этим некоторые жители Франкфурта хотят организовать благотворительный концерт и связать эту идею с политическим содержанием."
 elgar.114.f: "Изначально жители Франкфурта хотели организовать концерт, чтобы собрать достаточно пожертвований для памятника Моцарту. Памятники представителям буржуазии были новшеством в Германии. Поэтому установка памятников в честь национальных деятелей, таких как художники или учёные, была прекрасной возможностью выразить патриотические чувства. Некоторые во Франкфурте даже предлагают организовать национальный съезд певцов, доходы от которого должны пойти в фонд для немецких музыкантов для поддержки молодых талантов."
 elgar.114.g: "Собрать деньги на наш собственный живой памятник — фестиваль в честь Моцарта!"
 elgar.114.h: "Пожертвовать деньги на памятник в Зальцбурге."
 elgar.115.t: "Приглашение на Певческий фестиваль"
 elgar.115.d: "Жители Франкфурта пригласили патриотически настроенных певцов из нашей страны принять участие в фестивале Моцарта."
 elgar.115.g: "Это музыкальная и национальная возможность."
 elgar.115.h: "Терпеть не могу романсы."
 elgar.116.t: "Фестиваль Моцарта"
 elgar.116.d: "42 хоровых общества из Рейнской области, Бадена, Гессена и Франконии съехались во Франкфурт, чтобы отпраздновать трёхдневный фестиваль музыки Моцарта. Однако мероприятие превратилось в демонстрацию за политическое объединение Германии. Собранные деньги пошли в фонд поддержки молодых композиторов."
 elgar.116.f: "«Город пришёл в восторг. Дома были заполнены людьми до самых мансард. Жители Майнца, Ханау и Оффенбаха прибыли на лодках под звуки пушечных выстрелов, в окружении украшенных лодок с музыкой; они входили через все ворота. Это было мощное, волнующее зрелище, художественный интерес отошёл на второй план, но национальный дух приблизился к нам с огромной силой; не скрою, по моим щекам текли светлые слёзы», — Генрих Гофман."
 elgar.116.g: "Музыка объединяет нацию."
 elgar.117.t: "Либеральные смутьяны шумят во Франкфурте"
 elgar.117.d: "От нас не укрылось, что некоторые якобински настроенные «патриоты» использовали так называемый фестиваль Моцарта во Франкфурте для своей политической агитации."
 elgar.117.f: "42 хоровых общества из Рейнской области, Бадена, Гессена и Франконии съехались во Франкфурт, чтобы отпраздновать трёхдневный фестиваль музыки Моцарта. Однако мероприятие превратилось в демонстрацию за политическое объединение Германии. Изначально целью было финансирование памятника Моцарту, но инициаторы вскоре изменили цель благотворительности в пользу собственного фонда."
 elgar.117.g: "Это заговор против порядка в Германском союзе!"
 elgar.117.h: "Пусть поют."
 elgar.121.t: "Основание Всеобщего германского музыкального союза"
 elgar.121.d: "Сегодня в городе [SCOPE.sState('elgar_musikverein_capital').GetCityHubName] был основан Всеобщий германский музыкальный союз (Allgemeiner Deutscher Musikverein). Сразу же разгорелась дискуссия о том, принадлежим ли мы к Новой немецкой школе или защищаем консервативные музыкальные идеи."
 elgar.121.f: "Новая немецкая школа — это термин, введённый в 1859 году Францем Бренделем, редактором «Новой музыкальной газеты», для описания определённых тенденций в немецкой музыке. Он использовался разными людьми в разное время с разными значениями. Принято считать, что Ференц Лист и Рихард Вагнер были одними из самых видных представителей «Новой немецкой школы». Также существует консенсус, что Иоганнес Брамс к ней не принадлежал. В остальном интерпретации расходятся. Новый термин следует понимать как обозначение всего периода после смерти Бетховена. По словам Бренделя, было принято называть период И. С. Баха и Генделя «старой немецкой школой». Последующий период — это период венских мастеров, таких как Моцарт, находившихся под влиянием итальянского стиля. Бетховен вновь направил интерес на немецкий север и тем самым открыл «новую немецкую школу». Композиторы с обеих сторон смотрели на Бетховена как на своего духовного и художественного героя; консерваторы видели в нём непревзойдённую вершину, а прогрессисты — новое начало в музыке."
 elgar.121.g: "Мы — часть Новой немецкой школы."
 elgar.121.h: "Мы защищаем Традиционную немецкую школу."
 elgar.122.t: "Членство во Всеобщем германском музыкальном союзе"
 elgar.122.d: "Артисты из нашей страны были приглашены во вновь основанный Всеобщий германский музыкальный союз. Сразу же разгорелась дискуссия о том, принадлежим ли мы к Новой немецкой школе или защищаем консервативные музыкальные идеи."
 elgar.123.t: "Место проведения следующего съезда музыкантов"
 elgar.123.d: "Члены Всеобщего германского музыкального союза выбрали город [SCOPE.sState('elgar_musikverein_capital').GetCityHubName] местом проведения следующего съезда музыкантов (Tonkünstler-Versammlung)."
 elgar.123.f: "В 1859 году в Лейпциге состоялся первый съезд музыкантов по случаю 25-летия «Новой музыкальной газеты». Во время второго съезда (1861 г.) в Веймаре более 700 членов-учредителей приняли устав Всеобщего германского музыкального союза (ADMV). «Новая музыкальная газета» стала органом союза. В конце XIX века ADMV находился под протекторатом великого герцога Веймарского. ADMV провёл ряд крупных съездов музыкантов. В основном он ориентировался на направление Новой немецкой школы, представленное Ференцем Листом и Рихардом Вагнером. В рамках художественных целей ADMV должны были организовываться ежегодные съезды музыкантов в разных местах, с исполнением важных, редко звучащих и особенно новых музыкальных произведений всех жанров. Однако предполагалось исполнять и старые, редко или совсем не звучащие произведения, представляющие интерес в силу своей значимости. Кроме того, планировалось печатать новые музыкальные или научные труды."
 elgar.123.g: "Для нас это большая честь!"
 elgar.124.t: "Съезд музыкантов в городе [SCOPE.sState('elgar_tonkunstler_state').GetCityHubName]"
 elgar.124.d: "В этом году съезд музыкантов (Tonkünstler-Versammlung) пройдёт в городе [SCOPE.sState('elgar_tonkunstler_state').GetCityHubName]. Наши артисты приглашены для обсуждения музыки и прослушивания новых и забытых произведений."
 elgar.124.g: "Насладимся музыкой и послушаем выступления единомышленников."
 elgar.124.h: "Это подходящее место, чтобы раскритиковать этих музыкальных дилетантов."
 elgar.124.i: "Это будет день истины — только наше представление о музыке является единственно верным!"
 elgar.125.t: "Война романтиков"
 elgar.125.d: "Спор между представителями Новой немецкой школы и более консервативными музыкантами привёл к публичному скандалу. В прессе уже бушует настоящая война между двумя фракциями. [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] нужно поддержать своих артистов."
 elgar.125.f: "«Война романтиков» — термин, используемый некоторыми историками музыки для описания раскола среди выдающихся музыкантов второй половины XIX века. Основными предметами спора были музыкальная структура, пределы хроматической гармонии и противопоставление программной и абсолютной музыки. Противоборствующие стороны сформировались в 1850-х годах. Самыми видными членами консервативного круга были Иоганнес Брамс, Йозеф Иоахим, Клара Шуман и Лейпцигская консерватория, основанная Феликсом Мендельсоном. Их противников, радикальных прогрессистов, в основном из Веймара, представляли Ференц Лист и члены так называемой Новой немецкой школы, а также Рихард Вагнер. Спор имел германское и центральноевропейское происхождение; музыканты из Франции, Италии и России были вовлечены лишь незначительно. Композиторы с обеих сторон смотрели на Бетховена как на своего духовного и художественного героя; консерваторы видели в нём непревзойдённую вершину, а прогрессисты — новое начало в музыке."
 elgar.125.g: "Поддержать Новую немецкую школу!"
 elgar.125.h: "Поддержать Традиционную немецкую школу!"
 elgar.126.t_konservativ: "Консерваторы побеждают в «войне романтиков»"
 elgar.126.d_konservativ: "Подавляющее большинство последователей Традиционной школы выиграло спор о будущем музыки. Верность содержания — дело второстепенное: общественное мнение определяется массой вкладов в дебаты и полемику."
 elgar.126.f_konservativ: "Центральным пунктом разногласий между этими двумя группами музыкантов был вопрос о традиционных и новых музыкальных формах. Это стало следствием дебатов о жизнеспособности симфонического жанра, который в руках Людвига ван Бетховена превратился из развлекательного в форму, включающую социальные, моральные и культурные идеалы. Лист и его круг отдавали предпочтение новым стилям письма и формам, которые сочетали бы музыку с повествовательными и живописными идеями. С этой целью Лист развил симфоническую поэму. Лейпцигско-берлинская школа отстаивала формы, использовавшиеся классическими мастерами, кодифицированные музыковедами, такими как Адольф Бернхард Маркс в начале XIX века. Предметом спора была и правомерность программной музыки. В своей книге 1854 года «О музыкально-прекрасном» Ганслик утверждал, что музыка не представляет и не может представлять ничего конкретного, кроме самой себя.\n\n В итоге #G [GetGlobalVariable('elgar_neudeutsch_yes').GetValue]#! участников поддержали Новую немецкую школу, а #R [GetGlobalVariable('elgar_konservativ_yes').GetValue]#! — Традиционную."
 elgar.126.g: "Традиционная школа торжествует."
 elgar.126.t_neudeutsch: "Прогрессисты побеждают в «войне романтиков»"
 elgar.126.d_neudeutsch: "Подавляющее большинство последователей Новой немецкой школы выиграло спор о будущем музыки. Верность содержания — дело второстепенное: общественное мнение определяется массой вкладов в дебаты и полемику."
 elgar.126.f_neudeutsch: ""
 elgar.126.h: "Новая немецкая школа торжествует."
 elgar.131.t: "Ференц Лист начинает своё европейское турне"
 elgar.131.d: "После довольно несчастливого периода в Париже Ференц Лист решил, по примеру своего соперника Тальберга, отправиться в турне и стать всемирно известным музыкантом. Его первым пунктом назначения станет [SCOPE.sCountry('elgar_liszt_destination_scope').GetNameNoFlag]."
 elgar.131.f: "Ференц Лист — австро-венгерский композитор, пианист, дирижёр, театральный режиссёр, музыкальный педагог. Лист был одним из самых выдающихся и влиятельных пианистов-виртуозов и, имея в своём активе более 1300 произведений и аранжировок, одним из самых плодовитых композиторов XIX века. Хотя большая часть его творчества относится к фортепианной литературе, Лист также дал мощный толчок развитию оркестровой музыки, создав симфоническую поэму. Его концепция программной музыки и использование новых гармонических и формальных средств сделали его, наряду с Рихардом Вагнером, самым известным представителем Новой немецкой школы. В 1839 году Лист начал обширное турне по Европе, которое продолжалось в течение следующих восьми лет. Этот период был самым блестящим для Листа как концертирующего пианиста, и во время своих гастролей он получил множество наград и восторженных отзывов. В это время появились первые сообщения об интенсивной реакции поклонников Листа, получившей название «листомания». Листомания характеризовалась истерической реакцией на Листа и его концерты. Сообщалось, что игра Листа поднимала настроение публики до уровня мистического экстаза."
 elgar.131.g: "Желаем ему всего наилучшего."
 elgar.132.t: "Листомания в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]"
 elgar.132.d: "Всемирно известный пианист Ференц Лист выбрал нашу страну в качестве следующего пункта своего европейского турне. Театры и оперные залы уже переполнены!"
 elgar.132.g: "Откуда вдруг взялись все эти кричащие женщины?"
 elgar.133.t: "Лист уезжает"
 elgar.133.d: "Лист завершил своё пребывание и поблагодарил за гостеприимство. Листомания продолжится в [SCOPE.sCountry('elgar_liszt_destination_scope').GetAltNameNoFlag('RU_CL_PP')]."
 elgar.133.f: "По оценкам, с 1839 по 1847 год Лист выступил на публике более тысячи раз. Более того, его великая слава пианиста, которой он продолжал наслаждаться ещё долго после официального ухода с концертной сцены, была основана главным образом на его достижениях в это время. Его репутацию укрепляло и то, что Лист отдавал большую часть своих доходов на благотворительность и гуманитарные цели. Он пожертвовал крупные суммы на строительство Кёльнского собора и базилики Святого Стефана в Пеште, а также делал частные пожертвования на общественные нужды, такие как больницы и школы, а также благотворительным организациям, таким как Пенсионный фонд музыкантов Лейпцига. После Великого пожара в Гамбурге в мае 1842 года он давал концерты в помощь бездомным. Чтобы удовлетворить потребность своих поклонников в локоне его волос, Лист завёл собаку, шерсть которой незаметно служила источником кудрей."
 elgar.301.t: "Хорошие репетиции"
 elgar.301.d: "Репетиции оркестра под руководством странствующего композитора были очень многообещающими."
 elgar.301.f: "Странствующий композитор покорил оркестр как дирижёр и уже впечатлил своими репетициями!"
 elgar.301.g: "Прекрасно."
 elgar.302.t: "Посредственные репетиции"
 elgar.302.d: "К сожалению, репетиции оркестра под руководством странствующего композитора оказались не такими хорошими, как надеялся концертный зал..."
 elgar.302.f: "Было ли это из-за несговорчивых коллег, плохо подготовленных исполнителей или условий в концертном зале — репетиции не сулят ничего хорошего для выступления."
 elgar.302.g: "Не прекрасно."
 elgar.303.t: "Любовное посвящение"
 elgar.303.d: "Роман из-за «небольшой» любезности будоражит умы."
 elgar.303.f: "Артисты всегда были известны своим несколько «свободным образом жизни» и становились причиной одного-двух межличностных скандалов. Внимание приковано к небольшому жесту, который, однако, имеет взрывную силу. Странствующий композитор посвятил сонату замужней даме и подарил ей оригинальную партитуру. Однако эта женщина — жена высокоуважаемого генерала нашей армии. Подарок вызвал спекуляции и может повредить общественному имиджу этого человека. Военные требуют действий."
 elgar.303.g: "Не вижу проблемы."
 elgar.303.h: "Возмутительно!"
 elgar.304.t: "Вечерний приём"
 elgar.304.d: "Наш монарх пригласил странствующего композитора на княжеский приём. Композитор отблагодарил его своим произведением."
 elgar.304.f: "Хотя музыкальная культура XIX века всё больше стремилась освободиться от патронажа, дворяне и короли по-прежнему были главными покровителями искусств, и многие музыкальные произведения всё ещё посвящались князьям и королям. С другой стороны, личные отношения часто означали, что композиторы, исключённые из академий и кружков искусств, могли найти поддержку у богатого покровителя, если они соответствовали его личному вкусу. Целый ряд шедевров Вагнера, например, был бы невозможен без личной поддержки короля Баварии Людвига II."
 elgar.304.g: "Какой прекрасный сюрприз!"
 elgar.305.t: "Все билеты проданы!"
 elgar.305.d: "Ссора из-за аншлагового выступления великого композитора вызвала общественный резонанс!"
 elgar.305.f: "В день премьеры перед оперным театром, билеты в который были распроданы уже несколько дней, собралась большая толпа; даже появившийся композитор смог достать билет только у спекулянтов. Однако, поскольку один из сотрудников театра сам продавал дополнительные билеты, количество проданных билетов значительно превысило количество мест. В театре и перед ним развернулись бурные сцены, в которых музыка почти полностью потонула; те, кто был снаружи, кричали, чтобы их впустили, те, кто был внутри, требовали тишины. Вступительные хоры ещё удалось исполнить, но затем оркестр сдался, и тогда начался настоящий шум."
 elgar.305.g: "Кто за это отвечает?!"
 elgar.306.t: "Неожиданная премьера"
 elgar.306.d: "Произведение композитора, потерпевшего неудачу на родине, покорило сердца нашей публики."
 elgar.306.f: "Всегда были случаи, когда премьера знаменитых произведений проваливалась. Такой опыт часто приводил не только к серьёзным сомнениям в себе и концу карьеры, но и к попытке исполнить то же произведение для другой аудитории. Позднейшие классические произведения часто утверждались только со второй или третьей попытки. В памяти оставалось не место премьеры, а место успеха как настоящая отправная точка. Гектор Берлиоз — пример композитора, чьи произведения пользовались большим успехом в Великобритании и Германии, чем на родине, во Франции."
 elgar.306.g: "Наша публика более благодарна."
 elgar.307.t: "Музыкальная дружба"
 elgar.307.d: "Странствующий композитор сразу же нашёл общий язык с местными коллегами-музыкантами."
 elgar.307.f: "Отношения между иностранными и местными музыкантами не всегда были простыми. Дело было не только в национальных обидах и личных предрассудках. Некоторые оркестры не могли работать со стилем дирижирования приглашённого дирижёра, иногда краткосрочный характер выступлений требовал компромиссов, в которых гость, в свою очередь, винил местный музыкальный мир. Многие местные композиторы или дирижёры также опасались слишком большого влияния иностранцев. Однако, несмотря на все эти препятствия, дружба продолжала зарождаться."
 elgar.307.g: "Плодотворная дружба."
 elgar.308.t: "Музыкальное соперничество"
 elgar.308.d: "Местный музыкальный мир смотрит на появление странствующего композитора с обидой и подозрением."
 elgar.308.f: "«Два больших произведения для Оперы, ещё два для Ренессанса, ещё два для Опера-Комик и ещё одно для Итальянского театра? Похоже, месье Доницетти обращается с нами как с завоёванной страной, это настоящее вторжение. Больше нельзя говорить об оперных театрах Парижа, а только об оперных театрах месье Доницетти», — Гектор Берлиоз."
 elgar.308.g: "Этим музыкантам следует взять себя в руки!"
 elgar.309.t: "Вдохновение"
 elgar.309.d: "Иностранный композитор вдохновил членов государственного оркестра."
 elgar.309.f: "Внешнее влияние часто имело значение в местном и национальном музыкальном мире. Незнакомые произведения, чужой музыкальный язык или появление харизматичного музыканта часто могли привести к тому, что местные музыканты обретали совершенно новую перспективу."
 elgar.309.g: "Вдохновение? Я хочу видеть результаты!"
 elgar.309.h: "Это положительно скажется на оркестре."
 elgar.310.t: "Мания"
 elgar.310.d: "Появление композитора привело к беспрецедентному, почти истерическому общественному восторгу по поводу его творчества. У людей больше нет других мыслей!"
 elgar.310.f: "«Когда раньше я слышал об обмороках, которые случались в Германии, и особенно в Берлине, когда там появлялся Лист, я сочувственно пожимал плечами и думал: тихая, соблюдающая субботу Германия не хочет упускать возможность получить немного необходимой разрядки... В их случае, думал я, это зрелище ради зрелища... Так я объяснял эту листоманию и рассматривал её как признак политически несвободных условий за Рейном. Но я всё-таки ошибался и заметил это только на прошлой неделе, в Итальянской опере, где Лист давал свой первый концерт... Это была поистине не германски-сентиментальная, сентиментальничающая берлинская публика, перед которой играл Лист, совершенно один, или, вернее, в сопровождении одного лишь своего гения. И всё же, как судорожно подействовало на них одно его появление! Какими бурными были аплодисменты, которые встретили его!... Что это было за одобрение! Настоящее безумие, неслыханное в анналах фурора!» — Генрих Гейне."
 elgar.310.g: "Значит, они совершенно отвлечены?"
 elgar.311.t: "Музыка сближает людей"
 elgar.311.d: "Посол спрашивает, не можем ли мы достать ему билет на концерт композитора, который у нас гостит."
 elgar.311.f: "Посол великой державы — поклонник странствующего композитора, который в настоящее время посещает нашу страну. Он хотел бы посетить выступление, но свободных мест больше нет. Поэтому он попросил нас использовать наше политическое влияние, чтобы он всё-таки смог попасть на концерт."
 elgar.311.g: "Ха-ха. Нет."
 elgar.311.h: "Предоставить ему почётное место."
 elgar.312.t: "Покушение в опере!"
 elgar.312.d: "Ужасное покушение на ведущего политика нашей страны омрачило сегодняшнее оперное представление!"
 elgar.312.f: "Некоторое время отсутствие легитимности у нашего правительства вызывает недовольство среди населения. Коварный убийца воспользовался концертом популярного композитора, чтобы застрелить высокопоставленного правительственного чиновника во время выступления. [SCOPE.sCharacter('elgar_leader_victim').GetFullName] был[SelectLocalization(SCOPE.sCharacter('elgar_leader_victim').IsFemale, 'а', '')] серьёзно ранен[SelectLocalization(SCOPE.sCharacter('elgar_leader_victim').IsFemale, 'а', '')]. Преступник всё ещё в бегах, а находящуюся при смерти жертву немедленно доставили в ближайшую больницу."
 elgar.312.g: "Где были силы безопасности?!"
 elgar.313.t: "Небольшое произведение"
 elgar.313.d: "Небольшое произведение, сочинённое великим композитором в нашей стране, может, и не стало большим хитом, но нашло своих поклонников."
 elgar.313.f: "Произведения композиторов, созданные наряду со знаменитыми работами, не обязательно были среднего качества. Снова и снова небольшим пьесам удавалось привлечь больше внимания, чем многим трудам всей жизни. Несмотря на богатство своего творчества, Николай Римский-Корсаков известен в поп-культуре благодаря «Полёту шмеля» (из «Сказки о царе Салтане»), а Эдвард Григ — «В пещере горного короля» (из «Пер Гюнта») — незаслуженно, но музыкальный хит есть музыкальный хит."
 elgar.313.g: "Иногда именно мелочи приносят радость."
 elgar.314.t: "Нет вдохновения"
 elgar.314.d: "К сожалению, наш гость находит пребывание в нашей стране совершенно невдохновляющим."
 elgar.314.f: "Иногда просто не получается."
 elgar.314.g: "Удручающе."
 elgar.315.t: "Частный концерт"
 elgar.315.d: "Помимо официальных выступлений, наш композитор дал частный концерт в узком кругу."
 elgar.315.f: "Небольшие частные концерты великих композиторов имеют давнюю традицию. Наиболее известен этим Франц Шуберт с названными в его честь шубертиадами. На первых шубертиадах Франц Шуберт играл на фортепиано, а баритоны Иоганн Михаэль Фогль и позже Карл фон Шёнштейн пели его песни. Вечера также включали чтения и остроумные развлекательные игры, которые часто имели определённую тему. Это была смесь дружеских встреч и литературно-музыкального салона."
 elgar.315.g: "Это было мило."
 elgar.315.h: "На бис!"
 elgar.316.t: "Талантливый ученик"
 elgar.316.d: "Великий композитор, находящийся в нашей стране, обнаружил талант у одного из политических лидеров нашей страны и подумывает обучить его своему искусству композиции."
 elgar.316.f: "Можно удивиться, что политики вообще способны на художественный талант, и что, будучи плохими людьми, они в принципе не должны быть совершенно нечувствительны к какому-либо музыкальному искусству. Конечно, были композиторы с политическими амбициями, но гораздо меньше политиков с музыкальными амбициями. Чем бы ни обладал этот политик, возможно, его душа всё-таки не безнадёжно потеряна."
 elgar.316.g: "Многообещающий кандидат."
 elgar.316.h: "Его энергию лучше направить в другое русло."
 elgar.317.t: "Музыкальная катастрофа"
 elgar.317.d: "Выступление в одном из наших концертных залов может войти в историю нашей музыки как один из самых больших провалов."
 elgar.317.f: "Оркестр был не готов, солист простудился, дирижёр не отдохнул, а композитор, в чьём присутствии проходило выступление, грозится исключить нашу страну из своего следующего турне. Это можно описать только как катастрофу!"
 elgar.317.g: "Международный позор!"
 elgar.318.t: "Скандальный концерт"
 elgar.318.d: "Скандальный концерт, который своими «современными» звуками просто взбудоражил публику, не только раскалывает общество, но и имеет юридические последствия."
 elgar.318.f: "В прессе того времени сообщалось о бурных беспорядках. Последователи композитора, его ученики и противники кричали друг на друга, бросались предметами, срывали выступление, ломали мебель и т. д. Несколько раз возмущённые консерваторы из зала с проклятиями взбирались на сцену, чтобы дать пощёчину дирижёру. Когда он пригрозил, что порядок будет наведён с помощью властей, говорят, начался настоящий переполох. Затем последовала пощёчина. В последующем судебном разбирательстве присутствовавший композитор оперетты заявил: «Звук пощёчины был самым мелодичным, что можно было услышать в тот вечер»."
 elgar.318.g: "Чернь ничего не смыслит в культуре. Это было превосходно!"
 elgar.318.h: "Немедленно снять произведение с репертуара."
 elgar.319.t: "Дух времени"
 elgar.319.d: "Современное произведение, которым сегодня лично дирижировал великий композитор, точно соответствует вкусу масс."
 elgar.319.f: "Иногда нужно просто быть удачливым."
 elgar.319.g: "Превосходно!"
 elgar.320.t: "Музыкальная пропаганда"
 elgar.320.d: "Некоторые правительственные политики подумывают, нельзя ли... позаимствовать музыку композитора, который в настоящее время у нас гостит, в пропагандистских целях."
 elgar.320.f: "Особенно с начала XX века и массового общества, породившего тоталитарные режимы того времени, преобладала идея сделать массы послушными с помощью музыки. В то время как некоторые музыканты даже в те времена сопротивлялись диктатуре, были и другие, которые прямо ставили своё творчество на службу идеологии или, по крайней мере, позволяли использовать свой талант в интересах политического направления."
 elgar.320.g: "Музыка должна быть свободна от политики."
 elgar.320.h: "Иногда музыка должна служить политике."
 elgar.321.t: "Великие композиторы среди своих"
 elgar.321.d: "Наш музыкальный гость встретился с великим композитором, работающим в нашей стране. В многочасовых беседах и прогулках они обменивались музыкальными мыслями и идеями."
 elgar.321.f: "Великие умы мыслят одинаково."
 elgar.321.g: "Историческая встреча."
 elgar.406.t: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName]: Смерть маэстро"
 elgar.406.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName], ведущий музыкальный деятель [GetPlayer.GetAltNameNoFlag('RU_CL_RP')], скоропостижно [SelectLocalization(GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.IsFemale, 'скончалась', 'скончался')] сегодня. Музыкальный мир скорбит об этой великой утрате."
 elgar.406.f: "«Стоя здесь, у могилы этого усопшего, мы, так сказать, являемся представителями целой нации, оплакивающей падение той высокочтимой половины, что осталась нам от исчезнувшего великолепия отечественного искусства и патриотического интеллектуального расцвета. Наследник и продолжатель бессмертной славы Генделя и Баха, Гайдна и Моцарта завершил свой жизненный путь, и мы стоим, плача у порванной струны угасшей игры.\nУгасшей игры! Позвольте мне так его назвать! Ибо он был художником, и тем, кем он был, он был только благодаря искусству», — Франц Грильпарцер."
 elgar.406.g: "Но кто же теперь напишет реквием?"
 elgar.411.t: "Превосходный концерт"
 elgar.411.d: "Концертный сезон под руководством нашего дирижёра проходит великолепно! [SCOPE.sCharacter('elgar_conductor').GetFullName] превзошёл все ожидания!"
 elgar.411.f: "«Публика должна быть строгой, должна освистывать, но её аплодисменты не должны меня ни к чему обязывать», — Джузеппе Верди."
 elgar.411.g: "Браво!"
 elgar.412.t: "Посредственный концерт"
 elgar.412.d: "Концертный сезон под руководством нашего дирижёра проходит как обычно. [SCOPE.sCharacter('elgar_conductor').GetFullName] пока не показал ничего выдающегося."
 elgar.412.f: "«Нельзя считать себя настолько божественным, чтобы не мочь время от времени улучшать свои собственные произведения», — Людвиг ван Бетховен."
 elgar.412.g: "*зевок*"
 elgar.413.t: "Плохой концерт"
 elgar.413.d: "Концертный сезон до сих пор был не просто ниже среднего; [SCOPE.sCharacter('elgar_conductor').GetFullName] в этом году особенно разочаровывает. Публика даже не просит выйти на бис..."
 elgar.413.f: "«После последних нот „Гибели богов“ я почувствовал, будто меня выпустили из тюрьмы», — Пётр Чайковский."
 elgar.413.g: "Бу-у-у!"
 elgar.414.t: "Посол в зале"
 elgar.414.f: "«Прелюдия к „Тристану и Изольде“ напоминает мне старинную итальянскую картину мученика, чьи кишки медленно наматывают на катушку», — Эдуард Ганслик."
 elgar.414.g: "Этот человек даже не знает, что такое музыка."
 elgar.414.h: "Наконец-то кто-то это сказал!"
 elgar.415.t: "Балет"
 elgar.415.d: "Сегодня состоялась премьера нового современного балетного произведения."
 elgar.415.f: "«Мне совсем не нравится сюжет „Щелкунчика“», — Пётр Чайковский."
 elgar.415.g: "Танцуют все!"
 elgar.416.t: "Музыка для кино"
 elgar.416.d: "Один из первых саундтреков к художественному фильму был записан сегодня под руководством нашего главного дирижёра."
 elgar.416.f: "«Музыка в кино должна относиться к кинодраме так же, как чья-то игра на пианино в моей гостиной относится к книге, которую я читаю», — Игорь Стравинский."
 elgar.416.g: "У меня давно был сюжет о археологе, ищущем Ковчег Завета, но потом его украли."
 elgar.417.t: "Концертный сезон завершается"
 elgar.417.d: "Последнее выступление концертного сезона подошло к концу. Отзывы уже в прессе. Похоже, [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] хорошо поработал[SelectLocalization(GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.IsFemale, 'а', '')] и [SelectLocalization(GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.IsFemale, 'добилась', 'добился')] признания. Говорят, что качество государственного оркестра значительно улучшилось, что повышает музыкальную репутацию нашей нации."
 elgar.417.f: "Композиторы, которые ещё не являются дирижёрами, могут приобрести навык дирижирования благодаря практике в конце концертного сезона. Не позднее чем после третьего сезона получение статуса дирижёра гарантировано. Это хороший способ обучить композиторов-невиртуозов, а затем отправить их на гастроли."
 elgar.417.g: "На бис!"
 elgar.421.d: "У нашего композитора сейчас сильный творческий кризис."
 elgar.422.t: "Прогулка"
 elgar.422.d: "Во время прогулки на природе [SCOPE.sCharacter('elgar_conductor').GetFullName] [SelectLocalization(SCOPE.sCharacter('elgar_conductor').IsFemale, 'нашла', 'нашёл')] вдохновение, которое помогло в работе."
 elgar.422.f: "Природа вдохновила уже многих композиторов. Бетховен уезжал в деревню и собирал там впечатления, которые позже вдохновили его на написание 6-й симфонии. Густав Малер даже построил себе небольшой домик для сочинения музыки."
 elgar.422.g: "По стопам Бетховена."
 elgar.423.t: "Недостаток комфорта"
 elgar.423.f: "Как только поручаешь артистам важную работу, они начинают выдвигать особые требования. Серьёзная публичная фигура быстро превращается в диву, если дать ей почувствовать свою важность. Не успеешь оглянуться, как слава вскружит этим людям головы."
 elgar.423.g: "Обеспечить ему комфорт"
 elgar.424.t: "Помехи"
 elgar.424.f: "Есть человек, который мешает жить [SCOPE.sCharacter('elgar_conductor').GetFullName]. Будь то поклонник или просто человек, который считает, что может получить политическое влияние, будучи особенно близким к известной публичной фигуре. Его можно было бы назвать груби. Помехи стали настолько сильными, что [SCOPE.sCharacter('elgar_conductor').GetLastName] жалуется на паранойю. К сожалению, «поклонник» — это высокопоставленная политическая фигура, публичное порицание которой имело бы понятные последствия."
 elgar.424.g: "Не мешайте ему!"
 elgar.424.h: "[SelectLocalization(SCOPE.sCharacter('elgar_conductor').IsFemale, 'Она должна', 'Он должен')] с этим справиться."
 elgar.431.t: "[SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_concerto_event_type')]"
 elgar.431.d: "После нескольких месяцев упорного труда и творческих поисков [SCOPE.sCharacter('elgar_conductor').GetFullName] сегодня [SelectLocalization(SCOPE.sCharacter('elgar_conductor').IsFemale, 'представила', 'представил')] своё новое творение — [SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_concerto_event_type')], лично встав за дирижёрский пульт."
 elgar.431.f: "Начиная с эпохи позднего барокко, концерт в основном понимается как инструментальное произведение, написанное для одного или нескольких солистов в сопровождении оркестра или другого ансамбля. Как жанр инструментальной музыки, первые произведения возникли из кончерто гроссо в начале XVIII века. Своё полное выражение он находит в классический период. Обычно он состоит из трёх частей, со медленной частью в середине."
 elgar.432.t: "[SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_symphony_event_type')]"
 elgar.432.d: "Сегодня в концертном зале состоится совершенно особенное представление. [SCOPE.sCharacter('elgar_conductor').GetFullName] представляет свою новую симфонию «[SCOPE.sCharacter('elgar_conductor').GetCharacter.GetCustom('elgar_composer_masterpiece_for_event_type')]», и высшее общество собралось, чтобы услышать её."
 elgar.432.f: "Симфония — это термин для инструментальных произведений различной формы и инструментовки на протяжении веков. Классическая форма симфонии сложилась в XVIII веке и занимала доминирующее положение в области оркестровой музыки вплоть до XX века. Это произведение, состоящее из нескольких (обычно трёх или четырёх, реже пяти) частей для оркестра без солистов. Начиная с 9-й симфонии Людвига ван Бетховена, иногда появляются и вокальные партии (солисты и/или хор), например, у Густава Малера, хотя роль оркестра остаётся доминирующей."
 elgar.433.t: "[SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_opera_event_type')]"
 elgar.433.d: "Опера «[SCOPE.sCharacter('elgar_conductor').GetCustom('elgar_composer_masterpiece_for_opera_event_type')]», над которой маэстро [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.IsFemale, 'трудилась', 'трудился')] много недель и месяцев, считается новой вершиной в творчестве этого гения. Грядущая премьера обещает стать большим успехом."
 elgar.433.f: "Опера — это музыкальный театральный жанр, возникший в эпоху барокко. Опера состоит из музыкального оформления драматической поэмы, исполняемого ансамблем певцов, сопровождающим оркестром, а иногда и хором и балетной труппой. Помимо пения, актёры играют и танцуют на театральной сцене, оформленной с помощью живописи, архитектуры, реквизита, освещения и сценической техники. Роли актёров визуально иллюстрируются масками и костюмами. Родоначальником оперы считается Клаудио Монтеверди, установивший стандарты своим «Орфеем». В XIX веке новые стандарты в опере установил Рихард Вагнер."
 elgar.440.t: "Народная музыка"
 elgar.440.d: "Путешествуя по сельским районам страны, [SCOPE.sCharacter('elgar_conductor').GetFullName] проявил[SelectLocalization(SCOPE.sCharacter('elgar_conductor').IsFemale, 'а', '')] большой интерес к изучению, записи и сбору танцев и песен местного населения."
 elgar.440.f: "Национализм XIX века привёл к тому, что многие ранее презираемые формы музыки внезапно вызвали интерес, поскольку они якобы отражали национальную душу страны. Местные историки и музыканты собирали традиционные песни. Некоторые композиторы также черпали вдохновение у народа и совершенно по-новому перекладывали их на музыку."
 elgar.440.g: "Интересная музыкальная коллекция."
 elgar.440.h: "Пусть [SCOPE.sCharacter('elgar_conductor').GetLastName] сосредоточится на высокой культуре, а не на музыке для шарманки."
 elgar.441.t: "Матросская песня"
 elgar.441.d: "[SelectLocalization(SCOPE.sCharacter('elgar_conductor').IsFemale, 'Вдохновлённая', 'Вдохновлённый')] подвигами, которые совершил адмирал [SCOPE.sCharacter('elgar_admiral').GetLastName], наш композитор [SCOPE.sCharacter('elgar_conductor').GetFullName] между делом написал[SelectLocalization(SCOPE.sCharacter('elgar_conductor').IsFemale, 'а', '')] небольшую матросскую песню."
 elgar.441.f: "Изначальное практическое назначение шанти как рабочей песни всегда было первостепенным среди моряков. Лингвистические и музыкальные аспекты, с другой стороны, почти не играли роли. С началом промышленной революции понадобились более быстрые корабли. Пузатые ост-индские корабли исчезли, их заменили клиперы и фрегаты. Это в конечном итоге привело к тому, что шанти постепенно утратили своё практическое применение в мореплавании и стали петься только для досуга и развлечения. Музыканты собирали старые матросские песни или вдохновлялись ими для создания собственных произведений."
 elgar.441.g: "Йо-хо-хо!"
 elgar.442.t: "Марш"
 elgar.442.d: "[SelectLocalization(SCOPE.sCharacter('elgar_conductor').IsFemale, 'Вдохновлённая', 'Вдохновлённый')] ценностями, которыми обладает генерал [SCOPE.sCharacter('elgar_general').GetFullName], наш композитор [SCOPE.sCharacter('elgar_conductor').GetFullName] написал[SelectLocalization(SCOPE.sCharacter('elgar_conductor').IsFemale, 'а', '')] новый военный марш."
 elgar.442.f: "Марш процветал особенно в XIX и начале XX веков с их националистическими и милитаристскими тенденциями и революциями. Примером тому служит Джоаккино Россини, который не только регулярно включал пышные марши в свои оперы, но и сочинил ряд произведений для отдельных монархов: в том числе заказное произведение для турецкого султана Абдул-Меджида I («Марш для султана»), которое до сих пор регулярно исполняется итальянскими военными оркестрами. Также показательным для тенденций XIX века является творчество семьи Штраусов в Вене, которые сочиняли марш при каждой удобной возможности, чтобы продемонстрировать патриотизм или верность императору, или чтобы почтить военных деятелей."
 elgar.442.g: "Новый материал для армии."
 elgar.443.t: "Романс"
 elgar.443.d: "На стихи великого поэта [SCOPE.sCharacter('elgar_conductor').GetFullName] в качестве побочного произведения написал[SelectLocalization(SCOPE.sCharacter('elgar_conductor').IsFemale, 'а', '')] романс."
 elgar.443.f: "В западной классической музыкальной традиции Lied — это термин для переложения поэзии на классическую музыку с целью создания полифонического произведения. В современном немецком языке этот термин используется для любого вида песни, но среди англо- и франкоговорящих Lied часто используется как синоним «художественной песни», охватывая и произведения, вдохновлённые этой традицией на других языках. Стихи, положенные на музыку, часто посвящены пасторальным темам или темам романтической любви."
 elgar.443.g: "Неужели нельзя было что-то другое...?"
 elgar.444.t: "Фортепианная соната [SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_chord_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_custom_music_major_minor_name')]"
 elgar.444.d: "Фортепианные пьесы являются частью стандартного репертуара классической музыки. В качестве разминки перед следующим крупным произведением [SCOPE.sCharacter('elgar_conductor').GetFullName] написал[SelectLocalization(SCOPE.sCharacter('elgar_conductor').IsFemale, 'а', '')] сонату и исполнил[SelectLocalization(SCOPE.sCharacter('elgar_conductor').IsFemale, 'а', '')] её вчера вечером на небольшой вечеринке."
 elgar.444.f: "В начале XIX века сонатная форма была определена на основе сочетания предшествующей практики и произведений выдающихся композиторов-классиков, в частности Гайдна, Моцарта, Бетховена, а также таких композиторов, как Клементи. Именно в этот период различия между трёх- и четырёхчастными циклами стали предметом обсуждения, с акцентом на то, что концерт имеет трёхчастную структуру, а симфония — четырёхчастную. Среди произведений, прямо обозначенных как сонаты для фортепиано, — три сонаты Фредерика Шопена, сонаты Феликса Мендельсона, три сонаты Роберта Шумана, соната си-минор Ференца Листа, а позже — сонаты Иоганнеса Брамса и Сергея Рахманинова."
 elgar.444.g: "Классика."
 elgar.445.t: "Трактат о музыке"
 elgar.445.d: "В последние месяцы [SCOPE.sCharacter('elgar_conductor').GetFullName] много работал[SelectLocalization(SCOPE.sCharacter('elgar_conductor').IsFemale, 'а', '')] над новым трактатом по оркестровке и изучению музыкальных инструментов. Трактат считается вкладом в музыкальные инновации."
 elgar.445.f: "«Требуется много времени, чтобы найти океаны музыки, но ещё больше — чтобы научиться по ним плавать», — Гектор Берлиоз."
 elgar.445.g: "Важный теоретический труд."
 elgar.446.t: "Реквием"
 elgar.446.d: "[SCOPE.sCharacter('elgar_conductor').GetFullName] недавно получил просьбу, от влиятельного представителя католического духовенства, написать новое произведение после смерти уважаемого епископа."
 elgar.446.f: "Литургическая форма заупокойной мессы — это реквием. Этот термин описывает как литургию Святой Мессы на панихиде в католической церкви, так и церковные музыкальные композиции для поминовения усопших. Он происходит от инципита интроита Requiem aeternam dona eis, Domine («Вечный покой даруй им, Господи»). Проприй литургии реквиема соответствует проприю Дня всех усопших. Как первая часть музыкальной мессы, интроит обычно был положен на музыку композиторами, как и офферторий, в отличие от секвенции, которая иногда по разным причинам сокращается или опускается полностью. Gloria и Credo в реквиеме не положены на музыку, поскольку они не поются и не произносятся в литургии заупокойной мессы."
 elgar.446.g: "Requiem aeternam dona eis, Domine."
 elgar.447.t: "Дерзкая опера"
 elgar.447.d: "[SCOPE.sCharacter('elgar_conductor').GetFullName] встретил критику своего последнего произведения, со стороны цензурных органов. Оно, безусловно, имеет высокую художественную ценность, но может вызвать волнения. Интеллигенция страны уже на взводе."
 elgar.447.f: "На протяжении большей части XIX века даже величайшие композиторы своего времени должны были подчиняться цензуре. Множество различных постановок «Фигаро» считались крайне критическими из-за революционной темы. Подозрения в богохульстве или другой безнравственности также были занозой для цензоров. В определённый момент некоторые композиторы не выдерживали притеснений и покидали своих покровителей."
 elgar.447.g: "Искусство должно возвышать, а не вызывать волнения."
 elgar.447.h: "Нам следует немного ослабить цензуру."
 elgar.448.t: "Дуэль композиторов"
 elgar.448.d: "Композитор из [SCOPE.sCountry('rival_composer_country_scope').GetAltNameNoFlag('RU_CL_RP')], [SCOPE.sCharacter('rival_composer_scope').GetFullName], в припадке типичного для этой страны высокомерия, назвал[SelectLocalization(SCOPE.sCharacter('rival_composer_scope').IsFemale, 'а', '')] нашего композитора [GetPlayer.MakeScope.Var('elgar_composer_var').GetFullName] «никому не известной личностью» и поставил[SelectLocalization(SCOPE.sCharacter('rival_composer_scope').IsFemale, 'а', '')] под сомнение музыкальный статус нашей нации."
 elgar.448.f: "«Фрагментарность и произвольность нашего музыкального стиля были, если не вызваны, то, по крайней мере, доведены до высшей точки стараниями Мендельсона выразить неясное, почти бессмысленное содержание как можно интереснее и ослепительнее. В то время как последний в цепи наших истинных музыкальных героев, Бетховен, обладал высочайшим желанием и чудесной способностью к яснейшему, наиболее точному выражению невыразимого содержания через чётко очерченные, пластичные звуковые образы, Мендельсон, с другой стороны, размывает эти приобретённые фигуры в своих произведениях в растворяющийся, фантастический теневой образ, чьё неопределённое мерцание красок произвольно стимулирует наше причудливое воображение, но наше чисто человеческое внутреннее стремление к ясному художественному видению едва ли затрагивается лишь надеждой на исполнение», — Рихард Вагнер о Феликсе Мендельсоне."
 elgar.448.g: "Мы принимаем вызов."
 elgar.448.h: "Нам не выстоять в этой дуэли."
 elgar.449.t: "Победа в дуэли композиторов"
 elgar.449.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] показал[SelectLocalization(GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.IsFemale, 'а', '')] себя гораздо более известным и способным композитором, чем его елейный соперник, тем самым сохранив репутацию нашей нации как культурного центра."
 elgar.449.f: "«Ничто не показывает так ясно силу Вагнера и тот вид бури и натиска, который он развязал, как этот декаданс, который его творчество фактически освятило и который с тех пор развивался быстрыми темпами. Каким же могущественным должен был быть этот человек, чтобы с такой энергией разрушить по существу музыкальную форму (оперу), что через пятьдесят лет после его смерти мы всё ещё спотыкаемся о мусор и грохот музыкальной драмы! Ибо престиж синтеза искусств всё ещё жив. Это ли называется прогрессом? Возможно. Если только композиторы не найдут в себе силы сбросить это тяжёлое наследие, повинуясь восхитительному предписанию Верди: „Вернёмся к старым временам, и это будет прогресс“», — Игорь Стравинский о Рихарде Вагнере."
 elgar.449.g: "Теперь ясно, какая страна является доминирующей культурной нацией!"
 elgar.450.t: "Поражение в дуэли композиторов"
 elgar.450.d: "К сожалению, наш композитор потерпел поражение от своего иностранного соперника в соревновании. Весь мир теперь убеждён, что мы отстали в музыкальном плане!"
 elgar.450.f: "«Вагнер — человек ли? Не болезнь ли он скорее? Он делает больным всё, к чему прикасается, — он сделал больной музыку», — Фридрих Ницше о Рихарде Вагнере."
 elgar.450.g: "Теперь ясно, какая страна является доминирующей культурной нацией..."
 elgar.451.t: "Маэстро отправляется в [SCOPE.sCountry('elgar_composer_destination_scope').GetNameNoFlag]"
 elgar.451.d: "Наш композитор [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] завершил[SelectLocalization(GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.IsFemale, 'а', '')] все приготовления. Первым пунктом назначения двух с половиной годичного концертного турне станет [SCOPE.sCountry('elgar_composer_destination_scope').GetName]."
 elgar.451.f: "«Если когда-нибудь наступит конец света, я поеду в Вену, потому что там всё происходит на пятьдесят лет позже», — Густав Малер."
 elgar.451.g: "Пришлите нам открытку!"
 elgar.452.t: "[SCOPE.sCharacter('elgar_composer_scope').GetLastName] прибывает в [GetPlayer.GetAltNameNoFlag('RU_CL_VP')]"
 elgar.452.d: "Странствующий композитор остановился в нашей стране во время своего нынешнего турне и решил остаться на некоторое время."
 elgar.452.f: "[SCOPE.sCharacter('elgar_composer_scope').GetCustom('elgar_composer_achievements_switch_to_character_scope_type')]"
 elgar.452.g: "Добро пожаловать!"
 elgar.453.t: "Странствующий композитор уезжает"
 elgar.453.d: "После нескольких недель пребывания и нескольких выступлений, которые принесли ему признание местного населения, странствующий композитор продолжил своё турне."
 elgar.453.f: "Пункт назначения композитора зависит от целого ряда факторов. Решающим критерием являются оперные театры и близость к последнему месту пребывания. Но также играют роль такие факторы, как культурные технологии, наличие центра искусств (импрессионизм, экспрессионизм, ар-нуво) или существование консерватории. Композиторы избегают мест, где недавно состоялось выступление композитора-соперника."
 elgar.453.g: "Надеемся скоро снова вас увидеть!"
 elgar.455.t: "Композитор возвращается из турне"
 elgar.455.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] [SelectLocalization(GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.IsFemale, 'вернулась', 'вернулся')] из своего турне. [SelectLocalization(GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.IsFemale, 'Она оставила', 'Он оставил')] свой след в музыкальном мире и значительно улучшил[SelectLocalization(GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.IsFemale, 'а', '')] репутацию."
 elgar.455.f: "Турне существуют исключительно для повышения репутации композитора. В зависимости от способностей композитора результат будет разным. Играют роль ваши собственные сочинения, а также черты характера — у новаторских или амбициозных персонажей есть преимущества. Композиторы, обладающие чертами дирижёра и виртуоза, получают особый бонус."
 elgar.455.g: "С возвращением, маэстро."
 elgar.501.t: "Песнь итальянцев"
 elgar.501.d: "В обстановке народной борьбы за объединение и независимость Италии 20-летний студент и патриот Гоффредо Мамели написал вдохновляющую песню, назвав её «Песнь итальянцев». За короткое время она стала очень популярной."
 elgar.501.f: "«Песнь итальянцев» (Il Canto degli Italiani) наиболее известна среди итальянцев как «Гимн Мамели» (Inno di Mameli), по имени автора текста, или «Братья Италии» (Fratelli d'Italia), по первой строке. Музыку на текст написал Микеле Новаро. Гимн пользовался широкой популярностью в период Рисорджименто и в последующие десятилетия. Его также печатали на листовках в Генуе и опубликовали 10 декабря: демонстрация была официально посвящена 101-й годовщине изгнания австрийских властей из города — на самом деле это был предлог для протеста против иностранных оккупаций в Италии и для того, чтобы побудить Карла Альберта принять итальянское дело свободы. По этому случаю был показан триколор, и гимн Мамели был впервые публично исполнен."
 elgar.501.g: "Против этого должен быть закон..."
 elgar.501.h: "Fratelli d'Italia, l'Italia s'è desta!"
 elgar.503.t: "Песнь немцев"
 elgar.503.d: "В ответ на возобновившееся стремление Франции к экспансии, которая рассматривает Рейн как естественную границу, поэт Гофман фон Фаллерслебен написал песню, широко известную как «Песнь немцев»."
 elgar.503.f: "«Песнь немцев», также известная как Deutschlandlied, была написана Августом Генрихом Гофманом фон Фаллерслебеном на Гельголанде. Конкретной причиной для написания песни послужили территориальные претензии Франции на Рейнскую область во время Рейнского кризиса. В песне он отверг эти претензии, как это было и в других немецких рейнских песнях того времени. Он дополнил это другими идеями, в частности идеей единства Германии, которое одно могло бы обеспечить предпосылку для защиты от вражеских атак любого масштаба. Поэт создал своё произведение специально на мелодию старого имперского гимна «Боже, храни Франца-императора» Йозефа Гайдна (1797 г.). Большее значение песня приобрела только во время Первой мировой войны. Её третья строфа стала текстом национального гимна Германии с 1952 года."
 elgar.503.g: "Немецкое вино и немецкая песня!"
 elgar.503.h: "Германия, Германия превыше всего!"
 elgar.503.i: "Вы, должно быть, ошибаетесь, песня называется „Gott erhalte Franz den Kaiser“."
 elgar.504.t: "Смерть Паганини"
 elgar.504.d: "Смерть знаменитого скрипача-виртуоза Никколо Паганини вызвала споры вокруг его похорон."
 elgar.504.f: "Никколо Паганини — итальянский скрипач и композитор. Он был самым знаменитым скрипачом-виртуозом своего времени и оставил свой след как один из столпов современной скрипичной техники. Его 24 каприса для скрипки соло, соч. 1, являются одними из самых известных его произведений и послужили вдохновением для многих выдающихся композиторов. В мае 1840 года епископ Ниццы послал к Паганини местного приходского священника для совершения последнего обряда. Паганини посчитал, что таинство преждевременно, и отказался. Неделю спустя, 27 мая 1840 года, 57-летний Паганини умер от внутреннего кровотечения, прежде чем удалось позвать священника. Из-за этого и его широко распространённых слухов о связи с дьяволом, церковь отказала ему в католическом погребении в Генуе. Это привело к общественной дискуссии о том, как поступить с Паганини. Звучат голоса в пользу оказания давления на церковь и погребения Паганини в Генуе, как подобает его статусу, и присвоения его наследия. Однако это привело бы к открытому спору с церковными властями."
 elgar.504.g: "Обеспечить ему достойные похороны и сохранить его наследие."
 elgar.504.h: "Не вмешиваться в это деликатное дело."
 elgar.505.t: "Набукко"
 elgar.505.d: "Джузеппе Верди добился самого большого успеха в своей карьере со своей последней оперой. В то же время она разжигает национальные чувства итальянского народа."
 elgar.505.f: "«Набукко» — опера на итальянском языке в четырёх действиях, написанная в 1841 году Джузеппе Верди на итальянское либретто Темистокле Солера. Самый известный номер из оперы — «Хор еврейских рабов», который сегодня регулярно исполняется на бис во многих оперных театрах. «Набукко» — это опера, которая, как считается, окончательно утвердила репутацию Верди как композитора. Он комментировал, что «это опера, с которой по-настоящему начинается моя артистическая карьера. И хотя мне пришлось бороться со многими трудностями, несомненно, „Набукко“ родился под счастливой звездой». История о пленении евреев в Вавилонии стала прорывом по всей Италии, не в последнюю очередь потому, что итальянцы в эпоху национализма чувствовали себя под властью иностранных держав. Насколько Верди на самом деле служил итальянским национальным чувствам в «Набукко», до сих пор остаётся спорным вопросом."
 elgar.505.g: "Va pensiero ..."
 elgar.505.h: "Опять эти мятежные итальянцы."
 elgar.507.t: "Аида"
 elgar.507.d: "По случаю открытия Суэцкого канала Джузеппе Верди с небольшой задержкой представил премьеру своей оперы «Аида» с египетским колоритом."
 elgar.507.f: "«Аида» — опера в четырёх действиях Джузеппе Верди на итальянское либретто Антонио Гисланцони, основанная на сценарии, который часто приписывают французскому египтологу Огюсту Мариетту, хотя утверждалось, что сценарий на самом деле был написан Темистокле Солера. Исмаил-паша, хедив Египта, заказал Верди оперу, заплатив ему 150 000 франков, но премьера была отложена. «Аида» была встречена с большим успехом, когда наконец состоялась премьера в Каире. Костюмы и аксессуары для премьеры были разработаны Огюстом Мариеттом, и он руководил проектированием и созданием декораций, которые были изготовлены в Париже и отправлены в Каир. Хотя Верди не присутствовал на премьере в Каире, он был очень недоволен тем, что аудитория состояла из приглашённых сановников, политиков и критиков, но не из широкой публики. Поэтому он считал итальянскую (и европейскую) премьеру, состоявшуюся в Ла Скала в Милане, в которой он принимал активное участие на всех этапах, её настоящей премьерой."
 elgar.507.g: "Триумф для Италии!"
 elgar.507.h: "Триумф для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
 elgar.509.t: "Франц Шуберт"
 elgar.509.d: "Через 13 лет после его смерти 5-я симфония Франца Шуберта была представлена широкой публике."
 elgar.509.f: "Пятая симфония си-бемоль мажор — пожалуй, самая совершенная из его юношеских симфоний и по праву считается первой «зрелой» симфонией Шуберта. Её разработка отличается камерным совершенством, поскольку инструментовка меньше, чем в любой другой симфонии, а её пропорции тонко выверены. Её можно понимать как продуктивное осмысление Шубертом симфонического творчества Моцарта, и она раскрывает полную самобытность и независимость Шуберта. Согласно собственным записям Шуберта на партитуре, произведение было написано между сентябрём и 3 октября 1816 года; оно было написано в то время, когда Шуберт искал свой собственный музыкальный язык. Первое исполнение 5-й симфонии Шуберта состоялось с небольшим любительским оркестром в Вене в 1816 году; первое же публичное исполнение состоялось лишь 17 октября 1841 года, через тринадцать лет после смерти Шуберта, под управлением Михаэля Ляйтермайера."
 elgar.509.g: "Даже с небес Шуберт радует нас своей музыкой."
 elgar.510.t: "Спор вокруг «Полиевкта»"
 elgar.510.d: "Непримиримый спор между королём и композитором Доницетти грозит его увольнением."
 elgar.510.f: "С 1829 по 1838 год Гаэтано Доницетти был музыкальным руководителем Королевских театров Неаполя и, несмотря на поездки и заказы в других государствах, де-факто являлся самой важной культурной фигурой королевства и его самым известным представителем. Целый ряд знаменитых опер Доницетти был написан в Неаполе, что укрепило положение Королевства Обеих Сицилий как музыкального центра высшего ранга. Но, несмотря на многочисленные успехи, Доницетти приходилось снова и снова бороться с неаполитанской цензурой, которая искажала его либретто или отменяла целые оперы. В последнем споре сам король вмешался, чтобы предотвратить постановку оперы «Полиевкт». После многих лет ссор с цензурой Доницетти устал и приготовился бежать в Париж. Политическая элита объединилась вокруг короля; помешать Доницетти в его планах означало бы не только нарушить политический и социальный ландшафт, но и нанести огромный ущерб авторитету и репутации короля."
 elgar.510.g: "Король сказал своё слово, пусть собирает вещи."
 elgar.510.h: "Мы должны сделать всё, чтобы не дать Доницетти уехать!"
 elgar.511.t: "«Мученики», 1840"
 elgar.511.d: "Итальянский композитор Гаэтано Доницетти добрался до Парижа и исполнил там свою оперу «Мученики», которая была чрезвычайно хорошо принята публикой."
 elgar.511.f: "«Полиевкт» — трагическая опера (tragedia lirica) в трёх действиях Гаэтано Доницетти на итальянское либретто Сальваторе Каммарано, основанное на пьесе Пьера Корнеля «Полиевкт», написанной в 1641/42 годах. Она отражает жизнь раннехристианского мученика святого Полиевкта. Считающаяся одним автором «самой личной оперой» Доницетти, с музыкой, являющейся «одной из лучших, что Доницетти когда-либо сочинял», «Полиевкт» был написан в 1838 году для постановок, запланированных в театре Сан-Карло в Неаполе позже в том же году. Однако незадолго до начала репетиций король Фердинанд II отказался разрешить изображение мученичества христианского святого на сцене и запретил постановку. Разгневанный решением и имея заказ для Парижской оперы, Доницетти заплатил неустойку театру Сан-Карло за то, что не представил оригинальное произведение в качестве замены, и покинул Неаполь, отправившись в Париж. В качестве своего первого заказа для Парижа он решил переработать «Полиевкта», и между 1839-40 годами был написан французский текст под названием «Мученики»."
 elgar.511.g: "Неплохо для итальянца."
 elgar.512.t: "Stabat Mater"
 elgar.512.d: "Гаэтано Доницетти посещает Болонью, чтобы дирижировать премьерой Stabat Mater Джоаккино Россини. Выступление имело полный успех."
 elgar.512.f: "Когда Доницетти отправился в Болонью для Stabat Mater, Россини присутствовал на третьем представлении, и эти двое — оба бывшие студенты Болонской консерватории — встретились впервые, причём Россини заявил, что Доницетти — «единственный маэстро в Италии, способный дирижировать моим Stabat так, как я бы этого хотел». Друзья, включая его зятя, Антонио Васселли (известного как Тото), постоянно пытались убедить его занять академическую должность в Болонье, а не при венском дворе, хотя бы потому, что это дало бы композитору базу для работы и преподавания и избавило бы его от постоянного истощения от поездок между городами. Доницетти сообщил о реакции публики: «Энтузиазм невозможно описать. Даже на генеральной репетиции, на которой присутствовал Россини, в середине дня его проводили до дома под крики более 500 человек. То же самое в первую ночь, под его окном, поскольку он не появился в зале»."
 elgar.512.g: "Россини и Доницетти — союз, заключённый на небесах!"
 elgar.513.t: "Доницетти сходит с ума?"
 elgar.513.d: "Всё более быстрое ухудшение психического состояния Доницетти привело к тому, что его поместили в сумасшедший дом в Париже."
 elgar.513.f: "Доницетти в своих письмах на протяжении долгого времени, начиная с 1820-х годов, сообщал о головных болях, иногда приступах лихорадки, которые длились всего один день, а также о периодических депрессивных настроениях. Необычайный объём работы, который он выполнял на протяжении всей своей жизни, а также долгие и особенно утомительные в то время путешествия, особенно после его переезда в Париж, а затем в Вену, привели к усилению симптомов истощения с 1842 по 1843 год. Периодические головные боли и приступы лихорадки сопровождались головокружением и иногда «ощущениями в голове». В 1845 году здоровье Доницетти резко ухудшилось, и он упал на улице в Париже. Врачи запретили ему сочинять, что ещё больше его удручало. Наконец, под ложным предлогом его обманом заманили в сумасшедший дом в Иври-сюр-Сен без его ведома и против его воли и насильно поместили туда. Больной композитор быстро осознал своё положение «пленника» и классификацию как «маньяка» и писал отчаянные и душераздирающие письма друзьям и родственникам с просьбой о помощи."
 elgar.513.g: "Может, так и лучше."
 elgar.513.h: "Вытащить его из сумасшедшего дома и дать ему отдохнуть в Бергамо."
 elgar.514.f: "Прошло целых 17 месяцев, прежде чем Доницетти удалось спасти из психиатрической лечебницы. Запланированный отъезд был предотвращён врачами, а также префектом полиции Парижа по непонятным причинам. Только с помощью дипломатического давления его брату Франческо и племяннику Андреа удалось вернуть теперь уже совершенно апатичного композитора. Дочь баронессы Розы Рота-Базони каждый день играла для композитора на фортепиано и пела арии из его произведений, его друг Дольчи говорил с ним на бергамском диалекте, и его посетил тенор Рубини, но Доницетти больше не проявлял никаких реакций. Доницетти умер через неделю после апоплексического удара с гемиплегией, высокой температурой и последующими инфекциями. Результаты вскрытия показали симптомы «перенесённого» менингита и частично повреждённый, воспалённый спинной мозг."
 elgar.514.g: "Трагическая смерть."
 elgar.515.t: "Доницетти исцелён"
 elgar.515.d: "Композитор выздоровел после интенсивного курса лечения и хочет сочинять с новой жаждой жизни."
 elgar.515.f: "Под давлением нашего правительства Доницетти был быстро выписан из сумасшедшего дома. По предписанию врачей он должен был пройти многомесячный курс лечения в своём родном городе Бергамо в наилучших возможных условиях. Возвращение к деревенской жизни, свобода от стресса и давления, а также возвращение к корням принесли свои плоды через много месяцев. Доницетти, который неделями был апатичен, отреагировал на одну из своих арий, спетую Джованной, дочерью баронессы Розы Рота-Базони. Разговоры с членами семьи на местном диалекте также показывали прогресс день ото дня. После многих лет терапии некогда смертельно больной композитор, кажется, вернулся к жизни."
 elgar.515.g: "Медицинское чудо."
 elgar.516.t: "Лист против Тальберга"
 elgar.516.d: "Два самых знаменитых пианиста соревновались друг с другом в Париже: Ференц Лист бросил вызов самому важному из ныне живущих пианистов, Сигизмунду Тальбергу."
 elgar.516.f: "Зимой 1835/36 года Сигизмунд Тальберг дебютировал на частном концерте, устроенном секретарём австрийского посольства в Париже. Присутствовавшие артисты, включая Россини и Мейербера, встретили его с восторгом и хвалили как изобретателя нового стиля игры на фортепиано. В то время как концерты Ференца Листа в Лионе приносили около 500-600 франков, Тальберг заработал 10 000 франков за один концерт в Итальянском театре. Прежде чем Тальберг появился во время своего второго пребывания в Париже, Лист опубликовал рецензию, полную инсинуаций и полемики. По словам Листа, успех Тальберга был достигнут исключительно за счёт пропаганды. Тальберг снова появился в Париже с февраля 1837 года и снова был встречен овациями. 31 марта оба артиста выступили на благотворительном мероприятии, организованном княгиней Бельджойозо."
 elgar.516.g: "Тальберг был лучше."
 elgar.516.h: "Лист был лучше."
 elgar.517.t: "От колыбели до могилы"
 elgar.517.d: "В Риме Ференц Лист завершил свою последнюю симфоническую поэму. Музыкальное сообщество не знает, что и думать о последней «ошибке» этого композитора."
 elgar.517.f: "В последние годы своей жизни Лист всё больше обращался к духовной и церковной музыке. Поэтому его последняя симфоническая поэма, «От колыбели до могилы», отличалась от всех своих предшественниц. Лист был вдохновлён рисунком венгерского художника Михая Зичи. Большие части произведения не требуют мощного оркестра, особенно начало звучит как камерная музыка; образуется много звуковых островков, в которых музыкальный материал беден, и нередки сольные пассажи, особенно в конце частей. Используемые гармонии также являются предвестниками грядущих времён. Однако при жизни музыкальные критики оценили произведение как «ошибку старика»."
 elgar.517.g: "Следующие поколения поймут."
 elgar.518.t: "Лоэнгрин"
 elgar.518.d: "Премьера «Лоэнгрина» Рихарда Вагнера не только собрала полный зал, но и вызвала в Германии настоящее восхищение Вагнером."
 elgar.518.f: "«Лоэнгрин» — романтическая опера в трёх действиях немецкого композитора Рихарда Вагнера. С «Лоэнгрином» Вагнер создал новую оперную форму сквозной музыкальной драмы. Композиция не разделена на отдельные номера, а играется по действиям без перерыва. Таким образом, Вагнер отходит от традиционной структуры номерных опер с ариями, речитативами и хоровыми партиями. Чтобы иметь возможность перевести внутренний мир сценических персонажей в чётко читаемые музыкальные мотивы, Вагнер использовал лейтмотивы (например, мотив Грааля и мотив запрета на вопросы). Опера вдохновила на создание других произведений искусства. Король Баварии Людвиг II назвал свой замок Нойшванштайн в честь Рыцаря-лебедя."
 elgar.518.g: "Вдохновляюще."
 elgar.519.t: "Произведение искусства будущего"
 elgar.519.d: "Во время своего пребывания в Швейцарии композитор Рихард Вагнер написал многочисленные трактаты о музыке и искусстве, которые должны были стать новаторскими для немецкого и международного понимания эстетики."
 elgar.519.f: "«Произведение искусства будущего» — это искусствоведческие сочинения Рихарда Вагнера, которые он написал между 1849 и 1852 годами в Цюрихе. Как и в своём сочинении «Искусство и революция», Вагнер сетует на упадок искусств и развивает свою модель нового единства искусств, «гезамткунстверк». Как и в своих предыдущих работах, Вагнер развивал своё убеждение в том, что греческое искусство было встроено в греческую религию и мистику и что с разрушением религии искусство также потеряло свою сплочённость и должно было выродиться в «отдельные искусства» (драма, музыка и танец). Он жалуется, что музыкальное искусство как чистое сопровождение слова увяло. В дальнейшем ходе своих рассуждений он очень подробно останавливается на развитии различных искусств, от идеального состояния в античности до упадка его времени. В своём следующем и самом важном письменном труде, «Опера и драма», Рихард Вагнер затем очень точно (и очень теоретически) объясняет, как он представляет себе оптимальное «единение» музыки и поэзии. Немного позже он приступил к «практическому» исполнению и после многих лет работы написал и сочинил своё «Кольцо нибелунга» как музыкальную драму в чистом виде."
 elgar.519.g: "Кто вообще должен понимать эти трудночитаемые вложенные предложения?"
 elgar.520.t: "Тристан и Изольда"
 elgar.520.d: "«Тристан и Изольда» — опера в трёх действиях Рихарда Вагнера на немецкое либретто композитора, основанное в основном на рыцарском романе XII века «Тристан и Изольда» Готфрида фон Страсбурга. Опера оказала огромное влияние на западных классических композиторов и послужила прямым источником вдохновения для таких композиторов, как Густав Малер, Рихард Штраус, Альбан Берг, Арнольд Шёнберг и Бенджамин Бриттен. Другие композиторы, такие как Клод Дебюсси, Морис Равель и Игорь Стравинский, формировали свои стили в противовес музыкальному наследию Вагнера. Многие видят в «Тристане» веху на пути отхода от общепринятой гармонии и тональности и считают, что он закладывает основу для направления классической музыки в XX веке."
 elgar.520.f: "«Произведение, которое всегда вызывало у меня наибольшее восхищение, — это „Тристан“. Трепетное изумление охватывает меня перед этим гигантским зданием, и мне до сих пор кажется невероятным, как человек мог его замыслить и воплотить. Я считаю второй акт одним из самых возвышенных творений духа, когда-либо созданных. Этот второй акт чудесен, чудесен, невыразимо чудесен», — Джузеппе Верди."
 elgar.521.t: "Фестиваль Рихарда Вагнера"
 elgar.521.d: "Учреждение Фестивального театра Рихарда Вагнера считается одним из ярчайших событий музыкальной культуры XIX века."
 elgar.521.f: "Байройтский фестиваль — это музыкальный фестиваль, который проводится ежегодно и на котором представляются оперы немецкого композитора XIX века Рихарда Вагнера. Вагнер сам задумал и продвигал идею специального фестиваля для демонстрации своих собственных произведений, в частности, своего монументального цикла «Кольцо нибелунга» и «Парсифаля». Спектакли проходят в специально спроектированном театре — Байройтском фестивальном театре. Вагнер лично руководил проектированием и строительством театра, в котором было много архитектурных новшеств, чтобы вместить огромные оркестры, для которых писал Вагнер, а также соответствовать особому видению композитора о постановке его произведений. Фестиваль стал местом паломничества для вагнерианцев и любителей классической музыки. На этом уникальном музыкальном событии присутствовали кайзер Вильгельм, император Бразилии Педру II, король Людвиг и другие представители знати, а также философ Фридрих Ницше и такие выдающиеся композиторы, как Антон Брукнер, Эдвард Григ, Пётр Чайковский, Ференц Лист и молодой Артур Фут."
 elgar.521.g: "Вершина немецкой культуры!"
 elgar.523.t: "Скандал с «Тангейзером»"
 elgar.523.d: "Постановка «Тангейзера» Рихарда Вагнера вызвала настоящий скандал, возмутивший всё парижское общество. Помимо нарушения Вагнером правил французской оперной жизни, роль сыграла и вражда между немецким и французским музыкальными мирами."
 elgar.523.f: "Вагнеру всегда было трудно в Париже, не только из-за его конкуренции с популярным Джакомо Мейербером. Чтобы поставить свою оперу «Тангейзер» в Гранд-опера, ему пришлось подчиниться французским обычаям, таким как включение балета. Но Вагнер яростно сопротивлялся требованиям и включил только вакханалию. В то же время Вагнер сделал себя непопулярным среди музыкантов мучительно долгими репетициями. Премьера вызвала скандал: господа из парижского «Жокей-клуба» почувствовали себя обманутыми, когда после увертюры не появился балет. Господа пришли не из-за музыки, а чтобы посмотреть на красивых женщин и позже навестить их в гримёрке. Поскольку они не получили желаемого, они сорвали мероприятие свистом и криками. На следующий день было не лучше: парижская пресса разнесла спектакль в пух и прах. Не только Франция, но и друзья и враги Вагнера в Германии будут внимательно следить за нашей реакцией."
 elgar.523.g: "Пусть он больше никогда не появляется в Париже!"
 elgar.523.h: "Мы должны задобрить господина Вагнера."
 elgar.524.t: "Сюита из времён Хольберга"
 elgar.524.d: "Сюита из времён Хольберга Эдварда Грига, премьера которой состоялась в Осло, оказалась не только музыкальным шедевром, но и вдохновила норвежское национальное чувство."
 elgar.524.f: "«Сюита из времён Хольберга» с подзаголовком «Сюита в старинном стиле» — это сюита из пяти частей, основанная на танцевальных формах XVIII века, написанная Эдвардом Григом в 1884 году в честь 200-летия со дня рождения датско-норвежского драматурга-гуманиста Людвига Хольберга (1684–1754). Она является примером музыки XIX века, использующей музыкальные стили и формы предшествующего столетия. Изначально сюита была написана для фортепиано, но год спустя сам Григ переложил её для струнного оркестра. Сюита состоит из вступления и набора танцев. Это ранний опыт неоклассицизма, попытка отразить всё, что было известно во времена Грига о музыке эпохи Хольберга. Хотя она не так известна, как музыка Грига к «Пер Гюнту», которая сама обычно исполняется в виде двух сюит, многие критики считают эти произведения равноценными."
 elgar.525.t: "Новые пути"
 elgar.525.d: "В «Новой музыкальной газете» Роберт Шуман упомянул нового артиста, который в одночасье стал знаменитым. Его зовут Иоганнес Брамс, и он произвёл сильное впечатление как на Шумана, так и на его жену Клару."
 elgar.525.f: "«И вот он пришёл, юная кровь, у колыбели которой стояли на страже грации и герои. Его зовут Иоганнес Брамс, он приехал из Гамбурга, работал там в тёмной тишине, но был обучен превосходным и восторженным учителем в трудных условиях искусства, незадолго до этого рекомендованный мне почитаемым, известным мастером. И внешне он носил все признаки, которые возвещают нам: „Он — призванный“», — Роберт Шуман."
 elgar.525.g: "Мы ожидаем от господина Брамса великих свершений."
 elgar.526.t: "Песнь парок"
 elgar.526.d: "«Песнь парок» Иоганнеса Брамса была впервые исполнена в Базеле. Наряду с Веной, Швейцария была одним из важнейших мест пребывания Брамса."
 elgar.526.f: "«Песнь парок» — последнее сочинение для хора и оркестра Иоганнеса Брамса. Более чем через 10 лет после кантаты «Ринальдо», соч. 50, и «Рапсодии для альта», соч. 53, Брамс снова использовал текст Иоганна Вольфганга фон Гёте. По словам Макса Кальбека, Брамса вдохновила на сочинение актриса Шарлотта Вольтер, которая выступала в роли Ифигении в Бургтеатре в Вене. 13 июня 1896 года Брамс писал о произведении: «Я часто слышу философствования о шестой строфе „Песни парок“. Я думаю, что сердце ничего не подозревающего слушателя должно смягчиться, а глаз увлажниться при одном лишь появлении мажора; только тогда его охватывает страдание человечества»."
 elgar.526.g: "Это так же прекрасно, как и тревожно."
 elgar.527.t: "Композитор-владелец апельсиновой плантации"
 elgar.527.d: "Сын известного торговца шерстью Юлиуса Дилиуса брал уроки у органиста и опубликовал некоторые из своих первых сочинений."
 elgar.527.f: "Фредерик Дилиус, уроженец Англии, был сыном немецкого торговца шерстью Юлиуса Дилиуса. Отец хотел, чтобы его сын стал преемником в компании, но сын мало интересовался бизнесом в Европе и больше увлекался искусством и музыкой. Поэтому Дилиуса-младшего перевели на апельсиновую плантацию во Флориде, чтобы уберечь его от влияния европейских метрополий. Однако именно этот перевод имел выдающееся значение для его последующего музыкального творчества. В Джексонвилле Дилиус познакомился с католическим органистом Томасом Уордом, который, по словам Дилиуса, был единственным, кто действительно его чему-то научил. Немного позже Дилиус опубликовал свои первые сочинения в Данвилле, штат Вирджиния."
 elgar.527.g: "Что должно было стать с этим бездельником?"
 elgar.528.t: "Австриец в Нью-Йорке"
 elgar.528.d: "После споров на своей австрийской родине Густав Малер нашёл в Нью-Йорке аудиторию, у которой его произведения были очень хорошо приняты. Некоторые ответственные лица в музыкальном мире США хотели бы заключить с ним долгосрочный контракт."
 elgar.528.f: "Для некоторых немецкий дублет был слишком тесен, когда они слышали имя Малера. Некоторые от волнения, но большинство от гнева. Так было с самого первого дня. Он действовал немедленно, подстрекательски, провокационно, тревожно — неважно: он принадлежит к электрическим и электризующим натурам, которые при малейшем прикосновении испускают искры или воспламеняются. Вначале, конечно, только его бешеная непопулярность сделала его популярным. Несомый благосклонностью ненависти, тщательно освещаемый завистью, этим вечно бодрствующим и могущественным защитником всего настоящего, насмешками, завистью и клеветой, провозглашаемый самыми громкими рупорами на каждом углу, он стал знаменит. (...) И так каждый день можно было слышать, что он издевается над своими музыкантами, доводит их до нечеловеческой работы, почти до смерти, и что, если бы они только могли, они все хотели бы утопить его в ложке воды. Говорили, что он укорачивал своих певцов, муштровал их, как новобранцев, играл с ними, как Великий Турок со своими рабами. (...) Интенсивность его существа, казалось, заполнила весь Нью-Йорк, — Феликс Зальтен."
 elgar.528.g: "Какой странный тип."
 elgar.528.h: "Малеру следует остаться в Америке."
 elgar.529.t: "Скифская сюита"
 elgar.529.d: "Сергей Прокофьев, один из самых многообещающих молодых талантов в русской музыке, сегодня шокировал публику скандальным выступлением."
 elgar.529.f: "Прокофьев первоначально написал музыку для балета «Ала и Лоллий», действие которого происходит среди скифов. Заказанный Сергеем Дягилевым, балет был написан на сценарий русского поэта Сергея Городецкого. Но когда Дягилев отверг партитуру ещё до её завершения, композитор переработал музыку в сюиту для концертного исполнения. Исполнение стало самым большим скандалом в истории премьер Прокофьева. Директор консерватории того времени, Александр Глазунов, покинул зал во время концерта, большинство публики было возмущено, а рецензии были разгромными. Однако Прокофьева это не очень впечатлило, и на следующий день он лаконично написал в Москву, что выступление прошло «с настоящим шумом»."
 elgar.529.g: "Шедевр!"
 elgar.529.h: "Отвратительно."
 elgar.530.t: "Рейнская симфония"
 elgar.530.d: "Роберт Шуман занял должность в Дюссельдорфе на Рейне и внезапно был вдохновлён строительством Кёльнского собора на написание нового произведения."
 elgar.530.f: "Роберт Шуман считается одним из самых представительных композиторов эпохи романтизма. В 1850 году он сменил Фердинанда Хиллера на посту музыкального руководителя и переехал в Дюссельдорф. Несмотря на критику за его плохие дирижёрские навыки и насмешки из-за его «творческого упадка», Шуман сочинил свою последнюю симфонию, «Рейнскую». Он использовал симфонии Бетховена и Мендельсона в качестве образца, но также был вдохновлён своими впечатлениями от Рейнской области. Сам Шуман заявлял, что его поездка в Кёльн и вид собора были его главным источником вдохновения для этого сочинения, которое стало одним из его самых известных произведений."
 elgar.530.g: "Хорошая была идея продолжить строительство собора, не так ли?"
 elgar.531.t: "Попытка самоубийства Шумана"
 elgar.531.d: "Композитор Роберт Шуман был спасён из реки в последнюю минуту сегодня — он, по-видимому, хотел покончить с собой в состоянии помрачения рассудка. До сих пор совершенно неясно, что с ним делать."
 elgar.531.f: "10 февраля 1854 года психологические страдания Шумана резко усилились. Он в основном жаловался на «проблемы со слухом». Звуки, аккорды, целые музыкальные произведения бушевали в его голове и лишали его сна. Тем временем Шуман находился под круглосуточным наблюдением жены и детей и уже был под медицинским наблюдением, но всё же смог покинуть квартиру 27 февраля 1854 года в незамеченный момент. Он направился к ближайшему понтонному мосту, перелез через перила и, бросив обручальное кольцо в воду, бросился в реку. Его спасли мостовой мастер и другие неизвестные мужчины, отвезли домой и оказали помощь вызванным врачом. После попытки самоубийства он пожелал быть помещённым в лечебницу для душевнобольных и безумных в Энденихе близ Бонна, которая была открыта в 1844 году психиатром Францем Рихарцем."
 elgar.531.g: "Мы ничего не можем сделать."
 elgar.531.h: "Отправить его в современную психиатрическую лечебницу близ Эндениха."
 elgar.532.t: "Смерть Шумана"
 elgar.532.d: "После нескольких лет душевного расстройства Роберт Шуман, некогда многообещающий музыкальный талант, умер в психиатрической лечебнице, забытый миром."
 elgar.532.f: "Брамс видел Шумана 31 марта и 19 августа 1854 года, не имея возможности с ним поговорить. Однако 11 января, 23 февраля и 2 апреля 1855 года оба смогли подробно поговорить. Шуману было так хорошо, что он мог играть музыку на кабинетном рояле с Брамсом и провожать его часть пути до боннского вокзала под наблюдением охранника. 10 апреля 1856 года Брамс нашёл Шумана в тяжёлом состоянии. Шуман больше не мог говорить разборчиво. 1 мая 1856 года в медицинских записях в последний раз упоминалось, что Шуман играл на фортепиано. Большую часть времени он едва мог разборчиво выражаться. План Клары Шуман от апреля 1856 года перевезти Шумана в Дюссельдорф и самой ухаживать за ним не был реализован. С середины июля 1856 года Шуман ел всё меньше и меньше. 26 июля 1856 года у него были «подергивания в различных мышцах, на лице и в конечностях». Слизистые хрипы указывали на пневмонию. Роберт Шуман умер 29 июля; никто не присутствовал при его кончине."
 elgar.533.t: "Чудесное выздоровление Роберта Шумана"
 elgar.533.d: "По-видимому, современные методы в санатории Эндениха возымели действие. Шуман показывает признаки улучшения, хотя до его возвращения к работе ещё несколько месяцев."
 elgar.533.f: "Чудесное выздоровление Шумана началось после того, как в сентябре 1854 года, незадолго до их 14-й годовщины свадьбы, он сказал Петерсу, что Дюссельдорф разрушен, а Клара и дети мертвы. Чтобы развеять это заблуждение, Петерс попросил Клару Шуман написать письмо мужу. Это привело к первому обмену письмами с момента госпитализации. С тех пор Шуман снова начал активно участвовать в жизни вне лечебницы. Он также переписывался со своими детьми, Иоганнесом Брамсом, Йозефом Иоахимом и издателями. С сентября 1854 по май 1855 года он написал около 25 писем. В это время Шуман часто выражал желание снова покинуть Эндених. Он время от времени играл на фортепиано. Он изучал сочинения Брамса. 11 января 1855 года его впервые посетил Иоганнес Брамс. С тех пор состояние Шумана неуклонно улучшалось, пока врачи не разрешили Кларе Шуман навестить его. С её поддержкой и поддержкой Брамса Шуман вскоре снова начал сочинять — и таким образом запустил процесс самоисцеления."
 elgar.533.g: "Но как это возможно?"
 elgar.534.t: "Танго"
 elgar.534.d: "Исполнитель танго Карлос Гардель записал свой первый хит «Mi noche triste»."
 elgar.534.f: "Карлос Гардель был самой выдающейся фигурой в истории танго. Он был одним из самых влиятельных исполнителей мировой популярной музыки первой половины XX века. Гардель — самый известный популярный исполнитель танго всех времён и признан во всём мире. Он создал танго-песню в 1917 году, исполнив «Mi noche triste» Паскуаля Контурси и Самуэля Кастриоты. С «Mi noche triste» произошло рождение сентиментального танго. Ностальгические, мелодраматические и грустные, новые тексты и музыка олицетворяли Буэнос-Айрес и его жителей."
 elgar.534.g: "Триумф аргентинской музыки."
 elgar.601.t: "Смерть [SCOPE.sCharacter('elgar_composer_scope').GetLastName]"
 elgar.601.d: "[SCOPE.sCharacter('elgar_composer_scope').GetFullName], один из величайших творческих умов нашей страны и яркая звезда на музыкальном небосклоне, [SelectLocalization(SCOPE.sCharacter('elgar_composer_scope').IsFemale, 'скончалась', 'скончался')] сегодня. Он оставляет пустоту, которую вряд ли можно заполнить."
 elgar.601.g: "Нас покинул титан музыкальной истории."
 elgar.603.t: "Россини покидает Болонью"
 elgar.603.d: "Россини решил покинуть Болонью. Эта новость не только стала неожиданностью для жителей города, но и опечалила всю страну."
 elgar.603.f: "Когда Джоаккино Россини решил покинуть Болонью и, таким образом, Папское государство, прошло около 20 лет с его ухода с оперной сцены. Тем не менее, Россини всё ещё был высокоуважаемой фигурой и одним из самых любимых композиторов Италии. Основная причина, по которой Россини вернулся в Париж — после перерыва во Флоренции — вероятно, была не в последнюю очередь связана с его здоровьем. В последние годы своей жизни как европейская музыкальная звезда он уже ухудшился как физически, так и психически. Париж обещал лучшие перспективы в области здравоохранения, поэтому Россини думал провести там свою старость."
 elgar.603.g: "Но он не доел свои тортеллини!"
 elgar.609.d: "Франц Лахнер сегодня объявил о своём уходе с дирижёрского пульта. Он больше не видит будущего для своей карьеры."
 elgar.609.f: "Целый ряд обстоятельств привёл к преждевременному уходу Франца Лахнера из мира музыки. Решающим фактором для этого стала новая музыка Рихарда Вагнера и триумф его союзников. Лахнер, который знал Шуберта и Бетховена, не мог и не хотел следовать этому развитию. Подобно Россини, который понимал, что его считают реликтом других времён, пока мир двинулся дальше, Лахнер удалился, не в последнюю очередь из-за насмешек и злобы критиков, верных Вагнеру."
 elgar.609.g: "Потеря для [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]."
 elgar.613.f: "Гаэтано Доницетти мирно скончался этим утром после долгой и насыщенной жизни в объятиях своей второй жены и в окружении сыновей. Похоронная процессия с несколькими оркестрами, сотнями факелоносцев и тысячами зрителей знаменует прощание с человеком, который, как говорят, прожил идеальную жизнь."
 elgar.614.f: "В 1867 году Берлиоз получил известие, что его сын умер в Гаване от жёлтой лихорадки. Макдональд предполагает, что Берлиоз, возможно, пытался отвлечься от своего горя, проведя запланированную серию концертов в Санкт-Петербурге и Москве, но вместо того, чтобы омолодить его, поездка отняла у него последние силы. Он отправился в Ниццу, чтобы поправить здоровье в средиземноморском климате, но упал на скалы у берега, возможно, из-за инсульта, и ему пришлось вернуться в Париж, где он несколько месяцев восстанавливался. В августе 1868 года он почувствовал себя в силах ненадолго поехать в Гренобль, чтобы судить хоровой фестиваль. Вернувшись в Париж, он постепенно ослабел и умер в своём доме на улице Кале 8 марта 1869 года в возрасте 65 лет. Он был похоронен на кладбище Монмартр вместе со своими двумя жёнами, которых эксгумировали и перезахоронили рядом с ним."
 elgar.615.f: "После неудачного брака с Каролиной цу Сайн-Витгенштейн Лист всё больше посвящал себя сочинениям на религиозные темы. В Риме, где он в основном оставался до 1870 года, он вёл частично светскую, частично монашескую жизнь и летом 1863 года удалился в монастырь, где его также посетил папа Пий IX. В 1865 году Лист принял постриг и получил четыре малых чина. С тех пор, как священнослужитель, он носил римский воротничок и его называли аббатом. В 1886 году Лист посетил Вагнеровский фестиваль. Во время поездки Лист уже был серьёзно болен и умер через несколько дней после прибытия, 31 июля 1886 года, в результате пневмонии. Бернхард Шнаппауф, врач и друг Рихарда Вагнера, провёл последние несколько дней у его смертного одра и сообщил, что Лист умер тихо и достойно. Он закрыл ему глаза и сделал посмертную маску, за что, по старому обычаю, ему полагались саван и наволочка."
 elgar.616.f: "16 сентября 1882 года Вагнер с семьёй отправился в Венецию, где провёл несколько недель с Ференцем Листом. 25 декабря, в качестве подарка на день рождения Козимы, он в последний раз дал совместный концерт в театре Ла Фениче; он дирижировал своей юношеской симфонией до-мажор. 13 февраля 1883 года он находился в боковом крыле Палаццо Вендрамин-Калерги, где он жил с семьёй. Около 15:00 семья ждала за столом Вагнера, который, несмотря на сердечный приступ, находился в своём кабинете и писал эссе о женственном в человеке. Горничная нашла его slumped за столом над словами «Тем не менее, процесс эмансипации женщины протекает только в экстатических конвульсиях. Любовь — трагедия». Он сказал: «Моя жена и врач», прежде чем потерять сознание и умереть на руках Козимы около 15:30."
 elgar.617.f: "Эдвард Григ умер в муниципальной больнице в Бергене, Норвегия, 4 сентября 1907 года в возрасте 64 лет от сердечной недостаточности. Он страдал от долгой болезни. Его последними словами были: «Что ж, если так должно быть». Похороны собрали на улицах его родного города от 30 000 до 40 000 человек, чтобы почтить его память. По его желанию, его собственный Похоронный марш памяти Рикарда Нурдрока был исполнен в оркестровке его друга Юхана Хальворсена, который был женат на племяннице Грига. Кроме того, была исполнена часть Похоронного марша из фортепианной сонаты № 2 Шопена. Григ был кремирован в первом норвежском крематории, открытом в Бергене в том же году, и его прах был захоронен в горной крипте возле его дома, Тролльхаугена. После смерти его жены её прах был помещён рядом с его."
 elgar.618.f: "Брамс умер 3 апреля 1897 года ранним утром в возрасте 63 лет в своей квартире на Карлсгассе, 4, где он жил с 1872 года — по некоторым биографиям от рака печени, по более свежим данным от рака поджелудочной железы. Его последнее публичное выступление состоялось 7 марта 1897 года, когда он слушал, как Ганс Рихтер дирижирует его Симфонией № 4; после каждой из четырёх частей была овация. После прощания в траурном доме, где Карл Кундманн снял его посмертную маску, а Людвиг Михалек сделал последний пастельный портрет, отпевание состоялось 6 апреля в лютеранской городской церкви."
 elgar.619.f: "«Утро и Вена. Хаос. Цепляешься за детали, которые ещё никто не может знать. Его должны похоронить на маленьком кладбище в Гринцинге, рядом с его маленькой дочерью. Тело привозят. Другое утро. Дорога „ан ден Ланген Люссен“ ведёт через поля к кипарисам. Часовня — это маленькое помещение, только для гроба и нескольких венков. Остальные выстраиваются вдоль дорожек к могиле. Проходит женщина и говорит другой: „Теперь он там внутри в мире. Всё было для него слишком маленьким“. Церковь в Гринцинге маленькая, церковный двор узкий. И для венцев предстоит зрелище. Церковь и кладбище будут оцеплены. Доступ будет только по билетам. Мы узнаём, что Франц Шальк, Грегор и правление потребовали закрыть оперу в день похорон. Ни слова об этом. Двор, муниципалитет Вены не двигаются. А потом торжество. Мы стоим перед церковью, когда выносят гроб. Идёт дождь. Мы быстрее добираемся до могилы по тропинке через виноградник. Прибывает процессия. Дождь прекращается. Поёт соловей, падают комья земли. Радуга. И сотни людей молчат», — Пауль Штефан."
 elgar.701.g: "Это было прекрасное выступление."
 elgar.701.h: "Нанять этого гения!"
 elgar.706.g: "В 20 лет он не слишком ли молод для такой работы?"
 elgar.701.t: "Траурно-триумфальная симфония"
 elgar.701.d: "К десятой годовщине Июльской революции Гектор Берлиоз сочинил произведение, вызвавшее большое восхищение публики."
 elgar.701.f: "Французское правительство заказало симфонию для празднования десятой годовщины Июльской революции, которая привела к власти Луи-Филиппа I, по случаю чего воздвигалась Июльская колонна на площади Бастилии. Берлиоз мало симпатизировал режиму, но приветствовал возможность написать произведение, потому что правительство предложило ему за это 10 000 франков. «Военная симфония» (позже переименованная в «Траурно-триумфальную симфонию»), вместо того чтобы следовать модели, установленной Берлиозом в «Ромео и Джульетте», представляет собой возврат к более раннему, добетховенскому стилю в традиции монументальной французской публичной церемониальной музыки. Берлиоз переработал партитуру в январе 1842 года, добавив необязательную партию для струнных и финальный хор на текст Антони Дешана. Рихард Вагнер присутствовал на исполнении этой новой версии в зале Вивьен 1 февраля 1842 года. 5 февраля он сказал Роберту Шуману, что нашёл пассажи в последней части симфонии Берлиоза настолько «величественными и возвышенными, что их никогда не превзойти»."
 elgar.702.t: "Лист в Веймаре"
 elgar.702.d: "После многих лет концертных туров пианист-виртуоз и композитор Ференц Лист подумывает о том, чтобы поселиться в Веймаре."
 elgar.702.f: "Веймарские годы были самым продуктивным в творческом отношении периодом для Ференца Листа. Он написал многие из своих фортепианных произведений в Веймаре, такие как соната си-минор, цикл «Поэтические и религиозные гармонии», пятнадцать Венгерских рапсодий, а также многочисленные транскрипции, фортепианные переложения и редакции более ранних фортепианных произведений, таких как Этюды Паганини. Два из его ранее задуманных фортепианных концертов также получили здесь свою окончательную форму. В Веймаре Лист дирижировал многими произведениями современных композиторов, некоторые из которых в то время были спорными, а также ставил их оперы. Он дирижировал произведениями Рихарда Вагнера, который был ему особенно близок и которому он помог бежать в Цюрих весной 1849 года после Дрезденского восстания. В последующие годы он поддерживал Вагнера как финансово, так и морально и вёл с ним оживлённую переписку. Позже Лист и Вагнер часто выступали вместе как дирижёры. С 1865 года, после того как у Вагнера завязались отношения с дочерью Листа Козимой, их отношения надолго охладились."
 elgar.703.t: "Риенци"
 elgar.703.d: "Молодой композитор впечатлил публику в Дрездене и международных артистов своей оперой «Риенци». Его зовут Рихард Вагнер."
 elgar.703.f: "«Никакой последующий опыт не вызывал у меня чувств, даже отдалённо похожих на те, что я испытал в день первого исполнения „Риенци“. Слишком хорошо обоснованная тревога за их успех так доминировала в моих чувствах на всех последующих первых исполнениях моих произведений, что я никогда не мог по-настоящему наслаждаться ими или обращать особое внимание на поведение публики. (...) Первоначальный успех „Риенци“, без сомнения, был обеспечен заранее. Но бурный способ, которым публика выразила своё расположение ко мне, был необычайным... Публика была насильственно предрасположена принять её, потому что все, кто был связан с театром, распространяли такие благоприятные слухи... что всё население с нетерпением ожидало того, что было объявлено как чудо... Пытаясь вспомнить своё состояние в тот вечер, я могу вспомнить его только как обладающее всеми чертами сна», — Рихард Вагнер."
 elgar.704.t: "Фортепианный концерт ля минор"
 elgar.704.d: "Фортепианный концерт Эдварда Грига сегодня впервые прозвучал в Копенгагене. Уже сейчас можно предвидеть, что это будет одно из его самых популярных произведений."
 elgar.704.f: "Фортепианный концерт ля минор, соч. 16, написанный Эдвардом Григом в 1868 году, был единственным концертом, который Григ завершил. Произведение относится к числу самых ранних важных работ Грига, написанных 24-летним композитором в 1868 году в Сёллерёде, Дания, во время одного из его визитов туда для поправки здоровья. Концерт Грига свидетельствует о его интересе к норвежской народной музыке; вступительный пассаж основан на мотиве нисходящей малой секунды, за которой следует нисходящая большая терция, что типично для народной музыки родной страны Грига. Премьера произведения состоялась 3 апреля 1869 года в Копенгагене в исполнении Эдмунда Нейперта под управлением Хольгера Симона Паулли. Некоторые источники говорят, что сам Григ, превосходный пианист, должен был быть солистом, но он не смог присутствовать на премьере из-за обязательств с оркестром в Христиании (ныне Осло). Среди тех, кто присутствовал на премьере, были датский композитор Нильс Гаде и русский пианист Антон Рубинштейн, который предоставил свой рояль для этого случая. Григ пересматривал произведение не менее семи раз, обычно внося незначительные изменения, но в общей сложности эти изменения составили более 300 отличий от первоначальной оркестровки."
 elgar.705.t: "Вариации на тему Гайдна"
 elgar.705.d: "Композитор Иоганнес Брамс сегодня исполнил новый шедевр, но в то же время подумывает о том, чтобы надолго связать свою жизнь с Веной."
 elgar.705.f: "«Вариации на тему Гайдна», соч. 56а — это вариационное произведение для оркестра Иоганнеса Брамса. Произведение было создано летом 1873 года в Тутцинге. Премьера состоялась 2 ноября 1873 года в Вене под управлением Брамса. Произведение относится к эпохе, когда Брамс хотел ознаменовать своё пребывание в Вене. С одной стороны, он покинул Детмольд и Гамбург разочарованным много лет назад. С другой стороны, он стремился жить там, где жили его великие классические образцы для подражания, и продолжать венскую традицию."
 elgar.706.t: "Первое выступление Малера"
 elgar.706.d: "В Бад-Халле молодой и талантливый дирижёр Густав Малер впервые занял должность капельмейстера. В последующие годы он поднимется по карьерной лестнице до Венской государственной оперы."
 elgar.706.f: "«И вот он лично в театральной конторе, когда я вышел после своего первого визита к Поллини: бледный, худой, маленького роста, с длинным лицом, крутой лоб обрамлён иссиня-чёрными волосами, выразительные глаза за очками, морщины страдания и юмора на его лице, которое, разговаривая с другим, показывало самое удивительное изменение выражения, столь же интересное, демоническое, пугающее воплощение капельмейстера Крейслера, какое только мог себе представить юный читатель фантазий Э. Т. А. Гофмана; он любезно спросил меня о моих музыкальных способностях и знаниях, на что я ответил, к его явному удовлетворению, со смесью робости и самоуверенности, и оставил меня в каком-то ошеломлённом и потрясённом состоянии. (...) Малер предстал передо мной по лицу и манере как гений и демон (...)», — Бруно Вальтер."
 elgar.707.t: "Фортепианный концерт № 2"
 elgar.707.d: "После многих неудач композитор Сергей Рахманинов впечатляюще вернулся: его Второй фортепианный концерт вызвал бурные аплодисменты."
 elgar.707.f: "После катастрофической премьеры своей Первой симфонии в 1897 году Рахманинов перенёс психологический срыв, который помешал ему сочинять в течение трёх лет. Хотя депрессия отнимала у него энергию, он всё же продолжал выступать. Дирижирование и уроки фортепиано стали необходимы для улучшения его финансового положения. В 1899 году он должен был исполнить в Лондоне Второй фортепианный концерт, который он ещё не сочинил из-за болезни, и вместо этого успешно дебютировал как дирижёр. Родственники решили познакомить его с неврологом Николаем Далем, которого он посещал ежедневно с января по апрель 1900 года, что помогло восстановить его здоровье и уверенность в сочинении. Рахманинов посвятил концерт Далю за успешное лечение. После того как он выполнил свои обязательства по концерту в Лондоне в 1908 году в Куинс-холле под управлением Сергея Кусевицкого, появилась лестная рецензия в The Times: «Прямое выражение произведения, необычайная точность и аккуратность игры Рахманинова, и даже строгая экономия движений рук и кистей, которую он проявляет, всё это способствовало впечатлению полноты исполнения»."
 elgar.708.t: "Симфония № 1 «Классическая»"
 elgar.708.d: "Своей первой симфонией Сергей Прокофьев снова зарекомендовал себя как многообещающий композитор. С другой стороны, это толкает молодого артиста в мир, чтобы лучше зарабатывать."
 elgar.708.f: "«Репетиция „Классической симфонии“ с Государственным оркестром, я дирижировал сам, полностью импровизируя, забыв партитуру и никогда, в сущности, не изучая её с дирижёрской точки зрения. Я думал, что это может быть полный провал, но ничего не случилось, и в любом случае в партиях было столько ошибок, что сессия превратилась в основном в исправление. В Кисловодске я беспокоился, что будет какой-то антагонизм со стороны „революционного оркестра“, играющего мои новые произведения, но случилось обратное: Государственный оркестр, вливший в себя много новой молодой крови, был гибок и внимателен и играл симфонию с явным удовольствием», — Сергей Прокофьев."
 elgar.709.t: "Ромео и Джульетта"
 elgar.709.d: "Пётр Чайковский, начинающий молодой композитор, представил свою увертюру «Ромео и Джульетта». Публика приняла произведение со смешанными чувствами."
 elgar.709.f: "Не только в начале, но и на протяжении всей своей карьеры Чайковскому приходилось утверждаться в борьбе с критиками и конкурентами. Например, увертюра «Ромео и Джульетта» при публикации должна была провалиться. С другой стороны, эта критика, которую Чайковский неоднократно получал на протяжении всей своей жизни, заставляла композитора сверхкритично редактировать это и другие произведения; Чайковский оставался одним из величайших критиков своего собственного творчества на протяжении всей своей карьеры. Не без иронии было и то, что национально настроенные русские композиторы хвалили именно это произведение, хотя позже они станут одними из самых резких критиков Чайковского. Тем не менее, Чайковский с этого периода должен был стать одним из самых важных русских композиторов и всего за несколько лет достичь международной известности, которой едва ли добился какой-либо другой музыкант века."
 elgar.710.t: "Да здравствует Верди!"
 elgar.710.d: "С созданием итальянского национального государства и присоединением оперного города Милана к нашей территории у нас есть уникальная возможность нанять одну из самых важных фигур в истории итальянской музыки: Джузеппе Верди."
 elgar.710.f: "Джузеппе Верди — итальянский композитор и политик, всемирно признанный одним из величайших оперных деятелей и композиторов всех времён, наряду с другими главными героями итальянского музыкального театра XIX века: Джоаккино Россини, Винченцо Беллини и Гаэтано Доницетти. Он симпатизировал движению Рисорджименто, которое стремилось к объединению Италии, и на короткое время активно участвовал в политической жизни; за свою долгую жизнь он занял уникальное положение среди своих соотечественников, став глубоким художественным символом единства страны. Именно по этой причине через месяц после его смерти торжественная и бесконечная процессия пересекла Милан, сопровождая его останки под звуки «Va, pensiero» из «Набукко», написанного им 60 лет назад, что выражало чувства итальянцев к своему ушедшему герою. Это продемонстрировало, насколько музыка Верди была усвоена национальным сознанием. Его произведения до сих пор остаются одними из самых известных и исполняемых в театрах по всему миру, в частности «Аида» (1871), упомянутый «Набукко» (1842) и так называемая «триада Верди»: «Риголетто» (1851), «Трубадур» (1853) и «Травиата» (1853)."
 elgar.711.t: "Весенняя симфония"
 elgar.711.d: "Первая симфония Роберта Шумана была исполнена сегодня под руководством Феликса Мендельсона-Бартольди. Шуман женат на выдающейся пианистке Кларе (урождённой Вик) и до сих пор привлекал внимание скорее как музыкальный критик, чем как композитор. Мнения о его фортепианных произведениях расходятся."
 elgar.711.f: "За исключением Франца Шуберта, ни один немецкоязычный композитор не был так недооценён при жизни, как Роберт Шуман. В то время как значение Шуберта было признано только после его ранней смерти, Шумана обвиняли в том, что он начал как гений, а закончил как талант. Современники часто не имели доступа к его творчеству или просто не понимали его произведений. Его фортепианные пьесы, которые сегодня составляют часть его славы, в то время были в основном неизвестны. Насмешники видели в нём лишь мужа пианистки Клары Шуман. В родной Саксонии он находился в тени Мендельсона. Вагнер позже выступал против него, в то время как Брамс стал близким доверенным лицом Клары и Роберта. Лист видел в Шумане пионера музыкального прогресса в Германии, но не имел успеха у публики, когда включал произведения Шумана в свой репертуар. Надежды на постоянную должность в важном музыкальном учреждении неоднократно рушились. Подобно Шуберту, Шумана также постиг преждевременный, трагический конец."
 elgar.712.t: "Король Олаф"
 elgar.712.d: "Эдвард Элгар в последние годы прославился своими кантатами и хоровыми произведениями. Его последняя работа, «Сцены из саги о короле Олафе», была тепло встречена публикой."
 elgar.712.f: "В 1890-х годах Эдвард Элгар завоевал репутацию крупного британского композитора. Изначально находившийся под сильным влиянием континентальной музыки — в «Короле Олафе» также слышны отголоски стиля Вагнера — он постепенно нашёл свой собственный музыкальный язык, который вдохновит более поздних британских композиторов на совершенно новые пути. Элгар чувствовал себя аутсайдером не только в музыкальном, но и в социальном плане. В музыкальных кругах, где доминировали академики, он был композитором-самоучкой; в протестантской Британии его католицизм в некоторых кругах воспринимался с подозрением; а в классовом обществе викторианской и эдвардианской Британии он остро ощущал своё скромное происхождение даже после того, как добился признания. Тем не менее, Элгара можно считать самым важным британским композитором со времён Генри Пёрселла."
 elgar.713.t: "Музыкальный руководитель придворных балов"
 elgar.713.d: "Должность музыкального руководителя придворных балов остаётся вакантной уже много лет. Престижная должность, которая на самом деле должна была достаться композитору Иоганну Штраусу. Ранее ему было отказано в этой чести по политическим причинам. Теперь всё чаще звучат голоса, предлагающие отдать эту должность сыну рано умершего композитора."
 elgar.713.f: "Иоганн Штраус — австрийско-немецкий капельмейстер и композитор, признанный во всём мире как «король вальса». Свой первый вальс он сочинил уже в шесть лет и тайно брал уроки игры на скрипке, потому что отец планировал для него карьеру чиновника. Поскольку отец порвал с семьёй, мать, вопреки его воле, поддержала музыкальное образование сына. Его первое выступление в казино Доммаера, известном на всю округу развлекательном заведении, имело огромный успех. Гастроли с собственным оркестром сначала проходили по Дунайской монархии (что усиливало его соперничество с отцом). После смерти отца он возглавил его оркестр и объединил со своим. Поскольку он написал несколько произведений для революционеров 1848 года и тем самым проявил сочувствие к повстанческому движению, он привлёк внимание цензурных органов и, несмотря на свою популярность, впал в немилость при дворе. В результате до 1863 года ему было отказано в должности музыкального руководителя придворных балов."
 elgar.713.g: "Он упустил свой шанс, но может продолжать сочинять."
 elgar.713.h: "Дайте королю вальса место, которого он заслуживает!"
 elgar.714.t: "Лауреат Государственной премии в области композиции"
 elgar.714.d: "Лауреатом Государственной премии в области композиции в этом году стал исключительный чешский талант. Его зовут Антонин Дворжак."
 elgar.714.f: "Антонин Дворжак — чешский композитор, часто использовавший ритмы и другие аспекты народной музыки Моравии и своей родной Богемии. Дворжак проявил свои музыкальные дарования в раннем возрасте, будучи способным учеником-скрипачом с шести лет. В 1874 году он подал заявку на Австрийскую государственную премию в области композиции, приложив партитуры двух симфоний и других произведений. Хотя Дворжак об этом не знал, ведущим членом жюри был Иоганнес Брамс, который был очень впечатлён. Премия была присуждена Дворжаку в 1874, а затем снова в 1876 и 1877 годах, когда Брамс и известный критик Эдуард Ганслик, также член жюри, познакомились с ним. Брамс порекомендовал Дворжака своему издателю, Зимроку."
 elgar.714.g: "Заслуженная награда."
 elgar.714.h: "Мы не должны упускать этот талант."
 elgar.715.t: "Богемный композитор"
 elgar.715.d: "Клод Дебюсси начинал как лауреат Римской премии, но до сих пор мало что сделал со своим признанным талантом, кроме написания небольших, провокационных фортепианных пьес. Что станет с этим богемным художником?"
 elgar.715.f: "Даже в консерватории оценки таланта Клода Дебюсси сильно разнились. Одни хвалили его как пианиста и возлагали на него большие надежды. Другие описывали его как небрежного. В это время он уже был пианистом в доме Надежды фон Мекк, покровительницы Чайковского. В 1884 году Дебюсси получил Римскую премию, но во время своего пребывания в Риме был неамбициозен. Итальянскую оперу он находил скучной и мало ценил преобладающий стиль Джузеппе Верди. Он рано вернулся в Париж и вёл там нестабильную жизнь: «Я уверен, что Институт не одобрил бы, ибо, естественно, он считает единственно правильным тот путь, который он предписывает. Но ничего не поделаешь! Я слишком влюблён в свою свободу, слишком люблю свои собственные идеи!»"
 elgar.715.g: "Милая фортепианная музыка, но у нас и так хватает музыкальных бродяг."
 elgar.1011.t: "Дон Паскуале"
 elgar.1011.d: "Великий композитор только что завершил музыкальный шедевр!"
 elgar.1011.f: "«Дон Паскуале» — это опера-буффа в трёх действиях. Опера является одной из самых известных в своём жанре и, наряду с «Любовным напитком» и «Лючией ди Ламмермур», одним из немногих произведений Доницетти, имеющих почти непрерывную традицию исполнения с XIX века. Основанные на комедиях Карло Гольдони, персонажи более или менее точно соответствуют типажам комедии дель арте, но наделены сентиментальными чертами, то есть способностью чувствовать и выражать печаль, боль или раскаяние, что придаёт им глубину, выходящую за рамки типажа. «Дон Паскуале» имел мгновенный успех, подобный которому в Париже ранее имели только «Пуритане» Беллини (1835)."
 elgar.1011.g: "Брависсимо!"
 elgar.1012.t: "Дон Себастьян"
 elgar.1012.f: "«Дон Себастьян» — французская большая опера в пяти действиях Гаэтано Доницетти. Это историческая выдумка о короле Португалии Себастьяне I (1554–1578) и его злополучной экспедиции в Марокко в 1578 году. В то время Доницетти пытался сочинить оперу, способную конкурировать с подобными историческими операми Даниэля Обера, Фроманталя Галеви и Джакомо Мейербера. Одно из критических описаний характера «Дона Себастьяна» — «похороны в пяти действиях». Произведение было принято неохотно, что сам Доницетти счёл фиаско. Хотя Доницетти считал свою последнюю оперу одним из самых важных своих произведений, «Дон Себастьян» сегодня в значительной степени забыт. Он был написан в то время, когда Доницетти «уже не имел неограниченного контроля над своим воображением», поэтому опера уже была отмечена начинающейся болезнью Доницетти."
 elgar.1021.t: "Троянцы"
 elgar.1021.f: "«Троянцы» — французская большая опера в пяти действиях Гектора Берлиоза. Либретто было написано самим Берлиозом по эпической поэме Вергилия «Энеида»; партитура была написана между 1856 и 1858 годами. «Троянцы» — самое амбициозное произведение Берлиоза, вершина всей его творческой карьеры, но он не дожил до того, чтобы увидеть его исполнение целиком. Под названием «Троянцы в Карфагене» последние три акта были впервые исполнены с большими сокращениями труппой Леона Карвальо в их театре (ныне Театр де ля Виль) на площади Шатле в Париже 4 ноября 1863 года, с 21 повторным представлением. После десятилетий забвения сегодня опера некоторыми музыкальными критиками считается одной из лучших, когда-либо написанных."
 elgar.1022.t: "Осуждение Фауста"
 elgar.1022.f: "«Осуждение Фауста» — произведение для четырёх солистов, полного семичастного хора, большого детского хора и оркестра французского композитора Гектора Берлиоза. Он назвал его «драматической легендой». Французский композитор был вдохновлён переводом драматической поэмы Гёте «Фауст» и создал музыкальное произведение, которое, как и шедевр, на котором оно основано, не поддаётся лёгкой категоризации. Задуманное в разное время как оратория свободной формы и как опера, его форма путевого дневника и космическая перспектива сделали его чрезвычайно сложным для постановки в качестве оперы. Сам Берлиоз стремился увидеть произведение на сцене, но когда это произошло, он признал, что постановочные техники его времени не были способны воплотить произведение в драматической жизни. Большая часть славы произведения пришла благодаря концертным исполнениям."
 elgar.1023.t: "Трактат об инструментовке"
 elgar.1023.f: "«Этот „Трактат об инструментовке“ — в высшей степени парадоксальное произведение. Он начинается с предисловия в несколько строк, не имеющего отношения к теме, в котором автор выступает против музыкантов, злоупотребляющих модуляциями и чья склонность к диссонансу соответствует вкусу, который некоторые животные питают к солёным растениям и колючим кустарникам. Затем он переходит к оркестровым инструментам и смешивает странные утверждения с самыми твёрдыми истинами и ценными советами. (...) В своём трактате, как и в своей оркестровке, Берлиоз, при всех своих странностях, просто великолепен. Ему моё поколение обязано своим образованием, и я осмелюсь сказать, хорошим. Берлиоз обладал бесценным даром воспламенять воображение и пробуждать любовь к искусству, которому он учил. (...) Эти, казалось бы, излишние музыкальные примеры заставляли мечтать, они открывали дверь в новый мир, в обширный и увлекательный взгляд на будущее, на Землю обетованную», — Камиль Сен-Санс."
 elgar.1031.t: "Прелюды"
 elgar.1031.f: "«Прелюды» — третья из тринадцати симфонических поэм Ференца Листа. Музыка была написана между 1845–1854 годами и начиналась как увертюра к хоровому циклу Листа «Четыре стихии», затем была переработана в самостоятельную концертную увертюру с новым названием, отсылающим к поэме Альфонса де Ламартина. «Прелюды» — самый ранний пример оркестрового произведения под названием «симфоническая поэма». Лист видит этапы жизни как прелюдии к мелодии смерти. Эти этапы жизни — это борьба и бури, любовное счастье и боль, утешение, переживание природы. Несмотря на контрасты в этих настроениях, отражённых в «Прелюдах», произведение отличается большой цельностью. Оно начинается с меланхолической мелодии, из которой развивается первая бурная главная тема, которая через пасторальную часть ведёт ко второй теме. Эти две темы развиваются в плавно меняющихся настроениях. В кульминации первоначальная тема переходит в первую главную тему как величественная, блестящая фанфара."
 elgar.1032.t: "Венгерские рапсодии"
 elgar.1032.f: "«Венгерские рапсодии» — это цикл из 19 фортепианных пьес, основанных на венгерских народных темах, сочинённых Ференцем Листом в 1846–1853 годах, а позже в 1882 и 1885 годах. Лист также аранжировал версии для оркестра, фортепианного дуэта и фортепианного трио. Некоторые из них более известны, чем другие, особенно знаменита Венгерская рапсодия № 2, а также хорошо известны № 6, № 10, № 12 и № 14 (особенно в аранжировке для фортепиано и оркестра как «Венгерская фантазия»). Лист включил многие темы, которые он слышал в своей родной западной Венгрии и которые он считал народной музыкой, хотя многие на самом деле были мелодиями, написанными представителями венгерского высшего среднего класса или такими композиторами, как Йожеф Коссович. В своей первоначальной фортепианной форме «Венгерские рапсодии» известны своей сложностью."
 elgar.1033.t: "Данте-симфония"
 elgar.1033.f: "«Данте-симфония» — это хоровая симфония, написанная Ференцем Листом. Написанная в стиле высокого романтизма, она основана на путешествии Данте Алигьери через Ад и Чистилище, как это изображено в «Божественной комедии». Некоторые критики утверждали, что «Данте-симфония» — это не столько симфония в классическом смысле, сколько две описательные симфонические поэмы. Первоначальным намерением Листа было сочинить произведение в трёх частях: «Ад», «Чистилище» и «Рай». Первые две должны были быть чисто инструментальными, а финал — хоровым. Однако Вагнер убедил Листа, что ни один земной композитор не сможет достоверно выразить радости Рая. Лист отказался от третьей части, но добавил хоровой «Магнификат» в конце второй части. Листовед Хамфри Сёрл утверждает, что, хотя Лист, возможно, чувствовал себя более уверенно, изображая адские области, чем небесные, задача изображения Рая в музыке не была бы за пределами его возможностей."
 elgar.1041.t: "Нюрнбергские мейстерзингеры"
 elgar.1041.f: "«Нюрнбергские мейстерзингеры» — это музыкальная драма, или опера, в трёх действиях Рихарда Вагнера. Это самая длинная из обычно исполняемых опер, занимающая почти четыре с половиной часа, не считая двух перерывов между актами, и традиционно не сокращается. «Мейстерзингеры» занимают уникальное место в творчестве Вагнера. Это единственная комедия среди его зрелых опер, и она также необычна среди его произведений тем, что действие происходит в исторически определённом времени и месте, а не в мифической или легендарной обстановке. Это единственная зрелая опера Вагнера, основанная на полностью оригинальном сюжете. Она включает в себя многие оперные условности, против которых Вагнер выступал в своих эссе по теории оперы: рифмованные стихи, арии, хоры, квинтет и даже балет."
 elgar.1042.t: "Валькирия"
 elgar.1042.f: "«Валькирия» вместе с операми «Золото Рейна», «Зигфрид» и «Гибель богов» образует полное произведение «Кольцо нибелунга». Вагнер в значительной степени следовал принципам, связанным с формой музыкальной драмы, отражая чувства и настроения, стоящие за произведением, используя систему повторяющихся лейтмотивов для представления людей, идей и ситуаций, а не традиционные оперные единицы арий, ансамблей и хоров. История «Валькирии» основана на скандинавской мифологии, рассказанной в «Саге о Вёльсунгах» и «Старшей Эдде»."
 elgar.1043.t: "Парсифаль"
 elgar.1043.f: "«Парсифаль» Рихарда Вагнера содержит религиозные элементы, такие как духовная музыка, явление дароносицы (Грааля), крещение и христианский обряд причастия. Уже в своих цюрихских художественных сочинениях он развил идею использования искусства для прояснения сути религии. Вагнер объяснял, что для того, чтобы передать своё притчеобразное послание о спасении и возрождении человечества через сострадание — представленное ищущим Парсифалем и страдающим Амфортасом — он выбрал художественную форму, которая с помощью религиозной символики должна была оказывать «восторженное воздействие на душу». Сам Вагнер описывал трёхактное произведение как сценическое торжественное действо и постановил, что оно должно исполняться только в Байройтском фестивальном театре."
 elgar.1051.t: "Пер Гюнт"
 elgar.1051.f: "«Пер Гюнт», соч. 23, — это музыка к одноимённой пьесе Генрика Ибсена 1867 года, написанная норвежским композитором Эдвардом Григом. Хотя Григ написал много коротких фортепианных пьес и камерных произведений, его работа для Генрика Ибсена выделяется. Изначально написав 90 минут оркестровой музыки для пьесы, он позже вернулся и извлёк определённые части для сюит. Путешествия Пера Гюнта по миру и дальним странам представлены инструментами, которые Григ выбирает для использования. Позже Григ создал две сюиты из своей музыки к «Пер Гюнту». Некоторые музыкальные фрагменты из этих сюит получили освещение в популярной культуре, особенно пьесы «Утреннее настроение», «В пещере горного короля» и «Песня Сольвейг»."
 elgar.1052.t: "Лирические пьесы"
 elgar.1052.f: "«Лирические пьесы» — это сборник из 66 коротких пьес для фортепиано соло, написанных Эдвардом Григом. Они были опубликованы в 10 томах с 1867 по 1901 год. Сборник включает в себя несколько его самых известных произведений, таких как «Свадебный день в Тролльхаугене», «Весной», «Шествие гномов» и «Бабочка». Тема первой пьесы в сборнике, «Ариетта», была одной из любимых мелодий композитора. По словам пианиста Андрея Гаврилова, «Лирические пьесы» — это «особый вид дневника, который Григ вёл на протяжении всей своей жизни, или исповедь, потому что они отражают самые сокровенные моменты в жизни композитора»."
 elgar.1053.t: "Норвежские танцы"
 elgar.1053.f: "«Норвежские танцы» были ответом норвежца на чрезвычайно успешные «Славянские танцы» Антонина Дворжака и «Венгерские танцы» Иоганнеса Брамса. Два коллеги опубликовали свои танцевальные циклы для фортепиано в четыре руки в 1878 и 1881 годах в издательстве Зимрок. В то время Григ не осмеливался оркестровать свои танцы, поскольку эта ниша была занята «Норвежскими рапсодиями» его друга Юхана Свенсена. Поэтому оркестровая версия его «Норвежских танцев» была аранжирована Робертом Энрикесом — к большому удовлетворению Грига. Для первого танца Григ использовал популярный марш Синклера, для трёх последних — так называемые «халлинги», традиционные норвежские свадебные танцы для юношей, которые исполняются быстро и очень акробатично."
 elgar.1061.t: "Немецкий реквием"
 elgar.1061.f: "«Здесь мало что можно сказать, но я всё же должна сказать вам, что я полностью наполнена вашим реквиемом, это очень мощное произведение, оно захватывает всего человека так, как мало что другое. Глубокая серьёзность в сочетании со всем волшебством поэзии оказывает чудесное, шокирующее и успокаивающее действие. Как вы знаете, я никогда не могу толком выразить это словами, но я чувствую всё богатое сокровище этого произведения до глубины души, и энтузиазм, который говорит из каждой части, глубоко трогает меня, поэтому я не могу не высказаться… О, если бы я могла это услышать, чего бы я только за это не отдала», — Клара Шуман."
 elgar.1062.t: "Венгерские танцы"
 elgar.1062.f: "«Венгерские танцы» Иоганнеса Брамса — это цикл из 21 живой танцевальной мелодии, основанной в основном на венгерских темах, завершённый в 1879 году. Их продолжительность варьируется от одной до пяти минут. Они являются одними из самых популярных произведений Брамса и были для него самыми прибыльными. Каждый танец был аранжирован для самых разных инструментов и ансамблей. Брамс изначально написал версию для фортепиано в четыре руки, а позже аранжировал первые десять танцев для фортепиано соло. Скрипач Йозеф Иоахим, друг Брамса, создал виртуозную аранжировку всех «Венгерских танцев» для скрипки и фортепиано."
 elgar.1063.t: "Симфония № 4"
 elgar.1063.f: "Симфония № 4 — последняя симфония, написанная Иоганнесом Брамсом. Сегодня это одно из самых популярных и часто исполняемых оркестровых произведений композитора. На первый взгляд, бескомпромиссность, с которой произведение было задумано, вызывала недоумение. Когда Брамс и Игнац Брюль играли симфонию друзьям на двух фортепиано, Клара Шуман и позднейший биограф Брамса Макс Кальбек, среди прочих, отреагировали с неприятием. Говорят, Эдуард Ганслик воскликнул: «На протяжении всей части я чувствовал, будто меня избивают два ужасно умных человека». Елизавета фон Герцогенберг описала произведение как «маленький мир для умных и знающих, в котором люди, блуждающие во тьме, могли бы иметь лишь малую долю». Когда Брамс присутствовал на исполнении симфонии в 1897 году, незадолго до своей смерти, он получил бурные аплодисменты венской публики, которые произведение получает и по сей день."
 elgar.1071.t: "Симфония № 5"
 elgar.1071.f: "Как и некоторые другие симфонии Малера, 5-я симфония не была понята после премьеры. В 1905 году, после неудачного исполнения в Гамбурге, Малер жаловался: «Пятая — проклятое произведение. Никто её не понимает». Музыкальные рецензии в годы после премьеры были в основном отрицательными. Музыкальный критик Фердинанд Пфоль, например, счёл 5-ю симфонию одним из слабейших произведений Малера. Только «Новая музыкальная газета» дала симфонии благожелательный отзыв и говорила о «подавляющем богатстве красоты». Особенно в сравнении с 4-й симфонией, написанной двумя годами ранее, она представляет собой большое различие в содержании и форме. С более грубым звуковым миром 5-й симфонии Малер начинает новый творческий этап, который получает дальнейшее развитие в следующей 6-й симфонии. Только после смерти Малера произведение стало цениться всё больше и больше."
 elgar.1072.t: "Песнь о земле"
 elgar.1072.f: "«Неужели это тот же человек, который, „в гармонии с бесконечностью“, воздвиг здание Восьмой, которого мы теперь находим в застольной песне о земных горестях? Который одиноко крадётся осенью к своему любимому месту упокоения, жаждя отдохновения? Который смотрит на молодость с дружелюбным взглядом старости, с нежным волнением на красоту? Который ищет забвения бессмысленного земного существования в пьянстве и, наконец, прощается в меланхолии? (...) Едва ли это тот же человек и композитор. Все произведения до этого момента возникали из чувства жизни (...) Земля исчезает, дует другой воздух, светит другой свет. (...) Когда я принёс ему автограф, почти не в силах сказать о нём ни слова, он открыл „Прощание“ и сказал: „Как вы думаете? Это вообще выносимо? Не покончат ли люди с собой после этого?“ Затем он указал на ритмические трудности и спросил в шутку: „Есть идеи, как это дирижировать? У меня нет!“» — Бруно Вальтер."
 elgar.1073.t: "Песни об умерших детях"
 elgar.1073.f: "«Я вполне могу понять, что сочиняют такие ужасные стихи, когда нет детей или когда потеряли детей. Но я не могу понять, как можно петь о смерти детей, если полчаса назад обнимал и целовал их, счастливых и здоровых!» — Альма Малер-Верфель, жена Густава Малера."
 elgar.1081.t: "Фортепианный концерт № 3"
 elgar.1081.f: "«В то время Малер был единственным дирижёром, которого я считал достойным стоять в одном ряду с Никишем. Он посвятил себя концерту до тех пор, пока аккомпанемент, довольно сложный, не был доведён до совершенства, хотя он уже провёл ещё одну долгую репетицию. По словам Малера, каждая деталь партитуры была важна — слишком редкое отношение среди дирижёров. ...Хотя репетиция должна была закончиться в 12:30, мы играли и играли далеко за это время, и когда Малер объявил, что первая часть будет репетироваться снова, я ожидал какого-то протеста или сцены от музыкантов, но не заметил ни единого признака раздражения. Оркестр сыграл первую часть с живым или, возможно, даже более пристальным вниманием, чем в предыдущий раз», — Сергей Рахманинов."
 elgar.1082.t: "Рапсодия на тему Паганини"
 elgar.1082.f: "Произведение состоит из 24 вариаций на тему, которую сам Никколо Паганини использовал как отправную точку для серии вариаций. Эта мелодия неоднократно служила образцом для различных композиторов, включая Иоганнеса Брамса и Ференца Листа. В некоторых вариациях Рахманинов использует другую, гораздо более древнюю мелодию: секвенцию «Dies irae», некогда неотъемлемую часть латинской заупокойной мессы. Рахманинов снова и снова использовал эту тему в своих произведениях. Она появляется во всех симфониях, «Симфонических танцах», симфонической поэме «Остров мёртвых» и первой фортепианной сонате. Сочетание темы Паганини с «Dies irae» побуждает к поиску программной подоплёки произведения. Согласно легенде, великий скрипач продал свою душу дьяволу, чтобы достичь совершенства на своём инструменте и любви женщины. Мотив «Dies irae» символизирует дьявола, а тема Паганини — самого композитора-скрипача."
 elgar.1083.t: "Симфония № 3"
 elgar.1083.f: "«Она исполнялась в Нью-Йорке, Филадельфии, Чикаго и т. д. На первых двух исполнениях я присутствовал. Она была исполнена великолепно. Её приём как публикой, так и критиками был кислым. Одна рецензия больно врезалась мне в память: что во мне больше нет Третьей симфонии. Лично я твёрдо убеждён, что это хорошее произведение. Но — иногда и композиторы ошибаются! Как бы то ни было, я пока придерживаюсь своего мнения», — Сергей Рахманинов."
 elgar.1091.t: "Ромео и Джульетта"
 elgar.1091.f: "«Ромео и Джульетта» — самый длинный и известный балет Сергея Прокофьева, который по праву считается его самым важным вкладом в этот жанр. Он считается вершиной его музыкального творчества. Богатая и разнообразная инструментовка, а также ритмическая сложность партитуры до сих пор представляют собой вызов для оркестра и танцоров. В некоторых местах диссонансы граничат с атональностью. Знаменитый «Танец рыцарей» с его пунктирными ритмами теперь более известен как квазисимфоническая тема. В отличие от этого, темы, связанные с пробуждением любви Джульетты, одновременно нежны и по-юношески живы. Прокофьев повторно использовал музыку из балета в трёх сюитах для оркестра и сольном фортепианном произведении."
 elgar.1092.t: "Поручик Киже"
 elgar.1092.f: "Музыка к «Поручику Киже» изначально была написана для сопровождения одноимённого фильма. Это была первая попытка Прокофьева в киномузыке и его первый заказ. В ранние дни звукового кино, среди различных выдающихся композиторов, готовых попробовать свои силы в киномузыке, Прокофьев не был очевидным выбором для заказа. Проживая в Париже почти десять лет, он имел репутацию экспериментатора и диссонанса. Вскоре после выхода фильма Прокофьев получил приглашение от Московского радиосимфонического оркестра создать оркестровую сюиту из своей музыки к фильму «Киже» — вероятно, это был первый случай адаптации киномузыки в значительное музыкальное произведение. Когда Прокофьев был в США на премьере в Бостоне, его очень домогались кинопродюсеры, но, хотя он был польщён и привлечён их предложениями, он так и не написал ни одной голливудской киномузыки."
 elgar.1093.t: "Петя и волк"
 elgar.1093.f: "«Петя и волк» — это «симфоническая сказка для детей». Это самое часто исполняемое произведение Прокофьева и одно из самых часто исполняемых произведений во всём классическом репертуаре. Рассказчик повествует детскую сказку, а оркестр иллюстрирует её, используя разные инструменты для исполнения «темы», представляющей каждого персонажа истории: «Каждый персонаж этой сказки представлен соответствующим инструментом в оркестре: птичка — флейтой, утка — гобоем, кошка — кларнетом, играющим стаккато в низком регистре, дедушка — фаготом, волк — тремя валторнами, Петя — струнным квартетом, выстрелы охотников — литаврами и большим барабаном. Перед оркестровым исполнением желательно показать эти инструменты детям и сыграть на них соответствующие лейтмотивы. Таким образом, дети учатся различать звуки инструментов во время исполнения этой сказки»."
 elgar.1101.t: "Летучая мышь"
 elgar.1101.f: "«Летучая мышь» Иоганна Штрауса считается одной из вершин эпохи оперетты. Наряду с «Цыганским бароном» и «Ночью в Венеции», «Летучая мышь» — одна из трёх самых известных оперетт Штрауса, а также одна из немногих оперетт, которые регулярно ставятся в крупных международных оперных театрах. Тексты легко запоминаются и полны иронии с вечными истинами. Говорят, что основные части музыки были созданы за 42 дня. Увертюра, написанная в свободной сонатной форме, занимает особое место и является одним из величайших творений Иоганна Штрауса. Она суммирует многочисленные музыкальные hoogtepunten всего произведения и, благодаря своей разнообразной динамике, всегда является вызовом даже для лучших оркестров."
 elgar.1102.t: "На прекрасном голубом Дунае"
 elgar.1102.f: "Вальс «На прекрасном голубом Дунае» (часто сокращаемый до: «Дунайский вальс») композиционно основан на мелодиях, которые Иоганн Штраус уже использовал в более ранних произведениях. Уже на премьере он вызвал восторг у публики. Из-за большого количества новых музыкальных релизов в карнавальный сезон того времени вальс поначалу не прижился. Однако, поскольку Штраус в том же году выступал в Париже на Всемирной выставке 1867 года и создавал для неё новые композиции, он вспомнил и включил этот вальс в программу. Под названием Le beau Danube bleu произведение имело большой успех во время этой выставки. Предполагается, что опубликованные издания вальса, особенно версия для фортепиано в две руки, были проданы почти 1 000 000 раз за короткий период времени. Вальс считается неофициальным гимном Австрии и одним из самых популярных произведений во всей истории классической музыки."
 elgar.1103.t: "Ночь в Венеции"
 elgar.1103.f: "«Ночь в Венеции» — это «комическая оперетта» в трёх действиях. Действие происходит в Венеции примерно в середине XVIII века и представляет собой комедию переодеваний и путаницы с любовными интригами между двумя классами. Как и многие другие венские оперетты, либретто является адаптацией французской комической оперы. Премьера в Берлине провалилась. Частично это было связано с запутанным сюжетом, а частично — с лежащими в основе текстами. Поэтому произведение было переработано для премьеры в Театре ан дер Вин. Увертюра также была переработана Штраусом. Самыми известными музыкальными номерами являются лагунный вальс и гондольная песня. В 1923 и снова в 1931 году она была значительно переработана Эрихом Вольфгангом Корнгольдом; ещё одна версия была написана Вальтером Фельзенштейном в 1954 году; оригинальная версия сейчас исполняется очень редко."
 elgar.1111.t: "Риголетто"
 elgar.1111.f: "«Риголетто» — опера Джузеппе Верди на либретто Франческо Марии Пьяве. Она основана на мелодраме Виктора Гюго «Король забавляется». Опера изначально была подвергнута критике цензорами; поэтому Верди и Пьяве пришлось, среди прочего, изменить первоначально предполагаемое название и перенести действие из Парижа в Мантую. Однако существенные для Верди элементы, такие как искалеченный главный герой Риголетто и мешок, в который кладут его умирающую дочь, остались нетронутыми. Опера считается первым шедевром Верди и принесла ему мировую известность. Сам Верди считал «Риголетто» одним из своих самых совершенных произведений, и, в отличие от других опер Верди, у него нет редакций или новых версий. «Риголетто» имел ошеломляющий успех на премьере и в последующие несколько лет исполнялся почти во всех европейских оперных театрах. Опера входит в репертуар многих оперных театров уже более 160 лет и остаётся одной из самых часто исполняемых итальянских опер."
 elgar.1112.t: "Травиата"
 elgar.1112.f: "«Травиата» — опера Джузеппе Верди и Франческо Марии Пьяве по роману Александра Дюма-сына «Дама с камелиями». Как и ранее в «Риголетто» и «Трубадуре», Верди поместил в центр действия человека, изгнанного и отвергнутого обществом. Опера о куртизанке, умирающей от туберкулёза, была скандальным новшеством для того времени. Произведение провалилось на премьере, хотя Верди сам его ставил и, в качестве меры предосторожности, перенёс действие во времена Людовика XIV. После переработки Верди снова поставил её год спустя — после чего она стала одной из самых успешных опер в истории музыки. В некоторых странах это самая исполняемая опера за всю историю. По количеству сделанных записей «Травиату» превосходит только «Аида». По цензурным соображениям опера также исполнялась в Италии под названием «Виолетта»."
 elgar.1113.t: "Реквием"
 elgar.1113.f: "Под впечатлением от смерти Джоаккино Россини в 1868 году Джузеппе Верди пригласил двенадцать самых важных композиторов Италии того времени для совместного написания заупокойной мессы, так называемой «Мессы по Россини». Сам он взял на себя написание заключительной части, «Libera me», в этом реквиеме. Однако исполнение не состоялось из-за неблагоприятных обстоятельств. Верди снова обратился к материалу реквиема после смерти поэта Алессандро Мандзони в 1873 году. Верди глубоко восхищался высокоуважаемым Мандзони. Он предложил городу Милану сочинение мессы, которая будет исполнена через год после смерти Мандзони. «Libera me» из мессы по Россини теперь стала ядром нового реквиема по Мандзони. Настройка «Dies irae» из старой композиции была использована трижды для пассажей секвенции с тем же или похожим текстом. Первое исполнение в церкви Сан-Марко в Милане 22 мая 1874 года ознаменовало первую годовщину смерти Мандзони. Дирижировал сам Верди."
 elgar.1121.t: "Послеполуденный отдых фавна"
 elgar.1121.f: "«Музыка этого прелюда — очень свободная иллюстрация прекрасной поэмы Малларме. Она ни в коем случае не претендует на то, чтобы быть её синтезом. Скорее, это последовательность сцен, через которые проходят желания и мечты фавна в жару полудня. Затем, устав от преследования робкого бегства нимф и наяд, он поддаётся опьяняющему сну, в котором он может, наконец, осуществить свои мечты о владении во вселенской Природе».\n\n«Послеполуденный отдых фавна» — симфоническая поэма для оркестра и одно из самых известных произведений Дебюсси. Произведение считается поворотным моментом в истории западной художественной музыки, а также шедевром импрессионистской композиции. Пьер Булез считал партитуру началом современной музыки, отмечая, что «флейта фавна принесла новое дыхание в искусство музыки»."
 elgar.1121.g: "Предаться неге, мечтать, наслаждаться бесконечным мгновением..."
 elgar.1122.t: "Море"
 elgar.1122.f: "«Вчерашний концерт начался с множества импрессионистических мазков, беспорядочно нанесённых на тональную палитру, без какой-либо мысли о форме или цели, кроме как создать новые сочетания звуков. … Одно было несомненно: океан композитора был лягушачьим прудом, и некоторые из его обитателей попали в горло каждому из медных духовых инструментов».\n\nНаписанное между 1903 и 1905 годами, «Море» было впервые исполнено в Париже в октябре 1905 года. Поначалу оно не было хорошо принято. Даже некоторые из тех, кто был ярым сторонником творчества Дебюсси, не проявили энтузиазма, хотя произведение представляло три ключевых аспекта эстетики Дебюсси: импрессионизм, символизм и японизм. В десятилетия после премьеры «Море» утвердилось в основном оркестровом репертуаре."
 elgar.1123.t: "Пеллеас и Мелизанда"
 elgar.1123.f: "«Как учитель он был педантом — это единственное слово. Настоящим педантом… В нём был стержень гнева и горечи — я часто думаю, что он был похож на Голо в „Пеллеасе“, и всё же он не был им. Он был — это во всей его музыке — очень чувственным человеком. Казалось, никто его не любил. Жан Перье, игравший Пеллеаса моей Мелизанде, бледнел от гнева, если вы упоминали имя Дебюсси…»\n\n«Пеллеас и Мелизанда» — опера в пяти действиях. Жанровое название композитора Клода Дебюсси — «лирическая драма». Текст представляет собой адаптацию пьесы Мориса Метерлинка «Пеллеас и Мелизанда». Дебюсси избегал арий и больших сольных сцен, что придавало тексту реалистичный характер. «Пеллеас» должен был стать единственной завершённой оперой Дебюсси. По этой причине её иногда сравнивают с «Фиделио» Бетховена."
 elgar.1131.t: "Лебединое озеро"
 elgar.1131.f: "«Лебединое озеро» — всемирно известный балет на музыку Петра Ильича Чайковского, премьера которого состоялась в 1877 году в Большом театре в Москве и который входит в стандартный репертуар классических балетных трупп. В «Лебедином озере» можно найти общие мотивы из многочисленных сказок: в частности, несчастная заколдованная принцесса, которую спасает любовь принца. Несчастливый конец оригинального либретто также является известным сказочным мотивом девушки-лебедя. Чайковский использовал для партитуры «Лебединого озера» предыдущие сочинения. По словам двух родственников Чайковского, композитор ранее создал небольшой балет под названием «Озеро лебедей» в их доме в 1871 году. Этот балет включал знаменитый лейтмотив. Он также использовал материал из «Воеводы», оперы, от которой он отказался в 1868 году. К апрелю 1876 года партитура была завершена, и начались репетиции. Вскоре хореограф Рейзингер начал откладывать некоторые номера, которые он назвал «нетанцевабельными». Рейзингер даже начал ставить танцы на музыку других композиторов, но Чайковский запротестовал, и его произведения были восстановлены."
 elgar.1132.t: "Симфония № 6 «Патетическая»"
 elgar.1132.f: "«Я сейчас полностью занят новым произведением… и мне трудно от него оторваться. Я верю, что оно получается лучшим из моих произведений. Я должен закончить его как можно скорее, потому что мне нужно уладить много дел, и я скоро должен ехать в Лондон. Я говорил вам, что закончил симфонию, которая мне внезапно не понравилась, и я её разорвал. Теперь я сочинил новую симфонию, которую я, конечно, не разорву».\n\nЧерез два года после премьеры своей Симфонии № 5 ми минор, соч. 64, Чайковский планировал, как он писал другу, «написать великолепную симфонию, которая станет краеугольным камнем всего моего творчества». Композитор назвал произведение «Страстная симфония». Характерной чертой произведения является медленная финальная часть — необычная для симфоний — конец которой напоминает реквием."
 elgar.1133.t: "Скрипичный концерт ре мажор"
 elgar.1133.f: "Скрипичный концерт ре мажор — единственный скрипичный концерт русского композитора Петра Ильича Чайковского. Чайковский написал концерт в марте и апреле 1878 года в Кларане, винодельческом городке на Женевском озере. Там он восстанавливался после депрессии и тяжёлого нервного срыва. Положительное влияние его пребывания отразилось в концерте, в котором проявилась его вновь обретённая радость жизни. Работа над композицией была завершена через три недели, хотя Чайковский заменил первоначально запланированную среднюю часть на анданте, известное как «Канцонетта». Музыкальные критики отреагировали на произведение отрицательно. Чайковский отреагировал спокойно и был убеждён, что концерт восторжествует. По сей день это один из самых известных, самых исполняемых и самых играемых скрипичных концертов в мире."
 elgar.1141.t: "Торжественные и церемониальные марши"
 elgar.1141.f: "«Торжественные и церемониальные военные марши» — это серия из пяти (или шести) маршей для оркестра. Они включают в себя некоторые из самых известных произведений Элгара. Самый известный из шести маршей, Марш № 1 ре мажор, был впервые исполнен вместе с Маршем № 2 в Ливерпуле 19 октября 1901 года. Элгар и его жена присутствовали, и это был «бешеный» успех. Трио содержит мелодию, известную как «Земля надежды и славы». В 1902 году мелодия была повторно использована в изменённом виде для части «Земля надежды и славы» его Коронационной оды для короля Эдуарда VII. Слова были дополнительно изменены, чтобы соответствовать оригинальной мелодии, и результат с тех пор стал неотъемлемой частью «Последней ночи променадных концертов», а также английским спортивным гимном и общей патриотической песней."
 elgar.1141.g: "Земля надежды и славы!"
 elgar.1142.t: "Корона Индии"
 elgar.1142.f: "«Корона Индии» — это маска, пышное театральное представление, поставленное в 1912 году в честь визита в предыдущем декабре короля Георга V и королевы Марии в Дели для их коронации в качестве императора и императрицы Индии. Для этой маски английский композитор сэр Эдвард Элгар написал музыку на либретто Генри Гамильтона. Маска состояла из двух картин: «Города Индии» и «Ave Imperator!». Позже Элгар извлёк пять пьес и добавил интермеццо для скрипки соло, чтобы создать сюиту «Корона Индии». Сюита сразу же завоевала популярность: при жизни Элгара на BBC было 102 её живых исполнения."
 elgar.1143.t: "Энигма-вариации"
 elgar.1143.f: "«Энигма-вариации» — это оркестровое произведение, описывающее людей из окружения Элгара в 14 вариациях. Они сделали Элгара всемирно известным после премьеры под управлением дирижёра Ганса Рихтера. «Энигма» из названия относится не к тому, какая вариация посвящена какому другу, а к другой загадке. По словам Элгара, через всю композицию проходит другая, более крупная тема, но она не играется, а настоящая тема написана как контрапункт к ней. До сих пор выдвигались различные теории. Особую популярность приобрела 9-я вариация («Нимрод»)."
 elgar.1151.t: "Симфония № 9"
 elgar.1151.f: "В 1892 году Дворжак переехал в США и стал директором Национальной консерватории музыки Америки в Нью-Йорке. Находясь в США, Дворжак написал одно из своих самых успешных оркестровых произведений: симфонию «Из Нового Света», которая принесла ему мировую известность. Говорят, что Дворжака вдохновили «широкие просторы» Америки, такие как прерии, которые он мог видеть во время своей поездки в Айову летом 1893 года. Дворжак также находился под влиянием стиля и техник, используемых более ранними композиторами-классиками, включая Бетховена и Шуберта. Нисходящие кварты и удары литавр в скерцо «Симфонии из Нового Света» напоминают скерцо 9-й симфонии Бетховена. На премьере в Карнеги-холле конец каждой части встречался бурными аплодисментами, и Дворжак был вынужден вставать и кланяться."
 elgar.1152.t: "Славянские танцы"
 elgar.1152.f: "«Славянские танцы» — это сборник из 16 инструментальных пьес Антонина Дворжака, написанных для фортепиано в четыре руки и вскоре после этого аранжированных для оркестра. Они являются одними из самых известных произведений чешского композитора. В композициях Дворжака используются характерные ритмические рисунки богемских и моравских народных танцев, а также танцев соседних стран. Однако это всё же полностью самостоятельные творения композитора. В первом ряду — два фурианта, характеризующиеся сменой ритма, две соуседские, похожие на лендлер, две скочные (быстрый прыжковый танец), одна полька и, как единственный нечешский танец, украинская думка. Во второй серии преобладают нечешские танцы, за что Дворжак подвергся некоторой враждебности. Его обвиняли в том, что он недостаточно идентифицирует себя со своей родиной и вместо этого хочет стать популярным за границей."
 elgar.1153.t: "Русалка"
 elgar.1153.f: "«Русалка» — самая успешная опера Антонина Дворжака. Она была создана по либретто Ярослава Квапила и восходит к славянским народным мифам о русалках (водяных духах) и похожа на немецкую повесть «Ундина» Фридриха де ла Мотт Фуке, сказку Ганса Христиана Андерсена «Русалочка» и старофранцузскую сагу о Мелюзине. Опера с подзаголовком «Лирическая сказка» также известна как «чешская Ундина». Наряду с «Проданной невестой» Бедржиха Сметаны, «Русалка» — самая известная чешская опера. Опера «Русалка» занимает видное место в развитии чешской драматической музыки."
 elgar.1161.t: "Фантазия до мажор"
 elgar.1161.f: "Фантазия до мажор — одно из важнейших фортепианных произведений Роберта Шумана. Наряду с «Крейслерианой» и «Детскими сценами», это одно из самых известных произведений композитора и входит в ядро романтической фортепианной литературы. Он посвятил её Ференцу Листу, восхищённому виртуозу, который годы спустя отблагодарил его, посвятив ему свою великую сонату си-минор. Визионерский размах этой фортепианной фантазии и мощь, сохраняющаяся на протяжении всей композиции, напоминают об архитектурном мастерстве Людвига ван Бетховена, из чьего песенного цикла «К далёкой возлюбленной» Шуман несколько раз цитирует в первой части, а в третьей части использует тему из аллегретто 7-й симфонии."
 elgar.1162.t: "Фортепианный концерт ля минор"
 elgar.1162.f: "Фортепианный концерт ля минор, соч. 54 — это романтический сольный концерт для фортепиано и оркестра, написанный в период высокого романтизма. Он несёт в себе многие черты романтической эпохи. Как и некоторые другие фортепианные концерты XIX века, концерт ля минор имеет симфонический характер. Поскольку произведение изначально было задумано как фантазия, весь концерт пронизан романтическими и фантастическими впечатлениями. Шуману потребовалось более пяти лет для его запоздалого завершения. На титульном листе автографа Шуман указывает на разное время написания частей. Основные идеи произведения — тоска и счастье двух влюблённых. В этом произведении Шуман переводит свою борьбу за Клару Вик в музыку. Главная тема первой части похожа на мелодию арии Флорестана из оперы Бетховена «Фиделио». В соответствии с Бетховеном, эта тема у Шумана также символизирует супружескую верность и борьбу за свободу."
 elgar.1163.t: "Детские сцены"
 elgar.1163.f: "«Детские сцены» — это цикл Роберта Шумана, состоящий из тринадцати коротких фортепианных пьес. В отличие от «Альбома для юношества», это пьесы, которые были написаны не для детей, а, по собственным словам Шумана, как «отражение взрослого для взрослых». Самая известная и длинная пьеса в цикле — «Грёзы». С продолжительностью чуть менее 20 минут «Детские сцены» сегодня являются одними из самых популярных романтических фортепианных произведений. Хотя при жизни Шумана «Детские сцены» не имели особого успеха, по крайней мере для него это произведение имело особое значение. Переписка 1839 года показывает, что Шуман в то время твёрдо верил в возможность брачного союза с Кларой Вик и что «Детские сцены» возникли из его оптимистичной и жизнерадостной стороны."
 elgar.1171.t: "Скрипичный концерт ми минор"
 elgar.1171.f: "Скрипичный концерт ми минор Феликса Мендельсона — его последний концерт. Хорошо принятый на премьере, он остаётся одним из самых выдающихся и высоко ценимых скрипичных концертов. Он занимает центральное место в скрипичном репертуаре и заработал репутацию необходимого концерта, который должен освоить каждый начинающий концертный скрипач, и обычно одного из первых концертов эпохи романтизма, которые они изучают. Само произведение было одним из ведущих скрипичных концертов эпохи романтизма и оказало влияние на многих других композиторов. Хотя концерт состоит из трёх частей в стандартной структуре «быстро-медленно-быстро» и каждая часть следует традиционной форме, он был новаторским и включал много новых для своего времени черт. Отличительные аспекты включают почти немедленное вступление скрипки в начале произведения, а не после оркестрового предварения основных тем первой части, как это было типично для концертов эпохи классицизма."
 elgar.1181.t: "Этюды"
 elgar.1181.f: "Фредерик Шопен написал в общей сложности 27 этюдов для фортепиано: 12 этюдов, соч. 10 (опубликованы в 1833 г.), 12 этюдов, соч. 25 (опубликованы в 1837 г.) и ещё три этюда для третьей части (Études de perfectionnement pour le piano, опубликованы в 1840 г.) фортепианной школы «Метод методов» Игнаца Мошелеса и Франсуа-Жозефа Фетиса. Три этюда позже были опубликованы отдельно под названием «Три новых этюда». Как «Великая хартия фортепианной игры» (Карл Шуман), они являются одними из самых важных фортепианных произведений в истории музыки. Великие фортепианные композиторы, такие как Алькан, Скрябин, Дебюсси и Рахманинов, ориентировались на них. Ференц Лист и Юзеф Венявский были первыми пианистами, публично исполнившими этюды Шопена."
 elgar.1191.t: "Жизнь за царя"
 elgar.1191.f: "После многих лет прослушивания певцов, ухаживания за женщинами с помощью своей музыки и встреч со знаменитыми людьми, включая Мендельсона, Берлиоза и Листа, Глинка понял, что его жизненная миссия — вернуться в Россию, писать в русской манере и сделать для русской музыки то, что Доницетти и Беллини сделали для итальянской. «Жизнь за царя» была первой из двух великих опер Глинки. Первоначально она называлась «Иван Сусанин». Действие происходит в 1612 году, и она рассказывает историю русского крестьянина и патриотического героя Ивана Сусанина, который жертвует своей жизнью за царя, заведя в заблуждение группу мародёрствующих поляков, которые охотились за ним. С этой оперой Глинке удалось создать независимую русскую музыку; она считается первой русской оперой."
 elgar.1192.t: "Руслан и Людмила"
 elgar.1192.f: "«Руслан и Людмила» — «фантастическая опера» в пяти действиях на музыку Михаила Глинки с либретто Нестора Кукольника и других по одноимённой поэме Александра Сергеевича Пушкина. Смерть Пушкина на знаменитой дуэли помешала ему написать либретто самому, как планировалось. Как и в «Жизни за царя», в «Руслане» используются некоторые аспекты русской народной музыки; она также известна творческим использованием диссонанса, хроматизма и восточных элементов. Особое значение имеет первое в русской музыке использование целотонной гаммы. Задорная увертюра является одним из самых известных оркестровых произведений на Западе и известна как кошмар для басистов."
 elgar.1193.t: "Камаринская"
 elgar.1193.f: "«Камаринская» — традиционный русский народный танец, который сегодня в основном известен как одноимённая композиция русского композитора Михаила Глинки. «Камаринская» Глинки, написанная в 1848 году, была первым оркестровым произведением, полностью основанным на русской народной песне и использующим композиционные принципы этого жанра для диктовки формы музыки. Она стала эталоном для следующего поколения русских композиторов, от ориентированного на Запад Петра Ильича Чайковского до группы националистов, известных как «Могучая кучка», и была также высоко оценена за рубежом, в частности французским композитором Гектором Берлиозом. Для Чайковского «Камаринская» стала наглядным примером творческих возможностей народных песен в симфонической структуре, с использованием разнообразных гармонических и контрапунктических комбинаций."
 elgar_great_composer: "Великий композитор"
 elgar_great_composer_desc: "Великие композиторы — это сливки композиторского общества. Они лучшие из лучших и известны во всём мире."
