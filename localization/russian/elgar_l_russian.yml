 elgar.202.g: "Наградить победителей."
 elgar.1201.t: "Дафнис и Хлоя"
 elgar.1201.f: "«Дафнис и Хлоя» — это хореографическая симфония для оркестра и хора без слов. Она состоит из трёх основных частей и дюжины сцен, большинство из которых — танцы, и длится чуть меньше часа, что делает её самым длинным произведением композитора. По сути, это балет, и он был впервые представлен именно в таком виде. Танцевальный сценарий был адаптирован хореографом Михаилом Фокиным из пасторального романа греческого писателя Лонга, датируемого II веком н. э. «Дафнис и Хлоя» — самое длинное произведение Равеля. Четыре различимых лейтмотива придают ему музыкальное единство. Музыка, одна из самых страстных у композитора, по праву считается одной из его лучших, с необычайно пышными гармониями, типичными для импрессионистского движения; ещё при жизни композитора комментаторы описывали её как его шедевр для оркестра."
 elgar.1202.t: "Испанская рапсодия"
 elgar.1202.f: "Написанная между 1907 и 1908 годами, «Рапсодия» является одним из первых крупных произведений Равеля для оркестра. Впервые она была исполнена в Париже в 1908 году и быстро вошла в международный репертуар. Произведение опирается на испанское наследие композитора и является одним из нескольких его произведений, действие которых происходит в Испании или отражает её. Премьера «Рапсодии» состоялась 15 марта 1908 года в Театре Шатле в исполнении Оркестра концертов Колонна под управлением Эдуара Колонна. Критический приём был в целом благоприятным. Несогласными были Пьер Лало, который habitually не любил музыку Равеля, и Гастон Карро, который назвал партитуру «скудной, непоследовательной и мимолётной». В остальном было много похвал за тонкую и свежую оркестровку и живописность музыки."
 elgar.1203.t: "Болеро"
 elgar.1203.f: "«Я создал только один шедевр — это „Болеро“; к сожалению, в нём нет музыки», — Морис Равель."
 elgar.1211.t: "Додекафония"
 elgar.1211.f: "Додекафония — это метод музыкальной композиции. Эта техника гарантирует, что все 12 нот хроматической гаммы звучат в произведении одинаково часто, предотвращая выделение какой-либо одной ноты за счёт использования тональных рядов. Таким образом, всем 12 нотам придаётся более или менее одинаковое значение, и музыка избегает тональности. Со временем эта техника приобрела огромную популярность и в конечном итоге оказала широкое влияние на композиторов XX века. Обычно её считают формой сериализма."
 elgar.1211.g: "Не уверен, что это была хорошая идея."
 elgar.1212.t: "Струнный квартет № 2"
 elgar.1212.f: "Это произведение в четырёх частях было написано в очень эмоциональный период в жизни Шёнберга. Третья и четвёртая части довольно необычны для струнного квартета, поскольку в них также участвует сопрано, использующее стихи Стефана Георге. О работе с Георге сам Шёнберг позже писал: «Меня вдохновили стихи Стефана Георге, немецкого поэта, на создание музыки к некоторым из его стихотворений, и, к моему удивлению, без каких-либо ожиданий с моей стороны, эти песни показали стиль, совершенно отличный от всего, что я писал ранее. … Были созданы новые звуки, появился новый вид мелодии, был открыт новый подход к выражению настроений и характеров»."
 elgar.1212.g: "Прекрасно! Но можно ли пока прекратить эту «музыку»?"
 elgar.1213.t: "Камерная симфония № 1"
 elgar.1213.f: "Первая камерная симфония Шёнберга была закончена в 1906 году и впервые исполнена 8 февраля 1907 года в Вене квартетом Розе вместе с духовым ансамблем Венской филармонии под управлением композитора. В 1913 году Шёнберг снова дирижировал этим произведением в рамках знаменитого «Скандального концерта», на котором неортодоксальные тональности симфонии Шёнберга и, в большей степени, произведений его ученика Альбана Берга, вызвали бунт протеста у публики и преждевременное завершение концерта."
 elgar.1213.g: "Это никогда не закончится?"
 elgar.1221.t: "Жар-птица"
 elgar.1221.f: "«Жар-птица» — балет и оркестровое концертное произведение, основанное на русских сказках о Жар-птице и о благословении и проклятии, которые она несёт своему владельцу. Смертные и сверхъестественные элементы балета различаются с помощью системы лейтмотивов, помещённых в гармонию, названную «лейтгармонией». Стравинский намеренно использовал многие специальные приёмы в оркестре, включая ponticello, col legno, flautando, glissando и фруллато. Действие балета происходит в замке злого бессмертного Кощея, и он повествует о князе Иване, который сражается с Кощеем с помощью волшебной Жар-птицы."
 elgar.1222.t: "Петрушка"
 elgar.1222.f: "«Петрушка» был написан для парижского сезона 1911 года Русских балетов Сергея Дягилева. Балет рассказывает историю любви и ревности трёх кукол. Их оживляет Шарлатан во время Масленицы 1830-х годов в Санкт-Петербурге. «Петрушка» объединяет музыку, танец и оформление в единое целое. Это одна из самых популярных постановок Русских балетов. Сегодня её обычно исполняют с использованием оригинального оформления и хореографии. Произведение характеризуется так называемым «аккордом Петрушки», битональным приёмом, предвещающим появление главного героя."
 elgar.1223.t: "Весна священная"
 elgar.1223.f: "«Весна священная» — балет и оркестровое концертное произведение русского композитора Игоря Стравинского. Оно было написано для парижского сезона 1913 года Русских балетов Сергея Дягилева; оригинальная хореография была поставлена Вацлавом Нижинским, а сценография и костюмы — Николаем Рерихом. При первом исполнении в Театре Елисейских полей 29 мая 1913 года авангардный характер музыки и хореографии вызвал сенсацию. Многие назвали реакцию в первую ночь «бунтом» или «почти бунтом», хотя эта формулировка появилась только в рецензиях на более поздние исполнения более десяти лет спустя. Хотя произведение было задумано как сценическое, с определёнными пассажами, сопровождающими персонажей и действие, музыка получила равное, если не большее, признание как концертное произведение и по праву считается одним из самых влиятельных музыкальных произведений XX века."
