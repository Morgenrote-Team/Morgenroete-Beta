 elgar.801.m: "[SCOPE.GetRootScope.GetCountry.GetCustom('elgar_internationale_anthem')]"
 elgar.802.t: "Устаревший гимн"
 elgar.802.d: "После недавних изменений в законодательстве предыдущий национальный гимн больше не кажется уместным. Многие воспринимают его как анахроничный пережиток ушедшей политической системы. Давление с целью избавиться от этого наследия растёт."
 elgar.802.f: "«У нас есть адмирал без флота. Он правит страной без побережья. Это королевство без короля»."
 elgar.802.g: "Этот гимн больше не представляет нашу страну."
 elgar.803.t: "Реакционный гимн"
 elgar.803.d: "Голоса, призывающие отменить предыдущий национальный гимн, становятся всё громче. Высокопоставленные политики вместо этого призывают к созданию нового произведения, которое более чётко подчеркнёт достижения современного государства, которое представляет [ROOT.GetCountry.GetNameNoFormatting]."
 elgar.803.f: "«Вперёд, народ, к искуплению\nКрасный флаг, красный флаг\nВперёд, народ, к искуплению\nКрасный флаг восторжествует.\nКрасный флаг восторжествует,\nКрасный флаг восторжествует,\nКрасный флаг восторжествует,\nДа здравствуют коммунизм и свобода»."
 elgar.811.t: "Гимн [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]"
 elgar.811.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] издал[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] указ о том, что на официальных мероприятиях должно исполняться определённое музыкальное произведение. Выбор пал на..."
 elgar.821.t: "Музыка для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]"
 elgar.821.d: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] [SelectLocalization(GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.IsFemale, 'поинтересовалась', 'поинтересовался')], есть ли какие-либо особые пожелания относительно сочиняемого произведения и какой аспект заслуживает особого внимания."
 elgar.821.f: "Существует всего пять категорий национальных гимнов. Монархические гимны повышают легитимность, народные — снижают недовольство, ценностные — повышают лояльность при лучших условиях жизни и в то же время делают граждан более устойчивыми к ухудшению, а военные — укрепляют обороноспособность нации. Советские республики могут заказывать рабочие гимны, которые увеличивают политическую силу профсоюзов. В зависимости от формы правления возможен не каждый гимн."
 elgar.821.g: "Гимн должен восхвалять нашего монарха."
 elgar.821.h: "Популярная народная песня призвана связать правительство и народ."
 elgar.821.i: "Сочинить возвышенный гимн, представляющий ценности нашей страны."
 elgar.821.j: "Нам нужна песня, которая будет мотивировать наш народ в бою!"
 elgar.821.k: "Приемлема только рабочая песня, прославляющая пролетариат."
 elgar.822.t: "Мелодия гимна готова"
 elgar.822.d: "Маэстро [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] сегодня представил[SelectLocalization(GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.IsFemale, 'а', '')] партитуру своего предложения для возможного нового национального гимна. Пока неясно, примет ли их государство на самом деле."
 elgar.822.f: "Существовало множество гимнов, которые так и не стали национальными. Причины этого разнообразны. Государство всё ещё должно их утвердить. Кроме того, национальные гимны, имеющие как оригинальную мелодию, так и текст, являются более сильными."
 elgar.822.g: "Надеюсь, он найдёт признание у народа..."
 elgar.831.t: "Текст гимна готов"
 elgar.831.d: "[GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetFullName] давно размышлял[SelectLocalization(GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.IsFemale, 'а', '')] о том, что [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] могут понадобиться достойные слова для национального гимна. Писатель быстро написал подходящие слова на давно известную мелодию."
 elgar.831.f: "«---------» — La Marcha Real"
