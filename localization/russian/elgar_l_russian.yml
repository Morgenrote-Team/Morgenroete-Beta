 je_elgar_composer_duel: "Дуэль композиторов"
 je_elgar_composer_duel_reason: "#tooltippable_name [SCOPE.sCountry('target').GetAdjective|l]ий#! композитор [SCOPE.sCharacter('rival_composer_scope').GetFullName] заявил, что наша страна культурно отсталая, а [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] — никому не известная личность. Мы обязаны сделать его более знаменитым и доказать миру, какая страна является музыкальным авангардом."
 je_elgar_composer_duel_success: "Первый композитор, которому удастся получить #V 100 дополнительной репутации#!, докажет, что его страна пользуется большим культурным признанием, чем другая."
 je_elgar_composer_duel_rival_death: "Преждевременная смерть другого композитора также приведёт к победе."
 je_elgar_composer_duel_fail: "Мы проиграем дуэль, если композитор-соперник наберёт #V 100 или более репутации#! раньше нас или наш композитор умрёт."
 elgar.9.t: "Додекафония"
 elgar.9.d: "После десятилетий музыкального застоя современные композиторы придумали новую концепцию, которая произведёт революцию в мире музыки."
 elgar.9.f: "Додекафония — это метод музыкальной композиции. Эта техника гарантирует, что все 12 нот хроматической гаммы звучат в произведении одинаково часто, предотвращая выделение какой-либо одной ноты за счёт использования тональных рядов. Таким образом, всем 12 нотам придаётся более или менее одинаковое значение, и музыка избегает тональности. Со временем эта техника приобрела огромную популярность и в конечном итоге оказала широкое влияние на композиторов XX века. Обычно её считают формой сериализма."
 elgar.9.g: "Не уверен, что это была хорошая идея."
