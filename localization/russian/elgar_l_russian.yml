 elgar.1231.f: "'Испанская сюита' - сюита для фортепиано соло испанского композитора Исаака Альбениса. Вместе с другими произведениями она была написана в честь испанской королевы.\n Изначально, она состоит из четырех частей, представляющих регион Испании и использующих местную музыкальную форму или танец: Гранада (Серенада), Каталония (Куранте), Севилья (Севильянас) и Куба (Ноттурно). Позже последовали Кадис (песня), Астурия (легенда), Арагон (фантазия) и Кастилия (продолжение следует)."
 elgar.1232.f: "'Иберия' - сюита для фортепиано испанского композитора Исаака Альбениса. Она состоит из четырех книг по три пьесы в каждой.\nОна считается лучшим, но и самым сложным музыкальным произведением Альбениса. В шутку говорят, что играть в нее легко, если у вас три руки."
 elgar.1233.f: "'Каталунья' - фортепианная пьеса испанского композитора Исаака Альбениса. Хотя изначально она была написана для фортепиано, позже она стала основой классической гитарной музыки."
 elgar.1241.f: "'Волшебное озеро' - большая опера французского композитора Даниэля Обера. В опере рассказывается история студента Альбера, который влюбился в фею Зелию."
 elgar.1251.f: "'Чудесный мандарин' - пантомимный балет венгерского композитора Белы Бартока. Это произведение вызвало скандал и было запрещено по моральным соображениям. Позже его стали исполнять в основном в виде концертной сюиты, то есть фактически проигрывали только две трети балета."
 elgar.1252.f: "'Оркестровый концерт' - оркестровое произведение венгерского композитора Белы Бартока. Оно считается одним из самых известных и популярных его сочинений."
 elgar.1253.f: "'Музыка для струнных, ударных и челесты' - произведение, созданное венгерским композитором Белой Бартоком по заказу Пауля Захера, дирижёра Базельского камерного оркестра. Интересно, что в состав ансамбля входят не только струнные, ударные и челеста, но и фортепиано, которое в данном случае считается ударным инструментом благодаря механизму с молоточками."
 elgar.1261.f: "«Lao Siang Thian Thao» - это произведение тайской классической музыки в лаосском мелодическом стиле, возникшее в конце XIX века; имя первоначального композитора неизвестно.В 1933 году Луанг Прадит Пхайро (Сорн Силпабанленг) преобразовал более раннюю двухуровневую мелодию в полноценную трёхуровневую форму phleng thao, расширив её за счёт заново сочинённых возвратных разделов, а также вокальных и инструментальных украшений.Название происходит от старого текста песни, в котором упоминается ритуал гадания по свечам, и позднее произведение стало широко использоваться в классическом танце и концертных исполнениях."
 elgar.1262.f: "«Saen Kham Nueng Thao» - тайская классическая композиция формы phleng thao, аранжированная в 1940 году Луанг Прадит Пхайро (Сорн Силпабанленг). Первоначальная двухуровневая мелодия была более старой сопутствующей пьесой, традиционно исполнявшейся вместе с «Lao Toi Taling». Луанг Прадит расширил и переработал её в полноценную трёхступенчатую форму, положив на музыку стихи, адаптированные из эпоса «Кхун Чанг Кхун Пхаен», тем самым превратив бывшую вспомогательную мелодию в изысканное концертное произведение."
 elgar.1263.f: "«Хомронг Кратае Тай Май» - увертюра, сочинённая Луанг Прадит Пхайро (Сорн Силпабанленг) примерно в 1912-1913 годах. Основанная на более ранней двухуровневой мелодии «Кратае Тай Май» («Новая белка»), она была расширена до трёхуровневого церемониального прелюда, используемого для открытия выступлений. Характеризуясь живыми ритмами и подвижным мелодическим движением, напоминающим белку, карабкающуюся по дереву, пьеса часто исполняется перед попурри «Кхап Нок»."
 elgar.1271.f: "«Си Аюттхая» - историческая музыкальная сюита, аранжированная в 1941 году Пхра Чендуриянгом (Пити Ватаякон) для фильма «Пхрачао Чанг Пхуэк». Произведение основано на древней мелодии «Сай Самон» - придворной песне Аюттхайи XVII века, записанной в хронике Симона де Ла Лубера 1687 года. Переработанная в современную оркестровую форму, сюита прославляет величие и духовное наследие королевства Аюттхая и отражает усилия начала XX века по возрождению и национализации музыкального наследия Сиама."
 elgar.1272.f: "«Рабам Кридапинихан» - танцевальная сюита, созданная в 1942 году для драмы «Киат Саксит Тай», поставленной Департаментом изящных искусств в театре Силпакорн. Текст описывает небесных существ, радующихся чудесным достижениям тайской нации и празднующих их благословляющим танцем с разбрасыванием цветов. Хотя хореография следует канонам классического тайского танца, вокальное письмо и мелодическая обработка отражают модернизированный стиль того периода. Сюита последовательно включает традиционные пьесы «Рыа Дыкдам Бан», «Кхруан Ха» и «Чин Рыа», а оркестровая гармонизация для исполнения западным ансамблем была аранжирована Пхра Чендуриянгом (Пити Ватаякон)."
 elgar.1273.f: "«Фама Пратет» — традиционная тайская инструментальная пьеса в бирманском стиле, аранжированная Пхра Чендуриянгом (Пити Ватаяконом). Изначально написанная для театрального исполнения, позже она была выбрана Департаментом по связям с общественностью правительства в качестве прелюдии‑сигнала времени для государственных радиотрансляций перед церемониями поднятия национального флага и выпуском новостей."
 elgar.1281.f: "«Пхая Сок Тао» — тайская классическая композиция, расширенная до трёх уровней в поздний период правления короля Рамы IV Луангом Прадит Пхайро (Ми Дуриянгкун). Изначально представлявшая собой двухуровневую мелодию, она была увеличена до полной структуры «медленно – средне – быстро» для исполнения как в ансамбле махори, так и в ансамбле пипхат. Отличаясь сменой тональных регистров и выразительным мелодическим контуром, произведение позже стало образцом для инструментальных сольных разработок. Последующие мастера адаптировали его для виртуозного сольного исполнения на таких инструментах, как сау сам сай, хong вонг яй и ранат эк, утвердив его как одну из центральных пьес репертуара тайской классической музыки."
 elgar.1282.f: "«Пхра Атит Чинг Дуанг» — церемониальная заключительная пьеса, сочинённая Пхра Прадит Пхайро (Ми Дуриянгкун) по просьбе Сомдет Чао Пхрая Бором Маха Си Суриявонг (Чуанг Буннаг) в конце XIX века. В то время, когда для окончания выступлений обычно использовалось лишь несколько традиционных прощальных мелодий, благородный покровитель попросил новое произведение для завершения концертов. Получившееся произведение было настолько высоко оценено, что ему дали имя его почётного титула и солнечного символа, символизирующего престиж и власть в придворной традиции пипхат."
 elgar.1283.f: "«Тхеп Ранджуань» — трёхуровневая тайская классическая композиция, написанная Пхра Прадит Пхайро (Ми Дуриянгкун) во время правления короля Рамы III. Произведение было адаптировано и расширено из более старой мелодии, связанной с драмой «Пхром Кеп Хуа Вэйн», преобразовав её в полноценную структуру «thao» с медленной, средней и быстрой частями. Элегантное и выразительное по характеру, оно стало частью основного репертуара ансамблей пипхат и махори XIX века."
 elgar.1291.f: "«Кулап Руанг» — театральная песня, написанная с текстом и мелодией Пранбу́ном (Чуанчан Чанка́на) для драмы «Буппачат Након», впервые поставленной в 1933 году труппой Чантарапхас в Бан-Дон, Сурат-Тхани. Когда постановка позже была возрождена под названием «Мэ Си Вианг» в 1935 году, песня была сохранена как интермедия и получила более широкое признание. Впервые коммерчески записанная в 1935 году, она позднее вновь обрела популярность через современные интерпретации, закрепив своё место в традиции театральных песен Таиланда начала XX века."
 elgar.1292.f: "«Клуай Май» — театральная песня, сочинённая и написанная Пранбу́ном (Чуанчан Чанка́на), ведущей фигурой ранней традиции lakhon rong в Таиланде. Пьеса прозвучала в постановке 1934 года «Чо Чо Санг» (Cio‑Cio San/«Мадам Баттерфляй») труппой Си Офас. Исполняемая в ритме латиноамериканской румбы, отражающем влияние тогдашних мировых танцевальных стилей, она иллюстрирует гибридизацию тайской театральной музыки с западными популярными жанрами межвоенного периода и считается важным документом ранних коммерческих записей и популярной театральной музыки Таиланда."
 elgar.1293.f: "«Кхван Кхонг Риам», также известная как «Кхван Риам», — фильмовая песня, написанная с текстом и мелодией Пранбу́ном (Чуанчан Чанка́на) для художественного фильма Plae Kao (Старая рана) 1940 года. Композитор был ведущим артистом труппы Чантарапхас и влиятельной фигурой в ранней тайской драматической музыке. Самая ранняя коммерческая запись была исполнена Сонгсри Чантарапрапха (также известной как Сонгсри Джонсон), которая исполняла роль Риам в фильме, в паре с Сомпонгом Чантарапрапхой в роли Кхван. Тесно связанная с одной из самых знаковых романтических трагедий Таиланда, песня стала символом довоенного тайского кинематографа и интеграции театральной песенной идиомы в раннее звуковое кино."
 elgar.1301.f: "«Хомронг Пхуми Тхонг, Сам Чан» — увертюра в трёхуровневой форме (сам чан), сочинённая Прайя Пхумисеном (Чит Читтасеви). Произведение является расширением и переработкой более ранней пьесы «Нок Крачок Тхонг, Сонг Чан», преобразованной из двухуровневой структуры в более развитый трёхуровневый формат, характерный для официального придворного репертуара тайской классической музыки."
 elgar.1302.f: "«Чампа Тхонг Тао» — полное расширение композиции в форме thao, происходящее от более раннего произведения «Чампа Тхонг, Сонг Чан». Работа адаптирует мелодический материал из оригинала с двумя уровнями в полную трёхуровневую структуру сюиты, типичную для жанра thao. Песенный текст произведения заимствован из Savitri — lakhon rong (певческой драмы), сочинённой королём Ваджиравудом (Рамой VI), что отражает интеграцию королевской театральной литературы в классический тайский музыкальный репертуар начала XX века."
 elgar.1303.f: "«Сот Си Тао» — композиция в форме тао, в тексте которой содержится поэтичное созерцание природы с описанием цветов разных оттенков. Структурированная согласно традиционной трёхуровневой прогрессии жанра тао, пьеса сочетает изящную мелодическую разработку с литературными образами, демонстрируя синтез вокальной поэзии и формального метрического расширения в центрально‑тайской классической музыке."
 elgar.1311.f: "«Лао Дамноен Сай» возникло как вокальное произведение сержанта Фена Фаюнгинга (Ком) и позже было оформлено в инструментальной обработке Прайи Прасан Дуриясапа (Плаек Прасансап), закрепившись в классическом репертуаре. Сочинение написано в сонг чан (двухъярусная метрика) в лаосском стилистическом режиме с ритмическим узором на тап сонг май; произведение обрело широкое влияяние. Впоследствии оно было адаптировано как в классической традиции - наиболее заметно Луанг Прадитом Фаиро (Сорн Силпабанленг) - так и в музыке тайской популярной культуры XX века. Его продолжающаяся интерпретация в разных жанрах подчеркивает его долгосрочное музыкальное значение."
 elgar.1312.f: "«Анонг Сучада», ранее известное как «Чин Анонг Сучада», является старинным произведением в сонг чан (двухъярусная метрика) с использованием ритмического узора на тап сонг май. Состоящее из двух основных частей, произведение восходит к периоду Аюттхаи и традиционно исполнялось в театрах кон и лакхон. Настоящая аранжировка приписывается Прайе Прасан Дуриясапу (Плаек Прасансапу), сыгравшему важную роль в его передаче в классическом репертуаре."
 elgar.1313.f: "«Нараи Плаенг Руп» изначально существовало в сонг чан (двухъярусная метрика) как часть сюиты «Мон Плаенг». Расширение в сам чан (трёхъярусная метрика) было создано Прайей Прасан Дуриясапом (Плаек Прасансапом) во времена правления короля Рамы VI, что закрепило произведение в его расширенной формальной структуре."
 elgar_rossini_leaves_bologna_tt: "[SCOPE.sCharacter('elgar_composer_scope').GetLastName] leaves Bologna and retires as a Composer."
 elgar.609.t: "[SCOPE.sCharacter('elgar_composer_scope').GetLastName] retires"
 elgar_lachner_retires_tt: "[SCOPE.sCharacter('elgar_composer_scope').GetFullName] will retire and no longer be available as a composer."
 elgar.1321.d: "Rimsky-Korsakov's newest masterpiece, an oriental suite in four movements, was presented to the audience today. The colorful orchestration evokes the world of 1001 Nights."
 elgar.1321.f: "'Scheherazade' is an example of Rimsky-Korsakov's frequent use of fairy-tale and folk subjects. This orchestral work combines two features typical of Russian music in general and of Rimsky-Korsakov in particular: dazzling, colorful orchestration and an interest in the East, which figured greatly in the history of Imperial Russia, as well as orientalism in general. The name 'Scheherazade' refers to the main character Scheherazade of the One Thousand and One Nights. It is one of Rimsky-Korsakov's most popular works."
 elgar.1321.g: "Tell me another story, Scheherazade."
 elgar.1322.d: "In his latest work, Rimsky-Korsakov bridges the gap between pagan Slavic culture and Christian Russia."
 elgar.1322.f: "Nikolai Rimsky-Korsakov's 'Russian Easter Festival Overture' is dedicated to the memory of Modest Mussorgsky and Alexander Borodin, two members of the legendary Group of Five. It bears the subtitle 'Overture on themes from the Russian Easter liturgy'. The melodies of the overture are derived largely from the Russian Orthodox liturgy. Their themes are based on the Obichod, a collection of ancient Russian Orthodox hymns. Rimsky-Korsakov supplemented the score with several biblical quotations. A distinctive feature of the work is the short violin cadenzas between several sections. They are intended to symbolise the light that shines forth from the Holy Sepulchre at the Resurrection of Christ."
 elgar.1322.g: "He is risen, he is truly risen!"
 elgar.1323.d: "Maestro Rimsky-Korsakov's latest opera is already regarded as his most successful stage work!"
 elgar.1323.f: "'The Golden Cockerel' is a three-act opera by Nikolai Rimsky-Korsakov, based on the fairy tale of the same name by Alexander Pushkin, which in turn is based on the legend of the Arab astrologer from Washington Irving's collection of tales, 'The Alhambra' (1832). Korsakov's final work for the stage is regarded as his most polished. The composer draws on a wealth of timbres to tell the tale of King Dogon, who is plagued by many worries despite wishing to indulge in idleness. An astrologer has the solution: a Golden Cockerel that crows when danger approaches. When war does indeed break out and the cockerel crows, however, the king is forced to set out in person. In Paris, the opera was a sensational success."
 elgar.1323.g: "Cock-a-doodle-doo!"
 elgar.1331.f: "'A Scene from the Steppes of Central Asia' is a symphonic poem composed by Alexander Borodin to mark the 25th anniversary of Tsar Alexander II's reign. This Tsar had annexed Turkestan, a region in Central Asia, and incorporated it into the Russian Empire. It is still regarded today as one of the most famous examples of programme music. Borodin himself writes:\n'In the monotonous steppes of Central Asia, the hitherto unfamiliar tones of a peaceful Russian song resound. From afar one hears the clatter of horses and camels and the peculiar sound of an oriental melody. A native caravan approaches. Under the protection of Russian arms, it travels safely and carefree along its long route through the boundless desert. It moves further and further away. The song of the Russians and the melody of the Asians merge into a shared harmony, the echo of which gradually fades into the air of the steppe.'"
 elgar.1332.d: "Maestro Borodin's latest opera is already regarded as his life's work."
 elgar.1332.f: "A doctor and chemist by profession and training, Borodin made important early contributions to organic chemistry. Although he is presently known better as a composer, he regarded medicine and science as his primary occupations, only practicing music and composition in his spare time or when he was ill. In that respect, it is not surprising that Borodin died before he could complete 'Prince Igor'. The composer adapted the libretto from the Ancient Russian epic The Lay of Igor's Host, which recounts the campaign of Rus' prince Igor Svyatoslavich against the invading Cuman ('Polovtsian') tribes in 1185. He also incorporated material drawn from two medieval Kievan chronicles. The opera was left unfinished upon the composer's death in 1887 and was edited and completed by Nikolai Rimsky-Korsakov and Alexander Glazunov."
 elgar.1332.g: "Dance, you Polovtsian tribes!"
 elgar.1333.f: "Borodin spent a total of seven years working on his Second Symphony. It has many melodic resemblances to both Prince Igor and Mlada, two theatre works that diverted Borodin's attention on and off during the six years of composition. As was so often the case, the other reason for the delay was his day job as a chemist. Rimsky-Korsakov writes:\n'On visiting him I seldom found him working in the laboratory which adjoined his apartment. When he sat over his retorts filled with some colorless gas and distilled it by means of a tube from one vessel into another, I used to tell him that he was 'transfusing emptiness into vacancy'. Having finished his work, he would go without me to his apartment, where he began musical operations or conversations, in the midst of which he used to jump up, run back to the laboratory to see whether something had not burned out or boiled over; meanwhile he filled the corridor with incredible sequences from successions of ninths or sevenths.'"
 elgar.1341.f: "'A Night on Bald Mountain' is a symphonic poem and the only major orchestral work by Modest Mussorgsky. In Nikolai Rimsky-Korsakov's arrangement, the work is regarded as one of the best-known examples of 19th-century Russian programme music. Mussorgsky depicts the witches' dance on St John's Eve (from 23 to 24 June) on Lyssaya Gora ('Bald Mountain'), a place from Slavic mythology."
 elgar.1342.f: "'Pictures at an Exhibition' is a piano suite by Modest Mussorgsky and is regarded as an outstanding example of programme music. The individual movements describe paintings and drawings by his friend Viktor Hartmann, who had died the previous year, which Mussorgsky had seen at a memorial exhibition. The work was commissioned at the suggestion of a mutual friend, the art critic Vladimir Stasov. He was also involved in naming the pieces, and the cycle was dedicated to him. The richness of the timbres inspired other composers early on to arrange the work for orchestra and other instrumental ensembles. The best-known arrangement is that by Maurice Ravel."
 elgar.1343.d: "Modest Mussorgsky, the boldest member of the The Five, made a lasting impression with his opera 'Boris Gudonov'. Some love, others hate the work. At the same time, the music world agrees that it is his most important masterpiece."
 elgar.1343.f: "'I both adore and abhor Boris Godunov. I adore it for its originality, power, boldness, distinctiveness, and beauty; I abhor it for its lack of polish, the roughness of its harmonies, and, in some places, the sheer awkwardness of the music.' -Nikolay Rimsky-Korsakov"
 elgar.1351.d: "The latest piece by the duo Gilbert & Sullivan conquers the British and American-speaking world. The 'Mikado' will go down in history as one of the most successful comic operas!"
 elgar.1351.f: "Savoy opera was a style of comic opera that developed in Victorian England in the late 19th century, with W. S. Gilbert and Arthur Sullivan as the original and most successful practitioners. The name is derived from the Savoy Theatre, which impresario Richard D'Oyly Carte built to house the Gilbert and Sullivan pieces, and later those by other composer-librettist teams. Gilbert, who wrote the libretti for these operas, created fanciful 'topsy-turvy' worlds where each absurdity is taken to its logical conclusion. Sullivan, six years Gilbert's junior, composed the music, contributing memorable melodies that could convey both humor and pathos. Gilbert and Sullivan introduced innovations in content and form that directly influenced the development of musical theater through the 20th century. The most successful of the Savoy Operas was 'The Mikado', which made fun of English bureaucracy, thinly disguised by a Japanese setting. The story focuses on a 'cheap tailor', Ko-Ko, who is promoted to the position of Lord High Executioner of the town of Titipu."
 elgar.1351.g: "I've got a little list — I've got a little list!"
 elgar.1352.f: "'H.M.S. Pinafore' is a comic opera in two acts with music by Arthur Sullivan and a libretto by W. S. Gilbert. With a total of 571 consecutive performances, the opera held the record for the second-longest run of any musical theatre production at the time. The operetta humorously depicts the love between people from different social classes, thereby satirising the British class system. Furthermore, Pinafore pokes fun at patriotism, party politics, the Royal Navy and the rise of unqualified individuals to positions of responsibility. In 1911, Henry L. Mencken wrote: 'No other comic opera ever written—indeed, no other stage play of any kind—has been so popular.'"
 elgar.1352.g: "When I Was a Lad ..."
 elgar.1353.f: "I am the very model of a modern Major-Gineral,\nI've information vegetable, animal, and mineral,\nI know the kings of England, and I quote the fights historical\nFrom Marathon to Waterloo, in order categorical;\nI'm very well acquainted, too, with matters mathematical,\nI understand equations, both the simple and quadratical,\nAbout binomial theorem I'm teeming with a lot o' news,\nWith many cheerful facts about the square of the hypotenuse.\n\nI'm very good at integral and differential calculus;\nI know the scientific names of beings animalculous:\nIn short, in matters vegetable, animal, and mineral,\nI am the very model of a modern Major-Gineral."
 elgar.1353.g: "This man could be a Morgenröte character."
 elgar.1361.f: "Bedřich Smetana was a Czech composer who pioneered the development of a musical style that became closely identified with his people's aspirations to a cultural and political 'revival'. He has been regarded in his homeland as the father of Czech music. Internationally he is best known for his 1866 opera The Bartered Bride and for the symphonic cycle Má vlast, which portrays the history, legends and landscape of the composer's native Bohemia. It contains the famous symphonic poem 'Vltava', also popularly known by its German name 'Die Moldau' (in English, 'The Moldau'), depicting the river that runs through Prague towards its junction with the Elbe."
 elgar.1362.f: "'The Bartered Bride' is an opera in three acts by Bedřich Smetana, with a libretto by Karel Sabina. The technically demanding overture provides a fast-paced introduction to the plot, which is set in a 19th-century Bohemian village. The opera was initially met with only moderate success, but became a worldwide hit and is regarded as a milestone in Czech musical culture. Smetana's musical treatment made considerable use of traditional Bohemian dance forms, such as the polka and furiant, and, although he largely avoided the direct quotation of folk songs"
 elgar.1363.f: "String Quartet No. 1 ('From My Life') in E minor is a four-movement chamber composition by Bedřich Smetana. Smetana described the first movement as a romantically driven sketch of his youth as an artist. He also wrote of the movement's forewarning of the future, as well as a longing for the indefinable. Smetana described the second movement as a polka holding nationalistic tones. The movement depicts his youth as a lover of dance—Smetana held this love from the early age of 6. The third movement was composed as a tribute to his first wife, whom Smetana pronounced his 'first love.'' The last movement entails Smetana's loss of hearing and the decay of his health, containing a held E natural which mimicked the ringing in his ears."
 elgar.1371.f: "'Appalachian Spring' is a ballet score by Aaron Copland and is particularly well known in its version as an orchestral suite. Copland wrote the ballet, which is scored for a thirteen-piece chamber orchestra, at the request of the choreographer and dancer Martha Graham. Originally, Copland had not given the work a title and simply referred to it as 'Ballet for Martha'. He was sceptical as to whether it made sense to write ballet music and whether the scores would stand the test of time. In retrospect, the piece proved to be one of the composer's most popular works. Copland was awarded the Pulitzer Prize for Music for it."
 elgar.1372.f: "Following the success of his work 'El Salón México', Aaron Copland was asked by ballet impresario Lincoln Kirstein to compose the music for a ballet based on the legend of Billy the Kid. Following the premiere by the Ballet Caravan of a version for two pianos, a full orchestral score was completed in May 1939. The ballet was a great success: 'It was after Billy, when I was nearly forty, that my mother finally said that the money she had spent on my piano lessons had not been wasted.'"
 elgar.1373.f: "'Rodeo' is a ballet composed by Aaron Copland and choreographed by Agnes de Mille. Though Copland was initially reluctant to compose 'another Cowboy ballet,' De Mille persuaded him that this show would mark a significant departure from his previous work. The circumstances surrounding the composition of Rodeo led to its having a number of features that set it apart from other Copland compositions. Though many of Copland's works incorporate traditional American folk tunes, Rodeo is unique in that it leaves them quite intact in the score, with very little alteration on the part of the composer. The final movement, 'Hoe Down', is undoubtedly one of the classics of American symphonic music, and its unique sound has become the composer's trademark."
 elgar.1381.f: "In 1924 Gershwin began writing 'Rhapsody in Blue' for two pianos. Ferde Grofé moved in with him for the duration of the composition and created the score for Whiteman's jazz orchestra from the piano version. The concert of Paul Whiteman's orchestra in New York's Aeolian Hall on was a historic event of immense importance at which Gershwin's composition was premiered. The concert was billed as 'An Experiment in Modern Music'. Gershwin himself sat at the piano for the world premiere. It quickly became his most famous composition. Then as now, the piece was seen as an answer to the question of what defines American music: a synthesis of classical music and jazz."
 elgar.1382.f: "'Porgy and Bess' is a three-act opera by George Gershwin, premiered in 1935, with a libretto by DuBose Heyward. The lyrics were written by DuBose Heyward and Gershwin's brother, Ira Gershwin. The opera depicts the lives of African Americans in the black neighbourhood of Catfish Row in Charleston, South Carolina, around 1870. As there were few trained black opera singers at the time, theatre and nightclub performers were also engaged. Critics criticised it as a hybrid of opera and musical. After 124 performances, the work was taken off the programme at a loss. However, individual musical numbers quickly became so popular that Gershwin compiled them into a suite in 1936 to raise the opera's profile. This attempt, too, was initially unsuccessful. The work only became a global success after Gershwin's death."
 elgar.1383.f: "'An American in Paris' is one of Gershwin's most popular works. Similar to Rhapsody in Blue, An American in Paris is a rhapsody or tone poem in free form, in which Gershwin musically depicts his impressions of his own stay in Paris. Gershwin himself subtitled the work 'Tone poem for orchestra'. It was commissioned by the New York Philharmonic. It is written for the standard symphony orchestra, augmented by a number of effect instruments such as Parisian taxi horns, which Gershwin brought back from France especially for the piece. However, the orchestration heard today differs in many respects from Gershwin's original manuscript."
 elgar.1391.f: "I. The pine trees of Villa Borghese. Children play amongst the pine trees of Villa Borghese. They dance in circles, re-enact military marches and battles, and revel in their own shouts like swallows at dusk; then they run off. Unexpectedly, the scene shifts …\n\nII. Pine trees by a catacomb. In the shade of the pine trees surrounding the entrance to a catacomb, from whose depths a wistful song reaches us. It rises to a solemn hymn and then fades away again.\n\nIII. The pine trees on the Janiculum. A tremor passes through the air: on a clear full-moon night, the tops of the Janiculum's pine trees sway gently. A nightingale sings in the branches.\n\nIV. The pine trees of the Via Appia. Morning mist over the Via Appia: solitary pine trees stand guard in the tragic landscape of the Roman Campagna. Indistinctly, yet time and again, one seems to hear the rhythm of countless footsteps. In his mind's eye, the poet sees ancient glory revived: to the blare of the buccines, a consul approaches with his army, to march in the glow of the rising sun along the Via Sacra and triumphantly up to the Capitol."
 elgar.1392.f: "'In this symphonic poem, the composer sought to express the feelings and visions that arose within him upon seeing four Roman fountains, each at the time of day when their character best harmonises with their surroundings, or when their beauty makes the greatest impression on the observer. The first part of the poem draws its inspiration from the fountain in Valle Giulia and depicts a pastoral scene. (...) A sudden, loud and sustained sound of horns over a trilling orchestra opens the second part, the Triton Fountain. (...) A solemn theme resounds above the surging waves of the orchestra: the Trevi Fountain at midday. The solemn theme passes from the woodwinds to the brass, taking on a triumphant character. (...). The fourth movement, The Fountain at the Villa Medici at Dusk, begins with a melancholy theme that rises as if above a gentle splashing. It is the wistful hour of sunset. The air is filled with the sound of bells, birdsong and the rustling of leaves. Then all this gently fades into the silence of the night.'"
 elgar.1393.f: "Antiche danze ed arie per liuto (Italian for 'Ancient Dances and Airs for Lute') is the title of a series of orchestral suites by the Italian composer Ottorino Respighi. In this neoclassical work, the composer draws on transcriptions of 16th- and 17th-century lute and guitar tablatures, which had been edited by the Italian musicologist Oscar Chilesotti, and arranged them for modern instruments. The subtitle of the work is Trascrizione libera per orchestra (free transcriptions for orchestra)."
 elgar.1401.f: "Like the librettos for Puccini's earlier operas 'La Bohème' and 'Tosca', the libretto for 'Madama Butterfly' was written by Giuseppe Giacosa and Luigi Illica. The text is based on the short story 'Madame Butterfly' by John Luther Long and the one-act tragedy 'Madame Butterfly: A Tragedy of Japan' by David Belasco, which was adapted from it. In order to create the opera, Puccini conducted relentless and meticulous research into the various oriental elements he felt it necessary to include. He was particularly assisted by a well-known Japanese actress, Sada Yacco, and the wife of the Japanese ambassador, with whom he spoke in Italy and who described to him the customs and traditions of the people of the East."
 elgar.1402.f: "Turandot is an opera in three acts and five scenes, with a libretto by Giuseppe Adami and Renato Simoni; it was left unfinished by the composer Giacomo Puccini and subsequently completed by Franco Alfano, after which several other versions were produced. Turandot is the princess in a tale from the Oriental collection One Thousand and One Nights, who has any suitor beheaded who cannot solve her riddles. Another, much older source of the material is the work The Seven Beauties (in which she is a Russian princess) by the Persian poet Nezami. To evoke the Far East in the music, Puccini sought advice from his friend Baron Fassini, who was very knowledgeable about Chinese culture. Later, he also borrowed a music box from him that played a Chinese melody. Puccini quotes from it frequently in the opera. "
 elgar.1403.f: "La Bohème is an opera in four acts by Giacomo Puccini, with a libretto by Giuseppe Giacosa and Luigi Illica, inspired by Henri Murger's novel 'Scenes from Bohemian Life'. Despite poor reviews following its premiere, La Bohème became a global success. It forms part of the standard repertoire of many opera houses and is one of the most frequently performed operas in the world. La Bohème is closely associated with verismo: it deals with the lives, sufferings and loves of ordinary people. It is the fourth of Puccini's ten operas and is regarded by many as his masterpiece."
 elgar.1411.f: "'Koanga is one of those singular works that attract attention in Delius's development, but which stand apart from the rest of his music. Usually, once a work was written, Delius's interest in it would wane. It would then be renewed and be relived temporarily every time he heard it again. For Koanga, however, he showed concern as though it held some secret bond that bound him to his youth in Florida. It was the one work he deplored in old age he was never likely to hear again. And so it proved. A dark grandeur pervades the score which, whilst yielding to hankerings after Wagner, recalls the tragic gusto of Verdi. The elements of time, place and plot allowed him a range of textures and moods wider than in his other operas.' - Eric Fenby"
 elgar.1412.f: "Sir Thomas Beecham, Delius's most prominent British champion, called On Hearing the First Cuckoo in Spring 'easily the best known of all our composer's output'. Together with Summer Night on the River it is one of Delius's Two Pieces for Small Orchestra. The two were first performed in Leipzig on 23 October 1913, conducted by Arthur Nikisch. The main theme, marked 'With easy flowing movement', is an exchange of cuckoo calls. The second theme is scored for first violins, and is taken from a Norwegian folksong, 'In Ola Valley', which was brought to Delius's attention by the composer and folksong arranger Percy Grainger. The theme had earlier been used by Edvard Grieg."
 elgar.1413.f: "A Village Romeo and Juliet is an opera by Frederick Delius, the fourth of his six operas. The composer himself, with his wife Jelka, wrote the English-language libretto based on the short story 'Romeo und Julia auf dem Dorfe' by the Swiss author Gottfried Keller. While the opera has rarely been staged, the orchestral interlude between Scenes 5 and 6, 'The Walk to the Paradise Garden', is heard separately in concerts and has been recorded many times."
 elgar.1421.f: "'El amor brujo' is the title of a one-act ballet with singing by Manuel de Falla, composed in 1915. The libretto was written by María de la O Lejárraga García, and the original choreography was created by Pastora Imperio. Due to its great popularity, several versions and adaptations exist. The setting is in Andalusia, amongst Spanish Gitanos, their rituals and their music. The premiere was not a success; it was only after a revision that de Falla found greater favour with the audience. Today, the ballet, with its Ritual Fire Dance, is considered one of the Spanish composer's most famous works."
 elgar.1422.f: "The opera '*'La vida breve' (The Short Life) is a lyrical drama in two acts and four scenes by Manuel de Falla, based on a libretto by Carlos Fernández-Shaw. The world premiere took place in 1913 at the Casino Municipal in Nice in French. In his opera, which is influenced by verismo and impressionism, de Falla uses many elements from Spanish folklore, such as the cante jondo with rhythmic ostinatos, as well as other forms of flamenco. The opera was composed as early as 1904 and 1905. The then 28-year-old de Falla composed the work after the Academy of Fine Arts in Madrid had announced a competition for one-act operas. De Falla won first prize in 1905."
 elgar.1423.f: "'The Three-Cornered Hat' (Spanish: El sombrero de tres picos) is a ballet by Manuel de Falla. The choreography was created by Léonide Massine. The plot was devised by Gregorio Martínez Sierra, based on the novella of the same name by Pedro Antonio de Alarcón. The work was composed by de Falla during his second major creative period, which lasted from 1914 to 1920, and displays a strong influence of Spanish folk traditions. In addition to its Spanish setting, this ballet also employs the techniques of Spanish dance rather than classical ballet."
 elgar.1431.f: "'Danse macabre' is a symphonic poem for orchestra. It started out in 1872 as an art song for voice and piano with a French text by the poet Henri Cazalis. Two years after the song version of the Danse Macabre was published, Saint-Saëns decided to transcribe it into a version for orchestra with solo violin. Initial reactions to the orchestral version of the Danse Macabre were mixed: It seemed that the piece was too outrageous for some and too discreet for others. The creative instrumentation, such as the use of the xylophone, was, however, praised."
 elgar.1432.f: "The Symphony No. 3 in C minor, also known as the 'Organ Symphony', is a work for orchestra and organ by the French composer Camille Saint-Saëns. It was commissioned by the Royal Philharmonic Society in London and was dedicated to Franz Liszt. With his Third Symphony, Saint-Saëns created one of the first works for orchestra and organ in France. He himself wrote of the symphony: 'Here I have given everything I could give... I shall never write anything like this work again.'"
 elgar.1433.f: "'Samson et Dalila' is an opera in three acts by Camille Saint-Saëns, with a libretto by Ferdinand Lemaire. The plot is based on the biblical Book of Judges and is set between 1100 and 1000 BC. Samson et Dalila is the only one of Saint-Saëns's 13 operas to have achieved a lasting success on the stage. Despite the successful premiere in German under the baton of Eduard Lassen and the artistic director Franz Liszt at the Weimar Court Theatre in December 1877, it was not until 1890 that the opera was performed in France. Saint-Saëns continued to revise the work even after the premiere, adding further sections. Two of Delilah's arias are particularly well known: 'Printemps qui commence' (Spring begins) and 'Mon cœur s'ouvre à ta voix' (My heart opens itself to your voice), the latter of which is one of the most popular recital pieces in the mezzo-soprano/contralto repertoire."
 elgar.1441.f: "Finlandia is a symphonic poem by Jean Sibelius. The piece is closely linked to the 'awakening' of the Finnish nation under Russian rule and the resistance against Russian repression - particularly against the press. In this context, so-called 'press celebrations' were organised to support the journalists' pension fund, at which theatrical performances with a national message were often staged. Sibelius contributed a six-part suite as accompanying music to one such performance of 'living pictures from Finnish history and mythology'. The last of these pieces was the first version of the symphonic poem 'Finlandia', which was a resounding success.  Thus, 'Finlandia' quickly became part of the Finnish national consciousness. The tone poem was regarded as Finland's 'secret national anthem' and was so popular that the Russian authorities banned its performance."
 elgar.1442.f: "Sibelius's Violin Concerto was composed during the early phase of his symphonic output, between his Second and Third Symphonies. It owes its enduring fascination and popularity to its late Romantic style combined with a modern Scandinavian sound aesthetic. Alongside the violin concertos by Prokofiev, Shostakovich, Berg, Bartók and Britten, it ranks among the most significant violin concertos of the twentieth century. Sibelius composed the first version of the concerto in 1903 at the suggestion of the violinist Willy Burmester. It was intended for him and was to have its world premiere in Berlin. However, Sibelius moved the premiere to Helsinki for financial reasons, meaning that Burmester was unable to perform at the premiere due to other commitments. The premiere then took place on 8 February 1904 in Helsinki, with Viktor Nováček as soloist and the composer conducting. Not least because the soloist was not technically up to the task, the concerto was a failure with both the audience and the critics."
 elgar.1443.f: "This symphony, which has become extremely popular, has always been associated in Finland with the country's struggle for independence from Russia, particularly due to its grandiose finale. At times it was referred to as the 'Symphony of Independence', especially during the period when the Finnish language and culture were being suppressed in what was then Russian-occupied Finland. Sibelius's stance on this issue has often been the subject of controversy. Some claim that Sibelius never had such patriotic ambitions when composing the work and was only associated with them later on."
 elgar.1451.f: "Vaughan Williams did not achieve wide recognition early in his career as a composer, but by 1910, in his late thirties, he was gaining a reputation. He composed what his biographer James Day calls 'unquestionably the first work by Vaughan Williams that is recognizably and unmistakably his and no one else's'. It is based on a tune by the 16th-century English composer Thomas Tallis, which Vaughan Williams had come across while editing the English Hymnal, published in 1906. Previously, Vaughan Williams had absorbed his most significant influences from France in order to subsequently create an English style of music that was to break away in particular from the 'Teutonic influence' of Richard Wagner."
 elgar.1452.f: "A London Symphony is Ralph Vaughan Williams's second symphony. It is often officially referred to as 'Symphony No. 2', although the composer never called it that. Vaughan Williams once said that the title suggested a certain degree of programme music, particularly as the music features sounds that actually exist in London, such as the famous Westminster chime. Nevertheless, the symphony should be regarded as absolute music. In a programmatic statement in 1920, Vaughan Williams remarked that it would actually be better to speak of the 'Symphony of a Londoner'. It is dedicated to Vaughan Williams' friend George Butterworth, who was also a composer and was killed by a sniper on the Somme during the First World War. Butterworth was the first to encourage Vaughan Williams to write a richly orchestrated symphony."
 elgar.1453.f: "'Vaughan Williams's Romance, called 'The Lark Ascending' because of its reference to Meredith's poem, stood apart from the rest as the only work in the programme which showed serene disregard of the fashions of today or of yesterday. It dreams its way along in 'many links without a break,'' and though it never rises to the energy of the lines\n'He is the dance of children, thanks\nOf sowers, about for primrose banks'\nthe music is that of the clean countryside, not of the sophisticated concert-room.' -The Times"
 elgar.1461.f: "Thus Spoke Zarathustra is a symphonic poem by Richard Strauss, loosely based on Friedrich Nietzsche's philosophical work of the same name. In 1895, Richard Strauss took a fancy to Nietzsche's cultural critiques of German 'philistinism'. He was, by his own admission, equally averse to Christianity. Perhaps Nietzsche's language had also presented Strauss with an immediate musical challenge: it is worth noting that the four parts of Nietzsch's 'Thus Spoke Zarathustra' correspond to the movements of a symphony. The tone poem begins with Zarathustra's decision, before sunrise, to descend to mankind. The tremolo of the double basses, along with the pedal point in the organ pedal and in the contrabassoon on the fundamental note C, form the backdrop for the sunrise depicted by the 'nature motif.' This famous opening would later find its way into popular culture."
 elgar.1462.f: "Salome is a one-act opera by Richard Strauss. It is based on the play of the same name by Oscar Wilde and is considered one of the first literary operas. The music of Salome is through-composed and built on leitmotifs, thus standing in the tradition of Wagner, who replaced verse-form librettos and classical periodic structure. At the same time, with Salome, Richard Strauss achieved a revolutionary departure from Wagner's longing for euphony on the one hand and from his romantic worldview on the other. The characters who appear are, as Strauss himself put it, 'all perverse people, and, to my taste, the most perverse of the entire company is—Jochanaan.' Or they are—like Narraboth, as an exception—hopelessly naive. The music is correspondingly wild: The extent of dissonance, orchestral volume, and sheer musical cacophony in Salome had never been heard before. It is therefore regarded as a prototype of modern opera."
 elgar.1463.f: "The Alpine Symphony is based on Richard Strauss's concept of depicting, through musical means, the ascent of an Alpine peak and the return to the valley over the course of a single day. The work is a typical example of the musical category of program music. The idea for the program goes back to an experience from Strauss's youth. In the summer of 1879, he lost his way on the Heimgarten in the Bavarian Prealps and was caught in a thunderstorm. The following day, he portrayed this event at the piano. From this memory, he developed the concept. It was the composer's explicit intention to allow the listener to experience the stages of a mountain hike as a tone painting in a direct, sensory way. In the opinion of many music critics, the work achieves this goal in an impressive manner."
 elgar.1471.f: "In 1930 Fernández composed the three-movement suite Reisado do Pastoreio (A Pastoral Epiphany). This three-movement symphonic suite was premiered in Rio de Janeiro under the baton of the then doyen of Brazilian music, Francisco Braga. The third and final movement, Batuque (a dance), is often played as a standalone piece and has been programmed by such renowned conductors as Toscanini, Koussevitzky, Bernstein and Chávez. Its dance-like character, Afro-Brazilian air and hypnotic rhythmic intensity, together with its extreme melodic concision, all contribute to the success of this finale."
 elgar.1472.f: "'The world première of 'Malazarte' by the Brazilian composer, Oscar Lorenzo Fernandez, was the most interesting event of this year's opera season. It was staged on Sept. 30 at the Rio Municipal Theatre as the last of the subscription series of the international opera performances. For the manager of the Opera House considered 'Malazarte' to be so outstanding that he presented it unhesitatingly to an audience which usually gathers to listen only to the classical opera representations. To select a Brazilian work, even by a modern composer, meant considerable courage, especially since the Rio public prefers to see something which has already attained success outside the country. Only on very rare occasions are Brazilian stageworks included in the international season. Lorenzo Fernandez's great reputation in this country and his growing recognition abroad made one anxious to see his opera performed. The evening was a great success. Malazarte is unquestionably the strongest and most personal work of the 44-year-old Fernandez.' -The New York Times, October 12, 1941"
 elgar.1473.f: "The Suítes Brasileiras by Brazilian composer Oscar Lorenzo Fernández comprise a set of three piano suites written in the 1930s that reflect his engagement with Brazilian musical culture. Each of the three suites (Suite Brasileira No. 1, No. 2 and No. 3) is structured as a cycle of short pieces for piano, often bearing descriptive titles: for example, the first suite includes movements called Velha modinha, Suave acalanto and Saudosa seresta."
 elgar.1481.f: "'This drama is based on the novel of the same name by the renowned Brazilian writer José de Alencar. The names Guaraní and Aymoré refer to two of the many indigenous tribes that inhabited the various regions of Brazilian territory before the Portuguese arrived to introduce European civilization. According to the author of the novel, Pery was the chief of the Guaraní. This tribe was more peaceful than others, in contrast to the Aymoré, who were always the most irreconcilable enemies of the whites. Don Antonio de Mariz, a not entirely ideal historical figure, was one of the first to rule in the land in the name of the King of Portugal and fell victim to the barbarity of the indigenous people.' -Preface of the Libretto"
 elgar.1482.f: "The work, described as a dramma lirico, is occasionally assigned to the genre of opera seria, but it also contains characteristics of grand opéra, such as the integrated ballet and striking dramatic effects in the conspiracy scene and the coro ronda. Stylistically, 'Lo schiavo' is reminiscent of the middle-period works of Giuseppe Verdi. Veristic traits are also discernible. Despite its Brazilian setting and indigenous protagonists, the music contains no corresponding folkloristic elements. The dances are instead cast in a more generally exotic style. They make use of certain rhythmic models from contemporary dance music. The melodic style of some arias recalls the sentimental Brazilian Modinha songs. The orchestral prelude known as Alvorada (Dawn) is considered the finest orchestral piece by Antônio Carlos Gomes. The final Italian libretto was prepared by Rodolfo Paravicini according to Gomes's detailed instructions, and he also insisted on the inclusion of the 'Hymn to Freedom' written by Francesco Giganti."
 elgar.1483.f: "Fosca is an opera seria in four acts by Brazilian composer Antônio Carlos Gomes to an Italian-language libretto by Antonio Ghislanzoni based on Luigi Capranica's 1869 novel La festa delle Marie. It is the second opera by Gomes, composed after his return from Brazil and based on a story of piracy in the Adriatic and is set in the Middle Ages. The score reveals a much more refined handling of leitmotif and a vocal structure that tends toward a more continuous, discursive style, moving beyond the traditional dichotomy of recitative and aria. Despite being a success with the critics, including French composer Charles Gounod who was present at the premiere, the opera was generally a failure with the masses because of a dispute between lovers of bel canto and supporters of Wagnerian music-drama."
 elgar.1491.f: "María del Carmen is an opera in three acts composed by Enrique Granados to a Spanish libretto by José Feliú i Codina based on his 1896 play of the same name. It was Granados's first operatic success and, although it is largely forgotten today, he considered it to be his best opera. At the end of its initial run in Madrid where it premiered in 1898, Queen Maria Cristina awarded Granados the Charles III Cross in recognition of his work. The opera, sometimes described as a Spanish version of Mascagni's Cavalleria rusticana with a happy ending, is set in a village in the Spanish region of Murcia and involves a love triangle between María (soprano) and her two suitors, the peasant farmer, Pencho (baritone), and his wealthy rival, Javier (tenor). "
 elgar.1492.f: "In 1911, Enrique Granados premiered his piano cycle Goyescas, inspired by the early artworks of Francisco Goya, to great success in Barcelona. Following this, the pianist and friend Ernest Schelling advised him to transform the suite into a stage work. Granados orchestrated five of the six piano pieces, as well as the character piece El Pelele, as operatic scenes, and composed two new interludes for the three-act structure of the drama. The libretto, which—unlike the usual practice—had to be adapted to the already existing melodies, was commissioned to Fernando Periquet y Zuaznabar. The one-act opera premiered at the Metropolitan Opera on January 28, 1916. Despite its initial success, the opera never secured a lasting place in the repertoire outside of Spain. After the original five performances at the Metropolitan Opera, it was never staged there again."
 elgar.1493.f: "The Doce danzas españolas for piano are a series of twelve piano pieces composed by Enrique Granados. The twelve dances are considered an important contribution to 19th-century Spanish nationalist piano music, and have been arranged for other instruments such as guitar. The cycle as a whole provides a richly varied panorama of dance forms and evokes diverse characters and moods across its movements. One of Granados's best-known works, it was released in four volumes."
 elgar.1501.f: "Cavalleria rusticana (Rustic Chivalry) is an opera in one act by Pietro Mascagni to an Italian libretto by Giovanni Targioni-Tozzetti and Guido Menasci, and considered one of the classic verismo operas. Although Mascagni had started writing two other operas earlier (Pinotta, premiered in 1932 and Guglielmo Ratcliff, premiered in 1895), Cavalleria rusticana was his first opera to be completed and performed. It remains the best known of his fifteen operas and one operetta. Its success has been phenomenal from its first performance in the Teatro Costanzi in Rome until the present day. At the time of Mascagni's death in 1945, the opera had been performed more than 14,000 times in Italy alone. The first performance of Cavalleria rusticana caused a sensation, with Mascagni taking 40 curtain calls on the opening night, and winning the First Prize."
 elgar.1502.f: "Iris is an opera by Pietro Mascagni with a libretto by Luigi Illica. Unlike much of Mascagni's earlier work, which is veristic, Iris is a symbolist opera and is best known for its final chorus, the 'Hymn to the Sun.' Luigi Illica proposed a Japanese-themed opera to Mascagni, aiming to offer an Italian response to the growing European taste for symbolism and exoticism. Mascagni embraced the project 'with unparalleled enthusiasm' and began studying 'the Japanese harmonic style,'' a process that led to the use of gongs and the hexatonic scale. Over time, critics have generally been rather severe in their judgment of this work."
 elgar.1503.f: "L'amico Fritz is a Commedia lirica in three acts by Pietro Mascagni. The libretto for this opera was primarily written by Nicola Daspuro, based on the novella of the same name. While Daspuro was able to complete his work quickly, Mascagni struggled with composing the music, was dissatisfied with Daspuro's text, and did not finish the opera until just a few weeks before the scheduled premiere. After a suitcase containing the libretto was stolen at Naples train station, Mascagni had to almost entirely rewrite the third act himself. At its premiere, L'amico Fritz met the high expectations of the audience, who responded enthusiastically. The best-known scene of the opera is the 'Cherry Duet,' in the second act."
 elgar.1511.f: "The Merry Wives of Windsor is an opera in three acts by the German composer Otto Nicolai and his best-known work. The opera is a Singspiel, containing much spoken dialogue between distinct musical numbers. The opera remains popular in Germany, and the overture is sometimes heard in concert in other countries. Nicolai wrote the opera while he was working as first conductor at the Kärntnertortheater in Vienna, where he was also contracted to compose a German opera. He finally settled on his friend Siegfried Kapper's suggestion that he use Shakespeare's comedy 'The Merry Wives of Windsor' as a basis."
 elgar.1512.f: "Il templario is a three-act opera by Otto Nicolai with a libretto by Girolamo Maria Marini, based on the novel Ivanhoe by Walter Scott. It premiered in Turin. Nicolai's Il templario, together with Saverio Mercadante's La vestale and Giovanni Pacini's Saffo, was among the three major operatic successes of the Italian opera season of 1840. For its time, the opera was thus a worldwide success, seeing more than seventy productions. Only in German-speaking countries did it fail to compete with Heinrich Marschner's Der Templer und die Jüdin."
 elgar.1513.f: "Die Heimkehr des Verbannten is a three-act opera by Otto Nicolai, with a German-language libretto by Siegfried Kapper. It is based on Nicolai's earlier opera Il proscritto, with a libretto by Gaetano Rossi. The story is set in England in 1461 during the Wars of the Roses. Hector Berlioz, who heard the Vienna version, praised Nicolai, stating: '…it was in Nicolai's opera, whose final act, admirable in every respect, in my opinion places Nicolai very high among composers'."
 elgar.1521.f: "Orpheus in the Underworld (French: Orphée aux enfers) is an opéra bouffe in two acts, or four scenes, by Ludovic Halévy and Hector Crémieux, with music by Jacques Offenbach. After composing one-act operas for his theater for three years due to licensing restrictions, Offenbach created Orpheus as his first full-length evening work, which became an extraordinary success. The plot parodies the Greek myth of Orpheus and Eurydice. With the gods of Olympus visiting Hades for amusement, the opera simultaneously satirizes the double standards of the upper-class society of the Second French Empire. At the time of the premiere, many members of Parisian society could recognize themselves in the characters. The most famous musical piece is the can-can (originally titled Galop infernal) in the second act, a crowd-pleaser that remains widely known today and is often performed separately."
 elgar.1522.f: "La belle Hélène is an opéra-bouffe in three acts by Jacques Offenbach, with a libretto by Henri Meilhac and Ludovic Halévy. The success of the work largely depended on the female title role, which was portrayed in the premiere by Hortense Schneider. Schneider was the celebrated singer and courtesan for whom Offenbach conceived La belle Hélène, as well as later operettas such as Barbe-bleue (1866), La Grande-Duchesse de Gérolstein (1867), La Périchole (1868), and La Diva (1869). She was distinguished more for her remarkable stage presence and erotic appeal than for classical vocal technique. The novelist Émile Zola ironically portrays her in Nana as a performer of limited talent who nonetheless captivates Parisian audiences with her physical allure and nude appearances."
 elgar.1523.f: "The Tales of Hoffmann (French original title: Les contes d'Hoffmann) is a 'fantastic opera in five acts' (originally in three acts with a prelude and an epilogue) by Jacques Offenbach. The libretto is based on a play written by Jules Barbier and Michel Carré, which drew on various stories by E. T. A. Hoffmann, such as The Sandman, Councillor Krespel, and The Adventures of the New Year's Eve. At Offenbach's request, Barbier adapted this play into the opera libretto. In the opera, Hoffmann himself is the hero of the stories, unlike in Hoffmann's literary works, where the male protagonists have different names or are fictional first-person narrators. Offenbach died during the composition of this opera. No final score authorized by him exists; however, numerous manuscript pages with variants survive. Because Offenbach's manuscripts were dispersed among his heirs, some of whom repeatedly gifted or sold portions of the autograph to friends and collectors, it remains unclear how far Offenbach had progressed with the composition."
 elgar.1531.f: "The Liberty Bell is an American military march by John Philip Sousa. Sousa originally began composing the march for an opera titled The Devil's Deputy, but he abandoned the project because he was dissatisfied with the payment. Later, while attending a performance with his colleague George Hinton, they saw a backdrop featuring the Liberty Bell, and Hinton suggested naming the march after this iconic symbol."
 elgar.1532.f: "The Stars and Stripes Forever is an American military march composed by John Philip Sousa. An original recording from 1897 exists, conducted by the composer himself. On December 11, 1987, the piece was officially designated the national march of the United States by President Ronald Reagan following a resolution of Congress."
 elgar.1533.f: "The Washington Post is one of John Philip Sousa's best-known works and has achieved widespread recognition even outside the United States. In 1889, the American daily newspaper The Washington Post was purchased by Frank Hatton and Beriah Wilkins. Hatton and Wilkins commissioned Sousa, then conductor of the United States Marine Band, to compose a march to be performed at a celebration for an essay contest for children sponsored by the newspaper."
 elgar.1541.f: "The Copenhagen Steam Railway Galop was composed for the opening of the Copenhagen-Roskilde railway, the first railway line in the Kingdom of Denmark. The piece was performed for the first time in Tivoli Gardens in Copenhagen. The piece is a good example of the entertaining music Lumbye liked to compose. It faithfully recreates the sounds of a steam locomotive chugging out of a station and grinding to a halt at the next stop, traditionally ending with the cry 'Next stop Roskilde - the train does not go any further'."
 elgar.1542.f: "Lumbye's grandson, the conductor Tippe Lumbye, recounted a story about the piece's origin: 'One evening, Lumbye was invited to a formal celebration at the British Embassy in Copenhagen but, passing his regular haunt on the way, he decided to spend the evening there in more familiar company. When he returned home late that night, he had to explain how the embassy, which he had in fact never visited, had supposedly been immersed in champagne and festivity. To illustrate it for his curious family, he sat down at the piano and improvised a piece that would later become the world-famous Champagne Galop.'"
 elgar.1543.f: "From 1843 to 1872, Lumbye served as the music director and in-house composer for Tivoli Gardens, Copenhagen. Such was his popularity in the Danish capital that many Danes revered him and considered Johann Strauss II as the 'Lumbye of the South'."
 elgar.1551.f: "'Carmen' is based on Prosper Mérimée's 1846 novella of the same name. Carmen, initially not accepted by the public, received praise from famous contemporaries such as Debussy, Nietzsche, Saint-Saëns and Tchaikovsky. Brahms attended over twenty performances and considered it the finest opera performed in Europe since the Franco-Prussian War. Bizet died only a few months after the premiere and was not to receive any fame for his works throughout his life. After years of neglect, his works began to be performed more frequently in the 20th century. Later commentators have acclaimed him as a composer of brilliance and originality whose premature death was a significant loss to French musical theatre."
 elgar.1552.f: "L'Arlésienne (The Woman from Arles) by Georges Bizet was originally composed as incidental music for the play of the same name by Alphonse Daudet, and includes orchestral pieces, choruses, and melodramas. Daudet's play was unsuccessful, but Bizet's music was immediately recognized by the Parisian audience as remarkably accomplished. Bizet assembled an orchestral suite from several of the pieces, which received great acclaim and made him popular in Paris even before his opera Carmen. Bizet composed an independent score that only occasionally draws on a total of three melodies, which he had taken from a Provençal collection published in 1864. In modern concert practice, two suites are performed; the second suite was compiled posthumously by Ernest Guiraud."
 elgar.1553.f: "Les pêcheurs de perles (The Pearl Fishers) is a three-act opera by Georges Bizet. The music, consisting of an overture followed by sixteen interconnected numbers, is shaped by the exotic, Far Eastern subject, reflected in its rhythms, melodies, and the instrumentation, which can now only be partially reconstructed. The premiere was not a major success. Despite a positive review from Hector Berlioz in the Journal des débats, the opera received only eighteen performances during Bizet's lifetime and fell into obscurity after his death. It was only after the composer's passing and the overwhelming success of his opera Carmen that his earlier works began to be remembered."
 elgar.1561.f: "Sinfonía india is the Symphony No. 2 by Carlos Chávez, written between 1935 and 1936. Although it is cast as a single movement, the internal sections follow the conventional structure of a three-movement symphony. The work's title refers to its thematic content, which draws on three melodies from Indigenous peoples of northern Mexico. This symphony remains Chávez's best-known and most frequently performed composition."
 elgar.1562.f: "The Sinfonía de Antígona was composed by Carlos Chávez in 1933. It is the first symphony written by the Mexican composer. The work originated from incidental music that Chávez wrote for a stage adaptation of Sophocles' tragedy Antigone, adapted by Jean Cocteau. This adaptation was performed by the Teatro Orientación group at the Palacio de Bellas Artes in Mexico City in 1932. Chávez later reworked some of the musical material and orchestrated it to create his first symphony."
 elgar.1563.f: "Caballos de vapor, sinfonía de baile (also known as Horse-Power and the abbreviation of this title, H. P.) is a ballet score composed by Carlos Chávez. Caballos de vapor originated in discussions between the composer and the painter Agustín Lazo Adalid in 1922 or 1923 about a multi-media work concerning the effects of mechanization on society in modern-day Mexico. According to another account, however, it was only first in 1926 that the idea was born, in discussions with another visual artist, Diego Rivera, and Rivera was intended to design and produce the decor and costumes. The score is designated a 'dance symphony'. Though it is not among the composer's numbered symphonies, it falls into the traditional four movements of a symphony, but they are further subdivided into a succession of dances."
 elgar.1571.f: "Le Chasseur maudit is a symphonic poem by César Franck. The work is inspired by the ballad Der wilde Jäger by the German poet Gottfried August Bürger. Franck masterfully captures the dark and fantastical atmosphere of the German poem, particularly through his mournful horn calls and subtle orchestration. The ending of the piece even evokes the 'Dream of a Witches' Sabbath” from Berlioz's Symphonie fantastique. In the story, on a Sunday morning, while church bells ring and people sing to call for devotion, a Count of the Rhine sounds his hunting horns and rides out, refusing to attend the Sunday service. On his frantic chase, he tramples crops and lashes peasants he encounters along the way. Lost in the forest, he is cursed by a terrible voice that condemns him for eternity, reversing the situation: in his ride, he is pursued by howling devils and driven straight toward the gaping mouth of hell."
 elgar.1572.f: "The Symphony in D minor is the best-known orchestral work by César Franck and the only symphony he completed. The Symphony is cast in three movements: Lento - Allegro ma non troppo, Allegretto, and Finale: Allegro non troppo. Each movement is linked by a cyclic structure, with important themes introduced at the opening appearing throughout the work. This technique of thematic unity was one of Franck's signature approaches to large-scale form. At the time Franck wrote the symphony, the form was uncommon in French musical life, where the symphony was still regarded largely as a German tradition. Its composition is often seen in the context of a broader revival of French symphonic writing in the late 19th century, influenced by earlier successes such as Saint-Saëns's Organ Symphony."
 elgar.1573.f: "Symphonic Variations is a work for piano and orchestra by César Franck and one of his most celebrated compositions. It exemplifies his mature style, combining formal rigor with lyrical invention. The piece was commissioned by the pianist Louis Diémer, who also gave the work's first performance, with the composer conducting. The Symphonic Variations are structured as a single continuous movement in three main sections: an introduction, the set of variations proper, and a finale. The work opens with a broad orchestral introduction that presents the principal themes, which are then developed and transformed throughout the variations. Franck's approach integrates the variation form with symphonic development, creating a seamless musical arc rather than a set of contrasting numbers. Since its premiere, the Symphonic Variations have become a staple of the piano-orchestral repertoire and remain among Franck's most frequently performed and recorded works."
 elgar.1581.f: "The Concierto de Aranjuez is a concerto for solo guitar and orchestra by Joaquín Rodrigo. It is not only Rodrigo's most popular work but also one of the best-known classical music pieces of the 20th century. Rodrigo composed the Concierto de Aranjuez at the suggestion of his friend, the guitarist Regino Sáinz de la Maza, who also performed the solo part at the premiere and to whom the work is dedicated. In the concerto, Rodrigo depicts the gardens of the Royal Palace of Aranjuez, south of Madrid, the spring residence of the Spanish kings. For Rodrigo, Aranjuez symbolized the reign of the last Spanish monarchs before Napoleon Bonaparte. He felt a strong personal connection to the palace, having often walked in its gardens with his future wife. In the second movement, Rodrigo expresses his emotions following the stillbirth of his first son, including a prayer to God to spare the life of his beloved wife, Victoria."
 elgar.1582.f: "Fantasia para un gentilhombre is a concerto for guitar and orchestra by Joaquín Rodrigo. It is his second most popular concerto, after the Concierto de Aranjuez. Its four movements are based on six short dances for solo guitar by the 17th-century Spanish composer Gaspar Sanz, taken from his work commonly known as Instrucción de música sobre la guitarra española in three volumes (1674, 1675, 1697). Most of the movements retain Sanz's original titles. He was careful to preserve the clarity and character of Sanz's original ideas, stating: 'A whole past of dances, in which old and new times converge, comes alive in these titles. I intended that the harmonic language and the sonic atmosphere would not hinder the spirit of those titles.'"
 elgar.1583.f: "Concierto Serenata is a concerto for harp and orchestra composed by Joaquín Rodrigo. It was written for the renowned Spanish harpist Nicanor Zabaleta, who premiered the work with the Spanish National Orchestra conducted by Odón Alonso. It has become a valued part of the 20th-century harp repertoire and is admired for its engaging interplay between the soloist and orchestra."
 elgar.1591.f: "The Radetzky March is a march composed by Johann Strauss and dedicated to the Austrian field marshal Josef Wenzel Count Radetzky of Radetz. Its origin is closely linked to the events of the March Revolution in Austria. After Radetzky's victory over Sardinian troops, the conservative forces regained the upper hand not only in rebellious Italy, but there was also the prospect of suppressing the revolution in Vienna. In this situation, Strauss, whose sympathies had always been on the side of those loyal to the emperor, organized a victory celebration in the park grounds of the Wasserglacis 'in honor of the brave army in Italy and in support of the wounded soldiers,' and announced the premiere of a new march, which was first performed as the Radetzky March."
 elgar.1592.f: "Together with Josef Lanner, and before the rise of his son, Strauss was considered the king of the Viennese waltz. The history of the Viennese waltz begins with its first recorded mention in 1797 in Breslau, although 'walzen,' in the sense of 'to turn oneself,' dates back much earlier. It gained popularity during the Congress of Vienna in 1814/15. Originally, it was danced very quickly, and only in the early 20th century did it develop into the 'floating' style known today. Loreley-Rheinklänge is regarded as the most successful Viennese waltz by the elder Strauss."
 elgar.1593.f: "The 'Cachucha Galop' was premiered at the Goldene Birn inn in Vienna. The cachucha was a very popular Spanish dance at the time. On the original score of this galop, preserved by the Society of the Friends of Music in Vienna, the following note appears: 'This galop was composed by Johann Strauss one hour before the opening of the ball, copied by the copyist, performed without rehearsal, received with extraordinary applause, and repeated three times.'"
