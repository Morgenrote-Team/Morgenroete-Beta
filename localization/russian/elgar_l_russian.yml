 je_elgar_composer_masterpiece_reason: "[GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] полностью посвятит себя созданию шедевра в течение следующих месяцев. Время, необходимое композитору для создания шедевра, зависит в первую очередь от его репутации. Великий композитор может создать шедевр всего за два года. Композиторам с репутацией менее 400 требуется значительно больше времени; композитору с репутацией менее 250 даже не стоит и пытаться. В конце рабочего процесса [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] представит определяющий музыкальный шедевр нашего поколения."
