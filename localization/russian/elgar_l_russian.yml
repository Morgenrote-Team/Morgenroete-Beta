 elgar_adopt_national_anthem_decision_desc: "С ростом национализма отсутствие национального гимна равносильно обману. Достаточно выбрать достаточно приемлемую церемониальную музыку для представительских целей. Композиторы могут случайным образом создавать музыкальные произведения, которые будут использоваться позже, но их можно и заказать напрямую. Не все гимны должны иметь слова, но это гораздо престижнее."
