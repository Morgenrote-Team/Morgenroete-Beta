 theiler_medicinal_plant_project_progress_medicinal_plants_isolated_tt: "#default_text [GetPlayer.GetName] имеет [Concept('concept_theiler_biologist', 'биолога')], а [concept_mendelejew_chemist] выделил[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')] вещество.#!"
