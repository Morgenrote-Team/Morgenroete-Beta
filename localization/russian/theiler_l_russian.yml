 theiler_electron_microscope_modifier: "Электронный микроскоп"
 theiler.11.t: "Ахроматический микроскоп"
 theiler.11.d: "[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName] и [GetPlayer.MakeScope.Var('theiler_biologist_var').GetCharacter.GetFullName] сегодня представили их новый микроскоп."
 theiler.11.f: "В 1868 году Эрнст Аббе изобрел апохроматическую линзу - объектив микроскопа, который устраняет как первичные, так и вторичные искажения цвета. В 1870 году Аббе изобрел конденсор Аббе, который использовался для освещения микроскопа. В 1871 году он сконструировал первый рефрактометр, который описал в брошюре, опубликованной в 1874 году. К 1872 году он разработал законы получения изображений несветящихся объектов. Компания Zeiss Optical Works начала продавать свои усовершенствованные микроскопы в 1872 году, в том числе модели с однородным иммерсионным объективом в 1877 году и микроскопы с апохроматическим объективом в 1886 году."
 theiler.11.g: "Революция для микробиологии."
 theiler.12.t: "Электронный микроскоп"
 theiler.12.d: "[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName] и [GetPlayer.MakeScope.Var('theiler_biologist_var').GetCharacter.GetFullName] сегодня представили их новый микроскоп."
 theiler.12.f: "По сей день вопрос о том, кто изобрел просвечивающий электронный микроскоп, остается спорным. В 1928 году в Высшей технической школе в Шарлоттенбурге Адольф Маттиас назначил Макса Кнолля руководителем группы исследователей, которая занималась исследованиями в области электронных пучков и электронно-лучевых осциллографов. В состав команды входили несколько аспирантов, в том числе Эрнст Руска. В 1931 году Макс Кнолль и Эрнст Руска успешно создали увеличенные изображения ячеистых сеток, размещенных над отверстием анода. Очевидно, что независимо от этих усилий Рейнхольд Рюденберг работал в Siemens-Schuckert. Согласно патентному законодательству, он является изобретателем электронного микроскопа, но неясно, когда у него появился работающий инструмент."
 theiler.12.g: "Предполагается, что он даже способен обнаруживать вирусы!"
