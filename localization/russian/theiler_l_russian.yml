 theiler_microbiology_tech_desc: "Микробиологические исследования проводились с помощью первых микроскопов ещё с XVII века, но только с медицинскими достижениями XIX века и усовершенствованием микроскопной техники возникла новая отрасль биолого-медицинских исследований, которая коренным образом изменила многие сферы повседневной жизни."
