 je_theiler_medicinal_plant_strychnine: "Чилибуха"
 je_theiler_medicinal_plant_strychnine_reason: "Процесс изобретения нового лекарства обычно следует такому порядку: основываясь на уровне медицинской техники, [concept_panum_physician] предлагает найти определенные [concept_ito_medicinal_plants] для медицинского использования, в данном случае не менее #V 5 единиц [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. [concept_dubois_naturalist] получает задание собрать достаточно образцов для выделения вещества. Затем [concept_mendelejew_chemist] изолирует химическое вещество. Как только оно найдено, [concept_theiler_biologist] может произвести лекарство.\n\nЧилибуха (Strychnos nux-vomica) — тропическое дерево родом из Индии и Юго-Восточной Азии. Его семена содержат алкалоиды стрихнин и бруцин, оба высокотоксичны. Стрихнин поражает нервную систему, вызывая сильные мышечные судороги и возможную смерть. Несмотря на токсичность, в малых контролируемых дозах экстракты исторически использовались в медицине как стимулятор и для лечения расстройств пищеварения или нервной системы."
