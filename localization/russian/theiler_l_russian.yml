 theiler_pharmaceutical_pilocarpine_flag: "Пилокарпус"
 theiler_pharmaceutical_ephedrine_flag: "Эфедра китайская"
 theiler_pharmaceutical_strophantine_flag: "Строфант приятный"
 theiler.41.strychnine: "Чилибуха (Strychnos nux-vomica) — тропическое дерево родом из Индии и Юго-Восточной Азии. Его семена содержат алкалоиды стрихнин и бруцин, оба высокотоксичны. Стрихнин поражает нервную систему, вызывая сильные мышечные судороги и возможную смерть. Несмотря на токсичность, в малых контролируемых дозах экстракты исторически использовались в медицине как стимулятор и для лечения расстройств пищеварения или нервной системы."
 theiler.41.emetine: "Ипекакуана (Carapichea ipecacuanha) — тропическое растение родом из Южной Америки, особенно Бразилии. Его корни содержат алкалоиды эметин и цефаелин, которые вызывают рвоту и обладают противопаразитарным действием. Традиционно корень ипекакуаны использовался как рвотное средство при отравлениях и как отхаркивающее в сиропах от кашля."
 theiler.41.atropine: "Белладонна (Atropa belladonna), или красавка, — многолетнее растение родом из Европы, Северной Африки и Западной Азии. Содержит токсичные алкалоиды, такие как атропин, скополамин и гиосциамин, которые влияют на нервную систему, блокируя ацетилхолиновые рецепторы. Исторически использовалась как седативное и обезболивающее средство, а также для расширения зрачков. В современной медицине очищенный атропин применяется в офтальмологии, для лечения брадикардии и при отравлении фосфорорганическими соединениями."
 theiler.41.aloin: "Алоэ вера — суккулентное растение родом из Северной Африки и Аравийского полуострова. Его мясистые листья содержат гель, богатый полисахаридами, витаминами и ферментами, обладающий успокаивающими и увлажняющими свойствами. Гель широко используется в косметике и медицине для лечения ожогов, ран и раздражений кожи. Высушенный латекс из внутреннего слоя листа содержит алоин, обладающий сильным слабительным эффектом."
 theiler.41.digitoxin: "Наперстянка пурпурная (Digitalis purpurea) — двулетнее растение родом из Европы. Её листья содержат сердечные гликозиды, такие как дигоксин и дигитоксин, которые усиливают сердечные сокращения и регулируют сердцебиение. Традиционно экстракты использовались для лечения сердечной недостаточности и аритмии. Очищенные сердечные гликозиды осторожно дозируются в медицине, а сырое растение избегают из-за высокого риска отравления."
 theiler.41.quinine: "Хинное дерево (Cinchona pubescens) родом из Южной Америки, особенно из Анд. Его кора содержит хинин и другие алкалоиды, обладающие сильными противомалярийными свойствами. Традиционно кору использовали для лечения лихорадки и малярии. И сегодня хинин и его производные остаются важными средствами лечения малярии. Дерево также культивируется в тропических регионах ради лекарственной коры."
 theiler.41.thymol: "Тимьян обыкновенный (Thymus vulgaris) — небольшой многолетний кустарник родом из Средиземноморья. Его листья и масло содержат тимол, карвакрол и другие эфирные масла с антимикробными, антиоксидантными и противовоспалительными свойствами. Традиционно тимьян использовался для лечения респираторных инфекций, кашля и проблем с пищеварением. Широко применяется в фитотерапии, ароматерапии, а также как натуральный консервант и ароматизатор в пище."
 theiler.41.pilocarpine: "Пилокарпус (Pilocarpus pennatifolius) — тропический кустарник родом из Бразилии. Его листья содержат алкалоид пилокарпин, который стимулирует слюнные и потовые железы. Традиционно использовался для лечения сухости во рту и заболеваний глаз. В современной медицине пилокарпин применяется для лечения глаукомы путем снижения внутриглазного давления и ксеростомии (сухости во рту), вызванной радиацией или лекарствами. Растение ценится прежде всего за фармакологически активные алкалоиды."
 theiler.41.ephedrine: "Эфедра китайская (Ephedra sinica), или ма хуанг, — кустарник родом из Китая и Центральной Азии. Его стебли содержат эфедрин и псевдоэфедрин, алкалоиды, стимулирующие нервную систему и расширяющие бронхи. Использовалась в китайской медицине для лечения астмы, бронхита и заложенности носа. Применение ограничено из-за риска гипертонии, проблем с сердцем и других побочных эффектов."
 theiler.41.strophantine: "Строфант приятный (Strophanthus gratus) — вьющееся растение родом из Западной Африки. Его семена содержат сердечные гликозиды, такие как уабаин, сильно влияющие на сердечные сокращения. Традиционно экстракты использовались как яд для стрел и в малых дозах для лечения болезней сердца. Уабаин изучался для лечения сердечной недостаточности и аритмии."
