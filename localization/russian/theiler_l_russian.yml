 theiler.51.p: "Возбудитель полиомиелита"
 theiler.52.t: "Разработка вакцины"
 theiler.52.d: "Доктор [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('theiler_biologist_var').GetCharacter.IsFemale, 'взялась', 'взялся')] за разработку революционной вакцины, призванной избавить мир от одной из страшных болезней. Однако цель исследований пока не выбрана."
 theiler.52.f: "Вакцины — самое мощное оружие медицины и биологии против болезней. При сильной системе здравоохранения они способны полностью предотвратить вспышки эпидемий. Прежде чем создать вакцину, биологи должны изучить соответствующий патоген. Некоторые вакцины требуют технологических предпосылок — например, для тифа, желтой лихорадки и дифтерии необходима генетика."
