 theiler.2201.t: "Сельскохозяйственные улучшения"
 theiler.2201.d: "Доктор [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] достиг[SelectLocalization(SCOPE.sCharacter('theiler_biologist_scope').IsFemale, 'ла', '')] своей цели. Путем тщательного отбора и применения своих биологических знаний [SCOPE.sCharacter('theiler_biologist_scope').GetSheHe] значительно укрепил[SelectLocalization(SCOPE.sCharacter('theiler_biologist_scope').IsFemale, 'а', '')] сельскохозяйственную отрасль нашей страны.\n\nВсего улучшенных зданий: [GetPlayer.MakeScope.Var('mr_num_improved_agriculture_buildings_var').GetValue|V0]"
 theiler.2201.f: "«Эти идиоты всё еще думают, что они одомашнили все эти растения. На самом деле растения одомашнили нас, людей. Просто посмотрите, как мы за ними ухаживаем!»"
 theiler.2201.g: "Наша экономика растет!"
