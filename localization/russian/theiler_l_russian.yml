 je_theiler_improve_agriculture_project: "Проект по улучшению сельского хозяйства"
 je_theiler_improve_agriculture_project_reason: "Ваш [concept_theiler_biologist], доктор [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName], сосредоточен[SelectLocalization(ROOT.Var('theiler_biologist_var').GetCharacter.IsFemale, 'а', '')] на повышении производительности [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] в [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetAltNameNoFlag('RU_SL_VP')].\n$mr_divider_for_je$\nПроект получает прогресс каждый месяц. Всякий раз, когда прогресс достигает 24, текущее здание получает новый модификатор. Как только все выбранные для этого проекта здания получат модификаторы, проект завершится.\n\nВсего доступно 3 модификатора. Для каждого нового модификатора прогресс должен заполниться заново.\n$mr_divider_for_je$\nТекущее здание: [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] в [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetAltNameNoFlag('RU_SL_VP')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_theiler_improve_agriculture_project_modifier_1_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_theiler_improve_agriculture_project_modifier_2_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_theiler_improve_agriculture_project_modifier_3_type')]\n\nВсего осталось зданий (исключая текущее): [JournalEntry.MakeScope.Var('mr_number_of_remaining_list_entries_var').GetValue|V0]\n\nТекущий ежемесячный прогресс: #underline #tooltip:[GetRawTextTooltipTag('theiler_monthly_biologist_improvement_progress_var_tt')] [GetPlayer.MakeScope.ScriptValue('theiler_improve_agriculture_project_progress_value')|+2] #!#!"
