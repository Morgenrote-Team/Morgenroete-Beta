 je_group_theiler_biology: "Morgenröte: [concept_theiler_biology]"
 je_theiler_microorganism_research_reason: "Доктор [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] в настоящее время исследует удивительный мир микроорганизмов. В зависимости от [SelectLocalization(ROOT.Var('theiler_biologist_var').GetCharacter.IsFemale, 'её', 'его')] навыков и используемого микроскопа, [SelectLocalization(ROOT.Var('theiler_biologist_var').GetCharacter.IsFemale, 'она', 'он')] будет открывать новые микроорганизмы каждый месяц. Всестороннее знание микроорганизмов необходимо для обнаружения [Concept('concept_theiler_pathogen', 'возбудителей')].\n\nЕсли наш [concept_theiler_biologist|l] ещё не [SelectLocalization(ROOT.Var('theiler_biologist_var').GetCharacter.IsFemale, 'приобрела', 'приобрёл')] этот навык, существует вероятность, что доктор [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] получит черту «$theiler_microbiologist$»."
 je_theiler_microorganism_research: "Исследование микроорганизмов"
 theiler_biologist_dies_tt: "Запись в дневнике будет отменена, если [concept_theiler_biologist|l] умрёт."
 je_theiler_microscope_achromatic: "Ахроматический микроскоп"
 je_theiler_microscope_achromatic_reason: "Эрнст Аббе в 1870-х годах разработал усовершенствованный ахроматический микроскоп, который значительно улучшил чёткость и разрешение изображения благодаря точному оптическому дизайну. Его работа в Carl Zeiss заложила основу для современной научной микроскопии и стандартизировала конструкцию линз.\n\nЛучшие микроскопы позволяют более успешно наблюдать за [Concept('concept_theiler_pathogen', 'возбудителями')] и другими [Concept('concept_theiler_microorganism', 'микроорганизмами')]. Вы будете получать прогресс, если у вас есть и [concept_tesla_engineer|l], и [concept_theiler_biologist|l]."
 je_theiler_microscope_achromatic_goal: "[concept_theiler_biologist] и [concept_tesla_engineer|l] должны потратить [JournalEntry.GetTotalGoalValue|V0] недель на совместную работу над новым микроскопом."
 je_theiler_microscope_electron: "Электронный микроскоп"
 je_theiler_microscope_electron_reason: "Электронный микроскоп, разработанный в 1930-х годах Эрнстом Руской и Максом Кноллем, использует электронные пучки вместо света для достижения гораздо более высокого разрешения. Он сыграл решающую историческую роль, позволив учёным наблюдать структуры на нанометровом уровне, далеко за пределами возможностей оптических микроскопов.\n\nЛучшие микроскопы позволяют более успешно наблюдать за [Concept('concept_theiler_pathogen', 'возбудителями')] и другими [Concept('concept_theiler_microorganism', 'микроорганизмами')]. Вы будете получать прогресс, если у вас есть и [concept_tesla_engineer|l], и [concept_theiler_biologist|l]."
 je_theiler_microscope_electron_goal: "[concept_theiler_biologist] и [concept_tesla_engineer|l] должны потратить [JournalEntry.GetTotalGoalValue|V0] недель на совместную работу над новым микроскопом."
