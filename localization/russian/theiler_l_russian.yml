 theiler.10.t: "Рождение микробиологии"
 theiler.10.d: "Новое исследование вызывает переполох в биологических и медицинских кругах. Его автор, доктор [SCOPE.sCharacter('theiler_biologist_scope').GetLastName], сделал[SelectLocalization(SCOPE.sCharacter('theiler_biologist_scope').IsFemale, 'а', '')] открытия о бактериях, которые могут изменить наш взгляд на мир."
 theiler.10.f: "Систематическая работа доктора [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] по классификации бактерий дала замечательные результаты. [SelectLocalization(SCOPE.sCharacter('theiler_biologist_scope').IsFemale, 'Её', 'Его')] «Исследование бактерий» утвердило бактерии как отдельную таксономическую группу с воспроизводимыми характеристиками. [SCOPE.sCharacter('theiler_biologist_scope').GetSheHe] доказал[SelectLocalization(SCOPE.sCharacter('theiler_biologist_scope').IsFemale, 'а', '')], что бактерии можно культивировать, изучать и классифицировать так же строго, как растения или животных. Самое главное, [SelectLocalization(SCOPE.sCharacter('theiler_biologist_scope').IsFemale, 'её', 'его')] методы позволяют исследователям отличать безвредные бактерии от патогенных. Методы доктора [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] могут заложить основу для совершенно новой отрасли медицины — той, которая, наконец, сможет объяснить механизмы инфекционных заболеваний."
 theiler.10.g: "Прорыв в поиске микроорганизмов."
 theiler.10.h: "Прорыв в микробной теории."
