 theiler_cell_culture_tech: "Культура клеток"
 theiler_cell_culture_tech_desc: "Культура клеток — это выращивание клеток животных или растений в питательной среде вне организма. В 1885 году Вильгельм Ру первым сумел сохранить жизнеспособность эмбриональных клеток курицы в солевом растворе в течение нескольких дней, продемонстрировав тем самым основополагающий принцип. В 1907 году Росс Грэнвилл Харрисон культивировал спинной мозг земноводных и доказал, что аксоны развиваются как отростки отдельных нервных клеток. В 1913 году Эдна Стейнхардт, Чай Исраэли и Роберт А. Ламберт вырастили вирус осповакцины на фрагментах роговицы морской свинки."
 theiler.51.t: "Исследование патогенов"
 theiler.51.d: "Доктор [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('theiler_biologist_var').GetCharacter.IsFemale, 'решила', 'решил')] более тщательно изучить опасный патоген, чтобы получить новые знания об этом биче человечества. Исследовательский проект всё ещё открыт."
 theiler.51.f: "Изучение патогена, состоящее из его обнаружения и изоляции, является важным шагом на пути к разработке эффективной вакцины. Исследование конкретного возбудителя требует описания болезни, наличия ахроматического или электронного микроскопа (в зависимости от того, бактерия это или вирус) и определенного количества известных микробов — в конечном итоге биолог должен уметь отличать искомый микроорганизм."
