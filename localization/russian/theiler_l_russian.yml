 theiler.101.t: "Холерный вибрион"
 theiler.101.d: "Доктору [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] удалось идентифицировать и изолировать возбудитель холеры. Это важный шаг на пути к созданию эффективной вакцины."
 theiler.101.f: "Бактерия Vibrio cholerae была впервые описана итальянским анатомом Филиппо Пачини в 1854 году, однако её роль в возникновении холеры была подтверждена Робертом Кохом лишь в 1884 году. Это изогнутый палочковидный микроорганизм, обитающий в водной среде, особенно в теплой солоноватой воде. V. cholerae — грамотрицательная бактерия, обладающая одним полярным жгутиком для передвижения и выделяющая холерный токсин, который нарушает водный баланс кишечника, вызывая сильную диарею."
 theiler.101.g: "Мерзкая маленькая тварь."
 theiler.201.t: "Микобактерия туберкулеза"
 theiler.201.d: "Доктору [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] удалось идентифицировать и изолировать возбудитель туберкулеза. Это важный шаг на пути к созданию эффективной вакцины."
 theiler.201.f: "Эта бактерия была обнаружена Робертом Кохом в 1882 году, за что в 1905 году он получил Нобелевскую премию. M. tuberculosis — медленнорастущая палочковидная бактерия с воскообразной клеточной стенкой, богатой миколовыми кислотами, что делает её устойчивой к окраске по Граму и многим антибиотикам. Вместо этого её классифицируют как «кислотоустойчивую». Патоген является строгим аэробом и поражает преимущественно легкие, хотя может распространяться и на другие органы."
 theiler.201.g: "Твое время вышло, безмолвный убийца."
 theiler.301.t: "Ортопоксвирус натуральной оспы"
 theiler.301.d: "Доктору [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] удалось идентифицировать и изолировать возбудитель оспы. Спустя много лет после первой вакцинации возбудитель наконец-то можно наблюдать и классифицировать."
 theiler.301.f: "Возбудитель натуральной оспы, вирус Variola, относится к семейству поксвирусов (Poxviridae). В отличие от большинства вирусов, он реплицируется исключительно в цитоплазме клеток-хозяев. Это крупный вирус кирпичеобразной формы, содержащий двухцепочечную ДНК. Натуральная оспа стала целью первой успешной вакцинации, предложенной Эдвардом Дженнером в 1796 году, и первым человеческим патогеном, полностью искорененным с помощью вакцинации в 1980 году."
 theiler.301.g: "Как что-то столь ничтожное могло сокрушать империи?"
 theiler.401.t: "Риккетсия Провазекия"
 theiler.401.d: "Доктору [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] удалось идентифицировать и изолировать возбудитель тифа. Это важный шаг на пути к созданию эффективной вакцины."
 theiler.401.f: "Энрик да Роша Лима открыл эту бактерию в 1916 году. Он назвал её в честь своего коллеги Станислава фон Провачека, умершего от тифа в 1915 году. Оба ученых заразились тифом, изучая его возбудитель в госпитале лагеря для военнопленных в Котбусе (Германия). Бактерия лишена жгутиков и является аэробной. Она классифицируется как грамотрицательная, поскольку её клеточная стенка не удерживает кристаллический фиолетовый краситель; грамотрицательные бактерии, как правило, более устойчивы ко многим антибиотикам, таким как пенициллин."
 theiler.401.g: "Маленький, зловещий попутчик!"
 theiler.501.t: "Вирус жёлтой лихорадки"
 theiler.501.d: "Доктору [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] удалось идентифицировать и изолировать возбудитель желтой лихорадки. Это важный шаг на пути к созданию эффективной вакцины."
 theiler.501.f: "Вирус желтой лихорадки был впервые выделен в 1927 году у пациента в Гане. Он относится к семейству Flaviviridae и содержит одноцепочечную положительно-смысловую РНК. Вирус переносится комарами рода Aedes, главным образом Aedes aegypti. Инфекция вызывает лихорадку, мышечную боль и желтуху, а в тяжелых случаях приводит к кровотечениям и отказу органов."
 theiler.501.g: "Раскрыта одна из самых жестоких уловок природы."
 theiler.601.t: "Вирус кори"
 theiler.601.d: "Доктору [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] удалось идентифицировать и изолировать возбудитель кори. Это важный шаг на пути к созданию эффективной вакцины."
 theiler.601.f: "Вирус кори относится к роду Morbillivirus семейства Paramyxoviridae. Это оболочечный вирус с одноцепочечной отрицательно-смысловой РНК. Передается воздушно-капельным путем и является одним из самых заразных вирусов, известных человеку. Корь вызывает лихорадку, кашель, конъюнктивит и характерную сыпь, а также может приводить к тяжелым осложнениям, таким как пневмония или энцефалит."
 theiler.601.g: "Крошечный террорист, атакующий иммунную систему."
 theiler.701.t: "Пиогенный стрептококк"
 theiler.701.d: "Доктору [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] удалось идентифицировать и изолировать возбудитель скарлатины. Это важный шаг на пути к созданию эффективной вакцины."
 theiler.701.f: "Бактерия Streptococcus pyogenes представляет собой грамположительный кокк, образующий цепочки. Она относится к бета-гемолитическим стрептококкам группы А и была впервые связана со скарлатиной в XIX веке. Её вирулентность обусловлена выделяемыми экзотоксинами, включая эритрогенный токсин, вызывающий сыпь. Этот организм также вызывает стрептококковую ангину, импетиго и ревматическую лихорадку."
 theiler.701.g: "Какой хитрый негодяй..."
 theiler.801.t: "Чумная палочка"
 theiler.801.d: "Доктору [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] удалось идентифицировать и изолировать возбудитель чумы. Это важный шаг на пути к созданию эффективной вакцины."
 theiler.801.f: "Yersinia pestis была открыта Александром Йерсеном в 1894 году во время эпидемии в Гонконге. Это грамотрицательная, неподвижная коккобацилла. Бактерия передается блохами, паразитирующими на инфицированных грызунах, чаще всего черных крысах. Она вызывает три формы чумы: бубонную, септическую и легочную. Без лечения смертность чрезвычайно высока."
 theiler.801.g: "Так вот он каков, микроскопический жнец?"
 theiler.901.t: "Дифтерийная палочка"
 theiler.901.d: "Доктору [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] удалось идентифицировать и изолировать возбудитель дифтерии. Это важный шаг на пути к созданию эффективной вакцины."
 theiler.901.f: "Эта грамположительная бактерия булавовидной формы была определена как причина дифтерии Эдвином Клебсом в 1883 году и культивирована Фридрихом Лёффлером годом позже. C. diphtheriae — аэробная и неподвижная бактерия. Её самой опасной особенностью является дифтерийный токсин, кодируемый бактериофагом, который повреждает ткани сердца и нервной системы. Некогда эта болезнь была одной из главных причин детской смертности, но теперь контролируется вакцинацией."
 theiler.901.g: "Обманчиво проста, но разрушительно жестока."
 theiler.1001.t: "Полиовирус"
 theiler.1001.d: "Доктору [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] удалось идентифицировать и изолировать возбудитель полиомиелита. Это важный шаг на пути к созданию эффективной вакцины."
 theiler.1001.f: "Полиовирус относится к семейству Picornaviridae и был впервые выделен в 1909 году. Это небольшой безоболочечный вирус с одноцепочечной положительно-смысловой РНК. Вирус распространяется преимущественно фекально-оральным путем и поражает двигательные нейроны спинного мозга, что иногда приводит к необратимому параличу. Глобальные кампании вакцинации поставили полиовирус на грань исчезновения."
 theiler.1001.g: "Как может что-то невидимое причинять столько вреда?"
 theiler.102.t: "Вакцина от холеры"
 theiler.102.d: "После многочисленных экспериментов, неудач и тестов доктор [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] совершил[SelectLocalization(ROOT.Var('theiler_biologist_var').GetCharacter.IsFemale, 'а', '')] прорыв: вакцина против холеры больше не мечта, а реальность. Медицинская и биологическая революция!"
 theiler.102.f: "Первая вакцина от холеры была разработана в 1885 году испанским врачом Хайме Ферраном, который использовал живые ослабленные штаммы Vibrio cholerae. Его полевые испытания во время вспышки в Валенсии стали одной из первых массовых иммунизаций против бактериального заболевания. Позднее вакцины перешли на использование убитых цельноклеточных препаратов, а затем и на современные оральные формы, сочетающие убитые бактерии с рекомбинантной B-субъединицей холерного токсина."
 theiler.102.g: "Наука наносит ответный удар."
 theiler.202.t: "Вакцина от туберкулеза"
 theiler.202.d: "После многочисленных экспериментов, неудач и тестов доктор [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] совершил[SelectLocalization(ROOT.Var('theiler_biologist_var').GetCharacter.IsFemale, 'а', '')] прорыв: вакцина против туберкулеза больше не мечта, а реальность. Медицинская и биологическая революция!"
 theiler.202.f: "Вакцина БЦЖ (Bacillus Calmette-Guérin) была представлена в 1921 году французскими учеными Альбером Кальметом и Камилем Гереном. Она основана на живом ослабленном штамме Mycobacterium bovis, родственном M. tuberculosis. Вакцина обеспечивает переменную защиту от легочного туберкулеза, но высокоэффективна в предотвращении тяжелых детских форм, таких как милиарный туберкулез и туберкулезный менингит."
 theiler.202.g: "Искра надежды в борьбе с невидимым убийцей."
 theiler.402.t: "Вакцина от тифа"
 theiler.402.d: "После многочисленных экспериментов, неудач и тестов доктор [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] совершил[SelectLocalization(ROOT.Var('theiler_biologist_var').GetCharacter.IsFemale, 'а', '')] прорыв: вакцина против тифа больше не мечта, а реальность. Медицинская и биологическая революция!"
 theiler.402.f: "Первая эффективная вакцина от тифа была разработана в 1930-х годах польским биологом Рудольфом Вайглем. Он выращивал Rickettsia prowazekii в кишечнике вшей и использовал инактивированные бактерии для иммунизации. Во время Второй мировой войны его лаборатория во Львове тайно использовала производство вакцины для укрытия и трудоустройства людей, которым грозило преследование нацистов. Современные вакцины от эпидемического тифа сегодня используются редко."
 theiler.402.g: "Мы перехитрили попутчика."
 theiler.502.t: "Вакцина от желтой лихорадки"
 theiler.502.d: "После многочисленных экспериментов, неудач и тестов доктор [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] совершил[SelectLocalization(ROOT.Var('theiler_biologist_var').GetCharacter.IsFemale, 'а', '')] прорыв: вакцина против желтой лихорадки больше не мечта, а реальность. Медицинская и биологическая революция!"
 theiler.502.f: "Вакцина от желтой лихорадки была разработана в 1930-х годах южноафриканским вирусологом Максом Тейлером, который в 1951 году получил за это Нобелевскую премию. Он ослабил вирус путем многократного пассирования в куриных эмбрионах, получив штамм 17D. Эта живая аттенуированная вакцина остается одной из самых эффективных из когда-либо созданных, обеспечивая длительный иммунитет после одной дозы."
 theiler.502.g: "Удар по комариной болезни."
 theiler.602.t: "Вакцина от кори"
 theiler.602.d: "После многочисленных экспериментов, неудач и тестов доктор [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] совершил[SelectLocalization(ROOT.Var('theiler_biologist_var').GetCharacter.IsFemale, 'а', '')] прорыв: вакцина против кори больше не мечта, а реальность. Медицинская и биологическая революция!"
 theiler.602.f: "Вакцина от кори была лицензирована в 1963 году. Её разработали Джон Эндерс и его коллеги после успешного выращивания вируса в клетках куриного эмбриона. Живая аттенуированная вакцина резко снизила смертность от кори во всем мире. Позже она была объединена с вакцинами против эпидемического паротита и краснухи в вакцину MMR, которая остается краеугольным камнем плановой детской иммунизации."
 theiler.602.g: "Крошечный монстр встретил достойного противника."
 theiler.802.t: "Вакцина от чумы"
 theiler.802.d: "После многочисленных экспериментов, неудач и тестов доктор [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] совершил[SelectLocalization(ROOT.Var('theiler_biologist_var').GetCharacter.IsFemale, 'а', '')] прорыв: вакцина против чумы больше не мечта, а реальность. Медицинская и биологическая революция!"
 theiler.802.f: "Первая противочумная вакцина была представлена в 1897 году Владимиром Хавкиным, работавшим в Бомбее во время эпидемии. Он использовал убитые нагреванием бактерии Yersinia pestis для приготовления инъекционной вакцины. Хотя она снижала смертность, защита была ограниченной и кратковременной. Более современные исследования сосредоточены на субъединичных вакцинах, нацеленных на антигены F1 и V бактерии."
 theiler.802.g: "Последний час жнеца пробил!"
 theiler.902.t: "Вакцина от дифтерии"
 theiler.902.d: "После многочисленных экспериментов, неудач и тестов доктор [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] совершил[SelectLocalization(ROOT.Var('theiler_biologist_var').GetCharacter.IsFemale, 'а', '')] прорыв: вакцина против дифтерии больше не мечта, а реальность. Медицинская и биологическая революция!"
 theiler.902.f: "Дифтерийный анатоксин был разработан в 1920-х годах после того, как Гастон Рамон во Франции и Александр Гленни в Англии обнаружили, что обработанный формальдегидом дифтерийный токсин может вызывать иммунитет, не вызывая заболевания. Вакцина, часто в сочетании с антигенами столбняка и коклюша (АКДС), резко снизила детскую смертность в середине XX века."
 theiler.902.g: "Хрипы в ночи закончились."
 theiler.1002.t: "Вакцина от полиомиелита"
 theiler.1002.d: "После многочисленных экспериментов, неудач и тестов доктор [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] совершил[SelectLocalization(ROOT.Var('theiler_biologist_var').GetCharacter.IsFemale, 'а', '')] прорыв: вакцина против полиомиелита больше не мечта, а реальность. Медицинская и биологическая революция!"
 theiler.1002.f: "В XX веке были созданы две эффективные вакцины от полиомиелита. Джонас Солк разработал инактивированную полиомиелитную вакцину (ИПВ) в 1955 году, используя химически убитые полиовирусы. Несколько лет спустя Альберт Сэбин представил оральную полиомиелитную вакцину (ОПВ) на основе живых ослабленных штаммов, которую было легче вводить и которая обеспечивала кишечный иммунитет. Обе вакцины сыграли центральную роль в глобальных усилиях по ликвидации полиомиелита."
 theiler.1002.g: "Никакой пощады убийце детских надежд!"
 theiler_microbiological_institute_modifier: "Институт микробиологии"
 theiler_microbiological_promotion_modifier: "Содействие микробиологии"
 theiler_military_vaccine_modifier: "Военная вакцинация"
 theiler_failed_vaccine_experiment_modifier: "Неудачный эксперимент с вакциной"
 theiler_vaccine_guinea_pigs_modifier: "Подопытные для вакцины"
 theiler_vaccine_subsidy_modifier: "Субсидия на вакцины"
 theiler.2101.t: "Микробиологический институт"
 theiler.2101.d: "Интенсивные исследования патогенов побудили ведущих ученых из команды доктора [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] создать институт микробиологии для более эффективного продвижения науки."
 theiler.2101.f: "После успехов в идентификации патогенов (сибирской язвы в 1876-м, туберкулеза в 1882-м, холеры в 1884-м) Роберт Кох получил поддержку прусского правительства для создания собственного института. Это был первый исследовательский центр, систематически и институционально изучавший микроорганизмы как причину болезней. «Laboratoire de Chimie Physiologique» Луи Пастера в Париже (с 1887 года) уже демонстрировала черты подобного научного учреждения. Однако официально первым микробиологическим институтом в современном смысле считается Институт Роберта Коха (1891)."
 theiler.2101.g: "Институт должен заниматься общими исследованиями."
 theiler.2101.h: "Институт должен посвятить себя изучению патогенов."
 theiler.2102.t: "Улучшенный лабораторный метод"
 theiler.2102.d: "Доктор [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] модернизировал[SelectLocalization(ROOT.Var('theiler_biologist_var').GetCharacter.IsFemale, 'а', '')] оборудование микробиологической лаборатории, внедрив новые красители и улучшенные микроскопы, что привело к прорыву в исследовании патогенов."
 theiler.2102.f: "С 1860-х годов синтетические анилиновые красители произвели революцию в микробиологии. Метиленовый синий, фуксин, а позже окраска по Граму (1884) и Цилю-Нильсену впервые позволили дифференцировать бактерии. Около 1900 года добавились специальные красители для спор, капсул и дифтерийных палочек; с 1920 года широкое распространение получили красители Романовского-Гимзы и серебрение, а в 1940-х появились первые флуоресцентные методы."
 theiler.2102.g: "Хорошо."
 theiler.2103.t: "Международное сотрудничество"
 theiler.2103.d: "Пришло письмо от доктора [SCOPE.sCharacter('theiler_biologist_scopet').GetLastName] из [SCOPE.sCountry('theiler_country_scope').GetAltNameNoFlag('RU_CL_RP')]. Биолог, друг доктора [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName], [SelectLocalization(SCOPE.sCharacter('theiler_biologist_scopet').IsFemale, 'поделилась', 'поделился')] ценными сведениями для исследований патогена."
 theiler.2103.f: "С 1885 года японский врач Сибасабуро Китасато работал в Берлинском институте Роберта Коха. Под руководством Коха в 1889 году он впервые получил чистую культуру возбудителя столбняка, что стало вехой в бактериологии. Вместе они заложили основы сывороточной терапии, которая впоследствии использовалась для лечения столбняка и дифтерии. Их сотрудничество считается ранним примером успешного международного научного взаимодействия."
 theiler.2103.g: "Это ускорит исследование патогена."
 theiler.2103.h: "Эти знания дадут нам новые идеи."
 theiler.2104.t: "Несчастный случай в лаборатории"
 theiler.2104.d: "В ходе поиска патогена произошел серьезный инцидент: из-за слабых мер безопасности наши исследователи заразились. Многих сотрудников пришлось поместить в карантин, научная работа может прерваться на месяцы."
 theiler.2104.f: "Работа с патогенами была крайне рискованной. Многие микробиологи заражались в ходе исследований: Роберт Кох неоднократно болел сибирской язвой и туберкулезом, Эмиль фон Беринг заразился во время экспериментов с дифтерийным токсином, а Макс фон Петтенкофер выпил холерные вибрионы, чтобы проверить свою теорию. Защитные меры были примитивными, из-за чего многие исследователи переносили инфекции разной степени тяжести. Этот опыт позже способствовал разработке современных стандартов лабораторной безопасности."
 theiler.2104.g: "Катастрофа!"
 theiler.2104.h: "Мы должны реорганизовать лабораторию любой ценой!"
 theiler.2105.t: "Загрязненные образцы"
 theiler.2105.d: "Как выяснилось, некоторые образцы, с которыми работала команда доктора [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName], были загрязнены, что, к сожалению, затормозило поиск патогена."
 theiler.2105.f: "Работы с сибирской язвой, туберкулезом или дифтерией часто страдали от загрязнения плесенью, другими бактериями или нечистыми образцами сыворотки. Ранние эксперименты Пастера с вакцинами также сталкивались с этой проблемой. Такие загрязнения приводили к ошибочным выводам о патогенах и значительно продвинули развитие методов чистых культур, стерилизации и асептических процедур. Исследования клеточных культур делают подобные инциденты менее вероятными."
 theiler.2105.g: "Кто из ученых за это отвечает?"
 theiler.2106.t: "Спор исследователей"
 theiler.2106.d: "Вокруг поиска патогенов разгорелся научный спор на высоком уровне. Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], один из ведущих врачей страны, в разговоре с доктором [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] подверг[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ла', '')] критике [SelectLocalization(ROOT.Var('theiler_biologist_var').GetCharacter.IsFemale, 'её', 'его')] открытия. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] утверждает, что биолог на ложном пути. В свою очередь, [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] заявляет, что врач вообще ничего не смыслит в предмете."
 theiler.2106.f: "«Ваши эксперименты воняют хуже, чем чашка Петри через две недели!»\n«А вы диагностируете болезни с точностью подбрасывания монетки!»\n«Попрошу! Я спасаю жизни, пока вы возитесь с бактериями, как с домашними питомцами!»\n«Ха! Лучше питомцы, чем пациенты, которые в панике глотают ваши пилюли!»\n«Микроскопный мародер!»\n«Стетоскопный садоми... садист!»"
 theiler.2106.g: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] прав[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')]."
 theiler.2106.h: "Доктор [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] прав[SelectLocalization(ROOT.Var('theiler_biologist_var').GetCharacter.IsFemale, 'а', '')]."
 theiler.2106.i: "Им следует исследовать, а не спорить!"
 theiler.2107.t: "Ассистенты исследователя"
 theiler.2107.d: "Наш биолог доктор [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] предложил[SelectLocalization(ROOT.Var('theiler_biologist_var').GetCharacter.IsFemale, 'а', '')] отозвать часть студентов и ассистентов из академии и направить их в лабораторию для поддержки исследований."
 theiler.2107.f: "«Мы можем разрушить их карьеры, но эй, это же во имя НАУКИ!»"
 theiler.2107.g: "Нанять дополнительных ассистентов."
 theiler.2107.h: "Молодые ученые нужны в другом месте."
 theiler.2111.t: "Военное применение вакцины"
 theiler.2111.d: "Вакцина, над которой работает доктор [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName], показала отличные результаты. Военные уже проявляют к ней огромный интерес как к способу сохранить здоровье солдат и снизить потери в будущей войне."
 theiler.2111.f: "Вакцинация давала решающие преимущества на войне: британские войска в Индии использовали вариоляцию и вакцинацию от оспы, что защищало их от эпидемий. Аналогично, вакцинация от желтой лихорадки в тропических зонах в начале XX века снизила потери от болезней. Привитые солдаты оставались в строю, в то время как непривитые войска слабели от болезней — вакцины, таким образом, действовали как стратегическое оружие."
 theiler.2111.g: "У военных приоритет на вакцинацию."
 theiler.2111.h: "Использовать данные полевых исследований для улучшения вакцины."
 theiler.2112.t: "Удачная находка"
 theiler.2112.d: "Ассистент неожиданно обнаружил в контейнере для отходов образец с удивительно эффективным препаратом."
 theiler.2112.f: "Луи Пастер обнаружил, что «старая» бактериальная культура куриной холеры не вызывает заболевания у кур. Это совпадение привело к разработке ослабленной вакцины, обеспечивающей защиту. Джонас Солк использовал открытие, что полиовирусы могут расти в клеточных культурах и одновременно инактивироваться. Это привело к созданию первой безопасной вакцины от полиомиелита. Александр Флеминг случайно заметил, что плесень убивает бактерии, что привело к открытию пенициллина."
 theiler.2112.g: "Наградить ассистента."
 theiler.2113.t: "Успешное испытание"
 theiler.2113.d: "Первичное испытание новой вакцины оказалось неожиданно эффективным. Доктор [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] подумывает начать массовое производство и вакцинацию гораздо раньше. Это счастливый день для вакцинологии!"
 theiler.2113.f: "Выдающимся примером успешного пилотного испытания вакцины является вакцина от холеры и чумы, разработанная Владимиром Хавкиным в конце XIX века. Хавкин, русско-еврейский микробиолог, провел первые клинические испытания вакцины от холеры в Индии в 1892 году, которая позже использовалась в больших масштабах. В 1897 году он разработал вакцину против чумы, которая была испытана в Индии в 1898 году и привела к резкому снижению смертности. Его работа считается вехой в современной разработке вакцин."
 theiler.2113.g: "Огромный шаг вперед в разработке вакцин!"
 theiler.2113.h: "Это новые данные для медицинских исследований."
 theiler.2114.t: "Непредвиденные побочные эффекты"
 theiler.2114.d: "В городе [SCOPE.sState('theiler_state_scope').GetCityHubName] новая вакцина доктора [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName] вызвала тяжелые побочные эффекты. Многие испытуемые серьезно заболели, некоторые умерли. Испытание не только пошатнуло общественное доверие, но и может существенно отбросить разработку вакцины назад."
 theiler.2114.f: "В 1930-х годах в Любеке произошел серьезный инцидент с вакцинацией: 251 новорожденный получил вакцину БЦЖ против туберкулеза, которая из-за ошибки производства была загрязнена вирулентными бактериями туберкулеза. 208 детей заболели, 77 умерли. «Любекская трагедия» вызвала общественный скандал, задержала введение вакцины БЦЖ в Германии и привела к внедрению более строгих стандартов безопасности при производстве вакцин."
 theiler.2114.g: "Кто мог это предвидеть?"
 theiler.2114.h: "Продолжить эксперименты в этом районе."
 theiler.2115.t: "Обвинение в плагиате"
 theiler.2115.d: "Иностранный биолог из [SCOPE.sCountry('theiler_country_scope').GetAltNameNoFlag('RU_CL_RP')] тщательно изучил[SelectLocalization(SCOPE.sCharacter('theiler_biologist_scope').IsFemale, 'а', '')] процесс производства новой вакцины, разрабатываемой доктором [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName]. [SCOPE.sCharacter('theiler_biologist_scope').GetSheHe] выдвигает серьезные обвинения: по [SelectLocalization(SCOPE.sCharacter('theiler_biologist_scope').IsFemale, 'её', 'его')] словам, это плагиат очень похожей сыворотки, которую доктор [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] собирал[SelectLocalization(SCOPE.sCharacter('theiler_biologist_scope').IsFemale, 'ась', 'ся')] запатентовать."
 theiler.2115.f: "В период с XIX по начало XX века отсутствие патентной защиты и международных стандартов приводило к спорам об авторстве в вакцинологии. Пастер приписал себе создание вакцины от куриной холеры, хотя его сотрудник Туссен проводил эксперименты раньше. Позже споры вызывали штаммы БЦЖ и вакцины Хавкина от холеры и чумы. Дебаты о приоритете и «плагиате» были типичны для времени, когда методы вакцинации были очень чувствительной и ценной темой."
 theiler.2115.g: "Принести извинения."
 theiler.2115.h: "Это просто совпадение."
 theiler.2116.t: "Взрывной рост расходов"
 theiler.2116.d: "Похоже, доктор [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] недооценил[SelectLocalization(SCOPE.sCharacter('theiler_biologist_scope').IsFemale, 'а', '')] стоимость новой вакцины. [SelectLocalization(SCOPE.sCharacter('theiler_biologist_scope').IsFemale, 'Её', 'Его')] оптимистичные оценки теперь могут поставить под угрозу всю разработку."
 theiler.2116.f: "«Деньги? Деньги?! Презренный металл! Вы не понимаете, что я жертвую жизнью ради науки? В конце концов, речь идет об окончательной победе над смертью! Об искоренении бича человечества! А у вас хватает наглости приходить ко мне со списками, таблицами и балансовыми отчетами? Вы кто? Бухгалтер? Вон из моей лаборатории!»"
 theiler.2116.g: "Субсидировать новую вакцину."
 theiler.2116.h: "Нанять больше ученых на временную работу."
 theiler.2116.i: "Смириться с этим."
 theiler_state_trait_cochliomyia: "Мясная муха"
 theiler_state_trait_cydia: "Яблонная плодожорка"
 je_theiler_cochliomyia_eredication: "Истребление мясной мухи"
 je_theiler_cochliomyia_eredication_reason: "С помощью самых современных методов возможно искоренение опасной мясной мухи Нового Света, что избавит людей и животных от этой напасти. Биолог может разработать теорию и провести полевые эксперименты, чтобы найти подходящее решение этой проблемы.\n\nЕсли биолог умрет во время работы, исследования по искоренению паразита будут остановлены, но возобновятся, как только появится новый специалист."
 je_theiler_cochliomyia_eredication_success: "[concept_theiler_biologist] работал[SelectLocalization(ROOT.Var('theiler_biologist_var').GetCharacter.IsFemale, 'а', '')] не менее #ORANGE 12 месяцев#! над поиском метода искоренения мясной мухи."
 je_theiler_cochliomyia_eredication_goal: ""
 theiler.21.t: "Метод стерильных насекомых"
 theiler.21.d: "Доктор [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] предложил[SelectLocalization(SCOPE.sCharacter('theiler_biologist_scope').IsFemale, 'а', '')] неортодоксальную, но революционную идею: вместо уничтожения паразитов пестицидами, перспективным методом может стать разведение стерильных самцов, чтобы самки не могли давать потомство от них."
 theiler.21.f: "Метод стерильных насекомых (SIT) был разработан в 1950-х годах Рэймондом Бушлендом и Эдвардом Ниплингом. Самцов мух стерилизуют гамма-излучением, обычно от источников кобальта-60 или цезия-137. Это высокоэнергетическое излучение разрушает ДНК в половых клетках, не влияя существенно на жизнеспособность животных или их способность к спариванию. Затем стерилизованных самцов массово выпускают в природу. Поскольку они продолжают успешно спариваться с дикими самками, но не дают жизнеспособного потомства, популяция постепенно сокращается. Метод был особенно успешен против мясной мухи Нового Света, искоренение которой в Северной и Центральной Америке предотвратило огромный экономический и ветеринарный ущерб."
 theiler.21.g: "Мы буквально облучим их?"
 theiler.22.t: "Искоренение мясной мухи в [SCOPE.sState('theiler_state_scope').GetAltNameNoFlag('RU_SL_VP')]"
 theiler.22.d: "Доктор [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] докладывает, что мясная муха Нового Света искоренена еще в одном регионе."
 theiler.22.g: "К черту червей!"
 theiler_cochliomyia_experiment_lab_modifier: "Лаборатория по изучению мясной мухи"
 je_theiler_sti: "Метод стерильных насекомых"
 je_theiler_sti_reason: "Доктор [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] пытается искоренить мясную муху в регионе, используя современные технологии."
 je_theiler_sti_success: "[concept_theiler_biologist] работал[SelectLocalization(ROOT.Var('theiler_biologist_var').GetCharacter.IsFemale, 'а', '')] не менее #ORANGE 36 месяцев#! над искоренением мясной мухи."
 je_theiler_sti_goal: ""
 je_theiler_cydia_pesticide: "Пестицид против плодожорки"
 je_theiler_cydia_pesticide_reason: "Обладая базовыми знаниями об инсектицидах, биолог в сотрудничестве с химиком может найти эффективное средство против яблонной плодожорки.\n\nЕсли биолог или химик умрут во время работы, создание пестицида будет остановлено, но возобновится, как только оба специалиста снова будут доступны."
 je_theiler_cydia_pesticide_success: "[concept_theiler_biologist] работал[SelectLocalization(ROOT.Var('theiler_biologist_var').GetCharacter.IsFemale, 'а', '')] не менее #ORANGE 12 месяцев#! над новым пестицидом."
 je_theiler_cydia_pesticide_goal: ""
 je_theiler_lead_arsenate: "Арсенат свинца"
 je_theiler_lead_arsenate_reason: "Наши садоводы могут бороться с яблонной плодожоркой и другими вредителями с помощью недавно изобретенного арсената свинца, если на рынке нет дефицита свинца. Это позволит ежемесячно брать под контроль паразита в одной области."
 theiler.31.t: "Арсенат свинца"
 theiler.31.d: "В сотрудничестве с доктором [SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName] доктор [SCOPE.sCharacter('theiler_biologist_scope').GetLastName] разработал[SelectLocalization(SCOPE.sCharacter('theiler_biologist_scope').IsFemale, 'а', '')] эффективный пестицид, массовое производство которого может революционизировать сельское хозяйство. Яблонная плодожорка доела свое последнее яблоко!"
 theiler.31.f: "Арсенат свинца (PbHAsO₄) был разработан в 1892 году Мелвиллом Терстоном Куком в Массачусетсе для борьбы с яблонной плодожоркой (Cydia pomonella) в садах. Он стал более стабильной и безопасной для растений альтернативой токсичному арсениту меди («парижской зелени»). Порошок убивал насекомых при поедании, долго держался на листьях и плодах и впервые позволил эффективно бороться с вредителями в коммерческом плодоводстве. Арсенат свинца широко использовался до появления синтетических пестицидов, таких как ДДТ, несмотря на вред для окружающей среды и здоровья человека."
 theiler.31.g: "Мы буквально отравим их?"
 theiler.31.tt: "Отныне фермеры будут использовать арсенат свинца в своих садах, чтобы избавиться от модификатора плодожорки."
 theiler.32.t: "Плодожорка распространилась в [SCOPE.sState('theiler_state_scope').GetAltNameNoFlag('RU_SL_VP')]!"
 theiler.32.d: "Яблонная плодожорка расширила свой ареал: из соседнего региона она проникла в [SCOPE.sState('theiler_state_scope').GetAltNameNoFlag('RU_SL_VP')] и заразила местные сады."
 theiler.32.f: "Яблонная плодожорка (Cydia pomonella) родом из Евразии. В XIX веке вместе с яблоневыми садами она распространилась по Центральной Европе, Северной Италии, Балканам, Венгрии, частям России к западу от Урала, Северной Америке и Австралии. Северные, очень жаркие или сухие регионы были в основном пощажены. В XX веке она достигла почти всех регионов умеренного климата, где выращивают яблоки, включая Скандинавию, страны Балтии и Южную Америку, став одним из самых значительных вредителей садов."
 theiler.32.g: "Похоже, цены на фрукты вырастут."
 theiler.33.t: "Плодожорка распространилась в Южную Америку!"
 theiler.33.d: "Натуралисты и биологи сегодня представили отчет, который тревожит фермеров и торговцев. Печально известная яблонная плодожорка, родом из Европы и Западной Азии, впервые обнаружена в наших садах. Это первое появление вредителя в Южной Америке!"
 theiler.33.g: "Не так я представлял себе преимущества международной торговли..."
 theiler.34.t: "Плодожорка распространилась в Южную Африку!"
 theiler.34.d: "Натуралисты и биологи сегодня представили отчет, который тревожит фермеров и торговцев. Печально известная яблонная плодожорка, родом из Европы и Западной Азии, впервые обнаружена в наших садах. Это первое появление вредителя в Южной Африке!"
 theiler.35.t: "Плодожорка распространилась в Океанию!"
 theiler.35.d: "Натуралисты и биологи сегодня представили отчет, который тревожит фермеров и торговцев. Печально известная яблонная плодожорка, родом из Европы и Западной Азии, впервые обнаружена в наших садах. Это первое появление вредителя в Океании!"
 theiler.41.t: ""
 theiler.41.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в ходе нескольких процедур с использованием #V [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#! обнаружил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')], что растение обладает повышенным лечебным потенциалом. Однако для этого требуется больше сырья — и тщательное исследование для выделения активного ингредиента. Это сделает возможным создание совершенно нового лекарства!"
 theiler.41.g: "Значит, [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)] — новое чудо-растение?"
