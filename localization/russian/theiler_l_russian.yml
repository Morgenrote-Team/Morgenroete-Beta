 je_theiler_medicinal_plant_emetine: "Ипекакуана"
 je_theiler_medicinal_plant_emetine_reason: "Процесс изобретения нового лекарства обычно следует такому порядку: основываясь на уровне медицинской техники, [concept_panum_physician] предлагает найти определенные [concept_ito_medicinal_plants] для медицинского использования, в данном случае не менее #V 5 единиц [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. [concept_dubois_naturalist] получает задание собрать достаточно образцов для выделения вещества. Затем [concept_mendelejew_chemist] изолирует химическое вещество. Как только оно найдено, [concept_theiler_biologist] может произвести лекарство.\n\nИпекакуана (Carapichea ipecacuanha) — тропическое растение родом из Южной Америки, особенно Бразилии. Его корни содержат алкалоиды эметин и цефаелин, которые вызывают рвоту и обладают противопаразитарным действием. Традиционно корень ипекакуаны использовался как рвотное средство при отравлениях и как отхаркивающее в сиропах от кашля."
 je_theiler_medicinal_plant_emetine_success: "[GetPlayer.GetName] собрал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] не менее #V 5 образцов ипекакуаны#!."
 je_theiler_medicinal_plant_atropine: "Белладонна"
 je_theiler_medicinal_plant_atropine_reason: "Процесс изобретения нового лекарства обычно следует такому порядку: основываясь на уровне медицинской техники, [concept_panum_physician] предлагает найти определенные [concept_ito_medicinal_plants] для медицинского использования, в данном случае не менее #V 5 единиц [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. [concept_dubois_naturalist] получает задание собрать достаточно образцов для выделения вещества. Затем [concept_mendelejew_chemist] изолирует химическое вещество. Как только оно найдено, [concept_theiler_biologist] может произвести лекарство.\n\nБелладонна (Atropa belladonna), или красавка, — многолетнее растение родом из Европы, Северной Африки и Западной Азии. Содержит токсичные алкалоиды, такие как атропин, скополамин и гиосциамин, которые влияют на нервную систему, блокируя ацетилхолиновые рецепторы. Исторически использовалась как седативное и обезболивающее средство, а также для расширения зрачков. В современной медицине очищенный атропин применяется в офтальмологии, для лечения брадикардии и при отравлении фосфорорганическими соединениями."
 je_theiler_medicinal_plant_atropine_success: "[GetPlayer.GetName] собрал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] не менее #V 5 образцов белладонны#!."
 je_theiler_medicinal_plant_aloin: "Алоэ вера"
 je_theiler_medicinal_plant_aloin_reason: "Процесс изобретения нового лекарства обычно следует такому порядку: основываясь на уровне медицинской техники, [concept_panum_physician] предлагает найти определенные [concept_ito_medicinal_plants] для медицинского использования, в данном случае не менее #V 5 единиц [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. [concept_dubois_naturalist] получает задание собрать достаточно образцов для выделения вещества. Затем [concept_mendelejew_chemist] изолирует химическое вещество. Как только оно найдено, [concept_theiler_biologist] может произвести лекарство.\n\nАлоэ вера — суккулентное растение родом из Северной Африки и Аравийского полуострова. Его мясистые листья содержат гель, богатый полисахаридами, витаминами и ферментами, обладающий успокаивающими и увлажняющими свойствами. Гель широко используется в косметике и медицине для лечения ожогов, ран и раздражений кожи. Высушенный латекс из внутреннего слоя листа содержит алоин, обладающий сильным слабительным эффектом."
 je_theiler_medicinal_plant_aloin_success: "[GetPlayer.GetName] собрал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] не менее #V 5 образцов алоэ вера#!."
 je_theiler_medicinal_plant_digitoxin: "Наперстянка пурпурная"
 je_theiler_medicinal_plant_digitoxin_reason: "Процесс изобретения нового лекарства обычно следует такому порядку: основываясь на уровне медицинской техники, [concept_panum_physician] предлагает найти определенные [concept_ito_medicinal_plants] для медицинского использования, в данном случае не менее #V 5 единиц [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. [concept_dubois_naturalist] получает задание собрать достаточно образцов для выделения вещества. Затем [concept_mendelejew_chemist] изолирует химическое вещество. Как только оно найдено, [concept_theiler_biologist] может произвести лекарство.\n\nНаперстянка пурпурная (Digitalis purpurea) — двулетнее растение родом из Европы. Её листья содержат сердечные гликозиды, такие как дигоксин и дигитоксин, которые усиливают сердечные сокращения и регулируют сердцебиение. Традиционно экстракты использовались для лечения сердечной недостаточности и аритмии. Очищенные сердечные гликозиды осторожно дозируются в медицине, а сырое растение избегают из-за высокого риска отравления."
 je_theiler_medicinal_plant_digitoxin_success: "[GetPlayer.GetName] собрал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] не менее #V 5 образцов наперстянки пурпурной#!."
 je_theiler_medicinal_plant_quinine: "Хинное дерево"
 je_theiler_medicinal_plant_quinine_reason: "Процесс изобретения нового лекарства обычно следует такому порядку: основываясь на уровне медицинской техники, [concept_panum_physician] предлагает найти определенные [concept_ito_medicinal_plants] для медицинского использования, в данном случае не менее #V 5 единиц [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. [concept_dubois_naturalist] получает задание собрать достаточно образцов для выделения вещества. Затем [concept_mendelejew_chemist] изолирует химическое вещество. Как только оно найдено, [concept_theiler_biologist] может произвести лекарство.\n\nХинное дерево (Cinchona pubescens) родом из Южной Америки, особенно из Анд. Его кора содержит хинин и другие алкалоиды, обладающие сильными противомалярийными свойствами. Традиционно кору использовали для лечения лихорадки и малярии. И сегодня хинин и его производные остаются важными средствами лечения малярии. Дерево также культивируется в тропических регионах ради лекарственной коры."
 je_theiler_medicinal_plant_quinine_success: "[GetPlayer.GetName] собрал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] не менее #V 5 образцов хинного дерева#!."
 je_theiler_medicinal_plant_thymol: "Тимьян обыкновенный"
 je_theiler_medicinal_plant_thymol_reason: "Процесс изобретения нового лекарства обычно следует такому порядку: основываясь на уровне медицинской техники, [concept_panum_physician] предлагает найти определенные [concept_ito_medicinal_plants] для медицинского использования, в данном случае не менее #V 5 единиц [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. [concept_dubois_naturalist] получает задание собрать достаточно образцов для выделения вещества. Затем [concept_mendelejew_chemist] изолирует химическое вещество. Как только оно найдено, [concept_theiler_biologist] может произвести лекарство.\n\nТимьян обыкновенный (Thymus vulgaris) — небольшой многолетний кустарник родом из Средиземноморья. Его листья и масло содержат тимол, карвакрол и другие эфирные масла с антимикробными, антиоксидантными и противовоспалительными свойствами. Традиционно тимьян использовался для лечения респираторных инфекций, кашля и проблем с пищеварением. Широко применяется в фитотерапии, ароматерапии, а также как натуральный консервант и ароматизатор в пище."
 je_theiler_medicinal_plant_thymol_success: "[GetPlayer.GetName] собрал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] не менее #V 5 образцов тимьяна обыкновенного#!."
 je_theiler_medicinal_plant_pilocarpine: "Пилокарпус"
 je_theiler_medicinal_plant_pilocarpine_reason: "Процесс изобретения нового лекарства обычно следует такому порядку: основываясь на уровне медицинской техники, [concept_panum_physician] предлагает найти определенные [concept_ito_medicinal_plants] для медицинского использования, в данном случае не менее #V 5 единиц [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. [concept_dubois_naturalist] получает задание собрать достаточно образцов для выделения вещества. Затем [concept_mendelejew_chemist] изолирует химическое вещество. Как только оно найдено, [concept_theiler_biologist] может произвести лекарство.\n\nПилокарпус (Pilocarpus pennatifolius) — тропический кустарник родом из Бразилии. Его листья содержат алкалоид пилокарпин, который стимулирует слюнные и потовые железы. Традиционно использовался для лечения сухости во рту и заболеваний глаз. В современной медицине пилокарпин применяется для лечения глаукомы путем снижения внутриглазного давления и ксеростомии (сухости во рту), вызванной радиацией или лекарствами. Растение ценится прежде всего за фармакологически активные алкалоиды."
 je_theiler_medicinal_plant_pilocarpine_success: "[GetPlayer.GetName] собрал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] не менее #V 5 образцов пилокарпуса#!."
 je_theiler_medicinal_plant_ephedrine: "Эфедра китайская"
 je_theiler_medicinal_plant_ephedrine_reason: "Процесс изобретения нового лекарства обычно следует такому порядку: основываясь на уровне медицинской техники, [concept_panum_physician] предлагает найти определенные [concept_ito_medicinal_plants] для медицинского использования, в данном случае не менее #V 5 единиц [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. [concept_dubois_naturalist] получает задание собрать достаточно образцов для выделения вещества. Затем [concept_mendelejew_chemist] изолирует химическое вещество. Как только оно найдено, [concept_theiler_biologist] может произвести лекарство.\n\nЭфедра китайская (Ephedra sinica), или ма хуанг, — кустарник родом из Китая и Центральной Азии. Его стебли содержат эфедрин и псевдоэфедрин, алкалоиды, стимулирующие нервную систему и расширяющие бронхи. Использовалась в китайской медицине для лечения астмы, бронхита и заложенности носа. Применение ограничено из-за риска гипертонии, проблем с сердцем и других побочных эффектов."
 je_theiler_medicinal_plant_ephedrine_success: "[GetPlayer.GetName] собрал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] не менее #V 5 образцов эфедры китайской#!."
 je_theiler_medicinal_plant_strophantine: "Строфант приятный"
 je_theiler_medicinal_plant_strophantine_reason: "Процесс изобретения нового лекарства обычно следует такому порядку: основываясь на уровне медицинской техники, [concept_panum_physician] предлагает найти определенные [concept_ito_medicinal_plants] для медицинского использования, в данном случае не менее #V 5 единиц [AddLocalizationIf( Scope.Var('theiler_physician_demand_var').IsSet , Scope.Var('theiler_physician_demand_var').GetFlagName)]#!. [concept_dubois_naturalist] получает задание собрать достаточно образцов для выделения вещества. Затем [concept_mendelejew_chemist] изолирует химическое вещество. Как только оно найдено, [concept_theiler_biologist] может произвести лекарство.\n\nСтрофант приятный (Strophanthus gratus) — вьющееся растение родом из Западной Африки. Его семена содержат сердечные гликозиды, такие как уабаин, сильно влияющие на сердечные сокращения. Традиционно экстракты использовались как яд для стрел и в малых дозах для лечения болезней сердца. Уабаин изучался для лечения сердечной недостаточности и аритмии."
 je_theiler_medicinal_plant_strophantine_success: "[GetPlayer.GetName] собрал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] не менее #V 5 образцов строфанта приятного#!."
