l_russian:
 mr_swe_nor_union_decision_1: "Назначить нового генерал-губернатора в Норвегии"
 mr_swe_nor_union_decision_1_desc: "Должность в Христиании в настоящее время вакантна. Мы должны принять решение о том, кого назначить новым главой норвежского правительства в отсутствие короля."
 mr_swe_nor_union_decision_2: "Потребовать, чтобы наши министры могли участвовать в парламентских дебатах"
 mr_swe_nor_union_decision_2_desc: "В настоящее время министрам запрещено высказываться в Стортинге. Так не может продолжаться."
 mr_swe_nor_union_decision_3: "Потребовать, чтобы все символы унии были убраны с нашего флага"
 mr_swe_nor_union_decision_3_desc: "Мы должны использовать чистый норвежский флаг, без символов унии."
 mr_swe_nor_union_decision_4: "Потребовать норвежские консульские учреждения"
 mr_swe_nor_union_decision_4_desc: "С ростом норвежского судоходства шведских консульских учреждений недостаточно. Нам нужны норвежские."
 mr_swe_nor_union_decision_5: "Потребовать, чтобы король Карл XV выполнил своё обещание"
 mr_swe_nor_union_decision_5_desc: "С коронацией Карла XV как короля Швеции и короля Норвегии пришло время ему выполнить своё обещание об упразднении должности генерал-губернатора."
 da_appoint_governor_general: "Назначить генерал-губернатора"
 da_appoint_governor_general_desc: "Сменяет генерал-губернатора [Concept('concept_subject', 'субъекта')]. [concept_liberty_desire] может измениться в зависимости от выбранного кандидата."
 da_appoint_governor_general_action_name: "Назначить генерал-губернатора"
 da_appoint_governor_general_action_notification_name: "У [TARGET_COUNTRY.GetAltNameNoFlag('RU_CL_RP')] новый генерал-губернатор"
 da_appoint_governor_general_action_notification_desc: "[INITIATOR_COUNTRY.GetName] сменил[INITIATOR_COUNTRY.GetAltNameNoFormatting('RU_CL_END_FEM')] генерал-губернатора [TARGET_COUNTRY.GetAltNameNoFlag('RU_CL_RP')] на нового назначенца."
 da_appoint_governor_general_action_notification_third_party_name: "У [TARGET_COUNTRY.GetAltNameNoFlag('RU_CL_RP')] новый генерал-губернатор"
 da_appoint_governor_general_action_notification_third_party_desc: "[INITIATOR_COUNTRY.GetName] сменил[INITIATOR_COUNTRY.GetAltNameNoFormatting('RU_CL_END_FEM')] генерал-губернатора [TARGET_COUNTRY.GetAltNameNoFlag('RU_CL_RP')] на нового назначенца."
 mr_swe_nor_union_event.1.t: "Назначение нового генерал-губернатора"
 mr_swe_nor_union_event.1.d: "Должность генерал-губернатора в Христиании вакантна. Возможно, нам следует рассмотреть возможность назначения кого-либо на эту должность."
 mr_swe_nor_union_event.1.f: "Согласно норвежской конституции 1814 года, для руководства норвежским правительством в отсутствие короля, проживающего в Стокгольме, мог быть назначен генерал-губернатор шведской или норвежской национальности. В Швеции многие считают, что генерал-губернатор, действующий от имени шведского короля, должен быть шведской национальности. Любое иное решение рассматривается как потенциальная угроза национальной безопасности."
 mr_swe_nor_union_event.1.a: "Назначить шведского генерал-губернатора."
 mr_swe_nor_union_event.1.b: "Назначить норвежского генерал-губернатора."
 mr_swe_nor_union_event.1.c: "Оставить должность вакантной на следующие 5 лет."
 mr_swe_nor_union_event.2.t: "Норвежские министры"
 mr_swe_nor_union_event.2.d: "Стортинг разрешает норвежским министрам участвовать в парламентских обсуждениях."
 mr_swe_nor_union_event.2.f: "Норвежский парламент, Стортинг, проголосовал за разрешение норвежским министрам участвовать в парламентских обсуждениях и переговорах. Теперь они ожидают одобрения своего решения королём."
 mr_swe_nor_union_event.2.a: "Отказаться признавать их решение."
 mr_swe_nor_union_event.2.b: "Одобрить их решение."
 mr_swe_nor_union_event.3.t: "Норвежский флаг"
 mr_swe_nor_union_event.3.d: "Норвегия требует права использовать чистый норвежский флаг."
 mr_swe_nor_union_event.3.f: "Норвежский парламент, Стортинг, проголосовал за принятие нового «чистого» флага без обычных символов Шведско-норвежской унии. Должны ли мы одобрить их решение или отказать им в праве использовать флаг по своему выбору?"
 mr_swe_nor_union_event.3.a: "Они сохранят свой нынешний флаг."
 mr_swe_nor_union_event.3.b: "Пусть используют флаг по своему выбору."
 mr_swe_nor_union_event.4.t: "Норвежские консульские учреждения"
 mr_swe_nor_union_event.4.d: "Норвегия требует права открывать собственные консульские учреждения по всему миру."
 mr_swe_nor_union_event.4.f: "Консульские учреждения унии находились в ведении министерства иностранных дел в Стокгольме, но по мере роста значения норвежского судоходства норвежцы утверждают, что необходимо норвежское консульство.\nВ Швеции норвежское требование рассматривается как первый шаг к созданию норвежской дипломатической службы и потенциальное будущее требование независимости Норвегии."
 mr_swe_nor_union_event.4.a: "С нашими учреждениями всё в порядке."
 mr_swe_nor_union_event.4.b: "Чем больше учреждений, тем лучше."
 mr_swe_nor_union_event.5.t: "Обещание Карла XV"
 mr_swe_nor_union_event.5.d: "Норвегия требует, чтобы новый король, Карл XV, выполнил своё обещание об упразднении должности генерал-губернатора в Христиании."
 mr_swe_nor_union_event.5.f: "Давать обещания народу Норвегии, будучи наследником, — это одно, а быть правителем двух стран — совсем другое. Следует ли упразднить эту должность, как и было обещано, и заменить генерал-губернатора в Христиании норвежским премьер-министром?"
 mr_swe_nor_union_event.5.a: "Нам нужен свой человек в Христиании."
 mr_swe_nor_union_event.5.b: "Обещания нужно сдерживать."
 mr_swe_nor_union_event.6.t: "Обещание наследного принца"
 mr_swe_nor_union_event.6.d: "Наследник престола Карл Бернадот клянётся упразднить должность генерал-губернатора в Христиании после своей коронации."
 mr_swe_nor_union_event.6.f: "Стремясь заручиться благосклонностью норвежского народа, будущий король торжественно обещает упразднить должность генерал-губернатора в Христиании после своей коронации. Реакция шведских землевладельцев и вооружённых сил, что неудивительно, бросает тень на предложение молодого наследника."
 mr_swe_nor_union_event.6.a: "Надеюсь, он знает, что делает."
 mr_swe_nor_union_concessions_none: "Отказано в уступках Норвегии"
 mr_swe_nor_union_concessions_minor: "Незначительные уступки Норвегии"
 mr_swe_nor_union_concessions_major: "Значительные уступки Норвегии"
 mr_swe_nor_clean_flag: "Норвегия убирает все символы унии со своего флага"