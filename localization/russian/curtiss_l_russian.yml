 curtiss.300.t: "Пилот прибывает на фронт"
 curtiss.300.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] достиг[SelectLocalization(GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.IsFemale, 'ла', '')] фронта и присоединился к боевой группе [SCOPE.sCharacter('flying_circus_general').GetFullName]."
 curtiss.300.f: "Воздушный бой — дело героическое и опасное. Только здоровые пилоты могут набирать опыт. Для некоторых опыт войны может остаться надолго — как положительный, так и отрицательный."
 curtiss.300.g: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetSheHe|U] [SelectLocalization(GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.IsFemale, 'должна', 'должен)] поддержать его с воздуха!"
 curtiss.301.t: "Пилот возвращается с фронта"
 curtiss.301.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] вернулся с боевых действий и теперь снова полностью в нашем распоряжении."
 curtiss.301.f: "«Та же самая уверенность в себе получила удар: если возможно свергнуть Баракку, что я могу сделать, чтобы не постичь ту же участь? И также в нас воцарилось своего рода утешение, на которое мы не надеялись: Баракка не был сбит вражескими истребителями. Его престиж как охотника не был подорван. Как и Зигфрида, его мог сразить только предательский удар. Враг не мог похвастаться этим концом. И это имело самое большое значение». — Марио Фучини"
 curtiss.301.g: "Жив и невредим, такими я предпочитаю наших пилотов."
 curtiss.321.t: "Врата ада"
 curtiss.321.d: "[SCOPE.sCharacter('curtiss_bomber_general').GetFullName] согласился использовать свою эскадрилью бомбардировщиков для бомбардировки больших частей [SCOPE.sState('curtiss_bomber_state').GetCustom('RU_SL_RP')] таким образом, чтобы существующая инфраструктура была значительно разрушена. Побочный ущерб среди гражданского населения будет сравнительно высоким."
 curtiss.321.f: "«Прежде меня не было созданных вещей,\nТолько вечные, и я вечно пребуду.\nОставь надежду, всяк сюда входящий!» — Данте Алигьери"
 curtiss.321.g: "Разбомбить сектор до неузнаваемости."
 curtiss.321.h: "Война тоже знает свои пределы."
 curtiss.322.t: "Угрожающие стальные монстры"
 curtiss.322.d: "Цеппелины считаются современным и грозным оружием в этой войне. Фокус нашей нации на этих устройствах окупается: флот цеппелинов [SCOPE.sCharacter('curtiss_zeppelin_general').GetFullName] считается настолько известным, что враг уже пугается при звуке его имени!"
 curtiss.322.f: "Хотя атаки цеппелинов наносили сравнительно небольшой ущерб, они сеяли непропорциональный страх и ужас среди врага в военной и гражданской среде и отвлекали большие объёмы ресурсов, важных для ведения войны. Для борьбы с немецкими военными дирижаблями Антанте, с её примерно 15 000 человек и в среднем около 25 дирижаблями, приходилось предоставлять оружие, материалы и людей в соотношении почти 1:33. Хотя другие виды вооружённых сил, такие как военно-морские силы, также применяли такие стратегии сдерживания, эффективность дирижаблей оставалась непревзойдённой, даже немецкими подводными лодками. Тем не менее, атаки цеппелинов ни надолго не поколебали моральный дух атакованных, ни серьёзно не помешали их военным усилиям."
 curtiss.322.g: "Как нечто столь прекрасное может быть столь опасным..."
 curtiss.323.t: "Раненая добыча"
 curtiss.323.d: "Эскадрилья [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] отразила воздушную атаку противника и нанесла тяжёлый урон. Теперь пилот хочет преследовать убегающего врага, чтобы добить его."
 curtiss.323.f: "«Многие пилоты того времени считали, что лётчик-истребитель в закрытой кабине — это невозможно, потому что ты должен чувствовать врага. Ты мог чувствовать его по запаху масла, которое он сжигал». — Адольф Галланд"
 curtiss.323.g: "Продолжайте!"
 curtiss.323.h: "Это может быть ловушка."
 curtiss.324.t: "Захвачены вражеские самолёты"
 curtiss.324.d: "Во время короткой операции нашей армии на вражеской территории удалось захватить импровизированный аэродром. Войска захватили несколько самолётов."
 curtiss.324.f: ""
 curtiss.324.g: "Изучить их летательные аппараты!"
 curtiss.325.t: "Дуэль в небе"
 curtiss.325.d: "На горизонте маячит опасность. [SCOPE.sCharacter('duel_participant_2').GetFullName], самый известный пилот противника, появился со своей эскадрильей, чтобы атаковать позиции наших войск. Сможет ли [SCOPE.sCharacter('duel_participant_1').GetFullName] противостоять ему и стать героем в небесах?"
 curtiss.325.f: "Насколько высок шанс выиграть воздушную дуэль, во многом зависит от черт и опыта двух пилотов."
 curtiss.325.g: "Атаковать!"
 curtiss.325.h: "Отменить атаку!"
 curtiss.325.i: "Перехитрить!"
 curtiss.325.tt: "Это возможно благодаря черте #YELLOW «Пилотаж»#! у [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName]."
 curtiss.326.t: "Авиационный инженер в военное время"
 curtiss.326.d: "Наш авиационный инженер помогал на фронте ремонтировать повреждённые самолёты и заменять уничтоженные летательные аппараты новыми. При этом [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.IsFemale, 'приобрела', 'приобрёл')] ценный фронтовой опыт."
 curtiss.326.f: "«Аэронавтика не была ни промышленностью, ни наукой. Это было чудо». — Игорь Сикорский"
 curtiss.326.g: "Важная помощь."
 curtiss.327.t: "Специальная воздушная разведка"
 curtiss.327.d: "В смелом манёвре наш пилот пролетел над вражескими секторами и сделал многочисленные фотографии вражеских лагерей, а также географических и инфраструктурных условий. Благодаря своей ценной разведывательной работе [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] помогает армии значительно быстрее захватывать вражескую территорию."
 curtiss.327.f: "«Вначале люди, вероятно, не очень верили в успехи авиационной разведки, но вскоре их научили другому. Аэродром всегда находится в нескольких километрах за полем боя, примерно у главного командования. Вы получаете свой приказ здесь, на аэродроме. Затем вы взлетаете так, чтобы оказаться примерно в 1200 метрах над противником. Летать ниже вряд ли целесообразно, так как французская пехотная ракета достигает довольно большой высоты. У меня уже есть несколько дыр от неё в крыльях. С этой высоты можно довольно хорошо наблюдать, когда погода достаточно хорошая. Наши бипланы очень быстрые (около 110 километров в час), и поэтому за короткое время можно преодолеть довольно большое расстояние. Наблюдатель затем записывает то, что он увидел, и вы летите обратно. С аэродрома отчёт затем доставляется в главное командование на автомобиле». — Анонимный пилот, «Die Woche», Берлин, 26 сентября 1914 г."
 curtiss.327.g: "Это будет нам очень полезно."
 curtiss.328.t: "Пилот ранен"
 curtiss.328.d: "После последнего воздушного боя [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] пришлось временно прервать миссию из-за ранения. Врачи затем обнаружили, что травмы серьёзнее, чем предполагалось вначале. Наш пилот не сможет летать некоторое время."
 curtiss.328.f: "Раненый пилот не может выполнять миссии и, следовательно, не может одерживать воздушные победы или набирать опыт. Раны заживают от одного до трёх месяцев."
 curtiss.328.g: "Это означает несколько недель в госпитале..."
 curtiss.329.t: "Пилот разбился!"
 curtiss.329.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] был[SelectLocalization(GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.IsFemale, 'а', '')] сбит[SelectLocalization(GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.IsFemale, 'а', '')] во время последней миссии и попал[SelectLocalization(GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.IsFemale, 'а', '')] в серьёзную аварию. Аварийная посадка была жёсткой, но произошла на нашей стороне фронта — спасатели смогли вытащить пилота живым, но травмы серьёзные."
 curtiss.329.f: "Пилоты, получившие серьёзные ранения, выбывают из строя в лучшем случае на шесть месяцев, а в худшем — на целый год. Существует также вероятность того, что у них разовьётся серьёзная военная травма."
 curtiss.329.g: "Ужасно!"
 curtiss.331.t: "Военная травма"
 curtiss.331.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] оправился от тяжёлой аварии. Но остались не только физические раны. Наш пилот с тех пор стал другим."
 curtiss.331.f: "«Вы все — потерянное поколение». — Эрнест Хемингуэй"
 curtiss.331.g: "Тревожно."
 curtiss.400.t: "Авиашоу"
 curtiss.400.d: "Настоящий авиационный парад также включает в себя авиашоу с захватывающими формациями и манёврами. Эти рискованные выступления демонстрируют авиационное мастерство наших военных и восхищают публику. Должен ли [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] попытаться выполнить смелый, но более грандиозный манёвр, или более осторожный вариант из стандартного репертуара?"
 curtiss.400.f: "Пилот может приобрести черту «пилот-ас», выполнив фантастический манёвр на авиашоу. Однако в случае смелых манёвров выступление также может провалиться и привести к катастрофической аварии. Чтобы предотвратить это, пилот должен иметь достаточный опыт и положительные черты, такие как «лётчик-истребитель», «ветеран приза Шнейдера», «смелый» или «тактичный». Пилоты-асы всегда выполняют фантастические манёвры."
 curtiss.400.g: "Выполнить грандиозный манёвр."
 curtiss.400.h: "Выполнить обычный манёвр."
 curtiss.411.t: "Фантастическое авиашоу"
 curtiss.411.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] выполнил[SelectLocalization(GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.IsFemale, 'а', '')] захватывающий и в то же время идеальный лётный манёвр на авиашоу, восхитив как офицеров, так и публику."
 curtiss.411.g: "Фантастика!"
 curtiss.412.t: "Хороший манёвр"
 curtiss.412.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] продемонстрировал[SelectLocalization(GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.IsFemale, 'а', '')] высоко оценённый лётный манёвр на авиашоу. Лишь несколько мелких деталей отделяли его от абсолютного совершенства."
 curtiss.412.g: "Хорошо."
 curtiss.413.t: "Посредственный манёвр"
 curtiss.413.d: "Авиашоу оказалось довольно скучным событием. [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] не смог[SelectLocalization(GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.IsFemale, 'ла', '')] убедить своим стандартным манёвром."
 curtiss.413.g: "Ничего особенного..."
 curtiss.414.t: "Катастрофический манёвр"
 curtiss.414.d: "Авиашоу превратилось в ужасное событие: [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] потерял[SelectLocalization(GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.IsFemale, 'а', '')] управление своим самолётом при выполнении рискованного манёвра и разбился! Несколько зрителей получили ранения, а несчастный пилот погиб во время выступления. Мероприятие было немедленно отменено."
 curtiss.414.g: "Катастрофа!"
 curtiss.411.f: "Авиашоу — это мероприятие на открытом воздухе, на котором пилоты демонстрируют свои самолёты в полёте. Они часто демонстрируют захватывающие лётные манёвры и условия полёта, например, высший пилотаж. Они показывают это в одиночку или в строю. Таким образом они демонстрируют свои лётные навыки и навыки своих самолётов. Быстро сменяющие друг друга лётные манёвры призваны развлечь и впечатлить публику. Многие лётные манёвры, демонстрируемые военными пилотами, являются обычными военными лётными манёврами. Они регулярно тренируются пилотами, в том числе, в рамках подготовки к воздушному бою. Первым публичным международным авиашоу, на котором было представлено и продемонстрировано в полёте много различных типов самолётов, была Большая авиационная неделя в Шампани, которая проходила в Реймсе с 22 по 29 августа 1909 года. Ещё одно авиашоу состоялось в Брешии, Италия, в сентябре того же года. В прошлом на авиашоу и во время тренировок к авиашоу происходило множество, иногда серьёзных, несчастных случаев. Этому способствовали, в том числе, малые расстояния между самолётами, низкие высоты и высокие скорости полёта."
 curtiss.421.t: "Пилотажная группа"
 curtiss.421.d: "[SCOPE.sCharacter('curtiss_general_scope').GetFullName] не только способный командир, но и [SelectLocalization(SCOPE.sCharacter('curtiss_general_scope').IsFemale, 'известна', 'известен')] своими лётными навыками. Генерал [SelectLocalization(SCOPE.sCharacter('curtiss_general_scope').IsFemale, 'сформировала', 'сформировал')] пилотажную группу из нескольких офицеров для демонстрации строевого манёвра по случаю авиационного парада."
 curtiss.421.f: "Пилотажные группы — это группы пилотов, которые владеют и демонстрируют высший пилотаж. Несколько летательных аппаратов образуют единицу, называемую эскадрильей. Многие пилотажные группы являются подразделениями ВВС в составе эскадрильи. Англия считается колыбелью высшего пилотажа. Авиация там совершенствовалась в 1920-х годах, как в одиночку, так и в командах. Именно в это время на аэродромах проводились первые публичные мероприятия, которые уже привлекали тысячи посетителей."
 curtiss.421.g: "Отличное шоу."
 curtiss.422.t: "Новый прототип на авиационном параде"
 curtiss.422.d: "По случаю проходящего авиационного парада [SCOPE.sCharacter('gaudi_engineer_scope').GetFullName] построил[SelectLocalization(SCOPE.sCharacter('gaudi_engineer_scope').IsFemale, 'а', '')] прототип нового самолёта."
 curtiss.422.f: "Авиационные парады были не только способом продемонстрировать высший пилотаж и показать военный потенциал военно-воздушных сил, но и продемонстрировать технологические достижения и инженерные подвиги."
 curtiss.422.g: "Авиационные вдохновения."
 curtiss.423.t: "«[ROOT.GetCountry.GetCapital.GetCityHubName]» на авиационном параде"
 curtiss.424.t: "«[ROOT.GetCountry.GetNameNoFormatting]» на авиационном параде"
 curtiss.423.d: "[GetPlayer.MakeScope.Var('curtiss_airline_tycoon_var').GetCharacter.GetFullName] [SelectLocalization(GetPlayer.MakeScope.Var('curtiss_airline_tycoon_var').GetCharacter.IsFemale, 'появилась', 'появился')] на авиационном параде со своим гигантским самолётом и поразил[SelectLocalization(GetPlayer.MakeScope.Var('curtiss_airline_tycoon_var').GetCharacter.IsFemale, 'а', '')] присутствующих зрителей."
 curtiss.424.d: "Огромный дирижабль поразил зрителей на авиационном параде. Люди очарованы тем, чего могут достичь прогресс и воля."
 curtiss.423.f: "Нет ничего лучше, чтобы убедить людей в превосходстве и величии страны, чем гигантский летательный аппарат."
 curtiss.423.g: "Лети, дорогая, лети!"
 curtiss.425.t: "Влияние на массы"
 curtiss.425.d: "Авиационный парад пробуждает в всё большем количестве людей удивительное чувство. Это взаимодействие очарования и страха: с одной стороны, самолёты демонстрируют размер и силу нашей нации, с другой стороны, в красоте кроется скрытое желание разрушения. Является ли превосходство в воздухе аспектом человеческого превосходства?"
 curtiss.425.f: "«Аэронавтика открыла людям новую область деятельности — область воздуха. При этом она неизбежно создала новое поле битвы; ибо где бы ни встретились два человека, конфликт неизбежен. Фактически, аэронавтика широко использовалась в военных действиях задолго до того, как нашла какое-либо гражданское применение. Находясь ещё в зачаточном состоянии на момент начала мировой войны, эта новая наука получила тогда мощный импульс к военному развитию». — Джулио Дуэ"
 curtiss.425.g: "В конце концов, мы великая страна."
 curtiss.431.t: "Авиационный парад завершён"
 curtiss.431.d: "Авиационный парад подошёл к концу. Впечатления будут ещё долго оказывать влияние и вдохновлять дух военных, гражданских, а также будущих и нынешних пилотов — и поведают другим странам о величии нашей нации."
 curtiss.431.f: "«Надеюсь, скоро будет ещё одно авиашоу?»"
 curtiss.431.g: "Это было вдохновляющее событие."
 curtiss_airplane_speed_record_modifier: "Рекорд скорости самолёта"
 curtiss_testplane_cost_modifier: "Строительство испытательного самолёта"
 je_curtiss_testplane_build: "Строительство испытательного самолёта"
 je_curtiss_testplane_build_reason: "Возможности испытательного самолёта зависят в первую очередь от опыта авиационного инженера и исследованных технологий. Технологии, оказывающие критическое влияние на возможности самолёта, включают #O современную физику#!, #O дуговую сварку#!, #O гидросамолёты#! и #O современную авиацию#!. Чтобы извлечь максимум из самолёта, нужен #V действующий [concept_curtiss_pilot|l]#!, опыт которого также напрямую влияет на максимальную скорость."
 je_curtiss_testplane_build_goal: "Строительство нового самолёта занимает около года."
 notification_curtiss_speed_record_broken_notification_name: "[SCOPE.sCountry('curtiss_record_breaking_country').GetName] побил[SCOPE.sCountry('curtiss_record_breaking_country').GetAltNameNoFormatting('RU_CL_END_FEM')] наш рекорд скорости!"
 notification_curtiss_speed_record_broken_notification_desc: "[SCOPE.sCountry('curtiss_record_breaking_country').MakeScope.GetVariable('curtiss_pilot_var').GetCharacter.GetFullName], [concept_curtiss_pilot|l] из [SCOPE.sCountry('curtiss_record_breaking_country').GetAltNameNoFlag('RU_CL_RP')], побил[SCOPE.sCountry('curtiss_record_breaking_country').GetAltNameNoFormatting('RU_CL_END_FEM')] наш мировой рекорд скорости. Новый рекорд составляет [GetGlobalVariable('curtiss_airplane_speed_record_global_var').GetValue|V0] км/ч."
 curtiss.60.t: "«[SCOPE.sCharacter('curtiss_cook_scope').GetFullNameNoFormatting] и сын»"
 curtiss.60.d: "[SCOPE.sCharacter('curtiss_cook_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('curtiss_cook_scope').IsFemale, 'основала', 'основал')] первую в нашей стране туристическую компанию и поэтому [SelectLocalization(SCOPE.sCharacter('curtiss_cook_scope').IsFemale, 'считается основательницей', 'считается основателем')] местной индустрии. Доход минимален, но чем интереснее страна, тем на большее количество гостей она может рассчитывать."
 curtiss.60.f: "Туризм обеспечивает культурно превосходящей нации дополнительный доход. Уникальные памятники, музеи и художественные галереи, археологические объекты, центры искусства, а также высокие ценности в различных культурных традициях являются факторами, делающими нацию привлекательным туристическим направлением. Законы, повышающие свободу передвижения и экономическую деятельность, также способствуют увеличению доходов от туризма. Инфраструктура также играет решающую роль — в конце концов, до отдалённых мест невозможно добраться. Аэропорт, в частности, революционизирует туризм и обеспечивает значительный рост доходов."
 curtiss.60.g: "Туристы платят за искусство и культуру?"
 curtiss.700.t: "Новый испытательный самолёт готов!"
 curtiss.700.d: "[ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], наш инженер, [SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'завершила', 'завершил')] работу над новым испытательным самолётом. Самолёт имеет техническое обозначение [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_second_number_name')]. [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] только что [SelectLocalization(GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.IsFemale, 'дала', 'дал')] ему прозвище «[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_nick_name')]»."
 curtiss.700.f: "#V Данные самолёта #!\n\nНазвание: [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_second_number_name')] «[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_nick_name')]»\nТип: [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_type')]\nХарактеристики: [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_plane')]\nМатериал: [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_material')]\nДвигатель: [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_engine')]\nРасчётная скорость: [ROOT.Var('test_airplane_speed_var').GetValue] км/ч"
 curtiss.700.g: "Подготовить самолёт к взлёту!"
 curtiss.700.h: "Это слишком рискованно!"
 curtiss.701.t: "Полёт «[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_nick_name')]»"
 curtiss.701.d1: "Со скоростью всего #b #n [ROOT.Var('new_airplane_speed_var').GetValue]#! км/ч#! [SelectLocalization(SCOPE.sCharacter('curtiss_pilot_scope').IsFemale, 'она не смогла', 'он не смог')] побить предыдущий рекорд нашей страны в #b #p [ROOT.Var('curtiss_airplane_speed_record_var').GetValue]#! км/ч#!. Это разочаровывающий день для авиации нашей страны."
 curtiss.701.d2: "[ROOT.Var('curtiss_pilot_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_pilot_var').GetCharacter.IsFemale, 'установила', 'установил')] новый рекорд скорости для нашей страны на [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_second_number_name')]! Со скоростью #b #p [ROOT.Var('new_airplane_speed_var').GetValue]#! км/ч#! [SelectLocalization(SCOPE.sCharacter('curtiss_pilot_scope').IsFemale, 'она побила', 'он побил')] предыдущий рекорд нашей страны в #b #p [ROOT.Var('curtiss_airplane_speed_record_var').GetValue]#! км/ч#!. Но, к сожалению, этого не хватило для мирового рекорда в #b #p [GetGlobalVariable('curtiss_airplane_speed_record_global_var').GetValue]#! км/ч#! [GetGlobalVariable('curtiss_airplane_speed_record_holder_global_var').GetCountry.GetFlagTextIcon]."
 curtiss.701.d3: "Механический гений [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName] и выдающиеся лётные навыки [ROOT.Var('curtiss_pilot_var').GetCharacter.GetFullName] позволили достичь чего-то революционного: «[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_nick_name')]» удалось побить не только национальный рекорд скорости в #b #p [ROOT.Var('curtiss_airplane_speed_record_var').GetValue] км/ч#!, но и мировой рекорд скорости в #b #p [GetGlobalVariable('curtiss_airplane_speed_record_global_var').GetValue]#! км/ч, установленный [GetGlobalVariable('curtiss_airplane_speed_record_holder_global_var').GetCountry.GetFlagTextIcon]. Самолёт достиг захватывающей дух скорости в #b #p [ROOT.Var('new_airplane_speed_var').GetValue]#! км/ч#!. Поэтому [ROOT.GetCountry.GetName] считается ведущей нацией в авиации!"
 curtiss.701.f1: "«Я хочу, чтобы меня помнили только за одно: мой вклад в авиацию». — Говард Хьюз"
 curtiss.701.f2: "«Делайте невозможное, потому что почти все говорили мне, что мои идеи — всего лишь фантазии». — Говард Хьюз"
 curtiss.701.f3: "«Если я допустил ошибку в конструкции, то я тот, кто должен за неё заплатить. Я бы точно не просил кого-то другого летать на самолёте, если бы сам боялся это делать». — Говард Хьюз"
 curtiss.701.g: "Дело было в самолёте или в пилоте?"
 curtiss.701.h: "Это было удовлетворительно, но недостаточно."
 curtiss.701.i: "Замечательно! Поздравляю!"
 curtiss.702.t: "Полёт на скорость заканчивается катастрофой"
 curtiss.702.d: "Погоня за рекордом скорости заканчивается трагедией. [ROOT.Var('curtiss_pilot_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_pilot_var').GetCharacter.IsFemale, 'потеряла', 'потерял')] управление [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_second_number_name')] во время полёта на скорость! «[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_testplane_nick_name')]» унёс [SelectLocalization(SCOPE.sCharacter('curtiss_pilot_scope').IsFemale, ' её', ' его')] в огненную смерть. Вся авиационная команда в шоке."
 curtiss.702.f: "«Он не был плохим парнем. Плохим пилотом — да, но не плохим парнем»."
 curtiss.702.g: "Нет. Нет! Нееет!"
