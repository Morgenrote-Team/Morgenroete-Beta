 pm_curtiss_modern_weather_station: "Современная метеостанция"
 curtiss.40.d: "В полном одиночестве, на свой страх и риск, молодой пилот [SCOPE.sCharacter('curtiss_new_pilot_scope').GetFullName] стал[SelectLocalization(SCOPE.sCharacter('curtiss_new_pilot_scope').IsFemale, 'а', '')] первым человеком, совершившим беспосадочный перелёт между Нью-Йорком и Парижем. В то время как некоторые называют [SelectLocalization(SCOPE.sCharacter('curtiss_new_pilot_scope').IsFemale, 'её', 'его')] «[SelectLocalization(SCOPE.sCharacter('curtiss_new_pilot_scope').IsFemale, 'летающей дурой', 'летающим дураком')]», [SelectLocalization(SCOPE.sCharacter('curtiss_new_pilot_scope').IsFemale, 'она', 'он')] вызывает бурю восторга у населения и провозглашается национальным героем."
 curtiss.40.f: "После невероятного полёта ранее неизвестный пилот [SCOPE.sCharacter('curtiss_new_pilot_scope').GetFullName] совершил[SelectLocalization(SCOPE.sCharacter('curtiss_new_pilot_scope').IsFemale, 'а', '')] блестящий подвиг в искусстве пилотирования. Толпа, услышав о [SelectLocalization(SCOPE.sCharacter('curtiss_new_pilot_scope').IsFemale, 'её', 'его')] успехе, встретила [SelectLocalization(SCOPE.sCharacter('curtiss_new_pilot_scope').IsFemale, 'её', 'его')] с восторгом. За 33,5 часа своего полёта [SCOPE.sCharacter('curtiss_new_pilot_scope').GetLastName] столкнулся со многими трудностями, среди которых были полёты над грозовыми облаками на высоте 10 000 футов (3 000 м) и над верхушками волн на высоте всего 10 футов (3,0 м). Самолёт боролся с обледенением, несколько часов летел вслепую сквозь туман, а [SCOPE.sCharacter('curtiss_new_pilot_scope').GetLastName] ориентировался только по счислению пути ([SelectLocalization(SCOPE.sCharacter('curtiss_new_pilot_scope').IsFemale, 'она', 'он')] не умел[SelectLocalization(SCOPE.sCharacter('curtiss_new_pilot_scope').IsFemale, 'а', '')] хорошо ориентироваться по солнцу и звёздам и отказался от радионавигационного оборудования как от тяжёлого и ненадёжного). [SCOPE.sCharacter('curtiss_new_pilot_scope').GetLastName] повезло, что ветры над Атлантикой взаимно компенсировали друг друга, что дало [SelectLocalization(SCOPE.sCharacter('curtiss_new_pilot_scope').IsFemale, 'ей', 'ему')] нулевой снос от ветра — и, таким образом, точную навигацию во время долгого полёта над безликим океаном. Это достижение вызовет значительный мировой интерес как к коммерческой авиации, так и к авиапочте, революционизировав авиационную отрасль во всём мире."
 curtiss.42.t: "Полёт [SCOPE.sCharacter('curtiss_new_pilot_scope').GetLastName]"
 curtiss.42.d: "После трансатлантического перелёта харизматичного молодого пилота [SCOPE.sCharacter('curtiss_new_pilot_scope').GetFullName] наше население загорелось и открыло в себе доселе неизвестную страсть к авиации. Уже говорят о буме имени [SCOPE.sCharacter('curtiss_new_pilot_scope').GetLastName]."
 curtiss.314.t: "Лётчик-ас"
 curtiss.314.d: "Благодаря многочисленным успехам в авиации [GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetFullName] теперь считается бесспорным хозяином неба: [SelectLocalization(GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.IsFemale, 'она', 'он')] считается лётчиком-асом!"
