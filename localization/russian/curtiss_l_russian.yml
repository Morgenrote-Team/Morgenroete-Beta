 curtiss.231.t: "Новинка: еда на борту самолёта"
 curtiss.231.d: "На самолётах доступна новая услуга! Впервые пассажиры смогли купить сэндвич на борту за скромную цену. Это может сделать нашу авиакомпанию одной из самых инновационных в мире!"
 curtiss.231.f: "«Хотите сэндвич в дорогу?»\n«Сэндвич звучит фантастически! А напитки продаёте?»"
 curtiss.231.g: "По крайней мере, я не голодаю!"
