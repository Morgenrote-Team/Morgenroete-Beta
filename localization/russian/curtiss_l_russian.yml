 je_curtiss_found_private_airline: "Авиакомпания «[ROOT.GetCountry.GetAdjective] Airlines»"
 je_curtiss_found_private_airline_reason: "С распространением самолётов в повседневной жизни они перестали быть достоянием одних лишь военных. Хотя перевозки и дороги, существует множество стимулов для транспортировки товаров и пассажиров. При благоприятных условиях скоро должна быть основана первая частная авиакомпания."
 je_curtiss_found_state_airline: "Национальная авиакомпания"
 je_curtiss_found_state_airline_reason: "В мировой гонке за покорение небес [ROOT.GetCountry.GetNameNoFlag] должна занять видное место. Для обеспечения быстрой транспортировки наших граждан создание государственной авиакомпании является хорошей идеей."
 je_curtiss_spruce_goose_plan: "Небесный Геркулес"
 je_curtiss_spruce_goose_plan_reason: "Небо — последний рубеж. То, что в раннее Новое время было эпохой великих географических открытий, теперь стало эпохой покорения небес. Но по сравнению с галеонами испанцев сегодняшние небесные суда — всего лишь скорлупки. Морские гиганты бороздят сегодня океаны, но в небесах до сих пор господствуют лишь небольшие машины. Мечта о создании гигантского самолёта, способного перевозить не десятки, а сотни людей, кажется утопией. Но процветающая авиационная промышленность и мощная авиакомпания во главе с правильным человеком могут перевернуть мир..."
 je_curtiss_spruce_goose_build_reason: "Что такое безумие? Что такое мания величия? Что такое гениальность? Что бы ни задумал [SCOPE.sCharacter('howard_hughes').GetFullName] с этим проектом, он затмевает всё, о чём до сих пор осмеливались мечтать технологии и изобретательность человечества. Это просто самый большой самолёт в истории мира, который мог бы перевезти целую деревню. Правительство пообещало поддержать этот проект из соображений престижа. Ему было обещано до @money! #R 200 тыс.#!! сущие копейки по сравнению с тем, что делает его компания. Если проект [SCOPE.sCharacter('howard_hughes').GetLastName] увенчается успехом, это будет означать революцию в авиации. Если же он потерпит неудачу, это будет иметь катастрофические последствия для его компании и авиации в целом. Но в этом и проблема с эксцентричными личностями вроде [SCOPE.sCharacter('howard_hughes').GetLastName]: только в конце становится ясно, имеешь ли ты дело с безумцем или с гением."
 je_curtiss_spruce_goose_build_goal: "Лучшие инженеры страны без остановки работают над гигантским самолётом. По их оценкам, общее время строительства составит около #BLUE 36#! месяцев. С начала строительства прошло #G [ROOT.Var('curtiss_spruce_goose_progress').GetValue]#! месяцев."
 je_curtiss_hindenburg_plan: "Путешествие с блеском"
 je_curtiss_hindenburg_plan_reason: "Путешествия на дирижаблях достигли своего пика. Наша нация считается родиной самых больших и грандиозных цеппелинов в мире. Пришло время удивить весь мир гигантским дирижаблем и путешествовать по всему земному шару."
 je_curtiss_hindenburg_build_reason: "Наша процветающая авиакомпания заказала масштабный проект, который позволит перевозить больше людей, чем когда-либо прежде. Пассажиры должны быть окружены всевозможной роскошью, от собственного бара с роялем до превосходного ресторана с лучшими мировыми винами."
 je_curtiss_hindenburg_build_goal: "Лучшие инженеры страны без остановки работают над гигантским цеппелином. По их оценкам, общее время строительства составит около #BLUE 60#! месяцев. С начала строительства прошло #G [ROOT.Var('curtiss_hindenburg_progress').GetValue]#! месяцев."
 je_curtiss_lindbergh_generic: "Приз Ортейга"
 je_curtiss_lindbergh_generic_reason: "Приз Ортейга — это награда, предложенная первому авиатору (или авиаторам), совершившему беспосадочный перелёт из Нью-Йорка в Париж или обратно. Несколько знаменитых авиаторов предприняли безуспешные попытки перелёта Нью-Йорк — Париж, прежде чем относительно неизвестный американец Чарльз Линдберг выиграл приз в 1927 году на своём самолёте «Дух Сент-Луиса». Однако в борьбе за приз погибло несколько человек. Шесть человек погибли в трёх отдельных катастрофах, и ещё трое получили ранения в четвёртой. Приз стимулировал значительные инвестиции в авиацию, иногда во много раз превышающие стоимость самого приза, и способствовал росту общественного интереса и уровня авиационных технологий. Впервые он был предложен в 1919 году нью-йоркским отельером Раймоном Ортейгом. Предложенный на пять лет, приз казался недостижимым для самолётов того времени и не привлёк ни одного участника. После истечения первоначального срока Ортейг вновь учредил приз 1 июня 1925 года, разместив 25 000 долларов США в оборотных ценных бумагах в банке «Брайант» и передав присуждение под контроль попечительского совета из семи человек."
 je_curtiss_lindbergh_usa: "Приз Ортейга"
 je_curtiss_lindbergh_usa_reason: "Приз Ортейга — это награда, предложенная первому авиатору (или авиаторам), совершившему беспосадочный перелёт из Нью-Йорка в Париж или обратно. Несколько знаменитых авиаторов предприняли безуспешные попытки перелёта Нью-Йорк — Париж, прежде чем относительно неизвестный американец Чарльз Линдберг выиграл приз в 1927 году на своём самолёте «Дух Сент-Луиса». Однако в борьбе за приз погибло несколько человек. Шесть человек погибли в трёх отдельных катастрофах, и ещё трое получили ранения в четвёртой. Приз стимулировал значительные инвестиции в авиацию, иногда во много раз превышающие стоимость самого приза, и способствовал росту общественного интереса и уровня авиационных технологий. Впервые он был предложен в 1919 году нью-йоркским отельером Раймоном Ортейгом. Предложенный на пять лет, приз казался недостижимым для самолётов того времени и не привлёк ни одного участника. После истечения первоначального срока Ортейг вновь учредил приз 1 июня 1925 года, разместив 25 000 долларов США в оборотных ценных бумагах в банке «Брайант» и передав присуждение под контроль попечительского совета из семи человек."
 je_curtiss_zeppelin_expedition: "Северная полярная экспедиция на цеппелине"
 je_curtiss_zeppelin_expedition_reason: "«Аэроарктика» — «Международное общество по изучению Арктики с помощью дирижаблей» — была неправительственной научной ассоциацией, целью которой было использование дирижаблей в полярных исследованиях. Она была основана в основном по инициативе аэронавта и будущего генерального секретаря общества Вальтера Брунса. Учредительным президентом в 1924 году стал Фритьоф Нансен. После нескольких лет подготовительной работы обществу в 1931 году впервые удалось использовать дирижабль для чисто научной полярной экспедиции. Благодаря арктическому полёту LZ 127 «Граф Цеппелин» знания о географии пролетаемых полярных регионов значительно расширились. Ещё в 1926 году Умберто Нобиле пролетел над Северным полюсом на своём дирижабле «Норвегия», а позже предпринял экспедицию на «Италии»."
 je_curtiss_zeppelin_expedition_goal: "Наша экспедиция на цеппелине вернётся через #BLUE 16#! недель. На данный момент прошло #G [ROOT.Var('curtiss_zeppelin_progress').GetValue]#! недель."
 je_zeppelin_expedition_fail: "Мы потерпим неудачу, если экспедиция накопит #R 3#! или более единиц риска."
 je_curtiss_lost_horizon: "Потерянный горизонт"
 je_curtiss_lost_horizon_reason: "Если верить рукописи, в Гималаях есть таинственное место, к которому не ведут ни указатели, ни следы. Однако в высоких горах Тибета, как говорят, есть три артефакта, которые — с помощью опытного археолога — должны проложить путь в тайную долину."
 je_curtiss_lost_horizon_goal: "На данный момент мы нашли #G [ROOT.Var('curtiss_shangrila_progress').GetValue]#! из #BLUE 3#! артефактов."
 curtiss.10.t: "Повелитель воздуха и воды"
 curtiss.10.d: "Эпоха гидросамолётов и летающих лодок не только революционизирует транспорт и открывает доселе невиданные возможности, но и вдохновляет дух, стремящийся преодолеть последние барьеры."
 curtiss.10.f: "Изобретение гидросамолёта в начале XX века имело неожиданные преимущества. Они могли садиться на озёра, реки и в гавани, что позволяло совершать посадки как вблизи городских центров, так и в неизведанной дикой местности — без аэродромов и взлётно-посадочных полос. В то же время нации соревновались за новые рекорды в гонках на гидросамолётах."
 curtiss.10.g: "Это последняя героическая эпоха."
 curtiss.12.t: "Анри Фабр"
 curtiss.12.d: "Пионер авиации Анри Фабр сегодня испытал гидросамолёт в Марсельском заливе, совершив прорыв в авиации."
 curtiss.12.f: "Анри Фабр был инженером, изучавшим самолёты Луи Блерио и Габриэля Вуазена. В 1909 году он решил начать строительство первого прототипа гидросамолёта. Фабр вложил много времени в конструирование поплавков. Эти знания позже помогли ему оснащать поплавками самолёты иностранных конструкций. Однако прототип имел слабый двигатель мощностью 18 кВт (25 л.с.) и поэтому не летал. Следующая машина получила мощный радиальный двигатель Gnôme мощностью 37 кВт (50 л.с.). Он назвал самолёт «Гидравион» (гидросамолёт). 28 марта 1910 года начались попытки взлёта над озером Этан-де-Берр в Мартиге, недалеко от Марселя. Вторая попытка оказалась успешной, и самолёт пролетел около 600 м. На следующий день — уже 6 км. Изящный «Гидравион» оказался очень устойчивым. После аварии при посадке самолёт был отремонтирован. В апреле 1911 года новая версия стартовала с пилотом Жаном Бекю в Монако. Вскоре с Анри Фабром связались Гленн Кёртисс и Габриэль Вуазен, которые использовали его изобретение для разработки собственных гидросамолётов. Фабр умер в возрасте 101 года в 1984 году и был одним из последних живших пионеров авиации. Ещё в 1971 году Фабр говорил, что всё ещё в одиночку управляет своей лодкой в гавани Марселя."
 curtiss.12.g: "Обожаю этот гидросамолёт... или это летающая лодка?"
 curtiss.13.t: "Гидроаэропорт в [SCOPE.sState('curtiss_water_airport_state').GetCustom('RU_SL_PP')]"
 curtiss.13.d: "Хорошая инфраструктура в [SCOPE.sState('curtiss_water_airport_state').GetCustom('RU_SL_PP')] в сочетании с портом и высокой урбанизацией привели к развитию там процветающего гидроавиационного сообщения."
 curtiss.13.f: "В 1923 году было открыто первое успешное коммерческое сообщение на летающих лодках с рейсами на Нормандские острова и обратно. В 1928 году четыре летающие лодки Supermarine Southampton дальневосточного звена Королевских ВВС прибыли в Мельбурн, Австралия. Этот перелёт был признан доказательством того, что летающие лодки стали надёжным средством дальних перевозок. В 1930-х годах летающие лодки позволили наладить регулярное воздушное сообщение между США и Европой, открыв новые воздушные маршруты в Южную Америку, Африку и Азию. Фойнс в Ирландии и Ботвуд в Ньюфаундленде и Лабрадоре были конечными пунктами многих ранних трансатлантических рейсов. В районах, где не было аэродромов для сухопутных самолётов, летающие лодки могли останавливаться на небольших речных, озёрных или прибрежных станциях для дозаправки и пополнения запасов. Летающие лодки Pan Am Boeing 314 «Клиппер» сделали доступными новые экзотические направления, такие как Дальний Восток, и стали символом романтики полётов."
 curtiss.13.g: "Гидросамолёты — это будущее."
 curtiss.20.t: "Основана авиакомпания «[ROOT.GetCountry.GetAdjective] Airlines»"
 curtiss.20.d: "Крупный предприниматель [SCOPE.sCharacter('howard_hughes').GetFullName] основал первую в стране авиакомпанию. Уже высказываются сомнения, не переоценит ли эксцентричный бизнесмен свои силы в этом дорогостоящем проекте. Для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] это, безусловно, значительный шаг в будущее."
 curtiss.20.f: "«Я не параноидальный, безумный миллионер. Чёрт возьми, я миллиардер!» — Говард Хьюз"
 curtiss.20.g: "Поздравляем."
 curtiss.20.h: "Будущее за авиацией — поддержите компанию!"
 curtiss.21.t: "Основана национальная авиакомпания"
 curtiss.21.d: "С созданием национальной авиакомпании [ROOT.GetCountry.GetNameNoFlag] стала ключевой страной человеческого прогресса."
 curtiss.21.f: "Государственные авиакомпании дороже своих частных аналогов и не имеют тех же преимуществ. Однако они не попадают в финансовые трудности и поэтому несколько лучше защищены от рисков."
 curtiss.21.g: "Шампанского!"
 curtiss.22.t: "Приватизация национальной авиакомпании"
 curtiss.22.d: "После недавней поправки к конституции правительство объявило, что государственная авиакомпания будет распущена и преобразована в частную компанию."
 curtiss.22.f: "Либерализация экономики привела к тому, что у нашей государственной авиакомпании в её нынешнем виде больше нет будущего. На самом деле, многие политики вздохнули с облегчением, потому что авиакомпании — это дорогая роскошь. Также нашёлся богатый инвестор в лице [SCOPE.sCharacter('howard_hughes').GetFullName], который будет управлять компанией в будущем. Продажа принесёт высокие доходы от приватизации, но некоторые лоббисты утверждают, что от них следует отказаться, чтобы помочь новым компаниям встать на ноги. Нам следует довольствоваться уже тем, что мы избавились от текущих расходов."
 curtiss.22.g: "Доходы от приватизации должны пойти нам на пользу."
 curtiss.22.h: "Компания должна сохранить деньги для роста и процветания."
 curtiss.23.t: "Национализация «[ROOT.GetCountry.GetAdjective] Airlines»"
 curtiss.23.d: "«[ROOT.GetCountry.GetAdjective] Airlines» по-прежнему считается одной из крупнейших частных компаний во всей стране. Раздаются голоса, что её следует передать под государственный контроль."
 curtiss.23.f: "Совершенно ясно, что такая крупная компания, как «[ROOT.GetCountry.GetAdjective] Airlines» [SCOPE.sCharacter('howard_hughes').GetFullName], должна быть либо разделена, либо национализирована. В результате высокопоставленные чиновники уже представили планы по передаче частной компании в государственную собственность. Одна группа выступает за максимально законную сделку, чтобы прикрыть процедуру. Другие, напротив, видят возможность подать пример и конфисковать активы [SCOPE.sCharacter('howard_hughes').GetFullName], передав их на общественное благо."
 curtiss.23.g: "Национализировать компанию законным путём."
 curtiss.23.h: "Эти жирные личинки слишком долго объедали народ."
 curtiss.30.t: "Пророк"
 curtiss.30.d: "Великий писатель [SCOPE.sCharacter('curtiss_dannunzio').GetFullName] услышал зов войны и вызвался стать пилотом."
 curtiss.30.f: "Габриэле Д'Аннунцио был итальянским поэтом, драматургом, оратором, журналистом, аристократом и офицером Королевской итальянской армии во время Первой мировой войны. Он занимал видное место в итальянской литературе с 1889 по 1910 год, а затем в политической жизни с 1914 по 1924 год. Его часто называли «Il Vate» («Пророк»). В своих литературных произведениях Д'Аннунцио был связан с декадентским движением, которое тесно переплеталось с французским символизмом и британским эстетизмом. Такие произведения представляли собой отход от натурализма предшествующих романтиков и были одновременно чувственными и мистическими. Он попал под влияние Фридриха Ницше, что нашло отражение в его литературном, а затем и политическом вкладе. Во время Первой мировой войны восприятие Д'Аннунцио в Италии изменилось с литературной фигуры на национального героя войны. Он был связан с элитными штурмовыми отрядами «Ардити» итальянской армии и принимал участие в таких акциях, как полёт над Веной."
 curtiss.30.g: "Iterum rudit leo!"
 curtiss.31.t: "Красный барон"
 curtiss.31.d: "[SCOPE.sCharacter('curtiss_richthofen').GetFullName] — один из величайших лётчиков-асов в мировой истории, которым может похвастаться Германия."
 curtiss.31.f: "Манфред Альбрехт фрайхерр фон Рихтгофен был немецким офицером и лётчиком-истребителем во время Первой мировой войны. Он одержал наибольшее количество воздушных побед в той войне как одиночный пилот. Рихтгофен стал одним из самых известных пилотов в мире, о котором до сих пор помнят в фильмах, книгах и других медиа. Прозвища, такие как «Красный барон», связаны с его дворянским происхождением и красной окраской его самолётов."
 curtiss.31.g: "Рождение легенды."
 curtiss.40.t: "Беспосадочный перелёт через Атлантику"
 curtiss.40.g: "Готовьте парад с конфетти!"
 curtiss.42.g: "Выступление сорвиголовы."
 curtiss.50.t: "Будущее воздухоплавания"
 curtiss.50.d: "С дальнейшим развитием авиационной техники и гражданской авиации возникает вопрос, хочет ли наша нация инвестировать в развитие самолётов или дирижаблей."
 curtiss.50.f: "«Правда, хрупкие тела его собратьев не отягощают его самолёт; правда, беспокойные умы более слабых людей отсутствуют в его переполненной кабине; но пока его дирижабль держит курс, он общается с теми редкими духами, что вдохновляют на бесстрашие и своей поддерживающей силой дают силу руке, находчивость уму, умиротворение душе. Один? С какими ещё спутниками полетел бы человек, если бы ему был предоставлен выбор?» — Чарльз Линдберг"
 curtiss.50.g: "Самолёты."
 curtiss.50.h: "Дирижабли."
 curtiss.51.t: "Обнаружен гелий"
 curtiss.51.d: "Во время бурения нефтяной скважины в [SCOPE.sState('curtiss_helium_state').GetCustom('RU_SL_PP')] наши рабочие наткнулись на газовое месторождение с залежами гелия. Это открытие может быть полезно для нашей авиационной промышленности."
 curtiss.51.f: "Первое свидетельство существования гелия было замечено 18 августа 1868 года в виде ярко-жёлтой линии с длиной волны 587,49 нанометра в спектре хромосферы Солнца. Линию обнаружил французский астроном Жюль Жансен во время полного солнечного затмения в Гунтуре, Индия. Локьер и английский химик Эдвард Франкленд назвали элемент греческим словом, означающим Солнце (helios). 26 марта 1895 года шотландский химик сэр Уильям Рамзай выделил гелий на Земле. После того как в 1903 году в Канзасе при бурении нефтяной скважины образовался газовый гейзер, который не горел, геолог штата Канзас Эразм Хоуорт собрал образцы выходящего газа. При дальнейшем анализе Гамильтон Кэди и Дэвид Макфарланд обнаружили, что 1,84% образца газа составляет гелий. Это показало, что, несмотря на его общую редкость на Земле, гелий был сконцентрирован в больших количествах под Великими равнинами Америки и доступен для извлечения в качестве побочного продукта природного газа. Хотя процесс извлечения с использованием низкотемпературного сжижения газа не был разработан вовремя, чтобы иметь значение во время Первой мировой войны, производство продолжалось. Гелий в основном использовался в качестве подъёмного газа в аппаратах легче воздуха."
 curtiss.51.g: "Нам нужен стратегический запас."
 curtiss.52.t: "Запасы гелия исчерпаны"
 curtiss.52.d: "Без доступа к нефтяным и газовым месторождениям мы больше не можем добывать гелий."
 curtiss.52.g: "Это не должно быть большой проблемой... верно?"
 curtiss.53.t: "Граф [SCOPE.sCharacter('tesla_new_engineer_scope').GetFullName] ищет поддержки для строительства дирижабля"
 curtiss.53.d: "Никто не знает, безумец ли граф [SCOPE.sCharacter('tesla_new_engineer_scope').GetFullName] или гений, но он ищет поддержки для своего плана постройки дирижабля. Следует ли нам его поддержать?"
 curtiss.53.f: "«Очевидно, у воздушных шаров есть один большой недостаток: ими нельзя управлять. Я был свидетелем этого факта в различных войнах и заметил, что эта проблема решаема. Мне просто нужно достаточно денег, чтобы построить дирижабль, способный к управляемому полёту»."
 curtiss.53.g: "Новый Икар. Пустая трата денег."
 curtiss.53.h: "Грандиозная идея! Поддержите его!"
 curtiss.54.t: "Дирижабль графа фон Цеппелина LZ 1 в воздухе!"
 curtiss.54.d: "Сегодня с полётом дирижабля Фердинанда фон Цеппелина началась новая эра в авиации."
 curtiss.54.f: "13 августа 1898 года Цеппелин получил имперский патент номер 98580 на «управляемый летательный аппарат с несколькими несущими корпусами, расположенными один за другим». Важнейшими особенностями конструкции Цеппелина были жёсткий алюминиевый каркас, состоящий из колец и продольных балок, прочное соединение двух гондол с каркасом, разделение газового пространства на цилиндрические ячейки одинакового размера и крепление пропеллеров на высоте центра сопротивления воздуха. Дирижабли получили название «цеппелины». Идеи Цеппелина по-прежнему в основном отвергались и высмеивались экспертами и широкой публикой; кайзер Вильгельм II назвал графа «самым глупым из всех южных немцев». В это время Цеппелин сказал: «Конечно, за меня никто не заступается, потому что никто не хочет прыгать в неизвестность. Но моя цель ясна, и мои расчёты верны». В 1900 году LZ 1 совершил три подъёма над Боденским озером, техническим руководителем Цеппелина был инженер Фриц Бурр. Всё лучшие результаты вызывали спонтанный энтузиазм у населения, что в решающей степени способствовало тому, что граф смог дальше развивать технологию дирижаблей и их эксплуатацию."
 curtiss.54.g: "Я знал, что он сможет!"
 curtiss.100.t: "Приз Шнейдера"
 curtiss.100.d: "Подготовка завершена, призовые деньги выделены, а кубок пожертвован. Борьба за приз Шнейдера, самую престижную награду, когда-либо предлагавшуюся за авиагонку, начнётся через 3 месяца!"
 curtiss.100.f: "Кубок Жака Шнейдера по морской авиации, также известный как приз Шнейдера или кубок Шнейдера, — это трофей, который ежегодно (а позже — раз в два года) вручался победителю гонки на гидросамолётах и летающих лодках. Гонка имела большое значение для развития конструкции самолётов, особенно в области аэродинамики и двигателестроения, и её результаты проявились в лучших истребителях Второй мировой войны. Обтекаемая форма и низкое сопротивление, а также двигатель с жидкостным охлаждением, впервые применённые в конструкциях для приза Шнейдера, очевидны в британском Supermarine Spitfire, американском North American P-51 Mustang и итальянском Macchi C.202 Folgore. Соревнования были очень популярны, и некоторые из них собирали толпы более 200 000 зрителей."
 curtiss.100.g: "Разошлите приглашения!"
 curtiss.101.d: "Мы получили приглашение принять участие в гонке за приз Шнейдера! Гонку организует [SCOPE.sCountry('curtiss_schneider_trophy_host').GetName]."
 curtiss.101.g: "Парни, подайте мне эти авиационные очки!"
 curtiss.101.h: "Только когда красные свиньи научатся летать..."
 curtiss.102.d: "Подготовка завершена. Скоро весь мир стечётся в [SCOPE.sState('curtiss_schneider_trophy_state').GetCustom('RU_SL_VP')], чтобы через 3 месяца стать свидетелем гонки мирового класса между самыми современными гидросамолётами."
 curtiss.103.t: "Поддержка нашей команды"
 curtiss.103.d: "Скоро начнётся гонка за приз Шнейдера. Весь мир будет следить за тем, как выступят наши пилоты — и наша страна тоже. Мы можем повысить шансы нашей команды, если поможем ей финансово. Конечно, всё это имеет свою цену..."
 curtiss.103.f: "Соревнование за приз Шнейдера сначала начиналось как гонка между различными пилотами и их самолётами, с небольшой государственной поддержкой. Однако к 1920-м годам гонка приобрела такую известность, что на неё собирались сотни тысяч зрителей. С этим гонка и её значение приобрели новое измерение. Когда США и Италия вскоре после этого официально поддержали свои команды, соревнование превратилось в турнир наций. Сначала это вмешательство считалось недопустимым, но угроза конкурентного невыгодного положения заставила другие страны, такие как Великобритания, официально поддержать свою команду, чтобы не отстать."
 curtiss.103.g: "Никакая цена не слишком высока для национальной чести!"
 curtiss.103.h: "Команда и так хороша."
 curtiss.104.t: "Тренировка к призу Шнейдера"
 curtiss.104.d: "Ввиду предстоящего соревнования за престижный приз Шнейдера рассматривается вопрос о том, должны ли наши пилоты пройти дополнительную подготовку."
 curtiss.104.f: "Ни один спортсмен не выходит на соревнование неподготовленным — то же самое касается и пилотов предстоящей гонки. Однако всегда ведутся споры о тренировках, которые проходят перед соревнованиями. Высокие скорости и рискованные манёвры — гарантия того, что наша команда займёт лучшее место. На некоторых тренировках даже были побиты рекорды. Но в то же время упражнения считаются рискованными. В отличие от гонки за приз Шнейдера, в которой не было серьёзных аварий, во время подготовки с 1923 по 1931 год десять пилотов погибли в результате несчастных случаев."
 curtiss.104.g: "Нашим пилотам нужна лучшая подготовка!"
 curtiss.104.h: "Это слишком опасно."
 curtiss.105.t: "Новый рекорд!"
 curtiss.105.d: "Дополнительная подготовка к призу Шнейдера того стоила. Команда не только прошла трассу без ошибок, но и установила новый рекорд скорости. Это хорошие перспективы на предстоящую гонку!"
 curtiss.105.f: "«Я летаю, потому что это освобождает мой разум от тирании мелочей». — Антуан де Сент-Экзюпери"
 curtiss.105.g: "Отлично, ребята!"
 curtiss.106.t: "Обычные результаты"
 curtiss.106.d: "Может, дело в погоде, может, в мотивации — но, к сожалению, наша команда достигла лишь средних результатов на тренировке к призу Шнейдера. Это, может, и лучше, чем ничего, но мы ожидали от наших пилотов большего."
 curtiss.106.f: "«Каждому достаточно трудно наметить план действий и придерживаться его, особенно вопреки желаниям друзей; но вдвойне трудно авиатору оставаться на земле в ожидании подходящего момента, чтобы подняться в воздух». — Гленн Кёртисс"
 curtiss.106.g: "Лучше, чем ничего."
 curtiss.107.t: "Инцидент на тренировке!"
 curtiss.107.d: "Последняя тренировка к призу Шнейдера закончилась катастрофой — по пока невыясненным причинам один из наших пилотов потерял управление самолётом и на полной скорости врезался в воду. Хотя пострадавшего удалось спасти с большим трудом, на устранение повреждений и выяснение причины ошибки уйдут недели. Тот факт, что в предстоящей гонке нам будет не хватать одного из самых способных пилотов, снижает наши шансы в борьбе за приз Шнейдера."
 curtiss.107.f: "«Самолёт держится в воздухе, потому что у него нет времени упасть». — Орвилл Райт"
 curtiss.107.g: "Катастрофа!"
 curtiss.108.t: "Пилот для приза Шнейдера"
 curtiss.108.d: "Остаётся открытым вопрос, какой пилот возглавит команду, которая будет участвовать в гонке за приз Шнейдера."
 curtiss.108.f: "Обычно кубок Шнейдера был не гонкой наций, а гонкой пилотов; однако вскоре стало обычной практикой, когда несколько пилотов из одной страны стартовали как команда, обычно в составе трёх пилотов на трёх самолётах. Вскоре вокруг отдельных пилотов возник культ, в то время как в последующие годы преобладали командные усилия."
 curtiss.108.g: "[SCOPE.sCharacter('curtiss_schneider_pilot_1').GetFullName]"
 curtiss.108.h: "[SCOPE.sCharacter('curtiss_schneider_pilot_2').GetFullName]"
 curtiss.108.i: "[SCOPE.sCharacter('curtiss_schneider_pilot_3').GetFullName]"
 curtiss.108.j: "[SCOPE.sCharacter('curtiss_schneider_pilot_4').GetFullName]"
 curtiss.108.k: "Новичок"
 curtiss.110.t: "Гонка за приз Шнейдера в [SCOPE.sState('curtiss_schneider_trophy_state').GetCustom('RU_SL_PP')]"
 curtiss.110.d: "В воздухе стоит рёв моторов! Наконец-то настал великий день гонки — весь мир прибыл в [SCOPE.sCountry('curtiss_schneider_trophy_host').GetAltNameNoFlag('RU_CL_VP')], чтобы стать свидетелем борьбы за приз Шнейдера."
 curtiss.110.f: "«Больше всего на свете ощущение полёта — это ощущение полного покоя, смешанного с волнением, которое напрягает каждый нерв до предела. Если вы можете представить себе такое сочетание». — Уилбур Райт\n#b Участники:#!\n\n[GetGlobalVariable('curtiss_schneider_participiant_1_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_2_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_3_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_4_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_5_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_6_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_7_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_8_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_9_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_10_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_11_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_12_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_13_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_14_global_var').GetCountry.GetName]\n[GetGlobalVariable('curtiss_schneider_participiant_15_global_var').GetCountry.GetName]"
 curtiss.110.g: "От винта!"
 curtiss.111.t: "Победа!"
 curtiss.111.d: "После напряжённой борьбы за победу [ROOT.GetCountry.GetNameNoFormatting] выигрыва[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_T')] приз Шнейдера в этом году! Следующую гонку, таким образом, организует наша страна."
 curtiss.111.f: "Страна, одержавшая три победы подряд, навсегда оставляет приз Шнейдера у себя. Этот престижный трофей — не просто награда за спортивное состязание: это символ технического превосходства и воли нации превзойти себя и покорить небеса. Тот, кто владеет призом Шнейдера, станет предметом зависти всего мира. В то время как в историческом соревновании за приз Шнейдера достаточно было трёх побед за пять лет, в этой игре три победы должны быть одержаны подряд. Страна, последней выигравшая приз Шнейдера, имеет честь организовать следующую гонку."
 curtiss.111.g: "Великий день для нашей страны."
 curtiss.112.t: "[SCOPE.sCountry('curtiss_schneider_trophy_recent_winner').GetNameNoFlag] выигрыва[SCOPE.sCountry('curtiss_schneider_trophy_recent_winner').GetAltNameNoFormatting('RU_CL_END_T')] приз Шнейдера"
 curtiss.112.d: "К сожалению, наших усилий оказалось недостаточно. Команда из [SCOPE.sCountry('curtiss_schneider_trophy_recent_winner').GetAltNameNoFlag('RU_CL_RP')] выиграла приз Шнейдера в этом году."
 curtiss.112.f: "Страна, одержавшая три победы подряд, навсегда оставляет приз Шнейдера у себя. Этот престижный трофей — не просто награда за спортивное состязание: это символ технического превосходства и воли нации превзойти себя и покорить небеса. Тот, кто владеет призом Шнейдера, станет предметом зависти всего мира. В то время как в историческом соревновании за приз Шнейдера достаточно было трёх побед за пять лет, в этой игре три победы должны быть одержаны подряд. Страна, последней выигравшая приз Шнейдера, имеет честь организовать следующую гонку."
 curtiss.112.g: "Что ж, поздравляем..."
 curtiss.113.t: "Приз Шнейдера"
 curtiss.113.d: "С третьей победой подряд соревнование за приз Шнейдера подошло к концу. [ROOT.GetCountry.GetNameNoFormatting] показал[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')] всему миру, что превосходит всех в людях, материалах и технологиях. Наши пилоты войдут в историю как национальные герои, и ещё десятилетия люди будут говорить о храбрых лётчиках, сделавших возможной эту окончательную победу. Приз Шнейдера теперь наш, и весь мир смотрит на нас с завистью!"
 curtiss.113.f: "С третьей победой приз Шнейдера наконец-то оказался в руках одной нации. С одной стороны, это великий день для авиации; с другой — остаётся меланхоличная мысль о том, что с рекордно быстрым развитием авиации эпоха пионеров подходит к концу, уступая место серебряному веку, в котором доминируют уже не человеческие амбиции, а чистая механика."
 curtiss.113.g: "Мы покорили небо!"
 curtiss.114.t: "Трофей потерян навсегда"
 curtiss.114.d: "Одержав третью победу подряд, [SCOPE.sCountry('curtiss_schneider_trophy_winner').GetName] сумел[SCOPE.sCountry('curtiss_schneider_trophy_winner').GetAltNameNoFormatting('RU_CL_END_FEM')] забрать домой самый желанный трофей в мире. Теперь этот приз навсегда останется в грязных руках недостойных пилотов."
 curtiss.114.f: "С третьей победой приз Шнейдера наконец-то оказался в руках одной нации. С одной стороны, это великий день для авиации; с другой — остаётся меланхоличная мысль о том, что с рекордно быстрым развитием авиации эпоха пионеров подходит к концу, уступая место серебряному веку, в котором доминируют уже не человеческие амбиции, а чистая механика."
 curtiss.114.g: "Горько. Очень горько."
 curtiss.121.t: "Механические проблемы"
 curtiss.121.d: "Приз Шнейдера был печально известен тем, что многие пилоты даже не могли принять участие в соревновании, потому что уже само путешествие к месту гонки становилось проблемой. Некоторые машины были повреждены, у других возникали проблемы с двигателем, причину которых не удавалось устранить к моменту старта. Механические проблемы приводили к выбыванию целых команд."
 curtiss.121.f: "Раздаются отдельные, совершенно незначительные голоса, утверждающие, что приз Шнейдера был полным провалом. Потому что постоянные проблемы с двигателями, трудности с перелётом и гибель лётчиков-испытателей приводили к тому, что многие команды не могли соревноваться, что вело к ослаблению конкуренции. Франция, историческая родина гидросамолёта, из-за таких проблем почти не могла участвовать в гонках. Такие страны, как Великобритания или Италия, побеждали несколько раз, потому что предоставляли единственный самолёт, который вообще мог принять участие в гонке."
 curtiss.121.g: "Растяпы!"
 curtiss.122.t: "Авария!"
 curtiss.122.d: "Во время манёвра наш пилот переоценил себя — и врезался в воду!"
 curtiss.122.f: "Несмотря на все трудности, за двадцать лет своего существования гонка за приз Шнейдера не привела ни к одной гибели или серьёзной аварии. Однако это не исключает возможности того, что такая катастрофа могла бы произойти, учитывая высокие скорости и конструкцию самолётов, которая всё ещё находилась на заре своего развития."
 curtiss.122.g: "Ой!"
 curtiss.123.t: "Пропущенный буй"
 curtiss.123.d: "Наша команда пролетела хороший круг в гонке за приз Шнейдера, но одному из пилотов грозит вычет очков, потому что один из судей пожаловался, что тот пропустил буй."
 curtiss.123.f: "В 1919 году итальянская команда победила в Борнмуте, Великобритания, в условиях тумана. Судьи на повороте у Суонеджа утверждали, что Гвидо Янелло, победитель гонки, неправильно обогнул буй. Первый заявил, что ошибка произошла из-за плохой организации и что его обманула неофициальная лодка. Однако Янелло был дисквалифицирован, и в этом году приз Шнейдера не был присуждён. Позже Италии была предоставлена компенсация в виде проведения следующей гонки в Венеции. По сей день память о дисквалификации вызывает большое разочарование у итальянских любителей авиации, потому что Италия также победила в 1920 и 1921 годах и, таким образом, ретроспективно выиграла бы приз Шнейдера навсегда."
 curtiss.123.g: "Конечно, это неудача."
 curtiss.123.h: "Попробовать подкупить судью..."
 curtiss.124.t: "Максимальная скорость"
 curtiss.124.d: "На трассе наши пилоты могут показать, на что способны наши #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ие#! машины."
 curtiss.124.f: "Приз Шнейдера был в первую очередь гонкой на скорость, в которой выдающуюся роль играли новейшие авиационные технологии и личные достижения пилота. Для достижения хорошего результата важны новейшие технологии, национальный фокус на авиастроении и личные качества пилота. Лётчики-асы и ветераны приза Шнейдера показывают лучшие результаты, но то же самое можно сказать и об особенно смелых или новаторских личностях."
 curtiss.124.g: "Полный вперёд!"
 curtiss.125.t: "Слаломные манёвры"
 curtiss.125.d: "Приз Шнейдера больше известен как соревнование на скорость, но на трассе было три-четыре отметки, которые можно было пропустить на высокой скорости, что могло привести к дисквалификации."
 curtiss.125.f: "Большинство гонок за приз Шнейдера проходили по треугольному маршруту, поэтому манёвры поворота были довольно редки. Однако это не значит, что они не играли роли; одна ошибка стоила пилоту не одной победы. В таком манёвре решающее значение имеют качества пилота: опытные пилоты, а также осторожные личности достигнут лучшего результата, чем чрезмерно порывистые. Обучение в лётной школе даёт дополнительное преимущество."
 curtiss.125.g: "Летать с элегантностью."
 curtiss.126.t: "Туман"
 curtiss.126.d: "Туман чаще всего был проблемой на водных трассах. Даже опытные пилоты могли потерпеть неудачу в этом внезапном испытании."
 curtiss.126.f: "У гонок на воде есть большой недостаток: туман представляет собой дополнительное испытание. Как и во всех манёврах, здесь главными факторами являются характеристики пилота и его опыт. Пилоты с неортодоксальными методами могут показать лучшие результаты, как и осторожные личности."
 curtiss.126.g: "Наш пилот найдёт свой путь."
 curtiss.127.t: "Превосходные лётные качества"
 curtiss.127.d: "Превосходные качества нашего пилота значительно улучшили наши шансы на победу в кубке Шнейдера!"
 curtiss.127.f: "«Ну, я всегда был очень конкурентоспособным, и это полезно, в какой бы спорт вы ни пошли. И в те дни полёты были в значительной степени спортом, да. Но что действительно помогло мне в авиации, так это быстрая реакция и хорошее чувство равновесия. Думаю, я получил это от акробатики, а не от бокса». — Джеймс Гарольд Дулиттл"
 curtiss.127.g: "Превосходно!"
 curtiss.128.t: "Дуэль между водой и небом"
 curtiss.128.d: "В гонке за самый быстрый круг [SCOPE.sCharacter('duel_participant_1').GetFullName] и [SCOPE.sCharacter('duel_participant_2').GetFullName] опасно сблизились. Целенаправленным манёвром мы могли бы улучшить наши шансы и ослабить прямого конкурента."
 curtiss.128.f: "«Не убегай, а то я всем расскажу!» — Дональд Кёртисс"
 curtiss.128.g: "Воздушный бой!"
 curtiss.128.h: "Лететь вперёд."
 curtiss.129.t: "Победа в воздушной дуэли"
 curtiss.129.d: "Пилот конкурирующей нации пытался выбить [SCOPE.sCharacter('curtiss_schneider_pilot').GetFullName] из гонки, но потерял время и дал нам преимущество в борьбе за трофей!"
 curtiss.129.f: "«Ты глуп. Мне это нравится в мужчинах». — Мадам Джина"
 curtiss.130.t: "Соперничество на призе Шнейдера"
 curtiss.130.d: "У нашего аса приза Шнейдера [SCOPE.sCharacter('duel_participant_1').GetFullName] есть старые счёты со своим соперником [SCOPE.sCharacter('duel_participant_2').GetFullName]. В смелом манёвре он пытается выбить ненавистного врага из гонки!"
 curtiss.130.f: "«Не убегай, а то я всем расскажу!» — Дональд Кёртисс"
 curtiss.130.g: "За честь [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
 curtiss.131.t: "Ожесточённое соперничество"
 curtiss.131.d: "На кубке Шнейдера нам приходится считаться с преследованиями и ожесточённой враждой со стороны [SCOPE.sCountry('curtiss_schneider_failed_rival').GetName]; но на этот раз противник потерпел неудачу! Один пилот действительно пытался выбить нашего аса [SCOPE.sCharacter('curtiss_schneider_pilot').GetFullName] из гонки, но сам попал в аварию."
 curtiss.131.f: "«Ты глуп. Мне это нравится в мужчинах». — Мадам Джина"
 curtiss.132.t: "Благоприятные погодные условия"
 curtiss.132.d: "Хорошие погодные условия улучшают наши шансы на победу."
 curtiss.132.f: "Море спокойно, небо ясно, ветер умеренный. Тумана не было уже несколько недель. Лучшие условия для безопасной гонки!"
 curtiss.132.g: "Погода на нашей стороне."
 curtiss.133.t: "Пилот заболел"
 curtiss.133.d: "Пилот из нашей команды приза Шнейдера заболел прямо перед гонкой."
 curtiss.133.f: "Нам понадобится несколько дней, чтобы найти замену. В результате мы не теряем никакого преимущества, но и не получаем его на этой неделе."
 curtiss.133.g: "Плохой знак."
 curtiss.134.t: "Великая гонка"
 curtiss.134.d: "Пилоты и зрители сходятся во мнении: в этом году гонка за приз Шнейдера — особенная."
 curtiss.134.f: "Иностранные сановники, представители общества, пилоты и туристы поздравили организаторов гонки этого года. Мероприятие имеет полный успех, толпы зрителей больше обычного, и люди, вероятно, будут с восторгом вспоминать эти дни ещё долгие годы. Многие зрители покидают [SCOPE.sState('curtiss_schneider_trophy_state').GetCustom('RU_SL_VP')] довольными и забывают о своих повседневных заботах, став частью этого уникального зрелища."
 curtiss.134.g: "Великолепно!"
 curtiss.135.t: "Саботаж"
 curtiss.135.d: "Иногда для такой важной гонки, как приз Шнейдера, требуются не только особые навыки или превосходные самолёты, но и... особые меры."
 curtiss.135.f: "Исторически не было доказано никаких диверсионных манёвров против участвующих в призе Шнейдера государств. Однако частые отказы машин породили слухи, что это не просто механические проблемы. С вероятностью 50 на 50 мы можем попытаться нанести серьёзный ущерб сопернику. Если же манёвр провалится, мы получим вычет очков на ту же сумму. Какую страну нам следует саботировать?"
 curtiss.135.g: "Такие грязные трюки ниже нашего достоинства."
 curtiss.135.h: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_1').GetName]"
 curtiss.135.i: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_2').GetName]"
 curtiss.135.j: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_3').GetName]"
 curtiss.135.k: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_4').GetName]"
 curtiss.135.l: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_5').GetName]"
 curtiss.135.m: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_6').GetName]"
 curtiss.135.n: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_7').GetName]"
 curtiss.135.o: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_8').GetName]"
 curtiss.135.p: "[SCOPE.sCountry('curtiss_schneider_sabotage_country_9').GetName]"
 curtiss.136.t: "Странная поломка двигателя"
 curtiss.136.d: "Странная поломка двигателя приводит наших инженеров в отчаяние."
 curtiss.136.f: "На самом деле, всего несколько дней назад механики проверили до последнего винтика машину, которая должна была обеспечить нам победу в гонке за приз Шнейдера. Но с сегодняшнего утра самолёт просто не заводится. Некоторые эксперты считают, что механические проблемы могут быть вызваны саботажем, хотя это и недоказуемо. С другой стороны, очевидно, что этот ущерб отбросит нас на недели назад."
 curtiss.136.g: "Тяжёлый удар по нашим шансам на победу."
 curtiss.137.t: "Саботаж предотвращён!"
 curtiss.137.d: "Попытка саботажа со стороны другого участника гонки была предотвращена в последнюю секунду."
 curtiss.137.f: "Прошлой ночью наши механики поймали иностранного шпиона, пытавшегося саботировать двигатель нашего гоночного самолёта. Мы передали его властям и сообщили об этом серьёзном нарушении руководству гонки. Ответственная страна-участник будет наказана вычетом очков."
 curtiss.137.g: "Едва не попались!"
 curtiss.138.t: "Успешный саботаж"
 curtiss.138.d: "Наш шпион смог прошлой ночью проникнуть в ангар команды и успешно саботировать там самолёт."
 curtiss.138.f: "Шансы команды противника на победу значительно снизились."
 curtiss.138.g: "Люблю, когда план срабатывает."
 curtiss.139.t: "Саботаж раскрыт!"
 curtiss.139.d: "К сожалению, наш шпион был пойман с поличным при попытке саботировать самолёт вражеской команды."
 curtiss.139.f: "Руководство гонки наказало нас вычетом очков, а другие команды — справедливо — злы."
 curtiss.139.g: "Чёрт!"
 curtiss.201.t: "Авиакомпания инвестирует в аэропорт"
 curtiss.201.d: "Авиакомпания [SCOPE.sCharacter('howard_hughes').GetFullName] превзошла все ожидания и получила приличную прибыль. Рассматривается возможность строительства нового аэропорта в [SCOPE.sState('curtiss_new_airport_state').GetCustom('RU_SL_PP')]."
 curtiss.201.f: "Иногда для того, чтобы сделать такой рискованный бизнес, как авиация, прибыльным, требуется мегаломаниакальная самоуверенность и, следовательно, совершенно определённый тип личности. [SCOPE.sCharacter('howard_hughes').GetFullName] доказал, что он принадлежит к этому типу. Дела идут так хорошо, что он мог бы даже построить собственный аэропорт — или значительно увеличить свой авиапарк."
 curtiss.201.g: "Построить новый аэропорт."
 curtiss.201.h: "Расширить авиакомпанию, но вложить капитал в другое место."
 curtiss.202.t: "Авиакомпания расширяется"
 curtiss.202.d: "Недавно созданная авиакомпания добилась первого успеха и приобрела несколько новых самолётов."
 curtiss.202.f: "Несмотря на множество непредсказуемых факторов, связанных с авиационным бизнесом, всегда были и истории успеха."
 curtiss.202.g: "Превосходно."
 curtiss.203.t: "Авиакомпания стагнирует"
 curtiss.203.d: "Развитие недавно основанной авиакомпании, к сожалению, не оправдывает ожиданий."
 curtiss.203.f: "Несмотря на огромное очарование, исходившее от авиации в начале XX века, и эйфорию по поводу технологий и прогресса, авиакомпании оставались экономическим риском. Большинство авиакомпаний получали небольшую прибыль или не получали её вовсе. В некоторых случаях требовались годы или десятилетия, прежде чем они становились жизнеспособными, поскольку пассажиропоток был низким, а затраты высокими."
 curtiss.203.g: "Разочаровывающе."
 curtiss.203.h: "Отправить одного из наших пилотов для рекламы авиакомпании."
 curtiss.204.t: "Пилот снова в строю"
 curtiss.204.d: "После успешного рекламного тура для авиакомпании наш пилот [SCOPE.sCharacter('curtiss_pilot').GetFullName] снова доступен."
 curtiss.204.f: ""
 curtiss.204.g: "Хорошая работа."
 curtiss.211.t: "Новый авиамаршрут в иностранный аэропорт"
 curtiss.211.d: "Авиакомпания нашей страны открыла новый авиамаршрут в [SCOPE.sCountry('curtiss_airline_country').GetAltNameNoFlag('RU_CL_VP')]."
 curtiss.211.f: "«У меня было четыре сэндвича, когда я вылетел из Нью-Йорка. Я съел всего полтора за всю поездку и выпил немного воды. Полагаю, у меня не было времени есть больше, потому что, знаете, меня удивило, как близко находится Европа». — Чарльз Линдберг"
 curtiss.211.g: "Надеюсь, эти инвестиции того стоят."
 curtiss.212.t: "Иностранная авиакомпания открывает новый авиамаршрут"
 curtiss.212.d: "Иностранная авиакомпания открыла новый авиамаршрут. Самолёты приземляются в [SCOPE.sState('curtiss_foreign_airline_state').GetCustom('RU_SL_PP')]."
 curtiss.213.t: "Маршрут цеппелина между небоскрёбами"
 curtiss.213.d: "Сегодня был открыт эксклюзивный маршрут цеппелина в [SCOPE.sCountry('curtiss_airline_country').GetAltNameNoFlag('RU_CL_VP')]. Точками причаливания служат небоскрёбы в соответствующих странах."
 curtiss.213.f: "Существовали концепции причаливания дирижаблей к небоскрёбам. Вершина Эмпайр-стейт-билдинг, открытого в 1931 году, изначально предназначалась для использования в качестве причальной мачты. Мачта была так укреплена, что могла бы выдержать 50-тонное натяжение от швартовки дирижабля. Некоторые лебёдки уже были установлены, а 86-й этаж был подготовлен как зал вылета с билетной кассой и таможенным контролем. Идея соответствовала эйфории того времени по поводу гигантов воздуха. Однако при строительстве не учли, что дирижабли могут маневрировать очень медленно и что из-за застройки всегда возникают ветровые турбулентности, которые могли бы серьёзно помешать дирижаблю."
 curtiss.213.g: "Цеппелины — самый экстравагантный вид путешествий."
 curtiss.214.t: "Обзорные полёты"
 curtiss.214.d: "У «[ROOT.GetCountry.GetAdjective] Airlines» новая бизнес-идея: она разнообразит своё предложение обзорными полётами для туристов."
 curtiss.214.f: "«Лётчик, передай привет солнцу,\nПередай привет звёздам и передай привет луне.\nТвоя жизнь — это парение\nСквозь дали, где никто не живёт»."
 curtiss.214.g: "Можно мне тоже билет?"
 curtiss.215.t: "Колониальные товары самолётом"
 curtiss.215.d: "В одной из наших африканских колоний открылся небольшой аэродром, с которого самолёты перевозят колониальные товары прямо в [SCOPE.sState('curtiss_colonial_goods_state').GetCustom('RU_SL_VP')]."
 curtiss.215.f: "С установлением прямого авиасообщения между [SCOPE.sState('curtiss_airport_state').GetCustom('RU_SL_TP')] и [SCOPE.sState('curtiss_colonial_goods_state').GetCustom('RU_SL_TP')] африканские общины становятся ближе к [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')]. И вам больше не придётся так долго ждать своих кокосов, бананов и алмазов."
 curtiss.215.g: "Даже самые отдалённые уголки мира связаны авиацией с метрополией."
 curtiss.216.t: "Туризм"
 curtiss.216.d: "Открытие авиамаршрута в [SCOPE.sCountry('curtiss_tourist_country').GetAltNameNoFlag('RU_CL_VP')] оказалось очень прибыльным. Авиакомпании необходимо удвоить свои мощности, так как число пассажиров резко возросло. Очевидно, туристов привлекает эта страна."
 curtiss.216.f: "Сделки по воздушному пространству со странами, владеющими значительными памятниками, могут оказаться очень прибыльными."
 curtiss.216.g: "Ах, [SCOPE.sCountry('curtiss_tourist_country').GetName]!"
 curtiss.217.t: "Предвыборная кампания по воздуху"
 curtiss.217.d: "Авиакомпания предлагает перевозить кандидатов от правительства."
 curtiss.217.f: "С появлением самолёта как возможного средства передвижения изменилась и избирательная кампания. Кандидаты с собственными самолётами не только воспринимались как более мобильные, но и создавали ощущение современности. По крайней мере, такой рекламный носитель должен принести хотя бы небольшое преимущество правящей партии."
 curtiss.217.g: "Мы с радостью воспользуемся этим предложением."
 curtiss.217.h: "А что, если кто-нибудь разобьёт самолёт?"
 curtiss.218.t: "Пилот для рекламы?"
 curtiss.218.d: "Авиакомпания в настоящее время переживает небольшой кризис. Руководство обратилось к нам с необычной идеей: они хотят обязать [SCOPE.sCharacter('curtiss_pilot').GetFullName] летать для их линий и использовать его для рекламы."
 curtiss.218.f: "На заре авиации известные пилоты помогали в качестве рекламных лиц. Так, Чарльз Линдберг оказал значительное влияние на популяризацию авиапочты. Например, по просьбе Бэзила Л. Роу, владельца West Indian Aerial Express, он перевёз около 3000 единиц специальной сувенирной почты между Санто-Доминго, Порт-о-Пренсом и Гаваной. Через две недели после своего латиноамериканского турне Линдберг пилотировал серию специальных рейсов. Десятки тысяч сувенирных конвертов с обратным адресом были присланы со всего мира. Затем конверты проштемпелёвывались и возвращались отправителям в качестве рекламы авиапочты."
 curtiss.218.g: "Конечно!"
 curtiss.218.h: "Мы не можем обойтись без него, но поможем другими способами."
 curtiss.218.i: "К сожалению, наши руки связаны."
 curtiss.219.t: "Подключён новый аэропорт"
 curtiss.219.d: "Авиакомпания приложила усилия для расширения своей текущей маршрутной сети."
 curtiss.219.f: "«Полёт, может быть, и не всегда гладкое плавание, но удовольствие от него стоит того». — Амелия Эрхарт"
 curtiss.219.g: "Превосходно."
 curtiss.219.h: "Мы не можем себе этого позволить."
 curtiss.220.t: "Аэропорт растёт"
 curtiss.220.d: "Аэропорт в [SCOPE.sState('curtiss_airport_state').GetCustom('RU_SL_PP')] стал центром международного воздушного сообщения."
 curtiss.220.f: "Один из наших национальных аэродромов в ходе модернизации воздушного сообщения и процветания местной экономики превратился в важный перевалочный пункт. Местные деловые ассоциации и городская администрация поэтому расширили его до настоящего аэропорта."
 curtiss.220.g: "[SCOPE.sState('curtiss_airport_state').GetName] станет центром мира!"
 curtiss.221.t: "Новые самолёты"
 curtiss.221.d: "Крупнейшая авиакомпания страны объявила о планах по увеличению своего авиапарка."
 curtiss.221.f: "«Однажды вкусив полёт, ты будешь вечно ходить по земле с глазами, устремлёнными в небо, ибо там ты был и туда будешь вечно стремиться вернуться». — Леонардо да Винчи"
 curtiss.222.t: "Авиакатастрофа"
 curtiss.222.d: "Серьёзная авиакатастрофа подорвала доверие к авиации в целом и к «Airlines» в частности."
 curtiss.222.f: "Авиакатастрофа, в которой погибло несколько человек, ввергла главную авиакомпанию страны в кризис. Выплаты родственникам жертв, потеря самолёта и нехватка пассажиров могут привести к сокращению инвестиций. Сторонники вмешательства выступают за финансовую инъекцию, чтобы предотвратить скатывание в крупный кризис."
 curtiss.222.g: "Не зря это называется свободным рынком."
 curtiss.222.h: "Государство вмешается."
 curtiss.223.t: "«[ROOT.GetCountry.GetAdjective] Airlines» в затруднительном положении"
 curtiss.223.d: "Серьёзный кризис потряс главную авиакомпанию страны. [SCOPE.sCharacter('howard_hughes').GetFullName] объявил о значительном сокращении штата компании, чтобы избежать банкротства."
 curtiss.223.f: "Кризис в «[ROOT.GetCountry.GetAdjective] Airlines» доминирует в газетных заголовках. Несколько сотен рабочих мест находятся под острой угрозой, курс акций рушится. Чтобы спасти свою компанию, [SCOPE.sCharacter('howard_hughes').GetFullName] объявил о жёстких мерах, которые выведут профсоюзы на улицы. Популярность магната резко упала. Правительственное вмешательство могло бы предотвратить кризис, но стало бы долгосрочным финансовым вложением."
 curtiss.223.h: "Эта компания имеет национальное значение!"
 curtiss.224.t: "Длинная рука «[ROOT.GetCountry.GetAdjective] Airlines»"
 curtiss.224.d: "Махинации [SCOPE.sCharacter('howard_hughes').GetFullName] становятся всё более очевидными: магнат тем временем выстроил в политике действующую систему фаворитизма."
 curtiss.224.f: "Немногие люди в стране обладают такой властью, как [SCOPE.sCharacter('howard_hughes').GetFullName]. Тем временем магнат выстроил внутри правительства систему, которая некоторых пугает. Теперь доказано, что он использовал взяточничество, чтобы получить преимущества в одной из провинций, предоставив там аэропорту налоговые льготы. В кабинете министров всё громче звучат голоса, требующие разъяснений и переоценки. Другие же видят в этих прямых связях с промышленностью чрезвычайную выгоду."
 curtiss.224.g: "В чём проблема? Вы знаете друг друга и помогаете друг другу."
 curtiss.224.h: "Коррупция — это зло, которое следует искоренять повсеместно."
 curtiss.225.t: "Невыгодные авиаперевозки"
 curtiss.225.d: "Из-за роста расходов и падения числа пассажиров «[ROOT.GetCountry.GetAdjective] Airlines» вынуждена ограничить свою деятельность в одном из аэропортов."
 curtiss.225.f: "Была ли последняя акция плохой инвестицией? Подвёл ли [SCOPE.sCharacter('howard_hughes').GetFullName] деловой инстинкт? Как бы то ни было: из-за невыгодной эксплуатации аэропорта компания вынуждена сократить свои инвестиции там, чтобы не оказаться втянутой в крупный кризис. Местные рабочие, которым грозит увольнение, обращаются к правительству, чтобы узнать, может ли оно вмешаться и предотвратить фиаско."
 curtiss.225.g: "Этот аэропорт имеет национальное значение!"
 curtiss.226.t: "Конкурирующая авиакомпания из [SCOPE.sCountry('curtiss_rival_airline_country').GetAltNameNoFlag('RU_CL_RP')]"
 curtiss.226.d: "Нашей авиакомпании становится труднее оставаться конкурентоспособной после того, как конкурирующая авиакомпания разрушает наш зарубежный бизнес."
 curtiss.226.f: "Руководители нашей отечественной авиакомпании предполагали, что у них хорошие перспективы на успех в [SCOPE.sCountry('curtiss_third_country').GetAltNameNoFlag('RU_CL_PP')]. На самом деле, это продолжалось только до тех пор, пока [SCOPE.sCountry('curtiss_rival_airline_country').GetName] не расширилась со своей местной авиакомпанией. С тех пор компания ведёт ценовую войну. Поскольку пассажиров мало, уже рассматривается вопрос о сокращении мощностей в одном из отечественных аэропортов и экономии. Руководство настоятельно призывает наше правительство вмешаться в дела [SCOPE.sCountry('curtiss_third_country').GetAltNameNoFlag('RU_CL_PP')], чтобы тонко наложить санкции на конкурентов."
 curtiss.226.g: "Мы не будем вмешиваться в это деликатное дело."
 curtiss.226.h: "Попытаться дипломатически вмешаться в дела [SCOPE.sCountry('curtiss_third_country').GetAltNameNoFlag('RU_CL_RP')]."
 curtiss.227.t: "Проблемы у [SCOPE.sCharacter('howard_hughes').GetFullName]"
 curtiss.227.d: "Знаменитый авиамагнат находится под давлением после того, как «[ROOT.GetCountry.GetAdjective] Airlines» не приносит обещанной прибыли."
 curtiss.227.f: "На самом деле, это лишь небольшой кризис, который угрожает ведущему промышленнику страны. Но за эти годы в компании выросла жадность, настаивающая на смещении успешного бизнесмена. Плохая инвестиция в один из аэропортов страны должна послужить поводом, чтобы избавиться от влиятельного магната и поставить нового человека. Мы могли бы использовать эту ситуацию в свою пользу."
 curtiss.227.g: "Он должен уйти в отставку."
 curtiss.227.h: "[SCOPE.sCharacter('howard_hughes').GetFullName] справится с этим небольшим кризисом."
 curtiss.228.t: "Процветающий авиазавод в [SCOPE.sState('curtiss_factory_state').GetCustom('RU_SL_PP')]"
 curtiss.228.d: "Один из наших авиазаводов значительно увеличил мощности и эффективность после заключения партнёрства с авиакомпанией."
 curtiss.228.f: "В [SCOPE.sState('curtiss_factory_state').GetCustom('RU_SL_PP')] используются ранее неизвестные синергии. Местная промышленность извлекает большую выгоду из местного аэропорта и авиакомпании. После недавнего подписания контракта [SCOPE.sState('curtiss_factory_state').GetName] должен стать центром авиационной культуры [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Будет осуществляться тесная координация между возможностями и потребностями договаривающихся сторон."
 curtiss.228.g: "Великий день для авиации!"
 curtiss.229.t: "Новый авиазавод в [SCOPE.sState('curtiss_factory_state').GetCustom('RU_SL_PP')]"
 curtiss.229.d: "До сих пор магнат [SCOPE.sCharacter('howard_hughes').GetFullName] в основном занимался авиакомпаниями, но теперь он хочет производить самолёты непосредственно для своей собственной компании."
 curtiss.229.f: "Авиационный бизнес в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] процветает. Чтобы удовлетворить спрос на всё новые и новые самолёты и больше не зависеть от подрядчиков, ведущий авиамагнат страны решил открыть новое направление бизнеса. «[SCOPE.sCharacter('howard_hughes').GetLastName] Aircraft Company» должна стать новым конкурентом на мировом рынке. Некоторые, однако, задаются вопросом, не опасно ли, когда столько власти находится в руках одного человека."
 curtiss.229.h: "Это очевидная ловушка."
 curtiss.230.t: "[SCOPE.sCharacter('howard_hughes').GetLastName], меценат"
 curtiss.230.d: "Известный миллиардер [SCOPE.sCharacter('howard_hughes').GetFullName] считается другом музыки и кино. Он хочет построить огромный новый театр в [SCOPE.sState('curtiss_opera_state').GetCustom('RU_SL_PP')]."
 curtiss.230.f: "Долгое время [SCOPE.sCharacter('howard_hughes').GetFullName] сетовал на предполагаемое отсутствие культуры в центральном узле своей авиакомпании. Городу не помешала бы более гламурная ночная жизнь, что также привлекло бы больше туристов. В то же время магнат известен своим музыкальным вкусом и энтузиазмом по поводу развивающегося кинематографа. Ходят слухи, что он даже хочет снять собственный фильм. Расширение [SCOPE.sState('curtiss_opera_state').GetCustom('RU_SL_RP')] должно, таким образом, быть в его собственных интересах — и улучшить его репутацию."
 curtiss.230.g: "Великий день для культуры!"
 curtiss.251.t: "Потерянный горизонт"
 curtiss.251.d: ""
 curtiss.251.f: "Человечество лишило мир его тайн. Прогресс и технологии изгнали их. Лишь в самых последних и отдалённых уголках остались места уединения. Места, которые привлекали [SCOPE.sCharacter('curtiss_conway_scope').GetFullName]. Он оставил неизгладимое впечатление на тех, кто его знал. Он подобен тем искателям приключений, которые появляются то тут, то там, но которых помнят, потому что они — одни из последних оригиналов в серой массе копий. Но [SCOPE.sCharacter('curtiss_conway_scope').GetLastName] был не просто человеком, который повидал мир. Он был почётным консулом нашей страны в Индии — и несколько месяцев назад бесследно исчез. Где-то в Гималаях, на границе между Непалом и Тибетом. Горькая потеря, с которой можно было бы смириться, если бы не одна важная деталь. [SCOPE.sCharacter('curtiss_conway_scope').GetLastName] что-то искал. Что-то большое. Нечто большее, чем многие сокровища. Безумие, как говорят некоторые. Но в этом безумии что-то есть, потому что сегодня утром бывший помощник [SCOPE.sCharacter('curtiss_conway_scope').GetLastName] переслал в Государственный департамент рукопись. Личные заметки, указывающие на тайную, неизвестную долину в горах. Долину, незамеченную миром. Мы подозреваем, что почётный консул направлялся в эту долину — и с ним могло что-то случиться, поскольку он пропал уже несколько недель."
 curtiss.251.g: "Нам следует организовать спасательную миссию и найти его."
 curtiss.251.h: "У нас нет времени на эти эскапистские выдумки."
 curtiss.252.t: "Спасение [SCOPE.sCharacter('curtiss_conway_scope').GetLastName]"
 curtiss.252.d: ""
 curtiss.252.f: "После тщательного изучения рукописи подтверждается предположение, что [SCOPE.sCharacter('curtiss_conway_scope').GetLastName] мог исчезнуть в Гималаях. Несмотря на запросы другим послам и подкуп информаторов, никаких следов почётного консула найти не удалось. Сама рукопись, очевидно, написанная почерком [SCOPE.sCharacter('curtiss_conway_scope').GetLastName], повествует о трёх артефактах, указывающих путь в скрытое место. Мы не знаем, почему [SCOPE.sCharacter('curtiss_conway_scope').GetLastName] хотел туда попасть, и не знаем, что ему там было нужно; но даже если это всего лишь горячечный бред сумасшедшего, [SCOPE.sCharacter('curtiss_conway_scope').GetLastName] определённо нужно вернуть в [ROOT.GetCountry.GetCapital.GetCityHubName]. Эту миссию может выполнить только опытный пилот. Надежда найти [SCOPE.sCharacter('curtiss_conway_scope').GetLastName] живым кажется ничтожно малой. Если нет, то, по крайней мере, важно выяснить, что с ним случилось. Но, возможно, ответ можно найти в самой таинственной долине. Её имя — Шангри-Ла."
 curtiss.252.g: "[SCOPE.sCharacter('curtiss_expedition_leader_1').GetFullName] должен его искать."
 curtiss.252.h: "[SCOPE.sCharacter('curtiss_expedition_leader_2').GetFullName] справится с этой работой."
 curtiss.252.i: "[SCOPE.sCharacter('curtiss_expedition_leader_3').GetFullName] — наш человек."
 curtiss.253.t: "Поиски начинаются"
 curtiss.253.d: ""
 curtiss.253.f: "[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] летит уже несколько часов. Из моря облаков уже простираются массивные, заснеженные вершины бесконечных горных цепей. На них играет лёгкое зарево рассвета. Есть лишь приблизительные указания на то, где могут находиться три артефакта. Однако, следуя рукописи, оставленной [SCOPE.sCharacter('curtiss_conway_scope').GetLastName], есть несколько возможных мест, где их можно найти. Двигатель самолёта гудит над бескрайними просторами Тибета, пока [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] прокладывает окончательный курс — в надежде найти хоть какую-то зацепку, ведущую к [SCOPE.sCharacter('curtiss_conway_scope').GetLastName] или долине, которую он искал."
 curtiss.253.g: "Ладакх."
 curtiss.253.h: "Лхаса."
 curtiss.253.i: "Нгари."
 curtiss.253.j: "Прекратить эти бессмысленные поиски."
 curtiss.254.t: "Поиски продолжаются"
 curtiss.254.d: ""
 curtiss.255.t: "Тайна артефактов"
 curtiss.255.d: ""
 curtiss.255.f: "После того как [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] найдёт все три артефакта Шангри-Ла, их нужно будет изучить более тщательно. Поэтому пилот на короткое время возвращается в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')], чтобы артефакты были проверены и проанализированы на месте опытным археологом."
 curtiss.255.g: "Нам нужен подходящий человек для этого."
 curtiss.260.t: "Молчаливый старец"
 curtiss.260.d: ""
 curtiss.260.f: "Тишина. Старец опускает глаза. Он складывает руки, больше не смотрит на [SCOPE.sCharacter('curtiss_shangrila_leader').GetFullName].\n«Думаю, вам лучше уйти»."
 curtiss.260.g: "Он обиделся?"
 curtiss.261.t: "Ладакх"
 curtiss.261.d: ""
 curtiss.261.f: "Прошли часы полёта. Лес горных вершин сопровождал [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')] часами. Пропеллеры двухмоторного самолёта всё ещё вращаются, когда [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] смотрит на небольшой городок в Гималаях между Кашмиром и Тибетом. Чуть позже, прогуливаясь по улицам, [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она слышит', 'он слышит')] звон молитвенных барабанов. У входа в деревню ждёт группа наёмников; трудно сказать, за кого или против кого они сражаются. Их оружие и доспехи выглядят так, словно из другого времени, но от этого они не менее опасны. В центре поселения — небольшой рынок, где продаются шерсть и ткани из близлежащего Кашмира. Ярко раскрашенный дом с развевающимися флагами указывает на то, что там живёт деревенский староста."
 curtiss.261.g: "Посетить наёмников."
 curtiss.261.h: "Посетить рынок."
 curtiss.261.i: "Посетить старца."
 curtiss.261.j: "Вернуться к цивилизации."
 curtiss.262.t: "Наёмники?"
 curtiss.262.d: ""
 curtiss.262.f: "Вооружённые люди охраняют дом. Суровые взгляды дают понять, что они не доверяют не только чужакам, но и всем, кто подходит слишком близко к порогу. И то, и другое относится к [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]. Оскаленных зубов достаточно, чтобы [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она поняла', 'он понял')], что лучше убраться."
 curtiss.262.g: "Попытаться поговорить с ними."
 curtiss.262.h: "Попытаться подкупить их."
 curtiss.262.i: "Показать им кору."
 curtiss.262.k: "Показать им оружие."
 curtiss.262.j: "Вернуться в деревню."
 curtiss.263.t: "Наёмники не впечатлены"
 curtiss.263.d: ""
 curtiss.263.f: "Никаких эмоций. Наёмники — или кто бы они ни были — молчат. Даже отрицательная реакция была бы лучше, чем холод, которым от них веет — холоднее, чем заснеженные вершины Гималаев. Холод вскоре поднимается от шеи [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] к кончикам пальцев ног. Очевидно, лучше двигаться дальше."
 curtiss.263.g: "Странные ребята..."
 curtiss.264.t: "Стражи Шангри-Ла"
 curtiss.264.d: ""
 curtiss.264.f: "Традиционный меч сверкает в ледяном солнце. Взгляд [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] скользит от одного наёмника к другому. Снова никакой реакции, думает [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она', 'он')] сначала, опускает меч — и вдруг слышит голос.\n«Примечательно».\n[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] моргает. С одной стороны, это удивление от того, что они с [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ней', 'ним')] заговорили. Но ещё больше [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')] поражает то, что незнакомец говорит не на тибетском. А на [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')] родном языке. Без акцента. Так чисто, будто он с детства не слышал другого языка.\n«Вы #tooltippable_name [ROOT.GetCountry.GetAdjective|l]#!?» — спрашивает [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName], но не получает ответа.\n«Старик привёл тебя сюда. Ты прош[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ла', 'ёл')] испытание. Теперь идём».\nВ эту секунду [SCOPE.sCharacter('curtiss_shangrila_leader').GetFullName] охватила пленительная и жуткая мысль, подобно дикому зверю. Если эти люди действительно стражи Шангри-Ла, то не исключено, что они сами бывали в этой долине. Возможно, они теперь обладают неизмеримой мудростью и могут говорить на самых разных языках; возможно, они обладают особым даром и могут видеть в сердце каждого чужака и читать его мысли; но, возможно, дело было и в том, что [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она была не первой', 'он был не первым')], кто пришёл издалека в поисках легендарной долины. У [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] были тысячи вопросов, и [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она искала', 'он искал')] десятки тысяч ответов; но [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ей', 'ему')] не посчастливилось найти ни одного. Молча один из мужчин провёл [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')] в дом, который состоял всего из одной комнаты с единственным артефактом тибетского происхождения, на который мужчина указал тоном, не недружелюбным, но ясным.\n«Мы не прячем Шангри-Ла от человечества. Мы защищаем человечество от самого себя. Те, кто не докажут свою достойность, погибают на пути», — сказал страж, прежде чем вывести [SCOPE.sCharacter('curtiss_shangrila_leader').GetFullName] обратно, а затем погрузиться в вечное молчание, которое стало единым с молчанием всей его таинственной стражи."
 curtiss.264.g: "Кажется, старец нас испытывал..."
 curtiss.265.t: "Оружие"
 curtiss.265.d: ""
 curtiss.265.f: "[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] достаёт оружие. Металл направлен на стражей. [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'Она', 'Он')] ждёт, чтобы понять, правильный ли выбор [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'сделала', 'сделал')]; пока один человек не отделяется от рядов. Он подходит, смотрит на [SCOPE.sCharacter('curtiss_shangrila_leader').GetFullName], затем на оружие.\nУжасный металлический скрежет.\nИстерзанное железо сверкает на тропе, затем теряет свой блеск. Незнакомец взял оружие голыми руками и сломал его. Нет более ясного указания на то, что [SCOPE.sCharacter('curtiss_shangrila_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'дисквалифицировала себя', 'дисквалифицировал себя')] от входа в дом."
 curtiss.265.g: "Это было... жестоко."
 curtiss.266.t: "Рынок шерсти"
 curtiss.266.d: ""
 curtiss.266.f: "Запах ячьего масла заглушает другие ароматы в воздухе рынка. Лишь несколько человек толпятся между небольшими прилавками. Поражает ассортимент тканей и особенно шерсти. Поставки из близлежащего Кашмира идут через этот город в сторону Тибета. Там материал пользуется спросом. Когда [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] проходит мимо торговцев, [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она не может устоять', 'он не может устоять')], когда один из продавцов подходит к [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ней', 'нему')] и хочет предложить целый тюк шерсти по хорошей цене."
 curtiss.266.g: "Шерсть выглядит качественной."
 curtiss.267.t: "Старец"
 curtiss.267.d: ""
 curtiss.267.f: "Окутанные ароматом масляного чая, проходят часы в зале, который в ином случае можно было бы назвать бедным, но здесь, в Гималаях, он мог похвастаться великолепием дворца. Ковры, маски и вымпелы висят на стенах, взирая на низкий стол, где старец и [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] допивают очередную чашу. Глава поселения необычайно гостеприимен. Хотя [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] говорил[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] мало и ограничился самым важным, старик, кажется, проявляет определённый интерес. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] сначала [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'подумала', 'подумал')], что всё дело в [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')] происхождении, так как люди вроде [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'неё', 'него')] — редкость в этой отдалённой местности. Но старец даёт [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ей', 'ему')] почувствовать, что у него есть догадка, почему [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она', 'он')] может быть здесь. Упоминается имя [SCOPE.sCharacter('curtiss_conway_scope').GetLastName]. И [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] намекает, чего [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она', 'он')] на самом деле хочет. Дружелюбная атмосфера, в которой заканчивается визит, побуждает [SCOPE.sCharacter('curtiss_shangrila_leader').GetFullName] затронуть ещё одну тему..."
 curtiss.267.g: "Кто эти наёмники?"
 curtiss.267.h: "Что вы знаете о Шангри-Ла?"
 curtiss.268.t: "Тайна наёмников"
 curtiss.268.d: ""
 curtiss.268.f: "Старец на мгновение откидывается назад. Кажется, он тщательно обдумывает, что сказать дальше. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] знает такие моменты; они случались у людей, которые взвешивали каждое своё слово.\n«Их называют наёмниками, но это не так. Они — Стражи»,\n — заявляет старик. «Они охраняют Долину Голубой Луны».\n«Долину Голубой Луны? Они охраняют дом, а не долину».\n«Путь в долину лежит через дом. Иногда, чтобы идти прямо, нужно сделать крюк», — объясняет старец. «Они пропускают только тех, кто докажет свою достойность. Для этого он должен отличиться. Он должен носить оружие, как древние воины. Почётное оружие, какое носят и в Долине Голубой Луны».\n«Кто-нибудь уже входил к Стражам и проходил через дом?»\nСтарец улыбается.\n«Человек, которого вы называете [SCOPE.sCharacter('curtiss_conway_scope').GetLastName], смог»."
 curtiss.268.g: "Этот дом — ключ к Шангри-Ла."
 curtiss.269.t: "О Шангри-Ла"
 curtiss.269.d: ""
 curtiss.269.f: "Сердечная атмосфера внезапно исчезает. Старец ставит свою чашу с масляным чаем. Его глаза устремлены на [SCOPE.sCharacter('curtiss_shangrila_leader').GetFullName]. Его голос стал твёрже. Он изучает [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')].\n«Что вы ищете в Шангри-Ла?»"
 curtiss.269.g: "Я ищу мир."
 curtiss.269.h: "Я ищу истину."
 curtiss.269.i: "Я ищу [SCOPE.sCharacter('curtiss_conway_scope').GetLastName]."
 curtiss.269.j: "Я ищу просветление."
 curtiss.270.t: "Совет"
 curtiss.270.d: ""
 curtiss.270.f: "Старец улыбается.\n«Истина — благороднейшее топливо. Спасти жизнь — хорошо, но какой в этом смысл, если не знаешь, зачем это делаешь? То же самое и с Шангри-Ла. Бесчисленное множество людей веками искали Долину Голубой Луны. Многими двигал неустанный поиск мира. Тоска по самореализации. Даже желание подарить долгую жизнь любимому человеку, больному неизлечимой болезнью. Каков бы ни был их мотив, не следовало ли им начать с вопроса, что такое Шангри-Ла?»\n«Я слышал[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')], что это идеальное место».\n«Даже если это просто ещё одна горная долина с теми же страданиями, теми же бедами, теми же грехами и той же жалкой жизнью, что и в любом другом месте?»\n«Мне всё равно», — сказал[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]. «Я хочу определённости. И мне нужно найти [SCOPE.sCharacter('curtiss_conway_scope').GetLastName]».\nСтарец кивнул.\n«Есть определённая причина, по которой [SCOPE.sCharacter('curtiss_conway_scope').GetLastName] смог войти в дом, а другие нет. Он знал, что традиционное оружие Долины Голубой Луны — не тибетское. А непальское. Это меч-кора».\n[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] был[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] поражен[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')]. «Но как он узнал?»\n«Потому что [SCOPE.sCharacter('curtiss_conway_scope').GetLastName] был в Шангри-Ла не в первый раз...»"
 curtiss.270.g: "Кора..."
 curtiss.271.t: "Лхаса"
 curtiss.271.d: ""
 curtiss.271.f: "Лхаса. Мистическое место. Дворец Потала, резиденция Далай-ламы, возвышается над городом. Сказочное зрелище, которое заставляет [SCOPE.sCharacter('curtiss_shangrila_leader').GetFullName] забыть, в какой отдалённой части мира [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она находится', 'он находится')]. Некоторые могут принять это за цивилизацию в дикой местности; но называть Лхасу цивилизацией было бы ошибкой. В какой-то момент время здесь остановилось. Для прогрессиста — отсталое место, застрявшее в варварстве; для романтика — убежище от мира, пронизанного технологиями и манией величия. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] бродит по улицам, где наряду с узкими переулками и тавернами есть традиционный оружейник. [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'Она не знала', 'Он не знал')], поможет ли какое-либо из этих мест в [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')] поисках; но, возможно, они дадут ответы на вопросы, которых у [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'неё', 'него')] до сих пор не было."
 curtiss.271.g: "Посетить дворец Потала."
 curtiss.271.h: "Посетить кузнеца."
 curtiss.271.i: "Выпить в таверне."
 curtiss.271.k: "Прогуляться по улицам."
 curtiss.271.j: "Вернуться к цивилизации."
 curtiss.272.t: "Дворец Потала"
 curtiss.272.d: ""
 curtiss.272.f: "[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] далеко не [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ушла', 'ушёл')]. Стражники останавливают [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')] у ворот величественного дворца. Они отказывают в доступе. Когда [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] пытается объяснить свою цель, [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ей', 'ему')] намекают, что ни одна из [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')] забот не может быть достаточно важной, чтобы беспокоить Далай-ламу. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] замечает большое недоверие к себе; предположительно, [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')] принимают за шпиона."
 curtiss.272.g: "Показать талисман."
 curtiss.272.h: "Вернуться в Лхасу."
 curtiss.273.t: "Лама"
 curtiss.273.d: ""
 curtiss.273.f: "Талисман сверкает перед стражниками. Те расширяют глаза. «Амулет Великого Пятого!» — восклицает один. Теперь они больше не стоят на пути у [SCOPE.sCharacter('curtiss_shangrila_leader').GetFullName]. Напротив: они ведут [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')] во дворец. Мимо красочно расписанных стен, роскошных тканей и демонических статуй они ведут [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')] быстрее, чем ожидалось, — прямо к Далай-ламе. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] не ожидал[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] такого эффекта. И не может поверить своим ушам, когда [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')] ведут, как заключённ[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ую', 'ого')]; обвинённ[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ую', 'ого')] в краже важного артефакта из дворца. Удар заставляет [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')] встать на колени; пока тишина не заполняет комнату.\n«Он[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] не сделал[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] ничего плохого».\nДалай-лама сказал. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] может лишь медленно поднять взгляд из своего покорного положения. Духовный лидер Тибета спокоен, говорит с закрытыми глазами. Лишь блеск талисмана пробуждает его. Стражник выхватывает сувенир у [SCOPE.sCharacter('curtiss_shangrila_leader').GetFullName] и передаёт его ламе.\n«Этот талисман был утерян из дворца Потала много лет назад. Я годами ждал, что кто-то вернёт его. Так было предначертано».\n[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] поднимает голову. Мастер жестом приглашает [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')] встать. [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'Она', 'Он')] кивает. Но не понимает.\n«Вы говорите о судьбе?»\n«Судьба — такое абстрактное понятие. Я предпочитаю нечто живое, из плоти и крови», — говорит Далай-лама.\n«Не понимаю?» — спрашивает [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName].\n«Твоя судьба зовётся [SCOPE.sCharacter('curtiss_conway_scope').GetLastName]. И у меня есть кое-что для тебя, чтобы я мог отдать это, если кто-то вернёт мне талисман...»"
 curtiss.273.g: "Это один из знаменитых артефактов Шангри-Ла!"
 curtiss.274.t: "Нет железа"
 curtiss.274.d: ""
 curtiss.274.f: "«Мы закрыты! Нет железа — нет работы. Возвращайтесь через несколько месяцев!»\nЕдва [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она вошла', 'он вошёл')] в лавку, как по комнате разнёсся грубый голос. Клиентоориентированность, очевидно, не была главным приоритетом в этой кузнице."
 curtiss.274.g: "«Так совпало, что у меня есть с собой железо»."
 curtiss.275.t: "Кузнец"
 curtiss.275.d: ""
 curtiss.275.f: "Доселе недружелюбный кузнец удивлён, увидев целый слиток железа бесплатно. Он смотрит на товар, затем на [SCOPE.sCharacter('curtiss_shangrila_leader').GetFullName], затем потирает руки. Он даёт понять, что в столице сейчас нехватка металлических изделий, и показывает путешественнику некоторые из своих изысканных традиционных тибетских оружий. Следуют обычные заверения, что нигде нет лучшего кузнеца, который мог бы предложить такое качество. Тот факт, что он к тому же единственный, умалчивается. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] пользуется случаем, чтобы перейти к делу. Но какое оружие должен изготовить кузнец?"
 curtiss.275.g: "Дпа'дам."
 curtiss.275.h: "Ке-три."
 curtiss.275.i: "Цеп-ца."
 curtiss.275.j: "Кора."
 curtiss.276.t: "Новое оружие"
 curtiss.276.d: ""
 curtiss.276.f: "Проходят дни, прежде чем лезвие новоиспечённого оружия предстаёт в свете лампы. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] смотрит на него. После того как работа сделана, кузнец требует плату и отмечает, что такого прекрасного экземпляра [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она', 'он')] не найдёт ни в одной другой долине."
 curtiss.276.g: "Это научит других уважению!"
 curtiss.277.t: "Кора"
 curtiss.277.d: ""
 curtiss.277.f: "Заказ удивил кузнеца. Непальское оружие? Сначала его честь казалась оскорблённой. Но [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] настоял[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] на этой поставке. Что ж: это было его железо и его деньги. И даже если кузнец, который молчал целыми днями за работой и отвечал на вопросы лишь ворчанием или пренебрежительными или утвердительными звуками, конечный продукт был не менее убедительным. Меч-кора был неотличим от традиционного оружия, которое можно найти в Катманду."
 curtiss.278.t: "Нищий"
 curtiss.278.d: ""
 curtiss.278.f: "Холодный гималайский воздух дует по улицам. Жители попрятались по домам. Со стен свисают грязные флаги и старые ковры. На обочине лежит снег по щиколотку. В тени дрожит нищий, протягивая деревянную чашу, в которой лежит пол медной монеты."
 curtiss.278.g: "Пройти мимо."
 curtiss.278.h: "Подать милостыню."
 curtiss.278.i: "Дать шерсть."
 curtiss.279.t: "Тайна монаха"
 curtiss.279.d: ""
 curtiss.279.f: "Нищий с энтузиазмом принимает шерсть. Он накидывает её на плечи, на грудь, на пояс, затем потирает руки. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] хочет идти дальше. Но мужчина останавливает [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')].\n«Ты поделился со мной. Теперь я хочу поделиться с тобой».\n[SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] отвечает, что не думает, что у нищего может быть что-то, чем он мог бы поделиться. И нищий соглашается: нет, у него действительно ничего нет. Но он знает кого-то, кто может [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ей', 'ему')] что-то дать. Одинокого монаха в горах Нгари. Святого человека. Он даёт то, что нужно людям, не зная, чего они хотят. Он живёт в дикой местности, и всякий, кто ищет его, заблудится, если не знает пути; но тот, кто найдёт его, получит богатую награду. Если он сочтёт его достойным.\n«И как мне поступить достойно?» — спрашивает [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName].\nНищий потирает шерсть.\n«Ты это уже сделал[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')]»."
 curtiss.279.g: "Скоро он станет не таким уж и тайным монахом."
 curtiss.280.t: "Таверна"
 curtiss.280.d: ""
 curtiss.280.f: "Огромное чучело ворона с распростёртыми крыльями висит за длинной стойкой в шумном, переполненном салуне. В поздний час здесь собралась пёстрая публика: тибетские местные жители, свирепые горные проводники-шерпы, сомнительные международные контрабандисты и беглецы, и, конечно же, альпинисты со всех уголков земли. Высокий непалец работает барменом. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] даёт понять, что ищет информацию. Информацию о затерянной долине в горах. Бармен направляет [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')] к шерпе. Тот знает все перевалы и долины в регионе. Течёт алкоголь. Но шерпа не знает долины, подходящей под описание. Тогда [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] упоминает Шангри-Ла. Шерпа навостряет уши, но затем снова замолкает. Затем речь заходит о трёх артефактах, которые, как говорят, ведут в скрытую долину. Снова течёт алкоголь. Ещё. И ещё.\n«В святилище в Нгари», — говорит тогда шерпа, — «есть маленький Будда. Его можно вдавить в стену...»"
 curtiss.280.g: "Ценная информация."
 curtiss.281.t: "Нгари"
 curtiss.281.d: ""
 curtiss.281.f: "Поселение. Где-то в непроходимой долине. Гора Кайлас, священная гора с её выдающейся вершиной, возвышается над хребтом. Туда стремятся паломники. Подобно хрустальной пирамиде, выступающей из бесформенных, грубых гор, она затмевает долину с её небольшими поселениями. Найти место для посадки в этой пустынной местности было трудной задачей. Поэтому [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] припарковал[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] самолёт на безопасном расстоянии и [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'должна совершить', 'должен совершить')] длительную прогулку, прежде чем найдёт скопление домов. Здесь есть странствующий торговец, который продаёт железо. Прямо за околицей находится древнее святилище. В остальном — бескрайняя дикая местность."
 curtiss.281.g: "Отправиться в дикую местность."
 curtiss.281.h: "Посетить торговца железом."
 curtiss.281.i: "Посетить святилище."
 curtiss.282.t: "Негостеприимные горы"
 curtiss.282.d: ""
 curtiss.282.f: "Ветер безжалостно хлещет по горам. Словно чудовище, он пожирает всё вокруг. Снег катится по ландшафту. Тёмное небо и снежинки закрывают обзор на несколько метров. Ни домов, ни людей на многие мили. Даже птицы нет. Никаких признаков жизни. Ничего не остаётся от альпинистской романтики в разгар борьбы со стихией; здесь нет ни единого признака жизни. Ноги [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] становятся тяжёлыми. Не только потому, что [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она', 'он')] идёт уже несколько дней. Но и потому, что снег с каждым шагом растёт и поднимается всё выше до колен. [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'Она', 'Он')] идёт вслепую уже несколько часов."
 curtiss.282.g: "Идти дальше."
 curtiss.282.h: "Искать монаха."
 curtiss.282.j: "Вернуться."
 curtiss.283.t: "Затерянн[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ая', 'ый')] в дикой местности"
 curtiss.283.d: ""
 curtiss.283.f: "Лёд, осыпи и снег, насколько хватает глаз. Одинокий шерпа идёт через перевал с поклажей и вьючным животным. Снежные заносы последних дней улеглись. Вокруг тишина. Небо чистое. На склоне развевается обрывок одежды. Шерпа видит его, подходит — и быстро реагирует. Он находит сильно переохлаждённое и потерявшее сознание тело [SCOPE.sCharacter('curtiss_shangrila_leader').GetFullName]. Признаки жизни слабые — но [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она', 'он')] жив[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')]."
 curtiss.283.g: "Едва избежал[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] смерти..."
 curtiss.284.t: "Достоин или нет?"
 curtiss.284.d: ""
 curtiss.284.f: "В метели появляется силуэт. Прямо перед тем моментом, когда [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] готов[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] сдаться и рухнуть на землю, чтобы отдаться на волю стихии, [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ей', 'ему')] являются красные и оранжевые одеяния монаха, идущего сквозь снежный вихрь; снежный вихрь, который с одного момента на другой теряет силу, рёв и ужас, пока не остаётся лишь лёгкий ветерок. Остаются только [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] и монах. Но [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] не может ничего сказать, поэтому монах поднимает руку.\n«Как ты думаешь, почему именно тебе должен быть открыт путь к месту, которого ты желаешь? Как ты думаешь, какой человек был бы достоин войти в это место?»\nНикакого вступления. Никакого приветствия. Никакого вопроса, кто [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она', 'он')] и чего хочет. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] скептически настроен[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')]; человек не может знать, кто [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она', 'он')] и чего хочет. Пока до [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'неё', 'него')] не доходит, что у монаха, должно быть, была подсказка — знал ли он, что только нищий из Лхасы мог послать [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')]?"
 curtiss.284.g: "Кающийся."
 curtiss.284.h: "Верующий."
 curtiss.284.i: "Смиренный."
 curtiss.284.j: "Храбрый."
 curtiss.285.d: ""
 curtiss.285.f: "«Тот, кто ищет место, должен также знать, что его там ждёт. Намерение, с которым ищут это место, не то же самое, что там находят. Что характеризует место, которое ты ищешь?»"
 curtiss.285.g: "Мир и долгая жизнь."
 curtiss.285.h: "Общность и радость."
 curtiss.285.i: "Мудрость и истина."
 curtiss.285.j: "Просветление и исцеление."
 curtiss.286.d: ""
 curtiss.286.f: "«У места, которое ты ищешь, много имён. Так же, как дают много имён той единственной силе, что держит вселенную. Люди дают имена; но это не значит, что они делают эти вещи. Скорее, у них есть интуиция, что они существуют. И даже если они имеют в виду одно и то же, это не обязательно означает, что это одно и то же. Если ты хочешь иметь власть над чем-то, ты можешь контролировать это, только если знаешь правильное, истинное имя. Так как же называется место, которое ты ищешь?»"
 curtiss.286.g: "Место, известное как Шангри-Ла."
 curtiss.286.h: "Гора Потерянного Горизонта."
 curtiss.286.i: "Царство Шамбала."
 curtiss.286.j: "Долина Голубой Луны."
 curtiss.287.t: "Талисман"
 curtiss.287.d: ""
 curtiss.287.f: "«Я вижу, ты приш[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ла', 'ёл')] подготовленн[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ой', 'ым')]. Ты не перв[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ая', 'ый')], кто ищет долину. Мужчины и женщины со всех уголков мира искали её. Я не могу показать тебе путь; но я могу его упростить. Тому, кто ищет Долину Голубой Луны, нужно нечто гораздо большее, чем его собственная сила».\nМонах кладёт что-то в руки [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName]. Это талисман.\n«Пятый Далай-лама завоевал эту территорию. Говорят, этот защитный талисман принадлежал ему. Ты доказал[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')], что достоин[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] носить его».\nУ [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] было ещё много вопросов. [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'Она хотела', 'Он хотел')] знать, что монах знает о Шангри-Ла; и у [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'неё', 'него')] была мысль, что вещь, которую он [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ей', 'ему')] вручает, — это больше, чем просто предмет, основанный на суевериях местных жителей. Но монах считает свою задачу выполненной. Он уходит в поднимающемся снежном вихре. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] остаётся в недоумении. Этот предмет — не артефакт Шангри-Ла. Неужели [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она пришла', 'он пришёл')] напрасно? Был[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] ли [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она', 'он')] введён[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] в заблуждение?"
 curtiss.287.g: "Талисман? Но как он поможет...?"
 curtiss.288.t: "Торговец железом"
 curtiss.288.d: ""
 curtiss.288.f: "Лохматые яки фыркают в лёгком снежном вихре. Странствующий торговец поправляет перчатки. Он, очевидно, в пути. Маленькие слитки железа сложены под полузащищённой конструкцией из дерева и ткани, напоминающей разорванную палатку. Увидев [SCOPE.sCharacter('curtiss_shangrila_leader').GetFullName], он приветствует жестом."
 curtiss.288.g: "Купить железо."
 curtiss.289.t: "Святилище"
 curtiss.289.d: ""
 curtiss.289.f: "Одинокое святилище стоит за пределами поселения. Это самое заметное творение рук человеческих на многие мили вокруг. Помимо нескольких ярких цветов, молитвенных барабанов, развевающихся свитков и фигуры Будды, [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] видит в первую очередь надпись. Удивительно, но она написана латинским алфавитом — и на европейском языке. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] мог[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ла', '')] бы поклясться, что это буддийское святилище, но затем снова понимает, что такие святилища крайне необычны для Тибета. Местные жители предпочитают холмообразные чортены. И всё же надпись выглядит старой, по меньшей мере, многовековой. Язык, как может определить [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName], — французский. [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'Она не знает', 'Он не знает')], откуда взялась эта табличка; [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она', 'он')] также не знает, почему она здесь; но [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она', 'он')] использует свои ржавые знания языка, чтобы расшифровать написанное. Отдельные буквы уже выветрились.\n«Только ищущий истину будет достоин. Только щедрый будет достоин. Только верующий будет достоин. Он проживёт жизнь, богатую многими годами, и найдёт мир среди мудрых и просветлённых. Но те, кем движет жадность, будут поглощены землёй»."
 curtiss.289.g: "Нажать на фигурку Будды."
 curtiss.290.t: "Тайна святилища"
 curtiss.290.d: ""
 curtiss.290.f: "Фигурка Будды уходит в стену святилища. Гремит механизм. Открывается тайное отделение, в котором видна богато украшенная шкатулка. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] наклоняется к сокровищу. У [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'неё', 'него')] есть догадка, что это может быть, — и [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она', 'он')] быстро открывает замок."
 curtiss.290.g: "Артефакт Шангри-Ла!"
 curtiss.291.t: "Дорога в Шангри-Ла"
 curtiss.291.d: ""
 curtiss.291.f: "После нескольких дней оценки известный археолог [SCOPE.sCharacter('curtiss_shangrila_archaeologist').GetFullName] завершил свои исследования. Как он рассказал факультету во впечатляющей лекции, это своего рода код, который можно расшифровать, только правильно интерпретировав три артефакта. Конечно, только благодаря его выдающемуся интеллекту он нашёл решение за несколько дней. Описание в основном примитивно и основано на нескольких горах, перевалах и реках, но с помощью самой современной картографии можно также вывести простые координаты. Теперь ничто не мешает исследованию легендарной долины.\nОднако после многословной презентации археолога и представители правительства, и [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] приходят к выводу, что будет лучше, если он не пойдёт с ними."
 curtiss.291.g: "Как можно меньше людей должны знать об этом."
 curtiss.292.t: "Турбулентность"
 curtiss.292.d: ""
 curtiss.292.f: "Меньше ста миль. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] забыл[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] точное расстояние. Час [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она', 'он')] пробивался сквозь непроницаемую стену облаков. Машина набирала высоту, но конца облачного покрова не было видно. Если [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она', 'он')] летел[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] ниже, то занавес поднимался; и в то же время [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она', 'он')] опасно приближался к горным хребтам и снежным вершинам. [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'Она', 'Он')] не мог[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ла', '')] видеть долину. Несмотря на то, что это было рискованно, [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ей', 'ему')] пришлось снизить высоту. Иначе [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она', 'он')] пропустил[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] бы цель. [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'Она', 'Он')] подумывал[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] о том, чтобы найти место для ночлега и снова полететь к этим координатам на следующее утро; но что-то подсказывало [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ей', 'ему')], что такие места, как эта долина, всегда окружены таинственным туманом, который скрывает их от глаз. Неважно, будет ли [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она', 'он')] искать здесь сегодня, завтра или через месяц: облачный покров и туман будут [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ей', 'ему')] противостоять. Но когда [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] двигает штурвал, вся машина трясётся, двигатель воет — самолёт попал в турбулентность! Горные ветры играют с вращающейся машиной в воздухе, как с игрушкой, пилот отчаянно пытается укротить приборы..."
 curtiss.292.g: "Что происходит?!"
 curtiss.293.t: "Аварийная посадка"
 curtiss.293.d: ""
 curtiss.293.f: "Сломанное металлическое крыло блестит на гималайской скале. Осколки разбросаны между травой и землёй. Сломанный пропеллер застрял в кустах. Просека проходит через цветочные поля, в конце которой дымится фюзеляж самолёта, а двигатель издаёт последний вздыхающий звук. Дверь самолёта распахивается — и отрывается, с грохотом падая на землю. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] шатаясь выбирается из машины, хватается за металлический корпус. Впечатления ошеломляют [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')]. Аварийная посадка — лишь одна деталь. Туман, облака, снег, холод — всё это прошло. [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'Она', 'Он')] видит снег только на горных вершинах, ниже которых раскинулись леса, реки и водопады. В голубом небе светит солнце. Из близлежащих горячих источников поднимается пар. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] снимает пилотскую куртку. Здесь не только приятно умеренно, но и тепло. В воздухе витает нотка чая и мёда. [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'Она', 'Он')] смотрит на склоны, усаженные персиковыми деревьями. На холме возвышается пагода, в полдень бьёт гонг. Вдалеке виднеется силуэт города, над которым возвышается нечто, похожее на монастырь. [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'Она', 'Он')] замечает, что у города нет стен; и монастырь, что весьма необычно для Тибета, не имеет укреплений. Колосья пшеничных полей обрамляют местность, колышась на ветру. В другом месте рисоводы бродят по своим болотистым полям. Издалека из ярко украшенных окон доносится музыка."
 curtiss.293.g: "Это... долина?"
 curtiss.294.t: "Долина Голубой Луны"
 curtiss.294.d: ""
 curtiss.294.f: "[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'Она', 'Он')] бродил[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] мимо стен и ларьков. Лёгкая атмосфера и непринуждённость присущи этому месту так, как [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] никогда раньше не испытывал[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')]. Хотя [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она была незнакомкой', 'он был незнакомцем')], люди на улицах приветствовали [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')], как будто [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она', 'он')] был[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] просто кем-то, кого они давно не видели. Хозяин таверны приглашает [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')] в своё заведение; девушка с апельсинами бесплатно предлагает [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ей', 'ему')] фрукт. Что также поражает [SCOPE.sCharacter('curtiss_shangrila_leader').GetFullName], так это странно европейский стиль города. [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'Она ожидала', 'Он ожидал')] увидеть буддийские храмы. Вместо этого [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')] ждут церкви во французском стиле. [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'Она', 'Он')] не видит ни возраста, ни боли в чертах лиц, а лишь дружелюбное спокойствие. И [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она уверена', 'он уверен')], что среди смешения народов есть несколько [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')] соотечественников, если только заговорить с ними. Шангри-Ла — не тибетский город. Это универсальное место.\n«Так ты наконец-то прибыл[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')]...»\nИ тут [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ей', 'ему')] приходит в голову мысль, что [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она искала', 'он искал')] не [SCOPE.sCharacter('curtiss_conway_scope').GetFullName]; а скорее это [SCOPE.sCharacter('curtiss_conway_scope').GetFullName] искал [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')], представ перед человеком с #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ими#! чертами, хотя и в обличье приора-капуцина."
 curtiss.294.g: "[SCOPE.sCharacter('curtiss_conway_scope').GetFullName] — хозяин этого места?"
 curtiss.295.t: "[SCOPE.sCharacter('curtiss_conway_scope').GetFullName]"
 curtiss.295.d: ""
 curtiss.295.f: "Предположения о [SCOPE.sCharacter('curtiss_conway_scope').GetFullName] подтверждаются. Весь поиск Шангри-Ла был испытанием. [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'Она была не первой', 'Он был не первым')], кто прошёл через поиски трёх артефактов, которые впоследствии были возвращены на свои места. Тому, кто последним достиг Шангри-Ла, выпадала честь снова спрятать их, тем самым заманивая в долину следующего человека, достойного её тайн. И [SCOPE.sCharacter('curtiss_conway_scope').GetFullName] не собирался спасаться: после смерти последнего правителя он правил сам; правление, которое не было результатом власти, а признания и достижений. Дворец, доминировавший над Шангри-Ла, был не просто удобной резиденцией: в нём хранились все когда-либо написанные священные писания, сокровища искусства со всего мира и спортивные площадки, такие как теннисный корт, бассейн и даже поле для гольфа. [SCOPE.sCharacter('curtiss_conway_scope').GetFullName] не скрывал, что хочет принять [SCOPE.sCharacter('curtiss_shangrila_leader').GetFullName] как члена семьи. [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'Её', 'Его')] обучат всему; излечат от всех болезней; и [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'она', 'он')] будет наслаждаться долгой жизнью. При условии, что останется в долине."
 curtiss.295.g: "Может быть... нужно было спасать [SCOPE.sCharacter('curtiss_shangrila_leader').GetFullName]..."
 curtiss.296.t: "Решение"
 curtiss.296.d: ""
 curtiss.296.f: "«Мы не чудотворцы; мы не одержали победы над смертью или даже над упадком. Всё, что мы сделали и иногда можем сделать, — это замедлить темп этого короткого промежутка, который называется жизнью. Мы делаем это методами, которые здесь так же просты, как и невозможны в других местах; но не заблуждайтесь; конец ждёт нас всех. У вас будет время читать — вы больше никогда не будете бегло просматривать страницы, чтобы сэкономить минуты, или избегать какого-либо исследования, чтобы оно не оказалось слишком увлекательным. У вас также есть вкус к музыке — вот ваши ноты и инструменты, со Временем, невозмутимым и неизмеримым, чтобы дать вам их богатейший вкус. У нас есть мечта и видение. Это видение, которое впервые явилось старому Перро, когда он умирал в этой комнате в 1789 году. Он оглянулся тогда на свою долгую жизнь, как я вам уже говорил, и ему показалось, что всё самое прекрасное преходяще и тленно, и что война, похоть и жестокость могут однажды сокрушить их, пока в мире не останется ничего. Он помнил зрелища, которые видел собственными глазами, и своим умом представлял другие; он видел, как нации укрепляются не в мудрости, а в пошлых страстях и воле к разрушению; он видел, как их машинная мощь умножается, пока один вооружённый человек не сможет сравниться с целой армией Великого Монарха. Он предвидел время, когда люди, ликуя от техники убийства, будут так яростно бушевать по всему миру, что каждая драгоценная вещь окажется в опасности, каждая книга, картина и гармония, каждое сокровище, собранное за два тысячелетия, — всё малое, хрупкое, беззащитное — всё будет потеряно. И вот почему, сын мой, я здесь, и почему ТЫ здесь, и почему мы можем молиться о том, чтобы пережить эту участь»."
 curtiss.296.g: "Это место должно оставаться в тайне. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] будет учиться."
 curtiss.296.h: "Это место должно быть защищено. [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] останется."
 curtiss.296.i: "Это место будет нашим. Во имя [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
 curtiss.298.t: "Плохая карма"
 curtiss.298.d: ""
 curtiss.298.f: "После того как [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] показал[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] нашим людям путь в долину Голубой Луны, и они разграбили драгоценные сокровища Шангри-Ла, экспедиция наконец-то вернулась. Но [SCOPE.sCharacter('curtiss_shangrila_leader').GetLastName] пропал[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] при загадочных обстоятельствах. Оставшиеся члены экспедиции не могут с уверенностью сказать, что с [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'ней', 'ним')] стало. [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'Она', 'Он')] покинул[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] группу во время привала — и упал[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] со склона, где [SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'её', 'его')] следы затерялись в глубоком ущелье. Наш музей теперь богаче на много сокровищ, но потерял многообещающего патриота, который рисковал своей честностью ради археологического богатства нашей нации."
 curtiss.298.g: "Поглощён[SelectLocalization(SCOPE.sCharacter('curtiss_shangrila_leader').IsFemale, 'а', '')] землёй..."
 curtiss.311.t: "Новый пилот"
 curtiss.311.f: "«Я всаживаю пули в цель так, словно кладу их туда рукой». — Рене Фонк"
 curtiss.311.g: "Это будет начало уникальной карьеры."
 curtiss.311.h: "Он нужен нам для внутренней пропаганды."
 curtiss.312.t: "Лётчик-ас"
 curtiss.312.d: "Наш пилот [SCOPE.sCharacter('curtiss_ace').GetFullName] неоднократно демонстрировал своё мастерство в текущей войне, сбив значительное число врагов. Его товарищи видят в нём восходящего лётчика-аса."
 curtiss.312.f: "«Не каждому дано сохранить полное присутствие духа в последний момент, спокойно прицелиться через мушку и целик и дать голове сесть». — Манфред фон Рихтгофен"
 curtiss.312.g: "Новый национальный герой!"
 curtiss.500.t: "Мечта [SCOPE.sCharacter('howard_hughes').GetFullName]"
 curtiss.500.d: "Глава «[ROOT.GetCountry.GetAdjective] Airlines» объявил о своём дальновидном и эксцентричном плане построить самый большой самолёт в мире. Не хватает лишь незначительного участия со стороны правительства."
 curtiss.500.f: "Это была необычная пресс-конференция, которую [SCOPE.sCharacter('howard_hughes').GetFullName] провёл прошлой ночью в своей штаб-квартире в [ROOT.GetCountry.GetCapital.GetCityHubName]. Уже некоторое время журналисты сомневаются в его психическом здоровье. Говорят, что [SCOPE.sCharacter('howard_hughes').GetLastName] страдает от навязчивых состояний и психозов. Однако апологеты утверждали, что, несмотря на всё, он успешно вёл свой бизнес. Но даже последние замолчали, когда услышали, что хотел сказать магнат: он хотел построить самый большой в мире самолёт, достаточно большой, чтобы перевозить до тысячи человек через Атлантику. Он вложит всё своё состояние в строительство этого монстра воздуха. Он также надеется на небольшой вклад со стороны правительства, так как это должно быть в интересах авиации и расширения инфраструктуры, а также престижа, если его видение станет реальностью. Он говорил о небольшой шестизначной сумме. Строящийся самолёт будет носить имя столицы нашей страны: [ROOT.GetCountry.GetCapital.GetCityHubName]."
 curtiss.500.g: "Великое видение! [ROOT.GetCountry.GetCapital.GetCityHubName] станет реальностью."
 curtiss.500.h: "Это безумие."
 curtiss.501.t: "Тип самолёта"
 curtiss.501.d: "Конструкторы самолёта «[ROOT.GetCountry.GetCapital.GetCityHubName]» ещё не решили, будет ли это классический самолёт или летающая лодка."
 curtiss.501.f: "Гидросамолёты были не просто модой. Они имели значительные преимущества перед обычными самолётами с 1910-х по 1940-е годы. Им не нужны были взлётно-посадочные полосы, и они могли садиться на любую водную поверхность. Это относилось к морю, но также и к большим озёрам. В то время как аэропорты находились за пределами городов, гидросамолёты потенциально могли использовать старые морские порты. Страны с длинными побережьями, такие как Италия, поэтому считали гидросамолёты и летающие лодки явно более полезными; даже у материкового города, такого как Милан, был гидроаэропорт с искусственным озером недалеко от Линате. Таким образом, гидросамолёты также предлагали преимущества для атлантических государств — Великобритании и США."
 curtiss.501.g: "Это будет классический самолёт."
 curtiss.501.h: "Это будет летающая лодка."
 curtiss.502.t: "Строительные материалы"
 curtiss.502.d: "При планировании «[ROOT.GetCountry.GetCapital.GetCityHubName]» всё ещё существуют разногласия по поводу того, какой материал следует использовать."
 curtiss.502.f: "Когда авиация была в зачаточном состоянии, в авиастроении преобладали дерево и ткань. Преимущество лёгкости этих материалов было известно уже в Первую мировую войну, но в то же время они столкнулись со своими недостатками. Они были почти не устойчивы к погодным условиям и быстро приходили в негодность. Поэтому в последующие годы преобладала частично металлическая, а затем и цельнометаллическая конструкция. Металл во многих случаях был тяжелее дерева, когда не было алюминия. Однако его прочность делала его более предпочтительным материалом, даже когда возникали новые проблемы, такие как коррозия или усталость металла."
 curtiss.502.g: "Использовать металл только при необходимости. Этот самолёт будет в основном из дерева."
 curtiss.502.h: "Облицевать всё металлом."
 curtiss.503.t: "Проблемы с двигателем"
 curtiss.503.d: "Работа над «[ROOT.GetCountry.GetCapital.GetCityHubName]» продвигалась. Самолёт медленно обретает форму. Вопрос с двигателями ещё окончательно не решён: есть два варианта."
 curtiss.503.f: "Во время Второй мировой войны и до середины 1950-х годов производились поршневые авиационные двигатели со взлётной мощностью более 3680 кВт (5000 л.с.) и рабочим объёмом более 70 литров для оснащения истребителей, бомбардировщиков и больших пассажирских самолётов. Например, выдающимися были двигатели Wright R-3350 и Pratt & Whitney R-4360. Они до сих пор считаются вершиной авиационной двигателестроительной механики до триумфа реактивного самолёта. Wright R-3350 — 18-цилиндровый двигатель, а Pratt & Whitney R-4360 — 28-цилиндровый."
 curtiss.503.g: "Десять 18-цилиндровых двигателей — идеальный вариант."
 curtiss.503.h: "Нам нужны восемь 28-цилиндровых двигателей."
 curtiss.504.t: "Пропеллеры"
 curtiss.504.d: "Разработка «[ROOT.GetCountry.GetCapital.GetCityHubName]» идёт чрезвычайно хорошо. По словам [SCOPE.sCharacter('howard_hughes').GetLastName], предполагаемое время строительства будет соблюдено. Даже если не все вопросы решены. Недавно возник пересмотр вопроса о том, сколько лопастей должны иметь пропеллеры."
 curtiss.504.f: "В принципе, однолопастный пропеллер является наиболее эффективным, поскольку набегающий поток вращающейся лопасти пропеллера наименее нарушается турбулентностью от ведущей лопасти. Однако он требует противовеса, асимметрично нагружает приводной вал и относительно сильно вибрирует, поэтому такая конструкция используется редко. Большее количество лопастей положительно влияет на вибрационное поведение, особенно если отдельные лопасти подвергаются разным потокам по кругу пропеллера. На самолётах с поршневыми двигателями наиболее распространены двухлопастные пропеллеры. Турбовинтовые и винтовентиляторные двигатели больших самолётов, напротив, имеют от 3 до 7 и даже больше лопастей."
 curtiss.504.g: "4-лопастные пропеллеры подойдут."
 curtiss.504.h: "Нам понадобятся 5-лопастные пропеллеры."
 curtiss.505.t: "Величайший день в истории"
 curtiss.505.d: "Самолёт «[ROOT.GetCountry.GetCapital.GetCityHubName]» готовится к своему первому полёту. С этим связано много неизвестных. [SCOPE.sCharacter('howard_hughes').GetFullName] настаивает на том, чтобы лично пилотировать самолёт и пригласить на полёт представителей бизнеса, политики и прессы. Другие голоса более осторожны, настаивая на допуске только избранных представителей или полном исключении публики — на случай, если что-то пойдёт не так во время первого полёта..."
 curtiss.505.f: "«„Геркулес“ был монументальным предприятием. Это самый большой самолёт, когда-либо построенный. Его высота — более пяти этажей, а размах крыльев — больше футбольного поля. Это больше, чем городской квартал. Я вложил в эту вещь пот всей своей жизни. Вся моя репутация связана с ним, и я несколько раз заявлял, что если это будет провал, я, вероятно, покину эту страну и никогда не вернусь. И я серьёзно». — Говард Хьюз"
 curtiss.505.g: "Пригласить представителей прессы, бизнеса и политики. Г-н [SCOPE.sCharacter('howard_hughes').GetLastName] будет пилотировать самолёт сам."
 curtiss.505.h: "Мы приглашаем прессу. Самолёт будет пилотировать известный лётчик."
 curtiss.505.i: "Этот полёт должен пройти в секрете. Его должен испытать анонимный пилот."
 curtiss.506.t: "«400 000 фунтов в воздухе»"
 curtiss.506.d: "Свершилось техническое чудо: «[ROOT.GetCountry.GetCapital.GetCityHubName]» может летать, несмотря на свои гигантские размеры!"
 curtiss.506.f_hughes: "Это был его день. День его жизни. Его успех. Его видение. [SCOPE.sCharacter('howard_hughes').GetFullName] поставил всё на одну карту. Победить здесь и сейчас — или проиграть и пасть. Он не признавал полумер. Он пригласил всю прессу, руководителей крупнейших компаний и даже депутатов и министров. Они не будут сидеть на трибуне. Они полетят с ним. И весь мир будет насмехаться над ним и тащить его предприятие в пропасть — или он восторжествует, как древний Цезарь.\n[SCOPE.sCharacter('howard_hughes').GetLastName] был за штурвалом. Запустил двигатели. Дал «[ROOT.GetCountry.GetCapital.GetCityHubName]» команду. Колосс загрохотал. Поднял волны. Титан мчался по воде час за часом, и пенистая плёнка не давала понять, находится ли «[ROOT.GetCountry.GetCapital.GetCityHubName]» всё ещё на поверхности воды или уже в воздухе. Затем: только громкий шум двигателя. Больше никаких водных волн. «[ROOT.GetCountry.GetCapital.GetCityHubName]» поднялся в воздух. Журналисты сделали то, что делали редко. Они молчали. Политики с трудом сохраняли самообладание. У предпринимателей закачались глаза. [SCOPE.sCharacter('howard_hughes').GetLastName], напротив, улыбался. Затем, когда присутствующие осознали немыслимое, один репортёр спросил: «[SCOPE.sCharacter('howard_hughes').GetFirstName], вы ожидали этого?» Ответ [SCOPE.sCharacter('howard_hughes').GetLastName] был загадочным:\n«Я люблю делать сюрпризы»."
 curtiss.506.f_pilot: "Исторический день для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. «[ROOT.GetCountry.GetCapital.GetCityHubName]» с имперским достоинством поднялся в воздух и показал, на что способны человеческая изобретательность и прогресс. [SCOPE.sCharacter('howard_hughes').GetFullName] уже жалеет, что сам не был за штурвалом. Приглашённые журналисты сами были удивлены, что колосс взлетел с воды, — и своими репортажами они обеспечили появление первых покупателей."
 curtiss.506.f_test: "Что за зрелище! Что за чудо! Жаль, что эта идея была доступна лишь немногим. Полёт «[ROOT.GetCountry.GetCapital.GetCityHubName]» мог бы стать рекламным мероприятием для многочисленных клиентов. Но важна только производительность. Хотя модели потребуется время, чтобы утвердиться на рынке, [SCOPE.sCharacter('howard_hughes').GetFullName] имеет репутацию человека, который всегда прав. И [ROOT.GetCountry.GetNameNoFlag] официально является страной, которая когда-либо строила самый большой самолёт — рекорд, который не будет побит годами."
 curtiss.506.g: "Это удивительно... в очень положительном смысле!"
 curtiss.507.t: "Как скала"
 curtiss.507.d: "Худшие опасения подтвердились. «[ROOT.GetCountry.GetCapital.GetCityHubName]» так же лёгок на подъём, как скала. Не хватает только катапульты, чтобы хотя бы подбросить его в воздух."
 curtiss.507.f_hughes: "«[ROOT.GetCountry.GetCapital.GetCityHubName]» грохотал. Его двигатели ревели. Напряжение на лице [SCOPE.sCharacter('howard_hughes').GetLastName] росло. 75 миль. 85 миль. 95 миль — но монстр не взлетал. Колосс прилип к земле. Через несколько минут показа первый язвительный комментарий от журналиста. За ним последовали голоса критиков, которые всё знали заранее. Политики выдвигали обвинения. Представители крупных корпораций также поставили под сомнение предыдущие договорённости. Авиамагнат в последний раз попытался поднять своё творение в воздух — тщетно. Это был самый несчастный день в его карьере. В конце концов [SCOPE.sCharacter('howard_hughes').GetLastName] прекратил попытку. На вопрос, что это поражение означает для его компании, он просто ответил, что больше не является председателем «[ROOT.GetCountry.GetAdjective] Airlines».\n Днём позже [SCOPE.sCharacter('howard_hughes').GetLastName] отменил все свои обязательства и навсегда покинул [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]."
 curtiss.507.f_pilot: "Есть дни, которые хочется забыть — или заставить забыть, желая сделать следующий день ещё более незабываемым. Всего через день после разочарования от того, что «[ROOT.GetCountry.GetCapital.GetCityHubName]» не взлетел, [SCOPE.sCharacter('howard_hughes').GetFullName] объявил о своей отставке в широко разрекламированном заявлении. Он уйдёт не только из своей авиакомпании, но и со всех занимаемых им постов. Акции в свободном падении, заказы отменены, доверия просто нет. Расходы на «[ROOT.GetCountry.GetCapital.GetCityHubName]» были настолько гигантскими, что компания находится на грани банкротства и переживает худший кризис в своей истории. Тем временем [SCOPE.sCharacter('howard_hughes').GetLastName] объявил, что покидает [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]. Его пункт назначения неизвестен. Он исчез на частном самолёте."
 curtiss.507.f_test: "Это было мудрое решение — испытать «[ROOT.GetCountry.GetCapital.GetCityHubName]» за закрытыми дверями. К счастью, опасавшаяся авария, которая могла бы наделать шума, не произошла. Но то же самое относится и к любому сообщению об успехе. Даже после нескольких попыток «[ROOT.GetCountry.GetCapital.GetCityHubName]» не удалось уговорить подняться в воздух. Неудача связана с конструктивными недостатками. Для [SCOPE.sCharacter('howard_hughes').GetLastName] это личный провал. Он не опозорился на публике. Однако через несколько месяцев люди зададутся вопросом, что стало с проектом «[ROOT.GetCountry.GetCapital.GetCityHubName]», и сделают свои выводы. Правда никогда полностью не выйдет на свет, и правительство также позаботится о том, чтобы растрата денег налогоплательщиков не превратилась в скандал, выгодный оппозиции. Это помощь, которой [SCOPE.sCharacter('howard_hughes').GetLastName] на самом деле не хочет. Он внезапно стал очень молчаливым человеком. Молчаливым человеком, который ушёл на покой."
 curtiss.507.g: "Это, вероятно, была вторая по величине растрата денег налогоплательщиков в истории."
 curtiss.508.t: "Кошмар"
 curtiss.508.d: "[SCOPE.sCharacter('howard_hughes').GetFullName] — новый Икар. Его творение подожгло мир. Разрушительная авиакатастрофа унесла жизни десятков людей и оставила после себя пустыню из обломков. Множественные конструктивные ошибки сложились в катастрофу."
 curtiss.508.f_hughes: "Когда [SCOPE.sCharacter('howard_hughes').GetLastName] запустил двигатели, его инстинкты подсказали ему, что что-то не так. Но планы были верны. Расчёты были верны. Ошибки быть не могло. На самом деле, «[ROOT.GetCountry.GetCapital.GetCityHubName]» шёл лучше, чем ожидалось. [SCOPE.sCharacter('howard_hughes').GetLastName] верил, что достиг своей цели. Так и должно было быть. Он отбросил все сомнения. Он поженил гигантский самолёт с небом — и был единственным, кто заметил ту самую цифру после запятой, в то время как журналисты и представители бизнеса праздновали и аплодировали на заднем плане. Но его инстинкт его не обманул. Остальной команде потребовалось несколько мгновений, прежде чем аплодисменты сменились криками ужаса. Остальное было шумом и огнём. «[ROOT.GetCountry.GetCapital.GetCityHubName]» врезался в крыши, разносил стены, обливал ряды домов маслом и, с грохотом падающего титана, опустошил горящий квартал. [ROOT.GetCountry.GetCapital.GetCityHubName] стал Адом для [SCOPE.sCharacter('howard_hughes').GetLastName]. Он увлёк на смерть невинных третьих лиц, случайно оказавшихся на его пути, а также своих ближайших доверенных лиц. Помимо обломков и трупов, [SCOPE.sCharacter('howard_hughes').GetLastName] оставляет после себя обанкротившуюся компанию и авиационную промышленность, которая будет разрушена на долгие годы. [ROOT.GetCountry.GetNameNoFlag], вероятно, никогда полностью не оправится от того дня."
 curtiss.508.f_pilot: "[SCOPE.sCharacter('howard_hughes').GetLastName] выжил в тот день, потому что не был за штурвалом самолёта. Но иногда лучше быть мёртвым, чем живым. На вопрос, рад ли он, что не летел, как планировалось, он ответил «нет». Потому что [SCOPE.sCharacter('howard_hughes').GetLastName] был ответственен не только за одну из величайших авиационных катастроф в истории. Это одна из величайших катастроф в истории [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. На его плечах лежала вина за десятки смертей и полосу разрушений. С «[ROOT.GetCountry.GetCapital.GetCityHubName]» было уничтожено не только дело всей его жизни. Всё было уничтожено. За те минуты, что гигантский самолёт вышел из-под контроля и, подобно комете, рухнул на жилой квартал, его компания понесла убытки, которые вряд ли можно было вынести. Его мечта была разрушена. Его компания была разрушена. Его репутация была разрушена. [SCOPE.sCharacter('howard_hughes').GetLastName] хотел уйти в изгнание, если потерпит неудачу. Но после этого события многие требуют его головы, а не просто изгнания. С концом [SCOPE.sCharacter('howard_hughes').GetLastName] заканчивается глава в истории авиации; та, в которой [ROOT.GetCountry.GetNameNoFlag] когда-то был[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')] лидером."
 curtiss.508.f_test: "Контроль ущерба. Иначе не описать то, что произошло во время первого полёта «[ROOT.GetCountry.GetCapital.GetCityHubName]». К удивлению немногих зрителей, самолёт действительно оторвался от земли — только чтобы чуть позже выйти из-под контроля. Лётчик-испытатель погиб, пытаясь увести титана воздуха от ряда домов. Эта акция была лишь частично успешной и привела к тому, что некоторые здания были сильно повреждены. Было множество раненых, лётчик-испытатель погиб. «[ROOT.GetCountry.GetCapital.GetCityHubName]» безвозвратно уничтожен. Инцидент также обеспечил то, что секретный тест не удалось сохранить в тайне. Общественность знает о провале [SCOPE.sCharacter('howard_hughes').GetLastName]. Магнат объявил о своей отставке и покинул страну. Остаётся проблемная компания, находящаяся на грани банкротства. Однако могло быть и хуже. Это слабое утешение, учитывая потери, но, по крайней мере, эксцентричные увлечения безумного миллиардера больше не потребуют жертв."
 curtiss.508.g: "Авиация ещё не видела более чёрного дня."
 curtiss.510.t: "«[ROOT.GetCountry.GetNameNoFormatting]»"
 curtiss.510.d: "После расширения нашей авиакомпании и необходимых заводов началась работа над гигантским дирижаблем. Государство внесёт свой вклад."
 curtiss.510.f: "«Нужно только захотеть, поверить, и тогда всё получится». — Фердинанд граф фон Цеппелин"
 curtiss.510.g: "Веха в истории техники!"
 curtiss.511.t: "Первый рейс «[ROOT.GetCountry.GetNameNoFormatting]»"
 curtiss.511.d: "После двух лет строительства всё готово: «[ROOT.GetCountry.GetNameNoFormatting]» элегантно поднимается в небо и готов к своему первому полёту. Билеты были распроданы за несколько месяцев. Теперь осталось принять лишь окончательное решение о том, будет ли первый рейс внутренним или международным."
 curtiss.511.f: "Первый успешный полёт жёсткого дирижабля LZ1 Фердинанда фон Цеппелина состоялся в Германии в 1900 году. С 1910 по 1914 год Deutsche Luftschiffahrts-Aktiengesellschaft (DELAG) перевезла тысячи пассажиров на дирижаблях. В 1917 году немецкий LZ 104 (L 59) стал первым дирижаблем, совершившим межконтинентальный перелёт из Ямбола в Болгарии в Хартум и обратно, безостановочное путешествие протяжённостью 6800 километров (4200 миль; 3700 морских миль). Во время и сразу после войны Великобритания и Соединённые Штаты строили дирижабли, а Франция и Италия экспериментировали с конфискованными немецкими. Luftschiffbau Zeppelin доставила LZ 126 ВМС США в качестве военных репараций в октябре 1924 года. Председатель компании доктор Хуго Эккенер командовал доставочным полётом, и корабль был введён в эксплуатацию как USS Los Angeles (ZR-3). В 1925 году союзники ослабили версальские ограничения, что позволило доктору Хуго Эккенеру, председателю Zeppelin Luftschiffbau, реализовать своё видение разработки цеппелина, подходящего для запуска межконтинентального пассажирского авиасообщения. Соответственно, Zeppelin Lufftschiffbau начала строительство первого из нового поколения дирижаблей, LZ 127 «Граф Цеппелин». 18 сентября 1928 года готовый дирижабль впервые поднялся в воздух. За свою карьеру «Граф Цеппелин» пересёк Южную Атлантику в общей сложности 136 раз."
 curtiss.511.g: "Первый рейс должен состояться внутри страны."
 curtiss.511.h: "Первый рейс должен отправиться за границу."
 curtiss.512.t: "Путешествие «[ROOT.GetCountry.GetNameNoFormatting]»"
 curtiss.512.d: "Флагман нашего дирижабельного флота вернулся из своего последнего путешествия. Какое направление выбрать следующим?"
 curtiss.512.g: "Цеппелин должен летать в основном в пределах наших границ."
 curtiss.512.h: "Цеппелин должен летать за границу и приумножать нашу славу."
 curtiss.513.t: "Катастрофа «[ROOT.GetCountry.GetNameNoFormatting]»"
 curtiss.513.d: "Во время посадочного манёвра по неизвестным причинам на борту «[ROOT.GetCountry.GetNameNoFormatting]» вспыхнул пожар, и он потерпел крушение! Десятки людей получили ранения и погибли, это уже называют одной из худших катастроф в авиации!"
 curtiss.513.f: "«Корабль величественно приближается к нам, как огромное перо, плывя так, словно он могуч — могуч и горд тем местом, которое он занимает в мировой авиации. Корабль, без сомнения, кипит жизнью, как мы видим. Отдаются приказы экипажу, пассажиры, вероятно, выстроились у окон, глядя вниз на поле перед собой, мельком видя причальную мачту. Он практически стоит на месте; они сбросили тросы с носа корабля, и внизу на поле их подхватили несколько человек. Снова начинается дождь — дождь немного утих. Задние моторы корабля просто удерживают его, ровно настолько, чтобы он не... Он вспыхнул! Уходите с дороги! Уходите с дороги! Он горит и падает! Он ужасно падает! О боже, уходите с дороги, пожалуйста. Он горит, вспыхивает и... и он падает на причальную мачту, и все согласны, что это ужасно. Это одна из худших катастроф в мире! Сейчас дым и пламя, и каркас рушится на землю, не долетев до причальной мачты. О, человечество и все пассажиры, кричащие вокруг меня!» — Герберт Моррисон"
 curtiss.513.g: "Тяжёлый удар для индустрии цеппелинов."
 curtiss.514.t: "Гелий вместо водорода"
 curtiss.514.d: "Благодаря нашим запасам гелия мы можем полностью отказаться от легковоспламеняющегося водорода при строительстве нашего цеппелина «[ROOT.GetCountry.GetNameNoFormatting]»."
 curtiss.514.f: "Цеппелин, наполненный гелием, значительно безопаснее своего водородного аналога. Это обеспечит значительно более безопасное путешествие. Шанс катастрофы таким образом значительно снижается, хотя несчастные случаи в авиации никогда нельзя полностью исключить."
 curtiss.514.g: "А я думал, эта штука годится только для смешных голосов."
 curtiss.520.t: "Руководитель экспедиции на цеппелине"
 curtiss.520.d: "Северной полярной экспедиции по-прежнему нужен опытный пилот дирижабля."
 curtiss.520.f: "Для экспедиции на цеппелине доступны до трёх различных пилотов. В некоторых ситуациях лётчики-асы имеют больше возможностей предотвратить опасную ситуацию. Однако в случае аварии цеппелина существует вероятность гибели пилота."
 curtiss.520.g: "[SCOPE.sCharacter('curtiss_expedition_leader_1').GetFullName]."
 curtiss.520.h: "[SCOPE.sCharacter('curtiss_expedition_leader_2').GetFullName]."
 curtiss.520.i: "[SCOPE.sCharacter('curtiss_expedition_leader_3').GetFullName]."
 curtiss.521.t: "Миссия цеппелина"
 curtiss.521.d: "Выбрав опытного пилота, нам теперь нужно сузить точную цель исследования."
 curtiss.521.f: "Успешная экспедиция улучшит исследования нашей нации. Мы можем заранее решить, какой предметной области будет уделено особое внимание во время экспедиции. География расширяет наши военные знания, метеорология увеличивает производство, а биология — социальные исследования. Чем больше научных исследований мы проведём во время путешествия, тем выше будет бонус."
 curtiss.521.g: "География."
 curtiss.521.h: "Метеорология."
 curtiss.521.i: "Биология."
 curtiss.522.t: "Экспедиция на цеппелине начинается!"
 curtiss.522.d: "Наш дирижабль сегодня покинул свою причальную мачту и взял прямой курс на полярный регион."
 curtiss.522.f: "«Приключение — это просто плохое планирование». — Руаль Амундсен"
 curtiss.522.g: "Вперёд, на холодный север! За науку!"
 curtiss.523.t: "Экспедиция на цеппелине возвращается"
 curtiss.523.d: "Наша экспедиция на цеппелине к Северному полюсу успешно вернулась и привезла домой много новых научных открытий."
 curtiss.523.f: "«Могу сказать, что это самый главный фактор: то, как снаряжена экспедиция, как предвидится каждая трудность и принимаются меры предосторожности для её преодоления или избежания. Победа ждёт того, у кого всё в порядке, — удача, как говорят люди. Поражение неминуемо для того, кто пренебрёг своевременными мерами предосторожности, — это называется невезением». — Руаль Амундсен"
 curtiss.523.g: "С возвращением домой, ребята."
 curtiss.524.t: "Катастрофа экспедиции"
 curtiss.524.d: "Последняя ошибка, вероятно, была лишней: связь с нашей экспедицией на цеппелине прервалась. Мы ожидаем худшего."
 curtiss.524.f: "Аварии в цеппелинной авиации на Северном полюсе, к сожалению, не были исключением. В 1928 году цеппелин «Италия» под командованием Умберто Нобиле потерпел крушение на паковом льду менее чем в 30 километрах к северу от Северо-Восточной Земли (восточная часть Шпицбергена). Из 16 человек экипажа десять были выброшены на лёд, когда гондола была разбита; оставшиеся шесть членов экипажа оказались в ловушке в плавучей надстройке, когда она поднялась в небо из-за потери гондолы; судьба шести человек так и не была решена. Один из десяти человек на льду, Помелла, погиб от удара; Нобиле получил перелом руки, ноги, ребра и травму головы; Чечони получил два тяжёлых перелома ног; Мальмгрен получил тяжёлую травму плеча и подозрение на травму почки; а у Цаппи было несколько сломанных рёбер. После крушения несколько стран, включая Советский Союз, Норвегию, Швецию, Финляндию и Италию, начали первую в истории полярную воздушно-морскую спасательную операцию."
 curtiss.524.g: "Мы можем только ждать и надеяться."
 curtiss.524.h: "Мы должны заставить другие страны искать команду любой ценой!"
 curtiss.525.t: "Члены экспедиции погибли"
 curtiss.525.d: "Спустя несколько дней мы получили подтверждение: миссия цеппелина полностью провалилась, и все её члены погибли, включая пилота [SCOPE.sCharacter('curtiss_expedition_leader').GetFullName]."
 curtiss.525.f: ""
 curtiss.525.g: "Потеряны и замёрзли в вечных льдах..."
 curtiss.526.t: "Руководитель экспедиции жив!"
 curtiss.526.d: "К всеобщему удивлению, пилот цеппелина [SCOPE.sCharacter('curtiss_expedition_leader').GetFullName], по-видимому, смог спастись с разрушенного дирижабля вместе с несколькими выжившими."
 curtiss.526.f: ""
 curtiss.526.g: "Какое облегчение!"
 curtiss.527.t: "Пересечение Северного полюса"
 curtiss.527.d: "Команда нашей экспедиции на цеппелине под командованием [SCOPE.sCharacter('curtiss_expedition_leader').GetFullName] первой пролетела над Северным полюсом."
 curtiss.527.f: "«Тот факт, что другие не преуспели: это был существенный факт, который подтолкнул меня к предприятию на Северный полюс. Как парень, я был амбициозен. Я хотел новых вещей. Я построил новый тип дирижабля, но я не был доволен тем, как его использовали пилоты, офицеры ВВС. Я хотел летать на нём, потому что знал, что он может гораздо больше, чем они думали». — Умберто Нобиле"
 curtiss.527.g: "У меня для вас лёд."
 curtiss.528.t: "Рандеву с «[ROOT.GetCountry.GetNameNoFormatting]»"
 curtiss.528.d: "В Арктике наша экспедиция встретилась с роскошным цеппелином «[ROOT.GetCountry.GetNameNoFormatting]», что давно планировалось. Это был плодотворный обмен между обоими экипажами."
 curtiss.528.f: "В 1928 году немецкое правительство согласилось предоставить строящийся дирижабль LZ 127 для двух исследовательских поездок. Давно запланированная поездка в Арктику наконец-то состоялась с 24 по 31 июля 1931 года. Помимо экипажа, на борту находились 15 членов экспедиции. Цеппелин сначала летел из Фридрихсхафена через Берлин и Ленинград на Землю Франца-Иосифа. В бухте Тихая острова Гукера состоялась встреча с советским ледоколом «Малыгин», где для финансирования операции была обменяна почта. После короткого облёта Земли Франца-Иосифа Эккенер направил дирижабль на восток к ещё не полностью нанесённому на карту острову Комсомолец и проследовал вдоль западного побережья Северной Земли до мыса Челюскин. Через горы Бырранга на полуострове Таймыр мы вернулись в Карское море и к северной оконечности Новой Земли у Диксона. Следуя вдоль юго-восточного побережья двойного острова, цеппелин вернулся во Фридрихсхафен после пролёта над Архангельском и Ленинградом и очередной остановки в Берлине. LZ 127 преодолел в общей сложности около 10 600 километров. Поездка продемонстрировала превосходную пригодность дирижаблей в качестве транспортного средства и исследовательской платформы в Арктике. Она принесла богатые научные результаты."
 curtiss.528.g: "Привет, прекрасная леди."
 curtiss.531.t_geo: "Открытие свободного ото льда прохода"
 curtiss.531.t_meo: "Северное сияние"
 curtiss.531.t_bio: "Белые медведи"
 curtiss.531.d_geo: "Пролетая над ранее неизвестным арктическим регионом, исследователи экспедиции на цеппелине обнаружили новый проход."
 curtiss.531.d_meo: "Исследователи экспедиции на цеппелине смогли наблюдать несколько необычно активных ночей с северным сиянием."
 curtiss.531.d_bio: "С дирижабля исследователи смогли наблюдать за группой белых медведей и изучать их поведение в течение нескольких дней."
 curtiss.531.f_geo: "В ранние дни полярных исследований одной из главных задач было открытие новых проходов, таких как Северо-Восточный и Северо-Западный проходы. Хотя оба маршрута оказались невыгодными из-за льда, карты полярного региона не должны были потерять свою полезность в помощи последующим исследованиям."
 curtiss.531.f_meo: "Северное сияние является результатом возмущений в магнитосфере, вызванных солнечным ветром. Сильные возмущения возникают из-за увеличения скорости солнечного ветра из корональных дыр и корональных выбросов массы. Эти возмущения изменяют траектории заряженных частиц в магнитосферной плазме. Северное сияние демонстрирует динамичные узоры ярких огней, которые появляются в виде занавесей, лучей, спиралей или динамичных мерцаний, покрывающих всё небо."
 curtiss.531.f_bio: "Константин Джон Фиппс был первым, кто описал белого медведя как отдельный вид в 1774 году в своём отчёте об экспедиции к Северному полюсу в 1773 году. Это самый крупный из ныне существующих видов медведей, а также самый крупный из ныне существующих наземных хищников. Хотя это сестринский вид бурого медведя, он эволюционировал, чтобы занять более узкую экологическую нишу, со многими телесными характеристиками, адаптированными к низким температурам, для передвижения по снегу, льду и открытой воде, а также для охоты на тюленей, которые составляют большую часть его рациона. Хотя большинство белых медведей рождаются на суше, большую часть времени они проводят на морском льду."
 curtiss.531.g: "Замечательно!"
 curtiss.531.h: "Это величественное животное должно быть в [Concept('concept_dubois_zoo', 'зоопарке')]!"
 curtiss.532.t_geo: "Новые карты"
 curtiss.532.t_meo: "Магнитные исследования"
 curtiss.532.t_bio: "Нарвал"
 curtiss.532.d_geo: "Картографы дирижабельной экспедиции на Северный полюс занимаются созданием новых карт Арктики. Они просят отсрочки, чтобы иметь возможность продолжить свои текущие исследования."
 curtiss.532.d_meo: "Метеорологи на борту текущей полярной экспедиции хотят более внимательно изучить магнитное явление в одном из регионов."
 curtiss.532.d_bio: "Морские исследователи на борту полярного цеппелина заметили нарвала. Они планируют потратить два дня на более тщательное изучение поведения животного."
 curtiss.532.f_geo: "Возможность пролететь над большими частями Арктики на цеппелине была огромным преимуществом по сравнению с предыдущими морскими путешествиями: просто не было риска, что корабль застрянет во льдах. Обзор также открывал совершенно новые возможности для удобного картографирования местности."
 curtiss.532.f_meo: "Из-за движения жидкости во внешнем ядре Земли фактические магнитные полюса постоянно движутся. Однако в течение тысяч лет их направление усредняется до оси вращения Земли. Примерно раз в полмиллиона лет полюса меняются местами, хотя временной интервал этого переключения может составлять от 10 тысяч до 50 миллионов лет. Хотя геомагнитный полюс является лишь теоретическим и не может быть определён напрямую, он, возможно, имеет большее практическое значение, чем магнитный (дипольный) полюс. Это связано с тем, что полюса многое говорят о магнитном поле Земли, определяя, например, где можно наблюдать полярные сияния."
 curtiss.532.f_bio: "Встречающийся в основном в канадской Арктике, а также в водах Гренландии и России, нарвал является уникально специализированным арктическим хищником. Зимой он питается бентосной добычей, в основном камбалой, под плотным паковым льдом. Летом нарвалы едят в основном арктическую треску и гренландского палтуса, а остальную часть их рациона составляет другая рыба, такая как полярная треска. Самой заметной особенностью самца нарвала является один длинный бивень, который на самом деле является клыком. Некоторые средневековые европейцы считали бивни нарвала рогами легендарного единорога."
 curtiss.532.g: "Нам следует остаться подольше."
 curtiss.532.h: "Мы рискуем изменением погоды — продолжайте полёт!"
 curtiss.533.t_geo: "Съёмка Арктики"
 curtiss.533.t_meo: "Метеорологическая станция"
 curtiss.533.t_bio: "Поиск окаменелостей"
 curtiss.533.d_geo: "Члены миссии на цеппелине испытывают большую потребность проверить свои теории и измерить части Арктики. Однако это требует не совсем безопасной посадки."
 curtiss.533.d_meo: "Метеорологи на борту дирижабля заявили о своей готовности установить в Арктике импровизированную метеорологическую станцию для проведения наземных экспериментов. Однако это означает, что цеппелин должен совершить посадочный манёвр."
 curtiss.533.d_bio: "Биологи на борту полярного цеппелина убеждены, что в вечных льдах могут находиться окаменелости доисторических животных и растений, и убеждают пилота посадить дирижабль. Однако это сопряжено с опасностями."
 curtiss.533.f_geo: "Посадки в полярном регионе были редкостью, но не невозможными. В 1931 году «Граф Цеппелин» совершил мастерский трюк во время своего арктического морского путешествия. Он приземлился на воду между плавучими льдинами. Этот не совсем безопасный манёвр прошёл идеально. Мешок с почтой с 50 000 писем, снабжённый специальным почтовым штемпелем цеппелина, был передан на стоявший рядом советский ледокол. Прибыль от этого дополнительного бизнеса была значительной. Геодезические, метеорологические и географические результаты были впечатляющими: «За 106 часов арктического полёта дирижабль проделал работу, которую обычные экспедиции на ледоколах выполняют за два-три года», — заявил научный руководитель исследовательской поездки, директор Ленинградского арктического института профессор Самойлович."
 curtiss.533.f_meo: "Посадки в полярном регионе были редкостью, но не невозможными. В 1931 году «Граф Цеппелин» совершил мастерский трюк во время своего арктического морского путешествия. Он приземлился на воду между плавучими льдинами. Этот не совсем безопасный манёвр прошёл идеально. Мешок с почтой с 50 000 писем, снабжённый специальным почтовым штемпелем цеппелина, был передан на стоявший рядом советский ледокол. Прибыль от этого дополнительного бизнеса была значительной. Геодезические, метеорологические и географические результаты были впечатляющими: «За 106 часов арктического полёта дирижабль проделал работу, которую обычные экспедиции на ледоколах выполняют за два-три года», — заявил научный руководитель исследовательской поездки, директор Ленинградского арктического института профессор Самойлович."
 curtiss.533.f_bio: "Посадки в полярном регионе были редкостью, но не невозможными. В 1931 году «Граф Цеппелин» совершил мастерский трюк во время своего арктического морского путешествия. Он приземлился на воду между плавучими льдинами. Этот не совсем безопасный манёвр прошёл идеально. Мешок с почтой с 50 000 писем, снабжённый специальным почтовым штемпелем цеппелина, был передан на стоявший рядом советский ледокол. Прибыль от этого дополнительного бизнеса была значительной. Геодезические, метеорологические и географические результаты были впечатляющими: «За 106 часов арктического полёта дирижабль проделал работу, которую обычные экспедиции на ледоколах выполняют за два-три года», — заявил научный руководитель исследовательской поездки, директор Ленинградского арктического института профессор Самойлович."
 curtiss.533.g: "Попытаться совершить посадку."
 curtiss.533.h: "Это слишком рискованно."
 curtiss.534.t: "Сильные ветры"
 curtiss.534.d: "Внезапно возникшие полярные ветры затрудняют перелёт."
 curtiss.534.f: "Природные явления, такие как сильные ветры и штормы, могут быть как опасностью, так и возможностью для дирижаблей. Нации, которые прибегли к строительству дирижаблей или имеют лётчика-аса, лучше справляются с такими вызовами; для наций без этих преимуществ силы природы представляют большую опасность."
 curtiss.534.g: "Эти ветры дадут нашему дирижаблю и науке попутный ветер!"
 curtiss.534.h: "Это безумие! Сменить курс!"
 curtiss.534.i: "Наш превосходный дирижабль легко справится с этим вызовом."
 curtiss.535.t: "Полярный шторм"
 curtiss.535.d: "Миссия на цеппелине попала в опасный полярный шторм."
 curtiss.535.f: "Природные явления, такие как сильные ветры и штормы, могут быть как опасностью, так и возможностью для дирижаблей. Нации, которые прибегли к строительству дирижаблей или имеют лётчика-аса, лучше справляются с такими вызовами; для наций без этих преимуществ силы природы представляют большую опасность."
 curtiss.535.g: "Мы должны рискнуть и пройти."
 curtiss.535.h: "Попытайтесь увести нас от опасности, чего бы это ни стоило!"
 curtiss.535.i: "[SCOPE.sCharacter('curtiss_expedition_leader').GetFullName] спасёт положение."
 curtiss.536.t: "Ясная погода"
 curtiss.536.d: "Ясная погода и гладкий полёт позволяют экипажу цеппелина использовать дополнительное время."
 curtiss.536.f: "«Тот, кто не видел полярной страны в великолепии её ледников, в богатой симфонии красок её сверкающих льдин и часто фантастически сформированных островов и предгорий, ничего не знает о самых прекрасных вещах, которые может предложить наша земля». — Хуго Эккенер"
 curtiss.536.g: "Провести эксперимент."
 curtiss.536.h: "Отремонтировать дирижабль."
 curtiss.537.t: "Обледеневшие пропеллеры"
 curtiss.537.d: "Холодная погода сказывается: пропеллеры обледенели и могут сломаться."
 curtiss.537.f: "Лёд на пропеллерах не только означает, что нам придётся сбавить обороты двигателей, чтобы разморозить их. Если твёрдый лёд оторвётся, он может повредить оболочку цеппелина или приборы. Цеппелин уже заметно теряет высоту. Некоторые считают, что лучше сбросить «ненужный балласт», чтобы набрать высоту — к большому огорчению исследователей."
 curtiss.537.g: "Сохраняйте спокойствие и продолжайте."
 curtiss.537.h: "Сбросить балласт!"
 curtiss.538.t: "Якорная стоянка цеппелина"
 curtiss.538.d: "Полярная экспедиция нашла хорошее место, чтобы сделать перерыв и провести техническое обслуживание или эксперименты."
 curtiss.538.f: "Ещё в 1910 году немецкие исследователи предприняли экспедицию на Шпицберген для подготовки исследовательской поездки на цеппелине. В то время важную роль играл поиск подходящих портов для дирижаблей. Одним из последствий экспедиции стало создание первой круглогодичной немецкой метеостанции на Шпицбергене."
 curtiss.538.g: "Хорошее место для отдыха."
 curtiss.538.h: "Нам следует основать постоянную исследовательскую станцию."
 curtiss.539.t: "Отказ двигателя!"
 curtiss.539.d: "Один из двигателей цеппелина сегодня внезапно перестал работать! Команда не видит способа его починить."
 curtiss.539.f: "Отказ одного двигателя не обязательно является катастрофой; дирижабли обычно имеют несколько двигателей. Однако такой инцидент в сочетании с другими авариями может иметь драматические последствия."
 curtiss.539.g: "Эта поездка под несчастливой звездой."
 curtiss.540.t: "Белый медведь пойман"
 curtiss.540.d: "После короткой посадки нашей команде на цеппелине удалось поймать и запереть белого медведя. Мы отправим его прямо домой."
 curtiss.540.f: "С большим терпением и с помощью ловушек команде цеппелина удалось устроить засаду на великолепного [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] и заключить его в тюрьму, несмотря на его огромные размеры. Чтобы не подвергать опасности дальнейшую экспедицию, медведя должны доставить отдельно с небольшой группой в ближайший порт на Шпицбергене, где частные торговцы за плату доставят его в столицу."
 curtiss.541.t: "Белый медведь устроил бойню!"
 curtiss.541.d: "Короткая посадка для поимки белого медведя оказалась самоубийственной миссией — некоторые из наших людей были серьёзно ранены при попытке, один даже убит!"
 curtiss.541.f: "В основном белые медведи видят в людях добычу — в отличие от большинства известных видов медведей. Нападения могут происходить уже без мотивации, хотя это бывает редко. В данном случае произошёл худший сценарий: [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] оказал значительное сопротивление и нанёс серьёзные травмы исследователям, несмотря на применение огнестрельного оружия. Несчастный помощник был разорван на куски массивным существом и утащен. Найти тело снова было невозможно."
 curtiss.541.g: "Чёрт."
 building_airport_throughput_add: "Товарооборот аэропортов"
 building_airport_throughput_add_desc: "Бонус или штраф к товарообороту аэропортов"
 curtiss_scenic_flights_modifier: "Обзорные полёты"
 curtiss.140.t: "Д-р [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastNameNoFormatting] создаёт новый двигатель для нашего самолёта"
 curtiss.140.d: "Д-р [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName], наш [concept_tesla_aeronautical_engineer], изобрёл новый двигатель для нашего самолёта. Это, несомненно, повысит наши шансы на победу в гонке за приз."
 curtiss.140.f: "Этот новый двигатель просто фантастический! Я никогда не испытывал ничего подобного. Он такой быстрый! Я хотел бы поблагодарить д-ра [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastNameNoFormatting] за этот потрясающий двигатель!"
 curtiss.140.g: "Техническое чудо!"
 curtiss_schneider_trophy_new_engine_tt: "Новый двигатель #g повысит наши шансы на победу в гонке за приз#!."
