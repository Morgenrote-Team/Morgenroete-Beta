 curtiss_add_artifacts_of_shangrila_tt: "Разграбить Шангри-Ла, чтобы заполучить её тайны и сокровища. В их число входят десять артефактов со всего мира."
 curtiss_show_aviation_decisions_tt: "Показать все решения, связанные с авиацией."
 curtiss_hide_aviation_decisions_tt: "Скрыть все решения, связанные с авиацией."
 curtiss_hide_aviation_decisions: "Скрыть авиационные решения"
 curtiss_hide_aviation_decisions_desc: "Скрыть все решения, связанные с авиацией и воздухоплаванием, для лучшего обзора."
 curtiss_show_aviation_decisions: "Показать авиационные решения"
 curtiss_show_aviation_decisions_desc: "Показать все решения, связанные с авиацией и воздухоплаванием."
 curtiss_arctica_expedition_decision: "Северная полярная экспедиция на цеппелине"
 curtiss_arctica_expedition_decision_desc: "«Аэроарктика» — «Международное общество по изучению Арктики с помощью дирижаблей» — была неправительственной научной ассоциацией, целью которой было использование дирижаблей в полярных исследованиях. Она была основана в основном по инициативе аэронавта и будущего генерального секретаря общества Вальтера Брунса. Учредительным президентом в 1924 году стал Фритьоф Нансен. После нескольких лет подготовительной работы обществу в 1931 году впервые удалось использовать дирижабль для чисто научной полярной экспедиции. Благодаря арктическому полёту LZ 127 «Граф Цеппелин» знания о географии пролетаемых полярных регионов значительно расширились. Ещё в 1926 году Умберто Нобиле пролетел над Северным полюсом на своём дирижабле «Норвегия», а позже предпринял экспедицию на «Италии»."
 curtiss_hold_schneider_trophy_race_decision: "Провести следующую гонку за приз Шнейдера"
 curtiss_hold_schneider_trophy_race_decision_desc: "Как победитель прошлой гонки, мы удостоены чести провести её в следующем году. Если мы одержим победу три раза подряд, то навсегда оставим легендарный приз Шнейдера у себя."
 curtiss_found_pilot_school_decision: "Основать лётную школу"
 curtiss_found_pilot_school_decision_desc: "Лётная школа повысит вероятность того, что случайно появляющиеся персонажи будут обладать чертой «Пилот»."
 curtiss_lost_horizon_decision: "Пропавший пилот"
 curtiss_lost_horizon_decision_desc: "[GetPlayer.MakeScope.Var('curtiss_conway_var').GetCharacter.GetFullName], известный пилот и почётный консул в Индии, таинственно исчез в Гималаях. Нам следует организовать спасательную миссию в Тибет."
 curtiss_lost_horizon_continue_decision: "Пропавший пилот"
 curtiss_lost_horizon_continue_decision_desc: "Продолжить поиски [GetPlayer.MakeScope.Var('curtiss_conway_var').GetCharacter.GetLastName]."
 curtiss_lost_horizon_archaeologist_decision: "Дорога в Шангри-Ла"
 curtiss_lost_horizon_archaeologist_decision_desc: "Чтобы раскрыть тайны трёх артефактов и найти путь в Шангри-Ла, нужен опытный археолог."
 je_curtiss_found_schneider_trophy: "Учреждение приза Шнейдера"
 je_curtiss_found_schneider_trophy_reason: "Жак Шнейдер был французским промышленником, лицензированным пилотом самолёта и аэростата и долгое время удерживал рекорд высоты полёта на воздушном шаре. Лишившись возможности летать из-за серьёзной аварии, он финансово поддерживал различные соревнования и аэроклубы. Будучи судьёй на авиасалоне в Монако в 1912 году, он заметил, что конструкция гидросамолётов сильно отстаёт от других летательных аппаратов. Поскольку гидросамолёты обещали стать лучшим решением для дальних пассажирских перевозок, г-н Шнейдер посчитал, что гонка на гидросамолётах позволит быстрее усовершенствовать эти машины."
 je_curtiss_found_schneider_trophy_goal: "Как минимум #BLUE 5#! держав со статусом не ниже великой и тремя портами изобрели #E гидросамолёты#!. Только #G [GetGlobalVariable('curtiss_seaplane_nations').GetValue]#! держав соответствуют требованиям."
 je_curtiss_schneider_trophy_race: "Гонка за приз Шнейдера"
 je_curtiss_schneider_trophy_race_reason: "Приз Шнейдера был соревнованием за самые передовые технологии и лучших пилотов своего времени. Вероятность победы рассчитывается ещё до начала самой гонки. Количество пилотов, наличие лётчика-аса, фокус на самолётах, изобретение современной авиации, количество аэропортов и авиазаводов, успешные тренировки и государственная поддержка — всё это факторы, которые дают значительное количество очков ещё до гонки и, таким образом, делают победу более вероятной. Размер и успех авиакомпании также играют роль. Оставшийся шанс на победу рассчитывается в самой гонке, где события присуждают очки. Первая нация, набравшая 30 @curtiss_schneider_point! #E очков приза Шнейдера#!, имеет наилучшие шансы на победу.\n\n#b Участники:[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_1_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_2_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_3_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_4_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_5_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_6_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_7_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_8_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_9_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_10_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_11_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_12_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_13_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_14_type')][SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_schneider_participiant_15_type')]"
 je_curtiss_schneider_trophy_race_goal: "Наша команда победит, если первой наберёт #BLUE 30#! @curtiss_schneider_point! очков приза Шнейдера. Сейчас у нас #G [ROOT.Var('curtiss_schneider_trophy_point_var').GetValue]#! @curtiss_schneider_point! очков приза Шнейдера."
 je_curtiss_schneider_trophy_race_invalid: "Если другая страна наберёт #BLUE 30#! @curtiss_schneider_point! #E очков приза Шнейдера#! раньше нас, то эта страна победит в гонке."
