 curtiss_air_war_doctrin_tech: "Air War Doctrine"
 curtiss_air_war_doctrin_tech_desc: "Фраза «Бомбардировщик всегда прорвётся!» приписывается итальянскому генералу Джулио Дуэ. Стэнли Болдуин произнёс её перед британским парламентом в 1932 году. Фраза выражает новаторские взгляды Дуэ на современную воздушную войну. Как пионер стратегических бомбардировок, он оказал большое влияние, в частности, на теорию воздушной войны в Великобритании и Соединённых Штатах."
 curtiss_airlines_tech: "Авиалинии"
 curtiss_airlines_tech_desc: "DELAG, Deutsche Luftschiffahrts-Aktiengesellschaft, была первой в мире пассажирской и коммерческой авиакомпанией. Она была основана в 1909 году и начала свою деятельность в июне 1910 года, предоставляя регулярные пассажирские авиаперевозки. DELAG эксплуатировала дирижабли, произведённые компанией Zeppelin."
 curtiss.681.t: "Кубок Гордона Беннетта"
 curtiss.681.d: "Подготовка к первой крупной международной гонке на воздушных шарах идёт полным ходом. Аэронавты со всего мира собираются в [ROOT.GetCountry.GetCapital.GetCityHubName], чтобы помериться силами в соревновании на дальность. Мероприятие уже считается легендарным и найдёт своё продолжение в ближайшие годы."
 curtiss.681.f: "«Ни на одном предыдущем полёте я не получал столько добрых пожеланий, когда улетал, со мной в пути, и никогда прежде я не делал столько приготовлений, как к этому полёту за Кубок Гордона-Беннетта 1907 года. Вскоре после окончания гонки из Парижа в сентябре 1906 года во мне возникло желание принять участие в полёте этого года. Я благодарю Deutschen Luftschiffer-Verband за то, что они выбрали меня своим представителем, а также барона фон Хевальда и гауптмана Хильдебрандта, которые предоставили в моё распоряжение свой большой шар POMMERN. Так они сделали возможной победу в этом году для меня.\n\nВо время этого полёта я получил наилучшее впечатление о Северной Америке в отношении полётов на воздушном шаре и гостеприимства. Я сожалею только о том, что эта страна не была ещё больше, чтобы позволить мне пролететь на моём шаре на его полную дальность и побить мировой рекорд по дальности». — Оскар Эрбслё"
 curtiss.681.g: "Замечательно!"
 notification_curtiss_gordon_bennett_cup_notification_name: "[GetPlayer.MakeScope.Var('curtiss_balloonist_var').GetCharacter.GetFullName] выигрывает Кубок Гордона Беннетта"
 notification_curtiss_gordon_bennett_cup_notification_desc: "Наш аэронавт выиграл[SelectLocalization(GetPlayer.MakeScope.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'а', '')] легендарный Кубок Гордона Беннетта и получил[SelectLocalization(GetPlayer.MakeScope.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'а', '')] #G 25#! [Concept('concept_academics_experience', 'опыта')]. Следующий кубок состоится в нашей стране через два года."
