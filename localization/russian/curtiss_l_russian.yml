 je_curtiss_airline_company_reason: "Основание авиакомпании с харизматичным и амбициозным эксцентричным предпринимателем во главе открывает особые возможности для развития авиации."
 je_curtiss_air_combat: "Воздушный бой"
 je_curtiss_air_combat_reason: "[concept_curtiss_pilot] может быть задействован в операции на передовой, пока хотя бы одно подразделение имеет воздушную поддержку. В зависимости от черты характера, они дают подразделению дополнительную наступательную мощь. За операции на передовой пилоты получают 10 очков опыта в месяц. В это время возможны дополнительные события, некоторые с рискованными последствиями. После назначения пилоты должны оставаться на фронте не менее шести месяцев, прежде чем их можно будет снова отозвать. Раненые пилоты не получают опыта."
