 curtiss_montgolfier_balloon_tech: "Воздушные шары Монгольфье"
 curtiss_montgolfier_balloon_tech_desc: "«Монгольфьер» — так назывался первый воздушный шар, названный в честь французских изобретателей Жозефа-Мишеля и Жака-Этьенна Монгольфье. Слухи об «аэростатических машинах» быстро распространились по всей Европе. Первое военное применение летательных аппаратов произошло во время французских революционных войн, когда французы использовали привязной водородный шар для наблюдения за передвижениями австрийской армии во время битвы при Флерюсе (1794)."
 curtiss_messenger_pidgeons_tech: "Голубиная почта"
 curtiss_messenger_pidgeons_tech_desc: "Голубиная почта была редкостью до 1820-х годов. В 1860 году Пол Рейтер использовал более 45 голубей для доставки новостей и котировок акций между Брюсселем и Ахеном, конечными пунктами ранних телеграфных линий. Во время франко-прусской войны голуби использовались для перевозки почты между покорённым Парижем и незанятой французской территорией. В декабре 1870 года голубю с микрофильмами потребовалось десять часов, чтобы долететь из Перпиньяна в Брюссель."
 curtiss_reconnaissance_balloon_tech: "Разведывательные аэростаты"
 curtiss_reconnaissance_balloon_tech_desc: "Разведывательный аэростат — это шар, наполненный газовой смесью и оснащённый военной разведывательной техникой. Аэростат использовался в качестве наблюдательного пункта во время Гражданской войны в США и франко-прусской войны. Управляемые привязные аэростаты поднимались в воздух на тросе для наблюдения за вражескими позициями и передачи информации своим войскам внизу."
 curtiss_early_aviation_tech: "Ранняя авиация"
 curtiss_early_aviation_tech_desc: "Между 1867 и 1896 годами немецкий пионер авиации Отто Лилиенталь развивал полёты на аппаратах тяжелее воздуха. Он был первым человеком, совершившим хорошо задокументированные, многократные и успешные полёты на планере. Работа Лилиенталя привела его к разработке концепции современного крыла, что в значительной степени вдохновило дальнейшее развитие. Полёты американских братьев Райт в 1903 году признаны «первым устойчивым и управляемым полётом на аппарате тяжелее воздуха с двигателем»."
 curtiss_seaplanes_tech: "Гидросамолёты"
 curtiss_seaplanes_tech_desc: "28 марта 1910 года француз Анри Фабр совершил первый успешный полёт на гидросамолёте с двигателем — тримаране-поплавковом самолёте «Гидравион» с двигателем Gnome Omega. Первый успешный взлёт и посадка Фабра на гидросамолёте вдохновили других авиаторов. Первые соревнования гидроаэропланов прошли в Монако в марте 1912 года, в них участвовали самолёты с поплавками конструкций Фабра, Кёртисса, Телье и Фармана. В том же году ВМС Франции заказали свой первый поплавковый самолёт."
 curtiss_modern_aviation_tech: "Современная авиация"
 curtiss_modern_aviation_tech_desc: "Гражданская авиация — одна из двух основных категорий полётов, представляющая всю невоенную и негосударственную авиацию, как частную, так и коммерческую. В Золотой век авиации она получила широкое распространение. Впервые стали возможны дальние перелёты для состоятельных путешественников; на первых рейсах использовались дирижабли, но после катастрофы «Гинденбурга» они вышли из употребления, и доминировать стали летающие лодки."
