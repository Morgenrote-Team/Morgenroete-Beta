 mobilization_option_ballon_recon_desc: "Воздушные шары использовались уже во время наполеоновских войн, и их ценность как инструмента разведки продолжала расти со времён Гражданской войны в США."
 mobilization_option_zeppelin_recon: "Разведка с цеппелинов"
 mobilization_option_zeppelin_recon_desc: "Во время Великой войны у цеппелинов было множество задач, которые в основном включали шпионаж и определение целей для артиллерии."
 air_reconaissance: "Воздушная разведка"
