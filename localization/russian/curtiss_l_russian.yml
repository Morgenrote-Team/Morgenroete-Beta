 notification_curtiss_altitude_record_broken_notification_desc: "[SCOPE.sCountry('curtiss_record_breaking_country').MakeScope.GetVariable('curtiss_balloonist_var').GetCharacter.GetFullName], аэронавт из [SCOPE.sCountry('curtiss_record_breaking_country').GetAltNameNoFlag('RU_CL_RP')], побил[SCOPE.sCountry('curtiss_record_breaking_country').GetAltNameNoFormatting('RU_CL_END_FEM')] наш мировой рекорд высоты. Новый рекорд составляет [GetGlobalVariable('curtiss_balloon_altitude_record_global_var').GetValue|V0] метров."
