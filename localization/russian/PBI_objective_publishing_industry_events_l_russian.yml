l_russian:
 pbi_objective_publishing_industry_events.200.t: "Успешный газетный роман"
 pbi_objective_publishing_industry_events.200.d: "Роман, над которым [SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'работала', 'работал')] [SCOPE.sCharacter('target_character').GetFullName], публиковался в газете [SCOPE.sState('target_state').GetCustom('RU_SL_RP')], и после очень успешной серии публикация была завершена."
 pbi_objective_publishing_industry_events.200.f: "За период публикации продажи газеты в конечном итоге утроились. Издатель выпустил книгу по мотивам романа и даже перевёл её для международного рынка; продажи этих книг неуклонно растут."
 pbi_objective_publishing_industry_events.200.a: "Отличная работа!"
 pbi_objective_publishing_industry_events.200.good: "Прогресс написания романа будет #positive_value увеличен#!"
 pbi_objective_publishing_industry_events.200.bad: "Прогресс написания романа будет #negative_value уменьшен#!"
 pbi_objective_publishing_industry_events.200.stop: "#negative_value Увеличивает вероятность сброса прогресса романа в будущем#!"
 pbi_objective_publishing_industry_events.201.t: "Публикация отменена"
 pbi_objective_publishing_industry_events.201.d: "Роман, который публиковался в газете [SCOPE.sState('target_state').GetCustom('RU_SL_RP')], остался незаконченным, когда писатель больше не смог продолжать работу."
 pbi_objective_publishing_industry_events.201.f: "Многие читатели больше не смогут прочитать продолжение романа, которого они так ждали."
 pbi_objective_publishing_industry_events.201.a: "Какая жалость."
 pbi_objective_publishing_industry_events.202.t: "Великий писатель будущего"
 pbi_objective_publishing_industry_events.202.d: "Газетная компания в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')] планирует выпустить новую газету.\nДля этого амбициозного издания они ищут нового романиста."
 pbi_objective_publishing_industry_events.202.f: "В наши дни продажи газеты определяются не политическим заявлением, не остроумной редакционной статьёй главного редактора и не сенсационным материалом на три полосы, а интересом к роману-фельетону."
 pbi_objective_publishing_industry_events.202.a: "[SCOPE.sCharacter('target_character_1').GetFullName] - [SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'великая писательница будущего', 'великий писатель будущего')]!"
 pbi_objective_publishing_industry_events.202.a.tt: "Начать писать серию романов."
 pbi_objective_publishing_industry_events.202.b: "Я чувствую, что [SCOPE.sCharacter('target_character_2').GetFullName] обладает недюжинным интеллектом!"
 pbi_objective_publishing_industry_events.202.c: "Произведения, которые пишет [SCOPE.sCharacter('target_character_3').GetFullName], обладают неотразимой притягательностью!"
 pbi_objective_publishing_industry_events.202.e: "Должны же быть и другие сияющие алмазы!"
 pbi_objective_publishing_industry_events.202.e.tt: "Мы будем искать других кандидатов."
 pbi_objective_publishing_industry_events.203.t: "Невозможно продолжать писать"
 pbi_objective_publishing_industry_events.203.d: "[SCOPE.sCharacter('target_character').GetFullName] с трудом продвигается в работе над своим романом. Если так пойдёт и дальше, публикация, вероятно, прекратится."
 pbi_objective_publishing_industry_events.203.f: "Рано утром ответственный редактор пришёл в дом, где [SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'жила', 'жил')] [SCOPE.sCharacter('target_character').GetFullName], чтобы проверить ход работы над рукописью, но [SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'её', 'его')] там не оказалось. Слуга сказал, что [SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'хозяйки', 'хозяина')] нет дома уже три дня и не знает, где [SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'она', 'он')] находится."
 pbi_objective_publishing_industry_events.203.a: "Привяжите [SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'её', 'его')] к стулу, но заставьте писать!"
 pbi_objective_publishing_industry_events.203.b: "[SCOPE.sCharacter('target_character').GetFullName] нуждается в смене обстановки."
 pbi_objective_publishing_industry_events.204.t: "Кому принадлежит рукопись?"
 pbi_objective_publishing_industry_events.204.d: "Автор, [SCOPE.sCharacter('target_character').GetFullName], отказывается разрешать издателю рецензировать содержание романа, который публикуется по частям."
 pbi_objective_publishing_industry_events.204.f: "Издатель обеспокоен тем, что изображение определённых персонажей в романе может быть воспринято как насмешка над некоторыми политиками."
 pbi_objective_publishing_industry_events.204.a: "Издатели имеют право на рецензирование."
 pbi_objective_publishing_industry_events.204.b: "Волю автора следует уважать."
 pbi_objective_publishing_industry_events.205.t: "Аморальное содержание"
 pbi_objective_publishing_industry_events.205.d: "Представители #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig').GetCustom('RU_IG_RP')]#!#! требуют улучшить роман-фельетон, который пишет [SCOPE.sCharacter('target_character').GetFullName], из-за его аморального содержания."
 pbi_objective_publishing_industry_events.205.f: "«Содержание скандального романа, автором которого является [SCOPE.sCharacter('target_character').GetLastName], неприемлемо»."
 pbi_objective_publishing_industry_events.205.a: "Великие произведения неприемлемы для старых ценностей."
 pbi_objective_publishing_industry_events.205.b: "Нам нужно пересмотреть содержание."
 pbi_objective_publishing_industry_events.206.t: "Подозрение в плагиате"
 pbi_objective_publishing_industry_events.206.d: "Несколько романистов заявили, что их работы были украдены в романе-фельетоне, автором которого является [SCOPE.sCharacter('target_character').GetFullName]."
 pbi_objective_publishing_industry_events.206.f: "«Мнимое творчество вашего о-о-очень уважаемого писателя - чистое мошенничество. Эта сцена, которую он якобы придумал, основана на главе одной из моих книг. Как вы можете это отрицать? Сцена с купающейся женщиной совершенно уникальна. Я заявляю о своих авторских правах!»"
 pbi_objective_publishing_industry_events.206.a: "Это ложное обвинение."
 pbi_objective_publishing_industry_events.207.t: "Роман как пророчество"
 pbi_objective_publishing_industry_events.207.d: "Содержание романа-фельетона, который пишет [SCOPE.sCharacter('target_character').GetFullName], привлекло внимание своим поразительным сходством с недавним загадочным убийством в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')]."
 pbi_objective_publishing_industry_events.207.f: "«Нет сомнений, что за подобными инцидентами стоит проблема бедности, с которой сталкивается наше общество. И удивительно, что в романе, который сейчас публикуется в газетах, содержится точно такое же описание, словно предсказывающее подобную ситуацию»."
 pbi_objective_publishing_industry_events.207.a: "Это произведение, отражающее дух времени."
 pbi_objective_publishing_industry_events.208.t: "Благосклонные рецензии от знаменитостей"
 pbi_objective_publishing_industry_events.208.d: "[SCOPE.sCharacter('target_character_1').GetFullName], [SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'влиятельная представительница', 'влиятельный представитель')] #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_1').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_1').GetCustom('RU_IG_RP')]#!#!, [SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'опубликовала', 'опубликовал')] благосклонную рецензию на роман, который публикует [SCOPE.sCharacter('target_character').GetFullName]."
 pbi_objective_publishing_industry_events.208.f: "«Все газеты публикуют романы, но роман, который пишет [SCOPE.sCharacter('target_character').GetFullName], - самый интересный из всех. Честно говоря, я поражён, что [SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'она', 'он')] обладает таким литературным талантом»."
 pbi_objective_publishing_industry_events.208.a: "[SCOPE.sCharacter('target_character_1').GetLastName] видит суть."
 pbi_objective_publishing_industry_events.208.b: "Мне не нужны [SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'её', 'его')] одолжения."
 pbi_objective_publishing_industry_events.209.t: "Критические рецензии от знаменитостей"
 pbi_objective_publishing_industry_events.209.d: "[SCOPE.sCharacter('target_character_1').GetFullName], [SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'видная представительница', 'видный представитель')] #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_1').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_1').GetCustom('RU_IG_RP')]#!#!, [SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'опубликовала', 'опубликовал')] критическую рецензию на роман, который публикует [SCOPE.sCharacter('target_character').GetFullName]."
 pbi_objective_publishing_industry_events.209.f: "«Бездарность этого романа-фельетона выделяется даже на фоне других романов последних лет. В частности, опубликованная на этой неделе часть была ничем не примечательна. Эту сломанную историю уже невозможно исправить. Даже [SCOPE.sCharacter('target_character').GetFullName] вызывает сочувствие, ведь [SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'она вынуждена', 'он вынужден')] продолжать писать, хотя [SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'стала', 'стал')] посмешищем для всего мира»."
 pbi_objective_publishing_industry_events.209.a: "[SCOPE.sCharacter('target_character_1').GetLastName] лишь выставляет напоказ собственное невежество."
 pbi_objective_publishing_industry_events.210.t: "Роман-фельетон привлекает внимание"
 pbi_objective_publishing_industry_events.210.d: "Романы, которые пишет [SCOPE.sCharacter('target_character').GetFullName] и которые публикуются в газетах [SCOPE.sState('target_state').GetCustom('RU_SL_RP')], с каждым выпуском привлекают всё больше внимания."
 pbi_objective_publishing_industry_events.210.f: "История о трудностях и усилиях главного героя, основанная на его собственной жизни, покорила сердца многих читателей."
 pbi_objective_publishing_industry_events.210.a: "Не могу дождаться продолжения!"
 pbi_objective_publishing_industry_events.211.t: "Пылкий поклонник"
 pbi_objective_publishing_industry_events.211.d.rich: "Романы-фельетоны, которые пишет [SCOPE.sCharacter('target_character').GetFullName], популярны среди [Concept('concept_upper_strata', 'высших слоёв общества')] в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')]."
 pbi_objective_publishing_industry_events.211.d.middle: "Романы-фельетоны, которые пишет [SCOPE.sCharacter('target_character').GetFullName], популярны среди [Concept('concept_middle_strata', 'средних слоёв общества')] в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')]."
 pbi_objective_publishing_industry_events.211.d.poor: "Романы-фельетоны, которые пишет [SCOPE.sCharacter('target_character').GetFullName], популярны среди [Concept('concept_lower_strata', 'низших слоёв общества')] в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')]."
 pbi_objective_publishing_industry_events.211.f: "Хотя в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')] можно наслаждаться романами из самых разных газет, произведения, которые пишет [SCOPE.sCharacter('target_character').GetFullName], в последние годы пользуются огромной популярностью."
 pbi_objective_publishing_industry_events.211.a: "Вы планируете автограф-сессии?"
 pbi_objective_publishing_industry_events.212.t: "Приостановка публикации"
 pbi_objective_publishing_industry_events.212.d: "Суд постановил прекратить публикацию романа-фельетона, автором которого является [SCOPE.sCharacter('target_character').GetFullName], на том основании, что персонажи в нём клевещут на определённых политиков."
 pbi_objective_publishing_industry_events.212.f: "Каждый, кто читал роман, знает, что прототипами персонажей в романе, который пишет [SCOPE.sCharacter('target_character').GetFullName], послужили определённые политики."
 pbi_objective_publishing_industry_events.212.a: "О, боже мой."
 pbi_objective_publishing_industry_events.300.t: "Журналисты на поле боя"
 pbi_objective_publishing_industry_events.300.d: "Статьи репортёра, участвовавшего в войне «[SCOPE.sWar('target_war').GetName]» и присылавшего материалы с фронта [SCOPE.sFront('target_front').GetName], вызвали большой интерес."
 pbi_objective_publishing_industry_events.300.f: "«Генерал [SCOPE.sCharacter('target_character').GetFullName] [SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'приказывала', 'приказывал')] атаковать снова и снова и в итоге [SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'сумела', 'сумел')] заставить врага отступить, но наши силы также понесли огромный урон. Результатом этого боя, длившегося полдня, стало лишь продвижение на 100 метров»."
 pbi_objective_publishing_industry_events.300.a: "Давайте набирать добровольцев."
 pbi_objective_publishing_industry_events.300.b: "Давайте собирать пожертвования."
 pbi_objective_publishing_industry_events.400.t: "Победа в дипломатической битве"
 pbi_objective_publishing_industry_events.400.d: "Наши разрекламированные переговоры с [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_TP')] массово освещались в прессе [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_RP')]. Хотя это придало импульс [Concept('concept_radical', 'радикалам')] в [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_PP')], это также вызвало осуждение [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_RP')] со стороны вовлечённых стран."
 pbi_objective_publishing_industry_events.400.f: "«В ответ на #bold наглую просьбу#! дипломата [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_RP')], [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] #bold [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'отказалась', 'отказался')]#! с ним встречаться и через #bold младшего офицера#! сообщил, что [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'ей', 'ему')] #bold больше нечего сказать#!»."
 pbi_objective_publishing_industry_events.400.a: "Даже дураки и газеты могут быть полезны в руках умного человека."
 pbi_objective_publishing_industry_events.402.t: "Информационная война"
 pbi_objective_publishing_industry_events.402.d: "Газеты теперь обладают большей властью, чем речь любого политика. Если мы эффективно используем эту силу, мы сможем нанести урон нашим врагам."
 pbi_objective_publishing_industry_events.402.f: "«Вы поставляете картинки, а я поставлю войну».\n- Уильям Рэндольф Хёрст"
 pbi_objective_publishing_industry_events.402.a: "[SCOPE.sCountry('target_country_1').GetName] - наш враг."
 pbi_objective_publishing_industry_events.402.b: "Мы не можем позволить [SCOPE.sCountry('target_country_2').GetAltNameNoFlag('RU_CL_DP')] продолжать расти."
 pbi_objective_publishing_industry_events.402.c: "Нам нужно разобраться с проблемой в лице [SCOPE.sCountry('target_country_3').GetAltNameNoFlag('RU_CL_RP')]."
 pbi_objective_publishing_industry_events.402.e: "Мы должны тщательно всё обдумать."
 pbi_objective_publishing_industry_events.402.tt: "Мы отложим решение о целевой стране на один месяц."
 pbi_objective_publishing_industry_events.403.t: "Пороховая бочка"
 pbi_objective_publishing_industry_events.403.d: "Газеты [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_RP')] жаловались, что наши претензии в регионе [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName] необоснованны."
 pbi_objective_publishing_industry_events.403.f: "Что касается региона [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName] - [Concept('concept_strategic_region', 'стратегического региона')] как для нас, так и для [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_RP')], - газеты [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_RP')] постоянно взывают к законности своих прав. Проблемы в этой области сильно взбудоражат общественное мнение в [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_PP')]."
 pbi_objective_publishing_industry_events.403.a: "Этим нельзя не воспользоваться."
 pbi_objective_publishing_industry_events.404.t: "Наглая просьба"
 pbi_objective_publishing_industry_events.404.d: "Правительство [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_RP')] через своих дипломатов добивается от нас уступок и ищет тайной встречи, на которой [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'должна', 'должен')] присутствовать [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [ROOT.GetCountry.GetRuler.GetFullName]."
 pbi_objective_publishing_industry_events.404.f: "Общественное мнение в [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_PP')] начинает настаивать на том, что следует начать войну, если их превосходство в регионе [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName] не будет признано. Почти наверняка последнее требование правительства [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_RP')] отражает их желание избежать войны, подавив внутреннее общественное мнение, в котором начинает доминировать лагерь сторонников войны."
 pbi_objective_publishing_industry_events.404.a: "Они хотят дёрнуть за занавес.\nИ так, как им это выгоднее всего!"
 pbi_objective_publishing_industry_events.405.t: "Телеграмма судьбы"
 pbi_objective_publishing_industry_events.405.d: "[SCOPE.sCharacter('target_character').GetFullName] была доставлена телеграмма. В ней сообщалось о содержании тайной встречи с дипломатами [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_RP')] на вилле в [SCOPE.sState('target_state_2').GetCustom('RU_SL_PP')], где [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'присутствовала', 'присутствовал')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [ROOT.GetCountry.GetRuler.GetFullName]. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'заявила', 'заявил')], что [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'она', 'он')] оставит на усмотрение правительства решение о том, предавать ли её содержание огласке."
 pbi_objective_publishing_industry_events.405.f: "«Дипломаты [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_RP')] не только настойчиво требовали, чтобы [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [ROOT.GetCountry.GetRuler.GetFullName] [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'встретилась', 'встретился')] с ними, но и просили отозвать наш [Concept('concept_interest', 'интерес')] из стратегического региона [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName] и, в качестве доказательства своих обязательств, отречься от престола. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'ответила', 'ответил')], сообщив дипломатам, что [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'она', 'он')] не может и не [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'должна', 'должен')] давать такое обязательство, что на встрече [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'ей', 'ему')] больше нечего сказать и что переговоры прекращены»."
 pbi_objective_publishing_industry_events.405.a: "Обнародовать. Но немного приукрасив."
 pbi_objective_publishing_industry_events.405.a.tt: "Ситуация перерастает в [Concept('concept_diplomatic_incident', 'дипломатический инцидент')]."
 pbi_objective_publishing_industry_events.405.b: "Не публиковать."
 pbi_objective_publishing_industry_events.405.b.tt: "Ситуация разрешится мирным путём."
 pbi_objective_publishing_industry_events.500.t: "В свете объектива"
 pbi_objective_publishing_industry_events.500.d: "По мере того как газеты начинают публиковать фотографии вместо иллюстраций, на свет выходит суровая реальность нашего общества."
 pbi_objective_publishing_industry_events.500.f: "На фотографии изображена фавела с плохой охраной и антисанитарией. Многие рабочие вынуждены выполнять опасную работу за низкую плату. Дети вынуждены работать, потому что им не разрешают посещать школу."
 pbi_objective_publishing_industry_events.500.a: "Нам нужно сосредоточиться на расширении социального обеспечения."
 pbi_objective_publishing_industry_events.500.b: "Похоже, [SCOPE.sCharacter('target_character_1').GetLastName] [SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'изменила', 'изменил')] своё мнение по вопросу «[GetLawGroup('lawgroup_childrens_rights').GetName]»."
 pbi_objective_publishing_industry_events.500.c: "Похоже, [SCOPE.sCharacter('target_character_2').GetLastName] [SelectLocalization(SCOPE.sCharacter('target_character_2').IsFemale, 'изменила', 'изменил')] своё мнение по вопросу «[GetLawGroup('lawgroup_welfare').GetName]»."
 pbi_objective_publishing_industry_events.500.e: "Похоже, [SCOPE.sCharacter('target_character_3').GetLastName] [SelectLocalization(SCOPE.sCharacter('target_character_3').IsFemale, 'изменила', 'изменил')] своё мнение по вопросу «[GetLawGroup('lawgroup_citizenship').GetName]»."
