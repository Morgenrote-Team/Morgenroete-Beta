l_russian:
 athletes.2.t: "Наш альпинист, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullNameNoFormatting], уходит на покой"
 athletes.2.d: "После десятилетий, проведённых [SCOPE.sCharacter('athletes_retired_person_scope').GetHerHis] жизни в покорении вершин, прокладывании неизведанных маршрутов и руководстве экспедициями по опасной местности, [SCOPE.sCharacter('athletes_retired_person_scope').GetFullName] принимает решение уйти на покой. [SCOPE.sCharacter('athletes_retired_person_scope').GetSheHe|U] больше не будет служить нашим [concept_douglas_mountaineer]."
 athletes.2.f: ""
 athletes.2.g: "Вершина никогда не была концом — только вид перед спуском."
 athletes.12.t: "Наш альпинист умирает"
 athletes.12.d: "После целой жизни, потраченной на покорение вершин и руководство другими в самых сложных восхождениях, наш самый почитаемый [concept_douglas_mountaineer] скончался. Кто теперь поведёт нас к облакам?"
 athletes.12.f: ""
 athletes.12.g: "Их веревка может и пропала, но их след остался."
 athletes.52.t: "Новый альпинист"
 athletes.52.d: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetFullName] — многообещающий талант, который однажды может встать в один ряд с величайшими покорителями наших вершин."
 athletes.52.f: ""
 athletes.52.g: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetSheHe|U] покоряет горы с определённой целью."
 athletes.102.t: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] теперь Ветеран-альпинист!"
 athletes.102.d: "Покорив ледники, пересекая горные хребты и возглавляя экспедиции в неизвестность, наш [concept_douglas_mountaineer] [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] теперь имеет достаточную известность, чтобы называться Ветераном-альпинистом!"
 athletes.102.f: ""
 athletes.102.g: "Повелитель гор!"
 athletes.53.t: "Новый тренер"
 athletes.53.d: "Новый [concept_vikelas_coach] представляет [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerselfHimself]. [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerHis|U] имя — [SCOPE.sCharacter('vikelas_new_coach_scope').GetFullName]."
 athletes.53.f: ""
 athletes.53.g: "[SCOPE.sCharacter('vikelas_new_coach_scope').GetSheHe|U] приведёт наших парней к победе."
 athletes.103.t: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] теперь старший тренер!"
 athletes.103.d: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] удаётся добиться признания, тренируя и развивая целое поколение игроков. [ROOT.Var('vikelas_coach_var').GetCharacter.GetSheHe] теперь имеет достаточную известность, чтобы считаться старшим тренером!"
 athletes.103.f: ""
 athletes.103.g: "Награда за умение бесстыдно кричать на поле."