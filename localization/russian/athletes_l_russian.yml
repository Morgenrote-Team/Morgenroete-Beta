l_russian:
 athletes.2.t: "Наш альпинист, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullNameNoFormatting], уходит на покой"
 athletes.2.d: "Проведя десятилетия своей жизни, покоряя вершины, прокладывая неизведанные маршруты и возглавляя экспедиции по опасным землям, [SCOPE.sCharacter('athletes_retired_person_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('athletes_retired_person_scope').IsFemale, 'решила', 'решил')] уйти на покой. [SCOPE.sCharacter('athletes_retired_person_scope').GetSheHe|U] больше не будет нашим [Concept('concept_douglas_mountaineer', 'альпинистом')]."
 athletes.2.f: ""
 athletes.2.g: "Вершина никогда не была концом — лишь видом перед спуском."
 athletes.12.t: "Скончался наш альпинист"
 athletes.12.d: "Проведя всю жизнь в покорении вершин и ведя других через самые коварные подъёмы, наш самый почитаемый [Concept('concept_douglas_mountaineer', 'альпинист')] скончался. Кто теперь поведёт нас к облакам?"
 athletes.12.f: ""
 athletes.12.g: "Его верёвка оборвалась, но его тропа осталась."
 athletes.52.t: "Новый альпинист"
 athletes.52.d: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetFullName] — многообещающий талант, который однажды может встать в один ряд с величайшими покорителями наших вершин."
 athletes.52.f: ""
 athletes.52.g: "[SCOPE.sCharacter('douglas_new_mountaineer_scope').GetSheHe|U] взбирается с целью."
 athletes.102.t: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] теперь опытный альпинист!"
 athletes.102.d: "Покорив ледники, перейдя горные хребты и возглавив экспедиции в неизведанное, наш [Concept('concept_douglas_mountaineer', 'альпинист')] [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] теперь достаточно известен, чтобы называться опытным альпинистом!"
 athletes.102.f: ""
 athletes.102.g: "Повелитель гор!"
 athletes.53.t: "Новый тренер"
 athletes.53.d: "Новый [Concept('concept_vikelas_coach', 'тренер')] представился. Его имя — [SCOPE.sCharacter('vikelas_new_coach_scope').GetFullName]."
 athletes.53.f: ""
 athletes.53.g: "[SCOPE.sCharacter('vikelas_new_coach_scope').GetSheHe|U] приведёт наших парней к победе."
 athletes.103.t: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] теперь старший тренер!"
 athletes.103.d: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('vikelas_coach_var').GetCharacter.IsFemale, 'сделала', 'сделал')] себе имя, тренируя и развивая целое поколение игроков. [ROOT.Var('vikelas_coach_var').GetCharacter.GetSheHe|U] теперь достаточно [SelectLocalization(ROOT.Var('vikelas_coach_var').GetCharacter.IsFemale, 'известна', 'известен')], чтобы считаться старшим тренером!"
 athletes.103.f: ""
 athletes.103.g: "Награда за умение беззастенчиво кричать на поле."
 curtiss_pilot_will_become_part_of_academia_tt: "[SCOPE.sCharacter('curtiss_new_pilot_scope').GetFullName] will join the [Concept('concept_character', '$NATIONAL_CAST$')] of [SCOPE.GetRootScope.GetCountry.GetName]."