l_russian:
 matsuura.101.t: "Юноша желает отправиться в Эдзо"
 matsuura.101.d: "[SCOPE.sCharacter('character_1_scope').GetFullName] - юноша, который хочет отправиться на север, в Эдзо. Однако княжество Мацумаэ ограничило передвижение в этом регионе. Стоит ли позволить молодому человеку совершить путешествие к северным островам?"
 matsuura.101.f: "«Я хочу путешествовать повсюду! В Эдзо, Морокоси, Тэндзику! Прошу, позвольте мне увидеть чудеса света!»"
 matsuura.101.g: "Он мог бы изучить тамошний ландшафт!"
 matsuura.101.h: "Я слышал, он поэт. Возможно, путешествия вдохновят его?"
 matsuura.101.i: "Может, он запечатлеет этот край на своих полотнах?"
 matsuura.101.j: "Никому не дозволено уезжать."
 matsuura_allowed_travels_modifier: "Разрешение на путешествие в Эдзо"
 matsuura.102.t: "Западная химия"
 matsuura.102.d: "[SCOPE.sCharacter('character_1_scope').GetFullName] годами изучал рангаку - западные науки. Теперь он собирается написать книгу о некой «химии». Возможно, его стоит поддержать."
 matsuura.102.f: "«Видите ли, один человек из далёких краёв проводил эксперименты...»\n«Хотите знать, что такое эксперименты? Если у вас есть теория...»\n«Ах, вы и что такое теория не знаете...»"
 matsuura.102.g: "Что это за «химия», о которой он говорит?"
 matsuura.102.h: "Варварские идеи!"
 matsuura_barbarian_ideas_modifier: "Варварские идеи"
 matsuura_nintendo_modifier: "Карты ханафуда от Nintendo"
 matsuura.103.t: "Nintendo"
 matsuura.103.d: "В Киото Фусадзиро Ямаути основал фабрику игральных карт, полностью посвящённую производству популярных карт ханафуда. Она быстро стала лидером рынка по всей Японии. Имя этой компании - Nintendo."
 matsuura.103.f: "'Присядь, расслабься, друг любезный,\nУрок наш будет краток днесь.\nИ чтоб он не был бесполезным,\nПредставлен он в форме песни.\nШёл восемьсот восемьдесят девятый,\nНаград не счесть, но до того\nС карт ханафуда путь свой начала\nКомпания Nintendo.\n\nСто лет искали, что продать,\nИ расширяли свой охват:\nПылесосы, Ultra Hand,\nОтели для утех и ласк.\nНо вскоре к играм подошли -\nGame & Watch, цветное ТВ.\nИх Donkey Kong в восемьдесят первом\nПрославил на века в молве!\n\nЭто история Nintendo,\nОт ханафуды до Марио.\nГений Миямото из Киото.\nЭто история Nintendo.'\n\n- Мэтью Таранто"
 matsuura.103.g: "Найдутся ли игры популярнее карт ханафуда?"