l_russian:
 matsuura.101.t: "Молодой человек хочет посетить Эдзо"
 matsuura.101.d: "[SCOPE.sCharacter('character_1_scope').GetFullName] - молодой человек, который хочет отправиться в Эдзо на севере.Однако, во владениях Мацумаэ действуют ограничения на поездки. Следует ли разрешить молодому человеку отправиться на северные острова?"
 matsuura.101.f: "\"Я хочу путешествовать повсюду! Эдзо, Морокоши, Тенджуку! Пожалуйста, позвольте мне увидеть чудеса света!\""
 matsuura.101.g: "He could study the landscape there!"
 matsuura.101.h: "I heard he is a poet, maybe he will be inspired by his travels?"
 matsuura.101.i: "Maybe he could create paintings of the region?"
 matsuura.101.j: "No one is allowed to leave."
 matsuura_allowed_travels_modifier: "Allowed Travel to Ezo"
 matsuura.102.t: "Западная химия"
 matsuura.102.d: "[SCOPE.sCharacter('character_1_scope').GetFullName] has studied Rangaku, Western studies for years. Now he is about to write a book about something called \"Chemistry\". Maybe supporting him would be a good idea."
 matsuura.102.f: "\"You see, a man from a far of land conducted experiments...\"\n\"You want to know what experiments are? If you have a theory...\"\n\"Oh, you don't know what a theory is either...\""
 matsuura.102.g: "Что это за \"химия\", о которой он всё говорит?"
 matsuura.102.h: "Варварские идеи!"
 matsuura_barbarian_ideas_modifier: "Варварские идеи"
 matsuura_nintendo_modifier: "Карты ханафуда от Nintendo"
 matsuura.103.t: "Nintendo"
 matsuura.103.d: "В Киото, Фусаджиро Ямаучи основал фабрику игральных карт, целиком посвящённую производству популярных карт ханафуда. Она быстро завоевала лидирующие позиции на рынке по всей Японии. Название компании - Nintendo."
 matsuura.103.f: "'Just sit back and relax, my friend\nToday's lesson won't take too long\nAnd to make it more interesting\nIt takes the form of this nerdy song\nThe year is 1889 before the accolades and awards\nNintendo got its start from making hanafuda cards\n\nFor a century, they grew and planned to discover just what sells\nMaking vacuums and Ultra Hand and love testers and love hotels\nBut they soon zeroed in on games like the Game & Watch and Color TV\nIn '81, they made Donkey Kong and the rest is history!\n\nThis is the history of Nintendo\nSpanning the years, Hanafuda to Mario\nStraight from Kyoto, with a guy named Miyamoto\nThis is the history of Nintendo'\n\n-Matthew Taranto"
 matsuura.103.g: "Are there any games that could be more popular than Hanafuda cards?"