l_russian:
 MR_SPORTS_MOUNTAINEERN_TT: "[AddLocalizationIf( Scope.IsSet , 'douglas_mountaineer_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'douglas_mountaineer_no_mountaineer_achievements_loc')]"
 douglas_mountaineer_achievements_loc: "$douglas_mountaineer_achievements_intro_loc$[AddLocalizationIf( Scope.Var('douglas_mountaineer_achievement_mount_everest_loc').IsSet , Scope.Var('douglas_mountaineer_achievement_mount_everest_loc').GetFlagName)]"
 douglas_mountaineer_no_mountaineer_achievements_loc: "Здесь будут отображаться #V достижения этого [Concept('concept_douglas_mountaineer', 'альпиниста')]#!, как только он у вас появится."
 douglas_mountaineer_achievements_intro_loc: "#V Достижения этого альпиниста#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] - альпинист с опытом [Scope.Var('douglas_mountaineer_experience_var').GetValue|V0]. К настоящему моменту [SelectLocalization(Scope.GetCharacter.IsFemale, 'она совершила', 'он совершил')] [Scope.Var('douglas_mountaineer_num_mountain_ascents_var').GetValue|V0] восхождений. Из них [Scope.Var('douglas_mountaineer_num_summits_reached_var').GetValue|V0] были успешными, [Scope.Var('douglas_mountaineer_num_climbs_aborted_var').GetValue|V0] - прерваны, а [Scope.Var('douglas_mountaineer_num_disasters_suffered_var').GetValue|V0] закончились катастрофой.#!"
 douglas_mountaineer_achievement_mount_everest_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] считается первым человеком, который #V [SelectLocalization(Scope.GetCharacter.IsFemale, 'покорила', 'покорил')] Эверест#!, и, следовательно, одним из самых знаменитых альпинистов всех времён.#!"