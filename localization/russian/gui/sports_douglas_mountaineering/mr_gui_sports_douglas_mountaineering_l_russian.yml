l_russian:
 MR_MOUNTAIN_GENERAL_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть #V генерал#! с [Concept('concept_character_trait', 'чертой')] #V $douglas_mountaineer$#!, #V $douglas_mountaineer_veteran$#!, #V $mountain_commander$#!, #V $surveyor$#! или #V $explorer$#!.#!"
 MR_MOUNTAINEERING_CLUB_BUTTON: "Альпинистский клуб"
 MR_MOUNTAINEERING_CLUB_BUTTON_TT: "#T Основать альпинистский клуб#!\nАльпинистский клуб - это первый шаг нации к организованному альпинизму. Его должен основать опытный джентльмен (или леди) с альпинистскими навыками. Из этого клуба затем смогут выйти новые альпинисты, чтобы покорять вершины мира!\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_BUTTON: "Альпийский клуб"
 MR_ALPINE_CLUB_BUTTON_TT: "#T Основать Альпийский клуб#!\nОснованный в Лондоне в 1857 году, Альпийский клуб является старейшей альпинистской организацией в мире. Его создание ознаменовало начало организованного альпинизма в викторианской Англии. Клуб стремился содействовать научным, географическим и спортивным исследованиям Альп. Среди его основателей был Эдуард Уимпер, совершивший первое восхождение на Маттерхорн в 1865 году. Альпийский клуб сыграл ключевую роль во время «золотого века альпинизма» и опубликовал влиятельные работы, включая Alpine Journal. Он установил стандарты для будущих альпинистских клубов по всему миру.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_TRIGGER_TT: "#default_text Как минимум у #G 6#! стран есть альпинистский клуб.#!"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON: "Стать президентом Альпийского клуба"
 MR_ALPINE_CLUB_PRESIDENT_BUTTON_TT: "#T Стать президентом Альпийского клуба#!\nПока у Альпийского клуба нет действующего президента, мы можем занять эту должность. Это предполагает, что мы контролируем штаб-квартиру Альпийского клуба.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_CONTROLS_HQ_TRIGGER_TT: "#default_text Сооружение «[GetBuildingType('building_douglas_alpine_club').GetName]» находится под контролем [GetPlayer.GetAltNameNoFlag('RU_CL_RP')].#!"
 douglas_alpine_club_board_member_tt: "В правление Альпийского клуба входит представитель [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]."
 douglas_become_alpine_club_president_tt: "Президентом Альпийского клуба становится представитель [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]."
 MR_ALPINE_CLUB_EXPERIENCE_TRIGGER_TT: "#default_text У альпиниста есть как минимум #p 50#! #V единиц опыта#!.#!"
 MR_RECRUIT_MOUNTAINEER_BUTTON: "Нанять альпиниста"
 MR_RECRUIT_MOUNTAINEER_BUTTON_TT: "#T Нанять альпиниста#!\nПри наличии альпинистского клуба можно нанимать новых альпинистов. Для этого, конечно, требуется достаточное количество [Concept('concept_douglas_alpine_heritage', 'альпийского наследия')].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAINEERING_CLUB_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть #V альпинистский клуб#!.#!"
 MR_ALPINE_HERITAGE_50_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть как минимум #G 50#! ед. [Concept('concept_douglas_alpine_heritage', 'альпийского наследия')].#!"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON: "Горнострелковый полк"
 MR_MOUNTAIN_TROOPS_REGIMENT_BUTTON_TT: "#T Горнострелковый полк#!\nПодходящий генерал, при наличии горного региона с населением, страстно преданным своему отечеству, может сформировать полк, обученный тактике горной пехоты.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_HERITAGE_25_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть как минимум #G 50#! ед. [Concept('concept_douglas_alpine_heritage', 'альпийского наследия')].#!"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON: "Альпинистское снаряжение"
 MR_MOUNTAINEERING_EQUIPMENT_BUTTON_TT: "#T Альпинистское снаряжение#!\nУлучшенное #V альпинистское снаряжение#! повышает шансы на успех. Каждый новый уровень требует изучения новых технологий.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
