 MR_MOUNTAIN_EQUIPMENT_4_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть модификатор #V $douglas_mountaineering_equipment_level_4_modifier$#!.#!"
 MR_MOUNTAIN_EQUIPMENT_5_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть модификатор #V $douglas_mountaineering_equipment_level_5_modifier$#!.#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_1_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] владеет как минимум одной непокорённой [Concept('concept_douglas_mountain_summit', 'горной вершиной')] #V 1-го уровня#! или имеет #V лицензию на альпинизм#! со страной, которая владеет таковой. Для получения дополнительной информации обратитесь к [Concept('concept_douglas_mountain_summit_list', 'списку горных вершин')].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_2_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] владеет как минимум одной непокорённой [Concept('concept_douglas_mountain_summit', 'горной вершиной')] #V 2-го уровня#! или имеет #V лицензию на альпинизм#! со страной, которая владеет таковой. Для получения дополнительной информации обратитесь к [Concept('concept_douglas_mountain_summit_list', 'списку горных вершин')].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_3_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] владеет как минимум одной непокорённой [Concept('concept_douglas_mountain_summit', 'горной вершиной')] #V 3-го уровня#! или имеет #V лицензию на альпинизм#! со страной, которая владеет таковой. Для получения дополнительной информации обратитесь к [Concept('concept_douglas_mountain_summit_list', 'списку горных вершин')].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_4_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] владеет как минимум одной непокорённой [Concept('concept_douglas_mountain_summit', 'горной вершиной')] #V 4-го уровня#! или имеет #V лицензию на альпинизм#! со страной, которая владеет таковой. Для получения дополнительной информации обратитесь к [Concept('concept_douglas_mountain_summit_list', 'списку горных вершин')].#!"
 MR_MOUNTAIN_UNCONQUERED_LEVEL_5_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] владеет как минимум одной непокорённой [Concept('concept_douglas_mountain_summit', 'горной вершиной')] #V 5-го уровня#! или имеет #V лицензию на альпинизм#! со страной, которая владеет таковой. Для получения дополнительной информации обратитесь к [Concept('concept_douglas_mountain_summit_list', 'списку горных вершин')].#!"
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON: "Экспедиция: вершины 1 ур."
 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON_TT: "#T Альпинистская экспедиция: вершины 1-го уровня#!\nНа горы этой категории можно взойти с альпинистским снаряжением 1-го уровня. Уровень не указывает на высоту или риск. К этим вершинам относятся: Уитни, Орисаба, Попокатепетль, Чимборасо, пик Ането, Монблан, Гросвенедигер, Камерун, Рас-Дашен и Гилуве. Для получения дополнительной информации обратитесь к [Concept('concept_douglas_mountain_summit_list', 'списку горных вершин')].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON: "Экспедиция: вершины 2 ур."
 MR_MOUNTAIN_EXPEDITION_LEVEL_2_BUTTON_TT: "#T Альпинистская экспедиция: вершины 2-го уровня#!\nНа горы этой категории можно взойти с альпинистским снаряжением 2-го уровня. Уровень не указывает на высоту или риск. К этим вершинам относятся: Кибо (Килиманджаро), пик Дюфур, гора Кука и гора Вильгельм. Для получения дополнительной информации обратитесь к [Concept('concept_douglas_mountain_summit_list', 'списку горных вершин')].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON: "Экспедиция: вершины 3 ур."
 MR_MOUNTAIN_EXPEDITION_LEVEL_3_BUTTON_TT: "#T Альпинистская экспедиция: вершины 3-го уровня#!\nНа горы этой категории можно взойти с альпинистским снаряжением 3-го уровня. Уровень не указывает на высоту или риск. К этим вершинам относятся: гора Святого Ильи, Аконкагуа, Эгюий-Верт, Маттерхорн, гора Кения и гора Стэнли. Для получения дополнительной информации обратитесь к [Concept('concept_douglas_mountain_summit_list', 'списку горных вершин')].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON: "Экспедиция: вершины 4 ур."
 MR_MOUNTAIN_EXPEDITION_LEVEL_4_BUTTON_TT: "#T Альпинистская экспедиция: вершины 4-го уровня#!\nНа горы этой категории можно взойти с альпинистским снаряжением 4-го уровня. Уровень не указывает на высоту или риск. К этим вершинам относятся: Логан, Денали, Ильимани, Монте-Писсис, Шхара, Камет, пик Кауфмана и Гунгашань. Для получения дополнительной информации обратитесь к [Concept('concept_douglas_mountain_summit_list', 'списку горных вершин')].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON: "Экспедиция: вершины 5 ур."
 MR_MOUNTAIN_EXPEDITION_LEVEL_5_BUTTON_TT: "#T Альпинистская экспедиция: вершины 5-го уровня#!\nНа горы этой категории можно взойти с альпинистским снаряжением 5-го уровня. Уровень не указывает на высоту или риск. К этим вершинам относятся: Уаскаран, Чоголиза и Кабру. Для получения дополнительной информации обратитесь к [Concept('concept_douglas_mountain_summit_list', 'списку горных вершин')].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAINEER_TRAINING_BUTTON: "Тренировка альпинистов"
 MR_MOUNTAINEER_TRAINING_BUTTON_TT: "#T Тренировка альпинистов#!\nСтраны могут тренировать своих альпинистов, если у них есть горные хребты или покорённые вершины, которые считаются безопасными.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPORTS_MOUNTAINEER_EXPEDITIONS_TAB: "Экспедиции"
 MR_SPORTS_MOUNTAINEER_ORGANISATION_TAB: "Организация"
 MR_SPORTS_MOUNTAINEER_CLUB_TAB: "Клуб"
 MR_ALPINE_CLUB_START_EXPEDITION_BUTTON: "Начать международную экспедицию"
 MR_ALPINE_CLUB_START_EXPEDITION_BUTTON_TT: "#T Начать международную экспедицию#!\nПрезидент Альпийского клуба имеет право инициировать международную альпинистскую экспедицию. Это возможно только раз в десять лет.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_PROPOSE_EXPEDITION_BUTTON: "Предложить международную экспедицию"
 MR_ALPINE_CLUB_PROPOSE_EXPEDITION_BUTTON_TT: "#T Предложить международную экспедицию#!\nЧлены правления Альпийского клуба имеют право предложить международную альпинистскую экспедицию. Предложение должно быть одобрено президентом.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALPINE_CLUB_JOIN_EXPEDITION_BUTTON: "Присоединиться к международной экспедиции"
 MR_ALPINE_CLUB_JOIN_EXPEDITION_BUTTON_TT: "#T Присоединиться к международной экспедиции#!\nБудучи членом правления Альпийского клуба, мы должны принять участие в международной альпинистской экспедиции, чтобы обеспечить её успех.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_RECENT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text Последняя международная экспедиция была как минимум 10 лет назад.#!"
 MR_MOUNTAIN_RECENT_INTERNATIONAL_EXPEDITION_NO_SETBACK_TRIGGER_TT: "#default_text Президент Альпийского клуба не накладывал вето на международную экспедицию.#!"
 MR_MOUNTAIN_EQUIPMENT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text У президента есть необходимое снаряжение (уровня 3, 4 или 5) для проведения международной экспедиции.#!"
 MR_MOUNTAIN_UNCONQUERED_SUMMIT_INTERNATIONAL_EXPEDITION_TRIGGER_TT: "#default_text Осталась как минимум одна непокорённая вершина 2-го, 3-го или 4-го уровня.#!"
 MR_ALPINE_PRESIDENT_HAS_ACTIVE_MOUNTAINEER_TRIGGER_TT: "#default_text У президента есть свободный [Concept('concept_douglas_mountaineer', 'альпинист')].#!"
 MR_MOUNT_EVEREST_EXPEDITION_BUTTON: "Экспедиция на Эверест"
 MR_MOUNT_EVEREST_EXPEDITION_BUTTON_TT: "#T Экспедиция на Эверест#!\nБудучи высочайшей горой в мире, Эверест - мечта всех альпинистов. Но является ли экспедиция туда исполнением всех альпинистских мечтаний или, скорее, проявлением мании величия?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_7000_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] покорил[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] гору высотой не менее #V 7000 метров#!. Для получения дополнительной информации обратитесь к [Concept('concept_douglas_mountain_summit_list', 'списку горных вершин')].#!"
