 DOUGLAS_MOUNTAIN_EQUIPMENT_LEVEL_4_TT: "#header Снаряжение 4-го уровня#!\nДля восхождения на эту гору требуется #V альпинистское снаряжение#! не ниже #V 4-го#! уровня."
