 DOUGLAS_MOUNTAIN_EQUIPMENT_LEVEL_3_TT: "#header Снаряжение 3-го уровня#!\nДля восхождения на эту гору требуется #V альпинистское снаряжение#! не ниже #V 3-го#! уровня."
