 DOUGLAS_MOUNTAIN_LOW_RISK: "@douglas_risk_low_icon!"
 DOUGLAS_MOUNTAIN_LOW_RISK_TT: "@douglas_risk_low_icon! #p Низкий риск#!\nВосхождение на эту гору представляет низкий риск для [Concept('concept_douglas_mountaineer', 'альпинистов')]; маловероятно, что они погибнут в экспедиции."
 DOUGLAS_MOUNTAIN_NORMAL_RISK: "@douglas_risk_normal_icon!"
 DOUGLAS_MOUNTAIN_NORMAL_RISK_TT: "@douglas_risk_normal_icon! #orange Средний риск#!\nВосхождение на эту гору представляет средний риск для [Concept('concept_douglas_mountaineer', 'альпинистов')] и может привести к их гибели."
 DOUGLAS_MOUNTAIN_HIGH_RISK: "@douglas_risk_high_icon!"
 DOUGLAS_MOUNTAIN_HIGH_RISK_TT: "@douglas_risk_high_icon! #n Высокий риск#!\nВосхождение на эту гору представляет высокий риск для [Concept('concept_douglas_mountaineer', 'альпинистов')] и с большой вероятностью может привести к их гибели."
