 DOUGLAS_MOUNTAIN_EQUIPMENT_LEVEL_2: "2"
 DOUGLAS_MOUNTAIN_EQUIPMENT_LEVEL_2_TT: "#header Снаряжение 2-го уровня#!\nДля восхождения на эту гору требуется #V альпинистское снаряжение#! не ниже #V 2-го#! уровня."
