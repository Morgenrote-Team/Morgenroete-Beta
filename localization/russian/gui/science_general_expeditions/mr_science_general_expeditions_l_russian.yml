l_russian:
 MR_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T Трансатлантический кабель#!\nВикторианская наука явила чудо телеграфии, позволив информации преодолевать огромные расстояния с беспрецедентной скоростью. С созданием телеграфных станций по обе стороны Атлантики возникла идея прокладки подводного кабеля - подвиг, требующий передовых инженерных знаний и процветающего новостного сектора, готового инвестировать в это амбициозное предприятие.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_TT: "#T Суэцко-индийский кабель#!\nОткрытие Суэцкого канала, триумф викторианской изобретательности, усилило стремление соединить Европу и Индию прямым подводным кабелем. Такая связь произведёт революцию в коммуникациях, связав континенты воедино силой научного прогресса.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON: "Транстихоокеанский кабель"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON_TT: "#T Транстихоокеанский кабель#!\nПо мере расцвета пароходства и торговых путей викторианская наука подталкивает к прокладке подводного кабеля через Тихий океан. Этот технологический скачок сократит месяцы переписки до считанных минут, расширяя влияние и координацию по всему самому большому океану мира.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TRANSATLANTIC_CABLE_HAS_TELEGRAPH_COMPANY_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [Concept('concept_company', 'компания')] $mr_basic_telegraphy$.#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NO_TRANSATLANTIC_RADIO_TRIGGER_TT: "#default_text #V Никто#! ещё не отправлял #V радиосообщение через Атлантику#!.#!"
 MR_SUEZ_INDIA_CABLE_CANAL_TRIGGER_TT: "#default_text «[GetBuildingType('building_suez_canal').GetName]» построен.#!"
 MR_TRANSATLANTIC_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_investment_pool|l] размером не менее #V 5 миллионов#!.#!"
 MR_SUEZ_INDIA_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_investment_pool|l] размером не менее #V 10 миллионов#!.#!"
 MR_TRANSPACIFIC_CABLE_INVESTMENT_POOL_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_investment_pool|l] размером не менее #V 20 миллионов#!.#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] нет модификатора $tesla_transatlantic_cable_expedition_failed_modifier$.#!"
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] нет модификатора $tesla_suez_india_cable_expedition_failed_modifier$.#!"
 MR_TRANSPACIFIC_CABLE_EXPEDITION_BUTTON_NO_RECENT_FAIL_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] нет модификатора $tesla_transpacific_cable_expedition_failed_modifier$.#!"
 MR_ON_TRANSATLANTIC_CABLE_EXPEDITION_TT: "#T Трансатлантический кабель#!\n#p В настоящее время ведётся экспедиция по прокладке трансатлантического кабеля.#!\nВикторианская наука явила чудо телеграфии, позволив информации преодолевать огромные расстояния с беспрецедентной скоростью. С созданием телеграфных станций по обе стороны Атлантики возникла идея прокладки подводного кабеля - подвиг, требующий передовых инженерных знаний и процветающего новостного сектора, готового инвестировать в это амбициозное предприятие."
 MR_ON_SUEZ_INDIA_CABLE_EXPEDITION_TT: "#T Суэцко-индийский кабель#!\n#p В настоящее время ведётся экспедиция по прокладке суэцко-индийского кабеля.#!\nОткрытие Суэцкого канала, триумф викторианской изобретательности, усилило стремление соединить Европу и Индию прямым подводным кабелем. Такая связь произведёт революцию в коммуникациях, связав континенты воедино силой научного прогресса."
 MR_ON_TRANSPACIFIC_CABLE_EXPEDITION_TT: "#T Транстихоокеанский кабель#!\n#p В настоящее время ведётся экспедиция по прокладке транстихоокеанского кабеля.#!\nПо мере расцвета пароходства и торговых путей викторианская наука подталкивает к прокладке подводного кабеля через Тихий океан. Этот технологический скачок сократит месяцы переписки до считанных минут, расширяя влияние и координацию по всему самому большому океану мира."
 MR_SUEZ_INDIA_CABLE_EXPEDITION_BUTTON: "Суэцко-индийский кабель"
 MR_PACIFIC_END_OF_ERA_TRIGGER_TT: "#default_text #n Ни одна#! страна ещё не исследовала технологию «[GetTechnology('dreadnought').GetName]» или «[GetTechnology('destroyer').GetName]». Кроме того, сейчас #V ещё не#! 1896 год.#!"
 MR_TRANSATLANTIC_CABLE_EXPEDITION_BUTTON_NOT_ONGOING_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] нет [Concept('concept_journal_entry', 'записи в дневнике')] #V $je_tesla_transatlantic_cable$#!.#!"