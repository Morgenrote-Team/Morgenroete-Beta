 MR_GEOLOGIST_ACHIEVEMENTS: "[AddLocalizationIf( Scope.IsSet , 'agassiz_geologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'agassiz_geologist_no_geologist_loc')]" #deepl:4065666483

 agassiz_geologist_achievements_loc: "$agassiz_geologist_achievements_intro_loc$[AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_seismology_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_seismology_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').IsSet , Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_explored_volcano_var').IsSet , Scope.Var('agassiz_geologist_achievement_explored_volcano_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').GetFlagName)]" #deepl:1006055885
 agassiz_geologist_no_geologist_loc: "#V Достижения этого [concept_agassiz_geologist]#! будут отображаться здесь, как только вы их получите." #deepl:2266901269
 agassiz_geologist_achievements_intro_loc: "#V Достижения этого геолога#!\nД-р [Scope.GetCharacter.GetLastNameNoFormatting] является опытным геологом, который собрал [Scope.GetVariable('agassiz_geologist_minerals_var').GetValue|0V] [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] и [Scope.GetVariable('agassiz_geologist_rare_minerals_var').GetValue|0V] [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] . [Scope.GetCharacter.GetHerHis|U] исследования в области геологии предоставили нам [Scope.GetVariable('agassiz_geologist_geological_knowledge_var').GetValue|0V] [concept_agassiz_geological_knowledge] ." #deepl:2506244890

 agassiz_geologist_achievement_invented_seismology_loc: "\nИзобретение #V сейсмологии#! является одним из величайших достижений доктора [Scope.GetCharacter.GetLastNameNoFormatting]. Она позволяет предсказывать землетрясения и вулканические извержения." #deepl:4027906331
 agassiz_geologist_achievement_invented_plate_tectonics_loc: "\Является ли #V изобретение теории тектоники плит#! одним из величайших достижений доктора [Scope.GetCharacter.GetLastNameNoFormatting]? Поскольку не все [Scope.GetCharacter.GetHerHis] коллеги принимают теорию, только будущее покажет, будет ли она считаться [Scope.GetCharacter.GetHerHis] самым важным открытием или будет забыта." #deepl:1012351458
 agassiz_geologist_achievement_attended_geologist_congress_loc: "\nД-р [Scope.GetCharacter.GetLastNameNoFormatting] #V  посетил Геологический конгресс по тектонике плит#!." #deepl:941722190
 agassiz_geologist_achievement_explored_volcano_loc: "\n#V Исследование вулканов#! - опасное занятие, но доктор [Scope.GetCharacter.GetLastNameNoFormatting] многому научился во время экспедиции на один из них." #deepl:3489984187
 agassiz_geologist_achievement_discovered_helium_on_earth_loc: "\Доктор [Scope.GetCharacter.GetLastNameNoFormatting] был первым человеком, #V открывшим гелий на Земле#!, который, несомненно, станет очень полезным ресурсом в будущем." #deepl:1490724762
 agassiz_geologist_achievement_finished_pacific_expedition_loc: "\n[Scope.GetCharacter.GetFullNameNoFormatting] участвовал в #V Тихоокеанской экспедиции#!." #deepl:1964542330
 agassiz_geologist_achievement_returned_from_center_of_earth_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting], по-видимому, #V достиг центра Земли#! и вернулся оттуда снова. Но действительно ли эта история правдива?" #deepl:3298936682
