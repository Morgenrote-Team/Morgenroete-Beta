l_russian:
 MR_GEOLOGIST_ACHIEVEMENTS: "[AddLocalizationIf( Scope.IsSet , 'agassiz_geologist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'agassiz_geologist_no_geologist_loc')]"
 agassiz_geologist_achievements_loc: "$agassiz_geologist_achievements_intro_loc$[AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_seismology_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_seismology_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').IsSet , Scope.Var('agassiz_geologist_achievement_invented_plate_tectonics_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').IsSet , Scope.Var('agassiz_geologist_achievement_attended_geologist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_explored_volcano_var').IsSet , Scope.Var('agassiz_geologist_achievement_explored_volcano_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_discovered_helium_on_earth_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('agassiz_geologist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('aagassiz_geologist_achievement_ring_of_fire_discovered_var').IsSet , Scope.Var('agassiz_geologist_achievement_ring_of_fire_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_moon_impact_var').IsSet , Scope.Var('agassiz_geologist_achievement_moon_impact_var').GetFlagName)][AddLocalizationIf( Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').IsSet , Scope.Var('agassiz_geologist_achievement_returned_from_center_of_earth_var').GetFlagName)]"
 agassiz_geologist_no_geologist_loc: "Здесь будут отображаться достижения этого [Concept('concept_agassiz_geologist', '#b #GREEN геолога#!#!')]#!, как только он у вас появится."
 agassiz_geologist_achievements_intro_loc: "#V Достижения этого геолога#!\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] — выдающийся геолог. [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она собрала', 'Он собрал')] [Scope.GetVariable('agassiz_geologist_minerals_var').GetValue|0V] [Concept('concept_agassiz_mineral', 'минералов')] и [Scope.GetVariable('agassiz_geologist_rare_minerals_var').GetValue|0V] [Concept('concept_agassiz_rare_mineral', 'редких минералов')]. [SelectLocalization(Scope.GetCharacter.IsFemale, 'Её', 'Его')] исследования в области геологии принесли нам [Scope.GetVariable('agassiz_geologist_geological_knowledge_var').GetValue|0V] ед. [Concept('concept_agassiz_geological_knowledge', 'геологического знания')].#!"
 agassiz_geologist_achievement_invented_seismology_loc: "\n #indent_newline:3 • #V Изобретение сейсмологии#! — одно из величайших достижений доктора [Scope.GetCharacter.GetLastNameNoFormatting]. Оно позволяет предсказывать землетрясения и извержения вулканов.#!"
 agassiz_geologist_achievement_invented_plate_tectonics_loc: "\n #indent_newline:3 • Является ли #V создание теории тектоники плит#! одним из величайших достижений доктора [Scope.GetCharacter.GetLastNameNoFormatting]? Не все из [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] коллег принимают эту теорию, поэтому только время покажет, будет ли она считаться [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] самым важным открытием или канет в Лету.#!"
 agassiz_geologist_achievement_attended_geologist_congress_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V посетил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] Геологический конгресс по тектонике плит#!.#!"
 agassiz_geologist_achievement_explored_volcano_loc: "\n #indent_newline:3 • #V Исследование вулкана#! — опасное предприятие, но доктор [Scope.GetCharacter.GetLastNameNoFormatting] многому научил[SelectLocalization(Scope.GetCharacter.IsFemale, 'ась', 'ся')] в экспедиции к одному из них.#!"
 agassiz_geologist_achievement_discovered_helium_on_earth_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] перв[SelectLocalization(Scope.GetCharacter.IsFemale, 'ой', 'ым')] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] гелий на Земле#!, который, несомненно, станет очень полезным ресурсом в будущем.#!"
 agassiz_geologist_achievement_finished_pacific_expedition_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetFullNameNoFormatting] участвовал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] в #V тихоокеанской экспедиции#!.#!"
 agassiz_geologist_achievement_returned_from_center_of_earth_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting], по-видимому, #V достиг[SelectLocalization(Scope.GetCharacter.IsFemale, 'ла', '')] центра Земли#! и вернул[SelectLocalization(Scope.GetCharacter.IsFemale, 'ась', 'ся')] оттуда. Но правдива ли эта история?#!"
 agassiz_geologist_achievement_moon_impact_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] выдвинул[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] гипотезу о том, что #V Луна образовалась в результате столкновения неизвестного крупного небесного тела с Землёй#!. Весьма умозрительная теория, но отличающаяся большой оригинальностью.#!"
 agassiz_geologist_achievement_ring_of_fire_discovered_loc: "\n #indent_newline:3 • Во время #V экспедиции в Тихий океан#! доктор [Scope.GetCharacter.GetLastNameNoFormatting] отметил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] огромную концентрацию вулканов на краю океана — #V Тихоокеанское вулканическое огненное кольцо#! — и считает, что это не было случайностью. Таким образом, [SelectLocalization(Scope.GetCharacter.IsFemale, 'она', 'он')] дал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] важный толчок геологическим исследованиям.#!"