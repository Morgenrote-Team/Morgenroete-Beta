l_russian:
 mr_science_geologist_tab_organization: "Организация"
 MR_GEOLOGIST_HIGHEST_MOUNTAIN_BUTTON: "Высочайшая гора"
 MR_GEOLOGIST_HIGHEST_MOUNTAIN_BUTTON_TT: "#T Высочайшая гора#!\nС XVIII века существующее геологическое мировоззрение всё чаще подвергается сомнению. Долгое время самым высоким горным хребтом мира считались Анды, но теперь на первый план выходят Гималаи. Поиски высочайшей горы будоражат воображение геологов, и они ещё далеки от завершения.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_HIMALAYAS_ACCESS_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть интерес в гималайском регионе.#!"
 MR_GEOLOGIST_NO_HIMALAYA_SURVEY_TRIGGER_TT: "#default_text В настоящее время ни одна другая держава не исследует Гималаи в поисках высочайшей горы.#!"
 MR_GEOLOGIST_URANIUM_BUTTON: "Урановая экспедиция"
 MR_GEOLOGIST_URANIUM_BUTTON_TT: "#T Урановая экспедиция#!\nГеолог может искать месторождения урана за границей и, возможно, основать там собственный рудник. Однако, чтобы получать уран в нашу страну, мы должны будем заключить отдельный контракт. Этот процесс может занять до пяти лет.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_FIND_URANIUM_TRIGGER_TT: "#default_text Существует как минимум одно неоткрытое месторождение урана.#!"
 MR_GEOLOGIST_URANIUM_STOP_BUTTON_TT: "#T Урановая экспедиция#!\nВаш [Concept('concept_agassiz_geologist', '#b #GREEN геолог#!#!')] в настоящее время ищет неизвестные месторождения урана по всему миру.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_geologist_uranium_stop_button_effect_tt: "Ваш [Concept('concept_agassiz_geologist', '#b #GREEN геолог#!#!')] прекратит разведку урана."