l_russian:
 MR_PADDOCK_IMPROVE_ENGINE_BUTTON: "Улучшить двигатель"
 MR_PADDOCK_IMPROVE_ENGINE_BUTTON_TT: "#T Улучшить двигатель#!\nНовый двигатель повышает надёжность и скорость автомобиля.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PADDOCK_IMPROVE_SAFETY_BUTTON: "Повысить безопасность"
 MR_PADDOCK_IMPROVE_SAFETY_BUTTON_TT: "#T Повысить безопасность#!\nМеханик может разработать различные новые технологии безопасности, чтобы защитить жизнь гонщика.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PADDOCK_IMPROVE_BODY_BUTTON: "Улучшить кузов"
 MR_PADDOCK_IMPROVE_BODY_BUTTON_TT: "#T Улучшить кузов#!\nУлучшение кузова автомобиля обеспечивает лучшую аэродинамику и, следовательно, большую скорость, а улучшение материала повышает безопасность.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MECHANIC_TRIGGER: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_vikelas_mechanic].#!"
