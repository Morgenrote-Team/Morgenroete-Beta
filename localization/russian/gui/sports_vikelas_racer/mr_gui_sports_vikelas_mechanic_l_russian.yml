 MR_PADDOCK_MOTOR_INDUSTRY_LEVEL_10_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть в общей сложности #V 10 или более#! уровней сооружений «[GetBuildingType('building_automotive_industry').GetName]»#!.#!"
