 MR_PADDOCK_INNOVATION_TO_RESEARCH_BUTTON: "Преобразовать мех. инновации"
 MR_PADDOCK_INNOVATION_TO_RESEARCH_BUTTON_TT: "#T Преобразовать механические инновации#!\nПреобразуйте механические инновации в очки исследования, чтобы вся нация извлекла выгоду из достижений автоспорта.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
