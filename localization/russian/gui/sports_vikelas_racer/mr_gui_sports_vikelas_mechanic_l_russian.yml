 MR_PADDOCK_FIRE_MECHANIC_BUTTON: "Уволить механика"
 MR_PADDOCK_FIRE_MECHANIC_BUTTON_TT: "#T Уволить механика#!\nГоночные команды могут освободить должность механика, если текущий специалист не соответствует ожиданиям. Однако нового механика можно будет нанять только через два года.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PADDOCK_FIRE_RACER_BUTTON: "Уволить гонщика"
 MR_PADDOCK_FIRE_RACER_BUTTON_TT: "#T Уволить гонщика#!\nВ отличие от прежних джентльменов-гонщиков, пилоты гоночной команды не являются незаменимыми. После найма нового гонщика эту должность нельзя будет занять в течение двух лет.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HAS_MECHANIC_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_vikelas_mechanic].#!"
 MR_NOT_HAS_NEW_MECHANIC_TT: "#default_text [GetPlayer.GetName] #R не нанимал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')]#! [Concept('concept_vikelas_mechanic', 'механика')] в #V последние два года#!.#!"
