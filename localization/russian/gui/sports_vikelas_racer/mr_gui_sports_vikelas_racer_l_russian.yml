 MR_AUTORACING_FOUND_AUTOMOBILE_CLUB_BUTTON: "Основать автомобильный клуб"
 MR_AUTORACING_FOUND_AUTOMOBILE_CLUB_BUTTON_TT: "#T Основать автомобильный клуб#!\nСоздание автомобильного клуба - это первый шаг к строительству других объектов, необходимых для автоспорта.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_LONG_DISTANCE_BUTTON: "Гонка на выносливость"
 MR_AUTORACING_LONG_DISTANCE_BUTTON_TT: "#T Организовать гонку на выносливость#!\nГонки на выносливость, часто между городами, были нормой в ранние дни автомобильных гонок и продолжались до середины XX века. В Италии лучшими примерами являются такие гонки, как Targa Florio или Mille Miglia. Они подвергали человека и машину особому испытанию и долгое время считались настоящими национальными автогонками.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON: "Основать Гран-при"
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON_TT: "#T Основать гонки Гран-при#!\nВ 1906 году был организован первый официальный Гран-при в истории автомобилестроения - гонка за Гран-при ACF. Независимо от страны происхождения, было допущено до трёх гоночных автомобилей от каждого автопроизводителя, как первоначально просили представители французской промышленности. В соответствии со статусом самого важного из всех соревнований, гонка проводилась на дистанции более 1200 км в течение двух дней подряд. В 1925 году по инициативе Автомобильного клуба Италии было наконец объявлено о введении официального чемпионата мира. В качестве зачётных гонок были назначены три официальные гонки Гран-при сезона (Франция, Италия и Бельгия), а также Индианаполис как важнейшее американское гоночное событие.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_FOUND_GRAND_PRIX_BUTTON_TRIGGER_TT: "#default_text #V Как минимум 5 других стран#! имеют #V автомобильный клуб#! и исследовали технологию «[GetTechnology('vikelas_international_sports_tech').GetName]».#!"
 MR_AUTORACING_RACE_TRACK_BUTTON: "Построить гоночную трассу"
 MR_AUTORACING_RACE_TRACK_BUTTON_TT: "#T Построить гоночную трассу#!\nС появлением гонок Гран-при стационарная гоночная трасса всё чаще становится нормой для автогонок. Специализированная трасса не только централизовала бы международные гоночные события в одном месте, но и как тестовый трек давала бы нашим гонщикам ежегодный бонус к опыту.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HAS_RACER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_vikelas_racer].#!"
 MR_AUTORACING_RACE_TRACK_BUTTON_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [Concept('concept_incorporated_state', 'национальная область')] с сооружением «[GetBuildingType('building_urban_center').GetName]» #V 15-го уровня или выше#!.#!"
 MR_AUTORACING_FOUND_TEAM_BUTTON: "Основать гоночную команду"
 MR_AUTORACING_FOUND_TEAM_BUTTON_TT: "#T Основать гоночную команду#!\nНаличие собственного производителя гоночных автомобилей делает нас независимыми от импорта и может помочь нам в разработке собственных машин. Это требует наличия собственной автомобильной промышленности и инженера для разработки базовых планов.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_FOUND_TEAM_BUTTON_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть как минимум одно сооружение «[GetBuildingType('building_automotive_industry').GetName]» уровня #p 2#! или выше с [Concept('concept_production_method', 'методом производства')] #V «Автомобильное производство»#!.#!"
 MR_AUTORACING_RACE_TRACK_APPLY_BUTTON: "Подать заявку на трассу Гран-при"
 MR_AUTORACING_RACE_TRACK_APPLY_BUTTON_TT: "#T Подать заявку на трассу Гран-при#!\nБудучи членом Международной автомобильной ассоциации и владельцем современной гоночной трассы, мы можем подать заявку на то, чтобы наша трасса стала официальной трассой Гран-при. Тогда там будут ежегодно проводиться гонки Гран-при, что значительно повысит статус трассы.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HAS_RACE_TRACK_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть как минимум одно сооружение «[GetBuildingType('building_vikelas_circuit').GetName]».#!"
 MR_MAXIMUM_5_RACE_TRACKS_TT: "#default_text Менее 5 стран имеют «[GetBuildingType('building_vikelas_circuit').GetName]».#!"
 MR_AIACR_PRESIDENT_BUTTON: "Стать президентом AIACR"
 MR_AIACR_PRESIDENT_BUTTON_TT: "#T Стать президентом AIACR#!\nПока у AIACR нет действующего президента, мы можем занять эту должность. Это предполагает, что мы контролируем штаб-квартиру Международной автомобильной ассоциации.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AIACR_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName] контролирует сооружение «[GetBuildingType('building_vikelas_aiacr').GetName]»#!."
 MR_AUTORACING_RACE_TRACK_DECLARE_BUTTON: "Объявить трассу Гран-при"
 MR_AUTORACING_RACE_TRACK_DECLARE_BUTTON_TT: "#T Объявить трассу Гран-при#!\nКак президент AIACR, мы имеем привилегию объявить одну из наших гоночных трасс трассой Гран-при.[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IS_AIACR_PRESIDENT_TT: "#default_text [GetPlayer.GetName] явля[GetPlayer.GetAltNameNoFormatting('RU_CL_END_T')]ся #V президентом AIACR#!.#!"
 MR_AUTORACING_FOUND_AIACR_BUTTON: "Автомобильная ассоциация"
 MR_AUTORACING_FOUND_AIACR_BUTTON_TT: "#T Автомобильная ассоциация#!\nГонки всё больше становятся международным видом спорта, в котором гонщики соревнуются на автомобилях разных марок из разных стран. Многие страны начали проводить собственные гонки без каких-либо соглашений. Для лучшей координации правил и условий необходимо создание международного органа: Международной автомобильной ассоциации.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AUTORACING_FOUND_AIACR_BUTTON_TRIGGER_TT: "#default_text #V Как минимум 10 других стран#! имеют #V автомобильный клуб#!.#!"
 MR_AUTORACING_NO_PARTICIPATION_BUTTON_TT: "#T Отменить участие в гонках#!\nВ определённых ситуациях, например, когда гонщик считается слишком вспыльчивым или автомобиль слишком «сырым», что может привести к разрушительной аварии, может иметь смысл приостановить участие в гонках.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 vikelas_no_participation_tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] не будет участвовать ни в каких гонках до тех пор, пока участие в них снова не будет разрешено."
 MR_AUTORACING_PARTICIPATION_BUTTON_TT: "#T Участие в гонках#!\nПозволяет гонщику снова участвовать во всех гонках.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 vikelas_participation_tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] снова будет принимать участие в гонках в обычном режиме."
 MR_AUTORACING_LONG_DISTANCE_NOT_ONGOING_TRIGGER_TT: "#default_text #R Ни одна#! другая страна в настоящее время не проводит #V гонку на выносливость#!.#!"
 MR_AUTORACING_LONG_DISTANCE_STATE_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть как минимум #V 5 [Concept('concept_state', 'областей')]#!.#!"
 MR_AUTORACING_LONG_DISTANCE_MODIFIER_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] в последнее время #R не проводилась#! #V гонка на выносливость#!.#!"
