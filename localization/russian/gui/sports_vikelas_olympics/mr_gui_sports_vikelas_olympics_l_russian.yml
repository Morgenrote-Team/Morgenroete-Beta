 VISIT_IOC_BUTTON: "Посетить МОК"
 MR_VISIT_IOC_POSSIBLE_FOUNDED_TT: "#default_text #V Международный олимпийский комитет был основан#!.#!"
 MR_VISIT_IOC_POSSIBLE_TT: "#default_text В данный момент вы #V не посещаете МОК#!.#!"
 VISIT_IOC_BUTTON_TT: "#T Посетить Международный олимпийский комитет#!\nПосетите Международный олимпийский комитет, чтобы получить информацию о его членах, следующих Олимпийских играх или международной медальной таблице.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_FOUNDATION_BUTTON: "Основать МОК"
 MR_IOC_FOUNDATION_BUTTON_TT: "#T Основать Международный олимпийский комитет#!\nМеждународный олимпийский комитет (МОК) — это неправительственная организация в юридической форме ассоциации. Цель комитета — организация и контроль современных Олимпийских игр. Страна-основатель имеет постоянное место в правлении, которое принимает решения о местах проведения Олимпийских игр. Вскоре после основания МОК могут быть организованы первые Олимпийские игры, которые с тех пор будут проходить каждые четыре года. При определённых условиях другие страны могут присоединиться к МОК в качестве постоянных членов, но количество мест в правлении ограничено.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_FOUNDATION_HAS_ACADEMIC_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть как минимум один [concept_academics_academic].#!"
 MR_IOC_FOUNDATION_PEACE_TRIGGER_TT: "#default_text [GetPlayer.GetName] находится в состоянии мира.#!"
 MR_IOC_MEMBER_BUTTON: "Вступить в МОК"
 MR_IOC_MEMBER_BUTTON_TT: "#T Стать членом МОК#!\nВступите в Международный олимпийский комитет, чтобы соревноваться на Олимпийских играх, проходящих раз в четыре года. Члены МОК также имеют шанс провести игры в своей стране.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_MEMBER_INFAMY_TRIGGER_TT: "#default_text [Concept('concept_infamy', 'Дурная слава')] [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] ниже #n 50#!.#!"
 MR_IOC_MEMBER_NOT_UNRECOGNIZED_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V не является непризнанной державой#!.#!"
 MR_IOC_MEMBER_NOT_HOSTING_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V не является текущим хозяином Олимпиады#!.#!"
 MR_IOC_BRIBE_BUTTON: "Подкупить МОК"
 MR_IOC_BRIBE_BUTTON_TT: "#T Подкупить МОК#!\nЩедрым «пожертвованием» правлению МОК мы можем заручиться благосклонностью его членов и быть выдвинуты в качестве четвёртого кандидата при выборе места проведения следующих Олимпийских игр. Однако нет никакой гарантии, что в итоге выберут именно нас. Другие члены МОК также могут неправильно истолковать нашу щедрость.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_BRIBE_NOT_BRIBING_ALREADY_TRIGGER_TT: "#default_text [GetPlayer.GetName] в данный момент #V не подкупает МОК#!.#!"
 MR_OLYMPIC_FLAME_BUTTON: "Олимпийский огонь"
 MR_OLYMPIC_FLAME_BUTTON_TT: "#T Олимпийский огонь#!\nОлимпийский огонь, основанный на вечно горящем огне в очаге греческой богини Гестии, был впервые представлен на Олимпийских играх 1928 года в Амстердаме. Традиция связанной с ним эстафеты олимпийского огня была введена на летних Играх в Берлине в 1936 году. Вопреки распространённому мнению, идея исходила не от национал-социалистов, а от немецко-еврейского археолога Альфреда Шиффа. Введение этой традиции не только дало бы Олимпийским играм новый символ идентификации, но и ежегодно объединяло бы население и служило бы воодушевляющим символом, отвлекающим от других проблем.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_OLYMPIC_FLAME_IS_HOST_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V готовится принять следующие Олимпийские игры#!.#!"
 MR_IOC_PRESIDENT_BUTTON: "Стать президентом МОК"
 MR_IOC_PRESIDENT_BUTTON_TT: "#T Стать президентом МОК#!\nПока у МОК нет действующего президента, мы можем занять эту должность. Это предполагает, что мы контролируем штаб-квартиру Олимпийского комитета.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_CONTROLS_HQ_TRIGGER_TT: "#default_text [GetPlayer.GetName] контролирует сооружение «[GetBuildingType('building_vikelas_ioc').GetName]»#!."
 MR_IOC_DISCIPLINE_BUTTON: "Ввести олимпийскую дисциплину"
 MR_IOC_DISCIPLINE_BUTTON_TT: "#T Ввести олимпийскую дисциплину#!\nЧем больше МОК и чем больше стран участвует в Олимпийских играх, тем больше дисциплин можно ввести. Больше дисциплин означает больше медалей. Всего можно ввести 20 дисциплин, включая национальные виды спорта.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_15_MEMBERS_TRIGGER_TT: "#default_text В МОК состоит как минимум #G 15#! #V членов#!.#!"
 MR_IOC_20_MEMBERS_TRIGGER_TT: "#default_text В МОК состоит как минимум #G 20#! #V членов#!.#!"
 MR_IOC_25_MEMBERS_TRIGGER_TT: "#default_text В МОК состоит как минимум #G 25#! #V членов#!.#!"
 MR_IOC_30_MEMBERS_TRIGGER_TT: "#default_text В МОК состоит как минимум #G 30#! #V членов#!.#!"
 MR_IOC_40_MEMBERS_TRIGGER_TT: "#default_text В МОК состоит как минимум #G 40#! #V членов#!.#!"
 MR_IOC_50_MEMBERS_TRIGGER_TT: "#default_text В МОК состоит как минимум #G 50#! #V членов#!.#!"
 MR_IOC_60_MEMBERS_TRIGGER_TT: "#default_text В МОК состоит как минимум #G 60#! #V членов#!.#!"
 MR_IOC_MAKE_NATIONAL_SPORT_DISCIPLINE_BUTTON: "[GetPlayer.GetCustom('vikelas_national_sport_for_GUI_type')] as Olympic Discipline"
 MR_IOC_MAKE_NATIONAL_SPORT_DISCIPLINE_BUTTON_TT: "#T Make [GetPlayer.GetCustom('vikelas_national_sport_for_GUI_type')] an Olympic Disciplinee#!\nThe President of the IOC can make his national sport a mandatory Olympic discipline. This is a unique decision.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_NO_BRIBE_BUTTON: "Прекратить подкуп МОК"
 MR_IOC_NO_BRIBE_BUTTON_TT: "#T Прекратить подкуп МОК#!\nЕсли мы недавно принимали Олимпийские игры, было бы разумно прекратить подкуп, так как мы не сможем подать заявку снова так скоро.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IOC_BRIBE_AT_LEAST_3_YEARS_TRIGGER_TT: "#default_text Подкуп МОК должен продолжаться #V не менее четырёх лет#!, прежде чем его можно будет прекратить.#!"