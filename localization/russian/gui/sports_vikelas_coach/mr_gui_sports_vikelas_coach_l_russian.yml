 MR_FIFA_BOARD_TOOLTIP: "#header Правление ФИФА#!\nСледующие страны являются членами правления ФИФА:\n\n[GetGlobalVariable('vikelas_fifa_board_member_1_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_2_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_3_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_4_global_var').GetCountry.GetName|V]\n[GetGlobalVariable('vikelas_fifa_board_member_5_global_var').GetCountry.GetName|V]"
 MR_FIFA_PRESIDENT_TOOLTIP: "#header Президент ФИФА#!\n[GetGlobalVariable('vikelas_fifa_president_global_var').GetCountry.GetName] является президентом ФИФА."
 MR_HIRE_COACH_BUTTON_TT: "#T Нанять национального тренера#!\nНациональные тренеры используют свои навыки для улучшения результатов матчей. Специализация национального тренера — крикет, бейсбол, футбол, баскетбол — зависит от национального вида спорта. Если тренер не оправдывает ожиданий, его можно заменить не ранее чем через три года.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ADAPT_NATIONAL_SPORT_BUTTON: "Принять национальный спорт"
 MR_ADAPT_NATIONAL_SPORT_BUTTON_TT: "#T Принять национальный спорт#!\nМы можем объявить определённый вид спорта, ставший популярным в нашей стране, национальным, тем самым поощряя создание клубов и распространение этого вида спорта в других странах. Это является необходимым условием для создания национальной спортивной организации.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHANGE_NATIONAL_SPORT_BUTTON: "Сменить национальный спорт"
 MR_CHANGE_NATIONAL_SPORT_BUTTON_TT: "#T Сменить национальный спорт#!\nСмена национального вида спорта возможна только в том случае, если популярен хотя бы один другой вид спорта. Сложившееся спортивное сообщество не будет в восторге от этого.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_sports_coach_national_sport: "Национальный спорт"
 vikelas_national_sport_loc: "[Country.MakeScope.Var('vikelas_national_sport_var').GetFlagName]"
 vikelas_no_national_sport_loc: "Нет"
 MR_SCHOOL_SPORTS_STADIUM_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть как минимум одно сооружение «[GetBuildingType('building_vikelas_sports').GetName]» с активным [Concept('concept_production_method', 'методом производства')] #V «Спортивный стадион»#!.#!"
 MR_INTERNATIONAL_SPORTS_EVENT_BUTTON: "Чемпионат Содружества"
 MR_INTERNATIONAL_SPORTS_EVENT_BUTTON_TT: "#T Чемпионат Содружества#!\nБудучи лидером блока держав или сюзереном нескольких вассалов, мы можем провести международный чемпионат среди наших подданных, если у них тот же национальный вид спорта, что и у нас.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_INTERNATIONAL_SPORTS_MEMBER_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть как минимум #G 3#! других #V члена блока#! или #G 4#! #V субъекта#!, у которых национальным видом спорта является [Country.MakeScope.Var('vikelas_national_sport_var').GetFlagName].#!"
 MR_INTERNATIONAL_SPORTS_NO_FIFA_TRIGGER_TT: "#default_text [GetPlayer.GetName] #R не является#! членом ФИФА.#!"
 MR_INTERNATIONAL_SPORTS_MODIFIER_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] #R нет#! [Concept('concept_modifier', 'модификаторов')] #V $vikelas_international_sports_event_modifier$#! или #V $vikelas_recent_international_sports_event_modifier$#!.#!"
 MR_FIFA_MEMBER_TRIGGER_TT: "#default_text Как минимум #BLUE 16#! стран являются #V членами ФИФА#!. В настоящее время в ФИФА состоит #G [GetGlobalVariable('vikelas_num_fifa_members_global_var').GetValue]#! стран.#!"
 MR_JOIN_FIFA_BUTTON: "Вступить в ФИФА"
 MR_JOIN_FIFA_BUTTON_TT: "#T Вступить в ФИФА#!\nВступление в ФИФА является необходимым условием для участия в чемпионате мира по футболу.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_FIFA_BUTTON: "Выйти из ФИФА"
 MR_LEAVE_FIFA_BUTTON_TT: "#T Выйти из ФИФА#!\nФИФА предала все свои идеалы и является коррумпированной, коммерциализированной НПО, от которой лучше держаться подальше.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_FIFA_TRIGGER_TT: "#default_text [GetPlayer.GetName] не является #R ни#! #V президентом#!, #R ни#! #V членом правления#! ФИФА.#!"
 MR_SCHOOL_SPORTS_BUTTON: "Ввести школьный спорт"
 MR_SCHOOL_SPORTS_BUTTON_TT: "#T Ввести школьный спорт в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')]#!\nС введением школьного спорта мы можем увеличить общие шансы на появление личностей с чертами спортсмена и улучшить наши результаты на Олимпийских играх.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SCHOOL_SPORTS_PUBLIC_SCHOOLS_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] принят [concept_law|l] «[GetLawType('law_public_schools').GetName]».#!"
 MR_SCHOOL_SPORTS_IG_ATHLETE_LEADER_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть персонаж с #V чертой «Атлет»#! во главе #V [Concept('concept_interest_group', 'заинтересованной группы')] [concept_in_government]#!.#!"
 MR_SCHOOL_SPORTS_SPORTS_FACILITIES_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть как минимум одно сооружение «[GetBuildingType('building_government_administration').GetName]» с активным [Concept('concept_production_method', 'методом производства')] #V «Спортивные сооружения»#!.#!"
 MR_WORLDCUP_BUTTON: "Чемпионат мира по футболу"
 MR_WORLDCUP_BUTTON_TT: "#T Организовать чемпионат мира по футболу#!\nЧемпионат мира — это соревнование по футболу для национальных сборных. Команды могут проходить в финал чемпионата мира каждые четыре года. В ходе четырёхнедельного турнира лучшая национальная команда определяется как чемпион мира. Международная федерация футбола (ФИФА) организует и продвигает турнир. Первый чемпионат мира состоялся в Уругвае в 1930 году и был выигран командой-хозяйкой.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_FOOTBALL_WORLDCUP_FOOTBALL_ASSOCIATION_TRIGGER_TT: "#default_text Как минимум #G 10#! стран имеют футбольную ассоциацию.#!"
 MR_FIFA_BUTTON_TT: "#T Основать ФИФА#!\nС увеличением числа международных матчей по мере распространения футбола возникла потребность в глобальном руководящем органе. ФИФА (фр. Fédération Internationale de Football Association) — это международный самоуправляемый руководящий орган по футболу, футзалу и пляжному футболу. Это одна из старейших и крупнейших НПО в мире, основанная 21 мая 1904 года. Основание ФИФА позволяет проводить международные матчи между отдельными странами, чьи тренеры могут совершенствоваться, выигрывая матчи. В конечном итоге это приведёт к созданию чемпионата мира.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_FIFA_TRIGGER_TT: "#default_text Как минимум #G 6#! стран имеют футбольную ассоциацию.#!"
 vikelas_fifa_board_member_tt: "[GetPlayer.GetName] становится членом правления ФИФА."
 vikelas_become_fifa_president_tt: "[GetPlayer.GetName] становится президентом ФИФА."
 MR_FIFA_PRESIDENT_BUTTON: "Стать президентом ФИФА"
 MR_FIFA_PRESIDENT_BUTTON_TT: "#T Стать президентом ФИФА#!\nПока у ФИФА нет действующего президента, мы можем занять эту должность. Это предполагает, что мы контролируем штаб-квартиру Международной футбольной ассоциации.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
