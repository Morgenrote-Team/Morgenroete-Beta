l_russian:
 MR_SPORTS_COACH_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'vikelas_coach_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'vikelas_coach_no_coach_achievements_loc')]"
 vikelas_coach_achievements_loc: "$vikelas_coach_achievements_intro_loc$[AddLocalizationIf( Scope.Var('vikelas_coach_world_championship_var').IsSet , Scope.Var('vikelas_coach_world_championship_var').GetFlagName)][AddLocalizationIf( Scope.Var('vikelas_coach_vice_world_championship_var').IsSet , Scope.Var('vikelas_coach_vice_world_championship_var').GetFlagName)]"
 vikelas_coach_no_coach_achievements_loc: "Здесь будут отображаться достижения этого [Concept('concept_vikelas_coach', 'тренера')]#!, как только он у вас появится."
 vikelas_coach_achievements_intro_loc: "#V Достижения этого тренера#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] — успешный тренер.#!"
 vikelas_coach_world_championship_loc: "\n #indent_newline:3 • В [Scope.Var('vikelas_coach_world_championship_year_var').GetValue|0] году [Scope.GetCharacter.GetLastNameNoFormatting] привел[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] свою команду к #V победе на чемпионате мира по футболу#!.#!"
 vikelas_coach_vice_world_championship_loc: "\n #indent_newline:3 • В [Scope.Var('vikelas_coach_vice_world_championship_year_var').GetValue|0] году [Scope.GetCharacter.GetLastNameNoFormatting] привел[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] свою команду ко #V второму месту на чемпионате мира по футболу#!.#!"