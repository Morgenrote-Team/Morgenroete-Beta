 theiler_gui_current_microscope_compound_tooltip_loc: "Your scientists are currently using an $theiler_early_compound_microscope_flag$.\n\nOnce you research [GetTechnology('theiler_microbiology_tech').GetName], you will be able to start development of an $theiler_achromatic_microscope_flag$. To finish the development your [concept_tesla_engineer] and [concept_theiler_biologist] will have to spend #V 12 months#! working on it. Additionally you will need a [GetBuildingType('building_glassworks').GetName] building of level #V 3#!."
 theiler_gui_current_microscope_achromatic_tooltip_loc: "Your scientists are currently using an $theiler_achromatic_microscope_flag$.\n\nOnce you research [GetTechnology('verrier_nuclear_physics_tech').GetName], you will be able to start development of an $theiler_electron_microscope_flag$. To finish the development your [concept_tesla_engineer] and [concept_theiler_biologist] will have to spend #V 12 months#! working on it. Additionally you will need a [GetBuildingType('building_glassworks').GetName] building of level #V 5#!."
 theiler_gui_current_microscope_electron_tooltip_loc: "Your scientists are currently using an $theiler_electron_microscope_flag$.\n\nThis is the most advanced microscope."
