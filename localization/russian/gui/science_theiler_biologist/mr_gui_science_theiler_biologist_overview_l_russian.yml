 theiler_gui_current_microscope_compound_tooltip_loc: "В данный момент ваши учёные используют $theiler_early_compound_microscope_flag$.\n\nИзучение технологии «[GetTechnology('theiler_microbiology_tech').GetName]» позволит разработать $theiler_achromatic_microscope_flag$. Для завершения проекта [concept_tesla_engineer] и [concept_theiler_biologist] должны будут работать над ним в течение #V 12 месяцев#!. Кроме того, необходимо наличие сооружения «[GetBuildingType('building_glassworks').GetName]» #V 3-го#! уровня."
