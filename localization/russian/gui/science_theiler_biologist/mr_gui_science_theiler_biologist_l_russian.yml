l_russian:
 MR_BIOLOGIST_MICROORGANISM_RESEARCH_BUTTON: "Исследование микроорганизмов"
 MR_BIOLOGIST_MICROORGANISM_RESEARCH_BUTTON_TT: "#T Исследование микроорганизмов#!\nПоиск новых [Concept('concept_theiler_microorganism', 'микроорганизмов')], их изучение и проведение экспериментов - неотъемлемая часть микробиологии. Биологи могут не только вести подготовительные работы по поиску патогенов, но и совершать неожиданные открытия.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_MICROORGANISM_RESEARCH_ACTIVE_TT: "#T Исследование микроорганизмов#!\nВ настоящий момент [concept_theiler_biologist] ведёт поиск новых [Concept('concept_theiler_microorganism', 'микроорганизмов')], изучает их и проводит эксперименты. Биологи могут не только выполнять подготовительную работу для поиска патогенов, но и совершать неожиданные открытия.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_FIND_PATHOGEN_BUTTON: "Поиск патогена"
 MR_BIOLOGIST_FIND_PATHOGEN_BUTTON_TT: "#T Поиск патогена#!\nОбнаружение [Concept('concept_theiler_pathogen', 'патогена')] - обязательное условие для разработки вакцины. В зависимости от природы возбудителя, исследования могут затянуться или потребовать особых условий для начала.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_FIND_PATHOGEN_ACTIVE_TT: "#T Поиск патогена#!\nВ данный момент [concept_theiler_biologist] занят поиском [Concept('concept_theiler_pathogen', 'патогена')] - это обязательный шаг для последующей разработки вакцины. В зависимости от типа возбудителя исследования могут затянуться или потребовать особых условий.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACTIVE_BIOLOGIST_TRIGGER: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_theiler_biologist], который #V не занят#!.#!"
 MR_BIOLOGIST_CAN_FIND_PATHOGEN_TRIGGER_TT: "#default_text Что-то из этого:[GetPlayer.GetCustom('GUI_theiler_can_find_cholera_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_diphtheria_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_measles_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_plague_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_polio_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_typhus_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_scarlet_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_smallpox_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_tuberculosis_trigger_custom_loc')][GetPlayer.GetCustom('GUI_theiler_can_find_yellow_fever_trigger_custom_loc')]#!"
 MR_BIOLOGIST_CREATE_VACCINE_BUTTON: "Создать вакцину"
 MR_BIOLOGIST_CREATE_VACCINE_BUTTON_TT: "#T Создание вакцины#!\n[concept_theiler_biologist] занят разработкой вакцины - венца своих трудов. Для этого необходимо предварительно изучить вызывающий болезнь [Concept('concept_theiler_pathogen', 'патоген')]. При определенных условиях [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] способны полностью предотвратить вспышку заболевания.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_CREATE_VACCINE_ACTIVE_TT: "#T Создание вакцины#!\nРазработка вакцины - венец трудов биолога. Этому предшествует изучение [Concept('concept_theiler_pathogen', 'патогена')] - возбудителя болезни. При определенных условиях [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] способны полностью предотвратить вспышку заболевания.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_CAN_CREATE_VACCINE_TRIGGER_TT: "#default_text В [GetPlayer.GetAltNameNoFlag('RU_CL_PP')] обнаружен патоген, для которого ещё нет вакцины, но уже имеются соответствующие технологии.#!"
 MR_10000_SPECIMEN_TRIGGER_TT: "#default_text В [GetPlayer.GetAltNameNoFlag('RU_CL_PP')] собрано #V 10000 или более#! [Concept('concept_dubois_specimen', 'образцов')] (сейчас: [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]).#!"
 MR_BOTANICAL_EXPEDITION_BUTTON_TT: "#T Ботаническая экспедиция#!\nБотанические экспедиции, порой именуемые «охотой за растениями», представляют собой научные путешествия с целью изучения флоры конкретного региона. [concept_dubois_naturalist] в них отвечает за определение, описание и сбор образцов, а также [Concept('concept_ito_medicinal_plants', 'лекарственных растений')].\n\nОбратите внимание: для проведения ботанической экспедиции в области с малярией вам потребуется [Concept('concept_technology', 'технология')] «[GetTechnology('malaria_prevention').GetName]».\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SAFARI_EXPEDITION_BANNED_TRIGGER_TT: "#default_text Ботанические экспедиции были запрещены по #V политическим причинам#!.#!"
 MR_SAFARI_EXPEDITION_ACCESS_RAINFOREST_TRIGGER_TT: "#default_text [GetPlayer.GetName] владе[GetPlayer.GetAltNameNoFormatting('RU_CL_END_T')] областью с [Concept('concept_ito_medicinal_plants', 'лекарственными растениями')]. Если это #V область с малярией#!, вам дополнительно нужно изучить [Concept('concept_technology', 'технологию')] «[GetTechnology('malaria_prevention').GetName]».#!"
 MR_BOTANICAL_EXPEDITION_RECALL_BUTTON_TT: "#T Отозвать натуралиста из ботанической экспедиции#!\nПриказывает [Concept('concept_dubois_naturalist', '#b #GREEN натуралисту#!#!')] вернуться из ботанических исследований, чтобы заняться другими задачами - например, отловом животных.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BOTANICAL_EXPEDITION_RECALL_TRIGGER_TT: "#default_text Ваш [concept_dubois_naturalist] #V не находится в путешествии и не болеет#!.#!"
 MR_BOTANICAL_EXPEDITION_RECALL_NATURALIST_EFFECT_TT: "Ваш [concept_dubois_naturalist] освободился."
 MR_BIOLOGIST_COCHLIOMYIA_EREDICATION_BUTTON: "Истребление мясной мухи"
 MR_BIOLOGIST_COCHLIOMYIA_EREDICATION_BUTTON_TT: "#T Истребление мясной мухи#!\nИспользуя широкие технологические возможности и поддержку правительства, биолог может разработать метод окончательного уничтожения назойливой мясной мухи. Это повысит урожайность в пострадавших регионах.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_COCHLIOMYIA_STATE_TRIGGER: "#default_text [GetPlayer.GetName] владе[GetPlayer.GetAltNameNoFormatting('RU_CL_END_T')] хотя бы одной областью с [Concept('concept_modifier', 'модификатором')] #V $theiler_state_trait_cochliomyia$#!.#!"
 MR_BIOLOGIST_STI_BUTTON: "Метод стерильных насекомых"
 MR_BIOLOGIST_STI_BUTTON_TT: "#T Метод стерильных насекомых#!\nВ области, страдающей от мясных мух, биолог может попытаться уничтожить паразита в ходе трёхлетних испытаний.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_LEAD_ARSENATE_BUTTON: "Пестицид против сидии"
 MR_BIOLOGIST_LEAD_ARSENATE_BUTTON_TT: "#T Пестицид против плодожорки#!\nБиолог может разработать эффективный пестицид, который избавит производителей фруктов в нашей стране от потерь урожая, вызванных плодожоркой.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOTH_OR_BEETLE_STATE_TRIGGER: "#default_text [GetPlayer.GetName] владе[GetPlayer.GetAltNameNoFormatting('RU_CL_END_T')] хотя бы одной областью с [Concept('concept_modifier', 'модификатором')] #V $theiler_state_trait_cydia$#!.#!"
 MR_BIOLOGIST_IMPROVE_AGRICULTURE_BUTTON: "Улучшить сельское хозяйство"
 MR_BIOLOGIST_IMPROVE_AGRICULTURE_BUTTON_TT: "#T Улучшение сельского хозяйства#!\nВаш биолог может использовать свои навыки для улучшения сельскохозяйственных сооружений в стране. Это затронет одно из сооружений, относящихся к группам: [GetBuildingGroup('bg_agriculture').GetName], [GetBuildingGroup('bg_ranching').GetName] или [GetBuildingGroup('bg_plantations').GetName].\n\nМодификаторы, которые получит сооружение:\n$theiler_building_throughput_add_modifier_with_tooltip$\n$theiler_building_production_mult_modifier_with_tooltip$\n$theiler_building_goods_input_mult_modifier_with_tooltip$\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BIOLOGIST_IMPROVE_AGRICULTURE_TRIGGER_TT: "#default_text Хотя бы одно сооружение 1-го уровня или выше из групп «[GetBuildingGroup('bg_agriculture').GetName]», «[GetBuildingGroup('bg_ranching').GetName]» или «[GetBuildingGroup('bg_plantations').GetName]» не имеет всех трёх [Concept('concept_modifier', 'модификаторов')].#!"
 MR_BIOLOGIST_IMPROVE_AGRICULTURE_ACTIVE_TT: "#T Улучшение сельского хозяйства#!\n#p Ваш биолог в данный момент улучшает сооружение из группы «[GetBuildingGroup('bg_agriculture').GetName]», «[GetBuildingGroup('bg_ranching').GetName]» или «[GetBuildingGroup('bg_plantations').GetName]».#!"
 MR_ACHROMATIC_MICROSCOPE_TRIGGER_TT: "#default_text [GetPlayer.GetName] использу[GetPlayer.GetAltNameNoFormatting('RU_CL_END_T')] как минимум #V ахроматический микроскоп#!.#!"
