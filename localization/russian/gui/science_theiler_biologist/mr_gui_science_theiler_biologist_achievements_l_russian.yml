 theiler_biologist_no_biologist_achievements_loc: "Здесь будут отображаться #V достижения этого [Concept('concept_theiler_biologist', '#b #GREEN биолога#!#!')]#!, как только он у вас появится."
 theiler_biologist_achievements_intro_loc: "#V Достижения этого биолога#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] - успешный биолог.#!"
 theiler_microbiology_achievement_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] считается основателем современной микробиологии.#!"
 theiler_cholera_pathogen_achievement_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'первой обнаружила', 'первым обнаружил')] бактерию, вызывающую холеру, а также [SelectLocalization(Scope.GetCharacter.IsFemale, 'описала', 'описал')] и [SelectLocalization(Scope.GetCharacter.IsFemale, 'выделила', 'выделил')] её.#!"
 theiler_tuberculosis_pathogen_achievement_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'обнаружила', 'обнаружил')] возбудителя туберкулёза, а также [SelectLocalization(Scope.GetCharacter.IsFemale, 'описала', 'описал')] и [SelectLocalization(Scope.GetCharacter.IsFemale, 'выделила', 'выделил')] его.#!"
 theiler_smallpox_pathogen_achievement_loc: "\n #indent_newline:3 • Именно доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'впервые обнаружила', 'впервые обнаружил')] микроорганизм, вызывающий оспу, задокументировав и выделив его.#!"
 theiler_typhus_pathogen_achievement_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'определила', 'определил')] возбудителя тифа, успешно [SelectLocalization(Scope.GetCharacter.IsFemale, 'описала', 'описал')] и [SelectLocalization(Scope.GetCharacter.IsFemale, 'выделила', 'выделил')] его.#!"
 theiler_yellow_fever_pathogen_achievement_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'стала первооткрывательницей', 'стал первооткрывателем')] патогена жёлтой лихорадки, а также [SelectLocalization(Scope.GetCharacter.IsFemale, 'описала', 'описал')] и [SelectLocalization(Scope.GetCharacter.IsFemale, 'выделила', 'выделил')] его.#!"
 theiler_measles_pathogen_achievement_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'обнаружила', 'обнаружил')] патоген кори, [SelectLocalization(Scope.GetCharacter.IsFemale, 'предоставила', 'предоставил')] его описание и [SelectLocalization(Scope.GetCharacter.IsFemale, 'выделила', 'выделил')] его.#!"
 theiler_scarlet_pathogen_achievement_loc: "\n #indent_newline:3 • Первым человеком, обнаружившим бактерию скарлатины, [SelectLocalization(Scope.GetCharacter.IsFemale, 'стала доктор', 'стал доктор')] [Scope.GetCharacter.GetLastNameNoFormatting], [SelectLocalization(Scope.GetCharacter.IsFemale, 'которая', 'который')] также [SelectLocalization(Scope.GetCharacter.IsFemale, 'описала', 'описал')] и [SelectLocalization(Scope.GetCharacter.IsFemale, 'выделила', 'выделил')] её.#!"
 theiler_plague_pathogen_achievement_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'обнаружила', 'обнаружил')] возбудителя чумы, [SelectLocalization(Scope.GetCharacter.IsFemale, 'описала', 'описал')] и успешно [SelectLocalization(Scope.GetCharacter.IsFemale, 'выделила', 'выделил')] его.#!"
 theiler_diphteria_pathogen_achievement_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'первой идентифицировала', 'первым идентифицировал')] микроорганизм, вызывающий дифтерию, а затем [SelectLocalization(Scope.GetCharacter.IsFemale, 'описала', 'описал')] и [SelectLocalization(Scope.GetCharacter.IsFemale, 'выделила', 'выделил')] его.#!"
 theiler_polio_pathogen_achievement_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'открыла, описала и выделила', 'открыл, описал и выделил')] патогена полиомиелита.#!"
 theiler_cholera_vaccine_achievement_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'стала пионером', 'стал пионером')] в разработке, тестировании и производстве эффективной вакцины против холеры.#!"
 theiler_tuberculosis_vaccine_achievement_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'первой создала, протестировала и произвела', 'первым создал, протестировал и произвёл')] вакцину против туберкулёза.#!"
 theiler_smallpox_vaccine_achievement_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'первой разработала, протестировала и произвела', 'первым разработал, протестировал и произвёл')] вакцину против оспы.#!"
 theiler_typhus_vaccine_achievement_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'разработала, протестировала и произвела', 'разработал, протестировал и произвёл')] первую эффективную вакцину против тифа.#!"
 theiler_yellow_fever_vaccine_achievement_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'возглавила', 'возглавил')] первые успешные усилия по созданию, тестированию и производству вакцины против жёлтой лихорадки.#!"
 theiler_measles_vaccine_achievement_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'первой разработала, испытала и произвела', 'первым разработал, испытал и произвёл')] действенную вакцину против кори.#!"
 theiler_scarlet_vaccine_achievement_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'была', 'был')] учёным-первопроходцем, стоявшим за первой протестированной и произведённой вакциной против скарлатины.#!"
 theiler_plague_vaccine_achievement_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'первой разработала, протестировала и произвела', 'первым разработал, протестировал и произвёл')] эффективную вакцину против чумы.#!"
 theiler_diphteria_vaccine_achievement_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] успешно [SelectLocalization(Scope.GetCharacter.IsFemale, 'разработала, протестировала и произвела', 'разработал, протестировал и произвёл')] первую эффективную вакцину против дифтерии.#!"
