l_russian:
 MR_BIOLOGIST_ACHIEVEMENTS_TT: ""
 theiler_biologist_achievements_loc: ""
 theiler_biologist_no_biologist_achievements_loc: "Здесь будут отображаться #V достижения этого [Concept('concept_theiler_biologist', '#b #GREEN биолога#!#!')]#!, как только он у вас появится."
 theiler_biologist_achievements_intro_loc: "#V Достижения этого биолога#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] — успешный биолог.#!"
 theiler_microbiology_achievement_loc: "\n#indent_newline:3 • Др. [Scope.GetCharacter.GetLastNameNoFormatting] считается основателем современной микрообологии. #!"
 theiler_cholera_pathogen_achievement_loc: "\"\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'первой обнаружила', 'первым обнаружил')] бактерию, вызывающую холеру, а также [SelectLocalization(Scope.GetCharacter.IsFemale, 'описала', 'описал')] и [SelectLocalization(Scope.GetCharacter.IsFemale, 'выделила', 'выделил')] её.#!\""
 theiler_tuberculosis_pathogen_achievement_loc: "\"\n #indent_newline:3 • Возбудитель туберкулёза обнаружил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] доктор [Scope.GetCharacter.GetLastNameNoFormatting], [SelectLocalization(Scope.GetCharacter.IsFemale, 'которая', 'который')] также [SelectLocalization(Scope.GetCharacter.IsFemale, 'дала', 'дал')] ему характеристику и [SelectLocalization(Scope.GetCharacter.IsFemale, 'выделила', 'выделил')] его.#!\""
 theiler_smallpox_pathogen_achievement_loc: "\n #indent_newline:3 • It was Dr. [Scope.GetCharacter.GetLastNameNoFormatting] who first discovered the smallpox-causing microorganism and documented and isolated it.#!"
 theiler_typhus_pathogen_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] identified the agent responsible for typhus and successfully described and isolated it.#!"
 theiler_yellow_fever_pathogen_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] was the pioneering scientist to discover the yellow fever pathogen, as well as to describe and isolate it.#!"
 theiler_measles_pathogen_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] discovered the measles pathogen and proceeded to provide its description and isolate it.#!"
 theiler_scarlet_pathogen_achievement_loc: "\n #indent_newline:3 • The first person to discover the bacterium behind scarlet fever was Dr. [Scope.GetCharacter.GetLastNameNoFormatting], who also described and isolated it.#!"
 theiler_plague_pathogen_achievement_loc: "\n #indent_newline:3 • The plague agent was initially discovered by Dr. [Scope.GetCharacter.GetLastNameNoFormatting], who described and successfully isolated it.#!"
 theiler_diphteria_pathogen_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] first identified the microorganism causing diphtheria and later described and isolated it.#!"
 theiler_polio_pathogen_achievement_loc: "\n #indent_newline:3 • The discovery, description, and isolation of the polio pathogen were first accomplished by Dr. [Scope.GetCharacter.GetLastNameNoFormatting].#!"
 theiler_cholera_vaccine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] pioneered the development, testing, and production of an effective cholera vaccine.#!"
 theiler_tuberculosis_vaccine_achievement_loc: "\n #indent_newline:3 • The first scientist to create, test, and manufacture a tuberculosis cholera vaccine was Dr. [Scope.GetCharacter.GetLastNameNoFormatting].#!"
 theiler_smallpox_vaccine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] was the first to design, evaluate, and produce a vaccine that works against smallpox.#!"
 theiler_typhus_vaccine_achievement_loc: "\n #indent_newline:3 • Developing, testing, and producing the first effective typhus vaccine was accomplished by Dr. [Scope.GetCharacter.GetLastNameNoFormatting].#!"
 theiler_yellow_fever_vaccine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] led the first successful effort to create, test, and manufacture a yellow fever vaccine.#!"
 theiler_measles_vaccine_achievement_loc: "\n #indent_newline:3 • The first to develop, trial, and produce a working measles vaccine was Dr. [Scope.GetCharacter.GetLastNameNoFormatting].#!"
 theiler_scarlet_vaccine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] was the pioneering scientist behind the first tested and produced scarlet fever vaccine.#!"
 theiler_plague_vaccine_achievement_loc: "\n #indent_newline:3 • Creating, testing, and manufacturing an effective vaccine against plague was first achieved by Dr. [Scope.GetCharacter.GetLastNameNoFormatting].#!"
 theiler_diphteria_vaccine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] successfully developed, tested, and produced the first effective vaccine for diphtheria.#!"
 theiler_polio_vaccine_achievement_loc: "\n #indent_newline:3 • The development, testing, and production of an effective polio vaccine were first accomplished by Dr. [Scope.GetCharacter.GetLastNameNoFormatting].#!"
 theiler_pharmaceutical_strychnine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is regarded as the person who first discovered a drug based on strychnine.#!"
 theiler_pharmaceutical_emetine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is considered a pioneer in the development of a emetine-based drug.#!"
 theiler_pharmaceutical_atropine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is credited as the first discoverer of a atropine-based medication.#!"
 theiler_pharmaceutical_aloin_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is attributed with the first discovery of a medication based on aloin.#!"
 theiler_pharmaceutical_digitoxin_achievement_loc: "\n #indent_newline:3 • The discovery of a digitoxin-based drug goes back to Dr. [Scope.GetCharacter.GetLastNameNoFormatting].#!"
 theiler_pharmaceutical_quinine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] was the first to develop a medication using quinine.#!"
 theiler_pharmaceutical_thymol_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is credited with the first discovery of a thymol-based drug.#!"
 theiler_pharmaceutical_pilocarpine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is recognized as the discoverer of a drug based on pilocarpine.#!"
 theiler_pharmaceutical_ephedrine_achievement_loc: "\n #indent_newline:3 • The first discovery of a ephedrine-based medication is attributed to Dr. [Scope.GetCharacter.GetLastNameNoFormatting].#!"
 theiler_pharmaceutical_strophantine_achievement_loc: "\n #indent_newline:3 • Dr. [Scope.GetCharacter.GetLastNameNoFormatting] is considered the one who first found a drug based on strophantine.#!"