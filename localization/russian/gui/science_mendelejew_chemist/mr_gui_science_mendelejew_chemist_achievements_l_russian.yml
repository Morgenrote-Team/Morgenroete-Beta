 mendelejew_chemist_isolated_elementes_loc: "\nDr. [Scope.GetCharacter.GetLastNameNoFormatting] #V  изолированные [Scope.Var('mendelejew_isolated_elements_character_number_var').GetValue|0] Элементы#!." #deepl:2897673687
 mendelejew_chemist_achievement_periodic_table_inventor_loc: "\nПрофессор [Scope.GetCharacter.GetLastNameNoFormatting] известен тем, что #V изобрел Периодическую таблицу#!." #deepl:3277759785
 mendelejew_chemist_achievement_invented_dynamite_loc: "\n С #V изобретением динамита#!, [Scope.GetCharacter.GetFullNameNoFormatting] изменился мир, будь то горное дело, строительство или война." #deepl:1710785871
 mendelejew_chemist_achievement_noble_gases_discoverer_loc: "\ #V Открытие благородных газов#! сделало доктора [Scope.GetCharacter.GetLastNameNoFormatting] одним из самых известных химиков всех времен." #deepl:4129935898
 mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_loc: "\nДоктор [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] обнаружил причину появления линий Фраунгофера и тем самым заложил основу для астроспектроскопии." #deepl:518694575
 mendelejew_chemist_achievement_synthetic_oil_inventor_loc: "\n[Scope.GetCharacter.GetSheHe] стало возможным #V создавать нефть синтетическим путем#!." #deepl:226827889
 mendelejew_chemist_achievement_synthetic_rubber_inventor_loc: "\n Благодаря #V изобретению синтетического каучука#! доктор [Scope.GetCharacter.GetLastNameNoFormatting] избавил мир от необходимости собирать каучук с деревьев." #deepl:179466189
 mendelejew_chemist_achievement_attended_chemist_congress_loc: "\nД-р [Scope.GetCharacter.GetLastNameNoFormatting] был одним из участников #V первого Международного конгресса химиков#!." #deepl:2235467193
 mendelejew_chemist_achievement_fertilizer_improvement_finished_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] провел много времени, изучая, как #V улучшить удобрения и их производство#!." #deepl:3581929820
 mendelejew_chemist_achievement_explosives_improvement_finished_loc: "\n[Scope.GetCharacter.GetSheHe] является пионером в производстве #V улучшенных взрывчатых веществ и химических реакций для их создания#!." #deepl:3224674643
 mendelejew_chemist_achievement_synthetics_improvement_finished_loc: "\nИзвестный своими [Scope.GetCharacter.GetHerHis] работами по #V улучшению синтетических веществ и их производству#!, доктор [Scope.GetCharacter.GetLastNameNoFormatting] хорошо известен среди других химиков и в химической промышленности." #deepl:2742424092
