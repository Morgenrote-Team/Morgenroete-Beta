l_russian:
 MR_CHEMIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'mendelejew_chemist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'mendelejew_chemist_achievements_no_chemist_loc')]"
 mendelejew_chemist_achievements_loc: "$mendelejew_chemist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('mendelejew_chemist_theorized_elementes_type')][Scope.GetCharacter.GetCustom('mendelejew_chemist_discovered_elementes_type')][Scope.GetCharacter.GetCustom('mendelejew_chemist_isolated_elementes_type')][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_periodic_table_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_periodic_table_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_invented_dynamite_var').IsSet , Scope.Var('mendelejew_chemist_achievement_invented_dynamite_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_noble_gases_discoverer_var').IsSet , Scope.Var('mendelejew_chemist_achievement_noble_gases_discoverer_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_var').IsSet , Scope.Var('mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetic_oil_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetic_oil_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetic_rubber_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetic_rubber_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_attended_chemist_congress_var').IsSet , Scope.Var('mendelejew_chemist_achievement_attended_chemist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_fertilizer_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_fertilizer_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_discovered_radioactivity_var').IsSet , Scope.Var('mendelejew_chemist_achievement_discovered_radioactivity_var').GetFlagName)]"
 mendelejew_chemist_achievements_intro_loc: "#V Достижения этого химика#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] - успешный химик.#!"
 mendelejew_chemist_theorized_elementes_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V теоретически [SelectLocalization(Scope.GetCharacter.IsFemale, 'обосновала', 'обосновал')] [Scope.Var('mendelejew_theorized_elements_character_number_var').GetValue|0] элементов#!.#!"
 mendelejew_chemist_discovered_elementes_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] #V [SelectLocalization(Scope.GetCharacter.IsFemale, 'открыла', 'открыл')] [Scope.Var('mendelejew_discovered_elements_character_number_var').GetValue|0] элементов#!.#!"
 mendelejew_chemist_isolated_elementes_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V [SelectLocalization(Scope.GetCharacter.IsFemale, 'выделила', 'выделил')] [Scope.Var('mendelejew_isolated_elements_character_number_var').GetValue|0] элементов#!.#!"
 mendelejew_chemist_achievement_periodic_table_inventor_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'знаменита', 'знаменит')] #V изобретением периодической таблицы#!.#!"
 mendelejew_chemist_achievement_invented_dynamite_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetFullNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'изменила', 'изменил')] мир #V изобретением динамита#!, будь то в горном деле, строительстве или на войне.#!"
 mendelejew_chemist_achievement_noble_gases_discoverer_loc: "\n #indent_newline:3 • Благодаря #V открытию благородных газов#! доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'стала', 'стал')] одним из самых знаменитых химиков всех времён.#!"
 mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_loc: "\n #indent_newline:3 • Доктор [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] [SelectLocalization(GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'открыла', 'открыл')] причину возникновения фраунгоферовых линий и тем самым [SelectLocalization(GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'заложила', 'заложил')] основы астроспектроскопии.#!"
 mendelejew_chemist_achievement_synthetic_oil_inventor_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] [SelectLocalization(Scope.GetCharacter.IsFemale, 'сделала', 'сделал')] возможным #V синтетическое производство нефти#!.#!"
 mendelejew_chemist_achievement_synthetic_rubber_inventor_loc: "\n #indent_newline:3 • #V Изобретя синтетический каучук#!, доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'избавила', 'избавил')] мир от необходимости собирать каучук с деревьев.#!"
 mendelejew_chemist_achievement_attended_chemist_congress_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'была', 'был')] одним из участников #V первого Международного конгресса химиков#!.#!"
 mendelejew_chemist_achievement_fertilizer_improvement_finished_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'потратила', 'потратил')] много времени на исследование того, как #V улучшить удобрения и их производство#!.#!"
 mendelejew_chemist_achievement_explosives_improvement_finished_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] - пионер в производстве #V улучшенных взрывчатых веществ и химических реакций для их создания#!.#!"
 mendelejew_chemist_achievement_synthetics_improvement_finished_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] пользуется большим уважением среди других химиков и в химической промышленности, будучи [SelectLocalization(Scope.GetCharacter.IsFemale, 'известной', 'известным')] благодаря своей работе по #V улучшению синтетических материалов и их производства#!.#!"
 mendelejew_chemist_achievement_discovered_radioactivity_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'достигла', 'достиг')] научной вехи, став [SelectLocalization(Scope.GetCharacter.IsFemale, 'первой', 'первым')], кто #V [SelectLocalization(Scope.GetCharacter.IsFemale, 'открыла', 'открыл')] радиоактивность#!.#!"
 mendelejew_chemist_achievements_no_chemist_loc: "Здесь будут отображаться #V достижения этого [Concept('concept_mendelejew_chemist', '#b #ORANGE химика#!#!')]#!, как только он у вас появится."