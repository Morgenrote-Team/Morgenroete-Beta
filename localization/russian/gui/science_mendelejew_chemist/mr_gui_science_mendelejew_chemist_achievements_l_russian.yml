l_russian:
 MR_CHEMIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'mendelejew_chemist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'mendelejew_chemist_achievements_no_chemist_loc')]"
 mendelejew_chemist_achievements_loc: "$mendelejew_chemist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('mendelejew_chemist_theorized_elementes_type')][Scope.GetCharacter.GetCustom('mendelejew_chemist_discovered_elementes_type')][Scope.GetCharacter.GetCustom('mendelejew_chemist_isolated_elementes_type')][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_periodic_table_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_periodic_table_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_invented_dynamite_var').IsSet , Scope.Var('mendelejew_chemist_achievement_invented_dynamite_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_noble_gases_discoverer_var').IsSet , Scope.Var('mendelejew_chemist_achievement_noble_gases_discoverer_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_var').IsSet , Scope.Var('mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetic_oil_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetic_oil_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetic_rubber_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetic_rubber_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_attended_chemist_congress_var').IsSet , Scope.Var('mendelejew_chemist_achievement_attended_chemist_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_fertilizer_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_fertilizer_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_explosives_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').IsSet , Scope.Var('mendelejew_chemist_achievement_synthetics_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_discovered_radioactivity_var').IsSet , Scope.Var('mendelejew_chemist_achievement_discovered_radioactivity_var').GetFlagName)]"
 mendelejew_chemist_achievements_intro_loc: "#V Достижения этого химика#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] — успешный химик.#!"
 mendelejew_chemist_theorized_elementes_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V теоретически обосновал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] [Scope.Var('mendelejew_theorized_elements_character_number_var').GetValue|0] элементов#!.#!"
 mendelejew_chemist_discovered_elementes_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] [Scope.Var('mendelejew_discovered_elements_character_number_var').GetValue|0] элементов#!.#!"
 mendelejew_chemist_isolated_elementes_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V выделил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] [Scope.Var('mendelejew_isolated_elements_character_number_var').GetValue|0] элементов#!.#!"
 mendelejew_chemist_achievement_periodic_table_inventor_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] знаменит[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] #V изобретением периодической таблицы#!.#!"
 mendelejew_chemist_achievement_invented_dynamite_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetFullNameNoFormatting] изменил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] мир #V изобретением динамита#!, будь то в горном деле, строительстве или на войне.#!"
 mendelejew_chemist_achievement_noble_gases_discoverer_loc: "\n #indent_newline:3 • Благодаря #V открытию благородных газов#! доктор [Scope.GetCharacter.GetLastNameNoFormatting] стал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] одним из самых знаменитых химиков всех времён.#!"
 mendelejew_chemist_achievement_discovered_reason_fraunhofer_lines_loc: "\n #indent_newline:3 • Доктор [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] открыл[SelectLocalization(GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')] причину возникновения фраунгоферовых линий и тем самым заложил[SelectLocalization(GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')] основы астроспектроскопии.#!"
 mendelejew_chemist_achievement_synthetic_oil_inventor_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] сделал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] возможным #V синтетическое производство нефти#!.#!"
 mendelejew_chemist_achievement_synthetic_rubber_inventor_loc: "\n #indent_newline:3 • #V Изобретя синтетический каучук#!, доктор [Scope.GetCharacter.GetLastNameNoFormatting] избавил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] мир от необходимости собирать каучук с деревьев.#!"
 mendelejew_chemist_achievement_attended_chemist_congress_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] был[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] одним из участников #V первого Международного конгресса химиков#!.#!"
 mendelejew_chemist_achievement_fertilizer_improvement_finished_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] потратил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] много времени на исследование того, как #V улучшить удобрения и их производство#!.#!"
 mendelejew_chemist_achievement_explosives_improvement_finished_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] — пионер в производстве #V улучшенных взрывчатых веществ и химических реакций для их создания#!.#!"
 mendelejew_chemist_achievement_synthetics_improvement_finished_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] пользуется большим уважением среди других химиков и в химической промышленности, будучи известн[SelectLocalization(Scope.GetCharacter.IsFemale, 'ой', 'ым')] благодаря своей работе по #V улучшению синтетических материалов и их производства#!.#!"
 mendelejew_chemist_achievement_discovered_radioactivity_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] достиг[SelectLocalization(Scope.GetCharacter.IsFemale, 'ла', '')] научной вехи, став перв[SelectLocalization(Scope.GetCharacter.IsFemale, 'ой', 'ым')], кто #V открыл радиоактивность#!.#!"
 mendelejew_chemist_achievements_no_chemist_loc: "Здесь будут отображаться #V достижения этого  [Concept('concept_mendelejew_chemist', '#b #BLUE химика#!#!')] #!, как только он у вас появится."