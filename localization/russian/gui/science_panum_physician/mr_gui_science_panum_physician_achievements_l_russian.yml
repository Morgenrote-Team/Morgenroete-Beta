l_russian:
 MR_PHYSICIAN_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'panum_physician_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'panum_physician_no_physician_loc')]"
 panum_physician_achievements_loc: "$panum_physician_achievements_intro_loc$[Scope.GetCharacter.GetCustom('panum_physician_achievement_successful_treatments_type')][Scope.GetCharacter.GetCustom('panum_physician_achievement_epidemiologist_type')][Scope.GetCharacter.GetCustom('panum_physician_achievement_surgeon_type')][Scope.GetCharacter.GetCustom('panum_physician_achievement_psychiatrist_type')][Scope.GetCharacter.GetCustom('panum_physician_achievement_military_physician_type')][AddLocalizationIf( Scope.Var('panum_physician_achievement_germ_theory_inventor_var').IsSet , Scope.Var('panum_physician_achievement_germ_theory_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_pneumothorax_inventor_var').IsSet , Scope.Var('panum_physician_achievement_pneumothorax_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_thoracoplasty_inventor_var').IsSet , Scope.Var('panum_physician_achievement_thoracoplasty_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_bloodtypes_inventor_var').IsSet , Scope.Var('panum_physician_achievement_bloodtypes_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_ecg_inventor_var').IsSet , Scope.Var('panum_physician_achievement_ecg_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_transplantation_inventor_var').IsSet , Scope.Var('panum_physician_achievement_transplantation_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_stereotactic_method_inventor_var').IsSet , Scope.Var('panum_physician_achievement_stereotactic_method_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_cardiopulmonary_bypass_inventor_var').IsSet , Scope.Var('panum_physician_achievement_cardiopulmonary_bypass_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_endoscope_inventor_var').IsSet , Scope.Var('panum_physician_achievement_endoscope_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_ophthalmoscope_inventor_var').IsSet , Scope.Var('panum_physician_achievement_ophthalmoscope_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_chemotherapy_inventor_var').IsSet , Scope.Var('panum_physician_achievement_chemotherapy_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_attended_medical_congress_var').IsSet , Scope.Var('panum_physician_achievement_attended_medical_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_anthrax_disease_var').IsSet , Scope.Var('panum_physician_achievement_anthrax_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_goiter_disease_var').IsSet , Scope.Var('panum_physician_achievement_goiter_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_nephrolithiasis_disease_var').IsSet , Scope.Var('panum_physician_achievement_nephrolithiasis_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_pellagra_disease_var').IsSet , Scope.Var('panum_physician_achievement_pellagra_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_rickets_disease_var').IsSet , Scope.Var('panum_physician_achievement_rickets_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_syphilis_disease_var').IsSet , Scope.Var('panum_physician_achievement_syphilis_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_tetanus_disease_var').IsSet , Scope.Var('panum_physician_achievement_tetanus_disease_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_military_medicine_project_finished_var').IsSet , Scope.Var('panum_physician_achievement_military_medicine_project_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_inaugurated_asylum_var').IsSet , Scope.Var('panum_physician_achievement_inaugurated_asylum_var').GetFlagName)][AddLocalizationIf( Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').IsSet , Scope.Var('mendelejew_chemist_achievement_aspirin_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_basketball_inventor_var').IsSet , Scope.Var('panum_physician_achievement_basketball_inventor_var').GetFlagName)]"
 panum_physician_no_physician_loc: "Здесь будут отображаться #V достижения этого [Concept('concept_panum_physician', '#b #BLUE врача#!#!')]#!, как только он у вас появится."
 panum_physician_achievements_intro_loc: "#V Достижения этого врача#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] - успешный врач.#!"
 panum_physician_achievement_successful_treatments_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] имеет большой опыт в лечении пациентов и #o успешно [SelectLocalization(Scope.GetCharacter.IsFemale, 'вылечила', 'вылечил')] [GetPlayer.MakeScope.Var('panum_physician_var').GetVariable('panum_physician_successful_treatments_var').GetValue] пациентов#!.#!"
 panum_physician_achievement_epidemiologist_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она подробно изучала', 'Он подробно изучал')] болезни и [SelectLocalization(Scope.GetCharacter.IsFemale, 'стала', 'стал')] #o эпидемиологом#!.#!"
 panum_physician_achievement_surgeon_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она провела', 'Он провёл')] множество операций и поэтому считается хорошим #o хирургом#!.#!"
 panum_physician_achievement_psychiatrist_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] подробно [SelectLocalization(Scope.GetCharacter.IsFemale, 'изучала', 'изучал')] человеческий разум и является #o известным психиатром#!.#!"
 panum_physician_achievement_military_physician_loc: "\n #indent_newline:3 • Будучи #o военным врачом#!, [SelectLocalization(Scope.GetCharacter.IsFemale, 'она видела', 'он видел')] ужасы войны и знает, как лечить людей в чудовищных условиях.#!"
 panum_physician_achievement_germ_theory_inventor_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'разработала', 'разработал')] #o микробную теорию#!, которая уже спасла тысячи жизней.#!"
 panum_physician_achievement_pneumothorax_inventor_loc: "\n #indent_newline:3 • Одно из величайших [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] изобретений - #o аппарат для создания искусственного пневмоторакса#!. Он вызывает коллапс лёгких, что может помочь в лечении туберкулёза.#!"
 panum_physician_achievement_thoracoplasty_inventor_loc: "\n #indent_newline:3 • Благодаря своим хирургическим навыкам доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'изобрела', 'изобрёл')] #o процедуру «торакопластика», которая произвела революцию в лёгочной хирургии#! и тем самым позволила улучшить лечение больных туберкулёзом.#!"
 panum_physician_achievement_attended_medical_congress_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она участвовала', 'Он участвовал')] как минимум в одном #o медицинском конгрессе#! и [SelectLocalization(Scope.GetCharacter.IsFemale, 'делилась', 'делился')] там своими идеями.#!"
 mendelejew_chemist_achievement_aspirin_inventor_loc: "\n #indent_newline:3 • Доктор [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] считается ключевым изобретателем #o аспирина#!. [SelectLocalization(GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'Она не только облегчила', 'Он не только облегчил')] боль бесчисленным пациентам, но и [SelectLocalization(GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'произвела', 'произвёл')] революцию в фармацевтической промышленности.#!"
 panum_physician_achievement_xray_inventor_loc: "\n #indent_newline:3 • Доктора [GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.GetLastNameNoFormatting] считают [SelectLocalization(GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.IsFemale, 'одной из ведущих', 'одним из ведущих')] мировых физиков; [SelectLocalization(GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.IsFemale, 'она произвела', 'он произвёл')] революцию и в медицине, и в физике, открыв #o рентгеновские лучи#!.#!"
 panum_physician_achievement_bloodtypes_inventor_loc: "\n #indent_newline:3 • Открыв #o различные группы крови, а именно A, B, AB и 0#!, доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'сыграла', 'сыграл')] значительную роль в углублении наших знаний о крови и повышении успешности её переливания.#!"
 panum_physician_achievement_ecg_inventor_loc: "\n #indent_newline:3 • #o ЭКГ#!, которую [SelectLocalization(Scope.GetCharacter.IsFemale, 'изобрела', 'изобрёл')] доктор [Scope.GetCharacter.GetLastNameNoFormatting], позволила измерять электрическую активность сердца и стала важной вехой в работе больниц.#!"
 panum_physician_achievement_transplantation_inventor_loc: "\n #indent_newline:3 • Проведя #o первую трансплантацию#!, доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'вписала', 'вписал')] своё имя в историю медицины.#!"
 panum_physician_achievement_stereotactic_method_inventor_loc: "\n #indent_newline:3 • #o Стереотаксический метод#!, который [SelectLocalization(Scope.GetCharacter.IsFemale, 'она изобрела', 'он изобрёл')], по сей день считается прорывным в хирургии головного мозга.#!"
 panum_physician_achievement_cardiopulmonary_bypass_inventor_loc: "\n #indent_newline:3 • Разработав #o аппарат искусственного кровообращения#!, доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'создала', 'создал')] шедевр современной медицины.#!"
 panum_physician_achievement_endoscope_inventor_loc: "\n #indent_newline:3 • Также в историю вошло [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] изобретение - #o эндоскоп#!, с помощью которого впервые удалось заглянуть внутрь человека.#!"
 panum_physician_achievement_ophthalmoscope_inventor_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'изобрела', 'изобрёл')] аппарат, облегчающий исследование глазных болезней, и тем самым [SelectLocalization(Scope.GetCharacter.IsFemale, 'оказала', 'оказал')] неоценимую услугу офтальмологии: #o офтальмоскоп#!.#!"
 panum_physician_achievement_chemotherapy_inventor_loc: "\n #indent_newline:3 • #o Химиотерапия#!, которую [SelectLocalization(Scope.GetCharacter.IsFemale, 'она разработала', 'он разработал')] для лечения самых тяжёлых болезней, даёт надежду даже больным раком.#!"
 panum_physician_achievement_iron_lung_inventor_loc: "\n #indent_newline:3 • Создание [SelectLocalization(GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.IsFemale, 'ею', 'им')] #o первого аппарата «железные лёгкие»#! для поддержания жизни больных полиомиелитом в критическом состоянии считается одним из самых впечатляющих инженерных достижений этой эпохи.#!"
 panum_physician_achievement_military_medicine_project_finished_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #o [SelectLocalization(Scope.GetCharacter.IsFemale, 'разработала', 'разработал')] новейшие методы в области полевой медицины#!, сделав военно-медицинскую службу одной из самых признанных в мире.#!"
 panum_physician_achievement_inaugurated_asylum_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'сыграла', 'сыграл')] решающую роль в основании #o первой в стране психиатрической лечебницы#!, чтобы оказывать комплексную и гуманную помощь душевнобольным.#!"
 panum_physician_achievement_anthrax_disease_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #o [SelectLocalization(Scope.GetCharacter.IsFemale, 'специализировалась', 'специализировался')] на сибирской язве#! и [SelectLocalization(Scope.GetCharacter.IsFemale, 'разработала', 'разработал')] для неё эффективные методы профилактики и лечения.#!"
 panum_physician_achievement_goiter_disease_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #o [SelectLocalization(Scope.GetCharacter.IsFemale, 'специализировалась', 'специализировался')] на зобе#! и [SelectLocalization(Scope.GetCharacter.IsFemale, 'разработала', 'разработал')] для него эффективные методы профилактики и лечения.#!"
 panum_physician_achievement_nephrolithiasis_disease_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #o [SelectLocalization(Scope.GetCharacter.IsFemale, 'специализировалась', 'специализировался')] на нефролитиазе#! и [SelectLocalization(Scope.GetCharacter.IsFemale, 'разработала', 'разработал')] для него эффективные методы профилактики и лечения.#!"
 panum_physician_achievement_pellagra_disease_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #o [SelectLocalization(Scope.GetCharacter.IsFemale, 'специализировалась', 'специализировался')] на пеллагре#! и [SelectLocalization(Scope.GetCharacter.IsFemale, 'разработала', 'разработал')] для неё эффективные методы профилактики и лечения.#!"
 panum_physician_achievement_rickets_disease_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #o [SelectLocalization(Scope.GetCharacter.IsFemale, 'специализировалась', 'специализировался')] на рахите#! и [SelectLocalization(Scope.GetCharacter.IsFemale, 'разработала', 'разработал')] для него эффективные методы профилактики и лечения.#!"
 panum_physician_achievement_syphilis_disease_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #o [SelectLocalization(Scope.GetCharacter.IsFemale, 'специализировалась', 'специализировался')] на сифилисе#! и [SelectLocalization(Scope.GetCharacter.IsFemale, 'разработала', 'разработал')] для него эффективные методы профилактики и лечения.#!"
 panum_physician_achievement_tetanus_disease_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #o [SelectLocalization(Scope.GetCharacter.IsFemale, 'специализировалась', 'специализировался')] на столбняке#! и [SelectLocalization(Scope.GetCharacter.IsFemale, 'разработала', 'разработал')] для него эффективные методы профилактики и лечения.#!"
 panum_physician_achievement_basketball_inventor_loc: "\n #indent_newline:3 • В [Scope.Var('panum_physician_achievement_basketball_inventor_year_var').GetValue|0] году доктор [Scope.GetCharacter.GetLastNameNoFormatting] #o [SelectLocalization(Scope.GetCharacter.IsFemale, 'изобрела', 'изобрёл')] новый командный вид спорта под названием баскетбол#!#!"