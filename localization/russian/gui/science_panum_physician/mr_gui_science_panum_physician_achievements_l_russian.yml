 panum_physician_no_physician_loc: "#V Достижения этого [concept_panum_physician]#! будут отображаться здесь, как только вы их получите." #deepl:3202202811
 panum_physician_achievements_intro_loc: "#V Достижения этого врача#!\n[Scope.GetCharacter.GetFullName] является успешным врачом." #deepl:2011576622

 panum_physician_achievement_successful_treatments_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] имеет опыт лечения пациентов и #o успешно лечил [GetPlayer.MakeScope.Var('panum_physician_var').GetVariable('panum_physician_successful_treatments_var').GetValue] пациентов#!." #deepl:2185896488
 panum_physician_achievement_epidemiologist_loc: "\n[Scope.GetCharacter.GetSheHe|U] много изучал болезни и стал #o $panum_epidemiologist$ #! ." #deepl:1702393838
 panum_physician_achievement_surgeon_loc: "\n[Scope.GetCharacter.GetSheHe|U] провел множество операций и поэтому считается хорошим #o $panum_surgeon$ #! ." #deepl:3171499380
 panum_physician_achievement_psychiatrist_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] всесторонне изучает человеческий разум и является #o известным $panum_psychiatrist$#! ." #deepl:60079648
 panum_physician_achievement_military_physician_loc: "\nКак #o $panum_military_physician$ #! [Scope.GetCharacter.GetSheHe] он видел ужасы войны и знает, как обращаться с людьми в ужасных обстоятельствах." #deepl:696092700
 panum_physician_achievement_germ_theory_inventor_loc: "\Доктор [Scope.GetCharacter.GetLastNameNoFormatting] изобрел #o теорию микробов#!, которая спасла уже тысячи жизней." #deepl:2770995117
 panum_physician_achievement_pneumothorax_inventor_loc: "\nОдно из величайших изобретений [Scope.GetCharacter.GetHerHim] - это #o устройство для искусственного пневмоторакса#!. Это приводит к коллапсу легких, что может помочь в лечении туберкулеза." #deepl:304953214
 panum_physician_achievement_thoracoplasty_inventor_loc: "\Благодаря [Scope.GetCharacter.GetHerHis] хирургическим навыкам доктор [Scope.GetCharacter.GetLastNameNoFormatting] изобрел #o процедуру, которая произвела революцию в хирургии легких, названную торакопластикой#!, и тем самым позволила улучшить лечение больных туберкулезом." #deepl:3014173894
 panum_physician_achievement_attended_medical_congress_loc: "\n[Scope.GetCharacter.GetSheHe] участвовал как минимум в одном #o медицинском конгрессе#! и делился [Scope.GetCharacter.GetHerHis] идеями." #deepl:1479296090
 mendelejew_chemist_achievement_aspirin_inventor_loc: "\nДоктор [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastNameNoFormatting] считается главным изобретателем #o аспирина#!, который не только облегчил боль бесчисленным пациентам, но и произвел революцию в фармацевтической промышленности." #deepl:2162525717
 panum_physician_achievement_xray_inventor_loc: "\n Благодаря открытию #o рентгеновских лучей#! доктор [GetPlayer.MakeScope.Var('curie_physicist_var').GetCharacter.GetLastNameNoFormatting] считается одним из ведущих мировых физиков, совершивших революцию в медицине и физике в равной степени." #deepl:34275984
 panum_physician_achievement_bloodtypes_inventor_loc: "\n Благодаря открытию различных #o групп крови, а именно A, B, AB и 0#!, доктор [Scope.GetCharacter.GetLastNameNoFormatting] сыграл важную роль в том, чтобы мы лучше понимали кровь как таковую, и чтобы переливание крови было более успешным." #deepl:3740473168
 panum_physician_achievement_ecg_inventor_loc: "\nЭлектрокардиограф #o #! , изобретенный доктором [Scope.GetCharacter.GetLastNameNoFormatting], позволил измерить электрическую активность сердца и стал важной вехой в работе больниц." #deepl:2321856106
 panum_physician_achievement_transplantation_inventor_loc: "\n Благодаря #o первой трансплантации#! доктор [Scope.GetCharacter.GetLastNameNoFormatting] занял достойное место в истории медицины." #deepl:2933890993
 panum_physician_achievement_stereotactic_method_inventor_loc: "\nПо сей день изобретенный #o стереотаксический метод#! [Scope.GetCharacter.GetSheHe] считается новаторским в хирургии мозга." #deepl:147308326
 panum_physician_achievement_cardiopulmonary_bypass_inventor_loc: "\n Благодаря разработке #o сердечно-легочного шунтирования#! доктор [Scope.GetCharacter.GetLastNameNoFormatting] создал шедевр современной медицины." #deepl:3531788201
 panum_physician_achievement_endoscope_inventor_loc: "\n[Scope.GetCharacter.GetHerHis|U] особенно запомнилось изобретение #o эндоскопа#!, с помощью которого впервые удалось рассмотреть внутренности человека." #deepl:2202274893
 panum_physician_achievement_ophthalmoscope_inventor_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] изобрел прибор, облегчающий исследование глазных болезней, и тем самым оказал неоценимую услугу офтальмологии: #o Офтальмоскоп#!." #deepl:657308744
 panum_physician_achievement_chemotherapy_inventor_loc: "\nПодробнее #o Химиотерапия#! [Scope.GetCharacter.GetSheHe] , разработанная для лечения даже самых упорных болезней с помощью различных лекарств, дает надежду даже больным раком, что не все тщетно." #deepl:1291980204
 panum_physician_achievement_iron_lung_inventor_loc: "\n[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetHerHis|U] #o  Строительство первого железного легкого#! для поддержания жизни больных полиомиелитом, нуждающихся в помощи, считается одним из самых захватывающих инженерных достижений нашего времени." #deepl:2605796385
 panum_physician_achievement_military_medicine_project_finished_loc: "#o \nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] изобрел новейшие методы в области полевой медицины#!, сделав военно-медицинскую службу одной из самых признанных в мире." #deepl:3753274088
 panum_physician_achievement_inaugurated_asylum_loc: "\Доктор [Scope.GetCharacter.GetLastNameNoFormatting] сыграл решающую роль в основании первого в стране #o психиатрического приюта#! для оказания всесторонней и гуманной помощи душевнобольным." #deepl:2471346129
 panum_physician_achievement_anthrax_disease_loc: "\Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #o  специализируется на сибирской язве#! и разработал эффективные методы ее профилактики и лечения." #deepl:2201385397
 panum_physician_achievement_goiter_disease_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] #o  специализируется на зобе#! и разработал эффективные методы его профилактики и лечения." #deepl:693298154
 panum_physician_achievement_nephrolithiasis_disease_loc: "\Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #o  специализируется на нефролитиазе#! и разработал эффективные методы его профилактики и лечения." #deepl:3950905505
 panum_physician_achievement_pellagra_disease_loc: "\Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #o  специализируется на пеллагре#! и разработал эффективные методы ее профилактики и лечения." #deepl:1987809959
 panum_physician_achievement_rickets_disease_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] #o  специализируется на рахите#! и разработал эффективные методы его профилактики и лечения." #deepl:660217329
 panum_physician_achievement_syphilis_disease_loc: "#o \nД-р [Scope.GetCharacter.GetLastNameNoFormatting] специализируется на сифилисе#! и разработал эффективные методы его профилактики и лечения." #deepl:908555016
 panum_physician_achievement_tetanus_disease_loc: "\Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #o  специализируется на столбняке#! и разработал эффективные методы его профилактики и лечения." #deepl:1982558023
 panum_physician_achievement_basketball_inventor_loc: "\nВ [Scope.Var('panum_physician_achievement_basketball_inventor_year_var').GetValue|0] доктор [Scope.GetCharacter.GetLastNameNoFormatting] #o  изобрел новый командный вид спорта под названием баскетбол.#!" #deepl:207476415
