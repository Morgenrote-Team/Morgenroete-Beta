l_russian:
 MR_NATURALIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'ito_naturalist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'ito_naturalist_no_naturalist_loc')]"
 ito_naturalist_achievements_loc: "$ito_naturalist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_zoo_animals_type')][Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_wildlife_documentaries_type')][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').IsSet , Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').IsSet , Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').IsSet , Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_great_barrier_reef_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_great_barrier_reef_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').IsSet , Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').IsSet , Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').IsSet , Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').IsSet , Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_goliathus_var').IsSet , Scope.Var('ito_naturalist_achievement_found_goliathus_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').IsSet , Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').IsSet , Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').GetFlagName)]"
 ito_naturalist_no_naturalist_loc: "Здесь будут отображаться достижения этого [Concept('concept_dubois_naturalist', '#b #GREEN натуралиста#!#!')]#!, как только он у вас появится."
 ito_naturalist_achievements_intro_loc: "#V Достижения этого натуралиста#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] — выдающийся натуралист. [SelectLocalization(Scope.GetCharacter.IsFemale, 'Её', 'Его')] усердные труды позволили собрать [Scope.Var('dubois_naturalist_total_specimens_var').GetValue|0*V] [Concept('concept_dubois_specimen', 'образцов')], что расширило границы научных знаний.#!"
 ito_naturalist_achievement_total_zoo_animals_loc: "\n #indent_newline:3 • За время своей работы натуралистом [SelectLocalization(Scope.GetCharacter.IsFemale, 'она', 'он')] добыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] и доставил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] для [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] в общей сложности [Scope.GetVariable('ito_naturalist_total_zoo_animals_var').GetValue|0+] [Concept('concept_dubois_zoo_animal', 'экзотических животных')], обогатив зоологические коллекции державы и способствуя просвещению общества.#!"
 ito_naturalist_achievement_total_wildlife_documentaries_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetFullName] оказал[SelectLocalization(GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.IsFemale, 'а', '')] неоценимую услугу науке, задокументировав [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetVariable('ito_character_num_animal_documentations_var').GetValue|0+] [Concept('concept_dubois_zoo_animal', 'экзотических животных')] в их естественной среде обитания, и тем самым внёс вклад в развитие естествознания.#!"
 ito_naturalist_achievement_invented_evolution_theory_loc: "\n #indent_newline:3 • Среди [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] наиболее выдающихся достижений — трактат #V «О происхождении видов»#!, в котором была впервые изложена теория эволюции, навсегда изменившая курс биологической науки.#!"
 ito_naturalist_achievement_attended_hippocampus_congress_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] принял[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] участие в престижном Конгрессе по гиппокампу, где велись жаркие дебаты об уникальности человека в животном царстве.#!"
 ito_naturalist_achievement_showed_evolution_in_peppered_moths_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] предоставил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] эмпирические доказательства адаптации у #V берёзовой пяденицы#!, тем самым подтвердив принципы теории эволюции путём скрупулёзных наблюдений.#!"
 ito_naturalist_achievement_finished_pacific_expedition_loc: "\n #indent_newline:3 • Во время #V экспедиции в Тихий океан#! доктор [Scope.GetCharacter.GetLastNameNoFormatting] провел[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] исчерпывающие исследования флоры и фауны региона, открыв множество неизвестных доселе науке видов.#!"
 ito_naturalist_achievement_wallace_line_discovered_loc: "\n #indent_newline:3 • Путешествуя по Тихому океану, [Scope.GetCharacter.GetLastNameNoFormatting] обнаружил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] #V чёткую демаркационную линию между азиатской и австралийской биотой#! — открытие, которое подтвердило теорию эволюции и пролило свет на древнее разделение этих земель.#!"
 ito_naturalist_achievement_inaugurated_zoo_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] сыграл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] ключевую роль в #V создании Зоологического сада#!, предоставив общественности возможность наблюдать за экзотическими видами и способствуя делу научного просвещения.#!"
 ito_naturalist_achievement_found_victoria_amazonica_loc: "\n #indent_newline:3 • Во время ботанической экспедиции на Амазонку профессор [Scope.GetCharacter.GetLastNameNoFormatting] открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] #V гигантскую кувшинку#! — чудо природы, чьи листья могут достигать трёх метров в диаметре.#!"
 ito_naturalist_achievement_found_attacus_atlas_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] обнаружил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] #V павлиноглазку атлас#!, гигантского мотылька из Индокитая, примечательного своим размером и прочностью шёлка, что обогатило знания в области энтомологии.#!"
 ito_naturalist_achievement_found_amorphophallus_titanum_loc: "\n #indent_newline:3 • Исследуя Борнео, профессор [Scope.GetCharacter.GetLastNameNoFormatting] идентифицировал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] #V аморфофаллус титанический#! — колоссальный цветок, достигающий трёхметровой высоты, — ботанический феномен, представляющий исключительный интерес.#!"
 ito_naturalist_achievement_found_goliathus_loc: "\n #indent_newline:3 • В тропических лесах Конго доктор [Scope.GetCharacter.GetLastNameNoFormatting] обнаружил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] #V жука-голиафа#!, одного из крупнейших известных насекомых, чья редкость и величие captivated научные круги.#!"
 ito_natualist_achievement_forestry_improvement_finished_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] знаменит[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] своими новаторскими исследованиями в области лесоводства, которые позволили усовершенствовать методы устойчивого управления и улучшения лесных ресурсов.#!"
 ito_naturalist_achievement_rubber_improvement_finished_loc: "\n #indent_newline:3 • Благодаря усердным экспериментам в области выращивания каучука, [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] труды значительно повысили продуктивность плантаций, принеся существенную пользу державе.#!"
 ito_naturalist_achievement_great_barrier_reef_discovered_loc: "\n #indent_newline:3 • Во время научной экспедиции в Тихий океан доктор [Scope.GetCharacter.GetLastNameNoFormatting] предпринял[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] тщательное исследование #V Большого Барьерного рифа#!, перв[SelectLocalization(Scope.GetCharacter.IsFemale, 'ой', 'ым')] осознав его огромное экологическое значение.#!"