 MR_NATURALIST_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'ito_naturalist_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'ito_naturalist_no_naturalist_loc')]" #deepl:1239426788

 ito_naturalist_achievements_loc: "$ito_naturalist_achievements_intro_loc$[Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_zoo_animals_type')][Scope.GetCharacter.GetCustom('ito_naturalist_achievement_total_wildlife_documentaries_type')][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').IsSet , Scope.Var('ito_naturalist_achievement_invented_evolution_theory_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').IsSet , Scope.Var('ito_naturalist_achievement_attended_hippocampus_congress_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').IsSet , Scope.Var('ito_naturalist_achievement_showed_evolution_in_peppered_moths_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').IsSet , Scope.Var('ito_naturalist_achievement_finished_pacific_expedition_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').IsSet , Scope.Var('ito_naturalist_achievement_wallace_line_discovered_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').IsSet , Scope.Var('ito_naturalist_achievement_inaugurated_zoo_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').IsSet , Scope.Var('ito_naturalist_achievement_found_victoria_amazonica_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').IsSet , Scope.Var('ito_naturalist_achievement_found_attacus_atlas_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').IsSet , Scope.Var('ito_naturalist_achievement_found_amorphophallus_titanum_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_found_goliathus_var').IsSet , Scope.Var('ito_naturalist_achievement_found_goliathus_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').IsSet , Scope.Var('ito_natualist_achievement_forestry_improvement_finished_var').GetFlagName)][AddLocalizationIf( Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').IsSet , Scope.Var('ito_naturalist_achievement_rubber_improvement_finished_var').GetFlagName)]" #deepl:3859703363
 ito_naturalist_no_naturalist_loc: "#V Достижения этого [concept_dubois_naturalist]#! будут отображаться здесь, как только вы их получите." #deepl:2308010664
 ito_naturalist_achievements_intro_loc: "#V Достижения этого натуралиста#!\n[Scope.GetCharacter.GetFullName] является опытным натуралистом, который собрал [Scope.Var('dubois_naturalist_total_specimens_var').GetValue|0*V] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] ." #deepl:2770611838

 ito_naturalist_achievement_total_zoo_animals_loc: "\nВо время работы [Scope.GetCharacter.GetHerHis] в качестве натуралиста, в общей сложности [Scope.GetVariable('ito_naturalist_total_zoo_animals_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] были пойманы и доставлены на [GetPlayer.MakeScope.GetCountry.GetName]." #deepl:3523686073
 ito_naturalist_achievement_total_wildlife_documentaries_loc: "\n[GetPlayer.MakeScope.Var('dubois_naturalist_var').GetCharacter.GetFullName] хорошо известен тем, что документирует [GetPlayer.MakeScope.Var('dubois_naturalist_var').GetVariable('ito_character_num_animal_documentations_var').GetValue|0+] [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] в их естественной среде обитания." #deepl:2453492304
 ito_naturalist_achievement_invented_evolution_theory_loc: "\nОдним из самых больших достижений [Scope.GetCharacter.GetHerHis] стала книга \"#V О происхождении видов#!\", в которой впервые была описана теория эволюции." #deepl:510074125
 ito_naturalist_achievement_attended_hippocampus_congress_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] участвовал в дебатах, которые решали, является ли человек уникальным или это просто животное, как и все остальные." #deepl:1532833643
 ito_naturalist_achievement_showed_evolution_in_peppered_moths_loc: "\nПрофессор [Scope.GetCharacter.GetLastNameNoFormatting] показал, что #V перечный мотылек эволюционирует#!, чтобы приспособиться к меняющейся окружающей среде. Доказательство теории эволюции." #deepl:4279082533
 ito_naturalist_achievement_finished_pacific_expedition_loc: "\nВ ходе #V экспедиции в Тихий океан#! доктор [Scope.GetCharacter.GetLastNameNoFormatting] подробно изучил флору и фауну этой удивительной страны. [Scope.GetCharacter.GetSheHe] открыл множество новых видов." #deepl:1584400015
 ito_naturalist_achievement_wallace_line_discovered_loc: "\nВо время путешествия по Тихому океану [Scope.GetCharacter.GetLastNameNoFormatting] было замечено #V четкое разделение между азиатской и австралийской флорой и фауной#!. Эта находка подтверждает теорию эволюции и свидетельствует о массовом разделении островов в прошлом." #deepl:970429435
 ito_naturalist_achievement_inaugurated_zoo_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] сыграл важную роль в #V открытии зоопарка#!. Место, где животных из далеких стран можно увидеть вблизи." #deepl:915470862
 ito_naturalist_achievement_found_victoria_amazonica_loc: "\nВ ходе ботанической экспедиции в тропических лесах Амазонки профессор [Scope.GetCharacter.GetLastNameNoFormatting] обнаружил #V гигантскую водяную лилию#!. Уникальное растение, способное отращивать листья диаметром до 3 метров." #deepl:3652726149
 ito_naturalist_achievement_found_attacus_atlas_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] нашел #V Титаническую бабочку#! во время ботанической экспедиции в Индокитае. Это одна из самых крупных бабочек в мире, которая производит очень прочный шелк." #deepl:3954278434
 ito_naturalist_achievement_found_amorphophallus_titanum_loc: "\nВ ходе ботанической экспедиции на Борнео профессор [Scope.GetCharacter.GetLastNameNoFormatting] обнаружил #V огромный цветок#!, вырастающий до 3 метров в высоту. Настоящее ботаническое чудо." #deepl:998846928
 ito_naturalist_achievement_found_goliathus_loc: "\В тропических лесах Конго много чудес. Одно из них было обнаружено доктором [Scope.GetCharacter.GetLastNameNoFormatting] во время ботанической экспедиции. #V Жук-голиаф#! - одно из самых крупных насекомых в мире и, судя по всему, довольно редкое." #deepl:3755908676
 ito_natualist_achievement_forestry_improvement_finished_loc: "\nПрофессор [Scope.GetCharacter.GetLastNameNoFormatting] хорошо известен благодаря [Scope.GetCharacter.GetHerHis] работе, посвященной лесам и способам улучшения лесного хозяйства." #deepl:3521424779
 ito_naturalist_achievement_rubber_improvement_finished_loc: "\n[Scope.GetCharacter.GetHerHis|U] работа на каучуковых плантациях и эксперименты с лучшими условиями выращивания позволили нашей стране значительно улучшить производство каучука." #deepl:1444884744
