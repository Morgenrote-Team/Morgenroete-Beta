l_russian:
 MR_PAINTER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'klimt_painter_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'klimt_painter_achievements_no_painter_loc')]"
 klimt_painter_achievements_loc: "$klimt_painter_achievements_intro_loc$[AddLocalizationIf( Scope.Var('klimt_painter_achievement_vernissage_var').IsSet , Scope.Var('klimt_painter_achievement_vernissage_var').GetFlagName)][AddLocalizationIf( Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').IsSet , Scope.Var('klimt_painter_achievement_inaugurated_gallery_var').GetFlagName)]"
 klimt_painter_achievements_no_painter_loc: "Здесь будут отображаться достижения этого [Concept('concept_klimt_painter', '#b #PURPLE художника#!#!')]#!, как только он у вас появится."
 klimt_painter_achievements_intro_loc: "#V Достижения этого художника#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] — [Scope.GetCharacter.GetCustom('klimt_painter_achievement_experience_type')].#!\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она создала', 'Он создал')] [Scope.Var('klimt_painter_num_paintings_var').GetValue|V0] картин, [Scope.Var('klimt_painter_num_masterworks_var').GetValue|V0] из которых считаются шедеврами.#!"
 klimt_painter_achievement_vernissage_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] выставил[SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'а', '')] свои картины на большом вернисаже.#!"
 klimt_painter_achievement_inaugurated_gallery_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] новую художественную галерею, представив там свои прекрасные картины. Несомненно, в будущем эта галерея увидит ещё много великих художников!#!"