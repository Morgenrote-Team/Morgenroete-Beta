l_russian:
 MR_ENGINEER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'tesla_engineer_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'tesla_engineer_achievements_no_engineer_loc')]"
 tesla_engineer_achievements_loc: "$tesla_engineer_achievements_intro_loc$[AddLocalizationIf( Scope.Var('tesla_engineer_achievements_invented_steel_frame_var').IsSet , Scope.Var('tesla_engineer_achievements_invented_steel_frame_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_invented_electric_telegraph_var').IsSet , Scope.Var('tesla_engineer_achievements_invented_electric_telegraph_var').GetFlagName)][AddLocalizationIf( Scope.Var('panum_physician_achievement_iron_lung_inventor_var').IsSet , Scope.Var('panum_physician_achievement_iron_lung_inventor_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_road_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_road_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_irrigation_project_finished_engineer_var').IsSet , Scope.Var('tesla_irrigation_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_bridge_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_bridge_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_tunnel_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_tunnel_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_railway_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_railway_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_construction_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_construction_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_topographic_map_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_topographic_map_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_locomotive_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_locomotive_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_production_methods_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').IsSet , Scope.Var('tesla_mechanical_computer_project_finished_engineer_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_rifles_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_tanks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_fieldworks_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_geomagnetic_observartory_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_telegraphy_network_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_radio_networ_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_airport_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_airport_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').IsSet , Scope.Var('tesla_engineer_achievements_finished_warplane_project_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievements_bicycle_invented_var').IsSet , Scope.Var('tesla_engineer_achievements_bicycle_invented_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievement_transatlantic_cable_var').IsSet , Scope.Var('tesla_engineer_achievement_transatlantic_cable_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievement_suez_india_cable_var').IsSet , Scope.Var('tesla_engineer_achievement_suez_india_cable_var').GetFlagName)][AddLocalizationIf( Scope.Var('tesla_engineer_achievement_transpacific_cable_var').IsSet , Scope.Var('tesla_engineer_achievement_transpacific_cable_var').GetFlagName)]"
 tesla_engineer_achievements_no_engineer_loc: "Здесь будут отображаться достижения этого [Concept('concept_tesla_engineer', '#b #ORANGE инженера#!#!')]#!, как только он у вас появится."
 tesla_engineer_achievements_intro_loc: "#V Достижения этого инженера#!\n"
 tesla_engineer_achievements_invented_steel_frame_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] построил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] первое #V сооружение со стальным каркасом#!. Этот способ строительства распространился по миру с невероятной скоростью.#!"
 tesla_engineer_achievements_invented_electric_telegraph_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она стала', 'Он стал')] первым человеком, #V отправившим телеграмму#! с помощью алфавита, который [SelectLocalization(Scope.GetCharacter.IsFemale, 'она', 'он')] изобрел[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')].#!"
 tesla_engineer_achievements_invented_automobile_loc: "\n #indent_newline:3 • В [Scope.Var('tesla_engineer_achievements_invented_automobile_year_var').GetValue] году [Scope.GetCharacter.GetLastNameNoFormatting] изобрел[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] #V автомобиль с двигателем внутреннего сгорания#! и проехал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] на нём большое расстояние. Это ознаменовало начало взрывного распространения автомобилей.#!"
 tesla_engineer_achievements_finished_road_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] усовершенствовал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] #V дорожные сети#!. Благодаря [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] работе по модернизации дорог, они теперь считаются самыми современными в мире.#!"
 tesla_engineer_achievements_finished_bridge_project_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] построил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] множество #V новых мостов#!, что привело к улучшению инфраструктуры.#!"
 tesla_engineer_achievements_finished_tunnel_project_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] работал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] над строительством множества #V туннелей#!, которые являются настоящими чудесами техники.#!"
 tesla_engineer_achievements_finished_railway_project_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] значительно #V улучшил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] железнодорожные пути#!, внедряя новые технологии и другие усовершенствования.#!"
 tesla_engineer_achievements_finished_construction_project_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V усовершенствовал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] строительный сектор#!, внедряя современное оборудование и строительные технологии.#!"
 tesla_engineer_achievements_finished_topographic_map_project_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] создал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] новую #V топографическую карту#!, которая облегчит будущие строительные проекты.#!"
 tesla_engineer_achievements_finished_locomotive_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] #V разработал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] новые локомотивы#!, которые дадут толчок развитию железных дорог.#!"
 tesla_engineer_achievements_finished_production_methods_project_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] помог[SelectLocalization(Scope.GetCharacter.IsFemale, 'ла', '')] различным компаниям #V улучшить их производство#!.#!"
 tesla_engineer_achievements_finished_rifles_project_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V спроектировал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] новую винтовку#!, одну из самых современных в мире.#!"
 tesla_engineer_achievements_finished_tanks_project_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] — #V пионер в проектировании и строительстве танков#!, модернизировавший[SelectLocalization(Scope.GetCharacter.IsFemale, 'ая', '')] наши танки.#!"
 tesla_engineer_achievements_finished_fieldworks_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] #V произвел[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] революцию в полевых укреплениях и обороне#!, что спасло жизни многих солдат.#!"
 tesla_engineer_achievements_finished_geomagnetic_observartory_project_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] помог[SelectLocalization(Scope.GetCharacter.IsFemale, 'ла', '')] в проведении геомагнитных исследований, #V построив геомагнитную обсерваторию#!.#!"
 tesla_engineer_achievements_finished_telegraphy_network_project_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] построил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] #V телеграфную сеть#!.#!"
 tesla_engineer_achievements_finished_radio_networ_project_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V построил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] радиосеть#!.#!"
 tesla_engineer_achievements_finished_airport_project_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] #V модернизировал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] аэропорты#!.#!"
 tesla_engineer_achievements_finished_warplane_project_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] разработал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] #V современные самолёты для военных#!.#!"
 tesla_engineer_achievements_bicycle_invented_loc: "\n #indent_newline:3 • В [Scope.Var('tesla_engineer_achievements_bicycle_invented_year_var').GetValue|0] году [Scope.GetCharacter.GetLastNameNoFormatting] #V изобрел[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] первый велосипед#!. Отличный новый способ путешествовать, используя только собственную энергию.#!"
 tesla_engineer_achievement_transatlantic_cable_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting] был[SelectLocalization(GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.IsFemale, 'а', '')] главным инженером при строительстве трансатлантического кабеля и, таким образом, является автором технического шедевра.#!"
 tesla_engineer_achievement_suez_india_cable_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting] руководил[SelectLocalization(GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.IsFemale, 'а', '')] прокладкой суэцко-индийского кабеля, создав важнейшую связь между континентами благодаря отточенному инженерному мастерству.#!"
 tesla_engineer_achievement_transpacific_cable_loc: "\n #indent_newline:3 • [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting] руководил[SelectLocalization(GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.IsFemale, 'а', '')] экспедицией по прокладке транстихоокеанского кабеля, совершив один из самых сложных подвигов в морской телеграфии.#!"