 tesla_engineer_achievements_no_engineer_loc: "#V Достижения этого [concept_gaudi_engineer]#! будут отображаться здесь, как только вы их получите." #deepl:2624550252
 tesla_engineer_achievements_intro_loc: "#V Достижения этого инженера#!\n" #deepl:3891137056

 tesla_engineer_achievements_invented_steel_frame_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] построил первое #V здание с использованием стальных рам#!. Этот способ строительства распространился по всему миру как лесной пожар." #deepl:3716706247
 tesla_engineer_achievements_invented_electric_telegraph_loc: "\n[Scope.GetCharacter.GetSheHe] was the first person to #V Send a Telegram#! using an alphabet [Scope.GetCharacter.GetSheHe] invented." #pleace replace
 tesla_engineer_achievements_invented_automobile_loc: "\nIn [Scope.Var('tesla_engineer_achievements_invented_automobile_year_var').GetValue] [Scope.GetCharacter.GetLastNameNoFormatting] изобрел #V автомобиль с двигателем внутреннего сгорания#! и проехал на нем большое расстояние. Это положило начало взрывному распространению автомобиля." #deepl:88145422
 tesla_engineer_achievements_finished_road_project_loc: "\n[Scope.GetCharacter.GetFullName] улучшенные #V дорожные сети#!. Благодаря работе [Scope.GetCharacter.GetHerHis] по модернизации дорог они считаются самыми современными в мире." #deepl:2097415548
 tesla_engineer_achievements_finished_bridge_project_loc: "\n[Scope.GetCharacter.GetSheHe] построил много #V новых мостов#!, что привело к улучшению инфраструктуры." #deepl:2671184667
 tesla_engineer_achievements_finished_tunnel_project_loc: "\Доктор [Scope.GetCharacter.GetLastNameNoFormatting] работал над строительством множества #V туннелей#!, которые являются маленькими чудесами технологии." #deepl:922154902
 tesla_engineer_achievements_finished_railway_project_loc: "\n[Scope.GetCharacter.GetSheHe] массовое #V улучшение железнодорожных линий#! путем внедрения новых технологий и других усовершенствований." #deepl:721890021
 tesla_engineer_achievements_finished_construction_project_loc: "\nД-р [Scope.GetCharacter.GetLastNameNoFormatting] #V  улучшил строительные отрасли#!, внедрив современное оборудование и технологии строительства." #deepl:987346687
 tesla_engineer_achievements_finished_topographic_map_project_loc: "\n[Scope.GetCharacter.GetSheHe] создал новую #V топографическую карту#!, которая облегчает будущие строительные проекты." #deepl:2317700588
 tesla_engineer_achievements_finished_locomotive_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  разработал новые локомотивы#!, которые будут способствовать развитию железных дорог." #deepl:2246312284
 tesla_engineer_achievements_finished_production_methods_project_loc: "\n[Scope.GetCharacter.GetSheHe|U] помог различным компаниям #V улучшить свое производство#!." #deepl:3837789510
 tesla_engineer_achievements_finished_rifles_project_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] #V  разработал новую винтовку#!, которая является одной из самых современных в мире." #deepl:373585695
 tesla_engineer_achievements_finished_tanks_project_loc: "\n[Scope.GetCharacter.GetSheHe] - это #V пионер в области проектирования и строительства танков#!, который модернизировал наши танки." #deepl:1266234006
 tesla_engineer_achievements_finished_fieldworks_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  произвел революцию в полевых и оборонительных сооружениях#!, которая спасла жизнь многим солдатам." #deepl:3300715553
 tesla_engineer_achievements_finished_geomagnetic_observartory_project_loc: "#V \nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] помог провести геомагнитные исследования, построив Геомагнитную обсерваторию#!." #deepl:2611684424
 tesla_engineer_achievements_finished_telegraphy_network_project_loc: "\n[Scope.GetCharacter.GetSheHe] построил #V телеграфную сеть#!." #deepl:3900781177
 tesla_engineer_achievements_finished_radio_networ_project_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] #V  построил радиосеть#!." #deepl:494089721
 tesla_engineer_achievements_finished_airport_project_loc: "\n[Scope.GetCharacter.GetLastNameNoFormatting] #V  модернизировал аэропорты#!." #deepl:4174187253
 tesla_engineer_achievements_finished_warplane_project_loc: "\n[Scope.GetCharacter.GetSheHe] разработано #V Современные самолеты для военных#!." #deepl:3583316823
 tesla_engineer_achievements_bicycle_invented_loc: "В [Scope.Var('tesla_engineer_achievements_bicycle_invented_year_var').GetValue|0] [Scope.GetCharacter.GetLastNameNoFormatting] #V  был изобретен первый велосипед#!. Отличный новый способ путешествовать, используя только собственную энергию." #deepl:1060401141
