l_russian:
 MR_AUTOMATE_ENGINEER_TT: "#T Автоматизация действий [Concept('concept_tesla_engineer', '#b #ORANGE инженера#!#!')]#!\nЕсли вы включите автоматизацию, вам больше не придётся давать задания своему инженеру.\nОн будет работать самостоятельно и выполнять наиболее целесообразные в данный момент задачи. Тем не менее вы по-прежнему будете получать некоторые события.\n\n#n Обратите внимание, что автоматизация, вероятно, менее эффективна, чем прямое управление инженером.#!"
 mr_engineering_automation_gui_tt: "Начать автоматизацию задач [Concept('concept_tesla_engineer', '#b #ORANGE инженера#!#!')]."
 mr_stop_engineering_automation_gui_tt: "Остановить автоматизацию задач [Concept('concept_tesla_engineer', '#b #ORANGE инженера#!#!')]."
 MR_STOP_AUTOMATE_ENGINEER_TT: "#T Остановить автоматизацию действий [Concept('concept_tesla_engineer', '#b #ORANGE инженера#!#!')]#!\nДействия вашего инженера больше не будут автоматизированы."
 MR_ENGINEER_RANKING_BUTTON: "Инженеры"
 MR_RANKING_BY_ENGINEER: "Показать рейтинг всех [Concept('concept_tesla_engineer', '#b #ORANGE инженеров#!#!')] в мире."
 ENGINEER_ENGINEER_RANKING_HEADER: "#V Рейтинг [Concept('concept_tesla_engineer', '#b #ORANGE инженеров#!#!')] мира по [Concept('concept_academics_experience', 'опыту')]"
 tesla_experience_current_specialization_civil_loc: "[Character.MakeScope.GetVariable('tesla_civil_engineer_experience_var').GetValue|V0]"
 tesla_experience_current_specialization_mechanical_loc: "[Character.MakeScope.GetVariable('tesla_mechanical_engineer_experience_var').GetValue|V0]"
 tesla_experience_current_specialization_military_loc: "[Character.MakeScope.GetVariable('tesla_military_engineer_experience_var').GetValue|V0]"
 tesla_experience_current_specialization_electrical_loc: "[Character.MakeScope.GetVariable('tesla_electrical_engineer_experience_var').GetValue|V0]"
 tesla_experience_current_specialization_aeronautical_loc: "[Character.MakeScope.GetVariable('tesla_aeronautical_engineer_experience_var').GetValue|V0]"