l_russian:
 MR_ARCHITECT_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'gaudi_architect_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'gaudi_architect_achievements_no_architect_loc')]"
 gaudi_architect_achievements_loc: "$gaudi_architect_achievements_intro_loc$[AddLocalizationIf( Scope.Var('gaudi_architecture_treatise_var').IsSet , Scope.Var('gaudi_architecture_treatise_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_study_trip_var').IsSet , Scope.Var('gaudi_architect_achievement_study_trip_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_urban_planning_var').IsSet , Scope.Var('gaudi_architect_achievement_urban_planning_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_capital_expansion_var').IsSet , Scope.Var('gaudi_architect_achievement_capital_expansion_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_art_deco_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_art_deco_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_neoclassical_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_neoclassical_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_bauhaus_splendour_var').IsSet , Scope.Var('gaudi_architect_achievement_bauhaus_splendour_var').GetFlagName)][AddLocalizationIf( Scope.Var('gaudi_architect_achievement_custom_monument_var').IsSet , Scope.Var('gaudi_architect_achievement_custom_monument_var').GetFlagName)]"
 gaudi_architect_achievements_no_architect_loc: "Здесь будут отображаться #V достижения этого [Concept('concept_gaudi_architect', '#b #PURPLE архитектора#!#!')]#!, как только он у вас появится."
 gaudi_architect_achievements_intro_loc: "#V Достижения этого архитектора#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] - [Scope.GetCharacter.GetCustom('gaudi_architect_achievement_experience_type')]. За свою архитектурную карьеру [SelectLocalization(Scope.GetCharacter.IsFemale, 'она создала', 'он создал')] [Scope.Var('gaudi_character_num_blueprints_var').GetValue|V0] #V чертежей#!.#!"
 gaudi_architect_achievement_study_trip_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] #V [SelectLocalization(Scope.GetCharacter.IsFemale, 'совершила', 'совершил')] учебную поездку архитектора#!.#!"
 gaudi_architect_achievement_urban_planning_loc: "\n #indent_newline:3 • Своим #V городским планированием#! [SelectLocalization(Scope.GetCharacter.IsFemale, 'она помогла', 'он помог')] улучшить жизнь в городах.#!"
 gaudi_architect_achievement_treatise_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Её', 'Его')] #V «Трактат об архитектуре»#! считается эталонным трудом.#!"
 gaudi_architect_achievement_custom_monument_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'знаменита', 'знаменит')] созданием чертежа #V уникального памятника#! - настоящего архитектурного шедевра!#!"
 gaudi_architect_achievement_art_deco_splendour_loc: "\n #indent_newline:3 • Одним из самых выдающихся достижений в [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] карьере стала полная #V городская трансформация в стиле ар-деко#!.#!"
 gaudi_architect_achievement_neoclassical_splendour_loc: "\n #indent_newline:3 • Одним из самых выдающихся достижений в [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] карьере стала полная #V городская трансформация в неоклассическом стиле#!.#!"
 gaudi_architect_achievement_bauhaus_splendour_loc: "\n #indent_newline:3 • Одним из самых выдающихся достижений в [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] карьере стала полная #V городская трансформация в стиле баухауз#!.#!"
 gaudi_architect_achievement_capital_expansion_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetLastNameNoFormatting] неустанно [SelectLocalization(Scope.GetCharacter.IsFemale, 'работала', 'работал')] над развитием столицы.#!"