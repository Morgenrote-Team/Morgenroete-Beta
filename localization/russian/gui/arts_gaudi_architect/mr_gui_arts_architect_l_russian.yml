 GUI_gaudi_architect_experience_normal_loc: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] имеет #V [Concept('concept_artists_experience', 'репутацию')]#! [ROOT.Var('gaudi_architect_var').GetVariable('gaudi_architect_experience').GetValue|+0] / 500.\nПри достижении #V 500 ед. репутации#! [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она получит', 'он получит')] [Concept('concept_character_trait', 'черту')] «[concept_gaudi_great_architect]»."
 GUI_gaudi_architect_famous_loc: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] достиг[ROOT.Var('gaudi_architect_var').GetCharacter.GetAltNameNoFormatting('RU_CL_END_FEM')] максимальной #V репутации#! в #p 500#! ед.\nТеперь [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она обладает', 'он обладает')] [Concept('concept_character_trait', 'чертой')] «[concept_gaudi_great_architect]»."
