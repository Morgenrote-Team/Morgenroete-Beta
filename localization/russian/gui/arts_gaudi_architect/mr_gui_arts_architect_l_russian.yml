 ARCHITECTURAL_BLUEPRINTS_VAR_TT: "У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [GetPlayer.MakeScope.GetVariable('gaudi_country_num_blueprints_var').GetValue|0+] [Concept('concept_gaudi_architectural_blueprint', 'архитектурных чертежей')]."
 MR_ARCHITECT_VISIT_CAPITAL_BUTTON: "Посетить столицу"
 MR_ARCHITECT_VISIT_CAPITAL_BUTTON_TT: "#T Посетить столицу#!\nВаша столица — это место, которое стоит посетить, чтобы увидеть изумительную архитектуру вашей страны.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_VISIT_CAPITAL_BUTTON_TRIGGER_TT: "#default_text #r Столица скоро появится в Morgenröte.#!#!"
