l_russian:
 MR_ARCHITECT_MODERN_SPLENDOUR_BUTTON: "Современное великолепие"
 MR_ARCHITECT_MODERN_SPLENDOUR_BUTTON_TT: "#T Современное великолепие#!\nИмея современную архитектурную школу, мы можем превратить столицу нашей державы в настоящую мечту, воплощённую в смелых архитектурных экспериментах. Ар-деко считается самым престижным стилем, но преобразование займёт больше времени.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_ACTIVE_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_gaudi_architect], который #V не занят#!.#!"
 MR_MODERN_ARCHITECTURE_SCHOOL_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть один из следующих модификаторов: #V «Архитектура баухауза»#!, #V «Неоклассическая архитектура»#! или #V «Архитектура ар-деко»#!.#!"
 MR_ARCHITECT_BLUEPRINTS_MONUMENT_BUTTON: "Чертежи: городские памятники"
 MR_ARCHITECT_BLUEPRINTS_MONUMENT_BUTTON_TT: "#T Чертежи: городские памятники#!\nАрхитектор может разработать три возможных чертежа в категории «Памятники»: «[GetBuildingType('building_gaudi_statue').GetName]», «[GetBuildingType('building_gaudi_fountain').GetName]» и «[GetBuildingType('building_gaudi_arch').GetName]». Некоторые чертежи требуют наличия технологий, а некоторые сооружения имеют особые требования в соответствующих областях.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_MONUMENT_TRIGGER_TT: "#default_text Для сооружения «[GetBuildingType('building_gaudi_statue').GetName]» требуется технология «[GetTechnology('elgar_classicism_tech').GetName]».\nДля сооружения «[GetBuildingType('building_gaudi_fountain').GetName]» нет требований.\nДля сооружения «[GetBuildingType('building_gaudi_arch').GetName]» требуется технология «[GetTechnology('napoleonic_warfare').GetName]».#!"
 MR_ARCHITECT_BLUEPRINTS_SQUARE_BUTTON: "Чертежи: общественные площади"
 MR_ARCHITECT_BLUEPRINTS_SQUARE_BUTTON_TT: "#T Чертежи: общественные площади#!\nАрхитектор может разработать три возможных чертежа в категории «Площади»: «[GetBuildingType('building_gaudi_park').GetName]», «[GetBuildingType('building_gaudi_luna').GetName]» и «[GetBuildingType('building_gaudi_parade').GetName]». Некоторые чертежи требуют наличия технологий, а некоторые сооружения имеют особые требования в соответствующих областях.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_SQUARE_TRIGGER_TT: "#default_text Для сооружения «[GetBuildingType('building_gaudi_park').GetName]» нет требований.\nДля сооружения «[GetBuildingType('building_gaudi_luna').GetName]» требуется технология «[GetTechnology('curtiss_tourism_tech').GetName]».\nДля сооружения «[GetBuildingType('building_gaudi_parade').GetName]» требуется технология «[GetTechnology('nationalism').GetName]».#!"
 MR_ARCHITECT_BLUEPRINTS_SERVICE_BUTTON: "Чертежи: служебные сооружения"
 MR_ARCHITECT_BLUEPRINTS_SERVICE_BUTTON_TT: "#T Чертежи: служебные сооружения#!\nАрхитектор может разработать три возможных чертежа в категории «Обслуживание»: «[GetBuildingType('building_gaudi_almshouse').GetName]», «[GetBuildingType('building_gaudi_school').GetName]» и «[GetBuildingType('building_gaudi_prison').GetName]». Некоторые чертежи требуют наличия технологий, а некоторые сооружения имеют особые требования в соответствующих областях.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_SERVICE_TRIGGER_TT: "#default_text Для сооружения «[GetBuildingType('building_gaudi_almshouse').GetName]» требуется технология «[GetTechnology('egalitarianism').GetName]».\nДля сооружения «[GetBuildingType('building_gaudi_school').GetName]» требуется технология «[GetTechnology('empiricism').GetName]».\nДля сооружения «[GetBuildingType('building_gaudi_prison').GetName]» требуется технология «[GetTechnology('law_enforcement').GetName]».#!"
 MR_ARCHITECT_BLUEPRINTS_HEALTH_BUTTON: "Чертежи: учреждения здравоохранения"
 MR_ARCHITECT_BLUEPRINTS_HEALTH_BUTTON_TT: "#T Чертежи: учреждения здравоохранения#!\nАрхитектор может разработать три возможных чертежа в категории «Здравоохранение»: «[GetBuildingType('building_gaudi_canalization').GetName]», «[GetBuildingType('building_gaudi_hospital').GetName]» и «[GetBuildingType('building_gaudi_health').GetName]». Некоторые чертежи требуют наличия технологий, а некоторые сооружения имеют особые требования в соответствующих областях.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_HEALTH_TRIGGER_TT: "#default_text Для сооружения «[GetBuildingType('building_gaudi_canalization').GetName]» требуется технология «[GetTechnology('modern_sewerage').GetName]».\nДля сооружения «[GetBuildingType('building_gaudi_hospital').GetName]» требуется технология «[GetTechnology('theiler_microbiology_tech').GetName]».\nДля сооружения «[GetBuildingType('building_gaudi_health').GetName]» требуется технология «[GetTechnology('pharmaceuticals').GetName]».#!"
 MR_ARCHITECT_BLUEPRINTS_ACADEMY_BUTTON: "Чертежи: национальные академии"
 MR_ARCHITECT_BLUEPRINTS_ACADEMY_BUTTON_TT: "#T Чертежи: национальные академии#!\nАрхитектор может разработать три возможных чертежа в категории «Академии»: «[GetBuildingType('building_gaudi_science').GetName]», «[GetBuildingType('building_gaudi_arts').GetName]» и «[GetBuildingType('building_gaudi_sports').GetName]». Некоторые чертежи требуют наличия технологий, а некоторые сооружения имеют особые требования в соответствующих областях.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BLUEPRINTS_ACADEMY_TRIGGER_TT: "#default_text Для сооружения «[GetBuildingType('building_gaudi_science').GetName]» требуется технология «[GetTechnology('dialectics').GetName]».\nДля сооружения «[GetBuildingType('building_gaudi_arts').GetName]» требуется технология «[GetTechnology('romanticism').GetName]».\nДля сооружения «[GetBuildingType('building_gaudi_sports').GetName]» требуется технология «[GetTechnology('vikelas_international_sports_tech').GetName]».#!"
 mr_gui_has_urban_planning_tech_trigger_tt: "#default_text [GetPlayer.GetName] исследовал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] технологию «[GetTechnology('urban_planning').GetName]».#!"
 MR_ARCHITECT_PUBLIC_CONSTRUCTION_BUTTON: "Общественное строительство"
 MR_ARCHITECT_PUBLIC_CONSTRUCTION_BUTTON_TT: "#T Общественное строительство#!\nОсновываясь на своём архитектурном стиле, архитектор может вносить очки строительства на национальном уровне для продвижения общественного строительства. После пяти лет непрерывной работы он получает повышение репутации.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_CUSTOM_MONUMENT_BLUEPRINT_BUTTON: "Шедевр архитектора"
 MR_ARCHITECT_CUSTOM_MONUMENT_BLUEPRINT_BUTTON_TT: "#T Шедевр архитектора#!\n[concept_gaudi_great_architect] может однажды создать чертёж уникального национального памятника в современном стиле. Это дело всей его жизни прославит имя архитектора и подарит нашей стране собственное архитектурное чудо света.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MODERN_ARCHITECT_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_gaudi_architect] с [Concept('concept_character_trait', 'чертой')] #V $gaudi_bauhaus_style$#!, #V $gaudi_neoclassical_style$#! или #V $gaudi_art_deco_style$#!.#!"
 MR_GREAT_ARCHITECT_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_gaudi_great_architect].#!"
 MR_ARCHITECT_URBAN_PLANNING_BUTTON: "Городское планирование"
 MR_ARCHITECT_URBAN_PLANNING_BUTTON_TT: "#T Городское планирование#!\nАрхитекторы могут посещать городские центры страны и значительно улучшать там условия благодаря дальновидному планированию и строительным нормам.\nСо временем это добавит вашему сооружению три модификатора: $gaudi_urban_building_throughput_add_modifier_with_tooltip$, $gaudi_urban_building_production_mult_modifier_with_tooltip$ и $gaudi_urban_building_goods_input_mult_modifier_with_tooltip$.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_URBAN_PLANNING_TRIGGER_TT: "#default_text Как минимум одно сооружение «[GetBuildingType('building_urban_center').GetName]» уровня 1 или выше не имеет всех трёх [Concept('concept_modifier', 'модификаторов')].#!"
 MR_ARCHITECT_STUDY_TRIP_BUTTON: "Учебная поездка архитектора"
 MR_ARCHITECT_STUDY_TRIP_BUTTON_TT: "#T Учебная поездка архитектора#!\nОтправьте своего архитектора на два года, чтобы он приобрёл новые знания и навыки в архитектурных вопросах. В этот период архитектор будет недоступен.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_NO_TRIP_TRIGGER_TT: "#default_text Наш архитектор #R ещё не предпринимал#! никаких учебных поездок.#!"
 mr_gui_has_modern_sewerage_tech_trigger_tt: "#default_text [GetPlayer.GetName] исследовал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] технологию «[GetTechnology('modern_sewerage').GetName]».#!"
 mr_gui_has_steel_frame_buildings_tech_trigger_tt: "#default_text [GetPlayer.GetName] исследовал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] технологию «[GetTechnology('steel_frame_buildings').GetName]».#!"
 mr_gui_has_elevator_tech_trigger_tt: "#default_text [GetPlayer.GetName] исследовал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] технологию «[GetTechnology('elevator').GetName]».#!"
 mr_gui_has_art_deco_tech_trigger_tt: "#default_text [GetPlayer.GetName] исследовал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] технологию «[GetTechnology('elgar_art_deco_tech').GetName]».#!"
 mr_gui_has_neoclassicism_tech_trigger_tt: "#default_text [GetPlayer.GetName] исследовал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] технологию «[GetTechnology('elgar_neoclassicism_tech').GetName]».#!"
 mr_gui_has_new_objectivity_tech_trigger_tt: "#default_text [GetPlayer.GetName] исследовал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] технологию «[GetTechnology('elgar_new_objectivity_tech').GetName]».#!"
 mr_gui_has_defense_in_depth_tech_trigger_tt: "#default_text [GetPlayer.GetName] исследовал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] технологию «[GetTechnology('defense_in_depth').GetName]».#!"
 mr_gui_has_logistics_tech_trigger_tt: "#default_text [GetPlayer.GetName] исследовал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] технологию «[GetTechnology('logistics').GetName]».#!"
 MR_ARCHITECT_CAPITAL_EXPANSION_BUTTON: "Расширение столицы"
 MR_ARCHITECT_CAPITAL_EXPANSION_BUTTON_TT: "#T Расширение столицы#!\nНовые архитектурные стили и строительные технологии открывают возможность превратить нашу столицу из сонного городка за столетие в один из важнейших мегаполисов нашего времени.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_HISTORICIST_ARCHITECT_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_gaudi_architect] с [Concept('concept_character_trait', 'чертой')] #V $gaudi_historicism_style$#!, #V $gaudi_bauhaus_style$#!, #V $gaudi_neoclassical_style$#! или #V $gaudi_art_deco_style$#!.#!"
 MR_ARCHITECT_TREATISE_BUTTON: "Архитектурный трактат"
 MR_ARCHITECT_TREATISE_BUTTON_TT: "#T Архитектурный трактат#!\nАрхитектор может один раз в жизни обобщить свои теоретические идеи об архитектуре. Его результаты могут быть превзойдены другим архитектором, если тот окажется лучше. Результат во многом зависит от опыта. Архитектор, работающий над трактатом, недоступен в течение года.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHITECT_NO_TREATISE_TRIGGER_TT: "#default_text Архитектор ещё #R не писал#! трактат.#!"
 MR_ARCHITECT_TREATISE_EXPERIENCE_TRIGGER_TT: "#default_text У архитектора есть как минимум #V 250#! ед. [Concept('concept_artists_experience', 'репутации')]#!.#!"
 MR_BETTER_TREATISE_TRIGGER_TT: "#default_text Потенциальный трактат архитектора #G лучше#!, чем предыдущий.#!"
 MR_HAS_ARCHITECTURE_SCHOOL_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть #V $pm_artists_arts_academy_school$#! в сооружении «[GetBuildingType('building_art_academy').GetName]».#!"
