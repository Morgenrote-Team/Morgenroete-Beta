 GUI_gaudi_independent_architect_experience_text_500_loc: "#V 500#!#b  / 500#!"
 MR_ARCHITECT_INVITE_INDEPENDENT_ARCHITECT: "Пригласить архитектора"
 MR_ARCHITECT_INVITE_INDEPENDENT_ARCHITECT_TT: "#T Пригласить этого архитектора#!\nПриглашение [concept_gaudi_architect|l] — это способ получить нового архитектора, если ваша страна не может предоставить достаточно хорошего специалиста или если ваш текущий архитектор вас не устраивает.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).AddScope('chosen_architect', Scope.GetCharacter.MakeScope ).End)]"
 MR_ARCHITECT_INVITE_INDEPENDENT_ARCHITECT_EFFECT_TT: "[SCOPE.sCharacter('chosen_architect').GetFullName] станет вашим новым [Concept('concept_gaudi_architect', 'архитектором')].[GetPlayer.GetCustom('artists_replacement_architect_custom_type')]"
 MR_ARCHITECT_NOT_HIRED_INDEPENDENT_ARCHITECT_RECENTLY_TRIGGER_TT: "#default_text [GetPlayer.GetName] в последнее время #n не нанимал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')]#! [Concept('concept_gaudi_independent_architect', 'независимого архитектора')] (см. модификатор для оставшегося времени).#!"
 MR_ARCHITECT_WAS_NOT_RECENTLY_SENT_AWAY_TT: "#default_text Этот архитектор недоступен для [GetPlayer.GetAltNameNoFlag('RU_CL_RP')], потому что [GetPlayer.GetNameNoFormatting] отказал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] ему в последние 5 лет.#!"
 MR_ARTISTS_ARCHITECT_GENERAL_TAB: "Общая архитектура"
