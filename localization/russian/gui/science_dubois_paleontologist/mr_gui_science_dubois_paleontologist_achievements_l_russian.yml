 dubois_paleontologist_no_paleontologist_loc: "#V Достижения этого [concept_dubois_paleontologist]#! будут отображаться здесь, как только вы их получите." #deepl:2334446280
 dubois_paleontologist_achievements_intro_loc: "#V Достижения этого палеонтолога#!\n[Scope.GetCharacter.GetFullNameNoFormatting] - [Scope.GetCharacter.GetCustom('dubois_paleontologist_experience_level_type')], который собрал в общей сложности [Scope.Var('dubois_paleontologist_total_fossils_var').GetValue|0+] [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] и [Scope.Var('dubois_dinosaur_bone_total_paleontologist_var').GetValue|0+] [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] ." #deepl:39291484

 dubois_paleontologist_achievement_opened_first_paleontological_museum_loc: "\n[Scope.GetCharacter.GetSheHe|U] основал #V первый в мире Палеонтологический музей#!, в котором выставлялись различные окаменелости." #deepl:2735413684
 dubois_paleontologist_achievement_attended_extinction_congress_loc: "Доктор [Scope.GetCharacter.GetLastNameNoFormatting] участвовал в конгрессе, который пытался определить, как вымерли динозавры." #deepl:3929204720
 dubois_paleontologist_achievement_fossil_amber_loc: "\n[Scope.GetCharacter.GetSheHe|U] нашел уникальный кусок #V янтаря#!, в котором был заключен маленький комар. Может быть, в нем даже есть кровь динозавра?" #deepl:1354321492
 dubois_paleontologist_achievement_fossil_ammonite_loc: "\nПрофессор [Scope.GetCharacter.GetLastNameNoFormatting] нашел #V аммонит#!, который поможет в хронологическом разграничении морских отложений." #deepl:2717312690
 dubois_paleontologist_achievement_fossil_archaeopteryx_loc: "\nМногие считают открытие доктора [Scope.GetCharacter.GetLastNameNoFormatting] первой птицей. Действительно, #V Archaeopteryx#! кажется недостающим звеном между динозаврами и птицами." #deepl:3644254959
 dubois_paleontologist_achievement_fossil_composita_loc: "\n#V Композиты#! - это раковины, которые жили миллионы лет назад почти на всех континентах. Профессор [Scope.GetCharacter.GetLastNameNoFormatting] нашел одну из них во время [Scope.GetCharacter.GetHerHis] раскопок." #deepl:1938126946
 dubois_paleontologist_achievement_fossil_eusthenopteron_loc: "\nИнтересно, что у найденного #V Eusthenopteron#! [Scope.GetCharacter.GetSheHe] уже есть плечевая, локтевая и лучевая кости в переднем плавнике. Эти кости есть у всех живущих на суше позвоночных." #deepl:1906215431
 dubois_paleontologist_achievement_fossil_ichthyosaurus_loc: "\n#V Ichthyosaura#!, одного из которых нашел доктор [Scope.GetCharacter.GetLastNameNoFormatting], - очень уникальная рептилия. Она похожа на дельфинов и не откладывает яйца, а рождает потомство живым, что очень редко встречается среди рептилий." #deepl:1058896905
 dubois_paleontologist_chievement_fossil_ichthyostega_loc: "\Открыв #V Ichthyostega#!, профессор [Scope.GetCharacter.GetLastNameNoFormatting] обнаружил одно из самых ранних наземных живых животных. Это недостающее звено между рыбами и конечностными тетраподоморфами." #deepl:178680301
 dubois_paleontologist_achievement_fossil_megatherium_loc: "\nСегодня ленивцы маленькие, но в прошлом они были огромными, как показало одно из открытий доктора [Scope.GetCharacter.GetLastNameNoFormatting]. Мегатерий #V #! достигал в длину 6 метров (20 футов)." #deepl:2625011393
 dubois_paleontologist_achievement_fossil_pterodactylus_loc: "\n[Scope.GetCharacter.GetSheHe|U] обнаружил окаменелость #V Pterodactylus#!, крылатого динозавра, который, вероятно, жил вблизи озер и рек." #deepl:1358755979
 dubois_paleontologist_achievement_fossil_smilodon_loc: "\nСмилодон #V #! - страшный хищник, живший до нескольких тысяч лет назад. Профессор [Scope.GetCharacter.GetLastNameNoFormatting] нашел очень хорошо сохранившийся скелет одного из них." #deepl:209509221
 dubois_paleontologist_achievement_fossil_trilobite_loc: "\nОдной из [Scope.GetCharacter.GetHerHis] мелких находок являются различные трилобиты T#V #! . Хотя они и не впечатляют, но являются отличными указательными окаменелостями." #deepl:623281739
 dubois_paleontologist_achievement_fossil_haast_eagle_loc: "\nВ Новой Зеландии доктор [Scope.GetCharacter.GetLastNameNoFormatting] сделал удивительное открытие, обнаружив [Scope.GetCharacter.GetSheHe] гигантского орла, которого теперь называют #V Haast Eagle#!." #deepl:758643186
 dubois_paleontologist_achievement_perfect_ankylosaurus_loc: "\nПрофессор [Scope.GetCharacter.GetLastNameNoFormatting] реконструировал #V анкилозавра#! в совершенстве. Другие палеонтологи восхищаются реконструкцией." #deepl:2799229951
 dubois_paleontologist_achievement_imperfect_ankylosaurus_loc: "\nПрофессор [Scope.GetCharacter.GetLastNameNoFormatting] реконструировал #V анкилозавра#!, но несовершенным способом." #deepl:3408874547
 dubois_paleontologist_achievement_poor_ankylosaurus_loc: "\nПрофессор [Scope.GetCharacter.GetLastNameNoFormatting] реконструировал #V анкилозавра#!, но это была ужасная попытка, над которой смеются другие палеонтологи." #deepl:2085395454
 dubois_paleontologist_achievement_perfect_diplodocus_loc: "\n[Scope.GetCharacter.GetHerHis|U] реконструкция #V Diplodocus#! абсолютно совершенна и является предметом зависти любого палеонтологического музея." #deepl:3626804845
 dubois_paleontologist_achievement_imperfect_diplodocus_loc: "\n[Scope.GetCharacter.GetHerHis|U] реконструкция #V диплодока#! достаточно хороша." #deepl:412034719
 dubois_paleontologist_achievement_poor_diplodocus_loc: "[Scope.GetCharacter.GetHerHis|U] Реконструкция #V Diplodocus#! является катастрофической и рассматривается как мерзость." #deepl:3022704965
 dubois_paleontologist_achievement_perfect_triceratop_loc: "\nСовершенство реконструкции трицератопса доктора [Scope.GetCharacter.GetLastNameNoFormatting]' #V #! широко известно и повысило престиж нашей палеонтологической коллекции." #deepl:2010941711
 dubois_paleontologist_achievement_imperfect_triceratop_loc: "\nПосредственность доктора [Scope.GetCharacter.GetLastNameNoFormatting]' #V Трицератопс#! реконструкции достаточно хороша для нашего музея, но ничего исключительного." #deepl:996647347
 dubois_paleontologist_achievement_poor_triceratop_loc: "Ужас доктора [Scope.GetCharacter.GetLastNameNoFormatting]' #V Трицератопс#! реконструкции - это позор для нашей коллекции." #deepl:1193371056
 dubois_paleontologist_achievement_perfect_tyrannosaurus_loc: "\nA #V Тираннозавр Рекс#! - это чудесное зрелище. Особенно тот, который профессор [Scope.GetCharacter.GetLastNameNoFormatting] идеально собрал." #deepl:2375174801
 dubois_paleontologist_achievement_imperfect_tyrannosaurus_loc: "\nA #V Тираннозавр Рекс#! представляет собой удивительное зрелище. Даже если он не идеально собран, как тот, которого реконструировал профессор [Scope.GetCharacter.GetLastNameNoFormatting]." #deepl:2816655238
 dubois_paleontologist_achievement_poor_tyrannosaurus_loc: "\nA #V Тираннозавр Рекс#! представляет собой удивительное зрелище. Но не тот, которого собрал профессор [Scope.GetCharacter.GetLastNameNoFormatting]. Этот - просто абсурдное чудовище." #deepl:2924846018
 dubois_paleontologist_achievement_perfect_stegosaurus_loc: "\nМогучий #V скелет стегозавра#!, который мы собрали [Scope.GetCharacter.GetSheHe], - идеальный экспонат для нашей выставки динозавров." #deepl:1011030116
 dubois_paleontologist_achievement_imperfect_stegosaurus_loc: "#! \nСкелет стегозавра #V , который мы собрали [Scope.GetCharacter.GetSheHe], является хорошим экспонатом для нашей выставки динозавров." #deepl:3364926958
 dubois_paleontologist_achievement_poor_stegosaurus_loc: "\nУжасный #V скелет стегозавра#!, который [Scope.GetCharacter.GetSheHe] собрали, - пустая трата места на нашей выставке динозавров." #deepl:1841850726
 dubois_paleontologist_achievement_perfect_antarctosaurus_loc: "\nНе каждый сможет собрать #V Антарктозавра#! так идеально, как доктор [Scope.GetCharacter.GetLastNameNoFormatting]. Это одна из изюминок нашей коллекции." #deepl:4276626573
 dubois_paleontologist_achievement_imperfect_antarctosaurus_loc: "\nСоздать #V антарктозавра#! - задача не из легких, но доктор [Scope.GetCharacter.GetLastNameNoFormatting] справился с ней вполне успешно." #deepl:4006286419
 dubois_paleontologist_achievement_poor_antarctosaurus_loc: "\nНе каждый может собрать #V Антарктозавра#!. Но мало кто собирает его так ужасно плохо, как доктор [Scope.GetCharacter.GetLastNameNoFormatting]. Это позор нашей коллекции." #deepl:3523325515
 dubois_paleontologist_achievement_perfect_argyrosaurus_loc: "\nПрекрасный #V скелет аргирозавра#! в нашей коллекции - работа профессора [Scope.GetCharacter.GetLastNameNoFormatting]. Поистине чудесный скелет." #deepl:2395444631
 dubois_paleontologist_achievement_imperfect_argyrosaurus_loc: "\nСкелет аргирозавра #V #! в нашей коллекции - работа профессора [Scope.GetCharacter.GetLastNameNoFormatting]. Очень хорошо сделанный скелет." #deepl:2170414433
 dubois_paleontologist_achievement_poor_argyrosaurus_loc: "\nЧудовищный #V скелет аргирозавра#! в нашей коллекции - работа профессора [Scope.GetCharacter.GetLastNameNoFormatting]. Очевидно, что это работа неуклюжего палеонтолога." #deepl:2917340443
 dubois_paleontologist_achievement_perfect_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] прекрасно собрал #V скелет игуанодона#!." #deepl:3595520963
 dubois_paleontologist_achievement_imperfect_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] собрал #V скелет игуанодона#!." #deepl:948446383
 dubois_paleontologist_achievement_poor_iguanodon_loc: "\n[Scope.GetCharacter.GetSheHe|U] собрал #V скелет игуанодона#! ужасно неправильно." #deepl:60351557
 dubois_paleontologist_achievement_perfect_plateosaurus_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] смог идеально воссоздать скелет #V платеозавра#!. Отличный экспонат для нашей коллекции." #deepl:3288975063
 dubois_paleontologist_achievement_imperfect_plateosaurus_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] смог реконструировать скелет #V платеозавра#!." #deepl:3540574047
 dubois_paleontologist_achievement_poor_plateosaurus_loc: "\nДоктору [Scope.GetCharacter.GetLastNameNoFormatting] удалось реконструировать скелет #V платеозавра#!. Но он выглядит очень странно и деформирован." #deepl:4210803243
 dubois_paleontologist_achievement_perfect_giraffatitan_loc: "\nРеконструкция #V Жирафатитана#! - тяжелая работа и требует много места. К счастью, профессор [Scope.GetCharacter.GetLastNameNoFormatting] смог использовать размеры нашего музея, чтобы подготовить великолепный скелет динозавра." #deepl:1815044749
 dubois_paleontologist_achievement_imperfect_giraffatitan_loc: "\nРеконструкция #V Жирафатитана#! - тяжелая работа и требует много места. К счастью, профессор [Scope.GetCharacter.GetLastNameNoFormatting] смог использовать размеры нашего музея для подготовки скелета динозавра." #deepl:3585680135
 dubois_paleontologist_achievement_poor_giraffatitan_loc: "\nРеконструкция #V Жирафатитана#! - тяжелая работа, требующая много места. Несмотря на то, что у [Scope.GetCharacter.GetSheHe] есть целый музей для работы, профессор [Scope.GetCharacter.GetLastNameNoFormatting] смог создать лишь абсурдную версию динозавра." #deepl:2737374971
 dubois_paleontologist_achievement_perfect_spinosaurus_loc: "\nСкелет страшного #V спинозавра#! в нашей коллекции был собран доктором [Scope.GetCharacter.GetLastNameNoFormatting] и представляет собой произведение искусства." #deepl:493475787
 dubois_paleontologist_achievement_imperfect_spinosaurus_loc: "\nСкелет страшного #V спинозавра#! в нашей коллекции был собран доктором [Scope.GetCharacter.GetLastNameNoFormatting]." #deepl:1960639131
 dubois_paleontologist_achievement_poor_spinosaurus_loc: "\nЗабавный #V скелет спинозавра#! в нашей коллекции был собран доктором [Scope.GetCharacter.GetLastNameNoFormatting]. Он плохо сделан и больше похож на курицу, чем на динозавра." #deepl:308117810
 dubois_paleontologist_achievement_perfect_psittacosaurus_loc: "\С пастью, напоминающей клюв, #V Psittacosaurus#!, который собрал профессор [Scope.GetCharacter.GetLastNameNoFormatting], был необычным скелетом." #deepl:3089964090
 dubois_paleontologist_achievement_imperfect_psittacosaurus_loc: "\С пастью, напоминающей клюв, #V Psittacosaurus#!, который собрал профессор [Scope.GetCharacter.GetLastNameNoFormatting], был прекрасным скелетом." #deepl:1049217798
 dubois_paleontologist_achievement_poor_psittacosaurus_loc: "\nДействительно ли у #V пситтакозавра#! был странный клюв на спине и хобот вместо рта? По крайней мере, профессор [Scope.GetCharacter.GetLastNameNoFormatting] так считает, но он может быть единственным." #deepl:4134331305
 dubois_paleontologist_achievement_perfect_velociraptor_loc: "\nСтрашный #V Велоцираптор#! - один из шедевров доктора [Scope.GetCharacter.GetLastNameNoFormatting]. Он идеально собран." #deepl:2793253329
 dubois_paleontologist_achievement_imperfect_velociraptor_loc: "\nСтрашный #V Велоцираптор#! является хорошей работой доктора [Scope.GetCharacter.GetLastNameNoFormatting]. [Scope.GetCharacter.GetSheHe] собрал его довольно хорошо." #deepl:4153443130
 dubois_paleontologist_achievement_poor_velociraptor_loc: "\Страшный #V Велоцираптор#! - одна из худших работ доктора [Scope.GetCharacter.GetLastNameNoFormatting]. Во-первых, он слишком мал, во-вторых, у него точно не было 10 когтей в качестве короны..." #deepl:3768344000
 dubois_paleontologist_achievement_perfect_muttaburrasaurus_loc: "\ #V Муттабурразавр#!, реконструированный профессором [Scope.GetCharacter.GetLastNameNoFormatting], был весьма впечатляющим, и не только из-за своих размеров." #deepl:877060609
 dubois_paleontologist_achievement_imperfect_muttaburrasaurus_loc: "\ #V Муттабурразавр#!, реконструированный профессором [Scope.GetCharacter.GetLastNameNoFormatting], был весьма впечатляющим, в основном из-за своих размеров." #deepl:2230628960
 dubois_paleontologist_achievement_poor_muttaburrasaurus_loc: "\ #V Муттабурразавр#!, которого реконструировал профессор [Scope.GetCharacter.GetLastNameNoFormatting], был ужасен. Во-первых, каждый палеонтолог отметил, что голова не прикреплена к хвосту, а колени сгибаются в другую сторону." #deepl:1428907282
 dubois_paleontologist_achievement_perfect_rhoetosaurus_loc: "\nРазмеры #V реотозавра#! впечатляют. Но без мастерства доктора [Scope.GetCharacter.GetLastNameNoFormatting] он, конечно, не был бы таким впечатляющим." #deepl:2002445198
 dubois_paleontologist_achievement_imperfect_rhoetosaurus_loc: "\nРазмеры #V реотозавра#! впечатляют. Но без мастерства доктора [Scope.GetCharacter.GetLastNameNoFormatting] он был бы не таким впечатляющим'." #deepl:2197585922
 dubois_paleontologist_achievement_poor_rhoetosaurus_loc: "\nДумать о том, что хвост должен быть на спине #V Rhoetosaurus#!, было, вероятно, самой глупой идеей доктора [Scope.GetCharacter.GetLastNameNoFormatting]. По крайней мере, пока..." #deepl:2580418601
 dubois_paleontologist_achievement_perfect_mosasaurus_loc: "\ #o Мсазавр#!, которого реконструировал профессор [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting], - это гигантское морское чудовище." #deepl:4291663506
 dubois_paleontologist_achievement_imperfect_mosasaurus_loc: "\ #o Мозазавр#!, которого профессор [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting] реконструировал, - это большой монстр из моря." #deepl:2251013384
 dubois_paleontologist_achievement_poor_mosasaurus_loc: "\ #o Мозазавр#!, которого реконструировал профессор [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting], был ужасен. Совершенно точно, что мозазавр жил в океане, но каким-то образом скелет оказался с ногами." #deepl:2727769146
 dubois_paleontologist_achievement_perfect_plesiosaurus_loc: "\ #o Плезиозавр#!, реконструированный профессором [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting], - это огромная морская рептилия." #deepl:1469085529
 dubois_paleontologist_achievement_imperfect_plesiosaurus_loc: "\ #o Плезиозавр#!, реконструированный профессором [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting], - это морская рептилия, жившая во времена динозавров." #deepl:1871243527
 dubois_paleontologist_achievement_poor_plesiosaurus_loc: "\ #o Плезиозавр#!, реконструированный профессором [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting], немного странный. У него 4 змееподобные конечности, очень короткая нога и нет хвоста." #deepl:1919744229
 dubois_paleontologist_achievement_perfect_basilosaurus_loc: "\ #o Базилозавр#!, реконструированный профессором [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting], - это доисторический кит, живший тысячелетия назад." #deepl:142765907
 dubois_paleontologist_achievement_imperfect_basilosaurus_loc: "\ #o Базилозавр#!, реконструированный профессором [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting], - это доисторический кит." #deepl:1354996810
 dubois_paleontologist_achievement_poor_basilosaurus_loc: "\ #o Базилозавр#!, реконструированный профессором [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting], имеет очень странную физиологию. Он больше похож на шар, чем на что-либо другое, что кажется совершенно неправильным." #deepl:1206625829
 dubois_paleontologist_achievement_perfect_megalodon_loc: "\ #o Мегалодон#!, реконструированный профессором [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting], - это гигантская акула. Действительно впечатляющий скелет." #deepl:1878769616
 dubois_paleontologist_achievement_imperfect_megalodon_loc: "\ #o Мегалодон#!, реконструированный профессором [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting], - это гигантская акула." #deepl:117332675
 dubois_paleontologist_achievement_poor_megalodon_loc: "\ #o Мегалодон#!, реконструированный профессором [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastNameNoFormatting], кажется немного... неправильным. Огромная голова крепится к очень тонкой шее, и, судя по всему, акула имела странные шипы, покрывавшие все ее тело." #deepl:3797074524
