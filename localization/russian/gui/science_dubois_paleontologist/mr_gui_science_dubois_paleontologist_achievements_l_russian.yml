 dubois_paleontologist_no_paleontologist_loc: "Здесь будут отображаться #V достижения этого [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолога#!#!')]#!, как только он у вас появится."
 dubois_paleontologist_achievements_intro_loc: "#V Достижения этого палеонтолога#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullNameNoFormatting] - [Scope.GetCharacter.GetCustom('dubois_paleontologist_experience_level_type')]. [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она собрала', 'Он собрал')] [Scope.Var('dubois_paleontologist_total_fossils_var').GetValue|0+] [Concept('concept_dubois_fossil', 'окаменелостей')] и [Scope.Var('dubois_dinosaur_bone_total_paleontologist_var').GetValue|0+] [Concept('concept_dubois_dinosaur_bone', 'костей динозавров')].#!"
 dubois_paleontologist_achievement_opened_first_paleontological_museum_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] [SelectLocalization(Scope.GetCharacter.IsFemale, 'основала', 'основал')] #V первый в мире палеонтологический музей#!, где представлена выдающаяся коллекция окаменелостей.#!"
 dubois_paleontologist_achievement_attended_extinction_congress_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'посетила', 'посетил')] конгресс, посвящённый разгадке тайны вымирания динозавров.#!"
 dubois_paleontologist_achievement_fossil_amber_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] [SelectLocalization(Scope.GetCharacter.IsFemale, 'обнаружила', 'обнаружил')] редкий образец #V янтаря#! с доисторическим комаром внутри, возможно, с кровью динозавра.#!"
 dubois_paleontologist_achievement_fossil_ammonite_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'откопала', 'откопал')] #V аммонита#!, что помогло в изучении древних морских отложений.#!"
 dubois_paleontologist_achievement_fossil_archaeopteryx_loc: "\n #indent_newline:3 • #V Археоптерикс#!, которого [SelectLocalization(Scope.GetCharacter.IsFemale, 'нашла', 'нашёл')] доктор [Scope.GetCharacter.GetLastNameNoFormatting], провозглашён ключевым звеном между динозаврами и птицами.#!"
 dubois_paleontologist_achievement_fossil_composita_loc: "\n #indent_newline:3 • #V «Композиты»#! - древние раковины, которые [SelectLocalization(Scope.GetCharacter.IsFemale, 'нашла', 'нашёл')] профессор [Scope.GetCharacter.GetLastNameNoFormatting], - дают представление о доисторической жизни.#!"
 dubois_paleontologist_achievement_fossil_eusthenopteron_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] [SelectLocalization(Scope.GetCharacter.IsFemale, 'обнаружила', 'обнаружил')] окаменелость #V эвстеноптерона#!, которая свидетельствует о ранних приспособлениях к жизни на суше.#!"
 dubois_paleontologist_achievement_fossil_ichthyosaurus_loc: "\n #indent_newline:3 • #V Ихтиозавр#!, которого [SelectLocalization(Scope.GetCharacter.IsFemale, 'нашла', 'нашёл')] доктор [Scope.GetCharacter.GetLastNameNoFormatting], был дельфиноподобной рептилией, рожавшей живых детёнышей.#!"
 dubois_paleontologist_chievement_fossil_ichthyostega_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'обнаружила', 'обнаружил')] #V ихтиостегу#! - одного из самых ранних наземных позвоночных.#!"
 dubois_paleontologist_achievement_fossil_megatherium_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'открыла', 'открыл')] гигантского #V мегатерия#! - доисторического ленивца, достигавшего 6 метров в длину.#!"
 dubois_paleontologist_achievement_fossil_pterodactylus_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] [SelectLocalization(Scope.GetCharacter.IsFemale, 'нашла', 'нашёл')] окаменелость #V птеродактиля#! - крылатого ящера с берегов древних озёр.#!"
 dubois_paleontologist_achievement_fossil_smilodon_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'откопала', 'откопал')] хорошо сохранившегося #V смилодона#! - легендарного саблезубого хищника.#!"
 dubois_paleontologist_achievement_fossil_trilobite_loc: "\n #indent_newline:3 • Среди [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] находок есть #V трилобиты#! - важные руководящие ископаемые для датировки слоёв горных пород.#!"
 dubois_paleontologist_achievement_fossil_haast_eagle_loc: "\n #indent_newline:3 • В Новой Зеландии доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'обнаружила', 'обнаружил')] останки массивного #V орла Хааста#! - гигантской хищной птицы.#!"
 dubois_paleontologist_achievement_perfect_ankylosaurus_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'добилась', 'добился')] безупречной реконструкции #V анкилозавра#!, вызвав восхищение коллег.#!"
 dubois_paleontologist_achievement_imperfect_ankylosaurus_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'реконструировала', 'реконструировал')] #V анкилозавра#! с некоторыми недостатками.#!"
 dubois_paleontologist_achievement_poor_ankylosaurus_loc: "\n #indent_newline:3 • Когда профессор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'попыталась', 'попытался')] реконструировать #V анкилозавра#!, [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] попытка была встречена насмешками.#!"
 dubois_paleontologist_achievement_perfect_diplodocus_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Её', 'Его')] безупречная реконструкция #V диплодока#! - гордость музея.#!"
 dubois_paleontologist_achievement_imperfect_diplodocus_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Её', 'Его')] реконструкция #V диплодока#! удовлетворительна.#!"
 dubois_paleontologist_achievement_poor_diplodocus_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Её', 'Его')] реконструкция #V диплодока#! считается провальной.#!"
 dubois_paleontologist_achievement_perfect_triceratop_loc: "\n #indent_newline:3 • Реконструкция #V трицератопса#!, которую [SelectLocalization(Scope.GetCharacter.IsFemale, 'выполнила', 'выполнил')] доктор [Scope.GetCharacter.GetLastNameNoFormatting], знаменита и повышает престиж музея.#!"
 dubois_paleontologist_achievement_imperfect_triceratop_loc: "\n #indent_newline:3 • Реконструкция #V трицератопса#!, которую [SelectLocalization(Scope.GetCharacter.IsFemale, 'выполнила', 'выполнил')] доктор [Scope.GetCharacter.GetLastNameNoFormatting], подходит для демонстрации.#!"
 dubois_paleontologist_achievement_poor_triceratop_loc: "\n #indent_newline:3 • Реконструкция #V трицератопса#!, которую [SelectLocalization(Scope.GetCharacter.IsFemale, 'выполнила', 'выполнил')] доктор [Scope.GetCharacter.GetLastNameNoFormatting], является предметом стыда.#!"
 dubois_paleontologist_achievement_perfect_tyrannosaurus_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'собрала', 'собрал')] идеального #V тираннозавра#!, и это зрелище достойно восхищения.#!"
 dubois_paleontologist_achievement_imperfect_tyrannosaurus_loc: "\n #indent_newline:3 • #V Тираннозавр#!, которого [SelectLocalization(Scope.GetCharacter.IsFemale, 'собрала', 'собрал')] профессор [Scope.GetCharacter.GetLastNameNoFormatting], впечатляет, хотя и не безупречен.#!"
 dubois_paleontologist_achievement_poor_tyrannosaurus_loc: "\n #indent_newline:3 • #V Тираннозавр#!, которого [SelectLocalization(Scope.GetCharacter.IsFemale, 'собрала', 'собрал')] профессор [Scope.GetCharacter.GetLastNameNoFormatting], - странное и комичное зрелище.#!"
 dubois_paleontologist_achievement_perfect_stegosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] assembled a perfect #V Stegosaurus#! skeleton for the dinosaur exhibit.#!"
 dubois_paleontologist_achievement_imperfect_stegosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] assembled a good #V Stegosaurus#! skeleton for the exhibit.#!"
 dubois_paleontologist_achievement_poor_stegosaurus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] assembled a poorly constructed #V Stegosaurus#! skeleton.#!"
 dubois_paleontologist_achievement_perfect_antarctosaurus_loc: "\n #indent_newline:3 • Идеальный #V антарктозавр#!, которого [SelectLocalization(Scope.GetCharacter.IsFemale, 'собрала', 'собрал')] доктор [Scope.GetCharacter.GetLastNameNoFormatting], - жемчужина коллекции.#!"
 dubois_paleontologist_achievement_imperfect_antarctosaurus_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'собрала', 'собрал')] достойного #V антарктозавра#!.#!"
 dubois_paleontologist_achievement_poor_antarctosaurus_loc: "\n #indent_newline:3 • #V Антарктозавр#!, которого [SelectLocalization(Scope.GetCharacter.IsFemale, 'собрала', 'собрал')] доктор [Scope.GetCharacter.GetLastNameNoFormatting], - позор музея.#!"
 dubois_paleontologist_achievement_perfect_argyrosaurus_loc: "\n #indent_newline:3 • Скелет #V аргирозавра#!, который [SelectLocalization(Scope.GetCharacter.IsFemale, 'собрала', 'собрал')] профессор [Scope.GetCharacter.GetLastNameNoFormatting], - чудо палеонтологии.#!"
 dubois_paleontologist_achievement_imperfect_argyrosaurus_loc: "\n #indent_newline:3 • Скелет #V аргирозавра#!, который [SelectLocalization(Scope.GetCharacter.IsFemale, 'собрала', 'собрал')] профессор [Scope.GetCharacter.GetLastNameNoFormatting], выполнен хорошо.#!"
 dubois_paleontologist_achievement_poor_argyrosaurus_loc: "\n #indent_newline:3 • Скелет #V аргирозавра#!, который [SelectLocalization(Scope.GetCharacter.IsFemale, 'собрала', 'собрал')] профессор [Scope.GetCharacter.GetLastNameNoFormatting], - неуклюжая попытка.#!"
 dubois_paleontologist_achievement_perfect_iguanodon_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] идеально [SelectLocalization(Scope.GetCharacter.IsFemale, 'собрала', 'собрал')] скелет #V игуанодона#!.#!"
 dubois_paleontologist_achievement_imperfect_iguanodon_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] [SelectLocalization(Scope.GetCharacter.IsFemale, 'собрала', 'собрал')] скелет #V игуанодона#!.#!"
 dubois_paleontologist_achievement_poor_iguanodon_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] [SelectLocalization(Scope.GetCharacter.IsFemale, 'собрала', 'собрал')] скелет #V игуанодона#! со множеством ошибок.#!"
 dubois_paleontologist_achievement_perfect_plateosaurus_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'реконструировала', 'реконструировал')] идеальный скелет #V платеозавра#! для коллекции.#!"
 dubois_paleontologist_achievement_imperfect_plateosaurus_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'реконструировала', 'реконструировал')] скелет #V платеозавра#!.#!"
 dubois_paleontologist_achievement_poor_plateosaurus_loc: "\n #indent_newline:3 • Реконструкция #V платеозавра#!, выполненная доктором [Scope.GetCharacter.GetLastNameNoFormatting], выглядит странно и деформированно.#!"
 dubois_paleontologist_achievement_perfect_giraffatitan_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'создала', 'создал')] великолепный скелет #V жираффатитана#!, грамотно используя пространство музея.#!"
 dubois_paleontologist_achievement_imperfect_giraffatitan_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'собрала', 'собрал')] приличный скелет #V жираффатитана#!.#!"
 dubois_paleontologist_achievement_poor_giraffatitan_loc: "\n #indent_newline:3 • #V Жираффатитан#!, которого [SelectLocalization(Scope.GetCharacter.IsFemale, 'собрала', 'собрал')] профессор [Scope.GetCharacter.GetLastNameNoFormatting], - абсурдная версия динозавра.#!"
 dubois_paleontologist_achievement_perfect_spinosaurus_loc: "\n #indent_newline:3 • Скелет #V спинозавра#!, который [SelectLocalization(Scope.GetCharacter.IsFemale, 'собрала', 'собрал')] доктор [Scope.GetCharacter.GetLastNameNoFormatting], - настоящее произведение искусства.#!"
 dubois_paleontologist_achievement_imperfect_spinosaurus_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'собрала', 'собрал')] скелет #V спинозавра#!.#!"
 dubois_paleontologist_achievement_poor_spinosaurus_loc: "\n #indent_newline:3 • Скелет #V спинозавра#!, который [SelectLocalization(Scope.GetCharacter.IsFemale, 'собрала', 'собрал')] доктор [Scope.GetCharacter.GetLastNameNoFormatting], больше похож на курицу, чем на динозавра.#!"
 dubois_paleontologist_achievement_perfect_psittacosaurus_loc: "\n #indent_newline:3 • Скелет #V пситтакозавра#! с клювовидной пастью, собранный профессором [Scope.GetCharacter.GetLastNameNoFormatting], просто великолепен.#!"
 dubois_paleontologist_achievement_imperfect_psittacosaurus_loc: "\n #indent_newline:3 • Скелет #V пситтакозавра#!, который [SelectLocalization(Scope.GetCharacter.IsFemale, 'собрала', 'собрал')] профессор [Scope.GetCharacter.GetLastNameNoFormatting], - хорошее дополнение к коллекции.#!"
