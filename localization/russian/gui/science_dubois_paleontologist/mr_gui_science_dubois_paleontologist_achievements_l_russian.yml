me)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plateosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').IsSet , Scope.Var('dubois_paleontologist_achievement_giraffatitan_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_spinosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_psittacosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_velociraptor_var').IsSet , Scope.Var('dubois_paleontologist_achievement_velociraptor_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_muttaburrasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_rhoetosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_mosasaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_plesiosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').IsSet , Scope.Var('dubois_paleontologist_achievement_basilosaurus_var').GetFlagName)][AddLocalizationIf( Scope.Var('dubois_paleontologist_achievement_megalodon_var').IsSet , Scope.Var('dubois_paleontologist_achievement_megalodon_var').GetFlagName)]"
 dubois_paleontologist_no_paleontologist_loc: "Здесь будут отображаться достижения этого [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолога#!#!')]#!, как только он у вас появится."
 dubois_paleontologist_achievements_intro_loc: "#V Достижения этого палеонтолога#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullNameNoFormatting] — [Scope.GetCharacter.GetCustom('dubois_paleontologist_experience_level_type')]. [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она собрала', 'Он собрал')] [Scope.Var('dubois_paleontologist_total_fossils_var').GetValue|0+] [Concept('concept_dubois_fossil', 'окаменелостей')] и [Scope.Var('dubois_dinosaur_bone_total_paleontologist_var').GetValue|0+] [Concept('concept_dubois_dinosaur_bone', 'костей динозавров')].#!"
 dubois_paleontologist_achievement_opened_first_paleontological_museum_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] основал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] #V первый в мире палеонтологический музей#!, где представлена выдающаяся коллекция окаменелостей.#!"
 dubois_paleontologist_achievement_attended_extinction_congress_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] посетил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] конгресс, посвящённый разгадке тайны вымирания динозавров.#!"
 dubois_paleontologist_achievement_fossil_amber_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] обнаружил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] редкий образец #V янтаря#! с доисторическим комаром внутри, возможно, с кровью динозавра.#!"
 dubois_paleontologist_achievement_fossil_ammonite_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] откопал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] #V аммонита#!, что помогло в изучении древних морских отложений.#!"
 dubois_paleontologist_achievement_fossil_archaeopteryx_loc: "\n #indent_newline:3 • #V Археоптерикс#!, которого наш[SelectLocalization(Scope.GetCharacter.IsFemale, 'ла', 'ёл')] доктор [Scope.GetCharacter.GetLastNameNoFormatting], провозглашён ключевым звеном между динозаврами и птицами.#!"
 dubois_paleontologist_achievement_fossil_composita_loc: "\n #indent_newline:3 • #V «Композиты»#! — древние раковины, которые наш[SelectLocalization(Scope.GetCharacter.IsFemale, 'ла', 'ёл')] профессор [Scope.GetCharacter.GetLastNameNoFormatting], — дают представление о доисторической жизни.#!"
 dubois_paleontologist_achievement_fossil_eusthenopteron_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] обнаружил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] окаменелость #V эвстеноптерона#!, которая свидетельствует о ранних приспособлениях к жизни на суше.#!"
 dubois_paleontologist_achievement_fossil_ichthyosaurus_loc: "\n #indent_newline:3 • #V Ихтиозавр#!, которого наш[SelectLocalization(Scope.GetCharacter.IsFemale, 'ла', 'ёл')] доктор [Scope.GetCharacter.GetLastNameNoFormatting], был дельфиноподобной рептилией, рожавшей живых детёнышей.#!"
 dubois_paleontologist_chievement_fossil_ichthyostega_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] обнаружил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] #V ихтиостегу#! — одного из самых ранних наземных позвоночных.#!"
 dubois_paleontologist_achievement_fossil_megatherium_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] гигантского #V мегатерия#! — доисторического ленивца, достигавшего 6 метров в длину.#!"
 dubois_paleontologist_achievement_fossil_pterodactylus_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] наш[SelectLocalization(Scope.GetCharacter.IsFemale, 'ла', 'ёл')] окаменелость #V птеродактиля#! — крылатого ящера с берегов древних озёр.#!"
 dubois_paleontologist_achievement_fossil_smilodon_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] откопал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] хорошо сохранившегося #V смилодона#! — легендарного саблезубого хищника.#!"
 dubois_paleontologist_achievement_fossil_trilobite_loc: "\n #indent_newline:3 • Среди [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] находок есть #V трилобиты#! — важные руководящие ископаемые для датировки слоёв горных пород.#!"
 dubois_paleontologist_achievement_fossil_haast_eagle_loc: "\n #indent_newline:3 • В Новой Зеландии доктор [Scope.GetCharacter.GetLastNameNoFormatting] обнаружил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] останки массивного #V орла Хааста#! — гигантской хищной птицы.#!"
 dubois_paleontologist_achievement_perfect_ankylosaurus_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] добился безупречной реконструкции #V анкилозавра#!, вызвав восхищение коллег.#!"
 dubois_paleontologist_achievement_imperfect_ankylosaurus_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] реконструировал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] #V анкилозавра#! с некоторыми недостатками.#!"
 dubois_paleontologist_achievement_poor_ankylosaurus_loc: "\n #indent_newline:3 • Когда профессор [Scope.GetCharacter.GetLastNameNoFormatting] попытал[SelectLocalization(Scope.GetCharacter.IsFemale, 'ась', 'ся')] реконструировать #V анкилозавра#!, [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] попытка была встречена насмешками.#!"
 dubois_paleontologist_achievement_perfect_diplodocus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis|U] безупречная реконструкция #V диплодока#! — гордость музея.#!"
 dubois_paleontologist_achievement_imperfect_diplodocus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis|U] реконструкция #V диплодока#! удовлетворительна.#!"
 dubois_paleontologist_achievement_poor_diplodocus_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetHerHis|U] реконструкция #V диплодока#! считается провальной.#!"
 dubois_paleontologist_achievement_perfect_triceratop_loc: "\n #indent_newline:3 • Реконструкция #V трицератопса#!, которую выполнил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] доктор [Scope.GetCharacter.GetLastNameNoFormatting], знаменита и повышает престиж музея.#!"
 dubois_paleontologist_achievement_imperfect_triceratop_loc: "\n #indent_newline:3 • Реконструкция #V трицератопса#!, которую выполнил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] доктор [Scope.GetCharacter.GetLastNameNoFormatting], подходит для демонстрации.#!"
 dubois_paleontologist_achievement_poor_triceratop_loc: "\n #indent_newline:3 • Реконструкция #V трицератопса#!, которую выполнил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] доктор [Scope.GetCharacter.GetLastNameNoFormatting], является предметом стыда.#!"
 dubois_paleontologist_achievement_perfect_tyrannosaurus_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] идеального #V тираннозавра#! — зрелище, достойное восхищения.#!"
 dubois_paleontologist_achievement_imperfect_tyrannosaurus_loc: "\n #indent_newline:3 • #V Тираннозавр#!, которого собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] профессор [Scope.GetCharacter.GetLastNameNoFormatting], впечатляет, хотя и не безупречен.#!"
 dubois_paleontologist_achievement_poor_tyrannosaurus_loc: "\n #indent_newline:3 • #V Тираннозавр#!, которого собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] профессор [Scope.GetCharacter.GetLastNameNoFormatting], — странное и комичное зрелище.#!"
 dubois_paleontologist_achievement_perfect_stegosaurus_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] идеальный скелет #V стегозавра#! для выставки динозавров.#!"
 dubois_paleontologist_achievement_imperfect_stegosaurus_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] хороший скелет #V стегозавра#! для выставки.#!"
 dubois_paleontologist_achievement_poor_stegosaurus_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] плохо сконструированный скелет #V стегозавра#!.#!"
 dubois_paleontologist_achievement_perfect_antarctosaurus_loc: "\n #indent_newline:3 • Идеальный #V антарктозавр#!, которого собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] доктор [Scope.GetCharacter.GetLastNameNoFormatting], — жемчужина коллекции.#!"
 dubois_paleontologist_achievement_imperfect_antarctosaurus_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] достойного #V антарктозавра#!.#!"
 dubois_paleontologist_achievement_poor_antarctosaurus_loc: "\n #indent_newline:3 • #V Антарктозавр#!, которого собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] доктор [Scope.GetCharacter.GetLastNameNoFormatting], — позор музея.#!"
 dubois_paleontologist_achievement_perfect_argyrosaurus_loc: "\n #indent_newline:3 • Скелет #V аргирозавра#!, который собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] профессор [Scope.GetCharacter.GetLastNameNoFormatting], — чудо палеонтологии.#!"
 dubois_paleontologist_achievement_imperfect_argyrosaurus_loc: "\n #indent_newline:3 • Скелет #V аргирозавра#!, который собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] профессор [Scope.GetCharacter.GetLastNameNoFormatting], выполнен хорошо.#!"
 dubois_paleontologist_achievement_poor_argyrosaurus_loc: "\n #indent_newline:3 • Скелет #V аргирозавра#!, который собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] профессор [Scope.GetCharacter.GetLastNameNoFormatting], — неуклюжая попытка.#!"
 dubois_paleontologist_achievement_perfect_iguanodon_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] идеально собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] скелет #V игуанодона#!.#!"
 dubois_paleontologist_achievement_imperfect_iguanodon_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] скелет #V игуанодона#!.#!"
 dubois_paleontologist_achievement_poor_iguanodon_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] скелет #V игуанодона#! со множеством ошибок.#!"
 dubois_paleontologist_achievement_perfect_plateosaurus_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] реконструировал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] идеальный скелет #V платеозавра#! для коллекции.#!"
 dubois_paleontologist_achievement_imperfect_plateosaurus_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] реконструировал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] скелет #V платеозавра#!.#!"
 dubois_paleontologist_achievement_poor_plateosaurus_loc: "\n #indent_newline:3 • Реконструкция #V платеозавра#!, выполненная доктором [Scope.GetCharacter.GetLastNameNoFormatting], выглядит странно и деформированно.#!"
 dubois_paleontologist_achievement_perfect_giraffatitan_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] создал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] великолепный скелет #V жираффатитана#!, грамотно используя пространство музея.#!"
 dubois_paleontologist_achievement_imperfect_giraffatitan_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] приличный скелет #V жираффатитана#!.#!"
 dubois_paleontologist_achievement_poor_giraffatitan_loc: "\n #indent_newline:3 • #V Жираффатитан#!, которого собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] профессор [Scope.GetCharacter.GetLastNameNoFormatting], — абсурдная версия динозавра.#!"
 dubois_paleontologist_achievement_perfect_spinosaurus_loc: "\n #indent_newline:3 • Скелет #V спинозавра#!, который собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] доктор [Scope.GetCharacter.GetLastNameNoFormatting], — настоящее произведение искусства.#!"
 dubois_paleontologist_achievement_imperfect_spinosaurus_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] скелет #V спинозавра#!.#!"
 dubois_paleontologist_achievement_poor_spinosaurus_loc: "\n #indent_newline:3 • Скелет #V спинозавра#!, который собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] доктор [Scope.GetCharacter.GetLastNameNoFormatting], больше похож на курицу, чем на динозавра.#!"
 dubois_paleontologist_achievement_perfect_psittacosaurus_loc: "\n #indent_newline:3 • Скелет #V пситтакозавра#! с его клювовидным ртом, который собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] профессор [Scope.GetCharacter.GetLastNameNoFormatting], просто великолепен.#!"
 dubois_paleontologist_achievement_imperfect_psittacosaurus_loc: "\n #indent_newline:3 • Скелет #V пситтакозавра#!, который собрал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] профессор [Scope.GetCharacter.GetLastNameNoFormatting], — хорошее дополнение к коллекции.#!"
 dubois_paleontologist_achievement_poor_psittacosaurus_loc: "\n #indent_newline:3 • Реконструкция #V пситтакозавра#!, выполненная профессором [Scope.GetCharacter.GetLastNameNoFormatting], весьма сомнительна.#!"
