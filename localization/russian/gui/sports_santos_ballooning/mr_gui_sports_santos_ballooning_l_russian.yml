l_russian:
 MR_GORDON_BENNETT_CUP_BUTTON: "Кубок Гордона Беннетта"
 MR_GORDON_BENNETT_CUP_BUTTON_TT: "#T Кубок Гордона Беннетта#!\nКубок Гордона Беннетта (или Coupe Aéronautique Gordon Bennett) — старейшая в мире гонка на газовых аэростатах. Это соревнование, называемое «Голубой лентой» аэронавтики, спонсировалось Джеймсом Гордоном Беннеттом-младшим, миллионером-спортсменом и владельцем газеты «New York Herald». По словам организаторов, цель состязания «проста: пролететь как можно дальше от места старта». Соревнования проводились с 1906 по 1938 год, с перерывами на Первую мировую войну (1914-1919) и в 1931 году.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GORDON_BENNETT_PUBLISHER_BUILDING_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть в общей сложности #V 10 или более#! уровней сооружений «[GetBuildingType('building_manzoni_publishing_industry').GetName]»#!.#!"