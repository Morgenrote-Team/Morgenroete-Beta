l_russian:
 theme_mr_paleontology: "Morgenröte: Палеонтология (земляные)" #deepl:1069050187
 theme_mr_paleontology_desc: "Пользовательский интерфейс, вдохновленный палеонтологией, окаменелостями и костями динозавров." #deepl:415348285

 mr_papermap_coprolite: "Палеонтология: Копролит"
 mr_papermap_coprolite_desc: "Похоже, что в настоящее время палеонтолог работает над подготовкой копролита. Вам интересно, что такое копролит? Это окаменевшие какашки. В данном случае, вероятно, от динозавра."
 mr_papermap_belemnite: "Палеонтология: Белемнит" #Please replace
 mr_papermap_belemnite_desc: "Окаменелость белемнита, найденная палеонтологом. Эти существа бродили по морям между 358 и 66 миллионами лет назад." #Please replace
 mr_papermap_ammonite: "Палеонтология: Аммонит" #Please replace
 mr_papermap_ammonite_desc: "Одна из самых известных окаменелостей. Когда-то, миллионы лет назад, этот аммонит бродил по морским просторам. Теперь он является прекрасным украшением вашего стола." #Please replace
 mr_papermap_trilobite: "Палеонтология: Трилобиты"
 mr_papermap_trilobite_desc: "Трилобиты были одними из первых членистоногих и очень успешными. К сожалению, они вымерли в пермском периоде. К счастью, некоторые из них были окаменевшими, и вы можете оставить их на столе в качестве сувенира."

 mr_papermap_battenberg_cake: "Кулинария: Торт «Баттенберг"
 mr_papermap_battenberg_cake_desc: "Вы проголодались? Может быть, вам стоит поставить на стол этот вкусный торт? Это бисквит, покрытый марципаном и названный в честь принца Луи Баттенбергского."
