l_russian:
 theme_mr_paleontology: "Morgenröte: Палеонтология (землистая)"
 theme_mr_paleontology_desc: "Интерфейс, вдохновлённый палеонтологией, окаменелостями и костями динозавров."
 mr_papermap_coprolite: "Палеонтология: копролит"
 mr_papermap_coprolite_desc: "Похоже, палеонтолог сейчас занимается препарированием копролита. Хотите знать, что это такое? Это окаменевшие экскременты. В данном случае, вероятно, динозавра."
 mr_papermap_belemnite: "Палеонтология: белемнит"
 mr_papermap_belemnite_desc: "Окаменелость белемнита, найденная палеонтологом. Эти существа обитали в морях от 358 до 66 миллионов лет назад."
 mr_papermap_ammonite: "Палеонтология: аммонит"
 mr_papermap_ammonite_desc: "Одна из самых известных окаменелостей. Миллионы лет назад этот аммонит обитал в море, а теперь может стать прекрасным украшением вашего стола."
 mr_papermap_trilobite: "Палеонтология: трилобит"
 mr_papermap_trilobite_desc: "Трилобиты были одними из первых и очень успешных членистоногих. К сожалению, они вымерли в пермском периоде. К счастью, некоторые из них окаменели, и теперь вы можете хранить их на своём столе в качестве сувенира."
 mr_papermap_battenberg_cake: "Кулинария: баттенбергский торт"
 mr_papermap_battenberg_cake_desc: "Проголодались? Возможно, вам стоит поставить на стол этот восхитительный торт. Это бисквит, покрытый марципаном и названный в честь принца Людвига Баттенбергского."
 mr_papermap_old_fashioned: "Кулинария: «Олд фешен»"
 mr_papermap_old_fashioned_desc: "Что может быть лучше хорошего «Олд фешена» в конце долгого дня? Ваш бармен непременно поднимет вам настроение этим коктейлем!"
 mr_papermap_cucumber_ice_cream: "Кулинария: огуречное мороженое"
 mr_papermap_cucumber_ice_cream_desc: "Светит солнце, стоит жаркий день. Что может быть лучше чудесного освежающего огуречного мороженого?"
 mr_papermap_croissant_hot_chocolate: "Кулинария: круассан и горячий шоколад"
 mr_papermap_croissant_hot_chocolate_desc: "Круассан и горячий шоколад с утра — лучший способ начать день. Что бы вас ни ждало."