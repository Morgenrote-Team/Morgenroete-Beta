 MR_ANTHROPOLOGIST_CAN_SYSTEMIZE_PITHECANTHROPUS_TRIGGER_TT: "#default_text Открыты все четыре различных вида питекантропов.#!"
 andersson.800.tt: "[Concept('concept_andersson_anthropologist', '#b #BLUE Антрополог#!#!')] пересмотрит существующую систематизацию типов в антропологии."
