 MR_ANTHROPOLOGIST_NEW_SYSTEMATIZATION_BUTTON: "Новая систематизация"
 MR_ANTHROPOLOGIST_NEW_SYSTEMATIZATION_BUTTON_TT: "#T Новая систематизация#!\nТекущая классификация находок по разным «людям» в зависимости от места обнаружения привела к почти неуправляемому множеству фрагментарных названий. Опытный антрополог может с помощью новой теории и систематизации отодвинуть устаревшие категории в прошлое и модернизировать антропологию.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_AT_LEAST_200_EXPERIENCE_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_andersson_anthropologist|l] с опытом не менее #V 200#!.#!"
