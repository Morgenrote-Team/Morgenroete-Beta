 MR_ORIGIN_CONGRESS_GLOBAL_500_HUMAN_FOSSIL_TT: "#default_text International anthropologist research must have secured a total of #BLUE 500 #! @dubois_human_fossil! #O Human Fossils#!. Currently [GetGlobalVariable('dubois_global_human_fossil').GetValue] #O Human Fossils#! have been found.#!"