l_russian:
 MR_ACTIVE_ANTHROPOLOGIST_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть свободный [concept_andersson_anthropologist|l].#!"
 MR_HAS_ANTHROPOLOGIST_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_andersson_anthropologist|l].#!"
 MR_ANTHROPOLOGY_10_COUNTRIES_WITH_ANTHROPOLOGIST_TRIGGER_TT: "#default_text У 10 или более стран в регионе [GetGeographicRegion('geographic_region_americas').GetName] есть [Concept('concept_andersson_anthropologist', '#b #BLUE антрополог#!#!')].#!"
 MR_ANTHROPOLOGIST_CAVE_EXPLORATION_BUTTON: "Исследование пещер"
 MR_ANTHROPOLOGIST_CAVE_EXPLORATION_BUTTON_TT: "#T Исследование пещер#!\nС помощью [Concept('concept_andersson_anthropologist', '#b #BLUE антрополога#!#!')] можно исследовать ранее известные [Concept('concept_andersson_cave','пещеры')] на национальной территории.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_HAS_CAVE_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_andersson_cave|l].#!"
 MR_ANTHROPOLOGIST_NOT_HAS_CAVE_MODIFIER_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] #n нет#! модификатора #V $andersson_cave_exploration_modifier$#!.#!"
 MR_ANTHROPOLOGIST_SKELETON_RECONSTRUCTION_BUTTON: "Реконструкция скелета"
 MR_ANTHROPOLOGIST_SKELETON_RECONSTRUCTION_BUTTON_TT: "#T Реконструкция скелета#!\nС помощью [Concept('concept_andersson_anthropologist', '#b #BLUE антрополога#!#!')] [Concept('concept_andersson_human_fossil','ископаемые останки людей')] можно использовать для реконструкции [Concept('concept_andersson_skeleton','доисторического скелета')].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_CAN_RECONSTRUCT_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть не менее #V 5#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','ископаемых останков людей')] от скелета, который ещё не был реконструирован.#!"
 MR_ANTHROPOLOGIST_HAS_INTITUTE_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [GetBuildingType('building_andersson_institute').GetName].#!"
 MR_RECALL_ANTHROPOLOGIST_BUTTON_TT: "#T Отозвать антрополога#!\nИногда обстоятельства могут потребовать досрочно завершить исследование пещеры. В этом случае [Concept('concept_andersson_anthropologist', '#b #BLUE антрополог#!#!')] станет доступен до истечения срока, но не принесёт никаких находок.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ORIGIN_CONGRESS_BUTTON: "Конгресс о происхождении человека"
 MR_ORIGIN_CONGRESS_BUTTON_TT: "#T Конгресс о происхождении современного человека#!\nС открытием доисторических человеческих костей возник и вопрос об изначальном происхождении человека. Дарвин предполагал африканское происхождение, тогда как другие выдвигали гипотезы о нескольких параллельных линиях развития. С рубежа веков господствующей стала точка зрения, что современные люди развились в Азии.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGY_INSTITUTE_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [GetBuildingType('building_andersson_institute').GetName].#!"
 MR_ORIGIN_CONGRESS_SPECIAL_HUMAN_FOSSIL_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть не менее #V 5#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','ископаемых останков людей')], относящихся к одному из этих видов: #V питекантроп#! или #V австралопитек#!.#!"
 MR_ORIGIN_CONGRESS_GLOBAL_HUMAN_FOSSIL_TT: "#default_text Во всём мире найдено не менее #V 250#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','ископаемых останков людей')] (сейчас найдено [GetGlobalVariable('dubois_global_human_fossil').GetValue|+0] @andersson_human_fossil!).#!"
 NEOANTHROPUS_VAR: "@andersson_neoanthropus_fossil!  [GetPlayer.MakeScope.Var('andersson_neoanthropus_fossil_var').GetValue|V0]"
 NEOANTHROPUS_VAR_TT: "#header [Concept('concept_andersson_human_fossil','Ископаемые останки неоантропов')]#!\nУ [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] найдено @andersson_neoanthropus_fossil! [GetPlayer.MakeScope.Var('andersson_neoanthropus_fossil_var').GetValue|V0] ископаемых останков неоантропов\n\nОстанки неоантропов:\n[GetPlayer.GetCustom('andersson_vero_fossil_discovered_type')][GetPlayer.GetCustom('andersson_lagoa_santa_fossil_discovered_type')][GetPlayer.GetCustom('andersson_cro_magnon_fossil_discovered_type')][GetPlayer.GetCustom('andersson_boskop_fossil_discovered_type')][GetPlayer.GetCustom('andersson_tianyuan_fossil_discovered_type')][GetPlayer.GetCustom('andersson_talgai_fossil_discovered_type')]"
 PALAEANTHROPUS_VAR: "@andersson_palaeanthropus_fossil!  [GetPlayer.MakeScope.Var('andersson_palaeanthropus_fossil').GetValue|V0]"
 PALAEANTHROPUS_VAR_TT: "#header [Concept('concept_andersson_human_fossil','Ископаемые останки палеоантропов')]#!\nУ [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] найдено @andersson_palaeanthropus_fossil! [GetPlayer.MakeScope.Var('andersson_palaeanthropus_fossil').GetValue|V0] ископаемых останков палеоантропов\n\nОстанки палеоантропов:\n[GetPlayer.GetCustom('andersson_neanderthal_fossil_discovered_type')][GetPlayer.GetCustom('andersson_gibraltar_fossil_discovered_type')][GetPlayer.GetCustom('andersson_spy_fossil_discovered_type')][GetPlayer.GetCustom('andersson_krapina_fossil_discovered_type')][GetPlayer.GetCustom('andersson_galilee_fossil_discovered_type')]"
 PITHECANTHROPUS_VAR: "@andersson_pithecanthropus_fossil!  [GetPlayer.MakeScope.Var('andersson_pithecanthropus_fossil').GetValue|V0]"
 PITHECANTHROPUS_VAR_TT: "#header [Concept('concept_andersson_human_fossil','Ископаемые останки питекантропов')]#!\nУ [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] найдено @andersson_pithecanthropus_fossil! [GetPlayer.MakeScope.Var('andersson_pithecanthropus_fossil').GetValue|V0] ископаемых останков питекантропов\n\nОстанки питекантропов:\n[GetPlayer.GetCustom('andersson_heidelberg_fossil_discovered_type')][GetPlayer.GetCustom('andersson_rhodesian_fossil_discovered_type')][GetPlayer.GetCustom('andersson_peking_fossil_discovered_type')][GetPlayer.GetCustom('andersson_java_fossil_discovered_type')]"
 AUSTRALOPITHECUS_VAR: "@andersson_australopithecus_fossil!  [GetPlayer.MakeScope.Var('andersson_australopithecus_fossil').GetValue|V0]"
 AUSTRALOPITHECUS_VAR_TT: "#header [Concept('concept_andersson_human_fossil','Ископаемые останки австралопитеков')]#!\nУ [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] найдено @andersson_australopithecus_fossil! [GetPlayer.MakeScope.Var('andersson_australopithecus_fossil').GetValue|V0] ископаемых останков австралопитеков\n\nОстанки австралопитеков:\n[GetPlayer.GetCustom('andersson_australopithecus_fossil_discovered_type')]"
 PREHISTORIC_ARTIFACTS_VAR: "@andersson_prehistoric_artifact!  [GetPlayer.MakeScope.Var('andersson_prehistoric_artifact_var').GetValue|V0]"
 PREHISTORIC_ARTIFACTS_VAR_TT: "#header [Concept('concept_andersson_prehistoric_artifact','Доисторические артефакты')]#!\nУ [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] найдено @andersson_prehistoric_artifact! [GetPlayer.MakeScope.Var('andersson_prehistoric_artifact_var').GetValue|V0] [Concept('concept_andersson_prehistoric_artifact','доисторических артефактов')]"
 MR_ANTHROPOLOGIST_ANTHROPOLOGICAL_RESEARCH_BUTTON: "Антропологические исследования"
 MR_ANTHROPOLOGIST_ANTHROPOLOGICAL_RESEARCH_BUTTON_TT: "#T Антропологические исследования#!\n[Concept('concept_andersson_anthropologist', '#b #BLUE Антрополог#!#!')] сосредоточит свою работу прежде всего на поиске [Concept('concept_andersson_human_fossil','ископаемых останков людей')] и [Concept('concept_andersson_prehistoric_artifact','доисторических артефактов')], разыскивая места находок по всей стране.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_HOMINID_PROSPECTING_BUTTON: "Поиск гоминид"
 MR_ANTHROPOLOGIST_HOMINID_PROSPECTING_BUTTON_TT: "#T Поиск гоминид#!\n[Concept('concept_andersson_anthropologist', '#b #BLUE Антрополог#!#!')] вместе с командой может искать антропологические стоянки, чтобы целенаправленно находить вымершие виды людей. Можно обнаружить [Concept('concept_andersson_human_fossil','ископаемые останки людей')] и [Concept('concept_andersson_prehistoric_artifact','доисторические артефакты')]. Архаические типы людей можно найти только при использовании современных производственных методов в нашем [GetBuildingType('building_andersson_institute').GetName].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_HOMINID_PROSPECTING_POSSIBLE_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть #n хотя бы одна#! область в следующих географических регионах: [GetGeographicRegion('andersson_geographic_region_neoanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_palaeanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_pithecanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_australopithecus').GetName].#!"
 MR_ANTHROPOLOGIST_IS_SPELEOLOGIST_TRIGGER_TT: "#default_text У [Concept('concept_andersson_anthropologist', '#b #BLUE антрополога#!#!')] есть [concept_character_trait] #V $andersson_speleologist$#!.#!"
 MR_ANTHROPOLOGIST_EXPOSE_PILTDOWN_FRAUD_BUTTON: "Разоблачить подделку «[GetPlayer.GetCustom('andersson_fossil_piltdown')]»"
 MR_ANTHROPOLOGIST_EXPOSE_PILTDOWN_FRAUD_BUTTON_TT: "#T Разоблачить подделку «[GetPlayer.GetCustom('andersson_fossil_piltdown')]»#!\nВесьма вероятно, что печально известные ископаемые останки «[GetPlayer.GetCustom('andersson_fossil_piltdown')]» являются подделкой. Однако страна [GetGlobalVariable('andersson_piltdown_country_global_var').GetCountryDefinition.GetName], вероятно, будет защищать эту крайне престижную находку любой ценой усилиями своих исследователей. Пора разоблачить эту ложь!\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGY_RATING_PILTDOWN_FRAUD_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть не менее #V 100#! ед. антропологического престижа.#!"
 MR_ANTHROPOLOGY_PILTDOWN_NO_RECENT_TRY_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] нет модификатора #V $andersson_piltdown_debate_lost_modifier$#!.#!"
 MR_ANTHROPOLOGY_PILTDOWN_NO_CURRENT_DEBATE_TRIGGER_TT: "#default_text Сейчас #R не ведутся дебаты#! о «[GetPlayer.GetCustom('andersson_fossil_piltdown')]».#!"
 MR_ANTHROPOLOGY_PILTDOWN_CAN_BE_EXPOSED_TRIGGER_TT: "#default_text Страна [GetGlobalVariable('andersson_piltdown_country_global_var').GetCountryDefinition.GetName] не смогла успешно защитить «[GetPlayer.GetCustom('andersson_fossil_piltdown')]» за последние 5 лет.#!"
 TOTAL_HUMAN_FOSSILS_VAR: "@andersson_human_fossil!  [GetPlayer.MakeScope.Var('andersson_total_human_fossil').GetValue|V0]"
 TOTAL_HUMAN_FOSSILS_VAR_TT: "#header [Concept('concept_andersson_human_fossil','Всего ископаемых останков людей')]#!\nУ [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] найдено @andersson_human_fossil! [GetPlayer.MakeScope.Var('andersson_total_human_fossil').GetValue|V0] из @andersson_human_fossil! [GetGlobalVariable('andersson_global_human_fossil_global_var').GetValue|V0] [Concept('concept_andersson_human_fossil','ископаемых останков людей')]"
 SPECIAL_HUMAN_FOSSILS_VAR: "@andersson_special_human_fossil_var!  [GetPlayer.MakeScope.Var('andersson_special_human_fossil_var').GetValue|V0]"
 SPECIAL_HUMAN_FOSSILS_VAR_TT: "#header [Concept('concept_andersson_human_fossil','Особые ископаемые останки людей')]#!\nУ [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] найдено @andersson_special_human_fossil_var! [GetPlayer.MakeScope.Var('andersson_special_human_fossil_var').GetValue|V0] особых [Concept('concept_andersson_human_fossil','ископаемых останков людей')]\n\nОсобые останки:\n[GetPlayer.GetCustom('andersson_piltdown_fossil_discovered_type')][GetPlayer.GetCustom('andersson_paranthropus_fossil_discovered_type')][GetPlayer.GetCustom('andersson_clovis_fossil_discovered_type')][GetPlayer.GetCustom('andersson_dragon_fossil_discovered_type')][GetPlayer.GetCustom('andersson_floresiensis_fossil_discovered_type')]"
 PREHISTORIC_VENUSES_VAR: "@andersson_prehistoric_venus!  [GetPlayer.MakeScope.Var('andersson_prehistoric_venus_var').GetValue|V0]"
 PREHISTORIC_VENUSES_VAR_TT: "#header [Concept('concept_andersson_prehistoric_artifact','Доисторические Венеры')]#!\nУ [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] найдено @andersson_prehistoric_venus! [GetPlayer.MakeScope.Var('andersson_prehistoric_venus_var').GetValue|V0] [Concept('concept_andersson_prehistoric_artifact','доисторических Венер')]"
 MR_ANTHROPOLOGIST_HOMINID_EXPEDITION_BUTTON: "Экспедиция за гоминидами"
 MR_ANTHROPOLOGIST_HOMINID_EXPEDITION_BUTTON_TT: "#T Экспедиция за гоминидами#!\n[Concept('concept_andersson_anthropologist', '#b #BLUE Антрополог#!#!')] вместе с командой может начать экспедицию для поиска вымерших видов людей в зависимых странах. Условия похожи на поиск гоминид на собственной территории.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_HOMINID_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть #n хотя бы один#! прямой субъект, владеющий областью в следующих географических регионах: [GetGeographicRegion('andersson_geographic_region_neoanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_palaeanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_pithecanthropus').GetName], [GetGeographicRegion('andersson_geographic_region_australopithecus').GetName].#!"
 MR_ANTHROPOLOGIST_NOT_HAS_EXPEDITION_MODIFIER_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] #n нет#! модификатора #V $andersson_hominid_expedition_modifier$#!.#!"
 MR_ANTHROPOLOGIST_CRANIOMETRY_BUTTON: "Краниометрия"
 MR_ANTHROPOLOGIST_CRANIOMETRY_BUTTON_TT: "#T Краниометрия#!\nИзмерение черепов считается одной из самых престижных задач антрополога. Один раз за карьеру антрополог может полностью погрузиться в любимые черепа, тем самым расширив свой опыт и освоив новые навыки.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANDERSSON_25_BONES_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть как минимум #V 25#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil','ископаемых останков людей')].#!"
 MR_ANTHROPOLOGIST_NOT_DONE_CRANIOMETRY_TRIGGER_TT: "#default_text Наш антрополог #R ещё не занимался#! краниометрией.#!"
 MR_ANTHROPOLOGIST_NEOLITHIC_BUTTON: "Неолитическая эпоха"
 MR_ANTHROPOLOGIST_NEOLITHIC_BUTTON_TT: "#T Неолитическая эпоха#!\nДля многих обычных людей прошлое древнего человечества остаётся абстракцией. Антрополог может обустроить в университете комнаты, которые сделают жизнь той эпохи нагляднее. В каждом университете возможна только одна диорама. В этом случае поручите вашему антропологу создать диораму неолитической эпохи.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_MESOLITHIC_BUTTON: "Мезолитическая эпоха"
 MR_ANTHROPOLOGIST_MESOLITHIC_BUTTON_TT: "#T Мезолитическая эпоха#!\nДля многих обычных людей прошлое древнего человечества остаётся абстракцией. Антрополог может обустроить в университете комнаты, которые сделают жизнь той эпохи нагляднее. В каждом университете возможна только одна диорама. В этом случае поручите вашему антропологу создать диораму мезолитической эпохи.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANTHROPOLOGIST_UPPER_PALEOLITHIC_BUTTON: "Верхний палеолит"
 MR_ANTHROPOLOGIST_UPPER_PALEOLITHIC_BUTTON_TT: "#T Верхний палеолит#!\nДля многих обычных людей прошлое древнего человечества остаётся абстракцией. Антрополог может обустроить в университете комнаты, которые сделают жизнь той эпохи нагляднее. В каждом университете возможна только одна диорама. В этом случае поручите вашему антропологу создать диораму верхнего палеолита.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANDERSSON_NEOANTHROPUS_FOSSIL_TRIGGER: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть как минимум #V 1#! @andersson_neoanthropus_fossil! [Concept('concept_andersson_human_fossil','находка останков неоантропа')].#!"
