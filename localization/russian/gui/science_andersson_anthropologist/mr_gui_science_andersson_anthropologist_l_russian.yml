 MR_PEOPLING_CONGRESS_BUTTON: "Конгресс о заселении Америки"
 MR_PEOPLING_CONGRESS_BUTTON_TT: "#T Конгресс о заселении Америки#!\nКак происходило заселение Америки в доисторические времена? До недавнего времени считалось, что этот двойной континент был заселён всего несколько тысяч лет назад. Но всё больше открытий ставит такую картину мира под сомнение.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PEOPLING_CONGRESS_GLOBAL_HUMAN_FOSSIL_TT: "Международные антропологические исследования должны обеспечить в общей сложности #BLUE 250 #! @dubois_human_fossil! #O ископаемых останков людей#!. Сейчас найдено [GetGlobalVariable('dubois_global_human_fossil').GetValue] #O ископаемых останков людей#!."
