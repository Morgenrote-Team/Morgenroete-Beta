 andersson_anthropologist_achievement_total_identified_human_fossils_anthropologist_loc: "\n[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe|U] выявил в общей сложности [Scope.Var('lepsius_total_identified_human_fossils_anthropologist_var').GetValue|V0] человеческих окаменелостей." #deepl:3015431739
 andersson_anthropologist_achievement_attended_origin_congress_loc: "\nПрофессор [Scope.GetCharacter.GetLastNameNoFormatting] принял участие в Конгрессе по #V происхождению современного человека#!." #deepl:2823441805
 andersson_anthropologist_achievement_exposed_piltdown_fraud_loc: "\nБлагодаря [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHim] #V  "Пилтдаунский человек" был разоблачен как мошенничество#!." #deepl:1017420061
 andersson_anthropologist_achievement_invented_anthropology_loc: "Доктор [Scope.GetCharacter.GetLastNameNoFormatting] - первый ученый, который скрупулезно и очень точно зафиксировал человеческие кости и скелеты. [Scope.GetCharacter.GetSheHe] считается #V пионером антропологии#!." #deepl:3155653452
 andersson_anthropologist_achievement_completed_cromagnon_anthropologist_loc: "\n[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe|U] впервые научно #V классифицировал кроманьонцев#!." #deepl:69566943
 andersson_anthropologist_achievement_completed_neanderthalensis_anthropologist_loc: "\Доктор [Scope.GetCharacter.GetLastNameNoFormatting] был первым, кто #V включил неандертальца в систематику доисторического человека#!." #deepl:523665278
 andersson_anthropologist_achievement_completed_erectus_anthropologist_loc: "\nВ этом заслуга [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetHerHis] того, что ранее неизвестный #V Homo Erectus стал восприниматься как человеческий вид#!." #deepl:991432050
 andersson_anthropologist_achievement_completed_australopithecus_anthropologist_loc: "\nПрофессор [Scope.GetCharacter.GetLastNameNoFormatting] первым сумел расшифровать первые #V тайны австралопитека#! и сделать выводы о его образе жизни и внешнем виде." #deepl:994811918
 andersson_anthropologist_achievement_completed_paranthropus_anthropologist_loc: "\nНе многим удавалось #V реконструировать доисторического человека#! по нескольким костям, что позволило сделать выводы о среде его обитания. Доктору [Scope.GetCharacter.GetLastNameNoFormatting] удалось это сделать с #V Paranthropus#!." #deepl:2683346481
