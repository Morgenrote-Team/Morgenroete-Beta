 andersson_anthropologist_achievement_total_identified_human_fossils_anthropologist_loc: "\n #indent_newline:3 • [SelectLocalization(ROOT.Var('lepsius_anthropologist_var').GetCharacter.IsFemale, 'Она', 'Он')] идентифицировал[SelectLocalization(ROOT.Var('lepsius_anthropologist_var').GetCharacter.IsFemale, 'а', '')] в общей сложности [Scope.Var('lepsius_total_identified_human_fossils_anthropologist_var').GetValue|V0] окаменелых останков человека.#!"
 andersson_anthropologist_achievement_attended_origin_congress_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] посетил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] конгресс, посвящённый #V происхождению современного человека#!.#!"
 andersson_anthropologist_achievement_exposed_piltdown_fraud_loc: "\n #indent_newline:3 • Благодаря [SelectLocalization(ROOT.Var('lepsius_anthropologist_var').GetCharacter.IsFemale, 'ей', 'ему')] #V пилтдаунский человек был разоблачён как подделка#!.#!"
 andersson_anthropologist_achievement_invented_anthropology_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] — первый учёный, который начал скрупулёзно и очень точно документировать человеческие кости и скелеты. [SelectLocalization(Scope.GetCharacter.IsFemale, 'Её', 'Его')] считают #V пионером антропологии#!.#!"
 andersson_anthropologist_achievement_completed_cromagnon_anthropologist_loc: "\n #indent_newline:3 • [SelectLocalization(ROOT.Var('lepsius_anthropologist_var').GetCharacter.IsFemale, 'Она', 'Он')] впервые научно #V классифицировал[SelectLocalization(ROOT.Var('lepsius_anthropologist_var').GetCharacter.IsFemale, 'а', '')] кроманьонца#!.#!"
 andersson_anthropologist_achievement_completed_neanderthalensis_anthropologist_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] был[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] первым, кто #V определил место неандертальца в систематике доисторического человека#!.#!"
 andersson_anthropologist_achievement_completed_erectus_anthropologist_loc: "\n #indent_newline:3 • Именно благодаря [SelectLocalization(ROOT.Var('lepsius_anthropologist_var').GetCharacter.IsFemale, 'ей', 'ему')] ранее неизвестный #V Homo Erectus стал восприниматься как вид человека#!.#!"
 andersson_anthropologist_achievement_completed_australopithecus_anthropologist_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] перв[SelectLocalization(Scope.GetCharacter.IsFemale, 'ой', 'ым')] сумел[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] разгадать первые #V тайны австралопитека#! и сделать выводы о его образе жизни и внешнем виде.#!"
 andersson_anthropologist_achievement_completed_paranthropus_anthropologist_loc: "\n #indent_newline:3 • Немногим удавалось #V реконструировать доисторического человека#! по нескольким костям, чтобы сделать выводы о среде его обитания. Доктору [Scope.GetCharacter.GetLastNameNoFormatting] это удалось с #V парантропом#!.#!"