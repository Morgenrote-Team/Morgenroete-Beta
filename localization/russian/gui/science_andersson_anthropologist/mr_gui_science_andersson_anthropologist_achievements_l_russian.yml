 andersson_anthropologist_achievement_attended_origin_congress_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'посетила', 'посетил')] конгресс, посвящённый #V происхождению современного человека#!.#!"
 andersson_anthropologist_achievement_exposed_piltdown_fraud_loc: "\n #indent_newline:3 • Благодаря [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'ей', 'ему')] #V пилтдаунский человек был разоблачён как подделка#!.#!"
 andersson_anthropologist_achievement_invented_anthropology_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] - первый учёный, который начал скрупулёзно и очень точно документировать человеческие кости и скелеты. [SelectLocalization(Scope.GetCharacter.IsFemale, 'Её', 'Его')] считают #V пионером антропологии#!.#!"
