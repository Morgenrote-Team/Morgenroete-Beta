 verrier_astronomer_achievements_no_astronomer_loc: "Здесь будут отображаться достижения этого [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')]#!, как только он у вас появится."
 verrier_astronomer_achievements_intro_loc: "#V Достижения этого астронома#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] — успешный астроном. [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она открыла', 'Он открыл')] [Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V] [Concept('concept_verrier_astronomical_object', 'астрономических объектов')].#!"
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\n #indent_newline:3 • Измерив #V расстояние до 61 Лебедя в 11,4 световых лет#!, [Scope.GetCharacter.GetLastNameNoFormatting] одним махом доказал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')], что вселенная гораздо больше, чем считалось ранее.#!"
 verrier_astronomer_achievement_helium_discovered_loc: "\n #indent_newline:3 • Одно из величайших [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] достижений — #V открытие элемента гелия#! во время изучения электромагнитного спектра солнца.#!"
 verrier_astronomer_achievement_uranus_discoverer_loc: "\n #indent_newline:3 • Никто не ожидал открытия новой планеты, но профессор [Scope.GetCharacter.GetLastNameNoFormatting] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] планету Уран#!. Это открытие положило начало поиску других планет в нашей Солнечной системе.#!"
 verrier_astronomer_achievement_ceres_discoverer_loc: "\n #indent_newline:3 • Многие астрономы искали планету между Марсом и Юпитером. Но именно доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V [SelectLocalization(Scope.GetCharacter.IsFemale, 'нашла', 'нашёл')] Цереру#!.#!"
 verrier_astronomer_achievement_pallas_discoverer_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V [SelectLocalization(Scope.GetCharacter.IsFemale, 'нашла', 'нашёл')] планету Паллада#! в области между Марсом и Юпитером.#!"
 verrier_astronomer_achievement_vesta_discoverer_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] #V [SelectLocalization(Scope.GetCharacter.IsFemale, 'нашла', 'нашёл')] планету Веста#! в области между Марсом и Юпитером.#!"
 verrier_astronomer_achievement_juno_discoverer_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] #V наш[SelectLocalization(Scope.GetCharacter.IsFemale, 'ла', 'ёл')] планету Юнона#! в области между Марсом и Юпитером.#!"
 verrier_astronomer_neptune_discoverer_loc: "\n #indent_newline:3 • Одним из величайших [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] деяний стало #V открытие планеты Нептун#!. Это открытие навсегда обеспечило [SelectLocalization(Scope.GetCharacter.IsFemale, 'ей', 'ему')] место в учебниках истории.#!"
 verrier_astronomer_achievement_pluto_discoverer_loc: "\n #indent_newline:3 • Хотя существование #V Плутона#! оспаривалось, профессор [Scope.GetCharacter.GetLastNameNoFormatting] действительно #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')]#! эту крошечную планету. Великое астрономическое достижение!#!"
 verrier_astronomer_achievement_discovered_1843_comet_loc: "\n #indent_newline:3 • В #V 1843#! году [SelectLocalization(Scope.GetCharacter.IsFemale, 'она', 'он')] перв[SelectLocalization(Scope.GetCharacter.IsFemale, 'ой', 'ым')] #V наш[SelectLocalization(Scope.GetCharacter.IsFemale, 'ла', 'ёл')] Великую комету#!, которую впоследствии назвали в [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] честь.#!"
 verrier_astronomer_achievement_discovered_1858_comet_loc: "\n #indent_newline:3 • Когда #V Великая комета 1858 года#! пролетала мимо Земли, доктор [Scope.GetCharacter.GetLastNameNoFormatting] увидел[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] её перв[SelectLocalization(Scope.GetCharacter.IsFemale, 'ой', 'ым')]. В результате комета была названа в [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] честь.#!"
 verrier_astronomer_achievement_discovered_1861_comet_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] перв[SelectLocalization(Scope.GetCharacter.IsFemale, 'ой', 'ым')] открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] #V Великую комету 1861 года#! в темноте ночного неба, и небесный объект был назван в [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] честь.#!"
 verrier_astronomer_achievement_discovered_1874_comet_loc: "\n #indent_newline:3 • Когда #V Великая комета 1874 года#! появилась впервые, именно доктор [Scope.GetCharacter.GetLastNameNoFormatting] заметил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] её перв[SelectLocalization(Scope.GetCharacter.IsFemale, 'ой', 'ым')]. Теперь комета навеки будет носить [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] имя.#!"
 verrier_astronomer_achievement_discovered_1882_comet_loc: "\n #indent_newline:3 • #V 1882#! год был впечатляющим с астрономической точки зрения. Профессор [Scope.GetCharacter.GetLastNameNoFormatting] открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] #V Великую комету#! во время её пролёта мимо Земли. Невероятное зрелище.#!"
 verrier_astronomer_achievement_finished_pacific_expedition_loc: "\n #indent_newline:3 • Во время #V тихоокеанской экспедиции#! доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'нашла', 'нашёл')] различные новые #V астрономические объекты#! в южном полушарии.#!"
 verrier_astronomer_achievement_observed_venus_transit_loc: "\n #indent_newline:3 • В #V 1874#! году профессор [Scope.GetCharacter.GetLastNameNoFormatting] наблюдал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] #V прохождение Венеры#! в Тихом океане. Событие, которое обычно случается раз в жизни.#!"
 verrier_astronomer_achievement_observed_carrington_event_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] наблюдал[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] #V мощную солнечную вспышку#! в [Scope.GetVariable('verrier_astronomer_achievement_observed_carrington_event_var').GetValue] году.#!"
 verrier_astronomer_achievement_observed_corona_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] совершил[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] открытие, которое было названо в [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] честь: #V «чётки [Scope.GetCharacter.GetLastNameNoFormatting]»#!.#!"
 verrier_astronomer_achievement_sun_photo_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] является автором #V первой фотографии солнечного затмения#!.#!"
 verrier_astronomer_achievement_deimos_discoverer_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] естественный спутник Марса Деймос#!.#!"
 verrier_astronomer_achievement_phobos_discoverer_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] естественный спутник Марса Фобос#!.#!"
 verrier_astronomer_achievement_amalthea_discoverer_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] естественный спутник Юпитера Амальтею#!.#!"
 verrier_astronomer_achievement_himalia_discoverer_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] естественный спутник Юпитера Гималию#!.#!"
 verrier_astronomer_achievement_elara_discoverer_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] естественный спутник Юпитера Элару#!.#!"
 verrier_astronomer_achievement_pasiphae_discoverer_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] естественный спутник Юпитера Пасифе#!.#!"
 verrier_astronomer_achievement_sinope_discoverer_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] естественный спутник Юпитера Синопе#!.#!"
 verrier_astronomer_achievement_lysithea_discoverer_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] естественный спутник Юпитера Лиситею#!.#!"
 verrier_astronomer_achievement_carme_discoverer_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] естественный спутник Юпитера Карме#!.#!"
 verrier_astronomer_achievement_enceladus_discoverer_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] естественный спутник Сатурна Энцелад#!.#!"
 verrier_astronomer_achievement_mimas_discoverer_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] естественный спутник Сатурна Мимас#!.#!"
 verrier_astronomer_achievement_hyperion_discoverer_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] естественный спутник Сатурна Гиперион#!.#!"
 verrier_astronomer_achievement_phoebe_discoverer_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] естественный спутник Сатурна Фебу#!.#!"
 verrier_astronomer_achievement_titania_discoverer_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] естественный спутник Урана Титанию#!.#!"
 verrier_astronomer_achievement_oberon_discoverer_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] естественный спутник Урана Оберон#!.#!"
 verrier_astronomer_achievement_ariel_discoverer_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] естественный спутник Урана Ариэль#!.#!"
 verrier_astronomer_achievement_umbriel_discoverer_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] естественный спутник Урана Умбриэль#!.#!"
 verrier_astronomer_achievement_miranda_discoverer_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] естественный спутник Урана Миранду#!.#!"
 verrier_astronomer_achievement_triton_discoverer_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] естественный спутник Нептуна Тритон#!.#!"
 verrier_astronomer_achievement_nereid_discoverer_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] #V открыл[SelectLocalization(Scope.GetCharacter.IsFemale, 'а', '')] естественный спутник Нептуна Нереиду#!.#!"
 verrier_astronomer_achievement_moon_fission_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] считается [SelectLocalization(Scope.GetCharacter.IsFemale, 'основательницей', 'основателем')] теории о том, что #V Луна была частью Земли#! и откололась от неё.#!"
 verrier_astronomer_achievement_moon_capture_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] считается [SelectLocalization(Scope.GetCharacter.IsFemale, 'основательницей', 'основателем')] теории о том, что #V Луна — это инородное тело, захваченное Землёй#!.#!"
 verrier_astronomer_achievement_centaur_discoverer_loc: "\n #indent_newline:3 • While searching for Planet X, [Scope.GetCharacter.GetSheHe] #V found the first Centaur#! in [GetGlobalVariable('verrier_centaur_year_global_var').GetValue|V], a separate class of asteroids located between Jupiter and Neptune.#!"