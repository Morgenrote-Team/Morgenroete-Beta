 verrier_astronomer_achievements_intro_loc: "#V Достижения этогоАстроном#![Scope.GetCharacter.GetFullName] - выдающийся астроном, открывший [Scope.Var('verrier_astronomer_total_objects_var').GetValue|0V] [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] ." #deepl:2330629282
 verrier_astronomer_achievement_measured_distance_cygni_loc: "\n Измерив #V расстояние до 61 Cygni в 11,4 световых года#!, [Scope.GetCharacter.GetLastNameNoFormatting] удалось одним махом показать, что Вселенная гораздо больше, чем считалось ранее." #deepl:4180687375
 verrier_astronomer_achievement_helium_discovered_loc: "\nОдним из самых больших достижений [Scope.GetCharacter.GetHerHis] является #V открытие элемента гелия#! во время изучения электромагнитного спектра Солнца." #deepl:1824398573
 verrier_astronomer_achievement_uranus_discoverer_loc: "\nНикто не ожидал, что будет открыта новая планета, но профессор [Scope.GetCharacter.GetLastNameNoFormatting] #V  открыл планету Уран#!. Это открытие привело к поиску новых планет в нашей Солнечной системе." #deepl:596907633
 verrier_astronomer_achievement_ceres_discoverer_loc: "\nМногие астрономы искали планету между Марсом и Юпитером. Но доктор [Scope.GetCharacter.GetLastNameNoFormatting] был единственным, кто #V нашел Цереру#!." #deepl:134698821
 verrier_astronomer_achievement_pallas_discoverer_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] #V  обнаружил планету Паллас#! в области между Марсом и Юпитером." #deepl:2895291218
 verrier_astronomer_achievement_vesta_discoverer_loc: "\nПрофессор [Scope.GetCharacter.GetLastNameNoFormatting] #V  обнаружил планету Веста#! в области между Марсом и Юпитером." #deepl:3332363292
 verrier_astronomer_achievement_juno_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  обнаружил планету Юнона#! в области между Марсом и Юпитером." #deepl:2722834301
 verrier_astronomer_neptune_discoverer_loc: "\nОдним из [Scope.GetCharacter.GetHerHis] величайших подвигов было #V открытие планеты Нептун#!. Это открытие навсегда закрепило [Scope.GetCharacter.GetHerHim] место в учебниках истории." #deepl:740023144
 verrier_astronomer_achievement_pluto_discoverer_loc: "\nНесмотря на то, что существование #V Плутона#! было спорным, профессор [Scope.GetCharacter.GetLastNameNoFormatting] фактически #V открыл#! крошечную планету. Великое астрономическое достижение!" #deepl:2882859348
 verrier_astronomer_achievement_discovered_1843_comet_loc: "\nВ #V 1843 году#! [Scope.GetCharacter.GetSheHe] первым #V обнаружил Великую комету#!, которая поэтому была названа в честь [Scope.GetCharacter.GetLastNameNoFormatting]." #deepl:493581168
 verrier_astronomer_achievement_discovered_1858_comet_loc: "\Когда #V Великая комета 1858 года#! пролетела мимо Земли, доктор [Scope.GetCharacter.GetLastNameNoFormatting] был первым, кто увидел комету. В результате комета была названа в честь [Scope.GetCharacter.GetHerHim]." #deepl:2184348218
 verrier_astronomer_achievement_discovered_1861_comet_loc: "\nПервым обнаружив #V Великую комету 1861 года#! в темноте ночного неба, профессор [Scope.GetCharacter.GetLastNameNoFormatting] стал тезкой этого небесного объекта." #deepl:2672737780
 verrier_astronomer_achievement_discovered_1874_comet_loc: "\Когда #V Великая комета 1874 года#! впервые появилась, первым ее заметил доктор [Scope.GetCharacter.GetLastNameNoFormatting]. Теперь комета будет носить имя [Scope.GetCharacter.GetHerHis] всегда." #deepl:333537749
 verrier_astronomer_achievement_discovered_1882_comet_loc: "\nГод #V 1882#! был впечатляющим с астрономической точки зрения. Профессор [Scope.GetCharacter.GetLastNameNoFormatting] обнаружил #V Великую комету#! во время ее пролета над Землей. Невероятное зрелище." #deepl:3157970288
 verrier_astronomer_achievement_finished_pacific_expedition_loc: "\nВо время #V Тихоокеанской экспедиции#! доктор [Scope.GetCharacter.GetLastNameNoFormatting] обнаружил различные новые #V астрономические объекты#! в южном полушарии." #deepl:27168137
 verrier_astronomer_achievement_observed_venus_transit_loc: "\nВ 1874 году #V #! профессор [Scope.GetCharacter.GetLastNameNoFormatting] наблюдал #V транзит Венеры#! в Тихом океане. Обычно такое событие случается раз в жизни." #deepl:885972622
 verrier_astronomer_achievement_observed_carrington_event_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] наблюдал #V мощную солнечную вспышку#! в [Scope.GetVariable('verrier_astronomer_achievement_observed_carrington_event_var').GetValue]." #deepl:2882246181
 verrier_astronomer_achievement_observed_corona_loc: "\nОткрыл для себя #V [Scope.GetCharacter.GetLastNameNoFormatting] 'Бусы#!, которые были названы в честь [Scope.GetCharacter.GetHerHim]." #deepl:2736282257
 verrier_astronomer_achievement_sun_photo_loc: "\nД-р [Scope.GetCharacter.GetLastNameNoFormatting] является автором #V первой фотографии солнечного затмения.#!" #deepl:3755032771
 verrier_astronomer_achievement_deimos_discoverer_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] #V  открыл естественный спутник Марса Деймос#!." #deepl:69884165
 verrier_astronomer_achievement_phobos_discoverer_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  обнаружил естественный спутник Марса Фобос#!." #deepl:473150176
