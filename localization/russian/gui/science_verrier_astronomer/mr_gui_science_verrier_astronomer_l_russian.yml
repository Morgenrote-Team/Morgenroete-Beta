l_russian:
 MR_STANDARD_TIME_BUTTON: "Ввести стандартное время"
 MR_STANDARD_TIME_BUTTON_TT: "#T Ввести стандартное время#!\nВ мире, где ритм жизни задают уже не колокольни, а вокзальные часы, и каждая минута на счету, стандартизация времени по всей стране стала насущной необходимостью.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PRIME_MERIDIAN_BUTTON: "Нулевой меридиан"
 MR_PRIME_MERIDIAN_BUTTON_TT: "#T Нулевой меридиан#!\nПо мере того как всё больше стран вводят национальное стандартное время, возникает новая проблема: поиск нулевого меридиана, который мог бы служить точкой отсчёта для международных часовых поясов.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_3_GREAT_POWERS_HAVE_STANDARD_TIME_TRIGGER_TT: "#default_text Как минимум #V 3 великие державы#! ввели стандартное время.#!"
 MR_20_COUNTRIES_HAVE_STANDARD_TIME_TRIGGER_TT: "#default_text Как минимум #V 20 стран#! ввели стандартное время.#!"