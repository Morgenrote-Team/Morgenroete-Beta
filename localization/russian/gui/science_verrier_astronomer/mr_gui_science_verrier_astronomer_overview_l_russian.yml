l_russian:
 MR_AUTOMATE_ASTRONOMER_TT: "#T Автоматизация действий [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')]#!\nЕсли вы включите автоматизацию, вам больше не придётся давать задания своему астроному.\nОн будет работать самостоятельно и выполнять наиболее целесообразные в данный момент задачи. Тем не менее вы по-прежнему будете получать некоторые события."
 mr_astronomy_automation_gui_tt: "Начать автоматизацию задач [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')]."
 mr_stop_astronomy_automation_gui_tt: "Остановить автоматизацию задач [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')]."
 MR_STOP_AUTOMATE_ASTRONOMER_TT: "#T Остановить автоматизацию действий [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')]#!\nДействия вашего астронома больше не будут автоматизированы."
 MR_ASTRONOMER_RANKING_BUTTON: "Астрономы"
 MR_RANKING_BY_ASTRONOMER: "Показать рейтинг всех [Concept('concept_verrier_astronomer', '#b #ORANGE астрономов#!#!')] в мире."
 ASTRONOMER_ASTRONOMER_RANKING_HEADER: "#V Рейтинг [Concept('concept_verrier_astronomer', '#b #ORANGE астрономов#!#!')] мира по [Concept('concept_academics_experience', 'опыту')]"
 MR_ASTRONOMY_MERIDIAN_LOC: "Меридиан: [GetPlayer.GetCustom('verrier_prime_meridian_city')|V]"
 MR_ASTRONOMY_MERIDIAN_TT: "#T Нулевой меридиан#!\nНулевой меридиан - это меридиан, используемый для всеобщего среднего времени.\nВ настоящее время нулевой меридиан проходит через: [GetPlayer.GetCustom('verrier_prime_meridian_city')|V]"