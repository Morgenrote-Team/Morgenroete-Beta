l_russian:
 MR_COMPOSER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'elgar_composer_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'elgar_composer_achievements_no_composer_loc')]"
 elgar_composer_achievements_loc: "$elgar_composer_achievements_intro_loc$[Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_virtuoso_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_conductor_type')]"
 elgar_composer_achievements_no_composer_loc: "Здесь будут отображаться достижения этого [Concept('concept_elgar_composer', '#b #PURPLE композитора#!#!')]#!, как только он у вас появится."
 elgar_composer_achievements_intro_loc: "#V Достижения этого композитора#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] — композитор с репутацией [Scope.Var('elgar_composer_experience').GetValue|V0]. К настоящему моменту [SelectLocalization(Scope.GetCharacter.IsFemale, 'она провела', 'он провёл')] [Scope.Var('elgar_composer_num_tours_var').GetValue|V0] гастрольных туров. Из [Scope.GetCharacter.GetHerHis] многочисленных работ особенно выделяются [Scope.Var('elgar_composer_num_compositions_var').GetValue|V0].#!"
 elgar_composer_achievement_is_composer_virtuoso_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] — великолепный #V виртуоз#!.#!"
 elgar_composer_achievement_is_composer_conductor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] считается знаменитым #V дирижёром#!.#!"