l_russian:
 MR_COMPOSER_ACHIEVEMENTS_TT: "[AddLocalizationIf( Scope.IsSet , 'elgar_composer_achievements_loc')][AddLocalizationIf( Not(Scope.IsSet) , 'elgar_composer_achievements_no_composer_loc')]"
 elgar_composer_achievements_loc: "$elgar_composer_achievements_intro_loc$[Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_virtuoso_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_is_composer_conductor_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_has_masterpiece_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_has_masterpiece_1_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_has_masterpiece_2_type')][Scope.GetCharacter.GetCustom('elgar_composer_achievement_has_masterpiece_3_type')]"
 elgar_composer_achievements_no_composer_loc: "Здесь будут отображаться достижения этого [Concept('concept_elgar_composer', '#b #PURPLE композитора#!#!')]#!, как только он у вас появится."
 elgar_composer_achievements_intro_loc: "#V Достижения этого композитора#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] — композитор с репутацией [Scope.Var('elgar_composer_experience').GetValue|V0].#!\n #indent_newline:3  К настоящему моменту [SelectLocalization(Scope.GetCharacter.IsFemale, 'она провела', 'он провёл')] [Scope.Var('elgar_composer_num_tours_var').GetValue|V0] гастрольных туров.#!\n #indent_newline:3  Из [Scope.GetCharacter.GetHerHis] многочисленных работ особенно выделяются [Scope.Var('elgar_composer_num_compositions_var').GetValue|V0].#!"
 elgar_composer_achievement_is_composer_virtuoso_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] — великолепный #V виртуоз#!.#!"
 elgar_composer_achievement_is_composer_conductor_loc: "\n #indent_newline:3 • [Scope.GetCharacter.GetSheHe|U] считается знаменитым #V дирижёром#!.#!"
 elgar_composer_achievement_has_masterpiece_loc: "\n • [Scope.GetCharacter.GetSheHe|U] [SelectLocalization(Scope.GetCharacter.IsFemale, 'создала', 'создал')] [Scope.Var('elgar_composer_num_masterworks_var').GetValue|V0] шедевров: #!"
 elgar_composer_achievement_masterwork_1_loc: "#indent_newline:6 \n • [Scope.Var('elgar_masterpiece_1_var').GetFlagName]#!"
 elgar_composer_achievement_masterwork_2_loc: "#indent_newline:6 \n • [Scope.Var('elgar_masterpiece_2_var').GetFlagName]#!"
 elgar_composer_achievement_masterwork_3_loc: "#indent_newline:6 \n • [Scope.Var('elgar_masterpiece_3_var').GetFlagName]#!"