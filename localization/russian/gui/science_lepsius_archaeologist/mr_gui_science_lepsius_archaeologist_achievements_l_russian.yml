 lepsius_archaeologist_achievement_expert_for_egyptian_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] является экспертом по #V египетской археологии#!, где [Scope.GetCharacter.GetSheHe] собраны [Scope.Var('lepsius_egyptian_artifact_minor_archaeologist_var').GetValue|0V] мелкие артефакты." #deepl:2806539652
 lepsius_archaeologist_achievement_expert_for_mesopotamian_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] является экспертом по #V археологии Месопотамии#!, где [Scope.GetCharacter.GetSheHe] собраны [Scope.Var('lepsius_mesopotamian_artifact_minor_archaeologist_var').GetValue|0V] мелкие артефакты." #deepl:4145665032
 lepsius_archaeologist_achievement_expert_for_aegean_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] является экспертом #V Эгейской археологии#!, где [Scope.GetCharacter.GetSheHe] собраны [Scope.Var('lepsius_aegean_artifact_minor_archaeologist_var').GetValue|0V] незначительные артефакты." #deepl:3137059405
 lepsius_archaeologist_achievement_expert_for_precolumbian_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] является экспертом по #V доколумбовой археологии#!, где [Scope.GetCharacter.GetSheHe] собраны [Scope.Var('lepsius_precolumbian_artifact_minor_archaeologist_var').GetValue|0V] незначительные артефакты." #deepl:1609585460
 lepsius_archaeologist_achievement_expert_for_fareastern_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] является экспертом по #V Общевосточной археологии#!, где [Scope.GetCharacter.GetSheHe] собраны [Scope.Var('lepsius_fareastern_artifact_minor_archaeologist_var').GetValue|0V] мелкие артефакты." #deepl:3392738081
 lepsius_archaeologist_achievement_expert_for_oceanic_archaeology_loc: "\n[Scope.GetCharacter.GetSheHe|U] является экспертом по #V океанической археологии#!, где [Scope.GetCharacter.GetSheHe] собраны [Scope.Var('lepsius_oceanic_artifact_minor_archaeologist_var').GetValue|0V] незначительные артефакты." #deepl:2787251010
 lepsius_archaeologist_achievement_not_expert_loc: ""
 lepsius_archaeologist_achievement_attended_exodus_congress_loc: "\n[Scope.GetCharacter.GetSheHe|U] посетил #V Археологический конгресс по историчности Исхода#!." #deepl:3946194799
 lepsius_archaeologist_achievement_attended_civilization_congress_loc: "\n[Scope.GetCharacter.GetSheHe|U] посетил #V Археологический конгресс по происхождению цивилизации#!." #deepl:395174587
 lepsius_archaeologist_achievement_attended_troy_congress_loc: "\n[Scope.GetCharacter.GetSheHe|U] посетил #V Археологический конгресс, посвященный историчности Трои.#!" #deepl:3218356213
 lepsius_archaeologist_achievement_invented_three_age_system_loc: "\nОдним из величайших достижений [Scope.GetCharacter.GetHerHis] является #V изобретение системы трех эпох#!, которая позволяет археологам классифицировать артефакты на периоды каменного, бронзового и железного веков." #deepl:3435944138
 lepsius_archaeologist_achievement_invented_early_archaeology_loc: "\Используя стратиграфические методы и тщательно документируя [Scope.GetCharacter.GetHerHis] находки, [Scope.GetCharacter.GetLastNameNoFormatting] #V  произвел революцию в археологии#! и превратил ее в настоящую науку." #deepl:1482092133
 lepsius_archaeologist_achievement_inaugurated_museum_loc: "#V \nД-р [Scope.GetCharacter.GetLastNameNoFormatting] сыграл важную роль в создании археологического музея#!, где [Scope.GetCharacter.GetSheHe] были выставлены все артефакты в достойном виде." #deepl:2255139215
 lepsius_archaeologist_achievement_new_methods_pompeii_loc: "\nПрофессор [Scope.GetCharacter.GetLastNameNoFormatting] разработал #V новый метод сохранения находок#! в Помпеях." #deepl:3277007049
 lepsius_archaeologist_achievement_discovered_teotihuacan_loc: "\nД-р [Scope.GetCharacter.GetLastNameNoFormatting] был центральной фигурой в #V реконструкции Храма Солнца в Теотиуакане#!." #deepl:715105555
 lepsius_archaeologist_achievement_discovered_harappa_loc: "\nПрофессор [Scope.GetCharacter.GetLastNameNoFormatting] #V  обнаружил цивилизацию долины Инда#! на месте Хараппы." #deepl:823513117
 lepsius_archaeologist_achievement_tomb_first_emperor_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] #V  обнаружил гробницу первого императора Цинь#!, которую охраняла терракотовая армия." #deepl:3326302787
 lepsius_archaeologist_achievement_discovered_tikal_loc: "\nПрофессор [Scope.GetCharacter.GetLastNameNoFormatting] #V  открыл город майя Тикаль#! в джунглях Гватемалы." #deepl:960255002
 lepsius_archaeologist_achievement_explored_petra_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] #V  исследовал город Петра#! в знойных пустынях Ближнего Востока." #deepl:230969931
 lepsius_archaeologist_achievement_found_sarcophagus_intact_loc: "\nНаходка #V Саркофага неизвестного фараона#! является одним из величайших достижений доктора [Scope.GetCharacter.GetLastNameNoFormatting]." #deepl:397069606
 lepsius_archaeologist_achievement_found_sarcophagus_broken_loc: "\nХотя доктор [Scope.GetCharacter.GetLastNameNoFormatting] обнаружил #V гробницу неизвестного фараона#!, это открытие было разрушено из-за того, что мумия фараона была уничтожена в результате несчастного случая." #deepl:4134291227
 lepsius_archaeologist_achievement_found_tutankhamun_loc: "\Важной вехой в карьере [Scope.GetCharacter.GetHerHis] стало обнаружение нетронутой гробницы #V фараона Тутанхамона#!." #deepl:830597516
 lepsius_archaeologist_achievement_found_ship_of_khufu_loc: "\nНаходка #V "Корабля Хуфу"#! навсегда увековечит имя доктора [Scope.GetCharacter.GetLastNameNoFormatting] в учебниках истории." #deepl:263837328
 lepsius_archaeologist_achievement_found_tower_of_babylon_loc: "\nВо время [Scope.GetCharacter.GetHerHis] пребывания в Месопотамии [Scope.GetCharacter.GetSheHe] была найдена #V Вавилонская башня#!, известная среди археологов как Зикуррат Этеменанки. Чудесная находка!" #deepl:3958757656
 lepsius_archaeologist_achievement_found_gardens_of_sennacherib_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting], пожалуй, единственный человек, который может похвастаться тем, что заново открыл одно из семи чудес света. #V |На самом деле,[Scope.GetCharacter.GetSheHe] нашел Висячие сады#!." #deepl:1376956218
 lepsius_archaeologist_achivement_found_treasury_of_atreus_loc: "\Конечно, для археолога все является сокровищем, но открытие доктора [Scope.GetCharacter.GetLastNameNoFormatting], несомненно, настоящее сокровище. #V  Сокровища Микен#! состояли из множества вещей, большинство из которых были сделаны из золота, например, золотые маски." #deepl:3793568389
 lepsius_archaeologist_achievement_found_tomb_of_pakal_loc: "\ #V Гробница Пакаля#!, которую обнаружил доктор [Scope.GetCharacter.GetLastNameNoFormatting], была очень впечатляющей. Впечатляет, как и должно быть для величайшего короля майя." #deepl:3301250790
 lepsius_archaeologist_achievement_raised_flag_on_pyramids_loc: "\nВо время работы в Египте [Scope.GetCharacter.GetSheHe] #V  поднял флаг на Великой пирамиде Гизы#!." #deepl:453060665
 lepsius_archaeologist_achievement_reconstructed_ishtar_gate_loc: "\nПрофессор [Scope.GetCharacter.GetLastNameNoFormatting] не только нашел #V ворота Иштар#!, но и восстановил их. Теперь они снова сияют во всей своей красе." #deepl:3899648836
 lepsius_archaeologist_achievement_found_lamassu_loc: "\nВ великом приключении, полном опасностей, [Scope.GetCharacter.GetSheHe] нашел величественного #V Ламассу#!." #deepl:1325115031
 lepsius_archaeologist_achievement_escaped_labyrinth_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] выбрался из #V мифического лабиринта#!, полного опасностей." #deepl:3205955848
 lepsius_archaeologist_achievement_survived_maya_pyramid_loc: "\nИногда археология опасна. #V Профессор [Scope.GetCharacter.GetLastNameNoFormatting] пережил свое путешествие по загадочной пирамиде майя#!, которое было больше приключением, чем археологией." #deepl:2309875301
 lepsius_archaeologist_achievement_found_vilcabamba_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] #V  заново открыл Вилакамбу#!, последнее убежище инков." #deepl:1401010459
 lepsius_archaeologist_achievement_discovered_nazca_loc: "\n[Scope.GetCharacter.GetSheHe|U] #V  обнаружил в пустыне Наска#! огромные рисунки, которые действительно видны только с неба." #deepl:3398521121
 lepsius_archaeologist_achievement_dinosaur_myth_loc: "\nДоктор [Scope.GetCharacter.GetLastNameNoFormatting] подвергается насмешкам со стороны научного сообщества. Он утверждает, что участников его #V экспедиции съели динозавры#!. Является ли это утверждение нелепым или правдой?" #deepl:491140794
 lepsius_archaeologist_achievement_photo_evidence_independent_loc: "\nПрофессор [Scope.GetCharacter.GetLastNameNoFormatting] предоставил фотографические доказательства #V живых динозавров#!, хотя никто не верил [Scope.GetCharacter.GetHerHim]." #deepl:1970351488
 lepsius_archaeologist_achievement_photo_support_loc: "\n При поддержке правительства профессор [Scope.GetCharacter.GetLastNameNoFormatting] смог предоставить фотографические доказательства #V живых динозавров#!, хотя до этого его высмеивали." #deepl:278106961
