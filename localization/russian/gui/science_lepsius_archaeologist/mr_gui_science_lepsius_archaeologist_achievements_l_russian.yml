psius_archaeologist_achievement_found_tomb_of_pakal_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_raised_flag_on_pyramids_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_raised_flag_on_pyramids_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_reconstructed_ishtar_gate_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_reconstructed_ishtar_gate_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_lamassu_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_lamassu_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_escaped_labyrinth_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_escaped_labyrinth_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_survived_maya_pyramid_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_survived_maya_pyramid_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_found_vilcabamba_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_found_vilcabamba_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_discovered_nazca_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_discovered_nazca_var').GetFlagName)][AddLocalizationIf( Scope.Var('lepsius_archaeologist_achievement_lost_world_var').IsSet , Scope.Var('lepsius_archaeologist_achievement_lost_world_var').GetFlagName)]"
 lepsius_archaeologist_no_archaeologist_loc: "Здесь будут отображаться #V достижения этого [Concept('concept_lepsius_archaeologist', '#b #BLUE археолога#!#!')]#!, как только он у вас появится."
 lepsius_archaeologist_achievements_intro_loc: "#V Достижения этого археолога#!\n #indent_newline:3 • [Scope.GetCharacter.GetFullName] - [Scope.GetCharacter.GetCustom('lepsius_archaeologist_experience_level_type')]. [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она собрала', 'Он собрал')] в общей сложности [Scope.Var('lepsius_total_artifact_minor_archaeologist_var').GetValue|0+] [Concept('concept_lepsius_artifact', 'малых артефактов')].#!"
 lepsius_archaeologist_achievement_famous_level_archaeologist_overview_loc: "знаменитый [concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_experienced_level_archaeologist_overview_loc: "опытный [concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_normal_level_archaeologist_overview_loc: "успешный [concept_lepsius_archaeologist]"
 lepsius_archaeologist_achievement_expert_for_egyptian_archaeology_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] - эксперт в области #V египетской археологии#!, откуда [SelectLocalization(Scope.GetCharacter.IsFemale, 'она привезла', 'он привёз')] [Scope.Var('lepsius_egyptian_artifact_minor_archaeologist_var').GetValue|0V] малых артефактов.#!"
 lepsius_archaeologist_achievement_expert_for_mesopotamian_archaeology_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] - эксперт в области #V месопотамской археологии#!, откуда [SelectLocalization(Scope.GetCharacter.IsFemale, 'она привезла', 'он привёз')] [Scope.Var('lepsius_mesopotamian_artifact_minor_archaeologist_var').GetValue|0V] малых артефактов.#!"
 lepsius_archaeologist_achievement_expert_for_aegean_archaeology_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] - эксперт в области #V эгейской археологии#!, откуда [SelectLocalization(Scope.GetCharacter.IsFemale, 'она привезла', 'он привёз')] [Scope.Var('lepsius_aegean_artifact_minor_archaeologist_var').GetValue|0V] малых артефактов.#!"
 lepsius_archaeologist_achievement_expert_for_precolumbian_archaeology_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] - эксперт в области #V доколумбовой археологии#!, откуда [SelectLocalization(Scope.GetCharacter.IsFemale, 'она привезла', 'он привёз')] [Scope.Var('lepsius_precolumbian_artifact_minor_archaeologist_var').GetValue|0V] малых артефактов.#!"
 lepsius_archaeologist_achievement_expert_for_fareastern_archaeology_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] - эксперт в области #V дальневосточной археологии#!, откуда [SelectLocalization(Scope.GetCharacter.IsFemale, 'она привезла', 'он привёз')] [Scope.Var('lepsius_fareastern_artifact_minor_archaeologist_var').GetValue|0V] малых артефактов.#!"
 lepsius_archaeologist_achievement_expert_for_oceanic_archaeology_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] - эксперт в области #V океанийской археологии#!, откуда [SelectLocalization(Scope.GetCharacter.IsFemale, 'она привезла', 'он привёз')] [Scope.Var('lepsius_oceanic_artifact_minor_archaeologist_var').GetValue|0V] малых артефактов.#!"
 lepsius_archaeologist_achievement_not_expert_loc: ""
 lepsius_archaeologist_achievement_attended_exodus_congress_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] [SelectLocalization(Scope.GetCharacter.IsFemale, 'посетила', 'посетил')] #V Археологический конгресс по историчности Исхода#!.#!"
 lepsius_archaeologist_achievement_attended_civilization_congress_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] [SelectLocalization(Scope.GetCharacter.IsFemale, 'посетила', 'посетил')] #V Археологический конгресс о происхождении цивилизации#!.#!"
 lepsius_archaeologist_achievement_attended_troy_congress_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] [SelectLocalization(Scope.GetCharacter.IsFemale, 'посетила', 'посетил')] #V Археологический конгресс по историчности Трои#!.#!"
 lepsius_archaeologist_achievement_invented_three_age_system_loc: "\n #indent_newline:3 • Одно из величайших [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] достижений - #V создание системы трёх веков#!, которая позволяет археологам классифицировать артефакты по каменному, бронзовому и железному векам.#!"
 lepsius_archaeologist_achievement_invented_early_archaeology_loc: "\n #indent_newline:3 • Используя стратиграфические методы и тщательно документируя свои находки, [Scope.GetCharacter.GetLastNameNoFormatting] #V [SelectLocalization(Scope.GetCharacter.IsFemale, 'произвела', 'произвёл')] революцию в археологии#!, превратив её в настоящую науку.#!"
 lepsius_archaeologist_achievement_inaugurated_museum_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'сыграла', 'сыграл')] ключевую роль в #V создании Археологического музея#!, где [SelectLocalization(Scope.GetCharacter.IsFemale, 'она', 'он')] грамотно [SelectLocalization(Scope.GetCharacter.IsFemale, 'разместила', 'разместил')] все артефакты.#!"
 lepsius_archaeologist_achievement_new_methods_pompeii_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'разработала', 'разработал')] в Помпеях #V новые методы сохранения находок#!.#!"
 lepsius_archaeologist_achievement_discovered_teotihuacan_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'была', 'был')] центральной фигурой в #V реконструкции Храма Солнца в Теотиуакане#!.#!"
 lepsius_archaeologist_achievement_discovered_harappa_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] #V [SelectLocalization(Scope.GetCharacter.IsFemale, 'открыла', 'открыл')] Индскую цивилизацию#! на месте раскопок в Хараппе.#!"
 lepsius_archaeologist_achievement_tomb_first_emperor_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V [SelectLocalization(Scope.GetCharacter.IsFemale, 'обнаружила', 'обнаружил')] гробницу первого императора Цинь#!, охраняемую Терракотовой армией.#!"
 lepsius_archaeologist_achievement_discovered_tikal_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] #V [SelectLocalization(Scope.GetCharacter.IsFemale, 'открыла', 'открыл')] город майя Тикаль#! в джунглях Гватемалы.#!"
 lepsius_archaeologist_achievement_explored_petra_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V [SelectLocalization(Scope.GetCharacter.IsFemale, 'исследовала', 'исследовал')] Петру#! в раскалённых пустынях Ближнего Востока.#!"
 lepsius_archaeologist_achievement_found_sarcophagus_intact_loc: "\n #indent_newline:3 • Открытие #V саркофага неизвестного фараона#! - одно из величайших достижений доктора [Scope.GetCharacter.GetLastNameNoFormatting].#!"
 lepsius_archaeologist_achievement_found_sarcophagus_broken_loc: "\n #indent_newline:3 • Хотя доктор [Scope.GetCharacter.GetLastNameNoFormatting] и [SelectLocalization(Scope.GetCharacter.IsFemale, 'открыла', 'открыл')] #V гробницу неизвестного фараона#!, это открытие было омрачено уничтожением мумии фараона в результате несчастного случая.#!"
 lepsius_archaeologist_achievement_found_tutankhamun_loc: "\n #indent_newline:3 • Важной вехой в [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] карьере стало открытие нетронутой гробницы #V фараона Тутанхамона#!.#!"
 lepsius_archaeologist_achievement_found_ship_of_khufu_loc: "\n #indent_newline:3 • Благодаря открытию #V ладьи Хуфу#! имя доктора [Scope.GetCharacter.GetLastNameNoFormatting] навсегда войдёт в учебники истории.#!"
 lepsius_archaeologist_achievement_found_tower_of_babylon_loc: "\n #indent_newline:3 • Во время пребывания в Месопотамии [SelectLocalization(Scope.GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(Scope.GetCharacter.IsFemale, 'нашла', 'нашёл')] #V Вавилонскую башню#!, известную среди археологов как зиккурат Этеменанки. Изумительная находка!#!"
 lepsius_archaeologist_achievement_found_gardens_of_sennacherib_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting], вероятно, единственный человек, который может похвастаться тем, что заново открыл одно из семи чудес света. [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] действительно [SelectLocalization(Scope.GetCharacter.IsFemale, 'нашла', 'нашёл')] #V Висячие сады#!.#!"
 lepsius_archaeologist_achievement_found_tomb_of_pakal_loc: "\n #indent_newline:3 • #V Гробница Пакаля#!, которую [SelectLocalization(Scope.GetCharacter.IsFemale, 'обнаружила', 'обнаружил')] доктор [Scope.GetCharacter.GetLastNameNoFormatting], была очень впечатляющей. Настолько впечатляющей, какой и должна быть гробница величайшего царя майя.#!"
 lepsius_archaeologist_achievement_raised_flag_on_pyramids_loc: "\n #indent_newline:3 • Работая в Египте, [SelectLocalization(Scope.GetCharacter.IsFemale, 'она', 'он')] #V [SelectLocalization(Scope.GetCharacter.IsFemale, 'водрузила', 'водрузил')] флаг на Великую пирамиду в Гизе#!.#!"
 lepsius_archaeologist_achievement_reconstructed_ishtar_gate_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] не только [SelectLocalization(Scope.GetCharacter.IsFemale, 'нашла', 'нашёл')] #V ворота Иштар#!, но и [SelectLocalization(Scope.GetCharacter.IsFemale, 'реконструировала', 'реконструировал')] их. Теперь они снова сияют во всём своём великолепии.#!"
 lepsius_archaeologist_achievement_found_lamassu_loc: "\n #indent_newline:3 • В великом, полном опасностей приключении [SelectLocalization(Scope.GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(Scope.GetCharacter.IsFemale, 'нашла', 'нашёл')] величественного #V Ламассу#!.#!"
 lepsius_archaeologist_achievement_escaped_labyrinth_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'сбежала', 'сбежал')] из полного опасностей #V мифического лабиринта#!.#!"
 lepsius_archaeologist_achievement_survived_maya_pyramid_loc: "\n #indent_newline:3 • Иногда археология бывает опасной. Профессор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'выжила', 'выжил')] в путешествии по таинственной #V пирамиде майя#!, которое было больше похоже на приключение, чем на археологию.#!"
 lepsius_archaeologist_achievement_found_vilcabamba_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V заново [SelectLocalization(Scope.GetCharacter.IsFemale, 'открыла', 'открыл')] Вилькабамбу#! - последнее убежище инков.#!"
 lepsius_archaeologist_achievement_discovered_nazca_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] #V [SelectLocalization(Scope.GetCharacter.IsFemale, 'нашла', 'нашёл')] в пустыне Наска огромные рисунки#!, которые по-настоящему видны только с неба.#!"
 lepsius_archaeologist_achievement_dinosaur_myth_loc: "\n #indent_newline:3 •  Доктор [Scope.GetCharacter.GetLastNameNoFormatting] высмеивается научным сообществом. [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] утверждает, что #V членов [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] экспедиции съели динозавры#!. Это заявление смехотворно или это правда?#!"
 lepsius_archaeologist_achievement_photo_evidence_independent_loc: "\n #indent_newline:3 • Профессор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'предоставила', 'предоставил')] фотодоказательства существования #V живых динозавров#!, хотя [SelectLocalization(Scope.GetCharacter.IsFemale, 'ей', 'ему')] никто не верил.#!"
 lepsius_archaeologist_achievement_photo_support_loc: "\n #indent_newline:3 • При поддержке правительства профессор [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'смогла', 'смог')] предоставить фотодоказательства существования #V живых динозавров#!, хотя до этого [SelectLocalization(Scope.GetCharacter.IsFemale, 'её', 'его')] высмеивали.#!"
 lepsius_archaeologist_achievement_discovered_cliff_loc: "\n #indent_newline:3 • [SelectLocalization(Scope.GetCharacter.IsFemale, 'Она', 'Он')] #V [SelectLocalization(Scope.GetCharacter.IsFemale, 'открыла', 'открыл')] Скальный дворец#! народа пуэбло.#!"
 lepsius_archaeologist_achievement_restored_angkor_loc: "\n #indent_newline:3 • Доктор [Scope.GetCharacter.GetLastNameNoFormatting] #V [SelectLocalization(Scope.GetCharacter.IsFemale, 'восстановила', 'восстановил')] город Ангкор#! в джунглях Камбоджи.#!"
 lepsius_archaeologist_achievement_found_treasury_of_atreus_loc: "\n #indent_newline:3 • Конечно, для археолога всё является сокровищем, но д-р [Scope.GetCharacter.GetLastNameNoFormatting] действительно нашёл настоящее сокровище. #V Сокровища Микен#! состояли из множества предметов, большинство из которых, включая золотые маски, было сделано из золота.#!"
 lepsius_archaeologist_achievement_discovered_persepolis_loc: "\n #indent_newline:3 • Д-р [Scope.GetCharacter.GetLastNameNoFormatting] [SelectLocalization(Scope.GetCharacter.IsFemale, 'руководила', 'руководил')] #V первыми современными раскопками Персеполя#!.#!"