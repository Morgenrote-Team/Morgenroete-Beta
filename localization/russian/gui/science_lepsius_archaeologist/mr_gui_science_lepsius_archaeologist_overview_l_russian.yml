 MR_BAN_ARTIFACT_EXPORT_BUTTON: "Запретить вывоз артефактов"
 MR_BAN_ARTIFACT_EXPORT_BUTTON_TT: "#T Запретить вывоз артефактов#!\nВводя запрет на вывоз артефактов, мы ясно даём понять, что предпочитаем оставить наши археологические сокровища в земле, а не рисковать тем, что иностранцы раскопают и вывезут их. Из принципа мы не будем выдавать никаких лицензий на раскопки.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALLOW_ARTIFACT_EXPORT_BUTTON: "Разрешить вывоз артефактов"
 MR_ALLOW_ARTIFACT_EXPORT_BUTTON_TT: "#T Разрешить вывоз артефактов#!\nРазрешив вывоз артефактов, мы сможем получить приятный дополнительный доход.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"