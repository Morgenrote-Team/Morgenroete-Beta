 custom_animal_documentation_topic_1: "Детальное исследование брачных ритуалов и демонстраций ухаживания животного."
 custom_animal_documentation_topic_2: "Автор делится яркими рассказами о личных встречах с этим существом в его естественной среде обитания."
 custom_animal_documentation_topic_3: "Богато иллюстрированная книга оживляет мир животного в ярких красках."
 custom_animal_documentation_topic_4: "Острая критика влияния современного общества на сокращающуюся среду обитания животного."
 custom_animal_documentation_topic_5: "Углублённый взгляд на пищевые привычки и предпочитаемый рацион животного."
 custom_animal_documentation_topic_6: "Учёные относятся к работе с иронией, находя её подход нетрадиционным."
 custom_animal_documentation_topic_7: "Пресса высоко оценила книгу за её проницательность и увлекательное повествование."
 custom_animal_documentation_topic_8: "Книга предлагает исчерпывающий отчёт о повседневной жизни и поведении животного."
 custom_animal_documentation_topic_9: "Искренняя дань уважения, книга выражает глубокую привязанность к животному."
 custom_animal_documentation_topic_10: "Эта работа представляет собой широкий обзор природы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
