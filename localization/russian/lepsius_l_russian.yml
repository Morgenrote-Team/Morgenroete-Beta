 andersson_anthropologist_achievement_completed_heidelbergensis_anthropologist_loc: "По нескольким ископаемым останкам, благодаря современным инструментам и собственному несравненному гению, профессор [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastNameNoFormatting] [SelectLocalization(GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'первой', 'первым')] [SelectLocalization(GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'классифицировала', 'классифицировал')] #o Homo Heidelbergensis#!."
