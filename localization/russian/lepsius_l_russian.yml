 lepsius_state_trait_persepolis: "Персеполь - жемчужина Ахеменидской империи\n#G +1#! @lepsius_local_minor! местный артефакт за археологические проекты"
 je_lepsius_persepolis: "Жемчужина Ахеменидской империи"
 je_lepsius_persepolis_reason: "Персеполь прославляли уже древние писатели и историки. Это место, веками привлекавшее путешественников издалека, никогда по-настоящему не было потеряно - не в последнюю очередь благодаря мифу об Александре Великом, избравшем целью эту древнюю столицу Персидской империи. Однако современные раскопки всё ещё ждут своего часа."
 lepsius.69.t: "Персеполь"
 lepsius.69.d: "Прошло почти два с половиной тысячелетия с тех пор, как войска Александра разрушили великолепный Персеполь, но [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] вместе со своей командой работает над тем, чтобы спасти то, что ещё можно спасти, вернуть то, что ещё можно вернуть, и понять то, что ещё можно понять. Наконец, после всех грабежей и разрушений, город может стать предметом научного исследования."
 lepsius.69.f: "«Персеполь был столицей Персидского царства. Александр описал его македонянам как самый ненавистный из городов Азии и отдал своим воинам на разграбление всё, кроме дворцов. Это был богатейший город под солнцем, а частные дома за многие годы были наполнены всякого рода богатствами. Македоняне ворвались туда, убивая всех мужчин, которых встречали, и грабя жилища; многие дома принадлежали простым людям и были обильно снабжены мебелью и одеждой всякого рода».\n - Диодор Сицилийский"
 lepsius.2271.t: "Подвески тайрона"
 lepsius.2271.d: "Местные археологические раскопки обнаружили ценные золотые подвески. Д-р [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] уже подробно [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'изучила', 'изучил')] эти исключительные изделия и считает их шедеврами доколумбового искусства."
 lepsius.2271.f: "Тайрона были высокоразвитой доколумбовой цивилизацией в Сьерра-Невада-де-Санта-Марта на территории современной Колумбии. Прославившись выдающимися инженерными навыками, они преодолевали крутой рельеф, сооружая сложные каменные террасы, дренажные системы и мощёные дороги. Их общество было организовано в соперничающие вождества, такие как Бонда и Посигуэйка, духовно объединённые влиятельной жреческой кастой. Тайрона знамениты своим «потерянным золотом» - изысканными золотыми изделиями в технике тумбага, часто изображавшими шаманские превращения и почитаемого ягуара."
 lepsius.2271.g: "Колумбия полна археологических сокровищ!"
 lepsius.2272.t: "Статуя Сан-Агустина"
 lepsius.2272.d: "В южной Колумбии фермеры сообщили о заброшенном месте, где, как утверждают, находится несколько загадочных статуй. Археологическая команда внимательно изучила одну из этих таинственных фигур."
 lepsius.2272.f: "Загадочная культура Сан-Агустина оставила после себя один из важнейших археологических памятников Южной Америки в колумбийском высокогорье. Между 200 годом до н.э. и 800 годом н.э. неизвестные скульпторы создали более 500 монументальных статуй из вулканической породы, разбросанных по обширному горному ландшафту. Эти скульптуры, некоторые из которых превышают четыре метра в высоту, охраняют монументальные погребальные места и церемониальные центры. Изображения часто антропозооморфны: человеческие черты сливаются с зубами хищников, орлиными когтями или змеиными атрибутами, что указывает на глубоко укоренённый шаманизм и культ предков. Особенно примечательны изображения «двойного я», где одна фигура несёт другую на спине. Поскольку эта культура исчезла за века до прихода испанцев и не оставила письменных источников, каменные стражи таких мест, как Боске-де-лас-Эстатуас, остаются загадкой андской археологии."
 lepsius.2272.g: "Культура, оставляющая так много вопросов без ответа!"
 lepsius.2273.t: "Артефакты зену"
 lepsius.2273.d: "Археологические исследования обнаружили несколько предметов повседневного обихода культуры зену и сообщили об этом музею в [ROOT.GetCountry.GetCapital.GetCityHubName]."
 lepsius.2273.f: "Народ зену (или сину) процветал в плодородных низинах и речных долинах северной Колумбии. Его долговечное наследие - монументальная система управления водными ресурсами: на протяжении веков зену создали обширную сеть искусственных каналов, которые контролируемо осушали более 500 000 гектаров земли и тем самым позволяли вести интенсивное земледелие в регионе, подверженном наводнениям. Социально они делились на три провинции, каждая из которых специализировалась на производстве, религии и погребальных обрядах. Их мастерство проявлялось в тонкой работе по золоту - главным образом в форме водных и наземных животных, - а также в ткачестве. Традиция сомбреро вуэльтиао, ныне национального символа Колумбии, восходит к плетению корзин зену."
 lepsius.2273.g: "Народ великих ремесленников."
 lepsius.2274.t: "Золото муисков"
 lepsius.2274.d: "Д-р [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] с восторгом рассказывает о кладе, который [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] вместе с командой недавно [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] в Андах. В нём было несколько ценных артефактов. [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'Она абсолютно уверена', 'Он абсолютно уверен')]: эти сокровища когда-то принадлежали легендарным муискам."
 lepsius.2274.f: "Муиски (или чибча) населяли прохладные нагорья Анд на территории современной центральной Колумбии. Вместе с инками, майя и ацтеками они образовывали одну из четырёх наиболее развитых цивилизаций Америки, хотя и избегали монументальной каменной архитектуры в пользу дерева и соломы. Политически их территория была организована в Конфедерацию муисков, возглавляемую сипой (Баката) и саке (Хунза). Их экономика опиралась на широкую торговую сеть соли, изумрудов и тканей. Мировую известность им принесла легенда об Эльдорадо: при вступлении нового правителя на престол он ритуально покрывал себя золотом и приносил золотые фигурки (тунхо) в жертву в озере Гуатавита. Эти великолепные произведения золотых дел мастеров служили не валютой, а духовными подношениями."
 lepsius.2274.g: "Крошечный отблеск золота, некогда утраченного..."
 lepsius.550.tt: "Специализация на эгейской археологии может раскрыть эту тайну."
 lepsius.550.t: "Таинственный минойский дворец"
 lepsius.550.d: "Во время экспедиции д-р [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] неподалёку от Кносса руины, которые, по-видимому, ещё никто не каталогизировал."
 lepsius.550.f: "Разумеется, от прежнего комплекса остались лишь очень скромные следы. Археологи предполагают, что большая часть дворца может находиться под землёй. Однако для этого потребовался бы масштабный проект раскопок, невозможный в рамках общей экспедиции. Д-р [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] решает в будущем подробно изучить и исследовать это место."
 lepsius.550.g: "Какие тайны могут скрываться в этом дворце?"
 je_lepsius_mysterious_minoan_palace: "Таинственный минойский дворец"
 je_lepsius_mysterious_minoan_palace_reason: "Во время экспедиции наша археологическая команда обнаружила таинственный дворец близ Кносса. Чтобы раскрыть его тайны, раскопки требуют значительной специализации на эгейской археологии."
 je_lepsius_the_labyrinth_fail: "Если д-р [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] будет слишком часто теряться, есть риск, что с [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'ней', 'ним')] случится нечто очень, очень плохое..."
 je_lepsius_the_labyrinth_success: "Д-р [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] выберется из лабиринта, не заблудившись слишком сильно."
 lepsius_labyrinth_progress_bar: "Прогресс"
 lepsius_labyrinth_progress_bar_desc: "Прогресс в лабиринте: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|1%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/4)"
 lepsius_labyrinth_confusion_bar: "Смятение"
 lepsius_labyrinth_confusion_bar_desc: "Смятение в лабиринте: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|1%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/4)"
 lepsius.2241.t: "Кхмерский храм"
 lepsius.2241.d: "Местная археологическая экспедиция в области [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName], которой руководит д-р [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], обнаружила прежде неизвестный храм времён Ангкорской империи!"
 lepsius.2241.f: "Архитектура Кхмерской империи, достигшая расцвета между IX и XIII веками, прежде всего характеризовалась типом храма-горы. Эти сооружения из песчаника строились как воплощение горы Меру, мифической обители богов. Архитекторы использовали сложные ложные своды для создания протяжённых галерейных оград, часто окружённых огромными рвами, символизировавшими космический океан. Эстетику определяли прасат, или башня в форме бутона лотоса, и барельефы, превращавшие каменные стены в повествовательные полотна индуистской мифологии и имперской истории. Как видно на примере знаменитого Ангкор-Вата, этот стиль достиг совершенного равновесия симметрии, огромного масштаба и тончайшей детализации."
 lepsius.2241.g: "Поразительно."
 lepsius.2242.t: "Кхмерские скульптуры"
 lepsius.2242.d: "В джунглях д-р [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'обнаружила', 'обнаружил')] несколько великолепных кхмерских статуй, чья изысканная эстетика впечатлила многих коллег-археологов. Однако всё ещё нет согласия, как с ними поступить..."
 lepsius.2242.f: "Кхмерская скульптура периода Ангкора славится переходом от индуистской иконографии к самобытной локальной эстетике, подчёркивающей безмятежность и духовную власть. В отличие от динамичных поз индийского искусства, кхмерские статуи отличаются иератической неподвижностью и ощущением монументальной постоянности. Ранние произведения часто изображали индуистских божеств, таких как Вишну и Шива, с мощными атлетическими телами. Однако «стиль Ангкор-Вата» ввёл более утончённые пропорции и сложные украшения. К концу XII века при царе Джаявармане VII акцент сместился к буддизму махаяны. Эта эпоха породила знаменитый «стиль Байон», известный «улыбкой Ангкора» - выражением лица с закрытыми глазами и слегка приподнятыми уголками губ, символизирующим внутренний покой и отстранённое просветление."
 lepsius.2242.g: "Д-р [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'должна', 'должен')] тщательно осмотреть и изучить статуи."
 lepsius.2242.h: "Д-р [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'должна', 'должен')] распилить статуи и отправить их в музей."
 lepsius.2243.t: "Кхмерские артефакты"
 lepsius.2243.d: "Археологическая команда в области [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] нашла клад артефактов времён Ангкорской империи. Д-р [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'обеспечила сохранность', 'обеспечил сохранность')] бронзовых сосудов и керамики."
 lepsius.2243.f: "Хотя в рассказах о кхмерах доминируют монументальная архитектура и скульптура, их ремесленники превосходно работали в самых разных материалах. Бронзовое литьё было вершиной их металлургического мастерства: используя технику утраченного воска, мастера создавали сложные ритуальные сосуды, детали паланкинов и колокола, часто украшенные тонкими растительными мотивами или мифическими существами вроде Гаруды. Не менее важную роль играла керамика, особенно характерная каменная посуда с «коричневой глазурью», производившаяся в провинциальных печах. Эти сосуды, часто имевшие форму животных, таких как слоны или совы, служили ёмкостями для извести, использовавшейся при жевании бетеля, или для хранения драгоценных масел. Кроме того, кхмеры были мастерами ювелирного дела и работы по золоту, куя тяжёлые ожерелья, браслеты и тиары из чеканного золота для украшения как царских особ, так и деревянных культовых образов."
 lepsius.2243.g: "Новые экспонаты для нашего музея."
 lepsius.2244.t: "История кхмеров"
 lepsius.2244.d: "Д-р [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'собрала', 'собрал')] накопленные знания о Кхмерской империи Ангкора в монографию. Книга уже считается стандартным трудом."
 lepsius.2244.f: "Кхмерская, или Ангкорская, империя возникла в начале IX века как господствующая сила Юго-Восточной Азии, охватывавшая большую часть современной Камбоджи, Таиланда, Лаоса и Вьетнама. Основанная в 802 году н.э. Джаяварманом II, провозгласившим себя «вселенским монархом» (чакравартином), империя объединила разрозненные княжества благодаря сложному сочетанию индуистско-буддийской царской власти и развитой гидротехники. Процветание империи опиралось на сложную систему бараев (водохранилищ) и каналов, позволявшую вести интенсивное выращивание риса и поддерживать огромное население. На пике в XII веке кхмеры достигли художественного и политического расцвета, строя монументальные столицы вроде Ангкор-Тхома. Однако к XIV-XV векам империя пришла в упадок из-за сочетания экологического кризиса, подъёма могущественных тайских царств и смещения торговых путей, что в итоге привело к заброшенности Ангкора."
 lepsius.2244.g: "Этой книге место в Национальной библиотеке."
 lepsius.2251.t: "Клад аксумских монет"
 lepsius.2251.d: "Местные археологические раскопки в области [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] обнаружили богатый клад монет поздней античности - удалось сохранить римские и аксумские монеты."
 lepsius.2251.f: "Чеканка монет была введена в Аксумской империи около 270 года н. э. при царе Эндубисе. Аксум стал первым крупным государством Африки к югу от Сахары, чеканившим собственную валюту, выпуская монеты из золота, серебра и бронзы. Эти выпуски предназначались для облегчения международной торговли, особенно с Римом и Византией, и часто содержали греческие надписи - лингва-франка торговли Красного моря. Ранние выпуски изображали традиционные политеистические символы, такие как полумесяц и диск, тогда как монеты, чеканившиеся после обращения царя Эзаны в IV веке, заметно выделяли христианский крест."
 lepsius.2251.g: "Это порадует нумизматов."
 lepsius.2252.t: "Аксумский дворец"
 lepsius.2252.d: "Д-р [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] и команда недавно смогли кропотливо раскрыть фундаменты огромного дворцового комплекса, несомненно относящегося к периоду Аксумской империи."
 lepsius.2252.f: "Дворцовая архитектура Аксумской империи характеризуется массивными многоэтажными павильонами, возведёнными на приподнятых каменных платформах. Самый известный пример - Дунгур в Аксуме, так называемый дворец царицы Савской. Архитектурно эти дворцы использовали характерную технику «обезьяньих голов»: горизонтальные деревянные балки встраивались в каменные стены для усиления конструкции, а их выступающие концы создавали ритмичный внешний рисунок. Фундаменты строились из тонко обработанных гранитных блоков и часто имели утопленные стены, добавлявшие эстетическую глубину и устойчивость."
 lepsius.2252.g: "Дворцы, достойные царя Соломона!"
 lepsius.2253.t: "Геэзская литература"
 lepsius.2253.d: "Д-р [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'смогла', 'смог')] приобрести для музея ценное письменное произведение древней Аксумской империи."
 lepsius.2253.f: "Литература Аксумской империи неразрывно связана с введением христианства и развитием геэза, уникальной южносемитской письменности. Хотя ранние аксумские надписи на каменных памятниках часто были многоязычными и использовали греческий и сабейский языки, империя в итоге сформировала богатую местную литературную традицию, сосредоточенную на религиозных и царских текстах. Самым значительным литературным начинанием стал перевод Библии и различных апокрифических текстов с греческого на геэз в V-VI веках. Такие произведения, как Евангелия Гаримы с потрясающими миниатюрами, представляют собой одни из древнейших христианских рукописей мира."
 lepsius.2253.g: "Драгоценное письменное произведение!"
 lepsius.2254.t: "История Аксума"
 lepsius.2254.d: "Д-р [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'собрала', 'собрал')] накопленные знания об Аксумской империи в монографию. Книга уже считается стандартным трудом."
 lepsius.2254.f: "Аксумская империя (ок. 100-940 гг. н.э.) возникла в нагорьях современных Эфиопии и Эритреи, превратившись в одну из четырёх великих держав древнего мира наряду с Римом, Персией и Китаем. Её процветание строилось на стратегическом контроле над торговыми путями Красного моря, связывавшими Римскую империю с Индией. Через порт Адулис Аксум экспортировал золото, слоновую кость и изумруды, импортируя шёлк и пряности. При царе Эзане в IV веке Аксум достиг политического расцвета и стал одной из первых крупных империй, принявших христианство как государственную религию. Этот переход глубоко повлиял на искусство, архитектуру и развитие письменности геэз. Однако к VII веку подъём исламских халифатов сместил торговые пути и изолировал империю. Экологическая деградация и внутренние беспорядки в конечном счёте привели к её упадку, хотя её культурное и религиозное наследие остаётся основой современного эфиопского государства."
 lepsius.2254.g: "Этой книге место в Национальной библиотеке."
 lepsius.2261.t: "Миссисипские статуэтки"
 lepsius.2261.d: "Сегодня д-р [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'представила', 'представил')] прессе искусные статуэтки, демонстрирующие творчество коренных народов Америки миссисипской культуры. Они были найдены в области [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]."
 lepsius.2261.f: "Миссисипские каменные статуи, датируемые приблизительно 800-1500 годами н.э., представляют собой вершину доисторического североамериканского фигуративного искусства. Вырезанные главным образом из плавикового шпата, песчаника или боксита, эти антропоморфные фигуры занимали центральное место в культах предков Юго-восточного церемониального комплекса. Обычно статуи находят парами в храмово-погребальных комплексах на вершинах земляных курганов; они изображают сидящих или стоящих на коленях мужчин и женщин. Их отличает монументальная неподвижность, жёсткие позы, стилизованные причёски (например, «верхний узел») и спокойные, стоические выражения лиц. Считается, что эти фигуры воплощали духов высокопоставленных предков или основателей родов."
 lepsius.2261.g: "Собрать как можно больше."
 lepsius.2262.t: "Миссисипский курган"
 lepsius.2262.d: "Археологи обнаружили массивный курган, почти не уступающий по размерам известным сооружениям майя и ацтеков. Д-р [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'была немедленно вызвана', 'был немедленно вызван')], чтобы подробнее исследовать этот захватывающий остаток миссисипской культуры."
 lepsius.2262.f: "Определяющей чертой миссисипской культуры является строительство массивных земляных курганов, превративших поймы американского Среднего Запада и Юго-Востока в сложные городские ландшафты. В отличие от конических погребальных курганов более ранних периодов, миссисипские курганы обычно были пирамидами с плоской вершиной, или платформенными курганами, предназначенными для размещения деревянных храмов, домов советов или жилищ элитных «солнечных» божеств. Построенные вручную с помощью корзин земли, эти сооружения служили церемониальным и политическим сердцем вождеств. Самый известный пример, Монашеский курган в Кахокии, поднимается на 30 метров и занимает более 5 гектаров, соперничая с Великой пирамидой Гизы по площади основания."
 lepsius.2262.g: "Пирамиды из грязи!"
 lepsius.2263.t: "Миссисипская керамика"
 lepsius.2263.d: "Местные раскопки в области [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] обнаружили керамический клад, датируемый концом I тысячелетия до н.э. и, по-видимому, связанный с городской культурой миссисипской традиции."
 lepsius.2263.f: "Миссисипская керамика прежде всего отличалась использованием измельчённых раковин моллюсков в качестве отощающей добавки. Это новшество позволило гончарам создавать более тонкие, прочные стенки и более сложные формы, чем прежние методы с добавлением минеральной крошки. Керамика славится разнообразием форм, включая кувшины с капюшоновидным горлом, тарелки и фигурные сосуды в виде животных, человеческих голов или мифологических существ. Эстетические стили различались по регионам: «Авеню Полихром» отличался яркими красно-белыми ангобными узорами, тогда как другие использовали глубокую резьбу или негативную роспись. Многие сосуды служили ритуальным целям и украшались мотивами Юго-восточного церемониального комплекса, такими как «рука и глаз» или «солнечная вспышка»."
 lepsius.2263.g: "Погодите, они сделаны из ракушек?"
 lepsius.2264.t: "Миссисипское погребение"
 lepsius.2264.d: "Д-р [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'обнаружила', 'обнаружил')] скрытые захоронения миссисипской культуры и [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'сделала', 'сделал')] несколько примечательных находок."
 lepsius.2264.f: "Миссисипские погребальные практики были тесно переплетены с социальной иерархией и космологическими верованиями, отражая сильно стратифицированное общество. Представителей элиты часто хоронили в погребальных храмах на вершинах платформенных курганов или в специализированных погребальных курганах. Эти высокостатусные могилы часто содержали престижный погребальный инвентарь, такой как чеканные медные пластины, нагрудные украшения из морских раковин и тонко изготовленная керамика, предназначенные сопровождать умершего в загробный мир. В отличие от них простолюдинов обычно хоронили на более простых кладбищенских участках рядом с жилыми зонами. Характерной особенностью этого периода было использование каменных ящичных могил, где умерших помещали в цисты, выложенные плитами известняка или песчаника."
 lepsius.2264.g: "Увлекательно!"
 lepsius.2281.t: "Scythian Weapons"
 lepsius.2281.d: "During a local excavation in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName], archaeologists have unearthed a Scythian weapons hoard. Bridles, bows, and scimitars bear witness to the weaponry of this ancient steppe people."
 lepsius.2281.f: "Scythian warfare was defined by mobility and long-range lethality. The primary weapon was the composite bow, made of wood, horn, and sinew. It was carried in a gorytos, a specialized leather case housing both the bow and up to 200 bronze-tipped arrows, enabling rapid, sustained fire from horseback. For close-quarters combat, Scythians utilized the akinakes, a distinctive iron short sword or dagger with a rectangular or 'kidney-shaped' guard. Archaeological finds also frequently include the sagaris, a narrow-bladed battle-axe capable of piercing helmets. Protection consisted of scale armor, featuring overlapping iron or bronze plates stitched onto leather vests. "
 lepsius.2281.g: "No wonder they ruled the steppe!"
 lepsius.2282.t: "Scythian Kurgan"
 lepsius.2282.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] was able to announce some very good news to the museum today: Apparently, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] team has discovered a previously unknown kurgan - a Scythian burial mound."
 lepsius.2282.f: "The Scythian kurgans of the Pontic steppe are  burial mounds that served as both elite tombs and territorial markers. They typically feature a central wooden chamber built from massive oak or larch logs, sunken deep into the earth. To honor the deceased, vast quantities of soil and turf were piled overhead, often reaching heights of over 20 meters in 'royal' kurgans like Chertomlyk. Beyond the primary burial, these mounds frequently contain lateral chambers for sacrificed servants and distinct pits for dozens of warhorses, fully equipped with bronze bits and bridles."
 lepsius.2282.g: "I usually jump when a professor comes into the room and announces 'Good News!...'"
 lepsius.2283.t: "Scythian Settlement"
 lepsius.2283.d: "Archaeologists have discovered a large-scale settlement of the ancient Scythians. Excavations so far have unearthed artifacts and human remains that expand our knowledge of this ancient steppe culture."
 lepsius.2283.f: "The most prominent example for a Scythian settlement is the Belsk fortified site, a proto-urban complex enclosed by earthen ramparts stretching over 30 kilometers. These settlements were strategically positioned along river routes to control trade and protect livestock. Archaeological excavations have uncovered permanent timber dwellings, storage pits, and specialized workshops for iron smelting, bronze casting, and weaving. These centers acted as economic hubs where nomads exchanged raw materials for Greek luxury goods like wine and pottery."
 lepsius.2283.g: "Gigantic villages..."
 lepsius.2284.t: "Scythian Babas"
 lepsius.2284.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has found an ancient stele in the area of [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. It dates back to the time of the ancient Scythians."
 lepsius.2284.f: "Scythian stelae, or 'Stone Babas,' are monumental sandstone slabs marking kurgan summits across the Pontic steppe. Functioning as ancestral monuments, these statues depict deceased warriors in a rigid, frontal pose. Unlike the stylized 'deer stones' of the East, these figures are anthropomorphic, featuring detailed engravings of Scythian military equipment. Central to their iconography is the warrior's belt, displaying the akinakes (dagger), gorytos (bow-case), and whetstones. Many figures hold a ritual drinking horn (rhyton) to their chest, symbolizing high status and cultic banquets. The 'babas' served as territorial markers and focal points for funerary rituals."
 lepsius.2284.g: "Take baba to the museum."
 lepsius.2285.t: "The Golden Comb"
 lepsius.2285.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has made the most remarkable discovery to date in Scythian archaeology in Solokha: The kurgan there contains a vast gold treasure. The highlight is a golden comb depicting battle scenes."
 lepsius.2285.f: "The Solokha Kurgan, located on the left bank of the Dnieper in modern-day Ukraine, is a premier site of Scythian archaeology discovered by Nikolai Veselovsky in 1912. Dating to the early 4th century BCE, this monumental burial mound stood 18 meters high. It contained two royal chambers: an earlier central grave, which had been looted in antiquity, and an intact side tomb. The latter revealed the remains of a Scythian king, a cup-bearer, and a guard, accompanied by five sacrificed horses. Beyond its famous gold artifacts, the inventory includes a vast array of Greek amphorae, bronze weaponry, and a silver ritual vessel."
 lepsius.2285.g: "It's far too beautiful to use for combing your hair..."
 lepsius.2291.t: "Viking Runestone"
 lepsius.2291.d: "In a remote corner of [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName], Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] found a runestone. It dates back to the Viking Age."
 lepsius.2291.f: "A Viking runestone is a raised monument, typically made of granite or sandstone, inscribed with runic characters in the Younger Futhark alphabet. These stones were primarily erected between the 9th and 11th centuries across Scandinavia, with the highest concentration found in modern-day Sweden. Unlike tombstones, runestones were rarely placed directly over a grave; instead, they served as public memorials to commemorate the deceased, record inheritance, or boast of significant achievements and expeditions."
 lepsius.2291.g: "Decipher the runestone."
 lepsius.2291.h: "Take the runestone to the museum."
 lepsius.2292.t: "Viking Settlement"
 lepsius.2292.d: "A farmer from [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] alerted the authorities to strange finds in his field. Researchers dug up the area and unearthed Viking-era artifacts. A team of experienced archaeologists subsequently excavated an entire settlement."
 lepsius.2292.f: "The fundamental architectural element of the viking settlement was the longhouse (langhús), a rectangular, communal structure typically measuring 15 to 30 meters in length. These buildings featured curved 'boat-shaped' walls constructed from timber, turf, or stone, with a central hearth for heating and cooking. In the North Atlantic, settlements adapted to local environments; in wood-scarce regions like Iceland and Greenland, turf became the primary building material. Archaeological excavations at sites like L'Anse aux Meadows in Newfoundland have confirmed that these settlement patterns were briefly extended even to the North American continent."
 lepsius.2292.g: "It's hard to believe that these murderous plunderers could also be loving family men at home."
 lepsius.2293.t: "Viking Longship"
 lepsius.2293.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has found the preserved remains of a former Viking ship. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] and his team have secured several pieces."
 lepsius.2293.f: "The Viking longship was a specialized type of seafaring vessel developed and used by the Norse for trade, exploration, and warfare during the Viking Age. Its design is characterized by a long, slender wooden hull, a shallow draft, and a symmetrical bow and stern, allowing for high speeds and navigation in both deep oceans and shallow inland waterways. Construction typically employed the clinker (lapstrake) technique, in which overlapping timber planks—primarily oak—were fastened with iron rivets. This provided the hull with the necessary flexibility to withstand the torsion of Atlantic swells. Propulsion was achieved through a combination of a single large square sail and rows of oars, with the latter enabling the 'dragon ships' to perform beach landings and tactical maneuvers independent of wind direction."
 lepsius.2293.g: "Can you make it seaworthy again? No? Then take it to the museum!"
 lepsius.2294.t: "Viking Ship Burial"
 lepsius.2294.d: "An archaeological sensation! Off the coast of [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName], archaeologists led by Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] have discovered a completely intact Viking ship, apparently used as a burial site. Numerous valuable artifacts were placed with the deceased chieftain!"
 lepsius.2294.f: "A Viking ship burial is a funerary custom in which a deceased individual, typically of high social status, was interred within a seafaring vessel. This practice reflected the belief that the ship would serve as a transport to the afterlife, such as Valhalla or Folkvangr. The burial ritual involved placing the deceased inside a chamber on the ship, often accompanied by an extensive array of grave goods, including sacrificed animals (horses and dogs), weaponry, luxury textiles, and occasionally enslaved individuals. These sites—like the famous Oseberg ship—were rich in grave goods, including ornate weaponry, silver jewelry, and domestic tools, providing insights into Norse craftsmanship."
 lepsius.2294.g: "Valhalla for them, artifacts for us!"
 lepsius.2106.t: "Augustus of Prima Porta"
 lepsius.2106.d: "In Prima Porta, Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] made a completely unexpected discovery: In the Villa Livia near Rome, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] and [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] team unearthed a colossal statue of the first Roman emperor, Augustus!"
 lepsius.2106.f: "The Augustus of Prima Porta is a marble statue of the first Roman emperor, approximately 2.04 meters high, discovered in 1863 at the Villa of Livia near Rome. The statue depicts Augustus in the pose of a general (adlocutio), addressing his troops. The richly decorated breastplate is of particular historical significance. The central reliefs represent the return of the legionary eagles captured from the Parthians in 20 BC - a diplomatic triumph that Augustus staged as a restoration of Roman honor. At his feet, a small Cupid rides a dolphin, emphasizing the divine lineage of the Julian dynasty from the goddess Venus. The statue is considered one of the most important examples of imperial self-representation and Roman classicism."
 lepsius.2106.g: "This must be one of the most beautiful statues of Roman antiquity."
 lepsius.2116.t: "Cyrus Cylinder"
 lepsius.2116.d: "The archaeological team has made a surprising discovery during excavations in Babylon: a clay document attributed to the Persian Great King Cyrus. In it, he explains the return of throngs of peoples to their homelands and their freedom to practice their religion. Is this an ancient declaration of human rights?"
 lepsius.2116.f: "'I am Cyrus—the king of the world empire, the great and mighty king, the king of Babylonia, the king of Sumer and Akkad, the king of the four world sectors, son of Cambyses, the great king of Anshan, grandson of Cyrus I, descendant of Teispes—whose reign Bel and Nabu cherished. I brought back the gods who dwelt (beyond the Tigris). I gathered all their people and returned them to their homes. Amidst jubilation and joy, I established my royal seat in the ruler's palace in Babylon. Day after day, I attended to the worship of Marduk. I allowed no troublemaker to arise in the entire land of Sumer and Akkad. I protected the city of Babylon and all its cult sites in prosperity. I allowed the inhabitants, who against the will of the gods there bore an unworthy yoke, to rest in their exhaustion. Marduk, the great lord, blessed me, Cyrus, and Cambyses, my own son, as well as all my troops."
 lepsius.2116.g: "A valuable Persian artifact in Babylon? Astounding."
