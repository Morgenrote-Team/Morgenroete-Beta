 lepsius.1502.t: "Особые человеческие окаменелости"
 lepsius.1502.d: "Здесь представлен обзор наиболее важных исторических находок, которые считаются прорывными в истории антропологии."
 lepsius.1502_cromagnon_t: "#T Кроманьонец#!, открыт [SCOPE.sCountry('lepsius_cromagnon_finder_country').GetAltNameNoFlag('RU_CL_TP')]"
 lepsius.1502_cromagnon_d: "\nФрагменты скелетов, найденные Луи Ларте в Абри-де-Кро-Маньон, считаются самыми ранними останками первых европейцев. Им около 27 000 лет."
 lepsius.1502_neanderthaler_t: "\n\n#T Неандерталец#!, открыт [SCOPE.sCountry('lepsius_neanderthaler_finder_country').GetAltNameNoFlag('RU_CL_TP')]"
 lepsius.1502_neanderthaler_d: "\nНаряду с Homo sapiens, Homo neanderthalensis является наиболее хорошо сохранившимся видом гоминин и вымер 40 000 лет назад."
 lepsius.1502_java_t: "\n\n#T Яванский человек#!, открыт [SCOPE.sCountry('lepsius_java_finder_country').GetAltNameNoFlag('RU_CL_TP')]"
 lepsius.1502_java_d: "\nЭти окаменелости возрастом 1 миллион лет были первыми из гоминидов, обнаруженных за пределами Европы, и вторыми, после неандертальцев, из ископаемых родственников анатомически современных людей."
 lepsius.1502_taung_t: "\n\n#T Ребёнок из Таунга#!, открыт [SCOPE.sCountry('lepsius_taung_finder_country').GetAltNameNoFlag('RU_CL_TP')]"
 lepsius.1502_taung_d: "\nРебёнок из Таунга был древнейшей известной на тот момент окаменелостью предка человека и в то же время первой дочеловеческой окаменелостью, найденной в Африке."
 lepsius.1502_peking_t: "\n\n#T Пекинский человек#!, открыт [SCOPE.sCountry('lepsius_peking_finder_country').GetAltNameNoFlag('RU_CL_TP')]"
 lepsius.1502_piltdown_t: "\n\n#T Пилтдаунский человек#!, открыт [SCOPE.sCountry('lepsius_piltdown_finder_country').GetAltNameNoFlag('RU_CL_TP')]"
 lepsius.1502_piltdown_d: "\nЗагадочный пилтдаунский человек, как говорят, является решающим звеном между человеком и обезьяной и считается доказательством открытия человека в Европе. Возраст окаменелости оценивается в 500 000 лет."
 lepsius.2000.t: "[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetLastName] изобретает систему трёх веков"
 lepsius.2000.d: "Директор Национального музея Дании, [SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetFullName], изобрёл систему для классификации археологических находок по трём периодам: #b каменный век#!, #b бронзовый век#! и #b железный век#!. Это революция для археологии!"
 lepsius.2000.f: "«Видите ли, некоторые артефакты всегда появляются вместе, а некоторые материалы никогда не встречаются на одних и тех же раскопках. Серебро, например, находят только там, где находят и железные инструменты и оружие. Золото, с другой стороны, можно найти как с железными, так и с бронзовыми инструментами.\nТакже поразительно, что некоторые материалы появляются только в определённых видах захоронений. Каменные орудия можно найти только с некремированными телами и в гробницах с каменными камерами. Железо находят в камерных гробницах в курганах.\nВсё это позволяет нам датировать наши находки гораздо точнее. Сначала были каменные орудия, затем бронзовые, и только потом — железные»."
 lepsius.2000.g: "Такой великий ум должен работать на нас!"
 lepsius.2000.h: "Он может оставаться в своём музее..."
