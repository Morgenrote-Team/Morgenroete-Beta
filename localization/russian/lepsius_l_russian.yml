 lepsius.81.t: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastNameNoFormatting] применяет современные методы раскопок"
 lepsius.81.d: "Доктор [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] в пещере различные человеческие кости. Но, в отличие от других антропологов, [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'она', 'он')] не просто [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'забрала', 'забрал')] находки, а тщательно [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'зафиксировала', 'зафиксировал')] обстоятельства их обнаружения."
 lepsius.81.f: "Каждая кость была зафиксирована в точном месте, где она была найдена. Сетка на чертежах помогла отследить каждую кость, артефакт или даже кусок угля. Всё могло быть подсказкой к тому, что ели, чем занимались или как жили эти доисторические люди. Каждая деталь была важна."
 lepsius.81.g: "Мы больше не расхитители гробниц!"
