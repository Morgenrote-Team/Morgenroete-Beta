 je_lepsius_discovery_semiramis_reason: "У нас есть все основания полагать, что Ассирия может скрывать чудо, о котором никто не знает. Поиски могут занять у нас годы. Тот, кому удастся совершить это открытие, должен занять своё место в истории."
