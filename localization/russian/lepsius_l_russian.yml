 lepsius.81.t: "[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetLastNameNoFormatting] использует современные методы раскопок"
 lepsius.81.d: "Доктор [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('lepsius_anthropologist_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] различные человеческие кости в пещере. Но в отличие от других антропологов, [SelectLocalization(ROOT.Var('lepsius_anthropologist_var').GetCharacter.IsFemale, 'она', 'он')] не просто [SelectLocalization(ROOT.Var('lepsius_anthropologist_var').GetCharacter.IsFemale, 'взяла', 'взял')] кости, а вместо этого тщательно [SelectLocalization(ROOT.Var('lepsius_anthropologist_var').GetCharacter.IsFemale, 'записала', 'записал')] обстоятельства находок."
 lepsius.81.f: "Каждая кость была зафиксирована в точном месте, где она была найдена. Сетка на чертежах помогла отследить каждую кость, артефакт или даже кусок угля. Всё могло быть подсказкой к тому, что ели, чем занимались или как жили эти доисторические люди. Каждая деталь была важна."
 lepsius.81.g: "Мы больше не расхитители гробниц!"
