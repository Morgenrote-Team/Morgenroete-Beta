 lepsius.1502_peking_d: "\nНаряду с яванским человеком, пекинский человек считается первым найденным Homo Erectus и укрепил веру в то, что человечество изначально произошло из Азии. Костям, как говорят, от 400 000 до 780 000 лет."
 lepsius_state_trait_heidelbergensis_cave: "Доисторическая пещера"
 lepsius.1326.t: "Homo Heidelbergensis изучен"
 lepsius.1326.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] собрал'[SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'а', '')] достаточно костей, чтобы сделать конкретные выводы о вымершем виде. Homo Heidelbergensis больше не является загадкой для науки и теперь может быть с определённой долей уверенности помещён в человеческое родословное древо, даже если остаётся много нерешённых вопросов."
 lepsius.1326.f: "Нижняя челюсть Homo heidelbergensis была обнаружена в 1907 году рабочим Даниэлем Хартманном в песчаном карьере недалеко от Мауэра близ Гейдельберга и описана в 1908 году анатомом Отто Шётензаком; находка возрастом около 600 000 лет считается самым древним свидетельством ранних людей в Европе, морфологически стоит между Homo erectus и Homo sapiens, указывает на широкое распространение этой гоминидной формы в Африке, Европе и Азии и, благодаря своей массивности и предполагаемому объёму мозга, позволяет делать выводы о развитой физической адаптации, использовании орудий и социальной организации."
 lepsius.1336.t: "Гейдельбергский человек"
 lepsius.1336.d: "Рабочий сделал замечательное открытие в карьере в Мауэре, городе недалеко от Гейдельберга. Профессор Гейдельбергского университета немедленно признал его ценность."
 lepsius.1336.f: "Нижняя челюсть Homo heidelbergensis была обнаружена в 1907 году рабочим Даниэлем Хартманном в песчаном карьере недалеко от Мауэра близ Гейдельберга и описана в 1908 году анатомом Отто Шётензаком; находка возрастом около 600 000 лет считается самым древним свидетельством ранних людей в Европе, морфологически стоит между Homo erectus и Homo sapiens, указывает на широкое распространение этой гоминидной формы в Африке, Европе и Азии и, благодаря своей массивности и предполагаемому объёму мозга, позволяет делать выводы о развитой физической адаптации, использовании орудий и социальной организации."
