 andersson_anthropology_tech: "Антропология"
 andersson_anthropology_tech_desc: "Палеоантропология, или просто антропология, - раздел палеонтологии и антропологии, стремящийся понять раннее развитие анатомически современных людей, известное как гоминизация. Для этого она реконструирует эволюционные линии родства внутри семейства гоминид, опираясь на биологические свидетельства, такие как окаменевшие скелетные останки, фрагменты костей и следы, а также на культурные свидетельства, такие как каменные орудия, артефакты и места поселений."
 lepsius.2105.t: "Гильдесхаймский клад"
 lepsius.2105.d: "Археологи обнаружили в Гильдесхайме значительный клад серебра. Удивительно, но он состоит из множества ценных римских артефактов!"
 lepsius.2105.f: "Гильдесхаймский клад, обнаруженный 17 октября 1868 года прусскими солдатами близ Гальгенберга, остаётся одной из важнейших находок римского серебряного дела за пределами имперских рубежей. Собрание насчитывает около 70 изящных серебряных сосудов, включая знаменитую чашу Минервы, и в основном датируется I веком н. э. Это шедевр ремесла эпохи Августа, однако после находки он вызвал острые националистические и академические споры. Ранние интерпретации часто связывали клад с битвой в Тевтобургском лесу (9 год н. э.), предполагая, что это утраченное имущество римского полководца Вара. Позднее учёные рассматривали его как дипломатический дар или дорожный сервиз высокопоставленного офицера."
 lepsius.2105.g: "Римское серебро в сердце Германии?"
 lepsius.2115.t: "Амударьинский клад"
 lepsius.2115.d: "На берегах Окса археологи сделали впечатляющую золотую находку, отражающую великолепие древней Персидской империи."
 lepsius.2115.f: "Амударьинский клад - самая значительная когда-либо найденная коллекция золотых изделий ахеменидской Персии. Обнаруженный близ реки Окс (современный Таджикистан) около 1877 года, клад включает примерно 180 золотых и серебряных предметов и более 200 монет. Собрание демонстрирует необычайное смешение персидских, скифских и греческих художественных влияний. Среди ключевых артефактов - знаменитая миниатюрная золотая колесница, искусные браслеты с крылатыми грифонами и многочисленные вотивные пластины с изображениями жрецов и воинов. Клад был знаменитым образом спасён от разбойников британским офицером, прежде чем попал в Британский музей. Исторически он служит первичным источником для понимания богатства и художественной утончённости державы Ахеменидов, отражая обширные торговые сети и культурный синтез древнеперсидского мира. Его открытие дало учёным первое крупное материальное свидетельство легендарной роскоши империи."
 lepsius.2115.g: "Эти чудесные вещи заслуживают отдельного зала в музее!"
 lepsius.2135.t: "Статуя Шочипилли"
 lepsius.2135.d: "Местные жители нашли древнюю статую среди вулканических пород. Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] в полном восторге: возможно, это лучше всего сохранившаяся статуя времён Ацтекской империи!"
 lepsius.2135.f: "Сидящая мужская фигура, высеченная из вулканического андезита и обнаруженная в 1880-х годах на склонах вулкана Попокатепетль, быстро стала предметом размышлений об ацтекской цивилизации. Статуя изображает мужчину в ритуальной позе на корточках со скрещенными ногами, сидящего на богато украшенном постаменте. Всё тело фигуры, как и трон, покрыто тонкими резными рельефами стилизованных цветов и бабочек, поразительно напоминающих галлюциногенные растения мексиканского нагорья. Слегка откинутая назад голова с широко открытыми глазами и приоткрытым ртом создаёт впечатление экстатического транса или божественного диалога. Маскообразные черты и цветочная иконография, включая изображения ипомеи и табака, привели исследователей к отождествлению фигуры с «Принцем цветов», божеством Шочипилли, покровителем танца, песни и священных сновидений ацтеков."
 lepsius.2135.g: "Эта статуя жуткая, тревожная, завораживающая и прекрасная."
 lepsius.2145.t: "Кираса из Ксур-Эссефа"
 lepsius.2145.d: "Археологи сделали удивительное открытие во время раскопок близ древнего Карфагена."
 lepsius.2145.f: "Кираса из Ксур-Эссефа - предмет древнего вооружения, обнаруженный в 1909 году в пунической гробнице близ Ксур-Эссефа в Тунисе. Этот бронзовый панцирь, отличающийся выразительной анатомической моделировкой и богатой гравировкой, является шедевром южноиталийского или кампанского ремесла III века до н. э. Кираса украшена изображениями пунической богини Танит, грифонов и растительных мотивов, символизирующих защиту и высокий статус. Из-за связи со Второй Пунической войной многие учёные считают, что она принадлежала высокопоставленному офицеру армии Ганнибала и, возможно, была получена во время италийских кампаний."
 lepsius.2145.g: "Древнеиталийские доспехи в пунической земле!"
 lepsius.2155.t: "Гундеструпский котёл"
 lepsius.2155.d: "В Химмерланде, на Ютландии, археологи неожиданно извлекли великолепный кельтский артефакт."
 lepsius.2155.f: "Гундеструпский котёл, найденный в торфяном болоте в Дании в 1891 году, является крупнейшим известным образцом серебряного дела железного века. Сосуд состоит из нескольких серебряных пластин, изначально позолоченных, с горельефными изображениями сложных мифологических сюжетов. Его обнаружение потрясло археологический мир, поскольку он был найден далеко к северу от кельтских земель. Вероятно, котёл был изготовлен в нижнедунайском регионе (современная Румыния или Болгария) фракийскими мастерами серебряного дела для кельтских заказчиков. В конце XIX и начале XX века он стал ключевым источником для понимания древнеевропейских религиозных практик и обширных взаимосвязанных торговых сетей, протянувшихся от Балкан до Северного моря."
 lepsius.2155.g: "В нём всё ещё можно сварить суп?"
 lepsius.2185.t: "Антикитерский механизм"
 lepsius.2185.d: "Ловцы губок обнаружили затонувший корабль у побережья Антикитеры. Судно римской эпохи содержит не только археологически значимые артефакты, но и устройство, переворачивающее наше представление об эллинистической древности."
 lepsius.2185.f: "Антикитерский механизм широко считается историками и учёными древнейшим известным примером аналогового компьютера. Датируемый II или началом I века до н. э., он по сложности не имел равных в западном мире ещё около 1500 лет. Изначально механизм состоял как минимум из 30 бронзовых шестерён, помещённых в деревянный корпус размером примерно с каминные часы. Он приводился в действие ручной рукояткой и имел несколько циферблатов с греческими надписями. Происхождение механизма остаётся предметом оживлённых научных споров. Хотя его точный создатель неизвестен, существует несколько гипотез, некоторые из которых даже предполагают связь с Архимедом Сиракузским."
 lepsius.2185.g: "Компас? Астрономический прибор? Машина времени?"
 lepsius.2205.t: "Летящая лошадь Ганьсу"
 lepsius.2205.d: "Наши исследователи обнаружили, возможно, самую выдающуюся статуэтку эпохи Хань в северном пограничном регионе бывшей империи."
 lepsius.2205.f: "Летящая лошадь Ганьсу, также известная как «Скачущий конь, наступающий на летящую ласточку», - знаменитая бронзовая скульптура эпохи Восточная Хань (25-220 гг. н. э.). Обнаруженная в 1969 году в гробнице военачальника в Лэйтае, она представляет вершину древнекитайского бронзового литья. Артефакт изображает могучего «небесного коня», легендарную ферганскую породу, запечатлённого в полном галопе. В образцовом решении равновесия и движения лошадь опирается единственным копытом на летящую ласточку, что намекает на скорость, превосходящую даже быстрейшую птицу. При первом изучении произведение приветствовали как символ Шёлкового пути, воплощающий военную мощь и культурный обмен, определявшие расширение Китая."
 lepsius.2205.g: "Она быстрее и изящнее любой птицы!"
 lepsius.2215.t: "Золотые короны Силла"
 lepsius.2215.d: "В Кёнджу, древней столице царства Силла, археологи нашли и вскрыли царские гробницы. Сделанные там открытия стали научной сенсацией!"
 lepsius.2215.f: "Золотые короны Силла относятся к самым впечатляющим сокровищам древней корейской истории и в основном были обнаружены в царских гробницах Кёнджу. Хотя слухи о золотых реликвиях ходили веками, первый научный прорыв произошёл в 1921 году, когда во время строительных работ случайно была найдена гробница Кымгванчхон, «Гробница золотой короны». Короны, изготовленные из золота высокой пробы и украшенные магатама - нефритовыми бусинами в форме запятой, - имеют вертикальные древовидные элементы и мотивы оленьих рогов. В начале XX века археологи и историки толковали эти формы как символы шаманской царской власти, предполагая культурную связь со степными народами Сибири и Центральной Азии."
 lepsius.2215.g: "Эти короны заслуживают почётных мест на следующей выставке."
 lepsius.2225.t: "Воин ханива"
 lepsius.2225.d: "Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'смогла', 'смог')] сегодня представить изысканный артефакт. [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'Она', 'Он')] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'сама', 'сам')] называет его «археологическим венцом» своей карьеры. Этот предмет уже считается первоклассным образцом искусства периода Ямато."
 lepsius.2225.f: "«Воин ханива» относится к знаменитым глиняным скульптурам японской эпохи Кофун. Эти фигуры ставили на больших курганах, чтобы защищать умершего и обозначать священное пространство гробницы. Самая известная находка была сделана в 1924 году в Оидзуми, префектура Гумма. Эта удивительно хорошо сохранившаяся фигура, «Воин в доспехах кэйко», даёт редкую трёхмерную картину военного снаряжения VI века, включая ламеллярный доспех и традиционный длинный лук. Артефакт, ныне считающийся национальным сокровищем, дал историкам представление о развитии военного дела государства Ямато. Романтически настроенные умы могут видеть в этом воине своего рода «прадеда» самурайского сословия."
 lepsius.2225.g: "Прошлое Японии больше не скрыто во тьме!"
 lepsius.2235.t: "Жрец-царь"
 lepsius.2235.d: "Археологическая группа сделала свою важнейшую на сегодняшний день находку при изучении цивилизации долины Инда: небольшую фигурку неизвестного мужчины в медитативной позе. Её уже считают одним из значительнейших артефактов бронзового века."
 lepsius.2235.f: "Обнаружение небольшой сидящей мужской фигуры, вырезанной из стеатита во время раскопок 1925-1926 годов в Мохенджо-Даро, быстро стало центром научных спекуляций о политическом и религиозном устройстве хараппской цивилизации. Эта фрагментарная статуэтка высотой всего 17,5 сантиметра демонстрировала удивительный уровень скульптурной детализации: бородатый мужчина с тщательно ухоженными усами и полуприкрытыми глазами, погружёнными в созерцание или медитацию. Он изображён в узорчатом плаще, наброшенном на одно плечо и украшенном мотивами трилистника, заметно напоминающими религиозные символы, известные в современной ему Месопотамии и Египте. Круглая повязка на голове и браслет на руке указывали на лицо значительного общественного или ритуального статуса, поэтому археологи того времени прозвали его «жрецом-царём»."
 lepsius.2235.g: "Лицо погибшей империи."
 lepsius.2245.t: "Возлежащий Вишну"
 lepsius.2245.d: "Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] объявляет, что [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] самую великолепную бронзовую статую Будды, какую только может предложить вся Юго-Восточная Азия. То, что на самом деле это изображение Вишну, в своём воодушевлении ускользает от [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'неё', 'него')]."
 lepsius.2245.f: "Возлежащий Вишну из Западного Мебона - монументальная бронзовая скульптура XI века из Кхмерской империи, обнаруженная в водохранилище Западный Барай в Ангкоре, Камбоджа. Вишну изображён в позе Ананташаяна, возлежащим на змее Шеше в космическом океане, и представляет собой шедевр стиля Бафуон. Значение этой скульптуры определяется её масштабом и символизмом. Как одна из крупнейших древних бронзовых статуй Юго-Восточной Азии, она демонстрирует исключительное металлургическое мастерство кхмеров. В религиозном смысле её размещение в центре огромного искусственного озера превращало водохранилище в физическое воплощение индуистского первозданного океана, узаконивая божественную власть царя. Найденная фрагментами начиная с 1936 года, сохранившиеся торс и голова теперь являются знаковыми сокровищами Национального музея Камбоджи."
 lepsius.2245.g: "Будда или Вишну? Какая разница, ему место в музее!"
 lepsius.2255.t: "Аксумский обелиск"
 lepsius.2255.d: "Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] недавно подробно [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'изучала', 'изучал')] так называемый «обелиск» Аксума. По [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'её', 'его')] мнению, это действительно стела, предназначенная для обозначения места погребения. Археолог считает этот объект одним из великолепнейших артефактов древнего Аксумского царства."
 lepsius.2255.f: "Аксумский обелиск, также известный как стела 2, - гранитный монолит высотой 24 метра, датируемый IV веком н. э. и воплощающий мастерство Аксумской империи на территории современной Эфиопии. Стела украшена искусными «ложными дверями» и окнами, имитирующими многоэтажное здание, и служила гробницей для элиты. Памятник получил международную известность и благодаря своей современной одиссее: в 1937 году по приказу Бенито Муссолини он был вывезен в Рим как награбленное произведение искусства. Лишь после десятилетий дипломатических усилий обелиск был возвращён Эфиопии в трёх частях в 2005 году."
 lepsius.2255.g: "Гордый символ наших предков!"
 lepsius.2255.h: "Перевезти обелиск в город [ROOT.GetCountry.GetCapital.GetCityHubName]!"
 lepsius.2265.t: "Малденские пластины"
 lepsius.2265.d: "Во время раскопок в одном из ключевых районов миссисипской культуры археологи сделали неожиданное открытие: удивительно красивые медные предметы вновь увидели свет спустя века."
 lepsius.2265.f: "Малденские пластины, также известные как клад Вулфинга, состоят из восьми чеканных медных пластин, обнаруженных в 1906 году Рэем Грумингом в Малдене, штат Миссури. Эти необычайные артефакты относятся к миссисипской культуре (ок. 1200-1400 гг. н. э.) и были найдены зарытыми в поле, вероятно, скрытыми для сохранности или в качестве ритуального приношения. Пластины являются шедеврами доколумбовой металлургии и несут сложную иконографию Юго-восточного церемониального комплекса. На них преимущественно изображён Танцор-сокол - антропоморфная фигура с птичьими чертами, крыльями и ритуальными регалиями, представляющая могущественное сверхъестественное существо или шаманское превращение."
 lepsius.2265.g: "Америка была цивилизованной ещё до того, как её цивилизовали?"
 lepsius.2275.t: "Клад Кимбая"
 lepsius.2275.d: "Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'обнаружила', 'обнаружил')] то, что считается крупнейшим на сегодняшний день золотым кладом Колумбии. Во время раскопок были извлечены сотни артефактов. Похоже, [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'наткнулась', 'наткнулся')] на сокровище целой исчезнувшей цивилизации."
 lepsius.2275.f: "Клад Кимбая - всемирно известное собрание доколумбовых золотых и тумбаговых артефактов, созданных цивилизацией кимбая на территории современной Колумбии. Датируемый в основном IV-X веками н. э., клад был обнаружен в 1890 году близ Филандии. Коллекция состоит примерно из 122 предметов, включая украшения, фигурки и ритуальные сосуды, известные как попоро - ёмкости для извести. Эти объекты демонстрируют выдающееся владение техникой литья по выплавляемой модели, отличаясь гладкими округлыми поверхностями и утончёнными стилизованными человеческими формами. В 1893 году колумбийское правительство подарило клад испанской королеве-регентше Марии Кристине."
 lepsius.2275.g: "Я никогда не видел столько золота!"
 lepsius.2201.t: "Росписи ханьских гробниц"
 lepsius.2201.d: "Раскопки гробниц высокопоставленных людей империи Хань дали представление о жизни и повседневности давно ушедших времён."
 lepsius.2201.f: "Хотя многие ханьские артефакты были известны и раньше, открытие расписных гробниц династии Хань в начале XX века выявило обширные циклы настенных росписей, запечатанных со II века н. э. Эти росписи изображают живые сцены повседневной жизни: роскошные пиры, выступления акробатов и шумные процессии конных колесниц. Они доказали, что ханьские китайцы развили сложную перспективу и повествовательную живопись задолго до династии Тан. Яркие пигменты - красные, охристые и чёрные - остаются одними из наиболее хорошо сохранившихся образцов раннего китайского изобразительного искусства."
 lepsius.2201.g: "До сих пор наши знания о ханьском обществе были недостаточными."
 lepsius.2202.t: "Ханьские лаковые изделия"
 lepsius.2202.d: "В ходе последнего открытия археологи извлекли множество лаковых изделий."
 lepsius.2202.f: "Хотя лак использовался тысячелетиями, именно в период Хань (206 г. до н. э. - 220 г. н. э.) его производство стало масштабной отраслью под государственным контролем. Крупные открытия начала XX века, особенно в северных форпостах вроде Лэлана на территории современной Северной Кореи, показали невероятную долговечность и художественное качество этих предметов. При ханьском дворе лаковые изделия ценились гораздо выше бронзы за устойчивость к жару, влаге и разрушению. Предметы - от винных чаш и косметических коробочек до украшенных гробов - обычно расписывались в выразительной красно-чёрной палитре текучими облакоподобными завитками и мифическими существами."
 lepsius.2202.g: "Ещё больше артефактов для следующей выставки."
 lepsius.2203.t: "Ханьские керамические фигурки"
 lepsius.2203.d: "Во время раскопок было найдено множество погребальных предметов. Обилие керамических изделий указывает на очень богатого умершего. Фигурки и миниатюрные дома особенно привлекли внимание команды."
 lepsius.2203.f: "Керамические фигурки династии Хань, известные как минци - «духовные предметы», варьируются от придворных танцовщиц и пехотинцев до удивительно подробных миниатюрных моделей домов, амбаров и сторожевых башен. Для археологов той эпохи эти архитектурные модели были бесценны, поскольку давали единственное сохранившееся свидетельство ханьского деревянного строительства, давно исчезнувшего в реальном мире. Фигурки и модели рассматривались как полный микрокосм ханьского мира, предназначенный обеспечить умершего в загробной жизни полностью действующим поместьем - со скотом, кухнями и развлечениями."
 lepsius.2203.g: "Из этого можно построить модель города Чанъань?"
 lepsius.2204.t: "Ханьская бронза"
 lepsius.2204.d: "Во время последних раскопок археологи обнаружили клад бронзовых изделий эпохи Хань. Особенно исследователей впечатлил прекрасно украшенный дин."
 lepsius.2204.f: "Открытие бронзовых кладов эпохи Хань в конце XIX и начале XX века выявило цивилизацию, доведшую металлургию до совершенства как для ритуальной, так и для повседневной жизни. Такие клады, часто встречающиеся в Северном Китае и пограничных землях вроде Ганьсу, нередко содержали искусные курильницы, зеркала и наборы сосудов, скрытые в течение двух тысячелетий. Отличительной чертой этих находок является бошаньлу, «горная курильница», - бронзовая курильница в форме священной горы, окутанной туманом. Для учёных той эпохи обнаружение массивных бронзовых светильников и винных сосудов ху в ханьских гробницах доказало, что бронза оставалась символом высокого статуса даже после появления железа."
 lepsius.2204.g: "Блестящие пополнения для нашего музея."
 lepsius.2211.t: "Артефакты из пруда Силла"
 lepsius.2211.d: "Осушив пруд близ старого дворца времён Объединённого царства Силла, археологи нашли в иле множество артефактов той эпохи."
 lepsius.2211.f: "В отличие от торжественных подношений, найденных в гробницах, предметы, извлечённые из ила пруда, в основном были остатками повседневной дворцовой жизни и пышных празднеств. Среди самых интересных находок были позолоченные бронзовые Будды, украшенные кровельные черепицы - эбвадан - и уникальные деревянные игровые кости, использовавшиеся во время царских пиров. Эти артефакты демонстрировали образ жизни крайней роскоши и художественной утончённости. Они отражают роль Силла как важного конечного пункта Шёлкового пути с эстетическими влияниями танского Китая и даже далёкой Персии."
 lepsius.2211.g: "Остатки золотого века."
 lepsius.2212.t: "Монетные клады Силла"
 lepsius.2212.d: "Археологи почти случайно обнаружили огромный монетный клад в корейском провинциальном городе. Монеты происходят главным образом из китайской династии Тан, великого соседа объединённого царства Силла."
 lepsius.2212.f: "Древняя Корея обычно торговала товарами, среди которых особенно важную роль играли ткани и зерно, либо монетами-ножами. Тем не менее иностранные монеты фиксируются довольно часто. Китай, в частности как могущественный сосед царства Силла, оказывал значительное влияние на соседей через свою денежную систему, особенно монету у чжу, чеканившуюся начиная с династии Хань. За ней последовала монета кайюань тунбао династии Тан. Будучи частью Шёлкового пути, многочисленные китайские монеты попадали в Корею через международную торговлю."
 lepsius.2212.g: "Корейские или китайские... теперь эти монеты наши."
 lepsius.2213.t: "Ксилографические оттиски Силла"
 lepsius.2213.d: "Во время археологических исследований рядом с пагодой исследователи обнаружили несколько буддийских текстов. Они относятся к периоду Силла и были напечатаны методом ксилографии."
 lepsius.2213.f: "Документы доказывают, что царство Силла уже в VIII веке владело техникой ксилографии, а значит, теоретически имело возможность массовой печати. Для исследователей это не только ценные религиозные тексты, но и свидетельство неожиданно технологически развитого общества."
 lepsius.2213.g: "Завораживает!"
 lepsius.2214.t: "Грот Соккурам"
 lepsius.2214.d: "Почтальон сообщил Археологическому институту о впечатляющем открытии близ древней столицы Кёнджу, которое проливает совершенно новый свет на период Силла."
 lepsius.2214.f: "Грот Соккурам, монументальный скит в составе храмового комплекса Пульгукса, был заново открыт в 1909 году местным почтальоном, искавшим укрытия от бури. Расположенный на горе Тохам в Кёнджу, этот искусственный гранитный грот, построенный в VIII веке в период Объединённого Силла, был забыт и веками оставался частично обрушенным, погребённым под землёй и обломками. Грот считается шедевром восточного буддийского искусства: в нём находится безмятежный колоссальный Будда Шакьямуни, окружённый искусно вырезанными барельефами стражей, дэвов и учеников. В начале XX века это открытие стало важным объектом археологии колониальной эпохи. Учёных и инженеров того времени восхищала сложная архитектурная конструкция грота, использовавшая уникальный купол для поддержания температуры и влажности."
 lepsius.2214.g: "Жемчужина периода Силла."
 lepsius.2221.t: "Фигурки ханива"
 lepsius.2221.d: "Недавние раскопки выявили множество керамических фигурок, охранявших входы в гробницы. Эти глиняные фигуры чрезвычайно хрупки."
 lepsius.2221.f: "Ханива - неглазурованные керамические скульптуры, характерные для периода Кофун (Ямато) и специально создававшиеся для размещения на вершинах или вокруг монументальных курганов. Эти терракотовые стражи воспринимались как защитные границы священного пространства гробницы. Развиваясь между III и VI веками н. э., они прошли путь от простых цилиндрических сосудов до сложных фигур, представляющих весь социальный и материальный мир умершего. Они были одними из первых артефактов, научно классифицированных японскими археологами."
 lepsius.2221.g: "Когда-то они охраняли могилы, а теперь украшают музеи."
 lepsius.2222.t: "Магатама"
 lepsius.2222.d: "Наша археологическая группа нашла большое количество маленьких нефритовых магатама, датируемых периодом Ямато."
 lepsius.2222.f: "Магатама - изогнутые бусины в форме запятой, служащие одним из самых узнаваемых признаков японского периода Ямато (Кофун). Обычно изготовленные из драгоценных камней, таких как жадеит, яшма, нефрит или сердолик, эти украшения высоко ценились и как символы элитного статуса, и как могущественные религиозные амулеты. Обнаружение магатама в монументальных гробницах в форме замочной скважины вызвало значительный археологический интерес к происхождению японской культуры. Учёные того времени отмечали поразительное сходство этих украшений с находками из конфедераций Силла и Кая на Корейском полуострове. Помимо эстетической ценности, магатама занимали священное место в национальном сознании: как одно из трёх священных сокровищ императорских регалий Японии, их извлечение из древних памятников часто воспринималось как глубокое восстановление связи с божественной линией государства Ямато."
 lepsius.2222.g: "Можно мне одну?"
 lepsius.2223.t: "Доспехи и оружие Ямато"
 lepsius.2223.d: "Наши археологи подозревают, что обнаружили поле битвы. Найдены мечи и доспехи периода Ямато. Особенно хорошо сохранился воинский доспех танко."
 lepsius.2223.f: "Период Ямато был эпохой интенсивной военной консолидации и расширения, характеризовавшейся широким внедрением развитой технологии обработки железа. Археологические раскопки курганов Кофун выявили огромные объёмы военного снаряжения, включая прямые мечи тёкуто, наконечники стрел и сложные пластинчатые доспехи. Два основных типа доспехов определяли эту эпоху: танко, цельный железный панцирь из склёпанных пластин, и кэйко, более гибкий ламеллярный доспех для конного боя."
 lepsius.2223.g: "У Японии великое военное прошлое."
 lepsius.2224.t: "Бронзовые зеркала Ямато"
 lepsius.2224.d: "Археологи нашли множество погребальных предметов, среди которых бронзовые зеркала выделяются как реликвии славного периода Ямато."
 lepsius.2224.f: "Бронзовые зеркала, или синдзю-кё, относятся к наиболее духовно значимым артефактам, найденным в курганах Кофун периода Ямато. Часто расположенные у головы или груди умершего, эти зеркала почитались как священные ритуальные предметы, способные отражать и улавливать свет - свойство, связанное с божественной властью и богиней солнца Аматэрасу. Многие зеркала, обнаруженные в Японии, были определены как импортированные из китайской династии Вэй зеркала «божеств и зверей», тогда как другие были местными японскими подражаниями, известными как бошарё-кё. Для историков эпох Мэйдзи и Тайсё распространение этих зеркал служило политической картой древней Японии: обнаружение одинаковых зеркал в географически удалённых гробницах предполагало, что двор Ямато раздавал эти драгоценные предметы местным вождям как символы единого политического союза."
 lepsius.2224.g: "Отражение прошлого Японии."
 lepsius.2231.t: "Индская керамика"
 lepsius.2231.d: "Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] сегодня [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'объявила', 'объявил')], что в долине Инда обнаружен тайник с многочисленными керамическими находками."
 lepsius.2231.f: "Гончары цивилизации долины Инда уже более 4000 лет назад использовали высокоразвитые скоростные гончарные круги. Особенно выделяется так называемая «чёрно-красная керамика»: сосуды покрывали глубоким красным ангобом, а затем расписывали тонкими чёрными пигментами. Мотивы были либо строго геометрическими, либо изображали богатую флору и фауну субконтинента - от павлинов до характерных листьев пипала. Огромное количество этих долговечных артефактов стало главным свидетельством урбанизации бассейна Инда, доказав, что сложное стандартизированное общество процветало задолго до начала письменной истории субконтинента."
 lepsius.2231.g: "Теперь пора сложить фрагменты воедино."
 lepsius.2232.t: "Индские бусины"
 lepsius.2232.d: "Группа археологов под руководством доктора [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] сегодня извлекла ценную находку в древнем индском поселении, подтвердив мастерство хараппской цивилизации."
 lepsius.2232.f: "Обнаружение сложных украшений и бусин дало одни из самых убедительных свидетельств огромного богатства и специализированного ремесла цивилизации долины Инда. Эти украшения изготавливались из самых разных материалов, включая золото, серебро, лазурит, бирюзу и различные виды терракоты. Однако именно производство длинных сердоликовых бусин стало отличительным признаком хараппского технического мастерства. Археологов поражала точность, с которой эти твёрдые камни сверлились и гравировались тонкими белыми щелочными узорами, что требовало высокоспециализированных печей и сверл из медных сплавов. Помимо эстетической привлекательности, эти украшения дали важные сведения об обширных морских и сухопутных торговых сетях бронзового века. Наличие безошибочно хараппских стилей бусин в царских погребениях месопотамских городов-государств дополнительно подтвердило роль субконтинента как крупного экспортёра предметов роскоши."
 lepsius.2232.g: "У этой древней культуры были далеко простиравшиеся торговые связи!"
 lepsius.2233.t: "Индское письмо"
 lepsius.2233.d: "Археологи нашли несколько печатей с письменными знаками в месте, которое, по-видимому, было складом цивилизации долины Инда. Однако доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] пока не [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'смогла', 'смог')] расшифровать это письмо."
 lepsius.2233.f: "Извлечение небольших квадратных стеатитовых печатей остаётся самым загадочным открытием раскопок в долине Инда. Эти артефакты обычно вырезались в технике инталии с изящными изображениями животных - прежде всего быка-«единорога», слонов и носорогов, - над которыми располагалась серия стандартизированных символов, известных как индское письмо. Обнаружение множества таких печатей в складских районах позволило предположить, что они служили официальными знаками собственности или власти и использовались для оттисков на глиняных бирках товаров, предназначенных для местных и зарубежных рынков. Краткость и повторяемость надписей привели учёных к выводу, что письмо, вероятно, передавало имена, титулы или бюрократические пометки, а не длинные повествовательные тексты. Несмотря на тщательный лингвистический анализ, лежащий в его основе язык оставался предметом ожесточённых споров."
 lepsius.2233.g: "Письмо и язык останутся загадкой для будущих поколений."
 lepsius.2234.t: "Контакты Инда с Месопотамией"
 lepsius.2234.d: "Фермеры сообщили Археологическому институту о древних сооружениях в предполагаемом районе хараппской цивилизации. Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'сделала', 'сделал')] там неожиданное открытие: цилиндрические печати из Месопотамии!"
 lepsius.2234.f: "Обнаружение отчётливо ближневосточных артефактов в руинах Хараппы и Мохенджо-Даро дало первое убедительное археологическое доказательство прямого контакта между долиной Инда и цивилизациями Месопотамии. Среди наиболее значимых находок были цилиндрические печати, резко отличавшиеся от квадратных плоских штемпельных печатей, характерных для бассейна Инда. Эти импортные предметы, обычно изготовленные из камней вроде гематита или лазурита, несли повествовательную и мифологическую иконографию, свойственную аккадским и шумерским городам-государствам. Помимо печатей, археологи выявили несколько особых предметов роскоши, включая фрагменты керамики в стиле «Персидского залива» и отдельные типы литого бронзового оружия западного происхождения."
 lepsius.2234.g: "Месопотамские артефакты? Здесь? Нам даже не нужно отправлять экспедицию?"
