 lepsius_antiquarianism_tech: "Антикварианизм"
 lepsius_antiquarianism_tech_desc: "Коллекционеры художественных сокровищ интересовались прошлым со времён итальянского Ренессанса. В то время как Иоганн Иоахим Винкельман пробудил интерес к Древнему Риму и Греции, наполеоновские экспедиции пробудили Египет от сна прошлого. Несмотря на эти успехи, доархеологические исследования были сформированы авантюристами, такими как Джованни Баттиста Бельцони, чьи методы исследования колебались между охотой за сокровищами и разграблением гробниц."
 lepsius_early_archaeology_tech: "Ранняя археология"
 lepsius_early_archaeology_tech_desc: "После подготовительной работы Шампольона Карл Рихард Лепсиус смог полностью расшифровать египетские иероглифы. Это символизирует изменение в археологическом ландшафте: археологические общества, институты и музеи способствовали новой научной культуре. Тем не менее, Огюст Мариетт, один из отцов-основателей охраны памятников, не колеблясь, вскрыл серапеум с помощью взрывчатки, когда он был обнаружен."
 lepsius_modern_archaeology_tech: "Современная археология"
 lepsius_modern_archaeology_tech_desc: "Дальнейшие усовершенствования в методологии археологических полевых работ произошли в конце XIX века. Одной из новаторских фигур в этом был Огастес Питт-Риверс, который скрупулёзно проводил раскопки в Кранборн-Чейз на юге Англии, подчёркивая, что следует регистрировать не только предметы красоты или ценности, но и обыденные предметы. Флиндерс Питри ввёл систематическую методологию в археологии и сохранении артефактов."
 excavation_license: "Лицензия на раскопки"
 excavation_license_desc: "Дипломатическая операция, которая даёт нам доступ к одной из её провинций для проведения там археологических экспедиций и раскопок."
