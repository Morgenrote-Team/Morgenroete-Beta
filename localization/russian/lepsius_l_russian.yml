 notification_lepsius_heidelbergensis_systemized_notification_desc: "Учёные впервые идентифицировали и проанализировали кости Homo Heidelbergensis и подробно описали вид."
 lepsius_ishtar_gate_modifier: "Ворота Иштар"
 lepsius.313.h: "Доктор [SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetLastName] нам нужнее в другом месте."
 lepsius.321.t: "Каталогизация завершена"
 lepsius.321.d: "После многих месяцев кропотливой организации, идентификации, нумерации и оценки останков, найденных в экспедиции, у доктора [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] снова свободны руки."
 lepsius.321.f: "«В конечном счёте, мы - бухгалтеры истории, только наши балансы всегда в минусе. Мы сводим невежество в табличную форму. Единственное утешение в том, что, в отличие от архивариусов, мы иногда видим солнце»."
 lepsius.321.g: "Если заниматься этим слишком долго, в конечном итоге будешь собирать ту же пыль, что и артефакты."
 je_lepsius_cataloging: "Археологическая каталогизация"
 je_lepsius_cataloging_reason: "Археологическая каталогизация - это систематический процесс документирования, описания и внесения находок с археологических раскопок или из существующих коллекций в базу данных или систему инвентаризации. Каждая находка связывается с её контекстными данными: местоположением, стратиграфией, обстоятельствами находки, материалом, размерами или датировкой.\n\nПроцесс занимает значительно больше времени, чем экспедиция, и часто является причиной того, почему археологической команде так долго приходится ждать, чтобы нацелиться на новую цель. Но какой археолог не гордился бы выполнением этой чрезвычайно увлекательной обязанности?"
