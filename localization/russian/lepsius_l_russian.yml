l_russian:
 lepsius_upper_egypt_modifier: "Долина Царей"
 lepsius_upper_egypt_modifier_desc: "Долина Царей — одно из самых завораживающих археологических мест в мире. Говорят, что в тысячелетних гробницах скрыты сокровища, которые только и ждут, чтобы их обнаружили."
 lepsius_lower_egypt_modifier: "Пирамиды"
 lepsius_lower_egypt_modifier_desc: "Нижний Египет с его древней столицей Мемфисом — это земля неизведанных пирамид и неизвестных городов. Говорят, что целая серия утерянных артефактов до сих пор покоится в египетских песках."
 lepsius_babylonia_modifier: "Колыбель цивилизации"
 lepsius_babylonia_modifier_desc: "Месопотамия считается землёй, где были изобретены письменность и земледелие и возникли первые царства. Клинописные таблички, колоссальные каменные фигуры и руины храмов до сих пор свидетельствуют о некогда славной высокой культуре."
 lepsius_assyria_modifier: "Руины Ниневии и Нимруда"
 lepsius_assyria_modifier_desc: "Ассирия — это не только место происхождения воинственных империй, но и точка, в которой пересекаются древневосточная история и библейские повествования. Руины бывших садов и могучих валов завораживают и по сей день."
 lepsius_argolis_modifier: "Цитадели Микен"
 lepsius_argolis_modifier_desc: "Микенская культура считается первой развитой цивилизацией на материковой части Греции. Цари греческой мифологии долгое время считались всего лишь сказками, но археологические раскопки могут доказать, что в этих сказаниях есть доля правды."
 lepsius_crete_modifier: "Минойская цивилизация"
 lepsius_crete_modifier_desc: "Крит — родина древнейших городов Европы, а также дворцовых комплексов, тайны которых ещё предстоит раскрыть. Минойская культура названа в честь легендарного царя Миноса, который, как говорят, когда-то правил всем Эгейским морем."
 lepsius_yucatan_modifier: "Тайны Юкатана"
 lepsius_yucatan_modifier_desc: "Говорят, что глубоко в джунглях Юкатана до сих пор лежат затерянные города некогда процветавшей культуры майя. Сообщения местных жителей сулят археологические сенсации — если кому-то удастся пробиться сквозь непроходимые заросли."
 lepsius_peru_modifier: "Тайны Анд"
 lepsius_peru_modifier_desc: "Империя инков когда-то была самым могущественным государством на южноамериканском континенте, что закончилось только с испанским завоеванием. Но, предположительно, всё ещё существуют неизвестные гробницы и храмы. Некоторые даже рассказывают о неизвестном городе, скрытом в Андах."
