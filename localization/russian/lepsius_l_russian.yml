 lepsius.1421.i: "[SCOPE.sState('lepsius_cave_3').GetName]"
 lepsius.1423.t: "Зарубежная пещерная экспедиция завершается"
 lepsius.1423.d: "Команда антропологов из [SCOPE.sCountry('lepsius_anthropological_guest').GetAltNameNoFlag('RU_CL_RP')] завершила своё исследование через два года. Мы получаем несколько находок, гарантированных по контракту."
 lepsius.1423.f: "Антропологические приглашения ограничены тремя годами. Принимающая страна затем получает небольшую долю находок, в то время как страна, предоставляющая антрополога, получает большую долю. Кроме того, антрополог получает непропорционально большое количество опыта за экспедицию за границу."
 lepsius.1423.g: "Спасибо за все кости!"
 lepsius.1424.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'вернулась', 'вернулся')] из своей экспедиции в [SCOPE.sCountry('lepsius_anthropological_host').GetAltNameNoFlag('RU_CL_PP')] и не только [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'набралась', 'набрался')] опыта, но и [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'привезла', 'привёз')] с собой ценные дочеловеческие окаменелости."
