 je_lepsius_letter_to_rosellini: "Письмо Лепсиуса к Розеллини"
 je_lepsius_letter_to_rosellini_reason: "Карл Рихард Лепсиус, молодой, амбициозный филолог, стоит на пороге прорыва. Он использует свой метод, чтобы улучшить основы расшифровки иероглифов Шампольона - и тем самым революционизировать археологические исследования."
 je_lepsius_stephens_catherwood_expedition: "Экспедиция Стивенса и Катервуда"
 je_lepsius_stephens_catherwood_expedition_reason: "Посол в Центральной Америке, Джон Ллойд Стивенс, выразил интерес к посещению полуострова Юкатан. Художник Фредерик Катервуд хочет сопровождать его в экспедиции к таинственным руинам в джунглях. Это предприятие может стать делом национального престижа, если мы создадим для него подходящие рамки."
 je_lepsius_decipherment_akkadian: "Расшифровка аккадского языка"
 je_lepsius_decipherment_akkadian_reason: "Не только расшифровка иероглифов десятилетиями держала экспертов в напряжении. Древнеперсидский язык и клинопись больше не являются секретом для наших учёных. Экспедиция Остена Генри Лейарда в Нимруд вызвала большой резонанс и привлекла общественный интерес. После недавнего открытия колоссальной, многоязычной надписи в Бехистуне на очереди следующий проект: расшифровка древнейших языков древней Месопотамии. Это откроет совершенно новые археологические возможности."
 je_lepsius_support_schliemann: "Генрих Шлиман и мечта о Трое"
 je_lepsius_support_schliemann_reason: "Генрих Шлиман - немецкий бизнесмен и самоучка, который путешествовал по миру и накопил значительное состояние. Однако с юности его настоящей страстью были гомеровские эпосы. Шлиман убеждён, что древняя Троя - это не сказка. Он всё ещё ищет сторонников."
 je_lepsius_machu_picchu: "Наследие инков"
 je_lepsius_machu_picchu_reason: "С новейшими технологиями и самыми передовыми методами исследований даже самые непроходимые места в мире больше не являются секретом для людей в начале XX века. В частности, изобретение самолёта чрезвычайно помогло в картографировании ранее отдалённых регионов. Возможно, последние тайны давно утерянных цивилизаций наконец-то могут быть разгаданы."
 je_lepsius_epic_of_gilgamesh: "Эпос о Гильгамеше"
 je_lepsius_epic_of_gilgamesh_reason: "Эпос о Гильгамеше - это содержание группы литературных произведений, которые происходят в основном из вавилонского региона и содержат одну из древнейших сохранившихся письменных печатей. Эпос о Гильгамеше в его различных версиях является самым известным произведением аккадской и шумерской литературы. Эпос рассказывает историю Гильгамеша, царя Урука, его подвиги и приключения, его дружбу с Энкиду, его смерть и поиски бессмертия Гильгамешем. #T Для реконструкции базовой версии необходимо пять частей эпоса.#!."
 je_lepsius_epic_of_gilgamesh_success: "Найти не менее #G 5#! @lepsius_gilgamesh_fragment! частей эпоса о Гильгамеше для создания его базовой реконструкции."
