 lepsius.1601.t: "[SCOPE.sCharacter('lepsius_donator_scope').GetLastName]: Пожертвование "
 lepsius.1601.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName] считается коллекционером редких египетских раритетов. Его египтологические интересы привели к тому, что теперь он владеет замечательной коллекцией. Он щедро предложил пожертвовать свои изысканные артефакты Археологическому музею."
 lepsius.1602.d: "Общеизвестно, что [SCOPE.sCharacter('lepsius_donator_scope').GetFullName], вероятно, владеет самой впечатляющей частной коллекцией месопотамских артефактов. Он дал понять правительству, что эта коллекция может быть передана в государственные руки, хотя некоторые критически настроенные наблюдатели предупреждают, что он может потребовать что-то взамен."
 lepsius.1603.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName], возможно, не считается самым большим ценителем искусства, но по счастливой случайности он обнаружил на своей территории несколько археологических сокровищ большой ценности, которые он хранил под замком в течение нескольких лет. Поскольку он не может с ними ничего сделать, он предложил правительству пожертвовать их Археологическому музею."
 lepsius.1604.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName] в последние годы совершил несколько поездок по Южной Америке, где в качестве сувениров собрал важные реликвии мезоамериканских и андских культур. Теперь он объявил, что хочет пожертвовать эти артефакты музею."
 lepsius.1605.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName] был впечатлён древними эгейскими культурами. Он уже несколько лет собирает артефакты с Крита и даже заказал привезти на свою виллу целую минойскую фреску. Однако, зная свои социальные обязательства, он решил пожертвовать свои сокровища народу [ROOT.GetCountry.GetAltName('RU_CL_VP')]."
 lepsius.1601.f: "Многочисленные археологические коллекции восходят к князьям эпохи Возрождения, которые собирали предметы античного искусства и покупали их через дилеров. В 1824 году король Карл Феликс приобрёл материалы из коллекции Дроветти (5 268 предметов, включая 100 статуй, 170 папирусов, стел, мумий и других предметов), которую французский генеральный консул Бернардино Дроветти собрал во время своего пребывания в Египте. Позже это стало основой Египетского музея в Турине. Богатые предприниматели и влиятельные элиты также были заинтересованы в коллекционировании статусных символов, которые они часто завещали общественности. Часто случалось так, что люди не только хотели улучшить свою репутацию такими пожертвованиями, но и надеялись на лучшее положение в обществе."
 lepsius.1601.g: "Замечательное пожертвование для нашего музея!"
 lepsius.1601.h: "Этот подхалим просто пытается извлечь выгоду."
 lepsius.1606.t: "Египтомания"
 lepsius.1606.d: "Собралась группа людей, увлечённых Египтом. Группу возглавляет [SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName]. Некоторые могут не разделять почти фанатичного восхищения Древним Египтом, но это явление может иметь свои преимущества."
 lepsius.1606.f: "Хотя XIX век во многих отношениях рассматривается как прогрессивный и находящийся под властью научного духа, именно в это время получили широкое распространение несколько форм оккультных и псевдонаучных явлений. Самым известным из них является спиритуализм, который хотел доказать существование духов. Археологические исследования не только вдохновили множество ошибочных теорий, но и псевдонаучные и эзотерические движения, такие как панвавилонизм, майянизм и вера в Атлантиду. Хотя такие явления часто могли оказывать разрушительное воздействие на науку, некоторые из них пользовались определённой модой и популяризировали научные исследования, что могло иметь довольно плодотворные побочные эффекты."
 lepsius.1606.g: "Пусть предаются своему маленькому культу."
 lepsius.1606.h: "Запретить это шарлатанство."
 lepsius.1607.t: "Майянизм"
 lepsius.1607.d: "Некоторые элиты в нашей стране впали в странное заблуждение, что мир следует древнему календарю, восходящему к майя. Кроме того, этот народ обладал знаниями, хранящими тайны вселенной. Можно было бы посмеяться над этими абсурдными идеями, если бы эту влиятельную группу не возглавлял [SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName]."
 lepsius.1608.t: "Панвавилонизм"
 lepsius.1608.d: "Группа людей вызвала переполох в обществе и науке, настаивая на том, что все знания исходят из Вавилона; даже иудейская и христианская религии — всего лишь имитация. [SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName] также участвует в этом «Клубе панвавилонистов», которые пытаются распространять свои идеи."
 lepsius.1608.g: "Это лженаука!"
 lepsius.1608.h: "Отлично."
 lepsius.1609.t: "Атлантизм"
 lepsius.1609.d: "[SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName] возглавляет эзотерическо-псевдонаучную группу, которая утверждает, что Атлантида — не миф, а исторический город, обладавший передовыми технологиями в ледниковый период. Кроме того, все культуры произошли от Атлантиды. Он хочет установить контакт с духами атлантов на еженедельных сеансах."
 lepsius.1609.h: "Кто может сказать, правда это или просто легенда?"
 lepsius.1609.i: "Есть веские доказательства существования Атлантиды."
 lepsius.1610.t: "Инвестиции в археологию"
 lepsius.1610.d: "Директор Археологического музея предложил поддержать подготовку новых специалистов. Однако это повлечёт за собой дополнительные расходы."
 lepsius.1610.f: "В институте дошли слухи, что правительство в настоящее время особенно заинтересовано в продвижении археологии в нашей стране. Дополнительная финансовая поддержка могла бы помочь нанять новых, многообещающих ассистентов."
 lepsius.1610.g: "Сделать музею дополнительное финансовое вливание."
 lepsius.1610.h: "Это того не стоит."
 lepsius.1611.t: "Билеты в музей"
 lepsius.1611.d: "Чтобы покрыть растущие расходы, музей вынужден повысить цены на билеты. Государство могло бы забрать дополнительную прибыль. Однако это может несколько повредить нашей репутации."
 lepsius.1611.f: "«Нет билета!»"
 lepsius.1611.g: "Повысить цены на билеты."
 lepsius.1611.h: "Снизить цены на билеты."
 lepsius.1611.i: "Билеты? Вход в музей должен быть бесплатным!"
 lepsius.1612.t: "[SCOPE.sCharacter('lepsius_director_scope').GetLastName]: Наследие"
 lepsius.1612.d: "Недавно скончавшийся директор музея [SCOPE.sCharacter('lepsius_director_scope').GetLastName] был уважаемым человеком. Он пользовался превосходной научной репутацией. Но недавнее открытие может омрачить его наследие."
 lepsius.1612.f: "Расследование показало, что [SCOPE.sCharacter('lepsius_director_scope').GetFullName] во время своего пребывания в должности неоднократно получал частные пожертвования от анонимных лиц. Однако он никогда не передавал эти артефакты в музей, а оставлял их себе. Хотя это всего лишь несколько отдельных предметов, они не менее ценны. Всей интеллигенции грозит настоящий скандал."
 lepsius.1612.g: "Правда должна выйти наружу!"
 lepsius.1612.h: "[SCOPE.sCharacter('lepsius_director_scope').GetFullName] был почтенным человеком."
 je_lepsius_pompeii: "Современные раскопки в Помпеях"
 je_lepsius_pompeii_reason: "Древнеримский город Помпеи, погребённый извержением Везувия в 79 году н.э., раскапывается с XVIII века. Однако во многих отношениях этот вид исследований можно в значительной степени охарактеризовать как грабёж, уничтожающий научный материал ради приобретения художественных сокровищ или уничтожающий ценный материал из-за чистого невежества. Новые археологические методы могли бы значительно улучшить исследование Помпей."
 je_lepsius_teotihuacan: "Теотиуакан"
 je_lepsius_teotihuacan_reason: "Теотиуакан уже ацтеками считался таинственным местом, возникшим задолго до их правления — для них этот разрушенный город должен был быть местом рождения богов. Действительно, многие свидетельства указывают на то, что Теотиуакан был древним городом, который влиял на большую часть Центральной Америки за столетия до империи ацтеков и является одним из крупнейших доколумбовых объектов в Америке. Поэтому у мексиканского правительства есть не только научные причины для более детального исследования этого места. Теотиуакан можно рассматривать как символ долгой, непрерывной культуры в Мексике и, таким образом, как предшественника нашей нации. Реконструкция частично разрушенной Пирамиды Солнца в Теотиуакане перед 100-летием независимости призвана подчеркнуть этот символизм и отпраздновать национальное единство и историю."
 je_lepsius_harappa: "Индская цивилизация"
 je_lepsius_harappa_reason: "Хотя место руин в Хараппе известно уже некоторое время и было впервые описано Чарльзом Мэссоном в 1844 году в его книге «Рассказ о различных путешествиях в Белуджистане, Афганистане и Пенджабе» как «разрушенное укрепление, построенное из кирпича», его значение до сих пор не полностью выяснено. Возможно, и в Индии есть ранее совершенно неизвестные археологические сокровища?"
 je_lepsius_first_emperor: "Гробница первого императора"
 je_lepsius_first_emperor_reason: "Китай — молодая нация в области археологии. Нашим исследователям нужно выезжать в мир и набираться опыта, чтобы углубить свои знания. Только когда у нас будет достаточно успехов и наши археологи будут достаточно подготовлены, мы сможем предпринять величайшее археологическое приключение: а именно, исследование гробницы Первого императора, задача, на которую ещё никто не осмеливался."
 lepsius.7.t: "Раскопки в Помпеях"
 lepsius.7.d: "В Помпеях, под руководством профессора [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName], будут испытаны новые научные методы. Это поворотный момент в истории раскопок Помпей. Однако фокус исследования ещё предстоит определить."
 lepsius.7.f: "Раскопки Джузеппе Фиорелли открыли новую главу в изучении и раскопках Помпей. Во время ранних раскопок на этом месте иногда находили пустоты в слое пепла, содержащие человеческие останки. Фиорелли понял, что это были пространства, оставленные разложившимися телами, и поэтому разработал технику впрыскивания в них гипса для воссоздания форм жертв Везувия. Эта техника используется и сегодня, при этом вместо гипса теперь используется прозрачная смола, потому что она более долговечна и не разрушает кости, что позволяет проводить дальнейший анализ. Фиорелли также ввёл научную документацию. Он разделил город на сегодняшние девять районов и кварталов и пронумеровал входы в отдельные дома. Фиорелли также издал первый периодический журнал с отчётами о раскопках. При его преемниках была вскрыта вся западная часть города."
 lepsius.7.g: "Нас в первую очередь интересуют артефакты."
 lepsius.7.h: "Нам нужно больше узнать о прошлом."
 lepsius.7.i: "Мы хотим подготовить новое поколение учёных."
 lepsius.8.t: "Пирамида Солнца в Теотиуакане"
 lepsius.8.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] смотрит на панораму Теотиуакана с самой высокой точки реконструированной пирамиды: этот престижный проект преодолел важный барьер, но до сих пор неясно, какую конкретную пользу страна извлечёт из раскопок."
 lepsius.8.f: "Теотиуакан на Центральном нагорье Мексики — один из важнейших доисторических мегаполисов-руин в Америке, наиболее известный своими ступенчатыми храмами, такими как Великая пирамида Солнца. Территория Теотиуакана была постоянно заселена с шестого века до нашей эры. Между 100 и 650 годами нашей эры город был доминирующим культурным, экономическим и военным центром Мезоамерики. На пике своего развития в нём могло проживать до 200 000 жителей. В своё время это был, безусловно, самый большой город на американском континенте и один из крупнейших в мире. Примерно с 650 года его значение снизилось, пока около 750 года он не был в значительной степени заброшен по не до конца понятным причинам. Его культурные влияния продолжали формировать центральную Мексику до испанского завоевания Мексики."
 lepsius.9.t: "Неизвестная цивилизация"
 lepsius.9.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] совершенно [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'поражена', 'поражён')]. Похоже, что [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'она нашла', 'он нашёл')] следы ранее совершенно неизвестной культуры, которая поселилась в долине Инда тысячи лет назад — и, следовательно, была бы колыбелью цивилизации, как Египет или Вавилон. Предстоят десятилетия исследований — но каковы приоритеты?"
 lepsius.9.f: "Индская цивилизация бронзового века, также известная как Индская цивилизация или Хараппская культура, была одной из самых ранних городских цивилизаций. Она существовала примерно между 2800 г. до н.э. и 1800 г. до н.э. вдоль Инда на северо-западе Индийского субконтинента. Индская цивилизация простиралась почти на всю территорию современного Пакистана, а также на части Индии и Афганистана. В 1912 году Дж. Флит нашёл в тогдашней Британской Индии печати с неизвестными символами, что вызвало интерес научной общественности в Европе. Затем в 1921/22 годах под руководством Джона Маршалла, тогдашнего директора Британской службы древностей, были проведены раскопки в Хараппе и Мохенджо-Даро. Сходство двух раскопанных городов быстро дало понять, что здесь была обнаружена ранее неизвестная развитая культура."
 lepsius.70.t: "Терракотовая армия"
 lepsius.70.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'сделала', 'сделал')] удивительное открытие, когда [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'исследовала', 'исследовал')] территорию вокруг мавзолея первого императора Цинь: армию, полностью сделанную из терракоты, которая по сей день защищает мёртвого императора."
 lepsius.70.f: "«В девятом месяце Первый император был погребён на горе Ли. Земляные и подготовительные работы на горе Ли начались, когда Первый император впервые взошёл на трон. Позже, после того как он объединил свою империю, туда было отправлено 700 000 человек со всей его империи. Они прокопали три слоя грунтовых вод и залили бронзу для внешнего гроба. Были построены дворцы и живописные башни для ста чиновников, а гробница была заполнена редкими артефактами и чудесными сокровищами. Ремесленникам было приказано сделать арбалеты и стрелы, готовые стрелять в любого, кто войдёт в гробницу. Ртуть использовалась для имитации сотен рек, Янцзы, Жёлтой реки и великого моря, и была настроена на механическое течение. Вверху были изображения небесных созвездий, внизу — черты земли. Свечи были сделаны из жира „человека-рыбы“, который, как рассчитано, будет гореть и не гаснуть долгое время». — Сыма Цянь"
 lepsius.70.g: "Древнее величие Китая поражает."
 lepsius.61.t: "Раскопки в [SCOPE.sState('lepsius_excavation_state').GetCustom('RU_SL_PP')]"
 lepsius.61.d: "Во время оккупации [SCOPE.sState('lepsius_excavation_state').GetCustom('RU_SL_RP')] в наши руки попали археологические группы и артефакты. Археологи настаивают на том, чтобы не прерывать научную работу и защитить место раскопок. Однако некоторые офицеры настаивают на том, что мы должны поживиться добычей."
 lepsius.61.f: "К сожалению, разграбление важных мест раскопок не является редкостью. Приближающиеся армии не всегда оправдывали свою репутацию хранителей и защитников художественных сокровищ. В некоторых случаях только перспектива вернуться с дополнительной добычей пробуждала желания амбициозных людей — почему то, что было верно во времена Суллы, должно быть иначе сегодня?"
 lepsius.61.g: "Разграбить место раскопок!"
 lepsius.61.h: "Защитить место раскопок."
 lepsius.62.t: "Место раскопок разграблено!"
 lepsius.62.d: "Война в одной из стран, где мы ведём раскопки, оставила свой след: вражеские войска заняли регион, в котором исследуется археологический объект, и в срочном порядке конфисковали артефакты, найденные там нашей командой, оставив за собой след разрушений."
 lepsius.62.f: "Археологические раскопки могут стать жертвами войны и разрушений — это также касается нейтральных археологических групп, которые не являются частью воюющей нации как третья сторона. Хищные нации могут затем воспользоваться артефактами, которые ещё не были возвращены в свои страны. Не волнуйтесь: раскопочная группа остаётся на месте, и раскопки не потеряны. Однако пройдёт три года, прежде чем археологи восстановят ущерб до такой степени, что станет возможна нормальная работа. В это время в наши музеи не будут поступать ежегодные артефакты с этого археологического объекта."
 lepsius.62.g: "Эти варвары!"
 lepsius_excavation_sacked_state_modifier: "Разграбленное место археологических раскопок"
 lepsius_excavation_protected_state_modifier: "Охраняемое место археологических раскопок"
 lepsius_4_excavation_team_needed_tt: "Иметь как минимум #G 4#! раскопочные группы."
 lepsius.2101.t: "Остатки римской битвы"
 lepsius.2101.f: "«Сэр, я нашёл ещё один гвоздь!»\n«Невероятно! Это укрепляет теорию о том, что это место было ареной древней битвы! Надеюсь, скоро мы найдём и кости!»"
 lepsius.2101.g: "Не престижное, но важное открытие!"
 lepsius.2102.t: "Обнаружена Villa Rustica"
 lepsius.2102.f: "«Villa Rustica была не просто крупным производителем сельскохозяйственных товаров, еды и напитков. Кроме того, она позволяла путешественникам отдыхать в пути и играла важную роль в снабжении легионов. Эти останки позволяют нам делать выводы о производстве продуктов питания, жизни римлян и сельском хозяйстве в Римской империи»."
 lepsius.2102.g: "Это многое расскажет нам о жизни сельских римлян!"
 lepsius.2103.t: "Обнаружены древнеримские таблички"
 lepsius.2103.f: "Клавдия Севера своей Лепидине шлёт привет.\n11 сентября, сестра, в день празднования моего дня рождения, я горячо приглашаю тебя приехать к нам, чтобы сделать этот день для меня более приятным своим приездом, если ты будешь здесь. Передай привет своему Цериалису. Мой Элий и мой маленький сын шлют ему привет.\nЯ буду ждать тебя, сестра. Прощай, сестра, моя дражайшая душа, дабы я процветала, и будь здорова.\nСульпиции Лепидине, жене Цериалиса, от Кл. Северы."
 lepsius.2103.g: "Не все сокровища из серебра и золота!"
 lepsius.2104.t: "Обнаружен клад римских монет"
 lepsius.2104.d: "Клады римских монет — редкая находка. Тем не менее, один такой был найден в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')]. Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] смог извлечь сокровище, которое, вероятно, было спрятано во времена кризиса для Римской империи."
 lepsius.2104.f: "«Интересно, найдут ли археологи в будущем когда-нибудь оставленные нами монеты и будут ли гадать, как они туда попали»."
 lepsius.2104.g: "Моя прелесть!"
 lepsius.2111.t: "Древнеперсидский саркофаг"
 lepsius.2111.f: "«Осторожно, осторожно. Мы не можем допустить, чтобы эта находка была повреждена. Пожалуйста, воздержитесь от использования лома!»"
 lepsius.2111.g: "Какая удивительная находка!"
 lepsius.2112.t: "Клад в персидском дворце"
 lepsius.2112.d: "Подсказка фермера привела [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] к затерянному персидскому дворцу ахеменидского периода. Во время последующих раскопок произошёл сюрприз."
 lepsius.2112.f: "Месопотамия была одной из основных провинций древней Персидской империи. Во время завоевания Ахемениды привезли на родину многочисленные произведения искусства, а также клинописные таблички. Тем не менее, для археологической команды было удивительно обнаружить целый архив месопотамских табличек в одной из секций найденного дворца."
 lepsius.2112.g: "Собрать их все!"
 lepsius.2113.t: "Египетская статуя в персидской гробнице"
 lepsius.2113.d: "Небольшие раскопки в гробнице персидского вельможи обнаружили маленькую фигурку египетского бога Тота."
 lepsius.2113.f: "Персы правили Египтом более века. Но и до, и после этого происходил культурный обмен между двумя цивилизациями, даже если между обеими империями были часты войны."
 lepsius.2113.g: "Как этот артефакт сюда попал?"
 lepsius.2114.t: "Монументальная надпись"
 lepsius.2114.d: "Оползень обнажил монументальную наскальную надпись в горе, которая ранее считалась утерянной. Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] сразу же отправился для оценки древнего отчёта."
 lepsius.2114.f: "Персидские наскальные надписи или рельефы занимают постоянное место в искусстве павшей империи. Самой известной является Бехистунская надпись, которая представляет собой многоязычную ахеменидскую царскую надпись и большой наскальный рельеф на скале у горы Бехистун в провинции Керманшах в Иране, установленный Дарием Великим. Она была важна для расшифровки клинописи, поскольку является самой длинной известной трёхъязычной клинописной надписью, написанной на древнеперсидском, эламском и вавилонском (разновидности аккадского) языках."
 lepsius.2114.g: "Важный первоисточник по истории Персии!"
 lepsius_state_trait_tikal: "Тикаль — город в джунглях"
 je_lepsius_tikal: "Тикаль — город в джунглях"
 je_lepsius_tikal_reason: "Экспедиция Стивенса и Кэтервуда вызвала большой интерес, особенно после выхода книги с многочисленными иллюстрациями затерянных городов майя. Но два искателя приключений нашли не все места. Множество неизвестных объектов всё ещё ждали своего переоткрытия. Одним из них был легендарный Тикаль."
 lepsius.71.t: "Тикаль — город в джунглях"
 lepsius.71.d: "После трудоёмких поисков в глубине джунглей Гватемалы экспедиция под руководством профессора [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] нашла легендарный город майя Тикаль. Историческое событие для нашей нации — но какой вывод мы должны из этого сделать?"
 lepsius.71.f: "Тикаль — древний город майя в тропических лесах Петен на севере Гватемалы с примечательными ступенчатыми храмами. Это был один из самых важных городов классического периода майя (III-IX века) и один из наиболее хорошо исследованных городов майя. Первые следы поселения относятся к началу I тысячелетия до н.э. Во II веке началось фактическое городское развитие со строительством храмов, стел и дворцово-храмовых комплексов. Первый пик был достигнут в V веке, когда могущественная правящая династия подчинила одно за другим небольшие государства в окрестностях и превратила их в вассальные царства, что привело к долгосрочному конфликту с могущественным соседним государством Калакмуль. Второй пик Тикаль пережил в VIII веке после поражения Калакмуля как соперника. В начале IX века власть Тикаля ослабла, и строительство прекратилось. Не позднее X века город был полностью заброшен."
 LEPSIUS_NO_MORE_EXPEDITIONS_FOR_YEARS_TT: "Вы #n не сможете#! проводить никаких [Concept('concept_lepsius_expedition', 'археологических экспедиций')] в течение #n 3-5 лет#!, так как ваш [concept_lepsius_archaeologist|l] будет [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'занята', 'занят')] каталогизацией находок."
 LEPSIUS_SUB_TEAM_WITH_EXPLANATION_TT: "Потерять #R 1#! [Concept('concept_lepsius_archaeological_team', 'археологическую группу')]. Вы можете вернуть её #p обратно#! после [Concept('concept_lepsius_expedition', 'археологической экспедиции')] или оставить там для [Concept('concept_lepsius_excavation', 'раскопок')], если вы исследовали #V технологию ранней археологии#!."
 lepsius_long_expedition_tt: "Длительная [concept_lepsius_expedition|l] займёт около #V 1 года#!. После экспедиции ваш [concept_lepsius_archaeologist|l] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'должна будет', 'должен будет')] каталогизировать находки, и вы #p не сможете#! проводить другую экспедицию в течение #n 5 лет#!."
 lepsius_medium_expedition_tt: "Средняя [concept_lepsius_expedition|l] займёт около #V 10 месяцев#!. После экспедиции ваш [concept_lepsius_archaeologist|l] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'должна будет', 'должен будет')] каталогизировать находки, и вы #p не сможете#! проводить другую экспедицию в течение #n 4 лет#!."
 lepsius_short_expedition_tt: "Короткая [concept_lepsius_expedition|l] займёт около #V 8 месяцев#!. После экспедиции ваш [concept_lepsius_archaeologist|l] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'должна будет', 'должен будет')] каталогизировать находки, и вы #p не сможете#! проводить другую экспедицию в течение #n 3 лет#!."
 lepsius_leave_team_for_excavation_tt: "Вы позволите вашей [Concept('concept_lepsius_archaeological_team', 'археологической группе')] организовать [Concept('concept_lepsius_excavation', 'раскопки')], которые обычно будут приносить #V 1#! [concept_lepsius_artifact|l] #V ежегодно#!."
 lepsius.2101.d: "Когда гражданин нашёл железный кинжал в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')], [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'собрала', 'собрал')] команду и [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'начала', 'начал')] раскопки. Они нашли различные остатки древнеримской битвы, от частей щита до гвоздей и нескольких монет. Монеты позволили археологам довольно точно датировать битву."
 lepsius.2102.d: "Фермер нашёл древние останки на одном из своих полей. К счастью, он связался с университетом, и доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] смог обнаружить древнюю Villa Rustica в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')]. Разнообразие археологических находок позволяет сделать выводы о жизни римского населения в сельской местности."
 lepsius.2103.d: "Обнаружение различных римских табличек из тонкого дерева в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')] празднуется среди археологов. Хотя доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] смог расшифровать лишь немногие таблички с помощью современных методов, даже эти немногие открывают окно в римскую жизнь."
 lepsius.2111.d: "В [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')] была сделана необычайная находка из древней Персидской империи. Фермер нашёл старый бронзовый саркофаг и связался с доктором [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]. Благодаря своему опыту, доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] смог открыть саркофаг и обнаружил скелет, покрытый роскошными украшениями. Украшения предполагают, что это был ахеменидский сановник."
 lepsius.2121.t: "Доисторическая костяная флейта"
 lepsius.2121.d: "Турист наткнулся на странную кость в пещере в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')]. После обращения в местный университет в пещеру был отправлен доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]. Он нашёл кость, но это была не просто кость, а доисторическая костяная флейта!"
 lepsius.2121.f: "«Чистый, высокий свист костяной флейты — это ангельский звук, который жутко завораживает всех»."
 lepsius.2121.g: "На ней ещё можно играть музыку?"
 lepsius.2122.t: "Найден наскальный рисунок"
 lepsius.2122.d: "В [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')] появилось новое произведение искусства. Недавно обнаруженная пещера удивила своих исследователей доисторической росписью. Быстро прибыл доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] и создал иллюстрацию росписей. Покинув пещеру, её заперли, чтобы защитить росписи от человеческого влияния."
 lepsius.2122.f: "По стенам пещеры бежали различные животные прошлого. В огне факела казалось, что они движутся. Это было феноменальное произведение искусства, покрывавшее целую сторону пещеры. Художник запечатлел диких существ динамичными штрихами куска угля, а затем раскрасил их коричневым и чёрным. В наше современное время это можно было бы даже сравнить с произведениями наших величайших художников!"
 lepsius.2122.g: "Это искусство?"
 lepsius.2123.t: "Обнаружена доисторическая статуэтка"
 lepsius.2123.d: "В [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')] была обнаружена доисторическая статуэтка каменного века. Многим не нравится её вид, так как у маленькой статуэтки из слоновой кости, кажется, большие бёдра и грудь. Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ещё не уверен, для чего предназначалась статуэтка: была ли это богиня или просто талисман?"
 lepsius.2123.f: "«Как вы смеете выставлять такое уродство! Это приведёт нашу молодёжь к похоти и непристойности. Это недопустимо!»"
 lepsius.2123.g: "Это должна быть богиня плодородия!"
 lepsius.2124.t: "Найдены кости и каменные орудия"
 lepsius.2124.d: "Большое количество каменных орудий и костей было раскопано в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')]. Профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] был немедленно отправлен для расследования. Он действительно нашёл много костей, по-видимому, костей всего на свете, а также некоторые каменные артефакты."
 lepsius.2124.f: "«Я думаю, это кость оленя. Или человека? Может, динозавра? Акулы? Огромной обезьяны? Кости — это действительно не моя область знаний...»"
 lepsius.2124.g: "Постойте! Что это за кости? Современные? Доисторические? Динозавров?"
 je_lepsius_dreamtime: "Время сновидений"
 je_lepsius_dreamtime_reason: "Британский этнолог Уолтер Болдуин Спенсер и его австралийский коллега Фрэнсис Джеймс Гиллен перевели слово «альхеринга» с центральноавстралийского языка аранта как «сновидение». Для аборигенов время сновидений — это духовный, природный и моральный порядок космоса. В этом контексте «сновидение» означает коллективную способность правильно понимать и использовать мир и его связи, размышлять о мифическом мире в рамках культового акта и обладать жизненной силой. Ряд мест поклонения, связанных с этим Временем сновидений, другие мифы аборигенов, а также археологические и антропологические останки разбросаны по всей Австралии. Пришло время тщательно изучить прошлое последнего континента."
 lepsius_2_excavation_team_needed_tt: "Иметь как минимум #G 2#! раскопочные группы."
 lepsius.72.t: "Время сновидений"
 lepsius.72.d: "Во время своего путешествия по Австралии профессора [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] и [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetLastName] провели ценные научные исследования, которые проливают свет на ранее неисследованное прошлое континента."
 lepsius.72.f: "После своего возвращения учёные удивили Академическое общество целой серией впечатляющих находок. Они сделали рисунки и эскизы наскальных рисунков, привезли кости, которым тысячи лет, извлекли артефакты древней и новейшей истории, а также записали мифы и истории аборигенов. Никто из коллег не ожидал такой богатой добычи."
 lepsius.72.g: "О, тут даже диджериду!"
 je_lepsius_gwanggaeto: "Стела Квангэтхо"
 je_lepsius_gwanggaeto_reason: "Стела Квангэтхо — это памятный камень Квангэтхо, который был королём Когурё с 391 года до своей смерти. Стела находится в Китае, недалеко от границы с Северной Кореей. Надпись, высеченная на стеле, является самым древним и подробным сохранившимся источником по истории королевства Когурё. Когда королевство Когурё и его преемник Бохай пали в 668 году, регион вокруг Куннэ и Ванду потерял своё значение. После маньчжурского завоевания Китайской империи в 1644 году императоры новой династии Цин объявили широкую зону к северу от реки Ялуцзян запретной. Лишь во второй половине XIX века этот район был снова открыт для заселения. Около 1876 года китайский чиновник вновь открыл стелу, которая была полностью заросла и частично ушла в землю."
 lepsius_gwanggaeto_modifier: "Наследие Когурё"
 lepsius.73.t: "Стела Квангэтхо"
 lepsius.73.d: "Случайное обнаружение большой стелы времён затерянной империи Когурё не только даёт представление о ранее неизвестном прошлом, но и ставит загадки — загадки, содержащие политическую взрывчатку."
 lepsius.74.t: "Когурё — корейская империя"
 lepsius.74.d: "После обнаружения стелы, посвящённой королю Квангэтхо, Китай смело заявил, что это было доказательством того, что Когурё было не корейским государством, а китайским — или, по крайней мере, зависимым от Китая государством. Япония, однако, утверждает, что это доказывает японское правление на юге Кореи."
 lepsius.75.t: "Вторжение Ва"
 lepsius.75.d: "Недавно обнаруженная стела Квангэтхо свидетельствует об успешном японском вторжении в Южную Корею и подчинении тамошних государств."
 lepsius.73.f: "Стела, обнаруженная [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName], является массивным памятником, возможно, даже самой большой существующей стелой в мире. Хотя это уникальный источник для построения истории государства Когурё в северной Корее и южной Маньчжурии, трудночитаемые части, а также спор об идентичности королевства Когурё имеют политические последствия, которые нельзя сбрасывать со счетов, особенно во времена, когда национализм пробудился и в дальневосточных государствах. Королевство Когурё имеет глубокие исторические и культурные связи с современными корейскими этническими группами, но Китай не без оснований обеспокоен тем, что многонациональная часть южной Маньчжурии, которая была центром Когурё, может быть востребована ирредентистскими корейскими националистами. С другой стороны, отрывок о возможном вторжении Японии (Ва) породил спекуляции о японском правлении в Южной Корее, в то время как корейская интерпретация утверждает о вторжении в Японию со стороны корейских государств."
 lepsius.73.g: "Поучительное прошлое, которое стоит расшифровать."
 lepsius.73.h: "Когурё было важным китайским государством."
 lepsius.73.i: "Это подчёркивает, что Южная Маньчжурия изначально была корейской землёй."
 lepsius.73.j: "Намёк на японское влияние на Корею."
 lepsius.2131.t: "Фрагменты черепов найдены в ацтекском поселении"
 lepsius.2131.d: "В [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')] было сделано ужасное открытие. Различные фрагменты черепов привели доктора [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] к мысли, что это было местоположение цомпантли, стойки для черепов."
 lepsius.2131.f: "Ацтеки имели обыкновение приносить в жертву пленных Цветочных войн. Часто черепа этих человеческих жертв затем собирались в цомпантли или стойку для черепов. Часто черепа просто складывали друг на друга, чтобы создать своего рода стену из черепов. Некоторые храмы даже имеют каменные стены, в которые каменотёсы вырезали черепа в качестве украшения."
 lepsius.2131.g: "Как жестоко!"
 lepsius.2132.t: "Ацтекская надпись спасена местным учёным"
 lepsius.2132.d: "Когда в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')] меняли брусчатку, никто не думал, что камни мостовой откроют археологическое открытие, но местный учёный нашёл на камнях различные ацтекские надписи. На место был вызван профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], и он смог спасти надписи."
 lepsius.2132.f: "Находка изображает некую битву, которую вели мешики. Мы пока не уверены, что означает весь науатль, но есть много топонимов. Так что, по крайней мере, мы можем выяснить, какие места упоминаются."
 lepsius.2132.g: "Слава богу, он смог найти это, прежде чем оно превратилось в мостовую."
 lepsius.2133.t: "Обнаружены руины ацтеков"
 lepsius.2133.d: "В [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')] были обнаружены древние руины ацтеков. Профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] немедленно начал раскопки. К сожалению, кроме самих зданий, найти удалось немногое."
 lepsius.2133.f: "«Хотя руины уже были разграблены, они позволяют получить представление о жизни народа мешиков до прихода европейцев. Это всё равно важная находка для нас!»"
 lepsius.2133.g: "Интересно."
 lepsius.2134.t: "Обнаружено обсидиановое зеркало"
 lepsius.2134.d: "В [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')] был обнаружен шедевр ацтекского ремесла. Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] смог извлечь идеальное обсидиановое зеркало, используемое ацтеками в их религиозных ритуалах."
 lepsius.2134.f: "«Считалось, что обсидиановые зеркала — это средство общения с подземным миром. Один бог, Тескатлипока, даже изображался с зеркалом вместо ноги. Это великая археологическая находка!»"
 lepsius.2134.g: "Невероятно!"
 lepsius.2141.t: "Обнаружено карфагенское кораблекрушение"
 lepsius.2141.d: "Ныряльщики за жемчугом в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')] обнаружили древнее карфагенское кораблекрушение. Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] решил, что корабль пока останется в море, но благодаря ныряльщикам груз удалось проанализировать и задокументировать, что позволило получить новые сведения о карфагенских торговых путях."
 lepsius.2141.f: "«Здесь много пурпурной ткани, которая, вероятно, предназначалась для знати разных стран»."
 lepsius.2141.g: "Величайшие торговцы Средиземноморья!"
 lepsius.2142.t: "Выброшенный на берег пунический военный корабль"
 lepsius.2142.d: "Кто бы мог подумать, что карфагеняне, владыки морей, сядут на мель. Ну, по-видимому, это случилось в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')]. Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] смог извлечь много находок с некогда могучего боевого корабля. Дерево, однако, уже в основном разложилось."
 lepsius.2142.f: "«Это бирема, трирема, квинквирема или ещё более рема?»"
 lepsius.2142.g: "Некогда великолепный корабль!"
 lepsius.2143.t: "Обнаружен пунический порт"
 lepsius.2143.d: "Древний порт Карфагена был обнаружен в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')]. Профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] приказал провести тщательное исследование объекта. К сожалению, удалось восстановить лишь часть, так как богатый промышленник хотел немедленно построить там новую фабрику."
 lepsius.2143.f: "«По крайней мере, мы смогли найти несколько амфор. Наверняка они многое расскажут нам о древней средиземноморской торговле»."
 lepsius.2143.g: "Целый неизвестный порт! Какое открытие!"
 lepsius.2144.t: "Обнаружены монеты из древнего Карфагена"
 lepsius.2144.d: "Клад древних монет был раскопан фермером в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')]. К сожалению, даже тщательное расследование, которое провёл доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], не принесло больше пунических артефактов. Загадка, как монеты оказались на этом поле."
 lepsius.2144.f: "«На этой монете изображён Гасдрубал, брат Ганнибала. Очевидно, это должна быть относительно новая монета»."
 lepsius.2144.g: "Теперь я богат!"
 lepsius.2151.t: "Обнаружен кельтский котёл"
 lepsius.2151.d: "Кельты использовали котлы по многим причинам. Теперь один из этих огромных котлов был найден в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')]. Профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] смог заполучить этот огромный кусок металлического изделия в нашу коллекцию."
 lepsius.2151.f: "«Существует легенда, что великий воин упал в котёл с волшебным зельем, которое дарует каждому, кто его выпьет, нечеловеческую силу. По-видимому, тот воин был настолько силён, что мог поднимать огромные камни. Он также любил сражаться с римлянами»."
 lepsius.2151.g: "Надеюсь, ещё никто не упал в волшебный котёл!"
 lepsius.2152.t: "Найдено покрытие кельтского бронзового щита"
 lepsius.2152.d: "В илистом русле реки в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')] была найдена бронзовая пластина. Когда прибыл доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'смогла', 'смог')] определить, что металлическая пластина когда-то была частью кельтского щита."
 lepsius.2152.f: "«Некоторые истории гласят, что кельтских вождей носили на щитах, но это, скорее всего, детская сказка. Тацит, однако, рассказывает нам о вождях, которых поднимали на щите, когда их объявляли новыми вождями. Это может быть историческим источником этих историй»."
 lepsius.2152.g: "Щит, достойный великого вождя!"
 lepsius.2153.t: "Найден кельтский бронзовый шлем"
 lepsius.2153.d: "Рогатый бронзовый шлем был найден в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')]. Профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] быстро определил, что на самом деле это был не шлем, который носили в бою, а кельтский культовый предмет."
 lepsius.2153.f: "«Возможно, вы видели изображения кельтов в шлемах с крыльями или рогами, но эти изображения неверны. В бою такой шлем был бы помехой. Такие шлемы существовали, но часто были просто культовыми предметами, относящимися к определённым кельтским богам»."
 lepsius.2153.g: "Какой великолепный шлем!"
 lepsius.2154.t: "Обнаружен древний менгир"
 lepsius.2154.d: "Во время одной из своих прогулок по сельской местности доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] странный камень в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')]. Оказалось, что это кельтский менгир, некогда воздвигнутый местным кельтским племенем. Теперь доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] тщательно изучает менгир."
 lepsius.2154.f: "«Мы не знаем, почему кельты воздвигали менгиры, так как они не оставили письменных свидетельств. Но это вполне может быть какое-то культовое место. У некоторых местных есть своя история о знаменитом воине и его могучем псе. Этот Обеликс, по-видимому, делал идеально ровные менгиры и воздвигал их без посторонней помощи. Впрочем, это просто глупая история»."
 lepsius.2154.g: "Это была работа Обеликса?"
 lepsius.2161.t: "Найдена эгейская фреска"
 lepsius.2161.d: "Местные раскопки эгейских руин обнаружили великолепную фреску в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')]. Профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] приказал сделать чертежи находки, так как фреска связана с руинами."
 lepsius.2161.f: "«Эти узоры поразительны! Хотелось бы, чтобы мы создавали такую красоту и в наше время!»"
 lepsius.2161.g: "Это искусство!"
 lepsius.2162.t: "Обнаружены эгейские руины"
 lepsius.2162.d: "Во время строительных работ в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')] были обнаружены древние эгейские руины. Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] начал тщательное исследование объекта. К сожалению, находок осталось немного, но руины могут помочь понять жизнь людей, которые когда-то здесь жили."
 lepsius.2162.f: "«Эти арки стоят здесь тысячелетиями. Интересно, выживут ли наши здания так же долго...»"
 lepsius.2162.g: "Это многое расскажет нам о жизни в древнем Эгейском море."
 lepsius.2163.t: "Найдены эгейские украшения"
 lepsius.2163.d: "По счастливой случайности фермер наткнулся на увлекательную находку в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')]. Когда прибыл профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'смогла', 'смог')] лишь восхититься увлекательными эгейскими украшениями."
 lepsius.2163.f: "«Такие красивые украшения. Хотелось бы, чтобы мы могли создавать подобные ювелирные изделия и сегодня!»"
 lepsius.2163.g: "Замечательное мастерство!"
 lepsius.2164.t: "Золотая чаша эгейского происхождения"
 lepsius.2164.d: "Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] смог обнаружить золотую чашу на одном из наших местных раскопок. Никто не ожидал такой чудесной находки, но, по-видимому, [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] всё ещё предлагает много возможностей для великих находок."
 lepsius.2164.f: "«На чаше изображена сцена с человеком и несколькими быками. Быки довольно динамичны и в разных позах»."
 lepsius.2164.g: "Я бы хотел такую чашу!"
 lepsius.2171.t: "Египетские настенные росписи"
 lepsius.2171.d: "Древнеегипетские настенные росписи были найдены профессором [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] во время одной из его поездок в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')]. Настенные росписи изображают сцены из Древнего Египта."
 lepsius.2171.f: "«Удивительно то, что на стенах всё ещё есть роспись, в то время как в Греции всё просто белое. Но, по-видимому, египтяне либо гораздо больше любили цвета, либо пустыня лучше сохранила краски»."
 lepsius.2171.g: "Замечательные картины!"
 lepsius.2172.t: "Обнаружен древнеегипетский храм"
 lepsius.2172.d: "Кто бы мог подумать, что в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')] всё ещё есть неизвестные храмы? По-видимому, есть, и профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] нашёл один под песком. Это великая находка, хотя всё ценное давно исчезло."
 lepsius.2172.f: "«Посмотрите на этот храм! Можете ли вы представить себе религиозные церемонии, происходящие здесь? Разве это не удивительно?»"
 lepsius.2172.g: "Здесь так много можно узнать!"
 lepsius.2173.t: "Найдена египетская статуя"
 lepsius.2173.d: "Несмотря на то, что статуя сломана, это всё равно великое произведение неизвестного египетского каменотёса. Статуя, найденная в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')], вероятно, раньше изображала сокола, прежде чем сломалась. По крайней мере, так считает доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]."
 lepsius.2173.f: "«Может, это и не выглядит чем-то особенным, но эта статуя многое расскажет нам о том, как египтяне создавали такие статуи!»"
 lepsius.2173.g: "Это фантастические работы каменотёсов!"
 lepsius.2174.t: "Обнаружена египетская мумия"
 lepsius.2174.d: "Мумии, вероятно, одна из самых распространённых находок в Египте. Эта была найдена в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')]. Профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] начал очень тщательно её изучать, но у некоторых людей есть... другие идеи."
 lepsius.2174.f: "«Только представьте, если бы мы могли использовать этих мумий, чтобы выяснить, что ели люди Древнего Египта, что они пили, насколько они были здоровы. Это было бы фантастически!»"
 lepsius.2174.g: "Смерть — это только начало."
 lepsius.2174.h: "Я слышал, некоторые любят есть мумий! Давайте продадим её!"
 lepsius.2181.t: "Обнаружено место эллинистической битвы"
 lepsius.2181.d: "Войны диадохов опустошили многие районы мира. В [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')], например, похоже, произошла ограниченная битва. Была ли она частью войны диадохов, ещё предстоит определить — профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] нашёл различные виды оружия и части доспехов."
 lepsius.2181.f: "«Здесь, должно быть, была небольшая битва. Не такая большая, как другие, но всё же важная. Я уверен, мы узнаем больше об этом месте!»"
 lepsius.2181.g: "Какая жалость, эти войны..."
 lepsius.2182.t: "Найдены эллинистические монеты"
 lepsius.2182.d: "Древние эллины оставили свои следы в дальних уголках мира, от Средиземноморья до Индии. Часто можно найти монеты, как это случилось в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')]. Благодаря монетам доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] сможет определить греческое присутствие в регионе."
 lepsius.2182.f: "«Думаю, теперь я богат!»"
 lepsius.2182.g: "Захватывающе!"
 lepsius.2183.t: "Раскопаны эллинистические руины"
 lepsius.2183.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] — новейшее место, где можно найти эллинистические руины. Эллинистические города можно найти от Испании до Индии. Профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] считает, что этот конкретный город расскажет нам больше о греческих поселениях."
 lepsius.2183.f: "«Можете ли вы представить себе одну культуру, охватывающую такое огромное расстояние? Это поистине невероятно!»"
 lepsius.2183.g: "Греческие города просто повсюду, не так ли?"
 lepsius.2184.t: "Изображение греческого бога"
 lepsius.2184.d: "Греческие боги и их религия путешествовали в дальние страны. В [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')] недавно было обнаружено изображение греческого бога. Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] определил, что это должен быть Дионис, греческий бог вина."
 lepsius.2184.f: "«Как гласит греческая история, не успел Дионис родиться, как Зевс зашил его в своё бедро и унёс в Нису в Эфиопии за Египтом; а что касается Пана, то греки не знают, что с ним стало после его рождения. Поэтому мне ясно, что греки узнали имена этих двух богов позже, чем имена всех остальных, и относят рождение обоих ко времени, когда они получили это знание».\n— Геродот"
 lepsius.2184.g: "Давайте выпьем немного вина за это открытие!"
 lepsius.2500.t: "Новая археологическая карта [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_RP')]"
 lepsius.2500.d: "Профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] усердно работал над тем, чтобы занести на карту все археологические находки последних лет в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')]. Эта карта позволяет сделать выводы о том, где возможны дальнейшие находки."
 lepsius.2500.f: "«Здесь мы нашли несколько гвоздей, а там — кости овцы! Разве это не невероятно?!»"
 lepsius.2500.g: "Это откроет двери для новых находок!"
 lepsius.2501.t: "Иллюстрированный археологический каталог [GetPlayer.GetAltName('RU_CL_RP')]"
 lepsius.2501.d: "Профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] — не только грозный археолог, но и удивительный художник. Благодаря этому навыку он смог опубликовать «Иллюстрированный археологический каталог [GetPlayer.GetAltName('RU_CL_RP')]», который многие непрофессионалы считают удивительным введением в археологию."
 lepsius.2501.f: "«Посмотрите на эти иллюстрации! Кажется, будто мы в музее и можем видеть объекты прямо перед собой! Удивительно!»"
 lepsius.2501.g: "Замечательная книга!"
 lepsius.2502.t: "Новый каталог всех археологических находок [GetPlayer.GetAltName('RU_CL_RP')]"
 lepsius.2502.d: "Своим новым каталогом всех археологических находок в [GetPlayer.GetAltName('RU_CL_PP')] доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] проделал усердную работу, которую вряд ли кто-то считал возможной. Благодаря его выдающемуся труду у нас теперь есть точный каталог всех находок, сделанных на сегодняшний день, в 7 томах."
 lepsius.2502.f: "«Номер 7342: кусок камня, вероятно, неолитический, по имени Рокки»."
 lepsius.2502.g: "Это будет полезно в будущем!"
 lepsius.2503.t: "Профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] пресекает контрабанду артефактов"
 lepsius.2503.d: "После нескольких месяцев работы доктору [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] удалось арестовать контрабандную сеть, которая перевозила артефакты через нашу страну. Артефакты были изъяты и теперь надёжно хранятся в нашей коллекции."
 lepsius.2503.f: "«Вы уничтожили ценные археологические сведения, негодяи!»"
 lepsius.2503.g: "Этому место в музее!"
 lepsius.2600.t: "Потерянная звезда"
 lepsius.2600.d: "Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] всегда был озадачен древними изображениями звёзд, поскольку они, казалось, не отражали звёзды, которые мы видим сегодня. Благодаря помощи профессора [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] он наконец смог выяснить, в чём дело. Вместе они открыли новую звезду на ночном небе."
 lepsius.2600.f: "«Там! Вот она, как мне рассказывали древние египтяне! Мы наконец-то нашли потерянную звезду!»"
 lepsius.2600.g: "Огромное научное открытие!"
 lepsius.2601.t: "Оценка дат исторических событий с использованием астрономических знаний о солнечных затмениях"
 lepsius.2601.d: "В совместном усилии профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] и профессор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] смогли использовать современные астрономические знания о солнечных затмениях для датировки конкретных исторических событий в первоисточниках."
 lepsius.2601.f: "«Очевидно, Фалес Милетский говорил о солнечном затмении 28 мая 585 года до н.э., а не о каком-либо другом солнечном затмении!»"
 lepsius.2601.g: "Это огромный шаг для археологии."
 lepsius.2602.t: "Обзор астрономических знаний прошлых культур"
 lepsius.2602.d: "Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] и профессор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] выпустили новую книгу с обзором астрономических знаний древних цивилизаций."
 lepsius.2602.f: "«Да, они знали, что Земля не является центром чего-либо. Нет, даже тогда они не были настолько глупы, чтобы верить, что Земля плоская. Да, я в этом абсолютно уверен»."
 lepsius.2602.g: "Интересное чтиво!"
 lepsius.2603.t: "Воссоздана паровая машина Герона"
 lepsius.2603.d: "Когда профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] и доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] заговорили о древней паровой машине Герона, последний сразу же загорелся идеей сделать реконструкцию. Вместе они построили небольшую реконструкцию эолипила."
 lepsius.2603.f: "«Как видите, у эолипила отсутствует средство передачи мощности. Поэтому это скорее игрушка, чем настоящая машина. К сожалению, она так и не получила дальнейшего развития»."
 lepsius.2603.g: "Как они не индустриализировались?"
 lepsius_illustrated_archaeological_catalog_modifier: "Написал иллюстрированный археологический каталог"
 lepsius.12.f: "В настоящее время в Египетской коллекции #p [ROOT.Var('lepsius_egyptian_artifact_minor').GetValue]#! @lepsius_egypt_minor! малых артефактов и #p [ROOT.Var('lepsius_egyptian_artifact_major').GetValue]#! @lepsius_egypt_major! крупных артефактов. \n\n Египетская коллекция может быть #T перегруппирована#!, что позволит организовать новую выставку. Однако для этого требуется определённое количество артефактов. \n\n Для #T малой выставки#! требуется #p 10#! @lepsius_egypt_minor! артефактов, для #T средней выставки#! — #p 25#! @lepsius_egypt_minor! артефактов, для #T большой выставки#! — #p 50#! @lepsius_egypt_minor!, а для #T превосходной выставки#! — #p 100#! @lepsius_egypt_minor!. Кроме того, для #T превосходной выставки#! требуется #p 1#! @lepsius_egypt_major! крупный артефакт. \n\n Перегруппировка коллекции и подготовка к новой выставке займут около полугода. Бонусы от выставки остаются постоянными — до тех пор, пока она не будет снова перегруппирована."
 lepsius.13.f: "В настоящее время в Месопотамской коллекции #p [ROOT.Var('lepsius_mesopotamian_artifact_minor').GetValue]#! @lepsius_mesopotamia_minor! малых артефактов и #p [ROOT.Var('lepsius_mesopotamian_artifact_major').GetValue]#! @lepsius_mesopotamia_major! крупных артефактов. \n\n Месопотамская коллекция может быть #T перегруппирована#!, что позволит организовать новую выставку. Однако для этого требуется определённое количество артефактов. \n\n Для #T малой выставки#! требуется #p 10#! @lepsius_mesopotamia_minor! артефактов, для #T средней выставки#! — #p 25#! @lepsius_mesopotamia_minor! артефактов, для #T большой выставки#! — #p 50#! @lepsius_mesopotamia_minor!, а для #T превосходной выставки#! — #p 100#! @lepsius_mesopotamia_minor!. Кроме того, для #T превосходной выставки#! требуется #p 1#! @lepsius_mesopotamia_major! крупный артефакт. \n\n Перегруппировка коллекции и подготовка к новой выставке займут около полугода. Бонусы от выставки остаются постоянными — до тех пор, пока она не будет снова перегруппирована."
 lepsius.14.f: "В настоящее время в Эгейской коллекции #p [ROOT.Var('lepsius_aegean_artifact_minor').GetValue]#! @lepsius_aegean_minor! малых артефактов и #p [ROOT.Var('lepsius_aegean_artifact_major').GetValue]#! @lepsius_aegean_major! крупных артефактов. \n\n Эгейская коллекция может быть #T перегруппирована#!, что позволит организовать новую выставку. Однако для этого требуется определённое количество артефактов. \n\n Для #T малой выставки#! требуется #p 10#! @lepsius_aegean_minor! артефактов, для #T средней выставки#! — #p 25#! @lepsius_aegean_minor! артефактов, для #T большой выставки#! — #p 50#! @lepsius_aegean_minor!, а для #T превосходной выставки#! — #p 100#! @lepsius_aegean_minor!. Кроме того, для #T превосходной выставки#! требуется #p 1#! @lepsius_aegean_major! крупный артефакт. \n\n Перегруппировка коллекции и подготовка к новой выставке займут около полугода. Бонусы от выставки остаются постоянными — до тех пор, пока она не будет снова перегруппирована."
 lepsius.15.f: "В настоящее время в Доколумбовой коллекции #p [ROOT.Var('lepsius_precolumbian_artifact_minor').GetValue]#! @lepsius_precolumbian_minor! малых артефактов и #p [ROOT.Var('lepsius_precolumbian_artifact_major').GetValue]#! @lepsius_precolumbian_major! крупных артефактов. \n\n Доколумбова коллекция может быть #T перегруппирована#!, что позволит организовать новую выставку. Однако для этого требуется определённое количество артефактов. \n\n Для #T малой выставки#! требуется #p 10#! @lepsius_precolumbian_minor! артефактов, для #T средней выставки#! — #p 25#! @lepsius_precolumbian_minor! артефактов, для #T большой выставки#! — #p 50#! @lepsius_precolumbian_minor!, а для #T превосходной выставки#! — #p 100#! @lepsius_precolumbian_minor!. Кроме того, для #T превосходной выставки#! требуется #p 1#! @lepsius_precolumbian_major! крупный артефакт. \n\n Перегруппировка коллекции и подготовка к новой выставке займут около полугода. Бонусы от выставки остаются постоянными — до тех пор, пока она не будет снова перегруппирована."
 lepsius.99.t: "Перемещение Археологического музея"
 lepsius.99.d: "У нас есть [GetBuildingType('building_lepsius_archaeological_museum').GetName], но он расположен не в нашей великолепной столице. Очевидно, мы должны переместить его в столицу!"
 lepsius.99.f: "«Пожалуйста, будьте осторожны с вазами, они очень хрупкие! Нет! Нельзя просто так бросать их в ящик, им нужна какая-то подкладка! Я действительно не думаю, что это отличная идея!»"
 lepsius.99.g: "Теперь я могу ходить туда каждый день!"
 lepsius.140.d: "Наш археолог [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'использовала', 'использовал')] свои связи, чтобы нанять высококвалифицированный персонал для экспедиции."
 lepsius.250.f: "Началось всё со спора, за которым последовали проклятия, угрозы и, наконец, кулаки. Инцидент закончился полномасштабной дракой в таверне. В самом центре: наш руководитель экспедиции. Его вспыльчивость стоила нам большой репутации. Отчёт о промахе дошёл до высокопоставленного сановника этим утром. Мы избежали крупного дипломатического инцидента, но дурное впечатление останется надолго."
 lepsius.260.f: "Хорошие новости! Как оказалось, наш руководитель экспедиции [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'проявила', 'проявил')] себя как безупречный [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetCustom('academics_gentleman_or_gentlewoman_type')] во время своей поездки. [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'Её', 'Его')] тактичное и харизматичное поведение приравнивается к типичному поведению #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFlag]ой#! страны. Репутация нашей нации там значительно выросла."
 lepsius.270.d: "Руководитель нашей экспедиции выделяется прежде всего тем, что [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] каждый день сидит в кафе, чтобы пить газировку и есть мороженое."
 lepsius.270.f: "Есть амбициозные лидеры, которые весь день только и делают, что работают. Они хотят достичь великих целей или накопить богатство. Некоторые хотят прославиться своими делами. Другие одержимы каждой деталью. Но не наш археологический директор. [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'Она', 'Он')] [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'привыкла', 'привык')] каждый день спасаться от жары, поглощая газировку и мороженое. Это можно было бы назвать ленью. Для других это признак человеческой элегантности, хорошего вкуса и правильных жизненных приоритетов."
 lepsius.280.d: "Благодаря дипломатическим навыкам нашего руководителя экспедиции, [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она была приглашена и вознаграждена', 'он был приглашён и вознаграждён')] местным губернатором."
 lepsius.311.d: "Руководитель последней археологической экспедиции за границу решил опубликовать дневник, который [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она вела', 'он вёл')] во время поездки."
 lepsius.312.d: "[SCOPE.sCharacter('lepsius_scientific_writer').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_scientific_writer').IsFemale, 'решила', 'решил')] опубликовать научную работу, которую [SelectLocalization(SCOPE.sCharacter('lepsius_scientific_writer').IsFemale, 'она написала', 'он написал')] во время поездки."
 lepsius.408.f: "Назар — это амулет, предназначенный для защиты от сглаза. Такое суеверие существует в больших частях Востока, а также в некоторых частях Средиземноморья. Конечно, было бы абсурдно думать, что научно образованный ум мог бы защитить себя талисманом, чтобы уберечь экспедицию от злых сил. Иначе обстоит дело с местными помощниками и носильщиками. Они просят руководителя приобрести один из амулетов, убеждённые, что в противном случае [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'её', 'его')] ждёт большое несчастье. Какими бы ни были способности назара, если он не повлияет на экспедицию, то по крайней мере повлияет на моральный дух наших подчинённых."
 lepsius.409.f: "Пока наша экспедиция продвигалась вдоль побережья, они вскоре наткнулись на широкую бухту, чьи крайние мысы почти соприкасались. Вместо того чтобы идти длинным путём, несколько греческих рыбаков предложили перевезти нас через бухту. Руководитель экспедиции быстро принял предложение. В разговоре с рыбаками [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] также [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'смогла', 'смог')] получить важную информацию о руинах неподалёку, которые, вероятно, относятся к доклассическим временам."
 lepsius.421.d: "Наш археолог нашёл маленького египетского скарабея из лазурита, которого [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она хотела', 'он хотел')] бы оставить себе."
 lepsius.452.f: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] в прошлом неоднократно [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'слышала', 'слышал')], что в этом районе должны быть исторические записи о давно разрушенных археологических объектах. Несколько дней назад [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она получила', 'он получил')] полезную подсказку: у одного купца была рукопись XVI века, содержащая копию давно утерянных записей. Оригиналы, вероятно, утеряны навсегда, но, по крайней мере, есть возможность реконструкции."
 lepsius.461.f: "Было это странное, давящее чувство. Среди ночи. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'встала', 'встал')], думая, что это ветер бьётся о палатку в пустынном песке; но это было нечто большее, чем ветер. Это был странный шёпот. Ропот, который перерастал в диссонирующие тона, пока не усилился до мелодичной песни. Как песня сирен, он околдовывал — и затуманивал чувства. По крайней мере, так утверждал [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetLastName], когда через несколько часов поисков [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'её', 'его')] нашли у лап Великого Сфинкса в Гизе, копающим как сумасшедший, убеждённый, что под Сфинксом находится тайная камера, в которой скрыты знания, спрятанные на тысячи лет. [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'Её', 'Его')] состояние с тех пор почти не улучшилось. Это место оказывает на [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'неё', 'него')] поистине дурное влияние."
 lepsius.462.f: "Было это странное, давящее чувство. Среди ночи. [SCOPE.sCharacter('lepsius_military_attache').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_military_attache').IsFemale, 'встала', 'встал')], думая, что это ветер бьётся о палатку в пустынном песке; но это было нечто большее, чем ветер. Это был странный шёпот. Ропот, который перерастал в диссонирующие тона, пока не усилился до мелодичной песни. Как песня сирен, он околдовывал — и затуманивал чувства. По крайней мере, так утверждал [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetLastName], когда через несколько часов поисков [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'её', 'его')] нашли у лап Великого Сфинкса в Гизе, копающим как сумасшедший, убеждённый, что под Сфинксом находится тайная камера, в которой скрыты знания, спрятанные на тысячи лет. [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'Её', 'Его')] состояние с тех пор почти не улучшилось. Это место оказывает на [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'неё', 'него')] поистине дурное влияние."
 lepsius.465.f: "Наш руководитель экспедиции не скрывает, откуда [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] родом, на каком языке говорит, какую еду предпочитает и какую культуру считает превосходящей. Оскорбления в адрес местных жителей учащаются с каждым днём — будь то в адрес нанятого персонала или случайных людей. Путешествуя по разным деревням, [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'выработала', 'выработал')] привычку обращаться с мэрами как со своими подчинёнными. Даже самый гостеприимный жест для [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'неё', 'него')] недостаточен. Уже поступило несколько жалоб из разных частей местной администрации на высокомерное и клеветническое поведение, которое демонстрирует [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], и наша экспедиция всё больше превращается в негативную рекламную кампанию для нашей страны."
 lepsius.467.f: "От былого христианского Ближнего Востока осталось немного — и всё же есть разрозненные христианские общины коптов, маронитов, халдеев и армян, которые выживали на протяжении веков. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], который на самом деле не имел религиозных намерений, когда начинал путешествие, прошлой ночью попросил местного священника провести [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'её', 'его')] к давно забытой церкви. Археологически и исторически интересным было то, что священнослужитель лишь позже представил реликварий, содержащий реликвию отца церкви, считавшуюся утерянной. Поскольку было уже поздно, а лагерь далеко, руководитель экспедиции остался там на ночь и утро. Сон, который с тех пор не даёт ему покоя и о котором [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] почти не говорит, означает, что [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] хочет изменить свою жизнь в определённых областях. Священник предложил дать [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'ей', 'ему')] часть забытой реликвии, чтобы укрепить [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'её', 'его')] в новообретённой вере."
 lepsius.467.g: "[SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'У неё было', 'У него было')] блаженное видение?"
 lepsius.471.g: "[SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'Она должна', 'Он должен')] не торопиться и узнать как можно больше об этом месте."
 lepsius.471.h: "[SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'Ей', 'Ему')] разрешено остаться там дольше — если [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она привезёт', 'он привезёт')] с собой какие-нибудь артефакты."
 lepsius.471.i: "[SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'Ей', 'Ему')] разрешено посетить это место, но только на необходимое время."
 lepsius.472.f: "У [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] есть невероятное объяснение огромной потери людей и материалов. Оно возмутительно и постыдно — особенно для ума разумно просвещённого человека. Руководитель экспедиции утверждает, что [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] и [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'её', 'его')] люди заблудились на неделю, прежде чем наткнулись на незнакомую долину, окружённую высокими горами в непроходимом лесу Юкатана. В надежде найти ранее неизвестный майянский объект, они разработали план по исследованию долины — огромная ошибка, как оказалось. Ибо в долине обитают ужасные монстры, могучие ящеры. Фактически, [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'объяснила', 'объяснил')] нам, что в этом «затерянном мире» миллионы лет живут вымершие динозавры, выжившие благодаря изоляции. Звери терроризировали команду экспедиции и безжалостно растерзали нескольких носильщиков и исследователей. В бегстве [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'ей', 'ему')] пришлось бы бросить большую часть снаряжения. Теперь [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] умоляет нас переоснастить всю экспедицию. Мы не знаем, почему [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] думает, что [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'сможет', 'сможет')] впечатлить нас этой сказочной историей — скорее, возникают сомнения, является ли [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] всё ещё подходящим человеком для управления этой компанией!"
 lepsius.472.g: "[SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'Она', 'Он')] говорит, что динозавры съели нашу экспедицию?!"
 lepsius.501.h: "Пусть [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] расследует дальше."
 lepsius.506.f_engine: "К сожалению, у членов нашей экспедиции почти не было времени для более детального исследования гробницы Неизвестного фараона. Камни сыпались с потолка, и песок просачивался через верхние трещины, пока наши археологи пробивались через погребальную камеру. По-видимому, окружающая среда состояла из гораздо более пористой породы, чем предполагалось; и отколовшийся валун довершил разрушение. С находчивостью, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] не [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'свернула', 'свернул')] с курса, несмотря на риск, и [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'пробилась', 'пробился')] к саркофагу, чтобы все имеющиеся люди вынесли его. Великолепный, уникальный экспонат, который, вероятно, утешит нас за потерю остальных находок — в конце концов, вся царская гробница грозит обрушиться в течение нескольких минут..."
 lepsius.506.f_muscular: "Это был поистине исторический опыт, когда [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] вошёл в настоящую погребальную камеру. Его ждал особый сюрприз: саркофаг вместе с мумией Неизвестного фараона всё ещё покоился там, где он был похоронен более 3000 лет назад! И снова несравненно сильный падуанец должен был помочь нам — и поднять деревянный саркофаг и мумию из гранитного ограждения. Но как бы ни радовались наши археологи сначала, тем больше было их последующее несчастье. Во время обеденного перерыва, когда команда делила хлеб в украшенной галерее, из погребальной камеры донёсся ужасный хруст и треск. К ужасу помощников и нашего руководителя экспедиции, гигантский мускулистый человек тоже позволил себе перерыв — и случайно сел на саркофаг. От царской мумии и деревянного гроба остались только обломки..."
 lepsius.532.f: "Военный атташе неоднократно предостерегал от входа на курдскую территорию. Прошлые экспедиции в этот район не имели хорошего опыта с местными жителями. Курды считаются свободными, честными, но и гордыми. Вторжение на их территорию может их разозлить. Поэтому [SCOPE.sCharacter('lepsius_military_attache').GetFullName] настоял на вооружении нескольких человек, чтобы иметь возможность более эффективно бороться с неприятными инцидентами. В то время как атташе ожидает худшего, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] хотел бы как можно быстрее найти курдское племя, чтобы договориться с ними и найти мирное решение, чтобы быстро заполучить Ламассу. [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'Она', 'Он')] предлагает разделить войска: невооружённые люди, необученные носильщики и большая часть провизии и снаряжения должны остаться, в то время как [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] пойдёт вперёд с военным атташе, чтобы создать более гибкую силу, которая сможет эффективно искать ламассу. Атташе, с другой стороны, выразил обеспокоенность тем, что оставшаяся часть экспедиции будет тогда совершенно беспомощна в случае нападения курдов."
 lepsius.534.f: "Слишком поздно руководитель экспедиции понял, что его последняя попытка завоевать расположение коренных племён произвела обратный эффект. В палатке раздался крик, и инстинктивно некоторые подчинённые уже положили руки на оружие. С тех пор в воздухе висело напряжение, и военный атташе убедился в своей правоте: этот конфликт нельзя было уладить дипломатией, а только насилием. У него мало времени, чтобы выстроить приведённых с собой людей. Некоторые научные ассистенты уже настаивают на том, чтобы собраться и уйти как можно дальше."
 lepsius.551.f: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] в тот день [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'работала', 'работал')] допоздна. Греческое солнце пекло ему в голову, ветер с гор и с моря отсутствовал. Скучная и утомительная каталогизация унылых археологических объектов тянулась днями. Находки часто сводились лишь к жалким фрагментам битого стекла и оставленным куриным костям, которые археологический директор приписывал не столько минойской культуре питания, сколько пролетарским манерам помощников по раскопкам. В настроении усталости и смирения [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'прогуливалась', 'прогуливался')] по обширной территории малоисследованного дворцового комплекса. Последний раз [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetLastName] видели возле строения, классифицированного как позднебронзовое или раннеархаическое. Грохот эхом пронёсся по критским холмам, заглушив цикад и вспугнув голубей, когда археолог провалился под землю — и, несмотря на двухдневные поиски, его не смогли найти."
 lepsius.552.d: "Когда [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'пришла', 'пришёл')] в сознание, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'обнаружила', 'обнаружил')] себя в незнакомом подземном сооружении."
 lepsius.552.f: "Возможно, это был самый странный опыт в жизни археологического руководителя. [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'Она', 'Он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'подумала', 'подумал')], что [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'упала', 'упал')] в метровую кроличью нору; шахта была такой узкой, и в то же время её засыпало песком и грязью, которые давили на [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'неё', 'него')], как зыбучий песок, мучительно долго. Невозможно, чтобы кто-то мог последовать за ним; и невозможно было что-либо увидеть, так как солнечный свет не проникал в шахту. При ударе [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'почувствовала', 'почувствовал')] под ладонями плиты и не [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'поверила', 'поверил')], что [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'приземлилась', 'приземлился')] в естественной пещерной системе. В свете своей зажигалки [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'узнала', 'узнал')] гладко вытесанные стены, на которых остались остатки краски. Фрески затерянной культуры, которые [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] сначала хотел отнести к минойским, но вскоре уже не знал, из какого века они. По-видимому, существуют плавные переходы между минойским и микенским влияниями. Оглядевшись, [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'обнаружила', 'обнаружил')] себя в зале, не похожем на мегарон. Археолог медленно пробирается вперёд, слыша, как его собственные шаги эхом отдаются в пустом пространстве. Следуют коридоры без орнаментов, без предметов, без различимых деталей; развилки; камеры; и тупики. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] понимает, что [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'оказалась', 'оказался')] в древнем лабиринте, о котором [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] не имеет никакого представления. Чем больше [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] думает, что исследует его, тем больше и неизвестнее он становится..."
 lepsius.553.d: "После некоторого времени проб и ошибок [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] понимает, что [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'вернулась', 'вернулся')] к начальной точке лабиринта..."
 lepsius.553.f: "Ноги тяжёлые, голова в тумане — неужели [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'была', 'был')] здесь раньше? Место на плитах, куда [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'приземлилась', 'приземлился')], безошибочно. И с растущим ужасом возникает вопрос: как долго [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] здесь? Сколько часов прошло? Может, дней? И узнает ли [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] об этом, прежде чем голод и жажда замучают [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'её', 'его')] до смерти...?"
 lepsius.554.d: "В лабиринте пропавший натыкается на мозаику. Вопрос в том, выберет ли [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] один из двух коридоров или лестницу."
 lepsius.554.f: "После коридоров и лестниц без различий руководитель экспедиции достигает большой комнаты. Коридор открывается налево и направо, а лестница ведёт вверх и вниз. В глаза бросается мозаика на полу. Морская сцена подтверждает тезис о том, что стены могут относиться к минойским временам, в то время как редкие украшения свидетельствуют о микенском влиянии. Изображённые боги являются предшественниками классического греческого пантеона. Окружённый дельфинами, отец богов Зевс простирает руку в воздух с молнией. Деметра и Персефона указывают на запад, держа в руках колосья; Артемиду сопровождают два льва, смотрящие на восток. Наконец, Посейдон, отец богов микенцев: трезубцем он заставляет землю дрожать под ним."
 lepsius.557.d: "В зале [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] снова сталкивается с загадкой."
 lepsius.557.f: "Четыре прохода. Четыре изображения. Над каждым проходом пленник лабиринта видит вырезанные в камне очертания. Проходит некоторое время, прежде чем [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'понимает', 'понимает')], что это берега островов. Основываясь на своём опыте на Крите, [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] может их приблизительно определить. Первый проход [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'относит', 'относит')] к острову Родос; второй — к острову Делос; третий — к острову Эвбея; четвёртый — к острову Наксос. К сожалению, [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] не может найти никаких дальнейших подсказок."
 lepsius.558.d: "Через несколько дней наша раскопочная группа нашла пропавшего археолога у скалы. [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'Она', 'Он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'была', 'был')] полностью [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'измучена', 'измучен')] — и с тех пор находится в замешательстве."
 lepsius.558.f: "Остаётся загадкой, где руководитель экспедиции находился последние 72 часа. Его нашли в нескольких километрах от фактического места раскопок — в плачевном состоянии, как будто его растерзал дикий зверь. Хотя с тех пор [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'пришла', 'пришёл')] в сознание, врач экспедиции считает, что [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'должна была', 'должен был')] получить сильный удар по голове. По крайней мере, его речевой центр, кажется, нарушен. Снова и снова [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] впадает в почти бредовый стиль, когда [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'ей', 'ему')] приходится рассказывать, что произошло. Мы покинули этот район, потому что обеспокоены тем, что [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] может снова отправиться на поиски — чтобы доказать, что [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] не [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'сумасшедшая', 'сумасшедший')]."
 lepsius.559.f: "Полиция вчера вечером осмотрела тело бывшего руководителя экспедиции. [SCOPE.sCharacter('lepsius_minotaur_victim').GetFullName] стал известен общественности в основном из-за психического заболевания после того, как [SelectLocalization(SCOPE.sCharacter('lepsius_minotaur_victim').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_minotaur_victim').IsFemale, 'пропала', 'пропал')] при загадочных обстоятельствах во время раскопок на Крите и [SelectLocalization(SCOPE.sCharacter('lepsius_minotaur_victim').IsFemale, 'была', 'был')] найдена снова через несколько дней при столь же загадочных обстоятельствах. С тех пор [SelectLocalization(SCOPE.sCharacter('lepsius_minotaur_victim').IsFemale, 'она', 'он')] просто не [SelectLocalization(SCOPE.sCharacter('lepsius_minotaur_victim').IsFemale, 'была', 'был')] прежним человеком. Всё чаще [SelectLocalization(SCOPE.sCharacter('lepsius_minotaur_victim').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_minotaur_victim').IsFemale, 'боялась', 'боялся')] одиночества, [SelectLocalization(SCOPE.sCharacter('lepsius_minotaur_victim').IsFemale, 'думала', 'думал')], что видит монстров в тени. В конце концов [SelectLocalization(SCOPE.sCharacter('lepsius_minotaur_victim').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_minotaur_victim').IsFemale, 'спала', 'спал')] только при включённом свете, потому что кошмары не давали [SelectLocalization(SCOPE.sCharacter('lepsius_minotaur_victim').IsFemale, 'ей', 'ему')] спать всю ночь. В последние дни своей жизни [SCOPE.sCharacter('lepsius_minotaur_victim').GetLastName] не только [SelectLocalization(SCOPE.sCharacter('lepsius_minotaur_victim').IsFemale, 'стала', 'стал')] сильно зависим от лекарств и заметно [SelectLocalization(SCOPE.sCharacter('lepsius_minotaur_victim').IsFemale, 'ухудшилась', 'ухудшился')] как физически, так и морально, но и [SelectLocalization(SCOPE.sCharacter('lepsius_minotaur_victim').IsFemale, 'вызвала', 'вызвал')] насмешки своих академических коллег из-за своих абсурдных заявлений о своих исследованиях на Крите. Презираемый научным миром, осмеянный в газетах и визуально сведённый к карикатуре на самого себя, следователи сходятся во мнении, что [SelectLocalization(SCOPE.sCharacter('lepsius_minotaur_victim').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_minotaur_victim').IsFemale, 'покончила', 'покончил')] с собой."
 lepsius.560.f: "Сначала [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] был удивлён, как далеко от старого места раскопок [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] наконец снова [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'увидела', 'увидел')] солнце. Прошло несколько часов, прежде чем [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'воссоединилась', 'воссоединился')] с остальной частью раскопочной миссии, к большому облегчению своих коллег. Там, к удивлению присутствующих, [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'смогла', 'смог')] рассказать о своей находке — поистине великолепном открытии, которое, возможно, изменит то, как мы интерпретировали мифы древних греков. Сегодня не просто день личной славы, а великий день для всей нации. То, что для некоторых было решением банальных загадок, для остального мира станет революцией в археологии..."
 lepsius.561.f: "Дымка висит над холмами Юкатана, пока колонна пробирается через сельву. Вдалеке кричат ягуары; воздух гудит от комаров, и лихорадка сваливает не одного из наших помощников. Остаётся отряд из трёх человек и несколько носильщиков. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] даёт сигнал остановиться. Стелы и резные камни усеивают землю; наполовину засыпанные ступени, скользкие от мха, поднимаются по разрушенной террасе. Появляются очертания пирамиды майя. [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'Она', 'Он')] навостряет слух, когда носильщик поднимает руку и кричит: «Патрон — проход!»"
 lepsius.562.f: "Настояв на том, чтобы войти в одиночку, руководитель экспедиции проходит мимо выбеленных костей предыдущего злоумышленника и сталкивается с панелью, усеянной глифами. Четыре утопленных картуша — лики великих богов — можно нажать, как клавиши. Под ними — двустишие: тот, кто восходит на востоке, пылает в зените, спускается в сумерках и ведёт счёт дням. Устройство явно является испытанием; одна ошибка может стоить ему жизни."
 lepsius.563.f: "Шаги эхом отдаются в узком проходе. При свете факела стены мерцают гравюрами; корни гигантских деревьев впиваются в упавшую перемычку. Дальше открывается камера — низкий алтарь в её центре, идол тускло поблескивает в полумраке. [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'Она', 'Он')] взвешивает мешочек с песком в левой руке, оценивает массу идола правой и задерживает дыхание. Один чистый обмен — и наружу."
 lepsius.564.d: "Возможно, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] неверно [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'прочла', 'прочёл')] загадку — или просто строители никому не доверяли. Раздаётся грохот; каменная сфера срывается и катится по коридору прямо на [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'неё', 'него')]."
 lepsius.564.f: "Замена произведена; мешок лежит на алтаре. На мгновение ничего не движется. Затем нарастает глухой гул, с потолка сыплется пыль, и сверху доносится рёв — это гигантский катящийся валун!"
 lepsius.565.d_wrong: "Когда [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] выбегает на свет, [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'её', 'его')] ждёт худший сюрприз: лагерь захвачен, и вооружённые люди требуют идола — или его жизни."
 lepsius.565.f_right: "Это было делом ума, а не мускулов. Выбор Кинич Ахау, Владыки Солнца, который «ведёт счёт дням», спас [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'её', 'его')] от злого умысла устройства. Проскользнув через ловушки невредимым, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] забирает идола и спешит наружу; до [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'неё', 'него')] доходят слухи, что на подходе конкурирующая группа, и поэтому команда немедленно покидает это место."
 lepsius.565.f_wrong_right: "Когда [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] убегает из прохода, [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'хватается', 'хватается')] за корень и отскакивает в сторону, пока камень проносится мимо и врывается в джунгли. Снаружи лежат разбросанные копья и павшие люди — остатки засады, сорванной той же ловушкой. [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'Она', 'Он')] не может этого доказать, но сцена несёт отпечаток иностранного соперника, который хотел, чтобы мы активировали для него ловушки. Неважно — время двигаться дальше."
 lepsius.565.f_wrong: "Последним прыжком [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] достигает порога — только чтобы оказаться в окружении лучников. Из-за деревьев доносится учтивый голос с лёгким #tooltippable_name [SCOPE.sCountry('lepsius_archaeological_rival').GetAdjectiveNoFlag]им#! акцентом, когда вперёд выходит человек в светлом льняном костюме: «Наконец-то приятно познакомиться. Но этот предмет должен быть в лучших руках». В меньшинстве и с убитыми носильщиками, [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'отдаёт', 'отдаёт')] идола. «Жаль, что ховитос не знают тебя так, как я», — бормочет [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] — и пользуется шансом сбежать с пустыми руками."
 lepsius.581.d: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'обратилась', 'обратился')] с личной просьбой: [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'она', 'он')] хочет доказать, что «Затерянный мир» действительно существует, и тем самым восстановить свою честь. [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'Она', 'Он')] собирает деньги на частную экспедицию."
 lepsius.581.f: "Прошло несколько лет с тех пор, как большая часть юкатанской экспедиции таинственно исчезла. С тех пор [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] стал посмешищем академии. Карикатуры в газетах изображают [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'её', 'его')] сумасшедшим с его «дино-историями». Травма оставила глубокие шрамы: [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'она', 'он')] одержим идеей доказать миру, что предполагаемая долина реальна. Говорят, что [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'она', 'он')] уже [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'потратила', 'потратил')] всё своё наследство, чтобы организовать экспедицию за свой счёт. Конечно, [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'она', 'он')] также [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'просила', 'просил')] у государства поддержки для своего совершенно безумного путешествия. Наши эксперты не советуют отправляться в эту самоубийственную миссию — все знают, чем закончилась последняя экспедиция на Юкатан. Поэтому есть голоса, которые хотят вообще запретить такую экспедицию. Однако это может только усугубить его психическое состояние. Другие считают, что его следует отпустить, но без дальнейшего официального вмешательства; в конце концов, никто не хочет ассоциироваться с путешествием, по-видимому, психически неуравновешенного человека. Лишь меньшинство даже думает открыть свои кошельки для этого безумия. Они утверждают, что мы несём определённую ответственность за его состояние..."
 lepsius.581.h: "Пусть [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'она', 'он')] охотится на своих динозавров."
 lepsius.582.f: "Через несколько месяцев после того, как [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'исчезла', 'исчез')] в лесах Юкатана, измученный искатель приключений снова появился в провинциальной столице Мериде. Опять [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'потеряла', 'потерял')] много помощников, а остальная часть его отряда была в плачевном состоянии. Однако, помимо ряда свидетелей, у [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'неё', 'него')] было одно убедительное доказательство: благодаря современным фотографиям, подлинность которых подтвердили несколько учёных, у [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'неё', 'него')] есть неопровержимые подтверждения его диких историй. И действительно: на иллюстрациях ясно видны птерозавры и травоядные бронтозавры! Народ чествует [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] как идола, профессиональный мир в шоке, а наше правительство рассматривается как упрямая группа невежд, которые отказали национальному герою в славе, которую [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'она', 'он')] заслуживает!"
 lepsius.583.d: "Мы не слышали о [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] уже несколько месяцев. По-видимому, [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'заблудилась', 'заблудился')] в неизведанных глубинах юкатанского леса."
 lepsius.583.f: "Возможно, однажды об этом деле снимут трагические пьесы. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName], который незадолго до своей кончины был близок к безумию, по-видимому, до последнего искал следы предполагаемой долины динозавров. Болезни и враждебные племена майя уничтожили его экспедицию. Один из немногих выживших сообщает, что [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] в последний раз утверждал, что вновь открыл склоны плато, в котором находится долина. Но последние из людей взбунтовались и ушли домой. Никто не знает, что стало с [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'ней', 'ним')]. Однако у нас есть основания полагать, что в одиночку и измождённый, у [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'неё', 'него')] было мало шансов выжить, что бы в конечном итоге ни убило [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'её', 'его')]."
 lepsius.583.g: "[SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'Она', 'Он')] действительно не [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'была', 'был')] плохим человеком. Плохим исследователем, да, но не плохим человеком."
 lepsius.584.f: "На самом деле, все ожидали, что это путешествие не продлится долго: либо потому, что обстоятельства обрекли людей на смерть, либо вспыхнет мятеж. Тем более удивительным было открытие однажды утром. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] днями вёл отряд через непроходимые леса Юкатана, как одержимый старатель. Казалось, будто [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'узнавала', 'узнавал')] каждое дерево и каждый камень. Другие члены экспедиции восприняли это либо как безумие, либо как часть хитроумного плана, чтобы обмануть их и дать им ложную надежду. Но теперь, на склонах обширного плато, в лощине которого лежит сказочная долина, о которой [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'она', 'он')] говорит уже много лет, некоторые пересматривают свои взгляды. Крик птеродактиля эхом разносится по воздуху и пронзает уши участников так глубоко, что все сомнения рассеиваются."
 lepsius.586.f: "На самом деле, [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'должна', 'должен')] быть [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'довольна', 'доволен')]: [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'была', 'был')] [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'права', 'прав')] во всех своих утверждениях. Команда уже собрала целый ряд доказательств, которые должны вызвать сенсацию на родине. Но при более тщательном исследовании Затерянного мира всё больше выясняется, что [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'она', 'он')] не [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'была', 'был')] первым человеком в этой долине. На самом деле, похоже, около 1500 лет назад в этом районе было значительное присутствие майя. По-видимому, жители доселе неизвестного города майя регулярно приходили в эту долину. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] предполагает, что традиция человеческих жертвоприношений могла зародиться здесь. Как бы то ни было, есть веские доказательства того, что долина выполняла религиозную функцию. Недавно один сотрудник раскопал артефакты майя, что позволяет предположить, что их открытие может вызвать ещё большую сенсацию, чем несколько разрозненных гигантских ящеров. Проблема: предполагаемый объект майя находится в центре области, населённой хищниками! Поэтому большинство членов экспедиции настаивают на немедленном возвращении домой, а не на том, чтобы одна самоубийственная миссия следовала за другой."
 lepsius.587.f: "Только один выживший. Больше от экспедиции ничего не осталось. Это молодой научный сотрудник университета. Он травмирован и находится в плохом физическом состоянии. Так сообщает телеграмма с Юкатана. Из него мало что удалось выжать. По-видимому, наш руководитель экспедиции совершил решающую, трагическую ошибку при попытке обследовать объект майя в Затерянном мире. Ошибку, за которую почти все члены экспедиции заплатили жизнью. Инцидент вызвал такой шок, что все поездки на Юкатан, не связанные строго с археологией, были запрещены на неопределённый срок."
 lepsius.587.g: "[SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'Она', 'Он')] [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'выбрала', 'выбрал')]... неверно."
 lepsius.588.f: "Кукулькан был известен майя как пернатый змей — божество, которому поклонялись ацтеки под именем Кетцалькоатль. Было ли это совпадением, что майя знали об этой долине? Была ли связь между Затерянным миром и культом Кукулькана? [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] пока не может этого решить. Однако [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'обнаружила', 'обнаружил')], что между гнёздами хищников лежало давно забытое святилище, представлявшее пернатого змея, которого в этой стране называют Кукулькан. Поразил таинственный самоцвет, вставленный в амулет. Он такой удивительной красоты, что руководитель экспедиции назвал его «Самоцветом Кукулькана» — божество обладало драгоценностью, с помощью которой могло управлять ветром. Это, вероятно, одна из величайших археологических находок Центральной и Южной Америки."
 lepsius.588.g: "[SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'Она', 'Он')] [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'выбрала', 'выбрал')] мудро."
 lepsius.589.d: "Наша экспедиция из Затерянного мира во главе с [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] вернулась. [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'Её', 'Его')] и его команду народ чествует как героев."
 lepsius.589.g: "Слава [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'ей', 'ему')]!"
 lepsius.803.d: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_excavation_leader').IsFemale, 'завершила', 'завершил')] свои приготовления к путешествию. [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_excavation_leader').IsFemale, 'Она', 'Он')] отправится сегодня, чтобы расширить знания на уже созданном месте раскопок."
 lepsius.803.f: "Ожидается, что отсутствие нашего археолога составит около года, но может варьироваться в зависимости от ситуации. В конце своей деятельности [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_excavation_leader').IsFemale, 'она', 'он')] откроет новое место раскопок, качество которого может быть разным. [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_excavation_leader').IsFemale, 'Она', 'Он')] также найдет упоминания о ранее неизвестных археологических объектах."
 lepsius.811.f_vok: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] сообщает, что [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_excavation_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_excavation_leader').IsFemale, 'обнаружила', 'обнаружил')] небольшую гробницу в Долине Царей. Расхитители гробниц, по-видимому, уже украли большое количество предметов, а граффити показывают, что она была известна и в поздней античности. Руководители экспедиции решили провести там раскопки в надежде сообщить о новых находках позже."
 lepsius.811.f_ass: "Раскопки в Ассирии с самого начала столкнулись с трудностями. Через несколько дней [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] всё ещё не мог найти хорошего места для раскопок, поэтому [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'удовольствовалась', 'удовольствовался')] ближайшим подходящим местом. До сих пор они раскопали только фундаменты святилища, которое, возможно, когда-то было частью более крупного комплекса."
 lepsius.812.f_bab: "Времена не поглотили всех свидетелей вавилонского величия в Месопотамии. После того как [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'пополнила', 'пополнил')] свои запасы воды, местные жители рассказали [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'ей', 'ему')] о странных руинах, которых набожные мусульмане в регионе избегают из-за их языческого происхождения. Как оказалось, это остатки зиккурата. Комплекс на удивление хорошо сохранился, и, согласно последним отчётам, наши археологи даже раскопали первые находки."
 lepsius.813.f_vok: "Сегодня утром пришла сенсационная телеграмма. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] сообщает, что [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'обнаружила', 'обнаружил')] гробницу царицы. Личность умершей супруги не совсем ясна, но, согласно первоначальным сообщениям, погребальная камера на удивление нетронута. Настенные росписи и ценные артефакты дают ценное представление о Древнем Египте, которое долгое время было неизвестно."
 lepsius.813.f_bab: "Легенды о вавилонских воротах и городских стенах сохранились на тысячи лет. Но это всегда нечто иное, когда они перед тобой. Сначала [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] не мог поверить, когда [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'прошла', 'прошёл')] стену за стеной и [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'обнаружила', 'обнаружил')] огромные размеры затерянного города. Это открытие будет занимать нас долгие годы."
 lepsius.813.f_ass: "Помимо того, что ассирийцы были крупной военной державой, они также славились своими садами. Некоторые даже утверждают, что знаменитые сады Вавилона на самом деле находились в ассирийской столице Ниневии. Во время раскопок дворцового комплекса и прилегающих террас [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'смогла', 'смог')] лично убедиться в великолепии ассирийской культуры. Руководство музея ликует."
 lepsius.2191.t: "Раскопан банный комплекс инков"
 lepsius.2191.d: "Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] раскопал впечатляющую находку в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')]. На этом месте был обнаружен банный комплекс империи инков. Первоначальные предположения заключаются в том, что комплекс использовался для ритуальных церемоний."
 lepsius.2191.f: "«Не иронично ли, что мы раскопали баню, а сами сейчас могли бы ей воспользоваться?»"
 lepsius.2191.g: "Ванна сейчас была бы очень кстати!"
 lepsius.2192.t: "Обнаружен череп инка с отверстием"
 lepsius.2192.d: "Странная находка была сделана в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')]. Во время раскопок инкского объекта профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] наткнулся на большое количество костей. Один череп особенно привлёк его внимание. В черепе было отверстие, которое, по-видимому, было сделано намеренно. Судя по всему, покойный пережил это испытание, так как отверстие частично зажило."
 lepsius.2192.f: "«Я уверен, это должно было быть человеческое жертвоприношение! А вы как думаете?»"
 lepsius.2192.g: "Пришельцы!"
 lepsius_recent_excavation_inspection_modifier: "Недавняя археологическая инспекция"
 lepsius.2193.t: "Инкские горные мумии"
 lepsius.2193.d: "Во время экспедиции с [SCOPE.sCharacter('lepsius_mountaineer_character_scope').GetFullName] в [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_PP')] доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] сделал шокирующее открытие. На горе они нашли останки молодой девушки, которая теперь мумифицировалась. Похоже, она была «капак хуча» инков, детской жертвой. Хотя это печальная находка, она может привести к различным новым сведениям об инках."
 lepsius.2193.f: "«Было ледяной холод, ветер рвал нашу одежду, и мы почти ничего не видели. Когда мы заметили тело, мы сначала подумали, что это альпинист, погибший в похожих обстоятельствах, которые нам приходилось сейчас терпеть. Но вскоре мы поняли, что это не альпинист, а молодая девушка»."
 lepsius.2193.g: "Это довольно печально."
 lepsius.2194.t: "Руины инков"
 lepsius.2194.d: "Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] сделал открытие в далёком регионе [SCOPE.sState('lepsius_local_archaeological_state_scope').GetCustom('RU_SL_RP')]. Он нашёл различные руины времён империи инков. Большинство руин сожжены, и было найдено некоторое европейское снаряжение, что привело к мысли, что это поселение было разрушено испанцами. Вероятно, они также разграбили поселение, так как других находок сделано не было. Всё ценное, казалось, было вывезено."
 lepsius.2194.f: "«Давным-давно эти руины, должно быть, были хорошо построенными жилищами. Кажется, они способны выдержать даже землетрясения. Вот только... испанские захватчики, по-видимому, сильнее землетрясений»."
 lepsius.2194.g: "Нет золота? Зачем тогда вообще заморачиваться?"
