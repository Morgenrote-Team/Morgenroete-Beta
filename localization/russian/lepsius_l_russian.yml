 pm_lepsius_obelisk: "Обелиск"
 je_lepsius_cleopatras_needle: "Игла Клеопатры"
 je_lepsius_cleopatras_needle_reason: "На протяжении веков два обелиска в Александрии, известные как «Иглы Клеопатры», привлекали международный интерес. Один из них уже был подарен Соединённому Королевству, хотя Лондон пока не смог вывезти этот обелиск. Возможно, нам стоит последовать этому примеру и спросить египетские власти, нельзя ли получить другую «Иглу»? Для этого, конечно, нам придётся стать ведущей державой в египтологии."
 je_lepsius_cleopatras_needle_fail: "Любая страна имеет право перевезти Иглу Клеопатры."
 je_lepsius_cleopatras_needle_transport: "Игла Клеопатры - перевозка"
 je_lepsius_cleopatras_needle_transport_reason: "Перевезти обелиск гораздо труднее, чем может показаться. Неудивительно, что французы оставили себе только один, стоящий на площади Согласия: второй обещанный им обелиск всё ещё стоит в Луксоре."
 je_lepsius_cleopatras_needle_transport_success: "Когда обелиск достигнет столицы, археолог должен восстановить и подготовить его, а инженер - помочь с установкой.\n\n#R Важно:#! работа археолога по реставрации и работа инженера по восстановлению не начнутся, пока обелиск не прибудет."
 je_lepsius_ishtar_gate: "Ворота Иштар"
 je_lepsius_ishtar_gate_reason: "Ещё в 1815 году Клавдий Рич составил топографический обзор руин Вавилона. Уже тогда он предполагал, что большой холм может быть дворцом или даже Вавилонской башней. Сколько сохранилось от этого дворцового комплекса и можно ли что-то из него извлечь, пока неизвестно, но современные исследования могли бы пролить свет на природу холма. Конечно, нам также следует убедиться, что у нас есть разрешение вывезти материалы домой."
 je_lepsius_ishtar_gate_fail: "Любая страна обнаружила Ворота Иштар."
 je_lepsius_ishtar_gate_transport: "Ворота Иштар - перевозка"
 je_lepsius_ishtar_gate_transport_reason: "После того как экспедиция в Вавилонию извлекла остатки легендарных Ворот Иштар, мы продлили лицензию на раскопки, чтобы отправить вавилонские кирпичи в наш музей."
 je_lepsius_ishtar_gate_transport_success: "Для восстановления ворот в прежнем великолепии требуется в общей сложности 200 000 кирпичей. Ожидается, что ежегодно до нас будет доходить около 20 000 кирпичей, если не возникнет проблем. Новые партии будут прибывать только до тех пор, пока мы продолжаем вести раскопки в Вавилонии.\n\n#R Важно:#! работа археолога по реставрации и работа инженера по восстановлению не начнутся, пока не прибудет как минимум 100 000 кирпичей."
 je_lepsius_piedras_negras: "Стела Пьедрас-Неграс"
 je_lepsius_piedras_negras_reason: "Пьедрас-Неграс - важный город майя в Гватемале, населённый с VII века до н. э. Это был независимый город-государство, переживший культурный золотой век, особенно с VII по IX век, и обладающий многочисленными монументальными стелами. Возможно, мы сможем приобрести для нашего музея особенно уникальный предмет?"
 je_lepsius_piedras_negras_fail: "Любая страна перевозит стелу Пьедрас-Неграс в свой музей."
 je_lepsius_piedras_negras_transport: "Стела Пьедрас-Неграс - перевозка"
 je_lepsius_piedras_negras_transport_reason: "В 1930-х годах Музей Пенсильванского университета возглавил масштабные экспедиции по перевозке нескольких многотонных стел из густых гватемальских джунглей в экстремальных условиях. Поскольку дорог не было, массивные монолиты приходилось мучительно передвигать на деревянных салазках и плотах через коварную реку Усумасинта."
 je_lepsius_piedras_negras_transport_success: "Когда стела Пьедрас-Неграс достигнет столицы, археолог должен восстановить и подготовить её, а инженер - помочь с установкой.\n\n#R Важно:#! работа археолога по реставрации и работа инженера по восстановлению не начнутся, пока стела не прибудет."
 je_lepsius_axum_obelisk_transport: "Аксумский обелиск - перевозка"
 je_lepsius_axum_obelisk_transport_reason: "Исторически перевозка обелиска из Аксума в Рим и его повторная установка в 1937 году были крупным предприятием. Там его закрепили и установили с помощью металлических стержней, помещённых внутрь стелы."
 je_lepsius_axum_obelisk_transport_success: "Когда обелиск достигнет столицы, археолог должен восстановить и подготовить его, а инженер - помочь с установкой.\n\n#R Важно:#! работа археолога по реставрации и работа инженера по восстановлению не начнутся, пока обелиск не прибудет."
