 lepsius.714.t: "Игла Клеопатры"
 lepsius.714.d: "Теперь, когда окончательные переговоры с местными властями завершены, ничто не мешает демонтажу, перевозке и восстановлению «Иглы Клеопатры». Это значительный археологический и инженерный проект!"
 lepsius.714.f: "До своего исторического вывоза две «Иглы» веками прозябали как полузабытые памятники в александрийском Цезареуме: только одна из них всё ещё стояла вертикально, тогда как другая уже погрузилась в пески пустыни. В эпоху раннего колониализма и египтомании возникало множество идей перевезти эти монолиты в западные столицы как мощные символы государственного суверенитета и научного завоевания, но поначалу такие планы терпели неудачу из-за огромных логистических трудностей. В восприятии европейских путешественников Иглы вместе с внушительной колонной Помпея - одной из крупнейших монолитных колонн античности - образовывали знаковую тройку александрийского силуэта, отмечая переход от фараонского к греко-римскому великолепию. Пока колонна Помпея благодаря своей массивной конструкции и прочному основанию на плато Серапеума всегда оставалась на месте как неподвижный памятник, обелиски всё чаще рассматривались как дипломатический предмет обмена, пока наконец не отправились через океан в качестве престижных даров вице-короля Мухаммеда Али-паши."
 lepsius.714.g: "Перевезти обелиск в город [ROOT.GetCountry.GetCapital.GetCityHubName]!"
 lepsius.715.t: "Игла Клеопатры"
 lepsius.715.d: "Сегодня обелиск встретили в городе [ROOT.GetCountry.GetCapital.GetCityHubName] большой публичной церемонией, а население восторженно его приветствовало."
 lepsius.715.f: "Лондонская «Игла» достигла города в 1878 году в специально построенном плавучем железном цилиндре, который едва не затонул во время сильного шторма в Бискайском заливе, унеся жизни шести моряков. Нью-Йоркский обелиск был установлен в Центральном парке в 1881 году после перевозки на тщательно переоборудованном пароходе; затем его сантиметр за сантиметром перекатывали на место в Нью-Йорке с помощью массивных деревянных лесов. Оба памятника по прибытии встречали крупными публичными церемониями, и они до сих пор служат яркими символами Древнего Египта среди современных мегаполисов."
 lepsius.715.g: "Это укрепит наши имперские амбиции на мировой арене!"
 lepsius.773.t: "Стела Пьедрас-Неграс"
 lepsius.773.d: "Теперь, когда окончательные переговоры с местными властями завершены, ничто не мешает демонтажу, перевозке и восстановлению стелы из Пьедрас-Неграс. Это значительный археологический и инженерный проект!"
 lepsius.773.f: "Стелы Пьедрас-Неграс - серия монументальных каменных скульптур из древнего города майя Пьедрас-Неграс, расположенного на территории современной Гватемалы. Вырезанные в «петенском стиле», эти стелы часто изображают правителей в сложных костюмах, иногда сидящих в нишах или стоящих над пленниками. Эти памятники всемирно известны своим исключительным художественным качеством и историческим значением. Сегодня многие из этих стел хранятся в Национальном музее археологии и этнологии в Гватемале и в Музее Пенсильванского университета."
 lepsius.773.g: "Перевезти стелу в город [ROOT.GetCountry.GetCapital.GetCityHubName]!"
 lepsius.774.t: "Стела Пьедрас-Неграс"
 lepsius.774.d: "Сегодня на публичной выставке в городе [ROOT.GetCountry.GetCapital.GetCityHubName] Археологический музей представил стелу Пьедрас-Неграс публике и заинтересованным посетителям."
 lepsius.774.f: "После прибытия в Музей Пенсильванского университета (Penn Museum) в Филадельфии стелы стали центральными объектами заново оформленных залов майя, где впервые были представлены широкой западной публике. Монументальные скульптуры были установлены на постоянной основе с использованием обширного технического оборудования, чтобы защитить их сложные рельефы от дальнейшего разрушения и сделать доступными для исследований. До сих пор они служат ключевыми объектами для расшифровки иероглифов майя и свидетельствуют о былом величии города Пьедрас-Неграс."
 lepsius.774.g: "Гигантские артефакты. Мне нравится!"
 lepsius.2256.t: "Аксумский обелиск"
 lepsius.2256.d: "Сегодня обелиск встретили в городе [ROOT.GetCountry.GetCapital.GetCityHubName] большой публичной церемонией, а население восторженно его приветствовало."
 lepsius.2256.f: "Аксумский обелиск прибыл в Рим в 1937 году как военная добыча фашистской Италии после того, как по приказу Муссолини был разобран в Эфиопии и перевезён морем в чрезвычайно сложных логистических условиях. Его вновь установили перед зданием Министерства колоний, и десятилетиями он служил имперским символом триумфа в городском облике Рима. Лишь после долгих дипломатических переговоров и технической подготовки 150-тонный памятник был возвращён Эфиопии в 2005 году и вновь установлен там в 2008 году в своём первоначальном археологическом парке."
 lepsius.2256.g: "Это укрепит наши имперские амбиции на мировой арене!"
 lepsius.715.tt: "Теперь мы можем построить [GetBuildingType('building_lepsius_needle').GetName]!"
 lepsius.2256.tt: "Теперь мы можем построить [GetBuildingType('building_lepsius_obelisk').GetName]!"
