 je_ishtar_gate: "Реконструкция ворот Иштар"
 je_ishtar_gate_reason: "После того как экспедиция в Вавилонию обнаружила остатки легендарных ворот Иштар, мы продлили нашу лицензию на раскопки, чтобы доставить вавилонские кирпичи в наш музей."
 je_ishtar_gate_success: "Для восстановления ворот в их былом великолепии необходимо 200 000 кирпичей. Ожидается, что ежегодно к нам будет поступать около 20 000 кирпичей - если не возникнет проблем."
