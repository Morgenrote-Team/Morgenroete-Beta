 je_lepsius_discovery_mycenae_reason: "У нас есть все основания полагать, что древний город Микены всё ещё хранит тайну. Поиски могут занять у нас годы. Тот, кому удастся совершить это открытие, должен занять своё место в истории."
 je_lepsius_disovery_mycenae_success: "Если нам удастся найти десять подсказок в Арголиде, мы соберём достаточно материала, чтобы заново открыть утерянное место большой исторической значимости."
