 lepsius_expedition_general_information_loc: "\n$mr_divider_for_je$\nВаша [concept_lepsius_expedition|l] будет получать событие каждый месяц, добавляя прогресс вашей экспедиции. Как только прогресс достигнет предела, ваша экспедиция завершится.\n$mr_divider_for_je$\nЗначение успеха показывает, насколько успешна ваша экспедиция. Чем больше успеха вы наберёте, тем больше [Concept('concept_lepsius_artifact','артефактов')] вы получите в конце экспедиции. Вы получите максимальное количество артефактов, если ваш успех достигнет #V 15#!.\nМногие факторы могут повлиять на ваш успех, от событий до вашей подготовки. 10 уровней университетов, в которых [concept_pm_academics_university_humanities|l] дадут вам 1 очко успеха в начале экспедиции, например. Обратите внимание, что вы можете получить максимум 4 очка от специализаций университетов."
