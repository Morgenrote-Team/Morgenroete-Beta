 je_lepsius_archaoelogical_society: "Основать археологическое общество"
 je_lepsius_archaoelogical_society_reason: "В нашей нации постоянно растёт не только интерес к археологии. После многих лет экспедиций, раскопок и находок артефактов наша страна накопила удивительный археологический опыт. Выдающийся археолог мог бы основать археологическое общество, чтобы собрать научные и интеллектуальные силы и дать новый импульс. Это не только улучшит наши научные результаты, но и повысит опыт последующих поколений археологов."
