 lepsius.17.manco: "#E Маскапайча Уайна Капака#! - самый выдающийся артефакт империи инков.\n"
 lepsius_mascapaicha_knowledge_modifier: "Знание старейшин"
 je_lepsius_mascapaicha: "Расшифровка кипу"
 je_lepsius_mascapaicha_reason: "Исследование кипу до сих пор вызвало больше вопросов, чем дало ответов. Одно можно сказать наверняка: это перечисление мест, которые можно отнести к последовательности, с числами, представляющими различные племена, последовательность которых, в свою очередь, указывает на своего рода маршрут. Короче говоря: кипу - это своего рода карта сокровищ. Только опытный археолог может полностью разгадать эту тайну. Что инки так тщательно прятали, до сих пор неясно; чтобы вернуть это, мы должны собрать небольшую специальную команду, которая не состоит из обычной экспедиционной группы: помимо археолога и атташе, нам также нужен пилот, который доставит нас прямо в Анды."
 je_lepsius_mascapaicha_success: "Расшифровал кипу."
 lepsius_decode_quipu_button: "Расшифровать кипу"
 lepsius_decode_quipu_button_desc: "Для успешной расшифровки кипу требуется опытный или знаменитый археолог и отдел, обученный работе с мезоамериканскими артефактами."
 lepsius_decode_quipu_tt: "Кипу будет расшифровано через некоторое время."
 lepsius_decode_quipu_done_tt: "Расшифровать кипу."
 lepsius.474.t: "Таинственное кипу"
 lepsius.474.d: "Перуанский проводник привёл экспедиционную группу в секретное место, о котором не знают даже многие местные жители. В заброшенном храмовом здании, в которое не входили по меньшей мере четыреста лет, они находят странный предмет."
 lepsius.474.f: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] немедленно [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'почувствовала', 'почувствовал')], что в этом месте есть что-то уникальное. Этот храм, по-видимому, был заброшен до испанского завоевания. Не вторжение, а скорее забвение стало причиной упадка здания. На первый взгляд, останков, дающих информацию о жизни инков до прибытия Франсиско Писарро, было разочаровывающе мало. Команда довольствуется обязательными археологическими упражнениями, когда помощник находит на алтареподобном блоке зловещий предмет. Это кипу, узелковое письмо, с помощью которого инки передавали числа, статистику и данные. Однако оно настолько сложное, что его трудно расшифровать на месте."
 lepsius.474.g: "Его следует изучить более тщательно дома."
 lepsius.571.t: "Секрет кипу"
 lepsius.571.d: "Даже учёным на родине трудно расшифровать кипу, которое привезла последняя перуанская экспедиция. Учёные теперь сходятся во мнении, что это нечто большее, чем просто запись чисел."
 lepsius.571.f: "После более тщательного изучения и сравнения с ранее известными узелковыми системами учёные из нескольких университетов и сотрудники Археологического музея пришли к выводу, что узелки демонстрируют уже известную систему. На первый взгляд, это имело мало смысла - если предположить, что это был просто налоговый список или перепись населения. На самом деле это собрание мест. Названия были известны из других записей кипу, но относятся не столько к названиям мест, сколько к точкам поселения определённых кланов. Самая распространённая теория заключается в том, что это похоже на инструкцию к направлениям. Куда она ведёт, неясно."
 lepsius.571.g: "Это узелковое письмо... карта?"
 lepsius.572.t: "В поисках маскапайчи"
 lepsius.572.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] не только [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'верит', 'верит')], что [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'обнаружила', 'обнаружил')] место, к которому ведёт зашифрованная карта, - у [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'неё', 'него')] также есть теория о том, к чему она может привести. Вместе с [SCOPE.sCharacter('lepsius_pilot_scope').GetFullName] и [SCOPE.sCharacter('lepsius_archaeologist_attache').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'она', 'он')] отправляется на специальную миссию на самые высокие высоты Анд."
 lepsius.572.f: "Было трудно выведать секрет из кипу. Подтвердилось, что записи носили географический характер и должны были вести к определённому месту; месту настолько отдалённому, что добраться до него было почти невозможно. [SCOPE.sCharacter('lepsius_pilot_scope').GetLastName] указал, что не стоит слишком надеяться найти взлётно-посадочную полосу, достаточно большую, чтобы посадить самолёт в этом негостеприимном районе. Однако военные записи показали удобное для этой цели плато, которое находилось недалеко от целевого местоположения. Оттуда было всего около 10 миль пешком. Во время полёта в Перу профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] поделился с ними своей теорией о том, что там может быть. Тот факт, что здание, в котором находилось кипу, предполагает, что оно, вероятно, было построено примерно во времена императора Уайна Капака, до того, как империя инков погрузилась в гражданскую войну между Уаскаром и Атауальпой. На этом месте, предположил он, могло быть что-то из времён до распада империи и её последующего падения. Что-то, что представляло имперское единство и величие инков и было настолько ценным, что было спрятано от Атауальпы, потому что многие считали его незаконным правителем, устроившим переворот против своего брата Уаскара. Объект, который представлял власть Сапа Инки как никакой другой и считался утерянным: корона Уайна Капака. Маскапайча."
 lepsius.572.g: "Это была бы археологическая сенсация."
 lepsius.573.d: "[SCOPE.sCharacter('lepsius_pilot_scope').GetFullName] находит подходящее место для посадки недалеко от пункта назначения. Однако по пути к предполагаемому местонахождению маскапайчи трио вскоре натыкается на впечатляющее открытие."
 lepsius.573.f: "С кипу в руке, как с лозой для поиска воды, [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] повёл небольшую группу к склону горы. Там были установлены ступени, как клинья, на головокружительной высоте. Трио взбирается на первые несколько метров, а затем находит заросшую тропу. Краткий осмотр археолога не оставляет сомнений. Точно уложенные кубоиды явно относятся ко временам инков. Они следуют по инкской дороге в долину, окутанную туманом, которую не было видно с самолёта. Они бредут милю за милей. Внезапно [SCOPE.sCharacter('lepsius_pilot_scope').GetLastName] что-то обнаруживает. Несмотря на туман, из дымки выделяется блеск. Это золото. Чистое золото. Массивное золото! Гигантский идол, высотой с трёхэтажный дом, выделяется из тумана. [SCOPE.sCharacter('lepsius_pilot_scope').GetLastName] сходит с тропы и приближается. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] хочет окликнуть его, что это может быть ловушка. Отвлечение может быть опасным. [SCOPE.sCharacter('lepsius_attache_scope').GetLastName], однако, остаётся в нерешительности."
 lepsius.573.g: "Немного золота не повредит."
 lepsius.573.h: "Только смиренный найдёт маскапайчу."
 lepsius.574.d: "Трио продолжило свой путь. Но внезапно [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] находит что-то, что заставляет его остановиться. [SCOPE.sCharacter('lepsius_pilot_scope').GetFullName] и [SCOPE.sCharacter('lepsius_attache_scope').GetFullName] уже прошли несколько метров, когда замечают, что профессор пропал."
 lepsius.574.f: "Это была надпись. Надпись? Эпиграфические источники в Андах? В обществе, чья узелковая система не имела функции, соответствующей алфавиту? Уже одно это было невероятным открытием! Майя полагались на иероглифы, ацтеки основывали свои кодексы на пиктограммах. Но это был шрифт с буквоподобными акцентами. Могло ли такое случиться? И что ещё больше поразило [SCOPE.sCharacter('lepsius_archaoelogist_scope').GetLastName]:\n[SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'Она', 'Он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'смогла', 'смог')] их прочитать.\nБез предварительных знаний. Без изучения. Даже отдалённо не понимая, как это могло произойти. Как будто [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'окунула', 'окунул')] палец в вырезанную надпись и [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'впитала', 'впитал')] её содержание. [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'Она', 'Он')] не [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'читала', 'читал')] их. Письмо говорило с [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'ней', 'ним')]. И чем дольше [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'погружалась', 'погружался')], тем более ошеломляющим было то, что [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'узнавала', 'узнавал')]. Потому что здесь хранились знания. Вековые, тысячелетние знания всех культур Южной и Центральной Америки. Полностью поглощённый этим славным открытием, [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'она', 'он')] не замечает, как атташе трясёт [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'её', 'его')], пытается оттащить - пилот стоит рядом, нерешительно глядя на абсурдную сцену перед ним."
 lepsius.574.g: "Знание - не грех."
 lepsius.575.d: "Группа достигает здания, которое не похоже на храм, где когда-то было найдено таинственное кипу. Они входят в здание во главе с [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName], который исследовательски осматривается. Ужасное изображение демона занимает стену перед ними."
 lepsius.575.f: "Вечный туман, окутавший неизвестную долину, также затуманил храм. Он покрывал стены и статуи, как тонкое платье. [SCOPE.sCharacter('lepsius_pilot_scope').GetLastName] закурил сигарету и добавил в туман нотку никотина. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] обыскал местность в поисках улик. Но [SCOPE.sCharacter('lepsius_attache_scope').GetLastName] ничего не заметил. [SelectLocalization(SCOPE.sCharacter('lepsius_attache_scope').IsFemale, 'Она', 'Он')] [SelectLocalization(SCOPE.sCharacter('lepsius_attache_scope').IsFemale, 'стояла', 'стоял')] лицом к лицу с изображением демона, как загипнотизированный. [SelectLocalization(SCOPE.sCharacter('lepsius_attache_scope').IsFemale, 'Её', 'Его')] глаза смотрели в гримасу первобытного существа. Ветер шептал в его ушах. Ветер, который становился словами. Слова, которые шептали ему преклонить колени. Это была священная земля, на которой [SelectLocalization(SCOPE.sCharacter('lepsius_attache_scope').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_attache_scope').IsFemale, 'стояла', 'стоял')]. Земля бога, которому [SelectLocalization(SCOPE.sCharacter('lepsius_attache_scope').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_attache_scope').IsFemale, 'должна была', 'должен был')] поклониться. Бога, который был властелином мира. Который возвышал нищих до королей и доверял им царства мира. Бога, который заставлял всех правителей мира, будь то князь или избранный, падать ниц перед ним. «Я дам тебе всю власть и славу этих царств; ибо они мои, и я даю их, кому захочу. Если ты падёшь ниц предо мной и поклонишься мне, всё будет твоим».\nСигаретный дым клубился вокруг [SCOPE.sCharacter('lepsius_attache_scope').GetLastName]. Пилот говорил сбивчиво и пытался вразумить его. Археолог стоит рядом лишь как наблюдатель."
 lepsius.575.g: "Ты должен править, если хочешь маскапайчу."
 lepsius.576.t: "Маскапайча"
 lepsius.576.d: "Впервые с тех пор, как они прибыли в долину, туман рассеялся. В скрытой камере, которую [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'обнаружила', 'обнаружил')] профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName], нет ничего, кроме пьедестала. Над ним возвышается тень. Это тень павшей империи. Тень исчезнувшего знания. Тень утерянного золота. Это тень маскапайчи, короны Сапа Инки."
 lepsius.576.f: "Маскапайча была имперским символом, который носил только Сапа Инка как король Куско и император Тауантинсуйу. Это был венец из слоёв разноцветной тесьмы, с которого свисал лату - бахрома из тончайшей красной шерсти с красными кистями, прикреплёнными к золотым трубкам. Она была украшена золотыми нитями и пучком с двумя или тремя вертикальными перьями горной каракары, священной птицы, называемой по-испански «корокенке», это было физическое выражение высшей политической власти в империи инков. В некоторых церемониях Сапа Инка нёс маскапайчу в руке, в то время как на нём был военный головной убор (шлем, украшенный перьями)."
 lepsius.576.g: "Это должна быть корона Уайна Капака!"
 lepsius.577.t: "Смерть в Андах"
 lepsius.577.d: "Специальную миссию в Андах больше никто не видел. Никаких признаков жизни. Никаких следов. Похоже, поиски экспедицией маскапайчи оказались фатальными."
 lepsius.577.f: "Когда учёные и агенты секретной службы узнают о ходе экспедиции в Андах, они не могут найти никаких зацепок. Только пропавший самолёт экипажа остаётся единственным доказательством того, что она должна была состояться. Местные говорят, что место посадки находилось очень близко к проклятой долине. Проклятой, потому что люди, которые входят в неё, исчезают там. Там они поддаются искушениям демонов и умирают жалкой смертью. Учёные предположили, что споры неизвестных растений, серные испарения или другие газы могут быть причиной туманоподобной дымки, которая могла привести к галлюцинациям."
 lepsius.577.g: "Стали ли они жертвами собственных иллюзий?"
 lepsius_specialization_egypt_tech: "Египтология"
 lepsius_specialization_egypt_tech_desc: "Фокус на Древнем Египте приводит к тому, что наши археологи с самого начала обладают чертой «Египетская археология». Кроме того, за каждые раскопки в Египте мы получаем на один артефакт больше каждый год."
 lepsius_specialization_mesopotamia_tech: "Ассириология"
 lepsius_specialization_mesopotamia_tech_desc: "Фокус на Месопотамии приводит к тому, что наши археологи с самого начала обладают чертой «Месопотамская археология». Кроме того, за каждые раскопки в Месопотамии мы получаем на один артефакт больше каждый год."
 lepsius_specialization_aegean_tech: "Эгейская археология"
 lepsius_specialization_aegean_tech_desc: "Фокус на эгейских цивилизациях приводит к тому, что наши археологи с самого начала обладают чертой «Эгейская археология». Кроме того, за каждые раскопки в Греции или на Крите мы получаем на один артефакт больше каждый год."
 lepsius_specialization_precolumbian_tech: "Доколумбова археология"
 lepsius_specialization_precolumbian_tech_desc: "Фокус на доколумбовых культурах приводит к тому, что наши археологи с самого начала обладают чертой «Доколумбова археология». Кроме того, за каждые раскопки в Центральной или Южной Америке мы получаем на один артефакт больше каждый год."
 lepsius_has_archaeologist_egypt_specialist_tt: "У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [Concept('concept_lepsius_archaeologist', '#b #BLUE археолог#!#!')] с чертой #V Специализация: египтология#!."
 lepsius_has_archaeologist_mesopotamia_specialist_tt: "У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [Concept('concept_lepsius_archaeologist', '#b #BLUE археолог#!#!')] с чертой #V Специализация: ассириология#!."
 lepsius_has_archaeologist_aegean_specialist_tt: "У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [Concept('concept_lepsius_archaeologist', '#b #BLUE археолог#!#!')] с чертой #V Специализация: эгейская археология#!."
 lepsius_has_archaeologist_precolumbian_specialist_tt: "У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [Concept('concept_lepsius_archaeologist', '#b #BLUE археолог#!#!')] с чертой #V Специализация: доколумбова археология#!."
 je_lepsius_mascapaicha_goal: ""
 je_lepsius_specialization: "Археологическая специализация"
 je_lepsius_specialization_reason: "Нация может выбрать археологический фокус один раз. В зависимости от археологической подкатегории, она получает на один артефакт (египетский, месопотамский, эгейский, доколумбовый) больше в год за каждые раскопки. Новые археологи получают соответствующую черту специализации и находят на 5 артефактов больше в конце экспедиции."
 je_lepsius_specialization_success: "[GetPlayer.GetName] [SelectLocalization(GetPlayer.IsFemale, 'выбрала', 'выбрал')] археологическую специализацию."
 lepsius_archaeological_expedition_specialization_tt: "Благодаря специализации нашего археолога мы получаем дополнительно #G 5#! [Concept('concept_lepsius_artifact','артефактов')]."
 lepsius_add_1_specialization_clue_tt: "Благодаря специализации нашего археолога мы получаем #G 1#! дополнительную улику."
 je_lepsius_alexander: "Гробница Александра"
 je_lepsius_alexander_reason: "Александр Македонский был одним из величайших полководцев всех времён и основал мировую империю, из которой возникли эллинистические государства. Его гробница, которую и почитали, и боялись, стала местом паломничества в древнем мире. Но не позднее V века н.э. точное местоположение гробницы стало неизвестно. Большинство источников говорят об Александрии как о последнем месте захоронения, но даже это не является полностью бесспорным. Наша основная цель - провести раскопки - будь то по лицензии или силой - в местах, где были найдены следы Александра. Следуя за уликами, мы сможем точнее определить местонахождение гробницы. Для этого, однако, нам придётся перемещаться от одного места раскопок к другому, как в поисках сокровищ."
 je_lepsius_alexander_success: "Если мы найдём достаточно #V таинственных улик#! к гробнице Александра, мы сможем точно определить её местонахождение."
 je_lepsius_alexander_goal: ""
 je_lepsius_ark: "Ковчег Завета"
 je_lepsius_ark_reason: "Ковчег Завета имеет высочайшую религиозную и археологическую ценность. Народ Израиля считал его центром своего святилища, Иерусалимского храма. Со времён Моисея, как хранитель Десяти заповедей, он был спутником в отвоевании Святой земли. Ковчег был гарантом присутствия Бога среди народа. Он считается утерянным со времён завоевания Иерусалима Навуходоносором II (587/586 г. до н.э.). Наша основная цель - провести раскопки - будь то по лицензии или силой - в местах, где были найдены следы Ковчега. Следуя за уликами, мы сможем точнее определить его истинное местоположение. Для этого, однако, нам придётся перемещаться от одного места раскопок к другому, как в поисках сокровищ."
 je_lepsius_ark_success: "Если мы найдём достаточно #V таинственных улик#! к Ковчегу, мы сможем точно определить его местонахождение."
 je_lepsius_ark_goal: ""
 je_lepsius_atlantis: "Судьба Атлантиды"
 je_lepsius_atlantis_reason: "Атлантида - один из величайших мифов человечества в мировой истории. Падение легендарного города стало символом: оно олицетворяет потерю рая, пророчество о великой стране на Западе и падение высокоразвитой цивилизации. Впервые Платон упоминает предположительно могущественную морскую державу, которая доминировала на больших частях Средиземноморья, пока стихийное бедствие не решило её судьбу. Возможное существование Атлантиды обсуждалось уже в древности. В то время как авторы, такие как Плиний Старший, отрицали существование рассматриваемого островного царства, другие, такие как Крантор, Посейдоний и Страбон, считали его существование возможным. Наша основная цель - провести раскопки - будь то по лицензии или силой - в местах, где были найдены следы Атлантиды. Следуя за уликами, мы сможем точнее определить положение города. Для этого, однако, нам придётся перемещаться от одного места раскопок к другому, как в поисках сокровищ."
 je_lepsius_atlantis_success: "Если мы найдём достаточно #V таинственных улик#! к Атлантиде, мы сможем точно определить её местонахождение."
 je_lepsius_atlantis_goal: ""
 je_lepsius_eldorado: "Поиски Эльдорадо"
 je_lepsius_eldorado_reason: "Следовали ли конкистадоры лишь сказкам и небылицам? Без историй о легендарных золотых народах Бальбоа не нашёл бы Тихого океана, Эрнандо де Сото не бродил бы по территории нынешних США. Открытие Нового Света было бы другим. Случаи с Кортесом и Писарро подтвердили легенды. Возможно, есть что-то в том, что на американском континенте всё ещё есть неоткрытый, важный город - археологические факты говорят сами за себя. Наша основная цель - провести раскопки - будь то по лицензии или силой - в местах, где были найдены следы Эльдорадо. Следуя за уликами, мы сможем точнее определить местонахождение города. Для этого, однако, нам придётся перемещаться от одного места раскопок к другому, как в поисках сокровищ."
 je_lepsius_eldorado_success: "Если мы найдём достаточно #V таинственных улик#! к Эльдорадо, мы сможем точно определить его местонахождение."
 je_lepsius_eldorado_goal: ""
