 je_lepsius_palmyra_reason: "#T Руины Пальмиры в Сирии — увлекательное место для археологов.#!\n$mr_divider_for_je$\nКаждый месяц вы будете получать прогресс в зависимости от многих различных факторов. В определённые моменты раскопок вы будете получать событие, дающее вам [Concept('concept_lepsius_artifact','артефакты')], опыт и изменяющее черту области, что приводит к увеличению дохода от [concept_curtiss_tourism|l].\n$mr_divider_for_je$\n$lepsius_excavation_progress_loc$"
