 country_lepsius_decorative_local_artifacts_add: "@lepsius_local_minor! #V местный артефакт#! от археологических проектов"
 je_lepsius_angkor: "Сердце Кхмерской империи"
 je_lepsius_angkor_reason: "Руины Ангкора никогда по-настоящему не исчезали. Они оставались известны не только местным жителям, но и европейским миссионерам и путешественникам раннего Нового времени, сообщавшим о храмах в джунглях. Чтобы тщательно исследовать былое владычество кхмеров, руины необходимо полностью очистить от растительности и восстановить археологический памятник до начала любых исследований."
 je_lepsius_cliff: "Тайна пуэбло"
 je_lepsius_cliff_reason: "В отличие от многих других жителей западной части Северной Америки, индейцы пуэбло ведут оседлый образ жизни. Они живут в каменных домах и небольших поселениях и занимаются земледелием. Ходят слухи, что на их территории есть многочисленные заброшенные города. Неужели в этой части Америки действительно существовала исчезнувшая цивилизация?"
 je_lepsius_guatavita: "Тайна муисков"
 je_lepsius_guatavita_reason: "Озеро Гуатавита остаётся окутанным тайной. Это место считалось священным у муисков, одного из легендарных золотоносных народов Колумбии, тесно контактировавшего с инками и владевшего одним из самых развитых ювелирных ремёсел доколумбовой эпохи. Отголоски прошлого всё ещё звучат: в озере могут скрываться несметные богатства. Небольшие раскопки могли бы дать определённость."
 lepsius.78.t: "Скальный дворец"
 lepsius.78.d: "Скорее случайно, чем намеренно, археологи в Колорадо, искавшие древние индейские артефакты, обнаружили город пуэбло, высеченный в скале. Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] немедленно [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'отправилась', 'отправился')] туда, чтобы подробнее изучить памятник."
 lepsius.78.f: "Скальный дворец - крупнейшее скальное жилище Северной Америки, расположенное в национальном парке Меса-Верде, штат Колорадо. Комплекс, построенный предками пуэбло между 1190 и 1260 годами н. э., включает более 150 комнат и 23 кивы. Хотя коренные народы сохраняли родовую связь с этим местом, его документированное открытие евроамериканцами произошло 18 декабря 1888 года. Ранчеры Ричард Уэзерилл и Чарли Мейсон заметили руины с края каньона, когда искали потерявшийся скот во время метели. Поражённые масштабом каменной кладки, укрытой в нише песчаника, они назвали это место «Скальным дворцом». Это открытие вызвало международный интерес к археологии Юго-Запада и способствовало федеральной охране памятника в 1906 году."
 lepsius.79.t: "Ангкор восстановлен"
 lepsius.79.d: "После многих месяцев доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] и [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'её', 'его')] помощники раскрыли руины древней кхмерской столицы Ангкор. Теперь археологический памятник снова можно использовать для углублённых исследований."
 lepsius.79.f: "«Он действительно отличается от великих классических памятников Средиземноморья, давно завоевавших наше восхищение: это уже не величественные колоннады, не великие спокойные поверхности Греции или Египта; напротив, это формы трудные, сложные, мучительные: наложения, множественные уступы, лабиринты, галереи, укрытые от дневного света, зубчатые башни, пирамиды с бесчисленными ярусами и шпилями, огромное изобилие орнаментов и скульптур, постоянные эффекты света и тени, которые обогащают целое, не нарушая его величия, и прекрасно сливаются с ярким светом и пышной тропической растительностью. Одним словом, это иная форма красоты». - Луи Делапорт"
 lepsius.751.t: "Золотой плот из Сьечи"
 lepsius.751.d: "Раскопки выявили загадочный и прекрасный плот из золота. Его уже считают ключевым артефактом исчезнувшей культуры муисков, и он оживляет древние легенды."
 lepsius.751.f: "В 1856 году два брата из Сьечи, Хоакин и Бернардино Товар, частично осушили близлежащую лагуну и нашли вотивный плот, который связали с церемонией из легенды об Эльдорадо. Он оказался в руках дипломата Саломона Коппеля, продавшего его музею в Германии, Этнологическому музею. К несчастью, по прибытии в Германию плот был уничтожен пожаром. Плот из Сьечи - один из двух известных золотых плотов культуры муисков. Другой, плот из Паски, был найден лишь сто лет спустя."
 lepsius.751.g: "Он станет лучшим экспонатом нашей коллекции."
 lepsius.751.h: "У нас нет музея для него. Стоит продать его в обмен на деньги, научную помощь и политическую услугу."
 lepsius.752.d: "Страна [SCOPE.sCountry('lepsius_raft_country').GetName], не имея собственного музея, обратилась к нам с впечатляющим артефактом. Он происходит из Сьечи на берегах озера Гуатавита и изображает золотой плот, украшенный сложными фигурами процессии. Учёные требуют приобрести этот предмет любой ценой, но политики сомневаются в условиях соглашения."
 lepsius.752.g: "Нам нужен этот артефакт любой ценой!"
 lepsius.752.h: "Мы не можем это купить."
 lepsius.734.t: "Ритон с головой быка"
 lepsius.734.d: "Во время текущих раскопок Кносского дворца доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'сделала', 'сделал')] сенсационное открытие, придающее совершенно новое значение греческим мифам о Крите и его легендарном царе Миносе."
 lepsius.734.f: "Ритон с головой быка был обнаружен сэром Артуром Эвансом в «Малом дворце» в Кноссе на Крите и относится к новодворцовому периоду (ок. 1550-1500 гг. до н. э.). Этот церемониальный сосуд вырезан из цельного блока чёрного стеатита. Его глаза выполнены из горного хрусталя и красной яшмы, создавая живой взгляд, а морда тонко инкрустирована белой раковиной. Как ритон, он служил ритуальным сосудом для возлияний: жидкость заливали в шею, а выходила она через отверстие в морде. Символизируя силу и плодородие, он воплощает центральную роль быка в минойской религии."
 lepsius_no_artifact_export_modifier: "Запрет на вывоз артефактов"
