 lepsius_specialization_egypt_button: "Египтология"
 lepsius_specialization_egypt_button_desc: "Египтология исследует все области древнеегипетской цивилизации (быт, язык и литературу, историю, религию, культуру и искусство, экономику, право, этику и интеллектуальную жизнь) с доисторического периода 5-го тысячелетия до н.э. (например, культуры Негада и Бадари) до конца римского правления в 4-м веке н.э."
 lepsius_specialization_mesopotamia_button: "Ассириология"
 lepsius_specialization_mesopotamia_button_desc: "Ассириология, также известная как клинопись или древневостоковедение, — это археологическое, антропологическое, историческое и лингвистическое исследование культур, использовавших клинопись. Область охватывает додинастическую Месопотамию, Шумер, ранние шумеро-аккадские города-государства, Аккадскую империю, Эблу, аккадские и имперские арамейскоязычные государства Ассирии, Вавилонии и Приморской династии, мигрантские иностранные династии южной Месопотамии, включая гутиев, амореев, касситов, арамеев, сутеев и халдеев."
 lepsius_specialization_aegean_button: "Эгейская археология"
 lepsius_specialization_aegean_button_desc: "Эгейская цивилизация — это общий термин для цивилизаций бронзового века Греции вокруг Эгейского моря. Существует три различных, но сообщающихся и взаимодействующих географических региона, охватываемых этим термином: Крит, Киклады и материковая Греция. Крит ассоциируется с минойской цивилизацией с раннего бронзового века. Кикладская цивилизация сближается с материком в раннеэлладский период и с Критом в среднеминойский период. Примерно с 1450 г. до н.э. (позднеэлладский, позднеминойский) греческая микенская цивилизация распространяется на Крит, вероятно, путём военного завоевания."
 lepsius_specialization_precolumbian_button: "Доколумбова археология"
 lepsius_specialization_precolumbian_button_desc: "В истории Америк доколумбова эра охватывает период от первоначального заселения Америк в верхнем палеолите до европейской колонизации, которая началась с путешествия Христофора Колумба в 1492 году. Обычно эта эра охватывает историю коренных культур до значительного влияния европейцев. Для определённых культур это могло произойти через десятилетия или даже столетия после Колумба."
 lepsius_alexander_search_clue_button: "Найти больше улик"
 lepsius_alexander_search_clue_button_desc: "Мы можем предпринять специальную археологическую экспедицию, чтобы найти ещё одну улику к гробнице Александра Македонского."
 lepsius_ark_search_clue_button: "Найти больше улик"
 lepsius_ark_search_clue_button_desc: "Мы можем предпринять специальную археологическую экспедицию, чтобы найти ещё одну улику к Ковчегу Завета."
 lepsius_atlantis_search_clue_button: "Найти больше улик"
 lepsius_atlantis_search_clue_button_desc: "Мы можем предпринять специальную археологическую экспедицию, чтобы найти ещё одну улику к Атлантиде."
 lepsius_eldorado_search_clue_button: "Найти больше улик"
 lepsius_eldorado_search_clue_button_desc: "Мы можем предпринять специальную археологическую экспедицию, чтобы найти ещё одну улику к Эльдорадо."
 lepsius_legendary_expedition_modifier: "Легендарная археологическая экспедиция"
 lepsius_alexander_intensive_study_button: "Сива"
 lepsius_alexander_intensive_study_button_desc: "Оазис Сива считается одним из ключевых мест в жизни Александра. Некоторые даже утверждают, что он был похоронен здесь, а не в Александрии, из-за его тесной связи с египетским богом Аммоном, чей оракул находился здесь. Благодаря нашим выдающимся знаниям в области египтологии, мы можем легко найти здесь дополнительную улику. Наш археолог отправится в частную и тайную поездку, без суеты экспедиции."
 lepsius_ark_intensive_study_button: "Иерусалим"
 lepsius_ark_intensive_study_button_desc: "Считается, что Храмовая гора в Иерусалиме — это последнее место, где хранился Ковчег Завета, прежде чем он исчез. Весьма вероятно, что под Храмовой горой всё ещё есть важные улики о том, что на самом деле могло произойти в хаосе вавилонского завоевания. Благодаря нашим выдающимся знаниям в области ассириологии, мы можем легко найти здесь дополнительную улику. Наш археолог отправится в частную и тайную поездку, без суеты экспедиции."
 lepsius_atlantis_intensive_study_button: "Санторини"
 lepsius_atlantis_intensive_study_button_desc: "Санторини (Тера) славится своим мощным вулканическим извержением, которое сильно затронуло минойский город на острове и, возможно, всю минойскую цивилизацию. Тезис о том, что извержение вулкана стало источником рассказа Платона о затоплении Атлантиды, является одной из многих гипотез о местонахождении Атлантиды. Благодаря нашим выдающимся знаниям в области эгейской археологии, мы можем легко найти здесь дополнительную улику. Наш археолог отправится в частную и тайную поездку, без суеты экспедиции."
 lepsius_eldorado_intensive_study_button: "Богота"
 lepsius_eldorado_intensive_study_button_desc: "Богота считается бывшей столицей муисков, цивилизации, связанной с мифом о золоте Эльдорадо. Каждый новый правитель муисков при вступлении в должность приносил жертву богу солнца, его обнажённое тело покрывали пастой из золотой пыли. Благодаря нашим выдающимся знаниям в области доколумбовой археологии, мы можем легко найти здесь дополнительную улику. Наш археолог отправится в частную и тайную поездку, без суеты экспедиции."
 lepsius_2_sub_archaeological_team_tt: "Потерять #R 2#! раскопочные группы."
 lepsius_egypt_specialist: "Специализация: египтология"
 lepsius_egypt_specialist_desc: "Этот археолог является экспертом в области Древнего Египта и поэтому легче находит артефакты и улики."
 lepsius_mesopotamia_specialist: "Специализация: ассириология"
 lepsius_mesopotamia_specialist_desc: "Этот археолог является экспертом в области Древней Месопотамии и поэтому легче находит артефакты и улики."
 lepsius_aegean_specialist: "Специализация: эгейская археология"
 lepsius_aegean_specialist_desc: "Этот археолог является экспертом по микенской и минойской цивилизациям и поэтому легче находит артефакты и улики."
 lepsius_precolumbian_specialist: "Специализация: доколумбова археология"
 lepsius_precolumbian_specialist_desc: "Этот археолог является экспертом по доколумбовым цивилизациям и поэтому легче находит артефакты и улики."
 lepsius_state_trait_alexander: "Следы Александра"
 lepsius_state_trait_ark: "Следы Ковчега"
 lepsius_state_trait_atlantis: "Следы Атлантиды"
 lepsius_state_trait_eldorado: "Следы Эльдорадо"
 lepsius.1001.t: "Зов Александра"
 lepsius.1001.d: "Торжественное открытие ведущей в мире, превосходной коллекции египетских артефактов возвращает воспоминание, которое некоторые учёные в Археологическом музее давно подавили..."
 lepsius.1001.f: "Воспоминание о македонском храме в песках пробуждается, когда [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] смотрит на выставку. Потому что есть и другие экспонаты птолемеевского периода, некоторые даже со времён греческого завоевания. Части головоломки, которые ранее было невозможно интерпретировать, внезапно обретают смысл. Намёк на то, что в египетской пустыне может скрываться нечто большее. Нечто настолько большое и массивное, что всей Сахары не хватит, чтобы его похоронить. Место последнего упокоения Александра Македонского по сей день остаётся загадкой. Но множество находок, огромный объём знаний и блестящий археологический опыт доктора [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] — это смесь, которая исторически уникальна. Археолог уверен: Александр был человеком, принадлежавшим живым, а не мёртвым. И тот, кто когда-нибудь найдёт его вечное пристанище, — обретёт вечную славу."
 lepsius.1001.g: "Мечта каждого археолога..."
 lepsius.1002.t: "Ковчег"
 lepsius.1002.d: "Торжественное открытие ведущей в мире, превосходной коллекции месопотамских артефактов возвращает воспоминание, которое некоторые учёные в Археологическом музее давно подавили..."
 lepsius.1002.f: "Херувимы украшали Ковчег Завета. Гибридные существа, какие встречаются в Месопотамии. Авраам, прародитель Израиля и трёх мировых религий, был родом из Ура. Рассказ о сотворении мира имеет параллели с вавилонскими мифами. Вавилон в то же время является роковым местом для Израиля: именно правители Месопотамии разрушили первые еврейские государства, превратили Храм в пепел и депортировали население. С того дня Ковчег Завета, в который, как говорят, Моисей положил Десять заповедей, также бесследно исчез. Это один из самых важных утерянных артефактов в мировой истории. Глядя на совершенную коллекцию, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] улики, которые показывают, что Ковчег Завета, возможно, не был утерян навсегда — и ждал своего возвращения 2500 лет."
 lepsius.1003.t: "Величайший миф из всех"
 lepsius.1003.d: "Торжественное открытие ведущей в мире, превосходной коллекции эгейских артефактов возвращает воспоминание, которое некоторые учёные в Археологическом музее давно подавили..."
 lepsius.1003.f: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'смотрела', 'смотрел')] на орихалк между [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'своими', 'своими')] пальцами. Маленький блестящий шарик. Материал, которого не должно было существовать. Он попал в [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'её', 'его')] руки после того, как Археологический музей открыл свою великолепную выставку. Выставку, на которой другие экспонаты из минойско-эгейского региона также укрепили [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'её', 'его')] мнение о том, что это находится на пороге между наукой и мифом. Позволено ли археологу мечтать? Никто не верил Шлиману, когда он искал Трою. Вавилонская башня также была отвергнута как простая метафора. Но как насчёт величайшего мифа всех времён? Мифа настолько большого, что даже древний мир, казалось, уже не знал, что было повествованием, а что — историей.\nДоктор [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] смотрит в блестящий маленький шарик, в котором отражается [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'её', 'его')] лицо. Судьба целой затерянной цивилизации смотрит в ответ."
 lepsius.1004.t: "Проклятие золота"
 lepsius.1004.d: "Торжественное открытие ведущей в мире, превосходной коллекции доколумбовых артефактов возвращает воспоминание, которое некоторые учёные в Археологическом музее давно подавили..."
 lepsius.1004.f: "С момента прибытия европейцев в Америку циркулировали слухи. Смертельные слухи. Бесчисленные люди погибли, потому что их жажда золота гнала их: в объятия враждующих племён, в кишащие малярией болота и в морские штормы. Понсе де Леон искал источник молодости. Васкес де Коронадо искал Семь городов золота. Эрнандо де Сото прошёл большую часть Северной Америки в поисках неведомых богатств. Надежда прославиться и разбогатеть, как Кортес и Писарро, была слишком соблазнительной, хотя и обманчивой. Но теперь, когда [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] вдохновлён предполагаемым идолом инков и сравнивает его с другими артефактами из богатой доколумбовой выставки, [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она сама', 'он сам')] боится, что может поддаться той же золотой лихорадке. В конце концов, должна ли наука привести [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'её', 'его')] на дорогу в Эльдорадо?"
 lepsius_anthropology_tech: "Антропология"
 lepsius_anthropology_tech_desc: "Палеоантропология, или просто антропология, — это отрасль палеонтологии и антропологии, которая стремится понять раннее развитие анатомически современных людей, процесс, известный как гоминизация, путём реконструкции эволюционных родственных линий в семействе Hominidae, работая с биологическими доказательствами (такими как окаменевшие останки скелета, фрагменты костей, следы) и культурными доказательствами (такими как каменные орудия, артефакты и места поселений)."
 je_lepsius_archaeology_start_in_egypt: "Рождение египтологии"
 je_lepsius_archaeology_start_in_egypt_reason: "В пустынях Египта всё ещё ждёт своего открытия множество сокровищ. Положит ли один из наших археологов начало новой эре египтологии и сделает ли возможными [Concept('concept_lepsius_expedition','археологические экспедиции')] в Египет?"
 lepsius.22.t: "Рождение египтологии"
 lepsius.22.d_egyptology: "После экспедиции в Египет доктор [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] представил[SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'а', '')] своё исследование. [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'Она', 'Он')] не только [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'смогла', 'смог')] найти различные новые объекты благодаря расшифровке иероглифов, [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'её', 'его')] находки также вызвали новый интерес к региону."
 lepsius.22.f_egyptology: "#b Исторический контекст:#! После смерти Франсуа Шампольона исследование иероглифов зашло в тупик. В 1837 году молодой немецкий филолог Карл Рихард Лепсиус написал письмо Ипполито Розеллини, близкому соратнику Шампольона, который был одним из организаторов франко-тосканской египетской экспедиции 1829 года. Лепсиус систематизировал и представил знания, накопленные Шампольоном, и сыграл важную роль в превращении египтологии в серьёзную науку. Кроме того, он убедил политические элиты Европы в необходимости будущих экспедиций в Египет."
 notification_lepsius_birth_of_egyptology_notification_name: "Рождение египтологии"
 notification_lepsius_birth_of_egyptology_notification_desc: "Археолог из [GetGlobalVariable('lepsius_egyptology_invented_country_global_var').GetCountry.GetAltNameNoFlag('RU_CL_RP')] отправился в экспедицию в Египет, положив начало новой эре египтологии. Мы тоже должны отправить археолога в Египет, как и все великие нации!"
 je_lepsius_yucatan_expedition: "Экспедиция на Юкатан"
 je_lepsius_yucatan_expedition_reason: "Ходят слухи о древних руинах в джунглях Юкатана. Говорят, что отважного исследователя ждут фантастические сокровища. Возможно, археолог сможет найти для нас сокровища майя? Это позволило бы нам и другим нациям отправиться в [Concept('concept_lepsius_expedition','археологические экспедиции')] на Юкатан."
 lepsius.23.t: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]: Экспедиция"
 lepsius.23.d: "Доктор [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] и его команда провели месяцы в джунглях Юкатана. Теперь они вернулись с сокровищами, информацией и различными рисунками найденных ими руин. Это положит начало новой эре археологии в Центральной Америке."
 lepsius.23.f: "#b Исторический контекст:#! Был ли Новый Свет домом только для дикарей и варваров до прибытия европейцев? Исследователи Джон Ллойд Стивенс и Фредерик Кэтервуд основательно пошатнули это мировоззрение. В течение нескольких лет американец и британец бродили по джунглям полуострова Юкатан и, по их собственным заявлениям, посетили 44 различных места давно исчезнувшей мезоамериканской культуры. Местные жители давно рассказывали истории о давно забытых городах и храмах, скрытых в джунглях; но отчёты Стивенса, и особенно потрясающие литографии Кэтервуда, открывают доселе совершенно неизвестный мир. Изображения храмов, статуй и стел не только будоражат фантазию романтиков. Волна интереса к неизвестной цивилизации распространяется по США и Европе, варьируясь от любопытства и восхваления до подлинного научного интереса."
 notification_lepsius_yucatan_expedition_notification_name: "Экспедиция на Юкатан"
 notification_lepsius_yucatan_expedition_notification_desc: "Археолог из [GetGlobalVariable('lepsius_yucatan_expedition_country_global_var').GetCountry.GetAltNameNoFlag('RU_CL_RP')] вернулся из полного приключений путешествия по полуострову Юкатан — и рассказывает о легендарных руинах в джунглях. Учёные выразили заинтересованность в более тщательном изучении культуры майя."
 lepsius.1011.t: "[SCOPE.sState('lepsius_location_state').GetNameNoFormatting]"
 lepsius.1011.d_alexander: "Начинается новая глава в поисках гробницы самого могущественного человека древности. Имеющаяся на данный момент информация предполагает, что в [SCOPE.sState('lepsius_location_state').GetName] может быть зацепка, которая поможет определить местонахождение мавзолея Александра. Раскопочные группы и доктор [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] готовы."
 lepsius.1011.d_ark: "Когда экспедиционная группа и доктор [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] достигают цели своих поисков в [SCOPE.sState('lepsius_location_state').GetName], их встречает тёплый ветер из пустыни. Тайна Ковчега Завета будет здесь разгадана ещё раз."
 lepsius.1011.d_atlantis: "Был ли [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] дураком? Одним из тысяч за тысячи лет? Сколько людей поверили рассказу Платона и либо так и не вернулись, либо вернулись полные стыда и горя? Доктор [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] знает: в этом путешествии был только успех. Всё остальное означало конец его карьеры."
 lepsius.1011.d_eldorado: "Члены экспедиции жалуются на тропический климат. Доктор [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] охлаждается веером. Тропа ведёт в отдалённый район. Некоторые носильщики поговаривают, что они могут заблудиться так же, как и многие отряды испанских конкистадоров в поисках золота..."
 lepsius.1011.f: "«Спроси себя, зачем ты ищешь Чашу Христову? Ради Его славы или ради своей?»"
 lepsius.1011.g: "Копать глубже."
 lepsius.1012.t: "Успешное возвращение"
 lepsius.1012.d_alexander: "Невыносимая жара на мгновение отступает. Доктор [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] смотрит на свои записи. Новые связи проливают новый свет на поиски мавзолея Александра Македонского. В его голове проносится мысль. Пройдёт немного времени, прежде чем [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'столкнётся', 'столкнётся')] с историей... и [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'сотворит', 'сотворит')] историю."
 lepsius.1012.d_ark: "Поиски Ковчега Завета были нечто большим, чем поиски археологического артефакта. Это были поиски утерянного культового предмета, который обещал контакт с Богом. Доктор [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] снова и снова [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'испытывала', 'испытывал')] это в этой поездке. Но сколько ещё археологических паломничеств [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'ей', 'ему')] придётся выдержать, прежде чем этот контакт состоится?"
 lepsius.1012.d_atlantis: "Миф об Атлантиде живёт. Доктор [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] знает, что путешествие ещё не подошло к концу. Когда [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] смотрит на море в гавани и видит кружащих птиц, [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] философствует о том, сколько ещё предстоит преодолеть трудностей, прежде чем они наконец достигнут своей цели."
 lepsius.1012.d_eldorado: "К удивлению остальной части экспедиционной команды, учёные возвращаются живыми и невредимыми. На мгновение кажется забытым, что доктор [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] отправил их на самоубийственную миссию. Успешное завершение этого этапа на пути в Эльдорадо доказывает его правоту."
 lepsius.1012.f: "«Поиск Грааля — это поиск божественного во всех нас. Но если вы хотите фактов, у меня их нет. В моём возрасте я готов принять некоторые вещи на веру»."
 lepsius.1012.g: "Ещё один фрагмент большой мозаики."
 lepsius.1013.t_alexander: "Сива"
 lepsius.1013.d_alexander: "Переодевшись бедуином, доктор [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] смог в одиночку найти доступ к разрушенному Оракулу Аммона. Во время исследования [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] сохранившиеся папирусы раннего правления Птолемеев в ранее недоступном месте, которые предоставляют информацию о культе Александра."
 lepsius.1013.t_ark: "Иерусалим"
 lepsius.1013.d_ark: "Где ещё, как не в Святом Городе, можно с большей уверенностью найти ключ, указывающий на судьбу Ковчега Завета? Смесью взяточничества и нарушения закона доктор [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] смог[SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'ла', '')] проникнуть в скрытую систему туннелей под Куполом Скалы и найти решающую улику о местонахождении драгоценного артефакта."
 lepsius.1013.t_atlantis: "Санторини"
 lepsius.1013.d_atlantis: "Минойские следы всё ещё видны на Санторини под обломками мощного извержения тысячи лет назад. Доктор [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'исследовала', 'исследовал')] древний дворец, ставший жертвой катастрофического бедствия; [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'обнаружила', 'обнаружил')] и [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'восстановила', 'восстановил')] целую серию погребённых фресок. Одна из них показывает карту, которая, на удивление, точно отображает черты Средиземноморья и атлантического западного побережья."
 lepsius.1013.t_eldorado: "Богота"
 lepsius.1013.d_eldorado: "Доктор [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'исследовала', 'исследовал')] окрестности Боготы, где когда-то жил таинственный народ муисков. Подсказки местных жителей привели [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'её', 'его')] к ранее неизвестному месту, где многочисленные артефакты муисков предоставляют больше информации о ритуале «Золотого человека»."
 lepsius.1013.f: "Страны, которые сосредотачиваются на определённой археологической отрасли, соответствующей цели Легендарной экспедиции, имеют далеко идущие преимущества в своём стремлении к археологической сенсации. Это относится не только к получению дополнительной улики, которая ускорит ваши поиски."
 lepsius.1013.g: "Ещё один фрагмент большой мозаики."
 lepsius_discovery_vilcabamba_modifier: "Открытие Вилькабамбы"
 lepsius_peru_inspection_modifier: "Наш археолог посещает нашу раскопочную группу в Перу, чтобы основать новое место раскопок."
 lepsius_add_1_vilcabamba_clue_tt: "Получить #G 1#! новую улику о значительном археологическом открытии в Перу."
 lepsius_add_2_vilcabamba_clue_tt: "Получить #G 2#! новые улики о значительном археологическом открытии в Перу."
 lepsius_add_3_vilcabamba_clue_tt: "Получить #G 3#! новые улики о значительном археологическом открытии в Перу."
 je_lepsius_discovery_vilcabamba: "Расследования в Перу"
 je_lepsius_discovery_vilcabamba_reason: "У нас есть все основания полагать, что ещё не все тайны инков разгаданы. Поиски могут занять у нас годы. Тот, кому удастся сделать это открытие, должен занять своё место в истории."
 je_lepsius_discovery_vilcabamba_goal: ""
 je_lepsius_disovery_vilcabamba_success: "Если нам удастся найти десять улик в Перу, мы соберём достаточно материала, чтобы заново открыть затерянное место большой исторической значимости."
 je_lepsius_disovery_vilcabamba_fail: "Наши усилия будут напрасны, если другая нация найдёт десять улик в Перу раньше нас."
 lepsius.801.n: "Перу"
 lepsius.811.t_per: "Гробница конкистадора"
 lepsius.811.f_per: "С большим интересом археологи обнаружили запертые ворота, которые, предположительно, давали доступ к затерянному месту захоронения инкского принца, возможно, даже правителя. К сожалению, команда должна была обнаружить, что это была не гробница высокопоставленного инка, а испанского конкистадора. Однако доктор [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'определила', 'определил')], что по крайней мере интерьер и некоторые артефакты относятся к периоду инков, поэтому можно сделать хотя бы несколько выводов."
 lepsius.812.t_per: "Шахта инков"
 lepsius.812.f_per: "В глубине Анд доктор [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] затерянную тропу, которая привела [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'её', 'его')] в яму. Сначала казалось, что она не имеет никакого значения, пока команда осторожно не убрала обломки. Как оказалось, яма была входом в сложную, искусственно созданную систему пещер. Дальнейшие исследования обнаружили горные инструменты, предметы быта и расписные стены. Было ли это одним из великих мест добычи золота и серебра, из которых инки делали свои художественные изделия?"
 lepsius.813.t_per: "Храм Солнца"
 lepsius.813.f_per: "Удача для археологии: доктор [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] сообщает, что [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] ранее совершенно неизвестный храмовый комплекс в горах Перу. По-видимому, это место поклонения богу солнца Инти. Учёные не только нашли на месте многочисленные артефакты, но и росписи и храмовые одеяния. Это открытие является небольшой сенсацией в доколумбовой археологии."
 lepsius.971.t: "Открытие Вилькабамбы"
 lepsius.971.d: "Это сенсационный день для мировой науки. Мы сделали великое открытие: затерянный город Вилькабамба был обнаружен сегодня археологами #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFlag]ой#! страны!"
 lepsius.971.f: "Вилькабамба была столицей Новоинкского государства с 1539 по 1572 год. Новоинкское государство было последним убежищем империи инков, пока оно не пало под натиском испанцев и их союзников из числа коренного населения в 1572 году, что ознаменовало конец сопротивления инков испанскому владычеству. Впоследствии Вилькабамба была заброшена, и её местоположение было забыто. В 1911 году исследователь Хайрам Бингем ошибочно идентифицировал заброшенные руины Мачу-Пикчу как Вилькабамбу, но он также посетил руины, называемые местными перуанцами Эспириту-Пампа. В 1964 году Джин Савой идентифицировал Эспириту-Пампа как сказочную Вилькабамбу, что было широко принято археологами и историками."
 lepsius.971.g: "То, чего не смогли сделать даже конкистадоры, сделали мы."
 lepsius.972.d: "[SCOPE.sCountry('lepsius_vilcabamba_discoverer').GetName] [SelectLocalization(SCOPE.sCountry('lepsius_vilcabamba_discoverer').IsFemale, 'сделала', 'сделал')] великое открытие: сегодня был обнаружен затерянный город Вилькабамба!"
 lepsius.972.f: ""
 lepsius.972.g: "Жаль, что они не затерялись."
 je_lepsius_nazca: "Странные линии Наски"
 je_lepsius_nazca_reason: "Странные линии в ландшафте недалеко от города Наска вызывали вопросы со времён испанского завоевания. Некоторые считают их остатками дорожной сети или водостоков. Археолог мог бы получить правильное представление — с помощью пилота."
 lepsius.76.t: "Тайна Наски с высоты птичьего полёта"
 lepsius.76.d: "[GetPlayer.MakeScope.Var('curtiss_pilot_var').GetCharacter.GetLastName] took Dr. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] on a flight. Now the scientist can see much more clearly what the lines on the ground mean. When viewed from a suitable height, the lines turn out to be something more complex. There are dozens of scratched images of animals and figures from pre-Columbian times. An incredible archaeological discovery!"
 lepsius.76.f: "Линии Наски — это более 1500 огромных изображений-царапин (геоглифов) в пустыне недалеко от Наски и Пальпы в Перу, которые можно увидеть и распознать только с воздуха и с окружающих холмов. Линии, пустыня и культура названы в честь города Наска, который находится недалеко от равнины. Создателями линий считаются культуры Паракас и Наска. На площади 500 км² равнина Наска демонстрирует идеально прямые линии, треугольники и трапециевидные поверхности длиной до 20 км, а также фигуры размером от десяти до нескольких сотен метров, например, изображения людей, обезьян, птиц и китов. Линии, образующие фигуры, часто имеют глубину всего несколько сантиметров. Из-за их огромных размеров их можно увидеть только с больших расстояний, с окружающих холмов или с самолётов. В этом смысле линии Наски были открыты только в 1920-х или, самое позднее, в 1930-х годах, когда самолёты стали регулярно летать над пустыней Наска. В 1926 году линии Наски были впервые научно описаны."
 lepsius.76.g: "Но каково может быть истинное значение этих изображений?"
