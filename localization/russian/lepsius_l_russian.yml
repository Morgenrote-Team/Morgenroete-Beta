 notification_lepsius_rosellini_notification_name: "Письмо Лепсиуса к Розеллини"
 notification_lepsius_rosellini_notification_desc: "Немецкий филолог Карл Рихард Лепсиус представил свою усовершенствованную форму перевода иероглифов в письме итальянскому египтологу Ипполито Розеллини. Звучат призывы предпринять экспедицию в Египет."
 notification_lepsius_stephens_catherwood_expedition_notification_name: "Экспедиция Стивенса и Кэтервуда"
 notification_lepsius_stephens_catherwood_expedition_notification_desc: "Американский исследователь Джон Ллойд Стивенс и британский художник Фредерик Кэтервуд вернулись из полного приключений путешествия по полуострову Юкатан и рассказывают о легендарных руинах в джунглях. Учёные выразили заинтересованность в более тщательном изучении культуры майя."
 notification_lepsius_decipherment_akkadian_notification_name: "Расшифровка аккадского языка"
 notification_lepsius_decipherment_akkadian_notification_desc: "Все газеты страны сообщают о прорыве, совершённом известными исследователями во главе с опытным археологом: древние языки Месопотамии больше не являются тайной. Теперь ничто не мешает серьёзному исследованию Вавилонии и Ассирии."
 notification_lepsius_support_schliemann_notification_name: "Шлиман открывает Трою!"
 notification_lepsius_support_schliemann_notification_desc: "Немецкий предприниматель Генрих Шлиман открыл Трою, которую долгое время считали сказкой. Археологи по всему миру воспылали новой страстью к Древней Греции, пусть и той, что лежит в мифической древности."
 notification_lepsius_machu_picchu_notification_name: "Мачу-Пикчу"
 notification_lepsius_machu_picchu_notification_desc: "Экспедиция обнаружила затерянный город инков Мачу-Пикчу глубоко в Андах. Исследователи призывают к более интенсивному изучению региона."
 notification_lepsius_excavation_artifacts_notification_name: "Новые артефакты с раскопок"
 notification_lepsius_excavation_artifacts_notification_desc: "Этим утром наш археологический музей получил партию новых артефактов с наших мест раскопок."
 lepsius_hide_archaeological_decisions: "Скрыть археологические решения"
 lepsius_hide_archaeological_decisions_desc: "Скрыть все археологические решения для улучшения обзора."
 lepsius_show_archaeological_decisions: "Показать археологические решения"
 lepsius_show_archaeological_decisions_desc: "Показать все археологические решения."
 lepsius_cancel_excavation_decision: "Отозвать одну из наших раскопочных групп"
 lepsius_cancel_excavation_decision_desc: "В некоторых ситуациях может быть полезно отозвать раскопочную группу. Наши добытые артефакты и коллекции останутся, но постоянные раскопки будут прекращены."
 lepsius_gather_first_excavation_team_decision: "Собрать новую археологическую группу"
 lepsius_gather_first_excavation_team_decision_desc: "Мы можем подготовить дополнительную археологическую группу. Это позволит проводить несколько раскопок одновременно."
 lepsius_gather_second_excavation_team_decision: "Собрать новую археологическую группу"
 lepsius_gather_second_excavation_team_decision_desc: "Мы можем подготовить дополнительную археологическую группу. Это позволит проводить несколько раскопок одновременно."
 lepsius_gather_third_excavation_team_decision: "Поручить археологу собрать новую группу"
 lepsius_gather_third_excavation_team_decision_desc: "Мы можем подготовить дополнительную археологическую группу. Это позволит проводить несколько раскопок одновременно."
 lepsius_upper_egypt_expedition_decision: "Долина Царей"
 lepsius_upper_egypt_expedition_decision_desc: "Верхний Египет со старой столицей Фивы и Долиной Царей считается меккой египтологии. Нам следует приобрести лицензию на раскопки для этой области и отправиться на поиски египетских сокровищ."
 lepsius_lower_egypt_expedition_decision: "Пирамиды"
 lepsius_lower_egypt_expedition_decision_desc: "С незапамятных времён египетские пирамиды восхищали человечество. Говорят, что и другие гробницы, храмы и даже целые города, исчезнувшие в песках Нижнего Египта, ждут своего переоткрытия."
 lepsius_babylonia_expedition_decision: "Колыбель цивилизации"
 lepsius_babylonia_expedition_decision_desc: "Вавилония, южная часть Месопотамии, обязана своим названием некогда могущественному городу Вавилону. Этот регион считается «колыбелью цивилизации», где то и дело находят ценные археологические артефакты. Им определённо место в музее."
 lepsius_assyria_expedition_decision: "Сады Ассирии"
 lepsius_assyria_expedition_decision_desc: "Ассирия - это северная часть Месопотамии с двумя важными городами, Ашшуром и Ниневией. Скудные знания об этой стране до сих пор можно почерпнуть из Библии, но, возможно, существуют более надёжные исторические свидетельства?"
 lepsius_argolis_expedition_decision: "Город Агамемнона"
 lepsius_argolis_expedition_decision_desc: "После открытия Трои даже скептически настроенные учёные приходят к выводу, что мифы древних греков - это не просто сказки. Говорят, что в Арголиде до сих пор лежат остатки городов бронзового века, самый известный из которых - Микены. Нам стоит убедиться в этом лично."
 lepsius_crete_expedition_decision: "Сказание о Минотавре"
 lepsius_crete_expedition_decision_desc: "Говорят, что легендарный царь Минос когда-то правил Критом. Как и в случае с Троей и Микенами, в этой истории, похоже, тоже есть доля правды: на острове всё чаще находят артефакты легендарной минойской культуры. Нашей державе тоже стоит заполучить несколько из них."
 lepsius_yucatan_expedition_decision: "Затерянные города майя"
 lepsius_yucatan_expedition_decision_desc: "Сообщения о неизвестных и огромных городах посреди джунглей участились. Нам следует провести расследование и отправить археологическую экспедицию на Юкатан."
 lepsius_peru_expedition_decision: "Скрытое наследие инков"
 lepsius_peru_expedition_decision_desc: "Пилоты сообщают о странных крепостях и обнесённых стенами сооружениях в Андах, которые они видели во время полётов над Перу. Может быть, испанцы не полностью уничтожили культуру инков? Некоторые города коренного сопротивления не найдены и по сей день."
 lepsius_found_archaeological_museum_decision: "Основать археологический музей"
 lepsius_found_archaeological_museum_decision_desc: "Каждая уважающая себя нация имеет в своей столице уникальный музей для демонстрации всех культурных ценностей, приобретённых в ходе смелых приключений или научных экспедиций высочайшего уровня. Количество артефактов и число различных коллекций не только повышают престиж в мире, но и имеют образовательную ценность."
 lepsius_visit_archaeological_museum_decision: "Посетить археологический музей"
 lepsius_visit_archaeological_museum_decision_desc: "Просмотрите статистику по приобретённым вами артефактам и организуйте их в престижные выставки."
 lepsius_appoint_lead_scientist_decision: "Назначить ведущего научного сотрудника"
 lepsius_appoint_lead_scientist_decision_desc: "Назначает нового ведущего научного сотрудника для археологического музея. Персонаж будет занимать эту должность примерно 15-20 лет. Это назначение убережёт его от исчезновения с политической арены на данный период."
 lepsius_found_archaeological_society_decision: "Основать археологическое общество"
 lepsius_found_archaeological_society_decision_desc: "В нашей стране постоянно растёт не только интерес к археологии. После многих лет экспедиций, раскопок и находок артефактов наша страна накопила удивительный археологический опыт. Выдающийся археолог мог бы основать археологическое общество, чтобы собрать научные и интеллектуальные силы и дать новый импульс. Это не только улучшит наши научные результаты, но и обогатит опыт последующих поколений археологов."
 lepsius_inspect_excavation_decision: "Организовать углублённую археологическую инспекцию"
 lepsius_inspect_excavation_decision_desc: "Мы можем отправить опытного археолога в область, где мы ведём раскопки, чтобы активизировать наши усилия. Примерно через год наш археолог откроет новое место раскопок и проведёт интенсивные исследования, в ходе которых мы можем найти новые указания на ранее неизвестные, крупные археологические открытия. Успех во многом зависит от опыта нашего археолога. Создание археологического общества также повышает наши шансы."
 lepsius.2.t: "Lettre à M. le Professeur Rosellini"
 lepsius.2.d: "Немецкий филолог [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] представил свою усовершенствованную форму перевода иероглифов в письме итальянскому египтологу Ипполито Розеллини. Звучат призывы предпринять экспедицию в Египет."
 lepsius.2.f: "После смерти Франсуа Шампольона исследование иероглифов зашло в тупик. В 1837 году молодой немецкий филолог [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] написал письмо Ипполито Розеллини, близкому соратнику Шампольона, который был одним из организаторов франко-тосканской египетской экспедиции 1829 года. Лепсиус систематизировал и представил знания, накопленные Шампольоном, и сыграл важную роль в превращении египтологии в серьёзную науку. Кроме того, он убедил политические элиты Европы в необходимости будущих экспедиций в Египет."
 lepsius.2.a: "Мы исследуем чудеса Египта!"
 lepsius.3.t: "Стивенс и Кэтервуд"
 lepsius.3.d: "Американский исследователь Джон Ллойд Стивенс и британский художник Фредерик Кэтервуд вернулись из полного приключений путешествия по полуострову Юкатан и рассказывают о легендарных руинах в джунглях. Учёные выразили заинтересованность в более тщательном изучении культуры майя."
 lepsius.3.f: "Был ли Новый Свет домом только для дикарей и варваров до прибытия европейцев? Исследователи Джон Ллойд Стивенс и Фредерик Кэтервуд основательно пошатнули это мировоззрение. В течение нескольких лет американец и британец бродили по джунглям полуострова Юкатан и, по их собственным заявлениям, посетили 44 различных места давно исчезнувшей мезоамериканской культуры. Местные жители давно рассказывали истории о давно забытых городах и храмах, скрытых в джунглях; но отчёты Стивенса, и особенно потрясающие литографии Кэтервуда, открывают доселе совершенно неизвестный мир. Изображения храмов, статуй и стел не только будоражат фантазию романтиков. Волна интереса к неизвестной цивилизации распространяется по США и Европе, варьируясь от любопытства и восхваления до подлинного научного интереса."
 lepsius.3.a: "Нам следует запастись хорошими кожаными куртками."
 lepsius.4.t: "Расшифровка аккадского языка"
 lepsius.4.d: "Все газеты страны сообщают о прорыве, совершённом известными исследователями во главе с опытным археологом: древние языки Месопотамии больше не являются тайной. Теперь ничто не мешает серьёзному исследованию Вавилонии и Ассирии."
 lepsius.4.f: "Ещё при немецком математике Карстене Нибуре клинописные таблички вызывали интерес учёных в XVIII веке, и предпринимались попытки их расшифровать и перевести. Георг Фридрих Гротефенд, Анкетиль-Дюперрон и Антуан Исаак Сильвестр де Саси сыграли решающую роль в расшифровке древнеперсидской клинописи; их исследования подтвердились с расшифровкой иероглифов и четырёхъязычной «вазы Каюса». После открытия монументальной Бехистунской надписи, которая помимо уже хорошо известного персидского содержала и более древние языки Месопотамии, было лишь вопросом времени, когда эламский, вавилонский и аккадский языки снова станут понятны спустя столетия. Пригласив различных ассириологов, утверждающих, что они понимают эти древние языки, одна из наших академий провела проверку: они должны были независимо друг от друга перевести одну и ту же надпись. Удивительно, но переводы всех учёных совпали. Теперь может начаться серьёзное исследование древнейших культур человечества в Месопотамии."
 lepsius.4.a: "Мы - наследники Шампольона."
 lepsius.5.t: "Шлиман открывает Трою!"
 lepsius.5.d: "Немецкий предприниматель Генрих Шлиман открыл Трою, которую долгое время считали сказкой. Археологи по всему миру воспылали новой страстью к Древней Греции, пусть и той, что лежит в мифической древности."
 lepsius.5.f: "Где заканчивается наука и начинается миф? Современность сделала всё, чтобы разделить религию и знание. Мы изгнали легенды и саги, которые ещё несколько десятилетий назад считались реальностью, в царство сказок. Но вот новость разносится по миру, сначала в газетах, затем в академиях: Троя найдена! Легендарный город Приама, воспетый Гомером в его «Илиаде», история, которую знает каждый образованный гражданин Запада, - это больше, чем просто миф. Немецкий купец Генрих Шлиман не поддался разочарованию мира и даже утверждает, что нашёл ценное сокровище: клад Приама. Археологический мир был потрясён и очарован этим событием. Может быть, и другие истории из далёкого прошлого всё-таки правдивы? Лежат ли на берегах Эгейского моря другие затонувшие города, ожидающие своего переоткрытия?"
 lepsius.5.a: "Гнев, богиня, воспой Ахиллеса, Пелеева сына..."
 lepsius.6.t: "Мачу-Пикчу"
 lepsius.6.d: "Экспедиция обнаружила затерянный город инков Мачу-Пикчу глубоко в Андах. Исследователи призывают к более интенсивному изучению региона."
 lepsius.6.f: "Существуют определённые нарративы, которые доминируют в нашей современности. Всё завоёвано, всё открыто и всё сказано. Нет ни клочка земли, на котором ещё не было бы колониального флага, ни деревни, не связанной с железной дорогой, ни прорывной технологии, о которой мы бы уже не знали. И всё же бывают моменты, когда нигилизм элиты даёт трещину. Гонка к полюсам, покорение небес и интерес к последним тайнам человечества показывают, что история не окончена. Открытие города Мачу-Пикчу - это лишь фрагмент, который показывает, как мало мы знаем о мире, который, как мы думаем, понимаем и контролируем. Возможно, в сказках о неизвестных городах инков, которые интерпретировались как способ ввести испанцев в заблуждение, есть доля правды. Вилькабамба, последняя столица свободных инков, до сих пор не найдена..."
 lepsius.6.a: "Время надеть мою федору!"
 lepsius.10.t: "Торжественное открытие музея"
 lepsius.10.d: "Сегодня на торжественной церемонии был открыт археологический музей."
 lepsius.10.f: ""
 lepsius.10.g: "Не могу дождаться, чтобы посетить музей!"
 lepsius.10.h: "Шампанского! Шампанского!"
 lepsius.11.t: "Посещение музея"
 lepsius.11.d: "Добро пожаловать в [Concept('concept_lepsius_museum', 'археологический музей')]."
 lepsius.11.f: "В настоящее время наша музейная коллекция насчитывает #T в общей сложности #G [ROOT.Var('lepsius_total_artifacts').GetValue]#! артефактов#! \n\nАртефакты разделены на следующие коллекции: \n\n#T Египетская коллекция:#! \n#G [ROOT.Var('lepsius_egyptian_artifact_minor').GetValue]#! @lepsius_egypt_minor! малых артефактов и #G [ROOT.Var('lepsius_egyptian_artifact_major').GetValue]#! @lepsius_egypt_major! крупных артефактов. \n\n#T Месопотамская коллекция:#!\n#G [ROOT.Var('lepsius_mesopotamian_artifact_minor').GetValue]#! @lepsius_mesopotamia_minor! малых артефактов и #G [ROOT.Var('lepsius_mesopotamian_artifact_major').GetValue]#! @lepsius_mesopotamia_major! крупных артефактов. \n\n#T Эгейская коллекция:#!\n#G [ROOT.Var('lepsius_aegean_artifact_minor').GetValue]#! @lepsius_aegean_minor! малых артефактов и #G [ROOT.Var('lepsius_aegean_artifact_major').GetValue]#! @lepsius_aegean_major! крупных артефактов. \n\n#T Доколумбова коллекция:#!\n#G [ROOT.Var('lepsius_precolumbian_artifact_minor').GetValue]#! @lepsius_precolumbian_minor! малых артефактов и #G [ROOT.Var('lepsius_precolumbian_artifact_major').GetValue]#! @lepsius_precolumbian_major! крупных артефактов.\n\n#T Археологические группы:#!\nУ нас есть #G [ROOT.Var('lepsius_excavation_teams').GetValue]#! свободных групп из общего числа #G [ROOT.Var('lepsius_total_excavation_teams').GetValue]#!."
 lepsius.11.g: "Это было довольно познавательно. До скорой встречи!"
 lepsius.11.h: "Осмотреть египетскую коллекцию"
 lepsius.11.i: "Осмотреть месопотамскую коллекцию"
 lepsius.11.j: "Осмотреть эгейскую коллекцию"
 lepsius.11.k: "Осмотреть доколумбову коллекцию"
 lepsius.11.l: "Посетить ведущего научного сотрудника"
 lepsius.11.m: "Осмотреть крупные артефакты"
 lepsius.11.n: "Осмотреть коллекцию мировых культур"
 lepsius.11.o: "Покажите мне страны с наибольшим количеством артефактов!"
 lepsius.12.t: "Египетская коллекция"
 lepsius.12.d: "Этот раздел включает артефакты из Верхнего и Нижнего Египта."
 lepsius.12.g: "Организовать небольшую выставку."
 lepsius.12.h: "Организовать среднюю выставку."
 lepsius.12.i: "Организовать большую выставку."
 lepsius.12.j: "Организовать превосходную выставку."
 lepsius.12.k: "Вернуться в главный зал."
 lepsius.12.l: "Покинуть музей."
 lepsius.13.t: "Месопотамская коллекция"
 lepsius.13.d: "Этот раздел включает артефакты из Вавилонии и Ассирии."
 lepsius.14.t: "Эгейская коллекция"
 lepsius.14.d: "Этот раздел включает артефакты из Арголиды и Крита."
 lepsius.15.t: "Доколумбова коллекция"
 lepsius.15.d: "Этот раздел включает артефакты с Юкатана и из Перу."
 lepsius.16.t: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]"
 lepsius.16.d: "Это кабинет главного археолога нашей страны, профессора [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]."
 lepsius.16.f: "Общий археологический опыт [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] составляет #G [ROOT.Var('lepsius_archaeologist_var').GetVariable('lepsius_archaeologist_experience_var').GetValue]#!\n\n Общее количество экспедиций, профинансированных нашей страной: #G [ROOT.Var('lepsius_total_expeditions').GetValue]#!\n\n Общее количество крупных открытий, сделанных нашей страной: #G [ROOT.Var('lepsius_total_discoveries').GetValue]#!"
 lepsius.16.g: "Провести крупный археологический конгресс"
 lepsius.17.t: "Крупные артефакты"
 lepsius.17.d: "Это обзор всех крупных артефактов в музее."
 lepsius.17.egypt: "\n#T Египет:#!\n"
 lepsius.17.sarcophagus: "Мы нашли #E саркофаг Неизвестного фараона#! в затерянной гробнице в Долине Царей.\n"
 lepsius.17.nefertiti: "#E Бюст Нефертити#! стал наградой за кропотливые раскопки и дипломатические споры.\n"
 lepsius.17.tut: "#E Посмертная маска Тутанхамона#! - жемчужина легендарной гробницы в Долине Царей.\n"
 lepsius.17.narmer: "#E Палетка Нармера#! - одна из древнейших письменных находок человечества, и некоторые считают её документом об основании Египта.\n"
 lepsius.17.mesopotamia: "\n#T Месопотамия:#!\n"
 lepsius.17.lamassu: "Мы получили #E Ламассу царя Саргона#! из Ассирии авантюрными путями.\n"
 lepsius.17.meskalamdug: "Мы нашли #E шлем Мескаламдуга#! после интенсивных раскопок в Вавилонии.\n"
 lepsius.17.sargon: "Мы нашли #E маску Саргона#! во время тщательных раскопок древней ассирийской столицы Ниневии.\n"
 lepsius.17.gilgamesh: "После постоянных поисков новых частей и передовых исследований нам удалось реконструировать части #E «Эпоса о Гильгамеше»#!.\n"
 lepsius.17.greece: "\n#T Греция:#!\n"
 lepsius.17.agamemnon: "#E Маска Агамемнона#! была главной находкой нашего великого открытия в Микенах.\n"
 lepsius.17.priam: "Мы получили #E клад Приама#! в дар от Генриха Шлимана.\n"
 lepsius.17.snake: "Нам удалось несколько неортодоксальным способом доставить в наш музей так называемую #E Богиню со змеями#! с Крита, один из важнейших артефактов минойской культуры.\n"
 lepsius.17.diskos: "После упорных раскопок мы откопали #E Фестский диск#!.\n"
 lepsius.17.southamerica: "\n#T Южная Америка:#!\n"
 lepsius.17.kukulkan: "#E Самоцвет Кукулькана#! был добыт одним из наших археологов в фантастическом и опасном путешествии.\n"
 lepsius.17.pakal: "Наши археологи заполучили #E погребальное сокровище Пакаля#! после многолетних раскопок в Паленке.\n"
 lepsius.17.other: "\n#T Прочее:#!\n"
 lepsius.17.abraham: "#E Посох Авраама#! был найден одним из наших археологов во время духовного путешествия.\n"
 lepsius.17.arne: "В фантастическом приключении наши отважные археологи нашли #E рукопись Арне Сакнуссема#! как доказательство того, что он путешествовал к центру Земли в XVI веке.\n"
 lepsius.17.skull: "Мы приобрели в высшей степени таинственный #E хрустальный череп#! у надёжного антиквара.\n"
 lepsius.17.hoa: "Таинственная статуя #E Моаи Хоа Хакананаи'а#! была найдена искателем приключений на острове Пасхи.\n"
 lepsius.17.summer: "Во время сожжения китайской императорской резиденции мы захватили значительное количество ценной #E добычи из Летнего дворца#!."
 lepsius.18.t: "Коллекция мировых культур"
 lepsius.18.d: "Этот раздел включает артефакты из разных культур мира."
 lepsius.18.f: "Эта коллекция является как антропологической, так и археологической коллекцией разных культур, некоторые из которых всё ещё существуют. Для проведения выставки достаточно #G 10#! артефактов#!. Более крупных коллекций нет, но отдельные коллекции более ценны. В настоящее время эта коллекция состоит из следующих разделов: \n\n #G [ROOT.Var('lepsius_oceanic_artifact_minor').GetValue]#! @lepsius_oceanian_minor! малых артефактов из Океании \n #G [ROOT.Var('lepsius_oceanic_artifact_major').GetValue]#! @lepsius_oceanian_major! крупных артефактов из Океании \n\n #G [ROOT.Var('lepsius_fareastern_artifact_minor').GetValue]#! @lepsius_east_asian_minor! малых артефактов с Дальнего Востока \n #G [ROOT.Var('lepsius_fareastern_artifact_major').GetValue]#! @lepsius_east_asian_major! крупных артефактов с Дальнего Востока \n"
 lepsius.18.g: "Организовать дальневосточную выставку."
 lepsius.18.h: "Организовать океанийскую выставку."
 lepsius.22.d: "Вся элита нашей столицы на ногах: археологический музей представляет новую выставку."
 lepsius.22.f: "С самого утра у входа в музей толпятся представители высшего и среднего класса. Новая [Concept('concept_lepsius_exhibition', 'выставка')] начинается с лекции ведущего [Concept('concept_lepsius_archaeologist', '#b #BLUE археолога#!#!')], который из первых уст расскажет о последней [Concept('concept_lepsius_expedition', 'экспедиции')] и [Concept('concept_lepsius_excavations', 'раскопках')] на месте. После этого ценители искусства и зеваки смогут сами взглянуть на экспонаты. Пресса уже на месте и готовит свои статьи. Великий день для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] как на национальном, так и на международном уровне; великие державы с завистью смотрят на нашу престижную коллекцию."
 lepsius.22.g: "Надеюсь, мне достанется ещё один билет."
 lepsius.24.t: "Новая эгейская выставка"
 lepsius.25.t: "Новая доколумбова выставка"
 lepsius.26.t: "Археологический конгресс завершается"
 lepsius.26.d: "Конгресс, организованный нашим археологическим обществом, сегодня подходит к концу. Профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] в процессе расширил свои знания."
 lepsius.26.f: "Несколько недель встреч, чтений, конференций и уютных посиделок подходят к концу. Национальные и международные археологи, близкие к обществу, обменивались информацией об открытиях, экспедициях и теориях. Мероприятие прошло с полным успехом и расширило горизонты всех участников."
 lepsius.26.g: "Вечные споры о том, у кого самые лучшие кожаные куртки..."
 lepsius.27.t: "Новая выставка мировых культур"
 lepsius.30.t: "Новый ведущий научный сотрудник"
 lepsius.30.d: "[concept_lepsius_museum] назначил нового ведущего научного сотрудника. Им [SelectLocalization(SCOPE.sCharacter('lepsius_museum_lead_scientist').IsFemale, 'стала', 'стал')] [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetPrimaryRoleTitle] [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName]."
 lepsius.30.f: ""
 lepsius.30.g: "Поздравляем!"
 lepsius.31.t: "Ведущий научный сотрудник становится директором музея"
 lepsius.31.d: "[SCOPE.sCharacter('lepsius_museum_lead_scientist').GetPrimaryRoleTitle] [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_museum_lead_scientist').IsFemale, 'получила', 'получил')] честь стать новым директором музея. Таким образом, [SelectLocalization(SCOPE.sCharacter('lepsius_museum_lead_scientist').IsFemale, 'она', 'он')] уйдёт с действительной службы."
 lepsius.31.f: "Годами [SCOPE.sCharacter('lepsius_museum_lead_scientist').GetFullName] посвящал свою жизнь науке и культуре и давно устал от политики. Для многих решение сосредоточиться только на музейной деятельности не стало сюрпризом. Он больше не будет доступен ни для политической деятельности, ни для экспедиций. Бывают повышения, о которых приходится сожалеть."
 lepsius.31.g: "Прощайте..."
 lepsius.80.t: "Новая эра в археологии!"
 lepsius.80.d_egypt: "Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], используя новые археологические методы, [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'раскрыла', 'раскрыл')] множество деталей древнеегипетской деревни. Применение стратиграфии и системы трёх веков, а также документирование своих находок знаменует новую эру в археологии."
 lepsius.80.d_mesopotamia: "Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], используя новые археологические методы, [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'раскрыла', 'раскрыл')] множество деталей древней месопотамской деревни. Применение стратиграфии и системы трёх веков, а также документирование своих находок знаменует новую эру в археологии."
 lepsius.80.d_aegean: "Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], используя новые археологические методы, [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'раскрыла', 'раскрыл')] множество деталей древней эгейской деревни. Применение стратиграфии и системы трёх веков, а также документирование своих находок знаменует новую эру в археологии."
 lepsius.80.d_precolumbian: "Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], используя новые археологические методы, [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'раскрыла', 'раскрыл')] множество деталей древней доколумбовой деревни. Применение стратиграфии и системы трёх веков, а также документирование своих находок знаменует новую эру в археологии."
 lepsius.80.f: "«Слои земли, в которых мы нашли артефакты этой деревни, многое о ней говорят. Один слой, например, содержит много угля и знаменует конец находок этого периода. Вероятно, это означает, что пожар уничтожил деревню, и она была заброшена. Кроме того, здесь нет металлических предметов, что означает, что это должна быть деревня каменного века. Человеческие останки, которые мы нашли, также были интересны, поскольку они страдали от недоедания, а их зубы были стёрты»."
 lepsius.80.g: "Так цивилизованно!"
 lepsius.100.t: "Подготовка #tooltippable_name [ROOT.GetCountry.GetAdjective]ой#! археологической экспедиции"
 lepsius.100.d: "Подготовка к археологической экспедиции идёт полным ходом. Однако до сих пор неясно, как долго следует финансировать поездку."
 lepsius.100.f: "После решения [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] уступить желаниям своих учёных и отправить долгожданную [Concept('concept_lepsius_expedition', 'экспедицию')] не только само финансирование, но и продолжительность [Concept('concept_lepsius_expedition', 'экспедиции')] вскоре должны стать политическим вопросом. Одно только путешествие туда и обратно займёт драгоценное время, в то время как брюзги в кабинете министров настаивали на отправке всего нескольких переговорщиков для приобретения нескольких [Concept('concept_lepsius_artifacts', 'артефактов')] у антиквара."
 lepsius.100.g: "Не стоит мелочиться - это будет долгое путешествие."
 lepsius.100.h: "Путешествие средней продолжительности - хороший компромисс."
 lepsius.100.i: "Короткого путешествия достаточно."
 lepsius.110.t: "Споры о руководстве"
 lepsius.110.d: "Интеллигенция считает себя фаворитом на то, чтобы один из её представителей возглавил археологическую экспедицию. Но есть и многочисленные несогласные голоса."
 lepsius.110.f: "Элиты страны разделились. Государственная поддержка экспедиции вывела на сцену критиков и завистников. Интеллигенция страны рассматривает это предприятие как свою прерогативу. И оппозиционные, и правительственные силы требуют, чтобы им предоставили пост наблюдателей. Неоспоримо, что представитель интеллигенции был бы наиболее квалифицирован для этой задачи, но есть и другие возможности..."
 lepsius.110.g: "Интеллигенция наиболее квалифицирована."
 lepsius.110.h: "Экспедицию должен сопровождать представитель правительства."
 lepsius.110.i: "Для этого подходит оппозиционный политик."
 lepsius.110.j: "Эту работу должен выполнять кто-то с археологическим опытом."
 lepsius.110.k: "Эта честь принадлежит только наследнику престола."
 lepsius.120.t: "Военный атташе"
 lepsius.120.d: "Настоятельно рекомендуется нанять военного атташе для археологической экспедиции."
 lepsius.120.f: "Военные предложили трёх возможных кандидатов на должность военных атташе для экспедиции. Решение было сообщено сегодня военным ведомством. Выбор ещё предстоит утвердить."
 lepsius.120.g: "[SCOPE.sCharacter('lepsius_military_attache_1').GetFullName]."
 lepsius.120.h: "[SCOPE.sCharacter('lepsius_military_attache_2').GetFullName]."
 lepsius.120.i: "[SCOPE.sCharacter('lepsius_military_attache_3').GetFullName]."
 lepsius.130.t: "Художники присоединяются к экспедиции"
 lepsius.130.d: "Группа художников из нашей академии выразила заинтересованность в участии в предстоящей археологической экспедиции."
 lepsius.130.f: "В академии искусств прошёл слух, что скоро [Concept('concept_lepsius_expedition', 'археологическая экспедиция')] отправится на поиски затерянных городов и неизвестных сокровищ искусства. Чертежники и живописцы уже вдохновлялись атмосферой, красками и сценами египетской экспедиции Наполеона. Желающих сделать для нас рисунки и эскизы [Concept('concept_lepsius_excavation_site', 'археологических объектов')] предостаточно. Само собой разумеется, что такое расширение [Concept('concept_lepsius_expedition', 'экспедиции')] влечёт за собой дополнительные расходы, но это, безусловно, стоит своих денег."
 lepsius.130.a: "Они сердечно приглашены."
 lepsius.130.b: "Спасибо, но нет, спасибо."
 lepsius.140.t: "Археолог нанимает опытных учёных"
 lepsius.140.f: "Нас связывают общие интересы: у нашего руководителя есть связи с другими учёными, сведущими в археологии, истории и антропологии. Такое расширение состава экспедиции, безусловно, положительно скажется на итогах предприятия. Однако это не дружеская услуга: государство должно оплачивать питание, проживание и жалованье. Некоторые могут назвать такое обеспечение «друзьями» руководителя экспедиции кумовством, но он заверил нас, что причина расширения носит исключительно научный характер."
 lepsius.140.a: "Ценное пополнение для команды."
 lepsius.140.b: "Мы не будем платить кликам нашего археолога!"
 lepsius.150.t: "Учёные-естественники присоединяются к экспедиции"
 lepsius.150.d: "Учёные хотят провести эксперименты в предстоящей экспедиции."
 lepsius.150.f: "Университеты нашей страны не остались в стороне от текущих событий. Некоторые учёные хотели бы сопровождать экспедицию, чтобы изучить географические условия, сравнить астрономические расчёты или провести метеорологические эксперименты. Другие считают, что образцы горных пород и древесины могут улучшить научные результаты экспедиции. По многим из отобранных учёных видно, что они целую вечность ждали часа, чтобы при подобном случае отправиться в долгожданные заморские страны: они просто ищут предлог, чтобы поехать безбилетниками. И запросы у них тоже немаленькие!"
 lepsius.150.a: "Великолепная идея!"
 lepsius.150.b: "Мы не можем потакать каждому встречному..."
 lepsius.200.t: "Экспедиция достигла места отправления"
 lepsius.200.d: "Экспедиция достигла своей отправной точки. Время сделать последние приготовления перед отбытием."
 lepsius.200.f_ex_upe: "«Луксор, Луксор!» - разносится клич по рядам, когда на горизонте появляется Карнакский храм. Лодка грозит опрокинуться в Нил, так как члены экспедиции сгрудились у перил, всматриваясь в силуэт города, известного в Древнем Египте как Фивы. Руины тысячелетних строений обрамляют берега Нила, обелиски возвышаются между ветхими домами и палатками. Однако на другом берегу Нила возвышаются песчано-коричневые горные хребты, где скрыта легендарная Долина Царей и где, как говорят, до сих пор находятся неизвестные гробницы фараонов. Но прежде чем мы доберёмся до этого, нам ещё нужно уладить кое-какие дела в Луксоре..."
 lepsius.200.f_ex_loe: "«Мать мира» раскинулась над водами Нила, сверкая на солнце. Минареты и купола украшают панораму и повествуют о мощи и значении этого города, который и прежде, и сейчас помогал определять судьбу Ближнего Востока. Красочные базары и ковры характеризуют улицы так же, как и изысканные орнаменты фатимидской архитектуры. Но взгляд устремляется дальше - далеко за пределы, где вершины пирамид возвещают о минувшей эпохе, которая и является истинной целью нашего путешествия. Но перед этим нам нужно принять некоторые меры предосторожности в Каире."
 lepsius.200.f_ex_bab: "Багдад, крупнейший город Месопотамии, кипит жизнью. Подобно Каиру, это центр арабского мира; подобно Каиру, он был средоточием власти и престижа. Но в отличие от Каира, где далёкие пирамиды Гизы возвещают о ещё более древнем мире, в Багдаде мало что напоминает об империях Вавилона и Аккада. Даже предполагаемые древности, которые один несколько неосторожный член экспедиции купил у подозрительного торговца, оказались подделками. В то время как каменные постройки египтян и майя до сих пор свидетельствуют о затерянных цивилизациях, здесь почти нет ничего сравнимого. Вероятно, нам придётся начинать с нуля."
 lepsius.200.f_ex_ass: "Что ещё можно найти в Ассирии после того, как Лэйард копал в Нимруде? Довольно много, по словам торговца в Мосуле. Всего месяц назад из песка показалась голова ламассу. И на базаре всегда можно найти хорошие вещи, говорит он нам. Тот факт, что целую серию предметов не удалось спасти, также связан с курдскими кланами в этом районе, которые не позволяют всем подряд браконьерствовать на их территориях - независимо от лицензии на раскопки. Мы примем это предупреждение к сведению - и позаботимся о самом необходимом, прежде чем отправиться в путь."
 lepsius.200.f_ex_arg: "Ах, старые добрые Афины! Недостаточно старые для того, что ищет наша экспедиционная группа, но достаточно хорошие, чтобы провести в Аттике несколько лишних дней. В Греции не так много больших городов, поэтому у нашей экспедиционной группы нет особого выбора, кроме как сделать там самые необходимые приготовления, прежде чем отправиться в сельскую местность. Наш археологический гид нас торопит, так как некоторые учёные тратят слишком много времени на развлечения - будь то классический мрамор или греческое вино. Тёплое солнце, тень оливковых деревьев и аккадская идиллия приглашают задержаться и расслабиться - некоторые, кажется, уже забыли, зачем мы на самом деле здесь."
 lepsius.200.f_ex_cre: "Лёгкий бриз дует с Эгейского моря, когда наша экспедиция достигает порта Ираклион. Старинные венецианские бастионы приветствуют нас, напоминая о временах, когда Кандия была торговым центром в Средние века. После того как груз выгружен под карканье чаек и участники сходят на берег, за дружелюбным приёмом следует горькая реальность. Пока некоторые участники жалуются на местную кухню и требуют лучшего жилья, ведущий археолог не испытывает особого сочувствия к таким менее интеллектуальным запросам. Ведь для него Ираклион - лишь промежуточная станция, сокровища минойцев ждут во внутренних районах острова."
 lepsius.200.f_ex_yuc: "В Мериде наша раскопочная группа делает последние приготовления перед большим отъездом. Следы испанского завоевания и колонизации характеризуют город, который, несмотря на свои скромные размеры, показывает, что когда-то, вместе с Кампече, он был местом, откуда испанцы осуществляли контроль над полуостровом. Менее чем в 100 милях отсюда, как говорят, находятся несколько майянских объектов, которые джунгли отвоевали за последние несколько столетий. Нашим членам экспедиции придётся углубиться в заросли, если они хотят обнаружить новые храмы или даже города..."
 lepsius.200.f_ex_per: "Анды возвышаются, словно короли, над головами своих подданных; их вершины величественно взирают на нас, как бы проверяя, достойны ли мы войти в их долины. Путешествие в Куско было трудным, но технический прогресс означает, что экспедиции больше не превращаются в авантюрные путешествия, полные непредсказуемости. На улицах бывшей столицы инков историческое испанское господство сочетается с очарованием андской архитектуры. Между ними бесшовные циклопические стены всё ещё свидетельствуют об архитектуре бывших правителей. Руины инкской крепости Саксайуаман, всего в двух шагах от центра города, - это предвкушение того, что члены экспедиции будут искать в этой поездке."
 lepsius.200.g: "Ах, Египет."
 lepsius.200.h: "Ах, Месопотамия."
 lepsius.200.i: "Ах, Греция."
 lepsius.200.j: "Ах, комары и смертельные болезни."
 lepsius.200.k: "Ах, Перу."
 lepsius.210.t: "Переводчики и таинственный проводник"
 lepsius.210.d: "Среди членов экспедиции возникли разногласия: стоит ли потратить оставшиеся деньги на нескольких квалифицированных переводчиков или на таинственного проводника."
 lepsius.210.f: "Это не вопрос количества или качества, даже если некоторые члены нашей экспедиции так это преподносят. Преимущество переводчиков не только в том, что они говорят на местном языке, но и в том, что местные жители быстрее им доверяют. Шанс получить информацию об артефактах значительно выше. С другой стороны, таинственный проводник мог бы отвести нас в особые места, которые мы иначе не нашли бы или нашли с большим трудом - места с особыми артефактами и неизвестными испытаниями."
 lepsius.210.a: "Нам не помешали бы переводчики."
 lepsius.210.b: "Нам нужен проводник, знающий секреты этой местности."
 lepsius.220.t: "Археолог покупает артефакты"
 lepsius.220.d: "Руководитель нашей экспедиции нашёл и приобрёл несколько ценных артефактов на местном рынке."
 lepsius.220.f: "Расхитители гробниц, охотники за сокровищами и искатели приключений бродили по местам раскопок задолго до того, как первый археолог ступил на эту землю. Это горькая правда. Во многих случаях артефакты бесследно исчезают, оседают в частных коллекциях или - если они сделаны из драгоценных металлов - даже переплавляются. Но даже у тех находок, которые удаётся вернуть, есть недостаток: их происхождение может так и остаться невыясненным. Опытные археологи обладают чутьём не только на то, чтобы раскапывать артефакты, но и на то, чтобы находить их в продаже и восстанавливать их историю."
 lepsius.220.g: "Какой приятный сюрприз."
 lepsius.230.t: "Ведение дневника"
 lepsius.230.d: "Руководитель нашей экспедиции, вдохновлённый экзотической обстановкой и ежедневными впечатлениями, начал вести дневник."
 lepsius.230.f: "У каждой страны и каждого места есть свои краски и запахи. Мистицизм Востока, магия Греции и легенды майя и инков пленяли людей. Других вдохновляла незнакомая повседневная жизнь, непонятные языки или странность мира, в который попадал искатель приключений. Иногда простого письма было достаточно, чтобы переварить нахлынувшие впечатления - и запечатлеть их."
 lepsius.230.g: "Неисправимый романтик."
 lepsius.240.t: "Написание трактата"
 lepsius.240.d: "Руководитель нашей экспедиции решил написать научную работу о ходе экспедиции."
 lepsius.240.f: "Это может показаться удивительным, но не у всех есть время вести собственные записи наряду с основной работой. Некоторые темы не находят места в официальных отчётах, возможно, потому что они слишком отклоняются от основной темы - или тезис ещё недостаточно созрел. Как бы то ни было, наш руководитель экспедиции, по-видимому, нашёл тему, над которой он хотел бы поработать помимо официальной отчётности и опубликовать позже."
 lepsius.240.g: "Будем надеяться, из этого выйдет что-то полезное."
 lepsius.250.t: "Драка в таверне"
 lepsius.250.d: "Дурные качества нашего руководителя экспедиции привели к дипломатическому инциденту."
 lepsius.250.g: "Стыдоба..."
 lepsius.260.t: "Признание"
 lepsius.260.d: "Хорошие качества нашего руководителя экспедиции привели к широкому признанию нашего археологического предприятия."
 lepsius.260.g: "Замечательно"
 lepsius.270.t: "Мороженое и лимонад"
 lepsius.270.g: "Путешествовать нужно стильно."
 lepsius.280.t: "Аудиенция"
 lepsius.280.f: "Местный губернатор, услышав об экспедиции, вызвал к себе руководителя археологической миссии. Он интересовался целями и был чрезвычайно любопытен по поводу гостя. В ходе последующей беседы нашему руководителю не только удалось хорошо развлечь хозяина, но и достаточно впечатлить его своими навыками, чтобы губернатор предложил свою помощь. Как оказалось, у него был ценный артефакт, который он передал нашей экспедиции в качестве жеста доброй воли."
 lepsius.280.g: "Замечательный подарок!"
 lepsius.290.t: "Атташе нанимает охрану"
 lepsius.290.d: "Военный атташе нашей археологической экспедиции нанял несколько наёмников для обеспечения безопасности нашего путешествия."
 lepsius.290.f: "По-видимому, военное ведомство не прогадало с выбором нашего военного атташе. Его навыки заслужили одобрение местного военного офицера, и он договорился с ним об отправке группы охранников для защиты нашей экспедиции. Взамен он посетил контингент войск принимающей страны и поделился своим опытом."
 lepsius.290.g: "Военные выбрали правильного человека."
 lepsius.300.t: "Археологическая экспедиция начинается!"
 lepsius.300.d: "Вещи упакованы, последние помощники наняты, план экспедиции готов - путешествие может начинаться."
 lepsius.300.f: ""
 lepsius.300.g: "Вперёд!"
 lepsius.310.t: "Археологическая экспедиция завершается"
 lepsius.310.d: "Археологическая экспедиция окончена. Время подсчитать добычу!"
 lepsius.310.f: "Это было трудное путешествие со множеством лишений и препятствий, но в ходе экспедиции наша страна не только расширила свои знания о прошлом, но и приобрела ценные артефакты для музея. Некоторые помощники уже уволились, некоторые члены раскопок жаждут вернуться домой. Тем временем руководитель экспедиции подсчитывает приобретённые, более мелкие предметы, которые и составляют успех экспедиции. За романтическим приключением следует сухая каталогизация."
 lepsius.310.g: "За науку! А теперь верните наших парней домой."
 lepsius.310.h: "Это только начало - организуем долгосрочные археологические раскопки."
 lepsius.311.t: "Археолог публикует дневник"
 lepsius.311.f: ""
 lepsius.311.g: "Вдохновение для всех нас."
 lepsius.312.t: "Археолог публикует научную работу"
 lepsius.312.f: ""
 lepsius.312.g: "Нам следует приобрести экземпляр для национальной библиотеки."
 lepsius.313.t: "Руководитель экспедиции возвращается домой"
 lepsius.313.d: "[SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_relaxing_archaeologist').IsFemale, 'вернулась', 'вернулся')] после археологической экспедиции. Пережитое в путешествии оставило глубокое впечатление. Тем не менее, теперь предстоит трудоёмкая оценка найденных артефактов - даже менее значительных предметов, таких как черепки, обрывки ткани и куски дерева."
 lepsius.313.f: "Настоящая археологическая работа, сухая каталогизация всех объектов, их классификация и выводы о прошлом в затхлых университетских стенах, менее привлекательна и авантюрна, чем предполагает жизнь археолога. #V Обычно это занимает три года.#! Если нации, тем не менее, понадобится её археолог - возможно, для местных раскопок - возможно, будет лучше немедленно освободить учёного от его обязанностей. Доктор [SCOPE.sCharacter('lepsius_relaxing_archaeologist').GetLastName] может даже быть благодарен за это."
 lepsius.313.g: "Приступим к каталогизации!"
 lepsius.401.t_bedouin: "Набег бедуинов"
 lepsius.401.t_kurdish: "Набег курдов"
 lepsius.401.d: "Наша археологическая экспедиция была атакована местными племенами."
 lepsius.401.f_bedouin: "Не все районы пустыни находятся под полным контролем правительства. Некоторые племена бедуинов успешно сопротивляются государственной модернизации и социальным изменениям. Кланы до сих пор живут так, как их предки много веков назад. Набеги на караваны и неосторожных путешественников - часть повседневной жизни. Нападение бедуинов затронуло и нашу экспедицию: были украдены ценности и археологическое оборудование, похищены верблюды. Руководитель экспедиции просит нас поговорить с правительством, чтобы подобные инциденты, ставящие под угрозу экспедицию, не повторялись. Конечно, это будет расценено как вмешательство во внутренние дела..."
 lepsius.401.f_kurdish: "Горы Загрос, граничащие с Месопотамией на севере и востоке, исторически были домом для курдских племён, которые лишь слабо подчиняются местному правительству. Многие из них действуют самостоятельно, признавая только своё племя в качестве власти. Они то и дело совершают набеги. На этот раз нападение курдов затронуло и нашу экспедицию: были украдены ценности и археологическое оборудование, похищены верблюды. Руководитель экспедиции просит нас поговорить с правительством, чтобы подобные инциденты, ставящие под угрозу экспедицию, не повторялись. Конечно, это будет расценено как вмешательство во внутренние дела..."
 lepsius.401.g: "Подать официальную жалобу правительству."
 lepsius.401.h: "Мы разберёмся сами."
 lepsius.401.i: "Наказать их!"
 lepsius.401.j: "Охрана!"
 lepsius.402.t_desert: "Песчаная буря"
 lepsius.402.t_tropical: "Тропический шторм"
 lepsius.402.d: "Нашей археологической экспедиции грозит разрушительный шторм!"
 lepsius.402.f_desert: "Сначала это был лишь лёгкий ветерок, который задувал песок в глаза членам нашей экспедиции. Но затем ветер стал таким сильным, что сбивал с ног людей и вьючных животных. Даже спустя несколько часов песчаная буря не утихала. Когда наши археологи спросили местного жителя об этом явлении, он сказал, что такие бури нормальны для этого времени года. Эти песчаные бури могут поставить под угрозу всю нашу экспедицию!"
 lepsius.402.f_tropical: "Внезапным дождям, обрушившимся на наши экспедиционные группы однажды днём, не предшествовали ни гром, ни молния. Сначала они искали укрытие, но через несколько часов поняли, что этот тропический шторм сильно отличается от обычных дождей в этом регионе. Один из наших носильщиков даже предположил, что это может быть полноценный ураган!"
 lepsius.402.g: "Этот лёгкий ветерок нас не остановит."
 lepsius.402.h: "Ситуация слишком опасна, экспедиции придётся подождать."
 lepsius.403.t: "Туман в Андах"
 lepsius.403.d: "После того как военный атташе в очередной раз подверг нашу экспедицию опасности, другие участники требуют последствий."
 lepsius.403.f: "Команда нашей экспедиции в Андах ропщет на военного атташе. Он несколько раз вёл группу в неверном направлении в поисках древнего инкского объекта. Недавно даже случилось так, что в своём стремлении как можно быстрее достичь цели он не учёл туман в горах. Из-за этого экспедиция потеряла драгоценное время. Некоторые люди настаивают на назначении нового руководителя."
 lepsius.403.g: "Его следует отстранить от обязанностей."
 lepsius.403.h: "Он хорошо поработал."
 lepsius.404.t_aegean: "Сломанный мост"
 lepsius.404.t_peru: "Сломанный подвесной мост"
 lepsius.404.d: "Разрушенный мост мешает продвижению нашей экспедиции."
 lepsius.404.f_aegean: "Греция и Крит известны своими суровыми ландшафтами. Когда наша экспедиция достигает ущелья, выясняется, что недавний оползень снёс опору моста. Мы стоим перед выбором: либо починить мост и двигаться к нашей первоначальной цели, либо отправиться в другое место. Второй вариант быстрее и дешевле, но, вероятно, увенчается меньшим археологическим успехом."
 lepsius.404.f_peru: "После трудного подъёма через андские перевалы и узкие горные дороги наша археологическая экспедиция столкнулась с неожиданной проблемой. Подвесной мост, который, по словам местных, ведёт к окутанному легендами храму, был полностью разрушен. Некоторые члены экспедиции призывают отказаться от этой затеи и отправиться к более лёгкому археологическому объекту, но местные уверяют, что оно того стоит. Однако, если мы хотим восстановить мост, это будет стоить нам времени и денег."
 lepsius.404.g: "Восстановить мост."
 lepsius.404.h: "Найти другой путь."
 lepsius.405.t_mesopotamia: "Плохие дороги в Месопотамии"
 lepsius.405.t_yucatan: "Плохие дороги на Юкатане"
 lepsius.405.d: "Плохое состояние дорог ставит перед нашей экспедицией доселе невиданные задачи."
 lepsius.405.f_mesopotamia: "К сожалению, не все дороги имеют то качество, которого следовало бы ожидать. В частности, второстепенные дороги и тропы в стороне от основных торговых путей находятся в удивительно плохом состоянии. Но потенциальные цели нашего путешествия далеки от центров цивилизации. Путь труден, и некоторые члены экспедиции уже жалуются, что нам следовало выбрать другой маршрут."
 lepsius.405.f_yucatan: "Джунгли Юкатана всё ещё не освоены даже в наши современные времена. Это делает их ценными археологическими объектами, поскольку многие руины не были тщательно изучены людьми на протяжении веков. С другой стороны, путешествие полно трудностей. За исключением нескольких проторенных лесных троп, дорог почти нет. Члены экспедиции уже жалуются на решение выбрать этот маршрут."
 lepsius.405.g: "Попробовать другой путь."
 lepsius.405.h: "Вложиться в новых людей и вьючных животных, чтобы сделать путешествие более приятным."
 lepsius.405.i: "Мы остаёмся на этой дороге."
 lepsius.406.t: "Кораблекрушение экспедиции!"
 lepsius.406.d: "Наш военный атташе несёт ответственность за весьма прискорбное событие."
 lepsius.406.f: "Один из наших экспедиционных кораблей потерпел крушение в Эгейском море. К счастью, никто не пострадал, но большая часть нашего археологического оборудования ушла под воду у берега. Большинство членов нашей экспедиционной группы винят нашего капитана в том, что он не заметил мели. Однако он защищался, говоря, что хотел быстрее закончить путешествие и что риф не был указан ни на одной карте. Среди людей растёт убеждение, что с нынешним руководителем наши шансы на успех уменьшаются."
 lepsius.406.g: "Он несёт ответственность."
 lepsius.406.h: "Купить новое оборудование и сделать вид, что ничего не произошло."
 lepsius.407.t: "Оазис"
 lepsius.407.d: "Во время своего путешествия наши археологи обнаружили ранее неизвестный оазис и пополнили запасы воды."
 lepsius.407.f: "На самом деле, члены экспедиции ожидали, что им придётся пережить несколько дней лишений: древнеегипетские руины, которые они хотели исследовать, должны были находиться где-то в пустыне, в двух-трёх днях пути. К их великому удивлению, однако, они обнаружили, что по пути есть оазис: их ждали пальмы с жирными финиками и фиговые деревья со сладкими плодами. Запасы воды были пополнены, и некоторые участники воспользовались возможностью искупаться в лучах египетского солнца."
 lepsius.407.g: "Освежающие новости."
 lepsius.408.t: "Амулет-назар"
 lepsius.408.d: "Некоторые из нанятых носильщиков считают, что нашего археологического лидера преследует «дурной глаз». Они настоятельно просят его купить амулет."
 lepsius.408.g: "Купить амулет."
 lepsius.408.h: "Это суеверие противоречит всем научным убеждениям!"
 lepsius.409.t: "Дружелюбные рыбаки"
 lepsius.409.d: "Несколько дружелюбных рыбаков, проплывавших мимо побережья, предложили пронести снаряжение нашей экспедиции несколько миль."
 lepsius.409.g: "Очень полезно."
 lepsius.410.t_yucatan: "Попугай-талисман"
 lepsius.410.t_peru: "Угрожающий кондор"
 lepsius.410.d_yucatan: "С тех пор как мы углубились в джунгли Юкатана, с нами повсюду маленький, красочный попугай."
 lepsius.410.d_peru: "С тех пор как мы поднялись в Анды, тень могучего кондора нависает над нами каждый день."
 lepsius.410.f_yucatan: "Леса Юкатана полны опасностей: в кустах прячутся ягуары, змеи и ядовитые насекомые. В то же время члены экспедиции очарованы флорой и фауной, в частности, маленьким, красочным попугаем, который перелетает через шляпы и шлемы и не покидает путешественников. Птица кажется чрезвычайно умной и теперь даже позволяет себя регулярно кормить. Руководитель экспедиции объявил попугая талисманом компании и намерен забрать его домой после окончания поездки."
 lepsius.410.f_peru: "Кондор - король Анд. Огромные птицы правят в воздухе, их тень раздувается до невообразимых размеров. С самого начала экспедиции он нависает над альпаками и носильщиками в совершенно угрожающей манере. Местные не доверяют этому животному. Будучи стервятником, он, как известно, кружит скорее над падалью, чем над живыми. Среди некоторых участников распространяется неприятное чувство."
 lepsius.410.g: "Хороший знак."
 lepsius.410.h: "Он должен стать домашним попугаем."
 lepsius.410.i: "Плохой знак."
 lepsius.410.j: "Он будет нашим."
 lepsius.411.t: "Изнурённые вьючные животные"
 lepsius.411.d: "Кажется, мы переутомили наших вьючных животных."
 lepsius.411.f: "Мы днями напролёт эксплуатировали наших вьючных животных. Некоторые даже говорят: слишком долго. Теперь заметны признаки усталости. Некоторые животные даже отказываются идти дальше и их можно сдвинуть с места только ударами. Этим утром наше первое животное пало."
 lepsius.411.g: "Отдохнут, когда сдохнут."
 lepsius.411.h: "Дайте им отдохнуть!"
 lepsius.412.t: "Археологическая экспедиция пропала!"
 lepsius.412.d: "Всякая связь с нашей археологической экспедицией потеряна уже два месяца."
 lepsius.412.f: "Иногда просто не везёт. Некоторые суеверные местные жители даже утверждают, что вся наша компания родилась под несчастливой звездой. В любом случае, связь с нашей археологической экспедицией полностью потеряна. Последнее сообщение пришло давно. Мы уверены, что археологи скоро вернутся, но, судя по всему, весь состав сбился с пути."
 lepsius.412.g: "Проклятье!"
 lepsius.413.t: "Экзотические болезни"
 lepsius.413.d: "Некоторые участники нашей археологической экспедиции серьёзно больны."
 lepsius.413.f: "Болезни всегда затрудняли долгие путешествия. Будь то в тропиках, пустынях, болотах или высоких горах: наши члены экспедиции не привыкли к таким условиям, и повсюду подстерегают неизвестные патогены. Малярия, в частности, постоянно уносит свои жертвы. В пути некоторые мужчины настолько серьёзно больны, что просто больше не могут работать."
 lepsius.413.g: "Мы подождём и вылечим их."
 lepsius.413.h: "Оставить их."
 lepsius.414.t: "Коррупция"
 lepsius.414.d: "Местные чиновники притесняют нашу экспедицию и мешают её продвижению."
 lepsius.414.f: "С самого начала нашей экспедиции её участники столкнулись с целым рядом притеснений. Мелкие и средние чиновники усложняют нам жизнь печатями и специальными сборами. Один даже усомнился в нашей визе и хотел оштрафовать нас. Ситуация крайне запутанная. Очевидно, в этой стране нельзя продвинуться без хороших связей или семейных уз."
 lepsius.414.g: "Грабители!"
 lepsius.414.h: "Воры!"
 lepsius.414.i: "Политики!"
 lepsius.415.t: "Наводнение"
 lepsius.415.d: "Пока наводнение опустошает страну, наш руководитель экспедиции видит, как женщину уносит потоком воды."
 lepsius.415.f: "Постоянные дожди последних нескольких дней привели к тому, что вода вышла из берегов; исключительная погода, но ничего, к чему наши члены экспедиции не были бы готовы. Пока река превращалась в бурный поток, наши люди продолжали путь - до того момента, как с берега раздался крик. На мгновение наш руководитель экспедиции увидел, как уносит красочный свёрток. Теперь важно действовать быстро, даже если это может означать решающую задержку в путешествии."
 lepsius.415.g: "Спасти её!"
 lepsius.415.h: "Экспедиция не может ждать!"
 lepsius.416.t: "Хорошая погода"
 lepsius.416.d: "Археологическая экспедиция продвигается на удивление хорошо."
 lepsius.416.f: "Наша экспедиционная группа хорошо продвигается. Иногда отсутствие новостей - лучшая новость, и в этом случае наши археологи уверены, что найдут хорошее или очень хорошее место для раскопок. В остальном сообщать не о чем - кроме хорошей погоды!"
 lepsius.416.g: "Как приятно."
 lepsius.417.t: "Гостеприимные местные жители"
 lepsius.417.d: "Местные жители радушно встретили нашу экспедицию, но, возможно, мы могли бы извлечь из этого ещё больше..."
 lepsius.417.f: "Наша экспедиция остановилась в небольшой деревне. Жители чрезвычайно гостеприимны, предложили команде хороший ночлег и обеспечили животных кормом. В разговоре с местными прозвучало предположение, что они могут знать больше об этой местности, включая древние наследия..."
 lepsius.417.g: "Мы должны всё выяснить."
 lepsius.417.h: "И так хорошо."
 lepsius.418.t: "Местный проводник"
 lepsius.418.d: "Местный проводник предложил свои услуги нашей экспедиции."
 lepsius.418.f: "Иногда нужно просто быть удачливым. У нашей экспедиции появился местный проводник, который отлично знает местность - и знает больше о достопримечательностях региона."
 lepsius.418.g: "Идеально!"
 lepsius.419.t: "Короткий путь"
 lepsius.419.d: "Военный атташе экспедиции нашёл короткий путь к руинам, но требует что-то взамен."
 lepsius.419.f: "Наш военный атташе сообщает о коротком пути. Когда мы вчера днём сделали привал, он воспользовался этим, чтобы разведать местность, и утверждает, что нашёл старую дорогу, которой нет ни на одной карте. Если это правда, это могло бы помочь нашей экспедиции, но это также означает, что его нужно хорошо вознаградить..."
 lepsius.419.g: "Вознаградить и следовать за ним!"
 lepsius.419.h: "Не будем делать его важнее, чем он есть."
 lepsius.420.t: "Мотивированные люди"
 lepsius.420.d: "Нашей экспедиции посчастливилось нанять особенно мотивированных людей. Это значительно повышает наши шансы на успех."
 lepsius.420.f: "Издалека слышны свист и пение. Археологическая экспедиция продвигается на удивление хорошо. Команда высоко мотивирована и уверена в успехе. Люди более спокойно относятся к препятствиям и проблемам. Мы не знаем, что послужило причиной этого, возможно, нам повезло с выбором людей. В любом случае, это чрезвычайно повышает наши шансы на успех."
 lepsius.420.g: "Лови момент."
 lepsius.421.t: "Скарабей"
 lepsius.421.f: "К сожалению, во время небольших раскопок возле мастабы наша раскопочная группа ничего не нашла, за исключением маленького, лазуритово-синего скарабея. Скарабей считался в Древнем Египте талисманом на удачу. Поведение скарабея, катящего перед собой навозные шарики, связывали с Ра и его путешествием по небу на солнечной барке. Руководитель нашей экспедиции спросил, не могли бы мы сделать небольшое исключение и оставить этот, по сути, второстепенный предмет ему на память."
 lepsius.421.g: "Он может оставить артефакт себе."
 lepsius.421.h: "Все найденные артефакты должны быть переданы в музей - без исключений!"
 lepsius.422.t: "Храм в песках"
 lepsius.422.d: "Наши археологи нашли нечто, похожее на македонский храм."
 lepsius.422.f: "Сначала наши люди думали, что это дюна, но крошечная вершина из обработанного известняка подсказала нашим археологам, что необычная гора песка в египетской пустыне хранит тайну. В течение нескольких дней экспедиция раскопала храм. Для некоторых результат был разочаровывающим, потому что он не походил на древнеегипетское сооружение, а оказался строением времён Александра Македонского. Однако эксперты говорят, что храм был свидетельством деятельности греческого полководца в Египте, чья гробница до сих пор не найдена."
 lepsius.422.g: "По следам Александра Македонского..."
 lepsius.422.h: "Всё это бабушкины сказки."
 lepsius.423.t: "Крылатый лев"
 lepsius.423.d: "Наши археологи раскопали в Месопотамии статуэтку, похожую на херувима."
 lepsius.423.f: "Гибридные существа из людей и животных широко распространены на Востоке. Нашей экспедиции посчастливилось заполучить исключительно красивую и хорошо сохранившуюся статуэтку во время поисков места для раскопок; она уже на пути в наш музей. Клинописная надпись, идентифицирующая существо как стража храма, также является показательной. Наши археологи предположили, что эти хранители храмов представляют собой связь с израильскими херувимами, упомянутыми в Библии. Двое из них также охраняли Ковчег Завета, который стоял в Иерусалимском храме."
 lepsius.423.g: "Мы говорим о потерянном Ковчеге?"
 lepsius.423.h: "Святой Марк, это ты?"
 lepsius.423.i: "Всё это бабушкины сказки."
 lepsius.424.t: "Склад клинописи"
 lepsius.424.d: "Наши археологи обнаружили многочисленные месопотамские артефакты."
 lepsius.424.f: "Когда наши археологи исследовали древнюю городскую стену на окраине небольшого городка, они, на самом деле, не ожидали найти что-то значительное. Только когда они прощупали камень, они заметили, что в строении есть полости. После детального исследования они вскрыли стену в определённом месте - как оказалось, в стену были встроены клинописные таблички! Склад на удивление хорошо сохранился и предоставляет некоторую информацию о древней Месопотамии."
 lepsius.424.g: "Удивительное открытие!"
 lepsius.425.t: "Орихалк?"
 lepsius.425.d: "Наши археологи нашли артефакт, сделанный из странного, неизвестного материала."
 lepsius.425.f: "Во время одной из наших греческих экспедиций наши археологи сделали любопытное открытие. Утром в дирекцию музея прибыл небольшой шарик. Директор сначала не понял, почему его люди прислали ему шарик; при обычных обстоятельствах это была бы тривиальная находка. Но янтарная сфера состоит из неизвестного материала, с которым мы никогда раньше не сталкивались. До сих пор эксперты не знают, что и думать об артефакте, некоторые считают его подделкой. Другие утверждают, что это указывает на то, что наши знания об эгейском мире совершенно недостаточны."
 lepsius.425.g: "Разве Платон не упоминал что-то подобное в своём диалоге «Критий»...?"
 lepsius.425.h: "Всё это бабушкины сказки."
 lepsius.426.t: "Клад керамики"
 lepsius.426.d: "Наши археологи обнаружили многочисленные эгейские артефакты."
 lepsius.426.f: "Что для древних было мусором, для археолога - сокровищница. Этот девиз недавно подтвердился, когда наша экспедиция остановилась у небольшой руины в поисках места для раскопок и при ближайшем рассмотрении обнаружила яму со складом керамики. Многие черепки ещё предстоит склеить, но многочисленные находки определённо обогатят нашу музейную коллекцию."
 lepsius.426.g: "И всё это принадлежит нам!"
 lepsius.427.t: "Нефрит майя"
 lepsius.427.d: "Наши археологи нашли ценные артефакты майя, сделанные из нефрита."
 lepsius.427.f: "Нефрит был материалом, широко используемым майя в области искусства и религии. Элита украшала себя нефритом, а бог солнца также изображался в нефритовых украшениях. Однако народы Центральной Америки также делали из нефрита инструменты, потому что это был один из самых твёрдых материалов, известных в Новом Свете. Нашим археологам посчастливилось найти несколько таких нефритовых артефактов во время последних раскопок."
 lepsius.427.g: "Это хорошо бы смотрелось в нашей коллекции."
 lepsius.428.t: "Идол инков"
 lepsius.428.d: "Наши археологи раскопали таинственного золотого идола инков."
 lepsius.428.f: "Золотая статуэтка инкского бога Инти прибыла в музей экспресс-доставкой этим утром. Наши археологи не говорят, как и где они её достали. Гримаса, ужасная и прекрасная одновременно, смотрит на наблюдателя. Некоторые эксперты уже выразили сомнения, имеет ли этот предмет вообще инкское происхождение. Дизайн указывает на неизвестную культуру. Кроме того, почти всё золото инков было вывезено из Перу. Это, пожалуй, самый уникальный предмет в нашей доколумбовой коллекции на сегодняшний день. Директор музея уже шепчется за закрытыми дверями, что некоторые легенды, возможно, всё-таки правдивы."
 lepsius.428.g: "Эльдорадо, кто-нибудь?"
 lepsius.428.h: "Всё это бабушкины сказки."
 lepsius.429.t: "Хрустальный череп"
 lepsius.429.d: "Наши археологи нашли... нечто."
 lepsius.429.f: "Надёжный торговец, клянётся наш землекоп, недавно показал ему чрезвычайно интересный, а также зловещий предмет. Это человеческий череп, полностью сделанный из мезоамериканского кварца. Поверхность удивительно хорошо отполирована, и работа превосходит всё, что мы когда-либо знали о культурах южноамериканского континента. Но сомнения велики. Даже наш главный археолог не уверен на 100%, что и думать об этом артефакте."
 lepsius.429.g: "Мы добавим его в коллекцию."
 lepsius.429.h: "Определённо подделка."
 lepsius.430.t: "Поддельный хрустальный череп"
 lepsius.430.d: "Предполагаемый артефакт, который нам продали много лет назад как сенсацию, на самом деле является подделкой."
 lepsius.430.f: "Как это могло случиться? Были ли мы слишком неосторожны? Слишком эгоистичны, потому что мы мчимся от сенсации к сенсации и верим только в то, во что хотим верить? Легендарный хрустальный череп, который наш музей приобрёл как достопримечательность много лет назад, - дешёвая подделка. Пройдут годы, прежде чем наше положение в археологическом мире будет восстановлено!"
 lepsius.430.g: "Национальный позор для нашей археологии!"
 lepsius.431.t: "Местный житель знает руины"
 lepsius.431.d: "Отзывчивый местный житель смог помочь нам в поиске артефактов."
 lepsius.431.f: "Когда наша экспедиция делает остановку в небольшом городке на нашем маршруте, мы встречаем пожилого фермера, который слышал о нашей цели. В обмен на немного хлеба, соли и воды он чрезвычайно любезен. «Другие жители деревни уже сказали мне, что вы ищете», - объясняет он. Он ведёт нас полдня по неизвестной территории. Наши археологи удивлены, когда он приводит нас прямо к древним руинам. Нам удалось найти несколько артефактов для нашего музея."
 lepsius.431.g: "Это, должно быть, наш счастливый день!"
 lepsius.432.t: "Местный житель торгует артефактом"
 lepsius.432.d: "Местный житель хочет продать нам артефакт."
 lepsius.432.f: "Наша экспедиция останавливается в большом городе. Когда носильщики покупали корм для вьючных животных, к ним обратился торговец. Очевидно, новости о нашей поездке широко разошлись и среди местных. За хорошую цену он готов продать ценное произведение искусства, которое он получил от расхитителя гробниц. Происхождение артефакта неясно, но предложение привлекательное, хоть и не дешёвое."
 lepsius.432.g: "Его место в музее."
 lepsius.432.h: "Нас не интересуют такие сомнительные сделки."
 lepsius.433.t: "Подлинник или подделка?"
 lepsius.433.d: "Антиквар с сомнительной репутацией хочет продать нам артефакт."
 lepsius.433.f: "Не все торговцы якобы ценными археологическими артефактами заслуживают доверия. Это относится, например, к торговцу, который несколько навязчиво хочет продать нам сокровище искусства. Навязчивость и его гибкий ценовой механизм, который якобы обещает нам «дружескую цену», вызвали у наших руководителей экспедиции сомнения в том, что это действительно безопасное предложение. Поэтому они спросили у музея, стоит ли им принимать артефакт из сомнительных рук торговца."
 lepsius.433.g: "Мы должны рискнуть."
 lepsius.433.h: "Не доверяйте ему."
 lepsius.434.t: "Расхитители гробниц пойманы"
 lepsius.434.d: "Наша экспедиция захватила группу расхитителей гробниц и их добычу, но мы не решили, что с ними делать."
 lepsius.434.f: "Наши археологи думали, что уже нашли хорошее место для раскопок, пока не поняли, что это место грабили веками. Когда они переупаковывали свои вещи, несколько костровых смогли задержать несколько подозрительных личностей, пытавшихся вынести артефакт с заброшенного участка. На самом деле, мы должны передать этих людей властям и вернуть украденное произведение искусства. Однако некоторые считают, что мы должны забрать артефакт себе и купить молчание расхитителей гробниц."
 lepsius.434.g: "Артефакт должен быть нашим."
 lepsius.434.h: "Подать жалобу и вернуть артефакт местным властям."
 lepsius.435.t: "Аукцион"
 lepsius.435.d: "Политическое давление заставляет нас рассмотреть возможность продажи недавно найденного артефакта."
 lepsius.435.f: "Среди некоторых членов правительства есть опасения, что наши заморские археологические предприятия - это не что иное, как пустая трата денег, приносящая в жертву экономическую мощь нашей нации ради элитных башен из слоновой кости небольшой клики учёных. Они хотят не только научных результатов, но и денежного подтверждения того, что эти экспедиции имеют смысл. Поэтому группа политиков требует, чтобы недавно найденный артефакт был продан для покрытия расходов, вызванных нашими археологическими приключениями."
 lepsius.435.g: "Продать его на аукционе."
 lepsius.435.h: "Но его место в музее!"
 lepsius.436.t: "Скрытая камера"
 lepsius.436.d: "Наши археологи нашли гробницу, по-видимому, разграбленную налётчиками. Но при дальнейших исследованиях они обнаружили камеру за фальшивой стеной."
 lepsius.436.f: "Последняя остановка началась с разочарования. Наш руководитель экспедиции многого ожидал от этого исторического места: это была могила высокого чиновника знати, возможно, также со священной функцией. В любом случае, информация от некоторых фермеров указывала на это. Разочарование на месте тем сильнее: гробница пуста, стены голые, и нет даже намёка на какую-либо историческую значимость. На первый взгляд, это выглядело просто как гладко вытесанная пещера. Однако всё резко изменилось, когда ассистент исследователя случайно обнаружил контур дверного проёма, прислонившись к предполагаемой стене. Потребовалось два часа, чтобы расчистить обломки, затворы и камни - и открыть доступ к ранее скрытой камере."
 lepsius.436.g: "Моё сокровище!"
 lepsius.437.t: "Заброшенный лагерь"
 lepsius.437.d: "Мы нашли заброшенный лагерь иностранной раскопочной группы. После того как мы забрали оттуда два артефакта, посол этой страны требует вернуть их."
 lepsius.437.f: "Когда наши люди достигли лагеря для раскопок, они осматривали остатки экспедиции, которая исследовала близлежащий храм всего несколько месяцев назад. Как оказалось, рабочие слишком быстро покинули это место: в ящике были найдены два не забранных артефакта. Наши археологи забрали находку, но вскоре их посетил посол страны, который потребовал вернуть артефакты, найденные его страной. Этот случай вызвал дипломатический инцидент с великой державой."
 lepsius.437.g: "Мы нашли это, это наше."
 lepsius.437.h: "Давайте поделим артефакты."
 lepsius.437.i: "Вместо этого мы поделимся нашими знаниями."
 lepsius.437.j: "Они - законные владельцы."
 lepsius.438.t: "Отшельник"
 lepsius.438.d: "К сожалению, отшельник, у которого есть артефакт, не очень-то настроен на сотрудничество."
 lepsius.438.f: "До нас дошли слухи о чудаковатом отшельнике, который, как говорят, владеет артефактом. У него впечатляющие знания о прошлом и обширная память. Во многих отношениях даже учёные нашей экспедиции поражены его знаниями. Сварливый старик хотел бы рассказать нам больше, но ни за что не отдаст артефакт. Видимо, придётся применить силу."
 lepsius.438.g: "Я хочу этот артефакт, и я хочу его сейчас!"
 lepsius.438.h: "Просто послушайте его."
 lepsius.439.t: "Динамит?"
 lepsius.439.d: "Иногда особые вызовы требуют особых мер."
 lepsius.439.f: "Во время раскопок наш проводник приходит к выводу, что за стеной может быть скрыт проход; по крайней мере, он утверждает, что заметил полость за стеной. В ранние дни археологии решительные меры были в порядке вещей, и это включало использование взрывчатки для достижения высших научных целей. Конечно, мы можем остаться ни с чем, если предполагаемая полость окажется обманом, и мы поставим под угрозу ранее обеспеченное место раскопок."
 lepsius.439.g: "КА-БУМ!"
 lepsius.439.h: "Варварство даже думать об этом."
 lepsius.440.t: "Сломанный предмет"
 lepsius.440.d: "Мы нашли сломанный артефакт. Недостающая часть находится во владении незначительной державы."
 lepsius.440.f: "Во время раскопок археологи нашли ценное сокровище искусства - по крайней мере, его часть. Другая часть, как выяснилось, находится в руках малой державы, которая купила её у антиквара несколько лет назад. Мы могли бы использовать нашу дипломатическую службу, чтобы получить недостающую часть и собрать артефакт, но посол уже дал понять, что это будет политическим обязательством."
 lepsius.440.g: "Мы любезно попросим их об этом."
 lepsius.440.h: "В конце концов, это не так уж и важно."
 lepsius.441.t: "Забытый обелиск"
 lepsius.441.d: "Незаконченный обелиск даёт нашим учёным информацию о древних методах строительства."
 lepsius.441.f: "В древнеегипетском карьере наши археологи нашли нечто, напоминающее незаконченный обелиск. Работа над массивным монолитом, по-видимому, так и не была завершена. Хотя на нём нет иероглифов и его нельзя вывезти из-за его размеров, наши учёные получили новые сведения о том, как древние египтяне изготавливали и устанавливали эти сооружения."
 lepsius.441.g: "Очень интересно."
 lepsius.442.t: "Мумифицированные животные"
 lepsius.442.d: "Обращение с недавно обнаруженными мумифицированными животными вызвало споры среди археологов."
 lepsius.442.f: "Несколько дней назад археологи нашли погребальную камеру с особой находкой: помимо похороненного там знатного человека, были также найдены меньшие саркофаги с животными. Судя по их внешнему виду, это кошка, собака и обезьяна. После находки среди учёных разгорелась дискуссия: мумифицированные животные могли бы пролить свет на их содержание и жизнь домашних животных в Древнем Египте, но в то же время это означает уничтожение этих редких артефактов."
 lepsius.442.g: "Они требуют тщательного исследования."
 lepsius.442.h: "Не трогайте их, это важные музейные экспонаты!"
 lepsius.443.t: "Ссора из-за крокодила"
 lepsius.443.d: "Странный спор о мёртвом крокодиле разделил наших учёных и военного атташе."
 lepsius.443.f: "Фауна Нила вдохновила наших учёных на активизацию биологических исследований. Особое внимание они уделяют нильскому крокодилу, которого учёные встречают со страхом и отвращением, а также с восхищением. По просьбе наших учёных наш военный атташе убил крокодила. Теперь, однако, он отказывается передать животное: он предпочёл бы сделать из него чучело и повесить над своим камином."
 lepsius.443.g: "Он должен передать крокодила исследователям."
 lepsius.443.h: "Да здравствует таксидермия!"
 lepsius.443.i: "Это действительно красивый крокодил..."
 lepsius.444.t: "Проклятие фараона"
 lepsius.444.d: "После нескольких таинственных инцидентов не только местные помощники, но даже некоторые учёные теперь верят, что наше предприятие в Египте проклято!"
 lepsius.444.f: "Всё началось после того, как наш руководитель экспедиции открыл египетскую гробницу: в саркофаге была ужасно выглядящая мумия, которая разложилась за несколько минут на глазах у участников. Всего несколько дней спустя таинственная болезнь поразила почти всех участников. Ассистент исследователя, присутствовавший при вскрытии мумии, умер. Днём позже песчаная буря сделала работу невозможной на неделю. Этим утром запасы воды оказались загрязнёнными и непригодными для питья; она переливается медно-жёлтым цветом. Всё больше и больше участников теперь убеждены, что они должны заплатить за осквернение могилы: на них лежит проклятие неизвестного фараона!"
 lepsius.444.g: "Что это? Комета замечена?!"
 lepsius.445.t: "Фрагмент «Эпоса о Гильгамеше»"
 lepsius.445.d: "Учёные нашли фрагмент знаменитого «Эпоса о Гильгамеше». Он считается древнейшим произведением человеческой литературы."
 lepsius.445.f: "Эпос о Гильгамеше - это содержание группы литературных произведений, происходящих в основном из вавилонской области и содержащих одну из древнейших сохранившихся письменных печатей. «Эпос о Гильгамеше» в его различных версиях является самым известным произведением аккадской и шумерской литературы. Эпос повествует о Гильгамеше, царе Урука, его подвигах и приключениях, его дружбе с Энкиду, его смерти и поиске Гильгамешем бессмертия. #T @lepsius_gilgamesh_fragment! Для реконструкции базовой версии эпоса необходимо пять фрагментов.#!"
 lepsius.445.g: "Мы должны найти больше фрагментов."
 lepsius.445.h: "Это последний фрагмент!"
 lepsius.445.i: "Больше фрагментов всегда приветствуется."
 lepsius.446.t: "Минойская фреска"
 lepsius.446.d: "Во время исследований на Крите наша раскопочная группа наткнулась на остатки минойской культуры."
 lepsius.446.f: "Красивая фреска привлекла внимание наших археологов. Фрагменты с изображением рыбаков, танцоров и игроков в мяч дают представление о повседневной жизни древней минойской цивилизации. На стене, которую раскопала экспедиционная группа на Крите, даже видны следы краски - спустя 4000 лет! Несомненно, за этим сказочным открытием последуют и другие находки."
 lepsius.446.g: "Затерянная культура оживает на наших глазах."
 lepsius.447.t: "Циклопические стены"
 lepsius.447.d: "Во время исследований в Арголиде наша раскопочная группа обнаружила остатки микенской культуры."
 lepsius.447.f: "После нескольких неудач археологи в Греции нашли то, что местные жители сначала приняли за террасу для оливковых деревьев, но на самом деле это была лишь верхушка циклопической стены. Члены экспедиции пока мало что нашли, но это, по крайней мере, начало."
 lepsius.447.g: "Как они строили так бесшовно в те времена?"
 lepsius.448.t: "Стела майя"
 lepsius.448.d: "Археологическая команда на Юкатане достигла прогресса в расшифровке иероглифов майя."
 lepsius.448.f: "Глубоко в джунглях Юкатана наши члены экспедиции наткнулись на надпись времён майя. Учёные примерно датируют её VI веком до нашей эры. Открытие значительно расширило наши знания о затерянной культуре, но некоторые иероглифы всё ещё остаются загадкой для наших археологов. Однако участники вселяют надежду, что расшифровка письменности майя - лишь вопрос времени."
 lepsius.448.g: "Мы должны расшифровать её."
 lepsius.449.t: "Пещера майя"
 lepsius.449.d: "Экспедиционная группа нашла следы культуры майя, но пока мало что может предъявить."
 lepsius.449.f: "Майя когда-то использовали пещеры для проведения своих ритуалов. Что именно это было, до сих пор не выяснено. Возможно, наши археологи смогут сообщить об этом больше в будущем. Они нашли вход в пещеру майя на севере Гватемалы. Однако до сих пор результаты были довольно скудными."
 lepsius.449.g: "За что вам вообще платят?"
 lepsius.450.t: "Андские мумии"
 lepsius.450.d: "На вершине горы наши учёные обнаружили трупы инкских детей, ставших жертвами ритуала - холод сохранил их на века."
 lepsius.450.f: "Капакоча был важным жертвенным обрядом у инков, который обычно включал жертвоприношение детей. Детей обоего пола отбирали по всей империи инков для жертвоприношений в церемониях капакоча, которые проводились в важных святилищах по всей империи. Смысл этого типа жертвенного обряда обычно понимался как попытка инков обеспечить, чтобы лучшие из человечества были отправлены к своим божествам. Детям, выбранным для жертвоприношения в церемонии капакоча, обычно давали алкоголь и листья коки и доставляли к месту церемонии. Особое внимание инки уделяли ряду церемониальных мест-уака на очень больших высотах. В ряде случаев, обычно на самых важных из этих гор, эти места содержат мумифицированные останки детей, принесённых в жертву в церемониях капакоча."
 lepsius.450.g: "Неприятно, но ценно."
 lepsius.451.t: "Статуя"
 lepsius.451.d: "Археологи нашли замечательную статую в своём путешествии. К сожалению, из-за её размеров её нельзя вывезти."
 lepsius.451.f: "По пути к следующему месту раскопок наша экспедиция наткнулась на колоссальную статую в труднопроходимой, ранее мало исследованной местности. Она была неизвестна даже многим местным помощникам и носильщикам; и она очаровала научных спутников с первого же момента. Наш руководитель экспедиции сразу же предложил вывезти статую, но её размеры и закрепление в земле затрудняют такой проект. Поэтому большинство участников посчитали, что лучше всего будет переписать все надписи на статуе и сделать точный чертёж памятника. Однако есть несколько разрозненных, гнусных голосов, которые говорят, что эту прекрасную находку следует разрезать и отправить в нашу столицу..."
 lepsius.451.g: "Они должны сделать точный чертёж и тщательно скопировать надпись."
 lepsius.451.h: "Разрезать статую на части и отправить их домой."
 lepsius.452.t: "Копия"
 lepsius.452.d: "Наш руководитель экспедиции приобрёл древнюю запись, изображающую материал, который давно был уничтожен."
 lepsius.452.g: "Лучше, чем ничего."
 lepsius.453.t: "Художники запечатлевают пейзаж на бумаге"
 lepsius.453.d: "Художники, которых мы взяли в археологическую экспедицию, с такой ясностью фиксируют пейзаж, что эти записи будут полезны учёным на десятилетия вперёд."
 lepsius.453.f: "На протяжении всей истории археологические экспедиции сопровождали не только классические учёные, но часто и множество различных научных деятелей, таких как географы, биологи, математики, астрономы или художники, которые фиксировали окружающую среду пером и бумагой. Все участники приносили с собой важные знания, чтобы иметь возможность предложить не участвующим учёным дома максимально точное описание соответствующего археологического объекта. Именно этот междисциплинарный подход превратил экспедиции со времён вторжения Наполеона в Египет в многогранное предприятие, в котором научные вехи были достигнуты в нескольких областях одновременно."
 lepsius.453.g: "Рад, что мы их наняли."
 lepsius.454.t: "Учёные проводят исследования"
 lepsius.454.d: "Наши учёные провели различные эксперименты на месте, не только делая сравнения, но и давая полезные советы нашим археологам."
 lepsius.454.f: "На протяжении всей истории археологические экспедиции сопровождали не только классические учёные, но часто и множество различных научных деятелей, таких как географы, биологи, математики, астрономы или художники, которые фиксировали окружающую среду пером и бумагой. Все участники приносили с собой важные знания, чтобы иметь возможность предложить не участвующим учёным дома максимально точное описание соответствующего археологического объекта. Именно этот междисциплинарный подход превратил экспедиции со времён вторжения Наполеона в Египет в многогранное предприятие, в котором научные вехи были достигнуты в нескольких областях одновременно."
 lepsius.455.t: "Конкурирующая экспедиция"
 lepsius.455.d: "В нескольких милях вглубь дикой местности команда нашего руководителя экспедиции встречает отряд измождённых людей. Это жалкие остатки иностранной экспедиции."
 lepsius.455.f: "Не только мы отваживаемся на неизведанные территории. Небольшая частная экспедиция эксцентричного учёного пересекает путь нашему государственному предприятию. В отличие от нашей собственной команды, люди конкурирующей компании плохо экипированы. В них видна нужда и лишения. Капеллан нашей экспедиции предлагает помочь им - что также может быть истолковано как благожелательный жест на родине. Другие члены экспедиции, с другой стороны, видят возможность обменяться знаниями с иностранными учёными. Военный атташе, в свою очередь, видит возможность предложить помощь - в обмен на получение ценного артефакта из фонда экспедиции."
 lepsius.455.g: "Помочь им."
 lepsius.455.h: "Мы поможем им в обмен на их знания."
 lepsius.455.i: "Еда и помощь только в том случае, если они оставят нам своё сокровище."
 lepsius.461.t: "Шепчущий сфинкс"
 lepsius.461.d: "Его более чем сомнительный образ жизни способствует тому, что наш руководитель экспедиции [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] страдает от памятных галлюцинаций."
 lepsius.462.d: "Его более чем сомнительный образ жизни способствует тому, что наш военный атташе [SCOPE.sCharacter('lepsius_military_attache').GetFullName] страдает от памятных галлюцинаций."
 lepsius.461.g: "Этому человеку действительно нужно переосмыслить свой образ жизни."
 lepsius.463.t: "Бастет, богиня-кошка"
 lepsius.463.d: "В своём путешествии [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] в результате своих исследований [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'открыла', 'открыл')] в себе слабость к кошкам."
 lepsius.463.f: "Среди различных божеств с животными формами Древний Египет знал и богиню-кошку Бастет. Египтяне когда-то очень почитали кошек, потому что они избавляли амбары от вредителей, таких как мыши, а также змеи. В ходе своего увлечения Египтом наш руководитель экспедиции начал проявлять большой интерес к этой богине и взял под своё крыло собственную кошку. Этот животный компаньон также несколько смягчил его жёсткий характер."
 lepsius.463.g: "Есть кошатники, а есть собачники."
 lepsius.464.t: "Охота с салюки"
 lepsius.464.d: "Наш военный атташе [SCOPE.sCharacter('lepsius_military_attache').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_military_attache').IsFemale, 'приобрела', 'приобрёл')] местную охотничью собаку во время путешествия по Месопотамии."
 lepsius.464.f: "Собаки обычно не пользуются хорошей репутацией на Ближнем Востоке. Исключение составляют борзые, такие как салюки. Бедуины считают её благородным компаньоном, который также отлично справляется с охотой на кроликов или газелей. Наш военный атташе получил такую превосходную собаку в подарок от местного жителя, и уже несколько недель между человеком и животным зарождается глубокая связь."
 lepsius.464.g: "Есть собачники, а есть кошатники."
 lepsius.465.t: "Проблемное чувство превосходства"
 lepsius.465.d: "Высокомерный характер, который [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'проявила', 'проявил')] [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], привёл к недовольству в стране нашей экспедиции."
 lepsius.465.g: "Зачем нам беспокоиться? В конце концов, они варвары!"
 lepsius.465.h: "Мы должны исправить эту дипломатическую оплошность любой ценой."
 lepsius.466.t: "Картограф"
 lepsius.466.d: "Во время археологической экспедиции военный атташе [SelectLocalization(SCOPE.sCharacter('lepsius_military_attache').IsFemale, 'проявила', 'проявил')] большой интерес к картографии и [SelectLocalization(SCOPE.sCharacter('lepsius_military_attache').IsFemale, 'создала', 'создал')] свой собственный картографический материал. Похоже, у него есть талант к геодезии."
 lepsius.466.f: "С самого начала экспедиции военный атташе вёл строгий учёт передвижений и продвижения войск, составляя собственные карты. Во время брифинга выяснилось, что у него уже есть внушительная коллекция. Научный ассистент неоднократно сопровождал его на прошлой неделе и немного помогал ему расширять свои картографические находки; теперь он может работать и с измерительными приборами. Научный ассистент предлагает обучить его, чтобы он стал профессиональным геодезистом."
 lepsius.466.g: "Его ждёт великая карьера!"
 lepsius.466.h: "Его карты хороши, но он должен сосредоточиться на военных делах."
 lepsius.467.t: "Забытая реликвия"
 lepsius.467.d: "Руководитель нашей археологической экспедиции установил контакт с небольшим христианским меньшинством на Востоке. Он рассказывает об этом удивительные вещи."
 lepsius.467.h: "Он должен изучить реликвию."
 lepsius.468.t: "Атташе пойман на краже артефактов"
 lepsius.468.d: "Этим утром один из наших землекопов нашёл в палатке нашего военного атташе два артефакта, которые считались утерянными несколько недель. Он, очевидно, хотел оставить их себе."
 lepsius.468.f: "Все знают историю нашего атташе, но другие члены экспедиции на самом деле ожидали, что [SCOPE.sCharacter('lepsius_military_attache').GetFullName] не вернётся к старым привычкам. Но они, очевидно, ошиблись: один раз бандит - всегда бандит. Потому что после того, как рабочий случайно нашёл два артефакта с последних раскопок, о которых атташе не сообщил, можно сделать только один вывод: он либо хотел оставить их себе, либо продать. Руководитель экспедиции ещё не предъявил ему обвинения напрямую, но считает более разумным договориться о дальнейших действиях, прежде чем делать выводы из этого случая."
 lepsius.468.g: "Умолчать об этом деле."
 lepsius.468.h: "Разобраться в деле осторожно, но настоять на том, чтобы он вернул артефакты."
 lepsius.468.i: "Публично разоблачить его и наказать!"
 lepsius.471.t_karnak: "Карнак"
 lepsius.471.t_memphis: "Мемфис"
 lepsius.471.t_uruk: "Урук"
 lepsius.471.t_niniveh: "Ниневия"
 lepsius.471.t_tiryns: "Тиринф"
 lepsius.471.t_phaistos: "Фест"
 lepsius.471.t_itza: "Чичен-Ица"
 lepsius.471.t_olla: "Ольянтайтамбо"
 lepsius.471.d: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] хочет совершить поездку к известному месту. Хотя это место имеет большое археологическое значение, это сильно затруднит нашу экспедицию."
 lepsius.471.f_karnak: "Карнакский храм к северу от Луксора считается одним из крупнейших храмовых комплексов древнего мира. После возвышения Амона-Ра из Фив до положения местного, а затем и имперского бога, правители раннего Среднего царства начали строительство храма, который на протяжении тысячелетий расширялся до нынешнего храмового комплекса, где жречество Амона проводило ежедневные храмовые службы. Говорят, что над ним работали 30 фараонов."
 lepsius.471.f_memphis: "Манефон сообщает, что, согласно легенде, Мемфис был основан царём Менесом в 3000 году до н.э. Он был столицей Египта во времена Древнего царства и оставался важным городом в египетской истории. Мемфис находился под защитой бога Птаха, покровителя ремесленников, чей храм Хут-Ка-Птах располагался в центре города. Взлёт и падение Мемфиса неразрывно связаны с историей всей страны."
 lepsius.471.f_uruk: "Урук - место зарождения первой письменности. Уже в конце 4-го тысячелетия до н.э. это был один из ведущих политических центров раннешумерского периода. В древности месопотамский город стоял прямо на реке. В мифах и литературе Урук прославился как столица Гильгамеша, героя «Эпоса о Гильгамеше». Учёные отождествляют Урук с библейским Эрехом (Бытие 10:10), вторым городом, основанным Нимродом в Сеннааре."
 lepsius.471.f_niniveh: "Ниневия расположена на восточном берегу реки Тигр и была столицей и крупнейшим городом Новоассирийской империи, а также крупнейшим городом мира на протяжении нескольких десятилетий. Во времена Новоассирийской империи, особенно со времён Ашшурнасирпала II, происходило значительное архитектурное расширение. Некоторые из главных входов были фланкированы колоссальными каменными фигурами ламассу весом до 30 000 килограммов (30 т)."
 lepsius.471.f_tiryns: "Тиринф достиг пика своего значения между 1400 и 1200 годами до н.э., когда он стал одним из важнейших центров микенского мира, и в частности в Арголиде. Его наиболее примечательными чертами были дворец, циклопические туннели и особенно стены, которые дали городу гомеровский эпитет «мощно обнесённый стенами Тиринф». Тиринф стал ассоциироваться с мифами о Геракле, поскольку город был резиденцией героя во время его подвигов, а некоторые источники называют его местом рождения."
 lepsius.471.f_phaistos: "Согласно легенде, город Фест был основан царём Миносом и назван в честь сына или внука Геракла (героя Феста), который был убит Идоменеем, внуком Миноса и более поздним царём Крита. Первым правителем Феста, как говорят, был Радамант, брат Миноса. В городе находится второй по величине дворцовый комплекс на Крите после Кносса."
 lepsius.471.f_itza: "Чичен-Ица - одна из важнейших руин на мексиканском полуострове Юкатан. Она расположена примерно в 120 километрах к востоку от Мериды в штате Юкатан. Её руины датируются позднемайяским периодом. Занимая площадь в 1,547 гектаров, Чичен-Ица является одним из самых обширных объектов на Юкатане. В центре находятся многочисленные монументальные представительные здания религиозного и политического назначения, из которых выделяется большая, в основном сохранившаяся ступенчатая пирамида."
 lepsius.471.f_olla: "Во времена империи инков Ольянтайтамбо был королевским поместьем императора Пачакути, который завоевал этот регион, построил город и церемониальный центр. Во время испанского завоевания Перу он служил оплотом для Манко Инки Юпанки, лидера инкского сопротивления. Ольянтайтамбо - единственный сохранившийся пример городского планирования инков. Здания и террасы инков, а также узкие улочки города до сих пор находятся в первозданном виде. Прямые и узкие улицы образуют 15 квадратных кварталов (канча), каждый с входом в центральный двор, окружённый домами."
 lepsius.471.j: "Абсолютно нет - экспедиция в приоритете!"
 lepsius.472.t: "Затерянный мир?"
 lepsius.472.d: "После долгого молчания наша экспедиция сообщает о больших потерях в людях, вьючных животных и инструментах. Оправдание, приведённое руководителем экспедиции, весьма удивительно."
 lepsius.501.t: "Гробница неизвестного фараона"
 lepsius.501.d: "Наш руководитель экспедиции [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'услышала', 'услышал')] о затерянной гробнице в Долине Царей. По-видимому, она принадлежит ранее неизвестному фараону. Местные жители утверждают, что нашли вход в неё."
 lepsius.501.f: "Более 3000 лет назад фараонов Египта хоронили в легендарной Долине Царей. Многие из этих гробниц были известны уже в древности и считались туристическими достопримечательностями - об этом свидетельствуют римские и греческие граффити. Коптские христиане даже превратили некоторые открытые гробницы в часовни. На протяжении веков расхитители гробниц из близлежащих мест крали произведения искусства из гробниц и храмов и продавали их на рынке. По этой причине от многих гробниц остались лишь пустоты. И всё же, снова и снова люди из ближних и дальних краёв натыкались на гробницы, которые с тех пор были забыты и содержали находки, росписи или невскрытые камеры. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] недавно [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'получила', 'получил')] уведомление о гробнице, которая может быть в хорошем состоянии."
 lepsius.501.g: "У нас нет на это времени."
 lepsius.502.t: "Песок, много песка"
 lepsius.502.d: "Когда археологи прибывают на место, они обнаруживают, что действительно есть свидетельства гробницы царя, но место полностью засыпано песком."
 lepsius.502.f: "Никто не думал, что раскопки будут лёгкими. Но когда местный житель приводит археологов туда, где, как говорят, находится гробница, первое, с чем сталкиваются члены экспедиции, - это отвесная скала, к которой прилипла дюна из песка и грязи. Нигде нет и следа гробницы. На вопрос местный житель объясняет, что он никогда не видел входа в гробницу; но его дед ещё знал его, а отец, по крайней мере, видел намёк на него в детстве. Из-за дождей Долина Царей подвержена оползням; а ветер и египетский песок печально известны тем, что скрывают многовековые объекты. Хотя некоторые из помощников выражают сомнения в том, что место захоронения вообще существует, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] по-прежнему [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'полна', 'полон')] решимости искать затерянную гробницу. Однако для того, чтобы убрать массы песка, которые накопились за годы, потребуется дополнительное финансирование."
 lepsius.502.g: "Нам нужно больше инструментов!"
 lepsius.503.t: "Валун"
 lepsius.503.d: "После упорного использования всех лопат, продававшихся в радиусе 10 миль, команда раскопала вход - только чтобы оказаться перед массивным валуном, блокирующим проход."
 lepsius.503.f: "Дни arduous песка и грязи должны быть вознаграждены - по крайней мере, на это надеялись члены экспедиции. Когда дверная перемычка гробницы была действительно обнаружена, подавленное настроение измученных людей переросло в эйфорию. Всего за несколько часов был расчищен остаток входа. Но не успели они продвинуться дальше, как обнаружили причину, по которой эта гробница была спасена от разграбления: огромный валун, вероятно, отколовшийся от скалы десятилетия, если не столетия назад, блокировал вход. Мимо него не мог протиснуться даже маленький мальчик, потому что щебень и застывшая грязь заполнили остальную часть коридора, как раствор. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'должна была', 'должен был')] принять важное решение: как попытаться убрать препятствие с входа в гробницу?"
 lepsius.503.g: "Мы используем изощрённые методы."
 lepsius.503.h: "Мы используем изощрённую механику."
 lepsius.503.i: "Мы используем изощрённый нитроглицерин."
 lepsius.503.j: "Мы используем чистую мускульную силу."
 lepsius.504.t: "Гробница разрушена нитроглицерином"
 lepsius.504.d: "К сожалению, использование взрывчатки принесло больше проблем, чем пользы: взрыв разрушил не только скалу, но и весь комплекс гробницы!"
 lepsius.504.f: "Организация взрывчатки, хотя и не самое простое предприятие, была решена в течение нескольких дней, когда команда смогла купить запасы у геолога за хорошую цену. Никто из членов экспедиции не назвал бы себя экспертом по сносу, но [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'считала', 'считал')], что обращение с чрезвычайно опасным нитроглицерином не представляет особой сложности. Возможно, было бы лучше проконсультироваться с экспертом заранее, потому что наши люди, должно быть, ошиблись в необходимом количестве: вместо того, чтобы просто взорвать валун, археологическая экспедиция взорвала всю скалу! Только чудом членам экспедиции удалось спастись, прежде чем каскад валунов обрушился с ближайшей горы и превратил всю территорию в руины. Что бы ни было за входом: теперь оно, должно быть, безвозвратно уничтожено..."
 lepsius.504.g: "Может, это был перебор?"
 lepsius.505.t_archaeology: "Настенные росписи"
 lepsius.505.t_engine: "Разрушенная галерея"
 lepsius.505.t_muscular: "Настенные росписи"
 lepsius.505.d_archaeology: "После детального археологического исследования и последующего осторожного удаления валуна с использованием новейших методов наши археологи входят в хорошо сохранившуюся галерею гробницы фараона."
 lepsius.505.d_engine: "С помощью машины команда смогла убрать валун - с негативными побочными эффектами."
 lepsius.505.d_muscular: "Наняв могучего итальянца, мы смогли убрать валун - и войти в хорошо сохранившийся археологический объект."
 lepsius.505.f_archaeology: "Подобно сложной операции, археологи подошли к валуну. Они вскрыли скалу, проверили материал, ковыряли лопатами и кирками. После детального исследования они решили удалить глыбу небольшими слоями с помощью сложного и длительного процесса таким образом, чтобы не повредить иероглифы у входа. Это был трудоёмкий процесс, но определённо того стоил. Вооружившись масляными лампами, они на ощупь спустились по первому коридору и узрели красоту Древнего Египта: на стенах мерцали росписи в замечательном состоянии с изображением крестьян в полях, двора фараона и богов суда. Даже если археологи не смогли найти никаких артефактов - следы разграбления определённо были - один только многообещающий ансамбль приглашал к тщательному исследованию гробницы."
 lepsius.505.f_engine: "Новейшие технологии должны были помочь нашим раскопкам в Гробнице Неизвестного Фараона: с помощью машины, которая должна была вытащить валун из входной шахты через раствор. Сначала скала не двигалась с места, поэтому наши учёные установили двигатель на полную мощность. Роковая ошибка: потому что, хотя камень ненадолго сдвинулся с места и был потащен вверх по склону, он вскоре сорвался с ремня и с полной силой покатился обратно к гробнице - и вызвал там фатальные разрушения! [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], со своими помощниками, быстро бросились в открытый проход, но с ужасом обнаружили, что скала не только полностью разрушила некогда прекрасно расписанную галерею, но и сильно повредила важную стену, которая использовалась для статики всей системы ..."
 lepsius.505.f_muscular: "Вернувшись в Луксор, наши члены экспедиции нашли впечатляющую фигуру. Это был человек из Падуи, который первоначально приехал в Египет, чтобы показать паше гидравлическое устройство для помощи при наводнениях на Ниле. Однако дело не увенчалось успехом. Гигант, ростом около двух метров и с мышцами быка, сказал, что ранее работал в цирке как «Геркулес из Патагонии». По достоверному свидетельству его английского слуги, он мог поднять шесть человек одновременно. Именно эти особые навыки убедили нас нанять его, чтобы открыть доступ. Едва прибыв на место, он одним восхитительным движением откатил камень в сторону. Вооружившись масляными лампами, наши археологи бросились в коридор и узрели красоту Древнего Египта: на стенах мерцали росписи в замечательном состоянии с изображением крестьян в полях, двора фараона и богов суда. Один только многообещающий ансамбль приглашал к тщательному исследованию гробницы."
 lepsius.505.g: "Великолепие Древнего Египта!"
 lepsius.505.h: "Упс."
 lepsius.506.t_archaeology: "Прекрасный саркофаг"
 lepsius.506.t_engine: "Саркофаг под угрозой"
 lepsius.506.t_muscular: "Сломанный саркофаг"
 lepsius.506.d_archaeology: "Наши археологи с удивлением и трепетом входят в Камеру Царя - и забирают прекрасный саркофаг и мумию 20-й династии."
 lepsius.506.d_engine: "Ущерб, нанесённый машиной, хорошо виден в погребальной камере: у археологов почти нет времени на опись, вместо этого они спешат как можно быстрее вытащить саркофаг наружу!"
 lepsius.506.d_muscular: "Нашим археологам удаётся проникнуть в нетронутую и прекрасно украшенную погребальную камеру неизвестного фараона - но затем происходит непредвиденное... несчастье."
 lepsius.506.f_archaeology: "Это был поистине исторический опыт, когда археологи, которых [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'возглавляла', 'возглавлял')] [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], вошли в настоящую погребальную камеру. Помимо нескольких кувшинов с жертвенными подношениями и мумифицированной собаки, их ждал особый сюрприз: саркофаг вместе с мумией Неизвестного фараона всё ещё покоился там, где он был похоронен более 3000 лет назад! Учёные осторожно ощупали поразительную находку, смахнули пыль и, сняв крышку, повреждённую расхитителями гробниц, увидели хорошо сохранившийся деревянный гроб. Наш музей пополнился уникальным свидетельством египетской культуры!"
 lepsius.506.g: "Археология спасла день."
 lepsius.506.h: "Вытаскивайте его быстрее!"
 lepsius.506.i: "Упс."
 lepsius.511.t: "Вопрос чести"
 lepsius.511.d: "По словам некоторых фермеров, несколько дней назад иностранная экспедиция водрузила флаг своей страны на пирамиду Хеопса. Патриоты в нашей команде чувствуют себя оскорблёнными - и хотят сделать то же самое."
 lepsius.511.f: "Экспедиция находилась недалеко от Каира, когда новость потрясла всех участников: на прошлой неделе кто-то, по-видимому, установил флаг своей страны на вершине пирамиды в Гизе! Такие выходки на самом деле запрещены в области науки, и остаётся неизвестным, согласился ли паша на такой триумфальный жест. Ясно одно: на протяжении всей экспедиции царило горячее желание сделать то же самое, хотя бы для того, чтобы не уронить честь своей родины."
 lepsius.511.g: "У нас нет на это времени."
 lepsius.511.h: "Мы сделаем это - за [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]!"
 lepsius.512.t: "Рассвет"
 lepsius.512.d: "Экспедиция отправляется рано утром, чтобы взобраться на Великую пирамиду в Гизе!"
 lepsius.512.f_wine: "Участники восхождения на пирамиду встают уже в 5 часов утра; вчера они подготовили флаг высотой пять метров, пронесли огромное знамя мимо большого Сфинкса к пирамиде Хеопса. На завтрак готова холодная индейка, некоторые всё ещё измучены вчерашней работой над флагом. Часть экспедиции остаётся с разбитой палаткой у ног Сфинкса, остальные отправляются к пирамиде. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] обещает, что на вершине пирамиды будет специально припасённая бутылка вина для празднования."
 lepsius.512.f_no_wine: "Участники восхождения на пирамиду встают уже в 5 часов утра; вчера они подготовили флаг высотой пять метров, пронесли огромное знамя мимо большого Сфинкса к пирамиде Хеопса. На завтрак готова холодная индейка, некоторые всё ещё измучены вчерашней работой над флагом. Часть экспедиции остаётся с разбитой палаткой у ног Сфинкса, остальные отправляются к пирамиде. Только когда группа подходит к Великой пирамиде, военный атташе понимает, что [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] этим утром [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'забыла', 'забыл')] самое главное: вино для тоста!"
 lepsius.512.g: "Надеюсь, он принесёт лучшее вино..."
 lepsius.512.h: "Он забыл вино?"
 lepsius.513.t: "Восхождение"
 lepsius.513.d: "Археологический лидер и военный атташе стоят у подножия великой пирамиды. Возникают разногласия по поводу того, кто должен возглавить это смелое предприятие."
 lepsius.513.f: "Наша команда достигает подножия Великой пирамиды фараона Хеопса. Возникает вопрос, сколько ступеней нужно, чтобы достичь небес - и [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] может точно ответить, что их 203. Столько каменных слоёв предстоит покорить. Тем временем возникает вопрос, кто должен возглавить восхождение. [SCOPE.sCharacter('lepsius_military_attache').GetFullName] уже [SelectLocalization(SCOPE.sCharacter('lepsius_military_attache').IsFemale, 'заявила', 'заявил')], что подходит так же хорошо, как и альпинист..."
 lepsius.513.g: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'должна', 'должен')] вести нас дальше."
 lepsius.513.h: "[SCOPE.sCharacter('lepsius_military_attache').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_military_attache').IsFemale, 'должна', 'должен')] вести нас дальше."
 lepsius.514.t: "Первоначальный вход"
 lepsius.514.d: "Наша команда взобралась на нижний уровень пирамиды. Теперь они находятся на семнадцатой ступени, очень близко к первоначальному входу в погребальную камеру."
 lepsius.514.f: "Первый этап пройден. Наша экспедиция всё ещё очень близко к основанию, но сделала перерыв. Наш руководитель экспедиции хотел бы более внимательно изучить исторический вход в пирамиду Хеопса и спуститься внутрь с несколькими помощниками. Некоторые члены экспедиции используют перерыв, чтобы пообедать. Все знают, что с этого момента восхождение станет более опасным."
 lepsius.514.i: "Это место достаточно хорошо для нашего флага."
 lepsius.515.t: "100 ступеней"
 lepsius.515.d: "Наша команда взобралась на сотую ступень пирамиды. Отряд теперь почти на полпути к вершине."
 lepsius.515.f: "Сто ступеней кажется не так уж и много, но с большой группой, багажом и ограниченным пространством задача становится совсем другой. Наше знамя всё ещё свёрнуто, и его несут пятеро мужчин. Некоторые члены экспедиции уже заявляют, что вид с этой точки достаточно высок. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], тем временем, с тревогой смотрит наверх - ведь самый рискованный этап восхождения неминуем."
 lepsius.516.t: "Падение"
 lepsius.516.d: "Во время последнего этапа восхождения на пирамиду наш лидер и его люди, по-видимому, переусердствовали - произошёл разрушительный инцидент!"
 lepsius.516.f: "Может быть, это была человеческая ошибка, может быть, план не сработал, а может быть, судьба наказала нас за нашу высокомерность. Однако при восхождении на пирамиды один помощник поскользнулся на ступени пирамиды и увлёк за собой в пропасть других членов экспедиции и грузы. Наш руководитель экспедиции и наш военный атташе смогли предотвратить худшее, но были тяжело ранены. Некоторые носильщики отделались пополнением запасов, другие жалуются на переломы. Нам пришлось отменить амбициозное предприятие по водружению нашего флага на Великой пирамиде."
 lepsius.516.g: "Позор для всех нас."
 lepsius.517.t: "На вершине Великой пирамиды"
 lepsius.517.d: "Поистине выдающийся день для экспедиционной команды и нашей страны - #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFlag]ий#! флаг развевается над Великой пирамидой в Гизе!"
 lepsius.517.f: "Великий момент для археологии, великий момент для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Наша экспедиция взобралась на вершину пирамиды Хеопса и отметила это достижение небольшим праздником. Имена Шампольона, Лепсиуса и Розеллини прозвучали в унисон с сердечным «гип-гип-ура!» и, наконец, патриоты водрузили флаг. В свете заходящего солнца наше знамя теперь сияет над всей долиной Нила!"
 lepsius.517.g: "Поднять флаг [ROOT.GetCountry.GetAltName('RU_CL_VP')] - и ура!"
 lepsius.517.h: "Поднять флаг [ROOT.GetCountry.GeAltName('RU_CL_VP')]!"
 lepsius.521.t: "Ворота Иштар"
 lepsius.521.d: "Во время своих раскопок в Вавилоне археологи обнаружили колоссальные остатки легендарных ворот Иштар. Исторические городские ворота находятся в удивительно хорошем состоянии."
 lepsius.521.f: "Во время своих раскопок на месте древней вавилонской столицы рабочие сначала нашли глазурованные кирпичи, что указывало на престижное, представительное здание. Чем дальше археологи копали на этом месте, тем больше находок они делали. Наконец, они смогли даже разглядеть стены и башни превосходно сохранившихся городских ворот, на которых красовались львы, быки и мифические существа. Руководитель экспедиции [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'представила', 'представил')] нашему правительству дерзкий план: разобрать все ворота и восстановить их в точности с оригиналом в столице. Дорогостоящее предприятие со многими неизвестными - и в то же время настолько привлекательное, что ведущие интеллектуалы и руководство музея присоединились к этой идее."
 lepsius.521.g: "Взять только некоторые части. Они должны остаться там, где они есть."
 lepsius.521.h: "Их следует перевезти в город [SCOPE.sState('capital_scope').GetCityHubName] и реконструировать."
 lepsius.522.t: "Транспортировка кирпичей из Месопотамии"
 lepsius.522.d: "Сегодня в музей в городе [SCOPE.sState('capital_scope').GetCityHubName] прибыла полная партия кирпичей для реконструкции."
 lepsius.522.f: ""
 lepsius.522.g: "Люблю запах месопотамских кирпичей по утрам."
 lepsius.523.t: "Кирпичи Иштар в чужих руках"
 lepsius.523.d: "Мы не единственные, кто копал в Вавилоне за последние несколько десятилетий. Оказывается, у иностранной нации также есть несколько партий кирпичей, необходимых для восстановления ворот Иштар. Мы вынуждены смиренно просить."
 lepsius.523.f: ""
 lepsius.523.g: "Нам, вероятно, придётся смириться."
 lepsius.523.h: "Ради каких-то бесполезных кирпичей? Никогда!"
 lepsius.524.t: "Враг блокирует наш транспорт с кирпичами!"
 lepsius.524.d: "Долгожданная партия месопотамских кирпичей для восстановления ворот Иштар в нашем музее не прибыла спустя несколько месяцев. Мы получили известие, что транспорт был заблокирован во время войны."
 lepsius.524.f: ""
 lepsius.524.g: "Это саботаж!"
 lepsius.525.t: "Специальный сбор"
 lepsius.525.d: "По-видимому, страна, где проводятся раскопки и откуда родом кирпичи для ворот Иштар, пытается нажиться на нашем предприятии. При экспорте кирпичей на них был наложен «специальный сбор»!"
 lepsius.525.f: ""
 lepsius.525.g: "Мы заплатим за каждый камень..."
 lepsius.526.t: "Небольшая партия кирпичей из Месопотамии"
 lepsius.526.d: "Неизвестные обстоятельства привели к тому, что наш корабль на этот раз был загружен кирпичами ворот Иштар только наполовину."
 lepsius.526.f: ""
 lepsius.526.g: "Что такого сложного в том, чтобы отправить несколько кирпичей?"
 lepsius.527.t: "Корабль с кирпичами прибывает в порт"
 lepsius.527.d: "Необычайно большое количество кирпичей, необходимых для восстановления ворот Иштар, прибыло сегодня в музей. По-видимому, погрузка в Месопотамии идёт лучше, чем ожидалось."
 lepsius.527.f: ""
 lepsius.527.g: "А, ещё кирпичи!"
 lepsius.528.t: "Плохие кирпичи"
 lepsius.528.d: "К сожалению, когда мы осматривали кирпичи, прибывшие в город [SCOPE.sState('capital_scope').GetCityHubName], наши кураторы обнаружили, что некоторые ящики совершенно непригодны. Хотим мы того или нет, но нам придётся обойтись без них."
 lepsius.528.f: ""
 lepsius.528.g: "Мои ценные кирпичи - нет!"
 lepsius.529.t: "Дипломатическое унижение"
 lepsius.529.d: "Иностранная нация унизилась перед мировой общественностью, чтобы выпросить у нас какие-то бесполезные археологические артефакты, которые нам продал антиквар несколько лет назад. Конечно, мы с радостью приняли этот жест и избавились от этого хлама."
 lepsius.529.f: ""
 lepsius.529.g: "Потрясающе!"
 lepsius.530.t: "Ворота Иштар реконструированы!"
 lepsius.530.d: "После многих лет работы и кропотливой сборки десятков тысяч вавилонских фрагментов легендарные ворота Иштар сияют в новом великолепии - а именно в своём первоначальном размере в нашем музее!"
 lepsius.530.f: "Ворота Иштар были восьмыми воротами во внутренний город Вавилона. Они были построены около 575 года до н.э. по приказу царя Навуходоносора II на северной стороне города. Они были частью большой обнесённой стеной процессионной дороги, ведущей в город. Стены были отделаны глазурованными кирпичами, в основном синего цвета, с животными и божествами в низком рельефе через определённые промежутки, которые также состояли из кирпичей, отлитых и окрашенных по-разному. Передняя часть ворот имеет низкорельефный дизайн с повторяющимся узором изображений двух главных богов вавилонского пантеона. Мардук, национальное божество и главный бог, со своим слугой-драконом Мушхушшу, изображён как дракон со змееподобной головой и хвостом, чешуйчатым телом льва и мощными когтями на задних лапах. Мардук считался божественным поборником добра против зла, и заклинания вавилонян часто искали его защиты. Второй бог, изображённый на рельефах ворот Иштар, - это Адад (также известный как Ишкур), священным животным которого был тур, ныне вымерший предок крупного рогатого скота. Адад обладал властью над разрушительными бурями и благодатным дождём. Дизайн ворот Иштар также включает линейные бордюры и узоры из розеток, часто рассматриваемые как символы плодородия. Кирпичи ворот Иштар были сделаны из мелкозернистой глины, спрессованной в деревянных формах. Каждый из рельефов животных также был сделан из кирпичей, сформированных путём прессования глины в многоразовых формах."
 lepsius.530.g: "Великолепно!"
 lepsius.531.t: "Легенда о Ламассу"
 lepsius.531.d: "Наши археологи услышали историю о необычайно великолепном ламассу, который, как говорят, был утерян давным-давно и находится где-то в курдском регионе."
 lepsius.531.f: "Это было вечером, когда наша команда разбила палатки, разожгла костёр и приготовила баранину, чтобы завершить день. В тлеющих чёрных, синих и красных оттенках зари в лагерь пришёл старый пастух с просьбой о провизии. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'согласилась', 'согласился')] и [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'услышала', 'услышал')] удивительную историю. Около 30 лет назад другая археологическая экспедиция, как говорят, искала сокровища и необычные произведения искусства в этой области, чтобы произвести впечатление на местное руководство музея и вернуться домой со славой и почётом. Венцом раскопок был огромный ламассу, который до сих пор известен местным жителям из-за его монументальных размеров и хорошего состояния. Но во время транспортировки произошёл несчастный случай. Пока десятки людей передвигали гигантскую статую месопотамского гибрида, руководители экспедиции поссорились с местным курдским племенем. По-видимому, они хотели обмануть нанятых курдских помощников и не заплатить им. Поэтому племя устроило засаду на членов экспедиции и забрало то, что считало своим по праву. Ламассу, однако, остался на месте - и всё ещё ждёт, чтобы его забрали, в курдском регионе. Пастух предложил указать нам местонахождение легендарного Ламассу в обмен на нашу помощь."
 lepsius.531.g: "Слишком опасно подвергать себя ненужной опасности из-за таких сказок."
 lepsius.531.h: "Мы должны заполучить этого ламассу любой ценой!"
 lepsius.532.t: "Поиски Ламассу"
 lepsius.532.d: "Наша экспедиция отправилась в опасное путешествие в курдский регион. Некоторые выступают за разделение из-за большей вероятности успеха."
 lepsius.532.g: "Нам не следует разделяться."
 lepsius.532.h: "Мы должны разделить экспедицию."
 lepsius.533.t: "Дары"
 lepsius.533.d: "Наша экспедиция встретилась с вождями кланов, чтобы получить разрешение на мирное пересечение территории и извлечение ламассу."
 lepsius.533.f: "Решение не разделять экспедицию оказалось неожиданным преимуществом: медлительность обоза означала, что вожди местного курдского клана нашли нас быстрее, чем мы ожидали. Вскоре руководителя экспедиции и военного атташе привели к патриархам, которые считаются настоящими правителями этой области. Они столкнулись с неприятным недоверием. По-видимому, у них остались неприятные воспоминания о последней археологической экспедиции. Также ожидается, что мы, как гости, принесём дары. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'предусмотрела', 'предусмотрел')] такую возможность, но, по-видимому, приобретённых материалов просто недостаточно, чтобы убедить многих вождей в наших намерениях."
 lepsius.533.g: "Мы предлагаем прекрасные ткани."
 lepsius.533.h: "Напомнить им об их чести и гостеприимстве."
 lepsius.533.i: "Продемонстрировать им жест покорности."
 lepsius.534.t: "Оскорбление"
 lepsius.534.d: "Попытка расположить к себе курдских патриархов полностью провалилась - вместо этого мы настроили их против себя. Эскалация ситуации угрожает всей нашей экспедиции!"
 lepsius.534.g: "Охрана!"
 lepsius.534.h: "Защищаться!"
 lepsius.534.i: "Бежать!"
 lepsius.535.t: "Члены экспедиции похищены курдами"
 lepsius.535.d: "После безуспешных поисков уменьшенная экспедиция с ужасом обнаруживает по возвращении, что некоторые члены оставшейся команды стали жертвами нападения курдов."
 lepsius.535.f: "Стратегия разделения экспедиции позже оказалась разрушительной ошибкой. По-видимому, курдское племя просто ждало добычу и воспользовалось возможностью, когда вооружённая часть под командованием военного атташе отделилась от остального конвоя. Поскольку большинство взятых ими материалов не представляли для грабителей большой ценности, они внезапно похитили добрую дюжину помощников в качестве заложников, очевидно, убеждённые, что смогут получить за них выкуп. Однако команда экспедиции решила не принимать такое предложение - это могло бы создать прецеденты на будущее. В то время как [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] настаивает на переговорах с курдскими лидерами, [SCOPE.sCharacter('lepsius_military_attache').GetFullName] настаивает на нападении на курдский лагерь и преподании грабителям урока."
 lepsius.535.g: "Попытаться договориться."
 lepsius.535.h: "Атаковать их!"
 lepsius.536.t: "Переговоры провалились!"
 lepsius.538.t: "Ночь печали"
 lepsius.538.d: "Поиски ламассу провалились."
 lepsius.538.f: "Команда экспедиции покидает курдский регион с пустыми руками. Как побитые собаки, они ночью пробираются через холмы, чтобы вернуться на старый маршрут. Потеря людей и материалов угнетает всех членов экспедиции. Вопрос о смысле всего путешествия оставляет за собой меланхолию и уныние."
 lepsius.538.g: "Мы ещё вернёмся..."
 lepsius.539.t: "Благородная смерть"
 lepsius.539.d: "Наш военный атташе, [SCOPE.sCharacter('lepsius_military_attache').GetFullName], пал в бою с курдами!"
 lepsius.539.f: "Это была ожесточённая битва, но наши мало обученные войска едва ли могли что-то сделать против закалённых и отважных курдских бойцов. Атташе приказал отступать и остался со своими людьми, чтобы прикрыть наш тыл. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'смогла', 'смог')] лишь бросить последний взгляд назад и увидеть, как он падает на землю, потерпев поражение. Он выиграл команде драгоценное время, чтобы добраться до безопасности, в то время как для него самого любая помощь пришла слишком поздно."
 lepsius.539.g: "Он отдал свою жизнь за наши."
 lepsius.540.t: "Ламассу"
 lepsius.540.d: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'смогла', 'смог')] убедить курдов в наших опасениях. Путь к возвращению Ламассу свободен."
 lepsius.540.d_victory: "Мы одержали военную победу над местным курдским племенем и расчистили себе путь к легендарному Ламассу!"
 lepsius.540.f: "Было нелегко убедить курдов в наших добрых намерениях, но полезные качества нашего руководителя экспедиции сделали это, казалось бы, невозможное предприятие успешным. Всего через несколько дней поисков мы нашли описанного ламассу у скалы. Величественное явление, излучающее сияние на всю долину! Наши археологи с радостью обнаружили, что колосс почти не повреждён. Уже ясно, что он станет главным экспонатом в нашей месопотамской коллекции."
 lepsius.540.f_victory: "После тяжёлой и ожесточённой битвы наш героический атташе [SCOPE.sCharacter('lepsius_military_attache').GetFullName] благодаря своим превосходным навыкам (и небольшой помощи своих солдат) сумел обратить врага в бегство. Впечатлённые этим уроком, курды больше не осмеливались стоять на пути возвращения ламассу. Всего через несколько дней поисков мы нашли описанного ламассу у скалы. Величественное явление, излучающее сияние на всю долину! Наши археологи с радостью обнаружили, что колосс почти не повреждён. Уже ясно, что он станет главным экспонатом в нашей месопотамской коллекции."
 lepsius.540.g: "Это великолепно!"
 lepsius.551.t: "Археологический несчастный случай"
 lepsius.551.d: "На месте раскопок произошёл ужасный несчастный случай - д-р [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'исчезла', 'исчез')]!"
 lepsius.551.g: "Что с [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'ней', 'ним')] случилось?"
 lepsius.552.t: "Лабиринт"
 lepsius.552.g: "Надеюсь, мы не встретим никаких быкоподобных мифических существ..."
 lepsius.553.t: "Лабиринт - снова"
 lepsius.553.g: "Чёртово дежавю!"
 lepsius.554.t: "Зал дельфинов"
 lepsius.554.g: "Зевс - идти налево."
 lepsius.554.h: "Деметра и Персефона - идти направо."
 lepsius.554.i: "Артемида - идти наверх."
 lepsius.554.j: "Посейдон - идти вниз."
 lepsius.555.t: "Зал Солнца"
 lepsius.555.d: "Конец коридора разветвляется на три прохода. На стене можно найти остатки фрески."
 lepsius.555.f: "На фреске [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] прежде всего замечает синий цвет. Небо занимает всю стену. Эос, богиня зари, стоит на востоке и доминирует на сцене. Напротив неё на западе - её муж Астрей, который ночью различим лишь как силуэт. Между ними в полдень сияет солнце."
 lepsius.555.g: "Эос - взять левый коридор."
 lepsius.555.h: "Астрей - взять правый коридор."
 lepsius.555.i: "Гелиос - взять средний коридор."
 lepsius.556.t: "Зал Женщин"
 lepsius.556.d: "Потерянный достигает комнаты, в конце которой четыре открытые двери. Перед ними стоят небольшие скульптуры четырёх женщин."
 lepsius.556.f: "Четыре скульптуры изображают женщин разного возраста и пола. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] не может определить, богини они или смертные. Их формы примитивны и ограничены самым необходимым. Их цвет давно выцвел; что их отличает, так это предметы в их руках. Первая держит клубок пряжи, из которого она вытягивает нить. Вторая держит зеркало и смотрит на себя. Третья держит змею. Последняя натягивает лук."
 lepsius.556.g: "Клубок пряжи - дверь I."
 lepsius.556.h: "Зеркало - дверь II."
 lepsius.556.i: "Змея - дверь III."
 lepsius.556.j: "Лук - дверь IV."
 lepsius.557.t: "Зал Островов"
 lepsius.557.g: "Родос."
 lepsius.557.h: "Делос."
 lepsius.557.i: "Эвбея."
 lepsius.557.j: "Наксос."
 lepsius.558.t: "Гнев Минотавра"
 lepsius.558.g: "Что только что произошло там, внизу?"
 lepsius.559.t: "Трагическая смерть [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting]"
 lepsius.559.d: "Д-ра [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] нашли без признаков жизни в [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'её', 'его')] квартире при загадочных обстоятельствах."
 lepsius.559.g: "Но было ли это действительно самоубийство?"
 lepsius.560.t: "Побег из лабиринта!"
 lepsius.560.d: "Наконец-то выбравшись из лабиринта, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] может рассказать своим коллегам о невероятном открытии. Чтобы доказать, что [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] не [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'сошла', 'сошёл')] с ума, [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'принесла', 'принёс')] с собой поразительное доказательство, найденное в глубинах лабиринта."
 lepsius.560.g: "Мог ли это быть... легендарный лабиринт Дедала?"
 lepsius.561.t: "Таинственная пирамида"
 lepsius.561.d: "Наша археологическая экспедиция обнаружила доселе не зафиксированную пирамиду, наполовину поглощённую юкатанской сельвой. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] уже [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'сталкивалась', 'сталкивался')] с преданиями об этом месте и [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'решила', 'решил')] попытаться войти..."
 lepsius.561.g: "У меня плохое предчувствие."
 lepsius.561.h: "Интересно. Ты иди первым."
 lepsius.562.t: "Загадка с глифами"
 lepsius.562.d: "В конце длинного сводчатого прохода стоит отделанная камнем панель с загадкой. Четыре утопленных картуша, на каждом из которых вырезано лицо великого бога майя, можно нажать; кладка буквально пропитана механическим устройством. Внизу - двустишие: «Я восхожу на востоке в огненной славе; в зените я пылаю, как нефрит; в сумерках я спускаюсь по дороге под землёй. Я веду счёт дням и усаживаю владык». Нужно нажать один картуш."
 lepsius.562.g: "Кинич Ахау (Владыка Солнца)."
 lepsius.562.h: "Чаак (Дождь/Гром)."
 lepsius.562.i: "Ицамнаах (Создатель/Небо)."
 lepsius.562.j: "Кукулькан (Пернатый Змей)."
 lepsius.563.t: "Идол"
 lepsius.563.d_right: "Наш археолог достигает цели предприятия; механизм поддаётся, и открывается святилище."
 lepsius.563.d_wrong: "Наш археолог проникает во внутреннюю камеру; однако лёгкость доступа противоречит здравому смыслу - наверняка устройство ещё не сказало своего последнего слова."
 lepsius.563.g: "Осторожно... аккуратно... давай..."
 lepsius.563.h: "Я знаю эту сцену - она никогда не кончается хорошо. Хватай чёртов артефакт и БЕГИ!"
 lepsius.564.t: "Это ловушка!"
 lepsius.564.g: "БЕГИ!"
 lepsius.564.h: "Я так и знал - чёрт!"
 lepsius.565.t_right: "Покидая пирамиду"
 lepsius.565.t_wrong: "Археологический соперник"
 lepsius.565.d_right: "Вопреки ожиданиям, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] выживает после срабатывания устройств внутри пирамиды и успешно забирает идола!"
 lepsius.565.g: "Чарли, заводи двигатель!"
 lepsius.565.h: "Терпеть не могу этого парня."
 lepsius.566.t: "Археологическое предложение"
 lepsius.566.d: "Частный археолог предлагает нам превосходный товар, который он ранее выхватил у иностранного конкурента."
 lepsius.566.f: "Частная экспедиция сообщила о пирамиде майя глубоко в сельве Юкатана. Её руководитель - увы, соотечественник - утверждает, что раздобыл священного идола, который, по странному стечению обстоятельств, только что был вырван из рук #tooltippable_name [PREV.GetCountry.GetAdjectiveNoFlag]ого#! археолога в федоре. Последний, как гласит история, вскоре после этого погиб в ожесточённой стычке с племенами ховитос. Какими бы тёмными ни были обстоятельства, этот предмет стал бы уникальной достопримечательностью для доколумбовой коллекции нашего музея - при условии, что мы заплатим запрашиваемую цену."
 lepsius.566.g: "Этот артефакт будет великолепно смотреться в нашей коллекции!"
 lepsius.566.h: "Мы не покупаем артефакты у безжалостных расхитителей гробниц."
 lepsius.581.t: "Возвращение в Затерянный мир"
 lepsius.581.g: "Он должен восстановить свою честь."
 lepsius.581.i: "Наши национальные интересы важнее уязвлённого эго ничтожеств."
 lepsius.582.t: "Отвергнутый исследователь возвращается с триумфом"
 lepsius.582.d: "К удивлению всего научного мира, [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'вернулась', 'вернулся')] с Юкатана - и у него есть доказательства его причудливых заявлений!"
 lepsius.582.g: "Он... был прав?"
 lepsius.583.t: "Отвергнутый исследователь исчезает на Юкатане"
 lepsius.584.t: "Вход в Затерянный мир"
 lepsius.584.d: "Спустя недели экспедиция достигла совершенно неизвестной долины. Похоже, [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] действительно [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'права', 'прав')] в своих фантастических утверждениях!"
 lepsius.584.g: "Невероятно!"
 lepsius.585.t: "Фотографирование динозавров"
 lepsius.585.d: "Новые технические возможности позволяют запечатлеть на камеру уникальную флору и фауну Затерянного мира."
 lepsius.585.f: "Это как смотреть в окно в мир миллионы лет назад: птерозавры правят небесами, гигантские бронтозавры сотрясают землю, а опасные хищники охотятся на неосторожную добычу. Растения здесь также совершенно отличаются от тех, что в других частях Юкатана. Научный спутник воспользовался моментом и сделал целую серию фотографий своей камерой, которые служат доказательством для родины. Учёные там, возможно, смогут ещё лучше реконструировать раннюю историю Земли."
 lepsius.585.g: "Пожалуйста, сделайте «Р-Р-Р-Р»!"
 lepsius.586.t: "Присутствие майя"
 lepsius.586.d: "После тщательного исследования долины руководитель экспедиции придумал рискованный план."
 lepsius.586.g: "Уникальная возможность!"
 lepsius.586.h: "Возьмём с собой только самые необходимые доказательства."
 lepsius.587.t: "Экспедиция заканчивается ужасной катастрофой"
 lepsius.587.d: "Экспедиция приняла наихудший из возможных оборотов после нападения хищников."
 lepsius.588.t: "Самоцвет Кукулькана"
 lepsius.588.d: "Несмотря ни на что, нашему руководителю экспедиции удалось заполучить легендарный Самоцвет Кукулькана!"
 lepsius.589.t: "Герои возвращаются из Затерянного мира"
 lepsius.589.f: "Какой день! После опасного и авантюрного путешествия на край света наша экспедиция смогла поделиться своими необычайными находками, чтобы доказать общественности, что [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] - не [SelectLocalization(SCOPE.sCharacter('lepsius_lostworld_leader').IsFemale, 'сумасшедшая', 'сумасшедший')], а на самом деле авторитетный учёный - и настоящий герой! Пресса и население в корне пересмотрели своё отношение, а также признали поддержку со стороны правительства правильным решением. Однако руководитель экспедиции пообещал сохранить в тайне истинное местоположение долины, чтобы сохранить там флору и фауну и снизить риск браконьерства."
 lepsius.701.t: "Иностранцы хотят украсть наше наследие"
 lepsius.701.d: "Сегодня #tooltippable_name [SCOPE.sCountry('lepsius_smuggler_country').GetAdjectiveNoFlag]ие#! археологи были пойманы при попытке незаконно вывезти из страны крупный артефакт. Как нам реагировать?"
 lepsius.701.f: "Иностранцы из [SCOPE.sCountry('lepsius_smuggler_country').GetAltNameNoFlag('RU_CL_VP')], которым мы предоставили лицензии на раскопки, были пойманы сегодня при попытке вывезти из страны чрезвычайно ценный артефакт. Согласно действующим законам, иностранные археологи обязаны передавать половину найденных артефактов стране, где проводятся раскопки. По-видимому, они пытались вывезти находку домой контрабандой, чтобы мы не смогли её осмотреть."
 lepsius.701.g: "Протестовать!"
 lepsius.701.h: "Что нам делать с этой старой тарабарщиной?"
 lepsius.702.t: "Дипломатический инцидент"
 lepsius.702.d: "К сожалению, власти в [SCOPE.sCountry('lepsius_protest_country').GetAltNameNoFlag('RU_CL_PP')] заметили нашу попытку ввезти ценный артефакт в нашу страну. Как нам реагировать?"
 lepsius.702.f: "С конца XIX века наиболее распространённой формой лицензии на археологические раскопки было разделение находок: копатель отдавал половину найденных артефактов стране, в которой он проводил раскопки. Власти осматривали найденные предметы и особенно следили за тем, чтобы самые ценные экспонаты не вывозились из страны. Однако снова и снова случалось, что некоторые страны настаивали на том, чтобы не отдавать раскопанный предмет; в других случаях стороны договаривались о дальнейших действиях."
 lepsius.702.g: "Кто нашёл, тот и забирает."
 lepsius.702.h: "Мы непременно найдём дружественное соглашение."
 lepsius.702.i: "Пожертвовать артефакт в знак нашей филантропии."
 lepsius.703.t: "Иностранцы смеются над нами!"
 lepsius.703.d: "Варвары из [SCOPE.sCountry('lepsius_smuggler_country').GetAltNameNoFlag('RU_CL_VP')] посмеялись над нашими претензиями. Они и не думали позволять нам получить какую-либо часть находки - и вывезли артефакт контрабандой на свою родину."
 lepsius.703.f: "Викторианская эпоха знает бесчисленное множество историй о незаконном вывозе артефактов из страны, особенно европейскими державами. В некоторых случаях музеи до сих пор предъявляют претензии о возмещении ущерба."
 lepsius.703.g: "Эта наглость невероятна!"
 lepsius.704.t: "Уступки предоставлены"
 lepsius.704.d: "[SCOPE.sCountry('lepsius_smuggler_country').GetName] идет нам навстречу и признает наши претензии обоснованными. Дипломатически и финансово они хотят предоставить нам уступки. Они также предлагают нам ряд других находок, чтобы побудить нас передать драгоценное сокровище."
 lepsius.704.f: "Во многих случаях предполагаемого расхищения гробниц или кражи европейские державы шли навстречу странам, где велись раскопки. После раскопок в Трое, например, Шлиману пришлось предстать перед Высокой Портой, потому что он вывез артефакты за границу контрабандой. Шлиман не только сдал несколько находок, но и заплатил в пять раз больше требуемой суммы. Конечно, такая процедура не была самым изящным способом ведения международных дел, но это всегда было лучше, чем полностью обманывать страну раскопок, и часто принималось странами-истцами как мировое соглашение."
 lepsius.704.g: "Рад, что они поняли свою ошибку."
 lepsius.706.t: "Крупный артефакт прибыл!"
 lepsius.706.d: "С небольшим опозданием ценный артефакт наконец-то прибыл сегодня в музей. Директор уже выбрал для него совершенно особое место!"
 lepsius.706.f: "Крупные артефакты - гордость каждой выставки и музея. Счастлива страна, которая может назвать такие жемчужины своими!"
 lepsius.711.t: "Маска Тутанхамона"
 lepsius.711.d: "Обнаружив затерянную гробницу Тутанхамона, наши археологи смогли извлечь совершенно особый артефакт: маску фараона!"
 lepsius.711.f: "Маска Тутанхамона - это золотая маска древнеегипетского фараона 18-й династии Тутанхамона. Посмертная маска является одним из самых известных произведений искусства в мире и выдающимся символом Древнего Египта. Изображая Осириса, египетского бога загробной жизни, она имеет высоту 54 сантиметра, весит более 10 килограммов или 321,5 тройских унций и украшена полудрагоценными камнями. На плечах маски иероглифами начертано древнее заклинание из Книги мёртвых. Лицо представляет собой стандартное изображение фараона, и то же самое изображение было найдено копателями в других местах гробницы, в частности, на статуях-хранителях. По словам египтолога Николаса Ривза, маска - это «не только квинтэссенция образа из гробницы Тутанхамона, это, пожалуй, самый известный объект из самого Древнего Египта»."
 lepsius.711.g: "Это будет лучший экспонат в нашей коллекции."
 lepsius.711.h: "Мы должны попытаться безопасно вывезти артефакт из страны..."
 lepsius.712.t: "Бюст Нефертити"
 lepsius.712.d: "Во время наших раскопок в Египте наши археологи нашли поистине выдающийся артефакт: бюст Нефертити!"
 lepsius.712.f: "Бюст Нефертити - это раскрашенный бюст из известняка, покрытого стукко, изображающий Нефертити, Великую царскую жену египетского фараона Эхнатона. Это одно из самых копируемых произведений Древнего Египта. Нефертити стала одной из самых известных женщин древнего мира и иконой женской красоты. О Нефертити известно немного. Теории предполагают, что она могла быть египетской царевной по рождению, иностранной принцессой или дочерью высокого правительственного чиновника по имени Эйе, который стал фараоном после Тутанхамона. Она могла быть соправительницей Египта с Эхнатоном, который правил с 1352 г. до н.э. по 1336 г. до н.э. На бюсте нет никаких надписей, но его можно с уверенностью идентифицировать как Нефертити по характерной короне, которую она носит на других сохранившихся изображениях."
 lepsius.713.t: "Палетка Нармера"
 lepsius.713.d: "Наши археологи во время своих раскопок обнаружили необычный артефакт: палетку Нармера!"
 lepsius.713.f: "Палетка Нармера, также известная как Великая иераконпольская палетка или палетка Нармера, является значительной египетской археологической находкой, датируемой примерно 31 веком до н.э., и относится, по крайней мере номинально, к категории косметических палеток. Она содержит одни из самых ранних когда-либо найденных иероглифических надписей. Считается, что на табличке изображено объединение Верхнего и Нижнего Египта при царе Нармере. Вместе с навершием булавы Скорпиона и навершиями булавы Нармера, также найденными вместе в главном хранилище в Нехене, палетка Нармера представляет одно из самых ранних известных изображений египетского царя. Палетка демонстрирует многие классические условности древнеегипетского искусства, которые, должно быть, уже были формализованы ко времени её создания. Египтолог Боб Брайер назвал палетку Нармера «первым историческим документом в мире»."
 lepsius.722.t: "Маска Саргона"
 lepsius.722.d: "Во время раскопок в Ниневии в ходе открытия Висячих садов наши археологи нашли замечательный артефакт: маску Саргона!"
 lepsius.722.f: "Бронзовая голова царя в шлеме-парике древних шумерских правителей - это, вероятно, сам Саргон. Хотя инкрустированные глаза отсутствуют, а в остальном она слегка повреждена, эта голова по праву считается одним из величайших шедевров древнего искусства. Голова представляет собой бронзовый бюст в натуральную величину, найденный в Ниневии. Замысловатые завитки и узоры бороды, а также сложная причёска указывают на царственность, власть и богатство идеального мужчины в обществе. Помимо эстетических качеств, этот предмет впечатляет тем, что является самым ранним известным полым литьём, выполненным по методу выплавляемого воска. На левой стороне лица и глазу есть преднамеренные повреждения, что указывает на то, что бюст был намеренно повреждён в более поздний период для демонстрации политического иконоборчества."
 lepsius.723.t: "Шлем Мескаламдуга"
 lepsius.723.d: "Во время наших раскопок в Вавилонии наши археологи наткнулись на особую находку: шлем Мескаламдуга!"
 lepsius.723.f: "Шлем Мескаламдуга - одна из самых известных находок из царских гробниц Ура. Мескаламдуг был ранним шумерским правителем Первой династии Ура в XXVI веке до н.э. Шлем был выбит из золотого листа и поэтому вряд ли подходил в качестве защитной одежды для войны. Возможно, он больше использовался в церемониальной/культовой сфере. Помимо проработанных по бокам ушей, работа в целом больше похожа на парик, так как её тонкие гравюры имитируют волнистую причёску. Сбоку, с другой стороны, есть локоны, которые отделены от волнистой причёски косой вокруг головы. Коса завязана в узел на затылке. На краю шлема есть ряд небольших отверстий, к которым, вероятно, крепилась подкладка."
 lepsius.731.t: "Маска Агамемнона"
 lepsius.731.d: "После обнаружения сокровищ в Микенах наше внимание привлёк один артефакт: золотая погребальная маска, так называемая Маска Агамемнона!"
 lepsius.731.f: "«Маска Агамемнона» - это название, данное золотой погребальной маске, обнаруженной на древнегреческом объекте Микены. Немецкий археолог Генрих Шлиман, обнаруживший артефакт в 1876 году, полагал, что нашёл тело микенского царя Агамемнона, предводителя ахейцев в гомеровском эпосе о Троянской войне «Илиада», но современные археологические исследования предполагают, что маска датируется примерно 1600 годом до н.э., что на 300-400 лет предшествует периоду легендарной Троянской войны. Маска изготовлена из жёлто-красноватого, прочного золотого листа и имеет высоту около 26 см и ширину 26,5 см. На листе металла выбито лицо бородатого мужчины с усами и бровями. Рядом с каждой мочкой уха есть отверстие, которое, вероятно, использовалось для крепления. Кэти Гир описала маску как «Мону Лизу доисторического периода»."
 lepsius.732.t: "Фестский диск"
 lepsius.732.d: "Раскопки на Крите выявили своеобразный и таинственный артефакт: Фестский диск!"
 lepsius.732.f: "Фестский диск - это диск из обожжённой глины из минойского дворца в Фесте на острове Крит, возможно, датируемый средним или поздним минойским бронзовым веком (второе тысячелетие до н.э.). Диск имеет диаметр около 15 см и покрыт с обеих сторон спиралью из оттиснутых символов. Его назначение и первоначальное место изготовления остаются спорными. Диск был обнаружен в 1908 году итальянским археологом Луиджи Пернье в минойском дворцовом комплексе Фест и содержит 241 знак, состоящий из 45 различных символов, которые, по-видимому, были сделаны путём вдавливания иероглифических «печатей» в диск из мягкой глины, в последовательности по часовой стрелке, спирально идущей к центру диска. Фестский диск захватил воображение любителей и профессиональных археологов, и было предпринято много попыток расшифровать код, стоящий за знаками диска."
 lepsius.733.t: "Богиня со змеями"
 lepsius.733.d: "Минойский артефакт особого художественного и исторического значения попал в наши руки во время раскопок на Крите: Богиня со змеями!"
 lepsius.733.f: "Две минойские статуэтки богини со змеями были раскопаны в 1903 году в минойском дворце в Кноссе на греческом острове Крит. Кносские статуэтки, обе значительно неполные, датируются почти концом неодворцового периода минойской цивилизации, около 1600 года до н.э. Именно Эванс назвал большую из своей пары статуэток «Богиней со змеями», а меньшую - «Жрицей змей»; с тех пор ведутся споры о том, был ли Эванс прав, или обе статуэтки изображают жриц, или обе изображают одно и то же божество или разных божеств. Сочетание сложной одежды, оставляющей грудь полностью обнажённой, и «укрощения змей» привлекло значительное внимание общественности, не говоря уже о различных подделках, и меньшая фигурка, в частности, остаётся популярной иконой минойского искусства и религии, теперь также обычно называемой «Богиней со змеями»."
 lepsius.771.t: "Погребальное сокровище Пакаля"
 lepsius.771.d: "Обнаружив гробницу царя Пакаля, мы смогли извлечь несколько особых артефактов: погребальные сокровища Пакаля!"
 lepsius.771.f: "Примечательно, что майя, не имевшие металлических инструментов, создавали множество предметов из очень толстого и плотного материала, нефрита (жадеита), в частности, всевозможные элементы (царской) одежды, такие как поясные бляхи - или кельты - ушные катушки, подвески, а также маски. Кельты (т.е. плоские, кельтовидные украшения) иногда гравировались со стелоподобным изображением царя (например, раннеклассическая «Лейденская пластина»). Самым известным примером маски, вероятно, является посмертная маска царя Паленке Пакаля, покрытая мраморными пластинами неправильной формы и с глазами из перламутра и обсидиана. Пакаль Великий был ахавом города-государства майя Паленке в позднеклассический период доколумбовой мезоамериканской хронологии. Он взошёл на трон в июле 615 года и правил до своей смерти. Он правил 68 лет. "
 lepsius.772.t: "Лейденская пластина"
 lepsius.772.d: "Во время раскопок в Юкатане в наши руки попал доколумбовый артефакт особой художественной и исторической значимости: Лейденская пластина!"
 lepsius.772.f: "Лейденская пластина - важный артефакт майя, вырезанный из бледно-зелёного жадеита и служивший поясной подвеской. Обнаруженная в 1864 году близ Пуэрто-Барриоса в Гватемале, она считается одним из древнейших датированных предметов цивилизации майя. На обеих сторонах пластины нанесены тонкие резные изображения. На лицевой стороне показан владыка майя, которого часто отождествляют с тикальским Сиях-Чан-Кавилем I: он стоит в профиль и попирает связанного пленника. На обороте указана дата Длинного счёта (8.14.3.1.12), соответствующая сентябрю 320 года н. э. и отмечающая восшествие правителя на престол. Как первичный источник по истории раннеклассических майя, пластина даёт важнейшие сведения о ранней царской иконографии и эпиграфике. Названная по городу, где она хранится, сегодня она находится в Национальном музее этнологии в Лейдене, Нидерланды."
 lepsius.721.t: "Эпос о Гильгамеше"
 lepsius.721.d: "Нашим ассириологам удалось реконструировать основные черты «Эпоса о Гильгамеше» на основе найденных клинописных табличек."
 lepsius.721.f: "Гильгамеш поднялся, толкуя сны,\n обращаясь к своей матери.\n «Мать моя! Ночью моей\n я, исполнившись сил, бродил\n в разгар знамений.\n И вышли звёзды на небесах,\n Словно ... небесный он пал на меня.\n Я нёс его, но он был слишком тяжёл для меня.\n Он нёс сеть, но я не мог её нести.\n Я созвал землю собраться к нему,\n чтобы герои целовали его стопы.\n Он встал передо мной,\n и они встали напротив меня,\n я поднял его и унёс к тебе»."
 lepsius.721.g: "Древнейший эпос в истории человечества..."
 lepsius.741.t: "Клад Приама"
 lepsius.741.d: "После своего революционного открытия Трои Генрих Шлиман ищет подходящий музей, которому он мог бы подарить клад Приама."
 lepsius.741.f: "Хотя Шлиман потряс экспертов своими раскопками и пользовался популярностью по всей Европе, он столкнулся с сопротивлением со стороны экспертов, в частности, из-за своих методов исследования. Оставался ряд оговорок. Например, историки и археологи сомневались, что так называемый Клад Приама действительно мог происходить из слоя, соответствующего гомеровской Трое. Кроме того, когда Шлиман решил подарить свои находки музею, он не получил той реакции, которую ожидал; старые покровители отнеслись к этому пренебрежительно. Известные музеи, такие как Эрмитаж или Лувр, также отказались. Первооткрыватель временно выставил сокровище в Лондоне, пока в 1881 году не решил завещать находку «немецкому народу для вечного владения и хранения в столице Рейха»."
 lepsius.741.g: "...и я знаю идеальное место для этого сокровища!"
 lepsius.743.t: "Шлиман дарит клад Приама"
 lepsius.743.d: "После долгих раздумий [SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_new_archaeologist_scope').IsFemale, 'решила', 'решил')] доверить клад Приама нашему музею!"
 lepsius.743.g: "Мы устроим для него зал - и назовём его в честь Шлимана!"
 lepsius.743.h: "[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetLastName] - вот настоящее сокровище!"
 lepsius.744.t: "Шлиман дарит клад Приама музею"
 lepsius.744.d: "Сегодня мы, к сожалению, получили известие, что Генрих Шлиман завещал клад Приама музею. К сожалению, не нашему."
 lepsius.744.g: "Как он мог нас так предать?"
 lepsius.801.t: "Место раскопок"
 lepsius.801.d: "На какое место раскопок нам следует отправить нашего археолога?"
 lepsius.801.f: "Когда мистер Кофекейк понял, что впечатляюще реалистично выглядящая карта сокровищ на самом деле из автомата с жевательной резинкой, ему пришлось изменить свои археологические планы путешествий невиданным ранее образом."
 lepsius.801.g: "Верхний Египет."
 lepsius.801.h: "Нижний Египет."
 lepsius.801.i: "Вавилония."
 lepsius.801.j: "Ассирия."
 lepsius.801.k: "Арголида."
 lepsius.801.l: "Юкатан."
 lepsius.801.m: "Неважно."
 lepsius.802.t: "Археолог"
 lepsius.802.d: "Какого археолога нам следует отправить для создания нового места раскопок?"
 lepsius.802.f: "В большинстве стран есть только один археолог, который часто также занимает должность ведущего научного сотрудника; однако, если у нации - по какой-либо причине - есть более опытные археологи, здесь есть возможность выбрать второго человека."
 lepsius.802.g: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]"
 lepsius.802.h: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName]"
 lepsius.803.t: "Отправление"
 lepsius.803.g: "Удачи!"
 lepsius.811.t_vok: "Гробница знатного вельможи"
 lepsius.811.t_pyr: "Святилище Бастет"
 lepsius.811.t_bab: "Шумерская гробница"
 lepsius.811.t_ass: "Ассирийское святилище"
 lepsius.811.t_arg: "Микенское святилище"
 lepsius.811.t_yuc: "Склад"
 lepsius.811.d: "Наш археолог основал посредственное место для раскопок."
 lepsius.811.f_pyr: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_excavation_leader').IsFemale, 'нашла', 'нашёл')] руины древнеегипетского храмового комплекса в болотистой части дельты Нижнего Египта - по крайней мере, так казалось сначала. К сожалению, находка оказалась гораздо скромнее: предполагаемый храм был скорее святилищем, посвящённым богине-кошке Бастет. Тем не менее, наши исследователи начали раскопки - в конце концов, с чего-то нужно начинать."
 lepsius.811.f_bab: "Шумеры, возможно, являются древнейшей цивилизацией в мире. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] в Вавилонии случайно [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_excavation_leader').IsFemale, 'обнаружила', 'обнаружил')] гробницу древнего народа, который, как говорят, изобрёл колесо и письменность. К сожалению, через некоторое время выяснилось, что большинство артефактов были украдены или уничтожены. Археологи приступили к работе."
 lepsius.811.f_arg: ""
 lepsius.811.f_yuc: "К сожалению, наша раскопочная группа на Юкатане не добилась больших успехов в поисках остатков культуры майя. В боковой долине археологи нашли старый склад, который до этого предлагал только разбитую керамику. В телеграмме [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'подтвердила', 'подтвердил')], что в будущем можно ожидать большего."
 lepsius.811.g: "Посредственное место, но оно наше..."
 lepsius.812.t_vok: "Гробница принца"
 lepsius.812.t_pyr: "Храм Ра"
 lepsius.812.t_bab: "Зиккурат Луны"
 lepsius.812.t_ass: "Ассирийская крепость"
 lepsius.812.t_arg: "Камерная гробница"
 lepsius.812.t_yuc: "Обсерватория майя"
 lepsius.812.d: "Наш археолог основал хорошее место для раскопок."
 lepsius.812.f_vok: "Хорошие новости из Египта! После многих трудностей [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'обнаружила', 'обнаружил')] ранее неизвестную гробницу. По предварительной информации, это место последнего упокоения древнеегипетского принца. Хотя в ней отсутствуют некоторые артефакты, которые могли быть украдены и проданы местными жителями в прошлом, в остальном это хорошая отправная точка для дальнейших археологических раскопок."
 lepsius.812.f_pyr: "Под ясным египетским небом последний проблеск электрума вспыхивает на вершине обелиска на горизонте - и отмечает вход в храм бога солнца Ра! [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] немедленно [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'обезопасила', 'обезопасил')] место и [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'начала', 'начал')] раскопки."
 lepsius.812.f_ass: "До сих пор Библия рисовала образ ассирийцев в довольно негативном свете среди иудеев и христиан. Известные как воинственный народ, который неоднократно досаждал израильтянам и в конечном итоге уничтожил северное царство, они вошли в историю как крупная военная держава. Хотя не вся эта негативная пропаганда является правдой, открытие ассирийской крепости показало, что древние правители Ближнего Востока обладали впечатляющей военной культурой."
 lepsius.812.f_arg: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] недавно [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'нашла', 'нашёл')] микенскую камерную гробницу. Эта форма погребальной архитектуры использовалась в позднебронзовом веке в районах, находившихся под культурным влиянием Эгейского моря. Гробницы высечены в скале и имеют трёхчастную структуру (камера, стомион и дромос), часто с дополнительными нишами и боковыми камерами, в которых производились первичные или вторичные захоронения. Директор нашего музея поставил бутылку шампанского в холодильник."
 lepsius.812.f_yuc: "Майя проявляли живой интерес к астрономии. По-видимому, они обладали уникальными знаниями о небесных явлениях, которые во многих отношениях превосходили знания древних греков. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'обнаружила', 'обнаружил')] в джунглях здание, на вершине которого находится винтовая лестница в форме змеи. Наши исследователи с нетерпением ждут, какие знания и артефакты принесёт это открытие."
 lepsius.812.g: "Прекрасное место для раскопок."
 lepsius.813.t_vok: "Гробница царицы"
 lepsius.813.t_pyr: "Неизвестная пирамида"
 lepsius.813.t_bab: "Вавилонские ворота и стены"
 lepsius.813.t_ass: "Ассирийский дворец"
 lepsius.813.t_arg: "Микенская цитадель"
 lepsius.813.t_yuc: "Пирамида майя"
 lepsius.813.d: "Наш археолог основал превосходное место для раскопок."
 lepsius.813.f_pyr: "Когда сегодня пришла последняя телеграмма от [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], наши исследователи сначала не хотели в это верить: по-видимому, наши археологи вновь открыли ранее неизвестную пирамиду в египетской пустыне. Хотя местные жители уже говорили об объекте, полностью покрытом песком, они не нашли входа. Наша нация может пополнить свою коллекцию многочисленными находками из Древнего царства!"
 lepsius.813.f_arg: "Действительно ли древние города строили полубоги или циклопы? Грозная микенская цитадель возвышается над греческими холмами, а наша экспедиционная команда сообщает об успехе за успехом через неделю после открытия. Поражает не только архитектура, но и находки из глины и золота, обещающие новые открытия в будущем. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] даже [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'сказала', 'сказал')], что было найдено кольцо Менелая."
 lepsius.813.f_yuc: "Когда через несколько часов дождь утих и от ливня осталась лишь лёгкая пелена тумана, окутавшая верхушки деревьев джунглей, экспедиция увидела великолепную картину. Над верхушками деревьев в небо взмывали бесчисленные ступени, покрытые подлеском и лианами: могучая ступенчатая пирамида занимала панораму, посреди дикой природы, населённой птицами и тапирами. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] немедленно [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'обезопасила', 'обезопасил')] некоторые из первых находок и [SelectLocalization(SCOPE.sCharacter('lepsius_archaeological_expedition_leader').IsFemale, 'отправила', 'отправил')] их в музей экспресс-доставкой."
 lepsius.813.g: "Это место идеально!"
 lepsius.190.t: "Археологическая группа отозвана"
 lepsius.190.d: "С какого археологического объекта мы должны отозвать нашу команду?"
 lepsius.190.f: "Кто-то, должно быть, оклеветал Генри Дж., потому что однажды утром его без всякой вины отозвали с места раскопок."
 lepsius.190.g: "Верхний Египет"
 lepsius.190.h: "Нижний Египет"
 lepsius.190.i: "Вавилония"
 lepsius.190.j: "Ассирия"
 lepsius.190.k: "Арголида"
 lepsius.190.l: "Крит"
 lepsius.190.m: "Юкатан"
 lepsius.190.n: "Перу"
 lepsius.190.o: "Продолжать."
 lepsius.901.t: "Гробница Тутанхамона"
 lepsius.901.d: "Это сенсационный день для мировой науки. Мы сделали великое открытие: гробница Тутанхамона была обнаружена сегодня археологами #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFlag]ой#! страны!"
 lepsius.901.f: "Медленно, отчаянно медленно, казалось нам, пока мы наблюдали, убирались остатки завала в проходе, который загромождал нижнюю часть дверного проёма, пока наконец перед нами не предстала вся дверь. Настал решающий момент. Дрожащими руками я проделал крошечную брешь в верхнем левом углу. Темнота и пустота, насколько мог достать железный щуп, показали, что всё, что лежало за ней, было пустым, а не заполнено, как только что расчищенный нами проход. В качестве меры предосторожности были применены свечи для проверки на возможные ядовитые газы, а затем, немного расширив отверстие, я вставил свечу и заглянул внутрь. Сначала я ничего не мог разглядеть, горячий воздух, выходящий из камеры, заставлял пламя свечи мерцать, но вскоре, когда мои глаза привыкли к свету, из тумана медленно проступили детали комнаты внутри: странные животные, статуи и золото - повсюду блеск золота. На мгновение - вечность, должно быть, показалось это остальным, стоявшим рядом, - я онемел от изумления, и когда мой коллега, не в силах больше выносить напряжение, с тревогой спросил: «Вы что-нибудь видите?», всё, что я смог выдавить из себя, было: «Да, чудесные вещи»."
 lepsius.901.g: "Действительно, чудесные вещи."
 lepsius.902.d: "[SCOPE.sCountry('lepsius_tut_discoverer').GetName] дела[SCOPE.sCountry('lepsius_tut_discoverer').GetAltNameNoFormatting('RU_CL_END_T')] великое открытие: сегодня была обнаружена гробница Тутанхамона!"
 lepsius.902.f: ""
 lepsius.902.g: "Надеюсь, их поразит проклятие фараона."
 lepsius.911.t: "Корабль Хуфу"
 lepsius.911.d: "Это сенсационный день для мировой науки. Мы сделали великое открытие: корабль Хуфу был обнаружен сегодня археологами #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFlag]ой#! страны!"
 lepsius.911.f: "Он глубоко вздохнул, закрыл глаза, чтобы привыкнуть к полумраку раскопа, а затем медленно открыл их. Уверенной рукой он снова начал резать. Он работал быстро, так как обшивка поддалась и раскрошилась. Он сделал отверстие достаточно глубоким, чтобы повернуть своё тело в другое положение вниз, и работал всего в нескольких дюймах от своей головы. Он продолжал резать и резать. Время ничего не значило. Он не осознавал, что устал или что лежит в вертикальном положении. Он щупал. Он резал. Внезапно и чудесным образом его руки прошли в пустоту. Он лежал как в трансе. Он закрыл глаза. Почти незаметный запах проник в его ноздри. Он не мог определить, что это было. Он был почти сладким. Это не мог быть ладан. Или мог? Может быть, это был тот самый запах истории? Тогда он понял. Это был кедр! Его глаза всё ещё были закрыты. Он глубоко вздохнул и убедился, что это действительно кедр. Он почувствовал такое удовлетворение, какого никогда раньше не испытывал. Счастье покалывало его. Его глаза всё ещё были закрыты. Он прошептал благодарственную молитву Богу. Его пытливый ум снова начал работать. Если он действительно чувствовал запах кедра от Солнечной ладьи внизу, это не означало, что белый термит не потрудился. Возможно, драгоценное дерево было съедено ордами белых термитов. «Это лодка!», - закричал он. «Это лодка!»"
 lepsius.911.g: "Она действительно всё ещё может плыть по воде спустя более 4000 лет?"
 lepsius.912.d: "[SCOPE.sCountry('lepsius_ship_discoverer').GetName] дела[SCOPE.sCountry('lepsius_ship_discoverer').GetAltNameNoFormatting('RU_CL_END_T')] великое открытие: сегодня была обнаружена гробница корабля Хуфу!"
 lepsius.912.f: ""
 lepsius.912.g: "Безусловно, важная часть их нового флота."
 lepsius.921.t: "Вавилонская башня"
 lepsius.921.d: "Это сенсационный день для мировой науки. Мы сделали великое открытие: Вавилонская башня была обнаружена сегодня археологами #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFlag]ой#! страны!"
 lepsius.921.f: "За этим хребтом простирается довольно значительная и удивительно однородная равнина к холму Амран ибн Али, через которую по диагонали проходит дорога из нашей деревни Квейреш в Хиллу. Она называется «Сахн», буквально: сковорода, но в сегодняшней речи это означает свободное пространство, окружённое аркадами, которое проходит вокруг больших паломнических мечетей, таких как в Кербеле или Неджефе. Но наш «Сахн» - это не что иное, как современный вид древнего священного участка, на котором возвышался зиккурат Этеменанки, «Краеугольный камень неба и земли», вавилонская башня, окружённая кольцевой стеной, к которой примыкали всевозможные здания, связанные с культом. Мы не знаем полной высоты башни. Но Набопаласар, как и Навуходоносор, делает на них особый акцент в своей цилиндрической надписи из Этеменанки. Первый говорит: «В то время Мардук повелел мне... башню вавилонскую, которая была ослаблена и разрушена в дни до меня, установить её основание прочно на груди преисподней, в то время как её вершина стремится к небу»."
 lepsius.921.g: "Так что Библия всё-таки не ошиблась."
 lepsius.922.d: "[SCOPE.sCountry('lepsius_babylon_discoverer').GetName] дела[SCOPE.sCountry('lepsius_babylon_discoverer').GetAltNameNoFormatting('RU_CL_END_T')] великое открытие: сегодня была обнаружена Вавилонская башня!"
 lepsius.922.f: ""
 lepsius.922.g: "Можно только пожелать им такого же замешательства, как и у строителей башни."
 lepsius.931.t: "Сады Сеннахириба"
 lepsius.931.d: "Это сенсационный день для мировой науки. Мы сделали великое открытие: Висячие сады были обнаружены сегодня археологами #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFlag]ой#! страны!"
 lepsius.931.f: "Были ли Висячие сады действительно в Вавилоне? Согласно последнему открытию, это утверждение оказалось ложным. Действительно, сравнивая исторические источники, наши самые способные археологи обнаружили, что очень немногие источники помещают легендарные Сады в Вавилон. Кроме того, именно ассирийцы, а не вавилоняне, были известны своими сложными техниками садоводства. Рельефы свидетельствуют о обширных садах на нескольких этажах. Археологическая команда воспользовалась этим как поводом для проведения пробных раскопок у большого дворца ассирийского царя Сеннахириба в той части, которая считалась малоисследованной. Вывод ясен: затерянное чудо света явно находилось в Ниневии. Таким образом, наши археологи извлекают пользу не только из открытия, но и из разъяснения тайны, которая длилась два с половиной тысячелетия."
 lepsius.931.g: "Так значит, это на самом деле были Висячие сады Ниневии?"
 lepsius.932.d: "[SCOPE.sCountry('lepsius_semiramis_discoverer').GetName] дела[SCOPE.sCountry('lepsius_semiramis_discoverer').GetAltNameNoFormatting('RU_CL_END_T')] великое открытие: сегодня были обнаружены Висячие сады!"
 lepsius.932.f: ""
 lepsius.932.g: "Здесь почти наверняка какая-то путаница."
 lepsius.941.t: "Сокровища Микен"
 lepsius.941.d: "Это сенсационный день для мировой науки. Мы сделали великое открытие: сокровища Микен были обнаружены сегодня археологами #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFlag]ой#! страны!"
 lepsius.941.f: "Безусловно, самой важной и стоящей раскопкой была та, что находилась прямо за Львиными воротами. Во время своих пробных раскопок в 1874 году Шлиман уже установил, что скала в самой низкой точке замка была покрыта самым толстым слоем щебня. Согласно словам Павсания, он считал вероятным, что гробницы правящей семьи находились внутри замковой стены, и ему пришлось вспомнить эти слова, когда вскоре после начала работ на глубине от 3 до 5 метров были найдены три надгробия с древними рельефами. Когда камни были убраны, говорит Шлиман, оказалось, что они стояли не на земле, как предполагалось ранее, а на земле, заполнявшей шахты, которые были пробиты вертикально в скале для устройства гробниц. Они копали в пяти таких шахтах, и после того, как на определённой глубине были убраны слои камней, служившие алтарями после захоронения жертв, топор ударил в землю на глубине около 6 метров. На дне лежали пятнадцать трупов, разбросанных по пяти гробницам, украшенных богатыми, можно сказать, сказочными, золотыми украшениями. Золотые маски, имитирующие черты умерших, лежали на лицах мужчин, золотые пластины, богато украшенные спиралями, покрывали их грудь, одежды женщин были увешаны золотом."
 lepsius.941.g: "Агамемнон, это ты?"
 lepsius.942.d: "[SCOPE.sCountry('lepsius_mycenae_discoverer').GetName] дела[SCOPE.sCountry('lepsius_mycenae_discoverer').GetAltNameNoFormatting('RU_CL_END_T')] великое открытие: сегодня были обнаружены сокровища Микен!"
 lepsius.942.f: ""
 lepsius.942.g: "В случае сомнений, эти мошенники сами спрятали там эти «сокровища»."
 lepsius.961.t: "Наследие Пакаля"
 lepsius.961.d: "Это сенсационный день для мировой науки. Мы сделали великое открытие: гробница и погребальные сокровища Пакаля были обнаружены сегодня археологами #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFlag]ой#! страны!"
 lepsius.961.f: "Моим первым впечатлением была мозаика из зелёного, красного и белого. Затем она распалась на детали - зелёные нефритовые украшения, красные окрашенные зубы и кости, и фрагменты маски. Я смотрел на посмертное лицо того, для кого была построена вся эта грандиозная работа - крипта, скульптура, лестница, великая пирамида с венчающим её храмом - бренные останки одного из величайших людей Паленке! Это был саркофаг, первый из когда-либо найденных в пирамиде майя!"
 lepsius.961.g: "Гробница Тутанхамона Южной Америки!"
 lepsius.962.d: "[SCOPE.sCountry('lepsius_pakal_discoverer').GetName] дела[SCOPE.sCountry('lepsius_pakal_discovere').GetAltNameNoFormatting('RU_CL_END_T')] великое открытие: сегодня были обнаружены гробница и погребальные сокровища Пакаля!"
 lepsius.962.f: ""
 lepsius.962.g: "Маска и так была довольно уродливой."
 lepsius_local_excavation_modifier: "Местные раскопки"
 lepsius_local_excavation_state_modifier: "Местные раскопки"
 lepsius_local_excavation_cost_modifier: "Стоимость местных раскопок"
 lepsius.1101.t: "Археологический конгресс: Исход"
 lepsius.1101.d: "Наша нация провела все необходимые приготовления для проведения следующего археологического конгресса. В центре внимания будет роль Библии в археологии и исследовании древности. Приглашения будут разосланы всем крупным археологам мира. Председательствовать на сессии будет профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]."
 lepsius.1101.f: "Ещё в римские времена недостаток источников о Древнем Египте приводил к тому, что исторические труды основывались на вторичных источниках, таких как Геродот. Эта тенденция продолжилась и в Средние века. Библия давала подсказки и долгое время считалась авторитетным источником по истории Ближнего Востока - в том числе и потому, что других традиций просто не было. С расшифровкой иероглифов и началом современной египтологии как сторонники, так и критики Библии пытались представить доказательства ложности или истинности библейских рассказов. С началом исследования древней Вавилонии эта тенденция ещё больше усилилась. Примером спора об историчности библейских историй был Исход - выход народа Израиля из Египта, - для которого не было никаких доказательств в египетских источниках."
 lepsius.1101.g: "Археологический мир должен быть нашим гостем."
 lepsius.1102.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName] пригласил[SCOPE.sCountry('lepsius_congress_host_country').GetAltNameNoFormatting('RU_CL_END_FEM')] нас на археологический конгресс. Темой будет историчность Библии на примере Исхода. Наш археолог, профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName], [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'получила', 'получил')] тёплое приглашение."
 lepsius.1102.g: "Вечные споры о том, у кого самые лучшие кожаные куртки..."
 lepsius.1103.t_laughed: "Насмешки археологического общества"
 lepsius.1103.t_respected: "Уверенное выступление"
 lepsius.1103.t_lauded: "Восхищение и поздравления"
 lepsius.1103.d_laughed: "Выступление профессора [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] было встречено с насмешкой. [ROOT.GetCountry.GetNameNoFlag] не пользуется репутацией страны, достигшей чего-либо выдающегося в области египтологии. За закрытыми дверями явно отпускали шутки."
 lepsius.1103.d_respected: "Перед началом археологического конгресса нашего археолога тепло встретили и обменялись обычными любезностями. [ROOT.GetCountry.GetNameNoFlag] име[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_T')] признанную репутацию в исследовательском мире."
 lepsius.1103.d_lauded: "Прибытие профессора [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] было встречено с большой радостью. [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'Она', 'Он')] считается одним из самых ожидаемых гостей. Вокруг [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'неё', 'него')] быстро собралась толпа, поскольку за [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')] закрепилась репутация первопроходца в области египтологии."
 lepsius.1103.f_laughed: "«Почему у археологов [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] нет девушек?\n\nПотому что у них худшие методы знакомства!»"
 lepsius.1103.f_respected: "По прибытии профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] провёл несколько приятных бесед с коллегами о в основном скучных руинах, которые не-учёный счёл бы ещё более скучными скальными образованиями."
 lepsius.1103.f_lauded: "Профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName], казалось, был почти ошеломлён натиском. Столько коллег искали с ним разговора и хотели извлечь пользу из его экспедиций и опыта. Некоторые даже убеждали его прочитать частную лекцию."
 lepsius.1103.g: "Как неловко!"
 lepsius.1103.h: "Наконец-то среди единомышленников."
 lepsius.1103.i: "Мы - ведущая археологическая нация!"
 lepsius.1104.t: "Исход: историческая ценность или вымысел?"
 lepsius.1104.d: "Тематическая конференция быстро переросла в вопрос принципа. Сначала хотели обсуждать только библейский исход и египетские источники, но быстро перешли к дебатам о ценности Библии в истории и археологии. Два научных лагеря теперь непримиримо противостоят друг другу."
 lepsius.1104.f: "[SCOPE.sCharacter('lepsius_bible_defender_scope').GetFullName] на самом деле [SelectLocalization(SCOPE.sCharacter('lepsius_bible_defender_scope').IsFemale, 'хотела', 'хотел')] прочитать лекцию о культуре памяти израильского народа и статусе исхода, когда [SCOPE.sCharacter('lepsius_bible_attacker_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_bible_attacker_scope').IsFemale, 'задала', 'задал')] провокационный и справедливый вопрос, не является ли такое заявление пустой тратой времени - ведь в конечном итоге необходимо было бы выяснить, можно ли считать Библию источником, поскольку не существует археологической традиции, говорящей в пользу историчности Исхода. Также не было традиции в текстах, которые были переведены. Поэтому, в принципе, следовало бы задать вопрос, не являются ли пять книг Моисеевых на самом деле выдуманными историями и, следовательно, бесполезными. «Археология - это о фактах, а не об истине», - заключил он. [SCOPE.sCharacter('lepsius_bible_defender_scope').GetFullName] ответил на эти обвинения, сказав, что не следует понимать библейские тексты как свидетельства очевидцев, а скорее как вторичный источник о событиях, которые составляют часть головоломки древней культуры памяти. «Полностью отвергать Библию - такой же нонсенс, как и принимать каждое её слово за исторический факт. Речь скорее о том, чтобы задавать правильные вопросы», - сказал он."
 lepsius.1104.g: "Библия имеет некоторую историческую ценность как вторичный источник."
 lepsius.1104.h: "Библия не имеет никакой исторической ценности."
 lepsius.1105.t: "Археологи между собой"
 lepsius.1105.d: "Помимо текущего археологического конгресса, наш археолог подружился с иностранным коллегой и обменялся с ним идеями."
 lepsius.1105.f: "Конгресс шёл уже несколько дней, и поначалу у профессора [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] было время поговорить с ранее неизвестным коллегой только во время перерывов. За встречей последовал совместный обед, и чем дольше учёные разговаривали друг с другом, тем больше они узнавали друг о друге - и друг от друга. Как оказалось, [SCOPE.sCharacter('lepsius_foreign_archaeologist_scope').GetFullName] - человек с богатым опытом."
 lepsius.1105.g: "Ещё один друг археологии!"
 lepsius.1106.t: "Артефакт от переговорщика"
 lepsius.1106.d: "Переговорщик владельца антиквариата посетил археологический конгресс в [SCOPE.sCountry('lepsius_congress_host_country').GetAltNameNoFlag('RU_CL_PP')]. Он пытается продать артефакт заинтересованному музею от имени тайного аристократа. Пока он не нашёл покупателя."
 lepsius.1106.f: "Профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] смог убедиться в подлинности артефакта. Однако, учитывая высокую цену, он колеблется с покупкой и ждёт согласия из столицы, прежде чем предпринимать какие-либо действия."
 lepsius.1106.g: "Дорого, но ценно."
 lepsius.1106.h: "Недостаточно ценно."
 lepsius.1107.t: "Дружеская беседа"
 lepsius.1107.d: "В кулуарах археологического конгресса в [SCOPE.sCountry('lepsius_congress_host_country').GetAltNameNoFlag('RU_CL_PP')] наш археолог представил [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] в очень позитивном свете в разговоре с несколькими коллегами."
 lepsius.1107.f: "Неизвестно, что именно сказал профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName], но, по-видимому, он нашёл отклик у других археологов. Они непременно распространят это позитивное впечатление в своей родной стране."
 lepsius.1107.g: "Улучшим наши отношения."
 lepsius.1107.h: "Улучшим нашу репутацию."
 lepsius.1108.t: "Ассистент"
 lepsius.1108.d: "Начинающий молодой человек, который хотел попасть на археологический конгресс, но был остановлен охранниками у дверей, привлёк внимание профессора [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]."
 lepsius.1108.f: "Конечно, студенту не позволили войти в зал с избранным обществом международных археологов, но его настойчивость так впечатлила [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName], что он захотел познакомиться с молодым человеком поближе. Как оказалось, для своего возраста он накопил богатые знания как в древних языках, так и в географии. Всего через несколько часов профессор решил сделать его своим ассистентом после конгресса в надежде, что он скоро сможет обогатить академический мир."
 lepsius.1108.g: "Мы ожидаем академической карьеры."
 lepsius.1109.t_merit: "Исход: больше, чем история"
 lepsius.1109.t_invention: "Исход: вымысел, а не факт"
 lepsius.1109.d_merit: "После многих встреч, дебатов и споров археологический конгресс подошёл к концу, и была составлена итоговая декларация. Согласно ей, Библия не является первоисточником, но всё же имеет историческую ценность в некоторых аспектах, даже если это не может быть напрямую применимо к Египту и Вавилону."
 lepsius.1109.d_invention: "После многих встреч, дебатов и споров археологический конгресс подошёл к концу, и была составлена итоговая декларация. Согласно ей, Библия не имеет ценности для археологии или истории. Скорее, это в основном серия вымыслов, которые скорее мешают, чем помогают изучению древности."
 lepsius.1109.f_merit: "Меньшая группа археологов сочла декларацию компромиссом, но другие признали в ней более тонкий подход к прошлому, выходящий за рамки абсолютных позиций. Несмотря на прямую отсылку к Исходу, некоторые археологи выделили недавно обнаруженный отрывок фараона Мернептаха, в котором упоминается разорение народа Израиля. Другая группа указала, что, согласно переведённому Шампольоном порталу в Бубастисе, фараон Шишак действительно разграбил Иерусалим. Всё это указывает на то, что менее важно использовать книгу буквально, а скорее рассматривать её как часть головоломки в исследовании древнейшей истории. Неверные толкования неизбежны, но это относится ко всем областям науки."
 lepsius.1109.f_invention: "В конце концов, группа скептиков смогла настоять на своём максимальном требовании. Отныне библейские истории должны иметь не больше ценности, чем, например, легенды о 7 царях Рима или греческие мифические истории - видное положение Библии в западном мире, по крайней мере в этой области, подошло к концу. Отчаянные ссылки на совпадения между археологическими находками и библейскими отрывками были признаны тем, чем они и были: совпадениями. Вопрос о том, что делать с Библией, был, таким образом, лишь задачей литературы. Некоторые археологи также упомянули возможность того, что библейские истории были в лучшем случае скопированы с египетских историй или вавилонских мифов. Речь шла бы только о необходимом исследовании зависимости. В остальном дело для археологии и истории было закрыто: Библия была в основном сборником вымышленных историй, не имеющих ценности для науки."
 lepsius.1109.g: "Нужно правильно классифицировать и интерпретировать тексты."
 lepsius.1109.h: "Библия - бесполезная книга сказок."
 lepsius.1109.i: "Мы и так это знали."
 lepsius.1111.t: "Археологический конгресс: Становление цивилизации"
 lepsius.1111.d: "Наша нация провела все необходимые приготовления для проведения следующего археологического конгресса. В центре внимания будет вопрос о том, где впервые возникла цивилизация. Согласно последней информации, это, вероятно, Вавилония. Это, в свою очередь, поднимает вопрос о степени влияния вавилонской культуры на другие культуры. Приглашения будут разосланы всем крупным археологам мира. Председательствовать на сессии будет профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]."
 lepsius.1111.f: "Знание о существовании вавилонской цивилизации никогда не было полностью утеряно - даже во времена греков была информация о вавилонянах и ассирийцах. Однако расшифровка аккадского языка показала, что существовали значительно более древние культуры, такие как шумеры, чья история по возрасту затмевала даже египтян. Целый ряд изобретений, типичных для цивилизации, формировал повседневную жизнь этих древних народов, и многие филологи и археологи вскоре заподозрили, что Вавилон был настоящей колыбелью цивилизации. Увлечение древней Месопотамией вскоре привело к тому, что все области цивилизации стали связывать с Вавилоном: не только Библия, но и культуры Леванта и Персии, даже египтяне, были лишь простыми «культурными получателями» или «культурными передатчиками» изначальной вавилонской культуры. Эта научная узость вскоре приобрела насмешливое название, которое её приверженцы использовали для себя: панвавилонизм."
 lepsius.1111.g: "Археологический мир должен быть нашим гостем."
 lepsius.1112.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName] пригласил[SCOPE.sCountry('lepsius_congress_host_country').GetAltNameNoFormatting('RU_CL_END_FEM')] нас на археологический конгресс. В центре внимания будет вопрос о том, где впервые возникла цивилизация. Согласно последней информации, это, вероятно, Вавилония. Это, в свою очередь, поднимает вопрос о степени влияния вавилонской культуры на другие культуры. Наш археолог, профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName], [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'получила', 'получил')] тёплое приглашение."
 lepsius.1112.g: "Вечные споры о том, у кого самые лучшие кожаные куртки..."
 lepsius.1113.d_laughed: "Выступление профессора [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] было встречено с насмешкой. [ROOT.GetCountry.GetNameNoFlag] не пользуется репутацией страны, достигшей чего-либо выдающегося в области ассириологии. За закрытыми дверями явно отпускали шутки."
 lepsius.1113.d_respected: "Перед началом археологического конгресса нашего археолога тепло встретили и обменялись обычными любезностями. [ROOT.GetCountry.GetNameNoFlag] име[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_T')] признанную репутацию в исследовательском мире."
 lepsius.1113.d_lauded: "Прибытие профессора [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] было встречено с большой радостью. [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'Она', 'Он')] считается одним из самых ожидаемых гостей. Вокруг [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'неё', 'него')] быстро собралась толпа, поскольку за [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')] закрепилась репутация первопроходца в области ассириологии."
 lepsius.1114.t: "Вавилон: колыбель цивилизации?"
 lepsius.1114.d: "В ходе конгресса вопрос о происхождении цивилизации всё больше перерастал в вопрос о том, повлиял ли и в какой степени Вавилон на все культуры Ближнего Востока и Восточного Средиземноморья. Некоторые предполагают, что почти каждая идея, которая позже сыграла роль, была задумана в древнем Вавилоне!"
 lepsius.1114.f: "Профессор [SCOPE.sCharacter('lepsius_babylon_defender_scope').GetLastName] начал с очень интересного доклада о культурных достижениях и высоком уровне вавилонских знаний более 4000 лет назад: «Шумеро-вавилонский культурный мир предполагает мировую теорию, согласно которой регулировались все государственные и социальные организации. Все науки и искусства восходят к изначальной мудрости, открытой небом, согласно которой управляется и защищается собственность. Панвавилонизм стремится предоставить доказательства того, что это астральное мировоззрение оставило свой след во всех культурах и религиях мира». Но эта точка зрения вызвала сильное сопротивление со стороны многочисленных учёных, чьим представителем вскоре стал [SCOPE.sCharacter('lepsius_babylon_attacker_scope').GetFullName]. Он отверг идею, что все мифы произошли от вавилонян. «То, что [SelectLocalization(SCOPE.sCharacter('lepsius_babylon_defender_scope').IsFemale, 'сказала', 'сказал')] [SCOPE.sCharacter('lepsius_babylon_defender_scope').GetLastName], было скорее конструкциями, чем фактами. Идея о том, что не могло быть параллельных развитий, надумана - египетские иероглифы, например, не были вдохновлены клинописью». И в то время как панвавилонисты пытались создать приоритет, который отводил Месопотамии центральное место, а всей остальной мифологии - периферийное, они полностью упускали из виду тот факт, что культуры могут жить в общем спектре."
 lepsius.1114.g: "Вавилон - колыбель цивилизации."
 lepsius.1114.h: "Цивилизация возникла в нескольких местах."
 lepsius.1119.t_panbabylonism: "Становление цивилизации: панвавилонизм торжествует"
 lepsius.1119.t_antipanbabylonism: "Становление цивилизации: панвавилонизм опровергнут"
 lepsius.1119.d_panbabylonism: "После страстных дебатов, которые привели к расколу между многочисленными учёными, конгресс смог договориться о заключительной декларации. Согласно ей, Месопотамия является не только колыбелью цивилизации, но и отправной точкой всех мифологических идей Ближнего Востока."
 lepsius.1119.d_antipanbabylonism: "Битвы окончены, и после нескольких жарких словесных споров учёные смогли взять себя в руки и подписать заключительную декларацию, которая закрепила окончательное поражение панвавилонского лагеря. Правда, Месопотамия была признана одной из важнейших колыбелей цивилизации; но не единственной. Попытка свести каждую мифологию к вавилонянам была пресечена в корне."
 lepsius.1119.f_panbabylonism: "Заключительная декларация подтвердила все теории, выдвинутые последователями панвавилонизма: зависимость мифологии и литературы Востока от вавилонской культуры была очевидна. И Библия, и египетские мифы, очевидно, зависят от хорошо известных вавилонских идей, таких как те, что содержатся в «Эпосе о Гильгамеше». В конечном счёте, всё развитие Ближнего Востока было культурно сильно подвержено влиянию астрономии и астрологии этой изначальной культуры, чьи идеи были иногда более, иногда менее очевидны."
 lepsius.1119.f_antipanbabylonism: "Сторонники панвавилонизма недавно оказались в меньшинстве. Учёные признали, что многие достижения месопотамских культур были частью ядра интеллектуальной основы Ближнего Востока. Однако учёные отвергли претензию на абсолютность, даже претензию на «изначальную культуру», в заключительной декларации. Астрономические исследования, которые считались отправной точкой вавилонского мышления, были разоблачены как более позднее развитие, которое было ошибочно помещено в начало. Учёные также не смогли признать приоритет вавилонской традиции: скорее, оказалось, что различные «вавилонские» истории на самом деле были общим наследием традиций в регионе, которые вавилоняне фактически записали первыми. Одно предложение выделяется как особенно горькое, вкратце объявляя панвавилонизм лженаукой: «Эта мистическая мудрость имеет не больше научного значения, чем „изначальное откровение“ всех измерений мира в великой пирамиде, которое, к сожалению, всё ещё находит адептов»."
 lepsius.1119.g: "Всё началось в Месопотамии."
 lepsius.1119.h: "Существует не только одно происхождение."
 lepsius.1121.t: "Археологический конгресс: Статус Трои"
 lepsius.1121.d: "Наша нация провела все необходимые приготовления для проведения следующего археологического конгресса. Конференция призвана окончательно разрешить троянский вопрос. Несмотря на впечатляющие раскопки Генриха Шлимана, вполне оправдан вопрос о том, что на самом деле нашёл Генрих Шлиман, была ли это действительно Троя и существовала ли Троя вообще в такой форме. Приглашения будут разосланы всем крупным археологам мира. Председательствовать на сессии будет профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]."
 lepsius.1121.f: "После того как Шлиман объявил об открытии Трои, потребовалось некоторое время, чтобы более скептически настроенные умы оправились от шока. Позднейшие инспекции показали не только то, что Шлиман копал в неправильном слое, но и то, что найденный им так называемый «клад Приама» был намного старше гомеровской Трои. Вскоре распространился слух, что Шлиман, возможно, раскопал не тот город. Другие настаивали на том, что нельзя раскопать то, чего не существовало. Третьи защищали открытие Шлимана и считали, что доказательство было предоставлено, поскольку Шлиман основывался на древних описаниях. Римские находки также доказывали, что греки и римляне также считали это место местом Троянской войны. Открытие Трои не положило конец научному спору, а лишь ознаменовало новый этап."
 lepsius.1121.g: "Археологический мир должен быть нашим гостем."
 lepsius.1122.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName] пригласил[SCOPE.sCountry('lepsius_congress_host_country').GetAltNameNoFormatting('RU_CL_END_FEM')] нас на археологический конгресс. Конференция призвана окончательно разрешить троянский вопрос. Несмотря на впечатляющие раскопки Генриха Шлимана, вполне оправдан вопрос о том, что на самом деле нашёл Генрих Шлиман, была ли это действительно Троя и существовала ли Троя вообще в такой форме. Наш археолог, профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName], [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'получила', 'получил')] тёплое приглашение."
 lepsius.1122.g: "Вечные споры о том, у кого самые лучшие кожаные куртки..."
 lepsius.1123.d_laughed: "Выступление профессора [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] было встречено с насмешкой. [ROOT.GetCountry.GetNameNoFlag] не пользуется репутацией страны, достигшей чего-либо выдающегося в области эгейской археологии. За закрытыми дверями явно отпускали шутки."
 lepsius.1123.d_respected: "Перед началом археологического конгресса нашего археолога тепло встретили и обменялись обычными любезностями. [ROOT.GetCountry.GetNameNoFlag] име[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_T')] признанную репутацию в исследовательском мире."
 lepsius.1123.d_lauded: "Прибытие профессора [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] было встречено с большой радостью. [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'Она', 'Он')] считается одним из самых ожидаемых гостей. Вокруг [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'неё', 'него')] быстро собралась толпа, поскольку за [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')] закрепилась репутация первопроходца в области эгейской археологии."
 lepsius.1124.t: "Троя: просто миф?"
 lepsius.1124.d: "Дебаты о статусе Трои оказались ещё более спорными, чем ожидалось. Возникло не два, а три лагеря. Первая группа состоит из страстных сторонников Шлимана, которые полностью убеждены в правильности всех выдвинутых им тезисов. Им противостоит непримиримый оппозиционный лагерь, который видит лишь очень скудные доказательства того, что гомеровская Троя имеет какое-либо отношение к месту раскопок Шлимана. Третья группа считает, что Шлиман допустил серьёзные ошибки, но что это на самом деле был тот город, который он искал."
 lepsius.1124.f: "«Если Шлиман не нашёл Трою, то что же он нашёл? Он находит место, которое соответствует описаниям „Илиады“ и древних авторов. Он находит сооружение, которое соответствует этому времени. И мы находим сооружение, которое, по-видимому, было разрушено врагами. Сколько ещё доказательств нужно?» - так начал свою лекцию профессор [SCOPE.sCharacter('lepsius_troy_defender_scope').GetLastName], но затем его прервали многочисленные вопросы от его коллеги, [SCOPE.sCharacter('lepsius_troy_attacker_scope').GetFullName]. Например, древние греки в классический период уже не знали, где находилась Троя, и уже ошибочно отождествляли это место с Троей. Что название города неизвестно и нет никаких указаний на то, как он был связан с греческим миром. И что никогда не было никаких надёжных исторических источников о Троянской войне в какой-либо форме, которые напоминали бы описания Гомера. Затем вмешался господин [SCOPE.sCharacter('lepsius_troy_mediator_scope').GetLastName]: «Дорогие коллеги, Шлиман, безусловно, совершил ошибки, но хотим ли мы упустить из виду общую картину?»"
 lepsius.1124.g: "Шлиман действительно нашёл Трою."
 lepsius.1124.h: "Шлиман нашёл «Трою», но дело обстоит сложнее."
 lepsius.1124.i: "Нет никаких реальных доказательств того, что это действительно Троя."
 lepsius.1129.t_homeric: "Троя: история, а не миф"
 lepsius.1129.t_historical: "Троя: история и миф"
 lepsius.1129.t_myth: "Троя: миф, а не история"
 lepsius.1129.t_disputed: "Троя: неразгаданная тайна"
 lepsius.1129.d_homeric: "После напряжённых дебатов и множества лекций лагерь сторонников Шлимана, признавших в холме Гиссарлык гомеровский Илион, смог одержать верх. Не только историчность Трои, но и Троянская война и другие элементы гомеровских эпосов признаны исторической реальностью."
 lepsius.1129.d_historical: "Собравшиеся на конгрессе в [SCOPE.sCountry('lepsius_congress_host_country').GetAltNameNoFlag('RU_CL_PP')] археологи пришли к выводу, что по крайней мере часть гомеровской традиции содержит зерно истины. Даже если Шлиман ошибся в раскопках, есть некоторые доказательства, позволяющие предположить, что Гиссарлык соответствует месту, которое в литературе и историографии общепризнанно считается Троей - остальное дело уточнения деталей."
 lepsius.1129.d_myth: "Конгресс пришёл к выводу, что дебаты о Трое после столетий подошли к концу: предполагаемое открытие Трои укрепило критиков, которые ещё сильнее подозревают, что гомеровские эпосы - чистый вымысел. Что бы ни раскопал Шлиман, это не может быть Троя, потому что её никогда не существовало."
 lepsius.1129.d_disputed: "Позиционная война между учёными в последнее время привела к большому разочарованию и апатии. Решения троянского вопроса не предвидится - они даже не смогли договориться о совместной итоговой декларации. Некоторые представители уехали раньше, другие отсиживались, продолжая бессмысленные дискуссии."
 lepsius.1129.f_homeric: "Сторонники Шлимана сегодня празднуют великий триумф: они с энтузиазмом отправили телеграмму первооткрывателю Трои о том, что все его тезисы будут подтверждены, и он даже станет почётным членом общества. Он определённо раскопал Трою и тем самым предоставил доказательства того, что Троянская война гомеровских эпосов была не вымыслом, не смутным воспоминанием, а историческим событием. Теперь ещё важнее обыскать Эгейский регион в поисках новых артефактов, которые могли бы предоставить ещё больше информации об эпохе, некогда замаскированной под «мифическую». Энтузиазм исследователей должен обеспечить скорейшее начало более интенсивных раскопок для поддержки тезисов Шлимана: возможно, скоро найдутся дом Одиссея, могила Ахилла или ванна, в которой был убит Агамемнон? Удивительно, что Шлиман до сих пор не ответил на телеграмму..."
 lepsius.1129.f_historical: "После долгих дискуссий и немалых уговоров удалось достичь компромисса среди большинства членов конгресса. Подавляющее большинство международного археологического сообщества считает, что Шлиман допустил серьёзные ошибки при раскопках Трои - среди прочего, ясно, что он искал в неправильном слое раскопок. Однако это просто означает, что Шлиман нашёл «неправильную» Трою в «правильном» месте. Другой слой может на самом деле содержать город, который относится ко времени Троянской войны. Археологи в конечном итоге не смогли определить, было ли это реальным историческим событием; Факт в том, что холм, на котором находится Троя, несколько раз становился жертвой пожаров и войн. Что касается идентичности города, то подтверждается тезис о хеттском влиянии. Учёные объявили, что они используют эти результаты как повод для более интенсивных исследований и будут продолжать интенсивно обсуждать троянский вопрос."
 lepsius.1129.f_myth: "После серьёзных споров археологи и историки - некоторые только с большим недовольством - смогли заставить себя подписать совместную декларацию. Согласно ей, они рассматривают гомеровские эпосы только как литературные произведения, которые, возможно, отсылают к более древним событиям, которые, однако, трудно реконструировать для современной археологии. Скорее, может быть, что Троянская война рассматривается как «война как таковая», в которой отразился общечеловеческий опыт. Троя, таким образом, может иметь примерно столько же исторического содержания, сколько и Атлантида: своего рода утопия, литературное место, где разыгрываются идеи. В принципе, конгресс объявил исследование Трои деятельностью «на грани лженауки», которая была и бессмысленной, и бесцельной. Археология должна перейти к более достойным областям."
 lepsius.1129.f_disputed: "«Ну, по крайней мере, еда была хорошей!»"
 lepsius.1129.g: "Так Шлиман действительно нашёл Трою!"
 lepsius.1129.h: "Шлиман раскопал не ту Трою, но место правильное."
 lepsius.1129.i: "Троя, скорее всего, чистый вымысел."
 lepsius.1129.j: "Весь этот конгресс был пустой тратой времени!"
 lepsius.1201.t: "Место раскопок в [SCOPE.sState('lepsius_excavation_site').GetCustom('RU_SL_PP')]"
 lepsius.1201.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'определила', 'определил')] новое место раскопок в [SCOPE.sState('lepsius_excavation_site').GetCustom('RU_SL_PP')]. Он и его команда немедленно приступили к работе. Однако пока неясно, как долго будут финансироваться раскопки."
 lepsius.1201.f: "Раскопки могут быть разрешены на 5, 7 или 10 лет. В отличие от раскопок, проводимых за границей, эти нельзя отменить в любое время. Ведущий археолог останется на месте раскопок на 6, 12 или 18 месяцев, в зависимости от срока, до своего возвращения. В это время он будет недоступен."
 lepsius.1201.g: "10 лет."
 lepsius.1201.h: "7 лет."
 lepsius.1201.i: "5 лет."
 lepsius.1202.t: "Профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] возвращается с места раскопок"
 lepsius.1202.d: "Последние несколько месяцев [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'помогала', 'помогал')] в организации археологических раскопок в [SCOPE.sState('lepsius_excavation_site').GetCustom('RU_SL_PP')] и [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'сделала', 'сделал')] несколько первоначальных открытий. [SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'Она', 'Он')] возвращается в свой университет для оценки, в то время как команда продолжает раскопки самостоятельно в течение следующих нескольких лет, пока не закончится финансирование."
 lepsius.1202.f: "«В немногих видах работ результаты так непосредственно зависят от личности работника, как в раскопках. Старая поговорка о том, что человек находит то, что ищет в предмете, слишком верна; или если у него недостаточно проницательности, чтобы обеспечить нахождение того, что он ищет, по крайней мере, печально верно то, что он не находит ничего, чего не ищет». - Флиндерс Питри"
 lepsius.1202.g: "С возвращением."
 lepsius.1203.t: "Местные раскопки завершены"
 lepsius.1203.d: "Раскопочная группа завершила местные раскопки и убрала последние находки. Теперь она снова доступна для других раскопок или экспедиций."
 lepsius.1203.f: "«Темны пути судьбы,\nнеизвестна звезда будущего,\nпрежде чем лечь в постель,\nя с удовольствием выпью коньяку». - Роберт Кольдевей"
 lepsius.1203.g: "Нам следует скоро провести ещё одни раскопки."
 lepsius.2000.t: "[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetLastName] изобретает систему трёх веков"
 lepsius.2000.d: "Директор Национального музея Дании, [SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetFullName], изобрёл систему для классификации археологических находок по трём периодам: #b каменный век#!, #b бронзовый век#! и #b железный век#!. Это революция для археологии!"
 lepsius.2000.f: "«Видите ли, некоторые артефакты всегда появляются вместе, а некоторые материалы никогда не встречаются на одних и тех же раскопках. Серебро, например, находят только там, где находят и железные инструменты и оружие. Золото, с другой стороны, можно найти как с железными, так и с бронзовыми инструментами.\nТакже поразительно, что некоторые материалы появляются только в определённых видах захоронений. Каменные орудия можно найти только с некремированными телами и в гробницах с каменными камерами. Железо находят в камерных гробницах в курганах.\nВсё это позволяет нам датировать наши находки гораздо точнее. Сначала были каменные орудия, затем бронзовые, и только потом - железные»."
 lepsius.2000.g: "Такой великий ум должен работать на нас!"
 lepsius.2000.h: "Он может оставаться в своём музее..."
