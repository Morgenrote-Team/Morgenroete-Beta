 notification_lepsius_ishtar_normal_transport_notification_name: "Перевозка кирпичей Ворот Иштар"
 notification_lepsius_ishtar_normal_transport_notification_desc: "Сегодня в Археологический музей прибыла полноценная партия кирпичей из Месопотамии. Мы получаем #G 20 000#! #V кирпичей Ворот Иштар#!."
 notification_lepsius_ishtar_normal_transport_notification_tooltip: "#header $notification_lepsius_ishtar_normal_transport_notification_name$#!\n$TOOLTIP_DELIMITER$\n$notification_lepsius_ishtar_normal_transport_notification_desc$"
 notification_lepsius_ishtar_double_transport_notification_name: "Крупная перевозка кирпичей Ворот Иштар"
 notification_lepsius_ishtar_double_transport_notification_desc: "Сегодня в музей прибыло необычно большое количество кирпичей, необходимых для восстановления Ворот Иштар. Похоже, погрузка в Месопотамии идёт лучше, чем ожидалось. Мы получаем #G 40 000#! #V кирпичей Ворот Иштар#!."
 notification_lepsius_ishtar_double_transport_notification_tooltip: "#header $notification_lepsius_ishtar_double_transport_notification_name$#!\n$TOOLTIP_DELIMITER$\n$notification_lepsius_ishtar_double_transport_notification_desc$"
 notification_lepsius_ishtar_half_transport_notification_name: "Малая перевозка кирпичей Ворот Иштар"
 notification_lepsius_ishtar_half_transport_notification_desc: "Из-за неизвестных обстоятельств наш корабль на этот раз оказался заполнен кирпичами Ворот Иштар лишь наполовину. Мы получаем #G 10 000#! #V кирпичей Ворот Иштар#!."
 notification_lepsius_ishtar_half_transport_notification_tooltip: "#header $notification_lepsius_ishtar_half_transport_notification_name$#!\n$TOOLTIP_DELIMITER$\n$notification_lepsius_ishtar_half_transport_notification_desc$"
 notification_lepsius_ishtar_bad_transport_notification_name: "Повреждённые кирпичи Ворот Иштар"
 notification_lepsius_ishtar_bad_transport_notification_desc: "К сожалению, когда наши кураторы осмотрели последнюю партию кирпичей из Месопотамии, они пришли к выводу, что часть фрагментов совершенно непригодна. Мы получаем #G 5 000#! #V кирпичей Ворот Иштар#!."
 notification_lepsius_ishtar_bad_transport_notification_tooltip: "#header $notification_lepsius_ishtar_bad_transport_notification_name$#!\n$TOOLTIP_DELIMITER$\n$notification_lepsius_ishtar_bad_transport_notification_desc$"
