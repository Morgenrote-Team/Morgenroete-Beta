 je_lepsius_priams_treasure: "Сокровище Приама"
 je_lepsius_priams_treasure_reason: "Генрих Шлиман ищет подходящее место для легендарного сокровища Приама, которое, по его утверждению, он нашёл в Трое. Хотя серьёзные учёные сомневаются, что эти находки действительно соответствуют временной эпохе, которую предлагает Шлиман, это вторично. В конце концов, это уникальная возможность завладеть одним из величайших археологических сокровищ века. Наш музей был бы идеальным местом для этого."
 je_lepsius_priams_treasure_fail: "Если конкурент окажется быстрее нас в выполнении желаний Шлимана, мы упустим уникальный шанс получить сокровище Приама."
 je_lepsius_the_labyrinth: "Лабиринт"
 je_lepsius_the_labyrinth_reason: "Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'попала', 'попал')] в странный древний лабиринт и [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'должна', 'должен')] найти выход. Если [SelectLocalization(ROOT.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'она', 'он')] совершит слишком много ошибок, то рискует навсегда заблудиться там!"
