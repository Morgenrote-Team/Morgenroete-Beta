 lepsius.5000.t: "Руины Пальмиры"
 lepsius.5000.d: "В нашей стране находятся руины древнего города Пальмира. Наши археологи с нетерпением ждут начала раскопок и хотят узнать как можно больше об этом месте."
 lepsius.5000.f: "Пальмира - древний город в Сирии, существовавший на протяжении веков. Город был хорошо известен своими купцами. Богатые купцы построили множество памятников, которые пережили время. В результате многие древние здания претерпели изменения, что создаёт трудности для археологов.\nГород знаменит не только своими купцами, но и Зенобией, царицей недолговечной Пальмирской империи. Она на некоторое время захватила контроль над востоком Римской империи, пока император Аврелиан не отвоевал восток и не разрушил город Пальмиру."
 lepsius.5000.g: "Интересно, что мы найдём!"
 lepsius.5001.t: "Храм Бэла восстановлен"
 lepsius.5001.d: "Наши археологи неустанно работали над восстановлением храма Бэла. Пришлось убрать пристройки и изменения мусульманского периода города и освободить погребённые части здания."
 lepsius.5001.f: "Телль, или холм, на котором был построен храм, использовался людьми уже в 3000 году до н.э., как показал наш стратиграфический анализ. Храм, который мы реконструировали, насколько это было возможно, - это римский храм, датируемый концом I и первой половиной II века н.э.\nПозже храм был преобразован в христианскую церковь, а после завоевания региона арабами он стал мечетью.\n\n#V Сегодня:#! К сожалению, храм Бэла был разрушен ИГИЛ в 2015 году. Однако существуют планы по реконструкции храма из сохранившихся частей."
 lepsius.5001.g: "Интересно, что мы найдём!"
 lepsius.5002.t: "Раскопана Долина гробниц"
 lepsius.5002.d: "К западу от Пальмиры находится множество гробниц. В них расположены впечатляющие башенные гробницы, которые наши археологи раскопали и частично восстановили."
 lepsius.5002.f: "Некрополь, называемый Долиной гробниц, вмещает множество башенных гробниц. Самая ранняя из них датируется 9 годом до н.э. и называется башней Атенатана. Другая башня, башня Элахбела, была построена во время правления императора Траяна пальмирским аристократом Марком Ульпием Элахбелом. Элахбел, похоже, стал римским гражданином, когда у власти был император Траян, поскольку у них одинаковые первое и второе имена.\nЕщё одна интересная находка - фрагменты шёлка, которые, вероятно, были привезены из Китая.\n\n#V Сегодня:#! Многие гробницы были разрушены, когда ИГИЛ контролировал Пальмиру. Среди них были башня Элахбела и башня Ямвлиха."
 lepsius.5002.g: "Впечатляюще!"
 lepsius.5003.t: "Пальмира - город пальм"
 lepsius.5003.d: "Наши археологи потратили много лет, раскапывая остатки Пальмиры и восстанавливая то, что возможно. Теперь некогда богатый город снова стоит посетить."
 lepsius.5003.f: "Руины Пальмиры снова привлекают посетителей. Многие хотят увидеть руины некогда великого города, который даже бросил вызов Риму, но проиграл. Величественные башенные гробницы, Великая колоннада, храм Бэла и храм Баалшамина - всё это свидетельствует о былом великом богатстве города. Это, должно быть, было фантастическое зрелище, когда Город пальм был в своём величайшем расцвете!"
 lepsius.5003.g: "Замечательное место для посещения!"
