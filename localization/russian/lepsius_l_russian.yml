 setting_lepsius_anthropology_historical_rule: "Исторический"
 setting_lepsius_anthropology_historical_rule_desc: "Начиная с определённой исторической даты, находятся окаменелости, такие как ребёнок из Таунга или неандерталец. Это продвигает антропологические исследования, но оказывает давление на игрока, когда он пытается первым классифицировать вид."
 setting_lepsius_anthropology_free_rule: "Свободный"
 setting_lepsius_anthropology_free_rule_desc: "Первоначальные классификации происходят только тогда, когда найдены три человеческие окаменелости одного вида. Это затормозит международную антропологию в игре, но даст больше свободы."
 je_lepsius_fossil_identification: "Идентификация окаменелостей"
 je_lepsius_fossil_identification_reason: "[concept_lepsius_anthropologist] со временем может проанализировать неизвестную кость и отнести её к определённому человеческому или дочеловеческому виду. Если ему удастся отнести три кости к одному и тому же виду, он сможет успешно систематизировать этот вид. Время, необходимое для правильной идентификации кости, зависит от опыта антрополога."
 je_lepsius_fossil_identification_goal: "Неопытному антропологу может потребоваться до пяти лет, чтобы правильно идентифицировать кость. Антропологи высшего уровня, с другой стороны, тратят на это всего один год."
 lepsius.1101.t: "Археологический конгресс: Исход"
 lepsius.1101.d: "Наша нация провела все необходимые приготовления для проведения следующего археологического конгресса. В центре внимания будет роль Библии в археологии и исследовании древности. Приглашения будут разосланы всем крупным археологам мира. Председательствовать на сессии будет профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]."
 lepsius.1101.f: "Ещё в римские времена недостаток источников о Древнем Египте приводил к тому, что исторические труды основывались на вторичных источниках, таких как Геродот. Эта тенденция продолжилась и в Средние века. Библия давала подсказки и долгое время считалась авторитетным источником по истории Ближнего Востока — в том числе и потому, что других традиций просто не было. С расшифровкой иероглифов и началом современной египтологии как сторонники, так и критики Библии пытались представить доказательства ложности или истинности библейских рассказов. С началом исследования древней Вавилонии эта тенденция ещё больше усилилась. Примером спора об историчности библейских историй был Исход — выход народа Израиля из Египта, — для которого не было никаких доказательств в египетских источниках."
 lepsius.1101.g: "Археологический мир должен быть нашим гостем."
 lepsius.1102.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName] пригласил[SCOPE.sCountry('lepsius_congress_host_country').GetAltNameNoFormatting('RU_CL_END_FEM')] нас на археологический конгресс. Темой будет историчность Библии на примере Исхода. Наш археолог, профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName], получил[SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'а', '')] тёплое приглашение."
 lepsius.1102.g: "Вечные споры о том, у кого самые лучшие кожаные куртки..."
 lepsius.1103.t_laughed: "Насмешки археологического общества"
 lepsius.1103.t_respected: "Уверенное выступление"
 lepsius.1103.t_lauded: "Восхищение и поздравления"
 lepsius.1103.d_laughed: "Выступление профессора [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] было встречено с насмешкой. [ROOT.GetCountry.GetNameNoFlag] не пользуется репутацией страны, достигшей чего-либо выдающегося в области египтологии. За закрытыми дверями явно отпускали шутки."
 lepsius.1103.d_respected: "Перед началом археологического конгресса нашего археолога тепло встретили и обменялись обычными любезностями. [ROOT.GetCountry.GetNameNoFlag] имеет признанную репутацию в исследовательском мире."
 lepsius.1103.d_lauded: "Прибытие профессора [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] было встречено с большой радостью. Он считается одним из самых ожидаемых гостей. Вокруг него быстро собралась толпа, поскольку [ROOT.GetCountry.GetNameNoFlag] считается пионером в области египтологии."
 lepsius.1103.f_laughed: "«Почему у археологов [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] нет девушек?\n\nПотому что у них худшие методы знакомства!»"
 lepsius.1103.f_respected: "По прибытии профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] провёл несколько приятных бесед с коллегами о в основном скучных руинах, которые не-учёный счёл бы ещё более скучными скальными образованиями."
 lepsius.1103.f_lauded: "Профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName], казалось, был почти ошеломлён натиском. Столько коллег искали с ним разговора и хотели извлечь пользу из его экспедиций и опыта. Некоторые даже убеждали его прочитать частную лекцию."
 lepsius.1103.g: "Как неловко!"
 lepsius.1103.h: "Наконец-то среди единомышленников."
 lepsius.1103.i: "Мы — ведущая археологическая нация!"
 lepsius.1104.t: "Исход: историческая ценность или вымысел?"
 lepsius.1104.d: "Тематическая конференция быстро переросла в вопрос принципа. Сначала хотели обсуждать только библейский исход и египетские источники, но быстро перешли к дебатам о ценности Библии в истории и археологии. Два научных лагеря теперь непримиримо противостоят друг другу."
 lepsius.1104.f: "[SCOPE.sCharacter('lepsius_bible_defender_scope').GetFullName] на самом деле [SelectLocalization(SCOPE.sCharacter('lepsius_bible_defender_scope').IsFemale, 'хотела', 'хотел')] прочитать лекцию о культуре памяти израильского народа и статусе исхода, когда [SCOPE.sCharacter('lepsius_bible_attacker_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_bible_attacker_scope').IsFemale, 'задала', 'задал')] провокационный и справедливый вопрос, не является ли такое заявление пустой тратой времени — ведь в конечном итоге необходимо было бы выяснить, можно ли считать Библию источником, поскольку не существует археологической традиции, говорящей в пользу историчности Исхода. Также не было традиции в текстах, которые были переведены. Поэтому, в принципе, следовало бы задать вопрос, не являются ли пять книг Моисеевых на самом деле выдуманными историями и, следовательно, бесполезными. «Археология — это о фактах, а не об истине», — заключил он. [SCOPE.sCharacter('lepsius_bible_defender_scope').GetFullName] ответил на эти обвинения, сказав, что не следует понимать библейские тексты как свидетельства очевидцев, а скорее как вторичный источник о событиях, которые составляют часть головоломки древней культуры памяти. «Полностью отвергать Библию — такой же нонсенс, как и принимать каждое её слово за исторический факт. Речь скорее о том, чтобы задавать правильные вопросы», — сказал он."
 lepsius.1104.g: "Библия имеет некоторую историческую ценность как вторичный источник."
 lepsius.1104.h: "Библия не имеет никакой исторической ценности."
 lepsius.1105.t: "Археологи между собой"
 lepsius.1105.d: "Помимо текущего археологического конгресса, наш археолог подружился с иностранным коллегой и обменялся с ним идеями."
 lepsius.1105.f: "Конгресс шёл уже несколько дней, и поначалу у профессора [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] было время поговорить с ранее неизвестным коллегой только во время перерывов. За встречей последовал совместный обед, и чем дольше учёные разговаривали друг с другом, тем больше они узнавали друг о друге — и друг от друга. Как оказалось, [SCOPE.sCharacter('lepsius_foreign_archaeologist_scope').GetFullName] — человек с богатым опытом."
 lepsius.1105.g: "Ещё один друг археологии!"
 lepsius.1106.t: "Артефакт от переговорщика"
 lepsius.1106.d: "Переговорщик владельца антиквариата посетил археологический конгресс в [SCOPE.sCountry('lepsius_congress_host_country').GetAltNameNoFlag('RU_CL_PP')]. Он пытается продать артефакт заинтересованному музею от имени тайного аристократа. Пока он не нашёл покупателя."
 lepsius.1106.f: "Профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] смог убедиться в подлинности артефакта. Однако, учитывая высокую цену, он колеблется с покупкой и ждёт согласия из столицы, прежде чем предпринимать какие-либо действия."
 lepsius.1106.g: "Дорого, но ценно."
 lepsius.1106.h: "Недостаточно ценно."
 lepsius.1107.t: "Дружеская беседа"
 lepsius.1107.d: "В кулуарах археологического конгресса в [SCOPE.sCountry('lepsius_congress_host_country').GetAltNameNoFlag('RU_CL_PP')] наш археолог представил [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] в очень позитивном свете в разговоре с несколькими коллегами."
 lepsius.1107.f: "Неизвестно, что именно сказал профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName], но, по-видимому, он нашёл отклик у других археологов. Они непременно распространят это позитивное впечатление в своей родной стране."
 lepsius.1107.g: "Улучшим наши отношения."
 lepsius.1107.h: "Улучшим нашу репутацию."
 lepsius.1108.t: "Ассистент"
 lepsius.1108.d: "Начинающий молодой человек, который хотел попасть на археологический конгресс, но был остановлен охранниками у дверей, привлёк внимание профессора [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]."
 lepsius.1108.f: "Конечно, студенту не позволили войти в зал с избранным обществом международных археологов, но его настойчивость так впечатлила [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName], что он захотел познакомиться с молодым человеком поближе. Как оказалось, для своего возраста он накопил богатые знания как в древних языках, так и в географии. Всего через несколько часов профессор решил сделать его своим ассистентом после конгресса в надежде, что он скоро сможет обогатить академический мир."
 lepsius.1108.g: "Мы ожидаем академической карьеры."
 lepsius.1109.t_merit: "Исход: больше, чем история"
 lepsius.1109.t_invention: "Исход: вымысел, а не факт"
 lepsius.1109.d_merit: "После многих встреч, дебатов и споров археологический конгресс подошёл к концу, и была составлена итоговая декларация. Согласно ей, Библия не является первоисточником, но всё же имеет историческую ценность в некоторых аспектах, даже если это не может быть напрямую применимо к Египту и Вавилону."
 lepsius.1109.d_invention: "После многих встреч, дебатов и споров археологический конгресс подошёл к концу, и была составлена итоговая декларация. Согласно ей, Библия не имеет ценности для археологии или истории. Скорее, это в основном серия вымыслов, которые скорее мешают, чем помогают изучению древности."
 lepsius.1109.f_merit: "Меньшая группа археологов сочла декларацию компромиссом, но другие признали в ней более тонкий подход к прошлому, выходящий за рамки абсолютных позиций. Несмотря на прямую отсылку к Исходу, некоторые археологи выделили недавно обнаруженный отрывок фараона Мернептаха, в котором упоминается разорение народа Израиля. Другая группа указала, что, согласно переведённому Шампольоном порталу в Бубастисе, фараон Шишак действительно разграбил Иерусалим. Всё это указывает на то, что менее важно использовать книгу буквально, а скорее рассматривать её как часть головоломки в исследовании древнейшей истории. Неверные толкования неизбежны, но это относится ко всем областям науки."
 lepsius.1109.f_invention: "В конце концов, группа скептиков смогла настоять на своём максимальном требовании. Отныне библейские истории должны иметь не больше ценности, чем, например, легенды о 7 царях Рима или греческие мифические истории — видное положение Библии в западном мире, по крайней мере в этой области, подошло к концу. Отчаянные ссылки на совпадения между археологическими находками и библейскими отрывками были признаны тем, чем они и были: совпадениями. Вопрос о том, что делать с Библией, был, таким образом, лишь задачей литературы. Некоторые археологи также упомянули возможность того, что библейские истории были в лучшем случае скопированы с египетских историй или вавилонских мифов. Речь шла бы только о необходимом исследовании зависимости. В остальном дело для археологии и истории было закрыто: Библия была в основном сборником вымышленных историй, не имеющих ценности для науки."
 lepsius.1109.g: "Нужно правильно классифицировать и интерпретировать тексты."
 lepsius.1109.h: "Библия — бесполезная книга сказок."
 lepsius.1109.i: "Мы и так это знали."
 lepsius.1111.t: "Археологический конгресс: Становление цивилизации"
 lepsius.1111.d: "Наша нация провела все необходимые приготовления для проведения следующего археологического конгресса. В центре внимания будет вопрос о том, где впервые возникла цивилизация. Согласно последней информации, это, вероятно, Вавилония. Это, в свою очередь, поднимает вопрос о степени влияния вавилонской культуры на другие культуры. Приглашения будут разосланы всем крупным археологам мира. Председательствовать на сессии будет профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]."
 lepsius.1111.f: "Знание о существовании вавилонской цивилизации никогда не было полностью утеряно — даже во времена греков была информация о вавилонянах и ассирийцах. Однако расшифровка аккадского языка показала, что существовали значительно более древние культуры, такие как шумеры, чья история по возрасту затмевала даже египтян. Целый ряд изобретений, типичных для цивилизации, формировал повседневную жизнь этих древних народов, и многие филологи и археологи вскоре заподозрили, что Вавилон был настоящей колыбелью цивилизации. Увлечение древней Месопотамией вскоре привело к тому, что все области цивилизации стали связывать с Вавилоном: не только Библия, но и культуры Леванта и Персии, даже египтяне, были лишь простыми «культурными получателями» или «культурными передатчиками» изначальной вавилонской культуры. Эта научная узость вскоре приобрела насмешливое название, которое её приверженцы использовали для себя: панвавилонизм."
 lepsius.1111.g: "Археологический мир должен быть нашим гостем."
 lepsius.1112.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName] пригласил[SCOPE.sCountry('lepsius_congress_host_country').GetAltNameNoFormatting('RU_CL_END_FEM')] нас на археологический конгресс. В центре внимания будет вопрос о том, где впервые возникла цивилизация. Согласно последней информации, это, вероятно, Вавилония. Это, в свою очередь, поднимает вопрос о степени влияния вавилонской культуры на другие культуры. Наш археолог, профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName], получил[SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'а', '')] тёплое приглашение."
 lepsius.1112.g: "Вечные споры о том, у кого самые лучшие кожаные куртки..."
 lepsius.1113.d_laughed: "Выступление профессора [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] было встречено с насмешкой. [ROOT.GetCountry.GetNameNoFlag] не пользуется репутацией страны, достигшей чего-либо выдающегося в области ассириологии. За закрытыми дверями явно отпускали шутки."
 lepsius.1113.d_respected: "Перед началом археологического конгресса нашего археолога тепло встретили и обменялись обычными любезностями. [ROOT.GetCountry.GetNameNoFlag] имеет признанную репутацию в исследовательском мире."
 lepsius.1113.d_lauded: "Прибытие профессора [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] было встречено с большой радостью. Он считается одним из самых ожидаемых гостей. Вокруг него быстро собралась толпа, поскольку [ROOT.GetCountry.GetNameNoFlag] считается пионером в области ассириологии."
 lepsius.1114.t: "Вавилон: колыбель цивилизации?"
 lepsius.1114.d: "В ходе конгресса вопрос о происхождении цивилизации всё больше перерастал в вопрос о том, повлиял ли и в какой степени Вавилон на все культуры Ближнего Востока и Восточного Средиземноморья. Некоторые предполагают, что почти каждая идея, которая позже сыграла роль, была задумана в древнем Вавилоне!"
 lepsius.1114.f: "Профессор [SCOPE.sCharacter('lepsius_babylon_defender_scope').GetLastName] начал с очень интересного доклада о культурных достижениях и высоком уровне вавилонских знаний более 4000 лет назад: «Шумеро-вавилонский культурный мир предполагает мировую теорию, согласно которой регулировались все государственные и социальные организации. Все науки и искусства восходят к изначальной мудрости, открытой небом, согласно которой управляется и защищается собственность. Панвавилонизм стремится предоставить доказательства того, что это астральное мировоззрение оставило свой след во всех культурах и религиях мира». Но эта точка зрения вызвала сильное сопротивление со стороны многочисленных учёных, чьим представителем вскоре стал [SCOPE.sCharacter('lepsius_babylon_attacker_scope').GetFullName]. Он отверг идею, что все мифы произошли от вавилонян. «То, что сказал[SelectLocalization(SCOPE.sCharacter('lepsius_babylon_defender_scope').IsFemale, 'а', '')] [SCOPE.sCharacter('lepsius_babylon_defender_scope').GetLastName], было скорее конструкциями, чем фактами. Идея о том, что не могло быть параллельных развитий, надумана — египетские иероглифы, например, не были вдохновлены клинописью». И в то время как панвавилонисты пытались создать приоритет, который отводил Месопотамии центральное место, а всей остальной мифологии — периферийное, они полностью упускали из виду тот факт, что культуры могут жить в общем спектре."
 lepsius.1114.g: "Вавилон — колыбель цивилизации."
 lepsius.1114.h: "Цивилизация возникла в нескольких местах."
 lepsius.1119.t_panbabylonism: "Становление цивилизации: панвавилонизм торжествует"
 lepsius.1119.t_antipanbabylonism: "Становление цивилизации: панвавилонизм опровергнут"
 lepsius.1119.d_panbabylonism: "После страстных дебатов, которые привели к расколу между многочисленными учёными, конгресс смог договориться о заключительной декларации. Согласно ей, Месопотамия является не только колыбелью цивилизации, но и отправной точкой всех мифологических идей Ближнего Востока."
 lepsius.1119.d_antipanbabylonism: "Битвы окончены, и после нескольких жарких словесных споров учёные смогли взять себя в руки и подписать заключительную декларацию, которая закрепила окончательное поражение панвавилонского лагеря. Правда, Месопотамия была признана одной из важнейших колыбелей цивилизации; но не единственной. Попытка свести каждую мифологию к вавилонянам была пресечена в корне."
 lepsius.1119.f_panbabylonism: "Заключительная декларация подтвердила все теории, выдвинутые последователями панвавилонизма: зависимость мифологии и литературы Востока от вавилонской культуры была очевидна. И Библия, и египетские мифы, очевидно, зависят от хорошо известных вавилонских идей, таких как те, что содержатся в «Эпосе о Гильгамеше». В конечном счёте, всё развитие Ближнего Востока было культурно сильно подвержено влиянию астрономии и астрологии этой изначальной культуры, чьи идеи были иногда более, иногда менее очевидны."
 lepsius.1119.f_antipanbabylonism: "Сторонники панвавилонизма недавно оказались в меньшинстве. Учёные признали, что многие достижения месопотамских культур были частью ядра интеллектуальной основы Ближнего Востока. Однако учёные отвергли претензию на абсолютность, даже претензию на «изначальную культуру», в заключительной декларации. Астрономические исследования, которые считались отправной точкой вавилонского мышления, были разоблачены как более позднее развитие, которое было ошибочно помещено в начало. Учёные также не смогли признать приоритет вавилонской традиции: скорее, оказалось, что различные «вавилонские» истории на самом деле были общим наследием традиций в регионе, которые вавилоняне фактически записали первыми. Одно предложение выделяется как особенно горькое, вкратце объявляя панвавилонизм лженаукой: «Эта мистическая мудрость имеет не больше научного значения, чем „изначальное откровение“ всех измерений мира в великой пирамиде, которое, к сожалению, всё ещё находит адептов»."
 lepsius.1119.g: "Всё началось в Месопотамии."
 lepsius.1119.h: "Существует не только одно происхождение."
 lepsius.1121.t: "Археологический конгресс: Статус Трои"
 lepsius.1121.d: "Наша нация провела все необходимые приготовления для проведения следующего археологического конгресса. Конференция призвана окончательно разрешить троянский вопрос. Несмотря на впечатляющие раскопки Генриха Шлимана, вполне оправдан вопрос о том, что на самом деле нашёл Генрих Шлиман, была ли это действительно Троя и существовала ли Троя вообще в такой форме. Приглашения будут разосланы всем крупным археологам мира. Председательствовать на сессии будет профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]."
 lepsius.1121.f: "После того как Шлиман объявил об открытии Трои, потребовалось некоторое время, чтобы более скептически настроенные умы оправились от шока. Позднейшие инспекции показали не только то, что Шлиман копал в неправильном слое, но и то, что найденный им так называемый «клад Приама» был намного старше гомеровской Трои. Вскоре распространился слух, что Шлиман, возможно, раскопал не тот город. Другие настаивали на том, что нельзя раскопать то, чего не существовало. Третьи защищали открытие Шлимана и считали, что доказательство было предоставлено, поскольку Шлиман основывался на древних описаниях. Римские находки также доказывали, что греки и римляне также считали это место местом Троянской войны. Открытие Трои не положило конец научному спору, а лишь ознаменовало новый этап."
 lepsius.1121.g: "Археологический мир должен быть нашим гостем."
 lepsius.1122.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName] пригласил[SCOPE.sCountry('lepsius_congress_host_country').GetAltNameNoFormatting('RU_CL_END_FEM')] нас на археологический конгресс. Конференция призвана окончательно разрешить троянский вопрос. Несмотря на впечатляющие раскопки Генриха Шлимана, вполне оправдан вопрос о том, что на самом деле нашёл Генрих Шлиман, была ли это действительно Троя и существовала ли Троя вообще в такой форме. Наш археолог, профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName], получил[SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'а', '')] тёплое приглашение."
 lepsius.1122.g: "Вечные споры о том, у кого самые лучшие кожаные куртки..."
 lepsius.1123.d_laughed: "Выступление профессора [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] было встречено с насмешкой. [ROOT.GetCountry.GetNameNoFlag] не пользуется репутацией страны, достигшей чего-либо выдающегося в области эгейской археологии. За закрытыми дверями явно отпускали шутки."
 lepsius.1123.d_respected: "Перед началом археологического конгресса нашего археолога тепло встретили и обменялись обычными любезностями. [ROOT.GetCountry.GetNameNoFlag] имеет признанную репутацию в исследовательском мире."
 lepsius.1123.d_lauded: "Прибытие профессора [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] было встречено с большой радостью. Он считается одним из самых ожидаемых гостей. Вокруг него быстро собралась толпа, поскольку [ROOT.GetCountry.GetNameNoFlag] считается пионером в области эгейской археологии."
 lepsius.1124.t: "Троя: просто миф?"
 lepsius.1124.d: "Дебаты о статусе Трои оказались ещё более спорными, чем ожидалось. Возникло не два, а три лагеря. Первая группа состоит из страстных сторонников Шлимана, которые полностью убеждены в правильности всех выдвинутых им тезисов. Им противостоит непримиримый оппозиционный лагерь, который видит лишь очень скудные доказательства того, что гомеровская Троя имеет какое-либо отношение к месту раскопок Шлимана. Третья группа считает, что Шлиман допустил серьёзные ошибки, но что это на самом деле был тот город, который он искал."
 lepsius.1124.f: "«Если Шлиман не нашёл Трою, то что же он нашёл? Он находит место, которое соответствует описаниям „Илиады“ и древних авторов. Он находит сооружение, которое соответствует этому времени. И мы находим сооружение, которое, по-видимому, было разрушено врагами. Сколько ещё доказательств нужно?» — так начал свою лекцию профессор [SCOPE.sCharacter('lepsius_troy_defender_scope').GetLastName], но затем его прервали многочисленные вопросы от его коллеги, [SCOPE.sCharacter('lepsius_troy_attacker_scope').GetFullName]. Например, древние греки в классический период уже не знали, где находилась Троя, и уже ошибочно отождествляли это место с Троей. Что название города неизвестно и нет никаких указаний на то, как он был связан с греческим миром. И что никогда не было никаких надёжных исторических источников о Троянской войне в какой-либо форме, которые напоминали бы описания Гомера. Затем вмешался господин [SCOPE.sCharacter('lepsius_troy_mediator_scope').GetLastName]: «Дорогие коллеги, Шлиман, безусловно, совершил ошибки, но хотим ли мы упустить из виду общую картину?»"
 lepsius.1124.g: "Шлиман действительно нашёл Трою."
 lepsius.1124.h: "Шлиман нашёл «Трою», но дело обстоит сложнее."
 lepsius.1124.i: "Нет никаких реальных доказательств того, что это действительно Троя."
 lepsius.1129.t_homeric: "Троя: история, а не миф"
 lepsius.1129.t_historical: "Троя: история и миф"
 lepsius.1129.t_myth: "Троя: миф, а не история"
 lepsius.1129.t_disputed: "Троя: неразгаданная тайна"
 lepsius.1129.d_homeric: "После напряжённых дебатов и множества лекций лагерь сторонников Шлимана, признавших в холме Гиссарлык гомеровский Илион, смог одержать верх. Не только историчность Трои, но и Троянская война и другие элементы гомеровских эпосов признаны исторической реальностью."
 lepsius.1129.d_historical: "Собравшиеся на конгрессе в [SCOPE.sCountry('lepsius_congress_host_country').GetAltNameNoFlag('RU_CL_PP')] археологи пришли к выводу, что по крайней мере часть гомеровской традиции содержит зерно истины. Даже если Шлиман ошибся в раскопках, есть некоторые доказательства, позволяющие предположить, что Гиссарлык соответствует месту, которое в литературе и историографии общепризнанно считается Троей — остальное дело уточнения деталей."
 lepsius.1129.d_myth: "Конгресс пришёл к выводу, что дебаты о Трое после столетий подошли к концу: предполагаемое открытие Трои укрепило критиков, которые ещё сильнее подозревают, что гомеровские эпосы — чистый вымысел. Что бы ни раскопал Шлиман, это не может быть Троя, потому что её никогда не существовало."
 lepsius.1129.d_disputed: "Позиционная война между учёными в последнее время привела к большому разочарованию и апатии. Решения троянского вопроса не предвидится — они даже не смогли договориться о совместной итоговой декларации. Некоторые представители уехали раньше, другие отсиживались, продолжая бессмысленные дискуссии."
 lepsius.1129.f_homeric: "Сторонники Шлимана сегодня празднуют великий триумф: они с энтузиазмом отправили телеграмму первооткрывателю Трои о том, что все его тезисы будут подтверждены, и он даже станет почётным членом общества. Он определённо раскопал Трою и тем самым предоставил доказательства того, что Троянская война гомеровских эпосов была не вымыслом, не смутным воспоминанием, а историческим событием. Теперь ещё важнее обыскать Эгейский регион в поисках новых артефактов, которые могли бы предоставить ещё больше информации об эпохе, некогда замаскированной под «мифическую». Энтузиазм исследователей должен обеспечить скорейшее начало более интенсивных раскопок для поддержки тезисов Шлимана: возможно, скоро найдутся дом Одиссея, могила Ахилла или ванна, в которой был убит Агамемнон? Удивительно, что Шлиман до сих пор не ответил на телеграмму..."
 lepsius.1129.f_historical: "После долгих дискуссий и немалых уговоров удалось достичь компромисса среди большинства членов конгресса. Подавляющее большинство международного археологического сообщества считает, что Шлиман допустил серьёзные ошибки при раскопках Трои — среди прочего, ясно, что он искал в неправильном слое раскопок. Однако это просто означает, что Шлиман нашёл «неправильную» Трою в «правильном» месте. Другой слой может на самом деле содержать город, который относится ко времени Троянской войны. Археологи в конечном итоге не смогли определить, было ли это реальным историческим событием; Факт в том, что холм, на котором находится Троя, несколько раз становился жертвой пожаров и войн. Что касается идентичности города, то подтверждается тезис о хеттском влиянии. Учёные объявили, что они используют эти результаты как повод для более интенсивных исследований и будут продолжать интенсивно обсуждать троянский вопрос."
 lepsius.1129.f_myth: "После серьёзных споров археологи и историки — некоторые только с большим недовольством — смогли заставить себя подписать совместную декларацию. Согласно ей, они рассматривают гомеровские эпосы только как литературные произведения, которые, возможно, отсылают к более древним событиям, которые, однако, трудно реконструировать для современной археологии. Скорее, может быть, что Троянская война рассматривается как «война как таковая», в которой отразился общечеловеческий опыт. Троя, таким образом, может иметь примерно столько же исторического содержания, сколько и Атлантида: своего рода утопия, литературное место, где разыгрываются идеи. В принципе, конгресс объявил исследование Трои деятельностью «на грани лженауки», которая была и бессмысленной, и бесцельной. Археология должна перейти к более достойным областям."
 lepsius.1129.f_disputed: "«Ну, по крайней мере, еда была хорошей!»"
 lepsius.1129.g: "Так Шлиман действительно нашёл Трою!"
 lepsius.1129.h: "Шлиман раскопал не ту Трою, но место правильное."
 lepsius.1129.i: "Троя, скорее всего, чистый вымысел."
 lepsius.1129.j: "Весь этот конгресс был пустой тратой времени!"
 lepsius.1201.t: "Место раскопок в [SCOPE.sState('lepsius_excavation_site').GetCustom('RU_SL_PP')]"
 lepsius.1201.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] определил[SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'а', '')] новое место раскопок в [SCOPE.sState('lepsius_excavation_site').GetCustom('RU_SL_PP')]. Он и его команда немедленно приступили к работе. Однако пока неясно, как долго будут финансироваться раскопки."
 lepsius.1201.f: "Раскопки могут быть разрешены на 5, 7 или 10 лет. В отличие от раскопок, проводимых за границей, эти нельзя отменить в любое время. Ведущий археолог останется на месте раскопок на 6, 12 или 18 месяцев, в зависимости от срока, до своего возвращения. В это время он будет недоступен."
 lepsius.1201.g: "10 лет."
 lepsius.1201.h: "7 лет."
 lepsius.1201.i: "5 лет."
 lepsius.1202.t: "Профессор [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] возвращается с места раскопок"
 lepsius.1202.d: "Последние несколько месяцев [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] помогал[SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'а', '')] в организации археологических раскопок в [SCOPE.sState('lepsius_excavation_site').GetCustom('RU_SL_PP')] и сделал[SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'а', '')] несколько первоначальных открытий. Он[SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'а', '')] возвращается в свой университет для оценки, в то время как команда продолжает раскопки самостоятельно в течение следующих нескольких лет, пока не закончится финансирование."
 lepsius.1202.f: "«В немногих видах работ результаты так непосредственно зависят от личности работника, как в раскопках. Старая поговорка о том, что человек находит то, что ищет в предмете, слишком верна; или если у него недостаточно проницательности, чтобы обеспечить нахождение того, что он ищет, по крайней мере, печально верно то, что он не находит ничего, чего не ищет». — Флиндерс Питри"
 lepsius.1202.g: "С возвращением."
 lepsius.1203.t: "Местные раскопки завершены"
 lepsius.1203.d: "Раскопочная группа завершила местные раскопки и убрала последние находки. Теперь она снова доступна для других раскопок или экспедиций."
 lepsius.1203.f: "«Темны пути судьбы,\nнеизвестна звезда будущего,\nпрежде чем лечь в постель,\nя с удовольствием выпью коньяку». — Роберт Кольдевей"
 lepsius.1203.g: "Нам следует скоро провести ещё одни раскопки."
 lepsius.1211.t: "Культовые предметы"
 lepsius.1211.d: "Раскопки в [SCOPE.sState('lepsius_excavation_site').GetCustom('RU_SL_PP')] выявили несколько культовых предметов, которым тысячи лет."
 lepsius.1211.f: "Среди находок — статуэтка обнажённой, тучной женщины, чьи бёдра, грудь и ягодицы особенно подчёркнуты."
 lepsius.1211.g: "Это даст нам новые сведения о прошлом."
 lepsius.1212.t: "Керамика"
 lepsius.1212.d: "Археологическая команда в [SCOPE.sState('lepsius_excavation_site').GetCustom('RU_SL_PP')] смогла извлечь несколько керамических изделий, которые хорошо бы смотрелись в музейной коллекции."
 lepsius.1212.f: "Сосуды, найденные археологами, можно было бы назвать примитивными, если бы не знать, что им уже несколько тысяч лет. С этой точки зрения они кажутся прямо-таки изощрёнными. Экспертам уже поручено изучить керамику на предмет остатков краски."
 lepsius.1212.g: "Обращайтесь с ней осторожно!"
 lepsius.1213.t: "Неолитическое поселение"
 lepsius.1213.d: "Археологическая команда в [SCOPE.sState('lepsius_excavation_site').GetCustom('RU_SL_PP')] сообщает хорошие новости: по счастливой случайности они нашли остатки поселения эпохи неолита. Нам обеспечены многочисленные артефакты и новые знания об этой эпохе."
 lepsius.1213.f: "Как оказалось, в поселении уже была частоколоподобная ограда, также удалось нанести на карту колодец и конюшни, а также зернохранилище. Это может быть одно из первых задокументированных поселений в нашей стране."
 lepsius.1213.g: "Археологическая сенсация!"
 lepsius.1214.t: "Человеческие кости"
 lepsius.1214.d: "Археологи нашли человеческие кости во время раскопок, но не могут их точно идентифицировать."
 lepsius.1214.f: "При вскрытии предполагаемого захоронения, помимо принадлежащих ему костей, были найдены и другие ископаемые находки, но они относятся к гораздо более древнему слою. У археологов возникают проблемы с их правильной атрибуцией, и они также считают, что нет никакой связи с их основным проектом. Однако они пришли к выводу, что место, которое они исследуют, значительно старше, чем предполагалось ранее."
 lepsius.1214.g: "Задача для антрополога."
 lepsius.1215.t: "Амбициозные преемники"
 lepsius.1215.d: "Студенты, принимающие участие в раскопках в [SCOPE.sState('lepsius_excavation_site').GetCustom('RU_SL_PP')], проявляют себя как любознательные и амбициозные. Появляется многообещающее поколение молодых археологов."
 lepsius.1215.f: "Новый класс студентов-археологов отличился не только своим особым энтузиазмом. Многие, по-видимому, заинтересованы в том, чтобы пойти по стопам нынешних руководителей раскопок, и не скрывают, что однажды хотят превзойти своего наставника."
 lepsius.1215.g: "Они археологически одарены."
 lepsius.1301.t: "Найдена доисторическая пещера"
 lepsius.1301.d: "После длительного периода исследований [SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'нашла', 'нашёл')] вход в пещеру, в которой он[SelectLocalization(SCOPE.sCharacter('lepsius_archaeologist_scope').IsFemale, 'а', '')] подозревает наличие костей доисторических людей или предков человека."
 lepsius.1301.f: "Доисторические пещеры часто могут содержать окаменелости человеческих или дочеловеческих видов, а также другие находки антропологического или археологического характера. Для оценки находок требуется экспедиция под руководством антрополога. Это исследование может прояснить поиски происхождения человечества."
 lepsius.1301.g: "Эту пещеру следует обследовать как можно скорее."
 lepsius.1302.d: "Случайно местные жители обнаружили вход в таинственную пещеру. Они сообщили об этом чиновнику в соседнем городе, который написал письмо, информирующее администрацию о том, что там есть свидетельства доисторического человеческого присутствия."
 lepsius.1311.t: "Человеческая окаменелость идентифицирована"
 lepsius.1311.d: "После сложного исследования [SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] теперь [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'уверена', 'уверен')], к какому человеческому или дочеловеческому виду может принадлежать найденная окаменелость. Это означает, что для палеоантропологической коллекции была получена ещё одна кость."
 lepsius.1311.f: "Изучение человеческих костей для их идентификации занимает у разных антропологов разное количество времени. Опыт имеет решающее значение. Поэтому первая кость может занять много времени. Чем больше опыта приобретает антрополог, тем эффективнее он или она идентифицирует и ищет кости."
 lepsius.1311.g: "Настоящая каторжная работа."
 lepsius.1321.t: "Кроманьонец изучен"
 lepsius.1321.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'собрала', 'собрал')] достаточно костей, чтобы сделать конкретные выводы о вымершем виде. Кроманьонец больше не является загадкой для науки и теперь может быть с определённой долей уверенности помещён в человеческое родословное древо."
 lepsius.1321.f: "Кроманьонцы были первыми ранними современными людьми (Homo sapiens), поселившимися в Европе, мигрировав из Западной Азии и непрерывно населяя континент, возможно, уже 56 800 лет назад. Они взаимодействовали и скрещивались с коренными неандертальцами (H. neanderthalensis) Европы и Западной Азии, которые вымерли от 40 000 до 35 000 лет назад. Кроманьонцы были анатомически схожи с современными европейцами, жителями Западной Азии и Северной Африки, но были более крепкими, имели больший мозг, более широкие лица, более выраженные надбровные дуги и более крупные зубы. Самые ранние образцы кроманьонцев также демонстрируют некоторые черты, напоминающие те, что встречаются у неандертальцев. Они хорошо известны созданием разнообразных произведений искусства, включая наскальные рисунки, венер, пронзённые жезлы, фигурки животных и геометрические узоры."
 lepsius.1321.g: "Найден ещё один предок."
 lepsius.1322.t: "Homo Neanderthalensis изучен"
 lepsius.1322.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'собрала', 'собрал')] достаточно костей, чтобы сделать конкретные выводы о вымершем виде. Homo Neanderthalensis больше не является загадкой для науки и теперь может быть с определённой долей уверенности помещён в человеческое родословное древо."
 lepsius.1322.f: "Неандертальцы (Homo neanderthalensis или H. sapiens neanderthalensis) — вымерший вид или подвид архаичных людей, которые жили в Евразии примерно до 40 000 лет назад. Типовой образец, Неандерталец 1, был найден в 1856 году в долине Неандер в современной Германии. Линия неандертальцев отделилась от линии современных людей, но когда это произошло, неясно; исследования дали различные датировки от 315 000 до более чем 800 000 лет назад. Хотя знания и восприятие их в научном сообществе заметно изменились, образ неразвитого пещерного человека-архетипа остаётся преобладающим в популярной культуре. Однако технология неандертальцев была довольно сложной, включая мустьерскую каменную индустрию, умение добывать огонь, строить пещерные очаги, изготавливать клейкую берёзовую смолу, создавать по крайней мере простую одежду, похожую на одеяла и пончо, ткать, плавать по Средиземному морю и использовать лекарственные растения. Причины вымирания неандертальцев до сих пор оспариваются."
 lepsius.1323.t: "Homo Erectus изучен"
 lepsius.1323.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'собрала', 'собрал')] достаточно костей, чтобы сделать конкретные выводы о вымершем виде. Homo Erectus больше не является загадкой для науки и теперь может быть с определённой долей уверенности помещён в человеческое родословное древо."
 lepsius.1323.f: "Homo erectus — вымерший вид архаичного человека из плейстоцена, его самое раннее появление около 2 миллионов лет назад. Его образцы относятся к числу первых узнаваемых членов рода Homo. H. erectus был первым предком человека, распространившимся по всей Евразии, с континентальным ареалом, простирающимся от Пиренейского полуострова до Явы. H. erectus имел более современную походку и пропорции тела, и был первым видом человека, у которого было плоское лицо, выступающий нос и, возможно, редкий волосяной покров на теле. Хотя размер мозга этого вида, безусловно, превышает размер мозга предковых видов, объём сильно варьировался в зависимости от популяции. H. erectus приписывают изобретение ашельской каменной индустрии, и они были первыми, кто изготавливал каменные отщепы размером более 10 см и ручные рубила (которые включают двусторонние инструменты только с двумя сторонами, такие как кирки, ножи и тесаки)."
 lepsius.1324.t: "Австралопитек изучен"
 lepsius.1324.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'собрала', 'собрал')] достаточно костей, чтобы сделать конкретные выводы о вымершем виде. Австралопитек больше не является загадкой для науки и теперь может быть с определённой долей уверенности помещён в человеческое родословное древо, даже если остаётся много нерешённых вопросов."
 lepsius.1324.f: "Австралопитек — это род ранних гоминин, существовавший в Африке в плиоцене и раннем плейстоцене. Роды Homo (включающий современных людей), Paranthropus и Kenyanthropus произошли от некоторых видов австралопитеков. Самый ранний известный представитель рода, A. anamensis, существовал в Восточной Африке около 4,2 миллиона лет назад. Австралопитек породил живых потомков, так как род Homo возник из вида австралопитеков где-то между 3 и 2 миллионами лет назад. Самым ранним свидетельством принципиально двуногих гоминин является след окаменелых следов возрастом 3,6 миллиона лет в Лаэтоли, Танзания, который поразительно похож на следы современных людей. Обсуждается, была ли рука австралопитека анатомически способна производить каменные орудия."
 lepsius.1325.t: "Парантроп изучен"
 lepsius.1325.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'собрала', 'собрал')] достаточно костей, чтобы сделать конкретные выводы о вымершем виде. Парантроп больше не является загадкой для науки и теперь может быть с определённой долей уверенности помещён в человеческое родословное древо, даже если остаётся много нерешённых вопросов."
 lepsius.1325.f: "Парантроп — это род вымерших гоминин, который содержит два широко признанных вида: P. robustus и P. boisei. Однако валидность Paranthropus оспаривается, и его иногда считают синонимом Australopithecus. Они жили примерно между 2,9 и 1,2 миллиона лет назад (млн. лет назад) с конца плиоцена до среднего плейстоцена. Парантроп характеризуется массивными черепами с выступающим сагиттальным гребнем, похожим на гребень гориллы, что предполагает сильные жевательные мышцы, и широкими травоядными зубами, используемыми для перемалывания пищи. С ними связывают костяные орудия и оспаривают как самое раннее свидетельство использования огня. Они обычно обитали в лесистых местностях и сосуществовали с некоторыми ранними видами людей, а именно с A. africanus, H. habilis и H. erectus."
 lepsius.1331.t: "Неандерталец"
 lepsius.1331.d: "Исследователь из Боннского университета вместе с научным коллегой сегодня обнародовал открытие вымершего раннего вида человека."
 lepsius.1331.f: "В середине августа 1856 года итальянские рабочие карьера обнаружили несколько фрагментов костей в части долины Неандер, которая недавно стала жертвой добычи известняка. Сначала их небрежно выбросили в щебень, но их заметили владельцы карьера Вильгельм Беккерсхофф и Фридрих Вильгельм Пипер, которые приказали извлечь 16 более крупных фрагментов костей и передали их Иоганну Карлу Фульротту для исследования. Узнав о них из сообщений в прессе, боннский анатом Герман Шаафгаузен также исследовал кости и пришёл к тому же выводу, что и Фульротт ранее: это была древняя форма современных людей. Фульротт и Шаафгаузен представили находку в июне 1857 года на общем собрании Естественно-исторического общества Прусского Рейнланда. Однако их интерпретация не была разделена специалистами. Эта находка, названная Неандерталец 1, является типовым образцом вида Homo neanderthalensis."
 lepsius.1332.t: "Кроманьонец"
 lepsius.1332.d: "Луи Ларте нашёл несколько скелетов доисторических людей, которые значительно больше похожи на современных людей, чем неандертальцы. По названию места Абри-де-Кро-Маньон этих первых европейцев называют кроманьонцами."
 lepsius.1333.t: "Пекинский человек"
 lepsius.1333.d: "Новое открытие ранних людей недалеко от Пекина укрепляет теорию о том, что люди произошли из Азии."
 lepsius.1333.f: "Окаменелости, обнаруженные с 1920-х годов недалеко от Чжоукоудяня, примерно в 40 км к юго-западу от центра Пекина, называют «пекинским человеком» и относят к роду Homo. В 1927 году Дэвидсон Блэк дал ископаемым находкам, в основном на основе одного зуба, новое название вида и рода Sinanthropus pekinensis Black & Zdansky. В 1940 году находки — на основе уже нескольких десятков окаменелостей — были интерпретированы Уилфридом Ле Грос Кларком как тесно связанные с «яванскими людьми» и, как и они, с названием вида и рода Pithecanthropus erectus, выбранным Эженом Дюбуа в 1892 году. Оригинальные окаменелости были утеряны во время Второй мировой войны."
 lepsius.1334.t: "Ребёнок из Таунга"
 lepsius.1334.d: "Австралиец Раймонд Дарт сделал необычайное открытие в Таунге: голова обезьяноподобного ребёнка указывает на прямохождение. Зубы и мозг также кажутся дочеловеческими. Ребёнок из Таунга может быть «недостающим звеном» между людьми и другими приматами."
 lepsius.1335.t: "Пилтдаунский человек"
 lepsius.1335.d: "Два ведущих антрополога сегодня представили открытие, которое может потрясти научный мир: они нашли не что иное, как первого современного человека, который явно произошёл из Англии."
 lepsius.1335.f: "На заседании Геологического общества Лондона Артур Смит Вудворд и Чарльз Доусон объявили, что фрагменты черепа раннего человека, найденные в гравийном карьере недалеко от деревни Пилтдаун, являются эпохальной находкой. Реконструкция Вудворда на основе найденных фрагментов в значительной степени напоминала череп современного человека, за исключением затылка, области на стыке черепа и позвоночника, и размера мозга, который составлял всего около двух третей от мозга современного человека, и лишь приблизительно человекоподобных зубов и челюстной кости. Опираясь на высокий научный авторитет Британского музея, Вудворд интерпретировал пилтдаунские находки как недостающее звено между человекообразными обезьянами и людьми. Несмотря на первоначальные сомнения, учёные из Музея естественной истории в Лондоне определили возраст находки от 200 000 до 500 000 лет. Это сделало бы его значительно старше неандертальцев. Объявление об открытии сразу же вызвало большой интерес как у экспертов, так и у британской общественности. Новость об открытии в Пилтдауне стала сенсацией во всём мире."
 lepsius.1335.g: "Так что первый современный человек был британцем. Совсем не удивительно!"
 lepsius.1335.h: "Эта находка крайне сомнительна."
 lepsius.1342.t: "Пилтдаунский человек — это подделка!"
 lepsius.1342.d: "После тщательного расследования несколькими выдающимися антропологами международного уровня они доказали, что предполагаемые человеческие останки — подделка!"
 lepsius.1342.f: "С момента открытия пилтдаунского человека несколько небританских учёных выражали значительные сомнения в его подлинности и скорее приписывали «открытие» британской потребности в признании — в конце концов, кроманьонец был идентифицирован во Франции, а неандерталец — в Германии, но британского эквивалента не было найдено. Смелая группа из нескольких учёных собралась вместе, чтобы разоблачить открытие как то, чем оно является: настоящим научным мошенничеством! Череп был не только намного моложе, чем утверждалось, и датировался лишь Средневековьем; фальсификатор соединил человеческую верхнюю часть с челюстями орангутана. Можно утверждать, что [SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'сыграла', 'сыграл')] решающую роль в разоблачении этого мошенничества."
 lepsius.1343.f: "С момента открытия пилтдаунского человека несколько небританских учёных выражали значительные сомнения в его подлинности и скорее приписывали «открытие» британской потребности в признании — в конце концов, кроманьонец был идентифицирован во Франции, а неандерталец — в Германии, но британского эквивалента не было найдено. Смелая группа из нескольких учёных собралась вместе, чтобы разоблачить открытие как то, чем оно является: настоящим научным мошенничеством! Череп был не только намного моложе, чем утверждалось, и датировался лишь Средневековьем; фальсификатор соединил человеческую верхнюю часть с челюстями орангутана."
 lepsius.1342.g: "В конце концов, серьёзная наука побеждает."
 lepsius.1343.g: "Международный позор, не имеющий аналогов!"
 lepsius.1401.t: "Исследование пещеры"
 lepsius.1401.d: "Наш антрополог [SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'готова', 'готов')] отправиться на поиски человеческих и дочеловеческих окаменелостей, а также возможных остатков жизни, в доисторическую пещеру. В какую пещеру он должен отправиться?"
 lepsius.1401.f: "Исследования пещер могут проводиться во всех пещерах на территории страны. Находки костей различаются в зависимости от пещеры: в каждой пещере находятся останки только одного человеческого или дочеловеческого вида. Исследование пещеры автоматически прекращается через пять лет. Его можно отменить досрочно, но тогда в конце не будет ни доисторических артефактов, ни костей, ни очков опыта для антрополога."
 lepsius.1401.g: "[SCOPE.sState('lepsius_cave_1').GetName]"
 lepsius.1401.h: "[SCOPE.sState('lepsius_cave_2').GetName]"
 lepsius.1401.i: "[SCOPE.sState('lepsius_cave_3').GetName]"
 lepsius.1401.j: "[SCOPE.sState('lepsius_cave_4').GetName]"
 lepsius.1401.k: "[SCOPE.sState('lepsius_cave_5').GetName]"
 lepsius.1401.l: "[SCOPE.sState('lepsius_cave_6').GetName]"
 lepsius.1401.m: "[SCOPE.sState('lepsius_cave_7').GetName]"
 lepsius.1402.t: "Исследование пещеры завершено"
 lepsius.1402.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'завершила', 'завершил')] свою работу в доисторической пещере в [SCOPE.sState('lepsius_cave_site').GetCustom('RU_SL_PP')]. Результаты исследования поразительны."
 lepsius.1402.f: "Исследование пещеры истекает через пять лет. Антрополога можно немедленно отправить обратно в пещеру — или для идентификации неизвестных костей. Результаты исследования пещеры зависят от опыта антрополога."
 lepsius.1402.g: "С возвращением."
 lepsius.1411.t: "Орудия каменного века"
 lepsius.1411.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'нашла', 'нашёл')] в пещере доисторические каменные орудия, которые могут предоставить информацию о прошлом."
 lepsius.1411.f: "В XIX веке антропология относилась к науке, которая занималась в основном доисторической историей человечества — помимо находок костей, это включало оружие или орудия так называемого каменного века, который в то время был не столько научным термином, сколько эпохой, воспринимаемой как варварская. В ней преобладало клише о примитивном пещерном человеке, а не историческая реальность. Тем не менее, поиски всё большего количества артефактов и останков этого периода давали возможность дифференцировать эту картину в будущие годы и создать настоящую доисторическую археологию."
 lepsius.1411.g: "Изучить орудия."
 lepsius.1411.h: "Им место в музее!"
 lepsius.1412.t: "Странные кости"
 lepsius.1412.d: "Хотя это и его область специализации, профессор [SCOPE.sCharacter('lepsius_anthropologist_scope').GetLastName] не [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'смогла', 'смог')] чётко идентифицировать кости, найденные в пещере [SCOPE.sState('lepsius_cave_site').GetCustom('RU_SL_RP')]. Он идентифицирует их после окончания исследования пещеры."
 lepsius.1412.f: "Обычно антропологи в последнюю очередь могут правильно идентифицировать кости во время исследования пещеры. Если это не так, или если археологи или палеонтологи находят человеческие окаменелости, он может правильно их отнести по возвращении, если ему поручат их идентификацию."
 lepsius.1412.g: "Мы идентифицируем это позже."
 lepsius.1413.t: "Плодотворные исследования"
 lepsius.1413.d: "За последние несколько месяцев [SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'углубила', 'углубил')] свои исследования. Теперь [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'каталогизировала', 'каталогизировал')] многочисленные находки в пещере [SCOPE.sState('lepsius_cave_site').GetCustom('RU_SL_RP')] и [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'задокументировала', 'задокументировал')] систему пещер для будущих поколений."
 lepsius.1413.f: "Как долго существовал человек, было неясно даже на протяжении долгих периодов XIX века. В начале века многие учёные уже отказались от идеи, что человеческая история насчитывает всего несколько тысяч лет; но когда в 1840-х годах Буше де Перт привёл в качестве доказательства того, что люди сосуществовали с вымершими видами млекопитающих, гораздо более древние каменные орудия, его слова остались без внимания. Только неустанный сбор и обработка доисторических останков вскоре дополнят картину того, что люди ходят по миру значительно дольше, чем предполагалось ранее."
 lepsius.1413.g: "Это пойдёт ему на пользу."
 lepsius.1413.h: "Это пойдёт на пользу науке."
 lepsius.1414.t: "Ассистент находит окаменелости"
 lepsius.1414.d: "Студент-ассистент сыграл решающую роль в обеспечении сохранности антропологической находки в пещере в [SCOPE.sState('lepsius_cave_site').GetCustom('RU_SL_PP')]. Однако [SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] указывает, что как руководитель исследования [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'она', 'он')] несёт ответственность за открытие."
 lepsius.1414.f: "«Помните историю о сообразительном молодом афинянине, которого мучил зуд славы? Он обратился к Оракулу и спросил: „Что мне делать, чтобы стать великим человеком?“ Оракул ответил: „Убей одного!“» — Ричард Оуэн."
 lepsius.1414.g: "Это открытие сделал молодой антрополог."
 lepsius.1414.h: "Это открытие сделал наш старший антрополог."
 lepsius.1415.t: "Человеческие кости"
 lepsius.1415.d: "Наш антрополог нашёл дополнительные кости во время исследования пещеры."
 lepsius.1415.f: "Общепринятое мнение гласит, что в XIX и начале XX веков было найдено лишь несколько человеческих окаменелостей. Это лишь отчасти правда. Часто случалось, что ряд находок костей ранних людей не были признаны таковыми. Хотя название «неандерталец» происходит от места в долине Неандер, кости неандертальцев находили уже несколько раз до этого. Даже после открытия важные учёные, такие как Рудольф Вирхов, ставили под сомнение их подлинность и возраст. Проблема была не в количестве находок, а скорее в их проверке как подлинных человеческих останков древних времён."
 lepsius.1415.g: "Вкуснятина."
 lepsius.1416.t: "Наскальные рисунки"
 lepsius.1416.d: "Пещера в [SCOPE.sState('lepsius_cave_site').GetCustom('RU_SL_PP')] содержит резьбу и изображения, которым тысячи лет. Однако их значение и происхождение остаются загадкой."
 lepsius.1416.f: "С началом доисторической археологии и антропологии, на основе теории эволюции, предполагалось, что люди более ранних времён не знали абстрактных понятий. Поэтому художественное самовыражение исключалось. Это убеждение привело к тому, что когда были обнаружены наскальные рисунки — наиболее известный пример в Альтамире — их сочли подделками. Только после того, как около 1900 года появилось всё больше и больше наскальных рисунков, особенно на юго-западе Франции, учёные пришли к выводу, что они должны быть подлинными."
 lepsius.1416.g: "Наши предки были не так примитивны, как мы думали."
 lepsius.1417.t: "Росписи Альтамиры"
 lepsius.1417.d: "При исследовании пещеры Альтамира [SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'сделала', 'сделал')] исключительное открытие: потолки расписаны великолепными рисунками. Антрополог считает, что им должно быть более 10 000 лет. Однако его открытие оспаривается."
 lepsius.1417.f: "Наскальные рисунки Альтамиры считаются поворотными в доисторической археологии и антропологии. Их художественное совершенство и состояние сохранности считались слишком хорошими для эпохи, которая в значительной степени считалась примитивной. Когда дочь Марселино Санса де Саутуолы обнаружила их, Саутуола правильно определил их как доисторические рисунки каменного века. Он раскопал пещеру вместе с Хуаном Вилановой-и-Пьера, но их публикация была отвергнута ведущими учёными. Некоторые даже обвинили Саутуолу в подделке. Потребуется ещё 20 лет, чтобы подтвердить его открытие, но он умер до того, как его репутация была восстановлена."
 lepsius.1421.t: "Иностранный антрополог посещает [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]"
 lepsius.1421.d: "[SCOPE.sCountry('lepsius_anthropological_guest').GetName] отправил[SCOPE.sCountry('lepsius_anthropological_guest').GetAltNameNoFormatting('RU_CL_END_FEM')] своего лучшего антрополога для исследования доисторической пещеры. Теперь нам остаётся только выбрать пещеру."
 lepsius.1421.f: "Исследования пещер могут проводиться во всех пещерах на территории страны. Находки костей различаются в зависимости от пещеры: в каждой пещере находятся останки только одного человеческого или дочеловеческого вида. Исследования пещер под руководством иностранных антропологов заканчиваются через три года. Результаты значительно ниже, чем при обычном исследовании пещеры: принимающая страна и страна-гость получают небольшое количество человеческих окаменелостей, а также одну особую кость раннего человека. Кроме того, на выбор предлагаются только три случайные пещеры."
