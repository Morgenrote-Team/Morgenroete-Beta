 lepsius.1502_mauer_t: "#T Homo Heidelbergensis#!, открыт [SCOPE.sCountry('lepsius_heidelbergensis_finder_country').GetAltNameNoFlag('RU_CL_TP')]"
 lepsius.1502_mauer_d: "\nНижняя челюсть Homo heidelbergensis была обнаружена недалеко от Гейдельберга и считается самым древним свидетельством раннего человека в Европе и знаменует важный переход между Homo erectus и более поздними гомининами."
