 andersson_anthropologist_achievement_completed_heidelbergensis_anthropologist_loc: "Из нескольких окаменелостей и благодаря использованию современных инструментов и своего собственного несравненного гения, профессор [GetPlayer.MakeScope.Var('lepsius_anthropologist_var').GetCharacter.GetLastNameNoFormatting] первым классифицировал[SelectLocalization(GetPlayer.MakeScope.Var('lepsius_anthropologist_scope').IsFemale, 'а', '')] #o Homo Heidelbergensis#!."
