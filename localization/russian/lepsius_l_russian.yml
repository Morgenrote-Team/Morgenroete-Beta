 je_lepsius_discovery_pakal: "Расследования на Юкатане"
 je_lepsius_discovery_pakal_reason: "У нас есть все основания полагать, что ещё не все тайны майя разгаданы. Поиски могут занять у нас годы. Тот, кому удастся совершить это открытие, должен занять своё место в истории."
 je_lepsius_disovery_pakal_success: "Если нам удастся найти десять подсказок на Юкатане, мы соберём достаточно материала, чтобы заново открыть утерянное место большой исторической значимости."
 je_lepsius_disovery_pakal_fail: "Наши усилия будут напрасны, если другая нация найдёт десять подсказок на Юкатане раньше нас."
 je_lepsius_archaoelogical_society: "Основать археологическое общество"
 je_lepsius_archaoelogical_society_reason: "В нашей нации постоянно растёт не только интерес к археологии. После многих лет экспедиций, раскопок и находок артефактов наша страна накопила удивительный археологический опыт. Выдающийся [concept_lepsius_archaeologist] мог бы основать археологическое общество, чтобы собрать научные и интеллектуальные силы и дать новый импульс. Это не только улучшит наши научные результаты, но и повысит опыт последующих поколений археологов."
