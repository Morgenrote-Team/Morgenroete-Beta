 andersson_anthropologist_desc: "Антропологи полезны при изучении древнейшей истории человека: от эволюции в Африке до людей каменного века."
 andersson_anthropologist_experienced_desc: "Этот антрополог уже добился заметных результатов в области древнейшей истории человека и считается авторитетным учёным."
 andersson_anthropologist_famous_desc: "Многочисленные работы этого исследователя в области антропологии сделали его одной из важнейших международных фигур в своей области."
