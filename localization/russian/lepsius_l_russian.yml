 je_lepsius_labyrinth: "Лабиринт"
 je_lepsius_labyrinth_reason: "Руководитель нашей критской экспедиции заблудился в древнем подземном комплексе, который не значится ни в каких документах о раскопках. Если он выберется, его ждут слава и почёт; если нет, он может здесь погибнуть."
 je_lepsius_labyrinth_fail: "Если наш руководитель экспедиции будет слишком часто теряться, есть риск, что с ним случится что-то очень, очень плохое..."
 je_lepsius_labyrinth_success: "Только если руководитель экспедиции найдёт правильный ответ в каждой точке, он сможет благополучно покинуть лабиринт."
 je_ishtar_gate: "Реконструкция ворот Иштар"
 je_ishtar_gate_reason: "После того как экспедиция в Вавилонию обнаружила остатки легендарных ворот Иштар, мы продлили нашу лицензию на раскопки, чтобы доставить вавилонские кирпичи в наш музей."
 je_ishtar_gate_success: "Для восстановления ворот в их былом великолепии необходимо 200 000 кирпичей. Ожидается, что ежегодно к нам будет поступать около 20 000 кирпичей — если не возникнет проблем."
 je_ishtar_gate_goal: ""
 je_lepsius_priams_treasure: "Сокровище Приама"
 je_lepsius_priams_treasure_reason: "Генрих Шлиман ищет подходящее место для легендарного сокровища Приама, которое, по его утверждению, он нашёл в Трое. Хотя серьёзные учёные сомневаются, что эти находки действительно соответствуют временной эпохе, которую предлагает Шлиман, это вторично. В конце концов, это уникальная возможность завладеть одним из величайших археологических сокровищ века. Наш музей был бы идеальным местом для этого."
 je_lepsius_priams_treasure_fail: "Если конкурент окажется быстрее нас в выполнении желаний Шлимана, мы упустим уникальный шанс получить сокровище Приама."
 je_lepsius_the_labyrinth: "Лабиринт"
 je_lepsius_the_labyrinth_reason: "Запертый в странном, древнем лабиринте, наш [concept_lepsius_archaeologist|l] должен найти выход. Если он совершит слишком много ошибок, он рискует навсегда заблудиться там!"
 je_lepsius_the_labyrinth_goal: "Выбраться из лабиринта, не слишком заблудившись."
 je_lepsius_discovery_tut: "Расследование в Долине Царей"
 je_lepsius_discovery_tut_reason: "У нас есть все основания полагать, что в Долине Царей может находиться скрытое место большой исторической ценности. Поиски могут занять у нас годы. Тот, кому удастся совершить это открытие, должен занять своё место в истории."
