 je_lepsius_excavation_harappa: "Раскопки Хараппы"
 je_lepsius_excavation_harappa_reason: "#T Руины Хараппы в долине Инда - увлекательное место для археологов.#!\n$mr_divider_for_je$\nКаждый месяц вы будете получать прогресс в зависимости от многих различных факторов. В определённые моменты раскопок вы будете получать событие, дающее вам [Concept('concept_lepsius_artifact','артефакты')], опыт и изменяющее черту области, что приводит к увеличению дохода от [Concept('concept_curtiss_tourism','туризма')].\n$mr_divider_for_je$\n$lepsius_excavation_progress_loc$"
 je_lepsius_excavation_harappa_0_loc: "Руины всё ещё в основном в том состоянии, в котором они были веками."
 je_lepsius_excavation_harappa_1_loc: "Недавние раскопки и частичное восстановление храма Бэла привлекли больше людей, желающих посетить древний объект."
 je_lepsius_excavation_harappa_2_loc: "Наши археологи раскопали и частично восстановили городскую планировку, цитадель, дренажную систему и многие другие места. Это привлекает всё больше посетителей."
 lepsius.5020.t: "Объект Хараппа"
 lepsius.5020.d: "Мы пока мало знаем об объекте Хараппа, но наши археологи с нетерпением ждут, чтобы раскопать тайны древнего города."
 lepsius.5020.f: "На данный момент неизвестно, насколько сильно пострадал объект за всё это время. Но наши археологические группы уже готовятся к раскопкам и исследуют различные места, чтобы определить, где копать будет наиболее перспективно."
 lepsius.5020.g: "Объект большой важности для Индии"
 lepsius.5021.t: "Город с сетчатой планировкой"
 lepsius.5021.d: "В ходе раскопок обнаружен город с сетчатой планировкой. Он, должно быть, был огромен, и мы пока не знаем, сколько людей могло здесь когда-то жить."
 lepsius.5021.f: "«Удивительно, что помимо Месопотамии и Египта существовало ещё одно место, где зародилась цивилизация. Я бы никогда не подумал, что именно Индия могла быть домом для одного из крупнейших городов бронзового века в мире». - Один из ваших археологов"
 lepsius.5021.g: "Новая колыбель цивилизации"
 lepsius.5022.t: "Стены Хараппы"
 lepsius.5022.d: "Наши археологи раскопали место, которое теперь называют Цитаделью. Пока неясно, зачем жителям Хараппы понадобился укреплённый район в их городе."
 lepsius.5022.f: "«Я абсолютно уверен, что они боялись вторжения морских народов!»\n«Морские народы были в Средиземноморье, а не здесь! Я думаю, им приходилось защищать свою еду от этих надоедливых крестьян!»\n«Я в этом сильно сомневаюсь. Они, должно быть, воздвигли укреплённый храм для своих богов!»"
 lepsius.5022.g: "Это увлекательно!"
 lepsius.5023.t: "Дренажная система Хараппы"
 lepsius.5023.d: "Наши раскопки выявили сложную систему водоотведения и удаления отходов. Похоже, некоторые туалеты даже были подключены к этой сети стоков."
 lepsius.5023.f: "«У меня даже нет такого современного туалета, как у хараппцев! Они, должно быть, были чрезвычайно развиты!»"
 lepsius.5023.g: "И подумать только, что мы до сих пор боремся со сточными водами..."
 je_lepsius_petra: "Петра - наследие набатеев"
 je_lepsius_petra_reason: "Около 1800 года лишь немногие учёные знали о легендарном городе, высеченном в скале на Ближнем Востоке. Петра была заново открыта только в 1812 году швейцарским путешественником по Аравии Иоганном Людвигом Буркхардтом. Хотя впоследствии многие путешественники посещали это место, детальное археологическое исследование Петры всё ещё предстоит."
 lepsius.77.t: "Наследие набатеев"
 lepsius.77.d: "Доктор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('lepsius_lepsius_archaeologist_var').IsFemale, 'провела', 'провёл')] первое серьёзное археологическое исследование города Петра и извлёк реликвии прошлого. Вдохновляющий научный акт!"
 lepsius.77.f: "Петра, руины в современной Иордании, в древности была столицей Набатейского царства. Благодаря своим монументальным погребальным храмам, фасады которых были высечены прямо из скалы, она считается уникальным культурным памятником. История города тесно связана с историей Набатейского царства, первой арабской империи в истории. Однако, кроме ряда надписей, набатеи почти не оставили собственных письменных свидетельств. Их история и история Петры, таким образом, могут быть поняты лишь фрагментарно и косвенно через библейские, греческие и римские источники. Самое известное здание в Петре - это почти 40-метровый и 25-метровый Хазне аль-Фираун, построенный в эллинистическом стиле. «Сокровищница фараона», как её называли бедуины, на самом деле была одной из многочисленных скальных гробниц. Возможно, она была создана для набатейского царя Ареты IV, правившего в I веке до н.э. Другие исследователи, однако, датируют Хазне только II веком н.э., временем императора Адриана."
 lepsius.77.g: "Это место, где также можно было бы спрятать христианские оккультные артефакты."
