l_russian:
 test_event_title:0 "Тест"
 test_event_desc:0 "Тест"
 test_event_flavor:0 "Тест"
 test_event.a:0 "Тест"
 test_event.b:0 "Тест"
 MFE_political_events.1.t:0 "Анонимные статьи в газете"
 MFE_political_events.1.d:0 "Представители #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('ig_intelligentsia').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('ig_intelligentsia').GetCustom('RU_IG_RP')]#!#!, ободрённые текущим политическим климатом, публикуют в газетах оскорбительные антиправительственные пасквили."
 MFE_political_events.1.f:0 "«Какую пользу в наше время приносит народу [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]? Мы видим для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] более смелое будущее, наконец-то освобождённое от власти тиранов»."
 MFE_political_events.1.a:0 "Подавить это - эти обвинения безумны!"
 MFE_political_events.1.b:0 "Позволить публикациям свободно распространяться."
 MFE_political_events.2.t:0 "Преследования на местных выборах"
 MFE_political_events.2.d:0 "Политическая напряжённость в столице, городе [ROOT.GetCountry.GetCapital.GetName], достигла высокого уровня, что привело к нападениям на местные отделения партийных газет."
 MFE_political_events.2.f:0 "«Я видел их всех, сторонников партии «[SCOPE.sParty('harassing_party').GetName]», вооружённых ломами и топорами - говорили, что собираются разгромить типографии партии «[SCOPE.sParty('harassed_party').GetName]» и избить любого, кто встанет у них на пути»."
 MFE_political_events.2.a:0 "Защитить партию «[SCOPE.sParty('harassed_party').GetName]»."
 MFE_political_events.2.b:0 "Осудить толпы сторонников партии «[SCOPE.sParty('harassing_party').GetName]»."
 MFE_political_events.3.t:0 "Мошенничество на выборах"
 MFE_political_events.3.d:0 "Результаты выборов в столице, городе [ROOT.GetCountry.GetCapital.GetName], были омрачены обвинениями в подтасовке бюллетеней и подкупе голосов со стороны оппозиции."
 MFE_political_events.3.f:0 "«Сколько раз я вас сегодня видел, молодой человек? Мог бы поклясться, что вы здесь уже были...»"
 MFE_political_events.3.a:0 "Партия «[SCOPE.sParty('party_1').GetName]» явно подделала эти голоса..."
 MFE_political_events.3.b:0 "Партии «[SCOPE.sParty('party_2').GetName]» нельзя доверять в таких вопросах..."
 MFE_political_events.4.t:0 "Рабочий комитет"
 MFE_political_events.4.d:0 "Рабочие, связанные с #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('ig_tradeunions').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('ig_tradeunions').GetCustom('RU_IG_TP')]#!#!, в [SCOPE.sState('workers_state').GetCustom('RU_SL_PP')] сформировали комитет и агитируют за расширение прав на рабочем месте."
 MFE_political_events.4.f:0 "«Двенадцатичасовые смены на заводах бесчеловечны, это оскорбление человеческого достоинства; я говорю вам, рабочий, что возможен и другой путь»."
 MFE_political_events.4.a:0 "Мы позволим им собираться... пока что."
 MFE_political_events.4.b:0 "Это неприемлемо! Эти собрания не могут продолжаться."
 MFE_political_events.5.t:0 "Конфликт с местным руководством"
 MFE_political_events.5.d:0 "Профсоюз рабочих мельницы в одной из наших провинций протестует против управляющего мельницей, обвинённого в жестоком обращении с рабочими - он дошёл до того, что избивал их тростями всякий раз, когда они подпадали под его весьма личное определение лени. Мы могли бы уволить управляющего, но владелец мельницы настаивает, что тот очень хорошо справляется с работой."
 MFE_political_events.5.f:0 "Так что нам нужно его убрать. Не просто убрать, а убрать навсегда. Понимаете? Он нам больше не нужен. От него одни неприятности, вот что я вам скажу."
 MFE_political_events.5.a:0 "С этим ничего нельзя поделать..."
 MFE_political_events.5.b:0 "Нужно немедленно вмешаться."
 MFE_political_events.6.t:0 "Проведено публичное собрание"
 MFE_political_events.6.d:0 "Следуя примеру соседних столиц, [SCOPE.gsInterestGroup('ig_trade_unions').GetName] в городе [ROOT.GetCountry.GetCapital.GetName] начали проводить публичные собрания."
 MFE_political_events.6.f:0 "«Сила одного человека - ничто, но когда мы объединимся, почему... власти [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] будут вынуждены нас слушать»."
 MFE_political_events.6.a:0 "Эти собрания безвредны... позвольте им продолжаться."
 MFE_political_events.6.b:0 "Сделать всё возможное, чтобы предотвратить эту деятельность."
 MFE_political_events.7.t:0 "Нападение на работный дом"
 MFE_political_events.7.d:0 "Демонстрации в [SCOPE.sState('attacked_state').GetCustom('RU_SL_PP')] вышли из-под контроля, что привело к насилию на улицах."
 MFE_political_events.7.f:0 "«Проклятая чернь со сталелитейного завода начала собираться у фабрики, и прежде чем полиция успела прибыть, чтобы разогнать толпу, произошло... ну, вы знаете, что произошло»."
 MFE_political_events.7.a:0 "Демократия по своей сути - дело грязное."
 MFE_political_events.7.b:0 "Сделать всё возможное, чтобы помочь."
 MFE_political_events.8.t:0 "Забастовка в работном доме"
 MFE_political_events.8.d:0 "Невыплата заработной платы в сочетании с нехваткой хлеба в столице, городе [ROOT.GetCountry.GetCapital.GetName], привела к забастовке рабочих."
 MFE_political_events.8.f:0 "«Как можно ожидать, что мы будем трудиться от рассвета до заката с задержками зарплаты и пустыми желудками? На баррикады, товарищ!»"
 MFE_political_events.8.a:0 "Послать полицию!"
 MFE_political_events.8.b:0 "Ничего страшного..."
 MFE_political_events.9.t:0 "Профессор критикует избирательные системы"
 MFE_political_events.9.d:0 "Университетский профессор [SCOPE.sCharacter('professor').GetFullName], [SelectLocalization(SCOPE.sCharacter('professor').IsFemale, 'известная', 'известный')] в среде #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('ig_intelligentsia').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('ig_intelligentsia').GetCustom('RU_IG_RP')]#!#!, в серии публичных лекций подвергает резкой критике выборы в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]."
 MFE_political_events.9.f:0 "«Теперь я обращаю ваше внимание на эти тонкости, при дальнейшем рассмотрении которых станет очевидно, что система несостоятельна, пока у власти [ROOT.GetCountry.GetRuler.GetFullName]»."
 MFE_political_events.9.a:0 "Это веские аргументы..."
 MFE_political_events.9.b:0 "Пусть [SCOPE.sCharacter('professor').GetFullName] воздержится от публичных выступлений."
 MFE_political_events.10.t:0 "Переговоры о торговой политике"
 MFE_political_events.10.d:0 "После периода острых дебатов в столице, городе [ROOT.GetCountry.GetCapital.GetName], наконец-то наметился прорыв в переговорах о торговой политике."
 MFE_political_events.10.f:0 "«Хороший компромисс оставляет обе стороны неудовлетворёнными, как говорится. К счастью, от нынешних соглашений выиграют все - поистине, мастерская демонстрация дипломатического искусства»."
 MFE_political_events.10.a:0 "Это благодаря #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('ig_industrialists').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('ig_industrialists').GetCustom('RU_IG_DP')]#!#!"
 MFE_political_events.10.b:0 "[ROOT.GetCountry.GetRuler.GetFullName] в одиночку этого [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'добилась', 'добился')]!"
 MFE_political_events.11.t:0 "Хлебные бунты"
 MFE_political_events.11.d:0 "Нехватка зерна за границей привела к резкому росту цен на хлеб в [SCOPE.sState('bread_riot_state').GetCustom('RU_SL_PP')]."
 MFE_political_events.11.f:0 "«Раньше за полпенни можно было купить три буханки, а теперь? Вам повезёт, если вы вообще найдёте открытую пекарню»."
 MFE_political_events.11.a:0 "Государство попытается утолить их голод."
 MFE_political_events.11.b:0 "Если они хотят хлеба, пусть покупают!"
 MFE_political_events.12.t:0 "Тяжёлые времена на ферме"
 MFE_political_events.12.d:0 "Засуха в [SCOPE.sState('bread_queue_state').GetCustom('RU_SL_PP')] начинает разорять местных фермеров, что приводит к кризису в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]."
 MFE_political_events.12.f:0 "«Дождь? Мы его здесь, в [SCOPE.sState('bread_queue_state').GetCustom('RU_SL_PP')], уже несколько месяцев не видели. Посевная была очень тяжёлой для нас... мы всё потеряем»."
 MFE_political_events.12.a:0 "Немедленно отправить помощь."
 MFE_political_events.12.b:0 "Ну что ж, они сами разберутся."
 MFE_political_events.13.t:0 "Оружие пересекает границу"
 MFE_political_events.13.d:0 "Ходят слухи, что недобросовестные торговцы наводняют [SCOPE.sState('neighbor_neighbor_state').GetCustom('RU_SL_VP')] оружием, повышая вероятность насилия."
 MFE_political_events.13.f:0 "«[SCOPE.sState('neighbor_neighbor_state').GetName] сейчас - это пороховая бочка, и достаточно одной искры, чтобы разжечь большой пожар»."
 MFE_political_events.13.a:0 "На свободном рынке мало что можно сделать..."
 MFE_political_events.13.b:0 "Потребовать, чтобы они немедленно прекратили!"
 MFE_political_events.14.t:0 "Крах местного предприятия"
 MFE_political_events.14.d:0 "Промышленная авария в [SCOPE.sState('failing_building').GetCustom('RU_SL_PP')] попала в международные заголовки; в результате взрыва на заводе погибло тридцать два рабочих."
 MFE_political_events.14.f:0 "«Откуда нам было знать, что котлы взорвутся? Забудьте о #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('ig_trade_unions').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('ig_trade_unions').GetCustom('RU_IG_PP')]#!#! - пройдут месяцы, прежде чем предприятие снова заработает!»"
 MFE_political_events.14.a:0 "Отправить деньги администраторам области."
 MFE_political_events.14.b:0 "Мы должны поддержать народ."
 MFE_political_events.15.t:0 "Призывная кампания"
 MFE_political_events.15.d:0 "Взрыв ура-патриотизма в [SCOPE.sState('conscription_state').GetCustom('RU_SL_PP')] привёл к беспрецедентному количеству добровольцев-призывников."
 MFE_political_events.15.f:0 "«Нет ничего плохого в том, чтобы дать парням немного вкусить славы - они всё равно вернутся домой к Рождеству»."
 MFE_political_events.15.a:0 "Провести призывную кампанию."
 MFE_political_events.15.b:0 "Нам не нужны лишние солдаты."
 MFE_political_events.16.t:0 "Светская политика"
 MFE_political_events.16.d:0 "Религиозный деятель с некоторой известностью, [SCOPE.sCharacter('ig_leader').GetFullName], публично призывает правительство [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] делать больше для поддержки беднейших слоёв общества."
 MFE_political_events.16.f:0 "«Как может [ROOT.GetCountry.GetRuler.GetFullName], [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'живущая', 'живущий')] в роскоши в столице, городе [ROOT.GetCountry.GetCapital.GetName], знать, каково это - чувствовать горечь нищеты? Наше руководство оторвано от народа»."
 MFE_political_events.16.a:0 "«Убедить» церковь молчать."
 MFE_political_events.16.b:0 "Неужели у них нет веры в нашу политику?!"
 MFE_political_events.17.t:0 "Протекционистское лобби"
 MFE_political_events.17.d:0 "Политические силы, связанные с протекционистским лобби, предложили смелую серию реформ, вызвав дебаты по всей стране."
 MFE_political_events.17.f:0 "«Инициатива на нашей стороне, дорогие друзья, - мы должны ковать железо, пока горячо, и завладеть воображением народа!»"
 MFE_political_events.17.a:0 "Возможно, мы можем ввести ещё несколько ограничений..."
 MFE_political_events.17.b:0 "Да кто они такие..."
 MFE_political_events.18.t:0 "Общество свободной торговли и отмены пошлин"
 MFE_political_events.18.d:0 "Группа смутьянов, называющая себя «Обществом свободной торговли и отмены пошлин», обосновалась в столице, городе [ROOT.GetCountry.GetCapital.GetName], и издаёт подстрекательские брошюры."
 MFE_political_events.18.f:0 "«Пришло время разрушить искусственные границы и позволить торговле свободно течь между народами Земли. Устраните необходимость в надзоре, и простой человек восторжествует!»"
 MFE_political_events.18.a:0 "Свободная торговля может быть хорошей идеей..."
 MFE_political_events.18.b:0 "Партия «[SCOPE.sParty('liberal_party').GetName]» не будет диктовать нам свою политику!"
 MFE_political_events.19.t:0 "Свободная торговля и мораль"
 MFE_political_events.19.d:0 "Редакционная коллегия одной из газет в столице, городе [ROOT.GetCountry.GetCapital.GetName], публикует серию статей о свободной торговле, вызывая гневные волнения среди крестьянства."
 MFE_political_events.19.f:0 "«Почему мы, простые люди, должны платить обременительные налоги на всё? Разве мы не настрадались достаточно при нынешнем режиме? Принять свободную торговлю - это наш моральный долг»."
 MFE_political_events.19.a:0 "Свободная торговля - это путь в будущее."
 MFE_political_events.19.b:0 "На данный момент ничего не изменится."
 MFE_political_events.20.t:0 "Реформа профсоюзов"
 MFE_political_events.20.d:0 "Представители #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('ig_trade_unions').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('ig_trade_unions').GetCustom('RU_IG_RP')]#!#! предлагают радикальные реформы."
 MFE_political_events.20.f:0 "Законодатель с деловыми связями, [SCOPE.sCharacter('trade_leader').GetFullName], использует своё политическое влияние, чтобы протолкнуть пакет реформ, которые принесут выгоду [SCOPE.sCharacter('trade_leader').GetHerHis] предприятиям."
 MFE_political_events.20.a:0 "Это предложение не может быть принято."
 MFE_political_events.20.b:0 "Мы их успокоим... пока что."
 MFE_political_events.21.t:0 "Бюро цензуры перегружено"
 MFE_political_events.21.d:0 "Бюро цензуры направило письмо, адресатом которого является [ROOT.GetCountry.GetRuler.GetFullName]."
 MFE_political_events.21.f:0 "«Каждое утро мы получаем более тысячи документов - газет, ведомостей, политических трактатов, личной переписки, - которые необходимо прочитать, а у нас просто не хватает на это людей»."
 MFE_political_events.21.a:0 "Что ж... нам нужно цензурировать народ."
 MFE_political_events.21.b:0 "Скажите им, чтобы обходились имеющимися ресурсами."
 MFE_political_events.22.t:0 "Критика свободного рынка"
 MFE_political_events.22.d:0 "Споры о торговле поглотили наш народ, и кажется, что каждый занял чью-то сторону."
 MFE_political_events.22.f:0 "«Наше правительство больше заботится о #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('ig_industrialists').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('ig_industrialists').GetCustom('RU_IG_PP')]#!#!, чем о собственном народе! Как нам выжить на таком беспощадном рынке?»"
 MFE_political_events.22.a:0 "Свободный рынок - единственный путь вперёд!"
 MFE_political_events.22.b:0 "Времена изменились... вы должны приспосабливаться."
 MFE_political_events.23.t:0 "Конвенция против рабства"
 MFE_political_events.23.d:0 "Вопрос #Y рабства#! раскалывает общество в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]; всё больше голосов критикуют этот институт, но укоренившиеся интересы яростно сопротивляются любым изменениям статус-кво."
 MFE_political_events.23.f:0 "«Это щекотливый вопрос, который лучше пока не трогать. Кто, например, будет компенсировать рабовладельцам потерю их собственности? Мы даже не можем позволить себе обсуждать это в данный момент»."
 MFE_political_events.23.a:0 "Мы мало что можем сделать."
 MFE_political_events.23.b:0 "Да, рабство - это действительно очень плохо."
 MFE_political_events.24.t:0 "Образование для женщин"
 MFE_political_events.24.d:0 "Влиятельные общественные клубы в столице, городе [ROOT.GetCountry.GetCapital.GetName], настаивают на расширении прав женщин, особенно в академической сфере."
 MFE_political_events.24.f:0 "«Почему нашим дочерям должно быть отказано в образовании? Разве они не являются полноценными членами общества [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]?»"
 MFE_political_events.24.a:0 "Образование - это фундаментальное право!"
 MFE_political_events.24.b:0 "Постепенные изменения - более безопасный путь к прогрессу."
 MFE_political_events.25.t:0 "Голодовка"
 MFE_political_events.25.d:0 "В столице, городе [ROOT.GetCountry.GetCapital.GetName], проходит массовая голодовка рабочих при поддержке #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('ig_industrialists').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('ig_industrialists').GetCustom('RU_IG_RP')]#!#!."
 MFE_political_events.25.f:0 "«Как можно ожидать, что мы будем работать по двенадцать часов без перерыва на еду? Если наши начальники продолжат отказывать нам в пропитании в рабочее время, то мы отказываемся есть, пока эта политика не изменится!»"
 MFE_political_events.25.a:0 "В их словах есть смысл... в конце концов, обед важен."
 MFE_political_events.25.b:0 "Арестовать этих смутьянов."
 MFE_political_events.26.t:0 "Местный поэт"
 MFE_political_events.26.f:0 "«А теперь отрывок из „Радостного восторга юных Вертеров“... кхм.\n\nПрошу, юная дева с золотыми локонами,/Просвети меня; где ты купила эти носки?/Ибо мои босые ноги холодны, как камни,/И грозят пробрать меня до костей»."
 MFE_political_events.26.a:0 "Мы должны нанять его для обучения наших студентов."
 MFE_political_events.26.b:0 "Нам следует сосредоточиться на практических вопросах, а не на „искусстве“."
 MFE_political_events.27.t:0 "Подпольная газета"
 MFE_political_events.27.d:0 "Некоторые анонимные члены #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('ig_intelligentsia').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('ig_intelligentsia').GetCustom('RU_IG_RP')]#!#! самостоятельно издают газеты, в которых [ROOT.GetCountry.GetRuler.GetFullName] становится объектом насмешек."
 MFE_political_events.27.f:0 "«На шестой странице - комикс, где [ROOT.GetCountry.GetRuler.GetFirstName] без одежды пьёт из свиного корыта, с подписью „Хрю-хрю! Я съем любые помои, которыми меня накормят промышленники!“»"
 MFE_political_events.27.a:0 "Невероятная грязь! Немедленно запретить."
 MFE_political_events.27.b:0 "Позволить публикациям свободно распространяться."
 MFE_political_events.28.t:0 "Дворяне подстрекают крестьянство"
 MFE_political_events.28.d:0 "[SCOPE.sCulture('discriminated_culture').GetName] в нашей стране жалуются на притеснения со стороны дворянства."
 MFE_political_events.28.f:0 "Среди высших классов распространено мнение, что [SCOPE.sCulture('discriminated_culture').GetName] в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] годятся только на то, чтобы копать отхожие места и погонять мулов, ибо пахнут они как канализация и спят в конюшнях."
 MFE_political_events.28.a:0 "Это на самом деле довольно смешно."
 MFE_political_events.28.b:0 "Хватит оскорблений! [SCOPE.sCulture('discriminated_culture').GetName] получат нашу поддержку."
 MFE_political_events.29.t:0 "Недовольство местных торговцев"
 MFE_political_events.29.d:0 "Наплыв дешёвых иностранных товаров в столицу, город [ROOT.GetCountry.GetCapital.GetName], привёл в ярость местных торговцев, которые утверждают, что их разоряют."
 MFE_political_events.29.f:0 "«Если с этим ничего не сделать, у нас не останется выбора, кроме как агитировать за политические реформы - как честному бизнесмену в наши дни преуспеть?»"
 MFE_political_events.29.a:0 "Поддержать свободную торговлю!"
 MFE_political_events.29.b:0 "Нашим рынкам нужны все возможные преимущества!"
 MFE_political_events.26.d: "[SCOPE.sCharacter('manzoni_new_writer_scope').GetFullName], [SelectLocalization(SCOPE.sCharacter('manzoni_new_writer_scope').IsFemale, 'поэтесса', 'поэт')], [SelectLocalization(SCOPE.sCharacter('manzoni_new_writer_scope').IsFemale, 'прибыла', 'прибыл')] в столицу, город [ROOT.GetCountry.GetCapital.GetName], с лекционным туром для продвижения своего последнего сборника."
 MFE_political_events.26.g: "В конце концов, [SelectLocalization(SCOPE.sCharacter('manzoni_new_writer_scope').IsFemale, 'она', 'он')] может оказаться настоящим талантом."