l_russian:
 MFE_workplace_events.1.t: "Несчастный случай на шахте"
 MFE_workplace_events.1.d: "На шахте в [SCOPE.sState('mine_state').GetCustom('RU_SL_PP')] произошёл ужасный несчастный случай. В результате взрыва погибли два человека. Мелкие происшествия случаются постоянно, но это было... другим. Все местные рабочие отказываются продолжать работу, пока условия не будут улучшены."
 MFE_workplace_events.1.f: "«Я видел это своими глазами: их обоих разорвало на куски и раздавило самым мучительным образом, какой только можно представить. Мы больше ни дня не будем работать в этих шахтах, это просто небезопасно»."
 MFE_workplace_events.1.a: "Какая досада. Вернуть их к работе... немедленно."
 MFE_workplace_events.1.b: "Люди, работающие в шахтах, — такие же люди, как и мы!"
 MFE_workplace_events.1.c: "Нам вообще не следовало начинать добычу."
 MFE_workplace_events.2.t: "Девочка из угольных шахт"
 MFE_workplace_events.2.d: "«Гружёная углём вагонетка, должно быть, слишком тяжело давила на её тело, хрупкое и измождённое многими годами непосильного труда в угольных копях, ибо ноги больше не могли её нести. Там, во тьме, где шахты уходят на бесчисленные сажени вглубь, она поскользнулась и упала».\n\nЕщё одна девочка погибла в результате несчастного случая на угольной шахте в одной из наших провинций, и особая трагичность этого случая привлекла внимание всей страны."
 MFE_workplace_events.2.f: "«Как они могут позволять нам так жить? Будто мы и не люди вовсе»."
 MFE_workplace_events.2.a: "Она была всего лишь девочкой... кем мы стали."
 MFE_workplace_events.2.tt: "Жители [SCOPE.sState('mining_state').GetCustom('RU_SL_RP')] замышляют недоброе..."
 MFE_workplace_events.3.t: "Спад производства"
 MFE_workplace_events.3.d: "На одном из наших оружейных заводов за последние три месяца произошёл серьёзный спад производства, о котором не сообщалось из-за опасений вызвать тревогу среди инвесторов и местных промышленных магнатов. Покрыв убытки завода за счёт материалов из государственных запасов, мы могли бы создать видимость спасения рабочих мест."
 MFE_workplace_events.3.f: "«Они говорят нам стрелять в людей, но не дают ничего, чем можно было бы стрелять. Как армия может так воевать?!»"
 MFE_workplace_events.3.a: "Ничего не поделаешь."
 MFE_workplace_events.3.b: "Отправить им немного денег, это может помочь."
 MFE_workplace_events.4.t: "Ограбление чайной фабрики"
 MFE_workplace_events.4.d: "Центральная станция взвешивания чая в одной из наших чаепроизводящих провинций была захвачена вооружёнными бандитами. Некоторые местные жители предполагают, что тяжёлые времена в провинции могли спровоцировать на ограбление местных фермеров, уставших смотреть, как дистрибьюторы и розничные торговцы съедают их прибыль. Какова бы ни была причина, нам необходимо разобраться в ситуации."
 MFE_workplace_events.4.f: "«Они пришли под покровом ночи, убили охранников, а затем вынесли весь зелёный чай, что у нас был. Чёрный чай, правда, оставили, но его всё равно никто не пьёт»."
 MFE_workplace_events.4.b: "Я бы завоевал весь мир за чашку чая! Их нужно найти."
 MFE_workplace_events.4.ttt: "Начать расследование ограбления."
 MFE_workplace_events.5.t: "Старые консервы"
 MFE_workplace_events.5.d: "Генерал-квартирмейстер докладывает об обнаружении забытого тайника с консервами на армейском складе в [SCOPE.sState('canning_state').GetCustom('RU_SL_PP')]. Содержимое банок, несмотря на возраст в несколько лет, по-видимому, всё ещё съедобно. Что нам делать с 15 тоннами консервов?"
 MFE_workplace_events.5.f: "«Мы нашли это в дальнем углу под метровым слоем пыли. Проверили съедобность на крысе — она съела. Как говорится, „что съест крыса, то съедят и рабочие“»."
 MFE_workplace_events.5.a: "Это отвратительно."
 MFE_workplace_events.5.b: "Уверен, мы найдём желающих съесть эту жижу!"
 MFE_workplace_events.5.tt: "Благосостояние населения в [SCOPE.sState('canning_state').GetCustom('RU_SL_PP')] снизится."
 MFE_workplace_events.6.t: "Коровья лихорадка"
 MFE_workplace_events.6.d: "Среди скота в [SCOPE.sState('bovine_state').GetCustom('RU_SL_PP')] вспыхнула странная лихорадка, и, по сообщениям, животные массово гибнут. Ветеринар из местного гарнизона колесит по провинции, пытаясь сделать хоть что-то, чтобы сдержать последствия этой, очевидно, весьма заразной болезни. Хотя сама болезнь со временем пройдёт, вопрос о компенсации для сотен разорённых фермеров и их семей всё ещё требует внимания."
 MFE_workplace_events.6.f: "«Вчера утром я вышел в поле и, о чудо, посмотрел на свой скот, а он весь покрыт зелёными язвами, из которых сочится странный фиолетовый гной. Эти коровы раньше стоили целое состояние, а теперь остаётся лишь надеяться продать их $peasants_only_icon$ крестьянам в надежде, что те не заметят исходящего от них смрада»."
 MFE_workplace_events.6.a: "Отправьте им всю необходимую помощь!"
 MFE_workplace_events.6.b: "Мы ничем не можем помочь."
 MFE_workplace_events.6.c: "Поговорить с соседними областями, может, они помогут."
 MFE_workplace_events.7.t: "Смерть на шёлковых полях"
 MFE_workplace_events.7.d: "Коконы сморщиваются и погибают, а та малая нить, что на них есть, не может должным образом затвердеть и распадается от малейшего дуновения ветерка. На шёлковых полях что-то не так, и даже наши лучшие химики не смогли найти лекарство от болезни, поразившей наши фермы. Местные шелководы возмущены и призывают правительство к действию."
 MFE_workplace_events.7.f: "«Мы никогда не видели ничего подобного, вся наша тяжёлая работа идёт насмарку. Всё просто гибнет, рабочие в отчаянии. Они говорят: нет шёлка — нет работы, а нет работы — нет средств к существованию»."
 MFE_workplace_events.7.a: "[SCOPE.sCharacter('guilty_silk_field_owner').GetFullName] лишь выполня[SelectLocalization(SCOPE.sCharacter('guilty_silk_field_owner').IsFemale, 'ла', 'л')] свою работу."
 MFE_workplace_events.7.b: "[SCOPE.sCharacter('guilty_silk_field_owner').GetFullName] поплатится за своё невежество."
 MFE_workplace_events.7.tt: "[SCOPE.sCharacter('guilty_silk_field_owner').GetFullName] будет [SelectLocalization(SCOPE.sCharacter('guilty_silk_field_owner').IsFemale, 'арестована и лишена', 'арестован и лишён')] власти."
 MFE_workplace_events.8.t: "Кровь и железо"
 MFE_workplace_events.8.d: "«Великие вопросы времени решаются не речами и резолюциями большинства, но железом и кровью».\n- Отто фон Бисмарк\n\nНа железных рудниках [SCOPE.sState('iron_state').GetCustom('RU_SL_RP')] обнаружена новая, богатая жила минералов. Хотя жила богата, она также расположена на опасной глубине, недоступной для наших нынешних технологий добычи. Попытка извлечь руду стоила нам жизней и крови. Несколько рабочих погибли в огромной железной яме, но теперь руду можно добывать в объёмах, которые раньше считались невозможными."
 MFE_workplace_events.8.f: "«Мы никогда не видели ничего подобного — железная жила настолько велика, что может учетверить производство. Мы отправили нескольких парней проверить её и найти способ добычи. Они добрались, но это было жутко: из 10 ушедших вернулся только один, и тот едва живой, чтобы рассказать эту историю»."
 MFE_workplace_events.8.a: "Дать им несколько выходных и направить помощь."
 MFE_workplace_events.8.b: "Кого волнуют несколько смертей... возвращайтесь к работе!"
 MFE_workplace_events.9.t: "Трагедия на шахте"
 MFE_workplace_events.9.d: "Ещё один трагический день для наших рабочих: сообщается о несчастном случае, унёсшем несколько жизней на железных рудниках [SCOPE.sState('iron_tragedy_state').GetCustom('RU_SL_RP')]. Несколько рабочих ранены, а некоторые до сих пор числятся пропавшими без вести. По сообщениям, причиной аварии стало обрушение неисправной опорной балки. Этот инцидент непременно вызовет, по крайней мере на местном уровне, дебаты об условиях труда на наших шахтах."
 MFE_workplace_events.9.f: "Как это могло случиться..."
 MFE_workplace_events.9.a: "Эти проклятые промышленники..."
 MFE_workplace_events.9.b: "Поддержать рабочих всеми возможными способами."
 MFE_workplace_events.9.c: "Почему мы не можем вернуться к более простым временам в полях."
 MFE_workplace_events.10.t: "Проблемы с качеством хлопка"
 MFE_workplace_events.10.d: "Хлопковые плантации [SCOPE.sState('cotton_state').GetCustom('RU_SL_RP')] испытывают многочисленные проблемы с качеством производимого хлопка. Некоторые говорят, что это из-за странных примесей в дожде, но причина может быть в чём угодно..."
 MFE_workplace_events.10.f: "«Я не могу использовать этот хлам, как это вообще можно назвать хлопком?!»"
 MFE_workplace_events.10.a: "Землевладельцы нас из этого вытащат."
 MFE_workplace_events.10.b: "Сельские жители занимаются этим веками."
 MFE_workplace_events.10.c: "Религиозные лидеры помолятся о лучшем хлопке."
 MFE_workplace_events.11.t: "Взрыв котла"
 MFE_workplace_events.11.d: "Сегодня в [SCOPE.sState('steamer_state').GetCustom('RU_SL_PP')] произошла трагедия: во время планового испытания в механическом цехе взорвался паровой котёл, который строили для местного пароходного завода. Семь рабочих погибли, оборудование на несколько тысяч фунтов уничтожено. Местные власти расследуют условия труда в цехе, и, надеюсь, в будущем подобных аварий удастся избежать, но пока [SCOPE.sState('steamer_state').GetName] оплакивает своих погибших."
 MFE_workplace_events.11.f: "«Это просто ужасно, мы проверяли эти котлы на прошлой неделе, никто и представить не мог, что они взорвутся»."
 MFE_workplace_events.11.a: "Такие события — просто цена прогресса."
 MFE_workplace_events.11.b: "Нельзя эксплуатировать рабочих и заставлять их трудиться в таких условиях."
 MFE_workplace_events.11.c: "Машины опасны! Сама промышленность — это раковая опухоль."
 MFE_workplace_events.12.t: "Разрушения на красильне"
 MFE_workplace_events.12.d: "Сегодня на одной из наших красилен погибло несколько рабочих, когда промышленная цистерна с горячим красителем случайно опрокинулась на цех и ничего не подозревающих людей. Местные жители возмущены инцидентом, утверждая, что причиной аварии стали плохие правила безопасности на жарком и опасном рабочем месте, и призывают правительство принять меры. Когда спасатели покинули место происшествия, несколько работников цеха умирали."
 MFE_workplace_events.12.f: "«Я просто работал, красил рубашки, а потом все вокруг внезапно начали умирать»."
 MFE_workplace_events.12.a: "Рано или поздно все там будем."
 MFE_workplace_events.12.b: "Их смерть не будет напрасной!"
 MFE_workplace_events.13.t: "Взрыв нефтяной цистерны"
 MFE_workplace_events.13.d: "Топливная цистерна на одном из наших НПЗ в [SCOPE.sState('oil_state').GetCustom('RU_SL_PP')] сегодня взорвалась по неизвестным причинам. Вспыхнувший пожар унёс жизни семерых рабочих, а также уничтожил имущество компании на тысячи долларов. Владелец НПЗ снял с себя всякую ответственность за аварию, заявив, что правительственные инспекции безопасности были недостаточными."
 MFE_workplace_events.13.f: "«Это просто ужасно, ещё на днях нефть текла рекой, а потом просто взяла и взорвалась, какая досада»."
 MFE_workplace_events.13.a: "[SCOPE.sCharacter('guilty_oil_owner').GetFullName] лишь выполня[SelectLocalization(SCOPE.sCharacter('guilty_oil_owner').IsFemale, 'ла', 'л')] свою работу."
 MFE_workplace_events.13.b: "[SCOPE.sCharacter('guilty_oil_owner').GetName] поплатится за своё невежество."
 MFE_workplace_events.13.tt: "[SCOPE.sCharacter('guilty_oil_owner').GetFullName] [SelectLocalization(SCOPE.sCharacter('guilty_oil_owner').IsFemale, 'будет арестована', 'будет арестован')] и исчезнет..."
 MFE_workplace_events.14.t: "Перепроизводство на НПЗ"
 MFE_workplace_events.14.d: "Один из наших нефтеперерабатывающих заводов в последнее время работает хорошо, производство превышает ожидаемые квоты на несколько тысяч галлонов. Из-за проблем с хранением владелец НПЗ обратился к правительству с предложением купить топливо с большой скидкой. Мы можем либо купить топливо сами, либо отказать ему и подождать, пока он не выпустит дешёвое топливо на рынок. Появление дешёвого топлива на местном рынке должно порадовать жителей, но мы, вероятно, и сами могли бы его использовать."
 MFE_workplace_events.14.f: "«Чёрное золото течёт рекой!»"
 MFE_workplace_events.14.a: "Нефть — топливо будущего!"
 MFE_workplace_events.14.b: "Направить средства на более... законные дела."
 MFE_workplace_events.15.t: "Старик и море"
 MFE_workplace_events.15.d: "Рыбак, [SCOPE.sCharacter('fisherman').GetFullName], у побережья [SCOPE.sState('fishing_state').GetCustom('RU_SL_RP')] сегодня принёс огромный улов. Его траулер буквально кишит дарами богатейших океанов, когда он бросает якорь в гавани, и вскоре другие рыбаки смогли повторить его пример. Похоже, в этом году в [SCOPE.sState('fishing_state').GetCustom('RU_SL_PP')] необычайно хороший улов."
 MFE_workplace_events.15.f: "«[SCOPE.sCharacter('fisherman').GetFullName] был у побережья всего несколько дней назад. Я видел, как он таскал рыбу одну за другой, словно одержимый, я видел, как за час в его лодку попало около 500 рыб. Ему пришлось вернуться в [SCOPE.sState('fishing_state').GetCustom('RU_SL_VP')] только потому, что его лодка чуть не утонула от веса улова. Когда он сошёл на берег, оказалось, что большинство пойманных им рыб были настолько велики, что одной хватило бы, чтобы кормить семью из девяти человек целый месяц»."
 MFE_workplace_events.15.a: "Как мы можем вмешиваться, это просто потрясающе."
 MFE_workplace_events.15.b: "У жителей [SCOPE.sState('fishing_state').GetCustom('RU_SL_RP')] будет самая дешёвая рыба в мире."
 MFE_workplace_events.16.t: "Взрыв взрывчатки"
 MFE_workplace_events.16.d: "Пожар на складе взрывчатых веществ #tooltippable_name #tooltip:[SCOPE.sBuilding('explosion_building').GetTooltipTag],DATA_BUILDING_NAME_TOOLTIP,BuildingTooltip [SCOPE.sBuilding('explosion_building').GetCustom('RU_BL_RP')]#!#! вызвал мощный взрыв, который, по словам некоторых, был слышен даже в столице, городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetName]. Разрушения огромны, сообщается о сотнях погибших в окрестностях. Огонь распространяется по городу, и пожарной службе необходимо расставить приоритеты: пламя угрожает перекинуться на север, к богатым кварталам, где расположены [SCOPE.sBuilding('explosion_building').GetName], и на юг, к более бедным районам."
 MFE_workplace_events.16.f: "«Некоторые рабочие #tooltippable_name #tooltip:[SCOPE.sBuilding('explosion_building').GetTooltipTag],DATA_BUILDING_NAME_TOOLTIP,BuildingTooltip [SCOPE.sBuilding('explosion_building').GetCustom('RU_BL_RP')]#!#! предупреждали, что взрывчатка взорвётся, но им никто не верил... пока не стало слишком поздно»."
 MFE_workplace_events.16.a: "Немедленно отремонтировать завод!"
 MFE_workplace_events.16.b: "Там одни руины, что тут можно сделать..."
 MFE_workplace_events.17.t: "Изящная мебель"
 MFE_workplace_events.17.d: "«Может быть, этот стул, мадам? Изготовлен из лучшего бразильского красного дерева, инкрустирован изящными нубийскими узорами из кенийской слоновой кости. Обратите внимание на богатую мраморную текстуру кожи. Другого такого вы не найдёте во всей [SCOPE.GetRootScope.GetCountry.GetAltNameNoFlag('RU_CL_PP')]!»\n\nРост уровня жизни в [SCOPE.GetRootScope.GetCountry.GetAltNameNoFlag('RU_CL_PP')] вызвал всплеск спроса на более качественную и изящную мебель. Поскольку дома людей становятся красивее, вполне логично, что и правительственные кабинеты также должны быть обновлены в соответствии с современными стандартами."
 MFE_workplace_events.17.f: "«Мебель такой красоты считалась невозможной, это просто потрясающе!»"
 MFE_workplace_events.17.a: "Поощрять производство!"
 MFE_workplace_events.17.b: "Богачам понравятся эти столы!"
 MFE_workplace_events.18.t: "Завод воняет"
 MFE_workplace_events.18.d: "Жители [SCOPE.sState('stinking_state').GetCustom('RU_SL_RP')], жалуются на выбросы от местного завода удобрений. Хотя для бюджета провинции это место может пахнуть розами, для носов местных жителей в последнее время баланс явно не сходится. Мы могли бы поддержать указ об изменении рабочего процесса, но это может разозлить местных капитанов промышленности."
 MFE_workplace_events.18.f: "«Сегодня утром я проснулся, вышел на улицу и ощутил самый отвратительный запах в своей жизни. Казалось невозможным, что такая омерзительная вонь может существовать, но одно было ясно: она шла с химического завода»."
 MFE_workplace_events.18.a: "К сожалению, урожай сам себя не вырастит."
 MFE_workplace_events.18.b: "Нам следует рассмотреть некоторые местные ограничения."
 MFE_workplace_events.19.t: "Клиперный бум"
 MFE_workplace_events.19.d: "Верфи, причалы и сухие доки в одной из наших прибрежных провинций гудят от стука молотков и песен пил, поскольку местный завод изо всех сил пытается справиться с новыми заказами на клиперы, поступающими со всего мира. Эффективные рабочие процессы и управление в сочетании с превосходным мастерством и мореходными качествами позволили им производить больше и лучшие корабли, чем в любой предыдущий год! Возможно, пришло время почивать на лаврах, но, с другой стороны, будущее всегда неопределённо."
 MFE_workplace_events.19.f: "«Эти корабли — лучшие в мире, только взгляните на них: паруса блестят на солнце с невозможной, казалось бы, красотой»."
 MFE_workplace_events.19.a: "Давайте праздновать!"
 MFE_workplace_events.19.b: "Основать военно-морскую школу."
 MFE_workplace_events.20.t: "Радио «[SCOPE.sState('radio_state').GetName]»"
 MFE_workplace_events.20.d: "Местная радиостанция в одной из наших провинций, [SCOPE.sState('radio_state').GetName], столкнулась с нехваткой радиокомпонентов для своих передатчиков и была вынуждена прекратить вещание до разрешения ситуации. Местные власти предложили одолжить станции некоторые правительственные радиокомпоненты, опасаясь, что местное население будет встревожено отсутствием новостей с фронта."
 MFE_workplace_events.20.f: "«Вы слышали, на днях радиостанция в [SCOPE.sState('radio_state').GetCustom('RU_SL_PP')] перестала вещать. Кто знает, что теперь происходит на войне...»"
 MFE_workplace_events.20.a: "У нас нет лишних."
 MFE_workplace_events.20.b: "Отдать им радиоприёмники."
 MFE_workplace_events.4.a: "Зачем нам вообще нужен чай?"
 robbed_tea_station_mod: "Ограбление чайной станции"