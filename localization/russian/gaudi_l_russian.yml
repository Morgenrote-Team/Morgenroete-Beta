 gaudi_eiffel_visionary_modifier: "Эйфелева башня: визионер"
 gaudi_revolting_against_eiffel_tower_modifier: "Эйфелева башня: протест интеллектуалов"
 gaudi.2101.t: "Рождение стального титана"
 gaudi.2101.d: "При большом интересе общественности начались строительные работы с выемки грунта под фундамент. Всего для этой цели будет выкопано 30 973 кубических метра земли. Эйфелева башня уже установила рекорд, не уложив ни одной стальной балки."
 gaudi.2101.f: "«Эта башня будет символизировать не только искусство современного инженера, но и век промышленности и науки, в котором мы живём, и для которого путь был подготовлен великим научным движением XVIII века и революцией 1789 года, в память о которых этот памятник будет построен как выражение благодарности Франции». -Гюстав Эйфель"
 gaudi.2101.g: "К небу, к звёздам!"
 gaudi.2102.t: "Открытие Эйфелевой башни"
 gaudi.2102.d: "Стальной титан, завершения которого одновременно боялись и жаждали, теперь возвышается над французской столицей. Весь Париж лежит в тени башни, ставшей новым символом города. Критики умолкли от энтузиазма, с которым праздновалось открытие."
 gaudi.2102.f: "«Перед свершившимся фактом — и каким фактом! — мы должны склониться. Я, как и многие другие, говорил и верил, что Эйфелева башня — это безумие, но это грандиозное и гордое безумие. Конечно, эта огромная масса подавляет остальную часть выставки, и когда вы снова выходите на Марсово поле, огромные купола и галереи кажутся крошечными. Но что вы хотите? Эйфелева башня взывает к воображению, это нечто неожиданное, нечто фантастическое, что льстит нашей малости. Когда она едва была начата, самые известные художники и писатели, от Мейссонье до Золя, подписали пламенный протест против башни как ужасного преступления против искусства. Подписали бы вы его сегодня? Нет, конечно нет, и они предпочли бы, чтобы этого документа гнева не существовало»."
 gaudi.2102.g: "Да здравствует Франция!"
 gaudi.2109.t: "Париж потерян!"
 gaudi.2109.d: "С потерей Парижа мы лишились всякой возможности продолжать строительство Эйфелевой башни."
 gaudi.2109.f: "Если по какой-либо причине Париж будет потерян, прогресс строительства #R будет полностью утерян#!. Только Франция может продолжить строительство Эйфелевой башни. Иностранные захватчики, с другой стороны, не проявят интереса к её строительству."
 gaudi.2109.g: "Мы не можем надолго оставлять им Париж!"
 gaudi.2111.t: "Лифты"
 gaudi.2111.d: "Новые технологические достижения в области лифтостроения позволили строительным работам на Эйфелевой башне продвигаться неожиданно быстрее."
 gaudi.2111.f: "Подъём на Эйфелеву башню обеспечивают в общей сложности девять различных лифтов — пять в опорах башни, которые ходят между входом и вторым этажом, и две пары лифтов с двойными кабинами между вторым и третьим этажами. При строительстве башни Эйфель намеренно использовал разные технологии и производителей, чтобы в случае ошибки оставаться независимым. В северной и южной опорах до 1910 года работали лифты Otis. До 1897 года в восточной и западной опорах были лифты от Roux, Combaluzie и Lepape. Они могли перевозить до 200 человек с помощью бесконечной двойной цепи. Обе системы приводились в действие гидравлической конвейерной системой. По случаю Всемирной выставки 1900 года Эйфель заменил лифты и паровые машины, приводившие в действие гидравлику, на электродвигатели."
 gaudi.2111.g: "Великолепно!"
 gaudi.2112.t: "Протест интеллектуалов"
 gaudi.2112.d: "В известной ежедневной газете несколько видных деятелей интеллектуальной, академической и художественной жизни выступили с протестом против строительства Эйфелевой башни, которую они клеймят как уродливое бельмо на глазу."
 gaudi.2112.f: "«Мы, писатели, художники, скульпторы, архитекторы и страстные поклонники доселе нетронутой красоты Парижа, протестуем изо всех сил, со всем нашим негодованием во имя оскорблённого французского вкуса против возведения... этой бесполезной и чудовищной Эйфелевой башни... Чтобы донести наши аргументы, представьте на мгновение головокружительную, нелепую башню, доминирующую над Парижем, как гигантская чёрная дымовая труба, сокрушающая под своей варварской громадой Нотр-Дам, башню Сен-Жак, Лувр, купол Дома Инвалидов, Триумфальную арку, все наши униженные памятники исчезнут в этом ужасном сне. И в течение двадцати лет... мы будем видеть, как простирается, подобно чернильному пятну, ненавистная тень ненавистной колонны из болтовых листов металла»."
 gaudi.2112.g: "Отложить строительство."
 gaudi.2112.h: "Этот протест побуждает нас строить башню ещё быстрее!"
 gaudi.2113.t: "Промышленники аплодируют стальному титану"
 gaudi.2113.d: "Постоянно растущая Эйфелева башня рассматривается промышленниками страны как символ экономического и технического прогресса Франции. Они с энтузиазмом ждут открытия."
 gaudi.2113.f: "Предприниматель и археолог Генрих Шлиман, которому удалось подняться на Эйфелеву башню ещё до официального открытия, в письме Рудольфу Вирхову от 24 мая 1889 года восхвалял сооружение как чудо инженерного мастерства, без которого всемирная выставка в Париже не имела бы привлекательности. Несмотря на эйфорию, которая восхваляла её как успешное национальное самопредставление и демонстрацию технического прогресса, была и беспощадная критика."
 gaudi.2113.g: "Может быть, вы немного поможете?"
 gaudi.2113.h: "Спасибо вам!"
 gaudi.2114.t: "Некачественная сталь"
 gaudi.2114.d: "Главный архитектор резко раскритиковал качество последней поставки стали и отправил её обратно. График строительства Эйфелевой башни заметно сдвигается."
 gaudi.2114.f: "В строительных работах было задействовано до 250 человек, около 150 из которых использовались для заклёпки компонентов на месте. Помимо плотников, среди строителей были и трубочисты, так как они привыкли работать на большой высоте. Рабочие смены длились девять часов в зимние месяцы и двенадцать часов в летние. В сентябре 1888 года произошла забастовка рабочих; три месяца спустя они снова прекратили работу и потребовали повышения заработной платы. Гюстав Эйфель вёл с ними переговоры и устроил для них столовую на уже завершённой первой платформе. За всё время работ произошёл только один несчастный случай со смертельным исходом. Итальянский рабочий попал в аварию при установке лифтов после официального открытия."
 gaudi.2114.g: "Купить новую партию стали."
 gaudi.2115.t: "Качественная сталь"
 gaudi.2115.d: "Сталь с близлежащих парижских сталелитейных заводов оказалась настолько высокого качества при строительстве Эйфелевой башни, что это не только ускорило эффективность работ, но и увеличило спрос на сталь с этого завода у других заказчиков."
 gaudi.2115.f: "14 августа 1888 года был построен второй этаж, а верхняя часть была смонтирована на весу. В то же время оборудовались платформы. Отдельные детали, предварительно просверленные на заводе, на месте подгонялись в окончательное положение с помощью конических оправок под ударом. В общей сложности 2,5 миллиона заклёпок скрепляют компоненты Эйфелевой башни. Клёпку выполняли по четыре человека. Первый рабочий нагревал заклёпку докрасна в небольшой кузнице. Второй рабочий вставлял заклёпку в отверстие. Третий формировал замыкающую головку. На последнем этапе болт сжимался."
 gaudi.2115.g: "Французская сталь — лучшая сталь."
 gaudi.2116.t: "Математик предсказывает обрушение"
 gaudi.2116.d: "После того как один из самых уважаемых математиков Франции предсказал, что Эйфелева башня обрушится на высоте около 230 метров, среди некоторых домовладельцев распространяется паника."
 gaudi.2116.f: "Житель Марсова поля подал в суд на государство и город Париж из-за опасений, что Эйфелева башня может обрушиться и разрушить его дом. Суд разрешает дальнейшее строительство только при условии, что Гюстав Эйфель несёт ответственность за любой ущерб. Это вызвало фундаментальную дискуссию во Франции и вопрос о том, насколько надёжны конструкция и расчёты Эйфеля. Однако промышленники рассматривают эту критику как оскорбление идеи прогресса как таковой."
 gaudi.2116.g: "Это смешно."
 gaudi.2116.h: "Эйфель должен заплатить, если башня рухнет."
 gaudi_admires_liberty_statue_modifier: "Статуя Свободы: восхищение американскими идеалами"
 gaudi_liberty_impressed_modifier: "Статуя Свободы: впечатлён Леди Свободой"
 gaudi_america_first_modifier: "Статуя Свободы: американский проект"
 gaudi.2201.t: "Француженка в американском порту"
 gaudi.2201.d: "По французской инициативе в настоящее время создаётся гигантская скульптура, которая скоро будет приветствовать всех, кто прибывает в Новый Свет, как символ свободы."
 gaudi.2201.f: "Остров Бедлоу был передан штату Нью-Йорк в 1796 году, но в 1800 году остров был окончательно передан федеральному правительству Соединённых Штатов. США решили построить оборонительные сооружения на острове Бедлоу (а также на Губернаторском острове и острове Эллис) для защиты нью-йоркской гавани. В июне 1871 года скульптор Бартольди отправился в Нью-Йорк. Его взгляд упал на остров Бедлоу в Верхней Нью-Йоркской бухте. Каждый прибывающий корабль должен был пройти мимо этого острова, поэтому он показался подходящим местом для статуи."
 gaudi.2201.g: "Мы уже нашли достойное место."
 gaudi.2202.t: "Свобода, озаряющая мир"
 gaudi.2202.d: "Сегодня несколько сотен тысяч человек отпраздновали открытие Статуи Свободы на параде, во главе которого стоял сам [SCOPE.sCharacter('gaudi_ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler_scope').GetLastName]. Французский комитет также отвечает за морской парад, конечной точкой которого является остров Бедлоу."
 gaudi.2202.f: "Не как тот медный гигант греческой славы,\nС завоевательными конечностями, шагающий от земли к земле;\nЗдесь, у наших омываемых морем, закатных ворот, будет стоять\nМогучая женщина с факелом, чьё пламя\nЕсть заключённая молния, и имя её\nМать Изгнанников. Из её маяка-руки\nСветится всемирное приветствие; её мягкие глаза повелевают\nВоздушной гаванью, которую обрамляют города-близнецы.\n«Храните, древние земли, свою легендарную пышность!» — кричит она\nБезмолвными устами. «Дайте мне ваших усталых, ваших бедных,\nВаши сбившиеся в кучу массы, жаждущие дышать свободно,\nЖалкие отбросы вашего кишащего берега.\nПришлите этих, бездомных, брошенных бурей ко мне:\nЯ поднимаю свой светильник у золотой двери»."
 gaudi.2202.g: "Это Новый Колосс."
 gaudi.2209.t: "Нью-Йорк потерян!"
 gaudi.2209.d: "С потерей Нью-Йорка мы лишились всякой возможности продолжать строительство Статуи Свободы."
 gaudi.2209.f: "Если по какой-либо причине Нью-Йорк будет потерян, прогресс строительства #R будет полностью утерян#!. Только Соединённые Штаты Америки могут продолжить строительство Статуи Свободы. Иностранные захватчики, с другой стороны, не проявят интереса к её строительству."
 gaudi.2209.g: "Мы не можем надолго оставлять им Нью-Йорк!"
 gaudi.2211.t: "Лифты"
 gaudi.2211.d: "Новые технологические достижения в области лифтостроения позволили строительным работам на Статуе Свободы продвигаться неожиданно быстрее."
 gaudi.2211.f: "«Поверхности должны быть чистыми и простыми, определяться смелым и чистым дизайном, подчёркнутым в важных местах. Следует избегать увеличения или умножения деталей. Преувеличивая формы, чтобы сделать их более чётко видимыми, или добавляя к ним детали, мы разрушим пропорции работы. Наконец, модель, как и дизайн, должна иметь обобщённый характер, как в быстром наброске. Необходимо, чтобы этот характер был продуктом воли и наблюдения, и чтобы художник, благодаря концентрации своих знаний, находил форму и линию в их величайшей простоте». -Фредерик-Огюст Бартольди"
 gaudi.2211.g: "Отлично!"
 gaudi.2213.t: "Интеллектуалы впечатлены"
 gaudi.2213.d: "Интеллектуальная элита приветствует текущий строительный проект в Нью-Йорке, который полностью воплощает демократический и либеральный дух Соединённых Штатов. Художники видят в этом вдохновение для написания стихов и композиций."
 gaudi.2213.f: "«Ты, страж западных ворот, над Манхэттенским заливом,\nТуманы сомнений, что скрывали твоё лицо, развеяны дочиста:\nТвои глаза наконец-то смотрят далеко и ясно, ты высоко поднимаешь руку,\nЧтобы распространить свет свободы по всему миру для каждой земли». -Генри ван Дайк"
 gaudi.2213.g: "Может, они могут сделать немного рекламы?"
 gaudi.2214.t: "Американский или французский проект?"
 gaudi.2214.d: "Чем дальше продвигается строительство Статуи Свободы и чем выше растёт основание на острове у Манхэттена, тем больше некоторые политики задаются вопросом, какая страна является фактическим инициатором проекта."
 gaudi.2214.f: "«Мы здесь сегодня не для того, чтобы склоняться перед изображением свирепого воинственного бога, исполненного гнева и мести, но мы с радостью созерцаем вместо этого наше собственное божество, стоящее на страже у открытых ворот Америки и превосходящее всех, кто был воспет в древних песнях. Вместо того чтобы сжимать в руке молнии ужаса и смерти, она держит вверху свет, который освещает путь к освобождению человека. Мы не забудем, что Свобода здесь обрела свой дом, и её избранный алтарь не будет предан забвению. Добровольные приверженцы будут постоянно поддерживать его огонь, и они будут светить на берега нашей сестринской Республики оттуда, и, соединившись с ответными лучами, поток света пронзит тьму невежества и угнетения человека, пока Свобода не озарит мир». -Гровер Кливленд"
 gaudi.2214.g: "Это американский проект."
 gaudi.2214.h: "Это франко-американский проект."
 gaudi.2214.i: "Это французский проект."
 gaudi.2215.t: "Качественная сталь"
 gaudi.2215.d: "Сталь с близлежащих нью-йоркских сталелитейных заводов оказалась настолько высокого качества при строительстве Статуи Свободы, что это не только ускорило эффективность работ, но и увеличило спрос на сталь с этого завода у других заказчиков."
 gaudi.2215.f: "«Я видел Статую Свободы. И я сказал себе: „Леди, ты так прекрасна! Ты распахнула свои объятия и принимаешь здесь всех иностранцев. Дай мне шанс доказать, что я этого стою, сделать что-то, стать кем-то в Америке“. И всегда эта статуя была у меня в мыслях»."
 gaudi.2215.g: "Американская сталь — лучшая сталь."
 gaudi.2216.t: "Правительственная партия поддерживает Леди Свободу"
 gaudi.2216.d: "[SCOPE.sCharacter('gaudi_liberty_leader').GetFullName] известен как ярый сторонник Статуи Свободы. Он уже смог склонить на свою сторону нескольких важных людей в своём окружении для проекта и собрал пожертвования."
 gaudi.2216.f: "Бартольди планировал установить прожекторы на балконе покрытого золотым листом факела, чтобы освещать его. За неделю до открытия Инженерный корпус армии отклонил это предложение, опасаясь, что это ослепит пилотов на проходящих мимо кораблях. Вместо этого Бартольди приказал вырезать иллюминаторы в факеле и разместить фары внутри."
 gaudi.2216.g: "Попросить ещё одно пожертвование."
 gaudi.2216.h: "Похвалить его публично!"
 gaudi.2217.t: "Несчастный случай на стройке"
 gaudi.2217.d: "Сегодня в результате несчастного случая на строительной площадке Статуи Свободы пострадало несколько человек, а часть её была разрушена."
 gaudi.2217.f: "«Вы установили в нью-йоркской гавани чудовищного идола, которого вы называете Свободой. Единственное, что остаётся для завершения этого памятника, — это поместить на его пьедестал надпись, написанную Данте на вратах ада: „Оставь надежду, всяк сюда входящий“». -Джордж Бернард Шоу"
 gaudi.2217.g: "Американская сталь — лучшая сталь, я думал..."
 gaudi.2218.t: "Сколько стоит Свобода?"
 gaudi.2218.d: "[SCOPE.sCharacter('gaudi_opposition_leader').GetFullName] считается решительным критиком строительства Статуи Свободы. Деньги, которые будут собраны, можно было бы вложить в значительно лучшие проекты."
 gaudi.2218.f: "Американский комитет столкнулся с большими трудностями при сборе пожертвований. Статуя Свободы была не единственным проектом, страдавшим от недостатка финансирования; например, работы над памятником Вашингтону заняли три с половиной десятилетия с несколькими перерывами. Критиковали как статую Бартольди, так и тот факт, что американцам приходилось платить за постамент для этого подарка. Также преобладало мнение, что общественные произведения искусства должны проектироваться американцами. Журнал Harper's Weekly заявил, что Бартольди мог бы пожертвовать и статую, и основание, а New York Times отметила: «Ни один истинный патриот не может считать какие-либо такие расходы на бронзовых женщин в нынешнем состоянии наших финансов»."
 gaudi.2218.g: "Но этот проект очень важен!"
 gaudi.2218.h: "Возможно, есть и более важные вещи..."
 gaudi.2301.t: "Заживление ран в Лондоне"
 gaudi.2301.d: "Лондонцы всё ещё в шоке после того, как старый Вестминстерский дворец сгорел. Пожар оставил шрам на берегу Темзы, где раньше билось политическое сердце Британии. Сегодня на торжественной церемонии начались строительные работы, чтобы наконец залечить эту рану."
 gaudi.2301.f: "Сразу после пожара король Вильгельм IV предложил парламенту почти достроенный Букингемский дворец, надеясь избавиться от нелюбимой резиденции. Однако сооружение было признано непригодным для парламентского использования, и подарок был отклонён. Была популярна идея неоклассического дизайна. Децимус Бёртон создал проект нового неоклассического здания парламента. В противоположность неоготическому стилю, они хвалили тех, кто построил собор Святого Павла, к удовлетворению аплодирующего потомства, в более красивом и универсальном стиле римской архитектуры. Огастес У. Н. Пьюджин, ведущий эксперт по готике, должен был представлять каждый из своих проектов через других архитекторов, Джеймса Гиллеспи Грэма и Чарльза Бэрри, и, таким образом, от их имени, потому что он недавно открыто и горячо обратился в католицизм. Проект парламента, который Пьюджин представил через Бэрри, выиграл конкурс."
 gaudi.2301.g: "А я надеялся, что мы сможем оставить политиков жить на улице."
 gaudi.2302.t: "Палаты завершены"
 gaudi.2302.d: "С завершением Палаты лордов и Палаты общин парламент может возобновить свою обычную деятельность в новом Вестминстерском дворце. Однако пройдёт ещё много лет, прежде чем сооружение будет закончено."
 gaudi.2302.f: "Палата лордов была завершена в 1847 году, а Палата общин — в 1852 году (в этот момент Бэрри получил рыцарское звание). Хотя большая часть работ была выполнена к 1860 году, когда умер Чарльз Бэрри, строительство было завершено лишь десятилетием позже под руководством его сына Эдварда Миддлтона Бэрри."
 gaudi.2302.g: "Мы неплохо продвигаемся, не так ли?"
 gaudi.2303.t: "Биг-Бен"
 gaudi.2303.d: "На втором этапе строительства предстоит внутренняя отделка здания парламента и установка огромных колоколов на часовой башне."
 gaudi.2303.f: "В ходе процесса, курируемого Королевской комиссией по изящным искусствам под председательством принца Альберта, Отборочный комитет, в который входил сэр Роберт Пиль, в 1841 году начал заслушивать показания экспертов. Среди этих экспертов были сэр Мартин Арчер Ши, президент Королевской академии, и Чарльз Локк Истлейк, художник и признанный авторитет в истории искусства, который вскоре станет первым директором Национальной галереи и де-факто администратором всего проекта по отделке Вестминстера. Было решено, что следует воспользоваться возможностью для поощрения развития национальной британской школы исторической живописи и что картины должны быть выполнены в технике фрески."
 gaudi.2303.g: "Что за суета из-за простой часовой башни?"
 gaudi.2304.t: "Вестминстерский дворец восстановлен"
 gaudi.2304.d: "Новый британский парламент гордо возвышается над берегами Темзы и формирует силуэт города. Звон колоколов часовой башни стал определяющей чертой лондонской жизни и сопровождает жителей час за часом. Он уже стал достопримечательностью для всей страны."
 gaudi.2304.f: "«Так что, когда в следующий раз это всплывёт во время вопросов к правительству, вы хотите, чтобы я сказал парламенту, что это их вина, что госслужба слишком раздута?»\n«Но это правда, министр».\n«Мне не нужна правда! Мне нужно что-то, что я могу сказать парламенту! Хамфри, вы мой постоянный секретарь, вы должны проводить в жизнь мою политику. Тем не менее, я до сих пор не понимаю, почему вы, кажется, непримиримо против неё. Я должен знать, какова ваша позиция по всему этому».\n«То, где стоишь, министр, зависит от того, где сидишь»."
 gaudi.2304.g: "Динь-дон, динь-дон, динь-дон, динь-дон."
 gaudi.2309.t: "Лондон потерян!"
 gaudi.2309.d: "С потерей Лондона мы лишились всякой возможности продолжать строительство Вестминстерского дворца."
 gaudi.2309.f: "Если по какой-либо причине Лондон будет потерян, прогресс строительства #R будет полностью утерян#!. Только Великобритания может продолжить строительство Вестминстерского дворца. Иностранные захватчики, с другой стороны, не проявят интереса к его строительству."
 gaudi.2309.g: "Мы не можем надолго оставлять им Лондон!"
 gaudi_ben_decoration_modifier: "Украшения Вестминстерского дворца"
 gaudi_praised_by_parliament_modifier: "Похвала от парламента"
 gaudi_ben_decoration_tt: "По завершении Вестминстерский дворец станет более престижным."
 gaudi.2311.t: "Плохой известняк"
 gaudi.2311.d: "Последняя поставка материала для Вестминстерского дворца оказалась некачественной."
 gaudi.2311.f: "На мгновение обычная деятельность на строительной площадке, где парламент рос с каждым днём, замерла. Краткая инвентаризация, проведённая архитектором, показала, что известняк не соответствует обычному качеству, и он объявил, что предпочёл бы подождать, прежде чем проект может быть поставлен под угрозу. Однако в руководстве строительства есть голоса, что известняк всё равно следует использовать."
 gaudi.2311.g: "Мы ценим британское качество."
 gaudi.2311.h: "У нас есть график, которого нужно придерживаться!"
 gaudi.2312.t: "Катастрофа!"
 gaudi.2312.f: "Возможно, стоило прислушаться к архитектору. Возможно, это действительно была плохая идея использовать крошащийся известняк для такого важного памятника, как Вестминстерский дворец. Возможно, следовало дважды подумать над этим решением. Но слишком поздно — некачественный материал сегодня дал о себе знать, что привело к обрушению стены и уничтожило значительную часть прогресса строительства за последние недели и месяцы, когда обрушился фасад."
 gaudi.2313.t: "Новая машина"
 gaudi.2313.d: "Машиностроительная промышленность нашей страны недавно оснастила строительную площадку Вестминстерского дворца сверхсовременной машиной, которая продвигает работы вперёд."
 gaudi.2313.f: "«Хорошо иметь локомотивы!»"
 gaudi.2313.g: "Это прогресс!"
 gaudi.2314.t: "Вестминстерский дворец: хороший прогресс"
 gaudi.2314.d: "Строительство парламента продвигается на удивление быстро. Согласно текущему состоянию дел, строительство может быть завершено раньше."
 gaudi.2314.f: "По неизвестным причинам строительство Вестминстерского дворца продвигается лучше: будь то любовь к родине, высокая заработная плата, дружеская поддержка местных элит или просто лучшая погода."
 gaudi.2314.g: "Великолепно."
 gaudi.2315.t: "Вестминстерский дворец: медленный прогресс"
 gaudi.2315.d: "К сожалению, лондонское строительное управление было вынуждено сегодня признать, что строительство парламента отстаёт от графика и занимает больше времени, чем ожидалось."
 gaudi.2315.f: "По неизвестным причинам строительство Вестминстерского дворца продвигается медленнее: будь то агитация враждебных политических элементов, подрыв трудовой этики профсоюзами, заговор иезуитов или просто плохая погода."
 gaudi.2315.g: "Прискорбно."
 gaudi.2316.t: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] наносит визит"
 gaudi.2316.d: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] решил[SelectLocalization(SCOPE.sCharacter('gaudi_ruler').IsFemale, 'а', '')] лично посетить строительную площадку Вестминстерского дворца."
 gaudi.2316.f: "[SelectLocalization(SCOPE.sCharacter('gaudi_ruler').IsFemale, 'Наша', 'Наш')] [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle|l] [SCOPE.sCharacter('gaudi_ruler').GetFullName] уже в прошлом проявлял[SelectLocalization(SCOPE.sCharacter('gaudi_ruler').IsFemale, 'а', '')] большой интерес к происходящему на лондонской стройке и теперь намерен[SelectLocalization(SCOPE.sCharacter('gaudi_ruler').IsFemale, 'а', '')] посетить её. Подготовка идёт полным ходом — и, конечно же, они хотят что-то предложить [SelectLocalization(SCOPE.sCharacter('gaudi_ruler').IsFemale, 'Её', 'Его')] Величеству! Простые строители, руководство стройки и главный архитектор поэтому после объявления установили невиданную ранее скорость работы."
 gaudi.2316.g: "[SelectLocalization(SCOPE.sCharacter('gaudi_ruler').IsFemale, 'Её', 'Его')] Величество знает, как мотивировать."
 gaudi.2317.t: "Непогода"
 gaudi.2317.d: "Шторм отбросил наши строительные работы в Лондоне на несколько недель назад."
 gaudi.2317.f: "Прошлой ночью на Лондон обрушилась гроза. Ветер сорвал брезент и повалил строительные леса, повредив окна, фигуры и крышу."
 gaudi.2317.g: "Я бы предпочёл комету."
 gaudi.2318.t: "Украшения Вестминстерского дворца"
 gaudi.2318.d: "В настоящее время в политике и на стройке доминируют дебаты о том, насколько пышно должно быть оборудовано новое здание парламента. Дизайнер интерьеров предложил богатое убранство для украшения Вестминстерского дворца, но есть опасения, что это может значительно повлиять на завершение строительства."
 gaudi.2318.f: "После уничтожения огнём Вестминстерского дворца в 1834 году сэр Чарльз Бэрри нанял Огастеса Пьюджина для разработки интерьеров для его заявки на архитектурный конкурс, который должен был определить, кто будет строить новый Вестминстерский дворец. Впоследствии комиссары назначили Пьюджина для помощи в строительстве интерьера нового дворца, в проектировании которого сам Пьюджин был главным определителем. В конце жизни Пьюджина, в феврале 1852 года, Бэрри посетил его в Рамсгейте, и Пьюджин предоставил детальный проект знаковой часовой башни дворца. Проект очень близок к более ранним проектам Пьюджина, включая нереализованный проект для Скарисбрик-холла, Ланкашир. Башня была последним проектом Пьюджина перед тем, как он погрузился в безумие."
 gaudi.2318.g: "Это может занять больше времени, но британский парламент должен быть как можно более пышным."
 gaudi.2318.h: "Что дальше? Позолоченные чехлы для стульев?"
 gaudi.2319.t: "Поддержка нового парламента"
 gaudi.2319.d: "[SCOPE.sCharacter('gaudi_ben_leader').GetFullName] известен[SelectLocalization(SCOPE.sCharacter('gaudi_ben_leader').IsFemale, 'на', '')] как ярый сторонник строительства пышного Нового Вестминстерского дворца. [SelectLocalization(SCOPE.sCharacter('gaudi_ben_leader').IsFemale, 'Она', 'Он')] уже [SelectLocalization(SCOPE.sCharacter('gaudi_ben_leader').IsFemale, 'смогла', 'смог')] склонить на свою сторону нескольких важных людей в своём окружении для проекта и [SelectLocalization(SCOPE.sCharacter('gaudi_ben_leader').IsFemale, 'собрала', 'собрал')] дополнительные пожертвования."
 gaudi.2319.f: "Строительство нового дворца началось в 1840 году. В то время как Бэрри оценил время строительства в шесть лет при сметной стоимости в @money! 724 986, проект на самом деле занял более 30 лет при стоимости более @money! 2 миллионов."
 gaudi.2319.g: "Попросить ещё одно пожертвование."
 gaudi.2319.h: "Похвалить его публично!"
