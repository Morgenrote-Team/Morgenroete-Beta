 je_gaudi_blueprint_research_reason: "Наш [Concept('concept_gaudi_architect', '#PURPLE #b архитектор#!#!')], [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName], неустанно работает над новым чертежом для сооружения. Время, которое это займёт, зависит от навыков архитектора; обычно это занимает три года. По завершении исследований будет доступно уникальное, новое сооружение."
