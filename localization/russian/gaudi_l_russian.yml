 je_gaudi_custom_monument_blueprint_research: "Шедевр архитектора"
 je_gaudi_custom_monument_blueprint_research_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] пользуется всемирной известностью как один из важнейших архитекторов своего времени. Чтобы увековечить своё имя, [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] работает над чертежом выдающегося монумента, который заставит нашу нацию сиять во всём мире как центр архитектурного искусства."
 gaudi.81.t: "Шедевр архитектора"
 gaudi.81.d: "В последние годы [THIS.GetCountry.GetName] стал[THIS.GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')] одной из ведущих наций в области архитектуры. [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] сыграл[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] значительную роль в этом развитии. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Она', 'Он')] принял[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] заказ на проектирование монумента, который будет соперничать с великими чудесами древности, средневековья и современности."
 gaudi.81.f: "Монумент архитектора основан на предпочитаемом стиле великого архитектора:\n\nАрхитекторы ар-деко спроектируют [GetBuildingType('building_gaudi_people_monument').GetName].\nАрхитекторы Баухауса предложат [GetBuildingType('building_gaudi_people_forum').GetName].\nАрхитекторы-неоклассицисты создадут [GetBuildingType('building_gaudi_people_palace').GetName]."
 gaudi.81.g: "Magnificent."
 ACHIEVEMENT_gaudi_stalin: "Сталин зеленеет от зависти"
 ACHIEVEMENT_DESC_gaudi_stalin: "Владеть Народным дворцом, играя за советскую республику с командной экономикой."
 gaudi.82.t: "Дело жизни архитектора"
 gaudi.82.d: "После нескольких месяцев подготовки [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] представил[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] планы, расчёты, статистику и модель ручной работы. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Её', 'Его')] амбициозный монумент уже считается мечтой архитектурного искусства. Остаётся лишь один вопрос: кто воплотит эту мечту в жизнь?"
 gaudi.82.f: "«Завтра мы будем делать прекрасные вещи». -Антонио Гауди"
 gaudi.82.g: "Памятник самим себе."
