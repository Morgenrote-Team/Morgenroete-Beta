 gaudi.901.t: "Начинается строительство дворца Кёнбоккун"
 gaudi.901.d: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] отдал[SelectLocalization(SCOPE.sCharacter('gaudi_ruler').IsFemale, 'а', '')] приказ о восстановлении бывшей королевской резиденции. Через несколько лет она снова засияет в былом великолепии."
 gaudi.901.f: "Дворец лежал в руинах два с половиной века. [SCOPE.sCharacter('gaudi_ruler').GetFullName] хочет восстановить около 500 сооружений с 7700 комнатами на 40 гектарах. Ожидается, что гигантское архитектурное предприятие будет завершено всего за несколько лет."
 gaudi.901.g: "Только наш [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] достоин такого дворца!"
 gaudi.902.t: "Дворец Кёнбоккун завершён"
 gaudi.902.d: "Спустя годы Кёнбоккун наконец завершён. Он сияет, как драгоценный камень, над столицей. Наконец-то у нашей страны снова есть дворец, отражающий мощь и богатство Кореи."
 gaudi.902.f: "В 1867 году, во время регентства Тэвонгуна, дворцовые сооружения были реконструированы и образовали массивный комплекс из 330 сооружений и 5792 комнат. Расположенный на 4 657 576 квадратных футов (432 703 квадратных метра) земли, Кёнбоккун снова стал знаковым символом как для корейской нации, так и для корейской королевской семьи. В 1894 году японцы оккупировали дворец и заставили Коджона создать прояпонское правительство. Из-за своего статуса символа национального суверенитета, Кёнбоккун был сильно повреждён во время японской оккупации в начале XX века. В 1911 году право собственности на землю во дворце было передано японскому генерал-губернатору. В 1915 году под предлогом проведения выставки было снесено более 90% сооружений. После выставки японцы снесли всё, что ещё оставалось, и построили на этом месте свою колониальную штаб-квартиру, здание генерал-губернаторства."
 gaudi.902.g: "Великолепие Кореи вернулось!"
 gaudi.909.t: "Сеул потерян!"
 gaudi.909.d: "С потерей Сеула мы лишились всякой возможности продолжать строительство дворца Кёнбоккун."
 gaudi.909.f: "Если по какой-либо причине Сеул будет потерян, прогресс строительства #R будет полностью утерян#!. Только Сеул может продолжать строительство дворца Кёнбоккун. Иностранные захватчики, с другой стороны, не проявят интереса к его строительству."
 gaudi.909.g: "Мы не можем надолго оставлять им Сеул!"
 gaudi.911.t: "Медленный прогресс строительства"
 gaudi.911.d: "Строительные работы на королевской резиденции продвигаются медленно. По расчётам главного архитектора, прогресс на сегодняшний день отстаёт от графика на несколько месяцев."
 gaudi.911.f: "По неизвестным причинам строительство Кёнбоккуна продвигается медленнее: будь то агитация враждебных политических элементов, подрыв трудовой этики профсоюзами, заговор иллюминатов или просто плохая погода."
 gaudi.911.g: "Увеличить продолжительность рабочего дня."
 gaudi.911.h: "Выплатить рабочим премию."
 gaudi.911.i: "Мы подождём."
 gaudi.912.t: "Хороший прогресс строительства"
 gaudi.912.d: "Строительство Кёнбоккуна продвигается на удивление быстро. По словам главного архитектора, дворец может быть завершён раньше."
 gaudi.912.f: "По неизвестным причинам строительство Кёнбоккуна продвигается лучше: будь то любовь к родине, высокая заработная плата, дружеская поддержка местных элит или просто лучшая погода."
 gaudi.912.g: "Великолепно."
 gaudi.913.t: "Пожар!"
 gaudi.913.d: "Облака дыма поднимаются над столицей и видны за много миль — на крупнейшей стройке Кореи вспыхнул пожар!"
 gaudi.913.f: "Причина пожара ещё не выяснена, но из-за неосторожности и плохой организации пожаротушения огонь перекинулся на многочисленные сооружения и комнаты. Особенно пострадали уязвимые деревянные конструкции. Строительный проект отброшен на недели и месяцы назад!"
 gaudi.913.g: "Ужасно!"
 gaudi.914.t: "Больше комнат"
 gaudi.914.d: "В ходе строительных работ главный архитектор представил новые планы, которые позволяют более бережно использовать территорию. Тогда станут возможны дополнительные сооружения и комнаты. Однако это означало дополнительные расходы и значительную задержку."
 gaudi.914.f: "«Всего 5000 комнат? Давайте сделаем 7000!»"
 gaudi.914.g: "Нам нужно больше места для монарха и его семьи."
 gaudi.914.h: "Это тщеславие!"
 gaudi.915.t: "Впечатлённый посетитель"
 gaudi.915.d: "В последние несколько дней [SCOPE.sCharacter('gaudi_sycophant_leader').GetFullName] захотел лично убедиться в размерах и красоте строящегося дворца. Когда он увидел возникающие конструкции, он был поражён рождающимся шедевром."
 gaudi.915.f: "«Мой [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], я не осознавал своей ничтожности, пока не увидел Кёнбоккун. Я чувствовал себя пылинкой на большом пляже, потерянной звездой на вечернем небе. Я был всего лишь светлячком, столкнувшимся с солнцем в тот день. Воистину, этот дворец будет самым дворцовым из всех дворцов, святилищем для королей, императоров — богов! Только благодаря вам мы уже можем мельком увидеть эту славу, эту блестящую идею вашего ума. Я лижу вашу тень, даже слюна, падающая с вас, не стоит того, чтобы коснуться моего постыдного тела после того, как я увидел эту славу. О, воистину, я, ничтожный червь, сомневался, сомневался в вас, сомневался в стране, сомневался во всех землях между морями и небесами звёзд! Но это я был неправ, неправ здесь, неправ там, неправ вверху, неправ внизу. Так же, как дрозд-рябинник говорил с луговым ежом-королём, так...»"
 gaudi.915.g: "Эти подхалимы — настоящая чума."
 gaudi.1005.t: "Первая телеграмма"
 gaudi.1005.d: "Сегодня [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] отправил[SelectLocalization(GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.IsFemale, 'а', '')] первое сообщение по электрическому телеграфу, используя изобретённый [SelectLocalization(GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.IsFemale, 'ею', 'им')] алфавит. Испытание прошло с полным успехом."
 gaudi.1005.f: "В марте 1843 года Конгресс США выделил Сэмюэлю Морзе 30 000 долларов на прокладку телеграфной линии между Вашингтоном, округ Колумбия, и Балтимором, штат Мэриленд. Морзе первоначально решил проложить провод под землёй, попросив Эзру Корнелла проложить линию с помощью специального плуга для прокладки кабеля, который разработал Корнелл. Однако проект был остановлен после прокладки около 9,3 миль провода, так как линия вышла из строя. Морзе узнал, что Кук и Уитстон использовали столбы для своих линий в Англии, и решил последовать их примеру. Испытание ещё не завершённой линии состоялось 1 мая 1844 года, когда новость о выдвижении партии вигов Генри Клея на пост президента США была отправлена со съезда партии в Балтиморе в Капитолий в Вашингтоне. Линия Морзе была продемонстрирована 24 мая 1844 года из старой палаты Верховного суда в Капитолии США в Вашингтоне на станцию Маунт-Клэр железной дороги в Балтиморе и началась с передачи первого сообщения Морзе (из Вашингтона) Альфреду Вейлу (в Балтиморе)."
 gaudi.1005.g: "Что сотворил Бог"
 gaudi.1006.t: "Первый автомобиль с двигателем внутреннего сгорания"
 gaudi.1006.d: "Сегодня [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] проехал[SelectLocalization(GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.IsFemale, 'а', '')] на автомобиле с двигателем внутреннего сгорания от [SCOPE.sState('gaudi_car_state_1_scope').GetCustom('RU_SL_RP')] до [SCOPE.sState('gaudi_car_state_2_scope').GetCustom('RU_SL_RP')] и достиг[SelectLocalization(GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.IsFemale, 'ла', '')] скорости 16 километров в час."
 gaudi.1006.f: "«16 километров в час? Это убийственно опасная скорость!»"
 gaudi.1006.g: "Врум!"
