 gaudi.73.t: "Прошлое и будущее иеронимитов"
 gaudi.73.d: "Лиссабонский монастырь иеронимитов считается одним из ярчайших примеров архитектурного стиля мануэлино, напоминающего об одном из самых славных периодов Португалии. Однако в последние десятилетия сооружение было настолько заброшено, что теперь пришло в упадок."
 gaudi.73.f: "Монастырь иеронимитов в Белене (Лиссабон) — одно из самых знаковых сооружений Португалии в стиле поздней готики-мануэлино, первоначально построенное в XVI веке. После веков выветривания и забвения во второй половине XIX века возрос интерес к национальным памятникам. Реставрационные работы начались всерьёз в 1860-х и 1880-х годах под руководством историков и архитекторов эпохи романтизма, стремившихся возвысить имперское прошлое Португалии как источник культурной гордости."
 gaudi.73.g: "Необходим небольшой ремонт."
 gaudi.73.h: "Восстановить его историческое великолепие с помощью полной реставрации!"
 gaudi.73.i: "Распродать самые ценные предметы, чтобы пополнить государственную казну."
