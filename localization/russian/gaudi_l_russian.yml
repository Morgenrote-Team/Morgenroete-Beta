 je_gaudi_gotthard_construction: "Готтардская железная дорога: строительство"
 je_gaudi_gotthard_construction_reason: "Строительство Готтардской железной дороги считается одним из крупнейших строительных проектов XIX века и по своим масштабам и техническим трудностям сравнивается со строительством Суэцкого канала. С самого начала ядром и самой амбициозной частью была реализация тоннеля через Готтардский массив. На момент открытия в 1882 году Готтардский тоннель был самым длинным в мире — 15 километров. Около ста малых и больших мостов, в основном из железа и стали, являются ещё одной частью этого амбициозного маршрута, который не только соединяет северную и южную Европу, но и представляет собой символ швейцарского единства."
