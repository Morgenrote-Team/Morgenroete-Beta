 je_gaudi_mole_phase_1_reason: "Моле-Антонеллиана — это сооружение павильонного типа с высокой, резко сужающейся надстройкой, спроектированное туринским архитектором Алессандро Антонелли. Оно было начато как синагога по заказу еврейской общины, но чрезмерные амбиции архитектора привели к проекту, который вышел за рамки первоначальных планов. Расходы резко возросли, а завершение затянулось на годы. Несмотря на амбициозные попытки, еврейская община в конечном итоге не смогла собрать больше денег. Однако жители Турина выступили за то, чтобы проект был передан местному правительству для завершения сооружения, которое уже в черновом виде производило впечатление, и посвящения его итальянскому единству."
