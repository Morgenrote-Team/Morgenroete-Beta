 gaudi.1501.d: "Наш [concept_tesla_aeronautical_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] долгое время улучшал возможности #tooltippable_name #tooltip:[SCOPE.sBuilding('target').GetTooltipTag],DATA_BUILDING_NAME_TOOLTIP,BuildingTooltip [SCOPE.sBuilding('target').GetCustom('RU_BL_RP')]#!#! в [SCOPE.sBuilding('target').GetState.GetCustom('RU_SL_PP')]. От улучшения взлётно-посадочных полос до строительства новых самолётов и повышения эффективности их двигателей."
