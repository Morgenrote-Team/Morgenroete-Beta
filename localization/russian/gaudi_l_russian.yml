 je_gaudi_public_construction_reason: "[ROOT.GetCountry.GetCustom('je_gaudi_public_construction_active_type')][concept_gaudi_architect], не занятый никаким другим проектом, будет работать над общественным строительством, что приведёт к дополнительным бесплатным #V очкам строительства#!.\nПока не активен никакой другой проект, вы будете получать этот модификатор. Кроме того, ваш [concept_gaudi_architect] будет получать #V репутацию#! каждый год.\n\nАрхитектор с чертой #V «$gaudi_art_deco_style$»#!, #V «$gaudi_bauhaus_style$»#! или #V «$gaudi_neoclassical_style$»#! предоставляет вашей стране #p +30#! $country_construction_add$, занимаясь общественным строительством.\nАрхитектор с чертой #V «$gaudi_historicism_style$»#! предоставляет вашей стране #p +20#! $country_construction_add$, занимаясь общественным строительством.\nАрхитектор с чертой #V «$gaudi_traditional_style$»#! предоставляет вашей стране #p +10#! $country_construction_add$, занимаясь общественным строительством.\n\nКроме того, архитектор с чертой #V «$gaudi_great_architect$»#! предоставляет вашей стране #p +20#! $country_construction_add$, занимаясь общественным строительством."
