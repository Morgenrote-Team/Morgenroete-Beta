 je_gaudi_urban_planning_project: "Городское планирование"
 je_gaudi_urban_planning_project_reason: "Ваш [concept_gaudi_architect] [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] занимается модернизацией методов производства [JournalEntry.GetTarget.GetBuilding.GetName] в [JournalEntry.GetTarget.GetBuilding.GetState.GetCustom('RU_SL_PP')].\n$mr_divider_for_je$\nПроект будет получать прогресс каждый месяц. Каждый раз, когда прогресс достигает 100%, сооружение будет получать новый модификатор.\nВсего существует 3 модификатора:\n- $gaudi_urban_building_throughput_add_modifier_with_tooltip$\n- $gaudi_urban_building_production_mult_modifier_with_tooltip$\n- $gaudi_urban_building_goods_input_mult_modifier_with_tooltip$\n\nВсего можно получить 3 модификатора. Каждый новый модификатор требует, чтобы прогресс снова заполнился."
 gaudi_building_has_throughput_modifier_tt: "[JournalEntry.GetTarget.GetBuilding.GetName] имеет [Concept('concept_modifier','модификатор')] $gaudi_urban_building_throughput_add_modifier_with_tooltip$."
