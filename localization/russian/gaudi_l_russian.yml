 je_gaudi_civil_research_project_reason: "[ROOT.GetCountry.GetCustom('je_gaudi_civil_research_project_type')]Незанятый [concept_tesla_civil_engineer] будет исследовать новые изобретения для гражданского строительства. Исследовательский проект будет получать прогресс каждый месяц. Каждый раз, когда прогресс достигает 36, вы будете получать небольшой прирост к технологии.\n$mr_divider_for_je$\nТехнология для следующего прироста: [ROOT.GetCountry.GetCustom('tesla_civil_engineering_next_technology_type')]\n$mr_divider_for_je$\nТекущий ежемесячный прогресс: #underline #tooltip:[GetRawTextTooltipTag('gaudi_monthly_civil_research_progress_tt')] [JournalEntry.MakeScope.GetVariable('mr_monthly_progress_var').GetValue|2+] #!#!\nТекущий общий прогресс: [JournalEntry.MakeScope.GetVariable('mr_je_progress_var').GetValue|2+] / 36"
 je_gaudi_mechanical_research_project_reason: "[ROOT.GetCountry.GetCustom('je_gaudi_mechanical_research_project_type')]Незанятый [concept_tesla_mechanical_engineer] будет исследовать новые изобретения для машиностроения. Исследовательский проект будет получать прогресс каждый месяц. Каждый раз, когда прогресс достигает 36, вы будете получать небольшой прирост к технологии.\n$mr_divider_for_je$\nТехнология для следующего прироста: [ROOT.GetCountry.GetCustom('tesla_mechanical_engineering_next_technology_type')]\n$mr_divider_for_je$\nТекущий ежемесячный прогресс: #underline #tooltip:[GetRawTextTooltipTag('gaudi_monthly_mechanical_research_progress_tt')] [JournalEntry.MakeScope.GetVariable('mr_monthly_progress_var').GetValue|2+] #!#!\nТекущий общий прогресс: [JournalEntry.MakeScope.GetVariable('mr_je_progress_var').GetValue|2+] / 36"
 je_gaudi_military_research_project_reason: "[ROOT.GetCountry.GetCustom('je_gaudi_military_research_project_type')]Незанятый [concept_tesla_military_engineer] будет исследовать новые изобретения для машиностроения. Исследовательский проект будет получать прогресс каждый месяц. Каждый раз, когда прогресс достигает 36, вы будете получать небольшой прирост к технологии.\n$mr_divider_for_je$\nТехнология для следующего прироста: [ROOT.GetCountry.GetCustom('tesla_military_engineering_next_technology_type')]\n$mr_divider_for_je$\nТекущий ежемесячный прогресс: #underline #tooltip:[GetRawTextTooltipTag('gaudi_monthly_military_research_progress_tt')] [JournalEntry.MakeScope.GetVariable('mr_monthly_progress_var').GetValue|2+] #!#!\nТекущий общий прогресс: [JournalEntry.MakeScope.GetVariable('mr_je_progress_var').GetValue|2+] / 36"
