 je_gaudi_mole_phase_2_reason: "Антонелли постоянно вносил изменения в своё сооружение, например, добавив так называемый «темпьетто» — неоклассическую шестиугольную колоннаду с двумя этажами и квадратным основанием, которая, таким образом, повторяет основной стиль пронаоса. Первоначальная идея Антонелли для шпиля заключалась в том, чтобы увенчать его пятиконечной звездой, но позже он предпочёл статую, изображающую крылатого гения, или «genio alato». Статуя была заказана скульптору Фумагалли через несколько месяцев после смерти Антонелли. Проект включал в себя чеканного и позолоченного медного гения, держащего в одной руке копьё, а в другой — пальмовую ветвь. На его голове была небольшая пятиконечная звезда, поддерживаемая шестом. Когда 10 апреля 1889 года звезда была установлена на своё место, общая высота Моле достигла 167,5 м, что сделало её самым высоким кирпичным сооружением в Европе того времени."
