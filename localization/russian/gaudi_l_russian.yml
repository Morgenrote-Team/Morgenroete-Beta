 je_gaudi_road_project_reason: "Ваш [concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] начал проект по расширению дорог [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]. Проект будет получать прогресс каждый месяц. Каждый раз, когда прогресс достигает [JournalEntry.GetTotalGoalValue|V0], область с наименьшей доступной инфраструктурой получит [concept_modifier] $gaudi_modern_roads_modifier_with_tooltip$.\n\nТекущий ежемесячный прогресс: #underline #tooltip:[GetRawTextTooltipTag('gaudi_monthly_civil_research_progress_tt')] [GetPlayer.MakeScope.GetVariable('gaudi_monthly_civil_engineering_progress_var').GetValue|2+] #!#!"
