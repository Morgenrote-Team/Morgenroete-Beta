 gaudi_dr_engineer_loc: ", д-р [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName],"
 je_gaudi_road_project: "Расширение дорог"
 gaudi_states_with_roads_tt: "Все #tooltippable_name [GetPlayer.GetAdjective|l]ие#! области имеют [concept_modifier] $gaudi_modern_roads_modifier_with_tooltip$ (в настоящее время [GetPlayer.MakeScope.GetVariable('gaudi_num_states_roads_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0])."
 gaudi.1101.t: "Современные дороги [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]"
 gaudi.1101.d: "Наш [concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] наконец завершил проект по модернизации дорог [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]. Наши дороги теперь считаются самыми современными во всём мире. Это будет способствовать развитию торговли и путешествий в нашей стране."
 gaudi.1101.f: "«Помню, когда у нас даже дорог не было. Нам приходилось каждый день прокладывать себе путь через густые леса! Вам, молодёжи, так легко! Правительство просто предоставит вам всё, что нужно! Вам вообще больше не нужно работать!»"
 gaudi.1101.g: "Теперь мы наконец-то можем путешествовать без всех этих ухабов!"
 je_gaudi_bridge_project: "Новые мосты"
 gaudi_states_with_bridges_tt: "Все #tooltippable_name [GetPlayer.GetAdjective|l]ие#! области имеют [concept_modifier] $gaudi_new_bridge_modifier_with_tooltip$ (в настоящее время [GetPlayer.MakeScope.GetVariable('gaudi_num_states_bridge_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0])."
 gaudi.1121.t: "Мосты [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]"
 gaudi.1121.d: "Наш [concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] наконец завершил проект по строительству мостов в важных местах [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]. Теперь, когда эти мосты соединяют места, которые когда-то были далеко друг от друга, мы увидим приток торговли и путешествий."
 gaudi.1121.f: "«Мосты? Кому нужны мосты. Когда я был молод, мы переплывали реки! Эта молодёжь, наверное, даже плавать не умеет! Что станет с нашей цивилизацией!»"
 gaudi.1121.g: "Нужно пересечь семь мостов!"
 je_gaudi_tunnel_project: "Новые тоннели"
 gaudi_states_with_tunnels_tt: "Все #tooltippable_name [GetPlayer.GetAdjective|l]ие#! области имеют [concept_modifier] $gaudi_new_tunnel_modifier_with_tooltip$ (в настоящее время [GetPlayer.MakeScope.GetVariable('gaudi_num_states_tunnel_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0])."
 gaudi.1131.t: "Тоннели [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]"
 gaudi.1131.d: "Наш [concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] наконец завершил проект по созданию нескольких новых тоннелей через холмы и горы в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')]. Теперь, когда эти тоннели облегчают путешествия и транспортировку, мы можем увидеть положительные эффекты для нашей промышленности."
 gaudi.1131.f: "«Я гном, и я копаю яму! Дигги-дигги-хоул, копаю яму!»"
 gaudi.1131.g: "Вы случайно не нашли золото?"
 je_gaudi_railway_project: "Модернизация железнодорожных путей"
 gaudi_states_with_modernized_railway_tt: "Все #tooltippable_name [GetPlayer.GetAdjective|l]ие#! области имеют [concept_modifier] $tesla_modernized_railway_lines_building_modifier_with_tooltip$ (в настоящее время [GetPlayer.MakeScope.GetVariable('gaudi_num_states_modernized_railway_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0])."
 gaudi.1141.t: "Современные железнодорожные пути [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]"
 gaudi.1141.d: "Наш [concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] наконец завершил проект по модернизации железнодорожной инфраструктуры в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')]. Поскольку наши железнодорожные линии теперь одни из самых современных в мире, мы наверняка увидим больше трафика в нашей железнодорожной сети."
 gaudi.1141.f: "«В этих новых железнодорожных линиях есть всё, что нужно! Я даже не удивлюсь, если железнодорожные стрелки будут с подогревом!»"
 gaudi.1141.g: "Чух-чух!"
 je_gaudi_construction_sector_project: "Модернизация строительных секторов"
 gaudi.1151.f: "«Так вот, я строил эту стену, когда подошёл этот человек в хорошем костюме. Он сказал мне, что я могу сэкономить на материалах, если воспользуюсь этой хитростью, которую он придумал. И вот, это действительно сработало! Не знал, что эти белые воротнички на самом деле что-то умеют!»"
 gaudi.1151.g: "Лучшее строительство означает больше фабрик!"
