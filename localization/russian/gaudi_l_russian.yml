 pm_gaudi_no_magnetic_observatory: "Нет геомагнитной обсерватории"
 pm_gaudi_magnetic_observatory: "Геомагнитная обсерватория"
 je_gaudi_magnetic_observation: "Геомагнитное наблюдение"
 je_gaudi_magnetic_observation_reason: "Карл Фридрих Гаусс построил первую геофизическую обсерваторию в Гёттингене и в 1832 году сконструировал для неё чувствительный магнитометр. Он понял, что для локализации причин колебаний и более точного измерения статического поля необходимо проводить глобально распределённые измерения в одно и то же время. С 1836 года основанный для этой цели Магнитный союз и Британское королевское общество предоставляли данные, которые он и Вильгельм Вебер оценивали. Целью было скоординированное измерение колебаний магнитного поля Земли с помощью многочисленных измерительных станций, распределённых по всему миру. В этом проекте приняли участие до 50 обсерваторий, в том числе 35 в Европе, шесть в Азии, две в Африке, три в Северной Америке и четыре в Океании. Результаты доставлялись в Гёттинген и научно обрабатывались Гауссом и Вебером."
 je_gaudi_magnetic_observation_goal: "Собрать #G 100#! @gaudi_magnetic_data! #O магнитных данных#!. Это международное усилие, каждый член Магнитного союза внесёт свой вклад."
 tesla_set_magnetic_association_tt: "Основать Магнитный союз. Другие страны могут присоединиться и также строить #O геомагнитные обсерватории#! для сбора @gaudi_magnetic_data! #O магнитных данных#!. Затем они отправляются в Гёттинген."
 tesla_add_magnetic_association_member_tt: "Присоединиться к Магнитному союзу. Члены будут отправлять @gaudi_magnetic_data! #O магнитные данные#! в Гёттинген и получать выгоду от научных результатов."
 tesla_add_x_magnetic_data_minus_x_tt: "Потеряно [SCOPE.GetValue('magnetic_data_amount')|0+] @gaudi_magnetic_data! #O магнитных данных#!."
 tesla_add_x_magnetic_data_minus_1_tt: "Потеряно [SCOPE.GetValue('magnetic_data_amount')|0+] @gaudi_magnetic_data! #O магнитных данных#!."
 tesla_add_x_magnetic_data_0_tt: "Не получено @gaudi_magnetic_data! #O магнитных данных#!."
 tesla_add_x_magnetic_data_plus_1_tt: "Получено [SCOPE.GetValue('magnetic_data_amount')|0+] @gaudi_magnetic_data! #O магнитных данных#!."
 tesla_add_x_magnetic_data_plus_x_tt: "Получено [SCOPE.GetValue('magnetic_data_amount')|0+] @gaudi_magnetic_data! #O магнитных данных#!."
 gaudi_geomagnetical_knowledge_modifier: "Геомагнитные знания"
 gaudi.1401.t: "Новый член Магнитного союза"
 gaudi.1401.d: "[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] сегодня присоединился к Магнитному союзу в Гёттингене. Другие члены тепло его приветствовали."
 gaudi.1401.f: "Присоединившись, д-р [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName] также смог получить необходимые знания для строительства функциональной геомагнитной обсерватории. Председатель передал нашему инженеру планы такой станции и магнитометр. Весь союз настаивал на скорейшем начале строительства и отправке первых данных в Гёттинген."
 gaudi.1401.g: "Мы должны немедленно построить измерительную станцию."
 gaudi.1402.t: "Геомагнитная обсерватория завершена"
 gaudi.1402.d: "Строительство геомагнитной обсерватории было завершено сегодня. За последние месяцы было получено множество данных, которые были переданы в Гёттинген."
 gaudi.1402.f: "Полученные данные измерений служат не только для научных исследований магнитного поля Земли, но и имеют практическое применение. Карты склонения использовались в прошлом и используются до сих пор для навигации в судоходстве и авиации. Для поиска сырьевых ресурсов, таких как месторождения руды и нефти, геомагнитные данные измерений имеют важное значение."
 gaudi.1402.g: "За геомагнитную науку!"
 gaudi.1403.t: "Международный сбор магнитных данных"
 gaudi.1403.d: "После многих лет сбора и сравнения геомагнитных данных со всего мира исследователи в Гёттингене смогли прийти к интересному результату."
 gaudi.1403.f: "В 1839 году Гаусс смог показать, что большая часть статического магнитного поля Земли исходит изнутри Земли, в то время как меньшие, кратковременные изменения магнитного поля Земли происходят извне. Вместе с Вебером он опубликовал результаты в шести томах под названием «Результаты наблюдений Магнитного союза». В дополнительном томе были опубликованы карты, которые давали магнитные данные, действительные на тот момент для любого места на земном шаре. Линии соединяли точки одинакового склонения, одинакового наклонения и одинаковой напряжённости поля. Эта публикация стала вехой в истории естественных наук."
 gaudi.1403.g: "Впечатляющее достижение."
 gaudi.1404.t: "Морской интерес"
 gaudi.1404.d: "[SCOPE.sCharacter('gaudi_admiral_scope').GetFullName] проявил большой интерес к геомагнитным исследованиям [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName]. Он провёл успешный эксперимент в строящейся геомагнитной обсерватории."
 gaudi.1404.f: "«Что я собираюсь делать с лягушачьими лапками? О, ничего особенного, абсолютно ничего...»"
 gaudi.1404.g: "Новые знания должны быть ему полезны."
 gaudi.1404.h: "Эти знания должны принести пользу всем."
 gaudi.1405.t: "Аномалия"
 gaudi.1405.d: "Несмотря на повторные измерения, показатели магнитного поля Земли, которые зафиксировал д-р [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName], едва соответствуют ожидаемым. Причину этого он пока найти не смог."
 gaudi.1405.f: "Причин, по которым магнитное поле Земли в одном месте отличается от другого, может быть множество. Такие случаи часто давали повод предполагать, что на этом месте может находиться крупное месторождение металла, поэтому геомагнитные исследования были небезынтересны для горнодобывающей промышленности."
 gaudi.1405.g: "Мы должны немедленно отправить данные в Гёттинген."
 gaudi.1406.t: "Астроном консультируется с геомагнитной обсерваторией"
 gaudi.1406.d: "Д-р [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] и д-р [GetPlayer.MakeScope.GetVariable('verrier_astronomer_var').GetCharacter.GetFullName] провели несколько стимулирующих бесед во время экскурсии по недавно построенной геомагнитной обсерватории. Обмен мнениями чрезвычайно расширил научные знания [SCOPE.sCharacter('verrier_astronomer_var').GetLastName]."
 gaudi.1406.f: "«Так вот почему бутерброд с вареньем всегда падает на пол вареньем вниз!»"
 gaudi.1406.g: "Это поможет [SelectLocalization(GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.IsFemale, 'ей', 'ему')] в [SelectLocalization(GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.IsFemale, 'её', 'его')] практических исследованиях."
 gaudi.1406.h: "Это поможет [SelectLocalization(GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.IsFemale, 'ей', 'ему')] в [SelectLocalization(GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.IsFemale, 'её', 'его')] теоретических исследованиях."
 pmg_gaudi_communication: "Связь"
 pm_gaudi_no_communication: "Нет связи"
 pm_gaudi_telegraph_office: "Телеграф"
 gaudi_building_telegraph_network_modifier: "Проводной телеграф для нации"
 gaudi_telegraphy_network_modifier: "Национальная телеграфная сеть"
 gaudi_mocked_by_telegram_modifier: "Осмеян телеграммой"
 je_gaudi_telegraphy_network: "Создать телеграфную сеть"
 je_gaudi_telegraphy_network_reason: "В принципе, телеграф можно построить только там, где уже есть железнодорожная линия, так как телеграфные столбы проходят вдоль путей и имеют большое значение для координации работы железнодорожной системы. На открытие нового отделения уходит около года, при этом [concept_tesla_engineer] ускоряет процесс. Завершение происходит ещё быстрее, если это [concept_tesla_electrical_engineer]. Изобретение электромагнетизма также положительно влияет на ход работ. Изобретение электромагнетизма также необходимо для создания телеграфных отделений в заморских странах или других эксклавах. В противном случае телеграфное отделение можно построить только в области, граничащей с другой областью, где есть телеграф."
 gaudi.1411.t: "Национальная телеграфная сеть"
 gaudi.1411.d: "Д-р [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] сегодня представил планы новой телеграфной линии для соединения [GetPlayer.GetAltNameNoFlag('RU_CL_VP')]. Это сблизит людей, как никогда раньше."
 gaudi.1411.f: "Сэмюэл Морзе разработал и запатентовал записывающий электрический телеграф в 1837 году. Помощник Морзе Альфред Вейл разработал инструмент, который назывался регистратором для записи полученных сообщений. Он выбивал точки и тире на движущейся бумажной ленте с помощью стилуса, который приводился в действие электромагнитом. Морзе и Вейл разработали сигнальный алфавит азбуки Морзе. Первая телеграмма в Соединённых Штатах была отправлена Морзе 11 января 1838 года по проводу длиной в две мили (3 км) на металлургическом заводе Спидвелл близ Морристауна, штат Нью-Джерси, хотя лишь позже, в 1844 году, он отправил сообщение «ЧТО СОТВОРИЛ БОГ» на расстояние 44 мили (71 км) из Капитолия в Вашингтоне на старую станцию Маунт-Клэр в Балтиморе."
 gaudi.1411.g: "..-. .. -. ."
 gaudi.1412.t: "Телеграфная сеть остановлена"
 gaudi.1412.d: "Правительство приказало немедленно прекратить расширение телеграфных линий."
 gaudi.1412.f: "Сегодня был издан следующий приказ, в связи с чем все работы будут приостановлены с этого момента:\n\n-.-. --- -. ... - .-. ..- -.-. - .. --- -. / ... - --- .--. --..-- / -. --- .-- -.-.--"
 gaudi.1412.g: "Пока что мы заканчиваем строительство."
 gaudi.1413.t: "Телеграфная сеть завершена"
 gaudi.1413.d: "Сегодня был торжественно установлен последний телеграфный столб в ранее недоступном районе. Каждое место в нашей стране подключено к национальной телеграфной сети, и сообщения отправляются с одного конца страны на другой."
 gaudi.1413.f: "Охват всей нации одной телеграфной сетью — это огромное достижение. Подключение к международной сети обеспечит значительное стимулирование национального и глобального обмена идеями. Конечно, это не конец: если наша нация приобретёт новые территории, которые ещё не подключены, нам придётся создавать телеграфные отделения и там. И, возможно, однажды появится способ отправлять сообщения без использования телеграфных линий..."
 gaudi.1413.g: "..-. .- -. - .- ... - .. -.-."
 gaudi.1414.t: "Университеты соединены телеграфом"
 gaudi.1414.d: "Университеты [SCOPE.sState('gaudi_university_state_1').GetCustom('RU_SL_RP')] и [SCOPE.sState('gaudi_university_state_2').GetCustom('RU_SL_RP')] теперь соединены прямой телеграфной линией. Учёные надеются, что это приведёт к расширению обмена."
 gaudi.1414.f: "«Из всех чудесных достижений современной науки электрический телеграф является трансцендентально величайшим и наиболее полезным для человечества... Вся земля будет опоясана электрическим током, трепещущим от человеческих мыслей и эмоций... Какую же мощную силу, таким образом, суждено стать телеграфу в цивилизации мира! Он связывает воедино жизненной нитью все народы земли. Невозможно, чтобы старые предрассудки и враждебность продолжали существовать, в то время как такой инструмент был создан для обмена мыслями между всеми народами земли». -Август Маверик"
 gaudi.1414.g: "Это укрепит технические исследования."
 gaudi.1414.h: "Это укрепит естественнонаучные исследования."
 gaudi.1414.i: "Это укрепит археологические исследования."
 gaudi.1415.t: "Телеграмма для вашего соседа"
 gaudi.1415.d: "Телеграфная станция в [SCOPE.sState('gaudi_our_telegraph_state').GetCustom('RU_SL_PP')] установила связь с соседней областью [SCOPE.sState('gaudi_neigbour_telegraph_state').GetCustom('RU_SL_TP')]. Теперь мы можем отправить телеграмму нашему соседу."
 gaudi.1415.f: "Телеграфия может способствовать международному взаимопониманию и улучшению отношений. Некоторые телеграммы, однако, нет."
 gaudi.1415.g: "Отправить дружескую телеграмму, чтобы укрепить наши отношения."
 gaudi.1415.h: "Отправить шуточную телеграмму, чтобы досадить их главе государства."
 gaudi.1416.t: "Телеграмма от нашего соседа"
 gaudi.1416.d: "Наш сосед, [SCOPE.sCountry('gaudi_telegram_country').GetName], установил телеграфную линию в соседней области и отправил нам дружеское сообщение."
 gaudi.1416.f: "«Добрым соседям»."
 gaudi.1416.g: "Телеграмма? Мне? Мы тоже должны отправить одну!"
 gaudi.1417.d: "Сегодня была отправлена первая официальная телеграмма от [SCOPE.sCountry('gaudi_telegram_country').GetAltNameNoFlag('RU_CL_RP')]. По-видимому, они хотят выставить нас дураками!"
 gaudi.1417.f: "«У [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] блохи»."
 gaudi.1417.g: "Это что, шуточная телеграмма?"
 gaudi_building_radio_network_modifier: "Радиостанции для всех"
 gaudi_radio_network_modifier: "Сеть радиостанций"
 je_gaudi_radio_network: "Построить сеть радиостанций"
 je_gaudi_radio_network_reason: "Радиостанции можно устанавливать в любой точке страны, при условии, что там уже есть железная дорога — предварительно создавать телеграфную сеть не обязательно. На строительство новой радиостанции уходит около года, причём [concept_tesla_engineer] ускоряет процесс. Завершение происходит ещё быстрее, если это [concept_tesla_electrical_engineer]."
 gaudi.1421.t: "Радиосеть"
 gaudi.1421.d: "Изобретение беспроводной телеграфии делает возможными чудеса. Отныне сообщения можно отправлять из любого места в другое без каких-либо передающих вышек, при наличии соответствующего технического оборудования."
 gaudi.1421.f: "В 1897 году Карл Фердинанд Браун присоединился к числу пионеров беспроводной связи. Его основными вкладами были введение замкнутого настроенного контура в генерирующей части передатчика, его отделение от излучающей части (антенны) с помощью индуктивной связи, а затем использование кристаллов для приёмных целей. Беспроводная телеграфия полностью захватила внимание доктора Брауна в 1898 году, и в течение многих последующих лет он почти исключительно посвятил себя решению её проблем. Доктор Браун много писал на темы беспроводной связи и был хорошо известен благодаря своим многочисленным вкладам в «Электрик» и другие научные журналы. В 1899 году он подаст заявку на патент «Беспроводная электропередача сигналов по поверхностям»."
 gaudi.1421.g: "Антенну в каждый дом!"
 gaudi.1422.t: "Радиосеть остановлена"
 gaudi.1422.d: "Строительные работы по новым антеннам и радиостанциям на данный момент прерваны. Их можно продолжить в любое время с [Concept('concept_tesla_electrical_engineer', '#ORANGE #b инженером-электриком#!#!')]."
 gaudi.1422.f: "«Принёс ли я миру добро, или добавил угрозу?» -Гульельмо Маркони"
 gaudi.1422.g: "Пока что мы заканчиваем строительство."
 gaudi.1423.t: "Радиосеть завершена"
 gaudi.1423.d: "Физики и инженеры [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] с гордостью объявляют, что они теперь покрыли всю страну — без проводов!"
 gaudi.1423.f: "«Моя главная проблема заключалась в том, что идея была настолько элементарной, настолько простой в своей логике, что казалось трудным поверить, что никто другой не подумал о том, чтобы её реализовать». -Гульельмо Маркони"
 gaudi.1423.g: "Слушайте радио!"
 gaudi.1424.t: "Первая радиопрограмма"
 gaudi.1424.d: "Первая частная радиопрограмма, вышедшая в эфир в [SCOPE.sState('gaudi_radio_state').GetCustom('RU_SL_PP')], привела к резкому росту интереса к этому новому средству массовой информации. Ближайший завод готовится к этому и повысил эффективность собственного производства, чтобы быть готовым к возможному наплыву покупателей."
 gaudi.1424.f: "В 1909 году начала работать первая в мире новостная станция с регулярной программой мощностью 14 ватт. Станция в Сан-Хосе, Калифорния, была создана физиком Чарльзом «Доком» Херролдом и студентами его Колледжа беспроводной связи и инженерии. В 1921 году этой станции, теперь уже коммерческой, был присвоен идентификатор KQW, который позже был передан CBS."
 gaudi.1424.g: "Радио в каждый дом?"
 gaudi.1425.t: "Радиоагитация"
 gaudi.1425.d: "Политика и пропаганда также меняются с технологиями. [SCOPE.sCharacter('gaudi_opposition_leader').GetFullName] открыл собственный небольшой радиоканал, который партийные сторонники слушают каждый день. Даже ранее аполитичные люди восприимчивы к программе."
 gaudi.1425.f: "«До-оброе утро, дорогие слушатели. Это утренние объявления. Пробы в футбольную команду состоятся в пятницу днём. Это, конечно, если наш [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] что-то сделает с нашим ужасным футбольным полем. У меня вопрос. Что на самом деле делает [SCOPE.sCharacter('gaudi_ruler').GetFullName]? [SelectLocalization(SCOPE.sCharacter('gaudi_ruler').IsFemale, 'Она же', 'Он же')] должен быть [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle|l], верно? Какова его повестка дня? [SelectLocalization(SCOPE.sCharacter('gaudi_ruler').IsFemale, 'Она', 'Он')] всем лжёт? Или нет? Давайте зададим эти вопросы. Кроме того, кто на самом деле голосовал за [SCOPE.sCharacter('gaudi_ruler').GetFullName]? Я знаю, что не я. И все, кто голосовал, теперь чешут в затылке и говорят: „Упс. Наверное, не стоило этого делать“. Я не в кабинете министров, я обычный человек, как и все вы. И как и все вы, я хочу знать, что случилось... с моей страной»."
 gaudi.1425.g: "Запретить эту радиостанцию!"
 gaudi.1425.h: "Это свободная страна, так что можно вещать свободно."
 gaudi.1426.t: "Тревожная радиопостановка"
 gaudi.1426.d: "Одна из первых радиопостановок в радиошоу вызвала массовую панику среди неосведомлённых слушателей, потому что они приняли вымышленную историю за часть новостного репортажа."
 gaudi.1426.f: "«Это Орсон Уэллс, дамы и господа, вне образа, чтобы заверить вас, что „Война миров“ не имеет никакого иного значения, кроме как праздничное подношение, каким оно и задумывалось; собственная радиоверсия Театра „Меркурий“, нарядившегося в простыню и выпрыгнувшего из-за куста со словом „Бу!“. Начиная с этого момента, мы не могли бы к завтрашней ночи намазать мылом все ваши окна и украсть все ваши садовые калитки, поэтому мы сделали следующее лучшее. Мы уничтожили мир на ваших глазах и полностью разрушили CBS. Вы будете облегчены, я надеюсь, узнав, что мы не имели этого в виду, и что оба учреждения всё ещё открыты для бизнеса. Итак, до свидания всем, и, пожалуйста, помните в ближайшие день-два тот ужасный урок, который вы усвоили сегодня вечером. Этот ухмыляющийся, светящийся, шарообразный захватчик вашей гостиной — житель тыквенного поля, и если в вашу дверь позвонят, а там никого не будет, это был не марсианин, это Хэллоуин». -Орсон Уэллс"
 gaudi.1426.g: "Вторжение инопланетян? И люди в это поверили?"
 gaudi.1426.h: "Хорошо, что мы были готовы!"
 gaudi.1420.t: "Трансатлантический кабель"
 gaudi.1420.d: "Трансатлантический кабель теперь соединяет Ньюфаундленд и Ирландию. Между континентами было обменено первое сообщение."
 gaudi.1420.f: "«Это триумф более славный, потому что гораздо более полезный для человечества, чем когда-либо одержанный завоевателем на поле битвы. Пусть атлантический телеграф, под благословением Небес, окажется узами вечного мира и дружбы между родственными нациями и инструментом, предназначенным Божественным Провидением для распространения религии, цивилизации, свободы и закона по всему миру». -Джеймс Бьюкенен"
 gaudi.1420.g: ".... . .-.. .-.. --- -.-.--"
 gaudi.1430.t: "Трансатлантическая передача"
 gaudi.1430.d: "Большой успех для человеческого прогресса: сегодня было отправлено первое сообщение по беспроводной связи через Атлантику!"
 gaudi.1430.f: "-с-"
 gaudi.1430.g: "И это действительно работает? Сообщения по воздуху?"
 je_gaudi_transatlantic_cable: "Трансатлантический кабель"
 je_gaudi_transatlantic_cable_reason: "Создав телеграфную станцию по обе стороны Атлантики, появляется возможность проложить подводный телеграфный кабель, чтобы сблизить Европу и Америку."
 je_gaudi_transatlantic_radio: "Трансатлантическая передача"
 je_gaudi_transatlantic_radio_reason: "Это звучит как волшебство, но с помощью самых современных технологий гораздо проще отправлять сообщения через Атлантику, чем использовать телеграфные кабели. Это решило бы проблему постоянных обрывов кабелей и, следовательно, сбоев в связи."
