 je_gaudi_construction_sector_project_reason: "Ваш [concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] начал проект по модернизации #tooltippable_name #tooltip:[JournalEntry.GetTarget.GetBuilding.GetTooltipTag],DATA_BUILDING_NAME_TOOLTIP,BuildingTooltip [JournalEntry.GetTarget.GetBuilding.GetCustom('RU_BL_RP')]#!#! в [JournalEntry.GetTarget.GetBuilding.GetState.GetCustom('RU_SL_PP')]\n$mr_divider_for_je$\nПроект будет получать прогресс каждый месяц. Каждый раз, когда прогресс достигает [JournalEntry.GetTotalGoalValue|V0], сооружение будет получать новый модификатор.\nВсего можно получить 3 модификатора:\n- $gaudi_new_construction_methods_modifier_with_tooltip$\n- $gaudi_faster_construction_methods_modifier_with_tooltip$\n- $gaudi_efficient_construction_methods_modifier_with_tooltip$\n\nКаждый новый модификатор требует, чтобы прогресс снова заполнился.\n$mr_divider_for_je$\nТекущий ежемесячный прогресс: #underline #tooltip:[GetRawTextTooltipTag('gaudi_monthly_civil_research_progress_tt')] [GetPlayer.MakeScope.GetVariable('gaudi_monthly_civil_engineering_progress_var').GetValue|2+] #!#!"
