 gaudi.801.t: "Начинается строительство Дворца изящных искусств"
 gaudi.801.d: "После сноса Национального театра теперь достаточно места, чтобы обогатить Мехико большим дворцом, полностью посвящённым культуре. [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] сегодня провел[SelectLocalization(SCOPE.sCharacter('gaudi_ruler').IsFemale, 'а', '')] церемонию закладки первого камня."
 gaudi.801.f: "Самым старым известным сооружением на этом месте был монастырь Санта-Исабель, чья церковь была построена в 1680 году. Часть этого жилого комплекса на аллее Санта-Исабель была снесена и заменена Национальным театром в конце XIX века. В конце XIX и самом начале XX века этот театр был местом сосредоточения большей части высокой культуры Мехико, представляя такие мероприятия, как театр, оперетты, венские танцы и многое другое. Затем было решено заменить это сооружение более пышным для предстоящих празднований столетия независимости Мексики в 1910 году. Старый театр был снесён в 1901 году, а новый театр должен был называться Gran Teatro de Ópera."
 gaudi.801.g: "Мексика станет первоклассной культурной нацией!"
 gaudi.802.t: "Дворец изящных искусств: первый этап завершён"
 gaudi.802.d: "Каркас Дворца изящных искусств уже возвышается над крышами Мехико. Жители уже чувствуют, что на их глазах растёт шедевр."
 gaudi.802.f: "Адамо Боари сочетал в своих планах различные стили своего времени, при этом доминировали стиль Прекрасной эпохи, а также неоклассические и доиспанские мотивы. Фасад дворца был выполнен из белого мрамора, а интерьер сооружения — из разноцветного мрамора. По этой причине сооружение имеет такой огромный вес, что дворец теперь на несколько метров ниже окружающих улиц."
 gaudi.802.g: "Когда начнётся предварительная продажа билетов?"
 gaudi.803.t: "Строительство Дворца изящных искусств продолжается"
 gaudi.803.d: "Сооружение уже в значительной степени завершено, но помимо дальнейших строительных работ, теперь начинается великолепная и кропотливая работа по внутренней отделке помещений."
 gaudi.803.f: "Стены дворца украшают работы различных известных муралистов, включая фрески Хосе Клементе Ороско, Диего Риверы и Давида Альфаро Сикейроса. Во дворце также есть скульптуры Андре Аллара, посвящённые семи музам. Десять богато украшенных железных ворот сооружения были заказаны у итальянца Алессандро Маццукотелли. Бронзовая скульптурная группа, украшающая вершину главного купола, была изготовлена венгром Гезой Мароти, а дизайн самих куполов выполнен Роберто Альваресом Эспиносой в стиле ар-деко."
 gaudi.803.g: "Мечта в стиле ар-деко."
 gaudi.804.t: "Дворец изящных искусств завершён"
 gaudi.804.d: "После многих лет строительства и нескольких непредвиденных задержек у Мехико теперь есть новая достопримечательность: Дворец изящных искусств превосходит всю страну своей культурной мощью."
 gaudi.804.f: "Сооружение было полностью закончено в 1934 году и торжественно открыто 29 ноября того же года. Первой работой, представленной в театре, была «Подозрительная правда» Хуана Руиса де Аларкона в 1934 году. В 1946 году был создан Национальный институт изящных искусств (Instituto Nacional de Bellas Artes) как правительственное учреждение для содействия искусству."
 gaudi.804.g: "Музыка, литература и живопись под одной крышей!"
 gaudi.809.t: "Мехико потерян!"
 gaudi.809.d: "С потерей Мехико мы лишились всякой возможности продолжать строительство Дворца изящных искусств."
 gaudi.809.f: "Если по какой-либо причине Мехико будет потерян, прогресс строительства в целом не пропадёт. Только Мексика может продолжить строительство Дворца изящных искусств с последнего этапа. Иностранные захватчики, с другой стороны, не проявят интереса к дальнейшему строительству."
 gaudi.809.g: "Мы не можем надолго оставлять им Мехико!"
 gaudi.811.t: "Пожертвование"
 gaudi.811.d: "Правительственные партии в нашей стране имеют понятный интерес к скорейшему продолжению строительства Дворца изящных искусств. [SCOPE.sCharacter('gaudi_government_leader').GetFullName] особенно активно поддерживал Дворец культуры и собирал пожертвования."
 gaudi.811.f: "Слухи о том, что это на самом деле могут быть чёрные деньги из партийных касс, которые срочно нужно куда-то деть, — это, конечно же, чистое изобретение оппозиции."
 gaudi.811.g: "Muchas gracias."
 gaudi.812.t: "Профсоюзы критикуют условия труда"
 gaudi.812.d: "Сегодня в парламенте [SCOPE.sCharacter('trade_unions_leader').GetFullName] посетовал на ужасающие условия, в которых строится Дворец изящных искусств."
 gaudi.812.f: "«Дворец изящных искусств должен стать центром культуры в нашей стране, местом, где люди посвящают себя только истинному, доброму и прекрасному. Но то, как правительство эксплуатирует простого рабочего, выжимая из него все соки в самых неблагоприятных условиях, чтобы другие могли наслаждаться этой красотой, находится в вопиющем противоречии с эстетикой, которая должна быть присуща этому проекту!»"
 gaudi.813.t: "Болотистая почва"
 gaudi.813.d: "Неровная и болотистая почва создаёт новые проблемы для главного архитектора Дворца изящных искусств. Сооружение всё больше рискует уйти под землю. Контрмеры продолжают задерживать фактическое строительство."
 gaudi.813.f: "Мехико — это хаотично разрастающийся город, который и тогда, и сейчас был одним из крупнейших агломераций в мире. Однако расположение было далеко не выгодным. Город-предшественник, ацтекский Теночтитлан, находился посреди озера. Это озеро было осушено на протяжении веков, и илистая почва уже в прошлом показала себя не слишком твёрдой. Строительство глубоких колодцев ещё больше усугубило ситуацию. Некоторые барочные церкви значительно ниже, чем при их постройке. Дворец изящных искусств, таким образом, не является исключением."
 gaudi.813.g: "Будь проклято, озеро Тескоко!"
 gaudi.814.t: "Новые машины"
 gaudi.814.d: "Технический прогресс означает, что Дворец изящных искусств строится быстрее, чем предполагалось."
 gaudi.814.f: "«Лифт? Вам больше не нужны лестницы? То есть, можно просто позволить себя поднять? И строительные материалы тоже? Почему нам никто раньше об этом не сказал?»"
 gaudi.815.t: "Угроза забастовки"
 gaudi.815.d: "Строители Дворца изящных искусств объявили забастовку, если мы не согласимся на переговоры о повышении заработной платы."
 gaudi.815.f: "Ах, чудесный мир забастовок! Вы не знаете, что упускаете, если не испытали в Латинской Америке, каково это — застрять на вокзале, потому что профсоюз железнодорожников вдруг решил его саботировать. Сегодня это касается только одной строительной площадки. Нам действительно повезло!"
 gaudi.815.i: "Вызвать военную полицию!"
 gaudi.816.t: "Обрушение фасада унесло жизни рабочих"
 gaudi.816.d: "На строительной площадке Дворца изящных искусств произошёл серьёзный несчастный случай: десятки рабочих были ранены, некоторые даже погибли, а часть фасада обрушилась!"
 gaudi.816.f: "Причина ещё не выяснена, и ведущего архитектора допрашивают. Некоторые предполагают некачественное строительство и хищение средств на высококачественные материалы. Другие улики указывают на ошибку в проекте. Несомненно то, что целая группа рабочих была завалена обрушившейся стеной фасада, которая также полностью разрушила уже построенные части сооружения."
 gaudi.817.t: "Дворец изящных искусств растёт"
 gaudi.817.d: "Строительство Дворца изящных искусств продвигается быстрее, чем ожидалось, по неустановленным причинам."
 gaudi.817.f: "По неизвестным причинам строительство великолепного Дворца изящных искусств продвигается. Может быть, это была хорошая погода. Возможно, молитва Святой Деве. Возможно, также и довольно некачественный строительный материал, который мы растратили на днях и который, мы надеемся, никогда не будет найден. Одно можно сказать наверняка: этот монстр, который неоднократно испытывал задержки из-за самых разных обстоятельств, должен быть закончен быстрее, чем ожидалось. Если, конечно, болотистая почва снова не позволит сооружению просесть..."
 gaudi.817.g: "¡Excelente!"
 gaudi.818.t: "Археологические изыскания в Мехико"
 gaudi.818.d: "После визита на строительную площадку [SCOPE.sCharacter('gaudi_archaeologist').GetFullName] обнаружил, что Дворец изящных искусств, по-видимому, стоит на ацтекских руинах. Он просит выдать лицензию на раскопки."
 gaudi.818.f: "Теночтитлан был столицей Ацтекской империи и городом-предшественником Мехико. После испанского завоевания он был в значительной степени разрушен, а некоторые руины были сброшены в окружающее озеро Тескоко или строительные материалы были использованы для строительства новых сооружений. Ацтекские сполии до сих пор можно найти в старых домах колониальной эпохи."
 gaudi.819.t: "Новые рабочие места в Мехико"
 gaudi.819.d: "Строительство Дворца изящных искусств привело к большому притоку людей в Мехико."
 gaudi.819.f: "Выдающееся значение Мехико восходит к доколониальным временам, когда Теночтитлан считался столицей Ацтекской империи и выполнял многочисленные центральные функции. Разрушенный и восстановленный испанцами как колониальная метрополия, город стал резиденцией централизованной колониальной администрации. В конце XIX века его значение укрепилось благодаря расширению железнодорожной сети. С началом XX века, помимо своей функции финансового и торгового центра, город приобрёл значение как промышленный центр. Перспектива работы десятилетиями привлекала в столицу сотни тысяч людей. Строительные проекты, такие как Дворец изящных искусств, служили стимулом."
