 gaudi.74.t: "Новое видение в камне"
 gaudi.74.d: "Смелый новый архитектор привлекает внимание как духовенства, так и короны. Его зовут Алессандро Антонелли."
 gaudi.74.f: "«Родившийся в 1798 году в Гемме, Пьемонт, Алессандро Антонелли долгое время считался многообещающей, но непроверенной фигурой в архитектурных кругах Италии. Это восприятие изменилось с его радикальными вмешательствами в собор Новары. Получив задание спроектировать новый неоклассический алтарь, Антонелли представил смелый синтез классической геометрии и парящей вертикальности, который разделил мнения, но никого не оставил равнодушным. В то время как некоторые критики находили его проекты чрезмерными, другие видели в нём дух, достойный итальянского Ренессанса.\n\nПо мере роста его репутации возникают вопросы о его будущих заказах и о том, станет ли он человеком, который изменит силуэты Королевства»."
 gaudi.74.g: "Антонелли должен стать новым главным архитектором Сардинии."
 gaudi.74.h: "Дайте ему кафедру в академии."
