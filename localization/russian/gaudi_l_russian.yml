 gaudi.1161.t: "Новая топографическая карта [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]"
 gaudi.1161.d: "Наш [concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] завершил работу над хорошо выполненной топографической картой [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]. Эта карта поможет нашим инженерам строить новую инфраструктуру и сооружения. Кроме того, она предлагает хороший обзор [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]."
 gaudi.1161.f: "«Это фантастика! Я и не знал, что живу так близко к следующему городу. И даже мой сарай на карте есть!»"
