 gaudi.51.t: "Неоклассическое возрождение"
 gaudi.51.d: "[ROOT.GetCountry.GetName] стал[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')] образцом вневременной и достойной архитектуры. Этот статус вызывает трепет во всём цивилизованном мире!"
 gaudi.51.f: "«Общей и самой выдающейся характеристикой шедевров древности является, в конечном счёте, благородная простота и спокойное величие, как в позе, так и в выражении».\n- Иоганн Иоахим Винкельман"
 gaudi.51.g: "Это суть истинного искусства."
 gaudi.52.t: "Триумф Баухауса"
 gaudi.52.d: "[ROOT.GetCountry.GetName] стал[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')] маяком рациональной и прогрессивной архитектуры. Этот статус вызывает всемирное уважение и восхищение!"
 gaudi.52.f: "«Дизайн — это не профессия, а отношение».\n- Ласло Мохой-Надь"
 gaudi.52.g: "Потребности людей вместо потребности в роскоши!"
 je_gaudi_bauhaus_architecture: "Архитектура Баухауса"
 je_gaudi_bauhaus_architecture_reason: "Баухаус — это немецкая художественная школа, действовавшая с 1919 по 1933 год, которая сочетала ремёсла и изящные искусства. Школа прославилась своим подходом к дизайну, который пытался объединить индивидуальное художественное видение с принципами массового производства и акцентом на функциональность. В её основе лежала идея создания Gesamtkunstwerk (комплексного произведения искусства), в котором в конечном итоге должны были объединиться все искусства. Стиль Баухаус позже стал одним из самых влиятельных течений в современном дизайне, модернистской архитектуре и архитектурном образовании."
 je_gaudi_neoclassical_architecture: "Неоклассическая архитектура"
 je_gaudi_neoclassical_architecture_reason: "Неоклассицизм в начале XX века был возрожденческим архитектурным и художественным движением, стремившимся восстановить связь с формальной ясностью, симметрией и величием греко-римской античности. Возникнув как противовес излишествам историзма и растущей абстракции современного искусства, этот стиль подчёркивал монументальность, геометрический порядок и использование традиционных форм в рациональном, часто санкционированном государством идиоме. Он был тесно связан с национальной идентичностью и гражданской архитектурой, проецируя идеалы постоянства, власти и дисциплинированной красоты."
 je_gaudi_art_deco_architecture: "Архитектура ар-деко"
 je_gaudi_art_deco_architecture_reason: "Движение ар-деко возникло в 1920-х годах как декоративный и архитектурный стиль, который принял современность, сохранив при этом элементы классического порядка. С характерным использованием стилизованных форм, богатых материалов и орнаментальной геометрии, ар-деко сочетал роскошь ремесла с зарождающейся машинной эстетикой. Он прославлял технический прогресс и городскую динамику через мотивы, вдохновлённые промышленностью, скоростью и экзотикой."
 je_gaudi_splendour_bauhaus: "Триумф Баухауса"
 je_gaudi_splendour_bauhaus_reason: "С появлением духа Баухауса архитекторы начали отказываться от орнамента и иллюзии в пользу ясности, точности и верности материалу. Цель больше не в том, чтобы впечатлять роскошью или вызывать величие империй прошлого, а в том, чтобы служить обществу, создавая пространства, которые функциональны, честны и современны. Баухаус — это не просто эстетика, это философия дизайна, основанная на убеждении, что архитектура и повседневная жизнь должны быть согласованы через простоту, полезность и единство формы и назначения. Принимая принципы Баухауса, столица сигнализирует не просто о современности, а о прогрессе в его чистейшей форме: возвышении функции над фасадом, инноваций над традицией."
 je_gaudi_splendour_neoclassical: "Неоклассическое возрождение"
 je_gaudi_splendour_neoclassical_reason: "Неоклассицизм — это стиль, укоренённый в рациональной гармонии античности, в архитектурной грамматике колонн, фронтонов и симметричных планировок. Однако в начале XX века он был переосмыслен с использованием современных строительных техник, более чистых линий и часто монументального масштаба. Он олицетворял не только традицию, но и дисциплинированное видение будущего — такого, в котором общественная жизнь, право и культура будут обрамлены сооружениями, внушающими трепет и единство. Архитектура, которая принимает эти принципы, наделит нашу столицу серьёзностью и величием, превратив её в маяк порядка, стойкости и культурной мощи в глазах мира."
 je_gaudi_splendour_art_deco: "Мечта в стиле ар-деко"
 je_gaudi_splendour_art_deco_reason: "С появлением ар-деко архитекторы произвели революцию в мире искусства, например, порвав с жёстким историзмом прошлого. Но в отличие от многих современных школ, их сооружения не были выражением чистой функциональности и объективности. Ар-деко — это развитие в русле общего пробуждения классического модернизма, в котором на передний план вышло творческое сочетание элегантности формы, драгоценности материалов, силы цвета и чувственности темы. В период своего расцвета он олицетворял роскошь, гламур, изобилие и веру в социальный и технологический прогресс. Архитектура, уважающая эти принципы, сделала бы нашу нацию образцом современности и богатства."
