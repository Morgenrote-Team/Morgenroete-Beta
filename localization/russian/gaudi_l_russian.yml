 je_gaudi_neuschwanstein_phase_1: "Нойшванштайн: мечта короля"
 je_gaudi_neuschwanstein_phase_1_reason: "Нойшванштайн считается ярчайшим примером историзма и немецкого романтизма. Сказочный замок, который позже многие будут считать «идеальным» замком как таковым, был спроектирован баварским королём Людвигом II. Хотя в XIX веке для монархов не было ничего необычного в строительстве средневековых замков в пышном стиле, Нойшванштайн должен был превзойти все образцы и стать достопримечательностью не только Баварии, но и всего немецкоязычного мира."
