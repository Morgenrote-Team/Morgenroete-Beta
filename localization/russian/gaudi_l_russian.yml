 je_gaudi_new_locomotives_project_reason: "Ваш [concept_tesla_mechanical_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] неустанно работает над созданием новых типов локомотивов для [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]. Проект будет получать прогресс каждый месяц. Как только прогресс достигнет [JournalEntry.GetTotalGoalValue|V0], каждый месяц новые локомотивы будут развёртываться на сооружениях типа «[GetBuildingType('building_railway').GetName]». Сооружение с самым высоким уровнем получит модификатор первым. Полоса прогресса сбросится, как только все сооружения получат этот модификатор.\nВсего можно получить 5 модификаторов. Каждый новый модификатор требует, чтобы прогресс снова заполнился.\n\nТекущий ежемесячный прогресс: #underline #tooltip:[GetRawTextTooltipTag('gaudi_monthly_mechanical_research_progress_tt')] [GetPlayer.MakeScope.GetVariable('gaudi_monthly_mechanical_engineering_progress_var').GetValue|2+] #!#!"
 gaudi_railways_with_new_locomotives_tt: "Все #tooltippable_name [GetPlayer.GetAdjective|l]ие#! сооружения типа «[GetBuildingType('building_railway').GetName]» имеют 5 модификаторов.\n- Сооружения с 1-м модификатором: [GetPlayer.MakeScope.GetVariable('gaudi_num_railway_buildings_with_first_modifier_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('gaudi_num_railway_buildings_var').GetValue|V0]\n- Сооружения со 2-м модификатором: [GetPlayer.MakeScope.GetVariable('gaudi_num_railway_buildings_with_second_modifier_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('gaudi_num_railway_buildings_var').GetValue|V0]\n- Сооружения с 3-м модификатором: [GetPlayer.MakeScope.GetVariable('gaudi_num_railway_buildings_with_third_modifier_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('gaudi_num_railway_buildings_var').GetValue|V0]\n- Сооружения с 4-м модификатором: [GetPlayer.MakeScope.GetVariable('gaudi_num_railway_buildings_with_fourth_modifier_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('gaudi_num_railway_buildings_var').GetValue|V0]\n- Сооружения с 5-м модификатором: [GetPlayer.MakeScope.GetVariable('gaudi_num_railway_buildings_with_modifiers_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('gaudi_num_railway_buildings_var').GetValue|V0]"
