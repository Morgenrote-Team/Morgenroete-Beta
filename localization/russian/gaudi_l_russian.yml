 ACHIEVEMENT_DESC_gaudi_kulturnation: "Играя за германскую нацию, завершите строительство Кёльнского собора, откройте Нептун, основайте Всеобщий германский музыкальный союз, учредите фестиваль Рихарда Вагнера, перевезите Ворота Иштар в Германию и сделайте свою столицу колыбелью экспрессионизма. Вам также понадобится активный дирижёр и активный знаменитый археолог."
 ACHIEVEMENT_gaudi_segundo_siglo_de_oro: "Второй золотой век"
 ACHIEVEMENT_DESC_gaudi_segundo_siglo_de_oro: "Верните Испанию в ряды великих культурных держав: откройте Плутон, сделайте крупное археологическое открытие, сделайте свою столицу колыбелью ар-нуво и завершите строительство Саграда-Фамилия! В ходе кампании вы должны нанять хотя бы одного великого композитора."
