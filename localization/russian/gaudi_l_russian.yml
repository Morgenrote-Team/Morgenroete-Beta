 gaudi_add_x_neuschwanstein_progress_0_tt: "Не получено очков #E прогресса строительства#!."
 gaudi_add_x_neuschwanstein_progress_plus_1_tt: "Получено [SCOPE.GetValue('neuschwanstein_progress_amount')|0+] #E очко прогресса строительства#!."
 gaudi_add_x_neuschwanstein_progress_plus_x_tt: "Получено [SCOPE.GetValue('neuschwanstein_progress_amount')|0+] очков #E прогресса строительства#!."
 gaudi.701.t: "Начинается строительство Нойшванштайна"
 gaudi.701.d: "Баварский король выбрал место недалеко от старой резиденции Хоэншвангау, которую он знал с детства. Уже ясно, что фактическое руководство строительством лежит не на выбранных архитекторах, а на монархе."
 gaudi.701.f: "«Я намерен перестроить старые руины замка Хоэншвангау у ущелья Пёллат в истинном стиле старых немецких рыцарских замков». -Король Людвиг II"
 gaudi.701.g: "Король — либо гений, либо безумец."
 gaudi.702.t: "Нойшванштайн: первый этап завершён"
 gaudi.702.d: "На холме близ Фюссена теперь хорошо виден Палас над баварским Альгоем. Воротная башня Нойшванштайна уже стоит."
 gaudi.702.f: "«...во всех отношениях этот замок будет красивее и уютнее, чем нижний Хоэншвангау...» -Король Людвиг II"
 gaudi.702.g: "Выглядит китчевее, чем планировалось."
 gaudi.703.t: "Строительство Нойшванштайна продолжается"
 gaudi.703.d: "Начался следующий этап строительства замка Нойшванштайн. Теперь всё чаще звучат голоса, называющие это помпезное сооружение пустой тратой денег."
 gaudi.703.f: "Вопреки распространённым слухам, Людвиг II финансировал Нойшванштайн полностью из своих личных средств. Из-за нехватки денег он также был восприимчив к финансовым пожертвованиям от бывшего прусского визави. Чтобы заручиться благосклонностью Баварии при коронации прусского короля Вильгельма в качестве германского кайзера, Бисмарк выплачивал правителю ежегодную пенсию в размере 300 000 рейхсмарок. В конце его жизни личные долги Людвига составили 8,25 миллиона рейхсмарок."
 gaudi.703.g: "Сколько это будет стоить?"
 gaudi.704.t: "Нойшванштайн завершён"
 gaudi.704.d: "Нойшванштайн был наконец завершён сегодня! История покажет, войдёт ли это сооружение в традицию Людовика XIV как выражение ностальгической мании величия, или же миф о короле будет жить веками. В случае сомнений, должно быть и то, и другое."
 gaudi.704.f: "«Я хочу остаться вечной загадкой для себя и для других...» -Король Людвиг II"
 gaudi.704.g: "Да здравствует [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFirstName]!"
 gaudi.709.t: "Бавария потеряна!"
 gaudi.709.d: "С потерей Баварии мы лишились всякой возможности продолжать строительство замка Нойшванштайн."
 gaudi.709.f: "Если по какой-либо причине Бавария будет потеряна, прогресс строительства в целом не пропадёт. Только Бавария может продолжить строительство замка Нойшванштайн с последнего этапа. Иностранные захватчики, с другой стороны, не проявят интереса к дальнейшему строительству."
 gaudi.709.g: "Мы не можем надолго оставлять им Баварию!"
 gaudi.711.t: "Плохие кирпичи"
 gaudi.711.d: "Последняя поставка материала для Нойшванштайна оказалась некачественной."
 gaudi.711.f: "На мгновение обычная деятельность на строительной площадке, где замок Нойшванштайн рос с каждым днём, замерла. Краткая инвентаризация, проведённая самим королём, показала, что кирпичи не соответствуют обычному качеству, и он объявил, что предпочёл бы подождать, прежде чем его шедевр может быть поставлен под угрозу из-за этих кирпичей. Однако в руководстве строительства есть голоса, что кирпичи всё равно следует использовать — не только потому, что строительство может задержаться, но и потому, что есть опасения, что монарх может использовать это время, чтобы снова изменить план..."
 gaudi.712.t: "Катастрофа!"
 gaudi.712.d: "Некачественный материал дал о себе знать: сегодня утром обрушилась часть Нойшванштайна, причинив значительный ущерб."
 gaudi.712.f: "Возможно, король был прав. Возможно, это действительно была плохая идея использовать крошащиеся кирпичи для такого важного памятника, как замок Нойшванштайн. Возможно, следовало дважды подумать над этим решением. Но слишком поздно — некачественный материал сегодня дал о себе знать, что привело к обрушению стены и уничтожило значительную часть прогресса строительства за последние недели и месяцы, когда обрушился фасад."
 gaudi.713.t: "Оппозиция критикует Нойшванштайн"
 gaudi.713.d: "[SCOPE.sCharacter('gaudi_opposition_leader').GetFullName] направил петицию королю."
 gaudi.713.f: "«За границей уже смеются над монархом, который воображает себя — в зависимости от настроения — сказочным королём или реинкарнацией Людовика XIV. Задолженность королевской семьи в пользу устаревших мечтаний должна прекратиться. Бавария выставляет себя на посмешище всей Европе. Такое поведение недостойно короля»."
 gaudi.713.g: "Я король и строю, что хочу!"
 gaudi.713.h: "Может быть, это И есть тщеславие?"
 gaudi.714.t: "Новые машины"
 gaudi.714.d: "Технический прогресс помогает даже в строительстве такого, казалось бы, старомодного сооружения, как средневековый замок."
 gaudi.714.f: "Машиностроительный завод в Мюнхене и современная стальная каркасная конструкция позволяют восстановить Нойшванштайн в рекордно короткие сроки, ранее неизвестные."
 gaudi.715.t: "Сосед впечатлён Нойшванштайном"
 gaudi.715.d: "Наша соседняя страна, [SCOPE.sCountry('gaudi_neighbour_nation').GetName], с изумлением наблюдала за самоотдачей, с которой Бавария работает над мечтой об идеальном замке, и выразила большой интерес к ходу строительных работ."
 gaudi.715.f: "Нойшванштайн — самый известный из замков Людвига II и одна из самых известных достопримечательностей Германии. С тех пор как он был открыт для посетителей в год смерти Людвига, комплекс постоянно привлекает всё больше гостей. Только за первые восемь недель замок посетили около 18 000 человек. В 1913 году было более 28 000 гостей, а в 1939 году — уже 290 000. К 2001 году число выросло до примерно 1,3 миллиона посетителей, включая 560 000 немцев и 385 000 американцев и англичан. Третьей по величине группой в том году были 149 000 японцев. К 2005 году было подсчитано в общей сложности более 50 миллионов посетителей."
 gaudi.715.g: "Показать послу Нойшванштайн."
 gaudi.715.h: "Попросить о пожертвовании."
 gaudi.716.t: "У короля только что появилась ещё одна идея..."
 gaudi.716.d: "Наш монарх недавно удивил руководство строительства изменением."
 gaudi.716.f: "Строительство замка началось в 1869 году. Желания и требования Людвига II росли вместе со строительством, как и расходы, и проекты и сметы приходилось несколько раз пересматривать. Вместо большого тронного зала первоначально планировался лишь скромный кабинет, а запланированные гостевые комнаты были удалены из планов, чтобы освободить место для Мавританского зала, который не удалось реализовать из-за постоянной нехватки денег. Завершение замка, первоначально запланированное на 1872 год, неоднократно откладывалось."
 gaudi.716.g: "Kruzetiakn!"
 gaudi.716.h: "Sakrament!"
 gaudi.716.i: "Zefix!"
 gaudi.716.j: "Himme, Oarsch und Zwian!"
 gaudi.717.t: "Нойшванштайн растёт"
 gaudi.717.d: "Строительство замка Нойшванштайн продвигается быстрее, чем ожидалось, по неустановленным причинам."
 gaudi.717.f: "По неизвестным причинам строительство величественного замка Нойшванштайн продвигается. Может быть, это была хорошая погода. Возможно, молитва Святой Деве. Возможно, также и довольно некачественный строительный материал, который мы растратили на днях и который, мы надеемся, никогда не будет найден. Одно можно сказать наверняка: этот монстр, который неоднократно испытывал задержки из-за самых разных обстоятельств, должен быть закончен быстрее, чем ожидалось. Если, конечно, король не воспользуется этим, чтобы попытаться компенсировать экономию времени новым расширением..."
 gaudi.718.t: "Национальный или королевский проект?"
 gaudi.718.d: "В настоящее время в парламенте идёт серьёзная дискуссия о том, является ли замок Нойшванштайн в первую очередь национальным или королевским сооружением."
 gaudi.718.f: "Замок Нойшванштайн, расположенный в уединённом месте в Альгое, с самого начала предназначался как частное уединение короля. Тем не менее, сооружение также имело романтические и, следовательно, национальные коннотации, по крайней мере, для посторонних: преображение Средневековья как фактической вершины немецкой истории было частью повествования национального движения. В то же время замок был каменной данью уважения Рихарду Вагнеру, национальному композитору разделённой немецкой нации."
 gaudi.718.g: "Это национальный проект."
 gaudi.718.h: "Это национальный и королевский проект."
 gaudi.718.i: "Это королевский проект."
 gaudi.719.t: "Визит монарха"
 gaudi.719.d: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] решил[SelectLocalization(SCOPE.sCharacter('gaudi_ruler').IsFemale, 'а', '')] лично посетить строительную площадку Нойшванштайна."
 gaudi.719.f: "Наш монарх [SCOPE.sCharacter('gaudi_ruler').GetFirstName] постоянно следит за ходом строительства и объявил о своём очередном визите. Подготовка идёт полным ходом — и, конечно же, они хотят что-то предложить Его Величеству! Простые строители, руководство стройки и главный архитектор поэтому после объявления установили невиданную ранее скорость работы."
 gaudi.719.g: "Его Величество знает, как мотивировать."
 gaudi.720.t: "Пожар на стройке"
 gaudi.720.d: "По неизвестным причинам на строительной площадке Нойшванштайна вспыхнул пожар, который отбросил работы на месяцы назад!"
 gaudi.720.f: "«Кто-то сейчас играет „Полёт валькирий“ Рихарда Вагнера?!»"
 gaudi.720.g: "Ужасно! Прямо как у Вагнера!"
 gaudi.721.t: "Королевская забота о рабочих"
 gaudi.721.d: "Лидер профсоюза попросил короля компенсировать опасную работу на строительной площадке замка Нойшванштайн лучшим уходом."
 gaudi.721.f: "Большая стройка была крупнейшим работодателем региона на протяжении примерно двух десятилетий. В 1880 году на стройке ежедневно работало около 200 ремесленников, не считая поставщиков и других людей, косвенно вовлечённых в строительство. Временами, когда король требовал особенно сжатых сроков и срочных изменений, говорят, работало до 300 рабочих в день, которые также трудились по ночам при свете масляных ламп. Социальное учреждение «Ассоциация ремесленников при королевском дворце в Хоэншвангау», основанное 3 апреля 1870 года, было очень современным. Целью ассоциации было гарантировать продолжение выплаты заработной платы больным или раненым строителям за счёт низких ежемесячных взносов, подкреплённых значительными субсидиями от короля. Строительная компания, подобно сегодняшнему социальному страхованию или профессиональной ассоциации, гарантировала зарплату в течение 15 недель в размере 0,70 марки. Была пенсия для потомков погибших во время строительства — хотя и низкая, но в то время не распространённая."
 gaudi.721.g: "Это учреждение стоит поддержать."
 gaudi.721.h: "Образец для всей страны!"
 gaudi.721.i: "Социальная помощь? Мне нужны рабочие, а не нытики!"
 building_gaudi_palacio: "Дворец изящных искусств"
 pm_default_building_palacio: "Дворец изящных искусств"
 pmg_base_building_palacio: "Дворец изящных искусств"
