 je_gaudi_gyeong_phase_1: "Реконструкция дворца Кёнбоккун"
 je_gaudi_gyeong_phase_1_reason: "Кёнбоккун — это дворец в Сеуле. Название означает «Дворец сияющего счастья». Это первый и самый большой из пяти дворцов, построенных в Корее во времена династии Чосон. Дворец Кёнбоккун был построен основателем династии Чосон, королём Тхэджо, и завершён в 1395 году. Дворец служил королевской резиденцией до его разрушения японцами во время Имджинской войны в 1592 году. Дворец, разрушенный пожаром в Имджинской войне, не восстанавливался почти 300 лет. Может быть, сейчас самое время его восстановить?"
