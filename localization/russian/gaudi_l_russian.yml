 gaudi.1409.t: "Найдено месторождение нефти!"
 gaudi.1407.d: "Наш [concept_tesla_engineer] д-р [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] обнаружил новое месторождение железа в [SCOPE.sState('gaudi_deposit_state').GetCustom('RU_SL_PP')], используя самые современные геофизические методы."
 gaudi.1408.d: "Наш [concept_tesla_engineer] д-р [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] обнаружил новое месторождение свинца в [SCOPE.sState('gaudi_deposit_state').GetCustom('RU_SL_PP')], используя самые современные геофизические методы."
 gaudi.1409.d: "Наш [concept_tesla_engineer] д-р [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] обнаружил новое месторождение свинца в [SCOPE.sState('gaudi_deposit_state').GetCustom('RU_SL_PP')], используя самые современные геофизические методы."
 gaudi.1407.f: "В течение каждой игры можно трижды обнаружить специальное месторождение с помощью инженера, а именно для железа, свинца и нефти. Это также требует определённых геомагнитных знаний, которые накапливаются годами. Поэтому рекомендуется начинать геомагнитные исследования как можно раньше."
 gaudi.1407.g: "Эврика!"
