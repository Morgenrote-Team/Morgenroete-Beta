 je_gaudi_rebuild_campanile: "Где была и какой была"
 je_gaudi_rebuild_campanile_reason: "После обрушения Кампанилы собора Святого Марка ведущие круги высказались против восстановления одного из символов Венеции в его первоначальном виде. Эта историческая реконструкция потребует времени и затрат."
 je_gaudi_rebuild_campanile_goal: "#E Прогресс строительства#! достигает #BLUE 120#! очков. В данный момент у нас #G [GetGlobalVariable('gaudi_campanile_progress').GetValue]#! очков. Обычно мы получаем по одному очку в месяц."
 gaudi.70.t: "Обрушение Кампанилы"
 gaudi.70.d: "Кампанила собора Святого Марка, одна из достопримечательностей Венеции, обрушилась. Не только жители Венеции, но и вся нация скорбит об утрате. Что будет дальше, пока совершенно неясно."
 gaudi.70.f: "Кампанила собора Святого Марка — это колокольня базилики Святого Марка в Венеции, расположенная на площади Сан-Марко. Это один из самых узнаваемых символов города. В июле 1902 года на северной стене башни начали появляться признаки опасной трещины, которая в последующие дни продолжала расти. Наконец, в понедельник, 14 июля, около 9:45 утра, Кампанила полностью обрушилась, разрушив также лоджетту. Примечательно, что никто не погиб, кроме кота смотрителя. Из-за расположения Кампанилы нанесённый ущерб был относительно ограничен. Кроме лоджетты, был разрушен лишь угол Библиотеки Марчиана. Пьетра-дель-бандо, большая порфировая колонна, с которой раньше зачитывали законы, защитила саму базилику. Тем не менее, потеря одного из величайших символов старой итальянской культуры обсуждалась во всей нации."
 gaudi.70.g: "Восстановить Кампанилу — где она была и какой была."
 gaudi.70.h: "Построить что-то новое!"
 gaudi.70.i: "Мы не можем себе этого позволить."
 gaudi.71.t: "Восстановление Кампанилы"
 gaudi.71.d: "Новая Кампанила собора Святого Марка в Венеции, которая до последнего кирпичика напоминает свою предшественницу, была торжественно открыта сегодня. Вся Венеция празднует возвращение своей достопримечательности."
 gaudi.71.f: "Новая кампанила была открыта 25 апреля 1912 года, в день святого Марка, ровно через 1000 лет после того, как, предположительно, был заложен фундамент первоначального сооружения."
 gaudi.71.g: "Хозяин вернулся!"
 gaudi_captain: "Капитан"
