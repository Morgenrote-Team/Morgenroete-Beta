 je_gaudi_secession_1: "Первый сецессион в стиле ар-нуво"
 je_gaudi_secession_1_reason: "Новое художественное движение ар-нуво привлекло множество художников. При определённых условиях это может привести к созданию признанного художественного движения, которое пользуется международной известностью и даёт новый импульс живописи и архитектуре. Исторически одним из важнейших объединений такого типа был Венский сецессион. Венский сецессион, точнее, Ассоциация австрийских художников, — это объединение художников в Вене периода fin de siècle. Отсюда и венский вариант ар-нуво также называют сецессионстилем или венским модерном."
 je_gaudi_secession_2: "Второй сецессион в стиле ар-нуво"
 je_gaudi_secession_2_reason: "Новое художественное движение ар-нуво привлекло множество художников. При определённых условиях это может привести к созданию признанного художественного движения, которое пользуется международной известностью и даёт новый импульс живописи и архитектуре. Исторически одним из важнейших объединений такого типа был Венский сецессион. Венский сецессион, точнее, Ассоциация австрийских художников, — это объединение художников в Вене периода fin de siècle. Отсюда и венский вариант ар-нуво также называют сецессионстилем или венским модерном."
 je_gaudi_secession_3: "Третий сецессион в стиле ар-нуво"
 je_gaudi_secession_3_reason: "Новое художественное движение ар-нуво привлекло множество художников. При определённых условиях это может привести к созданию признанного художественного движения, которое пользуется международной известностью и даёт новый импульс живописи и архитектуре. Исторически одним из важнейших объединений такого типа был Венский сецессион. Венский сецессион, точнее, Ассоциация австрийских художников, — это объединение художников в Вене периода fin de siècle. Отсюда и венский вариант ар-нуво также называют сецессионстилем или венским модерном."
 je_gaudi_splendid_architecture: "Великолепная новая архитектура"
 je_gaudi_splendid_architecture_reason: "С появлением ар-нуво и ар-деко архитекторы произвели революцию в мире искусства, например, порвав с жёстким историзмом прошлого. Но в отличие от многих современных школ, их сооружения не были выражением чистой функциональности и объективности. Ар-деко — это развитие в русле общего пробуждения классического модернизма, в котором на передний план вышло творческое сочетание элегантности формы, драгоценности материалов, силы цвета и чувственности темы. В период своего расцвета он олицетворял роскошь, гламур, изобилие и веру в социальный и технологический прогресс. Архитектура, уважающая эти принципы, сделала бы нашу нацию образцом современности и богатства."
 je_gaudi_splendid_architecture_goal: "#E Архитектурное великолепие#! достигает #BLUE 10#! очков. В данный момент у нас #G [ROOT.Var('gaudi_splendid_architecture').GetValue]#! @gaudi_architectural_splendour! очков. Строительство кварталов в стиле ар-нуво, кинотеатров в стиле ар-деко, небоскрёбов в стиле ар-деко, офисов в стиле ар-деко и аэропортов в стиле ар-деко через запись в дневнике принесёт вам больше очков."
 je_gaudi_art_nouveau_quarter: "Квартал в стиле ар-нуво"
 je_gaudi_art_nouveau_quarter_reason: "Первые дома и интерьеры в стиле ар-нуво появились в Брюсселе в 1890-х годах в архитектуре и дизайне интерьеров домов, спроектированных Полем Анкаром, Анри ван де Велде и особенно Виктором Орта, чей Отель-Тассель был завершён в 1893 году. Стиль быстро перекочевал в Париж, где его адаптировал Эктор Гимар, увидевший работы Орта в Брюсселе и применивший этот стиль для входов в новый парижский метрополитен. Из Бельгии и Франции ар-нуво распространился по остальной Европе, принимая разные названия и характеристики в каждой стране. Он часто появлялся не только в столицах, но и в быстрорастущих городах, которые хотели утвердить свою художественную идентичность (Турин и Палермо в Италии; Глазго в Шотландии; Мюнхен и Дармштадт в Германии), а также в центрах движений за независимость (Хельсинки в Финляндии, тогда входившей в состав Российской империи; Барселона в Каталонии, Испания)."
 je_gaudi_art_deco_cinema: "Кинотеатр в стиле ар-деко"
 je_gaudi_art_deco_cinema_reason: "Многие из лучших сохранившихся образцов ар-деко — это кинотеатры, построенные в 1920-х и 1930-х годах. Период ар-деко совпал с переходом от немого кино к звуковому, и кинокомпании строили большие кинотеатры-дворцы в крупных городах, чтобы привлечь огромную аудиторию. Кинотеатры-дворцы 1920-х годов часто сочетали экзотические темы со стилем ар-деко; Египетский театр Граумана в Голливуде (1922) был вдохновлён древнеегипетскими гробницами и пирамидами, а в театре Фокс в Бейкерсфилде, Калифорния, к залу в стиле ар-деко была пристроена башня в стиле калифорнийской миссии."
 je_gaudi_art_deco_skyscraper: "Небоскрёб в стиле ар-деко"
 je_gaudi_art_deco_skyscraper_reason: "Небоскрёбы — это колокольни современности. Но что такое колокольня без характерного звона? Отделка небоскрёба в стиле ар-деко была бы престижным начинанием, которое вызовет восхищение во всём мире."
 je_gaudi_art_deco_airport: "Аэропорт в стиле ар-деко"
 je_gaudi_art_deco_airport_reason: "Каравеллы когда-то открыли европейцам океаны и соединили континенты известного мира с Новым. Теперь, когда наступила эра авиации, ранее незыблемые границы открываются. Какой стиль может быть более подходящим, чем роскошный и перспективный ар-деко, чтобы встречать порты новых летающих кораблей? Авиаторы, поприветствуйте солнце!"
 je_gaudi_art_deco_office: "Офис в стиле ар-деко"
 je_gaudi_art_deco_office_reason: "Стиль ар-деко доминировал в коммерческом мире и индустрии развлечений, но и правительства хотели произвести впечатление современными сооружениями, которые подчёркивали бы процветание страны и давали бы собственному населению ощущение жизни в амбициозной нации."
 je_gaudi_bauhaus: "Баухаус"
 je_gaudi_bauhaus_reason: "Баухаус — это немецкая художественная школа, действовавшая с 1919 по 1933 год, которая сочетала ремёсла и изящные искусства. Школа прославилась своим подходом к дизайну, который пытался объединить индивидуальное художественное видение с принципами массового производства и акцентом на функциональность. В её основе лежала идея создания Gesamtkunstwerk (комплексного произведения искусства), в котором в конечном итоге должны были объединиться все искусства. Стиль Баухаус позже стал одним из самых влиятельных течений в современном дизайне, модернистской архитектуре и архитектурном образовании."
 je_gaudi_summer_burn: "Сожжение Летнего дворца"
 je_gaudi_summer_burn_reason: "Летний дворец был фактической резиденцией императорской семьи династии Цин с первой половины XVIII века. Это символ величия и великолепия Китая. Его разрушение означало не только значительное унижение врага, но и открывало возможность для ценной добычи..."
 je_gaudi_summer_burn_success: "Оккупировать весь столичный регион #T Пекин#!."
 je_gaudi_ben_burn: "Сожжение Биг-Бена"
 je_gaudi_ben_burn_reason: "После пожара в Вестминстерском дворце Великобритания построила новое, знаковое здание парламента, которое подчёркивает претензии Империи. Может быть, пришло время спустить британскую гордость на землю ещё одним пожаром?"
 je_gaudi_ben_burn_success: "Оккупировать весь столичный регион #T Домашние графства#!."
 je_gaudi_dombau_phase_1: "Кёльнский собор: возобновление строительства"
 je_gaudi_dombau_phase_1_reason: "Кёльнский собор считается самым совершенным готическим собором в мире. Строительство началось в XIII веке и имело колоссальные размеры. После завершения хора работы замедлились, а в XV веке и вовсе прекратились. По сей день строительный кран позднего Средневековья всё ещё возвышается над недостроенной южной башней. С возрождением национальных и романтических настроений в немецкой буржуазии и особенно после повторного открытия оригинальных строительных планов и их распространения, растёт убеждение, что завершение собора — это не только проект во славу Божью, но и символ немецкой культуры и единства немецкой нации."
 je_gaudi_dombau_phase_1_goal: "#E Прогресс строительства#! достигает #BLUE 120#! очков. В данный момент у нас #G [GetGlobalVariable('gaudi_dombau_progress').GetValue]#! очков. Обычно мы получаем по одному очку в месяц."
 je_gaudi_dombau_phase_2: "Кёльнский собор: южный фасад"
 je_gaudi_dombau_phase_2_reason: "После того как строительные работы длились уже несколько лет, архитекторы столкнулись со строительством и отделкой южного фасада собора. С его богатым фигурным убранством он считается не только вершиной немецкой скульптуры, но и одним из главных произведений архитектуры неоготики. На строительство одного только фасада ушло тринадцать лет, а на его отделку и украшение — восемнадцать."
 je_gaudi_dombau_phase_2_goal: "#E Прогресс строительства#! достигает #BLUE 120#! очков. В данный момент у нас #G [GetGlobalVariable('gaudi_dombau_progress').GetValue]#! очков. Обычно мы получаем по одному очку в месяц."
 je_gaudi_dombau_phase_3: "Кёльнский собор: конструкция крыши"
 je_gaudi_dombau_phase_3_reason: "Проект Кёльнского собора, основанный на готическом идеале, не помешал мастерам использовать самые современные строительные материалы того времени. Конструкция крыши была сделана из железа, что сделало её крупнейшей железо-стальной конструкцией в мире до постройки Эйфелевой башни. Благодаря этому решению конструкция выстояла даже перед бомбардировками союзников во время Второй мировой войны."
 je_gaudi_dombau_phase_3_goal: "#E Прогресс строительства#! достигает #BLUE 120#! очков. В данный момент у нас #G [GetGlobalVariable('gaudi_dombau_progress').GetValue]#! очков. Обычно мы получаем по одному очку в месяц."
 je_gaudi_dombau_phase_4: "Кёльнский собор: западный фасад и башни"
 je_gaudi_dombau_phase_4_reason: "Западный фасад собора — самый большой церковный фасад из когда-либо построенных. Он в деталях следует средневековому плану, разработанному мастером Михаэлем фон Савойеном, который был зафиксирован в 1370 году в так называемом плане фасада F. Характерной чертой силуэта Кёльнского собора является фасад с двумя башнями-близнецами, увенчанными высокими шпилями. Мастер Михаэль спроектировал восьмиугольный, полностью ажурный шпиль, увенчанный многоярусным фиалом. Этими решениями, которые исследовали пределы технически возможного, готические архитекторы хотели подчеркнуть, что сооружение должно было быть «монументальным реликварием», хранящим внутри Трёх волхвов."
 je_gaudi_dombau_phase_4_goal: "#E Прогресс строительства#! достигает #BLUE 120#! очков. В данный момент у нас #G [GetGlobalVariable('gaudi_dombau_progress').GetValue]#! очков. Обычно мы получаем по одному очку в месяц."
 je_gaudi_gotthard_survey: "Готтардская железная дорога: план и изыскания"
 je_gaudi_gotthard_survey_reason: "В XIX веке Швейцария рисковала остаться в стороне от международного железнодорожного сообщения и, таким образом, не только потерять связь с современной транспортной системой, но и с промышленной революцией. С открытием железнодорожной линии через перевал Бреннер эта опасность приобрела новое измерение. Географически у Швейцарии были более серьёзные проблемы, чем у Австрии: перевал Бреннер был гораздо легче проходим, чем швейцарские альтернативные маршруты. Строительству альпийской железной дороги в Швейцарии предшествовали десятилетия дискуссий о маршруте и финансировании такого проекта. Ключевую роль в определении Готтардской линии сыграл цюрихский политик и предприниматель Альфред Эшер."
