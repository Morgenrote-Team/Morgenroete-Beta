 gaudi.1301.d: "Наш [concept_tesla_military_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] годами работал над разработкой новой винтовки для нашей армии. Теперь она наконец-то готова к развёртыванию среди наших солдат!"
