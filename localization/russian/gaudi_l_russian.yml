 gaudi.1201.t: "Современные локомотивы"
 gaudi.1201.t_general: "Western & Atlantic Railroad #3 «Генерал»"
 gaudi.1201.t_forney: "0-4-4T «Форни»"
 gaudi.1201.t_e6: "Класс E6 «Атлантик»"
 gaudi.1201.t_m_1000: "M-10000"
 gaudi.1201.t_gg1: "Класс GG1"
 gaudi.1201.t_kkstb_30: "kkStB-Reihe 30"
 gaudi.1201.t_fs_class_670: "FS Class 670"
 gaudi.1201.d: "Наконец-то локомотивы, которые построил наш [concept_tesla_mechanical_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')], вышли на пути #tooltippable_name [GetPlayer.GetAdjective|l]ой#! железнодорожной сети! Мы наверняка увидим от них новые рекорды скорости!"
 gaudi.1201.f: "«Только посмотрите на это чудо инженерной мысли! Это фантастика, не так ли?»"
 gaudi.1201.f_general: "Конфигурация 4-4-0 уже зарекомендовала себя с лучшей стороны. «Генерал» и ему подобные наверняка станут рабочими лошадками Америки!"
 gaudi.1201.f_forney: "«Форни» — отличный локомотив для городских районов, так как его небольшие размеры позволяют ему справляться с крутыми поворотами городской железной дороги."
 gaudi.1201.f_e6: "Класс E6 «Атлантик» — это быстрый паровоз, обеспечивающий плавный ход своим пассажирам. Он будет использоваться на основных пассажирских линиях."
 gaudi.1201.f_m_1000: "M-10000 — это обтекаемый газоэлектрический локомотив. Он может развивать высокие скорости и является идеальным локомотивом для экспресс-маршрутов."
 gaudi.1201.f_gg1: "Класс GG1 — это обтекаемый электровоз, способный тянуть поезда с поразительной скоростью. Наверняка у этого локомотива будет долгая карьера!"
 gaudi.1201.f_kkstb_30: "kkStB-Reihe 30 — отличный пригородный поезд, так как у него особенно бездымный и беспаровой процесс сгорания."
 gaudi.1201.f_fs_class_670: "FS Class 670 имеет знаковый дизайн, в основном меняя обычный порядок локомотива. Кабина расположена в передней части локомотива, что обеспечивает машинисту идеальный обзор."
 gaudi.1201.g: "Чудо инженерной мысли!"
 je_gaudi_modernizing_industries_project: "Модернизация методов производства"
 gaudi_engineer_focus_building: "Инженерный фокус"
 gaudi.1211.f: "«Видите ли, эта новая машина означает, что мне нужно на трёх рабочих меньше. Теперь они могут работать на трёх других таких же машинах, и всё станет намного прибыльнее. Я смогу позволить себе новую яхту!»"
 gaudi.1211.g: "Наши прибыли взлетят до небес!"
