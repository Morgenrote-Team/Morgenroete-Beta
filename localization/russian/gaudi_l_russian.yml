 gaudi_civil_engineer_desc: "[Concept('concept_tesla_civil_engineer','#ORANGE #b Инженеры-строители#!#!')] — это инженеры, которые занимаются строительными и инфраструктурными проектами. Они могут строить новые мосты, тоннели или каналы."
 gaudi_mechanical_engineer_desc: "[Concept('concept_tesla_mechanical_engineer','#ORANGE #b Инженеры-механики#!#!')] занимаются созданием новых и инновационных машин. Возможно, они создадут лучший локомотив или новый инновационный паровой двигатель. Может быть, они даже построят повозки, которые смогут двигаться без лошадей?"
 gaudi_military_engineer_desc: "[Concept('concept_tesla_military_engineer','#ORANGE #b Военные инженеры#!#!')] часто являются частью вооружённых сил и занимаются строительством крепостей или новых инновационных боевых машин."
 gaudi_electrical_engineer_desc: "Электричество открывает множество инновационных применений, от освещения до двигателей и даже связи. [Concept('concept_tesla_electrical_engineer','#ORANGE #b Инженеры-электрики#!#!')] работают над тем, чтобы использовать эту силу на благо человечества."
 gaudi_aeronautical_engineer_desc: "Мечта о полёте стара как мир. Теперь, когда у человечества действительно появилась возможность покорить небо, [Concept('concept_tesla_aeronautical_engineer','#ORANGE #b авиаконструкторы#!#!')] стремятся позволить людям летать выше, быстрее и дальше, создавая новые самолёты и дирижабли."
