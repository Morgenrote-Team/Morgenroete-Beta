 gaudi_bauhaus_style_desc: "Как архитектор:\n#p +30#! $country_construction_add$ (если не занят проектом)\n\nЭтот архитектор предпочитает строгие, ясные сооружения с простыми формами."
 gaudi_neoclassical_style: "Неоклассическая архитектура"
 gaudi_neoclassical_style_desc: "Как архитектор:\n#p +30#! $country_construction_add$ (если не занят проектом)\n\nЭтот архитектор склонен к монументальным сооружениям с чёткими эстетическими формами и отсылками к имперскому прошлому."
 gaudi_art_deco_style: "Архитектура ар-деко"
 gaudi_art_deco_style_desc: "Как архитектор:\n#p +30#! $country_construction_add$ (если не занят проектом)\n\nЭтот архитектор выступает за роскошную и игривую архитектуру, которая подчёркивает жизненную силу и величие."
