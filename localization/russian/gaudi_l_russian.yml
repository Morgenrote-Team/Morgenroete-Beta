 gaudi.35.t: "Квартал в стиле ар-нуво в городе [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]"
 gaudi.35.d: "Новое художественное направление не обошло стороной и [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]: в квартале, который теперь считается кварталом авангарда, строятся новые сооружения в стиле ар-нуво."
 gaudi.35.f: "Дебют архитектуры ар-нуво в Брюсселе сопровождался волной декоративного искусства в новом стиле. Среди выдающихся художников были Гюстав Страувен, использовавший кованое железо для создания барочных эффектов на фасадах Брюсселя; мебельный дизайнер Гюстав Серрюрье-Бови, известный своими весьма оригинальными стульями и шарнирной металлической мебелью; и ювелирный дизайнер Филипп Вольферс, создававший украшения в виде стрекоз, бабочек, лебедей и змей. Стиль быстро заметили в соседней Франции. После посещения отеля «Тассель» Орта, Эктор Гимар построил Кастель Беранже, одно из первых парижских зданий в новом стиле. Парижане приветствовали оригинальный и живописный стиль Гимара; Кастель Беранже был выбран одним из лучших новых фасадов в Париже, что положило начало карьере Гимара. Парижская Всемирная выставка 1900 года стала кульминацией ар-нуво. С апреля по ноябрь 1900 года она привлекла почти пятьдесят миллионов посетителей со всего мира и продемонстрировала архитектуру, дизайн, изделия из стекла, мебель и предметы декора в этом стиле. Хотя Парижская выставка была, безусловно, самой крупной, другие выставки также во многом способствовали популяризации стиля."
 gaudi.35.g: "Яркая новая культура."
 gaudi.22.t: "Линии и меры"
 gaudi.22.d: "Наш архитектор возвращается — на этот раз с геодезической рейкой в руке и новым взглядом на землю."
 gaudi.22.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] когда-то довольствовал[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'ась', 'ся')] зарисовками фасадов на городских площадях, отслеживанием теней и орнаментов. Теперь [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] чертит линии на земле.\n\nВо время своих путешествий [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] покинул[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] города ради глубинки. В диких местах Галисии, в болотах дельты По и по железнодорожным выемкам Мидлендса [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] ходил[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] с инженерами, фермерами и бригадирами. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Она', 'Он')] [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'научилась', 'научился')] читать местность, как другие читают священные писания. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Она', 'Он')] может сказать вам, где будет течь вода, где сдвинется глина, где через пять зим треснет фундамент.\n\nТеперь [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она говорит', 'он говорит')] о градиентах и геодезических точках. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Её', 'Его')] тетради заполнены не завитушками, а углами, высотами и расстояниями, измеренными до дюйма. Некоторые говорят, что [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] стал[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] сухим — слишком точным, слишком жёстким. Но когда [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] смотрит на пустое поле, [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] уже видит, где могут пролегать проспекты."
 gaudi.22.g: "Сооружение начинается задолго до закладки первого камня."
 gaudi.23.t: "Архитектор, который считает"
 gaudi.23.d: "После двух лет учёбы наш архитектор возвращается — [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'её', 'его')] ум острее, [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'её', 'его')] чертежи — страннее."
 gaudi.23.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] когда-то рисовал[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] инстинктивно. Теперь [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] рисует логически.\n\n[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Она', 'Он')] провел[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] время не среди каменщиков или строителей, а в лекционных залах. Париж, Гёттинген, даже Санкт-Петербург. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Она', 'Он')] сидел[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] под досками, исписанными символами, [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'училась', 'учился')] у людей, которые ничего не строили своими руками, но всё — своим умом. Теперь [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она говорит', 'он говорит')] о симметрии, о модуле, о кривых нагрузки, описываемых элегантными формулами.\n\nПрошли те времена размашистых ручных росчерков. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Её', 'Его')] новые планы строги, странны, почти чужды в своей точности. Некоторым они кажутся холодными, бесчеловечными. Но тут [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] объясняет: красота купола не в его украшении, а в совершенстве его кривой.\n\nЧиновники не знают, что с [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'ней', 'ним')] делать. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Её', 'Его')] коллеги шепчутся о непрактичности. Но другие — особенно молодые — слушают."
 gaudi.23.g: "[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Она строит', 'Он строит')] то, что другие только воображают."
 gaudi.24.t: "Бумага прежде камня"
 gaudi.24.d: "Наш архитектор возвращается не с инструментами или уравнениями, а с печатями, подписями и сетью чиновников."
 gaudi.24.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] больше не бьётся за чертёжной доской. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Она', 'Он')] теперь скользит по кабинетам.\n\nЗа два года за границей [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] не просто изучал[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] архитектуру — [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] изучал[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] администрирование. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Она', 'Он')] узнал[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')], как проект живёт или умирает не по замыслу, а по указу. В Вене [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] наблюдал[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] за работой министерств; в Брюсселе [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] ходил[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] тенью за клерками, выдающими разрешения; в Марселе [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] посещал[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] заседания совета, на которых канализация определяла городские панорамы.\n\nТеперь, вернувшись домой, [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] зна[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'ет', 'ет')], какие документы когда подавать, на какое постановление ссылаться, кому льстить, а кого игнорировать. Правила, — говорит [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')], — это не стены, а леса: их можно передвигать, смягчать, перестраивать. И почему-то разрешения приходят быстрее, чем когда-либо."
 gaudi.24.g: "Каждое великое сооружение начинается с подписанного бланка."
 gaudi.25.t: "Архитектор возвращается... в конце концов"
 gaudi.25.d: "Наш архитектор наконец-то вернулся из своего грандиозного путешествия. Никто точно не знает, что [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] привез[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'ла', '')] с собой, кроме историй."
 gaudi.25.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] уехал[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] с альбомами для эскизов. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Она', 'Он')] возвращается с сигариллами и анекдотами. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'У неё', 'У него')] есть имена, которыми можно блеснуть, мнения, которые можно высказать, и долги, о которых [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] делает вид, что не помнит.\n\n[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Она говорит', 'Он говорит')] красиво, даже убедительно — о сооружениях, которые [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] никогда не измерял[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')]. Когда [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'её', 'его')] просят о планах, [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] меняет тему. Когда требуют результатов, [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] улыбается и уверяет, что гениальность не терпит спешки.\n\nНекоторые говорят, что [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] — мошенник. Другие называют [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'её', 'его')] непонятым гением. Правда? Вероятно, где-то между кафе в Триесте и опозданием на поезд в Неаполе."
 gaudi.25.g: "Что [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] делал[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] всё это время?!"
 gaudi.26.t: "В тени мастера"
 gaudi.26.d: "Наш архитектор возвращается — мудрее, увереннее и неся на себе печать великого учителя."
 gaudi.26.f: "В то время как другие много путешествовали, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] предпоч[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'ла', 'ёл')] глубину расстоянию. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Она', 'Он')] провел[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] большую часть своих лет под руководством одной фигуры — стареющего архитектора с легендарной репутацией. Не только в лекционных залах, но и на строительных лесах и в тишине [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'научилась', 'научился')] видеть структуру за орнаментом, замысел за фасадом. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Её', 'Его')] линии стали чище. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Её', 'Его')] взгляд — более критичным. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Её', 'Его')] учили не только как строить, но и почему. Слух о [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'её', 'его')] наставничестве опередил [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'её', 'его')]. Молодые подмастерья уже ищут [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'её', 'его')], а городские чиновники встречают [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'её', 'его')] с неожиданным почтением. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Она', 'Он')] возвращается как человек, отмеченный преемственностью, традицией и, возможно, однажды — наследием."
 gaudi.26.g: "[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Она', 'Он')] несёт бремя мудрости другого человека"
 je_gaudi_study_trip: "Учебная поездка архитектора"
 je_gaudi_study_trip_reason: "Наш [Concept('concept_gaudi_architect', '#PURPLE #b архитектор#!#!')], [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName], в настоящее время путешествует по архитектурным достопримечательностям, академиям и встречам с другими деятелями искусства. Мы не сможем связаться с ним в течение двух лет."
 je_gaudi_study_trip_success: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] возвращается через два года."
 je_gaudi_study_trip_result: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] получит опыт и (в большинстве случаев) новую черту."
 je_gaudi_study_trip_goal: ""
 gaudi_architect_study_trip_modifier: "Учебная поездка архитектора"
 gaudi_capital_expansion_cost_modifier: "Стоимость расширения столицы"
 gaudi_capital_expansion_level_1_modifier: "Расширение столицы: уровень 1"
 gaudi_capital_expansion_level_2_modifier: "Расширение столицы: уровень 2"
 gaudi_capital_expansion_level_3_modifier: "Расширение столицы: уровень 3"
 gaudi_capital_expansion_level_4_modifier: "Расширение столицы: уровень 4"
 gaudi_capital_expansion_level_5_modifier: "Расширение столицы: уровень 5"
 gaudi_capital_expansion_advance_tt: "Расширение столицы увеличивается на один уровень"
 je_gaudi_capital_expansion_project: "Расширение столицы"
 je_gaudi_capital_expansion_project_reason: "Между 1836 и 1936 годами викторианские столицы претерпели глубокие городские преобразования. Париж был перестроен широкими бульварами и осевыми перспективами Османа. Вена снесла свои стены в 1857 году, заменив их величественной Рингштрассе. Берлин быстро расширялся за счёт доходных домов, промышленных кварталов и, позже, модернистских жилых комплексов. Лондон разрастался вширь за счёт железнодорожных пригородов, инфраструктурных проектов и первого в мире метро. По всему европейскому континенту королевские города превращались в современные мегаполисы — памятники власти, амбиций и растущих социальных напряжений."
 gaudi.41.t: "Город без границ"
 gaudi.41.d: "Старые стены рушатся. На их месте — воздух, свет и обещание роста."
 gaudi.41.f: "Веками столица [ROOT.GetCountry.GetCapital.GetCityHubName] была городом, окружённым стенами: гордым, компактным и замкнутым в себе. Но теперь кладка рассыпается в пыль и прах.\n\nСредневековые укрепления были снесены. На их месте вырастают широкие бульвары, обсаженные деревьями и благородными фасадами. Торговые повозки и прогуливающиеся пары теперь ступают там, где когда-то маршировали стражники. Бульвары — это больше, чем дороги, это заявления: об уверенности, о расширении, о будущем, слишком большом, чтобы быть сдержанным.\n\nНекоторые скорбят о потере древних ворот. Но столица [ROOT.GetCountry.GetCapital.GetCityHubName] наконец-то сделала свой первый глубокий вдох."
 gaudi.41.g: "Мы строим вовне — с видением и энергией"
 gaudi.42.t: "Кольцо прогресса"
 gaudi.42.d: "Новое кольцо бульваров связывает город и государство воедино."
 gaudi.42.f: "Там, где когда-то стояли грязные насыпи, теперь правят камень и железо. Великий проспект изгибается, как ожерелье, вокруг сердца города [ROOT.GetCountry.GetCapital.GetCityHubName], связывая его районы в движении и свете.\n\nЭто была не просто дорожная работа. Целые кварталы были перекроены, разбиты парки, памятники обрамлены в идеальной перспективе. Газовые фонари расцветают в сумерках, как упорядоченные звёзды. С каждым вымощенным метром город [ROOT.GetCountry.GetCapital.GetCityHubName] становится всё более читаемым — более имперским.\n\nЧиновники говорят о «городской гармонии». А народ? Он прогуливается, глядя на статуи, которых никогда раньше не видел, по улицам, по которым когда-то боялся ходить."
 gaudi.42.g: "Кольцо не обороны, а направления."
 gaudi.43.t: "Проспекты власти"
 gaudi.43.d: "Новый префект перекраивает город [ROOT.GetCountry.GetCapital.GetCityHubName] — по одной оси за раз. Широко, прямо и абсолютно бескомпромиссно."
 gaudi.43.f: "Это не расширение. Это хирургия.\n\nЦелые кварталы падают под циркулем и планом. Улицы прокладываются, как бульвары, через некогда лабиринтообразные кварталы. Старые переулки исчезают. На их месте возникают линии — длинные, прямые и всегда ведущие к памятнику, казармам или министерству.\n\nНазревает сопротивление, но разрешения подписываются, дома экспроприируются, а фасады выравниваются. Город [ROOT.GetCountry.GetCapital.GetCityHubName] теперь говорит на языке порядка: видимости, циркуляции, контроля. За величием скрывается умысел.\n\nБедняки называют это «Чисткой». Чиновники называют это «модернизацией». Префект называет это необходимостью."
 gaudi.43.g: "Пусть никто не избежит плана"
 gaudi.44.t: "Горизонт метрополии"
 gaudi.44.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] — это больше не просто столица. Он становится миром в миниатюре."
 gaudi.44.f: "У старого города были края. У этого их нет.\n\nСталь и стекло пронзают там, где когда-то доминировал камень. Железнодорожные линии пересекаются под общественными садами. Электрические огни стирают границы между сумерками и рассветом. Посольства, банки, галереи и кафе цветут, как орхидеи, в железной оранжерее новой эры.\n\nВ аркадах звучат иностранные языки. Небоскрёбы бросают вызов соборам. Город [ROOT.GetCountry.GetCapital.GetCityHubName] больше не просит разрешения на рост — он ожидает, что будет вести за собой. Из каждого района исходит одна истина: это больше не город одной нации. Это город наций."
 gaudi.44.g: "Мы поднимаемся, потому что мир уже смотрит."
 gaudi_capital_expansion_project_progress_bar: "Расширение столицы"
 gaudi_capital_expansion_project_progress_bar_desc: "Расширение столицы: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|1%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/30)"
 gaudi.511.d: "Планы по благоустройству города [ROOT.GetCountry.GetCapital.GetCityHubName] привели к разногласиям в городском планировании."
 gaudi.512.t: "Статуи на Рингштрассе"
 gaudi.512.d: "На новой кольцевой дороге в городе [ROOT.GetCountry.GetCapital.GetCityHubName] должна быть установлена новая группа фигур, но неясно, какая мифологическая фигура займёт особое место."
 gaudi.513.f: "Новое министерство должно было стать флагманом правительства, однако постоянные изменения планов, расширение и скрытая коррупция привели к тому, что строительство здания затянулось, а все средства были израсходованы до завершения. Недостроенное сооружение можно было бы привести в функциональное состояние с помощью нескольких временных мер, но это, вероятно, не в интересах правительства, которому пришлось бы довольствоваться меньшими кабинетами и меньшим комфортом, чем ожидалось. Дальнейшее строительство возможно, но, вероятно, оно будет дорогостоящим."
 gaudi.511.t: "Фонтан или павильон?"
 gaudi.511.f: "Можно было бы принять это за спор о бороде императора: из мелочи разгорелся ощутимый политический спор. Речь идёт о строительном проекте на представительной площади высокой эстетической ценности. Одна фракция хотела бы построить там павильон для отдыха, другая выступает за строительство фонтана. Поскольку участок всего один, можно построить только один из проектов; компромисс невозможен."
 gaudi.511.g: "Мы строим павильон."
 gaudi.511.h: "Мы строим фонтан."
 gaudi.511.i: "У меня свои планы на это место..."
 gaudi.512.f: "При планировании кольцевой дороги некоторые детали всё ещё неясны. Ещё не определено, какие фигуры должны быть размещены на видном месте. Ясно, что это должны быть фигуры из римского пантеона. Определённые слои населения отождествляют себя с соответствующими фигурами — например, капиталисты предложили разместить в центре Меркурия, бога торговли. Аристократы, с другой стороны, настаивают на Юпитере, отце богов. Военные предпочитают Марса, учёные хотят видеть в центре Аполлона."
 gaudi.512.g: "Юпитер."
 gaudi.512.h: "Меркурий."
 gaudi.512.i: "Аполлон."
 gaudi.512.j: "Марс."
 gaudi.513.t: "Строительство министерства превышает смету"
 gaudi.513.d: "Строительство нового здания министерства превращается в небольшой скандал."
 gaudi.513.g: "Был бюджет, и этого бюджета нужно придерживаться."
 gaudi.513.h: "Это прискорбно, но в этой области обычное дело."
 gaudi.513.i: "Этот проект должен получить столько денег и времени, сколько ему нужно."
 gaudi.514.t: "Новая кофейня"
 gaudi.514.d: "На Рингштрассе открылась новая кофейня."
 gaudi.514.f: "«Кофейня оставалась нашим лучшим местом для образования во всём новом. Чтобы понять это, нужно знать, что венская кофейня — это учреждение особого рода, которое нельзя сравнить ни с каким подобным учреждением в мире. Это на самом деле своего рода демократический клуб, доступный каждому за дешёвую чашку кофе, где за эту небольшую плату каждый гость может сидеть часами, обсуждать, писать, играть в карты, получать свою почту и, прежде всего, потреблять неограниченное количество газет и журналов. В лучшей венской кофейне были доступны все венские газеты, и не только венские, но и газеты всего Германского рейха, французские, английские, итальянские и американские, а также все важные литературные и художественные журналы мира. Так что мы из первых рук знали всё, что происходит в мире, мы слышали о каждой книге, которая выходила, о каждом представлении, где бы оно ни проходило, и сравнивали рецензии во всех газетах. Возможно, ничто так не способствовало интеллектуальной гибкости и международной ориентации австрийца, как то, что он мог так всесторонне ориентироваться во всех событиях в мире в кофейне и в то же время обсуждать их в дружеских кругах. Мы сидели там часами каждый день, и мы ничего не упускали». - Стефан Цвейг"
 gaudi.514.g: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] [SelectLocalization(SCOPE.sCharacter('gaudi_ruler').IsFemale, 'должна', 'должен')] её посетить."
 gaudi.514.h: "Это повысит уровень жизни в Вене."
 gaudi.515.t: "Дворец на Рингштрассе"
 gaudi.515.d: "Дворянин переоценил свои силы, строя дворец в новом столичном районе — городе [ROOT.GetCountry.GetCapital.GetCityHubName]. Недостроенные руины грозят стать бельмом на глазу."
 gaudi.515.f: "Дворец на Рингштрассе — это термин для великолепных дворцов на Венской Рингштрассе. Эти сооружения в основном строились старой аристократией или банкирами и промышленниками в конце XIX века. Дворцы были построены в смеси необарокко и неоренессанса, или неоманьеризма. Они также были символом подъёма и статуса. Однако один из строителей недавно перенапрягся и стоит на грани банкротства. Народ уже насмехается над этим бельмом на глазу, которое в худшем случае придётся снова сносить, что продлит завершение всего проекта."
 gaudi.515.g: "Мы разделим расходы."
 gaudi.515.h: "Это не наше дело."
 gaudi.516.t: "Расширение столицы: хороший прогресс"
 gaudi.516.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'заявила', 'заявил')], что расширение столицы может быть завершено раньше."
 gaudi.516.f: "По неизвестным причинам всё продвигается быстрее: будь то любовь к родине, высокая заработная плата, дружеская поддержка местных элит или просто лучшая погода."
 gaudi.516.g: "Великолепно."
 gaudi.517.t: "Расширение столицы: медленный прогресс"
 gaudi.517.d: "К сожалению, строительное управление под руководством [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] было вынуждено сегодня признать, что строительство нового района в городе [ROOT.GetCountry.GetCapital.GetCityHubName] отстаёт от графика."
 gaudi.517.f: "По неизвестным причинам всё продвигается медленнее: будь то агитация враждебных политических элементов, подрыв трудовой этики профсоюзами, заговор иллюминатов или просто плохая погода."
 gaudi.517.g: "Прискорбно."
 gaudi.518.t: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] достоин памятника "
 gaudi.518.d: "На Рингштрассе планируется установить новый памятник: статую в честь нашего правителя."
 gaudi.518.f: "Рингштрассе служила для иллюстрации австрийской истории. С одной стороны, была увековечена длинная череда монархов из правящей династии Габсбургов, из которых Мария Терезия получила самый пышный памятник. Но и генералы, такие как Евгений Савойский или Шварценберг, обогатили венский городской пейзаж. Буржуазия, тем временем, придавала большое значение увековечиванию своих представителей, а именно поэтов-князей Гёте и Шиллера, а также великих композиторов Шуберта, Моцарта и Бетховена."
 gaudi.518.g: "Хорошо, когда ты [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]."
 gaudi.518.h: "Прекрасно, но лучше сосредоточьтесь на завершении Рингштрассе."
 gaudi.519.t: "Пожар!"
 gaudi.519.d: "Разрушительный пожар уничтожил несколько сооружений на строительной площадке в городе [ROOT.GetCountry.GetCapital.GetCityHubName]."
 gaudi.519.f: "Самой известной катастрофой на Рингштрассе был пожар в Рингтеатре 8 декабря 1881 года. Это одна из крупнейших пожарных катастроф XIX века. Оценки варьируются от сотен, если не более тысячи жертв. Причиной стала неисправность газового освещения, что привело к утечке газа и взрыву при следующей попытке его зажечь. Возникший пожар перекинулся на декорации, а затем быстро распространился на остальную часть сцены и, в конечном итоге, на зрительный зал. Пожар имел внутренние и международные последствия для превентивной противопожарной защиты, особенно в театральной сфере, и соответствующих правовых положений для строительства театров в Австрии. Композитор Антон Брукнер, у которого были билеты на вечернее представление, избежал смерти, оставшись дома из-за недомогания."
 gaudi.519.g: "Ужасный день."
 gaudi.520.t: "Предубеждения против расширения города"
 gaudi.520.d: "Представители сельского населения видят в развитии города [ROOT.GetCountry.GetCapital.GetCityHubName] недостаток для простого сельского населения."
 gaudi.520.f: "«Правительство своим невыразимым чванством в столице даёт понять, что оно состоит из отчуждённых горожан, которые думают лишь на несколько улиц вперёд и никогда не покидали город [ROOT.GetCountry.GetCapital.GetCityHubName]. Там тратятся огромные суммы, которые достаются только столице, но о которых простые деревенские жители в маленьких городках или деревнях ничего не замечают. Идеология, стоящая за этим, благоприятствует централизму, бюрократии, помогает и содействует государственному аппарату; но какую перспективу такой декадентский проект предлагает простому человеку?»"
 gaudi.520.g: "Как насчёт дружеского подарка на благо трудолюбивого сельского населения?"
 gaudi.520.h: "Город и провинция равны."
 gaudi.520.i: "Кого волнуют эти глупые крестьянские разговоры?"
 gaudi.521.t: "Резиденция промышленника"
 gaudi.521.d: "Богатый бизнесмен построил новый дворец и тем самым обогатил город [ROOT.GetCountry.GetCapital.GetCityHubName] великолепным сооружением."
 gaudi.521.f: "Дворцы промышленников и банкиров рассматривались как способ подчеркнуть их новое положение в государстве. Это также давало возможность состоятельным людям еврейского происхождения подчеркнуть свою эмансипацию. Развитие Вены в XIX веке — хороший тому пример. Один из самых известных дворцов на Рингштрассе — дворец Эпштейна. Он был построен для промышленника и банкира Густава Риттера фон Эпштейна. Архитектором был Теофил фрайхерр фон Хансен, который также спроектировал соседнее здание австрийского парламента. Он имеет до пяти этажей и построен в типичном для своего времени стиле неоренессанса."
 gaudi.521.g: "Город [ROOT.GetCountry.GetCapital.GetCityHubName] растёт и процветает."
 gaudi.522.t: "Расширение казарм"
 gaudi.522.d: "Расширение города [ROOT.GetCountry.GetCapital.GetCityHubName] даёт возможность модернизировать и расширить казармы."
 gaudi.522.f: "Казармы Франца-Иосифа были венским казарменным зданием в сегодняшнем районе Рингштрассе и долгое время препятствовали строительству крупномасштабного проекта. Казармы были названы в честь императора Франца Иосифа I и построены в 1854-1857 годах после революции 1848 года. Вскоре после постройки казармы встали на пути развития Венской Рингштрассе, которое началось в 1857 году, но прошло четыре десятилетия, прежде чем армия снова отсюда выехала. Поэтому пришлось предварительно возвести новые казармы, чтобы компенсировать потерю казарм Франца-Иосифа."
 gaudi.522.g: "Расширить казармы."
 gaudi.522.h: "Лучше потратим время на что-нибудь другое."
 gaudi.523.t: "Расширение строительного сектора"
 gaudi.523.d: "Расширение города [ROOT.GetCountry.GetCapital.GetCityHubName] даёт возможность расширить строительный сектор."
 gaudi.523.f: "«Мы обычно называем природой художника сумму качеств, которые мешают художнику творить». - Артур Шницлер"
 gaudi.523.g: "Расширить строительное управление."
 gaudi.524.t: "Прекрасный парк"
 gaudi.524.d: "Новый парк в городе [ROOT.GetCountry.GetCapital.GetCityHubName] завершён и теперь открыт для прогулок всех граждан."
 gaudi.524.f: "Ворота нового Штадтпарка распахиваются. Газоны раскатываются, как бархат. Дорожки извиваются между клумбами и статуями. Но что больше всего привлекает толпу, так это не трава, а звук. Эстрада, небольшой оркестр, вальс, плывущий по ветру. Публичная музыка, некогда доступная только в салонах и дворцах, теперь наполняет воздух для всех. В таких городах, как Вена, Курсалон стал гражданским храмом мелодии. Великолепное сооружение в стиле итальянского Ренессанса расположено на Йоханнесгассе и имеет широкую террасу в парке. Во времена братьев Штраус Курсалон был популярным местом для танцев и концертов."
 gaudi.524.g: "Прогуляемся."
 gaudi.524.h: "Отпразднуем это концертом!"
 gaudi.525.t: "Расширение оперы"
 gaudi.525.d: "Расширение города [ROOT.GetCountry.GetCapital.GetCityHubName] даёт возможность модернизировать и расширить оперу."
 gaudi.525.f: "Среди бульваров и аркад, фонтанов и министерств существующий оперный театр начинает казаться скромным, даже провинциальным. Предложение: новое сооружение или масштабное расширение. Больше мест, лучше акустика, монументальные фасады. Храм культуры, соответствующий статусу города. По всей Европе такие жесты стали символами национального престижа. В Париже Опера Гарнье возвышается с мраморными лестницами и золотыми потолками. В Вене Штаатсопер, открытая в 1869 году, с элегантностью и гордостью венчает Рингштрассе."
 gaudi.525.g: "Расширить оперный театр."
 gaudi.526.t: "Расширение ратуши"
 gaudi.526.d: "Расширение города [ROOT.GetCountry.GetCapital.GetCityHubName] даёт возможность модернизировать и расширить ратушу."
 gaudi.526.f: "Старая ратуша всё ещё носит герб другого века. Внутри: узкие лестницы, переполненные кабинеты и бухгалтерские книги, сложенные выше обшивки. Стол мэра едва ли достаточно велик для его бумаг, не говоря уже о власти. Теперь предложение: новая ратуша, которая отражает растущую роль города в управлении, экономике и гражданской идентичности. Возвышающиеся шпили или сдержанный классицизм — в любом случае, она должна символизировать власть. По всей Европе города справились с этой задачей. В Вене неоготическая ратуша (завершённая в 1883 году) стала символом муниципальной уверенности. Париж с величием и вызовом восстановил свой Отель-де-Виль после 1871 года. Красная ратуша в Берлине возникла как слияние ренессансной формы и прусской функциональности."
 gaudi.526.g: "Расширить ратушу."
 gaudi.527.t: "Хельденплац"
 gaudi.527.d: "После завершения Хельденплац (Площади Героев) некоторые ведущие политические деятели настаивают на её достойном открытии."
 gaudi.527.f: "При строительстве Рингштрассе «внешний Бургплац» был спроектирован при императоре Франце Иосифе как часть Кайзерфорума, который так и не был завершён. Планировалось создать прямоугольную площадь, которая была бы обрамлена Леопольдинским крылом, Новым Хофбургом, Габсбургскими коллекциями и аналогом Нового замка, который так и не был построен на месте Фольксгартена. Название Хельденплац было закреплено в 1878 году; оно происходит от двух конных памятников, оба из которых созданы Антоном Домиником Фернкорном. Более старый — эрцгерцога Карла, который был открыт в 1860 году. Его аналог, конная статуя принца Евгения, также был завершён в 1865 году. После поражения в Первой мировой войне, распада Австро-Венгерской дуалистической монархии под властью династии Габсбургов-Лотарингских и основания первой Австрийской республики, Хельденплац служила местом сбора для всех политических лагерей и плацем для австрийской армии."
 gaudi.527.g: "Провести парад и пригласить наших друзей."
 gaudi.527.h: "Учредить постоянный военный парад на следующие несколько лет."
 gaudi.527.i: "И кто за всё это будет платить?"
 gaudi.528.t: "Расширение университета"
 gaudi.528.d: "Расширение города [ROOT.GetCountry.GetCapital.GetCityHubName] даёт возможность модернизировать и расширить университет."
 gaudi.528.f: "Что такое великий город без мысли? Среди железнодорожных линий, министерств и театров университет начинает трещать под тяжестью собственного успеха. Слишком много студентов для слишком малого количества залов. Кафедры разбросаны по арендованным зданиям. Профессора теснятся в борьбе за место между библиотеками и лабораториями. Предложение ясно: новый кампус или крупное расширение — современные лекционные залы, отдельные факультеты, монументальная библиотека. Такие проекты — это больше, чем инфраструктура; это декларации интеллектуальных амбиций. В Вене университет был перенесён и перестроен в 1870-х годах вдоль Рингштрассе, с величественным фасадом и символической центральностью. В Париже Сорбонна была основательно расширена в рамках реформ Жюля Ферри, чтобы вместить растущий академический класс Франции."
 gaudi.528.g: "Расширить университет."
 gaudi.529.t: "Расширение Академии искусств"
 gaudi.529.d: "Расширение города [ROOT.GetCountry.GetCapital.GetCityHubName] даёт возможность модернизировать и расширить академию искусств."
 gaudi.529.f: "По мере роста города растёт и его аппетит к искусству. Тем не менее, художники и скульпторы теснятся в маленьких студиях и тусклых мансардах, учась не у мастеров, а по слухам и заимствованным эскизам. Предложение: настоящая академия искусств, со светлыми ателье, анатомическими театрами и галереями, открытыми для публичных выставок. По всей Европе такие академии формируют национальный вкус. Школа изящных искусств в Париже устанавливает классические стандарты для половины континента. В Вене величественное здание Академии изобразительных искусств закрепляет культурный престиж Рингштрассе."
 gaudi.529.g: "Расширить академию."
 gaudi.530.t: "Урания"
 gaudi.530.d: "С открытием «Урании» в Вене появился так называемый «народный образовательный центр», точное назначение которого до сих пор оспаривается."
 gaudi.530.f: "В 1883 году немецкий астроном Макс Вильгельм Мейер приехал в Вену в качестве ассистента в Венском университете для расчёта исторических и будущих солнечных затмений. Он также читал лекции по фольклору и разработал идею народного образовательного учреждения. Однако, поскольку в 1885 году его вызвали в Берлин, он продолжил развивать свои идеи там. «Урания» в Вене была создана по образцу «Урании» в Берлине: в ней было место на 800 человек и имелся лекционный зал на 200 человек, комнаты для научных демонстраций и обсерватория. Однако эта «временная» Урания едва справлялась с наплывом посетителей, так что вскоре потребовалось новое здание на Рингштрассе. «Урания» не только расширила спектр образовательных возможностей (например, за счёт языковых курсов), но и стала местом проведения концертов, с собственным симфоническим оркестром и хором «Урания». Необычная форма и конструкция вызвали обычный для Вены скандал. Однако венцам здание понравилось, и «Урания» вскоре утвердилась как одна из достопримечательностей Вены."
 gaudi.530.g: "Это архитектурная достопримечательность."
 gaudi.530.h: "Это в первую очередь развлекательное заведение."
 gaudi.530.i: "Прежде всего, это обсерватория."
 gaudi.9.t: "Городское планирование завершено"
 gaudi.9.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] сегодня [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'завершила', 'завершил')] свою работу по городскому планированию в важном провинциальном городе. Теперь [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она', 'он')] снова полностью свободен."
 gaudi.9.f: "«Архитектура не достигает своего высшего состояния, пока она не будет настолько пронизана воображением и фантазией — не необузданным воображением или капризной фантазией, — что упорядоченная ткань радует глаз каждого разумного наблюдателя и вызывает эмоции, подобные стихотворению». -Генри ван Брант"
 gaudi.9.g: "Так много проектов, так мало времени."
 gaudi_architecture_treatise_modifier: "Трактат об архитектуре"
 gaudi.8.t: "Трактат об архитектуре [ROOT.Var('gaudi_architect_var').GetCharacter.GetLastName]"
 gaudi.8.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'завершила', 'завершил')] свою работу. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Её', 'Его')] трактат об исторической и современной архитектуре, обогащённый [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'её', 'его')] теоретическими размышлениями, окажет влияние на будущие поколения архитекторов."
 gaudi.8.f: "«Архитектура запечатлела великие идеи человечества. Не только каждый религиозный символ, но и каждая человеческая мысль имеет свою страницу в этой огромной книге». -Виктор Гюго"
 gaudi.8.g: "Произведение для потомков."
 je_gaudi_architecture_treatise: "Трактат об архитектуре"
 je_gaudi_architecture_treatise_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] на год полностью [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'уединилась', 'уединился')], чтобы собрать свои предыдущие знания об архитектурном искусстве в книгу. Она должна стать манифестом [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'её', 'его')] жизни, обобщающим весь [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'её', 'его')] опыт и теории об архитектуре. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Её', 'Его')] репутация играет решающую роль в определении ценности работы. Однако такие черты характера, как $literary$, $erudite$, $innovative$ и $aesthete$, также являются ценными."
