 je_gaudi_neuschwanstein_phase_2: "Нойшванштайн: сказочный замок"
 je_gaudi_neuschwanstein_phase_2_reason: "С самого начала Нойшванштайн не предназначался для представительства или публики, а как частное уединение для короля. Он основывал свою работу на средневековых христианских мифах, но прежде всего на операх Рихарда Вагнера, которого он финансово поддерживал и которым восхищался. Постоянно новые идеи короля и его желание построить каменную оперную сцену на века с помощью Нойшванштайна значительно задерживали строительство и довели Людвига II до грани разорения."
 je_gaudi_neuschwanstein_phase_2_goal: "#E Прогресс строительства#! достигает #BLUE 120#! очков. В данный момент у нас #G [GetGlobalVariable('gaudi_neuschwanstein_progress').GetValue]#! очков. Обычно мы получаем по одному очку в месяц."
 gaudi_neuschwanstein_phase_1_decision: "Нойшванштайн: мечта короля"
 gaudi_neuschwanstein_phase_1_decision_desc: "Нойшванштайн считается ярчайшим примером историзма и немецкого романтизма. Сказочный замок, который позже многие будут считать «идеальным» замком как таковым, был спроектирован баварским королём Людвигом II. Хотя в XIX веке для монархов не было ничего необычного в строительстве средневековых замков в пышном стиле, Нойшванштайн должен был превзойти все образцы и стать достопримечательностью не только Баварии, но и всего немецкоязычного мира."
 gaudi_neuschwanstein_phase_2_decision: "Нойшванштайн: сказочный замок"
 gaudi_neuschwanstein_phase_2_decision_desc: "С самого начала Нойшванштайн не предназначался для представительства или публики, а как частное уединение для короля. Он основывал свою работу на средневековых христианских мифах, но прежде всего на операх Рихарда Вагнера, которого он финансово поддерживал и которым восхищался. Постоянно новые идеи короля и его желание построить каменную оперную сцену на века с помощью Нойшванштайна значительно задерживали строительство и довели Людвига II до грани разорения."
 gaudi_custom_tt_trigger_neuschwanstein: "Вы должны играть за #yellow Баварию#! или $south_german$ страну со столицей в Баварии."
