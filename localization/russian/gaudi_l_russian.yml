 gaudi.11.t: "Выбор чертежа: городской монумент"
 gaudi.11.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName], самый важный архитектор нашей страны, взялся за важную задачу по разработке чертежа для нового сооружения. Остаётся вопрос: какое сооружение следует спроектировать?"
 gaudi.11.f: "[GetBuildingType('building_gaudi_statue').GetName] увеличивает #G легитимность правительства#!. Требуется технология «[GetTechnology('elgar_classicism_tech').GetName]».\n[GetBuildingType('building_gaudi_fountain').GetName] повышает #G уровень жизни#! в области, где он расположен.\n[GetBuildingType('building_gaudi_arch').GetName] #G уменьшит потерю боевого духа#! сражающихся войск. Требуется технология «[GetTechnology('napoleonic_warfare').GetName]»."
 gaudi.11.g: "Статуя."
 gaudi.11.h: "Фонтан."
 gaudi.11.i: "Триумфальная арка."
 gaudi.12.t: "Выбор чертежа: общественная площадь"
 gaudi.12.f: "[GetBuildingType('building_gaudi_park').GetName] #G уменьшит загрязнение#!.\n[GetBuildingType('building_gaudi_luna').GetName] увеличивает #G налоговые поступления#! в области, где он расположен. Требуется технология «[GetTechnology('curtiss_tourism_tech').GetName]».\n[GetBuildingType('building_gaudi_parade').GetName] положительно влияет на #G призывные ставки#!. Требуется технология «[GetTechnology('nationalism').GetName]»."
 gaudi.12.g: "Общественный парк."
 gaudi.12.h: "Луна-парк."
 gaudi.12.i: "Плац."
 gaudi.13.t: "Выбор чертежа: общественное сооружение"
 gaudi.13.f: "[GetBuildingType('building_gaudi_almshouse').GetName] будет #G привлекать мигрантов#!. Требуется технология «[GetTechnology('egalitarianism').GetName]».\n[GetBuildingType('building_gaudi_school').GetName] улучшает #G доступ к образованию#! в области, где она расположена. Требуется технология «[GetTechnology('empiricism').GetName]».\n[GetBuildingType('building_gaudi_prison').GetName] #G уменьшит беспорядки#!. Требуется технология «[GetTechnology('law_enforcement').GetName]»."
 gaudi.13.g: "Государственная богадельня."
 gaudi.13.h: "Государственная школа."
 gaudi.13.i: "Государственная тюрьма."
 gaudi.14.t: "Выбор чертежа: общественное здравоохранение"
 gaudi.14.f: "[GetBuildingType('building_gaudi_canalization').GetName] даст области #G иммунитет к холере, жёлтой лихорадке и чуме#!. Требуется технология «[GetTechnology('modern_sewerage').GetName]».\n[GetBuildingType('building_gaudi_hospital').GetName] повышает #G рождаемость#! в области, где он расположен. Требуется технология «[GetTechnology('theiler_microbiology_tech').GetName]».\n[GetBuildingType('building_gaudi_health').GetName] #G снизит интенсивность заболеваний#!. Требуется технология «[GetTechnology('pharmaceuticals').GetName]»."
 gaudi.14.g: "Канализационная система."
 gaudi.14.h: "Университетская больница."
 gaudi.14.i: "Департамент здравоохранения."
 gaudi.15.t: "Выбор чертежа: национальная академия"
 gaudi.15.f: "[GetBuildingType('building_gaudi_science').GetName] будет продвигать наш #G ежемесячный научный прогресс#!. Требуется технология «[GetTechnology('dialectics').GetName]».\n[GetBuildingType('building_gaudi_arts').GetName] будет продвигать наш #G ежемесячный творческий прогресс#!. Требуется технология «[GetTechnology('romanticism').GetName]».\n[GetBuildingType('building_gaudi_sports').GetName] #G повысит опыт наших спортсменов#!. Требуется технология «[GetTechnology('vikelas_international_sports_tech').GetName]»."
 gaudi.15.g: "Академия наук."
 gaudi.15.h: "Академия искусств."
 gaudi.15.i: "Академия спорта."
 gaudi.11.j: "Новый чертёж не нужен."
 gaudi.16.t: "Новый чертёж"
 gaudi.16.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] сегодня завершил[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] работу над чертежом и передал[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] его заказчику."
 gaudi.16.f: "«Орнамент — это потраченный труд, а следовательно, потраченное здоровье. Сегодня это также означает потраченный материал, а и то, и другое означает потраченный капитал. Современный человек, человек с современными нервами, не нуждается в орнаменте; он его ненавидит». -Адольф Лоос"
 gaudi.16.g: "Новое сооружение!"
