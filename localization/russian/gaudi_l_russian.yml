 gaudi.1151.d: "Наш [concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] наконец завершил проект по модернизации #tooltippable_name #tooltip:[SCOPE.sBuilding('target').GetTooltipTag],DATA_BUILDING_NAME_TOOLTIP,BuildingTooltip [SCOPE.sBuilding('target').GetCustom('RU_BL_RP')]#!#! в [SCOPE.sBuilding('target').GetState.GetCustom('RU_SL_PP')]. Теперь, когда наши строительные процессы эффективнее, чем когда-либо, мы должны быть в состоянии завершать строительство намного быстрее!"
 je_gaudi_modernizing_industries_project_reason: "Ваш [concept_tesla_mechanical_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] занимается модернизацией методов производства [JournalEntry.GetTarget.GetBuilding.GetName] в [JournalEntry.GetTarget.GetBuilding.GetState.GetCustom('RU_SL_PP')]\n$mr_divider_for_je$\nПроект будет получать прогресс каждый месяц. Каждый раз, когда прогресс достигает [JournalEntry.GetTotalGoalValue|V0], сооружение будет получать новый модификатор.\nВсего можно получить 3 модификатора. Каждый новый модификатор требует, чтобы прогресс снова заполнился.\n$mr_divider_for_je$\nТекущий ежемесячный прогресс: #underline #tooltip:[GetRawTextTooltipTag('gaudi_monthly_mechanical_research_progress_tt')] [GetPlayer.MakeScope.GetVariable('gaudi_monthly_mechanical_engineering_progress_var').GetValue|2+] #!#!"
