 gaudi.1221.t: "Механический компьютер"
 gaudi.1221.d: "Наш [concept_tesla_mechanical_engineer] [GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] наконец-то завершил одно из величайших изобретений человечества: механический компьютер. Это изобретение окажет влияние, которое пока никто не может осознать."
 gaudi.1221.f: "Двигатели взревели, и колосс начал греметь и скрежетать. Тысячи шестерёнок пришли в движение, и принтер начал выдавать числа одно за другим. Всё это со скоростью и точностью, на которые не способен ни один человек."
 gaudi.1222.t: "Аналитическая машина"
 gaudi.1222.d: "[SCOPE.sCharacter('tesla_new_engineer_scope').GetFullName], известный эрудит, спроектировал новую машину, которая сможет выполнять любые существующие вычисления. Теперь он просит наше правительство о поддержке, чтобы действительно построить такой механический компьютер."
 gaudi.1222.f: "«Как только появится аналитическая машина, она непременно определит будущий курс науки. Всякий раз, когда с её помощью будет искаться какой-либо результат, возникнет вопрос — каким путём вычислений можно получить эти результаты на машине в кратчайшие сроки?» - Чарльз Бэббидж"
 gaudi.1222.g: "Какой увлекательный проект!"
 gaudi.1222.h: "Вместо этого мы могли бы построить столько военных кораблей!"
 tesla_mechanical_computer_project_finished_engineer_loc: "\n[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting] создал[SelectLocalization(GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.IsFemale, 'а', '')] первый #V механический компьютер#!. Одно из величайших изобретений человечества."
 tesla_add_x_mechanical_computer_progress_minus_x_tt: "Потеряно [SCOPE.GetValue('amount')|0+] очков #V прогресса#! для механического компьютера."
