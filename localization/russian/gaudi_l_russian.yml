 je_gaudi_palacio_phase_1: "Сердце мексиканской культуры"
 je_gaudi_palacio_phase_1_reason: "Дворец изящных искусств (Palacio de Bellas Artes) — важнейшее культурное учреждение Мексики. Монументальное сооружение считается высшим и самым важным культурным зданием в Мексике, посвящённым театру, танцу, музыке и опере, изобразительному искусству, литературе и архитектуре. Строительство сооружения началось 1 октября 1904 года. Целью было заменить ранее разрушенный Национальный театр, который воспринимался как пережиток колониализма."
 je_gaudi_palacio_phase_1_goal: "#E Прогресс строительства#! достигает #BLUE 120#! очков. В данный момент у нас #G [GetGlobalVariable('gaudi_palacio_progress').GetValue]#! очков. Обычно мы получаем по одному очку в месяц."
 je_gaudi_palacio_phase_2: "Сердце мексиканской культуры"
 je_gaudi_palacio_phase_2_reason: "Итальянскому архитектору Адамо Боари было поручено спроектировать Дворец изящных искусств, и ожидалось, что он завершит его в течение четырёх лет. Однако этот срок не был соблюдён из-за ряда проблем. Болотистая почва Мехико вызывала оседание сооружений, также были финансовые трудности, и в конечном итоге Боари вернулся в Италию из-за мексиканской революции. Задержка в строительстве также означала, что художественные и архитектурные вкусы менялись, и были приняты элементы ар-деко."
 je_gaudi_palacio_phase_2_goal: "#E Прогресс строительства#! достигает #BLUE 120#! очков. В данный момент у нас #G [GetGlobalVariable('gaudi_palacio_progress').GetValue]#! очков. Обычно мы получаем по одному очку в месяц."
 gaudi_palacio_phase_1_decision: "Дворец изящных искусств"
 gaudi_palacio_phase_1_decision_desc: "Дворец изящных искусств (Palacio de Bellas Artes) — важнейшее культурное учреждение Мексики. Монументальное сооружение считается высшим и самым важным культурным зданием в Мексике, посвящённым театру, танцу, музыке и опере, изобразительному искусству, литературе и архитектуре. Строительство сооружения началось 1 октября 1904 года. Целью было заменить ранее разрушенный Национальный театр, который воспринимался как пережиток колониализма."
 gaudi_palacio_phase_2_decision: "Сердце мексиканской культуры"
 gaudi_palacio_phase_2_decision_desc: "Итальянскому архитектору Адамо Боари было поручено спроектировать Дворец изящных искусств, и ожидалось, что он завершит его в течение четырёх лет. Однако этот срок не был соблюдён из-за ряда проблем. Болотистая почва Мехико вызывала оседание сооружений, также были финансовые трудности, и в конечном итоге Боари вернулся в Италию из-за мексиканской революции. Задержка в строительстве также означала, что художественные и архитектурные вкусы менялись, и были приняты элементы ар-деко."
 gaudi_palacio_needs_music_tt: "Нам нужно #G 300#! @elgar_music_tradition! [Concept('concept_elgar_musical_tradition', 'музыкальной традиции')]."
 gaudi_palacio_needs_music_2_tt: "Нам нужно #G 400#! @elgar_music_tradition! [Concept('concept_elgar_musical_tradition', 'музыкальной традиции')]."
 gaudi_custom_tt_trigger_palacio: "Вы должны играть за #yellow Мексику#!"
