 je_gaudi_mechanical_computer_project_reason: "#T Ваш [concept_tesla_mechanical_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] занимается изобретением $verrier_mechanical_computer_tech$.#!\n$mr_divider_for_je$\nКаждый месяц вы будете получать прогресс в зависимости от множества различных факторов. Как только прогресс достигнет 2000, вы получите технологию «[GetTechnology('verrier_mechanical_computer_tech').GetName]», которая даст вам доступ к [Concept('concept_production_method', 'методу производства')] #V $pm_verrier_mechanical_computer$#!.\n$mr_divider_for_je$\n#V Текущий ежемесячный прогресс:#! [GetPlayer.MakeScope.Var('gaudi_mechanical_computer_monthly_progress_var').GetValue|+2]\n\n#V Факторы, влияющие на ваш ежемесячный прогресс в машиностроении:#![GetPlayer.GetCustom('gaudi_base_engineering_progress_tt_type')][GetPlayer.GetCustom('tesla_mechanical_engineering_progress_has_mechanical_engineer_tt_type')][GetPlayer.GetCustom('tesla_mechanical_engineering_progress_experience_tt_type')][GetPlayer.GetCustom('gaudi_mechanical_engineering_mechanical_engineer_trait_tt_type')][GetPlayer.GetCustom('gaudi_mechanical_computer_progress_mathematician_trait_tt_type')][GetPlayer.GetCustom('gaudi_mechanical_computer_progress_innovative_trait_tt_type')][GetPlayer.GetCustom('gaudi_mechanical_computer_progress_physicist_trait_tt_type')][GetPlayer.GetCustom('tesla_mechanical_engineering_progress_meticulous_trait_tt_type')][GetPlayer.GetCustom('tesla_mechanical_engineering_progress_persistent_trait_tt_type')][GetPlayer.GetCustom('gaudi_mechanical_computer_progress_bad_trait_trait_tt_type')][GetPlayer.GetCustom('gaudi_mechanical_computer_progress_senile_trait_trait_tt_type')][GetPlayer.GetCustom('academics_mathematical_university_multiplier_tiny_tt_type')][GetPlayer.GetCustom('gaudi_mechanical_computer_progress_tooling_workshop_levels_trait_trait_tt_type')]"
