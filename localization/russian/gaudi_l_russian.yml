 gaudi.1002.d: "[SCOPE.sCharacter('gaudi_new_architect_scope').GetFullName] завершил[SelectLocalization(SCOPE.sCharacter('gaudi_new_architect_scope').IsFemale, 'а', '')] строительство павильонов Гуэля, пристройки к усадьбе в стиле модернизма, главным представителем которого является [SCOPE.sCharacter('gaudi_new_architect_scope').GetLastName]."
 gaudi.1002.f: "Железные ворота павильонов Гуэля были увенчаны железным драконом со стеклянными глазами. Все сооружения были спроектированы в стиле модернизма и ориентированы на восточный дизайн.\n\n[SCOPE.sCharacter('gaudi_new_architect_scope').GetLastName] был важнейшим представителем каталонского стиля модернизма. Модернизм можно рассматривать как каталонское выражение ар-нуво, он характеризуется традиционными материалами и техниками из Каталонии. «Естественность» и «движение» — самые важные термины для описания модернизма. Это хорошо видно, например, в парке Гуэль, который характеризуется округлыми формами и вдохновлён растениями и другими природными формами."
 gaudi.1002.h: "У Гауди впереди большое будущее!"
 gaudi_bauhaus_modifier: "Архитектура Баухауса"
 gaudi.21.t: "Инженер возвращается"
 gaudi.21.d: "После двух лет за границей наш архитектор возвращается — не только с эскизами, но и с новой дисциплиной."
 gaudi.21.f: "[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Она уехала', 'Он уехал')] чертёжником. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Она возвращается', 'Он возвращается')] строителем.\n\nДва долгих года [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] путешествовал[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] по Европе — через долины Ломбардии, на металлургические заводы Манчестера, под мосты Будапешта. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Она изучала', 'Он изучал')] не только церкви, но и насосные станции; не только капители и карнизы, но и котельные и крановые доки. [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'Она', 'Он')] сидел[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] на лекциях в политехническом институте, копировал[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')] тетради инженеров и на стройке в Лионе узнал[SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'а', '')], что прочность нельзя начертить — её нужно понять.\n\nТеперь [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'она говорит', 'он говорит')] новыми словами. О несущих силах, растягивающих рамах и душе железа. Некоторые из [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'её', 'его')] старых коллег едва узнают [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'её', 'его')]. Но [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'её', 'его')] руки остались прежними — только теперь твёрже. А [SelectLocalization(ROOT.Var('gaudi_architect_var').GetCharacter.IsFemale, 'её', 'его')] взгляд? Кажется, он проходит сквозь стены."
