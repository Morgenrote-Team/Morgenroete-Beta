 gaudi_historicism_style: "Архитектура историзма"
 gaudi_historicism_style_desc: "Как архитектор:\n#p +20#! $country_construction_add$ (если не занят проектом)\n\nЭтот архитектор берёт темы, формы и стиль сооружений из древних времён и сочетает и интерпретирует их во что-то новое."
