 je_gaudi_sagrada_phase_9: "Саграда-Фамилия: фасад Славы"
 je_gaudi_sagrada_phase_9_reason: "Самый большой и самый впечатляющий из фасадов — фасад Славы. Посвящённый Небесной Славе Иисуса, он представляет путь к Богу: Смерть, Страшный суд и Слава, в то время как ад остаётся для тех, кто отклоняется от воли Божьей. Чтобы попасть в портик Славы, большая лестница ведёт через подземный переход, построенный над улицей Каррер-де-Майорка, с украшениями, изображающими ад и порок. Он будет украшен демонами, идолами, ложными богами, ересью, расколами и т. д. Также будут изображены чистилище и смерть, последняя — с помощью гробниц вдоль земли. В портике семь больших колонн, посвящённых дарам Святого Духа. У основания колонн — изображения семи смертных грехов, а наверху — семи небесных добродетелей."
 je_gaudi_sagrada_phase_9_goal: "#E Прогресс строительства#! достигает #BLUE 120#! очков. В данный момент у нас #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! очков. Обычно мы получаем по одному очку в месяц."
 je_gaudi_sagrada_phase_10: "Саграда-Фамилия: шпиль Христа"
 je_gaudi_sagrada_phase_10_reason: "Башня Иисуса соединена четырьмя мостами с башнями евангелистов и увенчана большим крестом с шестью лучами высотой 13,5 м: в его центральной части находится агнец, а также надпись «Tu solus Sanctus, Tu solus Dominus, Tu solus Altissimus» и слова «Аминь» и «Аллилуйя». Каждый из четырёх лучей креста имеет мощные лучи света, видимые на больших расстояниях, в память о библейском отрывке, определяющем Иисуса как «Я — свет миру». Внутри башня Иисуса будет разделена на три этажа, которые будут символизировать сотворение вселенной и фразу, связанную с Христом: «Я есмь путь и истина и жизнь»."
 je_gaudi_sagrada_phase_10_goal: "#E Прогресс строительства#! достигает #BLUE 120#! очков. В данный момент у нас #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! очков. Обычно мы получаем по одному очку в месяц."
 notification_gaudi_summer_palace_burned_notification_name: "Летний дворец сожжён"
 notification_gaudi_summer_palace_burned_notification_desc: "Великолепный Летний дворец, резиденция китайских императоров на протяжении столетия, был сожжён [INITIATOR_COUNTRY.GetAltNameNoFlag('RU_CL_TP')]."
 gaudi_dombau_phase_1_decision: "Завершить Кёльнский собор"
 gaudi_dombau_phase_1_decision_desc: "Кёльнский собор считается самым совершенным готическим собором в мире. Строительство началось в XIII веке и имело колоссальные размеры. После завершения хора работы замедлились, а в XV веке и вовсе прекратились. По сей день строительный кран позднего Средневековья всё ещё возвышается над недостроенной южной башней. С возрождением национальных и романтических настроений в немецкой буржуазии и особенно после повторного открытия оригинальных строительных планов и их распространения, растёт убеждение, что завершение собора — это не только проект во славу Божью, но и символ немецкой культуры и единства немецкой нации."
 gaudi_dombau_phase_2_decision: "Южный фасад Кёльнского собора"
 gaudi_dombau_phase_2_decision_desc: "После того как строительные работы длились уже несколько лет, архитекторы столкнулись со строительством и отделкой южного фасада собора. С его богатым фигурным убранством он считается не только вершиной немецкой скульптуры, но и одним из главных произведений архитектуры неоготики. На строительство одного только фасада ушло тринадцать лет, а на его отделку и украшение — восемнадцать."
 gaudi_dombau_phase_3_decision: "Конструкция крыши Кёльнского собора"
 gaudi_dombau_phase_3_decision_desc: "Проект Кёльнского собора, основанный на готическом идеале, не помешал мастерам использовать самые современные строительные материалы того времени. Конструкция крыши была сделана из железа, что сделало её крупнейшей железо-стальной конструкцией в мире до постройки Эйфелевой башни. Благодаря этому решению конструкция выстояла даже перед бомбардировками союзников во время Второй мировой войны."
 gaudi_dombau_phase_4_decision: "Западный фасад и башни Кёльнского собора"
 gaudi_dombau_phase_4_decision_desc: "Западный фасад собора — самый большой церковный фасад из когда-либо построенных. Он в деталях следует средневековому плану, разработанному мастером Михаэлем фон Савойеном, который был зафиксирован в 1370 году в так называемом плане фасада F. Характерной чертой силуэта Кёльнского собора является фасад с двумя башнями-близнецами, увенчанными высокими шпилями. Мастер Михаэль спроектировал восьмиугольный, полностью ажурный шпиль, увенчанный многоярусным фиалом. Этими решениями, которые исследовали пределы технически возможного, готические архитекторы хотели подчеркнуть, что сооружение должно было быть «монументальным реликварием», хранящим внутри Трёх волхвов."
 gaudi_gotthard_survey_decision: "Спланировать и провести изыскания для Готтардской железной дороги"
 gaudi_gotthard_survey_decision_desc: "В XIX веке Швейцария рисковала остаться в стороне от международного железнодорожного сообщения и, таким образом, не только потерять связь с современной транспортной системой, но и с промышленной революцией. С открытием железнодорожной линии через перевал Бреннер эта опасность приобрела новое измерение. Географически у Швейцарии были более серьёзные проблемы, чем у Австрии: перевал Бреннер был гораздо легче проходим, чем швейцарские альтернативные маршруты. Строительству альпийской железной дороги в Швейцарии предшествовали десятилетия дискуссий о маршруте и финансировании такого проекта. Ключевую роль в определении Готтардской линии сыграл цюрихский политик и предприниматель Альфред Эшер."
 gaudi_gotthard_construction_decision: "Построить Готтардскую железную дорогу"
 gaudi_gotthard_construction_decision_desc: "Строительство Готтардской железной дороги считается одним из крупнейших строительных проектов XIX века и по своим масштабам и техническим трудностям сравнивается со строительством Суэцкого канала. С самого начала ядром и самой амбициозной частью была реализация тоннеля через Готтардский массив. На момент открытия в 1882 году Готтардский тоннель был самым длинным в мире — 15 километров. Около ста малых и больших мостов, в основном из железа и стали, являются ещё одной частью этого амбициозного маршрута, который не только соединяет северную и южную Европу, но и представляет собой символ швейцарского единства."
 gaudi_cristo_construction_decision: "Построить статую Христа-Искупителя"
 gaudi_cristo_construction_decision_desc: "В середине 1850-х годов священник-лазарист Педро Мария Босс впервые предложил установить христианский памятник на горе Корковаду в честь принцессы Изабеллы, регента Бразилии и дочери императора Педру II, но проект не был одобрен. В 1920 году Католический кружок Рио-де-Жанейро внёс второе предложение о знаковой статуе на горе. Местный инженер Эйтор да Силва Кошта и художник Карлос Освальд спроектировали статую. Французский скульптор Поль Ландовски создал произведение. Статуя в стиле ар-деко позже приобрела мировую известность как символ Рио-де-Жанейро наряду с Сахарной головой."
 gaudi_mole_phase_1_decision: "Моле-Антонеллиана: от синагоги до национального символа"
 gaudi_mole_phase_1_decision_desc: "Моле-Антонеллиана — это сооружение павильонного типа с высокой, резко сужающейся надстройкой, спроектированное туринским архитектором Алессандро Антонелли. Оно было начато как синагога по заказу еврейской общины, но чрезмерные амбиции архитектора привели к проекту, который вышел за рамки первоначальных планов. Расходы резко возросли, а завершение затянулось на годы. Несмотря на амбициозные попытки, еврейская община в конечном итоге не смогла собрать больше денег. Однако жители Турина выступили за то, чтобы проект был передан местному правительству для завершения сооружения, которое уже в черновом виде производило впечатление, и посвящения его итальянскому единству."
 gaudi_custom_tt_trigger_mole: "Вы должны играть за #yellow Италию#!"
 gaudi_mole_phase_2_decision: "Моле-Антонеллиана: фонарь и шпиль"
 gaudi_mole_phase_2_decision_desc: "Антонелли постоянно вносил изменения в своё сооружение, например, добавив так называемый «темпьетто» — неоклассическую шестиугольную колоннаду с двумя этажами и квадратным основанием, которая, таким образом, повторяет основной стиль пронаоса. Первоначальная идея Антонелли для шпиля заключалась в том, чтобы увенчать его пятиконечной звездой, но позже он предпочёл статую, изображающую крылатого гения, или «genio alato». Статуя была заказана скульптору Фумагалли через несколько месяцев после смерти Антонелли. Проект включал в себя чеканного и позолоченного медного гения, держащего в одной руке копьё, а в другой — пальмовую ветвь. На его голове была небольшая пятиконечная звезда, поддерживаемая шестом. Когда 10 апреля 1889 года звезда была установлена на своё место, общая высота Моле достигла 167,5 м, что сделало её самым высоким кирпичным сооружением в Европе того времени."
 gaudi_ringstrasse_phase_1_decision: "Венская Рингштрассе: Властелин кольцевых дорог"
 gaudi_ringstrasse_phase_1_decision_desc: "Венская Рингштрассе была построена после сноса городских стен в середине XIX века. С 1860-х по 1890-е годы вдоль Рингштрассе было возведено множество крупных общественных сооружений в эклектичном историческом стиле, иногда называемом Ringstraßenstil («стиль Рингштрассе»), с использованием элементов классической, готической, ренессансной и барочной архитектуры. Вдоль всей кольцевой дороги было возведено множество общественных и частных сооружений. Аристократы и другие состоятельные частные лица спешили построить представительные дворцы (дворцы Рингштрассе) в монументальном историческом стиле."
 gaudi_ringstrasse_phase_2_decision: "Венская Рингштрассе: Хофопер и Новая ратуша"
 gaudi_ringstrasse_phase_2_decision_desc: "Кольцевая дорога была торжественно открыта всего через десять лет после принятия решения о строительстве великолепного бульвара на месте снесённых венских бастионов. Но в то время на ней всё ещё преобладали пустыри. Одним из важнейших проектов в последующие годы стала реализация большого нового оперного театра, который позже стал Венской государственной оперой. В этот период также была построена Новая ратуша, в течение которого Рингштрассе превратилась из простого проспекта в новый центр Вены, где доминировали дворцы и общественные сооружения."
 gaudi_ringstrasse_phase_3_decision: "Венская Рингштрассе: Университет и художественные музеи"
 gaudi_ringstrasse_phase_3_decision_desc: "Рингштрассе уже стала желанным адресом для промышленников, банкиров и аристократии. Общественные сооружения занимают видное место и представляют страну в самом эстетичном виде. Тем не менее, для завершения требуется заключительный этап строительства, на котором в центре внимания должны быть строительство нового здания университета и создание художественных музеев."
 gaudi_custom_tt_trigger_ringstrasse: "Вы должны играть за #yellow Австрию#!"
 gaudi_sagrada_phase_1_decision: "Саграда-Фамилия: Мечта Антонио Гауди"
 gaudi_sagrada_phase_1_decision_desc: "Антонио Гауди-и-Корнет был каталонским архитектором и дизайнером из Испании, известным как величайший представитель каталонского модернизма. Работы Гауди имеют очень индивидуальный, sui generis стиль. В 1883 году Гауди был назначен ответственным за недавно начатый проект строительства барселонской церкви под названием «Искупительный храм Святого Семейства». Гауди полностью изменил первоначальный проект и наделил его своим собственным неповторимым стилем. До самой смерти он полностью посвятил себя этому проекту. На протяжении десятилетий Саграда-Фамилия оставалась крупнейшей недостроенной католической церковью в мире — проект века на грани гениальности и безумия."
 gaudi_sagrada_phase_2_decision: "Саграда-Фамилия: Апсида"
 gaudi_sagrada_phase_2_decision_desc: "Гауди завершил крипту, которую он начал в основном по планам дель Вильяра, но своды были переработаны Гауди. В середине 1880-х годов в ней можно было проводить первые службы, а в 1889 году крипта была завершена. Одновременно со строительством крипты Гауди начал коренным образом перерабатывать планы церкви. В 1885 году он представил новую общую концепцию с готическим языком форм, в которой угадываются 18 башен, хотя и в меньшем масштабе, чем в нынешнем проекте. Внешняя стена апсиды, завершённая в 1893 году, выше, чем в проекте дель Вильяра. Она содержит неоготические элементы, но демонстрирует почерк Гауди в своеобразном использовании готических форм, натуралистических горгульях и навершиях."
 gaudi_sagrada_phase_3_decision: "Саграда-Фамилия: фасад Рождества"
 gaudi_sagrada_phase_3_decision_desc: "Посвящённый рождению Иисуса, фасад Рождества украшен сценами, напоминающими элементы жизни. Характерные для натуралистического стиля Гауди, скульптуры богато аранжированы и украшены сценами и образами из природы, каждый из которых является символом по-своему. Фасад обращён к восходящему солнцу на северо-восток, что символизирует рождение Христа. Он разделён на три портика, каждый из которых представляет богословскую добродетель (Надежда, Вера и Милосердие). Древо Жизни возвышается над дверью Иисуса в портике Милосердия."
 gaudi_sagrada_phase_4_decision: "Саграда-Фамилия: главный неф"
 gaudi_sagrada_phase_4_decision_desc: "План церкви представляет собой латинский крест с пятью нефами. Колонны интерьера — уникальный проект Гауди. Помимо разветвления для поддержки нагрузки, их постоянно меняющиеся поверхности являются результатом пересечения различных геометрических форм. Самый простой пример — квадратное основание, переходящее в восьмиугольник по мере подъёма колонны, затем в шестнадцатигранную форму и, в конечном итоге, в круг. Практически ни одна из внутренних поверхностей не является плоской; орнаментация всеобъемлюща и богата, состоя в значительной части из абстрактных форм, сочетающих плавные изгибы и зазубренные точки. Даже такие детали, как железные перила для балконов и лестниц, полны извилистых украшений."
 gaudi_sagrada_phase_5_decision: "Саграда-Фамилия: шпили апостолов"
 gaudi_sagrada_phase_5_decision_desc: "Первоначальный проект Гауди предусматривает в общей сложности восемнадцать шпилей, представляющих в порядке возрастания высоты Двенадцать апостолов, Деву Марию, четырёх евангелистов и, самый высокий из всех, Иисуса Христа. Все башни, форма которых должна напоминать епископский посох, имеют длинные вертикальные выемки и красочные шпили, украшенные животными или священными символами и цитатами из Библии. Они несут небольшой золотой крест с именем соответствующего апостола. Некоторые башни соединены узкими каменными мостами."
 gaudi_sagrada_phase_6_decision: "Саграда-Фамилия: фасад Страстей"
 gaudi_sagrada_phase_6_decision_desc: "В отличие от богато украшенного фасада Рождества, фасад Страстей суров, прост и лаконичен, с большим количеством голого камня, и изрезан резкими прямыми линиями, напоминающими кости скелета. Посвящённый Страстям Христовым, страданиям Иисуса во время его распятия, фасад должен был изображать грехи человека. Гауди хотел, чтобы этот фасад внушал страх зрителю. Он хотел «ломать» арки и «резать» колонны, и использовать эффект светотени (тёмные угловатые тени, контрастирующие с резким жёстким светом), чтобы ещё больше показать суровость и жестокость жертвы Христа. Обращённый к заходящему солнцу, что указывает и символизирует смерть Христа, фасад Страстей поддерживается шестью большими наклонными колоннами, спроектированными так, чтобы напоминать напряжённые мышцы."
 gaudi_sagrada_phase_7_decision: "Саграда-Фамилия: трансепт"
 gaudi_sagrada_phase_7_decision_desc: "Темы в декоре включают слова из литургии. Шпили украшены такими словами, как «Осанна», «В вышних» и «Свят»; большие двери фасада Страстей воспроизводят отрывки из Страстей Иисуса из Нового Завета на разных языках, в основном на каталонском; а фасад Славы должен быть украшен словами из Апостольского Символа веры, в то время как его главная дверь воспроизводит всю молитву «Отче наш» на каталонском языке, окружённую множеством вариаций «Хлеб наш насущный дай нам на сей день» на других языках. Три входа символизируют три добродетели: Веру, Надежду и Любовь. Каждый из них также посвящён части жизни Христа."
 gaudi_sagrada_phase_8_decision: "Саграда-Фамилия: шпили Марии и евангелистов"
 gaudi_sagrada_phase_8_decision_desc: "Шпили евангелистов увенчаны скульптурами их традиционных символов: крылатого быка (Святой Лука), крылатого человека (Святой Матфей), орла (Святой Иоанн) и крылатого льва (Святой Марк). Навершия башен высотой 22,5 м состоят из трёх разных частей: основание состоит из четырёх рядов шестиугольников с надписями «Аллилуйя» и «Аминь», окружённых керамическими пальмами в виде елочки; в центральной части находится икосаэдр, пересечённый сферой, покрытой керамической мозаикой тренкадис и венецианским стеклом, в которой находятся источники освещения; и, в завершение, скульптуры тетраморфов, крылатых и с евангельской книгой с инициалами каждого евангелиста. Башня Марии расположена над апсидой и увенчана большой двенадцатиконечной звездой, символизирующей утреннюю звезду. Кроме того, на ней есть несколько иконографических элементов, намекающих на Деву, таких как «Аве Мария» и различные цветы как символ атрибутов матери Иисуса."
 gaudi_sagrada_phase_9_decision: "Саграда-Фамилия: фасад Славы"
 gaudi_sagrada_phase_9_decision_desc: "Самый большой и самый впечатляющий из фасадов — фасад Славы. Посвящённый Небесной Славе Иисуса, он представляет путь к Богу: Смерть, Страшный суд и Слава, в то время как ад остаётся для тех, кто отклоняется от воли Божьей. Чтобы попасть в портик Славы, большая лестница ведёт через подземный переход, построенный над улицей Каррер-де-Майорка, с украшениями, изображающими ад и порок. Он будет украшен демонами, идолами, ложными богами, ересью, расколами и т. д. Также будут изображены чистилище и смерть, последняя — с помощью гробниц вдоль земли. В портике семь больших колонн, посвящённых дарам Святого Духа. У основания колонн — изображения семи смертных грехов, а наверху — семи небесных добродетелей."
 gaudi_sagrada_phase_10_decision: "Саграда-Фамилия: шпиль Христа"
 gaudi_sagrada_phase_10_decision_desc: "Башня Иисуса соединена четырьмя мостами с башнями евангелистов и увенчана большим крестом с шестью лучами высотой 13,5 м: в его центральной части находится агнец, а также надпись «Tu solus Sanctus, Tu solus Dominus, Tu solus Altissimus» и слова «Аминь» и «Аллилуйя». Каждый из четырёх лучей креста имеет мощные лучи света, видимые на больших расстояниях, в память о библейском отрывке, определяющем Иисуса как «Я — свет миру». Внутри башня Иисуса будет разделена на три этажа, которые будут символизировать сотворение вселенной и фразу, связанную с Христом: «Я есмь путь и истина и жизнь»."
 gaudi_sagrada_support_decision: "Поддержать строительство Саграда-Фамилия"
 gaudi_sagrada_support_decision_desc: "Строительство Саграда-Фамилия на самом деле должно основываться на пожертвованиях, но наша нынешняя конституция позволяет более щедро интерпретировать эти «пожертвования», мотивируя население нашей страны также поддержать строительный проект. Это даёт нам одно дополнительное очко строительства в месяц."
 gaudi_end_sagrada_support_decision: "Прекратить поддержку строительства Саграда-Фамилия"
 gaudi_end_sagrada_support_decision_desc: "Мы всегда можем отозвать нашу поддержку строительства Саграда-Фамилия, но кто бы всерьёз этого захотел?"
 gaudi_activate_saxon_palace_decision: "Восстановить Саксонский дворец"
 gaudi_activate_saxon_palace_decision_desc: "С освобождением Варшавы начинается новая глава в истории польской нации. Заброшенный Саксонский дворец, некогда резиденция королей династии Веттинов, должен был вернуть себе своё положение, например, с мемориалом Неизвестному солдату."
 gaudi.31.t: "Кинотеатр в стиле ар-деко в городе [SCOPE.sState('gaudi_art_deco_cinema_state').GetCityHubName]"
 gaudi.31.d: "Сегодня открылся новый современный кинотеатр."
 gaudi.31.f: "Важным жанром сооружений в стиле ар-деко является кинотеатр. Период ар-деко совпал с рождением звукового кино и эпохой огромных и роскошно украшенных кинотеатров. Многие из этих кинотеатров сохранились до сих пор, хотя многие из них были разделены внутри на меньшие залы. Среди самых известных примеров — театр «Парамаунт» в Окленде, штат Калифорния, у которого был четырёхэтажный большой вестибюль, в который можно было войти через двадцать семь дверей, и который мог вместить 3746 человек."
 gaudi.31.g: "Новый фильм с Бастером Китоном уже вышел?"
 gaudi.32.t: "Небоскрёб в стиле ар-деко в городе [SCOPE.sState('gaudi_art_deco_skyscaper_state').GetCityHubName]"
 gaudi.32.d: "С его игривыми орнаментами, сказочными мозаиками и привлекательными формами новый небоскрёб в городе [SCOPE.sState('gaudi_art_deco_skyscaper_state').GetCityHubName] — это гораздо больше, чем просто высокое сооружение."
 gaudi.32.f: "Стиль ар-деко зародился в Париже, но в этом городе не разрешалось строить сооружения выше собора Нотр-Дам (за единственным исключением Эйфелевой башни). В результате Соединённые Штаты вскоре взяли на себя лидерство в строительстве высоких сооружений. Первые небоскрёбы были построены в Чикаго в 1880-х годах в стиле боз-ар или неоклассицизма. В 1920-х годах нью-йоркские архитекторы использовали новый стиль ар-деко для строительства Крайслер-билдинг и Эмпайр-стейт-билдинг. Эмпайр-стейт-билдинг был самым высоким сооружением в мире в течение сорока лет. Внутреннее и внешнее убранство небоскрёбов было классическим ар-деко с геометрическими формами и зигзагообразными узорами. Крайслер-билдинг обновил традиционные горгульи на готических соборах, установив на углах сооружения скульптуры в форме радиаторных орнаментов Chrysler."
 gaudi.32.g: "Небоскрёбы со стилем."
 gaudi.33.t: "Аэропорт в стиле ар-деко"
 gaudi.33.d: "Новый аэропорт в роскошном стиле ар-деко приветствует пассажиров со всего мира и демонстрирует иностранцам величие нашей нации сразу по прибытии."
 gaudi.33.f: "В начале нового века аэропорты были символом прогресса: покорение неба, долгое время считавшееся недостижимой мечтой человечества, внезапно стало само собой разумеющимся. Пилоты соревновались, били рекорды и пытались совершить кругосветное путешествие: в них идеал античного героя смешивался с новейшими технологиями. В то же время пассажирский перелёт был символом статуса. Изысканность и роскошь сопутствовали ему. Аэропорты в стиле ар-деко подхватили эту тему и превратили её в выразительную образность, либо через украшения, либо через гигантские размеры."
 gaudi.33.g: "Говард Хьюз гордился бы этим."
 gaudi.34.t: "Офис в стиле ар-деко"
 gaudi.34.d: "Сегодня открылось новое правительственное сооружение. Его игривый фасад провозглашает триумф стиля ар-деко."
 gaudi.34.f: "Прежде всего, стиль ар-деко ассоциировался с теми учреждениями, которые были связаны с изобилием и роскошью, такими как коммерческие сооружения, фондовые биржи, кинотеатры и театры. Однако со временем стиль распространился и на государственные учреждения. Городские ратуши, здания судов и правительственные сооружения, такие как почтовые отделения, вскоре также должны были принять этот стиль."
 gaudi.34.g: "Это уже не обычные канцелярии!"
 gaudi.50.t: "Мечта в стиле ар-деко"
 gaudi.50.d: "[ROOT.GetCountry.GetName] стал[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')] ярким примером современной и роскошной архитектуры. Этому статусу завидует нам весь мир!"
 gaudi.50.f: "'Всё служит роскоши, удовольствиям этого мира.\nО, доброе время, этот железный век!\nИзлишество, вещь весьма необходимая,\nСоединило оба полушария.'\n- Вольтер"
 gaudi.50.g: "Восторг в другом мире!"
 gaudi.60.t: "Сожжение Летнего дворца"
 gaudi.60.d: "Высокопоставленные офицеры нашей армии в Китае призывают к возмездию после того, как несколько граждан нашей страны были захвачены и убиты. Никогда больше ни один китаец не должен косо смотреть на одного из наших соотечественников!"
 gaudi.60.f: "'В одном уголке мира было чудо света; это чудо называлось Летним дворцом. У искусства есть два принципа: Идея, которая порождает европейское искусство, и Химера, которая порождает восточное искусство. Летний дворец был для химерического искусства тем же, чем Парфенон для идеального искусства. Это было своего рода грандиозное неизвестное произведение искусства, увиденное издалека в каком-то полумраке, как силуэт цивилизации Азии на горизонте цивилизации Европы.\nЭто чудо исчезло.\nОднажды два бандита вошли в Летний дворец. Один грабил, другой жёг. Победа, кажется, может быть вороватой женщиной. Разорение Летнего дворца было совершено двумя победителями, действовавшими совместно. Один из двух победителей набил свои карманы; когда другой увидел это, он набил свои сундуки. И они вернулись в Европу, рука об руку, смеясь. Такова история двух бандитов.\nМы, европейцы, — цивилизованные, а для нас китайцы — варвары. Вот что цивилизация сделала с варварством.' - Виктор Гюго"
 gaudi.60.g: "Сжечь дотла!"
 gaudi.60.h: "Только варвары могли бы до такого додуматься."
 gaudi.61.t: "Летний дворец сожжён!"
 gaudi.61.d: "В одном из самых варварских актов в мировой истории враг разграбил императорскую резиденцию династии Цин — и поджёг Летний дворец!"
 gaudi.61.g: "Мы поистине проходим через долину слёз..."
 gaudi.62.t: "Сожжение Биг-Бена"
 gaudi.62.d: "Месть сладка."
 gaudi.62.f: "'Толпа была спокойна, скорее довольна, чем наоборот; улюлюкала и свистела, когда налетал ветер, как бы подбадривая его: «Вот вспышка (то, что мы называем блеском) для Палаты лордов».—«Возмездие за Закон о бедных!»—«Вот и их акты»! Такие возгласы, казалось, преобладали. Человека, сожалеющего, я нигде не видел.' - Томас Карлайл"
 gaudi.63.t: "Вестминстерский дворец сожжён!"
 gaudi.63.d: "В одном из самых варварских актов в мировой истории враг разграбил резиденцию британского парламента — и поджёг Биг-Бен!"
 gaudi.100.t: "Спящий гигант"
 gaudi.100.d: "Идеализация Средневековья в ходе романтизма привела к тому, что всё больше людей считают завершение Кёльнского собора национальной задачей."
 gaudi.100.f: "В 1770 году Иоганн Вольфганг фон Гёте был в восторге от готического Страсбургского собора и тем самым положил начало романтически-обоснованному переоткрытию готического архитектурного стиля. Позже публицисты прославляли Кёльнский собор как произведение искусства, которое всё ещё ждёт своего завершения. Наконец, католический публицист Йозеф Гёррес изменил аргументацию, когда в 1814 году он восхвалял собор как национальное святилище и тем самым сделал его символом желаемого немецкого национального государства. В центре настойчивой кампании за завершение собора стоял Сульпиц Буассере, торговец произведениями искусства из Кёльна. Его усилия получили новый импульс, когда в 1814 и 1816 годах ему и Георгу Моллеру удалось вновь обнаружить план фасада 1370 года, который лежит в основе западного фасада собора. Между 1821 и 1831 годами Буассере опубликовал серию гравюр, изображающих завершённый собор. Эта работа значительно способствовала росту энтузиазма по поводу строительства собора по всей Германии. Романтическое преображение готики, которая в то время понималась как истинно немецкий архитектурный стиль, и стилизация собора под немецкий национальный памятник окончательно склонили прусского кронпринца Фридриха Вильгельма к проекту собора. Идея завершения собора, первоначально возникшая в Кёльне, таким образом, стала прусским и даже общегерманским делом и впервые — реалистичным вариантом."
 gaudi.100.g: "Это колоссальный проект."
 gaudi.101.t: "Начинается первый этап строительства"
 gaudi.101.d: "Сегодня на торжественной церемонии был заложен второй закладной камень Кёльнского собора."
 gaudi.101.f: "4 сентября 1842 года прусский король Фридрих Вильгельм IV и коадъютор, а позднее архиепископ Иоганн фон Гейссель заложили закладной камень для дальнейшего строительства собора. Камень был поднят на ещё недостроенную южную башню и там замурован."
 gaudi.101.g: "Начинается новый этап строительства."
 gaudi.102.t: "Первый этап строительства завершён"
 gaudi.102.d: "Мы завершили первый этап строительства Кёльнского собора."
 gaudi.102.f: "Всего через шесть лет после закладки камня для завершения собора все боковые нефы и трансепт были перекрыты сводами, а центральные нефы были подняты над трифорием. Над трифорием была установлена открытая снизу стропильная система, чтобы можно было использовать площади нефа и трансепта, несмотря на продолжающиеся работы наверху."
 gaudi.102.g: "Продолжим в том же духе."
 gaudi.103.t: "Начинается второй этап строительства"
 gaudi.103.d: "Наши строители начали возводить и украшать южный фасад собора."
 gaudi.103.f: "В Средние века строители уже завершили хор, но пренебрегли нефом и трансептом. После того как строительство продвинулось на обоих участках, можно было сосредоточиться на оформлении больших фасадов с длинных сторон, причём северный фасад был выполнен проще, чем южный."
 gaudi.104.t: "Второй этап строительства завершён"
 gaudi.104.d: "Мы завершили второй этап строительства Кёльнского собора."
 gaudi.104.f: "Южный фасад был спроектирован мастером-строителем Эрнстом Фридрихом Цвирнером, который согласовал свои планы с Карлом Фридрихом Шинкелем, Сульпицем Буассере и королём Фридрихом Вильгельмом IV. Он был построен между 1842 и 1855 годами и сегодня считается одним из самых важных и художественно совершенных произведений неоготики. На фасаде слева находится портал Урсулы, в центре — портал Страстей, а справа — портал Гереона."
 gaudi.105.t: "Начинается третий этап строительства"
 gaudi.105.d: "После нескольких споров наши инженеры начали работы на крыше собора."
 gaudi.105.f: "Несмотря на сильное сопротивление многочисленных спонсоров завершения собора, которые выступали за деревянные стропильные фермы, какие были и над завершёнными в Средние века частями собора, мастер-строитель Эрнст Фридрих Цвирнер распорядился возвести крыши и башню над средокрестием как железные конструкции. В качестве аргументов в пользу такой современной конструкции он приводил экономию средств, меньший вес и меньшую пожарную нагрузку."
 gaudi.106.t: "Третий этап строительства завершён"
 gaudi.106.d: "Мы завершили третий этап строительства Кёльнского собора."
 gaudi.106.f: "В 1863 году неф и трансепт были завершены, за исключением пространства между башнями. Временная разделительная стена, веками отделявшая завершённый хор от недостроенной части, теперь могла быть снесена, и почти весь интерьер собора впервые предстал во всём своём великолепии."
 gaudi.107.t: "Начинается четвёртый этап строительства"
 gaudi.107.d: "Сегодня был демонтирован поздне-средневековый строительный кран на южной башне Кёльнского собора, который до этого считался символом города."
 gaudi.107.f: "После завершения нефа и трансепта были наконец достроены башни. Строительная мастерская собора, в которой в то время работало более 500 человек, полагалась на самые современные строительные технологии, например, на лебёдочные тележки, которые двигались по железнодорожным путям над строительной площадкой, или на использование паровой машины."
 gaudi.108.t: "Кёльнский собор завершён"
 gaudi.108.d: "Сегодня славный день для архитектуры и немецкой культуры: после десятилетий работы завершено строительство Кёльнского собора. Воистину мы превзошли готических мастеров!"
 gaudi.108.f: "Когда собор был наконец завершён, он стал самым высоким сооружением в мире со своими двумя башнями высотой более 157 метров — хотя при его строительстве очень точно следовали средневековому плану фасада, который был составлен 600 лет назад, около 1280/90 года. Только Эйфелева башня, продукт индустриальной эпохи, должна была превзойти высоту, запланированную ещё в Средние века, после своего завершения."
 gaudi.108.g: "Там ему и место!"
 gaudi.109.t: "Кёльн потерян!"
 gaudi.109.d: "С потерей северного Рейнланда мы лишились всякой возможности продолжать строительство Кёльнского собора."
 gaudi.109.f: "Если по какой-либо причине северный Рейнланд будет потерян, прогресс строительства в целом не пропадёт. Другая нация, если у неё есть немецкая основная культура, может продолжить строительство собора с последнего этапа. Иностранные захватчики, с другой стороны, не проявят интереса к дальнейшему строительству."
 gaudi.109.g: "Мы не можем надолго оставлять им Кёльн!"
 gaudi.111.t: "Некачественный материал"
 gaudi.111.d: "Последняя поставка материала для Кёльнского собора оказалась некачественной."
 gaudi.111.f: "Первый осмотр показал, что привезённый камень имеет пористые места. Поэтому мастер-строитель без лишних слов отверг партию. Это, безусловно, задержит строительство и повлечёт за собой дополнительные расходы, но качество в конечном итоге побеждает. В то же время есть и те, кто говорит, что мы не только должны использовать этот камень по соображениям экономии времени и средств, но и сэкономить часть лучшего строительного материала, чтобы использовать вырученные средства... в другом месте."
 gaudi.111.g: "У качества есть своя цена."
 gaudi.111.h: "Как будто кто-то заметит."
 gaudi.112.t: "Некачественное строительство"
 gaudi.112.d: "Некачественный материал дал о себе знать: сегодня утром обрушилась часть Кёльнского собора, причинив значительный ущерб."
 gaudi.112.f: "Кёльнская церковь падает,\nПадает, падает,\nКёльнская церковь падает,\nМоя прекрасная леди!"
 gaudi.112.g: "Кто бы мог это предвидеть?"
 gaudi.113.t: "Ускорение темпов строительства"
 gaudi.113.d: "Работы на Кёльнском соборе продвигаются лучше, чем ожидалось. Мы рассчитываем опередить график на несколько месяцев."
 gaudi.113.f: "Современные технологии, быстрые рабочие процессы, бесперебойные поставки материалов и хорошая погода способствуют прогрессу строительства."
 gaudi.113.g: "Я это предвидел!"
 gaudi.114.t: "Несчастный случай"
 gaudi.114.d: "На строительной площадке Кёльнского собора произошёл ужасный несчастный случай. Некоторые рабочие были ранены, а некоторые даже погибли!"
 gaudi.114.f: "К сожалению, даже самые лучшие строительные нормы не могут предотвратить несчастные случаи, особенно когда некоторым материалам уже много лет."
 gaudi.114.g: "Какая трагедия!"
 gaudi.115.t: "Новые рабочие места"
 gaudi.115.d: "Строительство собора привело к большому притоку людей в Кёльн."
 gaudi.115.f: "Как и в Средние века, строительство собора породило много новых потребностей в городской жизни, которые часто могли быть удовлетворены только новыми рабочими. Нанимать нужно не только самих строителей. Они также зависят от ресторанов и магазинов, поставщиков и строительства новых квартир, которые тоже кто-то должен строить. Это привело к подъёму в Кёльне, от которого некоторые хотят получить прямую или косвенную выгоду."
 gaudi.115.g: "Великий проект нуждается в великих людях."
 gaudi.116.t: "Политическая полемика вокруг собора"
 gaudi.116.d: "Не все сочувствуют завершению строительства Кёльнского собора. Сегодня один из лидеров рабочего движения публично раскритиковал эту «расточительность»."
 gaudi.116.f: "«И я спрашиваю вас, господа, — что побуждает государство к таким чудовищным тратам, которые благоприятствуют лишь клерикализму, национализму и капитализму? Могущественные увеличивают свой престиж, богатые — свои прибыли, участвуя в строительстве, а Церковь, внушающая пролетариату суеверия и отсталость, выходит из этой реакционной политики окрепшей. Но кто, я вас спрашиваю, строит эти воздушные замки роскоши и расточительства? Правильно, простой рабочий! Простой труженик, которого унижают и калечат или убивают в строительных авариях, и единственной наградой которому является перспектива несуществующего царства небесного. Этот средневековый собор представляет собой всё, что не так в этой нации!»"
 gaudi.116.g: "А что там с прогнозом погоды?"
 gaudi.116.h: "В его словах есть смысл."
 gaudi.117.t: "Политическая поддержка собора"
 gaudi.117.d: "Сегодня патриотически настроенный представитель мелкой буржуазии произнёс страстную речь в поддержку строительства Кёльнского собора."
 gaudi.117.f: "«Господа, не слушайте возражений предателей, завистников и мелочных людей. С предстоящим завершением Кёльнского собора наша нация освободилась от прежнего упадка и следует по стопам своих предков. Когда какая-либо страна когда-либо реализовывала крупный проект? Нужно вернуться к строителям соборов Средневековья — или даже к строителям пирамид. Мы вступаем на историческую территорию. И будущие поколения, глядя на колоссальные башни, будут помнить, что мы тогда приняли правильное решение. Собор — это больше, чем церковь. Это памятник, вдохновляющее сооружение, которое будет вдохновлять многих немцев на новые свершения в грядущие десятилетия и столетия!»"
 gaudi.117.g: "Браво! Хорошо сказано!"
 gaudi.117.h: "Мы должны использовать это для дальнейшей поддержки."
 gaudi.118.t: "Национальный или религиозный проект?"
 gaudi.118.d: "В настоящее время в парламенте идёт серьёзная дискуссия о том, является ли Кёльнский собор в первую очередь национальным или религиозным сооружением."
 gaudi.118.f: "Важность собора для немцев как «единого» народа была важна с самого начала, когда начались размышления о завершении средневекового сооружения. Средневековье многие считали местом самосозерцания немецкой нации, поскольку Священная Римская империя, особенно при Салиях и Штауфенах, воспринималась как вершина Германии. Другие видели в этом размывание христианской идеи. В конце концов, собор был не просто церковью, а резиденцией одного из самых могущественных епископов Германии. Христианская история Кёльна началась в Римской империи, и вопрос о Боге и нации часто мог приводить скорее к раскольническим, чем к примирительным тенденциям."
 gaudi.118.g: "Это национальный проект."
 gaudi.118.h: "Это национальный и религиозный проект."
 gaudi.118.i: "Это религиозный проект."
 gaudi.119.t: "Лотерея на строительство собора"
 gaudi.119.d: "В этом году лотерея на строительство собора принесла такие чрезвычайные доходы, что строительство собора может продвигаться гораздо быстрее, чем ожидалось."
 gaudi.119.f: "Первоначально мастер-строитель Цвирнер оценил завершение нефа в 1,2 миллиона талеров и такую же сумму на контрфорсы. Исходя из этого, годовые затраты на строительство были рассчитаны в 100 000 талеров, половину из которых прусский король хотел покрыть из строительного фонда. Чтобы собрать оставшиеся средства на строительство, в Кёльне был основан Центральный союз по строительству собора (Zentral-Dombau-Verein), который первоначально финансировался за счёт взносов. Когда в 1863 году интерьер был завершён, прогнозы показали, что при сохранении того же финансового потока на завершение потребуется ещё 50 лет. Поэтому в 1864 году союз решил учредить соборную лотерею, которая оказалась хорошим источником денег. В целом, Домбау-Ферайн покрыл около 60 процентов всех расходов, государство участвовало лишь примерно в 32 процентах затрат на строительство собора."
 gaudi.119.g: "Джекпот!"
 gaudi.120.t: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] поддерживает собор"
 gaudi.120.d: "[SCOPE.sCharacter('gaudi_ruler').GetFullName] проявляет большой личный интерес к романтическому движению. Поэтому он сделал личное пожертвование на строительство собора."
 gaudi.120.f: "С исторической точки зрения, строительство Кёльнского собора в определённой степени было также обусловлено личной инициативой короля Фридриха Вильгельма IV, который считался богобоязненным и связанным с романтизмом. На протяжении всей своей жизни он проявлял живой интерес к искусству и архитектуре."
 gaudi.120.g: "Да здравствует наш добрый [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName]!"
 gaudi.121.t: "Экскурсия"
 gaudi.121.d: "Кёльнский собор всё ещё строится, но прогресс впечатляет. Нам следует пригласить союзника и всё ему показать."
 gaudi.121.f: "Даже будучи незавершённым сооружением, Кёльнский собор впечатлял посетителей и будоражил их воображение. Это относилось и к тому времени, когда собор снова на десятилетия превратился в строительную площадку. Роберт Шуман был вдохновлён на написание своей 3-й симфонии при виде дальнейшего строительства, а королеве Виктории показывали и рассказывали о проекте во время её визита."
 gaudi.121.g: "Пригласить нашего союзника посетить Кёльн."
 gaudi.121.h: "Это только помешает нашим усилиям."
 gaudi.122.t: "Пожертвование на Кёльнский собор?"
 gaudi.122.d: "Нашего посла пригласили на экскурсию по строительной площадке Кёльнского собора. Это была впечатляющая экскурсия, и теперь посол спрашивает, не хотим ли мы завоевать международный престиж, став донором собора."
 gaudi.122.f: "Даже будучи незавершённым сооружением, Кёльнский собор впечатлял посетителей и будоражил их воображение. Это относилось и к тому времени, когда собор снова на десятилетия превратился в строительную площадку. Роберт Шуман был вдохновлён на написание своей 3-й симфонии при виде дальнейшего строительства, а королеве Виктории показывали и рассказывали о проекте во время её визита."
 gaudi.122.g: "Этот великолепный проект должен получить нашу поддержку."
 gaudi.122.h: "В конце концов, он не так уж и велик."
 gaudi.123.t: "Пожертвование от союзника"
 gaudi.123.d: "После экскурсии посол нашего союзника был так воодушевлён, что решил выступить в качестве донора проекта."
 gaudi.123.f: "Даже будучи незавершённым сооружением, Кёльнский собор впечатлял посетителей и будоражил их воображение. Это относилось и к тому времени, когда собор снова на десятилетия превратился в строительную площадку. Роберт Шуман был вдохновлён на написание своей 3-й симфонии при виде дальнейшего строительства, а королеве Виктории показывали и рассказывали о проекте во время её визита."
 gaudi.123.g: "Настоящих друзей узнаёшь сразу."
 gaudi.124.t: "Новые машины в Кёльне"
 gaudi.124.d: "Использование самых современных машин ускоряет трудоёмкое строительство Кёльнского собора на месяцы."
 gaudi.124.f: "В частности, использование паровых машин помогло поднимать материалы на более высокие уровни собора. Но и многие другие технологические достижения помогли сделать работу намного эффективнее, чем в Средние века."
 gaudi.124.g: "Это прогресс!"
 gaudi.125.t: "Железная дорога доставляет камни к собору"
 gaudi.125.d: "Строительство железной дороги в районе Кёльна ускорило возведение собора на несколько месяцев."
 gaudi.125.f: "Классическим маршрутом доставки строительных материалов в Кёльн было речное судоходство по Рейну. В последующие годы оно оставалось предпочтительным способом доставки больших объёмов в город собора. Однако растущее железнодорожное сообщение также способствовало тому, что в чрезвычайной ситуации маршруты поставок могли меняться или люди и машины могли транспортироваться быстрее."
 gaudi.126.t: "Непогода"
 gaudi.126.d: "Шторм отбросил наши работы по строительству собора в Кёльне на несколько недель назад."
 gaudi.126.f: "Прошлой ночью на Кёльн обрушилась гроза. Ветер сорвал брезент и повалил строительные леса, повредив некоторые горгульи и фигуры."
 gaudi.126.g: "Я бы предпочёл комету."
 gaudi.127.t: "Археологические изыскания в Кёльне"
 gaudi.127.d: "После визита в Кёльн [SCOPE.sCharacter('gaudi_archaeologist').GetFullName] обнаружил, что собор, по-видимому, стоит на римских руинах. Он просит выдать лицензию на раскопки."
 gaudi.127.f: "Кёльн — один из старейших городов Германии, бывший важной колонией в Римской империи. Римское наследие продолжало преобладать в городском сознании Кёльна, как в муниципально организованной коммуне, так и в христианской отсылке к святому Петру и стилизации под дочь Рима. Доказано, что центр города стоит на римских руинах, сохранились даже некоторые улицы. Однако из-за плотной застройки никто не решался копать на месте. Раскопки возле собора значительно повлияли бы на строительные работы, но могли бы помочь нашему археологу получить ценный опыт."
 gaudi.127.g: "Мы не можем позволить себе такую длительную остановку строительства."
 gaudi.127.h: "Это уникальная археологическая возможность."
 gaudi.200.t: "Возвышение Альфреда Эшера"
 gaudi.200.d: "В 1849 году промышленник Альфред Эшер был впервые избран председателем Национального совета. Как политик, банкир, глава важной железнодорожной компании и реализатор Готтардского тоннеля, он должен был стать одной из самых влиятельных фигур в истории Швейцарии."
 gaudi.200.f: "Иоганн Генрих Альфред Эшер фом Глас, известный как Альфред Эшер, был швейцарским политиком, бизнес-лидером и железнодорожным предпринимателем. Благодаря своим многочисленным политическим должностям, а также своей учредительской и управленческой деятельности в Швейцарской северо-восточной железной дороге, Швейцарском федеральном политехническом институте, Швейцарском кредитном институте, Швейцарском фонде страхования жизни и пенсий и Готтардской железнодорожной компании, Эшер оказал влияние на политическое и экономическое развитие Швейцарии, как никто другой в XIX веке."
 gaudi.200.g: "Он хорошо послужит Швейцарии."
 gaudi.200.h: "Этот человек слишком опасен."
 gaudi.201.t: "Падение Альфреда Эшера"
 gaudi.201.d: "Строительство Готтардской железной дороги истощило силы Альфреда Эшера. Его соперники воспользовались возможностью, чтобы сначала убедить его уйти с поста президента Schweizer Kreditanstalt, а затем отказаться от председательства в Готтардской железнодорожной компании."
 gaudi.201.f: "Благодаря своим многочисленным политическим должностям и основанию Северо-Восточной железной дороги и Кредитного института, Эшер обладал необычайной властью, за что его прозвали «королём Альфредом I». Это превосходство вызвало критику. Демократическое движение требовало большего участия народа в политических вопросах. Сплочённый круг политиков вокруг Альфреда Эшера — «система Эшера» — стал заклятым врагом демократов. С ней боролись с помощью памфлетов и народных собраний, что в конечном итоге ослабило его влияние. Ещё сложнее стало из-за того, что его Северо-Восточная железная дорога в 1870-х годах всё больше погружалась в финансовый кризис."
 gaudi.201.g: "Неизбежно ли его падение?"
 gaudi.202.t: "Смерть Альфреда Эшера"
 gaudi.202.d: "Сегодня скончался Альфред Эшер, возможно, самая влиятельная фигура в Швейцарии XIX века."
 gaudi.202.f: "Помимо нападок на его личность, Эшеру приходилось бороться с проблемами со здоровьем. Он неоднократно болел на протяжении всей своей жизни и был вынужден восстанавливаться с помощью длительных курсов лечения. Его подверженность болезням плохо сочеталась с его большой рабочей нагрузкой. Во время критической фазы проекта Готтард Эшер почти довел себя до смерти. Последовали постоянные взлёты и падения здоровья: астма, лихорадка, проблемы с глазами, фурункулы. Однако это не мешало Эшеру по возможности выполнять свои политические и экономические обязательства. В конце ноября 1882 года он снова серьёзно заболел. Утром 6 декабря 1882 года Альфред Эшер скончался в своём поместье «Бельвуар»."
 gaudi.202.g: "Он ввёл Швейцарию в современную эпоху."
 gaudi.211.t: "Планирование Готтардской железной дороги"
 gaudi.211.d: "Мы начали планирование Готтардского проекта. Помимо геодезических работ и определения маршрута, это также включает поиск иностранных доноров и создание компании для обеспечения финансовой поддержки."
 gaudi.211.f: "В 1852 году глава федерального железнодорожного управления Готлиб Коллер представил первый проект строительства железнодорожной линии через Готтардский массив, а 19 августа 1853 года был организован первый Готтардский комитет, состоящий из девяти кантонов. Инженер Коллер разработал первый проект маршрута от Флюэлена до озера Ланген. В 1861 году цюрихский инженер Каспар Ветли всего за пять месяцев измерил маршрут от Эрстфельда до Лугано, что до сих пор считается шедевром геодезической техники."
 gaudi.211.g: "Титаническая задача."
 gaudi.212.t: "Планирование завершено"
 gaudi.212.d: "Планирование и подготовка к строительству Готтардской железной дороги завершены. При наличии необходимых условий мы можем дать зелёный свет на строительство."
 gaudi.212.f: "После ожесточённых споров между сторонниками Готтарда и сторонниками вариантов через Лукманир и Шплюген, идея тоннеля под Готтардом была впервые представлена в 1863 году инженерами Ветли и Коллером. Решение было принято, когда Альфред Эшер, президент цюрихской Швейцарской северо-восточной железной дороги, наконец, одобрил маршрут через Готтард. Кроме того, маршрут через Готтард был самым коротким. «Я давно убеждён, что в результате проектирования железнодорожной сети в Швейцарии и наших соседних странах железная дорога через Готтард будет гораздо более выгодна для интересов Цюриха и Северо-Восточной железной дороги, чем железная дорога через альпийский перевал в Граубюндене», — говорит Эшер."
 gaudi.212.g: "Самое трудное только начинается..."
 gaudi.213.t: "Строительство Готтардской железной дороги"
 gaudi.213.d: "Начались строительные работы на Готтардском массиве — на северной стороне возле Гёшенена и на южной стороне возле Айроло. Готтардская железнодорожная компания наняла тысячи рабочих, в основном из Италии."
 gaudi.213.f: "После чрезвычайно короткого срока подачи заявок в шесть недель было получено семь предложений на строительство Готтардского тоннеля. Контракт был присуждён женевской компании «Entreprise du Grand Tunnel du Gothard» Луи Фавра. Крупнейшим конкурентом была итальянская компания «Società Italiana di Lavori Pubblici» во главе с Северино Граттони. Граттони уже построил самый длинный в мире тоннель, железнодорожный тоннель Мон-Сени, длиной 12 километров. Он также занимался Готтардом, изучил геологию и провёл пробное бурение. Фавр, который никогда не строил тоннелей длиннее 1000 метров, предложил более низкую цену, чем его конкуренты, принял разорительные условия контракта и внёс залог в 8 миллионов швейцарских франков. Он обещал срок строительства в восемь лет — рискованное предприятие, учитывая неизвестную геологию."
 gaudi.213.g: "Фавру должно повезти, что он участвует в этой исторической работе."
 gaudi.214.t: "Готтардская железная дорога завершена!"
 gaudi.214.d: "Сегодня большой день для нашей страны: с завершением Готтардской железной дороги не только соединились Северная и Южная Европа, но и Швейцария стала перекрёстком международного железнодорожного сообщения."
 gaudi.214.f: "«В сущности, я ненавижу горы, потому что они холодные и отъедают куски неба, то есть шар света, и уменьшают горизонт. Моя любимая фантазия теперь — взорвать Готтард со всеми Альпами с другой стороны, на севере, чтобы мы могли получать итальянский воздух напрямую». - Карл Шпиттелер"
 gaudi.214.g: "Да здравствует Готтардбан!"
 gaudi.219.t: "Восточная Швейцария потеряна!"
 gaudi.219.d: "С потерей Восточной Швейцарии мы лишились всякой возможности продолжать строительство Готтардской железной дороги."
 gaudi.219.f: "Если по какой-либо причине Восточная Швейцария будет потеряна, прогресс строительства в целом не пропадёт. Другая нация может продолжить строительство тоннеля с последнего этапа."
 gaudi.219.g: "Мы не можем надолго оставлять им Восточную Швейцарию!"
 gaudi.221.t: "Кредит от Италии"
 gaudi.221.d: "Альфред Эшер встретился в Милане с рядом итальянских бизнесменов, которые хотят инвестировать в строительство Готтардской железной дороги и имеют хорошие связи с правительством."
 gaudi.221.f: "Стоимость строительства сети маршрутов будущей Готтардской железнодорожной компании до начала строительства оценивалась в 187 миллионов швейцарских франков. Большая часть средств (54,55%) должна была быть привлечена на международном рынке капитала, Италия субсидировала 24,05%, Германия и Швейцария — по 10,7%. Для привлечения 102 миллионов швейцарских франков на рынке капитала был создан финансовый консорциум под руководством немецких банков. Он состоял из немецкой, итальянской и швейцарской групп, каждая из которых должна была привлечь 34 миллиона швейцарских франков."
 gaudi.221.g: "Любая помощь приветствуется."
 gaudi.221.h: "Нам не нужна помощь иностранцев."
 gaudi.222.t: "Кредит от Германии"
 gaudi.222.d: "Альфред Эшер встретился с рядом немецких бизнесменов, которые хотят инвестировать в строительство Готтардской железной дороги и находятся в хороших отношениях с правительством."
 gaudi.222.f: "Стоимость строительства сети маршрутов будущей Готтардской железнодорожной компании до начала строительства оценивалась в 187 миллионов швейцарских франков. Большая часть средств (54,55%) должна была быть привлечена на международном рынке капитала, Италия субсидировала 24,05%, Германия и Швейцария — по 10,7%. Для привлечения 102 миллионов швейцарских франков на рынке капитала был создан финансовый консорциум под руководством немецких банков. Он состоял из немецкой, итальянской и швейцарской групп, каждая из которых должна была привлечь 34 миллиона швейцарских франков."
 gaudi.223.t: "Готтардская железнодорожная компания"
 gaudi.223.d: "С основанием Готтардской железнодорожной компании был сделан важный шаг к реализации этого амбициозного проекта."
 gaudi.223.f: "Готтардская железнодорожная компания была основана в Люцерне как акционерное общество для строительства и эксплуатации Готтардской железной дороги. Политические решения и переговоры по финансированию Готтардской железной дороги в преддверии основания Готтардской железнодорожной компании и её управление в первые дни строительства в основном определялись бывшим председателем правительственного совета кантона Цюрих и впоследствии трёхкратным председателем Национального совета, доктором Альфредом Эшером. После того как финансирование Готтардского проекта было обеспечено почти исключительно за счёт государственных субсидий от Швейцарии, её кантонов и с 1869 года от Италии, Северогерманского союза и его правопреемника с 1871 года Германской империи, из Готтардского союза была основана Готтардская железнодорожная компания, которая передала свои права Готтардской железнодорожной компании. Альфред Эшер стал её президентом, а Йозеф Цингг — вице-президентом. Затем компания приступила к фактическому строительству Готтардской железной дороги."
 gaudi.231.t: "Проникновение воды в тоннель"
 gaudi.231.d: "Проникновение воды в Готтардский тоннель угрожает ходу строительства и жизни рабочих."
 gaudi.231.f: "Различные слои породы в Готтардском массиве неоднократно вызывали проблемы. Иногда песчаные основания чередовались с непроницаемой породой, а в редких, но тем более опасных случаях в тоннель проникала вода или каменистая пульпа, что становилось смертельным для некоторых рабочих."
 gaudi.231.g: "Сделайте всё необходимое для герметизации участка, безопасность превыше всего."
 gaudi.231.h: "Заплатите рабочим сверхурочные, чтобы устранить прорыв, но будьте осторожны."
 gaudi.231.i: "Заделайте дыру любой ценой и продолжайте работать — невзирая на потери!"
 gaudi.232.t: "Испытание виадука на прочность"
 gaudi.232.d: "Руководство строительства не уверено, действительно ли необходимо такое количество испытаний на прочность, которые мы проводим на многочисленных виадуках, так как они требуют материалов и времени."
 gaudi.232.f: "Учитывая сжатые сроки завершения Готтардской железной дороги, не всем проектам можно уделить одинаковое внимание. Например, некоторые инженеры считают излишними многократные испытания на прочность одного из наших виадуков — конструкция достаточно прочна. Однако некоторые из наших консультантов настаивают на том, чтобы не прекращать испытания преждевременно, так как повреждения могут отбросить нашу работу на месяцы назад и запятнать нашу репутацию."
 gaudi.232.g: "Мы должны провести дополнительное испытание."
 gaudi.232.h: "У меня нет опасений, что этот виадук будет неустойчивым."
 gaudi.233.t: "Виадук обрушился!"
 gaudi.233.d: "Сегодня обрушился один из наших виадуков. По-видимому, он был не таким безопасным, как мы думали."
 gaudi.233.f: "Как вы смеете так портить репутацию швейцарской точности и основательности?"
 gaudi.233.g: "Я сразу сказал, что мы должны были провести испытание на прочность!"
 gaudi.234.t: "Больше перерывов в работе"
 gaudi.234.d: "Рабочие Готтардского тоннеля считают свои смены слишком длинными, а перерывы — слишком короткими."
 gaudi.234.f: "Помимо рискованной работы в Готтардском тоннеле, проблемы вызывала очень плохая циркуляция воздуха. Внутренности земли также нагревались до более чем 33 градусов (а в редких случаях — до 40) внутри тоннеля. Тем не менее, рабочим приходилось выполнять свою тяжёлую и потную работу более 8 часов в день."
 gaudi.234.g: "Перерыв? Ба! Эти ленивые итальянцы даже не знают, что такое работа!"
 gaudi.234.h: "Небольшой перерыв, не более того."
 gaudi.234.i: "Дайте им премию вместо перерыва."
 gaudi.234.j: "Они заслуживают регулярных перерывов."
 gaudi.235.t: "Головокружение под землёй"
 gaudi.235.d: "Качество воздуха в Готтардском тоннеле настолько ухудшилось, что некоторые рабочие падали в обморок от головокружения."
 gaudi.235.f: "Качество воздуха в Готтарде достигло тревожно низкого уровня. Частично в этом виновата пыль, поднимаемая кирками и машинами; однако остальное довершает динамит. Слишком часто рабочих отправляют обратно в тоннель до того, как дым от взрывов рассеется. Один из наших надзирателей хотел поторопить ленивую толпу вернуться к работе, но по пути в тоннель у него возникла неприятная сердечно-сосудистая проблема."
 gaudi.235.g: "Это прискорбно. А теперь продолжайте работать!"
 gaudi.235.h: "Дайте рабочим больший стимул рисковать своими жизнями..."
 gaudi.235.i: "Введите более короткие смены."
 gaudi.236.t: "Грабительские цены"
 gaudi.236.d: "Наша ценовая политика на еду, одежду и другие предметы первой необходимости была подвергнута резкой критике со стороны рабочих Готтардского тоннеля."
 gaudi.236.f: "В Гёшенене работало максимум 1645 рабочих, а в Айроло — 1302, в основном итальянцы из бедных сельских районов Пьемонта и Ломбардии. Шахтёры и рабочие жили в грязных и переполненных бараках и подвергались финансовой эксплуатации. Шахтёр зарабатывал около 3,90 франка за восьмичасовую смену. Две трети этой зарплаты вычитались за еду и жильё, лампы и масло для них — 30 сантимов в день — им приходилось оплачивать самим. Также у них вычитали пять франков в месяц за одежду и два франка за вид на жительство в Швейцарии. Часть заработка выплачивалась купонами, которые можно было отоварить только в магазинах компании."
 gaudi.236.g: "Никто не обязан работать на этом проекте. Каждый волен уйти!"
 gaudi.236.h: "Мы их эксплуатируем и платим им их же деньгами, чтобы заставить работать сверхурочно — великолепная идея!"
 gaudi.236.i: "Запретить эту неэтичную практику!"
 gaudi.237.t: "Грязные бараки"
 gaudi.237.d: "Нищета в рабочих бараках у Готтардского тоннеля достигла таких масштабов, что руководители строительства железной дороги очень обеспокоены тем, что может начаться восстание."
 gaudi.237.f: "«Я нашёл ситуацию в Гёшенене мало изменившейся; квартиры Фавра удовлетворительны, но в крайне недостаточной степени, частные квартиры граждан отчасти хороши, отчасти сносны, отчасти плохи; рабочие бараки, построенные на спекуляцию и сдаваемые в аренду, так же скандальны, как и прежде, особенно в большом доме рядом с почтой, где проживает 240 человек; там по внешним стенам стекали нечистоты, и они лежали кучами в коридорах и по углам; комнаты и их мебель покрыты грязью, окна плотно закрыты, воздух отвратителен, на самом деле хуже, чем в большинстве свинарников, у которых есть ворота и вентиляционные отверстия. Водопровод был исправно построен, но так, что он замёрз и порвался, не доставлял ничего всю зиму и до сих пор не работает, хотя серьёзных морозов не было уже несколько недель». "
 gaudi.237.g: "Каждому своё."
 gaudi.237.h: "Если им так не нравится в их домах — пусть больше работают."
 gaudi.237.i: "Эти возмутительные условия должны быть немедленно устранены в такой цивилизованной стране, как наша!"
 gaudi.238.t: "Погребены заживо"
 gaudi.238.d: "В Готтардском тоннеле произошёл серьёзный несчастный случай. Несколько рабочих оказались под завалами. Их шансы на выживание неизвестны."
 gaudi.238.f: "Во время строительных работ на Готтардском тоннеле погибло 199 рабочих. Из 171 погибшего, упомянутого в списке несчастных случаев в Федеральном архиве, 53 рабочих были раздавлены вагонами или локомотивами, 49 — убиты камнями, а 46 — погибли от динамита. 23 погибли по другим причинам, один из них утонул. Согласно официальным заявлениям, виновником был либо случай, либо сам пострадавший. Множество других людей умерли в последующие годы в результате недоедания, болезней и травм, полученных при строительстве тоннеля."
 gaudi.238.g: "К сожалению, таков риск на этой работе. Продолжайте копать!"
 gaudi.238.h: "Мы ничего не можем для них сделать. Внедрите лучшие правила на будущее."
 gaudi.238.i: "Сделайте всё возможное, чтобы спасти эти бедные души!"
 gaudi.239.t: "Новые машины в тоннеле"
 gaudi.239.d: "Внедрение новых технологий значительно ускорило наш прогресс в строительстве Готтардского тоннеля."
 gaudi.239.f: "Подрядчик Луи Фавр позаимствовал первые буровые машины типа Соммейе из тоннеля Мон-Сени. Для этого он испытал на месте самые важные из имеющихся перфораторов. Два начальника мастерских в Айроло и Гёшенене доработали существующие машины: машины должны были быть менее подвержены ремонту, а перфораторы должны были быть оснащены автоматическим приводом. Сеген и Ферру, два начальника мастерских, смогли добиться значительного прогресса: вначале каждый день приходилось заменять три машины, к концу строительства — только одну машину каждые три дня. В то же время отработанный воздух от пневматических перфораторов служил для экономной вентиляции тоннеля. Шесть буровых машин были установлены на тележках. Машины бурили отверстия глубиной около метра, которые затем заполнялись динамитом и взрывались."
 gaudi.239.g: "Да здравствует прогресс!"
 gaudi.240.t: "Профсоюзы критикуют Готтардский проект"
 gaudi.240.d: "Сегодня в парламенте один из лидеров профсоюзов посетовал на ужасающие условия, в которых строится Готтардский тоннель."
 gaudi.240.f: "«Вода льётся каждый день, работа в жаре, как в доменной печи, жалкое жильё, непомерные цены и дешёвая зарплата менее 4 франков в день! В нашей стране есть множество собак, которые живут лучше, чем сотни рабочих, рискующих своими жизнями ради прибыли железнодорожной компании; прежде чем их разнесёт в клочья заряд динамита в неудачный день. Я думал, прошли те времена, когда землевладелец мог помыкать своими крестьянами, как скотом? То, что происходит в Гёшенене и Айроло, кажется гораздо хуже! Если что-то срочно не изменится, то я обещаю вам, что ситуация обострится!»"
 gaudi.240.g: "Неужели этот человек не понимает важности нашего проекта?"
 gaudi.240.h: "Некоторые реформы, возможно, действительно необходимы."
 gaudi.241.t: "Эшер жертвует деньги"
 gaudi.241.d: "Альфред Эшер, для которого строительство Готтардской железной дороги является личным делом, сегодня использовал свой капитал для продвижения строительства линии."
 gaudi.241.f: "Эшер не только сопровождал Готтардский проект от его зарождения до завершения; он также лично пожертвовал собой ради него. Речь шла не только о финансовой части. Его обвиняли в том, что он буквально довел себя до смерти ради Готтардской железной дороги."
 gaudi.241.g: "Спасибо, господин Эшер."
 gaudi.242.t: "Пористая порода"
 gaudi.242.d: "Удивительно мягкий камень позволил работам на Готтардском тоннеле продвигаться лучше, чем ожидалось."
 gaudi.242.f: "Помимо множества непредвиденных обстоятельств при строительстве Готтардского тоннеля, которые часто имели довольно неприятные последствия, всегда были и приятные сюрпризы."
 gaudi.242.g: "Отлично!"
 gaudi.243.t: "Непробиваемая порода"
 gaudi.243.d: "Удивительно твёрдая порода привела к тому, что работы на Готтардском тоннеле продвигаются хуже, чем ожидалось."
 gaudi.243.f: "Руководство стройки неоднократно сталкивалось с проблемами из-за меняющейся породы. Когда строительство началось, инженеры были практически не готовы к мозаике в Готтардском массиве. Лишь со временем удалось избежать этих неприятных сюрпризов. Главный инженер Роберт Гервиг поручил немецкому горному инженеру Фридриху Морицу Штапффу провести все необходимые геологические изыскания. Сначала он был назначен на строительный участок в Айроло, а позже стал руководителем геологического и горного отдела в центральном управлении строительства в Айроло. В задачи Штапффа входило обновление существующих геологических карт, наблюдение за геологическими условиями, такими как температурный режим, приток воды и состояние породы, чтобы строительство не задерживалось. Штапфф регистрировал все горные породы вдоль оси тоннеля и собирал образцы каждой из них."
 gaudi.243.g: "Хорошие вещи требуют времени."
 gaudi.243.h: "Рабочие должны работать сверхурочно!"
 gaudi.243.i: "Привлеките экспертов из университета, чтобы найти долгосрочное решение."
 gaudi.244.t: "Magnificent explosions"
 gaudi.244.d: "Одна из наших национальных фабрик по производству динамита стала постоянным поставщиком для строительства Готтардского тоннеля. От этого выигрывают и проект, и компания."
 gaudi.244.f: "В ходе строительных работ потребность во взрывчатых веществах стала настолько велика, что для тоннеля на берегу Люцернского озера была создана отдельная фабрика взрывчатых веществ."
 gaudi.244.g: "Но ведь на безопасность всё проверено, не так ли?"
 gaudi.245.t: "Приток рабочих"
 gaudi.245.d: "Всё больше и больше людей стекаются в восточную Швейцарию в поисках работы на строительстве Готтардской железной дороги."
 gaudi.245.f: "Строительство Готтардской железной дороги привлекло на работу более 5000 человек в течение почти десятилетия."
 gaudi.245.g: "Дайте каждому по лопате, нам нужна каждая пара рук."
 gaudi.245.h: "Они должны осесть на более длительный срок."
 gaudi.246.t: "Новый иностранный инвестор"
 gaudi.246.d: "Альфред Эшер смог привлечь ещё одного богатого иностранного инвестора, который может привлечь свежий капитал для Готтардского проекта."
 gaudi.246.f: "На протяжении многих лет Эшер мог снова и снова использовать свои контакты в финансовых чрезвычайных ситуациях, чтобы финансировать заведомо дорогостоящее строительство Готтардского тоннеля — что было крайне необходимо."
 gaudi.246.g: "Мы жаждем, как странник в пустыне!"
 gaudi.246.h: "Нет, спасибо."
 gaudi.247.t: "ЗАБАСТОВКА!"
 gaudi.247.d: "Плохие, очень плохие новости! Рабочие на Готтардской линии прекратили работу и требуют повышения зарплаты, улучшения жилья, питания и одежды, прежде чем снова возьмутся за лопаты!"
 gaudi.247.f: "Во время строительства Готтардского тоннеля население Гёшенена увеличилось в несколько раз. Строители жили в ужасных условиях. Итальянские рабочие тоннеля объявили забастовку, требуя повышения заработной платы и вызвав беспорядки в деревне. Поводом послужил спор между начальником почты и шахтёрами, которые отказались продолжать бурение, пока не рассеется дым от взрывов. Затем разразилась словесная перепалка, пока шахтёры в ярости не покинули рабочее место. По пути распространился слух, что горит ящик с динамитом. Это заставило и остальную часть бригады тоннеля выбежать наружу. Рабочие двинулись в деревню, где остановились перед почтовым отделением, где жили мэр и почтальон, и выплеснули свой гнев. Здесь Луиджи Диссуне под аплодисменты изложил требования рабочих: повышение заработной платы на один франк в день, работающая вентиляция и лучшие правила безопасности. Угроза, что больше ни один шахтёр не войдёт в тоннель, пока это не будет полностью выполнено, была подкреплена тем, что они заняли пост перед порталом тоннеля, чтобы не пускать шахтёров в тоннель во время смены в 10 часов вечера."
 gaudi.247.g: "Вызвать ополчение."
 gaudi.247.h: "Мы уступаем их требованиям."
 gaudi.248.t: "Печальный день для Швейцарии"
 gaudi.248.d: "Во время рабочего восстания наши силы безопасности вмешались довольно жестоко. Несколько рабочих были убиты. Из-за этого мы потеряли международную репутацию."
 gaudi.248.f: "Неизвестно, почему и кем был сделан первый выстрел. Приказа стрелять не было. Точный ход стрельбы также неясен. После этого демонстранты разошлись. Четверо из них погибли, несколько получили ранения. В зависимости от источника, двое или трое погибли на месте, ещё один скончался от ран на следующий день, а согласно отчёту о расследовании, четвёртый — через несколько дней. Событие стало известно по всей Европе благодаря обвинительным сообщениям в прессе, в том числе за пределами Швейцарии. В частности, подвергалась сомнению история формирования задействованных полицейских подразделений."
 gaudi.248.g: "Они первые начали!"
 gaudi.249.t: "Сбойка!"
 gaudi.249.d: "После многих лет чрезвычайно трудных усилий строительные бригады встретились с минимальным смещением в середине Готтардского массива."
 gaudi.249.f: "Через семь лет и пять месяцев строительные бригады, пробивавшие горный массив с севера и юга, встретились. Отклонения составили всего 33 сантиметра вбок и 5 сантиметров по высоте — шедевр инженерной и геодезической техники того времени. Это событие было отмечено в европейских СМИ, и был построен самый длинный на тот момент тоннель в мире длиной 15 километров. «Можно сказать сегодня, что вся пресса на континенте отдаёт дань уважения Готтардскому делу и выражает искреннее признание», — писал тогда цюрихский «Ландботе»."
 gaudi.249.g: "Шампанского!"
 gaudi.301.t: "Началось строительство статуи Христа-Искупителя"
 gaudi.301.d: "С возведением первых лесов и железных конструкций на Корковаду строители приступили к работе над статуей Христа."
 gaudi.301.f: "Христос-Искупитель — самая большая статуя в мире, построенная в стиле ар-деко. Лицо статуи было создано скульптором Георге Леонидой, родившимся в Галаце, Румыния, в 1893 году. Он изучал скульптуру в Бухарестской консерватории изящных искусств, а затем, после ещё трёх лет обучения в Италии, выиграл премию Reveil Sculpture Prize. Прославившись во Франции как портретист, он был принят Полем Ландовски в команду, которая начала работу над Христом-Искупителем в 1922 году. Георге Леонида внёс свой вклад, изобразив лицо Иисуса Христа на статуе, что сделало его знаменитым. Группа инженеров и техников изучила предложения Ландовски и приняла решение построить конструкцию из железобетона (спроектированного Альбером Како) вместо стали, что было бы более подходящим для крестообразной статуи. Внешние слои сделаны из мыльного камня, выбранного за его долговечность и простоту в использовании. Строительство заняло девять лет и стоило эквивалент 250 000 долларов США (или 3,3 миллиона долларов США в ценах 2014 года)."
 gaudi.301.g: "Важный шаг для нашей нации."
 gaudi.302.t: "Христос на горе Корковаду"
 gaudi.302.d: "После многих лет строительных работ сегодня была завершена статуя Христа — жемчужина архитектуры ар-деко и один из новых символов Бразилии!"
 gaudi.302.f: "Во время церемонии открытия статуя была освещена серией прожекторов, дистанционно включённых пионером коротковолнового радио Гульельмо Маркони, который находился в 9200 километрах в Риме, Италия, но из-за плохой погоды огни были включены на месте. На открытии также была отслужена месса. С 1931 по 1981 год Христос-Искупитель был самой высокой статуей Христа в мире."
 gaudi.302.g: "Да защитит он страну и город."
 gaudi.309.t: "Рио потерян"
 gaudi.309.d: "С потерей Рио-де-Жанейро мы лишились всякой возможности продолжать строительство статуи Христа-Искупителя."
 gaudi.309.f: "Если мы потеряем Рио-де-Жанейро, нам придётся начинать строительство заново, чтобы его вернуть. Только страна с бразильской культурой может завершить статую Христа-Искупителя."
 gaudi.309.g: "Мы не можем надолго оставлять им Рио-де-Жанейро!"
 gaudi.311.t: "Хороший прогресс"
 gaudi.311.d: "Работы над статуей Христа-Искупителя продвигаются лучше, чем ожидалось. Мы рассчитываем опередить график на несколько месяцев."
 gaudi.311.f: "Современные технологии, быстрые рабочие процессы, бесперебойные поставки материалов и хорошая погода способствуют прогрессу строительства."
 gaudi.311.g: "Новости, которые скрашивают день."
 gaudi.312.t: "Пожертвование на статую Христа-Искупителя"
 gaudi.312.d: "Как добрый христианин, [SCOPE.sCharacter('gaudi_cristo_donator').GetFullName] проявляет большой личный интерес к статуе Христа-Искупителя. Поэтому он сделал личное пожертвование на строительство статуи."
 gaudi.312.f: "Возведение статуи Христа было предложением, которое циркулировало десятилетиями, прежде чем оно было реализовано, и вызывало большой интерес, особенно в набожных католических кругах. Многочисленные доноры поддержали проект, когда за него наконец взялись."
 gaudi.312.g: "Мы у него в долгу."
 gaudi.313.t: "Духовенство приветствует наш строительный проект"
 gaudi.313.d: "Духовенство Бразилии готово сделать всё возможное, чтобы завершить статую Христа-Искупителя в Рио-де-Жанейро. Критически настроенные по отношению к церкви силы опасаются, что наше правительство окажется под слишком большим влиянием церкви."
 gaudi.313.f: "Проблемы с финансированием задерживали строительство Христа-Искупителя почти на десять лет, прежде чем открытие наконец смогло состояться при поддержке архиепархии Рио-де-Жанейро, Святого Престола и Франции."
 gaudi.313.g: "Мы должны извлечь из этого выгоду."
 gaudi.313.h: "Публично восхвалять Церковь."
 gaudi.313.i: "Это дело не касается церкви!"
 gaudi.314.t: "Профсоюзы критикуют строительство статуи Христа-Искупителя"
 gaudi.314.d: "Как представитель профсоюзов, [SCOPE.sCharacter('trade_unions_leader').GetFullName] сегодня направил петицию правительству с требованием пересмотреть спорную поддержку строительства статуи Христа-Искупителя."
 gaudi.314.f: "Лидеры профсоюзов в Бразилии считают нынешнее строительство Христа-Искупителя чудовищной тратой денег. Если они не могут предотвратить строительство, чтобы направить средства на значимые благотворительные цели, они по крайней мере требуют лучшего обращения и заботы о строителях, которые работают на опасной высоте и должны таскать тонны материалов на гору."
 gaudi.314.g: "Игнорировать их."
 gaudi.314.h: "Отделаться пустыми обещаниями."
 gaudi.314.i: "Потратить деньги на улучшение положения рабочих."
 gaudi.315.t: "Проблемы с транспортировкой"
 gaudi.315.d: "Гора Корковаду, безусловно, идеальное место для строительства достопримечательности, видимой за много миль. Однако с точки зрения логистики у неё есть свои недостатки."
 gaudi.315.f: "Корковаду, что в переводе с португальского означает «горб», — это гора высотой 710 метров в столичном регионе Рио-де-Жанейро с почти вертикальным обрывом с одной стороны. Хотя в конце XIX века гору открыла железнодорожная линия, транспортировка более крупных компонентов, в частности, оказалась сложнее, чем предполагалось изначально, особенно из-за извилистой и узкой тропы на вершину горы."
 gaudi.315.g: "Я слышу одни только жалобы!"
 gaudi.316.t: "Несчастный случай"
 gaudi.316.d: "Сегодня на строительной площадке статуи Христа-Искупителя произошёл несчастный случай, который отбросил строительные работы на несколько недель назад."
 gaudi.316.f: "Несмотря на большую высоту, строительство статуи Христа было менее опасным, чем строительство многих небоскрёбов. Однако несчастные случаи нельзя было исключить. Даже руководитель стройки Эйтор Леви чуть не упал с лесов в пропасть. Леви был спасён строителями в последний момент и приписал это чудо вмешательству самого Иисуса Христа. Из-за этого предсмертного опыта урождённый еврей позже обратился в католичество."
 gaudi.316.g: "Предзнаменование?"
 gaudi.317.t: "Гроза"
 gaudi.317.d: "Во время грозы молния ударила в статую Христа-Искупителя, разрушив её части."
 gaudi.317.f: "Грозы были постоянной проблемой во время строительства и даже после завершения статуи. Удары молнии неоднократно разрушали части мыльного камня, а также уничтожили некоторые более крупные части, такие как пальцы."
 gaudi.317.g: "Несчастный случай."
 gaudi.317.h: "Устранить повреждения."
 gaudi.317.i: "Нам нужно больше громоотводов."
 gaudi.317.j: "Устранить повреждения и установить новые громоотводы."
 gaudi.318.t: "Похвала"
 gaudi.318.d: "Член парламента из [SCOPE.sCountry('gaudi_cristo_neighbour').GetAltNameNoFlag('RU_CL_RP')] посетил сегодня Рио-де-Жанейро и выразил свой восторг по поводу статуи Христа-Искупителя, которая обретает форму с каждым днём."
 gaudi.318.f: "Статуя Христа уже стала национальным символом Бразилии и затмевает всю Латинскую Америку."
 gaudi.318.g: "Спасибо."
 gaudi.318.h: "Пусть он соберёт в своей стране поддержку для нашего проекта."
 gaudi.319.t: "Вмешательство атеистов"
 gaudi.319.d: "В сегодняшней публичной речи [SCOPE.sCharacter('gaudi_cristo_atheist').GetFullName] раскритиковал строительство статуи Христа как возвращение в Средневековье и призвал единомышленников осудить эту трату денег."
 gaudi.319.f: "«Если Бог хотел статую себя, почему он так и не сказал? И если она ему нужна, почему не построит её сам? Бразилия — современная страна, которой не нужны ни боги, ни короли, только человек. Разве человек не имеет права на плоды своего труда? Я не верю ни в какого Бога, ни в какого невидимого человека на небе. Зачем поклоняться флагу или Богу, когда мы можем поклоняться лучшему в нас: нашей воле к величию?»"
 gaudi.319.g: "Нам не следует слишком сильно бросать вызов этой группе."
 gaudi.319.h: "DEUS VULT!"
 gaudi.319.i: "Ар-деко и тому подобное. У меня ОЧЕНЬ плохое предчувствие насчёт этого парня."
 gaudi.320.t: "Инвестиции в туризм"
 gaudi.320.d: "Туристическая индустрия рассматривает статую Христа как положительный фактор и хотела бы поддержать проект."
 gaudi.320.f: "Строительство Христа-Искупителя совпало со временем, когда Рио-де-Жанейро становился модным туристическим направлением благодаря развитию авиасообщения, своему песчаному пляжу и оживлённой культурной жизни. Современная статуя на Корковаду, таким образом, стала также символом развивающейся туристической индустрии и желанным дополнением в качестве новой достопримечательности."
 gaudi.320.g: "Пляж, солнце, отели и Христос-Искупитель!"
 gaudi.401.t: "Строительство Моле-Антонеллиана возобновлено"
 gaudi.401.d: "После того как город Турин завершил последние переговоры с еврейской общиной, сегодня возобновились строительные работы."
 gaudi.401.f: "Изначально еврейская община Турина хотела основать роскошную резиденцию в бывшей столице Королевства Сардиния-Пьемонт. Новая синагога должна была продемонстрировать присутствие, продвижение и интеграцию еврейских граждан города. На эту работу был назначен архитектор Алессандро Антонелли. Однако Антонелли был также известен своими монументальными сооружениями, размеры которых он постоянно увеличивал. Например, в пьемонтском городе Кастелламонте Антонелли спроектировал собор, который мог бы соперничать с собором Святого Петра в Риме; но гигантский проект остался незавершённым из-за отсутствия финансирования. Подобная участь теперь угрожала и еврейской общине с её новой синагогой, которая росла ввысь с каждым днём, но грозила стать финансовой катастрофой для общины. Городские власти Турина выкупили сооружение и компенсировали евреям новую землю и новую синагогу, которая была построена за несколько лет. Вместо этого «Моле» должна была стать национальным символом Италии."
 gaudi.401.g: "Надеюсь, Антонелли больше не будет менять свои планы..."
 gaudi.402.t: "Моле-Антонеллиана: первый этап завершён"
 gaudi.402.d: "Основные конструкции Моле-Антонеллиана завершены. Однако, что касается крыши и шпиля, у Антонелли появились новые эксцентричные идеи..."
 gaudi.402.f: "Изначально Моле-Антонеллиана должна была иметь обычный купол. Однако Антонелли строил его всё более объёмным и высоким, пока не получилась характерная форма, с которой она ассоциируется сегодня. Это также означало, что завершение строительства наверху займёт дополнительное время."
 gaudi.402.g: "Этот человек никогда не бывает доволен?"
 gaudi.403.t: "К небу с Антонелли"
 gaudi.403.d: "Начался заключительный этап строительства Моле-Антонеллиана."
 gaudi.403.f: "Согласно своему первоначальному проекту, Антонелли решил завершить Моле почти остроконечным навершием с колоннадами, сочетающими неоготику и неоклассицизм, тем самым подражая другой своей предыдущей работе — навершию базилики Сан-Гауденцио, символу Новары. С высоты 90 метров он поэтому отошёл от архитектурной темы с квадратным основанием, спроектировав гранитную колоннаду с круглым основанием, названную «Фонарь», установленную на усечённом коническом основании. Также архитектор задумал проект шпиля высотой около 50 метров над Фонарём, с восьмиугольным сечением и десятью круглыми террасами, первые две из которых всё ещё оснащены колоннадой, а затем вверх постепенно всё меньше и меньше, и доступные по маленькой зигзагообразной лестнице."
 gaudi.403.g: "А я надеялся, что это всего лишь последние штрихи и украшения..."
 gaudi.404.t: "Моле-Антонеллиана завершена"
 gaudi.404.d: "Сегодня строительные работы были торжественно завершены установкой гения. Турин и Италия стали богаче на одну достопримечательность!"
 gaudi.404.f: "Антонелли с самоотдачей работал над Моле до самой своей смерти; легендарным стал рудиментарный лифт, управляемый шкивом, который поднимал почти девяностолетнего архитектора на высоту в несколько десятков метров, чтобы лично проверить состояние работ. Через несколько месяцев после его смерти архитектор предложил завершить шпиль статуей, изображающей «Крылатого гения». Проект статуи был заказан скульптору Фумагалли; Гений, сделанный из чеканной и позолоченной меди, весил около 300 кг, и держал в одной руке копьё, а в другой — пальмовую ветвь. На голове статуи была небольшая пятиконечная звезда, поддерживаемая шестом. Когда 10 апреля 1889 года звезда была установлена на своё место, общая высота Моле достигла 167,35 метра, что сделало её самым высоким кирпичным сооружением в Европе и мире того времени. Моле, самое высокое кирпичное сооружение в мире, вступила в прямое «соревнование» с Эйфелевой башней в Париже, открытой всего 10 днями ранее, которая должна была оставаться самым высоким сооружением в мире до 1930 года."
 gaudi.404.g: "Viva Torino, viva l'Italia!"
 gaudi.409.t: "Турин потерян!"
 gaudi.409.d: "С потерей Пьемонта мы лишились всякой возможности продолжать строительство Моле-Антонеллиана."
 gaudi.409.f: "Если по какой-либо причине Пьемонт будет потерян, прогресс строительства в целом не пропадёт. Только Италия может продолжить строительство Моле-Антонеллиана с последнего этапа. Иностранные захватчики, с другой стороны, не проявят интереса к дальнейшему строительству."
 gaudi.409.g: "Мы не можем надолго оставлять им Турин!"
 gaudi.411.t: "Плохие кирпичи"
 gaudi.411.d: "Последняя поставка материала для Моле-Антонеллиана оказалась некачественной."
 gaudi.411.f: "На мгновение обычная деятельность на туринской стройке, где Моле-Антонеллиана росла с каждым днём, замерла. Краткая инвентаризация, проведённая Антонелли, показала, что кирпичи не соответствуют обычному качеству, и он объявил, что предпочёл бы подождать, прежде чем его шедевр может быть поставлен под угрозу из-за этих кирпичей. Однако в руководстве строительства есть голоса, что кирпичи всё равно следует использовать — не только потому, что строительство может задержаться, но и потому, что есть опасения, что Антонелли может использовать это время, чтобы снова изменить план..."
 gaudi.412.t: "Катастрофа!"
 gaudi.412.d: "Некачественный материал дал о себе знать: сегодня утром обрушилась часть Моле-Антонеллиана, причинив значительный ущерб."
 gaudi.412.f: "Возможно, стоило прислушаться к Антонелли. Возможно, это действительно была плохая идея использовать крошащиеся кирпичи для такого важного памятника, как Моле-Антонеллиана. Возможно, следовало дважды подумать над этим решением. Но слишком поздно — некачественный материал сегодня дал о себе знать, что привело к обрушению стены и уничтожило значительную часть прогресса строительства за последние недели и месяцы, когда обрушился фасад."
 gaudi.413.t: "Археологические изыскания в Турине"
 gaudi.413.d: "После визита в Турин [SCOPE.sCharacter('gaudi_archaeologist').GetFullName] обнаружил, что Моле-Антонеллиана, по-видимому, стоит на римских руинах. Он просит выдать лицензию на раскопки."
 gaudi.413.f: "В первом веке до нашей эры римляне основали Августу Тавринорум. Виа Гарибальди точно повторяет путь декумануса римского города, который начинался у Порта Декумана, позже включённой в Кастелло или Палаццо Мадама. Палатинские ворота на северной стороне нынешнего центра города до сих пор сохранились в парке возле собора. Остатки театра римского периода сохранились в районе Маника Нуова."
 gaudi.414.t: "Новая машина"
 gaudi.414.d: "Автомобильная промышленность нашей страны недавно оснастила строительную площадку Моле-Антонеллиана сверхсовременной машиной, которая продвигает работы вперёд."
 gaudi.414.f: "Моле-Антонеллиана наиболее известна тем, что является одним из крупнейших кирпичных сооружений своего времени, во многом следуя традиционным, а не прогрессивным архитектурным теориям. Но даже если в сооружении не использовались стальные конструкции или цемент, это не исключало использования другой техники. Турин, наряду с Миланом и Генуей, был одним из крупнейших промышленных центров Италии, что позволяло доставлять машины, облегчающие труд, если мастер Антонелли их заказывал."
 gaudi.415.t: "Пожертвование от граждан"
 gaudi.415.d: "Представители патриотически настроенной мелкой буржуазии, которых возглавляет [SCOPE.sCharacter('pb_leader').GetPrimaryRoleTitle] [SCOPE.sCharacter('pb_leader').GetFullName], сделали пожертвование на строительство Моле-Антонеллиана."
 gaudi.415.f: "С тех пор как она перешла в ведение муниципальных властей, Моле-Антонеллиана стала не просто символом перспективного промышленного центра Турина. Стремящееся к небу величие было не только символом современности, но и национального духа Италии. Для патриотически настроенной буржуазии сооружение было символом идентификации нового государства. По завершении строительства в сооружении должен был разместиться Музей Рисорджименто. Поэтому национально настроенные итальянцы были очень заинтересованы в скорейшем завершении."
 gaudi.415.g: "Мы им обязаны благодарностью."
 gaudi.416.t: "У Антонелли только что появилась ещё одна идея..."
 gaudi.416.d: "Алессандро Антонелли, строитель названного в его честь памятника, недавно удивил руководство строительства изменением..."
 gaudi.416.f: "Было бы преуменьшением считать Алессандро Антонелли просто эксцентричным архитектором. Совершенно естественно спланировать сооружение высотой 130 метров, а затем настаивать на том, что высота не менее 160 метров ниже достоинства архитектора из-за собственных требований к совершенству. Также само собой разумеется планировать церковное сооружение в пьемонтской провинции в размерах собора Святого Петра в Риме. И, конечно, не является признаком лёгкой мании величия то, что значительное количество его сооружений никогда не достраивается, потому что они не соответствуют его собственным требованиям. Ничто из этого не подошло бы Алессандро Антонелли. Как бы то ни было, у него есть новая идея, чтобы снова продлить строительство Моле-Антонеллиана..."
 gaudi.416.g: "Мамма миа!"
 gaudi.416.h: "Санто Дио!"
 gaudi.416.i: "Порка мизерия!"
 gaudi.416.j: "Каволо!"
 gaudi.417.t: "Антонеллиана растёт ввысь"
 gaudi.417.d: "Строительство Моле-Антонеллиана продвигается быстрее, чем ожидалось, по неустановленным причинам."
 gaudi.417.f: "По неизвестным причинам строительство величественной Моле-Антонеллиана продвигается. Может быть, это была хорошая погода. Возможно, молитва Мадонне. Возможно, также и довольно некачественный строительный материал, который мы растратили на днях и который, мы надеемся, никогда не будет найден. Одно можно сказать наверняка: этот монстр, который неоднократно испытывал задержки из-за самых разных обстоятельств, должен быть закончен быстрее, чем ожидалось. Если, конечно, Антонелли не воспользуется этим, чтобы попытаться компенсировать экономию времени новым расширением..."
 gaudi.418.t: "Упавшая балка разрушила кирпичную стену"
 gaudi.418.d: "Сегодня упавшая опорная балка нанесла значительный ущерб Моле-Антонеллиана и отбросила строительство назад."
 gaudi.418.f: "Эта опорная балка на самом деле не была такой уж опорной."
 gaudi.418.g: "Досадно."
 gaudi.419.t: "Визит монарха"
 gaudi.419.d: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] решил[SelectLocalization(SCOPE.sCharacter('gaudi_ruler').IsFemale, 'а', '')] лично посетить строительную площадку Моле-Антонеллиана."
 gaudi.419.f: "Наш монарх [SCOPE.sCharacter('gaudi_ruler').GetFullName] уже в прошлом проявлял большой интерес к происходящему на туринской стройке и теперь намерен посетить её. Подготовка идёт полным ходом — и, конечно же, они хотят что-то предложить Его Величеству! Простые строители, руководство стройки и лично Антонелли поэтому после объявления установили невиданную ранее скорость работы."
 gaudi.419.g: "Его Величество знает, как мотивировать."
 gaudi.420.t: "Несчастный случай на стройке"
 gaudi.420.d: "Сегодня в результате несчастного случая пострадало несколько человек. Руководство строительства Моле-Антонеллиана предполагает, что возникнут большие задержки, если мы не устраним ущерб и не наймём замену персоналу."
 gaudi.420.f: "Сегодня в Турине в результате несчастного случая пострадало несколько человек, некоторые из них серьёзно — их пришлось доставить в больницу. Среди пострадавших есть опытные квалифицированные рабочие, которые играли ключевую роль в строительстве. Без них строительство, вероятно, задержится, пока они не поправятся."
 gaudi.420.g: "Несчастные случаи случаются."
 gaudi.420.h: "Мы должны сделать всё возможное, чтобы это не нарушило ход строительства."
 gaudi.421.t: "Угроза забастовки"
 gaudi.421.d: "Строители Моле-Антонеллиана объявили забастовку, если мы не согласимся на переговоры о повышении заработной платы."
 gaudi.421.f: "Ах, чудесный мир забастовок! Вы не знаете, что упускаете, если не испытали в Южной Европе, каково это — застрять на вокзале, потому что профсоюз железнодорожников вдруг решил его саботировать. Сегодня это касается только одной строительной площадки. Нам действительно повезло!"
 gaudi.421.g: "Мы не будем вести переговоры."
 gaudi.421.h: "Заплатить штрейкбрехерам — и дело с концом."
 gaudi.421.i: "Вызвать карабинеров!"
 gaudi.421.j: "Вести переговоры."
 gaudi.422.t: "Гроза разрушает шпиль"
 gaudi.422.d: "Гроза превратилась в торнадо и сорвала шпиль Моле-Антонеллиана ночью!"
 gaudi.422.f: "Сильный шторм, вероятно, смерч, стал причиной того, что 47 метров шпиля сломались и упали в небольшой сад. Шпиль, задев окно комнаты на верхнем этаже, частично разрушил балкон, но не причинил вреда людям. Подобная участь постигла Моле 23 мая 1953 года. Моле со сломанным шпилем можно увидеть в конце вступительных титров фильма 1955 года «Подруги» Микеланджело Антониони. Титул самого высокого кирпичного сооружения в Европе поэтому перешёл к колокольне Ульмского собора, Германия (161,53 метра), в то время как мэрия Филадельфии переняла титул самого высокого кирпичного сооружения в мире (162,53 метра). Это также было связано с тем, что шпиль больше не будет восстанавливаться из кирпича, а из железобетона."
 gaudi.422.g: "Катастрофа!"
 gaudi.423.t: "Ницше восхищается Моле"
 gaudi.423.d: "Знаменитый немецкий философ Фридрих Ницше провёл большую часть 1870-х и 1880-х годов в Турине, который он высоко ценил. Он восхвалял Моле-Антонеллиана как одно из величайших сооружений своего времени."
 gaudi.423.f: "«Я прошёл мимо Моле-Антонеллиана, самого гениального сооружения, которое, возможно, было построено из абсолютного стремления ввысь — оно напоминает ничто иное, как Заратустру. Я окрестил его Ecce Homo и в своём духе окружил его огромным свободным пространством». - Фридрих Ницше"
 gaudi.423.g: "У этого человека есть вкус. Не только со времён «Утренней зари»."
 gaudi.424.t: "Воздушный шар «Итало»"
 gaudi.424.d: "Строительство Моле-Антонеллиана должно финансироваться за счёт специальной меры и тем самым вызвать дополнительный интерес."
 gaudi.424.f: "Муниципалитет планировал, что завершение строительства Моле-Антонеллиана совпадёт по времени с крупной выставкой. Посетители должны были наблюдать Моле-Антонеллиана вблизи. Сооружение не было построено в срок, но в качестве компенсации всё ещё можно было увидеть ход строительства, совершив полёт на воздушном шаре за плату в 5 лир. Сам воздушный шар получил название «Итало»."
 gaudi.424.g: "Туристический воздушный шар — звучит как хорошая идея."
 gaudi.424.h: "Какая трата денег."
 gaudi.425.t: "В «Итало» ударила молния"
 gaudi.425.d: "Воздушный шар у Моле-Антонеллиана был уничтожен во время бури!"
 gaudi.425.f: "Воздушный шар «Итало», ставший приятным развлечением для высшего общества за небольшую плату за экскурсию во время строительства Моле-Антонеллиана, 27 апреля 1884 года был поражён молнией и рухнул на землю. Погибших и раненых не было."
 gaudi.425.g: "Построить новый воздушный шар."
 gaudi.425.h: "Эти полёты на воздушном шаре слишком опасны."
 gaudi.501.t: "Начинаются строительные работы на Рингштрассе"
 gaudi.501.d: "Сегодня указом [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] положил начало строительству кольцевой дороги."
 gaudi.501.f: "«Моя воля, чтобы расширение внутреннего города Вены было начато как можно скорее с целью его соединения с пригородами и чтобы при этом были учтены регулирование и благоустройство моей резиденции и имперской столицы. С этой целью я разрешаю снос стены и укреплений внутреннего города, а также рвов вокруг него. Та часть территории и гласиса, полученная в результате сноса стены вокруг укреплений и городских рвов, которая не зарезервирована для другого назначения в соответствии с разрабатываемым генеральным планом, должна быть использована под застройку, а вырученные от этого средства должны быть направлены на формирование строительного фонда, из которого будут покрываться расходы, понесённые государственной казной в результате этой меры, в частности, также расходы на строительство общественных сооружений, а также на перенос всё ещё необходимых военных учреждений». - Франц Иосиф I."
 gaudi.501.g: "Вена станет мегаполисом первого ранга."
 gaudi.502.t: "Торжественное открытие Рингштрассе"
 gaudi.502.d: "Сегодня состоялась церемония открытия Рингштрассе. Но это относится только к самому проспекту — этому месту всё ещё не хватает величия, которое должно поставить Вену в один ряд с Лондоном и Парижем."
 gaudi.502.f: "«Ваше Величество преподнесли самый прекрасный рождественский подарок всему населению вашей верной столичной резиденции щедрым решением о том, что стены Вены должны пасть, а город должен быть расширен, ибо Вена должна стать одним из самых красивых и здоровых городов Европы. Большая часть задачи, поставленной Вашим Величеством, выполнена, ограничивающие стены исчезли, улица с самыми красивыми дворцами и домами завершена, созданы сады и парки, которые украшают резиденцию и предоставляют отдых жителям. Долгожданный акведук, который является условием чистоты города и здоровья его жителей, увенчает великое дело расширения города, и Ваше Величество как его основатель будет обязан даже грядущим поколениям глубочайшей благодарностью. Позвольте, Ваше Величество, выразить мою самую почтительную благодарность от имени представителей города Вены за то, что они удостоили нас чести открыть сегодня Рингштрассе». - Андреас Зелинка, мэр Вены"
 gaudi.502.g: "Вена, ты — жемчужина!"
 gaudi.503.t: "Поворотный момент для Вены"
 gaudi.503.d: "Кольцевая дорога постепенно обретает форму. В частности, строительство большого оперного театра и новой ратуши подчеркнёт переломный момент, который этот этап строительства означает для истории города Вены."
 gaudi.503.f: "«Я рассматриваю завершение кольцевой дороги как особенно важный этап в работе по расширению города. Я всегда уделял этому вопросу особое внимание и выражаю свою признательность и благодарность вам, господин мэр, и муниципальному совету за особую заботу, которую вы проявили к благоустройству моей резиденции. В будущем я буду и впредь уделять внимание дальнейшему прогрессу в расширении города и, по возможности, учитывать пожелания муниципалитета в отношении получения участков под строительство школ, складов и парков по очень разумным ценам. Чтобы как можно скорее решить один из важнейших вопросов, я отдал приказ, чтобы муниципалитету было разрешено бесплатно провести водоснабжение из Кайзербруннена, и я надеюсь, что таким образом водоснабжение будет быстро и успешно завершено». - Франц Иосиф I."
 gaudi.504.t: "Великолепие Вены"
 gaudi.504.d: "С открытием новой Государственной оперы и переездом в Новую ратушу был сделан важный шаг к тому, чтобы сделать Вену поистине достойной столицей Австрии."
 gaudi.504.f: "«Улицы Вены вымощены культурой. Улицы других городов — асфальтом». - Карл Краус"
 gaudi.505.t: "На пути к величию"
 gaudi.505.d: "С планированием университета, парламента и художественных музеев строительство Венской Рингштрассе вступает в свою заключительную фазу. Теперь задача состоит в том, чтобы создать из эстетически привлекательного района архитектурное чудо."
 gaudi.505.f: "«В Вене много достопримечательностей, и каждый венец чувствует себя одной из них». - Карл Краус"
 gaudi.506.t: "Венская Рингштрассе завершена"
 gaudi.506.d: "С сегодняшнего дня Рингштрассе обрела свой определяющий облик. Хотя нельзя исключать, что в будущем могут последовать дальнейшие расширения, то, что войдёт в историю как «стиль Рингштрассе», достигло своего зенита здесь и сейчас. Вся Европа завидует нам этому зрелищу!"
 gaudi.506.f: "«Это было очень мило, мне было очень приятно». - Франц Иосиф I."
 gaudi.506.g: "Было очень мило, мне было очень приятно."
 gaudi.509.t: "Вена потеряна!"
 gaudi.509.d: "С потерей Вены мы лишились всякой возможности продолжать строительство Венской Рингштрассе."
 gaudi.509.f: "Если по какой-либо причине Вена будет потеряна, прогресс строительства в целом не пропадёт. Только Австрия может продолжить строительство Венской Рингштрассе с последнего этапа. Иностранные захватчики, с другой стороны, не проявят интереса к дальнейшему строительству."
 gaudi.509.g: "Мы не можем надолго оставлять им Вену!"
 gaudi.601.t: "Крипта"
 gaudi.601.d: "Первый этап строительства будет сосредоточен на крипте и апсиде Саграда-Фамилия. С самого начала становится ясно, что размеры больше, чем предполагалось изначально."
 gaudi.601.f: "«Работа над Святым Семейством идёт медленно, потому что Хозяин этой работы не торопится». - Антонио Гауди"
 gaudi.601.g: "Это ведь не займёт так много времени, правда?"
 gaudi.602.t: "Крипта завершена"
 gaudi.602.d: "Сегодня была освящена крипта Саграда-Фамилия. Скоро там можно будет отслужить первую мессу."
 gaudi.602.f: "«Людей можно разделить на два типа: люди слова и люди дела. Первые говорят; вторые действуют. Я отношусь ко второй группе. Мне не хватает средств, чтобы адекватно выразить себя. Я не смог бы никому объяснить свои художественные концепции. Я их ещё не конкретизировал. У меня никогда не было времени на размышления о них. Мои часы были потрачены на работу». - Антонио Гауди"
 gaudi.602.g: "Ещё девять этапов строительства..."
 gaudi.603.t: "Апсида"
 gaudi.603.d: "С совершенно новым планом, который мало похож на первоначально задуманный, Антонио Гауди открыл окно в церковь, которой никогда раньше не было."
 gaudi.603.f: "«Мы доверили это сумасшедшему или гению, время покажет». - Элиес Рогент, директор Барселонской школы архитектуры"
 gaudi.603.g: "Это вообще можно закончить за человеческую жизнь?"
 gaudi.604.t: "Апсида завершена"
 gaudi.604.d: "После завершения апсиды жители Барселоны впервые смогли увидеть, что на самом деле задумал Гауди. Сооружение уже имеет необычные формы."
 gaudi.604.f: "«Прямая линия принадлежит Человеку. Кривая линия принадлежит Богу». - Антонио Гауди"
 gaudi.604.g: "Ещё восемь этапов строительства..."
 gaudi.605.t: "Фасад Рождества"
 gaudi.605.d: "Вопреки желанию городской администрации, начинается строительство фасада Рождества. Первоначальное желание было построить фасад Страстей, потому что он обращён к городу."
 gaudi.605.f: "«Каждый находит в храме своё: крестьяне видят кур и петухов; учёные — знаки Зодиака; богословы — родословную Иисуса; но объяснение, обоснование, известно только компетентным и не должно быть вульгаризировано». - Антонио Гауди"
 gaudi.605.g: "Мне нравятся черепахи."
 gaudi.606.t: "Фасад Рождества завершён"
 gaudi.606.d: "Строительство фасада Рождества завершено. Его игривый вид и колоссальные размеры не только убеждают жителей Барселоны поддержать строительство церкви. Он даёт предвкушение всего произведения."
 gaudi.606.f: "«Одному поколению не под силу возвести весь Храм, так давайте же оставим такой энергичный пример нашего темпа, чтобы будущие поколения почувствовали стимул сделать то же самое; и с другой стороны, мы не связываем их на остальную часть работы (...). Мы сделали полный фасад Храма, чтобы его важность сделала невозможным прекращение работ». - Антонио Гауди"
 gaudi.606.g: "Ещё семь этапов строительства."
 gaudi.607.t: "Главный неф"
 gaudi.607.d: "Интерьер Саграда-Фамилия с каждым днём обогащается деталями; он больше похож на лес, чем на дом."
 gaudi.607.f: "«Интерьер храма будет похож на лес. (...) Колонны главного нефа будут пальмами; это деревья славы, жертвы и мученичества. Колонны боковых нефов будут лаврами, деревьями славы, разума». - Антонио Гауди"
 gaudi.607.g: "Сколько лет это займёт?"
 gaudi.608.t: "Главный неф завершён"
 gaudi.608.d: "Папский нунций нанёс визит Гауди во время посещения Саграда-Фамилия. По словам нунция, его работа и образ жизни по праву дают ему титул «Данте архитектуры». Однако, учитывая гротескную архитектуру, критики не знают, цитирует ли церковь рай или ад."
 gaudi.608.f: "«Живопись через цвет, а скульптура через форму представляют существующие организмы. Фигуры, деревья, плоды... выражают свою внутреннюю сущность через свою внешность. Архитектура создаёт организм. Поэтому она должна управляться законом, гармонирующим с законами природы. Архитекторы, которые не придерживаются этого принципа, создают халтуру вместо произведения искусства». - Антонио Гауди"
 gaudi.608.g: "Ещё шесть этапов строительства."
 gaudi.609.t: "Шпили апостолов"
 gaudi.609.d: "Уже с фасадом Рождества Гауди подчеркнул, что Саграда-Фамилия должна расти в высоту, а не в ширину, чтобы вызвать больший энтузиазм; строительство отдельных башен придаст сооружению большой эффект."
 gaudi.609.f: "«Некоторое время назад приехал старый сосед из моего родного дома, который знал меня в детстве, и, увидев Храм Святого Семейства, наивно воскликнул: „Увы, увы! он делает то же самое, что делал, когда был маленьким!“ И он был прав. Это способность, накопленная по наследству, которая движет и направляет меня». - Антонио Гауди"
 gaudi.609.g: "Это когда-нибудь закончится?"
 gaudi.610.t: "Шпили апостолов завершены"
 gaudi.610.d: "Первые башни Саграда-Фамилия завершены. Жители отчасти очарованы, отчасти шокированы."
 gaudi.610.f: "«В отличие от большинства церквей в Барселоне, она не пострадала во время революции — её пощадили из-за её „художественной ценности“, как говорили люди. Я думаю, анархисты проявили дурной вкус, не взорвав её, когда у них была такая возможность, хотя они и повесили красно-чёрный флаг между её шпилями». - Джордж Оруэлл"
 gaudi.610.g: "Ещё пять этапов строительства."
 gaudi.611.t: "Фасад Страстей"
 gaudi.611.d: "С фасадом Страстей Саграда-Фамилия теперь создаётся часть церкви, которая вызывает раздражение даже у друзей Гауди."
 gaudi.611.f: "«Кто-то найдёт эту дверь слишком причудливой; но я хотел бы, чтобы она внушала страх, и для этого я не поскуплюсь на светотень, входящие и выходящие мотивы, всё, что создаёт самый мрачный эффект. Более того, я готов пожертвовать самой конструкцией, ломать арки и резать колонны, чтобы дать представление о том, насколько кровава Жертва». - Антонио Гауди"
 gaudi.611.g: "Ужас в камне."
 gaudi.612.t: "Фасад Страстей завершён"
 gaudi.612.d: "В отличие от фасада Рождества, фасад Страстей, выдержанный в простом стиле, производит очень современное впечатление и поэтому для одних привлекателен, для других — отталкивающ. Теперь совершенно понятно, почему Гауди не хотел строить этот фасад первым."
 gaudi.612.f: "«То, что я увидел в Барселоне — Гауди — было работой такой силы, такой веры, необычайного технического мастерства, проявленного на протяжении всей жизни гения; человека, который высекал камни на своих глазах по хорошо продуманному образцу. Гауди — это „строитель“ рубежа веков, человек, искусный в работе с камнем, железом и кирпичом. Его слава сегодня видна в его стране. Гауди был великим художником; остаются лишь те, кто трогает чувствительные сердца нежных людей». - Ле Корбюзье"
 gaudi.612.g: "Осталось всего четыре этапа строительства."
 gaudi.613.t: "Трансепт"
 gaudi.613.d: "Несмотря на успешный ход строительных работ, критики по-прежнему высказываются, теперь и из мира искусства. Они не хотят, чтобы сооружение придерживалось строгих спецификаций, но также должно развиваться в соответствии с современными тенденциями в архитектуре. Руководство строительства отклонило такие просьбы."
 gaudi.613.f: "«В книгах редко находишь то, что ищешь, а когда находишь, то часто это неверно». - Антонио Гауди"
 gaudi.613.g: "Осанна в вышних."
 gaudi.614.t: "Трансепт завершён"
 gaudi.614.d: "Теперь, когда Саграда-Фамилия почти на две трети завершена, Папа Римский в ходе мессы возвёл её в ранг малой базилики."
 gaudi.614.f: "«В Саграда-Фамилия всё провиденциально: её расположение в центре города и равнины Барселоны; одинаковое расстояние от храма до моря и гор, до Сантса и Сант-Андреу, а также до рек Бесос и Льобрегат». - Антонио Гауди"
 gaudi.614.g: "Осталось всего три этапа строительства."
 gaudi.615.t: "Шпили Марии и евангелистов"
 gaudi.615.d: "При планировании башен евангелистов Гауди архитектурно обыграл символы, стихии, знаки зодиака и добродетели. Теперь они должны стать реальностью."
 gaudi.615.f: "«Дева Мария, тебе не кажется плохим быть маленькой, как цветы и звёзды». - Антонио Гауди"
 gaudi.615.g: "Аве Мария."
 gaudi.616.t: "Шпили Марии и евангелистов завершены"
 gaudi.616.d: "Пять высоких башен Саграда-Фамилия возвышаются над Барселоной; строительство шпиля Марии завершается установкой двенадцатиконечной звезды."
 gaudi.616.f: "«Саграда-Фамилия — не последняя из соборов, а первая в новой эре». - Антонио Гауди"
 gaudi.616.g: "Два последних этапа строительства!"
 gaudi.617.t: "Фасад Славы"
 gaudi.617.d: "Наконец-то начаты работы над главным фасадом Саграда-Фамилия. Для этого необходимо приобрести новые участки под застройку, к большому неудовольствию городского населения. Руководство ещё не дало своего согласия."
 gaudi.617.f: "«Я не буду завершать или развивать фрагмент модели колоколен на главном фасаде. Я решил оставить его лишь запланированным, чтобы другое поколение могло сотрудничать в создании храма, как это неоднократно видно в истории соборов, чьи фасады созданы не только другими авторами, но и в других стилях». - Антонио Гауди"
 gaudi.617.g: "Свят, свят, свят."
 gaudi.618.t: "Фасад Славы завершён"
 gaudi.618.d: "С завершением фасада Славы Саграда-Фамилия теперь почти готова."
 gaudi.618.f: "«Саграда-Фамилия... величайшее произведение творческой архитектуры за последние двадцать пять лет. Это дух, символизированный в камне!» - Луис Салливан"
 gaudi.618.g: "Последний этап строительства!"
 gaudi.619.t: "Шпиль Христа"
 gaudi.619.d: "Со шпилем Христа Саграда-Фамилия не только возвысится над Барселоной, но и превзойдёт Ульмский собор — самую высокую церковь в Европе на сегодняшний день."
 gaudi.619.f: "«Оригинальность заключается в возвращении к истокам». - Антонио Гауди"
 gaudi.619.g: "Это будет самая высокая церковь на Земле."
 gaudi.620.t: "La Sagrada"
 gaudi.620.d: "Свершилось! Поистине свершилось! Архитектурное чудо света, Саграда-Фамилия сияет над Барселоной и по всему миру!"
 gaudi.620.f: "Pater noster, qui es in caelis:\nsanctificetur nomen tuum:\nadveniat regnum tuum:\nfiat voluntas tua, sicut in caelo, et in terra.\nPanem nostrum quotidianum da nobis hodie:\net dimitte nobis debita nostra,sicut et nos dimittimus debitoribus nostris\net ne nos inducas in tentationem.\nSed libera nos a malo."
 gaudi.620.g: "Никогда не думал, что доживу до этого дня."
 gaudi.629.t: "Барселона потеряна!"
 gaudi.629.d: "С потерей Барселоны мы лишились всякой возможности продолжать строительство Саграда-Фамилия."
 gaudi.629.f: "Если по какой-либо причине Каталония будет потеряна, прогресс строительства в целом не пропадёт. Другая нация, если у неё есть иберийская основная культура, может продолжить строительство собора с последнего этапа. Иностранные захватчики, с другой стороны, не проявят интереса к дальнейшему строительству."
 gaudi.629.g: "Мы не можем надолго оставлять им Барселону!"
 gaudi.631.t: "Благочестивое пожертвование на Саграда-Фамилия"
 gaudi.631.d: "Как добрый христианин, [SCOPE.sCharacter('gaudi_sagrada_donator').GetFullName] проявляет большой личный интерес к Саграда-Фамилия. Поэтому [SelectLocalization(SCOPE.sCharacter('gaudi_sagrada_donator').IsFemale, 'она сделала', 'он сделал')] личное пожертвование на строительство церкви."
 gaudi.631.f: "На протяжении десятилетий Саграда-Фамилия финансировалась в основном за счёт пожертвований. Именно благодаря крупному анонимному пожертвованию незадолго до начала строительства Антонио Гауди значительно расширил свои строительные планы и сделал Саграда-Фамилия тем проектом, каким он является сегодня. Строительные работы по-прежнему финансируются, как и было первоначально запланировано Хосепом Марией Бокабельей, за счёт пожертвований от фондов и входных билетов. Ежегодно на строительство выделяется около 22 миллионов евро; в 2009 году эта сумма составляла 18 миллионов евро."
 gaudi.631.g: "Мы у него в долгу."
 gaudi.632.t: "Духовенство в восторге от строительства Саграда-Фамилия"
 gaudi.632.d: "Духовенство нашей страны в эйфории от хода строительства Саграда-Фамилия и предложило свою помощь. Однако есть опасения, что это может сделать церковь слишком влиятельной."
 gaudi.632.f: "Последние годы своей жизни Гауди полностью посвятил «Собору для бедных», как его обычно называли, на который он собирал милостыню, чтобы продолжать строительство. Помимо своей преданности этому делу, он мало участвовал в других мероприятиях, большинство из которых были связаны с его католической верой: в 1916 году он посещал курс григорианского пения во Дворце каталонской музыки, который вёл бенедиктинский монах Грегори М. Суньоль. Монсеньор Рагонези считал Гауди «Данте архитектуры». Несмотря на свои гигантские размеры, Саграда-Фамилия не является кафедральным собором и не финансируется из официальных церковных источников."
 gaudi.632.g: "Мы должны извлечь из этого выгоду."
 gaudi.632.h: "Публично восхвалять Церковь."
 gaudi.632.i: "Это дело не касается церкви!"
 gaudi.633.t: "Профсоюзы критикуют Саграда-Фамилия"
 gaudi.633.d: "Как представитель профсоюзов, [SCOPE.sCharacter('trade_unions_leader').GetFullName] сегодня направил петицию правительству с требованием пересмотреть спорную поддержку Саграда-Фамилия."
 gaudi.633.f: "Лидеры профсоюзов видят в нынешнем строительстве Саграда-Фамилия чудовищную трату денег. Если они не могут предотвратить строительство, чтобы направить средства на значимые благотворительные цели, они по крайней мере требуют лучшего обращения и заботы о строителях, которые работают на опасной высоте."
 gaudi.633.g: "Игнорировать их."
 gaudi.633.h: "Отделаться пустыми обещаниями."
 gaudi.633.i: "Потратить деньги на улучшение положения рабочих."
 gaudi.634.t: "Несчастный случай"
 gaudi.634.d: "Сегодня на строительной площадке Саграда-Фамилия произошёл несчастный случай, который отбросил строительные работы на несколько недель назад."
 gaudi.634.f: "Работа на головокружительной высоте — не единственный риск несчастных случаев. В 2020 году поджигатель устроил пожар в Саграда-Фамилия, прервав строительство и вызвав эвакуацию строителей и присутствовавших туристов. От пожара пострадала ризница, она была повреждена."
 gaudi.634.g: "Прискорбно."
 gaudi.635.t: "Атеисты выступают против Саграда-Фамилия"
 gaudi.635.d: "В сегодняшней публичной речи [SCOPE.sCharacter('gaudi_sagrada_atheist').GetFullName] раскритиковал строительство Саграда-Фамилия как возвращение в Средневековье и призвал единомышленников осудить эту трату денег."
 gaudi.635.f: "«Вы можете быть против Саграда-Фамилия по многим причинам. По многим веским причинам. Например, потому что это архитектурный кошмар, не говоря уже о кошмаре ужасном. Даже в европейской архитектуре нашего времени не найти ничего столь вульгарного или претенциозного. Это кошмар, который растёт ввысь с каждым днём, в самых тёмных и абсурдных формах, балансируя между китчем, суеверием и человеческим безумием. Прежде всего, это безумие, оплаченное нашими налогоплательщиками, чтобы священники делали глупых ещё глупее, а бедных — ещё беднее. Дамы и господа, позвольте мне сказать вам: это безумие должно прекратиться. Не завтра, а сегодня!»"
 gaudi.635.g: "Нам не следует слишком сильно бросать вызов этой группе."
 gaudi.635.h: "DEUS VULT!"
 gaudi.636.t: "Инвестиции в туризм"
 gaudi.636.d: "Туристическая индустрия рассматривает Саграда-Фамилия как положительный фактор и хотела бы поддержать проект."
 gaudi.636.f: "В течение XX века Саграда-Фамилия стала настоящим символом Барселоны. В то время как для Гауди первостепенное значение имел духовный аспект, предприимчивым бизнесменам становилось всё более ясно, что вечную стройку можно коммерциализировать. В последующие годы сотни туристов-бартерщиков будут стекаться в Барселону по этой причине. Сегодня Саграда-Фамилия — одно из самых популярных туристических направлений в Испании."
 gaudi.636.g: "Барселона скоро обогатится новой достопримечательностью."
 gaudi.637.t: "Новые машины для стройки"
 gaudi.637.d: "Автомобильная промышленность нашей страны недавно оснастила строительную площадку Саграда-Фамилия сверхсовременной машиной, которая продвигает работы вперёд."
 gaudi.637.f: "Строительство Саграда-Фамилия, занявшее более века, также стало свидетелем технологического развития, которое должно было ускорить строительство. В то время как на рубеже веков использовались новые строительные методы и машины, в конце века компьютерное моделирование произвело революцию в строительстве церкви."
 gaudi.637.g: "Это прогресс!"
 gaudi.638.t: "Угроза забастовки"
 gaudi.638.d: "Строители Саграда-Фамилия объявили забастовку, если мы не согласимся на переговоры о повышении заработной платы."
 gaudi.638.f: "Ах, чудесный мир забастовок! Вы не знаете, что упускаете, если не испытали в Южной Европе, каково это — застрять на вокзале, потому что профсоюз железнодорожников вдруг решил его саботировать. Сегодня это касается только одной строительной площадки. Нам действительно повезло!"
 gaudi.638.g: "Мы не будем вести переговоры."
 gaudi.638.h: "Заплатить штрейкбрехерам — и дело с концом."
 gaudi.638.i: "Вызвать Гражданскую гвардию!"
 gaudi.638.j: "Вести переговоры."
 gaudi.639.t: "Некачественный материал"
 gaudi.639.d: "Последняя поставка материала для Саграда-Фамилия оказалась некачественной."
 gaudi.639.f: "Первый осмотр показал, что привезённый камень имеет пористые места. Поэтому мастер-строитель без лишних слов отверг партию. Это, безусловно, задержит строительство и повлечёт за собой дополнительные расходы, но качество в конечном итоге побеждает. В то же время есть и те, кто говорит, что мы не только должны использовать этот камень по соображениям экономии времени и средств, но и сэкономить часть лучшего строительного материала, чтобы использовать вырученные средства... в другом месте."
 gaudi.639.g: "У качества есть своя цена."
 gaudi.639.h: "Как будто кто-то заметит."
 gaudi.640.t: "Некачественное строительство"
 gaudi.640.d: "Некачественный материал дал о себе знать: сегодня утром обрушилась часть Саграда-Фамилия, причинив значительный ущерб."
 gaudi.640.f: "Антонио Гауди не в восторге."
 gaudi.640.g: "Кто бы мог это предвидеть?"
 gaudi.641.t: "Ускорение темпов строительства"
 gaudi.641.d: "Работы на Саграда-Фамилия продвигаются лучше, чем ожидалось. Мы рассчитываем опередить график на несколько месяцев."
 gaudi.641.f: "Современные технологии, быстрые рабочие процессы, бесперебойные поставки материалов и хорошая погода способствуют прогрессу строительства."
 gaudi.641.g: "Я это предвидел!"
 gaudi.642.t: "Новые рабочие места в Барселоне"
 gaudi.642.d: "Строительство церкви привело к большому притоку людей в Барселону."
 gaudi.642.f: "Как и в Средние века, строительство большой церкви породило много новых потребностей в городской жизни, которые часто могли быть удовлетворены только новыми рабочими. Нанимать нужно не только самих строителей. Они также зависят от ресторанов и магазинов, поставщиков и строительства новых квартир, которые тоже кто-то должен строить. Это привело к подъёму в Барселоне, от которого некоторые хотят получить прямую или косвенную выгоду."
 gaudi.642.g: "Великий проект нуждается в великих людях."
 gaudi.643.t: "Крупное анонимное пожертвование"
 gaudi.643.d: "Неизвестный богатый донор перевёл значительную сумму денег, которая ускорит строительство Саграда-Фамилия."
 gaudi.643.f: "На протяжении десятилетий Саграда-Фамилия финансировалась в основном за счёт пожертвований. Именно благодаря крупному анонимному пожертвованию незадолго до начала строительства Антонио Гауди значительно расширил свои строительные планы и сделал Саграда-Фамилия тем проектом, каким он является сегодня. Строительные работы по-прежнему финансируются, как и было первоначально запланировано Хосепом Марией Бокабельей, за счёт пожертвований от фондов и входных билетов. Ежегодно на строительство выделяется около 22 миллионов евро; в 2009 году эта сумма составляла 18 миллионов евро."
 gaudi.643.g: "Видимо, кто-то очень беспокоится о своём спасении."
 gaudi.644.t: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] поддерживает Саграда-Фамилия"
 gaudi.644.d: "[SCOPE.sCharacter('gaudi_ruler').GetFullName] проявил[SelectLocalization(SCOPE.sCharacter('gaudi_ruler').IsFemale, 'а', '')] большой личный интерес к Саграда-Фамилия."
 gaudi.644.f: "Официально строительство Саграда-Фамилия не получает государственной поддержки. Во время гражданской войны в Испании радикальные левые силы даже препятствовали дальнейшему строительству. Франко проявлял мало интереса к Саграда, но мало что мог сделать. Гауди настаивал на том, чтобы она финансировалась народом католической общины Испании. Однако это не исключает возможности того, что глава государства может использовать скрытые каналы для значительного продвижения проекта, если он заинтересован... будь то деньгами или связями с местным правительством."
 gaudi.644.g: "Да здравствует наш добрый [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName]!"
 gaudi.645.t: "Экскурсия"
 gaudi.645.d: "Саграда-Фамилия всё ещё строится, но прогресс впечатляет. Нам следует пригласить союзника и всё ему показать."
 gaudi.645.f: "Даже будучи незавершённым сооружением, Саграда-Фамилия впечатляла посетителей и будоражила их воображение. Дизайн самого сооружения был поляризующим. Оценки коллег-архитекторов Гауди были в целом положительными; Луис Салливан очень восхищался им, описывая Саграда-Фамилия как «величайшее произведение творческой архитектуры за последние двадцать пять лет. Это дух, символизированный в камне!». Вальтер Гропиус хвалил Саграда-Фамилия, описывая стены сооружения как «чудо технического совершенства». Однако писатель и критик Джордж Оруэлл назвал его «одним из самых отвратительных сооружений в мире»."
 gaudi.645.g: "Пригласить нашего союзника посетить Барселону."
 gaudi.645.h: "Это только помешает нашим усилиям."
 gaudi.646.t: "Поддержать строительство Саграда-Фамилия?"
 gaudi.646.d: "Нашего посла пригласили на экскурсию по строительной площадке Саграда-Фамилия. Это была впечатляющая экскурсия, и теперь посол спрашивает, не хотим ли мы завоевать международный престиж, став донором церкви."
 gaudi.646.f: "Даже будучи незавершённым сооружением, Саграда-Фамилия впечатляла посетителей и будоражила их воображение. Дизайн самого сооружения был поляризующим. Оценки коллег-архитекторов Гауди были в целом положительными; Луис Салливан очень восхищался им, описывая Саграда-Фамилия как «величайшее произведение творческой архитектуры за последние двадцать пять лет. Это дух, символизированный в камне!». Вальтер Гропиус хвалил Саграда-Фамилия, описывая стены сооружения как «чудо технического совершенства». Однако писатель и критик Джордж Оруэлл назвал его «одним из самых отвратительных сооружений в мире»."
 gaudi.646.g: "Этот великолепный проект должен получить нашу поддержку."
 gaudi.646.h: "Если бы эта «церковь» была живой, её следовало бы сжечь."
 gaudi.647.t: "Пожертвование от союзника"
 gaudi.647.d: "После экскурсии посол нашего союзника был так воодушевлён, что решил выступить в качестве донора проекта."
 gaudi.647.f: "Даже будучи незавершённым сооружением, Саграда-Фамилия впечатляла посетителей и будоражила их воображение. Дизайн самого сооружения был поляризующим. Оценки коллег-архитекторов Гауди были в целом положительными; Луис Салливан очень восхищался им, описывая Саграда-Фамилия как «величайшее произведение творческой архитектуры за последние двадцать пять лет. Это дух, символизированный в камне!». Вальтер Гропиус хвалил Саграда-Фамилия, описывая стены сооружения как «чудо технического совершенства». Однако писатель и критик Джордж Оруэлл назвал его «одним из самых отвратительных сооружений в мире»."
 gaudi.647.g: "Настоящих друзей узнаёшь сразу."
 gaudi.648.t: "Археологические изыскания в Барселоне"
 gaudi.648.d: "После визита в Барселону [SCOPE.sCharacter('gaudi_archaeologist').GetFullName] обнаружил, что Саграда-Фамилия, по-видимому, стоит на римских руинах. Он просит выдать лицензию на раскопки."
 gaudi.648.f: "Хотя римляне и основали Барсино, он был гораздо менее важен, чем столицы Таррако и Цезаравгуста. Название Барсино было принято в конце правления Августа, первого императора Рима. Это была краткая форма для Colonia Faventia Iulia Augusta Pia Barcino, основанной в 133 году до н. э. Как колония, она была предназначена для предоставления земли отставным солдатам. Римский географ Помпоний Мела сообщает о Барсино как о ряде небольших поселений под контролем Таррагоны (Таррако). Тем не менее, стратегическое положение города на ветке Виа Августа способствовало его экономическому развитию, и поэтому он пользовался освобождением от налогов."
 gaudi.648.g: "Мы не можем позволить себе такую длительную остановку строительства."
 gaudi.648.h: "Это уникальная археологическая возможность."
 gaudi.649.t: "[SCOPE.sCharacter('gaudi_chief_engineer').GetLastName] [SelectLocalization(SCOPE.sCharacter('gaudi_chief_engineer').IsFemale, 'выдвинула', 'выдвинул')] новую идею..."
 gaudi.649.d: "[SCOPE.sCharacter('gaudi_chief_engineer').GetFullName] недавно удивил руководство строительства изменением..."
 gaudi.649.f: "Любой, кто строит такого монстра, как Саграда-Фамилия, рано или поздно станет эксцентриком — или уже является им."
 gaudi.649.g: "Это почти так же плохо, как строительство Моле-Антонеллиана..."
 gaudi.650.t: "[SCOPE.sCharacter('gaudi_chief_engineer').GetLastName] ускоряет строительство Саграда-Фамилия"
 gaudi.650.d: "[SCOPE.sCharacter('gaudi_chief_engineer').GetFullName] недавно удивил руководство строительства ходом работ."
 gaudi.650.f: "Хорошо быть главным инженером."
 gaudi.650.g: "Это почти так же приятно, как строительство Венской Рингштрассе."
 gaudi.1001.t: "Распространение стального каркаса в строительстве"
 gaudi.1001.d: "Изобретение стального каркасного сооружения не было делом одного человека. Это был медленный процесс. Однако [SCOPE.sCharacter('gaudi_engineer_scope').GetFullName], известный [Concept('concept_tesla_engineer', '#ORANGE #b инженер#!#!')], способствует распространению изобретения, строя сооружения удивительной прочности, достигающие невиданных ранее высот."
 gaudi.1001.f: "Новое сооружение, в котором в будущем разместится банк, росло с каждым днём. Как скелет, стоял стальной каркас, ожидая, чтобы его покрыли другим материалом.\nНо его архитекторы уже мечтали о гораздо большем, чем 10 этажей. В будущем станут возможны 50, а может быть, даже 100 этажей!"
 gaudi.1001.g: "Наши башни наконец-то достигнут неба!"
 gaudi.1002.t: "Павильоны Гуэля"
 gaudi.1002.g: "Поистине замечательный художественный стиль!"
 gaudi.1003.t: "[SCOPE.sCharacter('tesla_new_engineer_scope').GetFullName] победил[SelectLocalization(SCOPE.sCharacter('tesla_new_engineer_scope').IsFemale, 'а', '')] на трассе Савио"
 gaudi.1003.d: "[SelectLocalization(SCOPE.sCharacter('tesla_new_engineer_scope').IsFemale, 'Молодая', 'Молодой')] [SCOPE.sCharacter('tesla_new_engineer_scope').GetFullName] занял[SelectLocalization(SCOPE.sCharacter('tesla_new_engineer_scope').IsFemale, 'а', '')] первое место в гонке Гран-при на трассе Савио в Равенне. Может быть, мы могли бы как-то поддержать этот зарождающийся талант?"
 gaudi.1003.f: "Запах бензина в воздухе, рёв моторов, азарт, опасность, действие — вот почему люди толпами стекались на автомобильные гонки в качестве зрителей.\n\nВ 1923 году молодой Энцо Феррари выиграл свой первый Гран-при и продолжал участвовать в гонках до рождения сына, после чего сам перестал гоняться. Но он остался верен гонкам, основав Scuderia Ferrari, свою собственную команду автогонщиков."
 gaudi.1003.g: "Какое зрелище!"
