 gaudi_eiffel_phase_1_decision: "Эйфелева башня"
 gaudi_eiffel_phase_1_decision_desc: "С техническими возможностями индустриализации появились идеи строительства высоких сооружений. В частности, башенные конструкции отражали дух времени. 1 мая 1886 года министр торговли Эдуард Локруа объявил конкурс идей для сооружений Парижской всемирной выставки, который был направлен на французских архитекторов и инженеров. В нём приняли участие около 100 претендентов, многие из которых подхватили идею башенной конструкции. После первого отбора осталось три проекта, включая вклад Эйфеля и проекты Фердинанда Дютера и Жана Камиля Формиже. Эйфель поручил снова пересмотреть сильно декорированную версию Совестра, не убирая некоторые декоративные элементы, и с этим компромиссным предложением выиграл конкурс."
 gaudi_liberty_phase_1_decision: "Леди Свобода"
 gaudi_liberty_phase_1_decision_desc: "Скульптор Фредерик-Огюст Бартольди предложил воздвигнуть статую Свободы в знак братства между французским и американским народами и в память об общей борьбе в Войне за независимость и за идеалы Просвещения. Она должна была стать символом свободной и демократической Америки. Столетние празднования в США в 1876 году придали этой идее новый импульс."
 gaudi_ben_phase_1_decision: "Достойный парламент"
 gaudi_ben_phase_1_decision_desc: "16 октября 1834 года разрушительный пожар уничтожил большую часть Вестминстерского дворца. Министерство финансов решило сжечь ненужные после налоговой реформы 1826 года деревянные бирки. Два вагона были сожжены в двух печах, что вызвало пожар в Палате лордов. От разрушения уцелели только Вестминстер-холл, Башня драгоценностей, крипта часовни Святого Стефана и клуатры. В июне 1835 года комиссия решила, что дворец должен быть восстановлен на том же месте; либо в готическом, либо в тюдоровском стиле. В 1836 году, изучив 97 конкурсных предложений, комиссия выбрала план Чарльза Бэрри, который предусматривал реконструкцию в готическом стиле."
 gaudi_ben_phase_2_decision: "Характерный колокол"
 gaudi_ben_phase_2_decision_desc: "Название Биг-Бен относится к самому тяжёлому из пяти колоколов знаменитой часовой башни Вестминстерского дворца в Лондоне, весом 13,5 тонн. Башня имеет высоту 96,3 метра, причём первые 61 метр сделаны из кирпича с известняковым фасадом, а вершина — из чугуна. Чарльз Бэрри, архитектор Вестминстерского дворца, поручил Огастесу Пьюджину спроектировать башню. Часовой механизм был разработан в 1848 году сэром Джорджем Эри и Эдмундом Денисоном и изготовлен часовщиком Эдвардом Джоном Дентом. Диаметр четырёх циферблатов составляет по семь метров каждый. Под каждым из четырёх циферблатов находится латинская надпись «Domine salvam fac reginam nostram Victoriam primam» (Боже, храни нашу королеву Викторию Первую)."
