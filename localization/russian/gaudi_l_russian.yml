 gaudi_nemo_button: "Охота на чудовище"
 gaudi_nemo_button_desc: "Небольшая экспедиция с опытным натуралистом на борту должна помочь нам узнать больше об опасности, исходящей от неизвестного чудовища."
 je_gaudi_nemo: "Двадцать тысяч льё под водой"
 je_gaudi_nemo_reason: "Таинственное морское чудовище, которое, по мнению очевидцев, является гигантским нарвалом, нападает на наши торговые суда и даже атакует порты. С помощью [Concept('concept_dubois_naturalist', '#GREEN #b натуралиста#!#!')] мы можем отправить экспедицию, чтобы узнать больше об этом существе — и, возможно, остановить его."
 gaudi.80.t: "Валгалла"
 gaudi.80.d: "С завершением строительства Валгаллы близ Регенсбурга Бавария создала место, где она может выставлять и чествовать великих немецких гениев в виде бюстов."
 gaudi.80.f: "Валгалла — это мемориал на Бройберге в Маркт-Донауштауфе, Бавария. Он был построен между 1830 и 1842 годами королём Людвигом I Баварским по проекту архитектора Лео фон Кленце. Ввиду «глубочайшего позора Германии» в 1806 году, когда была распущена Священная Римская империя, а большая часть будущей Германии оказалась под прямым влиянием Наполеона, тогдашний кронпринц Людвиг отдал приказ о создании серии бюстов «славно прославленных немцев». Как отмечено в первой из трёх надписей на полу, Людвиг уже в январе 1807 года решил как можно скорее построить храм чести для пятидесяти великих немцев. Когда Людвиг вступил на престол в 1825 году, уже было завершено 60 бюстов, но место для строительства ещё не было найдено. Валгалла получила форму греческого храма в стиле дорического периптера по образцу Парфенона в Афинах."
 gaudi.80.g: "Почтить немецкого композитора."
 gaudi.80.h: "Почтить немецкого литератора."
 gaudi.80.i: "Почтить немецкого художника."
 gaudi.90.t: "Таинственный кит топит корабль!"
 gaudi.90.d: "Всё больше и больше сообщений, которые поначалу отметались как матросские суеверия, но которые больше нельзя игнорировать. По сути, в течение некоторого времени несколько кораблей сталкивались в море с «огромной вещью», длинным веретенообразным объектом, иногда испускающим фосфоресцирующее свечение, бесконечно большим и быстрым, чем любой кит.\n\nЗа последний год несколько кораблей торгового флота пропали в море из-за странного явления, которое многие считают большим и пока не открытым видом кита."
 gaudi.90.f: "Факты, относящиеся к этому явлению, в большинстве своём сходились в отношении формы объекта или существа, неутомимой быстроты его движений, удивительной способности к передвижению и особой жизни, которой оно, казалось, было наделено. Если это был китообразный, он превосходил по размерам всех доселе классифицированных в науке. Принимая во внимание средние значения наблюдений, сделанных в разное время, можно было бы справедливо заключить, что это таинственное существо значительно превосходило все размеры, признанные ихтиологами того времени."
 gaudi.90.g: "Но действительно ли это кит?"
 gaudi.91.t: "Таинственный кит снова нападает!"
 gaudi.91.d: "Таинственное чудовище нанесло новый удар! Вся индустрия торгового судоходства в ужасе."
 gaudi.91.f: "Инженеры осмотрели «Скотию», которую поставили в сухой док. Они едва могли поверить в увиденное; на два с половиной ярда ниже ватерлинии была ровная пробоина в форме равнобедренного треугольника. Сломанное место в железных плитах было настолько чётко очерчено, что его нельзя было бы сделать аккуратнее пробойником. Стало ясно, что инструмент, сделавший пробоину, был необычным; и после того, как он был запущен с огромной силой, пробив железную плиту толщиной в полтора дюйма, он вышел обратно поистине необъяснимым образом."
 gaudi.91.g: "Эта гнусная угроза миру в открытом море должна быть прекращена!"
 gaudi.92.t: "Таинственный кит нападает на побережье!"
 gaudi.92.d: "Кит — или что бы это ни было — напал на портовый город и оставил за собой след разрушений."
 gaudi.92.f: "Гипотеза о плавучем острове и неприступной песчаной отмели, поддерживаемая умами, мало способными к суждению, была отброшена. И действительно, если у этой отмели не было машины в желудке, как она могла менять своё положение с такой поразительной быстротой? По той же причине была отброшена и идея о плавучем корпусе огромного затонувшего судна.\n\nОставалось тогда только два возможных решения вопроса, которые создали две разные партии; с одной стороны, те, кто был за чудовище колоссальной силы; с другой — те, кто был за подводное судно с огромной движущей силой."
 gaudi.93.t: "Профессор и его чудовище"
 gaudi.93.d: "После того, как [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] навёл справки о последнем месте преступления неизвестного существа, он отправился с отважной командой на поиски чудовища."
 gaudi.93.f: "«Великие глубины океана нам совершенно неизвестны. Зондирование не может их достичь. Что происходит в этих отдалённых глубинах — какие существа живут или могут жить на двенадцать или пятнадцать миль ниже поверхности вод — какова организация этих животных — мы можем лишь догадываться. Однако решение представленной мне проблемы может изменить форму дилеммы. Либо мы знаем все разновидности существ, населяющих нашу планету, либо нет. Если мы не знаем их всех, если у природы ещё есть для нас секреты в ихтиологии, ничто не противоречит разуму больше, чем допущение существования рыб или китообразных других видов, или даже новых видов, с организацией, приспособленной для обитания в недоступных для зондирования слоях, и которых случайность, фантастическая или капризная, через большие промежутки времени выносила на верхний уровень океана»."
 gaudi.93.g: "Удачи!"
 gaudi.94.t: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] пропал без вести!"
 gaudi.94.d: "Морское чудовище атаковало корабль, который хотел его исследовать. [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] упал за борт в борьбе с чудовищем! Несмотря на многодневные поиски, его не смогли найти."
 gaudi.94.f: "«В этот момент, оперевшись на бак, я увидел под собой Неда Ленда, одной рукой вцепившегося в мартингал, другой размахивающего своим ужасным гарпуном, едва ли в двадцати футах от неподвижного животного. Внезапно его рука выпрямилась, и гарпун был брошен; я услышал звучный удар оружия, которое, казалось, ударилось о твёрдое тело. Электрический свет внезапно погас, и два огромных водяных столба обрушились на мостик фрегата, хлынув как поток от носа до кормы, опрокидывая людей и ломая крепления рангоута. Последовал страшный удар, и, переброшенный через перила, не успев удержаться, я упал в море»."
 gaudi.94.g: "Нет! Только не [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]!"
 gaudi.95.t: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'была выброшена', 'был выброшен')] на берег!"
 gaudi.95.d: "Известный [Concept('concept_dubois_naturalist', '#GREEN #b натуралист#!#!')] [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] был найден сегодня выброшенным на наш берег. Профессор долгое время считался пропавшим без вести с тех пор, как присоединился к экспедиции, отправленной на поиски истины о таинственном ките, который, по слухам, топил и пожирал корабли в открытом море. Профессор потрясён пережитым, и его история действительно примечательна. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] утверждает, что его смыло за борт во время близкой встречи его корабля с существом, и что это существо на самом деле является человеческим кораблём, способным к подводному плаванию. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] утверждает, что кораблём командует, или командовал, свободолюбивый мститель, который отрёкся от всякого контакта с сушей в пользу свободной жизни в мировых океанах на борту своего корабля. Какова бы ни была правда, многочисленные подробные отчёты, составленные [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName], о многих странных новых формах жизни, якобы встреченных во время его путешествия в качестве гостя на борту этого странного судна, станут благом для наших научных усилий на долгие годы."
 gaudi.95.f: "«Это, очевидно, гигантский нарвал, и электрический». -[SCOPE.sCharacter('gaudi_nemo_scope').GetFullName]"
 gaudi.95.g: "Но действительно ли капитан Немо побеждён?"
 gaudi.1004.t: "Магнитный союз в Гёттингене"
 gaudi.1004.d: "Знаменитый астроном и математик Карл Фридрих Гаусс и физик Вильгельм Эдуард Вебер основали международное объединение для исследования магнитного поля Земли."
 gaudi.1004.f: "Магнитный союз (также Гёттингенский магнитный союз), основанный в 1830-х годах, был научно-исследовательским обществом с центром в Гёттингене. Основной целью был глобальный геофизический исследовательский проект по изучению временных и пространственных изменений магнетизма Земли. Он считается первым международным научным обществом. Союз был основан гёттингенскими профессорами Карлом Фридрихом Гауссом и Вильгельмом Вебером при поддержке Александра фон Гумбольдта. Целью было скоординированное измерение колебаний магнитного поля Земли с помощью многочисленных измерительных станций, распределённых по всему миру. В течение шестилетнего периода с 1836 по 1841 год измерения проводились в 28 назначенных дней, каждое из которых длилось 24 часа с интервалом в пять минут. В этом проекте приняли участие до 50 обсерваторий, в том числе 35 в Европе, шесть в Азии, две в Африке, три в Северной Америке и четыре в Южных морях. Результаты доставлялись в Гёттинген и научно обрабатывались Гауссом и Вебером."
 gaudi.1004.g: "Магниты? Электричество? Электромагнетизм!"
 gaudi.1004.h: "Искромётно!"
