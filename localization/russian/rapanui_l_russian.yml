 rapanui.290.t: "Большой Барьерный риф"
 rapanui.290.d: "Когда «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» проходит мимо печально известного Большого Барьерного рифа в австралийских водах, доктор [SCOPE.sCharacter('rapanui_scientist').GetLastName] даёт понять, что [SelectLocalization(SCOPE.sCharacter('rapanui_scientist').IsFemale, 'она', 'он')] хотел[SelectLocalization(SCOPE.sCharacter('rapanui_scientist').IsFemale, 'а', '')] бы изучить его более подробно. Открытия, которые [SelectLocalization(SCOPE.sCharacter('rapanui_scientist').IsFemale, 'она', 'он')] делает, поразительны — рифы, по-видимому, нечто большее, чем просто препятствия для судоходства."
 rapanui.290.f: "Чарльз Дарвин посетил Большой Барьерный риф в 1836 году во время обратного пути путешествия HMS Beagle. Он отметил несколько отличительных черт: массивные внешние края рифа были образованы towering коралловыми стенами, которые круто обрывались в открытый океан, в некоторых местах уходя на сотни метров вглубь. В лагунах, напротив, он наблюдал отсутствие живых коралловых образований; коралловые колонии там, казалось, вымерли. Дарвин также понял, что внешние кораллы сохраняли своё положение у поверхности моря даже при опускании морского дна под ними, непрерывно нарастая вверх. Эти наблюдения стали основой для его общей модели формирования коралловых рифов. В 1842 году он опубликовал «Строение и распределение коралловых рифов», где представил свою теорию опускания. Эта теория предполагала, что коралловые рифы могут образовываться на медленно опускающихся островах или континентальных шельфах. Большой Барьерный риф послужил Дарвину самым ярким примером барьерного рифа и стал центральным доказательством его теории."
 rapanui.290.g: "Атоллы образуются из... кораллов?"
