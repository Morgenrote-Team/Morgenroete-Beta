 rapanui_easter_island_decision: "Аннексия острова Пасхи"
 rapanui_easter_island_decision_desc: "Остров Пасхи — ключевая стратегическая точка в Тихом океане для утверждения чилийского господства в регионе."
 rapanui_easter_island_decision_BOL_tt: "Флот Чили должен быть больше, чем флот Боливии."
 rapanui_easter_island_decision_PEU_tt: "Флот Чили должен быть больше, чем флот Перу."
 rapanui_easter_island_ai_decision: "Аннексия острова Пасхи"
 rapanui_easter_island_ai_decision_desc: "Остров Пасхи — ключевая стратегическая точка в Тихом океане для утверждения чилийского господства в регионе."
 rapanui_pacific_expedition_decision: "Экспедиция в Тихий океан"
 rapanui_pacific_expedition_decision_desc: "Наряду с полюсами, Тихий океан является одной из последних областей на Земле, которая всё ещё хранит тайны. Учёные из разных научных дисциплин заинтересованы в исследовательской миссии для проведения естественно-исторических, археологических, астрономических и океанографических исследований. Для великих держав это также может стать престижным делом, чтобы показать своё влияние на краю света."
 rapanui_missionary_conversion_5_tt: "#G 5 процентов#! коренного населения были #YELLOW обращены#! в нашу веру."
 rapanui_missionary_conversion_10_tt: "#G 10 процентов#! коренного населения были #YELLOW обращены#! в нашу веру."
 rapanui_missionary_conversion_15_tt: "#G 15 процентов#! коренного населения были #YELLOW обращены#! в нашу веру."
 rapanui_missionary_conversion_20_tt: "#G 20 процентов#! коренного населения были #YELLOW обращены#! в нашу веру."
 rapanui_missionary_reversion_10_tt: "#G 10 процентов#! коренного христианского населения были #YELLOW возвращены#! в нашу веру."
 rapanui_established_catholic_mission_tt: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] получит постоянную католическую миссию."
 rapanui_established_protestant_mission_tt: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] получит постоянную протестантскую миссию."
 rapanui_low_native_aggressiveness_tt: "#YELLOW Агрессивность коренных жителей#! #G низкая#!. Нам не о чем беспокоиться."
 rapanui_medium_native_aggressiveness_tt: "Агрессивность коренных жителей #YELLOW средняя#!. Отныне мы должны быть осторожны, чтобы не рисковать жизнью нашего миссионера."
 rapanui_high_native_aggressiveness_tt: "Агрессивность коренных жителей #R высокая#!. Всего один неверный шаг, и миссионерская деятельность может потерпеть неудачу."
 rapanui_low_mission_tension_tt: "В этой стране нет проблем с другими миссиями."
 rapanui_medium_mission_tension_tt: "Были некоторые конфликты с миссионерами других вероисповеданий, но ситуация управляема."
 rapanui_high_mission_tension_tt: "Напряжённость с конкурирующей миссионерской станцией может в любой момент перерасти в политический конфликт."
 rapanui_add_1_native_aggressiveness_tt: "Агрессивность коренных жителей возрастает на #R 1#! очко."
 rapanui_add_2_native_aggressiveness_tt: "Агрессивность коренных жителей возрастает на #R 2#! очка."
 rapanui_sub_1_native_aggressiveness_tt: "Агрессивность коренных жителей снижается на #G 1#! очко."
 rapanui_add_1_mission_tension_tt: "Напряжённость возрастёт на #R 1#! очко."
 rapanui.135.tt: "Получить экзотическое животное, такое как #O манта#! или #O зелёная морская черепаха#!."
 rapanui_add_1_oceanographic_understanding_tt: "Увеличить @rapanui_oceanographic_knowledge! #E океанографические знания#! на #G 1#!."
 rapanui_add_3_oceanographic_understanding_tt: "Увеличить @rapanui_oceanographic_knowledge! #E океанографические знания#! на #G 3#!."
