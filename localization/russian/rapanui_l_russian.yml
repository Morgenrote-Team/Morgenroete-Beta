 rapanui_pacific_expedition_stuck_tt: "Эта экспедиция застрянет на некоторое время."
 rapanui_remove_pacific_expedition_stuck_tt: "Экспедиция продолжит свой путь."
 rapanui_pacific_expedition_location_sea_tt: "Экспедиция находится в открытом море."
 rapanui_pacific_expedition_location_polynesia_tt: "Экспедиция плывёт по водам Океании."
 rapanui_pacific_expedition_location_australia_tt: "Экспедиция путешествует вдоль побережья Австралии."
 rapanui_pacific_expedition_location_indonesia_tt: "Экспедиция плывёт по водам и вдоль побережий Индонезии."
