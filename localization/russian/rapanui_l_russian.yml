 dubois_sub_zoo_animal_stoat_tt: "Потерять #O горностая#!."
 rapanui_send_new_missionaries_button: "Отправить новых миссионеров"
 rapanui_send_new_missionaries_button_desc: "С новыми миссионерами мы можем увеличить наши шансы на обращение. Насколько хорошей окажется инициатива, зависит от случая."
 rapanui_trade_with_natives_button: "Торговать с коренными жителями"
 rapanui_trade_with_natives_button_desc: "Вместо того чтобы продолжать обращение, мы можем использовать наше влияние, чтобы получить экзотические подарки."
 rapanui_sabotage_rival_missionaries_button: "Дискредитировать конкурирующих миссионеров"
 rapanui_sabotage_rival_missionaries_button_desc: "Если на месте есть конкурирующая миссия, мы можем попытаться дискредитировать её и повлиять на её шансы на миссионерскую работу на долгие годы. Наши шансы на успех 50:50. Это повлияет только на годовой темп обращения."
 rapanui_change_course_button: "Изменить курс экспедиции"
 rapanui_change_course_button_desc: "Во время [Concept('concept_dubois_pacific_expedition', 'тихоокеанской экспедиции')] можно один раз изменить курс корабля. Тогда он покинет первоначально выбранный регион и направится к одному из двух других пунктов назначения."
 je_rapanui_catholic_mission_oceania: "Учредить католическую миссию в Океании"
 je_rapanui_catholic_mission_oceania_reason: "Наш миссионер, отец [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName], неустанно трудится, чтобы обратить коренных жителей в христианскую веру. Ожидается, что ежегодно в католичество будет обращаться около 1 процента населения. Случайные события могут улучшить этот результат. Однако, если прозелитизм вызовет гнев коренных жителей из-за слишком дерзкого поведения, всё предприятие может провалиться. Если 30 процентов жителей откажутся от своей старой веры во имя Христа, то мы сможем основать постоянную миссионерскую станцию."
 je_rapanui_protestant_mission_oceania: "Учредить протестантскую миссию в Океании"
 je_rapanui_protestant_mission_oceania_reason: "Наш миссионер, преподобный [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName], неустанно трудится, чтобы обратить коренных жителей в христианскую веру. Ожидается, что ежегодно в католичество будет обращаться около 1 процента населения. Случайные события могут улучшить этот результат. Однако, если прозелитизм вызовет гнев коренных жителей из-за слишком дерзкого поведения, всё предприятие может провалиться. Если 30 процентов жителей откажутся от своей старой веры во имя Христа, то мы сможем основать постоянную миссионерскую станцию."
 je_rapanui_mission_fail: "Христианизация [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_RP')] потерпит неудачу, если агрессивность коренных жителей составит 5 очков или более."
 je_rapanui_catholic_conversion_oceania: "Обратить правителя в католицизм"
 je_rapanui_catholic_conversion_oceania_reason: "Обращение вождя племени — решающий шаг к окончательному утверждению христианства среди коренных жителей и превращению его в государственную религию. Для этого, однако, большинство жителей должны исповедовать католицизм. Если в этом государстве существует конкурирующая миссионерская станция еретиков-ненавистников Марии, мы должны сделать всё возможное, чтобы помешать им получить политическую власть. Наш миссионер, отец [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName], позаботится о том, чтобы этого не произошло, и ежегодно будет приводить один процент населения к истинной вере. Возможно проводить акцию раз в три года."
 je_rapanui_protestant_conversion_oceania: "Обратить правителя в протестантизм"
 je_rapanui_protestant_conversion_oceania_reason: "Обращение вождя племени — решающий шаг к окончательному утверждению христианства среди коренных жителей и превращению его в государственную религию. Для этого, однако, большинство жителей должны исповедовать протестантизм. Если в этом государстве существует конкурирующая миссионерская станция богохульных папистов, мы должны сделать всё возможное, чтобы помешать им получить политическую власть. Наш миссионер, преподобный [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName], позаботится о том, чтобы этого не произошло, и ежегодно будет приводить один процент населения к истинной вере. Возможно проводить акцию раз в три года."
 je_rapanui_crisis_in_paradise: "Обращение потерпит неудачу, если нация другой веры обратит правителя раньше нас."
 je_rapanui_pacific_expedition: "Экспедиция «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»"
 je_rapanui_pacific_expedition_reason: "Наряду с полюсами, Тихий океан является одной из последних областей на Земле, которая всё ещё хранит тайны. Учёные из разных научных дисциплин заинтересованы в исследовательской миссии для проведения естественно-исторических, археологических, астрономических и океанографических исследований. Для великих держав это также может стать престижным делом, чтобы показать своё влияние на краю света."
 je_rapanui_pacific_expedition_success: "Экспедиция вернётся после семи различных остановок при общем путешествии и после пяти остановок при специализированном."
 je_rapanui_pacific_expedition_goal: "Экспедиция вернётся после семи различных остановок при общем путешествии и после пяти остановок при специализированном."
 je_rapanui_oceanographic_studies: "Океанографические исследования"
 je_rapanui_oceanographic_studies_reason: "Океанографические исследования не только помогут нам лучше понять океан и его поведение, но и принесут нам значительные преимущества в случае успеха. Нация, которая знает каждое океанское течение и правильно интерпретирует изменения в море, всегда на шаг впереди своих соперников."
 je_rapanui_oceanographic_studies_success: "Мы завершим наши исследования, если наберём #G 25#! #E океанографических знаний#!."
 je_rapanui_oceanographic_studies_goal: "Мы завершим наши исследования, если наберём #G 25#! #E океанографических знаний#!."
 notification_rapanui_challenger_notification_name: "[INITIATOR_COUNTRY.GetName] обнаруживает самую глубокую точку морского дна"
 notification_rapanui_challenger_notification_desc: "Экспедиция из [INITIATOR_COUNTRY.GetAltNameNoFlag('RU_CL_RP')] обнаружила самую глубокую точку на Земле, когда-либо измеренную на дне Тихого океана."
 notification_rapanui_wallace_notification_name: "Исследователь из [INITIATOR_COUNTRY.GetAltNameNoFlag('RU_CL_RP')] подтверждает теорию эволюции"
 notification_rapanui_wallace_notification_desc: "Учёный из [INITIATOR_COUNTRY.GetAltNameNoFlag('RU_CL_RP')] внёс важный вклад в доказательство теории эволюции, определив фаунистическую границу в Индонезии."
 rapanui.101.t_cat: "Католическая миссия в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_VP')]"
 rapanui.101.t_pro: "Протестантская миссия в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_VP')]"
 rapanui.101.d_cat: "Отважный отец [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName] согласился отправиться в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_VP')] в качестве миссионера и обратить местных язычников к Иисусу Христу."
 rapanui.101.d_pro: "Отважный преподобный [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] согласился отправиться в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_VP')] в качестве миссионера и обратить местных язычников к Иисусу Христу."
 rapanui.101.f: "Острова Океании в XIX веке были в значительной степени изолированной частью мира от западной цивилизации. Миссионеры сыграли значительную роль в принесении в эти регионы не только веры, но и образования и технологий. Хотя к середине XX века Океания была полностью христианизирована, миссионеры первоначально сталкивались с недоверием и многочисленными неудачами. Клише о «диких южных морях» также произошло от того, что многие миссионеры приняли мученическую смерть самым жутким образом."
 rapanui.101.g_cat: "Иди с Богом."
 rapanui.101.g_pro: "Иди с Богом."
 rapanui.102.t_cat: "Католическая миссия из [SCOPE.sCountry('rapanui_mission_departure_country').GetAltNameNoFlag('RU_CL_RP')]"
 rapanui.102.t_pro: "Протестантская миссия из [SCOPE.sCountry('rapanui_mission_departure_country').GetAltNameNoFlag('RU_CL_RP')]"
 rapanui.102.d: "Сегодня на берег высадился миссионер из чужой земли. Некоторые считают его смутьяном, другие полагают, что он может принести пользу нашей стране."
 rapanui.102.f: "Отношения между народами тихоокеанских островов и прибывающими христианскими миссионерами были очень сложными. Их справедливо считали предвестниками колониальных держав и потенциальными разрушителями традиционной культуры. Но во многих случаях островитяне извлекали выгоду из опыта и знаний европейцев. Миссионеры открывали школы, привозили современную медицину или внедряли новые методы ведения сельского хозяйства. Для многих племён прибытие миссионеров знаменовало собой первый шаг к централизации. Конечно, не все жители Тихого океана хотели рисковать и быстро расправлялись с незваными гостями."
 rapanui.102.g: "Убить его!"
 rapanui.102.h: "Пощадить его, но игнорировать."
 rapanui.102.i: "Оказать ему дружелюбный приём."
 rapanui.104.t: "Миссионер принял мученическую смерть!"
 rapanui.104.d_cat: "Миссия в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_VP')] потерпела полный провал. [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_missionary_death_type')]"
 rapanui.104.d_pro: "Миссия в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_VP')] потерпела полный провал. [SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_missionary_death_type')]"
 rapanui.104.f: "К сожалению, многие попытки прозелитизма заканчивались убийством соответствующего миссионера, не в последнюю очередь из-за недоразумений и незнания местных обычаев. Священник Пьер Шанель был убит на Футуне; Джон Уильямс и его коллега-миссионер Джеймс Харрис были съедены каннибалами на острове Эрроманго; а Карл Фёлькнер был сначала обезглавлен в Новой Зеландии, после чего вождь вынул его глаза и проглотил их.\nПройдёт около пяти лет после такой неудачи, прежде чем найдётся другой доброволец для миссионерской поездки. Чем больше попыток обращения, тем выше шанс, что в следующий раз всё получится."
 rapanui.104.g_cat: "Покой вечный даруй им, Господи."
 rapanui.104.g_pro: "Да обретёт он вечный покой."
 rapanui.105.t: "Миссионер прибывает в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_VP')]"
 rapanui.105.d_cat: "Отец [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName] благополучно прибыл в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_VP')]. Пока что он столкнулся с отсутствием интереса со стороны коренных жителей. Тот факт, что он всё ещё жив, можно считать небольшим успехом. Но ему ещё предстоит много работы."
 rapanui.105.d_pro: "Преподобный [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] благополучно прибыл в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_VP')]. Пока что он столкнулся с отсутствием интереса со стороны коренных жителей. Тот факт, что он всё ещё жив, можно считать небольшим успехом. Но ему ещё предстоит много работы."
 rapanui.105.f: "Прибыв, некоторые миссионеры должны были считаться с агрессивными жителями, которые хотели быстро их прогнать. Некоторые, напротив, проявляли интерес и надеялись на торговлю оружием или новые технологии. Но случалось и так, что весть о Христе просто встречалась с безразличием. Для миссионеров, однако, это был хороший знак: в конце концов, живые миссионеры могли чего-то добиться, в отличие от мёртвых."
 rapanui.105.g_cat: "Благодарение Богу."
 rapanui.105.g_pro: "Благодарение Богу."
 rapanui.106.t: "Дружелюбный приём для миссионера"
 rapanui.106.d_cat: "Миссия в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_VP')] увенчалась огромным успехом. Отец [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName] был тепло принят коренными жителями и смог объявить о первых крещениях."
 rapanui.106.d_pro: "Миссия в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_VP')] увенчалась огромным успехом. Преподобный [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] был тепло принят коренными жителями и смог объявить о первых крещениях."
 rapanui.106.f: "Отношение коренного населения к миссионерам менялось от острова к острову. Помимо враждебности или страха, некоторые жители также проявляли спонтанный интерес. В королевстве Мангарева французским миссионерам удалось за очень короткое время обратить большую часть населения и крестить там короля. В течение одного года после их прибытия миссионеры обратили островитян на Тараваи, Аукене и Акамуру в христианство, основали церкви и даже убедили островитян носить туники. В Рикитеа был построен собор Святого Михаила, который стал самой большой церковью на островах Южной части Тихого океана."
 rapanui.106.g_cat: "К вящей славе Божией!"
 rapanui.106.g_pro: "К вящей славе Божией!"
 rapanui.111.t_cat: "Триумф католицизма"
 rapanui.111.t_pro: "Триумф протестантизма"
 rapanui.111.d_cat: "Наш добрый отец [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName] славно потрудился в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_PP')]: его труды упали на благодатную почву, и из разрозненной миссионерской работы выросла процветающая христианская община."
 rapanui.111.d_pro: "Наш добрый преподобный [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] славно потрудился в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_PP')]: его труды упали на благодатную почву, и из разрозненной миссионерской работы выросла процветающая христианская община."
 rapanui.111.f: "С созданием прочной христианской общины миссионеров уже не так легко выгнать из страны. Даже местному князю скоро придётся пересмотреть свою позицию по отношению к христианству. Отныне вопрос не в том, обратится ли [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] в христианство, а в том, когда. Следующей целью должно стать обращение правителя, чтобы сделать христианство государственной религией и тем самым способствовать обращению всей страны."
 rapanui.112.t: "Католическая миссия основана на постоянной основе"
 rapanui.113.t: "Протестантская миссия основана на постоянной основе"
 rapanui.112.d: "Христианской миссии удалось прочно обосноваться в нашей стране. Избавиться от чужаков теперь будет гораздо сложнее."
 rapanui.112.f: "Теперь, когда почти треть населения отказалась от своей старой веры в пользу христианства, возникает закономерный вопрос о будущем [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Быстрые успехи в обращении не прекратятся и в будущем. Пока шаманы выжидают, что будет дальше, некоторые из обращённых в христианство вождей племён предложили использовать эту возможность для модернизации страны."
 rapanui.112.g: "Мы должны внимательно следить за этим развитием."
 rapanui.112.h: "Мы должны быть более открыты к чужакам."
 rapanui.114.t: "Гнев язычников"
 rapanui.114.d_cat: "Ужасные новости! Отец [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName] спровоцировал восстание коренных жителей в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_PP')] своим недипломатичным поведением. Они подожгли миссионерскую станцию и убили священника!"
 rapanui.114.d_pro: "Ужасные новости! Преподобный [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] спровоцировал восстание коренных жителей в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_PP')] своим недипломатичным поведением. Они подожгли миссионерскую станцию и убили миссионера!"
 rapanui.114.f: "Миссионерская работа часто требует правильного баланса между жёстким принуждением и элегантной дипломатией. Во многих случаях слишком усердный миссионер уходил из жизни, не успев завершить свою работу. В Южных морях евангелические миссионеры, в частности, имели репутацию использующих радикальные методы для обращения населения — что заканчивалось большим успехом или большой катастрофой. В данном случае с нашим миссионером случилось второе."
 rapanui.115.t: "Католическая миссия упразднена"
 rapanui.115.d: "Неподобающее поведение иностранных миссионеров слишком долго испытывало терпение нашего народа. Народное восстание превратило миссионерскую станцию в руины, а вместе с ней и миссионера."
 rapanui.115.f: "По-видимому, европейцы были слишком неосторожны. Вместо того чтобы обратить население, они настроили его против себя. После этого эпизода многие наши соотечественники вернулись к своей старой вере. По-видимому, это христианство — чистое шарлатанство."
 rapanui.115.g: "Они это заслужили."
 rapanui.116.t: "Протестантская миссия упразднена"
 rapanui.122.t: "Перевод Библии"
 rapanui.122.d: "[SCOPE.sCharacter('rapanui_missionary_scope').GetFullName], наш миссионер в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_PP')], перевёл Библию на местный язык. Это будет способствовать обращению в христианскую веру."
 rapanui.122.f: "На раннем этапе первые миссионеры на тихоокеанских островах делали заметки, из которых они создавали словари, а позже также переводили Библию на местный язык. Однако слишком большое усердие могло в итоге принести некоторым миссионерам больше вреда, чем пользы."
 rapanui.122.g: "Это поможет в обращении местных жителей."
 rapanui.122.h: "Это подходящее время для новой миссионерской инициативы."
 rapanui.123.t: "Работорговцы нападают на миссионерский остров"
 rapanui.123.d: "Работорговцы из [SCOPE.sCountry('rapanui_slaver_country').GetAltNameNoFlag('RU_CL_RP')] вторглись в [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag]. Наш миссионер [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] настоятельно просит нас вмешаться, чтобы остановить набеги."
 rapanui.123.f: "До второй половины XIX века было обычным делом, что перуанские работорговцы, в частности, опустошали целые острова. Этот вид дешёвого procuring труда был значительно более жестоким, чем «blackbirding», который был особенно распространён в северной Австралии. Эти нападения были бременем для миссионеров, поскольку было совсем нелегко убедить островитян принять христианство, когда номинальные христиане бессовестно рыскали в поисках добычи. Аболиционизм, который был широко распространён среди католического и протестантского духовенства, получил новый импульс от таких событий."
 rapanui.123.g: "Это не наше дело."
 rapanui.123.h: "Мы должны немедленно прекратить эту бесчеловечную деятельность!"
 rapanui.124.t: "Идолопоклонство"
 rapanui.124.d: "В [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_PP')] всё ещё есть ряд коренных жителей, которые являются идолопоклонниками. [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] намерен подать пример в традициях святого Бонифация."
 rapanui.124.f: "Уничтожение идолов или святых мест всегда глубоко потрясало первобытные народы. Некоторые видели в этом доказательство того, что христианский бог должен быть выше их мира богов; другие видели в этом причину для ещё более яростной борьбы с христианством. Некоторые любители искусства отмечали, что языческие изображения, возможно, лучше бы смотрелись в другом месте."
 rapanui.124.g: "Уничтожить идолов!"
 rapanui.124.h: "Заставить их элегантно исчезнуть."
 rapanui.124.i: "Не трогать их."
 rapanui.125.t: "Культ предков"
 rapanui.125.d: "В [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_PP')] обостряется дискуссия о том, как поступать с существующим там культом предков. Миссионерская работа значительно усложняется из-за продолжающегося культа."
 rapanui.125.f: "Как и во многих других частях мира, культ предков был центральной частью духовной жизни. В то время как католическим миссионерам приходилось бороться с этой проблемой веками назад и первоначально они игнорировали вопрос о её будущем, протестантские миссионеры, в частности, проявляли невероятную жёсткость по отношению к культу предков. Тем не менее, поклонение всё ещё широко распространено в некоторых частях Полинезии — по сей день."
 rapanui.125.g: "Этот культ должен прекратиться!"
 rapanui.125.h: "Мы найдём работоспособное промежуточное решение."
 rapanui.126.t: "Синкретизм"
 rapanui.126.d: "Несмотря на все усилия по предотвращению этого, миссионер [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] вынужден в своём последнем отчёте признать, что в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_PP')] развилась синкретическая община, смешавшая анимистические и христианские элементы."
 rapanui.126.f: "Синкретизм всегда был досадой для миссионеров. Некоторые видели в нём переходный этап, который можно было бы преодолеть на следующем шаге; другие видели в этой ереси ещё большее зло, чем сама религия, которую нужно было обратить. Тем не менее, синкретические движения были и остаются идентичностью для ряда людей, поэтому подавление такого учения вызовет напряжение. Тот факт, что такие явления также имеют интересные культурные и художественные характеристики, всегда завораживал антропологов и любителей искусства."
 rapanui.126.g: "Эту ересь необходимо искоренить!"
 rapanui.126.h: "Им нужно больше времени, чтобы понять."
 rapanui.126.i: "Эта синкретическая культура очень интересна."
 rapanui.127.t: "Хор мальчиков мистера [SCOPE.sCharacter('rapanui_missionary_scope').GetLastName]"
 rapanui.127.d: "Церковный хор в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_PP')], состоящий из местных мальчиков, оказался на удивление хорош."
 rapanui.127.f: "«Жизнь! Наша жизнь, земля наша! — так звучит наш клич.\nЖизнь! Наша жизнь, земля наша! — мы кричим!\nБоль! Наша боль, и сила наша! — так звучит наш клич.\nБоль! Наша боль, и сила наша! — мы кричим!\nГнев! Наш гнев, и вера наша! — так звучит наш клич.\nГнев! Наш гнев, и вера наша! — мы кричим!\nЖизнь! Наша жизнь, земля наша! — так звучит наш клич»."
 rapanui.127.g: "Это покажет местным жителям красоту веры."
 rapanui.127.h: "Это принесёт мир в души местных жителей."
 rapanui.127.i: "Эту музыку должны услышать в Европе!"
 rapanui.128.t: "Массовое крещение"
 rapanui.128.d_cat: "Отец [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName] сообщает из [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_RP')] о потрясающем массовом крещении после того, как местный клан и все его члены посвятили себя Иисусу Христу."
 rapanui.128.d_pro: "Преподобный [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] сообщает из [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_RP')] о потрясающем массовом крещении после того, как местный клан и все его члены посвятили себя Иисусу Христу."
 rapanui.128.f_cat: "Верую во единого Бога,\nОтца всемогущего,\nтворца неба и земли,\nвсего видимого и невидимого\nи во единого Господа Иисуса Христа,\nСына Божия единородного,\nот Отца рождённого прежде всех веков."
 rapanui.128.f_pro: "Верую во единого Бога,\nОтца всемогущего,\nтворца неба и земли,\nвсего видимого и невидимого.\nИ во единого Господа Иисуса Христа,\nСына Божия единородного,\nот Отца рождённого прежде всех веков."
 rapanui.128.g: "Аминь."
 rapanui.129.t: "Болезни в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_PP')]"
 rapanui.129.d: "Жители [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_RP')] жалуются на таинственную болезнь, свирепствующую на островах, и обвиняют наших миссионеров в том, что они завезли её на остров."
 rapanui.129.f: "С прибытием европейских поселенцев, миссионеров и торговцев на острова пришли и ранее неизвестные болезни. Среди них были грипп, пневмония, корь, свинка, скарлатина, оспа, коклюш и обычная простуда. Традиционная медицина, с другой стороны, мало что могла сделать. Связь с началом христианской миссионерской деятельности заставила многих сомневаться в осмысленности крещения, поскольку христианский Бог, очевидно, мало что мог сделать против чумы."
 rapanui.129.g: "Это дело рук дьявола."
 rapanui.130.t: "Миссионер умирает от малярии"
 rapanui.130.d_cat: "Печальные новости из [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_RP')]: отец [SCOPE.sCharacter('rapanui_missionary_scope').GetFirstName] умер от тропической болезни. Его мужественная преданность и руководство миссионерской работой там не будут забыты."
 rapanui.130.d_pro: "Печальные новости из [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_RP')]: преподобный [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] умер от тропической болезни. Его мужественная преданность и руководство миссионерской работой там не будут забыты."
 rapanui.130.f: "Миссионеры в Океании не только принимали мученическую смерть. Так же, как коренные жители погибали от европейских болезней, европейцы умирали от местных болезней. Миссионерская работа будет продолжена, преемник уже назначен. Однако в этом году обращений не будет."
 rapanui.132.t: "Эффективные миссионеры"
 rapanui.132.d: "Новые миссионеры, которых мы отправили в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_VP')], оказались особенно способными людьми: их миссионерская работа продвигается лучше, чем ожидалось."
 rapanui.132.f: "«Вспомните, что Евангелие сделало для близких родственников этих же аборигенов. На нашем собственном Анейтюме 3500 каннибалов были приведены к отказу от своего язычества... На Фиджи 79 000 каннибалов были приведены под влияние Евангелия; и 13 000 членов Церквей исповедуют, что живут и трудятся для Иисуса. На Самоа 34 000 каннибалов исповедали христианство; и за девятнадцать лет его колледж выпустил 206 местных учителей и евангелистов. На наших Новых Гебридах более 12 000 каннибалов были приведены к ногам Христа, хотя я не хочу сказать, что все они — образцовые христиане; и 133 из местных жителей были обучены и отправлены в качестве учителей и проповедников Евангелия». — Джон Г. Пэтон"
 rapanui.132.g: "Они творят дело Божие."
 rapanui.133.t: "Новые миссионеры в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_PP')]"
 rapanui.133.d: "После прибытия на миссионерскую станцию новые миссионеры сразу же приступили к работе и могут сообщить о первых успехах."
 rapanui.133.f: "Их поклонение было полностью служением страху, его целью было умилостивить того или иного злого духа, предотвратить бедствие или отомстить. Они обожествляли своих вождей, так что почти в каждой деревне или племени был свой священный человек. Они оказывали необычайное влияние на зло, эти деревенские или племенные жрецы, и считалось, что они распоряжаются жизнью и смертью через свои священные обряды. Они также поклонялись духам ушедших предков и героев через своих материальных идолов из дерева и камня. Они боялись духов и искали их помощи; особенно стремясь умилостивить тех, кто правил войной и миром, голодом и изобилием, здоровьем и болезнью, разрушением и процветанием, жизнью и смертью. Всё их поклонение было одним из рабского страха; и, насколько я мог когда-либо узнать, у них не было представления о Боге милосердия или благодати. — Джон Г. Пэтон"
 rapanui.133.g: "Они хорошо работают."
 rapanui.134.t: "Некомпетентные миссионеры?"
 rapanui.134.d: "Несмотря на новую группу миссионеров, которую мы отправили в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_VP')], наши усилия по обращению были лишь незначительно успешными."
 rapanui.134.f: "Мои враги редко ослабляли свои ненавистные замыслы против моей жизни, как бы ни были они успокоены или сбиты с толку на мгновение... Дикий вождь следовал за мной четыре часа со своим заряженным мушкетом, и, хотя часто направлял его на меня, Бог сдерживал его руку. Я говорил с ним по-доброму и занимался своей работой, как будто его там не было, полностью убеждённый, что мой Бог поместил меня туда и будет защищать меня до тех пор, пока моя назначенная задача не будет выполнена. Вглядываясь в непрерывной молитве к нашему дорогому Господу Иисусу, я оставил всё в его руках и чувствовал себя бессмертным, пока моя работа не была сделана. Испытания и опасности укрепляли мою веру и, казалось, только придавали мне сил для новых; и они шли swiftly по пятам друг друга. — Джон Г. Пэтон"
 rapanui.134.g: "Что они вообще делают?"
 rapanui.135.t: "Торговля с коренными жителями"
 rapanui.135.d: "После установления контакта с местным правителем возникает вопрос, чем с ним торговать; он предлагает ценный артефакт, [Concept('concept_dubois_zoo_animal', 'экзотическое животное')] или драгоценный жемчуг."
 rapanui.135.f: "Торговля взаимна: взамен коренной народ получает технологический бонус."
 rapanui.135.g: "Нас интересует артефакт."
 rapanui.135.h: "Наш выбор падает на животное."
 rapanui.135.i: "Нам нравится жемчуг."
 rapanui.136.t: "Манта"
 rapanui.136.d: "Коренные жители прислали нам изысканного гигантского ската, которого мы в тот же день отправили домой."
 rapanui.136.f: "Гигантский скат-манта — это fascinante, а также экзотическое животное, которое является новой достопримечательностью в домашнем зоопарке. Это одно из типичных животных фауны Австралии и Океании."
 rapanui.136.g: "Прекрасно!"
 rapanui.137.t: "Зелёная морская черепаха"
 rapanui.137.d: "Коренные жители прислали нам превосходную морскую черепаху, которую мы в тот же день отправили домой."
 rapanui.137.f: "Зелёная морская черепаха — это fascinante, а также экзотическое животное, которое является новой достопримечательностью в домашнем зоопарке. Это одно из типичных животных фауны Австралии и Океании."
 rapanui.138.t: "Дискредитация сработала"
 rapanui.138.d: "С помощью нескольких подкупленных свидетелей из числа коренных жителей и используя риторические навыки нашего миссионера, мы смогли проинформировать некоторые местные кланы о злонамеренных намерениях конкурирующей миссионерской станции."
 rapanui.138.f: "Разногласия между конкурирующими миссионерскими станциями, особенно между протестантскими и католическими группами, должны были сформировать конфликт, который часто заканчивался изгнанием одной группы соответствующим правителем, если он обращался. В случае с Таити ссоры даже привели к полномасштабной войне, поскольку протестантский Таити выступал против католических миссионеров, которые, в свою очередь, находились под французской защитой. Этот эпизод стал прелюдией к военной интервенции Франции на Таити, в то время как Великобритания, считавшаяся защитницей обращённого ею Таити, не позволила втянуть себя в конфликт из-за нескольких островов."
 rapanui.139.t: "Дискредитация обернулась против нас"
 rapanui.139.d: "Несмотря на благие намерения предупредить наших овец — и тех, кто вот-вот ими станет — о злонамеренных намерениях конкурирующей миссионерской станции, они, к сожалению, не захотели нам верить. Наоборот: нас теперь считают лицемерными смутьянами, которые хотят нарушить мир на острове!"
 rapanui.139.g: "Это сработало не так, как предполагалось."
 rapanui.140.t: "Подставили!"
 rapanui.140.d: "Конкурирующая миссионерская станция в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_PP')] нанесла ущерб нашей доброй репутации и обвинила нас в том, что мы занимаемся только политическим влиянием и манипуляциями. Наши шансы на обращение значительно снизились!"
 rapanui.140.g: "И эти люди называют себя христианами?"
 rapanui.141.t_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] принимает католическую веру"
 rapanui.141.t_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] принимает протестантскую веру"
 rapanui.141.d_cat: "Сегодня на торжественной мессе правитель [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_RP')] исповедал Иисуса Христа и принял католическую веру. Отец [SCOPE.sCharacter('rapanui_missionary_scope').GetLastName] достиг таким образом апогея, в своей миссионерской работе."
 rapanui.141.d_pro: "Наш миссионер, преподобный [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName], сегодня крестил правителя [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_RP')] во имя Господа. Христианская миссия в стране таким образом преодолела последнее препятствие."
 rapanui.141.f: "С обращением правителя некогда языческой земли он приложит собственные усилия для обращения своего народа в истинную веру. [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName] останется на месте некоторое время, чтобы сопровождать процесс в качестве консультанта, но в обозримом будущем вернётся домой. С обращением [SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] также попросил[SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFormatting('RU_CL_END_FEM')] нашей защиты и изгнал[SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFormatting('RU_CL_END_FEM')] миссионеров других вероисповеданий из страны. Великие державы уважают наше влияние на месте, которое мы можем позже преобразовать в прямое правление. Наша прямая миссионерская работа на месте закончена — но могут быть и другие части света, которые теперь срочно нуждаются в вести Иисуса Христа."
 rapanui.141.g_cat: "Во имя Господа нашего Иисуса Христа."
 rapanui.141.g_pro: "Во имя Господа нашего Иисуса Христа."
 rapanui.142.t: "[SCOPE.sCharacter('rapanui_ruler').GetFullName]: Крещение"
 rapanui.142.d: "После того как [SCOPE.sCharacter('rapanui_ruler').GetFullName] [SelectLocalization(SCOPE.sCharacter('rapanui_ruler').IsFemale, 'обратилась', 'обратился')] в католицизм, христианизация нашей страны стала предрешена. Теперь [SelectLocalization(SCOPE.sCharacter('rapanui_ruler').IsFemale, 'она', 'он')] сделал[SelectLocalization(SCOPE.sCharacter('rapanui_ruler').IsFemale, 'а', '')] обращение народа своим главным приоритетом."
 rapanui.143.d: "После того как [SCOPE.sCharacter('rapanui_ruler').GetFullName] [SelectLocalization(SCOPE.sCharacter('rapanui_ruler').IsFemale, 'обратилась', 'обратился')] в протестантизм, христианизация нашей страны стала предрешена. Теперь [SelectLocalization(SCOPE.sCharacter('rapanui_ruler').IsFemale, 'она', 'он')] сделал[SelectLocalization(SCOPE.sCharacter('rapanui_ruler').IsFemale, 'а', '')] обращение народа своим главным приоритетом."
 rapanui.142.f: ""
 rapanui.144.t_cat: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] обращается в еретический протестантизм"
 rapanui.144.t_pro: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] обращается в еретический католицизм"
 rapanui.144.d_cat: "После того как правитель [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_RP')] принял крещение от протестантского миссионера, наши усилия по обращению там можно в конечном счёте считать провалом."
 rapanui.144.d_pro: "После того как правитель [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_RP')] принял крещение от католического миссионера, наши усилия по обращению там можно в конечном счёте считать провалом."
 rapanui.144.f: "Все усилия по обращению местного населения в истинную веру напрасны. С обращением власть, поддерживающая этих лжепроповедников, также получила влияние на островах и может скоро изгнать наших людей. Нам придётся отозвать наших миссионеров после этого изменения политики и посмотреть, не окажется ли другая страна более проницательной в принятии истинной веры."
 rapanui.144.g_cat: "Это дело рук дьявола."
 rapanui.144.g_pro: "Это дело рук дьявола."
 rapanui.146.t: "Торговля с чужеземцами"
 rapanui.146.d: "Переговорщики с миссионерской станции чужой страны сделали нам торговое предложение. Мы можем выбрать то, что нас больше всего интересует."
 rapanui.146.f: "Торговля взаимна: взамен чужая нация получает артефакт, животное или немного жемчуга."
 rapanui.146.g: "Новые сельскохозяйственные технологии."
 rapanui.146.h: "Современное оружие."
 rapanui.146.i: "Больше образования."
 rapanui.151.t: "Миссионер собирает фольклор"
 rapanui.151.d: "Наш миссионер в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_PP')] собрал истории, песни и мифы народа, чтобы лучше понять менталитет и фон культуры."
 rapanui.151.f: "В то время как некоторые миссионеры видели себя в традиции Бонифация и радикально боролись с особенностями коренных жителей, всегда был тип учёного, который сначала хотел сориентироваться в соответствующей культуре, чтобы найти точки соприкосновения, которые он мог бы позже использовать для более эффективного приведения коренных жителей ко Христу. Не в последнюю очередь эту технику практиковали иезуиты. Сборники часто были важны для последующей идентификации, поскольку миссионеры первыми письменно передавали традицию. В то же время в Европе рос интерес к экзотическим культурам и их обычаям."
 rapanui.151.g: "Использовать эти знания для обращения населения."
 rapanui.151.h: "Этот сборник должен быть в музее."
 rapanui.152.t: "Христианская школа"
 rapanui.152.d: "С основанием миссионерской школы в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_PP')] сделан важный шаг на пути к христианизации и образованию страны."
 rapanui.152.f: "Христианские школы внесли важный вклад в постепенное приобщение Океании, изолированной от остального мира, к школьной традиции, преобладающей на Западе, и тем самым в содействие грамотности среди коренного населения. Наряду с прекращением каннибализма и племенных войн, введение школ считается одним из великих положительных побочных эффектов миссионерской работы."
 rapanui.152.g: "Не для школы, а для жизни учимся."
 rapanui.153.t: "Конфликт с еретическим миссионером"
 rapanui.153.d: "Агрессивные действия одного миссионера усилили существующий конфликт с конкурирующей миссионерской станцией. Он утверждает, что группа коренных жителей принадлежит к его катехизаторам, а не к нашей общине."
 rapanui.153.f: "К сожалению, христианское повествование о том, что с приходом миссионеров закончились кровожадность каннибалов и племенные войны, также имело некоторые очевидные недостатки: антагонизм между конфессиями привёл к ссорам, которых раньше не было."
 rapanui.153.g: "Это наши катехизаторы."
 rapanui.153.h: "Подставить другую щеку."
 rapanui.154.t: "Торговый пост"
 rapanui.154.d: "В действии, явно направленном против нас, конкурирующая миссионерская станция в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_PP')] поддержала создание торгового поста для своей нации, вероятно, в надежде лучше привязать к себе коренных жителей через гнусное потребление."
 rapanui.154.f: "Иногда рождественские подарки важнее для обращения в христианство, чем скучная Библия."
 rapanui.154.g: "Мы построим свой собственный торговый пост!"
 rapanui.155.t: "Привилегия для соперника"
 rapanui.155.d: "Конкурирующий миссионер получил привилегию выступать в качестве советника правителя при его дворе. Это не только серьёзное оскорбление, но и может подорвать наши позиции в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_PP')]."
 rapanui.155.f: "Миссионеров, сумевших завоевать доверие правителя, часто нанимали из-за их образования, дипломатических контактов и, не в последнюю очередь, из-за надежды на передачу знаний. Это не обязательно означало реальное желание обратиться, но по крайней мере означало большую власть для страны, из которой происходил миссионер — к большому неудовольствию конкурирующих конфессий, которые надеялись установить теневые протектораты, влияя на правителя."
 rapanui.155.g: "Мы настаиваем на тех же привилегиях."
 rapanui.171.t: "Кризис в раю"
 rapanui.171.d: "Конфликт между иностранными миссионерами достиг опасного уровня. Возможный политический спор кажется неизбежным."
 rapanui.171.f: "В определённый момент разногласия между миссионерами разных конфессий могли перерасти в политический конфликт. Самый известный пример — Таити. Опасаясь интервенции, соответствующий правитель мог попытаться обратиться в одну из двух конфессий, чтобы по крайней мере надеяться на поддержку соответствующей державы в случае военной интервенции, которой он был безнадёжно слабее. Защита покровителя не была гарантирована, но она давала по крайней мере шанс на выживание, а не на превращение в простую колонию."
 rapanui.171.g: "Обратиться в католицизм"
 rapanui.171.h: "Обратиться в протестантизм"
 rapanui.172.t: "Кризис в раю"
 rapanui.172.d: "Ситуация в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_PP')] обострилась. Местный правитель исповедал ересь конкурирующей миссионерской станции. Некоторые политики уже призывают к военно-морской интервенции."
 rapanui.172.f: "С обращением правителя в другую конфессию — лишь вопрос времени, когда наших миссионеров изгонят: скоро вновь установленная государственная религия запретит их пребывание. Наши амбиции по постоянному обращению островного государства в истинную веру и оказанию там влияния получили сильный удар; но ситуация не совсем безнадёжна. Это дело даёт нам отличный предлог для прямой военной интервенции в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_VP')] и навязывания наших идей — политически и религиозно. Конечно, если его новый покровитель поддержит своего новообретённого единоверца, это может перерасти в настоящую войну далеко за пределами [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_RP')]..."
 rapanui.172.g: "Эти отдалённые острова не стоят костей ни одного #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFlag|l]ого#! матроса."
 rapanui.172.h: "На кону престиж нашей нации!"
 rapanui.173.t: "Кризис в раю"
 rapanui.173.d: "Из-за эскалации ситуации в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_PP')] тамошний правитель обратился в нашу веру. Однако нация, управляющая конкурирующей миссионерской станцией, отказывается смириться с этим и угрожает военным вторжением, чтобы навязать свои идеи."
 rapanui.173.f: "Вопрос о том, сколько стоит нам контроль над некоторыми островами в Тихом океане, сегодня как никогда актуален: готовы ли мы пойти на войну, чтобы защитить новообретённый протекторат? В любом случае, наш конкурент показывает зубы. С этим владение [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_TP')] может стать делом национальной чести."
 rapanui.173.g: "К сожалению, такой конфликт перенапряжёт наши ресурсы."
 rapanui.173.h: "Конечно, мы придём на помощь нашему новому протеже."
 rapanui.174.t: "Незаботливый покровитель"
 rapanui.174.d: "Наша предполагаемая «держава-покровительница» сочла слишком опасным защищать нас в грядущей войне."
 rapanui.174.f: "Даже после успешных миссий и дружеской, взаимной поддержки в местных конфликтах нация, обратившая один из народов Южной части Тихого океана, не обязательно была заинтересована в их защите от других великих держав. Так, когда католическая Франция увидела нарушение своей сферы влияния там, Великобритания воздержалась от защиты Таити, которую она обратила в протестантизм. Лондон признал претензии французов — также потому, что не хотел начинать мировую войну из-за нескольких отдалённых островов."
 rapanui.174.g: "Мы всё равно будем бороться за нашу свободу!"
 rapanui.174.h: "Мы подчинимся, пока не случилось худшего."
 rapanui.175.t: "Дипломатическая победа"
 rapanui.175.d: "Нашего запугивания было достаточно, чтобы сломить волю правителя [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_RP')]. Он обратится в нашу религию и попросит нашей защиты."
 rapanui.175.f: "В случае, если держава-покровительница не вмешивается, а местный правитель меняет своё религиозное решение, есть редкая надежда на бескровный конфликт."
 rapanui.175.g: "Наилучший возможный исход."
 rapanui.176.t: "[SCOPE.sCountry('rapanui_mission_country').GetNameNoFlag] готовится к войне"
 rapanui.176.d: "Несмотря на предательство своего новообретённого покровителя, коренные жители готовы пойти на войну против нас, чтобы защитить свою свободу."
 rapanui.176.f: "Хотя мы не спровоцируем конфликт между великими державами своим вмешательством, борьба коренных народов за свободу может оказаться более жестокой, чем то, что мы на самом деле ожидали бы от простого восстания примитивных народов."
 rapanui.176.g: "Значит, война."
 rapanui.177.t: "Новый брат во Христе"
 rapanui.177.d: "Из-за растущей эскалации между протестантскими и католическими миссионерами правитель СТРАНЫ решил исповедовать нашу конфессию, чтобы попросить защиты."
 rapanui.177.f: "Мы смогли отстоять свои интересы без кровопролития. Признав наши претензии на эту зону влияния, конкурирующие миссионеры уже пакуют чемоданы. В будущем они больше не будут стоять у нас на пути."
 rapanui.177.g: "Обращение есть обращение."
 rapanui.178.t: "Война в раю окончена"
 rapanui.178.d: "Мы отстояли свои интересы в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_PP')]. Правитель и его нация подчинятся нашему правлению и обратятся в нашу религию."
 rapanui.178.f: "Некоторые должны учиться на своих ошибках. Позже они поблагодарят нас за этот акт милосердия."
 rapanui.201.t: "Руководитель экспедиции"
 rapanui.201.d: "[Concept('concept_dubois_pacific_expedition', 'Тихоокеанская экспедиция')] требует опытного адмирала. На это предприятие могут претендовать до трёх кандидатов."
 rapanui.201.f: "Адмирал, возвращающийся из экспедиции, должен значительно повысить свой опыт в плавании, но не будет доступен во время своего отсутствия, если разразится война."
 rapanui.201.g: "[SCOPE.sCharacter('rapanui_pacific_expedition_leader_1').GetFullName]"
 rapanui.201.h: "[SCOPE.sCharacter('rapanui_pacific_expedition_leader_2').GetFullName]"
 rapanui.201.i: "[SCOPE.sCharacter('rapanui_pacific_expedition_leader_3').GetFullName]"
 rapanui.202.t: "Цель экспедиции"
 rapanui.202.d: "До сих пор нет согласия относительно того, должна ли исследовательская экспедиция иметь определённую цель, и если да, то на какой области следует сосредоточиться."
 rapanui.202.f: "Специализация даст нам преимущество в соответствующих областях. Вероятность определённых событий увеличивается. Военные, в частности, выиграли бы от улучшения наших океанографических знаний, а социальные науки — от биологических исследований. Великие державы также могут выразить свои имперские амбиции и предпринять действия, которые повысят их престиж и влияние в регионе."
 rapanui.202.g: "Это общая исследовательская поездка."
 rapanui.202.h: "Мы в основном проводим океанографические исследования."
 rapanui.202.i: "Мы хотим узнать больше о чудесах природы."
 rapanui.202.j: "Репутация нашей нации важнее, чем жуки или эксперименты."
 rapanui.203.t: "Приглашённый учёный"
 rapanui.203.d: "Есть возможность добавить в экспедицию специального учёного, если у него есть соответствующие квалификации. Требуются геодезисты, натуралисты, палеонтологи и [Concept('concept_verrier_astronomer', '#b #ORANGE астрономы#!#!')]."
 rapanui.203.f: "Тихоокеанские экспедиции были известны тем, что брали на борт целую армию учёных из самых разных дисциплин и по возвращении расширяли горизонты учёных, оставшихся дома. Правда, в основном речь шла о наблюдениях и сборах, оценка обычно проводилась только на родине. В то время как моряки с некоторым презрением смотрели на «собирателей жуков», именно эти скрупулёзно работающие личности также добивались выдающихся научных достижений благодаря глубоководным измерениям, магнитным экспериментам или наблюдениям за прохождением Венеры."
 rapanui.203.g: "Нет нужды в ещё одном учёном."
 rapanui.203.h: "Нам нужен геодезист. [SCOPE.sCharacter('rapanui_surveyor').GetFullName] подошёл бы для экспедиции."
 rapanui.203.i: "A [concept_dubois_naturalist] like [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] seems to be the right person."
 rapanui.203.j: "The choice falls on [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName], the [concept_dubois_paleontologist]."
 rapanui.203.k: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] — [concept_verrier_astronomer|l], и этой экспедиции он понадобится."
 rapanui.204.t: "Начало экспедиции «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»"
 rapanui.204.d: "Подготовка к [Concept('concept_dubois_pacific_expedition', 'тихоокеанской экспедиции')] завершена. [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetFullName] выбрал[SelectLocalization(SCOPE.sCharacter('rapanui_pacific_expedition_leader').IsFemale, 'а', '')] «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» своим флагманом. Путешествие войдёт в историю под названием #Yellow «Экспедиция „[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]“»#!."
 rapanui.204.f: "В ясный день силуэт «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» отражается в воде. На набережной стоят важные представители академической элиты, профессор читает лекцию, которая не только теряется в научных деталях, но и подчёркивает исторический момент. Это не только особый день для науки, но и для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Каким бы ни был исход предприятия, надежды, возлагаемые на путешествие, велики. Вскоре [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetFullName] даёт команду отчалить. На прощание пушки дают громкий салют, пока экспедиционное судно не исчезает вдали."
 rapanui.204.g: "Отчалить — в Океанию!"
 rapanui.204.h: "Отправиться в плавание к Австралии и Новой Зеландии."
 rapanui.204.i: "Курс на Индонезию и Меланезию."
 rapanui.205.t: "Экспедиция «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» прибывает в Океанию"
 rapanui.205.d: "Экипаж #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#!, которым руководит командир [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] благополучно достиг вод Восточной Полинезии и в скором времени начнёт свои исследовательские работы."
 rapanui.205.f: "[Concept('concept_dubois_pacific_expedition', 'Тихоокеанская экспедиция')] может быть отправлена в один из трёх регионов, граничащих с Тихим океаном: Океанию, Австралию или Индонезию. Роль играет не только возможная цель такой поездки, но и регион. Например, кенгуру можно найти только в Австралии. Империалистические великие державы могут отправлять миссионеров и создавать торговые посты в Океании без дипломатического интереса, но не в Индонезии или Австралии. Во время экспедиции можно один раз изменить регион через запись в журнале."
 rapanui.205.g: "Ах, Таити."
 rapanui.206.t: "Экспедиция «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» прибывает в Австралию"
 rapanui.206.d: "Экипаж #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#!, которым руководит командир [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] благополучно достиг вод Тасмании и в скором времени начнёт свои исследовательские работы."
 rapanui.206.g: "Ах, Австралия."
 rapanui.207.t: "Экспедиция «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» прибывает в Индонезию"
 rapanui.207.d: "Экипаж #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#!, которым руководит командир [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] благополучно достиг вод Явы и в скором времени начнёт свои исследовательские работы."
 rapanui.207.g: "Ах, Батавия."
 rapanui.210.t: "Изменить курс"
 rapanui.210.d: "Командир [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] отдаёт приказ изменить курс и покинуть предыдущую зону экспедиции. В каком регионе должен плыть «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»?"
 rapanui.210.f: "«Что бы вы ни делали без уверенности, будет сделано плохо». — Джеймс Кук"
 rapanui.210.g: "Полинезия."
 rapanui.210.h: "Австралия."
 rapanui.210.i: "Индонезия."
 rapanui.210.j: "Держать курс."
 rapanui.211.t: "Экспедиция «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» возвращается"
 rapanui.211.d: "Экспедиция под командованием [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetFullName] вернулась после многолетних путешествий. Будущие поколения будут пользоваться её достижениями."
 rapanui.211.f: "Возвращение домой крупномасштабной исследовательской поездки часто было не концом, а лишь началом долгосрочных исследований. Примером может служить датская экспедиция «Галатея». Корабль вернул 93 контейнера с зоологическим, энтомологическим, ботаническим и геологическим содержимым. Было также 21 ящик с этнографическим материалом, большая коллекция с Явы, а также подарки от учёных из многих городов и портов, посещённых экспедицией. К сожалению, результаты так и не были полностью опубликованы по политическим причинам. Коллекции впоследствии служили в основном справочным материалом."
 rapanui.211.g: "С возвращением домой."
 rapanui.212.t: "Новый натуралист"
 rapanui.212.d: "После долгой экспедиции и связанных с ней интенсивных исследований путешественник-исследователь [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] теперь считается признанным учёным-естествоиспытателем и экспертом в своей области."
 rapanui.212.f: "«В заключение мне кажется, что ничто не может быть более полезным для молодого натуралиста, чем путешествие в далёкие страны. Оно и обостряет, и отчасти утоляет ту потребность и жажду, которую, как замечает сэр Дж. Гершель, человек испытывает, хотя все телесные чувства полностью удовлетворены. Возбуждение от новизны объектов и шанс на успех стимулируют его к повышенной активности. Более того, поскольку множество отдельных фактов скоро становятся неинтересными, привычка к сравнению приводит к обобщению. С другой стороны, поскольку путешественник остаётся в каждом месте лишь на короткое время, его описания должны, как правило, состоять из одних лишь набросков, а не из подробных наблюдений. Отсюда возникает, как я обнаружил на собственном горьком опыте, постоянная тенденция заполнять широкие пробелы в знаниях неточными и поверхностными гипотезами». — Чарльз Дарвин"
 rapanui.212.g: "Он будет полезен нам для наших будущих планов."
 rapanui.213.t: "Приглашённый учёный пишет отчёт"
 rapanui.213.d: "После возвращения из исследовательской поездки [SCOPE.sCharacter('rapanui_scientist').GetFullName] написал[SelectLocalization(SCOPE.sCharacter('rapanui_scientist').IsFemale, 'а', '')] первый отчёт о путешествии в Тихий океан. Результаты будут более подробно изложены в ближайшие несколько лет."
 rapanui.213.f: "За успешными исследовательскими поездками часто следовал длинный научный трактат о событиях, который обычно занимал годы. Знания, которые Чарльз Дарвин получил на «Бигле», были отражены в нескольких трактатах только в последующие годы. Исследовательская поездка австрийской «Новары» была отражена в 21 томе. Результаты экспедиции «Челленджер» продолжали публиковаться до 1895 года, через девятнадцать лет после завершения её путешествия, специально созданным для этого Управлением «Челленджер» в Эдинбурге. Отчёт содержал 50 томов и насчитывал более 29 500 страниц."
 rapanui.213.g: "Ещё одна научная статья для библиотеки."
 rapanui.221.t: "Океанские течения"
 rapanui.221.d: "«[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» попал в удивительно сильное течение."
 rapanui.221.f: "Изучение океанских течений было одной из фундаментальных наук, из которых выросла океанография. Уже в эпоху Великих географических открытий испанские и португальские мореплаватели определили потенциально выгодные течения для быстрого пересечения мировых океанов; известным примером этого является торговля между Манилой на Филиппинах и Акапулько в Мексике. В XIX веке такие океанографические знания были углублены, чтобы получить лучшую, более полную картину того, как именно работает глобальная система океанских течений."
 rapanui.221.g: "Учёные должны провести самые необходимые эксперименты."
 rapanui.221.h: "Следовать за течением, чтобы получить больше знаний."
 rapanui.222.t: "Океанографические исследования"
 rapanui.222.d: "Экспедиция #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#! в настоящее время изучает состав океанской воды и температуру в доселе лишь умеренно исследованном районе."
 rapanui.222.f: "Вода мировых океанов постоянно находится в движении. Основными движущими силами являются приливы и ветер. Кроме того, важную роль в переносе морской воды играют также различия в температуре и солёности, поскольку возникающие в результате этого различия в плотности вызывают течения. Изменения температуры воды, солёности и, следовательно, скорости течения также оказывают влияние на сушу, например, на климат. Самым известным примером этого является Гольфстрим."
 rapanui.222.g: "Свежая морская соль!"
 rapanui.223.t: "Магнетизм"
 rapanui.223.d: "Учёные на борту «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» проводят различные эксперименты для проверки теорий о магнетизме Земли."
 rapanui.223.f: "Дорожный теодолит — это геодезический теодолит, предназначенный для экспедиций, который построен как можно меньше и прочнее, и его настройка возможна также в пути. Известно, что он использовался во время австрийской «экспедиции Новары». Для определения геомагнитных параметров на суше обычно устанавливались станции, где твёрдое основание образовывалось привезёнными с собой «кирпичами». Серии измерений, которые часто длились часами, всегда должны были сопровождаться астрономическими определениями местоположения. Таким образом, удалось определить магнитное поле Земли в общей сложности в 17 местах по всему земному шару."
 rapanui.223.g: "Это улучшит наши физические знания."
 rapanui.223.h: "Пусть [SCOPE.sCharacter('rapanui_scientist').GetLastName] проведет специальный эксперимент."
 rapanui.223.i: "Это улучшит наши океанографические знания."
 rapanui.224.t: "Глубоководные измерения"
 rapanui.224.d: "Экспедиция #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#! проводит сложное глубоководное исследование для определения плотности, температуры и солёности на нижних уровнях моря. Также предстоит выловить из глубин ранее неизвестные формы жизни."
 rapanui.224.f: "С середины XIX века глубоководные исследования играли всё более важную роль. С одной стороны, это было связано с исследованием морского дна для прокладки кабелей в начавшуюся эпоху телеграфии. С другой стороны, должны были быть проверены физические и биологические теории. Долгое время существовало предположение, что за определённой глубиной воды не могут существовать живые существа или что там сохранились «живые ископаемые». Учёные, такие как Ч. У. Томсон, считали, что условия постоянной холодной температуры, темноты и отсутствия течений, волн или сейсмических событий обеспечивали настолько стабильную среду, что эволюция замедлялась или полностью останавливалась. Это сделало глубоководные исследования важной областью для натуралистов, палеонтологов и сторонников теории эволюции."
 rapanui.224.g: "Сосредоточиться на измерениях."
 rapanui.224.h: "Сосредоточиться на ловле глубоководных [Concept('concept_dubois_specimen', 'образцов')]."
 rapanui.225.t: "Антарктида"
 rapanui.225.d: "Сильное течение сбило «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» с курса, и он оказался в вечных льдах Антарктиды. Учёные приятно удивлены, моряки боятся оказаться в ледяной ловушке."
 rapanui.225.f: "Если [Concept('concept_dubois_pacific_expedition', 'тихоокеанская экспедиция')] окажется в Антарктиде, это хорошее время для активизации собственных исследований. Однако есть риск, что корабль может потерять драгоценное время, если зайдёт слишком далеко в ледяное царство. Хотя несколько экспедиций XIX века отваживались заходить в субполярные регионы, даже экспедиция «Челленджер» старалась не проводить слишком много времени во враждебной среде."
 rapanui.225.g: "Идеальное время для океанографических исследований."
 rapanui.225.h: "Идеальное время для метеорологических исследований."
 rapanui.225.i: "Идеальное время для зоологических исследований."
 rapanui.225.j: "Идеальное время для общих исследований."
 rapanui.226.t: "Лёд"
 rapanui.226.d: "Путешествие «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» будет значительно задержано. По-видимому, корабль заперт в вечных льдах."
 rapanui.226.f: "Экспедиция #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#! не может проводить эксперименты."
 rapanui.226.g: "Они теряют драгоценное время!"
 rapanui.227.t: "Неизвестный остров"
 rapanui.227.d: "Экспедиция #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#! обнаружила доселе неизвестный остров. Командир [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] приказал исследовать его более подробно."
 rapanui.227.f: "«Говорят, трусость заразительна; но, с другой стороны, спор — великий ободритель». — Роберт Луис Стивенсон"
 rapanui.227.g: "[SCOPE.sCharacter('rapanui_scientist').GetLastName] отправиться для исследования острова"
 rapanui.227.h: "Отправить небольшую сухопутную экспедицию."
 rapanui.229.t: "Морское течение уносит корабль"
 rapanui.229.d: "Возможно, цена за последний научный эксперимент была немного завышена. «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» уносит течением, а ветер крайне неблагоприятен."
 rapanui.229.f: "Если экспедиционное судно попадёт в океанское течение, оно покинет свою первоначальную зону исследований и будет выброшено в одну из двух других. Куда унесёт корабль — дело случая."
 rapanui.229.g: "Похоже, мы теряем из виду нашу экспедиционную цель."
 rapanui.230.t: "Глубина «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»"
 rapanui.230.d: "Глубоководные измерения экспедиции #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#! обнаружили самую глубокую точку в океане. В знак признания этого открытия эта глубоководная впадина отныне будет носить имя корабля!"
 rapanui.230.f: "23 марта 1875 года на станции отбора проб № 225, расположенной в юго-западной части Тихого океана между Гуамом и Палау, экспедиция «Челленджер» зафиксировала глубину 4475 саженей (26 850 футов; 8184 м), что было подтверждено дополнительным измерением. Как показали более поздние экспедиции с использованием современного оборудования, эта область представляет собой южную оконечность Марианской впадины и является одним из самых глубоких известных мест на дне океана. С тех пор были обнаружены современные измерения до 6012 саженей (36 070 футов; 10 994 м) вблизи места первоначального измерения «Челленджера». Обнаружение этой глубины «Челленджером» стало ключевым открытием экспедиции в расширении океанографических знаний о глубине и протяжённости океана и теперь носит имя судна — впадина Челленджера."
 rapanui.230.g: "Исторический день."
 rapanui.231.t: "Остров черепах"
 rapanui.231.d: "Во время своего путешествия экспедиция #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#! наткнулась на колонию черепах. Остров кишит этими рептилиями."
 rapanui.231.f: "Даже издалека экипаж мог видеть, что пляж острова, казалось, движется. По-видимому, это было излюбленное место зелёных морских черепах для откладки яиц. Как только они высадились на берег, некоторые моряки захотели пошалить с ничего не подозревающими животными: кто-то предлагал украсть черепашьи яйца, а кто-то — открыто заявлял о желании наконец попробовать знаменитый черепаховый суп. Однако, вняв настоятельному призыву учёных, командир [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] добился того, что моряки — хотя и неохотно — отказались от своих кулинарных амбиций."
 rapanui.231.g: "Мы должны поймать одну из черепах."
 rapanui.231.h: "Изучить черепах и собрать несколько образцов."
 rapanui.232.t: "Манта"
 rapanui.232.d: "В поисках новых экзотических рыб учёные экспедиции #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#! заметили великолепного, гигантского ската-манту."
 rapanui.232.f: "«[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» бросил якорь лишь на короткое время утром, чтобы исследовать местную популяцию рыб в заливе. Пока некоторые учёные собирали образцы на шлюпке, мимо носа проплыл такой ошеломляюще красивый гигантский скат, что учёные не могли поверить своим глазам — такой необыкновенный экземпляр они знали только из морских баек досовременных времён. Однако сообщение остальной части экипажа вызвало двоякие чувства. Некоторые зоологи настаивали на том, что лучше всего поймать животное и перевезти его домой в бочке с водой. Другие учёные утверждали, что лучше наблюдать за животным в его среде обитания, чтобы сделать лучшие научные выводы; и, наконец, группа заявила, что следует оставить ската в покое и продолжить сбор образцов. Командир [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName], с другой стороны, объявил совершенно иные планы: он предложил застрелить животное и пусть [SCOPE.sCharacter('rapanui_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('rapanui_ruler').GetFullName] получит его в качестве трофея, как знак признания — будь то из благодарности за финансовую поддержку со стороны правительства или по карьерным соображениям, вопрос открытый."
 rapanui.232.g: "Мы должны попытаться поймать это удивительное животное."
 rapanui.232.h: "Это был бы отличный трофей для нашего правителя."
 rapanui.232.i: "Пусть [SCOPE.sCharacter('rapanui_scientist').GetLastName] изучит его."
 rapanui.232.j: "Просто наслаждайтесь природой и вместо этого соберите несколько образцов."
 rapanui.233.t: "Поймать кенгуру"
 rapanui.233.d: "Во время стоянки на австралийском побережье разведчики «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» установили контакт с местными жителями. Они предупредили экипаж о красных кенгуру в этом районе."
 rapanui.233.f: "«Но это же большие, волосатые монстры!» — сказал валлийский поселенец, когда зоолог, профессор Баттонхолтостер, радостно отправился на охоту за красным кенгуру. Чего профессор Баттонхолтостер не мог предположить, так это того, что австралийские красные кенгуру были одними из самых больших хулиганов в животном мире, и что валлийский поселенец даже преуменьшил это. И хотя поселенец неоднократно указывал на кровавые последствия печально известного красного кенгуру из Мёртвой кошачьей лощины, это было слабой подготовкой к тому, что на самом деле предстояло сделать профессору Баттонхолтостеру. Нетерпеливые коллеги хотели особо отметить, что до экспедиции #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#! профессор Баттонхолтостер провёл 33 года в унылом подвале в университете и был в едва сносном состоянии, чтобы связываться с крупнейшим сухопутным животным Австралии; единственная силовая тренировка, которую профессор Баттонхолтостер провёл за последние несколько лет, заключалась в складывании тарелок с раскрошенным вишнёвым пирогом. Хотя коллеги согласились с тем, что поиск гигантского кенгуру полезен для общих зоологических исследований, сомнения осмелились высказать, был ли это правильный подход."
 rapanui.233.g: "Нам нужен этот кенгуру — что может пойти не так?"
 rapanui.234.t: "Сделка с коалой"
 rapanui.234.d: "Во время высадки на берег с нами связался австралийский бродячий торговец. Это торговец животными. Он говорит, что у него есть для нас «пушистый медведь», которого вы больше нигде в мире не найдёте..."
 rapanui.234.f: "Учёные экспедиции #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#! быстро определили, что предполагаемый медведь — это коала и, следовательно, сумчатое. Тем не менее, интерес зоологов и биологов велик. Однако есть подвох: торговец не хочет денег, он хочет взамен другое животное. Он требует горностая. Это требование удивило некоторых членов экипажа, но торговец домашними животными подчёркивает, что ласки, хорьки и подобные животные пользуются спросом в Австралии и Новой Зеландии. Причина в следующем: поселенцы завезли кроликов, которые не только нанесли вред местной флоре и фауне, но и фермерскому хозяйству, поскольку у них не было естественных врагов. Теперь куньи животные пользуются большим спросом для борьбы с кроликами. Может ли это иметь какие-либо последствия? Торговец домашними животными просто пожимает плечами — и спрашивает, есть ли у нас горностай или нет."
 rapanui.234.g: "Мы с радостью обменяем нашего горностая на его коалу."
 rapanui.234.h: "Вред, который такой горностай может нанести в Австралии, был бы ужасен!"
 rapanui.234.i: "Какое странное предложение. Нас больше интересуют образцы."
 rapanui.235.t: "Самое странное животное"
 rapanui.235.d: "В портовом городе контактное лицо связало нас с известным охотником и ловцом животных, который представил учёным потрясающее животное."
 rapanui.235.f: "Никто из научных сотрудников никогда не слышал о таком животном, не говоря уже о том, чтобы его видеть. Хотя ходили слухи о fascinante дикой природе Австралии, было предупреждение, что аборигены ранее рассказывали европейцам о fantastique животных, таких как баньип, которые оказались всего лишь сказками. Однако две вещи вызвали у учёных дальнейшие сомнения. С одной стороны, было требование охотника на животных не прикасаться к химере из утки, бобра и выдры, а также не подходить к ней слишком близко. Это вызвало у некоторых зоологов подозрения, что это может быть чучело. Биолог выяснил, что утку засунули в шкуру выдры и прикрепили бобровый хвост. Цена вызвала второе сомнение: для покрытия этих расходов потребуется субсидия из столицы. Не исключено, что охотник на животных предъявил и другие требования на деньги."
 rapanui.235.g: "КУПИТЬ!"
 rapanui.235.h: "Это животное явно подделка. Я подозреваю, что за этой политикой продаж стоит сомнительная бизнес-модель."
 rapanui.236.t: "Тайны Борнео"
 rapanui.236.d: "Экспедиция #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#! сделала интересную находку в лесах Борнео."
 rapanui.236.f: "Команда учёных, местных гидов и помощников, а также вооружённое сопровождение обнаружили одинокого орангутана во время похода по лесам Борнео. Есть несколько вариантов, как поступить с находкой. Орангутаны обычно одиночки, и с приходом европейцев они стали значительно реже и пугливее. Энтомологи, с другой стороны, очень любят этот экземпляр и хотят продолжить поиски жуков."
 rapanui.236.g: "Идеальное животное для зоопарка."
 rapanui.236.h: "Пусть [SCOPE.sCharacter('rapanui_scientist').GetLastName] изучит это прекрасное создание."
 rapanui.237.t: "Дракон"
 rapanui.237.d: "На Зондских островах экипаж «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» сталкивается с доисторически выглядящей рептилией."
 rapanui.237.f: "На Зондских островах командир [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] должен был наблюдать, как на скалах ждала чудовищная рептилия. Зоолог подтвердил, что это был самый большой и самый великолепный варан, которого он когда-либо видел, что ещё больше убедило командира в том, что он обнаружил самое отвратительное существо в своей жизни. Конечно, естествоиспытатели, как всегда, были в восторге."
 rapanui.237.g: "Нам тоже нужен такой дракон для дома."
 rapanui.237.h: "Следует изучить поведение этого существа. С хорошего расстояния."
 rapanui.237.i: "Учёные должны скорее сосредоточиться на жуках, птицах, рыбах. Или бабочках. На чём угодно, только не на этом отвратительном существе."
 rapanui.238.t: "Кенгуру пойман!"
 rapanui.238.d: "Экипажу удалось заманить красного кенгуру в ловушку, связать его и увезти. Теперь он надёжно заперт в клетке."
 rapanui.238.f: "«Пожалуйста, прокати меня на спине!»\nСказала Утка Кенгуру.\n«Я бы сидела совсем тихо и говорила только „Кря“,\nВесь долгий день напролёт!\nИ мы бы пошли к Ди и Джелли Бо Ли,\nПо суше и по морю;—\nПожалуйста, прокати меня! О, сделай это!»\nСказала Утка Кенгуру.\n\nСказал Кенгуру Утке,\n«Это требует небольшого размышления;\nВозможно, в целом это принесло бы мне удачу,\nИ кажется, есть только одно возражение,\nА именно, если вы позволите мне быть таким смелым,\nВаши лапы неприятно мокрые и холодные,\nИ, вероятно, вызвали бы у меня ру-\nМатизм!» — сказал Кенгуру.\n- Эдвард Лир"
 rapanui.238.g: "Отправить его домой!"
 rapanui.239.t: "Член экипажа забит до смерти"
 rapanui.239.d: "После кровавой бойни, в результате которой несколько сбитых с ног, тяжело раненных моряков, помятые очки и напуганные профессора, экспедиция, к сожалению, вынуждена признать неудачу в поимке кенгуру. Ассистент-исследователь был даже забит до смерти разъярённым зверем."
 rapanui.239.g: "Ужас!"
 rapanui.240.t: "Линия [SCOPE.sCharacter('rapanui_scientist').GetLastName]"
 rapanui.240.d: "С открытием фаунистической границы между Азией и Австралией [SCOPE.sCharacter('rapanui_scientist').GetFullName] внес[SelectLocalization(SCOPE.sCharacter('rapanui_scientist').IsFemale, 'ла', '')] важный вклад в биологию и поддержал[SelectLocalization(SCOPE.sCharacter('rapanui_scientist').IsFemale, 'а', '')] теорию эволюции. В его честь эта линия будет носить его имя."
 rapanui.240.f: "«Я увидел здесь впервые много австралийских форм, которые полностью отсутствуют на островах дальше на запад. Маленькие белые какаду были в изобилии, и их громкие крики, яркий белый цвет и красивые жёлтые хохолки делали их яркой чертой пейзажа. Это самая западная точка на Земле, где встречаются птицы из этого семейства. Натуралист, путешествующий на восток, сначала находит несколько маленьких медососов из семейства Ptilotis и странных курганных башен (Megapodius Gouldii). (...) На острове Ломбок, который отделён от Бали проливом шириной менее двадцати миль, я, естественно, ожидал снова встретить некоторых из этих (балийских) птиц; но во время трёхмесячного пребывания там я ни разу не видел ни одной из них, но обнаружил совершенно иную серию видов, большинство из которых были чрезвычайно неизвестны не только на Яве, но и на Борнео, Суматре и полуострове Малакка». — Альфред Рассел Уоллес"
 rapanui.240.g: "Линия [SCOPE.sCharacter('rapanui_scientist').GetLastName]? Звучит неплохо."
 rapanui.241.t: "Редкие птицы"
 rapanui.241.d: "Научные ассистенты экспедиции #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#! обнаружили несколько гнёзд с экзотическими птицами."
 rapanui.241.f: "«Эти птицы очень близки по внешнему виду к Thenca Чили или Callandra Ла-Платы. (...) В каждом виде исключительно встречается: повадки всех неразличимы. Когда я вспоминаю тот факт, что по форме тела, форме чешуи и общему размеру испанцы могут сразу же сказать, с какого острова была привезена любая черепаха. Когда я вижу эти острова в пределах видимости друг от друга и обладающие лишь скудным запасом животных, населённые этими птицами, лишь незначительно отличающимися по строению и занимающими одно и то же место в природе, я должен подозревать, что это всего лишь разновидности. Единственный подобный факт, о котором я знаю, — это постоянно утверждаемое различие между волкоподобной лисой Восточных и Западных Фолклендских островов. Если в этих замечаниях есть хоть малейшее основание, то зоология архипелагов будет стоить изучения; ибо такие факты подорвали бы стабильность видов». — Чарльз Дарвин"
 rapanui.241.g: "Наблюдать и изучать птиц."
 rapanui.241.h: "Поймать птиц и забрать яйца."
 rapanui.242.t: "Морские образцы"
 rapanui.242.d: "Наши искатели образцов вчера выловили богатый улов новых морских существ."
 rapanui.242.f: "Экспедиция Уилкса сыграла важную роль в развитии науки XIX века, особенно в росте американского научного истеблишмента. Многие из видов и других предметов, найденных экспедицией, помогли сформировать основу коллекций нового Смитсоновского института. С помощью учёных экспедиции, которых члены военно-морского экипажа насмешливо называли «копателями моллюсков» и «ловцами жуков», было собрано более 60 000 образцов растений и птиц. В ходе экспедиции было собрано ошеломляющее количество данных и образцов, включая семена 648 видов, которые позже обменивались, высаживались и отправлялись по всей стране. Высушенные образцы были отправлены в Национальный гербарий, который сейчас является частью Смитсоновского института. Было также 254 живых растения, которые в основном прибыли с обратного пути путешествия, которые были помещены в недавно построенную теплицу в 1850 году, которая позже стала Ботаническим садом Соединённых Штатов."
 rapanui.242.g: "Золото биологов."
 rapanui.243.t: "Фантастические окаменелости"
 rapanui.243.d: "Во время своего путешествия экспедиция #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#! обнаружила месторождение с ранее неизвестными окаменелостями."
 rapanui.243.f: "Находки окаменелостей имели большое значение во время экспедиции «Бигля». После возвращения Ричард Оуэн, в частности, посвятил себя описанию окаменелостей, обнаруженных Чарльзом Дарвином. Среди прочего, «Бигль» обнаружил новые виды гигантских ленивцев, таких как милодон, и гигантского броненосца (глиптодон). Среди окаменелостей, найденных недалеко от Санта-Фе, был зуб лошади, который озадачил Дарвина, поскольку ранее считалось, что лошади прибыли в Америку только в XVI веке. Оуэн подтвердил, что зуб лошади принадлежал вымершему южноамериканскому виду, который он назвал Equus curvidens в 1845 году."
 rapanui.243.g: "Искать окаменелости."
 rapanui.244.t: "Строматолиты"
 rapanui.244.d: "Учёные обнаружили большую колонию строматолитов в заливе, где стоит на якоре «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»."
 rapanui.244.f: "Строматолиты — это биогенные осадочные породы, образованные в результате захвата и связывания частиц осадка или осаждения растворённых веществ в результате роста и метаболизма микроорганизмов в водоёме. Они в основном слоистые и часто состоят из очень тонкослоистого известняка. Некоторые напоминают цветную капусту своей раковинной структурой из клубней, столбиков или волнистых слоёв. Самые древние известные окаменелости — это в основном строматолиты, и поэтому они могут дать ключ к разгадке того, как жизнь развивалась от очень простых до более сложных форм. Строматолиты считаются первыми узнаваемыми структурами, построенными организмами. Они возникли в докембрии, до 3,5 миллиардов лет назад. 3,45 миллиарда лет — возраст серии Уорравуна, найденной на месте Северного полюса в регионе Пилбара в Западной Австралии. В некоторые периоды истории Земли — задолго до появления кораллов — строители строматолитов были важными рифостроителями. До миллиарда лет назад строматолиты были широко распространены почти во всех прибрежных водах. 700 миллионов лет назад разнообразие и распространение строматолитов сократились. Очень редки строматолиты возрастом 450 миллионов лет."
 rapanui.244.g: "Собрать эти [Concept('concept_dubois_specimen', 'образцы')]."
 rapanui.244.h: "Собрать эти окаменелости."
 rapanui.244.i: "Изучить строматолиты."
 rapanui.245.t: "Окаменевшая флора"
 rapanui.245.d: "Экипаж «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» обнаружил отпечатки папоротников возрастом в миллионы лет на склоне скалы."
 rapanui.245.f: "В каменноугольном периоде (около 360-300 миллионов лет назад) папоротники (в более крупных формах, чем сегодня, обычно называемые древовидными папоротниками) вместе с хвощами и плаунами образовывали огромные леса и создали основу для большинства современных месторождений угля. Самые древние ископаемые находки относятся к нижнему девону (около 400 миллионов лет назад). Таким образом, папоротники, вероятно, старше семенных растений, которые впервые появились в верхнем девоне."
 rapanui.245.g: "Краеугольный камень промышленной революции."
 rapanui.246.t: "Янтарное ожерелье"
 rapanui.246.d: "Вождь племени предложил продать нам историческое янтарное ожерелье, в котором застыли доисторические насекомые. Однако командир [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] не может решить, как поступить с находкой."
 rapanui.246.f: "Предложение от местного вождя стало неожиданностью. По-видимому, туземец уже слышал о путешествии «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» и надеялся на хорошую сделку. После того как учёные осмотрели драгоценность, разгорелся большой спор о том, что с ней делать. Одна группа настаивала на её покупке для музея, чтобы показать посетителям, как сохраняются насекомые. Другая группа настаивала на том, чтобы разобрать драгоценность на детали и изучить каждую окаменелость в отдельности. Пока натуралисты и палеонтологи спорили о том, как поступить с явно палеонтологической находкой, антропологи и археологи возражали, что эта вещь имеет культурное значение. Офицерский состав, с другой стороны, видел в научной дискуссии ненужную ссору и выступал за то, чтобы не тратить деньги на бесполезную вещь и продолжать путешествие."
 rapanui.246.g: "Ожерелье имеет палеонтологическое значение."
 rapanui.246.h: "Ожерелье имеет археологическое значение."
 rapanui.246.i: "Разбить ожерелье и изучить его."
 rapanui.246.j: "Ожерелье не имеет значения."
 rapanui.247.t: "Австралийская кость"
 rapanui.247.d: "Матросы экспедиции #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#! рано утром обнаружили необыкновенное палеонтологическое место. Даже дилетант мог видеть, что в этом месте было что-то особенное."
 rapanui.247.f: "Открытый слой осадочных пород с первого взгляда показал, что окаменелости отлично сохранились. Однако, помимо многочисленных находок, внимание моряков и присоединившихся к ним позже учёных привлекла странная кость, которая вскоре получила прозвище «австралийская кость». Вскоре стало очевидно, что палеонтолог с методически правильной работой, вероятно, сможет выявить здесь больше, чем голые руки неопытных рабочих."
 rapanui.247.g: "Профессор [SCOPE.sCharacter('rapanui_scientist').GetLastName] должен её раскопать."
 rapanui.247.h: "Собрать как можно больше окаменелостей."
 rapanui.250.t: "Яванский человек"
 rapanui.250.d: "Профессор [SCOPE.sCharacter('rapanui_scientist').GetLastName] обнаружил[SelectLocalization(SCOPE.sCharacter('rapanui_scientist').IsFemale, 'а', '')] необыкновенные окаменелости во время экспедиции #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#!. Это скелет доисторического человека, жившего миллион лет назад. Научная сенсация!"
 rapanui.250.f: "Окаменелости, впервые обнаруженные Эженом Дюбуа в 1891 году на берегах реки Соло близ Тринила в Восточной Яве, называются яванским человеком. По современным данным, их возраст составляет около миллиона лет. Это были первые окаменелости гомининов, обнаруженные за пределами Европы, и, после неандертальцев, второе свидетельство существования ископаемых родственников анатомически современных людей (Homo sapiens). Находки с Явы сначала назывались Anthropopithecus, а затем Pithecanthropus erectus. Сегодня большинство палеоантропологов относят их к виду Homo erectus, при этом их происхождение иногда — как предложил Франц Вайденрайх в 1940 году — подчёркивается добавлением эпитета подвида: Homo erectus javanensis. Более чем через 50 лет после находки Дюбуа Ральф фон Кёнигсвальд вспоминал, что «ни одно другое палеонтологическое открытие не вызвало такой сенсации и не привело к такому разнообразию противоречивых научных мнений»."
 rapanui.250.g: "Это недостающее звено?"
 rapanui.251.t: "Ценный артефакт"
 rapanui.251.d: "Во время посещения племени на отдалённом острове мы получили ценный океанический артефакт."
 rapanui.251.f: "Командир [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] на самом деле хотел лишь сделать короткую высадку на берег, чтобы пополнить запасы провизии и пресной воды со своим экипажем. Остров, который находился скорее на окраине торговых путей, по-видимому, имел мало контактов с внешним миром. Однако из-за недоразумения вождь, по-видимому, предположил, что командир — принц, и подарил ему художественную деревянную скульптуру. Экипаж «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» подарил ему обычные стеклянные шарики, что очень обрадовало туземца."
 rapanui.251.g: "Это место в музее."
 rapanui.252.t: "Открыт новый залив"
 rapanui.252.d: "Экспедиция #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#! смогла доказать, что предполагаемый остров — всего лишь полуостров, и таким образом открыла новый залив. До сих пор нет согласия по поводу названия."
 rapanui.252.f: "Во время своего пребывания в архипелаге Бисмарка в Тихом океане в августе 1875 года «Газель» исследовала естественную гавань залива Бланш на северо-востоке острова Новая Британия (Новая Британия, ранее Новая Померания). По этому случаю было признано, что восточная часть Новой Британии является полуостровом, соответственно, он был назван «полуостров Газель» в честь корабля. Это название сохранилось до наших дней. Кроме того, проход между Новой Ирландией и островом Дьяул был назван «проливом Газель», а естественная гавань на западном побережье Бугенвиля — «гаванью Газель»."
 rapanui.252.g: "Назвать залив в честь учёного, который его измерил: залив [SCOPE.sCharacter('rapanui_scientist').GetLastName]."
 rapanui.252.h: "Он должен быть назван в честь нашего главы государства: залив [SCOPE.sCharacter('rapanui_ruler').GetFullName]."
 rapanui.252.i: "Дать ему имя его первооткрывателя: залив [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName]."
 rapanui.252.j: "Экспедиция никогда не должна быть забыта: залив «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»."
 rapanui.253.t: "Торговый пост"
 rapanui.253.d: "Экспедиция #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#! нашла отличную якорную стоянку."
 rapanui.253.f: "Когда командир [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] вошёл в залив, он заметил, насколько защищённым может быть это место для будущей экспедиции или торгового предприятия. Более поздний выход на берег выявил не только хорошее качество почвы для плантационного выращивания, но и приятный климат. Некоторые коммерческие советники немедленно предложили сделать всё возможное, чтобы открыть это место для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Учёные, с другой стороны, указали, что научная миссия может быть пренебрежена из-за такого империалистического поведения."
 rapanui.253.g: "Построить торговый пост."
 rapanui.253.h: "Просто нанести это место на карту."
 rapanui.254.t: "Миссия в [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_VP')]?"
 rapanui.254.d_cat: "Капеллан «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]», отец [SCOPE.sCharacter('rapanui_missionary_scope').GetLastName], узнал, что коренные жители [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_RP')] никогда не слышали об Иисусе Христе. Он просит разрешения покинуть корабль и обратить коренных жителей в католическую веру."
 rapanui.254.d_pro: "Капеллан «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]», преподобный [SCOPE.sCharacter('rapanui_missionary_scope').GetFullName], узнал, что коренные жители [SCOPE.sCountry('rapanui_mission_country').GetAltNameNoFlag('RU_CL_RP')] никогда не слышали об Иисусе Христе. Он просит разрешения покинуть корабль и обратить коренных жителей в протестантскую веру."
 rapanui.254.f: "Недавно на борт поднялись несколько торговцев, чтобы сообщить нам новости региона и пополнить запасы экспедиции. Разговор также зашёл о христианизированных и языческих культурах этого района. Корабельный капеллан внимательно слушал и с удивлением обнаружил, что его единоверцы ещё не отважились зайти в этот район. Страх перед каннибалами, который то и дело возникает на островах, удерживал людей Божьих от высадки на берег в последние годы."
 rapanui.254.g_cat: "Иди с Богом."
 rapanui.254.g_pro: "Иди с Богом."
 rapanui.254.h: "Это слишком опасно!"
 rapanui.255.t: "Враждебная реакция"
 rapanui.255.d: "На самом деле, посещая [SCOPE.sCountry('rapanui_hostile_country').GetNameNoFlag], мы намеревались подчеркнуть наше благожелательное отношение и улучшить нашу международную репутацию. К сожалению, на другой стороне это было воспринято иначе."
 rapanui.255.f: "На борту «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» находился консул, по совету которого [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetFullName] решил[SelectLocalization(SCOPE.sCharacter('rapanui_pacific_expedition_leader').IsFemale, 'а', '')] нанести короткий визит местному правителю. Однако, судя по всему, командир не был знаком с местными обычаями и, сам того не ведая, оскорбил нескольких высокопоставленных чиновников. В чём именно заключался этот промах, так и осталось загадкой, но ошибка, по-видимому, была серьёзной."
 rapanui.255.g: "Серьёзная оплошность, которую мы должны исправить."
 rapanui.255.h: "Обвинить командира."
 rapanui.255.i: "Мы ни за что не извиняемся."
 rapanui.256.t: "Ныряльщики за жемчугом"
 rapanui.256.d: "Во время своего путешествия экспедиция #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#! обнаружила тихую маленькую деревню, которая живёт в основном за счёт ловли драгоценного жемчуга. Весь экипаж очарован этим местом и его изобилием жемчуга."
 rapanui.256.f: "Командир [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] нашёл рыбацкую деревню, которая уже имела репутацию среди соседних островов, что лучшие ныряльщики за жемчугом в Южных морях добывали самые красивые драгоценности из глубин океана. Люди там бедные, но честные, и, похоже, очень мало торговали. Поэтому [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] рассматривает возможность заключить сделку с коренными жителями, чтобы сделать жемчуг доступным и в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]. Однако некоторые офицеры на борту, а также непредсказуемый матросский сброд указали, что у нашего корабля достаточно вооружения и огневой мощи, чтобы просто взять то, что по праву принадлежит нам..."
 rapanui.256.g: "Установить небольшую торговую связь."
 rapanui.256.h: "[Concept('concept_dubois_naturalist', '#b #GREEN Натуралист#!#!')] должен исследовать это место."
 rapanui.256.i: "Это наш жемчуг."
 rapanui.257.t: "Дипломатическая делегация"
 rapanui.257.d: "Встреча с представителями [SCOPE.sCountry('rapanui_friendly_country').GetAltNameNoFlag('RU_CL_RP')] прошла с полным успехом. Командир [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetLastName] нашёл правильный тон и был услышан."
 rapanui.257.f: "После освежающего обезьяньего мозга на льду командир «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» показал, что он может держаться не только на море, но и в личном общении. После обычных дипломатических любезностей посланники [SCOPE.sCountry('rapanui_friendly_country').GetAltNameNoFlag('RU_CL_RP')] поражены галантным джентльменом. [ROOT.GetCountry.GetNameNoFlag] должен использовать этот шанс, чтобы набрать очки на международной арене."
 rapanui.257.g: "Подчеркнуть наши мирные намерения."
 rapanui.257.h: "Похвалить командира."
 rapanui.260.t: "Кругосветное плавание"
 rapanui.260.d: "Командир [SCOPE.sCharacter('rapanui_pacific_expedition_leader').GetFullName] совершил кругосветное плавание на «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»!"
 rapanui.260.f: "Ряд известных исследовательских экспедиций использовали возможность совершить кругосветное плавание; во многих случаях это был также самый короткий и эффективный путь. Известными примерами являются «Бигль», «Челленджер» (оба Великобритания), «Новара» (Австрия), «Газель» (Пруссия) и «Галатея» (Дания)."
 rapanui.260.g: "Вокруг света!"
 rapanui.261.t: "Более точные карты"
 rapanui.261.d: "Приглашённый учёный [SCOPE.sCharacter('rapanui_scientist').GetLastName] провёл время в экспедиции #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#!, исправляя некоторые ошибки измерений, допущенные прошлыми картографами, тем самым значительно улучшив картографический материал."
 rapanui.261.f: "Хотя карты XIX века уже были значительно лучше, чем в предыдущем столетии, они не были лишены ошибок. Снова и снова наносились острова, которых не существовало; а неизвестные острова не вносились. Даже в начале XX века некоторые регионы Тихого океана всё ещё были неполно или неверно нанесены на карту. Исчезновение пилота Амелии Эрхарт в 1937 году также можно объяснить тем, что острова Хауленд, к которым она направлялась, были нанесены неверно на мили."
 rapanui.261.g: "Хорошая работа."
 rapanui.262.t: "Скорректированные расстояния"
 rapanui.262.d: "При пересмотре карт экспедиции #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#! сопровождающий учёный [SCOPE.sCharacter('rapanui_scientist').GetLastName] определил, что ранее указанные на картах расстояния неверны. Он обновит картографический материал."
 rapanui.262.f: "Лучшие технические предпосылки и ритм, с которым проходили научные экспедиции, чрезвычайно улучшили исходное положение для более точных измерений расстояний. Девиз таков, что со времён последнего путешествия Джеймса Кука, за исключением двух полюсов, почти нечего было открывать. Однако, как эти открытия соотносились друг с другом, не всегда было ясно. С введением жёстких графиков и сроков в мировой экономике стало всё более важным производить не только грубые, но и очень точные измерения."
 rapanui.263.t: "Экзотические семена"
 rapanui.263.d: "Во время высадки на берег профессор [SCOPE.sCharacter('rapanui_scientist').GetLastName] из экспедиции #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#! нашёл несколько особых семян, представляющих большой научный и сельскохозяйственный интерес."
 rapanui.263.f: "Растения из Тихого океана и Восточной Азии и их транспортировка не были редкостью. Настоящей причиной экспедиции «Баунти» 1789 года, закончившейся знаменитым мятежом, изначально было взятие черенков хлебного дерева для выращивания в Карибском бассейне. Это должно было обеспечить рабочих плантаций дешёвым основным продуктом питания, чтобы избежать голода. Однако в XIX веке к этому добавились сбор и научные исследования."
 rapanui.263.g: "Семена хорошо впишутся в научную коллекцию."
 rapanui.263.h: "Новые семена должны использоваться в сельском хозяйстве."
 rapanui.264.t: "Новый вид жуков"
 rapanui.264.d: "Профессор [SCOPE.sCharacter('rapanui_scientist').GetLastName] открыл[SelectLocalization(SCOPE.sCharacter('rapanui_scientist').IsFemale, 'а', '')] на одном острове новый вид жуков и назвал его в свою честь. Это чрезвычайно отвратительное животное, но для учёного это самый счастливый день в его жизни."
 rapanui.264.f: "Кто бы не хотел, чтобы в какой-то момент в его честь назвали уродливого, слизистого и отвратительного жука и навсегда связали его с его фамилией?"
 rapanui.264.g: "Поздрав... ляю."
 rapanui.265.t: "Небольшое образование"
 rapanui.265.d: "Во время экскурсии на берег профессор [SCOPE.sCharacter('rapanui_scientist').GetLastName] нашёл небольшое геологическое образование, в котором было захоронено большое количество окаменелостей. До сих пор это месторождение не было отмечено ни на одной карте."
 rapanui.265.f: "«Существует и другая, связанная с этим трудность, которая гораздо серьёзнее. Я имею в виду то, каким образом виды, принадлежащие к нескольким основным отделам животного царства, внезапно появляются в самых нижних известных ископаемых породах... В настоящее время этот случай должен оставаться необъяснимым; и его можно по праву приводить в качестве веского аргумента против (эволюционных) взглядов, изложенных здесь». — Чарльз Дарвин"
 rapanui.265.g: "Окаменелостей никогда не бывает много."
 rapanui.266.t: "Композита"
 rapanui.266.d: "Профессор [SCOPE.sCharacter('rapanui_scientist').GetLastName] вне себя от радости: он действительно собрал несколько редких позднедевонских композит, одну из древнейших форм жизни, которые он когда-либо находил!"
 rapanui.266.f: "Композита — вымерший род брахиопод, живший с позднего девона до поздней перми. Композита имела космополитическое глобальное распространение, обитая на всех континентах, кроме Антарктиды. У композиты была гладкая раковина с более или менее отчётливой складкой и бороздой и круглым отверстием для ножки на клапане ножки. Композита включена в семейство Athyrididae (отряд Athyridida) и помещена в подсемейство Spirigerellinae. Только филистеры признали бы в этой почтенной окаменелости простую ракушку."
 rapanui.266.g: "Это так... захватывающе."
 rapanui.267.t: "Южное небесное полушарие"
 rapanui.267.d: "[concept_verrier_astronomer] [SCOPE.sCharacter('rapanui_scientist').GetFullName] широко использует путешествие «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» для наблюдения за южным ночным небом. Здесь он наблюдает явления, которые едва ли увидел бы в северном полушарии."
 rapanui.267.f: "Южное небо показывает немного больше звёзд, чем северное, потому что центр Млечного Пути находится примерно в 20° к югу от экватора в созвездии Стрельца. При хорошей видимости южное небо включает более 2000 неподвижных звёзд, видимых невооружённым глазом, и от 20 000 до 40 000 при использовании бинокля. В то время как на экваторе вы можете видеть ровно половину южного неба и половину северного неба в любое время года и ночи, в более высоких южных широтах Южной Африки или Австралии вы можете видеть около двух третей южного неба в любое время и более 80 процентов в южной части Южной Америки."
 rapanui.268.t: "Солнечное затмение"
 rapanui.268.d: "Приглашённый учёный [SCOPE.sCharacter('rapanui_scientist').GetFullName] имел необыкновенную возможность пережить солнечное затмение на борту «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» и смог провести обширные астрономические исследования!"
 rapanui.268.f: "С середины XIX века астрономические общества некоторых промышленно развитых стран начали организовывать экспедиции на более далёкие континенты для наблюдения за солнечными затмениями. Основным объектом интереса было наблюдение короны. Намёки на элемент гелий были получены французским астрономом Жюлем Жансеном в Индии во время полного солнечного затмения 18 августа 1868 года. Полное солнечное затмение 29 мая 1919 года, наблюдавшееся с африканского острова Принсипи экспедицией под руководством Артура Стэнли Эддингтона, привлекло особое внимание в связи с теорией относительности, разработанной Альбертом Эйнштейном несколькими годами ранее, которая, среди прочего, предсказывала отклонение света далёких звёзд гравитационным полем Солнца — что было подтверждено наблюдениями."
 rapanui.268.g: "Отлично!"
 rapanui_avantgarde_navy_modifier: "Авангардный флот"
 rapanui.300.t: "Конец эпохи"
 rapanui.300.d: "С развитием современных кораблей, которые могут использоваться по всему миру, исследовательские поездки в Тихий океан больше не являются исключением, а скорее обычным делом. Некоторые учёные уже говорят, что они нашли и каталогизировали всё, что можно было найти в этом некогда отдалённом регионе."
 rapanui.300.f: "Эпоха парусного спорта и экспедиций окончательно закончилась. С триумфом империализма и колониализма и всё более тесным взаимопроникновением мировой экономики и глобальной коммуникации Тихий океан теперь рассматривается как один из многих регионов. Добраться до другого конца света больше не приключение, а вопрос времени. Человечество вступает в эпоху, в которой, кажется, всё исследовано, и даже Южные моря потеряли своё прежнее очарование как убежище экзотики."
 rapanui.300.g: "Больше нечего открывать."
 rapanui.1001.t: "Тайны острова Пасхи"
 rapanui.1001.d: "Одно из наших исследовательских судов сделало остановку на острове Пасхи. [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName], начинающий картограф, интересуется утраченной культурой острова."
 rapanui.1001.f: "На первый взгляд, немногие места казались такими же пустынными, как остров, который был назван островом Пасхи. Рапа-Нуи, как называли его местные жители, давно потерял свои леса. Фрукты или зерно были редкостью. Вулканический кратер возвышается над островом, который, кажется, имеет неизвестное, но великое прошлое. Его жители живут, как феллахи Египта, на плечах гигантов. [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName], амбициозный авантюрист, считает, что на этом острове на краю света может быть что-то скрыто. Он сошёл на берег и по собственной инициативе собрал нескольких человек."
 rapanui.1001.g: "Какое таинственное место..."
 rapanui.1002.t: "Рапа-Нуи"
 rapanui.1002.d: "Экипаж, отправившийся исследовать внутренние районы острова Пасхи, был встречен местным племенем рапа-нуи."
 rapanui.1002.f: "Коренные жители, которые называют себя рапа-нуи, говорят на языке, имеющем близкое сходство с разновидностями, на которых говорят в восточной Полинезии. Хотя остров находится ближе к американскому материку, чем многие отдалённые полинезийские острова, люди могут очень ясно понять, что народ должен был прийти из океанического региона много веков назад. Они гостеприимны, приглашают людей поесть. Но некоторые участники небольшой экспедиции предупреждают, что следует избегать их, если действительно хочешь найти спрятанные сокровища."
 rapanui.1002.g: "Мы принимаем их любезное приглашение."
 rapanui.1002.h: "Этим дикарям нельзя доверять."
 rapanui.1011.t: "Церемониальные танцы"
 rapanui.1011.d: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName] во главе своего отряда проводит некоторое время с рапа-нуи острова Пасхи."
 rapanui.1011.f: "Многие тайны окутывают остров Пасхи. На совместном обеде с местными жители узнают лишь новые фрагменты истории и религии рапа-нуи. Ежегодный турнир, связанный с соревнованием и добычей яйца, кажется, является самым важным ритуалом рапа-нуи. Он тесно связан с их главным божеством, Макемаке. [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName] имеет возможность во время встречи поближе рассмотреть некоторые петроглифы, изображающие птицелюдей и Макемаке. Он находит письменные знаки, которые сами коренные жители уже не могут истолковать. Он начинает подозревать, что у островитян есть прошлое, о котором они мало что знают..."
 rapanui.1011.g: "Кто этот птицечеловек, о котором так много говорят?"
 rapanui.1021.t: "Моаи Хава"
 rapanui.1021.d: "Проведя несколько дней с рапа-нуи, [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName] и экипаж делают значительное открытие."
 rapanui.1021.f: "Как оказалось, рапа-нуи действительно обладали большим наследием, чем примитивный культ птицечеловека. Во время посещения старой площади, которая, как считалось, была местом сбора различных местных кланов, [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName] нашёл основания базальтовой статуи, торчащие из земли. Фигура представляет собой моаи. Говорят, что они представляют живое лицо предков. Фигура повреждена, но может иметь большую ценность — если команда доставит её в местный музей. Однако пока неясно, как и произойдёт ли это."
 rapanui.1021.g: "Вывезти артефакт контрабандой из страны, пока коренные жители не узнали..."
 rapanui.1021.h: "Убедить рапа-нуи, что мы можем забрать артефакт с собой."
 rapanui.1021.i: "Мы должны уважать наследие других народов, а не воровать его."
 rapanui.1022.t: "Кража Моаи Хава"
 rapanui.1022.d: "Хотя нашему экипажу на острове Пасхи удалось доставить статую моаи на борт, коренные жители заметили кражу. Поэтому мужчинам пришлось бежать раньше времени!"
 rapanui.1022.f: "Это была, что называется, операция под покровом ночи. Хотя [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName] приложил[SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'а', '')] все усилия, чтобы операция прошла как можно более скрытно, отсутствие дисциплины среди моряков привело к тому, что кто-то заснул на посту. Коренные жители смогли наблюдать с холма, как мужчины выкапывают моаи из земли. Как только они подумали, что артефакт уже освобождён из земли, коренные жители бросились издалека. Группе не оставалось ничего другого, как бежать как можно быстрее."
 rapanui.1022.g: "Быстрее, домой!"
 rapanui.1023.t: "Моаи Хава в безопасности"
 rapanui.1023.d: "Благодаря своим превосходным способностям, [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'позволила', 'позволил')] нашей экспедиции на остров Пасхи незаметно доставить монументальную статую моаи на борт корабля."
 rapanui.1023.f: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName] сделал[SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'а', '')] всё, чтобы... перемещение моаи осталось как можно более незамеченным. Ночью мужчины копали при тусклом свете ламп, чтобы никто из местных не заметил, как лопаты вгрызаются в землю и поднимают артефакт из глубин. К восходу солнца моаи уже был в безопасности на борту, спрятанный под грузом чилийского гуано."
 rapanui.1023.g: "Отлично."
 rapanui.1024.t: "С небольшой помощью друзей"
 rapanui.1024.d: "Хотя рапа-нуи скептически отнеслись к нашей просьбе, мы убедили их доставить Моаи Хава на борт нашего корабля."
 rapanui.1024.f: "Это был нелёгкий разговор, но в конечном итоге [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName] смог[SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'ла', '')] убедить местных жителей помочь в раскопках моаи и его транспортировке. Однако, завоевав их доверие, [SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'она', 'он')] смог[SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'ла', '')] осуществить свой план с одобрения рапа-нуи. Взамен [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName] подарил[SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'а', '')] некоторые из самых ценных сокровищ на борту в качестве подарков коренным жителям: такие как бесценные стеклянные шарики, две поношенные колоды карт и не совсем изношенное сомбреро."
 rapanui.1025.t: "Пустая трата времени"
 rapanui.1025.d: "Несмотря на большие усилия по поиску новых артефактов на острове, экипаж был вынужден прекратить свою экспедицию."
 rapanui.1025.f: "Вероятно, есть лишь несколько более негостеприимных мест, чем остров Пасхи: кроме скал и травы, здесь почти ничего нет. Это может относиться и к некоторым другим островам, но остров Пасхи уникален тем, что здесь живут тысячи людей по причинам, которые трудно понять. [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName] имеет основания полагать, что они, возможно, сами навлекли на себя это несчастье: возможно, они вырубили все деревья и убили всех животных. Каждая дополнительная минута здесь — пустая трата времени."
 rapanui.1025.g: "И на этом острове действительно больше нет никаких особенностей?"
 rapanui.1026.t: "Моаи Хоа Хакананаиа"
 rapanui.1026.d: "Во время экспедиции на остров Пасхи экипаж нашёл fascinante статую моаи. Она наполовину зарыта, но особенно высокого качества."
 rapanui.1026.f: "«Какой изысканный артефакт», — подумал[SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'а', '')] [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName], впервые увидев моаи. Статуя едва виднелась из-под земли, но даже по её очертаниям было ясно: она — наследие иной, великой эпохи. Эпохи, где вершиной культуры были не петроглифы или шаманские ритуалы, а цивилизация, способная придавать камню столь впечатляющие и чёткие формы. [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName] нельзя было назвать учёным или знатоком искусства, но у [SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'неё', 'него')] было безошибочное чутьё на историю. И в тот миг, когда пустые глазницы моаи, казалось, взглянули в ответ, перед внутренним взором пронеслась сама вечность, оставив лишь один вопрос: как забрать это наследие с собой?"
 rapanui.1026.g: "Экипаж должен раскопать моаи."
 rapanui.1026.h: "Попросить местных жителей раскопать статую."
 rapanui.1026.i: "Оставить артефакт в покое."
 rapanui.1027.t: "Спор с рапа-нуи"
 rapanui.1027.d: "Наш призыв к рапа-нуи о помощи имел обратный эффект. Местные жители считают, что мы слишком долго испытывали их гостеприимство, и говорят нам покинуть их остров!"
 rapanui.1027.f: "Наши попытки завоевать доверие местных жителей явно провалились. Старейшины рапа-нуи, похоже, быстро раскусили нашу уловку с дешёвыми стеклянными шариками, решив, что такой трюк дважды не пройдёт. Кульминацией этого неприятия стала сцена, в центре которой [SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'оказалась', 'оказался')] [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]: одна из старух швырнула [SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'ей', 'ему')] под ноги то самое поношенное сомбреро, которым мы когда-то купили их расположение. Этот жест недвусмысленно говорил об объявлении войны, если наша группа немедленно не уберётся восвояси."
 rapanui.1027.g: "Нас интересует только их культура... почему они так сердиты?"
 rapanui.1028.t: "Моаи повреждён!"
 rapanui.1028.d: "К сожалению, раскопки у моаи оказались катастрофическими. Вместо того чтобы вытащить статую из земли, мужчины повредили её безвозвратно."
 rapanui.1028.f: "Это не археологический вандализм, если это совершенно непреднамеренно. Или так говорят."
 rapanui.1028.g: "Потеря для археологии и для мира искусства."
 rapanui.1029.t: "Местные помогают!"
 rapanui.1029.d: "Рапа-нуи согласились помочь в раскопках моаи."
 rapanui.1029.f: "Иногда удивительно, на что способны старая крикетная бита и банка абрикосового джема. Если знаешь, как их сочетать."
 rapanui.1029.g: "Неожиданный сюрприз."
 rapanui.1041.t: "Остров птицечеловека"
 rapanui.1041.d: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName] решил[SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'а', '')] исследовать остров Пасхи самостоятельно. Местные жители могут принести больше неприятностей, чем пользы."
 rapanui.1041.f: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName] настоял[SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'а', '')] на своём решении исследовать остров Пасхи в одиночку. Он подозревал, не без оснований, что если на этом острове есть ценные находки, ему придётся добывать их против воли рапа-нуи. До сих пор мужчины находили только таинственные скалы с петроглифами, выгравированными странными знаками и символами, в которых видную роль играли птицелюди. Но картограф уверен, что их ждёт гораздо более ценная добыча."
 rapanui.1041.g: "Это определённо обеспечит успех экспедиции."
 rapanui.1042.t: "Моаи Хава"
 rapanui.1042.d: "После многих дней поисков [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName] сделал[SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'а', '')] необыкновенное открытие."
 rapanui.1042.f: "Как оказалось, рапа-нуи действительно обладали большим наследием, чем примитивный культ птицечеловека. Во время посещения старой площади, которая, как считалось, была местом сбора различных местных кланов, [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName] [SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'нашла', 'нашёл')] основания базальтовой статуи, торчащие из земли. Фигура повреждена, но может иметь большую ценность — если команда доставит её в местный музей. Однако пока неясно, как и произойдёт ли это."
 rapanui.1042.g: "Доставить статую на борт и покинуть остров."
 rapanui.1042.h: "Продолжить исследование острова."
 rapanui.1043.t: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName] умер[SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'ла', '')]"
 rapanui.1043.d: "Поиски полинезийских артефактов не только оказались совершенно бесполезными, но и трудности на бесплодном острове оказались проблематичными как для людей, так и для материалов."
 rapanui.1043.f: "Решение отказаться от помощи коренных жителей, продолжать поиски сокровищ, несмотря на отсутствие результатов, а также всё предприятие в целом, в ретроспективе оказалось катастрофическим. Всего через несколько дней у людей закончились запасы воды и еды, и они стали более восприимчивы к болезням. [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName] [SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'скончалась', 'скончался')] от неизвестной болезни и [SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'была найдена мёртвой', 'был найден мёртвым')]  однажды утром. Люди похоронили [SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'её', 'его')] на теперь уже проклятом острове и отправились обратно на корабль."
 rapanui.1043.g: "Не остаётся ничего, кроме как отменить эту бессмысленную экспедицию."
 rapanui.1050.t: "Моаи Рапа-Нуи"
 rapanui.1050.d: "Удивительно успешное приключение на острове Пасхи подходит к концу для отважных людей под предводительством [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName]: два ценных океанических артефакта на пути обратно в [ROOT.GetCountry.GetNameNoFlag]. Уже ясно, что они заслуживают славы и почёта."
 rapanui.1050.f: "«Та примитивная голова\nСтоль амбициозно огромна,\nНо столь груба в своём искусстве,\nТак же легко читается\nО бедах прошлого,\nКак клиническая карта.\nЛишь ради одного,\nУспеха губ,\nТак презрительно изогнутых,\nЭтот тоннаж камня\nБыл привезён на корабле». — Роберт Фрост."
 rapanui.1050.g: "Оба моаи должны быть в музее!"
 rapanui.1051.t: "Домой с Моаи Хава"
 rapanui.1051.d: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName] — человек, сделавший себе имя. [SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'Она', 'Он')] [SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'нашла', 'нашёл')] редкого моаи на негостеприимном острове Пасхи и на борту уже объявил, что подарит его [SCOPE.sCharacter('rapanui_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('rapanui_ruler').GetFullName]. Матросам повысят зарплату — но [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName] рассчитывает на карьеру."
 rapanui.1051.f: "Независимо от того, как относиться к трудностям на острове Пасхи, приключение было успешным. Дома уже рассказывают истории о смелом авантюристе, который обогатил СТРАНУ экзотическим художественным сокровищем. То, что для одних — кража, для других — материал для новелл."
 rapanui.1051.g: "Раскрыты ли теперь тайны острова Пасхи?"
 rapanui.1052.t: "Святилище Рапа-Нуи"
 rapanui.1052.d: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName] подружился с местными жителями во время приключения. Они были посвящены в их обычаи, их историю и их тайны. Теперь он считается экспертом в области исследований острова Пасхи."
 rapanui.1052.f: "Вернувшись в море, [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName] размышляет о событиях на острове Пасхи. Возможно, другой человек действовал бы более безрассудно. Возможно, он захватил бы редкие артефакты, чтобы продвинуться по карьерной лестнице; возможно, он встретил бы свою смерть из-за своего невежества и пренебрежения к коренным жителям. Он приходит к выводу, что нашёл на острове нечто большее, чем редкие сокровища. Потому что местные жители проявили свою признательность. Они посвятили его в свои традиции. Теперь он знал их историю. Доисторическая, живая культура открылась ему. Отныне он полностью посвятит себя этой области."
 rapanui.1052.g: "Это начало научной карьеры?"
 rapanui.1053.t: "Ничего, кроме обломков"
 rapanui.1053.d: "В очень неудачном повороте событий приключение, которое возглавлял [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName], на острове Пасхи заканчивается разочарованием. Но всё было не зря."
 rapanui.1053.f: "Когда паруса надуваются, и корабль направляется обратно в Страну, [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName] держит в руке осколки того, что когда-то было моаи. Конечно, он представлял свой отъезд иначе. Но даже если он не смог привезти домой артефакт, он кое-чему научился в этом путешествии."
 rapanui.1053.g: "Звезда падает, звезда восходит."
 rapanui.1054.t: "Горько-сладкое прощание с островом Пасхи"
 rapanui.1054.d: "Силуэт моаи сияет в вечернем свете заходящего солнца. В то же время [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName] перебирает в руках камешки того, что когда-то было другим моаи. Затем он смотрит вперёд, на море."
 rapanui.1054.f: "Должен ли он оплакивать потерю или по крайней мере радоваться оставшейся добыче? Триумф омрачён для [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]. Некоторые члены экипажа хотят его подбодрить. Но он не может смириться с мыслью, что идеальный конец выглядит иначе. Тем более в нём созревает решение: никогда больше! Он извлечёт урок из этой истории. В следующий раз с ним такого не случится. Этот опыт подтверждает его решение подвести итоги событий. Возможно, это не последняя его экспедиция."
 rapanui.1054.g: "Один моаи лучше, чем ни одного."
 rapanui.1055.t: "Кровавый успех"
 rapanui.1055.d: "Экипажу удалось вывезти обоих моаи с острова Пасхи — но [SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName] погиб при трагических обстоятельствах!"
 rapanui.1055.f: "«На корабль, на корабль!» — это было единственное, что имело значение, когда люди хотели покинуть остров Пасхи с украденными моаи. Коренные жители в конце концов узнали, что сделали чужеземцы, и почувствовали себя обманутыми. Хотя корабль уже был готов к отплытию и спрятал моаи, в последнюю секунду произошла трагическая авария. [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName], который остался последним, чтобы убедиться, что никто не остался, получил удар копьём в спину и лежал без движения на земле. Экипаж был вынужден отплыть без него. [ROOT.GetCountry.GetNameNoFlag] в тот день получает два ценных артефакта, но теряет не менее ценного человека, у которого было бы блестящее будущее."
 rapanui.1055.g: "[ROOT.GetCountry.GetNameNoFlag] будет помнить этого героя."
 rapanui.1056.t: "Трагедия на острове Пасхи"
 rapanui.1056.d: "Экипажу удалось благополучно доставить моаи на борт — но какой ценой?"
 rapanui.1056.f: "«На корабль, на корабль!» — это было единственное, что имело значение, когда люди хотели покинуть остров Пасхи с украденными моаи. Коренные жители в конце концов узнали, что сделали чужеземцы, и почувствовали себя обманутыми. Хотя корабль уже был готов к отплытию и спрятал моаи, в последнюю секунду произошла трагическая авария. [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName], который остался последним, чтобы убедиться, что никто не остался, получил удар копьём в спину и лежал без движения на земле. Экипаж был вынужден отплыть без него. [ROOT.GetCountry.GetNameNoFlag] в тот день получает два ценных артефакта, но теряет не менее ценного человека, у которого было бы блестящее будущее."
 rapanui.1056.g: "[ROOT.GetCountry.GetNameNoFlag] будет помнить этого героя."
 rapanui.1057.t: "Ускользнули в последнюю секунду"
 rapanui.1057.d: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetFullName] удалось доставить ценную статую моаи на борт корабля, однако при этом коренные жители были разгневаны."
 rapanui.1057.f: "[SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName] быстро понял[SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'а', '')], что [SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'она', 'он')] исчерпал[SelectLocalization(SCOPE.sCharacter('rapanui_adventurer_scope').IsFemale, 'а', '')] терпение коренных жителей. После того как моаи был извлечён, последовали недружелюбные жесты. По-видимому, коренные жители чувствовали себя преданными, возможно, потому, что предложенные подарки — сломанная лошадка-качалка, несколько консервных банок и три красочные карточки из зоопарка — оказались именно тем обманом, которым они и были. С хладнокровием он немедленно приказал своим людям на борт корабля. Вскоре после отплытия люди увидели, как рапа-нуи собрались на пляже с оружием..."
 rapanui.1057.g: "У этого человека есть качества."
 rapanui.1058.t: "Пропали"
 rapanui.1058.d: "Команда, искавшая особенности на острове Пасхи, бесследно исчезла."
 rapanui.1058.f: "Была ли это самоуверенность слишком амбициозного авантюриста? Экипаж, оставшийся на борту корабля, несколько дней ничего не слышал от других моряков и их лидера [SCOPE.sCharacter('rapanui_adventurer_scope').GetLastName]. Через полнедели трое мужчин осмелились узнать о судьбе, но встретили лишь нескольких разгневанных коренных жителей, поэтому они прекратили поиски безрезультатно. Корабль покинул злополучный остров. Что там произошло, остаётся неразгаданной тайной."
 rapanui.1058.g: "Страшно."
 rapanui.1059.t: "Омрачённое возвращение"
 rapanui.1059.d: "Экипаж скорбит о смерти многообещающего лидера. Над путешествием домой висит меланхоличное настроение."
 rapanui.1059.f: "Я слышал зов моей страны, далеко за морем,\nЧерез пустыню вод она зовёт и зовёт меня.\nЕё меч опоясан у бедра, её шлем на голове,\nА у её ног лежат умирающие и мёртвые.\nЯ слышу шум битвы, грохот её орудий,\nЯ спешу к тебе, моя мать, сын среди твоих сыновей. — Сесил Спринг-Райс"
 rapanui.1059.g: "Прискорбно."
 rapanui_custom_death_shot_arrows: "[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName] несколько раз подплывал к острову на лодке, и каждый раз его встречал град стрел. Поначалу коренные жители, казалось, не целились в него, а лишь пытались прогнать. Однако к третьей попытке их терпение, видимо, иссякло. Несколько стрел нашли свою цель, и миссионер безжизненно рухнул."
 rapanui_custom_death_lunch: "Сначала всё, казалось, шло хорошо. [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName] был тепло принят коренными жителями, которые даже устроили в его честь пир. Но, по-видимому, он неверно истолковал местный язык: миссионер должен был не присутствовать на банкете, а стать им."
 rapanui_custom_death_burnt: "Каким-то образом [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName] умудрился разгневать коренных жителей. Вскоре после его прибытия экипаж корабля увидел на пляже большой костёр. Когда от миссионера несколько дней не было вестей, они отправились на поиски. На пляже были найдены его сожжённые останки, опознанные только по кресту, который он всегда носил с собой."
 rapanui_custom_death_shipwrecked: "Трагедия! [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName] так и не добрался до пункта назначения. Корабль, на котором он плыл, попал в шторм и затонул. Все пассажиры выжили, кроме самого миссионера. Было ли это знамением от Бога?"
 rapanui_custom_death_clubbed: "Вскоре после того, как [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName] ступил на берег, он оказался в окружении местных жителей. Их первоначальный интерес быстро сменился яростью, и завязалась потасовка. В процессе островитяне забили миссионера дубинами до смерти."
 rapanui_custom_death_beheaded: "Всего через день после того, как [ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName] высадился на остров, экипаж корабля сделал ужасное открытие. На пляже они нашли его отрубленную голову, насаженную на кол. Никто не знает, за что местные жители так с ним поступили."
 rapanui_custom_death_join_natives: "[ROOT.Var('rapanui_missionary_var').GetCharacter.GetFullName] пропал на несколько недель. Была отправлена поисковая группа в деревню, которую он посещал. Как оказалось, с миссионером всё было в порядке. Вот только он решил присоединиться к дикарям. Как это могло случиться?"
