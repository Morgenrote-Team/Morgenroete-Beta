 rapanui_northwest_expedition_location_arctic_tt: "Экспедиция путешествует по району между Канадой и Арктикой."
 rapanui_northwest_expedition_location_ice_tt: "Экспедиция застряла во льдах."
 rapanui_northwest_expedition_location_lost_tt: "Экспедиция потеряна."
 rapanui_northwest: "Первооткрыватель Северо-Западного прохода"
 je_rapanui_northwest_expedition: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]: Экспедиция"
 je_rapanui_northwest_expedition_reason: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] ищет Северо-Западный проход в Арктике. Правительство ожидает, что это будет многолетнее предприятие. Каждое лето экспедиция будет пытаться совершить прорыв; каждую зиму экипаж будет зимовать в Вечных льдах. Если через четыре года прорыв не будет достигнут, экспедиция считается потерянной. Успех прорыва через Северо-Западный проход, возвращение потерянной экспедиции или завершение всей миссии как национальной катастрофы во многом зависит от #V шанса на успех#! миссии. #V Шанс на успех#! не менее #G 80#! гарантирует проход через Северо-Западный проход. #V Шанс на успех#! #YELLOW 60#! означает, что экспедиция не совершит прорыва, но по крайней мере принесёт новые знания. Если #V шанс на успех#! #R меньше 30#!, можно ожидать национальной трагедии.\n\nНа данный момент наш #V шанс на успех#! составляет #ORANGE [ROOT.Var('rapanui_northwest_success').GetValue]#!."
 je_rapanui_northwest_expedition_fail: "Экспедиция потерпит неудачу, если в течение четырёх лет не будет прорыва через Северо-Западный проход."
 je_rapanui_northwest_expedition_success: "С #V шансом на успех#! не менее #G 80#! возможен прорыв через Северо-Западный проход, при условии, что он останется выше этого значения в течение года."
 je_rapanui_northwest_expedition_invalid: "Если другая нация прорвётся через Северо-Западный проход раньше нас, экипаж вернётся, ничего не добившись."
 rapanui.401.t: "Северо-Западный проход: шанс на успех"
 rapanui.401.d: "Началась подготовка к экспедиции. [SCOPE.sCharacter('rapanui_ship_scope').GetLastNameNoFormatting] поднимается на борт. Учёные и моряки впервые рассчитывают наши текущие шансы на успех."
 rapanui.401.f: "Шанс на успешный безопасный прорыв через Северо-Западный проход зависит от нескольких факторов. Базовое значение, которое определяется во время подготовки, — это сумма исследованных военно-морских технологий. Достижения в области консервирования продуктов питания — вакуумное консервирование и пастеризация — также оказывают очень положительное влияние. Завершение океанографических исследований из Тихоокеанской экспедиции или наличие авангардного флота приносят дополнительные бонусы. С такими учёными, как инженеры и астрономы, этот базовый уровень можно улучшить. Во время путешествия случайные события, такие как погода, могут повлиять на значение — к лучшему или к худшему."
 rapanui.401.g: "Мы найдём Северо-Западный проход — во славу [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
 rapanui.401.h: "На второй взгляд это предприятие гораздо опаснее, чем казалось сначала."
 rapanui.402.t: "Возражение!"
 rapanui.402.d: "[SCOPE.sCharacter('rapanui_ig_leader').GetFullName], чья партия входит в состав правящей коалиции, выступил[SelectLocalization(SCOPE.sCharacter('rapanui_ig_leader').IsFemale, 'а', '')] с резким протестом против экспедиции по поиску Северо-Западного прохода, назвав её «самоубийственной миссией»."
 rapanui.402.f: "Вчера представители партии [SCOPE.sCharacter('rapanui_ig_leader').GetLastName] объявили протест против акции, которая, по их словам, прошла за их спиной. Они считают экспедицию по пересечению Арктики дорогой, бессмысленной и очень рискованной. Деньги, по их словам, можно было бы лучше потратить в другом месте. Это также поставит под угрозу жизни важных людей, которые в противном случае могли бы служить нашей стране."
 rapanui.402.g: "Им придётся с этим смириться."
 rapanui.402.h: "Предоставить им политические уступки."
 rapanui.403.t: "Северо-Западный проход: руководитель экспедиции"
 rapanui.403.d: "Экспедиция в Арктику — один из самых опасных морских манёвров. Нужен хороший капитан, чтобы принять этот вызов и привести предприятие к счастливому концу."
 rapanui.403.f: "Эту миссию должны возглавлять только опытные капитаны: хорошие капитаны дают экспедиции больше шансов на успех. В этом помогают такие качества, как #YELLOW опытный или экспертный военно-морской командир#!. #YELLOW Исследователи#! особенно предрасположены, и если капитан даже #YELLOW совершил кругосветное плавание#!, он считается лучшим выбором. Но будьте осторожны: если экспедиция закончится катастрофой, есть шанс, что капитан также пойдёт ко дну вместе с кораблём..."
 rapanui.403.g: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader_1').GetFullName]"
 rapanui.403.h: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader_2').GetFullName]"
 rapanui.403.i: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader_3').GetFullName]"
 rapanui.404.t: "Корабельные капелланы"
 rapanui.404.d: "Предстоящее морское путешествие в неизвестность означает долгий период изоляции. [SCOPE.sCharacter('rapanui_ig_leader').GetFullName] предложил[SelectLocalization(SCOPE.sCharacter('rapanui_ig_leader').IsFemale, 'а', '')] использовать свои контакты и назначить корабельных капелланов для улучшения морального духа на борту."
 rapanui.404.f: "«Это чисто пастырское дело — заботиться о заблудших душах в море. Инуиты? С чего вы взяли, что мы хотим обращать инуитов? Гнусные обвинения!\nКонечно, мы вежливо спросим их заранее»."
 rapanui.404.g: "Морякам нужны пасторы в таком опасном путешествии."
 rapanui.404.h: "Технологии и мастерство, а не Бог, спасут нас в море."
 rapanui.405.t: "Инженер улучшает экспедиционные корабли"
 rapanui.405.d: "[SCOPE.sCharacter('rapanui_engineer_scope').GetFullName] предложил[SelectLocalization(SCOPE.sCharacter('rapanui_engineer_scope').IsFemale, 'а', '')] свои технические знания для модернизации нашего флота для экспедиции в Арктическое море."
 rapanui.405.f: "В преддверии печально известной экспедиции Франклина по пересечению Северо-Западного прохода корабли «Эребус» и «Террор» были модернизированы, включая дополнительное стальное усиление на носу и бортах корпуса, что должно было предотвратить раздавливание кораблей давлением пакового льда. Чтобы сохранить манёвренность «Эребуса» и «Террора» в дрейфующем льду даже при штиле или неблагоприятном направлении ветра, на каждом из кораблей был установлен паровой двигатель весом около 15 тонн, который приводил в движение специально разработанный винт высотой два метра. Это были первые корабли в Королевском флоте, оснащённые паровым двигателем и винтовым движителем. Винты и рули были установлены так, что если они застрянут в паковом льду, их можно было снять и убрать в безопасное место. В ретроспективе этот дополнительный привод был слишком слабым."
 rapanui.405.g: "Прогресс растопит лёд."
 rapanui.406.t: "Астроном предлагает метеорологические исследования"
 rapanui.406.d: "[SCOPE.sCharacter('rapanui_astronomer_scope').GetFullName] предложил[SelectLocalization(SCOPE.sCharacter('rapanui_astronomer_scope').IsFemale, 'а', '')] свои метеорологические знания для подготовки более точного прогноза погоды и выбора подходящего времени для плавания."
 rapanui.406.f: "«Я использовал метеостанцию обсерватории и после недель экспериментов, скрупулёзных наблюдений и исследований глубокой ночью понял, что низкая температура может мало способствовать успеху этого путешествия»."
 rapanui.406.g: "Наука помогает нам побеждать."
 rapanui.407.t: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] начинает экспедицию"
 rapanui.407.d: "Корабли для экспедиции по поиску Северо-Западного прохода готовы. Экспедиция, которую возглавит [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName], в народе уже получила название #YELLOW «Экспедиция [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]»#!."
 rapanui.407.f: "В первой половине XIX века некоторые части Северо-Западного прохода были исследованы отдельно многими экспедициями, в том числе Джона Росса, Элиши Кента Кейна, Уильяма Эдварда Парри и Джеймса Кларка Росса; сухопутные экспедиции также возглавляли Джон Франклин, Джордж Бэк, Питер Уоррен Диз, Томас Симпсон и Джон Рэй. В 1826 году Фредерик Уильям Бичи исследовал северное побережье Аляски, открыв мыс Барроу. В 1845 году роскошно оборудованная экспедиция на двух кораблях под руководством сэра Джона Франклина отправилась в канадскую Арктику, чтобы нанести на карту последние неизвестные участки Северо-Западного прохода. Уверенность была высока, поскольку они предполагали, что осталось менее 500 км (310 миль) неисследованного арктического побережья материка. Когда корабли не вернулись, спасательные экспедиции и поисковые группы исследовали канадскую Арктику, что привело к тщательному нанесению на карту региона, а также возможного прохода."
 rapanui.407.g: "Удачи!"
 rapanui.410.t: "Амундсен пересекает Северо-Западный проход"
 rapanui.410.d: "Норвежский авантюрист Руаль Амундсен первым прошёл Северо-Западный проход на лодке. Кампания длилась три года. Это великий день для нашей страны!"
 rapanui.410.f: "Амундсену удалось пройти Северо-Западный проход от Атлантики до Тихого океана на своём деревянном судне «Йоа» и с экипажем из шести человек между 1903 и 1906 годами. Однако выбранный маршрут от Баффинова залива через проливы Ланкастер и Пил и далее через проливы Джеймса Росса и Симпсона был непригоден для регулярного судоходства, поскольку глубина моря в некоторых местах составляла менее одного метра. Однако это не умаляет морского и исследовательского подвига шести норвежцев и датчанина Годфреда Хансена, впервые покоривших Северо-Западный проход с востока на запад, что на протяжении более четырёх столетий пытались сделать многие экспедиционные команды. Во время своего путешествия экспедиционная команда Амундсена нашла останки скелетов и снаряжение из потерянной экспедиции Джона Франклина."
 rapanui.410.g: "Слава Норвегии!"
 rapanui.411.t: "Северо-Западный проход открыт!"
 rapanui.411.d: "Экспедиция #YELLOW «[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]»#! совершила прорыв в Северном Ледовитом океане между Канадой и Арктикой, тем самым доказав, что этот морской путь не представляет собой непреодолимого препятствия для прогресса. [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] прославляется как герой!"
 rapanui.411.f: "Пересечение Северо-Западного прохода не открыло новый, прибыльный торговый путь, вопреки тому, на что надеялись в его теоретических прогнозах. Проход через толстый лёд был для этого слишком рискованным. Возможная зимовка задерживала переход. Тем не менее, открытие стало вехой. Были нанесены на карту ранее неизвестные области, и путешествия к Северному или Южному полюсу больше не были исключены. Были расширены морские, картографические, метеорологические, геомагнитные и биологические знания. И для некоторых смелых авантюристов этот район больше не был terra incognita."
 rapanui.411.g: "Во славу [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
 rapanui.412.t: "Потерянная экспедиция [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]"
 rapanui.412.d: "Прошло около 4 лет, как мы ничего не слышали об экспедиции #YELLOW «[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]»#!. Поэтому Адмиралтейство официально объявило экспедицию пропавшей без вести. Преобладает мнение, что экипаж и корабль застряли в паковом льду."
 rapanui.412.f: "Потерянная экспедиция не обязательно означает, что это наихудший из возможных сценариев. Однако несомненно, что фактическая цель, открытие и пересечение Северо-Западного прохода, определённо провалена. Судьба экипажа — другая история. Если #V шанс на успех#! экспедиции был не слишком низким, то есть надежда, что не всё потеряно."
 rapanui.412.g: "Это нехорошие новости."
 rapanui.413.t: "Потерянная экспедиция возвращается!"
 rapanui.413.d: "К счастливой неожиданности [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], экспедиция #YELLOW «[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]»#! вернулась. Экипаж понёс несколько потерь, и корабль в плохом состоянии, но он принёс ценные научные знания."
 rapanui.413.f: "Арктическая экспедиция Мак-Клура, одна из многих попыток найти пропавшую экспедицию Франклина, была значима тем, что она первой успешно обнаружила и прошла Северо-Западный проход, что было достигнуто как на лодке, так и на санях. Однако именно по этой причине сомнительно, можно ли считать это настоящим проходом. Только Руаль Амундсен совершил первый настоящий проход через Северо-Западный проход между 1903 и 1905 годами."
 rapanui.413.g: "Какое облегчение!"
 rapanui.414.t: "Члены экспедиции возвращаются"
 rapanui.414.d: "Скудный остаток того, что осталось от экспедиции #YELLOW «[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]»#!, несколько дней назад пересёк границу цивилизации в Канаде. Истощённые фигуры объяснили, что им пришлось покинуть корабли в паковом льду. Мужчины спасли то, что им было нужно, на нескольких жалких санях. Капитан [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] временами был серьёзно болен, но теперь благополучно вернулся домой. Другие члены экипажа не пережили холод, голод, болезни и истощение."
 rapanui.414.f: "В 1852 году Эдварду Белчеру было поручено командование правительственной арктической экспедицией по поиску Франклина. Она была безуспешной; неспособность Белчера завоевать популярность у своих подчинённых была особенно неудачной в арктическом плавании, и он не совсем подходил для командования судами среди льдов. Четыре из пяти кораблей (HMS Resolute, Pioneer, Assistance и Intrepid) были брошены в паковом льду, за что Белчер был предан военному суду, но оправдан. Один из этих кораблей, HMS Resolute, в конечном итоге был найден неповреждённым американским китобоем и возвращён в Соединённое Королевство."
 rapanui.414.g: "По крайней мере, они живы."
 rapanui.415.t: "Никаких следов экспедиции [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]"
 rapanui.415.d: "После недель ожидания страшное подозрение становится очевидным: экспедиция, ищущая Северо-Западный проход, не вернётся. Вероятно, нам придётся привыкнуть к ужасной certainty, что это одна из величайших трагедий в #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFormatting|l]ой#! морской истории."
 rapanui.415.f: "Экспедиция Франклина была третьей крупной и последней исследовательской поездкой британского полярного исследователя сэра Джона Франклина. Её целью было впервые полностью проплыть через Северо-Западный проход с востока на запад, нанести его на карту и таким образом найти более короткий морской путь из Европы в Азию. Экспедиция потерпела катастрофическую неудачу; с 1845 по 1848 год все её участники погибли в Канадском Арктическом архипелаге. Последние следы членов экспедиции были обнаружены лишь много лет спустя вблизи острова Кинг-Уильям. Трагическая судьба экспедиции Франклина, долгое время остававшаяся неясной, привлекла широкое внимание в середине XIX века. Газеты достигали высоких тиражей благодаря репортажам и спекуляциям о судьбе Франклина и эксплуатировали эту тему по всем правилам современных средств массовой информации. Сама экспедиция, а также интенсивные усилия леди Джейн Франклин по спасению мужа путём отправки новых поисковых экспедиций, занимали британскую общественность на протяжении многих лет."
 rapanui.415.g: "Мы должны смириться с тем, что они все мертвы..."
 rapanui.415.h: "Отправить спасательную миссию!"
 rapanui.415.tt: "Есть небольшой шанс найти членов экспедиции живыми. В большинстве случаев мы ничего не найдём, или, по крайней мере, несколько останков. Однако есть также — очень небольшой — риск, что и эта экспедиция может пропасть без вести."
 rapanui.416.t: "Следы экспедиции [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]"
 rapanui.416.d: "[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] смог[SelectLocalization(SCOPE.sCharacter('rapanui_northwest_expedition_hero').IsFemale, 'ла', '')] найти остатки потерянной экспедиции во время трудного путешествия в северной Канаде. Свидетельства говорят о том, что все члены экспедиции мертвы. Однако [SelectLocalization(SCOPE.sCharacter('rapanui_northwest_expedition_hero').IsFemale, 'она', 'он')] смог[SelectLocalization(SCOPE.sCharacter('rapanui_northwest_expedition_hero').IsFemale, 'ла', '')] сохранить некоторые находки — и [SelectLocalization(SCOPE.sCharacter('rapanui_northwest_expedition_hero').IsFemale, 'её', 'его')] миссия принесла новые знания в [ROOT.GetCountry.GetNameNoFormatting]."
 rapanui.416.f: "Через несколько недель члены спасательной миссии нашли несколько спрятанных сообщений от пропавшего экипажа корабля. Это отчёты о состоянии и заявления о местоположении. Корабли под командованием [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] наконец-то смогли определить конкретную территорию, на которой, должно быть, была потеряна экспедиция #YELLOW «[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]»#!. Фактически, они смогли приобрести у некоторых инуитов предметы, которые происходили с одного из потерянных кораблей. Смерть экипажа и их капитана теперь является печальной certainty. Но спасательная миссия нанесла на карту ранее неизвестные области, получила новые результаты исследований, а также восстановила утерянные измерения. Капитан [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetLastName] приобрёл значительный опыт."
 rapanui.416.g: "По крайней мере, мы смогли пролить свет на это дело."
 rapanui.417.t: "Тайна потерянной экспедиции"
 rapanui.417.d: "Даже после недель поисков [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] не смог[SelectLocalization(SCOPE.sCharacter('rapanui_northwest_expedition_hero').IsFemale, 'ла', '')] найти никаких следов, которые указывали бы на судьбу экспедиции #YELLOW «[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]»#!. Плохая погода означала, что миссию пришлось прервать, чтобы не постичь ту же участь."
 rapanui.417.f: "Члены потерянной экспедиции, скорее всего, мертвы, а их корабли затонули. Однако неопределённость оставляет свой след. В прессе ходят слухи. Рассказывают истории о каннибализме или демонах, о добрых джентльменах, которые превратились в диких зверей и впали в безумие. Судьба экспедиции #YELLOW «[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]»#!, вероятно, никогда не будет выяснена и послужит материалом для многих страшилок."
 rapanui.417.g: "Наверное, консервы были плохо запаяны?"
 rapanui.418.t: "Арктическое чудо"
 rapanui.418.d: "Этого никто не ожидал. Но затем в столицу пришла телеграмма: капитан [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastName] был жив. Очень истощён, болен и слаб. Но жив. Немного позже [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] достиг родного порта с тем, что осталось от экипажа. Спасательная миссия увенчалась полным успехом."
 rapanui.418.f: "Все корабли экспедиции #YELLOW «[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]»#! были зажаты в паковом льду. Они были покинуты несколько месяцев назад. Больные и слабые, оставленные там, встретили верную смерть. Другие погибли во время марша с импровизированными санями из корабельного дерева. Голод и холод унесли ещё больше жертв. Примерно каждый третий человек погиб. Но радость была ещё больше от того, что по крайней мере они смогли вернуться домой — как по волшебству, [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] нашёл их в свободной ото льда бухте и взял на борт. Важные научные находки успешной экспедиции также были спасены. Хотя [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] потерял свой флот, его чествуют на родине вместе с [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetLastName], как будто он пересёк проход."
 rapanui.418.g: "Эти люди — герои!"
 rapanui.419.t: "Спасательная миссия провалилась!"
 rapanui.419.d: "Произошёл худший из всех возможных поворотов: после потери экспедиции #YELLOW «[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]»#! спасательная миссия под руководством [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] теперь также пропала без вести. Стоит опасаться, что их постигла та же участь."
 rapanui.419.f: "«Рэй услышал от эскимосов в апреле 1854 года в заливе Пелли (широта 69° северной, долгота 72° западной), что в 10-12 днях пути на запад от недостатка пищи погибло более 40 белых людей. Продолжая свой путь, он узнал, что весной 1850 года некоторые эскимосы, отправившиеся на охоту на тюленей у северного побережья острова Кинг-Уильям, видели около 40 белых людей, мигрирующих по льду на юг; несколько недель спустя на побережье американского континента, в дне пути к северо-западу от большой реки, были найдены 30 тел белых людей, а на соседнем острове — ещё 5. Оказалось, что эскимосы всё ещё находили порох, пули, дробь, часы, компасы, телескопы и ружья, поскольку по крайней мере части этих предметов, а также серебряные ложки, вилки и т. д. были обнаружены и куплены Рэем»."
 rapanui.419.g: "Это море льда проклято!"
 rapanui.420.t: "Экспедиция [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting] возвращается"
 rapanui.420.d: "После того как другая нация нашла решающий прорыв в Северо-Западном проходе, наша экспедиция вернулась. Хотя она и не добилась решающего успеха, она принесла с собой полезные Erkenntnisse. Это последняя экспедиция такого рода."
 rapanui.420.f: ""
 rapanui.420.g: "С возвращением домой."
 rapanui.421.t: "Мягкая погода"
 rapanui.421.d: "Необычная оттепель привела к тому, что некоторые обычно ледяные проходы в этом году открылись раньше. Экспедиция #YELLOW «[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]»#! поэтому продвигается лучше, чем планировалось."
 rapanui.421.f: "Капризы погоды непредсказуемы и уже стоили жизни многим арктическим исследователям. Астроном, служащий нашей нации, может помочь предсказать более благоприятное время для путешествия до экспедиции, увеличивая шанс на положительное погодное событие."
 rapanui.421.g: "Хорошо."
 rapanui.422.t: "Суровая погода"
 rapanui.422.d: "К сожалению, в этом году зима в Арктике, похоже, длится дольше, а период обледенения начинается раньше, уже в сентябре. Это значительно ухудшает шансы экспедиции #YELLOW «[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]»#!."
 rapanui.422.g: "Плохо."
 rapanui.423.t: "Инуитский проводник"
 rapanui.423.d: "Во время своего путешествия по северной Канаде [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] удалось нанять инуита для экспедиции. Он не только обладает географическими знаниями, но и знает одну-две техники выживания в этом суровом климате."
 rapanui.423.f: "Европейцы уже пользовались знаниями инуитов во время арктических экспедиций первой половины XIX века; некоторые участники экспедиций даже говорили на этом языке. Например, судьбу участников пропавшей экспедиции Франклина удалось восстановить, потому что были опрошены некоторые инуитские очевидцы. Однако уважение к коренным жителям оставляло желать лучшего. Именно Руаль Амундсен в значительной степени полагался на техники выживания полярных жителей, чтобы успешно завершить своё собственное путешествие по Северо-Западному проходу и свою поездку на Южный полюс."
 rapanui.423.g: "Отлично!"
 rapanui.424.t: "Мясо дичи"
 rapanui.424.d: "Некоторые из членов экипажа попросили разрешения сойти на берег на несколько дней и поохотиться на тюленей, карибу или птиц."
 rapanui.424.f: "Бесплодный тундровый ландшафт северной Канады и особенно регионы в арктической среде оставляют мало шансов на выживание для крупных диких животных. Однако есть исключения. Одной из причин неудачи экспедиции Франклина было то, что участники в значительной степени полагались на собственные запасы и мало полагались на продовольственные ресурсы этого района. Более поздние экспедиции интенсивно использовали возможность охотиться на местных животных и таким образом пополнять рацион. Однако не каждая охота увенчивается успехом."
 rapanui.424.g: "Они должны использовать время для охоты."
 rapanui.424.h: "Это пустая трата времени."
 rapanui.425.t: "Отравление"
 rapanui.425.d: "Несколько человек из экспедиции #YELLOW «[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]»#! страдают от симптомов отравления. Неизвестно, испортились ли запасы или были другие причины. На борту флагмана уже разгорелся спор о том, что делать с оставшейся едой — замены почти нет."
 rapanui.425.f: "По сей день ведутся споры о реальных причинах провала экспедиции Франклина. Часто используется аргумент, что консервные банки были плохо запаяны и произошло отравление свинцом, которое по крайней мере было ответственно за ослабление экипажа. Другие постулировали отравление ртутью. Однако пищевое отравление нельзя исключать, и это не уникальное явление."
 rapanui.425.g: "Неужели провизия была такой плохой?"
 rapanui.425.h: "Выбросить провизию за борт и искать что-нибудь поесть на суше."
 rapanui.426.t: "Туберкулёз"
 rapanui.426.d: "[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] стоит перед трудным решением в Арктике: на борту экспедиционного корабля свирепствует туберкулёз. Риск заражения для здоровых людей в таком тесном пространстве высок."
 rapanui.426.f: "«Итак, всё, чего вы хотите, чтобы другие делали вам, делайте и вы им, ибо в этом закон и пророки». — Матфея 7:12"
 rapanui.426.g: "Заботиться о них как можно лучше."
 rapanui.426.h: "Выбросить их за борт!"
 rapanui.427.t: "Паковый лёд"
 rapanui.427.d: "Ничего не помогает. Через некоторое время корабль останавливается. Дерево не движется ни на палец. Скоро будет холодно: экспедиция #YELLOW «[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]»#! полностью окружена паковым льдом!"
 rapanui.427.f: "«Сильный человек — это не тот, кто выполняет великие задачи, а тот, кто с большой решимостью противостоит трудностям, неудачам и унынию». — Эрнест Шеклтон"
 rapanui.427.g: "Это худший из всех поворотов."
 rapanui.427.h: "К счастью, наш инженер подготовил корабль к такой ситуации."
 rapanui.428.t: "Геомагнитные данные"
 rapanui.428.d: "Команда физиков экспедиции #YELLOW «[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]»#! получила новые научные знания вблизи полярных ледяных шапок."
 rapanui.428.f: "«История человечества — это непрерывная борьба из тьмы к свету. Поэтому бессмысленно обсуждать пользу знания; человек хочет знать, и когда он перестаёт это делать, он больше не человек». — Фритьоф Нансен"
 rapanui.428.g: "Отлично!"
 rapanui.429.t: "Полярная флора и фауна"
 rapanui.429.d: "Несмотря на враждебную среду, исследователи экспедиции #YELLOW «[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]»#! смогли собрать образцы животных и растений, чтобы улучшить знания об этом отдалённом регионе."
 rapanui.429.f: "«Многочисленные люди, которые воображают, что долгое пребывание в полярных регионах делает человека менее восприимчивым к холоду, чем другие смертные, совершенно ошибаются». — Руаль Амундсен"
 rapanui.430.t: "Неизвестные земли"
 rapanui.430.d: "Экспедиция #YELLOW «[SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetLastNameNoFormatting]»#! обнаружила ранее неизвестные острова и заливы в северной Канаде и тем самым расширила океанографические и картографические знания."
 rapanui.430.f: "После путешествий Джеймса Кука девизом было, что больше нечего открывать. Независимо от того, насколько враждебны могут быть эти земли, [SCOPE.sCharacter('rapanui_northwest_expedition_leader').GetFullName] нанёс на карту новые, ранее неизвестные участки суши и тем самым доказал, что последние рубежи ещё не достигнуты."
 rapanui.431.d: "Норвежский авантюрист Руаль Амундсен первым прошёл Северо-Западный проход на лодке. Кампания длилась три года."
 rapanui.431.g: "Поздравляю..."
 rapanui.432.d: "Экспедиция из [SCOPE.sCountry('rapanui_northwest_country_scope').GetAltNameNoFlag('RU_CL_RP')] сегодня завершила невероятную задачу по пересечению Северо-Западного прохода."
 rapanui.433.t: "Потерянная экспедиция [SCOPE.sCountry('rapanui_franklin_country').GetAdjectiveNoFormatting]"
 rapanui.433.d: "Одна из худших катастроф в морской истории постигла [SCOPE.sCountry('rapanui_franklin_country').GetName]: целая экспедиция с самым современным оборудованием пропала без вести в Арктике. Экспедиция должна была найти и пройти Северо-Западный проход. Уже четыре года нет никакой связи. Пока вся страна погружена в глубокий траур, некоторые предполагают, что весь экипаж может быть мёртв."
 rapanui.433.g: "Отправить телеграмму с нашими искренними соболезнованиями."
 rapanui.433.h: "Кто ищет опасности, тот в ней и погибнет."
 rapanui.434.t: "Следы #tooltippable_name [SCOPE.sCountry('rapanui_franklin_country').GetAdjectiveNoFormatting|l]ой#! экспедиции"
 rapanui.434.d: "[SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] смог[SelectLocalization(SCOPE.sCharacter('rapanui_northwest_expedition_hero').IsFemale, 'ла', '')] найти остатки потерянной экспедиции во время трудного путешествия в северной Канаде. Свидетельства говорят о том, что все члены экспедиции мертвы. Однако [SelectLocalization(SCOPE.sCharacter('rapanui_northwest_expedition_hero').IsFemale, 'она', 'он')] смог[SelectLocalization(SCOPE.sCharacter('rapanui_northwest_expedition_hero').IsFemale, 'ла', '')] сохранить некоторые находки — и [SelectLocalization(SCOPE.sCharacter('rapanui_northwest_expedition_hero').IsFemale, 'её', 'его')] миссия принесла новые знания в [ROOT.GetCountry.GetNameNoFormatting]."
 rapanui.434.f: "Через несколько недель члены спасательной миссии нашли несколько спрятанных сообщений от пропавшего экипажа корабля. Это отчёты о состоянии и заявления о местоположении. Корабли под командованием [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] наконец-то смогли определить конкретную территорию, на которой, должно быть, была потеряна экспедиция #tooltippable_name [SCOPE.sCountry('rapanui_franklin_country').GetAdjectiveNoFormatting|l]ой#! команды. Фактически, они смогли приобрести у некоторых инуитов предметы, которые происходили с одного из потерянных кораблей. Смерть экипажа и их капитана теперь является печальной certainty. Но спасательная миссия нанесла на карту ранее неизвестные области, получила новые результаты исследований, а также восстановила утерянные измерения. Капитан [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetLastName] приобрёл значительный опыт."
 rapanui.435.t: "Тайна потерянной экспедиции"
 rapanui.435.d: "Даже после недель поисков [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] не смог[SelectLocalization(SCOPE.sCharacter('rapanui_northwest_expedition_hero').IsFemale, 'ла', '')] найти никаких следов, которые указывали бы на судьбу экспедиции #tooltippable_name [SCOPE.sCountry('rapanui_franklin_country').GetAdjectiveNoFormatting|l]ой#! команды. Плохая погода означала, что миссию пришлось прервать, чтобы не постичь ту же участь."
 rapanui.435.f: "Члены потерянной экспедиции, скорее всего, мертвы, а их корабли затонули. Однако неопределённость оставляет свой след. В прессе ходят слухи. Рассказывают истории о каннибализме или демонах, о добрых джентльменах, которые превратились в диких зверей и впали в безумие. Судьба этой миссии, вероятно, никогда не будет выяснена и послужит материалом для многих страшилок."
 rapanui.436.t: "Корабль снова найден!"
 rapanui.436.d: "Это сенсация: один из кораблей потерянной экспедиции появился как корабль-призрак у побережья Северной Америки. [SCOPE.sCharacter('rapanui_northwest_expedition_hero').GetFullName] смог[SelectLocalization(SCOPE.sCharacter('rapanui_northwest_expedition_hero').IsFemale, 'ла', '')] его сохранить. Корабль почти полностью цел, но находится примерно в 1200 милях от предполагаемого местоположения. Возник спор о том, является ли он обломками или чужой собственностью."
 rapanui.436.f: "HMS Resolute был кораблём с барковой оснасткой Королевского флота Великобритании середины XIX века, специально оборудованным для арктических исследований. Resolute застрял во льдах в поисках пропавшей экспедиции Франклина и был покинут в 1854 году. Британское правительство объявило в «The London Gazette», что корабль всё ещё является собственностью Её Величества, но попыток спасения не предпринималось. Корабль снова освободился и был замечен как корабль-призрак в Баффиновом заливе 16 сентября 1855 года — почти в 2000 километрах от своего последнего места стоянки — американским китобоем Джорджем Генри. Resolute затем снова был зажат паковым льдом пролива Дейвиса у острова Баффин, но всё ещё был мореходным и мог быть доставлен китобоями в качестве приза в гавань Нью-Лондона, штат Коннектикут. В конечном итоге он был куплен Конгрессом США за 40 000 долларов США, восстановлен и официально подарен королеве Виктории 17 декабря 1856 года в знак мира между двумя нациями."
 rapanui.436.g: "Вернуть корабль его владельцу."
 rapanui.436.h: "Научные знания на борту могут быть нам полезны..."
 rapanui_add_x_oceanographic_understanding_minus_x_tt: "Уменьшить @rapanui_oceanographic_knowledge! Океанографические знания на [SCOPE.GetValue('understanding_amount')|0+]."
 rapanui_add_x_oceanographic_understanding_0_tt: "Не изменяет @rapanui_oceanographic_knowledge! Океанографические знания"
 rapanui_add_x_oceanographic_understanding_x_tt: "Увеличить @rapanui_oceanographic_knowledge! Океанографические знания на [SCOPE.GetValue('understanding_amount')|0+]."
 rapanui.501.t: "Новая атлантическая телеграфная компания"
 rapanui.501.d: "Под эгидой [SCOPE.sCharacter('rapanui_telegraph_boss_scope').GetFullName] образовалась влиятельная акционерная корпорация. Телеграфный магнат должен собрать деньги на рискованную прокладку телеграфного кабеля через Атлантику. Атлантическая телеграфная компания [SCOPE.sCharacter('rapanui_telegraph_boss_scope').GetLastNameNoFormatting] попытается сделать невозможное."
 rapanui.501.f: "Когда [SCOPE.sCharacter('rapanui_telegraph_boss_scope').GetLastName] впервые представил свою идею, его встретили насмешками — он буквально утопит своё состояние в океане. Но тем временем нашлись другие спонсоры, которые считают проект реалистичным."
 rapanui.501.g: "Давайте соединим континенты!"
 rapanui.502.t: "Научная поддержка"
 rapanui.502.d: "Незадолго до отплытия кабелеукладочного судна есть возможность добавить в миссию учёного для поддержки проекта."
 rapanui.502.f: "[concept_tesla_engineer] может помочь в случае аварий в море, тем самым защитив проект трансокеанского кабеля от вреда. Он также увеличивает шанс того, что кабель действительно будет работать после его прокладки. [concept_dubois_naturalist], с другой стороны, использует своё пребывание в Атлантике для наблюдения за природой."
 rapanui.502.g: "[SCOPE.sCharacter('gaudi_engineer_scope').GetFullName], наш [concept_tesla_engineer|l]."
 rapanui.502.h: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName], наш [concept_dubois_naturalist|l]."
 rapanui.511.t: "Киты и дельфины"
 rapanui.511.d: "Уникальное зрелище природы предстаёт, когда киты и дельфины пересекают маршрут. [SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName] ожидает новых биологических открытий от наблюдения, но экипаж проявляет мало интереса к такому академическому любопытству."
 rapanui.511.f: "На борту разгорается спор, когда профессор также указывает на презренные методы охоты, используемые для забоя этих очаровательных морских существ. Для большинства моряков, для которых киты служат лишь хранилищами жира, лекция дополнительно действует на нервы."
 rapanui.511.g: "Изучить этих прекрасных существ."
 rapanui.511.h: "У нас нет на это времени."
 rapanui.512.t: "Так много рыбы!"
 rapanui.512.d: "[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName] не может поверить своей удаче, когда [SelectLocalization(SCOPE.sCharacter('rapanui_cable_guy_scope').IsFemale, 'она', 'он')] замечает косяки рыб ранее неизвестных видов в Северной Атлантике. Профессор просит капитана остановить работу и поймать несколько образцов. [SCOPE.sCharacter('target_character').GetFullName] указывает, что это кабелеукладочное судно, а не исследовательское учреждение."
 rapanui.512.f: "«Так поверьте мне! Мы упускаем научные исследования! Эти нежные маленькие рыбки — совершенно неоткрытый вид. Разве вы не видели, что — что вы имеете в виду, я могу плавать в воде с ними прямо сейчас?!»"
 rapanui.512.g: "Поймать немного рыбы."
 rapanui.513.t: "Эксперименты в Атлантическом океане"
 rapanui.513.d: "[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName] использовал[SelectLocalization(SCOPE.sCharacter('rapanui_cable_guy_scope').IsFemale, 'а', '')] время в море, чтобы установить некоторые из своих инструментов для проведения научных исследований на борту кабелеукладочного судна. Он[SelectLocalization(SCOPE.sCharacter('rapanui_cable_guy_scope').IsFemale, 'а', '')] ещё не выбрал[SelectLocalization(SCOPE.sCharacter('rapanui_cable_guy_scope').IsFemale, 'а', '')] направление."
 rapanui.513.f: "«В океане есть река. В самые сильные засухи она никогда не иссякает, а в самые сильные наводнения никогда не выходит из берегов. Её берега и дно — из холодной воды, а её течение — из тёплой. Мексиканский залив — её исток, а её устье — в Северном Ледовитом океане. Это Гольфстрим». — Мэтью Фонтейн Мори"
 rapanui.513.g: "Сосредоточиться на магнитных экспериментах."
 rapanui.513.h: "Сосредоточиться на океанографических экспериментах."
 rapanui.521.t: "Тайна в глубинах"
 rapanui.521.d: "[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName] делает странное открытие при просмотре данных обследования. В определённой части Атлантики морское дно поднимается на необычно высокий уровень. Пока у [SelectLocalization(SCOPE.sCharacter('rapanui_cable_guy_scope').IsFemale, 'неё', 'него')] есть только теория об этом явлении."
 rapanui.521.f: "На самом деле всегда считалось, что моря должны быть особенно глубокими посередине. Но сегодняшнее открытие переворачивает это представление с ног на голову. Вместо рекорда глубины расстояние между дном и поверхностью уменьшается. Это хорошая новость для компании, потому что требуется меньше длины кабеля, чем предполагалось сначала. Но для [SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName] ясно, что это означает, что все предыдущие взгляды на глубокое море должны быть скорректированы. По-видимому, на дне океана есть холмы и долины. И этот холм — нечто большее, чем просто холм."
 rapanui.521.g: "Есть ли подводный горный хребет?"
 rapanui_cable_guy.option: "[SCOPE.sCharacter('rapanui_cable_guy_scope').GetFullName] это исправит."
 rapanui_transatlantic_cable_start_button: "Начать прокладку атлантического кабеля"
 rapanui_transatlantic_cable_start_button_desc: "После того как для проекта будет привлечено достаточно инвесторов, можно начинать фактическую прокладку подводного кабеля."
 rapanui_transatlantic_cable_start_tt: "[GetPlayer.GetName] достиг[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] не менее #G 8#! #V очков прогресса#!."
 subject_type_rapanui_protectorate: "#O Океанический протекторат#!"
 alert_rapanui_pacific_expedition_possible_alert_hint: "Наша страна может отправить [Concept('concept_dubois_pacific_expedition', 'тихоокеанскую экспедицию')]. Чтобы отправить её, откройте академический обзор в #V окне Morgenröte#!."
 rapanui.248.t: "Минералы"
 rapanui.248.d: "Экипаж «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» обнаружил во время своего путешествия несколько скальных образований, богатых сырьём. Команда в настоящее время более подробно изучает скалы."
 rapanui.248.f: "На борту «Галатеи» во время датской тихоокеанской экспедиции также был геолог: Хинрих Йоханнес Ринк. Он особенно занимался географическими исследованиями Никобарских островов, которые тогда были колонизированы Данией. Через пять месяцев он заболел никобарской лихорадкой, что ослабило его на всю оставшуюся жизнь и вынудило вернуться в Данию. В результате большую часть геологического материала он собрал не в Тихом или Индийском океане, а в Каире и на Мальте на обратном пути."
 rapanui.248.g: "Собрать как можно больше минералов."
 rapanui.248.h: "Изучить эту геологическую область более подробно."
 rapanui.249.t: "Странный комок"
 rapanui.249.d: "В прошлый раз, после того как экипаж забросил сети, чтобы собрать материал со дна моря, они выловили странный комок металла. Это, очевидно, скопления разных материалов. На борту «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» пока неясно, как поступить с находкой."
 rapanui.249.f: "«На всём дне Тихого океана (...) мы находим красную глину, и особенно в северной части Тихого океана, где большая глубина воды. В красной глине повсюду есть узелки, которые варьируются от размера саго или канареечного семени до размера детской головы или апельсина, состоящие из почти чистого пероксида марганца. Они встречаются в огромном количестве. Трал (...) вытаскивает массы конкреций, очень похожих на куски минерала, известного как вад, почти все из которых содержат в качестве ядра внутри зуб рыбы, или кусочек губки, или какую-то окаменелость, которая послужила ядром, вокруг которого накопился марганец». — Чарльз Уайвилл Томсон"
 rapanui.249.g: "Разбить его и использовать ресурсы."
 rapanui.249.h: "Доктор [SCOPE.sCharacter('rapanui_scientist').GetLastName] должен осторожно его разобрать."
 rapanui.249.i: "Этот странный узел следует изучить и выставить в научном институте."
 rapanui.249.j: "Доктор [SCOPE.sCharacter('rapanui_scientist').GetLastName] должен оставить этот кусок на память и сделать из него выводы."
 rapanui.269.t: "Драгоценный камень"
 rapanui.269.d: "Во время высадки на берег в Австралии приглашённый учёный [SCOPE.sCharacter('rapanui_scientist').GetFullName] имел возможность исследовать некоторые ранее малоизученные массивы. Помимо опалов и кристаллов, [SelectLocalization(SCOPE.sCharacter('rapanui_scientist').IsFemale, 'она', 'он')] нашёл[SelectLocalization(SCOPE.sCharacter('rapanui_scientist').IsFemale, 'ла', '')] и другие редкие минералы."
 rapanui.269.f: "По сей день Австралия — это место, богатое сырьём, из которого в мир попадают редкие земли, минералы и металлы. Поэтому неслучайно именно на этом континенте доктор [SCOPE.sCharacter('rapanui_scientist').GetLastName] наткнулся на редкий минерал, который он ещё не смог отнести к своей коллекции."
 rapanui.269.g: "Моя прелесть!"
 rapanui.270.t: "Огненное кольцо"
 rapanui.270.d: "Чем дольше [SCOPE.sCharacter('rapanui_scientist').GetFullName] находится на борту «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]» и чем дольше [SelectLocalization(SCOPE.sCharacter('rapanui_scientist').IsFemale, 'она', 'он')] плывёт по Тихому океану, тем больше [SelectLocalization(SCOPE.sCharacter('rapanui_scientist').IsFemale, 'она', 'он')] осознаёт, насколько эта часть мира характеризуется вулканической активностью. Они образуют кольцо вокруг берегов моря. Приглашённый учёный смог приблизиться к дымящимся скальным монстрам и сделать важные заметки."
 rapanui.270.f: "Тихоокеанское огненное кольцо — это вулканический пояс, который окружает Тихий океан с трёх сторон. Около двух третей всех голоценовых извержений вулканов и около 90% мировых землетрясений можно отнести к этой области. Огненное кольцо включает в себя примерно 850-1000 вулканов, которые были активны в последние 11 700 лет."
 rapanui.270.g: "Неужели Тихий океан — это один вулканический кратер с боковыми жерлами?"
 rapanui.203.l: "Необыкновенный шанс для [SCOPE.sCharacter('dubois_geologist_scope').GetFullName], [Concept('concept_agassiz_geologist', '#b #GREEN геолога#!#!')]."
 rapanui.280.t: "Странный волк"
 rapanui.280.d: "К экипажу экспедиции #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#! подошёл охотник. Он принёс странного волка, которого поймал, и предлагает нам его продать."
 rapanui.280.f: "«Эти звери убивают наш драгоценный скот! Сначала я хотел его убить, но потом увидел ваш корабль. Подумал, вам может быть интересно...»"
 rapanui.280.g: "Такое экзотическое животное должно быть в нашем зоопарке!"
 rapanui.280.h: "Мы бы предпочли наблюдать за ним в его естественной среде обитания."
 rapanui.280.i: "Нет, спасибо."
 rapanui.502.i: "Наши учёные нужны в другом месте."
