 MR_PROMOTE_ARCHITECT_TT: "#T Продвигать архитектора#!\n[Concept('concept_gaudi_architect','#PURPLE #b Архитекторы#!#!')] руководят строительством новых сооружений в вашей стране. Они дают пассивный бонус, но также могут быть использованы для улучшения областей новыми сооружениями.\n\n#n Примечание:#! Одновременно у вас может быть только один архитектор.[GetPlayer.GetCustom('mr_promote_has_architect_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
