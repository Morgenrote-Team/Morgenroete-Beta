 MR_SPECIMEN_GARDEN_BUTTON: "Основать ботанический сад"
 MR_SPECIMEN_GARDEN_BUTTON_TT: "#T Основать ботанический сад#!\nБотанический сад в вашем зоопарке сделает его ещё более престижным. Мы можем посадить все экзотические растения, собранные нашим [Concept('concept_dubois_naturalist', 'натуралистом')].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
