 MR_MINERAL_CABINET_BUTTON: "Основать минералогический кабинет"
 MR_MINERAL_CABINET_BUTTON_TT: "#T Основать минералогический кабинет#!\nМинералогический кабинет в вашем зоопарке сделает его ещё более престижным. Мы можем выставить там все минералы, собранные нашим [Concept('concept_agassiz_geologist', '#GREEN #b геологом#!#!')].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MINERAL_CABINET_NUMBER_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] #V 50 или более#! [Concept('concept_agassiz_rare_mineral','редких минералов')] (в настоящее время [GetPlayer.MakeScope.Var('agassiz_rare_minerals_var').GetValue|0+]).#!"
 MR_MINERAL_CABINET_EFFECT_TT: "Ваш [GetBuildingType('building_dubois_zoo').GetName] получит #V минералогический кабинет#!, который даст вам 50 престижа и небольшой прирост к уровню жизни."
 MR_GEOLOGIST_UNDERWATER_MOUNTAINS_BUTTON_TT: "#T Исследовать Атлантические горы#!\nПосле того как во время прокладки трансатлантического кабеля были найдены свидетельства подводных возвышенностей, ведущие геологи задаются вопросом, что могло быть их причиной. Современное измерительное оборудование и опытный геолог могли бы разгадать эту тайну.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_EXPERIENCED_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть #O опытный#! или #O знаменитый#! [concept_agassiz_geologist].#!"
 MR_GEOLOGIST_FAMOUS_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть #O знаменитый#! [concept_agassiz_geologist].#!"
 MR_PALEONTOLOGIST_FAMOUS_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть #O знаменитый#! [concept_dubois_paleontologist].#!"
 MR_GEOLOGIST_ORE_VEIN_BUTTON_TT: "#T Разведка руды#!\n[concept_agassiz_geologist] может искать новые месторождения сырья вблизи уже существующих шахт и таким образом увеличивать добычу руды.\n\nЗдание получит [concept_modifier] $agassiz_building_production_mult_modifier_with_tooltip$.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_ORE_VEIN_STOP_BUTTON_TT: "#T Прекратить разведку руды#!\nВаш [concept_agassiz_geologist] в настоящее время ищет новые месторождения сырья вблизи уже существующих шахт и таким образом увеличивает добычу руды.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_OIL_BUTTON_TT: "#T Разведка нефти#!\n[concept_agassiz_geologist] может искать новые нефтяные скважины вблизи уже существующих нефтяных вышек и таким образом увеличивать добычу.\n\nЗдание получит [Concept('concept_modifier','модификаторы')] $agassiz_building_production_2_mult_modifier_with_tooltip$.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 VISIT_OBSERVATORY_BUTTON: "Посетить планетарий"
 VISIT_OBSERVATORY_BUTTON_TT: "#T Посетить планетарий#!\nПланетарий предлагает вам обзор астрономических знаний вашей страны, других стран и научного сообщества."
 MR_SELL_MINERALS_FOR_RARE_MINERAL_BUTTON_TT: "#T Обменять минералы на редкие#!\n[concept_agassiz_geologist] может приобретать [Concept('concept_agassiz_rare_mineral','редкие минералы')] у коллег, коллекционеров и других энтузиастов геологии. Для этого ему приходится обменивать значительное количество обычных минералов.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON: "Междисциплинарный симпозиум"
 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON_TT: "#T Геолого-палеонтологический симпозиум#!\nГеология и палеонтология тесно пересекаются. Нам следует собрать вместе светил в этой области и использовать синергию, возникающую в результате этого обмена, для создания новых научных теорий об истории Земли.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTING_GEOLOGIST_TT: "#T Продвигать геолога#!\n#p Вы сейчас продвигаете геолога.#!\n[Concept('concept_agassiz_geologist','#GREEN #b Геологи#!#!')] изучают минералы, вулканы и другие геологические формации."
 MR_ACADEMICS_PROMOTE_GEOLOGIST_EFFECT_TT: "Вашим следующим учёным будет [concept_agassiz_geologist|l]."
