 MR_CARTE_DE_CIEL_CONGRESS_BUTTON: "Карта неба"
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON_TT: "#T Конгресс по «Карте неба»#!\nВ 1887 году директор Парижской обсерватории Амедей Мушез инициировал масштабный и беспрецедентный международный проект по составлению карты звёздного неба, осознав потенциал нового фотографического процесса с сухими пластинами, способного кардинально изменить процесс создания звёздных карт. В результате Астрографического конгресса, состоявшегося в Париже в апреле 1887 года, в котором приняли участие более 50 астрономов, 20 обсерваторий со всего мира согласились участвовать в проекте. Мы можем провести такой конгресс, чтобы обменяться астрономическими знаниями международного сообщества.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTRONOMY_CONGRESS_5_YEARS_TRIGGER_TT: "#default_text За #V последние 5 лет#! не проводилось #V ни одного астрономического конгресса#! (у последнего организатора нет модификатора «Провёл астрономический конгресс»)."
 MR_CARTE_DE_CIEL_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Всего в мире открыто не менее #BLUE 7000#! @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','астрономических объектов')] (в настоящее время открыто: [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalobject!).#!"
 MR_CARTE_DE_CIEL_CONGRESS_UNIVERSITY_BUILDING_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [GetBuildingType('building_university').GetName] #V 10-го уровня или выше#!.#!"
 MR_GREAT_DEBATE_CONGRESS_BUTTON: "Большие споры"
 MR_GREAT_DEBATE_CONGRESS_BUTTON_TT: "#T Большие споры#!\nДебаты Шепли — Кёртиса, также известные как «Большие споры», объединили дискуссии начала XX века, которые в конечном итоге привели к новому пониманию природы галактик и размеров Вселенной. Они вращались вокруг размеров Млечного Пути и вопроса о том, являются ли галактики, тогда известные как спиральные туманности, малыми объектами в Млечном Пути или же они гораздо более удалены и отделены от него. В тот день два учёных представили независимые научные доклады о масштабах Вселенной, после чего вечером состоялась публичная дискуссия. Мы можем провести такой конгресс, чтобы обсудить главные тайны Вселенной.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GREAT_DEBATE_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Всего в мире открыто не менее #BLUE 12000#! @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','астрономических объектов')] (в настоящее время открыто: [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalobject!).#!"
