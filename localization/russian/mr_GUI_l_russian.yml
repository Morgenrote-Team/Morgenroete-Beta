 MR_GERMAN_MUSIC_ASSOCIATION_BUTTON_TT: "#T Основать Всеобщий германский музыкальный союз#!\nВсеобщий германский музыкальный союз (ADMV) — это немецкое музыкальное объединение, основанное в 1861 году Ференцем Листом и Францем Бренделем для воплощения музыкальных идеалов Новой немецкой школы. ADMV стремился как к музыкальному исполнению, так и к практической поддержке. В рамках художественных целей ADMV должны были организовываться ежегодные съезды композиторов в разных местах с исполнением важных, редко слышимых и особенно новых музыкальных произведений всех видов. Однако должны были исполняться и более старые произведения, которые слышались лишь изредка или вовсе не слышались, но представляли интерес из-за своей важности.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_RAILWAY_BUTTON_TT: "#T Железнодорожный проект#!\nПозвольте вашему [Concept('concept_tesla_engineer', '#ORANGE #b инженеру#!#!')] сосредоточиться на улучшении сооружения «[GetBuildingType('building_railway').GetName]» в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')]. Вы сможете устанавливать приоритеты для областей, и железные дороги в этих областях получат [concept_modifier] $tesla_modernized_railway_lines_building_modifier_with_tooltip$, который улучшает [concept_throughput] сооружения.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_RAILWAY_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [GetBuildingType('building_railway').GetName] без [Concept('concept_modifier', 'модификатора')] $tesla_modernized_railway_lines_building_modifier_with_tooltip$.#!"
 MR_CIVIL_ENGINEER_IRRIGATION_BUTTON_TT: "#T Ирригационный проект#!\nПозвольте вашему [Concept('concept_tesla_engineer', '#ORANGE #b инженеру#!#!')] сосредоточиться на улучшении ирригации в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')]. Вы сможете устанавливать приоритеты для областей, и эти области получат #V особенность#! #V «$tesla_state_trait_irrigation$»#!, которая улучшает [concept_throughput] сельскохозяйственных сооружений и сопротивляемость различным [Concept('concept_harvest_condition', 'условиям урожая')].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_IRRIGATION_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_state] без #V особенности#! #V «$tesla_state_trait_irrigation$»#!.#!"
