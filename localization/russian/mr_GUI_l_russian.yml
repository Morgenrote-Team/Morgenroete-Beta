 MR_PALEONTOLOGICAL_EXPEDITION_BUTTON_TT: "#T Палеонтологическая экспедиция#!\nОтправьте вашего [Concept('concept_dubois_paleontologist', '#GREEN #b палеонтолога#!#!')] в [concept_dubois_paleontological_expedition]. Экспедиция занимает 1 год и приносит некоторое количество [Concept('concept_dubois_fossil','окаменелостей')] и [Concept('concept_dubois_dinosaur_bone','костей динозавров')].\n\nВ конце экспедиции вы можете оставить [concept_dubois_paleontological_team], чтобы организовать [concept_dubois_paleontological_excavation].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PALEONTOLOGICAL_EXPEDITION_ACTIVE_TT: "#T Текущая палеонтологическая экспедиция#!\nВаш [concept_dubois_paleontologist] в настоящее время находится в [concept_dubois_paleontological_expedition]. Экспедиция занимает 1 год и приносит некоторое количество [Concept('concept_dubois_fossil','окаменелостей')] и [Concept('concept_dubois_dinosaur_bone','костей динозавров')].\n\nВ конце экспедиции вы можете оставить [concept_dubois_paleontological_team], чтобы организовать [concept_dubois_paleontological_excavation]."
 MR_PALEONTOLOGY_FIRST_TEAM_BUTTON: "Первая палеонтологическая группа"
 MR_PALEONTOLOGY_FIRST_TEAM_BUTTON_TT: "#T Первая палеонтологическая группа#!\nСоздать [concept_dubois_paleontological_team]. Вы можете использовать палеонтологические группы для организации [Concept('concept_dubois_paleontological_excavation','палеонтологических раскопок')].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
