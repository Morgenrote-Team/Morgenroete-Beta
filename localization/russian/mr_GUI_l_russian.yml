 mendelejew_element_can_theorize_trigger_tt: "#default_text Есть элементы, которые можно теоретически предсказать. Обычно вам нужен лучший [concept_production_method|l] в вашем сооружении «[GetBuildingType('building_verrier_observatory').GetName]», либо больше нет элементов для теоретического предсказания. #n Примечание:#! Некоторые элементы не могут быть теоретически предсказаны до нашего обновления, посвящённого физикам.#!"
