 MR_REMOUNT_SKELETON_BUTTON: "Перемонтировать скелет динозавра"
 MR_REMOUNT_SKELETON_BUTTON_TT: "#T Перемонтировать скелет динозавра#!\nЕсли у вас есть несовершенные [Concept('concept_dubois_dinosaur_skeleton','скелеты динозавров')], вы можете позволить вашему [Concept('concept_dubois_paleontologist', 'палеонтологу')] попытаться перемонтировать их. Если ваш палеонтолог достаточно опытен, перемонтированный скелет может оказаться лучшего качества.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
