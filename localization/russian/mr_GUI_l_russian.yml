 MR_ACADEMICS_PROMOTE_UNIVERSITY_HUMANITIES_TT: "#default_text В [GetPlayer.GetAltNameNoFlag('RU_CL_PP')] есть хотя бы один университет, в котором [concept_pm_academics_university_humanities|l].#!"
 MR_ACADEMICS_PROMOTE_UNIVERSITY_NEUTRAL_TT: "#default_text В [GetPlayer.GetAltNameNoFlag('RU_CL_PP')] есть хотя бы один университет без [Concept('concept_academics_university_specialization', 'специализации')].#!"
 MR_ACADEMICS_PROMOTE_ENGINEER_EFFECT_TT: "Ваш следующий учёный будет [Concept('concept_tesla_engineer', 'инженером')]."
 MR_ACADEMICS_PROMOTE_ASTRONOMER_EFFECT_TT: "Ваш следующий учёный будет [Concept('concept_verrier_astronomer', 'астрономом')]."
 MR_ACADEMICS_PROMOTE_NATURALIST_EFFECT_TT: "Ваш следующий учёный будет [Concept('concept_dubois_naturalist', 'натуралистом')]."
 MR_ACADEMICS_PROMOTE_PALEONTOLOGIST_EFFECT_TT: "Ваш следующий учёный будет [Concept('concept_dubois_paleontologist', 'палеонтологом')]."
 MR_ACADEMICS_PROMOTE_ARCHAEOLOGIST_EFFECT_TT: "Ваш следующий учёный будет [Concept('concept_lepsius_archaeologist', 'археологом')]."
 MR_ACADEMICS_PROMOTE_ANTHROPOLOGIST_EFFECT_TT: "Ваш следующий учёный будет [Concept('concept_lepsius_anthropologist', 'антропологом')]."
 MR_ACADEMICS_PROMOTE_UNIVERSITY_INVESTMENT_TT: "#T Академические инвестиции#!\nОбщие государственные инвестиции в наши университеты увеличат #O академический прогресс#! на #G +1#! в месяц. Финансирование рассчитано на 10 лет.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_PROMOTE_UNIVERSITY_INVESTMENT_TRIGGER_TT: "#tooltippable_name [GetPlayer.GetAdjective]ие#! власти ещё не инвестируют в академию."
 MR_ACADEMICS_AVANTGARDE_TT: "#T Авангардная интеллигенция#!\nКли́ка учёных с чёткими культурными, социологическими и антропологическими идеями определяет повседневную научную жизнь. Практические области, напротив, имеют меньшее значение.\n#R Примечание#!: Увеличивает появление академиков на одно очко в месяц.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_AVANTAGRDE_OR_CONFUSION_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] ещё нет фокуса #b «Авангардная интеллигенция»#! и фокус недавно не менялся.#!"
 MR_ACADEMICS_AVANTGARDE_BUILDING_REQUIREMENT_TT: "#default_text По крайней мере #p 50%#! #tooltippable_name [GetPlayer.GetAdjective|l]их#! университетов имеют [concept_pm_academics_university_humanities|l].#!"
 MR_ACADEMICS_PRACTICAL_TT: "#T Практическая академия#!\nУчёные в нашей стране неустанно пытаются применить открытия из всех областей в повседневной практике. Это должно служить общему прогрессу и миру человечества.\n#R Примечание#!: Увеличивает появление академиков на одно очко в месяц.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_PRACTICAL_OR_CONFUSION_TT: "#S У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] ещё нет фокуса #b «Практическая академия»#! и фокус недавно не менялся.#!"
 MR_ACADEMICS_PRACTICAL_BUILDING_REQUIREMENT_TT: "#default_text По крайней мере #p 50%#! #tooltippable_name [GetPlayer.GetAdjective|l]их#! университетов имеют [concept_pm_academics_university_natural_history|l].#!"
 MR_ACADEMICS_MILITARY_TT: "#T Военно-промышленный комплекс#!\nСотрудничество между частными промышленниками и военными привело к развитию особенно важной сети связей, личных контактов и знакомств, с лёгким намёком на коррупцию, которую лучше всего можно описать как военно-промышленный комплекс.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_MILITARY_OR_CONFUSION_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] ещё нет фокуса #b «Военно-промышленный комплекс»#! и фокус недавно не менялся.#!"
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_TT: "#default_text По крайней мере #p 50%#! #tooltippable_name [GetPlayer.GetAdjective|l]их#! университетов имеют [concept_pm_academics_university_mathematics|l].#!"
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_2_TT: "#default_text В [GetPlayer.GetAltNameNoFlag('RU_CL_PP')] есть хотя бы одно сооружение: [GetBuildingType('building_automotive_industry').GetName], [GetBuildingType('building_arms_industry').GetName], [GetBuildingType('building_munition_plant').GetName] или [GetBuildingType('building_artillery_foundry').GetName] уровня #p 5#! или выше.#!"
 MR_ACADEMICS_MILITARY_ARMY_SIZE_REQUIREMENT_TT: "#default_text #tooltippable_name [GetPlayer.GetAdjective]ая#! армия насчитывает не менее #b 50#! батальонов.#!"
 MR_ACADEMICS_BUSINESS_TT: "#T Бизнес-школы и капитализм магнатов#!\nНезависимая личность в сочетании с процветающим временем прогресса привела к менталитету, в котором торговые школы, средние компании и крупные корпорации оказывают решающее влияние на науку страны. И наоборот, университеты работают над увеличением приобретённого процветания нации за счёт новых технологий и продвижением социальных идей через прогресс.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_BUSINESS_OR_CONFUSION_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] ещё нет фокуса #b «Бизнес-школы и капитализм магнатов»#! и фокус недавно не менялся.#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_TT: "#default_text По крайней мере #p 35%#! #tooltippable_name [GetPlayer.GetAdjective|l]их#! университетов имеют [concept_pm_academics_university_mathematics|l].#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_2_TT: "#default_text По крайней мере #p 35%#! #tooltippable_name [GetPlayer.GetAdjective|l]их#! университетов имеют [concept_pm_academics_university_humanities|l].#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_3_TT: "#default_text В [GetPlayer.GetAltNameNoFlag('RU_CL_PP')] есть либо [GetBuildingType('building_textile_mill').GetName], либо [GetBuildingType('building_furniture_manufactory').GetName] не ниже #p 15#! уровня, либо [GetBuildingType('building_tooling_workshop').GetName], либо [GetBuildingType('building_steel_mill').GetName] не ниже #p 10#! уровня, либо [GetBuildingType('building_motor_industry').GetName], либо [GetBuildingType('building_electrics_industry').GetName] не ниже #p 5#! уровня.#!"
 MR_ACADEMICS_SEAPOWER_TT: "#T Морская мощь и торговый флот#!\nФлот и международная торговля играют огромную роль для нашей страны. Увеличение благосостояния за счёт передового производства и мировой торговли нашей продукцией так же важно, как и защита уже заработанного.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_SEAPOWER_OR_CONFUSION_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] ещё нет фокуса #b «Морская мощь и торговый флот»#! и фокус недавно не менялся.#!"
 MR_ACADEMICS_SEAPOWER_BUILDING_REQUIREMENT_TT: "#default_text По крайней мере #p 35%#! #tooltippable_name [GetPlayer.GetAdjective|l]их#! университетов имеют [concept_pm_academics_university_mathematics|l].#!"
 MR_ACADEMICS_SEAPOWER_BUILDING_REQUIREMENT_2_TT: "#default_text По крайней мере #p 35%#! #tooltippable_name [GetPlayer.GetAdjective|l]их#! университетов имеют [concept_pm_academics_university_natural_history|l].#!"
 MR_ACADEMICS_SEAPOWER_NAVY_SIZE_REQUIREMENT_TT: "#default_text #tooltippable_name [GetPlayer.GetAdjective|l]ий#! флот насчитывает не менее #b 50#! флотилий.#!"
 MR_ACADEMICS_USEFUL_TT: "#T Полезная башня из слоновой кости#!\nАкадемия в нашей стране рассматривается как прибежище для эксцентричных умов, которые считают жуков, полируют старые вазы и балуются чудачествами. Однако нельзя отрицать, что изоляция башни из слоновой кости от общества также имеет свои преимущества. Не отвлекаясь, многие профессора работают лучше.\n#R Примечание#!: Увеличивает появление академиков на одно очко в месяц.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_USEFUL_OR_CONFUSION_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] ещё нет фокуса #b «Полезная башня из слоновой кости»#! и фокус недавно не менялся.#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_TT: "#default_text По крайней мере #p 35%#! #tooltippable_name [GetPlayer.GetAdjective|l]их#! университетов имеют [concept_pm_academics_university_humanities|l].#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_2_TT: "#default_text По крайней мере #p 35%#! #tooltippable_name [GetPlayer.GetAdjective|l]их#! университетов имеют [concept_pm_academics_university_natural_history|l].#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_3_TT: "#default_text В [GetPlayer.GetAltNameNoFlag('RU_CL_PP')] есть [GetBuildingType('building_lepsius_archaeological_museum').GetName], [GetBuildingType('building_verrier_observatory').GetName] или [GetBuildingType('building_dubois_zoo').GetName].#!"
 MR_MOUNTAIN_EXPEDITION_TT: "#T Горная экспедиция#!\nС восхождением на Монблан в 1786 году началась новая эра покорения высочайших вершин Земли; тенденция, которая только усилилась в XIX и XX веках. Если на одной из наших территорий есть горный хребет, который ещё не был покорён, мы могли бы поручить его покорение способному генералу с соответствующими навыками.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_UNCONQUERED_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] владеет хотя бы одной #V непокорённой вершиной#! или имеет #V лицензию на альпинизм#! со страной, которая ею владеет.#!"
 MR_MOUNTAIN_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] недавно не достигал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] успешно новой горы и не проваливал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] горную экспедицию.#!"
 MR_ZEPPELIN_EXPEDITION_TT: "#T Экспедиция на дирижабле#!\n«Аэроарктика», «Международное общество по изучению Арктики с помощью дирижаблей», была неправительственной научной ассоциацией, поставившей себе целью использование дирижаблей в полярных исследованиях. Она была основана в основном по инициативе аэронавта и позднее генерального секретаря общества Вальтера Брунса. Учредительным президентом в 1924 году был Фритьоф Нансен. После нескольких лет подготовительной работы обществу удалось в 1931 году впервые использовать дирижабль для чисто научной полярной экспедиции. Благодаря арктическому полёту LZ 127 «Граф Цеппелин» знания о географии пролетаемых полярных регионов были значительно расширены. Ещё в 1926 году Умберто Нобиле пролетел над Северным полюсом на своём дирижабле «Норвегия», а позже предпринял экспедицию на «Италии».\n\n [ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ZEPPELIN_OBSERVATORY_TRIGGER_TT: "#default_text В [GetPlayer.GetAltNameNoFlag('RU_CL_PP')] есть [GetBuildingType('building_verrier_observatory').GetName] с методом производства #V «Метеостанция»#!.#!"
