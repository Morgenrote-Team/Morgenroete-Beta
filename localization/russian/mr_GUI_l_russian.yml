 MR_UPPER_EGYPT_EXPEDITION_TT: "#T Отправить экспедицию в Долину царей#!\nВерхний Египет со своей древней столицей Фивами и Долиной царей считается меккой египтологии. Нам следует приобрести лицензию на раскопки в этом районе и начать поиски египетских сокровищ.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V Лепсиус написал письмо Розеллини#!, что положило начало археологии в Египте.#!"
 MR_UPPER_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] в данный момент #V не финансирует#! [Concept('concept_lepsius_expedition', 'археологическую экспедицию')] в Верхний Египет.#!"
 MR_UPPER_EGYPT_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] либо #V владеет областью Верхний Египет#!, либо имеет [Concept('concept_lepsius_excavation_licence', 'лицензию на раскопки')] от владельца.#!"
 MR_LOWER_EGYPT_EXPEDITION_TT: "#T Отправить экспедицию к пирамидам#!\nС незапамятных времён египетские пирамиды завораживали человечество. Говорят, что другие гробницы, храмы и даже целые города, исчезнувшие в песках Нижнего Египта, ждут своего переоткрытия.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LOWER_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] в данный момент #V не финансирует#! [Concept('concept_lepsius_expedition', 'археологическую экспедицию')] в Нижний Египет.#!"
 MR_LOWER_EGYPT_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] либо #V владеет областью Нижний Египет#!, либо имеет [Concept('concept_lepsius_excavation_licence', 'лицензию на раскопки')] от владельца.#!"
 MR_BABYLONIA_EXPEDITION_TT: "#T Отправить экспедицию в колыбель цивилизации#!\nВавилония, южная часть Месопотамии, обязана своим названием некогда могущественному городу Вавилону. Этот регион считается «колыбелью цивилизации», где то и дело находят ценные археологические артефакты. Им определённо место в музее.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MESOPOTAMIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V Аккадский язык был расшифрован#!, что позволило проводить археологические исследования в Месопотамии.#!"
 MR_BABYLONIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] в данный момент #V не финансирует#! [Concept('concept_lepsius_expedition', 'археологическую экспедицию')] в Вавилонию.#!"
 MR_BABYLONIA_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] либо #V владеет областью Багдад#!, либо имеет [Concept('concept_lepsius_excavation_licence', 'лицензию на раскопки')] от владельца.#!"
 MR_ASSYRIA_EXPEDITION_TT: "#T Отправить экспедицию в сады Ассирии#!\nАссирия — это северная часть Месопотамии с двумя важными городами, Ашшуром и Ниневией. Скудные знания об этой стране до сих пор можно почерпнуть из Библии, но, возможно, существуют более надёжные исторические свидетельства?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASSYRIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] в данный момент #V не финансирует#! [Concept('concept_lepsius_expedition', 'археологическую экспедицию')] в Ассирию.#!"
 MR_ASSYRIA_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] либо #V владеет областью Мосул#!, либо имеет [Concept('concept_lepsius_excavation_licence', 'лицензию на раскопки')] от владельца.#!"
 MR_ARGOLIS_EXPEDITION_TT: "#T Отправить экспедицию в город Агамемнона#!\nПосле открытия Трои даже скептически настроенные учёные начинают понимать, что мифы древних греков — это нечто большее, чем просто сказки. Говорят, что в Арголиде по сей день лежат останки городов бронзового века, самый известный из которых — Микены. Нам стоит убедиться в этом самим.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GREECE_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V Шлиман открыл Трою#!, что позволило проводить археологические исследования в Греции.#!"
 MR_ARGOLIS_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] в данный момент #V не финансирует#! [Concept('concept_lepsius_expedition', 'археологическую экспедицию')] в Арголиду.#!"
 MR_ARGOLIS_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] либо #V владеет областью Пелопоннес#!, либо имеет [Concept('concept_lepsius_excavation_licence', 'лицензию на раскопки')] от владельца.#!"
 MR_CRETE_EXPEDITION_TT: "#T Отправить экспедицию во дворцы Крита#!\nГоворят, что на Крите некогда правил легендарный царь Минос. Подобно Трое и Микенам, в этой истории, похоже, тоже есть доля правды: на острове всё чаще находят артефакты легендарной минойской культуры. Нашей державе также следует заполучить несколько из них.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CRETE_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] в данный момент #V не финансирует#! [Concept('concept_lepsius_expedition', 'археологическую экспедицию')] на Крит.#!"
 MR_CRETE_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] либо #V владеет областью Крит#!, либо имеет [Concept('concept_lepsius_excavation_licence', 'лицензию на раскопки')] от владельца.#!"
 MR_YUCATAN_EXPEDITION_TT: "#T Отправить экспедицию в затерянные города майя#!\nУчастились сообщения о неизвестных и огромных городах посреди джунглей. Нам следует провести расследование и отправить археологическую экспедицию на Юкатан.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_YUCATAN_EXPEDITION_DISCOVERED_TRIGGER_TT: "#default_text #V Стивенс и Казервуд предприняли экспедицию#!, что позволило проводить археологические исследования на Юкатане.#!"
 MR_YUCATAN_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] в данный момент #V не финансирует#! [Concept('concept_lepsius_expedition', 'археологическую экспедицию')] на Юкатан.#!"
 MR_YUCATAN_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] либо #V владеет областью Юкатан#!, либо имеет [Concept('concept_lepsius_excavation_licence', 'лицензию на раскопки')] от владельца.#!"
 MR_PERU_EXPEDITION_TT: "#T Отправить экспедицию на поиски скрытого наследия инков#!\nПилоты сообщают о странных крепостях и обнесённых стенами сооружениях в Андах, которые они видели во время полётов над Перу. Может быть, испанцы не полностью уничтожили культуру инков? Некоторые города коренного сопротивления до сих пор не найдены.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PERU_EXPEDITION_DISCOVERED_TRIGGER_TT: "#default_text #V Бингем открыл Мачу-Пикчу#!, что позволило проводить археологические исследования в Перу.#!"
 MR_PERU_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] в данный момент #V не финансирует#! [Concept('concept_lepsius_expedition', 'археологическую экспедицию')] в Перу.#!"
 MR_PERU_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] либо #V владеет областью $STATE_ICA$#!, либо имеет [Concept('concept_lepsius_excavation_licence', 'лицензию на раскопки')] от владельца.#!"
 MR_EXODUS_CONGRESS_BUTTON: "Конгресс об Исходе"
 MR_EXODUS_CONGRESS_BUTTON_TT: "#T Конгресс об Исходе#!\nС углублением исследований Египта и Леванта вновь возникает вопрос об историчности библейских событий. В частности, отсутствие упоминания об Исходе, то есть уходе евреев из Египта, породило вопрос, не являются ли Пять книг Моисеевых просто вымыслом. Радикально настроенные учёные даже требуют полностью игнорировать все библейские истории. Другая группа утверждает, что библейские рассказы нельзя воспринимать буквально, но они имеют научную ценность.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXODUS_CONGRESS_EGYPTIAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetAltNameNoFlag('RU_CL_DP')] нужно как минимум #V 25#! @lepsius_egypt_minor! египетских [Concept('concept_lepsius_artifact','артефактов')] (сейчас [GetPlayer.MakeScope.Var('lepsius_egyptian_artifact_minor').GetValue|0+]).#!"
 MR_EXODUS_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text Во всём мире найдено как минимум #V 150#! @lepsius_egypt_minor! [Concept('concept_lepsius_artifact','артефактов')] (сейчас [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0] @lepsius_egypt_minor!).#!"
 MR_CIVILIZATION_CONGRESS_BUTTON: "Конгресс о цивилизации"
 MR_CIVILIZATION_CONGRESS_BUTTON_TT: "#T Конгресс о возникновении цивилизации#!\nВеками считалось, не только в Европе, но и в других странах Средиземноморья и Ближнего Востока, что Египет — древнейшая цивилизация. Но с ежедневным увеличением находок из Ассирии и Вавилонии эта теория была явно поколеблена. Скорее, выясняется, что письменность, по-видимому, была изобретена в Месопотамии — как и многие другие достижения, сопровождавшие зарождение цивилизации. Возможно ли, что каждая цивилизация в конечном счёте произошла из Вавилона — и каждая форма религии происходит от вавилонских мифов? Может быть, «Эпос о Гильгамеше» — это вдохновение для всей литературы, от Библии до гомеровских эпосов?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVILIZATION_CONGRESS_MESOPOTAMIAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetAltNameNoFlag('RU_CL_DP')] нужно как минимум #V 25#! @lepsius_mesopotamia_minor! месопотамских [Concept('concept_lepsius_artifact','артефактов')] (сейчас [GetPlayer.MakeScope.Var('lepsius_mesopotamian_artifact_minor').GetValue|0+]).#!"
 MR_CIVILIZATION_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text Во всём мире найдено как минимум #V 300#! @lepsius_mesopotamia_minor! [Concept('concept_lepsius_artifact','артефактов')] (сейчас [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0] @lepsius_mesopotamia_minor!).#!"
 MR_TROY_CONGRESS_BUTTON: "Конгресс о Трое"
 MR_TROY_CONGRESS_BUTTON_TT: "#T Конгресс о Трое#!\nШлиман нашёл Трою. По крайней мере, так он утверждает. Хотя критические голоса, считавшие Трою простым вымыслом, поутихли, целый ряд вопросов остаётся без ответа. Является ли Троя, найденная Шлиманом, гомеровской Троей? И что вообще представляла собой Троя? Ряд учёных по-прежнему настроены скептически. А новые открытия из Анатолии могут пролить совершенно новый свет на эти находки.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TROY_CONGRESS_AEGEAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetAltNameNoFlag('RU_CL_DP')] нужно как минимум #V 25#! @lepsius_aegean_minor! эгейских [Concept('concept_lepsius_artifact','артефактов')] (сейчас [GetPlayer.MakeScope.Var('lepsius_aegean_artifact_minor').GetValue|0+]).#!"
 MR_TROY_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text Во всём мире найдено как минимум #V 300#! @lepsius_aegean_minor! [Concept('concept_lepsius_artifact','артефактов')] (сейчас [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0] @lepsius_aegean_minor!).#!"
 MR_INSPECT_EXCAVATION_BUTTON: "Осмотреть раскопки"
 MR_INSPECT_EXCAVATION_BUTTON_TT: "#T Осмотреть раскопки#!\nМы можем отправить опытного археолога в район, где мы ведём раскопки, чтобы активизировать наши усилия. Примерно через год наш археолог откроет новое место раскопок и проведёт интенсивные исследования, в ходе которых мы сможем найти новые указания на ранее неизвестные, крупные археологические открытия. Успех во многом зависит от опыта нашего археолога. Учреждение Археологического общества также повышает наши шансы.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_INSPECT_EXCAVATION_TRIGGER_TT: "#default_text [GetPlayer.GetName] ведёт #V как минимум одни [concept_lepsius_excavation]#! в районе, где не было сделано крупных археологических открытий.#!"
 MR_INSPECT_EXCAVATION_ARTIFACT_FOR_DISCOVERY_TRIGGER_TT: "#default_text [GetPlayer.GetAltName('RU_CL_RP')] нужно #V изучить как минимум 30 [Concept('concept_lepsius_artifact','артефактов')]#! в определённом регионе, прежде чем искать там улики.#!"
 MR_CANCEL_EXCAVATION_BUTTON: "Отменить раскопки"
 MR_CANCEL_EXCAVATION_BUTTON_TT: "#T Отменить раскопки#!\nВ некоторых ситуациях может быть полезно отозвать раскопочную группу. Приобретённые нами артефакты и коллекции останутся, но наши постоянные раскопки прекратятся.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHAEOLOGY_ON_ARCHAEOLOGICAL_EXCAVATION_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть как минимум #V 1#! [Concept('concept_lepsius_archaeological_team','раскопочная группа')], ведущая [concept_lepsius_excavation].#!"
 MR_LOCAL_EXCAVATION_BUTTON: "Местные раскопки"
 MR_LOCAL_EXCAVATION_BUTTON_TT: "#T Местные раскопки#!\nАрхеологические сокровища ждут своего открытия не только в далёких краях. Хотя местные раскопки считаются менее престижными, чем поиск знаменитых артефактов, они дают представление о преимущественно доисторической эпохе нашего родного региона. В отличие от раскопок после экспедиции, местные раскопки не могут быть завершены, пока не иссякнет финансирование.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHAEOLOGICAL_MUSEUM_BUILDING_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [GetBuildingType('building_lepsius_archaeological_museum').GetName].#!"
