 MR_VISIT_OPERA_BUTTON_TT: "#T Посетить оперу#!\nОбщую ценность нашей музыкальной традиции и её состав можно проверить в опере. Здесь также можно найти информацию об активных и странствующих композиторах.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
