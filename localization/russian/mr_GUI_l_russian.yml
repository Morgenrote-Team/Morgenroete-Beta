 MR_LITERACY_RATE_66_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] [concept_literacy] #V 66%#! или выше.#!"
 MR_ARCHAEOLOGY_EXPERIENCED_ARCHAEOLOGIST_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть #V опытный [concept_lepsius_archaeologist]#!.#!"
