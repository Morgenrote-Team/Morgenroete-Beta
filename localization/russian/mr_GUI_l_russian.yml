 MR_LOCAL_WRITER_NAME: "#tooltip:[GetRawTextTooltipTag('manzoni_official_writer_rating_tt_loc')] [Character.GetCustom('manzoni_writer_rating_new_writer_icon_type')] #! [Character.GetLastName]"
 MR_AERONAUTICAL_ENGINEER_SPEED_AIRPLANE_BUTTON: "Высокоскоростной самолёт"
 MR_AERONAUTICAL_ENGINEER_SPEED_AIRPLANE_BUTTON_TT: "#T Высокоскоростной самолёт#!\nНаш [Concept('concept_tesla_aeronautical_engineer', '#ORANGE #b авиаконструктор#!#!')] может создать высокоскоростной самолёт, чтобы побить существующий рекорд. Для создания самого быстрого самолёта в мире нужен не только [Concept('concept_tesla_engineer', '#ORANGE #b инженер#!#!')], но и [Concept('concept_curtiss_pilot', 'пилот')], чтобы им управлять. Успех зависит от опыта инженера и пилота, а также от передовых технологий.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AERONAUTICAL_ENGINEER_NO_RECORD_TECH_TRIGGER_TT: "#default_text [GetPlayer.GetName] в настоящее время #R не#! удерживает #V рекорд скорости#!.#!"
