 MR_CHEMIST_SYNTHETIC_OIL_BUTTON: "Синтетическая нефть"
 MR_CHEMIST_SYNTHETIC_OIL_BUTTON_TT: "#T Синтетическая нефть#!\nНефть ограничена регионами с её запасами. Но что, если мы могли бы создавать нефть сами? Больше не было бы необходимости завоёвывать чужие регионы только ради их нефти. Позвольте вашему [Concept('concept_mendelejew_chemist', '#ORANGE #b химику#!#!')] попытаться создать синтетическую нефть.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHEMIST_FERTILIZER_BUTTON: "#T Улучшить удобрения#!\nПозвольте вашему [Concept('concept_mendelejew_chemist', '#ORANGE #b химику#!#!')] улучшить производство удобрений в сооружениях «[GetBuildingType('building_chemical_plant').GetName]».\nЭто со временем добавит три модификатора к вашему сооружению: $mendelejew_building_throughput_add_modifier_with_tooltip$, $mendelejew_building_production_mult_modifier_with_tooltip$ и $mendelejew_building_goods_input_mult_modifier_with_tooltip$.\n\nЭтот проект добавит #n расходы#! вашей стране.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHEMIST_FERTILIZER_ACTIVE_TT: "#T Улучшение удобрений#!\n#p Ваш [concept_mendelejew_chemist|l] в настоящее время улучшает производство удобрений в сооружениях «[GetBuildingType('building_chemical_plant').GetName]».#!"
 MR_CHEMIST_EXPLOSIVES_BUTTON: "#T Улучшить взрывчатые вещества#!\nПозвольте вашему [Concept('concept_mendelejew_chemist', '#ORANGE #b химику#!#!')] улучшить производство взрывчатых веществ в сооружениях «[GetBuildingType('building_explosives_factory').GetName)]».\nЭто со временем добавит три модификатора к вашему сооружению: $mendelejew_building_throughput_add_modifier_with_tooltip$, $mendelejew_building_production_mult_modifier_with_tooltip$ и $mendelejew_building_goods_input_mult_modifier_with_tooltip$.\n\nЭтот проект добавит #n расходы#! вашей стране.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHEMIST_EXPLOSIVES_ACTIVE_TT: "#T Улучшение взрывчатых веществ#!\n#p Ваш [concept_mendelejew_chemist] в настоящее время улучшает производство взрывчатых веществ в сооружениях «[GetBuildingType('building_explosives_factory').GetName)]».#!"
 MR_CHEMIST_SYNTHETICS_BUTTON: "#T Улучшить синтетику#!\nПозвольте вашему [Concept('concept_mendelejew_chemist', '#ORANGE #b химику#!#!')] улучшить производство синтетики в сооружениях «[GetBuildingType('building_synthetics_plant').GetName]» или «[GetBuildingType('building_mendelejew_hydrogenation_plants').GetName]».\nЭто со временем добавит три модификатора к вашему сооружению: $mendelejew_building_throughput_add_modifier_with_tooltip$, $mendelejew_building_production_mult_modifier_with_tooltip$ и $mendelejew_building_goods_input_mult_modifier_with_tooltip$.\n\nЭтот проект добавит #n расходы#! вашей стране.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
