 curtiss_pilot_speed_record_gui_loc: "Рекорд скорости: [GetGlobalVariable('curtiss_airplane_speed_record_global_var').GetValue|V0] км/ч [GetGlobalVariable('curtiss_airplane_speed_record_holder_global_var').GetCountry.GetFlagTextIcon]"
 MR_PROMOTING_ENGINEER_TT: "#T Продвигать инженера#!\n#p Вы сейчас продвигаете инженера.#!\n[Concept('concept_tesla_engineer','#ORANGE #b Инженеры#!#!')] — универсальные специалисты в военной и строительной сферах. Они также вдвое ускоряют строительство памятников."
 MR_PROMOTING_ASTRONOMER_TT: "#T Продвигать астронома#!\n#p Вы сейчас продвигаете астронома.#!\n[Concept('concept_verrier_astronomer','#ORANGE #b Астрономы#!#!')] находят новые астрономические объекты, открывают звёзды и планеты или могут принимать участие в астрономических конгрессах."
 MR_PROMOTING_NATURALIST_TT: "#T Продвигать натуралиста#!\n#p Вы сейчас продвигаете натуралиста.#!\n[Concept('concept_dubois_naturalist','#GREEN #b Натуралисты#!#!')] могут ловить животных в своей стране или за рубежом, находить образцы или возглавлять ботанические экспедиции."
 MR_PROMOTING_PALEONTOLOGIST_TT: "#T Продвигать палеонтолога#!\n#p Вы сейчас продвигаете палеонтолога.#!\n[Concept('concept_dubois_paleontologist','#GREEN #b Палеонтологи#!#!')] могут исследовать геологические формации на предмет окаменелостей и костей динозавров или находить их в экспедициях."
 MR_PROMOTING_ARCHAEOLOGIST_TT: "#T Продвигать археолога#!\n#p Вы сейчас продвигаете археолога.#!\n[Concept('concept_lepsius_archaeologist','#BLUE #b Археологи#!#!')] могут находить артефакты, делать крупные открытия и посещать археологические конференции."
 MR_PROMOTING_ANTHROPOLOGIST_TT: "#T Продвигать антрополога#!\n#p Вы сейчас продвигаете антрополога.#!\n[Concept('concept_lepsius_anthropologist','#BLUE #b Антропологи#!#!')] изучают происхождение человека, от начала эволюции до каменного века."
 MR_ACADEMICS_INVESTMENT_ACTIVE_TT: "#T Инвестиции в науку#!\n#p Вы инвестируете в науку.#!\nОбщие государственные инвестиции в наши университеты увеличат #O научный прогресс#! на #G +1#! в месяц. Финансирование рассчитано на 10 лет."
 MR_PROMOTING_COMPOSER_TT: "#T Продвигать композитора#!\n#p Вы сейчас продвигаете композитора.#!\n[Concept('concept_elgar_composer','#PURPLE #b Композиторы#!#!')] необходимы для создания процветающей музыкальной культуры. Они помогут стране создавать больше [Concept('concept_elgar_musical_tradition', 'музыкальной традиции')]."
 MR_PROMOTING_WRITER_TT: "#T Продвигать писателя#!\n#p Вы сейчас продвигаете писателя.#!\n[Concept('concept_manzoni_writer','#PURPLE #b Писатели#!#!')] — мастера повествования, работающие над книгами и другой литературой. Своим творчеством они укрепляют [Concept('concept_manzoni_literary_tradition', 'литературную традицию')] страны."
 MR_PROMOTING_PAINTER_TT: "#T Продвигать художника#!\n#p Вы сейчас продвигаете художника.#!\n[Concept('concept_klimt_painter','#PURPLE #b Художники#!#!')] запечатлевают на холсте впечатления, пейзажи и чудеса света. Своими шедеврами они укрепляют [Concept('concept_klimt_painting_tradition', 'художественную традицию')] страны."
 MR_AVANTGARDE_INTELLIGENTSIA_ACTIVE_TT: "#T Авангардная интеллигенция#!\n#p Авангардная интеллигенция — ваш текущий научный фокус.#!\nГруппа учёных с чёткими культурными, социологическими и антропологическими идеями определяет научную жизнь. Практические области, напротив, имеют меньшее значение.\n#R Примечание#!: Увеличивает появление [Concept('concept_academics_academics', 'учёных')] на одно очко в месяц."
 MR_PRACTICAL_ACADEMIA_ACTIVE_TT: "#T Прикладная наука#!\n#p Прикладная наука — ваш текущий научный фокус.#!\nУчёные нашей страны неустанно пытаются применить открытия из всех областей в повседневной жизни. Это должно служить общему прогрессу и миру человечества.\n#p Примечание#!: Увеличивает появление [Concept('concept_academics_academics', 'учёных')] на одно очко в месяц."
 MR_MILITARY_INDUSTRIAL_COMPLEX_ACTIVE_TT: "#T Военно-промышленный комплекс#!\n#p Военно-промышленный комплекс — ваш текущий научный фокус.#!\nСотрудничество между частными промышленниками и военными привело к развитию особенно важной сети связей, личных контактов и знакомств с лёгким намёком на коррупцию, что лучше всего можно описать как военно-промышленный комплекс."
 MR_BUSINESS_AND_TYCOON_ACTIVE_TT: "#T Бизнес-школы и капитализм магнатов#!\n#p Бизнес-школы и капитализм магнатов — ваш текущий научный фокус.#!\nНезависимая личность в сочетании с эпохой процветания и прогресса привела к менталитету, при котором торговые школы, средние компании и крупные корпорации оказывают решающее влияние на науку страны. В свою очередь, университеты работают над увеличением приобретённого нацией благосостояния с помощью новых технологий и продвижением социальных идей через прогресс."
 MR_SEA_POWER_AND_MERCHANT_ACTIVE_TT: "#T Морская мощь и торговый флот#!\n#p Морская мощь и торговый флот — ваш текущий научный фокус.#!\nВоенно-морской флот и международная торговля играют огромную роль для нашей страны. Увеличение благосостояния за счёт передового производства и мировой торговли нашей продукцией так же важно, как и защита уже заработанного."
 MR_IVORY_TOWER_ACTIVE_TT: "#T Полезная башня из слоновой кости#!\n#p Полезная башня из слоновой кости — ваш текущий научный фокус.#!\nВ нашей стране академия рассматривается как приют для эксцентричных умов, которые считают жуков, полируют старые вазы и занимаются чудачествами. Однако нельзя отрицать, что изоляция башни из слоновой кости от общества также имеет свои преимущества. В уединении многие профессора работают лучше.\n#p Примечание#!: Увеличивает появление [Concept('concept_academics_academics', 'учёных')] на одно очко в месяц."
 MR_ON_PACIFIC_EXPEDITION_TT: "#T Тихоокеанская экспедиция#!\n#p В настоящее время продолжается тихоокеанская экспедиция.#!\nНаряду с полюсами, Тихий океан является одной из последних областей на Земле, которые всё ещё хранят тайны. Учёные из разных научных дисциплин заинтересованы в исследовательской миссии для проведения натуралистических, палеонтологических, астрономических и океанографических исследований. Опять же, для великих держав это может стать престижным делом, чтобы продемонстрировать своё влияние на краю света."
 MR_ON_NORTHWEST_EXPEDITION_TT: "#T Северо-Западный проход#!\n#p В настоящее время продолжается экспедиция по поиску Северо-Западного прохода.#!\nУже на рубеже прошлого века смелые искатели приключений исследовали дальние уголки Северного Ледовитого океана. Старая мечта остаётся неисполненной: открытие Северо-Западного прохода между Канадой и Северным Ледовитым океаном. Но кто осмелится на такую опасную экспедицию?"
 MR_ON_ARCTICA_EXPEDITION_TT: "#T Экспедиция на дирижабле#!\n#p В настоящее время продолжается экспедиция на дирижабле.#!\n«Аэроарктика», «Международное общество по изучению Арктики с помощью дирижаблей», была неправительственной научной ассоциацией, поставившей себе целью использование дирижаблей в полярных исследованиях. Она была основана в основном по инициативе аэронавта и будущего генерального секретаря общества Вальтера Брунса. Учредительным президентом в 1924 году был Фритьоф Нансен. После нескольких лет подготовительной работы обществу удалось в 1931 году впервые использовать дирижабль для чисто научной полярной экспедиции. Благодаря арктическому полёту LZ 127 «Граф Цеппелин» знания о географии пролетаемых полярных регионов были значительно расширены. Ещё в 1926 году Умберто Нобиле пролетел над Северным полюсом на своём дирижабле «Норвегия», а позже предпринял экспедицию на «Италии»."
 MR_IS_CIVIL_ENGINEER_TT: "#T [concept_tesla_civil_engineer]#!\nВаш [concept_tesla_engineer] сосредоточен на [Concept('concept_tesla_civil_engineering', '#ORANGE #b гражданском строительстве#!#!')]."
 MR_IS_MECHANICAL_ENGINEER_TT: "#T [concept_tesla_mechanical_engineer]#!\nВаш [concept_tesla_engineer] сосредоточен на [Concept('concept_tesla_mechanical_engineering', '#ORANGE #b машиностроении#!#!')]."
 MR_IS_MILITARY_ENGINEER_TT: "#T [concept_tesla_military_engineer]#!\nВаш [concept_tesla_engineer] сосредоточен на [Concept('concept_tesla_military_engineering', '#ORANGE #b военно-инженерном деле#!#!')]."
 MR_IS_ELECTRICAL_ENGINEER_TT: "#T [concept_tesla_electrical_engineer]#!\nВаш [concept_tesla_engineer] сосредоточен на [Concept('concept_tesla_electrical_engineering', '#ORANGE #b электротехнике#!#!')]."
 MR_IS_AERONAUTICAL_ENGINEER_TT: "#T [concept_tesla_aeronautical_engineer]#!\nВаш [concept_tesla_engineer] сосредоточен на [Concept('concept_tesla_aeronautical_engineering', '#ORANGE #b авиастроении#!#!')]."
 MR_SAFARI_ACTIVE_TT: "#T Сафари!#!\n#p Ваш натуралист сейчас на сафари.#!\nВо время африканского сафари, благодаря постоянному выслеживанию и отлову, можно поймать крупную дичь, а затем перевезти её в [Concept('concept_dubois_zoo', 'зоопарк')]. За одно сафари можно поймать только одно животное. В зависимости от вида животного, различается, нужны ли вам ловушки или придётся идти по его следу. Как правило, для крупных и медлительных животных требуется больше ловушек, в то время как для быстрых животных — более тщательное выслеживание."
 MR_ZOOLOGICAL_EXPEDITION_ACTIVE_TT: "#T Поимка местных животных#!\n#p Ваш натуралист сейчас занимается поимкой местных животных.#!\nНа территории нашей страны есть ареалы обитания животных с удивительными видами, которые можно было бы выставить в [Concept('concept_dubois_zoo', 'зоопарке')]. [Concept('concept_dubois_naturalist', '#GREEN #b Натуралист#!#!')] отправится в годовое путешествие по стране, чтобы собрать [Concept('concept_dubois_zoo_animal','экзотических животных')] для зоопарка."
 MR_CHEMIST_IMPROVE_FERTILIZER_BUTTON: "Улучшить удобрения"
