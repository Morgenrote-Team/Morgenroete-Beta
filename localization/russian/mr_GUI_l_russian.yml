 MR_READING_TOUR_BUTTON_TT: "#T Send Writer on a Reading Tour#!\nAn internationally recognized writer who is in contact with foreign publishers can increase the country's own fame if he goes on a reading tour. This will not only promote mutual relationships, but also his reputation.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
