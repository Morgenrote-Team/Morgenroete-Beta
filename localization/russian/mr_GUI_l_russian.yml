 TOTAL_GEOLOGICAL_KNOWLEDGE_VAR_TT: "#header [concept_agassiz_geological_knowledge]#!\n[GetPlayer.GetName] собрал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] @agassiz_geological_knowledge! [GetPlayer.MakeScope.GetVariable('agassiz_geological_knowledge_var').GetValue|V0] из @agassiz_geological_knowledge! [GetGlobalVariable('agassiz_geological_knowledge_global_var').GetValue|V0] ед. [Concept('concept_agassiz_geological_knowledge', 'геологических знаний')], собранных всеми странами."
 mr_geologist_ore_vein_stop_effect_tt: "Ваш [concept_agassiz_geologist] прекратит разведку руды."
