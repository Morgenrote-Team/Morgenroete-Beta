 TOTAL_MINERALS_VAR_TT: "#header [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]#!\n[GetPlayer.GetName] has collected @agassiz_mineral! [GetPlayer.MakeScope.GetVariable('agassiz_generic_minerals_var').GetValue|V0] [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]. This year [GetPlayer.GetNameNoFormatting] will probably collect [GetPlayer.MakeScope.ScriptValue('agassiz_yearly_mineral_value')|+=0] additional [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')].\n\n#T Factors influencing [GetPlayer.GetNameNoFormatting]'s yearly Minerals:#!\n#p  +500#! from #V Base Value#![GetPlayer.GetCustom('agassiz_yearly_minerals_desert_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_arctic_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_geyser_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_special_deposit_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_cave_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_mountain_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_formation_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_great_formation_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_volcano_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_uranium_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_geological_research_type')]"
