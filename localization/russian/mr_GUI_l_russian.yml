 MR_EXTEND_ZOO_SMALL_CURRENT_EXPANSION_TRIGGER_TT: "#default_text [GetPlayer.GetName] в данный момент #V не расширяет#! [concept_dubois_zoo].#!"
 MR_EXTEND_ZOO_MEDIUM_BUTTON: "Расширить [concept_dubois_zoo] (средний)"
 MR_EXTEND_ZOO_MEDIUM_BUTTON_TT: "#T Расширить зоопарк до среднего размера#!\n[Concept('concept_dubois_zoo_animal','Экзотические животные')] — это всеобщее счастье: люди отдыхают в зоопарке, учёные могут продолжать свои зоологические исследования, а международный престиж предоставляется тем, кто может показать наибольшее количество представителей иностранной фауны. С каждым расширением престиж нации увеличивается. Некоторые этапы расширения требуют не только сбора большого количества животных, но и из разных частей света.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
