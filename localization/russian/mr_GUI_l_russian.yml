 MR_YEARLY_ASTRONOMICAL_OBJECTS_TT: "В настоящее время [GetPlayer.GetName] получает [GetPlayer.MakeScope.ScriptValue('verrier_yearly_astronomical_objects_value')|+=0] [Concept('concept_verrier_astronomical_object','астрономических объектов')] каждый год.\n\nФакторы, влияющие на ежегодное количество [Concept('concept_verrier_astronomical_object','астрономических объектов')]:[GetPlayer.GetCustom('verrier_yearly_astronomical_objects_camera_tech_tt_type')][GetPlayer.GetCustom('verrier_yearly_astronomical_objects_modern_physics_tech_tt_type')][GetPlayer.GetCustom('verrier_yearly_astronomical_objects_observatory_base_pm_tt_type')][GetPlayer.GetCustom('verrier_yearly_astronomical_objects_observatory_computer_pm_tt_type')][GetPlayer.GetCustom('verrier_yearly_astronomical_objects_observatory_other_pm_tt_type')][GetPlayer.GetCustom('verrier_yearly_astronomical_objects_astronomer_experience_tt_type')][GetPlayer.GetCustom('verrier_yearly_astronomical_objects_astronomer_comet_observer_trait_tt_type')][GetPlayer.GetCustom('verrier_yearly_astronomical_objects_astronomer_magnetic_storm_observer_trait_tt_type')][GetPlayer.GetCustom('verrier_yearly_astronomical_objects_astronomer_solar_observer_trait_tt_type')][GetPlayer.GetCustom('verrier_yearly_astronomical_objects_astronomer_moon_observer_trait_tt_type')]"
