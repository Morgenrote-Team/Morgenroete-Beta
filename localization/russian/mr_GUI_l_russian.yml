 TOTAL_RARE_MINERALS_VAR_TT: "#header [Concept('concept_agassiz_rare_mineral','Редкие минералы')]#!\n[GetPlayer.GetName] собрал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] @agassiz_rare_mineral! [GetPlayer.MakeScope.GetVariable('agassiz_rare_minerals_var').GetValue|V0] [Concept('concept_agassiz_rare_mineral','редких минералов')]."
 MR_GEOLOGIST_AGE_EARTH_BUTTON_TT: "#T Рассчитать возраст Земли#!\n[concept_agassiz_geologist] может раз в жизни рассчитать возраст Земли и представить свою теорию всем остальным геологам. Если они согласятся, его определение возраста Земли станет решающим. Если его отвергнут, он сможет попробовать снова после периода уныния. Чтобы представить новую теорию, национальный геологический счёт должен быть выше, чем счёт, использованный для определения последнего возраста Земли.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
