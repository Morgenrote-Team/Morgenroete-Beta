 MR_FOUND_ASYLUM_BUTTON: "Основать псих. лечебницу"
 MR_FOUND_ASYLUM_BUTTON_TT: "#T Основать псих. лечебницу#!\nОтделение осуждённых в тюрьме от психически больных людей в отдельном учреждении было первым шагом к современной психиатрии. Специализированная психиатрическая лечебница поможет содержать тех, кто нуждается в помощи, в лучших условиях.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
