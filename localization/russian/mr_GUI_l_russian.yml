 MR_ASTRONOMER_MOON_MAP_BUTTON_TT: "#T Составить карту Луны#!\nС помощью камеры и современных телескопов можно составить карту всего спутника Земли в беспрецедентном качестве. Карта Луны стала бы вехой в астрономии. Однако [Concept('concept_verrier_astronomer', '#ORANGE #b астроном#!#!')] найдёт меньше астрономических объектов, если будет заниматься селенографическими исследованиями.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
