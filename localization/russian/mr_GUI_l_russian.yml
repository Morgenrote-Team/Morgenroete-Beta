 DINOSAUR_BONE_VAR_TT: "#header [Concept('concept_dubois_dinosaur_bone','Кости динозавров')]#!\n[GetPlayer.GetName] обнаружил[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] в общей сложности @dubois_dinosaur_bone! [GetPlayer.MakeScope.Var('dubois_dinosaur_bone_total').GetValue|V0] [Concept('concept_dubois_dinosaur_bone','костей динозавров')].\n\n#yellow Африка:#!\n[GetPlayer.MakeScope.Var('dubois_african_dinosaur_bone').GetValue|V0] (неисп.) / [GetPlayer.MakeScope.Var('dubois_african_dinosaur_bone_total').GetValue|V0] (всего)\n#yellow Азия:#!\n[GetPlayer.MakeScope.Var('dubois_asian_dinosaur_bone').GetValue|V0] (неисп.) / [GetPlayer.MakeScope.Var('dubois_asian_dinosaur_bone_total').GetValue|V0] (всего)\n#yellow Австралия:#!\n[GetPlayer.MakeScope.Var('dubois_australian_dinosaur_bone').GetValue|V0] (неисп.) / [GetPlayer.MakeScope.Var('dubois_australian_dinosaur_bone_total').GetValue|V0] (всего)\n#yellow Европа:#!\n[GetPlayer.MakeScope.Var('dubois_european_dinosaur_bone').GetValue|V0] (неисп.) / [GetPlayer.MakeScope.Var('dubois_european_dinosaur_bone_total').GetValue|V0] (всего)\n#yellow Северная Америка:#!\n[GetPlayer.MakeScope.Var('dubois_north_american_dinosaur_bone').GetValue|V0] (неисп.) / [GetPlayer.MakeScope.Var('dubois_north_american_dinosaur_bone_total').GetValue|V0] (всего)\n#yellow Южная Америка:#!\n[GetPlayer.MakeScope.Var('dubois_south_american_dinosaur_bone').GetValue|V0] (неисп.) / [GetPlayer.MakeScope.Var('dubois_south_american_dinosaur_bone_total').GetValue|V0] (всего)\n#yellow Общие:#!\n[GetPlayer.MakeScope.Var('dubois_general_dinosaur_bone').GetValue|V0] (неисп.) / [GetPlayer.MakeScope.Var('dubois_general_dinosaur_bone_total').GetValue|V0] (всего)"
 MR_AUTOMATE_PALEONTOLOGIST_TT: "#T Автоматизировать палеонтолога#!\nВам больше не придётся давать задания вашему [Concept('concept_dubois_paleontologist', '#GREEN #b палеонтологу#!#!')], если вы их автоматизируете.\nОни будут работать самостоятельно и выполнять задачи, которые имеют смысл в данный момент. Вам всё ещё нужно будет организовывать [Concept('concept_dubois_paleontological_expedition','палеонтологические экспедиции')] или создавать [Concept('concept_dubois_paleontological_team','палеонтологические группы')]. Вы также будете по-прежнему получать события."
 mr_paleontology_automation_gui_tt: "Начать автоматизацию задач [Concept('concept_dubois_paleontologist', '#GREEN #b палеонтолога#!#!')]."
 mr_stop_paleontology_automation_gui_tt: "Прекратить автоматизацию задач [Concept('concept_dubois_paleontologist', '#GREEN #b палеонтолога#!#!')]."
 MR_STOP_AUTOMATE_PALEONTOLOGIST_TT: "#T Прекратить автоматизацию палеонтолога#!\nВаш палеонтолог больше не будет автоматизирован."
 DINOSAUR_SKELETONS_VAR_TT: "#header [Concept('concept_dubois_dinosaur_skeleton','Скелеты динозавров')]#!\n[GetPlayer.GetName] реконструировал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] @dubois_dinosaur_skeleton! [GetPlayer.MakeScope.GetVariable('dubois_dinosaur_skeleton').GetValue|V0] [Concept('concept_dubois_dinosaur_skeleton','скелетов динозавров')].\n\n#yellow Северная Америка:#!\n[GetPlayer.GetCustom('dubois_has_ankylosaurus_type')][GetPlayer.GetCustom('dubois_has_diplodocus_type')][GetPlayer.GetCustom('dubois_has_triceratops_type')][GetPlayer.GetCustom('dubois_has_tyrannosaurus_type')][GetPlayer.GetCustom('dubois_has_stegosaurus_type')]\n#yellow Южная Америка:#!\n[GetPlayer.GetCustom('dubois_has_antarctosaurus_type')][GetPlayer.GetCustom('dubois_has_argyrosaurus_type')]\n#yellow Европа:#!\n[GetPlayer.GetCustom('dubois_has_iguanodon_type')][GetPlayer.GetCustom('dubois_has_plateosaurus_type')]\n#yellow Африка:#!\n[GetPlayer.GetCustom('dubois_has_giraffatitan_type')][GetPlayer.GetCustom('dubois_has_spinosaurus_type')]\n#yellow Азия:#!\n[GetPlayer.GetCustom('dubois_has_psittacosaurus_type')][GetPlayer.GetCustom('dubois_has_velociraptor_type')]\n#yellow Австралия:#!\n[GetPlayer.GetCustom('dubois_has_muttaburrasaurus_type')][GetPlayer.GetCustom('dubois_has_rhoetosaurus_type')]\n#yellow Общие:#!\n[GetPlayer.GetCustom('dubois_has_mosasaurus_type')][GetPlayer.GetCustom('dubois_has_plesiosaurus_type')][GetPlayer.GetCustom('dubois_has_megalodon_type')][GetPlayer.GetCustom('dubois_has_basilosaurus_type')]"
 MR_VENUS_TRANSIT_1874_EXPEDITION_BUTTON: "Наблюдать [concept_verrier_venus_transit] в 1874 году"
 MR_VENUS_TRANSIT_1874_EXPEDITION_BUTTON_TT: "#T Наблюдать прохождение Венеры#!\nНаблюдение за прохождением Венеры, одним из самых значительных астрономических событий XIX века, возможно в 1874 и 1882 годах. За два года до целевого года можно начать подготовку, чтобы не упустить эту возможность.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VENUS_YEAR_1872_TRIGGER_TT: "#default_text Год не ранее 1872, но не 1874.#!"
 MR_VENUS_TRANSIT_POSSIBLE_1874_TRIGGER_TT: "#default_text [GetPlayer.GetName] владеет включённой областью в [Concept('concept_verrier_venus_transit_zone', 'зоне прохождения Венеры')], или имеет субъекта в [Concept('concept_verrier_venus_transit_zone', 'зоне прохождения Венеры')], или имеет хорошие отношения со страной в [Concept('concept_verrier_venus_transit_zone', 'зоне прохождения Венеры')]. В последнем случае целевая страна не должна быть в состоянии войны, не быть революционной и не быть субъектом другой страны. Отношения должны быть как минимум сердечными."
 MR_VENUS_TRANSIT_1882_EXPEDITION_BUTTON: "Наблюдать [concept_verrier_venus_transit] в 1882 году"
 MR_VENUS_TRANSIT_1882_EXPEDITION_BUTTON_TT: "#T Наблюдать прохождение Венеры#!\nНаблюдение за прохождением Венеры, одним из самых значительных астрономических событий XIX века, возможно в 1874 и 1882 годах. За два года до целевого года можно начать подготовку, чтобы не упустить эту возможность.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VENUS_YEAR_1880_TRIGGER_TT: "#default_text Год не ранее 1880, но не 1882.#!"
 MR_VENUS_TRANSIT_POSSIBLE_1882_TRIGGER_TT: "#default_text [GetPlayer.GetName] владеет включённой областью в [Concept('concept_verrier_venus_transit_zone', 'зоне прохождения Венеры')], или имеет субъекта в [Concept('concept_verrier_venus_transit_zone', 'зоне прохождения Венеры')], или имеет хорошие отношения со страной в [Concept('concept_verrier_venus_transit_zone', 'зоне прохождения Венеры')]. В последнем случае целевая страна не должна быть в состоянии войны, не быть революционной и не быть субъектом другой страны. Отношения должны быть как минимум сердечными."
 MR_VENUS_TRANSIT_EXPEDITION_ACTIVE_TT: "#T Наблюдение за прохождением Венеры#!\nЭкспедиция в настоящее время готовится и проводит наблюдение за прохождением Венеры."
