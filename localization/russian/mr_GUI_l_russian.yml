 MR_GEOLOGIST_AGE_EARTH_BUTTON_TT: "#T Calculate the Age of the Earth#!\nA geologist can calculate the age of the Earth once in his life and present his theory to all other geologists. If they agree, his earth time determination will be the decisive one. If he is rejected, he can try again after a period of depression. To present a new theory, the national Geological Score must be higher than the score used to determine the last Earth age.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_AGE_EARTH_ACTIVE_TT: "#T Calculate the Age of the Earth#!\n#p Your Geologist is currently calculating the age of the Earth.#!"
 MR_GEOLOGIST_CAN_CALCULATE_TRIGGER_TT: "#default_text [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] has not yet presented an internationally authoritative determination of the Earth's age.#!"
 MR_GEOLOGIST_CALCULATE_AGE_TRIGGER_TT: "#default_text The national Geological Score is higher than the score used to determine the last age of the Earth.#!"
 MR_GEOLOGIST_NO_AGE_DEBATE_TRIGGER_TT: "#default_text There is currently no debate about the age of the Earth.#!"
 MR_GEOLOGIST_NOT_DEMOTIVATED_TRIGGER_TT: "#default_text [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] is not demotivated.#!"
 MR_GEOLOGIST_OIL_STOP_BUTTON_TT: "#T Stop Prospecting Oil#!\nYour [concept_agassiz_geologist] is currently searching for new oil wells near already established oil rigs and thus increasing production.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_geologist_oil_stop_button_effect_tt: "Your [concept_agassiz_geologist] will stop prospecting for oil."
 MR_GEOLOGIST_GEOLOGICAL_RESEARCH_BUTTON_TT: "#T Geological Research#!\nA geologist can travel around the country for 5 years to expand his knowledge. In this way he can also find geological formations, caves or (later) even uranium. Geologists who have the Mineralogist trait double the number of minerals acquired annually. At the end of their search, geologists gain additional minerals, experience, and the mineralogist trait if they don't already have it.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_geologist_geological_research_stop_effect_tt: "Your [concept_agassiz_geologist] will stop their Geological Research."
 MR_GEOLOGIST_UNDERWATER_MOUNTAINS_ACTIVE_TT: "#T Exploring the Atlantic Mountains#!\n#p Your [concept_agassiz_geologist] is currently exploring the Atlantic Mountains.#!"
 MR_GEOLOGIST_TECTONICS_CONGRESS_BUTTON: "Конгресс о дрейфе континентов"
 MR_GEOLOGIST_TECTONICS_CONGRESS_BUTTON_TT: "#T Congress on Continental Drift#!\nFor centuries the belief was unwavering that the continents were fixed and immobile. An eminent geologist with considerable geological knowledge could collapse this mantra. Whether he will manage it is rather questionable.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_CONGRESS_KNOWLEDGE_TRIGGER_TT: "#default_text [GetPlayer.GetName] has #V 50 or more#! @agassiz_geological_knowledge! [concept_agassiz_geological_knowledge] (currently [GetPlayer.MakeScope.Var('agassiz_geological_knowledge_var').GetValue|0+]).#!"
 MR_ASTRONOMER_ACTIVE_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a [concept_verrier_astronomer] who is #V not busy#!.#!"
 MR_ASTRONOMER_MOON_MAP_BUTTON_TT: "#T Map the Moon#!\nWith the help of the camera and modern telescopes, it is possible to map the entire earth's companion in unprecedented quality. A moon map would be a milestone in astronomy. However, an astronomer will find fewer astronomical objects if he pursues selenographic studies.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTRONOMER_MOON_MAP_ACTIVE_TT: "Map the Moon\n#p Your [concept_verrier_astronomer] is currently mapping the Moon by taking [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')].#!"
