 MR_PROMOTE_ENGINEER_TT: "#T Продвигать инженера#!\n[Concept('concept_tesla_engineer','#ORANGE #b Инженеры#!#!')] — универсальные специалисты в военной и строительной сферах. Они также вдвое ускоряют строительство памятников.\n\n#n Примечание:#! Одновременно у вас может быть только один инженер.[GetPlayer.GetCustom('mr_promote_has_engineer_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ASTRONOMER_TT: "#T Продвигать астронома#!\n[Concept('concept_verrier_astronomer','#ORANGE #b Астрономы#!#!')] находят новые астрономические объекты, открывают звёзды и планеты или могут принимать участие в астрономических конгрессах.\n\n#n Примечание:#! Одновременно у вас может быть только один астроном.[GetPlayer.GetCustom('mr_promote_has_astronomer_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_CHEMIST_TT: "#T Продвигать химика#!\n[Concept('concept_mendelejew_chemist','#ORANGE #b Химики#!#!')] — это учёные, которые занимаются открытием новых элементов и улучшением вашей химической промышленности.\n\n#n Примечание:#! Одновременно у вас может быть только один химик.[GetPlayer.GetCustom('mr_promote_has_chemist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_GEOLOGIST_TT: "#T Продвигать геолога#!\n[Concept('concept_agassiz_geologist','#GREEN #b Геологи#!#!')] изучают минералы, вулканы и другие геологические формации.\n\n#n Примечание:#! Одновременно у вас может быть только один геолог.[GetPlayer.GetCustom('mr_promote_has_geologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_NATURALIST_TT: "#T Продвигать натуралиста#!\n[Concept('concept_dubois_naturalist','#GREEN #b Натуралисты#!#!')] могут ловить животных в своей стране или за рубежом, находить образцы или возглавлять ботанические экспедиции.\n\n#n Примечание:#! Одновременно у вас может быть только один натуралист.[GetPlayer.GetCustom('mr_promote_has_naturalist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_PALEONTOLOGIST_TT: "#T Продвигать палеонтолога#!\n[Concept('concept_dubois_paleontologist','#GREEN #b Палеонтологи#!#!')] могут исследовать геологические формации на предмет окаменелостей и костей динозавров или находить их в экспедициях.\n\n#n Примечание:#! Одновременно у вас может быть только один палеонтолог.[GetPlayer.GetCustom('mr_promote_has_paleontologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ARCHAEOLOGIST_TT: "#T Продвигать археолога#!\n[Concept('concept_lepsius_archaeologist','#BLUE #b Археологи#!#!')] могут находить артефакты, делать крупные открытия и посещать археологические конференции.\n\n#n Примечание:#! Одновременно у вас может быть только один археолог.[GetPlayer.GetCustom('mr_promote_has_archaeologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ANTHROPOLOGIST_TT: "#T Продвигать антрополога#!\n[Concept('concept_lepsius_anthropologist','#BLUE #b Антропологи#!#!')] изучают происхождение человека, от начала эволюции до каменного века.\n\n#n Примечание:#! Одновременно у вас может быть только один антрополог.[GetPlayer.GetCustom('mr_promote_has_anthropologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_COMPOSER_TT: "#T Продвигать композитора#!\n[Concept('concept_elgar_composer','#PURPLE #b Композиторы#!#!')] необходимы для создания процветающей музыкальной культуры. Они помогут стране создавать больше [Concept('concept_elgar_musical_tradition', 'музыкальной традиции')].\n\n#n Примечание:#! Одновременно у вас может быть только один композитор.[GetPlayer.GetCustom('mr_promote_has_composer_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_WRITER_TT: "#T Продвигать писателя#!\n[Concept('concept_manzoni_writer','#PURPLE #b Писатели#!#!')] — мастера повествования, работающие над книгами и другой литературой. Своим творчеством они укрепляют [Concept('concept_manzoni_literary_tradition', 'литературную традицию')] страны.\n\n#n Примечание:#! Одновременно у вас может быть только один национальный писатель и 3 местных писателя.[GetPlayer.GetCustom('mr_promote_has_writers_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_PAINTER_TT: "#T Продвигать художника#!\n[Concept('concept_klimt_painter','#PURPLE #b Художники#!#!')] запечатлевают на холсте впечатления, пейзажи и чудеса света. Своими шедеврами они укрепляют [Concept('concept_klimt_painting_tradition', 'художественную традицию')] страны.\n\n#n Примечание:#! Одновременно у вас может быть только один художник.[GetPlayer.GetCustom('mr_promote_has_painter_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
