 MR_STOP_CREATING_MASTERWORK_BUTTON_TT: "#T Прекратить создание музыкального шедевра#!\nВаш [concept_elgar_composer] прекратит создание музыкального шедевра. #n Важно:#! прогресс в создании шедевра будет утерян.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOZART_MONUMENT_BUTTON: "Построить памятник Моцарту"
 MR_MOZART_MONUMENT_BUTTON_TT: "#T Построить памятник Моцарту#!\nВольфганг Амадей Моцарт — один из величайших композиторов всех времён, но некоторые до сих пор отказывают ему в этом признании. Совсем недавно целое поколение композиторов заново открыло его как отправную точку для современной музыки. Возведение памятника Моцарту в его родном Зальцбурге вдохновит будущие поколения пойти по его стопам.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
