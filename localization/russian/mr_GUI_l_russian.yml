 MR_MINERAL_CABINET_BUTTON: "Found Mineral Cabinet"
 MR_MINERAL_CABINET_BUTTON_TT: "#T Found Mineral Cabinet#!\nA Mineral Cabinet in your Zoo will make it even more prestigeous. We can display all minerals there collected by our [concept_agassiz_geologist].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MINERAL_CABINET_NUMBER_TRIGGER_TT: "#default_text [GetPlayer.GetName] has #V 50 or more#! [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] (currently [GetPlayer.MakeScope.Var('agassiz_rare_minerals_var').GetValue|0+]).#!"
 MR_MINERAL_CABINET_EFFECT_TT: "Your [GetBuildingType('building_dubois_zoo').GetName] will get a #V Mineral Cabinet#! that gives you 50 prestige and minor standard of living boost."
 MR_GEOLOGIST_UNDERWATER_MOUNTAINS_BUTTON_TT: "#T Explore the Atlantic Mountains#!\nAfter evidence of subsea elevations was found during the laying of the transatlantic cable, leading geologists are wondering what the cause could be. Modern measuring equipment and an experienced geologist could unravel the mystery.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_EXPERIENCED_TRIGGER_TT: "#default_text [GetPlayer.GetName] has an #O experienced#! or #O famous#! [concept_agassiz_geologist].#!"
 MR_GEOLOGIST_FAMOUS_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a #O famous#! [concept_agassiz_geologist].#!"
 MR_PALEONTOLOGIST_FAMOUS_TRIGGER_TT: "#default_text [GetPlayer.GetName] has a #O famous#! [concept_dubois_paleontologist].#!"
 MR_GEOLOGIST_ORE_VEIN_BUTTON_TT: "#T Prospect Ore#!\nA [concept_agassiz_geologist] can search for new raw material deposits near already established mines and thus increase the production of the ore.\n\nThe building would gain the $agassiz_building_production_mult_modifier_with_tooltip$ [concept_modifier]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_ORE_VEIN_STOP_BUTTON_TT: "#T Stop Prospecting Ore#!\nA Your [concept_agassiz_geologist] is currently searching for new raw material deposits near already established mines and thus increasing the production of the ore.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_OIL_BUTTON_TT: "#T Prospect Oil#!\nA [concept_agassiz_geologist] can search for new oil wells near already established oil rigs and thus increase production.\n\nThe building would gain the $agassiz_building_production_2_mult_modifier_with_tooltip$ [Concept('concept_modifier','$concept_modifiers$')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 VISIT_OBSERVATORY_BUTTON: "Visit Planetarium"
 VISIT_OBSERVATORY_BUTTON_TT: "#T Visit the Planetarium#!\nThe Planetarium offers you an overview of the astronomical knowledge of your country, other countries and the scientific community."
 MR_SELL_MINERALS_FOR_RARE_MINERAL_BUTTON_TT: "#T Sell Minerals for Rare Minerals#!\nA [concept_agassiz_geologist] can purchase [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] from colleagues, collectors, and other geological enthusiasts. For this he has to exchange a considerable amount of common minerals.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON: "Interdisciplinary Symposium"
 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON_TT: "#T Geological-Paleontological Symposium#!\nThe intersections between geology and paleontology are large. We should bring together the luminaries in the field and use the synergies that arise from this exchange to create new scientific theories about Earth's history.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTING_GEOLOGIST_TT: "#T Promote Geologist#!\n#p You are currently promoting the Geologist.#!\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] study minerals, volcanoes and other geological formations."
 MR_ACADEMICS_PROMOTE_GEOLOGIST_EFFECT_TT: "Your next scientist will be a [concept_agassiz_geologist]."
