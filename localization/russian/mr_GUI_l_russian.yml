 MR_MOUNT_SKELETON_ACTIVE_TT: "#T Сборка скелета динозавра#!\n#p Ваш палеонтолог сейчас собирает скелет динозавра.#!\nВаш [Concept('concept_dubois_paleontologist', '#GREEN #b палеонтолог#!#!')] может собрать новый [concept_dubois_dinosaur_skeleton] из 5 [Concept('concept_dubois_dinosaur_bone','костей динозавров')] с одного континента."
 MR_REMOUNT_SKELETON_ACTIVE_TT: "#T Пересборка скелета динозавра#!\n#p Ваш палеонтолог сейчас занимается пересборкой скелета динозавра.#!\nЕсли у вас есть несовершенные [Concept('concept_dubois_dinosaur_skeleton','скелеты динозавров')], вы можете позволить вашему [Concept('concept_dubois_paleontologist', '#GREEN #b палеонтологу#!#!')] попытаться перемонтировать их. Если ваш палеонтолог достаточно опытен, перемонтированный скелет может оказаться лучшего качества."
 MR_UPPER_EGYPT_EXPEDITION_ACTIVE_TT: "#T Экспедиция в Долину царей#!\n#p Ваш археолог сейчас в экспедиции в Долине царей.#!\nВерхний Египет со своей древней столицей Фивами и Долиной царей считается меккой египтологии. Нам следует приобрести лицензию на раскопки в этом районе и начать поиски египетских сокровищ."
 MR_LOWER_EGYPT_EXPEDITION_ACTIVE_TT: "#T Экспедиция к пирамидам#!\n#p Ваш археолог сейчас в экспедиции у пирамид.#!\nС незапамятных времён египетские пирамиды завораживали человечество. Говорят, что другие гробницы, храмы и даже целые города, исчезнувшие в песках Нижнего Египта, ждут своего переоткрытия."
 MR_BABYLONIA_EXPEDITION_ACTIVE_TT: "#T Экспедиция в Вавилонию#!\n#p Ваш археолог сейчас в экспедиции в Вавилонии.#!\nВавилония, южная часть Месопотамии, обязана своим названием некогда могущественному городу Вавилону. Этот регион считается «колыбелью цивилизации», где то и дело находят ценные археологические артефакты. Им определённо место в музее."
 MR_ASSYRIA_EXPEDITION_ACTIVE_TT: "#T Экспедиция в Ассирию#!\n#p Ваш археолог сейчас в экспедиции в Ассирии.#!\nАссирия — это северная часть Месопотамии с двумя важными городами, Ашшуром и Ниневией. Скудные знания об этой стране до сих пор можно почерпнуть из Библии, но, возможно, существуют более надёжные исторические свидетельства?"
 MR_ARGOLIS_EXPEDITION_ACTIVE_TT: "#T Экспедиция в Арголиду#!\n#p Ваш археолог сейчас в экспедиции в Арголиде.#!\nПосле открытия Трои даже скептически настроенные учёные начинают понимать, что мифы древних греков — это нечто большее, чем просто сказки. Говорят, что в Арголиде по сей день лежат останки городов бронзового века, самый известный из которых — Микены. Нам стоит убедиться в этом самим."
 MR_CRETE_EXPEDITION_ACTIVE_TT: "#T Экспедиция на Крит#!\n#p Ваш археолог сейчас в экспедиции на Крите.#!\nГоворят, что на Крите некогда правил легендарный царь Минос. Подобно Трое и Микенам, в этой истории, похоже, тоже есть доля правды: на острове всё чаще находят артефакты легендарной минойской культуры. Нашей державе также следует заполучить несколько из них."
 MR_YUCATAN_EXPEDITION_ACTIVE_TT: "#T Экспедиция на Юкатан#!\n#p Ваш археолог сейчас в экспедиции на Юкатане.#!\nУчастились сообщения о неизвестных и огромных городах посреди джунглей. Нам следует провести расследование и отправить археологическую экспедицию на Юкатан."
 MR_PERU_EXPEDITION_ACTIVE_TT: "#T Экспедиция в Перу#!\n#p Ваш археолог сейчас в экспедиции в Перу.#!\nПилоты сообщают о странных крепостях и обнесённых стенами сооружениях в Андах, которые они видели во время полётов над Перу. Может быть, испанцы не полностью уничтожили культуру инков? Некоторые города коренного сопротивления до сих пор не найдены."
 MR_FOSSIL_IDENTIFICATION_ACTIVE_TT: "#T Идентификация окаменелостей#!\n#p Ваш антрополог сейчас занимается идентификацией окаменелостей.#!\n[concept_lepsius_anthropologist] может со временем проанализировать неизвестную кость и отнести её к определённому человеческому или дочеловеческому виду. Если ему удастся отнести три кости к одному и тому же виду, он сможет успешно систематизировать этот вид. Время, необходимое для правильной идентификации кости, зависит от опыта антрополога."
 MR_CONDUCTING_ACTIVE_TT: "#p Ваш композитор сейчас проводит сезон в опере.#!\n[Localize('concept_elgar_conducting_desc')]"
 MR_MUSIC_TOUR_ACTIVE_TT: "#p Ваш композитор сейчас в музыкальном туре.#!\n[Localize('concept_elgar_musical_tour_desc')]"
 MR_NEWSPAPER_NOVEL_ACTIVE_TT: "#T Газетный роман#!\n#p Ваш писатель сейчас пишет газетный роман.#!\nВ XIX веке газетный роман гарантировал многим авторам стабильный доход и национальную известность. Многие известные писатели того времени, такие как Толстой, Достоевский, Флобер и Дюма, сначала публиковали свои романы в виде серий в газетах, прежде чем они выходили в виде книг."
 MR_READNG_TOUR_ACTIVE_TT: "#T Читательский тур#!\n#p Ваш писатель сейчас в читательском туре.#!\nВсемирно признанный писатель, поддерживающий контакты с иностранными издателями, может повысить известность своей страны, отправившись в читательский тур. Это не только укрепит взаимоотношения, но и повысит его репутацию."
 MR_PAINTER_TRIP_ACTIVE_TT: "#T Образовательное путешествие#!\n#p Ваш художник сейчас в образовательном путешествии.#!\nВ [Concept('concept_klimt_painter_trip', 'образовательном путешествии')] художник может изучить ранее неизвестный художественный стиль и тем самым улучшить ежегодный прирост [Concept('concept_klimt_painting_tradition', 'художественной традиции')]. Он также может приобрести другие положительные и отрицательные черты во время своего пребывания в иностранном [Concept('concept_artists_center_of_arts', 'центре искусств')]."
 MR_MOUNTAIN_EXPEDITION_ACTIVE_TT: "#T Горная экспедиция#!\n#p В настоящее время продолжается горная экспедиция.#!\nС восхождением на Монблан в 1786 году началась новая эра покорения высочайших вершин Земли; эта тенденция только усилилась в XIX и XX веках. Если на одной из наших территорий есть горный хребет, который ещё не был покорён, мы могли бы поручить его покорение способному генералу с соответствующими навыками."
 MR_AIR_COMBAT_MISSION_ACTIVE_TT: "#T Боевое задание в воздухе#!\n#p Ваш пилот сейчас выполняет боевое задание в воздухе.#!"
 MR_AIRCRAFT_PARADE_ACTIVE_TT: "#T Авиационный парад#!\n#p Ваш пилот сейчас участвует в авиационном параде.#!"
 academics_academy_progress_observatory_tt_loc: "\n#p 1 очко#! за #V продвижение#! [Concept('concept_tesla_engineer', '#ORANGE #b инженера#!#!')], [Concept('concept_mendelejew_chemist', '#ORANGE #b химика#!#!')] или [Concept('concept_verrier_astronomer', '#ORANGE #b астронома#!#!')] и наличие сооружения «[GetBuildingType('building_verrier_observatory').GetName]»."
 academics_academy_progress_observatory_inactive_tt_loc: "\n#default_text 1 очко за продвижение инженера, химика или астронома и наличие обсерватории.#!"
 MR_CHEMIST_CONGRESS_BUTTON_TT: "#T Конгресс химиков#!\nКонгресс в Карлсруэ был первым международным симпозиумом по современной химии. Он проходил с 3 по 5 сентября 1860 года по инициативе Фридриха Августа Кекуле фон Штрадоница, Шарля Адольфа Вюрца и Карла Вельциена в Штендехаусе в Карлсруэ. Темы включали номенклатуру химических соединений и их формульное представление, а также вопрос об атомных и молекулярных весах химических соединений. Это была первая международная конференция по химии в мире.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
