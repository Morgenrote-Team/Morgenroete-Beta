 MR_PAINTER_TRIP_BUTTON: "Образовательное путешествие"
 MR_PAINTER_TRIP_BUTTON_TT: "#T Образовательное путешествие#!\nВ [Concept('concept_klimt_painter_trip', 'образовательном путешествии')] художник может изучить ранее неизвестный художественный стиль и тем самым улучшить ежегодный прирост [Concept('concept_klimt_painting_tradition', 'художественной традиции')]. Он также может приобрести другие положительные и отрицательные черты во время своего пребывания в иностранном [Concept('concept_artists_center_of_arts', 'центре искусств')].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACQUIRE_MASTERWORK_BUTTON: "Приобрести шедевр"
 MR_ACQUIRE_MASTERWORK_BUTTON_TT: "#T Приобрести шедевр#!\nМы можем приобрести за границей шедевр стиля, которого у нас ещё нет. Однако это предполагает, что у другой нации есть хотя бы более одного шедевра этого стиля. Кроме того, нам нужна национальная галерея, чтобы повесить картину. Помимо затрат на приобретение, нам также придётся обменять некоторые из наших картин, что будет стоить нам #R 100#! ед. [Concept('concept_klimt_painting_tradition', 'художественной традиции')].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VERNISSAGE_BUTTON: "Вернисаж"
 MR_VERNISSAGE_BUTTON_TT: "#T Вернисаж#!\nНа вернисаже [concept_klimt_painter] может выставить некоторые из своих картин и взамен получить репутацию и [Concept('concept_klimt_painting_tradition', 'художественную традицию')]. Вернисаж возможен только один раз в жизни художника.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_INDEPENDENT_PAINTER: "Независимые художники"
 MR_INDEPENDENT_PAINTER_EXPERIENCE_TOOLTIP: "[Character.GetFullName] имеет репутацию [FixedPointToFloat(Character.MakeScope.GetVariable('klimt_painter_experience').GetValue)|+0]"
