 MR_BAN_ANIMAL_EXPORT_BUTTON: "Запретить экспорт животных"
 MR_BAN_ANIMAL_EXPORT_BUTTON_TT: "#T Запретить экспорт животных#!\nЗапретом на экспорт животных мы принципиально даём понять, что не готовы продавать ни одно из наших животных за границу. Другие нации воздержатся от запросов.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ALLOW_ANIMAL_EXPORT_BUTTON: "Разрешить экспорт животных"
 MR_ALLOW_ANIMAL_EXPORT_BUTTON_TT: "#T Разрешить экспорт животных#!\nС разрешением на экспорт животных мы можем получить хороший дополнительный доход.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BREEDING_ANIMALS_BUTTON: "Разводить животных"
 MR_BREEDING_ANIMALS_BUTTON_TT: "#T Разводите животных в вашем заповеднике#!\nПопытайтесь создать новый [concept_dubois_habitat] для [Concept('concept_dubois_zoo_animal','экзотического животного')] в области с [Concept('concept_dubois_nature_reserve', 'заповедником')].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BREEDING_ANIMALS_TRIGGER: "#default_text Вы можете разводить [Concept('concept_dubois_zoo_animal','экзотических животных')], если у вас есть область с [Concept('concept_dubois_nature_reserve', 'заповедником')], в которой ещё нет конкретного животного из того же региона, что и #V заповедник#!, и если это животное есть в вашем [Concept('concept_dubois_zoo', 'зоопарке')].\nЕсли у вас есть #b заповедник#! в европейской области, и вы хотите разводить в нём #b альпийских горных козлов#!, вы можете сделать это только в том случае, если в области ещё нет [Concept('concept_dubois_habitat', 'ареала')] для козлов, и если в вашем #b [Concept('concept_dubois_zoo', 'зоопарке')]#! есть #b альпийские горные козлы#!.#!"
