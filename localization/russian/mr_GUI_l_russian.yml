 MR_PHYSICIAN_MEDICAL_RESEARCH_ACTIVE_TT: "#T Медицинские исследования активны#!\nЭтот проект активен, когда [concept_panum_physician] не занят другим проектом.\n\nВаш [concept_panum_physician] в настоящее время продвигает медицинские исследования, это не только даёт вашей нации технологические бонусы, но и иногда позволяет врачу исследовать и находить методы лечения повседневных болезней.\nТехнология для следующего прироста: [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]"
