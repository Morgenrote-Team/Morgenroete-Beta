 SPECIMEN_VAR_TT: "#header [Concept('concept_dubois_specimen','Образцы')]#!\n[GetPlayer.GetName] собрал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] @dubois_specimen! [GetPlayer.MakeScope.GetVariable('dubois_specimen').GetValue|V0] [Concept('concept_dubois_specimen','образцов')]."
 MR_SAFARI_EXPEDITION_BUTTON_TT: "#T Сафари!#!\nВо время африканского сафари, благодаря постоянному выслеживанию и отлову, можно поймать крупную дичь, а затем перевезти её в [Concept('concept_dubois_zoo', 'зоопарк')]. За одно сафари можно поймать только одно животное. В зависимости от вида животного, различается, нужны ли вам ловушки или придётся идти по его следу. Как правило, для крупных и медлительных животных требуется больше ловушек, в то время как для быстрых животных — более тщательное выслеживание.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
