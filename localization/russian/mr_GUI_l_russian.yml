 MR_GEOLOGIST_GEOLOGICAL_RESEARCH_BUTTON_TT: "#T Геологические исследования#!\n[concept_agassiz_geologist] может путешествовать по стране в течение 5 лет, чтобы расширить свои знания. Таким образом он также может находить геологические формации, пещеры или (позже) даже уран. Геологи с чертой «Минералог» удваивают количество ежегодно приобретаемых минералов. В конце своих поисков геологи получают дополнительные минералы, опыт и черту «Минералог», если у них её ещё нет.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
