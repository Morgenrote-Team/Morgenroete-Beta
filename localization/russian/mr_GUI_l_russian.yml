 MR_SEND_CHARACTER_TO_ASYLUM_BUTTON_TT: "#T Commit someone to the Asylum#!\nThere are numerous politicians, agitators and even rulers who are basically no longer suitable for their tasks due to psychological disorders, addictions or dementia. A psychiatrist can declare these people to be non compos mentis - even if he has not examined them at all. However, the political abuse of psychiatry can be seen through by the people and the opposition and can have consequences...\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
