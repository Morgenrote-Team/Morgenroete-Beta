 MR_EXTINCTION_CONGRESS_BUTTON: "Конгресс по вымиранию"
 MR_EXTINCTION_CONGRESS_BUTTON_TT: "#T Конгресс по вымиранию#!\nОдной из самых загадочных тайн в истории природы остаётся исчезновение динозавров. Отец палеонтологии, Жорж Кювье, обнаружил, что в конце мелового периода произошло массовое вымирание, в котором погибли и динозавры. Но как могли ужасные ящеры, доминировавшие на Земле миллионы лет, внезапно исчезнуть?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
