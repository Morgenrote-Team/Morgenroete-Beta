 MR_SAFARI_EXPEDITION_HABITAT_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V владеет как минимум одним африканским [Concept('concept_dubois_habitat', 'ареалом')]#! с крупной дичью, или такой ареал находится в области, #V принадлежащей нецентрализованной державе#!.#!"
 MR_SAFARI_EXPEDITION_RECENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V не участвует в сафари#! и #V не участвовал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] в нём недавно#!.#!"
 MR_ZOOLOGICAL_EXPEDITION_BUTTON_TT: "#T Поимка местных животных#!\nНа территории нашей страны есть [Concept('concept_dubois_habitat', 'ареалы')] с удивительными видами, которые можно было бы выставить в [Concept('concept_dubois_zoo', 'зоопарке')]. [concept_dubois_naturalist] отправится в годовое путешествие по стране, чтобы собрать [Concept('concept_dubois_zoo_animal','экзотических животных')] для зоопарка.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ZOOLOGICAL_EXPEDITION_LOCAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] владеет как минимум одним [Concept('concept_dubois_habitat', 'ареалом')], где живёт [Concept('concept_dubois_zoo_animal','экзотическое животное')], которого нет в нашем [Concept('concept_dubois_zoo', 'зоопарке')].#!"
 MR_ZOOLOGICAL_EXPEDITION_CURRENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] в данный момент #V не занимается поимкой местных животных#!.#!"
 MR_BOTANICAL_EXPEDITION_BUTTON_TT: "#T Ботаническая экспедиция#!\nБотанические экспедиции (иногда называемые «охотой за растениями») — это научные путешествия, предназначенные для исследования флоры определённого региона. [concept_dubois_naturalist] будет отвечать за идентификацию, описание и сбор образцов.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SAFARI_EXPEDITION_BANNED_TRIGGER_TT: "#default_text Ботанические экспедиции были запрещены по #V политическим причинам#!.#!"
 MR_SAFARI_EXPEDITION_ACCESS_RAINFOREST_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V владеет тропическим лесом#! хотя бы в одной области. Тропические леса имеют следующие модификаторы областей: #V Амазонский лес#!, #V Лес Конго#!, #V Лес Борнео#! и #V Индокитайский лес#!.#!"
 MR_BOTANICAL_EXPEDITION_RECALL_BUTTON_TT: "#T Отозвать натуралиста из ботанической экспедиции#!\nПриказывает [Concept('concept_dubois_naturalist', 'натуралисту')] вернуться с его ботанических исследований для использования в других целях, таких как поимка животных.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_BOTANICAL_EXPEDITION_RECALL_TRIGGER_TT: "#default_text Ваш [concept_dubois_naturalist] #V не находится в путешествии и не болен#!.#!"
 MR_BOTANICAL_EXPEDITION_RECALL_NATURALIST_EFFECT_TT: "Ваш [concept_dubois_naturalist] больше не занят."
 MR_HIPPOCAMPUS_CONGRESS_BUTTON: "Конгресс по гиппокампу"
 MR_HIPPOCAMPUS_CONGRESS_BUTTON_TT: "#T Конгресс по гиппокампу#!\nНасколько уникален человек? Насколько он животное? Ещё древние греки заметили близость между людьми и обезьянами. Тот факт, что Карл Линней классифицировал обезьян и людей как приматов — «высший» ранг среди животных, — показывает, что когда-то эта область не была столь спорной. Однако с формулированием теории эволюции и предполагаемым происхождением человека от обезьяноподобного родственника возникли конфликты, которые теперь необходимо разрешить.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_NATURALIST_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_dubois_naturalist]#!"
