 MR_CHANGE_TO_ELECTRICAL_EGINEER_BUTTON_HAS_NO_ELECTRICAL_ENGINEER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] нет [Concept('concept_tesla_electrical_engineer', 'инженера-электрика')].#!"
 MR_CHANGE_TO_AERONAUTICAL_EGINEER_BUTTON_TT: "#T Сменить специализацию инженера на [concept_tesla_aeronautical_engineer]#!\nВаш [concept_tesla_engineer] сосредоточится на [Concept('concept_tesla_aeronautical_engineering', 'авиастроении')]. Это может снизить его эффективность. Вы не сможете снова изменить специализацию в течение #n 5 лет#!.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CHANGE_TO_AERONAUTICAL_EGINEER_BUTTON_HAS_NO_AERONAUTICAL_ENGINEER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] нет [Concept('concept_tesla_aeronautical_engineer', 'авиаконструктора')].#!"
 MR_STOP_ENGINEERING_PROJECT_BUTTON: "Остановить проект"
 MR_STOP_ENGINEERING_PROJECT_BUTTON_TT: "#T Остановить инженерный проект#!\nОстановить ваш текущий инженерный проект. Ваш инженерный прогресс будет потерян.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_RESEARCH_BUTTON: "Исследования в строительстве"
 MR_CIVIL_ENGINEER_INFRASTRUCTURE_BUTTON: "Инфраструктурный проект"
 MR_CIVIL_ENGINEER_INFRASTRUCTURE_BUTTON_TT: "#T Инфраструктурный проект#!\nВаш [concept_tesla_engineer|l] сосредоточится на расширении инфраструктуры в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')]. Существуют различные проекты, которые добавляют [Concept('concept_modifier','модификаторы')], увеличивающие [Concept('concept_infrastructure', 'инфраструктуру')] в ваших областях. Каждый раз область с наименьшей инфраструктурой будет получать модификатор. Этот проект добавит #n расходы#! вашей стране.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_INFRASTRUCTURE_TRIGGER_TT: "#default_text Ни одна область в вашей стране не имеет всех [Concept('concept_modifier','модификаторов')] инфраструктуры. Области нужны [GetBuildingType('building_railway').GetName], чтобы получить модификатор железной дороги.#!"
 MR_CIVIL_ENGINEER_CONSTRUCTION_BUTTON: "Строительный проект"
 MR_CIVIL_ENGINEER_CONSTRUCTION_BUTTON_TT: "#T Строительный проект#!\nВаш [concept_tesla_engineer|l] сосредоточится на модернизации [GetBuildingType('building_construction_sector').GetCustom('RU_BL_RP')] [GetPlayer.GetAltNameNoFlag('RU_CL_RP')].\n\nЭто со временем добавит три модификатора к вашему сооружению: $gaudi_new_construction_methods_modifier_with_tooltip$, $gaudi_faster_construction_methods_modifier_with_tooltip$ и $gaudi_efficient_construction_methods_modifier_with_tooltip$.\n\nЭтот проект добавит #n расходы#! вашей стране.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVIL_ENGINEER_CONSTRUCTION_TRIGGER_TT: "#default_text Как минимум один [GetBuildingType('building_construction_sector').GetName] 1-го уровня или выше не имеет всех трёх [Concept('concept_modifier','модификаторов')].#!"
 MR_MECHANICAL_ENGINEER_RESEARCH_BUTTON: "Исследования в машиностроении"
 MR_MECHANICAL_ENGINEER_LOCOMOTIVES_BUTTON: "Новые локомотивы"
 MR_MECHANICAL_ENGINEER_LOCOMOTIVES_BUTTON_TT: "#T Разработать новые локомотивы#!\nВаш [concept_tesla_engineer|l] сосредоточится на создании новых локомотивов, которые дадут бонус вашим [GetBuildingType('building_railway').GetCustom('RU_BL_DP')]. Этот проект добавит #n расходы#! вашей стране.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MECHANICAL_ENGINEER_LOCOMOTIVES_TRIGGER_TT: "#default_text Как минимум одни [GetBuildingType('building_railway').GetName] 1-го уровня или выше не имеют всех пяти [Concept('concept_modifier','модификаторов')] локомотивов.#!"
 MR_MECHANICAL_ENGINEER_INDUSTRIES_BUTTON: "Пром. модернизация"
 MR_MECHANICAL_ENGINEER_INDUSTRIES_BUTTON_TT: "#T Модернизация промышленности#!\nВаш [concept_tesla_engineer|l] сосредоточится на модернизации методов производства сооружения. Это улучшит [concept_throughput|l], [concept_good_production|l] и [concept_input_mult|l] вашего сооружения. Этот проект добавит #n расходы#! вашей стране.\n\nМодификаторы, которые получит сооружение:\n$gaudi_building_throughput_add_modifier_with_tooltip$\n$gaudi_building_production_mult_modifier_with_tooltip$\n$gaudi_building_goods_input_mult_modifier_with_tooltip$\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MECHANICAL_ENGINEER_INDUSTRIES_TRIGGER_TT: "#default_text Как минимум одно промышленное сооружение 1-го уровня или выше не имеет всех трёх [Concept('concept_modifier','модификаторов')].#!"
 MR_MILITARY_ENGINEER_RESEARCH_BUTTON: "Военные исследования"
 MR_MILITARY_ENGINEER_NAVAL_RESEARCH_BUTTON: "Военно-морские исследования"
 MR_MILITARY_ENGINEER_ADVANCED_WEAPONS_BUTTON: "Усовершенствованные винтовки"
 MR_MILITARY_ENGINEER_ADVANCED_WEAPONS_BUTTON_TT: "#T Разработать усовершенствованные винтовки#!\nВаш [concept_tesla_engineer|l] сосредоточится на разработке усовершенствованных винтовок. Это позволит вам использовать новый [concept_mobilization_option] или повысить его уровень. Этот проект добавит #n расходы#! вашей стране.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MILITARY_ENGINEER_ADVANCED_TANKS_BUTTON: "Усовершенствованные танки"
 MR_MILITARY_ENGINEER_ADVANCED_TANKS_BUTTON_TT: "#T Разработать усовершенствованные танки#!\nВаш [concept_tesla_engineer|l] сосредоточится на разработке усовершенствованных танков. Это позволит вам использовать новый [concept_mobilization_option] или повысить его уровень. Этот проект добавит #n расходы#! вашей стране.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MILITARY_ENGINEER_ADVANCED_DEFENCE_BUTTON: "Полевые укрепления"
 MR_MILITARY_ENGINEER_ADVANCED_DEFENCE_BUTTON_TT: "#T Разработать усовершенствованные полевые укрепления#!\nВаш [concept_tesla_engineer|l] сосредоточится на разработке усовершенствованных техник полевых укреплений. Это позволит вам использовать новый [concept_mobilization_option] или повысить его уровень. Этот проект добавит #n расходы#! вашей стране.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_RESEARCH_BUTTON: "Исследования в электротехнике"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESEARCH_STATION_BUTTON: "Геомагнитная ассоциация"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESEARCH_STATION_BUTTON_TT: "#T Вступить в Геомагнитную ассоциацию#!\nВступление в Магнитную ассоциацию в Гёттингене является обязательным требованием для начала наших исследований в области земного магнетизма и создания геомагнитной обсерватории.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON: "Телеграфная сеть"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON_TT: "#T Создать телеграфную сеть#!\nТелеграфия революционизирует коммуникации страны, улучшая услуги и инфраструктуру в регионах, где существует телеграфная сеть. Прокладка проводов становится сложнее с увеличением размеров страны. Телеграфные столбы можно устанавливать только в области, соседняя область которой также имеет телеграфный столб. Для трансокеанской телеграфии необходимы как электрический телеграф, так и электромагнетизм для прокладки подводных кабелей.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_RAILWAY_CAPITAL_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [GetBuildingType('building_railway').GetName] в столице.#!"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_RAILWAY_65_PERCENT_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [GetBuildingType('building_railway').GetName] в #p 65%#! всех областей.#!"
 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON: "Радиосеть"
 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON_TT: "#T Построить сеть радиостанций#!\nВремя надоедливых запутанных кабелей прошло! С изобретением радиотехнологии сообщения теперь можно отправлять через антенну. Это не только позволяет обмениваться новостями, но и создавать радиопрограммы. Перед этим, конечно, необходимо создать общенациональную сеть радиостанций.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON: "Поиск месторождений железа"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON_TT: "#T Поиск месторождений железа#!\nГеофизика и геомагнетизм имеют много практических применений. Горнодобывающая промышленность особенно выиграла от обнаружения возможных месторождений. Крупные компании использовали геофизические знания для обнаружения ранее неизвестных месторождений железа, свинца и нефти. Вместе с правильными технологиями и картированием магнитного поля Земли должно быть легко продуктивно использовать текущие теоретические знания.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_OBSERVATORY_WITH_MAGNETIC_OBSERVATORY_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [GetBuildingType('building_verrier_observatory').GetName] с [Concept('concept_production_method', 'методом производства')] #V «Геомагнитная обсерватория»#!.#!"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_2_BUTTON: "Поиск месторождений свинца"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_2_BUTTON_TT: "#T Поиск месторождений свинца#!\nГеофизика и геомагнетизм имеют много практических применений. Горнодобывающая промышленность особенно выиграла от обнаружения возможных месторождений. Крупные компании использовали геофизические знания для обнаружения ранее неизвестных месторождений железа, свинца и нефти. Вместе с правильными технологиями и картированием магнитного поля Земли должно быть легко продуктивно использовать текущие теоретические знания.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_3_BUTTON: "Поиск месторождений нефти"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_3_BUTTON_TT: "#T Поиск месторождений нефти#!\nГеофизика и геомагнетизм имеют много практических применений. Горнодобывающая промышленность особенно выиграла от обнаружения возможных месторождений. Крупные компании использовали геофизические знания для обнаружения ранее неизвестных месторождений железа, свинца и нефти. Вместе с правильными технологиями и картированием магнитного поля Земли должно быть легко продуктивно использовать текущие теоретические знания.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AERONAUTICAL_ENGINEER_RESEARCH_BUTTON: "Авиационные исследования"
 MR_AERONAUTICAL_ENGINEER_AIRPORT_BUTTON: "Модернизация аэропортов"
 MR_AERONAUTICAL_ENGINEER_AIRPORT_BUTTON_TT: "#T Модернизация аэропортов#!\nВаш [concept_tesla_engineer|l] сосредоточится на модернизации ваших [GetBuildingType('building_airport').GetCustom('RU_BL_RP')]. Аэропорты получат модификаторы, которые увеличивают [concept_throughput] и [concept_good_production] и снижают [concept_input_mult]. Этот проект добавит #n расходы#! вашей стране.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AERONAUTICAL_ENGINEER_AIRPORT_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [GetBuildingType('building_airport').GetName] 1-го уровня или выше, у которого ещё нет трёх [Concept('concept_modifier','модификаторов')].#!"
 MR_AERONAUTICAL_ENGINEER_ADVANCED_AIRCRAFTS_BUTTON: "Военная авиация"
 MR_AERONAUTICAL_ENGINEER_ADVANCED_AIRCRAFTS_BUTTON_TT: "#T Разработать усовершенствованную военную авиацию#!\nВаш [concept_tesla_engineer|l] сосредоточится на разработке усовершенствованной военной авиации. Это позволит вам использовать новый [concept_mobilization_option] или повысить его уровень. Этот проект добавит #n расходы#! вашей стране.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SCHNEIDER_TROPHY_INFORMATION: "#T Кубок Шнейдера#!\nПобеды: @curtiss_schneider_point! [GetPlayer.MakeScope.Var('curtiss_schneider_trophy_victories_var').GetValue|V0][GetPlayer.GetCustom('GUI_curtiss_last_trophy_winner_for_gui_type')]\n\n[GetPlayer.GetCustom('curtiss_schneider_trophy_current_rank_1_global_type')][GetPlayer.GetCustom('curtiss_schneider_trophy_current_rank_2_global_type')][GetPlayer.GetCustom('curtiss_schneider_trophy_current_rank_3_global_type')][GetPlayer.GetCustom('curtiss_schneider_trophy_current_rank_4_global_type')][GetPlayer.GetCustom('curtiss_schneider_trophy_current_rank_5_global_type')][GetPlayer.GetCustom('curtiss_schneider_trophy_current_rank_6_global_type')][GetPlayer.GetCustom('curtiss_schneider_trophy_current_rank_7_global_type')][GetPlayer.GetCustom('curtiss_schneider_trophy_current_rank_8_global_type')]"
