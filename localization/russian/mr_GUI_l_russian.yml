 MR_SEND_CHARACTER_TO_ASYLUM_BUTTON: "Отправить кого-либо в лечебницу"
 MR_SEND_CHARACTER_TO_ASYLUM_BUTTON_TT: "#T Отправить кого-либо в лечебницу#!\nСуществует множество политиков, агитаторов и даже правителей, которые в силу психологических расстройств, зависимостей или деменции, по сути, больше не подходят для выполнения своих задач. Психиатр может объявить этих людей невменяемыми — даже если он их вовсе не осматривал. Однако политическое злоупотребление психиатрией может быть раскрыто народом и оппозицией и повлечь за собой последствия...\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
