 MR_SPECIMEN_COLLECTION_BUTTON: "Основать коллекцию образцов"
 MR_SPECIMEN_COLLECTION_BUTTON_TT: "#T Основать коллекцию образцов#!\nСистематизация всех наших экзотических насекомых, бабочек и других [Concept('concept_dubois_specimen','образцов')] покажет миру, насколько научно развита наша нация.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SPECIMEN_GARDEN_NO_SPECIMEN_COLLECTION_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] ещё нет #V Коллекции образцов#!.#!"
