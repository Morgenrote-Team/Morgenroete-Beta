 MR_PHYSICIAN_DESCRIBE_DISEASE_BUTTON_TT: "#T Описание болезни#!\n[Concept('concept_panum_physician', '#BLUE #b Врач#!#!')] может более подробно с научной точки зрения описать ранее не описанную болезнь, если она свирепствует как эпидемия на территории страны. Это важный предварительный шаг в разработке последующего метода лечения.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_DESCRIBE_DISEASE_ACTIVE_TT: "#T Описание болезни#!\n#p Ваш [concept_panum_physician] в настоящее время работает над первым описанием болезни.#!\n[Concept('concept_panum_physician', '#BLUE #b Врач#!#!')] может более подробно с научной точки зрения описать ранее не описанную болезнь, если она свирепствует как эпидемия на территории страны. Это важный предварительный шаг в разработке последующего метода лечения."
