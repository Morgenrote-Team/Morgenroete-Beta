 MR_EXTEND_ZOO_FAMOUS_BUTTON: "Расширить [concept_dubois_zoo] (знаменитый)"
 MR_EXTEND_ZOO_FAMOUS_BUTTON_TT: "#T Расширить зоопарк до знаменитого размера#!\n[Concept('concept_dubois_zoo_animal','Экзотические животные')] — это всеобщее счастье: люди отдыхают в зоопарке, учёные могут продолжать свои зоологические исследования, а международный престиж предоставляется тем, кто может показать наибольшее количество представителей иностранной фауны. С каждым расширением престиж нации увеличивается. Некоторые этапы расширения требуют не только сбора большого количества животных, но и из разных частей света.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
