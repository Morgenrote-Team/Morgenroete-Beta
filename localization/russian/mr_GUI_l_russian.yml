 MR_FOUND_ASYLUM_BUTTON_TT: "#T Found a Mental Asylum#!\nThe separation of convicts in a prison and mentally disturbed people in a separate institution was a first step towards modern psychiatry. A specialized mental asylum will help keep those who need help in a better place.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
