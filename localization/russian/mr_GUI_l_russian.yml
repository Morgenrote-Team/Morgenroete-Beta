 MR_PACIFIC_EXPEDITION_TT: "#T Тихоокеанская экспедиция#!\nНаряду с полюсами, Тихий океан является одной из последних областей на Земле, которые всё ещё хранят тайны. Учёные из многих научных дисциплин заинтересованы в исследовательской миссии для проведения натуралистических, палеонтологических, астрономических и океанографических исследований. Опять же, для великих держав это может стать престижным делом, чтобы показать своё влияние на краю света.\n\n [ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
