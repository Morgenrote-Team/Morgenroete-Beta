 MR_CRETACEOUS_SCENERY_BUTTON_TT: "#T Создать диораму мелового периода#!\nКак только мировые геологические знания достигнут определённого уровня, палеонтологи смогут создавать в университетах комнаты с доисторическими диорамами. В каждом университете возможна только одна диорама. В данном случае позвольте вашему [Concept('concept_dubois_paleontologist', '#GREEN #b палеонтологу#!#!')] создать диораму мелового периода.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CRETACEOUS_SCENERY_BUTTON_STOP_TT: "#T Прекратить создание диорамы мелового периода#!\nПрикажите вашему [Concept('concept_dubois_paleontologist', '#GREEN #b палеонтологу#!#!')] #n прекратить#! создание диорамы мелового периода и снова сделать его доступным.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_JURASSIC_SCENERY_BUTTON_TT: "#T Создать диораму юрского периода#!\nКак только мировые геологические знания достигнут определённого уровня, палеонтологи смогут создавать в университетах комнаты с доисторическими диорамами. В каждом университете возможна только одна диорама. В данном случае позвольте вашему [Concept('concept_dubois_paleontologist', '#GREEN #b палеонтологу#!#!')] создать диораму юрского периода.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
