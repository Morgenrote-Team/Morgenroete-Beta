 MR_IMPRESSIONISM_BUTTON: "Импрессионизм"
 MR_IMPRESSIONISM_BUTTON_TT: "#T Выбрать импрессионизм#!\n[concept_elgar_impressionism] — это стиль в истории искусства, характеризующийся атмосферным изображением мимолётных моментов. Он возник из движения в живописи во Франции во второй половине XIX века. Термин «импрессионизм» также применялся к определённым стилям в музыке, литературе, кино и фотографии. В то время как многие натуралисты, такие как Генрих Гарт, отвергали музыку как средство выражения «ищущего истину акционизма», импрессионисты часто рассматривали «беспредметное погружение в мечты» под тонко градуированные красочные аккорды как удовольствие.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_POWERFUL_LANDOWNERS_TRIGGER_TT: "#default_text #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]#!#! [concept_powerful]."
 MR_NOT_POWERFUL_INTELLIGENTSIA_TRIGGER_TT: "#default_text #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]#!#! не является [Concept('concept_powerful', 'влиятельной')]."
 MR_HAPPY_INTELLIGENTSIA_TRIGGER_TT: "#default_text У #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetCustom('RU_IG_RP')]#!#! [concept_approval] #V 5 или выше#!.#!"
 MR_EXPRESSIONISM_BUTTON: "Экспрессионизм"
 MR_EXPRESSIONISM_BUTTON_TT: "#T Выбрать экспрессионизм#!\n[concept_elgar_expressionism] — это художественный стиль. Его истоки и предшественники прослеживаются в конце XIX века. Подобно импрессионизму, символизму и фовизму, экспрессионизм является движением против тенденций натурализма. В экспрессионизме выразительный уровень преобладает над эстетическим, апеллятивным и фактическим. Художник хочет донести до зрителя свой опыт. В отличие от музыкального импрессионизма, который изображает восприятие внешнего вида вещей, экспрессионистские художественные течения формулируют эмоции человеческой души.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_POWERFUL_INTELLIGENTSIA_OR_TRADE_UNIONS_TRIGGER_TT: "#default_text Либо #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]#!#!, либо #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName]#!#! [concept_powerful]."
 MR_NOT_POWERFUL_LANDOWNERS_TRIGGER_TT: "#default_text #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]#!#! не являются [Concept('concept_powerful', 'влиятельными')]."
 MR_HAPPY_INTELLIGENTSIA_OR_TRADE_UNIONS_TRIGGER_TT: "#default_text Либо у #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetCustom('RU_IG_RP')]#!#!, либо у #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetCustom('RU_IG_RP')]#!#! [concept_approval] #V 5 или выше#!.#!"
 MR_ART_NOUVEAU_BUTTON: "Ар-нуво"
 MR_ART_NOUVEAU_BUTTON_TT: "#T Выбрать ар-нуво#!\n[concept_elgar_art_nouveau], в Италии также известный как «стиль либерти», — это художественно-историческая эпоха на рубеже XIX–XX веков. Течения, которые можно отнести к ар-нуво, — это реформстиль (от движения за реформы), сецессионстиль (от Венского сецессиона), модерн в Каталонии, в Швейцарии — «еловый стиль», а в США — «стиль Тиффани». Наряду с доминирующим во французском, английском и итальянском языках выражением «ар-нуво» в английском также используется «модерн стайл», а в итальянском — «стиле флореале». По времени ар-нуво относится к «прекрасной эпохе».\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
