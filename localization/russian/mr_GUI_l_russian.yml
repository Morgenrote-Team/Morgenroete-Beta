 MR_EXAMINE_CAVE_BUTTON_BUTTON_TT: "#T Исследовать пещеру#!\nС помощью [Concept('concept_lepsius_anthropologist', 'антрополога')] можно исследовать ранее известные [Concept('concept_lepsius_cave','пещеры')] на национальной территории. Можно найти [Concept('concept_lepsius_human_fossil','человеческие кости')] и доисторические артефакты.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
