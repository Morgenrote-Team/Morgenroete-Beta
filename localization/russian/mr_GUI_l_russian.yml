 MR_AERONAUTICAL_ENGINEER_GIANT_ZEPPELIN_BUTTON_TT: "#T Гигантский дирижабль#!\nВоздухоплавание достигло своего пика. Наша страна считается родиной самых больших и величественных дирижаблей в мире. Пришло время поразить весь мир гигантским дирижаблем и облететь земной шар.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AERONAUTICAL_ENGINEER_AIRLINE_LEVEL_4_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_curtiss_airline] #V 4-го уровня или выше#!.#!"
 MR_AERONAUTICAL_ENGINEER_ZEPPELIN_FOCUS_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_modifier] #V «$curtiss_zeppelin_focus_modifier$»#!.#!"
 MR_AERONAUTICAL_ENGINEER_GIANT_AIRPLANE_BUTTON: "Гигантский самолёт"
 MR_AERONAUTICAL_ENGINEER_GIANT_AIRPLANE_BUTTON_TT: "#T Гигантский самолёт#!\nНебо — последний рубеж. То, что в раннее Новое время было эпохой открытий, теперь стало покорением небес. Но по сравнению с галеонами испанцев, сегодняшние небесные суда — всего лишь скорлупки. Океанские гиганты бороздят моря, но в небе до сих пор доминируют лишь небольшие машины. Мечта о постройке гигантского самолёта, способного перевозить не десятки, а сотни людей, кажется утопией. Но процветающая авиационная промышленность и мощная авиакомпания во главе с правильным человеком могут перевернуть мир...\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AERONAUTICAL_ENGINEER_PRIVATE_AIRLINE_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_curtiss_airline].#!"
 MR_AERONAUTICAL_ENGINEER_AIRLINE_LEVEL_6_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_curtiss_airline] #V 6-го уровня или выше#!.#!"
 MR_AERONAUTICAL_ENGINEER_AIRPLANE_FOCUS_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_modifier] #V «$curtiss_airplane_focus_modifier$»#!.#!"
