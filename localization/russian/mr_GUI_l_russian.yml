 MR_NATURALIST_IMPROVE_FORESTRY_BUTTON_TT: "#T Улучшить лесное хозяйство#!\nВаш [Concept('concept_dubois_naturalist', '#GREEN #b натуралист#!#!')] может использовать свои навыки для улучшения лесов вашей страны, что улучшит одно из ваших сооружений «[GetBuildingType('building_logging_camp').GetName]».\n\nМодификаторы, которые получит сооружение:\n$dubois_building_throughput_add_modifier_with_tooltip$\n$dubois_building_production_mult_modifier_with_tooltip$\n$dubois_building_goods_input_mult_modifier_with_tooltip$\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
