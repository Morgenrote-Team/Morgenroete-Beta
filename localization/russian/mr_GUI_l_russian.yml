 MR_ASTRONOMER_DISCOVER_SATELLITES_BUTTON_TT: "#T Открывать новые спутники#!\nУ многих планет в Солнечной системе есть ещё не открытые естественные [Concept('concept_verrier_satellite','спутники')], подобные Луне Земли. В зависимости от уровня технологий, методов производства в нашей обсерватории и навыков [Concept('concept_verrier_astronomer', '#ORANGE #b астронома#!#!')], может появиться возможность найти ранее совершенно неизвестный спутник планеты. Однако астроном найдёт меньше астрономических объектов, если будет искать новые спутники.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
