 MR_PHYSICIAN_CAN_DESCRIBE_LOCAL_DISEASE_TRIGGER_TT: "#default_text [GetPlayer.GetName] страдает от эпидемического заболевания, которое ещё не было полностью описано.#!"
 MR_PHYSICIAN_DESCRIBE_DISEASE_FOREIGN_BUTTON_TT: "#T Медицинская наблюдательная экспедиция#!\n[Concept('concept_panum_physician', '#BLUE #b Врач#!#!')] может предпринять экспедицию в далёкую страну, где свирепствует эпидемия, и описать там болезнь. Этот процесс занимает больше времени, чем диагностика в его собственной стране.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_DESCRIBE_DISEASE_FOREIGN_ACTIVE_TT: "#T Медицинская наблюдательная экспедиция#!\n#p Ваш [concept_panum_physician] в настоящее время находится в медицинской наблюдательной экспедиции.#!\n[Concept('concept_panum_physician', '#BLUE #b Врач#!#!')] может предпринять экспедицию в далёкую страну, где свирепствует эпидемия, и описать там болезнь. Этот процесс занимает больше времени, чем диагностика в его собственной стране."
 MR_PHYSICIAN_CAN_DESCRIBE_FOREIGN_DISEASE_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть интерес в стране, которая страдает от эпидемического заболевания, которое ещё не было полностью описано.#!"
 MR_PHYSICIAN_FIND_TREATMENT_BUTTON_TT: "#T Лечение болезни#!\n[Concept('concept_panum_physician', '#BLUE #b Врач#!#!')] может найти лечение для болезни, свирепствующей как эпидемия на территории страны. Хотя лечение не предотвратит болезнь, оно значительно ограничит её действие. Для некоторых болезней требуется исследование определённой технологии, прежде чем можно будет найти метод лечения.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_FIND_TREATMENT_ACTIVE_TT: "#T Лечение болезни#!\n#p Ваш [concept_panum_physician] ищет лечение для болезни.#!\n[Concept('concept_panum_physician', '#BLUE #b Врач#!#!')] может найти лечение для болезни, свирепствующей как эпидемия на территории страны. Хотя лечение не предотвратит болезнь, оно значительно ограничит её действие. Для некоторых болезней требуется исследование определённой технологии, прежде чем можно будет найти метод лечения."
 MR_PHYSICIAN_CAN_FIND_LOCAL_TREATMENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] страдает от эпидемии, которая была описана, но для которой всё ещё нет лечения, а также обладает соответствующей технологией.#!"
 MR_PHYSICIAN_FIND_TREATMENT_FOREIGN_BUTTON_TT: "#T Медицинская исследовательская экспедиция#!\n[Concept('concept_panum_physician', '#BLUE #b Врач#!#!')] может предпринять экспедицию в далёкую страну, где свирепствует эпидемия, и изучить там болезнь, чтобы найти лечение. Этот процесс занимает больше времени, чем в его собственной стране. Для некоторых болезней требуется исследование определённой технологии, прежде чем можно будет найти метод лечения.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_FIND_TREATMENT_FOREIGN_ACTIVE_TT: "#T Медицинская исследовательская экспедиция#!\n#p Ваш [concept_panum_physician] ищет лечение для болезни.#!\n[Concept('concept_panum_physician', '#BLUE #b Врач#!#!')] может предпринять экспедицию в далёкую страну, где свирепствует эпидемия, и изучить там болезнь, чтобы найти лечение. Этот процесс занимает больше времени, чем в его собственной стране. Для некоторых болезней требуется исследование определённой технологии, прежде чем можно будет найти метод лечения."
