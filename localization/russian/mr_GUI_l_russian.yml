 MR_IMPROVE_FORESTRY_ACTIVE_TT: "#T Улучшение лесного хозяйства#!\n#p Ваш [concept_dubois_naturalist|l] в настоящее время улучшает сооружение «[GetBuildingType('building_logging_camp').GetName]».#!"
 MR_NATURALIST_IMPROVE_RUBBER_BUTTON_TT: "#T Улучшить каучуковые плантации#!\nВаш [Concept('concept_dubois_naturalist', '#GREEN #b натуралист#!#!')] может использовать свои навыки для улучшения сооружения «[GetBuildingType('building_rubber_plantation').GetName]» вашей страны.\n\nМодификаторы, которые получит сооружение:\n$dubois_building_throughput_add_modifier_with_tooltip$\n$dubois_building_production_mult_modifier_with_tooltip$\n$dubois_building_goods_input_mult_modifier_with_tooltip$\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_NATURALIST_IMPROVE_RUBBER_TRIGGER_TT: "#default_text Как минимум одно сооружение «[GetBuildingType('building_rubber_plantation').GetName]»! 1-го уровня или выше не имеет всех трёх [Concept('concept_modifier','модификаторов')].#!"
 MR_IMPROVE_RUBBER_ACTIVE_TT: "#T Улучшение лесного хозяйства#!\n#p Ваш [concept_dubois_naturalist|l] в настоящее время улучшает сооружение «[GetBuildingType('building_rubber_plantation').GetName]».#!"
 MR_CHEMIST_SYNTHETIC_RUBBER_BUTTON: "Синтетический каучук"
 MR_CHEMIST_SYNTHETIC_RUBBER_BUTTON_TT: "#T Синтетический каучук#!\nКаучук ограничен очень небольшой климатической зоной. Без колоний или импорта практически невозможно получить это ценное сырьё. Но, возможно, возможности химии могут компенсировать то, чего нам не хватает в другом месте?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANIMAL_DOCUMENTATION_BUTTON: "Изучить местную фауну"
 MR_ANIMAL_DOCUMENTATION_BUTTON_TT: "#T Изучить местную фауну#!\nНе следует пренебрегать местной фауной во всех стремлениях к исследованию как можно более экзотических животных. [Concept('concept_dubois_naturalist', '#GREEN #b Натуралист#!#!')] может внимательно изучить животных в ареалах, которые находятся в его основных областях, и написать о них научные работы.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANIMAL_DOCUMENTATION_ACTIVE_TT: "#T Изучение местной фауны#!\n#p Ваш натуралист в настоящее время документирует местную дикую природу.#!\nНе следует пренебрегать местной фауной во всех стремлениях к исследованию как можно более экзотических животных. [Concept('concept_dubois_naturalist', '#GREEN #b Натуралист#!#!')] может внимательно изучить животных в ареалах, которые находятся в его основных областях, и написать о них научные работы."
 MR_CAN_DOCUMENT_ANIMAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] владеет как минимум одной включенной областью с ареалом обитания животных, где обитает недокументированное [Concept('concept_dubois_zoo_animal','экзотическое животное')].#!"
