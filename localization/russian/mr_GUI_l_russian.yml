 MR_ASTEROID_CONGRESS_BUTTON: "Конгресс по астероидам"
 MR_ASTEROID_CONGRESS_BUTTON_TT: "#T Конгресс по астероидам#!\nС момента открытия Цереры в 1801 году астрономы находят всё больше небесных тел, из-за чего число планет в Солнечной системе постоянно росло. Открытие Нептуна поставило вопрос о том, не будет ли целесообразнее ввести новую категорию для многочисленных малых объектов, обнаруженных в основном между Марсом и Юпитером. В частности, изобретение новых астрономических символов и относительно малые размеры этих тел привели астрономов к предположению, что они, скорее всего, являются «малыми звёздами» или «малыми планетами». Разумеется, такая классификация будет означать, что некоторые объекты, ранее считавшиеся планетами, лишатся своего статуса и будут низведены до обычных каменных глыб.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTEROID_CONGRESS_NEPTUNE_TT: "#default_text #V Нептун#! был открыт.#!"
