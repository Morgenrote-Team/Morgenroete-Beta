 MR_INVITE_INDEPENDENT_PAINTER: "Пригласить художника"
 MR_INVITE_INDEPENDENT_PAINTER_TT: "#T Пригласить этого художника#!\nПриглашение [Concept('concept_klimt_painter', '#PURPLE #b художника#!#!')] — это способ получить нового художника, если ваша страна не может предоставить достаточно хорошего художника или если ваш нынешний художник вас не устраивает.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).AddScope('chosen_painter', Scope.GetCharacter.MakeScope ).End)]"
