 MR_CIVIL_ENGINEER_TOPOGRAPHIC_MAP_BUTTON: "Создать топограф. карту"
 MR_CIVIL_ENGINEER_TOPOGRAPHIC_MAP_BUTTON_TT: "#T Создать топографическую карту#!\nПозвольте вашему [Concept('concept_tesla_engineer', 'инженеру')] сосредоточиться на создании топографической карты [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]. Это добавит [concept_modifier] $gaudi_topographic_state_map_modifier_with_tooltip$ областям, что облегчит строительство и транспортировку. Этот проект добавит #n расходы#! вашей стране.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
