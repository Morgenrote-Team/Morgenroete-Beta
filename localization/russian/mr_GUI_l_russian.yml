 MR_GEOLOGIST_TECTONICS_CONGRESS_BUTTON_TT: "#T Конгресс о дрейфе континентов#!\nВеками вера в то, что континенты неподвижны, была непоколебимой. Выдающийся [concept_agassiz_geologist] со значительными геологическими знаниями мог бы разрушить эту мантру. Удастся ли ему это — довольно сомнительно.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
