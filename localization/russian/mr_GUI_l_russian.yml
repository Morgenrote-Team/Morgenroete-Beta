 MR_ORIGIN_CONGRESS_BUTTON_TT: "#T Конгресс о происхождении современного человека#!\nС открытием доисторических человеческих костей также возник вопрос об изначальном происхождении человека. В то время как Дарвин предполагал африканское происхождение, другие постулировали несколько параллельных линий развития. С начала века доминирующей стала точка зрения, что современный человек развился в Азии.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
