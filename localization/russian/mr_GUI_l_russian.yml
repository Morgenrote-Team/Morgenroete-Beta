 MR_PALEONTOLOGICAL_EXPEDITION_RECALL_BUTTON: "Отозвать палеонтологическую экспедицию"
 MR_PALEONTOLOGICAL_EXPEDITION_RECALL_BUTTON_TT: "#T Отозвать палеонтологическую экспедицию#!\nПриказывает палеонтологу вернуться с его палеонтологических исследований для других целей — таких как сборка или перемонтирование скелетов динозавров.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNT_SKELETON_BUTTON: "Собрать скелет динозавра"
 MR_MOUNT_SKELETON_BUTTON_TT: "#T Собрать скелет динозавра#!\nВаш [concept_dubois_paleontologist] может собрать новый [concept_dubois_dinosaur_skeleton] из 5 [Concept('concept_dubois_dinosaur_bone','костей динозавров')] с одного континента.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
