 MR_BEETHOVEN_MONUMENT_BUTTON: "Построить памятник Бетховену"
 MR_BEETHOVEN_MONUMENT_BUTTON_TT: "#T Построить памятник Бетховену#!\nНет сомнений, что Людвиг ван Бетховен был величайшим композитором всех времён и что вся романтическая музыка является продолжением его творчества. Каждый современный артист обязан ему данью уважения. Тем более поразительно, что его до сих пор слишком мало ценят. Однако после призыва Роберта Шумана несколько ассоциаций, городов, князей и правительств собрали деньги, чтобы воздвигнуть памятник в его родном Бонне.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
