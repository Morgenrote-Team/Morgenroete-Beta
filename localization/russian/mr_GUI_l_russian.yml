 MR_GEOLOGIST_FIND_OIL_TRIGGER_TT: "#default_text Как минимум одна нефтяная вышка 1-го уровня или выше не имеет [Concept('concept_modifier','модификатора')] $agassiz_building_production_2_mult_modifier_with_tooltip$.#!"
 MR_SELL_MINERALS_FOR_RARE_MINERAL_BUTTON: "Продать минералы в обмен на редкие минералы"
