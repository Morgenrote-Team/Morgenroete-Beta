 MR_CHEMIST_THEORY_BUTTON: "Theorize an Element\nYour [concept_mendelejew_chemist] can try to theorize an element that is not yet theorized. Once an element exists in theory, the chemist can start discovering it.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
