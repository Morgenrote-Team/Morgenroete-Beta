 MR_ARABLE_LAND: "[concept_arable_land]"
 MR_ARABLE_LAND_TT: "Сортировать [Concept('concept_state', 'области')] по доступной [Concept('concept_arable_land', 'пахотной земле')]."
 MR_RED_CROSS_BUTTON: "Основать [concept_panum_red_cross]"
 MR_RED_CROSS_BUTTON_TT: "#T Основать [concept_panum_red_cross]#!\nМеждународный Красный Крест — одна из первых наднациональных организаций. Создание этой организации было важным шагом на пути к международному праву. Она была основана для защиты жизни и здоровья людей, обеспечения уважения ко всем человеческим существам, а также для предотвращения и облегчения человеческих страданий.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IRC_INFAMY_TRIGGER_TT: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] менее #V 35 ед. [Concept('concept_infamy', 'дурной славы')]#!.#!"
 MR_JOIN_RED_CROSS_BUTTON: "Присоединиться к [Concept('concept_panum_red_cross', 'Красному Кресту')]"
 MR_JOIN_RED_CROSS_BUTTON_TT: "#T Присоединиться к [Concept('concept_panum_red_cross', 'Красному Кресту')]#!\nНаша страна может присоединиться к Международному Красному Кресту и улучшить свою репутацию с помощью международных соглашений — за счёт безжалостного ведения войны.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_FIRST_CONVENTION_BUTTON: "Подписать Первую конвенцию"
 MR_SIGN_FIRST_CONVENTION_BUTTON_TT: "#T Подписать Первую конвенцию#!\nПервая Женевская конвенция, официально «Конвенция об улучшении участи раненых в действующих армиях», определяет «основу, на которой покоятся нормы международного права по защите жертв вооружённых конфликтов». Одно из её важнейших положений — неприкосновенность и защита от уничтожения всех учреждений для лечения раненых и больных солдат, а также беспристрастный приём и лечение всех комбатантов.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_SECOND_CONVENTION_BUTTON: "Подписать Вторую конвенцию"
 MR_SIGN_SECOND_CONVENTION_BUTTON_TT: "#T Подписать Вторую конвенцию#!\nГаагские конвенции 1899 и 1907 годов представляют собой серию международных договоров и деклараций, заключённых на двух международных мирных конференциях в Гааге, Нидерланды. Обе конференции включали переговоры по разоружению, законам войны и военным преступлениям. Конференция 1907 года уделила повышенное внимание морской войне.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_THIRD_CONVENTION_BUTTON: "Подписать Третью конвенцию"
 MR_SIGN_THIRD_CONVENTION_BUTTON_TT: "#T Подписать Третью конвенцию#!\nПротокол о запрещении применения на войне удушливых, ядовитых или других подобных газов и бактериологических средств, обычно называемый Женевским протоколом, — это договор, запрещающий применение химического и биологического оружия в международных вооружённых конфликтах. Он был подписан в Женеве 17 июня 1925 года.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_RED_CROSS_BUTTON: "Покинуть Красный Крест"
 MR_LEAVE_RED_CROSS_BUTTON_TT: "#T Покинуть Красный Крест#!\nЧеловек человеку волк.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_INTRODUCE_MEDICAL_TECHNIQUES_LEVEL_BUTTON_TT: "#T Внедрить мед. методики#!\nНаправляет [Concept('concept_panum_physician', '#BLUE #b врача#!#!')] на внедрение современного оборудования, методов и новейших способов лечения в медицинских учреждениях по всей стране. Иногда врач может сделать впечатляющие новые изобретения.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_INTRODUCE_MEDICAL_TECHNIQUES_LEVEL_BUTTON_ACTIVE_TT: "#T Внедрение медицинских методик#!\nВаш врач в настоящее время внедряет современное оборудование, методы и новейшие способы лечения в медицинских учреждениях по всей стране. Иногда врач может сделать впечатляющие новые изобретения."
