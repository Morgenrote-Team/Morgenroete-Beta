 MR_CIVIL_ENGINEER_RESEARCH_BUTTON_TT: "#T Исследования в гражданском строительстве#!\nПозвольте вашему [Concept('concept_tesla_engineer', '#ORANGE #b инженеру#!#!')] сосредоточиться на исследовании технологий гражданского строительства. Этот проект добавит #n расходы#! вашей стране, но будет регулярно давать прирост к исследованиям.\nТехнология для следующего прироста: [GetPlayer.MakeScope.GetCountry.GetCustom('tesla_civil_engineering_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MECHANICAL_ENGINEER_RESEARCH_BUTTON_TT: "#T Исследования в машиностроении#!\nПозвольте вашему [Concept('concept_tesla_engineer', '#ORANGE #b инженеру#!#!')] сосредоточиться на изобретении новых механических инноваций. Это добавит #n расходы#! вашей стране, но будет регулярно давать вам прирост к исследованиям.\nТехнология для следующего прироста: [GetPlayer.MakeScope.GetCountry.GetCustom('tesla_mechanical_engineering_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MILITARY_ENGINEER_RESEARCH_BUTTON_TT: "#T Военно-инженерные исследования#!\nПозвольте вашему [Concept('concept_tesla_engineer', '#ORANGE #b инженеру#!#!')] сосредоточиться на изобретении новых военных инноваций. Это добавит #n расходы#! вашей стране, но будет регулярно давать вам прирост к исследованиям.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MILITARY_ENGINEER_NAVAL_RESEARCH_BUTTON_TT: "#T Военно-морские инженерные исследования#!\nПозвольте вашему [Concept('concept_tesla_engineer', '#ORANGE #b инженеру#!#!')] сосредоточиться на изобретении новых военно-морских инноваций. Это добавит #n расходы#! вашей стране, но будет регулярно давать вам прирост к исследованиям.\nТехнология для следующего прироста: [GetPlayer.MakeScope.GetCountry.GetCustom('tesla_military_engineering_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_RESEARCH_BUTTON_TT: "#T Исследования в электротехнике#!\nПозвольте вашему [Concept('concept_tesla_engineer', '#ORANGE #b инженеру#!#!')] сосредоточиться на изобретении новых применений электричества. Это добавит #n расходы#! вашей стране, но будет регулярно давать вам прирост к исследованиям.\nТехнология для следующего прироста: [GetPlayer.MakeScope.GetCountry.GetCustom('tesla_electrical_engineering_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_AERONAUTICAL_ENGINEER_RESEARCH_BUTTON_TT: "#T Авиационные инженерные исследования#!\nПозвольте вашему [Concept('concept_tesla_engineer', '#ORANGE #b инженеру#!#!')] сосредоточиться на исследовании авиационных инженерных технологий. Этот проект добавит #n расходы#! вашей стране, но будет регулярно давать прирост к исследованиям.\nТехнология для следующего прироста: [GetPlayer.MakeScope.GetCountry.GetCustom('tesla_aeronautical_engineering_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_MEDICAL_RESEARCH_BUTTON_TT: "#T Медицинские исследования#!\nЭтот проект активен, когда [concept_panum_physician] не занят другим проектом.\n\nПока [Concept('concept_panum_physician', '#BLUE #b врач#!#!')] продвигает медицинские исследования, он может не только получать технологические бонусы для нации, но и иногда исследовать и находить методы лечения повседневных болезней.\nТехнология для следующего прироста: [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
