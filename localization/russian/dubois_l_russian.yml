 dubois_nature_reserve_survey_decision_desc: "Провести исследование, чтобы найти место для [Concept('concept_dubois_nature_reserve', 'заповедника')]. Такое исследование может занять #n несколько месяцев#!."
 dubois.1210.t: "Среде обитания в [ROOT.GetState.GetCustom('RU_SL_PP')] угрожает опасность"
 dubois.1210.d: "Всё возрастающая экспансия цивилизации вступает в конфликт со [Concept('concept_dubois_habitat','средой обитания животных')] в [ROOT.GetState.GetCustom('RU_SL_PP')]. Если мы не защитим нашу местную дикую природу, построив [Concept('concept_dubois_nature_reserve', 'заповедник')], животные вымрут примерно через 10 лет."
 dubois.1210.f: "Ненасытные машины, вгрызающиеся в землю. Разрастающиеся города, поглощающие всё больше и больше земель. Железнодорожные пути, прорезающие цветущие просторы. Каждый день животные теряют всё больше своего царства. Шаг за шагом человек посягает на него."
 dubois.1210.g: "Мы должны защитить этих животных!"
 dubois.1210.h: "Прогресс превыше всего!"
 dubois_endangered_habitat_tt: "Когда [Concept('concept_dubois_habitat', 'среда обитания')] оказывается под угрозой, она будет уничтожена через 10 лет. Вы можете предотвратить это, построив в области [Concept('concept_dubois_nature_reserve', 'заповедник')]. Таким образом вы защитите [Concept('concept_dubois_zoo_animal', 'экзотических животных')] от вымирания."
 dubois_habitat_endangered_modifier: "Среда обитания под угрозой"
 dubois_habitat_endangered_timer_modifier: "Время до потери среды обитания"
 dubois_habitat_protection_path_modifier: "Готовность защитить среду обитания"
 dubois_habitat_destruction_path_modifier: "Прогресс превыше всего"
 dubois.1211.t: "Среда обитания в [ROOT.GetState.GetCustom('RU_SL_PP')] уничтожена"
 dubois.1211.d: "Поскольку мы не смогли защитить [Concept('concept_dubois_habitat', 'среду обитания животных')] в [ROOT.GetState.GetCustom('RU_SL_PP')], основав [Concept('concept_dubois_nature_reserve', 'заповедник')], среда обитания теперь уничтожена."
 dubois.1211.f: "К сожалению, создание горнодобывающей компании обошлось ценой уничтожения среды обитания одного из видов животных нашей страны. Но кого это волнует? Нас ждёт прибыль!"
 dubois.1211.g: "О нет. Ну и ладно."
 dubois_breeding_animal_trigger_tt: "Вы можете разводить [Concept('concept_dubois_zoo_animal', 'экзотических животных')], если у вас есть область с [Concept('concept_dubois_nature_reserve', 'заповедником')], в которой ещё нет конкретного животного из того же региона, что и сам #Nature Reserve#!, и если это животное есть в вашем [Concept('concept_dubois_zoo', 'зоопарке')].\n\nНапример, если у вас есть #b заповедник#! в европейской области и вы хотите разводить в нём #b альпийского козла#!, вы можете сделать это только в том случае, если в этой области ещё нет [Concept('concept_dubois_habitat', 'среды обитания')] козлов и если в вашем #b зоопарке#! есть #b альпийские козлы#!."
