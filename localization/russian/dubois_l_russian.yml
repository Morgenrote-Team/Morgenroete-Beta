 dubois.1101.no_more_babies: "Я не хочу больше слышать о животных из зоопарка!"
 dubois_no_more_baby_animals_tt: "Вы #n больше не будете получать события о детёнышах животных. Отменить это решение будет нельзя.#!"
 dubois_lion_baby: "#b Львята#!"
 dubois_otter_baby: "#b Выдрята#!"
 dubois_jaguar_baby: "#b Детёныши ягуара#!"
 dubois_koala_baby: "#b Детёныши коалы#!"
 dubois_panda_baby: "#b Детёныши панды#!"
 dubois_lion_baby_birth_flavor: "Два маленьких львёнка ползали вокруг своей матери. Они родились всего несколько недель назад, но мать довольно долго держала их в укрытии. Теперь они наконец смогли увидеть мир, играть и резвиться. Они были очаровательны!"
 dubois_otter_baby_birth_flavor: "Крошечный выдра впервые вошёл в воду, чтобы поплавать. Для первого раза выглядело неплохо. Затем маленький зверёк вышел из воды и лёг на тёплый камень."
 dubois_jaguar_baby_birth_flavor: "Маленький ягуар, которому было всего около 6 недель, следовал за своей матерью. Он выглядел довольно неуклюжим. Но скоро он вырастет в опасного хищника."
 dubois_koala_baby_birth_flavor: "Маленькая коала держалась за спину своей матери. Она была уже довольно взрослой, но всё ещё зависела от матери. Внезапно она схватила лист с одного из деревьев и начала его грызть."
 dubois_panda_baby_birth_flavor: "Маленькая панда выглядела такой невинной. Она каталась по земле и казалась довольно неуклюжей. Но её мать не спускала с неё глаз. С крохой ничего не могло случиться."
 dubois.1250.t: "Национальный парк Йосемити?"
 dubois.1250.d: "Влиятельные защитники природы хотят создать в долине Йосемити национальный парк для защиты её уникального ландшафта. Эта долина — уникальное место с захватывающими дух видами. Вопрос в том, что мы предпочитаем: заповедник или использование долины для сельского хозяйства, лесозаготовок и добычи полезных ископаемых?"
 dubois.1250.f: "«Но ни один храм, сотворённый руками, не сравнится с Йосемити. Кажется, что каждая скала в его стенах светится жизнью».\n - Джон Мьюр"
 dubois.1250.g: "Это отличная идея!"
 dubois.1250.h: "Вообще-то, это место отлично подходит для добычи ископаемых!"
 dubois.1251.t: "Последние зубры"
 dubois.1251.d: "Зубр, европейский бизон, почти вымер. Лишь несколько животных осталось в Беловежской пуще. До 1830 года лес охранялся, но после Ноябрьского восстания почти все должности лесничих были упразднены. Визит [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] может привести к восстановлению в лесу [concept_dubois_nature_reserve, 'заповедника']."
 dubois.1251.f: "«Беловежская пуща — последний первобытный лес Европы, где обитают последние зубры. Это чудо природы!»\n«Но эти деревья можно срубить и поднять нашу экономику!»"
 dubois.1251.g: "Мы должны защитить зубра!"
 dubois.1251.h: "Этот лес идеально подходит для лесозаготовок."
 dubois.1252.t: "Королевский охотничий заказник в Гран-Парадизо?"
 dubois.1252.d: "Охота в Гран-Парадизо прекрасна! Особенно потому, что это последнее место, где обитает #b альпийский козёл#!. После охоты там [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'задумалась', 'задумался')] о создании [Concept('concept_dubois_nature_reserve','королевского охотничьего заказника')], чтобы защитить последних козлов."
 dubois.1252.f: "«Как смеют эти простолюдины убивать моих козлов? Только мне дозволено охотиться на них! Мы должны защитить мою дичь от этих дикарей!»\n\n#b Историческая справка: #! Национальный парк Гран-Парадизо был основан в 1922 году, когда Виктор Эммануил III пожертвовал земли Королевского охотничьего заказника для создания первого национального парка Италии. Защита альпийского козла по-прежнему оставалась одной из важнейших задач парка. В 1922 году в парке насчитывалось около 3000 козлов. Это число резко сократилось во время правления фашистов и Второй мировой войны, но позже популяция восстановилась, и сегодня в национальном парке насчитывается около 4000 козлов."
 dubois.1252.g: "Немедленно основать Королевский охотничий заказник!"
 dubois.1252.h: "Может быть, позже..."
