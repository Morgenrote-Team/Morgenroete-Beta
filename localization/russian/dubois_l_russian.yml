 dubois.35.t: "Животное убегает!"
 dubois.35.d: "Когда команда сафари пытается преследовать животное, оно внезапно убегает — профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] рискует, что [SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'её', 'его')] помощников стряхнут с хвоста!"
 dubois.35.f: "«Мы всё ещё далеки от того, чтобы познать жизнь животных, и мы всё ещё изучаем животных с намерением познать себя».\n —Альфред Эдмунд Брем"
 dubois.35.g: "Мы ничего не можем поделать..."
 dubois.36.t: "Животное нападает!"
 dubois.36.d: "Когда команда сафари хотела установить ловушки, они вспугнули животное, которое затем перешло в атаку!"
 dubois.36.f: "«Неверно говорить, что слон — раздражительное животное. Его природа мягка и спокойна. Он живёт в дружбе и мире со всяким созданием».\n —Альфред Эдмунд Брем"
 dubois.36.g: "Бегите, глупцы!"
 dubois.36.h: "Всё равно расставить ловушки!"
 dubois.36.i: "Наш натуралист всё держит под контролем."
 dubois.37.t: "Несчастный случай на сафари"
 dubois.37.d: "Из-за неосторожности команда сафари связалась не с тем животным. Оно разбило все ловушки, ранило помощников, а затем убежало. Недели работы были уничтожены за несколько часов. Из-за этого профессору [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] пришлось отменить сафари."
 dubois.37.f: "«Если я когда-либо видел магию, то это было в Африке».\n —Эрнест Хемингуэй"
 dubois.37.g: "Ужасно!"
 dubois.36.success_tt: "Команда сафари всё равно успешно устанавливает свои ловушки."
 dubois.36.fail_tt: "Серьёзный несчастный случай приводит к преждевременной отмене сафари."
 dubois_safari_zoologist_tt: "Это возможно, потому что у нашего натуралиста есть черта «Зоолог»."
 dubois.38.t: "Дополнения к сафари"
 dubois.38.d: "Технический прогресс также революционизирует сафари, будь то в виде нового оружия или транспортных средств."
 dubois.38.f: "«Я не знал ни одного утра в Африке, проснувшись в которое я не был бы счастлив».\n —Эрнест Хемингуэй"
 dubois.38.machine_guns_tt: "С изобретением пулемёта наша команда значительно превосходит как человеческие, так и животные угрозы."
 dubois.38.combustion_engine_tt: "С изобретением двигателя внутреннего сгорания мы можем легко догнать любое животное."
 dubois.38.g: "Это придаёт «Хейа сафари!» совершенно новый смысл."
 dubois.40.d: "В конце безуспешных поисков, которые не принесли ничего, кроме трудностей, профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] сдаётся и возвращается в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] со своей командой."
