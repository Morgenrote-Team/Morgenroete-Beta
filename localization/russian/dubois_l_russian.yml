 dubois.158.d: "Наш зоопарк пополнился новым экзотическим животным: сегодня в свой новый вольер переехал долгожданный #O тилацин#!."
 dubois.158.f: "Тилацин, также известный как тасманийский тигр, был хищным сумчатым, родом из Тасмании и Австралии. У него была характерная полосатая спина, и он вёл преимущественно ночной образ жизни. Тилацины были одиночными охотниками, полагавшимися на скрытность для поимки добычи, такой как мелкие млекопитающие и птицы. К сожалению, из-за охоты и потери среды обитания тилацин в настоящее время считается вымершим."
 dubois.158.g: "Как мило!"
