 dubois.1020.t: "Вольер с гориллами"
 dubois.1020.d: "Вольер для горилл отличался пышной растительностью и большими конструкциями для лазания. Вы сразу же заметили несколько этих впечатляющих приматов, грациозно передвигавшихся сквозь густую листву: одни карабкались по канатам, другие отдыхали в тени. Их мощное телосложение и спокойное поведение делали их захватывающим зрелищем."
 dubois.1020.f1: "В зелёном вольере для горилл доминантный самец с серебристой спиной величественно сидит на большом камне, наблюдая за своей группой бдительным оком. Его спокойное и властное присутствие немедленно привлекает внимание посетителей. Заинтересовавшись социальной структурой, вы подходите к смотрителю за дополнительной информацией.\n«Гориллы — высокосоциальные животные», — объясняет смотритель. «Самец с серебристой спиной, как лидер группы, играет решающую роль в поддержании порядка и защите группы. У каждого члена группы есть свои роли, и в обязанности самца входит принятие решений о передвижениях и реагирование на угрозы. Сплочённость группы и лидерство самца необходимы для их благополучия»."
 dubois.1020.f2: "В среде обитания горилл молодая горилла энергично карабкается и качается на канатах и ветвях, в то время как старшие члены группы наблюдают снизу. Игривое поведение молодой гориллы очаровывает зрителей. Заинтересовавшись этим занятием, вы спрашиваете смотрителя.\n«Молодые гориллы невероятно активны и игривы», — делится смотритель. «Лазание и качание помогают им развивать физические навыки, необходимые в дальнейшей жизни. Эти занятия также обеспечивают умственную стимуляцию и социальное сближение с другими членами группы. Игра является жизненно важной частью их развития, помогая им расти сильными и социально адаптированными»."
 dubois.1020.f3: "В вольере для горилл группа собралась вокруг большой кучи фруктов и овощей, ест и делится друг с другом. Гармоничное и кооперативное поведение при кормлении fascin... увлекательно наблюдать. Желая узнать больше об этом социальном взаимодействии, вы подходите к смотрителю.\n«Гориллы известны своим мирным и кооперативным поведением при кормлении», — объясняет смотритель. «Они часто едят вместе и делятся едой внутри группы, что укрепляет социальные связи и гарантирует, что все получат достаточно еды. Это общинное поведение является ключевым аспектом их социальной структуры, способствуя гармонии и снижая конкуренцию между членами»."
