 je_dubois_paleontological_excavation_yearly_fossils_paleontologist_experience_100_loc: "\n#default_text #p 2#! [Concept('concept_dubois_fossil','окаменелости')] за [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолога#!#!')] на раскопках с #V 100 и более [Concept('concept_academics_experience', 'опыта')]#! (до 4 в зависимости от опыта).#!"
