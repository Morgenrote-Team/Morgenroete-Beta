 dubois.1069.t: "Вольер с капибарами"
 dubois.1069.d: "Вольер для капибар представлял собой пышную, травянистую территорию вокруг большого пруда. Вы сразу же заметили несколько этих крупных, нежных грызунов, отдыхавших у кромки воды, в то время как другие неторопливо бродили по мелководью. Их расслабленное поведение и тесная групповая жизнь немедленно привлекли внимание посетителей."
 dubois.1069.f1: "В залитом солнцем вольере для капибар небольшая группа этих крупных грызунов отдыхает у кромки воды, некоторые лениво жуют траву, другие отдыхают в тени. Их спокойное, социальное поведение сразу же привлекает внимание посетителей. Заинтересовавшись их образом жизни, вы подходите к смотрителю за дополнительной информацией.\n«Капибары — невероятно социальные животные», — объясняет смотритель. «Они живут группами, иногда до 20 и более особей, и редко встречаются в одиночку. Их крепкие социальные связи — ключ к их выживанию, обеспечивающий защиту от хищников и помогающий поддерживать тесную семейную структуру. Они общаются с помощью различных звуков, включая мурлыканье и свист, чтобы оставаться на связи друг с другом»."
 dubois.1069.f2: "В оживлённой среде обитания капибар одна особенно предприимчивая капибара заходит в пруд, погружаясь по самый нос, в то время как другие следуют за ней, игриво плескаясь в воде. Вид этих крупных грызунов, наслаждающихся плаванием, очаровывает зрителей. Заинтригованные этим поведением, вы спрашиваете смотрителя о подробностях.\n«Капибары — полуводные животные и отличные пловцы», — делится смотритель. «Они проводят много времени в воде, что помогает им регулировать температуру тела и спасаться от хищников. Они могут даже спать в воде, высунув над поверхностью только носы. Эта любовь к воде — жизненно важная часть их естественного поведения, и именно там они чувствуют себя как дома»."
 dubois.1069.f3: "Наблюдая за группой капибар в их вольере, внезапное оживление привлекает ваше внимание. Одна из молодых капибар нашла особенно вкусный участок травы и с восторгом жуёт её, побуждая остальных собраться вокруг и присоединиться. Совместное кормление трогательно наблюдать, и вы решаете узнать больше, поговорив со смотрителем.\n«Капибары — травоядные и проводят много времени, пасясь вместе», — объясняет смотритель. «Их рацион состоит в основном из трав и водных растений, которыми они охотно делятся друг с другом. У них уникальная пищеварительная система, которая позволяет им извлекать максимум питательных веществ из их волокнистой диеты, часто повторно переваривая пищу, чтобы убедиться, что они получают все необходимые питательные вещества. Их групповые привычки кормления укрепляют их крепкие социальные связи и помогают поддерживать гармонию в группе»."
