 dubois.2171.h: "Плезиозавр."
 dubois.2171.i: "Базилозавр."
 dubois.2171.j: "Мегалодон."
 dubois.2173.t: "Плезиозавр"
 dubois.2173.f: "Плезиозавр — отряд морских рептилий. Их окаменелости можно найти по всему миру. В зависимости от вида, животные были длиной от 1,5 до 15 метров. Вероятно, они питались разными животными в зависимости от вида. От улиток и мидий до рыб и другой добычи.\nИх U-образные челюсти и острые зубы, напоминающие рыбью ловушку, служили им полезным инструментом."
 dubois.2174.t: "Базилозавр"
 dubois.2174.f: "Базилозавр — не динозавр, а доисторическая форма кита. Его длинное тело напоминает длинную змею, но с длиной до 20 метров он сравним по длине с кашалотом."
 dubois.2175.t: "Мегалодон"
 dubois.2175.f: "Гигантская акула мегалодон, вероятно, самая большая акула, когда-либо существовавшая. Однако оценить её длину сложно, так как в настоящее время найдены только зубы и позвонки. Наши палеонтологи оценивают её длину где-то между 9 и 30 метрами. В любом случае, скелет акулы захватывает дух и является одной из жемчужин нашей коллекции."
