 alert_dubois_paleontologist_unused_alert_hint: "Ваш [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолог#!#!')] сейчас бездействует и мог бы чем-нибудь заняться. Подумайте о том, чтобы получить доступ к [Concept('concept_dubois_formation', 'формации')] с помощью [Concept('concept_dubois_paleontological_licence', 'палеонтологической лицензии')], если у вас нет своей, или поручить ему другую задачу. Вы можете отправить его на задание в Академическом обзоре в #V окне Morgenröte#!."
 dubois.39.d: "После недель неудачных попыток и бесконечных усилий долгожданное животное наконец-то было поймано. Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] вне себя от радости. Герои возвращаются домой с добытым животным. Конечно, в прекрасном Национальном зоопарке [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] ему будет счастливее, чем в этой неуютной природе!"
