 dubois.10.t: "Роспуск зоопарка"
 dubois.10.d: "Правительство не заинтересовано в дальнейшем содержании [Concept('concept_dubois_zoo', 'зоопарка')] в [SCOPE.sState('dubois_zoo_state').GetCustom('RU_SL_PP')]. Он должен быть распущен, а животные проданы."
 dubois.10.f: "Страна может содержать только один зоопарк в столице. Количество денег и образцов, которые страна получит взамен, зависит от размера зоопарка."
 dubois.10.g: "Но... но все эти чудесные животные!"
 alert_dubois_zoo_extension_possible_alert_hint: "Вы можете расширить свой [Concept('concept_dubois_zoo', 'зоопарк')]. Для этого откройте Академический обзор в #V окне Morgenröte#!."
 alert_dubois_mountain_expedition_possible_alert_hint: "Наша страна может отправить горную экспедицию. Для этого откройте Спортивный обзор в #V окне Morgenröte#!."
 alert_dubois_naturalist_unused_alert_hint: "Ваш [Concept('concept_dubois_naturalist', '#b #GREEN натуралист#!#!')] сейчас бездействует и мог бы чем-нибудь заняться. Вы можете отправить его на задание в Академическом обзоре в #V окне Morgenröte#!."
 alert_dubois_hippocampus_congress_alert_hint: "Вы можете провести конгресс о гиппокампе. Для его организации воспользуйтесь кнопкой в Академическом обзоре в #V окне Morgenröte#!."
 alert_dubois_paleontological_collection_alert_hint: "Вы можете создать коллекцию окаменелостей для своего [Concept('concept_dubois_zoo', 'зоопарка')]. Для этого воспользуйтесь кнопкой в обзоре Палеонтолога в #V окне Morgenröte#!."
