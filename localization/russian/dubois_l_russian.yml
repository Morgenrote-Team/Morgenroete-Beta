 dubois.7.t: "Берёзовая пяденица эволюционирует!"
 dubois.7.d: "Доктор [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] заметил[SelectLocalization(ROOT.Var('dubois_naturalist_var').GetCharacter.IsFemale, 'а', '')], что за последние годы внешний вид берёзовой пяденицы изменился, что является явным доказательством теории эволюции."
 dubois.7.f: "«По мере того как берёзы, на которых обитает пяденица, становятся всё темнее из-за загрязнения, мы видим, что число тёмных мотыльков явно возросло. Поскольку хищники съедают больше белых мотыльков, так как они гораздо заметнее, тёмные мотыльки начинают преобладать.\nЭто явное доказательство эволюции за короткий промежуток времени. Мои наблюдения fascin... увлекательны и доказывают, что теория эволюции абсолютно верна».\n\n#b Историческая справка:#! эволюционное изменение окраски берёзовой пяденицы было замечено ещё в 1848 году в Манчестере. Лишь в 1896 году Дж. У. Татт показал, что это был случай естественного отбора.\nВ наши дни белый фенотип берёзовой пяденицы снова доминирует, так как воздух стал чище, и большинство берёз снова белые."
 dubois.7.g: "Явное доказательство эволюции!"
