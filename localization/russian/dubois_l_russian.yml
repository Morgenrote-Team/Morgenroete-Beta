 dubois.443.f: "Люди ждали час, пока академик, остановившийся где-то на склоне, внезапно не достал свои инструменты. Сначала покачав головами, они решили совместить неприятное с полезным и перенесли обед, чтобы не терять времени зря. Однако доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] не собирался ни есть, ни приходить. Когда руководитель пригрозил продолжить экспедицию без геолога, [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'она', 'он')] внезапно присоединил[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'ась', 'ся')] к группе — со сверкающим камнем в руке, красота которого впечатлила всех [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'её', 'его')] коллег."
 ZOO_ANIMALS_VAR_TT: "#header [Concept('concept_dubois_zoo_animal','Животные зоопарка')]#!\n[Concept('concept_dubois_zoo_animal','Животные')], которые уже пойманы (цветные) [GetPlayer.GetAltNameNoFlag('RU_CL_TP')] или могут быть пойманы (чёрно-белые):\n#yellow Африка#!:\n[GetPlayer.GetCustom('dubois_has_hippopotamus_type')][GetPlayer.GetCustom('dubois_has_lion_type')][GetPlayer.GetCustom('dubois_has_elephant_type')][GetPlayer.GetCustom('dubois_has_giraffe_type')][GetPlayer.GetCustom('dubois_has_penguin_type')][GetPlayer.GetCustom('dubois_has_mole_type')][GetPlayer.GetCustom('dubois_has_zebra_type')][GetPlayer.GetCustom('dubois_has_meerkat_type')][GetPlayer.GetCustom('dubois_has_zebra_type')][GetPlayer.GetCustom('dubois_has_gorilla_type')]\n#yellow Азия#!:\n[GetPlayer.GetCustom('dubois_has_panda_type')][GetPlayer.GetCustom('dubois_has_orangutan_type')][GetPlayer.GetCustom('dubois_has_tiger_type')][GetPlayer.GetCustom('dubois_has_tapir_type')][GetPlayer.GetCustom('dubois_has_dragon_type')][GetPlayer.GetCustom('dubois_has_leopard_type')][GetPlayer.GetCustom('dubois_has_cheetah_type')][GetPlayer.GetCustom('dubois_has_pallas_type')][GetPlayer.GetCustom('dubois_has_red_type')]\n#yellow Австралия и Океания#!:\n[GetPlayer.GetCustom('dubois_has_turtle_type')][GetPlayer.GetCustom('dubois_has_manta_type')][GetPlayer.GetCustom('dubois_has_kangaroo_type')][GetPlayer.GetCustom('dubois_has_koala_type')][GetPlayer.GetCustom('dubois_has_platypus_type')][GetPlayer.GetCustom('dubois_has_cassowary_type')][GetPlayer.GetCustom('dubois_has_sealion_type')][GetPlayer.GetCustom('dubois_has_thylacine_type')]\n#yellow Европа#!:\n[GetPlayer.GetCustom('dubois_has_lynx_type')][GetPlayer.GetCustom('dubois_has_wolf_type')][GetPlayer.GetCustom('dubois_has_badger_type')][GetPlayer.GetCustom('dubois_has_stoat_type')][GetPlayer.GetCustom('dubois_has_otter_type')][GetPlayer.GetCustom('dubois_has_ibex_type')][GetPlayer.GetCustom('dubois_has_wisent_type')][GetPlayer.GetCustom('dubois_has_elk_type')]\n#yel