 dubois_nature_protection_tech: "Охрана природы"
 dubois_nature_protection_tech_desc: "Охрана природы началась с необходимости защиты лесов. Позже под охрану были взяты и исчезающие виды животных, и целые территории. В XIX и XX веках было несколько успешных природоохранных проектов, таких как реинтродукция альпийского козла в Швейцарских Альпах."
