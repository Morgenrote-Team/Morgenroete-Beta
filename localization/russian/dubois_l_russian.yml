 dubois.1041.t: "Европейские вольеры"
 dubois.1041.d: "В Европейском секторе преобладала большая лесная зона, но были и другие вольеры. Некоторые посетители ели и пили в ресторане, расположенном в традиционном европейском фахверковом доме."
 dubois.1041.g: "Посетить #o иберийскую рысь#!"
 visit_lynx_tt: "Вы посетите вольер с #o иберийской рысью#!."
