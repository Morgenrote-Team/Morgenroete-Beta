 dubois.149.t: "Манул"
 dubois.149.d: "Наш зоопарк пополнился новым экзотическим животным: сегодня в свой новый вольер переехал долгожданный #O манул#!."
 dubois.149.f: "Манул — небольшая дикая кошка, обитающая на лугах и в горных районах Центральной Азии. Известный своей густой, пушистой шерстью и коренастым телосложением, он хорошо приспособлен к холодной среде. Манулы — одиночные и скрытные животные, часто прячущиеся в расщелинах скал или норах, чтобы избежать хищников. Они в основном охотятся на мелких млекопитающих, таких как грызуны и птицы, используя своё острое зрение и скрытность."
 dubois.149.g: "Прекрасно!"
