 dubois.2001.t: "Палеонтологическая коллекция"
 dubois.2001.d: "Добро пожаловать в Палеонтологическую коллекцию."
 dubois.2001.f_paleontologist: "Нашей коллекцией в настоящее время заведует [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолог#!#!')] [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]. В ней представлены:\n\n#G [ROOT.Var('dubois_fossil').GetValue]#! @dubois_fossil! окаменелостей\n\n#G [ROOT.Var('dubois_special_fossil').GetValue]#! @dubois_special_fossil! особых окаменелостей\n\n#G [ROOT.Var('dubois_human_fossil').GetValue]#! @dubois_human_fossil! человеческих окаменелостей\n\n#G [ROOT.Var('dubois_dinosaur_bone_total').GetValue]#! @dubois_dinosaur_bone! костей динозавров\n\n#G [ROOT.Var('dubois_dinosaur_skeleton').GetValue]#! @dubois_dinosaur_skeleton! скелетов динозавров\n\nНаш #T рейтинг динозавров#!, отражающий качество всех выставленных скелетов, составляет [ROOT.Var('dubois_dinosaur_rating').GetValue]."
 dubois.2001.f_no_paleontologist: "В настоящее время у нашей коллекции #R нет заведующего#!. В ней представлены:\n\n#G [ROOT.Var('dubois_fossil').GetValue]#! @dubois_fossil! окаменелостей\n\n#G [ROOT.Var('dubois_special_fossil').GetValue]#! @dubois_special_fossil! особых окаменелостей\n\n#G [ROOT.Var('dubois_human_fossil').GetValue]#! @dubois_human_fossil! человеческих окаменелостей\n\n#G [ROOT.Var('dubois_dinosaur_bone_total').GetValue]#! @dubois_dinosaur_bone! костей динозавров\n\n#G [ROOT.Var('dubois_dinosaur_skeleton').GetValue]#! @dubois_dinosaur_skeleton! скелетов динозавров\n\nНаш #T рейтинг динозавров#!, отражающий качество всех выставленных скелетов, составляет [ROOT.Var('dubois_dinosaur_rating').GetValue]."
