 dubois.228.t: "Орёл Хааста"
 dubois.228.f: "«Сначала мы нашли огромный коготь и предположили, что это часть динозавра, но затем мы нашли больше костей, и становилось всё более очевидно, что это был орёл. К счастью, сегодня этот орёл вымер, так как, вероятно, мог бы убивать людей»."
 dubois.228.g: "Это пугает!"
