 has_zoo_animal_gila_trigger_tt: "У вас есть #p ядозуб#!."
 dubois_breeding_gila_loc: "#o Ядозуб#!"
 custom_animal_documentation_name_gila_loc: "Ядозуб"
 dubois_documented_animal_gila_loc: "\n- Ядозуб"
 dubois_state_trait_gila_habitat: "Среда обитания: ядозуб"
 dubois.11.gila: "Ядозуб"
 dubois.1041.gila: "Посетить #o ядозуба#!"
 dubois.1302.gila: "Ядозубы"
 dubois.108.t: "Ядозуб"
 dubois.108.d: "Наш зоопарк пополнился новым экзотическим животным: сегодня в свой новый вольер переехал долгожданный #O ядозуб#!."
 dubois.108.f: "Ядозуб — ядовитая ящерица, обитающая на юго-западе США и северо-западе Мексики. Узнаваемый по характерным чёрным и оранжевым отметинам, он является одной из немногих ядовитых ящериц в мире. Ядозубы медлительны и ведут преимущественно ночной образ жизни, питаясь мелкими млекопитающими, птицами и яйцами. Они накапливают жир в хвостах, что позволяет им выживать долгие периоды без еды."
 dubois.108.g: "Не выглядит таким уж опасным..."
 visit_gila_tt: "Вы посетите вольер с #o ядозубом#!."
 dubois_add_zoo_animal_capybara_tt: "Добавить #O капибару#! в [Concept('concept_dubois_zoo', 'зоопарк')]."
 has_zoo_animal_capybara_trigger_tt: "У вас есть #p капибара#!."
 dubois_breeding_capybara_loc: "#o Капибара#!"
 custom_animal_documentation_name_capybara_loc: "Капибара"
 dubois_documented_animal_capybara_loc: "\n- Капибара"
 dubois_state_trait_capybara_habitat: "Среда обитания: капибара"
 dubois.11.capybara: "Капибара"
 dubois.1041.capybara: "Посетить #o капибару#!"
 dubois.1302.capybara: "Капибары"
 dubois.118.t: "Капибара"
 dubois.118.d: "Наш зоопарк пополнился новым экзотическим животным: сегодня в свой новый вольер переехала долгожданная #O капибара#!."
 dubois.118.f: "Капибара, крупнейший в мире грызун, родом из Южной Америки. С её перепончатыми лапами и полуводным образом жизни она процветает на водно-болотных угодьях и вдоль берегов рек. Капибары — очень социальные животные, часто живущие группами от 10 до 20 особей. Они питаются в основном травами и водными растениями и известны своим нежным и послушным нравом. Несмотря на свои размеры, они отличные пловцы и могут оставаться под водой, чтобы избежать хищников."
 dubois.118.g: "Это же огромная морская свинка!"
 visit_capybara_tt: "Вы посетите вольер с #o капибарой#!."
