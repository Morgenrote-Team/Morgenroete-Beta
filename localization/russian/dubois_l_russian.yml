 dubois_remount_basilosaurus_modifier: "Пересборка базилозавра"
 dubois_remount_megalodon_modifier: "Пересборка мегалодона"
 dubois_paleontological_research_modifier_desc: "Земля полнится трепетом открытий. Каждое найденное ископаемое — это окно в исчезнувший мир, а каждые раскопки будоражат воображение учёных и публики. Погоня за древней жизнью стала национальным увлечением, подпитывающим как научные амбиции, так и народное любопытство."
 dubois_paleontologist_travell_to_location_modifier_desc: "С блокнотами в руках и мечтами о доисторических гигантах наш палеонтолог отправляется в путь по пересечённой местности, бросая вызов стихиям в поисках тайн, запертых в камне. Это путешествие — в равной степени приключение и наука, гонка со временем, чтобы раскрыть реликвии далёкого прошлого Земли."
 dubois_paleontologist_travell_from_location_modifier_desc: "После месяцев в полевых условиях палеонтолог возвращается, уставший, но торжествующий. Сумки набиты ископаемыми, эскизами и историями открытий. Каждая находка обещает переписать учебники истории и вдохновить новое поколение."
 notification_dubois_paleontological_report_notification_tooltip: "Прибыл палеонтологический отчёт из экспедиции профессора Дюбуа, содержащий примечательные находки окаменелостей."
 notification_dubois_java_man_notification_tooltip: "Новый палеоантропологический отчёт профессора Дюбуа предполагает открытие древнего предка человека, условно названного «питекантроп»."
 notification_dubois_animal_breeding_notification_tooltip: "Один из наших экземпляров успешно дал потомство в неволе. Это знаменует собой прорыв в нашем понимании вида."
 ask_for_zoo_animal_proposal_third_party_accepted_name: "Запрос принят третьей стороной"
 ask_for_zoo_animal_proposal_third_party_accepted_desc: "Третья сторона согласилась предоставить нам образец животного для зоопарка. Экспедиция будет проходить под их защитой."
 ask_for_zoo_animal_proposal_third_party_declined_name: "Запрос отклонён третьей стороной"
 ask_for_zoo_animal_proposal_third_party_declined_desc: "Третья сторона отказалась предоставить животное для зоопарка или разрешить его отлов. Возможно, придётся пересмотреть дипломатические каналы."
