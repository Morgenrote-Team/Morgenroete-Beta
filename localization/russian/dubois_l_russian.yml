 dubois.231.t: "Соперник уничтожил место раскопок"
 dubois.231.d: "Доктор [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] напал[SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'а', '')] на след многообещающего месторождения. Однако, прибыв на место, [SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'она обнаружила', 'он обнаружил')], что соперник уже выкопал много костей, а затем взорвал участок."
 dubois.231.f: "Если эти кости не достанутся мне, они не достанутся никому!"
 dubois.231.g: "Зачем они это сделали!"
 dubois.232.t: "Местные жители делятся информацией"
 dubois.232.d: "Жители небольшой деревни нашли поблизости различные окаменелости. Они с радостью поделились ими, и теперь доктор [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] стал[SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'а', '')] на шаг ближе к открытию нового места раскопок!"
 dubois.232.f: "Так вот, мой прапрадед однажды нашёл рог единорога. Знаю, о чём вы думаете, но я считаю, что это была кость динозавра! К сожалению, он её продал. Но он рассказал мне, где нашёл её. Это было в русле реки. Уверен, вы найдёте там кости!"
 dubois.232.g: "Спасибо!"
 dubois.233.t: "Местный палеонтолог делится исследованиями"
 dubois.233.d: "Житель небольшой деревни, [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName], оказался палеонтологом-любителем. Поскольку он уже слишком стар, чтобы самостоятельно вести раскопки, он поделился всеми своими знаниями, которые получил[SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'а', '')] доктор [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]."
 dubois.233.f: "Я начал собирать окаменелости, когда был ребёнком, и никогда не прекращал. Но теперь я слишком стар, чтобы стоять на коленях и копать самому. Так что я надеюсь, что смогу хотя бы помочь вам найти кости динозавров и окаменелости. И если вы что-нибудь найдёте, пожалуйста, дайте мне взглянуть!"
 dubois.233.g: "Это поразительная коллекция!"
 dubois.234.t: "Оползень похоронил многообещающее место"
 dubois.234.d: "Всего через день после того, как доктор [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] и [SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'её', 'его')] команда обнаружили многообещающее место, его накрыл мощный оползень. Потребуются месяцы или даже годы, чтобы раскопать то, что скрыто под всей этой грязью."
 dubois.234.f: "Сначала было слишком жарко для раскопок, потом слишком сыро, а теперь слишком грязно? Может, вы просто не любите копать!"
 dubois.234.g: "Чёртова погода!"
 dubois.235.t: "Новая зацепка"
 dubois.235.d: "Упорная работа, которую проделал[SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'а', '')] доктор [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName], похоже, наконец-то окупается. Собрав отчёты о породах и формациях, [SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'она', 'он')] наметил[SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'а', '')] несколько многообещающих мест. Надеюсь, в одном из них [SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'она', 'он')] найдёт кости динозавра."
 dubois.235.f: "Видите ли, эти отложения часто содержат кости динозавров. В этих местах они выходят на поверхность, так что мы обязательно найдём кости в одном из них! Надеюсь. Может быть."
 dubois.235.g: "Хорошая работа!"
