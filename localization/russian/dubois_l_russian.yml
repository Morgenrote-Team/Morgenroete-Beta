 dubois.2021.t: "Особые окаменелости"
 dubois.2021.d: "В этой коллекции хранятся одни из самых необычных окаменелостей, найденных на сегодняшний день."
 dubois.2021_amber: "#T Янтарь#!\nСмола сохранила насекомое, которому миллионы лет.\n\n"
 dubois.2021_ammonite: "#T Аммонит#!\nДесятки тысяч видов аммонитов населяли моря на протяжении 350 миллионов лет.\n\n"
 dubois.2021_archaeopteryx: "#T Археоптерикс#!\nНекоторые исследователи считают эту «первоптицу» возможным связующим звеном между рептилиями и птицами.\n\n"
 dubois.2021_composita: "#T Композита#!\nКомпозиты были широко распространённым видом, жившим с позднего девона до поздней перми.\n\n"
 dubois.2021_eusthenopteron: "#T Эвстеноптерон#!\nЭта рыба, возможно, выжила в высохшем русле реки и считается важным шагом на пути к земноводным.\n\n"
 dubois.2021_ichthyosaurus: "#T Ихтиозавр#!\nЭта рептилия не только очень походила на дельфина, но и была живородящей.\n\n"
 dubois.2021_ichthyostega: "#T Ихтиостега#!\nВозможное недостающее звено между рыбами и четвероногими.\n\n"
 dubois.2021_megatherium: "#T Мегатерий#!\nГигантский наземный ленивец. К сожалению, тоже вымерший вид.\n\n"
 dubois.2021_pterodactylus: "#T Птеродактиль#!\nНебольшой короткохвостый птерозавр, который, вероятно, обитал на побережьях.\n\n"
 dubois.2021_smilodon: "#T Смилодон#!\nОдин из самых известных саблезубых хищников.\n\n"
 dubois.2021_trilobite: "#T Трилобит#!\nМногочисленные находки и стратификация этих членистоногих делают их важными руководящими ископаемыми для палеозоя."
 dubois.2041.t: "Кости динозавров"
 dubois.2041.d: "Здесь из окаменелостей можно реконструировать кости динозавров, а из костей динозавров — собрать скелеты."
 dubois.2041.f: "Из пяти костей динозавра из одного континентального региона [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолог#!#!')] может реконструировать полный скелет. Опытный палеонтолог также может попытаться реконструировать кость динозавра из 20 фрагментов окаменелостей. Реконструкция кости динозавра возможна только при наличии хотя бы одной кости для ориентира. Для выполнения любого из этих действий палеонтолог не должен быть истощён или занят. Успех во многом зависит от его палеонтологического опыта.\n\n#G [ROOT.Var('dubois_north_american_dinosaur_bone').GetValue]#! североамериканских костей динозавров\n#G [ROOT.Var('dubois_south_american_dinosaur_bone').GetValue]#! южноамериканских костей динозавров\n#G [ROOT.Var('dubois_european_dinosaur_bone').GetValue]#! европейских костей динозавров\n#G [ROOT.Var('dubois_african_dinosaur_bone').GetValue]#! африканских костей динозавров\n#G [ROOT.Var('dubois_asian_dinosaur_bone').GetValue]#! азиатских костей динозавров\n#G [ROOT.Var('dubois_australian_dinosaur_bone').GetValue]#! австралийских костей динозавров"
 dubois.2041.g: "Реконструировать кость динозавра из окаменелостей."
 dubois.2042.t: "Кость динозавра реконструирована"
 dubois.2042.d: "Профессор [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] добился полного успеха: с помощью своих научных знаний [SelectLocalization(ROOT.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'она', 'он')] смог[SelectLocalization(ROOT.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'ла', '')] реконструировать кость динозавра из фрагментов окаменелостей."
 dubois.2042.f: "Это была увлекательная головоломка, но она не составила проблемы для превосходных навыков нашего [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолога#!#!')]. После нескольких месяцев изучения и сложной комбинаторики ему удалось реконструировать части кости из останков размером со спичку и, таким образом, ключевые части вида динозавра, от которого ранее были известны лишь отдельные кости."
 dubois.2042.g: "Великолепно!"
 dubois.2043.t: "Профессор в недоумении"
 dubois.2043.d: "Несмотря на месяцы исследований, профессор [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] не смог[SelectLocalization(ROOT.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'ла', '')] добиться никаких результатов с использованными материалами. Какая жалость к окаменелостям!"
 dubois.2043.f: "Куда же снова делась эта часть? А эта? Но если этот кусок принадлежал этому, то другой уже не подходил. В конце концов, [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолог#!#!')] больше не мог этого выносить. Он всю ночь ломал голову, но ему так и не удалось извлечь из найденных объектов полезные знания о том, как должен был выглядеть скелет динозавра."
 dubois.2043.g: "Профессор зря потратил наши окаменелости!"
 dubois.2044.t: "Идеально собранный скелет"
 dubois.2044.d: "Наш [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолог#!#!')] проделал[SelectLocalization(ROOT.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'а', '')] потрясающую работу по сборке скелета, добавив в коллекцию естественной истории значимый экспонат."
 dubois.2044.f: "Бурные аплодисменты наполнили выставочный зал, когда профессор представил публике новособранный скелет динозавра. При этом он решил несколько проблем, которые занимали экспертов годами, и показал совершенно новый подход к интерпретации костей динозавра. Присутствующие международные палеонтологи стремились поговорить с профессором и хотят собрать похожие находки в своих коллекциях очень схожим образом. Некоторые даже теперь считают, что [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] - гений головоломок, сумевший сразу сделать то, на что у других ушли десятилетия."
 dubois.2044.g: "Отличная работа, профессор [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName]."
 dubois.2045.t: "Неидеально собранный скелет"
 dubois.2045.d: "Профессор [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] сделал[SelectLocalization(ROOT.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'а', '')] всё возможное, но, к сожалению, в собранном скелете динозавра есть несколько ошибок."
 dubois.2045.f: "Когда новый скелет динозавра был представлен в коллекции естественной истории, раздались вежливые, но довольно сдержанные аплодисменты. Хотя ведущий палеонтолог страны приложил все усилия, коллеги-профессионалы смогли в день презентации обнаружить несколько недостатков, которые омрачили выступление. Тем не менее, скелет, по крайней мере в общих чертах, соответствует требованиям и должен обогатить выставку, даже если в ближайшие годы потребуется доработка."
 dubois.2045.g: "Работает ведь, не так ли?"
 dubois.2046.t: "Плохо собранный скелет"
 dubois.2046.d: "Скелет, собранный [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] оставил экспертов... изумлёнными. Хотя и не так, как надеялось Палеонтологическое общество."
 dubois.2046.f: "Это был памятный день, превзойдённый только причудливостью самого события. Профессор [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] с драматическими жестами снял брезент с нового скелета динозавра и ожидал бурных аплодисментов. Но вместо этого: тишина. Затем последовал шёпот. Потом: веселье. Участвовавшие исследователи улыбались, другие сдерживались, пока, наконец, один коллега, полусмеясь, полуневеря, не указал на собранную на скорую руку химеру и не воскликнул: «Это что, трёхглавый динозавр?»"
 dubois.2046.g: "Это, должно быть, шутка!"
 dubois.2051.t: "Скелеты динозавров"
 dubois.2051.d: "Скелеты динозавров — гордость любой коллекции естественной истории. Идеально собранные скелеты положительно влияют на наш рейтинг динозавров."
 dubois.2051.f: "Наша коллекция динозавров состоит из следующих скелетов:\n\n"
 dubois.2051.ankylosaurus: "Анкилозавр"
 dubois.2051.diplodocus: "Диплодок"
 dubois.2051.triceratops: "Трицератопс"
 dubois.2051.tyrannosaurus: "Тираннозавр рекс"
 dubois.2051.stegosaurus: "Стегозавр"
 dubois.2051.antarctosaurus: "Антарктозавр"
 dubois.2051.argyrosaurus: "Аргирозавр"
 dubois.2051.iguanodon: "Игуанодон"
 dubois.2051.plateosaurus: "Платеозавр"
 dubois.2051.giraffatitan: "Жираффатитан"
 dubois.2051.spinosaurus: "Спинозавр"
 dubois.2051.psittacosaurus: "Пситтакозавр"
 dubois.2051.velociraptor: "Велоцираптор"
 dubois.2051.muttaburrasaurus: "Муттабурразавр"
 dubois.2051.rhoetosaurus: "Роэтозавр"
 dubois.2051.g: "Посетить североамериканские скелеты."
 dubois.2051.h: "Посетить южноамериканские скелеты."
 dubois.2051.i: "Посетить европейские скелеты."
 dubois.2051.j: "Посетить африканские скелеты."
 dubois.2051.k: "Посетить азиатские скелеты."
 dubois.2051.l: "Посетить австралийские скелеты."
 dubois.2101.t: "Улучшенный скелет"
 dubois.2101.d: "Усилия наших [Concept('concept_dubois_paleontologist','палеонтологов')] принесли плоды: ранее дефектный скелет был значительно улучшен."
 dubois.2101.f: "Потребовалось время, чтобы обдумать доисторическое животное, его передвижение и экологическую среду, прежде чем профессор [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'пришла', 'пришёл')] к решающей идее, как поставить некоторые кости на их законное место. Таким образом, весь скелет был значительно усовершенствован."
 dubois.2101.g: "Выглядит гораздо лучше!"
 dubois.2102.t: "Скелет без изменений"
 dubois.2102.d: "Несмотря на многочисленные попытки улучшить скелет, наш [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолог#!#!')] не добился успеха."
 dubois.2102.f: "Профессор [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] проявлял[SelectLocalization(ROOT.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'а', '')] большую осторожность в обращении со скелетом. В стремлении не разрушить слишком много и действовать осмотрительно, [SelectLocalization(ROOT.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'она была настолько аккуратна', 'он был настолько аккуратен')], что почти ничего не изменил[SelectLocalization(ROOT.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'а', '')]."
 dubois.2102.g: "Без изменений? За что этому [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтологу#!#!')] вообще платят?"
 dubois.2103.t: "Испорченный скелет"
 dubois.2103.d: "Возможно, было бы лучше, если бы [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] не работал[SelectLocalization(ROOT.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'а', '')] над скелетом динозавра."
 dubois.2103.f: "Для всех участников было крайне удивительно, когда профессор [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] представил[SelectLocalization(ROOT.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'а', '')] «переработанную версию» скелета. Не в последнюю очередь потому, что одно бедро теперь покоилось на одном из плеч, а грозный второй хвост дополнял животное — на лбу."
 dubois.2103.g: "Этот болван сделал только хуже!"
 dubois.2111.t: "Отдел североамериканских динозавров"
 dubois.2111.d: "Какой скелет динозавра посетить?"
 dubois.2111.f: "Североамериканские динозавры — одни из самых известных в своём роде. В конце XIX века в формации Моррисон были найдены многочисленные виды динозавров. Хорошо известные экземпляры — анкилозавр, диплодок, трицератопс и тираннозавр рекс."
 dubois.2111.g: "Анкилозавр."
 dubois.2111.h: "Диплодок."
 dubois.2111.i: "Трицератопс."
 dubois.2111.j: "Тираннозавр рекс."
 dubois.2111.k: "Стегозавр."
 dubois.2112.t: "Анкилозавр"
 dubois.2112.f: "Анкилозавр — примечательный род панцирных динозавров, процветавший в позднемеловой период, примерно 68–66 миллионов лет назад. Принадлежа к группе травоядных динозавров, известных как анкилозавриды, это доисторическое существо славится своими характерными и впечатляющими защитными приспособлениями.\nАнкилозавр, отличавшийся крепким и тяжело бронированным телом, имел широкий, низкопосаженный профиль, украшенный костными пластинами, или остеодермами, встроенными в его кожу, что обеспечивало грозную защиту от потенциальных хищников. Его самой знаковой чертой была хвостовая булава, образованная плотным костным наростом на кончике хвоста, которая, вероятно, служила как для отпугивания нападавших, так и в качестве орудия во внутривидовых боях.\nИмея длину около 6–9 метров, анкилозавр был четвероногим травоядным, использовавшим свой широкий клюв для срывания растительности. Его относительно маленькая голова по сравнению с массивным телом указывает на избирательное питание низкорослыми растениями и кустарниками."
 dubois.2113.t: "Диплодок"
 dubois.2113.f: "Диплодок представляет собой знаковый род колоссальных длинношеих динозавров, процветавших в позднеюрский период, примерно 154–152 миллиона лет назад. Классифицируемый как зауропод, диплодок известен своей поразительно вытянутой шеей и огромными размерами, олицетворяя величие доисторической жизни.\nХарактеризуясь своим особым строением тела, диплодок обладал вытянутой шеей и хвостом, с относительно маленькой головой с колышковидными зубами, подходящими для общипывания растительности. Его впечатляющая длина до 27 метров делала его одним из самых длинных наземных животных, когда-либо существовавших, в то время как его относительно лёгкий скелет и четвероногая поза способствовали эффективному передвижению.\nСчитается, что диплодок был травоядным, использовавшим свою длинную шею, чтобы доставать растительность высоко над землёй, избегая конкуренции с другими травоядными. Ископаемые свидетельства предполагают, что эти динозавры, вероятно, обитали в пышных средах вдоль берегов рек, где было в изобилии доступной растительной пищи."
 dubois.2114.t: "Трицератопс"
 dubois.2114.f: "Трицератопс является знаковым родом рогатых динозавров, процветавших в позднемеловой период, примерно 68–66 миллионов лет назад. Классифицируемый как цератопсид, трицератопс славится своим характерным внешним видом, отмеченным впечатляющим набором лицевых рогов и костяным воротником на затылке.\nОтличаясь грозными защитными чертами, трицератопс имел большое, крепкое тело и массивную голову, украшенную выступающим носовым рогом над мордой и двумя удлинёнными надбровными рогами над глазами. Его воротник, украшенный отверстиями и сложными узорами, вероятно, играл роль в распознавании видов, терморегуляции и, возможно, в демонстрации во время боёв.\nТрицератопс был травоядным четвероногим, обитавшим в разнообразных средах, от лесов до равнин. Его крепкий клюв позволял ему эффективно срывать растительность, а его мощные челюсти могли перемалывать жёсткий растительный материал. Окаменевшие кости трицератопса предполагают, что он мог участвовать в социальном поведении и иерархических взаимодействиях внутри стад."
 dubois.2115.t: "Тираннозавр рекс"
 dubois.2115.f: "Тираннозавр рекс, широко известный как T. rex, — знаковый и колоссальный хищный динозавр, бродивший по Земле в позднемеловой период, примерно 68–66 миллионов лет назад. Принадлежа к группе тероподов, T. rex стоял на вершине доисторической пищевой цепи как один из крупнейших наземных хищников, когда-либо существовавших.\nИзвестный своими характерными чертами, T. rex мог похвастаться внушительным ростом, достигая до 12 метров в длину и стоя около 4,5–6 метров в высоту. Его устрашающий череп, оснащённый зазубренными зубами размером с банан, указывает на плотоядную диету, состоящую в основном из других динозавров. Его мощные задние конечности были приспособлены для быстрого передвижения, в то время как его непропорционально маленькие передние лапы, напоминающие рудиментарные структуры, продолжают вызывать научный интерес.\nПалеонтологические данные предполагают, что T. rex мог быть высшим хищником, использовавшим своё острое обоняние, бинокулярное зрение и грозную силу челюстей, чтобы занять своё место на вершине доисторической экосистемы. Споры о его охотничьем поведении — был ли он активным хищником или падальщиком — остаются предметом текущих исследований и спекуляций."
 dubois.2116.t: "Стегозавр"
 dubois.2116.f: "Стегозавр — знаковый род травоядных динозавров, процветавших в позднеюрский период, примерно 155–150 миллионов лет назад. Классифицируемый как тиреофор, стегозавр славится своим характерным и поразительным внешним видом.\nОтличаясь двойным рядом больших костных пластин вдоль спины и набором грозных шипов, или тагомайзеров, на хвосте, стегозавр был динозавром среднего размера с уникальным профилем. Назначение его пластин — для терморегуляции, демонстрации или защиты — остаётся предметом научных споров.\nИмея длину до 9 метров и относительно маленькую голову, оснащённую клювом и щёчными зубами для переработки растительного материала, стегозавр был специализированным травоядным. Вероятно, он питался низкорослой растительностью в своей юрской среде.\nИскопаемые стегозавра были обнаружены в основном на западе Северной Америки, включая Колорадо и Юту, что даёт ценные сведения об анатомии, поведении и эволюционной истории тиреофорных динозавров. Уникальность стегозавра сделала его популярной и устойчивой фигурой в палеонтологии и массовой культуре."
 dubois.2112.h: "Вернуться в североамериканский отдел."
 dubois.2121.t: "Отдел южноамериканских динозавров"
 dubois.2121.d: "Какой скелет динозавра посетить?"
 dubois.2121.f: "В конце XIX века в патагонских массивах Южной Америки всё чаще стали находить кости динозавров. К самым ранним представителям относятся антарктозавр и аргирозавр."
 dubois.2121.g: "Антарктозавр."
 dubois.2121.h: "Аргирозавр."
 dubois.2122.t: "Антарктозавр"
 dubois.2122.f: "Антарктозавр представляет собой примечательный род зауроподов, обитавших на древнем континенте Гондвана в позднемеловой период, примерно 70–65 миллионов лет назад. Классифицируемый в составе титанозавров, антарктозавр является примером разнообразия форм зауроподов, некогда бродивших по Земле.\nХарактеризуясь своими огромными размерами, антарктозавр был колоссальным четвероногим травоядным, достигавшим в длину до 18 метров и более. Его вытянутая шея и хвост, а также относительно маленькая голова указывают на приспособленность к питанию растительностью высоко над землёй. Этот титанозавр отличается своей крепкой структурой конечностей, которая, вероятно, поддерживала его вес и способствовала передвижению.\nИскопаемые антарктозавра были обнаружены в основном на южных континентах, включая Южную Америку и Антарктиду, где они предоставили ценные сведения об эволюции и распространении зауроподов в позднемеловой период. Эти находки способствуют нашему пониманию уникальных экосистем, существовавших в Гондване в тот период."
 dubois.2123.t: "Аргирозавр"
 dubois.2123.f: "Аргирозавр — значительный род зауроподов, бродивших по древним ландшафтам Южной Америки в позднемеловой период, примерно 90–70 миллионов лет назад. Принадлежа к подгруппе зауроподов, известной как титанозавры, аргирозавр даёт представление о разнообразной доисторической фауне этого региона.\nХотя некоторые аспекты его биологии и поведения остаются предметом предположений, аргирозавр остаётся убедительным объектом палеонтологических исследований, проливая свет на величие и сложность доисторического прошлого Земли в южном полушарии."
 dubois.2122.h: "Вернуться в южноамериканский отдел."
 dubois.2131.t: "Отдел европейских динозавров"
 dubois.2131.d: "Какой скелет динозавра посетить?"
 dubois.2131.f: "С начала XIX века в европейских массивах стали находить новые окаменелости динозавров, не в последнюю очередь в результате возросшей добычи полезных ископаемых. Среди прочих известны игуанодон и платеозавр."
 dubois.2131.g: "Игуанодон."
 dubois.2131.h: "Платеозавр."
 dubois.2132.t: "Игуанодон"
 dubois.2132.f: "Игуанодон является примечательным родом травоядных динозавров, процветавших в раннемеловой период, примерно 140–120 миллионов лет назад. Классифицируемый как игуанодонтид, игуанодон сыграл ключевую роль в формировании нашего понимания анатомии и поведения динозавров.\nОтличаясь своим характерным шипом на большом пальце и клювовидной мордой, игуанодон имел тело среднего размера и ходил как на двух, так и на четырёх ногах, демонстрируя интригующее сочетание двуногого и четвероногого передвижения. Его шип на большом пальце, когда-то считавшийся рогом, теперь, как полагают, использовался для защиты от хищников или для манипуляций с растительностью.\nИгуанодон обитал в разнообразных средах, включая леса и равнины, и был искусным травоядным, использовавшим свой беззубый клюв для срывания растительности. Имея длину до 10 метров, он был заметным травоядным своего времени, влияя на экосистемы, в которых обитал. Ископаемые игуанодона были впервые обнаружены в Европе, в частности в Бельгии и Англии, и его изучение сыграло решающую роль в развитии палеонтологии."
 dubois.2133.t: "Платеозавр"
 dubois.2133.f: "Платеозавр — значительный род травоядных динозавров, процветавших в позднетриасовый период, примерно 214–204 миллиона лет назад. Классифицируемый как прозауропод, платеозавр даёт важные сведения о ранней эволюции динозавров и их приспособлении к различным средам.\nОтличаясь вытянутой шеей, маленькой головой и относительно длинным хвостом, платеозавр демонстрировал двуногое и четвероногое передвижение, отражая переходный этап в эволюции динозавров. Его крепкие конечности и приспособления для переноса веса позволяли ему эффективно добывать растительность и перемещаться по своей среде обитания.\nИмея предполагаемую длину до 9 метров, платеозавр был доминирующим травоядным своего времени, занимая различные ландшафты, от пойм рек до высокогорных лесов. Его широкие листовидные зубы способствовали потреблению растительного материала."
 dubois.2132.h: "Вернуться в европейский отдел."
 dubois.2141.t: "Отдел африканских динозавров"
 dubois.2141.d: "Какой скелет динозавра посетить?"
 dubois.2141.f: "Лишь в начале XX века палеонтология в Африке пережила значительный бум, причём особенно noteworthy были Танзания и Южная Африка, а также Египет. Важными открытиями стали жираффатитан и спинозавр."
 dubois.2141.g: "Жираффатитан."
 dubois.2141.h: "Спинозавр."
 dubois.2142.t: "Жираффатитан"
 dubois.2142.f: "Жираффатитан, ранее известный как брахиозавр, — примечательный род колоссальных длинношеих динозавров, процветавших в позднеюрский период, примерно 154–150 миллионов лет назад. Классифицируемый как зауропод, жираффатитан признан за свои исключительные размеры и уникальные приспособления.\nОтличаясь вытянутой шеей и относительно коротким хвостом, жираффатитан демонстрировал характерную осанку с передними ногами длиннее задних, что позволяло ему доставать растительность высоко над землёй. Имея высоту до 12 метров и длину, превышающую 24 метра, он был одним из самых высоких и длинных наземных животных, когда-либо существовавших.\nЖираффатитан был травоядным, который, вероятно, обитал в пышных средах, таких как речные долины и поймы, где он мог получить доступ к обильной растительной пище. Его большая масса тела поддерживалась крепкими костями конечностей и массивной бочкообразной грудной клеткой. Ископаемые свидетельства жираффатитана были обнаружены в основном в Африке, в частности в современной Танзании и Зимбабве."
 dubois.2143.t: "Спинозавр"
 dubois.2143.f: "Спинозавр — примечательный род хищных динозавров, обитавших в Северной Африке в меловой период, примерно 112–93 миллиона лет назад. Классифицируемый как теропод, спинозавр славится своими характерными чертами и уникальными приспособлениями.\nОтличаясь вытянутой мордой, похожим на парус спинным гребнем и мощными, крокодилоподобными челюстями, спинозавр, как полагают, был полуводным хищником, вероятно, специализировавшимся на охоте на водную добычу, такую как рыба и другие морские животные. Его парус мог играть роль в терморегуляции или распознавании видов.\nИмея предполагаемую длину до 15–18 метров, спинозавр считается одним из крупнейших тероподовых динозавров. Его крепкие конечности и вытянутый череп предполагают приспособления для захвата и потребления водной добычи, подчёркивая его экологическую нишу. Ископаемые останки спинозавра были впервые обнаружены в Египте, а затем в Марокко."
 dubois.2142.h: "Вернуться в африканский отдел."
 dubois.2151.t: "Отдел азиатских динозавров"
 dubois.2151.d: "Какой скелет динозавра посетить?"
 dubois.2151.f: "Первая американская экспедиция в Монголию в первой трети XX века привела к открытию новых видов динозавров в Азии. Пситтакозавр и велоцираптор относятся к числу наиболее давно известных видов."
 dubois.2151.g: "Пситтакозавр."
 dubois.2151.h: "Велоцираптор."
 dubois.2152.t: "Пситтакозавр"
 dubois.2152.f: "Пситтакозавр — примечательный род небольших травоядных динозавров, обитавших в Азии в раннемеловой период, примерно 126–101 миллион лет назад. Классифицируемый как цератопс, пситтакозавр выделяется своими интригующими чертами и вкладом в наше понимание эволюции динозавров.\nОтличаясь своим попугаеподобным клювом, коренастым телом и характерным набором окаймлённых щетиноподобных структур вдоль хвоста и тела, пситтакозавр обладал уникальным внешним видом среди динозавров. Считается, что эти щетинковые наросты поддерживали щетиноподобные структуры, возможно, для демонстрации или терморегуляции.\nИмея длину от 1 до 2 метров, пситтакозавр обитал в различных средах, включая леса и равнины. Его клюв и специализированные зубы предполагают приспособления для переработки разнообразного растительного материала. Ископаемые останки пситтакозавра были обнаружены в основном в Китае и Монголии."
 dubois.2153.t: "Велоцираптор"
 dubois.2153.f: "Велоцираптор — известный род малых и средних хищных динозавров, бродивших по частям Азии в позднемеловой период, около 75–71 миллиона лет назад. Классифицируемый как дромеозаврид-теропод, велоцираптор славится своими замечательными приспособлениями и своей ролью в формировании общественного восприятия динозавров.\nОтличаясь своими острыми, изогнутыми когтями на ногах и хорошо развитыми хищническими чертами, велоцираптор был проворным и умным хищником. Он обладал гладким телом, длинным хвостом и характерным серповидным когтем на каждой ноге, который он, вероятно, использовал для нанесения ударов своей добыче.\nВопреки ранним изображениям, велоцираптор был относительно небольшим, с длиной около 2 метров и весом около 23 килограммов. Его острые чувства, острые зубы и поведение стайной охоты, как предполагается из ископаемых свидетельств и исследований, способствовали его репутации грозного хищника."
 dubois.2152.h: "Вернуться в азиатский отдел."
 dubois.2161.t: "Отдел австралийских динозавров"
 dubois.2161.d: "Какой скелет динозавра посетить?"
 dubois.2161.f: "В 1926 году в Австралии впервые были обнаружены кости динозавров, что послужило началом более интенсивных исследований. Позже известность приобрёл муттабурразавр."
 dubois.2161.g: "Муттабурразавр."
 dubois.2161.h: "Роэтозавр."
 dubois.2162.t: "Муттабурразавр"
 dubois.2162.f: "Муттабурразавр — примечательный род орнитоподовых динозавров, обитавших в Австралии в раннемеловой период, примерно 112–99 миллионов лет назад. Классифицируемый как игуанодонтид, муттабурразавр даёт ценные сведения о доисторической фауне этого региона.\nОтличаясь своим характерным, полым и округлым гребнем на морде, муттабурразавр имел тело умеренного размера, достигавшее в длину около 6–9 метров. Его мощные челюсти были оснащены батареями зубов, подходящих для перемалывания растительного материала, что указывает на травоядную диету.\nНаличие черепного гребня, который мог служить резонирующей камерой для вокализации или демонстрационной структурой, отличает муттабурразавра от других орнитоподов. Его крепкие конечности и относительно большие размеры предполагают приспособления для эффективного передвижения и травоядности."
 dubois.2163.t: "Роэтозавр"
 dubois.2163.f: "Роэтозавр — примечательный род зауроподовых динозавров, обитавших в Австралии в среднеюрский период, примерно 165 миллионов лет назад. Классифицируемый в группе зауроподоморфов, роэтозавр даёт важный взгляд на древнюю историю австралийских динозавров.\nОтличаясь своими огромными размерами, роэтозавр был колоссальным травоядным четвероногим с длинной шеей, крепкими конечностями и относительно маленькой головой. Хотя он был относительно меньше по сравнению с некоторыми своими родственниками-зауроподами, роэтозавр всё же достигал в длину около 15 метров, что делало его одним из крупнейших животных своего времени в Австралии.\nИскопаемые роэтозавра были впервые обнаружены в Квинсленде, Австралия, и они представляют собой одни из самых ранних свидетельств зауроподовых динозавров в этом регионе. Его анатомические особенности, такие как длинная шея и относительно вытянутый хвост, отражают приспособления к травоядности и использованию разнообразных растительных ресурсов."
 dubois.2162.h: "Вернуться в австралийский отдел."
 dubois.2112.d_perfect_dinosaur: "Этот скелет динозавра считается идеально собранным. Он не нуждается в изменениях и даёт максимальный рейтинг динозавров."
 dubois.2112.d_imperfect_dinosaur: "Этот скелет динозавра считается собранным с недостатками. Он даёт только половину возможного рейтинга динозавров. Его может пересобрать [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолог#!#!')], если он не занят или не истощён."
 dubois.2112.d_poor_dinosaur: "Этот скелет динозавра считается плохо собранным. Он сильно портит наш рейтинг динозавров. Его может пересобрать [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолог#!#!')], если он не занят или не истощён."
 dubois.2112.g: "Пересобрать этот скелет динозавра."
