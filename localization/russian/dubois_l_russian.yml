 dubois.1062.t: "Вольер с бурогорлыми ленивцами"
 dubois.1062.d: "Пышная зелень вольера для #o бурогорлого ленивца#! идеально подходила для этого медлительного животного. Здесь было много деревьев, на которых они могли висеть."
 dubois.1062.f1: "В пышном, заросшем листвой вольере зоопарка медлительное и милое существо, известное как бурогорлый ленивец, без усилий цепляется за ветку, его томные движения и нежный характер привлекают внимание посетителей. Заинтригованные его уникальными приспособлениями, вы подходите к знающему смотрителю, желая узнать больше об этом удивительном древесном млекопитающем.\n\n«Бурогорлый ленивец — мастер неспешной жизни, — начинает смотритель. — Эти замечательные существа эволюционировали, чтобы процветать на верхушках деревьев в тропических лесах Центральной и Южной Америки. С их длинными, изогнутыми когтями и специально приспособленными мышцами ленивцы идеально подходят для жизни, проведённой вися вниз головой. Их неторопливые движения и медленный метаболизм помогают сохранять энергию и позволяют им выживать на диете, состоящей в основном из листьев»."
 dubois.1062.f2: "В спокойной древесной среде обитания зоопарка бурогорлый ленивец неторопливо пробирается сквозь кроны деревьев, его лохматый мех и широко раскрытые глаза вызывают чувство умиротворения. Заинтригованные его образом жизни, вы обращаетесь к знающему смотрителю, надеясь узнать больше об интригующем поведении этих удивительных млекопитающих.\n\n«Бурогорлые ленивцы известны своими уникальными приспособлениями и удивительным поведением, — объясняет смотритель. — Большую часть своей жизни они проводят высоко на деревьях, часто неподвижно и сливаясь с окружающей средой. У ленивцев есть специализированная пищеварительная система для переработки жёстких и волокнистых листьев, на полное переваривание которых могут уйти дни. На их шерсти также растут водоросли, что помогает им маскироваться и получать дополнительные питательные вещества»."
 dubois.1062.f3: "Среди пышной зелени среды обитания ленивцев бурогорлый ленивец висит вниз головой на ветке, казалось бы, невозмутимый суетой зоопарка. Заинтригованные его кажущимся расслабленным характером, вы подходите к знающему смотрителю, надеясь понять значение его неспешного образа жизни.\n\n«Неспешный образ жизни бурогорлого ленивца поистине замечателен, — делится смотритель. — Их неторопливые движения не только сохраняют энергию, но и обеспечивают им определённую защиту от хищников. Проводя большую часть времени вися вниз головой, они минимизируют свою видимость и полагаются на свой специализированный мех, чтобы слиться с окружающей листвой. Это захватывающая адаптация, которая демонстрирует уникальные стратегии, используемые ленивцами для выживания в их древесной среде обитания»."
 dubois.1062.k: "Вернуться к южноамериканским вольерам"
 zoo_south_american_enclosures_tt: "Вы вернётесь к южноамериканским вольерам зоопарка."
 dubois.1063.t: "Вольер с ягуарами"
 dubois.1063.d: "Похожий на джунгли вольер был царством #o ягуара#!. Полный зелёных кустов, деревьев и растительности, он был идеальным местом для укрытия ягуара."
 dubois.1063.f1: "В иммерсивном вольере в стиле джунглей мощное и неуловимое существо, известное как ягуар, крадётся с целеустремлённостью, его гладкое и мускулистое тело идеально сливается с пышной растительностью. Заинтригованные его репутацией искусного хищника, вы подходите к знающему смотрителю, желая узнать больше об этой культовой большой кошке.\n\n«Ягуар с его отчётливыми узорами-розетками и мощным телосложением — хозяин тропического леса, — начинает смотритель. — Оснащённый сильными челюстями и острыми когтями, он является высшим хищником, способным одолеть разнообразную добычу, включая крупных млекопитающих, рептилий и рыб. Ягуары известны своей скрытной техникой охоты, часто нападая на своих жертв из засады быстрыми и точными ударами. Их присутствие в экосистеме помогает регулировать популяции добычи и поддерживает хрупкое равновесие тропического леса»."
 dubois.1063.f2: "В увлекательной среде обитания ягуаров в зоопарке гладкий и ловкий ягуар грациозно взбирается на дерево, демонстрируя свои замечательные древесные способности. Его мускулистые конечности и острое зрение привлекают внимание посетителей. Заинтригованные его мастерством лазания, вы обращаетесь к знающему смотрителю, надеясь узнать больше о жизни этого загадочного кошачьего.\n\n«Ягуары известны своими замечательными навыками лазания, что отличает их от других больших кошек, — объясняет смотритель. — У них мощные конечности и втяжные когти, которые позволяют им с точностью перемещаться по деревьям. Ягуары часто используют ветви деревьев как наблюдательные пункты для обзора окрестностей или для отдыха после успешной охоты. Их способность лазать и пересекать лесной полог является свидетельством их универсальности как искусных хищников»."
 dubois.1063.f3: "Среди пышной растительности вольера для ягуаров мощный самец ягуара издаёт низкий, резонирующий рёв, который вибрирует в воздухе, демонстрируя его силу и территориальность. Заинтригованные его вокализацией, вы подходите к знающему смотрителю, надеясь понять значение этих звуков.\n\n«Вокализация ягуаров служит нескольким целям, — делится смотритель. — Их глубокий рёв — это способ заявить о своём присутствии и защитить свою территорию. Эти звуки также играют роль в общении с потенциальными партнёрами, особенно во время брачного сезона. Ягуары обладают широким спектром звуков, включая рычание, фырканье и урчание. Прислушиваясь к этим уникальным звукам, исследователи получают ценные сведения о поведении и социальной динамике этих величественных кошек»."
 dubois.1064.t: "Вольер с гигантскими муравьедами"
 dubois.1064.d: "В вольере #o гигантского муравьеда#! преобладали огромные красные муравейники, которые выделялись на фоне травянистого вольера. Там гигантский муравьед мог легко полакомиться мелкими насекомыми."
 dubois.1064.f1: "В иммерсивной среде обитания зоопарка уникальное и удивительное существо, известное как гигантский муравьед, бродит со своей характерной вытянутой мордой и пушистым хвостом, привлекая внимание посетителей. Заинтригованные его специализированными приспособлениями, вы подходите к знающему смотрителю, желая узнать больше об этом интригующем насекомоядном млекопитающем.\n\n«Гигантский муравьед — мастер охоты на насекомых, — начинает смотритель. — С его длинной мордой, липким языком и острыми когтями он идеально приспособлен для своей специализированной диеты. Муравьеды потребляют тысячи муравьёв и термитов каждый день, используя свой замечательный язык, который может вытягиваться до двух футов. Их сильное обоняние помогает им находить колонии насекомых, а острые когти позволяют с лёгкостью вскрывать термитники»."
 dubois.1064.f2: "В увлекательном вольере для муравьедов гигантский муравьед бредёт по своей среде обитания, его характерная чёрно-белая шерсть сливается с пятнистым солнечным светом, пробивающимся сквозь деревья. Заинтригованные его уникальным внешним видом, вы обращаетесь к знающему смотрителю, надеясь узнать больше об удивительном образе жизни этого харизматичного млекопитающего.\n\n«Гигантские муравьеды — удивительные существа с удивительным поведением, — объясняет смотритель. — В основном это одиночные животные, проводящие время в поисках насекомых и отдыхая в дуплах деревьев или норах. У этих муравьедов медленный метаболизм и низкая температура тела, что позволяет им сохранять энергию. Они также отличные пловцы и могут с лёгкостью пересекать водоёмы, используя свои плавучие тела и длинные морды в качестве трубки для дыхания»."
 dubois.1064.f3: "Среди листвы в среде обитания муравьедов гигантский муравьед использует свои грозные когти, чтобы вскрыть термитник, его язык молниеносно высовывается и втягивается, чтобы поймать крошечных насекомых. Заинтригованные его техникой добычи пищи, вы подходите к знающему смотрителю, надеясь понять значение его поведения.\n\n«Поведение гигантского муравьеда при добыче пищи поистине замечательно, — делится смотритель. — У них есть специализированная техника кормления, которая включает использование острых когтей для вскрытия муравейников и термитников. Язык муравьеда может высовываться и втягиваться до 160 раз в минуту, с поразительной точностью собирая насекомых. Такое поведение помогает регулировать популяции насекомых и играет жизненно важную роль в экосистеме»."
 dubois.1065.t: "Вольер с девятипоясными броненосцами"
 dubois.1065.d: "#o Девятипоясные броненосцы#! процветают в различных средах обитания, от тёплых и влажных районов до кустарников, прерий и тропических лесов. Для зоопарка была выбрана смесь этих сред обитания."
 dubois.1065.f1: "В удивительном вольере зоопарка любопытное и бронированное существо, известное как девятипоясный броненосец, снуёт по сторонам, его сегментированный панцирь и характерная морда привлекают внимание посетителей. Заинтригованные его уникальными приспособлениями, вы подходите к знающему смотрителю, желая узнать больше об этом интригующем млекопитающем.\n\n«Девятипоясный броненосец — мастер защиты и адаптации, — начинает смотритель. — Их замечательный панцирь, похожий на броню и состоящий из костных пластин, обеспечивает защиту от хищников. При угрозе они могут сворачиваться в клубок, выставляя свой бронированный панцирь и оставляя мало уязвимых мест для потенциальных угроз. Их сильные когти идеально подходят для рытья и поиска предпочитаемой ими пищи — насекомых, таких как муравьи и термиты»."
 dubois.1065.f2: "В увлекательной среде обитания броненосцев в зоопарке девятипоясный броненосец использует своё острое обоняние, чтобы вынюхивать зарывшихся насекомых, его уникальная морда исследует землю в поисках еды. Заинтригованные его поведением при добыче пищи, вы обращаетесь к знающему смотрителю, надеясь узнать больше об удивительном образе жизни этого бронированного млекопитающего.\n\n«Девятипоясные броненосцы — удивительные существа с замечательными навыками добычи пищи, — объясняет смотритель. — Они в значительной степени полагаются на своё обоняние для обнаружения насекомых в почве. Своими острыми когтями и мощными передними лапами броненосцы с лёгкостью роют землю, обнажая свою добычу. У них есть специализированный язык, который может проникать глубоко в муравьиные и термитники, позволяя им с точностью извлекать свои любимые лакомства»."
 dubois.1065.f3: "Среди песчаного субстрата в среде обитания броненосцев девятипоясный броненосец бегает по сторонам, оставляя за собой след из неглубоких ям, пока ищет свою следующую еду. Заинтригованные его поведением рытья, вы подходите к знающему смотрителю, надеясь понять значение его действий.\n\n«Рытьё — неотъемлемое поведение для девятипоясного броненосца, — делится смотритель. — Они выкапывают неглубокие норы, известные как „убежища“, где они укрываются от экстремальных температур и потенциальных угроз. Эти норы также служат безопасным местом для отдыха и рождения детёнышей броненосцев. Способность броненосца рыть и создавать эти норы демонстрирует их приспособляемость к различным средам»."
 dubois.1066.t: "Вольер с андскими кондорами"
 dubois.1066.d: "Чтобы имитировать Анды, вольер #o андского кондора#! был заполнен скалами. Он был построен на склоне и также имел утёс."
 dubois.1066.f1: "В просторном вольере зоопарка величественное и внушающее трепет существо, известное как андский кондор, парит с распростёртыми крыльями, его огромные размеры и поразительный внешний вид привлекают внимание посетителей. Заинтригованные его величием, вы подходите к знающему смотрителю, желая узнать больше об этой культовой птице Анд.\n\n«Андский кондор — символ силы и свободы, — начинает смотритель. — С его впечатляющим размахом крыльев, достигающим трёх метров, это одна из самых крупных летающих птиц в мире. Эти великолепные птицы известны своим грациозным полётом и способностью без усилий парить в горных регионах Анд. У них есть уникальная способность использовать восходящие потоки тёплого воздуха, что позволяет им преодолевать огромные расстояния в поисках пищи»."
 dubois.1066.f2: "В увлекательном вольере зоопарка андский кондор сидит на скалистом уступе, его перья блестят на солнце, пока он наблюдает за окрестностями острым зрением. Заинтригованные его впечатляющим зрением, вы обращаетесь к знающему смотрителю, надеясь узнать больше о замечательных способностях этой величественной птицы.\n\n«Андские кондоры обладают невероятным зрением, — объясняет смотритель. — Их острое зрение позволяет им замечать потенциальные источники пищи с большой высоты, такие как падаль или туши животных. Они играют важную экологическую роль как санитары природы, помогая предотвращать распространение болезней, поедая падаль. Их способность находить пищу на огромных расстояниях является свидетельством их невероятной остроты зрения»."
 dubois.1066.f3: "На живописном фоне вольера для кондоров великолепный самец андского кондора демонстрирует своё захватывающее дух оперение, расправляя крылья и издавая глубокий, резонирующий крик, который вибрирует в воздухе. Заинтригованные его поведением, вы подходите к знающему смотрителю, надеясь понять значение его демонстраций.\n\n«Демонстрации андского кондора служат нескольким целям, — делится смотритель. — Они используются для общения и брачных ритуалов. Самцы кондоров участвуют в сложных демонстрациях, чтобы привлечь самок, которые включают расправление крыльев, надувание перьев и издание глубоких звуков. Эти демонстрации показывают их силу, жизненную энергию и пригодность в качестве потенциального партнёра. Наблюдение за этими демонстрациями — замечательный опыт и свидетельство брачных ритуалов этих великолепных птиц»."
 dubois.1067.t: "Вольер с американскими ламантинами"
 dubois.1067.d: "У американских ламантинов был большой бассейн, где они могли плавать, и несколько песчаных отмелей, на которых можно было лежать."
 dubois.1067.f1: "В безмятежной водной среде обитания зоопарка нежное и величественное существо, известное как американский ламантин, скользит по воде, его большое тело и спокойное поведение привлекают внимание посетителей. Заинтригованные его мирным присутствием, вы подходите к знающему смотрителю, желая узнать больше об этом культовом морском млекопитающем.\n\n«Американский ламантин — символ грации и уязвимости, — начинает смотритель. — Эти нежные гиганты встречаются в тёплых прибрежных водах и медленно текущих реках. Несмотря на их массивные размеры, они травоядные, питающиеся в основном водными растениями. Их медленный метаболизм и тёплая водная среда помогают им сохранять энергию. К сожалению, ламантинам угрожает потеря среды обитания и столкновения с лодками. Усилия по сохранению жизненно важны для защиты этих нежных существ»."
 dubois.1067.f2: "В спокойных водах вольера для ламантинов американский ламантин плавает у поверхности воды, его ласты мягко рассекают поверхность воды при каждом движении. Зрелище его плавучего поведения привлекает внимание посетителей. Заинтригованные его плавательными привычками, вы обращаетесь к знающему смотрителю, надеясь узнать больше о жизни этого замечательного морского млекопитающего.\n\n«У ламантинов уникальная плавучесть, которая помогает им в движении, — объясняет смотритель. — Их большие, толстые тела и наполненные воздухом лёгкие способствуют их естественной плавучести, позволяя им плавать у поверхности воды. Эта плавучесть помогает им сохранять энергию и без усилий скользить по своей водной среде обитания. Их медленные и обдуманные движения являются свидетельством их адаптации к водной среде»."
 dubois.1067.f3: "Среди мирных вод среды обитания ламантинов американский ламантин издаёт серию мягких, мелодичных звуков, которые резонируют в воздухе, демонстрируя его присутствие и потенциальное общение. Заинтригованные его вокализацией, вы подходите к знающему смотрителю, надеясь понять значение этих звуков.\n\n«Ламантины известны своими уникальными звуками, — делится смотритель. — Эти нежные существа общаются друг с другом с помощью различных звуков, включая щебетание, свист и щелчки. Эти голосовые обмены играют роль в поддержании социальных связей, нахождении друг друга в их подводной среде и, возможно, указывают на брачные намерения. Вокализация ламантинов даёт представление о сложной социальной динамике этих морских млекопитающих»."
 dubois.1068.t: "Вольер с беличьими саймири"
 dubois.1068.d: "Вольер для беличьих саймири был полон деревьев и других предметов для лазания и игр. Это было идеальное место для обезьян."
 dubois.1068.f1: "В ярком вольере в стиле тропического леса группа энергичных и социальных существ, известных как беличьи саймири, ловко качается на деревьях, их быстрые движения и игривые выходки привлекают внимание посетителей. Заинтригованные их живым поведением, вы подходите к знающему смотрителю, желая узнать больше об этих очаровательных приматах.\n\n«Наблюдать за беличьими саймири — истинное удовольствие, — начинает смотритель. — Эти маленькие приматы известны своей безграничной энергией и тесными социальными группами. У них есть отличительные черты, такие как их белые маски и пушистые хвосты. Беличьи саймири общаются с помощью различных звуков, от резких тревожных криков до успокаивающего мурлыканья. Их кооперативное поведение и динамичные социальные взаимодействия делают их увлекательным видом для изучения»."
 dubois.1068.f2: "В оживлённой тропической среде обитания обезьян беличий саймири тщательно ухаживает за своим товарищем, их тесное взаимодействие и нежные движения раскрывают силу их социальных связей. Зрелище их поведения по уходу за шерстью привлекает внимание посетителей. Заинтригованные их взаимодействиями, вы обращаетесь к знающему смотрителю, надеясь узнать больше о жизни этих харизматичных приматов.\n\n«Уход за шерстью — жизненно важный аспект социальных взаимодействий беличьих саймири, — объясняет смотритель. — Он служит нескольким целям, от поддержания гигиены и удаления паразитов до укрепления социальных связей в группе. Беличьи саймири занимаются взаимным уходом, где они чистят шерсть друг друга и даже моют лица друг другу. Эти сеансы ухода укрепляют социальные связи и способствуют сплочённости группы»."
 dubois.1068.f3: "Среди пышной листвы в вольере для обезьян игривый беличий саймири издаёт серию высоких криков, которые эхом разносятся по воздуху, демонстрируя его присутствие и общение. Заинтригованные его вокализацией, вы подходите к знающему смотрителю, надеясь понять значение этих звуков.\n\n«Беличьи саймири — очень голосистые существа, — делится смотритель. — Их звуки варьируются от громких тревожных криков до более мягких воркующих звуков. Эти голосовые обмены помогают им общаться с другими членами своей группы, предупреждая их о потенциальных опасностях или сигнализируя о своих намерениях. Беличьи саймири также используют язык тела, такой как уход за шерстью и жесты, для передачи сообщений в своей динамичной социальной структуре»."
 dubois.1101.t: "В зоопарке родились [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_zoo_baby_type')]!"
 dubois.1101.d: "Последние несколько дней в зоопарке больше посетителей, чем обычно, ведь здесь родились [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_zoo_baby_type')]. Теперь мы можем дать имя одному из малышей."
