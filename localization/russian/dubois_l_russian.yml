 dubois.1019.t: "Вольер с сурикатами"
 dubois.1019.d: "В вольере для сурикатов преобладали скалы с пещерами. Вы сразу же заметили множество маленьких животных, стоявших и бегавших вокруг."
 dubois.1019.f1: "«Сурикаты примечательны своей высокоорганизованной социальной структурой», — объясняет смотритель. «Каждый член группы, известной как „клан“ или „банда“, по очереди выполняет роль часового, высматривая хищников, пока другие ищут пищу или отдыхают. Их общение чёткое и ясное; разные крики сигнализируют о разной степени угрозы. Эта постоянная бдительность и сотрудничество являются ключом к их выживанию в дикой природе»."
 dubois.1019.f2: "«Сурикаты — искусные копатели», — делится смотритель. «Они могут вырыть нору глубиной в несколько футов всего за несколько минут, что необходимо для поиска пищи, такой как насекомые, мелкие рептилии и корни. Это поведение также играет решающую роль в создании их сложных систем нор, где они живут группами и воспитывают своих детёнышей. Эти подземные сети обеспечивают защиту от хищников и экстремальных погодных условий»."
 dubois.1019.f3: "«У сурикатов широкий диапазон вокализаций», — объясняет смотритель. «Их звуки включают в себя всё, от тревожных криков для координации движений до более мягких криков, используемых для поддержания контакта внутри группы. Когда член группы находит еду, он часто кричит, чтобы поделиться открытием с другими, подчёркивая общинный характер их общества. Эти голосовые коммуникации являются неотъемлемой частью их выживания, помогая им оставаться на связи и координировать свои действия»."
