 ito_naturalist: "Натуралист"
 ito_naturalist_desc: "Ученый, изучающий мир природы, которому поручено собирать образцы и запечатлевать экзотическую фауну вживую."
 ito_naturalist_experienced: "Опытный натуралист"
 ito_naturalist_experienced_desc: "Этот натуралист заслужил признание благодаря усердной работе на местах и ценному вкладу в каталогизацию разнообразия природы."
 ito_naturalist_famous: "Известный натуралист"
 ito_naturalist_famous_desc: "Прославленный своими новаторскими экспедициями и вкладом в натурфилософию, этот человек входит в число самых уважаемых ученых своего времени."
 ito_botanist: "Ботаник"
 ito_botanist_desc: "От джунглей до пустынь, от деревьев до мха, этот персонаж посвятил свое время исследованию растений по всему миру."
 ito_entomologist: "Энтомолог"
 ito_entomologist_desc: "Зачем кому-то вообще понадобилось изучать ошибки? Ну, этот персонаж занимается этим и стал специалистом."
 ito_marine_biologist: "Морской биолог"
 ito_marine_biologist_desc: "Ах, море! Разве не здорово было бы провести там жизнь? Только, может быть, не в качестве моряка. Этот персонаж может посвятить свою жизнь исследованию всех форм жизни в море. Какая замечательная жизнь!"
 ito_zoologist: "Зоолог"
 ito_zoologist_desc: "Животные - это потрясающе! Они завораживают! И этот персонаж хочет узнать их всех!"
