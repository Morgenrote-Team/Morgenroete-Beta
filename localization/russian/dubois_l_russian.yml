 je_dubois_paleontological_expedition_reason: "[Concept('concept_dubois_paleontologist', '#b #GREEN Палеонтолог#!#!')] проводит [Concept('concept_dubois_paleontological_expedition', 'палеонтологическую экспедицию')].\n$mr_divider_for_je$\nЗавершение экспедиции займёт 12 месяцев. По окончании вы получите [Concept('concept_dubois_fossil','окаменелости')] и [Concept('concept_dubois_dinosaur_bone','кости динозавров')] в зависимости от значения #V успеха#! экспедиции.\n$mr_divider_for_je$\nКаждый месяц добавляется небольшое количество #V шанса на успех#!. Кроме того, случайные события могут добавлять или отнимать успех.\n\nТекущее предполагаемое ежемесячное изменение успеха: #underline #tooltip:[GetRawTextTooltipTag('je_dubois_paleontological_expedition_monthly_progress_tt')] [Country.MakeScope.Var('dubois_paleontological_expedition_estimated_progress_var').GetValue|2+] #!#! (Максимум: 1)\n$mr_divider_for_je$\nВы сможете организовать [Concept('concept_dubois_paleontological_excavation', 'палеонтологические раскопки')], если у вас есть свободная [Concept('concept_dubois_paleontological_team', 'палеонтологическая команда')]. Раскопки будут пассивно приносить больше окаменелостей и костей.\n$mr_divider_for_je$\nТекущая #tooltip:[GetRawTextTooltipTag('je_dubois_paleontological_expedition_yield_tt')] #underline #b предполагаемая добыча#!#!#! с экспедиции:\n[GetPlayer.GetCustom('je_dubois_paleontological_expedition_yield_type')]"
 je_dubois_paleontological_expedition_yield_tt: "Вы получаете больше окаменелостей и костей в зависимости от вашего #V шанса на успех#!:\n0 - 3:     $je_dubois_paleontological_expedition_yield_level_1_loc$\n4 - 7:     $je_dubois_paleontological_expedition_yield_level_2_loc$\n8 - 11:   $je_dubois_paleontological_expedition_yield_level_3_loc$\n12 - 14: #p 4#! @dubois_fossil! [Concept('concept_dubois_fossil','окаменелости')] и #p 1#! @dubois_dinosaur_bone! [Concept('concept_dubois_dinosaur_bone', 'кость динозавра')]\n15:         #p 5#! @dubois_fossil! [Concept('concept_dubois_fossil','окаменелостей')] и #p 2#! @dubois_dinosaur_bone! [Concept('concept_dubois_dinosaur_bone','кости динозавра')]\n"
