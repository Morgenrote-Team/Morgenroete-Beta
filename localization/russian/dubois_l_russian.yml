 dubois_getting_lynx: "\n- #n Иберийскую рысь#! можно найти в областях #bold Андалусия#!, #bold Алентежу#!, #bold Эстремадура#!, #bold Кастилия#! и #bold Бадахос#!"
 dubois_eur_enclosure_wolf: "\n- #o Евразийские волки#!"
 dubois_getting_wolf: "\n- #n Евразийских волков#! можно найти в областях #bold Восточная Словакия#!, #bold Умбрия#!, #bold Южная Сербия#!, #bold Свеаланд#! и #bold Орша#!"
 dubois_eur_enclosure_badger: "\n- #o Европейские барсуки#!"
