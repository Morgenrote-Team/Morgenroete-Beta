 dubois.128.t: "Лось"
 dubois.128.d: "Наш зоопарк пополнился новым экзотическим животным: сегодня в свой новый вольер переехал долгожданный #O лось#!."
 dubois.128.f: "Европейский лось, известный в Северной Америке как Moose, — самый крупный представитель семейства оленевых. Родом из лесов Европы и Азии, эти одиночные гиганты известны своими массивными рогами, которые самцы сбрасывают и отращивают ежегодно. Лоси питаются листьями, корой и водными растениями. Несмотря на свои размеры, они проворны и хорошо приспособлены к своим холодным, лесистым местам обитания."
 dubois.128.g: "Величественно!"
