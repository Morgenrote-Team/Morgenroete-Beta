 dubois.1059.t: "Вольер с ядозубами"
 dubois.1059.d: "Вольер ядозуба представлял собой суровый ландшафт из песчаной местности и скалистых расщелин. На первый взгляд, яркая чёрно-оранжевая чешуя ящерицы идеально сливалась с окружающей средой. Затем вы заметили его — медленно появляющегося из тенистой норы, его толстая, похожая на бисер кожа блестела на свету, пока он осторожно передвигался по своей среде обитания."
 dubois.1059.f1: "В залитом солнцем вольере зоопарка одинокий ядозуб медленно пробирается по скалистой местности, его характерные чёрные и оранжевые чешуйки ловят солнечный свет. Преднамеренное, почти неуклюжее движение этой ядовитой ящерицы привлекает внимание любопытных зрителей. Заинтригованные его уникальным внешним видом и поведением, вы подходите к смотрителю за дополнительной информацией.\n«Ядозуб — одна из немногих ядовитых ящериц в мире», — объясняет смотритель. «Он движется медленно, сохраняя энергию в суровой пустынной среде. В отличие от многих других хищников, он полагается не на скорость, а на свой мощный яд, который использует для усмирения добычи, такой как мелкие млекопитающие и птицы. Его яркая окраска служит предупреждением для потенциальных хищников, сигнализируя, что это нелёгкая добыча»."
 dubois.1059.f2: "В скалистом вольере ядозуб частично спрятан под большим валуном, его раздвоенный язык высовывается, чтобы попробовать воздух. Вид этого доисторического существа с его бисерной кожей и мощными челюстями fascin... увлекает посетителей. Заинтересовавшись его пищевыми привычками, вы обращаетесь к смотрителю за дополнительной информацией.\n«У ядозубов медленный метаболизм, и они могут выживать, съедая всего несколько крупных порций в год», — делится смотритель. «Они используют свои сильные челюсти, чтобы раздавливать яйца птиц и рептилий, одно из их любимых блюд. После еды они могут накапливать жир в хвостах, что поддерживает их в течение долгих периодов без еды. Эта адаптация имеет решающее значение для выживания в засушливой пустыне, где еда может быть дефицитом»."
 dubois.1059.f3: "Наблюдая за ядозубом в его пустынной среде обитания, вы замечаете, как он осторожно карабкается по скалам и осматривает расщелины. Преднамеренный темп его движений и то, как он методично исследует свою среду, вызывают ваш интерес. Желая узнать больше об этом интригующем поведении, вы подходите к смотрителю.\n«Ядозубы по своей природе ночные животные», — объясняет смотритель. «Большую часть дня они проводят, спрятавшись в норах или под камнями, чтобы избежать сильной жары. Когда они выходят, их движения методичны, они используют своё острое обоняние для обнаружения добычи или поиска безопасного места для отдыха. Их одиночный и скрытный образ жизни помог им процветать в одних из самых суровых сред»."
