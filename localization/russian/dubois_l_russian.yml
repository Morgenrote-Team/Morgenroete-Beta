 je_dubois_paleontological_excavation_yearly_fossils_paleontologist_present_inactive_loc: "\n#default_text 1 окаменелость за палеонтолога на раскопках (до 4 в зависимости от опыта).#!"
 je_dubois_paleontological_excavation_yearly_bones_paleontologist_present_loc: "\n#default_text #p 1#! [Concept('concept_dubois_dinosaur_bone','кость динозавра')] за [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолога#!#!')] на раскопках.#!"
 dubois_paleontological_excavation_explanation_loc: "Ваша [Concept('concept_dubois_paleontological_team', 'палеонтологическая команда')] в настоящее время проводит [Concept('concept_dubois_paleontological_excavation', 'палеонтологические раскопки')]. Раскопки будут приносить вам определённое количество [Concept('concept_dubois_fossil','окаменелостей')] и [Concept('concept_dubois_dinosaur_bone','костей динозавров')] в год.\nВы можете отправить своего [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолога#!#!')] на раскопки, чтобы увеличить количество ежегодно получаемых костей и окаменелостей. Однако если вы отзовёте палеонтолога, вы не сможете отправить его снова в течение 1 года."
 dubois_fossil_yield_from_all_excavations_loc: "\n\nПредполагаемая ежегодная добыча @dubois_fossil! [Concept('concept_dubois_fossil','окаменелостей')] со всех раскопок: [Country.MakeScope.Var('dubois_yearly_estimated_regular_fossils_var').GetValue|+0]"
