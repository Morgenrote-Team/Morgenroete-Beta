 dubois.138.t: "Сурикат"
 dubois.138.d: "Наш зоопарк пополнился новым экзотическим животным: сегодня в свой новый вольер переехал долгожданный #O сурикат#!."
 dubois.138.f: "Сурикат — это небольшой мангуст, обитающий в Африке. Сурикаты чрезвычайно социальны и живут вместе в стаях, насчитывающих до 30 животных. Обычно они живут в норах или пещерах, где могут прятаться от хищников. Как правило, по крайней мере один сурикат занят тем, что высматривает опасность и предупреждает стаю. Должность дозорного чередуется между животными."
 dubois.138.g: "Как мило!"
 visit_meerkat_tt: "Вы посетите вольер с #o сурикатами#!."
