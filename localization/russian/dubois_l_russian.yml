 dubois.1011.t: "Африканские галереи естественной истории"
 dubois.1011.d: "Войдите в Африканские павильоны Зоологических садов, где тщательно подобранные среды обитания и сдержанные архитектурные стилизации отражают разнообразный рельеф континента. Созданные под руководством учёных [Concept('concept_dubois_naturalist', '#b #GREEN натуралистов#!#!')], эти вольеры предоставляют прилежному посетителю возможность наблюдать за характерной фауной саванны, рек и побережья в условиях, благоприятствующих обучению и приличию."
