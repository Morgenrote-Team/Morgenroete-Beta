 dubois.1039.t: "Вольер с тилацинами"
 dubois.1039.d: "В тенистом вольере зоопарка неуловимый тилацин грациозно крадётся по периметру, его полосатая спина и стройное телосложение придают ему почти мифический вид. Посетители, заворожённые его потусторонним присутствием, собираются, чтобы понаблюдать за этим редким существом. Заинтересовавшись его происхождением, вы подходите к смотрителю за дополнительной информацией."
 dubois.1039.f1: "«Тилацин, или тасманийский тигр, — fascin... увлекательный пример конвергентной эволюции», — объясняет смотритель. «Хотя он и похож на собаку своим телом и полосатой шерстью, на самом деле это сумчатое, более близкое к кенгуру и коалам. Родом из Тасмании и материковой Австралии, тилацин когда-то был высшим хищником своей среды. Его отчётливые полосы помогали ему сливаться с густыми лесами и лугами, где он охотился»."
 dubois.1039.f2: "«Тилацины были в основном ночными охотниками», — делится смотритель. «Они полагались на своё острое зрение и слух для выслеживания добычи, часто охотясь в одиночку или парами. В отличие от многих других хищников, тилацины были относительно тихими, используя скрытность и терпение для приближения к своей жертве. Их рацион состоял в основном из мелких и средних животных, включая валлаби, птиц и грызунов»."
 dubois.1039.f3: "«Вокализации тилацина были редки, но запоминающиеся», — объясняет смотритель. «Они издавали серию тявканий, рычаний и воя, особенно в брачный сезон или когда чувствовали угрозу. Эти крики использовались для общения с другими тилацинами на больших расстояниях, особенно в густых лесах Тасмании. Хотя их вокальный диапазон не был таким разнообразным, как у некоторых других хищников, крики тилацина были неотъемлемой частью его поведения, добавляя ему таинственности»."
