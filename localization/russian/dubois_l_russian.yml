 dubois_mosasaurus_discoverer_loc: "\n\nВпервые этого динозавра обнаружили и собрали в [GetGlobalVariable('dubois_mosasaurus_year_global_var').GetValue|V0] году. Страна-первооткрыватель — [GetGlobalVariable('dubois_mosasaurus_discoverer_global_var').GetCountryDefinition.GetName]"
 dubois.2051.m: "Посетить отдел общих скелетов."
 dubois.2171.t: "Отдел общих скелетов"
 dubois.2171.d: "Какой скелет посетить?"
 dubois.2171.f: "Некоторые скелеты можно найти по всему миру. Большинство из них были морскими динозаврами или другими морскими существами."
 dubois.2171.g: "Мозазавр."
 dubois.2172.t: "Мозазавр"
 dubois.2172.f: "Мозазавр на самом деле не динозавр, а морская рептилия. Они жили в океанах мелового периода. Существует много различных видов мозазавров, которые приспособились к различным регионам. Многие из них были высшими хищниками и охотились на рыб, акул и других динозавров и морских рептилий."
 dubois.2172.h: "Вернуться в общую коллекцию"
