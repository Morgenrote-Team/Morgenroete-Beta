 dubois_send_paleontologist_to_excavation_button: "Отправить палеонтолога"
 dubois_send_paleontologist_to_excavation_button_desc: "Отправить вашего [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолога#!#!')] на [Concept('concept_dubois_paleontological_excavation', 'палеонтологические раскопки')].\nПрисутствие палеонтолога увеличит количество [Concept('concept_dubois_fossil','окаменелостей')] и [Concept('concept_dubois_dinosaur_bone','костей динозавра')] с раскопок.\n\nВы всегда можете отозвать палеонтолога, но он не сможет вернуться на раскопки в течение одного года."
 dubois_recall_paleontologist_from_excavation_button: "Отозвать палеонтолога"
 dubois_recall_paleontologist_from_excavation_button_desc: "Отозвать вашего [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолога#!#!')] с [Concept('concept_dubois_paleontological_excavation', 'палеонтологических раскопок')].\nВы больше не будете получать дополнительные [Concept('concept_dubois_fossil','окаменелости')] и [Concept('concept_dubois_dinosaur_bone','кости динозавра')] с раскопок.\n\nПалеонтолог будет #n недоступен#! для других раскопок в течение #n одного года#!."
 dubois_recall_excavation_button: "Отозвать команду"
 dubois_recall_excavation_button_desc: "Отозвать вашу [Concept('concept_dubois_paleontological_team', 'палеонтологическую команду')] с [Concept('concept_dubois_paleontological_excavation', 'палеонтологических раскопок')]. Это удалит палеонтологические раскопки."
