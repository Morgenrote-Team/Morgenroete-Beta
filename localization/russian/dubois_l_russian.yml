 dubois.2011.d_to_location: "Профессор [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] — ведущий [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолог#!#!')] нашей страны. В настоящее время [SelectLocalization(ROOT.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'она', 'он')] направляется к скальной формации для её более детального изучения."
 dubois.2011.d_from_location: "Профессор [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] — ведущий [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолог#!#!')] нашей страны. В настоящее время [SelectLocalization(ROOT.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'она', 'он')] возвращается с раскопок."
 dubois.2011.d_default: "Профессор [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] — ведущий [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолог#!#!')] нашей страны. В настоящее время у [SelectLocalization(ROOT.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'неё', 'него')] нет назначений."
 dubois.2011.d_other: "Профессор [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] — ведущий [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолог#!#!')] нашей страны. В данный момент [SelectLocalization(ROOT.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'она', 'он')] занят[SelectLocalization(ROOT.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'а', '')] другими делами."
 dubois.2011.f: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] имеет #G [ROOT.Var('dubois_paleontologist_var').GetVariable('dubois_paleontologist_experience_var').GetValue]#! [Concept('concept_academics_experience', 'академического опыта')] в палеонтологии\n\nПалеонтологи могут ежегодно находить новые окаменелости в формациях. В крупных формациях также есть шанс обнаружить редкие кости динозавров, которые можно использовать для реконструкции скелетов. Для этого [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолог#!#!')] должен быть назначен на формацию. Если в пределах границ нет ни одной формации, можно заключить соглашение о палеонтологической лицензии со страной, у которой есть крупная формация. Без назначения на формацию палеонтолог остаётся неактивным. Однако в это время [SelectLocalization(ROOT.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'её', 'его')] можно задействовать в экспедициях, реконструкции костей динозавров, сборке или перемонтаже скелетов."
