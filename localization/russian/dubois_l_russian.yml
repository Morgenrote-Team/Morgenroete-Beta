 dubois_add_safari_track_tt: "Группа сафари обязуется #YELLOW выследить#! существо в его родной местности."
 dubois_add_safari_2_track_tt: "С возросшей срочностью команда будет #YELLOW преследовать#! след с #G удвоенной#! скоростью."
