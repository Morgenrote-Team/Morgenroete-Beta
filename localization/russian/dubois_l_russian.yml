 dubois.1031.t: "Галереи естественной истории Австралазии"
 dubois.1031.d: "Дидактическая прогулка, устроенная в виде этнографической и естественно-научной выставки: скромные павильоны, напоминающие об Антиподах, резные орнаменты из Океании и скалы цвета охры, отсылающие к внутренним районам Австралии. Здесь характерная фауна Австралазии представлена прилежной публике с целью просвещения и соблюдения приличий."
 dubois.1031.g: "Посетить #o зелёных морских черепах#!"
