 dubois.1012.t: "Вольер с бегемотами"
 dubois.1012.d: "В вольере для #o бегемотов#! обитает стая этих огромных существ. К счастью, от посетителей их отделяет большой ров."
 dubois.1012.f1: "Бегемоты плавали в воде своего вольера. Ничего особенного не происходило. Вы уже начали сомневаться, делают ли они вообще хоть что-нибудь, как вдруг рядом с вами появился смотритель зоопарка.\n\n«Поразительно, как бегемоты обычно просто плавают весь день. Но после заката они становятся очень активными и начинают искать пищу. Впрочем, это неудивительно, если знать, какая жара стоит в их естественной среде обитания. Вода охлаждает их днём, а вечером и ночью они наконец могут начать бродить по окрестностям»."
 dubois.1012.f2: "Внезапно из воды показался бегемот. Вы не видели его раньше, хотя наблюдали за вольером уже несколько минут. Должно быть, он провёл под водой довольно много времени.\n\nСтоящий рядом человек заговорил: «Разве не удивительно? Эти бегемоты могут оставаться под водой до пяти минут. Когда они погружаются, их ноздри и уши закрываются, чтобы внутрь не попала вода»."
 dubois.1012.f3: "Один из бегемотов открыл свою огромную пасть, показав длинные изогнутые зубы. Затем он начал хрюкать и брызгаться.\n\nКогда-то вы читали, что самцы бегемотов делают это, чтобы отпугнуть соперников, поскольку они очень ревностно защищают свою территорию. Самцы также используют свои экскременты для метки определённых точек на своей территории. Иногда они даже пристально смотрят на других самцов в знак доминирования."
 dubois.1012.k: "Вернуться к африканским вольерам"
 zoo_african_enclosures_tt: "Вы вернётесь к африканским вольерам зоопарка."
 dubois.1013.t: "Вольер с африканскими львами"
 dubois.1013.d: "В этом вольере, где для удобства вида есть тенистые деревья и неглубокий пруд, можно наблюдать за прайдом #o африканских львов#!."
 dubois.1013.f1: "Расположившись среди своей семьи, зрелый самец демонстрирует роскошную гриву тёмного оттенка — украшение, которое становится гуще с возрастом и силой. Натуралисты считают, что грива служит двойной цели: во-первых, как инструмент полового отбора, заявляя о здоровье и статусе её носителя; и во-вторых, как защитный воротник, обеспечивающий некоторую защиту горла и шеи в схватках с соперниками. В более прохладном климате, особенно в зверинцах вдали от Африки, грива имеет тенденцию расти длиннее и пышнее, иногда достигая длины более 16 см, что, вероятно, связано с температурой и телосложением."
 dubois.1013.f2: "Африканские львы живут в социальных сообществах, называемых прайдами, которые обычно состоят из родственных самок и их потомства, с одним или несколькими взрослыми самцами, временно занимающими главенствующее положение. Самки, оставаясь верными своей родной группе, берут на себя большую часть добычи пищи и охоты; их совместные усилия приносят заметный успех в охоте на крупных копытных. Самцы, со своей стороны, защищают прайд и его территорию, и когда они добывают крупную дичь, взрослый лев может съесть более 40 килограммов мяса за один приём пищи."
 dubois.1013.f3: "Размеренная поступь льва, так часто отмечаемая внимательными посетителями, может быть уподоблена обходу часового, поскольку она отражает врождённую склонность животного патрулировать границы, обнюхивать запахи и нести дозор в сумерках. В дикой природе территория поддерживается рёвом, метками мочой и железистыми выделениями, а также целенаправленным обследованием знакомых троп и ориентиров; в неволе эти наследственные импульсы проявляются в упорядоченных обходах вольера."
 dubois.1013.f4: "Долгое время в зоопарке наблюдали, как [SCOPE.sCharacter('dubois_prinz_eugen').GetFullName] каждый день навещает старого льва, словно ветеран и зверь узнавали друг в друге историю испытаний и триумфов. Когда в течение трёх дней человек больше не появлялся, животное отказалось от пищи и ходило в явном беспокойстве. В три часа ночи лев издал оглушительный рёв; в тот же миг часовенный колокол возвестил о кончине великого генерала [SCOPE.sCharacter('dubois_prinz_eugen').GetLastName]. Подобные совпадения, хотя и не могут считаться научным доказательством, тем не менее трогают даже самое суровое сердце."
 dubois.1014.t: "Вольер с африканскими саванными слонами"
 dubois.1014.d: "В этом просторном загоне отдыхают #o африканские саванные слоны#!. Их размеры и мудрость делают их одной из главных достопримечательностей Садов."
 dubois.1014.f1: "Взгляните на матриарха — самую опытную из своего рода, вокруг которой строится порядок в стаде. Общество слонов отчётливо матрилинейно: взрослые самки остаются вместе со своими дочерьми и сёстрами, направляя стадо к воде и пище и проявляя заметную заботу о телятах и сородичах. Натуралисты зафиксировали случаи, напоминающие траур и скорбь при потере товарищей, что свидетельствует о необычайной памяти и социальных чувствах этого животного."
 dubois.1014.f2: "Трубный глас, столь волнующий слух, — лишь один из голосов в обширном словаре слона. Помимо этих звучных возгласов и гортанного рыка, этот вид издаёт инфразвуки ниже порога человеческого слуха, которые распространяются на большие расстояния как по воздуху, так и по земле. Таким образом стада координируют свои передвижения, призывают на помощь и объявляют о своём присутствии в саванне."
 dubois.1014.f3: "Изумительный хобот, объединяющий нос и верхнюю губу, — это чудо мышечной инженерии, состоящее, как говорят, из десятков тысяч волокон и способное к самой тонкой работе. Бивни на самом деле являются удлинёнными резцами, которые растут непрерывно и используются для множества целей: копания, сдирания коры и защиты. Слоны демонстрируют долгую память на места и людей; водопои, посещённые в прошлые сезоны, они вспоминают безошибочно, а отдельных особей различают по запаху и виду даже после длительных промежутков времени."
 dubois.1015.t: "Вольер с жирафами"
 dubois.1015.d: "#o Жирафы#! видны издалека: их высоко поднятые головы общипывают верхние ветви, как и задумано природой."
 dubois.1015.f1: "Язык, голубоватого оттенка и длиной почти в пол-локтя, превосходно приспособлен для захвата колючих веток, которые повредили бы менее специализированный рот. Ловким движением животное срывает листья акации, избегая шипов, и таким образом может съесть за день около тридцати килограммов листвы. Действительно, жираф настолько хорошо обеспечен пищей благодаря своему рациону, что ему редко приходится наклоняться, чтобы попить."
 dubois.1015.f2: "Когда самцы борются за первенство, они вступают в любопытное состязание, называемое «неккинг», раскачивая головой, как маятником, чтобы ударить соперника в бок. С годами костные выросты на черепе (оссиконы) становятся массивнее, а их кончики часто оголяются, что является признаком возраста и ранга. Жирафы обычно образуют свободные группы, состав которых меняется по мере их передвижения по равнинам, хотя самки с детёнышами держатся вместе."
 dubois.1015.f3: "Шкура, представляющая собой мозаику из пятен на более светлом фоне, обеспечивает как маскировку в условиях переменчивого освещения, так и, предположительно, терморегуляцию с помощью густой сети сосудов под каждым пятном. Огромное сердце жирафа и крепкие артерии поддерживают высоко поднятую голову вопреки силе тяжести; тем не менее, это существо движется с грацией, которая не вяжется с его внушительным ростом."
 dubois.1016.t: "Вольер с очковыми пингвинами"
 dubois.1016.d: "Некоторые #o очковые пингвины#! резвятся в воде, в то время как другие стоят вместе на берегу, приводя в порядок своё превосходное оперение."
 dubois.1016.f1: "Этот вид (Spheniscus demersus), прозванный «ослиным» пингвином за свой крик, похожий на рёв осла, обитает на умеренных побережьях южной Африки, в частности в Намибии и на Мысе. В отличие от своих антарктических собратьев, они процветают в более тёплых морях, а их контрастная окраска защищает их от врагов как сверху, так и снизу. Питаются они в основном мелкой рыбой и головоногими, преследуя их с большой ловкостью под водой."
 dubois.1016.f2: "Очковые пингвины обычно роют норы в древних отложениях гуано, где они откладывают яйца и выращивают птенцов, причём родители поочерёдно занимаются насиживанием и добычей пищи. Кладка чаще всего состоит из двух яиц. Там, где гуано было вывезено человеком, подходящих мест для гнездования стало меньше; остаётся надеяться, что просвещённое управление со временем исправит этот ущерб."
 dubois.1016.f3: "Их оперение чрезвычайно плотное и хорошо смазанное жиром, что обеспечивает как теплоизоляцию, так и водонепроницаемость. В воде птицы достигают значительной скорости и управляют с поразительной точностью с помощью своих жёстких крыльев-ласт и хвоста. На суше они общительны и общаются с помощью набора криков, каждый из которых понятен их сородичам в шуме птичьего базара."
 dubois.1017.t: "Вольер с голыми землекопами"
 dubois.1017.d: "Поскольку эти грызуны проводят большую часть жизни под землёй, вольер устроен как земляной холм со стеклянными ходами, которые открывают взору любопытных их камеры и галереи."
 dubois.1017.f1: "Голый землекоп (Heterocephalus glaber) уникален среди млекопитающих своей безволосой кожей, пойкилотермностью и удивительной устойчивостью к разреженному воздуху — качествами, хорошо подходящими для жизни в глубоких, зловонных туннелях. Его огромные резцы, которые работают перед сомкнутыми губами, используются как кирки при рытье; сами губы смыкаются за зубами, не пропуская пыль. Невзрачное на вид, но очень трудолюбивое, это существо с неутомимым рвением строит длинные коридоры и просторные кладовые."
 dubois.1017.f2: "Этот вид демонстрирует редкое эусоциальное устройство: единственная размножающаяся «королева» в окружении партнёров правит множеством стерильных рабочих и солдат. Первые расширяют норы, добывают провизию и ухаживают за молодняком; вторые защищают колонию от змей и других незваных гостей. Такая организация, чаще встречающаяся у насекомых, даёт натуралисту богатую пищу для размышлений."
 dubois.1017.f3: "В своих тёплых убежищах животные сбиваются в кучу, обмениваясь теплом и лаской во время частого груминга. Их голоса, хоть и тихие, разнообразны и поддерживают знакомство между членами колонии. Для этого маленького зверька зафиксирована необычайная продолжительность жизни и заметная устойчивость к определённым недугам, что пробудило интерес как у врачей, так и у зоологов."
 dubois.1018.t: "Вольер с саванными зебрами"
 dubois.1018.d: "Этот ровный загон с травой и редкой тенью напоминает в миниатюре африканский велд; здесь #o саванная зебра#! чувствует себя как дома."
 dubois.1018.f1: "Смелый чёрно-белый наряд зебры, хотя и бросается в глаза, в мерцании и тени саванны сбивает с толку как мух, так и врагов. Узор каждой особи уникален, как подпись. Эти непарнокопытные обычно живут в семейных «гаремах»: один жеребец, несколько кобыл и их детёныши. Члены группы поддерживают порядок с помощью взаимного груминга и бдительного наблюдения за хищниками."
 dubois.1018.f2: "Доминирование среди самцов устанавливается путём формальных демонстраций — уши назад, шея выгнута, удары передними ногами — а иногда и с помощью укусов и резких ударов копытами. Общение включает в себя ржание, фырканье и высокие визги, а также выразительный язык ушей и хвоста. Группы холостых молодых самцов держатся отдельно до тех пор, пока не начнут бороться за кобыл."
 dubois.1018.f3: "Жеребёнок, будучи выводковым, встаёт на ноги и бегает уже через час после рождения, ибо в открытой равнине безопасность заключается в ранней резвости. Он запоминает мать по её запаху и узору, и она ухаживает за ним с заметной преданностью. Со временем молодняк изучает обычаи стада — где пастись, когда кочевать и как извлекать выгоду из бдительности своих товарищей."
