 dubois.3000.t: "Доктор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] теряет рассудок?"
 dubois.3000.d: "Ваш [Concept('concept_dubois_naturalist', '#b #GREEN натуралист#!#!')], [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName], кажется, забывает всё больше и больше. Может быть, [SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'ей', 'ему')] пора уйти с поста натуралиста?"
 dubois.3000.f: "Постойте-ка... Куда я дел[SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'а', '')] свой чай? О, он здесь? Или это было ядовитое растение? И почему в углу комнаты сидит огромный паук?"
 dubois.3000.g: "Не думаю, что [SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'должна', 'должен')] продолжать работать."
 dubois.3000.h: "Пфф, это совершенно нормально!"
 dubois.3010.t: "Образцы утеряны"
 dubois.3010.d: "Доктор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] внезапно не может найти некоторые образцы в своей коллекции. [SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'Она сказала', 'Он сказал')], что они просто... исчезли."
 dubois.3010.f: "Я абсолютно уверен[SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'а', '')], что только что положил[SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'а', '')] их сюда, на эти булавки. Но теперь их нет. Это были великолепные насекомые! Может, я просто положил[SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'а', '')] их куда-то ещё?"
 dubois.3010.g: "Как они исчезли? Я думал[SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'а', '')], они мертвы..."
 dubois.3011.t: "Натуралист продаёт часть коллекции"
 dubois.3011.d: "По-видимому, у профессора [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] накопились огромные долги. Похоже, единственным решением, которое [SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'она увидела', 'он увидел')], была продажа части нашей коллекции."
 dubois.3011.f: "«Нет, пожалуйста, не делайте ничего моей маленькой Хоуп. Она не сделала ничего плохого! Я сделаю всё, чтобы достать деньги! Пожалуйста! Только не трогайте её. Она всего лишь невинный маленький паучок!»"
 dubois.3011.g: "[SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'Она', 'Он')] [SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'сделала', 'сделал')] что?!"
