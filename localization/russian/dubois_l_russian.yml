 dubois.1322.d: "К сожалению, наша попытка основать новую стабильную [Concept('concept_dubois_habitat', 'среду обитания')] в [Concept('concept_dubois_nature_reserve', 'заповеднике')] [ROOT.Var('dubois_breeding_state_var').GetState.GetCustom('RU_SL_RP')] провалилась. Если мы хотим, мы можем попробовать снова и надеяться, что в этот раз нам повезёт больше."
