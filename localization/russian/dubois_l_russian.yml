 dubois.2011.d_asia: "Профессор [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] — ведущий [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолог#!#!')] нашей страны. В настоящее время [SelectLocalization(ROOT.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'она', 'он')] проводит исследования в скальной формации в #YELLOW Азии#!."
