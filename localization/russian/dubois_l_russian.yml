 dubois.52.t: "Высококачественное лесное хозяйство"
 dubois.52.d: "Доктор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] достиг[SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').GetCharacter.IsFemale, 'ла', '')] своей цели. Благодаря тщательному отбору особо устойчивых саженцев, мерам по естественной борьбе с вредителями и изучению симбиоза нескольких животных и растений, [SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').GetCharacter.IsFemale, 'она', 'он')] устойчиво укрепил[SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').GetCharacter.IsFemale, 'а', '')] лесную промышленность нашей страны. Эти экологические меры, вероятно, принесут и экономическую выгоду.\n\nВсего улучшено сооружений: [GetPlayer.MakeScope.Var('mr_num_improved_forestry_buildings_var').GetValue|V0]\n$concept_dubois_specimens$ из проекта: [GetPlayer.MakeScope.ScriptValue('ito_specimens_from_forestry_project_for_event_value')|+0] @dubois_specimen!"
 dubois.52.f: "«Прошу прощения, что? Вы хотите СРУБИТЬ деревья? Я приложил[SelectLocalization(ROOT.Var('dubois_naturalist_var').GetCharacter.IsFemale, 'а', '')] столько усилий, чтобы их вырастить, лелеять и ухаживать за ними, а теперь эти капиталистические монстры хотят убить моих милашек? О боже, что я наделал[SelectLocalization(ROOT.Var('dubois_naturalist_var').GetCharacter.IsFemale, 'а', '')]!»"
 dubois.52.g: "Больше древесины для всех!"
 dubois.53.t: "Высококачественные каучуковые деревья"
 dubois.53.d: "Доктор [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] достиг[SelectLocalization(ROOT.Var('dubois_naturalist_var').GetCharacter.IsFemale, 'ла', '')] своей цели. Благодаря тщательному отбору особо устойчивых саженцев, мерам по естественной борьбе с вредителями и изучению симбиоза нескольких животных и растений, [SelectLocalization(ROOT.Var('dubois_naturalist_var').GetCharacter.IsFemale, 'она', 'он')] устойчиво укрепил[SelectLocalization(ROOT.Var('dubois_naturalist_var').GetCharacter.IsFemale, 'а', '')] каучуковую промышленность нашей страны. Эти экологические меры, вероятно, принесут и экономическую выгоду.\n\nВсего улучшено сооружений: [GetPlayer.MakeScope.Var('mr_num_improved_runner_buildings_var').GetValue|V0]"
 dubois.53.f: "«Почему всех интересует этот совершенно бесполезный каучук? Я сделал[SelectLocalization(ROOT.Var('dubois_naturalist_var').GetCharacter.IsFemale, 'а', '')] это только потому, что меня интересует неогеспериалистский болотный комар. Это маленькое, легко смертельное животное размножается только в этом климате»."
 dubois.53.g: "Больше каучука для всех!"
 dubois.22.t: "Профессор [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] документирует вид «[SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_name')]»"
 dubois.22.d: "После нескольких месяцев наблюдения за животным в его естественной среде обитания, [ROOT.Var('dubois_naturalist_var').GetCharacter.GetFullName] завершил[SelectLocalization(ROOT.Var('dubois_naturalist_var').GetCharacter.IsFemale, 'а', '')] свои наблюдения. Его трактат, #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_title')]»#!, теперь доступен. [SCOPE.GetRootScope.GetCountry.GetCustom('dubois_animal_documentation_topic')]"
 dubois.22.g: "Зарезервировать экземпляр для Национальной библиотеки."
