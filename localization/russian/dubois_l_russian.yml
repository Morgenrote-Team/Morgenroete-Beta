 dubois.1030.t: "Вольер с манулами"
 dubois.1030.d: "Вольер манула представлял собой скалистую местность с расщелинами и небольшими пещерами. На первый взгляд, густой, пушистый кот казался почти невидимым, идеально сливаясь с окружающей средой. Затем вы заметили одного — его круглые, широкие глаза осторожно выглядывали из-за валуна, тихо наблюдая за всем вокруг."
 dubois.1030.f1: "В скалистом вольере зоопарка манул выглядывает из-за валуна, его широкие, круглые глаза осматривают окрестности. С его густым, серебристым мехом, распушённым от холода, он выглядит как маленький, дикий комок шерсти. В отличие от многих других диких кошек, у манула коренастое телосложение и короткие лапы, идеально приспособленные к холодным, высокогорным регионам Центральной Азии, где он обитает."
 dubois.1030.f2: "Когда манул выходит из своего укрытия среди скал, его плоская морда и большие, выразительные глаза придают ему почти комичный вид. Посетители часто удивляются его небольшому размеру и пушистому меху, который помогает ему сливаться со снежным окружением. По своей природе одиночка, манул редко встречается в дикой природе, предпочитая днём прятаться в расщелинах скал и норах и выходить на охоту на рассвете или в сумерках."
 dubois.1030.f3: "Среди прохладной, имитирующей степь среды своего вольера, манул движется с тихой точностью, его густой хвост тянется сзади, как шлейф. Известный своим скрытным поведением, этот маленький дикий кот предпочитает одиночество и полагается на свой маскирующий мех, чтобы избежать обнаружения как хищниками, так и добычей. Питаясь в основном мелкими млекопитающими, манул является искусным охотником, использующим своё острое зрение для обнаружения движения на открытой местности."
