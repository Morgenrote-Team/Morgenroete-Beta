 dubois.1032.t: "Вольер с морскими черепахами"
 dubois.1032.d: "Павильон #o морских черепах#! состоит в основном из широкого бассейна с прозрачной водой, окружённого скромными песчаными пляжами. Застеклённое окно ниже ватерлинии позволяет любопытным наблюдать за животными в их родной среде."
 dubois.1032.f1: "Зелёная морская черепаха (Chelonia mydas) — существо восхитительного устройства. С оливковым панцирем и мощными ластами она пересекает тропические и субтропические моря, совершая миграции поразительной протяжённости к пляжам, которые помнит с неизменной верностью. Её спокойный вид скрывает выносливость, достойную океанских просторов."
 dubois.1032.f2: "Цикл размножения совершается с подобающей серьёзностью. После спаривания в море самка ночью выходит на подходящий берег, терпеливо выкапывает гнездовую яму и откладывает яйца, после чего засыпает их песком. В положенный срок детёныши, ведомые небесным светом и инстинктом, устремляются к морю, чтобы начать своё полное опасностей испытание."
 dubois.1032.f3: "В природном хозяйстве зелёная морская черепаха — не праздное украшение. Поедая морские травы, она подрезает и обновляет подводные луга, а её редкая охота на медуз способствует благотворному равновесию. Таким образом, эта рептилия оберегает от излишеств и пастбища, и пелагическую зону."
 dubois.1032.k: "Вернуться к вольерам Австралии и Океании"
 zoo_australian_enclosures_tt: "Вы вернётесь к вольерам Австралии и Океании."
 dubois.1033.t: "Вольер с мантами"
 dubois.1033.d: "В огромном аквариуме обитает несколько #o мант#!; застеклённый туннель позволяет посетителю наблюдать за этими нежными левиафанами, когда они кружат с величественной грацией."
 dubois.1033.f1: "Гигантский морской дьявол (Mobula, обычно называемый мантой) — один из благороднейших скатов. С ромбовидным диском и огромными грудными плавниками он рассекает воду, словно живой воздушный змей, причём некоторые особи достигают размаха более шести метров. Нрав у него мирный, а рацион состоит из мельчайших пелагических существ."
 dubois.1033.f2: "Будучи верными санитарами залитых солнцем морей, манты отцеживают бесчисленное множество планктонных организмов через изящные жаберные тычинки, тем самым умеряя изобилие этих крошечных существ. В излюбленных местах они привлекают внимание более мелких рыб, которые чистят их кожу, — пример взаимной услуги, нередкой в природе."
 dubois.1033.f3: "Натуралисты отмечали у этих скатов склонность к общению: упорядоченные кружения, многократные возвращения к хорошо известным местам кормёжки и даже зачаточное ухаживание, совершаемое размеренными витками. Такие наблюдения свидетельствуют о памяти и постоянстве, достойных упоминания."
 dubois.1034.t: "Вольер с коалами"
 dubois.1034.d: "Роща эвкалиптов, посаженная с продуманным учётом тени и укрытия, предоставляет #o коале#! обстановку, очень похожую на её древесный дом."
 dubois.1034.f1: "Коала (Phascolarctos cinereus) по своему обыкновению является древесным и малоподвижным животным. С помощью цепких лап и противопоставленных пальцев она взбирается и отдыхает на эвкалиптах, питаясь почти исключительно их листьями. Медленный пульс и размеренное дыхание свидетельствуют об экономии сил, приспособленной к скудной пище."
 dubois.1034.f2: "Материнская забота является образцовой. Крошечный и беспомощный детёныш при рождении добирается до безопасности сумки, где он кормится и растёт. В должное время мать приучает его к особому рациону вида, и после этого он ездит у неё на спине, изучая места и нравы деревьев."
 dubois.1034.f3: "Хотя этот вид более склонен к молчанию, чем к речи, он использует низкий рёв и грубые звуки — особенно самец — чтобы заявить о своей территории и брачном сезоне. Эти звуки, с их неожиданной глубиной, разносятся далеко в тишине рощи."
 dubois.1035.t: "Вольер с кенгуру"
 dubois.1035.d: "Степной загон с высокой травой и разбросанными красными камнями отведён для #o кенгуру#!, чей уникальный способ передвижения здесь можно изучать на досуге."
 dubois.1035.f1: "Рыжий кенгуру (Osphranter rufus) — чудо прыжкового передвижения. Эластичные сухожилия задних конечностей и мощный хвост позволяют совершать продолжительные прыжки со значительной скоростью; зрелище стаи в движении даёт урок механического искусства природы."
 dubois.1035.f2: "Материнская забота кенгуру представляет особый интерес. Крошечный новорождённый, немногим больше живого зародыша, самостоятельно добирается до сумки и там завершает своё развитие на соске. Натуралисты отмечают, что самка может вынашивать последующих детёнышей с восхитительной природной экономностью."
 dubois.1035.f3: "Социальный порядок поддерживается позами и знаками: стук ногой при тревоге, шипение и низкое рычание в спорах, а также формальные демонстрации среди самцов. Таким образом, ранг и право утверждаются без излишнего насилия."
 dubois.1036.t: "Вольер с утконосами"
 dubois.1036.d: "Чистый, прохладный ручей с тенистыми берегами создаёт обстановку для #o утконоса#!, который проводит большую часть времени в воде или в норе."
 dubois.1036.f1: "Утконос (Ornithorhynchus anatinus) — это однопроходное, яйцекладущее млекопитающее, чьё строение поразило учёный мир при первом сообщении о нём. С мягким клювом, перепончатыми лапами и густым мехом он изысканно приспособлен к жизни в ручье; самец носит на задней лапе ядовитую шпору, с которой рекомендуется соблюдать осторожность."
 dubois.1036.f2: "Его домашнее хозяйство любопытно. Самка готовит нору, строит гнездо из листьев и откладывает небольшую кладку яиц. Детёныши, вылупившись слепыми и голыми, питаются молоком, выделяемым на коже — сосков нет — пока не смогут добывать пищу самостоятельно."
 dubois.1036.f3: "Хотя утконос и немногословен, он заявляет о своём присутствии знаками и запахом; территории самцов поддерживаются с некоторой энергией, особенно в брачный сезон. Их ныряние и исследование дна в поисках личинок насекомых представляют собой приятное зрелище трудолюбия."
 dubois.1036.f4: "#o Утконос Перри пропал из Садов!#!\nКраткий переполох последовал за обнаружением того, что одного из наших утконосов по кличке Перри не удалось найти в его убежище. Смотрители, господа Финес Флинн и Ферб Флетчер, советуют сохранять терпение: «Наш Перри имеет обыкновение прятаться там, где никто и не подумает искать, и неизменно появляется до конца дня».\n\n#o Учёный спасён от несчастного случая в лаборатории!#!\nДоктор Хайнц Фуфелшмертц едва избежал травм, когда эксперимент завершился взрывом. По счастливой случайности — или благодаря своевременному вмешательству неизвестного благодетеля — учёный не получил серьёзных повреждений."
 dubois.1032.g: "Утконос? Перри-утконос!"
 dubois_unknown_hero_modifier: "Неизвестный герой"
 dubois.1037.t: "Вольер с казуарами"
 dubois.1037.d: "Густо засаженный участок, устроенный как полоса тропического леса, вмещает #o южных казуаров#! — знаменитых «садовников» тех краёв."
 dubois.1037.f1: "Южный казуар (Casuarius casuarius) — крупная нелетающая птица, чьё тёмное оперение и кобальтовая кожа оттеняются рогоподобным шлемом. Будучи главным плодоядным животным, он распространяет множество лесных семян в целости и сохранности, и таким образом вносит существенный вклад в обновление лесов."
 dubois.1037.f2: "Шлем, назначение которого обсуждается, может помогать в продирании сквозь густую растительность или в проведении звука. Ноги мощные, вооружены грозным внутренним когтем; птица использует их скорее для решительности, чем для агрессии, однако благоразумие не помешает."
 dubois.1037.f3: "В их семейных отношениях полы делят обязанности неравномерно. Обычно именно самец высиживает яйца и сопровождает полосатых птенцов, в то время как самка возвращается к свободной жизни. Такое устройство, хотя и необычно среди птиц, является постоянным в этом племени."
 dubois.1038.t: "Вольер с новозеландскими морскими львами"
 dubois.1038.d: "Широкий бассейн, окружённый скалами и уступами, предоставляет #o новозеландским морским львам#! место как для принятия солнечных ванн, так и для ныряния; подводная смотровая площадка, без сомнения, порадовала бы будущие поколения."
 dubois.1038.f1: "Новозеландский морской лев (Phocarctos hookeri), обитающий по воле природы на южных островах, — это крепкий ластоногий с привлекательными повадками. В воде это грациозное существо; на суше — общительное и верное своей колонии."
 dubois.1038.f2: "С обтекаемой формой тела и сильными передними ластами он мчится под волнами в погоне за рыбой и головоногими. Вместительные глаза, хорошо приспособленные к полумраку, помогают в захвате добычи там, где света мало."
 dubois.1038.f3: "В брачный сезон самцы заявляют о своих правах глубоким рёвом и позами на скалах; таких демонстраций в основном достаточно, чтобы установить первенство и обеспечить внимание самок. Таким образом, на лежбище поддерживается порядок без вечной борьбы."
