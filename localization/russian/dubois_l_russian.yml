 dubois.1049.t: "Вольер с лосями"
 dubois.1049.d: "В лесистом вольере зоопарка стоит величественный европейский лось, его массивные рога тянутся к небу."
 dubois.1049.f1: "Спокойное поведение и внушительные размеры лося привлекают внимание посетителей, которые восхищаются масштабом этого нежного гиганта. Заинтересовавшись его впечатляющими рогами, вы подходите к смотрителю за дополнительной информацией.\n«Европейские лоси, или Moose, как их называют в Северной Америке, — самые крупные представители семейства оленевых», — объясняет смотритель. «Их рога могут достигать в размахе до шести футов и используются в основном во время гона, когда самцы соревнуются за самок. Эти рога сбрасываются и отрастают каждый год, причём новый набор становится больше и сложнее по мере взросления лося»."
 dubois.1049.f2: "В тенистом углу среды обитания лося крупный самец европейского лося опускает свою массивную голову, чтобы пощипать нежные побеги и листья. Тихое, ритмичное движение его челюстей, когда он жуёт, почти гипнотизирует, привлекая толпу зрителей. Заинтригованные пищевыми привычками лося, вы обращаетесь к смотрителю, чтобы узнать больше.\n«Лоси — это животные, питающиеся ветками и листьями», — объясняет смотритель. «В отличие от пастбищных животных, которые едят в основном траву, лоси предпочитают питаться разнообразной растительностью, включая листья, кору и водные растения. У них острое обоняние, которое помогает им находить самые питательные растения в их среде. В дикой природе они могут съедать до 70 фунтов пищи в день, что необходимо для поддержания их больших тел»."
 dubois.1049.f3: "Среди шелеста деревьев вольера европейский лось внезапно издаёт глубокий, резонирующий рёв, его крик эхом разносится по воздуху. Звук привлекает внимание всех находящихся поблизости, которые останавливаются, чтобы послушать этот первобытный зов. Заинтересовавшись значением этой вокализации, вы подходите к смотрителю за разъяснениями.\n«Это был рёв гона», — объясняет смотритель. «Во время брачного сезона самцы лосей используют эти громкие вокализации для установления доминирования и привлечения самок. Рёв слышен на больших расстояниях и часто сопровождается демонстрацией рогов и агрессивными позами. Это мощное напоминание о роли лося как доминирующей силы в его естественной среде обитания»."
