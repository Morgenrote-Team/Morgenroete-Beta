 dubois.442.t: "Геологические знания"
 dubois.442.d: "Во время своего пребывания в горах [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] подробно изучил[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] гору, составил[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] её карту и сделал[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] научные интерпретации. К удивлению всей альпинистской команды, на следующее утро он удивил их рельефной картой, на которой были показаны опасности и более гладкие подъёмы горы."
 dubois.442.f: "«Зачем я это сделал[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')]? О, мне просто было немного скучно, и я также каталогизировал[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] свои минералы. Ничего особенного! Я даже не раскрасил[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] её...»"
 dubois.442.g: "Слава богу, у нас есть доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName]"
 dubois.443.t: "Прекрасный минерал"
 dubois.443.d: "Альпинистская группа уже жаловалась на медлительность геолога, который как учёный был скорее обузой, чем помощью; но, как оказалось, доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] обнаружил[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] редкий материал во время восхождения на вершину."
 dubois.443.g: "Какой милый маленький сюрприз."
