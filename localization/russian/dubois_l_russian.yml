 dubois.251.t: "Неизвестные человеческие кости"
 dubois.251.d: "В ходе своих палеонтологических исследований [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName] обнаружил[SelectLocalization(SCOPE.sCharacter('dubois_paleontologist_scope').IsFemale, 'а', '')] человеческие кости доисторических времён. Им, вероятно, десятки тысяч лет. [SelectLocalization(SCOPE.sCharacter('dubois_paleontologist_scope').IsFemale, 'Она', 'Он')] надёжно отправил[SelectLocalization(SCOPE.sCharacter('dubois_paleontologist_scope').IsFemale, 'а', '')] кости, чтобы ими мог заняться профессионал."
 dubois.251.f: "К своему изумлению, [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолог#!#!')] [SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'обнаружила', 'обнаружил')] останки человеческого скелета в верхнем слое породы. Однако [SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'она не смогла', 'он не смог')] восстановить связи. Профессор [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] обладает базовыми знаниями в палеоантропологии, но не хочет высказывать своё мнение, так как это может повлиять на научный результат."
