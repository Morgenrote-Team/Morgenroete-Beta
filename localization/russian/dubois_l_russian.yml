 dubois.1061.t: "Южноамериканские вольеры"
 dubois.1061.d: "Южноамериканский вольер предлагал различные, очень разнообразные среды обитания. От тропических лесов до более сухих районов, огромных скал и пампы."
 dubois.1061.g: "Посетить #o бурогорлых ленивцев#!"
