 dubois_getting_axolotl: "\n- #n Аксолотлей#! можно найти в области #bold Мехико#!"
 dubois.1052.t: "Вольер с белыми медведями"
 dubois.1052.d: "Вольер #o белого медведя#!, вероятно, самый неестественный вольер в любом зоопарке. Не потому, что зоопарки не стараются, а скорее потому, что регионы, в которых находятся зоопарки, привлекают посетителей, только если они не на Северном полюсе. Тем не менее, скалистый вольер был приятным местом для белых медведей."
 dubois.1052.f1: "В обширном вольере в арктическом стиле великолепное существо, известное как белый медведь, бродит по своей скалистой среде обитания, его густой белый мех и мощное сложение привлекают внимание. Заинтригованные его величественным присутствием, вы подходите к знающему смотрителю, желая узнать больше об этом культовом арктическом хищнике.\n\n«Белый медведь, символ арктической дикой природы, — настоящее чудо приспособления к экстремальному холоду, — начинает смотритель. — С их густым мехом, слоем жира и перепончатыми лапами белые медведи уникально приспособлены для выживания при минусовых температурах. Они отличные пловцы, способные преодолевать огромные расстояния в поисках пищи, которая в основном включает тюленей»."
 dubois.1052.f2: "В увлекательном полярном ландшафте зоопарка мать-медведица заботливо ухаживает за своими детёнышами, их пушистый белый мех и игривые выходки очаровывают посетителей всех возрастов. Заинтригованные их материнской связью, вы обращаетесь к знающему смотрителю, надеясь узнать больше о жизни этих арктических гигантов.\n\n«Белые медведи — преданные матери, заботливо ухаживающие за своими детёнышами, — объясняет смотритель. — После беременности около восьми месяцев самка рожает от одного до трёх детёнышей в берлоге, устроенной в сугробе. Выживание детёнышей зависит от тепла и питания матери, они кормятся её жирным молоком, пока не будут готовы отправиться в ледяной мир. Мать-медведица обучает своих детёнышей основным навыкам, таким как охота и навигация по коварному морскому льду»."
 dubois.1052.f3: "В арктической среде обитания белый медведь отдыхает на снежном холме, его величественное присутствие излучает и силу, и безмятежность. Заинтригованные его поведением, вы подходите к знающему смотрителю, надеясь понять значение его действий.\n\n«Белые медведи известны своей способностью сохранять энергию и демонстрировать поведение, называемое „ходячей спячкой“, — делится смотритель. — В летние месяцы, когда пищи мало, они входят в состояние пониженной активности, полагаясь на свои жировые запасы для выживания. Эта адаптация помогает им пережить скудные периоды до возвращения морского льда, который открывает доступ к их основному источнику пищи — тюленям. Понимая это поведение, мы можем обеспечить надлежащий уход и обогащение среды для белых медведей в нашем зоопарке»."
 dubois.1052.k: "Вернуться к североамериканским вольерам"
 zoo_north_american_enclosures_tt: "Вы вернётесь к североамериканским вольерам зоопарка."
 dubois.1053.t: "Вольер с медведями гризли"
 dubois.1053.d: "Большую часть вольера #o медведей гризли#! занимала грубая деревянная площадка. Она предоставляла всё необходимое для гризли, от укрытий до небольшого пруда для охлаждения."
 dubois.1053.f1: "В суровом вольере в стиле дикой природы мощное и внушающее трепет существо, известное как медведь гризли, бродит с властным видом, его густой мех и громоздкое телосложение привлекают внимание посетителей. Заинтригованные его грозной натурой, вы подходите к знающему смотрителю, желая узнать больше об этом культовом североамериканском медведе.\n\n«Медведь гризли, также известный как североамериканский бурый медведь, является символом силы и дикой природы, — начинает смотритель. — Эти величественные медведи хорошо приспособлены к своей среде обитания, с их мускулистыми телами, острыми когтями и острым обонянием. Они всеядны, добывая разнообразную пищу, включая ягоды, рыбу, мелких млекопитающих и даже растения. Роль медведя гризли как ключевого вида влияет на баланс экосистем, в которых они обитают»."
 dubois.1053.f2: "В обширной среде обитания гризли в зоопарке мать-гризли ведёт своих игривых детёнышей по скалистой местности, их пушистые шкуры и игривые выходки вызывают улыбки у зрителей. Заинтригованные их семейной динамикой, вы обращаетесь к знающему смотрителю, надеясь узнать больше о жизни этих великолепных медведей.\n\n«Медведи гризли известны своими сильными материнскими инстинктами и тесными семейными узами, — объясняет смотритель. — После периода спячки мать выходит со своими детёнышами, обучая их жизненно важным навыкам выживания, таким как рыбалка, добыча пищи и определение потенциальных угроз. Она обеспечивает их благополучие и передаёт свою мудрость, готовя их к независимой жизни в дикой природе. Наблюдение за взаимодействием между матерью и детёнышами является свидетельством заботливой стороны этих могущественных существ»."
 dubois.1053.f3: "Среди суровых пейзажей вольера для гризли массивный самец гризли неуклюже пересекает местность, его мощные шаги и редкое фырканье утверждают его доминирование и территориальность. Заинтригованные его поведением, вы подходите к знающему смотрителю, надеясь понять значение этих демонстраций.\n\n«Гризли демонстрируют увлекательное территориальное поведение, — делится смотритель. — Самцы устанавливают свои территории, помечая их запахом и звуками, как средство утверждения доминирования и привлечения потенциальных партнёрш. Они участвуют в различных демонстрациях, таких как вставание на задние лапы и трение телом о деревья, чтобы оставить запаховые метки и сообщить о своём присутствии. Это поведение является неотъемлемой частью социальной динамики и успеха в размножении этих великолепных медведей»."
 dubois.1053.f4: "Жёлтая пресса сходит с ума! Один из наших знаменитых медведей гризли сбежал из зоопарка, но пока чиновники били тревогу, медведь столкнулся с приезжим греческим силачом в соседнем парке. Силач, который просто коротал время, катаясь в карете с местной молодой женщиной, действовал быстро, схватился со зверем и отправил медведя в нокаут. Когда на место прибыла полиция, они не могли поверить своим глазам, таков был подвиг. Местная пресса тут же окрестила силача «новым Геркулесом» и прославляла его храбрость. Несмотря на то, что никто не мог понять слов силача из-за его сильного акцента, он стал любимцем как молодых иммигрантов, так и местных жителей. Это, однако, привело к серии несчастных случаев, когда пары намеренно отправлялись в дикую природу, чтобы молодые люди могли доказать свою удаль дамам.\nНаш гризли не пострадал и был возвращён в зоопарк."
 dubois.1054.t: "Вольер с белоголовыми орланами"
 dubois.1054.d: "Суровый, скалистый вольер был домом для #o белоголового орлана#!. Благодаря сетке над вольером животное не могло сбежать."
 dubois.1054.f1: "Величественно усевшись на высокой ветке в просторном вольере зоопарка, великолепный белоголовый орлан осматривает свои владения пронзительными глазами, его поразительная белая голова и тёмные, мощные крылья вызывают восхищение посетителей. Заинтригованные его царственным видом, вы подходите к знающему смотрителю, желая узнать больше об этой культовой хищной птице.\n\n«Белоголовый орлан — почитаемый символ силы и свободы, — начинает смотритель. — С их впечатляющим размахом крыльев и острыми когтями эти хищники — грозные охотники. Они в основном питаются рыбой, используя своё острое зрение, чтобы заметить добычу с большой высоты. История успеха в сохранении белоголового орлана демонстрирует важность сохранения среды обитания и защиты этих величественных птиц для будущих поколений»."
 dubois.1054.f2: "В естественном вольере зоопарка пара белоголовых орланов без усилий парит в небе, их синхронный полёт и мелодичные крики разносятся по воздуху. Заинтригованные их воздушным мастерством, вы обращаетесь к знающему смотрителю, надеясь узнать больше о жизни этих культовых птиц.\n\n«Белоголовые орланы известны своими замечательными лётными навыками и сложными брачными ритуалами, — объясняет смотритель. — Во время брачных игр самец и самка исполняют захватывающий воздушный танец, паря и пикируя вместе. Эти демонстрации не только укрепляют их парные узы, но и служат визуальным зрелищем. Наблюдение за грацией и ловкостью этих птиц в полёте поистине внушает трепет»."
 dubois.1054.f3: "На живописном фоне орлиной среды обитания белоголовый орлан сидит на высокой ветке, издавая свой характерный крик, который резонирует с духом дикой природы. Заинтригованные его вокализацией, вы подходите к знающему смотрителю, надеясь понять значение этих звуков.\n\n«Белоголовые орланы используют звуки как форму общения, — делится смотритель. — Их культовые высокие крики, часто ассоциируемые с их присутствием в дикой природе, служат нескольким целям. Эти звуки помогают установить территорию, общаться с партнёром и защищать своё гнездо. Вокальный репертуар белоголового орлана является свидетельством его приспособляемости и способности процветать в разнообразных средах обитания»."
 dubois.1055.t: "Вольер с флоридской пантерой"
 dubois.1055.d: "Царство #o флоридской пантеры#! было наполнено субтропическими растениями и небольшой рекой. Некоторые деревья давали возможность лазать."
 dubois.1055.f1: "В пышном субтропическом вольере зоопарка мощный и ловкий хищник, известный как флоридская пантера, крадётся с безмолвной грацией, его мускулистое тело и пронзительные зелёные глаза приковывают взгляды зрителей. Заинтригованные его уникальным статусом, вы подходите к знающему смотрителю, желая узнать больше об этой очаровательной большой кошке.\n\n«Флоридская пантера — замечательный подвид пумы, — начинает смотритель. — Эндемичные для богатых и разнообразных сред обитания водно-болотных угодий и лесов Флориды, эти пантеры приспособились к процветанию в этой особой среде. С их острыми чувствами, сильными челюстями и невероятной ловкостью они хорошо приспособлены для охоты и выживания в своей естественной среде. Флоридская пантера служит свидетельством замечательного разнообразия дикой природы, встречающейся в этом регионе»."
 dubois.1055.f2: "Среди местной растительности в среде обитания пантер самец флоридской пантеры издаёт низкий, вибрирующий крик, который разносится по воздуху, демонстрируя его присутствие и территориальность. Заинтригованные его вокализацией, вы подходите к знающему смотрителю, надеясь понять значение этих звуков.\n\n«Флоридские пантеры общаются с помощью ряда звуков, — делится смотритель. — Самцы используют крики, включая рычание, шипение и вопли, чтобы установить своё доминирование и защитить свои территории. Эти звуки помогают отпугивать потенциальных соперников и общаться с находящимися поблизости самками. Прислушиваясь к их вокальному репертуару, исследователи и защитники природы получают ценные сведения о поведении и динамике популяции флоридской пантеры»."
 dubois.1055.f3: "Среди местной растительности в среде обитания пантер самец флоридской пантеры издаёт низкий, вибрирующий крик, который разносится по воздуху, демонстрируя его присутствие и территориальность. Заинтригованные его вокализацией, вы подходите к знающему смотрителю, надеясь понять значение этих звуков.\n\n«Флоридские пантеры общаются с помощью ряда звуков, — делится смотритель. — Самцы используют крики, включая рычание, шипение и вопли, чтобы установить своё доминирование и защитить свои территории. Эти звуки помогают отпугивать потенциальных соперников и общаться с находящимися поблизости самками. Прислушиваясь к их вокальному репертуару, исследователи и защитники природы получают ценные сведения о поведении и динамике популяции флоридской пантеры»."
 dubois.1055.f4: "[SCOPE.sCharacter('manzoni_literary_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('manzoni_literary_scope').IsFemale, 'написала', 'написал')] стихотворение, вдохновившись судьбой пантеры в неволе:\n\n«Её взор от решёток так устал,\nЧто ничего не видит в их мельканье.\nМир для неё — лишь тысячи зеркал\nРешёток, а за ними — мирозданья нет.\n\nХод плавный, гибкий, сильный шаг\nВ крохотном круге всё идёт и длится,\nСловно пляс силы вокруг оси,\nГде воля мощная параличом томится.\n\nЛишь иногда зрачка завеса вдруг\nБесшумно впустит образ мимолётный,\nПройдёт он через тела тихий круг —\nИ в сердце канет, мёртвый и бесплотный»."
 dubois.1056.t: "Вольер с американскими бизонами"
 dubois.1056.d: "#o Американские бизоны#! жили в огромном вольере. Вольер пытался воссоздать тот же ландшафт, что и на американском Среднем Западе. Большая часть вольера была покрыта прерийными травами, на которых бизоны могли пастись."
 dubois.1056.f1: "В обширном вольере в стиле прерий могучее и величественное существо, известное как американский бизон, бродит с властным видом, его массивное тело и впечатляющие рога привлекают внимание посетителей. Заинтригованные его историческим значением, вы подходите к знающему смотрителю, желая узнать больше об этом культовом символе американского Запада.\n\n«Американский бизон, также известный как буйвол, имеет большое культурное и экологическое значение, — начинает смотритель. — Эти великолепные травоядные бродят по бескрайним лугам огромными стадами, формируя ландшафт и поддерживая множество других видов. Бизоны обладают невероятной силой и выносливостью, способные выдерживать суровые погодные условия и преодолевать большие расстояния в поисках пищи и воды»."
 dubois.1056.f2: "В спокойной среде обитания бизонов в зоопарке стадо американских бизонов мирно пасётся, их массивные тела движутся в унисон по травянистому пространству. Звук их копыт, ударяющихся о землю, резонирует в воздухе, создавая ритмичную гармонию. Заинтригованные их социальной динамикой, вы обращаетесь к знающему смотрителю, надеясь узнать больше о жизни этих культовых травоядных.\n\n«Американские бизоны — высокосоциальные животные, живущие в сплочённых группах, известных как стада, — объясняет смотритель. — В стаде существует иерархическая структура, возглавляемая доминирующими самцами, известными как быки. Эти величественные существа занимаются взаимным уходом за шерстью, общаются с помощью различных звуков и демонстрируют увлекательное поведение во время брачного сезона. Наблюдение за взаимодействием в стаде бизонов даёт представление об их сложной социальной динамике»."
 dubois.1056.f3: "Среди холмистого прерийного ландшафта среды обитания бизонов массивный бык-бизон стоит во весь рост, его лохматая шерсть и грозное присутствие вызывают восхищение посетителей. Заинтригованные его поведением, вы подходите к знающему смотрителю, надеясь понять значение его действий.\n\n«Демонстрация доминирования и силы быком-бизоном — захватывающее зрелище, — делится смотритель. — Во время брачного сезона самцы участвуют в замечательных демонстрациях, чтобы установить свой статус и побороться за возможность спаривания. Это может включать рытьё земли копытами, валяние в пыли и сшибание рогами с соперниками в впечатляющих битвах на силу. Эти демонстрации являются неотъемлемой частью поддержания социальной структуры стада и обеспечения выживания их вида»."
 dubois.1057.t: "Вольер с аллигаторами"
 dubois.1057.d: "Вольер для аллигаторов представлял собой большое болото, которое выглядело так, будто его перенесли прямиком из Флориды."
 dubois.1057.f1: "В увлекательной водно-болотной среде обитания зоопарка доисторическое и грозное существо, известное как аллигатор, скрывается прямо под поверхностью воды, его чешуйчатая шкура и бдительные глаза привлекают внимание посетителей. Заинтригованные его древним видом, вы подходите к знающему смотрителю, желая узнать больше об этой культовой рептилии.\n\n«Аллигаторы — живые реликты ушедшей эпохи, — начинает смотритель. — Эти древние рептилии оставались относительно неизменными на протяжении миллионов лет. Они известны своими мощными челюстями и сильным укусом, что помогает им ловить и поедать разнообразную добычу. Аллигаторы играют важную роль в своих экосистемах, контролируя популяции более мелких животных и поддерживая баланс водно-болотных угодий»."
 dubois.1057.f2: "В спокойной водной среде зоопарка аллигатор греется на залитом солнцем берегу, его бронированное тело и впечатляющие размеры вызывают чувство благоговения. Зрелище его поведения на солнце привлекает внимание посетителей. Заинтригованные его привычками греться на солнце, вы обращаетесь к знающему смотрителю, надеясь узнать больше о поведении этой древней рептилии.\n\n«Аллигаторы — эктотермные существа, что означает, что они зависят от внешних источников тепла для регулирования температуры своего тела, — объясняет смотритель. — Загорание на солнце — важнейшее для них поведение. Греясь на солнце, аллигаторы могут повышать температуру своего тела, что в свою очередь улучшает их метаболизм и уровень энергии. Это поведение особенно важно в холодные месяцы, когда температура их тела падает из-за окружающей среды»."
 dubois.1057.f3: "Среди пышной растительности среды обитания аллигаторов крупный самец аллигатора издаёт глубокое, рокочущее рычание, которое вибрирует в воде, демонстрируя его доминирование и территорию. Заинтригованные его вокализацией, вы подходите к знающему смотрителю, надеясь понять значение этих звуков.\n\n«Вокализация аллигаторов — важнейший аспект их общения, — делится смотритель. — Во время брачного сезона самцы используют свои характерные рёвы, чтобы установить доминирование и привлечь самок. Эти голосовые обмены помогают предотвратить столкновения между конкурирующими самцами. Аллигаторы также используют различные другие звуки, такие как шипение и хрюканье, чтобы общаться друг с другом и утверждать своё присутствие в своих водно-болотных угодьях»."
 dubois.1058.t: "Вольер с аксолотлями"
 dubois.1058.d: "Вольер для аксолотлей был не столько вольером, сколько небольшим прудом в скале. Поскольку аксолотли были довольно маленькими, посетители могли подойти очень близко и почти дотронуться до маленьких животных."
 dubois.1058.f1: "В увлекательной водной среде обитания зоопарка очаровательное и потустороннее существо, известное как аксолотль, скользит по воде, его бахромчатые наружные жабры и уникальный внешний вид привлекают внимание посетителей. Заинтригованные его отличительными чертами, вы подходите к знающему смотрителю, желая узнать больше об этой необыкновенной амфибии.\n\n«Аксолотль — настоящее чудо регенеративных способностей и адаптации, — начинает смотритель. — В отличие от большинства амфибий, аксолотли сохраняют свои ювенильные черты на протяжении всей жизни, явление, известное как неотения. Они славятся своими замечательными регенеративными способностями, способными отращивать утраченные конечности и даже части спинного мозга. Эти способности привлекли внимание учёных и исследователей, предоставляя ценные сведения о регенерации тканей»."
 dubois.1058.f2: "В спокойной водной среде зоопарка аксолотль отдыхает на погружённом камне, его перистые жабры мягко движутся, пока он дышит под водой. Зрелище его уникальных дыхательных адаптаций привлекает внимание посетителей. Заинтригованные его дыхательным поведением, вы обращаетесь к знающему смотрителю, надеясь узнать больше о жизни этой замечательной амфибии.\n\n«Аксолотли обладают уникальными дыхательными особенностями, которые отличают их от других амфибий, — объясняет смотритель. — В то время как большинство амфибий проходят метаморфоз и развивают лёгкие для дыхания на суше, аксолотли остаются водными и полагаются на свои наружные жабры для извлечения кислорода из воды. Их жабры очень эффективны, что позволяет им дышать под водой на протяжении всей жизни. Эта адаптация является свидетельством их специализации для жизни в водной среде»."
 dubois.1058.f3: "Среди водных растений в вольере для аксолотлей группа молодых аксолотлей игриво взаимодействует, их изящные движения и любознательное поведение раскрывают их очаровательные личности. Заинтригованные их взаимодействиями, вы подходите к знающему смотрителю, надеясь понять значение их поведения.\n\n«Аксолотли известны своим любопытным и общительным характером, — делится смотритель. — Это относительно мирные существа, часто мирно сосуществующие со своими соседями по аквариуму. Эти амфибии обладают острым осязанием и могут обнаруживать вибрации в воде. Аксолотли используют эти чувства для исследования своей среды, поиска пищи и взаимодействия друг с другом. Их игривое поведение и взаимодействия добавляют им привлекательности и очарования»."
