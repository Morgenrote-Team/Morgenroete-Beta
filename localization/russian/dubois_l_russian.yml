 dubois.2011.d_north_america: "Профессор [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] — ведущий [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолог#!#!')] нашей страны. В настоящее время [SelectLocalization(ROOT.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'она', 'он')] проводит исследования в скальной формации в #YELLOW Северной Америке#!."
 dubois.2011.d_south_america: "Профессор [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] — ведущий [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолог#!#!')] нашей страны. В настоящее время [SelectLocalization(ROOT.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'она', 'он')] проводит исследования в скальной формации в #YELLOW Южной Америке#!."
