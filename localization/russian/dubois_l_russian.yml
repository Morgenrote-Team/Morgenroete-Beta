 building_dubois_national_park: "Заповедник"
 building_dubois_national_park_desc: "Заповедники — это святилища, где дикому миру дано пространство для дыхания, где древние леса, широкие луга и скрытые долины сохраняются от неумолимого наступления цивилизации. Будь то отведённые под королевские охотничьи угодья или провозглашённые национальными парками, эти убежища предлагают приют редким существам и возможность увидеть величие природы, нетронутой и вечной."
