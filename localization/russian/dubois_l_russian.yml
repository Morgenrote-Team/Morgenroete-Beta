 dubois.901.t: "Конгресс натуралистов: место человека в природе"
 dubois.901.d: "Подготовка к, возможно, самому важному научному конгрессу прошлых и будущих лет завершена. Речь пойдёт не менее чем о таксономической классификации человека — одной из самых горячих тем после того, как [SCOPE.sCharacter('dubois_darwin_scope').GetFullName] создал теорию эволюции. Приглашения будут разосланы всем натуралистам мира. Председательствовать на заседании будет профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]."
 dubois.901.f: "В течение XIX века спор о таксономической классификации человека обострился в связи с формулированием теории эволюции. Хотя давно было известно, что человек похож на человекообразных обезьян, и Карл Линней уже поместил их в отряд приматов, существовало несколько оговорок. Чтобы подчеркнуть уникальность человека, Иоганн Фридрих Блуменбах выделил его из всех остальных приматов как «двурукого» (Bimana) в противоположность «четвероруким» (Quadrumana). Эта классификация, хотя и довольно недавняя, приобрела популярность в академических кругах, например, у влиятельного британского палеонтолога Ричарда Оуэна. Для сторонников теории эволюции это была неприемлемая ситуация, а для анатомов — ужас: это означало, что, согласно этому порядку, горилла была ближе к степному павиану, чем к человеку."
 dubois.901.g: "Мир науки будет нашим гостем."
 dubois.902.d: "[SCOPE.sCountry('dubois_congress_host_country').GetName] пригласил[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')] на международный научный конгресс. Темой будет таксономическая классификация человека в свете теории эволюции. Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] получил[SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'а', '')] тёплое приглашение."
 dubois.902.g: "Мы не пропустим это событие."
 dubois.904.t: "Место человека в природе: уникален или просто ещё одна обезьяна?"
 dubois.904.d: "Всего после двух лекций стало ясно, насколько конкурентным является, по сути, административный процесс в зоологии. Даже академическая дружба раскалывается из-за вопроса о том, как следует классифицировать людей. Очевидно, что верх взял уже не сам научный вопрос как таковой, а связанные с ним последствия."
 dubois.904.f: "После того как в обсуждение были впервые введены морфологические элементы, дебаты сосредоточились на одном конкретном аспекте анатомии: мозге. [SCOPE.sCharacter('dubois_hippocampus_defender_scope').GetFullName] представил[SelectLocalization(SCOPE.sCharacter('dubois_hippocampus_defender_scope').IsFemale, 'а', '')] несколько работ об анатомических различиях между обезьянами и людьми, подчёркивая невозможность превращения обезьян в людей. [SelectLocalization(SCOPE.sCharacter('dubois_hippocampus_defender_scope').IsFemale, 'Она', 'Он')] утверждал[SelectLocalization(SCOPE.sCharacter('dubois_hippocampus_defender_scope').IsFemale, 'а', '')], что люди — это не просто отдельный биологический отряд приматов, а отдельный подкласс млекопитающих, отличный от всех остальных приматов и млекопитающих в целом. Профессор [SCOPE.sCharacter('dubois_hippocampus_defender_scope').GetLastName] основывал[SelectLocalization(SCOPE.sCharacter('dubois_hippocampus_defender_scope').IsFemale, 'а', '')] эту классификацию на трёх характеристиках, самой важной из которых было его утверждение, что только человеческий мозг имеет малый гиппокамп. Этому возразил [SCOPE.sCharacter('dubois_hippocampus_attacker_scope').GetFullName], который настаивал, что эти якобы уникальные черты на самом деле можно найти у человекообразных обезьян. Когда его спросили, может ли он смириться с мыслью, что является всего лишь видоизменённой обезьяной, профессор [SCOPE.sCharacter('dubois_hippocampus_attacker_scope').GetLastName] ответил: «Быть видоизменённой обезьяной так же почётно, как быть видоизменённой грязью»."
 dubois.904.g: "Человек уникален в животном царстве."
 dubois.904.h: "Люди более тесно связаны с обезьянами, чем считалось ранее."
 dubois.905.t: "Уважаемая речь"
 dubois.905.d: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'прочитала', 'прочитал')] лекцию для собравшегося научного персонала в [SCOPE.sCountry('dubois_congress_host_country').GetAltNameNoFlag('RU_CL_PP')], которая вдохновила как аудиторию, так и молодых учёных."
 dubois.905.f: "«Говорит Оуэн, видите ли,\nМозг шимпанзе\nВсегда чрезвычайно мал,\nС задним „рогом“\nНапрочь лишённым,\nИ вовсе без „гиппокампа“.\nНа это Хаксли отвечает,\nЧто Оуэн лжёт,\nИ искажает свою латинскую цитату;\nЧто его факты не новы,\nЕго ошибок немало.\nВ ущерб его репутации».\n —Сэр Филип Эджертон."
 dubois.905.g: "Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] производит значительное впечатление."
 dubois.906.t: "Ценный вклад в дебаты"
 dubois.906.d: "Блестящая научная лекция, которую [SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'прочитала', 'прочитал')] профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], расширила горизонты академического мира на научном конгрессе в [SCOPE.sCountry('dubois_congress_host_country').GetAltNameNoFlag('RU_CL_PP')]. Вероятно, это будет иметь долгосрочный эффект."
 dubois.906.f: "«Он придерживался очень странных теорий по многим вопросам. Однажды он даже выступил в Британской ассоциации и заявил, что у обезьян в мозгу есть большой гиппокамп, как и у людей. Это было шокирующее заявление; ибо, если бы это было так, что стало бы с верой, надеждой и милосердием бессмертных миллионов? Вы можете подумать, что между вами и обезьяной есть и другие, более важные различия, такие как способность говорить, создавать машины, знать, что правильно, а что нет, молиться и другие мелочи такого рода; но это детские фантазии, моя дорогая. Ни на что нельзя полагаться, кроме как на великий тест с гиппокампом. Если у вас в мозгу есть большой гиппокамп, вы не обезьяна, даже если у вас четыре руки, нет ног и вы более обезьяноподобны, чем обезьяны всех обезьянников».\n —Чарльз Кингсли"
 dubois.907.t: "Вопрос о гиппопотаме"
 dubois.907.d: "Споры о роли человека в животном царстве уже привлекли широкое общественное внимание — и не в самом лестном свете. Писатель [SCOPE.sCharacter('dubois_hippopotamus_writer').GetLastName] уже высмеивает учёный спор в одном из своих произведений."
 dubois.907.f: "«Мы были очень восхищены и, могу сказать, весьма заинтересованы, обнаружив, что у всех нас в мозгу есть гиппопотамы. Конечно, я никогда не чувствовал его в своём; но, может быть, он мёртв и потому не шевелится, и тогда, конечно, это не считается, знаете ли. У каждого в голове есть мозг, если только он не скелет; и он обвивал хвостом вещи, как обезьяна, это я знаю, ибо видел собственными глазами. Это профессор Хаксли сказал, что он был у неё в хвосте — не у мистера Хаксли, конечно, а у обезьяны: только у обезьян нет хвостов, так что я не совсем понимаю. А потом другой джентльмен, который выступал последним, мистер Флауэр, знаете, он сказал, что он был по всей обезьяне, везде. Весь в гиппокампах, с головы до ног, бедное животное, как собака вся в клещах! Интересно, почему они не втирают ей в загривок медный купорос, как это делают с пойнтером. Ну, так вот. На чём я остановился? Ах, да! А профессор Оуэн сказал, что у обезьян его вовсе нет, а только у отряда двуруких, то есть у вас и у меня. Ну, ему виднее. И они все тоже лучше знают, потому что они чудовищно умные ребята. Так что один должен быть прав, а все остальные — нет, или один из них неправ, а все остальные — правы, понимаете? Интересно, почему они не подбросят монетку?».\n —Чарльз Кингсли"
 dubois.907.g: "Это уморительно."
 dubois.908.t: "Интеллектуальный или материальный обмен"
 dubois.908.d: "У нашего натуралиста появилось немного свободного времени в кулуарах конгресса, и теперь он размышляет, как лучше его использовать."
 dubois.908.f: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] встретил[SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'а', '')] на научном конгрессе несколько интересных коллег, которые хотели бы обменяться идеями по некоторым научным темам. Обмен опытом был бы чрезвычайно плодотворным. С другой стороны, профессор мог[SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'ла', '')] бы также использовать своё время для обмена коллекциями жуков и растений с другими коллегами..."
 dubois.908.g: "Обменяться идеями с коллегами."
 dubois.908.h: "Обменяться образцами с коллегами."
 dubois.909.t_unique: "Человек уникален"
 dubois.909.t_primate: "Человек и обезьяны родственны"
 dubois.909.d_unique: "Натуралисты завершили свои долгие дебаты. Человек занимает особое положение в животном царстве — об этом учёные заявили в итоговой декларации, которую сегодня торжественно зачитал председатель конгресса."
 dubois.909.d_primate: "Некоторые профессора в гневе покинули зал, когда конгресс завершился и была зачитана итоговая декларация. Учёные пришли к выводу, что люди более тесно связаны с обезьянами, чем считалось ранее."
 dubois.909.f_unique: "«У человека мозг представляет собой восходящую ступень развития, более высокую и ярко выраженную, чем та, которой предыдущий подкласс отличался от нижестоящего. Мозговые полушария не только перекрывают обонятельные доли и мозжечок, но и выходят за пределы одного и простираются дальше другого. Их заднее развитие настолько выражено, что анатомы приписали этой части характер третьей доли; она свойственна роду Homo, и столь же своеобразны „задний рог бокового желудочка“ и „малый гиппокамп“, которые характеризуют заднюю долю каждого полушария. Поверхностное серое вещество головного мозга, благодаря числу и глубине извилин, достигает у человека максимального развития. С этой высшей формой мозга связаны особые умственные способности, и их последствия удивительно иллюстрируют ценность церебрального характера; согласно моей оценке которого, я прихожу к выводу, что род Homo является не просто представителем отдельного отряда, но и отдельного подкласса млекопитающих, для которого я предлагаю название „ARCHENCEPHALA“».\n —Ричард Оуэн"
 dubois.909.f_primate: "«Совершенно очевидно, что обезьяна, наиболее близкая к человеку, — это либо шимпанзе, либо горилла. В общих пропорциях тела и конечностей существует заметная разница между гориллой и человеком; в какой бы пропорции горилла ни отличалась от человека, другие обезьяны отходят от гориллы ещё дальше, и, следовательно, такие различия в пропорциях не могут иметь порядкового значения. В важном вопросе объёма черепа люди различаются между собой сильнее, чем с обезьянами; в то время как низшие обезьяны отличаются, в пропорции, от высших так же сильно, как последние от человека. Отсюда очевидно, что, как бы сильно ни отличался зубной ряд высшей обезьяны от человека, он гораздо сильнее отличается от зубного ряда низших и самых низших обезьян. Таким образом, какую бы систему органов ни изучать, сравнение их модификаций в ряду обезьян приводит к одному и тому же результату — структурные различия, отделяющие человека от гориллы и шимпанзе, не так велики, как те, что отделяют гориллу от низших обезьян».\n —Томас Генри Хаксли"
 dubois.909.g: "Человек — венец творения."
 dubois.909.h: "Мы просто безволосые обезьяны?"
 dubois.911.t: "Антропологический конгресс: происхождение современного человека"
 dubois.911.d: "Наша страна проведёт самый важный конгресс в истории антропологии. Один из великих вопросов человечества, а именно вопрос о его происхождении, должен быть прояснён. Антропологи со всего мира обсудят, произошло ли это в Европе, Азии или Африке. Дебаты возглавит [SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName]."
 dubois.911.f: "Откуда происходит человек? Библейская история об изгнании из рая уже содержит ядро этого вопроса — очевидно, он не происходит из того региона, в котором живёт сегодня. Следовательно, в Европе долгое время древние человеческие кости считались останками тех людей, которые погибли во время Всемирного потопа, — точно так же, как динозавры долгое время считались животными, которым не нашлось места на ковчеге. С постулированием теории ледникового периода и последующими геологическими и палеонтологическими исследованиями, которые показали, что Земля значительно старше, чем ожидалось, интерес к «пещерным людям» возрос. Позднее, с появлением теории эволюции и открытием доисторических костей, которым было более нескольких тысяч лет, вопрос о месте происхождения современного человека стал более острым."
 dubois.911.g: "Где колыбель человечества?"
 dubois.912.d: "[SCOPE.sCountry('dubois_congress_host_country').GetName] пригласил[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')] на международный научный конгресс. Темой будет происхождение современного человека. Профессор [SCOPE.sCharacter('lepsius_anthropologist_scope').GetLastName] получил[SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'а', '')] тёплое приглашение."
 dubois.914.t: "Современный человек появился в Европе, Азии или Африке?"
 dubois.914.d: "Академический мир разделился на три лагеря. Вопрос о колыбели человечества связан не только с определённой национальной гордостью, но и с дальнейшими тезисами об эволюции человека."
 dubois.914.f: "В оживлённой дискуссии соответствующие сторонники трёх лагерей обменялись своими аргументами. [SCOPE.sCharacter('dubois_europe_defender_scope').GetLastName] выдвинул[SelectLocalization(SCOPE.sCharacter('dubois_europe_defender_scope').IsFemale, 'а', '')] Европу, потому что находки до сих пор показывали наибольший объём мозга у европейских окаменелостей. Поскольку больший мозг предшествовал прямохождению, это неизбежно. [SCOPE.sCharacter('dubois_asia_defender_scope').GetLastName] усомнился в этой теории. Окаменелости прямоходящих, человекоподобных представителей уже были найдены в Азии — следовательно, мозг развился только после прямохождения. [SCOPE.sCharacter('dubois_africa_defender_scope').GetLastName], с другой стороны, указал[SelectLocalization(SCOPE.sCharacter('dubois_africa_defender_scope').IsFemale, 'а', '')], что известные виды обезьян, наиболее близкие к человеку, происходят из Африки, а не из Азии. Как и предполагал создатель теории эволюции, происхождение человечества следует искать именно там."
 dubois.914.g: "Современный человек развился в Европе."
 dubois.914.h: "Всё указывает на азиатское происхождение."
 dubois.914.i: "Колыбель человечества лежит в Африке."
 dubois.915.t: "Уважаемая речь"
 dubois.915.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'прочитала', 'прочитал')] лекцию для собравшегося научного персонала в [SCOPE.sCountry('dubois_congress_host_country').GetAltNameNoFlag('RU_CL_PP')], которая вдохновила как аудиторию, так и молодых учёных."
 dubois.915.f: "«Земля — колыбель человечества, но нельзя вечно оставаться в колыбели».\n —Константин Циолковский."
 dubois.915.g: "Профессор [SCOPE.sCharacter('lepsius_anthropologist_scope').GetLastName] производит значительное впечатление."
 dubois.916.t: "Ценный вклад в дебаты"
 dubois.916.d: "Блестящая научная лекция, которую [SelectLocalization(SCOPE.sCharacter('lepsius_anthropologist_scope').IsFemale, 'прочитала', 'прочитал')] профессор [SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName], расширила горизонты академического мира на научном конгрессе в [SCOPE.sCountry('dubois_congress_host_country').GetAltNameNoFlag('RU_CL_PP')]. Вероятно, это будет иметь долгосрочный эффект."
 dubois.916.f: "«Он придерживался очень странных теорий по многим вопросам. Однажды он даже выступил в Британской ассоциации и заявил, что у обезьян в мозгу есть большой гиппокамп, как и у людей. Это было шокирующее заявление; ибо, если бы это было так, что стало бы с верой, надеждой и милосердием бессмертных миллионов? Вы можете подумать, что между вами и обезьяной есть и другие, более важные различия, такие как способность говорить, создавать машины, знать, что правильно, а что нет, молиться и другие мелочи такого рода; но это детские фантазии, моя дорогая. Ни на что нельзя полагаться, кроме как на великий тест с гиппокампом. Если у вас в мозгу есть большой гиппокамп, вы не обезьяна, даже если у вас четыре руки, нет ног и вы более обезьяноподобны, чем обезьяны всех обезьянников».\n —Чарльз Кингсли"
 dubois.917.t: "Загадочный череп"
 dubois.917.d: "На конференции появился антрополог-любитель с неизвестной окаменелостью. Он хотел бы продать её научному обществу, но за баснословную цену. Многие антропологи отвергают подход «кота в мешке»."
 dubois.917.f: ""
 dubois.917.g: "Каждая кость ценна для нашей коллекции."
 dubois.917.h: "...но эта кость, очевидно, ничего не стоит."
 dubois.919.t_europe: "Современный человек происходит из Европы"
 dubois.919.t_asia: "Современный человек происходит из Азии"
 dubois.919.t_africa: "Современный человек происходит из Африки"
 dubois.919.d_europe: "Международная наука согласилась с европейским происхождением современного человечества. Неевропейские учёные осудили это решение как супремасизм."
 dubois.919.d_asia: "Международный антропологический конгресс недавно пришёл к компромиссу, что человек должен происходить из Азии. Большинство членов ассамблеи согласились с этой точкой зрения."
 dubois.919.d_africa: "После очень спорных финальных дебатов учёные смогли с небольшим перевесом голосов согласиться, что происхождение человечества следует искать в Африке."
 dubois.919.f_europe: "Исторически вопрос о фактическом месте происхождения человечества не был решён в начале XX века. В то время как небольшая группа, частично введённая в заблуждение открытием так называемого пилтдаунского человека, подозревала происхождение современного человека в Европе скорее по идеологическим, чем по научным причинам, азиатская теория получила наибольшую поддержку. Большую роль в этом сыграли открытия на Яве и находка синантропа. Лишь с середины XX века всё больше и больше африканских находок начали подрывать эту точку зрения."
 dubois.919.f_asia: "Исторически вопрос о фактическом месте происхождения человечества не был решён в начале XX века. В то время как небольшая группа, частично введённая в заблуждение открытием так называемого пилтдаунского человека, подозревала происхождение современного человека в Европе скорее по идеологическим, чем по научным причинам, азиатская теория получила наибольшую поддержку. Большую роль в этом сыграли открытия на Яве и находка синантропа. Лишь с середины XX века всё больше и больше африканских находок начали подрывать эту точку зрения."
 dubois.919.f_africa: "Исторически вопрос о фактическом месте происхождения человечества не был решён в начале XX века. В то время как небольшая группа, частично введённая в заблуждение открытием так называемого пилтдаунского человека, подозревала происхождение современного человека в Европе скорее по идеологическим, чем по научным причинам, азиатская теория получила наибольшую поддержку. Большую роль в этом сыграли открытия на Яве и находка синантропа. Лишь с середины XX века всё больше и больше африканских находок начали подрывать эту точку зрения."
 dubois.919.g: "Как и ожидалось, человечество эволюционировало в Европе."
 dubois.919.h: "Все доказательства указывают на то, что человечество эволюционировало в Азии."
 dubois.919.i: "«Из Африки» теперь является утверждённым тезисом."
 dubois.921.t: "Палеонтологический конгресс: вымирание динозавров"
 dubois.921.d: "Нашей стране выпала честь подготовить один из самых важных конгрессов в палеонтологии. Учёные со всего мира съедутся в [SCOPE.sCountry('dubois_congress_host_country').GetAltNameNoFlag('RU_CL_VP')], чтобы ответить на вопрос, почему вымерли динозавры. [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName] уже выбрал[SelectLocalization(SCOPE.sCharacter('dubois_paleontologist_scope').IsFemale, 'а', '')] свой любимый пробковый шлем, который наденет во время вступительной речи."
 dubois.921.f: "Вопрос о том, что привело к вымиранию динозавров, мучает человечество с того дня, как была найдена первая кость динозавра и классифицирована как часть неизвестного вида. До XIX века люди довольствовались тем, что считали динозавров животными, которые не попали на Ноев ковчег во время Потопа. По мере развития новых геологических и палеонтологических методов картина стала более nuanced. Идея потопа всё ещё жила у Жоржа Кювье, хотя и в противоположном направлении: он считал, что уровень моря понизился, и ящеры, которых он обнаружил на водно-болотных угодьях, потеряли свою среду обитания. Это была лишь одна из многочисленных теорий, которые появятся в течение следующих полутора веков — неудовлетворительные ответы."
 dubois.921.g: "Будет ли когда-нибудь дан ответ на этот вопрос?"
 dubois.922.d: "[SCOPE.sCountry('dubois_congress_host_country').GetName] пригласил[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')] на международный научный конгресс. Темой будет причина вымирания динозавров. Профессор [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] получил[SelectLocalization(SCOPE.sCharacter('dubois_paleontologist_scope').IsFemale, 'а', '')] тёплое приглашение."
 dubois.922.f: "Это будет событие десятилетия."
 dubois.923.t: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]: революционная теория"
 dubois.923.d: "Незадолго до начала конгресса самый признанный астроном нашей страны, [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], объявил[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')], что у него есть собственная идея о том, что могло привести к вымиранию динозавров: падение астероида! [SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'Она', 'Он')] просит, чтобы этот тезис был распространён среди палеонтологов."
 dubois.923.f: "Хотя профессор [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] не был[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] палеонтологом, [SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'она была знакома', 'он был знаком')] с космическими явлениями — и знал[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] об их разрушительной силе. В XIX веке на небе можно было наблюдать несколько удивительных больших комет, но в то же время, в случае с Тунгуской, человечество испытало на себе, на что способны внеземные обломки скал. Астроном не только произвёл теоретические расчёты, но и собрал образцы, которые содержали необычные материалы в определённых слоях пород, в том числе на границе мелового периода. Профессор [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] и профессор [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] постоянно общались, и двое знаменитых учёных обменялись мнениями и, с помощью самых современных физических знаний, пришли к выводу, что падение астероида было самой логичной причиной конца эпохи динозавров — не столько из-за самого удара, сколько из-за его экологических и климатических последствий."
 dubois.923.g: "Это fascin... увлекательная идея."
 dubois.923.h: "Это совершенно абсурдно."
 dubois.924.t: "Почему вымерли динозавры?"
 dubois.924.d: "Палеонтологи собрались вместе — и мнения по вопросу массового вымирания в конце мелового периода разделились. Здесь не два или три лагеря — а мешанина из тезисов, которые часто лишь незначительно отличаются по степени вероятности и безумия."
 dubois.924.f: "С момента открытия динозавров циркулировали самые фантастические попытки объяснить, почему динозавры исчезли с лица земли. Вот лишь некоторые из них."
 dubois.924.a: "Причиной было падение астероида."
 dubois.924.g: "Уровень моря понизился и разрушил среду обитания."
 dubois.924.h: "Содержание кислорода в атмосфере Земли поднялось до уровней, более подходящих для птиц и млекопитающих."
 dubois.924.i: "Неадаптивные черты привели к эволюционному тупику."
 dubois.924.j: "Снижение сексуальной активности привело к вымиранию."
 dubois.924.k: "Патологический гигантизм!"
 dubois.924.l: "Конкуренция с млекопитающими, которые поедали их яйца."
 dubois.924.m: "Изменение климата."
 dubois.924.n: "Извержения вулканов."
 dubois.924.o: "Бомбардировка космическим или ультрафиолетовым излучением."
 dubois.924.p: "Размер мозга динозавров уменьшался в течение мезозоя, пока, по сути, они не стали слишком глупы, чтобы жить."
 dubois.929.t: "Палеонтологический конгресс завершается"
 dubois.929.d_asteroid: "В итоговой декларации палеонтологический конгресс объявил, что пришёл к решению: тезис о том, что падение астероида в одиночку предрешило конец динозавров, представляется убедительной идеей."
 dubois.929.d_climate: "С удручённым вздохом профессор принимающей страны начал сегодня лекцию, в которой с тревогой указал на вымирание динозавров из-за изменения климата."
 dubois.929.d_sex: "Несколько смущённо и с долгим откашливанием председатель палеонтологического конгресса объяснил, что причиной гибели динозавров стало отсутствие полового размножения. Возражение профессора Тоттенхэма, что он всегда считал свою жену бронтозавром, было занесено в протокол с порицанием."
 dubois.929.d_mammals: "После нескольких дней обсуждений палеонтологи пришли к выводу, что конкуренция с млекопитающими предвещала конец динозавров. Они подозревают, что грызуны предпочитали поедать яйца динозавров."
 dubois.929.d_fat: "Сегодня, с убеждённостью в голосе, председатель палеонтологического конгресса со всей серьёзностью зачитал документ, который поддерживал веру в то, что динозавры просто стали слишком большими и толстыми, что привело к их неизбежному вымиранию. Замечание профессора Тоттенхэма, что это означает, что кресло председателя скоро освободится, привело к публичному порицанию."
 dubois.929.d_stupid: "В итоговой декларации, зачитанной сегодня палеонтологическим конгрессом, подробно объясняется, что мозг динозавров становился всё меньше и меньше в течение миллионов лет, пока, в конце концов, они не стали просто слишком глупы, чтобы выжить. Заявление профессора Тоттенхэма, что это было бы желательно и для некоторых научных коллег до конгресса, в протокол не вошло."
 dubois.929.f: "Именно так на самом деле считали некоторые важные учёные XIX и начала XX веков."
 dubois.929.g: "Виной тому было падение астероида."
 dubois.929.h: "Неловкая теория, но единственная принятая."
