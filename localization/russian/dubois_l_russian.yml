 dubois.271.t_cretaceous: "Доисторический пейзаж: меловой период"
 dubois.271.t_jurassic: "Доисторический пейзаж: юрский период"
 dubois.271.t_triassic: "Доисторический пейзаж: триасовый период"
 dubois.271.d: "Доктор [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] сегодня [SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'пригласила', 'пригласил')] группу коллег посетить новый доисторический пейзаж. Учёные высоко оценили [SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'её', 'его')] внимание к деталям."
 dubois.271.f_cretaceous: "Климат в меловой период был в целом тёплым и сбалансированным. Это позволило некоторым динозаврам достигать высоких южных и северных широт, по крайней мере, в летние месяцы. Полюса были свободны ото льда, и уровень моря был соответственно очень высоким, достигнув своего максимального значения в нижнем туроне. Лишь в конце мелового периода в маастрихте произошло похолодание и заметная регрессия. Как и в предшествующий юрский период, в наземной макро- и мегафауне доминировали динозавры. В нижнем мелу преобладали плауновидные, папоротники, древовидные папоротники, гинкговые, беннеттитовые и хвойные. В верхнем мелу многие лиственные деревья, такие как клён, дуб и орех, конкурировали с хвойными, такими как секвойя и гейнитция. Травы распространились по материку и сильно изменили характер эрозии."
 dubois.271.f_jurassic: "Нижний юрский период мог закончиться массивными извержениями в крупной магматической провинции на Гондване. Это привело к глобальному потеплению, сопряжённому с массовым вымиранием второго порядка. Мелколистные, приспособленные к засухе хвойные затем стали важной частью флоры, а среди динозавров развились современные зауроподы. В юрский период, особенно в поздний юрский период (верхняя юра), произошёл первый расцвет динозавров, с крупными тероподами, такими как аллозавр, и гигантскими зауроподами, такими как диплодок и жираффатитан. В флоре доминировали голосеменные (включая хвойные растения, такие как секвойи и сосны, а также гинкго и саговники). Юрский период также известен как эпоха саговников, потому что они были очень распространены. Папоротники и хвощи образовывали подлесок лесов."
 dubois.271.f_triassic: "В триасовый период почти постоянно царил тёплый климат, хотя в начале периода он подвергался сильным колебаниям. Климат также, по-видимому, был довольно сухим во всём мире: причиной была форма суперконтинента Пангея и связанный с этим муссонный эффект. Внутри материка, вероятно, были обширные пустыни. Переход от перми к триасу связан с выраженным изменением фауны. Это настолько кардинально, что из-за значительно изменившейся ископаемой летописи переход от перми к триасу является не только границей между двумя периодами, но и между двумя эрами истории Земли — палеозоем и мезозоем. В результате многочисленные группы морских беспозвоночных полностью или навсегда исчезают из ископаемой летописи. Наземная фауна позвоночных также претерпевает значительные изменения. Смена растительного мира с папоротников на голосеменные, которая уже произошла в перми, продолжилась в триасе."
 dubois.271.g: "Прекрасно!"
 dubois.272.t: "Материалы"
 dubois.272.d: "[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetFullName] проявляет удивительный перфекционизм в создании своего доисторического пейзажа. Вот почему [SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'она', 'он')] уже [SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'израсходовала', 'израсходовал')] весь свой бюджет."
 dubois.272.f: "Было ли это специально заказанное для выставки яйцо динозавра? Изысканные семена? Или чаевые в 300 фунтов, которые получил носильщик за природную землю? По каким бы причинам доктор [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] ни объяснял это, деньги просто утекают сквозь его пальцы."
 dubois.272.g: "Больше денег на какие-то искусственные растения и ящериц? Забудьте!"
 dubois.272.h: "Мы хотим красивую диораму, не жалейте средств!"
 dubois.273.t: "Нелепая работа?"
 dubois.273.d: "Некоторые академические «коллеги» теперь насмехаются над одержимостью, которую проявляет доктор [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] к доисторическому пейзажу, не только за его спиной, но и совершенно открыто. Некоторые исследователи считают его деятельность абсурдным хобби, а проект — в корне нелепым делом."
 dubois.273.f: "«Крайняя редкость переходных форм в ископаемой летописи остаётся коммерческой тайной палеонтологии».\n —Сёрен Кьеркегор"
 dubois.273.g: "Палеонтология — серьёзная наука!"
 dubois.273.h: "Надо признать, наш палеонтолог немного чудаковат."
 dubois.273.i: "Купите этим противным учёным несколько бутылок хереса, чтобы они оставили доктора в покое."
 dubois.274.t: "Студенческий интерес"
 dubois.274.d: "Уже несколько недель студенты университета с растущим интересом наблюдают, как доктор [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] строит доисторический пейзаж. То, что одни считают чудачеством, другие видят как вдохновение — внезапно далёкое прошлое становится осязаемым."
 dubois.274.f: "Парк «Динозавры Кристал Пэлас» на юге Лондона — это геологический и палеонтологический тематический парк. Он известен скульптурами животных, которые были созданы Бенджамином Уотерхаусом Хокинсом в середине XIX века как первые в мире фигуративные изображения вымерших животных в натуральную величину. Парк предназначался как для развлечения, так и для образования своих викторианских посетителей. На островах озера в части комплекса, спроектированной как английский пейзажный сад, был создан тематический парк, отражающий геологическую историю Британии. Согласно концепции, основанной на работах геолога Дэвида Томаса Анстеда, каждый из трёх островов был отнесён к одной из эр фанерозоя и был оформлен с использованием отложений, возникших в тот период. Хокинса консультировал палеонтолог Ричард Оуэн. Хотя доисторические животные уже не соответствовали состоянию исследований того же века, они вызвали большой интерес и обеспечили широким слоям населения базовый уровень палеонтологических знаний."
 dubois.274.g: "Новое поколение учёных!"
 dubois.274.h: "Они должны помочь доктору."
 je_dubois_safari_hippopotamus: "Сафари в Африке: бегемот"
 je_dubois_safari_hippopotamus_reason: "Во время африканского сафари, благодаря постоянному выслеживанию и установке ловушек, можно поймать крупную дичь, а затем перевезти её в [Concept('concept_dubois_zoo', 'зоопарк')]. За одно сафари можно поймать только одно животное. В зависимости от вида животного, различается, нужны ли ловушки или нужно оставаться на их следу. Как правило, крупным, медлительным животным нужно больше ловушек, в то время как быстрые животные требуют большего выслеживания. Сафари длится 300 дней. Если к тому времени ни одно животное не будет поймано, команда сафари покинет страну — без успеха.\n\nАгрессивные животные могут защищаться и нападать при установке ловушек. Пугливые животные убегают. [Concept('concept_dubois_naturalist', '#b #GREEN Натуралист#!#!')] с чертой «Зоолог» может разрешать такие ситуации без потерь. Новые технологии, такие как #ORANGE пулемёт#! или #ORANGE двигатель внутреннего сгорания#!, облегчают выслеживание и поимку животных."
