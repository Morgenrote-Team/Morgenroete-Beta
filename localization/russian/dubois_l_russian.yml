 dubois.261.t: "Систематизация завершена"
 dubois.261.d: "За годы работы доктор [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] опубликовал[SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'а', '')] свои теории о связях в доисторическом животном и растительном мире. Публикация уже была отмечена фондом за новые взгляды на древо жизни."
 dubois.261.f: "«Я буду собирать растения и окаменелости и с помощью лучших инструментов проводить астрономические наблюдения. Однако это не главная цель моего путешествия. Я постараюсь выяснить, как силы природы действуют друг на друга и каким образом географическая среда влияет на животных и растения. Короче говоря, я должен узнать о гармонии в природе».\n —Александр фон Гумбольдт"
 dubois.261.g: "Это действительно... КРАЙНЕ ИНТЕРЕСНО."
 dubois.262.t: "Семейное древо животного"
 dubois.262.d: "После того как доктор [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] сравнил[SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'а', '')] местные и международные отчёты об окаменелостях определённого вида животных, [SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'она', 'он')] коренным образом ставит под сомнение ранее считавшиеся факты об эволюции этого вида."
 dubois.262.f: "«Поглощённый специальным исследованием, я не обращал внимания на здание, которое тем временем бессознательно строилось само собой. Однако, завершив сравнение ископаемых видов в Париже, я захотел, для удобства их пересмотра, составить список в соответствии с их последовательностью в геологических формациях, с целью более точного определения характеристик и более яркого их выделения путём перечисления. Какова же была моя радость и удивление, когда я обнаружил, что самое простое перечисление ископаемых рыб в соответствии с их геологической последовательностью было также полным изложением естественных отношений семейств между собой; что, следовательно, можно было прочитать генетическое развитие всего класса в истории творения, причём представление родов и видов в отдельных семействах было в нём определено; одним словом, что генетическая последовательность рыб полностью соответствует их зоологической классификации, и именно той классификации, которую я предложил».\n —Луи Агассис"
 dubois.262.g: "У нас есть это животное в зоопарке?"
 dubois.263.t: "Небольшое приобретение"
 dubois.263.d: "Во время своих исследований доктор [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] вступил[SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'а', '')] в контакт с другим палеонтологом. По каналам переговоров [SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'она смогла', 'он смог')] приобрести окаменелость, которая поддерживает его последнюю диссертацию — иногда за счёт университета."
 dubois.263.f: "«При голосе сравнительной анатомии каждая кость и фрагмент кости заняли своё место. Я не могу найти слов, чтобы выразить удовольствие, которое я испытываю, видя, как, по мере того как я обнаруживал один признак, все предсказанные мной последствия последовательно подтверждались; ступни были найдены в соответствии с признаками, объявленными зубами; зубы — в гармонии с теми, что были заранее указаны ступнями; кости голеней и бёдер, и каждая соединительная часть конечностей были найдены сложенными вместе именно так, как я их расположил, прежде чем мои предположения были подтверждены открытием целых частей: короче говоря, каждый вид был, так сказать, реконструирован из одного из составляющих его элементов».\n —Уильям Бакленд"
 dubois.263.g: "Стоило ли оно того?"
 dubois.264.t: "Геологические соображения"
 dubois.264.d: "В разговоре с [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] о расположении окаменелостей в слоях горных пород, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetFullName] получил[SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'а', '')] важные новые сведения о хронологическом определении."
 dubois.264.f: "«Почему никто не видел, что одни только окаменелости породили теорию о формировании земли, что без них никто бы никогда и не мечтал, что в формировании земного шара были последовательные эпохи».\n —Жорж Кювье"
 dubois.264.g: "Ах, синергия геологии и палеонтологии!"
 dubois.265.t: "Впечатляющая лекция"
 dubois.265.d: "Доктор [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] в этом семестре прочитал[SelectLocalization(GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.IsFemale, 'а', '')] в своём университете высоко оценённую серию лекций, которые считаются вдохновляющими для палеонтологии. На этот предмет записалось много новых студентов."
 dubois.265.f: "«По мере того, как проникаешь от пласта к пласту, от слоя к слою и обнаруживаешь под каменоломнями Монмартра или в сланцах Урала тех животных, чьи окаменевшие останки принадлежат допотопным цивилизациям, разум поражается, узрев миллиарды лет и миллионы народов, которые слабая память человека и нерушимая божественная традиция забыли и чей прах, heaped on the surface of our globe, form the two feet of earth which furnish us with bread and flowers».\n —Оноре де Бальзак"
 dubois.265.g: "Популярный профессор!"
