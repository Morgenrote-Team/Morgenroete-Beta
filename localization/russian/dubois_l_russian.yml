 dubois.31.l: "Преследовать гориллу"
 dubois.32.t.gorilla_1: "Сильная горилла"
 dubois.32.t.gorilla_2: "Второе наблюдение гориллы"
 dubois.32.t.gorilla_3: "Ещё одна горилла"
 dubois.32.f.gorilla.1: "В окутанных туманом лесах высокогорья глубокий, резонирующий удар в грудь разносится по густому подлеску — звук, от которого по спине пробегает дрожь у каждого живого существа в пределах слышимости. Там, среди древних деревьев, самец гориллы с серебристой спиной заявляет о своём присутствии. Высокий и грозный, он является и защитником, и правителем своей группы. Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] с трепетом наблюдает, как большая обезьяна утверждает своё господство, ведя свою семью с грацией, которая не вяжется с её огромной силой. Натуралист, разрываясь между восхищением и долгом, готовит своё снаряжение, зная, что поимка этого величественного существа для зоопарка может стать самой сложной задачей."
 dubois.32.f.gorilla.2: "Когда солнце начинает садиться за горный горизонт, джунгли оживают звуками природы. Сквозь густой полог леса появляется семья горилл, их движения обдуманны и полны смысла. Самый младший цепляется за спину матери, в то время как внушительный самец с серебристой спиной замыкает шествие, его бдительные глаза высматривают любой признак опасности. Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] задерживает дыхание, его бинокль наведён на этот редкий и мимолётный взгляд в жизнь этих благородных существ. Мысль о разлучении такой семьи тяжело давит на него, но давление со стороны покровителей зоопарка не оставляет ему выбора — он должен действовать, даже если это означает нарушение гармонии джунглей."
 dubois.32.f.gorilla.3: "Глубоко в сердце тропического леса, где воздух густ от запаха земли и криков невидимых существ, гориллы устроили свой дом. Высокий самец с серебристой спиной, с его серебристой шерстью и мудрыми, знающими глазами, является бесспорным лидером своей группы. Его массивные руки нежно обнимают молодую гориллу — редкое проявление нежности от такого могущественного существа. Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] наблюдает за этим интимным моментом издалека, раздираемый этической дилеммой. Покровители зоопарка ожидают результатов, но, наблюдая за сложными социальными связями между этими замечательными животными, он начинает сомневаться, сможет ли какая-либо клетка когда-либо по-настоящему удержать дух дикой природы."
 dubois.33.d.gorilla: "В поисках #O гориллы#! наша команда сафари наткнулась на удивительную флору. Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] склонен сделать перерыв."
 dubois.34.d.gorilla: "Сафари, целью которого была поимка #O гориллы#!, приходится прервать. Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] пропал!"
 je_dubois_safari_gorilla: "Сафари в Африке: горилла"
 je_dubois_safari_gorilla_reason: "Во время африканского сафари, благодаря постоянному выслеживанию и установке ловушек, можно поймать крупную дичь, а затем перевезти её в [Concept('concept_dubois_zoo', 'зоопарк')]. За одно сафари можно поймать только одно животное. В зависимости от вида животного, различается, нужны ли ловушки или нужно оставаться на их следу. Как правило, крупным, медлительным животным нужно больше ловушек, в то время как быстрые животные требуют большего выслеживания. Сафари длится 300 дней. Если к тому времени ни одно животное не будет поймано, команда сафари покинет страну — без успеха.\n\nАгрессивные животные могут защищаться и нападать при установке ловушек. Пугливые животные убегают. [Concept('concept_dubois_naturalist', '#b #GREEN Натуралист#!#!')] с чертой «Зоолог» может разрешать такие ситуации без потерь. Новые технологии, такие как #ORANGE пулемёт#! или #ORANGE двигатель внутреннего сгорания#!, облегчают выслеживание и поимку животных."
 dubois.228.d: "Кто бы мог подумать, что величественный орёл происходит именно из Новой Зеландии? Профессор [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] нашёл различные кости гигантского орла с огромным размахом крыльев в 2,6 метра (8 футов 6 дюймов). Профессор [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] предполагает, что эта птица могла вдохновить легенду о Поуакаи — миф маори."
