 pm_dubois_university_mathematics: "[concept_pm_academics_university_mathematics]"
 dubois_theory_of_evolution_tech: "Теория эволюции"
 dubois_theory_of_evolution_tech_desc: "Решительный отход от учения о неизменности биологических видов был достигнут благодаря теории эволюции путём естественного отбора. Дарвин заметил, что неконтролируемый рост популяции неизбежно приводит к «борьбе за существование», в ходе которой сохраняются полезные изменения, а другие устраняются. Этот механизм даёт рациональное объяснение разнообразию флоры и фауны, имеющих общее происхождение. Выводы из этого обеспокоили многих, поскольку они предполагали, что человечество не занимает привилегированного положения в естественном порядке."
 dubois_paleontology_tech: "Палеонтология"
 dubois_paleontology_tech_desc: "Интерес к древней истории Земли и вымершим организмам можно проследить с античности, но он достиг значительной вехи с сравнительно-анатомическими исследованиями Жоржа Кювье около 1800 года. Публикация «О происхождении видов» стала поворотным моментом в науках о жизни, особенно в палеонтологии. Последовавшая за этим научная дискуссия побудила к систематическому поиску переходных окаменелостей и эмпирических свидетельств эволюционных процессов в геологической летописи."
 dubois_genetics_tech: "Генетика"
 dubois_genetics_tech_desc: "Современная генетика зародилась благодаря кропотливым экспериментам Грегора Иоганна Менделя, августинского монаха. Повторное открытие работ Менделя в 1900 году ускорило быстрый прогресс в этой области. К 1915 году принципы менделевского наследования были объяснены на примере различных организмов, в частности, плодовой мушки Drosophila melanogaster. Одновременно математики разработали статистическую основу популяционной генетики, интегрировав генетическую теорию в более широкое исследование."
 dubois_paleontologist: "Палеонтолог"
 dubois_paleontologist_desc: "Учёный, посвятивший себя изучению окаменелых останков, проливающих свет на затерянные миры доисторической жизни."
 dubois_paleontologist_experienced: "Выдающийся палеонтолог"
 dubois_paleontologist_experienced_desc: "Признанный за серию примечательных раскопок, этот учёный добился уважения среди геологических обществ своего времени."
 dubois_paleontologist_famous: "Выдающийся палеонтолог"
 dubois_paleontologist_famous_desc: "Благодаря плодотворным исследованиям и знаменитым открытиям этот палеонтолог считается ведущим авторитетом в области древней жизни."
