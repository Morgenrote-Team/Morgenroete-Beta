 notification_dubois_animal_breeding_notification_name: "Отчёт о разведении"
 notification_dubois_animal_breeding_notification_desc: "В этом году численность вида «[GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')]» в нашем [Concept('concept_dubois_nature_reserve', 'заповеднике')] изменилась на [GetPlayer.MakeScope.Var('dubois_animal_breeding_change_var').GetValue|0+=]. В настоящее время насчитывается [GetPlayer.MakeScope.Var('dubois_breeding_animal_amount_var').GetValue|0+] особей вида «[GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')]»."
