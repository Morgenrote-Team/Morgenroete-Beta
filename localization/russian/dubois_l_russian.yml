 dubois_leave_fossils_tt: "Покинуть палеонтологическую коллекцию."
 dubois_set_paleontologist_to_north_america_tt: "Профессор отправится в экспедицию, чтобы раскрыть #O ископаемые реликвии#! среди древних пластов Северной Америки."
 dubois_set_paleontologist_to_south_america_tt: "Профессор будет исследовать доисторические останки, погребённые в обширных ландшафтах Южной Америки."
 dubois_set_paleontologist_to_europe_tt: "Профессор проведёт официальное обследование #O палеонтологических отложений#! на легендарных землях Европы."
 dubois_set_paleontologist_to_africa_tt: "Профессор будет искать #O образцы ископаемых#! в первобытных формациях африканского континента."
 dubois_set_paleontologist_to_asia_tt: "Профессор отправится в Азию в поисках #O ископаемых свидетельств#! древней жизни."
 dubois_set_paleontologist_to_australia_tt: "Профессор отправляется в Австралию, чтобы изучить её отдалённые и загадочные #O ископаемые пласты#!."
 dubois_set_paleontologist_to_default_tt: "Вызвать профессора с полевых работ и возобновить его обязанности на родине."
 dubois_has_formation_tt: "Обладает по крайней мере одной областью с примечательной геологической формацией или признанной великой геологической формацией."
 dubois_has_rainforest_tt: "Контролирует по крайней мере одну область, содержащую тропический лес. Признанные регионы тропических лесов включают: Амазонский лес, лес Конго, лес Борнео и Индокитайский лес."
 dubois_has_mountains_tt: "Имеет территориальные претензии по крайней мере на одну область, пересекаемую значительным горным хребтом."
 dubois_unconquered_summit_tt: "Обладает или имеет лицензионный доступ к непокорённой вершине — либо в пределах национальных границ, либо через альпинистскую хартию от иностранной державы."
 dubois_has_active_naturalist_tt: "[concept_dubois_naturalist] в настоящее время доступен и не занят полевыми работами."
 dubois_has_active_paleontologist_tt: "[concept_dubois_paleontologist] готов к работе, не занят текущими экспедициями или исследованиями."
 dubois_naturalist_sick_tt: "[concept_dubois_naturalist] нездоров и в настоящее время не может проводить полевые исследования."
 dubois_botanical_expedition_banned_tt: "Ботанические экспедиции были приостановлены из-за преобладающих политических ограничений."
 dubois_chemical_warfare_tt: "Это предприятие стало возможным благодаря нашей разработке #O химического оружия#! — мрачной, но решающей инновации."
 dubois_triage_tt: "Эта мера стала возможной благодаря внедрению нами системы #O сортировки#! в полевой медицине."
 dubois_logistics_tt: "Эта операция поддерживается нашим мастерством в современной #O логистике#!, обеспечивающей своевременное снабжение и координацию."
 dubois_hide_animal_decisions: "Скрыть решения о животных"
 dubois_hide_animal_decisions_desc: "Скрыть все решения, связанные с животными."
 dubois_hide_animal_decisions_tt: "Скрыть все решения, связанные с животными."
 dubois_show_animal_decisions: "Показать решения о животных"
 dubois_show_animal_decisions_desc: "Показать все решения, связанные с животными."
 dubois_show_animal_decisions_tt: "Показать все решения, связанные с животными."
 dubois_extend_zoo_small_decision: "Расширить [concept_dubois_zoo] (малый)"
 dubois_extend_zoo_small_decision_desc: "[Concept('concept_dubois_zoo_animal', 'Экзотические животные')] — всеобщая радость: люди отдыхают в зоопарке, учёные могут продолжать свои зоологические исследования, а международный престиж достаётся тем, кто может показать наибольшее количество иностранной фауны. С каждым расширением престиж нации возрастает. Некоторые этапы расширения требуют не только сбора множества животных, но и их происхождения из разных частей света."
 dubois_extend_zoo_medium_decision: "Расширить [concept_dubois_zoo] (средний)"
 dubois_extend_zoo_medium_decision_desc: "[Concept('concept_dubois_zoo_animal', 'Экзотические животные')] — всеобщая радость: люди отдыхают в зоопарке, учёные могут продолжать свои зоологические исследования, а международный престиж достаётся тем, кто может показать наибольшее количество иностранной фауны. С каждым расширением престиж нации возрастает. Некоторые этапы расширения требуют не только сбора множества животных, но и их происхождения из разных частей света."
 dubois_extend_zoo_large_decision: "Расширить [concept_dubois_zoo] (большой)"
 dubois_extend_zoo_large_decision_desc: "[Concept('concept_dubois_zoo_animal', 'Экзотические животные')] — всеобщая радость: люди отдыхают в зоопарке, учёные могут продолжать свои зоологические исследования, а международный престиж достаётся тем, кто может показать наибольшее количество иностранной фауны. С каждым расширением престиж нации возрастает. Некоторые этапы расширения требуют не только сбора множества животных, но и их происхождения из разных частей света."
 dubois_extend_zoo_famous_decision: "Расширить [concept_dubois_zoo] (знаменитый)"
 dubois_extend_zoo_famous_decision_desc: "[Concept('concept_dubois_zoo_animal', 'Экзотические животные')] — всеобщая радость: люди отдыхают в зоопарке, учёные могут продолжать свои зоологические исследования, а международный престиж достаётся тем, кто может показать наибольшее количество иностранной фауны. С каждым расширением престиж нации возрастает. Некоторые этапы расширения требуют не только сбора множества животных, но и их происхождения из разных частей света."
 dubois_catch_local_animal_decision: "Отлов местной фауны"
 dubois_catch_local_animal_decision_desc: "В нашей стране есть ареалы обитания удивительных видов, которые могли бы быть выставлены в [Concept('concept_dubois_zoo', 'зоопарке')]. Специалист по животным должен будет в течение года путешествовать по стране, чтобы собрать [Concept('concept_dubois_zoo_animal', 'экзотических животных')] для зоопарка."
 dubois_visit_zoo_decision: "Экскурсия по зоологическому саду"
 dubois_visit_zoo_decision_desc: "Начинает специальное событие, позволяющее вам прогуляться по вашему зоологическому саду и понаблюдать за всем разнообразием экзотических существ, собранных в ходе экспедиций и усилий."
 dubois_ban_animal_export_decision: "Запретить экспорт фауны"
 dubois_ban_animal_export_decision_desc: "Вводя запрет на экспорт живых образцов, мы утверждаем наше суверенное право сохранять наши природные сокровища. Иностранные правительства прекратят свои просьбы."
 dubois_allow_animal_export_decision: "Разрешить экспорт фауны"
 dubois_allow_animal_export_decision_desc: "Выдача лицензий на экспорт избранных животных обеспечивает как дипломатическую добрую волю, так и respectable поток дополнительного дохода."
 dubois_collect_specimen_decision: "Начать сбор [Concept('concept_dubois_specimen', 'образцов')]"
 dubois_collect_specimen_decision_desc: "Сбор выдающейся коллекции [Concept('concept_dubois_specimen', 'образцов')] — как флоры, так и фауны — не только способствует развитию наших научных учреждений, но и провозглашает дух исследования и просвещённого прогресса нашей нации."
 dubois_safari_decision: "Начать африканское сафари"
 dubois_safari_decision_desc: "Отправить экспедиционный отряд вглубь африканских джунглей в погоне за внушительной дичью для нашего [Concept('concept_dubois_zoo', 'зоопарка')]. Благодаря усердному выслеживанию и тщательному установлению ловушек, возможно, удастся добыть живой образец. За одно сафари можно приобрести только одно существо. Руководящий принцип: чем крупнее и тяжелее зверь, тем больше потребуется ловушек; тогда как быстроногие существа требуют неустанного преследования."
 je_dubois_safari: "Африканская сафари-экспедиция"
 je_dubois_safari_reason: "Команда опытных охотников и натуралистов была отправлена на сафари в Африку с задачей добыть редкий образец для выставки в нашем [Concept('concept_dubois_zoo', 'зоопарке')]. Для успеха экспедиция должна в равной мере полагаться на хитрость, выносливость и научный метод. Тяжёлые звери требуют многочисленных ловушек; неуловимую добычу нужно преследовать с умелым выслеживанием. За одну экспедицию можно привезти только одно животное."
 je_dubois_safari_goal: "Африканское сафари продлится полгода. Если экспедиция не сможет добыть образец за это время, отряд вернётся с пустыми руками, их усилия не будут вознаграждены."
 je_dubois_safari_fail: "Сафари завершилось безрезультатно. Несмотря на месяцы лишений и усилий, команда возвращается без образца, который можно было бы предъявить за свои труды."
 je_dubois_dinosaur_excavation: "Раскопки динозавров"
 je_dubois_dinosaur_excavation_reason: "После обнаружения окаменелой кости динозавра профессор [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] начал полномасштабные палеонтологические раскопки. В течение года, в зависимости от его опыта и проницательности, наш уважаемый [concept_dubois_paleontologist] может обнаружить от одного до трёх дополнительных фрагментов окаменелостей. По завершении экспедиции возможно ещё одно открытие, что подчёркивает, что полный скелетный состав ещё не раскрыт. Для полной реконструкции требуется пять костей, чтобы смонтировать образец в палеонтологической коллекции."
 je_dubois_dinosaur_excavation_goal: "По истечении двенадцати месяцев наш [concept_dubois_paleontologist] составит официальный отчёт о находках и обнаруженных останках."
 dubois_specimen_tt: "Накопить не менее #G 50 000#! @dubois_specimen! #O биологических [Concept('concept_dubois_specimen', 'образцов')]#!, что представляет собой процветающий архив зоологических и ботанических открытий."
 notification_dubois_paleontological_report_notification_name: "Ежегодный палеонтологический отчёт"
 notification_dubois_paleontological_report_notification_desc: "Наши [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтологи#!#!')] в этом году нашли [GetPlayer.MakeScope.Var('dubois_fossils_notification_var').GetValue|0+=] новых окаменелостей."
 notification_dubois_java_man_notification_name: "[INITIATOR_COUNTRY.GetName] открывает питекантропа"
 notification_dubois_java_man_notification_desc: "[concept_dubois_paleontologist] из [INITIATOR_COUNTRY.GetAltNameNoFlag('RU_CL_RP')] обнаружил на Яве важный скелет, который может ответить на вопросы о человеческой эволюции."
 dubois.1.t: "Торжественное открытие зоологического сада"
 dubois.1.d: "Торжественное открытие нового [Concept('concept_dubois_zoo', 'зоопарка')] привлекло толпы любопытных посетителей, жаждущих увидеть собранный зверинец. На фоне высокого общественного энтузиазма уже звучат призывы к строительству новых вольеров и приобретению дополнительных видов."
 dubois.1.f: "«Две ночи назад я видел, как ужинали тигры в Эксетер-Чендж. Кроме льва Вели-паши в Морее, который следовал за арабским смотрителем, как собака, меня больше всего позабавила привязанность гиены к своему смотрителю. Какая беседа! Там был „гиппопотам“, лицом похожий на лорда Ливерпуля; и „ленивец-медведь“ имел тот же голос и манеры, что и мой лакей, но тигр слишком много говорил. Слон взял и отдал мне мои деньги, снял мою шляпу, открыл дверь, помахал хоботом и вёл себя так хорошо, что я бы хотел, чтобы он был моим дворецким. Самое красивое животное на земле — одна из пантер; но бедные антилопы были мертвы. Я бы не хотел видеть здесь ни одной: вид верблюда заставил меня снова тосковать по Малой Азии». — Лорд Байрон"
 dubois.1.g: "Великолепное начало для национального зверинца."
 dubois.2.t: "О происхождении видов"
 dubois.2.d: "С публикацией революционного трактата профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] представил смелую новую теорию, которая стремится объяснить само происхождение видов через естественные процессы."
 dubois.2.f: "«Благодаря этой борьбе за жизнь любое изменение, сколь бы незначительным и от какой бы причины оно ни происходило, если оно в какой-либо степени выгодно для особи любого вида в её бесконечно сложных отношениях с другими органическими существами и с внешней природой, будет способствовать сохранению этой особи и, как правило, будет унаследовано её потомством... Я назвал этот принцип, по которому каждое незначительное изменение, если оно полезно, сохраняется, термином „естественный отбор“, чтобы отметить его связь со способностью человека к отбору». — Чарльз Дарвин"
 dubois.2.g: "Теория, способная изменить естественные науки."
 dubois.2.h: "Ещё один удар, нанесённый наукой по суевериям."
 dubois.3.t: "Возвращение «Бигля»"
 dubois.3.d: "Корабль Его Величества «Бигль» вернулся из многолетней научной экспедиции. Судно привезло с собой множество природных образцов, окаменелых останков, подробных эскизов и данных наблюдений. Среди команды был известный [concept_dubois_naturalist] [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], чей вклад уже называют значительным."
 dubois.3.f: "«Находясь на борту „Бигля“ в качестве натуралиста, я был поражён некоторыми фактами в распределении обитателей Южной Америки и в геологических связях нынешних и прошлых обитателей этого континента. Эти факты, как мне казалось, проливали некоторый свет на происхождение видов — эту тайну из тайн, как её назвал один из наших величайших философов». — Чарльз Дарвин"
 dubois.3.g: "Эпохальное путешествие. Какие откровения могут последовать?"
 dubois.4.t: "Космос"
 dubois.4.d: "Монументальный труд Александра фон Гумбольдта «Космос» был опубликован — амбициозная попытка объединить науки в рамках одной философской системы. Изначально представленный в виде лекций в Берлине, он теперь достиг читателей по всему миру, предлагая энциклопедическое видение природы и человеческого познания."
 dubois.4.f: "«В поздний вечер напряжённой жизни я передаю немецкой публике труд, смутный образ которого витал перед моей душой почти полвека. Во многих настроениях я считал этот труд невыполнимым; и когда я отказывался от него, я снова к нему возвращался, возможно, беззаботно. Я посвящаю его своим современникам с той робостью, которую должно внушать мне справедливое недоверие к мере моих сил. Я стараюсь забыть, что долгожданные сочинения обычно пользуются меньшей снисходительностью». — Александр фон Гумбольдт"
 dubois.4.g: "Краеугольный камень современной научной мысли."
 dubois.4.h: "Этот труд просветит грядущие поколения."
 dubois.5.t: "Наследие Менделя"
 dubois.5.d: "Долгое время игнорировавшиеся эксперименты аббата Грегора Менделя теперь были заново открыты, вызвав революцию в изучении наследственности. Простые, но мощные принципы, которые он изложил — теперь известные как законы Менделя — закладывают основу для новой науки: генетики."
 dubois.5.f: "«Опыт искусственного оплодотворения, какой проводится с декоративными растениями для получения новых вариаций в цвете, привёл к экспериментам, которые здесь будут обсуждаться. Поразительная регулярность, с которой всегда вновь появлялись одни и те же гибридные формы, когда оплодотворение происходило между одними и теми же видами, побудила предпринять дальнейшие эксперименты, целью которых было проследить развитие гибридов в их потомстве». — Грегор Мендель"
 dubois.5.g: "Зарождение современной генетики."
 dubois.6.t: "Открытие яванской окаменелости"
 dubois.6.d: "В Голландской Ост-Индии [SCOPE.sCharacter('dubois_new_paleontologist_scope').GetFullName], врач и анатом, обнаружил окаменелые останки доисторического предка человека, вызвав как восторг, так и споры в научном сообществе."
 dubois.6.f: "Окаменелости, которые впервые обнаружил [SCOPE.sCharacter('dubois_new_paleontologist_scope').GetFullName] в 1891 году вдоль реки Соло в Восточной Яве, стали известны как питекантроп. Датированные примерно миллионом лет назад, эти останки стали первым ископаемым гоминином, обнаруженным за пределами Европы, и вторым в своём роде после неандертальца. Первоначально классифицированный как *Anthropopithecus*, а затем *Pithecanthropus erectus*, образец сегодня в целом признаётся как *Homo erectus*, иногда уточняется как *Homo erectus javanensis*. Как позже заметил палеоантрополог Ральф фон Кёнигсвальд: «Ни одно другое палеонтологическое открытие не вызвало такого ажиотажа и не привело к такому разнообразию противоречивых научных мнений»."
 dubois.11.t: "Новое [concept_dubois_zoo_animal]"
 dubois.11.d: "[SCOPE.sCountry('dubois_animal_country').GetName] любезно соглаша[SCOPE.sCountry('dubois_animal_country').GetAltNameNoFormatting('RU_CL_END_T')]ся на передачу редкого образца для выставки в нашем уважаемом зоологическом саду."
 dubois.11.f: "В соответствии с протоколами научного обмена, в зоологический сад единовременно может быть приобретено только одно животное. После приобретения пройдёт несколько недель, пока существо будет доставлено и акклиматизировано в новой среде. Только после надлежащего и достойного представления в коллекции могут быть предприняты дальнейшие дипломатические шаги для приобретения дополнительных образцов. Какое выдающееся животное украсит наш зверинец?"
 dubois.11.grizzly: "Гризли."
 dubois.11.eagle: "Белоголовый орлан."
 dubois.11.bison: "Американский бизон."
 dubois.11.panther: "Флоридская пума."
 dubois.11.alligator: "Американский аллигатор."
 dubois.11.axolotl: "Аксолотль."
 dubois.11.sloth: "Бурогорлый ленивец."
 dubois.11.jaguar: "Ягуар."
 dubois.11.anteater: "Гигантский муравьед."
 dubois.11.armadillo: "Девятипоясный броненосец."
 dubois.11.condor: "Андский кондор."
 dubois.11.manatee: "Американский ламантин."
 dubois.11.monkey: "Беличий саймири."
 dubois.11.lynx: "Испанская рысь."
 dubois.11.wolf: "Евразийский волк."
 dubois.11.badger: "Европейский барсук."
 dubois.11.stoat: "Горностай."
 dubois.11.otter: "Речная выдра."
 dubois.11.ibex: "Альпийский горный козёл."
 dubois.11.wisent: "Европейский бизон (зубр)."
 dubois.11.hippopotamus: "Обыкновенный бегемот."
 dubois.11.lion: "Африканский лев."
 dubois.11.elephant: "Африканский саванный слон."
 dubois.11.giraffe: "Жираф."
 dubois.11.penguin: "Очковый пингвин."
 dubois.11.mole: "Голый землекоп."
 dubois.11.zebra: "Саванная зебра"
 dubois.11.panda: "Большая панда."
 dubois.11.orangutan: "Борнейский орангутан."
 dubois.11.tiger: "Бенгальский тигр."
 dubois.11.tapir: "Чепрачный тапир."
 dubois.11.dragon: "Комодский варан."
 dubois.11.leopard: "Снежный барс."
 dubois.11.cheetah: "Азиатский гепард"
 dubois.11.turtle: "Зелёная морская черепаха."
 dubois.11.manta: "Гигантский морской дьявол."
 dubois.11.kangaroo: "Рыжий кенгуру."
 dubois.11.koala: "Коала."
 dubois.11.platypus: "Утконос."
 dubois.11.cassowary: "Шлемоносный казуар."
 dubois.11.sealion: "Новозеландский морской лев"
 dubois.11.no: "В конце концов, не стоит переполнять вольеры."
 dubois.12.t: "Контрабандисты в ареале обитания животных"
 dubois.12.d: "Профессор [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] успешно проник в удалённый ареал обитания животных в [SCOPE.sCountry('dubois_animal_country').GetAltNameNoFlag('RU_CL_PP')]. Теперь перед ним стоит деликатный вопрос: какой именно экземпляр будет «добыт» во имя научного прогресса?"
 dubois.12.f: "«Как отлов дикого существа может быть незаконным? Едва ли у него есть документы на собственность», — размышлял профессор по возвращении, когда один из членов экспедиции деликатно поинтересовался, не вышли ли их действия за рамки закона."
 dubois.13.t: "Контрабандисты схвачены!"
 dubois.13.d: "Из [SCOPE.sCountry('dubois_animal_country').GetAltNameNoFlag('RU_CL_RP')] пришли печальные вести: небольшой отряд, отправленный за зоологическим образцом, был перехвачен. Произошедшее спровоцировало дипломатический скандал — нашу страну публично обвиняют в браконьерстве."
 dubois.13.f: "Согласно донесениям, группу первыми обнаружили местные лесники, которые немедленно оповестили власти. Наш посол уже был вызван для вручения ему официального протеста. К счастью, профессор [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] успел покинуть страну до арестов, сохранив свою научную репутацию."
 dubois.13.g: "Всё пошло не по плану."
 dubois.21.t: "Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] вернулся с редкими экземплярами"
 dubois.21.d: "После годичной экспедиции в дикие земли профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] с триумфом вернулся домой. С помощью местных проводников, охотников и звероловов экспедиции удалось добыть несколько примечательных [Concept('concept_dubois_zoo_animal', 'животных')] для научных исследований и публичной демонстрации."
 dubois.21.f: "Число добытых животных: #G [ROOT.Var('dubois_catch_animal_total').GetValue]#!"
 dubois.21.g: "Великолепный триумф науки и нации!"
 dubois.31.t: "Начало сафари"
 dubois.31.d: "Экспедиция во главе с уважаемым профессором [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] прибыла на африканский континент. Их цель — добыть выдающийся экземпляр для Национального [concept_dubois_zoo|l]. На какого зверя они начнут охоту?"
 dubois.31.f: "Не всех животных можно поймать одинаково. Общий совет: для слона требуется множество ловушек, тогда как жираф попадётся в сети с большей вероятностью. Львы очень подвижны и меняют своё местоположение чаще, чем неповоротливые бегемоты."
 dubois.31.g: "Выследить гиппопотама."
 dubois.31.h: "Выследить африканского льва."
 dubois.31.i: "Выследить африканского саванного слона."
 dubois.31.j: "Выследить жирафа."
 dubois.31.k: "Выследить саванную зебру."
 dubois.32.t.hippopotamus_1: "Огромный гиппопотам"
 dubois.32.t.hippopotamus_2: "Гиппопотам замечен во второй раз"
 dubois.32.t.hippopotamus_3: "Ещё один гиппопотам"
 dubois.32.t.lion_1: "Величественный лев"
 dubois.32.t.lion_2: "Лев замечен во второй раз"
 dubois.32.t.lion_3: "Ещё один лев"
 dubois.32.t.elephant_1: "Возвышающийся слон"
 dubois.32.t.elephant_2: "Слон замечен во второй раз"
 dubois.32.t.elephant_3: "Ещё один слон"
 dubois.32.t.giraffe_1: "Изящный жираф"
 dubois.32.t.giraffe_2: "Жираф замечен во второй раз"
 dubois.32.t.giraffe_3: "Ещё один жираф"
 dubois.32.t.zebra_1: "Быстрая зебра"
 dubois.32.t.zebra_2: "Зебра замечена во второй раз"
 dubois.32.t.zebra_3: "Ещё одна зебра"
 dubois.32.d: "Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] выследил искомое существо. Теперь команде, проявив терпение и сноровку, предстоит заманить его в подходящее для поимки место."
 dubois.32.f.hippopotamus.1: "В тени великой реки жители деревень шёпотом говорят о зверях, что мутят воды на закате. Местный охотник рассказал, как недавно самка гиппопотама, защищая детёныша, раздавила крокодила. Осмотрев раздробленные останки рептилии, профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] подтвердил его слова. Глухой рёв гиппопотамов слышен до глубокой ночи — напоминание о том, что они здесь не просто обитатели, а владыки."
 dubois.32.f.hippopotamus.2: "Когда солнце пробилось сквозь утренний туман, команда заметила титаническую тушу, поднимающуюся из реки — толстокожую и дымящуюся в первых лучах света. Жители деревни называют их «призрачными быками», потому что они бесследно исчезают под водой и наносят удары с ужасающей силой. Их клыки блестят, как полированная слоновая кость, а нрав их гневлив. Даже львы обходят этих зверей стороной. Но профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], с железными нервами и блокнотом в руке, без колебаний шагает вперёд."
 dubois.32.f.hippopotamus.3: "У костров и на караванных путях ходят рассказы об одиноком звере — «Слонокостном Бегемоте», чьи костяные пластины, как говорят, бледны и прочны, как камень. Некоторые утверждают, что он бессмертен, другие — что его дыхание вызывает бури. Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] считает его экземпляром редкого размера и возраста, а почитание среди местных народов придаёт ему мифический статус. Если его поймать, он станет жемчужиной любой зоологической коллекции на Земле."
 dubois.32.f.lion.1: "По золотым просторам саванны движется тень, полная царственной грации. Лев с гривой, подобной огненному вихрю, здесь не просто обитает — он правит. Местные следопыты с трепетом говорят о «Королеве саванны» — львице такой силы, что она в одиночку отогнала целую стаю гиен, защищая своих детёнышей. Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], хоть и опытен, считает её след пугающим. Кажется, сама земля склоняется перед ней."
 dubois.32.f.lion.2: "Лагерь охватило напряжение: массивные, чёткие следы ведут к зарослям, окутанным пылью и солнцем. «Золотой Властелин», — шепчут местные, — «он близко». Говорят, этот лев сразился с капским буйволом и вышел из схватки окровавленным, но несломленным, а его гриву в ярости сравнивают с самим солнцем. Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] знает, что это не обычный хищник. Это монарх, чьи владения измеряются тишиной и страхом и чей взгляд обращает в бегство даже взрослых охотников."
 dubois.32.f.lion.3: "Среди стрекота цикад и колышущейся на ветру травы что-то шевелится. Львиный рык — глубокий, гортанный — раскатывается по равнинам, словно далёкий гром. Легенда гласит о патриархе, одно лишь присутствие которого усмиряет соперников и останавливает слонов. Именно в эту древнюю драму хищника и жертвы теперь вступает профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] — одинокий учёный в погоне за самым легендарным владыкой природы."
 dubois.32.f.elephant.1: "Солнце палит над мерцающей саванной, и далёкий гул становится всё ближе. Это не гром, а торжественное шествие слонов. Матриарх ведёт свой род через пыльную равнину, останавливаясь лишь под сенью акаций, где их хоботы поднимаются к кронам, словно перископы. В бинокль профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] молча наблюдает, поражённый не только их размером, но и мягким ритмом их товарищества. Но за его спиной слышен шёпот нетерпеливых покровителей: нация финансировала это путешествие не ради сантиментов."
 dubois.32.f.elephant.2: "Стадо движется с грацией, неожиданной для столь огромных зверей. Каждый их шаг выверен, каждый взгляд, которым они обмениваются, полон смысла. Во главе идёт опытный матриарх, чьи глаза видели много миграций. На закате у неглубокого водопоя раздаётся их трубный глас — звук, похожий одновременно на музыку и на скорбь. Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], держа наготове блокнот, чувствует, как в нём зарождаются сомнения. Что движет этой погоней: наука или жажда зрелищ?"
 dubois.32.f.elephant.3: "Под сенью огромных древних баобабов время, кажется, замерло. Там профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] видит картину благородную и печальную: группа слонов с расправленными ушами и бивнями, сверкающими, как полированная слоновая кость, стоит в покое. Они не угрожают и не убегают — они просто есть. И всё же, вырвать одного из этого сообщества, заключить в клетку владыку таких равнин — это отзовётся в стаде, как рана. Профессор знает названия костей и видов, но это... это нечто совсем иное."
 dubois.32.f.giraffe.1: "Несколько дней команда блуждала под неумолимым солнцем, не находя и следа своей добычи. Но однажды утром, на рассвете, на горизонте возникли силуэты — высокие и неподвижные, словно статуи. На фоне пламенного утреннего неба шеи нескольких жирафов возвышались над акациями, образуя живую линию горизонта. Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] подал сигнал. Охота — за знаниями — началась."
 dubois.32.f.giraffe.2: "Когда солнечный свет золотыми брызгами просочился сквозь деревья, в поле зрения появились жирафы. Высокие, безмятежные, с узорами, подобными абстрактной мозаике, они двигались, словно под музыку, слышимую лишь им одним. Очарованный профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] медленно двинулся вперёд с блокнотом и подзорной трубой в руке. Элегантность этих созданий была несравненна — каждый их шаг был образцом грации. Натуралист понимал, что это не просто зоологическая удача, а проблеск чего-то возвышенного."
 dubois.32.f.giraffe.3: "Вдали от ближайшего поселения, в нетронутом уголке саванны, команда нашла одинокого жирафа, не похожего ни на одного из описанных ранее. Его шкура была покрыта странными, почти звёздообразными отметинами, а движения были необычайно быстрыми. Местные проводники шептали о священном звере, предзнаменовании, которое редко показывается людям. Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], в равной мере скептик и учёный, приготовился к тщательному наблюдению. Был ли это действительно отдельный подвид или всего лишь игра света и легенд?"
 dubois.32.f.zebra.1: "Когда солнце опустилось низко, на равнинах царила тишина, пока между колючими кустарниками и старыми деревьями не замелькали чёрно-белые полосы. Табун зебр, спокойный и ничего не подозревающий, пасся совсем рядом. Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] молча наблюдал, очарованный их полосами — загадкой эволюции, воплощённой в живом контрасте. Желание изучить их глубже боролось с необходимостью спешить: промедли ещё немного, и момент может быть упущен навсегда."
 dubois.32.f.zebra.2: "Недели прошли в бесплодных поисках, пока команда не вспомнила о важной подсказке местных следопытов: зебры редко отходят далеко от воды. Они разбили лагерь у ближайшего надёжного водопоя, и, конечно же, как только спустились сумерки, знакомое фырканье и взмахи хвостов полосатого табуна возвестили об их прибытии. Наконец, второй шанс — и, возможно, при удаче и осторожности, удастся поймать живой экземпляр."
 dubois.32.f.zebra.3: "Саванна стала молчаливым свидетелем жестокости: впереди лежал изуродованный труп зебры, только что попавшей в засаду льва. Её смерть, хоть и мрачная, давала подсказки — следы, звуки, направление движения. Подгоняемая необходимостью, команда двинулась дальше. Взойдя на невысокий хребет, они увидели картину дикой гармонии: табун зебр в движении, их крики — странное сочетание лошадиного и ослиного ржания, их полосы, танцующие на ветру. Для профессора [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] это зрелище смешало трагедию с триумфом."
 dubois.32.g: "Приказать команде расставить ловушки."
 dubois.32.h: "Поручить команде выслеживание зверя."
 dubois.33.t: "Луг с редкими цветами"
 dubois.33.d.hippopotamus: "Выслеживая неуловимого #O гиппопотама#!, сафари наткнулось на поле с удивительной флорой. Яркие цветы неизвестного происхождения привлекли внимание профессора. Теперь [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] раздумывает, не стоит ли отвлечься от охоты, — его научное любопытство взяло верх."
 dubois.33.d.lion: "Выслеживая #O льва#!, команда наткнулась на рощу, где росли редкие и яркие цветы. Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] раздумывает, не отложить ли погоню — эти растения могут таить в себе секреты не менее великие, чем любой зверь."
 dubois.33.d.elephant: "В поисках #O слона#! команда наткнулась на редкие и яркие цветы. Кажется, профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] не прочь задержаться и собрать эти любопытные растения."
 dubois.33.d.giraffe: "В поисках #O жирафа#! команда сафари наткнулась на местность, богатую разнообразной флорой. Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] предложил сделать короткую остановку для сбора образцов."
 dubois.33.d.zebra: "Выслеживая #O зебру#!, группа сафари наткнулась на любопытную рощу, полную неизвестной флоры. Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] подумывал остановиться для сбора образцов."
 dubois.33.f: "Сафари приостановилось, когда профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], уловив необычный аромат, приказал колонне остановиться. Перед ними раскинулась поляна, усеянная яркими, незнакомыми цветами. Даже беглый осмотр показал, что они могут обладать лечебными свойствами. Профессор столкнулся с дилеммой: отвлечься на сбор этих драгоценных ботанических образцов или продолжить погоню за зверем."
 dubois.33.g: "Собрать цветы — эта находка слишком ценна, чтобы её игнорировать."
 dubois.33.h: "Время не ждёт. Наш приоритет — добыча."
 dubois.34.t: "Нашествие открытий"
 dubois.34.d.hippopotamus: "Пробираясь вглубь водно-болотных угодий в погоне за #O гиппопотамом#!, команда вдруг поняла, что профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] пропал. Его следы ведут к разрушенному термитнику, кишащему жуками — похоже, его увлекло очередное чудо природы."
 dubois.34.d.lion: "Охота на #O льва#! обернулась неожиданным хаосом. Где-то в зарослях исчез профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] — возможно, его увлекло нечто не менее свирепое и захватывающее, чем сам лев."
 dubois.34.d.elephant: "Сафари на #O слона#! было внезапно прервано. Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] исчез в зарослях — возможно, в поисках великого зверя, а может, в погоне за каким-то более глубоким вопросом, на который лишь он один может ответить."
 dubois.34.d.giraffe: "Сафари в погоне за #O жирафом#! было прервано — профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] без единого слова исчез в листве. Беспокойство начинает нарастать."
 dubois.34.d.zebra: "Сафари, целью которого была поимка #O зебры#!, сорвано — профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] бесследно исчез."
 dubois.34.f: "После короткого привала команда сафари заметила внезапное отсутствие своего лидера. Вскоре профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] был найден на вершине иссохшего термитника, поглощённый созерцанием копошащейся массы жуков — переливающихся синих, ярко-красных, мерцающих зелёных. С детским энтузиазмом профессор каталогизировал, по-видимому, несколько ранее не описанных видов насекомых."
 dubois.34.g: "Собрать образцы насекомых для научного исследования."
 dubois.34.h: "Сейчас не время для жуков — вперёд, на охоту!"
 dubois.39.t: "Успешная охота"
 dubois.39.f: "«В Африке кусается всё, но хуже всего — сафари-жук». — Эрнест Хемингуэй"
 dubois.39.g: "Триумф науки!"
 dubois.40.t: "Сафари завершено"
 dubois.40.d.success: "Цель добыта, экспедиция завершена. Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] с триумфом возвращается домой. Новое пополнение Национального зоопарка [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] несомненно вызовет как восторг публики, так и научный интерес."
 dubois.40.d.fail: "После месяцев лишений и безуспешных поисков профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] возвращается в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] без добычи. Экспедиция завершилась, не оправдав возложенных на неё надежд."
 dubois.40.f: "«Я хотел только одного — вернуться в Африку. Мы ещё не уехали, но, просыпаясь ночью, я лежал и слушал, уже тоскуя по ней...» — Эрнест Хемингуэй"
 dubois.40.g: "К следующей экспедиции."
 dubois.41.t: "Экзотические растения"
 dubois.41.d: "Экспедиция обнаружила рощу удивительных экзотических растений, хотя безопасность этого зелёного уголка остаётся под вопросом."
 dubois.41.f: "Члены экспедиции пересекали реки, взбирались на хребты и продирались сквозь густые лесные заросли. Но ничто не подготовило их к величию этих огромных цветущих растений — широколиственных гигантов, распускающихся невероятными цветами. [SCOPE.sCharacter('expedition_leader').GetFullName] сначала заявил, что они не будут задерживаться, но затем разрешил ассистенту собрать несколько образцов — их научная ценность была слишком велика. Тем не менее из джунглей доносились странные звуки — не птиц и не зверей, а может, и не людей, — которые заставили лидера задуматься."
 dubois.41.g: "Собрать несколько образцов растений."
 dubois.41.h: "Собрать как можно больше образцов."
 dubois.42.t: "Бабочки"
 dubois.42.d: "К своему удивлению, экспедиция вышла на залитую солнцем поляну, где в воздухе порхали десятки тысяч бабочек."
 dubois.42.f: "«Это цветы, которые летают и почти поют». — Роберт Фрост"
 dubois.42.g: "Наши натуралисты на родине будут в восторге."
 dubois.43.t: "Речная рыба"
 dubois.43.d: "Переходя реку вброд, несколько членов экспедиции заметили на мелководье неизвестных рыб-[Concept('concept_dubois_specimen', 'экземпляров')]. Однако [SCOPE.sCharacter('expedition_leader').GetFullName] придерживался иного мнения."
 dubois.43.f: "Переливающиеся, драгоценных оттенков существа плавали прямо у поверхности — красивые, таинственные и совершенно незнакомые. Для научной группы они были чудом, которое нужно каталогизировать. Для лидера экспедиции — долгожданным пополнением котелка. Спор был недолгим, а костёр уже горел."
 dubois.43.g: "Сохранить и изучить рыб."
 dubois.43.h: "Приготовить и съесть рыб."
 dubois.44.t: "Образцы утеряны"
 dubois.44.d: "Несколько дней назад экспедиция собрала образцы, представляющие большой научный интерес. Теперь, ко всеобщему ужасу, они исчезли."
 dubois.44.f: "В полдень раздался внезапный крик тревоги. [SCOPE.sCharacter('expedition_leader').GetFullName] опасался засады — враждебных туземцев или диких зверей, — но это был всего лишь ассистент, бледный и обезумевший. Ящики с насекомыми, листьями и законсервированными образцами исчезли. Ассистент потребовал, чтобы экспедиция повернула назад, но носильщики отказались, а лидер отверг эту идею: слишком опасно и слишком много времени уже потрачено на сбор сорняков. Ассистент пригрозил сообщить об этом пренебрежении обязанностями неким влиятельным друзьям в научных и политических кругах."
 dubois.44.g: "Вернуться по своим следам и найти коллекцию."
 dubois.44.h: "Оставить этот «хлам» и двигаться дальше."
 dubois.45.t: "Ценная коллекция"
 dubois.45.d: "На отдалённой поляне экспедиция обнаружила одинокого натуралиста, который много лет назад оставил цивилизацию и собрал замечательную коллекцию редких экземпляров."
 dubois.45.f: "Это был измождённый человек с всклокоченными волосами и впавшими от одиночества глазами. Однако его жилище было до отказа забито тщательно сохранёнными жуками, бабочками, семенами и аннотированными эскизами. [SCOPE.sCharacter('expedition_leader').GetFullName] быстро понял, что этот человек не сумасшедший, а гений, который боится. Опасаясь кредиторов и своей репутации, отшельник не решался вернуться домой. Но его коллекция имела огромную ценность, как научную, так и иную. Здесь открывались возможности, и не только ботанические."
 dubois.45.g: "Приобрести коллекцию для нашего института."
 dubois.45.h: "Нас больше интересуют его знания."
 dubois.72.t: "Обнаружена геологическая формация"
 dubois.72.d: "В области [SCOPE.sState('dubois_formation_state').GetCustom('RU_SL_PP')] [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтологи#!#!')] обнаружили скальные образования возрастом в миллионы лет. Они подозревают, что там ещё можно найти неизвестные окаменелости."
 dubois.72.f: "Формации с древними скальными пластами — это рай для [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтологов#!#!')]. Во всех скальных образованиях можно найти более мелкие окаменелости. Крупные формации могут даже содержать скелеты огромных динозавров. Палеонтологические изыскания проходят в несколько этапов. Чтобы извлечь окаменелости из формаций, нужен [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолог#!#!')]. Они будут самостоятельно изучать формации и ежегодно находить окаменелости."
 dubois.72.g: "Нужно взглянуть поближе."
 dubois.73.t: "Обнаружена крупная геологическая формация"
 dubois.73.d: "В области [SCOPE.sState('dubois_formation_state').GetCustom('RU_SL_PP')] [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтологи#!#!')] обнаружили скальные образования возрастом в миллионы лет. Вероятно, в этой массивной формации скрыто множество окаменелостей, возможно, даже хорошо сохранившиеся скелеты, о которых до сих пор мы могли только мечтать."
 dubois.101.t: "Прибытие белого медведя"
 dubois.101.d: "В наших зоологических садах появился новый чудесный обитатель: долгожданный #O белый медведь#! был благополучно помещён в свой вольер."
 dubois.101.f: "Белый медведь (*Ursus maritimus*) — могучий хищник ледяного Севера, приспособленный к жизни на дрейфующих морских льдах Арктики. Он охотится на тюленей в ледяных водах и преодолевает огромные расстояния в поисках пропитания. Несмотря на свою грозную силу, это животное менее территориально, чем его сородичи, и часто предпочитает отступить, а не сражаться. Живое противоречие — его боятся, и в то же время он находится под угрозой, — он олицетворяет суровую красоту самых холодных уголков мира."
 dubois.101.g: "Величественное пополнение."
 dubois.102.t: "Прибытие гризли"
 dubois.102.d: "Зоологические сады гудят от волнения: грозный и почитаемый #O медведь-гризли#! теперь среди нашей коллекции."
 dubois.102.f: "Медведь-гризли (*Ursus arctos horribilis*), иногда называемый североамериканским бурым медведем, — это создание огромной мощи и легендарной свирепости. Само его название вызывает двойственные ассоциации — седой (grizzled) окрас и жуткая (grisly) сила. Некогда свободно бродивший по американскому континенту, этот грозный зверь теперь является свидетельством могущества природы и разрушительного прошлого человечества. Это не просто диковинка, это напоминание."
 dubois.102.g: "Грозный обитатель."
 dubois.103.t: "Прибытие белоголового орлана"
 dubois.103.d: "Сегодня мы представляем национальный символ и чудо природы: #O белоголовый орлан#! теперь украшает наш вольер."
 dubois.103.f: "Белоголовый орлан (*Haliaeetus leucocephalus*) — хищная птица, обитающая в Северной Америке, чаще всего встречается у рек, озёр и на морских побережьях. Его благородный силуэт и пронзительный крик стали символами свободы и силы. Вопреки своему названию (Bald Eagle), он не лысый, а имеет белое оперение на голове, контрастирующее с тёмным телом. Находчивый и предприимчивый, он почитается не только как хищник, но и как культурный символ американской республики."
 dubois.103.g: "Благородный хищник."
 dubois.104.t: "Прибытие американского бизона"
 dubois.104.d: "Наша коллекция становится всё более впечатляющей: культовый #O американский бизон#! теперь бродит по нашему тщательно подготовленному вольеру-прерии."
 dubois.104.f: "Американский бизон (*Bison bison*), которого иногда называют буффало, некогда огромными стадами сотрясал равнины Северной Америки. Эти косматого гиганты были почти полностью истреблены в результате бесконтрольной охоты и освоения земель. Их возвращение в охраняемые условия неволи является памятником как прошлому безрассудству, так и нынешней ответственности. Это создание древней силы, живой символ стойкости на преображённом континенте."
 dubois.104.g: "Косматый титан."
 dubois.105.t: "Прибытие флоридской пумы"
 dubois.105.d: "Сегодня в наши зоологические сады прибыла #O флоридская пума#!, предоставляя посетителям редкую возможность взглянуть на эту неуловимую кошку."
 dubois.105.f: "Флоридская пума (*Puma concolor coryi*) — скрытный подвид североамериканской пумы, обитающий в болотистых лесах и субтропических зарослях юго-востока США. Бледная окраска, тёмные кончики хвоста и ушей — этого проворного хищника чаще слышат, чем видят. Его тихие звуки — щебет, рычание и шипение — контрастируют с бесшумной походкой. Долгое время преследуемая, а теперь охраняемая, она остаётся одним из самых редких крупных млекопитающих Северной Америки."
 dubois.105.g: "Призрак болот."
 dubois.106.t: "Прибытие американского аллигатора"
 dubois.106.d: "Грозная реликвия ушедшей эпохи теперь нашла у нас свой дом: прибыл #O американский аллигатор#!."
 dubois.106.f: "Американский аллигатор (*Alligator mississippiensis*) — грозная рептилия и хозяин водно-болотных угодий. Высший хищник и инженер экосистемы, он формирует свою среду обитания, выкапывая водоёмы и регулируя популяции добычи. Его глухой рёв разносится по болотам во время брачных игр и демонстрации силы. Несмотря на устрашающий вид, это древнее существо жизненно важно для здоровья своей среды обитания, а теперь — и для просвещения нашей публики."
 dubois.106.g: "Зубы и ужас."
 dubois.107.t: "Прибытие аксолотля"
 dubois.107.d: "Загадочное чудо водного мира теперь под нашей опекой: #O аксолотль#! выставлен на обозрение."
 dubois.107.f: "Аксолотль (*Ambystoma mexicanum*) — постоянно живущая в воде саламандра, обитающая в древних озёрах Мексики. Уникальность её в том, что она сохраняет ювенильные черты на протяжении всей жизни, достигая зрелости без метаморфозы. Её поразительная способность регенерировать утраченные конечности и даже части сердца или мозга восхищает учёных на протяжении многих поколений. Изучаемая со времён фон Гумбольдта, она остаётся символом биологической загадки и приспособляемости."
 dubois.107.g: "Живое чудо."
 dubois.111.t: "Прибытие бурогорлого ленивца"
 dubois.111.d: "Диковинное сокровище с верхушек деревьев теперь называет наши сады своим домом: #O бурогорлый ленивец#! был аккуратно помещён в свой вольер."
 dubois.111.f: "Бурогорлый ленивец (*Bradypus variegatus*) — медлительное древесное млекопитающее, обитающее в неотропиках Центральной и Южной Америки. Предпочитая лесной полог, он проводит большую часть своей жизни, вися вниз головой, и спускается на землю лишь раз в восемь дней для испражнения. Этот ленивец придерживается удивительно небольшой территории, часто специализируясь на одном или двух излюбленных видах деревьев. Несмотря на свою вялость, он является мастером маскировки и символом эволюционного терпения."
 dubois.111.g: "Самый медленный философ."
 dubois.112.t: "Прибытие ягуара"
 dubois.112.d: "Бесшумной походкой и с горящими глазами #O ягуар#! теперь крадётся в тени густых вольеров нашего зоопарка."
 dubois.112.f: "Ягуар (*Panthera onca*) — высший хищник тропической Америки и третья по величине кошка в мире. Отличаясь мускулистым телосложением, яркой шкурой с узором из розеток и исключительно мощным укусом, ягуар способен одним ударом прокусить череп жертвы. Его название происходит от слова *yaguara* на языке тупи-гуарани, что означает «тот, кто убивает одним прыжком». Неуловимый и одинокий, этот кот — мастер скрытности и внезапного нападения в густых тропических лесах."
 dubois.112.g: "Воплощение скрытности."
 dubois.113.t: "Прибытие гигантского муравьеда"
 dubois.113.d: "Эксцентричное насекомоядное теперь бродит среди нас: #O гигантский муравьед#! сделал первые шаги в своём новом доме."
 dubois.113.f: "Гигантский муравьед (*Myrmecophaga tridactyla*) — самый крупный из видов муравьедов, обитающий на лугах и в лесах Центральной и Южной Америки. Это одиночное млекопитающее отличается вытянутой мордой и языком, способным выдвигаться до 60 см, а также грозными когтями, которыми он вскрывает термитники и муравейники. Несмотря на неуклюжую походку, он уникально приспособлен к своей специализированной диете и образу жизни. Несмотря на свой миролюбивый вид, он может яростно защищаться в случае угрозы."
 dubois.113.g: "Аристократ среди насекомоядных."
 dubois.114.t: "Прибытие девятипоясного броненосца"
 dubois.114.d: "Создание, облачённое в живую броню, теперь спешит в наш вольер: прибыл #O девятипоясный броненосец#!."
 dubois.114.f: "Девятипоясный броненосец (*Dasypus novemcinctus*) — самый распространённый вид броненосцев в Америке. Узнаваемый по своему сегментированному костяному панцирю и пугливому нраву, он является искусным землекопом и насекомоядным. Как примечательный участник Великого американского обмена, в последние десятилетия он значительно расширил свой ареал на север. Его своеобразный способ передвижения включает способность плавать или ходить по дну рек, что делает его чудом биологической стойкости и приспособляемости."
 dubois.114.g: "Воплощение любопытства."
 dubois.115.t: "Прибытие андского кондора"
 dubois.115.d: "Некогда паривший высоко над скалами и вершинами, #O андский кондор#! теперь расправляет свои могучие крылья над нашим вольером."
 dubois.115.f: "Андский кондор (*Vultur gryphus*) — одна из самых крупных летающих птиц в мире по размаху крыльев и весу, обитающая в Андах и на тихоокеанских побережьях Южной Америки. Этот падальщик играет важнейшую экологическую роль в своей горной среде обитания. Его лишённые перьев голова и шея меняют цвет в зависимости от эмоций или температуры, а огромные крылья позволяют ему парить часами без единого взмаха. Почитаемый в андской мифологии и провозглашённый символом свободы, он одновременно величественен и находится под угрозой исчезновения."
 dubois.115.g: "Монарх восходящих потоков."
 dubois.116.t: "Прибытие американского ламантина"
 dubois.116.d: "Кроткий пловец с карибских мелководий теперь под нашей опекой: #O американский ламантин#! теперь с нами."
 dubois.116.f: "Американский ламантин (*Trichechus manatus*) — медлительное водное травоядное, обитающее в тёплых прибрежных водах Карибского бассейна, Мексиканского залива и юго-востока США. Иногда называемые «морскими коровами», ламантины пасутся на подводной растительности и известны своим покладистым нравом. Несмотря на свои размеры, они проворные пловцы, движимые мощными, веслообразными хвостами. Не имея естественных врагов, они сильно пострадали от вторжения человека, столкновений с лодками и потери среды обитания."
 dubois.116.g: "Парящий философ."
 dubois.117.t: "Прибытие саймири"
 dubois.117.d: "Маленький ростом, но с огромной харизмой, #O саймири#! пополнил нашу коллекцию."
 dubois.117.f: "Саймири (*род Saimiri*) — высокосоциальные приматы тропических лесов Центральной и Южной Америки. Весящие менее килограмма, они являются проворными верхолазами, быстрыми прыгунами и бесконечно любопытными существами. Живя большими группами под предводительством доминантных самок, их жизнь наполнена сложным общением — щебетом, гоготом и свистом, отражающим их запутанные социальные связи. Их выразительные мордочки и безграничная энергия делают их как объектом исследований, так и любимцами публики."
 dubois.117.g: "Крошечные акробаты с огромным обаянием."
 dubois.121.t: "Прибытие иберийской рыси"
 dubois.121.d: "Новый и неуловимый обитатель пополнил нашу коллекцию: редкая и грациозная #O иберийская рысь#! теперь занимает свой вольер."
 dubois.121.f: "Иберийская рысь (*Lynx pardinus*) — находящаяся под угрозой исчезновения кошка, обитающая исключительно на Пиренейском полуострове. Отличаясь пятнистой рыжеватой шкурой, чёрными кисточками на ушах и коротким хвостом, она заметно меньше своей евразийской кузины. Её слух тонко настроен благодаря заметным волоскам на ушах — эксперименты показали, что удаление этих кисточек ухудшает определение направления. Одиночная и территориальная, иберийская рысь некогда была широко распространена по всей Испании и Португалии, но теперь выживает благодаря строгим мерам по сохранению."
 dubois.121.g: "Редкая жемчужина Пиренеев."
 dubois.122.t: "Прибытие евразийского волка"
 dubois.122.d: "Тихой поступью и с настороженным взглядом #O евразийский волк#! теперь обитает в наших зоологических садах."
 dubois.122.f: "Евразийский волк (*Canis lupus lupus*) — самый распространённый подвид серого волка, обитающий на обширных территориях Европы и Азии. С мехом от серого до рыжеватого и характерным чёрным седлом на спине, это хитрый и социальный хищник. Его вой длиннее и мелодичнее, чем у американских сородичей, — жуткая песнь старого мира. Эти волки пережили века преследований и фольклорных историй, но продолжают выживать в отдалённых лесах и степях."
 dubois.122.g: "Призрачный страж."
 dubois.123.t: "Прибытие евразийского барсука"
 dubois.123.d: "Сегодня нашу коллекцию пополнил упорный землекоп: #O евразийский барсук#! был успешно размещён."
 dubois.123.f: "Евразийский барсук (*Meles meles*) — коренастый ночной представитель семейства куньих, обитающий на большей части Европы. Узнаваемый по чёрно-белым полосам на морде, он живёт в больших, сложных системах нор, называемых городками, часто совместно с сородичами. Эти социальные хищники питаются дождевыми червями, насекомыми и клубнями и строят обширные подземные жилища, передаваемые из поколения в поколение. Их сезонные колебания веса отражают суровые условия спячки и климата."
 dubois.123.g: "Непоколебимый обитатель подземелий."
 dubois.124.t: "Прибытие горностая"
 dubois.124.d: "Наша коллекция млекопитающих снова расширяется: гибкий и смертоносный #O горностай#! теперь украшает наш зоопарк."
 dubois.124.f: "Горностай (*Mustela erminea*), также известный как ermine в своей белой зимней фазе, — небольшое хищное млекопитающее семейства куньих, обитающее в Евразии и Северной Америке. С его длинным телом, короткими лапами и чёрным кончиком хвоста, он приспособлен для быстрой охоты на грызунов, свою основную добычу. Примечательно, что он нападает на животных в несколько раз крупнее себя. Его ценный белый зимний мех веками украшал королевские мантии, делая это в остальном скрытное существо непреходящим символом благородства."
 dubois.124.g: "Убийца в горностаевой мантии."
 dubois.125.t: "Прибытие выдры"
 dubois.125.d: "Водоёмы наших зоологических садов теперь принимают нового изящного обитателя: прибыла #O евразийская выдра#!."
 dubois.125.f: "Евразийская выдра (*Lutra lutra*) — полуводный хищник, обитающий в Европе и на большей части Азии. Питаясь в основном рыбой, она с поразительной ловкостью патрулирует реки и озёра. Её мех — один из самых плотных в животном мире, состоящий из сцепляющихся волосков, которые задерживают изолирующий воздух и отталкивают воду. Это позволяет ей оставаться сухой и тёплой даже в ледяных условиях. Пугливая, но любопытная, выдра является признаком здоровых пресноводных экосистем и триумфом природоохранных усилий на всём её ареале."
 dubois.125.g: "Дух ручья."
 dubois.126.t: "Прибытие альпийского козла"
 dubois.126.d: "Взбираясь на высоты нашего альпийского вольера, #O альпийский козёл#! теперь гордо стоит на скалах."
 dubois.126.f: "Альпийский козёл (*Capra ibex*) — вид диких козлов европейских Альп, известный своими впечатляющими рогами и уверенной грацией. Самцы обладают большими изогнутыми рогами, которые используются в ритуальных поединках во время брачного сезона. Эти животные уникально приспособлены к вертикальной местности, питаясь скудной альпийской растительностью и выживая в суровом скалистом климате. Некогда почти истреблённый, вид был вновь завезён в горы благодаря королевскому указу и усилиям по сохранению."
 dubois.126.g: "Монарх гор."
 dubois.127.t: "Прибытие зубра"
 dubois.127.d: "Древний зверь Европы вернулся: #O европейский бизон (зубр)#! теперь шагает по своему зелёному загону."
 dubois.127.f: "Зубр (*Bison bonasus*), или европейский бизон, — самое тяжёлое из выживших наземных млекопитающих Европы. Некогда бродивший от Испании до Урала, к началу XX века он был полностью истреблён в дикой природе. Все ныне живущие особи происходят всего от дюжины экземпляров, сохранённых в зоопарках. По сравнению со своим американским собратом, зубр выше и стройнее, приспособлен к жизни в смешанных и лиственных лесах. Это живой символ выживания вопреки всему."
 dubois.127.g: "Возрождённая реликвия."
 dubois.131.t: "Прибытие гиппопотама"
 dubois.131.d: "Наши зоологические сады теперь могут похвастаться могучим пополнением: тяжеловесный #O гиппопотам#! был размещён в своём водном вольере."
 dubois.131.f: "Гиппопотам (*Hippopotamus amphibius*) — полуводное парнокопытное из Африки к югу от Сахары и третье по величине наземное млекопитающее после слона и носорога. Его название, происходящее от греческого «речная лошадь», скрывает нрав гораздо более вспыльчивый, чем у лошадей. В светлое время суток он остаётся погружённым в реки или болота, периодически всплывая, чтобы дышать, а ночью пасётся в одиночку. Хотя гиппопотам и травояден, он является одним из самых опасных животных Африки, способным на поразительную скорость и агрессию, если его спровоцировать."
 dubois.131.g: "Левиафан мелководий."
 dubois.132.t: "Прибытие африканского льва"
 dubois.132.d: "Создание царственной осанки и древней славы теперь под нашей опекой: #O африканский лев#! теперь правит в своих владениях в наших садах."
 dubois.132.f: "Лев (*Panthera leo*) — мощная кошка, обитающая на лугах и в саваннах Африки и некоторых частях Индии. В отличие от большинства кошек, львы — социальные животные, живущие в сложных семейных группах, называемых прайдами. Пышная грива самца служит как украшением, так и защитой. Исторически почитаемый в геральдике, скульптуре и поэзии, лев остаётся мощным символом власти, отваги и господства. Но за мифом скрывается грозный хищник, чья совместная охота подчёркивает его необузданную индивидуальную силу."
 dubois.132.g: "Царственный зверь."
 dubois.133.t: "Прибытие африканского саванного слона"
 dubois.133.d: "Крупнейшее наземное животное на Земле прибыло: сегодня мы приветствуем #O африканского саванного слона#! в его специально подготовленной среде обитания."
 dubois.133.f: "Африканский саванный слон (*Loxodonta africana*) — колоссальное травоядное, известное своим интеллектом, памятью и матриархальным обществом. Его огромные уши служат терморегуляторами, а хобот — необычайное слияние носа и верхней губы — выполняет осязательные, обонятельные и манипулятивные функции. Известно, что слоны скорбят по своим умершим и демонстрируют сложное социальное поведение. Некогда властители бескрайних равнин, теперь они являются символами как величия, так и хрупкости в меняющемся мире."
 dubois.133.g: "Образец памяти и мощи."
 dubois.134.t: "Прибытие жирафа"
 dubois.134.d: "Возвышаясь над всеми остальными, #O жираф#! занял своё место в наших зоологических садах."
 dubois.134.f: "Жираф (*Giraffa camelopardalis*) — самое высокое из ныне живущих наземных животных, легко узнаваемое по вытянутой шее и пятнистой шкуре. Обитая в африканских саваннах и лесах, он объедает листья акаций на высоте, недоступной для других травоядных. Несмотря на свой долговязый вид, жираф двигается с удивительной грацией и скоростью. Это животное давно восхищает человечество, оставаясь непреходящим символом элегантности и неземного замысла."
 dubois.134.g: "На голову выше остальных."
 dubois.135.t: "Прибытие очкового пингвина"
 dubois.135.d: "Неожиданный гость с южных морей вперевалку входит в нашу коллекцию: #O очковый пингвин#! теперь выставлен на обозрение."
 dubois.135.f: "Очковый пингвин (*Spheniscus demersus*) — единственный вид пингвинов, гнездящийся на африканском континенте. Отличаясь чёрной лицевой маской и розовыми пятнами вокруг глаз, он является ныряющим хищником, питающимся рыбой и кальмарами. Приспособленный к умеренному климату, он процветает в прибрежных условиях без необходимости в холоде. Его комичная походка скрывает птицу, обладающую поразительной ловкостью и выносливостью в море, — неизменный любимец как посетителей, так и натуралистов."
 dubois.135.g: "Морская птица во фраке."
 dubois.136.t: "Прибытие голого землекопа"
 dubois.136.d: "Уникальная диковинка природы теперь роет норы под нашим взором: прибыл #O голый землекоп#!."
 dubois.136.f: "Голый землекоп (*Heterocephalus glaber*) — необыкновенный грызун, приспособленный к подземной жизни под землями Восточной Африки. Почти безволосый и холоднокровный, он является единственным млекопитающим-термоконформером и одним из немногих эусоциальных млекопитающих, чьи колонии управляются размножающейся королевой и её супругами. Примечательно устойчивый к раку и способный выдерживать почти бескислородные условия, это скромное существо стало объектом интенсивных научных исследований, особенно в области долголетия и клеточного восстановления."
 dubois.136.g: "Чудо биологии, хоть и не красоты."
 dubois.137.t: "Прибытие саванной зебры"
 dubois.137.d: "Полосатый обитатель африканских равнин пополнил наше собрание: узрите #O саванную зебру#! в её новом доме."
 dubois.137.f: "Зебра (*Equus quagga*) — род диких лошадиных, обитающих исключительно в Африке. Наиболее известные своей чёрно-белой полосатой окраской, зебры населяют саванны, луга и даже горные районы. Эволюционное предназначение их уникальной шкуры остаётся предметом споров — от маскировки и введения хищников в заблуждение до терморегуляции и отпугивания кусающих насекомых. Стадные животные с острым зрением и крепкими копытами, зебры одновременно грациозны и очень бдительны."
 dubois.137.g: "Порядок в полоску."
 dubois.141.t: "Прибытие гигантской панды"
 dubois.141.d: "Уникальный символ Востока теперь украшает наши сады: #O гигантская панда#! поселилась в своём специально построенном вольере."
 dubois.141.f: "Гигантская панда (*Ailuropoda melanoleuca*) — медведь, обитающий в умеренных горных лесах центрального Китая. Отличаясь яркой чёрно-белой шкурой и тяжеловесной походкой, она уникальна среди медвежьих своей преимущественно растительной диетой — питаясь почти исключительно бамбуком. Хотя она и относится к отряду хищных, её пищеварительная система плохо приспособлена к выбранному рациону, что требует постоянного кормления. Одиночка по натуре, панда бродит по определённой территории и редко взаимодействует с другими вне короткого брачного сезона. Некогда почти мифическое существо для западных натуралистов, она остаётся живой иконой охраны природы."
 dubois.141.g: "Посол Китая."
 dubois.142.t: "Прибытие борнейского орангутана"
 dubois.142.d: "Сегодня мы приветствуем существо с глубоким интеллектом и древесной грацией: #O борнейский орангутан#! обосновался в своём убежище на верхушках деревьев."
 dubois.142.f: "Борнейский орангутан (*Pongo pygmaeus*) — человекообразная обезьяна, обитающая в тропических лесах Борнео и Суматры. Известный своими удлинёнными руками и рыжей шерстью, он является самым древесным из всех приматов, ежедневно строя гнёзда из веток высоко в кронах деревьев. У самцов развиваются большие лицевые валики, и они издают громкие долгие крики, чтобы заявить о своём присутствии. У этого уединённого и созерцательного вида социальные связи обычно ограничиваются материнской заботой. Орангутаны демонстрируют исключительные способности к решению проблем, использованию инструментов и память, и считаются одними из самых умных животных, помимо человека."
 dubois.142.g: "Мыслитель с ветвей."
 dubois.143.t: "Прибытие бенгальского тигра"
 dubois.143.d: "Наконец-то прибыл монарх лесов и лугов: #O бенгальский тигр#! теперь царит в своём величественном вольере."
 dubois.143.f: "Бенгальский тигр (*Panthera tigris tigris*) — грозный хищник, обитающий на Индийском субконтиненте. С яркой шкурой, украшенной смелыми чёрными полосами, он является одной из самых крупных и поразительных кошек в мире. Предпочитая одиночное существование, тигр охотится, используя скрытность и силу, часто нападая на добычу из засады со смертельной точностью. Его владения включают леса, болота и луга — везде, где можно найти крупных копытных. Тигр давно будоражит воображение поэтов, принцев и охотников, оставаясь непреходящим символом величия и свирепости."
 dubois.143.g: "Истинный некоронованный король."
 dubois.144.t: "Прибытие малайского тапира"
 dubois.144.d: "С уникальной внешностью и любопытными повадками, #O малайский тапир#! теперь обитает среди нашей коллекции экзотических зверей."
 dubois.144.f: "Малайский тапир (*Tapirus indicus*) — самый крупный и самый заметный из тапиров, и единственный представитель своего рода, обитающий за пределами Америки. Его окрас — резкий контраст чёрного и белого — служит деформирующей маскировкой в пятнистом свете тропических лесов Юго-Восточной Азии. Обладая плохим зрением, но острым слухом и обонянием, он является скрытным ночным животным. Хотя его своеобразная внешность когда-то ставила в тупик ранних зоологов, теперь его ценят как реликвию древнего рода."
 dubois.144.g: "Иллюзионист от природы."
 dubois.145.t: "Прибытие комодского варана"
 dubois.145.d: "Ящерный ужас с далёких островов теперь крадётся по нашей территории: #O комодский варан#! был благополучно помещён в свою среду обитания."
 dubois.145.f: "Комодский варан (*Varanus komodoensis*) — самая большая из ныне живущих ящериц в мире, эндемик нескольких индонезийских островов. Этот высший хищник может достигать длины до трёх метров и обладает мощным хвостом, зазубренными зубами и ядовитыми железами, которые ослабляют добычу. Искусный охотник из засады, он с одинаковой готовностью поедает падаль и одолевает живую добычу. Его грозная репутация и позднее открытие западной наукой в 1910 году придали ему ореол мифичности. Сегодня он остаётся мощным символом первобытной силы."
 dubois.145.g: "Эхо эпохи рептилий."
 dubois.146.t: "Прибытие снежного барса"
 dubois.146.d: "Спустившись с крыши мира, неуловимый #O снежный барс#! пополнил нашу коллекцию."
 dubois.146.f: "Снежный барс (*Panthera uncia*), также известный как ирбис, обитает в холодных высокогорьях Центральной и Южной Азии. Облачённый в дымчатую шкуру и наделённый густым мехом, мощными лапами и длинным хвостом-балансиром, он великолепно приспособлен к горной местности. Тихий и редко видимый, он бродит по альпийским перевалам в поисках диких овец и коз. В отличие от других больших кошек, он не может рычать, но общается с помощью набора шипящих, рычащих и жалобных мяукающих звуков. Давно почитаемый в центральноазиатском фольклоре, снежный барс остаётся призрачным существом как в природе, так и в культуре."
 dubois.146.g: "Призрак гор."
 dubois.147.t: "Прибытие азиатского гепарда"
 dubois.147.d: "Стремительный, как пустынный ветер, редкий #O азиатский гепард#! прибыл, чтобы удивлять и просвещать наших посетителей."
 dubois.147.f: "Азиатский гепард (*Acinonyx jubatus venaticus*) — находящийся под угрозой исчезновения подвид гепарда, ранее широко распространённый на Ближнем Востоке и в Индии. Отличаясь более светлой шкурой и более стройным телосложением, он остаётся самым быстрым наземным млекопитающим на Земле, способным на взрывные спринты, которые генерируют огромное внутреннее тепло. Его историческая связь с индийской знатью, которая обучала их для охоты, сделала его символом как грации, так и упадка. Сократившись до крошечной популяции в Иране, азиатский гепард является живым памятником исчезнувшим ареалам."
 dubois.147.g: "Исчезающая скорость."
 dubois.148.t: "Прибытие красной панды"
 dubois.148.d: "Появилось редкое и застенчивое существо из туманных Гималаев: #O красная панда#! теперь украшает наши деревья."
 dubois.148.f: "Красная панда (*Ailurus fulgens*) — древесное млекопитающее, обитающее в умеренных лесах восточных Гималаев и юго-западного Китая. Хотя она и делит своё название с гигантской пандой, она принадлежит к своему собственному семейству. Отличаясь рыжей шерстью, кольчатым хвостом и милой мордочкой, красная панда питается ночью и в сумерках, в основном бамбуком. Чувствительная к жаре и одиночка по натуре, она проводит дни, спя наверху, свернувшись и прикрыв нос хвостом. Редкая жемчужина лесного полога, она ценится, но находится под угрозой."
 dubois.148.g: "Неуловимая и изысканная."
 dubois.151.t: "Прибытие зелёной морской черепахи"
 dubois.151.d: "Почтенный странник океанов нашёл безопасную гавань: #O зелёная морская черепаха#! теперь обитает в нашем водном павильоне."
 dubois.151.f: "Зелёная морская черепаха (*Chelonia mydas*) — крупная морская рептилия, известная своими протяжёнными миграциями между местами кормёжки и гнездования. Её обтекаемый панцирь в форме слезы и широкие, похожие на ласты конечности делают её искусным пловцом. Хотя обычно она имеет оливковый или чёрный окрас, цвет варьируется в зависимости от региона. Взрослые черепахи питаются почти исключительно морскими водорослями, формируя целые подводные луга своим выпасом. Долгоживущая, терпеливая и загадочная, зелёная черепаха веками была спутником моряков и символом выносливости."
 dubois.151.g: "Древняя и вечная."
 dubois.152.t: "Прибытие гигантской манты"
 dubois.152.d: "Огромный, безмолвный левиафан расправил крылья под водой: #O гигантская манта#! теперь парит в нашем большом морском аквариуме."
 dubois.152.f: "Гигантская манта (*Mobula birostris*) — самый крупный из скатов, с размахом «крыльев», достигающим 7 метров и более. Обитая в тропических и субтропических морях, эти нежные фильтраторы парят в океане с грацией, не соответствующей их размерам. Имея мало естественных врагов, их единственной реальной угрозой являются люди. Их кожа гладкая и отмечена характерными узорами, что делает каждую особь уникально опознаваемой. Широко признанная одним из самых величественных созданий океана, манта давно вызывает трепет у моряков и натуралистов."
 dubois.152.g: "Призрак с крыльями."
 dubois.153.t: "Прибытие рыжего кенгуру"
 dubois.153.d: "С выжженных солнцем равнин Австралии скачет наш новый гость: #O рыжий кенгуру#! совершил свой первый прыжок в неволе."
 dubois.153.f: "Рыжий кенгуру (*Osphranter rufus*) — самое крупное из ныне живущих сумчатых и мощный символ австралийской глубинки. Самцы, известные как «Большие Рыжие», особенно внушительны и в полный рост могут достигать более 2,4 метра. Их мощные задние лапы и эластичные сухожилия позволяют им преодолевать большие расстояния со скоростью до 60 км/ч. Настоящее чудо эволюционного замысла, рыжий кенгуру уникально приспособлен к своей суровой и засушливой родине, сочетая в себе грацию, выносливость и чистую атлетическую мощь."
 dubois.153.g: "Порождение континента крайностей."
 dubois.154.t: "Прибытие коалы"
 dubois.154.d: "Цепляясь за свою ветку с сонным упорством, #O коала#! теперь безмятежно дремлет в нашей эвкалиптовой роще."
 dubois.154.f: "Коала (*Phascolarctos cinereus*) — сумчатое с уникальным характером, известное своим сидячим образом жизни и зависимостью от листьев эвкалипта. С коренастым телом, выдающимися ушами и носом в форме ложки, она мгновенно узнаваема и всеми любима. Несмотря на свою милую внешность, коала очень избирательна в еде и территориальна по своей природе. Проводя до 20 часов в день во сне для экономии энергии, она скорее созерцательна, чем социальна — древесный отшельник, хорошо приспособленный к своему бедному питательными веществами источнику пищи."
 dubois.154.g: "Спящая красавица буша."
 dubois.155.t: "Прибытие утконоса"
 dubois.155.d: "Загадка натуралиста и любопытство школьника в одном лице: сегодня #O утконос#! дебютирует перед публикой."
 dubois.155.f: "Утконос (*Ornithorhynchus anatinus*) — однопроходное, обитающее в восточной Австралии и Тасмании. Яйцекладущее млекопитающее с утиным клювом, перепончатыми лапами и бобровым хвостом, оно поставило в тупик европейских учёных XVIII века, которые сначала заподозрили подделку. У самцов на задних лапах есть ядовитые шпоры, а у всех утконосов в клюве есть электрорецепторы, используемые для обнаружения добычи в мутной воде. Их эволюционная линия настолько отличается от других млекопитающих, что они остаются предметом неослабевающего интереса, балансируя на грани между знакомым и невероятным."
 dubois.155.g: "Доказательство того, что природа не боится противоречий."
 dubois.156.t: "Прибытие шлемоносного казуара"
 dubois.156.d: "Из тени тропического леса выходит загадочная птица с немалой репутацией: #O шлемоносный казуар#! теперь патрулирует свой лесной загон."
 dubois.156.f: "Шлемоносный казуар (*Casuarius casuarius*) — нелетающая птица внушительных размеров и грозного нрава, обитающая в тропических лесах северной Австралии и Новой Гвинеи. Отличаясь высоким шлемом, ярко-синей кожей и кинжалоподобными когтями, казуар по своей диете плодояден, но не по своему характеру. Хотя в дикой природе он робок, если его спровоцировать, он может стать опасно агрессивным. Функция шлема остаётся предметом споров — от демонстрации при ухаживании до акустического резонанса или защиты головы в густых зарослях. Это одновременно и реликвия, и загадка ушедшего птичьего мира."
 dubois.156.g: "Лучше наблюдать с почтением."
 dubois.157.t: "Прибытие новозеландского морского льва"
 dubois.157.d: "Стойкий обитатель субантарктических берегов пополнил наш морской вольер: #O новозеландский морской лев#! теперь отдыхает на скалах."
 dubois.157.f: "Новозеландский морской лев (*Phocarctos hookeri*) — один из самых редких и локализованных ластоногих в мире. Самцы — внушительные, с тёмной гривой — могут достигать до 2,45 метра в длину, в то время как более мелкие самки имеют рыжеватый окрас и более изящны. Почти истреблённые в XIX веке из-за охоты на тюленей, их колонии теперь восстанавливаются под защитой, особенно на отдалённых островах Окленд. Социальный прибрежный вид, мощное телосложение, выразительные морды и семейные узы морского льва сделали его предметом неослабевающего очарования и научного интереса."
 dubois.157.g: "Некогда преследуемый, ныне почитаемый."
 dubois.200.t: "Торжественное открытие Музея естественной истории"
 dubois.200.d: "Профессор [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] официально открыл Музей естественной истории, посвящённый развитию натурфилософии и изучению эволюции."
 dubois.200.f: "Когда профессор [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] объявил об открытии первого в нашей стране Музея естественной истории, мало кто вспомнил о значительных усилиях, потребовавшихся для создания этого учреждения. Национальный музей, ранее хранивший экспонаты естественной истории, сопротивлялся разделению, считая естественную историю второстепенным занятием. Благодаря настойчивости и влиянию профессора [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName], проект одержал верх. Новый музей обещает поднять палеонтологические исследования на новый уровень, и публика уже проявила живой интерес к тайнам вымерших видов и происхождению человечества. Некогда считавшаяся лишь дополнением к геологии, палеонтология теперь является авторитетной дисциплиной, а её собственные институты ставят её в ряд важнейших наук эпохи."
 dubois.200.g: "Весьма поучительное заведение!"
 dubois_natural_history_museum_modifier: "Музей естественной истории"
 dubois.201.t: "Цель палеонтологической экспедиции"
 dubois.201.f: "[Concept('concept_dubois_paleontologist', '#b #GREEN Палеонтолога#!#!')] можно отправить к геологическим формациям, где ежегодные раскопки приносят окаменелости. Крупные формации могут также содержать кости динозавров, в зависимости от континента. Самый прямой способ доступа — это суверенный контроль над территорией, хотя научные лицензии могут быть получены по дипломатической договорённости."
 dubois.201.g: "Возможно, в другой раз."
 dubois.202.t: "Окаменелые акульи зубы"
 dubois.202.d: "Палеонтологическая экспедиция привезла коллекцию окаменелых акульих зубов, реликвий древних морей."
 dubois.202.f: "Окаменелые акульи зубы, часто единственные останки этих исчезнувших существ, являются одними из самых распространённых окаменелостей из-за постоянной смены зубов у живых акул. Ещё в 1616 году Фабио Колонна в своём трактате De Glossopetris Dissertatio доказал, что так называемые «гадючьи языки» на самом деле являются акульими зубами. Род Squalicorax pristodontus, с его плоскими зазубренными зубами, процветал в меловой период и был распространён по всему миру. Такие зубы были найдены в мезозойских отложениях по всей Америке, Африке, Азии и Европе, молчаливо свидетельствуя о древности и повсеместности этих грозных хищников."
 dubois.202.g: "Прекрасное дополнение к коллекции."
 dubois.203.t: "Следы динозавров?"
 dubois.203.d: "[SCOPE.sCharacter('pb_leader').GetFullName] выражает скептицизм по поводу недавнего открытия профессора [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]."
 dubois.203.f: "После объявления о новой находке в геологической формации, лидер мелкой буржуазии прибыл осмотреть предполагаемые следы динозавров. Не выказав никакого уважения к доказательствам, [SCOPE.sCharacter('pb_leader').GetFullName] назвал отпечатки ничем не примечательными. Такое мещанское отношение вызвало оживлённый спор с профессором, который потребовал немедленных извинений. Ссора вскоре обострилась, разделив сторонников [SCOPE.sCharacter('pb_leader').GetLastName] и научные круги профессора [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]."
 dubois.203.g: "Это безошибочно следы динозавров."
 dubois.203.h: "Доказательства остаются неубедительными."
 dubois.204.t: "Палеосинопа"
 dubois.204.d: "Команда учёных обнаружила скелет раннего млекопитающего, сохранившийся в замечательном состоянии."
 dubois.204.f: "Палеосинопа, род ныне вымерших пантолестид, процветал с верхнего палеоцена до нижнего эоцена, примерно от 59 до 48 миллионов лет назад. Ископаемые свидетельства, в основном из Северной Америки и изредка из Европы, показывают крепкое телосложение и удлинённый хвост, с более короткими передними и более длинными задними конечностями. Такая морфология предполагает полуводное существование, подобное современным выдрам, в то время как строение зубов указывает на диету из животной пищи. Ископаемые пласты формаций Грин-Ривер и Уиллвуд особенно богаты образцами, предлагая ценное понимание эволюционной истории ранних млекопитающих."
 dubois.204.g: "Весьма поучительный экземпляр."
 dubois.204.h: "Подходящий подарок для коллеги."
 dubois.205.t: "Кости, обнаруженные в шахте"
 dubois.205.d: "Шахтёры в области [SCOPE.sState('dubois_excavation_state').GetCustom('RU_SL_PP')] обнаружили кости доисторического вида. Профессор [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] был вызван для расследования."
 dubois.205.f: "Обнаружение костей в шахте вызвало смешанную реакцию. В то время как палеонтолог горел желанием начать научные раскопки, руководство шахты опасалось срыва работ. Профессор [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] определил, что для надлежащих раскопок потребуется временная остановка добычи, что вызвало протест со стороны промышленников. Таким образом, находка стала предметом общественного интереса, и интеллигенция выступила за научное расследование. Некоторые предлагают компромисс — простое документирование без раскопок, чтобы не мешать промышленности, хотя это и исключит непосредственное извлечение окаменелостей."
 dubois.205.g: "Окаменелости должны быть сохранены для науки."
 dubois.205.h: "Разрешить лишь поверхностный осмотр."
 dubois.205.i: "Пусть шахтёры продолжают работать без помех."
 dubois.206.t: "Композита"
 dubois.206.d: "В этом году [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтологи#!#!')] под руководством профессора [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] обнаружили прекрасные образцы композиты на месте раскопок в области [SCOPE.sState('dubois_excavation_state').GetCustom('RU_SL_PP')]."
 dubois.206.f: "Композита, вымерший род брахиопод, существовал с позднего девона до поздней перми и имел космополитическое распространение. Его гладкая раковина, отчётливая складка и борозда, а также круглое ножное отверстие являются характерными чертами. Композита относится к семейству Athyrididae, подсемейству Spirigerellinae. Эти окаменелости, найденные на всех континентах, кроме Антарктиды, ценятся натуралистами за их древность и поучительную ценность, далеко превосходящую простое любопытство к раковине."
 dubois.206.g: "Достойное пополнение нашего кабинета."
 dubois.207.t: "Трилобит"
 dubois.207.d: "Профессор [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] передал в палеонтологическую коллекцию образцовый экземпляр трилобита. Его возраст оценивается в 400 миллионов лет, и он представляет значительную научную ценность."
 dubois.207.f: "Трилобиты, вымерший класс морских членистоногих, существовали на протяжении всей палеозойской эры, с кембрия по пермь. Их кальцитовые экзоскелеты часто сохраняются, что позволяет реконструировать их эволюционное разнообразие. С девятью отрядами, более чем 150 семействами, 5000 родами и более чем 15 000 описанными видами, трилобиты служат важными руководящими ископаемыми для палеозоя и незаменимы для геологических и палеонтологических исследований."
 dubois.207.g: "Наша благодарность профессору."
 dubois.208.t: "Аммониты"
 dubois.208.d: "Аммониты, обнаруженные в области [SCOPE.sState('dubois_excavation_state').GetCustom('RU_SL_PP')], ещё больше обогащают палеонтологические фонды нашей страны."
 dubois.208.f: "Аммониты (Ammonoidea), вымерший отряд головоногих, были чрезвычайно разнообразны: более 1500 родов и, возможно, от 30 000 до 40 000 видов. Их раковины, обычно от 1 до 30 см в диаметре, находят в морских отложениях от девона до границы мела и палеогена. Аммониты являются бесценными руководящими ископаемыми, помогающими в хронологической классификации пластов. Название «Ammonis cornua» (рога Аммона) восходит к античности, и их изучение остаётся центральным для викторианской геологии и палеонтологии."
 dubois.208.g: "Один экземпляр — для музея."
 dubois.209.t: "Окаменелая флора"
 dubois.209.d: "[Concept('concept_dubois_paleontologist', '#b #GREEN Палеонтологи#!#!')] извлекли из карьера окаменелые растения большой древности."
 dubois.209.f: "В каменноугольный период (около 360–300 миллионов лет назад) обширные леса из папоротников, хвощей и плаунов легли в основу современных угольных месторождений. Самые ранние ископаемые папоротники датируются нижним девоном (около 400 миллионов лет назад), предшествуя появлению семенных растений. Эти древние флоры представляют огромный интерес для натурфилософов, проливая свет на происхождение наземной растительности и геологические процессы, сформировавшие индустриальную эпоху."
 dubois.209.g: "Корни промышленности и прогресса."
 dubois.210.t: "Яйца динозавров"
 dubois.210.d: "Предметы, которые когда-то считались камнями, при ближайшем рассмотрении оказались окаменелыми яйцами — почти наверняка принадлежащими какому-то виду динозавров."
 dubois.210.f: "Первые научно задокументированные ископаемые яйца динозавров были обнаружены в 1859 году на юге Франции, хотя первоначально их приписали гигантским птицам. В 1923 году экспедиция Американского музея естественной истории в Монголии обнаружила яйца, которые, как теперь известно, принадлежат овираптору, а не протоцератопсу, как считалось вначале. Распространение таких находок привело к появлению конкурирующих схем классификации, и изучение яиц динозавров остаётся предметом оживлённых викторианских дебатов."
 dubois.210.g: "Обращаться с ними с предельной осторожностью."
 dubois.211.t: "Раскопки динозавра"
 dubois.211.d: "Исследуя крупную формацию, профессор [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] сделал поразительное открытие: кость динозавра! [Concept('concept_dubois_paleontologist', '#b #GREEN Палеонтолог#!#!')] немедленно организовал полномасштабные раскопки в надежде найти и другие останки."
 dubois.211.f: "«Сочетание таких черт — одних уникальных для рептилий, других заимствованных у ныне обособленных групп — проявленное у существ, значительно превосходящих размерами крупнейших из ныне живущих рептилий, будет, как я полагаю, сочтено достаточным основанием для учреждения отдельного отряда или подотряда ящероподобных рептилий, для которого я предложил бы название Dinosauria». — Ричард Оуэн"
 dubois.211.g: "Начать раскопки!"
 dubois.213.t: "Фрагменты окаменелостей"
 dubois.213.d: "На месте раскопок динозавра учёные обнаружили более мелкие фрагменты окаменелостей."
 dubois.213.f: "«Возможно, это и не та награда, которую мы искали, но каждый фрагмент дополняет наше понимание». — [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]"
 dubois.213.g: "Собрать окаменелости!"
 dubois.214.t: "Кость динозавра"
 dubois.214.d: "Профессор [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] и его команда обнаружили на месте раскопок новую кость динозавра."
 dubois.214.f: "«При виде одной кости, одного её обломка, я узнаю и воссоздаю ту часть целого, из которой она была взята. Целое существо, которому принадлежал этот фрагмент, предстаёт перед моим мысленным взором». — Жорж Кювье"
 dubois.214.g: "Добавить в коллекцию."
 dubois.215.t: "Череп динозавра"
 dubois.215.d: "В ходе раскопок был обнаружен великолепный череп динозавра."
 dubois.215.f: "«Голова была такой же длины или длиннее, чем у взрослого медведя-гризли, а челюсти — глубже по отношению к их длине. Морда была короче и глубже, чем у бульдога. Зубы все были острыми цилиндрическими клыками, гладкими и блестящими, и разного размера. На определённом расстоянии в каждой челюсти они выступали на три дюйма над десной и на один дюйм уходили в край челюсти, будучи таким образом такой же длины, как клыки тигра, но более тонкими. Два таких клыка перекрещивались с каждой стороны от середины передней части. Помимо мелкой рыбы, рептилии, без сомнения, удовлетворяли его аппетит». — Эдвард Дринкер Коп"
 dubois.215.g: "Впечатляющая находка!"
 dubois.216.t: "Скелет динозавра"
 dubois.216.d: "После месяцев кропотливой работы профессор [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] обнаружил впечатляющий скелет динозавра с несколькими костями в отличном состоянии."
 dubois.216.f: "«Сам скелет был установлен в Музее Филадельфийской академии наук в соответствии с этой реконструкцией, и когда профессор Коп показал мне его и объяснил его особенности, я заметил, что сочленения позвонков были перевёрнуты, и мягко намекнул ему, что он собрал всё задом наперёд. Его негодование было велико, и он в резких выражениях заявил, что изучал это животное много месяцев и уж по крайней мере должен отличать один его конец от другого». — Отниел Чарлз Марш"
 dubois.216.g: "Поразительно."
 dubois.220.t: "Раскопки завершены"
 dubois.220.d: "[Concept('concept_dubois_paleontologist', '#b #GREEN Палеонтологи#!#!')] завершили раскопки на месте обнаружения динозавра. Важное научное исследование подошло к концу."
 dubois.220.f: "«Охотник за окаменелостями прежде всего должен быть научным энтузиастом. Он должен быть готов переносить всевозможные трудности, страдать от холода ранней весной, поздней осенью и в начале зимы, страдать от сильной жары и палящего солнца в летние месяцы, и он должен быть готов пить щелочную воду, а в некоторых регионах отбиваться от атак москитов и других вредителей. Он должен быть отчасти инженером, чтобы уметь обращаться с большими каменными глыбами и перевозить их через бездорожные пустыни к ближайшему пункту отправки; он должен обладать тонким и умелым прикосновением, чтобы сохранить малейшие обломки костей при переломе; он должен довольствоваться очень простой жизнью, потому что эта профессия редко, если вообще когда-либо, бывает прибыльной, и ему почти всегда недоплачивают; он должен находить свою главную награду и стимул в чувстве открытия и в отправке образцов в музеи, которых он никогда не видел, на благо публики, которая мало знает или ценит самопожертвования, на которые пошёл охотник за окаменелостями». — Генри Фэрфилд Осборн"
 dubois.220.g: "Я ожидаю как минимум новый скелет динозавра для нашей коллекции."
 dubois.221.t: "Эвстеноптерон"
 dubois.221.d: "Профессор [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] обнаружил редкую доисторическую рыбу, которая может представлять собой решающий шаг в переходе от водной к наземной жизни."
 dubois.221.f: "Эвстеноптерон — вымерший род лопастепёрых рыб (Sarcopterygii) из верхнего девона Северной Америки и Европы. Он считается классическим примером ранних тетраподоморфов. Эвстеноптерон обладал как жабрами, так и примитивным лёгочно-плавательным пузырём, а также крепким скелетом плавников. Примечательно, что в его передних плавниках уже присутствуют три кости конечностей, встречающиеся у наземных позвоночных: плечевая, локтевая и лучевая. Эти адаптации предполагают, что он мог ненадолго выходить из воды. Два его спинных плавника были сдвинуты далеко назад, а брюшные и анальный плавники находились напротив."
 dubois.221.g: "Выдающееся эволюционное звено."
 dubois.222.t: "Археоптерикс"
 dubois.222.d: "Во время раскопок в баварских известняках близ Зольнхофена профессор [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] сделал открытие, ошеломившее научный мир: окаменелость, которая может заполнить пробел между рептилиями и птицами."
 dubois.222.f: "Археоптерикс — одна из самых известных переходных окаменелостей, датируемая поздней юрой. Обладая оперенными крыльями, зубами и длинным костистым хвостом, он сочетает в себе черты птиц и рептилий. Его открытие предоставило убедительные доказательства теории эволюции Дарвина, предполагая, что птицы произошли от мелких тероподовых динозавров."
 dubois.223.t: "Мегатерий"
 dubois.223.d: "В ходе палеонтологического исследования профессор [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] и его команда обнаружили кости, принадлежащие гигантскому наземному ленивцу."
 dubois.223.f: "Мегатерий — род гигантских наземных ленивцев, бродивших по Южной Америке примерно до 10 000 лет назад. Достигая размеров слонов, эти медлительные травоядные формировали свою среду обитания, выкорчёвывая деревья и выкапывая корни. Их вымирание связывают с изменением климата и деятельностью человека."
 dubois.224.t: "Ихтиозавр"
 dubois.224.d: "Руководитель палеонтологических раскопок сообщает об обнаружении доисторической рептилии, напоминающей одновременно рыбу и дельфина."
 dubois.224.f: "Ихтиозавр — морская рептилия юрского периода, приспособленная к жизни в открытом океане. Его обтекаемое тело, длинная морда и большие глаза делали его эффективным хищником. В отличие от большинства рептилий, он рожал живых детёнышей и является ярким примером конвергентной эволюции с современными дельфинами."
 dubois.225.t: "Смилодон"
 dubois.225.d: "Отдел естественной истории с гордостью объявляет о новой находке: наш [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолог#!#!')] обнаружил скелет саблезубого кота."
 dubois.225.f: "Смилодон, часто называемый саблезубым тигром, был грозным хищником Америки в эпоху плейстоцена. Его удлинённые клыки и мощное телосложение делали его высшим хищником. Окаменелости из битумных ям свидетельствуют о социальном поведении и драматических столкновениях с другой мегафауной ледникового периода."
 dubois.226.t: "Птеродактиль"
 dubois.226.d: "Кости небольшого птерозавра привели в восторг научное сообщество и уже отправлены в Палеонтологическую коллекцию."
 dubois.226.f: "Птеродактиль был одним из самых ранних птерозавров, летающих рептилий поздней юры. С размахом крыльев до 1,5 метра, он парил над прибрежными лагунами, охотясь на рыбу и мелких животных. Его открытие помогло установить разнообразие доисторической жизни и эволюцию полёта."
 dubois.227.t: "Ихтиостега"
 dubois.227.d: "Когда дирижабль приземлился, экспедиция во Вечных Льдах обнаружила необыкновенную окаменелость, которая может произвести революцию в палеонтологии. Получателем находки был назначен профессор [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName], ведущий [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолог#!#!')] страны. Предположительно, это недостающее звено между рыбами и наземными животными!"
 dubois.227.f: "Ихтиостега — один из самых ранних известных тетраподов из позднего девона. Её крепкие конечности и лёгкие знаменуют ключевой этап в эволюции от водной к наземной жизни. Окаменелость демонстрирует смесь черт рыб и амфибий, проливая свет на происхождение позвоночной жизни на суше."
 dubois.301.t: "Цель ботанической экспедиции"
 dubois.301.d: "Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] готов отправиться в ботаническое путешествие. Какие растения должны стать целью этой экспедиции?"
 dubois.301.f: "[concept_dubois_naturalist] может быть отправлен в экспедицию на поиски уникальных растений и лекарственных трав, где натуралист найдет новые экземпляры и, возможно, какие-нибудь лекарственные растения. Области, в которых есть лекарственные растения, отмечены специальным модификатором. Прямой контроль над этими областями предоставляет доступ, но для мирного въезда также можно договориться о ботанической лицензии."
 dubois.302.t: "Виктория амазонская"
 dubois.302.d: "Во время своей ботанической экспедиции профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] наткнулся на поразительную водяную лилию, не имеющую себе равных по величию."
 dubois.302.f: "Виктория амазонская, гигантская водяная лилия Амазонки, относится к роду Виктория семейства кувшинковых (Nymphaeaceae). Произрастая в медленно текущих водах бассейна Амазонки, она была названа в честь королевы Виктории. Её подводный черешок может достигать 8 метров, а плавающие листья — с бортиками и глубокими надрезами — в дикой природе вырастают до 3 метров в диаметре. Эти надрезы предотвращают разрывы и позволяют излишкам воды стекать после сильного дождя. В ботанических садах листья обычно достигают 2 метров в поперечнике."
 dubois.302.g: "Этот экземпляр станет жемчужиной нашей выставки."
 dubois.302.h: "Каталогизировать и изучить образец для научных исследований."
 dubois.303.t: "Павлиноглазка атлас"
 dubois.303.d: "Хотя экспедиция была сосредоточена на растениях, профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] был очарован колонией впечатляющих павлиноглазок атлас в тропическом лесу."
 dubois.303.f: "Павлиноглазка атлас (Attacus atlas) — одна из крупнейших ночных бабочек в мире, названная в честь титана Атланта из греческой мифологии. Самки крупнее самцов. Из коконов получают шёлк-фагара, который имеет светло-коричневый цвет и заметно прочнее обычного шёлка."
 dubois.304.t: "Аморфофаллус титанический"
 dubois.304.d: "В Индонезии профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] обнаружил колоссальный Аморфофаллус титанический, вероятно, самый большой цветок в мире. [Concept('concept_dubois_naturalist', '#b #GREEN Натуралист#!#!')] в восторге, хотя остальная часть команды жалуется на его едкий запах."
 dubois.304.f: "Род Аморфофаллус включает около 200 видов, встречающихся от Новой Гвинеи до Западной Африки. A. titanum производит самое большое из известных неразветвлённых соцветий, достигающее более трёх метров в высоту. Цветок издаёт запах падали и выделяет тепло, чтобы привлечь жуков для опыления. Его редкое цветение является главной достопримечательностью в ботанических садах."
 dubois.305.t: "Голиаф"
 dubois.305.d: "Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] ненадолго [SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'отвлеклась', 'отвлёкся')] от ботанических изысканий, обнаружив жука-голиафа."
 dubois.305.f: "Жуки-голиафы (Goliathus) — одни из самых крупных и тяжёлых насекомых на Земле, принадлежащие к подсемейству бронзовок (Cetoniinae). Личинки могут весить до 110 граммов. Мёртвые экземпляры ценятся коллекционерами и стоят больших денег."
 dubois.306.t: "Сокровищница орхидей"
 dubois.306.d: "Ботаническая экспедиция обнаружила в глубине тропического леса ослепительное разнообразие видов орхидей, многие из которых ранее были неизвестны науке."
 dubois.306.f: "Орхидеи славятся своим необычайным разнообразием — ни одно другое семейство растений не может похвастаться таким диапазоном форм, размеров и цветов. Их цветки могут быть размером с булавочную головку или с обеденную тарелку, а их палитра простирается от нежных белых и зелёных до ярких красных, синих и жёлтых, часто в поразительных сочетаниях. С более чем тысячей родов и десятками тысяч видов, орхидеи уступают только маргариткам среди цветковых растений. Каждое новое открытие обогащает наше понимание изобретательности природы."
 dubois.306.g: "Великолепное дополнение к нашей коллекции."
 dubois.307.t: "Лекарственные растения"
 dubois.307.d: "Экспедиция обнаружила несколько примечательных трав, каждая из которых обладает многообещающими лечебными свойствами."
 dubois.307.f: "Растения давно являются основой медицины — более половины всех известных лекарств получены из ботанических источников. Кора ивы, например, содержит салицин, предшественник современного аспирина, и веками утоляла боль и жар. Богатая флора тропического леса может подарить новые лекарства, ожидающие изучения и понимания."
 dubois.307.g: "Проанализировать растения для научного исследования."
 dubois.307.h: "Собрать травы для будущего использования."
 dubois.308.t: "Загадочные цветы"
 dubois.308.d: "Отправившись в неизведанный уголок тропического леса, экспедиция наткнулась на изобилие незнакомых и поразительных цветов."
 dubois.308.f: "Их красота неоспорима, однако местные проводники предупреждают, что эти цветы могут быть опасны — возможно, даже ядовиты. Команда стоит перед дилеммой: собрать цветы в большом количестве, рискуя непредвиденными последствиями, или действовать осторожно и сначала изучить их. Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] должен решить, как лучше сбалансировать любопытство и осторожность."
 dubois.308.g: "Приказать команде собрать цветы."
 dubois.308.h: "Пусть руководитель экспедиции соберёт и изучит цветы."
 dubois.308.i: "Оставить эти таинственные цветы нетронутыми."
 dubois.309.t: "Оппозиция критикует ботаническую экспедицию"
 dubois.309.d: "[SCOPE.sCharacter('dubois_sceptical_leader').GetLastName] осуждает ботаническую экспедицию как расточительное использование государственных средств, утверждая, что ресурсы следует направить в другое место. Его протест столь же громок, сколь и настойчив."
 dubois.309.f: "«Ещё одна экспедиция? Сначала дирижабли, потом Тихий океан, теперь ботаники бродят по джунглям. Археологи, [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтологи#!#!')], зоологи — когда это закончится? Это не что иное, как бюрократический произвол!»"
 dubois.309.g: "Отозвать: [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName]"
 dubois.309.h: "Научные изыскания должны оставаться вне политики."
 dubois.310.t: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'заболела', 'заболел')]"
 dubois.310.d: "Профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] [SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'отравилась', 'отравился')] во время сбора ботанических образцов в тропическом лесу. Тяжесть болезни вынуждает резко прервать экспедицию."
 dubois.310.f: "Пока [Concept('concept_dubois_naturalist', '#b #GREEN натуралист#!#!')] нездоров, ботаническая экспедиция приостановлена. Новые образцы не будут отправляться до его выздоровления."
 dubois.310.g: "Тревожное развитие событий."
 dubois.311.t: "Открытие экзотических семян"
 dubois.311.d: "Во время ботанической экспедиции профессор [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] [SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'обнаружила', 'обнаружил')] редкие семена со значительным научным и сельскохозяйственным потенциалом."
 dubois.311.f: "Мировой обмен культурами формировал сельское хозяйство на протяжении веков. Сахарный тростник, некогда средиземноморский, процветал в Южной Америке; в 1876 году Генри Уикхем знаменито вывез контрабандой семена каучука из Бразилии в Азию, преобразив экономики и ландшафты."
 dubois.311.g: "Добавить семена в нашу научную коллекцию."
 dubois.311.h: "Внедрить новые семена в местное сельское хозяйство."
 dubois.1000.t: "Карнавал животных"
 dubois.1000.d: "Во время посещения Зоологических садов один композитор нашёл вдохновение среди льва, слона, кенгуру и черепах, что привело к созданию причудливой музыкальной сюиты под названием «Карнавал животных»."
 dubois.1000.f: "«Карнавал животных» (Grande fantaisie zoologique) был написан Камилем Сен-Сансом в 1886 году во время пребывания в небольшой австрийской деревушке. Опираясь на более ранние наброски времён преподавания в Париже, Сен-Санс создал это игривое камерное произведение по настоянию студентов, которым нравились музыкальные пародии. Заботясь о репутации, композитор не публиковал произведение при жизни, так как оно юмористически имитировало звуки животных и мягко пародировало коллег-композиторов. Только после смерти Сен-Санса произведение дошло до публики благодаря издателю Жаку Дюрану."
 dubois.1000.g: "Зоологический шедевр в музыке?"
 dubois.1001.t: "Вход в Зоологические сады"
 dubois.1001.d: "Добро пожаловать к главному входу в Зоологические сады. Отсюда вы можете исследовать различные вольеры с животными."
