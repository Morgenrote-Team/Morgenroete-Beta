 dubois.1021.t: "Азиатские галереи естественной истории"
 dubois.1021.d: "В Зоологических садах Азиатские павильоны устроены с трезвой дидактической целью: бревенчатые киоски и пагоды, лакированные ширмы и сдержанные эмблемы обрамляют характерную фауну. Вдумчивому посетителю предлагается совершить размеренную прогулку по разнообразным мирам Азии."
