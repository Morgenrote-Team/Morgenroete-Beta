 dubois.139.t: "Горилла"
 dubois.139.d: "Наш зоопарк пополнился новым экзотическим животным: сегодня в свой новый вольер переехала долгожданная #O горилла#!."
 dubois.139.f: "Горилла, родом из лесов Центральной Африки, является крупнейшей из человекообразных обезьян. С её мощным телосложением и умным взглядом она живёт в социальных группах, возглавляемых доминантным самцом, известным как среброспинный. Гориллы в основном травоядны, питаясь листьями, стеблями и фруктами. Несмотря на свои размеры и силу, они, как правило, нежны и застенчивы, проводя большую часть своего времени в поисках пищи и отдыхая в своей лесной среде обитания."
 dubois.139.g: "Они огромные!"
 visit_gorilla_tt: "Вы посетите вольер с #o гориллами#!."
