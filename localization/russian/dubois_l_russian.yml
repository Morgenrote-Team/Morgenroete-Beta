 dubois.1022.t: "Вольер с большими пандами"
 dubois.1022.d: "Это убежище для #o большой панды#! сочетает в себе тенистую пагоду и заросли бамбука, устроенные так, чтобы напоминать о её умеренных горных лесах."
 dubois.1022.f1: "Самка со своим крошечным детёнышем расположилась под бамбуком. Размножение у больших панд, как известно, происходит нечасто; самка находится в эструсе лишь недолгое время каждый год, а новорождённый — часто весом чуть более двухсот граммов — появляется на свет слепым и беспомощным. Поэтому материнская забота чрезвычайно важна: детёныша кормят и оберегают до тех пор, пока он не наберётся достаточной силы и координации."
 dubois.1022.f2: "Игра, хотя и кажется праздным занятием, имеет очевидную пользу. Молодые особи борются и кувыркаются, что развивает конечности, тренирует равновесие на неровной поверхности и позволяет освоить элементарные правила поведения своего вида. Даже взрослые животные иногда позволяют себе поиграть, напоминая, что физические упражнения способствуют здоровью как в зверинце, так и в дикой природе."
 dubois.1022.f3: "Большая панда — уникальный представитель семейства медвежьих, чей рацион состоит почти полностью из бамбука. Её коренные зубы расширены для перемалывания волокнистых побегов, а примечательная лучевая сесамовидная кость — так называемый ложный большой палец — помогает удерживать стебли. Чтобы компенсировать скудное питание, она вынуждена кормиться в течение длительных периодов и сохранять силы, передвигаясь размеренной походкой."
 dubois.1022.k: "Вернуться к азиатским вольерам"
 zoo_asian_enclosures_tt: "Вы вернётесь к азиатским вольерам зоопарка."
 dubois.1023.t: "Вольер с орангутанами"
 dubois.1023.d: "На малайском языке «орангутан» означает «лесной человек». Здесь #o борнейские орангутаны#! наслаждаются высокими помостами, сетями и множеством брёвен, что соответствует их образу жизни, который они ведут преимущественно среди ветвей."
 dubois.1023.f1: "Орангутан — самая древесная из человекообразных обезьян. С огромным размахом рук и очень гибкими кистями и стопами он передвигается по пологу леса с помощью брахиации и осторожного лазания. Каждый вечер он строит аккуратную спальную платформу из согнутых ветвей — привычка, наблюдаемая как на свободе, так и в хорошо оборудованной неволе."
 dubois.1023.f2: "Материнская связь продолжительна и является образцовой. Детёныш остаётся с матерью годами, обучаясь искусству строительства гнезда, выбору фруктов и осторожному передвижению. Такое терпение и обучение свидетельствуют о высоком интеллекте и социальной организации, приспособленной к уединённой лесной жизни."
 dubois.1023.f3: "Взрослые самцы, особенно с развитыми щёчными выростами, издают долгие, резонирующие крики, которые разносятся на большие расстояния. Эти голосовые объявления заявляют о присутствии, отпугивают соперников и, как полагают, помогают в распределении особей в густом лесу."
 dubois.1024.t: "Вольер с тиграми"
 dubois.1024.d: "Сначала загон кажется пустым; затем, из тени на солнце, с неторопливой властностью выходит #o бенгальский тигр#!, его полосатая шкура словно искусственно размывает очертания."
 dubois.1024.f1: "Бенгальский тигр — самый величественный из азиатских кошачьих. Одиночный и территориальный, он охотится в основном из засады, полагаясь на мощные передние лапы, втяжные когти и внезапный бросок на короткой дистанции. Знаменитая окраска — полосы на рыжеватом фоне — служит для маскировки силуэта среди камышей и лесных теней."
 dubois.1024.f2: "Тигрица — бдительная мать. После короткой беременности она удаляется в уединённое логово, где на свет появляются от двух до четырёх тигрят. Постепенно она приучает их к мясу, запахам и следам, а также к незаменимым урокам осторожности, терпения и решающего прыжка."
 dubois.1024.f3: "Голос тигра включает в себя покашливание, стоны и раскатистый рёв, который в сумерках провозглашает, что территория занята. Такие звуки уменьшают ненужные конфликты и, в брачный сезон, сообщают о присутствии подходящего партнёра."
 dubois.1025.t: "Вольер с малайскими тапирами"
 dubois.1025.d: "Этот тенистый вольер для #o малайского тапира#! предлагает укрытие, пищу и воду, имитируя его родные вечнозелёные леса."
 dubois.1025.f1: "Малайский тапир отличается смелой чёрно-белой окраской, которая при переменчивом освещении маскирует очертания животного. Ведя преимущественно ночной образ жизни, он с помощью своего подвижного хоботка общипывает побеги и листья и охотно заходит в воду как для спасения от жары, так и для бегства."
 dubois.1025.f2: "После продолжительной беременности самка рождает одного детёныша, мило окрашенного в полоску и пятна — это детский камуфляж, который исчезает с возрастом. Мать направляет его с мягкой настойчивостью, ведя безопасными тропами к пище и водопою."
 dubois.1025.f3: "Тапиры общаются с помощью тонких свистов и низкого урчания. Эти звуки служат для поддержания контакта в густых зарослях, для ухаживания и, как полагают, для тихого регулирования их одиночных передвижений по лесу."
 dubois.1026.t: "Вольер с комодскими варанами"
 dubois.1026.d: "В этом тёплом, скалистом вольере несколько #o комодских варанов#! греются на солнце или патрулируют территорию величавой поступью, пробуя воздух языками."
 dubois.1026.f1: "Комодский варан, крупнейшая из ныне живущих ящериц, является мощным охотником из засады и падальщиком. Его зазубренные зубы и грозная шея наносят глубокие раны; с помощью ядовитых выделений и инфекции даже крепкая добыча может погибнуть после недолгой погони."
 dubois.1026.f2: "Приспособленный к суровым островам, этот вид процветает благодаря неприхотливости и терпению. Зрение и хеморецепция у него острые; далёкая туша может быть обнаружена с удивительной точностью. В осанке и повадках животного чувствуется нечто первобытное."
 dubois.1026.f3: "Демонстрация превосходства включает в себя надувание горла, кивки головой и шипение. Такие церемонии, хотя и впечатляют, избавляют соперников от более губительных столкновений и достаточны для установления первенства у туши или на месте для принятия солнечных ванн."
 dubois.1027.t: "Вольер со снежными барсами"
 dubois.1027.d: "Территория из скал и уступов подходит #o снежному барсу#!, чьи родные владения лежат на холодных высотах Азии."
 dubois.1027.f1: "Снежный барс изящно приспособлен к высокогорной местности: широкие, покрытые мехом лапы для сцепления, длинный хвост для равновесия и тепла, а также бледная пятнистая шкура, которая сливается с осыпями и снегом. Он движется с безмолвной, упругой грацией, пересекая местность, которая была бы непреодолима для менее приспособленных зверей."
 dubois.1027.f2: "Его рацион состоит в основном из диких овец и коз, а также сурков и зайцев, когда представляется возможность. Ведя одиночный образ жизни, он кочует на большие расстояния и наиболее активен в сумерках."
 dubois.1027.f3: "В брачный сезон низкое мяуканье и другие приглушённые звуки сообщают о близости и намерениях. Эти голоса, хотя и скромны по сравнению с рёвом льва, достаточны в разреженном воздухе, чтобы свести партнёров на пересечённой местности."
 dubois.1028.t: "Вольер с азиатскими гепардами"
 dubois.1028.d: "Этот широкий, открытый загон напоминает суровые равнины Ближнего Востока, где #o азиатский гепард#! когда-то был более распространён."
 dubois.1028.f1: "Азиатский гепард — само воплощение скорости. Его лёгкое телосложение, глубокая грудь и длинные конечности в сочетании с полувтяжными когтями, обеспечивающими сцепление, позволяют ему совершать рывок, не имеющий равных среди четвероногих. Увы, сейчас он сохранился лишь в небольшом количестве и должен стать объектом серьёзной защиты."
 dubois.1028.f2: "Искусство охотника заключается в скрытности, спринте и сбивающем с ног ударе. Тёмные полосы под глазами уменьшают блики, а гибкий позвоночник способствует огромному шагу. Газели и другие мелкие антилопы — его обычная добыча."
 dubois.1028.f3: "Самцы издают низкие, пульсирующие звуки, чтобы заявить о своей территории и пригодности, — звуки, которые уменьшают ссоры между соперниками и направляют потенциальных партнёрш. В животноводстве тщательное изучение этих звуков оказалось полезным для благополучия вида."
