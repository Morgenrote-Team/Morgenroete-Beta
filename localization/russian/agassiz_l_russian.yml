l_russian:
 agassiz_geology_tech: "Геология"
 agassiz_geology_tech_desc: "В 1815 году строитель каналов Уильям Смит опубликовал геологическую карту Англии и Уэльса, которая учитывала ископаемые остатки и литологию. Смит признал, что определенные слои горных пород также характеризуются очень специфической, безошибочно узнаваемой фауной. В 1827 году Леопольд фон Бух ввел термин \"индексная окаменелость\" для обозначения окаменелостей, которые позволяют проводить относительную датировку. С этого момента выяснение вопроса о фактическом возрасте Земли стало научным вопросом."
 notification_agassiz_yearly_minerals_notification_name: "Ежегодный геологический отчет"
 notification_agassiz_yearly_minerals_notification_desc: "В этом году мы нашли и зарегистрировали [GetPlayer.MakeScope.Var('agassiz_generic_minerals_notification_var').GetValue|0+=] новых [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]."
 agassiz_sounding_tech: "Эхолотирование"
 agassiz_sounding_tech_desc: "Впервые эхолот был изобретен в качестве средства борьбы с подводными лодками. Однако позже он также стал использоваться во многих гражданских областях: например, для обнаружения косяков рыб и глубоководных исследований."
 building_agassiz_volcano_observatory: "Вулканическая обсерватория"
 agassiz_volcano_observatory_can_construct_volcano_tt: "В государстве есть #ORANGE вулкан#!."
 agassiz_volcano_observatory_can_construct_geologist_tt: "#default_text [GetPlayer.GetName] имеет [concept_agassiz_geologist].#!"
 pmg_agassiz_volcanology: "Вулканология"
 pm_agassiz_basic_volcanology: "Основы вулканологии"
