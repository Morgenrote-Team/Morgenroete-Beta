 agassiz.103.t: "Геологическая команда убывает"
 agassiz.103.d: "После того, как геологическая группа завершит свою работу, ассистенты-исследователи возвращаются на родину. Найденные ими формации и пещеры теперь доступны и нашим ученым."
 agassiz.103.f: "'Я могу завершить эту главу цитатой из высказывания профессора Агассиса о том, что всякий раз, когда в науке обнаруживается новый и поразительный факт, люди сначала говорят: 'это неправда', затем: 'это противоречит религии' и, наконец, 'что все знали об этом раньше'.' -Чарльз Лайелл"
 agassiz.103.g: "Это было полезной иностранной помощью."
 agassiz.104.t: "Команда по добыче урана уходит"
 agassiz.104.d: "После того, как команда по урану завершит свою работу, ассистенты-исследователи вернутся на родину. Обнаруженные ими месторождения урана также могут быть использованы нашими компаниями."
