 agassiz.801.t: "The Seismometer"
 agassiz.801.d: "[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName] and [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] today presented their new apparatus for recording seismic activity. The seismometer is a first step towards better detecting earthquakes."
 agassiz.801.f: "In response to a series of earthquakes near Comrie in Scotland in 1839, a committee was formed in the United Kingdom in order to produce better detection devices for earthquakes. The outcome of this was an inverted pendulum seismometer constructed by James David Forbes, first presented in a report by David Milne-Home in 1842, which recorded the measurements of seismic activity through the use of a pencil placed on paper above the pendulum. The designs provided did not prove effective, according to Milne's reports. It was Milne who coined the word seismometer in 1841, to describe this instrument."
 agassiz.801.g: "It is certainly useful for our academics."
 agassiz.801.h: "It is certainly useful for science."
 agassiz.802.t: "The Seismograph"
 agassiz.802.d: "[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName] and [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] today presented their new apparatus for recording seismic activity. It is significantly superior to the previous seismometer and can detect earthquake areas much better. This enables us to make more precise preparations for emergencies."
 agassiz.802.f: "The first seismographs were invented in the 1870s and 1880s. The first seismograph was produced by Filippo Cecchi in around 1875. However, the instrument was not sensitive enough, and the first seismogram produced by the instrument was in 1887, by which time John Milne had already demonstrated his design in Japan. In 1880, the first horizontal pendulum seismometer was developed by the team of John Milne, James Alfred Ewing and Thomas Gray, who worked as foreign-government advisors in Japan, from 1880 to 1895. Milne, Ewing and Gray, all having been hired by the Meiji Government in the previous five years to assist Japan's modernization efforts, founded the Seismological Society of Japan in response to an Earthquake that took place on February 22, 1880, at Yokohama."
 agassiz.802.g: "It is certainly useful for geology."
 je_agassiz_seismometer: "Seismometer"
 je_agassiz_seismometer_reason: "The seismometer is a further development of the seismoscope. It is still a very limited device for detecting earth tremors, but can at least be used as a means of recording that an earthquake has occurred.\n\nYou will gain progress if you have both an [concept_tesla_engineer] and a [concept_agassiz_geologist]"
 je_agassiz_seismometer_goal: "A geologist and an engineer must spend [JournalEntry.GetTotalGoalValue|V0] weeks working together on the new instrument."
 je_agassiz_seismograph: "Seismograph"
 je_agassiz_seismograph_reason: "A seismograph on a seismometer improves the recording of earthquakes and earth tremors in an amazing way. This would finally make a more modern type of seismology possible. A seismoscope would trigger the device to begin recording, and then a recording surface would produce a graphical illustration of the tremors automatically (a seismogram).\n\nYou will gain progress if you have both an [concept_tesla_engineer] and a [concept_agassiz_geologist]"
 je_agassiz_seismograph_goal: "A geologist and an engineer must spend [JournalEntry.GetTotalGoalValue|V0] weeks working together on the new instrument."
 agassiz_seismometer_done_tt: "The geologist and the engineer finish their theoretical preliminary considerations about the device and begin building the seismometer."
 agassiz_seismograph_done_tt: "The geologist and the engineer finish their theoretical preliminary considerations about the device and begin building the seismograph."
 agassiz.302.t: "Geyser"
 agassiz.302.d: "In his search for special geological features, [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] came across a phenomenal natural spectacle in the remoteness of [SCOPE.sState('agassiz_geyser_state').GetName]. It looks like there are geysers in the area!"
 agassiz.302.f: "A geyser is a hot spring that emits its water as a fountain at regular or irregular intervals. Such an eruption is called an eruption. Geysers are named after the Great Geysir in Iceland. Geysers require a special combination of geological and climatic conditions that only exist on a large scale in a few places. Geysers depend on three factors: a water supply in the form of an aquifer, a heat source, and at least one reservoir with a constriction to the associated plumbing system. Over 300 active geysers, about half of all existing in the world, are located in Yellowstone National Park."
 agassiz.302.g: "Does the geyser have a minute or hourly rhythm?"
