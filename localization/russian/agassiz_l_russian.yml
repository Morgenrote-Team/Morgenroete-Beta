 je_agassiz_volcano_expedition: "Вулканическая экспедиция"
 je_agassiz_volcano_expedition_reason: "Профессор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] находится в вулканической экспедиции в [SCOPE.sState('agassiz_volcano_state').GetCustom('RU_SL_PP')] вместе с командой экспертов и ассистентов. Бюджет экспедиции рассчитан максимум на 2 года. Обычно экспедиция ежемесячно добивается определённого прогресса и должна завершить свою исследовательскую работу через полтора года. Однако необычные события — будь то приятные научные открытия или неприятные катастрофы — могут повлиять на ход событий. Основное правило: уровень опасности никогда не должен достигать максимума. Это не детская прогулка. Не играйте с вулканами."
 agassiz.21.t: "Обсерватория на Везувии"
 agassiz.21.d: "В геологии Везувий считается образцовым вулканом, на примере которого можно делать выводы обо всей вулканологии. Из-за его возросшей активности с XVII века и в надежде на возможность предсказывать и научно изучать новые извержения, правительство постановило построить на его склоне вулканологическую обсерваторию."
 agassiz.21.f: "Обсерватория на Везувии (итал. Osservatorio Vesuviano) — это центр наблюдения за тремя вулканическими районами Кампании, Италия: Везувием, Флегрейскими полями и Искьей. Основанная в 1841 году на склонах Везувия Фердинандом II Бурбоном, королём Обеих Сицилий, она является старейшим вулканологическим институтом в мире."
 agassiz.21.g: "Мы — первая нация вулканологов."
 agassiz_conquered_volcano_modifier: "Завоёванный вулкан"
 agassiz_geological_disaster_modifier: "Геологическое бедствие"
 je_agassiz_volcano_expedition_ai: ""
 je_agassiz_volcano_expedition_ai_reason: ""
 agassiz.901.tt: "[SCOPE.sCharacter('agassiz_geologist_scope').GetFullName] очень тщательно изучит таинственную книгу. Это может иметь неизвестные последствия."
 agassiz.917.tt: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] и все члены экспедиции погибнут во тьме и отчаянии!"
 agassiz.909.tt: "«Путешествие к центру Земли» больше не будет доступно."
 agassiz.915.tt: "Некоторые из членов нашей экспедиции могут погибнуть."
 agassiz_lidenbrock_diary_modifier: "Дневник Отто Лиденброка"
 agassiz_journey_coe_preparation_modifier: "Подготовка к путешествию к центру Земли"
 agassiz_tragic_subterranean_accident_modifier: "Трагический подземный несчастный случай"
 je_agassiz_journey_coe: "Путешествие к центру Земли"
 je_agassiz_journey_coe_reason: "Д-р [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] таинственные заметки немецкого геолога Отто Лиденброка, которые указывают путь к подземной системе пещер. Ими пользовался ещё в XVI веке исландский алхимик по имени Арне Сакнуссемм. Согласно книге, вход находится в исландском вулкане."
 je_agassiz_journey_coe_fail: "Если д-р [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] умрёт или уйдёт в отставку, экспедиция не сможет быть продолжена."
 agassiz.901.t: "Дневник проф. Лиденброка"
 agassiz.901.d: "Во время своей вулканической экспедиции д-р [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'сделала', 'сделал')] странную находку, о которой [SelectLocalization(GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'рассказала', 'рассказал')] только после своего возвращения."
 agassiz.901.f: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] [SelectLocalization(GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] нечто, что затмевает собой вулканическую экспедицию. В пещере, которая, как полагают, когда-то принадлежала потухшему вулкану в этом районе, [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetSheHe] [SelectLocalization(GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'обнаружила', 'обнаружил')] заброшенную геологическую наблюдательную станцию. Однако местные власти не смогли дать нам никакой информации о том, какая экспедиция могла здесь проходить. При ближайшем рассмотрении жерла вулкана д-р [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'обнаружила', 'обнаружил')], что там были ящики и мешки с личными вещами, в том числе сумка учёного. Внутри был дневник — принадлежащий профессору Отто Лиденброку. Лиденброк был гамбургским геологом и минералогом, специализирующимся на вулканизме и подземных пещерных системах. Он считался одной из самых выдающихся фигур в своей области, но также был воинственным и вспыльчивым. После спора в университете он бесследно исчез во время последней поездки. Дневник, возможно, является последним ключом к его последнему пристанищу в жизни — и имеет неоценимую ценность для науки, учитывая его богатство минералогических и геологических исследований! Однако д-р [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] не согласен отправить книгу непосредственно в ближайший университет, а хотел бы изучить её более внимательно. Руководитель экспедиции утверждает, что журнал Лиденброка может дать доступ к чему-то гораздо большему, чем простое каталогизирование скучных скальных образований..."
 agassiz.901.g: "Открытие, которое принесёт пользу всем."
 agassiz.901.h: "Д-р [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'должна', 'должен')] оставить его себе и изучить."
 agassiz.902.t: "Тайна проф. Отто Лиденброка"
 agassiz.902.d: "Книга, найденная во время вулканической экспедиции, дурно влияет на нашего геолога."
 agassiz.902.f: "С тех пор как [SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('agassiz_journey_coe_leader').IsFemale, 'вернулась', 'вернулся')] из Греции, [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] почти не [SelectLocalization(SCOPE.sCharacter('agassiz_journey_coe_leader').IsFemale, 'занималась', 'занимался')] ничем, кроме таинственного дневника, который [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] [SelectLocalization(SCOPE.sCharacter('agassiz_journey_coe_leader').IsFemale, 'нашла', 'нашёл')] в вулканической полости. Взамен [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] [SelectLocalization(SCOPE.sCharacter('agassiz_journey_coe_leader').IsFemale, 'пренебрегала', 'пренебрегал')] [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHis] политическими и научными обязанностями. Сотрудники сообщают, что свет горел до поздней ночи — неделями. Как ни странно, в последнее время геолог заказывал в основном скандинавскую литературу. Говорят, что [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U] даже [SelectLocalization(SCOPE.sCharacter('agassiz_journey_coe_leader').IsFemale, 'заперлась', 'заперся')] в [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHis] доме со [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHis] племянником и кухаркой, пока не был решён особенно сложный случай. Чем глубже наш геолог копается в книге, тем более [SelectLocalization(SCOPE.sCharacter('agassiz_journey_coe_leader').IsFemale, 'маниакальной', 'маниакальным')] [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] становится. Всё указывает на то, что [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] всё больше впадает в душевную болезнь."
 agassiz.902.g: "Тревожно."
 agassiz.903.t: "Путешествие к центру Земли"
 agassiz.903.d: "После длительного изучения дневника проф. Лиденброка [SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('agassiz_journey_coe_leader').IsFemale, 'совершила', 'совершил')] прорыв."
 agassiz.903.f: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U] [SelectLocalization(SCOPE.sCharacter('agassiz_journey_coe_leader').IsFemale, 'изолировалась', 'изолировался')]. [SelectLocalization(SCOPE.sCharacter('agassiz_journey_coe_leader').IsFemale, 'Изолировалась', 'Изолировался')] от внешнего мира, чтобы провести время наедине с дневником Лиденброка. Как [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] позже нам [SelectLocalization(SCOPE.sCharacter('agassiz_journey_coe_leader').IsFemale, 'рассказала', 'рассказал')], был один отрывок, который интриговал [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHim] месяцами. Помимо личных заметок, между страницами была найдена гораздо более старая страница рукописи. Автор: исландский алхимик XVI века по имени Арне Сакнуссемм. Он оставил таинственную надпись на рунах, которая оказалась сложнее для расшифровки, чем [SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName] сначала [SelectLocalization(SCOPE.sCharacter('agassiz_journey_coe_leader').IsFemale, 'думала', 'думал')]. Затем, как по наитию, [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] [SelectLocalization(SCOPE.sCharacter('agassiz_journey_coe_leader').IsFemale, 'разгадала', 'разгадал')] загадку. Как оказалось, [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] [SelectLocalization(SCOPE.sCharacter('agassiz_journey_coe_leader').IsFemale, 'была права', 'был прав')]. У книги была тайна; тайна настолько великая и чудовищная, что она потрясла [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHim] до глубины души. Потому что послание алхимика гласило:\n\n«Спустись в кратер Снайфедльсйёкюдля, который тень Скартариса ласкает перед июльскими календами, о смелый путешественник, и ты достигнешь центра Земли. Я сделал это».\n\nЧто ещё больше взволновало [SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName]: Лиденброк добавил к тексту новые руны своим собственным почерком. Они гласили: «И я тоже». Для геолога ясно, что эти сенсационные заявления требуют научной проверки. Поэтому [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U] [SelectLocalization(SCOPE.sCharacter('agassiz_journey_coe_leader').IsFemale, 'потребовала', 'потребовал')], чтобы мы поддержали [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHis] поездку в Исландию — [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] хочет отправиться в центр Земли [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerselfHimself]!"
 agassiz.903.g: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U] совершенно [SelectLocalization(SCOPE.sCharacter('agassiz_journey_coe_leader').IsFemale, 'сошла', 'сошёл')] с ума!"
 agassiz.903.h: "Доктор знает, что делает. Поддержите [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHim]!"
 agassiz.909.t: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName]: трагический конец"
 agassiz.909.d: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('agassiz_journey_coe_leader').IsFemale, 'столкнулась', 'столкнулся')] с трагическими переменами в жизни, поэтому мы вынуждены прекратить наше запланированное путешествие к центру Земли."
 agassiz.909.f: ""
 agassiz.909.g: "Прискорбно."
 agassiz.911.t: "Исландия"
 agassiz.911.d: "Экспедиция к центру Земли, которую возглавляет [SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName], прибыла в порт Рейкьявика."
 agassiz.911.f: "В Рейкьявике было бы трудно заблудиться. Поэтому мне не было нужды спрашивать дорогу, что чревато ошибками, когда единственным средством общения являются жесты. Город простирается вдоль низкой и болотистой равнины, между двумя холмами. С одной стороны его окаймляет огромное лавовое поле, плавно спускающееся к морю. С другой стороны простирается обширный залив Факсафлоуи, на севере замкнутый огромным ледником Снайфедльс, и где «Валькирия» в то время была единственным судном. Обычно в этом заливе швартуются английские и французские рыбоохранные суда, но в тот момент они курсировали у западных берегов острова. Самая длинная из двух улиц Рейкьявика шла параллельно пляжу. Я быстро исследовал эти унылые улочки; то тут, то там виднелся выцветший дёрн, похожий на изношенный кусок ковра, или подобие огорода, скудные овощи которого подошли бы для лилипутского стола. Несколько чахлых левкоев пытались насладиться воздухом и солнцем. За три часа я осмотрел не только город, но и его окрестности. Общий вид был удивительно унылым. Ни деревьев, ни какой-либо растительности. Повсюду голые скалы, следы вулканической деятельности."
 agassiz.911.g: "Итак, начнём."
 agassiz.912.t: "Снайфедльсйёкюдль"
 agassiz.912.d: "Команда достигла кратера исландского вулкана и готовится к спуску."
 agassiz.912.f: "Ужин был быстро съеден, и маленькая компания устроилась как могла. Постель была жёсткой, укрытие не очень надёжным, а наше положение — тревожным, на высоте пяти тысяч футов над уровнем моря. На следующее утро мы проснулись полузамёрзшие от пронизывающего воздуха, но под лучами великолепного солнца. Я поднялся со своей гранитной постели и вышел, чтобы насладиться великолепным зрелищем, которое развернулось передо мной. Я поднял голову и увидел прямо над собой верхнее отверстие конуса, обрамляющее кусочек неба очень небольшого обхвата, но почти идеально круглого. Прямо на краю виднелся снежный пик Скартарис, чётко и ясно выделяющийся на фоне бесконечного пространства. Я ещё не осмеливался заглянуть в бездонную пропасть, в которую мне предстояло погрузиться. Настал решающий час. Я уже упоминал, что её диаметр составлял сто футов, а окружность — триста. Я наклонился над выступающей скалой и посмотрел вниз. Мои волосы встали дыбом от ужаса. Меня охватило головокружительное чувство пустоты. Я почувствовал, как мой центр тяжести смещается, и головокружение, подобно опьянению, поднялось к моему мозгу."
 agassiz.912.g: "Была ли это действительно такая уж хорошая идея?"
 agassiz.913.t: "Поиски воды"
 agassiz.913.d: "После спуска в вулкан запасы воды иссякают. Всего через несколько дней путешествие уже находится под серьёзной угрозой."
 agassiz.913.f: "Никогда ещё минералоги не оказывались в столь удивительной ситуации, чтобы изучать природу на месте. То, что буровая машина, бесчувственный, инертный инструмент, не смогла вынести на поверхность из внутреннего строения земного шара, мы могли рассмотреть собственными глазами и потрогать собственными руками. Сквозь пласты сланца, окрашенные нежными оттенками зелёного, извилистыми путями тянулись нити меди и марганца со следами платины и золота. Я подумал, какие богатства здесь погребены на недосягаемой глубине, навсегда сокрытые от алчных глаз человечества! Около шести часов этот блестящий праздник иллюминаций заметно поутих, а затем почти прекратился. Как я и предсказывал, вода полностью закончилась к концу первого дня обратного пути. Нашей единственной жидкостью теперь был джин; но эта адская жидкость обжигала мне горло, и я не мог даже выносить её вида. Температура и воздух казались мне удушающими. Усталость парализовала мои конечности. Не раз я падал без движения. Тогда была остановка; и мой дядя с исландцем делали всё возможное, чтобы привести меня в чувство. Но я видел, что и он мучительно боролся с чрезмерной усталостью и муками жажды. Мы добрались на четвереньках, полумёртвые, до развилки двух дорог. Там я упал, как безжизненный ком, распростёршись на лавовой почве."
 agassiz.913.g: "Мы слишком глубоко под землёй — нужно искать воду здесь."
 agassiz.913.h: "Нужно вернуться на поверхность и искать воду там."
 agassiz.914.t: "Внутреннее море"
 agassiz.914.d: "Следуя за ручьём через систему пещер, путешественники натыкаются на огромное подземное море."
 agassiz.914.f: "Словно по волшебству, мы нашли воду: поток нёс холодную воду вглубь земли и наполнил наши запасы. Но когда мы последовали за ним и дошли до его конца, нас ждал ещё больший сюрприз. Сначала я почти ничего не видел. Мои глаза, непривычные к свету, быстро закрылись. Когда я смог снова их открыть, я стоял скорее ошеломлённый, чем удивлённый. Огромная водная гладь, начало озера или океана, простиралась далеко за пределы видимости, живо напоминая мне то открытое море, которое вызвало у десяти тысяч греков Ксенофонта после их долгого отступления одновременный крик: «Талатта! Талатта!» — «Море! Море!». Глубоко изрезанный берег был окаймлён полосой мелкого блестящего песка, мягко омываемого волнами и усеянного мелкими раковинами, в которых обитали первые сотворённые существа. Волны разбивались о берег с глухим, гулким рокотом, свойственным обширным замкнутым пространствам. Это был целый океан, с неровными земными берегами, но пустынный и пугающе дикий на вид. Легко представить, что после сорокасемидневного заключения в узкой галерее дышать влажным воздухом, пропитанным солёными частицами, было верхом физического наслаждения."
 agassiz.914.g: "Построить плот."
 agassiz.915.t: "Великан"
 agassiz.915.d: "Рунические знаки на таинственных, первобытных гигантских грибах указывают на то, что Арне Сакнуссемм был здесь. Но чтобы найти доказательства этой гипотезы, придётся пройти мимо гигантского, жуткого доисторического человека."
 agassiz.915.f: "Рассеянный свет позволял разглядеть мельчайшие предметы в густых и дальних зарослях. Мне показалось, что я вижу — нет! я видел собственными глазами, как движутся огромные, колоссальные фигуры. Это были гигантские животные; это было стадо мастодонтов — не ископаемые останки, а живые, похожие на тех, чьи кости были найдены в болотах Огайо в 1801 году. Я видел этих огромных слонов, чьи длинные, гибкие хоботы рыли и переворачивали землю под деревьями, словно легион змей. Я слышал треск их длинных бивней, вонзающихся в старые гниющие стволы. Я смотрел, недоверчиво качая головой. Но хотя сначала я не верил, мне пришлось уступить очевидности. Действительно, на расстоянии четверти мили, прислонившись к стволу гигантского каури, стоял человек, Протей этих подземных регионов, новый сын Нептуна, наблюдающий за этим бесчисленным стадом мастодонтов. Да, поистине, он был ещё огромнее. Это было уже не ископаемое существо, подобное тому, чьи высохшие останки мы легко поднимали на костяном поле; это был гигант, способный управлять этими чудовищами. Ростом он был не менее двенадцати футов. Его голова, огромная и бесформенная, как у буйвола, была наполовину скрыта в густых и спутанных зарослях его нечёсаных волос. Она больше всего напоминала гриву первобытного слона. В руке он с лёгкостью держал огромную ветвь, посох, достойный этого пастуха геологического периода."
 agassiz.915.g: "Мы должны рискнуть."
 agassiz.915.h: "Это слишком опасно — возвращаемся на поверхность, немедленно!"
 agassiz.916.t: "Рукопись Арне Сакнуссемма"
 agassiz.916.d: "Избежав встречи с гигантским человекоподобным существом, путешественники нашли галерею, где повсюду были инициалы Арне Сакнуссемма. После недолгих поисков они находят доказательство того, что исландский алхимик действительно был здесь — легендарная рукопись найдена глубоко под землёй!"
 agassiz.916.f: "Ещё через четверть часа наши проворные ноги унесли нас за пределы досягаемости этого ужасного чудовища. И всё же, теперь, когда я могу спокойно размышлять, когда мой дух успокоился, когда прошли месяцы с этой странной и сверхъестественной встречи, что я должен думать? во что я должен верить? Я должен заключить, что наши чувства не могли нас обмануть, что наши глаза видели то, что мы думали, что видели. Ни один человек не живёт в этом подземном мире; ни одно поколение людей не обитает в этих нижних пещерах земного шара, неизвестных и не связанных с жителями его поверхности. В это абсурдно верить! Я скорее допущу, что это могло быть какое-то животное, чьё строение напоминало человеческое, какая-нибудь обезьяна или бабуин ранних геологических эпох, какая-нибудь протопитека или мезопитека, какая-нибудь ранняя или средняя обезьяна, подобная той, что была обнаружена г-ном Ларте в костяной пещере Сансау. Но это существо превосходило по росту все известные в современной палеонтологии измерения. Но чтобы человек, живой человек, а следовательно, и целые поколения, несомненно, были погребены там, в недрах земли, — это невозможно. Однако мы оставили позади светящийся лес, онемевшие от изумления, подавленные и поражённые ужасом, доходившим до оцепенения. Мы продолжали бежать, боясь, что ужасное чудовище может преследовать нас. Это было бегство, падение, подобное тому страшному притяжению и тасканию, которое свойственно кошмарам. И, с огромным интересом, мы всматривались во всю высокую стену, заглядывая в каждую трещину, которая могла бы открыться в галерею. Там, на гранитной плите, появились две таинственные выгравированные буквы, наполовину съеденные временем. Это были инициалы смелого и отважного путешественника: «А. С.», — крикнул мой дядя. — «Арне Сакнуссемм! Арне Сакнуссемм повсюду!»"
 agassiz.916.g: "Наконец-то — она наша!"
 agassiz.917.t: "Исчезновение «Путешествия к центру Земли»"
 agassiz.917.d: "Путешествие к центру Земли провалилось. Мы подозреваем, что все члены экспедиции погибли от жажды из-за нехватки воды."
 agassiz.917.f: "Было восемь часов вечера. Признаков воды всё ещё не было. Я ужасно страдал. Мой дядя шёл вперёд. Он отказывался останавливаться. Он с тревогой прислушивался к журчанию далёких источников. Но нет, была мёртвая тишина. И вот мои конечности начали подкашиваться. Я сопротивлялся боли и мучениям, чтобы не остановить дядю, что привело бы его в отчаяние, ибо день подходил к концу, и это был его последний день. Наконец, я совсем ослаб; я вскрикнул и упал. «Подойди ко мне, я умираю». Мой дядя вернулся. Он смотрел на меня, скрестив руки; затем с его губ сорвались эти бормочущие слова: «Всё кончено!». Последнее, что я видел, был ужасный жест ярости, и мои глаза закрылись."
 agassiz.917.g: "Какая трагедия!"
 agassiz.918.t: "Стромболи"
 agassiz.918.d: "Путешествие к центру Земли увенчалось полным успехом — наши учёные благополучно вернулись героями после извержения вулкана Стромболи!"
 agassiz.918.f: "У меня осталось смутное впечатление от непрерывных взрывов, громких детонаций, общего содрогания скал вокруг нас и вращательного движения, с которым наш плот однажды беспомощно закружился. Он качался на потоке лавы среди густого пеплопада. Шипящее пламя метало в нас свои огненные языки. Снизу дули дикие, яростные порывы штормового ветра, напоминающие дуновение огромных доменных печей, работающих одновременно; и я мельком увидел фигуру Ганса, освещённую огнём; и всё, что я чувствовал, было похоже на то, что, должно быть, чувствует несчастный преступник, приговорённый к тому, чтобы быть взорванным заживо из жерла пушки, прямо перед тем, как нажмут на спусковой крючок, и летящие конечности и клочья плоти и кожи наполнят дрожащий воздух и забрызгают залитую кровью землю.\n\nКогда я снова открыл глаза, я почувствовал, как сильная рука нашего проводника схватила меня за пояс. Я лежал на склоне горы всего в двух ярдах от зияющей пропасти, которая поглотила бы меня, если бы я хоть немного наклонился. Над нашими головами, на высоте пятисот футов или более, мы видели кратер вулкана, из которого с интервалом в пятнадцать минут или около того с громкими взрывами вырывались высокие столбы огня, смешанные с пемзой, пеплом и текущей лавой. Я чувствовал содрогание горы, которая, казалось, дышала, как огромный кит, и выдыхала огонь и ветер из своих огромных дыхал. Внизу, по довольно крутому склону, текли потоки лавы на восемьсот или девятьсот футов, что придавало горе высоту около 1300 или 1400 футов. Но основание горы было скрыто в настоящей беседке из пышной зелени, среди которой я смог различить оливы, инжир и виноградные лозы, покрытые сочными фиолетовыми гроздьями."
 agassiz.918.g: "Вот это приключение!"
 agassiz.919.t: "Съедены великаном"
 agassiz.919.d: "Путешествие к центру Земли провалилось. Мы подозреваем, что все члены экспедиции были съедены заживо великаном."
 agassiz.919.f: "По крайней мере, мы так подозреваем."
