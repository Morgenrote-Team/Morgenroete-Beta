 agassiz.11.g: "Можно ли считать [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] основателем сейсмологии?"
 agassiz.301.d: "Д-р [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] завершил[SelectLocalization(GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] свою пятилетнюю исследовательскую работу в области чрезвычайно скучных скальных образований и уныло выглядящих холмистых ландшафтов и неторопливо возвращается в университет, чтобы мучить студентов столь же захватывающими лекциями."
 agassiz.316.t: "Геологическая съёмка в соседней стране"
 agassiz.316.d: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] не слишком серьёзно отнёсся к своей работе и искал формации и пещеры в соседней стране. Разумеется, геологические результаты мы оставим себе."
 agassiz.316.g: "Как только [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetSheHe] [SelectLocalization(GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'смогла', 'смог')] пробраться незамеченно?"
 je_agassiz_find_coal_project_reason: "Ваш [concept_agassiz_geologist|l], д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], лихорадочно ищет рудные жилы в #tooltippable_name #tooltip:[JournalEntry.GetTarget.GetBuilding.GetType.GetTooltipTag],DATA_BUILDING_NAME_TOOLTIP,BuildingTooltip [JournalEntry.GetTarget.GetBuilding.GetType.GetCustom('RU_BL_PP')]#!# в [JournalEntry.GetTarget.GetBuilding.GetState.GetCustom('RU_SL_PP')].\n$mr_divider_for_je$\nПроект будет получать прогресс каждый месяц. Как только прогресс достигнет [JournalEntry.GetTotalGoalValue|V0], здание получит новый [concept_modifier|l] $agassiz_building_production_mult_modifier_with_tooltip$.\n$mr_divider_for_je$\nТекущий ежемесячный прогресс: #underline #tooltip:[GetRawTextTooltipTag('agassiz_monthly_geologist_improvement_progress_var_tt')] [GetPlayer.MakeScope.GetVariable('agassiz_monthly_geologist_improvement_progress_var').GetValue|2+] #!#!"
