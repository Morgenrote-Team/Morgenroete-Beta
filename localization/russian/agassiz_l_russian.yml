l_russian:
 agassiz_geology_tech: "Геология"
 agassiz_geology_tech_desc: "В 1815 году строитель каналов Уильям Смит опубликовал свою карту геологии Англии и Уэльса, в которой учитывались как окаменелости, так и литология. Смит признал, что определённые последовательности пород также характеризуются очень специфической и безошибочной последовательностью фауны. В 1827 году Леопольд фон Бух ввёл термин «руководящее ископаемое» для окаменелостей, позволяющих производить относительное датирование. С этого момента выяснение вопроса о фактическом возрасте Земли стало делом науки."
 notification_agassiz_yearly_minerals_notification_name: "Ежегодный геологический отчёт"
 notification_agassiz_yearly_minerals_notification_desc: "В этом году мы обнаружили и зарегистрировали [GetPlayer.MakeScope.Var('agassiz_generic_minerals_notification_var').GetValue|0+=] новых [Concept('concept_agassiz_mineral', 'минералов')]."
 agassiz_sounding_tech: "Эхолотирование"
 agassiz_sounding_tech_desc: "Эхолот был изобретён в ответ на угрозу подводной войны. Однако позже его стали применять и во многих гражданских областях: например, для обнаружения косяков рыб и в глубоководных исследованиях."
 building_agassiz_volcano_observatory: "Вулканологическая обсерватория"
 agassiz_volcano_observatory_can_construct_volcano_tt: "В области есть #ORANGE вулкан#!."
