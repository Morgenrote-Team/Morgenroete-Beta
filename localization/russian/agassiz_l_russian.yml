 agassiz.801.t: "Сейсмометр"
 agassiz.801.d: "[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName] и [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] сегодня представили свой новый аппарат для регистрации сейсмической активности. Сейсмометр — это первый шаг к лучшему обнаружению землетрясений."
 agassiz.801.f: "В ответ на серию землетрясений близ Комри в Шотландии в 1839 году в Соединенном Королевстве был создан комитет по разработке более совершенных устройств обнаружения землетрясений. Результатом этого стал сейсмометр с перевернутым маятником, сконструированный Джеймсом Дэвидом Форбсом, впервые представленный в отчете Дэвида Милн-Хоума в 1842 году, который регистрировал измерения сейсмической активности с помощью карандаша, положенного на бумагу над маятником. Согласно отчетам Милна, представленные образцы не оказались эффективными. Именно Милн в 1841 году ввел в обиход слово \"сейсмометр\" для описания этого прибора."
 agassiz.801.g: "Это, безусловно, полезно для наших учёных."
 agassiz.801.h: "Это, безусловно, полезно для науки."
 agassiz.802.t: "Сейсмограф"
 agassiz.802.d: "[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName] и [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] сегодня представили свой новый аппарат для регистрации сейсмической активности. Он значительно превосходит предыдущий сейсмометр и может гораздо лучше обнаруживать сейсмические зоны. Это позволяет нам более точно готовиться к чрезвычайным ситуациям."
 agassiz.802.f: "Первые сейсмографы были изобретены в 1870-х и 1880-х годах. Первый сейсмограф был изготовлен Филиппо Чекки примерно в 1875 году. Однако прибор был недостаточно чувствителен, и первая сейсмограмма, полученная с его помощью, была получена в 1887 году, когда Джон Милн уже демонстрировал свою разработку в Японии. В 1880 году команда Джона Милна, Джеймса Альфреда Юинга и Томаса Грея, которые с 1880 по 1895 год работали советниками при иностранном правительстве в Японии, разработала первый горизонтальный маятниковый сейсмометр. Милн, Юинг и Грей, которые в предыдущие пять лет были наняты правительством Мэйдзи для оказания помощи в модернизации Японии, основали Японское сейсмологическое общество в ответ на землетрясение, произошедшее 22 февраля 1880 года в Иокогаме."
 agassiz.802.g: "Это, безусловно, полезно для геологии."
 je_agassiz_seismometer: "Сейсмометр"
 je_agassiz_seismometer_reason: "Сейсмометр — это дальнейшее развитие сейсмоскопа. Это всё ещё очень ограниченное устройство для обнаружения толчков земли, но его, по крайней мере, можно использовать как средство регистрации факта землетрясения.\n\nВы будете получать прогресс, если у вас есть и [concept_tesla_engineer], и [concept_agassiz_geologist]"
 je_agassiz_seismometer_goal: "Геолог и инженер должны провести [JournalEntry.GetTotalGoalValue|V0] недель, работая вместе над новым инструментом."
 je_agassiz_seismograph: "Сейсмограф"
 je_agassiz_seismograph_reason: "Сейсмограф на основе сейсмометра удивительным образом улучшает запись землетрясений и толчков земли. Это, наконец, сделало бы возможным более современный тип сейсмологии. Сейсмоскоп запускал бы устройство, чтобы начать запись, а затем записывающая поверхность производила бы графическую иллюстрацию толчков автоматически (сейсмограмму).\n\nВы будете получать прогресс, если у вас есть и [concept_tesla_engineer], и [concept_agassiz_geologist]"
 je_agassiz_seismograph_goal: "Геолог и инженер должны провести [JournalEntry.GetTotalGoalValue|V0] недель, работая вместе над новым инструментом."
 agassiz_seismometer_done_tt: "Геолог и инженер заканчивают свои предварительные теоретические рассуждения об устройстве и приступают к сборке сейсмометра."
 agassiz_seismograph_done_tt: "Геолог и инженер заканчивают свои предварительные теоретические рассуждения об устройстве и приступают к сборке сейсмографа."
 agassiz.302.t: "Гейзер"
 agassiz.302.d: "В поисках особых геологических особенностей [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] наткнулся на феноменальное природное зрелище в глуши [SCOPE.sState('agassiz_geyser_state').GetName]. Похоже, в этом районе есть гейзеры!"
 agassiz.302.f: "Гейзер - это горячий источник, который выбрасывает воду в виде фонтана через регулярные или неравномерные промежутки времени. Такое извержение называется извержением вулкана. Гейзеры названы в честь Большого гейзера в Исландии. Гейзеры требуют особого сочетания геологических и климатических условий, которые существуют в больших масштабах только в нескольких местах. Гейзеры зависят от трех факторов: наличия воды в виде водоносного горизонта, источника тепла и, по крайней мере, одного резервуара, подключенного к соответствующей водопроводной системе. В Йеллоустонском национальном парке расположено более 300 действующих гейзеров, что составляет около половины всех существующих в мире."
 agassiz.302.g: "Есть ли у гейзера минутный или часовой ритм?"
