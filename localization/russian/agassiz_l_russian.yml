 agassiz.812.t: "Новый высочайший пик?"
 agassiz.812.d: "В течение многих лет Дхаулагири считалась самой высокой измеренной горой, но [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] не был[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] в этом убеждён[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')]. После месяцев триангуляции и неустанных вычислений из тумана появился новый кандидат: Канченджанга."
 agassiz.812.f: "Инструменты д-ра [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], хоть и потрёпанные штормами, не оставляли сомнений. На высоте более 28 000 футов этот отдалённый пик на границе Сиккима и Непала превзошёл все предыдущие рекорды. Последствия для географии, картографии и национальной гордости были огромны."
 agassiz.812.g: "Неужели гора не могла выбрать имя попроще?"
 agassiz.812.tt: "#V Канченджанга#! теперь считается самой высокой горой в мире."
 agassiz.813.t: "Царь горы"
 agassiz.813.d: "Всё началось с безмолвных фигур на вершине холма в Бенгалии, наводящих латунные инструменты на небо. Среди них был[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName], чьи вычисления подтвердили невозможное: Пик XV — безвестный, далёкий, безымянный — стоял выше любой когда-либо измеренной вершины."
 agassiz.813.f: "Это объявление вызвало трепет в научных кругах. На высоте 29 000 футов этот гималайский гигант затмевал Канченджангу и Дхаулагири. Хотя он всё ещё был безымянным, учёные уже начали называть его «Крышей мира»."
 agassiz.813.g: "Назовите его в честь какого-нибудь случайного британского геодезиста, которого никто не помнит!"
 agassiz.813.tt: "#V Джомолунгма#! теперь считается самой высокой горой в мире."
 je_agassiz_highest_mountain: "Высочайшая гора"
 je_agassiz_highest_mountain_reason: "Д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] возглавляет экспедицию геологов и географов в Гималаях в поисках самых высоких гор на Земле. Ожидается, что [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe|U] вернётся через два года."
