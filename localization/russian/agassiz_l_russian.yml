 agassiz.801.t: "Сейсмометр"
 agassiz.801.d: "[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName] и [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] сегодня представили свой новый прибор для регистрации сейсмической активности. Сейсмометр — это первый шаг к более точному обнаружению землетрясений."
 agassiz.801.f: "В ответ на серию землетрясений вблизи Комри в Шотландии в 1839 году в Соединённом Королевстве был создан комитет для разработки более совершенных устройств обнаружения землетрясений. Результатом этого стал сейсмометр с перевёрнутым маятником, сконструированный Джеймсом Дэвидом Форбсом и впервые представленный в отчёте Дэвида Милна-Хома в 1842 году, который регистрировал измерения сейсмической активности с помощью карандаша, помещённого на бумагу над маятником. Согласно отчётам Милна, предложенные конструкции оказались неэффективными. Именно Милн ввёл слово «сейсмометр» в 1841 году для описания этого прибора."
 agassiz.801.g: "Это, безусловно, полезно для наших академиков."
 agassiz.801.h: "Это, безусловно, полезно для науки."
 agassiz.802.t: "Сейсмограф"
 agassiz.802.d: "[GetPlayer.MakeScope.Var('tesla_engineer_var').GetCharacter.GetFullName] и [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] сегодня представили свой новый прибор для регистрации сейсмической активности. Он значительно превосходит предыдущий сейсмометр и может гораздо лучше обнаруживать зоны землетрясений. Это позволяет нам более точно готовиться к чрезвычайным ситуациям."
 agassiz.802.f: "Первые сейсмографы были изобретены в 1870-х и 1880-х годах. Первый сейсмограф был создан Филиппо Чекки примерно в 1875 году. Однако прибор был недостаточно чувствительным, и первая сейсмограмма, полученная с его помощью, была сделана в 1887 году, к тому времени Джон Милн уже продемонстрировал свою конструкцию в Японии. В 1880 году первый сейсмометр с горизонтальным маятником был разработан командой Джона Милна, Джеймса Альфреда Юинга и Томаса Грея, которые работали в качестве иностранных правительственных советников в Японии с 1880 по 1895 год. Милн, Юинг и Грей, все нанятые правительством Мэйдзи в предыдущие пять лет для помощи в модернизации Японии, основали Сейсмологическое общество Японии в ответ на землетрясение, произошедшее 22 февраля 1880 года в Йокогаме."
 agassiz.802.g: "Это, безусловно, полезно для геологии."
 je_agassiz_seismometer: "Сейсмометр"
 je_agassiz_seismometer_reason: "Сейсмометр — это дальнейшее развитие сейсмоскопа. Это всё ещё очень ограниченное устройство для обнаружения земных толчков, но, по крайней мере, его можно использовать как средство регистрации произошедшего землетрясения.\n\nВы будете получать прогресс, если у вас есть и [concept_tesla_engineer|l], и [concept_agassiz_geologist|l]."
 je_agassiz_seismometer_goal: "Геолог и инженер должны потратить [JournalEntry.GetTotalGoalValue|V0] недель на совместную работу над новым прибором."
 je_agassiz_seismograph: "Сейсмограф"
 je_agassiz_seismograph_reason: "Сейсмограф, установленный на сейсмометре, удивительным образом улучшает регистрацию землетрясений и земных толчков. Это наконец-то сделало бы возможной более современную сейсмологию. Сейсмоскоп запускал бы устройство для начала записи, а затем записывающая поверхность автоматически создавала бы графическую иллюстрацию толчков (сейсмограмму).\n\nВы будете получать прогресс, если у вас есть и [concept_tesla_engineer|l], и [concept_agassiz_geologist|l]."
 je_agassiz_seismograph_goal: "Геолог и инженер должны потратить [JournalEntry.GetTotalGoalValue|V0] недель на совместную работу над новым прибором."
 agassiz_seismometer_done_tt: "Геолог и инженер завершают свои теоретические предварительные расчёты по устройству и приступают к созданию сейсмометра."
 agassiz_seismograph_done_tt: "Геолог и инженер завершают свои теоретические предварительные расчёты по устройству и приступают к созданию сейсмографа."
 agassiz.302.t: "Гейзер"
 agassiz.302.d: "В поисках особых геологических объектов [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] наткнулся на феноменальное природное зрелище в отдалённой [SCOPE.sState('agassiz_geyser_state').GetCustom('RU_SL_PP')]. Похоже, в этом районе есть гейзеры!"
 agassiz.302.f: "Гейзер — это горячий источник, который через регулярные или нерегулярные промежутки времени выбрасывает воду в виде фонтана. Такое извержение называется эрупцией. Гейзеры названы в честь Большого Гейзера в Исландии. Для существования гейзеров требуется особое сочетание геологических и климатических условий, которые в больших масштабах существуют лишь в нескольких местах. Гейзеры зависят от трёх факторов: источника воды в виде водоносного горизонта, источника тепла и по крайней мере одного резервуара с сужением к связанной с ним системе каналов. Более 300 действующих гейзеров, около половины всех существующих в мире, находятся в Йеллоустонском национальном парке."
 agassiz.302.g: "У гейзера минутный или часовой ритм?"
