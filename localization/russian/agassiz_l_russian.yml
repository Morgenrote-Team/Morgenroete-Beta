 je_geologist_dies_tt: "Д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] умрёт"
 agassiz_stop_geologist_project_button: "Остановить проект геолога"
 agassiz_stop_geologist_project_button_desc: "Остановить текущий проект геолога. Ваш прогресс будет потерян."
 agassiz_stop_geologist_improving_project_tt: "Вы решили остановить проект, нажав кнопку #italic «Остановить проект геолога»#!."
 agassiz_mid_atlantic_ridge_cost_modifier: "Стоимость атлантической экспедиции"
 je_agassiz_mid_atlantic_ridge: "Подводные горы"
 je_agassiz_mid_atlantic_ridge_reason: "[concept_agassiz_geologist|l] д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] в настоящее время находится на борту современного исследовательского судна, которое с помощью эхолота сканирует дно Атлантического океана. Это должно дать новые представления об истории Земли."
 je_agassiz_mid_atlantic_ridge_goal: "Ожидается, что через 12 месяцев д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] представит результаты."
 agassiz.201.t: "Срединно-Атлантический хребет"
 agassiz.201.d: "Д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] ознакомился с первыми данными. Результат экспедиции поразителен: не только на севере Атлантики, но и по всему океану подводная возвышенность видна как сплошная полоса, прерывающаяся лишь на уровне экватора. Геолог назвал это явление Срединно-Атлантическим хребтом. Дальнейший анализ данных будет проводиться в ближайшие месяцы и годы."
 agassiz.201.f: "Срединно-Атлантический хребет — это горный хребет в Атлантическом океане, который большей частью находится ниже уровня моря и простирается примерно на 20 000 км. Это делает его самым длинным из срединно-океанических хребтов — системы, охватывающей Землю и имеющей длину более 60 000 км. Поднятие морского дна в средней части Атлантики было впервые описано морским офицером Мэтью Фонтейном Мори в 1853 году и подтверждено экспедицией «Челленджера» в 1872 году. Причиной послужили предварительные исследования для прокладки первых трансатлантических глубоководных кабелей. Во время немецкой экспедиции на «Метеоре» 1925–1927 годов был создан подробный профиль Срединно-Атлантического хребта с помощью измерений эхолотом. Открытие Срединно-Атлантического хребта дало раннюю подсказку о геодинамических процессах тектоники плит, связанных с теорией дрейфа континентов Вегенера."
 agassiz.201.g: "Это улучшит геофизическое понимание геолога."
 agassiz.201.h: "Это улучшит океанографическое понимание геолога."
 agassiz.201.i: "Это улучшит общее понимание геолога."
 agassiz.202.t: "Геолого-палеонтологический симпозиум"
 agassiz.202.d: "Академия наук пригласила на мероприятие, организованное проф. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] и проф. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]. Симпозиум считается важной вехой в исследовании истории Земли. Оба учёных особо подчеркнули поразительное сходство в геологическом и ископаемом составе побережий Южной Америки и Западной Африки."
 agassiz.202.f: "Насколько тесно связаны геология и палеонтология, показывают многочисленные научные деятели, отличившиеся в обеих областях. Взаимодействие между земным слоем и окаменелостями для хронологического определения делает их неразделимыми науками. Жорж Кювье считается отцом палеонтологии, а также крёстным отцом геологии. Даже в научных спорах, например, в дебатах Кювье и Жоффруа 1830 года, которые были сосредоточены на споре между градуализмом и катастрофизмом, в качестве аргументов приводились в основном геологические и палеонтологические находки. Как современная геология, так и современная палеонтология были бы невозможны без синергии."
 agassiz.202.g: "Плодотворный научный обмен."
 agassiz.311.t: "Камень из космоса"
 agassiz.311.d: "В одном из отдалённых районов нашей страны д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] в поисках новых минералов обнаружил необычный камень. После предварительного исследования стало ясно: железосодержащий монолит — это метеорит!"
 agassiz.311.f: "Первые коллекции метеоритов были основаны ещё в XVIII веке, до того как стало известно, что метеориты имеют внеземное происхождение. Старейшая коллекция метеоритов в мире находится в Музее естествознания в Вене, где первый камень был заложен с метеоритом Грашина (упал в 1751 году). Сегодня здесь находится крупнейшая выставочная коллекция в мире, насчитывающая около 1100 объектов. До XX века было обнаружено всего несколько сотен метеоритов. Причина, по которой сейчас в мировых коллекциях насчитывается более 30 000 метеоритов, началась с открытия Харви Х. Нинингера, что метеориты на поверхности Земли встречаются гораздо чаще, чем считалось ранее. Стратегия Нинингера заключалась в поиске метеоритов на Великих равнинах США, где земля в основном обрабатывалась, а почва содержала мало камней."
 agassiz.311.g: "Откуда он?"
 agassiz_seismology_tech: "Сейсмология"
 agassiz_seismology_tech_desc: "В ответ на серию землетрясений вблизи Комри в Шотландии в 1839 году в Соединённом Королевстве был создан комитет для разработки более совершенных методов обнаружения землетрясений. Результатом этого стало создание одного из первых современных сейсмометров Джеймсом Дэвидом Форбсом. С 1857 года Роберт Маллет заложил основы современной инструментальной сейсмологии и проводил сейсмологические эксперименты с использованием взрывчатых веществ. Ему также принадлежит введение слова «сейсмология»."
 agassiz_geologist_demotivated_modifier: "Демотивированный геолог"
 agassiz_set_new_age_of_earth_effect_tt: "В [GetPlayer.GetAltNameNoFlag('RU_CL_PP')] формулируют новейшее исследование о возрасте Земли. Возраст Земли будет пересчитан."
 agassiz.401.tt: "Все державы, у которых есть [concept_agassiz_geologist|l], голосуют по исследованию."
 notification_agassiz_new_earth_age_notification_name: "Возраст Земли пересмотрен"
 notification_agassiz_new_earth_age_notification_desc: "Одному из [Concept('concept_agassiz_geologist', '#b #GREEN геологов#!#!')] удалось убедить многих коллег, что Земля намного старше, чем считалось.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('agassiz_age_of_earth_type')]"
 je_agassiz_geological_research: "Геологические исследования"
 je_agassiz_geological_research_reason: "[ROOT.GetCountry.GetCustom('je_agassiz_geological_research_active_type')] [concept_agassiz_geologist|l], который не занят другими делами, будет проводить геологические исследования.\n\nВо время исследования может произойти следующее:\n- Если у вашего геолога есть черта $agassiz_mineralogist$, ежегодная добыча [Concept('concept_agassiz_mineral', 'минералов')] удвоится.\n- Ваш геолог может найти [Concept('concept_dubois_formation', 'формации')], [Concept('concept_lepsius_cave', 'пещеры')] и уран.\n- После 5 лет исследований вы получите @agassiz_mineral! #p 25 000#! [Concept('concept_agassiz_mineral', 'минералов')] и @agassiz_rare_mineral! #p 1#! [Concept('concept_agassiz_rare_mineral', 'редкий минерал')]. Кроме того, ваш геолог может получить черту $agassiz_mineralogist$."
 agassiz.401.t: "Новый расчёт"
 agassiz.401.d: "Д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] обобщил[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] весь свой предыдущий опыт и знания, чтобы представить новую оценку возраста Земли. Вопрос в том, будет ли эта теория признана научным сообществом."
 agassiz.401.f: "С начала XIX до середины XX века определение возраста Земли оставалось неточным и по большей части было предметом постоянных дебатов и вражды. Вопрос о возрасте Земли часто был связан с вопросом эволюции, поскольку для неё требовался достаточно долгий период времени. До рубежа веков многие учёные считали, что Земле всего несколько миллионов лет — в конце своей жизни лорд Кельвин предполагал лишь 20 миллионов лет. Но даже Чарльз Дарвин, который был одним из «максималистов», защищавших свою теорию, верил примерно в 300 миллионов лет. Лишь с открытием радиоактивности возраст Земли удалось правильно определить, и стал известен истинный масштаб возраста Земли (а следовательно, и всей Солнечной системы)."
 agassiz.401.g: "Отправить работу всем известным геологам мира."
 agassiz.402.t: "Геолог представляет новый расчёт"
 agassiz.402.d: "Д-р [SCOPE.sCharacter('agassiz_geologist_scope').GetLastName] предложил[SelectLocalization(SCOPE.sCharacter('agassiz_geologist_scope').IsFemale, 'а', '')] расчёт истинного возраста Земли. Учёный считает предыдущее измерение неверным и оценивает возраст Земли значительно выше. Поскольку наш геолог является одним из уважаемых представителей этой науки, нам также прислали копию его работы."
 agassiz.402.g: "Эти расчёты убедительны."
 agassiz.402.h: "Кто поверит в этот псевдогеологический бред?"
 agassiz.403.t_yes: "Геологическое исследование принято"
 agassiz.403.d_yes: "К счастью, большинство членов Международного геологического общества оценили новые расчёты нашего геолога как важную веху и признали его теорию верной."
 agassiz.403.f_yes: "Оценка возраста Земли, предложенная д-ром [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], была принята большинством голосов. [GetGlobalVariable('agassiz_age_of_earth_yes_global_var').GetValue|+0] учёных #G приняли#! исследование, а [GetGlobalVariable('agassiz_age_of_earth_no_global_var').GetValue|+0] — #R отклонили#!. Это означало, что теория была официально признана, и возраст Земли был значительно увеличен."
 agassiz.403.g: "Триумф для д-ра [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], триумф для геологии!"
 agassiz.403.t_no: "Геологическое исследование отклонено"
 agassiz.403.d_no: "Невежественная так называемая «элита» международных геологов отвергла новое исследование нашего геолога. Нам ещё предстоит выяснить, было ли это мошенничеством на выборах или враждебным манёвром с целью подорвать нашу гордую нацию."
 agassiz.403.f_no: "Оценка возраста Земли, предложенная д-ром [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], была отклонена большинством голосов. [GetGlobalVariable('agassiz_age_of_earth_yes_global_var').GetValue|+0] учёных #G приняли#! исследование, а [GetGlobalVariable('agassiz_age_of_earth_no_global_var').GetValue|+0] — #R отклонили#!. Таким образом, предыдущая оценка возраста Земли остаётся неизменной."
 agassiz.403.h: "Поражение для д-ра [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], поражение для геологии..."
 je_agassiz_advanced_oceanography: "Передовая океанография"
 je_agassiz_advanced_oceanography_reason: "После того как предыдущие океанографические исследования были в основном направлены на практическую пользу для военных с целью стратегического использования текущих условий Тихого океана, учёные теперь выступают за использование результатов морских исследований для того, чтобы узнать больше о нашей планете — исключительно ради знания."
 je_agassiz_advanced_oceanography_success: "Мы завершим наши исследования, когда получим #G 50#! ед. @rapanui_oceanographic_knowledge! [Concept('rapanui_oceanographic_knowledge', 'океанографических знаний')]#!."
 je_agassiz_advanced_oceanography_goal: "Мы завершим наши исследования, когда получим #G 50#! ед. @rapanui_oceanographic_knowledge! [Concept('rapanui_oceanographic_knowledge', 'океанографических знаний')]#!."
 agassiz.312.t: "Геологическая съёмка"
 agassiz.312.d: "Д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] создал[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] геологический профиль большой территории и предоставил[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] карту в открытый доступ."
 agassiz.312.f: "Современная стратиграфия развивалась на протяжении XIX века: геологи по всей Европе и Северной Америке исследовали, классифицировали и сопоставляли слои горных пород в своих странах по примеру Уильяма Смита и публиковали карты, стратиграфические таблицы и трактаты с результатами своей работы."
 agassiz.312.g: "Использовать знания теоретически."
 agassiz.312.h: "Использовать знания практически."
 agassiz.313.t: "Месторождение минералов"
 agassiz.313.d: "Геологические исследования в ранее неосвоенном регионе выявили богатое месторождение минералов. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] ещё не уверен[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')], на чём сосредоточить свои поиски."
 agassiz.313.f: "Минерал — это элемент или химическое соединение, которое обычно является кристаллическим и образовано в результате геологических процессов. Большинство из примерно 6000 известных сегодня и признанных независимыми видов минералов являются неорганическими, но некоторые органические вещества, такие как меллит и эвенкит, или образующие почечные камни уэвеллит и уэдделлит, также признаны минералами, поскольку в их образовании участвовали и геологические процессы. С учётом всех известных разновидностей минералов и синонимичных названий, а также ещё не признанных видов минералов, существует более 7000 названий минералов."
 agassiz.313.g: "Количество."
 agassiz.313.h: "Качество."
 agassiz.314.t: "Вдохновляющий геолог"
 agassiz.314.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] теперь сделал[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] себе имя в мире геологии. На [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'её', 'его')] кафедре к [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'ней', 'нему')] часто обращались за советом, а в почтовом ящике скапливались письма от коллег со всего мира."
 agassiz.314.f: "«Я полагаю, что лучший геолог — тот, кто видел больше всего камней». — Герберт Гарольд Рид"
 agassiz.314.g: "Это повысит [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] репутацию."
 agassiz.314.h: "Это повысит репутацию [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] университета."
 agassiz.315.t: "Геологические озарения"
 agassiz.315.d: "Текущее исследовательское путешествие, которое привело [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'её', 'его')] во множество различных геологических мест нашей страны, открыло глаза [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]. В готовящейся к печати статье [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] обобщает некоторые новые выводы о геологических принципах."
 agassiz.315.f: "«Мир — это большая головоломка для геолога; он стоит перед ней, как ребёнок, для которого отдельные части его головоломки остаются загадкой, пока он не обнаружит их связь и не увидит, куда они подходят, и тогда его фрагменты сразу же превращаются в связную картину под его рукой». — Луи Агассис"
 agassiz.315.g: "Превосходно."
 agassiz.11.t: "Динамика землетрясений"
 agassiz.11.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] привлёк[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'ла', '')] сегодня международное внимание, поскольку [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'произвела', 'произвёл')] революцию в прежних знаниях об этом аспекте геологии, написав книгу о землетрясениях. Слова, которые [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'ввела', 'ввёл')] в обиход, такие как «эпицентр» и «сейсмология», уже вошли в науку."
 agassiz.11.f: "9 февраля 1846 года Роберт Маллет представил свою работу «Динамика землетрясений» Королевской ирландской академии, которая считается одной из основ современной сейсмологии. Между 1852 и 1858 годами с помощью своего сына Джона Уильяма Маллета он подготовил Каталог землетрясений Британской ассоциации, который появился в 1858 году и перечислял известные землетрясения и описывал их последствия. В это время он также проводил эксперименты со взрывами для определения времени прохождения сейсмических волн в рыхлых и твёрдых породах."
 pmg_agassiz_seismology: "Сейсмология"
 pm_agassiz_basic_seismology: "Основы сейсмологии"
 pm_agassiz_advanced_seismology: "Продвинутая сейсмология"
 pm_agassiz_advanced_volcanology: "Продвинутая вулканология"
 agassiz_congress_host_modifier: "Приняли геологический конгресс"
 agassiz_laughed_congress_modifier: "Осмеяны на геологическом конгрессе"
 agassiz_respected_congress_modifier: "Уважаемы на геологическом конгрессе"
 agassiz_lauded_congress_modifier: "Прославлены на геологическом конгрессе"
 agassiz.316.f: "Если на собственной территории нет интересных геологических особенностей, геологи могут искать формации или пещеры в приграничной зоне или за её пределами."
 agassiz.317.t: "Иностранный геолог"
 agassiz.317.d: "Иностранному геологу каким-то образом удалось проникнуть на нашу территорию во время своих исследований и сделать записи. Он прислал нам свои результаты в знак «благодарности»."
 agassiz.317.g: "И...?"
 agassiz.501.t: "Движутся ли континенты?"
 agassiz.501.d: "Д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] только что опубликовал[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] книгу, в которой выдвигает уже вызвавшую споры теорию. Согласно ей, континенты в их нынешнем виде имеют более позднее геологическое происхождение. Д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] постулирует, что современные континенты ранее образовывали единое целое, которое [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] называет «Пангея». Чтобы убедить международное геологическое сообщество в этой теории, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] пригласил[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] его на конгресс."
 agassiz.501.f: "Самое раннее предположение о том, что причиной был дрейф континентов, исходило от фламандского картографа Абрахама Ортелия. В издании его атласа Theatrum Orbis Terrarum 1596 года уже можно ясно видеть сходство двух береговых линий. Александр фон Гумбольдт описал сходство противоположных побережий Южной Америки и Африки и их растительности в 1801 и 1845 годах и предположил, что Атлантика была вымыта катастрофическим течением. В 1858 году географ Антонио Снидер-Пеллегрини пошёл дальше, опубликовав первую карту, на которой Старый и Новый Свет были изображены без разделяющего их океана. Однако именно Альфред Вегенер со своей теорией дрейфа континентов привёл к переосмыслению от фиксизма (тезиса о том, что континенты прочно укоренены в земле) к мобилизму. При его жизни, однако, его объяснительная модель оставалась мнением меньшинства в науке, которое утвердилось лишь во второй половине XX века."
 agassiz.501.g: "Пригласить ведущие геологические державы!"
 agassiz.502.t: "Геологическое приглашение"
 agassiz.502.d: "[SCOPE.sCountry('agassiz_congress_host_country').GetName] пригласил[SCOPE.sCountry('agassiz_congress_host_country').GetAltNameNoFormatting('RU_CL_END_FEM')] на международный геологический конгресс. Его организатор, ведущий геолог, утверждает, что континенты движутся...!"
 agassiz.502.g: "Обещает быть занимательно."
 agassiz.503.t_laughed: "Насмешки геологического общества"
 agassiz.503.t_respected: "Уверенное выступление"
 agassiz.503.t_lauded: "Восхищение и поздравления"
 agassiz.503.d_laughed: "Появление д-ра [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] было встречено с весельем. У [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] не самая лучшая репутация в области геологии, так что выдающихся достижений от неё не ждут. За закрытыми дверями явно отпускались шутки."
 agassiz.503.d_respected: "Перед началом геологического конгресса [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] тепло поприветствовали и обменялись обычными подарками. [ROOT.GetCountry.GetAltNameNoFlag] имеет признанную репутацию в мире исследований."
 agassiz.503.d_lauded: "Прибытие профессора [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] было встречено с большой радостью, так как его считали одним из самых ожидаемых гостей. Вокруг [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'неё', 'него')] быстро собралась толпа, поскольку [ROOT.GetCountry.GetNameNoFlag] считается пионером в области геологии."
 agassiz.503.f_laughed: "«Почему у #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFlag|l]ого#! геолога нет девушки?\n\nПотому что между ними слишком много трения!»"
 agassiz.503.f_respected: "По прибытии [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] провел[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] несколько приятных бесед с коллегами о в основном скучных скальных образованиях."
 agassiz.503.f_lauded: "Проф. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] казался почти ошеломлённым таким натиском. Так много коллег стремились поговорить с [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'ней', 'ним')] и хотели извлечь пользу из [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'её', 'его')] экспедиций и опыта. Некоторые даже убеждали [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'её', 'его')] прочитать частную лекцию."
 agassiz.503.g: "Как неловко!"
 agassiz.503.h: "Наконец-то среди единомышленников."
 agassiz.503.i: "Мы — ведущая геологическая держава!"
 agassiz.504.t: "Фиксизм или мобилизм?"
 agassiz.504.d: "[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('agassiz_alfred_wegener_scope').IsFemale, 'прочла', 'прочёл')] получившую признание лекцию собравшемуся международному геологическому сообществу, в которой [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetSheHe] яростно выступает за возврат геологии к мобилизму — то есть к дрейфу континентов. Но противников много, и они не хотят отклоняться от господствующей доктрины фиксизма."
 agassiz.504.f: "Фиксизм был ключевой геотектонической гипотезой до 1960-х годов. Предполагалось, что земная кора прочно связана с подстилающей породой, поэтому крупномасштабные тектонические процессы были локальными. Из этого следовало, что развитие Земли характеризовалось преимущественно вертикальными и очень незначительными горизонтальными тектоническими движениями земной коры. Большинство теорий классической геологии основывались на идее фиксизма. В начале X века в Южной Америке и Африке были найдены окаменелости одного и того же вида. В рамках фиксизма была выдвинута гипотеза сухопутных мостов, согласно которой когда-то существовали сухопутные мосты, соединявшие Африку с Южной Америкой, что позволяло животным мигрировать на другой континент. Благодаря измерениям эхолотом исследовательского судна «Метеор» между 1924 и 1927 годами, во время которых был открыт Срединно-Атлантический хребет — подводный горный хребет, идущий с севера на юг, а не, как ожидалось, остатки сухопутного моста, который должен был идти с востока на запад, гипотеза сухопутных мостов начала шататься, но не была полностью отброшена до 1960-х годов. Противоположностью фиксизма является мобилизм, который рассматривает горизонтальные движения земной коры как имеющие решающее влияние. Теория мобилизма развилась из открытия Альфредом Вегенером дрейфа континентов."
 agassiz.504.g: "Континенты не менялись миллионы лет."
 agassiz.504.h: "Всё указывает на тектонику плит."
 agassiz.505.t: "Геологи между собой"
 agassiz.505.d: "В кулуарах крупного геологического конгресса у [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] есть возможность обменяться идеями с коллегами. На чём [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'должна', 'должен')] сосредоточиться в своё свободное время?"
 agassiz.505.f: "«Это странный факт, характерный для неполного состояния наших нынешних знаний, что о доисторических условиях на нашей планете делаются совершенно противоположные выводы, в зависимости от того, подходим ли мы к проблеме с биологической или геофизической точки зрения». — Альфред Вегенер"
 agassiz.505.g: "Геологические знания."
 agassiz.505.h: "Океанографические знания."
 agassiz.505.i: "Редкие минералы."
 agassiz.505.j: "Новые таланты."
 agassiz.509.t_fix: "Триумф фиксизма"
 agassiz.509.d_fix: "Несмотря на все [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetHerHis] усилия, [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName] не смог[SelectLocalization(SCOPE.sCharacter('agassiz_alfred_wegener_scope').IsFemale, 'ла', '')] убедить большинство своих коллег. Обвинение заключается в том, что проф. [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetLastName] не может предоставить достаточных доказательств для своих тезисов. Факт остаётся фактом: континенты стабильны."
 agassiz.509.f_fix: "«Ньютон теории дрейфа ещё не появился. Его отсутствие не должно вызывать беспокойства; теория ещё молода и всё ещё часто подвергается подозрениям. В конечном счёте, нельзя винить теоретика за то, что он не решается тратить время и усилия на объяснение закона, о достоверности которого нет единого мнения». — Альфред Вегенер"
 agassiz.509.g: "И всё-таки она вертится."
 agassiz.509.t_tectonics: "Триумф мобилизма"
 agassiz.509.d_tectonics: "[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName] смог[SelectLocalization(SCOPE.sCharacter('agassiz_alfred_wegener_scope').IsFemale, 'ла', '')] убедить научное сообщество в [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetHerHis] тезисе. Дрейф континентов теперь считается наиболее вероятной теорией для объяснения множества ранее неясных геологических явлений."
 agassiz.509.f_tectonics: "«Учёные, по-видимому, всё ещё недостаточно понимают, что все науки о Земле должны вносить свой вклад в раскрытие состояния нашей планеты в прежние времена, и что истина может быть достигнута только путём объединения всех этих доказательств... Только объединив информацию, предоставленную всеми науками о Земле, мы можем надеяться определить здесь „истину“, то есть найти картину, которая излагает все известные факты в наилучшем порядке и которая, следовательно, имеет наивысшую степень вероятности. Кроме того, мы должны быть всегда готовы к тому, что каждое новое открытие, независимо от того, какая наука его предоставляет, может изменить выводы, которые мы делаем». — Альфред Вегенер"
 agassiz.509.h: "Погодите... это... удивительно!"
 agassiz_conference_geologist_double_vote_tt: "Благодаря нашему опытному геологу у нас в #G два раза#! больше голосов"
 agassiz_conference_geologist_triple_vote_tt: "Благодаря нашему знаменитому геологу у нас в #G три раза#! больше голосов."
 agassiz.601.t: "Местоположение вулкана"
 agassiz.601.d: "Группа учёных и ассистентов собралась для предстоящей вулканической экспедиции. Но теперь возникает вопрос: какой вулкан команда должна исследовать под руководством [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]? На выбор есть несколько областей."
 agassiz.601.f: "«Прошу вас не использовать слово „огонь“, когда вы говорите о теории доктора Хаттона: „жар“ — более правильное выражение. Огонь в обычном смысле этого слова предполагает наличие топлива в процессе горения; но у нас нет оснований полагать, что в центре Земли есть огонь такого рода». — Мария Хак"
 agassiz.601.g: "[SCOPE.sState('agassiz_volcano_1').GetName]"
 agassiz.601.h: "[SCOPE.sState('agassiz_volcano_2').GetName]"
 agassiz.601.i: "[SCOPE.sState('agassiz_volcano_3').GetName]"
 agassiz.602.t: "У подножия вулкана"
 agassiz.602.d: "Вулканологическая экспедиция достигла предгорий вулкана в [SCOPE.sState('agassiz_volcano_state').GetCustom('RU_SL_PP')] и теперь начинает научное исследование."
 agassiz.602.f: "«Существование подземного жара доказывается такими явлениями, как горячие источники, вулканы и землетрясения. Эти наблюдения не оставляют сомнений в существовании жара в недрах Земли; но на какой глубине, в каких масштабах и с какой интенсивностью он действует?» — Джон Плейфэр"
 agassiz.602.g: "Это не так опасно, как звучит, правда?"
 agassiz.603.t: "Успешная вулканическая экспедиция"
 agassiz.603.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'совершила', 'совершил')] дерзкий манёвр: [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] не только [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'привела', 'привёл')] своих ассистентов на вершину вулкана, но и [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'провела', 'провёл')] многочисленные эксперименты и [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'собрала', 'собрал')] образцы. Вулканическая экспедиция внесла ценный вклад в изучение внутреннего строения Земли."
 agassiz.603.f: "«Вся дикая природа рассказывает одну и ту же историю: толчки и извержения землетрясений, вулканов, гейзеров, ревущие, грохочущие волны и наводнения, безмолвный подъём сока в растениях, бури всех видов — всё это упорядоченные, творящие красоту удары сердца Природы». — Джон Мьюр"
 agassiz.603.g: "И всё это без ожогов третьей степени."
 agassiz.604.t: "Вулканическая экспедиция закончилась катастрофой"
 agassiz.604.d: "Ужасные новости! Несмотря на несколько предупреждающих знаков — ядовитые испарения, небольшие землетрясения, тёмный дым — [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName], по-видимому, упрямо [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'настаивала', 'настаивал')] на продолжении экспедиции. Извержение застало участников врасплох; район превратился в зону бедствия. Лава всё ещё заливает гору и окрестные деревни. Лишь с большим трудом некоторым выжившим удалось добраться до безопасного места с результатами исследований и образцами. Однако д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'пропала', 'пропал')] без вести. Мы должны готовиться к худшему."
 agassiz.604.f: "Газеты уже сообщают о нескольких раненых и погибших. Большие части территории пришлось эвакуировать. Здания были повреждены, а улицы залиты лавой. Вероятность того, что кто-то выжил вблизи кратера вулкана после такого разгула стихии, близка к нулю."
 agassiz.604.g: "Ужасно!"
 agassiz.605.t: "Вулканическая экспедиция закончилась безрезультатно"
 agassiz.605.d: "Вулканическая экспедиция израсходовала все средства на исследования и вернулась. К сожалению, она принесла лишь незначительные результаты. Возможно, руководитель был слишком осторожен?"
 agassiz.605.f: "«Нельзя исследовать вулкан, не потанцевав на нём немного»."
 agassiz.605.g: "Разочаровывающе."
 agassiz.611.t: "Химические открытия"
 agassiz.611.d: "Во время экспедиции в [SCOPE.sState('agassiz_volcano_state').GetCustom('RU_SL_PP')] д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'смогла', 'смог')] более подробно изучить некоторые интересные химические процессы в кратере вулкана. Некоторые минеральные соединения до сих пор совершенно неизвестны."
 agassiz.611.f: "Большинство химических элементов встречаются в соединениях, которые демонстрируют большое разнообразие, особенно в минералах. В начале современной химии геологи всегда искали новые образцы, из которых химики могли бы выделить ранее неизвестные элементы."
 agassiz.611.g: "Это может помочь д-ру [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]."
 agassiz.612.t: "Лавовая ловушка"
 agassiz.612.d: "Вулканическая экспедиция, очевидно, была слишком смелой в своём продвижении к кратеру: она оказалась окружена лавой почти со всех сторон. Отказ от дальнейшего продвижения будет означать большую потерю времени."
 agassiz.612.f: "«Сама лава имеет тот мрачный вид, который поэты приписывают рекам адских областей; она течёт медленно, как поток песка, черноватая днём и красная ночью. Приближаясь, вы слышите своего рода треск, который вызывает величайший страх, поскольку он неясен. Её сияние настолько интенсивно, что впервые земля освещает небо, придавая ему вид непрерывной молнии; небо, в свою очередь, отражает этот блеск на воде, и таким образом природа, кажется, охвачена пламенем от этого тройного образа огня». — Жермена де Сталь"
 agassiz.612.g: "Найти другой путь."
 agassiz.612.h: "Попытаться пересечь."
 agassiz.613.t: "Закалённый руководитель"
 agassiz.613.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] — опытный вулканолог, который точно знает, как обращаться с горой; его знания обеспечивают безопасное и успешное продвижение экспедиции."
 agassiz.613.f: "«Событие, которого я так долго ждал, произошло, и Везувий уже несколько дней находится в состоянии извержения. Я уже провёл много экспериментов с лавой в момент её извержения из вулкана и завершил бы их, если бы не сильное недомогание из-за того, что я слишком долго находился в этом великолепном, но опасном месте в 5-6 футах от потока раскалённой материи, текучей, как вода, и падающей, как огненный водопад». — Гемфри Дэви"
 agassiz.613.g: "Д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] — превосходный руководитель."
 agassiz.614.t: "Ядовитые газы"
 agassiz.614.d: "Команда экспедиции под руководством д-ра [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] обнаружила обильные выбросы вулканических газов в одной точке на вулкане. Геолог хотел бы взять несколько образцов, даже если это не совсем безопасно."
 agassiz.614.f: "Вулканические газы — это газы, которые выходят на поверхность Земли во время вулканической активности. Выход может происходить как на узко определённых участках, так и диффузно по большой площади со склонов вулкана. Вулканические газы собирал и анализировал ещё в 1790 году Сципион Брейслак в Италии. Состав вулканических газов зависит от движения магмы внутри вулкана. Поэтому внезапные изменения в составе газов часто предсказывают изменение вулканической активности."
 agassiz.614.g: "Мы должны изучить эти газы."
 agassiz.614.h: "Это безумие!"
 agassiz.615.t: "Вулканические выбросы"
 agassiz.615.d: "Внезапный грохот напугал участников вулканической экспедиции на короткое время. Когда команда подумала, что худшее позади, вулкан внезапно изверг раскалённые камни, которые обрушились на участников, как метеоритный дождь. Двое ассистентов были ранены, а один вьючный мул погиб."
 agassiz.615.f: "«Мы слышали над нами и вокруг острова странный звук, как будто сильный трескучий огонь или разряды тяжёлой артиллерии с интервалом в одну-две секунды. В пять часов рёв продолжался, небо потемнело, и на нас посыпался град пемзы, многие куски которой были значительного размера и довольно тёплые». — Капитан Уотсон"
 agassiz.615.g: "Неудачный поворот событий."
 agassiz.616.t: "Образец лавы"
 agassiz.616.d: "Д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'попросила', 'попросил')] экспедицию ненадолго остановиться. Поблизости, кажется, есть хорошее место, чтобы взять несколько образцов лавы. Это научно ценная и рискованная процедура."
 agassiz.616.f: "«Лава была заключена в глубоких берегах широкого русла и текла не как жидкость, а как гора кокса, или временами как сильно газированный уголь. Она трескалась, раскалывалась, искрилась, дымилась и вспыхивала, и всё время двигалась единой огромной компактной массой. Отделяющиеся куски скатывались вниз, оставляя за собой такое яростное сияние, что я мог бы представить себя у жерла железной печи; и когда каждая глыба падала с грохотом грома, деревья вспыхивали, а толпа издавала крики восхищения и сожаления». — Луиджи Пальмиери"
 agassiz.616.g: "Мы здесь ради таких экспериментов."
 agassiz.617.t: "Образец лавы — успех!"
 agassiz.617.d: "Нашему геологу удалось взять образец лавы в ходе рискованного предприятия. Результат имеет высочайшую научную ценность."
 agassiz.617.f: ""
 agassiz.617.g: "Горячая наука!"
 agassiz.618.t: "Образец лавы — неудача!"
 agassiz.618.d: "К ужасу остальных членов экспедиции, сбор образца не удался. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'получила', 'получил')] сильные ожоги и [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'подвергла', 'подверг')] команду опасности!"
 agassiz.618.f: ""
 agassiz.618.g: "Наука, о которую можно обжечься..."
 agassiz.619.t: "Кристаллы"
 agassiz.619.d: "Уникальные геологические процессы в вулканической зоне породили целый ряд редких кристаллических минералов. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] горит желанием добавить камни в коллекцию..."
 agassiz.619.f: "Большинство вулканических пород имеют ряд общих минералов. Дифференциация вулканических пород имеет тенденцию к увеличению содержания кремнезёма (SiO2) в основном за счёт фракционной кристаллизации. Таким образом, более развитые вулканические породы, как правило, богаче минералами с более высоким содержанием кремнезёма, такими как филло- и тектосиликаты, включая полевые шпаты, полиморфы кварца и мусковит. Хотя в них по-прежнему преобладают силикаты, более примитивные вулканические породы имеют минеральные ассоциации с меньшим содержанием кремнезёма, такие как оливин и пироксены. Реакционный ряд Боуэна правильно предсказывает порядок образования наиболее распространённых минералов в вулканических породах. Иногда магма может захватывать кристаллы, которые кристаллизовались из другой магмы; эти кристаллы называются ксенокристами. Алмазы, найденные в кимберлитах, являются редкими, но хорошо известными ксенокристами; кимберлиты не создают алмазы, а захватывают их и переносят на поверхность Земли."
 agassiz.619.g: "Одного образца достаточно."
 agassiz.619.h: "Взять как можно больше образцов!"
 agassiz.619.i: "Несколько камней не стоят жизни исследователя."
 agassiz.620.t: "Огненная река"
 agassiz.620.d: "Река лавы преграждает путь команде. В то время как некоторые участники считают это препятствие опасным испытанием, которое может угрожать всей вулканической экспедиции, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] рассматривает эту ситуацию в первую очередь как научную возможность опробовать неиспользованные инструменты..."
 agassiz.620.f: "«В большинстве случаев ясно видно, что свет исходит от раскалённых, но не пылающих тел. Это свет раскалённой лавы, который создаёт большой столб кажущегося пламени, устремляющийся вверх от Везувия». — Джон Филлипс"
 agassiz.620.g: "Д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'должна', 'должен')] это изучить."
 agassiz.620.h: "Это слишком опасно!"
 agassiz.621.t: "Теории вулканизма"
 agassiz.621.d: "Во время [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] пребывания на вулкане [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'хотела', 'хотел')] бы наконец проверить некоторые из [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] предыдущих теорий вулканизма, собирая доказательства и исследуя окрестности. Для этого нужно много времени в том, что [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] называет «чрезвычайно увлекательным и вдохновляющим районом», в то время как [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] коллеги со скрежетом зубов наблюдают, как на заднем плане поднимается всё больше и больше тёмного дыма..."
 agassiz.621.f: "«В кульминационный момент извержения столб пепла поднялся высоко в форме огромной сосны, пока, наконец, не начал наклоняться вниз, когда из-за количества плотного вещества, из которого состоял столб, он упал на землю. Потоки пылающей лавы ужасающе огромного размера теперь хлынули с горы». — Мариана Старк"
 agassiz.621.g: "Д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'должна', 'должен')] не торопясь тщательно изучить это явление."
 agassiz.621.h: "Не терять времени!"
 agassiz.622.t: "Землетрясение"
 agassiz.622.d: "Падающие обломки и селевой поток сопровождали земной толчок ранним утром, когда экспедиция была очень близко к кратеру. Небольшое землетрясение является явным признаком того, что вулкан более активен, чем участники ранее считали возможным."
 agassiz.622.f: "«В другом месте этот учёный географ, ссылаясь на предание о том, что Сицилия была отделена от Италии в результате катаклизма, замечает, что в настоящее время земля у моря в тех местах редко сотрясается землетрясениями, поскольку теперь есть открытые отверстия, через которые выходят огонь, раскалённые вещества и воды; но раньше, когда вулканы Этна, Липарские острова, Искья и другие были закрыты, заключённый огонь и ветер могли вызывать гораздо более сильные движения. Таким образом, доктрина о том, что вулканы являются предохранительными клапанами и что подземные толчки, вероятно, наиболее сильны, когда вулканическая энергия впервые перемещается в новое место, не является современной». — Чарльз Лайель"
 agassiz.622.g: "Была ли вся эта экспедиция такой уж хорошей идеей...?"
 agassiz.623.t: "Повсюду минералы"
 agassiz.623.d: "Экспедиция под руководством [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] на вулкане в [SCOPE.sState('agassiz_volcano_state').GetCustom('RU_SL_PP')] наткнулась на богатое месторождение минералов."
 agassiz.623.f: "Минералы — лучшие друзья геолога."
 agassiz.623.g: "Минералы!"
 agassiz.623.h: "Нет."
 agassiz.624.t: "Экзотический образец"
 agassiz.624.d: "Это может показаться удивительным, но вулканическая экспедиция в [SCOPE.sState('agassiz_volcano_state').GetCustom('RU_SL_PP')] действительно нашла редкие образцы животных уникальной фауны, которые живут очень близко к вулкану. Некоторые образцы, безусловно, будут представлять большой интерес для местных зоологов."
 agassiz.624.f: "«Хамфри! Пожалуйста, соберите несколько яиц вулканического карликового попугая. Завтрак был скудным, и я скучаю по своей воскресной яичнице»."
 agassiz.624.g: "Образцы!"
 agassiz.625.t: "Неизвестные окаменелости"
 agassiz.625.d: "Некоторые редкие окаменелости, которые [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'обнаружила', 'обнаружил')] во время вулканической экспедиции в [SCOPE.sState('agassiz_volcano_state').GetCustom('RU_SL_PP')], могут ответить на важные палеонтологические и геологические вопросы."
 agassiz.625.f: "«Если мы обойдём плодородный регион у подножия Этны с южной и восточной сторон, мы увидим выходы морских слоёв глины, песка и вулканического туфа из-под современных лав. Морские ископаемые раковины, встречающиеся в этих слоях, все или почти все идентичны видам, ныне обитающим в Средиземном море; и поскольку они появляются на высоте от 600 до 800 футов над уровнем моря близ Катании, они ясно доказывают, что в этом регионе, как и в других частях Сицилии дальше на юг, произошло поднятие древнего морского дна. Справедливо, следовательно, заключить, что вся гора, за исключением тех частей, которые имеют очень современное происхождение, участвовала в этом поднятии». — Чарльз Лайель"
 agassiz.625.g: "Окаменелости!"
 agassiz.626.t: "Геомагнитные данные"
 agassiz.626.d: "Сегодня утром вулканическая экспедиция в [SCOPE.sState('agassiz_volcano_state').GetCustom('RU_SL_PP')] получила телеграмму из столицы. Геомагнитная обсерватория просит собрать некоторые данные у кратера вулкана. Д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'выполнила', 'выполнил')] это желание."
 agassiz.626.f: "«Если эти данные так важны для Геомагнитного института, почему бы вам самим не приехать сюда, чтобы их получить?»"
 agassiz.626.g: "Отлично."
 agassiz.627.t: "Солнечный элемент на Земле"
 agassiz.627.d: "При анализе некоторых ранее оставленных без внимания пород [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'смогла', 'смог')] обнаружить удивительные вещи. С помощью спектрального анализа на месте [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'смогла', 'смог')] доказать, что вулканическая порода действительно содержит элемент гелий, который ранее считался существующим только в космосе."
 agassiz.627.f: "Луиджи Пальмиери был итальянским физиком, метеорологом, сейсмологом и вулканологом. В 1845 году он занял должность преподавателя логики и метафизики в Неаполитанском университете вместо Паскуале Галлуппи. После смерти Галлуппи в 1847 году ему была поручена его кафедра. В 1860 году он оставил эту кафедру и вместо этого занял кафедру геофизики и метеорологии, которую он сам инициировал. К кафедре были прикреплены метеорологическая обсерватория и основанная в 1842 году обсерватория на Везувии, управление которыми также взял на себя Пальмиери. Он возглавлял кафедру и две обсерватории до своей смерти. Пальмиери стал известен, в частности, благодаря усовершенствованным измерительным приборам, таким как электромагнитный сейсмограф и приборы для измерения электрических напряжений в атмосфере. В 1882 году ему впервые удалось обнаружить на Земле элемент гелий с помощью спектрального анализа лавы Везувия."
 agassiz.627.g: "Это открывает... интересные возможности."
 agassiz.628.t: "Команда просит отдыха"
 agassiz.628.d: "После более чем года вулканической экспедиции члены команды всё чаще просят о перерывах. Многие на грани истощения. Первые голоса громко требуют возвращения домой."
 agassiz.628.f: "«Вы напуганы? С уважением, сейсмические события, подобные этим, — это причина, по которой мы вообще лезем на этот вулкан! Вы учёный или дезертир?»"
 agassiz.628.g: "Дать им столько отдыха, сколько им нужно."
 agassiz.628.h: "Короткий перерыв, не более."
 agassiz.628.i: "Эти бесполезные ассистенты должны работать, а не бездельничать!"
 agassiz.629.t: "Пекло"
 agassiz.629.d: "Ситуация на вулкане в [SCOPE.sState('agassiz_volcano_state').GetCustom('RU_SL_PP')] значительно ухудшилась. Гора внезапно извергает чёрный дым, и потоки лавы, кажется, усиливаются. Экспедиция теперь в затруднительном положении. Должны ли члены экспедиции проявить осторожность и рисковать оказаться в ловушке лавы, или они должны действовать быстро, но рисковать неизвестной опасностью?"
 agassiz.629.f: "«Огненное дыхание обрушилось на город и набережную со всей силой, какую только могло бы придать ему орудие. Пепел с жалящим эффектом летел нам в лицо. Воздух был полон пламени. Мы невольно подняли руки, чтобы защитить лица. Я заметил тот же жест, когда увидел тела жертв на берегу». — Граф де Фиц-Джеймс"
 agassiz.629.g: "Проявить осторожность."
 agassiz.629.h: "Рискнуть."
 agassiz.630.t: "Ад на Земле"
 agassiz.630.d: "Кажется, на вулкане в [SCOPE.sState('agassiz_volcano_state').GetCustom('RU_SL_PP')] разверзся ад. Лавовые фонтаны взмывают вверх, пылающие силы сражаются друг с другом в потоках огня. Угрожающее событие для большинства участников экспедиции. Только д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] не может избавиться от восторженного очарования."
 agassiz.630.f: "«Ночью эффект огня стал ещё прекраснее. Мы были окружены потоками и водопадами красного и лучезарного огня; и посреди из столба битумного дыма, взметнувшегося в воздух, падали огромные глыбы скал, белые от света их интенсивного жара, оставляя за собой паровые шлейфы великолепия». — Джордж Гордон Байрон"
 agassiz.630.g: "Это захватывающее зрелище, и мы должны его сфотографировать!"
 agassiz.630.h: "Пугающе,"
 agassiz.630.i: "Отступаем!"
 agassiz.631.t: "Довольно активный вулкан"
 agassiz.631.d: "По-видимому, вулкан, который исследует д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], гораздо активнее, чем ожидалось. Вероятно, извержение неминуемо. Это делает экспедицию более опасной. Однако с ростом риска возрастают и научные возможности..."
 agassiz.631.f: "«Люди никогда не верят в вулканы, пока лава не настигнет их». — Джордж Сантаяна"
 agassiz.631.g: "Больше знаний!"
 agassiz.631.h: "Больше опыта!"
 agassiz.631.i: "Больше минералов!"
 agassiz.632.t: "Газетный репортаж"
 agassiz.632.d: "«#YELLOW Хроника [SCOPE.sState('manzoni_publisher_state').GetCustom('RU_SL_RP')]#!», одна из ведущих газет региона, держит своих читателей в курсе событий вулканической экспедиции. Таким образом, узкоспециализированная научная область вызвала интерес широких слоёв населения. Особенно мальчики и юноши очарованы приключенческими историями."
 agassiz.632.f: "«Читайте в последнем номере: „Доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastNameNoFormatting] и дерзкое восхождение на кратер!“ Храбрые учёные противостоят лаве, ядовитым испарениям и адскому жару. Человек пересекает ещё одну границу на краю того, что древние считали входом в преисподнюю. Наши репортёры продолжают сопровождать путешествие иллюстрациями. Четверг — день „Хроники“!»"
 agassiz.632.g: "Это вдохновит новое поколение учёных."
 agassiz.633.t: "Безопасное место для отдыха"
 agassiz.633.d: "Члены экспедиции нашли безопасное место для отступления между серными испарениями, чёрным дымом и потоками лавы."
 agassiz.633.f: "«Мой дорогой коллега, профессор Шабернак!\n\nБлагодарю вас за ваши просветительные выводы о динамическом развитии воды в вулканическом вакууме, но я изложу свои возражения более подробно позже. Дело в том, что в моей переписке с доктором Зауэршпеком мне сообщили, что вы распространили в университете позорный слух о том, что мы развлекаемся на этом вулкане. Я хочу, чтобы вы прекратили эти предположения. Недавно открытые мной горячие источники имеют максимальную температуру всего 32°C, а не 35°C, как вы недавно утверждали. Так что они де-факто ледяные. Пожалуйста, исправьте эти гнусные искажения!»"
 agassiz.633.g: "Отдых!"
 agassiz_volcano_tourist_modifier: "Вулканический туризм"
 agassiz_small_volcano_eruption_modifier: "Небольшое извержение вулкана"
 agassiz_medium_volcano_eruption_modifier: "Извержение вулкана"
 agassiz_big_volcano_eruption_modifier: "Мощное извержение вулкана"
 agassiz_medium_earthquake_modifier: "Землетрясение"
 agassiz_big_earthquake_modifier: "Сильное землетрясение"
 agassiz.711.t: "Вулканическое зрелище"
 agassiz.711.d: "Жители [SCOPE.sState('agassiz_volcano_state').GetCustom('RU_SL_RP')] в настоящее время наблюдают впечатляющее зрелище: лавовые фонтаны вулкана представляют собой захватывающее зрелище, особенно ночью. Среди зрителей — туристы и учёные."
 agassiz.711.f: "«Возвышеннейший из вулканов! Пламя Этны\nБледнеет пред твоим, и неугасимый Геклы укрощён;\nВезувий являет свой блеск, обычное зрелище\nДля зевак-туристов, со своей избитой высоты».\n\n — Лорд Байрон"
 agassiz.711.g: "Чудесно!"
 agassiz.712.t: "Небольшое извержение вулкана"
 agassiz.712.d: "Вулкан в [SCOPE.sState('agassiz_volcano_state').GetCustom('RU_SL_PP')] извергся. Несколько небольших деревень были разрушены, а поля залиты лавой, но масштабы бедствия были ограниченными."
 agassiz.712.f: "«Что я тогда видела! Тысячи языков пламени освещали окрестности. На верхушках деревьев я видела пламя. Я услышала треск и увидела огненную стену прямо рядом со мной. Моря не было видно. Всё было покрыто пеплом. Я не могла видеть свою руку перед собой. Последнее, что я видела, — это как пепел выталкивался сквозь щели в досках пола, как фонтан. Я почувствовала сильное давление, бросившее меня на землю. Затем показалось, будто воздух высасывается, и я не могла дышать». — Йоханна Бейеринк"
 agassiz.712.f_basic: "\n\n#YELLOW Благодаря нашим учёным в вулканологической обсерватории, мы не были застигнуты врасплох этой катастрофой. Поэтому мы смогли принять меры предосторожности и #G несколько ограничить разрушения#!.#!"
 agassiz.712.f_advanced: "\n\n#YELLOW Благодаря нашим превосходным учёным в вулканологической обсерватории, мы смогли быстро начать эвакуацию и принять защитные меры. Нам удалось #G значительно ограничить разрушения#!."
 agassiz.712.g: "Всего лишь немного лавы."
 agassiz.712.h: "Есть новости из обсерватории?"
 agassiz.712.i: "Это может быть интересно для д-ра [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] и его студентов"
 agassiz.713.t: "Извержение вулкана"
 agassiz.713.d: "Сильное извержение потрясло [Concept('concept_state', 'область')] [SCOPE.sState('agassiz_volcano_state').GetCustom('RU_SL_VP')]. Обломки тефры и вулканический пепел разрушили здания и посевы, унеся жизни некоторых наших людей."
 agassiz.713.f: "«Мы слышали над нами и вокруг острова странный звук, как будто сильный трескучий огонь или разряды тяжёлой артиллерии с интервалом в одну-две секунды. В пять часов рёв продолжался, небо потемнело, и на нас посыпался град пемзы, многие куски которой были значительного размера и довольно тёплые.\n\nТа ночь была чёрной — из-за непрекращающегося падения пепла, — прерываемой непрерывными вспышками молний, как в небе, так и вокруг острова». — Капитан Уотсон"
 agassiz.713.g: "Бедные люди."
 agassiz.713.j: "Отправить как можно больше помощи для поддержки пострадавших!"
 agassiz.714.t: "Мощное извержение вулкана"
 agassiz.714.d: "Извержение беспрецедентных масштабов полностью разрушило жизни многих в [Concept('concept_state', 'области')] [SCOPE.sState('agassiz_volcano_state').GetCustom('RU_SL_PP')]. Взрыв был слышен за сотни миль, и всё, что имело несчастье находиться вокруг горы, было немедленно уничтожено."
 agassiz.714.f: "«Слышны были крики женщин, плач младенцев и крики мужчин; одни звали своих родителей, другие — детей или жён, пытаясь узнать их по голосам. Люди оплакивали свою собственную судьбу или судьбу своих родственников, и были те, кто молил о смерти в ужасе перед смертью. Многие умоляли о помощи богов, но ещё больше считали, что богов больше нет, и что вселенная навсегда погрузилась в вечную тьму». — Плиний Младший"
 agassiz.714.g: "Трагедия!"
 agassiz.715.t: "Дым и грохот"
 agassiz.715.d: "Вулкан в [SCOPE.sState('agassiz_volcano_state').GetCustom('RU_SL_PP')] грохочет. Над кратером поднимается дым. И всё. Жители облегчённо вздохнули, туристы и учёные разочарованы."
 agassiz.715.f: "«Слишком много для исследования, слишком мало для наслаждения. Какой жалкий, капризный вулкан!»"
 agassiz.715.g: "Проснётся он или останется спать?"
 agassiz.721.t: "Сейсмические волны"
 agassiz.721.d: "Небольшое сейсмическое возмущение разбудило сегодня утром [SCOPE.sState('agassiz_earthquake_state').GetCustom('RU_SL_VP')]. Небольшое землетрясение нанесло лишь незначительный ущерб, но вызвало интерес сейсмологов."
 agassiz.721.f: "«Интервьюер: „Если бы здание, в котором вы сейчас находитесь, начало трястись, и вы бы знали, что происходит землетрясение, что бы вы сделали?“\nЧарльз Рихтер: „Я бы пошёл — не побежал — к ближайшему сейсмографу“»."
 agassiz.721.g: "Интересно."
 agassiz.722.t: "Землетрясение в [SCOPE.sState('agassiz_earthquake_state').GetCustom('RU_SL_PP')]"
 agassiz.722.d: "Землетрясение обрушилось на [Concept('concept_state', 'область')] [SCOPE.sState('agassiz_earthquake_state').GetCustom('RU_SL_VP')], разрушив здания, ранив людей и даже унеся несколько жизней."
 agassiz.722.f: "«Раздался глубокий гул, глубокий и ужасный, а затем я увидел, как он поднимается по Вашингтон-стрит. Вся улица колыхалась. Казалось, будто волны океана приближаются ко мне, вздымаясь по мере приближения». — Джесси Кук"
 agassiz.722.f_basic: "\n\n#YELLOW Благодаря нашим обученным сейсмологам уже было известно, что [SCOPE.sState('agassiz_earthquake_state').GetName] является сейсмоопасным регионом. Благодаря превентивным мерам, например, в строительстве, ущерб был легко минимизирован.#!"
 agassiz.722.g: "Трагедия!"
 agassiz.722.h: "Как обсерватория оценивает ситуацию?"
 agassiz.722.i: "Идеальное поле для геологических исследований."
 agassiz.722.j: "Отправить как можно больше помощи для поддержки пострадавших!"
 agassiz.723.t: "Великое землетрясение в [SCOPE.sState('agassiz_earthquake_state').GetCustom('RU_SL_PP')]"
 agassiz.723.d: "[Concept('concept_state', 'Область')] [SCOPE.sState('agassiz_earthquake_state').GetName] превращена в руины землетрясением беспрецедентного масштаба. Бесчисленные здания разрушены, а количество погибших невозможно подсчитать."
 agassiz.723.f: "«Землетрясение разрушило в Сан-Франциско сотни тысяч долларов стен и дымоходов. Но последовавший за ним пожар уничтожил имущество на сотни миллионов долларов. Невозможно оценить в сотнях миллионов фактический ущерб. В истории ещё не было такого полного разрушения современного имперского города. Сан-Франциско больше нет. От него остались только воспоминания и окраина жилых домов. Его промышленный сектор уничтожен. Его деловой сектор уничтожен. Его социальный и жилой сектор уничтожен. Фабрики и склады, большие магазины и здания, отели и дворцы набобов — всё исчезло. Осталась только окраина жилых домов на окраине того, что когда-то было Сан-Франциско». — Джек Лондон"
