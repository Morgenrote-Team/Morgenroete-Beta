 agassiz.11.g: "Можем ли мы назвать [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetHerHim] основателем сейсмологии?"
 agassiz.301.d: "Доктор [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] завершил [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetHerHis] пятилетнюю исследовательскую работу в области чрезвычайно скучных скальных образований и депрессивно выглядящих холмистых ландшафтов и возвращается в университет в [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetHerHis] удовольствие, чтобы мучить там студентов столь же увлекательными лекциями."
 agassiz.316.t: "Геологическая съёмка в соседней стране"
 agassiz.316.d: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] не воспринимает [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetHerHis] область работы слишком серьёзно и ищет формации и пещеры в соседней стране. Разумеется, геологические результаты мы оставляем себе."
 agassiz.316.g: "\"Как [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetSheHe] проникнуть туда незамеченным?"
