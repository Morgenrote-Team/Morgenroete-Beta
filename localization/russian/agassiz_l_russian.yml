 je_agassiz_overlord_geological_team_reason: "Ассистенты-геологи из другой страны в настоящее время занимаются поиском геологических образований и пещер в нашей стране."
 je_agassiz_overlord_geological_team_goal: "Команда геологов пробудет здесь около года."
 je_agassiz_overlord_uranium_team: "Урановая команда от сюзерена"
 je_agassiz_overlord_uranium_team_reason: "Ассистенты-геологи из другой страны в настоящее время занимаются поиском месторождений урана в нашей стране."
 je_agassiz_overlord_uranium_team_goal: "Урановая команда пробудет около года."
