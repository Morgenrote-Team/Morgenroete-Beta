 agassiz.812.t: "Новая высочайшая вершина?"
 agassiz.812.d: "Годами Дхаулагири принималась за самую высокую из когда-либо измеренных гор, но [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] не было уверенности в этом. После месяцев триангуляции и безжалостных вычислений из дымки возник новый кандидат: Канченджанга."
 agassiz.812.f: "Инструменты доктора [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], хоть и потрёпанные бурями, оставляли мало сомнений. На высоте более 28 000 футов эта удалённая вершина на границе Сиккима и Непала превзошла все предыдущие рекорды. Последствия для географии, картографии и национальной гордости были глубокими."
 agassiz.812.g: "Неужели гора не могла выбрать название попроще?"
 agassiz.812.tt: "#V Канченджанга#! теперь считается самой высокой горой в мире."
 agassiz.813.t: "Король горы"
 agassiz.813.d: "Всё началось с безмолвных фигур на холме в Бенгалии, наводивших латунные инструменты на небо. Среди них был [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName], чьи вычисления подтвердили невозможное: Пик XV — неясный, удалённый, безымянный — возвышался выше любой вершины, когда-либо измеренной."
 agassiz.813.f: "Сообщение об этом вызвало бурю негодования в научных кругах. На высоте 29 000 футов гималайский гигант затмевает Канченджангу и Дхаулагири. Хотя он по-прежнему безымянен, ученые уже начали называть его \"Крышей мира\"."
 agassiz.813.g: "Назовите его в честь какого-нибудь случайного британского геодезиста, которого никто не помнит!"
 agassiz.813.tt: "#V Гора Эверест#! теперь считается самой высокой горой в мире."
 je_agassiz_highest_mountain: "Самая высокая гора"
