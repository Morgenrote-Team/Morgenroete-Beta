 agassiz_add_x_geological_knowledge_plus_x_tt: "Получить [SCOPE.GetValue('geological_knowledge_amount')|0+] ед. @agassiz_geological_knowledge! [Concept('concept_agassiz_geological_knowledge', 'геологических знаний')]."
 agassiz_building_production_mult_modifier: "Новая рудная жила"
 agassiz_building_production_2_mult_modifier: "Новая нефтяная скважина"
 agassiz_ore_search_cost_modifier: "Стоимость поиска руды"
 agassiz_mineralogist: "Минералог"
 agassiz_mineralogist_desc: "Минералоги — эксперты по редким породам и особенно полезны при поиске редких минералов."
 agassiz_geophysicist: "Геофизик"
 agassiz_geophysicist_desc: "Геофизики — эксперты по природе земных недр, наиболее знакомые с историей Земли и её процессами."
 agassiz_prospector: "Геологоразведчик"
 agassiz_prospector_desc: "Геологоразведчики обладают особыми способностями, которые помогают находить новые рудные жилы или источники нефти."
 agassiz_oceanographer: "Океанограф"
 agassiz_oceanographer_desc: "Океанографы обладают выдающимися знаниями о природе и процессах в океанах."
 agassiz_volcanologist: "Вулканолог"
 agassiz_volcanologist_desc: "Вулканологи — эксперты по вулканам и особенно полезны при их исследовании."
 agassiz.100.t: "Поиски руды"
 agassiz.100.d: "Д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] собрал[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] своё снаряжение и отменил[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] все лекции, чтобы начать поиски руды. Остаётся вопрос, какой тип месторождений [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'должна', 'должен')] исследовать?"
 agassiz.100.f: ""
 agassiz.100.g: "Д-ру [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] следует вернуться в университет."
 agassiz.100.h: "Уголь."
 agassiz.100.i: "Железо."
 agassiz.100.j: "Свинец."
 agassiz.100.k: "Сера."
 agassiz.100.l: "Золото."
 agassiz.100.m: "Уран."
 agassiz.101.t: "Новые рудные жилы"
 agassiz.101.d: "После того как д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] обнаружил[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] несколько новых рудных жил для горнодобывающих компаний, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] возвращается. Дальнейшее расширение мощностей — не [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] забота."
 agassiz.101.f: "«Всё имеет свой предел. Железную руду нельзя превратить в золото». — Марк Твен"
 agassiz.101.g: "Отличная работа."
 agassiz.102.t: "Нефть!"
 agassiz.102.d: "After Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] discovered new oil sources, the black gold bubbled up. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] considers his work to be done for the time being.\n\nTotal improved buildings: [GetPlayer.MakeScope.Var('mr_num_improved_oil_rigs_buildings_var').GetValue|V0]"
 agassiz.102.f: "«Формула успеха: вставай рано, работай усердно, найди нефть». — Дж. Пол Гетти"
 agassiz.102.g: "Нефти много не бывает."
