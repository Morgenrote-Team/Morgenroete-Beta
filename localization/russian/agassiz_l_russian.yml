 agassiz.103.t: "Геологическая группа уезжает"
 agassiz.103.d: "После того как геологическая группа завершила свою работу, научные сотрудники возвращаются на родину. Найденные ими формации и пещеры теперь доступны и нашим учёным."
 agassiz.103.f: "«Я могу завершить эту главу, процитировав высказывание профессора Агассиса: когда в науке открывается новый и поразительный факт, люди сначала говорят: „это неправда“, затем — „это противоречит религии“, и, наконец, — „это все и так знали“». — Чарльз Лайель"
 agassiz.103.g: "Это была полезная иностранная помощь."
 agassiz.104.t: "Урановая группа уезжает"
 agassiz.104.d: "После того как урановая группа завершает свою работу, научные сотрудники возвращаются на родину. Найденные ими месторождения урана могут быть использованы и нашими компаниями."
