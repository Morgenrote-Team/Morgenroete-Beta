 je_geologist_dies_tt: "Доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] умирает"
 agassiz_stop_geologist_project_button: "Остановить проект геолога"
 agassiz_stop_geologist_project_button_desc: "Остановите текущий проект геолога. Ваш прогресс геолога будет утерян."
 agassiz_stop_geologist_improving_project_tt: "Вы решили остановить проект, нажав кнопку #italic Остановить проект геолога#!."
 agassiz_mid_atlantic_ridge_cost_modifier: "Стоимость экспедиции в Атлантику"
 je_agassiz_mid_atlantic_ridge: "Подводные горы"
 je_agassiz_mid_atlantic_ridge_reason: "[concept_agassiz_geologist] доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] в настоящее время находится на борту современного исследовательского судна, которое с помощью эхолота сканирует дно Атлантики. Это должно дать более новое представление об истории Земли."
 je_agassiz_mid_atlantic_ridge_goal: "Ожидается, что через 12 месяцев доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] покажет результаты."
 agassiz.201.t: "Срединно-Атлантический хребет"
 agassiz.201.d: "Доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] изучил некоторые из первых данных. Результаты экспедиции поразительны: не только на севере Атлантики, но и по всему Атлантическому океану подводный рельеф можно увидеть в виде сплошной полосы, которая прерывается только на уровне экватора. Геолог назвал это явление Срединно-Атлантическим хребтом. Дальнейшая оценка полученных данных будет проведена в ближайшие месяцы и годы."
 agassiz.201.f: "Срединно-Атлантический хребет — это горный хребет в Атлантическом океане, который в основном лежит ниже уровня моря и простирается примерно на 20 000 км. Это делает его самым длинным из срединно-океанических хребтов, системы, которая охватывает Землю и имеет протяженность более 60 000 км. Поднятие морского дна в средней части Атлантики было впервые описано военно-морским офицером Мэтью Фонтейном Мори в 1853 году и подтверждено экспедицией «Челленджера» в 1872 году. Причиной стали предварительные исследования по прокладке первых трансатлантических глубоководных кабелей. Во время немецкой метеорологической экспедиции 1925-1927 годов с помощью измерений эхолотом был создан детальный профиль Срединно-Атлантического хребта. Открытие Срединно-Атлантического горного хребта дало раннюю подсказку о геодинамических процессах тектоники плит, связанных с теорией дрейфа континентов Вегенера."
 agassiz.201.g: "Это улучшит понимание геологом геофизических процессов."
 agassiz.201.h: "Это улучшит понимание геологом океанографии."
 agassiz.201.i: "Это улучшит общее понимание геолога."
 agassiz.202.t: "Геолого-палеонтологический симпозиум"
 agassiz.202.d: "Академия наук пригласила на мероприятие, организованное проф. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] и проф. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]. Симпозиум считается вехой в исследованиях истории Земли. Оба особо отметили поразительное сходство геологического и ископаемого состава побережий Южной Америки и Западной Африки."
 agassiz.202.f: "О том, насколько тесно связаны геология и палеонтология, свидетельствуют многочисленные научные личности, отличившиеся в обеих областях. Взаимодействие земного слоя и окаменелостей для хронологического определения делает обе науки неразделимыми. Жорж Кювье считается отцом палеонтологии, но также и крестным отцом геологии. Даже в научных спорах, например, в дебатах Кювье-Жоффруа 1830 года, в центре которых был спор между градуализмом и катастрофизмом, в первую очередь выделялись геологические и палеонтологические находки в качестве аргументов. Ни современная геология, ни современная палеонтология были бы невозможны без синергии."
 agassiz.202.g: "Плодотворный академический обмен."
 agassiz.311.t: "Камень из космоса"
 agassiz.311.d: "В одном из более отдаленных районов нашей страны доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] обнаружил в своих поисках новых минералов необычный камень. После первоначального исследования стало ясно: содержащий железо монолит является метеоритом!"
 agassiz.311.f: "Первые коллекции метеоритов были основаны еще в XVIII веке, до того как стало известно, что метеориты имеют внеземное происхождение. Старейшая в мире коллекция метеоритов находится в Музее естественной истории в Вене, где первый камень в фундамент был заложен вместе с метеоритом Хращина (упавшим в 1751 году). Сегодня здесь находится самая большая выставочная коллекция в мире, насчитывающая около 1100 объектов. До двадцатого века было обнаружено всего несколько сотен находок метеоритов. Причина, по которой в настоящее время в мировых коллекциях насчитывается более 30 000 находок метеоритов, началась с открытия Харви Х. Найнингера о том, что метеориты гораздо чаще встречаются на поверхности Земли, чем считалось ранее. Стратегия Найнингера заключалась в поиске метеоритов на Великих равнинах Соединенных Штатов, где земля была в основном возделана и в почве было мало камней."
 agassiz.311.g: "Откуда он?"
 agassiz_seismology_tech: "Сейсмология"
 agassiz_seismology_tech_desc: "В ответ на серию землетрясений возле Комри в Шотландии в 1839 году в Великобритании был создан комитет для разработки лучших методов обнаружения землетрясений. Результатом этого стало создание Джеймсом Дэвидом Форбсом одного из первых современных сейсмометров. С 1857 года Роберт Маллет заложил основы современной инструментальной сейсмологии и проводил сейсмологические эксперименты с использованием взрывчатых веществ. Ему также приписывают введение в обиход слова «сейсмология»."
 agassiz_geologist_demotivated_modifier: "Демотивированный геолог"
 agassiz_set_new_age_of_earth_effect_tt: "[GetPlayer.GetName] формулирует новейшее исследование о возрасте Земли. Возраст Земли пересчитывается."
 agassiz.401.tt: "Все нации, у которых есть [concept_agassiz_geologist], голосуют по исследованию."
 notification_agassiz_new_earth_age_notification_name: "Возраст Земли переоценен"
 notification_agassiz_new_earth_age_notification_desc: "[concept_agassiz_geologist] смог убедить многих коллег в том, что Земля намного старше, чем думали.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('agassiz_age_of_earth_type')]"
 je_agassiz_geological_research: "Геологические исследования"
 je_agassiz_geological_research_reason: "[ROOT.GetCountry.GetCustom('je_agassiz_geological_research_active_type')][concept_agassiz_geologist], не занятый другими задачами, будет проводить геологические исследования.\n\nВ ходе исследований могут произойти следующие события:\n- Если ваш геолог обладает чертой $agassiz_mineralogist$ [concept_character_trait], ежегодная добыча [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] будет удвоена.\n- Ваш геолог может обнаружить [Concept('concept_dubois_formation','$concept_dubois_formations$')], [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] и уран.\n- После 5 лет исследований вы получите @agassiz_mineral! #p 25,000#! [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] и @agassiz_rare_mineral! #p 1#! [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]. Кроме того, ваш геолог может получить черту $agassiz_mineralogist$ [concept_character_trait]"
 agassiz.401.t: "Новый расчет"
 agassiz.401.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] обобщил весь [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] предыдущий опыт и знания, накопленные на протяжении [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] жизни, чтобы предложить новую оценку возраста Земли. Остается открытым вопрос, будет ли эта теория признана научным сообществом."
 agassiz.401.f: "С начала XIX века и до середины XX века определение возраста Земли оставалось неопределенным и по большей части было предметом постоянных споров и враждебности. Вопрос о возрасте Земли часто связывали с вопросом эволюции, поскольку для того, чтобы он заработал как теория, требовался достаточно длительный период времени. До начала века многие ученые полагали, что Земле всего несколько миллионов лет - в конце своей жизни лорд Кельвин предполагал, что ей всего 20 миллионов лет. Но даже Чарльз Дарвин, который был одним из \"максималистов\", защитивших свою диссертацию, верил примерно в 300 миллионов лет. Только после открытия радиоактивности удалось правильно определить возраст Земли и узнать истинный возраст Земли (а следовательно, и всей Солнечной системы)."
 agassiz.401.g: "Разошлите статью всем известным геологам по всему миру."
 agassiz.402.t: "Геолог представляет новый расчет"
 agassiz.402.d: "[SCOPE.sCharacter('agassiz_geologist_scope').GetLastName] предложил расчет реального возраста Земли. Ученый считает, что предыдущие измерения были неверными, и оценивает возраст Земли значительно выше. Поскольку наш геолог является одним из уважаемых специалистов в этой области, нам также прислали копию диссертации."
 agassiz.402.g: "Эти расчеты убедительны."
 agassiz.402.h: "Кто должен верить этой псевдогеологической чепухе?"
 agassiz.403.t_yes: "Принято геологическое исследование"
 agassiz.403.d_yes: "К счастью, большинство Международного геологического общества оценило новые расчеты нашего геолога как важную веху и признало его теорию действительной."
 agassiz.403.f_yes: "Оценка [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] для определения возраста Земли была принята большинством. [GetGlobalVariable('agassiz_age_of_earth_yes_global_var').GetValue|+0] ученых #G приняли#! исследование, [GetGlobalVariable('agassiz_age_of_earth_no_global_var').GetValue|+0] #R отклонили#! его. Это означало, что теория была официально признана и возраст Земли был значительно увеличен."
 agassiz.403.g: "Триумф доктора [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], триумф геологии!"
 agassiz.403.t_no: "Геологическое исследование отклонено"
 agassiz.403.d_no: "Невежественная так называемая «элита» международных геологов отклонила новое исследование нашего геолога. Нам еще предстоит определить, были ли фальсификации на выборах или это был враждебный маневр, направленный на подрыв репутации нашей гордой нации."
 agassiz.403.f_no: "Оценка доктора [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] для определения возраста Земли была отклонена большинством. [GetGlobalVariable('agassiz_age_of_earth_yes_global_var').GetValue|+0] ученых #G приняли#! исследование, [GetGlobalVariable('agassiz_age_of_earth_no_global_var').GetValue|+0] #R отклонили#! его. Таким образом, предыдущая оценка возраста Земли остается прежней."
 agassiz.403.h: "Поражение доктора [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], поражение для геологии..."
 je_agassiz_advanced_oceanography: "Продвинутая океанография"
 je_agassiz_advanced_oceanography_reason: "Если предыдущие океанографические исследования были в первую очередь направлены на то, чтобы принести практическую пользу военным, чтобы стратегически использовать нынешние условия Тихого океана, то теперь ученые выступают за использование результатов морских исследований для того, чтобы узнать больше о нашей планете - исключительно ради знаний."
 je_agassiz_advanced_oceanography_success: "Мы закончим наши исследования, если получим #G 50#! @rapanui_oceanographic_knowledge! #E Океанографических знаний#!."
 je_agassiz_advanced_oceanography_goal: "Мы закончим наши исследования, если получим #G 50#! @rapanui_oceanographic_knowledge! #E Океанографических знаний#!."
 agassiz.312.t: "Геологическая съемка"
 agassiz.312.d: "Доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] создал геологический профиль большой территории и сделал карту доступной для общественности."
 agassiz.312.f: "Современная стратиграфия развивалась в течение 19 века: геологи по всей Европе и Северной Америке изучали, классифицировали и сопоставляли слои горных пород в своих странах, следуя примеру Уильяма Смита, и публиковали карты, стратиграфические таблицы и трактаты с результатами своей работы."
 agassiz.312.g: "Использовать знания теоретически."
 agassiz.312.h: "Использовать знания практически."
 agassiz.313.t: "Месторождение полезных ископаемых"
 agassiz.313.d: "Геологические исследования в ранее неосвоенном регионе выявили богатое месторождение минералов. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] еще не уверен, каков должен быть основной аспект его поисков."
 agassiz.313.f: "Минерал - это элемент или химическое соединение, которое обычно имеет кристаллическую форму и образуется в результате геологических процессов. Большинство из примерно 6000 видов минералов, известных на сегодняшний день и признанных самостоятельными, являются неорганическими, но некоторые органические вещества, такие как меллит и эвенкит или формирующие почечные камни уэвеллит и уэдделлит, также признаны полезными ископаемыми, поскольку в их образовании также участвовали геологические процессы. Включая все известные разновидности минералов и синонимичные названия, а также еще не признанные виды минералов, насчитывается более 7000 наименований минералов."
 agassiz.313.g: "Количество."
 agassiz.313.h: "Качество."
 agassiz.314.t: "Вдохновляющий геолог"
 agassiz.314.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] теперь приобрел известность в [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerselfHimself] мире геологии. К [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] кафедре часто обращались за советом к [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim], а в почтовом ящике скапливались письма от коллег со всего мира."
 agassiz.314.f: "'Я полагаю, что лучший геолог — это тот, кто видел больше всего горных пород.' -Герберт Гарольд Рид"
 agassiz.314.g: "Это повысит [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] репутацию."
 agassiz.314.h: "Это повысит репутацию университета [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis]."
 agassiz.315.t: "Геологические открытия"
 agassiz.315.d: "Текущая исследовательская поездка, которая привела [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim] во многие различные геологические локации в нашей стране, открыла глаза [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]. В готовящейся в настоящее время диссертации [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] обобщает некоторые новые выводы о геологических принципах."
 agassiz.315.f: "Мир для геолога — великая головоломка; он стоит перед ней, как ребенок, для которого отдельные части его головоломки остаются загадкой, пока он не обнаружит их взаимосвязь и не увидит, где они подходят, и тогда его фрагменты сразу же превращаются в связанную картину под его рукой.' -Луи Агассис"
 agassiz.315.g: "Отлично."
 agassiz.11.t: "Динамика землетрясений"
 agassiz.11.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] привлек сегодня международное внимание, потому что [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] произвел революцию в предыдущих знаниях об этом аспекте геологии книгой о землетрясениях. Слова [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] такие как 'эпицентр' и 'сейсмология', уже вошли в научный обиход."
 agassiz.11.f: "9 февраля 1846 года Роберт Маллет представил Королевской Ирландской академии свою работу 'Динамика землетрясений', которая считается одной из основ современной сейсмологии. Между 1852 и 1858 годами с помощью своего сына Джона Уильяма Маллета он подготовил каталог землетрясений Британской ассоциации, который появился в 1858 году и содержал список известных землетрясений и описание их последствий. За это время он также провел взрывные эксперименты для определения времени прохождения сейсмических волн в рыхлых и твердых породах."
 pmg_agassiz_seismology: "Сейсмология"
 pm_agassiz_basic_seismology: "Основы сейсмологии"
 pm_agassiz_advanced_seismology: "Продвинутая сейсмология"
 pm_agassiz_advanced_volcanology: "Продвинутая вулканология"
 agassiz_congress_host_modifier: "Принимал Геологический конгресс"
 agassiz_laughed_congress_modifier: "Осмеян на Геологическом конгрессе"
 agassiz_respected_congress_modifier: "Уважаем на Геологическом конгрессе"
 agassiz_lauded_congress_modifier: "Восхваляем на Геологическом конгрессе"
 agassiz.316.f: "Если на собственной территории нет интересных геологических объектов, геологи могут искать образования или пещеры в приграничной зоне или за ее пределами."
 agassiz.317.t: "Иностранный геолог"
 agassiz.317.d: "Иностранному геологу каким-то образом удалось попасть в наш район во время своих исследований и сделать записи. Он прислал нам свои результаты «в знак благодарности»."
 agassiz.317.g: "И...?"
 agassiz.501.t: "Движутся ли континенты?"
 agassiz.501.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] только что опубликовал книгу, в которой [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] выдвигает тезис, уже вызвавший ожесточенные споры. Согласно ему, континенты в их нынешней форме имеют более позднее геологическое происхождение. Доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] постулирует, что современные континенты образовали единое целое, которое [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] называет 'Пангеей'. Чтобы убедить международное геологическое сообщество в этой теории, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] пригласил его на конгресс."
 agassiz.501.f: "Древнейшее предположение о том, что причиной был дрейф континентов, принадлежит фламандскому картографу Абрахаму Ортелиусу. В издании 1596 года его Atlas Theatrum Orbis Terrarum уже можно отчетливо увидеть сходство двух береговых линий. Александр фон Гумбольдт описал сходство противоположных побережий Южной Америки и Африки и их растительности в 1801 и 1845 годах и предположил, что Атлантический океан был размыт катастрофическим течением. В 1858 году географ Антонио Снайдер-Пеллегрини пошел еще дальше, опубликовав первую карту, на которой Старый и Новый Свет были показаны без разделяющего их океана. Однако прежде всего Альфред Вегенер со своей теорией дрейфа континентов привел к переосмыслению от фиксизма (тезиса о том, что континенты прочно укоренены в земле) к мобилизму. Однако при его жизни его модель объяснения оставалась мнением меньшинства в науке, которое утвердилось только во второй половине XX века."
 agassiz.501.g: "Пригласить ведущие геологические державы!"
 agassiz.502.t: "Геологическое приглашение"
 agassiz.502.d: "[SCOPE.sCountry('agassiz_congress_host_country').GetName] пригласил людей на международный геологический конгресс. Ведущий, ведущий геолог, на самом деле утверждает, что континенты движутся...!"
 agassiz.502.g: "Это обещает быть занимательным."
 agassiz.503.t_laughed: "Насмешки Геологического общества"
 agassiz.503.t_respected: "Уверенное выступление"
 agassiz.503.t_lauded: "Восхищение и поздравления"
 agassiz.503.d_laughed: "Выступление доктора [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] было встречено с удивлением. [ROOT.GetCountry.GetNameNoFlag] не имеет репутации человека, достигшего чего-то выдающегося в области геологии. За закрытыми дверями явно звучали шутки."
 agassiz.503.d_respected: "До начала Геологического конгресса [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] был тепло встречен и состоялся обычный обмен подарками. [ROOT.GetCountry.GetNameNoFlag] имеет признанную репутацию в мире исследований."
 agassiz.503.d_lauded: "Прибытие профессора [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] было встречено с большой радостью, его считали одним из самых ожидаемых гостей. Вокруг [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim] быстро собралась толпа, поскольку [ROOT.GetCountry.GetNameNoFlag] считается пионером в области геологии."
 agassiz.503.f_laughed: "'Почему [ROOT.GetCountry.GetAdjectiveNoFlag] геологи не пользуются успехом у девушек?\n\nПотому что между ними слишком много разногласий!'"
 agassiz.503.f_respected: "По прибытии [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] провел несколько приятных бесед с коллегами в основном о скучных горных породах."
 agassiz.503.f_lauded: "Проф. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] казался почти перегруженным этим натиском. Так много коллег стремились поговорить с [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim] и хотели извлечь выгоду из [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] экспедиций и [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis].GetCharacter.GetHerHis] опыта. Некоторые даже призывали [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHim].GetCharacter.GetHerHim] прочитать частную лекцию."
 agassiz.503.g: "Как неловко!"
 agassiz.503.h: "Наконец-то среди единомышленников."
 agassiz.503.i: "Мы — ведущая геологическая нация!"
 agassiz.504.t: "Фиксизм или мобилизм?"
 agassiz.504.d: "[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName] выступил с лекцией, получившей высокую оценку собравшегося международного геологического сообщества, в которой [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetSheHe] ярый сторонник поворота геологии к мобилизму, то есть к дрейфу континентов. Но противников много, и они не хотят отходить от господствующей доктрины фиксизма."
 agassiz.504.f: "Фиксизм был ключевой геотектонической гипотезой вплоть до 1960-х годов ХХ века. Предполагалось, что земная кора прочно связана с недрами, так что крупномасштабные тектонические процессы носят локальный характер. Из этого следовало, что развитие Земли характеризовалось преимущественно вертикальными и в очень малой степени горизонтальными тектоническими движениями земной коры. Большинство теорий классической геологии были основаны на идее фиксизма. В начале X века окаменелости того же вида были найдены в Южной Америке и Африке. Исходя из предположения о фиксизме, была выдвинута гипотеза сухопутного моста, согласно которой когда-то существовали сухопутные мосты, соединявшие Африку с Южной Америкой, что позволяло животным мигрировать на другой континент. Благодаря измерениям с помощью эхолота исследовательского судна \"Метеор\" в период с 1924 по 1927 год, в ходе которых был обнаружен Срединно-Атлантический хребет - подводная горная цепь, протянувшаяся с севера на юг, а не, как ожидалось, остатки сухопутного моста, который должен был протянуться с востока на запад, так называемый \"мост суши\". гипотеза начала давать сбои, но от нее полностью отказались только в 1960-х годах. Противоположностью фиксизма является мобилизм, который рассматривает горизонтальные движения земной коры как имеющие решающее значение. Теория мобилизма возникла на основе открытия Альфредом Вегенером дрейфа континентов."
 agassiz.504.g: "Континенты не менялись миллионы лет."
 agassiz.504.h: "Все указывает на тектонику плит."
 agassiz.505.t: "Геологи между собой"
 agassiz.505.d: "На полях крупного геологического конгресса у [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] есть возможность обменяться мнениями с коллегами. На чем [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] следует сосредоточиться в [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] свободное время?"
 agassiz.505.f: "'Это странный факт, характеризующий неполноту наших современных знаний, что о доисторических условиях на нашей планете делаются совершенно противоположные выводы, в зависимости от того, рассматривается ли проблема с биологической или геофизической точки зрения.' - Альфред Вегенер."
 agassiz.505.g: "Геологические знания."
 agassiz.505.h: "Океанографические знания."
 agassiz.505.i: "Редкие минералы."
 agassiz.505.j: "Новые таланты."
 agassiz.509.t_fix: "Триумф фиксизма"
 agassiz.509.d_fix: "Несмотря на все [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetHerHis] усилия, [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName] не удалось убедить большинство своих коллег. Обвинение заключается в том, что проф. [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetLastName] не может предоставить достаточных доказательств в поддержку своих тезисов. Факт остается фактом: континенты стабильны."
 agassiz.509.f_fix: "'Теория Ньютона о дрейфе еще не появилась. Его отсутствие не должно вызывать беспокойства; теория все еще молода, и к ней все еще часто относятся с подозрением. В конечном счете, нельзя винить теоретика в том, что он не решается тратить время и усилия на объяснение закона, обоснованность которого не является общепризнанной.' - Альфред Вегенер"
 agassiz.509.g: "\"Eppur si muove\" (от итал. \"а всё-таки она вертится\")."
 agassiz.509.t_tectonics: "Триумф мобилизма"
 agassiz.509.d_tectonics: "[SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetFullName] смог убедить научное сообщество в [SCOPE.sCharacter('agassiz_alfred_wegener_scope').GetHerHis] тезисе. Континентальный дрейф в настоящее время считается наиболее вероятной теорией для объяснения целого ряда ранее неясных геологических явлений."
 agassiz.509.f_tectonics: "'Ученые, по-видимому, все еще недостаточно понимают, что все науки о Земле должны вносить свой вклад в раскрытие состояния нашей планеты в более ранние времена, и что к истине можно прийти, только проанализировав все эти свидетельства. ... Только сопоставив информацию, предоставленную всеми науками о земле, мы можем надеяться определить здесь \"истину\", то есть найти картину, которая наилучшим образом отражает все известные факты и, следовательно, обладает наивысшей степенью вероятности. Кроме того, мы всегда должны быть готовы к тому, что каждое новое открытие, независимо от того, какая наука его делает, может изменить наши выводы.' -Альфред Вегенер"
 agassiz.509.h: "Подождите — это... удивительно!"
 agassiz_conference_geologist_double_vote_tt: "Благодаря нашему опытному геологу, у нас есть #G в два раза больше#! права голоса"
 agassiz_conference_geologist_triple_vote_tt: "Благодаря нашему известному геологу, у нас есть #G в три раза больше#! права голоса."
 agassiz.601.t: "Местоположение вулкана"
 agassiz.601.d: "Группа ученых и помощников собралась для предстоящей вулканической экспедиции. Но теперь возникает вопрос: какой вулкан должна исследовать команда под руководством [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]? Есть несколько государств, которые мы можем выбрать."
 agassiz.601.f: "'Я должна попросить вас не использовать слово 'огонь', когда вы ссылаетесь на теорию доктора Хаттона: более правильное выражение - 'тепло'. Огонь в обычном смысле этого слова предполагает использование топлива в процессе горения, но у нас нет оснований полагать, что в центре земли есть огонь такого рода.' - Мария Хак"
 agassiz.601.g: "[SCOPE.sState('agassiz_volcano_1').GetName]"
 agassiz.601.h: "[SCOPE.sState('agassiz_volcano_2').GetName]"
 agassiz.601.i: "[SCOPE.sState('agassiz_volcano_3').GetName]"
 agassiz.602.t: "У подножия вулкана"
 agassiz.602.d: "Вулканологическая экспедиция достигла предгорий вулкана в [SCOPE.sState('agassiz_volcano_state').GetName] и теперь приступает к настоящему научному исследованию."
 agassiz.602.f: "'Существование подземного тепла подтверждается такими явлениями, как горячие источники, извержения вулканов и землетрясения. Эти наблюдения не оставляют сомнений в существовании тепла в недрах земли; но на какой глубине, в какой степени и с какой интенсивностью оно действует?' -Джон Плейфэр"
 agassiz.602.g: "Это не так опасно, как звучит, не так ли?"
 agassiz.603.t: "Успешная вулканическая экспедиция"
 agassiz.603.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] совершил смелый маневр, не только приведя [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] помощников на вершину вулкана, но и проведя многочисленные эксперименты и собрав образцы. Вулканическая экспедиция была ценным вкладом в изучение внутреннего устройства Земли."
 agassiz.603.f: "'Вся дикость природы рассказывает одну и ту же историю: толчки и вспышки землетрясений, извержения вулканов, гейзеров, ревущие, грохочущие волны и наводнения, бесшумный приток сока в растениях, всевозможные бури, все без исключения, - это упорядоченные, создающие красоту любовные удары сердца природы.' - Джон Мьюир"
 agassiz.603.g: "И все это без ожогов третьей степени."
 agassiz.604.t: "Экспедиция на вулкан закончилась катастрофой"
 agassiz.604.d: "Ужасные новости! Несмотря на несколько предупреждающих знаков — токсичные пары, небольшие землетрясения, темный дым — [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] по-видимому, упорно продолжали экспедицию. Извержение застало участников полностью врасплох; этот район является зоной бедствия. Лава все еще заливает гору и близлежащие деревни. Лишь с большим трудом некоторым выжившим удалось добраться до безопасного места с результатами исследований и образцами. Однако доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] пропадает без вести. Мы должны ожидать худшего."
 agassiz.604.f: "Газеты уже сообщают о нескольких пострадавших и погибших. Большую часть района пришлось эвакуировать. Здания были повреждены, а улицы затоплены лавой. Вероятность того, что кто-либо, находящийся рядом с кратером вулкана, пережил это стихийное бедствие, близка к нулю."
 agassiz.604.g: "Ужасно!"
 agassiz.605.t: "Экспедиция на вулкан закончилась безрезультатно"
 agassiz.605.d: "Вулканическая экспедиция израсходовала все средства на исследования и вернулась. К сожалению, она дала лишь несколько полезных результатов. Может быть, руководитель был слишком осторожен?"
 agassiz.605.f: "'Ты не сможешь исследовать вулкан, если немного не потанцуешь на нем.'"
 agassiz.605.g: "Разочаровывающе"
 agassiz.611.t: "Химические открытия"
 agassiz.611.d: "Во время экспедиции в [SCOPE.sState('agassiz_volcano_state').GetName] доктору [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] удалось подробнее изучить некоторые интересные химические процессы у кратера вулкана. Некоторые минеральные соединения до сих пор совершенно неизвестны."
 agassiz.611.f: "Большинство химических элементов встречаются в самых разнообразных соединениях, особенно в минералах. На заре развития современной химии геологи постоянно искали новые образцы, из которых химики могли бы выделить ранее неизвестные элементы."
 agassiz.611.g: "Это может помочь доктору [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]."
 agassiz.612.t: "Лавовая ловушка"
 agassiz.612.d: "Экспедиция к вулкану, очевидно, проявила излишнюю смелость в своем продвижении к кратеру: она оказалась окруженной лавой почти со всех сторон. Отказ от предыдущего продвижения означал бы большую потерю времени."
 agassiz.612.f: "'Сама лава имеет тот тусклый вид, который поэты приписывают рекам преисподней; она медленно катится, как песчаный поток, черная днем и красная ночью. Когда он приближается, вы слышите что-то вроде потрескивания, которое вызывает наибольший страх, так как оно нечеткое. Его сияние настолько интенсивно, что впервые земля освещает небо, создавая видимость непрерывной молнии; небо, в свою очередь, отражает этот блеск на воде, и, таким образом, природа, кажется, охвачена пламенем этого тройного образа огня.' - Жермен. де Сталь"
 agassiz.612.g: "Найти другой путь."
 agassiz.612.h: "Попытаться пересечь её."
 agassiz.613.t: "Закалённый лидер"
 agassiz.613.d: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] — опытный вулканолог, который точно знает, как обращаться с горой; его знания гарантируют, что экспедиция пройдет безопасно и успешно."
 agassiz.613.f: "'Событие, свидетелем которого я так страстно желал стать, произошло, и Везувий уже несколько дней находится в состоянии извержения. Я уже провел много экспериментов с лавой в тот момент, когда она вытекает из вулкана, и я бы завершил их, если бы не сильное недомогание, вызванное тем, что я слишком долго оставался в этой великолепной, но опасной ситуации в пределах 5-6 футов от потока раскаленного вещества, текучего, как вода, падающего в виде водопада. огненный водопад.' - Хамфри Дэви"
 agassiz.613.g: "Доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] — превосходный руководитель."
 agassiz.614.t: "Токсичные газы"
 agassiz.614.d: "Экспедиционный отряд под руководством доктора [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] обнаружил в одном месте вулкана обильные выделения вулканических газов. Геолог хотел бы взять несколько образцов, даже если это не совсем безопасно."
 agassiz.614.f: "Вулканические газы — это газы, которые выделяются на поверхности земли во время вулканической активности. Выделение может происходить либо в узко определенных областях, либо диффузно на большой площади со склонов вулкана. Вулканические газы были собраны и проанализированы еще в 1790 году Сципионом Брейслаком (Scipione Breislak) в Италии. Состав вулканических газов зависит от движения магмы внутри вулкана. Поэтому внезапные изменения в составе газа часто предсказывают изменение вулканической активности."
 agassiz.614.g: "Мы должны изучить эти газы."
 agassiz.614.h: "Это безумие!"
 agassiz.615.t: "Вулканический выброс"
 agassiz.615.d: "Внезапный грохот на короткое время напугал участников вулканической экспедиции. Когда команда решила, что худшее позади, вулкан внезапно изверг раскаленные камни, которые обрушились на участников подобно метеоритному дождю. Двое помощников были ранены, а вьючный мул убит."
 agassiz.615.f: "'Мы услышали над собой и вокруг острова странный звук, похожий на сильный треск огня или выстрелы тяжелой артиллерии с интервалом в одну-две секунды. В пять часов рев продолжился, небо заволокла темнота, и на нас посыпался град пемзы, многие куски которой были значительного размера и довольно теплые.' - Капитан Уотсон."
 agassiz.615.g: "Неудачный поворот событий."
 agassiz.616.t: "Образец лавы"
 agassiz.616.d: "Доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] он ненадолго попросил экспедицию остановиться. Кажется, поблизости есть подходящее место для взятия проб лавы. Это научно обоснованная и рискованная процедура."
 agassiz.616.f: "'Лава была скрыта в глубоких берегах широкого русла и стекала вниз, но не как жидкость, а как гора кокса, а иногда и как высокогазообразный уголь. Оно раскалывалось, и потрескивало, и искрилось, и дымилось, и пылало, и все время двигалось вперед одним огромным плотным телом. Куски, отделяясь друг от друга, катились вниз, оставляя за собой такой яркий свет, что я мог бы вообразить себя в жерле железной печи; и когда каждая глыба падала с раскатами грома, деревья вспыхивали, а толпа издавала крики восхищения и сожаления.' - Луиджи Пальмиери."
 agassiz.616.g: "Мы здесь для проведения подобных экспериментов."
 agassiz.617.t: "Образец лавы - Успех!"
 agassiz.617.d: "Нашему геологу удалось взять образец лавы в ходе рискованного предприятия. Результат имеет высочайшую научную ценность."
 agassiz.617.f: ""
 agassiz.617.g: "Горячая наука!"
 agassiz.618.t: "Образец лавы - Провал!"
 agassiz.618.d: "К ужасу других членов экспедиции, сбор образца провалился. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] получил сильные ожоги и подверг команду опасности!"
 agassiz.618.f: ""
 agassiz.618.g: "Наука, которая обожжет вам руки..."
 agassiz.619.t: "Кристаллы"
 agassiz.619.d: "Уникальные геологические процессы в вулканической области произвели целый ряд редких кристаллических минералов. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] горит желанием добавить камни в [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] коллекцию..."
 agassiz.619.f: "Большинство вулканических пород содержат ряд общих минералов. Дифференциация вулканических пород приводит к увеличению содержания кремнезема (SiO2) в основном за счет фракционной кристаллизации. Таким образом, более развитые вулканические породы, как правило, богаче минералами с большим количеством кремнезема, такими как филло- и тектосиликаты, включая полевые шпаты, полиморфный кварц и мусковит. В то время как в более примитивных вулканических породах по-прежнему преобладают силикаты, в них присутствуют минеральные соединения с меньшим содержанием кремнезема, такие как оливин и пироксены. Серия реакций Боуэна правильно предсказывает порядок образования наиболее распространенных минералов в вулканических породах. Иногда магма может поглощать кристаллы, которые выделились из другой магмы; такие кристаллы называются ксенокристаллами. Алмазы, найденные в кимберлитах, являются редкими, но хорошо известными ксенокристаллами; кимберлиты не создают алмазы, а собирают их и транспортируют на поверхность Земли."
 agassiz.619.g: "Достаточно одного образца."
 agassiz.619.h: "Возьмите как можно больше образцов, сколько сможете!"
 agassiz.619.i: "Несколько камней не стоят жизни исследователя."
 agassiz.620.t: "Огненная река"
 agassiz.620.d: "Река лавы преграждает путь команде. В то время как некоторые участники считают это препятствие опасным вызовом, способным угрожать всей вулканической экспедиции, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] видит в этой ситуации прежде всего научную возможность испытать [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] неиспользованные инструменты..."
 agassiz.620.f: "'В большинстве случаев можно отчетливо видеть, что свет исходит от раскаленных, но не пылающих тел. Именно свет раскаленной лавы создает впечатление, что огромный столб пламени вырывается из Везувия.' - Джон Филипс"
 agassiz.620.g: "Доктору [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] следует изучить её."
 agassiz.620.h: "Это слишком опасно!"
 agassiz.621.t: "Теории вулканизма"
 agassiz.621.d: "Во время [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] пребывания у вулкана [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] хотел бы наконец проверить некоторые из [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] предыдущих теорий вулканизма, собирая доказательства и исследуя окрестности. Для этого [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] нужно много времени в том, что [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] называет 'чрезвычайно увлекательной и вдохновляющей местностью', в то время как [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] коллеги, скрежеща зубами, наблюдают, как на заднем плане поднимается все больше и больше темного дыма..."
 agassiz.621.f: "'В кульминационный момент извержения столб пепла поднялся высоко, приняв форму огромной сосны, и, наконец, начал наклоняться вниз, когда из-за большого количества плотного вещества, из которого состоял столб, он упал на землю. Потоки пылающей лавы устрашающей величины теперь стекали с горы.' - Мариана Старк."
 agassiz.621.g: "Доктору [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] следует уделить время, чтобы тщательно изучить феномен."
 agassiz.621.h: "Не теряйте время!"
 agassiz.622.t: "Землетрясение"
 agassiz.622.d: "Падение обломков и оползень сопровождались подземным толчком ранним утром, когда экспедиция находилась очень близко к кратеру. Небольшое землетрясение является четким свидетельством того, что вулкан более активен, чем участники предполагали ранее."
 agassiz.622.f: "'В другом месте этот ученый географ, ссылаясь на предание о том, что Сицилия была отделена от Италии в результате землетрясения, замечает, что в настоящее время прибрежные земли в этих краях редко сотрясаются землетрясениями, поскольку теперь там были открыты отверстия, через которые выходили огонь и воспламененные вещества, а также вода; но раньше, когда вулканы Этна, Липарские острова, Искья и другие были закрыты, заключенный в них огонь и ветер могли вызывать гораздо более бурные движения. Таким образом, доктрина о том, что вулканы являются предохранительными клапанами и что подземные толчки, вероятно, наиболее сильны, когда вулканическая энергия впервые перемещается в новую область, не является современной.' - Чарльз Лайелл."
 agassiz.622.g: "Неужели вся эта экспедиция была такой уж хорошей идеей...?"
 agassiz.623.t: "Полезные ископаемые повсюду"
 agassiz.623.d: "Экспедиция под руководством [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] на вулкане в [SCOPE.sState('agassiz_volcano_state').GetName] наткнулась на богатое месторождение минералов."
 agassiz.623.f: "Минералы — лучший друг геолога."
 agassiz.623.g: "Минералы!"
 agassiz.623.h: "Нет."
 agassiz.624.t: "Экзотический образец"
 agassiz.624.d: "Это может показаться удивительным, но вулканическая экспедиция в [SCOPE.sState('agassiz_volcano_state').GetName] действительно нашла редкие образцы животных уникальной фауны, которые живут очень близко к вулкану. Некоторые экземпляры, несомненно, представляли бы большой интерес для местных зоологов."
 agassiz.624.f: "'Хамфри! Пожалуйста, собери несколько яиц карликовых вулканических попугаев. Завтрак был скудным, и я скучаю по своей воскресной глазунье'"
 agassiz.624.g: "Образец!"
 agassiz.625.t: "Неизвестные окаменелости"
 agassiz.625.d: "Некоторые редкие окаменелости, которые [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] обнаружил во время вулканической экспедиции в [SCOPE.sState('agassiz_volcano_state').GetName], могли бы дать ответ на важные палеонтологические и геологические вопросы."
 agassiz.625.f: "'Если мы обойдем плодородный регион у подножия Этны с южной и восточной сторон, то увидим морские пласты глинистого песка и вулканического туфа, выступающие из-под современных лав. Морские ископаемые раковины, встречающиеся в этих слоях, все или почти все идентичны видам, обитающим в настоящее время в Средиземном море; и поскольку они встречаются на высоте от 600 до 800 футов над уровнем моря близ Катании, они ясно доказывают, что в этом регионе, как и в других частях Европы, были обнаружены окаменелости морских раковин. Сицилия, расположенная дальше к югу, представляет собой восходящее движение древнего морского дна. Поэтому справедливо предположить, что вся гора, за исключением тех ее частей, которые имеют очень современное происхождение, участвовала в этом перевороте.' - Чарльз Лайелл."
 agassiz.625.g: "Окаменелости!"
 agassiz.626.t: "Геомагнитные данные"
 agassiz.626.d: "Вулканическая экспедиция в [SCOPE.sState('agassiz_volcano_state').GetName] получила сегодня утром телеграмму из столицы. Геомагнитная обсерватория просит собрать некоторые данные на кратере вулкана. Доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] выполнил это пожелание."
 agassiz.626.f: "'Если эти данные так важны для Геомагнитного института, почему бы вам самому не приехать сюда и не получить их?'"
 agassiz.626.g: "Идеально"
 agassiz.627.t: "Солнечный элемент на Земле"
 agassiz.627.d: "При анализе некоторых ранее неисследованных пород [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] обнаруживает удивительные вещи. Используя спектральный анализ на месте, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] может доказать, что вулканическая порода действительно содержит гелий, который, как ранее считалось, встречается только в космосе."
 agassiz.627.f: "Луиджи Пальмиери был итальянским физиком, метеорологом, сейсмологом и вулканологом. В 1845 году он сменил Паскуале Галлуппи на посту преподавателя логики и метафизики в Неаполитанском университете. После смерти Гэллупи в 1847 году его кафедра была передана ему. В 1860 году он оставил кафедру и вместо этого возглавил кафедру геофизики и метеорологии, которую сам же и основал. При кафедре были созданы метеорологическая обсерватория и обсерватория Везувия, основанная в 1842 году, управление которыми также перешло к Пальмиери. Он возглавлял кафедру и две обсерватории до своей смерти. Пальмиери стал известен, в частности, благодаря усовершенствованным измерительным приборам, таким как электромагнитный сейсмограф и приборы для измерения электрического напряжения в атмосфере. В 1882 году ему впервые удалось обнаружить элемент гелий на Земле с помощью спектрального анализа лавы Везувия."
 agassiz.627.g: "Это открывает  ... интересные возможности."
 agassiz.628.t: "Команда просит передышки"
 agassiz.628.d: "После более чем годичной экспедиции на вулкан члены команды все чаще просят перерывов. Многие находятся на грани истощения. Раздаются первые громкие голоса о возвращении домой."
 agassiz.628.f: "'Вы боитесь? При всем уважении, подобные сейсмические явления - это, в первую очередь, причина, по которой мы поднимаемся на этот вулкан! Вы ученый или дезертир?'"
 agassiz.628.g: "Дайте им столько отдыха, сколько им нужно."
 agassiz.628.h: "Короткий перерыв, не более."
 agassiz.628.i: "Эти бесполезные помощники должны работать, а не бездельничать!"
 agassiz.629.t: "Преисподняя"
 agassiz.629.d: "Ситуация на вулкане в [SCOPE.sState('agassiz_volcano_state').GetName] значительно ухудшилась. Гора внезапно изрыгает чёрный дым, и потоки лавы, кажется, усиливаются. Экспедиция теперь оказалась в затруднительном положении. Следует ли участникам экспедиции проявить осторожность и рисковать быть отрезанными лавой, или же им следует реагировать быстро, но рисковать неизвестной опасностью?"
 agassiz.629.f: "'Огненное дыхание обрушилось на город и набережную со всей силой, какую могла бы придать ему пушка. Нам в лицо полетели осколки, причинив жгучий эффект. Воздух наполнился пламенем. Мы невольно подняли руки, чтобы защитить лица. Я заметил тот же жест, когда увидел тела жертв на берегу.' - Граф де Фитц-Джеймс"
 agassiz.629.g: "Проявить осторожность."
 agassiz.629.h: "Рискнуть."
 agassiz.630.t: "Ад на Земле"
 agassiz.630.d: "Кажется, что весь ад вырвался на волю на вулкане в [SCOPE.sState('agassiz_volcano_state').GetName]. Фонтаны лавы взмывают вверх, ослепительные силы сражаются друг с другом в потоках огня. Угрожающее событие для большинства участников экспедиции. Лишь доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] не может избежать восторженного очарования."
 agassiz.630.f: "'К ночи эффект от огня стал еще красивее. Мы были окружены потоками и водопадами красного сияющего огня, а в центре, из столба густого дыма, поднимавшегося в воздух, падали огромные каменные глыбы, белые от сильного жара, оставляя за собой великолепные клубы пара.' - Джордж Гордон Байрон."
 agassiz.630.g: "Это завораживающее зрелище, и мы должны его сфотографировать!"
 agassiz.630.h: "Пугающе"
 agassiz.630.i: "Уходите!"
 agassiz.631.t: "Довольно активный вулкан"
 agassiz.631.d: "По всей видимости, вулкан, который исследует доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], гораздо активнее, чем ожидалось. Вероятно, скоро произойдёт извержение. Это делает продвижение экспедиции более опасным. Однако с повышением риска возрастают и научные возможности..."
 agassiz.631.f: "'Люди никогда не верят в существование вулканов, пока лава на самом деле не обрушится на них.' - Джордж Сантаяна."
 agassiz.631.g: "Больше знаний!"
 agassiz.631.h: "Больше опыта!"
 agassiz.631.i: "Больше минералов!"
 agassiz.632.t: "Газетный репортаж"
 agassiz.632.d: "#YELLOW Хроника [SCOPE.sState('manzoni_publisher_state').GetNameNoFormatting]#!, одна из ведущих газет региона в настоящее время информирует своих читателей об экспедиции на вулкан. Таким образом, эта узкая научная область вызвала интерес у большей части населения. Приключенческие истории, в частности, привлекают мальчиков и юношей."
 agassiz.632.f: "'Читайте в свежем номере: Дерзкое восхождение к кратеру доктора [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastNameNoFormatting]! Отважные учёные против лавы, ядовитых испарений и адской жары. Человек пересекает ещё одну границу у края того, что древние считали входом в подземный мир. Наши репортёры продолжают сопровождать путешествие иллюстрациями. Четверг — день Хроники!'"
 agassiz.632.g: "Это вдохновит новое поколение ученых."
 agassiz.633.t: "Безопасное место для отдыха"
 agassiz.633.d: "Участники экспедиции нашли безопасное место для укрытия среди сернистых паров, черного дыма и потоков лавы."
 agassiz.633.f: "'Мой дорогой коллега, профессор Шабернак!\n\n Благодарю вас за ваше глубокое понимание динамического развития воды в вулканическом вакууме, но я сформулирую свои возражения более подробно позже. Скорее, я хочу сказать, что в моей переписке с доктором Сауэрспеком мне сказали, что вы распространили в университете позорный слух о том, что мы развлекались на этом вулкане. Я хочу, чтобы вы прекратили делать подобные предположения. Источники [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastNameNoFormatting], которые я недавно обнаружил, имеют максимальную температуру всего 32°C, а не 35°C, как Вы недавно утверждали. Так что они de facto леденяще холодные. Пожалуйста, исправьте эти гнусные искажения!'"
 agassiz.633.g: "Расслабление!"
 agassiz_volcano_tourist_modifier: "Вулканический туризм"
 agassiz_small_volcano_eruption_modifier: "Небольшое извержение вулкана"
 agassiz_medium_volcano_eruption_modifier: "Извержение вулкана"
 agassiz_big_volcano_eruption_modifier: "Крупное извержение вулкана"
 agassiz_medium_earthquake_modifier: "Землетрясение"
 agassiz_big_earthquake_modifier: "Крупное землетрясение"
 agassiz.711.t: "Вулканическое зрелище"
 agassiz.711.d: "Жители [SCOPE.sState('agassiz_volcano_state').GetName] в настоящее время мы являемся свидетелями впечатляющего зрелища: фонтаны лавы вулкана представляют собой завораживающее зрелище, особенно ночью. Среди зевак можно встретить туристов и ученых."
 agassiz.711.f: "'Величайший из Вулканов! Пламя Этны\n Бледнеет перед твоим и неугасимая Гекла смиряется;\n Везувий показывает своё пламя, обычное зрелище\nДля разинувших рты туристов, с его изъезженной высоты.'\n\n - Лорд Байрон"
 agassiz.711.g: "Восхитительно!"
 agassiz.712.t: "Небольшое извержение вулкана"
 agassiz.712.d: "Вулкан в [SCOPE.sState('agassiz_volcano_state').GetName] извергся. Несколько небольших деревень были разрушены, а поля залиты лавой, но катастрофа была ограниченной."
 agassiz.712.f: "'Что я увидел! Тысячи языков пламени осветили окрестности. На верхушках деревьев я увидел языки пламени. Я услышал треск и увидел огненный столб прямо рядом со мной. Моря не было видно. Все было покрыто пеплом. Я не видел своей руки перед собой. Последнее, что я увидел, был пепел, который фонтаном вылетал из щелей в досках пола. Я почувствовал сильное давление, бросившее меня на землю. Потом мне показалось, что из меня выкачали воздух, и я не могла дышать.', - Джоанна Бейеринк."
 agassiz.712.f_basic: "\n\n#YELLOW Благодаря нашим учёным на Вулканической обсерватории мы не были полностью застигнуты врасплох катастрофой. Поэтому мы смогли принять меры предосторожности и #G несколько ограничить разрушения#!.#!"
 agassiz.712.f_advanced: "\n\n#YELLOW Благодаря нашим превосходным учёным на Вулканической обсерватории мы смогли быстро инициировать эвакуационные и защитные меры. Мы смогли #G значительно ограничить разрушения#!."
 agassiz.712.g: "Всего лишь немного лавы."
 agassiz.712.h: "Какие новости из обсерватории?"
 agassiz.712.i: "Это может быть интересно для доктора [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] и его студентов"
 agassiz.713.t: "Извержение вулкана"
 agassiz.713.d: "Мощное извержение потрясло [SCOPE.sState('agassiz_volcano_state').GetName]. Осколки тефры и вулканический пепел разрушили здания и посевы, унося жизни некоторых наших людей."
 agassiz.713.f: "'Мы услышали над собой и вокруг острова странный звук, похожий на сильный треск огня или выстрелы тяжелой артиллерии с интервалом в одну-две секунды. В пять часов рев продолжился, небо заволокла темнота, и на нас посыпался град пемзы, многие куски которой были значительного размера и довольно теплые.\n\n Та ночь была черной из-за продолжающегося выпадения пепла, который прерывался непрерывными вспышками молний, как в небе, так и вокруг острова.' - Капитан Уотсон"
 agassiz.713.g: "Эти бедные люди."
 agassiz.713.j: "Направить как можно больше помощи для поддержки пострадавших!"
 agassiz.714.t: "Извержение мегавулкана"
 agassiz.714.d: "Извержение беспрецедентного масштаба полностью разрушило жизни многих в штате [SCOPE.sState('agassiz_volcano_state').GetName]. Взрыв был слышен за сотни миль, и все, что имело несчастье окружать гору, было немедленно разрушено."
 agassiz.714.f: "'Вы могли слышать вопли женщин, плач младенцев и крики мужчин; одни звали родителей, другие своих детей или жён, пытаясь узнать их по голосам. Люди оплакивали свою собственную судьбу или судьбу своих родственников, а некоторые молились о смерти в ужасе перед гибелью. Многие взывали к помощи богов, но ещё больше воображали, что богов не осталось, и что вселенная погрузилась в вечную тьму навсегда.' - Плиний Младший"
 agassiz.714.g: "Трагедия!"
 agassiz.715.t: "Дым и грохот"
 agassiz.715.d: "Вулкан в [SCOPE.sState('agassiz_volcano_state').GetName] грохочет. Над кратером поднимается дым. Вот и все. Жители испытывают облегчение, туристы и ученые разочарованы."
 agassiz.715.f: "'Слишком много, чтобы исследовать, и слишком мало, чтобы наслаждаться. Какой жалкий, угрюмый вулкан!'"
 agassiz.715.g: "Он просыпается или остаётся спящим?"
 agassiz.721.t: "Сейсмические волны"
 agassiz.721.d: "Незначительное сейсмическое возмущение вытолкнуло [SCOPE.sState('agassiz_earthquake_state').GetName] из постели сегодня утром. Небольшое землетрясение причинило лишь незначительный ущерб, но возбудило интерес сейсмологов."
 agassiz.721.f: "'Интервьюер: Если бы здание, в котором вы сейчас находитесь, начало трястись, и вы знали, что происходит землетрясение, что бы вы сделали?'\nЧарльз Рихтер: 'Я бы пошёл — не побежал — к ближайшему сейсмографу.'"
 agassiz.721.g: "Интересно."
 agassiz.722.t: "Землетрясение в [SCOPE.sState('agassiz_earthquake_state').GetName]"
 agassiz.722.d: "Землетрясение обрушилось на [SCOPE.sState('agassiz_earthquake_state').GetName], разрушив здания, ранив людей и даже унеся несколько жизней."
 agassiz.722.f: "'Был глубокий грохот, глубокий и ужасный, и затем я действительно мог видеть, как оно идёт вверх по Вашингтон-стрит. Вся улица колебалась. Это было как если бы волны океана приближались ко мне, вздымаясь по мере приближения.' - Джесси Кук"
 agassiz.722.f_basic: "\n\n#YELLOW Благодаря нашим обученным сейсмологам, уже было известно, что [SCOPE.sState('agassiz_earthquake_state').GetName] является сейсмоопасным регионом. Благодаря профилактическим мерам, например, в строительстве, ущерб был легко минимизирован.#!"
 agassiz.722.g: "Трагедия!"
 agassiz.722.h: "Как обсерватория оценивает ситуацию?"
 agassiz.722.i: "Идеальное поле для геологических исследований."
 agassiz.722.j: "Направить как можно больше помощи для поддержки пострадавших!"
 agassiz.723.t: "Великое землетрясение в [SCOPE.sState('agassiz_earthquake_state').GetName]"
 agassiz.723.d: "[SCOPE.sState('agassiz_earthquake_state').GetName] был превращён в руины землетрясением невиданного масштаба. Бесчисленные здания были разрушены, а количество погибших невозможно подсчитать."
 agassiz.723.f: "'В результате землетрясения в Сан-Франциско были разрушены стены и дымоходы стоимостью в сотни тысяч долларов. Но последовавший за этим пожар уничтожил имущество стоимостью в сотни миллионов долларов, и невозможно оценить реальный ущерб в сотни миллионов долларов. Никогда в истории ни один современный имперский город не был так сильно разрушен. Сан-Франциско исчез. От него не осталось ничего, кроме воспоминаний и нескольких жилых домов на окраинах. Его промышленная часть стерта с лица земли. Деловой район стерт с лица земли. Его социальная и жилая часть стерта с лица земли. Фабрики и склады, огромные магазины и здания газет, отели и дворцы набобов - все это исчезло. Остались лишь несколько жилых домов на окраинах того, что когда-то было Сан-Франциско.' - Джек Лондон."
