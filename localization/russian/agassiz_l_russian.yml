 je_agassiz_volcano_expedition: "Вулканическая экспедиция"
 je_agassiz_volcano_expedition_reason: "Профессор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] находится в вулканической экспедиции в [SCOPE.sState('agassiz_volcano_state').GetName] вместе с командой экспертов и помощников. Бюджет экспедиции ограничен максимум 2 годами. Обычно экспедиция добивается некоторого прогресса каждый месяц и должна завершить свои исследовательские работы через полтора года. Однако необычные события — будь то приятные научные или неприятные катастрофические — могут повлиять на ход событий. Как правило: уровень опасности никогда не должен быть настолько высоким, чтобы достигать своего максимума. Это не детская прогулка. Не играйте с вулканами."
 agassiz.21.t: "Везувианская Обсерватория"
 agassiz.21.d: "В геологии Везувий считается образцовым вулканом, позволяющим делать выводы обо всей вулканологии. В связи с возросшей активностью вулкана с XVII века и в надежде на возможность предсказывать и научно изучать более поздние извержения, правительство штата приняло решение о строительстве вулканологической обсерватории на его склоне."
 agassiz.21.f: "Обсерватория Везувия (итал. Osservatorio Vesuviano) - это центр наблюдения за тремя вулканическими районами Кампании, Италия: горой Везувий, Флегрейскими полями и островом Искья. Основанный в 1841 году на склонах Везувия Фердинандом II Бурбонским, королем Обеих Сицилий, это старейший вулканологический институт в мире."
 agassiz.21.g: "Мы - первая нация в области вулканологии."
 agassiz_conquered_volcano_modifier: "Покоренный вулкан"
 agassiz_geological_disaster_modifier: "Геологическая катастрофа"
 je_agassiz_volcano_expedition_ai: ""
 je_agassiz_volcano_expedition_ai_reason: ""
 agassiz.901.tt: "[SCOPE.sCharacter('agassiz_geologist_scope').GetFullName] очень тщательно изучит загадочную книгу. Это может иметь неизвестные последствия."
 agassiz.917.tt: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] и каждый член экспедиции погибают во тьме и отчаянии!"
 agassiz.909.tt: "Путешествие к центру Земли больше не будет доступно."
 agassiz.915.tt: "Некоторые из членов нашей экспедиции могут погибнуть."
 agassiz_lidenbrock_diary_modifier: "Дневник Отто Лиденброка"
 agassiz_journey_coe_preparation_modifier: "Подготовка к путешествию к Центру Земли"
 agassiz_tragic_subterranean_accident_modifier: "Трагический подземный инцидент"
 je_agassiz_journey_coe: "Путешествие к центру Земли"
 je_agassiz_journey_coe_reason: "Доктор [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] нашёл загадочные записки немецкого геолога Отто Лиденброка, указывающие путь к подземной системе пещер. Ими уже пользовался в XVI веке исландский алхимик по имени Арне Сакнуссемм. Согласно книге, вход находится в исландском вулкане."
 je_agassiz_journey_coe_fail: "Если доктор [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] умрёт или уйдёт в отставку, экспедицию больше нельзя будет провести."
 agassiz.901.t: "Дневник профессора Лиденброка"
 agassiz.901.d: "Во время вулканической экспедиции доктор [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] сделал странную находку, о которой рассказал только после возвращения."
 agassiz.901.f: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] находит нечто, что в настоящее время затмевает все исследования вулканической экспедиции. В пещере, которая, как полагают, когда-то принадлежала потухшему вулкану в этом районе, [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetSheHe] обнаружил заброшенную геологическую наблюдательную станцию. Однако местные власти не смогли дать нам никакой информации о том, была ли и какая именно экспедиция могла здесь проходить. При более тщательном осмотре жерла вулкана доктор [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] обнаруживает, что там были ящики и мешки с личными вещами, в том числе сумка учёного. Внутри находился дневник, принадлежавший профессору Отто Лиденброку. Лиденброк был гамбургским геологом и минералогом, специализировавшимся на вулканизме и подземных пещерных системах. Он считался одной из самых выдающихся фигур в своей области, но также слыл задиристым и вспыльчивым. После спора в университете он бесследно исчез во время последней поездки. Дневник, возможно, является последней зацепкой к его последнему пристанищу в жизни — и он имеет неоценимую ценность для науки, учитывая обилие в нём минералогических и геологических исследований! Однако доктор [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] не соглашается отправить книгу прямо в ближайший университет, а хочет изучить её более пристально. Руководитель экспедиции утверждает, что журнал Лиденброка может предоставить доступ к чему-то гораздо большему, чем просто каталогизация скучных скальных образований..."
 agassiz.901.g: "Открытие, которое пойдёт на пользу всем."
 agassiz.901.h: "Доктору [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] следует сохранить и изучить его."
 agassiz.902.t: "Тайна профессора Отто Лиденброка"
 agassiz.902.d: "Книга, найденная во время экспедиции на вулкан, оказала дурное влияние на нашего геолога."
 agassiz.902.f: "С момента возвращения[SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName] из Греции,[SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] делает ничего, кроме изучения загадочного дневника, найденного [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] в вулканической полости. В свою очередь, [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] забрасывает [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHis] политические и научные обязанности. Сотрудники сообщают, что свет все еще горел до поздней ночи - в течение нескольких недель. Как ни странно, в последнее время геологу доставляли в основном скандинавскую литературу. Говорят, что [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U] сидит [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerselfHimself] в [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHis] доме, вместе с [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHis] племянником и домоправительницей, пока не было решено особенно сложное дело. Чем глубже наш геолог погружается в книгу, тем более маниакальным становится [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe]. Всё указывает на то, что [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] всё больше скатывается к психическому расстройству."
 agassiz.902.g: "Прискорбно."
 agassiz.903.t: "Путешествие к центру Земли"
 agassiz.903.d: "После длительного изучения дневника проф. Лиденброка [SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName] совершает прорыв."
 agassiz.903.f: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U] изолируется [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerselfHimself]. Абстрагируясь от внешнего мира, чтобы провести время наедине с дневником Лиденброка. Как [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] позже расскажет нам, был один отрывок, который интриговал [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHim] месяцами. Помимо личных заметок, между страниц была найдена гораздо более старая страница манускрипта. Автор: исландский алхимик XVI века по имени Арне Сакнуссемм. Он оставил загадочную надпись рунами, которая оказалась сложнее для расшифровки, чем [SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName] предполагалось изначально. Затем, словно по наитию, [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] разгадывает загадку. Как выяснилось, [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] догадки были верны. У книги был секрет; загадка настолько великая и чудовищная, что потрясла [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHim] до глубины души. Ибо послание алхимика гласило: \n\n 'Спустись в кратер Снайфедльсйокудль, на который падает тень Скартариса незадолго до июльских календ, о отважный путешественник, и ты доберешься до центра земли. Я это сделал.' \n\n Что взволновало [SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName] ещё больше: Лиденброк добавил к тексту своими собственными рунами новые. Они гласили: 'И я тоже'. Для геолога ясно, что эти сенсационные заявления требуют научной проверки. [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U] требует, чтобы мы поддержали [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHis] поездку в Исландию — [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] хочет отправиться к центру Земли [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerselfHimself]!"
 agassiz.903.g: "[SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe|U] с головой не дружит?!"
 agassiz.903.h: "Доктор знает, что [SCOPE.sCharacter('agassiz_journey_coe_leader').GetSheHe] делает. Поддержите [SCOPE.sCharacter('agassiz_journey_coe_leader').GetHerHim]!"
 agassiz.909.t: "Неудачный конец [SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName]"
 agassiz.909.d: "В связи с неудачным изменением жизненных обстоятельств [SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName] нам приходится прекратить наше запланированное предприятие по достижению центра Земли."
 agassiz.909.f: ""
 agassiz.909.g: "Прискорбно."
 agassiz.911.t: "Исландия"
 agassiz.911.d: "Экспедиция к центру Земли под руководством [SCOPE.sCharacter('agassiz_journey_coe_leader').GetFullName] прибыла в порт Рейкьявика."
 agassiz.911.f: "В Рейкьявике было бы нелегко заблудиться. Поэтому у меня не было необходимости узнавать дорогу, из-за чего можно ошибиться, когда единственным средством общения являются жесты. Город расположен на низкой и болотистой местности, между двумя холмами. С одной стороны его окаймляет огромный слой лавы, который плавно спускается к морю. С другой стороны, простирается обширный залив Факса, закрытый с севера огромным ледником Снайфедль, единственным обитателем которого в то время была \"Валькирия\". Обычно английские и французские рыболовецкие компании швартуются в этой бухте, но в тот раз они совершали круизы вдоль западного побережья острова. Самая длинная из двух улиц Рейкьявика проходила параллельно пляжу. Вскоре я изучил эти унылые тропинки; то тут, то там мне попадался поблекший дерн, похожий на изношенный кусок ковра, или некое подобие огорода, редкие овощи с которого уместно были бы на столе лилипутов. Несколько хилых желтофиолей пытались насладиться свежим воздухом и солнечным светом. За три часа я успел осмотреть не только город, но и его окрестности. Общий вид был удивительно унылым. Ни одного дерева, почти никакой растительности. Повсюду голые скалы - следы вулканической деятельности."
 agassiz.911.g: "Итак, это начинается."
 agassiz.912.t: "Снайфедльсйокудль"
 agassiz.912.d: "Команда достигла кратера исландского вулкана и вот-вот начнет спуск."
 agassiz.912.f: "Ужин был быстро съеден, и маленькая компания устроилась, как могла. Постель была жесткой, укрытие не очень прочным, а наше положение на высоте пяти тысяч футов над уровнем моря вызывало беспокойство. На следующее утро мы проснулись, наполовину замерзшие от резкого ветра, но залитые светом великолепного солнца. Я поднялся со своего гранитного ложа и вышел, чтобы насладиться великолепным зрелищем, которое развернулось передо мной. Я поднял голову и увидел прямо над собой верхнее отверстие конуса, обрамляющее кусочек неба очень маленькой окружности, но почти идеально круглый. Прямо на краю обрыва виднелся заснеженный пик Сариса, резко выделявшийся на фоне бесконечного пространства. Я еще не осмелился заглянуть в бездонную пропасть, в которую собирался броситься. Настал решающий час. Я уже упоминал, что оно было сто футов в диаметре и триста футов в окружности. Я наклонился над выступающим камнем и посмотрел вниз. От ужаса у меня волосы встали дыбом. Меня охватило ошеломляющее чувство пустоты. Я почувствовал, как мой центр тяжести сместился, и головокружение охватило мой мозг, как опьянение."
 agassiz.912.g: "Действительно ли все это было такой хорошей идеей?"
 agassiz.913.t: "Поиск воды"
 agassiz.913.d: "После спуска в вулкан запасы воды заканчиваются. Всего через несколько дней путешествие уже подвергается серьезной опасности."
 agassiz.913.f: "Никогда еще минералоги не оказывались в столь прекрасной ситуации для изучения природы на месте. То, что буровой станок, бесчувственный, инертный инструмент, не смог вывести на поверхность внутренней структуры земного шара, мы смогли увидеть собственными глазами и обработать собственными руками. По пластам сланцевого камня, окрашенного в нежные оттенки зеленого, извивающимися нитями тянулись нити меди и марганца со следами платины и золота. Я подумал: какие богатства сокрыты здесь, в недосягаемой глубине земли, навеки сокрытые от алчных глаз рода человеческого! Около шести часов этот блестящий праздник иллюминации заметно поутих, а затем почти прекратился. Как я и предсказывал, к концу первого дня ретроградного марша вода полностью перестала поступать. Нашей жидкой пищей теперь был только джин, но эта адская жидкость обжигала мне горло, и я не мог выносить ее вида. Температура и воздух казались мне удушливыми. Усталость парализовала мои конечности. Не раз я падал без движения. Затем наступила пауза, и мой дядя и исландец сделали все возможное, чтобы вернуть меня к жизни. Но я видел, что первый из них мучительно боролся с чрезмерной усталостью и мучительной жаждой.  Мы добрались на четвереньках, полумертвые, до перекрестка двух дорог. Там я безжизненным комочком растянулся на лавовой почве."
 agassiz.913.g: "Мы находимся слишком глубоко под землей - нам приходится искать воду там."
 agassiz.913.h: "Нам нужно вернуться на поверхность и поискать там воду."
 agassiz.914.t: "Mare internum (лат. внутреннее море)"
 agassiz.914.d: "Пройдя вдоль ручья через систему пещер, путешественники наталкиваются на огромное подземное море."
 agassiz.914.f: "Словно чудом, мы нашли воду: поток унес холодную воду глубоко в недра земли и наполнил наши запасы. Но когда мы пошли по нему и дошли до конца, нас ждал еще больший сюрприз. Сначала я почти ничего не видел. Мои глаза, непривычные к свету, быстро закрылись. Когда я смог снова открыть их, я был скорее ошеломлен, чем удивлен.  Огромная водная гладь, начало озера или океана, простиралась далеко за пределы видимости, сильно напоминая мне то открытое море, которое вызвало у десяти тысяч греков Ксенофонта после их долгого отступления одновременный крик: \"Талатта! талатта! Море! Море!\" Глубоко изрезанный берег был покрыт широким слоем мелкого блестящего песка, мягко омываемого волнами и усыпанного маленькими ракушками, в которых обитали первые из сотворенных существ. Волны разбивались об этот берег с глухим гулким эхом, свойственным обширным замкнутым пространствам.  Это был настоящий океан с неровными, как у земли, берегами, но пустынный и пугающе дикий на вид. Нетрудно догадаться, что после сорока семи дней заточения в узкой галерее дышать влажным воздухом, пропитанным солеными частицами, было верхом физического наслаждения."
 agassiz.914.g: "Постройка плота"
 agassiz.915.t: "Великан"
 agassiz.915.d: "Рунические знаки на таинственных, первобытных гигантских грибах указывают на то, что Арне Сакнуссемм был здесь. Но чтобы найти доказательства этого тезиса, нужно было бы пройти мимо гигантского, сверхъестественного доисторического человека."
 agassiz.915.f: "В рассеянном свете можно было разглядеть мельчайший предмет в густых и отдаленных зарослях. Я думал, что вижу - нет! Я действительно видел собственными глазами, как двигались огромные колоссальные формы. Это были гигантские животные; это было стадо мастодонтов - не ископаемых останков, а живых и напоминающих тех, кости которых были найдены в болотах Огайо в 1801 году. Я видел огромных слонов, чьи длинные гибкие хоботы рыхлили почву под деревьями, словно полчища змей. Я слышал, как их длинные бивни цвета слоновой кости с треском вгрызаются в старые гниющие стволы. Я посмотрел, недоверчиво качая головой. И хотя сначала я не поверил своим глазам, мне пришлось подчиниться своим ощущениям. Действительно, на расстоянии четверти мили, прислонившись к стволу гигантского каури, стоял человек, Протей этих подземных областей, новый сын Нептуна, и наблюдал за этим бесчисленным стадом мастодонтов. Да, действительно, он все еще был самим собой. Это было уже не ископаемое существо, как тот, чьи высохшие останки мы с легкостью подняли на поле костей; это был гигант, способный справиться с этими чудовищами. Ростом он был не менее двенадцати футов. Его голова, огромная и бесформенная, как у буйвола, была наполовину скрыта густой и спутанной порослью нечесаных волос. Больше всего она напоминала гриву первобытного слона. В руке он с легкостью держал огромный сук - посох, достойный этого пастуха геологического периода."
 agassiz.915.g: "Мы должны пойти на риск."
 agassiz.915.h: "Это слишком опасно — возвращайтесь на поверхность, сейчас же!"
 agassiz.916.t: "Рукопись Арне Сакнуссема"
 agassiz.916.d: "Сбежав от гигантского человеческого существа, путешественники обнаружили галерею, на стенах которой повсюду были инициалы Арне Сакнуссема. После недолгих поисков они находят доказательство того, что исландский алхимик действительно был здесь - легендарный манускрипт был найден глубоко под землей!"
 agassiz.916.f: "Еще через четверть часа наши проворные пятки унесли нас за пределы досягаемости этого ужасного чудовища. И все же, теперь, когда я могу спокойно поразмыслить, теперь, когда мой дух снова обрел спокойствие, теперь, когда прошли месяцы после этой странной и сверхъестественной встречи. Что я должен думать? Чему я должен верить? Я должен сделать вывод, что это было невозможно, что наши чувства были обмануты, что наши глаза видели не то, что мы предполагали. Ни одно человеческое существо не живет в этом подземном мире; ни одно поколение людей не живет в этих глубинных пещерах земного шара, неизвестных обитателям его поверхности и не связанных с ними. Абсурдно в это верить! Я скорее допускаю, что это могло быть какое-то животное, строение которого напоминало человеческое, какая-то обезьяна или павиан ранних геологических эпох, какой-то протопитек или мезопитек, какая-то ранняя или средняя обезьяна, подобная той, что была обнаружена мистером Ларте в костяной пещере Сансау. Но это существо превосходило по росту все измерения, известные современной палеонтологии. Но чтобы человек, живой человек, а значит, и целые поколения, несомненно, были похоронены там, в недрах земли, - это невозможно. Однако мы оставили позади светящийся лес, онемев от изумления, ошеломленные и сраженные ужасом, который граничил с оцепенением. Мы продолжали бежать, опасаясь, что ужасное чудовище может напасть на наш след. Это был полет, падение, похожее на то страшное притяжение, которое свойственно ночному кошмару. И, необычайно заинтересованные, мы осмотрели всю высокую стену, заглядывая в каждую щель, которая могла бы вести в галерею. Там, на гранитной плите, были высечены две загадочные буквы, наполовину изъеденные временем. Это были инициалы отважного путешественника: \"А.С.\", - крикнул мой дядя. \"Арне Сакнуссемм! Арне Сакнуссемм повсюду!'"
 agassiz.916.g: "Наконец-то - это наше!"
 agassiz.917.t: "Путешествие к центру Земли заканчивается"
 agassiz.917.d: "Путешествие к центру земли провалилось. Мы подозреваем, что все члены экспедиции умерли от жажды из-за нехватки воды."
 agassiz.917.f: "Было восемь часов вечера. Никаких признаков воды еще не появилось. Я ужасно страдал. Мой дядя продолжал шагать вперед. Он отказывался останавливаться. Он с тревогой прислушивался к журчанию далеких источников. Но нет, вокруг стояла мертвая тишина. И теперь мои конечности подкашивались. Я сопротивлялся боли и пыткам, чтобы не остановить дядю, что привело бы его в отчаяние, потому что день близился к концу, и он был для него последним. Наконец я потерпел полное фиаско. Я вскрикнул и упал: \"Иди ко мне, я умираю\". Мой дядя пошел обратно. Он смотрел на меня, скрестив руки на груди; затем с его губ сорвались слова, которые он пробормотал: \"Все кончено!\" Последнее, что я увидел, был полный страха жест ярости, и мои глаза закрылись."
 agassiz.917.g: "Какая трагедия!"
 agassiz.918.t: "Стромболи"
 agassiz.918.d: "Путешествие к центру земли увенчалось полным успехом - наши ученые благополучно вернулись героями после извержения вулкана Стромболи!"
 agassiz.918.f: "У меня осталось смутное впечатление от непрерывных взрывов, громких детонаций, общего сотрясения скал вокруг нас и вращательного движения, от которого наш плот когда-то беспомощно кружился. Он раскачивался в потоке лавы, окруженный плотным слоем пепла. Вырывающиеся языки пламени метнули в нас свои огненные языки. Снизу донеслись дикие, яростные порывы штормового ветра, похожие на одновременный треск огромных чугунных печей, и я мельком увидел фигуру Ганса, освещенную пламенем; и все чувства, которые у меня остались, были именно такими, какими, я думаю, должны быть чувства несчастного преступника, обреченного быть выпущенным заживо из жерла пушки, за мгновение до того, как будет нажат спусковой крючок, и разлетающиеся конечности, клочья плоти и кожи наполнят дрожащий воздух и забрызгают окровавленную землю. \n\n. Когда я снова открыл глаза, то почувствовал, как сильная рука нашего проводника схватила меня за пояс. Я обнаружил, что лежу на пологом склоне горы всего в двух ярдах от зияющей пропасти, которая поглотила бы меня, если бы я наклонился в ту сторону. Над нашими головами, на высоте пятисот футов или более, мы увидели кратер вулкана, из которого с интервалом примерно в пятнадцать минут с громкими взрывами вырывались высокие столбы огня, смешанного с пемзой, пеплом и текущей лавой. Я чувствовал, как вздымается гора, которая, казалось, дышит, как огромный кит, и извергает огонь и ветер из своих огромных дыхалищ. Внизу, по довольно крутому склону, на протяжении восьмисот или девятисот футов сбегали потоки лавы, придавая горе высоту около 1300 или 1400 футов. Но подножие горы было скрыто в великолепной беседке из густой зелени, среди которой я смог различить оливы, инжир и виноградные лозы, увитые сочными пурпурными гроздьями."
 agassiz.918.g: "Какое приключение!"
 agassiz.919.t: "Съеденный великаном"
 agassiz.919.d: "Путешествие к центру земли провалилось. Мы подозреваем, что все члены экспедиции были заживо съедены великаном."
 agassiz.919.f: "По крайней мере, мы так подозреваем."
