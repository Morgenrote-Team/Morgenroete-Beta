 agassiz_add_x_generic_minerals_plus_x_tt: "Получить [SCOPE.GetValue('generic_minerals_amount')|0+] @agassiz_mineral! [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]."
 agassiz_add_x_rare_minerals_minus_x_tt: "Потерять [SCOPE.GetValue('rare_minerals_amount')|0+] @agassiz_rare_mineral! [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]."
 agassiz_add_x_rare_minerals_0_tt: "Не получить @agassiz_rare_mineral! [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]."
 agassiz_add_x_rare_minerals_plus_x_tt: "Получить [SCOPE.GetValue('rare_minerals_amount')|0+] @agassiz_rare_mineral! [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]."
 agassiz_add_x_geological_knowledge_minus_x_tt: "Потерять [SCOPE.GetValue('geological_knowledge_amount')|0+] @agassiz_geological_knowledge! [concept_agassiz_geological_knowledge]."
 agassiz_add_x_geological_knowledge_0_tt: "Не получить @agassiz_geological_knowledge! [concept_agassiz_geological_knowledge]."
 agassiz_add_x_geological_knowledge_plus_x_tt: "Получить [SCOPE.GetValue('geological_knowledge_amount')|0+] @agassiz_geological_knowledge! [concept_agassiz_geological_knowledge]."
 agassiz_building_production_mult_modifier: "Новая рудная жила"
 agassiz_building_production_2_mult_modifier: "Новая нефтяная скважина"
 agassiz_ore_search_cost_modifier: "Стоимость поиска руды"
 agassiz_mineralogist: "Минералог"
 agassiz_mineralogist_desc: "Минералоги являются экспертами по редким породам и особенно полезны в поиске редких минералов."
 agassiz_geophysicist: "Геофизик"
 agassiz_geophysicist_desc: "Геофизики являются экспертами, когда речь заходит о природе земных недр, и лучше всех знакомы с историей Земли и происходящими на ней процессами."
 agassiz_prospector: "Старатель"
 agassiz_prospector_desc: "Старатели обладают особыми способностями, которые помогают находить новые рудные жилы или источники нефти."
 agassiz_oceanographer: "Океанограф"
 agassiz_oceanographer_desc: "Океанографы обладают выдающимися знаниями о природе и процессах, происходящих в океанах."
 agassiz_volcanologist: "Вулканолог"
 agassiz_volcanologist_desc: "Вулканологи являются экспертами по вулканам и особенно полезны в их исследовании."
 agassiz.100.t: "Поиски руд"
 agassiz.100.d: "Доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] собрал [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] оборудование и отменил все курсы, чтобы начать поиск руд. Остается открытым вопрос о том, месторождения какого типа сырья следует исследовать [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe]?"
 agassiz.100.f: ""
 agassiz.100.g: "Доктору [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] следует вернуться в университет."
 agassiz.100.h: "Уголь."
 agassiz.100.i: "Железо."
 agassiz.100.j: "Свинец."
 agassiz.100.k: "Сера."
 agassiz.100.l: "Золото."
 agassiz.100.m: "Уран."
 agassiz.101.t: "Новые рудные жилы"
 agassiz.101.d: "После того как доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] нашел несколько новых рудных жил для горнодобывающих компаний, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] он возвращается. Дальнейшее расширение объектов [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] — не его забота."
 agassiz.101.f: "'У всего есть свой предел. Железную руду нельзя превратить в золото'. -Марк Твен"
 agassiz.101.g: "Хорошая работа."
 agassiz.102.t: "Нефть!"
 agassiz.102.d: "После того, как доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] обнаружил новые источники нефти, черное золото забурлило. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] свою работу считает, на данный момент, выполненной."
 agassiz.102.f: "'Формула успеха: вставай рано, усердно работай, добывай нефть.' -Дж. Пол Гетти"
 agassiz.102.g: "Нефти много не бывает."
