l_russian:
 ag_morgenroete_name: "[concept_morgenroete]"
 ag_morgenroete_tooltip: "У вас есть как минимум одно возможное действие, связанное с особенностями мода [concept_morgenroete]."
 concept_morgenroete: "#r Morgenröte#!"
 concept_morgenroete_mr: "MR"
 concept_morgenroete_concept: "Концепт"
 concept_pm_academics_university_humanities: "#b #BLUE Гуманитарно-антропологическая специализация#!#!"
 concept_pm_academics_university_natural_history: "#b #GREEN Естественно-научная специализация#!#!"
 concept_pm_academics_university_mathematics: "#b #ORANGE Математико-техническая специализация#!#!"
 concept_academics_university_specialization: "Специализация университета"
 concept_academics_academic: "Учёный"
 concept_academics_academics: "Учёные"
 concept_academics_scientist: "Учёный"
 concept_academics_scientists: "Учёные"
 concept_academics_academic_desc: "In [concept_morgenroete] #b Academics#! are special characters that allow you to use certain mechanics of the mod. You can get #b Academics#! in some events or by aquiring enough [concept_academics_progress].\nCurrently these #b Academics#! exist:\n - [concept_tesla_engineer]\n - [concept_mendelejew_chemist]\n - [concept_verrier_astronomer]\n - [concept_agassiz_geologist]\n - [concept_dubois_paleontologist]\n - [concept_dubois_naturalist]\n - [concept_theiler_biologist]\n - [concept_panum_physician]\n - [concept_lepsius_archaeologist]\n - [concept_andersson_anthropologist]"
 concept_academics_progress: "Научный прогресс"
 concept_academics_progress_desc: "Накопив 360 единиц #b научного прогресса#!, вы сможете получить нового [Concept('concept_academics_academic', 'учёного')]. Чтобы вообще иметь доступ к #b научному прогрессу#!, у вас должна быть технология «#b Академия#!» и хотя бы один #b университет#!.\nПрирост #b научного прогресса#! зависит от различных факторов. Например, чем выше ваша [concept_literacy|l], тем быстрее вы накапливаете #b научный прогресс#!. Другим фактором является процент учёных среди населения вашей страны. Вы получите максимальный прирост #b научного прогресса#!, если доля учёных составляет #p 2%#! или более. Улучшенные школы и довольная интеллигенция также способствуют накоплению #b научного прогресса#!. Наконец, некоторые технологические специализации и особые сооружения, такие как [concept_dubois_zoo|l] или [concept_verrier_observatory|l], также обеспечивают дополнительный #b научный прогресс#!."
 concept_academics_scientific_society: "Научное общество"
 concept_academics_scientific_societies: "Научные общества"
 concept_academics_scientific_society_desc: "#b Научное общество#! — это объединение величайших умов вашей страны. Оно представляет ваших учёных и академиков и позволяет вам взаимодействовать с вашими [Concept('concept_academics_academic', 'учёными')].\n\n#b Научное общество#! может поручать вам [Concept('concept_academics_academic_mission', 'научные задания')], за выполнение которых вы будете получать ценные награды."
 concept_academics_experience: "Опыт"
 concept_academics_experience_desc: "Некоторые учёные накапливают #b опыт#! в течение своей жизни. В моде [concept_morgenroete] персонажи получают #b опыт#! при своём появлении. Обычно они получают 10 единиц #b опыта#! за каждый год жизни после 30 лет.\nКроме того, они получают #b опыт#!, выполняя свою работу, например, находя новые [Concept('concept_verrier_astronomical_object', 'астрономические объекты')]. Они также пассивно получают #b опыт#! каждый год.\nПерсонаж, набравший 100 единиц #b опыта#!, получит черту «#b Опытный#!». Если персонаж достигает 300 единиц #b опыта#!, он получает черту «#b Знаменитый#!».\nЧем выше #b опыт#! персонажа, тем лучше он работает. Например, опытный или знаменитый [concept_dubois_paleontologist] находит больше [Concept('concept_dubois_dinosaur_bone', 'костей динозавров')] и лучше справляется со сборкой [Concept('concept_dubois_dinosaur_skeleton', 'скелета динозавра')]."
 concept_academics_academic_mission: "Научное задание"
 concept_academics_academic_missions: "Научные задания"
 concept_academics_mission: "Задание"
 concept_academics_missions: "Задания"
 concept_academics_academic_mission_desc: "Ваше [concept_academics_scientific_society] время от времени будет просить вас достичь определённой цели. Такими целями могут быть поиск определённого количества [Concept('concept_verrier_astronomical_object', 'астрономических объектов')], [Concept('concept_lepsius_artifact', 'артефактов')] или тому подобное. Другие #b задания#! могут потребовать от вас найти Планету X или организовать [Concept('concept_lepsius_exhibition', 'превосходную выставку')].\nЕсли вы провалите #b задание#!, ваше #b научное общество#! будет недовольно, но за выполнение задания вы получите ценные награды."
 concept_curtiss_aviation: "Авиация"
 concept_curtiss_aviation_desc: "#b Авиация#! — одна из главных особенностей мода [concept_morgenroete]. В XIX и XX веках человечество начало покорять небо. Сначала на #b воздушных шарах#! и #b дирижаблях#!, а затем на #b самолётах#!. Полёты были престижным занятием и позволяли достигать новых горизонтов.\n\nМногие страны начинают свой путь в небо в начале игры, когда начинают спонсировать [Concept('concept_curtiss_balloonist_role', 'аэронавта')] для установления рекордов. Побитие одного из рекордов даст вашей стране технологический импульс, а также модификатор престижа.\nИсследование технологии «Цеппелин» позволит вам провести [Concept('concept_curtiss_arctic_expedition', 'арктическую экспедицию')], если у вас есть доступ к Северному полюсу и [concept_curtiss_pilot].\nДальнейшие исследования в области авиации откроют вам доступ к множеству новых механик. Вы сможете строить [Concept('concept_curtiss_airport', 'аэропорты')], которые производят новый товар «#b Авиаперелёты#!», а также #b услуги#!. #b Аэропорт#! позволит развиваться [Concept('concept_curtiss_airline', 'авиакомпании')], что даст вам возможность использовать дипломатическое действие «[concept_curtiss_airspace_convention]». #b Конвенция о воздушном пространстве#! предоставит вам доступ к областям и [Concept('concept_lepsius_excavation_site', 'местам раскопок')], а также к Северному полюсу. Если ваша #b авиакомпания#! достаточно вырастет, вы сможете построить либо гигантский дирижабль, либо самый большой в мире самолёт.\nСамая захватывающая особенность появляется в начале XX века: вы сможете соревноваться за [Concept('concept_curtiss_schneider_trophy', 'Кубок Шнейдера')]. #b Кубок Шнейдера#! — это гонка гидросамолётов, в которой соревнуются разные страны. Если вы победите, вы получите престиж и проведёте следующее соревнование. А если вам удастся выиграть гонку 3 раза, вы навсегда оставите #b Кубок Шнейдера#! у себя."
 concept_curtiss_balloonist_role: "Роль аэронавта"
 concept_curtiss_balloonist_role_only_balloonist: "Аэронавт"
 concept_curtiss_balloonists_role: "Аэронавты"
 concept_curtiss_balloonist_role_desc: "#b Аэронавт#! — это особый персонаж, которого может спонсировать держава. Обычно развитые или западные страны спонсируют #b аэронавтов#! и соревнуются за рекорды и новые открытия. #b Аэронавты#! случайным образом совершают полёты и устанавливают рекорды либо на самую большую дальность, либо на самое долгое время полёта, либо на самую большую высоту. За каждый полёт на воздушном шаре #b аэронавт#! получает опыт и повышает свой ранг, что увеличивает шансы на новые рекорды. Но будьте осторожны: воздухоплавание — опасное дело, и многие аэронавты погибают рано, особенно если они больны, страдают алкоголизмом или наркоманией."
 concept_curtiss_arctic_expedition: "Арктическая экспедиция"
 concept_curtiss_arctic_expeditions: "Арктические экспедиции"
 concept_curtiss_arctic_expedition_desc: "Если вы исследовали технологию «#b Цеппелин#!», имеете [Concept('concept_verrier_observatory', 'обсерваторию')] с #b метеостанцией#!, [Concept('concept_curtiss_pilot', 'пилота')] и доступ к области вблизи Северного полюса, вы можете провести #b арктическую экспедицию#!. Такими областями являются #b Гренландия#!, #b Северная Норвегия#!, #b Аляска#!, #b Нунавут#! и #b Ненеция#!. Вы можете получить доступ, либо владея областью самостоятельно, либо заключив [Concept('concept_curtiss_airspace_convention', 'конвенцию о воздушном пространстве')] с её владельцем.\nВо время #b арктической экспедиции#! вы можете предпринимать исследовательские походы, строить полярные станции, получать новые знания о географии, метеорологии и биологии Арктики и стать первыми, кто пересёк полюс на дирижабле!"
 concept_curtiss_pilot: "Пилот"
 concept_curtiss_pilots: "Пилоты"
 concept_curtiss_pilot_desc: "#b Пилот#! — это персонаж с чертой «#b Пилот#!». #b Пилоты#! имеют низкий шанс появления после открытия #b ранней авиации#!. Кроме того, в битвах на фронте с использованием воздушной разведки в качестве метода производства есть шанс, что из битвы через событие появится #b пилот#!. Более совершенные технологии, такие как самолёты и современная авиация, а также создание лётной школы через решения, повышают шансы на то, что у персонажа появится черта «#b Пилот#!».\n#b Пилоты#! помогают вам по-разному. #b Авиакомпании#! могут быть заинтересованы в #b пилотах#! для повышения своего имиджа; в борьбе за [Concept('concept_curtiss_schneider_trophy', 'Кубок Шнейдера')] опытные #b пилоты#! имеют больше шансов; и #b пилот#! необходим для проведения [Concept('concept_curtiss_arctic_expedition', 'арктической экспедиции')]. #b Пилоты#! также могут быть повышены до асов через событие, если они развёрнуты на фронте."
 concept_curtiss_airport: "Аэропорт"
 concept_curtiss_airports: "Аэропорты"
 concept_curtiss_airport_desc: "#b Аэропорт#! — это сооружение, которое открывается технологией «#b Авиалинии#!». Это гражданское сооружение, которое производит #tooltippable_name #tooltip:[GetGoods('air_travel').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [GetGoods('air_travel').GetTextIcon][GetGoods('air_travel').GetCustom('RU_GL_VP')]#!#! и #b услуги#!, но потребляет различные товары, начиная с [GetGoods('tools').GetCustom('RU_GL_RP')], [GetGoods('paper').GetCustom('RU_GL_RP')], [GetGoods('aeroplanes').GetCustom('RU_GL_RP')] и [GetGoods('oil').GetCustom('RU_GL_RP')]. Позже ему также потребуются [GetGoods('electricity').GetTextIcon][GetGoods('electricity').GetName], [GetGoods('telephones').GetTextIcon][GetGoods('telephones').GetName] и [GetGoods('radios').GetTextIcon][GetGoods('radios').GetName].\nЕсли у вас будет достаточно #b аэропортов#!, будет основана [concept_curtiss_airline], и по мере роста ваших #b аэропортов#! будет расти и #b авиакомпания#!, предлагая больше бонусов."
 concept_curtiss_airline: "Авиакомпания"
 concept_curtiss_airlines: "Авиакомпании"
 concept_curtiss_airline_desc: "#b Авиакомпания#! — это компания или государственное учреждение, которое предлагает #tooltippable_name #tooltip:[GetGoods('air_travel').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [GetGoods('air_travel').GetTextIcon][GetGoods('air_travel').GetCustom('RU_GL_VP')]#!#! от местного уровня до международных рейсов в конце игры. #b Авиакомпании#! также предоставляют различные другие бонусы. #b Авиакомпаниям#! нужны [Concept('concept_curtiss_airport', 'аэропорты')] для выполнения этих рейсов. Если вы будете развивать свои #b аэропорты#!, то и #b авиакомпании#! будут расти.\nЕсли ваша #b авиакомпания#! управляется государством, у вас появится возможность построить огромный дирижабль и отправлять его в полёты на большие расстояния. Если ваша #b авиакомпания#! является публичной или частной, вы можете вместо этого получить шанс построить самый большой самолёт из когда-либо созданных."
 concept_curtiss_airspace_convention: "Конвенция о воздушном пространстве"
 concept_curtiss_airspace_conventions: "Конвенции о воздушном пространстве"
 concept_curtiss_airspace_convention_desc: "#b Конвенция о воздушном пространстве#! — это важный [concept_diplomatic_pact|l], который позволяет вам взаимодействовать с регионами, находящимися далеко от вашей сферы влияния. Если у вас есть #b конвенция о воздушном пространстве#! с другой державой, у которой есть [concept_lepsius_excavation_site], вы сможете провести [Concept('concept_lepsius_expedition', 'археологическую экспедицию')] без наличия [Concept('concept_active_interest', 'активного интереса')] в регионе.\n#b Конвенция о воздушном пространстве#! позволит вам отправить [Concept('concept_curtiss_arctic_expedition', 'арктическую экспедицию')], если вы не владеете ни одной из необходимых для этого областей."
 concept_curtiss_schneider_trophy: "Кубок Шнейдера"
 concept_curtiss_schneider_trophy_desc: "Борьба за этот престижный трофей, который учредил француз Жак Шнейдер незадолго до Первой мировой войны, была в первую очередь призвана стимулировать развитие гидросамолётов. Со временем гонка за этот трофей превратилась в соревнование наций, в котором Великобритания, США и Италия оказывали своим командам огромную поддержку, чтобы завоевать заветный трофей. Технологическое развитие действительно выиграло от #b Кубка Шнейдера#!, поскольку использовались всё более быстрые и совершенные гидросамолёты.\n#b Кубок Шнейдера#! может быть учреждён, если есть 5 держав, которые изобрели технологию «#b Гидросамолёты#!», и если у вас есть порт и городской центр 10-го уровня в одной из ваших областей.\nПобедитель Кубка выбирается через запись в дневнике и зависит от многих факторов. Например, преимущество будет у державы с лётной школой и большой [Concept('concept_curtiss_airline', 'авиакомпанией')]. Великий [concept_curtiss_pilot] и солидные финансовые вложения также помогут выиграть трофей.\nПобедитель последнего Кубка сможет провести следующий, если у него есть порт, или если это Швейцария с её многочисленными озёрами. Выиграть Кубок 3 раза подряд ещё лучше, так как держава навсегда оставит трофей у себя и получит за это бонус к престижу."
 concept_curtiss_balloonist: "Аэронавт"
 concept_curtiss_balloonist_desc: "Этот персонаж — аэронавт, который часто отправляется в рискованные полёты на воздушном шаре."
 concept_curtiss_experienced_balloonist: "Опытный аэронавт"
 concept_curtiss_experienced_balloonist_desc: "Этот персонаж — опытный аэронавт, который часто отправляется в рискованные полёты на воздушном шаре. Персонажи с этой чертой имеют более высокий шанс установить лучшие рекорды."
 concept_curtiss_famous_balloonist: "Знаменитый аэронавт"
 concept_curtiss_famous_balloonist_desc: "Этот персонаж — знаменитый аэронавт, который часто отправляется в рискованные полёты на воздушном шаре. Персонажи с этой чертой имеют более высокий шанс установить лучшие рекорды."
 concept_dubois_natural_history: "Естествознание"
 concept_dubois_natural_history_desc: "#b Естествознание#! — одна из главных особенностей мода [concept_morgenroete]. В XIX веке было сделано множество великих естественно-научных открытий: множество великих экспедиций, таких как экспедиция «Бигля», создание теории эволюции, открытие сотен тысяч новых видов и, конечно же, открытие динозавров.\n\nВеликие и мировые державы с флотом и адмиралом могут отправить корабль в [Concept('concept_dubois_pacific_expedition', 'тихоокеанскую экспедицию')]. Во время #b тихоокеанской экспедиции#! вы можете находить редкие растения, животных и окаменелости, проводить океанографические исследования или наблюдать астрономические явления, такие как солнечные затмения.\n\nКрупных животных, которых вы можете найти, [Concept('concept_dubois_zoo_animal', 'экзотических животных')], можно использовать для строительства [Concept('concept_dubois_zoo', 'зоопарка')] и их демонстрации. Чем больше животных, тем больший эффект даёт #b зоопарк#!. Вы можете находить этих #b животных#! в экспедициях, собирать их на своей территории или просить другие страны продать их вам.\n\nБолее мелкие животные, растения и другие организмы называются [Concept('concept_dubois_specimen', 'образцами')]. #b Натуралист#! может собирать такие #b образцы#!. #GREEN #b Натуралиста#!#! можно отправлять в [Concept('concept_dubois_botanical_expedition', 'ботанические экспедиции')] в области с модификатором тропического леса. Если у вас нет такой области, вы можете приобрести [Concept('concept_dubois_botanical_licence', 'ботаническую лицензию')] у другой страны. #GREEN #b Натуралист#!#! будет получать [concept_academics_experience|l], когда находит редкие образцы.\n\n[Concept('concept_dubois_fossil', 'Окаменелости')] — это сфера деятельности [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолога#!#!')], будь то окаменелости растений, насекомых или других мелких животных. #b Окаменелости#! можно найти в #b экспедициях#! или в областях с [Concept('concept_dubois_formation', 'формациями')]. Если у вас есть #b великая формация#!, вы даже можете найти [Concept('concept_dubois_dinosaur_bone', 'кости динозавров')]. В противном случае вы можете получить к ней доступ, купив [Concept('concept_dubois_paleontological_licence', 'палеонтологическую лицензию')].\n\nЕсли у вашей страны есть доступ к горному хребту, генерал может принять участие в [Concept('concept_douglas_mountaineering', 'альпинизме')] и получить лучшие черты и бонус к престижу."
 concept_dubois_naturalist: "#b #GREEN Натуралист#!#!"
 concept_dubois_naturalists: "#b #GREEN Натуралисты#!#!"
 concept_dubois_naturalist_desc: "#b #GREEN Натуралисты#!#! — это учёные, которые могут собирать [Concept('concept_dubois_zoo_animal', 'экзотических животных')] и [Concept('concept_dubois_specimen', 'образцы')]. Их можно отправлять в [Concept('concept_dubois_pacific_expedition', 'тихоокеанские экспедиции')] или [Concept('concept_dubois_botanical_expedition', 'ботанические экспедиции')], где они могут находить редкие растения и животных, которые дают вам небольшой бонус. #b #GREEN Натуралисты#!#! получают [concept_academics_experience|l], когда находят новые редкие образцы."
 concept_dubois_paleontologist: "#b #GREEN Палеонтолог#!#!"
 concept_dubois_paleontologists: "#b #GREEN Палеонтологи#!#!"
 concept_dubois_paleontologist_desc: "#b #GREEN Палеонтологи#!#! — это учёные, которые будут вести раскопки в поисках [Concept('concept_dubois_dinosaur_bone', 'костей динозавров')] и [Concept('concept_dubois_fossil', 'окаменелостей')]. Чтобы собирать их, вам нужен доступ к [Concept('concept_dubois_formation', 'формации')]. Если у вас есть доступ к #b формации#!, либо владея ею самостоятельно, либо с помощью [Concept('concept_dubois_paleontological_licence', 'палеонтологической лицензии')], вы можете отправить своего #b палеонтолога#! в [Concept('concept_dubois_paleontological_expedition', 'палеонтологическую экспедицию')].\nСобрав или реконструировав 5 #b костей динозавров#!, ваш #b палеонтолог#! сможет собрать [concept_dubois_dinosaur_skeleton]. По мере того как #b #GREEN палеонтологи#!#! будут получать [concept_academics_experience|l], они будут лучше справляться с реконструкцией #b скелетов динозавров#!, и сами #b скелеты#! станут лучше. Чем лучше #b скелеты динозавров#!, тем больше престижа будет приносить ваша [concept_dubois_paleontological_collection]."
 concept_dubois_pacific_expedition: "Тихоокеанская экспедиция"
 concept_dubois_pacific_expeditions: "Тихоокеанские экспедиции"
 concept_dubois_pacific_expedition_desc: "Будучи великой или мировой державой, вы можете отправить экспедицию в Тихий океан. Вам необходимо исследовать технологии «#b Эмпиризм#!», «#b Винтовой фрегат#!» и «#b Диалектика#!», иметь порт и университет, а также флот не менее 15 кораблей и адмирала.\nВо время #b тихоокеанской экспедиции#! вы можете находить редкие растения, [Concept('concept_dubois_zoo_animal', 'экзотических животных')] и [Concept('concept_dubois_fossil', 'окаменелости')], проводить океанографические исследования или наблюдать астрономические явления, такие как солнечные затмения. В начале #b экспедиции#! вы также можете выбрать #b учёного#! для своей экспедиции: #b топографа#!, [concept_dubois_naturalist|l], [concept_dubois_paleontologist|l] или [concept_verrier_astronomer|l]. Каждый из них поможет получить лучшие результаты в конкретных событиях, связанных с их областью знаний.\nВаша экспедиция может выбрать направление исследований. Она может быть полностью посвящена тайнам моря и улучшению ваших океанографических и астрономических знаний; в этом случае будут происходить только океанографические события. Если вы исследуете чудеса природы, вы столкнётесь с ботаническими, зоологическими и палеонтологическими событиями. Великие державы также получат возможность предпринять престижную миссию, в ходе которой вы будете находить артефакты, основывать торговые посты или миссии — особенно полезно, если у вас нет дипломатических интересов в Океании, но вы хотите попытаться приобрести хотя бы небольшую колонию через миссионеров.\nВам также придётся выбрать, куда именно отправится ваша миссия: в Океанию, Австралию или Индонезию. Каждое из этих мест предлагает разные события и награды."
 concept_dubois_habitat: "Ареал"
 concept_dubois_habitats: "Ареалы"
 concept_dubois_animal_habitat: "Ареал животного"
 concept_dubois_habitat_desc: "#b Ареал#! — это регион в области, где обитает определённое [Concept('concept_dubois_zoo_animal', 'экзотическое животное')]. В моде #r Morgenröte#! #b ареалы#! для различных животных существуют в разных регионах. Если вы владеете #b ареалом#!, вы можете перевозить #b животных#! в [Concept('concept_dubois_zoo', 'зоопарк')] или даже продавать их другим странам.\n\nЕсли [concept_urbanization|l] вашей области достигнет 2000 или выше, или если в ней не останется [Concept('concept_arable_land', 'пахотной земли')], #b экзотические животные#! #n вымрут через 10 лет#!.\n\nЧтобы спасти #b животных#! от вымирания, вы можете построить [Concept('concept_dubois_nature_reserve', 'заповедник')] в области с #b ареалом#!."
 concept_dubois_nature_reserve: "Заповедник"
 concept_dubois_nature_reserves: "Заповедники"
 concept_dubois_royal_hunting_reserve: "Королевский охотничий заказник"
 concept_dubois_nature_reserve_desc: "#b Заповедник#! — это охраняемая территория, где вы можете защищать или создавать [Concept('concept_dubois_habitat', 'ареалы')].\n\nЕсли у вас уже есть #b ареал#!, вы можете защитить его от разрушения под влиянием человека, построив #b заповедник#! в области с #b ареалом#!. Чтобы построить #b заповедник#!, вам необходимо разблокировать технологию «#b Генетика#!» и иметь национальную область с #b ареалом#!, которая является родиной одной из ваших основных культур.\n\nЕсли у вас нет #b ареала#!, вы можете построить #b заповедник#!, обследовав свою страну в поисках подходящего места, если вы разблокировали технологию «#b Генетика#!» и в вашем [Concept('concept_dubois_zoo', 'зоопарке')] есть хотя бы одно [Concept('concept_dubois_zoo_animal', 'экзотическое животное')] с вашего континента.\n\n#b Заповедник#! не только защищает #b ареалы#! ваших животных, но и позволяет вам расселять в них #b экзотических животных#! с вашего континента. Таким образом, вы можете защитить всех #b экзотических животных#! вашего континента в одной-единственной области."
 concept_dubois_zoo_animal: "Животное для зоопарка"
 concept_dubois_zoo_animals: "Животные для зоопарка"
 concept_dubois_exotic_animal: "Экзотическое животное"
 concept_dubois_exotic_animals: "Экзотические животные"
 concept_dubois_zoo_animal_desc: "В мире много животных, которых может поймать ваш [concept_dubois_naturalist]. Чтобы поймать #b экзотическое животное#!, вам нужна область с [Concept('concept_dubois_habitat', 'ареалом')]. В качестве альтернативы вы можете купить #b экзотическое животное#! у страны, у которой есть #b ареал#!.\nПосле поимки #b животные для зоопарка#! могут быть отправлены в ваш [Concept('concept_dubois_zoo', 'зоопарк')], что позволит вам расширить #b зоопарк#!."
 concept_dubois_zoo: "Зоопарк"
 concept_dubois_zoos: "Зоопарки"
 concept_dubois_zoo_desc: "#b Зоопарк#! — это особое сооружение, которое вы можете построить, собрав 5 [Concept('concept_dubois_zoo_animal', 'экзотических животных')]. В #b зоопарке#! размещаются ваши #b животные#!, ваша коллекция [Concept('concept_dubois_specimen', 'образцов')] и ваша палеонтологическая коллекция."
 concept_dubois_specimen: "Образец"
 concept_dubois_specimens: "Образцы"
 concept_dubois_specimen_desc: "Различные насекомые, растения и мелкие животные, которых может собрать [concept_dubois_naturalist], называются #b образцами#!. Вы можете использовать #b образцы#! для строительства ботанического сада или коллекции образцов в вашем [Concept('concept_dubois_zoo', 'зоопарке')]."
 concept_dubois_botanical_expedition: "Ботаническая экспедиция"
 concept_dubois_botanical_expeditions: "Ботанические экспедиции"
 concept_dubois_botanical_expedition_desc: "Вы можете отправить [Concept('concept_dubois_naturalist', '#b #GREEN натуралиста#!#!')] в #b ботаническую экспедицию#!, если у вас есть доступ к [Concept('concept_state', 'области')], где растут [Concept('concept_ito_medicinal_plants', 'лекарственные растения')]. Для этого нужно владеть такой областью или приобрести [Concept('concept_dubois_botanical_licence', 'ботаническую лицензию')].\nВ течение годичного путешествия ваш #b натуралист#! будет собирать [Concept('concept_ito_medicinal_plants', 'лекарственные растения')] и [Concept('concept_dubois_specimen', 'образцы')]. Иногда им удается найти редкое растение, которое станет отличным пополнением ботанической коллекции в [Concept('concept_dubois_zoo', 'зоопарке')]."
 concept_dubois_botanical_licence: "Ботаническая лицензия"
 concept_dubois_botanical_licences: "Ботанические лицензии"
 concept_dubois_botanical_licence_desc: "Если у вас нет доступа к области с модификатором тропического леса, вы всё равно можете отправить [Concept('concept_dubois_botanical_expedition', 'ботаническую экспедицию')], приобретя #b ботаническую лицензию#! у страны, у которой он есть. Вам придётся заплатить небольшую сумму денег, но это позволит вам собирать [Concept('concept_dubois_specimen', 'образцы')] и находить редкие растения."
 concept_dubois_fossil: "Окаменелость"
 concept_dubois_fossils: "Окаменелости"
 concept_dubois_fossil_desc: "[concept_dubois_paleontologist] может обнаруживать #b окаменелости#! давно вымерших растений и животных, если вы открыли [Concept('concept_dubois_formation', 'формацию')]."
 concept_dubois_dinosaur_bone: "Кости динозавров"
 concept_dubois_dinosaur_bones: "Кости динозавров"
 concept_dubois_dinosaur_bone_desc: "[concept_dubois_paleontologist] может находить кости динозавров в великих [Concept('concept_dubois_formation', 'формациях')].\n#b Опытный палеонтолог#! также может попытаться реконструировать #b кость динозавра#! из 20 фрагментов [Concept('concept_dubois_fossil', 'окаменелостей')]. #b Кость динозавра#! может быть реконструирована только в том случае, если для ориентира доступна хотя бы одна кость динозавра.\nДля выполнения любого из этих действий палеонтолог не должен быть истощён или занят. Успех во многом зависит от его палеонтологического [Concept('concept_academics_experience', 'опыта')].\n#b Кости динозавров#! используются для реконструкции [Concept('concept_dubois_dinosaur_skeleton', 'скелетов динозавров')]."
 concept_dubois_dinosaur_skeleton: "Скелет динозавра"
 concept_dubois_dinosaur_skeletons: "Скелеты динозавров"
 concept_dubois_dinosaur_skeleton_desc: "Из пяти [Concept('concept_dubois_dinosaur_bone', 'костей динозавров')] из одного континентального региона [concept_dubois_paleontologist] может реконструировать целого динозавра. Чтобы реконструировать #b скелет динозавра#!, вам нужно 5 #b костей динозавров#! из одного и того же региона.\nНадеемся, ваш #b палеонтолог#! достаточно опытен, чтобы правильно реконструировать #b скелет динозавра#!. В противном случае вы рискуете потерять престиж вашей [Concept('concept_dubois_paleontological_collection', 'палеонтологической коллекции')]. Однако, если #b скелет динозавра#! был реконструирован неправильно, вы можете попытаться его исправить, что приведёт к немного лучшей реконструкции."
 concept_dubois_paleontological_collection: "Палеонтологическая коллекция"
 concept_dubois_paleontological_collections: "Палеонтологические коллекции"
 concept_dubois_paleontological_collection_desc: "#b Палеонтологическая коллекция#! — это владения вашего [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолога#!#!')]. Там вы найдёте все [Concept('concept_dubois_fossil', 'окаменелости')], [Concept('concept_dubois_dinosaur_bone', 'кости динозавров')] и [Concept('concept_dubois_dinosaur_skeleton', 'скелеты динозавров')] вашей державы.\nЧем лучше ваш #b палеонтолог#! смонтировал эти #b скелеты динозавров#!, тем больше престижа будет приносить ваша #b коллекция#!. Если ваш #b палеонтолог#! смонтировал #b скелеты#! ужасно неправильно, это может даже привести к потере престижа. Но, возможно, тот же или другой #b палеонтолог#! сможет перемонтировать их лучше!"
 concept_dubois_formation: "Формация"
 concept_dubois_formations: "Формации"
 concept_dubois_geological_formation: "Геологическая формация"
 concept_dubois_formation_desc: "Существует два вида #b формаций#!: обычные формации позволяют вашему [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтологу#!#!')] собирать [Concept('concept_dubois_fossil', 'окаменелости')], в то время как великие формации позволяют обнаруживать [Concept('concept_dubois_dinosaur_bone', 'кости динозавров')].\n#b Формации#! могут быть обнаружены вашим палеонтологом или когда вы исследуете технологию палеонтологии.\nЕсли у вас нет #b великой формации#!, вы можете купить [Concept('concept_dubois_paleontological_licence', 'палеонтологическую лицензию')] у державы, у которой она есть, и получить к ней доступ."
 concept_dubois_paleontological_expedition: "Палеонтологическая экспедиция"
 concept_dubois_paleontological_expeditions: "Палеонтологические экспедиции"
 concept_dubois_paleontological_licence: "Палеонтологическая лицензия"
 concept_dubois_paleontological_licences: "Палеонтологические лицензии"
 concept_dubois_paleontological_licence_desc: "Если у вас нет доступа к [Concept('concept_dubois_formation', 'формации')], вы можете попытаться получить к ней доступ с помощью #b палеонтологической лицензии#!. Это дипломатическое действие позволяет вам получить доступ к #b великой формации#!. Чтобы иметь возможность использовать его, вы должны быть великой или мировой державой, а у другой державы должна быть #b великая формация#!. Вам придётся платить другой державе небольшую часть своего дохода, но, надеюсь, это того стоит."
 concept_dubois_mountain: "Гора"
 concept_dubois_mountains: "Горы"
 concept_dubois_mountain_desc: "There are many #b Mountains#! that can be climbed.\n\n#V North America:#!\n#b Mount McKinley#! (Alaska), 6190 meters\n#b Mount Logan#! (Yukon Territory), 5959 meters\n#b Citlaltépetl#! (México), 5636 meters\n#b Mount Whitney#! (California), 4421 meters\n\n#V South America:#!\n#b Aconcagua#! (Mendoza), 6267 meters\n#b Huascarán#! (Lima Territory), 6768 meters\n#b Illimani#! (La Paz), 6438 meters\n#b Chimborazo#! (Ecuador), 6267 meters\n\n#V Europe:#!\n#b Shkara#! (Greater Caucasus), 5642 meters\n#b Dufourspitze#! (West Switzerland), 4634 meters\n#b Matterhorn#! (West Switzerland), 4478 meters\n#b Aiguille Verte#! (Savoy), 4122 meters\n#b Pico de Aneto#! (Aragon), 3404 meters\n\n#V Africa:#!\n#b Kibo#! (Tanganyika), 5895 meters\n#b Mount Kenya#! (Kenya), 5199 meters\n#b Mount Stanley#! (Uganda), 5109 meters\n#b Kamerunberg#! (South Cameroon), 4095 meters\n\n#V Asia:#!\n#b Kamet#! (Delhi), 7756 meters\n#b Chogolisa#! (Kashmir), 7665 meters\n#b Kabru#! (Himalayas), 7412 meters\n#b Kaufmann Peak#! (Tajikistan), 7134 meters\n\n#V Australia & Oceania:#!\n#b Mount Wilhelm#! (Eastern New Guinea), 4121 meters\n#b Mount Cook#! (South Island), 3724 meters"
 concept_elgar_music: "Музыкальная культура"
 concept_elgar_opera: "Опера"
 concept_elgar_operas: "Оперы"
 concept_elgar_opera_house: "Оперный театр"
 concept_elgar_opera_houses: "Оперные театры"
 concept_elgar_musical_tradition: "Музыкальная традиция"
 concept_elgar_impressionism: "Импрессионизм"
 concept_elgar_expressionism: "Экспрессионизм"
 concept_elgar_art_nouveau: "Ар-нуво"
 concept_elgar_architecture: "Архитектура"
 concept_elgar_architectural_project: "Архитектурный проект"
 concept_elgar_architectural_projects: "Архитектурные проекты"
 concept_lepsius_archaeology: "Археология"
 concept_lepsius_archaeology_desc: "#b Archaeology#! is one of the main features of [concept_morgenroete].\n\nThere are 8 [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')] on the map.\n\n To be able to send an [concept_lepsius_expedition], you need to research the Antiquarianism Technology, have an [concept_lepsius_archaeological_team] and have acces to one of the Excavation Sites. You can either get access by owning the Site yourself or by asking a country with a Site for a [concept_lepsius_excavation_licence].\n\nYou can now send an Archaeological expedition to one of the Excavation Sites. Your Team will discover [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] and in very rare cases and the help of a good [concept_lepsius_archaeologist], you might even find a [concept_lepsius_major_artifact].\n\nOnce your Team returns with the Artifacts, you might be able to build a [concept_lepsius_museum]. In a Archaeological Museum you will be able to see your Artifacts, create [concept_lepsius_exhibition] and visit your #b #BLUE Archaeologist#!#!.\n\nThe more Artifacts and Exhibitions you have, the more Prestige you will get.\n\n#b Anthropology#! is another part of Archaeology. If you have an [concept_andersson_anthropologist] and a [concept_andersson_cave], you can find [Concept('concept_andersson_human_fossil','$concept_andersson_human_fossils$')] and reconstruct prehistoric human species. Each skeleton will give you more anthropological prestige. With enough anthropological prestige, you will get a prestige modifier for your country."
 concept_lepsius_archaeologist: "#b #BLUE Археолог#!#!"
 concept_lepsius_archaeologists: "#b #BLUE Археологи#!#!"
 concept_lepsius_archaeologist_desc: "#b #BLUE Археологи#!#! — это учёные, которых вы можете отправлять в [Concept('concept_lepsius_expedition', 'экспедиции')]. Там они будут собирать [Concept('concept_lepsius_artifact', 'малые артефакты')]. Иногда они могут даже найти [concept_lepsius_major_artifact].\nАрхеологи получают [Concept('concept_academics_experience', 'опыт')] во время своей работы и пассивно каждый год. Они могут получать лучшие уровни черты археолога, зарабатывая достаточно #b опыта#!."
 concept_lepsius_museum: "Археологический музей"
 concept_lepsius_museum_desc: "#b Археологический музей#! — это сооружение, которое вы можете построить, где выставляются все [Concept('concept_lepsius_artifact', 'артефакты')], найденные вашей державой."
 concept_lepsius_excavation_site: "Место исторических раскопок"
 concept_lepsius_excavation_sites: "Места исторических раскопок"
 concept_lepsius_excavation_site_desc: "There are multiple #b Historical Excavation Sites#! in different countries including: Upper and Lower Egypt, Babylonia, Assyria, Crete, Argolis, Yucatán and Peru. Each #b Historical Site#! offers different [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] and Events. Besides these large, historically significant excavation sites, there are also [Concept('concept_lepsius_minor_excavation_site', '$concept_lepsius_minor_excavation_sites$')]."
 concept_lepsius_expedition: "Археологическая экспедиция"
 concept_lepsius_expeditions: "Археологические экспедиции"
 concept_lepsius_expedition_desc: "#b Археологическая экспедиция#! — это экспедиция [Concept('concept_lepsius_archaeologist', '#b #BLUE археолога#!#!')] и его [Concept('concept_lepsius_archaeological_team', 'археологической группы')]. Она займёт несколько месяцев, в течение которых они будут пытаться собрать как можно больше [Concept('concept_lepsius_artifact', 'малых артефактов')]. #b Экспедиции#! — единственный способ завладеть [Concept('concept_lepsius_major_artifact', 'крупными артефактами')].\nЕсли вы исследовали раннюю археологию, вы можете оставить свою команду на месте для создания [Concept('concept_lepsius_excavation', 'раскопок')] после успешной #b экспедиции#!."
 concept_lepsius_archaeological_team: "Археологическая группа"
 concept_lepsius_archaeological_teams: "Археологические группы"
 concept_lepsius_excavation_team: "Раскопочная группа"
 concept_lepsius_archaeological_team_desc: "Вам нужна одна или несколько #b археологических групп#!, чтобы иметь возможность проводить [Concept('concept_lepsius_expedition', 'экспедиции')]. Вы можете получить до 3 #b археологических групп#!, но каждая из них требует выполнения более высоких требований.\n\nВы можете получить свою первую #b группу#!, исследовав технологию «Антикварианизм», имея университет не ниже 3-го уровня и грамотность 33%.\n\nВы можете получить ещё одну группу, если вы исследовали технологию «Современная археология», имеете университет не ниже 15-го уровня и грамотность 66%.\n\nВы можете получить ещё одну #b группу#!, исследовав технологию «Антикварианизм» и имея опытного [Concept('concept_lepsius_archaeologist', '#b #BLUE археолога#!#!')].\n\nВам нужны #b группы#! для [Concept('concept_lepsius_expedition', 'экспедиций')] и [Concept('concept_lepsius_excavation', 'раскопок')]."
 concept_lepsius_excavation_licence: "Лицензия на раскопки"
 concept_lepsius_excavation_licences: "Лицензии на раскопки"
 concept_lepsius_excavation_licence_desc: "Если вы не владеете некоторыми из [Concept('concept_lepsius_excavation_site', 'мест раскопок')], вы всё равно можете получить к ним доступ, используя дипломатическое действие «#b Лицензия на раскопки#!».\nЧтобы получить #b лицензию на раскопки#!, вы должны быть как минимум великой державой и иметь [Concept('concept_active_interest', 'активный интерес')] в регионе.\nВам придётся платить другой стране небольшую сумму денег, чтобы сохранить #b лицензию на раскопки#!."
 concept_lepsius_artifact: "Артефакт"
 concept_lepsius_artifacts: "Артефакты"
 concept_lepsius_minor_artifact: "Малый артефакт"
 concept_lepsius_minor_artifacts: "Малые артефакты"
 concept_lepsius_oceanic_artifact: "Океанийский артефакт"
 concept_lepsius_oceanic_artifacts: "Океанийские артефакты"
 concept_lepsius_artifact_desc: "Вы можете получать артефакты, отправляя [Concept('concept_lepsius_archaeological_team', 'археологические группы')] в [Concept('concept_lepsius_expedition', 'экспедиции')], на [Concept('concept_lepsius_excavation', 'раскопки')], в [Concept('concept_dubois_pacific_expedition', 'тихоокеанские экспедиции')] или в событиях.\n\nОбычно вы будете получать малые #b артефакты#!. Вы можете использовать эти малые #b артефакты#! для [Concept('concept_lepsius_exhibition', 'выставок')] в вашем [Concept('concept_lepsius_museum', 'археологическом музее')].\n\n[Concept('concept_lepsius_major_artifact', 'Крупные артефакты')], с другой стороны, являются уникальными #b артефактами#!, которые можно найти только один раз и которые имеют уникальное название. Обычно их можно найти в экспедициях, на раскопках и в качестве археологических открытий."
 concept_lepsius_major_artifact: "Крупный артефакт"
 concept_lepsius_major_artifacts: "Крупные артефакты"
 concept_lepsius_major_artifact_desc: "#b Крупные артефакты#! — это особые [Concept('concept_lepsius_artifact', 'артефакты')], у которых есть название и уникальность.\nВы можете находить #b крупные артефакты#! разными способами. Некоторые из них вы найдёте во время [Concept('concept_lepsius_expedition', 'экспедиций')]. Для других вам нужно поддерживать непрерывные [Concept('concept_lepsius_excavation', 'раскопки')] до тех пор, пока вы их не найдёте. А некоторые будут обнаружены в результате крупного открытия.\nНезаконный вывоз #b крупного артефакта#! из страны может вызвать дипломатический инцидент, который может навредить вам больше, чем владение #b крупным артефактом#!. С другой стороны, #b крупные артефакты#! позволяют вам создать [Concept('concept_lepsius_exhibition', 'превосходную выставку')], которая даст вам огромный бонус к престижу и необходима для некоторых [Concept('concept_academics_academic_mission', 'научных заданий')]."
 concept_lepsius_exhibition: "Выставка"
 concept_lepsius_exhibitions: "Выставки"
 concept_lepsius_excellent_exhibition: "Превосходная выставка"
 concept_lepsius_excavation: "Раскопки"
 concept_lepsius_excavations: "Раскопки"
 concept_lepsius_excavation_desc: "Если вы исследовали раннюю археологию и завершили [Concept('concept_lepsius_expedition', 'археологическую экспедицию')], вы можете решить оставить свою [Concept('concept_lepsius_archaeological_team', 'археологическую группу')] на месте, чтобы пассивно добывать [Concept('concept_lepsius_artifact', 'малые артефакты')]. Вы всегда можете отозвать свою команду с #b раскопок#!."
