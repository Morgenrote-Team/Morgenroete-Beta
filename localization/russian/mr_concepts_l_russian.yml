 concept_verrier_astronomical_objects: "Астрономические объекты"
 concept_verrier_astronomical_object_icon: "@verrier_astronomicalobject!"
 concept_verrier_celestial_body: "Небесное тело"
 concept_verrier_celestial_bodies: "Небесные тела"
 concept_verrier_comet: "Большая комета"
 concept_verrier_comets: "Большие кометы"
 concept_verrier_comet_desc: "В викторианскую эпоху было несколько #b больших комет#!, которые привлекли широкое общественное внимание. Если у вас есть [concept_verrier_astronomer], есть шанс, что вы первым обнаружите одну из этих #b больших комет#!, что приведёт к бонусу к престижу и исследованиям."
 concept_verrier_moon_photo: "Фотография Луны"
 concept_verrier_moon_photos: "Фотографии Луны"
 concept_rapanui_christian_mission: "Христианская миссия"
 concept_rapanui_christian_missions: "Христианские миссии"
 concept_rapanui_christian_mission_desc: "[Concept('concept_major_power', 'Крупные')] или [Concept('concept_great_power', 'великие')] державы с [Concept('concept_interest', 'интересами')] в Океании могут попытаться обратить в свою веру децентрализованную островную нацию в регионе, но это возможно только в том случае, если ваша страна не слишком светская, а заинтересованная группа «верующие» не слишком слаба.\n\nОбращение в веру происходит в три этапа. Если вы отправите миссионера, его либо примут радушно, либо проигнорируют, либо немедленно убьют. Если ваша миссия пойдёт наперекосяк, вам придётся подождать несколько лет, чтобы найти нового миссионера для распространения слова Божьего. После этого ваш миссионер будет обращать 1% населения в год. Могут быть события, которые помогают или мешают обращению.\n\nВторой этап начинается, когда вы достигнете 30% обращённых туземцев. Теперь ваша миссионерская станция станет постоянной. Если 51% туземцев примет христианство, то вождь примет вашу религию и окажется под вашей защитой в качестве [Concept('concept_protectorate', 'протектората')]. Спустя годы эти территории можно будет даже аннексировать, если у вас есть технология для предотвращения малярии.\n\nНа третьем этапе вы можете активно принимать решения через запись в дневнике. Либо вы напрямую укрепляете миссию, отправляя дополнительных миссионеров, либо пытаетесь торговать. Вы можете приобретать редкие [Concept('concept_lepsius_artifact', 'океанийские артефакты')], [Concept('concept_dubois_zoo_animal', 'экзотических животных')] или жемчуг, который повышает уровень жизни богатых."
 concept_manzoni_literary_tradition: "Литературная традиция"
 concept_klimt_painters: "#PURPLE #b Художники#!#!"
 concept_klimt_painting_tradition: "Художественная традиция"
 concept_vikelas_sports: "Спорт"
 concept_vikelas_sports_desc: "#b Спорт#! — одна из главных особенностей мода [concept_morgenroete].\n\nКак только страна открывает #b организованный спорт#!, она получает доступ к различным видам спортивной деятельности. Самым важным является основание [Concept('concept_vikelas_ioc', 'Международного олимпийского комитета')], который начнёт организовывать [Concept('concept_vikelas_olympic_games', 'Олимпийские игры')]. Олимпийские игры дадут вам шанс выиграть золотые медали, которые принесут вашей стране [Concept('concept_prestige', 'престиж')]."
 concept_vikelas_olympic_games: "Олимпийские игры"
 concept_vikelas_olympic_games_desc: "Как только будет основан [concept_vikelas_ioc], #b Олимпийские игры#! смогут проходить каждые 4 года. Каждый раз комитет будет голосовать за #b принимающую страну#!. Принимающая страна получит большой прирост [Concept('concept_prestige', 'престижа')].\nВо время Олимпийских игр ваши спортсмены будут соревноваться за медали. На то, сколько медалей вы получите, влияет множество факторов. Ваше население оказывает небольшое влияние, [concept_sol|l] оказывает большее влияние, некоторые события также влияют на ваши шансы, как и великие [Concept('concept_general', 'генералы')] и великие [Concept('concept_admiral', 'адмиралы')]. Кроме того, персонажи с чертой «#b Атлет#!» и городские центры со #b спортивными сооружениями#! также дают небольшие бонусы.\nВсе эти факторы влияют на то, сколько из 12 золотых медалей получит ваша страна. Каждая золотая медаль принесёт вам 5 единиц [Concept('concept_prestige', 'престижа')]."
 concept_vikelas_ioc: "Международный олимпийский комитет"
 concept_vikelas_ioc_desc: "Держава, исследовавшая технологию #V $vikelas_international_sports_tech$#!, может основать #b Международный олимпийский комитет#!, или сокращённо #b МОК#!. Затем МОК начнёт организовывать [Concept('concept_vikelas_olympic_games', 'Олимпийские игры')]. Каждый член МОК может участвовать в Олимпийских играх.\nСамыми важными членами МОК являются #b члены правления#!. Основатель МОК станет #b президентом#! и, следовательно, навсегда останется членом правления, в то время как другие члены будут избираться каждые 4 года. В правлении есть место для 5 великих держав, 2 европейских, 2 азиатских, 2 американских, 1 африканской и 1 океанийской державы.\nОсновная задача членов правления — выбор следующей принимающей страны Игр. На выбор будет 3 кандидата (или 4, если страна решит подкупить правление).\nЕсли Греция основывает МОК, Олимпийские игры будут проводиться только в Греции, в результате чего правление будет менее важным, так как оно не выбирает принимающую страну."
 concept_lepsius_exhibition_desc: "Ваш [concept_lepsius_museum] будет автоматически организовывать выставки (в виде [Concept('concept_production_method', 'метода производства')] для каждого региона), если у вас будет достаточно [Concept('concept_lepsius_artifact', 'малых артефактов')] одного вида. Для обычных артефактов первая выставка будет создана при наличии 10 или более артефактов. После этого возможны лучшие выставки с 25 (средняя выставка), 50 (большая выставка) и 100 малыми артефактами (превосходная выставка). Для превосходной выставки дополнительно требуется один [concept_lepsius_major_artifact].\n\nМестные артефакты имеют менее разнообразный набор выставок, так как они ограничены обычной и большой выставкой. Для обычной выставки требуется 25 местных артефактов, а для большой — 50."
 concept_vikelas_racer: "Автогонщик"
 concept_vikelas_racers: "Автогонщики"
 concept_vikelas_racer_desc: "Автогонщик — это особый [Concept('concept_character', 'персонаж')], который принимает участие в [Concept('concept_vikelas_car_racing', 'автогонках')]."
 concept_vikelas_car_racing: "Автогонки"
 concept_vikelas_car_racing_desc: "Автогонки — это вид спорта, в котором [Concept('concept_vikelas_racer', 'автогонщики')] соревнуются друг с другом либо на треке, либо на обычных дорогах."
 concept_lepsius_archaeological_exhibition: "Археологическая выставка"
 concept_elgar_opera_desc: "#b Опера#! — это музыкальный центр державы. Здесь собираются самые важные музыканты и играют для масс.\n#b Опера#! — это отдельное сооружение, которое можно построить в областях, если городской центр достиг как минимум 5-го уровня. #b Опера#! будет производить музыку и потреблять инструменты. Чем выше уровень #b оперы#!, тем больше [Concept('concept_elgar_musical_tradition', 'музыкальной традиции')] будет производиться каждый год.\nКроме того, с #b оперой#! вы получаете доступ к некоторым решениям, таким как посещение вашей оперы."
 concept_elgar_impressionism_desc: "#b Импрессионизм#! — это стиль в истории искусства, который характеризуется атмосферным изображением мимолётных моментов сцены. Он возник из движения в живописи во Франции во второй половине XIX века. Термин «импрессионизм» также применялся к определённым стилям в музыке, литературе, кино и фотографии. В то время как многие натуралисты, такие как Генрих Гарт, отвергали музыку как средство выражения «ищущего истину акционизма», импрессионисты часто рассматривали «беспредметное погружение в мечты» под тонко градуированные красочные аккорды как удовольствие.\n\nВ игре #b импрессионизм#! можно разблокировать только с помощью записи в дневнике, которая требует 1000 единиц [Concept('concept_elgar_musical_tradition', 'музыкальной традиции')], [Concept('concept_elgar_opera', 'оперного театра')], могущественных землевладельцев, немогущественных промышленников и интеллигенции с одобрением выше 5. Если вы выберете #b импрессионизм#!, вы не сможете разблокировать две другие ветви.\n\nВ центре внимания #b импрессионизма#! в игре находится музыка. Поэтому он даст вам самый большой бонус к [Concept('concept_elgar_musical_tradition', 'музыкальной традиции')]."
 concept_elgar_expressionism_desc: "#b Экспрессионизм#! — это стиль в искусстве. Его истоки и предшественники можно найти в конце XIX века. Как импрессионизм, символизм и фовизм, экспрессионизм является движением против тенденций натурализма. В экспрессионизме выразительный уровень преобладает над эстетическим, апеллятивным и фактическим. Художник хочет представить зрителю свой опыт. В отличие от музыкального импрессионизма, который изображает восприятие внешнего вида вещей, экспрессионистские художественные движения формулируют эмоции человеческой души.\n\nВ игре #b экспрессионизм#! можно разблокировать только с помощью записи в дневнике, которая требует 1000 единиц [Concept('concept_elgar_musical_tradition', 'музыкальной традиции')], [Concept('concept_elgar_opera', 'оперного театра')], могущественной интеллигенции или профсоюзов, немогущественных землевладельцев, и либо интеллигенция, либо профсоюзы должны иметь одобрение 5 или выше. Если вы выберете #b экспрессионизм#!, вы не сможете разблокировать две другие ветви.\n\nВ центре внимания #b экспрессионизма#! в игре должна была бы быть литература, но она ещё не реализована."
 concept_elgar_art_nouveau_desc: "#b Ар-нуво#! — это художественный стиль, который развился из движения «#italic Искусства и ремёсла#!» и был вдохновлён природными формами. Он часто фокусировался на динамизме и движении и использовал современные материалы.\n\nВ игре #b ар-нуво#! можно разблокировать только с помощью записи в дневнике, которая требует 1000 единиц [Concept('concept_elgar_musical_tradition', 'музыкальной традиции')], [Concept('concept_elgar_opera', 'оперного театра')], могущественных промышленников и интеллигенции с одобрением 5 или выше. Если вы выберете #b ар-нуво#!, вы не сможете разблокировать две другие ветви.\n\nВ центре внимания #b ар-нуво#! и #b ар-деко#!, следующей технологии в этой ветви, находится архитектура. Вы будете получать различные события и записи в дневнике об архитектурных достижениях и сможете получить [Concept('concept_gaudi_architectural_splendour', 'архитектурное великолепие')]."
 concept_elgar_composer: "#PURPLE #b Композитор#!#!"
 concept_elgar_composers: "#PURPLE #b Композиторы#!#!"
 concept_elgar_composer_desc: "#b Композиторы#! — это мужчины и женщины, которые сочиняют музыку. Композиторы — это особый тип персонажей, которых вы можете получить либо из событий, либо набрав достаточно [Concept('concept_artistic_progress', 'творческого прогресса')] для его появления в вашей стране, либо предложив должность [Concept('concept_elgar_travelling_composer', 'странствующему композитору')].\nКак только у вас появится #b композитор#!, вы можете поручить ему [Concept('concept_elgar_composing', 'сочинение музыки')], [Concept('concept_elgar_conducting', 'дирижирование')], отправить его в [Concept('concept_elgar_musical_tour', 'музыкальные туры')] или поручить сочинение [Concept('concept_elgar_musical_masterwork', 'музыкальных шедевров')]. Каждое действие отличается тем, что делает композитор, что для этого требуется и что вы от этого получаете. #b Композитор#! будет [Concept('concept_elgar_composer_exhaustion', 'истощён')] после каждой задачи и ему потребуется некоторое время для отдыха, прежде чем он снова сможет работать.\nВ течение своей жизни #b композиторы#! будут получать [Concept('concept_artists_experience', 'репутацию')] и иногда снова его терять. Чем выше #b репутация#!, тем больше будут преимущества от действий #b композитора#!. #b Композиторы#!, достигшие #b репутации#! 500, станут [Concept('concept_elgar_great_composer', 'великими композиторами')], титанами музыки, известными во всём мире."
 concept_elgar_great_composer: "#PURPLE #b Великий композитор#!#!"
 concept_elgar_great_composers: "#PURPLE #b Великие композиторы#!#!"
 concept_elgar_great_composer_desc: "#b Великие композиторы#! — это титаны музыки. Те, чьи имена будут известны во веки веков. [Concept('concept_elgar_composer', '#b #PURPLE Композиторы#!#!')], достигшие 500 единиц [Concept('concept_artists_experience', 'репутации')], станут #b великими композиторами#!. Это значительно повысит их эффективность и позволит вашей державе получать гораздо больше [Concept('concept_elgar_musical_tradition', 'музыкальной традиции')]. #b Великий композитор#! может создать [Concept('concept_elgar_musical_masterwork', 'музыкальный шедевр')] гораздо быстрее, например."
 concept_elgar_travelling_composer: "Странствующий композитор"
 concept_elgar_travelling_composers: "Странствующие композиторы"
 concept_elgar_travelling_composer_desc: "#b Странствующие композиторы#! — это [Concept('concept_elgar_composer', '#b #PURPLE композиторы#!#!')], которые не наняты ни одной державой. Вместо этого они путешествуют с концертными турами. Вы можете нанять #b странствующего композитора#!, но чем больше у него [Concept('concept_artists_experience', 'репутации')], тем выше будут его требования.\nЧтобы пригласить #b странствующего композитора#!, у вас должен быть как минимум [Concept('concept_elgar_opera', 'оперный театр')]. #b Композиторы#! с более высокой #b репутацией#! потребуют более крупных оперных театров, современных музыкальных [Concept('concept_technology', 'технологий')], определённого уровня [Concept('concept_elgar_musical_tradition', 'музыкальной традиции')], а некоторые могут присоединиться только к [Concept('concept_major_power', 'крупным державам')] или [Concept('concept_great_power', 'великим державам')].\nОсобый случай — [Concept('concept_elgar_national_composer', 'национальные композиторы')], которые доступны только державам с такой же или очень похожей национальной идентичностью."
 concept_elgar_national_composer: "Национальный композитор"
 concept_elgar_national_composers: "Национальные композиторы"
 concept_elgar_national_composer_desc: "#b Национальные композиторы#! — это [Concept('concept_elgar_composer', '#b #PURPLE композиторы#!#!')], которые очень ценят свою нацию. Их не смогут нанять другие державы.\nДоступен ли вам #b национальный композитор#!, определяется [Concept('concept_cultural_trait', 'особенностями')] его культуры. Одна из ваших основных культур должна разделять как не-наследственную #b черту#!, так и [Concept('concept_cultural_heritage_trait', 'черту культурного наследия')]. Это означает, что северогерманский #b национальный композитор#! будет доступен германским странам, а также Швейцарии."
 concept_elgar_composing: "Сочинение музыки"
 concept_elgar_composing_lower_case: "сочинение музыки"
 concept_elgar_composing_compose: "сочинять"
 concept_elgar_composing_desc: "[Concept('concept_elgar_composer', '#b #PURPLE Композитор#!#!')], который #b сочиняет музыку#!, получает 5 единиц [Concept('concept_artists_experience', 'репутации')] в год и добавляет 5 единиц [Concept('concept_elgar_musical_tradition', 'музыкальной традиции')] стране. Кроме того, он создаёт случайное количество произведений каждый год. #b Композитор#! с особыми навыками, такими как дирижёр, виртуоз, новатор или дотошный, создаёт одно дополнительное произведение в год. Количество произведений имеет решающее значение для успеха в последующих [Concept('concept_elgar_musical_tour', 'музыкальных турах')]. #b Композитор#! сочиняет музыку до тех пор, пока действие не будет отменено в записи в дневнике. #b Композитор#!, который сочиняет музыку, обходится стране в небольшую ежегодную плату за содержание."
 concept_elgar_conducting: "Дирижирование"
 concept_elgar_conducting_lower_case: "дирижирование"
 concept_elgar_conducting_conduct: "дирижировать"
 concept_elgar_conducting_desc: "[Concept('concept_elgar_composer', '#b #PURPLE Композитор#!#!')] будет заниматься #b дирижированием#! в течение 24 месяцев и организует концертный сезон. Это улучшит выпуск музыки случайной [Concept('concept_elgar_opera', 'оперы')] на 5-10 лет, даст вашей державе небольшой прирост [Concept('concept_elgar_musical_tradition', 'музыкальной традиции')] и даст вашему #b композитору#! средний прирост его [Concept('concept_artists_experience', 'репутации')]. Если ваш #b композитор#! ещё не является дирижёром, он может получить эту [Concept('concept_character_trait', 'черту характера')] в конце сезона. Вам придётся платить #b композитору#!, пока он #b дирижирует#!."
 concept_elgar_musical_tour: "Концертный тур"
 concept_elgar_musical_tours: "Концертные туры"
 concept_elgar_musical_tour_tour: "Тур"
 concept_elgar_musical_tour_tours: "Туры"
 concept_elgar_musical_tour_desc: "[Concept('concept_elgar_composer', '#b #PURPLE Композитор#!#!')] может отправиться в #b концертный тур#! за границу на 30 месяцев. #b Концертные туры#! повышают [Concept('concept_prestige', 'престиж')] державы #b композитора#!. Кроме того, #b композитор#! получает прирост [Concept('concept_artists_experience', 'репутации')] в конце #b тура#!, который зависит от количества произведений #b композитора#!, а также от его черт.\n#b Композиторам#! с менее чем 20 произведениями, вероятно, не следует отправляться в #b туры#!, а #b композиторы#! с чертой «#b Сдержанный#!» не могут отправляться в #b туры#!."
 concept_elgar_musical_masterwork: "Музыкальный шедевр"
 concept_elgar_musical_masterworks: "Музыкальные шедевры"
 concept_elgar_musical_masterwork_masterwork: "Шедевр"
 concept_elgar_musical_masterwork_masterworks: "Шедевры"
 concept_elgar_musical_masterwork_of_music: "Музыкальный шедевр"
 concept_elgar_musical_masterworks_of_music: "Музыкальные шедевры"
 concept_elgar_musical_masterwork_desc: "[Concept('concept_elgar_composer', '#b #PURPLE Композитор#!#!')] может начать сочинять #b шедевр#!, что займёт несколько лет. Чем больше [Concept('concept_artists_experience', 'репутации')] у #b композитора#!, тем быстрее он закончит. Как только #b шедевр#! будет сочинён, #b композитор#! получит 50 единиц [Concept('concept_artists_experience', 'репутации')], а страна получит до 150 единиц [Concept('concept_elgar_musical_tradition', 'музыкальной традиции')] в зависимости от своего [Concept('concept_rank', 'ранга')].\n#b Композитор#! может создать максимум 3 #b шедевра#! и будет нуждаться в финансовой поддержке своей страны во время работы над ним."
 concept_elgar_composer_exhaustion: "Истощение композитора"
 concept_elgar_composer_exhaustion_exhausted: "истощён"
 concept_elgar_composer_exhaustion_desc: "Как только [Concept('concept_elgar_composer', '#b #PURPLE композитор#!#!')] закончит [Concept('concept_elgar_composing', 'сочинение музыки')], [Concept('concept_elgar_conducting', 'дирижирование')], сочинять [Concept('concept_elgar_musical_masterwork', 'шедевры')] или [Concept('concept_elgar_musical_tour', 'концертные туры')], он будет #b истощён#! от работы. #b Истощённый композитор#! не сможет работать некоторое время. Чем старше #b композитор#!, тем дольше ему потребуется, чтобы избавиться от #b истощения#!."
 concept_manzoni_writer: "#PURPLE #b Писатель#!#!"
 concept_manzoni_writers: "#PURPLE #b Писатели#!#!"
 concept_klimt_painter: "#PURPLE #b Художник#!#!"
 concept_pm_artists_academy_conservatory: "#b #PURPLE Консерватория#!#!"
 concept_pm_artists_academy_conservatory_desc: "Консерватория специализирует Академию искусств на музыке. Если у вас есть консерватория, вы сможете продвигать [Concept('concept_elgar_composer', '#b #PURPLE композиторов#!#!')]. Вы получите #n отрицательный модификатор производительности#! для Академии искусств, а также #n отрицательный эффект#! на ваш [Concept('concept_artistic_progress', 'творческий прогресс')] при изменении этого метода производства."
 concept_pm_artists_academy_salon: "#b #PURPLE Литературный салон#!#!"
 concept_pm_artists_academy_salon_desc: "Литературный салон специализирует Академию искусств на литературе. Если у вас есть литературный салон, вы сможете продвигать [Concept('concept_manzoni_writer', '#b #PURPLE писателей#!#!')]. Вы получите #n отрицательный модификатор производительности#! для Академии искусств, а также #n отрицательный эффект#! на ваш [Concept('concept_artistic_progress', 'творческий прогресс')] при изменении этого метода производства."
 concept_pm_artists_academy_studio: "#b #PURPLE Художественная студия#!#!"
 concept_pm_artists_academy_studio_desc: "Художественная студия специализирует Академию искусств на живописи. Если у вас есть художественная студия, вы сможете продвигать [Concept('concept_klimt_painter', '#b #PURPLE художников#!#!')]. Вы получите #n отрицательный модификатор производительности#! для Академии искусств, а также #n отрицательный эффект#! на ваш [Concept('concept_artistic_progress', 'творческий прогресс')] при изменении этого метода производства."
 concept_pm_artists_academy_specialization: "Специализация Академии искусств"
 concept_pm_artists_academy_specialization_desc: "Каждую Академию искусств можно специализировать, изменив её метод производства.\nАкадемия искусств с [Concept('concept_pm_artists_academy_conservatory', 'консерваторией')] позволит вам продвигать [Concept('concept_elgar_composer', '#b #PURPLE композиторов#!#!')].\nАкадемия искусств с [Concept('concept_pm_artists_academy_salon', 'литературным салоном')] позволит вам продвигать [Concept('concept_manzoni_writer', '#b #PURPLE писателей#!#!')].\nАкадемия искусств с [Concept('concept_pm_artists_academy_studio', 'художественной студией')] позволит вам продвигать [Concept('concept_klimt_painter', '#b #PURPLE художников#!#!')].\nИзменение специализации будет иметь #n кратковременный отрицательный эффект#! для сооружения и вашего [Concept('concept_artistic_progress', 'творческого прогресса')]."
 concept_artists_artist: "Деятель искусства"
 concept_artists_artists: "Деятели искусства"
 concept_artistic_progress: "Творческий прогресс"
 concept_artistic_progress_desc: "Накопив 1000 единиц #b творческого прогресса#!, вы можете получить нового [Concept('concept_artists_artist', 'деятеля искусства')]. Чтобы вообще иметь доступ к #b творческому прогрессу#!, у вас должна быть либо #b Академия искусств#!, либо #b Опера#!.\nПрирост #b творческого прогресса#! зависит от различных факторов. Например, чем выше ваша [concept_literacy|l], тем быстрее вы накапливаете #b творческий прогресс#!. Подробную информацию обо всех факторах, влияющих на творческий прогресс, вы можете получить на панели инструментов индикатора творческого прогресса в окне искусств."
 concept_artists_experience: "Репутация"
 concept_artists_experience_desc: "Каждый [concept_artists_artist] имеет #b репутацию#!. Репутация отражает, насколько уважаем деятель искусства. Деятели искусства начинают с небольшим количеством репутации и могут получать дополнительную репутацию, работая в своей области. Деятели искусства, набравшие репутацию 500, станут #великими деятелями искусства#! и получат соответствующую [Concept('concept_character_trait', 'черту характера')]."
 concept_manzoni_great_writer: "Великий писатель"
 concept_manzoni_local_writer: "Местный писатель"
 concept_artists_center_of_arts: "Центр искусств"
 concept_artists_centers_of_arts: "Центры искусств"
 concept_artists_center_of_classicism: "Центр классицизма"
 concept_artists_center_of_romanticism: "Центр романтизма"
 concept_artists_center_of_realism: "Центр реализма"
 concept_artists_center_of_impressionism: "Центр импрессионизма"
 concept_artists_center_of_expressionism: "Центр экспрессионизма"
 concept_artists_center_of_art_nouveau: "Центр ар-нуво"
 concept_klimt_great_painter: "#PURPLE #b Великий художник#!#!"
 concept_klimt_great_painters: "#PURPLE #b Великие художники#!#!"
 concept_klimt_great_painter_desc: "#b Великие художники#! — это [Concept('concept_klimt_painter', '#b #PURPLE художники#!#!')], которые будут известны во веки веков. #b Художники#!, достигшие 500 единиц [Concept('concept_artists_experience', 'репутации')], станут #b великими художниками#!. Это значительно повысит их эффективность и позволит вашей державе получать гораздо больше [Concept('concept_klimt_painting_tradition', 'художественной традиции')]."
 concept_klimt_independent_painter: "Независимый художник"
 concept_klimt_independent_painters: "Независимые художники"
 concept_klimt_painter_trip: "Образовательное путешествие"
 concept_klimt_painter_trip_journeys: "Путешествия"
 concept_elgar_music_desc: "#b Музыкальная культура#! — одна из главных особенностей мода [concept_morgenroete]. В XIX и XX веках музыка была важна как средство развлечения населения и демонстрации величия нации.\n\nЧтобы получить доступ к большей части музыкального контента в #r Morgenröte#!, вам нужно будет построить [concept_elgar_opera]. #b Опера#! будет производить музыку, но для работы ей нужны инструменты. Помимо производства #b музыки#! для потребления вашим населением, #b оперы#! будут медленно добавлять [Concept('concept_elgar_musical_tradition', 'музыкальную традицию')] вашей стране.\n\n#b Музыкальная традиция#! отражает музыкальные достижения и традиции нации. Количество #b музыкальной традиции#! даёт вам бонус к престижу и позволяет выбрать путь для дальнейшего развития искусства вашей нации. Вы можете пойти по пути [Concept('concept_elgar_impressionism', 'импрессионизма')], [Concept('concept_elgar_expressionism', 'экспрессионизма')] или [Concept('concept_elgar_art_nouveau', 'ар-нуво')]. Каждый из этих стилей искусства имеет свою направленность.\n\nХороший способ получить ещё больше #b музыкальной традиции#! — это заполучить [concept_elgar_composer]. Композитор сможет [Concept('concept_elgar_composing', 'сочинять')], [Concept('concept_elgar_conducting', 'дирижировать')], отправляться в [Concept('concept_elgar_musical_tour', 'музыкальные туры')] и даже создавать [Concept('concept_elgar_musical_masterwork', 'музыкальные шедевры')]. Эти действия либо улучшат [Concept('concept_artists_experience', 'репутацию')] #b композитора#!, либо улучшат #b музыкальную традицию#! вашей нации."
 concept_artists_center_of_arts_desc: "#b Центр искусств#! — это центр [Concept('concept_artists_art_style', 'художественного стиля')], который создаётся в [Concept('concept_state_region', 'регионе')] после изобретения #b художественного стиля#!. На каждый #b художественный стиль#! приходится только один #b центр искусств#!.\n#b Центры искусств#! особенно важны для [Concept('concept_klimt_painter', '#b #PURPLE художников#!#!')], которые могут совершать [Concept('concept_klimt_painter_trip', 'образовательные путешествия')] для изучения #b художественного стиля#!. Кроме того, некоторые #b центры искусств#! предлагают уникальные события, которые там происходят. Некоторые, например, позволяют вам выигрывать [Concept('concept_klimt_art_prize', 'художественные призы')]."
 concept_klimt_painting_culture: "Художественная культура"
 concept_klimt_painting_culture_desc: "#b Художественная культура#! — одна из главных особенностей мода [concept_morgenroete]. В XIX и XX веках живопись быстро развивалась, что привело к появлению различных новых [Concept('concept_artists_art_style', 'художественных стилей')], которые принесли много прогресса отдельным личностям и странам.\n\nЧтобы получить доступ к большей части контента, связанного с живописью, в #r Morgenröte#!, вам нужно будет построить #b Академию искусств#!. #b Академии искусств#! позволят вам начать накапливать [Concept('concept_klimt_painting_tradition', 'художественную традицию')] и нанимать новых [Concept('concept_klimt_painter', '#b #PURPLE художников#!#!')].\n\n#b Художники#! будут создавать картины и #b шедевры#! для вашей страны и давать вам большое количество #b художественной традиции#!. Поскольку существуют разные [Concept('concept_artists_art_style', 'художественные стили')], на которых #b художники#! могут сосредоточиться, вы можете позволить им изучать дополнительные #b художественные стили#! в [Concept('concept_klimt_painter_trip', 'образовательных путешествиях')]. Как только им исполнится 40 лет, #b художники#! специализируются на одном из своих #b художественных стилей#! и сосредоточатся на создании картин в этом #b художественном стиле#!."
 concept_artists_art_style: "Художественный стиль"
 concept_artists_art_styles: "Художественные стили"
 concept_artists_art_style_style: "Стиль"
 concept_artists_art_style_desc: "#b Художественный стиль#! — это определённое направление в искусстве. Некоторые #b художественные стили#! существуют с самого начала, например, #b классицизм#! и #b романтизм#!. Другие, #b реализм#!, #b иррационализм#!, [concept_elgar_impressionism], [concept_elgar_expressionism] и [concept_elgar_art_nouveau], появляются позже после выполнения определённых условий. Каждый #b художественный стиль#! имеет соответствующий [Concept('concept_artists_center_of_arts', 'центр искусств')] в [Concept('concept_state_region', 'регионе')], где он зародился."
 concept_klimt_painter_desc: "#PURPLE #b Художники#!#! — это мужчины и женщины, которые создают картины и другие произведения искусства. #b Художники#! — это особый тип персонажей, которых вы можете получить либо из событий, либо набрав достаточно [Concept('concept_artistic_progress', 'творческого прогресса')] для его появления в вашей стране, либо предложив должность [Concept('concept_klimt_independent_painter', 'независимому художнику')].\n#b Художники#! немедленно начинают писать и создают определённое количество картин каждый год в зависимости от их [Concept('concept_character_trait', 'черт характера')]. Иногда они могут даже создать #b шедевр#!, который даст вам ещё больше [Concept('concept_klimt_painting_tradition', 'художественной традиции')].\n#b Художники#! могут изучать различные [Concept('concept_artists_art_style', 'художественные стили')] в [Concept('concept_klimt_painter_trip', 'путешествиях')]. Каждый #b художник#! специализируется на #b художественном стиле#!, как только ему исполняется 40 лет, что позволяет ему писать #b шедевры#! определённого стиля."
 concept_klimt_independent_painter_desc: "[Concept('concept_klimt_painter', '#b #PURPLE Художники#!#!')], которые не наняты страной, являются #b независимыми художниками#!. #b Независимых художников#! могут нанимать страны, у которых есть [Concept('concept_primary_cultures', 'основная культура')], разделяющая [Concept('concept_cultural_trait', 'культурную особенность')] с культурой #b художника#!.\n#b Независимые художники#! имеют различные требования к принимающей стране. Вам потребуются #b Академии искусств#!, определённые [Concept('concept_technology', 'технологии')] или [Concept('concept_klimt_painting_tradition', 'художественная традиция')] в зависимости от [Concept('concept_artists_experience', 'репутации')] #b художника#!. Кроме того, вам придётся заплатить им сумму денег, которая зависит от их #b известности#!, а также от финансовых возможностей вашей страны."
 concept_klimt_painter_trip_desc: "[Concept('concept_klimt_painter', '#b #PURPLE Художник#!#!')] может изучать новые [Concept('concept_artists_art_style', 'художественные стили')] в #b образовательном путешествии#! в один из [Concept('concept_artists_center_of_arts', 'центров искусств')].\nВ таком #b путешествии#! художник может приобрести положительные и отрицательные [Concept('concept_character_trait', 'черты характера')], которые повлияют на его работу и количество создаваемых им картин. Каждый #b центр искусств#! имеет немного разные события и даст #b художнику#! уникальную #b черту#! в конце, которая позже может стать специализацией #b художника#!."
 concept_klimt_art_prize: "Художественный приз"
 concept_klimt_art_prizes: "Художественные призы"
 concept_klimt_art_prize_desc: "Время от времени проводятся художественные конкурсы, на которых вручаются призы, способствующие повышению репутации художника. Державы, имеющие [Concept('concept_artists_center_of_arts', 'центр искусств')] для иррационализма или [Concept('elgar_impressionism', 'импрессионизма')], выбирают лучших музыкантов на конкурсе, который проходит каждые пять лет. Владельцы [Concept('klimt_art_gallery', 'художественной галереи')] или #b центра искусства реализма#! проводят конкурс живописи, который проходит каждые пять лет. Страна, из которой происходят победители, также получает музыкальную или художественную традицию. Особой формой художественного конкурса является биеннале, которая каждые два года присуждает всеобъемлющий художественный приз стране, у которой есть художники с самой высокой репутацией, что повышает все значения культурной традиции."
 concept_klimt_art_gallery: "Художественная галерея"
 concept_klimt_art_gallery_desc: "#b Художественная галерея#! — это особое сооружение в столице державы, доступное начиная с #b реализма#!. Его можно построить, только если у державы есть [concept_klimt_painter] со специализацией. #b Художники#! со специализацией открывают коллекцию своего [Concept('concept_artists_art_style', 'художественного стиля')] — то есть художник со специализацией в романтическом стиле открывает коллекцию романтизма. Чтобы улучшить коллекцию до превосходной, требуется шедевр такого рода, который должен быть либо написан художником, либо приобретён за границей."
 concept_manzoni_writer_novelist: "Романист"
 concept_manzoni_writer_desc: "#b Писатель#! — это особый персонаж, который будет писать литературные произведения для вашей страны. #b Писатели#! обычно начинают как [concept_manzoni_local_writer] и будут писать #b публикации#!, а иногда даже [Concept('concept_manzoni_bestseller', 'бестселлеры')]. #b Бестселлер#! принесёт #b писателю#! большое количество [Concept('concept_artists_experience', 'репутации')] и [Concept('concept_manzoni_literary_tradition', 'литературной традиции')] вашей стране. Есть шанс написать #b бестселлер#! каждый год, в зависимости от того, насколько [Concept('concept_manzoni_genre', 'жанр')] #b писателя#! близок к [Concept('manzoni_popular_taste', 'вкусу публики')].\n\nХорошо известный #b писатель#!, чья [Concept('concept_interest_group', 'заинтересованная группа')] достаточно довольна, может стать вашим [concept_manzoni_national_writer]. #b Национальный писатель#! может получать [Concept('concept_manzoni_book_licence', 'книжные лицензии')] или создавать газетный роман. Если #b писатель#! набирает 500 единиц #b репутации#!, он может стать [Concept('concept_manzoni_great_writer', 'великим писателем')] и обеспечить вашу страну ещё большим количеством #b литературной традиции#!.\n\nБудьте осторожны, если #b писатели#! недовольны политической ситуацией в стране, они могут решить стать [Concept('concept_agitator', 'агитаторами')] или вмешиваться в политический дискурс."
 concept_manzoni_great_writer_desc: "#b Великий писатель#! — это [concept_manzoni_writer], известный во всём мире. #b Писатель#! может стать #b великим писателем#!, как только его [Concept('concept_artists_experience', 'репутация')] достигнет #V 500#!. Если ваш #b великий писатель#! является вашим [Concept('concept_manzoni_national_writer', 'национальным писателем')], вы получите бонус к ежегодному приросту [Concept('concept_manzoni_literary_tradition', 'литературной традиции')]."
 concept_manzoni_local_writer_desc: "Почти каждый [concept_manzoni_writer] начинает как #b местный писатель#!. В каждой стране может быть не более 3 #b местных писателей#!, которые будут создавать #b публикации#!, давать вам [Concept('concept_manzoni_literary_tradition', 'литературную традицию')], если их [Concept('concept_manzoni_genre', 'жанр')] соответствует [Concept('concept_manzoni_popular_taste', 'вкусу публики')], и получать [Concept('concept_artists_experience', 'репутацию')].\n#b Местный писатель#! с #b репутацией#! 150 и чья [Concept('concept_interest_group', 'заинтересованная группа')] не недовольна, может стать [Concept('concept_manzoni_national_writer', 'национальным писателем')] страны, что даст вам больше #b литературной традиции#! и другие дополнительные преимущества.\nИмейте в виду, что #b местные писатели#!, недовольные текущей политической ситуацией, могут начать вмешиваться в политический дискурс или даже стать [Concept('concept_agitator', 'агитаторами')]."
 concept_manzoni_national_writer: "Национальный писатель"
 concept_manzoni_national_writer_desc: "#b Национальный писатель#! — это тип [Concept('concept_manzoni_writer', '#b #PURPLE писателя#!#!')], который считается лицом литературы вашей страны. #b Национальные писатели#! дают вам от 1 до 5 единиц [Concept('concept_manzoni_literary_tradition', 'литературной традиции')].\nВы можете получить #b национального писателя#!, назначив одного из ваших [Concept('concept_manzoni_local_writer', 'местных писателей')]. Чтобы иметь возможность назначить одного из ваших #b местных писателей#!, у них должно быть не менее #V 150#! единиц [Concept('concept_artists_experience', 'репутации')], а их [Concept('concept_interest_group', 'заинтересованная группа')] должно иметь положительное [Concept('concept_approval', 'одобрение')]."
 concept_manzoni_bestseller: "Бестселлер"
 concept_manzoni_bestsellers: "Бестселлеры"
 concept_manzoni_bestseller_desc: "#b Бестселлер#! — это #b публикация#! [Concept('concept_manzoni_writer', '#b #PURPLE писателя#!#!')], которая очень хорошо продаётся, обычно потому, что [Concept('concept_manzoni_genre', 'жанр')] #b писателя#! соответствует или близок к текущему [Concept('concept_manzoni_popular_taste', 'вкусу публики')].\nКаждый год есть шанс, что [concept_manzoni_national_writer] или [concept_manzoni_local_writer] напишет #b бестселлер#!. Первый #b бестселлер#! принесёт большое количество [Concept('concept_manzoni_literary_tradition', 'литературной традиции')], а каждый #b бестселлер#! после первого принесёт стране значительное количество #b литературной традиции#!."
 concept_manzoni_genre: "Жанр"
 concept_manzoni_genres: "Жанры"
 concept_manzoni_genre_desc: "Каждый [Concept('concept_manzoni_writer', '#b #PURPLE романист#!#!')] имеет определённый #b жанр#! для своего творчества. #b Жанр#! присваивается при создании #b писателя#! и зависит от многих факторов.\n#b Писатели#! будут получать больше [Concept('concept_artists_experience', 'репутации')] и писать больше [Concept('concept_manzoni_bestseller', 'бестселлеров')], когда их #b жанр#! соответствует или близок к [Concept('manzoni_popular_taste', 'вкусу публики')] страны."
 concept_manzoni_popular_taste: "Вкус публики"
 concept_manzoni_popular_taste_audience: "Вкус аудитории"
 concept_manzoni_popular_tastes_audience: "Вкусы аудитории"
 concept_manzoni_popular_taste_desc: "Население каждой нации имеет #b вкус#! к определённому [Concept('concept_manzoni_genre', 'жанру')]. Примерно каждые 10 лет этот #b вкус#! будет меняться в зависимости от политических, социальных и культурных изменений в самой стране.\n[Concept('concept_manzoni_writer', '#b #PURPLE Писатели#!#!')], чей #b жанр#! соответствует #b вкусу#! или близок к нему, будут получать больше [Concept('concept_artists_experience', 'репутации')] и писать больше [Concept('concept_manzoni_bestseller', 'бестселлеров')].\n\n#V Близкие вкусы:#!\n- #b $manzoni_taste_adventure_var_loc$#!: $manzoni_genre_science_fiction$, $manzoni_genre_juvenile$, $manzoni_genre_crime_mystery$\n- #b $manzoni_taste_crime_var_loc$#!: $manzoni_genre_science_fiction$, $manzoni_genre_adventure$, $manzoni_genre_romance$\n- #b $manzoni_taste_devotional_var_loc$#!: $manzoni_genre_juvenile$, $manzoni_genre_romance$, $manzoni_genre_adventure$\n- #b $manzoni_taste_juvenile_var_loc$#!: $manzoni_genre_adventure$, $manzoni_genre_devout$, $manzoni_genre_crime_mystery$\n- #b $manzoni_taste_literary_var_loc$#!: $manzoni_genre_social_critic$, $manzoni_genre_science_fiction$, $manzoni_genre_romance$\n- #b $manzoni_taste_romance_var_loc$#!: $manzoni_genre_devout$, $manzoni_genre_juvenile$, $manzoni_genre_literary_fiction$\n- #b $manzoni_taste_science_var_loc$#!: $manzoni_genre_adventure$, $manzoni_genre_social_critic$, $manzoni_genre_literary_fiction$\n- #b $manzoni_taste_social_var_loc$#!: $manzoni_genre_literary_fiction$, $manzoni_genre_juvenile$, $manzoni_genre_crime_mystery$"
 concept_manzoni_book_licence: "Книжная лицензия"
 concept_manzoni_book_licences: "Книжные лицензии"
 concept_manzoni_book_licence_desc: "Иностранные издатели могут заключать контракты с [concept_manzoni_national_writer] и предлагать его книги в переводе на своём рынке. Это происходит, когда писатель соответствует [Concept('concept_manzoni_popular_taste', 'вкусам аудитории')] за рубежом. Если автор получает не менее пяти книжных лицензий, его книги считаются мировой литературой. После этого он может отправиться в читательский тур."
 concept_manzoni_local_writers: "Местные писатели"
 concept_manzoni_library: "Национальная библиотека"
 concept_manzoni_library_desc: "Ваша #b национальная библиотека#! будет автоматически создавать книжные коллекции (в виде [Concept('concept_production_method', 'метода производства')]), если у вас будет достаточно [Concept('manzoni_publications', 'публикаций')]. Первая книжная коллекция будет создана при наличии 1000 или более публикаций. После этого возможны лучшие коллекции с 2500 (крошечная книжная коллекция), 5000 (малая книжная коллекция), 10 000 (средняя книжная коллекция), 25 000 (большая книжная коллекция), 50 000 (превосходная книжная коллекция) и 100 000 (великая книжная коллекция) публикаций."
 concept_manzoni_publications: "Публикации"
 concept_manzoni_publications_desc: "#b Публикации#! включают все вновь изданные книжные наименования, газеты, эссе и другие подобные письменные продукты в державе. Они не тождественны @manzoni_prints! $manzoni_prints$, циркулирующим в качестве товаров. Публикации могут появляться и независимо от издательской индустрии, например, через собственные типографии правительственных зданий или университетов. Учёные и частные лица также производят публикации в зависимости от их уровня грамотности. Однако львиную долю составляет издательская индустрия, и решающим фактором является то, используется ли современный метод производства или нет. Большое количество публикаций является основополагающим для расширения [Concept('concept_manzoni_library', 'национальной библиотеки')]."
 concept_curtiss_tourism: "Туризм"
 concept_curtiss_tourism_desc: "Туризм обеспечивает культурно превосходящей державе дополнительный доход. Уникальные памятники, музеи и художественные галереи, археологические объекты, центры искусств, а также высокие значения в различных культурных традициях являются факторами, которые делают державу привлекательным туристическим направлением. Законы, повышающие свободу передвижения и экономическую деятельность, также способствуют увеличению доходов от туризма. Инфраструктура также играет решающую роль — ведь до удалённых мест невозможно добраться. Аэропорт, в частности, революционизирует туризм и обеспечивает значительный рост доходов."
 concept_curtiss_private_airline: "Частная авиакомпания"
 concept_mendelejew_chemist: "#b #ORANGE Химик#!#!"
 concept_manzoni_literature: "Литературная культура"
 concept_manzoni_literature_desc: "#b Литературная культура#! — одна из главных особенностей мода [concept_morgenroete]. Печатная и, в частности, газетная культура пережили значительные потрясения в XIX и XX веках. Масса печатной продукции и её повседневное использование представлены издательской индустрией. Культурная ценность производимой литературы отражена в [Concept('concept_manzoni_literary_tradition', 'литературной традиции')]. Последняя во многом зависит от [Concept('concept_manzoni_writer', '#b #PURPLE писателей#!#!')] страны, и существуют [Concept('concept_manzoni_local_writer', 'местные писатели')] и [Concept('concept_manzoni_national_writer', 'национальные писатели')]. Будут ли они жить в тени или станут прославленными авторами, зависит от [Concept('manzoni_popular_taste', 'вкуса публики')]."
 concept_morgenroete_desc: "#r Morgenröte - Dawn of Flavor #! — это мод, созданный для расширения культурных и научных аспектов Victoria 3. Он содержит контент для различных аспектов викторианской эпохи:\n\n#V Лепсиус: #! [concept_lepsius_archaeology]\n#V Веррье:#! [concept_verrier_astronomy]\n#V Гауди:#! [concept_elgar_architecture] и [concept_tesla_engineering]\n#V Дюбуа:#! [concept_dubois_natural_history]\n#V Менделеев:#! [concept_mendelejew_chemistry]\n#V Элгар:#! [concept_elgar_music]\n#V Мандзони:#! [concept_manzoni_literature]\n#V Климт:#! [concept_klimt_painting_culture]\n#V Кёртисс:#! [concept_curtiss_aviation]\n#V Викелас:#! [concept_vikelas_sports]"
 concept_agassiz_mineral: "Минерал"
 concept_agassiz_minerals: "Минералы"
 concept_agassiz_mineral_desc: "Минералы — это все виды особых горных пород, которые не относятся к известным ресурсам, используемым в промышленности. Держава получает определённое количество минералов ежегодно, как только она изобретёт технологию «#b Геология#!». Если [Concept('concept_agassiz_geologist', '#b #GREEN геолог#!#!')] находится на службе этой державы, он может находить дополнительные минералы. Места нахождения минералов характеризуются модификаторами областей: горы, пустыни, арктические районы, месторождения сырья (например, угольные, железные и серные районы), а также геологические [Concept('concept_dubois_formation', 'формации')] и вулканы. Пустыни и арктические районы считаются бедными минералами, в то время как великие геологические формации и вулканы считаются особенно богатыми минералами. Более ценной формой минералов являются [Concept('concept_agassiz_rare_mineral', 'редкие минералы')]."
 concept_agassiz_rare_mineral: "Редкий минерал"
 concept_agassiz_rare_minerals: "Редкие минералы"
 concept_agassiz_rare_mineral_desc: "[Concept('concept_agassiz_geologist', '#b #GREEN Геологи#!#!')] могут находить редкие минералы в своих экспедициях, таких как [Concept('concept_dubois_pacific_expedition', 'тихоокеанские экспедиции')], экспедиции по [Concept('concept_douglas_mountaineering', 'альпинизму')], экспедиции на [Concept('concept_agassiz_volcano', 'вулкан')] или во время разведки минералов. В отличие от обычных [Concept('concept_agassiz_mineral', 'минералов')], они встречаются только в очень ограниченных количествах. Редкие минералы используются для создания минералогического кабинета."
 concept_agassiz_geologist: "#b #GREEN Геолог#!#!"
 concept_agassiz_geologists: "#b #GREEN Геологи#!#!"
 concept_agassiz_geologist_desc: "#b #GREEN Geologists#!#! are [Concept('concept_academics_academic','$concept_academics_academics$')] who primarily study rocks and earth history. They locate [Concept('concept_andersson_cave','$concept_andersson_caves$')], [Concept('concept_dubois_formation','$concept_dubois_formations$')] and [Concept('concept_curie_uranium','$concept_curie_uranium$')] deposits, which makes them irreplaceable colleagues for [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')] and [Concept('concept_curie_physicist','$concept_curie_physicists$')]. During their expeditions, they may find additional [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] that a [concept_mendelejew_chemist] can use to discover or isolate [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]. They can find new deposits of raw materials. They are also active as volcanologists and can go on expeditions to local [Concept('concept_agassiz_volcano','$concept_agassiz_volcanoes$')] to research them in more detail. Together with [Concept('concept_tesla_engineer','$concept_tesla_engineers$')], they can develop new devices, such as seismographs, to learn more about the Earth's interior. Geologists can take part in [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] and [concept_douglas_mountaineering] expeditions."
 concept_agassiz_volcano: "Вулкан"
 concept_agassiz_volcanoes: "Вулканы"
 concept_curie_physicist: "#b #ORANGE Физик#!#!"
 concept_curie_physicists: "#b #ORANGE Физики#!#!"
 concept_curie_physicist_desc: "#n Скоро в Morgenröte!#!"
 concept_curie_uranium: "Уран"
 concept_curie_uranium_desc: "Уран — чрезвычайно редкий материал, который может быть найден только в нескольких избранных исторических провинциях [Concept('concept_agassiz_geologist', '#b #GREEN геологами#!#!')]. Для этого должна быть исследована современная физика. На первый взгляд, уран — это вторичная руда, которая используется только в керамическом производстве. Однако позже он понадобится, особенно в [Concept('concept_verrier_observatory', 'обсерватории')]. Только если лучшие физические и химические методы производства снабжены ураном, они могут выполнять своё предназначение, будь то в области ядерной физики или в исследовании ранее неизвестных элементов. Без урана все научные исследования в области радиоактивности просто невозможны. Поэтому он особенно интересен для [Concept('concept_mendelejew_chemist', '#b #ORANGE химиков#!#!')] и [Concept('concept_curie_physicist', '#b #ORANGE физиков#!#!')] на заключительном этапе Victoria 3."
 concept_mendelejew_chemistry: "Химия"
 concept_mendelejew_chemistry_desc: "#b Химия#! — одна из главных особенностей мода [concept_morgenroete]. Начиная с XVIII века, #b химия#! быстро развивалась в современную науку. Внезапно было открыто много новых элементов и изобретены химические процессы. В XIX и XX веках в химии было сделано ещё больше открытий, от новых элементов до изобретения динамита или процесса Габера-Боша.\n\nВ #b Morgenröte#! #b химией#! будут заниматься [Concept('concept_mendelejew_chemist', '#b #ORANGE химики#!#!')], которые смогут сосредоточиться на разных задачах.\nОдно из направлений — улучшение #b $building_chemical_plant$#!, #b $building_explosives_factory$#! или #b $building_synthetics_plant$#! вашей страны, что сделает эти [Concept('concept_building', 'здания')] более эффективными.\nЕсли вы ищете более престижную задачу, вы можете позволить своему #b химику#! теоретизировать, открывать или выделять [Concept('concept_mendelejew_element', 'элементы')]. Каждый элемент добавит немного [Concept('concept_prestige', 'престижа')] в зависимости от того, теоретизировали ли вы, открыли или выделили его.\nПозже в игре #b химик#! также сможет изобрести #b синтетическую нефть#! и #b синтетический каучук#!. Это разблокирует #b $building_mendelejew_hydrogenation_plants$#! или #b $building_mendelejew_synthetic_rubber_factory$#!."
 concept_mendelejew_chemists: "#b #ORANGE Химики#!#!"
 concept_mendelejew_chemist_desc: "#b #ORANGE Химики#!#! — это [Concept('concept_academics_academic', 'учёные')], которые будут теоретизировать, открывать и выделять [Concept('concept_mendelejew_element', 'элементы')].\n#b #ORANGE Химики#!#! получают [Concept('concept_academics_experience', 'опыт')] при исследовании #b элементов#! или посещении конференций. Они также могут улучшать удобрения, взрывчатые вещества и синтетику. Химики могут изобрести периодическую таблицу или синтетическое топливо, что делает их ценными для стран, не имеющих доступа к нефти. Они также пассивно получают #b опыт#! каждый год. Это позволяет #b #ORANGE химикам#!#! получать лучшие черты химика. Они также могут получить специализацию (теоретик, аналитик, инспектор) при создании или по событию."
 concept_mendelejew_element: "Химический элемент"
 concept_mendelejew_element_no_chemical: "Элемент"
 concept_mendelejew_elements: "Химические элементы"
 concept_mendelejew_element_desc: "В древности было принято считать, что мир состоит из четырёх элементов: огня, земли, воды и воздуха. С началом эмансипации химии от алхимии начался научный анализ химических элементов. Этот процесс был далёк от завершения в XIX веке.\n\n[Concept('concept_mendelejew_chemist', '#b #ORANGE Химики#!#!')] могут продолжать эти исследования, теоретизируя, открывая и выделяя элементы один за другим. Только после выделения элемент считается полностью признанным и получает своё название; до этого это просто номер. Категоризация элементов приносит научный прогресс и [concept_academics_experience] химику.\nНе все элементы можно теоретизировать, открыть и выделить с самого начала.\nПредпосылкой является наличие в химической лаборатории [Concept('concept_verrier_observatory', 'обсерватории')] адекватного оборудования, в некоторых случаях также Института современной физики. Многие элементы можно должным образом исследовать только с помощью спектрографии; к концу игры может потребоваться циклотрон. [Concept('concept_agassiz_mineral', 'Минералы')] необходимы для открытия и выделения химических элементов. Помимо методов производства, опыт и черты характера химика играют решающую роль в том, сколько времени займёт исследование.\n\nИсследованные элементы являются требованием для разработки периодической таблицы и организации химического конгресса."
 concept_verrier_meteorite: "Метеорит"
 concept_verrier_meteorites: "Метеориты"
 concept_manzoni_national_writers: "Национальные писатели"
 concept_verrier_astronomy_desc: "#b Астрономия#! — одна из главных особенностей мода [concept_morgenroete].\n\nЧтобы получить доступ к #b астрономии#!, вам нужна [concept_verrier_observatory] или [concept_verrier_astronomer].\n\nКак только у вас появится обсерватория, вы будете пассивно открывать [Concept('concept_verrier_astronomical_object', 'астрономические объекты')].\n\nЕсли у вас есть [concept_verrier_astronomer], вы даже сможете находить новые планеты, [Concept('concept_verrier_satellite', 'спутники')], [Concept('concept_verrier_comet', 'кометы')] и делать [Concept('concept_verrier_moon_photo', 'фотографии Луны')].\nИногда ваш [concept_agassiz_geologist] может также находить [Concept('concept_verrier_meteorite', 'метеориты')], которые могут быть исследованы #b астрономами#! и [Concept('concept_mendelejew_chemist', '#b #ORANGE химиками#!#!')].\n\nКаждое астрономическое открытие принесёт вам [Concept('concept_verrier_astronomical_prestige', 'астрономический престиж')], который будет добавлен к вашему [Concept('concept_prestige', 'престижу')]. Проверьте модификатор $verrier_astronomical_prestige_modifier$, чтобы увидеть ваш #b астрономический престиж#!."
 concept_verrier_observatory_desc: "#b Обсерватория#! — это основа [Concept('concept_verrier_astronomy', 'астрономии')] и [Concept('concept_mendelejew_chemistry', 'химии')] страны. Оттуда [Concept('concept_verrier_astronomer', '#b #ORANGE астрономы#!#!')] могут открывать планеты, [Concept('concept_verrier_satellite', 'спутники')], [Concept('concept_verrier_astronomical_object', 'астрономические объекты')], [Concept('concept_verrier_comet', 'кометы')] и делать [Concept('concept_verrier_moon_photo', 'фотографии Луны')].\nЧтобы построить #b обсерваторию#!, у вас должен быть университет и исследована технология $verrier_astronomy_tech$ или $verrier_chemistry_tech$. Кроме того, #b обсерватория#! может быть построена только один раз и только в вашей столице."
 concept_verrier_astronomer_desc: "#b Астрономы#! — это учёные, которые будут исследовать небо и открывать [Concept('concept_verrier_satellite', 'спутники')], [Concept('concept_verrier_comet', 'кометы')] и [Concept('concept_verrier_astronomical_object', 'астрономические объекты')].\n#b Астрономы#! получают [Concept('concept_academics_experience', 'опыт')] при открытии #b астрономических объектов#! или посещении конференций. Они также пассивно получают #b опыт#! каждый год. Это позволяет #b астрономам#! получать лучшие черты астронома.\n\n#b Астроном#! может сосредоточиться на открытии новых #b спутников#! или #b фотографировании Луны#!. Однако это уменьшит количество открываемых #b астрономических объектов#!."
 concept_verrier_astronomical_prestige: "Астрономический престиж"
 concept_verrier_astronomical_prestige_desc: "#b Астрономический престиж#! — это количество [Concept('concept_prestige', 'престижа')], которое вы получаете от астрономии. На ваш #b астрономический престиж#! влияют различные факторы:\n- Находка новой планеты принесёт вам от #V 15#! до #V 100#! престижа в зависимости от сложности её обнаружения.\n- Каждый открытый [concept_verrier_satellite] принесёт вам 10 престижа.\n- Завершённая [Concept('concept_verrier_moon_photo', 'карта Луны')] принесёт вам #V 25#! престижа.\n- Большая комета принесёт вам 10 престижа.\n- Каждый [concept_verrier_meteorite] принесёт вам #V 1#! престижа.\n- Каждые #V 100#! [Concept('concept_verrier_astronomical_object', 'астрономических объектов')] принесут вам #V 1#! престижа."
 concept_verrier_astronomical_object_desc: "#b Астрономические объекты#! — это астероиды и звёзды, которые вы открыли. Эти объекты можно обнаружить, если у вас есть [concept_verrier_observatory]. Чем лучше ваша технология астрономии, тем больше объектов вы найдёте. Вы также будете открывать больше #b объектов#!, если у вас есть [concept_verrier_astronomer].\nС достаточным количеством #b астрономических объектов#! вы сможете открывать новые планеты или технологию астрофизики."
 concept_verrier_moon_map: "Карта Луны"
 concept_verrier_moon_photo_desc: "Если у вас есть [concept_verrier_observatory] и вы исследовали технологию «Фотоаппарат», вы сможете приказать своему [Concept('concept_verrier_astronomer', '#b #ORANGE астроному#!#!')] начать фотографировать Луну. Это уменьшит количество [Concept('concept_verrier_astronomical_object', 'астрономических объектов')] от вашего #b астронома#!, но будет давать вам #b фотографии Луны#! каждый год.\nЕсли вы соберёте достаточно #b фотографий Луны#!, вы создадите точную карту спутника Земли. Завершение карты Луны принесёт вашей державе некоторый [Concept('concept_verrier_astronomical_prestige', 'астрономический престиж')]."
 concept_verrier_satellite: "Спутник"
 concept_verrier_satellites: "Спутники"
 concept_verrier_satellite_desc: "#b Спутники#!, или луны, — это [Concept('concept_verrier_astronomical_object', 'астрономические объекты')], которые вращаются вокруг планеты. Некоторые #b спутники#!, такие как Луна Земли, уже открыты, но [concept_verrier_astronomer] может попытаться найти больше.\nКаждый #b спутник#!, открытый вашей страной, принесёт ей небольшое количество [Concept('concept_verrier_astronomical_prestige', 'астрономического престижа')]."
 concept_verrier_meteorite_desc: "Метеориты — это относительно небольшие твёрдые тела космического происхождения, которые прошли через атмосферу Земли и достигли её поверхности. В редких случаях фрагменты метеоритов можно найти после метеорного потока. Метеориты, упавшие на Землю тысячи лет назад, также могут быть найдены [Concept('concept_agassiz_geologist', '#b #GREEN геологами#!#!')] в труднодоступных местах, таких как пустыни и арктические районы. [Concept('concept_mendelejew_chemist', '#b #ORANGE Химики#!#!')] и [Concept('concept_verrier_astronomer', '#b #ORANGE астрономы#!#!')], в частности, интересуются метеоритами и могут захотеть их проанализировать.\n\nКроме того, #b метеориты#! помогают повысить ваш [Concept('concept_agassiz_geological_score', 'геологический счёт')] и позволяют лучше оценить [Concept('concept_agassiz_age_of_earth', 'возраст Земли')]."
 concept_agassiz_volcano_desc: "#b Вулканы#! — это новая черта области в #r Morgenröte#!. В отличие от базовой игры Victoria 3, не стратегические регионы, а скорее области с вулканами связаны с тем, произойдёт ли извержение вулкана. Вулканическая активность значительно выше, но не всегда разрушительна. В странах с вулканами можно построить #b $building_agassiz_volcano_observatory$#!, которая не только помогает предсказывать и смягчать извержения посредством наблюдений, но и является отправной точкой для вулканической экспедиции. [Concept('concept_agassiz_geologist', '#b #GREEN Геологи#!#!')] могут приобретать новые [Concept('concept_agassiz_geological_knowledge', 'геологические знания')], [Concept('concept_agassiz_rare_mineral', 'редкие минералы')], опыт и черту вулканолога в вулканической экспедиции."
 concept_agassiz_geological_knowledge: "Геологические знания"
 concept_agassiz_geological_knowledge_desc: "#b Геологические знания#! включают общее понимание нацией природы Земли. Это очень редкий ресурс, который можно приобрести в основном в ходе геологических вех. #b Геологические знания#! не то же самое, что [concept_agassiz_geological_score], но это самый важный его компонент и считается особенно ценным."
 concept_agassiz_geological_score: "Геологический счёт"
 concept_agassiz_geological_score_desc: "#b Геологический счёт#! включает все достижения и знания нации, связанные с геологией. Важнейшим компонентом являются [concept_agassiz_geological_knowledge], но есть и много других важных факторов; таких как опыт [Concept('concept_agassiz_geologist', '#b #GREEN геолога#!#!')], [concept_agassiz_oceanographic_knowledge], количество [Concept('concept_agassiz_mineral', 'минералов')], [Concept('concept_dubois_fossil', 'окаменелостей')] или [Concept('concept_dubois_specimen', 'образцов')], и геологические технологии. Геологический счёт имеет решающее значение для переоценки [Concept('concept_agassiz_age_of_earth', 'возраста Земли')]."
 concept_agassiz_oceanographic_knowledge: "Океанографические знания"
 concept_agassiz_oceanographic_knowledge_desc: "#b Океанографические знания#! являются частью [Concept('concept_agassiz_geological_knowledge', 'геологических знаний')] и соответствуют знаниям о морях, в частности о течениях, а также общим морским исследованиям в сочетании с геофизическими соображениями. #b Океанографические знания#! в основном приобретаются в ходе [Concept('concept_dubois_pacific_expedition', 'тихоокеанских экспедиций')]. Для приобретения [Concept('concept_agassiz_geological_knowledge', 'геологических знаний')] необходимо 50 единиц #b океанографических знаний#!."
 concept_agassiz_age_of_earth: "Возраст Земли"
 concept_agassiz_age_of_earth_desc: "Одним из главных вопросов XIX века был вопрос о #b возрасте Земли#!. Он имел естественно-научные последствия, особенно в отношении достоверности теории эволюции и последовательности геологических событий. Только [concept_agassiz_geologist] может определить новый возраст Земли. Для этого его нация должна иметь более высокий [Concept('concept_agassiz_geological_score', 'геологический счёт')], чем нация, которая последней определила возраст Земли. Затем он поделится результатами своих исследований с другими коллегами. Он не обязательно должен быть успешным — слишком молодые и неопытные геологи не будут услышаны. Однако иностранные нации немного более сговорчивы, когда в течение многих лет не было представлено ни одной новой теории. Геологи могут оценить возраст Земли только один раз в жизни — но это применимо только в случае успеха. Если вы потерпите неудачу, вы можете попробовать снова после фазы мотивации."
 concept_agassiz_geology: "Геология"
 concept_agassiz_geology_desc: "#b Geology#! is one of the main features of [concept_morgenroete]. Even before the beginning of the Victorian Age, geology had already experienced a significant boom, which is why it is available to many nations at the start of the game.\n\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] can be used in a variety of ways: they can find [Concept('concept_dubois_formation','$concept_dubois_formations$')], [Concept('concept_andersson_cave','$concept_andersson_caves$')] and [concept_curie_uranium] deposits during a geological search, go on [concept_agassiz_volcano] expeditions, determine [concept_agassiz_age_of_earth], find new ore and oil deposits or go on [concept_dubois_pacific_expedition] and [concept_douglas_mountaineering] expeditions useful as scientific companions. A [concept_agassiz_geological_score] evaluates the overall knowledge of a nation and is crucial in determining the age of the earth. [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] and [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] are an essential part of geology; The latter can be used to establish a mineral cabinet in the [concept_dubois_zoo]. A special geological facility is the #b $building_agassiz_volcano_observatory$#!, which carries out volcanological and seismic studies."
 concept_theiler_biologist: "#b #GREEN Биолог#!#!"
 concept_theiler_biologists: "#b #GREEN Биологи#!#!"
 concept_theiler_biologist_desc: "Биолог — это [Concept('concept_academics_academic', 'учёный')], изучающий все аспекты жизни.\nВ модификации [concept_morgenroete] [Concept('concept_theiler_biologist', '#b #GREEN биолог#!#!')] в основном отвечает за исследование [Concept('concept_theiler_microorganism', 'микроорганизмов')], улучшение сельского хозяйства, а также поиск [Concept('concept_theiler_pathogen', 'патогенов')] и создание [Concept('concept_theiler_vaccine', 'вакцин')].\n[Concept('concept_theiler_biologist', '#b #GREEN Биологи#!#!')] получают [Concept('concept_academics_experience', 'опыт')] пассивно или завершая проекты."
 concept_gaudi_architect: "#b #PURPLE Архитектор#!#!"
 concept_gaudi_architects: "#b #PURPLE Архитекторы#!#!"
 concept_academics_university_specialization_desc: "Each University can be specialized by changing its production method.\nA university with a [concept_pm_academics_university_humanities] will allow you to focus your nations research on society innovation and allows to specifically recruit [Concept('concept_panum_physician','$concept_panum_physicians$')], [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] and [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')].\nA university with a [concept_pm_academics_university_natural_history] will allow you to focus your nations research on society innovation and allows to specifically recruit [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')], [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] and [Concept('concept_theiler_biologist','$concept_theiler_biologists$')].\nA university with a [concept_pm_academics_university_mathematics] will allow you to focus your nations research on production and military innovation and allows to specifically recruit [Concept('concept_tesla_engineer','$concept_tesla_engineers$')], [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] and [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')].\nChanging the Specialization will lead to [concept_academics_academic_confusion] which has a #n short negative effect#! for the building and your [concept_academics_progress].\nSpecialized Universities can influence various projects as well. Universities with a $concept_pm_academics_university_mathematics$ focus will help with engineering projects for example."
 concept_pm_academics_university_humanities_desc: "A Humanities-Anthropological Focus specializes the University and allows a national focus on Society Research and to specifically recruit [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] and [Concept('concept_andersson_anthropologist','$concept_andersson_anthropologists$')]. You will get a #n negative throughput modifier#! for the University as well as a #n negative effect#! on your [concept_academics_progress] when you change this production method.\nSpecializing your Universities with the Humanities-Anthropological Focus will give you a bonus on the success chance of Expeditions (maximum of +4 requiring 40 Levels of specialization) and improve the progress for some other projects."
 concept_pm_academics_university_natural_history_desc: "Естественно-научная специализация университета позволяет сосредоточить национальные исследования на обществе и специально нанимать [Concept('#b #GREEN геологов#!#!')], [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтологов#!#!')], [Concept('concept_dubois_naturalist', '#b #GREEN натуралистов#!#!')] и [Concept('concept_dubois_biologist','#b #GREEN биологов#!#!'')]. Вы получите #n отрицательный модификатор производительности#! для университета, а также #n отрицательный эффект#! на ваш [Concept('concept_academics_progress', 'научный прогресс')] при изменении этого метода производства.\nСпециализация ваших университетов на естественно-научном фокусе даст вам бонус к различным проектам ваших учёных-естественников."
 concept_pm_academics_university_mathematics_desc: "Математико-техническая специализация университета позволяет сосредоточить национальные исследования на производстве и военных технологиях и специально нанимать [Concept('concept_tesla_engineer', '#b #ORANGE инженеров#!#!')] или [Concept('concept_verrier_astronomer', '#b #ORANGE астрономов#!#!')]. Вы получите #n отрицательный модификатор производительности#! для университета, а также #n отрицательный эффект#! на ваш [Concept('concept_academics_progress', 'научный прогресс')] при изменении этого метода производства.\nСпециализация ваших университетов на математико-техническом фокусе даст вам бонус к различным проектам ваших [Concept('concept_tesla_engineer', '#b #ORANGE инженеров#!#!')] и [Concept('concept_mendelejew_chemist', '#b #ORANGE химиков#!#!')]."
 concept_panum_physician: "#b #BLUE Врач#!#!"
 concept_panum_physicians: "#b #BLUE Врачи#!#!"
 concept_panum_physician_desc: "#b #BLUE Врачи#!#! — это [Concept('concept_academics_academic', 'учёные')], которые работают и проводят исследования в области [concept_panum_medicine]. Их основная задача — составлять [Concept('concept_panum_disease_description', 'описания болезней')] и находить [Concept('concept_panum_disease_treatment', 'методы лечения')]. Они также могут улучшать медицинские исследования, совершенствовать здравоохранение и лечить других персонажей.\nВрачи получают [concept_academics_experience] во время своей работы и пассивно каждый год. Они могут получать лучшие уровни черты врача, зарабатывая достаточно #b опыта#!."
 concept_panum_medicine: "Медицина"
 concept_panum_medicine_desc: "Медицина — одно из крупнейших расширений [concept_morgenroete] для Victoria 3. Одним из направлений являются эпидемические [Concept('concept_panum_disease', 'заболевания')], такие как холера, туберкулёз и тиф, которые веками досаждали человечеству и, наконец, были взяты под контроль благодаря научным достижениям. Эпидемические заболевания, следовательно, являются одним из негативных событий в [concept_morgenroete]. Сдерживание через поиск [Concept('concept_panum_disease_treatment', 'методов лечения')] поэтому ещё более важно. Центральным компонентом медицины, следовательно, является [concept_panum_physician], который является одним из учёных антрополого-гуманистической специализации университета. Он может описывать эпидемические заболевания и находить методы лечения. Метод лечения обычно требует [Concept('concept_panum_disease_description', 'описания болезни')] и технологии. Врач также может улучшать исследования медицинских технологий или расширять здравоохранение через больницы, а также внедрять новые медицинские методики и лечить других персонажей. Медицинские конференции помогают распространять медицинские знания на международном уровне. Важным шагом в модернизации медицины также является переход от миазматической теории к [Concept('concept_panum_germ_theory', 'микробной теории')]. Нация, которая является лидером в медицинских открытиях, также может демонстрировать высокий [Concept('concept_panum_medical_prestige', 'медицинский престиж')]."
 concept_panum_disease: "Болезнь"
 concept_panum_diseases: "Болезни"
 concept_panum_disease_desc: "Термин «болезнь» обычно относится к эпидемическим заболеваниям, которые могут поражать нацию каждые несколько лет. [concept_panum_physician] может противодействовать им, составляя [Concept('concept_panum_disease_description', 'описания болезней')] и предоставляя [Concept('concept_panum_disease_treatment', 'методы лечения')]. Эпидемические заболевания обычно не возникают одновременно, и требуется некоторое время, чтобы эпидемические заболевания вспыхнули снова. В зависимости от типа эпидемические заболевания могут иметь разрушительный эффект и распространяться на несколько областей. Существуют различные методы [Concept('concept_panum_disease_prevention', 'профилактики заболеваний')] для задержки начала такой болезни или смягчения её последствий. Причины болезни могут быть очень разными. Жёлтая лихорадка встречается только в тропических регионах, а холера и туберкулёз требуют минимального уровня урбанизации для проявления. Уровень жизни и уровень опустошения в области также играют роль.\n\nПомимо этих особо опасных эпидемических заболеваний, существуют также повседневные болезни, которые врач может случайно исследовать во время медицинских исследований. К таким заболеваниям относятся рахит, пеллагра и сифилис."
 concept_panum_disease_description: "Описание болезни"
 concept_panum_disease_descriptions: "Описания болезней"
 concept_panum_disease_description_desc: "Описания — это первый шаг к пониманию [Concept('concept_panum_disease', 'болезни')]. Они не влияют на тяжесть эпидемии, но являются основополагающими для поиска [Concept('concept_panum_disease_treatment', 'методов лечения')], [Concept('concept_theiler_pathogen', 'патогенов')] и [Concept('concept_theiler_vaccine', 'вакцин')]. Описания болезней не имеют дополнительных требований: всё, что требуется, — это эпидемическое заболевание и [concept_panum_physician]."
 concept_panum_disease_treatment: "Метод лечения"
 concept_panum_disease_treatments: "Методы лечения"
 concept_panum_disease_treatment_desc: "[concept_panum_physician] при наличии соответствующей технологии и [Concept('concept_panum_disease_description', 'описания болезни')] может найти метод лечения [Concept('concept_panum_disease', 'болезни')] в ходе длительного процесса. Лечение — это не то же самое, что излечение. Скорее, врач выясняет причину болезни и на этой основе разрабатывает методы предотвращения или значительного ограничения вспышки. Методы лечения ограничивают продолжительность эпидемического заболевания несколькими месяцами или неделями, а также предотвращают его распространение на другие области. Методы лечения являются частью возможной [Concept('concept_panum_disease_prevention', 'профилактики заболеваний')] против эпидемических вспышек."
 concept_panum_disease_prevention: "Профилактика заболеваний"
 concept_panum_disease_prevention_no_disease: "Профилактика"
 concept_panum_disease_prevention_desc: "Существует несколько способов избежать или по крайней мере смягчить эпидемическое [Concept('concept_panum_disease', 'заболевание')]. Самым известным методом является [concept_panum_disease_treatment], разработанный [Concept('concept_panum_physician', '#b #BLUE врачом#!#!')]. Он значительно сокращает время, в течение которого бушует болезнь, а также снижает вероятность её распространения на другую страну. Уровень жизни, больницы, технологии и высокий уровень учреждений здравоохранения также оказывают влияние. Окончательной профилактикой является [concept_theiler_vaccine], которая предотвращает возникновение болезни в первую очередь. Вакцины разрабатываются [Concept('concept_theiler_biologist', 'биологами')]. Однако она эффективна только в том случае, если учреждение здравоохранения достигло по крайней мере уровня, указанного в медицинском факультете. В конце концов, распространение вакцины должно быть организовано и проконтролировано."
 concept_panum_disease_type: "Тип болезни"
 concept_panum_disease_types: "Типы болезней"
 concept_panum_disease_type_desc: "Эпидемические [Concept('concept_panum_disease', 'болезни')] можно различать по степени их распространения. #V Локальные болезни#!, такие как скарлатина, ограничиваются областью, в которой они вспыхнули. #V Региональные болезни#!, такие как туберкулёз, могут распространяться на некоторые соседние области, но не дальше. #V Трансрегиональные болезни#! — самой известной из которых является холера — могут распространяться по всей стране, даже если области не граничат друг с другом."
 concept_panum_local_disease: "Локальная болезнь"
 concept_panum_local_diseases: "Локальные болезни"
 concept_panum_regional_disease: "Региональная болезнь"
 concept_panum_regional_diseases: "Региональные болезни"
 concept_panum_transregional_disease: "Трансрегиональная эпидемия"
 concept_panum_transregional_diseases: "Трансрегиональные эпидемии"
 concept_panum_germ_theory: "Микробная теория"
 concept_panum_germ_theory_desc: "Микробная теория — одно из фундаментальных медицинских научных достижений XIX века. Она заменила предыдущие, более архаичные теории, такие как миазматическая теория, которая была широко распространена в Европе и представляет все традиционные попытки объяснить причину [Concept('concept_panum_disease', 'болезней')]. Открытие микробной теории приносит пользу не только первому открывателю. При поиске [Concept('concept_panum_disease_treatment', 'методов лечения')] шансы на успех немного выше, потому что это предотвращает некоторые негативные события и открывает больше положительных."
 concept_panum_medical_prestige: "Медицинский престиж"
 concept_panum_medical_prestige_desc: "Медицинский престиж складывается из [Concept('concept_panum_disease_description', 'описаний болезней')] (2 очка), [Concept('concept_panum_disease_treatment', 'методов лечения')] (4 очка), [Concept('concept_theiler_pathogen', 'патогенов')] (3 очка) и [Concept('concept_theiler_vaccine', 'вакцин')] (4 очка), открытых на данный момент. Первые открытия дают в два раза больше очков. Дополнительный медицинский престиж может быть получен за излечение повседневных болезней, изобретение особых методов лечения или общее улучшение системы здравоохранения с помощью [concept_panum_physician]."
 concept_theiler_pathogen: "Патоген"
 concept_theiler_pathogens: "Патогены"
 concept_theiler_pathogen_desc: "Патоген — это название возбудителя, вызывающего [concept_panum_disease|l]. Это может быть что угодно: от организма до [Concept('concept_theiler_microorganism', 'микроорганизма')]. Чаще всего это бактерия, паразит или вирус.\n[concept_theiler_biologist], имеющий доступ к достаточному количеству микроорганизмов, может попытаться найти патоген, вызывающий болезнь. Это поможет предотвратить заболевание, а также открыть и произвести [Concept('concept_theiler_vaccine', 'вакцину')]."
 concept_theiler_vaccine: "Вакцина"
 concept_theiler_vaccines: "Вакцины"
 concept_theiler_vaccine_desc: "Открытие вакцин позволило людям обрести иммунитет к [Concept('concept_panum_disease', 'болезням')] без заражения и потенциально может спасти миллионы жизней.\nЧтобы создать вакцину, [concept_theiler_biologist|l] должен сначала найти [concept_theiler_pathogen|l], вызывающий болезнь. После этого, при наличии достаточного количества [Concept('concept_theiler_microorganism', 'микроорганизмов')], можно приступать к разработке."
 concept_panum_red_cross: "Красный Крест"
 concept_panum_red_cross_desc: "Красный Крест — одна из первых международных организаций и, в редких случаях, предоставляет возможность получить медиков Красного Креста во время войны. Члены Красного Креста также получают определённые бонусы. В зависимости от правила игры, Красный Крест может быть основан исторически или динамически; признанные государства могут присоединиться при определённых технологических требованиях. Основатель получает штаб-квартиру Красного Креста в своей столице. Члены могут присоединиться к трём [Concept('concept_panum_convention', 'конвенциям')], которые являются обязательными по международному праву."
 concept_panum_convention: "Международная конвенция"
 concept_panum_conventions: "Международные конвенции"
 concept_panum_convention_desc: "Международная конвенция — это совместная декларация о намерениях государств установить определённые правила игры в международных отношениях. В XIX веке было несколько примеров этого, таких как Женевская конвенция или Гаагский кодекс сухопутной войны. Общим для всех конвенций является то, что они пытаются смягчить ужасы войны. Поэтому военные варианты предпочитаются безопасной медицинской помощи раненым, а абсолютное оружие запрещается, что приводит к определённому сдерживанию войны. Преимуществом является большая гибкость. В то время как принятие конвенции рассматривается благосклонно, отмена конвенции может привести к международному гневу.\n\nМеждународные конвенции обычно являются необязательными декларациями о намерениях. Однако, если достаточное количество членов [Concept('concept_panum_red_cross', 'Красного Креста')] подпишет её, со временем она станет действующим международным правом, которое все подписавшие стороны должны соблюдать, — и другие члены также подпишут её. Это происходит, когда 65% всех членов и большинство великих держав соглашаются с этой конвенцией, — тогда все остальные члены вынуждены её соблюдать. Эту конвенцию тогда уже нельзя отменить как обычно. Чтобы избежать обязательных конвенций, необходим полный выход из Красного Креста — со всеми последствиями."
 concept_manzoni_literary_tradition_desc: "#b Литературная традиция#! — это отражение литературных достижений и традиций нации.\nСуществуют различные способы получения #b литературной традиции#!. Наличие хотя бы одной $building_art_academy$, одного или нескольких [Concept('concept_manzoni_local_writer', 'местных писателей')], [concept_manzoni_national_writer] и наличие определённых [Concept('concept_artists_center_of_arts', 'центров искусств')] будет пассивно добавлять #b литературную традицию#! вашей стране.\nЧем больше #b литературной традиции#! получает ваша нация, тем выше бонус к престижу, который вы получаете. Кроме того, это позволит вам разблокировать [Concept('concept_artists_art_style', 'художественный стиль')] [concept_elgar_expressionism]."
 concept_elgar_musical_tradition_desc: "#b Музыкальная традиция#! — это отражение музыкальных достижений и традиций нации.\nСуществуют различные способы получения #b музыкальной традиции#!. Если у вас есть хотя бы одна [concept_elgar_opera], вы будете пассивно получать #b музыкальную традицию#!. Чем больше у вас #b опер#!, тем больше вы получаете. Вы также можете получать больше #b музыкальной традиции#! от музыкальных и художественных технологий. Каждая технология даёт разный бонус. Вы также можете получать #b музыкальную традицию#! из событий, особенно если у вас есть [concept_elgar_composer].\nЧем больше #b музыкальной традиции#! получает ваша нация, тем выше бонус к престижу, который вы получаете. Кроме того, это позволит вам разблокировать [Concept('concept_artists_art_style', 'художественный стиль')] [concept_elgar_impressionism]."
 concept_klimt_painting_tradition_desc: "#b Художественная традиция#! — это отражение достижений и традиций живописи нации. Её можно получить за наличие #b Академий искусств#!, [Concept('concept_klimt_painter', '#b #PURPLE художников#!#!')], определённых [Concept('concept_technology', 'технологий')] или из событий.\n#b Художественная традиция#! позволяет вам разблокировать [Concept('concept_artists_art_style', 'художественный стиль')] [concept_elgar_art_nouveau] и используется для расчёта вашей #b культурной традиции#!."
 concept_mendelejew_theorized_elements: "Теоретизированные элементы"
 concept_mendelejew_discovered_elements: "Открытые элементы"
 concept_mendelejew_isolated_elements: "Выделенные элементы"
 concept_panum_psycho_point: "Психотерапевтический балл"
 concept_panum_psycho_points: "Психотерапевтические баллы"
 concept_panum_psycho_point_desc: "Психотерапевтические баллы — это абстрактная валюта, которая представляет прогресс страны в области психиатрии и психологии. Они генерируются ежемесячно из технологий, психиатрической лечебницы или [Concept('concept_panum_physician', '#b #BLUE врача#!#!')] с чертой характера #V «Психиатр»#!. Психотерапевтические баллы также можно получить через событие. Большое количество психотерапевтических баллов приводит к лучшим шансам на излечение персонажей с психическими заболеваниями. Переход на новый психотерапевтический уровень также даёт бонусы к исследованиям и [Concept('concept_academics_progress', 'научному прогрессу')]. Определённое количество психотерапевтических баллов является требованием для большинства психологических школ."
