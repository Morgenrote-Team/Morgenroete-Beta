 concept_dubois_dinosaur_bone_no_dinosaur: "Кость"
 concept_dubois_dinosaur_bones_no_dinosaur: "Кости"
 concept_dubois_paleontological_expedition_desc: "[concept_dubois_paleontologist] может быть отправлен в [Concept('concept_dubois_formation', 'формации')]. Это займёт 1 год, и в зависимости от успеха экспедиции вы получите [Concept('concept_dubois_fossil', 'окаменелости')] и [Concept('concept_dubois_dinosaur_bone', 'кости динозавров')]. Когда вы завершите экспедицию и если у вас есть свободная [concept_dubois_paleontological_team], вы можете организовать [Concept('concept_dubois_paleontological_excavation', 'палеонтологические раскопки')] для пассивного получения окаменелостей и костей из этого региона.\nСамый простой способ получить доступ к формации — контролировать соответствующую область. Однако доступ также можно получить мирным путём через [Concept('concept_dubois_paleontological_licence', 'палеонтологические лицензии')]."
 concept_dubois_paleontological_team: "Палеонтологическая группа"
 concept_dubois_paleontological_teams: "Палеонтологические группы"
 concept_dubois_paleontological_team_desc: "Палеонтологические группы можно использовать для организации [Concept('concept_dubois_paleontological_excavation', 'палеонтологических раскопок')] после завершения [Concept('concept_dubois_paleontological_expedition', 'палеонтологической экспедиции')]. Это позволит вам пассивно получать [Concept('concept_dubois_fossil', 'окаменелости')] и [Concept('concept_dubois_dinosaur_bone', 'кости динозавров')]."
 concept_dubois_paleontological_excavation: "Палеонтологические раскопки"
 concept_dubois_paleontological_excavations: "Палеонтологические раскопки"
 concept_dubois_paleontological_excavation_desc: "Вы можете организовать палеонтологическую экспедицию после завершения [Concept('concept_dubois_paleontological_expedition', 'палеонтологической экспедиции')], если у вас есть свободная [concept_dubois_paleontological_team]. Палеонтологические раскопки позволят вашей группе пассивно производить [Concept('concept_dubois_fossil', 'окаменелости')] и [Concept('concept_dubois_dinosaur_bone', 'кости динозавров')]."
 concept_verrier_venus_transit: "Прохождение Венеры"
 concept_verrier_venus_transit_desc: "Прохождение Венеры относится к редкому явлению, когда Луна проходит между Землёй и Венерой. Однако в XIX веке это произошло дважды: в 1874 и 1882 годах. Поскольку наблюдения за прохождением Венеры позволяют сделать выводы о размере Солнечной системы и более точно определить размер астрономической единицы (АЕ), это были крупные научные события. Страны, расположенные в [Concept('concept_verrier_venus_transit_zone', 'зоне прохождения Венеры')], могут наблюдать это событие оттуда; другие страны должны отправлять экспедиции. Успех наблюдения зависит от опыта [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')], наличия [Concept('concept_tesla_engineer', '#b #ORANGE инженера#!#!')] и немного удачи: иногда погода может помешать хорошему изображению. Чем лучше наблюдение, тем больше бонус."
 concept_verrier_venus_transit_zone: "Зона прохождения Венеры"
 concept_verrier_venus_transit_zone_desc: "Зона прохождения Венеры относится к той части Земли, с которой можно наблюдать полное (а не только частичное) прохождение Венеры. В 1874 году это было особенно актуально для региона Восточной Азии и Тихого океана, а в 1882 году — для почти всего американского континента. Подробная разбивка по стратегическим регионам приведена ниже.\n\n#V Прохождение Венеры 1874:#!\nИндонезия, Индокитай, Океания, Южный Китай, Северный Китай, Маньчжурия, Япония, Центральная Индия, Мадрас, Бенгалия, Гималаи; также область Индийского океана.\n\n#V Прохождение Венеры 1882:#!\nБразилия, Ла-Плата, Анды, Великая Колумбия, Мексика, Центральная Америка, Карибы, Средний Запад, Дикси, Новая Англия; также области Онтарио и Квебек."
 concept_vikelas_coach: "Тренер"
 concept_vikelas_coaches: "Тренеры"
 concept_vikelas_coach_desc: "Тренеры — это национальные тренеры страны в определённом национальном виде спорта. Национальные виды спорта включают [concept_vikelas_football], бейсбол, баскетбол и крикет. Тренеры предоставляют бонусы для соответствующей команды на соревнованиях — будь то на чемпионатах мира или на международных матчах. Последние проводятся тайно через равные промежутки времени и повышают значение опыта тренера при победе. Высокие очки опыта и положительные [Concept('concept_character_trait', 'черты характера')] повышают шанс на победу в чемпионате мира. Положительные черты — это те, которые особенно мотивируют игроков, такие как амбициозный или харизматичный, — в то время как демотивирующие черты снижают шанс на победу в матче. К ним относятся такие черты, как безжалостный или жестокий.\n\n#R ПРИМЕЧАНИЕ: На данный момент интегрирован только футбол.#!"
 concept_vikelas_football: "Футбол"
 concept_vikelas_football_desc: "Футбол — возможный национальный вид спорта. Первые футбольные клубы могут быть созданы в Европе и Южной Америке; для этого потребуется относительно либеральная правовая система, сильная мелкая буржуазия или значительный средний уровень жизни. После этого можно будет время от времени играть в футбол. С созданием ФИФА также становятся возможными международные матчи и чемпионат мира. Восемь лучших команд автоматически квалифицируются на чемпионат мира. Команды рассчитываются по значению национальной футбольной команды (NFTV), которое выводится из параметров уровня жизни (физическая подготовка населения), силы мелкой буржуазии (клубная система), грамотности (тактика) и традиции (национальный спорт: да или нет?). В матчах учитывается не только NFTV, но и черты характера и опыт [Concept('concept_vikelas_coach', 'тренера')]."
 concept_gaudi_architectural_splendour: "Архитектурное великолепие"
 concept_gaudi_architectural_splendour_desc: "Архитектурное великолепие — это собирательный термин для обозначения впечатляющих достижений в современной архитектуре, относящийся в первую очередь к ар-деко, баухаузу и неоклассицизму, возникшим в начале XX века. Это значение представляет собой трансформацию устаревших форм в архитектуру будущего. Ар-деко требует достижения более высокого порога для осуществления мечты о городе в стиле ар-деко, однако и преимущества от этого больше."
 concept_artists_artist_desc: "В моде [concept_morgenroete] #b деятели искусства#! — это особые персонажи, которые открывают доступ к определённым механикам. Вы можете получить #b деятелей искусства#! в некоторых событиях или накопив достаточно [Concept('concept_artistic_progress', 'творческого прогресса')]. У деятелей искусства есть [concept_artists_experience], которая отражает их положение в соответствующей области.\nВ настоящее время существуют следующие #b деятели искусства#!:\n - [concept_elgar_composer]\n - [concept_klimt_painter]\n - [concept_manzoni_writer]\n - [concept_gaudi_architect]"
 concept_elgar_architecture_desc: "Архитектура — одна из основных концепций [concept_morgenroete]. Она разделена на две большие части.\n\nС одной стороны, [concept_gaudi_monuments] были полностью переработаны: они больше не строятся напрямую, а расширяются шаг за шагом на основе решений. С другой стороны, были добавлены многочисленные памятники — некоторые из них должны быть построены, другие существуют в начале игры.\n\nДругим ключевым моментом является введение [Concept('concept_gaudi_architect', 'архитектора')], который может улучшать города и проектировать до 15 новых уникальных сооружений, исследуя [Concept('concept_gaudi_architectural_blueprint', 'архитектурные чертежи')]. Архитекторы также могут перестраивать страну в стилях баухауз, неоклассицизм и ар-деко. [concept_gaudi_great_architect] может даже спроектировать свой собственный [Concept('concept_gaudi_custom_monument', 'особый памятник')]!"
 concept_gaudi_architect_desc: "#PURPLE #b Архитекторы#!#! — это [Concept('concept_artists_artist', 'деятели искусства')], чьи навыки связаны с городским планированием, проектированием сооружений и строительством. Это особый тип персонажей, которых вы можете получить либо из событий, либо набрав достаточно [Concept('concept_artistic_progress', 'творческого прогресса')] для его появления в вашей стране, либо предложив должность [Concept('concept_gaudi_independent_architect', 'независимому архитектору')].\nВ то время как другие деятели искусства скорее накапливают культурную традицию, архитекторы лишь изредка генерируют очень ценное [Concept('concept_gaudi_architectural_splendour', 'архитектурное великолепие')], когда они участвуют в городском планировании или расширении столицы, или когда они полностью перепроектируют страну в определённом архитектурном стиле. Их основная задача носит более практический характер. Они работают в общественном строительстве, тем самым предоставляя нации дополнительные очки строительства. Они улучшают инфраструктуру через планирование и превращают столицы в удобные для жизни места. Архитекторы также могут оттачивать свои навыки в учебной поездке или написать архитектурный трактат.\nПервостепенное значение имеет проектирование новых, уникальных сооружений, для которых они создают [Concept('concept_gaudi_architectural_blueprint', 'архитектурные чертежи')]. Всего можно исследовать 15 таких [Concept('concept_gaudi_blueprint_buildings', 'сооружений по чертежам')] — поскольку это занимает много времени, стоит подумать, какие из них имеют смысл.\nАрхитекторы также предоставляют пассивный бонус: само их присутствие ускоряет строительство [Concept('concept_gaudi_monuments', 'памятников')] на 100%. Величайшим достижением архитектора является проектирование собственного [Concept('concept_gaudi_custom_monument', 'особого памятника')]. Это возможно только с [Concept('concept_gaudi_great_architect', 'великим архитектором')]."
 concept_douglas_mountaineering: "Альпинизм"
 concept_douglas_mountaineering_desc: "Страны, владеющие хотя бы одной [Concept('concept_douglas_mountain_summit', 'горной вершиной')] или имеющие #b лицензию на альпинизм#! со страной, у которой она есть, могут заниматься альпинизмом. Чтобы начать #b горную экспедицию#!, вам нужны технологии «#b Разведка#!» и «#b Национализм#!», а также генерал с чертой «#b Альпинист#!», «#b Исследователь#!», «#b Горный командир#!» или «#b Топограф#!».\nКак только вы начнёте #b горную экспедицию#!, вам сначала придётся выбрать, какой генерал будет главным альпинистом. Затем вы выберете вершину для восхождения.\nЧем выше горы, тем опаснее восхождение. Горы классифицируются по высоте в метрах от менее 4000 до более 8000 метров. Успех зависит от исследованных военных технологий, возраста и здоровья лидера, а также его характеристик. Лавины и крутые склоны могут представлять серьёзный риск, угрожающий всему предприятию.\nВы даже можете отправить дополнительного [Concept('concept_academics_academic', 'учёного')] в поездку. Либо [concept_dubois_naturalist], либо [concept_dubois_paleontologist] помогут узнать больше о горе, на которую вы взобрались.\nВ конце вы получите бонус к престижу, а ваш генерал разовьёт лучшие черты, которые помогут ему как в бою, так и в альпинизме."
 concept_gaudi_great_architect: "#PURPLE #b Великий архитектор#!#!"
 concept_gaudi_great_architects: "#PURPLE #b Великие архитекторы#!#!"
 concept_gaudi_great_architect_desc: "#b Великие архитекторы#! — это [Concept('concept_gaudi_architect', 'архитекторы')], которые считаются самыми важными умами в своей области. #b Архитекторы#!, достигшие 500 единиц [Concept('concept_artists_experience', 'репутации')], станут #b великими архитекторами#!. Если деятель искусства достигнет этого особого ранга, он или она сможет спроектировать чертёж поистине выдающегося [Concept('concept_gaudi_custom_monument', 'особого памятника')], который воплотит дух нации."
 concept_gaudi_monuments: "Памятники в #R Morgenröte#!"
 concept_gaudi_monuments_desc: "Многие нации получили новые #b памятники#! в [concept_morgenroete]: #b Кёльнский собор#! в Германии, #b Готтардская железная дорога#! в Швейцарии, #b Христос-Искупитель#! в Бразилии, #b Моле-Антонеллиана#! в Италии, #b Летний дворец#! в Китае, #b Саграда-Фамилия#! в Испании, #b замок Нойшванштайн#! в Баварии, #b Дворец изящных искусств#! в Мексике и #b дворец Кёнбоккун#! в Корее.\nВсе сооружения, кроме #b Летнего дворца#! и #b Кампанилы#!, должны быть построены их владельцем, #b Саксонский дворец#! может быть восстановлен польской нацией. Есть также новые памятники в начале игры, такие как #b Бамианские статуи Будды#! или #b дворец Потала#!.\nТакже есть возможность заказать проектирование [Concept('concept_gaudi_custom_monument', 'особого памятника')] у [Concept('concept_gaudi_great_architect', 'великого архитектора')].\n\nВ отличие от ванильной игры, #b памятники#! строятся не напрямую, а через решение. Строительство происходит в несколько этапов, в зависимости от размера сооружения, и может занять годы или даже десятилетия — и стоит значительно дороже."
 concept_athletes_athlete: "Спортсмен"
 concept_athletes_athletes: "Спортсмены"
 concept_athletes_athlete_desc: "В моде [concept_morgenroete] #b спортсмены#! — это особые персонажи, которые открывают доступ к определённым механикам мода. #b Спортсмены#! обычно создаются через события или с помощью кнопки. Как и другие персонажи, #b спортсмены#! обладают опытом, который гарантирует больший успех в их области.\nВ настоящее время существуют следующие #b спортсмены#!:\n - [concept_curtiss_balloonist]\n - [concept_curtiss_pilot]\n - [concept_vikelas_olympian]\n - [concept_douglas_mountaineer]\n - [concept_vikelas_coach]\n - [concept_vikelas_racer]"
 concept_gaudi_independent_architect: "Независимый архитектор"
 concept_gaudi_independent_architects: "Независимые архитекторы"
 concept_gaudi_independent_architect_desc: "[Concept('concept_gaudi_architect', 'Архитекторы')], которые не наняты страной, являются #b независимыми архитекторами#!.\nВ отличие от многих других деятелей искусства, для найма #b независимого архитектора#! существует немного требований, за исключением минимального технологического. Они настоящие путешественники и обычно требуют только хорошей оплаты."
 concept_gaudi_architectural_blueprint: "Архитектурный чертёж"
 concept_gaudi_architectural_blueprints: "Архитектурные чертежи"
 concept_gaudi_architectural_blueprint_desc: "Архитектурные чертежи могут быть исследованы [Concept('concept_gaudi_architect', 'архитекторами')]. Они необходимы для строительства особых [Concept('concept_gaudi_blueprint_buildings', 'сооружений по чертежам')], которые могут быть возведены только один раз в державе. Всего существует 15 различных сооружений в пяти разных категориях. Некоторые чертежи требуют исследования технологий. Поскольку исследования иногда могут занимать годы, разумно заранее решить, какие чертежи наиболее важны. Сооружения потенциально могут быть построены в любой области, но требуют определённого уровня урбанизации. В некоторых случаях могут быть дополнительные требования."
 concept_gaudi_blueprint_buildings: "Сооружения по чертежам"
 concept_gaudi_blueprint_buildings_desc: "Сооружения по чертежам — это сооружения, для которых требуется чертёж, исследованный [Concept('concept_gaudi_architect', 'архитекторами')]. Эти сооружения могут быть построены только один раз в державе. Существует 15 различных сооружений:\n\n#b Памятник#!\n- [GetBuildingType('building_gaudi_statue').GetName]\n- [GetBuildingType('building_gaudi_fountain').GetName]\n- [GetBuildingType('building_gaudi_arch').GetName]\n\n#b Общественная площадь#!\n- [GetBuildingType('building_gaudi_park').GetName]\n- [GetBuildingType('building_gaudi_luna').GetName]\n- [GetBuildingType('building_gaudi_parade').GetName]\n\n#b Служебные сооружения#!\n- [GetBuildingType('building_gaudi_almshouse').GetName]\n- [GetBuildingType('building_gaudi_school').GetName]\n- [GetBuildingType('building_gaudi_prison').GetName]\n\n#b Учреждения здравоохранения#!\n- [GetBuildingType('building_gaudi_canalization').GetName]\n- [GetBuildingType('building_gaudi_hospital').GetName]\n- [GetBuildingType('building_gaudi_health').GetName]\n\n#b Национальные академии#!\n- [GetBuildingType('building_gaudi_science').GetName]\n- [GetBuildingType('building_gaudi_arts').GetName]\n- [GetBuildingType('building_gaudi_sports').GetName]"
 concept_gaudi_custom_monument: "Особый памятник"
 concept_gaudi_custom_monument_desc: "Особый памятник — это величайший возможный шедевр [Concept('concept_gaudi_architect', 'архитектора')]. Он может конкурировать с другими, обычными памятниками. Только [concept_gaudi_great_architect] может составить такие планы. Это требует исследования самых современных архитектурных технологий. Тип памятника, который проектирует архитектор, во многом зависит от его архитектурного стиля. Архитекторы ар-деко проектируют [GetBuildingType('building_gaudi_people_monument').GetName], архитекторы баухауза — [GetBuildingType('building_gaudi_people_forum').GetName], а архитекторы-неоклассицисты — [GetBuildingType('building_gaudi_people_palace').GetName]."
 concept_douglas_mountaineer: "Альпинист"
 concept_douglas_mountaineers: "Альпинисты"
 concept_douglas_mountaineer_desc: "#b Альпинисты#! — это [Concept('concept_athletes_athlete', 'спортсмены')], которые могут взбираться на непокорённые [Concept('concept_douglas_mountain_summit', 'горные вершины')]. Их можно нанимать за [Concept('concept_douglas_alpine_heritage', 'альпийское наследие')] после создания альпинистского клуба. Страны с географическими особенностями, такими как горы, вершины или вулканы, поэтому имеют преимущество в найме. Черты и опыт альпинизма являются наиболее важными факторами для прогресса в покорении горы или преодолении опасной ситуации.#!"
 concept_vikelas_olympian: "Олимпиец"
 concept_vikelas_olympian_desc: "#n Эта запись пересматривается.#!"
 concept_douglas_mountain_summit: "Горная вершина"
 concept_douglas_mountain_summits: "Горные вершины"
 concept_douglas_mountain_summit_desc: "Горные вершины — заветная цель всех альпинистов. Они отмечают самую высокую точку горы. Каждая вершина имеет три отличительных признака, которые определяют, насколько сложно её успешно достичь.\n\n#V Высота#!: Высота определяет, сколько шагов требуется для восхождения на гору, что отражает общую продолжительность экспедиции. На каждые 1000 метров требуется один шаг прогресса. Значение округляется в большую сторону, что означает, что для горы Уитни высотой 4421 метр требуется 5 шагов, в то время как для пика Кауфмана высотой 7134 метра — 8. Престиж горы рассчитывается на основе её высоты: общая высота делится на 300. Таким образом, идеальная гора высотой 4500 метров даёт 15 престижа.\n\n#V Уровень#!: Уровень горы представляет собой требования к снаряжению, необходимому для восхождения. Это не строго связано с её высотой. Например, несмотря на свои 5636 метров, Орисаба имеет только 1-й уровень и требует только базового снаряжения. В отличие от этого, Маттерхорн высотой всего 4478 метров считается значительно более сложным на 3-м уровне, требуя как минимум подготовки к оказанию первой помощи в альпийских чрезвычайных ситуациях.\n\n#V Риск#!: Уровень риска горы указывает на вероятность негативных событий, влияющих на экспедицию. Он не зависит ни от высоты, ни от уровня. Лавины, туман и суровая погода являются ключевыми проблемами. На Попокатепетль можно было взойти уже в раннее Новое время благодаря его гостеприимным окрестностям. В отличие от этого, гораздо меньший Гросвенедигер, высотой всего 3666 метров, всё ещё представлял серьёзную угрозу для австрийских экспедиций вплоть до начала XIX века.\n\nБолее подробную информацию об отдельных вершинах можно найти в разделе [concept_douglas_mountain_summit_list]."
 concept_douglas_mountain_range: "Горный хребет"
 concept_douglas_mountain_ranges: "Горные хребты"
 concept_douglas_mountain_range_desc: "Горный хребет определяется как горное образование, которое предлагает потенциал для тренировок по [Concept('concept_douglas_mountaineering', 'альпинизму')] на большие расстояния. Классические горные хребты включают Скалистые горы, Анды, Альпы и Кавказ. В отличие от [Concept('concept_douglas_mountain_summit', 'горных вершин')], которые нужно покорять, есть также много менее сложных гор, где нет риска смертельного падения [Concept('concept_douglas_mountaineer', 'альпиниста')]. Скорее, их следует рассматривать как тренировочный маршрут. Страны с горными хребтами с большей вероятностью будут производить альпинистов, чем те, у которых нет этой географической особенности."
 concept_douglas_alpine_heritage: "Альпийское наследие"
 concept_douglas_alpine_heritage_desc: "Альпийское наследие — это собирательный термин для обозначения связи с горами и специализации в восхождении на горы. Он также относится к потенциалу для найма новых [Concept('concept_douglas_mountaineer', 'альпинистов')], поскольку в большинстве случаев опытные альпинисты происходят из горных районов. Это всегда даёт преимущество странам с [Concept('concept_douglas_mountain_range', 'горными хребтами')] или [Concept('concept_douglas_mountain_summit', 'горными вершинами')]. Наём нового альпиниста, а также различные другие действия, стоят альпийского наследия."
 concept_douglas_mountain_summit_list: "Список горных вершин"
 concept_douglas_mountain_summit_list_desc: "There are many [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] that can be climbed.\n\n#V North America:#!\n#b Mount McKinley#! (Alaska), Height 6190 meters, Level 4\n#b Mount Logan#! (Yukon Territory), Height 5959 meters, Level 4\n#b Citlaltépetl#! (México), Height 5636 meters, Level 1\n#b Mount Whitney#! (California), Height 4421 meters, Level 1\n\n#V South America:#!\n#b Aconcagua#! (Mendoza), Height 6267 meters, Level 3\n#b Huascarán#! (Lima Territory), Height 6768 meters, Level 5\n#b Illimani#! (La Paz), Height 6438 meters, Level 4\n#b Chimborazo#! (Ecuador), Height 6267 meters, Level 1\n\n#V Europe:#!\n#b Shkara#! (Greater Caucasus), Height 5642 meters, Level 4\n#b Dufourspitze#! (West Switzerland), Height 4634 meters, Level 2\n#b Matterhorn#! (West Switzerland), Height 4478 meters, Level 3\n#b Aiguille Verte#! (Savoy), Height 4122 meters, Level 3\n#b Pico de Aneto#! (Aragon), Height 3404 meters, Level 1\n\n#V Africa:#!\n#b Kibo#! (Tanganyika), Height 5895 meters, Level 2\n#b Mount Kenya#! (Kenya), Height 5199 meters, Level 3\n#b Mount Stanley#! (Uganda), Height 5109 meters, Level 3\n#b Mount Cameroon#! (South Cameroon), 4095 meters, Level 1\n\n#V Asia:#!\n#b Kamet#! (Delhi), Height 7756 meters, Level\n#b Chogolisa#! (Kashmir), Height 7665 meters, Level 5\n#b Kabru#! (Himalayas), Height 7412 meters, Level 5\n#b Kaufmann Peak#! (Tajikistan), Height 7134 meters, Level 4\n\n#V Australia & Oceania:#!\n#b Mount Wilhelm#! (Eastern New Guinea), Height 4121 meters, Level 2\n#b Mount Cook#! (South Island), Height 3724 meters, Level 2"
 concept_panum_disease_description_describe: "описать"
 concept_panum_disease_description_described: "описана"
 concept_panum_disease_treatment_treat: "лечить"
 concept_panum_disease_treatment_treated: "вылечена"
 concept_roy_ethnologist: "#b #ORANGE Этнолог#!#!"
 concept_roy_ethnologists: "#b #ORANGE Этнологи#!#!"
 concept_roy_ethnologist_desc: "#n Скоро в Morgenröte!#!"
 ag_morgenroete_desc: "У вас есть открытые оповещения от мода [concept_morgenroete]."
 concept_tesla_engineer: "#b #ORANGE Инженер#!#!"
 concept_tesla_engineers: "#b #ORANGE Инженеры#!#!"
 concept_tesla_civil_engineer: "#b #ORANGE Инженер-строитель#!#!"
 concept_tesla_civil_engineers: "#b #ORANGE Инженеры-строители#!#!"
 concept_tesla_civil_engineering: "#b #ORANGE Гражданское строительство#!#!"
 concept_tesla_mechanical_engineer: "#b #ORANGE Инженер-механик#!#!"
 concept_tesla_mechanical_engineers: "#b #ORANGE Инженеры-механики#!#!"
 concept_tesla_mechanical_engineering: "#b #ORANGE Машиностроение#!#!"
 concept_tesla_military_engineer: "#b #ORANGE Военный инженер#!#!"
 concept_tesla_military_engineers: "#b #ORANGE Военные инженеры#!#!"
 concept_tesla_military_engineering: "#b #ORANGE Военно-инженерное дело#!#!"
 concept_tesla_electrical_engineer: "#b #ORANGE Инженер-электрик#!#!"
 concept_tesla_electrical_engineers: "#b #ORANGE Инженеры-электрики#!#!"
 concept_tesla_electrical_engineering: "#b #ORANGE Электротехника#!#!"
 concept_tesla_aeronautical_engineer: "#b #ORANGE Авиаконструктор#!#!"
 concept_tesla_aeronautical_engineers: "#b #ORANGE Авиаконструкторы#!#!"
 concept_tesla_aeronautical_engineering: "#b #ORANGE Авиастроение#!#!"
 concept_tesla_engineering: "Инженерное дело"
 concept_tesla_engineering_desc: "#b Инженерное дело#! — одна из главных особенностей мода [concept_morgenroete].\n\nЧтобы получить доступ к #b инженерному делу#!, вам нужен [concept_tesla_engineer]. #b Инженеры#! могут начинать #b инженерные проекты#! в зависимости от их специализации. Существует пять специализированных #b инженеров#!:\n- [concept_tesla_civil_engineer] специализируется на улучшении инфраструктуры страны.\n- [concept_tesla_mechanical_engineer] специализируется на механических изобретениях, которые приносят пользу, например, промышленности.\n- [concept_tesla_military_engineer] специализируется на улучшении армии и флота страны.\n- [concept_tesla_electrical_engineer] специализируется на улучшении электрической инфраструктуры страны.\n- [concept_tesla_aeronautical_engineer] специализируется на том, чтобы сделать возможными полёты человека и улучшить самолёты и другие летательные аппараты."
 concept_tesla_engineer_desc: "#b #ORANGE Инженеры#!#! — это учёные, которые помогают в строительстве особых сооружений, предоставляя свои экспертные знания.\nКроме того, #b #ORANGE инженеры#!#! дают бонус к [Concept('concept_technology_spread', 'распространению технологий')] вашей державы. Бонус зависит от того, сколько держав исследовали больше технологий, чем ваша."
 concept_tesla_civil_engineer_desc: "#b Инженеры-строители#! специализируются на улучшении инфраструктуры страны.\nОни могут начинать #b инженерные проекты#! для добавления [Concept('concept_modifier', 'модификаторов')] к областям, которые повышают [Concept('concept_infrastructure', 'инфраструктуру')], для улучшения ваших #b строительных секторов#! или для исследования [Concept('concept_technology', 'технологий')]."
 concept_tesla_mechanical_engineer_desc: "#b Инженер-механик#! специализируется на механических инновациях, которые улучшают вашу промышленность, машины или жизнь вашего населения.\nОни могут начинать #b инженерные проекты#! для добавления [Concept('concept_modifier', 'модификаторов')] к вашим промышленным сооружениям, которые улучшают [Concept('concept_throughput', 'производительность')], [Concept('concept_good_production', 'производство товаров')] и [Concept('concept_input_mult', 'затраты сырья')], для улучшения ваших #b железных дорог#! новыми локомотивами или для исследования промышленных [Concept('concept_technology', 'технологий')]."
 concept_tesla_military_engineer_desc: "#b Военный инженер#! специализируется на улучшении нашей армии и флота путём внедрения новых инноваций.\nОни могут начинать #b инженерные проекты#! для получения новых [Concept('concept_mobilization_option', 'вариантов мобилизации')] путём изобретения оружия, новых полевых укреплений и лучших танков или для исследования военных или военно-морских [Concept('concept_technology', 'технологий')]."
 concept_tesla_electrical_engineer_desc: "#b Инженер-электрик#! специализируется на улучшении вашей страны с помощью электрических инноваций.\nОни могут начинать #b инженерные проекты#! для исследования геомагнитного поля Земли, для строительства телеграфных или радиосетей или для исследования электрических [Concept('concept_technology', 'технологий')]."
 concept_tesla_aeronautical_engineer_desc: "#b Авиаконструктор#! специализируется на разработке средств для полётов и улучшении самолётов и цеппелинов.\nОни могут начинать #b инженерные проекты#! для добавления [Concept('concept_modifier', 'модификаторов')] к вашим #V аэропортам#!, которые улучшают [Concept('concept_throughput', 'производительность')], [Concept('concept_good_production', 'производство товаров')] и [Concept('concept_input_mult', 'затраты сырья')], для разблокировки #V передовых самолётов#! в качестве [Concept('concept_mobilization_option', 'вариантов мобилизации')] или для исследования авиационных [Concept('concept_technology', 'технологий')]."
 concept_vikelas_national_sport: "Национальный спорт"
 concept_vikelas_national_sport_desc: "Любая страна может объявить один из следующих видов спорта своим национальным: крикет, бейсбол, футбол или баскетбол. Три из этих четырёх видов спорта (за исключением крикета) были изобретены только в XIX веке. Страна, которая первой изобретает вид спорта, считается «родиной» этого вида спорта. С этого момента спорт распространяется по всему миру, но не на одинаковых условиях: распространение крикета и бейсбола более ограничено, в то время как распространение футбола и бейсбола подвержено менее строгим условиям. Спорт может быть распространён сюзереном среди подданных для улучшения отношений. Различные виды спорта могут сосуществовать в одной стране, но чтобы распространиться по всей стране в каждом спортивном объекте, они должны быть национальным видом спорта."
 concept_theiler_microorganism: "Микроорганизм"
 concept_theiler_microorganisms: "Микроорганизмы"
 concept_theiler_microorganism_desc: "Микроорганизмы — это крошечные организмы, такие как бактерии, вирусы и одноклеточные.\nИх может найти [concept_theiler_biologist|l], используя [Concept('concept_journal_entry', 'запись в дневнике')] «$je_theiler_microorganism_research$», которой биологи занимаются в свободное время.\nМикроорганизмы в основном используются для обнаружения [Concept('concept_theiler_pathogen', 'патогенов')] и создания [Concept('concept_theiler_vaccine', 'вакцин')], что помогает стране защитить население от [Concept('concept_panum_disease', 'болезней')]."
 concept_theiler_biology: "Биология"
 concept_theiler_biology_desc: "#n Скоро в Morgenröte!#!"
 concept_ito_medicinal_plants: "Лекарственные растения"
 concept_ito_medicinal_plants_desc: "Лекарственные растения обладают целебными свойствами, которые можно использовать для создания фармацевтических препаратов и других полезных химических веществ.\nВы можете собирать лекарственные растения, отправив [Concept('concept_dubois_naturalist', '#b #GREEN натуралиста#!#!')] в [Concept('concept_dubois_botanical_expedition', 'ботаническую экспедицию')]. Когда будет собрано достаточно растений, [concept_mendelejew_chemist|l] сможет приступить к выделению химического вещества. После этого [concept_theiler_biologist|l] сможет начать производство фармацевтического препарата."
 concept_academics_academic_confusion: "Научная неразбериха"
 concept_academics_academic_confusion_desc: "Изменение [Concept('concept_academics_university_specialization', 'специализации')] Университета приведет к тому, что многие ученые будут в замешательстве. В результате на какое-то время снизится научная продуктивность."
