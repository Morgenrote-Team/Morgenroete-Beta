 vikelas.100.t: "Олимпийская мечта"
 vikelas.100.d: "[SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName] желает возродить древние Олимпийские игры в современном обличье. Международные спортивные соревнования должны проводиться каждые четыре года."
 vikelas.100.f: "Вдохновлённая античным идеалом о том, что хороший ум нуждается в хорошем теле, олимпийская идея развивалась всё больше и больше. Этому способствовала и археология: в конце XIX века Эрнст Курциус раскопал Олимпию, вызвав новый интерес к Олимпийским играм. К этому добавилась социальная идея «выживания сильнейших», подпитываемая теорией эволюции, и вера в то, что физические упражнения необходимы в эпоху фабричного труда. Как международное событие, современные Олимпийские игры должны преодолеть национальный эгоизм и способствовать миру. Прогресс, преодолевающий границы в обществе, должен символизироваться стремлением к спортивным рекордам под девизом «Citius, altius, fortius» (Быстрее, выше, сильнее)."
 vikelas.100.g: "Основать Международный олимпийский комитет."
 vikelas.102.t: "Международный олимпийский комитет"
 vikelas.102.d: "Для возрождения Олимпийских игр [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName] учредил[SelectLocalization(SCOPE.sCharacter('vikelas_ioc_president_scope').IsFemale, 'а', '')] Международный олимпийский комитет (МОК), который будет отвечать за поддержание и организацию современной формы древних Игр."
 vikelas.102.f: "Первый МОК состоял в основном из доверенных лиц. [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName] образовал небольшой круг. Позже присоединились другие члены МОК, и группа единомышленников превратилась в международную организацию."
 vikelas.102.g: "Шаг вперёд для национального и международного спорта."
 vikelas.103.t: "Олимпийские игры: греческое дело?"
 vikelas.103.d: "После основания Международного олимпийского комитета возникает вопрос, будут ли Игры всегда проходить в Греции или каждые четыре года у них будет новое место проведения."
 vikelas.103.f: "Международные представители выступали за то, чтобы Игры стали событием мирового масштаба с постоянно меняющимися местами проведения. Решение о месте проведения должен был принимать совет. Но поскольку Греция возродила игры, эта позиция не является бесспорной. В итоге [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName] свел[SelectLocalization(SCOPE.sCharacter('vikelas_ioc_president_scope').IsFemale, 'а', '')] вопрос о месте проведения к простой формуле: «Наши игры, наши правила». Это привело бы к тому, что совет стал бы чисто почётным органом, а его права были бы серьёзно ограничены."
 vikelas.103.g: "Олимпийские игры — дело Греции."
 vikelas.103.h: "Олимпийские игры — дело международное."
 vikelas.104.t: "Международный олимпийский комитет"
 vikelas.104.d: "Для возрождения Олимпийских игр [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName] учредил[SelectLocalization(SCOPE.sCharacter('vikelas_ioc_president_scope').IsFemale, 'а', '')] Международный олимпийский комитет (МОК), который будет отвечать за поддержание и организацию современной формы древних Игр. Игры планируется проводить в Греции каждые четыре года."
 vikelas.104.f: "Изначально [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName] сформировал[SelectLocalization(SCOPE.sCharacter('vikelas_ioc_president_scope').IsFemale, 'а', '')] МОК, в который входил лишь узкий круг его соратников. Впоследствии к ним присоединились другие члены, и эта группа единомышленников со временем переросла в полноценную международную организацию. Международные представители выступали за то, чтобы Игры стали событием мирового масштаба с постоянно меняющимися местами проведения. Однако под сильным давлением Греции МОК был вынужден отказаться от идеи ротации, в результате чего Олимпийские игры стали проводиться на греческой земле каждые четыре года."
 vikelas.104.g: "Их игры, их правила..."
 vikelas.105.t: "Возрождение Олимпиады"
 vikelas.105.d: "После заседания Международного олимпийского комитета (МОК) совет решил, что первые современные Игры должны состояться в Греции."
 vikelas.105.f: "Одной из первых задач МОК было определение места проведения новых Игр. Следуя древнему примеру, комитет единогласно решил, что игры должны состояться в Греции в память об оригинальных Олимпийских играх. После этого каждые четыре года Олимпийские игры будет принимать другая страна. Место проведения выбирает совет, который переизбирается каждые четыре года."
 vikelas.105.g: "Мы едва можем дождаться!"
 vikelas.106.t: "Начинаются [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_olympic_games_number_type')] Олимпийские игры"
 vikelas.106.d: "Начались первые современные Олимпийские игры! Весь мир прибыл в Грецию. Атлеты из #BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]#! стран принимают участие в этом международном событии."
 vikelas.106.f: "Первые современные Олимпийские игры начались [TimeKeeper.GetCurrentDate.Format('d MMMM y г.')], после того как древние Олимпийские игры были запрещены в 393 году римским императором Феодосием I из-за поклонения языческим богам. Хотя игры едва ли принесли какие-либо выдающиеся спортивные достижения, даже для того времени, они в целом рассматривались как большой успех и сыграли важную роль в том, что Олимпийские игры смогли утвердиться на постоянной основе."
 vikelas.106.g: "Игры возвращаются домой!"
 vikelas.107.g: "Быстрее, выше, сильнее!"
 vikelas.108.t: "Завершаются [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_olympic_games_number_type')] Олимпийские игры"
 vikelas.108.d: "Первые Олимпийские игры подошли к концу. Зрители, пресса и атлеты в восторге: многовековая традиция возрождена и облечена в современную форму."
 vikelas.108.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_winners_type')] Но и другие страны показали высокие спортивные результаты. Из [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue|0V] стран-участниц золотые медали завоевали следующие:\n[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_1_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_2_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_3_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_4_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_5_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_6_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_7_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_8_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_9_this_year_global_type')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_medal_rank_10_this_year_global_type')]"
 vikelas.108.g: "Citius, altius, fortius."
 vikelas.109.d: "Греция вновь пригласила мир принять участие в Олимпийских играх. Атлеты из #BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]#! стран принимают участие в этом международном событии."
 vikelas.109.f: "С тех пор как Греция основала МОК, было ясно, что в будущем, как и в прошлом, Игры будут проходить только на эллинской земле. Это не только обеспечило определённую преемственность, но и гарантировало Греции международно уважаемую роль, что придало некогда маленькому королевству особое значение."
 vikelas.110.t: "Олимпийский энтузиазм"
 vikelas.110.d: "[SCOPE.sCharacter('vikelas_olympics_enthusiast_scope').GetFullName] очарован[SelectLocalization(SCOPE.sCharacter('vikelas_olympics_enthusiast_scope').IsFemale, 'а', '')] Олимпийскими играми, которые скоро состоятся в Греции. [SelectLocalization(SCOPE.sCharacter('vikelas_olympics_enthusiast_scope').IsFemale, 'Она взяла', 'Он взял')] в свои руки, чтобы [ROOT.GetCountry.GetName] стал[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')] членом новообразованного Международного олимпийского комитета."
 vikelas.110.f: "Неудивительно, что ряд учёных были вовлечены в успех Олимпийских игр — было множество антикваров, которые интересовались возрождением из-за своих наклонностей. Даже если они часто не принимали участие сами, они пытались связаться с МОК. Они также считали национальной честью, если их собственная страна была представлена на международном мероприятии."
 vikelas.110.g: "Похвальная инициатива."
 vikelas.112.t: "Избран новый совет МОК"
 vikelas.112.d: "Исполнительный совет МОК был переизбран."
 vikelas.112.f: "Исполнительный совет МОК избирается каждые четыре года. Только страна-основатель и страна, из которой происходит президент, остаются в совете. В остальном распределение происходит по следующей системе: 5 великих держав, 2 страны из Европы, 2 страны из Америки, 2 страны из Азии, одна страна из Африки, одна страна из Океании. Совет выбирает страну из членов МОК для проведения следующих Олимпийских игр."
 vikelas.113.t: "Следующее место проведения Олимпийских игр"
 vikelas.113.d: "Члены совета МОК встретились, чтобы решить вопрос о месте проведения следующих Олимпийских игр."
 vikelas.113.f: "Три страны, являющиеся членами МОК и не принимавшие Олимпийские игры в последние 20 лет, являются возможными странами для выбора. Четвёртая страна может быть добавлена в список из-за коррупции. Выбор зависит от репутации и связей страны. Вассалы и сюзерены, союзники и таможенные союзы будут голосовать друг за друга. Состояние отношений и дурная слава также имеют значение."
 vikelas.113.g: "[SCOPE.sCountry('vikelas_olympics_candidate_1').GetName]"
 vikelas.113.h: "[SCOPE.sCountry('vikelas_olympics_candidate_2').GetName]"
 vikelas.113.i: "[SCOPE.sCountry('vikelas_olympics_candidate_3').GetName]"
 vikelas.113.j: "[SCOPE.sCountry('vikelas_olympics_candidate_4').GetName]"
 vikelas.113.k: "[SCOPE.sCountry('vikelas_olympics_candidate_fallback').GetName]"
 vikelas.114.t: "Следующие Олимпийские игры в [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetAltNameNoFlag('RU_CL_PP')]"
 vikelas.114.d: "МОК принял решение. [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetName] имеет лучшие условия для проведения следующих Олимпийских игр."
 vikelas.114.f: "Проведение Олимпийских игр — престижное дело. Подготовка сопряжена с некоторыми затратами, но усилия того стоят."
 vikelas.114.g: "Увидимся в [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetAltNameNoFlag('RU_CL_PP')]!"
 vikelas.115.g: "Увидимся в... Постойте, это же мы? Ура!"
 vikelas.116.d: "Весь мир прибыл в [ROOT.GetCountry.GetName]. Атлеты из #BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]#! стран принимают участие в этом международном событии. Мы гордимся быть хозяевами — пусть наши атлеты воспользуются преимуществом домашнего поля!"
 vikelas.116.f: "«Главное на Олимпийских играх — не победа, а участие; главное в жизни — не триумф, а борьба; главное — не победить, а хорошо сражаться. Распространять эти принципы — значит строить сильное и более доблестное, а главное, более щепетильное и щедрое человечество». — Пьер де Кубертен"
 vikelas.116.g: "Да начнутся Игры!"
 vikelas.117.d: "Весь мир прибыл в [SCOPE.sCountry('vikelas_olympic_country').GetName]. Атлеты из #BLUE [GetGlobalVariable('vikelas_olympic_participants_global_var').GetValue]#! стран принимают участие в этом международном событии."
 vikelas.118.d: "Наши атлеты храбро сражались — теперь пришло время забрать домой славу."
 vikelas.119.t: "Международный олимпийский комитет"
 vikelas.119.d: "Для возрождения Олимпийских игр [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName] учредил[SelectLocalization(SCOPE.sCharacter('vikelas_ioc_president_scope').IsFemale, 'а', '')] Международный олимпийский комитет (МОК), который будет отвечать за поддержание и организацию современной формы древних Игр. Было принято решение провести первые игры современной эпохи в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]."
 vikelas.119.f: "Первый МОК состоял в основном из доверенных лиц [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]. Они образовали небольшой круг. Позже присоединились другие члены МОК, и группа единомышленников превратилась в международную организацию. Одно из первых решений касалось места проведения первых Олимпийских игр. Поскольку в настоящее время не существует суверенного греческого национального государства, которому можно было бы делегировать эту задачу, было решено провести игры в стране-основательнице, [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]. После этого совет будет назначать другое место каждые четыре года."
 vikelas.119.g: "Тогда мы организуем игры на своей территории."
 vikelas.120.t: "Международный олимпийский комитет"
 vikelas.120.d: "Для возрождения Олимпийских игр [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName] учредил[SelectLocalization(SCOPE.sCharacter('vikelas_ioc_president_scope').IsFemale, 'а', '')] Международный олимпийский комитет (МОК), который будет отвечать за поддержание и организацию современной формы древних Игр. Было принято решение провести первые игры современной эпохи в [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetAltNameNoFormatting('RU_CL_PP')]."
 vikelas.120.f: "Первый МОК состоял в основном из доверенных лиц [SCOPE.sCharacter('vikelas_ioc_president_scope').GetFullName]. Они образовали небольшой круг. Позже присоединились другие члены МОК, и группа единомышленников превратилась в международную организацию. Одно из первых решений касалось места проведения первых Олимпийских игр. Поскольку в настоящее время не существует суверенного греческого национального государства, которому можно было бы делегировать эту задачу, было решено провести игры в стране-основательнице, [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetAltNameNoFlag('RU_CL_PP')]. После этого совет будет назначать другое место каждые четыре года."
 vikelas.120.g: "Увидимся в [SCOPE.sCountry('vikelas_olympics_candidate_scope').GetAltNameNoFlag('RU_CL_PP')]!"
 vikelas_3_winners_loc: "На Олимпийских играх этого года не 1 или 2 победителя, а 3! [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName], [GetGlobalVariable('vikelas_medal_rank_2_this_year_global_var').GetCountry.GetName] и [GetGlobalVariable('vikelas_medal_rank_3_this_year_global_var').GetCountry.GetName] завоевали по [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|0V] @vikelas_gold_medals! золотой медали."
 vikelas_2_winners_loc: "[GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName] и [GetGlobalVariable('vikelas_medal_rank_2_this_year_global_var').GetCountry.GetName] завоевали по [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|0V] @vikelas_gold_medals! золотой медали. Это означает, что в обеих странах живут лучшие атлеты мира."
 vikelas_1_winner_loc: "[GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName] доминировал[GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')] на этих Олимпийских играх, завоевав [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|0V] @vikelas_gold_medals! золотых медалей."
 vikelas_medal_rank_1_this_year_global_loc: "\n1.   [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetVariable('vikelas_gold_medals_this_year_var').GetValue|V0] - [GetGlobalVariable('vikelas_medal_rank_1_this_year_global_var').GetCountry.GetName]"
