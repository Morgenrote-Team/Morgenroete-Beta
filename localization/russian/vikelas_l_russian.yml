 vikelas_fire_of_olympia_modifier: "Огонь Олимпии"
 mobilization_option_bicycle_recon_desc: "Велосипедные эстафеты значительно увеличивают мобильность наших войск и могут быть развёрнуты даже на труднопроходимой местности."
 vikelas.21.h: "Но кого может заинтересовать такая игра?"
 vikelas.31.t: "От луговой игры до развлечения Америки"
 vikelas.31.d: "В [SCOPE.sState('vikelas_baseball_state').GetCustom('RU_SL_PP')] стала популярной новая игра, которая олицетворяет американский дух."
 vikelas.31.f: "В 1840-х годах бейсбол начал выходить из тени своих предшественников и принимать отчётливую форму. Соединённые Штаты переживали быструю урбанизацию, и растущие города искали развлечения, которые могли бы способствовать развитию сообщества, отражая при этом дух новой нации. Поворотный момент наступил в 1845 году, когда Александр Картрайт и члены бейсбольного клуба «Никербокер» в Нью-Йорке установили первые стандартизированные правила игры. Эти «правила Никербокера» заложили основу современного бейсбола: ромбовидное поле с четырьмя базами, три аута за иннинг и девять игроков в команде. Они значительно отличались от менее формальных версий, игравшихся до этого на лужайках и полях. 19 июня 1846 года клуб «Никербокер» сыграл первую задокументированную игру по этим правилам в Хобокене, штат Нью-Джерси. Команда проиграла «Нью-Йорк Найн», но это событие ознаменовало символическое рождение организованного бейсбола."
 vikelas.31.g: "Хоум-ран!"
 vikelas.41.t: "Начало современного футбола"
 vikelas.41.d: "Чтобы урегулировать многочисленные противоречивые правила в области игр с мячом и таким образом организовать совместные игры, клубы в [SCOPE.sState('vikelas_football_state').GetCustom('RU_SL_PP')] представили новый свод правил футбола."
 vikelas.41.f: "В первой половине XIX века футбол в Англии ещё не был единым видом спорта, а скорее собирательным термином для множества игр с мячом, в которые играли в городах, деревнях и школах. Эти игры часто кардинально отличались своими правилами. Первый шаг к стандартизации был сделан Кембриджскими правилами 1848 года, попыткой создать единые правила для студентов Кембриджа. Они не были окончательным решением, но заложили основу для того, что последовало. Настоящий прорыв произошёл 26 октября 1863 года, когда одиннадцать клубов встретились в таверне «Фримейсонс» в Лондоне и основали Футбольную ассоциацию (FA). В течение нескольких недель они договорились о своде правил, которые позволяли играть в мяч только ногами и запрещали носить или бросать мяч — компромисс, который разозлил сторонников регби, которые впоследствии отделились и разработали свой собственный свод правил. С основанием FA родился современный футбол."
 vikelas.41.g: "Гол!"
 vikelas.51.t: "Игра с персиковой корзиной"
 vikelas.51.d: "В спортзале в [SCOPE.sState('vikelas_basketball_state').GetCustom('RU_SL_PP')] была изобретена новая игра, которая однажды может зазвучать в залах и на стадионах по всему миру."
 vikelas.51.f: "«Никаких ударов ногами. Никакого бега с мячом. И две персиковые корзины, прибитые к галерее».\n\nВ [TimeKeeper.GetCurrentDate.Format('y')] году в школе в [SCOPE.sState('vikelas_basketball_state').GetFarmHubName] доктор [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] столкнулся с проблемой: как занять своих беспокойных учеников в помещении зимой. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Её', 'Его')] решение было простым — и странным. Футбольный мяч, две поднятые персиковые корзины и тринадцать правил.\nПарни сначала сочли это странным. Никакого контакта. Никакого дриблинга. Просто осторожные пасы и дуговые броски. Но что-то в этом зацепило. Игра распространилась на другие школы, затем на другие города. Менее чем за десятилетие спортзалы от Нью-Йорка до Токио зазвучали ритмом отскакивающих мячей и криками «Корзина!»\nТо, что начиналось как зимнее развлечение, может стать чем-то большим. Это быстрый, командный вид спорта, подходящий для современной жизни — и, прежде всего, рождённый в [ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_PP')]."
 vikelas.51.g: "Ввести его в школах и спортзалах."
 vikelas.302.h: "Какая переоценённая игра."
 vikelas.303.h: "Какая скучная игра."
 vikelas.311.g: "Больше никогда не пропустишь спортивный результат!"
 vikelas.312.t: "Спортивное радио"
 vikelas.312.d: "Производитель радиоприёмников в [SCOPE.sState('vikelas_radio_state').GetCustom('RU_SL_PP')] продвигает свою продукцию в основном для радиопередач спортивных событий. Желание населения не пропустить ни одного матча [Country.MakeScope.Var('vikelas_national_sport_var').GetFlagName]а привело к тому, что фабрика оптимизировала своё производство."
 vikelas.312.f: "Радио идеально подходило для того, чтобы стать новым средством массовой информации для спорта: оно могло транслировать драму игры в прямом эфире, передавать рёв толпы и делать голос комментатора сердцебиением аудитории. В Соединённых Штатах это началось 5 августа 1921 года, когда питтсбургская станция KDKA транслировала первую в прямом эфире бейсбольную игру: «Питтсбург Пайрэтс» против «Филадельфия Филлис». Комментатор Гарольд Арлин сидел в ложе для прессы с простым микрофоном и описывал каждое действие, как будто рассказывая другу. Слушатели, пленённые новыми устройствами, чувствовали, как спорт захватывает их гостиные. В Европе BBC последовала этому примеру: 11 января 1927 года она транслировала первый в прямом эфире футбольный матч — «Арсенал» против «Шеффилд Юнайтед» — с комментатором Тедди Уэйкламом."
 vikelas.312.g: "Это как быть там вживую!"
 vikelas.318.t: "Ассоциация [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName]"
 vikelas.318.g: "Основать Национальную ассоциацию [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName]!"
 vikelas.318.f: "Спортивная ассоциация — будь то крикет, бейсбол, футбол или баскетбол — всегда создаётся, когда 35 процентов интегрированных домашних штатов имеют клуб по соответствующему виду спорта. Ассоциация является основой для проведения матчей лиги и финального матча с чемпионским титулом. Однако это возможно только в том случае, если у нации есть как минимум два клуба. Футбольная ассоциация является обязательным условием для участия в чемпионате мира по футболу."
 vikelas.318.d: "[GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName] стал популярным видом спорта по всей [GetPlayer.GetAltNameNoFlag('RU_CL_DP')]. Яркая клубная культура теперь привела к основанию национальной ассоциации в городе [ROOT.GetCountry.GetCapital.GetCityHubName]."
 vikelas.321.g: "Хоум-ран!"
 vikelas.322.t: "Бейсбольные карточки"
 vikelas.322.d: "Известная компания в нашей стране начала печатать бейсбольные карточки в рекламных целях. С тех пор развилась настоящая мания коллекционирования."
 vikelas.322.f: "История бейсбольных коллекционных карточек начинается в те десятилетия, когда сам бейсбол превратился из регионального развлечения в национальный вид спорта Соединённых Штатов. Уже в 1860-х годах, когда Национальная ассоциация бейсболистов (NABBP) организовала первые клубы, появились ранние портреты игроков в виде студийных фотографий. Эти так называемые кабинетные карточки или торговые карточки производились в фотостудиях и собирались более состоятельными фанатами, но они ещё не имели серийного характера. Настоящее начало коллекционных карточек в современном смысле относится к 1880-м годам. В то время производители табака обнаружили возможность вкладывать небольшие картонные картинки в пачки сигарет. Изначально эти карточки только укрепляли пачки, но компании быстро осознали их рекламную ценность. Goodwin & Company из Нью-Йорка считается пионером этой эпохи со своей серией Old Judge (1887-1890). На карточках были чёрно-белые фотографии игроков, напечатанные на тонком картоне, и они впервые предоставили любителям бейсбола возможность собирать целые серии своих кумиров."
 vikelas.322.g: "Когда выйдут альбомы для вырезок?"
 vikelas.331.t: "Основан конкурирующий футбольный клуб"
 vikelas.331.d: "После разногласий с футбольным клубом в соседнем штате рабочие в [SCOPE.sState('vikelas_football_club_state_scope').GetCustom('RU_SL_PP')] объединились и основали свой собственный клуб, который они назвали [SCOPE.sState('vikelas_football_club_state_scope').GetCustom('vikelas_historical_football_club_names_type')]. По-видимому, между двумя клубами существует вражда."
 vikelas.331.f: "Значительное количество спортивных клубов берёт своё начало в расколах и разногласиях с другими клубами. «Интер», например, был основан несколькими недовольными космополитичными членами Миланского крикетного и футбольного клуба (ныне «Милан») в миланском ресторане Ristorante Orologio. «Футбольный клуб Интернационале Милан», как официально назывался клуб, был отделён от националистического Миланского КФК, в котором разрешалось играть только итальянцам."
 vikelas.331.g: "Это назревающее соперничество?"
 vikelas.332.t: "Футбольное соперничество"
 vikelas.332.d: "Футбольные клубы [SCOPE.sState('vikelas_rival_state_1_scope').GetCustom('vikelas_historical_football_club_names_type')] из [SCOPE.sState('vikelas_rival_state_1_scope').GetCustom('RU_SL_RP')] и [SCOPE.sState('vikelas_rival_state_2_scope').GetCustom('vikelas_historical_football_club_names_type')] из [SCOPE.sState('vikelas_rival_state_2_scope').GetCustom('RU_SL_RP')] сегодня проводят матч лиги, который может определить чемпионов этого года. Напряжение может быть высоким, поскольку оба видят друг в друге соперников и хотят стать чемпионами."
 vikelas.332.f: "Начальный удар, вбрасывание, небольшая схватка,\nДержи низко, блестящий прорыв, браво, победа или смерть;\nНа мяче, Сити!\nНе обращай внимания на опасность,\nДержись, сейчас твой шанс,\nУра! Мы забили гол.\n - Альберт Т. Смит"
 vikelas.332.g: "Я болею за команду из [SCOPE.sState('vikelas_rival_state_1_scope').GetCustom('RU_SL_RP')]!"
 vikelas.332.h: "Команда из [SCOPE.sState('vikelas_rival_state_2_scope').GetCustom('RU_SL_RP')] лучше!"
 vikelas.333.t: "Футбольные хулиганы"
 vikelas.333.d: "Футбольный матч за чемпионат [GetPlayer.GetAdjective] был омрачён беспорядками агрессивных футбольных фанатов. Они были недовольны результатом и напали на другую команду, судью и случайные магазины в [ROOT.Var('vikelas_rival_state_var').GetState.GetName], вызвав хаос. К счастью, никто не погиб."
 vikelas.333.f: "«Где ты, трусливый судья! Мы проиграли из-за тебя! Вот он! Взять его, ребята!»"
 vikelas.333.g: "Какой беспорядок!"
 vikelas.334.t: "Родился футбольный чемпион!"
 vikelas.334.d: "Новый чемпион [GetPlayer.GetAdjective] был определён в напряжённой игре, которую выиграла команда из [ROOT.Var('vikelas_rival_state_var').GetState.GetName]. Люди в [ROOT.Var('vikelas_rival_state_var').GetState.GetNameNoFormatting] празднуют победу своей команды."
 vikelas.334.f: "«Оле! Оле! Оле! Олеее! Олеее! Олеее!»"
 vikelas.334.g: "Мы — чемпионы!"
 vikelas.391.t: "Принять национальный вид спорта"
 vikelas.391.d: "Какой национальный вид спорта стоит принять [GetPlayer.GetAltNameNoFlag('RU_CL_DP')]?"
 vikelas.391.f: "«Вы когда-нибудь слышали о таком прекрасном виде спорта, как хорнуссен?»"
 vikelas.391.g: "Крикет."
 vikelas.391.h: "Бейсбол."
 vikelas.391.i: "Футбол."
 vikelas.391.j: "Баскетбол."
 vikelas.391.k: "Неважно."
 vikelas.392.t: "Сменить национальный вид спорта"
 vikelas.392.d: "На какой национальный вид спорта стоит сменить [GetPlayer.GetAltNameNoFlag('RU_CL_DP')]?"
 vikelas.392.f: "«[ROOT.GetCountry.MakeScope.Var('vikelas_national_sport_var').GetFlagName] стал таким скучным, как насчёт игры в катание сыра?»"
 vikelas.393.t: "Новый национальный вид спорта"
 vikelas.393.d: "Посланники из [SCOPE.sCountry('vikelas_overlord_country_scope').GetAltNameNoFlag('RU_CL_RP')] предложили нашему правительству ввести их национальный вид спорта в нашей стране и соответственно отправили тренера для реализации этого плана."
 vikelas.393.f: "«Игра подобна отдыху, а поскольку вы не можете работать непрерывно, вам нужен отдых». — Аристотель"
 vikelas.393.g: "Передай мне биту!"
 vikelas.393.h: "Хоум-ран!"
 vikelas.393.i: "Гол!"
 vikelas.393.j: "В корзину!"
 vikelas.394.t: "Общий спорт"
 vikelas.394.d: "Всё больше жителей нашей страны рассматривают [ROOT.GetCountry.MakeScope.Var('vikelas_national_sport_var').GetFlagName] как объединяющий, идеологический элемент — также и в международных отношениях. Этот общий национальный вид спорта даёт им ощущение, что у [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] больше общего с нашим сюзереном, [SCOPE.sCountry('vikelas_overlord_country_scope').GetAltNameNoFlag('RU_CL_TP')], чем просто властные отношения."
 vikelas.394.f: "Если у сюзерена и субъекта общий национальный вид спорта, желание свободы уменьшается."
 vikelas.394.g: "Общие виды спорта, общие интересы."
 vikelas.395.t: "Чемпионат Содружества по [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName]у"
 vikelas.395.d: "Зрители и команды из всех союзных и дружественных стран собрались, чтобы посетить Чемпионат Содружества по [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName]у. Игры также являются знаком того, что сфера влияния [ROOT.GetCountry.GetAdjectiveNoFormatting|l]ой страны сближается не только политически, но и культурно."
 vikelas.395.f: "С конца XIX века проводились тестовые серии между Англией и другими частями Империи, которые имели квази-турнирный характер. Основание ICC (Имперской крикетной конференции) в 1909 году заложило основу для формального обмена между крикетными державами Империи. Первоначальными членами были Англия, Австралия и Южная Африка — позже присоединились Индия, Новая Зеландия и Вест-Индия.\n\nБританский домашний чемпионат, тем временем, был ежегодным турниром между четырьмя домашними нациями: Англией, Шотландией, Уэльсом и Северной Ирландией. Это было старейшее регулярное международное футбольное событие. Оно считалось символом британского превосходства в футболе.\n\nИдея всеобъемлющего Кубка Империи так и не была полностью реализована — но были отдельные попытки и серии, которые приближались к этому."
 vikelas.395.g: "Да начнутся игры!"
 vikelas.396.t: "Чемпионат Содружества по [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName]у — победа!"
 vikelas.396.d: "Мы победили соперника, [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName], в решающем матче! Мы выиграли Чемпионат Содружества по [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName]у."
 vikelas.396.f: "Пас [SCOPE.sCharacter('vikelas_schaefer_scope').GetFullNameNoFormatting] на [SCOPE.sCharacter('vikelas_morlock_scope').GetFullNameNoFormatting] заблокирован #tooltippable_name [SCOPE.sCountry('vikelas_second_winner_team_scope').GetAdjectiveNoFormatting|l]ой#! командой — и [SCOPE.sCharacter('vikelas_bozsik_scope').GetFullNameNoFormatting], всегда [SCOPE.sCharacter('vikelas_bozsik_scope').GetFullNameNoFormatting], правый вингер [SCOPE.sCountry('vikelas_second_winner_team_scope').GetAdjectiveNoFormatting|l]ой команды, владеет мячом. Он владеет мячом — потерял на этот раз, мяч у [SCOPE.sCharacter('vikelas_schaefer_scope').GetFullNameNoFormatting]. [SCOPE.sCharacter('vikelas_schaefer_scope').GetFullNameNoFormatting] пасует в центр. Удар головой — заблокировано. [SCOPE.sCharacter('vikelas_rahn_scope').GetFullNameNoFormatting] должен бить сзади — [SCOPE.sCharacter('vikelas_rahn_scope').GetFullNameNoFormatting] бьёт — Гоооооол! Гоооооол! Гоооооол! Гол!"
 vikelas.396.g: "Трофей Содружества достаётся [GetPlayer.GetAltNameNoFlag('RU_CL_DP')]!"
 vikelas.397.t: "Чемпионат Содружества по [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName]у завершается"
 vikelas.397.d: "Чемпионат Содружества по [GetPlayer.MakeScope.Var('vikelas_national_sport_var').GetFlagName]у окончен. [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] победила [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] в финале. Команды и зрители из союзных и дружественных государств снова уехали. [GetPlayer.GetNameNoFormatting] останется в их тёплых воспоминаниях как хозяин и организатор."
 vikelas.397.f: "«Возможно, мы не бесправные подданные, пушечное мясо или просто скопление зависимых наций в интересах сюзерена, а… семья»."
 vikelas.397.g: "Это способствовало международному взаимопониманию."
 vikelas.403.d: "ФИФА сегодня на своём заседании в городе [SCOPE.sState('vikelas_fifa_state').GetStateRegion.GetCityHubName] назначила новых членов совета."
