 je_vikelas_bicycle_race_reason: "Предприниматели, издатели и производители велосипедов предлагают провести публичное соревнование: гонку на длинные дистанции, чтобы доказать скорость, прочность и перспективность нового безопасного велосипеда."
 je_vikelas_basketball: "Баскетбол"
 je_vikelas_basketball_reason: "Быстрый, командный и созданный для современного города — это может быть игра века."
 vikelas.21.t: "Игра джентльменов"
 vikelas.21.d: "В [SCOPE.sState('vikelas_cricket_state').GetCustom('RU_SL_PP')] группа игроков в крикет впервые собралась, чтобы играть матчи вместе по установленным правилам. Таким образом, клуб играет новаторскую роль в этом виде спорта."
 vikelas.21.f: "XIX век был эпохой, когда крикет превратился из сельского развлечения в спорт национального и международного значения. Английские высшие классы сделали игру своим любимым развлечением: её культивировали в пансионах, таких как Итон и Харроу, и прославляли как «спорт джентльменов». В то же время её популярность росла среди рабочего класса, особенно в северной Англии, где фабричные рабочие основывали свои собственные клубы. Эта демократизация игры привела к беспрецедентному росту клубов и зрителей.\n\nМеждународные матчи не заставили себя долго ждать. В 1844 году в Нью-Йорке состоялся первый в мире задокументированный международный матч между Канадой и Соединёнными Штатами."
 vikelas.21.g: "Передай мне биту!"
 vikelas.601.t: "Педали на мостовой"
 vikelas.601.d: "На бульварах появилось новое изобретение — двухколёсное устройство, приводимое в движение педалями, прикреплёнными непосредственно к переднему колесу. Его называют «велосипед»."
 vikelas.601.f: "В парках и на широких улицах столицы поворачиваются головы. Джентльмены в шляпах и жилетах сидят на странных железных рамах, яростно крутя педали, шатаясь сквозь изумлённые толпы. Некоторые падают. Некоторые летят. Дети смеются. Пожилые государственные деятели поднимают брови. Газеты называют его le vélocipède — наполовину игрушка, наполовину обещание. Изобретённый каретником, этот «костотряс» настолько же тяжёл, насколько и революционен. На булыжниках он сотрясает позвоночник. Но на гладких променадах он движется с удивительной грацией. Ходят слухи, что это не просто новинка, а семя нового вида движения."
 vikelas.601.g: "Забавная мода!"
 vikelas.602.t: "Велосипед будущего"
 vikelas.602.d: "Появилась новая конструкция велосипеда с колёсами одинакового размера, цепным приводом на заднее колесо и улучшенным балансом. В отличие от шатких высококолёсников, этот «безопасный велосипед» устойчив, доступен по цене и быстро становится сенсацией. Его изобретатель? [SCOPE.sCharacter('vikelas_bicycle_inventor_scope').GetFullName]!"
 vikelas.602.f: "Старые велосипеды трясли как кости, так и нервы. Высоченные пенни-фартинги предлагали скорость, но по цене, которую немногие были готовы платить — одно неверное движение, и ездок летел. Теперь из мастерских нашей столицы распространяется новый вид велосипеда: компактный, элегантный и безопасный. С цепным приводом на заднее колесо и пневматическими шинами даже дамы и рабочие начинают ездить. Улицы, некогда управляемые каретами, теперь отзываются тихим гулом резины по камню. В кафе и на фабриках вердикт один и тот же: это не игрушка. Это свобода — быстрая, бесшумная и внезапно доступная."
 vikelas.602.g: "Пусть каждый гражданин въедет в современную эпоху."
 vikelas.611.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.611.d: "Настал день. Гонщики со всей страны собираются на стартовой линии, стремясь испытать человека и машину на открытой дороге. Воздух трещит от предвкушения."
 vikelas.611.f: "Солнце встаёт над бульваром, уже забитым зрителями. Развеваются знамёна. В утреннем воздухе висит запах смазки и пыли. Десятки гонщиков садятся на свои велосипеды — некоторые сверкающие машины только что с завода, другие собраны в подворотнях.\nРаздаётся выстрел. Взрываются аплодисменты. И колёса начинают вращаться.\nОни выезжают за городские ворота и в сельскую местность. Фермеры останавливаются в своих полях. Дети бегут вдоль дороги. Священники благословляют их. Циники насмехаются. И всё же, когда за ними тянутся шлейфы пыли, в толпе возникает странное чувство: это похоже на начало чего-то большего."
 vikelas.611.g: "Пусть каждый город услышит гул прогресса."
 vikelas.621.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.621.d: "Победитель национальной велогонки завоевал нечто большее, чем просто финишную черту — он захватил воображение нации. Теперь все взгляды обращены на то, что он собой представляет."
 vikelas.621.f: "Газеты называют его «Железным гонщиком». Родился в семье ткача, осиротел в двенадцать, в шестнадцать стал рабочим на фабрике. Его победа на побитом безопасном велосипеде — залатанном, поцарапанном и тщательно смазанном — была не просто спортивным триумфом. Это была притча. Толпы скандируют его имя. Художники рисуют его. Дети подражают его позе. Но что более важно, идеологи берут на заметку. Некоторые называют его лицом силы труда. Другие говорят, что он доказывает жизнеспособность нации. Пресса спорит о том, является ли он рабочим, патриотом — или кем-то совершенно новым.\nСам гонщик говорит мало. Он улыбается, кивает и едет."
 vikelas.621.g: "Сделать его героем рабочего класса."
 vikelas.621.h: "Прославить его как национальный символ."
 vikelas.621.i: "Представить его как символ прогресса и современного человека."
 vikelas.622.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.622.d: "Во время национальной велогонки произошла трагическая авария. Один гонщик погиб, несколько других ранены. Аплодисменты смолкли."
 vikelas.622.f: "Колесо попало в колею. Крик, грохот, а затем крики. Зрители хлынули вперёд, когда велосипеды посыпались, как домино. Кровь смешалась с пылью. Шлемы треснули. Кости сломались. Один молодой человек — семнадцатилетний ученик фабрики — погиб на месте. Газеты разделились во мнениях. Некоторые называют это необходимой ценой прогресса, другие осуждают безрассудство общественного спорта."
 vikelas.622.g: "Почтить павших."
 vikelas.623.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.623.d: "Один конкретный этап гонки завоевал сердца публики. Зрители говорят о нём не просто как о соревновании, а как о легенде."
 vikelas.623.f: "Гонщики исчезли в холмах на рассвете. То, что последовало, было уже не гонкой, а испытанием духа. Дюжина отстала. Трое рухнули. Один разбился на крутом повороте и встал, истекая кровью, отмахиваясь от помощи. Но один вырвался вперёд сквозь туман в сердца тысяч. Вся нация говорит только об этом."
 vikelas.623.g: "Пусть дорога помнит его усилие для будущих поколений."
 vikelas.623.h: "Заказать картину этого момента."
 vikelas.624.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.624.d: "После последнего этапа гонки разразились обвинения. Гонщик был пойман на мошенничестве — хотя некоторые утверждают, что он делал то же, что и все, просто менее скрытно."
 vikelas.624.f: "«Говорят, он менял велосипеды за сараем. Другие говорят, что его тащили в гору на скрытом тросе».\n\nФакты размыты. Ясно одно: гонщик был слишком быстр. Впечатляюще быстр. Слишком свеж после жестокого подъёма. Его соперники в ярости. Зрители ахают. Пресса чует кровь. На одной фотографии изображён второй человек в такой же одежде. Другой свидетель утверждает, что видел, как гонщика толкала машина во время ночного этапа. Обвиняемый всё отрицает, называя это завистью и политикой."
 vikelas.624.g: "Дисквалифицировать гонщика и разоблачить мошенничество."
 vikelas.624.h: "Замять это ради блага спорта."
 vikelas.625.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.625.d: "В этом гоночном сезоне разгорелось ожесточённое соперничество. Два гонщика — равные по силе, противоположные по стилю — разделили нацию на два лагеря."
 vikelas.625.f: "Один — огонь: безрассудный, смелый, обожаемый молодёжью. Он бросает свою кепку в толпу, смеётся, крутя педали, и атакует без предупреждения.\nДругой — лёд: спокойный, расчётливый, почти математический. Он экономит силы, выигрывает секунды и говорит только по необходимости.\n\nИх имена выкрикивают с крыш. Города принимают стороны. Печатаются плакаты красного или синего цвета. Портные продают кепки в их цветах. Дети подражают их позам на деревянных велосипедах.\nГазеты говорят не только о гонке. Они говорят о характере, о философии, о том, кем хотят быть люди. И ни один гонщик не уступает ни дюйма."
 vikelas.625.g: "Это пойдёт на пользу газетной культуре."
 vikelas.625.h: "Использовать соперничество в политических целях."
 vikelas.626.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]"
 vikelas.626.d: "В этом гоночном сезоне разгорелось ожесточённое соперничество. Два гонщика — равные по силе, противоположные по стилю — разделили нацию на два лагеря."
 vikelas.626.f: "«Они нашли его в деревенской кузнице, с молотом в руке, с лицом, почерневшим от сажи, одного».\n\nСпуск был предательским. Неверно оценённый поворот, хруст гравия — и передняя вилка сломалась. Его велосипед сложился, как раненая птица. Большинство бы остановилось. Но не он.\nОн хромал вниз по склону, таща раму километрами. В отдалённой деревне он нашёл кузницу. Ни механиков. Ни машины команды. Только меха, наковальня и его собственные две руки.\nЧасами он работал — рукава закатаны, челюсти сжаты — перековывая переднюю вилку по памяти и на ощупь. Когда прибыли официальные лица, он остановился только для того, чтобы бросить на них взгляд и сказать: «Не трогайте».\nЧерез восемь часов после лидеров он снова поехал. Никаких шансов на победу. Но по всему маршруту толпы вставали, чтобы приветствовать — не победителя, а того, кто отказался остановиться."
 vikelas.626.g: "Вдохновляющая история."
 vikelas.626.h: "Разрешить экстренный ремонт."
 vikelas.626.i: "Почтить его!"
 vikelas.401.t: "Международная федерация футбола"
 vikelas.401.d: "Сегодня в городе [GetGlobalVariable('vikelas_fifa_seat_global_var').GetStateRegion.GetCityHubName] была основана Международная федерация футбола. Её полное название — Fédération Internationale de Football Association (FIFA)."
 vikelas.401.f: "21 мая 1904 года делегаты из семи стран — Бельгии, Дании, Франции, Нидерландов, Испании, Швеции и Швейцарии — подписали устав. Цель: стандартизировать футбольные правила, организовывать международные матчи и поднять игру на мировой уровень. Так родилась Fédération Internationale de Football Association — ФИФА. В первые десятилетия ФИФА была скромной: президент на неполный рабочий день, игроки-любители и региональные споры. Но под поверхностью росло глобальное движение. Англия колебалась с вступлением, опасаясь иностранного вмешательства. Южноамериканцы начали формировать свои собственные конфедерации. В 1924 и 1928 годах олимпийские турниры показали истинный размах футбола: 60 000 зрителей в Париже, аплодирующих не армиям, а командам."
 vikelas.401.g: "Присоединиться к ФИФА и поддержать международные соревнования."
 vikelas.411.t: "Чемпионат мира по футболу [TimeKeeper.GetCurrentDate.Format('y')]"
 vikelas.411.d: "ФИФА решила, что чемпионат мира этого года пройдёт в [SCOPE.sCountry('vikelas_fifa_host_scope').GetAltNameNoFlag('RU_CL_PP')]. После предварительного раунда список фаворитов сузился до восьми команд."
 vikelas.411.f: "#V Следующие национальные команды вышли в четвертьфинал#!\n\n[SCOPE.sCountry('vikelas_first_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_second_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_third_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fourth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fifth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_sixth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_seventh_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_eighth_qualified_team_scope').GetName]"
 vikelas.411.g: "Пусть победит лучшая команда."
 vikelas.412.t: "Чемпионы мира"
 vikelas.412.d: "Наша команда одержала победу на мировой арене, победив лучшие команды со всех континентов. По всей стране вспыхивают празднования!"
 vikelas.412.f: "В напряжённом матче против [SCOPE.sCountry('vikelas_second_winner_team_scope').GetAltNameNoFlag('RU_CL_RP')] наша команда проявила себя в финале чемпионата мира в [SCOPE.sCountry('vikelas_fifa_host_scope').GetAltNameNoFlag('RU_CL_PP')]. Наша национальная команда подняла золотой трофей. Финальный свисток разнёсся по радио, кафе, казармам. От шахтёров на севере до торговцев в порту, народ ликовал как один. Капитан плачет на подиуме. Новое поколение смотрит и мечтает."
 vikelas.412.g: "Мы — чемпионы."
 vikelas.413.t: "Серебряная слава в [SCOPE.sCountry('vikelas_fifa_host_scope').GetAltNameNoFlag('RU_CL_PP')]"
 vikelas.413.d: "Наша футбольная команда дошла до финала — и остановилась в шаге от славы. По всей стране гордость и горе смешиваются в равной мере."
 vikelas.413.f: "К сожалению, лучшего от нашей команды оказалось недостаточно. В напряжённом матче против [SCOPE.sCountry('vikelas_first_winner_team_scope').GetAltNameNoFlag('RU_CL_RP')] наши парни уступили. Неделями они несли на себе надежды нации. На грязных полях и в палящей жаре они бежали, они боролись, они верили. Матч за матчем они становились легендами. Они держали головы высоко, когда играл другой гимн. Ни слёз, только тишина — а затем медленные, нарастающие аплодисменты."
 vikelas.413.g: "У нас это украли!"
 vikelas.414.t: "Мечта закончилась рано"
 vikelas.414.d: "Наша национальная команда досрочно выбыла с чемпионата мира по футболу в [SCOPE.sCountry('vikelas_fifa_host_scope').GetAltNameNoFlag('RU_CL_PP')]. [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] победила [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] в финале."
 vikelas.414.f: "Была надежда — настоящая, ощутимая надежда. Победы, которые праздновали на заводских дворах, радиокомментарии, которые шептали в церквях, дети, повторяющие голы в переулках. Команда символизировала нечто большее, чем футбол: амбиции, гордость, веру в то, что мы можем превзойти себя. Но последний матч всё изменил. Один пропущенный гол. Незамеченная игра рукой. Упущенная возможность. Теперь мечта окончена, и мир идёт дальше."
 vikelas.414.g: "Мы верили. Этого было достаточно."
