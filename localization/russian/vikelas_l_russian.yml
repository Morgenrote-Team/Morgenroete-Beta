 je_vikelas_baseball: "Бейсбол"
 je_vikelas_baseball_reason: "Бейсбол стал национальным видом спорта Соединённых Штатов в XIX веке и оттуда начал своё путешествие по миру. Первая задокументированная игра состоялась в Хобокене, штат Нью-Джерси, в 1846 году. В 1860-х годах игра быстро профессионализировалась; в 1876 году была основана Национальная лига, первая крупная профессиональная лига. В то же время бейсбол распространился в других странах через американских солдат, торговцев и миссионеров."
 je_vikelas_baseball_fail: "Любая страна изобретает бейсбол раньше [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]."
 je_vikelas_football: "Футбол"
 je_vikelas_football_reason: "Первые единые футбольные правила появились в Англии в 1840-х годах, Футбольная ассоциация была основана в 1863 году, а первый официальный международный матч между Англией и Шотландией состоялся в 1872 году. Из Великобритании футбол распространился на континент и в Южную Америку. Национальные ассоциации и лиги возникли в Германии, Франции, Италии и Испании с 1890-х годов. В то же время футбол также распространился в Аргентине, Бразилии и Уругвае, где британские железнодорожники и эмигранты основали первые клубы."
 je_vikelas_football_fail: "Любая страна изобретает футбол раньше [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]."
 je_vikelas_cricket: "Крикет"
 je_vikelas_cricket_reason: "Истоки крикета уходят в позднее Средневековье: уже в XVI веке дети в Кенте играли в простую игру с битой и мячом, называемую в старых документах «creckett» или «creag». Однако только в XVIII веке она начала развиваться в сложную, регламентированную игру. В этот период возникли первые организованные клубы, и с основанием Мэрилебонского крикетного клуба (MCC) в Лондоне в 1787 году крикет обрёл свой центр. MCC установил первые обязательные правила, которые стали отправной точкой для современной игры."
 je_vikelas_cricket_fail: "Любая страна изобретает крикет раньше [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]."
 je_vikelas_cricket_national_league: "Национальная лига крикета"
 je_vikelas_cricket_national_league_reason: "В XIX веке крикет, давно утвердившийся в Англии как развлечение аристократов и простолюдинов, начал приобретать более организованную структуру. Решающий момент наступил в 1890 году с созданием Чемпионата графств, первой официальной внутренней крикетной лиги в мире. До этого матчи между графствами проводились с XVIII века, но без формальной системы очков или турнирной таблицы. Чемпионат графств привнёс стандартизированное соревнование в английский крикет, и Йоркшир, Суррей и Ланкашир стали доминирующими командами в первые годы. Крикетные клубы за пределами Англии, особенно в Австралии и Южной Африке, также начали организовывать структурированные соревнования."
 je_vikelas_baseball_national_league: "Национальная бейсбольная лига"
 je_vikelas_baseball_national_league_reason: "В 1860-х годах бейсбол, ранее популярный в основном в Нью-Йорке, стал национальным явлением в Соединённых Штатах. Решающим фактором для этого стали солдаты, которые играли в эту игру в военных лагерях во время Гражданской войны в США и таким образом обеспечили её более широкое распространение. В 1857 году была основана первая американская бейсбольная ассоциация, Национальная ассоциация бейсболистов (NABBP). К 1867 году в ассоциацию вступило более 400 клубов. Однако сильнейшие команды по-прежнему находились на северо-востоке США, особенно в Нью-Йорке. Основанная в 1871 году организация-преемник NABBP, Национальная ассоциация профессиональных бейсболистов (NAPBBP) — также известная как Национальная ассоциация (NA) — считается первой профессиональной бейсбольной лигой в мире."
 je_vikelas_football_national_league: "Национальная футбольная лига"
 je_vikelas_football_national_league_reason: "В конце XIX века футбол, который ранее был слабо организованным развлечением в государственных школах и местных общинах Англии, превратился в национальное явление. Решающим фактором для этого стало основание Футбольной ассоциации (FA) в 1863 году, которая кодифицировала правила и позволила проводить организованные соревнования. К 1870-м годам популярность этого вида спорта быстро распространилась, особенно среди рабочих общин в промышленных городах. В 1888 году в Англии была создана Футбольная лига, ставшая первой профессиональной футбольной лигой в мире. В неё вошли 12 клубов из Мидлендса и Севера, а среди первых лидеров были такие команды, как «Престон Норт Энд» и «Астон Вилла»."
 je_vikelas_basketball_national_league: "Национальная баскетбольная лига"
 je_vikelas_basketball_national_league_reason: "В начале XX века баскетбол, изобретённый в 1891 году Джеймсом Нейсмитом, превратился из тренировочного занятия YMCA в соревновательный вид спорта. Ключевое событие произошло в 1898 году с основанием Национальной баскетбольной лиги (NBL) в Соединённых Штатах, считающейся первой профессиональной баскетбольной лигой в мире. Лига состояла из шести команд из Пенсильвании и Нью-Джерси и ознаменовала первые шаги баскетбола к профессионализму. Однако первоначальная NBL просуществовала недолго и была распущена в 1904 году. Потребовалось дождаться 1946 года, с образованием Баскетбольной ассоциации Америки (BAA) — позже объединённой в НБА — чтобы профессиональный баскетбол стал стабильным, общенациональным предприятием."
