 vikelas_sports_clubs_tech: "Спортивные клубы"
 vikelas_sports_clubs_tech_desc: "В XVIII веке в Англии появились первые спортивные клубы, особенно для скачек, бокса и крикета. Они сыграли центральную роль в институционализации спорта: через организационные структуры, членство и регулярные мероприятия были установлены обязательные правила и положения. Эта профессионализация заложила основу для современных спортивных систем с ассоциациями, лигами и международными соревнованиями."
 vikelas_international_sports_tech: "Международный спорт"
 vikelas_international_sports_tech_desc: "Популярность спортивных соревнований распространилась сначала на национальном, а затем на международном уровне. Для лучшего регулирования соревнований между нациями потребовались международные комитеты, федерации и правила. Олимпийские игры и МОК — самые заметные фигуры в этом развитии."
