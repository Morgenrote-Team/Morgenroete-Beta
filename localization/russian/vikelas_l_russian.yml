 vikelas_speedster_racer_desc: "Этот гонщик полностью зависим от адреналина скорости и делает всё возможное, чтобы быть самым быстрым."
 vikelas_enduring_racer: "Выносливый гонщик"
 vikelas_enduring_racer_desc: "Сила этого гонщика заключается в длительных, дальних поездках, и он уделяет больше внимания защите двигателя."
 vikelas_prudent_racer: "Осторожный гонщик"
 vikelas_prudent_racer_desc: "Основное внимание этого гонщика сосредоточено на безопасном и надёжном прибытии в пункт назначения."
