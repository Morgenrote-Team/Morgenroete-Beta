 vikelas.583.f: "«Автогонки начались через пять минут после того, как был построен второй автомобиль». — Генри Форд"
 vikelas_new_body_tt: "Текущий кузов будет модернизирован."
 vikelas.584.t: "V-образный двигатель"
 vikelas.584.d: "Наш инженер, доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName], сделал[SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'а', '')] революционное предложение о том, как мог бы выглядеть новый двигатель для гонок, и связал[SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'ась', 'ся')] с механиком [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName]."
 vikelas.584.f: "V-образный двигатель — это тип поршневого двигателя с несколькими цилиндрами. Они разделены на два ряда цилиндров, расположенных под углом друг к другу. V-образные двигатели широко используются, особенно с большим количеством цилиндров и ограниченным пространством для установки. Компактная конструкция экономит материал и, следовательно, вес. Первый V-образный двигатель, двухцилиндровый V-twin, был разработан Вильгельмом Майбахом и использовался в автомобиле Daimler Stahlradwagen 1889 года. Первый двигатель V8 был произведён в 1903 году в виде двигателя Antoinette, разработанного Леоном Левавассёром для гоночных лодок и самолётов."
 vikelas.584.g: "Эврика!"
 vikelas.585.t: "Улучшенное топливо"
 vikelas.585.d: "Наш химик, доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], доработал топливо для двигателей внутреннего сгорания таким образом, что оно может сыграть решающую роль в повышении эффективности и производительности гоночных автомобилей. [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] выразил[SelectLocalization(ROOT.Var('vikelas_mechanic_var').GetCharacter.IsFemale, 'а', '')] большой интерес к тестовым заездам."
 vikelas.585.f: "Первые десятилетия бензиновых топлив были чрезвычайно изменчивы. Многие компании имели тенденцию разбавлять топливо или смешивать его с другими чистыми видами топлива. Николаус Август Отто уже использовал ректификованный спирт. В некоторых странах нехватка нефти привела к разработке альтернатив — или к повышению эффективности имеющегося количества топлива. В гонках улучшенные виды топлива и смазочные масла использовались для оптимизации ходовых качеств."
 vikelas.585.g: "Эврика!"
 vikelas.586.t: "Аэродинамические силы"
 vikelas.586.d: "Наш физик, доктор [ROOT.Var('curie_physicistvar').GetCharacter.GetLastName], описал[SelectLocalization(ROOT.Var('curie_physicistvar').GetCharacter.IsFemale, 'а', '')] некоторые расчёты по аэродинамическим силам, которые могут быть полезны для автомобилестроения. Автомеханик [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] получил[SelectLocalization(ROOT.Var('vikelas_mechanic_var').GetCharacter.IsFemale, 'а', '')] копию работы."
 vikelas.586.f: "«Аэродинамика — для людей, которые не умеют строить двигатели». — Энцо Феррари"
 vikelas.586.g: "Эврика!"
 vikelas.590.t: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] теперь знаменитый гонщик!"
 vikelas.590.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] выигрывал[SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'а', '')] гонки по всему миру и знаменит[SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'а', '')] своим гоночным стилем. [SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'Она', 'Он')] теперь достаточно знаменит[SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'а', '')], чтобы считаться знаменитым гонщиком!"
 vikelas.590.f: ""
 vikelas.590.g: "Живая легенда!"
 vikelas.591.t: "Наш автогонщик, [SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullNameNoFormatting], уходит на пенсию"
 vikelas.591.d: "Проведя годы своей жизни, гоняя на автомобилях по всему миру, [SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullName] теперь уходит на пенсию. [SelectLocalization(SCOPE.sCharacter('vikelas_retired_racer_scope').IsFemale, 'Она', 'Он')] больше не будет активным [Concept('concept_vikelas_racer', 'автогонщиком')]."
 vikelas.591.g: "[SelectLocalization(SCOPE.sCharacter('vikelas_retired_racer_scope').IsFemale, 'Она', 'Он')|U] заслужил[SelectLocalization(SCOPE.sCharacter('vikelas_retired_racer_scope').IsFemale, 'а', '')] свою пенсию!"
 vikelas.591.h: "Из него получился бы отличный инженер!"
 vikelas.591.new_racer_replace_tt: "[SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullName] уйдёт на пенсию, а [SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName] станет новым [Concept('concept_vikelas_racer', 'автогонщиком')] [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]."
 vikelas.591.racer_to_engineer_tt: "[SCOPE.sCharacter('vikelas_retired_racer_scope').GetFullName] станет вашим новым [Concept('concept_tesla_engineer', 'инженером')]. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_replacement_engineer_custom_loc')]"
 vikelas.591.new_racer_tt: "[SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName] станет новым [Concept('concept_vikelas_racer', 'автогонщиком')] [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]."
 vikelas.592.t: "Наш [Concept('concept_vikelas_racer', 'автогонщик')] умер"
 vikelas.592.d: "Проведя годы в качестве [Concept('concept_vikelas_racer', 'автогонщика')], известный автогонщик нашей страны умер. Сможем ли мы когда-нибудь заменить такой поразительный талант?"
 vikelas.592.g: "Это огромная потеря!"
 vikelas.592_tt: "Иногда игра убивает персонажей. Мод не может это предотвратить. Это событие удаляет роль этого [Concept('concept_character', 'персонажа')] из игры, чтобы вас не преследовал его призрак."
 vikelas.593.t: "Смертельная автокатастрофа"
 vikelas.593.d: "Гонщик [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] слишком сильно испытал свою удачу. [SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'Она', 'Он')|U] вылетел[SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'а', '')] с трассы на слишком высокой скорости и попал[SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'а', '')] в смертельную аварию."
 vikelas.593.f: "«Гонки — это великая мания, которой нужно жертвовать всем, без утайки, без колебаний». — Энцо Феррари"
 vikelas.593.g: "Следующий!"
 vikelas.594.t: "Поломка автомобиля"
 vikelas.594.d: "К сожалению, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'была вынуждена', 'был вынужден')] сойти с дистанции до окончания гонки. Машина сломалась, как [SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'она', 'он')]утверждает."
 vikelas.594.f: "«Невезения не существует». — Энцо Феррари"
 vikelas.594.g: "Это была машина, или гонщик перегрузил двигатель?"
 vikelas.595.t: "Новый гонщик"
 vikelas.595.d: "Новый [Concept('concept_vikelas_racer', 'автогонщик')] представился. [SelectLocalization(SCOPE.sCharacter('vikelas_new_racer_scope').IsFemale, 'Её', 'Его')] зовут [SCOPE.sCharacter('vikelas_new_racer_scope').GetFullName]."
 vikelas.595.g: "Будем надеяться, [SelectLocalization(SCOPE.sCharacter('vikelas_new_racer_scope').IsFemale, 'ей', 'ему')] повезёт больше."
 vikelas.596.t: "Новый механик"
 vikelas.596.d: "Новый [Concept('concept_vikelas_mechanic', 'механик')] представился. [SelectLocalization(SCOPE.sCharacter('vikelas_new_mechanic_scope').IsFemale, 'Её', 'Его')] зовут [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetFullName]. [SelectLocalization(SCOPE.sCharacter('vikelas_new_mechanic_scope').IsFemale, 'Её', 'Его')] специализация — в области..."
 vikelas_autoracing_found_automobile_club_button: "Основать автомобильный клуб"
 vikelas_autoracing_found_automobile_club_button_desc: "Создание автомобильного клуба — это первый шаг к строительству других объектов, необходимых для автоспорта."
 vikelas_autoracing_long_distance_button: "Организовать гонку на выносливость"
 vikelas_autoracing_long_distance_button_desc: "Гонки на выносливость, часто между городами, были нормой в ранние дни автомобильных гонок и продолжались до середины XX века. В Италии гонки, такие как Тарга Флорио или Милле Милья, являются самыми известными примерами. Они подвергали человека и машину особому испытанию и долгое время считались настоящими национальными автомобильными гонками."
 vikelas_autoracing_found_grand_prix_button: "Основать гонки Гран-при"
 vikelas_autoracing_found_grand_prix_button_desc: "В 1906 году была организована первая официальная гонка Гран-при в истории автомобилестроения — гонка за Гран-при ACF. Независимо от страны происхождения, было допущено до трёх гоночных автомобилей на одного автопроизводителя, как первоначально просили представители французской промышленности. В соответствии со своим статусом самого важного из всех соревнований, гонка проводилась на дистанции более 1200 км и в течение двух дней подряд. В 1925 году по инициативе Автомобильного клуба Италии было наконец объявлено о введении официального чемпионата мира. В качестве гонок были определены три официальные гонки Гран-при сезона (Франция, Италия и Бельгия), а также Индианаполис как самое важное американское гоночное событие."
 vikelas_autoracing_race_track_button: "Построить гоночную трассу"
 vikelas_autoracing_race_track_button_desc: "С появлением гонок Гран-при постоянная гоночная трасса всё больше становится нормой для автомобильных гонок. Специальная гоночная трасса не только централизовала бы международные гоночные события в одном месте, но и как испытательная трасса давала бы нашим гонщикам бонус к опыту каждый год."
 vikelas_coach: "Тренер"
 vikelas_coach_desc: "Этот персонаж тренирует спортивную команду."
 vikelas_coach_senior: "Старший тренер"
 vikelas_coach_senior_desc: "Этот тренер — легенда в спортивном мире благодаря своему многолетнему опыту."
