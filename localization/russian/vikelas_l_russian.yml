 vikelas.300.t: "Новый вид спорта"
 vikelas.300.d_football: "Всё больше наших граждан увлекаются новой игрой: футболом. Хотя многие критикуют этот «импорт» из [SCOPE.sCountry('vikelas_overlord_country_scope').GetAltNameNoFlag('RU_CL_RP')], этот вид спорта стал настолько популярен, что его почти невозможно избежать."
 vikelas.300.d_baseball: "Всё больше наших граждан увлекаются новой игрой: бейсболом. Хотя многие критикуют этот «импорт» из [SCOPE.sCountry('vikelas_overlord_country_scope').GetAltNameNoFlag('RU_CL_RP')], этот вид спорта стал настолько популярен, что его почти невозможно избежать."
 vikelas.300.d_cricket: "Всё больше наших граждан увлекаются новой игрой: крикетом. Хотя многие критикуют этот «импорт» из [SCOPE.sCountry('vikelas_overlord_country_scope').GetAltNameNoFlag('RU_CL_RP')], этот вид спорта стал настолько популярен, что его почти невозможно избежать."
 vikelas.300.f: "«Игра подобна отдыху, а поскольку вы не можете работать непрерывно, вам нужен отдых». — Аристотель"
 vikelas.300.g: "Гол!"
 vikelas.300.h: "Дай мне мою биту!"
 vikelas.300.i: "Хороший мяч."
 vikelas.300.football.tt: "Футбол станет национальным видом спорта в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')]."
 vikelas.300.baseball.tt: "Бейсбол станет национальным видом спорта в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')]."
 vikelas.300.cricket.tt: "Крикет станет национальным видом спорта в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')]."
 vikelas.301.t: "Основан крикетный клуб"
 vikelas.301.d: "Некоторые влиятельные люди основали спортивный клуб, чтобы заниматься своим любимым развлечением: крикетным клубом города [SCOPE.GetRootScope.GetState.GetStateRegion.GetCityHubName]."
 vikelas.301.f: "XIX век был эпохой, когда крикет превратился из сельского развлечения в спорт национального и международного значения. Английские высшие классы сделали игру своим любимым развлечением: её культивировали в пансионах, таких как Итон и Харроу, и прославляли как «спорт джентльменов». В то же время её популярность росла среди рабочего класса, особенно в северной Англии, где фабричные рабочие основывали свои собственные клубы. Эта демократизация игры привела к беспрецедентному росту клубов и зрителей.\n\nМеждународные матчи не заставили себя долго ждать. В 1844 году в Нью-Йорке состоялся первый в мире задокументированный международный матч между Канадой и Соединёнными Штатами."
 vikelas.301.g: "Передай мне биту!"
 vikelas.301.h: "Какая претенциозная игра."
 vikelas.302.t: "Основан бейсбольный клуб"
 vikelas.302.d: "Бейсбол утвердился как популярное развлечение в [SCOPE.sState('vikelas_baseball_club_state_scope').GetCustom('RU_SL_PP')]. Был создан новый бейсбольный клуб, который регулярно проводит игры: [SCOPE.sState('vikelas_baseball_club_state_scope').GetCustom('vikelas_historical_baseball_club_names_type')]."
 vikelas.302.f: "В 1840-х годах бейсбол начал выходить из тени своих предшественников и принимать отчётливую форму. Соединённые Штаты переживали быструю урбанизацию, и растущие города искали развлечения, которые могли бы способствовать развитию сообщества, отражая при этом дух новой нации. Поворотный момент наступил в 1845 году, когда Александр Картрайт и члены бейсбольного клуба «Никербокер» в Нью-Йорке установили первые стандартизированные правила игры. Эти «правила Никербокера» заложили основу современного бейсбола: ромбовидное поле с четырьмя базами, три аута за иннинг и девять игроков в команде. Они значительно отличались от менее формальных версий, игравшихся до этого на лужайках и полях. 19 июня 1846 года клуб «Никербокер» сыграл первую задокументированную игру по этим правилам в Хобокене, штат Нью-Джерси. Команда проиграла «Нью-Йорк Найн», но это событие ознаменовало символическое рождение организованного бейсбола."
 vikelas.302.g: "Хоум-ран."
 vikelas.303.t: "Основан футбольный клуб"
 vikelas.303.d: "Рабочие и трудящиеся в [SCOPE.sState('vikelas_football_club_state_scope').GetCustom('RU_SL_PP')] неделями собирались на футбольные матчи. Теперь они основали клуб: [SCOPE.sState('vikelas_football_club_state_scope').GetCustom('vikelas_historical_football_club_names_type')]."
 vikelas.303.f: "В первой половине XIX века футбол в Англии ещё не был единым видом спорта, а скорее собирательным термином для множества игр с мячом, в которые играли в городах, деревнях и школах. Эти игры часто кардинально отличались своими правилами. Первый шаг к стандартизации был сделан Кембриджскими правилами 1848 года, попыткой создать единые правила для студентов Кембриджа. Они не были окончательным решением, но заложили основу для того, что последовало. Настоящий прорыв произошёл 26 октября 1863 года, когда одиннадцать клубов встретились в таверне «Фримейсонс» в Лондоне и основали Футбольную ассоциацию (FA). В течение нескольких недель они договорились о своде правил, которые позволяли играть в мяч только ногами и запрещали носить или бросать мяч — компромисс, который разозлил сторонников регби, которые впоследствии отделились и разработали свой собственный свод правил. С основанием FA родился современный футбол."
 vikelas.303.g: "Гол!"
 vikelas.304.t: "Основан баскетбольный клуб"
 vikelas.304.d: "В [SCOPE.sState('vikelas_basketball_club_state_scope').GetCustom('RU_SL_PP')] был основан баскетбольный клуб с целью распространения игры по всей [GetPlayer.GetAltNameNoFlag('RU_CL_DP')]."
 vikelas.304.f: "Баскетбол — самый молодой из великих современных видов спорта. Его корни тесно связаны с социальными движениями конца XIX века. В 1891 году канадский врач и преподаватель физкультуры Джеймс Нейсмит столкнулся с проблемой: ему нужно было изобрести игру в помещении для студентов тренировочного института YMCA в Спрингфилде, штат Массачусетс, в которую они могли бы играть даже в холодную зиму Новой Англии. YMCA хотела использовать спорт для укрепления физического и нравственного здоровья молодых людей — образовательный проект в духе протестантизма и урбанизации. Баскетбол с его быстрыми заменами и чёткими правилами идеально соответствовал этой миссии. Это была игра, которая способствовала развитию чувства общности, предлагая при этом растущим американским городам новое развлечение."
 vikelas.304.g: "В корзину!"
 vikelas.304.h: "Какая глупая игра."
 vikelas.311.t: "Спортивная газета"
 vikelas.311.d: "В [SCOPE.sState('vikelas_gazette_state').GetCustom('RU_SL_PP')] издатель разработал новый формат газеты: посвящённый исключительно спортивным репортажам, с акцентом на [Country.MakeScope.Var('vikelas_national_sport_var').GetFlagName]. Газета продаётся как горячие пирожки."
 vikelas.311.f: "Когда спорт покинул свою арену в конце XIX века и перекочевал в города, кафе и умы масс, ему понадобился новый носитель. Не только посетителям стадионов нужно было знать о победах и поражениях, но и рабочему у ворот фабрики и служащему с газетой в руках. В Италии именно «Gazzetta dello Sport» удовлетворила эту потребность и открыла новую эру спортивной журналистики. Основанная 3 апреля 1896 года в Милане — едва ли за три недели до первых современных Олимпийских игр в Афинах — «Гадзетта» с самого начала была больше, чем просто бюллетень результатов. Она видела себя голосом зарождающегося спорта: для велоспорта, лёгкой атлетики, футбола, фехтования — и для всего, что обещало скорость, соревнование и страсть. Первоначально выходившая дважды в неделю, чёрным шрифтом на простой бумаге, она ценила не только факты: она рассказывала истории, превращала спортсменов в героев, а игры — в драмы. В 1899 году произошло нечто, что сделало газету культовой: бумага стала розовой. Изначально это был прагматичный шаг, потому что розовая бумага была дешевле, но вскоре это стало торговой маркой."
 vikelas.321.t: "Бейсбол"
 vikelas.321.d: "Народ нашей страны познакомился с американским видом спорта, который набирает всё больше поклонников. [GetPlayer.GetNameNoFlag] охвачен[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] бейсбольной лихорадкой."
 vikelas.321.f: "Хотя бейсбол воспринимается как национальный вид спорта США, он также распространился в двух других, принципиально разных странах, где вскоре занял аналогичное положение. Игра была завезена в Японию Горацием Уилсоном в 1872 году, вскоре после открытия страны. В то время, когда Япония была открыта для западных нововведений, игра быстро стала популярной. Однако прошло более 30 лет, прежде чем спорт стал более профессиональным. Бейсбол также был популяризирован на Кубе Немесио Гильотом, который основал первый крупный бейсбольный клуб в стране. Он стал самым популярным видом спорта в стране в 1870-х годах, до периода американской интервенции. Несмотря на своё американское происхождение, бейсбол тесно связан с кубинским национализмом, поскольку он фактически заменил колониальные испанские виды спорта, такие как коррида."
 vikelas.403.t: "ФИФА: новый совет"
 vikelas.403.f: "ФИФА определила следующий состав:\n\n#V Президент: [GetGlobalVariable('vikelas_fifa_president_global_var').GetCountry.GetName] #!\n\n#V Совет: [GetGlobalVariable('vikelas_fifa_board_member_1_global_var').GetCountry.GetName|V] [GetGlobalVariable('vikelas_fifa_board_member_2_global_var').GetCountry.GetName|V] [GetGlobalVariable('vikelas_fifa_board_member_3_global_var').GetCountry.GetName|V] [GetGlobalVariable('vikelas_fifa_board_member_4_global_var').GetCountry.GetName|V] [GetGlobalVariable('vikelas_fifa_board_member_5_global_var').GetCountry.GetName|V]"
 vikelas.403.g: "Хороший выбор."
 vikelas.403.h: "И не было никакого взяточничества?"
