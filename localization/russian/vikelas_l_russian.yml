 vikelas_ioc_foundation_button: "Основать МОК"
 vikelas_ioc_foundation_button_desc: "Международный олимпийский комитет (МОК) — это неправительственная организация в форме ассоциации. Цель комитета — организация и контроль современных Олимпийских игр. Страна-основатель имеет постоянное место в совете, который принимает решения о местах проведения Олимпийских игр. Вскоре после основания МОК могут быть организованы первые Олимпийские игры, которые с тех пор будут проходить каждые четыре года. При определённых условиях другие страны могут присоединиться к МОК в качестве постоянных членов, но количество мест в совете ограничено."
 vikelas_ioc_statistics_button: "Посетить МОК"
 vikelas_ioc_statistics_button_desc: "Посетите Международный олимпийский комитет, чтобы получить информацию о членах, следующих Олимпийских играх или международной медальной таблице."
 vikelas_ioc_member_button: "Стать членом МОК"
 vikelas_ioc_member_button_desc: "Присоединяйтесь к Международному олимпийскому комитету, чтобы соревноваться на Олимпийских играх, проводимых раз в четыре года. Члены МОК также имеют шанс провести игры в своей стране."
 vikelas_ioc_bribe_button: "Подкупить МОК"
 vikelas_ioc_bribe_button_desc: "Щедрое «пожертвование» совету директоров МОК поможет нам заручиться поддержкой его членов и стать четвёртым кандидатом на проведение следующих Олимпийских игр. Однако это не гарантирует, что выберут именно нас. Другие члены МОК могут неверно истолковать нашу щедрость."
 vikelas_olympic_flame_button: "Олимпийский огонь"
 vikelas_olympic_flame_button_desc: "Олимпийский огонь, основанный на вечно горящем очаге греческой богини Гестии, был впервые представлен на Олимпийских играх 1928 года в Амстердаме. Традиция связанной с ним эстафеты олимпийского огня была введена на летних Играх в Берлине в 1936 году. Вопреки распространённому мнению, идея исходила не от национал-социалистов, а от немецко-еврейского археолога Альфреда Шиффа. Введение этой традиции не только дало бы Олимпийским играм новый символ идентификации, но и ежегодно объединяло бы население и служило бы воодушевляющим символом, отвлекающим от других проблем."
 vikelas_school_sport_button: "Ввести школьный спорт"
 vikelas_school_sport_button_desc: "С введением школьного спорта мы можем увеличить общую вероятность появления личностей с характеристиками атлета и улучшить шансы на Олимпийских играх."
 vikelas_football_worldcup_button: "Организовать чемпионат мира по футболу"
 vikelas_football_worldcup_button_desc: "Чемпионат мира — это футбольное соревнование для национальных команд. Команды могут квалифицироваться в финал чемпионата мира каждые четыре года. В четырёхнедельном турнире лучшая национальная команда будет определена как чемпион мира. Международная федерация футбола (ФИФА) организует и продаёт турнир. Первый чемпионат мира состоялся в Уругвае в 1930 году и был выигран командой-хозяйкой."
 vikelas_football_worldcup_tt: "Иметь не менее #G 16#! стран с футбольной ассоциацией."
 je_vikelas_sports: "Спорт"
 je_vikelas_sports_reason: "В XIX веке организованный спорт приобрёл новое значение. Во многих национальных государствах создавались клубы, спортивные площадки стали общественными объектами, а спортивные занятия — широко распространённым досугом. Футбол и бейсбол превратились в национальные виды спорта, а велогонки и автогонки вскоре стали устоявшимися ритуалами массового общества. Венцом этого развития стало учреждение Олимпийских игр как международного события."
