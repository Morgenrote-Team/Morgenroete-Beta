 vikelas.582.d_level_3: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] улучшил[SelectLocalization(ROOT.Var('vikelas_mechanic_var').GetCharacter.IsFemale, 'а', '')] системы безопасности. Новейшим аксессуаром безопасности гоночного автомобиля являются #V гидравлические тормоза#!. Новый автомобиль теперь носит имя [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.582.d_level_4: "[ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] улучшил[SelectLocalization(ROOT.Var('vikelas_mechanic_var').GetCharacter.IsFemale, 'а', '')] системы безопасности. Новейшим аксессуаром безопасности гоночного автомобиля являются #V современные шины#!. Новый автомобиль теперь носит имя [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
