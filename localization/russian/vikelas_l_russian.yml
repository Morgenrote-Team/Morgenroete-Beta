 vikelas.121.t: "Гимнаст-коммунист"
 vikelas.121.d: "[SCOPE.sCharacter('vikelas_communist_athlete_scope').GetFullName] считается одним из самых талантливых гимнастов в нашей стране и имеет очень хорошие шансы на медаль. Однако его коммунистическое мировоззрение оскорбляет некоторых спортивных чиновников. Они опасаются, что политические группы могут использовать его как идола."
 vikelas.121.f: "Гимнастика — один из старейших олимпийских видов спорта и один из четырёх, которые были представлены на всех Олимпийских играх. Этот вид спорта состоит из трёх дисциплин: гимнастика (также называемая спортивной гимнастикой, аппаратной гимнастикой или гимнастикой на снарядах), художественная гимнастика и прыжки на батуте. Спортивная гимнастика входит в олимпийскую программу с Афин 1896 года."
 vikelas.121.g: "Неважно, что он думает, он должен победить!"
 vikelas.121.h: "У нас нет другого атлета?"
 vikelas.122.t: "Теннисист-реакционер"
 vikelas.122.f: "На первых Олимпийских играх 1896 года в программе были как жё-де-пом (в виде французского жё-де-лонг-пом), так и лаун-теннис. Однако, поскольку известные игроки из Франции, Великобритании и США не захотели принимать участие, поле участников по лаун-теннису состояло в основном из неизвестных игроков из Греции. Кроме того, были привлечены атлеты из других дисциплин, такие как британский метатель молота Джордж Стюарт Робертсон и венгерский тяжелоатлет Момчило Тапавица. Согласно распространённой легенде, атлет Фридрих Адольф Траун был убеждён ирландцем Джоном Пием Боландом принять участие в турнире в афинском магазине, когда он покупал теннисную ракетку. Теннис был олимпийским видом спорта до 1924 года и был вновь введён только в 1988 году."
 vikelas.123.t: "Атлет пропустил соревнование"
 vikelas.123.d: "Один из наших атлетов пропустил своё соревнование. Похоже, разные календари вызвали путаницу."
 vikelas.123.f: "«Что? Другой календарь? Почему существует несколько календарей? Почему мне никто не сказал?»\n\n#b Исторически#!, особенно во время первых современных Олимпийских игр, юлианский календарь, который использовался в Греции, вызывал проблемы и приводил к тому, что некоторые атлеты даже пропускали свои соревнования."
 vikelas.123.g: "Почему они используют другой календарь?!"
 vikelas_negative_influence_on_score_tt: "Это может оказать #n негативное#! влияние на шансы [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] завоевать медали."
 vikelas.124.t: "Благородный велосипедист"
 vikelas.124.d: "Наш велосипедист, [SCOPE.sCharacter('vikelas_honorable_cyclist_scope').GetFullName], остановился, когда у его соперника [SCOPE.sCharacter('vikelas_cyclist_with_problems_scope').GetFullName] возникли механические проблемы с велосипедом и ему пришлось его чинить. Они продолжили гонку вместе, когда велосипед был починен. [SCOPE.sCharacter('vikelas_honorable_cyclist_scope').GetLastName] в итоге всё равно выиграл гонку."
 vikelas.124.f: "«Как ваш велосипед, [SCOPE.sCharacter('vikelas_cyclist_with_problems_scope').GetLastNameNoFormatting]?»\n«О, это всего лишь небольшая проблема с цепью. Она застряла. Но спасибо, что подождали меня, [SCOPE.sCharacter('vikelas_honorable_cyclist_scope').GetLastNameNoFormatting]!»"
 vikelas.124.g: "Великолепный жест!"
 vikelas.125.t: "Велосипедиста сбила машина"
 vikelas.125.d: "Наш велосипедист, [SCOPE.sCharacter('vikelas_cyclist_with_accident_scope').GetFullName], участвовал в шоссейной гонке, когда его внезапно сбила машина. Он пострадал и сейчас находится в больнице. К счастью, похоже, у него лишь незначительные травмы."
 vikelas.125.f: "В интервью водитель, виновный в аварии, заявил: «Какая глупая идея. Велогонка на общественной дороге. Дорога принадлежит мне и моей машине, а не какому-то гонщику!»"
 vikelas.125.g: "Как это могло случиться?"
 vikelas.126.t: "Массовая авария в шоссейной гонке"
 vikelas.126.d: "Узкие улицы и массовый старт привели к массовой аварии в шоссейной гонке этого года. К счастью, сообщалось лишь о незначительных травмах, и после небольшого перерыва гонка была возобновлена."
 vikelas.126.f: "«Кто мог знать, что сотни велосипедистов, пытающихся выиграть соревнование и стартующих на дороге шириной 3 метра, станут причиной аварии? Мы были уверены, что участники будут осторожны в такой ситуации», — сказал один из организаторов репортёру."
 vikelas.126.g: "Хорошо, что никто не погиб!"
 vikelas.127.t: "Пьяный велосипедист"
 vikelas.127.d: "[SCOPE.sCharacter('vikelas_drunken_cyclist_scope').GetFullName], один из велосипедистов, выступающих за нашу страну, напился во время шоссейной гонки, вздремнул, а затем развернулся и поехал в неправильном направлении."
 vikelas.127.f: "«Итак, этот велосипедист шёл наравне с первым, но потом слез и зашёл в таверну. Жара, должно быть, вызвала у него сильную жажду. Затем он выпил две целые бутылки белого вина. Я никогда не видел, чтобы кто-то пил так быстро. После этого он вышел на улицу и заснул. Мы пытались его разбудить, и в какой-то момент он проснулся и в спешке уехал. К сожалению, он поехал не в ту сторону»."
 vikelas.127.g: "Какое постыдное зрелище!"
 vikelas.128.t: "Бесплатное пиво!"
 vikelas.128.d: "[SCOPE.sCharacter('vikelas_cheating_cyclist_scope').GetFullName] выиграл шоссейную гонку этого года, но не потому, что был самым быстрым, а потому, что не остановился, чтобы выпить бесплатного пива."
 vikelas.128.f: "Олимпийская шоссейная гонка этого года ознаменовалась очень странной победой. Долгое время [SCOPE.sCharacter('vikelas_cheating_cyclist_scope').GetFullNameNoFormatting] сильно отставал, но стол с бесплатным пивом заставил его соперников остановиться. Пока они пили, [SCOPE.sCharacter('vikelas_cheating_cyclist_scope').GetLastNameNoFormatting] проскользнул мимо и смог вырваться далеко вперёд, что и привело к его победе. Некоторые говорят, что бесплатное пиво не было случайностью и что [SCOPE.sCharacter('vikelas_cheating_cyclist_scope').GetLastNameNoFormatting] на самом деле за него заплатил. Однако доказать это невозможно."
 vikelas.128.g: "Ха! Вот к чему приводит пьянство."
 vikelas_positive_influence_on_score_tt: "Это может оказать #p положительное#! влияние на шансы [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] завоевать медали."
 vikelas.129.t: "Король швингена побеждает в соревнованиях по борьбе"
 vikelas.129.d: "Швейцарский борец швинген [SCOPE.sCharacter('vikelas_schwingerkonig_scope').GetFullName] выиграл соревнования по борьбе на Олимпийских играх этого года."
 vikelas.129.f: "«Я получаю только золотую медаль? В Швейцарии мы получаем быка!»"
 vikelas.129.g: "Достойный победитель!"
 vikelas.130.t: "Перетягивание каната"
 vikelas.130.d: "В широко разрекламированном турнире по перетягиванию каната на Олимпийских играх наш соперник, [SCOPE.sCountry('vikelas_rival_country_scope').GetName], использовал нечестные методы, чтобы вывести нашу команду из равновесия, а затем победил. Соперники неоднократно оскорбляли нашу команду шутками о нашей стране, нашей культуре и нашем языке."
 vikelas.130.f: "Перетягивание каната входило в программу Олимпийских игр с 1900 по 1920 год. Сейчас перетягивание каната считается самостоятельным видом спорта; в прошлом оно считалось частью тяжёлой атлетики или лёгкой атлетики. В Париже соревновались только две команды: французская команда и смешанная команда с датчанами и шведами. Каждая команда состояла из шести атлетов. Проводилось максимум три раунда; тот, кто выигрывал два из них, становился победителем. В последний раз перетягивание каната проводилось в Антверпене. Пять участников определяли медали по системе Бергвалля. После нокаут-раунда за золото команды, выбывшие от будущего победителя, играли нокаут-раунд за серебро, а затем третий нокаут-раунд за бронзу в том же формате."
 vikelas.130.g: "Однажды они об этом пожалеют!"
 vikelas.131.t_fencing: "Фехтующий генерал"
 vikelas.131.t_shooting: "Стреляющий генерал"
 vikelas.131.t_riding: "Ездящий верхом генерал"
 vikelas.131.d_fencing: "К удивлению многих своих товарищей, [SCOPE.sCharacter('vikelas_olympic_general_scope').GetFullName] принял участие в Олимпийских играх и удивил своих соперников своими замечательными навыками фехтования. Этого хватило только на серебряную медаль, но для своих соотечественников он — настоящий победитель."
 vikelas.131.d_shooting: "[SCOPE.sCharacter('vikelas_olympic_general_scope').GetFullName] принял участие в Олимпийских играх и владел винтовкой как никто другой. Только один промах помешал ему завоевать золотую медаль. На родине его всё равно считают героем."
 vikelas.131.d_riding: "На Олимпийских играх [SCOPE.sCharacter('vikelas_olympic_general_scope').GetFullName] показал такое впечатляющее выступление в верховой езде, что многие зрители видели в нём победителя. Дисквалификация разрушила его триумф, но он по-прежнему считается любимцем публики на играх."
 vikelas.131.f_fencing: "Фехтование — один из основополагающих видов спорта Афин 1896 года. В Афинах в программе было три соревнования: сабля и рапира для спортсменов-любителей и соревнование по рапире для мастеров фехтования. Шпага была добавлена в Париже в 1900 году, а командное фехтование — в Антверпене в 1920 году. В 1920 году женщины впервые боролись за золото в женской рапире в Антверпене. Кроме того, фехтование на шпагах является одной из пяти дисциплин современного пятиборья, которое было переработано как олимпийское соревнование и впервые проведено во время летних Игр 1912 года в Стокгольме."
 vikelas.131.f_shooting: "МОК включил девять соревнований по стрельбе в олимпийскую программу Второй Олимпиады. Стрельба из армейской винтовки играла здесь видную роль с 5 классификациями (лёжа, с колена, стоя, троеборье и в команде). Из более чем 6000 участвовавших стрелков только 72 спортсмена приняли участие в олимпийских соревнованиях. Призовая стрельба в то время была широко распространённым и прибыльным делом, но принятие денег за спортивные достижения не соответствовало олимпийскому духу, поэтому профессионалам не разрешалось принимать участие в олимпийских соревнованиях. Другими соревнованиями, не имевшими олимпийского характера, были стрельба по живым голубям, стрельба из арбалета и стрельба из пушки."
 vikelas.131.f_riding: "МОК включил три конноспортивных соревнования в олимпийскую программу Игр Второй Олимпиады; это был первый раз, когда верховая езда стала олимпийской дисциплиной. Точное количество участников в этих трёх соревнованиях восстановить уже невозможно. Известны имена только 15 всадников из 5 стран. Однако стартовало ещё 50 спортсменов, но нельзя исключать, что среди них было несколько многократных участников. Троеборье в Париже, Лондоне и Стокгольме изначально было зарезервировано для офицеров. Это было ослаблено только во время Седьмых Олимпийских игр в Антверпене."
 vikelas.131.g: "Превосходный атлет."
 vikelas.132.t_rowing: "Гребущий адмирал"
 vikelas.132.t_sailing: "Плавающий под парусом адмирал"
 vikelas.132.t_swimming: "Плавающий адмирал"
 vikelas.132.d_rowing: "[SCOPE.sCharacter('vikelas_olympic_admiral_scope').GetFullName] — не только превосходный адмирал, но и сильный гребец. Он соревновался на Олимпиаде со своей командой и заслужил уважение коллег и зрителей."
 vikelas.132.d_sailing: "[SCOPE.sCharacter('vikelas_olympic_admiral_scope').GetFullName] использовал свой богатый опыт на Олимпийских играх: ему удалось завоевать серебряную медаль со своей парусной командой. Впечатляющее достижение вдохновляет всю нацию."
 vikelas.132.d_swimming: "На Олимпиаде произошёл сюрприз. Без ведома своих коллег и не информируя правительство, [SCOPE.sCharacter('vikelas_olympic_admiral_scope').GetFullName] принял участие в Олимпийских играх как простой атлет. Кто бы мог подумать, что он такой превосходный пловец? Этого не хватило на золотую медаль, но хватило на долгое впечатление. Какой мастер на все руки!"
 vikelas.132.f_rowing: "На II Олимпийских играх в Париже организация гребли была настолько плохой, что комитету пришлось организовать два финала. Включение обоих финалов в список победителей МОК является признаком трудного осмысления обстоятельств, при которых проходили летние Олимпийские игры 1900 года."
 vikelas.132.f_sailing: "Олимпийский парусный спорт входит в программу Игр с 1900 года: на вторых современных Олимпийских играх в Париже команды впервые боролись за медали. Парусный спорт должен был дебютировать на Олимпиаде в Афинах в 1896 году, но соревнования не состоялись из-за плохих погодных условий. За исключением летних Олимпийских игр 1904 года, парусный спорт присутствовал на всех Олимпийских играх. Большинство олимпийских соревнований по парусному спорту проводились в так называемом формате гонок флота. Однако на некоторых Олимпиадах также был формат матч-рейсов или смешанный формат гонок флота/матч-рейсов."
 vikelas.132.f_swimming: "На летних Олимпийских играх 1896 года было проведено четыре соревнования по плаванию, все для мужчин. Они были спланированы и организованы Подкомитетом по водным видам спорта. Все соревнования состоялись 11 апреля в заливе Зея. Залив Зея — это морской порт и марина в районе Афин; он использовался как место проведения соревнований по плаванию, потому что организаторы Игр хотели избежать затрат на строительство специального плавательного бассейна. В соревнованиях приняли участие 13 участников из 4 стран. Женское плавание было введено в программу Олимпиады в 1912 году."
 vikelas.133.t_boxing: "Боксирующий политик"
 vikelas.133.t_wrestling: "Борющийся политик"
 vikelas.133.t_archery: "Стреляющий из лука политик"
 vikelas.133.d_boxing: "Многие уже подозревали, что [SCOPE.sCharacter('vikelas_olympic_politician_scope').GetFullName] — остроумный оратор. Но на олимпийских соревнованиях он показал, что может и физически нанести большой урон. Может, его политическим соперникам в будущем стоит быть осторожнее?"
 vikelas.133.d_wrestling: "Если бы кто-нибудь подозревал, что [SCOPE.sCharacter('vikelas_olympic_politician_scope').GetFullName] — одарённый борец, его политические соперники дважды подумали бы, прежде чем связываться с ним. На Олимпийских играх он завоевал почти столько же симпатий, сколько и в своей партии. Почти хватило, чтобы выиграть золотую медаль!"
 vikelas.133.d_archery: "[SCOPE.sCharacter('vikelas_olympic_politician_scope').GetFullName] всегда считался очень точным в своих речах. Однако до его выступления на Олимпиаде только его ближайшие друзья знали, что в свободное время он — одарённый лучник. Если бы избиратели любили его так же, как зрители на международном спортивном празднике, он скоро был бы на вершине государства!"
 vikelas.133.f_boxing: "Бокс — одна из старейших олимпийских дисциплин. Начало кулачных боёв как предшественника современного бокса можно проследить до Олимпийских игр 688 года до н. э. На Олимпийских играх 1904 года в Сент-Луисе бокс дебютировал как современный олимпийский вид спорта. Однако здесь принимали участие только американцы, всего 44 человека в семи весовых категориях. В 1912 году олимпийского турнира по боксу не было, потому что в то время бокс был запрещён в Швеции."
 vikelas.133.f_wrestling: "На летних Олимпийских играх 1896 года было проведено одно соревнование по борьбе. Оно было организовано и подготовлено Подкомитетом по борьбе и гимнастике. Соревновались пять участников из четырёх стран. Победителем стал немец Карл Шуман. Борьба сначала проходила в греко-римском стиле, а вольная борьба была введена в 1904 году. Борьба была важна на играх не в последнюю очередь потому, что древние Олимпийские игры уже включали эту дисциплину."
 vikelas.133.f_archery: "Международный олимпийский комитет (МОК) включил шесть соревнований по стрельбе из лука в олимпийскую программу Второй Олимпиады, потому что, по словам Пьера де Кубертена, основателя современных Олимпийских игр, и по мнению МОК, международное участие является основным требованием для стрельбы из лука на олимпийских соревнованиях. Стрельба из лука в то время была популярным видом спорта и поэтому была открыта большим парадом, в котором приняли участие 1723 лучника. Во всём соревновании приняли участие 5254 стрелка. В шести соревнованиях олимпийской программы известны имена только 17 участников, которые приехали из Франции и Бельгии. Однако в этих соревнованиях приняли участие значительно больше стрелков. Спортивные историки оценивают общее число участников в 153 человека, включая спортсменов из Нидерландов."
 vikelas.134.t: "Олимпийский чемпион"
 vikelas.134.d: "Многочисленные попытки, годы тренировок и несгибаемый дух наконец-то принесли  долгожданный успех: [SCOPE.sCharacter('vikelas_olympic_champion_scope').GetFullName] вернулся чемпионом и с гордостью носит свою золотую медаль!"
 vikelas.134.f: "Олимпийская система, которую мы знаем сегодня, которая награждала победителя золотой медалью, занявшего второе место — серебряной, а занявшего третье — бронзовой, не существовала с самого начала. В 1896 и 1900 годах только два лучших награждались медалями (серебро за первое и бронза за второе). В 1904 году победитель впервые получил золотую медаль, остальные цвета медалей сдвинулись на одно место вниз."
 vikelas.134.g: "Национальный герой!"
 vikelas.141.t: "Нет парусников!"
 vikelas.141.d: "Хотя на Олимпийских играх этого года должны были состояться соревнования по парусному спорту, почему-то не было организовано ни одного парусника. Это может означать конец для соревнований по парусному спорту."
 vikelas.141.f: "«Где парусники?»\n«Я думал, это ты их организуешь».\n«Я?! Я уже организовал соревнования по гребле. Ты отвечал за парусный спорт!»\n\n#b Исторически#!, соревнования по парусному спорту во время первых Олимпийских игр не состоялись, потому что ни спортсмены, ни организаторы не организовали парусные лодки."
 vikelas.141.g: "Это позор для нашей нации! Достаньте парусники откуда-нибудь!"
 vikelas.141.h: "Думаю, в этом году без парусного спорта."
 vikelas.142.t: "Договорной футбольный матч?"
 vikelas.142.d: "Есть сомнения в том, что футбольный матч между нашей страной и [SCOPE.sCountry('vikelas_olympics_football_country_scope').GetAltNameNoFlag('RU_CL_TP')] будет судиться справедливо. Наблюдатели утверждают, что судья предвзят и принимает решения в нашу пользу."
 vikelas.142.f: "Футбол является официальной олимпийской дисциплиной с Олимпийских игр 1908 года. Однако там всё ещё соревновались футбольные клубы, а иногда и смешанные команды. Международные матчи проводились только с 1908 года. Первую официальную встречу в истории выиграла сборная Дании у французской команды Б на олимпийском футбольном турнире 1908 года. После того как олимпийский футбольный турнир до 1928 года имел практически тот же статус, что и чемпионат мира по футболу, его значение резко снизилось после введения последнего в 1930 году и появления профессионализма, особенно в некоторых странах Европы и Южной Америки в 20-х и 30-х годах прошлого века, потому что к участию допускались исключительно любители, и лучшие игроки из этих стран, следовательно, больше не могли принимать участие в турнирах."
 vikelas.142.g: "Мяч был явно в офсайде!"
 vikelas.142.h: "[SCOPE.sCountry('vikelas_olympics_football_country_scope').GetName] по праву выиграл[SCOPE.sCountry('vikelas_olympics_football_country_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] матч."
 vikelas.143.t: "Новая легенда Марафона"
 vikelas.143.d: "Марафонец [SCOPE.sCharacter('vikelas_olympic_marathon_athlete_scope').GetFullName] выиграл марафон так впечатляюще, что теперь его считают национальным героем!"
 vikelas.143.f: "Первая троица в беге на 1500 метров: В белых перчатках [SCOPE.sCharacter('vikelas_olympic_rival_athlete_1_scope').GetFullName], фаворит из [SCOPE.sCountry('vikelas_olympic_rival_country_1_scope').GetAltNameNoFlag('RU_CL_RP')], [SCOPE.sCharacter('vikelas_olympic_rival_athlete_2_scope').GetFullName] из [SCOPE.sCountry('vikelas_olympic_rival_country_2_scope').GetAltNameNoFlag('RU_CL_RP')] и [SCOPE.sCharacter('vikelas_olympic_rival_athlete_3_scope').GetFullName] из [SCOPE.sCountry('vikelas_olympic_rival_country_3_scope').GetAltNameNoFlag('RU_CL_RP')]. По слухам, [SCOPE.sCharacter('vikelas_olympic_marathon_athlete_scope').GetLastName] выпил стакан вина в таверне на 22-м километре и громко объявил о своей победе. Он сдержал своё обещание и обогнал всех. Только [SCOPE.sCharacter('vikelas_olympic_rival_athlete_2_scope').GetFullName] смог последовать за ним, но затем рухнул. [SCOPE.sCharacter('vikelas_olympic_marathon_athlete_scope').GetLastName], по-видимому, подкрепился по пути овечьим сыром, бренди и тёплыми словами своих соотечественников. Он вбежал на стадион и смиренно опустился на усталые колени перед своим монархом: «Я всего лишь сын фермера, мой [SCOPE.sCharacter('vikelas_ruler').GetPrimaryRoleTitle]»."
 vikelas.143.g: "Истинный олимпиец!"
 vikelas.144.t: "Хорошо организованные Олимпийские игры"
 vikelas.144.d: "Другие участники Олимпийских игр полны похвалы за хорошую организацию игр. Всё работает гладко."
 vikelas.144.f: "«Проводить Олимпийские игры — значит вызывать историю». — Пьер де Кубертен"
 vikelas.144.g: "Отлично"
 vikelas.145.t: "Прославленный хозяин"
 vikelas.145.d: "Спортсмены и иностранные зрители полны похвалы за гостеприимство нашей страны. Мы произвели хорошее впечатление на мир."
 vikelas.145.f: "«Олимпийские игры — для мира, и все нации должны быть допущены к ним». — Пьер де Кубертен"
 vikelas.151.t_sailing: "Соревнования по парусному спорту проходят несмотря на проблемы"
 vikelas.151.t_no_sailing: "Нет соревнований по парусному спорту"
 vikelas.151.d_sailing: "Несмотря на то, что [SCOPE.sCountry('vikelas_olympics_host_scope').GetName] изначально не организовал[SCOPE.sCountry('vikelas_olympics_host_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] лодки для соревнований по парусному спорту, удалось достать несколько парусников из других городов и стран."
 vikelas.151.d_no_sailing: "Поскольку [SCOPE.sCountry('vikelas_olympics_host_scope').GetName] не организовал[SCOPE.sCountry('vikelas_olympics_host_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] лодки для соревнований по парусному спорту, в этом году соревнования не состоятся."
 vikelas.151.f_sailing: "Соревнования по парусному спорту были спасены в последний момент прибытием парусных судов из близлежащих портов. К счастью, погода также благоприятствовала соревнованиям.\n\n#b Исторически#!, соревнования по парусному спорту во время первых Олимпийских игр не состоялись, потому что ни спортсмены, ни организаторы не организовали парусные лодки."
 vikelas.151.f_no_sailing: "Регата не могла состояться, потому что не были предусмотрены специальные лодки для посадки.\n — Хараламбос Аннинос\n\n#b Исторически#!, соревнования по парусному спорту во время первых Олимпийских игр не состоялись, потому что ни спортсмены, ни организаторы не организовали парусные лодки."
 vikelas.151.g: "Надеюсь, наши атлеты победят!"
 vikelas.151.h: "На одну медаль меньше для наших соперников!"
 vikelas.151.i: "У меня есть дела поважнее. Оставьте меня в покое."
 vikelas.161.t: "Автостопом по марафону"
 vikelas.161.d: "Когда наш бегун, [SCOPE.sCharacter('vikelas_hitchhiker_scope').GetFullName], первым пересёк финишную черту, все были в восторге. Но вскоре выяснилось, что он 11 километров пути проехал в карете. Поэтому [SCOPE.sCharacter('vikelas_hitchhiker_scope').GetLastName] был дисквалифицирован. Он сказал, что просто хотел пошутить, но это может повредить репутации нашей страны."
 vikelas.161.f: "«У него было с собой полотенце. Откуда я мог знать, что он участвует в олимпийском соревновании? Если у тебя есть полотенце, ты готов ко всему!»\n"
 vikelas.161.g: "Без паники!"
 vikelas.162.t: "Появилась дикая собака"
 vikelas.162.d: "Наш марафонец, [SCOPE.sCharacter('vikelas_chased_by_dogs_scope').GetFullName], случайно зашёл в высокую траву, появилась дикая собака и начала его преследовать. Только когда он достиг кукурузного поля, где смог спрятаться, собака прекратила погоню."
 vikelas.162.f: "«Гав! Гав!»\n"
 vikelas.162.g: "Не стоило ему заходить в высокую траву!"
 vikelas.163.t: "В яблочко не той мишени"
 vikelas.163.d: "Один из наших стрелков, [SCOPE.sCharacter('vikelas_bad_shooter_scope').GetFullName], имел идеальный результат, и ему оставался всего один выстрел. Последний выстрел тоже попал в яблочко... но это была не та мишень. Выстрел был засчитан как 0 очков, из-за чего [SCOPE.sCharacter('vikelas_bad_shooter_scope').GetLastName] лишился победы."
 vikelas.163.f: "«Клянусь, я попал в свою мишень! Я абсолютно в этом уверен! Я никогда не попадаю в чужую мишень! Такого никогда не бывает!»\n"
 vikelas.163.g: "Какой ужасный способ проиграть!"
 vikelas.182.t: "Олимпийский факел"
 vikelas.182.d: "Бегун с олимпийским факелом, который направляется в [SCOPE.sCountry('vikelas_olympic_country').GetName], чтобы торжественно открыть Олимпийские игры, сегодня прошёл через город [SCOPE.sState('capital_scope').GetName]. Это было вдохновляющее событие для населения!"
 vikelas.182.f: "Олимпийский огонь, основанный на вечно горящем очаге греческой богини Гестии, был впервые представлен на Олимпийских играх 1928 года в Амстердаме. Традиция связанной с ним эстафеты олимпийского огня была введена на летних Играх в Берлине в 1936 году. Вопреки распространённому мнению, идея исходила не от национал-социалистов, а от немецко-еврейского археолога Альфреда Шиффа. Введение этой традиции не только дало бы Олимпийским играм новый символ идентификации, но и ежегодно объединяло бы население и служило бы воодушевляющим символом, отвлекающим от других проблем."
 vikelas.182.g: "Хлеба и зрелищ."
 vikelas.183.t: "Олимпийский огонь"
 vikelas.183.d: "После блестящей церемонии открытия, на которой каждая страна мира предстала в великолепной процессии, в качестве кульминации был зажжён олимпийский огонь. Толпа в восторге!"
 vikelas.183.f: "На протяжении XX века Олимпийские игры всё больше превращались в массовое явление, чья ритуально-светская идея позволяла обществу, отчуждённому от религиозных и национальных идеалов, обрести определённый смысл — как в национальном, так и в космополитическом смысле. Некоторые видели в этом возможность подчеркнуть выдающееся положение своей страны, для других большую роль играла идея о том, что нации мирно встречаются на спортивных соревнованиях. Для страны-хозяйки, однако, это была возможность представить себя своему народу и миру так, как это редко удавалось ранее."
 vikelas.183.g: "Народ нашей нации видит в нас великую страну."
 vikelas.183.h: "Народы мира видят в нас великую страну."
 vikelas.191.t: "МОК в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]"
 vikelas.191.d: "Из-за политических изменений МОК пришлось перенести свою штаб-квартиру. Он считает [ROOT.GetCountry.GetNameNoFlag] подходящим местом и предлагает стране президентство в совете."
 vikelas.191.f: "Если первоначальная страна-основатель МОК по какой-либо причине исчезает с карты, МОК переносит свою штаб-квартиру в другую страну и полностью переизбирается. Взамен стране-изгнаннице предлагается президентство. Классическими кандидатами в таких случаях являются Швейцария или Греция. Если этих стран тоже не существует, президентство будет предложено великой державе, которая уже входит в совет."
 vikelas.191.g: "Избрать новый МОК."
