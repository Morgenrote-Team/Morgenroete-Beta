 notification_vikelas_autorace_endurance_race_information_place_notification_desc: "Наш [Concept('concept_vikelas_racer', 'автогонщик')] не смог победить, но благополучно финишировал и получает #G 20#! [Concept('concept_academics_experience', 'опыта')]. Наш [Concept('concept_vikelas_mechanic', 'механик')] получает #G 10#! [Concept('concept_academics_experience', 'опыта')]. Мы получаем #G 30#! @vikelas_mechanical_innovation! [Concept('concept_vikelas_mechanic', 'механических инноваций')]."
 vikelas_mechanic_boost_button: "Механические инвестиции"
 vikelas_mechanic_boost_button_desc: "Мы можем сделать дополнительные механические инвестиции, чтобы ускорить прогресс в создании нашего нового гоночного автомобиля. Однако это потребует дополнительных [Concept('concept_vikelas_mechanic', 'механических инноваций')]."
 vikelas_mechanic_boost_modifier: "Механические инвестиции"
 vikelas_mechanic_improvement_cost_modifier: "Стоимость улучшения гоночного автомобиля"
 je_vikelas_mechanic_engine: "Улучшить двигатель гоночного автомобиля"
 je_vikelas_mechanic_engine_reason: "Наш механик [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] неустанно работает над новым двигателем, который улучшит надёжность и скорость автомобиля. Завершение работ зависит в первую очередь от характеристик и опыта механика."
 je_vikelas_mechanic_safety: "Улучшить безопасность гоночного автомобиля"
 je_vikelas_mechanic_safety_reason: "Наш механик [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] улучшает безопасность автомобиля. Завершение работ зависит в первую очередь от характеристик и опыта механика."
 je_vikelas_mechanic_body: "Улучшить кузов гоночного автомобиля"
 je_vikelas_mechanic_body_reason: "Наш механик [ROOT.Var('vikelas_mechanic_var').GetCharacter.GetFullName] строит новый кузов для автомобиля, делая его быстрее и, возможно, даже немного безопаснее. Завершение работ зависит в первую очередь от характеристик и опыта механика."
 vikelas_mechanic_progress_bar_at_full_tt: "Шкала улучшения гоночного автомобиля достигла #variable 100%#!."
 je_vikelas_endurance_race: "Гонка на выносливость"
 je_vikelas_endurance_race_reason: "В нескольких областях нашей страны в настоящее время проходит гонка на выносливость. В гонке принимают участие гонщики из всех стран, любящих гонки. Страна-хозяйка имеет небольшое преимущество и получает дополнительные события. В отличие от Гран-при, надёжность важнее скорости, так как автомобили должны выдерживать большие расстояния. Риск поломки двигателя также выше, чем фатальная авария."
 je_vikelas_endurance_race_success: "[GetPlayer.GetName] набрал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] не менее #ORANGE 8 очков прогресса в гонке на выносливость#!."
 je_vikelas_endurance_race_goal: ""
 vikelas.501.t: "Автомобильный клуб [ROOT.GetCountry.GetAdjectiveNoFormatting|l]ой страны"
 vikelas.501.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] считается страстным гонщиком и по этому случаю основал[SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'а', '')] автомобильный клуб с единомышленниками. Это должно укрепить отечественную автомобильную промышленность и организовать национальные автомобильные мероприятия."
 vikelas.501.f: "Уже в середине 1890-х годов Автомобильный клуб Франции (ACF), основанный в 1895 году как первый автомобильный клуб в мире, раз в год организовывал гонку, которая представляла собой кульминацию сезона. Это были так называемые гонки «от города до города» по общественным просёлочным дорогам, в которых участники стартовали поодиночке с интервалами. Одним из поводов для основания ACF стало понижение в должности Альбера де Диона после гонки Париж-Руан в 1894 году. В последующие годы началось быстрое развитие, и всё более мощные автомобили значительно увеличили опасность автоспорта. Поэтому в 1901 году ACF впервые ввёл правила, которые можно считать первыми в мире правилами автоспорта. Центральным нововведением стало разделение на категории, которые должны были применяться ко всем мероприятиям, поддерживаемым ACF. Введённое в результате ограничение по весу должно было первоначально помочь уменьшить огромное количество дефектов шин из-за перегрузки."
 vikelas.501.g: "Спорт, полный острых ощущений!"
 vikelas.502.t: "Первая гонка Гран-при"
 vikelas.502.d: "Автоспорт переживает революционный поворот: с появлением гонок Гран-при международные гонки будут проводиться одна за другой во всех странах, любящих автоспорт. Так родился международный чемпионат. [SCOPE.sCountry('vikelas_gp_founder_scope').GetName] пригласил[SCOPE.sCountry('vikelas_gp_founder_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] все страны с автомобильным клубом принять участие в своём первом Гран-при в следующем году."
 vikelas.502.f: "Ежегодные гонки за Кубок Гордона Беннетта были первой попыткой провести чемпионат мира по автомобильным гонкам с 1900 по 1905 год. Ввиду постоянно растущих скоростей, в 1902 году ACF впервые издал технические регламенты в виде так называемой гоночной формулы, которой должны были придерживаться участвующие автомобили. Тем не менее, частота аварий продолжала расти, так что с 1903 года могли проводиться только кольцевые гонки на закрытых трассах. В качестве преемника гонок Гордона Беннетта главная гонка, организованная ACF, впервые прошла в 1906 году под названием Гран-при. Первым победителем Гран-при в истории стал венгерский гонщик Ференц Сис на Renault."
 vikelas.502.g: "Так есть что выигрывать?"
 vikelas.503.t: "Association Internationale des Automobile Clubs Reconnus"
 vikelas.503.d: "Сегодня в городе [GetGlobalVariable('vikelas_aiacr_seat_global_var').GetStateRegion.GetCityHubName] была основана Международная автомобильная ассоциация. Её полное название — Association Internationale des Automobile Clubs Reconnus (AIACR)."
 vikelas.503.f: "Для того чтобы автопроизводители могли принимать участие во всех международных гонках, стало необходимо, чтобы технические и спортивные регламенты, которые ранее независимо устанавливались Французским автомобильным клубом для своих гонок в виде соответствующей формулы Гран-при, регулировались на межгосударственном уровне Международной автомобильной ассоциацией. Ассоциация была основана 20 июня 1904 года в Париже как Association Internationale des Automobile Clubs Reconnus (AIACR), после того как решение о её основании было принято несколькими днями ранее автомобильными клубами важнейших гоночных наций в рамках Кубка Гордона Беннетта в Бад-Хомбурге. После Второй мировой войны AIACR была переименована в FIA."
 vikelas.503.g: "Отныне автомобильные гонки — международные!"
 vikelas.504.t: "Новая гоночная трасса Гран-при"
 vikelas.504.d: "Ещё один член AIACR построил официальную трассу Гран-при. Теперь в ежегодном гоночном календаре #G [GetGlobalVariable('vikelas_num_grand_prix_tracks_global_var').GetValue]#! #V трасс Гран-при#!."
 vikelas.504.f: "«Автогонки, коррида и альпинизм — единственные настоящие виды спорта… все остальные — игры». — Эрнест Хемингуэй"
 vikelas.504.g: "Зарезервировать VIP-места на трибунах."
 vikelas.505.t: "Местоположение производителя гоночных автомобилей"
 vikelas.505.d: "С [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] у [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] появилась первая серийная гоночная команда. Автомобильный завод в [SCOPE.sState('vikelas_team_state').GetCustom('RU_SL_PP')] теперь пользуется большим спросом благодаря устоявшемуся бренду."
 vikelas.505.f: "С медленным развитием от отдельных гонщиков-джентльменов до профессиональных гоночных команд с заводскими пилотами, автоспорт навсегда изменился. Любители на самодельных автомобилях стали редкостью. Хотя всё ещё случалось, что эксцентричные аристократы с лицензиями от других автопроизводителей искали острых ощущений, настоящим центром автоспорта стало развитие автомобилей."
 vikelas.505.g: "Теперь мы можем создавать свои собственные гоночные автомобили!"
 vikelas.506.t: "Механик гоночных автомобилей"
 vikelas.506.d: "Главный инженер, доктор [SCOPE.sCharacter('gaudi_engineer_scope').GetLastName], выбрал[SelectLocalization(SCOPE.sCharacter('gaudi_engineer_scope').IsFemale, 'а', '')] из своей команды превосходного ассистента, который мог бы стать механиком для новообразованной гоночной команды: [SCOPE.sCharacter('vikelas_new_mechanic_scope').GetFullName]. [SelectLocalization(SCOPE.sCharacter('vikelas_new_mechanic_scope').IsFemale, 'Её', 'Его')] специализация — в области..."
 vikelas.506.f: "Механики могут вносить усовершенствования в три области автомобиля: двигатель, безопасность и кузов. Специализация помогает проводить модернизацию в определённой области в два раза быстрее. В основном — но не всегда — верно, что двигатели повышают надёжность (и скорость), усовершенствования безопасности повышают безопасность, а кузова — скорость (и безопасность)."
 vikelas.506.h: "Двигатель."
 vikelas.506.i: "Безопасность."
 vikelas.506.j: "Кузов."
 vikelas.511.t: "Большая гонка [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]—[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName]"
 vikelas.511.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] из города [ROOT.GetCountry.GetCapital.GetCityHubName] объявила в своём текущем еженедельном выпуске о большой автомобильной гонке. Гонка между городами должна пройти от города [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName] до города [SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName]. Ожидается также участие многочисленных гонщиков из-за рубежа."
 vikelas.511.f: "Ранние годы автогонок характеризовались так называемыми гонщиками-джентльменами, которые принимали участие в гонках между городами на самодельных автомобилях со своим механиком, который часто также служил шофёром. Этот формат гонок часто рекламировался, организовывался и поддерживался газетами и автомобильными клубами. Поскольку механика часто была ещё в зачаточном состоянии, было важнее вообще добраться до финиша. Смертельные аварии, подобные той, что произошла с Марселем Рено в гонке Париж-Мадрид, означали, что эта форма организации была лишь переходным этапом в истории гонок."
 vikelas.511.g: "Подготовиться к событию через три месяца."
 vikelas.512.t: "Участие в гонке"
 vikelas.512.d: "Предстоящая гонка [SCOPE.sState('vikelas_city_race_start_state').GetCityHubName]—[SCOPE.sState('vikelas_city_race_goal_state').GetCityHubName] в [SCOPE.sCountry('vikelas_race_country').GetAltNameNoFlag('RU_CL_PP')] привела к предположениям о том, примет ли участие и главный гонщик нашей страны, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName]."
 vikelas.512.g: "Отличная возможность!"
 vikelas.512.h: "Это слишком опасно."
 vikelas.512.tt: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] будет готовиться к гонке через три месяца."
 vikelas.513.t: "Свободная трасса"
 vikelas.513.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] везёт: [SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'она', 'он')] может дать полный газ на открытой дороге. Двигатель не глохнет, повороты плавные. Лучшие условия для гонщика."
 vikelas.513.f: "«Когда скорость попадает в кровь, нужно гонять, чтобы жить». — Рудольф Караччиола"
 vikelas.513.g: "Фантастика!"
 vikelas.514.t: "Прекрасная, нетронутая природа"
 vikelas.514.d: "Пока [SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'она', 'он')] едет из города в город, [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] замечает нетронутую природу в районе, через который [SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'она', 'он')] проезжает. Может, [SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'ей', 'ему')] стоит взять с собой сувенир?"
 vikelas.514.f: "В ранней фазе автоспорта особой привлекательностью было вождение по как можно более диким и нетронутым ландшафтам, что ставило перед гонщиком вызовы. Поэтому ранние гоночные трассы также критиковались за то, что они якобы требовали меньшего водительского мастерства и адаптации. Конечно, некоторые отдалённые долины, пляжи и горные районы могли преподнести сюрпризы."
 vikelas.514.g: "Нам нужно выиграть гонку!"
 vikelas.514.h: "Собрать немного растений."
 vikelas.514.i: "Собрать немного камней."
 vikelas.515.t: "Сахар в баке"
 vikelas.515.d: "Во время короткой остановки [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] замечает, что машина [SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'её', 'его')] конкурента,  также находится поблизости. По-видимому, [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName] совершенно не присматривает за машиной."
 vikelas.515.f: "«Если ты не жульничаешь, ты не стараешься»."
 vikelas.515.g: "Сладкая месть."
 vikelas.516.t: "Маленькая помощь другу?"
 vikelas.516.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] в настоящее время находится в хорошей позиции, но видит дымящуюся машину, на которой стартовал [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName] на обочине. Может, [SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'ей', 'ему')] стоит проверить, всё ли в порядке?"
 vikelas.516.f: "Поломки двигателя и аварии были обычным делом в ранние дни гонок. Однако, в то время как в более поздние времена на закрытых трассах были доступны маршалы, поломка могла быть опасной в гонках на длинные дистанции без наблюдателя. В Апеннинах на Милле Милья в 1930-х годах всё ещё видели волков. Поэтому помощь между коллегами-гонщиками часто была естественной."
 vikelas.516.g: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'должна', 'должен')] остановиться и помочь."
 vikelas.516.h: "Ха-ха! Дураки!"
 vikelas.517.t: "Проблемы с двигателем"
 vikelas.517.d: "Что-то — даже [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] не может это объяснить — происходит с двигателем. Диагностика до сих пор не увенчалась успехом. Возможно, [SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'ей', 'ему')] придётся продолжить гонку на пониженной скорости."
 vikelas.517.f: "Проблемы с двигателем случаются во всех видах автоспорта — как тогда, так и сейчас. Было множество гонщиков, которым приходилось досрочно сходить с гонки, будучи в лидерах. В нынешней ситуации [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] всё ещё может закончить гонку, но только если он замедлится, что значительно усложнит победу."
 vikelas.517.g: "Использовать все доступные меры по тонкой настройке механики."
 vikelas.517.h: "Машина должна выдержать гонку в таком состоянии."
 vikelas.518.t: "Гвозди"
 vikelas.518.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] смог[SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'ла', '')] создать определённое преимущество над остальными участниками. Может, [SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'она', 'он')] мог[SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'ла', '')] бы улучшить свои шансы на победу и усложнить жизнь остальным участникам?"
 vikelas.518.f: "«Я знаю, что он жульничал, потому что я жульничал, а он меня обыграл»."
 vikelas.518.g: "Доставай гвозди, Маттли."
 vikelas.518.h: "Мы воздержимся от таких неспортивных практик."
 vikelas.519.t: "Дисквалификация"
 vikelas.519.d: "К сожалению, неспортивное поведение [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName] вскрылось. Гоночная комиссия немедленно исключила [SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'её', 'его')] из дальнейших гонок."
 vikelas.519.f: "«Согласно регламенту гонки между городами в соответствии с параграфом 12, пунктом 6, строкой 9, участник нарушил общие правила и поэтому будет досрочно исключён. Апелляция невозможна»."
 vikelas.519.g: "Дисквалифицирован? Это нечестно!"
 vikelas.520.f: "#V Итоговые результаты#!\n\nПервое место: [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] из [SCOPE.sCountry('vikelas_first_winner_scope').GetAltNameNoFlag('RU_CL_RP')]\nВторое место: [SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName] из [SCOPE.sCountry('vikelas_second_winner_scope').GetAltNameNoFlag('RU_CL_RP')]\nТретье место: [SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName] из [SCOPE.sCountry('vikelas_third_winner_scope').GetAltNameNoFlag('RU_CL_RP')]"
 vikelas.520.g: "Шампанского!"
 vikelas.521.t: "Победа для [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]"
 vikelas.521.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] занял[SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'а', '')] первое место в гонке между городами в [SCOPE.sCountry('vikelas_race_country').GetAltNameNoFlag('RU_CL_PP')]. [SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'Она', 'Он')] управлял[SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'а', '')] автомобилем [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.521.g: "Шампанского!"
 vikelas.522.t: "2-е место для [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]"
 vikelas.522.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] занял[SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'а', '')] второе место в гонке между городами в [SCOPE.sCountry('vikelas_race_country').GetAltNameNoFlag('RU_CL_PP')]. [SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'Она', 'Он')] управлял[SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'а', '')] автомобилем [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.522.g: "Увидимся в следующий раз!"
 vikelas.523.t: "3-е место для [ROOT.Var('vikelas_racer_var').GetCharacter.GetLastName]"
 vikelas.523.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] занял[SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'а', '')] третье место в гонке между городами в [SCOPE.sCountry('vikelas_race_country').GetAltNameNoFlag('RU_CL_PP')]. [SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'Она', 'Он')] управлял[SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'а', '')] автомобилем [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]."
 vikelas.524.t: "Гонка между городами завершается"
 vikelas.524.d: "Большая гонка между городами в [SCOPE.sCountry('vikelas_race_country').GetAltNameNoFlag('RU_CL_PP')] окончена, и победители определены. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] управлял[SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'а', '')] автомобилем [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_race_team_name_type')] [SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_letter_name')]-[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_first_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_second_number_name')][SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_racecar_third_number_name')]. Хотя мы и не заняли хороших мест, по крайней мере, машина и гонщик прибыли в целости и сохранности."
 vikelas.531.t: "Гонка на выносливость"
 vikelas.531.d: "[GetPlayer.GetName] организовал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] крупную гонку на выносливость и пригласил гонщиков со всего мира принять участие."
 vikelas.531.f: "Первые автомобильные гонки в начале XX века были гонками на дистанцию с максимально возможной дальностью. Они должны были проверить скорость и надёжность гоночных автомобилей. В то время как Франция доминировала в гонках на раннем этапе, вскоре они перешли к гонкам Гран-при. Это не меняло того факта, что всё ещё существовали важные международные гонки на выносливость. Самой традиционной гонкой была Тарга Флорио на Сицилии. С 1906 по 1977 год она проводилась в основном в мае как важное международное событие, некоторые со статусом чемпионата мира. После Тарга Флорио Тысяча миль (Милле Милья) считалась классикой среди шоссейных гонок (в 1950-х годах добавилась Каррера Панамерикана) и основой для термина «Gran Turismo» (GT), который описывает быстрые туристические спортивные автомобили для гонок на длинные дистанции, такие как те, что Ferrari разрабатывала специально для ММ."
 vikelas.531.g: "Увидимся на финише!"
 vikelas.533.t: "Повреждение шины"
 vikelas.533.d: "В середине гонки, [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] совершает внезапную остановку из-за лопнувшей шины. Несмотря на инцидент, гонщик остался невредим и впечатлил своими хладнокровными действиями, но потерял важное время."
 vikelas.533.f: "Милле Милья 1931 года характеризовалась massive износом шин. Перед прибытием в Рим Арканджели пришлось девять раз менять шину. У Нуволари также было несколько проколов, но он всё равно опережал Караччиолу на две минуты в Риме. На обратном пути к Адриатике Alfa Romeo сохраняли свой энергичный темп, несмотря на проблемы с шинами. В промежутках Борцаккини лидировал в соревновании на 18 минут. Вдоль побережья Средиземного моря на север Кампари опережал возрождающегося Арканджели на четыре минуты. Лидерство несколько раз менялось внутри Alfa Romeo, и итальянцы, казалось, всё контролировали после двух третей дистанции гонки. Это было также связано с плотной сетью сервисных станций, что позволяло проводить много замен шин. Решение было принято на последних 80 километрах, когда пошёл сильный дождь, и Alfa Romeo снова попали в аварии с изношенными шинами."
 vikelas.533.g: "Невезение."
 vikelas.534.t: "Железнодорожный переезд"
 vikelas.534.d: "Во время погони за другим гонщиком внезапно раздаётся предупреждающий сигнал: перед обеими машинами опускается железнодорожный шлагбаум. Машина впереди проносится сквозь него. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] должен решить, остановиться или рискнуть пересечь, пока соперник не оторвался слишком далеко."
 vikelas.534.f: "Водители Милле Милья были склонны к смелым манёврам, как, например, Ханс Херманн, который участвовал в 1954 году и проехал на своей машине под закрывающимся железнодорожным шлагбаумом, при этом ему и его пассажиру пришлось пригнуть головы."
 vikelas.534.g: "Рискнуть!"
 vikelas.534.h: "Это слишком безрассудно!"
 vikelas.538.t: "Волки и револьверы"
 vikelas.538.d: "Во время ночной поездки по горам гоночная команда сбивается с пути. Внезапно раздаётся вой. Похоже, поблизости бродит стая волков."
 vikelas.538.f: "«Мы попали в метель, и нас преследовали волки. Однако их удалось обратить в бегство выстрелами из револьвера, который я всегда держал под сиденьем, и прибытием группы дорожных рабочих, вооружённых факелами и ружьями». — Энцо Феррари"
 vikelas.538.g: "Убить волков."
 vikelas.538.h: "Объехать эту область стороной."
 vikelas.538.i: "Это открытие гораздо важнее какой-то глупой гонки."
 vikelas.539.t: "Гоночный автомобиль въехал в зрителей!"
 vikelas.539.d: "Произошла ужасная авария, когда гоночный автомобиль вылетел с трассы во время гонки и въехал в толпу. Мир автоспорта потрясён, и снова разгораются дебаты о стандартах безопасности."
 vikelas.539.f: "С первой Милле Милья в 1927 году мероприятие обходилось без катастрофических аварий, несмотря на большое количество зрителей, выстроившихся вдоль дорог. Это изменилось 3 апреля 1938 года в 16:30. В этот момент два генуэзских гонщика, Анджело Миньянего и его второй пилот, доктор Луиджи Бруццо, на своей Lancia Aprilia ехали по виале Берти Пикат в Болонье. На скорости чуть менее 100 км/ч неопытный Миньянего потерял контроль над автомобилем на проложенных там трамвайных путях. Lancia сначала врезалась в дерево, а затем в большую группу зрителей. В то время как оба пассажира автомобиля почти не пострадали, в аварии погибло десять человек, в том числе семеро детей. 26 зрителей получили травмы, некоторые — серьёзные. В другой аварии в Стангелле погибла 12-летняя девочка."
 vikelas.539.g: "Чёрный день для гонок."
 vikelas.540.t: "Новый рекорд средней скорости"
 vikelas.540.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] достиг[SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'ла', '')] беспрецедентной средней скорости в гонках на выносливость. Этот рекорд войдёт в историю автоспорта как веха."
 vikelas.540.f: "С захватывающей дух точностью и техническим мастерством [GetPlayer.GetCustom('vikelas_race_team_name_type')] достиг[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] средней скорости, которая ранее считалась невозможной. Этот рекорд долгое время будет считаться вершиной этой золотой эры автоспорта."
 vikelas.545.t: "Собрание фанатов!"
 vikelas.545.d: "Во время гонки на выносливость между двумя городами собралась ликующая толпа, чтобы посмотреть, как [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] проедит мимо их города. Это событие знаменует собой рост автоспорта как общественного явления."
 vikelas.545.f: "Улицы были забиты людьми, которые толпились, чтобы мельком увидеть проносящийся мимо автомобиль. Дети размахивали флагами, а взрослые выкрикивали имя гонщика, чьи навыки и мужество их вдохновляли. Когда машина остановилась, его охватила волна восторга. Цветы, аплодисменты и крики сопровождали короткую остановку, прежде чем гонщик снова отправился в путь. Это был момент, который зажёг в сердцах людей страсть к скорости и технологиям — предвкушение того, чем станет автоспорт в последующие десятилетия."
 vikelas.545.g: "Гонки становятся популярными."
 vikelas.541.t: "Гонка на выносливость завершается"
 vikelas.541.d: "[SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] из [SCOPE.sCountry('vikelas_first_winner_scope').GetAltNameNoFlag('RU_CL_RP')] выиграл[SelectLocalization(SCOPE.sCharacter('vikelas_racer_1_scope').IsFemale, 'а', '')] престижную гонку на выносливость, а также сердца зрителей."
 vikelas.541.f: "Последние несколько километров были настоящим зрелищем: пыль клубилась над трассой, ревели моторы, а напряжение было ощутимым. Когда победитель наконец пересёк финишную черту, раздались оглушительные аплодисменты. Его машина, покрытая следами ожесточённой гонки, стала символом его воли к победе. Фанаты несли его на плечах, пока толпа праздновала этот момент. С этим триумфом [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] становится одной из самых важных личностей в автоспорте, а [SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'её', 'его')] гоночная команда [GetPlayer.GetCustom('vikelas_race_team_name_type')] — высокоуважаемым брендом."
 vikelas.542.d: "[SCOPE.sCountry('vikelas_endurance_race_country_scope').GetName]"
 vikelas.551.t: "Гран-при [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]"
 vikelas.551.d: "Гоночный сезон достиг [GetPlayer.GetAltNameNoFlag('RU_CL_VP')]. Многочисленные гонщики и их гоночные команды уже прибыли, чтобы подготовиться к Гран-при, который скоро примет наша страна."
 vikelas.551.f: "«Гонки — это жизнь. Всё остальное — просто ожидание». — Рудольф Караччиола"
 vikelas.551.g: "Пусть победит быстрейший."
 vikelas.552.t: "Самый быстрый круг"
 vikelas.552.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] показал[SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'а', '')] самый быстрый круг на тренировке. Это отличные перспективы для настоящей гонки."
 vikelas.552.f: "«Ещё до старта я был уверен в победе». — Этторе Бугатти"
 vikelas.553.t: "Масляное пятно"
 vikelas.553.d: "Во время гонки Гран-при [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] попал[SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'а', '')] в масляное пятно от аварийного автомобиля и вылетел[SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'а', '')] с трассы. Гонщик и машина могут продолжить движение, но потеряли много времени в текущей гонке."
 vikelas.553.f: "«Я строю машины, чтобы они ехали. А не чтобы останавливались». — Этторе Бугатти"
 vikelas.553.g: "О нет!"
 vikelas.554.t: "Дождь"
 vikelas.554.d: "Гонку Гран-при внезапно застал дождевой фронт. Некоторые гонщики остановились, чтобы сменить оборудование. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] задается вопросом, [SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'должна ли она', 'должен ли он')] безрассудно завершить гонку или замедлиться, чтобы быть в безопасности."
 vikelas.554.f: "«Ничего не бойся. Только верь». — Арман Пежо"
 vikelas.554.g: "Это не выбьет гонщика из колеи!"
 vikelas.554.h: "Снизить темп."
 vikelas.555.t: "Обгонный манёвр"
 vikelas.555.d: "Возникает уникальная возможность, когда [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] и [SCOPE.sCharacter('vikelas_racer_2_scope').GetLastName], гонщик из [SCOPE.sCountry('vikelas_race_country_scope').GetAltNameNoFlag('RU_CL_RP')] оказываются близко друг к другу. [SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'Должна ли она', 'Должен ли он')] попытаться совершить обгонный манёвр?"
 vikelas.555.f: "«Идеальный гоночный автомобиль первым пересекает финишную черту, а затем рассыпается на отдельные части». — Фердинанд Порше"
 vikelas.555.g: "Вперёд!"
 vikelas.555.h: "Это слишком рискованно."
 vikelas.556.t: "Обгонный манёвр удался"
 vikelas.556.d: "Обгонный манёвр увенчался полным успехом. [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] впереди и имеет преимущество в скорости."
 vikelas.556.f: "«Когда я вижу проезжающий Alfa Romeo, я снимаю шляпу». — Генри Форд"
 vikelas.556.g: "Ура!"
 vikelas.557.t: "Обгонный манёвр не удался"
 vikelas.557.d: "[ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] не смог[SelectLocalization(ROOT.Var('vikelas_racer_var').GetCharacter.IsFemale, 'ла', '')] совершить обгонный манёвр. Соперник успешно защитился, и наш гонщик потерял много времени."
 vikelas.557.f: "«Это невезение, но это всё в игре. Я сделал всё, что мог, и раз я проиграл, я за того, кто получил приз». — Ральф Де Пальма"
 vikelas.557.g: "Какая жалость."
 vikelas.558.t: "Домашняя публика мотивирует гонщика"
 vikelas.558.d: "На Гран-при [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] [ROOT.Var('vikelas_racer_var').GetCharacter.GetFullName] считается местным героем и получает особенно сильную поддержку от зрителей. Это очень мотивирует гонщика!"
 vikelas.558.f: "«Никто не помнит, кто занял второе место, и это никогда не буду я». — Энцо Феррари"
 vikelas.558.g: "Отлично!"
 vikelas.559.t: "Чемпионат по автогонкам"
 vikelas.559.d: "[SCOPE.sCountry('vikelas_first_winner_scope').GetNameNoFlag] доминировал[SCOPE.sCountry('vikelas_first_winner_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] в этом гоночном сезоне и выиграл[SCOPE.sCountry('vikelas_first_winner_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] чемпионат по автогонкам."
 vikelas.559.f: "#V Итоговые результаты#!\n\nПервое место: [SCOPE.sCountry('vikelas_first_winner_scope').GetName], [SCOPE.GetValue('vikelas_first_winner_points_scope')] очков, [SCOPE.GetValue('vikelas_first_winner_victories_scope')] побед\nВторое место: [SCOPE.sCountry('vikelas_second_winner_scope').GetName], [SCOPE.GetValue('vikelas_second_winner_points_scope')] очков, [SCOPE.GetValue('vikelas_second_winner_victories_scope')] побед\nТретье место: [SCOPE.sCountry('vikelas_third_winner_scope').GetName], [SCOPE.GetValue('vikelas_third_winner_points_scope')] очков, [SCOPE.GetValue('vikelas_third_winner_victories_scope')] побед\nЧетвёртое место: [SCOPE.sCountry('vikelas_fourth_winner_scope').GetName], [SCOPE.GetValue('vikelas_fourth_winner_points_scope')] очков, [SCOPE.GetValue('vikelas_fourth_winner_victories_scope')] побед\nПятое место: [SCOPE.sCountry('vikelas_fifth_winner_scope').GetName], [SCOPE.GetValue('vikelas_fifth_winner_points_scope')] очков, [SCOPE.GetValue('vikelas_fifth_winner_victories_scope')] побед"
 vikelas.559.g: "Теперь играйте Бизе."
 vikelas.559.h: "Статистика не интересует."
 vikelas.559.tt: "Статистика ежегодного чемпионата по автомобильным гонкам больше не будет отображаться."
 vikelas.561.t: "Гран-при [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] завершается"
 vikelas.561.d: "Гонка Гран-при окончена, и победители определены. Победителем Гран-при [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] стал[SelectLocalization(ROOT.Var('vikelas_racer_1_scope').GetCharacter.IsFemale, 'а', '')] [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName]. Гоночное событие надолго запомнится населению."
 vikelas.561.f: "#V Итоговые результаты#!\n\nПервое место: [SCOPE.sCharacter('vikelas_racer_1_scope').GetFullName] из [SCOPE.sCountry('vikelas_first_winner_scope').GetAltNameNoFlag('RU_CL_RP')]\nВторое место: [SCOPE.sCharacter('vikelas_racer_2_scope').GetFullName] из [SCOPE.sCountry('vikelas_second_winner_scope').GetAltNameNoFlag('RU_CL_RP')]\nТретье место: [SCOPE.sCharacter('vikelas_racer_3_scope').GetFullName] из [SCOPE.sCountry('vikelas_third_winner_scope').GetAltNameNoFlag('RU_CL_RP')]"
 vikelas.561.g: "Шампанского!"
 vikelas.571.t: "Первые 24 часа Ле-Мана"
 vikelas.571.d: "В 1923 году состоялись первые 24 часа Ле-Мана, которые быстро стали одним из самых престижных событий в автоспорте, привлекая гонщиков и производителей со всего мира."
 vikelas.571.f: "26 и 27 мая 1923 года состоялись первые 24 часа Ле-Мана, организованные Автомобильным клубом Запада. На 17,3-километровой трассе в регионе Сарта приняли участие 33 автомобиля. Условия были сложными: дождь, грязные дороги и трасса, проходившая через город Ле-Ман и окрестные просёлочные дороги. Победу одержали Андре Лагаш и Рене Леонар, управлявшие Chenard & Walcker Sport, преодолев дистанцию в 2209 километров за 24 часа. Эта гонка положила начало традиции, которая продолжает прославлять инновации и выносливость в автоспорте."
 vikelas.571.g: "24 часа? Это безумие!"
 vikelas.572.t: "Рождение Тарга Флорио"
 vikelas.572.d: "В 1906 году была создана Тарга Флорио, зрелищная гонка, проходившая по извилистым дорогам Сицилии. Организованная Винченцо Флорио, она вывела регион в центр мира автоспорта."
 vikelas.572.f: "6 мая 1906 года состоялась первая Тарга Флорио, гонка на длинные дистанции, которая превратила крутые горные дороги и живописные деревни Сицилии в сложную гоночную трассу. Организованное Винченцо Флорио, энтузиастом автоспорта, мероприятие воплотило его видение спортивного вызова. Трасса протяжённостью 446 километров была разделена на три круга по 148 километров каждый. Победу одержал Алессандро Каньо на Itala, который пересёк финишную черту со средней скоростью 46,8 км/ч. Тарга Флорио быстро стала символом мужества, мастерства и страсти к скорости."
 vikelas.572.g: "Тарга Флорио устанавливает традицию"
 vikelas.573.t: "Первая гонка на Земмеринге"
 vikelas.573.d: "В 1899 году состоялся первый подъём на холм на Земмеринге, который проверил пределы раннего автомобилестроения и водительского мастерства. Это событие стало важной вехой в истории автоспорта."
 vikelas.573.f: "27 августа 1899 года состоялся первый подъём на холм на Земмеринге, организованный Австрийским автомобильным клубом. 9,8-километровая трасса, пролегающая от Кламма на Земмеринге до горного перевала, довела ранние автомобили и их водителей до предела. С уклонами до 7% и крутыми поворотами гонка была испытанием как техники, так и мужества. Победу одержал граф Енё Зичи на автомобиле Mors, который прошёл трассу со средней скоростью 22,2 км/ч. Гонка привлекла большую аудиторию и заложила основу традиции подъёма на холм в Европе."
 vikelas.573.g: "Подъём на холм восхищает массы."
