 je_tesla_transatlantic_cable: "Трансатлантический кабель"
 je_tesla_transatlantic_cable_reason: "Строительство подводного телеграфного кабеля состоит из трёх этапов. На первом этапе ищутся дополнительные инвесторы и начинается планирование. На втором этапе прокладывается кабель. На третьем этапе проводятся окончательные приготовления к вводу в эксплуатацию.\n\nДля успеха проекта решающее значение имеют два показателя: #O прогресс прокладки кабеля#! и #O доверие акционеров#!. Прогресс определяет, сколько времени займёт строительство, и здесь решающее значение имеют навыки [Concept('concept_tesla_engineer', '#b #ORANGE инженера#!#!')]. Доверие во многом зависит от [Concept('concept_executive', 'руководителя')] компании. Если доверие упадёт до нуля, проект будет считаться настолько безнадёжным, что обречён на провал. Важно любой ценой избежать падения доверия до нуля.\n\nПрокладка кабеля под водой не обязательно ведёт к успеху. Исторически первый трансатлантический кабель был неудачным. Однако компания может оправиться от такой неудачи, если доверие акционеров останется высоким. В этом случае будет проложен новый кабель. Если первая попытка провалится, шанс на успешную вторую попытку гарантирован."
 je_tesla_suez_india_cable: "Кабель Суэц-Индия"
 je_tesla_suez_india_cable_reason: "Строительство подводного телеграфного кабеля состоит из трёх этапов. На первом этапе ищутся дополнительные инвесторы и начинается планирование. На втором этапе прокладывается кабель. На третьем этапе проводятся окончательные приготовления к вводу в эксплуатацию.\n\nДля успеха проекта решающее значение имеют два показателя: #O прогресс прокладки кабеля#! и #O доверие акционеров#!. Прогресс определяет, сколько времени займёт строительство, и здесь решающее значение имеют навыки [Concept('concept_tesla_engineer', '#b #ORANGE инженера#!#!')]. Доверие во многом зависит от [Concept('concept_executive', 'руководителя')] компании. Если доверие упадёт до нуля, проект будет считаться настолько безнадёжным, что обречён на провал. Важно любой ценой избежать падения доверия до нуля.\n\nПрокладка кабеля под водой не обязательно ведёт к успеху. Исторически первый трансатлантический кабель был неудачным. Однако компания может оправиться от такой неудачи, если доверие акционеров останется высоким. В этом случае будет проложен новый кабель. Если первая попытка провалится, шанс на успешную вторую попытку гарантирован."
 je_tesla_transpacific_cable: "Транстихоокеанский кабель"
 je_tesla_transpacific_cable_reason: "Строительство подводного телеграфного кабеля состоит из трёх этапов. На первом этапе ищутся дополнительные инвесторы и начинается планирование. На втором этапе прокладывается кабель. На третьем этапе проводятся окончательные приготовления к вводу в эксплуатацию.\n\nДля успеха проекта решающее значение имеют два показателя: #O прогресс прокладки кабеля#! и #O доверие акционеров#!. Прогресс определяет, сколько времени займёт строительство, и здесь решающее значение имеют навыки [Concept('concept_tesla_engineer', '#b #ORANGE инженера#!#!')]. Доверие во многом зависит от [Concept('concept_executive', 'руководителя')] компании. Если доверие упадёт до нуля, проект будет считаться настолько безнадёжным, что обречён на провал. Важно любой ценой избежать падения доверия до нуля.\n\nПрокладка кабеля под водой не обязательно ведёт к успеху. Исторически первый трансатлантический кабель был неудачным. Однако компания может оправиться от такой неудачи, если доверие акционеров останется высоким. В этом случае будет проложен новый кабель. Если первая попытка провалится, шанс на успешную вторую попытку гарантирован."
 je_engineer_dies_tt: "Запись в дневнике будет аннулирована, если [concept_tesla_engineer|l] умрёт."
 tesla.3001.t: "Кабель через море"
 tesla.3001.d: "[SCOPE.sCharacter('tesla_telegraph_boss_scope').GetFullName], директор ведущей телеграфной компании, представил амбициозный план: строительство подводного телеграфного кабеля, который соединит далёкие берега и сблизит нации посредством мгновенной связи. Для финансирования этого проекта в недавно созданной кабельной компании предлагаются акции. В знак доверия компания официально запросила государственное участие, утверждая, что проект служит как коммерческим, так и национальным интересам."
 tesla.3001.f: "Всё начинается не с кораблей или сигнальных линий, а с чернил и доверия. Подписываются контракты, печатаются проспекты, произносятся речи как в салонах, так и на фондовых биржах. Кабель пока существует лишь как обещание — и как вопрос: кто вложится в будущее? Лидер компании говорит о единстве, видении и прогрессе. Другие говорят о риске. И теперь государство должно решить, какую роль оно сыграет в этом предприятии из проводов и воды."
 tesla.3001.g: "Государство примет участие в этом предприятии."
 tesla.3001.h: "Компания хочет проложить кабель, так пусть они и платят."
 tesla.3002.t: "Восторженные инвесторы"
 tesla.3002.d: "Группа амбициозных промышленников и финансистов из [SCOPE.sState('tesla_fund_state').GetCustom('RU_SL_RP')] объединилась, чтобы поддержать усилия по прокладке подводного телеграфного кабеля. Их инвестиции рассматриваются как стратегический шаг для обеспечения будущей коммуникационной инфраструктуры и получения раннего доступа к трансокеанским рынкам."
 tesla.3002.f: "Инвесторы — не филантропы и не визионеры в романтическом смысле. Но они понимают ценность информации — как быстро она передаётся, насколько надёжно доставляется и кто контролирует её поток. Вкладывая свой капитал в кабельную компанию, они делают ставку на мир, где расстояние становится вопросом миллисекунд. Некоторые видят в их энтузиазме признак прогресса; другие — знак того, что даже коммуникация теперь подвержена спекуляциям. Тем не менее, проект движется вперёд с новой силой."
 tesla.3002.g: "Похвальная инициатива!"
 tesla.3003.t: "Политический кабель?"
 tesla.3003.d: "Несколько видных членов #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('tesla_fund_ig').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('tesla_fund_ig').GetCustom('RU_IG_RP')]#!#! публично заявили о своём намерении инвестировать в предприятие по прокладке подводного кабеля. Хотя ранее они не были связаны с телеграфной компанией, их поддержка кажется как идеологической, так и стратегической — они позиционируют себя как поборники современности, одновременно получая влияние на жизненно важный канал связи."
 tesla.3003.f: "На первый взгляд, предложение кажется желанным вливанием капитала и политической доброй воли. Однако за инвестициями стоит вопрос о влиянии. Могущественная оппозиционная партия, приобретающая долю в критически важной части инфраструктуры, может изменить не только рыночную динамику, но и баланс национальной политики. Контроль над коммуникациями — кто их строит, кто обслуживает и кто за них платит — никогда не был чисто техническим вопросом. Некоторые в компании предупреждают, что, открыв дверь сейчас, её может быть трудно закрыть позже."
 tesla.3003.g: "Это укрепит доверие к проекту."
 tesla.3003.h: "Это будет способствовать работе нашего инженера."
 tesla.3003.i: "Эта заинтересованная группа слишком влиятельна."
 tesla.3004.t: "Неохотные инвесторы"
 tesla.3004.d: "Капиталисты в [SCOPE.sState('tesla_fund_state').GetCustom('RU_SL_PP')] проявили мало энтузиазма по поводу проекта подводного кабеля. Не будучи враждебно настроенными, они выражают серьёзные сомнения в его прибыльности и долгосрочной жизнеспособности. Некоторые в совете директоров предлагают запустить рекламную кампанию, чтобы успокоить финансовую элиту региона, хотя для этого потребуется отвлечь средства от самого проекта."
 tesla.3004.f: "Они говорят о марже риска, альтернативных издержках и технологической неопределённости. Для них кабель — не чудо, а авантюра с неопределённой прибылью. Без видимых доказательств успеха они предпочитают ждать или вовсе оставаться в стороне. Однако влияние следует за деньгами, и их отсутствие может подорвать доверие к проекту. Тщательно продуманный рассказ может их переубедить, но каждая монета, потраченная на убеждение, — это на одну монету меньше на сталь, кабель и корабли."
 tesla.3004.g: "Пусть упустят возможность. Мы движемся вперёд, несмотря ни на что."
 tesla.3004.h: "Выделить средства из проекта на рекламную кампанию!"
 tesla.3005.t: "Промышленники оказывают поддержку"
 tesla.3005.d: "Благодаря личным усилиям директора телеграфной компании и его давним связям в кабинете министров, влиятельная фракция промышленников решила поддержать инициативу по прокладке подводного кабеля. Их политическое положение позволяет им направить в проект как частный капитал, так и общественное доверие, придав ему новый импульс."
 tesla.3005.f: "Успех в бизнесе часто зависит не только от планов и расчётов, но и от доверия. Когда нужные руки пожимают друг другу, даже самые нерешительные инвесторы начинают по-другому смотреть на балансовые отчёты. С поддержкой промышленников кабельный проект обретает мощного союзника — того, у кого есть средства для его финансирования, защиты и продвижения. Некоторые могут критиковать размывание границ между общественными и частными интересами, но мало кто отрицает результаты."
 tesla.3005.g: "Спасибо, [SCOPE.sCharacter('tesla_telegraph_boss_scope').GetFullName]!"
 tesla.3006.t: "Нервные акционеры"
 tesla.3006.d: "В [SCOPE.sState('tesla_fund_state').GetCustom('RU_SL_PP')] группа региональных акционеров всё больше обеспокоена медленным прогрессом и растущими затратами на проект подводного кабеля. Опасаясь долгосрочных убытков, они теперь рассматривают возможность продажи своих акций. Руководство компании предполагает, что ограниченный выкуп государством мог бы восстановить доверие, но такой шаг может создать прецедент для будущих ожиданий."
 tesla.3006.f: "То, что начиналось как шёпот в зале заседаний, теперь превратилось в громкий призыв к выходу. Инвесторы ссылаются на задержки проекта, непредвиденные инженерные затраты и туманные перспективы прибыли. Некоторые видят панику; другие — разумную осторожность. Если они уйдут сейчас, доверие может рухнуть и в других местах. Но если государство выступит в качестве покупателя последней инстанции, это может успокоить рынки — ценой ввязывания."
 tesla.3006.g: "Стабилизировать рынок — выкупить акции через государство."
 tesla.3006.h: "Если им не хватает дальновидности, они вольны уйти."
 tesla.3007.t: "Инженерный прорыв"
 tesla.3007.d: "Главный инженер кабельного проекта, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], представил пересмотренный набор планов, устраняющих несколько ключевых технических неопределённостей. Его выводы подробно описывают улучшения в технике прокладки, долговечности изоляции и стабильности сигнала. Совет директоров компании единогласно одобрил новый подход, назвав его крупным шагом вперёд."
 tesla.3007.f: "Схемы безупречны. Учтён каждый сегмент кабеля, каждая релейная станция, каждое ограничение по напряжению. То, что когда-то казалось далёким и спекулятивным, теперь начинает обретать контуры работоспособной системы. Инвесторы, которые начали колебаться, теперь говорят о долгосрочной стратегии и инфраструктурном наследии. Когда видение подкрепляется инженерным мастерством, доверие, как правило, следует за ним."
 tesla.3007.g: "Прекрасные новости!"
 tesla.3007.h: "Это успокоит акционеров."
 tesla.3011.t: "Кабелеукладочное судно отбывает"
 tesla.3011.d: "Кабелеукладочное судно вышло из порта, что знаменует переход от планирования к исполнению. На борту находятся точные приборы, изолированный провод, жизненно важные припасы, а также главный инженер проекта, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], который лично руководит технической операцией. Теперь, когда судно в пути, успех кабельного проекта зависит от тщательной работы на протяжении тысяч километров открытого моря."
 tesla.3011.f: "Не было никакой грандиозной церемонии — лишь медленное натяжение канатов и работа винта, когда судно входило в канал. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] воспринял[SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'а', '')] этот момент не как повод для празднования, а как время для сосредоточения. Схемы были снова проверены, допуски пересмотрены, морские карты развёрнуты на влажном дереве. Вес стали и амбиций теперь покоится на судне, далёком от берега. То, что было бумагой и речью, теперь стало реальностью — скрученной, погруженной и брошенной в глубину."
 tesla.3011.g: "Счастливого пути!"
 tesla.3012.t: "Безбилетник под палубой"
 tesla.3012.d: "Через несколько дней после начала миссии по прокладке кабеля команда обнаруживает молодого человека, прячущегося в нижних грузовых отсеках. Он представляется студентом-естествоиспытателем, утверждая, что пробрался на борт, чтобы изучать глубоководную фауну — академическое занятие, которое он не мог позволить себе финансировать официальными путями. В то время как некоторые офицеры рассматривают его присутствие как наивное любопытство, другие подозревают шпионаж в пользу иностранного конкурента."
 tesla.3012.f: "Юноша говорит точным, не угрожающим языком — называет виды, цитирует геологические слои, нервно ссылается на книги и лекции. Однако подозрение быстро распространяется на борту корабля, где безопасность превыше всего, а срыв может быть фатальным. Шёпот предполагает, что он может быть вовсе не студентом, а агентом, посланным для срыва миссии. Капитан теперь стоит перед трудным выбором. Выбросить его за борт — значит быстро покончить с этим. Оставить его на борту — значит рисковать задержкой, расколом — и худшим."
 tesla.3012.g: "Терпеть его присутствие под строгим надзором."
 tesla.3012.h: "Избавиться от проблемы. За борт."
 tesla.3013.t: "Дополнительный пассажир с раскопок"
 tesla.3013.d: "Незадолго до отплытия экспедиции по прокладке кабеля из Суэца молодой ассистент европейской археологической команды просит разрешения на проезд. Его археологическое задание в дельте Нила закончилось, и теперь он ищет способ добраться до Бомбея, где намерен продолжить свои исследования по сравнительной храмовой архитектуре и древним торговым путям. У него есть рекомендательное письмо, и он предлагает помощь в каталогизации или переводческой работе, если потребуется."
 tesla.3013.f: "Его одежда в пыли, арабский язык беглый, а блокнот полон набросков колонн, картушей и выцветших от солнца статуй. Он говорит о Тутмосе и Ашоке в одном предложении и верит, что прошлое живёт в формах зданий и дорог. Офицеры находят его безобидным, хотя и немного многословным. Доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] называет его «собирателем эха». Но кто-то одобряет проезд — возможно, из любопытства, возможно, из сочувствия к тем, кто ищет смысл в руинах."
 tesla.3013.g: "Разрешить ему проезд. Пусть история путешествует с нами."
 tesla.3013.h: "Отказать. Этот корабль для кабелей, а не для любопытства."
 tesla.3014.t: "Исследователь Тихого океана"
 tesla.3014.d: "Незадолго до отплытия молодой этнолог запросил разрешение на проезд на борту кабелеукладочного судна, которое должно пересечь Тихий океан. Его заявленная цель — изучение социальных структур, устных традиций и религиозных практик полинезийских островных сообществ, встречающихся на маршруте. У него есть справочные материалы, лингвистические заметки и письмо от зарубежного университета в поддержку его полевых исследований."
 tesla.3014.f: "Он представляется с мягкой дикцией и потрёпанным блокнотом, полным генеалогий и песнопений. Он задаёт мало вопросов о механизмах корабля, но много — об островных остановках экипажа. Для одних он безобидный эксцентрик; для других — уважительный наблюдатель того, что современность ещё не смыла. Капитан предоставляет ему койку при условии, что он останется пассажиром, а не пассажиром с мнением о том, как прокладывать кабели."
 tesla.3014.g: "Пусть поднимается на борт. Культура путешествует иначе, чем ток."
 tesla.3014.h: "Это не круизный лайнер!"
 tesla_cable_student_gains_experience_tt: "[ROOT.Var('rapanui_adventurer_var').GetCharacter.GetFullName] получает опыт, что даёт ему шанс стать [Concept('concept_academics_academic', 'академиком')] после завершения миссии по прокладке кабеля."
 tesla.3021.t: "Обрыв кабеля!"
 tesla.3021.d: "Основной кабель порвался во время прокладки. Повреждение произошло в нескольких сотнях морских миль от берега, возможно, из-за натяжения, неровного рельефа или производственного дефекта."
 tesla.3021.f: "Всё началось с прерывания сигнала — задержка, затем тишина. Когда команда подняла лебёдку, подтверждение пришло в виде обрывков изоляции и frayed copper. Где-то на дне океана соединение было разорвано."
 tesla.3021.g: "Это звёздный час доктора [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]!"
 tesla.3022.t: "Кабель отремонтирован"
 tesla.3022.d: "Доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] совершил чудо, починив кабель в открытом море."
 tesla.3022.f: "Благодаря куску верёвки, сломанному карандашу и куску жевательной резинки наш инженер мастерски сумел починить подводный кабель, несмотря на все предсказания скептиков."
 tesla.3022.g: "Слава богу за доктора [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]!"
 tesla.3023.t: "Кабель не удалось починить..."
 tesla.3023.d: "Несмотря на все усилия, доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] не смог[SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'ла', '')] спасти подводный кабель."
 tesla.3023.f: "Инженеры на борту теперь спорят о допустимых нагрузках и точках сращивания. Инвесторы дома спорят об ответственности. А компания спорит о том, сколько правды должна услышать общественность."
 tesla.3023.g: "Поднять и отремонтировать повреждённый сегмент, чего бы это ни стоило."
 tesla.3023.h: "Обойти повреждение и продолжить — смириться с некоторой потерей сигнала."
 tesla.3024.t: "Приближается штормовой фронт"
 tesla.3024.d: "Барометрическое давление резко упало, и на горизонте собираются тёмные тучи. Экипаж сообщает, что штормовая система движется к текущему положению судна. Операция по прокладке кабеля находится в середине, и остановка сейчас задержит прогресс, но продолжение может привести к повреждению или потере кабеля."
 tesla.3024.f: "Ветер поднимается неравномерными порывами, и горизонт исчезает в свинцовой серости. Дождь ещё не начался, но море уже волнуется под ногами. Капитан сверяется с картами; инженер проверяет показания натяжения. Представители правления обсуждают имиджевые потери от задержки в сравнении с риском разорения. Штормы, в отличие от рынков, не ведут переговоров. Решение должно быть принято — сейчас."
 tesla.3024.g: "Продолжать сквозь шторм. Мы не можем позволить себе задержку."
 tesla.3024.h: "Приостановить операции и вернуться в более безопасные воды."
 tesla.3025.t: "Неожиданные условия на морском дне"
 tesla.3025.d: "Экипаж сообщает, что маршрут прокладки кабеля вошёл в неизведанную глубоководную впадину, что значительно увеличивает нагрузку на кабель. Доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] не уверен, выдержит ли кабель дополнительное натяжение. Корректировка маршрута возможна, но это будет означать дорогостоящий обход."
 tesla.3025.f: "Морское дно, когда-то нанесённое на карту в теории, на практике показало свою непредсказуемость. Батиметрические карты либо устарели, либо неверны, и то, что на бумаге выглядело стабильным, теперь показывает признаки риска. Впадина резко уходит вниз, таща кабель по опасным контурам. С каждой морской милей инженеры взвешивают риск и стоимость. Поворот сейчас может спасти кабель, но не бюджет."
 tesla.3025.g: "Продолжать по плану. Принять риск."
 tesla.3025.h: "Скорректировать маршрут, чтобы избежать впадины."
 tesla.3026.t: "Авария с кабелем"
 tesla.3026.d: "Рабочий погиб при работе с неисправным кабельным барабаном. Инцидент потряс экипаж и вызвал обеспокоенность по поводу протоколов безопасности. Хотя это был несчастный случай, о смерти уже сообщают в прессе на родине."
 tesla.3026.f: "Барабан завертелся без предупреждения, и через несколько секунд его не стало — раздавлен петлёй железа и инерцией. Не было времени среагировать. Его отсутствие оставляет за собой не только тишину; оно оставляет страх. Море не прощает ошибок. И, возможно, общественность тоже."
 tesla.3026.g: "Публично подтвердить приверженность безопасности. Объявить о новых протоколах."
 tesla.3026.h: "Сосредоточиться на продолжении миссии."
 tesla.3027.t: "Болезнь среди экипажа"
 tesla.3027.d: "Несколько моряков заболели, проявляя симптомы лихорадки и слабости. Медикаменты ограничены, а причина остаётся неясной. Доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName] находится среди заболевших."
 tesla.3027.f: "Работа замедляется. Разговоры становятся тише. Кашель одного техника эхом разносится громче гула лебёдки. Без ответов страх становится своей собственной заразой. Океан может разделять нации, но он не предлагает карантина."
 tesla.3027.g: "Временно приостановить операции, пока больные не выздоровеют."
 tesla.3028.t: "Подозрительная активность под палубой"
 tesla.3028.d: "Обнаружилось, что [ROOT.Var('rapanui_adventurer_var').GetCharacter.GetFullName] поздно ночью вмешивался в работу чувствительных приборов. Он утверждает, что ему было любопытно, и отрицает какие-либо правонарушения, но офицеры не убеждены. Возможность саботажа не может быть исключена."
 tesla.3028.f: "Пойманный с поличным, он предлагал лишь неуклюжие объяснения — «просто проверял показания», «убеждался, что всё работает». Никто не помнит, чтобы разрешал ему находиться в запретной зоне. Теперь инженеры шепчутся о саботаже. Кабель может проходить через океаны, но для предательства достаточно нескольких метров провода."
 tesla.3028.g: "На этот раз ты от нас не уйдёшь!"
 tesla.3028.h: "Он невиновен."
 tesla.3029.t: "Не тот человек"
 tesla.3029.d: "Появились новые доказательства, свидетельствующие о том, что уволенный член экипажа не имел намерения саботировать миссию по прокладке кабеля. Затерянный приказ на техническое обслуживание, найденный среди стопки неподшитых документов, подтверждает, что ему действительно было поручено осмотреть данное оборудование. Инцидент, который был тихо урегулирован в море, с тех пор стал достоянием общественности благодаря критическим публикациям в прессе."
 tesla.3029.f: "Газеты теперь печатают то, что экипаж бормотал в частных беседах: что человека выгнали без суда и следствия, основываясь на ошибочных предположениях и недостающих документах. Хотя доказательства его оправдывают, ущерб нанесён — не только ему, но и репутации проекта. Инвесторы задаются вопросом, не управляет ли экспедицией паника больше, чем дисциплина."
 tesla.3029.g: "Ох... э-э... думаю, с ним всё в порядке?"
 tesla.3030.t: "Плавный ход в сложных водах"
 tesla.3030.d: "Особенно сложный участок маршрута кабеля, который, как считалось ранее, потребует специальных корректировок, был успешно проложен без задержек и осложнений. Эффективность и подготовка команды превзошли ожидания."
 tesla.3030.f: "Ожидалось, что морское дно на этом участке будет иметь неровный рельеф, но тщательное планирование и спокойная погода позволили добиться стабильного прогресса. Экипаж работал почти в полной тишине, кабель разматывался, как нитка с катушки. Инженеры обменивались короткими кивками удовлетворения, и на этот раз не потребовалось никаких исправлений. Это, как сухо заметил один офицер, «тот самый безпроблемный успех, о котором всегда молишься, но редко получаешь». Уверенность на борту растёт вместе с барометром."
 tesla.3030.g: "Отлично!"
 tesla.3031.t: "Киты и дельфины"
 tesla.3031.d: "Уникальное зрелище природы предстаёт, когда киты и дельфины пересекают маршрут. [SCOPE.sCharacter('rapanui_adventurer_var').GetFullName] ожидает новых биологических открытий от наблюдения, но экипаж проявляет мало интереса к такого рода академическому любопытству."
 tesla.3031.f: "На борту вспыхивает спор, когда студент также указывает на презренные методы охоты, используемые для убийства этих очаровательных морских существ. Для большинства моряков, для которых киты служат лишь источником жира, лекция становится дополнительным раздражителем."
 tesla.3031.g: "Изучить этих прекрасных созданий."
 tesla.3031.h: "У нас нет на это времени."
 tesla.3032.t: "Столько рыбы!"
 tesla.3032.d: "[SCOPE.sCharacter('rapanui_adventurer_var').GetFullName] не может поверить своей удаче, когда замечает косяки рыб ранее неизвестных видов в Северной Атлантике. Студент просит капитана остановить работу и поймать несколько образцов. Доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] указывает, что это кабелеукладочное судно, а не исследовательское учреждение."
 tesla.3032.f: "«Так поверьте же мне! Мы упускаем научное исследование! Эти маленькие изящные рыбки — совершенно неоткрытый вид. Разве вы не видели этого — что вы имеете в виду, я могу прямо сейчас поплавать в воде с ними?!»"
 tesla.3032.g: "Поймать немного рыбы."
 tesla.3033.t: "Эксперименты в Атлантическом океане"
 tesla.3033.d: "Доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] использовал[SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'а', '')] время в море, чтобы установить некоторые из своих приборов для проведения научных исследований на борту кабелеукладочного судна. [SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'Она', 'Он')] ещё не выбрал[SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'а', '')] направление."
 tesla.3033.atlantic: "«В океане есть река. В самые сильные засухи она никогда не пересыхает, а в самые сильные наводнения никогда не выходит из берегов. Её берега и дно из холодной воды, в то время как её течение из тёплой. Мексиканский залив — её источник, а её устье — в Северном Ледовитом океане. Это Гольфстрим». — Мэтью Фонтейн Мори"
 tesla.3033.indian: "«Хотя Индийский океан изобилует богатыми и редкими драгоценностями, он не может похвастаться более ясным небом или более спокойным морем. Если и есть берег, который не боится ярости неверных волн, то это какой-нибудь бедный и узкий залив, неизвестный ветрам». — Пьетро Метастазио"
 tesla.3033.pacific: "«Тихий океан — мой родной океан; я узнал его первым, вырос на его берегу, собирал морских животных вдоль побережья. Я знаю его настроения, его цвет, его природу». — Джон Стейнбек"
 tesla.3033.g: "Сосредоточиться на магнитных экспериментах."
 tesla.3033.h: "Сосредоточиться на океанографических экспериментах."
 tesla.3034.t: "Тайна в глубинах"
 tesla.3034.d: "Доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] делает странное открытие при просмотре данных обследования. В определённой части Атлантики морское дно поднимается на необычно высокий уровень. Пока у [SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'неё', 'него')] есть только теория об этом явлении."
 tesla.3034.f: "Вообще-то всегда считалось, что моря должны быть особенно глубокими посередине. Но сегодняшнее открытие переворачивает эту идею с ног на голову. Вместо рекорда глубины расстояние между дном и поверхностью уменьшается. Это хорошая новость для компании, потому что требуется меньше длины кабеля, чем предполагалось сначала. Но доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] ясно понимает, что это означает, что все предыдущие представления о глубоком море должны быть скорректированы. Очевидно, на дне океана есть холмы и долины. И этот холм — нечто большее, чем просто холм."
 tesla.3034.g: "Там подводный горный хребет?"
 tesla.3035.t: "Храм Аввам"
 tesla.3035.d: "[SCOPE.sCharacter('rapanui_adventurer_var').GetFullName] обратился к капитану с просьбой: сделать небольшой крюк вглубь страны от Аденского залива, чтобы посетить руины храма Аввам близ Мариба. Известное учёным как центр древней сабейской цивилизации, это место долгое время оставалось недоступным для систематического изучения. Он утверждает, что шанс изучить его firsthand, проходя так близко, может скоро не представиться. Однако обход задержит операции по прокладке кабеля."
 tesla.3035.f: "[SCOPE.sCharacter('rapanui_adventurer_var').GetLastName] говорит о лунных культах, ладанных путях и ещё не разгаданных эпиграфических загадках. Его пальцы чертят в воздухе воображаемые надписи, описывая циклопические стены и полузасыпанные песком колонны. Для него храм Аввам — это загадка, ждущая под пылью. Доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] же видит в этом лишь задержку, которая вот-вот произойдёт."
 tesla.3035.g: "Разрешить обход."
 tesla.3035.h: "У кабеля своё расписание."
 tesla.3036.t: "Сокотра"
 tesla.3036.d: "Пока корабль стоит на якоре у Сокотры для пополнения запасов, [SCOPE.sCharacter('rapanui_adventurer_var').GetFullName] незаметно просит разрешения сойти на берег. Он получил известие о партии древностей — небольших статуэток и погребальных предметов, предположительно египетского происхождения, — которые контрабандисты переправляют через остров в частную коллекцию восточного княжеского двора. Он утверждает, что если их приобрести сейчас, предметы можно будет сохранить, каталогизировать и в конечном итоге вернуть в надлежащие научные руки."
 tesla.3036.f: "[SCOPE.sCharacter('rapanui_adventurer_var').GetLastName] не отрицает неофициального характера сделки — только её срочность. «Лучше аннотированный ящик в архиве, чем молчаливый идол на дворцовой полке», — говорит он. Экипаж обеспокоен; капитан предупреждает о дипломатической деликатности. Но ассистент говорит о наследии, о фрагментах, спасённых от забвения, о знаниях, иначе утраченных."
 tesla.3036.g: "Разрешить ему действовать — тихо."
 tesla.3036.h: "Это не наша миссия."
 tesla.3040.t: "Гигантская тень"
 tesla.3040.d: "Члены экипажа сообщили о наблюдении огромной, медленно движущейся тени под судном во время обычной прокладки кабеля. Объект, казалось, не соответствовал ни течению, ни поведению известных диких животных, и исчез без следа. Хотя офицеры отмахнулись от этого как от вероятного кита или оптической иллюзии, сообщение вызвало слухи как на борту судна, так и в прессе."
 tesla.3040.f: "Он двигался молча и ровно, далеко под поверхностью — слишком регулярно для течения, слишком огромен для любого известного науке кита. Некоторые говорят, что у него был металлический блеск. Другие утверждают, что видели огни. В бортовом журнале отмечена лишь «плотная морская масса неопределённого происхождения». Но шёпот уже распространился. Что ещё движется под кабелями, которые мы прокладываем? Что, возможно, уже наблюдает?"
 tesla.3040.g: "Сообщить прессе о редкой морской встрече."
 tesla.3041.t: "Возвращение флотилии кабелеукладчиков"
 tesla.3041.d: "Флотилия кабелеукладчиков вернулась в порт. После недель в море вся длина подводной линии была проложена по запланированному маршруту. Однако окончательное тестирование ещё не началось. Кабель теперь должен быть подключён к наземным станциям и пройти проверку сигнала. Только тогда станет известно, действительно ли проект увенчался успехом."
 tesla.3041.f: "Ржавчина прилипла к лебёдкам, а корпус покрыт полосами соли. Экипаж возвращается измотанным, инженер молчит. Кабель лежит там, где и должен — погребённый под морским дном, протянутый через хребты, соединённый и запечатанный. Но до сих пор ни одно слово не перешло с одного континента на другой. Корабли, может, и дома, но уверенность с ними не пришла. Все взгляды теперь обращены на финальное испытание."
 tesla.3041.g: "Ура!"
 tesla.3042.t: "Эксперт по океану"
 tesla.3042.d: "Несмотря на неопределённости, окружавшие миссию по прокладке подводного кабеля, один человек превратил это путешествие в неожиданный научный триумф. Молодой безбилетник, которого сначала подозревали и чуть не выгнали, провёл экспедицию, документируя глубоководные формы жизни, собрав сотни образцов и подробных набросков. По возвращении его находки привлекли внимание обществ естествознания по всему континенту."
 tesla.3042.f: "Работая при свете масляной лампы и на нормированной бумаге, студент каталогизировал биолюминесцентный планктон, сочленённые рыбьи кости и ракообразных, неизвестных прибрежной таксономии. То, что началось как акт отчаяния, закончилось академической славой. Пресса называет его «натуралистом бездны». Он просто называет это делом наблюдения."
 tesla.3042.g: "Студент? Называйте его доктором!"
 tesla.3042.h: "Нам нужны эти научные документы."
 tesla.3043.t: "Хроника руин и путей"
 tesla.3043.d: "Во время кабельной экспедиции из Суэца в Бомбей молодой ассистент-археолог делал обширные заметки об архитектуре, надписях и культурных останках, наблюдаемых или обсуждаемых по пути. Опираясь на свои предыдущие полевые исследования и географическое разнообразие путешествия, он составил всеобъемлющий отчёт, который теперь циркулирует в академических кругах, получая широкое признание."
 tesla.3043.f: "Он наблюдал не только за береговыми линиями. Его блокнот следовал за контурами заброшенных храмов, постоялых дворов и забытых портовых городов — фрагментов цивилизаций, некогда связанных торговлей и верой. Теперь, благодаря его письму, эти фрагменты заговорили снова. Публикация, хвалимая за ясность и чувство преемственности, рассматривается как работа, которая преодолевает разрыв между наукой и мореплаванием. Кабель может связывать настоящее, но его хроника восстанавливает прошлое."
 tesla.3043.h: "Нам нужны эти археологические артефакты."
 tesla.3044.t: "Кафедра этнологии"
 tesla.3044.d: "После кабельной экспедиции студент, путешествовавший на борту, опубликовал серию статей, подробно описывающих системы родства, устные традиции и навигационные космологии полинезийских народов, встреченных во время высадок и остановок. Его работа получила высокую оценку учёных из многих стран. Теперь университет хочет назначить его на новую кафедру сравнительной этнологии."
 tesla.3044.f: "Его труды избегают романтизма, но несут в себе ритм песнопений и логику родословных. Он описывает богов, имеющих форму ветра, и генеалогические древа, имеющие форму волн. В академических салонах его имя теперь циркулирует наряду с термином «океаническая эпистемология». Для тех, кто помнит его на борту корабля, странно думать, что такое тихое ведение заметок могло сформировать целую область. Он называет это слушанием."
 tesla.3044.h: "Нам нужны эти полинезийские артефакты."
 tesla.3051.t: "Первое слово через Атлантику"
 tesla.3051.d: "Отправленное по трансокеанскому подводному кабелю, сообщение [SCOPE.sCountry('tesla_country_1').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('tesla_leader_1').GetFullName] из [SCOPE.sCountry('tesla_country_1').GetAltNameNoFlag('RU_CL_RP')] было доставлено через 16 часов [SCOPE.sCountry('tesla_country_2').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('tesla_leader_2').GetFullName] из [SCOPE.sCountry('tesla_country_2').GetAltNameNoFlag('RU_CL_RP')]."
 tesla.3051.f: "«Это триумф более славный, потому что гораздо более полезный для человечества, чем любой, когда-либо одержанный завоевателем на поле битвы. Пусть атлантический телеграф, под благословением Небес, окажется узами вечного мира и дружбы между родственными нациями и инструментом, предназначенным Божественным Провидением для распространения религии, цивилизации, свободы и закона по всему миру». — Джеймс Бьюкенен"
 tesla.3051.g: ".... . .-.. .-.. --- -.-.--"
 tesla.3052.t: "Тишина"
 tesla.3052.d: "Кабель подключён к береговой станции. Первоначальные попытки передачи были предприняты — без ответа. Сигнал с дальнего конца пока не подтверждён. Техники продолжают тестировать и калибровать оборудование, но с каждым часом уверенность начинает таять. Похоже, миссия провалилась."
 tesla.3052.f: "Линия молчит. Ни треска, ни щелчка, ни мерцания тока — лишь тишина, слишком идеальная, чтобы быть естественной. Одни винят приборы, другие — ретрансляционные пункты, третьи — сам океан. Инженеры работают в напряжённой тишине, инвесторы шепчутся об убытках, а пресса начинает строить догадки. Возможно, сигнал просто задерживается. Возможно, что-то пошло не так. Или, возможно, это всегда было слишком много — сообщения под морем."
 tesla.3052.g: "Целое состояние утонуло в море..."
 tesla.3052.tt: "Компания попытается запустить новый раунд сбора средств, если доверие акционеров не упадёт до нуля."
 tesla.3053.t: "Крах доверия"
 tesla.3053.d: "Финансовые рынки охватила паника. Настроения инвесторов рухнули. Акции телеграфной компании резко упали, вызвав более широкую потерю доверия к промышленным инновациям и роли правительства в спекулятивных предприятиях. Возникший кризис распространяется по банкам, фирмам и домохозяйствам."
 tesla.3053.f: "Всё началось с неопределённости, затем наступила тишина, а теперь — расплата. Акции, когда-то торговавшиеся как символы будущего, теперь стоят меньше бумаги. Офисы закрываются, банки приостанавливают снятие средств, а название кабельной компании произносится только с горечью. Тысячи мелких инвесторов видят, как их сбережения исчезают за считанные часы. То, что должно было объединить континенты, вместо этого разрушило экономику нации. Кабель тихо лежит под морем; над ним — оглушительный шум."
 tesla.3053.g: "Конечно, рынки скорректируются. Они всегда так делают...?"
 tesla.3054.t: "Нас обошли"
 tesla.3054.d: "До нас дошли новости, что иностранная держава успешно завершила и активировала собственное трансокеанское кабельное соединение. Телеграфные сигналы теперь передаются через море — только не по нашему проводу. Это объявление потрясло рынки и подняло трудные вопросы о темпах и цели нашего собственного предприятия."
 tesla.3054.f: "Заголовки ясны и жестоки: сообщение пересекло океан, но не на наших условиях. То, что когда-то было гонкой, теперь имеет победителя — и это не мы. Инвесторы замерли, чиновники уклоняются от ответов, а соперники тихо принимают к сведению. Иностранный кабель несёт не только сигналы; он несёт влияние, авторитет и преимущество первопроходца. Наши собственные корабли всё ещё дрейфуют в море, наши инженеры всё ещё считают. Тем временем мир движется дальше — связанный, но не нами."
 tesla.3054.g: "Это... проблема."
 tesla.3061.t: "Восточный телеграф завершён"
 tesla.3061.d: "Прямой подводный телеграфный кабель теперь соединяет Египет с Индией через Суэц. После многих лет подготовки, изысканий и прокладки через мелководные моря и спорные воды линия завершена. Телеграфисты подтверждают, что сигналы принимаются чётко и без задержек."
 tesla.3061.f: "«Кабель в Индию завершён». — Аноним"
 tesla.3061.g: "-... --- -- -... .- -.-- ..--.."
 tesla.3071.t: "Первое сообщение через Тихий океан"
 tesla.3071.d: "Впервые в истории сообщение пересекло огромный Тихий океан по непрерывной цепи подводного кабеля — от Австралии до Канады. Кабель простирается на тысячи морских миль и теперь передаёт слова через полушария за секунды. Первая официальная передача была краткой, формальной и исторической."
 tesla.3071.f: "«Тихоокеанский кабель успешно проложен. Империя теперь связана цепью коммуникаций, принадлежащей и контролируемой самой Империей. Это достижение укрепит узы единства и сотрудничества во всех частях владений Его Величества». — Эдмунд Бартон"
 tesla.3071.g: ".... --- --- .-. .- -.-- -.-.--"
