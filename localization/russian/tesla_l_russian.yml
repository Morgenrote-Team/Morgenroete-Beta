l_russian:
 tesla_prototype_mechanical_computer_modifier: "Прототип механического компьютера"
 tesla.223.t: "Первый прототип"
 tesla.223.d: "В своём стремлении построить механический компьютер доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] смог[SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'ла', '')] завершить первый прототип, способный выполнять простые вычисления. Хотя это устройство не так мощно, как настоящий компьютер, оно может помочь нашим учёным."
 tesla.223.f: "«Он ещё не способен выполнять все вычисления, но по крайней мере некоторые. Сложение, вычитание, умножение и деление не должны быть проблемой. Но имейте в виду, что один из моих ассистентов чуть не лишился пальца, когда машина работала»."
 tesla.223.g: "Надеюсь, [SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'она', 'он')] закончит нечто большее, чем просто прототип..."
 tesla.224.t: "Раздувание проекта"
 tesla.224.d: "Кажется, доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'полна', 'полон')] идей. Не проходит и дня без изменений в планах механического компьютера. Вопрос лишь в том, будет ли проект когда-либо завершён."
 tesla.224.f: "«Только представьте, если бы он мог ещё и музыку играть! Разве это не было бы здорово?»"
 tesla.224.g: "Не могли бы вы просто построить этот компьютер?"
 tesla.224.h: "Пригрозить прекращением финансирования."
 tesla.225.t: "Пожар повредил механический компьютер"
 tesla.225.d: "Сильный пожар повредил части механического компьютера, который строит доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName], и уничтожил некоторые [SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'её', 'его')] чертежи. Мы пока не знаем, насколько это задержит проект."
 tesla.225.f: "Пожар начался в печатном модуле компьютера. Никто точно не знает, что стало причиной, но похоже, что принтер произвёл большое количество бумаги."
 tesla.225.g: "Будет ли этот компьютер когда-нибудь построен?"
 tesla.225.h: "Отправить им дополнительное финансирование."
 tesla_modernized_railway_lines_state_modifier: "Модернизированные железнодорожные линии"
 tesla_railway_project_new_priority_button: "$tesla_topographic_map_project_new_priority_button$"
 tesla_railway_project_new_priority_button_desc: "$tesla_topographic_map_project_new_priority_button_desc$"
 tesla_topographic_map_project_new_priority_button: "Изменить приоритетные области"
 tesla_topographic_map_project_new_priority_button_desc: "#T Изменить приоритетные области#!\nИзменить [Concept('concept_state', 'области')], которые являются приоритетными для этого проекта.\n#n Предупреждение: приостановите игру, чтобы убедиться, что приоритезация работает правильно.#!"
 tesla_state_trait_irrigation: "Ирригационная система"
 je_tesla_irrigation_project: "Ирригационная система"
 tesla_states_with_irrigation_tt: "Все #tooltippable_name [GetPlayer.GetAdjective|l]ие#! области имеют черту «$tesla_state_trait_irrigation$» (текущее значение: [GetPlayer.MakeScope.GetVariable('tesla_num_states_irrigation_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0])."
 tesla_irrigation_project_finished_engineer_loc: "\nДоктор [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName] работал[SelectLocalization(GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.IsFemale, 'а', '')] над новыми #b ирригационными системами#! в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')] и смог[SelectLocalization(GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.IsFemale, 'ла', '')] расширить их, что значительно улучшило наш сельскохозяйственный сектор."
 gaudi.1111.t: "Ирригационная система [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]"
 gaudi.1111.d: "Наш [concept_tesla_civil_engineer|l] [GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] наконец-то завершил проект по строительству современной ирригационной системы в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')]. Теперь, когда мы укротили реки и привели воду на поля, наше сельское хозяйство непременно будет расти!"
 gaudi.1111.f: "«Дикие реки теперь укрощены. Волшебство исчезло. Теперь это просто прямые водные пути. Даже бобры исчезли...»"
 gaudi.1111.g: "Надеюсь, это не приведёт к непредвиденным последствиям..."
