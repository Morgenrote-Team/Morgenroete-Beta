 je_gaudi_magnetic_station_reason: "С помощью инструментов и инструкций из Гёттингена наш инженер в течение следующих двух лет создаст геомагнитную обсерваторию. Это международное предприятие: чем больше данных из разных стран будет отправлено в Гёттинген, тем быстрее тамошние учёные смогут получить новые сведения о магнитном поле Земли."
