 andersson.401.t: "Охотничий лагерь"
 andersson.401.d: "Во время спелеологических поисков д-р [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'наткнулась', 'наткнулся')] на предполагаемый охотничий лагерь в [SCOPE.sState('andersson_state_scope').GetCustom('RU_SL_PP')], который [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'она', 'он')] датирует мезолитом."
 andersson.401.f: "После недолгих поисков антрополог смог обеспечить сохранность многочисленных доисторических артефактов. Среди них были копья и наконечники стрел, а также ручное рубило, которое может относиться к неолиту. Более подробные исследования будут проведены уже в университете."
 andersson.401.g: "Это даст нам новые сведения о прошлом."
 andersson.402.t: "Керамика"
 andersson.402.d: "Антропологи и археологи смогли извлечь керамику в [SCOPE.sState('andersson_state_scope').GetCustom('RU_SL_PP')]. Она хорошо будет смотреться в музейной коллекции."
 andersson.402.f: "Сосуды, найденные антропологами, можно было бы назвать примитивными, если бы не знать, что им уже несколько тысяч лет. С этой точки зрения они кажутся прямо-таки изысканными. Экспертам уже поручили изучить керамику на наличие остатков краски."
 andersson.402.g: "Обращайтесь с ней осторожно!"
 andersson.403.t: "Неолитическая деревня"
 andersson.403.d: "Антропологическая группа в [SCOPE.sState('andersson_state_scope').GetCustom('RU_SL_PP')] сообщает хорошие новости: если повезёт, они нашли остатки поселения эпохи неолита. Д-ру [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] пообещали множество артефактов и новые знания об этой эпохе."
 andersson.403.f: "Как выяснилось, у поселения уже была ограда, похожая на палисад; удалось также нанести на план колодец, стойла и зернохранилище. Возможно, это одно из первых документированных поселений в нашей стране."
 andersson.403.g: "Научная сенсация!"
 andersson.404.t: "Человеческие кости"
 andersson.404.d: "Д-р [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] несколько новых костей."
 andersson.404.f: "Под руководством д-ра [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] группа антропологов взяла под охрану место захоронения с костями возрастом в тысячи лет, включая несколько исключительно хорошо сохранившихся фрагментов."
 andersson.404.g: "Надеюсь, это не будет очередным разочарованием вроде суповых костей."
 andersson.406.t: "Доисторическая костяная флейта"
 andersson.406.d: "A hiker stumbled over a weird bone in a cave in [SCOPE.sState('andersson_state_scope').GetName]. After contacting the local University, Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] was sent to the cave. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetSheHe|U] found a bone, but it was not just any bone, it was a prehistoric bone flute!"
 andersson.406.f: "«Чистый, высокий свист костяной флейты - ангельский звук, который жутковато завораживает всех вокруг»."
 andersson.406.g: "На ней всё ещё можно играть?"
 andersson.408.t: "Найдены кости и каменные орудия"
 andersson.408.d: "В [SCOPE.sState('andersson_state_scope').GetCustom('RU_SL_PP')] откопали множество каменных орудий и костей. Д-ра [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] немедленно отправили на исследование. [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'Она', 'Он')] действительно [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] много костей - кажется, костей кого угодно, а заодно и несколько каменных артефактов."
 andersson.408.f: "«Думаю, это кость оленя. Или человека? Может, динозавра? Акулы? Огромной обезьяны? Кости - совсем не моя область...»"
 andersson.408.g: "Стоп! Что это за кости? Современные? Доисторические? Динозавровые?"
 andersson.409.t: "Обнаружена доисторическая Венера"
 andersson.409.d: "Доисторическая статуэтка каменного века была обнаружена в местности [SCOPE.sState('andersson_state_scope').GetStateRegion.GetMineHubName]. Многим не нравится её вид: маленькая статуэтка из слоновой кости, похоже, имеет крупные бёдра и грудь. Д-р [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] пока не [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'уверена', 'уверен')], для чего предназначалась эта фигурка: была ли это богиня или всего лишь талисман?"
 andersson.409.f: "Венеры - это небольшие доисторические женские статуэтки, созданные в верхнем палеолите, особенно в граветтский период (ок. 30 000-22 000 лет до н. э.). Их находят по всей Европе и вплоть до Сибири; обычно они вырезаны из камня, слоновой кости, кости или вылеплены из глины. Многие изображают преувеличенные грудь, бёдра и живот, тогда как детали лица часто отсутствуют. К знаменитым примерам относятся Венера Виллендорфская и Венера из Дольни-Вестонице. Их назначение остаётся предметом споров: их трактуют как символы плодородия, ритуальные предметы, автопортреты или выражения социальной идентичности. Фигурки Венер считаются важными образцами раннего символического искусства."
 andersson.409.g: "Она станет известна как Венера из местности [SCOPE.sState('andersson_state_scope').GetStateRegion.GetMineHubName]."
