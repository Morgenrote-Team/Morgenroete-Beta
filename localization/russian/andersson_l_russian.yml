 andersson.10.t: "Институт антропологии и этнологии"
 andersson.10.d: "Сегодня на торжественной церемонии [SCOPE.sCharacter('andersson_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('andersson_ruler').GetFullName] лично [SelectLocalization(SCOPE.sCharacter('andersson_ruler').IsFemale, 'открыла', 'открыл')] Институт антропологии и этнологии."
 andersson.10.f: "Церемония открытия прошла торжественно и в целом была встречена благожелательно: её поддержали пресса, эксперты и публика. Однако не обошлось и без критиков. Ещё одно здание для престижных диковин, порождённое какой-то коллекционерской одержимостью, без всякой реальной ценности? Оппозиционная газета писала о пустой трате денег и безыдейном содержании. Утверждалось, что правительству больше нечего предложить. Одни собирали артефакты, другие лекарственные растения, потом появились любители динозавров, а теперь ещё и человеческие кости! К счастью, подобные негативные отзывы остались в явном меньшинстве и не охладили общий энтузиазм вокруг нового здания, значение которого [SCOPE.sCharacter('andersson_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('andersson_ruler').GetFullName] ещё раз [SelectLocalization(SCOPE.sCharacter('andersson_ruler').IsFemale, 'подчеркнула', 'подчеркнул')]."
 andersson.10.g: "Посетить институт."
 andersson.21.t: "Человек из Веро"
 andersson.21.d: "Открытие древних костей во Флориде принесло Элиасу Селлардсу общенациональную известность."
 andersson.21.f: "Человеком из Веро называют значимый комплекс человеческих останков плейстоценовой эпохи, обнаруженный геологом Элиасом Селлардсом в 1915-1916 годах в Веро-Бич, штат Флорида. Находка поначалу вызывала ожесточённые споры, поскольку останки лежали в том же геологическом слое, что и вымершая мегафауна ледникового периода, бросая вызов распространённому научному мнению о том, что люди пришли в Америку гораздо позже. Современное радиоуглеродное датирование и развитые археологические методы позднее подтвердили, что это место относится к числу древнейших свидетельств человеческого присутствия в Северной Америке и датируется примерно 13 000 годами назад."
 andersson.21.g: "Поразительно."
 andersson.22.t: "Человек из Лагоа-Санты"
 andersson.22.d: "Датский учёный сделал удивительное открытие в бразильской пещере."
 andersson.22.f: "Человеком из Лагоа-Санты называют собрание палеоиндейских скелетных останков, обнаруженных в середине XIX века датским натуралистом Петером Вильгельмом Лундом в известняковых пещерах Минас-Жерайса в Бразилии. Современные генетические исследования и археологический анализ позднее поместили эти останки в контекст ранней волны заселения Южной Америки, датируемой примерно 10 000-12 000 лет назад."
 andersson.23.t: "Кроманьонец"
 andersson.23.d: "Луи Ларте нашёл несколько скелетов доисторических людей, которые значительно больше похожи на современных людей, чем неандертальцы. По месту находки в гроте Кро-Маньон этих первых европейцев называют кроманьонцами."
 andersson.23.f: "Кроманьонцами называют первых ранних современных людей (Homo sapiens) европейского верхнего палеолита, обнаруженных в 1868 году геологом Луи Ларте в скальном убежище близ Лез-Эзи во Франции. На стоянке нашли пять скелетов вместе с каменными орудиями, резными рогами и останками животных, что дало первые надёжные доказательства того, что физически современные люди жили в Европе рядом с вымершей плейстоценовой фауной. Эти находки сыграли ключевую роль в становлении палеонтологии человека; образцы датируются примерно 28 000-30 000 лет назад и отличаются от более массивных неандертальцев, найденных ранее."
 andersson.24.t: "Боскопский человек"
 andersson.24.d: "Обнаружение черепа вызвало переполох среди нескольких батраков. О находке сообщили в ближайшее научное учреждение."
 andersson.24.f: "Боскопским человеком называют ископаемый фрагмент черепной коробки гоминида, обнаруженный в 1913 году батраками в регионе Трансвааль в Южной Африке и примечательный необычно большим предполагаемым объёмом мозга. В начале XX века некоторые антропологи ошибочно выделяли этот образец в отдельный вид Homo capensis и выдвигали теорию о существовании в регионе расы людей с «большим мозгом», предшествовавшей современному населению. Позднейшие палеоантропологические исследования и более строгая датировка опровергли эти утверждения, определив останки как принадлежащие современному человеку (Homo sapiens), связанному с предковой линией коренных койсанских народов."
 andersson.25.t: "Человек из Шаньдиндуна"
 andersson.25.d: "Сегодня в пещере над стоянкой Чжоукоудянь были найдены человеческие ископаемые, указывающие на раннее заселение северного Китая."
 andersson.25.f: "Человеком из Шаньдиндуна называют группу ранних современных людей (Homo sapiens), обнаруженных в 1933-1934 годах в Верхней пещере стоянки Чжоукоудянь близ Пекина в Китае. Раскопанные под руководством Пэй Вэньчжуна и позднее проанализированные Францем Вейденрейхом, эти ископаемые датируются примерно 30 000-10 000 лет назад. Исторически человек из Шаньдиндуна служил азиатским аналогом европейского кроманьонца. Останки, состоящие из трёх полных черепов и различных фрагментов костей, были найдены вместе со сложными орудиями, костяными иглами и просверленными украшениями из зубов, что указывает на развитую культуру. Первоначальная гипотеза Вейденрейха предполагала, что эти люди представляли «протомонголоидных» предков современных азиатов, хотя современная палеоантропология рассматривает их как часть более широкой и разнообразной миграции ранних людей по Восточной Азии до окончательного закрепления региональных признаков."
 andersson.26.t: "Талгайский человек"
 andersson.26.d: "Рядом со станцией Талгай была обнаружена кость, проливающая совершенно новый свет на раннейшее заселение Австралии."
 andersson.26.f: "Талгайским человеком называют доисторический человеческий череп, найденный в 1884 году работником, ставившим изгородь на станции Талгай близ Аллоры в Квинсленде. Это одно из ранних свидетельств присутствия человека в Австралии. Изначально из-за массивных черт и сильной минерализации его ошибочно приняли за представителя куда более древнего вида гоминид, но последующее радиоуглеродное датирование почвенного карбоната отнесло образец примерно к 13 500 годам назад. Открытие исторически важно тем, что подтвердило: предки австралийских аборигенов жили рядом с вымершей мегафауной, давая важнейшую связь для понимания глубокой истории первых народов континента."
 andersson.31.t: "Неандерталец"
 andersson.31.d: "Исследователь из Боннского университета вместе с коллегой сегодня объявил об открытии вымершего вида ранних людей."
 andersson.31.f: "В середине августа 1856 года итальянские каменотёсы обнаружили несколько фрагментов костей в части долины Неандер, недавно разрушенной добычей известняка. Сначала их небрежно выбросили в щебень, но владельцы карьера Вильгельм Беккерсгоф и Фридрих Вильгельм Пипер заметили находку, велели извлечь 16 более крупных фрагментов и передали их Иоганну Карлу Фульроту для изучения. Узнав о находке из газетных сообщений, боннский анатом Герман Шаафхаузен также исследовал кости и пришёл к тому же выводу, что и Фульрот: это была древняя форма современного человека. В июне 1857 года Фульрот и Шаафхаузен представили находку на общем собрании Общества естественной истории Прусской Рейнской области. Однако специалисты не разделили их интерпретацию. Эта находка, получившая название Неандерталь 1, стала типовым образцом вида Homo neanderthalensis."
 andersson.32.t: "Гибралтарский человек"
 andersson.32.d: "Капитан Эдмунд Флинт сделал почти невероятное открытие близ Гибралтара."
 andersson.32.f: "Гибралтарским человеком, точнее Gibraltar 1, называют прекрасно сохранившийся череп взрослой женщины, найденный в 1848 году капитаном Эдмундом Флинтом в карьере Форбса. Это первое ископаемое неандертальца, обнаруженное современной наукой. Хотя образец был найден за восемь лет до знаменитого открытия в немецкой долине Неандер, его значение как останков особого родственника человека полностью осознали лишь в 1860-х годах, когда название «неандерталец» уже закрепилось. Позднейшие раскопки на этом месте и в соседней пещере Горэма показали, что Гибралтар был одним из последних известных убежищ неандертальцев; некоторые данные указывают, что они могли сохраняться там примерно до 28 000-32 000 лет назад."
 andersson.33.t: "Человек из Спи"
 andersson.33.d: "Рядом со Спи учёные сделали ценное антропологическое открытие, которое как никогда хорошо освещает доисторическую историю Бельгии."
 andersson.33.f: "Человеком из Спи называют два почти полных скелета неандертальцев, обнаруженных в 1886 году археологом Марселем де Пюидтом и геологом Максименом Лоэстом в пещере Бетш-о-Ротш близ Спи в Бельгии. Это открытие стало поворотным моментом в палеоантропологии: останки были найдены в явной связи с мустьерскими каменными орудиями и вымершими животными ледникового периода, окончательно доказав, что неандертальцы были древними доисторическими людьми, а не патологическими современными индивидами. Ископаемые из Спи, отличающиеся массивным телосложением и выраженными надбровными дугами, остаются одними из важнейших образцов для понимания анатомии и поведения поздних европейских неандертальцев; они датируются примерно 36 000-40 000 лет назад."
 andersson.34.t: "Крапинский человек"
 andersson.34.d: "Рядом с Крапиной исследователи обнаружили огромное скопление доисторических человеческих костей, переворачивающее историю всех Балкан."
 andersson.34.f: "Крапинским человеком называют крупную коллекцию примерно из 800 фрагментов ископаемых останков неандертальцев, обнаруженных в 1899-1905 годах палеонтологом Драгутином Горяновичем-Крамбергером в скальном убежище на холме Хушняково в Хорватии. Для своего времени это было прорывное открытие: Горянович-Крамбергер применил стратиграфический анализ и одним из первых использовал рентгеновские лучи, чтобы доказать древность ископаемых и показать, что неандертальцы были непосредственной частью истории человеческой эволюции. Стоянка, датируемая примерно 120 000-130 000 лет назад, остаётся крупнейшей и одной из самых значимых неандертальских находок в мире, предоставляя обширные данные об их физической вариативности, здоровье и возможном ритуальном поведении."
 andersson.35.t: "Галилейский человек"
 andersson.35.d: "Похоже, подтверждается, что Святая земля действительно является одной из древнейших колыбелей человечества: об этом сенсационном открытии теперь стало известно международному научному сообществу."
 andersson.35.f: "Галилейским человеком называют фрагмент черепа, а именно лобную кость, известную как «череп из Зуттие», обнаруженную в 1925 году Фрэнсисом Тервиллом-Петре в пещере Мугарет-эль-Зуттие на территории современного Израиля. Это был первый ископаемый гоминид, когда-либо найденный в Западной Азии, и поначалу он вызвал споры о том, относится ли он к неандертальцам или к ранним современным людям из-за своих уникальных переходных черт. Современная палеоантропология часто классифицирует этот образец, датируемый примерно 200 000-350 000 лет назад, как позднего Homo heidelbergensis или представителя популяции, предковой и для неандертальцев, и для Homo sapiens."
 andersson.41.t: "Гейдельбергский человек"
 andersson.41.d: "Рядом с Гейдельбергом исследователи считают, что нашли «древнейшего немца» в истории."
 andersson.41.f: "Гейдельбергским человеком называют вид Homo heidelbergensis, описанный по ископаемой нижней челюсти, найденной в 1907 году Даниэлем Хартманом в гравийном карьере близ Мауэра в Германии. Этот образец, известный как нижняя челюсть Мауэр 1, датируется примерно 600 000 лет назад и отличается массивным, крепким строением и отсутствием подбородка, хотя его зубы поразительно похожи на зубы современных людей. Сегодня гейдельбергский человек широко признаётся ключевым среднеплейстоценовым предком, который, как считается, был общим прародителем европейских неандертальцев и африканских Homo sapiens."
 andersson.42.t: "Родезийский человек"
 andersson.42.d: "Швейцарский шахтёр Том Звиглаар почти случайно сделал одно из важнейших на сегодняшний день антропологических открытий в Африке."
 andersson.42.f: "Родезийским человеком называют почти полный ископаемый череп, обнаруженный в 1921 году швейцарским шахтёром Томом Звиглааром в свинцово-цинковой шахте Брокен-Хилл в Северной Родезии (ныне Кабве, Замбия). Формально классифицированный как Kabwe 1, этот образец стал первым крупным человеческим ископаемым, найденным в Африке, и примечателен сочетанием примитивных признаков, таких как массивные надбровные дуги, с мозгом современного размера. Недавняя высокоточная датировка указывает возраст около 299 000 лет, помещая череп среди представителей Homo heidelbergensis (или Homo rhodesiensis) и делая его вероятным поздним современником самых ранних появляющихся Homo sapiens."
 andersson.43.t: "Пекинский человек"
 andersson.43.d: "Новое открытие ранних людей близ Пекина укрепляет теорию азиатского происхождения человека."
 andersson.43.f: "Ископаемые, обнаруженные с 1920-х годов близ Чжоукоудяня примерно в 40 км к юго-западу от центра Пекина, называют «пекинским человеком» и относят к роду Homo. В 1927 году Дэвидсон Блэк дал ископаемым находкам, фактически основанным на одном зубе, новое видовое и родовое название Sinanthropus pekinensis Black & Zdansky. В 1940 году Уилфрид Ле Гро Кларк интерпретировал находки - к тому времени уже основанные на нескольких десятках ископаемых - как близкородственные «яванским людям» и, как и их, назвал выбранным Эженом Дюбуа в 1892 году видовым и родовым названием Pithecanthropus erectus. Оригинальные ископаемые были утрачены во время Второй мировой войны."
 andersson.44.t: "Яванский человек"
 andersson.44.d: "В Голландской Ост-Индии врач и анатом Эжен Дюбуа обнаружил ископаемые останки доисторического предка человека, вызвавшие в научном сообществе одновременно восторг и споры."
 andersson.44.f: "Ископаемые, впервые обнаруженные Эженом Дюбуа в 1891 году на берегах реки Соло близ Тринила на Восточной Яве, называют яванским человеком. Согласно современным представлениям, им около миллиона лет. Это были первые ископаемые гоминин, найденные за пределами Европы, и, после неандертальцев, второе свидетельство существования ископаемых родственников анатомически современных людей (Homo sapiens). Находки с Явы сначала называли Anthropopithecus, а позднее Pithecanthropus erectus. Сегодня большинство палеоантропологов относит их к виду Homo erectus, при этом их происхождение иногда подчёркивают, как предлагал Франц Вейденрейх в 1940 году, добавлением подвидового эпитета: Homo erectus javanensis. Спустя более чем 50 лет после находки Дюбуа Ральф фон Кёнигсвальд вспоминал: «Ни одно другое палеонтологическое открытие не производило такой сенсации и не вызывало такого множества противоречивых научных мнений»."
 andersson.51.t: "Таунгский ребёнок"
 andersson.51.d: "Австралиец Раймонд Дарт сделал в Таунге необычайное открытие: голова обезьяноподобного ребёнка указывает на прямохождение. Зубы и мозг также выглядят дочеловеческими. Таунгский ребёнок может быть «недостающим звеном» между людьми и другими приматами."
 andersson.51.f: "Таунгским ребёнком называют ископаемый череп юного гоминина, обнаруженный в 1924 году рабочими каменоломни на известковых разработках в Таунге, Южная Африка, и позднее описанный анатомом Раймондом Дартом. Этот образец стал типовым ископаемым вида Australopithecus africanus и первым случаем, когда термин «обезьяночеловек» был научно применён к двуногому предку человека, найденному в Африке. Хотя научное сообщество, убеждённое в происхождении человечества из Азии или Европы, сперва встретило находку скептически, открытие в итоге сместило фокус палеоантропологии на Африку; возраст ребёнка оценивается примерно в 2,8 миллиона лет."
 andersson.101.t: "Найдена доисторическая пещера"
 andersson.101.d: "После долгих исследований [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('andersson_anthropologist_scope').IsFemale, 'нашла', 'нашёл')] вход в пещеру, где, как [SelectLocalization(SCOPE.sCharacter('andersson_anthropologist_scope').IsFemale, 'она', 'он')] подозревает, могут находиться кости доисторических людей или предков человека."
 andersson.101.f: "Доисторические пещеры часто содержат ископаемые останки людей или дочеловеческих видов, а также другие находки антропологического или археологического характера. Для оценки находок необходимо отправить экспедицию во главе с антропологом. Это исследование может пролить свет на поиски происхождения человечества."
 andersson.101.g: "Эту пещеру следует изучить как можно скорее."
 andersson.201.t: "Поиск гоминид: тип"
 andersson.201.d: "Д-р [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'предложила', 'предложил')] отличную идею: начать эффектные - или хотя бы сколько-нибудь успешные - поиски человеческих ископаемых на территории [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]. Все доступные варианты уже разложены у [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'неё', 'него')] на столе."
 andersson.201.f: "«Господа, настоящим приглашаю всех вас на общее обсуждение известных и гипотетических типов гоминид. Надеюсь, многие из вас придут. Все предложения названий будут помещены в лотерейный барабан и затем выбраны случайным образом. Рассчитываю на вашу креативность!»\n\nС уважением, [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName]"
 andersson.201.g: "Неважно."
 andersson.201.h: "Неоантроп."
 andersson.201.i: "Палеоантроп."
 andersson.201.j: "Питекантроп."
 andersson.201.k: "Австралопитек."
 andersson.211.t: "Поиск гоминид: завершён"
 andersson.211.d: "Антропологическая исследовательская группа успешно завершила работу и теперь везёт результаты в столицу: [ROOT.GetCountry.GetCapital.GetCityHubName]."
 andersson.211.f: "«Надеюсь, мы все чему-то научились, господа! Происхождение человечества остаётся загадкой, но нам хотя бы удалось немного пролить на неё свет. Д-р Джексон сумел сделать выводы о доисторической гигиене зубов по следам износа; д-р Фиттипальди поместил найденные орудия в контекст и выявил нюансы древних техник; а профессор Шабернак наконец-то понял, почему не стоит всё время сидеть на сталагмитах!»\n\nС уважением, [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName]"
 andersson.211.g: "Антропологическое достижение."
 andersson.212.t: "Чудеса в пещере"
 andersson.212.d: "Наш антрополог обнаружил в [SCOPE.sState('andersson_cave_state_scope').GetCustom('RU_SL_PP')] пещеру с настолько потрясающими рисунками, что многие исследователи на родине утверждают: это наверняка подделка, ведь люди на столь примитивной стадии просто неспособны на такое!"
 andersson.212.f: "«Продолжая исследование первой галереи, как раз там, где заканчиваются отложения с костями и раковинами, наблюдатель с изумлением обнаружит множество изображений животных на потолке пещеры. Эти рисунки крупного размера, по-видимому, выполнены чёрной и красной охрой; большинство изображает животных, которые по горбатой форме напоминают бизонов: двое показаны полностью и сбоку, другие лишены головы, а некоторые изображены в непонятных позах. Можно увидеть и целую лань, изображённую очень искусно, а также голову, похожую на голову лошади». - Марселино Санс де Саутуола"
 andersson.212.g: "Сикстинская капелла каменного века!"
 andersson.221.t: "Человек из местности [SCOPE.sState('andersson_cave_state_scope').GetMineHubName]"
 andersson.221.d: "Д-р [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'сделала', 'сделал')] сенсационное открытие! Ископаемые останки раннего человека указывают на поселение возрастом в десятки тысяч лет. Должно быть, это совершенно неизвестный представитель неоантропов."
 andersson.221.f: "Неоантроп - исторический таксономический термин, использовавшийся в антропологии XIX и начала XX века для выделения анатомически современных людей в отличие от более «примитивных» ископаемых гоминид. В рамках линейных эволюционных схем той эпохи термин обозначал финальную стадию человеческого развития и часто противопоставлял современные популяции недавно открытым «палеоантропическим» линиям. Классификация в основном охватывала Homo sapiens, особенно позднеплейстоценовые находки вроде кроманьонца, которого считали прямым предком современных европейцев. В интеллектуальном контексте XIX века понятие неоантропа играло ключевую роль в установлении хронологической границы между «допотопными» вымершими видами, такими как неандертальцы, и появлением современных физических признаков."
 andersson.221.g: "Человек из местности [SCOPE.sState('andersson_cave_state_scope').GetMineHubName]? Мне нравится."
 andersson.222.t: "Человек из местности [SCOPE.sState('andersson_cave_state_scope').GetFarmHubName]"
 andersson.222.d: "Последние исследования д-ра [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] дали сенсационный результат: похоже, в пещере жил ранее неизвестный вид палеоантропов."
 andersson.222.f: "Палеоантроп - устаревшее антропологическое обозначение, применявшееся в XIX и начале XX века к гоминидам среднего и позднего плейстоцена, у которых были более «архаичные» или «примитивные» признаки, чем у современных людей. В иерархиях развития викторианской науки эта категория представляла важную промежуточную эволюционную стадию, соединявшую древнейших обезьяноподобных предков с последующим появлением неоантропов. Чаще всего термин применяли к неандертальцам. Для исследователей XIX века определение палеоантропа было центральным в споре о том, были ли эти вымершие формы прямыми предками современного человека или эволюционным тупиком, вытесненным более совершенными линиями."
 andersson.222.g: "Человек из местности [SCOPE.sState('andersson_cave_state_scope').GetFarmHubName] - звучит неплохо!"
 andersson.223.t: "Человек из города [SCOPE.sState('andersson_cave_state_scope').GetCityHubName]"
 andersson.223.d: "Кости, найденные д-ром [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] во время последней экспедиции, могут быть возрастом в сотни тысяч лет. Если это правда, перед нами питекантроп, каких мы ещё никогда не встречали."
 andersson.223.f: "Питекантроп - важнейшее таксономическое обозначение, буквально означающее «обезьяночеловек», введённое Эрнстом Геккелем и позднее применённое Эженом Дюбуа к его открытию яванского человека в 1891 году (Pithecanthropus erectus). В антропологии XIX века этот термин обозначал предполагаемое «недостающее звено» между нечеловеческими приматами и более развитыми линиями палеоантропов или неоантропов. Изначально классификация основывалась на ископаемых останках, найденных в Индонезии и отличавшихся низким сводом черепа и мощными надбровными дугами; это считалось свидетельством переходной эволюционной стадии. Хотя современная таксономия переклассифицировала эти образцы как Homo erectus, понятие питекантропа исторически важно тем, что дало первые физические доказательства человеческой эволюции за пределами Европы и в гораздо более глубокой хронологической перспективе."
 andersson.223.g: "Человек из города [SCOPE.sState('andersson_cave_state_scope').GetCityHubName]... ладно."
 andersson.224.t: "Австралопитек"
 andersson.224.d: "Последняя находка д-ра [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] лишила [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'её', 'его')] дара речи. Ископаемым, которые [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'откопала', 'откопал')] во время последней экспедиции, должно быть не меньше миллиона лет, а то и больше. Этот австралопитек - он больше обезьяна или всё же человек?"
 andersson.224.f: "Австралопитек - род вымерших гоминид, получивший научную известность после открытия «Таунгского ребёнка» в 1924 году и ставший убедительным звеном между миоценовыми обезьянами и родом Homo. Хотя сам термин был предложен в начале XX века Раймондом Дартом, он воплотил эволюционные предсказания XIX века, показывая существо, сочетавшее двуногое передвижение с относительно небольшим, обезьяньим по размеру мозгом. Для палеоантропологии определение австралопитека сместило предполагаемую «колыбель человечества» в Африку и радикально переориентировало поиски происхождения человека, прежде сосредоточенные на Европе и Азии."
 andersson.224.g: "Скучаю по старым добрым временам, когда мы просто брали случайную деревню и добавляли слово «человек»."
 andersson.231.t: "Тупик?"
 andersson.231.d: "Исследуя антропологическую стоянку в [SCOPE.sState('andersson_cave_site').GetCustom('RU_SL_PP')], группа столкнулась с трудными тропами и узкими пещерными проходами. Как выяснилось, вход в пещеру находился совсем не там, где д-р [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'полагала', 'полагал')]."
 andersson.231.f: "Оказалось, вход в пещеру расположен не на скальном выступе, а почти на 1000 метров ниже. От антропологической стоянки группе предстоит долгий обход - или очень опасный путь."
 andersson.231.g: "Группе придётся идти в обход, нравится ей это или нет."
 andersson.231.h: "Доктору стоит рискнуть и пойти коротким путём!"
 andersson.232.t: "Пещерные рисунки"
 andersson.232.d: "Пещера в [SCOPE.sState('andersson_cave_site').GetCustom('RU_SL_PP')] содержит резные знаки и изображения возрастом в тысячи лет. Однако их смысл и происхождение остаются загадочными."
 andersson.232.f: "С возникновением доисторической археологии и антропологии на основании теории эволюции предполагалось, что люди прежних времён не знали абстрактных понятий. Поэтому художественное выражение исключалось. Это убеждение привело к тому, что при обнаружении пещерных рисунков - самый известный пример даёт Альтамира - их считали подделками. Лишь после того как около 1900 года появлялось всё больше пещерных рисунков, особенно на юго-западе Франции, учёные пришли к выводу, что они должны быть подлинными."
 andersson.232.g: "Наши предки были не так примитивны, как мы думали."
 andersson.233.t: "Плодотворные исследования"
 andersson.233.d: "За последние несколько месяцев [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('andersson_anthropologist_scope').IsFemale, 'углубила', 'углубил')] свои исследования. Теперь [SelectLocalization(SCOPE.sCharacter('andersson_anthropologist_scope').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('andersson_anthropologist_scope').IsFemale, 'каталогизировала', 'каталогизировал')] многочисленные находки в пещере в [SCOPE.sState('andersson_cave_site').GetCustom('RU_SL_PP')] и [SelectLocalization(SCOPE.sCharacter('andersson_anthropologist_scope').IsFemale, 'описала', 'описал')] пещерную систему для будущих поколений."
 andersson.233.f: "Как долго существуют люди, оставалось неясным даже на протяжении значительной части XIX века. Уже в начале столетия многие учёные отказались от представления, что человеческая история насчитывает лишь несколько тысяч лет; но когда Буше де Перт в 1840-х годах ссылался на куда более древние каменные орудия как на доказательство сосуществования людей с вымершими видами млекопитающих, его почти не слушали. Лишь неустанный сбор и обработка доисторических останков вскоре должны были завершить картину, показывающую, что люди ходят по земле значительно дольше, чем предполагалось ранее."
 andersson.233.g: "Это пойдёт исследователю на пользу."
 andersson.233.h: "Это пойдёт на пользу науке."
 andersson.234.t: "Несчастный случай в пещере"
 andersson.234.d: "Во время исследования пещеры в [SCOPE.sState('andersson_cave_site').GetCustom('RU_SL_PP')] произошёл несчастный случай. Ассистент упал вместе с вьючным ослом. Обошлось лишь лёгкими травмами, но оборудование придётся заменить."
 andersson.234.f: "«Хоть раз поработайте с профессионалами!»"
 andersson.234.g: "О нет!"
 andersson.236.t: "Пещерный лабиринт"
 andersson.236.d: "Сбор костей и доисторических останков, сообщает д-р [SCOPE.sCharacter('andersson_anthropologist_scope').GetLastName], задерживается. Несколько значимых открытий откладывают переход к идентификации костей. Это важные, очень важные задержки. На самом деле уже несколько недель между группой и институтом нет никакой переписки. Это может означать только одно."
 andersson.236.f: "Они окончательно заблудились."
 andersson.236.g: "Дураки!"
 andersson.237.t: "Орудия каменного века"
 andersson.237.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('andersson_anthropologist_scope').IsFemale, 'нашла', 'нашёл')] в пещере доисторические каменные орудия, которые могут многое рассказать о прошлом."
 andersson.237.f: "В XIX веке антропологией называли науку, занимавшуюся прежде всего доисторической историей человечества: помимо костных находок сюда относили оружие или орудия так называемого каменного века, который тогда был не столько научным термином, сколько эпохой, воспринимаемой как варварская. Господствовал образ примитивного пещерного человека, а не историческая реальность. Тем не менее поиск всё новых артефактов и останков этого периода давал возможность в будущие годы уточнить эту картину и заложить настоящую доисторическую археологию."
 andersson.237.g: "Изучить орудия."
 andersson.237.h: "Им место в музее!"
 andersson.238.t: "Человеческие кости"
 andersson.238.d: "Наш антрополог нашёл дополнительные кости во время исследования пещеры."
 andersson.238.f: "Принято считать, что в XIX и начале XX века было найдено лишь немного человеческих ископаемых. Это верно только отчасти. Часто случалось так, что ряд находок костей ранних людей просто не распознавали как таковые. Хотя название «неандерталец» происходит от места в долине Неандерталь, кости неандертальцев уже находили несколько раз и раньше. Даже после открытия важные учёные, такие как Рудольф Вирхов, ставили под сомнение его подлинность и возраст. Проблема заключалась не в числе находок, а скорее в их подтверждении как настоящих человеческих останков древних времён."
 andersson.238.g: "Вкуснятина."
 andersson.239.t: "Ассистент находит ископаемые"
 andersson.239.d: "Студент-ассистент сыграл ключевую роль в сохранении антропологической находки в пещере в [SCOPE.sState('andersson_cave_site').GetCustom('RU_SL_PP')]. Однако [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] подчёркивает, что как руководитель исследований именно [SelectLocalization(SCOPE.sCharacter('andersson_anthropologist_scope').IsFemale, 'она', 'он')] отвечает за открытие."
 andersson.239.f: "«Вы помните историю об умном юном афинянине, страдавшем зудом известности? Он обратился к оракулу и спросил: „Что мне сделать, чтобы стать великим человеком?“ Оракул ответил: „Убей одного!“» - Ричард Оуэн."
 andersson.239.g: "Это открытие сделал молодой антрополог."
 andersson.239.h: "Это открытие сделал наш старший антрополог."
 andersson.240.t: "Потерянная корзина"
 andersson.240.d: "Несколько неловкий инцидент задержал начало идентификации костей."
 andersson.240.f: "Когда исследовательская группа закончила сбор и изучала другой участок антропологической стоянки, ведущий исследователь, д-р [SCOPE.sCharacter('andersson_anthropologist_scope').GetLastName], слишком поздно [SelectLocalization(SCOPE.sCharacter('andersson_anthropologist_scope').IsFemale, 'поняла', 'понял')], что собранные кости и артефакты потеряны. Должно быть, экспедиционную корзину с уже найденными антропологическими объектами оставили где-то в стороне. Несколько недель назад."
 andersson.240.g: "Каждая кость ценна."
 andersson.240.h: "Поторопитесь!"
 andersson_conference_anthropologist_double_vote_tt: "Благодаря нашему опытному антропологу у нас #G двойная#! сила голоса."
 andersson_conference_anthropologist_triple_vote_tt: "Благодаря нашему знаменитому антропологу у нас #G тройная#! сила голоса."
 andersson_cave_exploration_decrease_10_tt: "Потерять #R 10#! #V прогресса исследования#!."
 andersson_cave_exploration_decrease_20_tt: "Потерять #R 20#! #V прогресса исследования#!."
 andersson_cave_collection_decrease_10_tt: "Потерять #R 10#! #V прогресса сбора#!."
 andersson_cave_collection_decrease_20_tt: "Потерять #R 20#! #V прогресса сбора#!."
 andersson.301.a: "Выбор типа реконструкции"
 andersson.301.d: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'удалилась', 'удалился')] к своей коллекции костей с несколькими ископаемыми и тщательно [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'разложила', 'разложил')] находки по месту обнаружения и сходству. Похоже, кости складываются в скелет. Но в какой именно?"
 andersson.301.f: "«Головная кость соединена с рёберной,\nРёберная кость соединена с бедренной,\nБедренная кость соединена с тазовой,\nТазовая кость соединена с плечевой.\nПлечевая кость соединена с головной.\nГоловная кость соединена с рёберной»."
 andersson.301.g: "[GetPlayer.GetCustom('andersson_fossil_vero')]."
 andersson.301.h: "[GetPlayer.GetCustom('andersson_fossil_lagoa_santa')]."
 andersson.301.i: "[GetPlayer.GetCustom('andersson_fossil_cro_magnon')]."
 andersson.301.j: "[GetPlayer.GetCustom('andersson_fossil_boskop')]."
 andersson.301.k: "[GetPlayer.GetCustom('andersson_fossil_tianyuan')]."
 andersson.301.l: "[GetPlayer.GetCustom('andersson_fossil_talgai')]."
 andersson.301.m: "[GetPlayer.GetCustom('andersson_fossil_neanderthal')]."
 andersson.301.n: "[GetPlayer.GetCustom('andersson_fossil_gibraltar')]."
 andersson.301.o: "[GetPlayer.GetCustom('andersson_fossil_spy')]."
 andersson.301.p: "[GetPlayer.GetCustom('andersson_fossil_krapina')]."
 andersson.301.q: "[GetPlayer.GetCustom('andersson_fossil_galilee')]."
 andersson.301.r: "[GetPlayer.GetCustom('andersson_fossil_heidelberg')]."
 andersson.301.s: "[GetPlayer.GetCustom('andersson_fossil_rhodesian')]."
