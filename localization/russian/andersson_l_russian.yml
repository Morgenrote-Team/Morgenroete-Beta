 andersson.601.t_neolithic: "Неолитическая эпоха"
 andersson.601.t_mesolithic: "Мезолитическая эпоха"
 andersson.601.t_upper_paleolithic: "Верхний палеолит"
 andersson.601.d: "Д-р [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'завершила', 'завершил')] подготовку живой реконструкции доисторической жизни. Не только студенты и профессора, но и заинтересованные горожане рассматривают скульптуры, чтобы получить представление о жизни в древние времена."
 andersson.601.f_neolithic: "Неолит, или новый каменный век, представляет собой фундаментальное преобразование человеческого существования, связанное с переходом от кочевого собирательства к оседлому земледелию. В эту эпоху люди начали систематически одомашнивать растения и животных, что обеспечило более надёжное снабжение пищей. Этот сдвиг способствовал возникновению постоянных поселений: люди строили прочные жилища из дерева, камня или сырцового кирпича. Появившиеся излишки продовольствия поддерживали более многочисленное население и позволяли возникать специализированному труду, включая гончарство и ткачество. В технологическом отношении этот период определяется использованием шлифованных каменных орудий и развитием социальных иерархий."
 andersson.601.f_mesolithic: "Мезолит, или средний каменный век, был переходной фазой между палеолитом и неолитом. Начавшись после последнего ледникового периода, он определялся потеплением климата и отступлением ледников, что вынуждало человеческие группы приспосабливаться к меняющимся экосистемам. В отличие от предков, люди мезолита использовали микролиты - небольшие сложные кремнёвые пластинки, из которых делали составные орудия вроде зазубренных копий и стрел. Хотя население в основном оставалось кочевым, рост доступности рыбы, лесной дичи и дикорастущих растений обеспечивал большую сезонную устойчивость и позволял использовать временные базовые лагеря."
 andersson.601.f_upper_paleolithic: "Верхний палеолит, или поздний каменный век, отмечает заключительный этап палеолитической эпохи и характеризуется значительным всплеском человеческого творчества и когнитивной сложности. В этот период Homo sapiens развил высокоспециализированную пластинчатую технологию, создавая сложные орудия из кремня, кости и рога. Люди жили как кочевые охотники-собиратели, следуя за большими мигрирующими стадами, такими как северные олени и мамонты, по обширным тундрам. Помимо выживания, эта эпоха особенно примечательна рождением фигуративного искусства и символического выражения. Люди создавали сложные пещерные росписи, изысканные личные украшения и знаменитые фигурки «Венер», что указывает на развитие сложного языка и духовных представлений."
 andersson.601.g: "Великолепно!"
 andersson.64.t: "Кловисские наконечники"
 andersson.64.d: "В Кловисе, штат Нью-Мексико, д-р [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] древнейшие на сегодняшний день следы коренных американцев: наконечники копий значительно старше всего, что исследователи ранее находили на континенте."
 andersson.64.f: "Открытие кловисских наконечников в начале XX века произвело переворот в американской археологии и антропологии. Эти характерные каменные наконечники копий с желобками впервые были идентифицированы в конце 1920-х - начале 1930-х годов близ Кловиса, штат Нью-Мексико. Прорыв произошёл, когда эти орудия нашли в прямой связи с останками вымершей плейстоценовой мегафауны, прежде всего мамонтов. На протяжении десятилетий это открытие служило основой модели «Кловис прежде всего», утверждавшей, что эти специализированные охотники были первыми людьми, проникшими на континент около 13 000 лет назад."
 andersson.64.g: "Это значит, что люди жили в Америке более чем на 10 000 лет дольше, чем считалось раньше!"
 andersson.65.t: "Человек-дракон"
 andersson.65.d: "Во время строительства моста в Харбине рабочий наткнулся на необычный череп. Д-р [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'была немедленно уведомлена', 'был немедленно уведомлен')] и [SelectLocalization(GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'исследовала', 'исследовал')] череп. Первоначальный диагноз поражает: неужели в Китае помимо неандертальцев жил ещё один вид людей?"
 andersson.65.f: "Ископаемый череп, известный как Человек-дракон и обнаруженный в Харбине, Китай, получил название Homo longi. Хотя сам череп был найден ещё в 1933 году, широкую научную известность он приобрёл только в 2021 году. Датируемый как минимум 146 000 лет назад, средним плейстоценом, череп демонстрирует уникальное сочетание примитивных и производных черт. Homo longi отличался массивной черепной коробкой, мощными надбровными дугами и почти квадратными глазницами. Некоторые исследователи утверждают, что эта линия ближе к современным людям (Homo sapiens), чем даже неандертальцы. Сегодня большинство исследователей предполагает, что «Человек-дракон» относился к денисовской популяции."
 andersson.65.g: "Люди-драконы? Насколько они были опасны?"
 andersson.66.t: "Человек флоресский"
 andersson.66.d: "Во время исследовательской поездки на Флорес д-р [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'сделала', 'сделал')] открытие, которое прежде считалось невозможным: окаменелость действительно указывает, что на острове жил отдельный карликовый вид людей!"
 andersson.66.f: "Обнаруженный в 2003 году в пещере Лианг-Буа на острове Флорес в Индонезии, Homo floresiensis представляет собой вымерший вид низкорослых гоминин, живший примерно до 50 000 лет назад. При росте всего около 1,1 метра и объёме мозга примерно 400 кубических сантиметров этот вид получил прозвище «хоббит». Учёные считают, что его малый рост стал результатом островной карликовости - эволюционного процесса, при котором изолированные островные виды уменьшаются из-за ограниченных ресурсов. Несмотря на небольшой мозг, эти люди использовали сложные каменные орудия и охотились на карликовых слонов. Их точное место на человеческом генеалогическом древе остаётся предметом споров: одни теории связывают их с Homo erectus, другие - с ещё более примитивными предками."
 andersson.66.g: "Они жили в пещерах, курили травы и имели волосатые ступни?"
 je_andersson_craniometry: "Краниометрия"
 je_andersson_craniometry_reason: "Д-р [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] на несколько месяцев полностью [SelectLocalization(GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'посвятила', 'посвятил')] себя измерению многочисленных черепов, и мы совершенно уверены, что это абсолютно нормальное научное поведение, из которого никогда не сможет возникнуть совершенно безумная идея."
 je_andersson_craniometry_goal: "Антрополог завершит свои краниометрические исследования через один год."
 andersson.701.t: "Измерения черепов завершены"
 andersson.701.d: "Д-р [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] наконец [SelectLocalization(GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'смогла', 'смог')] расслабиться и несколько месяцев [SelectLocalization(GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'измеряла', 'измерял')], [SelectLocalization(GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'каталогизировала', 'каталогизировал')], [SelectLocalization(GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'записывала', 'записывал')] и [SelectLocalization(GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'сравнивала', 'сравнивал')] сотни голов, делая выводы для дальнейшей антропологической работы. Как же это было приятно!"
 andersson.701.f: "В XIX веке краниометрия - научное измерение черепа - стала одним из главных методов классификации человеческих различий. Её сторонники, такие как Сэмюэл Мортон и Поль Брока, считали, что объём и форма черепа напрямую указывают на интеллект, моральные качества и эволюционный статус. Головной указатель, разработанный Андерсом Ретциусом, использовался для различения «примитивных» и «развитых» популяций. Хотя краниометрию злоупотребляли для легитимации расовой политики, многочисленные находки оказались полезны для изучения человеческих окаменелостей."
 andersson.701.g: "Это было довольно странно."
 andersson.711.t: "Моногенизм против полигенизма"
 andersson.711.d: "Д-р [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] неоднократно [SelectLocalization(GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'наблюдала', 'наблюдал')] в своих исследованиях черепов закономерности, которые не могут быть случайными. Очевидно, у людей нет единого происхождения."
 andersson.711.f: "Спор между моногенизмом и полигенизмом был центральным антропологическим конфликтом XIX века по вопросу происхождения человека. Моногенисты отстаивали единое происхождение (единство человечества), обычно ссылаясь на библейское Творение или позднее - на общее эволюционное происхождение. Они считали, что физические различия между популяциями вызваны факторами среды. Полигенисты, напротив, утверждали, что человеческие расы принадлежат к различным видам с отдельным происхождением. Эту точку зрения часто подкрепляли ранними краниометрическими данными, чтобы доказывать «фиксированные» биологические иерархии."
 andersson.711.g: "Краниометрические исследования не оставляют сомнений!"
 andersson.711.h: "[GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName], должно быть, ошибается; человечество явно имеет только одно происхождение."
 andersson.712.t: "Эволюционизм против диффузионизма"
 andersson.712.d: "Исследуя черепа из Древнего Египта, Рима и культур коренных американцев, д-р [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] вновь и вновь [SelectLocalization(GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'задавалась', 'задавался')] вопросом: существуют ли высшие культуры, из которых всякое развитие распространяется как из центров инноваций, или же все культуры должны проходить стадии от варварства к цивилизации, а многочисленные народы лишь застряли на уровне каменного века?"
 andersson.712.f: "Эволюционисты отстаивали идею однолинейной эволюции. Они считали, что все общества проходят одинаковые стадии - от «дикости» к «цивилизации», - движимые универсальной человеческой психикой и независимыми изобретениями. Диффузионисты, напротив, оспаривали такое внутреннее развитие. Они полагали, что значимые культурные черты и технологии редко изобретались дважды. Вместо этого они утверждали, что идеи возникали в конкретных «культурных центрах» и распространялись по миру через миграцию, торговлю или завоевания."
 andersson.712.g: "Каждая культура проходит переход от каменного века к современности."
 andersson.712.h: "Существует культура, из которой прогресс распространяется концентрическими кругами."
