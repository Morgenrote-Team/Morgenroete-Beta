 je_andersson_hominid_expedition: "Экспедиция за гоминидами"
 je_andersson_hominid_expedition_reason: "#p Экспедиция за гоминидами сейчас проходит в [SCOPE.sState('target').GetCustom('RU_SL_PP')] в [SCOPE.sState('target').GetCountry.GetAltNameNoFlag('RU_CL_PP')].#!\n$mr_divider_for_je$\nПоиск человеческих ископаемых антропологами делится на три этапа: исследование, сбор и идентификация. Во время исследования антрополог ищет в области подходящую антропологическую стоянку. Только после этого начинается сбор ископаемых. Когда найдено достаточно ископаемых, начинается процесс идентификации. Исследование и сбор завершаются событием открытия. В ходе идентификации также может быть определён новый тип гоминид."
 andersson_je_no_subject_anymore_tt: "[GetPlayer.GetName] больше не является сюзереном зависимого государства, в котором проходит экспедиция."
 andersson_hominid_expedition_modifier: "Экспедиция за гоминидами"
 andersson.205.t: "Экспедиция за гоминидами: тип"
 andersson.205.d: "Прежде чем д-р [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] сможет собрать экспедицию, нужно решить, какой вид гоминид станет целью."
 andersson.205.f: "«Эволюция - это теория, система или гипотеза? Она гораздо больше: это общее условие, которому все теории, все гипотезы, все системы должны отныне подчиняться и которому должны удовлетворять, если хотят быть мыслимыми и истинными». - Пьер Тейяр де Шарден"
 andersson.206.t: "Экспедиция за гоминидами: регион"
 andersson.206.d: "Д-р [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] уже [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'велела', 'велел')] ассистентам принести карты зарубежных территорий, куда стоило бы отправить экспедицию. Решение ещё не принято."
 andersson.206.f: "«Я сохранял непредвзятость в вопросе о том, присутствовали ли гоминиды в Европе в раннем плейстоцене». - Луис Лики"
 andersson.213.t: "Экспедиция за гоминидами: завершена"
 andersson.213.d: "После тяжёлой, но плодотворной экспедиции д-р [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] и [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'её', 'его')] группа вернулись живыми и невредимыми. Антропологический институт пополнился несколькими костями."
 andersson.213.f: "Ну вот, с этим покончено... и со мной тоже. - Роберт Брум (о завершении монографии об австралопитеке незадолго до смерти)"
 andersson.225.d: "Д-р [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'сделала', 'сделал')] впечатляющее открытие в пещере в [SCOPE.sCountry('andersson_cave_country_scope').GetAltNameNoFlag('RU_CL_PP')]!"
