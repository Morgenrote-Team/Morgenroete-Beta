l_russian:
 rule_andersson_anthropology_rule: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon! #! Правила антропологии"
 setting_andersson_anthropology_historical_rule: "Исторический"
 setting_andersson_anthropology_historical_rule_desc: "Начиная с исторической даты, будут обнаруживаться ископаемые останки. Останки древних людей, найденные в рамках исторического события, не приносят антропологического престижа. Если страна обнаружит человеческие ископаемые до исторической даты, находка получит общее название по месту обнаружения."
 setting_andersson_anthropology_free_rule: "Свободный"
 setting_andersson_anthropology_free_rule_desc: "С находками человеческих ископаемых не связаны особые исторические события. Все находки получают общее название по месту обнаружения."
 andersson_has_active_anthropologist_tt: "Есть свободный [concept_andersson_anthropologist]."
 andersson.106.t: "Антропологическая группа уезжает"
 andersson.106.d: "После того как антропологическая группа завершила работу, ассистенты-исследователи возвращаются на родину. Найденные ими пещеры теперь доступны и нашим учёным."
 andersson.106.f: "«Никто до нас не спускался в эти глубины; никто не знает, куда мы идём и что видим. Ничто столь странно прекрасное ещё не представало перед нами, и мы невольно задаём друг другу один и тот же вопрос: не сон ли это?» - Чарльз Лайель"
 andersson.106.g: "А ведь это была полезная иностранная помощь."
 andersson_anthropologist_dies_tt: "Запись в дневнике провалится, если [concept_andersson_anthropologist] умрёт."
 je_andersson_reconstruct_prehistoric_skeleton: "Реконструировать доисторический скелет"
 je_andersson_reconstruct_prehistoric_skeleton_reason: "Антропологи реконструируют скелеты на основе своего опыта и особенностей находок. Первый скелет каждого человеческого типа - неоантропа, палеоантропа, питекантропа или австралопитека - дополнительно выставляется в институте и даёт бонус престижа. Антропологи также могут реконструировать все остальные скелеты разных человеческих типов, тем самым накапливая дополнительный антропологический престиж."
