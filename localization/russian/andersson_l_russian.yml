 je_andersson_our_ancestors_reason: "Д-р [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] сейчас готовит в одном из наших университетов выставку по истории человеческой эволюции. Она должна наглядно показать жизнь наших предков и рассказать о них заинтересованной публике."
