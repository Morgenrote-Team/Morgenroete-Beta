 andersson.61.t: "[GetPlayer.GetCustom('andersson_fossil_piltdown')]"
 andersson.61.d: "Двое ведущих антропологов сегодня представили открытие, способное потрясти научный мир: они нашли не кого иного, как первого современного человека, который явно происходил из [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 andersson.61.f: "На заседании Геологического общества Лондона Артур Смит Вудворд и Чарльз Доусон объявили, что фрагменты черепа раннего человека, найденные в гравийном карьере близ деревни Пилтдаун, являются эпохальной находкой. Реконструкция Вудворда, основанная на найденных фрагментах, в целом напоминала череп современного человека, за исключением затылка - области на стыке черепа и позвоночника, размера мозга, составлявшего лишь около двух третей мозга современного человека, а также лишь приблизительно человекоподобных зубов и челюстной кости. Опираясь на высокий научный авторитет Британского музея, Вудворд интерпретировал пилтдаунские находки как недостающее звено между человекообразными обезьянами и людьми. Несмотря на первоначальные сомнения, учёные Музея естественной истории в Лондоне датировали находку возрастом от 200 000 до 500 000 лет. Это делало её значительно древнее неандертальцев. Сообщение об открытии немедленно привлекло огромный интерес как специалистов, так и британской публики. Новость о пилтдаунском открытии стала мировой сенсацией."
 andersson.61.g: "Значит, первый современный человек происходил из [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Совершенно неудивительно!"
 andersson.61.h: "Эта находка крайне сомнительна."
 andersson.62.d: "Д-р [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName], ведущий антрополог нашей страны, сегодня [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'представила', 'представил')] открытие, способное потрясти научный мир: [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] не кого иного, как первого современного человека, который явно происходил из [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 andersson.62.f: "На заседании Антропологического общества города [ROOT.GetCountry.GetCapital.GetCityHubName] [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'объявила', 'объявил')], что фрагменты черепа раннего человека, найденные в гравийном карьере близ деревни [GetPlayer.GetCustom('andersson_fossil_piltdown')], являются эпохальной находкой. Реконструкция [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName], основанная на найденных фрагментах, в целом напоминала череп современного человека, за исключением затылка - области на стыке черепа и позвоночника, размера мозга, составлявшего лишь около двух третей мозга современного человека, а также лишь приблизительно человекоподобных зубов и челюстной кости. Опираясь на высокий научный авторитет музея [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'интерпретировала', 'интерпретировал')] находки, связанные с [GetPlayer.GetCustom('andersson_fossil_piltdown')], как недостающее звено между человекообразными обезьянами и людьми. Несмотря на первоначальные сомнения, учёные Музея естественной истории в городе [ROOT.GetCountry.GetCapital.GetCityHubName] датировали находку возрастом от 200 000 до 500 000 лет. Это делало её значительно древнее неандертальцев. Сообщение об открытии немедленно привлекло огромный интерес как специалистов, так и населения [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Новость об открытии [GetPlayer.GetCustom('andersson_fossil_piltdown')] стала мировой сенсацией."
 andersson.63.t: "Парантроп"
 andersson.63.d: "Во время поездки в Трансвааль школьник передал д-ру [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] несколько ископаемых для изучения. Антрополог немедленно захотел узнать, где мальчик их нашёл. Прибыв на место, [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'смогла', 'смог')] сделать невероятные открытия: они указывают на совершенно неизвестный вид, возможно не предка, а очень дальнего родственника людей."
 andersson.63.f: "Парантроп - род вымерших гоминин, включающий два широко признанных вида: P. robustus и P. boisei. Однако правомерность выделения Paranthropus оспаривается, и иногда его считают синонимом Australopithecus. Они жили примерно от 2,9 до 1,2 млн лет назад, с конца плиоцена до среднего плейстоцена. Для парантропов характерны массивные черепа с выраженным, похожим на гориллий, сагиттальным гребнем по средней линии, что указывает на сильную жевательную мускулатуру, а также широкие травоядные зубы для перетирания пищи. Их связывают с костяными орудиями и спорными ранними свидетельствами использования огня. Обычно они населяли редколесья и сосуществовали с некоторыми ранними видами людей, а именно A. africanus, H. habilis и H. erectus."
 andersson.63.g: "Доктору стоит чаще брать отпуск, если он даёт такие результаты."
 andersson_add_piltdown_fossil_effect_tt: "Получить #G 1#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil', 'особые ископаемые останки человека')]: [GetPlayer.GetCustom('andersson_fossil_piltdown')]."
 andersson_add_paranthropus_fossil_effect_tt: "Получить #G 1#! @andersson_human_fossil! [Concept('concept_andersson_human_fossil', 'особые ископаемые останки человека')]: парантроп."
 andersson.202.a: "Поиск гоминид: место назначения"
 andersson.202.d: "Поиск гоминид, возможно, не так полон приключений, как археологическая экспедиция или тихоокеанская экспедиция, но иногда и он ставит собственные непростые задачи. Д-р [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] уже ждёт начала подробного обследования на предмет человеческих костей. Остаётся вопрос: в каком регионе должна искать группа?"
 andersson.202.f: "«Господа, мы отправляемся в увлекательное путешествие к истокам человечества! Я жду научного любопытства, страстного духа открытия и непоколебимой дисциплины!\n\nP. S. Пожалуйста, оставьте собак дома. Вас это тоже касается, профессор Шабернак!»\n\nС уважением, [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName]"
