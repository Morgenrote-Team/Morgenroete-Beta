 andersson.311.t: "Новый доисторический скелет"
 andersson.311.d: "На публичном мероприятии д-р [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'представила', 'представил')] публике новый доисторический скелет. Научное сообщество приняло реконструкцию к сведению."
 andersson.311.f: "«Ты можешь смотреть вперёд лишь настолько далеко, насколько способен оглянуться назад». - Раймонд Дарт"
 andersson.311.g: "[GetPlayer.GetName] - научная держава мирового уровня!"
 andersson.911.t: "Антропологический конгресс: происхождение современных людей"
 andersson.911.d: "Наша страна примет важнейший конгресс в истории антропологии. Предстоит прояснить один из великих вопросов человечества: вопрос его происхождения. Антропологи со всего мира будут обсуждать, произошло ли это в Европе, Азии или Африке. [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] возглавит дебаты."
 andersson.911.f: "Откуда произошёл человек? Библейская история об изгнании из рая уже содержит ядро этого вопроса: очевидно, человек происходит не из той области, где живёт сегодня. Поэтому в Европе долго считали древние человеческие кости останками людей, погибших во время Всемирного потопа, точно так же как динозавров долго считали животными, которым не нашлось места на ковчеге. С выдвижением теории ледникового периода и последующими геологическими и палеонтологическими исследованиями, показавшими, что Земля значительно старше ожидаемого, интерес к «пещерным людям» вырос. С появлением теории эволюции и открытием доисторических костей возрастом больше нескольких тысяч лет вопрос о месте происхождения современных людей стал особенно острым."
 andersson.911.g: "Где находится колыбель человечества?"
 andersson.912.d: "[SCOPE.sCountry('andersson_congress_host_country').GetName] пригласил[SCOPE.sCountry('andersson_congress_host_country').GetAltNameNoFormatting('RU_CL_END_FEM')] нас на международный научный конгресс. Темой станет происхождение современного человека. Профессор [SCOPE.sCharacter('andersson_anthropologist_scope').GetLastName] [SelectLocalization(SCOPE.sCharacter('andersson_anthropologist_scope').IsFemale, 'получила', 'получил')] тёплое приглашение."
 andersson.914.t: "Современные люди появились в Европе, Азии или Африке?"
 andersson.914.d: "Академический мир разделился на три лагеря. Вопрос о колыбели человечества связан не только с определённой национальной гордостью, но и с дальнейшими тезисами о человеческой эволюции."
 andersson.914.f: "В оживлённых дебатах сторонники трёх лагерей обменялись аргументами. [SCOPE.sCharacter('andersson_europe_defender_scope').GetLastName] [SelectLocalization(SCOPE.sCharacter('andersson_europe_defender_scope').IsFemale, 'выдвинула', 'выдвинул')] Европу, потому что имеющиеся находки показывали наибольший объём мозга у европейских ископаемых. Раз больший мозг предшествовал прямохождению, этот вывод неизбежен. [SCOPE.sCharacter('andersson_asia_defender_scope').GetLastName] [SelectLocalization(SCOPE.sCharacter('andersson_asia_defender_scope').IsFemale, 'поставила', 'поставил')] эту теорию под сомнение. Ископаемые прямоходящих, человекоподобных представителей уже найдены в Азии, а значит мозг развился только после прямохождения. [SCOPE.sCharacter('andersson_africa_defender_scope').GetLastName], в свою очередь, [SelectLocalization(SCOPE.sCharacter('andersson_africa_defender_scope').IsFemale, 'указала', 'указал')], что известные виды обезьян, наиболее близкие к человеку, происходят из Африки, а не из Азии. Как обосновывал создатель теории эволюции, происхождение человечества следовало искать именно там."
 andersson.914.g: "Современные люди развились в Европе."
 andersson.914.h: "Всё указывает на азиатское происхождение."
 andersson.914.i: "Колыбель человечества находится в Африке."
 andersson.915.t: "Уважаемая речь"
 andersson.915.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('andersson_anthropologist_scope').IsFemale, 'прочитала', 'прочитал')] лекцию для собравшихся учёных в [SCOPE.sCountry('andersson_congress_host_country').GetAltNameNoFlag('RU_CL_PP')], вдохновившую и слушателей, и молодых академиков."
 andersson.915.f: "«Земля - колыбель человечества, но нельзя вечно жить в колыбели».\n - Константин Циолковский."
 andersson.915.g: "Профессор [SCOPE.sCharacter('andersson_anthropologist_scope').GetLastName] производит значительное впечатление."
 andersson.916.t: "Ценный вклад в дебаты"
 andersson.916.d: "Блестящая научная лекция профессора [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] расширила горизонты академического мира на научном конгрессе в [SCOPE.sCountry('andersson_congress_host_country').GetAltNameNoFlag('RU_CL_PP')]. Вероятно, она окажет долгосрочное влияние."
 andersson.916.f: "«Он держался весьма странных теорий о множестве вещей. Однажды он даже выступил в Британской ассоциации и заявил, что у обезьян в мозгу есть большой гиппокамп, как и у людей. Сказать такое было ужасно; ведь если это так, что станет с верой, надеждой и любовью бессмертных миллионов? Вам может казаться, что между вами и обезьяной есть другие, более важные различия: умение говорить, создавать машины, отличать добро от зла, произносить молитвы и прочие мелочи такого рода; но это детские фантазии, мой дорогой. Полагаться можно только на великий тест гиппокампа. Если в вашем мозгу есть большой гиппокамп, вы не обезьяна, даже если у вас четыре руки, нет ног, и вы обезьяноподобнее всех обезьян во всех обезьянниках». - Чарльз Кингсли"
 andersson.917.t: "Антропологическое наследие"
 andersson.917.d: "На конгрессе объявили печальную новость: известный антрополог скончался несколькими днями ранее. Его частную коллекцию собираются выставить на аукцион."
 andersson.917.f: "«У этого человека не было ни детей, ни жены, ни друзей, зато было полно старых камней и костей. Какая благословенная жизнь!»"
 andersson.917.g: "Каждая кость ценна для нашей коллекции."
 andersson.917.h: "...но костей у нас достаточно."
 andersson.919.t_europe: "Современные люди происходят из Европы"
 andersson.919.t_asia: "Современные люди происходят из Азии"
 andersson.919.t_africa: "Современные люди происходят из Африки"
 andersson.919.d_europe: "Международная наука согласилась с европейским происхождением современного человечества. Неевропейские учёные осудили это решение как идеологию превосходства."
 andersson.919.d_asia: "Международный антропологический конгресс недавно согласился на компромисс: люди должны происходить из Азии. Большинство участников собрания поддержало эту точку зрения."
 andersson.919.d_africa: "После крайне спорных финальных дебатов учёные смогли с небольшим перевесом согласиться, что происхождение человечества следует искать в Африке."
 andersson.919.f_europe: "Исторически вопрос о действительном месте происхождения человечества не был решён в начале XX века. Небольшая группа, отчасти введённая в заблуждение открытием так называемого пилтдаунского человека, подозревала происхождение современного человека в Европе скорее по идеологическим, чем научным причинам, но теория азиатского происхождения пользовалась наибольшей поддержкой. Открытия на Яве и находка пекинского человека сыграли в этом большую роль. Лишь с середины XX века всё больше африканских находок начало подрывать эту точку зрения."
 andersson.919.f_asia: "Исторически вопрос о действительном месте происхождения человечества не был решён в начале XX века. Небольшая группа, отчасти введённая в заблуждение открытием так называемого пилтдаунского человека, подозревала происхождение современного человека в Европе скорее по идеологическим, чем научным причинам, но теория азиатского происхождения пользовалась наибольшей поддержкой. Открытия на Яве и находка пекинского человека сыграли в этом большую роль. Лишь с середины XX века всё больше африканских находок начало подрывать эту точку зрения."
 andersson.919.f_africa: "Исторически вопрос о действительном месте происхождения человечества не был решён в начале XX века. Небольшая группа, отчасти введённая в заблуждение открытием так называемого пилтдаунского человека, подозревала происхождение современного человека в Европе скорее по идеологическим, чем научным причинам, но теория азиатского происхождения пользовалась наибольшей поддержкой. Открытия на Яве и находка пекинского человека сыграли в этом большую роль. Лишь с середины XX века всё больше африканских находок начало подрывать эту точку зрения."
 andersson.919.g: "Как и ожидалось, человечество развилось в Европе."
 andersson.919.h: "Все свидетельства говорят о том, что человечество развилось в Азии."
 andersson.919.i: "Тезис «из Африки» теперь получил признание."
