 andersson.405.t: "Мегалиты: [SCOPE.sState('andersson_state_scope').GetFarmHubName]"
 andersson.405.d: "Д-р [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'проявила', 'проявил')] большой интерес к мегалитам [SCOPE.sState('andersson_state_scope').GetFarmHubName] и подробно [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'изучила', 'изучил')] их происхождение. Недавно [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'она опубликовала', 'он опубликовал')] свои исследования этих неолитических сооружений - по большей части умозрительные, - чем [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'привлекла', 'привлёк')] внимание антропологического сообщества."
 andersson.405.f: "Мегалитическая культура описывает явление неолитического периода, когда общины между 4500 и 1500 годами до н.э. использовали массивные каменные блоки для строительства монументальных культовых мест и погребальных сооружений. От атлантического побережья до Средиземноморья эти сооружения сформировали первый устойчивый сакральный ландшафт Европы. Их формы варьируются от одиночных менгиров и многокилометровых рядов камней, подобных карнакским, до столообразных дольменов, служивших коллективными погребениями. Особенно сложны круговые хенджи, самый известный из которых, Стоунхендж, демонстрирует точную астрономическую ориентацию. Перевозка и установка мегалитов весом в несколько тонн требовала огромной социальной организации, а также развитых знаний статики и логистики."
 andersson.405.g: "И наши предки действительно построили это 5000 лет назад?"
 andersson.407.t: "Черепа, черепа и ещё больше черепов!"
 andersson.407.d: "Область [SCOPE.sState('andersson_state_scope').GetName] охвачена полным бедствием. Все страдают от масштабных разрушений. Все? Нет! Д-р [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] множество недавних человеческих черепов, которые [SelectLocalization(ROOT.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'она собрала', 'он собрал')] для изучения!"
 andersson.407.f: "«Столько прекрасных черепов для моих краниологических исследований!»"
 andersson.407.g: "Это довольно мрачно."
