 je_andersson_anthropological_research_reason: "[ROOT.GetCountry.GetCustom('je_andersson_anthropological_default_research_active_type')]Свободный [concept_andersson_anthropologist] будет проводить антропологические исследования в своей стране. Иногда он может найти [Concept('concept_andersson_cave', 'пещеру')]. Антропологи, долго занимающиеся исследованием пещер и раскопками, могут получить [Concept('concept_character_trait', 'черту персонажа')] #V $dubois_paleontologist$#! или #V $lepsius_archaeologist$#!, но только одну из двух. Каждый год работы приносит один @andersson_human_fossil! [Concept('concept_andersson_human_fossil', 'образец ископаемых останков человека')].\n\n$mr_divider_for_je$\nАнтропологи также могут находить дополнительные @andersson_human_fossil! [Concept('concept_andersson_human_fossil', 'образцы ископаемых останков человека')] или @andersson_prehistoric_artifact! [Concept('concept_andersson_prehistoric_artifact', 'доисторические артефакты')] в зависимости от следующих факторов:\n[ROOT.GetCountry.GetCustom('je_andersson_anthropological_default_research_anthropologist_paleontologist_trait_type')][ROOT.GetCountry.GetCustom('je_andersson_anthropological_default_research_anthropologist_archaeologist_trait_type')][ROOT.GetCountry.GetCustom('je_andersson_anthropological_default_research_anthropologist_speleologist_trait_type')][ROOT.GetCountry.GetCustom('je_andersson_anthropological_default_research_cave_type')]"
 je_andersson_hominid_prospecting_neoanthropus: "Поиск гоминид: неоантроп"
 je_andersson_hominid_prospecting_neoanthropus_reason: "#p Поиск гоминид сейчас проходит в [SCOPE.sState('target').GetCustom('RU_SL_PP')].#!\n$mr_divider_for_je$\nПоиск человеческих ископаемых антропологами делится на три этапа: исследование, сбор и идентификация. Во время исследования антрополог ищет в области подходящую антропологическую стоянку. Только после этого начинается сбор ископаемых. Когда найдено достаточно ископаемых, начинается процесс идентификации. Исследование и сбор завершаются событием открытия. В ходе идентификации также может быть определён новый тип гоминид.\n\n$mr_divider_for_je$\n[GetGeographicRegion('andersson_geographic_region_neoanthropus').GetName] - глобально распространённый вид. Традиционно к этой категории относят следующие типы:\n- [GetGeographicRegion('andersson_geographic_region_vero').GetName]\n- [GetGeographicRegion('andersson_geographic_region_lagoa_santa').GetName]\n- [GetGeographicRegion('andersson_geographic_region_cro_magnon').GetName]\n- [GetGeographicRegion('andersson_geographic_region_boskop').GetName]\n- [GetGeographicRegion('andersson_geographic_region_tianyuan').GetName]\n- [GetGeographicRegion('andersson_geographic_region_talgai').GetName]"
 je_andersson_hominid_prospecting_palaeanthropus: "Поиск гоминид: палеоантроп"
 je_andersson_hominid_prospecting_palaeanthropus_reason: "#p Поиск гоминид сейчас проходит в [SCOPE.sState('target').GetCustom('RU_SL_PP')].#!\n$mr_divider_for_je$\nПоиск человеческих ископаемых антропологами делится на три этапа: исследование, сбор и идентификация. Во время исследования антрополог ищет в области подходящую антропологическую стоянку. Только после этого начинается сбор ископаемых. Когда найдено достаточно ископаемых, начинается процесс идентификации. Исследование и сбор завершаются событием открытия. В ходе идентификации также может быть определён новый тип гоминид.\n\n$mr_divider_for_je$\n[GetGeographicRegion('andersson_geographic_region_palaeanthropus').GetName] встречается в Европе и на Ближнем Востоке. Традиционно к этой категории относят следующие типы:\n- [GetGeographicRegion('andersson_geographic_region_neanderthal').GetName]\n- [GetGeographicRegion('andersson_geographic_region_gibraltar').GetName]\n- [GetGeographicRegion('andersson_geographic_region_spy').GetName]\n- [GetGeographicRegion('andersson_geographic_region_krapina').GetName]\n- [GetGeographicRegion('andersson_geographic_region_galilee').GetName]"
 je_andersson_hominid_prospecting_pithecanthropus: "Поиск гоминид: питекантроп"
 je_andersson_hominid_prospecting_pithecanthropus_reason: "#p Поиск гоминид сейчас проходит в [SCOPE.sState('target').GetCustom('RU_SL_PP')].#!\n$mr_divider_for_je$\nПоиск человеческих ископаемых антропологами делится на три этапа: исследование, сбор и идентификация. Во время исследования антрополог ищет в области подходящую антропологическую стоянку. Только после этого начинается сбор ископаемых. Когда найдено достаточно ископаемых, начинается процесс идентификации. Исследование и сбор завершаются событием открытия. В ходе идентификации также может быть определён новый тип гоминид.\n\n$mr_divider_for_je$\n[GetGeographicRegion('andersson_geographic_region_pithecanthropus').GetName] встречается в Европе, Африке и Азии. Традиционно к этой категории относят следующие типы:\n- [GetGeographicRegion('andersson_geographic_region_heidelberg').GetName]\n- [GetGeographicRegion('andersson_geographic_region_rhodesian').GetName]\n- [GetGeographicRegion('andersson_geographic_region_peking').GetName]\n- [GetGeographicRegion('andersson_geographic_region_java').GetName]"
 je_andersson_hominid_prospecting_australopithecus: "Поиск гоминид: австралопитек"
 je_andersson_hominid_prospecting_australopithecus_reason: "#p Поиск гоминид сейчас проходит в [SCOPE.sState('target').GetCustom('RU_SL_PP')].#!\n$mr_divider_for_je$\nПоиск человеческих ископаемых антропологами делится на три этапа: исследование, сбор и идентификация. Во время исследования антрополог ищет в области подходящую антропологическую стоянку. Только после этого начинается сбор ископаемых. Когда найдено достаточно ископаемых, начинается процесс идентификации. Исследование и сбор завершаются событием открытия. В ходе идентификации также может быть определён новый тип гоминид.\n\n$mr_divider_for_je$\n[GetGeographicRegion('andersson_geographic_region_australopithecus').GetName] встречается в Африке."
 je_andersson_cave_exploration: "Исследование пещеры"
 je_andersson_cave_exploration_reason: "#p В настоящее время в области [SCOPE.sState('target').GetName] идёт исследование пещеры.#!\n$mr_divider_for_je$\nИсследование пещер полностью опирается на спелеологические изыскания. Поэтому опытные антропологи могут исследовать пещеры быстрее. Какие тайны может скрывать пещера в области [SCOPE.sState('target').GetNameNoFormatting]?"
