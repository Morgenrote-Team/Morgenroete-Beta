 andersson_piltdown_debate_won_modifier: "[GetPlayer.GetCustom('andersson_fossil_piltdown')]: дебаты выиграны"
 andersson_piltdown_debate_lost_modifier: "[GetPlayer.GetCustom('andersson_fossil_piltdown')]: дебаты проиграны"
 andersson.501.t: "[GetPlayer.GetCustom('andersson_fossil_piltdown')] - подделка!"
 andersson.501.d: "После тщательного расследования д-ра [SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetLastName] [SelectLocalization(SCOPE.sCharacter('andersson_piltdown_attacker_scope').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('andersson_piltdown_attacker_scope').IsFemale, 'доказала', 'доказал')], что предполагаемые человеческие останки являются фальшивкой. Это огромный конфуз для страны-первооткрывателя ([GetGlobalVariable('andersson_piltdown_country_global_var').GetCountryDefinition.GetName]). Главный антрополог [SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetAltNameNoFlag('RU_CL_RP')], д-р [SCOPE.sCharacter('andersson_piltdown_defender_scope').GetLastName], [SelectLocalization(SCOPE.sCharacter('andersson_piltdown_defender_scope').IsFemale, 'разоблачена', 'разоблачён')] как [SelectLocalization(SCOPE.sCharacter('andersson_piltdown_defender_scope').IsFemale, 'шарлатанка', 'шарлатан')]!"
 andersson.501.f: "С момента открытия [GetPlayer.GetCustom('andersson_fossil_piltdown')] несколько учёных не из [SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetAltNameNoFlag('RU_CL_RP')] выражали серьёзные сомнения в его подлинности и скорее объясняли «открытие» потребностью [SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetAltNameNoFlag('RU_CL_RP')] в признании. Несколько попыток уважаемых академиков доказать подделку до сих пор не увенчались успехом. Но [SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetFullName] наконец-то [SelectLocalization(SCOPE.sCharacter('andersson_piltdown_attacker_scope').IsFemale, 'показала', 'показал')] миру, чем на самом деле является эта находка: величайшей мистификацией в истории антропологии. Череп не только оказался гораздо более поздним, чем утверждалось, и происходил всего лишь из Средневековья; фальсификатор соединил верхнюю часть человеческого черепа с челюстями орангутана."
 andersson.501.g: "В конце концов серьёзная наука побеждает."
 andersson.502.t: "Научная катастрофа!"
 andersson.502.g: "Международный позор без всяких сравнений!"
 andersson.503.t: "Дебаты проиграны"
 andersson.503.d: "Несмотря на многочисленные аргументы, д-р [SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetLastName] в итоге не [SelectLocalization(SCOPE.sCharacter('andersson_piltdown_attacker_scope').IsFemale, 'смогла', 'смог')] убедить академический мир, что [GetPlayer.GetCustom('andersson_fossil_piltdown')] на самом деле является подделкой. Д-р [SCOPE.sCharacter('andersson_piltdown_defender_scope').GetLastName] блестяще [SelectLocalization(SCOPE.sCharacter('andersson_piltdown_defender_scope').IsFemale, 'выступила', 'выступил')] на дебатах."
 andersson.503.f: "Судя по всему, в день дебатов у учёного из [SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetAltNameNoFlag('RU_CL_RP')] всё ещё было несколько козырей в рукаве. Наш антрополог винит в провале предвзятость, взятки и плохой завтрак."
 andersson.503.g: "Может, находка всё-таки настоящая...?"
 andersson.504.t: "Научный триумф"
 andersson.504.d: "Попытка незначительного учёного из ещё более незначительной страны разоблачить нашу ценнейшую находку «[GetPlayer.GetCustom('andersson_fossil_piltdown')]» как подделку провалилась. Антропологический институт выходит из этого спора окрепшим."
 andersson.504.f: "Совершенно очевидно, что современный человек должен был появиться в [SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetAltNameNoFlag('RU_CL_PP')], если всё, что могут предложить иностранные страны, - это такие глупые аргументы."
 andersson.504.g: "Следующий, пожалуйста!"
 andersson.511.t: "[GetPlayer.GetCustom('andersson_fossil_piltdown')]: подготовка к дебатам"
 andersson.511.d: "Д-р [SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetLastName] готовится разоблачить важное ископаемое как подделку. [SelectLocalization(SCOPE.sCharacter('andersson_piltdown_attacker_scope').IsFemale, 'Ей', 'Ему')] будет противостоять д-р [SCOPE.sCharacter('andersson_piltdown_defender_scope').GetLastName]. Оба защищают свою честь и честь своей страны."
 andersson.511.f: "Сила антрополога в дебатах зависит прежде всего от опыта, а во вторую очередь - от черт характера. Есть и небольшая доля случайности, поскольку учитываются ежедневные колебания формы. Страна, владеющая ископаемым, получает небольшое преимущество, ведь новой теории ещё нужно одержать верх над устоявшейся. Антрополог с более высоким показателем силы в дебатах побеждает. При равенстве очков также побеждает защитник.\n\n[SCOPE.sCharacter('andersson_piltdown_attacker_scope').GetFullNameNoFormatting] из [SCOPE.sCountry('andersson_piltdown_attacker_country_scope').GetAltNameNoFlag('RU_CL_RP')]: [SCOPE.GetValue('andersson_piltdown_attacker_points_scope')|0+] #V силы в дебатах#!\n\n[SCOPE.sCharacter('andersson_piltdown_defender_scope').GetFullNameNoFormatting] из [SCOPE.sCountry('andersson_piltdown_defender_country_scope').GetAltNameNoFlag('RU_CL_RP')]: [SCOPE.GetValue('andersson_piltdown_defender_points_scope')|0+] #V силы в дебатах#!"
 andersson.511.g: "Пусть [GetGlobalVariable('andersson_piltdown_country_global_var').GetCountryDefinition.GetName] выступит в публичных научных дебатах!"
 andersson.511.h: "Если подумать, это не кажется хорошей идеей."
