 andersson.801.t: "Человек разумный"
 andersson.801.d: "Д-р [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'прояснила', 'прояснил')] путаницу вокруг различных типов так называемых неоантропов и в итоге [SelectLocalization(GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'пришла', 'пришёл')] к выводу, что все они являются лишь вариантами одного вида: Homo sapiens."
 andersson.801.f: "Переход от неоантропа к Homo sapiens стал важнейшим сдвигом в палеоантропологии XX века. Термин «неоантроп», ставший популярным в 1920-1950-е годы, обозначал типологическую категорию, призванную отличать современных людей от архаичных линий, например неандертальцев. Он занимал центральное место в ныне устаревшей «пресапиентной теории». В период современного эволюционного синтеза 1950-х годов эволюционные биологи, прежде всего Эрнст Майр, стали настаивать на строгой популяционной таксономии. Они выступали против умножения избыточных родовых названий и призывали вернуться к линнеевскому обозначению Homo sapiens (1758). Эта переклассификация заменила жёсткие морфологические «типы» единым биологическим понятием вида. В результате понятие неоантропа было оставлено, а все современные люди были объединены в один таксон, подчёркивающий эволюционную преемственность."
 andersson.801.g: "Антропология выходит из младенчества."
 andersson.802.t: "Человек неандертальский"
 andersson.802.d: "Д-р [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'прояснила', 'прояснил')] путаницу вокруг различных типов так называемых палеоантропов и в итоге [SelectLocalization(GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'пришла', 'пришёл')] к выводу, что все они являются лишь вариантами одного вида: Homo neanderthalensis."
 andersson.802.f: "Переход от палеоантропа к Homo neanderthalensis отражает консолидацию таксономии гоминид в середине XX века. Первоначально палеоантроп, или «древний человек», служил широкой категорией для архаичных людей, прежде всего неандертальцев, и отделял их от современных линий. Эта терминология отражала типологическое мышление начала XX века, где архаичные формы часто рассматривались как отдельные линейные «эволюционные стадии». В период современного эволюционного синтеза 1940-1950-х годов учёные вроде Эрнста Майра выступали за единую классификацию в рамках рода Homo. Расплывчатое понятие палеоантропа было отброшено в пользу Homo neanderthalensis или Homo sapiens neanderthalensis, а неандертальцев стали рассматривать как биологическую популяцию, а не как отдельный «примитивный» тип. Этот сдвиг подчеркнул эволюционную преемственность и заложил современную схему, в которой неандертальцы признаются специализированной сестринской линией современных людей."
 andersson.803.t: "Человек прямоходящий"
 andersson.803.d: "Д-р [GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'прояснила', 'прояснил')] путаницу вокруг различных типов так называемых питекантропов и в итоге [SelectLocalization(GetPlayer.MakeScope.Var('andersson_anthropologist_var').GetCharacter.IsFemale, 'пришла', 'пришёл')] к выводу, что все они являются лишь вариантами одного вида: Homo erectus."
 andersson.803.f: "Переход от питекантропа к Homo erectus представляет собой объединение разнообразных региональных ископаемых находок в единый глобальный вид. Первоначально этот термин был предложен Эженом Дюбуа в 1891 году для его открытия «яванского человека»; питекантроп, или «обезьяночеловек», должен был обозначать «недостающее звено» между нечеловеческими приматами и современными людьми. В начале XX века различные названия вроде Sinanthropus, или «пекинский человек», ещё больше загромождали таксономию гоминид. Окончательный сдвиг произошёл в период современного эволюционного синтеза около 1950 года под влиянием Эрнста Майра. Майр утверждал, что анатомические различия между азиатскими и африканскими образцами являются популяционными, а не родовыми различиями. Переклассифицировав эти ископаемые останки как Homo erectus, учёные перешли от типологической охоты за «звеньями» к единому биологическому понятию вида и признали широко распространённого, хорошо приспособляемого предка в составе рода Homo."
 andersson_institute_can_construct_only_institute_tt: "У нас ещё нет Института антропологии и этнологии."
