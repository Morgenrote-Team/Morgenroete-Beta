 artists.2007.t: "Центр реализма"
 artists.2007.d: "[SCOPE.sState('elgar_culture_capital').GetCityHubName] превращается в центр реалистического стиля в искусстве. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'сыграла', 'сыграл')] в этом значительную роль и теперь считается ведущей фигурой реалистической школы живописи."
 artists.2007.f: "В истории искусства реализм относится к новой концепции искусства, которая зародилась в Европе в середине XIX века и была направлена против представлений классицизма и романтизма. В искусстве реализм пытается воссоздать реальность как можно точнее. Присвоение художником реальности и её последующее преобразование в произведение искусства, а также его политические коннотации характерны для реализма. Он продвигает повседневность и объективность. Его самым известным представителем был французский художник Гюстав Курбе, который присвоил термин «реалистическое искусство» и использовал его для своего творчества из-за его провокационного эффекта."
 artists.2007.g: "Но можно ли найти истинную красоту в реальности?"
 artists.2008.t: "Центр иррационализма"
 artists.2008.d: "Создание фестивального зала [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] считается одним из ярчайших событий музыкальной культуры XIX века."
 artists.2008.f: "Фестиваль в [SCOPE.sState('elgar_culture_capital').GetCityHubName] — это ежегодный музыкальный фестиваль, на котором представляются оперы композитора XIX века [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName]. [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] сам[SelectLocalization(GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.IsFemale, 'а', '')] задумал[SelectLocalization(GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.IsFemale, 'а', '')] и продвигал[SelectLocalization(GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.IsFemale, 'а', '')] идею специального фестиваля для демонстрации собственных произведений, в частности, своего монументального цикла «Кольцо нибелунга» и «Парсифаля». Спектакли проходят в специально спроектированном театре — Фестивальном доме в [SCOPE.sState('elgar_culture_capital').GetCityHubName]. [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] лично курировал[SelectLocalization(GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.IsFemale, 'а', '')] проектирование и строительство театра, который содержал множество архитектурных новшеств для размещения огромных оркестров, для которых писал [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName], а также для воплощения особого видения композитора о постановке его произведений. Фестиваль стал местом паломничества для любителей классической музыки."
 artists.2008.g: "Вершина культуры #tooltippable_name [GetPlayer.GetDefinition.GetPrimaryCulture.GetAdjective]ого#! народа!"
 artists.2011.t: "Fin de siècle"
 artists.2011.d: "С началом нового века определённость исчезает, а неопределённость растёт. Это относится и к искусству. Импрессионизм, некогда сам бывший новшеством, уступает место новым художественным течениям. Результаты всё ещё совершенно непредсказуемы — как и то, каких деятелей искусства породит этот отход от старого."
 artists.2011.f: "Fin de Siècle, также известный как «декаданс», относится к художественным тенденциям и мироощущению последних двух десятилетий XIX века и, в более широком смысле, параллельно с Прекрасной эпохой до начала Первой мировой войны. Термин указывает на то, что это было культурное движение, сделавшее своим объектом культурный упадок. Время характеризовалось колебаниями между духом оптимизма, эйфорией по поводу будущего, смутным страхом перед будущим и регрессом, апокалиптическими настроениями, усталостью от жизни, мировой скорбью, очарованием смерти и бренности, беззаботностью, фривольностью и декадансом. Общий кризис охватил ведущие социальные классы, поскольку основные ценности общественной жизни оказались под угрозой. Чувство бессилия стало характерным для интеллектуалов, художников и писателей, потому что они чувствовали себя одновременно притянутыми и отторгнутыми перед лицом столичного общества, с одной стороны, управляемого законами рынка и анонимными массами, а с другой — миром, всё более характеризующимся естественными науками и технологиями. Они бежали в эстетические контрмиры."
 artists.2011.g: "Музыка — королева искусств."
 artists.2011.h: "Живопись — наша сильная сторона."
 artists.2011.i: "Мы полностью посвящаем себя литературе."
 artists.2012.d: "С началом нового века определённость исчезает, а неопределённость растёт. Это относится и к искусству. Экспрессионизм, некогда сам бывший новшеством, уступает место новым художественным течениям. Результаты всё ещё совершенно непредсказуемы — как и то, каких деятелей искусства породит этот отход от старого."
 artists.2013.d: "С началом нового века определённость исчезает, а неопределённость растёт. Это относится и к искусству. Ар-нуво, некогда сам бывший новшеством, уступает место новым художественным течениям. Результаты всё ещё совершенно непредсказуемы — как и то, каких деятелей искусства породит этот отход от старого."
