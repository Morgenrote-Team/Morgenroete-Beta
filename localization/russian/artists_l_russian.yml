 je_artists_realism: "Салон искусств"
 je_artists_realism_reason: "Реализм как вид искусства приобретает все большую популярность. Художники в разных странах уже привержены этой новой школе. Однако реализму по-прежнему не хватает своего собственного, реального центра. Отвращение традиционной художественной элиты к новому стилю привело к тому, что он до сих пор оставался явлением за пределами академии. Нам нужна наша собственная художественная академия, где преподают этот стиль, с галереей, где реалистическая живопись найдет свое место, и, конечно же, [Concept('concept_klimt_painter', 'художник')], который будет образцовой фигурой реализма в нашей стране. Учреждение художественного салона также позволит нам организовывать конкурсы живописи."
 je_artists_realism_success: "Нам нужно #G 250#! @klimt_painting_tradition! [Concept('concept_klimt_painting_tradition', 'традиции живописи')]."
 je_artists_realism_goal: ""
 je_artists_realism_trigger: "[Concept('concept_artists_center_of_arts', 'Центр искусств')] стиля реализма #G не существует#!."
 je_artists_realism_fail: "[Concept('concept_artists_center_of_arts', 'Центр искусств')] стиля реализма #R существует#!."
 je_artists_irrationalism: "Музыкальный фестиваль"
 je_artists_irrationalism_reason: "Формируется новая, революционная форма музыки, которая позиционирует себя как \"тотальное произведение искусства\". Только выдающийся композитор может породить эту форму музыки. Только эта музыка могла бы звучать в собственном фестивальном зале и стать местом паломничества международных любителей музыки: это был бы центр иррационализма! Создание музыкального фестиваля также позволит нам организовывать музыкальные конкурсы."
 je_artists_irrationalism_success: "Нам нужно #G 500#! @elgar_music_tradition! [Concept('concept_elgar_musical_tradition', 'музыкальной традиции')]"
 je_artists_irrationalism_goal: ""
