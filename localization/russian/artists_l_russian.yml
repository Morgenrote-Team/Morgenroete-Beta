 artists.2007.t: "Центр реализма"
 artists.2007.d: "[SCOPE.sState('elgar_culture_capital').GetCityHubName] становится центром художественного стиля реализм. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] сыграл значительную роль в этом и теперь считается ведущей фигурой реалистической школы живописи."
 artists.2007.f: "В истории искусства реализм относится к новой концепции искусства, зародившейся в Европе в середине XIX века и направленной против представлений классицизма и романтизма. В искусстве реализм стремится воссоздать реальность настолько точно, насколько это возможно. Присваивание художником реальности и ее последующее превращение в произведение искусства, а также ее политический подтекст характерны для реализма. Он способствует повседневности и объективности. Его наиболее известным представителем был французский художник Гюстав Курбе, который присвоил себе термин \"реалистическое искусство\" и использовал его в своих работах из-за его провокационного эффекта."
 artists.2007.g: "Но можете ли вы найти истинную красоту в реальности?"
 artists.2008.t: "Центр иррационализма"
 artists.2008.d: "Создание Фестивального зала [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName] считается одним из самых ярких представителей музыкальной культуры XIX века."
 artists.2008.f: "Фестиваль [SCOPE.sState('elgar_culture_capital').GetCityHubName] — музыкальный фестиваль, проводимый ежегодно, на котором исполняются оперы композитора XIX века. [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetFullName]. [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] принадлежит идея проведения специального фестиваля, на котором будут представлены собственные работы, в частности, монументальные циклы \"Кольцо Нибелунга\" и \"Парсифаль\". Спектакли проходят в специально спроектированном театре,  [SCOPE.sState('elgar_culture_capital').GetCityHubName] Фестшпильхаус. [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] лично сопровождает проектирование и строительство театра, который содержал множество архитектурных новшеств для размещения огромных оркестров, для которых  [GetPlayer.MakeScope.Var('elgar_composer_var').GetCharacter.GetLastName] написал также особое видение композитора по поводу постановки произведений. Фестиваль стал местом паломничества любителей классической музыки."
 artists.2008.g: "Вершина [GetPlayer.GetDefinition.GetPrimaryCulture.GetName] культуры!"
 artists.2011.t: "Конец века"
 artists.2011.d: "С началом нового столетия определенность исчезает, а неопределенность возрастает. Это относится и к искусству. Импрессионизм, который сам по себе был инновацией, освобождает место для новых художественных течений. Результаты все еще остаются полностью открытыми, а также то, каких художников это направление породит."
 artists.2011.f: "Конец века, также известный как \"декаданс\", относится к художественным тенденциям и отношению к жизни последних двух десятилетий XIX века и, в более широком смысле, параллелен Прекрасной эпохе вплоть до начала Первой мировой войны. Этот термин относится к тому факту, что это было культурное движение, которое сделало своим объектом культурный упадок. То время характеризовалось колебаниями между духом оптимизма, эйфорией по поводу будущего, рассеянным страхом перед будущим и регрессом, апокалиптическим настроением, усталостью от жизни, усталостью от мира, очарованием смертью и быстротечностью, беззаботностью, фривольностью и декадансом. Всеобщий кризис охватил ведущие социальные классы, поскольку основные ценности общественной жизни оказались под угрозой. Чувство бессилия стало характерным для интеллектуалов, художников и писателей, потому что они испытывали притяжение и отвращение перед лицом мегаполисного общества, в котором, с одной стороны, доминируют законы рынка и анонимные массы, а с другой - мир, для которого все больше характерны естественные науки и технологии. Они бежали в эстетические противоположные миры."
 artists.2011.g: "Музыка - королева искусств."
 artists.2011.h: "Живопись - это наша сила."
 artists.2011.i: "Мы полностью посвящаем себя литературе."
 artists.2012.d: "С началом нового столетия определенность исчезает, а неопределенность возрастает. Это относится и к искусству. Экспрессионизм, который сам по себе был инновацией, освобождает место для новых художественных течений. Результаты все еще остаются полностью открытыми, а также то, каких художников это направление породит."
 artists.2013.d: "С началом нового столетия определенность исчезает, а неопределенность возрастает. Это относится и к искусству. Модерн, который сам по себе был инновацией, освобождает место для новых художественных течений. Результаты все еще остаются полностью открытыми, а также то, каких художников это направление породит."
