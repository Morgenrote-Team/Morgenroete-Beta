 artists.101.t: "[ROOT.Var('elgar_composer_var').GetCharacter.GetFullName] теперь Великий композитор!"
 artists.101.d: "Концерты по всему миру, мелодии, которые все знают, оперы, исполняемые в каждом хорошем оперном театре. После всех этих достижений репутация нашего [Concept('concept_elgar_composer', 'композитора')] [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName] теперь достаточно велика, чтобы [ROOT.Var('elgar_composer_var').GetCharacter.GetHerHim] считали Великим композитором!"
 artists.101.f: ""
 artists.101.g: "Титан музыки!"
 artists.102.t: "[ROOT.Var('manzoni_writer_var').GetCharacter.GetFullName] теперь Великий писатель!"
 artists.102.d: "После публикации множества книг, статей и других литературных произведений, наш [Concept('concept_manzoni_writer', 'писатель')] [ROOT.Var('manzoni_writer_var').GetCharacter.GetFullName] теперь достаточно знаменит, чтобы считаться Великим писателем!"
 artists.102.f: ""
 artists.102.g: "Гигант литературы!"
 artists.103.t: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] теперь Великий художник!"
 artists.103.d: "После создания множества произведений искусства, включая множество картин, наш [Concept('concept_klimt_painter', 'художник')] [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] теперь достаточно знаменит, чтобы считаться Великим художником!"
