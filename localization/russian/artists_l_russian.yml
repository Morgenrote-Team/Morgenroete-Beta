 je_artists_impressionism: "Импрессионизм"
 je_artists_impressionism_reason: "[concept_elgar_impressionism|l] — это стиль в истории искусства, характеризующийся атмосферным изображением мимолётных моментов. Он возник из движения в живописи во Франции во второй половине XIX века. Термин «импрессионизм» также применялся к определённым стилям в музыке, литературе, кино и фотографии. В то время как многие натуралисты, такие как Генрих Гарт, отвергали музыку как средство выражения «ищущего истину акционизма», импрессионисты часто рассматривали «беспредметное витание в облаках» под тонко градуированные красочные аккорды как удовольствие."
 je_artists_impressionism_success: "Нам нужно #G 850#! ед. @elgar_music_tradition! [Concept('concept_elgar_musical_tradition', 'музыкальных традиций')]."
 je_artists_expressionism: "Экспрессионизм"
 je_artists_expressionism_reason: "[concept_elgar_expressionism|l] — это стиль в искусстве. Его истоки и предшественники можно найти в конце XIX века. Как и импрессионизм, символизм и фовизм, экспрессионизм является движением против тенденций натурализма. В экспрессионизме выразительный уровень преобладает над эстетическим, апеллятивным и фактологическим. Художник хочет представить зрителю свой опыт. В отличие от музыкального импрессионизма, который изображает восприятие внешнего вида вещей, экспрессионистские художественные течения формулируют эмоции человеческой души."
 je_artists_expressionism_success: "Нам нужно #G 850#! ед. @elgar_music_tradition! [Concept('concept_elgar_musical_tradition', 'музыкальных традиций')]."
 je_artists_art_nouveau: "Ар-нуво"
 je_artists_art_nouveau_reason: "[concept_elgar_art_nouveau|l], в Италии также известный как стиль либерти, — это искусствоведческая эпоха на рубеже XIX–XX веков. К течениям, которые можно отнести к ар-нуво, относятся реформстиль (от реформаторского движения), сецессион (от Венского сецессиона), модернизмо в Каталонии, в Швейцарии — еловый стиль, а в США — стиль Тиффани. Помимо выражения «ар-нуво», доминирующего во французском, английском и итальянском языках, в английском также используется Modern Style, а в итальянском — Stile Floreale. По времени ар-нуво относится к fin de siècle."
 je_artists_mass_culture: "Массовая культура"
 je_artists_mass_culture_reason: "«Непонимающая враждебность „массы“ ко всем традициям, представляющим Культуру, острый и холодный ум, который посрамляет мудрость крестьянина, новообретённый натурализм, который в вопросах пола и общества уходит далеко в прошлое к довольно примитивным инстинктам и условиям, возрождение panem et circenses в форме споров о заработной плате и спортивных стадионов — всё это свидетельствует об окончательном закате Культуры и начале совершенно новой фазы человеческого существования». — Освальд Шпенглер, «Закат Европы»."
 je_artists_mass_culture_goal: ""
 je_artists_biennale: "Биеннале"
 je_artists_biennale_reason: "Биеннале — это выставка, которая проводится раз в два года. Её историческим образцом является Венецианская биеннале, которая быстро достигла международной известности и стала меккой для современных художников из всех областей. Деятели искусства со всего мира принесли бы своей родине международное признание и укрепили бы её положение как культурной державы."
 je_artists_biennale_fail_tt: "Мы не сможем организовать биеннале, если другая страна нас опередит."
 artists.1001.t: "Основание биеннале"
 artists.1001.d: "[SCOPE.sState('artists_biennale_city').GetCityHubName] считается отличным местом для проведения международной художественной выставки современных работ. Организаторы начали подготовку к проведению первой биеннале в следующем году."
 artists.1001.f: "После проведения первой биеннале новая будет проходить в нашей стране каждые два года и чествовать нации, преуспевающие в области искусства. Решающим фактором является совокупная репутация всех деятелей искусства нации. Биеннале всегда организует страна, владеющая местом проведения. Если [SCOPE.sState('artists_biennale_city').GetCityHubName] будет завоёван иностранными державами, новые владельцы смогут проводить биеннале."
 artists.1001.g: "Мы подготовим первую биеннале."
 artists.1002.t: "Биеннале в [SCOPE.sState('artists_biennale_city').GetCityHubName] [TimeKeeper.GetCurrentDate.Format('y')] года"
 artists.1002.d: "Биеннале в [SCOPE.sState('artists_biennale_city').GetCityHubName] идёт уже несколько недель. Среди выставляющихся художников уже наметилась тенденция. Фаворитами считаются участники из [SCOPE.sCountry('artists_biennale_first_winner_scope').GetAltNameNoFlag('RU_CL_RP')]. У [SCOPE.sCountry('artists_biennale_second_winner_scope').GetAltNameNoFlag('RU_CL_RP')] и [SCOPE.sCountry('artists_biennale_third_winner_scope').GetAltNameNoFlag('RU_CL_RP')] тоже есть интересные экспонаты, но этого будет недостаточно."
 artists.1002.f: "Венецианская биеннале была основана в 1895 году и в первые десятилетия XX века становилась всё более международной. С 1907 года несколько стран установили на выставке национальные павильоны, первым из которых был бельгийский. В 1910 году были представлены первые всемирно известные художники: зал, посвящённый Густаву Климту, персональная выставка Ренуара, ретроспектива Курбе. Работа Пикассо «Семья комедиантов» была убрана из испанского салона в центральном Палаццо, так как опасались, что её новизна может шокировать публику. К 1914 году было создано семь павильонов: Бельгии (1907), Венгрии (1909), Германии (1909), Великобритании (1909), Франции (1912) и России (1914)."
 artists.1002.g: "Судьи должны встретиться."
 artists.1003.d: "По единогласному решению судей биеннале в [SCOPE.sState('artists_biennale_city').GetCityHubName], наши деятели искусства представили в этом году самые новаторские и качественные экспонаты и являются лидерами в области живописи, литературы и музыки. Поздравляем!"
 artists.1003.f: "[GetPlayer.GetName] без сомнения доминировал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] на биеннале в этом году и занял[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] первое место. Деятели искусства из [SCOPE.sCountry('artists_biennale_second_winner_scope').GetAltNameNoFlag('RU_CL_RP')] завоевали вторую премию, а участники из [SCOPE.sCountry('artists_biennale_third_winner_scope').GetAltNameNoFlag('RU_CL_RP')] также были убедительны."
 artists.1003.g: "Это заря новой культуры."
 artists.2001.t: "Рождение импрессионизма"
 artists.2001.d: "Наша столица [SCOPE.sState('elgar_culture_capital').GetCityHubName] превращается в центр импрессионистического стиля в искусстве."
 artists.2001.f: "[concept_elgar_impressionism|l] — это стиль в истории искусства, характеризующийся атмосферным изображением мимолётных моментов. Он возник из движения в живописи во Франции во второй половине XIX века. Термин «импрессионизм» также применялся к определённым стилям в музыке, литературе, кино и фотографии. В то время как многие натуралисты, такие как Генрих Гарт, отвергали музыку как средство выражения «ищущего истину акционизма», импрессионисты часто рассматривали «беспредметное витание в облаках» под тонко градуированные красочные аккорды как удовольствие."
 artists.2001.g: "Мы — ведущая культурная нация."
 artists.2002.t: "Рождение экспрессионизма"
 artists.2002.d: "Наша столица [SCOPE.sState('elgar_culture_capital').GetCityHubName] превращается в центр экспрессионистического стиля в искусстве."
 artists.2002.f: "[concept_elgar_expressionism|l] — это стиль в искусстве. Его истоки и предшественники можно найти в конце XIX века. Как и импрессионизм, символизм и фовизм, экспрессионизм является движением против тенденций натурализма. В экспрессионизме выразительный уровень преобладает над эстетическим, апеллятивным и фактологическим. Художник хочет представить зрителю свой опыт. В отличие от музыкального импрессионизма, который изображает восприятие внешнего вида вещей, экспрессионистские художественные течения формулируют эмоции человеческой души."
 artists.2003.t: "Рождение ар-нуво"
 artists.2003.d: "Наша столица [SCOPE.sState('elgar_culture_capital').GetCityHubName] превращается в центр стиля ар-нуво в искусстве."
 artists.2003.f: "[concept_elgar_art_nouveau|l], в Италии также известный как стиль либерти, — это искусствоведческая эпоха на рубеже XIX–XX веков. К течениям, которые можно отнести к ар-нуво, относятся реформстиль (от реформаторского движения), сецессион (от Венского сецессиона), модернизмо в Каталонии, в Швейцарии — еловый стиль, а в США — стиль Тиффани. Помимо выражения «ар-нуво», доминирующего во французском, английском и итальянском языках, в английском также используется Modern Style, а в итальянском — Stile Floreale. По времени ар-нуво относится к fin de siècle."
 artists.2004.t: "[concept_elgar_impressionism|l] распространяется"
 artists.2004.d: "Тенденция импрессионизма перекинулась из соседней страны в нашу столицу и стала доминирующим художественным течением."
 artists.2004.g: "Впечатляюще."
