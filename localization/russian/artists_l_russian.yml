 je_artists_irrationalism: "Музыкальный фестиваль"
 je_artists_irrationalism_reason: "Зарождается новая, революционная форма музыки, которая видит себя «тотальным произведением искусства». Родить эту форму музыки предстоит выдающемуся композитору. Эта музыка могла бы исполняться в собственном фестивальном зале и стать местом паломничества для международных любителей музыки: это был бы центр иррационализма! Учреждение музыкального фестиваля также позволит нам организовывать музыкальные конкурсы."
 je_artists_irrationalism_success: "Нам нужно #G 500#! ед. @elgar_music_tradition! [Concept('concept_elgar_musical_tradition', 'музыкальных традиций')]."
