 artists.101.t: "[ROOT.Var('elgar_composer_var').GetCharacter.GetFullName] теперь великий композитор!"
 artists.101.d: "Концерты по всему миру, мелодии, которые знают все, оперы, идущие в каждом хорошем оперном театре. После всех этих достижений репутация нашего [concept_elgar_composer|l] [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName] теперь достаточно велика, чтобы его считали великим композитором!"
 artists.101.f: ""
 artists.101.g: "Титан музыки!"
 artists.102.t: "[ROOT.Var('manzoni_writer_var').GetCharacter.GetFullName] теперь великий писатель!"
 artists.102.d: "После публикации множества книг, статей и других литературных произведений наш [concept_manzoni_writer|l] [ROOT.Var('manzoni_writer_var').GetCharacter.GetFullName] теперь достаточно знаменит, чтобы его считали великим писателем!"
 artists.102.f: ""
 artists.102.g: "Гигант литературы!"
 artists.103.t: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] теперь великий художник!"
 artists.103.d: "После создания множества произведений искусства, включая множество картин, наш [concept_klimt_painter|l] [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] теперь достаточно знаменит, чтобы его считали великим художником!"
