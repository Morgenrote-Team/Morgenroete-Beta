 je_artists_realism: "Салон искусств"
 je_artists_realism_reason: "Реализм как форма искусства набирает всё большую популярность. Художники в разных местах уже привержены этой новой школе. Однако у реализма всё ещё нет своего настоящего центра. Неприязнь традиционной художественной элиты к новому стилю привела к тому, что он до сих пор остаётся явлением вне академии. Нам нужна собственная художественная академия, которая преподавала бы этот стиль, с галереей, где реалистичная живопись найдёт своё место, и, конечно же, [concept_klimt_painter|l], который станет образцом реализма в нашей стране. Создание художественного салона также позволит нам организовывать конкурсы живописи."
 je_artists_realism_success: "Нам нужно #G 250#! ед. @klimt_painting_tradition! [Concept('concept_klimt_painting_tradition', 'художественных традиций')]."
