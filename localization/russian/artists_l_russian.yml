 je_artists_impressionism: "Импрессионизм"
 je_artists_impressionism_reason: "[Concept('concept_elgar_impressionism', 'Импрессионизм')] — это стиль в истории искусства, который характеризуется атмосферным изображением мимолетных сцен. Он возник в результате движения во французской живописи во второй половине XIX века. Термин \"импрессионизм\" также применяется к определенным стилям музыки, литературы, кино и фотографии. В то время как многие натуралисты, такие как Генрих Харт, отвергали музыку как средство выражения \"стремления к истине\", импрессионисты часто рассматривали \"беспредметное мечтание о будущем\" под тонко подобранные красочные аккорды как удовольствие."
 je_artists_impressionism_success: "Нам нужно #G 850#! @elgar_music_tradition! [Concept('concept_elgar_musical_tradition', 'музыкальной традиции')]"
 je_artists_expressionism: "Экспрессионизм"
 je_artists_expressionism_reason: "[Concept('concept_elgar_expressionism', 'Экспрессионизм')] — это стиль в искусстве. Его истоки и предшественники можно найти в конце XIX века. Как и импрессионизм, символизм и фовизм, экспрессионизм - это движение, направленное против тенденций натурализма. В экспрессионизме экспрессивный уровень перевешивает эстетический, апелляционный и фактологический. Художник хочет донести до зрителя свой опыт. В отличие от музыкального импрессионизма, который изображает восприятие внешнего облика вещей, экспрессионистские направления в искусстве формулируют эмоции человеческой души."
 je_artists_expressionism_success: "Нам нужно #G 850#! @elgar_music_tradition! [Concept('concept_elgar_musical_tradition', 'музыкальной традиции')]"
 je_artists_art_nouveau: "Модерн"
 je_artists_art_nouveau_reason: "[Concept('concept_elgar_art_nouveau', 'Модерн')], в основном связанный с Италией, также известной как стилистическая свобода, - это художественно-историческая эпоха на рубеже XIX-XX веков. Течения, которые можно отнести к модерну, - это реформаторский стиль (после реформаторского движения), Сецессионный стиль (после Венского сецессиона), модернизм в Каталонии, в швейцарском стиле Сапен и в американском стиле Тиффани. В дополнение к выражению в стиле модерн, которое преобладает во французском, английском и итальянском языках, стиль модерн также используется в английском языке, а стиль Флореаль-в итальянском. С точки зрения времени, модерн относится к концу века."
 je_artists_mass_culture: "Массовая культура"
 je_artists_mass_culture_reason: "'Массовая' непонимающая враждебность ко всем традициям, представляющим культуру, острый и холодный интеллект, который ставит в тупик мудрость крестьянина, новообретенный натурализм, который по отношению ко всем вопросам секса и общества восходит к довольно примитивным инстинктам и условиям, повторное появление panem et circenses в споры о заработной плате и спортивные стадионы - все это предвещало окончательную гибель культуры и начало совершенно новой фазы человеческого существования.' - Освальд Шпенглер, \"Закат Запада\"."
 je_artists_mass_culture_goal: ""
 je_artists_biennale: "Биеннале"
 je_artists_biennale_reason: "Биеннале - это выставка, которая проводится раз в два года. Ее исторической моделью является Венецианская биеннале, которая быстро завоевала международную известность и стала Меккой для современных художников из всех областей, где они могут соревноваться. Художники со всего мира обеспечили бы своей родине международное признание и укрепили бы ее позиции как культурной державы."
 je_artists_biennale_fail_tt: "Мы не можем организовать биеннале, если другая страна опередит нас."
 artists.1001.t: "Основана Биеннале"
 artists.1001.d: "[SCOPE.sState('artists_biennale_city').GetCityHubName] считается отличным местом для проведения международной художественной выставки современных работ. Организаторы начали подготовку к проведению здесь первой биеннале в следующем году."
 artists.1001.f: "После проведения первой биеннале каждые два года в нашей стране будет проводиться новая биеннале, посвященная нациям, которые преуспели в области искусства. Решающим фактором является общая репутация всех художников в стране. Биеннале всегда организуется страной, которой принадлежит место проведения биеннале. Если [SCOPE.sState('artists_biennale_city').GetCityHubName] аннексируется иностранными державами, новым владельцам будет разрешено проводить биеннале."
 artists.1001.g: "Мы подготовим первую биеннале."
 artists.1002.t: "[SCOPE.sState('artists_biennale_city').GetCityHubName] Биеннале [TimeKeeper.GetCurrentDate.Format('y')] года"
 artists.1002.d: "Биеннале в [SCOPE.sState('artists_biennale_city').GetCityHubName] продолжается уже несколько недель. Среди выставляющихся художников уже намечается тенденция. Экспоненты из [SCOPE.sCountry('artists_biennale_first_winner_scope').GetName] считаются фаворитами. У [SCOPE.sCountry('artists_biennale_second_winner_scope').GetName] и [SCOPE.sCountry('artists_biennale_third_winner_scope').GetName] тоже есть интересные экспонаты, но этого будет недостаточно."
 artists.1002.f: "Венецианская биеннале была учреждена в 1895 году и в первые десятилетия XX века становилась все более международной. Начиная с 1907 года, несколько стран открыли на выставке национальные павильоны, первым из которых стал Бельгийский. В 1910 году были представлены первые работы всемирно известных художников: зал, посвященный Густаву Климту, персональная выставка Ренуара, ретроспектива Курбе. Работа Пикассо \"Семья Салтимбанков\" была убрана из испанского салона в центральном палаццо из-за опасений, что ее новизна может шокировать публику. К 1914 году было создано семь павильонов: Бельгии (1907), Венгрии (1909), Германии (1909), Великобритании (1909), Франции (1912) и России (1914)."
 artists.1002.g: "Судьи должны встретиться."
 artists.1003.d: "После единогласного решения судей [SCOPE.sState('artists_biennale_city').GetCityHubName] биеннале наши художники представили в этом году самые инновационные и качественные экспонаты и являются лидерами в области живописи, литературы и музыки. Поздравляю!"
 artists.1003.f: "[GetPlayer.GetName] блестяще показывает себя на биеннале этого года и занимает первое место. Художники из [SCOPE.sCountry('artists_biennale_second_winner_scope').GetName] выиграли второй приз, а художники из [SCOPE.sCountry('artists_biennale_third_winner_scope').GetName] также были убедительны."
 artists.1003.g: "Это рассвет новой культуры."
 artists.2001.t: "Рождение импрессионизма"
 artists.2001.d: "Наша столица [SCOPE.sState('elgar_culture_capital').GetCityHubName] становится центром художественного стиля импрессионизм."
 artists.2001.f: "[Concept('concept_elgar_impressionism', 'Импрессионизм')] — это стиль в истории искусства, который характеризуется атмосферным изображением мимолетных сцен. Он возник в результате движения во французской живописи во второй половине XIX века. Термин \"импрессионизм\" также применяется к определенным стилям музыки, литературы, кино и фотографии. В то время как многие натуралисты, такие как Генрих Харт, отвергали музыку как средство выражения \"стремления к истине\", импрессионисты часто рассматривали \"беспредметное мечтание о будущем\" под тонко подобранные красочные аккорды как удовольствие."
 artists.2001.g: "Мы — ведущая культурная нация"
 artists.2002.t: "Рождение экспрессионизма"
 artists.2002.d: "Наша столица [SCOPE.sState('elgar_culture_capital').GetCityHubName] становится центром художественного стиля экспрессионизм."
 artists.2002.f: "[Concept('concept_elgar_expressionism', 'Экспрессионизм')] — это стиль в искусстве. Его истоки и предшественники можно найти в конце XIX века. Как и импрессионизм, символизм и фовизм, экспрессионизм - это движение, направленное против тенденций натурализма. В экспрессионизме экспрессивный уровень перевешивает эстетический, апелляционный и фактологический. Художник хочет донести до зрителя свой опыт. В отличие от музыкального импрессионизма, который изображает восприятие внешнего облика вещей, экспрессионистские направления в искусстве формулируют эмоции человеческой души."
 artists.2003.t: "Рождение стиля модерн"
 artists.2003.d: "Наша столица [SCOPE.sState('elgar_culture_capital').GetCityHubName] становится центром художественного стиля модерн."
 artists.2003.f: "[Concept('concept_elgar_art_nouveau', 'Модерн')], в основном связанный с Италией, также известной как стилистическая свобода, - это художественно-историческая эпоха на рубеже XIX-XX веков. Течения, которые можно отнести к модерну, - это реформаторский стиль (после реформаторского движения), Сецессионный стиль (после Венского сецессиона), модернизм в Каталонии, в швейцарском стиле Сапен и в американском стиле Тиффани. В дополнение к выражению в стиле модерн, которое преобладает во французском, английском и итальянском языках, стиль модерн также используется в английском языке, а стиль Флореаль-в итальянском. С точки зрения времени, модерн относится к концу века."
