 artists_rating_age_information_tt: "Чем старше становится художник, тем меньше времени у вас с ним осталось. Обычно художники могут доживать до преклонного возраста, но они могут умереть раньше или решить уйти на покой досрочно.\n#V Совет:#! Старайтесь нанимать более молодых художников, чтобы быть уверенными, что сможете сохранить их на более длительный период времени."
 artists_rating_experience_information_tt: "Чем больше $concept_artists_experience$, тем лучше. $concept_artists_experience$ значительно повысит способности и результативность вашего художника.\n#V Совет:#! Считайте, что это самый важный фактор при выборе художника."
