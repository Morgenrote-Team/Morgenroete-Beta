 artists.11.t: "Наш композитор скончался"
 artists.11.d: "После десятилетий работы в качестве [Concept('concept_elgar_composer', 'композитора')] умер наш бывший лучший музыкальный талант. Сможем ли мы когда-нибудь найти замену такому потрясающему артисту?"
 artists.11.g: "На этом его мелодия заканчивается."
 artists.11_tt: "Иногда игра убивает персонажей. Мод не может предотвратить этого. Это событие удаляет роль этого художника из игры, чтобы вас не преследовал их призрак."
 artists.12.t: "Наш писатель скончался"
 artists.12.d: "После десятилетий работы в качестве [Concept('concept_manzoni_writer', 'писателя')] наш бывший ведущий лирик умер. Сможем ли мы когда-нибудь заменить такого удивительного писателя?"
 artists.12.g: "Интересно, какими были его последние слова?"
 artists.13.t: "Наш художник скончался"
 artists.13.d: "После десятилетий работы в качестве [Concept('concept_klimt_painter', 'художника')] наш величайший художественный талант умер. Сможем ли мы когда-нибудь заменить такого потрясающего художника?"
 artists.13.g: "Его краски высохли."
