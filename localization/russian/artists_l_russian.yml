 artists.11.t: "Скончался наш композитор"
 artists.11.d: "Проведя десятилетия в качестве [Concept('concept_elgar_composer', '#b #PURPLE композитора#!#!')], наш бывший лучший музыкант скончался. Сможем ли мы когда-нибудь заменить такого поразительного деятеля искусства?"
 artists.11.g: "На этом его мелодия оборвалась."
 artists.11_tt: "Иногда персонажи в игре умирают. Модификация не может это предотвратить. Это событие убирает роль этого деятеля искусства из игры, чтобы вас не преследовал его призрак."
 artists.12.t: "Скончался наш писатель"
 artists.12.d: "Проведя десятилетия в качестве [Concept('concept_manzoni_writer', '#b #PURPLE писателя#!#!')], наш бывший лучший литератор скончался. Сможем ли мы когда-нибудь заменить такого поразительного писателя?"
 artists.12.g: "Интересно, какими были его последние слова?"
 artists.13.t: "Скончался наш художник"
 artists.13.d: "Проведя десятилетия в качестве [Concept('concept_klimt_painter', '#b #PURPLE художника#!#!')], наш величайший художественный талант скончался. Сможем ли мы когда-нибудь заменить такого поразительного деятеля искусства?"
 artists.13.g: "Его краски высохли."
