 panum_cholera_desc: "Холера — опасное инфекционное заболевание тонкого кишечника. Она считается определяющей эпидемией XIX века с миллионами смертей по всему миру."
 panum.2626.t: "Д-р [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]: Шоу"
 panum.2626.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] получил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] собственное шоу на радио, в котором [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] даёт советы людям, которые хотят поговорить о своих проблемах. Формат очень популярен."
 panum.2626.f: "«Здравствуйте, Итан. Я вас слушаю».\n«Здравствуйте, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]».\n«Сколько вам лет?»\n«Мне тринадцать».\n«Ну, чем я могу вам помочь?»\n«Ну, у меня много проблем с другими детьми в школе. Они всё время меня бьют».\n«Как вы думаете, почему?»\n«Наверное, потому что я умный. У меня IQ 160. Я в астрономическом клубе и ненавижу спорт».\n«Ну, знаете, Итан, другие дети просто действуют из зависти и незрелости, и я знаю, что это сейчас не очень помогает, но придёт день в ближайшие несколько лет, когда вы будете смеяться последним».\n«И это всё?»\n«Да».\n«Честно говоря, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], я нахожу этот совет покровительственным, упрощённым и, откровенно говоря, безвдохновенным. Настоящее удивление здесь в том, что вам платят за то, чтобы вы раздавали эту пустую болтовню».\n«Итан, откуда вы звоните?»\n«Из дома».\n«Ну, если кто-то из одноклассников Итана слушает, вы знаете, где он, и он не может оставаться там вечно. Спасибо за ваш звонок»."
 panum.2626.g: "Постойте, я знаю это шоу!"
 ACHIEVEMENT_panum_biologist_job: "Работа биолога?"
 ACHIEVEMENT_DESC_panum_biologist_job: "Изобрести вакцину против жёлтой лихорадки — с помощью врача."
 panum.1007.t: "Клиника полиомиелита"
 panum.1007.d: "Сестра [SCOPE.sCharacter('panum_polio_nurse').GetFirstName] основала клинику полиомиелита в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')], чтобы ухаживать за множеством пациентов."
 panum.1007.f: "«Она была очень высокой и элегантной женщиной, и она внушала доверие просто своим поведением и тем, как она держалась. У неё был восхитительный акцент, который делал её интересным собеседником. Если я закрою глаза, я всё ещё могу представить её, стоящую рядом с моей кроватью в длинном чёрном платье и большой шляпе с красивым страусиным пером... Она не носила украшений и не пользовалась косметикой. Я помню её лицо как сильное и угловатое, а её глаза были очень напряжёнными. Когда она смотрела вам в глаза, эта напряжённость требовала всего вашего внимания, и когда она говорила, люди её слушали... Все знали, кто главный, и мы получали любое лечение, которое она рекомендовала. Я никогда не знал никого настолько напористого, как она».\n\nРэй Г., выживший после полиомиелита."
 panum.1007.g: "Спасибо, сестра [SCOPE.sCharacter('panum_polio_nurse').GetFirstName]."
 panum.1008.t: "Полиомиелитная депрессия"
 panum.1008.d: "Множество детей, искалеченных на всю жизнь, влияют не только на физическое здоровье следующего поколения, но и на родителей, которые обвиняют правительство в недостаточных действиях."
 panum.1008.f: "«Я очень хорошо помню первый день, когда я пошёл в школу в ортезе. Это было в середине учебного дня. Видимо, я был у врача тем утром, чтобы подогнать ортез. Моя мама высадила меня у двери, и я помню, что у неё были слёзы на глазах, когда я уходил».\n\nЭдмунд Сасс, выживший после полиомиелита."
 panum.1008.g: "Иррационально, но не непостижимо."
