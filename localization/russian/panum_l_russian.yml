 building_panum_asylum_tt: "Психиатрическая лечебница может быть основана [Concept('concept_panum_physician', '#b #BLUE врачом#!#!')] с [Concept('concept_character_trait', 'чертой характера')] #V «Психиатр»#!."
 panum_add_x_psycho_points_minus_x_tt: "Потерять [SCOPE.GetValue('psycho_points_amount')|0+] @panum_psycho_point! [Concept('concept_panum_psycho_point', 'психотерапевтических баллов')]."
 panum_add_x_psycho_points_0_tt: "Не получить @panum_psycho_point! [Concept('concept_panum_psycho_point', 'психотерапевтических баллов')]."
 panum_add_x_psycho_points_plus_x_tt: "Получить [SCOPE.GetValue('psycho_points_amount')|0+] @panum_psycho_point! [Concept('concept_panum_psycho_point', 'психотерапевтических баллов')]."
 panum.1100.t: "#tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ий#! грипп"
 panum.1100.d: "Несколько больниц, клиник и врачебных кабинетов сообщили о необычно большом количестве случаев странного заболевания, которое они сначала приняли за обычный грипп. Больничные койки теперь переполнены, а общественные помещения приходится освобождать. Подтверждаются худшие опасения, что это, по-видимому, тот самый ужасный #tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ий#! грипп, который уже свирепствовал в соседних странах."
 panum.1100.f: "Сначала врачи говорили об обычной эпидемии гриппа. В первые несколько дней пресса утверждала, что это странное заболевание эпидемического типа, но безвредное и без смертельных исходов.\n\nНо всё оказалось наоборот. Каждый день эпидемия гриппа достигает нового города, нового региона и требует полной реорганизации медицинского обслуживания. Там, где вчера в казарме симптомы были у двух человек, сегодня их уже 700. Зловещий характер болезни отражается в том, что она убивает не детей и стариков, как обычно, а молодых людей в возрасте от 20 до 40 лет. Каждый двадцатый больной не выживает. Откуда он взялся, как появился, что это такое: эта пандемия остаётся загадкой.\n\nОднако уже становится ясно, что этот грипп может полностью изменить привычный нам мир. Призыв к действиям правительства становится всё громче. Как [GetPlayer.GetName] отреагиру[GetPlayer.GetAltNameNoFormatting('RU_CL_END_T')] на это?"
 panum.1100.g: "Это ведь лёгкое заболевание, не так ли?"
 panum.1101.t: "Испанский грипп"
 panum.1101.d: "Несколько больниц, клиник и врачебных кабинетов сообщили о необычно большом количестве случаев странного заболевания, которое они сначала приняли за обычный грипп. Больничные койки теперь переполнены, а общественные помещения приходится освобождать. Подтверждаются худшие опасения, что это, по-видимому, пандемия невиданных ранее масштабов."
 panum.1101.f: "Испанский грипп был пандемией гриппа, вызванной необычайно вирулентным производным вируса гриппа, которая распространилась тремя волнами между 1918 и 1920 годами, унеся от 20 до 50 миллионов жизней, причём оценки варьируются от мирового населения примерно в 1,8 миллиарда до 100 миллионов.\nЭто означает, что от испанского гриппа умерло больше людей, чем от военных действий в Первой мировой войне (около 17 миллионов погибших). Всего, как говорят, было инфицировано около 500 миллионов человек, что приводит к смертности от 5 до 10 процентов, что было значительно выше, чем у заболеваний, вызванных другими возбудителями гриппа.\n\nОсобенностью испанского гриппа было то, что он поражал скорее молодых людей (в возрасте от 20 до 40 лет), в то время как вирусы гриппа в остальном особенно опасны для маленьких детей и пожилых. Грипп стал «испанским», когда 29 июня 1918 года испанский директор здравоохранения Мартин Саласар объявил, что у него нет сообщений о сопоставимом заболевании в остальной Европе. С конца июня 1918 года международная пресса всё чаще использовала термин «испанский грипп», что также поощрялось некоторыми воюющими правительствами, чтобы скрыть фактическое распространение. Он считается «матерью всех пандемий»."
 panum.1101.g: "Так что, люди уже говорят об испанском гриппе?"
 panum.1102.t: "Великая пандемия"
 panum.1102.d: "Несколько больниц, клиник и врачебных кабинетов сообщили о необычно большом количестве случаев странного заболевания, которое они сначала приняли за обычный грипп. Больничные койки теперь переполнены, а общественные помещения приходится освобождать. Подтверждаются худшие опасения, что это, по-видимому, пандемия невиданных ранее масштабов."
 panum.1102.f: "Сначала врачи говорили об обычной эпидемии гриппа. В первые несколько дней пресса утверждала, что это странное заболевание эпидемического типа, но безвредное и без смертельных исходов.\n\nНо всё оказалось наоборот. Каждый день эпидемия гриппа достигает нового города, нового региона и требует полной реорганизации медицинского обслуживания. Там, где вчера в казарме симптомы были у двух человек, сегодня их уже 700. Зловещий характер болезни отражается в том, что она убивает не детей и стариков, как обычно, а молодых людей в возрасте от 20 до 40 лет. Каждый двадцатый больной не выживает. Откуда он взялся, как появился, что это такое: эта пандемия остаётся загадкой.\n\nОднако уже становится ясно, что этот грипп может полностью изменить привычный нам мир. Призыв к действиям правительства становится всё громче. Как [GetPlayer.GetName] отреагиру[GetPlayer.GetAltNameNoFormatting('RU_CL_END_T')] на это?"
 panum.1102.g: "Значит, люди уже говорят о #tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ом#! гриппе?"
 panum.1103.t: "Политика в отношении пандемии"
 panum.1103.a.tt: "Строгие меры подавят экономику, но с большей вероятностью подействуют раньше и остановят пандемию хотя бы в некоторых областях."
 panum.1103.b.tt: "Мерам потребуется значительно больше времени, чтобы вступить в силу и оказать влияние, но экономика пострадает меньше."
 panum.1103.c.tt: "Пандемия пойдёт своим естественным путём, а установленные меры будут полностью отменены."
 panum.1104.t: "#tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ий#! грипп в [SCOPE.sState('panum_flu_fading_state').GetCustom('RU_SL_PP')] ослабевает"
 panum.1104.d: "По-видимому, ограничения в [SCOPE.sState('panum_flu_fading_state').GetCustom('RU_SL_PP')] дали первые результаты. Спустя недели заметно снижение числа смертей."
 panum.1104.f: "При определённых условиях пандемия может утихнуть в области через несколько недель. Жёсткие меры, хорошая система здравоохранения, первоклассный врач или высокоразвитые медицинские методики помогают начать этот процесс."
 panum.1104.g: "Знак надежды."
 panum.1105.t: "#tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ий#! грипп в [SCOPE.sState('panum_flu_disappearing_state').GetCustom('RU_SL_PP')] исчезает"
 panum.1105.d: "После того, как пандемия в [SCOPE.sState('panum_flu_disappearing_state').GetCustom('RU_SL_PP')] заметно ослабла в последние несколько недель, в эти дни там не было зарегистрировано ни одного нового случая. Регион полностью свободен от гриппа!"
 panum.1105.f: "Чтобы пандемия полностью исчезла из области, она уже должна ослабнуть. Тогда возможно, что какой-то регион освободится от гриппа до окончания настоящей пандемии. Жёсткие меры, хорошая система здравоохранения, первоклассный врач или высокоразвитые медицинские методики помогают избавиться от гриппа."
 panum.1105.g: "Способствовали ли этому принятые меры?"
 panum.1106.t: "Жертва #tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ого#! гриппа"
 panum.1106.d: "[SCOPE.sCharacter('panum_pandemic_victim').GetFullName] несколько дней назад [SelectLocalization(SCOPE.sCharacter('panum_pandemic_victim').IsFemale, 'заболела', 'заболел')] #tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]им#! гриппом и переносит болезнь в тяжёлой форме. Врачи готовятся к худшему."
 panum.1106.f: "«Около полудня меня начал бить озноб. Жар был такой силы, что я боялся, что одежда вот-вот вспыхнет на мне. Меня разрывал кашель, который я не мог подавить. Было темно; я был уверен, что это пневмония, и никогда в жизни я не чувствовал себя таким одиноким и несчастным. ... Затем я почувствовал, что меня прошиб холодный пот, и хотя, казалось бы, должно было стать легче, я ощущал себя ещё более жалким. Когда наконец рассвело, я был лишь тенью человека — не мог дышать без мучительного кашля, и во мне не осталось ни капли надежды». — Франклин Мартин, выживший после #tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ого#! гриппа"
 panum.1106.g: "Мы ничего не можем сделать."
 panum.1107.t: "Сообщения о гриппе порождают антивоенные настроения"
 panum.1107.d: "Сообщения о многочисленных смертях в результате #tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ого#! гриппа в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] вредят общественной поддержке наших военных усилий."
 panum.1107.f: "«Это безумие, что мы отправляем людей на войну, в то время как эта чума опустошает наши дома. Разве государство не должно ставить жизнь своих граждан выше их смерти?»"
 panum.1107.g: "Мы не будем вмешиваться в дела свободной прессы."
 panum.1107.h: "Распространять успокаивающую пропаганду, подкреплённую медицинской наукой."
 panum.1107.i: "Цензурировать новости о смертности и заражениях."
 panum.1108.t: "Меры против пандемии способствуют бедности"
 panum.1108.d: "Поскольку многие не могут работать из-за наших мер по борьбе с пандемией, более бедные граждане в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] с трудом оплачивают аренду. Новоиспечённым безработным грозит выселение, поскольку домовладельцы отказывают в их просьбах об отсрочке."
 panum.1108.f: "«Они сказали мне, что я не могу работать, потому что фабрика переполнена. Каждая фабрика переполнена! Домовладельцу, да горит он в вечном огне, наплевать на наше положение, и он требует арендную плату до конца недели под угрозой выселения. Мою семью наверняка выгонят из нашего дома»."
 panum.1108.g: "Ввести заморозку арендной платы и запрет на выселение."
 panum.1108.h: "Временно увеличить социальное обеспечение."
 panum.1108.i: "Мы ничего не можем с этим поделать."
 panum.1109.t: "Антимасочная лига"
 panum.1109.d: "[SCOPE.sCharacter('anti_mask_ig_leader').GetFullName] сформировал[SelectLocalization(SCOPE.sCharacter('anti_mask_ig_leader').IsFemale, 'а', '')] Антимасочную лигу в оппозицию нашим мерам по борьбе с пандемией. Они оспаривают эффективность нашей политики и требуют её отмены ради страдающей экономики."
 panum.1109.f: "«Наденьте маску и спасите свою жизнь! Чрезвычайная ситуация, с которой сейчас сталкивается наша страна, выходит за рамки возможностей Департамента здравоохранения.\nТе, кто их не носит, заболевают. Мужчина, женщина или ребёнок, которые сейчас не наденут маску, — опасные бездельники!»"
 panum.1109.g: "Игнорировать Лигу."
 panum.1109.h: "Отказаться от мер по борьбе с чумой."
 panum.1109.i: "Дискредитировать Лигу с помощью медицинской науки."
 panum.1120.t: "#tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ий#! грипп заканчивается"
 panum.1120.d: "Многие уже не надеялись, что этот день наступит. После многих месяцев, подобных которым [GetPlayer.GetName] ещё не знал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')], #tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ий#! грипп медленно исчезает из нашей страны. Поистине, это была мать всех пандемий!"
 panum.1120.f: "«Запрет сняли сегодня. Больше никаких .... масок. Всё тоже открыто. „Роман о Тарзане“ идёт в Колизее (кинотеатре), как и около 6 недель назад. Я бы очень хотел[SelectLocalization(SCOPE.sCharacter('panum_pandemic_victim').IsFemale, 'а', '')] его посмотреть. Школа открывается на этой неделе — в четверг! Вы когда-нибудь такое видели? Как будто они не могли подождать до понедельника!» — Виолетта Харрис, выжившая после #tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ого#! гриппа"
 panum.1120.g: "Надеемся, он никогда не вернётся."
 je_panum_spanish_flu: "#tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ий#! грипп"
 je_panum_spanish_flu_reason: "#tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ий#! грипп был пандемией гриппа, вызванной необычайно вирулентным производным вируса гриппа, которая появилась в начале XX века, унеся от 20 до 50 миллионов жизней, причём оценки варьируются от мирового населения примерно в 1,8 миллиарда до 100 миллионов. Всего, как говорят, было инфицировано около 500 миллионов человек, что приводит к смертности от 5 до 10 процентов, что было значительно выше, чем у заболеваний, вызванных другими возбудителями гриппа.\n\nОсобенностью #tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ого#! гриппа было то, что он поражал скорее молодых людей (в возрасте от 20 до 40 лет), в то время как вирусы гриппа в остальном особенно опасны для маленьких детей и пожилых. Он считается «матерью всех пандемий». Грипп стал «#tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]им#!», когда #tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ий#! директор здравоохранения объявил, что у него нет сообщений о сопоставимом заболевании в остальном мире. С тех пор международная пресса всё чаще использовала термин «#tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ий#! грипп», что также поощрялось некоторыми правительствами, чтобы скрыть фактическое распространение."
 panum_remove_spanish_flu_effect_tt: "Отменяет все политики по борьбе с пандемией и их эффекты."
 panum_recent_pandemic_policy_change_modifier: "Недавнее изменение политики по борьбе с пандемией"
 panum_spanish_flu_lockdown_modifier: "Карантин из-за пандемии"
 panum_spanish_flu_measures_modifier: "Меры по борьбе с пандемией"
 panum_spanish_flu_fading_modifier: "Ослабление пандемии"
 panum.2600.t: "Новая лечебница"
 panum.2600.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] сегодня выступил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] с речью на торжественном открытии новой психиатрической лечебницы."
 panum.2600.f: "На открытии присутствовали также многочисленные видные деятели, в том числе оппозиционные политики. В то время как доктор указывал на новые методы и целый ряд чётких симптомов, которые приводили к госпитализации в клинику, скептически настроенные оппоненты правительства подозревали, что такое учреждение может быть также использовано для злоупотреблений."
 panum.2600.g: "Наконец-то подходящее место для политиков, журналистов, актёров..."
 panum.2601.t: "Срочная психиатрическая госпитализация"
 panum.2601.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] подготовил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] отчёт, показывающий, что [SCOPE.sCharacter('chosen_character').GetFullName] нуждается в срочной психиатрической помощи. К сожалению, [SCOPE.sCharacter('chosen_character').GetLastName] проведёт много лет в психиатрической лечебнице. Возможно... очень много лет."
 panum.2601.f: "«Поскольку однажды может случиться так, что нужно будет найти жертву\nУ меня есть небольшой список — у меня есть небольшой список\nОбщественных нарушителей, которые вполне могли бы быть под землёй\nИ которых никто бы не хватился — никто бы не хватился!\nЕсть назойливые неприятности, которые пишут ради автографов\nВсе люди с вялыми руками и раздражающим смехом\nВсе дети, которые в курсе дат и сражают вас ими наповал\nВсе люди, которые при рукопожатии жмут вам руку вот так\nИ все третьи лица, которые настаивают на порче tête-á-têtes\nНикого из них не хватились бы — никого из них не хватились бы!»"
 panum.2601.g: "[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')] внес[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ла', '')] их в список — и никого из них не хватятся!"
 panum.2601.tt: "[SCOPE.sCharacter('chosen_character').GetFullName] навсегда исчезает в стенах психиатрической лечебницы..."
 panum_physician_recent_asylum_conducted_modifier: "Недавняя госпитализация в психиатрическую лечебницу"
 panum_send_leader_to_asylum_modifier: "Политическое злоупотребление психиатрией"
 panum_checkmark_loc: "@green_checkmark!"
 panum_cross_loc: "@red_cross!"
 panum.21.t: "Сортировка больных"
 panum.21.d: "Доктору Хазенбайн приписывают разработку современной системы сортировки больных и раненых по степени тяжести их травм, что повышает шансы пациента на выживание."
 panum.21.f: "Из своего опыта Кавказской и Крымской войн русский хирург Николай Иванович Пирогов разработал поэтапные хирургические лечебные процедуры и принцип «рассеивания больных» (распределённое лечение раненых и больных) для упорядочения переполненных перевязочных пунктов и разделения раненых на пять этапов (принцип сортировки Пирогова). Прусская армия приняла русский принцип в 1866 году, и позже он был также применён к другим медицинским службам союзных армий в Европе. В дальнейшем многочисленные достижения в медицине и хирургических методах были также перенесены на организацию военной медицинской службы. Однако принцип Пирогова оставался неизменным во время Первой мировой войны."
 panum.21.g: "Так что, существует иерархия больных?"
 panum.22.t: "Лечение малярии"
 panum.22.d: "Эффективно извлекая хинин из коры хинного дерева, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] изобрел[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] метод лечения, который помогает против малярии."
 panum.22.f: "Иезуиты уже имели фактическую монополию на использование хинного дерева для лечения малярии в раннее Новое время, даже если в некоторых протестантских странах изначально были оговорки. В начале XIX века, вскоре после открытия морфина, хинин был найден как ингредиент, определяющий эффективность коры хинного дерева, и сделал его краеугольным камнем зарождающейся химии растений. Он был произведён в нечистом виде Антуаном Франсуа де Фуркруа в 1792 году и выделен из коры хинного дерева в 1820 году Пьером Жозефом Пеллетье и Жозефом Бьенэме Кавенту путём экстракции спиртом. В 1823 году хинин был впервые получен в промышленных масштабах из коры видов Cinchona фармацевтом Фридрихом Кохом в Оппенгейме. Хинин впоследствии стимулировал исследования в области химии растений."
 panum.22.g: "Ценное лекарство."
 panum.23.t: "Просто другая категория пациентов"
 panum.23.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] сегодня направил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] в правительство срочное письмо. В нём [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] критикует обращение с душевнобольными и выступает за то, чтобы относиться к ним как к пациентам, заслуживающим лучшего лечения, а не как к антисоциальным элементам, которых нужно исключить из общества."
 panum.23.f: "Первый решительный шаг к психологическому лечению пациентов был сделан в XVIII веке, когда душевнобольных и обычных заключённых перестали «содержать» в одних и тех же помещениях, а отдельные учреждения вошли в моду. Они всё ещё были далеки от любого гуманного стандарта. Следующий шаг был сделан, когда тяжёлые ледяные цепи, которыми были скованы сумасшедшие, были отменены в пользу большей свободы передвижения. С начала XIX века стало ясно, что эти люди также больны и имеют право на лечение. В Англии Закон о безумии 1845 года стал важной вехой, поскольку он явно изменил статус душевнобольных на пациентов, нуждающихся в лечении."
 panum.23.g: "Психическая жизнь этих людей тоже имеет значение."
 panum.24.t: "Медицинские и сестринские знания"
 panum.24.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] напомнил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] нам, что менее квалифицированный персонал иногда бывает очень полезен в качестве медсестёр для многочисленных жертв на поле боя, и выступает за более широкое использование женщин в качестве медсестёр."
 panum.24.f: "В то время как в других европейских странах, особенно во Франции и Германии, католические ордена сделали своей миссией подготовку медсестёр, в Великобритании или других протестантских странах этого почти не происходило. Очень немногие монастыри и ордена пережили английскую Реформацию. Британская общественность с горечью осознала этот факт благодаря публикациям Флоренс Найтингейл. Подготовка сестринского персонала тогда рассматривалась как национальная задача, для которой собирались пожертвования. Школа медсестёр Найтингейл при больнице Святого Томаса в Лондоне, основанная Найтингейл, стала ядром этой профессионализации. Своей фразой «Врачи занимаются болезнями, медсёстры — людьми» она, как говорят, заложила основу философии сестринского дела."
 panum.24.g: "Женщин — на фронт."
 je_panum_spanish_flu_research: "#tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ий#! грипп: Исследование"
 je_panum_spanish_flu_research_reason: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] решил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] более подробно исследовать загадочную пандемию. Насколько [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] преуспеет, остаётся только гадать. Однако у опытного врача должно быть больше шансов достичь результата."
 je_panum_spanish_flu_research_complete_tt: "[concept_panum_physician] может получить новые знания о пандемии: например, о месте происхождения, описание болезни или даже возбудителя."
 state_harvest_condition_panum_spanish_flu_condition_impact_mult: "Влияние [Concept('concept_panum_disease', 'болезни')] «[GetHarvestConditionType('panum_spanish_flu_condition').GetName]»"
 state_harvest_condition_panum_spanish_flu_condition_impact_mult_desc: "Увеличение или уменьшение влияния пандемии."
 panum_spanish_flu_physician_help_modifier: "Врач борется с пандемией"
 panum.1110.t: "Доктор и пандемия"
 panum.1110.d: "Вспышка пандемии — это решающий час: теперь доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] может проявить себя! Но возникает вопрос: что лучше — активно бороться с пандемией или исследовать её?"
 panum.1110.f: "«В тот день, когда стало ясно, что мы имеем дело не с обычной волной гриппа, я испытал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] огромную мотивацию внести свой вклад. И в то же время я почувствовал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] головокружительный груз на своих плечах. Ожидания были огромны. Смогу ли я когда-нибудь оправдать надежды, которые на меня возлагали?»\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetFullName], запись в дневнике "
 panum.1110.g: "Бороться с пандемией."
 panum.1110.h: "Исследовать пандемию."
 panum.1111.t: "Возбудитель пандемии"
 panum.1111.d: "Наш главный врач, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], и наш главный биолог, доктор [ROOT.Var('theiler_biologist_var').GetCharacter.GetLastName], сделали сегодня блестящее открытие: они обнаружили возбудителя, вызывающего #tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ий#! грипп!"
 panum.1111.f: "Вирус гриппа A H1N1 (A/H1N1) относится к подтипу вируса гриппа A (вид Alphainfluenzavirus influenzae) из семейства Orthomyxoviridae, который встречается у уток, людей и свиней, но также заражает множество других видов млекопитающих. Вирусы гриппа H1N1 закрепились у людей и свиней в результате испанского гриппа 1918 года. Этот подтип вызвал десятки миллионов смертей среди людей.\n\nВо время испанского гриппа возбудитель был ещё неизвестен. Некоторые исследователи уже подозревали «фильтрующийся вирус». В учебниках бактерия, теперь называемая Haemophilus influenzae, считалась причиной гриппа. Однако с помощью обычных методов бактериологии возбудителя обнаружить не удалось: его нельзя было ни окрасить, ни вырастить на искусственных питательных средах. Если и был прогресс в знаниях в результате испанского гриппа, то он заключался в том, что фактический возбудитель этого варианта гриппа в то время был ещё неизвестен, что означало, что Haemophilus influenzae был исключён как возбудитель. Геном вируса был секвенирован только в 1996 году."
 panum.1111.g: "Эврика!"
 panum.1112.t: "Происхождение пандемии"
 panum.1112.d_historical: "После выдающегося научного расследования, сочетающего историю, криминологию и медицинские знания, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] сделал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] революционное открытие: пандемия разразилась не в Испании, как это так часто утверждается, а в Америке!"
 panum.1112.f_historical: "Открытию доктора предшествовало тщательное расследование. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')] сравнил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] истории болезни пациентов и отследил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] первые случаи в нашей стране, чтобы восстановить сеть заражений. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')] также собирал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] данные от коллег за рубежом и иногда сам[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] их посещал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')]. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')] оценил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] выводы других врачей, которые предприняли аналогичные усилия в своей стране. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')] не может с уверенностью сказать, где произошла первая инфекция, но всё указывает на штат Канзас. То, что болезнь на самом деле разразилась в Америке, теперь является научным фактом."
 panum.1112.g_historical: "Значит ли это, что мы должны говорить об американском гриппе?"
 panum.1112.d_dynamic: "После выдающегося научного расследования, сочетающего историю, криминологию и медицинские знания, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] сделал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] революционное открытие: пандемия разразилась не в [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetName], как это так часто утверждается, а в [SCOPE.sCountry('panum_pandemic_country').GetAltNameNoFlag('RU_CL_PP')]!"
 panum.1112.f_dynamic: "Открытию доктора предшествовало тщательное расследование. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')] сравнил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] истории болезни пациентов и отследил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] первые случаи в нашей стране, чтобы восстановить сеть заражений. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')] также собирал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] данные от коллег за рубежом и иногда сам[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] их посещал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')]. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')] оценил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] выводы других врачей, которые предприняли аналогичные усилия в своей стране. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')] не может с уверенностью сказать, где произошла первая инфекция. То, что болезнь на самом деле разразилась в [SCOPE.sCountry('panum_pandemic_country').GetAltNameNoFlag('RU_CL_PP')], теперь является научным фактом."
 panum.1112.g_dynamic: "Значит ли это, что мы должны говорить о #tooltippable_name [SCOPE.sCountry('panum_pandemic_country').GetAdjectiveNoFormatting|l]ом#! гриппе?"
 panum.1113.t: "Лечение пандемии"
 panum.1113.d: "Во время своих исследований #tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ого#! гриппа доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] изобрел[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] несколько лекарств и практик и разработал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] план действий по сдерживанию болезни. Хотя все эти открытия пришли слишком поздно, они могут быть полезны для будущих поколений."
 panum.1113.f: "«Сегодня мне намного лучше, я даже смогла одеться. Тревоги и бессонница почти совсем меня измотали. На этой неделе было столько болезней и смертей, но есть и один великий луч света и надежды на исход войны, ведь одиннадцатого числа наступил мир». — Хелен Виола Джексон Кент, выжившая после #tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ого#! гриппа"
 panum.1113.g: "Что ж, мы кое-чему научились."
 panum.1114.t: "Описание пандемии"
 panum.1114.d: "К сожалению, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] добил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ась', 'ся')] небольшого прогресса во время пандемии. Однако [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она написала', 'он написал')] описание болезни, которое, возможно, будет полезно для распознавания симптомов вариантов #tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ого#! гриппа."
 panum.1114.f: "«Эти люди начинают с того, что кажется приступом гриппа, и когда их привозят в больницу, у них очень быстро развивается самый злокачественный тип пневмонии, который когда-либо видели. Через два часа после поступления у них появляются багровые пятна на скулах, а через несколько часов вы можете начать видеть, как цианоз распространяется от их ушей и по всему лицу, пока не станет трудно отличить цветных от белых. Затем это лишь вопрос нескольких часов до наступления смерти, и это просто борьба за воздух, пока они не задохнутся. Это ужасно. Можно выдержать, видя, как умирают один, два или двадцать человек, но видеть, как эти бедняги падают, как мухи, как-то действует на нервы». — Н. Рой Грист, выживший после #tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ого#! гриппа"
 panum.1114.g: "Мы ожидали немного большего."
 panum.1115.t: "Загадка пандемии"
 panum.1115.d: "К сожалению, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] не справил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ась', 'ся')] с требованиями пандемии. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')] не смог[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ла', '')] найти никаких ответов о происхождении, способах борьбы или описании болезни. Но доктор написал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] небольшое стихотворение."
 panum.1115.f: "«У меня была маленькая птичка,\nеё звали Энца.\nЯ открыл окно,\nи в-грипп-энца»."
 panum.1115.g: "Разочаровывающе."
