 notification_panum_foreign_treatment_possible_notification_desc: "Вы могли бы отправить своего [Concept('concept_panum_physician', '#b #BLUE врача#!#')] в медицинскую исследовательскую экспедицию для поиска метода лечения болезни."
 panum.131.t: "Исследования болезни прекращены"
 panum.131.d: "Поскольку опасная эпидемия в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')] подошла к концу и последние пациенты выздоровели, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] на данный момент [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'завершила', 'завершил')] свои исследования. Врач смог собрать некоторую важную информацию, которая должна упростить будущее научное описание болезни, но прорыва [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] пока не [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'достигла', 'достиг')]."
 panum.131.f: "«Все спекуляции о её происхождении и причинах, если таковые могут быть найдены, способные вызвать столь великое бедствие, я оставляю другим писателям, как светским, так и профессиональным; что до меня, я просто изложу её природу и объясню симптомы, по которым, возможно, она может быть распознана студентом, если когда-либо снова вспыхнет. Это я могу сделать тем лучше, что сам перенёс эту болезнь и наблюдал её действие на других», — Фукидид."
 panum.131.g: "Ещё один шаг сделан."
 panum.133.t: "Медицинская экспедиция прекращена"
 panum.133.d: "Медицинская экспедиция пока завершила свою работу, так как эпидемия закончилась. Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] не [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'успела', 'успел')] завершить научное описание, но [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] исследования должны быть ценны для будущего."
 panum.134.d: "Ужасная эпидемия, поразившая нашу страну, миновала. Но это также означает, что доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'должна', 'должен')] на время прекратить свои исследования, потому что [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] не может проводить дальнейшие эксперименты для поиска метода лечения болезни. Тем не менее, врач получил ценные сведения, которые, безусловно, пригодятся в будущем."
 panum.134.f: "«Зараза переходит от одного к другому и изначально вызывается заражением незаметной частицы», — Джироламо Фракасторо."
 panum.134.g: "Это лишь вопрос времени, когда мы найдём лекарство."
 panum.136.d: "К сожалению, медицинская исследовательская экспедиция пока завершилась без окончательных результатов. Поскольку эпидемия покинула страну, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] не [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'смогла проверить', 'смог проверить')] свои теории. Промежуточные результаты будут доступны [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ей', 'ему')] и будущим поколениям, чтобы наконец найти метод лечения."
