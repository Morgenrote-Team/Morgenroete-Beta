 panum.101.t: "Третья пандемия холеры"
 panum.101.d: "Сегодня в столицу поступили тревожные сообщения из дельты Ганга: там стремительно растёт число заболевших. После недолгого обследования местные врачи с ужасом обнаружили, что холера снова дала о себе знать."
 panum.101.g: "Каким-то образом холера вернулась."
 panum.1000.t: "Эпидемия полиомиелита"
 panum.1000.d: "В одной из наших областей вспыхнула эпидемия: #YELLOW полиомиелит#! свирепствует в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')]!"
 panum.1000.f: "Существуют изображения из Древнего Египта, которые предполагают, что полиомиелит существует уже давно и является эндемичным. Однако статуса эпидемического заболевания он достиг лишь к концу XIX века, когда внезапно вспыхнул в Швеции и США. К 1910 году частые эпидемии стали регулярными событиями по всему развитому миру, в основном в городах в летние месяцы. На пике в 1940-х и 1950-х годах полиомиелит ежегодно парализовывал или убивал более полумиллиона человек по всему миру. Страх и коллективный ответ на эти эпидемии породили straordinarnый общественный резонанс и мобилизацию, стимулируя разработку новых методов профилактики и лечения болезни и революционизируя медицинскую филантропию."
 panum.1000.g: "Костыли и инвалидные кресла становятся обыденностью..."
