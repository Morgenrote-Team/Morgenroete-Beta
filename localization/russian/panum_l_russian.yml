 panum.61.t: "Медицинская бригада уезжает"
 panum.61.d: "После того, как научные сотрудники ознакомили наших местных врачей с современными методами лечения из страны-сюзерена, они прощаются и возвращаются на родину."
 panum.61.f: "«Единственное, что будет иметь значение, когда мы уйдём, — это следы любви, которые мы оставили после себя». — Альберт Швейцер"
 panum.61.g: "Наш сюзерен заботится о нас?"
 panum.62.t: "Бригада вакцинации уезжает"
 panum.62.d: "После того, как научные сотрудники ознакомили наших местных врачей с современными вакцинами из страны-сюзерена, они прощаются и возвращаются на родину."
