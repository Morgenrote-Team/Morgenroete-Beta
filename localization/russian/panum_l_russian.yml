 panum_vitamins_tech: "Витамины"
 panum_vitamins_tech_desc: "Выделяя определённые питательные вещества, необходимые организму, можно обеспечить, чтобы больше людей питались здоровой и сбалансированной пищей."
 panum.2006.t: "Теория микробов подкрепляется"
 panum.2006.d: "Медицинский конгресс также предоставил возможность нескольким врачам обменяться идеями о причинах болезней. Становится очевидным, что всё меньше и меньше исследователей верят в традиционную теорию миазмов. Теория микробов теперь считается стандартом среди самых уважаемых учёных."
 panum.2006.f: "«В последнее время действительно произошло некоторое изменение, поскольку отдельные страны больше не действуют так предвзято, как раньше, и одна перенимает у другой всё, что кажется хорошо проверенным в качестве средств защиты. Однако, при сохраняющемся большом разнообразии способов и средств борьбы с туберкулёзом, необходимо задаться вопросом, какие меры действительно лучше всего отвечают научным требованиям и общим выводам в борьбе с заразными болезнями.\n\nНо, прежде чем мы ответим на этот вопрос, мы должны совершенно ясно уяснить себе, как происходит заражение туберкулёзом, т. е. как туберкулёзные палочки проникают в человеческий организм; ибо все профилактические меры против инфекционного заболевания могут быть направлены только на то, чтобы предотвратить проникновение микробов болезни в организм», — Роберт Кох."
 panum.2006.g: "Эти доказательства нельзя игнорировать."
 panum.2201.t: "Теория миазмов теряет свою главенствующую роль"
 panum.2201.d: "С каждым днём, пока доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] всё больше сосредотачивается на новых методах исследования, традиционная теория миазмов становится всё менее актуальной. Теория микробов кажется более убедительной."
 panum.2201.f: "«Господа, последнее слово будет за микробами!» — Луи Пастер."
 panum.2201.g: "Значит, теория миазмов сомнительна?"
 panum_physician_recent_treatment_modifier: "Недавнее лечение"
 panum_physician_recent_treatment_conducted_modifier: "Недавно проведённое лечение"
 panum_physician_botched_treatment_modifier: "Неудачное лечение"
 panum_physician_botched_treatment_ig_modifier: "Неудачное лечение"
 panum.2301.t: "Успешное лечение: [SCOPE.sCharacter('chosen_character').GetFullName]"
 panum.2301.d: "[SCOPE.sCharacter('chosen_character').GetFullName] идёт на поправку! Лечение, которое [SelectLocalization(GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.IsFemale, 'проводила', 'провёл')] доктор [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName], оказалось успешным. Недуг, с которым удалось справиться: [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]."
 panum.2301.f: "«Не беспокойтесь, сэр, это лечение наверняка сработает! [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я делала', 'Я делал')] это как минимум два раза, и только один пациент умер!»"
 panum.2301.g: "Хорошо!"
 panum.2302.t: "Лечение не дало результатов"
 panum.2302.d: "Состояние пациента [SCOPE.sCharacter('chosen_character').GetFullName] не изменилось. Лечение, которое [SelectLocalization(GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.IsFemale, 'проводила', 'провёл')] доктор [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName], не принесло результатов. Недуг: [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]."
 panum.2302.f: "«Я действительно [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'думала', 'думал')], что достаточное количество воды поможет!»"
 panum.2302.g: "По крайней мере, это не повредило."
 panum.2303.t: "[SCOPE.sCharacter('chosen_character').GetFullName]: состояние ухудшилось"
 panum.2303.d: "Проведённое лечение оказалось неудачным. Пациент, [SCOPE.sCharacter('chosen_character').GetFullName], чувствует себя только хуже. Ответственный врач: доктор [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName]. Недуг: [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]."
 panum.2303.f: "«Это уже третий раз на этой неделе...»"
 panum.2303.g: "Этого не должно было случиться!"
 panum.2304.t: "Смерть во время лечения: [SCOPE.sCharacter('chosen_character').GetFullName]"
 panum.2304.d: "Трагический исход. Пациент [SCOPE.sCharacter('chosen_character').GetFullName] [SelectLocalization(SCOPE.sCharacter('chosen_character').IsFemale, 'скончалась', 'скончался')]. Лечение [SelectLocalization(GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.IsFemale, 'проводила', 'провёл')] доктор [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName]. Недуг: [SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_illness_type')]."
 panum.2304.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_character_treatment_fatal_flavor_text_type')]"
 panum.2304.g: "Трагедия!"
 panum_foreign_medical_expedition_modifier: "Иностранная медицинская экспедиция"
 panum.137.t: "Экспедиция хочет исследовать болезнь"
 panum.137.d: "Иностранная экспедиция достигла границ нашей страны. Она состоит в основном из врачей, учёных и их ассистентов. По-видимому, они хотят исследовать бушующую эпидемию."
 panum.137.f: "Медицинские экспедиции могут отправляться в другие страны для научного исследования методов лечения болезней и составления описаний болезней для своей родины. Принимающие страны, в свою очередь, выигрывают от этого, потому что врачи осматривают пациентов в очагах эпидемии."
 panum.137.g: "Приветствуем этих смелых мужчин и женщин."
 panum.2202.t: "Древняя болезнь"
 panum.2202.d: "Наш врач принёс ценные сведения в работу нашего антрополога!"
 panum.2202.f: "«...но, конечно, если вы исследуете эту часть их черепа, вы можете увидеть, что они на самом деле начали заживать от своих травм».\n\n«Значит, это определённо не было причиной смерти?»\n\n«Скорее всего! Неприятный удар, но не смертельный. Я бы оценил, что они прожили ещё около шести месяцев, прежде чем другая травма их добила, или, возможно, рана загноилась».\n\n«Хм. Увлекательно. Судя по характеру удара, я думал, что это, вероятно, какой-то... тупой инструмент».\n\n«Скорее всего, дубина, или, возможно, инструмент с тупым камнем. Я думаю, это ребро представляет истинную причину смерти. Обратите внимание на сужение костей, здесь и здесь».\n\n«Травма?»\n\n«Скорее всего, туберкулёз. Я бы поспорил, что ваш человек умер после многих лет борьбы с этой белой смертью»."
 panum.2202.g: "Междисциплинарная наука остаётся лучшей наукой."
 panum.2203.t: "Странная медицина"
 panum.2203.d: "Проведя некоторое время вместе, наш врач и археолог поделились своими исследованиями!"
 panum.2203.f: "«Ах, но вот где становится интересно, доктор! Эти сосуды из Египта, и в них, как мы полагаем, содержатся образцы древней медицины».\n\n«Увлекательно, увлекательно. Это масло мумии?»\n\n«...разве его не находят на телах, с целебными свойствами? Смола вокруг их обёрток?»\n\n«О нет, совсем нет! Мумия — это вид масла, которое они находят в земле, сродни нефти. Почему?»\n\n«...я думаю, нам лучше изучить эти лекарства подробнее. Здесь есть всевозможные настойки. Пожалуйста, посмотрите на них, а я вернусь через минуту. Мне нужно избавиться от... чего-то».\n\n«Ну, эти, кажется, могли быть ароматизированы и — вы там что-то едите?»"
 panum.2203.g: "...вы ведь не едите мумию, не так ли?"
 panum.2204.t: "Травяные средства?"
 panum.2204.d: "Изучив свои находки, наш натуралист доставил в кабинет нашего врача растения с потенциальными лечебными свойствами."
 panum.2204.f: "«А, вот и вы! [SelectLocalization(ROOT.Var('dubois_naturalist_var').GetCharacter.IsFemale, 'Я каталогизировала', 'Я каталогизировал')] некоторые образцы, которые мы привезли из последней ботанической экспедиции, и [SelectLocalization(ROOT.Var('dubois_naturalist_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] несколько, которые могут вас заинтересовать».\n\n«О, правда? Чем же?»\n\n«Некоторые из них родственны растениям с известными лечебными свойствами, такими как борьба с воспалением или лихорадкой. Некоторые из них нам совершенно чужды, но сопровождаются добрыми словами от туземцев и заслуживают дальнейшего изучения».\n\n«Травяная медицина — не очень-то наука... но никогда не знаешь. В них может быть что-то интересное. Вы ведь знаете, какие чудеса они нашли в маковом растении».\n\n«Ах, морфин!»\n\n«Именно, именно! Я поручу своим ассистентам приготовить несколько порошковых образцов для более детального изучения»."
 panum.2204.g: "Я считаю, что лист коки особенно интересен, доктор."
 panum_germ_theory_loc: "Текущая теория: #V микробная#!"
 panum_miasma_theory_loc: "Текущая теория: #V миазматическая#!"
 panum_no_epidemic_corruption_modifier: "Нет эпидемической коррупции"
 panum_measles_depression_modifier: "Коревая депрессия"
 panum_sailor_quarantine_modifier: "Корь парализует моряков"
 panum.600.t: "Эпидемия кори"
 panum.600.d: "В одной из наших областей вспыхнула эпидемия: #YELLOW корь#! свирепствует в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')]!"
 panum.600.f: "Как и оспа, корь была упомянута персидским врачом Разесом в X веке и, по-видимому, была широко распространена в Евразийском регионе на протяжении всего Средневековья. Корь была эндемична в Европе до XIX века и стала ещё более важной по мере роста урбанизации. Особенностью кори является сыпь, которая начинается на лице и шее и распространяется по всему телу в течение нескольких дней. Наряду с оспой, корь считается одной из болезней, поразивших значительную часть коренного населения Америки в XVI веке."
 panum.600.g: "Но это же просто безобидная детская болезнь... верно?"
 panum.620.t: "Эпидемия кори заканчивается"
 panum.620.d: "Эпидемия кори, по-видимому, закончилась. Последняя пара родителей похоронила своего мёртвого ребёнка."
 panum.620.f: "«Как корь, любовь наиболее опасна, когда приходит поздно в жизни», — лорд Байрон."
 panum.602.t: "Эпидемия кори достигла [SCOPE.sCountry('panum_infected_country').GetAltNameNoFlag('RU_CL_RP')]"
 panum.602.d: "Мы получили сообщения, что первые случаи кори были зарегистрированы сегодня в [SCOPE.sCountry('panum_infected_country').GetAltNameNoFlag('RU_CL_PP')]. Власти обвиняют нас в том, что мы не сделали достаточно для предотвращения распространения."
 panum.602.g: "Этого невозможно было предотвратить."
 panum.603.t: "Корь убивает детей"
 panum.603.d: "В [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] вспышка кори оказалась гораздо серьёзнее, чем ожидалось. Эпидемия особенно свирепствовала среди младенцев и маленьких детей и навсегда ослабила целое поколение."
 panum.603.f: "Корь всегда рассматривалась как детская болезнь, хотя она может поражать и взрослых. Наиболее разрушительные последствия она проявляет в возрасте от 2 до 3 лет. Затем смертность быстро снижается. В 1963 году, до изобретения вакцины, официальная статистика оценивала, что каждый год в мире от кори умирало 2 миллиона человек. Около 5–10 процентов случаев заболевания заканчивались смертельным исходом."
 panum.603.g: "Неужели нет лекарства от этой ужасной болезни?"
 panum.604.t: "Корь парализует моряков"
 panum.604.d: "По загадочным причинам корь в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] особенно поразила рыбаков и моряков. Смертность незначительна, но потеря рабочей силы заметна на рыбных верфях и среди китобоев."
 panum.604.f: "Во время своих исследований на Фарерских островах Петер Панум обнаружил, что корь также поражает взрослых, особенно в более изолированных популяциях. Причины этого долгое время оставались неясными; однако в принципе было заметно, что особенно страдали рыбаки и их семьи, жившие вдали от более оживлённых городов."
 panum.604.g: "Но кто же теперь выходит в море?"
 panum.605.t: "Детская клиника для больных корью"
 panum.605.d: "Политик [SCOPE.sCharacter('panum_government_leader').GetFullName] [SelectLocalization(SCOPE.sCharacter('panum_government_leader').IsFemale, 'отметила', 'отметил')] большое количество детей, страдающих корью в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')], особенно среди более бедных семей, где смертность выше. Политик [SelectLocalization(SCOPE.sCharacter('panum_government_leader').IsFemale, 'хотела', 'хотел')] бы профинансировать детскую клинику для больных корью и [SelectLocalization(SCOPE.sCharacter('panum_government_leader').IsFemale, 'попросила', 'попросил')] о публичном пожертвовании."
 panum.605.f: "«Стыдно видеть, как добрые родители [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_RP')] находятся во власти этой ужасной болезни. Политики должны действовать и брать на себя ответственность. Слишком долго слишком многие делали слишком мало. Детская больница должна помочь защитить самое ценное, что есть у родителей. Мы поможем. Я вам это обещаю. Пока моё имя — [SCOPE.sCharacter('panum_government_leader').GetFullName]... что вы имеете в виду, я произношу предвыборные речи?»"
 panum.605.g: "Инициатива, достойная поддержки."
 panum.605.h: "Эта партия лишь хочет использовать болезнь в политических целях."
 panum.606.t: "Коревая депрессия"
 panum.606.d: "Множество больных и умерших детей в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] оставили свой след на многих родителях. Некоторые говорят о многочисленных людях, находящихся в жизненном кризисе."
 panum.606.f: "«Госпожа Миллер в этом месяце похоронила своего третьего ребёнка. Она лишь одна из многих матерей, которые теперь бездетны. Господин Миллер, который держит пекарню в городе, закрыл свою лавку на несколько недель. Многие семьи в этом районе похожи на Миллеров. Едва ли найдётся клан, не потерявший ребёнка. Однако фатализм уже несколько недель переходит в недовольство. Люди в этом регионе стали значительно более чувствительными, если обстоятельства продолжат ухудшаться. Многие теперь винят в своём несчастье правительство».\n\nСтатья из «[SCOPE.sState('panum_disease_state').GetCityHubName] Геральд»."
 panum.606.g: "Не совсем непонятно, учитывая ситуацию."
 panum.622.t: "Инкубация кори"
 panum.622.d: "Доктор [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.IsFemale, 'составила', 'составил')] тщательный список случаев кори, который довольно точно показывает инкубационный период болезни."
 panum.622.f: "«Нельзя отрицать, что стадия шелушения может быть заразной, но следует с осторожностью относиться к этой точке зрения, поскольку по общим соображениям можно было бы подозревать обратное. Кажется почти, что, поскольку такой длительный латентный период нельзя было себе представить, для заражения была выбрана более поздняя стадия болезни. В деревнях Хове и Лобре, на Судеро, к концу эпидемии, между поколениями экзантемы в одном и том же домохозяйстве был интервал более четырнадцати дней, без того, чтобы я мог продемонстрировать новую инфекцию извне; однако эти два случая можно объяснить инфекцией, которая передалась на стадии выздоровления. Исходя из представленных здесь данных, я считаю, что инкубационный период кори можно с большой уверенностью оценить примерно в четырнадцать дней, не настаивая, однако, на том, что этот интервал не может быть изменён особыми обстоятельствами, как, например, путешествие; многие факторы говорят априори против такого абсолютного утверждения, а также аналогия с неопределённостью латентных периодов других болезней», — Петер Панум."
 panum.623.t: "Уникальность кори"
 panum.623.d: "На новом промежуточном этапе доктор [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.IsFemale, 'дифференцировала', 'дифференцировал')] различные формы кори и не только отметила различия от других, похожих заболеваний, таких как оспа и краснуха, но и выделила уникальные симптомы."
 panum.623.f: "«Литература по кори незначительна и неполна по сравнению с литературой по другим острым экзантемам, как, например, скарлатина и оспа. Помимо разрозненных сообщений в журналах, касающихся отдельных вспышек, существует лишь несколько монографий, некоторые из которых датируются предыдущим столетием. Эта экзантематическая лихорадка, безусловно, неизвестная греческим и арабским врачам, была так недостаточно дифференцирована даже в прошлом веке, что де Хаэн утверждал идентичность кори с оспой на основании симптомов, а авторы до конца XVII века описывали обе болезни как принадлежащие к одному семейству», — Петер Панум."
 panum.624.t: "Неиммунные популяции и пожизненный иммунитет"
 panum.624.d: "Доктор [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] недавно [SelectLocalization(GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.IsFemale, 'смогла', 'смог')] очень чётко показать, что когда корь поражает человека, она не повторяется. Поэтому популяции, которые никогда не подвергались воздействию болезни, находятся в особой опасности."
 panum.624.f: "«В этой связи весьма примечательно, однако, что из многих пожилых людей, всё ещё живущих на Фарерах, которые переболели корью в 1781 году, ни один, насколько я мог выяснить путём тщательного опроса, не заболел во второй раз. Я сам видел девяносто восемь таких стариков, которые были освобождены, потому что перенесли болезнь в молодости. Это было тем более примечательно, что преклонный возраст ни в коей мере не уменьшал восприимчивости к кори, поскольку, насколько мне известно, все старики, которые не перенесли корь в более раннем возрасте, заболевали, когда подвергались заражению; тогда как некоторые молодые люди, хотя и постоянно подвергавшиеся воздействию, были освобождены. Если выздоровление от кори шестьдесят пять лет назад могло застраховать людей от повторного заболевания, можно было бы предположить, что ещё большую защиту обеспечило бы выздоровление от неё в более короткий срок», — Петер Панум."
 panum.700.t: "Эпидемия скарлатины"
 panum.700.d: "В одной из наших областей вспыхнула эпидемия: #YELLOW скарлатина#! свирепствует в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')]!"
 panum.700.f: "Скарлатина известна с древних времён и была хорошо описана в XVII веке, в частности Томасом Сиденгамом. Хотя скарлатина, по-видимому, стала менее опасной в XVIII веке, в XIX веке она вернулась в новой форме. Пьер Фидель Бретонно, например, утверждал, что около 1800 года он не знал ни одного смертельного случая скарлатины, тогда как в 1824 году он наблюдал эпидемию в Туре с такой высокой смертностью, что он ставил скарлатину на один уровень с чумой и холерой. Скарлатина сопровождается характерной сыпью. В отличие от оспы или кори, скарлатина характеризуется опухшими миндалинами и языком клубничного цвета."
 panum.700.g: "Каждый ребёнок должен через это пройти. Надеюсь."
 panum.720.t: "Эпидемия скарлатины заканчивается"
 panum.720.d: "Эпидемия скарлатины, охватившая нашу страну, медленно покидает города и деревни. Бесчисленные родители вздыхают с облегчением."
 panum.720.f: "«Это как скарлатина: нужно это пережить».\n\n«Тогда нужно изобрести способ прививки от любви, как вакцинацию», — Лев Толстой."
 panum.722.t: "Древние знания"
 panum.722.d: "Через торговца антиквариатом [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.IsFemale, 'смогла', 'смог')] найти несколько старых книг, которые обобщают описания скарлатины в прошлом и могут быть полезны и в настоящем."
 panum.722.f: "Нельзя с уверенностью сказать, была ли скарлатина известна в древности, или её путали с подобными заболеваниями, такими как дифтерия, корь и краснуха. Свидетельства о болезни, похожей на скарлатину, уже есть у Цельса, Целия Аврелиана, Аретея из Каппадокии и Аэция из Амиды. Подобные описания можно найти в арабо-персидском регионе со времён Средневековья, а именно у Авиценны, Али Аббаса и Разеса. Первое определённое описание скарлатины — это описание Джованни Филиппо Инграссиа от 1553 года. Ещё одну важную позицию занимает врач Даниэль Зеннерт, также из XVI века. Название «скарлатина» восходит к Томасу Сиденгаму и его описанию от 1675 года. Хотя описание Сиденгама считается авторитетным, в нём есть значительные пробелы, и термин «скарлатина» также, по-видимому, был широко распространён в Англии уже в середине XVI века."
 panum.723.t: "Симптомы скарлатины"
 panum.723.d: "Доктор [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.IsFemale, 'добилась', 'добился')] прогресса в своём описании скарлатины и впервые [SelectLocalization(GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.IsFemale, 'обобщила', 'обобщил')] её симптомы."
 panum.723.f: "«Пациенты чувствуют озноб и дрожь, как и при других лихорадках. Однако симптомы умеренные; после этого вся кожа покрывается мелкими красными пятнами, более густыми, чем при кори, а также более широкими, красными и менее однородными. Они длятся два-три дня, а затем исчезают. У пациента не только сыпь, но и воспаление миндалин. Могут быть осложнения, такие как ревматизм и водянка».\n\nДоктор [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName], в письме медицинскому факультету."
 panum.724.t: "Скарлатина не любит гортань"
 panum.724.d: "Доктор [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.IsFemale, 'определила', 'определил')] специфические различия между скарлатиной и дифтерией."
 panum.724.f: "«При скарлатине воспаление распространяется по миндалинам, нёбу и глотке и не ограничивается, как при дифтерии, одним местом; и, во-вторых, скарлатинозное воспаление глотки не имеет тенденции распространяться на дыхательные пути. Короче говоря: скарлатина не любит гортань».\n\nДоктор [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName], в письме медицинскому факультету."
 panum_plague_quarantine_modifier: "Карантин по чуме"
 panum_plague_hospitals_modifier: "Чумные дома"
 panum_plague_burn_everything_modifier: "Сжечь всё!"
 panum_plague_rat_killer_modifier: "Убить всех!"
 panum_plague_loss_of_trust_modifier: "Потеря доверия"
 panum.800.t: "Возвращение чумы"
 panum.800.d: "Уже несколько лет ходят слухи, что чума вернулась в некоторые части нашей страны. Раньше это ограничивалось отдалёнными сельскими районами. Однако со вспышкой в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] наконец-то стало ясно: чума снова протягивает свои костлявые пальцы!"
 panum.800.f: "Третья пандемия чумы (после Юстиниановой чумы в VI веке и «чёрной смерти» в XIV веке) началась в Китае в конце XIX века. Считается, что пандемия возникла в Юньнани, где вспышка произошла ещё в 1792, 1855 и снова в 1866 году. Вспышка в соседнем городе Гуанчжоу с января 1894 года унесла жизни 80 000 человек. С марта 1894 года британские учёные и врачи в Гонконге узнали о вспышке. После волн холеры последних десятилетий ожидалось, что волна чумы приведёт к большому числу смертей, особенно в Китае и Индии, и в конечном итоге к государственной нестабильности. По оценкам, она унесла жизни 15 миллионов человек во всём мире."
 panum.800.g: "Невозможно! Чума — болезнь забытого прошлого!"
 panum.820.t: "Эпидемия чумы заканчивается"
 panum.820.d: "Ужасная чума, один из худших бичей человечества, снова покинула нашу страну. Будем надеяться, что она вернётся туда, где ей и место: в бездну истории."
 panum.820.f: "«Но что значит чума? Это жизнь, вот и всё», — Альбер Камю."
 panum.802.t: "Чума распространяется на [SCOPE.sCountry('panum_infected_country').GetAltNameNoFlag('RU_CL_VP')]"
 panum.802.d: "Случаи чумы теперь регистрируются и за нашими границами. По-видимому, властям не удалось сдержать болезнь. Посол #tooltippable_name [SCOPE.sCountry('panum_infected_country').GetAdjective]ой#! державы выдвинул против нас серьёзные обвинения."
 panum.802.g: "В долгосрочной перспективе чума приходит ко всем..."
 panum.803.t: "Эпидемия чумы"
 panum.803.d: "В одной из наших областей вспыхнула эпидемия: #YELLOW чума#! свирепствует в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')]!"
 panum.803.g: "Чёрная смерть стучится."
 panum.804.t: "Чума: третья волна"
 panum.804.d: "Тревожные новости доходят до нас из [SCOPE.sCountry('panum_plague_country').GetAltNameNoFlag('RU_CL_RP')]. Несколько недель назад там, говорят, бушевала сильная эпидемия. Врачи обеспокоены: предполагается, что это пресловутая чума."
 panum.804.g: "Мы должны собрать медицинскую экспедицию, чтобы подготовиться к этому."
 panum.805.t: "Карантин по чуме"
 panum.805.d: "Ситуация в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] угрожает выйти из-под контроля. Влиятельные политики, главы ведомств и частные лица призывают к карантину, чтобы предотвратить дальнейшее распространение чумы. В основном это люди, которые не живут в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')]."
 panum.805.f: "Обширные, строгие карантины уже доказали свою успешность в Средние века. Фактически, термин «карантин» восходит к слову «40» в итальянском языке и, по-видимому, впервые был использован во времена чумы. Венецианская республика, в частности, как торговая держава с обширным судоходством, была известна этой мерой, поскольку портовые и торговые города особенно страдали от эпидемий."
 panum.805.g: "Вся территория должна быть помещена в карантин."
 panum.805.h: "Мы не должны слишком драматизировать."
 panum.806.t: "Чумные дома"
 panum.806.d: "Местные власти в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] внесли предложение о создании чумных домов для лучшей изоляции здорового населения от больного. Это особенно затронуло бы более бедные классы, которые не могут бежать, как богатые."
 panum.806.f: "Чумной дом использовался для ухода за больными чумой во время эпидемий чумы. Поскольку в пиковый период этих волн болезней, в позднем Средневековье и раннем Новом времени, эпидемия считалась неизлечимой и, следовательно, облегчение наступало лишь в результате медицинского ухода, чумные дома в первую очередь предназначались для изоляции больных от здорового населения. Для этой цели чумные дома, подобные лепрозориям, обычно строились за городом или на его окраине. Другой тип чумного дома предназначался для профилактики в смысле карантинного периода. Люди, в непосредственной близости от которых произошла чума, помещались в чумной дом, который они могли покинуть только в том случае, если оказывались незаражёнными."
 panum.806.g: "Это только для их же блага. Даже если они этого не хотят."
 panum.806.h: "Это только вызовет беспорядки."
 panum.807.t: "Чумной доктор"
 panum.807.d: "Ведущий врач в одном из наших чумных госпиталей в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] приобрёл столько опыта в этой области, что мог бы оказать ценную помощь на национальном уровне."
 panum.807.f: "«Пропустите! Я врач. И я точно знаю, как бороться с этой болезнью»."
 panum.807.g: "Дать врачу высокую должность."
 panum.808.t: "Бегство богатых"
 panum.808.d: "Число эмигрантов в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] растёт с каждым днём. В частности, те семьи, которые могут себе это позволить, пытаются спастись от чумы. Среди тех, кто не может позволить себе такой побег, царит большое недовольство. Другие предупреждают, что это приведёт к ещё большему распространению чумы."
 panum.808.f: "«Некоторые же, самые, пожалуй, здравые в суждениях, как они были и самыми суровыми по характеру из всех, утверждали, что нет лекарства от болезни, превосходящего или равного по действенности бегству; следуя этому предписанию, множество мужчин и женщин, пренебрегая всем, кроме себя, покинули свой город, свои дома, своё имущество, своих родственников, свои товары и ушли в добровольное изгнание или переселились в сельскую местность, как будто Бог, насылая на людей эту чуму в возмездие за их беззакония, не будет преследовать их Своим гневом, где бы они ни были, а намеревался уничтожить только тех, кто остался в пределах стен города; или считая, быть может, что теперь пришло время всем бежать из него, и что настал его последний час», — Боккаччо."
 panum.809.t: "Горы трупов"
 panum.809.d: "Число смертей от чумы достигло таких размеров, что его едва ли можно было контролировать. Некоторые уже рекомендуют публичные сожжения и массовые захоронения."
 panum.809.f: "На пике чумы 1894 года в Гонконге в больницы ежедневно поступало в среднем 80 человек, а смертность достигала более 100 человек в день. Через морское сообщение эпидемия распространилась на остальную часть страны после 1894 года и в конечном итоге распространилась на Британскую Индию, где погибло около десяти миллионов индийцев. Основными профилактическими мерами были создание чумных госпиталей и развёртывание медицинского персонала для лечения и изоляции больных чумой; проведение поквартирных обходов, обнаружение и перевод больных чумой, а также очистка и дезинфекция заражённых домов и территорий; и создание специальных кладбищ и назначение ответственного за транспортировку и захоронение умерших от чумы."
 panum.810.t: "Чёрная смерть собирает свою дань"
 panum.810.d: "Эпидемия чумы в эти дни особенно свирепствует в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')]. Сообщается о многочисленных смертях, даже больше, чем обычно."
 panum.810.f: "Болезнь несколько лет оставалась локализованной на юго-западе Китая, прежде чем распространиться. В городе Кантон, начиная с января 1894 года, болезнь к июню унесла жизни 80 000 человек. Ежедневное водное сообщение с соседним городом Гонконг быстро распространило чуму туда, убив более 2400 человек в течение двух месяцев во время чумы в Гонконге 1894 года."
 panum.810.g: "Никто не уйдёт от Смерти!"
 panum.811.t: "Сжечь всё!"
 panum.811.d: "Очистка и дезинфекция домов пострадавших часто является единственным способом остановить распространение чумы. Это часто включает в себя сжигание всего, что контактировало с больным чумой."
 panum.811.f: "«Я говорю, значит, что такова была сила заражения упомянутой чумы, что она не просто передавалась от человека к человеку, но, что гораздо поразительнее, часто наблюдалось, что вещи, принадлежавшие больному или умершему от этой болезни, если их касалось какое-либо другое живое существо, не человеческого рода, были причиной не только заболевания, но и почти мгновенной смерти. В чём мои собственные глаза (как я сказал немного раньше) убедились, однажды среди прочих, следующим опытом. Тряпки бедняка, умершего от болезни, были разбросаны по открытой улице, туда пришли две свиньи и, после, как это у них водится, немалой возни со своими рылами, взяли тряпки между зубами и швыряли их туда-сюда по своим челюстям; после чего, почти сразу же, они сделали несколько оборотов и упали мёртвыми, как от яда, на тряпки, которые в недобрый час они потревожили», — Боккаччо."
 panum.811.g: "Сжечь одежду, мебель и даже дома, если необходимо!"
 panum.811.h: "В этом нет необходимости."
 panum.812.t: "Убить всё!"
 panum.812.d: "Рано возникло подозрение, что крысы могут быть переносчиками чумы. В [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] раздаются призывы к целенаправленному истреблению животных и вредителей, чтобы предотвратить распространение болезни."
 panum.812.f: "Вследствие третьей пандемии чумы европейские города создали настоящие «антикрысиные корпуса», которым было поручено целенаправленно искать и убивать животных или окунать их в вёдра с бензином. Однако часто предлагалось, что для передачи в Европе во время третьей пандемии были важны другие источники чумы, такие как инфицированные человекоспецифичные или кусающие человека паразиты, такие как блохи и вши. Низкое количество инфицированных чумой крыс, обнаруженных во время европейских вспышек, предполагает, что они играли относительно незначительную роль в передаче чумы. Однако некоторые исследователи утверждали, что власти вряд ли могли найти инфицированных чумой крыс, потому что они прятались."
 panum.812.g: "Истребить крыс."
 panum.812.h: "Это слишком дорого."
 panum.813.t: "Потеря доверия"
 panum.813.d: "Многие жители [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] считают текущую медицинскую ситуацию скандальной. Множество смертей и очевидный провал правительства привели к повсеместной потере доверия к нему."
 panum.813.f: "Эпидемия чумы XIX века вызвала большое число жертв, особенно в Китае, что серьёзно подорвало доверие к правительству и Небесному мандату императоров Цин."
 panum.813.g: "Тогда разбирайтесь со своим беспорядком сами!"
 panum.822.t: "Чёрная смерть"
 panum.822.d: "Используя несколько исторических источников, доктор [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.IsFemale, 'смогла', 'смог')] доказать, что новая волна чумы — это на самом деле болезнь, соответствующая Чёрной смерти Средневековья."
 panum.822.f: "Открытие распространения чумы в Индии имело доминирующее значение во взгляде на чуму в её нынешнем понимании как современной болезни. Первоначально это привело к мнению, что существует только один способ распространения болезни. Исследования теперь расширились, включив в себя большое количество грызунов и большое количество видов блох. Высокая смертность в колониях привела к увеличению исследовательских усилий по картированию эпидемических особенностей. Тот факт, что это всегда была чума, не подвергался сомнению как отправная точка. Болезнь получила исторический термин «чума». Предполагалось тождество средневековой чумы с чумой, исследованной в Индии."
 panum.823.t: "Сезон чумы"
 panum.823.d: "Доктор [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.IsFemale, 'просмотрела', 'просмотрел')] все записи. Будь то в эту эпидемию или раньше, будь то в ближнем или далёком прошлом: зимой эпидемий чумы не бывает. Почему это так, остаётся неясным, но это может сыграть роль в поиске причин вспышки болезни."
 panum.823.f: "«Так заканчивается этот год... Правда, мы пережили большую меланхолию из-за великой чумы, и я понёс большие расходы из-за неё, долгое время содержа свою семью в Вулидже, а себя и другую часть моей семьи, моих клерков, за свой счёт в Гринвиче... Но теперь чума почти сошла на нет... Но многие из тех, кого я очень хорошо знаю, умерли. Однако, к нашей большой радости, город быстро наполняется, и магазины снова начинают открываться. Дай Бог, чтобы чума продолжала убывать — ибо это удерживает Двор вдали от места дел, и поэтому всё идёт прахом в общественных делалах, они на таком расстоянии не думают об этом», — Сэмюэл Пипс."
 panum.824.t: "Бубонная чума и лёгочная чума"
 panum.824.d: "Доктор [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.IsFemale, 'смогла', 'смог')] доказать, что существует не одна форма чумы."
 panum.824.f: "Под чумой обычно понимают бубонную чуму. Инкубационный период составляет от нескольких часов до семи дней. Симптомы: лихорадка, головная боль и ломота в теле, сильное чувство недомогания и головокружение. Позже возникают нарушения сознания. Название «бубонная чума» происходит от сильно опухших, очень болезненных бубонов на шее, в подмышках и в паху. Лёгочная чума встречается значительно реже. Вероятно, она похожа на грипп, хотя её способность к распространению намного слабее. Распространение настолько специфично, что она может стать эпидемией только при особо благоприятных обстоятельствах. Прежде всего, источники инфекции редки. Лишь небольшая часть заражённого чумой населения заболевает лёгочной чумой, например, в случае бубонной чумы и слабого иммунитета."
 panum.241.t: "Эксперимент с кроликами"
 panum.241.d: "Доктор [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] придумывает смелый эксперимент, который окончательно докажет заразность туберкулёза. Речь идёт об инокуляции. И о множестве маленьких мёртвых кроликов."
 panum.241.f: "«Для моего первого эксперимента [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я приобрела', 'я приобрёл')] пару милых кроликов трёхнедельного возраста с целью определения заразности туберкулёза. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я опрыскала', 'Я опрыскал')] одного из них туберкулёзным экстрактом из ткани больного туберкулёзом, умершего 33 часа назад. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я повторила', 'Я повторил')] процедуру дважды. Через несколько дней [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я вскрыла', 'я вскрыл')] животных и [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'обнаружила', 'обнаружил')], что кролик заражён туберкулёзом.\n\nМесяц спустя [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я повторила', 'я повторил')] эксперимент с тремя прекрасными маленькими кроликами. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я снова повторила', 'Я снова повторил')] процедуру, позже добавив ещё одного кролика. Затем [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я вскрывала', 'я вскрывал')] по одному кролику каждый день в течение четырёх дней подряд. Все они страдали туберкулёзом, хотя и на четырёх разных стадиях болезни. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я инокулировала', 'Я инокулировал')] только первого.\n\nВ моей третьей попытке [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я приобрела', 'я приобрёл')] четыре пары молодых, милых кроликов, трёхмесячного возраста...»\n\nДоктор [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName]: Экспериментальная тетрадь «Причина и природа туберкулёза»."
 panum.241.g: "Остановить эти ужасные опыты на животных!"
 panum.241.h: "Давайте повторим эксперимент, чтобы убедиться."
 panum.241.i: "Третий эксперимент с кроликами для науки!"
 panum.241.j: "[SelectLocalization(GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')] может убить столько кроликов, сколько возможно, чтобы доказать теорию."
 panum.261.t: "Искусственный пневмоторакс"
 panum.261.d: "Доктор [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.IsFemale, 'изобрела', 'изобрёл')] устройство, которое искусственно вызывает коллапс лёгких и может помочь в борьбе с туберкулёзом."
 panum.261.f: "С помощью своего брата Карло Форланини разработал и сконструировал простое устройство, способное вводить газы внутриплеврально. Присутствие газа во внутриплевральной жидкости вызывало коллапс лёгкого, создавая таким образом искусственный пневмоторакс. Построив устройство, Форланини попытался лечить два случая туберкулёза, вызвав пневмоторакс у двух пациентов, и получил положительные результаты. С годами техника Форланини была усовершенствована и улучшена, что повысило успешность процедуры. Искусственный пневмоторакс продолжал использоваться в качестве лечения до введения стрептомицина."
 panum.262.t: "Торакопластика"
 panum.262.d: "Благодаря своим хирургическим навыкам доктор [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.IsFemale, 'изобрела', 'изобрёл')] процедуру, которая произвела революцию в лёгочной хирургии и, таким образом, позволила улучшить лечение больных туберкулёзом."
 panum.262.f: "Торакопластика — это хирургическая процедура, при которой рёбра или части рёбер с одной стороны грудной клетки удаляются хирургическим путём, чтобы вызвать коллапс лёгкого или его частей. Эта процедура восходит к Эдуарду де Серенвилю и в основном использовалась для лечения лёгочного туберкулёза, но затем стала всё менее важной с введением эффективных антибиотиков."
 panum.263.t: "Доктор сделал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] это снова!"
 panum.263.d: "Чтобы ещё раз доказать заразность туберкулёза, доктор [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName] снова [SelectLocalization(GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.IsFemale, 'убила', 'убил')] бесчисленное количество милых кроликов."
 panum.263.f: "«Из четырёх пар, которые [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я приобрела', 'я приобрёл')] на этот раз, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я немедленно убила', 'я немедленно убил')] первое животное первой пары. У него не было никаких поражений лёгких».\n\nДоктор [GetPlayer.MakeScope.Var('panum_physician_var').GetCharacter.GetLastName]: Экспериментальная тетрадь «Причина и природа туберкулёза»."
 panum.263.g: "Речь идёт о спасении человеческих жизней."
 panum.263.h: "У этого доктора серьёзные проблемы."
 panum_pneumothorax_modifier: "Искусственный пневмоторакс"
 panum_thoracoplasty_modifier: "Торакопластика"
