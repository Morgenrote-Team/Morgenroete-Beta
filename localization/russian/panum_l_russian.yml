 je_panum_yellow_fever_description_expedition: "Медицинская наблюдательная экспедиция: жёлтая лихорадка"
 je_panum_cholera_description_expedition_reason: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] возглавляет медицинскую экспедицию в [SCOPE.sCountry('target').GetAltNameNoFlag('RU_CL_PP')], чтобы получить ценные знания о #YELLOW холере#!. Пока в стране бушует болезнь, у [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'неё', 'него')] есть ежемесячный шанс получить новые сведения, чтобы составить исчерпывающее научное заключение о болезни.\n\nЕсли болезнь утихнет, научный прогресс не будет потерян, а будет учтён при следующем исследовании."
 je_panum_tuberculosis_description_expedition_reason: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] возглавляет медицинскую экспедицию в [SCOPE.sCountry('target').GetAltNameNoFlag('RU_CL_PP')], чтобы получить ценные знания о #YELLOW туберкулёзе#!. Пока в стране бушует болезнь, у [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'неё', 'него')] есть ежемесячный шанс получить новые сведения, чтобы составить исчерпывающее научное заключение о болезни.\n\nЕсли болезнь утихнет, научный прогресс не будет потерян, а будет учтён при следующем исследовании."
 je_panum_smallpox_description_expedition_reason: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] возглавляет медицинскую экспедицию в [SCOPE.sCountry('target').GetAltNameNoFlag('RU_CL_PP')], чтобы получить ценные знания об #YELLOW оспе#!. Пока в стране бушует болезнь, у [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'неё', 'него')] есть ежемесячный шанс получить новые сведения, чтобы составить исчерпывающее научное заключение о болезни.\n\nЕсли болезнь утихнет, научный прогресс не будет потерян, а будет учтён при следующем исследовании."
 je_panum_typhus_description_expedition_reason: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] возглавляет медицинскую экспедицию в [SCOPE.sCountry('target').GetAltNameNoFlag('RU_CL_PP')], чтобы получить ценные знания о #YELLOW тифе#!. Пока в стране бушует болезнь, у [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'неё', 'него')] есть ежемесячный шанс получить новые сведения, чтобы составить исчерпывающее научное заключение о болезни.\n\nЕсли болезнь утихнет, научный прогресс не будет потерян, а будет учтён при следующем исследовании."
 je_panum_yellow_fever_description_expedition_reason: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] возглавляет медицинскую экспедицию в [SCOPE.sCountry('target').GetAltNameNoFlag('RU_CL_PP')], чтобы получить ценные знания о #YELLOW жёлтой лихорадке#!. Пока в стране бушует болезнь, у [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'неё', 'него')] есть ежемесячный шанс получить новые сведения, чтобы составить исчерпывающее научное заключение о болезни.\n\nЕсли болезнь утихнет, научный прогресс не будет потерян, а будет учтён при следующем исследовании."
