 panum.3000.t: "Красный Крест"
 panum.3000.d: "Учитывая ужасы современной войны, в [SCOPE.sState('panum_red_cross_state').GetCustom('RU_SL_PP')] был основан «Международный комитет обществ помощи по уходу за ранеными». Его цель — действовать в разных странах, чтобы помогать раненым на войне."
 panum.3000.f: "Красный Крест принял следующие резолюции:\n- создание национальных обществ помощи раненым на войне\n- нейтралитет раненых\n- отправка медсестёр-добровольцев на поле боя для оказания помощи\n- организация и проведение дальнейших международных конференций\n- введение опознавательного и защитного знака в виде белой повязки с красным крестом"
 panum.3000.g: "Решительный шаг вперёд в международном сотрудничестве."
 panum.3001.d: "Учитывая ужасы современной войны, в [SCOPE.sState('panum_red_cross_state').GetCustom('RU_SL_PP')] был основан «Международный комитет обществ помощи по уходу за ранеными». Его цель — действовать в разных странах, чтобы помогать раненым на войне. Посланник спросил, не желает ли наша нация также присоединиться к этому объединению."
 panum.3001.g: "Мы вступаем в эту организацию в качестве члена-основателя."
 panum.3001.h: "Интересно."
 panum.3002.d: "Осознав ужасы современной войны, швейцарский коммерсант Анри Дюнан основал «Международный комитет обществ помощи по уходу за ранеными». Его цель — действовать в разных странах, чтобы помогать раненым на войне."
 panum.3002.f: "В 1859 году швейцарский коммерсант Анри Дюнан случайно оказался на поле битвы при Сольферино. Потрясённый криками о помощи примерно 40 000 умирающих и раненых солдат, он начинает призывать добровольцев из окрестностей помогать пострадавшим — будь то друзья или враги. Его книга «Воспоминание о битве при Сольферино», вышедшая в 1862 году, донесла ужасы современной войны до широких масс. Правительства и граждане проявляют интерес к ограничению войны. 17 февраля 1863 года комитет из пяти человек, в который входил Дюнан, основал Международный комитет Красного Креста. Делегаты из 16 стран встретились на 1-й Женевской конференции с 26 по 29 октября 1863 года, чтобы развить идеи Дюнана. Красный крест на белом флаге становится международным символом защиты для помощников. В 1901 году Дюнан получил первую в мире Нобелевскую премию мира."
 panum.3011.t: "Конвенция города [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]"
 panum.3011.d: "В городе [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] была созвана международная конференция для установления защиты раненых, нейтралитета медицинского персонала и Красного Креста как символа защиты."
 panum.3011.f: "«Но женщины Кастильоне, видя, что я не делаю различий между национальностями, последовали моему примеру, проявляя ту же доброту к этим людям столь разного происхождения, и все они были для них чужестранцами. „Tutti fratelli“, — с чувством повторяли они. Слава этим женщинам, этим девушкам Кастильоне! Невозмутимые, неутомимые, непоколебимые, их тихое самопожертвование превозмогало усталость и ужасы, и их собственную преданность». — Анри Дюнан"
 panum.3011.g: "Конвенция города [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]. Звучит неплохо."
 panum.3012.t: "Договоры, заключённые в городе [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]"
 panum.3012.d: "В городе [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] была назначена международная конференция для содействия разоружению и распространения предыдущих норм международного права для сухопутной войны на войну на море."
 panum.3012.f: "«Нравственное осознание важности человеческой жизни; гуманное желание хоть немного облегчить муки всех этих несчастных или восстановить их пошатнувшееся мужество; яростная и неустанная деятельность, которую человек проявляет в такие моменты; всё это вместе создаёт своего рода энергию, которая даёт положительное стремление помочь как можно большему числу людей.\n\nБольше нет скорби при многочисленных сценах этой страшной и торжественной трагедии». — Анри Дюнан"
 panum.3012.g: "Договоры, заключённые в городе [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]. Звучит неплохо."
 panum.3013.t: "Протокол, принятый в городе [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]"
 panum.3013.d: "В городе [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')] была созвана международная конференция с целью запретить использование отравляющих газов на войне."
 panum.3013.f: "«Поскольку новые и ужасные методы разрушения изобретаются ежедневно, с упорством, достойным лучшего объекта, и поскольку изобретатели этих орудий разрушения получают аплодисменты и поощрение в большинстве великих европейских государств, которые вовлечены в гонку вооружений; и поскольку, наконец, умонастроение в Европе в сочетании со многими другими симптомами указывает на перспективу будущих войн, избежать которых, рано или поздно, кажется почти невозможным, ввиду всего этого, почему бы не воспользоваться временем относительного спокойствия и тишины для исследования и попытки решить вопрос столь огромной и всемирной важности, как с гуманной, так и с христианской точки зрения?» — Анри Дюнан"
 panum.3013.g: "Протокол, принятый в городе [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_convention_title')]. Звучит неплохо."
 panum.3021.t: "Медик Красного Креста"
 panum.3021.d: "После чрезвычайно кровопролитного поражения в полевом госпитале [SelectLocalization(SCOPE.sCharacter('panum_new_physician_scope').IsFemale, 'отличилась', 'отличился')] медик. [SelectLocalization(SCOPE.sCharacter('panum_new_physician_scope').IsFemale, 'Она', 'Он')] принадлежит к Красному Кресту и, возможно, призвана к чему-то большему, чем просто полевая служба."
 panum.3021.f: "«В одной из больниц Кремоны итальянский врач сказал: „Мы оставляем хорошее для наших друзей из союзной армии, а врагам даём самое необходимое. Если они умрут, тем хуже!“ и добавил, чтобы оправдать эти варварские слова, что он слышал от итальянских солдат, вернувшихся из Вероны и Мантуи, будто австрийцы оставляли раненых франко-сардинской армии умирать без помощи. Благородная дама из Кремоны, графиня..., услышав слова врача и с величайшим рвением посвятив себя больницам, поспешила выразить своё неодобрение, заявив, что она уделяет абсолютно такое же внимание австрийцам, как и союзникам, и не делает различий между друзьями и врагами. Ибо, сказала она, „Господь наш Иисус Христос не делал таких различий между людьми в благодеяниях“». — Анри Дюнан"
 panum.3021.g: "Добро пожаловать, доктор [SCOPE.sCharacter('panum_new_physician_scope').GetLastName]."
 panum.740.t: "Ещё одним детским страхом меньше"
 panum.740.d: "После долгих усилий доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] наконец [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'написала', 'написал')] свой трактат об успешном методе лечения [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]. Это считается вехой в #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFlag|l]ой#! медицине."
 panum.740.f: "Медицинский факультет с нетерпением ждал научную работу о методе лечения, который описал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] доктор [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]. В своём трактате [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] описывает целый ряд эффективных мер по борьбе со скарлатиной. Современная медицина предлагает множество вариантов для эффективного сдерживания скарлатины даже после вспышки болезни. Ключевую роль играет недавно изобретённый антитоксин. Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] назвал работу [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]."
 panum.740.g: "Бесчисленные родители теперь будут спать спокойнее."
 panum.741.t: "Тест [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]"
 panum.741.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'разработала', 'разработал')] процедуру, названную в [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] честь, которая определяет, есть ли у пациента иммунитет к скарлатине."
 panum.741.f: "Тест Дика, разработанный в 1924 году Джорджем Ф. Диком и Глэдис Дик, использовался для выявления людей, восприимчивых к скарлатине. Тест заключался во введении разведённого штамма стрептококков, вызывающих скарлатину; реакция на коже в месте инъекции указывала на восприимчивость к развитию болезни. Реакцию можно было увидеть через четыре часа после инъекции, но более заметной она становилась через 24 часа. Если реакции не было, считалось, что человек не подвержен риску заболевания, так как у него выработался иммунитет."
 panum.741.g: "Полезная процедура."
 panum.742.t: "Сыворотка от скарлатины"
 panum.742.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'разработала', 'разработал')] эффективную сыворотку против скарлатины, которую [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она получила', 'он получил')] из лошадиной крови."
 panum.742.f: "Сыворотка от скарлатины начала применяться в ноябре 1900 года после её разработки в Серотерапевтической лаборатории больницы Рудольфа в Вене, Австрия. Сыворотку получали из крови лошадей. Доктор Пауль Мозер вводил её инфицированным детям под кожу живота. Смертность от скарлатины значительно снизилась после начала использования сыворотки. Антитоксин Мозера снизил смертность от скарлатины на 40%."
 panum.742.g: "Лошадиная кровь? Фу."
 panum.743.t: "Антитоксин"
 panum.743.d: "После нескольких тестов доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'уверена', 'уверен')], что [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она создала', 'он создал')] антитоксин, эффективный против скарлатины."
 panum.743.f: "«Несмотря на недавние важные достижения в знаниях и лечении скарлатины, эта столь feared болезнь сделала большой скачок по сравнению со своей сезонной распространённостью. При своевременном применении антитоксин облегчит опасность скарлатины и её частых последующих осложнений. Однако у болезни всё ещё есть аспекты, которые делают её искоренение чрезвычайно желательным. Было установлено, что увеличение доз токсина, вводимых восприимчивым лицам, сделает таких людей невосприимчивыми»."
 panum.743.g: "Решительный прорыв!"
