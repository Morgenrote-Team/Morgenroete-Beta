 je_panum_measles: "Эпидемия кори"
 je_panum_measles_reason: "Корь — высококонтагиозное заболевание, известное своей типичной красной кожной сыпью. Оно может иметь катастрофические последствия, особенно для населения, не имеющего предварительного иммунитета. Будучи сверхрегиональным заболеванием, корь может распространяться на другие территории.\n\nИзобретение #ORANGE антибиотиков#! имеет особое значение в борьбе с корью. С этой технологией [concept_panum_physician] может найти #V метод лечения кори#!. Поможет только очень хорошая система здравоохранения. Всё это ведёт к лучшей профилактике и лечению болезни.\n\nК сожалению, изобретение #V вакцины против кори#! выходит за рамки викторианского периода."
 je_panum_scarlet: "Эпидемия скарлатины"
 je_panum_scarlet_reason: "Скарлатина — распространённое заболевание, которое до начала XX века было одной из самых частых причин смерти среди детей.\n\nИзобретение #ORANGE антитоксинов#! имеет особое значение в борьбе со скарлатиной. С этой технологией [concept_panum_physician] может найти #V метод лечения скарлатины#!. Поможет хорошая система здравоохранения. Всё это ведёт к лучшей профилактике и лечению болезни.\n\nРазработка #V вакцины против скарлатины#! [Concept('concept_theiler_biologist', '#b #GREEN биологом#!#')] возможна, но очень сложна."
 je_panum_plague: "Эпидемия чумы"
 je_panum_plague_reason: "Бубонная чума ассоциируется с «чёрной смертью» Средневековья, одной из худших катастроф в истории. Считалось, что она исчезла, пока не появилась снова в конце XIX века. В странах с низким уровнем благосостояния и слабой системой здравоохранения чума может распространяться на несколько территорий.\n\nИзобретение #ORANGE антитоксинов#! имеет особое значение в борьбе с чумой. С этой технологией [concept_panum_physician] может найти #V метод лечения чумы#!. Поможет даже примитивная система здравоохранения. Всё это ведёт к лучшей профилактике и лечению болезни.\n\nЧтобы победить чуму раз и навсегда, необходима #V вакцина против чумы#!, которую разрабатывает [concept_theiler_biologist]."
 je_panum_diphteria: "Эпидемия дифтерии"
 je_panum_diphteria_reason: "Дифтерия — опасное заболевание, которое может привести к опасным для жизни осложнениям и долгосрочным последствиям. Из-за высокой детской смертности и связанных с ней проблем с дыханием дифтерию прозвали «душащим ангелом детей». Последствия остаются локализованными.\n\nИзобретение #ORANGE антитоксинов#! имеет особое значение в борьбе с дифтерией. С этой технологией [concept_panum_physician] может найти #V метод лечения дифтерии#!. Поможет только хорошая система здравоохранения. Всё это ведёт к лучшей профилактике и лечению болезни.\n\nЧтобы победить дифтерию раз и навсегда, необходима #V вакцина против дифтерии#!, которую разрабатывает [concept_theiler_biologist]."
 je_panum_polio: "Полиомиелит"
 je_panum_polio_reason: "Полиомиелит — это заболевание, которое в первую очередь поражает детей, часто приводя к смерти или пожизненным физическим осложнениям. Хотя в прошлом он встречался лишь спорадически, полиомиелит стал эндемичным в XIX веке. Полиомиелит не распространяется за пределы области, где он возникает.\n\nИзобретение #ORANGE антитоксинов#! имеет особое значение в борьбе с полиомиелитом. С этой технологией [concept_panum_physician] может найти #V метод лечения полиомиелита#!. Поможет только хорошая система здравоохранения. Всё это ведёт к лучшей профилактике и лечению болезни.\n\nК сожалению, изобретение #V вакцины против полиомиелита#! выходит за рамки викторианского периода."
