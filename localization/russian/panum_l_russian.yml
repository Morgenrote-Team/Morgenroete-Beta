 panum.52.t: "Медицинская наблюдательная экспедиция"
 panum.52.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] собрал небольшую команду экспертов и ассистентов для тщательного наблюдения за эпидемией за границей и извлечения из неё выводов. Теперь возникает вопрос, какую болезнь и в какой стране следует изучать."
 panum.52.f: "Существует два различных типа медицинских экспедиций, которые может предпринять врач: наблюдательные и исследовательские. Наблюдательные экспедиции помогают составить описание болезни, а исследовательские — найти метод лечения. Однако экспедиция не так эффективна, как исследования на месте, и может потребоваться несколько попыток, чтобы полностью изучить болезнь."
