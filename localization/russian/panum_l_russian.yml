 je_panum_functionalism: "Психологическая школа функционализма"
 je_panum_functionalism_reason: "Функциональная психология или функционализм — это психологическая школа мысли, которая является прямым outgrowth дарвиновского мышления, фокусирующая внимание на полезности и цели поведения, которое было изменено за годы человеческого существования. Эдвард Л. Торндайк, наиболее известный своими экспериментами с обучением методом проб и ошибок, стал известен как лидер этого слабо определённого движения. Функционализм отрицает принцип интроспекции, который стремится исследовать внутренние механизмы человеческого мышления, а не понимать биологические процессы человеческого сознания.\n\nКаждая страна может основать только #R одну#! психологическую школу."
 je_panum_psychoanalysis: "Психологическая школа психоанализа"
 je_panum_psychoanalysis_reason: "Психоанализ — это психологическая теория, культурная теория, психотерапевтическая форма лечения и метод самосознания, который был разработан около 1890 года венским врачом Зигмундом Фрейдом. Термин «психоанализ» означает модель описания и объяснения человеческой психики, основанную на теориях Фрейда о психодинамике бессознательного, а также для аналитической психотерапии и для психоаналитической методологии, которая также занимается исследованием культурных явлений. Во всех трёх аспектах психоанализ продолжает развиваться и изменяться клиницистами и исследователями сегодня.\n\nКаждая страна может основать только #R одну#! психологическую школу."
 je_panum_analytical_psychology: "Психологическая школа аналитической психологии"
 je_panum_analytical_psychology_reason: "Аналитическая психология — это психоаналитически обоснованная психологическая школа, основанная швейцарским психиатром Карлом Густавом Юнгом в 1913 году. Подобно психоанализу, она занимается бессознательными частями человеческой психики, исходя из предположения, что бессознательное имеет гораздо большее влияние, чем сознательное восприятие. Юнг и его последователи особенно подчёркивали символические возможности выражения бессознательного и пытались использовать их психотерапевтически.\n\nКаждая страна может основать только #R одну#! психологическую школу."
 je_panum_behaviorism: "Психологическая школа бихевиоризма"
 je_panum_behaviorism_reason: "Бихевиоризм — это научная теоретическая концепция изучения и объяснения поведения людей и животных с помощью научных методов, то есть без интроспекции или эмпатии. Бихевиоризм был основан Джоном Б. Уотсоном в начале XX века после важной предварительной работы Эдварда Ли Торндайка. Иван Петрович Павлов также провёл важную новаторскую работу со своими экспериментами по классическому обусловливанию поведения. В США сторонники бихевиоризма десятилетиями были самыми влиятельными исследователями поведения в университетах и ярыми противниками психоаналитических школ, которые возникали в то же время.\n\nКаждая страна может основать только #R одну#! психологическую школу."
 panum_functionalism_school_founded_tt: "Психологическая школа функционализма была основана в другой стране."
 panum_psychoanalysis_school_founded_tt: "Психологическая школа психоанализа была основана в другой стране."
