 panum.1001.t: "Новая эпидемия"
 panum.1001.d: "Полиомиелит — заболевание, которое в XIX веке было известно под многими разными названиями. Шокирующие новости приходят из [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_RP')]: всё больше случаев полиомиелита заканчиваются параличом и смертью. То, что раньше было единичными случаями, теперь, похоже, происходит регулярно. Полиомиелит стал эпидемическим заболеванием."
 panum.1001.g: "Тревожные новости."
 panum.1002.d: "Несколько газет независимо друг от друга сообщают, что в [SCOPE.sState('panum_disease_country').GetCustom('RU_SL_PP')] бушует тяжёлая эпидемия полиомиелита. Болезнь, которая ранее встречалась лишь в единичных случаях, похоже, переросла в эпидемию!"
 panum.1003.t: "Жестокая эпидемия"
 panum.1003.d: "Эпидемия полиомиелита в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] оказалась особенно тяжёлой. Число смертей растёт с каждым днём."
 panum.1003.f: "«Утром третьего дня меня госпитализировали, это было первое или второе сентября, на завтрак у меня были хлопья, сок и шоколадное молоко. Я помню, как пыталась взять шоколадное молоко, и оно просто выпало из моей руки. Я чувствовала себя так плохо, потому что больше не могла двигаться. Медсёстры тут же вбежали и убрали беспорядок. Я помню, что хотела шоколадное молоко, но не получила его. Вместо этого мне принесли соломинку, и я выпила немного сока. После этого в мою комнату вошли несколько врачей и заставили меня считать в обратном порядке, 10-9-8-7-6, столько, сколько я помню. В то время я лежала, потому что мне было трудно сидеть».\n\nМэрилинн Р., выжившая после полиомиелита."
 panum.1003.g: "Неужели нет лекарства?"
 panum.1004.t: "Сломленное поколение"
 panum.1004.d: "Чем дольше длится эпидемия в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')], тем очевиднее становится: целое поколение будет вынуждено жить с увечьями и параличом."
 panum.1004.f: "«Я очень хорошо помню день, когда мне поставили диагноз полиомиелит. В то утро я был на уроке физкультуры в школе, и мы играли в американский футбол на поле. Я заметил, что когда я бежал, моя нога становилась слабой или как бы подкашивалась. Я не придал этому особого значения, но позже в тот же день я играл с марширующим оркестром средней школы на благотворительном параде в поддержку больных полиомиелитом в Хиббинге, что примерно в 30 милях от Колрейна, где я вырос. Во время марша на этом параде мои ноги снова ослабли. На самом деле, они были настолько слабыми, что мне пришлось выйти из строя, и я вернулся в школьный автобус, чтобы прилечь».\n\nДэвид К., выживший после полиомиелита."
 panum.1004.g: "Последствия этого будут ощущаться ещё долго..."
 panum.1005.t: "Выжившие после полиомиелита"
 panum.1005.d: "Те, кто пережил эту эпидемию, как говорят, хранят в себе глубокий гнев. Это форма мести болезни, которая так опустошила этих людей. В нашей стране появляется всё больше ассоциаций выживших после полиомиелита."
 panum.1005.f: "«Быть другим очень трудно, когда ты в старшей школе. В итоге я просто не участвовала во многих вещах, в которых, вероятно, участвовала бы, если бы не моя инвалидность. Я бы хотела попробовать себя в чирлидинге, но люди смеялись надо мной, даже когда я просто говорила об этом. Поэтому я держала многие чувства в себе. Я не хотела идти на танцы, потому что стеснялась своей хромоты. Я не хотела, чтобы люди пялились на меня, когда я иду по танцполу. Я ненавидела, когда на меня глазели и смеялись. Я думаю, все подростки стеснительны, но когда у тебя есть какая-то физическая инвалидность, это действительно усиливает эту стеснительность. До сих пор я ненавижу, когда люди пялятся на мою ногу, когда я ношу шорты».\n\nГейл Б., выжившая после полиомиелита."
 panum.1005.g: "Гражданское общество объединяется против полиомиелита."
 panum.1006.t: "Политик учреждает фонд по борьбе с полиомиелитом"
 panum.1006.d: "Перед лицом свирепствующей эпидемии полиомиелита, скорбящих родителей, искалеченных и мёртвых, [SCOPE.sCharacter('panum_opposition_leader').GetFullName] выступил[SelectLocalization(SCOPE.sCharacter('panum_opposition_leader').IsFemale, 'а', '')] с планом создания фонда для борьбы с болезнью. Критики говорят, что [SelectLocalization(SCOPE.sCharacter('panum_opposition_leader').IsFemale, 'она', 'он')] просто пытается улучшить свою политическую репутацию."
 panum.1006.f: "Президент США Франклин Д. Рузвельт регулярно бывал в курортном городе Уорм-Спрингс с 1924 года и умер здесь в 1945 году. В 1921 году у него случился паралич ног, который считался спинальным полиомиелитом; согласно более поздним исследованиям, это был синдром Гийена-Барре, который в то время был ещё мало известен. Рузвельт основал Фонд Джорджии Уорм-Спрингс в 1927 году, основной задачей которого изначально было лечение спинального паралича. Сегодня это учреждение называется Институт реабилитации Рузвельта в Уорм-Спрингс и заботится о пациентах со всеми видами инвалидности в двадцати шести различных отделениях."
 panum.1006.g: "Настоящий филантроп."
 panum.1006.h: "А предстоящие выборы — это чистое совпадение, я полагаю?"
 panum.1009.t: "Всеобщая паника"
 panum.1009.d: "Несмотря на все усилия местных властей в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')], население начало поддаваться одной из самых опасных составляющих любой эпидемии: панике."
 panum.1009.f: "В субботу, 17 июня 1916 года, в Бруклине, Нью-Йорк, было сделано официальное объявление о существовании эпидемии полиомиелита. В том году в США было зарегистрировано 27 363 случая и 7 130 смертей от полиомиелита, из них более 2 000 смертей только в Нью-Йорке. Эпидемия 1916 года вызвала widespread панику, и тысячи людей бежали из города в близлежащие горные курорты; кинотеатры были закрыты, встречи отменены, общественные собрания почти прекратились, а детей предупреждали не пить из фонтанчиков и избегать парков развлечений, бассейнов и пляжей."
 panum.1009.g: "Проклятый страх!"
 panum.1010.t: "Карантин"
 panum.1010.d: "Хотя неясно, является ли полиомиелит заразным заболеванием, в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] всё громче звучат призывы ввести карантин, чтобы предотвратить его распространение."
 panum.1010.f: "Болезнь наносила удар без предупреждения и требовала длительных карантинных периодов, во время которых родителей разлучали с детьми: невозможно было сказать, кто заболеет, а кто останется невредим. Имена и адреса людей с подтверждёнными случаями полиомиелита ежедневно публиковались в прессе, их дома помечались табличками, а их семьи помещались в карантин."
 panum.1010.g: "Это принесёт больше вреда, чем пользы."
 panum.1010.h: "Ввести строгий карантинный режим."
 panum.1020.t: "Эпидемия полиомиелита заканчивается"
 panum.1020.d: "Клиники в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] сообщают, что число случаев полиомиелита заметно снизилось. Последствия эпидемии будут беспокоить регион ещё долгие годы."
 panum.1020.f: "«Я не больна. Я сломлена. Но я счастлива быть живой, пока могу рисовать», — Фрида Кало."
 panum.1022.t: "Начало полиомиелита"
 panum.1022.d: "Сегодня доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] представил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] краткое изложение симптомов, которые возникают при вспышке раннего полиомиелита."
 panum.1022.f: "«Здоровые и в основном цветущие дети в возрасте от 6 до 36 месяцев, в исключительных случаях немного старше, заболевают после ранее безупречного здоровья, либо с предварительными намёками на недомогание, либо без них, такими как: закатывание глаз, внезапное проявление жара, застойные и раздражительные состояния, лихорадка, жажда, капризность, плач, сонливость без настоящего сна, а иногда и с симптомами нарушенного течения острых, экзантематозных процессов. Вскоре после этого начинаются судороги более или менее сильной степени, которые повторяются с короткими или длинными интервалами.\n\nВ других случаях болезнь появляется внезапно без перечисленных симптомов, с судорогами или тошнотой, обмяканием тела, пеной у рта и носа, посинением и т. д.\n\nИногда, однако, все эти симптомы отсутствуют или проявляются в очень слабой степени, и паралич наступает медленно и незаметно»."
 panum.1040.t: "К познанию болезни Гейне-Медина"
 panum.1040.d: "Сегодня доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] представил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] медицинскому факультету революционную работу, которая послужит отправной точкой для взятия под контроль эпидемий полиомиелита и улучшения лечения выживших."
 panum.1040.f: "В своей работе «К познанию болезни Гейне-Медина» доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] упомянул[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] несколько аспектов, которые должны помочь предотвратить и сдержать распространение полиомиелита. Ключевое открытие заключается в том, что полиомиелит — это инфекционное заболевание. Помимо мер, вытекающих из этого, существует также множество методов помощи пациентам. Высокобелковые диеты, программы физиотерапии и новые изобретения, такие как «железное лёгкое», дают новую надежду на то, что полиомиелит, возможно, и не будет искоренён, но в будущем с ним можно будет справляться лучше."
 panum.1040.g: "Нам нужен Зал славы борьбы с полиомиелитом."
 panum.1041.t: "Физиотерапия"
 panum.1041.d: "Доктор встречает медсестру, которая переворачивает [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] прежние знания о лечении полиомиелита с ног на голову."
 panum.1041.f: "«И как долго вы этим занимаетесь?»\n«Десять лет, доктор».\n«Вы подкладываете пациентам грелки?»\n«Да, доктор».\n«И вы говорите, это помогает?»\n«Ваш скептицизм не может скрыть успех. Дело не только в грелке. Нужны массажи и упражнения на расслабление. Мышца, на которую наложена шина, больше не развивается. Ей нужно движение».\n«Хм-м-м...»"
 panum.1041.g: "Но... больным полиомиелитом нужен покой и стабилизация!"
 panum.1042.t: "Улица"
 panum.1042.d: "При осмотре очага вспышки полиомиелита доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] действует систематически."
 panum.1042.f: "«Если проследить за распространением полиомиелита, бушующего в городе [SCOPE.sState('panum_disease_state').GetCityHubName], нельзя не заметить интересное открытие. Случаи нанизаны, как жемчуг на нитку. Можно идти по дороге и видеть случаи один за другим. Мне удалось проследить хронологическое возникновение вдоль железнодорожной линии в этом районе. Это не совпадение».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.1042.g: "Но достаточно ли этого доказательства для инфекции?"
 panum.1043.t: "Приход"
 panum.1043.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] посетил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] отдалённую общину в зоне эпидемии, чтобы продолжить свои исследования причин полиомиелита."
 panum.1043.f: "«49 случаев в этой общине?»\n«Как мэр, я с сожалением должен это признать, доктор».\n«Когда вы составляли карту мест возникновения этих случаев в приходе, вы что-нибудь заметили?»\n«При всём уважении, я не учёный».\n«Болезни распространяются из одной точки. Это деревенская школа»."
 panum.1043.g: "Возможно, полиомиелит не наследственное, а заразное заболевание?"
 panum.1044.t: "Филантропия"
 panum.1044.d: "Выжившие после полиомиелита обратились к доктору [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. Они хотели бы поддержать научную работу, связанную с исследованием полиомиелита, с помощью фонда."
 panum.1044.f: "В начале XX века полиомиелит был болезнью, которая встревожила широкие слои общества, потому что её причины были неизвестны, и даже средний или высший классы могли быть затронуты. Некоторые выжившие после полиомиелита, ставшие состоятельными, также всю жизнь боролись с этой болезнью и поддерживали частные и правительственные инициативы. Полиомиелит — это болезнь, в борьбе с которой филантропия сыграла важную роль."
 panum.1044.g: "Ценная поддержка."
 panum.1044.h: "Деньги должны в равной степени пойти на исследование вакцины."
 panum.1044.i: "Деньги фонда также пойдут на пользу общим исследованиям."
 panum.1045.t: "Антибиотики"
 panum.1045.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'добилась', 'добился')] успеха в лечении полиомиелита с помощью антибиотиков."
 panum.1045.f: "«Лекарства от полиомиелита не существует. И, к сожалению, я не вижу, как это будет возможно в будущем. Может быть только профилактика, исследование причин и предотвращение распространения — и лечение для облегчения симптомов. Антибиотики могут помочь защитить ослабленные мышцы от инфекций. Это шаг в правильном направлении. Надеюсь, последуют и другие».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.1045.g: "Слава антибиотикам!"
 panum.1046.t: "Социальное изгойство"
 panum.1046.d: "В своей реформаторской статье доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] указал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] своим академическим коллегам, что реинтеграция выживших после полиомиелита означает больше, чем просто излечение, лечение или облегчение болезни. Социальная стигма индивидов должна быть уменьшена — и устранена."
 panum.1046.f: "«Я помню, что самой большой проблемой для меня было сесть в школьный автобус. Та первая ступенька в автобус казалась милей, и я просто не могла её преодолеть. Некоторое время моя мама выходила, и это было так неловко, потому что она приносила эту табуретку. Но я не могла вынести смущения, поэтому мой папа и водитель автобуса (его звали Билл, и я его отчётливо помню) собрались вместе и обсудили, как они могут решить эту проблему. Мой папа выкопал траншею в земле там, где останавливался автобус. Билл заезжал передним колесом автобуса в эту траншею, и это опускало ступеньку так, что она была очень близко к земле. Тогда я могла просто сесть в автобус без проблем. И никто особо не замечал...»\n\nДженнифер У., выжившая после полиомиелита."
 panum.1046.g: "Выжившие после полиомиелита — не граждане второго сорта."
 panum.1047.t: "Цена прогресса"
 panum.1047.d: "В своём исследовании причин эпидемий полиомиелита, происходящих уже много лет, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'пришла', 'пришёл')] к неприятной правде."
 panum.1047.f: "«Полиомиелит известен с древних времён, но — насколько позволяют мои исследования — до конца XIX века он не был эпидемическим заболеванием, каким является сегодня. Причина этого, если она подтвердится, парадоксальна: улучшение здравоохранения. До введения канализации и санитарии дети подвергались воздействию полиомиелита гораздо раньше, примерно в возрасте от 6 месяцев до 4 лет. В этот период болезнь протекает мягче и обеспечивает иммунитет. Чем старше человек, инфицированный полиомиелитом, тем выше вероятность паралича. Улучшение стандартов здравоохранения привело к тому, что у меньшего числа людей развился иммунитет, и они стали более уязвимы к опасным последствиям болезни».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.1047.g: "Болезнь распространяется потому, что общественное здравоохранение улучшилось?"
 panum.1048.t: "Бацилла или вирус?"
 panum.1048.d: "О возбудителе полиомиелита пока ничего не известно. Из-за этого доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] оказывается в оживлённом споре с коллегами."
 panum.1048.f: "Хотя полиомиелит был известен давно и с развитием микробиологии стало ясно, что это патоген, мнения о том, являются ли это бактерии или вирусы полиомиелита, долгое время расходились."
 panum.1048.g: "Всё указывает на вирус."
 panum.1048.h: "Эта бесполезная болтовня отвлекает доктора от работы!"
 panum.1049.t: "Принятие инвалидных колясок"
 panum.1049.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'обнаружила', 'обнаружил')], что важно не только предоставлять пациентам инвалидные коляски — они также должны быть социально приняты, чтобы выжившие после полиомиелита могли легко реинтегрироваться в нормальную жизнь."
 panum.1049.f: "«Я был очень наивен, поступая в колледж, и был удивлён, обнаружив, что университет не приспособлен для человека в инвалидной коляске. Но так было тогда. Везде были ступеньки, и это было не так, как в старшей школе, где у меня была группа друзей, которые носили меня... Много раз мне приходилось собирать группу добровольцев или просто просить людей, спешащих с занятий на занятия, и иногда они говорили: „У меня просто нет времени. Я не могу вам помочь“. Мне пришлось жить в квартире за пределами кампуса, потому что ни одно из общежитий не было доступным».\n\n Дэвид К., выживший после полиомиелита."
 panum.1049.g: "Мы поддерживаем кампанию за большее принятие инвалидных колясок."
 panum.1049.h: "Профинансировать программу по добавлению пандусов для инвалидных колясок в общественных зданиях."
 panum.1051.t: "Советы по полиомиелиту"
 panum.1051.d: "Рекомендация по лечению полиомиелита, циркулирующая в академическом мире, доставляет доктору [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] немало хлопот в попытках отстоять [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] собственные тезисы о лечении полиомиелита."
 panum.1051.f: "«Давать кислород через нижние конечности, с помощью положительного электричества. Частые ванны с использованием миндальной муки или окисления воды. Применение припарок из римской ромашки, скользкого вяза, арники, горчицы, кантариса, масла сладкого миндаля и, что особенно ценно, масла нарда и ксантокслинума. Внутрь принимать кофеин, Fl. Kola, сухой муриат хинина, эликсир цинхоны, радиевую воду, хлорид золота, известковую воду и вино пепсина».\n\nДоктор Анжелика Хазенбайн, «Монография об эпидемии полиомиелита (детского паралича)»."
 panum.1051.g: "Это на самом деле звучит очень убедительно."
 panum.1052.t: "Гипсовые повязки и шины"
 panum.1052.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] узнал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] от нескольких «экспертов по полиомиелиту», что шины для ног — лучший способ улучшить исходное состояние пациентов, но [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] не убежден[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')]."
 panum.1052.f: "Пациентов с остаточным параличом лечили шинами и учили компенсировать утраченную функцию с помощью калиперов, костылей и инвалидных колясок. Использование таких устройств, как жёсткие шины и гипсовые корсеты, которые, как правило, вызывали атрофию мышц из-за ограниченного движения пользователя, также рекламировалось как эффективное лечение. Большинство этих методов лечения оказались малоэффективными."
 panum.1052.g: "Может быть, это поможет...?"
 panum.1053.t: "Бесполезная хирургия"
 panum.1053.d: "Хирурги заверили доктора [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], что хирургические процедуры оказывают положительное влияние на полиомиелит."
 panum.1053.f: "«Я [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'провела', 'провёл')] бесчисленные часы, опрашивая коллег, изучая книги и осматривая пациентов, чтобы убедить себя в успехе хирургических вмешательств при полиомиелите. Врачи очень гордятся своими результатами. То, как они справляются с увечьями, напоминает точную механику, которая, по их мнению, настраивает часовой механизм. Они используют точные инструменты для работы с человеческими машинами. Но у меня сложилось впечатление, что здесь в центре внимания не болезнь, не пациент — а репутация врачей. До сих пор мне не известен ни один случай, когда этот метод действительно приводил к успешному лечению полиомиелита».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.1053.g: "Ложный след."
 panum.1054.t: "Сыворотка реконвалесцентов"
 panum.1054.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] испробовал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] широко разрекламированную сыворотку, которая считается эффективным средством в современной медицине против полиомиелита. Хотя [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] коллеги убеждены в этом методе, доктор считает это пустой тратой времени."
 panum.1054.f: "«В то время у них было некоторое представление о том, что это инфекционное заболевание, поэтому мне давали так называемую „сыворотку реконвалесцентов“, которую делали из крови людей, выздоровевших от полиомиелита. Этот вид лечения был тогда в моде. Маловероятно, что он имел какой-либо эффект, поскольку болезнь прогрессировала до довольно выраженного паралича без движения в обеих ногах и без движения в мышцах живота. Меня поместили в изоляцию, и, кажется, мне сказали, что у меня полиомиелит. Однако я не знал, что такое полиомиелит. Никто не сказал мне, что у меня детский паралич, что я бы узнал, потому что в то время президентом был Рузвельт, и я знал, что он страдал от значительного паралича из-за этой болезни».\n\nРичард О., выживший после полиомиелита."
 panum.1054.g: "Но ведь каждый врач это прописывает?"
 panum.1055.t: "Изоляция"
 panum.1055.d: "Помимо фиксации конечностей, некоторые эксперты по полиомиелиту считают целесообразным полностью изолировать пациентов. Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] сам[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] проводил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] такие эксперименты — и [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'пришла', 'пришёл')] к выводу, что это неэффективная и бесчеловечная терапия."
 panum.1055.f: "«После того, как была сделана пункция спинного мозга и поставлен диагноз полиомиелит, меня немедленно поместили в изоляцию и сказали, что я не должна поднимать голову. Я помню, что меня положили в детскую кроватку! Мне было девять лет, и я не могла понять, почему меня положили в детскую кроватку. Это было очень унизительно. Я, конечно, не собиралась вылезать из кровати, и вряд ли бы перевернулась и выпала. На самом деле, я едва могла двигаться. Лёжа в этой кроватке, я чувствовала, как вирус по-настояшему захватывает меня. Это было как будто захлопнулась дверь. Я чувствовала, что мой мир полностью изменился. Что ещё хуже, было ужасно жарко и влажно, и, конечно, это было до появления кондиционеров; я помню, как мне было очень неудобно...»\n\nШэрон К., выжившая после полиомиелита."
 panum.1055.g: "Это недопустимо!"
 panum.1055.h: "Это может стать началом второй карьеры."
 panum.1055.i: "Пусть эти записи быстро исчезнут."
 panum.1056.t: "Постполиомиелитный синдром"
 panum.1056.d: "Во время недавнего обследования доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'обнаружила', 'обнаружил')], что после собственно полиомиелита, включая его последствия, могут возникать отдалённые последствия в виде постполиомиелитного синдрома. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')] в полном отчаянии от этого открытия."
 panum.1056.f: "«Когда мне было около 35 или 40 лет, у меня начались ужасные боли в суставах и мышцах. Я очень легко уставала. Я пошла к врачу, сделала рентген и анализы крови. Мне дали какие-то таблетки и назначили физиотерапию. Ничего не помогало.\nПока я ждала, когда они найдут записи, я объяснила человеку, который мне помогал, что у меня появились все эти новые боли, и я надеялась, что записи помогут объяснить почему. Ну, она спросила, слышала ли я о постполиомиелитном синдроме. Я сказала: „Нет, что это?“ Она объяснила, что примерно через 30 или 40 лет после того, как у тебя был полиомиелит, это как будто ты заболеваешь им снова.\nМысль о том, чтобы снова столкнуться с полиомиелитом, была для меня невыносимой. Я просто сломалась. Я позвонила своей невестке и рассказала ей, что узнала. Я также рассказала своей семье. Я много плакала. Я показала своим местным врачам свои медицинские записи и объяснила о своём приёме в Институте сестры Кенни. Они снова сказали мне, что полиомиелит — это дело прошлого. Я сказала: „Да, но я здесь сейчас, и я переживаю это снова!“\n\nДженис Г., выжившая после полиомиелита."
 panum.1056.g: "Какая безнадёжная ситуация."
 panum.1061.t: "Эксперименты"
 panum.1061.d: "В сомнительном, но не менее успешном эксперименте доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] заразил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] обезьян полиомиелитом."
 panum.1061.f: "«Недавно я читал о процедуре, которую Жан-Антуан Вильмен использовал для доказательства заразности туберкулёза. Он проводил эксперименты на кроликах, намеренно приводя их в контакт с тканью больных туберкулёзом. Десятки мёртвых кроликов спустя он смог доказать свою теорию. Мой эксперимент с обезьянами основан на аналогичном предположении».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.1061.g: "Если можно заразить животных, то и люди могут заражать друг друга."
 panum.1062.t: "Железное лёгкое"
 panum.1062.d: "Блестящий инженер [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName] помог[SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'ла', '')] доктору [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] построить гениальное устройство, которое произвело революцию в лечении полиомиелита."
 panum.1062.f: "«Железное лёгкое» было одним из первых клинических устройств, обеспечивающих механическую вентиляцию лёгких человека. Около 1920 года американский инженер Филип Дринкер разработал его для вентиляции пациентов с заболеваниями лёгких. Тело пациента, за исключением головы, полностью находится внутри полого цилиндра. Устройство герметично закрывает шею и создаёт отрицательное давление. Это заставляет окружающее давление проталкивать воздух через нос и рот пациента в лёгкие. Выдох происходит соответственно за счёт создания избыточного давления в камере. Многим больным полиомиелитом «железное лёгкое» требовалось только в острой фазе заболевания до возобновления мышечной функции. Некоторые пациенты использовали их только на ночь, другие — постоянно."
 panum.1062.g: "Это может спасти много жизней."
 panum.1063.t: "Психологическая поддержка"
 panum.1063.d: "Будучи психиатром, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] использовал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] свой опыт, чтобы облегчить жизнь больным полиомиелитом."
 panum.1063.f: "«Мы справедливо обращаем внимание на физический компонент болезни, когда говорим о полиомиелите. Но рядом с повреждённым телом есть и повреждённая душа. Полиомиелит оставляет не только физические следы. Особенно при работе с детьми [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я видела', 'я видел')] влияние, которое эта ужасная болезнь оказывает на их личную и социальную жизнь. Слова не могут исцелить. Но они могут принести облегчение. И мы должны дать выжившим перспективу, чтобы они не только выжили, но и имели волю к жизни».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.1063.g: "Спасибо, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]."
 panum.1064.t: "Диета"
 panum.1064.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] выступает за богатую питательными веществами диету для больных полиомиелитом."
 panum.1064.f: "«Предыдущие успехи в борьбе с рахитом, йододефицитом, цингой и пеллагрой показали, что наша диета может играть решающую роль в борьбе с болезнями. Полиомиелит — это не болезнь дефицита. Но известно, что белки играют важную роль в построении мышц, и поэтому важно отметить, что диета больных полиомиелитом должна быть богаче, чем у обычных людей».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.1064.g: "Наконец-то справка от врача для поедания стейков."
