 je_panum_medical_system_project: "Расширить медицинскую систему"
 je_panum_medical_system_project_reason: "Врачу, который должен расширять медицинскую систему, предстоит работать в основном на местах для улучшения здравоохранения. Но там также необходима административная инфраструктура. Здесь полезен врач с выгодными талантами, которые производят впечатление на бюрократию. Его навыки и опыт определяют ежемесячный прогресс в создании и строительстве новых госпиталей и клиник.\n\nВрачи сначала попытаются создать клиники в особенно хорошо развитых областях, прежде чем перейти к клиникам в менее развитых регионах. Врачи предпочтут область с самым высоким уровнем административных зданий.\n\nКаждый раз, когда шкала прогресса заполняется, активируется новый госпиталь/клиника, и работа продолжается в следующей подходящей области. Врачи будут активировать как можно больше клиник и госпиталей в качестве метода производства, пока либо не останется областей с необходимыми требованиями, либо пока работа не будет остановлена вручную."
 panum.2101.t: "Медицинская система расширена"
 panum.2101.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'завершила', 'завершил')] свою работу по расширению и обновлению местных медицинских учреждений. Врач снова доступен для других видов деятельности."
 panum.2101.f: "«Медицина — это социальная наука, а политика — не что иное, как медицина в большом масштабе», — Рудольф Вирхов."
 panum.2101.g: "Снова за работу."
 panum.2102.t: "Специализированная клиника в [SCOPE.sState('panum_clinic_state').GetCustom('RU_SL_PP')]"
 panum.2102.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] завершает создание, первой в нашей стране, специализированной клиники в городе [SCOPE.sState('panum_clinic_state').GetCityHubName]. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она объявила', 'Он объявил')], что будет руководить ею [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'сама', 'сам')] и специализироваться в одной области — хотя пока неясно, на какой именно."
 panum.2102.f: "«Медицинское образование существует не для того, чтобы дать студентам способ зарабатывать на жизнь, а для того, чтобы обеспечить здоровье общества», — Рудольф Вирхов."
 panum.2102.g: "Хирургия."
 panum.2102.h: "Психиатрия."
 panum.2102.i: "Эпидемиология."
 panum.2102.j: "Военная медицина."
 panum.2102.k: "Общая медицина."
 panum.2103.t: "Госпиталь в [SCOPE.sState('panum_clinic_state').GetCustom('RU_SL_PP')]"
 panum.2103.d: "Сегодня, при большом общественном интересе и в присутствии прессы, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'открыла', 'открыл')] в городе [SCOPE.sState('panum_clinic_state').GetCityHubName] первый в стране современный госпиталь, который знаменует собой поворотный момент благодаря своим операционным и современному медицинскому оборудованию."
 panum.2103.f: "«Проклятие человечества в том, что оно по привычке учится терпимо относиться даже к самым ужасным ситуациям», — Рудольф Вирхов."
 panum.2103.g: "Браво!"
