 je_panum_disease_investigation: "Обследование болезни"
 je_panum_disease_investigation_reason: "Иногда может случиться так, что врач во время своих обычных медицинских исследований погружается в исследование очень специфического заболевания. Это не эпидемическое заболевание, а скорее повседневные болезни, детские болезни или широко распространённые болезни. Примерами этого являются рахит, камни в почках или сифилис.\n\nВ отличие от других случаев, врач проводит это исследование попутно, что означает, что он не занят и доступен для дальнейших действий. Если врач умирает, проект не теряется, а приостанавливается до тех пор, пока его не возьмёт на себя другой врач."
 panum_woolsorters_disease_modifier: "Болезнь сортировщиков шерсти"
 panum_litholapaxy_modifier: "Литолапаксия"
 panum_salvarsan_modifier: "Сальварсан"
 panum_tetanus_antitoxin_modifier: "Противостолбнячный антитоксин"
 goods_output_meat_mult: "Производство @meat! мяса в сооружениях"
 goods_output_meat_mult_desc: "Бонус или штраф к количеству @meat! мяса, производимого сооружениями"
 panum.2221.t: "Болезнь сортировщиков шерсти"
 panum.2221.d: "При изучении так называемой «болезни сортировщиков шерсти» доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] обнаружил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')], что на самом деле это сибирская язва."
 panum.2221.f: "Сибирская язва у людей встречалась в основном как профессиональное заболевание у работников кожевенных заводов и у людей, обрабатывающих мех, щетину и волосы, а также у портовых и транспортных рабочих, которые работали с этими материалами. Пик заболеваемости приходился на времена кризиса в кожевенной промышленности, когда всё больше дешёвых шкур животных импортировалось из регионов с небольшим или отсутствующим ветеринарным контролем забоя. Долгое время таинственное происхождение болезни было неизвестно. Считалось, что это отравление, и люди называли её «болезнью сортировщиков шерсти». С развитием микробиологии и внедрением микробной теории были установлены фактические связи между чрезвычайно разрушительной для экономики болезнью животных и смертельной болезнью для людей, что привело к новым нормам и правилам, направленным на обеспечение защиты рабочих."
 panum.2221.g: "Принять строгие защитные меры."
 panum.2222.t: "Зобная болезнь"
 panum.2222.d: "После обследования нескольких человек в отдалённых горных долинах с гигантскими зобами доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] экспериментировал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] с лечением с использованием йода. После нескольких попыток терапия сработала."
 panum.2222.f: "В альпийских регионах Штирии, Тироля и Швейцарии, а также в других горных регионах или в английском Мидлендсе зоб был повседневным заболеванием. Рано возникло подозрение, что образование зоба связано с водой на определённой территории. Парацельс подозревал недостаток определённых минералов и рекомендовал пить воду, содержащую свинец. В древнем Китае врачи рекомендовали есть морские водоросли и губки. С лучшим пониманием функции щитовидной железы и важности йода, наконец, начались первые лечебные усилия. С 1918 года швейцарский врач Отто Байярд ввёл йодированную соль путём правильно дозированного добавления йодида калия в поваренную соль в общинах своей врачебной практики в долине Николаиталь и показал, что это устраняет нарушения развития, увеличение щитовидной железы, а также образование зоба и узлов без каких-либо нежелательных эффектов и повреждений и может успешно лечиться."
 panum.2222.g: "Так это болезнь, связанная с питанием!"
 panum.2223.t: "Нефролитиаз"
 panum.2223.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] разработал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] процедуру для успешного оперирования пациентов с камнями в почках."
 panum.2223.f: "Камни в почках — явление, известное на протяжении всей истории человечества; от них страдал даже Наполеон. Хотя со времён Ренессанса было разработано несколько процедур по удалению камней в почках, операция оставалась опасной. Американский хирург Генри Джейкоб Бигелоу добился прорыва: он ввёл медицинскую технику литолапаксии. В 1878 году он опубликовал «Литотрипсия за одну операцию», в которой описал свою методику «дробления и удаления камня из мочевого пузыря за один приём». До этого хирурги дробили камень в мочевом пузыре, а затем тратили всего несколько минут на удаление осколков. С этим новым методом смертность снизилась примерно с 24% до 2,4%."
 panum.2223.g: "У меня мурашки по коже от одной мысли об этом."
 panum.2224.t: "Пеллагра"
 panum.2224.d: "Как обнаружил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] после многих лет исследований, пеллагра — это болезнь, вызванная недостатком никотиновой кислоты."
 panum.2224.f: "После того как Христофор Колумб открыл Америку, кукуруза была одним из первых растений, привезённых в Европу, где она быстро распространилась благодаря высокой урожайности. Вскоре в районах с высоким потреблением кукурузы появилась странная болезнь, названная «шершавая кожа» по ключевому симптому, пеллагра. Связь между пеллагрой и высоким потреблением кукурузы (например, в виде поленты) впервые была заподозрена в XVIII веке. Объяснения того времени включали плесневелую или отравленную кукурузу, инфекцию или наследственность. Затем Джозеф Голдбергер и его коллеги в начале XX века доказали, что как так называемая пеллагра у людей, так и болезнь «чёрный язык» у собак возникают из-за недоедания, что Конрад Эльвехем смог отнести к дефициту никотиновой кислоты. Открытие того, что пеллагру можно лечить пивными дрожжами, привело к резкому сокращению числа пациентов психиатрических больниц в пострадавших районах."
 panum.2224.g: "Просто результат несбалансированного питания?"
 panum.2225.t: "Рахит"
 panum.2225.d: "После многих лет изучения пациентов с рахитом доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] приш[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ла', 'ёл')] к выводу, что костное заболевание связано с дефицитом питательных веществ — и рекомендует рыбий жир и солнечный свет в качестве профилактики."
 panum.2225.f: "Хотя со временем было много научных описаний рахита, его причины долгое время оставались неизвестными. В девятнадцатом веке ведущие патологоанатомы предлагали различные причины рахита, включая врождённый сифилис и отцовскую туберкулёзную инфекцию. Настоящее современное понимание патофизиологической основы рахита началось только в начале двадцатого века. В 1919 году Эдвард Мелланби открыл и опубликовал статью о «4-м витамине», заявив: «Рахит — это болезнь дефицита, которая развивается вследствие отсутствия какого-либо дополнительного пищевого фактора или факторов. Поэтому кажется вероятным, что причиной рахита является сниженное потребление антирахитического фактора, который является либо жирорастворимым фактором А, либо имеет схожее с ним распределение»."
 panum.2225.g: "Мы говорим о витамине D?"
 panum.2226.t: "Сифилис"
 panum.2226.d: "Сифилис, древний бич человечества, похоже, скоро будет взят на цепь наукой — доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] утверждает, что изобрел[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] чудодейственное лекарство с помощью самых современных медицинских методов."
 panum.2226.f: "До начала XX века сифилис лечили в основном токсичной ртутью, которую наносили на большие участки тела пациента, что, помимо прочих нежелательных эффектов, обычно приводило к полной потере волос на теле и всех зубов, а также к быстрому упадку всех функций организма. Ртуть уже использовалась несколько веков назад как более или менее эффективное терапевтическое средство против проказы и различных других кожных заболеваний. Эксперименты с препаратами мышьяка, такими как атоксил и арсацетин, а также с препаратом 418 (арсенофенилглицин), который был успешен только в экспериментах на животных и был разработан и испытан Паулем Уленгутом и Паулем Эрлихом в 1907/1908 годах, потерпели неудачу, в основном из-за серьёзных побочных эффектов. В 1909 году Сахатиро Хата и Пауль Эрлих разработали органическое соединение мышьяка арсфенамин (Сальварсан), которое стало первой попыткой целенаправленного химиотерапевтического лечения сифилиса."
 panum.2226.g: "Сальвав... что?"
 panum.2227.t: "Столбняк"
 panum.2227.d: "После нескольких тестов доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] объявил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] сегодня, что [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] наш[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ла', 'ёл')] антитоксин против столбняка."
 panum.2227.f: "Столбняк был хорошо известен древним цивилизациям, которые признавали связь между ранами и смертельными мышечными спазмами. В 1884 году Артур Николаер выделил стрихниноподобный токсин столбняка из свободноживущих, анаэробных почвенных бактерий. Он обнаружил возбудителя столбняка в почве, инокулируя садовую почву подопытным животным. Этиология заболевания была дополнительно выяснена в 1884 году Антонио Карле и Джорджо Раттоне, двумя патологоанатомами Туринского университета, которые впервые продемонстрировали передаваемость столбняка. В 1891 году C. tetani был выделен из человеческой жертвы Китасато Сибасабуро, который позже показал, что организм может вызывать заболевание при введении животным, и что токсин может быть нейтрализован специфическими антителами. В 1890 году Китасато и Эмиль фон Беринг наконец преуспели в получении специфического противостолбнячного антитоксина, который мог обеспечить иммунитет к столбняку у животных. С этим производством антитоксина Беринг заложил основу для «сывороточной терапии» (а также с открытием дифтерийного антитоксина, также в 1890 году)."
 panum.2227.g: "Кто бы мог подумать, что садовая земля может быть такой опасной?"
 country_panum_kidney_stone_treatment_success_chance_mult: "Шанс успеха лечения камней в почках"
 country_panum_syphilis_treatment_success_chance_mult: "Шанс успеха лечения сифилиса"
 panum.922.t: "Круп"
 panum.922.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] обнаружил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')], что многие врачи обычно не могут отличить довольно безобидный круп от опасной дифтерии, и в своей статье подчеркнул[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] различия."
 panum.922.f: "Когда прусский врач Авраам Якоби отметил на медицинской конференции в 1860 году, что в Нью-Йорке было около 122 случаев дифтерии, его коллеги были поражены: они вообще не диагностировали дифтерию за тот же период. Недостаток знаний в области детских болезней был одной из причин основания первых детских больниц в США, в которых дифтерия играла особую роль. Якоби считается отцом американской педиатрии."
 panum.923.t: "Кожистая гортань"
 panum.923.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] определил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] одной из основных особенностей дифтерии кожистую псевдомембрану, которая распространяется на гортань и вызывает удушье. Эта характеристика типична для болезни и позволяет отличить её от других."
 panum.923.f: "«Мы можем установить идентификацию злокачественной ангины четырьмя способами:\n\nПутём обширных исследований патологической анатомии болезни, причём в течение нескольких месяцев было проведено шестьдесят вскрытий;\n\nпутём клинических наблюдений, посредством которых мы доказали, что ангина, если её предоставить самой себе, почти неизменно стремится поразить гортань и таким образом вызвать симптомы крупа;\n\nпутём химического исследования, с помощью которого он доказал идентичность по составу ложной мембраны в глотке с таковой в трахее;\n\nпутём изучения работ ранних авторов»."
 panum.940.t: "Противоядие от дифтерии"
 panum.940.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] сегодня публично объявил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')], что эксперименты с произведённым [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ей', 'им')] дифтерийным антитоксином увенчались полным успехом."
 panum.940.f: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] объяснил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] изумлённой толпе, что [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она использовала', 'он использовал')] ослабленный дифтерийный токсин для заражения лошадей и, в свою очередь, получения из их крови сыворотки, которая была высокоэффективна в борьбе с дифтерией. Хотя это большой шаг вперёд, [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] также подчеркнул[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')], что это не следует путать с вакциной, поскольку она не активирует иммунную систему пациента. «Здесь ещё предстоит много работы», — сказал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. Но все родители, которые по ночам боялись за жизнь своих задыхающихся детей, теперь смогут спать гораздо спокойнее."
 panum.940.g: "Мы перекрыли дифтерии воздух, прежде чем она сделает то же самое с нами."
 panum.941.t: "Перхлорат железа"
 panum.941.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] наш[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ла', 'ёл')] в старых записях, что перхлорат железа рекомендовался как средство от дифтерии. На самом деле, похоже, он имеет эффект."
 panum.941.f: "«Удивительно, но этот алхимический рецепт оказал влияние на некоторых пациентов. По-видимому, это одно из немногих средств от дифтерии».\n\nКраткая заметка доктора [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о дифтерии"
 panum.941.g: "Но действительно ли это нас куда-то приведёт?"
 panum.942.t: "Интубация"
 panum.942.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'попыталась', 'попытался')] дать пациенту воздух через интубацию. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она добилась', 'Он добился')] небольшого успеха в борьбе с дифтерией."
 panum.942.f: "«Процесс сложен и критичен, но любая подсказка в борьбе с дифтерией мне сейчас полезна».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], заметка о дифтерии"
 panum.942.g: "Но ведь это не может быть долгосрочным решением?"
 panum.943.t: "Трахеотомия"
 panum.943.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] имеет довольно неоднозначный опыт с трахеотомией, хотя все [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] коллеги-медики используют эту хирургическую процедуру для лечения дифтерии."
 panum.943.f: "«Я, хоть убей, не могу понять, как все эти эксперты по дифтерии — или, по крайней мере, те, кто себя таковыми считает — смогли сообщить о каком-либо успехе. Труссо утверждает, что спас жизни почти половины своих пациентов с дифтерией, но по моему профессиональному опыту это менее одного из десяти».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], заметка о дифтерии"
 panum.943.g: "И что теперь?"
 panum.944.t: "Ртуть"
 panum.944.d: "К сожалению, лечение дифтерии ртутью закончилось именно так, как и ожидал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] — отравлением."
 panum.944.f: "«[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Должна', 'Должен')] ли я был[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] знать лучше? Да! Но специальная литература не оставляет сомнений в том, что ртуть веками помогала от дифтерии. Якобы! С этого момента я нахожу другие средства, которые якобы помогают: нитрат серебра, например. Или соляная кислота! Кто-нибудь вообще по-настоящему занимался этой болезнью?»\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], заметка о дифтерии"
 panum.944.g: "Всё это звучит ещё смертоноснее, чем дифтерия."
 panum.945.t: "Кровопускание"
 panum.945.d: "Эксперты рекомендуют хорошее кровопускание при дифтерии. Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] попробовал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] это сам[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] в двух случаях — и обнаружил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')], что метод скорее контрпродуктивен."
 panum.945.f: "«Ослаблять ослабленного пациента ещё больше было бы всё равно, что сломать ещё одну опору на мосту с одной шаткой опорой. То, что понимает каждый инженер, в медицине считается ересью».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], заметка о дифтерии"
 panum.945.g: "И никакого улучшения?"
 panum.951.t: "Хрип в ночи"
 panum.951.d: ""
 panum.951.f: "Солнце уже скрылось за домами. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ш[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ла', 'ёл')] в тени. Ещё один день, окончившийся провалом. Ещё трое мёртвых детей. Та же причина смерти. Даже если пик эпидемии миновал, оставался риск, что детская смерть продолжит бродить по улицам, вонзая свою косу в маленькие горла. Удушье было одной из самых жестоких форм смерти.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] годами специализировал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ась', 'ся')] на эпидемиях. Но дифтерия была иной. Не просто детская болезнь вроде кори или скарлатины, которая могла пройти без последствий. Дифтерия заставляла детей задыхаться. Дифтерия душила их по ночам, словно ангел-мститель.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] объявил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] войну дифтерии. Но война казалась безнадёжной. С каждым шагом вперёд болезнь отбрасывала [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] назад. Все известные методы оказались бесполезны. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она боролась', 'Он боролся')] со смертью. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она боролась', 'Он боролся')] с самим дьяволом.\n\nИ оба они заставили [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] познать отчаяние и бессилие. Это случилось в ту ночь, когда [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она вернулась', 'он вернулся')] домой, и знакомый хрип встретил [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] в темноте. В доме был пациент, которого не было в списке. Дифтерия добралась до [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] улицы. До [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] дома.\n\nДо кровати [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] сына."
 panum.951.g: "Эксперименты доктора...?"
 panum.952.t: "Лечение дифтерии"
 panum.952.d: ""
 panum.952.f: "Отчаянный, судорожный глоток. Звук, к которому [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] уже привык[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ла', '')]. Обычный глоток едва слышен, но это была та самая агония, которую [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] слышал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] уже бессчётное число раз. Этот звук врезался в память. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она могла', 'Он мог')] положить холодную ткань на лоб своего сына. Мог[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ла', '')] говорить с ним успокаивающим голосом.\n\nНо сделать для него что-то по-настоящему — не мог[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ла', '')]. Не больше, чем для всех остальных. Для десятков других, уже мёртвых детей.\n\nУж кто-кто, а [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] знал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] истинную цену этим лекарствам от дифтерии. Ртуть, что отравляет тело. Нитрат серебра и перхлорат железа с их сомнительным эффектом. Трахеотомия — венец хирургического искусства, — которая почти всегда заканчивалась провалом.\n\n[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')] проходил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] через это так часто. Но сейчас всё было иначе. Речь шла уже не о болезни, а о [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ней самой', 'нём самом')]. Эта ненавистная эпидемия мстила. Мстила за то, что [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она осмелилась', 'он осмелился')] ей сопротивляться. За то, что [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она хотела', 'он хотел')] искоренить её, так же как она искореняла детей. Болезнь хотела отнять самое дорогое. Не честь врача, не надежду на исцеление.\n\nНочной хрип возвращается. Жидкости поблёскивают в маленьких флаконах. В лунном свете сверкает скальпель."
 panum.952.g: "Лечить мальчика перхлоратом железа."
 panum.952.h: "Провести трахеотомию."
 panum.952.i: "Изучить образец ткани под микроскопом."
 panum.953.t: "Удушающий ангел"
 panum.953.d: ""
 panum.953.f: "Хрипа больше не было. Тот самый звук, что мучил, и научил бояться, — исчез. Но облегчения не было. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] презирал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] этот звук. Теперь же [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] желал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] вернуть этот ненавистный шум.\n\nНаступила тишина. Мёртвая, кладбищенская, высасывающая жизненную силу. Тишину можно было слышать и чувствовать. Она наполняла тело пустотой. Это не было противоречием. Это было логично. Это было эмпирически.\n\nНо логика и эмпирика подвели [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] в ту ночь. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Её', 'Его')] пальцы сжимали холодную детскую ручку. Бледную, как лунный свет, что пробивался сквозь окна. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она бросила', 'Он бросил')] вызов дифтерии.\n\nИ дифтерия втоптала [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в грязь и с наслаждением мучила [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')], потому что [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] высокомерие ослепило [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')]."
 panum.953.g: "Доктору будет трудно с этим справиться."
 panum.954.t: "Не гортань, а сердце и глаза"
 panum.954.d: ""
 panum.954.f: "Луна скрылась. Снова взошло солнце. Прошли дни в чередовании ночной темноты и задёрнутых штор. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ждал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] у постели. До тех пор [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] не лечил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] пациентов. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Её', 'Его')] работа была сосредоточена не на людях, а на болезнях. Было легко вводить нитрат серебра, экспериментируя с ним; было легко вводить сыворотку, когда это был просто тест; и было легко делать операцию на трахее, когда лечишь не человека, а просто кожу, просто мышцы, просто плоть, просто кость.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] раньше лечил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] болезни. Дифтерия превращала людей в пациентов, истории — в медицинские карты, а страдания — в симптомы. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она хотела', 'Он хотел')] избавить людей от одышки. И всё же это был[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')], кто нуждался в исцелении. Не в гортани. А в [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] глазах и сердце.\n\n[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')] снова мог[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ла', '')] видеть. И кроткая улыбка сияла [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ей', 'ему')]."
 panum.954.g: "[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она сделала', 'Он сделал')] это!"
 panum.955.t: "Жертва"
 panum.955.d: ""
 panum.955.f: "Одна душа потеряна. Целый мир обретён. Микробы копошились под микроскопом. Микробы, подобные тем, что были найдены во многих других случаях. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')] до сих пор исключал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] это. Но это было самое разумное объяснение. У [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] сына не было контактов с больными дифтерией.\n\nТолько у [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'неё', 'него')]. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] сам[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] принёс[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ла', '')] микробы в этот дом. В течение дней. Возможно, недель. Не осознавая этого. От других десятков больных детей. От других десятков мёртвых детей.\n\nКоторые теперь стали богаче на одну жертву.\n\nУ [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] был образец. И у [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'неё', 'него')] были морские свинки и кролики, за которыми больше не ухаживал ни один ребёнок; с которыми больше не играл ни один ребёнок. Они будут жертвой. Так же, как и [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она принесла', 'он принёс')] жертвы. Если они заболеют, это будет доказательством. Речь шла об искоренении дифтерии. Это была цель, большая, чем [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она сама', 'он сам')].\n\nИ больше, чем любая другая цель."
 panum.955.g: "Жертва, которая не останется безнаказанной."
 panum.956.t: "Радикальное изменение теоремы"
 panum.956.d: ""
 panum.956.f: "[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] испытал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] сильный эмоциональный перелом за последние недели. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')], конечно, не назвал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] бы это коперниканским переворотом. Но редко какое-либо событие заставляло [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] так сомневаться в [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'себе', 'себе')] и [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'своих', 'своих')] методах. Бессилие перед лицом дифтерии оказывает долгосрочное влияние. И [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] знает, что она вернётся.\n\nТолько успешное, долгосрочное решение может предотвратить повторение этого эпизода.\n\nПоэтому в кабинете врача громоздятся очки. Громоздятся медицинские книги и трактаты. И лекарства. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Её', 'Его')] рука маниакально тянется ко всему, что якобы известно о дифтерии.\n\nКаждое предполагаемое лекарство. Каждое предполагаемое руководство. Каждый предполагаемый трактат.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] убирает со стола. Выбрасывает всё в мусор. Они все были неправы. Бретонно. Герсан. Труссо. Бошю. Давио!\n\nРасшифровать причину дифтерии означало наконец вылечить дифтерию. И после всего, что [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] до сих пор читал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] и пробовал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')], оставалась открытой только одна возможность. Дифтерия была заразной. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')] заразил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'своего', 'своего')] собственного сына после контакта с другими пациентами. Был агент. Неважно, что говорили эксперты.\n\nДолжен был быть возбудитель."
 panum.956.g: "Все усилия теперь сосредоточены на поиске возбудителя."
 panum.956.h: "Основное внимание исследований уже должно быть направлено на возможную вакцину."
 panum.961.t: "Токсин дифтерии"
 panum.961.d: ""
 panum.961.f: "Ключом был яд. Яд того вида, который выделяет возбудитель дифтерии. [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] слышал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')], что биолог экспериментирует с ним. Токсин был слишком силён, чтобы его остановить. Если заразить им животных, они умирали.\n\nНо [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] знал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')], что это информация, которая потрясёт научный мир. Об этом можно было прочитать в специализированных журналах. И были подражатели по всему миру, которые также выделяли токсин дифтерии в надежде вызвать иммунологический эффект у животного, не убивая его так же, как миллионы детей, чьи трупы лежали в качестве дани на алтаре дифтерии.\n\n[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')] будет расследовать. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Ей', 'Ему')] нужно было найти токсин. И провести [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'свои', 'свои')] собственные эксперименты. "
 panum.961.g: "Это, возможно, решающий шаг..."
 panum.961.h: "Этот процесс уже известен по производству токсина столбняка..."
 panum.961.i: "Правильное количество йода может помочь в этом."
 panum.962.t: "Антитоксин дифтерии"
 panum.962.d: ""
 panum.962.f: "Прорыв. Решительный прорыв, искупивший все жертвы, все страдания, все смерти, свидетелем которых [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ей', 'ему')] пришлось стать. Скорбящие родители, слёзные прощания, отчаяние и безнадёжность — всё это было не зря.\n\nРешение оказалось таким простым. И таким эффективным. Токсин нужно было ослабить — и раствор йода помог в этом. Лошади стали идеальными подопытными животными. Остальное было делом техники: животное вырабатывало иммунитет к токсину и становилось поставщиком спасительной сыворотки — антитоксина против дифтерии.\n\nКогда в тот день [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] держал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] в руке заветный флакон, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] почувствовал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] глубокое удовлетворение. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она провела', 'Он провёл')] первые испытания. Не все дети отреагировали. Но результат превзошёл самые смелые мечты. Теперь это оружие против невидимого врага нужно было производить в промышленных масштабах и распространять. В каждую клинику. В каждый врачебный кабинет.\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] еще не [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'окончила', 'окончил')] войну против дифтерии. Она только начиналась."
 panum.962.g: "Заказать как можно больше этой сыворотки!"
 panum.963.t: "Тень"
 panum.963.d: ""
 panum.963.f: "«Дифтерия должна быть искоренена! Она должна исчезнуть!»\n\nВозможно, эта мысль была маниакальной, но именно благодаря ей доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'продолжала', 'продолжал')] жить. Война, которую [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она вела', 'он вёл')], приносила свои плоды. Столько спасённых жизней! Столько детей, которые в другом мире умерли бы в агонии!\n\nБлаго многих перевешивало благо одного. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она отдала', 'Он отдал')] бы собственную жизнь, лишь бы уничтожить дифтерию. Но судьба была к [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ней', 'нему')] немилосердна. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')] не продавал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] душу дьяволу — [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она принесла', 'он принёс')] в жертву [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'своего', 'своего')] сына. Это был [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] выбор. Сделанный за него.\n\nС той ночи на [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'неё', 'него')] опустилась тень. Гнев на болезнь. Но [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] подавил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] его рациональными мыслями, утопив чувство вины в работе и мести. Однако несколько дней назад этот гнев угас. Парадоксально, но чем больше детей [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] спасал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')], тем яснее проступала правда.\n\n[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она увидела себя', 'Он увидел себя')]. И возненавидел[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] увиденное.\n\nСобственное высокомерие обмануло [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')]. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она верила', 'Он верил')], что спасает человеческие жизни, но при этом, как палач, решил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] судьбу одного. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')] даже не прикоснул[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ась', 'ся')] ни к скальпелю, ни к спасительному раствору. Образец и возбудитель оказались важнее пациента. Важнее человека. Важнее собственной плоти и крови.\n\nС тех пор это чувство не покидало [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')], вызывая лишь отвращение. В пустой квартире [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] единственными спутниками были грамоты, награды и фотографии с важными людьми. А ещё — пустая кровать. И мысль, что становилась всё громче, превращаясь в мучительную головную боль: «Я должен исчезнуть. Исчезнуть».\n\n«Сын мой. Дорогой мой сын...»"
 panum.963.g: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]... Доктор!"
 panum.640.t: "«Наблюдения, сделанные во время эпидемии кори»"
 panum.640.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] представил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] свои рекомендации по лечению кори, которые призваны лучше понять причины и пути передачи болезни, чтобы смягчить и предотвратить вспышки в будущем."
 panum.640.f: "«Инфекция очень быстро распространилась в густонаселённом Торсхавне, а оттуда на лодках была перенесена на другие острова. Поездки на рынки и обратно, посещение церкви и школы, а также перегоны скота способствовали распространению инфекции в другие деревни. Инфекция была занесена на Судурой из Торсхавна идентифицированным лицом, и при расследовании почти везде удалось доказать, как и кем инфекция была занесена в каждую деревню. Может ли инфекция передаваться через такие вещи, как одежда, бельё и письма, кажется довольно сомнительным, и я не видел и не слышал ни одного примера такой передачи во время эпидемии». — Петер Панум, «Наблюдения, сделанные во время эпидемии кори на Фарерских островах в 1846 году»"
 panum.640.g: "Новый Петер Панум!"
 panum.52.m: "Эпидемия скарлатины в [SCOPE.sCountry('panum_scarlet_country_scope').GetAltNameNoFlag('RU_CL_PP')]."
 panum.52.q: "Вообще-то, это плохой план..."
 panum_no_expedition_effect_tt: "Ваш [concept_panum_physician] снова свободен для выполнения других действий."
 panum.51.d: "[ROOT.Var('panum_physician_var').GetCharacter.GetFullName], один из ведущих умов медицинского общества [GetPlayer.GetAltNameNoFlag('RU_CL_RP')], согласил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ась', 'ся')] отправиться в область, поражённую эпидемией, и исследовать там болезнь. Доктор надеется, что это может привести к полному описанию заболевания."
 panum.53.d: "Бушующая эпидемия побудила [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] исследовать её более тщательно, чтобы определить причины и разработать новые методы лечения этой ужасной болезни."
