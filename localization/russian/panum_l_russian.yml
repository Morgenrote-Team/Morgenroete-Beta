 panum.51.t: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] отправляется в область с эпидемией"
 panum.51.f: "Полное описание болезни — это первый шаг к её пониманию и последующей борьбе с ней. Описания пока не оказывают прямого влияния на облегчение симптомов, но являются основой для будущего метода лечения. Врачи, изучающие эпидемию в своей стране, работают эффективнее, чем врачи, находящиеся в заграничной поездке."
