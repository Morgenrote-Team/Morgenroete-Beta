 je_panum_cholera_description_reason: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в настоящее время обследует нескольких пациентов, чтобы определить симптомы #YELLOW холеры#!. Крайне важно уметь отличать её от других, похожих или сопутствующих заболеваний. По окончании своей работы учёный сделает своё описание доступным для общественности, чтобы будущие поколения имели больше шансов распознать причины болезни и найти методы лечения."
