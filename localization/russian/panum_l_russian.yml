 setting_panum_dynamic_red_cross_rule_desc: "Красный Крест можно основать только через интерфейс врача. В результате он обычно появляется после исторической даты."
 panum_is_red_cross_member_tt: "Член [concept_panum_red_cross]"
 panum.3031.t: "Первая конвенция становится обязательной"
 panum.3031.d: "Подавляющее большинство членов Красного Креста согласились с Первой международной конвенцией об уходе за ранеными на войне. Теперь она является обязательной для всех членов."
 panum.3031.f: "Международные конвенции обычно являются необязательными декларациями о намерениях. Однако, если достаточное количество членов Красного Креста подпишет её, со временем она станет действующим международным правом, которое все подписавшие стороны должны соблюдать, — и другие члены также подпишут её. Это происходит, когда 65 процентов всех членов и большинство великих держав соглашаются с этой конвенцией — тогда все остальные члены вынуждены её соблюдать. Эту конвенцию тогда уже нельзя отменить как обычно. Чтобы избежать обязательных конвенций, необходим полный выход из Красного Креста — со всеми последствиями."
 panum.3031.g: "Создаётся глобально действующее международное право."
 panum.3032.t: "Вторая конвенция становится обязательной"
 panum.3032.d: "Подавляющее большинство членов Красного Креста согласились со Второй международной конвенцией о разоружении и ведении морской войны. Теперь она является обязательной для всех членов."
 panum.3033.t: "Третья конвенция становится обязательной"
 panum.3034.t: "Международная конвенция становится обязательной"
 panum.3034.d: "Подавляющее большинство членов Красного Креста согласились с конвенцией. Теперь она является обязательной для всех членов."
 panum.3034.g: "Мы проверим, отвечает ли это нашим интересам."
