 setting_panum_dynamic_spanish_flu_rule_desc: "В первой трети XX века в одной из промышленно развитых стран начнётся глобальный грипп. Пандемия будет названа в честь места происхождения."
 setting_panum_historical_spanish_flu_rule: "#V Исторический испанский грипп#!"
 setting_panum_historical_spanish_flu_rule_desc: "Пандемия начнётся в 1918 году и будет называться «испанский грипп»."
 setting_panum_no_spanish_flu_rule: "Без испанского гриппа"
 setting_panum_no_spanish_flu_rule_desc: "Пандемии, подобной испанскому гриппу, не будет."
 panum_spanish_flu_condition: "#tooltippable_name [GetGlobalVariable('panum_spanish_flu_originator_country').GetCountryDefinition.GetAdjective|l]ий#! грипп"
