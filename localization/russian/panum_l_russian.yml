 panum.840.t: "Тайна Чёрной смерти"
 panum.840.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] написал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] исчерпывающий трактат о причинах, передаче и мерах борьбы с чумой. Особо примечательное отступление касается роли крыс и блох."
 panum.840.f: "В своём трактате о чуме доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] обобщил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] многие новые открытия. Помимо рекомендации системы ротационной дезинфекции и сыворотки, специально разработанной [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ей', 'им')], [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она указывает', 'он указывает')] на связь между блохами как переносчиками чумной палочки и заражением крыс. Передача происходит от блохи к крысе, от крысы к крысе и от крысы к человеку."
 panum.840.g: "Древний враг внезапно становится укротимым."
 panum.841.t: "Замечательное распространение"
 panum.841.d: "В последние недели доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] подробно занимал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ась', 'ся')] первым появлением и местами распространения чумы."
 panum.841.f: "«В последние недели я заказывал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] карты в Департаменте торговли и сравнивал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] их с файлами моих коллег за рубежом. Врачи, утверждающие, что болезнь связана с определённым климатом или географией, ошибаются. Скорее, можно наблюдать волнообразное распространение на суше и распространение через самые узкие порты. Это не должно удивлять, поскольку Великая эпидемия чумы Средневековья также бушевала в Скандинавии, Средиземноморье и на Ближнем Востоке. Но убедит ли это моих коллег?»\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')] г."
 panum.841.g: "Значит, это мало связано с географией."
 panum.842.t: "Ротационная очистка"
 panum.842.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] опробовал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] новую процедуру, которая оказывается чрезвычайно эффективной."
 panum.842.f: "«Была предпринята попытка систематической дезинфекции города, но это оказалось очень дорогостоящим предприятием и было оставлено в пользу схемы „общей уборки домов“, в которой постоянно был задействован штат европейских санитарных инспекторов и кули. Районы обрабатывались поочерёдно, так что каждый многоквартирный дом убирался не реже трёх раз в год. Этот метод имеет все преимущества простоты, эффективности и экономии. Каждому инспектору ежедневно выделяется определённое количество этажей; жильцы выносят своё домашнее имущество, полы и кабинки моются, а доски кроватей очищаются в переносных железных баках. Проводится проверка на предмет мелких структурных нарушений, крысиные ходы и подобные отверстия немедленно заделываются цементом, а весь мусор вывозится».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], инструкции по лучшей дезинфекции [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_RP')]"
 panum.842.g: "Эту систему следует внедрить повсеместно."
 panum.843.t: "Интересная смертность"
 panum.843.d: "Просматривая статистику, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] обнаружил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')], что число смертей среди крысоловов непомерно высоко."
 panum.843.f: "«Глава агентства сказал мне, что я путаю корреляцию и причинно-следственную связь. В принципе, слишком много внимания уделялось заражению крыс перед вспышкой чумы, сказал он почти дословно. Я теперь всерьёз задаюсь вопросом, если бы большинство властей предполагало, что вспышки чумы связаны с крысами, придерживались бы они своей теории при аналогичном количестве признаков чисто тропической болезни. Вопиюще более высокая смертность среди крысоловов по сравнению с остальным населением — это для меня одна „корреляция“ слишком много».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')] г."
 panum.843.g: "Сколько ещё нужно доказательств?"
 panum.844.t: "Это крысы, глупец!"
 panum.844.d: "Во время более тщательного расследования вспышки чумы в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] выясняет, что до вспышки чумы все крысы в этом районе вымерли."
 panum.844.f: "«Я вижу много мёртвых крыс, лежащих на земле», — написал Александр Йерсен по прибытии в Гонконг 15 июня 1894 года. «Крысы, безусловно, являются настоящими распространителями эпидемии»."
 panum.844.g: "Смелый тезис."
 panum.845.t: "Образец"
 panum.845.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'смогла', 'смог')] взять образец ткани у жертвы чумы в морге. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Ей', 'Ему')] пришлось долго убеждать... Вернее, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ей', 'ему')] пришлось подкупить несколько человек, чтобы получить его."
 panum.845.f: "«Они лежат в своих гробах, которые полностью покрыты известью. Один гроб открывают. Я отодвигаю известь, чтобы обнажить область паха. Опухоль хорошо видна. Я вырезаю её менее чем за минуту». — Александр Йерсен"
 panum.845.g: "Мы возместим расходы."
 panum.851.t: "«Просто бедность и грязь»"
 panum.851.d: "Районный врач в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] от имени местных властей отверг текущие расследования, которые предоставил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], как безосновательные. Причины и методы лечения чумы «хорошо известны»."
 panum.851.f: "«Мы должны выразить наше удивление тем, что центральное правительство в столице [ROOT.GetCountry.GetCapital.GetCityHubName] сочло необходимым направить медицинского работника, хотя мы достаточно контролируем ситуацию. Меры по дезинфекции и санитарии оказали влияние, особенно уборка домов и улучшение условий жизни жителей. Яд, вероятно, развивается из атмосферных условий под домами в определённых районах, и что он вызван просто бедностью и грязью. В обычном смысле болезнь не является инфекционной или заразной».\n\nИз письма районного врача правительству"
 panum.851.g: "Успех говорит сам за себя..."
 panum.852.t: "Заражённая пища"
 panum.852.d: "Несколько учёных, в прямой полемике с которыми, участвовал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], ясно дали понять, что чума — это кишечное заболевание, вызванное плохим питанием."
 panum.852.f: "«Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting], возможно, располагает несколькими захватывающими теориями, но у [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'неё', 'него')] слишком мало опыта в борьбе с этой болезнью. Местные врачи в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] неоднократно призывали власти не подвергать сомнению устоявшиеся выводы. Факты таковы: 40 процентов больных чумой страдают от рвоты, ещё 30 процентов — от диареи, и почти 20 процентов — от болей в животе. В целом, желудочно-кишечные жалобы были задокументированы почти у 60 процентов пациентов. Поэтому ясно, что это инфекция пищеварительного тракта, и тем более ясно, что она, по-видимому, связана с испорченным, плохим или иным образом неполноценным питанием».\n\n"
 panum.852.g: "Доктор, что вы ответите?"
 panum.853.t: "Тропическая болезнь"
 panum.853.d: "Несколько всемирно известных врачей выдвинули теорию, что чума — это ещё одна тропическая болезнь, которая вряд ли возникнет за пределами определённых климатических зон, а если и возникнет, то только спорадически. Следовательно, это климатическое заболевание."
 panum.853.f: "«В прошлом мы уже обнаружили, что более прохладный климат приводил к утиханию волны чумы. Выводы ясны: чума — это болезнь, тесно связанная с климатическими изменениями. Метеорологические данные и сохранившиеся картины показывают, что последняя волна чумы происходила в значительно более тёплой среде, чем сегодня. Исчезновение чумы с конца XVII века коррелирует с похолоданием погоды до тех пор, пока чума полностью не исчезнет. С другой стороны, повышение температур в последние несколько лет коррелирует с распространением чумы в районах, которые ранее считались более холодными. Нужно ли мне продолжать?»\n\nПисьмо доктора Анжелики Хазенбайн, которое получил доктор [ROOT.Var('panum_physician_var').GetCharacter.GetFullNameNoFormatting]"
 panum.853.g: "Значит, просто вариант жёлтой лихорадки."
 panum.854.t: "Ложная чума"
 panum.854.d: "В последние несколько дней доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'посетила', 'посетил')] несколько больниц для осмотра пациентов. Как оказалось, они страдали не от чумы, а от тифа."
 panum.854.f: "«Чёрная смерть, тиф, холера, чахотка, бубонная чума... О, это были дни». — Неизвестный гробовщик"
 panum.854.g: "Прискорбно."
 panum.854.h: "Если мы теряем время, может быть, доктор сможет его использовать?"
 panum.861.t: "Опиум — не выход"
 panum.861.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] тщательно изучил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] предполагаемые лечебные эффекты опиума против чумных заболеваний и приш[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ла', 'ёл')] к однозначному выводу."
 panum.861.f: "«Это не работает».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. Заключение относительно использования опиума"
 panum.861.g: "Это одновременно и разочаровывает, и просвещает."
 panum.862.t: "Септицемия"
 panum.862.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] смог[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ла', '')] доказать, что несколько экспериментов, которые должны были предполагать желудочно-кишечное заболевание как причину чумы, были полностью неверно истолкованы."
 panum.862.f: "Взгляд на инфекцию через пищеварительный тракт из-за специально заражённой пищи был широко принят в течение нескольких лет, хотя были и те, кто считал «испарения от дыхания и кожи» наиболее важным этиологическим фактором. Было проведено большое количество экспериментов с кормлением животных чумным материалом, и это придало вес желудочно-кишечной гипотезе, поскольку многие животные и птицы умирали от септицемического заболевания, напоминающего чуму. Однако результаты были неубедительными и в конечном итоге были оспорены в Гонконге в 1904 году нынешним главным врачом, который выразил полное несогласие с этим мнением."
 panum.862.g: "Это серьёзный удар по теории о том, что чума была вызвана пищевым отравлением."
 panum.863.t: "Антибиотики"
 panum.863.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] смог[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ла', '')] показать в нескольких экспериментах, что больные чумой отлично реагируют на лечение антибиотиками, и настоятельно рекомендует этот подход."
 panum.863.f: "«Назвать мои эксперименты полным успехом было бы преуменьшением. На самом деле, я был[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] удивлен[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] тем, как работали антибиотики. Некоторые пациенты даже говорили, что чувствуют себя так, будто их исцелили. Если этот эффект подтвердится, поиск вакцины от чумы может стать ненужным».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')] г."
 panum.863.g: "Разве у антибиотиков нет недостатков?"
 panum.864.t: "Инсектициды"
 panum.864.d: "Широкомасштабное использование инсектицидов в очаге чумы не дало никакого эффекта. Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] считает, что это удивительный успех."
 panum.864.f: "«Вы правы, спрашивая, почему я рад[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] этой неудаче. Но учёные также учатся на предполагаемых поражениях. В этом смысле это было не поражение, а доказательство. Ряд моих коллег предположили, что чума может быть тропической болезнью, не похожей на малярию, которая, как было установлено, передаётся комарами. По крайней мере, мы можем отбросить это предположение».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в интервью в местной газете"
 panum.864.g: "На один вариант меньше."
 panum.865.t: "Уборные"
 panum.865.d: "Во время расследования гигиенических мер в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] обнаружил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')], что современная канализационная и уборная инфраструктура оставляет желать лучшего, особенно в заражённом чумой районе, и связал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ась', 'ся')] с местными властями."
 panum.865.f: "«Даже если ещё не до конца выяснено, как лучше всего бороться с чумой, и независимо от того, каковы мои личные теории и теории моих коллег, опыт показал, что полы, загрязнённые фекалиями, и стоячие загрязнённые воды в принципе должны быть устранены, будь то из-за миазмов, которые, как предполагается, из них возникают, или потому, что они являются очагами микробов. Если мы хотим контролировать не только чуму, но и другие источники болезней в будущем, то мы должны принимать превентивные меры».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в письме местному правительству"
 panum.865.g: "Это будет дорого, но это неизбежно."
 panum.870.t: "Bacillus Pestis"
 panum.870.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] исследовал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] образец ткани под микроскопом и окончательно определил: чума передаётся бациллой!"
 panum.870.f: "«20 июня 1894 года. Опухоли содержат, ясно и отчётливо видно, огромное количество бацилл. Они маленькие, короткие и с закруглёнными концами. Это, без сомнения, микроб чумы». — Александр Йерсен"
 panum.870.g: "Это всё меняет!"
 panum.871.t: "Блохи"
 panum.871.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], возможно, сделал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] одно из самых важных открытий в истории чумы: связь между блохами, крысами и вспышкой чумы."
 panum.871.f: "В [TimeKeeper.GetCurrentDate.Format('y')] году [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] открыл[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] вектор «крыса-блоха», который является движущей силой болезни. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она отметила', 'Он отметил')], что заболевшие люди не обязательно должны были находиться в тесном контакте друг с другом, чтобы заразиться. В Юньнани, Китай, жители бежали из своих домов, как только видели мёртвых крыс, а на острове Формоза (Тайвань) жители считали, что обращение с мёртвыми крысами повышает риск заболевания чумой. Эти наблюдения привели [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] к подозрению, что блоха может быть промежуточным фактором в передаче чумы, поскольку люди заболевали чумой только в том случае, если они контактировали с крысами, умершими менее чем за 24 часа до этого. В ставшем уже классическим эксперименте [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] продемонстрировал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')], как здоровая крыса умирала от чумы после того, как на неё перепрыгивали заражённые блохи с крысы, недавно умершей от чумы."
 panum.871.g: "Поразительно."
 panum.872.t: "Противочумная сыворотка"
 panum.872.d: "Основываясь на предыдущих знаниях о передаче и происхождении чумы, а также на экспериментах с чумной палочкой, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] разработал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] высокоэффективную противочумную сыворотку и успешно испытал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] её на первом пациенте."
 panum.872.f: "«С полуночи пациент становится спокойнее, а в шесть утра (...) он просыпается и заявляет, что чувствует себя исцелённым». — Александр Йерсен"
 panum.872.g: "Она работает!"
