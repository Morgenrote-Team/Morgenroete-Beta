 panum.440.t: "Тиф — социальная проблема"
 panum.440.d: "В своём трактате «[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]» доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] особо [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'подчеркнула', 'подчеркнул')], что тиф — это предотвратимое заболевание, когда политические и социальные силы работают вместе."
 panum.440.f: "«Стеснённые условия, кишащая вшами одежда и захудалые квартиры или солдатские комнаты представили мне памятную картину. Тиф был там повсюду. Где люди жили в таких же стеснённых условиях, но в гигиенических условиях больничной палаты, никакого распространения не наблюдалось. Медицину следует рассматривать не как заботу об отдельном человеке, а скорее с точки зрения общественного здравоохранения, что также подразумевает решение социальных проблем. Не может быть никаких сомнений в том, что такое эпидемическое распространение тифа, которое мы недавно видели, происходило только в таких условиях жизни, как бедность и отсутствие образования. Уберите эти обстоятельства, и я уверен, что мы увидим значительные улучшения в борьбе с болезнью».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в своём меморандуме правительству."
 panum.440.g: "Тиф теряет свой былой ужас."
 panum.441.t: "Вскрытие"
 panum.441.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'провела', 'провёл')] несколько вскрытий умерших от тифа в городе [SCOPE.sState('panum_disease_state').GetCityHubName] и [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'сделала', 'сделал')] важнейшие выводы."
 panum.441.f: "«Давно известно, что брюшной тиф и тиф — это два разных заболевания. Но всё ещё есть несколько исследователей, которые считают, что плохое питание, инфекция кишечного тракта или, по крайней мере, дефицит питательных веществ могут быть связаны со вспышкой тифа. Причины, связанные с питанием, всё ещё считаются возможной причиной многих заболеваний. Во время моих обследований [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я не нашла', 'я не нашёл')] ничего, что каким-либо образом указывало бы на расстройство пищеварения. Тиф не имеет ничего общего с питанием или пищеварением».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]: отчёт о вскрытии в [TimeKeeper.GetCurrentDate.Format('y')] году, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.441.g: "Но что же это может быть?"
 panum.442.t: "Немытые и всклокоченные"
 panum.442.d: "В своих поисках причины эпидемии тифа доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'поняла', 'понял')], что предыдущие выводы должны быть подвергнуты сомнению."
 panum.442.f: "«[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я несколько раз в своей карьере слышала', 'Я несколько раз в своей карьере слышал')], что плохая гигиена — это способ для миазмов или микробов — во что бы люди ни верили — закрепиться в одежде и способствовать болезни. Я считаю это сомнительным в деталях, но не в основном утверждении. Солдаты, каторжники, бедняки, преступники и проститутки относятся к классическим жертвам эпидемии тифа. Но являются ли немытые бедными, потому что хотят быть немытыми, или дело не в том, что они немытые, потому что они бедные? Я больше не хочу верить, что туберкулёз — это болезнь художника, так же как тиф поражает только преступников, потому что они морально порочны. Есть множество богатых преступников, которые не были затронуты тифом в эту эпидемию. Есть безгрешные священники в трущобах, которые жертвуют собой ради других и сами становятся жертвами болезни. Так какая же более убедительная связь между жертвами?»\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в [TimeKeeper.GetCurrentDate.Format('y')] году, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.442.g: "[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')] пытается утверждать, что тиф может поражать и честных людей?"
 panum.443.t: "Тепло и холод"
 panum.443.d: "После нескольких визитов в дома семей, страдающих тифом, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] приходит к выводу, что это не сезонное заболевание, как часто утверждают."
 panum.443.f: "«Существуют сезонные заболевания, и, похоже, это относится и к тифу. Предыдущие сообщения указывают на рост заболеваемости в холодные сезоны, что может также включать влажную весну или осень. Я думаю, доказано, что холод и жара влияют на заболеваемость. Зависит ли это от времён года — сомнительно. В тесной, отапливаемой комнате может быть так же тепло. Болезнь не возникала во всех местах в одно и то же время года. Если бы это было так, то не только определённые районы города, но и весь город должен был бы быть одинаково затронут. Но она всегда появлялась там, где люди были скучены. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я смогла', 'Я смог')] это установить во время нескольких домашних визитов».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в [TimeKeeper.GetCurrentDate.Format('y')] году, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.443.g: "Это противоречит предыдущим исследованиям."
 panum.444.t: "Пот и дыхание"
 panum.444.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] теперь полностью [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'убеждена', 'убеждён')], что тиф должен быть заразным заболеванием, даже если все обстоятельства ещё не выяснены."
 panum.444.f: "«В начале моего расследования [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я была', 'я был')] твёрдо [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'убеждена', 'убеждён')], что тиф не является заразным заболеванием. Однако по мере увеличения числа моих пациентов с тифом [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я всё больше убеждалась', 'я всё больше убеждался')] в заразности болезни и подчёркиваю заразительную природу пота. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я видела', 'Я видел')] санитара, который, брея умирающего пациента, вдохнул его дыхание. Санитар описал дыхание пациента как имеющее «тошнотворный вкус», и почти сразу же заболел. Аналогично, ассистент поддерживал другого пациента, который вскоре после этого умер, он почувствовал едкий пот пациента на своей коже, и ассистент сразу же заболел симптомами тифа. Ясно, что близость к больным тифом подвергает риску заражения».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в [TimeKeeper.GetCurrentDate.Format('y')] году, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.444.g: "Это может быть полезно, но действительно ли он передаётся от человека к человеку?"
 panum.445.t: "Это голод?"
 panum.445.d: "В ожесточённом споре с коллегой в городе [SCOPE.sState('panum_disease_state').GetCityHubName] доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'опровергла', 'опроверг')] его теории."
 panum.445.f: "«Это особый вид тифа, голодный тиф».\n\n«Голодный тиф?»\n\n«Можно наблюдать, что везде, где встречается тиф, царит недоедание. Соответственно, голод, или, вернее, голод, является триггером для тифа. Изменения в крови, вероятно, также имеют к этому отношение».\n\n«1726, 1727 и 1728 годы были годами голода, но тифа не было. 1829 год был благополучным, но тиф был. Понятно, что ослабленный организм более подвержен заболеваниям — но причина?»"
 panum.445.g: "Термин «голодная лихорадка», следовательно, неверен."
 panum.446.t: "Не место, а ситуация"
 panum.446.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] считает, что [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она обнаружила', 'он обнаружил')], что важно не столько то, как живут люди с тифом, сколько то, где они живут."
 panum.446.f: "«Во время моего визита в город [SCOPE.sState('panum_disease_state').GetCityHubName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я обнаружила', 'я обнаружил')], что вся болезнь затронула только одну часть города. Район известен своей бедностью и моральным разложением, что подтвердило некоторые теории о том, что тиф — это болезнь морально неполноценных личностей. Но, насколько я могу судить, дело в густонаселённом районе и экономическом положении пострадавших. По моему мнению, распространение болезни связано не с моральным разложением, а с физической близостью».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в [TimeKeeper.GetCurrentDate.Format('y')] году, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.446.g: "Это, по крайней мере, означает, что болезнь теоретически можно победить..."
 panum.447.t: "Вши"
 panum.447.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'выдвинула', 'выдвинул')] весьма спорную теорию, которая, хотя [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] и не может её доказать, может изменить понимание тифа в будущем."
 panum.447.f: "«Если [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я что-то и заметила', 'я что-то и заметил')] за время своих многочисленных наблюдений, так это то, что почти все пациенты были в завшивленном состоянии. Будь то солдаты в переполненных казармах, семьи с их бесчисленными детьми, каторжники в своих обветшалых камерах. Я больше не верю, что это совпадение. Конечно, мне не хватает доказательств. В последние годы несколько учёных снова и снова доказывали, что болезни могут передаваться между животными и людьми. Если в этой ситуации всё по-другому, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я была бы рада', 'я был бы рад')], если бы мне доказали обратное. А пока я считаю, что загадку тифа невозможно решить, не рассмотрев более подробно роль вшей».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в [TimeKeeper.GetCurrentDate.Format('y')] году, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.447.g: "Как может что-то столь крошечное вызывать такие разрушения?"
 panum.447.h: "Что-то столь крошечное должно вызывать такие разрушения."
 panum.448.t: "Гигиеничный госпиталь"
 panum.448.d: "Во время визита в образцовый госпиталь доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'смогла', 'смог')] убедиться, что передача болезни при благоприятных условиях минимальна."
 panum.448.f: "«Когда больных начали помещать в госпитали то тут, то там, возникли опасения, что ситуация может ухудшиться из-за возможного заражения. Предполагалось, что могут образоваться новые очаги инфекции, из которых эпидемия ударит с ещё большей силой. Ничего подобного не произошло, хотя подобный эффект наблюдался во многих лихорадочных бараках. Как [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я наблюдала', 'я наблюдал')] и в других случаях, разницу создавали более благоприятные гигиенические условия».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в [TimeKeeper.GetCurrentDate.Format('y')] году, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.448.g: "Значит, дело не в тесноте как таковой, а в условиях."
 panum.449.t: "Помощь при эпидемии"
 panum.449.d: "Доставив продовольствие, одеяла и лекарства в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_VP')], доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'смогла', 'смог')] добиться того, что эпидемия несколько ослабла."
 panum.449.f: "«Может показаться банальным, но с доставкой товаров, предназначенных для облегчения страданий жителей, вспышки заболеваний на прошлой неделе сократились. Нечто подобное уже наблюдалось в других районах, где в прошлом свирепствовал тиф. Помощники раздавали рис и горох, строили импровизированные палаточные госпитали, а также привозили лекарства и новую одежду. Этот случай доказывает прежде всего: тиф — не наследственное заболевание. Он определённо зависит от факторов окружающей среды».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], в письме доктору Дементьеву."
 panum.449.g: "Иногда единственный способ приблизиться к решению — это использовать метод исключения."
 panum.450.t: "Заражённая одежда?"
 panum.450.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'заметила', 'заметил')] странный случай в лихорадочном бараке, который соответствует подобным случаям."
 panum.450.f: "«Это доказательство предполагаемой заразности? Нет сомнений, что этот случай соответствует очень похожим случаям, которые у меня были в других местах. Иногда это пальто, иногда куртки или рубашки. У больного тифом был брат, который взял его пальто. Через несколько дней он тоже заболел. Говорят, дети, игравшие с пальто, заразились подобным образом. В более бедных классах довольно распространено передавать одежду от родственников, особенно в холодное время года. Заражена ли одежда или нет — смена одежды кажется одной из разумных мер, чтобы избежать тифа».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в [TimeKeeper.GetCurrentDate.Format('y')] году, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.450.g: "Мужчины должны менять носки и нижнее бельё? Невозможно!"
 panum.451.t: "Климат и тиф"
 panum.451.d: "После того как иностранный врач представил новую гипотезу о происхождении тифа, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'усомнилась', 'усомнился')] в собственных исследованиях."
 panum.451.f: "«Два дня назад „коллега“ прислал мне свой том о причинах тифа. Я весьма [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'поражена', 'поражён')], если не сказать — [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'демотивирована', 'демотивирован')]. Он очень точно и строго сформулировал, как погода и погодные условия связаны с развитием болезни. Согласно его теории, миазмы образуются при наличии влаги в земле, а затем поднимаются в воздух. Это объясняло бы частое возникновение тифа в холодные и влажные месяцы. Так что, в конце концов, это всё-таки миазмы?»\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]."
 panum.451.g: "Но действительно ли это правильное решение?"
 panum.452.t: "Гниение"
 panum.452.d: "Некоторые выводы, которые доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] недавно [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'обобщила', 'обобщил')], просто не соответствуют [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] предыдущей теории."
 panum.452.f: "«До сих пор [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я не придавала', 'я не придавал')] особого значения теории о том, что процессы гниения играют решающую роль в распространении болезней. Но куда бы [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я ни пошла', 'я ни пошёл')], где бы ни свирепствовал тиф, я нахожу животных, испарения, человеческий, животный и растительный материал. Может ли он действительно разлагаться и оставлять после себя миазмы — или, возможно, яды?»\n\nЗапись из журнала. Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в [TimeKeeper.GetCurrentDate.Format('y')] году, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.452.g: "Неприятная неудача."
 panum.453.t: "Вредоносные воздушные потоки"
 panum.453.d: "Публикация признанного немецкого врача заставила доктора [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] усомниться в достигнутых успехах. В ней доказывается, что за возникновение тифа ответственны воздушные потоки."
 panum.453.f: "«Такой тёплый и влажный воздух может быть перенесён экваториальным воздушным потоком в северные широты, и тогда мы увидим, как тиф вспыхивает под влиянием южных и западных ветров в относительно тёплое время года. Такая связь должна быть наиболее выражена летом, когда солнце находится в северном положении, берега Средиземноморья включены в зону действия пассатов, а в нашей стране битва с северным течением происходит в дождливый сезон с переменчивым характером. Так можно объяснить эпидемии тифа летом и ранней осенью».\n\nДоктор Анжелика Хазенбайн, «Как воздушные потоки вызывают тиф, а осенний дождь — грипп»."
 panum.453.g: "Это на самом деле очень убедительно."
 panum.454.t: "Заболевание"
 panum.454.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] уже несколько дней чувствует себя хуже. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Неужели она заразилась', 'Неужели он заразился')]?"
 panum.454.f: "«Где доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]? [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она хотела', 'Он хотел')] сегодня посетить больного тифом в пятой палате».\n\n«Похоже, доктор [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'сама заболела', 'сам заболел')]»."
 panum.454.g: "Врач должен отдыхать."
 panum.454.h: "Врач должен продолжать работать!"
 panum.455.t: "Документы утеряны"
 panum.455.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'потеряла', 'потерял')] некоторые из своих заметок, которые могли бы помочь в разработке метода лечения тифа."
 panum.455.f: "- - - - - - - - -\n\n- - - - - - - - -\n\n- - - - - - - - -\n\n(Здесь определённо нет вырванных страниц из журнала)"
 panum.455.g: "Как неловко."
 panum.461.t: "Классы и дома"
 panum.461.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'создала', 'создал')] таблицу различных больных тифом, проживающих в городе [SCOPE.sState('panum_disease_state').GetCityHubName], с указанием их места жительства и уровня жизни. Таким образом, сыпной тиф — это «социальная» болезнь."
 panum.461.f: "«Статистические таблицы показывают, насколько велико влияние жилищных условий на здоровье жителей. Например, в ходе исследования пригорода города [SCOPE.sState('panum_disease_state').GetCityHubName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я обнаружила', 'я обнаружил')], что смертность на улицах второго класса была на 18 процентов выше, а на улицах третьего класса — на 68 процентов выше, чем на улицах первого класса; и что смертность была на 31 процент выше в домах второго класса и на 78 процентов выше в домах третьего класса, чем в домах первого класса. Смертность снизилась на 25 процентов на тех бедных дорогах, которые были благоустроены».\n\nИз работы «Таблицы и статистика эпидемии тифа в городе [SCOPE.sState('panum_disease_state').GetCityHubName]», автор — доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]."
 panum.461.g: "Так доктор ещё и социальный критик?"
 panum_typhus: "Тиф"
 panum_typhus_desc: "Этот персонаж страдает от тифа, опасного заболевания."
 panum.12.t: "Первая вакцина"
 panum.12.d: "[SCOPE.sCharacter('panum_physician_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('panum_physician_scope').IsFemale, 'сделала', 'сделал')] революционное изобретение. Применив новый процесс — вакцинацию, — [SelectLocalization(SCOPE.sCharacter('panum_physician_scope').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('panum_physician_scope').IsFemale, 'преуспела', 'преуспел')] в создании эффективного средства защиты от страшной оспы."
 panum.12.f: "По словам биографа Эдварда Дженнера Джона Бэрона, Дженнер, как говорят, воспользовался народным поверьем, что доярки, заразившиеся коровьей оспой, обычно не заболевают натуральной оспой («миф о доярках»). Джон Фьюстер заметил, что пациент, ранее переболевший (безвредной) коровьей оспой, не мог быть вариолирован натуральной оспой. Поэтому Дженнер предположил, что прививка коровьей оспы обеспечит такой же иммунитет, как и сама коровья оспа, и, следовательно, защитит от натуральной оспы. Дженнер сначала собрал истории болезней и наблюдения за людьми, которые ранее переболели коровьей или лошадиной оспой, но затем оказались невосприимчивы во время последующей вариоляции или настоящей вспышки оспы. 14 мая 1796 года он привил 8-летнему Джеймсу Фиппсу вирусы коровьей оспы, которые он взял из пустулы коровьей оспы с руки доярки Сары Нелмс. Примерно шесть недель спустя, 1 июля 1796 года, Дженнер вариолировал мальчика гноем из оспенной пустулы; тот оказался невосприимчив."
 panum.12.g: "Герой медицины!"
 je_panum_vaccine: "Вакцина"
 je_panum_vaccine_reason: "Наша нация находится в процессе первого в истории внедрения известной вакцины в нашей стране и её общенационального распространения."
 je_panum_vaccine_success: "[GetPlayer.GetName] собрал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] как минимум #ORANGE 4 подсказки для вакцины#!."
 je_panum_smallpox_treatment_success: "[GetPlayer.GetName] собрал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] как минимум #ORANGE 3 подсказки для лечения#!."
 panum.351.t: "Старый враг"
 panum.351.d: "Оспа, возможно, самая смертоносная болезнь, известная человечеству, вновь появилась на наших землях."
 panum.351.f: "Оспа — знакомый и опасный враг. Прорываясь через земли [GetPlayer.GetAltNameNoFlag('RU_CL_RP')], она может унести жизни трети инфицированных, а других оставить слепыми на всю оставшуюся жизнь. Почти все заражённые навсегда останутся с визитной карточкой этого убийцы на своей плоти — характерными рубцами на лице и теле, бессмертным, вечным символом болезни, почти такой же древней, как сама цивилизация. Она преследовала каждый уголок земного шара, от древнего Ближнего Востока до Нового Света, армия, чей марш разрушал империи, убивал миллионы и унижал величайших лидеров, когда-либо ходивших по земле. Куда бы ни шёл человек, оспа следовала за ним, как охотник, вечно преследующий свою добычу.\n\nТеперь на наших землях она нашла свежих жертв, достаточно, чтобы вырваться из своей эндемической формы и снова стать эпидемией."
 panum.351.g: "И вот мы снова сражаемся с оспой..."
 panum.352.t: "Слухи о лечении оспы"
 panum.352.d: "Вслед за слухами о лечении оспы наши люди начали пробовать странные практики, связанные с самими пустулами!"
 panum.352.f: "Вид учёного джентльмена, поедающего струпья с людей, заражённых оспой, может быть в равной мере отвратительным и ужасающим, но это отчаянное средство, за которое хватается отчаявшийся человек. Где-то в мире ходят слухи о лечении этой ужасной болезни, и, предположительно, оно работает подобным образом... но как? Какое колдовство, какая наука может избавить их от этой ужасной чумы? С далёких земель Европы приходят вести, что бич оспы отступил, что целые города могут жить без единого случая.\n\nДля некоторых это надежда. Если её можно победить там, то мы можем победить её и здесь.\n\nДля некоторых это ложь. Наши величайшие умы до сих пор не смогли найти лечение, но, возможно, возможно..."
 panum.352.g: "...могли ли они преуспеть там, где мы потерпели неудачу?"
 panum.353.t: "Бич оспы"
 panum.353.d: "Без лечения и не поддающаяся ему, оспа опустошает наше общество... и особенно нашу молодёжь."
 panum.353.f: "Рыдания. Вопли. Отчаянные крики тех, кто едва успевает перевести дух после последнего вздоха, прежде чем впасть в горе, из которого их не вытащить ничьей рукой. Отцы будут колотить кулаками по стенам, пока их ладони не покраснеют от крови, а костяшки не будут сломаны. Матери будут отбрасывать санитаров с силой гигантов ради последнего прикосновения, последней ласки холодной, бледной щеки. Это обычные зрелища в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')], ибо оспа жаждет самых уязвимых из нас: наших детей, рождённых и нерождённых. Более восьмидесяти процентов младенцев, заражённых оспой, умрут, и эта болезнь прорубает себе путь в будущее наших земель.\n\nИ без лечения нам не остаётся ничего, кроме как оплакивать жизни, которые должны были быть."
 panum.353.g: "Должен же быть конец этому кошмару..."
 panum.354.t: "Вакцина от оспы"
 panum.354.d: "Наши дипломаты привозят не только новости — они привозят образцы «вакцины» против оспы!"
 panum.354.f_generic: "Во время визита в далёкую Европу наши сановники обнаружили нечто поразительное — у них, похоже, есть *действующее* лечение от оспы. Более того, они узнали историю этой болезни! Очевидно, практика вариоляции, то есть использование образцов высушенных оспенных струпьев от выздоравливающих для прививки детям «ослабленной» формы этой болезни, наблюдалась в Османской империи... однако это было несовершенное и опасное решение, танец с дьяволом — подойди слишком близко, и оспа утащит тебя так же легко, как ты мог бы её одолеть.\n\nОднако сегодня европейцы разработали способ использовать коровью оспу, почти безвредное заболевание, для защиты от её смертоносного старшего брата. Это обеспечивает безопасный, экономичный и практически гарантированный щит от чумы оспы.\n\nСначала в это было трудно поверить, но наши скептически настроенные врачи сами проверили это средство... и оно *работает*. Впервые в нашей истории мы можем дать отпор оспе."
 panum.354.g_generic: "Мы... мы должны немедленно это импортировать!"
 panum.354.f_fareast: "Во время визита в далёкую Европу наши сановники обнаружили нечто поразительное — у них, похоже, есть *действующее* лечение от оспы. Более того, они узнали историю этой болезни! Хотя наши врачи хорошо знакомы с практикой вариоляции, при которой для защиты неинфицированных могут использоваться высушенные струпья от выздоравливающих, похоже, они обнаружили ещё более надёжную защиту. Используя образцы, полученные из относительно безобидной коровьей оспы, европейцы разработали «вакцину», способную прививать детей или даже недавно инфицированных... вакцину, которая может значительно увеличить их шансы на выживание.\n\nНаши самые образованные врачи едва могли в это поверить. Только те, кто получил европейское образование и носит звание «доктор», могли поручиться за её потенциал как безопасной, экономичной и мощной защиты от оспы. Более того, они уже начали тестировать её среди нашего народа и обнаружили, что эти утверждения — не просто слова, о нет, а факты.\n\nС этим у нас есть оружие для борьбы с оспой."
 panum.354.g_fareast: "Похоже, наши новые... доктора... доказали свою ценность. Немедленно импортировать это."
 panum.354.f_latino: "Во время визита в метрополию в Европе наши сановники обнаружили нечто поразительное — у них, похоже, есть *действующее* лечение от оспы. Хотя мы давно знакомы с практикой вариоляции, при которой наши врачи могли использовать образцы, взятые у выздоравливающих, для тех, кто отчаянно нуждался в защите, с тех пор они разработали гораздо более сложное лечение. Вместо того чтобы использовать оспенные струпья и рисковать заражением этой смертельной болезнью, они используют материалы, взятые из коровьей оспы, распространённого и обычно безвредного заболевания. Эта новая сыворотка одновременно дешёвая, распространённая и, что самое важное, эффективная.\n\nТеперь, имея доступ к последним медицинским журналам, наши врачи могут только праздновать это открытие. Оспа не чужда Америке, ведь она истребила коренные народы на этих землях... но теперь у нас есть мощное оружие, чтобы сделать этот бич достоянием прошлого."
 panum.354.g_latino: "Отправьте благодарность метрополии и запрос на импорт партии для немедленного использования."
 panum.355.t: "Вакцинация начинается"
 panum.355.d: "С появлением в [GetPlayer.GetName] жизнеспособной вакцины от оспы правительство начало кампанию по вакцинации."
 panum.355.f: "Сначала идея кампании по вакцинации встретила некоторое сопротивление. Обеспокоенные матери с их напуганными детьми, умудрённые опытом старики, которые скептически относились к этому новому чуду, очень набожные люди, которые боялись, что наука вмешивается во что-то за пределами их понимания. Просвещение решило эту проблему — объяснения того, как это работает, почему, — но гораздо важнее были результаты. Дети, сохранившие зрение и здоровье, а не оставшиеся с ужасными последствиями одной из самых смертоносных болезней, с которыми когда-либо сталкивалось человечество. Мало кого нужно было убеждать, когда они видели их свободными от шрамов и полными жизни.\n\nМало-помалу, один за другим, очереди начали расти. В школах, врачебных кабинетах, на рабочих местах кампания по вакцинации набирает обороты... а вместе с ней оспа начинает отступать."
 panum.355.g: "Ай. Ненавижу иголки, но если это обеспечит мне безопасность..."
 panum.356.t: "Болезнь отступает"
 panum.356.d: "После бесчисленных веков смерти и страданий недавнее распространение вакцинации от оспы заставило этого старого врага полностью отступить."
 panum.356.f: "Это потребовало огромных неустанных усилий от бесчисленного множества умов и рук, но в нашей любимой [GetPlayer.GetAltNameNoFlag('RU_CL_PP')] оспа — это угроза, которая медленно, но верно уходит в прошлое. В результате обширной кампании по вакцинации молодёжи и всех, кто готов был сделать укол, способность оспы проникать в наши семьи и общины ослабевает, обещая, что сегодняшние дети не будут носить шрамы своих бабушек и дедушек. С каждым уколом лезвие оспы становится всё тупее, а природа этой чумы всё больше уходит в прошлое.\n\nЭто momentous достижение, славный день в нашей истории: хотя битва ещё не выиграна, победа близка. Оспа умрёт здесь, и если не от нашей руки, то от руки наших наследников."
 panum.356.g: "Однажды, однажды мы покончим с этим отвратительным зверем навсегда."
 panum_smallpox_vaccination_character_modifier: "Вакцинирован"
 panum.340.t: "Вариоляция"
 panum.340.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] метод лечения оспы, хотя он и не совсем безвреден."
 panum.340.f: "Вариоляция (также инокуляция) — это перенос содержимого оспенных пустул от человека к человеку путём прививки. Это техника вакцинации против вирусных заболеваний, которая использовалась у людей, в основном в Китае и на Ближнем Востоке, до XVIII века. Здесь использовались вирусные коллективы из ран выживших после оспы. Обычно материал брали из пустулы у больных с помощью ланцета, который затем вводили подкожно, то есть через небольшие ранки, в руку или ногу здоровых людей. Это означало, что здоровым людям вводили ослабленные вирусы. Иммунная реакция должна была быть вызвана размножением вирусов. Однако вирусы могли снова стать болезнетворными из-за обратной мутации при размножении, что приводило к относительно высокой смертности (2-3%) среди тех, кто проходил такое лечение."
 panum.340.g: "Это... прогресс."
