 panum_physician_health_bonus_modifier: "Бережёного бог бережёт"
 panum.168.f: "«Стой! Кто здесь в такое время?.. Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]! Что вы делаете так поздно?»\n\n«У меня обход, и он не будет ждать рассвета. Каждая минута драгоценна, даже после полуночи».\n\n«Боже мой! Эти улицы небезопасны ночью!»\n\n«Днём они тоже небезопасны, пока эта холера не закончится. Если позволите, констебль, у меня ещё много работы, пока не догорит масло в фонаре. Мне нужно наполнить дюжину флаконов водой из каналов и насосов, посетить дома, осмотреть канавы».\n\n«Да, хорошо, очень хорошо. Вы не делаете ничего плохого, но всё же я лучше дам вам сопровождение»."
 panum.3033.d: "Подавляющее большинство членов Красного Креста согласились с Третьей международной конвенцией о применении химического оружия. Теперь она является обязательной для всех членов."
 notification_panum_technology_boost_from_physician_notification_name: "Бонус к исследованию для [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]"
 notification_panum_technology_boost_from_physician_notification_desc: "Благодаря доктору [GetPlayer.MakeScope.GetVariable('panum_physician_var').GetCharacter.GetLastName] [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')] получил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] бонус к исследованию."
 je_panum_medical_research_project_reason: "[ROOT.GetCountry.GetCustom('panum_medical_research_project_active_type')] Помимо медицинских инноваций, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] может также находить лекарства от болезней, которые не входят в число десяти классических эпидемических заболеваний.\n\nЭто проект по умолчанию для [concept_panum_physician]. Он активен, когда врач не занят другим проектом.\nКаждый раз, когда прогресс достигает [JournalEntry.GetTotalGoalValue|V0], мы получаем небольшой технологический бонус.\n\nТехнология для следующего бонуса: [GetPlayer.MakeScope.GetCountry.GetCustom('panum_medical_research_next_technology_type')]"
 panum.2611.t: "Институционализация"
 panum.2611.d: "Ввиду неприемлемых условий в некоторых психиатрических лечебницах, врачи и политические деятели настаивают на реформировании тамошних практик. Они выступают за уединённые места, где психиатры могли бы жить уединённой жизнью со своими пациентами, вдали от суеты."
 panum.2611.f: "Современная эра институционализированного ухода за душевнобольными началась в начале XIX века с больших государственных усилий. Общественные психиатрические лечебницы были созданы в Великобритании после принятия Закона о окружных лечебницах 1808 года. Это дало магистратам право строить лечебницы на средства налогоплательщиков в каждом графстве для размещения многочисленных «бедных сумасшедших». Закон о безумии 1845 года стал важной вехой в лечении душевнобольных, поскольку он явно изменил статус душевнобольных на пациентов, нуждающихся в лечении. Закон создал Комиссию по безумию во главе с лордом Шефтсбери, чтобы сосредоточиться на реформе законодательства о безумии. «Всеобщий журнал психиатрии» следует упомянуть как орган немецкой институциональной психиатрии между 1830 и 1860 годами. Он был основан Генрихом Дамеровом вместе с Карлом Фридрихом Флеммингом и Кристианом Фридрихом Вильгельмом Роллером в 1844 году."
 panum.2611.g: "Психиатрические и психологические исследования делают успехи."
 panum.2612.t: "Болезнь мозга"
 panum.2612.d: "В психиатрии теория эволюции сопровождается значительными изменениями. Новое поколение психиатров постулирует, что психические заболевания — это болезни мозга. Научно ориентированная психиатрия заменяет ранее преобладавший гуманитарный взгляд."
 panum.2612.f: "Вильгельм Гризингер считается одной из самых важных фигур в научном повороте в психиатрии. Он встретил Франсуа Мажанди, основателя экспериментальной физиологии и автора первого современного учебника по физиологии, чей исследовательский подход сильно повлиял на него. В 1839 году он переехал в Фридрихсхафен на Боденском озере в качестве практикующего врача. В следующем году, 1840, он получил предложение работать в качестве второго врача в психиатрической лечебнице Винненталь. В следующие два года, которые он там проработал, Гризингер приобрёл богатый практический опыт, который стал основой для его главной работы «Патология и терапия психических заболеваний», опубликованной в 1845 году и открывшей новую эру в психиатрии. В ней он попытался основать психиатрию на основе медицинской физиологии и патологии. Знаменитое высказывание Гризингера можно найти на первой странице, согласно которому, для того чтобы понять каждый симптом болезни, необходимо локализовать рассматриваемое явление и признать все психические заболевания болезнями мозга."
 panum.2613.t: "Классификация психических расстройств"
 panum.2613.d: "Психиатры и психологи начали классифицировать психические заболевания по схеме, которая ранее была доступна только в остальной медицине. В то время как раньше они знали только «слабоумие» и «безумие», теперь они признают 7 категорий: мания, меланхолия, мономания, парез, деменция, дипсомания и эпилепсия."
 panum.2613.f: "Триадическая система немецкой психиатрической традиции — это система психических заболеваний, классифицируемая по их причинам. Первое описание восходит к Эмилю Крепелину; Крепелин, в свою очередь, основывался на предварительной работе Карла Людвига Кальбаума. Крепелин объявил, что нашёл новый способ взгляда на психические заболевания, называя традиционный взгляд «симптоматическим», а свой — «клиническим». Это оказалось его парадигматическим синтезом сотен психических расстройств, классифицированных в XIX веке, группируя заболевания на основе классификации синдрома — общих паттернов симптомов с течением времени — а не по простому сходству основных симптомов, как у его предшественников."
 panum.2614.t: "Лечение разговором"
 panum.2614.d: "Несмотря на множество оговорок, психологический подход становится всё более популярным среди психиатров. Случай молодой женщины, которая, по-видимому, была излечена в результате длительных бесед, рассматривается как образец для нового поворотного момента в лечении душевнобольных пациентов."
 panum.2614.f: "Опыт, который Йозеф Брейер получил при лечении Берты Паппенгейм (псевдоним: Анна О.) в 1880/1881 годах, лёг в основу исследований по истерии, опубликованных совместно с Зигмундом Фрейдом в 1895 году. Эта работа (и лежащая в её основе история болезни) была описана Фрейдом как корень и отправная точка психоанализа. После новаторской работы Зигмунда Фрейда идеи, вытекающие из психоаналитической теории, также начали укореняться в психиатрии. Психоаналитическая теория стала популярной среди психиатров, потому что она позволяла лечить пациентов в частных практиках, а не содержать их в лечебницах."
 panum.2615.t: "Психология и философия"
 panum.2615.d: "Помимо влияния психологических школ на психиатрию, растёт и понимание философских влияний. Доминирование естественных наук, по-видимому, сломлено."
 panum.2615.f: "Карл Ясперс был одним из первых психиатров XX века, которые исследовали и размышляли над философскими предпосылками своей дисциплины. «Общая психопатология» Ясперса (1913) считается началом методически осмысленного психопатологического исследования — наряду с Вильгельмом Гризингером, который определил психические заболевания как болезни мозга, и Эмилем Крепелином, который первым ввёл полезную нозологическую справочную систему в психиатрии. Ясперс ссылался на ранние работы Гуссерля по описательной психологии и на широко обсуждавшееся различие Вильгельма Дильтея между «объяснением» и «пониманием», которым он также дополнил психопатологию в методологическом смысле."
 panum.2131.t: "Тарелка, которую нужно выиграть"
 panum.2131.d: "С открытием роли, которую может играть бедность в развитии рахита, профсоюзы взяли на себя борьбу за бесплатные школьные обеды и молоко!"
 panum.2131.f: "Сначала это начиналось медленно — тут и там у школы парковался фургон, давая детям молоко, суп и немного хлеба. Теперь это переросло в нечто гораздо большее: рабочие союзы, социалисты и активисты рабочего движения страны взялись за дело не просто борьбы за пролетарский класс, но и за его детей. Плакаты с изображениями детей с пустыми мисками и умоляющими глазами всё чаще встречаются на улицах, а неспособность правительства обеспечить своих самых молодых и уязвимых граждан — лёгкое оружие для его осуждения и осуждения его системы.\n\nИдея бесплатного школьного обеда и молока распространяется, как лесной пожар, и её подхватывают даже самые крайние ветви движения — если правительству нельзя доверять обеспечение детей нации, то для кого оно, собственно, существует?"
 panum.2131.g: "У нас будет наш закон о бесплатном молоке, да, будет, да, будет!"
 panum.2131.h: "Бесплатного молока не бывает."
 panum_free_milk_modifier: "Бесплатное молоко"
 panum_no_free_milk_modifier: "Нет бесплатного молока"
 panum_medical_techniques_level_rises_tt: "Уровень медицинских методик [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] повышается."
 panum.561.t: "Путь к вакцине?"
 panum.561.d: "Следуя указаниям из столицы, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] начал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] исследовать, как лечить или даже излечить жёлтую лихорадку."
 panum.561.f: "«...и всё же, я задаюсь вопросом, не был ли я, возможно, слишком самоуверен в своей оценке, что смогу, на самом деле, победить жёлтую лихорадку. У болезни мало известных certainty, даже её способ передачи — загадка, не говоря уже о её происхождении. Может быть, это, можно предположить, возрождение старой миазматической теории? Кто может претендовать на certainty перед лицом такой тайны?\n\nИ всё же, несмотря на все эти тайны, есть кое-что, что мы знаем. Не все, кто сталкивается с этой загадочной смертью, погибают от неё; у некоторых почти нет признаков того, что это была именно жёлтая лихорадка, и более чем немногие выздоравливают, прежде чем она станет угрожающей для жизни. Столкнуться с жёлтой лихорадкой — значит танцевать со смертью, конечно, но это не certainty, что она заберёт вас...»"
 panum.561.g: "...и если мы сможем остановить её где-нибудь, мы, возможно, сможем остановить её везде."
 panum.562.t: "Детский дом"
 panum.562.d: "Изучая все без исключения случаи выздоровления от жёлтой лихорадки, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] прибыл[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] в дом с большим количеством выживших — детский дом."
 panum.562.f: "«А, здравствуйте, вы, должно быть, хозяйка этого детского дома... Я вижу, дети сегодня играли с краской».\n«Поверьте, я понятия не имею, где они её взяли — о, вы, должно быть, тот доктор, о котором говорили, что он зайдёт! Боюсь, кашель уже прошёл, так что нет —»\n«Боюсь, я не тот доктор, мэм. Я из столицы, расследую жёлтую лихорадку. Мне сказали, что болезнь... была здесь?»\n«О да, малыши. У них она была, у многих даже. Некоторые из семей, уничтоженных болезнью, бедняжки, но, похоже, она щадит детей».\n«Поразительно. У вас есть какие-нибудь теории —»\n«Дети! Идите сюда! Здесь милый человек из столицы хочет с вами поговорить!»\n«О... здравствуйте, дети. Меня зовут доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], и я хотел[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] бы поговорить о жёлтой лихорадке...»"
 panum.562.g: "Почему родители умирают, а дети выживают?"
 panum.563.t_america: "Старая кровь"
 panum.563.d_america: "В попытке узнать больше о жёлтой лихорадке, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] решил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] посетить семьи некоторых из первых поселенцев на этих землях."
 panum.563.f_america: "«...и всё же, не все первые семьи на этих землях исчезли. Всё ещё есть те, кто может проследить свою историю до самых первых экспедиций сюда, больших или малых. Именно к этим семьям я обратил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] своё расследование, ибо некоторые из них всё ещё хранят драгоценные дневники и записи, которые дают нам возможность заглянуть в прошлое до появления надлежащих исторических архивов. Это открывает нечто особенно поразительное: первые случаи жёлтой лихорадки появились на этих землях примерно в 1685 году.\n\nИ всё же, с момента её появления, некоторые из этих великих людей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] путешествовали за границу как исследователи и авантюристы... и некоторые, кто переболел здесь жёлтой лихорадкой и выздоровел, столкнулись с этой болезнью там, в Африке, и всё же они никогда не заболевали. Это подводит меня к одной истине»."
 panum.563.g_america: "Это одна и та же болезнь. Иммунитет к одной — иммунитет к другой."
 panum.563.t_africa: "Племена"
 panum.563.d_africa: "В попытке узнать больше о жёлтой лихорадке, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] разыскал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] тех, у кого больше всего опыта с жёлтой лихорадкой — коренных африканцев."
 panum.563.f_africa: "«...и всё же, в то время как мы можем быстро погибнуть, коренные африканцы выживают. Это болезнь, с которой они хорошо знакомы; хотя языковой барьер представляет собой значительное препятствие, достаточно нескольких описаний, чтобы они поняли, о какой болезни я говорю. Есть ли у них естественная устойчивость к ней, подобная той, что может быть у европейцев к оспе, опустошившей Америку? Возможно, но те, кто африканского происхождения и работают в наших городах, умирают с той же скоростью, что и мы — значит, должен быть какой-то другой фактор. Диетический? Культурный?\n\nКлюч, возможно, в детском контакте в племени. Возможно, они подвергаются воздействию жёлтой лихорадки в раннем возрасте и, таким образом, развивают стойкий иммунитет, подобно тому, как коровья оспа может дать защиту от оспы»."
 panum.563.g_africa: "И если их можно сделать невосприимчивыми... то должна быть возможность создать вакцину."
 panum.564.t: "Природа врага"
 panum.564.d: "Борьба с болезнью требует большего знания о её природе, и доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] разработал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] поразительный тест."
 panum.564.f: "«...с тех пор как стало известно, что холера — это болезнь, передающаяся через воду, у нас появилась возможность изучить возможность удаления таких болезней из воды с помощью надлежащей фильтрации. Доставка заняла некоторое время, но в моих руках оказался фильтр Беркефельда, фантастическое устройство, которое может фильтровать воду через диатомовую землю. Это чрезвычайно точная вещь, способная удалять даже бактерии. Я приготовил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] флакон, состоящий из крови нескольких заражённых, разбавил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] её дистиллированной водой, а затем пропустил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] через фильтр. То, что получилось, было чистой, прозрачной жидкостью... или так я думал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')].\n\nИ вот сюрприз: что бы это ни было, оно прошло через фильтр, что доказал доброволец, достаточно смелый, чтобы ему это ввели. Он заболел и сейчас борется за свою жизнь. И всё же это доказывает, что жёлтая лихорадка — это не просто микроб, это нечто ещё меньшее, чем бактерия, нечто, что мы не можем увидеть.\n\nЯ бы назвал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] это невозможным, но я наш[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ла', 'ёл')] упоминание о подобном в медицинском журнале. Они называют это вирусом»."
 panum.564.g: "Знай врага, уничтожь врага."
 panum.565.t: "Неизлечимо?"
 panum.565.d: "В надежде на любой признак надлежащего лечения, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] посетил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] местные клиники и больницы, чтобы изучить их методы лечения."
 panum.565.f: "«А, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], приятно познакомиться! Мы здесь, в клинике —»\n«Боюсь, нам придётся сократить любезности, доктор. Мне нужно посетить другие клиники, больницы, палаты, около двух десятков к вечеру. Расскажите мне об эффективности вашего лечения».\n«А, э-э... ну, мы следуем установленным рекомендациям —»\n«С успехом? Позвольте мне записать».\n«Э-э-м... без».\n«Смертность?»\n«Довольно... высокая».\n«Скольких вы потеряли на этой неделе?»\n«Сто семьдесят шесть».\n«Это вы и последние шесть клиник, что в сумме даёт более трёх тысяч смертей. Вы работаете по рекомендациям лечения, верно?»\n«Да, доктор!»\n«Тогда это исключает растительные лекарства, электротерапию, радиотерапию, гидротерапию, народную медицину, современную медицину и... хм, почти все известные нам формы лечения, включая защиту их от ночного неба на случай, если это имеет астрологическую природу».\n«Тогда... не означает ли это, что лечения нет, доктор?»\n«Действительно, похоже, что любое лечение вообще не будет иметь эффекта. Жаль»."
 panum.565.g: "Тогда смена тактики — нам нужна вакцина."
 panum.566.t: "Первая трещина"
 panum.566.d: "Хотя его исследования до сих пор были неудачными, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] экспериментировал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] с обезьянами в попытке разработать вакцину."
 panum.566.f: "Для многих вид мёртвой обезьяны в клетке не был бы большим поводом для празднования, но доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] и [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'его', 'его')] команда видели в этом замечательный прогресс. Разработка вакцины от этой ужасной болезни требовала возможности вызывать болезнь в лаборатории по требованию, и, как бы они ни старались, это им не удавалось... до сегодняшнего дня. Поскольку местные африканские обезьяны и шимпанзе, казалось, были невосприимчивы к болезни, потребовалось прибытие индийской макаки, чтобы получить подходящего подопытного. Привитая сывороткой, взятой из вен заражённого человека, макака заболела и, в конечном итоге, умерла.\n\nДля некоторых это может показаться праздной жестокостью, но здесь, сейчас, это представляло собой огромный скачок вперёд. Наконец, у них появились подопытные для испытаний."
 panum.566.g: "Хм-м-м. Это прогресс... по крайней мере, в убийстве обезьян."
 panum.567.t: "Секрет сыворотки"
 panum.567.d: "Имея доступ к надёжному «подопытному», доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] начал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] проверять возможности прививки с использованием крови выздоравливающих пациентов."
 panum.567.f: "«1. Переливание от макаки к макаке: болезнь передалась, иммунитета нет, макака умерла. Подтверждает передачу через кровь, болезнь, вероятно, переносится насекомыми — комарами?\n2. Переливание от человека к макаке: болезнь передалась, иммунитета нет, макака выжила. Подтверждает возможность прямой передачи между видами.\n3. Южноамериканская и африканская жёлтая лихорадка для выжившей макаки: иммунитет, макака выжила. Подтверждает общий иммунитет к обеим формам болезни.\n4. Мёртвый патоген в сыворотке, стерилизованный при экстремальной температуре: не обеспечил защиты, макака умерла после инокуляции живым патогеном. Значительная неудача, исключает возможность вакцины на основе мёртвого патогена.\n5. Передача выздоравливающей сыворотки макаке: предотвратила будущую инфекцию! Многообещающе! Потенциальное начало для вакцины?»"
 panum.567.g: "Нельзя приготовить омлет, не разбив несколько макак..."
 panum.568.t: "Прототип"
 panum.568.d: "Уделив время продолжению работы над своей вакциной, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] достиг[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ла', '')] критической точки — прототипа вакцины."
 panum.568.f: "«Это должен быть невероятный момент, но я с трудом сохраняю трезвость. Используя большие количества человеческой сыворотки, взятой у ряда выздоравливающих больных, моя команда и я преуспели в её переработке в дистиллированную форму, потенциально способную передать иммунитет добровольцу. Это был хороший первый вариант и потенциальный, критический шаг, и поэтому мы начали тестировать его на макаках. Многие умерли, многие выжили, но макака — не человек.\n\nТребовались живые испытания. Десять добровольцев, собранных отовсюду. Несколько солдат из местного гарнизона, член моей собственной команды, несколько безработных из города, соблазнённых обещанием нескольких пенсов. Около двух десятков добровольцев для почти такого же количества уколов. Из них? У семерых не было симптомов, затем подтвердился иммунитет через неделю. Пятеро перенесли лёгкое заболевание, затем иммунитет. Ещё шестеро болели сильнее, затем иммунитет. Остальные? У всех развилась настоящая жёлтая лихорадка, и один умер. Это, несомненно, шаг в правильном направлении, но... что насчёт мёртвых?»"
 panum.568.g: "Цена прогресса высока."
 panum.569.t: "Новый подопытный"
 panum.569.d: "Поскольку первая попытка создания вакцины увенчалась смешанным успехом, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'полна', 'полон')] решимости усовершенствовать процесс."
 panum.569.f: "К облегчению одних и ужасу других, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] сделал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] критическое открытие — макаки были не единственным животным, которое могло инкубировать болезнь, и был найден новый, более подходящий хозяин: обычная лабораторная мышь. Роль, которую они могут сыграть в зарождающейся индустрии медицинских исследований, невозможно переоценить, но здесь они играют особенно важную роль: их церебральная жидкость, слизь вокруг их крошечных мозгов, является подходящей средой для роста вируса жёлтой лихорадки. Однако этот процесс имеет явное преимущество.\n\nКаждый переход от мыши к мыши занимает меньше времени, чем предыдущий, ослабляя вирус при этом. Медленно, но верно, этот убийца людей укрощается, одна мышь за другой."
 panum.569.g: "О, отлично, сначала макаки, теперь мыши..."
 panum.570.t: "Второй прототип"
 panum.570.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] разработал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] улучшенную версию вакцины."
 panum.570.f: "«Хотя последняя попытка не была неудачей, я не смею назвать её успехом. Эти бедные парни отдали свои жизни в надежде избавить человечество от этой болезни, и я обязан им улучшить её как можно больше. Я считаю, что я сделал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] именно это. Перенося вещество с макак на мышей, я смог[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ла', '')] медленно, но верно ослабить вирус, со временем значительно его ослабив. После более чем тридцати пассажей полученная жёлтая лихорадка — это ослабленное существо, гораздо более подходящее для использования в вакцине, чем первые попытки.\n\nИспользуя тот же подход, что и раньше, я создал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] комбинацию иммунной сыворотки и живой, но ослабленной культуры вируса, причём сыворотка присутствует для снижения риска определённых иммунных осложнений. Добровольцев было меньше, чем в прошлый раз, но один мой коллега решил рискнуть. У него не было ни вакцинации, ни контакта с жёлтой лихорадкой, и он находился в интенсивном карантине в течение недели до инокуляции. Кроме небольшого покраснения в месте укола, у него не развилась жёлтая лихорадка. Пока что очень многообещающие результаты»."
 panum.570.g: "Похоже, мы наконец-то к чему-то пришли..."
 panum.570.h: "...так давайте начнём эту кампанию по вакцинации!"
 panum.571.t: "Лесной пожар"
 panum.571.d: "Катастрофа! Распространение сыворотки-вакцины, которую разработал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], непреднамеренно привело к передаче заболеваний, передающихся через кровь!"
 panum.571.f: "В ретроспективе было совершенно очевидно, что создание вакцины с использованием сыворотки человеческой крови, возможно, было ужасной идеей. Тайны человеческой крови были частично расшифрованы, но в мире, где микроскоп открывал всё новые микробы, а новая теория вирусных тел начинала появляться, всегда существовала эта насущная обеспокоенность, что может произойти нечто неожиданное, нечто катастрофическое.\n\nЭта катастрофа теперь произошла: десятки тысяч людей были неосознанно инъецированы сывороткой, заражённой вирусом, который вызвал желтуху у всех, от солдат до правительственных чиновников. Этот вирус ранее был неизвестен нашей науке и до сих пор ускользает от обнаружения многими из наших самых светлых умов... в отличие от ущерба нашему национальному имиджу. Хотя смертельных исходов было мало, если они вообще были, очевидный провал этого проекта вакцинации оставил наше медицинское сообщество в руинах, став предметом насмешек по всему миру."
 panum.571.g: "Это катастрофа для наших медицинских исследований..."
 panum.572.t: "Последние штрихи?"
 panum.572.d: "Близицится завершение вакцины, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] находится в середине окончательной разработки."
 panum.572.f: "Если бы вы не знали иного, вы могли бы подумать, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] работает не в лаборатории, а на очень странной кухне. Соль, вода, масло и яйца загромождали столы, рядом с плитками, широким выбором стаканов и самым современным холодильником. Сцена, казалось, была готова для приготовления завтрака, а не для медицинского прорыва, но именно это и происходит. Сыворотка слишком дорога для создания вакцины, которую можно распространять в больших масштабах, слишком неудобна для работы в больших масштабах, необходимых для прививки колонии или города. Её нужно исключить из уравнения, но если не это, то что?\n\nТихо бормоча, казалось, на грани безумия, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] работает не покладая рук. Тщательно подготовленный образец мышиной ткани осторожно окунается в яичный желток, а затем, осторожно, всегда осторожно, помещается в камеру для сублимационной сушки. Более ранняя партия вышла, её содержимое теперь представляет собой мелкий порошок. Добавить его в физиологический раствор...\n\nДоктор улыбнулся.\n\n«Наконец-то, — говорит добрый доктор. — У меня получилось»."
 panum.572.g: "Эврика!"
 panum.573.t: "Окончательный прототип"
 panum.573.d: "Завершив работу над своей вакциной, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] начал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] её применение в последней тестовой группе."
 panum.573.f: "«Это был долгий, трудный путь, но конец наконец-то близок. Последний этап заключался в том, чтобы сделать вакцину более доступной, и теперь это так: заменив сыворотку на физиологический раствор, полученный вакцинный пакет аналогичен тому, что используется для оспы. Нет необходимости в инъекции, достаточно той же практики скарификации. Действительно, их даже можно вводить одновременно. По всем признакам, это должен быть надёжный, безопасный и эффективный способ доставки этой вакцины не только нескольким тысячам, но и миллионам.\n\nИ всё же, прошлые тесты наполняют моё сердце тревогой. Добровольцев мало, далеко не достаточно для создания тестовой группы... но если учесть и меня, то их достаточно. Я уже всё устроил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] — генерал может отправить в бой лишь столько своих людей, прежде чем от него самого ожидается выход на поле. Сегодня вечером, в восемь часов, мне будет сделана прививка этой вакциной. Если она сработает, то, когда мне введут жёлтую лихорадку через две недели, у меня не будет ничего серьёзнее лёгкого недомогания»."
 panum.573.g: "Пожелайте [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ей', 'ему')] удачи."
 panum.574.t: "Вакцина против жёлтой лихорадки"
 panum.574.d: "В столицу пришла новость: доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] успешно создал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] вакцину от жёлтой лихорадки!"
 panum.574.f: "«...но в конце концов, моя команда и я сумели добиться успеха вопреки всему. Хотя ещё очень много загадок жёлтой лихорадки не решено, мы успешно создали жизнеспособную вакцину, готовую к крупномасштабному производству. Возможно, для этого потребуются некоторые специализированные объекты, укомплектованные великими умами, но её можно производить в больших масштабах, и миллионы и миллионы людей выиграют от быстрой кампании вакцинации, которая может сделать жёлтую лихорадку делом прошлого.\n\nИ всё же, было потеряно очень много жизней, в том числе и в моей собственной команде, от скромных ассистентов, которые отдали свои жизни в погоне за своими исследованиями, до добровольцев, которые вызвались для испытаний, все они должны быть признаны героями, которыми они и являются. Следует также отдать должное макакам и мышам, которые сыграли решающую роль в этом предприятии.\n\nБлагодаря их жертве и нашим коллективным усилиям у нас теперь есть вакцина, которая может положить конец эндемичной жёлтой лихорадке за считанные годы и, возможно, однажды искоренить эту напасть раз и навсегда»."
 panum.574.g: "Отлично, доктор! Теперь давайте немедленно начнём её применение!"
 panum_wildfire_modifier: "Полностью провальный эксперимент с вакциной"
 panum_physician_invented_yellow_fever_vaccine_modifier: "Врач выполнил работу биолога"
 ACHIEVEMENT_biologist_job: "Работа биолога?"
 ACHIEVEMENT_DESC_biologist_job: "Изобрести вакцину против жёлтой лихорадки — с помощью врача."
 je_panum_yellow_fever_vaccine: "Вакцина от жёлтой лихорадки"
 je_panum_yellow_fever_vaccine_reason: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'взялась', 'взялся')] за амбициозную задачу — победить жёлтую лихорадку раз и навсегда. Удастся ли [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ей', 'ему')] — или [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] потерпит сокрушительную неудачу?"
 je_panum_yellow_fever_vaccine_success: "[GetPlayer.GetName] собрал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] как минимум #ORANGE 10 подсказок для вакцины#!."
 je_panum_yellow_fever_vaccine_goal: ""
 je_panum_yellow_fever_vaccine_fail: "Эксперимент заканчивается катастрофой."
 panum_psychologist: "Психолог"
 panum_psychologist_desc: "Этот человек думает, что у вас были проблемы с мамой и папой."
 panum_metamphetamine_army_modifier: "Солдаты на метамфетаминах"
 panum.2621.t: "Понятие страха"
 panum.2621.d: "Сёрен Кьеркегор, ведущий философ Дании, опубликовал «Понятие страха», эстетическое, философское и психологическое произведение, которое привлекло внимание копенгагенской публики."
 panum.2621.f: "«Возможность свободы — это не способность выбирать добро или зло. Возможность — это быть способным. В логической системе удобно говорить, что возможность переходит в действительность. Однако в действительности это не так удобно, и требуется промежуточный член. Промежуточный член — это страх, но он не объясняет качественный скачок больше, чем может оправдать его этически. Страх — это ни категория необходимости, ни категория свободы; это запутанная свобода, где свобода не свободна сама по себе, а запутана, не по необходимости, а в себе».\n —Сёрен Кьеркегор"
 panum.2621.g: "Один из величайших умов Дании."
 panum.2621.h: "Кьеркегор станет новым национальным писателем Дании."
 panum.2622.t: "Странный случай [SCOPE.sCharacter('panum_phineas_gage').GetFullName]"
 panum.2622.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] исследовал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] странный случай бригадира [SCOPE.sCharacter('panum_phineas_gage').GetFullName]. Во время взрыва железный стержень пронзил его череп снизу вверх, создав большой раневой канал. Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] утверждает, что он физически восстановился через несколько недель, и его интеллектуальные способности, включая восприятие, память, интеллект, языковые способности, а также его моторные навыки были полностью сохранены. Однако в период после несчастного случая [SCOPE.sCharacter('panum_phineas_gage').GetLastName] испытал заметные изменения личности."
 panum.2622.f: "«Ужасный несчастный случай. — Когда [SCOPE.sCharacter('panum_phineas_gage').GetFullName], бригадир на железной дороге в [SCOPE.sState('panum_phineas_gage_state').GetCustom('RU_SL_PP')], вчера занимался трамбовкой для взрыва, порох взорвался, пронеся через его голову железный инструмент диаметром дюйм с четвертью и длиной три фута и восемь дюймов, который он использовал в то время. Железо вошло с правой стороны его лица, раздробив верхнюю челюсть, и прошло позади левого глаза, и вышло на макушке.\n\nСамое необычное обстоятельство, связанное с этим печальным происшествием, заключается в том, что он был жив в два часа дня, в полном сознании и без боли».\n\nХроника столицы [ROOT.GetCountry.GetCapital.GetCityHubName]"
 panum.2622.g: "Значит, психика и области мозга связаны?"
 panum.2623.t: "Транскультуральная психология"
 panum.2623.d: "Во время визита в [SCOPE.sState('panum_colonial_state').GetCustom('RU_SL_VP')] доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] с удивлением обнаружил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')], что психические заболевания, подобные тем, что часто встречаются в столице — [ROOT.GetCountry.GetCapital.GetCityHubName], в этой области почти не встречаются."
 panum.2623.f: "Эмиль Крепелин в 1904 году на четыре месяца отправился на Яву и обследовал 225 человек в психиатрической лечебнице в Бейтензорге (ныне Богор). Будучи единственным ведущим психиатром своего времени, интересовавшимся исследованием транскультуральных явлений в психиатрии, он хотел выяснить, с одной стороны, «существуют ли определённые формы безумия, составляющие основное содержание наших учреждений, также в совершенно иных условиях жизни и среди совершенно иных племён так же и с той же частотой, что и у нас». С другой стороны, он предсказывал, что «частота и формы безумия однажды составят богатое сокровище для более глубокого понимания особенностей народа»."
 panum.2623.g: "По-видимому, некоторые неврозы связаны с культурным происхождением."
 panum.2624.t: "Наркотики"
 panum.2624.d: "Главный химик [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] в последнее время несколько раз экспериментировал с веществами. [SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'Ей', 'Ему')] это предложил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], с целью производства эффективных психотропных препаратов. Результат, однако, был... удивительным."
 panum.2624.f: "«Вы хотели срочно меня видеть?»\n«Да. Я подозреваю, что эксперимент был успешным».\n«Вы подозреваете?»\n«Новый препарат определённо обладает обезболивающим эффектом. Он эффективен против усталости. И он помогает от страха. Может быть, даже слишком хорошо»."
 panum.2624.g: "Диэтиламид лизергиновой кислоты? Что это?"
 panum.2624.h: "Нашим солдатам не помешает немного бронированного шоколада."
 panum.2625.t: "Психофизика"
 panum.2625.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] постулировал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] некоторые интересные теории относительно взаимосвязи между субъективным психологическим опытом и количественно измеримыми физическими стимулами."
 panum.2625.f: "Психофизика количественно исследует взаимосвязь между физическими стимулами и вызываемыми ими ощущениями и восприятиями. Психофизику описывают как «научное исследование взаимосвязи между стимулом и ощущением». Многие классические методы и теории психофизики были сформулированы в 1860 году Густавом Теодором Фехнером. Он ввёл термин «психофизика», описывая исследования, направленные на установление связи между физическими стимулами и содержанием сознания, таким как ощущения. Будучи физиком и философом, Фехнер стремился разработать метод, связывающий материю с разумом, соединяя общедоступный мир и частное впечатление человека о нём. Работа Фехнера была изучена и расширена Чарльзом С. Пирсом, которому помогал его ученик Джозеф Ястроу, который вскоре сам стал выдающимся экспериментальным психологом."
 panum.2625.g: "Я не понял ни слова, но бонусы выглядят хорошо!"
