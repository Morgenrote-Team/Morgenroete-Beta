 je_panum_measles_description_expedition_reason: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] возглавляет медицинскую экспедицию в [SCOPE.sCountry('target').GetAltNameNoFlag('RU_CL_PP')], чтобы получить ценные знания о #YELLOW кори#!. Пока в стране бушует болезнь, у [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'неё', 'него')] есть ежемесячный шанс получить новые сведения, чтобы составить исчерпывающее научное заключение о болезни.\n\nЕсли болезнь утихнет, научный прогресс не будет потерян, а будет учтён при следующем исследовании."
