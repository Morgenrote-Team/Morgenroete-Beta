 panum.2111.t: "Анатомия: [ROOT.Var('panum_physician_var').GetCharacter.GetLastNameNoFormatting]"
 panum.2111.d: "В своей борьбе с местными властями за расширение медицинского обслуживания доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] обнаружил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')], насколько плохо идёт подготовка молодых хирургов. Поэтому [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она написала', 'он написал')] стандартный труд, чтобы исправить это упущение."
 panum.2111.f: "«Анатомия человеческого тела» Грея, обычно называемая просто «Анатомия Грея», — это книга о человеческой анатомии. Она считается классикой в этой области, особенно в англоязычных странах. Первое издание вышло в 1858 году в Великобритании, а год спустя — в США под названием «Анатомия Грея: описательная и хирургическая»."
 panum.2111.g: "Каждый студент должен прочитать эту книгу во время своего обучения."
 panum.2111.h: "Практическое применение важнее преподавания."
 panum.2112.t: "Диаграмма причин смертности"
 panum.2112.d: "Посещая военные госпитали, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] заметил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')], как мало статистического материала используется для просвещения молодых врачей об опасности инфекционных заболеваний на поле боя. Поэтому [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она создала', 'он создал')] большое количество наглядных диаграмм."
 panum.2112.f: "Из-за болезни, которой она заразилась во время Крымской войны, Флоренс Найтингейл не могла лично увидеть, какова ситуация в казармах, больницах или работных домах. Поэтому она сосредоточилась на сборе данных, их подготовке и анализе, а затем — на выводах. Анкеты были важным инструментом в её работе, и она также использовала существующие данные. Среди прочего, это выявило серьёзные проблемы с военным здравоохранением. В своём докладе британскому правительству Найтингейл нашла для этого чёткие слова. Если из 1000 гражданских лиц ежегодно умирало 11, а из 1000 солдат линейной пехоты, артиллерии и гвардии, дислоцированных в Англии, — 17, 19 и 20 соответственно, то это было бы столь же преступно, как ежегодно выводить 1100 человек на равнину Солсбери и расстреливать их там. Флоренс Найтингейл считается одним из пионеров графического представления таких данных."
 panum.2112.g: "Эти статистические данные должны тщательно изучаться медиками на поле боя."
 panum.2112.h: "Практическое применение важнее преподавания."
 panum.2113.t: "Omnis cellula e cellula"
 panum.2113.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] расширил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] ранее известную клеточную теорию, включив в неё принцип, согласно которому каждая клетка возникает из другой клетки, и, следовательно, болезни также возникают из больных клеток. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она подробно описала', 'Он подробно описал')] этот тезис в своей работе по клеточной патологии, которая используется в качестве руководства в новых клиниках и больницах."
 panum.2113.f: "Клеточная патология — это теория болезней, согласно которой в основе заболеваний лежат нарушения в клетках тела или их функциях. Она была разработана в 1850-х годах Рудольфом Вирховом, который также ввёл термин «клеточная патология» в 1855 году. Его одноимённая работа стала стандартным трудом. Как концепция болезни, основанная на клеточной теории, она заменила гуморальную патологию, которая действовала с античных времён, и поэтому ответственна за всеобъемлющую революцию в представлении о развитии болезней и заболеваний в целом. Вместе с экспериментальной фармакологией, физиологией и микробиологией она образует единую основу для клинической медицины и фундамент научно обоснованной медицины."
 panum.2113.g: "Знания о больных клетках должны стать стандартом в университетах."
 panum.2113.h: "Это чрезвычайно важное открытие."
 panum.2114.t: "Прирождённый преступник"
 panum.2114.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] интенсивно изучал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] психику преступников и генетику человека и обнаружил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')], что преступные элементы можно определить по их физиогномике. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Её', 'Его')] многочисленные контакты с больными пациентами, сумасшедшими и ленивыми чиновниками во время попыток реформировать медицинскую систему вдохновляли [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] на протяжении всего пути."
 panum.2114.f: "Вдохновлённый теорией эволюции, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'провела', 'провёл')] исследования сотен людей в исправительных учреждениях и психиатрических больницах и обнаружил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')], что среди преступников широко распространён атавистический тип. Определённые формы преступности, таким образом, можно увидеть в чертах лица и формах черепа. Преступник становится преступником не по своей воле, а из-за своей генетической предрасположенности у него есть проблема, с которой он «ничего не может поделать». Преступник представляет собой отдельный антропологический тип, homo deliquens. Это эволюционно отсталый, более ранний и примитивный тип человека, который предстаёт как аморальный и движимый инстинктами."
 panum.2114.g: "Значит, вы преступник с рождения."
 panum.2121.t: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]: любовь к черепам"
 panum.2121.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] продолжил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] развивать свой тезис об антропологической криминологии и поэтому измерил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] тысячи черепов по всей стране. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она', 'Он')] даже хранит некоторые у себя дома."
 panum.2121.f: "«Криминология — это серьёзная естественная наука, которая слишком долго была пропитана философией. Моя революция заключается в том, чтобы вооружить её тем же эмпиризмом, что и любую современную науку этого века. Биология и математика — неподкупные предметы, и психиатрия и криминология могут у них поучиться. Если вы измерите и сравните каждый череп — а я сделал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] это с тысячами преступников, сумасшедших и казнённых, — то сможете собрать статистические данные, которые показывают один и тот же статистический результат снова и снова. Из этого можно вывести почти идеальные значения для вывода асимметрии лица преступника. Эти точные измерения намного надёжнее, чем совершенно беспочвенные предположения о человеческом разуме: здесь у нас есть цифры, факты, короче говоря, эмпирические исследования, а там — бездонная болтовня».\n\nИз «Преступного человека», [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]"
 panum.2121.g: "Какое... милое хобби."
 panum.2122.t: "Биологический детерминизм"
 panum.2122.d: "После дальнейших месяцев своих исследований доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] углубил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] свои предыдущие тезисы о «прирождённом преступнике» и опубликовал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] ещё более шокирующие выводы."
 panum.2122.f: "«Преступник — это дегенерат. В то время как человек эволюционирует, преступник представляет собой регресс, форму человеческого отступничества. Он — „современный дикарь“, он позволяет нам взглянуть на человека каменного века, который был менее утончён, менее чувствителен к боли и менее эмпатичен. Преступник не замечает страданий другого человека, так же как у него лишь ограниченная способность к состраданию. Поскольку преступник действует из преступной предрасположенности, можно предположить, что эта преступная предрасположенность наследуется. Можно было бы предположить, что если люди совершают свои деяния не по своей воле, а скорее из-за биологической детерминации, то это должно быть смягчающим обстоятельством при наказании. Но всё наоборот, потому что на преступника не произвести впечатления устрашающим приговором, он не поддаётся ни реинтеграции, ни предсказанию. В центре внимания — защита общества. Поэтому лучше подумать о пожизненном заключении или смертной казни. Мы не можем позволить этим опасным преступникам причинять вред невинным людям».\n\nИз «Преступного человека», [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]"
 panum.2122.g: "Есть ли у нас другой выбор, кроме как принять это в качестве господствующей теории?"
 panum.2123.t: "Опасный преступный субъект"
 panum.2123.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] тщательно изучил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] физиогномику [SCOPE.sCharacter('panum_victim_scope').GetFullName] и, в частности, форму [SelectLocalization(SCOPE.sCharacter('panum_victim_scope').IsFemale, 'её', 'его')] черепа, и приш[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ла', 'ёл')] к выводу, что [SelectLocalization(SCOPE.sCharacter('panum_victim_scope').IsFemale, 'она', 'он')] — крайне опасный человек с преступной энергией, которого следует немедленно отстранить от всех должностей — для защиты общества!"
 panum.2123.f: "«У воров, как правило, очень подвижные лица и руки; глаза у них маленькие, беспокойные, часто косящие; брови нахмурены и сдвинуты; нос кривой или тупой, борода редкая, волосы редко густые, лоб почти всегда маленький и покатый, ухо часто торчит, как ручка...\n\nУ убийц стеклянный, ледяной, неподвижный взгляд; глаза иногда налиты кровью. Нос большой, часто орлиный или, скорее, ястребиный; челюсти сильные, уши длинные, щёки широкие, волосы вьющиеся, густые и тёмные, борода часто редкая; губы тонкие, клыки большие... В общем, у прирождённых преступников уши в форме ручки, волосы густые, борода редкая, лобные пазухи выпуклые, челюсть огромная, подбородок квадратный или выступающий, скулы широкие». — Чезаре Ломброзо"
 panum.2123.g: "У этого человека действительно лицо преступника."
 panum.2123.h: "Доктор заходит слишком далеко в своих обвинениях!"
 panum.2124.t: "Ещё один любитель черепов!"
 panum.2124.d: "Today, Doctor [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] introduced an aspiring academic who loves skulls almost as much as [ROOT.Var('panum_physician_var').GetCharacter.GetSheHe] does. However, Doctor [SCOPE.sCharacter('andersson_new_anthropologist_scope').GetLastName] is more concerned with the skulls of dead people."
 panum.2124.f: "'[SCOPE.sCharacter('andersson_new_anthropologist_scope').GetFullName] is an excellent scientist who understands the importance of examining skulls in order to draw conclusions about the person to whom the skull belongs. Unfortunately, [SCOPE.sCharacter('andersson_new_anthropologist_scope').GetSheHe] only deals with the skulls of people who have died for an immeasurable amount of time. Unbelievable! You can't be sure whether they were really criminals. How is that supposed to help?'"
 panum.2124.g: "Это... неожиданно приятный сюрприз."
 panum.4003.t: "Конец оспы"
 panum.4003.d: "Вопреки всему, наша кампания против оспы увенчалась невиданным успехом — болезнь теперь искоренена."
 panum.4003.f: "Для многих это день, который начинается как любой другой, и они не подозревают, какое это поистине великолепное утро. Для тех, кто в курсе, это кульминация работы всей жизни, мечта, едва вообразимая, наконец, осуществившаяся. Многие не думали, что это можно сделать при их жизни, что это будет какая-то сказочная работа для конца двадцатого или даже двадцать первого века, и всё же, здесь, сейчас, это сделано в [TimeKeeper.GetCurrentDate.Format('y')] году. Последний подтверждённый случай закончился без единого нового заражения, отправив эту болезнь в историю. Впервые в истории угроза этой болезни не висит ни над одной головой.\n\nА это означает лишь одно: оспы больше нет.\n\nМногие считали это невозможным... но даже те, кто не в курсе, не могут не слышать празднований в университетах и больницах, не видеть тостов врачей и учёных и не знать, что это хороший день."
 panum.4003.g: "В этот день человек сотворил своё собственное чудо."
 panum.2211.t: "Исследование болезни"
 panum.2211.d: "Во время своих медицинских обследований доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] понял[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')], что [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] хочет подробно исследовать болезнь, о которой в нашей стране опубликовано очень мало, но которая стала широко распространённым заболеванием в определённых регионах."
 panum.2211.f: "Помимо крупных эпидемических заболеваний, существуют многочисленные повседневные и широко распространённые болезни, а также давно известные бичи человечества, причины и методы лечения которых до сих пор неизвестны. Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] задаётся вопросом, не следует ли [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ей', 'ему')] сосредоточиться на очень конкретном заболевании."
 panum.2211.g: "Исследовать болезнь сортировщиков шерсти."
 panum.2211.h: "Исследовать зобную болезнь."
 panum.2211.i: "Исследовать мочекаменную болезнь."
 panum.2211.j: "Исследовать пеллагру."
 panum.2211.k: "Исследовать рахит."
 panum.2211.l: "Исследовать сифилис."
 panum.2211.m: "Исследовать столбняк."
 panum.2211.z: "Доктор должен использовать это время, чтобы больше сосредоточиться на обучении."
 panum_disease_investigation_project_progress_bar: "Исследование болезни"
