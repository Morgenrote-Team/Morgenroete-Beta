 panum.55.t: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] может описать иностранную болезнь"
 panum.55.d: "В другой стране вспыхнула болезнь, которую ваш [concept_panum_physician|l] мог бы исследовать, чтобы составить её описание."
 panum.55.g: "Немедленно отправить нашего врача!"
 panum.55.h: "Не сейчас."
 panum.55.i: "Уведомлять меня менее навязчивым способом."
 panum.55.j: "Больше не сообщать мне об этом."
 panum_foreign_disease_research_only_notification_tt: "Отныне вы будете получать #V уведомления#! о возможности отправить вашего [Concept('concept_panum_physician', '#b #BLUE врача#!#')] в страны с эпидемиями."
