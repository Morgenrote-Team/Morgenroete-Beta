 panum.138.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')]"
 panum.138.d: "Сегодня доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'представила', 'представил')] своё описание болезни [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')]. Медицинский факультет уже считает его классикой."
 panum.138.f: "В своём трактате «[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_description_title')]» [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] рассматривает болезнь более подробно, чем любой другой врач в нашей стране до [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'неё', 'него')]. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она знакомит', 'Он знакомит')] читателя с симптомами, инкубационным периодом и отличиями от других болезней, а также с хронологией прошлых эпидемий и другими традиционными эпидемиологическими описаниями."
 panum.138.g: "Теперь мы лучше знаем зверя."
 panum.139.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]"
 panum.139.f: "Медицинский факультет с нетерпением ждал научную работу о методе лечения, которую писал доктор [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]. Возможно, эта работа принесёт прорыв? Трактат «[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]» потенциально может спасти жизни бесчисленного количества людей. Описанные в нём причины вспышки болезни [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] и способы её предотвращения или лечения могут коренным образом изменить представление об этой болезни."
 panum.139.g: "[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_disease_title')] теряет свой былой ужас."
 panum.140.t: "Холера — болезнь, передающаяся через воду!"
 panum.140.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'провела', 'провёл')] героическую работу, благодаря которой вспышка холеры в городе [SCOPE.sState('panum_disease_state').GetCityHubName] была решительно подавлена!"
 panum.140.f: "«С самого начала моего пребывания здесь, в городе [SCOPE.sState('panum_disease_state').GetCityHubName], [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я собрала', 'я собрал')] массу информации, которая указывает на один вывод: холера — это болезнь, передающаяся через воду. Болезнь, которая веками убивала стольких, находится не в воздухе, как миазмы, а кишит и роится в каплях воды. Попав внутрь, она развивается в кишечнике и проявляется в виде холеры, с которой мы научились бороться. Это тяжёлый урок, но мы быстро приняли меры. На прошлой неделе сняли ручки с водяного насоса в центре этой вспышки. Сегодня я ухожу на покой, не получив ни одного нового случая. Это неопровержимо. Зверь повержен.\n\nИ всё же я испытываю укол сожаления. Я не [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'хотела', 'хотел')] бы утверждать, что я один несу полную ответственность за сделанные нами здесь открытия, я лишь [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'хотела', 'хотел')] бы, чтобы они были сделаны раньше. Многие жизни были потеряны из-за отсутствия чистой питьевой воды, молодые и старые. Если нам повезёт, пусть это будет последняя наша встреча с холерой».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о Великой эпидемии холеры [TimeKeeper.GetCurrentDate.Format('y')] года, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.140.g: "Невероятно! Это смертельный удар по [Concept('concept_panum_germ_theory', 'теории миазмов')]!"
 panum.141.t: "Пивоварня"
 panum.141.d: "В ходе расследования доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'набрела', 'набрёл')] на островок безопасности во время вспышки — пивоварню."
 panum.141.f: "«Здравствуйте! Мне сказали, что вы, должно быть, бригадир здесь, на пивоварне. Я доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], и я здесь, чтобы расследовать вспышку. Пожалуйста, расскажите мне больше».\n\n«Ну, здесь у нас особых проблем не было. Большинство других заводов закрылись, но не мы».\n\n«Холера вас здесь не сильно затронула? У вас есть какие-нибудь соображения, почему?»\n\n«Ни малейшего, боюсь. Но если бы мне пришлось поспорить, то это потому, что парни не возвращаются домой ко всей этой вони».\n\n«Они едят на пивоварне?»\n\n«Да, и пьют тоже! Босс позволяет нам всем выпить немного старых партий, которые плохо продаются, за обедом, небольшой заряд бодрости для парней за копейки. Никакой колодезной воды для нас, только пинта пива почти по себестоимости»."
 panum.141.g: "Хм... так вы не пьёте местную воду. Очень интересно."
 panum.142.t: "Сила привычки"
 panum.142.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] продолжает расследование — [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она нашла', 'он нашёл')] то, что может быть центром вспышки."
 panum.142.f: "«...но случаи в этом районе были настолько частыми, что [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я поняла', 'я понял')], что мне нужно больше указаний. К счастью, местное бюро судмедэкспертизы оказало мне неоценимую помощь: они записали адрес каждого дома, из которого они забирали тело или где замечали болезнь, и это дало мне возможность точно нанести каждый такой случай на простую карту. Получившаяся область обширна, охватывает более сотни домов, но она также образует огромный круг.\n\nЭто противоречит традиционным представлениям. Если бы это были миазмы, то их бы разносило ветром, путешествуя по преобладающим потокам. Вместо этого они выходят за пределы ветров, образуя круглую и тревожно аккуратную форму. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я пошла', 'Я пошёл')] в центр всего этого, возможно, в надежде найти какую-нибудь подсказку... и не нашёл ничего, кроме водяного насоса. Каждый дом на карте был в шаговой доступности. Должна быть какая-то связь».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о Великой эпидемии холеры [TimeKeeper.GetCurrentDate.Format('y')] года, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.142.g: "Может быть... дело в самом насосе?"
 panum.143.t: "Странности"
 panum.143.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] нечто интересное — разрыв в шаблоне."
 panum.143.f: "«О, слава богу! Вы, должно быть, тот врач, о котором говорят, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]! Пожалуйста, вы должны нам помочь».\n\n«[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я полностью намерена', 'Я полностью намерен')] это сделать, мэм. Пожалуйста, расскажите мне как можно больше о вас и ваших близких, и не упускайте даже малейших деталей, если можете. Ваши случаи, похоже, одни из немногих в этом районе?»\n\n«Да, да, это мы! Это просто появилось из ниоткуда! Мы приняли все меры предосторожности, даже носили одну из тех цветочных масок со всеми цветами, чтобы отогнать вонь!»\n\n«Тогда вы ходили в район вспышки? Зачем?»\n\n«Моя мать, моя дорогая мать... ей всегда больше нравилась вода из их насоса, но когда я принесла её обратно, болезнь, должно быть, прилипла к моей одежде и пришла со мной домой»."
 panum.143.g: "...вы сказали, что принесли воду из их насоса?"
 panum.144.t: "Фильтры"
 panum.144.d: "Пытаясь найти больше подсказок о вспышке, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'обнаружила', 'обнаружил')], что все жертвы получают воду от одной и той же компании!"
 panum.144.f: "«...но это самое любопытное из всего. Когда [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я путешествовала', 'я путешествовал')] по дороге или вверх по реке, к домам, обслуживаемым компанией „Нью-Ривер“, количество случаев холеры резко сократилось. Оно было не больше обычного, если не меньше. Вернувшись на юг, можно обнаружить, что улицы пылают холерой, наполнены зловонием нечистот и смерти. Может ли это быть локализацией миазматической почвы?\n\nЯ так не думаю. Это кажется слишком чётко обозначенным. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я связалась', 'Я связался')] с почтенными господами из компании „Нью-Ривер“, и они сообщили мне, что их трубы были недавно закрыты, пока они добавляли новые фильтры, за большие деньги, на свою насосную станцию. Могут ли эти фильтры играть какую-то невидимую роль в этом? Может ли это быть простая чистота воды, сдерживающая миазмы, или что-то большее?»\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о Великой эпидемии холеры [TimeKeeper.GetCurrentDate.Format('y')] года, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.144.g: "...есть ли что-то в воде, что приносит болезнь?"
 panum.145.t: "Коричневая вода"
 panum.145.d: "Вооружившись новейшими инструментами для своих исследований, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'использовала', 'использовал')] свой микроскоп для изучения образцов вспышки холеры."
 panum.145.f: "Привезти микроскоп в город [SCOPE.sState('panum_disease_state').GetCityHubName] было непросто, так как кочка на дороге чуть не разбила все линзы... но теперь, когда он был здесь, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] мог распоряжаться одним из величайших инструментов современной медицины. Несколько десятков образцов, собранных из местной воды, тщательно подготовленных и каждый просмотренный под микроскопом. Некоторые были из районов с меньшим количеством холеры. Эти были чище, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'отметила она', 'отметил он')].\n\nА грязные? Те, что кишат грязью самого гнусного вида?\n\nТе были из наиболее пострадавших районов. Потёртый лоб, минута раздумий. Частицы грязи, плавающие в жидкости, как хлопья грязного снега. Здесь, там, крошечные движения безвредных микробов, невинно порхающих в этой отвратительной жиже."
 panum.145.g: "...или вы не так уж и безвредны, как кажетесь?"
 panum.145.h: "Ещё одно доказательство в пользу другой теории."
 panum.145.i: "Должно быть что-то ещё."
 panum.146.t: "Первая смерть"
 panum.146.d: "После неустанной работы и расследования доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'проследила', 'проследил')] вспышку до первого зарегистрированного случая — новорождённого ребёнка."
 panum.146.f: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'нанесла', 'нанёс')] визит в дом женщины в самом глубоком трауре, женщины, которая когда-то была женой и матерью, а теперь не была ни той, ни другой. Уже, едва сойдя со ступеней её двери, врач делал свои заметки.\n\nНоворождённого мальчика унесли с улицы к бабушке. Вернулся с холерой. Подгузники стирали, возможно, перенося болезнь.\n\nМуж вернулся с работы. Жаждал после смены на сталелитейном заводе. Хорошо ел, хорошо пил, умер в конце недели от холеры.\n\nЗа ними — плач. Впереди — дождливые, пустынные улицы. Среди всего этого — шёпотом произнесённое предложение."
 panum.146.g: "Пожалуйста, пусть всему этому будет конец."
 panum.147.t: "Яма"
 panum.147.d: "В ходе своего расследования доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'обнаружила', 'обнаружил')] нечто упущенное из виду — выгребную яму."
 panum.147.f: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] не [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'была поклонницей', 'был поклонником')] [Concept('concept_panum_germ_theory', 'теории миазмов')], но [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она была', 'он был')] очень [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'благодарна', 'благодарен')] за цветочные маски, предназначенные для защиты от них. Выгребная яма была полна гниющих отходов и совершенно, абсолютно протухшей. Даже инспектор полиции отшатнулся от её края.\n\n«Доктор! Такая яма, безусловно, должна быть источником этих миазмов и отвратительной холеры, которую она нам даёт!»\n\n«Возможно, и так, но посмотрите сюда, инспектор. Вы видите, как дождевая вода стекает в землю, здесь?»\n\n«Да, вижу, но что с того?»\n\n«Дождевая вода течёт из этой выгребной ямы туда, к сточным канавам. Она должна течь через них, но если так, то она понесёт воду близко к насосу. Если фитинги повреждены...»\n\n«...тогда она засосёт сточные воды прямо в рукоятку. Фу. Хорошо, что болезнь не распространяется через воду...»"
 panum.147.g: "...верно?"
 panum.147.h: "Неверно!"
 panum.148.t: "Особняк"
 panum.148.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], в своём расследовании [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'обнаружила', 'обнаружил')] любопытную дыру в охвате вспышки — дому богатого человека."
 panum.148.f: "«[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я посетила', 'Я посетил')] сегодня резиденцию местного джентльмена, более величественное жилище в черте города, опасно близко к сердцу вспышки. Похоже, это остаток более раннего периода в истории этого города, когда эта часть была богаче, чем жалкая трущоба. Хозяин дома был весьма заинтригован расследованием и предоставил мне множество книг по местной истории в надежде, что они прольют свет на прошлые вспышки. Что ещё интереснее, они дали понять, что холера ещё не проникла за их стены.\n\nЭто было для меня весьма интересно, ибо по принципам [Concept('concept_panum_germ_theory', 'теории миазмов')] болезнь находится в воздухе, в запахе, и не должна таким образом различать богатых и бедных. Даже его слуги не заражены, по крайней мере, те, кто живёт в комнатах. Они едят из кладовой и пьют из артезианского колодца внутри стен, и каким-то образом это делает их незатронутыми. Любопытная загадка. Есть ли у них что-то, чего нет у других?»\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о Великой эпидемии холеры [TimeKeeper.GetCurrentDate.Format('y')] года, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.148.g: "Или... может быть, у слуг нет чего-то, что есть у больных?"
 panum.149.t: "Крошечная смерть"
 panum.149.d: "В ходе расследования доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], возможно, выявил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] виновника — микроб!"
 panum.149.f: "«...но всё же [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я должна была', 'я должен был')] быть особенно [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'уверена', 'уверен')]. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я вызвала', 'Я вызвал')] свежие образцы, взятые как из воды, так и из специально подготовленных стоков больных. Поместив их на стекло моего микроскопа, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я смогла', 'я смог')] заглянуть в эти жидкости и подтвердить наличие того, что должно быть нашим великим врагом в этой битве: вибрионов.\n\nНа первый взгляд эти микробы кажутся безвредными, больше похожими на трубки, чем на какого-либо великого хищника. Но каждый образец от больных подтверждает их присутствие, и кажется несомненным, что эти существа играют какую-то роль в этой болезни. Они... сама холера? Возможно. Если так, то это веское доказательство [Concept('concept_panum_germ_theory', 'теории')], что такие микробы вызывают болезни.\n\nНо одно ясно: мы нашли врага. Теперь мы должны его уничтожить».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о Великой эпидемии холеры [TimeKeeper.GetCurrentDate.Format('y')] года, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.149.g: "Очищать и лечить, пока не будет покончено."
 panum.149.h: "Это открытие выходит далеко за рамки холеры."
 panum.150.t: "Дело рук"
 panum.150.d: "В городе [SCOPE.sState('panum_disease_state').GetCityHubName] доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'встретилась', 'встретился')] с коронером, редким союзником в борьбе с болезнью, чтобы обсудить их выводы."
 panum.150.f: "«Ах, вы, должно быть, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]! Простите, что не пожимаю вам руку, я последние несколько дней копался в трупах».\n\n«...поверьте, вам не нужно просить у меня прощения. Вы местный коронер, пожалуйста, расскажите мне о своих выводах».\n\n«Как вы знаете, холера — это болезнь кишечника. Больше мне и говорить нечего. Рвота, понос, кишечник, забитый так, что похож на яичные белки, кто-то такой учёный, как вы, знает этот список».\n\n«Конечно, но что вы находите интересным?»\n\n«Ну... мне всё время говорят, что это миазмы, что эта смерть в воздухе... но, честно говоря, я так не думаю. Я бы уже был мёртв, если бы это было так. У меня на том столе было много тел, доктор. Это пахнет пищевым отравлением, но это не оно»."
 panum.150.g: "Весьма увлекательная мысль. Расскажите мне больше."
 panum_physician_health_malus_modifier: "Неустанный труд"
 panum.151.t: "Завод инструментов"
 panum.151.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] при посещении местного завода инструментов получает больше вопросов, чем ответов."
 panum.151.f: "«Когда [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я пошла', 'я пошёл')] на днях на завод инструментов, поначалу всё казалось логичным. Этот завод специализируется на ножах, инструментах для мясников и тому подобном, и поэтому у них есть точильный цех. Он использует водяные колёса для вращения большого количества точильных камней, заточных кругов для окончательной заточки каждого лезвия. Каждый рабочий лежит на животе рядом с точилкой и может быть обрызган водой. Всё это имеет смысл, и если бы вспышка на заводе ограничилась этим, это было бы логично.\n\nСтранным становится то, что это нарушает тенденцию, наблюдаемую повсюду. На заводе заболевают люди, которые никогда не были рядом с улицей, являющейся центром этой вспышки, ни у точильных кругов. Как это вообще возможно?»\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о Великой эпидемии холеры [TimeKeeper.GetCurrentDate.Format('y')] года, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.151.g: "По-видимому, ложная зацепка."
 panum.151.h: "По-видимому, ложная теория."
 panum.152.t: "Банка"
 panum.152.d: "К сожалению, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'зашла', 'зашёл')] в тупик — местный случай пищевого отравления, не связанный с холерой."
 panum.152.f: "«Сегодня был самый раздражающий день. Меня вызвала полиция для расследования внезапной вспышки болезни в популярном отеле, которая выглядела как внезапная вспышка холеры. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я собрала', 'Я собрал')] все свои вещи для расследования, уведомив соответствующие органы о необходимости найти кровати и уход за больными, но в тот момент, когда [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я прибыла', 'я прибыл')], [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я поняла', 'я понял')], что это не холера. Симптомы были не те, внезапное начало слишком быстрым. Виновата была более локальная причина, и, неудивительно, все пострадавшие ели одно и то же блюдо.\n\nПоход на кухню выявил виновника: наверняка просроченная банка утиного паштета, намазанного на прекрасный хлеб поваром с заложенным от простуды носом, чтобы не учуять гниль. Пустая трата времени, если таковая вообще существует. Пищевое отравление — это не холера».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о Великой эпидемии холеры [TimeKeeper.GetCurrentDate.Format('y')] года, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.152.g: "...ну, по крайней мере, мы теперь знаем, что нужно убирать в шкафах."
 panum.153.t: "[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Перепутала', 'Перепутал')]"
 panum.153.d: "Произошёл несчастный случай — доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'перепутала', 'перепутал')] свои образцы!"
 panum.153.f: "Но прямо посреди работы меня прервали. Крики, вопли, звук драки на улице. Пьяная потасовка, одна чарка лишняя. Полиция быстро навела порядок, утащив их, всё ещё кричащих.\n\nМне потребовалась всего минута, чтобы встать с места и закрыть ставни, и ещё меньше, чтобы вернуться к работе. Тем большим дураком [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я была', 'я был')], что не [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'заметила', 'заметил')], что [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'поставила', 'поставил')] образцы в неправильном порядке, и откуда потом, как не делать свою работу в неправильном порядке, регистрировать каждый в неправильном порядке?\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о Великой эпидемии холеры [TimeKeeper.GetCurrentDate.Format('y')] года, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.153.g: "Недели работы, впустую. Проклятье."
 panum.154.t: "Подражатель?"
 panum.154.d: "Расследование вспышки холеры в городе [SCOPE.sState('panum_disease_state').GetCityHubName] приняло тревожный оборот — похоже, может быть и другая болезнь!"
 panum.154.f: "«Ах, рад снова вас видеть, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]. Мой стол был занят на прошлой неделе».\n\n«[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я бы не сказала', 'Я бы не сказал')], что рада вас видеть, коронер. Что у нас?»\n\n«Прибывает всё больше тел. Я думал, это опять холера, и может быть, это она и есть, но что-то не так».\n\n«Пищевое отравление?»\n\n«Нет, не с такой скоростью, с какой их уносят. В основном дети, и старики тоже».\n\n«Холера ещё более смертельна для уязвимых, чем для кого-либо ещё. Вы уверены, что это не она?»\n\n«Она же не пишет своё имя на внутренней стороне их вен. Дизентерия, холера, тиф? Обычное пищевое отравление? Кто может сказать? Единственное, что я знаю, это то, что это не похоже на то же самое. Нет белого, как при холере, но смерть та же».\n\n«Тогда у нас вполне может быть вторая болезнь... чёрт и проклятие. Как нам отличить их друг от друга?»\n\n«Вы врач, а не я»."
 panum.154.g: "Я не могу составить план, если не знаю, с чем борюсь."
 panum.155.t: "Миазмы...?"
 panum.155.d: "При расследовании, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], столкнул[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ась', 'ся')] с проблемой — может быть, миазмы реальны?"
 panum.155.f: "«...но результаты этого последнего этапа расследования бросают вызов логике [Concept('concept_panum_germ_theory', 'теории микробов')], и я, хоть убей, не могу понять, почему. Дома стоят рядом с неглубоким каналом, по которому часто ходят баржи, доставляющие уголь на литейные заводы. Они не находятся в лёгкой пешей доступности от каких-либо водяных насосов, кроме старого колодца. Он чистый, возможно, самый чистый в городе.\n\nИ всё же, по какой-то причине, мне непонятной, холера здесь. Уже работают, чтобы отогнать вонь, и вонь, миазмы, действительно есть. Канал воняет стоками... но если они не пьют эту воду, то как ещё она может им навредить, кроме как только запахом?»\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о Великой эпидемии холеры [TimeKeeper.GetCurrentDate.Format('y')] года, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.155.g: "Миазмы не могут быть правильным ответом... или могут?"
 panum.156.t: "Разрушено"
 panum.156.d: "В погоне за всё большим количеством земли под застройку, развитие города [SCOPE.sState('panum_disease_state').GetCityHubName] не останавливается даже ради расследования, которое ведёт доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]."
 panum.156.f: "«...вы кто такой, опять же?»\n\n«Врач, расследующий эту вспышку. Эта улица была полна больных людей. Где они?»\n\n«Понятия не имею. Мы с парнями просто здесь, чтобы начать сносить эти дома».\n\n«Сносить их? Что? В этих домах жили десятки семей, все заражённые холерой!»\n\n«Ну, больше не живут. Хозяин всех их выгнал на улицу».\n\n«Они ЧТО?»\n\n«Вышвырнул их! Так они не платят аренду, но это всё равно не имеет значения. Земля переходит под текстильную фабрику, и если вы не возражаете, мы с парнями должны начать сносить эти дома»."
 panum.156.g: "О, ради всего святого. Теперь мне снова придётся искать больных... только ничего не пейте."
 panum.157.t: "[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Заражена', 'Заражён')]"
 panum.157.d: "Ужасные новости! Врач заразился холерой!"
 panum.157.f: "«Я не знаю, как это произошло. Миазмы? [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я неделями была', 'Я неделями был')] рядом с больными, мёртвыми и умирающими, больше, чем кто-либо другой. Микробы? [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я не пила', 'Я не пил')] воду, но что насчёт заражения? Может ли оно передаваться через прикосновение? В воздухе, на поверхностях? Я не знаю.\n\nНо я знаю симптомы. Расстройство желудка, и как оно никогда не заканчивается. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я могла', 'Я мог')] бы вообще ничего не есть и не пить, какой в этом толк. Это говорит о тысяче истин, и об одной.\n\nУ меня холера».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о Великой эпидемии холеры [TimeKeeper.GetCurrentDate.Format('y')] года, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.157.g: "О, я очень надеюсь, что [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] скоро поправится."
 panum.161.t: "Рюмочка джина"
 panum.161.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] время отвлечься от работы, чтобы «исследовать» свою другую страсть: алкоголь."
 panum.161.f: "«...но, выпив второй бокал этого самого чудесного напитка, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я начала', 'я начал')] понимать кое-что довольно странное. Чем больше людей приходило в это место выпить, тем меньше вероятность того, что они заболеют холерой. Действительно! Моя собственная карта показывает, что у домов, ближайших к этому месту, значительно меньше шансов быть поражёнными этой проклятой болезнью.\n\nЗдесь есть закономерность, я чувствую. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я поговорила', 'Я поговорил')] ещё с владельцем и несколькими более приветливыми местными жителями, и они, кажется, согласны. В этом месте есть что-то, что, кажется, помогает отгонять болезнь. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я должна', 'Я должен')] исследовать это подробнее».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о Великой эпидемии холеры [TimeKeeper.GetCurrentDate.Format('y')] года, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.161.g: "Ах, чудеса совмещения приятного с полезным."
 panum.162.t: "До дна"
 panum.162.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'совершила', 'совершил')] самый смелый поступок из всех — [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она заразила', 'он заразил')] себя холерой, выпив заражённой воды!"
 panum.162.f: "«...конечно, вся лучшая теория в мире — ничто без практики. Несмотря на всю проделанную работу, для моих недоброжелателей это остаётся лишь случайностью, они продолжают утверждать, что нет неопровержимых доказательств, чтобы подкрепить мои мысли. Что ж, хорошо. Я встречу их лицом к лицу, и самым прямым способом из всех: выпив ту же воду, что и в центре этой вспышки, доставленную верным курьером. Если они правы, то я не заболею, даже будучи вдали от этого места. Если я прав, то скоро я буду бороться за свою жизнь, но что такое одна жизнь по сравнению с таким количеством, которое можно спасти, если я смогу доказать свои утверждения?\n\nИтак, мой дорогой дневник, тост за здоровье».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о Великой эпидемии холеры [TimeKeeper.GetCurrentDate.Format('y')] года, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.162.g: "«О, боже, я чувствую... о нет»."
 panum.162.h: "Отговорить доктора от этого безрассудного манёвра!"
 panum.163.t: "Карта к успеху"
 panum.163.d: "Доктору [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] удалось составить превосходную карту центра вспышки, что позволяет легко отслеживать распространение болезни."
 panum.163.f: "«Господа, господа, представляю вам свою карту заражения в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')]. Она охватывает, в превосходных деталях, местоположение каждого отдельного заражения в регионе, с указанием времени и даты, с именем и количеством смертей, заражений и так далее. Она представляет собой письменную хронологию всего развития вспышки холеры в этом районе. Пример: здесь мы видим водяной насос и количество домов в шаговой доступности.\n\nКроме того, я представляю следующие таблицы, составленные путём табулирования информации с этой карты. Если вы, уважаемые господа, сами посмотрите, то увидите, что в районах, обслуживаемых этим водяным насосом, самые высокие показатели смертности из всех. Здесь, на этой таблице, мы видим, что водопроводная компания, „[SCOPE.sState('panum_disease_state').GetName] Уэллс“, имеет прямую корреляцию с этими насосами, что, в свою очередь, показывает, что у этой компании самый высокий риск холеры из всех обслуживаемых районов...»"
 panum.163.g: "Однажды это станет наукой."
 panum.164.t: "Огонь и ярость"
 panum.164.d: "Из-за отсутствия прогресса в борьбе со вспышкой холеры в городе [SCOPE.sState('panum_disease_state').GetCityHubName], доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'потеряла', 'потерял')] терпение."
 panum.164.f: "Крики были слышны почти за квартал, а звук книг и чашек, брошенных со стола, — далеко за дверью. Шквал проклятий, отчаянные, испуганные извинения ассистентов, затем ещё крики, и ещё, и ещё.\n\n«Вы дураки! Вы абсолютные, полные идиоты! Мы здесь не просто так! Люди умирают за нашей дверью, и они смотрят на нас, чтобы мы их спасли, и мы их спасём!»\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] сжимает руку в кулак.\n\n«Если вы не можете выполнить даже самые простые инструкции, то вам здесь не место! Те из вас, кто может, выполняйте мои приказы дословно, и мы ПОБЕДИМ эту проклятую чуму! Вы меня слышите?»\n\n«Да, доктор!»\n\n«А теперь возвращайтесь туда и найдите мне ещё образцов! ПРАВИЛЬНЫХ, на этот раз!»"
 panum.164.g: "И вот, доктор выводит свою армию в поход, готовый вести войну с самой болезнью."
 panum.165.d: "В момент абсолютного мужества доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'посетила', 'посетил')] один из самых пострадавших госпиталей в городе [SCOPE.sState('panum_disease_state').GetCityHubName], чтобы опросить тамошних пациентов."
 panum.165.f: "Палата этой импровизированной больницы была переполнена, полна видов и звуков, но больше всего запахов. Запах болезни. Запах смерти. Принесли цветы, чтобы попытаться отогнать смрад, и благовония тоже, но всё равно немногие приходили в этот зал проклятых. Это было слишком рискованно, говорили они, слишком опасно для их собственного здоровья. Как они могли надеяться помочь другим, если сами лежали, умирая, в кровати?\n\nНемногие приходили, но не никто. Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'была', 'был')] одним из них, и [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она прошла', 'он прошёл')] через это место смерти и умирания с неустанным мужеством и безграничной энергией. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она садилась', 'Он садился')] у постели больных и одиноких, задавая вопросы, делая заметки. Каждая мысль, каждый ответ были драгоценны. Это были ключи к спасению, намёки на то, откуда могла прийти эта смерть и как её тоже можно было убить."
 panum.165.g: "И в этом зале смерти шёл ангел жизни, с журналом в руке."
 panum.166.t: "Сила молитвы"
 panum.166.d_christian: "В поисках как прозрения, так и, возможно, утешения, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'обратилась', 'обратился')] к священнику в местном соборе."
 panum.166.d_muslim: "В поисках как прозрения, так и, возможно, утешения, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'обратилась', 'обратился')] к имаму в местной мечети."
 panum.166.d_other: "В поисках как прозрения, так и, возможно, утешения, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'обратилась', 'обратился')] к жрецу в местном храме."
 panum.166.f_christian: "«Здравствуйте, отец. Я доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'посланная', 'посланный')] столицей для расследования этой вспышки и оказания любой возможной помощи. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я бы попросила', 'Я бы попросил')] вас о помощи, если вы можете её оказать».\n\n«Я всего лишь смиренный священник, а не Всевышний, но я сделаю всё, что в моих силах. Скажите мне, дитя. Что вам нужно?»\n\n«[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я хотела', 'Я хотел')] бы узнать как можно больше о первых днях этой инфекции. Кто был первым, кто заболел? Где? У вас есть какие-нибудь мысли о том, откуда она могла взяться?»\n\n«Только Бог может знать ответ на некоторые из этих вопросов, но да, я много знаю о своей пастве. Пойдёмте, пойдёмте. Я ведь тоже вёл свои записи»."
 panum.166.f_muslim: "«Ас-саляму алейкум, имам. Я доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'посланная', 'посланный')] столицей для расследования этой вспышки и оказания любой возможной помощи. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я бы попросила', 'Я бы попросил')] вас о помощи, если вы можете её оказать».\n\n«Я всего лишь смиренный священнослужитель, а не Всевышний, но я сделаю всё, что в моих силах. Скажите мне, что вам нужно?»\n\n«[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я хотела', 'Я хотел')] бы узнать как можно больше о первых днях этой инфекции. Кто был первым, кто заболел? Где? У вас есть какие-нибудь мысли о том, откуда она могла взяться?»\n\n«Только Аллах может знать ответ на некоторые из этих вопросов, но да, я много знаю о здешней общине. Пойдёмте, пойдёмте. Я ведь тоже вёл свои записи»."
 panum.166.f_other: "«Приветствую вас, жрец. Я доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'посланная', 'посланный')] столицей для расследования этой вспышки и оказания любой возможной помощи. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я бы попросила', 'Я бы попросил')] вас о помощи, если вы можете её оказать».\n\n«Я всего лишь смиренный хранитель этого храма, а не один из богов, но я сделаю всё, что в моих силах. Скажите мне, доктор. Что вам нужно?»\n\n«[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я хотела', 'Я хотел')] бы узнать как можно больше о первых днях этой инфекции. Кто был первым, кто заболел? Где? У вас есть какие-нибудь мысли о том, откуда она могла взяться?»\n\n«Только боги могут знать ответ на некоторые из этих вопросов, но да, я много знаю о здешних людях. Пойдёмте, пойдёмте. Я ведь тоже вёл свои записи»."
 panum.166.g_christian: "Чистота — залог благочестия."
 panum.166.g_muslim: "От каждой болезни есть лекарство."
 panum.166.g_other: "Хорошо знай, что ведёт тебя вперёд, а что сдерживает."
 panum.167.t: "Бережёного бог бережёт"
 panum.167.d: "В целях безопасности во время своего расследования доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] надёжно [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'изолировалась', 'изолировался')] от заражённых."
 panum.167.f: "«Есть те, кто назвал бы это трусостью. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я бы назвала', 'Я бы назвал')] это прагматизмом. Это не битва, которую можно выиграть быстро, где можно просто вонзить штык в живот врага и дать ему быстро умереть. Это более тяжёлая битва, против врага, которого мы не видим и не слышим, но который может быть где угодно вокруг нас.\n\nНе иметь надлежащей защиты — это глупость. Изоляция — величайший ключ. Еда и вода из безопасных районов, чистое место для учёбы и все контакты с инфицированными и их вещами через посредников. В безопасности от болезни я могу спокойно заниматься исследованиями и сосредоточить все свои усилия на раскрытии правды об этой болезни».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о Великой эпидемии холеры [TimeKeeper.GetCurrentDate.Format('y')] года, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.167.g: "...но даже [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ей', 'ему')] придётся в конце концов запачкать руки"
 panum.168.t: "Неустанный труд"
 panum.168.d: "Решив добраться до сути вспышки холеры, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'работала', 'работал')] особенно допоздна."
 panum.168.g: "Тогда, во что бы то ни стало, давайте вместе побродим по этим улицам, констебль."
 je_panum_cholera_treatment_goal: ""
 je_panum_germ_theory: "Микробы и миазмы"
 je_panum_germ_theory_reason: "Гиппократ Косский считается основателем теории миазмов — ядовитых испарений из почвы, которые переносятся по воздуху и таким образом способствуют распространению болезней. В XIX веке из-за отсутствия знаний о бактериях и вирусах врачи и исследователи просто приписывали эпидемии, такие как холера, неприятным запахам, которые распространялись через «миазмы». Эта теория позже оказалась ошибочным путём в медицине, хотя модель миазмов уже частично объясняла, откуда берутся эпидемии и как они распространяются. Конфликт между контагионистами, утверждавшими о заражении от человека к человеку, и антиконтагионистами, сторонниками теории миазмов, временами был ожесточённым в середине XIX века. Слабости модели миазмов были признаны в Лондоне, хотя импровизированные правила борьбы с миазмами, такие как чистота и изоляция, в некоторой степени ограничивали эпидемии.\n\nЕсли нация найдёт достаточные доказательства в пользу теории микробов и против теории миазмов, то этот сдвиг парадигмы позволит уменьшить количество негативных событий при поиске методов лечения или во время эпидемий. Страна, первой открывшая теорию микробов, получает дополнительный исследовательский бонус."
 je_panum_germ_theory_goal: ""
 notification_panum_germ_theory_notification_name: "Прорыв теории микробов"
 notification_panum_germ_theory_notification_desc: "[concept_panum_physician|U] из [GetGlobalVariable('panum_germ_theory_invented_global_var').GetCountryDefinition.GetAltNameNoFlag('RU_CL_RP')] впервые смог окончательно обосновать теорию микробов во всех её аспектах. Теория миазмов была полностью отвергнута."
 panum.11.t: "Теория микробов"
 panum.11.d: "Учитывая неопровержимые доказательства в пользу теории микробов и столь же неопровержимые доказательства против теории миазмов, произошёл сдвиг медицинской парадигмы. Немалый вклад в это внёс доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], и теперь теория микробов окончательно утвердилась."
 panum.11.f: "Теория миазмов — типичный пример научной гипотезы, которую трудно опровергнуть, поскольку она, предположительно, подтверждается повсюду. Тот факт, что правила чистоты и гигиены для «чистого воздуха» обеспечивали исчезновение некоторых болезней, казалось, подтверждался в XIX веке. В то же время это мешало медицинской науке делать прорывы в самых разных областях, потому что истинные причины и, следовательно, фактические методы лечения оставались неизвестными. Отныне врачи будут иметь больший успех в поиске методов лечения — и путь открыт для исследования патогенов и вакцин."
 panum.11.g: "Но действительно ли мы хотели знать, что происходит в воде...?"
 panum.53.t: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] отправляется в область с эпидемией"
 panum.53.f: "Методы лечения — важнейший шаг в борьбе с болезнью. Это основа для возможной будущей вакцины, которая может предотвратить эпидемию. Однако даже успешный метод лечения достаточно силён, чтобы сдерживать будущие эпидемии и минимизировать их продолжительность и тяжесть, что приводит к значительно меньшему числу жертв. Врачи, изучающие эпидемию в своей стране, работают эффективнее, чем врачи, находящиеся в заграничной поездке."
 panum.53.g: "Этот ужас должен закончиться!"
 panum.54.t: "Медицинская исследовательская экспедиция"
 panum.54.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'собрала', 'собрал')] небольшую команду экспертов и ассистентов, которые подходят для интенсивного изучения эпидемии за границей и, возможно, разработки нового метода лечения. Теперь возникает вопрос, какую болезнь и в какой стране следует наблюдать."
