 panum.112.t: "Проблеск надежды"
 panum.112.d: "В холерных госпиталях [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_RP')] во время текущей эпидемии особенно отличился один врач. Методы работы, которые применяет [SCOPE.sCharacter('panum_new_physician_scope').GetFullName], уже получили общенациональную известность. Этот [concept_panum_physician|l] потенциально может сыграть важную роль в борьбе с эпидемией в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')]."
 panum.209.t: "Доктор Туберкулёз"
 panum.209.d: "Глава туберкулёзного санатория, доктор [SCOPE.sCharacter('panum_new_physician_scope').GetLastName], [SelectLocalization(SCOPE.sCharacter('panum_new_physician_scope').IsFemale, 'предложила', 'предложил')] свои услуги в условиях бушующей эпидемии."
 panum.112.f: "«Бог говорил со мной и призвал меня на Свою службу. Какую форму должна была принять эта служба, голос не сказал», — Флоренс Найтингейл."
 panum.112.g: "Немедленно дать [SelectLocalization(SCOPE.sCharacter('panum_new_physician_scope').IsFemale, 'ей', 'ему')] официальную должность!"
 panum.112.h: "Этот врач должен обучать будущие поколения для борьбы со следующей эпидемией."
 panum.122.t: "Инкубация холеры"
 panum.122.d: "После нескольких наблюдений и опросов доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'обнаружила', 'обнаружил')], что проходит определённое время, прежде чем у пациента появляются типичные симптомы холеры."
 panum.122.f: "Врач оценивает этот период примерно от полудня до пяти дней, в среднем — три дня. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'провела', 'провёл')] несколько бесед с жертвами болезни и их родственниками. Таким образом, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она смогла', 'он смог')] восстановить события на основе нескольких свидетельских показаний. Даже если причина остаётся неясной, из этих наблюдений впоследствии можно сделать выводы о том, что именно произошло в первый день."
 panum.122.g: "Хорошо подмечено."
 panum.124.g: "Точно подмечено."
 panum.123.t: "Симптомы холеры"
 panum.123.d: "Сегодня доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'направила', 'направил')] в медицинский факультет исчерпывающий список симптомов холеры."
 panum.123.f: "Как уже известно, но до сих пор лишь поверхностно изучено, холера — это заболевание тонкого кишечника человека. Последствия — сильная диарея с типичным синеватым «рисовым отваром» и сильная рвота. Говорят, что доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] обладает определённой садистской жилкой, потому что [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она прислала', 'он прислал')] полное описание этих и других крайне неприятных симптомов как раз к академическому ужину."
 panum.124.t: "Азиатская холера"
 panum.124.d: "В получившем широкое признание докладе доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'выявила', 'выявил')] различия между холерой и другими холероподобными заболеваниями, что считается вехой в будущем описании болезней."
 panum.124.f: "Название «холера», происходящее от греческого слова, обозначающего желчь, первоначально относилось ко всем возможным формам диареи или проблем с кишечником («желчеистечение»). Хотя Якоб де Бондт уже в 1642 году описал специфическое индийское заболевание как холеру, «холера» оставалась чисто собирательным термином. Только с появлением крупных пандемий XIX века этот специфический, новый тип холеры, оказавшийся самой разрушительной болезнью столетия, был выделен собственным названием, чтобы чётко отличать его: азиатская холера."
 panum.222.t: "Инкубация туберкулёза"
 panum.222.d: "В своих исследованиях туберкулёза доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'заметила', 'заметил')] некоторые странности, связанные с болезнью. По-видимому, может пройти несколько недель, прежде чем у больного действительно появятся типичные симптомы."
 panum.222.f: "Будь то теория миазмов или теория микробов, туберкулёз всё ещё представляет собой загадку. Если это инфекционное заболевание, то, по-видимому, может пройти от двух до даже двенадцати недель, прежде чем проявятся симптомы! Кроме того, не все, кто живёт с больным, похоже, заражаются напрямую, как [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она выяснила', 'он выяснил')] в многочисленных опросах пациентов и их родственников. Либо академики правы в своей теории, что туберкулёз не является инфекционным заболеванием и виноваты другие факторы, либо риск заражения ниже, чем считалось ранее."
 panum.223.t: "Симптомы туберкулёза"
 panum.223.d: "После того, как доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] интенсивно [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'изучала', 'изучал')] симптомы туберкулёза, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она пришла', 'он пришёл')] к выводу, который удивил даже некоторых коллег-академиков: туберкулёз — гораздо более сложное заболевание с широким разнообразием симптомов, которые выходят далеко за рамки проблем с лёгкими."
 panum.223.f: "Хотя поражение лёгких и их мучительное, медленное разрушение является одной из самых известных особенностей туберкулёза, кашель — лишь один из многих симптомов. Лёгочный туберкулёз — это лишь один из видов заболевания, которое может поражать и другие органы. Усталость, лихорадка, потеря аппетита, ночная потливость или кровохарканье были ранее известными симптомами. Тот факт, что туберкулёз не только поражает организм за пределами лёгких, но и что могут одновременно возникать два разных типа туберкулёза, значительно изменил мировоззрение некоторых членов медицинского факультета."
 panum.224.t: "Туберкулёз и скрофулёз"
 panum.224.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] интенсивно [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'занималась', 'занимался')] различными формами возможных туберкулёзных заболеваний и, несмотря на многочисленные сходства с другими симптомами, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'выявила', 'выявил')] специфические различия между туберкулёзом и скрофулёзом, но в то же время [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'подчеркнула', 'подчеркнул')] и их связи."
 panum.224.f: "Описания туберкулёза существуют на протяжении веков, но до XIX века из-за меньшей урбанизации он не имел сопоставимых, разрушительных последствий. До XIX века он был известен и под другими названиями — термин «чахотка» всё ещё использовался в англоязычном мире до XX века. Рене Лаэннек считается одним из пионеров исследований туберкулёза, который изобрёл стетоскоп для обследования лёгких. Иоганн Лукас Шёнлейн ввёл термин «туберкулёз» в 1832 году и связал его с определённой клинической картиной. Важным открытием этих лет стало то, что скрофулёз и туберкулёз — это два разных заболевания, но их было трудно дифференцировать из-за большого количества симптомов туберкулёза."
 panum.322.t: "Инкубация и симптомы оспы"
 panum.322.d: "В недавнем отчёте доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'отметила', 'отметил')], что начальные симптомы оспы не отличаются от симптомов гриппа, и лишь потом появляются пресловутые пустулы. Можно предположить, что между заражением и появлением симптомов проходит одна-две недели."
 panum.322.f: "«Те, кто легко выздоравливает от чумы, мне кажется, были предварительно высушены и очищены всем телом, ибо у некоторых из них была рвота, а желудок был расстроен у всех. И, таким же образом, у тех, кто уже очистился и должен был спастись, по всему телу появляются тёмные пустулы, у большинства язвенные, у всех сухие. (...) Снаружи тело не было горячим на ощупь, и не было бледности; кожа была скорее красной, синюшной и покрывалась мелкими волдырями и язвами», — Гален."
 panum.323.t: "Ветряная оспа или натуральная оспа?"
 panum.323.d: "Во время своего наблюдения за больными оспой доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'смогла', 'смог')] представить частичный отчёт о том, что ветряная оспа — это самостоятельное, безвредное заболевание. До сих пор это была очень спорная теория."
 panum.323.f: "«Ветряная оспа у многих появляется без какой-либо болезни или предварительных признаков: у других ей предшествуют небольшая степень озноба, слабость, кашель, прерывистый сон, блуждающие боли, потеря аппетита и лихорадка в течение трёх дней. Большинство из них обычного размера оспы, но некоторые меньше. Я никогда не видел их сливными или очень многочисленными. Наибольшее количество, которое я когда-либо наблюдал, было около двенадцати на лице и двести по всему остальному телу. На второй или, самое позднее, на третий день с начала высыпания, столько прыщей, сколько не лопнуло, кажется, достигло своей полной зрелости, и те, которые полны этой жёлтой жидкости, очень похожи на то, какими бывают настоящие оспы на пятый или шестой день, особенно там, где случается быть большему пространству, чем обычно, занятому вытекшей сывороткой», — Уильям Хеберден."
 panum.324.t: "Разница между корью и оспой"
 panum.324.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] с чрезвычайной тщательностью [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'сравнила', 'сравнил')] симптомы больных оспой, корью и ветряной оспой и [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'смогла', 'смог')] их очень точно классифицировать."
 panum.324.f: "«Высыпанию оспы предшествует непрерывная лихорадка, боль в спине, зуд в носу и кошмары во сне. Это более острые симптомы её приближения вместе с заметной болью в спине, сопровождаемой лихорадкой, и зудом, который пациент чувствует по всему телу. Появляется отёк лица, который приходит и уходит, и можно заметить общий воспалительный цвет, заметный как сильное покраснение на обеих щеках и вокруг обоих глаз. Человек испытывает тяжесть во всём теле и сильное беспокойство, которое выражается в частом потягивании и зевании. Возникает боль в горле и груди, и человеку трудно дышать и кашлять. Дополнительные симптомы: сухость дыхания, густая мокрота, хрипота голоса, боль и тяжесть в голове, беспокойство, тошнота и тревога. Обратите внимание на разницу: беспокойство, тошнота и тревога чаще встречаются при кори, чем при оспе. С другой стороны, боль в спине более очевидна при оспе, чем при кори», — Разес."
 panum.422.t: "Симптомы и инкубация тифа"
 panum.422.d: "В первом промежуточном отчёте доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'перечислила', 'перечислил')] симптомы тифа, а также первоначальную оценку того, когда они впервые появляются в ходе болезни."
 panum.422.f: "«Лихорадка, озноб, головная боль, кашель, сыпь, рвота — всё это признаки тифа. Однако все эти симптомы можно найти и при подобных заболеваниях. Тошнота и спутанность сознания, с другой стороны, типичны для классического тифа. Характерное течение лихорадки — это двух-трёхдневное повышение температуры, за которым следует непрерывная лихорадка около десяти дней и последующее снижение в течение нескольких дней. По моим подсчётам, между заражением и первыми симптомами проходит от десяти до четырнадцати дней»."
 panum.423.t: "Лагерная лихорадка"
 panum.423.d: "После того, как доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'сравнила', 'сравнил')] исторические отчёты об эпидемиях в армии с текущими симптомами больных тифом, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она пришла', 'он пришёл')] к выводу, что отождествление тифа и «лагерной лихорадки» мало помогает."
 panum.423.f: "«Это, безусловно, лагерная лихорадка — но та ли это лагерная лихорадка?» — доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'задавала', 'задавал')] подобные вопросы, которые заставили членов медицинского факультета задуматься. Исторически известная как «лагерная лихорадка», она долгое время ассоциировалась с эпидемиями в крупных армиях или казармах, в частности, как болезнь, нанёсшая огромные потери наполеоновской армии. Но не все болезни в армии, известные как «лагерная лихорадка», можно отождествлять с тифом. Возвратная лихорадка и окопная лихорадка — другие болезни, которые, как известно, поражали военнослужащих в тесных помещениях. Болезнь, которая особенно свирепствовала во время Гражданской войны в США, с другой стороны, часто называют тифом, но на самом деле это был брюшной тиф."
 panum.424.t: "Тиф: две болезни в одной?"
 panum.424.d: "При обследовании больных тифом доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'обнаружила', 'обнаружил')], что ряд предположений был в корне неверным. Если предыдущие врачи диагностировали «болезненное изменение» в кишечнике, то у умерших от тифа [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] ничего подобного обнаружить не [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'смогла', 'смог')]. Скорее, врач предполагает, что кишечное заболевание — это отдельная болезнь, которую следует отличать от тифа и которую [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] называет «брюшным тифом»."
 panum.424.f: "До середины XIX века врачи не различали тиф и брюшной тиф. Они просто считались проявлениями одной и той же болезни с разной степенью выраженности симптомов. В 1836 году американский врач Уильям Герхард заметил, что у некоторых больных тифом кишечник не был поражён болезнью, хотя до этого это был один из часто диагностируемых симптомов. Дальнейшие подобные наблюдения привели его к мысли, что тиф — это не болезнь кишечника, а скорее заболевание, поражающее другие органы: спутанность сознания и мышечные боли были гораздо более распространены, чем проблемы пищеварительного тракта. Вековое отождествление тифа и брюшного тифа не только привело к сходству названий, но и к тому, что в некоторых языках брюшной тиф называют тифом, например, в немецком."
 panum.522.t: "Два течения жёлтой лихорадки"
 panum.522.d: "В своём тщательном наблюдении за жёлтой лихорадкой доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'сделала', 'сделал')] открытие, что болезнь может протекать двумя способами."
 panum.522.f: "Врач обнаружил, что во многих известных случаях жёлтая лихорадка имеет лёгкое течение, которое проходит через несколько дней. По оценкам, пять из шести пациентов переносят эту лёгкую форму жёлтой лихорадки. Другое течение болезни опасно и может быть смертельным. Пациенты страдают вторым, токсическим течением. Оно характеризуется рецидивирующей лихорадкой, сопровождающейся желтухой из-за поражения печени, а также болями в животе. Кровотечение во рту, носу, глазах и желудочно-кишечном тракте вызывает рвоту с кровью, отсюда одно из названий жёлтой лихорадки на испанском языке, vómito negro («чёрная рвота»). Также могут быть почечная недостаточность, икота и бред. По оценкам, от 20 до 50 процентов жертв жёлтой лихорадки, достигших этой второй стадии болезни, умирали — заключает академик в представленном докладе."
 panum.523.t: "Сезоны жёлтой лихорадки"
 panum.523.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'обнаружила', 'обнаружил')], что эпидемии жёлтой лихорадки следуют определённой временной схеме."
 panum.523.f: "Исторические записи и текущие данные свидетельствуют о том, что жёлтая лихорадка встречается в основном летом. Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] пока не [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'смогла', 'смог')] объяснить, почему болезнь не возникает ежегодно, как грипп, а полностью исчезает на длительные периоды времени. Поразительно, что жёлтая лихорадка особенно свирепствовала в дождливые годы."
 panum.524.t: "Местная болезнь?"
 panum.524.d: "При описании жёлтой лихорадки доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] подчёркивает тот факт, что это болезнь, которая ограничена определёнными территориями и распространяется в основном в болотистых и тропических районах, за редкими исключениями."
 panum.524.f: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'изучила', 'изучил')] несколько отчётов и записей о других эпидемиях жёлтой лихорадки. Поразительно то, что они происходили на очень ограниченной территории. В основном затронуты тропические регионы и болота в Африке и Америке. Хотя в некоторых случаях эпидемия продвигается дальше на север — например, в Филадельфию в США и в Барселону в Испании, — врач убеждён, что определённые климатические зоны имеют какое-то отношение к возникновению болезни. Тот факт, что были единичные вспышки болезни в английских портах, не беспокоит [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] — потому что болезнь не распространилась далеко за пределы портового города."
 notification_panum_description_progress_notification_name: "Прогресс в описании болезни"
 notification_panum_description_progress_notification_desc: "Наш [concept_panum_physician|l], доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], получил новые сведения из наблюдения за эпидемической болезнью и нашёл дополнительную подсказку."
 panum_antitoxins_tech: "Антитоксины"
 panum_antitoxins_tech_desc: "Антитоксин — это антитело, способное нейтрализовать определённый токсин. Антитоксины к дифтерийному и столбнячному токсинам были получены Эмилем Адольфом фон Берингом и его коллегами с 1890 года. Они считаются одной из величайших вех в истории медицины."
