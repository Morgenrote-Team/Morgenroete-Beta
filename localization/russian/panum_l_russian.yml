 je_panum_military_medicine_project: "Военная медицина"
 je_panum_military_medicine_project_reason: "Военные врачи и медики Красного Креста имеют уникальную возможность улучшить медицинское обслуживание на поле боя и тем самым спасти множество жизней — и, возможно, решить исход войны. В зависимости от черт характера и опыта, это улучшение происходит с разной скоростью. После военно-медицинской реформы [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] будет разблокирован [concept_mobilization_option] или его более высокий уровень."
 panum_military_medicine_progress_bar_at_full_tt: "Шкала военной медицины достигла #variable 100%#!"
 panum.2500.t: "Улучшенная медицинская поддержка"
 panum.2500.d: "Наш [concept_panum_physician], доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], годами работал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] над улучшением медицинской поддержки в условиях войны. Новые методы и средства теперь могут быть использованы на поле боя!"
 panum.2500.f: "\n«Обратите внимание на точное использование этого шприца. И всегда имейте под рукой достаточно сыворотки. И бинтов. Желательно аптечку. Вы вообще знаете, что такое стерилизация?»"
 panum.2500.g: "Солдаты однажды поставят памятник доктору."
 panum_advanced_medical_support_mobilization_option_tt: "Вы получаете доступ к новой [Concept('concept_mobilization_option', 'опции мобилизации')] или новому уровню."
