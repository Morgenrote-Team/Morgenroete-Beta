 je_panum_cholera_treatment_reason: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в настоящее время обследует нескольких пациентов, чтобы определить причину #YELLOW холеры#!. Только понимание истинных причин возникновения болезни может помочь разработать профилактические меры и современный метод лечения. Когда врач закончит свою работу, он представит свою диссертацию общественности. Это не предотвратит будущие эпидемии — для этого требуется идентификация возбудителя и, возможно, вакцина, — но последствия новой вспышки будут значительно меньше."
