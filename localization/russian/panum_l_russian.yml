 je_panum_medical_techniques_project: "Внедрение медицинских методик"
 je_panum_medical_techniques_project_reason: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ставит перед собой цель — распространить новейшие медицинские технологии в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')]. Скорость этого процесса зависит от [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] черт характера и опыта. После завершения медицинской реформы наша нация получит лучший модификатор взамен старого. В некоторых случаях [concept_panum_physician] может разработать собственные изобретения, которые произведут революцию в истории медицины."
 panum_medical_techniques_advance_tt: "Медицинские методики в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')] улучшаются на один уровень."
 panum.2401.t: "Вакцинация"
 panum.2401.d: "Введение всеобщей программы вакцинации поначалу было встречено населением со скептицизмом, но после того как доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'посетила', 'посетил')] несколько провинций страны и [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'продемонстрировала', 'продемонстрировал')] процедуру, большинство пациентов привыкли к ней."
 panum.2401.f: "Идея кампании по вакцинации встретила некоторое сопротивление, по крайней мере, поначалу. Обеспокоенные матери с напуганными детьми, умудрённые опытом старики, скептически относившиеся к этому новому чуду, очень набожные люди, боявшиеся, что наука вмешивается во что-то, что выше их понимания. Образование решило эту проблему — объяснения того, как это работает, почему — но гораздо важнее были результаты. Дети, сохранившие зрение и здоровье, а не ужасные последствия одной из самых смертоносных болезней, с которыми когда-либо сталкивалось человечество. Мало кого нужно было убеждать, когда они видели их свободными от шрамов и полными жизни."
 panum.2401.g: "Это медицинская революция!"
 panum.2401.h: "Наши медицинские и гигиенические стандарты повышаются."
 panum.2402.t: "Анестезия"
 panum.2402.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'продемонстрировала', 'продемонстрировал')] новый метод анестезии в нескольких клиниках. Теперь он считается стандартным методом для особо неприятных операций."
 panum.2402.f: "«Хр-р-р»."
 panum.2402.g: "Медицинские операции без сознания? Это разрешено?"
 panum.2403.t: "Шприцы и щипцы"
 panum.2403.d: "Новое медицинское оборудование, которое [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'представила', 'представил')] доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], требует некоторого привыкания, но теперь оно является стандартом в каждом врачебном кабинете."
 panum.2403.f: "«Что это за инструмент, доктор?»\n«Не инструмент, а шприц. Им можно вводить жидкость».\n«И это для стоматологической хирургии, я полагаю?»\n«Нет, это щипцы».\n«Хорошо, хорошо. А это новый скальпель?»\n«Мои столовые приборы для обеда»."
 panum.2403.g: "Профессионализация в этой области просто поразительна."
 panum.2404.t: "Стерилизация"
 panum.2404.d: "Успешно доказав важность стерилизации, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'сделала', 'сделал')] стандартной практикой для всех врачей в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')] мыть руки и чистить инструменты!"
 panum.2404.f: "«Конечно, всё ещё есть те, кто считает эти практики ненужными, и многие из них — учёные мужи, спасшие много жизней. Этим почтенным людям я скажу вот что: прислушайтесь к доказательствам. Открытие микробной теории доказало, что болезнь рождается из микроскопического существа, которое можно уничтожить задолго до заражения, спасая жизни, которые иначе были бы потеряны. Нигде это не проявляется так ярко, как в родильном отделении крупнейшей больницы столицы — [ROOT.GetCountry.GetCapital.GetCityHubName], где смертность среди рожениц снизилась с 18,3% до всего лишь 2,2% всего за один месяц».\n«Очевидно, господа, результаты говорят сами за себя»."
 panum.2404.g: "Кто бы мог подумать, что мыть руки после прикосновения к больным так важно?"
 panum.2404.h: "Ах, так у врача есть ещё одна причина для бутылки спиртного!"
 panum.2404.i: "Хм-м-м. Похоже на удобное оправдание..."
 panum.2405.t: "Медицинские карты"
 panum.2405.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в значительной степени [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'модернизировала', 'модернизировал')] пребывание пациентов, будь то в кабинете врача или в больнице, с помощью лучшей регистрации и создания медицинских карт."
 panum.2405.f: "Медицинская карта — это систематическая документация истории болезни и лечения одного пациента в течение определённого времени в юрисдикции одного поставщика медицинских услуг. История болезни — это хронологическая запись того, что происходило с пациентом с рождения. Она фиксирует заболевания, серьёзные и незначительные болезни, а также этапы роста. Она даёт врачу представление о том, что происходило с пациентом ранее. В результате она часто может дать подсказки о текущем состоянии болезни. История болезни включает в себя несколько разделов, таких как история хирургических вмешательств, лекарства и медицинские аллергии, привычки или история иммунизации. В медицинской карте отдельные медицинские приёмы отмечаются отдельными сводками истории болезни пациента, составленными врачом, медсестрой или ассистентом врача, и могут принимать несколько форм. Когда пациент госпитализирован, в медицинскую карту ежедневно вносятся обновления, документирующие клинические изменения."
 panum.2405.g: "Статистика, математика, бюрократия и медицина — наконец-то вместе!"
 panum.2406.t: "Внедрение скорой помощи"
 panum.2406.d: "Несколько дней назад богатый предприниматель в столице [ROOT.GetCountry.GetCapital.GetCityHubName] щедро пожертвовал местной больнице новый автомобиль: первую самоходную машину скорой помощи во всей [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]."
 panum.2406.f: "«...и тут я её увидел. Окрашенная в ослепительно-белый цвет и гордо украшенная крестом, новая машина скорой помощи не нуждалась ни в суете лошадей, ни в силе людей, а несла в себе мощь собственного двигателя. Впервые раненые мужчины и женщины, остро нуждавшиеся в помощи, могли быть быстро доставлены в комфорт и под опеку больницы — вещь, которая непременно спасёт жизни бесчисленных душ, которые иначе были бы потеряны. Моё сердце взволновалось при виде этого, ибо здесь лучшее в Человеке, любовь, которую он может питать к незнакомцам, была выставлена на всеобщее обозрение».\n\nОтрывок из местной газеты «[ROOT.GetCountry.GetCapital.GetCityHubName] Gazette», [TimeKeeper.GetCurrentDate.Format('y')] г."
 panum.2406.g: "Великолепно! Теперь ей нужна только сирена..."
 panum.2406.h: "Превосходно! Наши больницы найдут им отличное применение!"
 panum.2407.t: "Санитарная авиация"
 panum.2407.d: "Только что в столицу пришла удивительная новость: пилот доставил роженицу из сельской местности в больницу — это был первый медицинский полёт в истории [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]!"
 panum.2407.f: "«...конечно, было довольно трудно сосредоточиться. В самолёте не так много мест, знаете ли, и почти можно было услышать крики роженицы сквозь шум пропеллера и двигателя. Конечно, это мелочи по сравнению с самим поступком — на этой Земле нет ни души, которая могла бы отказать в помощи нуждающейся женщине, поэтому, когда у неё начались роды на смотровой площадке, я сделал то, что сделал бы любой добрый человек, и доставил её как можно быстрее в умелые и способные руки больницы. Мне сказали, что это было бы опасное тазовое предлежание, но благодаря тому, что мы оказались там так скоро, врач смог скорректировать положение ребёнка до здоровых, естественных родов.\nДа, я верю, что ребёнка назвали в мою честь».\n\nИнтервью из местной газеты «[ROOT.GetCountry.GetCapital.GetCityHubName] Gazette», [TimeKeeper.GetCurrentDate.Format('y')] г."
 panum.2407.g: "Так что детей действительно приносят аисты!"
 panum.2407.h: "Вздох облегчения для матерей повсюду!"
 panum.52.l: "Эпидемия кори в [SCOPE.sCountry('panum_measles_country_scope').GetAltNameNoFlag('RU_CL_PP')]."
 panum.52.n: "Эпидемия чумы в [SCOPE.sCountry('panum_plague_country_scope').GetAltNameNoFlag('RU_CL_PP')]."
 panum.52.o: "Эпидемия дифтерии в [SCOPE.sCountry('panum_diphteria_country_scope').GetAltNameNoFlag('RU_CL_PP')]."
 panum.52.p: "Эпидемия полиомиелита в [SCOPE.sCountry('panum_polio_country_scope').GetAltNameNoFlag('RU_CL_PP')]."
