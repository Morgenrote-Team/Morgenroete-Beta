 panum.2000.t: "Подготовка к медицинскому конгрессу"
 panum.2000.d: "Перед проведением следующего Международного медицинского конгресса в нашей стране возникает вопрос, должен ли он быть посвящён конкретному заболеванию или нет."
 panum.2000.f: "Медицинские конференции могут быть посвящены конкретному заболеванию, если у принимающей страны есть хотя бы его описание. Конгресс по каждому заболеванию может проводиться только один раз. Присутствующие врачи и микробиологи получают дополнительные подсказки, чтобы быстрее продвигать свои исследования. На общем конгрессе участвующие страны просто получают бонус к своему академическому прогрессу."
 panum.2000.g: "Это должна быть общая медицинская конференция."
 panum.2001.t: "Медицинский конгресс"
 panum.2001.d: "Столица готовится к международной встрече медицинских специалистов. Председательствовать на заседаниях в качестве президента будет [ROOT.Var('panum_physician_var').GetCharacter.GetFullName]. [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]"
 panum.2001.f: "Медицинские конференции — это прекрасная возможность для обмена медицинскими знаниями. Достижения, которые ранее были доступны только одной стране, здесь по-братски делятся с другими. Медицинские конференции могут организовывать только врачи, но на них также приглашаются биологи со специализацией в микробиологии, которые могут поделиться своими знаниями в области патогенов и вакцин. Если в стране есть и врач, и микробиолог, участвовать могут оба."
 panum.2001.g: "Разослать приглашения!"
 panum.2002.t: "Приглашение на медицинский конгресс"
 panum.2002.d: "[SCOPE.sCountry('panum_congress_host_country').GetName] приглаша[SCOPE.sCountry('panum_congress_host_country').GetAltNameNoFormatting('RU_CL_END_T')] ведущие медицинские державы на международный конгресс в свою столицу. Приглашаются как врачи, так и микробиологи. [SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_congress_title')]"
 panum.2002.g: "Не забудьте стетоскопы и микроскопы!"
 panum.2003.t: "Описания и методы лечения"
 panum.2003.d: "На медицинском конгрессе в [SCOPE.sCountry('panum_congress_host_country').GetAltNameNoFlag('RU_CL_PP')] доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] получит уникальную возможность ознакомиться с революционными эпидемиологическими знаниями. Какому заболеванию следует уделить основное внимание?"
 panum.2003.f: "Если страна, участвующая в медицинском конгрессе, обладает описанием болезни или методом её лечения, которых нет у другой страны, то последняя может получить эти знания на конгрессе. Знания могут быть улучшены только по одному заболеванию. Если на конгрессе невозможно получить новые знания, всё равно есть возможность накопить общий опыт и улучшить медицинские технологии. Для этого крайне важно участие врача."
 panum.2003.g: "Врачу следует получить общие медицинские знания от коллег."
 panum.2003.h: "Холера."
 panum.2003.i: "Туберкулёз."
 panum.2003.j: "Оспа."
 panum.2003.k: "Тиф."
 panum.2003.l: "Жёлтая лихорадка."
 panum.2003.m: "Корь."
 panum.2003.n: "Скарлатина."
 panum.2003.o: "Чума."
 panum.2003.p: "Дифтерия."
 panum.2003.q: "Полиомиелит."
 panum.2004.t: "Патоген и вакцина"
 panum.2004.d: "На конгрессе в [SCOPE.sCountry('panum_congress_host_country').GetAltNameNoFlag('RU_CL_PP')] доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] с восторгом [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'обнаружила', 'обнаружил')], что здесь много единомышленников, готовых поделиться своими микробиологическими знаниями. Вопрос лишь в том, о какой из чудесных болезней [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она хотела бы', 'он хотел бы')] узнать больше?"
 panum.2004.f: "Если страна, участвующая в медицинском конгрессе, знает патоген болезни или вакцину от неё, которых нет у другой страны, то последняя может узнать об этом на конгрессе. Знания могут быть улучшены только по одному заболеванию. Если на конгрессе невозможно получить новые знания, всё равно есть возможность накопить общий опыт и улучшить биологические технологии. Для этого крайне важно участие биолога с чертой микробиолога."
 panum.2004.g: "Нашему учёному следует получить общие биологические знания от коллег."
 panum.2005.t: "Медицинское видение"
 panum.2005.d_general: "Врачи и биологи на конгрессе решили, в частности, модернизировать и улучшить подготовку будущих студентов-медиков и написали по этому поводу совместную декларацию."
 panum.2005.d_special: "Учитывая основную направленность конференции, врачи и биологи проголосовали за то, чтобы в ближайшие несколько лет направить все усилия на борьбу с конкретным заболеванием."
 panum.2005.f: "Если в начале медицинского конгресса определённая тема была объявлена основной, все участвующие страны получат дополнительные сведения об этой болезни — в зависимости от того, присутствует ли врач, микробиолог или оба. Если это общий конгресс, основное внимание уделяется подготовке нового медицинского персонала."
 panum.2005.g: "Мероприятие того стоило."
 panum.2009.t: "Медицинский конгресс завершён"
 panum.2009.d: "Вчера в [SCOPE.sCountry('panum_congress_host_country').GetAltNameNoFlag('RU_CL_PP')] завершился медицинский конгресс. Врачи и микробиологи снова отправляются домой, увозя с собой многочисленные открытия."
 panum.2009.f: "Международный медицинский конгресс (фр. Congrès International de Médecine) — это серия международных научных конференций по медицине, которые проходили периодически с 1867 по 1913 год. Идея такого конгресса возникла в 1865 году во время третьего ежегодного медицинского конгресса Франции; профессор Анри Гюэтар предложил провести международную медицинскую конференцию в 1867 году, воспользовавшись тем, что врачи и хирурги со всего мира наверняка будут в Париже на Всемирной выставке того года."
 panum.2009.g: "Надеюсь, фуршет был хорошим?"
 panum_surgeon: "Хирург"
 panum_surgeon_desc: "Хирурги чувствуют себя как дома в повседневной медицинской практике, но могут быть полезны в медицинских исследованиях или при написании анатомических трактатов."
 panum_psychiatrist: "Психиатр"
 panum_psychiatrist_desc: "Психиатры заинтересованы в улучшении условий для душевнобольных и продвигают исследования и новые методы лечения в этой области."
 panum_military_physician: "Военный врач"
 panum_military_physician_desc: "Этот врач специализируется на уходе за ранеными на поле боя и особенно успешен в улучшении первой помощи."
