 panum_character_treatment_fatal_fallback_loc: "«Кто бы мог подумать, что перерезание этого кровеносного сосуда убьёт пациента?»"
 panum_character_treatment_fatal_tripple_death_loc: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'запланировала', 'запланировал')] быструю операцию для своего пациента. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она смогла', 'Он смог')] провести операцию чуть более чем за 2 минуты, но [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ампутировала', 'ампутировал')] пальцы ассистенту, который позже умер от инфекции. К сожалению, пациент также позже умер от инфекции. Кроме того, зритель, чьи полы сюртука также были случайно отрезаны, потерял сознание, так как подумал, что его жизненно важные органы повреждены; позже выяснилось, что он умер от шока."
 panum_character_treatment_fatal_unwashed_hands_loc: "Операция прошла идеально. Пациент был жив, все проблемы решены, и все думали, что выздоровление будет быстрым. Однако через несколько дней была обнаружена инфекция, которая распространилась как лесной пожар. Всего через несколько часов пациент умер. Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] был[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а очень озадачена', ' очень озадачен')] тем, как это могло произойти, ведь [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она сменила', 'он сменил')] нож после предыдущей операции всего несколько минут назад."
 panum_character_treatment_fatal_forgotten_snack_loc: "После смерти пациента было проведено вскрытие. Внутри него, ко всеобщему удивлению, был найден наполовину съеденный бутерброд. Никто не знал, как он туда попал, пока ассистент не вспомнил, что доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ел[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] бутерброд во время операции."
 panum_character_treatment_fatal_blood_loss_loc: "Сначала операция шла хорошо. Казалось, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'сможет', 'смог')] успешно вылечить пациента. Однако пациент так и не оправился. Похоже, было потеряно слишком много крови, что сделало его очень слабым и привело к смерти через 3 дня."
 panum_character_treatment_fatal_morphine_overdose_loc: "Операция, казалось, прошла хорошо, благодаря использованию морфина пациент не чувствовал боли во время процедуры. К сожалению, пациент больше вообще не чувствовал боли, так как количество морфина было слишком большим, и он умер."
 panum_character_treatment_fatal_drunken_doctor_loc: "Все были немного смущены, когда доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'начала', 'начал')] пить медицинский спирт во время операции. Не помогло и то, что [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она начала', 'он начал')] делать разрезы в неправильных местах, кричать на ассистентов и, в конце концов, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'задела', 'задел')] крупную артерию. К сожалению, пациента не удалось спасти даже после того, как на помощь вызвали другого врача."
 panum_character_treatment_fatal_forgotten_instruments_loc: "Пациент, которого [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'оперировала', 'оперировал')] доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], казалось, пошёл на поправку после успешной операции. Но уже через день он умер. Вскрытие обнаружило скальпель, который каким-то образом был забыт внутри пациента. Когда тот снова начал двигаться, скальпель начал резать ткани и кровеносные сосуды, что вызвало внутреннее кровотечение."
 panum_character_treatment_fatal_deadly_anaesthesia_loc: "Очень успешная операция, к сожалению, имела ужасный конец. Пациент так и не очнулся от анестезии. Никто не знает, что могло стать причиной, но доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] предполагает, что тело пациента было уже слишком слабым."
 panum_character_treatment_fatal_fake_doctor_loc: "Сначала операция, казалось, прошла довольно хорошо. Как только врач покинул комнату, ситуация быстро изменилась к худшему. Внезапно в комнату [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ворвалась', 'ворвался')] доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] и [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'сказала', 'сказал')], что [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] очень сожалеет об опоздании. Все были сбиты с толку, так как врач только что провёл операцию. Похоже, случайный человек притворился хирургом и провёл её. К сожалению, в итоге пациент умер, и никто не знает, кто несёт ответственность за его смерть."
 panum_character_treatment_fatal_slippery_floor_loc: "Это была отличная операция, пока доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] не [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'поскользнулась', 'поскользнулся')] на луже крови на полу. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Она упала', 'Он упал')] прямо на пациента. К сожалению, скальпель пронзил сердце больного, что привело к его смерти."
 panum.242.t: "Смерть толпы"
 panum.242.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'считает', 'считает')] поразительным, что туберкулёз постоянно встречается в густонаселённых районах, но лишь изредка в малонаселённых."
 panum.242.f: "«[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я более внимательно изучила', 'Я более внимательно изучил')] некоторые трактаты, рекомендующие климатические курорты для лечения туберкулёза. Одна работа показалась мне настолько неубедительной, что, думаю, мой коллега спутал корреляцию с причинно-следственной связью. Он предполагает, что люди в горах здоровее, потому что воздух там здоровее, и поэтому они не становятся жертвами туберкулёза. Но разве не очевидно, что в горах туберкулёз не встречается потому, что там меньше людей? Это говорит в пользу южно-европейской интерпретации, что мы имеем дело не столько с миазмами, сколько с контагием. Возможно, туберкулёз всё-таки заразное заболевание».\n\nЗапись из журнала. Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в [TimeKeeper.GetCurrentDate.Format('y')] году, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.242.g: "Эта теория подчёркивает, что туберкулёз — заразное заболевание."
 panum.242.h: "Эта теория подчёркивает, что теория миазмов неверна."
 panum.243.t: "Туберкулёзный отшельник"
 panum.243.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'сделала', 'сделал')] интересное открытие в беседе с выжившим после туберкулёза."
 panum.243.f: "«Вы сказали, что ваш брат умер от туберкулёза?»\n«Верно. Мне тогда было девятнадцать. Я видел, как он умирал на моих глазах».\n«И вы тоже позже заболели туберкулёзом?»\n«Именно. Я предполагал, что, как и он, скоро умру. Это было для меня несомненно. Поэтому я удалился в отдалённую местность, чтобы умереть. Я хотел провести свои последние дни на природе, вдали от цивилизации».\n«Но вы выжили. Как вы думаете, в чём причина этого?»\n«Здоровое питание и физические упражнения. В какой-то момент я набрался достаточно сил, чтобы побороть болезнь».\n«Хм-м-м»."
 panum.243.g: "И это действительно всё?"
 panum.244.t: "Ничего наследственного"
 panum.244.d: "После долгих обследований доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] приходит к выводу, что мало что указывает на то, что туберкулёз на самом деле является наследственным заболеванием."
 panum.244.f: "«Если бы мне во время обучения сказали, что я однажды буду заниматься генеалогической работой, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я была бы весьма удивлена', 'я был бы весьма удивлён')]. Но едва ли был другой способ подтвердить мою теорию, кроме как опросить сами пострадавшие семьи, а также власти и духовенство. Если туберкулёз действительно является наследственным заболеванием, то таким, которое может оставаться незамеченным на протяжении поколений. Существуют целые семейные древа без единого случая туберкулёза, только чтобы он внезапно уничтожил целую семью. И поразительно, что туберкулёз — это не статичное, управляемое заболевание, а скорее опасность, которой он стал лишь в последние несколько десятилетий. Позвольте мне выразиться так: если туберкулёз — наследственное заболевание, то, очевидно, у всех нас есть предрасположенность. Как вы можете видеть в приложении к моему исследованию, статистика говорит сама за себя».\n\nЛекция доктора [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] для медицинского факультета."
 panum.244.g: "Значит, теоретически заразиться может каждый?"
 panum.245.t: "Бугорки"
 panum.245.d: "Во время анатомического исследования доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'получила', 'получил')] новые сведения об опухолях в лёгочной ткани, которые дали название болезни."
 panum.245.f: "Рене Лаэннек разработал стетоскоп, первоначально для исследования туберкулёза. В последующие годы это помогло выявлять болезнь на ранней стадии, так как появилась возможность прослушивать изменения в дыхательной системе. В то же время росли знания о развитии туберкулёза внутри организма."
 panum.245.g: "Небольшой прогресс — но всё же прогресс."
 panum.246.t: "Образ жизни и иммунитет"
 panum.246.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] серьёзно сомневается в традиционных теориях о причине туберкулёза после тщательного обследования нескольких пациентов и их биографий."
 panum.246.f: "«Обследование нескольких пациентов в городе [SCOPE.sState('panum_disease_state').GetCityHubName], включая их личные истории, вызывает больше вопросов, чем ответов; при условии, что ожидаешь максимально простых истин, а не просто фрагментов правды. Это правда, что пролетариат в особенности сильно страдает от туберкулёза, но мне кажется сомнительным, не стал бы богатый человек в той же среде жертвой болезни. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я убеждена', 'Я убеждён')], что хорошее питание, свежий воздух и физические упражнения обеспечивают определённый уровень устойчивости к болезням — но я не верю, что их поэтому в принципе можно исключить. Короче говоря: я считаю, что идея о том, что кто-то заболевает туберкулёзом, потому что он художник или пролетарий, является научно несостоятельным утверждением. Если бы это было так, то туберкулёз в последние годы выбрал бы свою принадлежность и теперь предпочитал бы фабричных рабочих в качестве своих высокодуховных жертв вместо музыкантов и поэтов. Никто не может всерьёз в это верить».\n\nЗапись из журнала. Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в [TimeKeeper.GetCurrentDate.Format('y')] году, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.246.g: "Это будет большим разочарованием для некоторых непризнанных гениев."
 panum.247.t: "Болезнь, подлежащая регистрации"
 panum.247.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] экспериментирует с системой отчётности в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')], которая могла бы помочь в борьбе с туберкулёзом."
 panum.247.f: "«Классификация туберкулёза в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] как болезни, подлежащей обязательной регистрации, вызвала некоторое недовольство среди населения, потому что многие считают эту болезнь личным делом. Но это не так, особенно когда она принимает эпидемическую форму. В тот момент, когда болезнь считается заразной — а в случае с туберкулёзом многое на это указывает, — это становится общественным делом, которое может угрожать общественному благосостоянию. Лучше иметь болезнь, подлежащую регистрации, чем карантин. Изоляция отдельных источников инфекции показала, что распространение туберкулёза можно предотвратить, не вводя в городе чрезвычайное положение. К сожалению, стигма, которую теперь несут больные туберкулёзом, будет иметь неприятные личные последствия. С больными туберкулёзом теперь обращаются как с прокажёнными».\n\nЗапись из журнала. Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в [TimeKeeper.GetCurrentDate.Format('y')] году, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.247.g: ""
 panum.248.t: "Уничтожение микробов"
 panum.248.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'разработала', 'разработал')] химический процесс, основанный на предыдущих знаниях о микроорганизмах. Он может предотвратить туберкулёз в будущем."
 panum.248.f: "Пастеризация — это кратковременное нагревание жидких или пастообразных продуктов до температур от 72 °C до 100 °C для уничтожения вегетативных фаз микроорганизмов с целью бережного сохранения продуктов. Этот процесс использовался для вина с середины XIX века. Только позже его стали применять к сырому молоку, через которое могли передаваться человеку возбудители бычьего туберкулёза. Пастеризация сырого молока, таким образом, сыграла роль в сдерживании туберкулёза. Это открытие важнее, чем можно подумать: долгое время врачи, биологи и химики предполагали, что туберкулёз от крупного рогатого скота не может передаваться человеку. Даже эксперт по туберкулёзу Роберт Кох ошибался в этом отношении и лишь позже пересмотрел своё мнение — период, в который многие дети заразились через туберкулёзное молоко и масло."
 panum.248.g: "А я-то думал, что молоко в принципе полезно!"
 panum.249.t: "Персональная плевательница"
 panum.249.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'заметила', 'заметил')] аксессуар, ставший особенно популярным среди женщин, страдающих туберкулёзом. Он имеет изысканный корпус из синего стекла, который выглядит настолько модно, что можно забыть, что это плевательница."
 panum.249.f: "«У большинства из нас здесь есть такая. У неё даже есть имя, прозвище, довольно забавное». Без всякого стеснения, с упрямо-невежественным лицом, она произнесла мрачное выражение «Синий Генрих».\n— Томас Манн, «Волшебная гора»"
 panum.249.g: "Если бы каждый больной носил с собой что-то подобное..."
 panum.251.t: "Клеточное заболевание?"
 panum.251.d: "Вызвавшее большой резонанс исследование немецкого специалиста по туберкулёзу опровергает выводы, которые сделал доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], поскольку [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она', 'он')] ещё не [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'смогла', 'смог')] найти подходящего контр-ответа."
 panum.251.f: "«Есть некоторые коллеги, которые страстно утверждают, что туберкулёз может передаваться через инфекцию. Когда им возражают, что есть много пациентов, у которых болезнь развилась, хотя они не находились рядом с больным туберкулёзом, они утверждают, что, вероятно, заразились где-то много лет назад. Как это доказать? Скорее, мои собственные исследования показывают, что бугорки лёгочной ткани следует интерпретировать как разрастание клеток. Туберкулёз, следовательно, должен рассматриваться, как и карцинома, как результат пролиферации местных клеток. Его можно чётко определить как конституциональное заболевание».\n\nДоктор Анжелика Хазенбайн, «Туберкулёз, ракоподобное заболевание»."
 panum.251.g: "Значит, туберкулёз работает как клеточная опухоль?"
 panum.252.t: "Бронхоэктазия"
 panum.252.d: "Как [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'обнаружила', 'обнаружил')] доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], некоторые предполагаемые выводы, которые, как [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она думала', 'он думал')], [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она получила', 'он получил')] от больных туберкулёзом, были неверны. Они страдали от совершенно другой болезни."
 panum.252.f: "«К сожалению, некоторые исследования оказались тупиковыми. Так, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я считала', 'я считал')], что некоторые больные туберкулёзом выздоровели при определённых обстоятельствах. На самом деле у них был не туберкулёз, а бронхоэктазия. Не исключено, что туберкулёз может способствовать развитию бронхоэктазии, но это два разных заболевания, и поэтому не все результаты применимы. Это, вероятно, значительно задержит поиск успешного метода лечения».\n\nЗапись из журнала. Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в [TimeKeeper.GetCurrentDate.Format('y')] году, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.252.g: "Потраченное впустую время!"
 panum.253.t: "Шарлатанство"
 panum.253.d: "Посетив санаторий в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')], доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] был[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а полностью разочарована', ' полностью разочарован')]."
 panum.253.f: "«Многие коллеги и признанные медицинские специалисты рекомендовали мне санаторий в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')]. Это образцовое учреждение, которое работает в области туберкулёза с чрезвычайно серьёзными методами — говорили они. Несколько пациентов говорили о происходящих там медицинских чудесах.\n\nОднако после недель посещения [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я поняла', 'я понял')], что это в основном маркетинг. В то время как врачи на месте уверяли меня, насколько велики шансы на выздоровление, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я обнаружила', 'я обнаружил')] прямо противоположное. Когда [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я просматривала', 'я просматривал')] истории болезней, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я обнаружила', 'я обнаружил')], что почти 50 процентов поступивших пациентов умерли в первую неделю. Весь этот санаторий — обман!\n\nЗапись из журнала. Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в [TimeKeeper.GetCurrentDate.Format('y')] году, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.253.g: "Но... но... ужин должен быть превосходным!"
 panum.254.t: "Контакт с белой смертью"
 panum.254.d: "По-видимому, многочисленные визиты к больным туберкулёзом имели непреднамеренный эффект: доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] сегодня кашлял[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] кровью!"
 panum.254.f: "«Какой несчастный день. Мои занятия туберкулёзом и мои предполагаемые знания о болезни теперь мстят мне. С одной стороны, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я ошибалась', 'я ошибался')] на стольких уровнях, что справедливо, что моя гордость наказана. С другой стороны, это указывает на то, что это заразная болезнь. Но какой ценой мне пришлось сделать это открытие?\n\nЗапись из журнала. Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в [TimeKeeper.GetCurrentDate.Format('y')] году, город [SCOPE.sState('panum_disease_state').GetCityHubName]."
 panum.254.g: "Врач поправится... ведь так?"
 panum.264.t: "De Contagione"
 panum.264.d: "Исторические интересы привели доктора [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] к древней книге эпохи Возрождения, имеющей неизмеримую ценность."
 panum.264.f: "Ещё в 1546 году веронский врач Джироламо Фракасторо постулировал, что болезни вызываются в основном заражением крошечными частицами, напоминающими более поздние микробы. Поэтому он сомневался в теории миазмов более 300 лет назад. В отношении туберкулёза Фракасторо также говорит, что это заразное заболевание, которое передаётся этими патогенами. Книга порой более убедительна, чем многие современные трактаты. Революционным является то, что Фракасторо предполагает, что эти так называемые «фомиты» проникают через дыхательную систему или поры тела в поисках пищи. Это способствовало бы развитию болезни."
 panum.264.g: "Это подстегнёт поиски лечения."
 panum.264.h: "Это гораздо убедительнее, чем теория миазмов."
 panum.264.i: "Может ли маленький патоген вызывать туберкулёз?"
 panum.240.t: "Туберкулёз — заразное заболевание"
 panum.240.d: "С помощью нескольких экспериментов и обследований пациентов доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'смогла', 'смог')] окончательно доказать, что туберкулёз является не только заразным заболеванием, но и [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'вывела', 'вывел')] несколько методов профилактики в своём трактате «[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]»."
 panum.240.f: "«Знание того, что туберкулёз — это болезнь, которая может передаваться от человека к человеку, а также от животного к человеку, приводит к целому ряду мер по её предотвращению.\nВо-первых, больных туберкулёзом следует держать подальше от масс.\nВо-вторых, болезнь должна подлежать регистрации, чтобы можно было смягчить её распространение.\nВ-третьих, должны быть изданы правила для обеспечения общественной гигиены — например, запрет на плевки в общественных местах или, по крайней мере, использование общественных и личных плевательниц.\nВ-четвёртых, необходимо улучшить общественное здравоохранение, чтобы минимизировать заражение среди пролетариев.\nВ-пятых, пастеризация сырого молока имеет важное значение».\n\nИз трактата «[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]»."
 panum.240.g: "Туберкулёз — это больше не судьба."
 panum_add_dubious_yellow_fever_treatment_clues_effect_tt: "Это даёт подсказку... наверное."
 panum.540.t: "Предотвращение? Предотвращено!"
 panum.540.d: "После недель исследований и изучения наш врач разработал средство, чтобы остановить распространение жёлтой лихорадки!"
 panum.540.f: "«...но в конце концов, одно доказательство осталось, несомненное и неопровержимое. Будь то сетка, дым или пестициды, моё расследование показало, что всякий раз, когда путь комара прерывался по какой-либо причине, распространение жёлтой лихорадки останавливалось. Значит, это должно быть заболевание, переносимое насекомыми. Если мы сможем прервать процесс размножения, мы вполне можем предотвратить появление новых комаров, заражающих наш народ. Это всего лишь вопрос средств, и [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я разработала', 'я разработал')] трёхэтапный план.\n\nI: Опрыскать местные пруды, болота и трясины пестицидами, чтобы сделать их непригодными для размножения. Если возможно, полностью осушить небольшие водоёмы.\nII: Развернуть москитные сетки, тканевые покрытия, пропитанные пестицидами, на всех проёмах общественных зданий, особенно больниц.\nIII: Информировать население о природе этой болезни как переносимой комарами и поощрять использование сеток, инсектицидов и дыма для фумигации их домов.\n\nЯ искренне верю, что если эти методы будут применены, то мы вполне можем увидеть конец эндемической жёлтой лихорадки в нашей жизни и конец этому самому настойчивому из врагов».\n\nИз трактата «[SCOPE.GetRootScope.GetCountry.GetCustom('panum_custom_treatment_title')]», написанного доктором [ROOT.Var('panum_physician_var').GetCharacter.GetLastName]."
 panum.540.g: "Отлично, доктор. Теперь осталось достать москитные сетки и спрей от насекомых..."
 panum.541.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], наш главный врач, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'прибыла', 'прибыл')] в [SCOPE.sState('panum_disease_state').GetName], чтобы исследовать загадочную жёлтую лихорадку."
 panum.541.f_america: "«Мы прибыли в город [SCOPE.sState('panum_disease_state').GetCityHubName] задолго до рассвета, наш поезд прибыл на платформу, лишённую пассажиров, лишь с флягой горячего супа для машиниста и его коллег. Мало кто мог бы сойти с поезда так рано утром, но [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я почти не могла', 'я почти не мог')] уснуть; письма и записки местного правительства тяжело лежали у меня на душе, ибо в них говорилось о странной болезни, жёлтой лихорадке. Название происходит от желтухи, которая сопровождает болезнь, хотя это далеко не конец бед — рвота, боли в животе, кровотечение из глаз, и это убивает многих.\n\nНо хотя результаты нам знакомы, записанные в отчётах, датируемых первой колонизацией этих земель, природа самой болезни долгое время ускользала от науки. Именно в этом [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я нашла', 'я нашёл')] цель и энергию, чтобы разбудить своих коллег и повести их с поезда в город, под светом газовых фонарей, вокруг которых непрестанно жужжат комары. Если мы когда-нибудь хотим победить эту болезнь, мы должны узнать ответ на самый главный вопрос. С чем мы боремся?»\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о жёлтой лихорадке в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')], [TimeKeeper.GetCurrentDate.Format('y')] год."
 panum.541.f_africa: "«Было уже за полдень, когда наше судно вошло в порт, и капитан сообщил нам, что мы достигли пункта назначения. Один из великих форпостов нашей колониальной империи, местная администрация отправила сообщение в столицу о странной, смертельной болезни, которую они с трудом понимали — не просто обычный грипп, а печально известная жёлтая лихорадка. Она мне не чужда, как и любому, кто хорошо знаком с историей тропических болезней... но при всём том, что мы знаем о её многочисленных способах убивать, мы так мало знаем о самой болезни.\n\nВ сопровождении моих ассистентов и вооружённого эскорта мы основали лабораторию недалеко от центра города. Там мы можем хранить наши образцы, обустроиться и проводить необходимые исследования для расшифровки тайн жёлтой лихорадки... но сначала мы должны найти эти образцы, а непрестанное присутствие комаров — нежеланное отвлечение. Тем не менее, это не остановит нашу работу».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о жёлтой лихорадке в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')], [TimeKeeper.GetCurrentDate.Format('y')] год."
 panum.541.g: "Пойдёмте, господа... *зевок*."
 panum.541.h: "...проклятые комары."
 panum.542.t: "Войны вчерашнего дня"
 panum.542.d: "В попытке узнать больше об истории жёлтой лихорадки на этих землях, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'решила', 'решил')] проконсультироваться с командиром местного гарнизона."
 panum.542.f: "«Ах, рад вас видеть, доктор. Мои люди всегда рады знать, что они в надёжных руках, если придёт болезнь. Что я могу для вас сделать?»\n«Взаимно, полковник. Мне сказали, что у вас могут быть записи о прошлых кампаниях здесь? Есть ли у вас какие-нибудь, в которых могла быть вспышка жёлтой лихорадки среди войск?»\n«О, конечно... вот. Это была ужасная кампания, поверьте мне, и не только из-за врага. Многие парни, которые погибают на войне, умирают от стихии, болезней, переохлаждения. Они называют это небоевыми потерями».\n«Эти... небоевые потери были особенно велики, значит?»\n«Хуже, чем велики. Между болезнью и сезоном дождей в лагере было больше чего бояться, чем на поле боя. Жара тоже была ужасной, и насекомые»."
 panum.542.g: "Насекомые, болезни, дождь... можно сказать, ад, созданный самой природой."
 panum.543.t: "Поля скорби"
 panum.543.d: "Продолжая свою миссию по изучению жёлтой лихорадки, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'отправилась', 'отправился')] за пределы поселения в кажущийся очаг инфекции — на сельскую ферму."
 panum.543.f: "«Признаюсь, мне потребовался почти час, чтобы научиться понимать этот сельский акцент, но владелец фермы оказался весьма информативным. Хотя этот регион часто бывает влажным, всё же есть необходимость в ирригационных работах. Однако рытьё этих траншей требует значительных сил, которые предоставляют десятки местных рабочих, часто живущих вместе в тесных, переполненных бараках. Такие условия могут порождать болезни, и неудивительно, что жёлтая лихорадка вскоре была обнаружена там.\n\nСам фермер считает, что она пришла от какого-то заезжего торговца, или, возможно, с торговцами, забирающими урожай или доставляющими инструменты, он не может сказать наверняка, но [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я бы в этом сомневалась', 'я бы в этом сомневался')]. Похоже, что жёлтая лихорадка возникла здесь сама по себе... но если так, то как?»\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о жёлтой лихорадке в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')], [TimeKeeper.GetCurrentDate.Format('y')] год."
 panum.543.g: "Как болезнь может просто... возникнуть из ниоткуда?"
 panum.544.t: "Вода...?"
 panum.544.d: "Исследуя возможность того, что жёлтая лихорадка может быть болезнью, передающейся через воду, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'собрала', 'собрал')] образцы из местных водных путей и колодцев."
 panum.544.f: "«Одна из возможностей, которую [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я рассматривала', 'я рассматривал')], заключалась в том, что эта болезнь может быть по своей природе похожа на холеру, которая может передаваться через заражённую воду. Решив проверить, так ли это, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я приказала', 'я приказал')] своим ассистентам собрать образцы, прежде чем [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] тихое место для своего микроскопа, где [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я могла', 'я мог')] бы работать без помех. Влажный и тропический воздух отвлекает, как и непрестанное жужжание комаров, но вскоре образцы начали скользить под линзой, позволяя мне заглянуть в этот крошечный мир.\n\nК сожалению, это было бесплодное начинание. Некоторые были грязнее других, даже с мелкими червями и тому подобным, но это не соответствовало картине инфицированных, которая разбросана по карте, как дробь. Как бы то ни было, я не могу найти никаких ключей к природе жёлтой лихорадки в этой воде...»\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о жёлтой лихорадке в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')], [TimeKeeper.GetCurrentDate.Format('y')] год."
 panum.544.g: "...но если их там нет, то где же они прячутся?"
 panum.545.t: "Остров"
 panum.545.d: "Озадаченный кажущимся «пробелом» в картине инфекций, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'отправилась', 'отправился')] в необычное место — на островную рыбацкую ферму."
 panum.545.f: "«Ах, вы, должно быть, доктор... о. Простите за вонь, доктор. И смотрите не упадите. Рыба, которая ест потроха, которые мы выбрасываем, с такой же вероятностью съест и вас, если сможет».\n«...пожалуйста, побыстрее. Расскажите мне об этом месте».\n«Ну что ж, думаю, вы будете рады узнать, что здесь вообще нет болезней. Во всяком случае, не той жёлтой лихорадки».\n«Как так? Есть что-то, что может спасать ваших людей?»\n«Может быть, то, что они так мало времени проводят на берегу. Большинство дней они в море, а некоторые уходят ещё дальше и не возвращаются день или больше. Но, я думаю, дело не только в этом. Свободное время они проводят здесь, на острове, в бараках или в своих домах, и здесь вообще нет лихорадки».\n«Я расследую... нет, мои ассистенты сделают это после моего возвращения».\n«Я обязательно всем сообщу, доктор... а они даже не попрощались»."
 panum.545.g: "...но сначала — мыльная ванна. Очень, очень мыльная ванна."
 panum.546.t: "Болотный газ?"
 panum.546.d: "В том, что может быть пугающим возвращением старой теории миазмов, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] поразительные отчёты — жёлтая лихорадка может быть связана с болотными испарениями!"
 panum.546.f: "«Меня мучает, как мало здесь кажется логичным. Ничто не соответствует известным нам теориям, и я хватаюсь за соломинку. Однако есть одна многообещающая нить — болота. Мои ассистенты подготовили предметные стёкла для микроскопа, и они кишат микробами, но мы не можем ничего опознать. И всё же, несмотря на это, чума взрывается на берегах. Дома рядом с этими болотами больше всего страдают от жёлтой лихорадки. Некоторые даже упоминают, что болели ею в детстве.\n\nИ всё же, нет никаких признаков... как. Они не пьют воду, не едят рыбу, пойманную в ней, и всё же вонь от неё доносится до их домов на ветру, наполняет их смрадом, и вскоре следует болезнь. Старые тексты кричали бы „миазмы“, но это не может быть так... но если нет, то как ещё болезнь может распространяться от болота к дому?»\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о жёлтой лихорадке в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')], [TimeKeeper.GetCurrentDate.Format('y')] год."
 panum.546.g: "...или, может быть, это астрологическое... нет, это не имеет смысла... или имеет?"
 panum.547.t: "Соперник"
 panum.547.d: "Решив обратиться к местным экспертам, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'решила', 'решил')] посетить потенциального союзника — местного коронера."
 panum.547.f: "«Ах, рад вас видеть, доктор. Простите, что не пожимаю вам руку, у меня тело на столе в другой комнате».\n«Жёлтая лихорадка?»\n«Можно было бы подумать, но нет. Малярия, представляете? Из всех времён для вспышки, мы получаем её сейчас, в то же самое время».\n«Несчастное совпадение?»\n«Возможно, но я здесь достаточно долго, чтобы увидеть закономерность. Они, как правило, приходят парами, и, что ещё хуже, у них схожие симптомы и схожие смерти. Это делает их различение ужасной рутиной, скажу я вам. Я бы подумал, что это одно и то же».\n«Это... на самом деле, весьма увлекательно. У вас есть хорошие записи об этом?»\n«О, конечно. Я попрошу своего ассистента прислать их вам, хотя не знаю, насколько они будут полезны. Я не знаю, как эта штука распространяется, доктор, но я бы поспорил, что если вы сможете найти одну, вы можете найти и другую»."
 panum.547.g: "Тогда, возможно, мы сможем убить двух зайцев одним выстрелом."
 panum.548.t: "На распутье"
 panum.548.d: "Озадаченный природой жёлтой лихорадки, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'написала', 'написал')] в столицу с просьбой о дальнейших инструкциях."
 panum.548.f: "«...и всё же, как бы [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я ни старалась', 'я ни старался')], я в растерянности относительно того, как действовать дальше. Мало „подсказок“, которые могли бы направить мой курс исследования, и хотя [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я изучила', 'я изучил')] множество медицинских журналов и [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'проконсультировалась', 'проконсультировался')] с местными экспертами, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я не совсем уверена', 'я не совсем уверен')], что такое жёлтая лихорадка на самом деле. Болезнь, несомненно, но какого рода? Болезнь воздуха, как миазмы? Что-то в воде или еде? Как она передаётся от человека к человеку, или, возможно, от болота к человеку?\n\nЭто вопросы, на которые я не могу ответить, и, возможно, никогда не узнаю правды. Если я не могу найти болезнь, я не могу надеяться бороться с ней напрямую, однако моё расследование не совсем бесплодно. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я нашла', 'Я нашёл')], возможно, два возможных направления для исследований:\n\nВо-первых, мы можем попытаться найти какой-то паттерн в том, как она распространяется. Возможно, с помощью целенаправленного расследования мы сможем выявить некоторую логику в том, как передаётся болезнь, и таким образом прервать её. Возможно, остановка распространения раскроет истинную причину.\n\nВо-вторых, мы можем попытаться разработать какое-то лекарство или вакцину, возможно, исследуя детей, которые были инфицированы в юности, но полностью выздоровели, а также тех, кто выжил. Мы можем не знать её происхождения, но, возможно, мы всё ещё можем её победить.\n\nТаким образом, я пишу в столицу, вам, уважаемые господа учёные и науки, и спрашиваю: на чём должны быть сосредоточены мои исследования здесь?»\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] из [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_RP')], [TimeKeeper.GetCurrentDate.Format('y')] год."
 panum.548.g: "Унция профилактики стоит фунта лечения."
 panum.548.h: "Мы играем по-крупному. У нас будет вакцина."
 panum.551.t: "Путь к профилактике"
 panum.551.d: "Следуя инструкциям из столицы, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'начала', 'начал')] исследовать, как предотвратить распространение жёлтой лихорадки."
 panum.551.f: "«...конечно, трудно определить, что именно нужно сделать, чтобы предотвратить распространение болезни, которую мы едва понимаем иначе, как она может привести к летальному исходу. Тем не менее, если это вызов, с которым [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я должна', 'я должен')] столкнуться, то так тому и быть. До сих пор [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я обнаружила', 'я обнаружил')] ряд многообещающих зацепок; моя карта инфекции спорадична, но то тут, то там появляются определённые островки нерегулярности... места, где вспышка значительно ослабевает, даже полностью исчезает.\n\nЯ не могу претендовать на то, чтобы действительно понимать природу этой болезни, но болезнь вряд ли бывает нерегулярной. Здесь есть закономерность, ожидающая своего открытия, и если её можно найти, то мы вполне можем решить эту головоломку и избавиться от жёлтой лихорадки навсегда».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о жёлтой лихорадке в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')], [TimeKeeper.GetCurrentDate.Format('y')] год."
 panum.551.g: "Мы строим крепость, по кирпичику."
 panum.552.t: "Филе фактов"
 panum.552.d: "Во время работы над средством предотвращения распространения жёлтой лихорадки доктора [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'посетила', 'посетил')] один из [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] ассистентов."
 panum.552.f: "«Ах, рад снова вас видеть, мой мальчик, и — боже мой! Что это за вонь?»\n«Простите, доктор... Я только что вернулся с рыбного промысла, того, куда вы меня послали для расследования. Я нашёл нечто очень интересное!»\n«Настолько интересное, что вы, кажется, не нашли времени на ванну...»\n«Простите, но да. Я исследовал, почему жёлтая лихорадка не затронула людей на промысле, и начал отслеживать это обратно на материк. На берегу есть коптильня, и рабочие проходят мимо неё, и никто там не заболевает жёлтой лихорадкой. И это заставило меня задуматься... может быть, дым её отпугивает? Итак, я начал искать места с большим количеством дыма и нашёл этого мыловара, и они кладут травы и масла в свою горелку. Ни одного случая жёлтой лихорадки в их доме».\n«Хм-м-м... это увлекательная работа. Продолжайте свои наблюдения и держите меня в курсе, и, о, хорошая работа»."
 panum.552.g: "Стремительные шаги уносят ассистента прочь... но оставляют доктора в раздумьях."
 panum.553.t_america: "Миссия"
 panum.553.d_america: "Следуя по пути пробелов во вспышке, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'провела', 'провёл')] исследование, которое привело [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] в старую колониальную миссию."
 panum.553.f_america: "«Мне не потребовалось много времени, чтобы найти здесь миссию. Это было одно из первых зданий, возведённых после колонизации, нашими предками, только что покинувшими земли, которые они, возможно, никогда больше не увидят. Это не грандиозный собор, но он был построен с любовью, и со временем миссионеры и члены Матери-Церкви видели, как он рос, разрастаясь собственными палатами и залами. Это было одно из первых мест, куда можно было привезти больных, за которыми ухаживали монахини и любые благочестивые добровольцы, готовые помочь.\n\nПо всем признакам, это место вполне могло бы стать собственной бойней... и всё же, это не так. В то время как другие больницы считают своих мертвецов и видят, как болезнь перескакивает с палаты на палату, здесь — ничего. Семью привезли после пожара в доме, но через неделю никто из них не заболел жёлтой лихорадкой, несмотря на то, что их разместили всего в нескольких комнатах от больных. Это меня озадачивает, ибо и миссия, и больница похожи, но есть одно существенное различие: сетки. Проповедь — вещь священная, и её не могут прерывать жужжащие комары и им подобные, поэтому духовенство повесило сетки на все окна, чтобы не пускать комаров, даже в палатах.\n\nИ вот так, жёлтая лихорадка, кажется, полностью исчезает».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о жёлтой лихорадке в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')], [TimeKeeper.GetCurrentDate.Format('y')] год."
 panum.553.g: "Ибо Я восстановлю здоровье твоё..."
 panum.553.t_africa: "Трущобы"
 panum.553.d_africa: "Следуя по пути пробелов во вспышке, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'провёл', 'провела')] исследование, которое привело [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'её', 'его')] в любопытное место — трущобы."
 panum.553.f_africa: "Трущоб было достаточно, чтобы заставить любого человека усомниться в важности нашего великого колониального предприятия на этих землях. Грязные и убогие, до отказа набитые женщинами и детьми, ожидающими возвращения своих мужчин с плантаций, шахт или откуда бы то ни было, где они могли работать. Перегруженные водонасосы наполняют горшки, жужжат мухи, и явное отсутствие санитарии — всё это должно было бы сделать это место котлом болезней. И действительно, так оно и есть.\n\nРедкое зрелище в этих местах, такой врач, как я, с нетерпением был проведён от дома к дому местными гидами и в сопровождении полиции, с просьбой дать заключение по той или иной болезни. Взамен [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я задавала', 'я задавал')] им вопросы: что насчёт жёлтой лихорадки? [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я видела', 'Я видел')] случаи холеры и дизентерии, но не той болезни, за которой я охочусь. Одна женщина указала на окна, или на то место, где они должны были быть — вместо стекла, стена из ткани, сетка. Для них она защищала от малярии, но также, возможно, и от жёлтой лихорадки... которую, как они считают, вполне могут переносить насекомые».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о жёлтой лихорадке в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')], [TimeKeeper.GetCurrentDate.Format('y')] год."
 panum.553.h: "...и может быть, только может быть, местные правы?"
 panum.554.t: "Самый большой убийца"
 panum.554.d: "Просматривая записи, предоставленные местными военными силами, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'сделала', 'сделал')] открытие."
 panum.554.f: "«Ах, рад снова вас видеть, полковник. У меня есть несколько вопросов по этим записям, которые вы мне дали? У вас есть минутка?»\n«О, конечно! Всё, чтобы помочь».\n«Здесь упоминается, что последней кампанией руководил офицер, который, кажется, был глубоко обеспокоен укусами насекомых».\n«Обеспокоен, и очень, очень раздражён, боюсь. Укусы — это просто часть жизни на этой земле, но откуда они пришли... никто не знает».\n«Понятно, понятно... но здесь также упоминается, что армия страдала как от малярии, так и от жёлтой лихорадки, которые убили больше людей болезнью, чем в бою».\n«Небоевые потери — давняя часть войны, боюсь».\n«...но как только они приказали использовать пиретрум, случаи жёлтой лихорадки и малярии резко сократились. Затем, неделю спустя, он приказал опрыскать местность, и снова показатели упали. Что, собственно, такое этот пиретрум?»"
 panum.554.g: "«О, пиретрум? Его используют для избавления войск от вшей. Убивает насекомых, понимаете ли»."
 panum.555.t_america: "Воспоминания о прошлом"
 panum.555.d_america: "В борьбе с болезнью, которая веками терзала Южную Америку, доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] ищет ответы в странном месте — в прошлом."
 panum.555.f_america: "«Некоторые говорят, что прошлое — это другая страна. В Америке, возможно, это более верно, чем где-либо ещё, ибо многое изменилось со времён Колумба, но, к моему удивлению, болезнь, с которой я борюсь, не из их числа. Мне потребовались недели, чтобы разыскать журналы и записи первых колонистов на этих землях, но наконец они попали мне в руки. Это ценная находка. С ними у меня есть отчёты прошлых врачей, блестящих умов, которым, возможно, не хватало инструментов, которые мы сегодня считаем само собой разумеющимися.\n\nИ всё же, хотя мы, возможно, унаследовали их незаконченную битву, они оставили нам драгоценную информацию, которая может позволить мне закончить то, что они начали. Есть драгоценное откровение, скрытое, которое трудно заметить без таких отчётов. Время от времени в этом регионе происходит взрыв жёлтой лихорадки, почти как по часам. Само по себе это бесполезно, но это почти точно совпадает с журналами, в которых говорится о сильных дождях и даже наводнениях, записанных здесь как дома, унесённые потоками, за которыми следуют вспышки жёлтой лихорадки. Могут ли эти два события быть связаны?»\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о жёлтой лихорадке в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')], [TimeKeeper.GetCurrentDate.Format('y')] год."
 panum.555.g: "Мы все стоим на плечах гигантов... просто у них было меньше гигантов, на которых можно было стоять."
 panum.555.t_africa: "Народные средства"
 panum.555.d_africa: "Возможно, спорно, но доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'обратилась', 'обратился')] за советом к людям, которые, возможно, знают жёлтую лихорадку лучше всего — к туземцам."
 panum.555.f_africa: "«Есть те, кто назвал бы меня [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'сумасшедшей', 'сумасшедшим')] за то, что [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'я решила', 'я решил')] проконсультироваться с туземцами, а не с медицинским журналом, но я думаю, у них нет веских оснований для такого суждения. Жёлтая лихорадка — это болезнь, встречающаяся здесь, в Африке, и эти люди жили здесь гораздо дольше нас. Действительно, есть вероятность, что эта болезнь возникла именно на этой земле. Возможно, это так, ибо многие вспышки здесь могут с лёгкостью убивать европейцев и им подобных, но вызывать у коренных африканцев лишь симптомы, схожие с лёгким гриппом.\n\nИ всё же, несмотря на это, есть понимание. [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'Я говорила', 'Я говорил')] с рядом местных целителей и даже с представителями племён в глубине страны, и они упоминают определённые профилактические практики... сжигание слоновьего навоза и различных растений, даже занося этот дым в помещения, что отгоняет комаров, которые, по их мнению, связаны с малярией и, возможно, с жёлтой лихорадкой. Более того, у них есть способ читать землю вокруг них и предсказывать начало „сезона дождей“, который, по их мнению, совпадает с худшими проявлениями малярии и жёлтой лихорадки. Потребуется дальнейшее изучение и рассмотрение, но это многообещающе».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] о жёлтой лихорадке в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')], [TimeKeeper.GetCurrentDate.Format('y')] год."
 panum.555.h: "Мудрость, в самом неожиданном месте."
 panum.556.t: "Простая ткань?"
 panum.556.d: "Хотя они предназначались для поддержки наших войск в пограничном гарнизоне, новые ткани, пропитанные инсектицидами, прибыли в тот же город, где доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] проводит расследование."
 panum.556.f: "«Вам сюда можно... а, я вижу, вы доктор из столицы. Не знаю, есть ли здесь для вас что-нибудь, доктор. Здесь нет ни одного случая этой лихорадки».\n«...это я вижу. Что это такое?»\n«Генералы на родине придумали, что можно пропитывать ткань пестицидами прямо на фабрике, чтобы отпугивать этих чёртовых насекомых. Видите? Посмотрите на землю. Десятки этих тварей, уже мёртвые».\n«Должно быть, очень эффективно, раз убивает их так быстро. Сколько человек размещается в этих палатках?»\n«Почти батальон, вероятно, около шестисот. Ткань новая, так как старые были разрушены муссоном в прошлом году. Ужасное было время, лихорадка повсюду, и малярия тоже. Теперь у нас есть это, и ничего»."
 panum.556.g: "...вы только что сказали, что с тех пор, как у вас появилась эта новая ткань, не было ни одного случая лихорадки?"
