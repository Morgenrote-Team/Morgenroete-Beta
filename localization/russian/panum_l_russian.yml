 panum_vaccination_tech: "Вакцинация"
 panum_vaccination_tech_desc: "Вакцина от оспы — первая в истории вакцина, разработанная против заразного заболевания. В 1796 году британский врач Эдвард Дженнер доказал, что заражение относительно лёгким вирусом коровьей оспы обеспечивает иммунитет к смертельному вирусу натуральной оспы."
