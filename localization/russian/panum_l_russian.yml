 je_group_panum_medicine: "Morgenröte: #ORANGE Медицина Панума#!"
 je_panum_cholera: "Эпидемия холеры"
 je_panum_cholera_reason: "Холера считается самой страшной эпидемией XIX века. Для викторианской эпохи она имеет такое же значение, как чума в Средние века. Она распространяется быстрее любой другой болезни и часто протекает в смертельной форме.\n\nИзобретение #ORANGE современной канализации#! имеет особое значение в борьбе с холерой. С этой технологией [concept_panum_physician] может найти #V метод лечения холеры#!. Поможет даже умеренно развитая система здравоохранения. Всё это ведёт к лучшей профилактике и лечению болезни. Города, которые [concept_gaudi_architect] оборудует современной канализационной системой, практически полностью защищены от вспышек холеры.\n\nЧтобы победить холеру раз и навсегда, необходима #V вакцина против холеры#!, которую разрабатывает [concept_theiler_biologist]."
 je_panum_tuberculosis: "Эпидемия туберкулёза"
 je_panum_tuberculosis_reason: "Наряду с холерой, туберкулёз был одной из самых распространённых причин смерти в XIX веке. «Белая смерть», поначалу считавшаяся романтической болезнью, со временем всё больше становилась болезнью пролетариата. Туберкулёз в основном ограничен несколькими областями с низким уровнем жизни и высокой урбанизацией.\n\nИзобретение #ORANGE пастеризации#! имеет особое значение в борьбе с туберкулёзом. С этой технологией [concept_panum_physician] может найти #V метод лечения туберкулёза#!. Поможет хорошая система здравоохранения. Всё это ведёт к лучшей профилактике и лечению болезни. В редких случаях в ответ на туберкулёз могут появляться климатические курорты, хотя их эффективность сомнительна.\n\nЧтобы победить туберкулёз раз и навсегда, необходима #V вакцина против туберкулёза#!, которую разрабатывает [concept_theiler_biologist]."
 je_panum_smallpox: "Эпидемия оспы"
 je_panum_smallpox_reason: "Оспа — один из величайших бичей человечества, истребивший целые народы. Благодаря вариоляции и оспопрививанию она утратила свой былой ужас ещё в XVIII веке, но без должных мер предосторожности всё ещё может показать своё уродливое лицо.\n\nИзобретение #ORANGE вакцинации#! имеет особое значение в борьбе с оспой. С этой технологией [concept_panum_physician] может найти #V метод лечения оспы#!. Поможет даже самая примитивная система здравоохранения. Всё это ведёт к лучшей профилактике и лечению болезни.\n\nЧтобы победить оспу раз и навсегда, необходима #V вакцина против оспы#!, которую разрабатывает [concept_theiler_biologist]."
 je_panum_typhus: "Эпидемия тифа"
 je_panum_typhus_reason: "Хотя тиф был известен с позднего Средневековья, его самые разрушительные последствия проявились во время Наполеоновских войн. Поэтому он внушал ужас поколениям после 1815 года. Тифозная лихорадка может быстро распространиться на несколько стран. Особенно страдают регионы с высоким уровнем опустошения. Поэтому тиф считается классической военной болезнью и особенно поражает солдат в их тесных казармах.\n\nИзобретение #ORANGE антибиотиков#! имеет особое значение в борьбе с тифом. С этой технологией [concept_panum_physician] может найти #V метод лечения тифа#!. Поможет даже самая примитивная система здравоохранения. Всё это ведёт к лучшей профилактике и лечению болезни.\n\nЧтобы победить тиф раз и навсегда, необходима #V вакцина против тифа#!, которую разрабатывает [concept_theiler_biologist]."
 je_panum_yellow_fever: "Эпидемия жёлтой лихорадки"
 je_panum_yellow_fever_reason: "Жёлтая лихорадка — это региональное заболевание, которое встречается вблизи тропиков, но в XIX веке оно распространилось на юг США и в Европу. Обычно оно затрагивает лишь несколько областей, но от этого не уносит меньше жизней.\n\nИзобретение #ORANGE профилактики малярии#! имеет особое значение в борьбе с жёлтой лихорадкой. С этой технологией [concept_panum_physician] может найти #V метод лечения жёлтой лихорадки#!. Поможет даже самая примитивная система здравоохранения. Всё это ведёт к лучшей профилактике и лечению болезни.\n\nЧтобы победить жёлтую лихорадку раз и навсегда, необходима #V вакцина против жёлтой лихорадки#!, которую разрабатывает [concept_theiler_biologist]."
 panum.100.t: "Эпидемия холеры [TimeKeeper.GetCurrentDate.Format('y')] года"
 panum.100.d: "#YELLOW Холера#!, один из худших бичей человечества, вспыхнула в одном из наших городов. Наступили тёмные времена. Мы должны быть готовы к тому, что она распространится по всей стране и унесёт множество жизней."
 panum.100.f: "Холера, эндемичная для Южной Азии, вероятно, на протяжении нескольких веков существовала на Индийском субконтиненте в виде локализованных эпидемий, но на других континентах была неизвестна. Первая пандемия произошла между 1817 и 1824 годами и затронула части Азии, Восточную Африку, Малую Азию, а затем Россию и Европу. В 1830 году она появилась в Восточной Галиции и Венгрии, а в июне 1831 года — в Вене. Всего мир пережил шесть пандемий холеры, и она стала настоящим бичом зарождающегося индустриального общества. Хотя большинство инфекций (около 85 процентов) протекают бессимптомно, смертность на начальных этапах без лечения составляет от 20 до 70 процентов."
 panum.100.g: "Смерть стучится в наши двери."
 panum.102.t: "Эпидемия холеры достигла [SCOPE.sCountry('panum_infected_country').GetAltNameNoFlag('RU_CL_RP')]"
 panum.102.d: "Мы получили сообщения о том, что первые случаи холеры были зарегистрированы сегодня в [SCOPE.sCountry('panum_infected_country').GetAltNameNoFlag('RU_CL_PP')]. Местные власти обвиняют нас в бездействии для предотвращения распространения болезни."
 panum.102.g: "И это якобы наша вина?"
 panum.103.t: "Холера на заводах"
 panum.103.d: "На нескольких заводах в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] сообщают о первых случаях холеры среди рабочих. Местные власти предлагают ввести карантин для борьбы с распространением болезни. Это окажет огромное влияние на промышленность."
 panum.103.f: "Первый случай холеры был зафиксирован на прошлой неделе на водяной мельнице на окраине города. Хотя здание было помещено в карантин, ниже по течению произошли новые инциденты на нескольких мануфактурах. До сих пор совершенно неясно, как распространяется болезнь, но некоторые местные политики считают, что следует прибегнуть к жёстким ограничениям, чтобы вернуть утраченное доверие населения."
 panum.103.g: "Закрыть заводы на карантин!"
 panum.103.h: "Заводы должны продолжать работать любой ценой!"
 panum.104.t: "[SCOPE.sCharacter('disease_victim_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('disease_victim_scope').IsFemale, 'заболела', 'заболел')] холерой!"
 panum.104.d: "Всего несколько дней назад [SCOPE.sCharacter('disease_victim_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('disease_victim_scope').IsFemale, 'казалась', 'казался')] совершенно [SelectLocalization(SCOPE.sCharacter('disease_victim_scope').IsFemale, 'здоровой', 'здоровым')], но прошлой ночью у [SelectLocalization(SCOPE.sCharacter('disease_victim_scope').IsFemale, 'неё', 'него')] проявились первые симптомы ужасной болезни, охватившей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]. [SelectLocalization(SCOPE.sCharacter('disease_victim_scope').IsFemale, 'Её', 'Его')] здоровье в плачевном состоянии."
 panum.104.f: "Первые две волны холеры в XIX веке унесли жизни и многих знаменитых людей. В Пруссии от эпидемии 1831 года умерли философ Георг Вильгельм Фридрих Гегель и генерал Август Нейдхардт фон Гнейзенау. Композитор Пётр Ильич Чайковский также считается жертвой холеры, хотя обстоятельства его смерти — сознательное или случайное употребление заражённой воды — до сих пор вызывают споры."
 panum.104.g: "Обеспечить наилучшее лечение!"
 panum.104.h: "Наш лучший врач будет лично заботиться о [SelectLocalization(SCOPE.sCharacter('disease_victim_scope').IsFemale, 'ней', 'нём')]."
 panum.104.i: "[SCOPE.sCharacter('disease_victim_scope').GetSheHe|U] не так уж [SelectLocalization(SCOPE.sCharacter('disease_victim_scope').IsFemale, 'важна', 'важен')]..."
 panum.105.t: "Исход богатых"
 panum.105.d: "Высший класс [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_RP')] использует свои финансовые ресурсы, чтобы как можно быстрее покинуть этот район или уехать в сельскую местность. Было дано много взяток, чтобы обойти карантинные предписания. Простой народ смотрит на происходящее с презрением."
 panum.105.f: "Одной из особенностей холеры было то, что она убивала как богатых, так и бедных, что делало её похожей на чуму Средневековья. Поэтому влиятельные и богатые семьи изо всех сил старались избежать заражения. Аристократия видела в холере своего рода «революционную болезнь», потому что она не делала различий между сословиями. Слабые меры в отношении высшего класса превратили холеру в политическую проблему из-за социальных конфликтов. Часто утверждалось, что эпидемии холеры начала 1830-х годов в Европе и революционные движения были взаимосвязаны."
 panum.105.g: "Пусть уходят."
 panum.105.h: "Не зря мы называем её ВЕЛИКИМ УРАВНИТЕЛЕМ."
 panum.106.t: "Оппозиция пытается использовать холеру"
 panum.106.d: "Оппозиция использует эпидемию для сведения счётов: она обвиняет правительство в огромных ошибках при борьбе с болезнью."
 panum.106.f: "Из-за своих социальных и политических последствий эпидемии холеры стали полем, на котором либералы, в частности, могли обвинять консерваторов. Более прогрессивные меры и новые методы рекомендовались как альтернатива «отсталой» элите. Неудивительно, что это разделение между консерваторами и либералами повторялось и при других обстоятельствах с другими партиями."
 panum.106.g: "Вы правы, мы ошиблись. Теперь давайте вместе бороться с эпидемией!"
 panum.106.h: "Правительство прекрасно контролирует ситуацию."
 panum.107.t: "Массовые захоронения"
 panum.107.d: "Растёт критика по поводу вырытых массовых захоронений в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')]. Низший класс, в частности, видит в этом почти механический процесс, а не должный уход за умершими."
 panum.107.f: "Вследствие массовых смертей и возможных рисков заражения массовые захоронения умерших стали неизбежным явлением. Тот факт, что более состоятельные граждане могли позволить себе обычные похороны, в то время как тела бедняков просто сваливали в ямы, вызывал социальную напряжённость."
 panum.107.g: "У нас нет времени на похороны!"
 panum.107.h: "Каждый заслуживает достойного погребения."
 panum.108.t: "Холерные госпитали"
 panum.108.d: "Несколько политических партий, исходя из своих интересов, решили создать холерные госпитали для ухода за низшим классом. Однако они не пользуются большой популярностью."
 panum.108.f: "Строительство массовых госпиталей во время эпидемий, таких как холера или туберкулёз, часто вызывало споры. Семьи предпочитали ухаживать за своими больными дома, а не отдавать их в безликие учреждения, где их теснили в небольшом пространстве с другими больными. Многие были убеждены, что там они наверняка заболеют и умрут. Распространялись слухи, что это была в первую очередь мера для изоляции бедных от богатых и, таким образом, защиты последних."
 panum.108.g: "Загоняйте их в госпитали силой, если придётся!"
 panum.108.h: "Нельзя заставить этих упрямцев жить."
 panum.109.t: "Всеобщая паника"
 panum.109.d: "Несмотря на все усилия местных властей в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')], население начало поддаваться одной из самых опасных составляющих любой эпидемии: панике."
 panum.109.f: "«Легко думать, что мы выше любого другого зверя на этой Земле, но снимите покров разума, и вы обнаружите, что человек — всё ещё животное, управляемое страхом и ужасом перед неизвестным будущим. Вспышка и распространение болезни могут наполнить сердца даже ветеранов ужасом, ибо кто может сражаться с врагом, которого даже не видит? Нет, ужас может грызть их сердца и заставлять видеть врагов в каждом углу, а где враги, там и противники, с которыми нужно сражаться. Больного человека закидывают камнями, чтобы держать его подальше. Шепотки о той семье, что не выходит из дома. Тихий и честный человек приносит домой ружьё, боясь, что следующий стук в дверь принесёт не помощь, а грабёж.\n\nЭто не конец света. Это конец заблуждения: человек — животное, и он боится».\n\nОтрывок из новостной статьи о вспышке [TimeKeeper.GetCurrentDate.Format('y')] года из газеты «[SCOPE.sState('panum_disease_state').GetName] Таймс»."
 panum.109.g: "Проклятый страх! Как мы можем им помочь, если они не хотят слушать голос разума?"
 panum.110.t: "Общая цель"
 panum.110.d: "Вспышка холеры в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')], похоже, способствовала росту чувства национального единства. Люди в регионе объединились, чтобы попытаться побороть эпидемию."
 panum.110.f: "«Больничная палата — мрачное место, ибо она напоминает, что мы живём в больном мире. Но этой болезни всё равно, кто вы: ей нет дела до вашей религии, вашего господина, цвета вашей кожи или политических взглядов. Посмотрите на кровать, и вы увидите мужчину, женщину или ребёнка. Вы видите людей, нуждающихся в помощи. Им всё равно, кто её окажет. Им всё равно, священник ли врач, солдат или простой рабочий, который жертвует своим временем и рискует собой, чтобы помочь незнакомцу. Они не видят в нём монархиста, республиканца или агитатора — они видят того, кем он является на самом деле.\n\nОни смотрят на него и видят человека. Брата, сына, соотечественника, но прежде всего — такого же человека».\n\nОтрывок из новостной статьи о вспышке [TimeKeeper.GetCurrentDate.Format('y')] года из газеты «[SCOPE.sState('panum_disease_state').GetName] Таймс»."
 panum.110.g: "Мы едины в борьбе с холерой!"
 panum.111.t: "Ужас"
 panum.111.d: "Горы трупов в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] растут с каждым днём. Не осталось никого, кто не знал бы хотя бы одного человека, заразившегося холерой. Регион стал эпицентром эпидемии."
 panum.111.f: "Только Берлин за 42 года между 1831 и 1873 годами тринадцать раз страдал от холеры. Эпидемии 1848/49, 1852, 1855 и 1866 годов были особенно тяжёлыми по всей Пруссии. Во время последней официально от холеры умерло 114 683 человека. Вспышка холеры в Лондоне в 1848/1849 годах была гораздо серьёзнее, чем в 1832 году. Во время этой вспышки в Лондоне умерло 15 000 человек, что составляет более 0,5 процента от населения города того времени, насчитывавшего около 2,5 миллиона человек. В первую неделю сентября 1849 года в день умирало 300 человек. Во время третьей пандемии между 1852 и 1860 годами в России умерло около миллиона человек, чему способствовала Крымская война. От этой болезни умерли британский главнокомандующий лорд Раглан и командующий французским флотом Арман Жозеф Брюа. Считается, что от холеры погибло больше людей, чем от боевых действий."
 panum.111.g: "Сколько ещё будет смертей?!"
 panum.120.t: "Эпидемия холеры заканчивается"
 panum.120.d: "Вся [ROOT.GetCountry.GetNameNoFlag] вздыхает с облегчением: власти только что сообщили, что в последнем очаге болезни больше нет случаев холеры. Чрезвычайное положение отменено. Теперь пришло время подсчитать погибших и вернуться к нормальной жизни."
 panum.120.f: "«Да будет со мной Бог! Да благословит Небо этот Новый год. Да будет он годом плодородия, мира и процветания; да будет он годом мира и единства для всего человечества; да будет мир избавлен от холеры», — Джакомо Мейербер."
 panum.120.g: "Но какой ценой?"
 panum.200.t: "Эпидемия туберкулёза"
 panum.200.d: "В одной из наших областей вспыхнула эпидемия: #YELLOW туберкулёз#! свирепствует в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')]!"
 panum.200.f: "В раннем Средневековье туберкулёз играл в Европе незначительную роль из-за низкой плотности населения. Он был широко представлен лишь в немногих мегаполисах. После вспышки в Италии во второй половине XV века, в XVII веке началась самая большая и продолжительная волна туберкулёза в истории. Туберкулёз привлёк широкий интерес в XIX и начале XX веков как эндемическое заболевание городской бедноты. В 1815 году четверть смертей в Англии, а в 1918 году шестая часть смертей во Франции были вызваны туберкулёзом. Около 1880 года каждая вторая смерть в Германии в возрастной группе от 15 до 40 лет была вызвана этой болезнью. Туберкулёз также был самой распространённой причиной смерти в сельской местности."
 panum.200.g: "Хватит ли времени хотя бы на романтическую смерть?"
 panum.220.t: "Эпидемия туберкулёза заканчивается"
 panum.220.d: "Городские и сельские врачи сообщают, что пик заболеваемости туберкулёзом миновал несколько недель назад. Хотя болезнь не исчезла полностью, её распространение вернулось в обычные рамки."
 panum.220.f: "«Я не могу ошибиться в этом цвете;\nэта капля крови — мой смертный приговор;\nя должен умереть», — Джон Китс."
 panum.300.t: "Эпидемия оспы"
 panum.300.d: "В одной из наших областей вспыхнула эпидемия: #YELLOW оспа#! свирепствует в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')]!"
 panum.300.f: "Оспа известна, вероятно, уже тысячи лет и появилась в первых поселениях на северо-востоке Африки 12 000 лет назад. Оттуда она, возможно, была занесена в Индию египетскими торговцами. Европейские завоеватели принесли оспу в Америку, где с 1518 года она вызвала разрушительные эпидемии среди коренного населения, унеся миллионы жизней. В Европе оспу иногда считали детской болезнью. До конца XVIII века от неё умирало до 10% всех маленьких детей. С XVIII века случаи оспы участились, и она вытеснила чуму, став самой страшной болезнью. По оценкам, каждый год от оспы умирало 400 000 человек, а треть выживших слепла. Часто детей считали полноправными членами семьи только после того, как они переживали оспу. Несмотря на успешное введение оспопрививания около 1800 года, оспа оставалась эпидемической болезнью до второй половины века."
 panum.300.g: "Полагаю, косметика скоро войдёт в моду."
 panum.320.t: "Эпидемия оспы заканчивается"
 panum.320.d: "Ужасная оспа, один из худших бичей человечества, медленно отступает из [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Те, кто выжил, остались со шрамами на всю жизнь."
 panum.320.f: "«Будущие поколения будут знать из истории лишь то, что отвратительная оспа существовала и была вами истреблена», — Томас Джефферсон."
 panum.400.t: "Эпидемия тифа"
 panum.400.d: "В одной из наших областей вспыхнула эпидемия: #YELLOW тиф#! свирепствует в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')]!"
 panum.400.f: "Тиф, который, вероятно, существовал в древности, но был достоверно описан лишь в XVI веке, проявлялся в первую очередь как типичная эпидемия войны и нищеты. Тиф стал серьёзной проблемой для армии Наполеона во время русской кампании. Когда Великая армия, вторгшаяся в Россию в июне 1812 года, отступала осенью 1813 года, Майнц был её первой остановкой на французской земле. Там умерло от 15 000 до 17 000 французских солдат и столько же гражданских. Болезнь, которую тогда также называли «нервной лихорадкой» из-за неврологических симптомов, осталась во французском языке как Typhus de Mayence. К концу октября 1814 года во Франконии, в районе Великого герцогства Вюрцбург, было зарегистрировано 14 000 случаев тифа, из которых 2500 оказались смертельными. Ещё одна эпидемия, унёсшая около двух с половиной миллионов жизней, произошла в России в результате войны и гражданской войны между 1918 и 1922 годами."
 panum.400.g: "Может, стоит сменить одежду?"
 panum.420.t: "Эпидемия тифа заканчивается"
 panum.420.d: "Кажется, худшая фаза эпидемии тифа миновала. Хотя подсчёт погибших ещё не завершён, уже ясно, что никого нельзя считать ответственным за эту ужасную вспышку."
 panum.420.f: "«Единственные английские пациенты, которых я когда-либо знала и которые отказывались от чая, были больны тифом; и первым признаком их выздоровления была их вновь проснувшаяся тяга к чаю», — Флоренс Найтингейл."
 panum.500.t: "Эпидемия жёлтой лихорадки"
 panum.500.d: "В одной из наших областей вспыхнула эпидемия: #YELLOW жёлтая лихорадка#! свирепствует в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')]!"
 panum.500.f: "Жёлтая лихорадка эндемична для тропических и субтропических районов Южной Америки и Африки. В XVIII и XIX веках она также затронула Центральную Америку, Карибский бассейн и юг нынешних США. Болезнь, вероятно, зародилась в Африке и попала в Новый Свет через атлантическую работорговлю. Первая вероятная вспышка произошла на Юкатане в 1648 году, где болезнь называли xekik (чёрная рвота). За ней последовало по меньшей мере 25 крупных эпидемий, например, в Филадельфии в 1793 году, в результате которой погибло несколько тысяч человек, а американское правительство и президент Джордж Вашингтон были вынуждены покинуть город. Одно из самых ранних медицинских описаний жёлтой лихорадки в Северной Америке было сделано Джоном Лайнингом (1756), врачом из Чарльстона, где вспышки были в 1728 и 1732 годах. Единичные вспышки регистрировались и в Европе, например, в Барселоне в 1821 году, где погибло несколько тысяч человек. В 1867 году произошла вспышка в Форт-Джефферсоне во Флориде. В 1878 году эпидемия в долине Миссисипи унесла жизни 20 000 человек, а последняя вспышка в США произошла в Новом Орлеане в 1905 году."
 panum.500.g: "Виноваты испорченные фрукты?"
 panum.520.t: "Эпидемия жёлтой лихорадки заканчивается"
 panum.520.d: "После того как целые улицы и семьи были уничтожены коварной жёлтой лихорадкой, врачи и власти сообщают об отступлении болезни: эпидемия наконец-то закончилась."
 panum.520.f: "«Её называют жёлтой лихорадкой, но она не похожа ни на что известное или описанное врачами», — Томас Джефферсон."
 building_panum_tuberculosis_sanatorium: "Туберкулёзный санаторий"
 pmg_panum_sanatorium: "Туберкулёзный санаторий"
 pm_panum_sanatorium: "Туберкулёзный санаторий"
 building_panum_tuberculosis_sanatorium_tt: "Туберкулёзный санаторий может быть основан в результате эпидемии туберкулёза в горных районах. #R Активируется только через событие.#!"
 panum_tuberculosis: "Туберкулёз"
 panum_tuberculosis_desc: "Туберкулёз, также известный как «белая смерть», был одной из основных причин смерти в викторианскую эпоху."
 panum_forbidden_spitting_modifier: "Запрет на плевки"
 panum_tuberculosis_quarantine_modifier: "Карантин по туберкулёзу"
 panum_tuberculosis_sanatorium_cost_modifier: "Стоимость санатория"
 panum_help_against_tuberculosis_modifier: "Помощь в борьбе с туберкулёзом"
 panum_praised_for_tuberculosis_initiative_modifier: "Похвала за инициативу по борьбе с туберкулёзом"
 panum_supports_health_care_initiative_modifier: "Поддержка инициативы в области здравоохранения"
 panum_opposes_health_care_initiative_modifier: "Противодействие инициативе в области здравоохранения"
 panum_tuberculosis_hospital_modifier: "Туберкулёзный госпиталь"
 panum.201.t: "Туберкулёз распространяется на [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_VP')]"
 panum.201.d: "Эпидемия туберкулёза распространилась, несмотря на все наши усилия. Теперь она бушует и в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')]."
 panum.201.g: "Белая смерть кажется неудержимой."
 panum.202.t: "Наследственное заболевание?"
 panum.202.d: "Несмотря на все медицинские исследования, происхождение туберкулёза всё ещё остаётся предметом споров. Некоторые наши медики предполагают, что это наследственное заболевание или, по крайней мере, вызванное «внутренними факторами». Другие врачи придерживаются мнения, что это классическое заразное заболевание, и рекомендуют принять радикальные меры."
 panum.202.f: "Что касается концепции патогенеза, в европейских странах XVIII и XIX веков существовали разные традиции. Многие медицинские авторы того времени считали туберкулёз, или чахотку (что не всегда было синонимом), худшей из известных эпидемий. Они видели причины в неравномерном распределении телесных жидкостей, зловещих испарениях из почвы, урбанизации или упадке нравов. В Италии, с другой стороны, традиционно склонялись к заразной, т. е. передаваемой причине. Следовательно, в середине XVIII века Венецианская республика ввела обязательство сообщать о случаях фтизиса (чахотки из-за лёгочного туберкулёза). Личные вещи умерших от этой болезни сжигались, чтобы снизить риск заражения. Однако в Англии и северных странах в целом считалось, что болезнь имеет наследственную причину."
 panum.202.g: "Это наследственное заболевание, и мы ничего не можем сделать."
 panum.202.h: "Это заразное заболевание, и мы должны сделать всё возможное, чтобы остановить его распространение!"
 panum.203.t: "Плевки на улицах"
 panum.203.d: "Из-за недостатка знаний о причинах туберкулёза меры по борьбе с ним также были спорными. Те, кто предполагал заразную причину, выступали за радикальные запреты — включая плевки в общественных местах — чтобы предотвратить распространение. Это особенно затронуло низшие классы. Скептики видели в таких правилах лишь способ притеснения простого народа."
 panum.203.f: "Даже если правила этикета XVIII века и искоренили некоторые «дурные привычки» в высших и средних классах, многие гигиенически сомнительные обычаи долгое время оставались широко распространёнными в массах. Носовые платки и плевательницы ещё не получили широкого распространения в обществе в начале XIX века, и только на рубеже веков стало обычной практикой запрещать плевки, например, в общественном транспорте."
 panum.203.g: "Запретить эту отвратительную привычку!"
 panum.203.h: "Ввести драконовский запрет и заставить нарушителей платить!"
 panum.203.i: "Плевок — это часть человеческой природы, его нельзя запретить."
 panum.204.t: "[SCOPE.sCharacter('disease_victim_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('disease_victim_scope').IsFemale, 'заболела', 'заболел')] туберкулёзом!"
 panum.204.d: "Эпидемия туберкулёза затронула и деятеля искусства [SCOPE.sCharacter('disease_victim_scope').GetFullName]! Удивительно, но [SelectLocalization(SCOPE.sCharacter('disease_victim_scope').IsFemale, 'он не видит', 'она не видит')] в этом удара судьбы."
 panum.204.f: "В начале XIX века, да и далеко за его пределами, туберкулёз считался «романтической болезнью». Он давал жертве достаточно времени, чтобы подготовиться к смерти, и многие видели в сопутствующей бледности признак благородства. Писатели увековечили его в нескольких произведениях, таких как «Дама с камелиями» Дюма-сына. Подобное преображение болезнь находит в операх Верди («Травиата») и Пуччини («Богема»). Говорят, что Жорж Санд, партнёрша Шопена, отметила: «Шопен кашляет с бесконечным изяществом»."
 panum.204.i: "Разве это не вдохновляющий повод для реквиема?"
 panum.204.j: "Разве туберкулёз не всегда был темой для писателей?"
 panum.204.k: "Разве не эта самая болезнь побуждает к изображению страданий?"
 panum.205.t: "Туберкулёзный санаторий"
 panum.205.d: "Ввиду бушующей в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] эпидемии туберкулёза один из местных врачей предложил перевести некоторых состоятельных пациентов в горы. Говорят, что высокогорный климат и чистый воздух могут излечить их от болезни. Для этого должен быть построен специальный лёгочный санаторий. [SCOPE.sState('panum_davos_scope').GetName] кажется идеальным местом для такого учреждения."
 panum.205.f: "Воздушная терапия — это форма климатотерапии, которая с XIX века долгое время считалась стандартным методом лечения туберкулёза. Пациенты лежали на шезлонгах на открытом воздухе или в открытых верандах по несколько часов в день. Воздушная терапия проводилась в специальных лёгочных санаториях. В Германии врач Герман Бремер был первым, кто описал ранее неизлечимый туберкулёз как излечимый с помощью воздушной терапии. В 1856 году он написал диссертацию об излечимости хронического туберкулёза лёгких. Он предполагал, что существуют «иммунные места», которые, с одной стороны, благодаря своему климату, эффективно защищают жителей от туберкулёза, а с другой — оказывают лечебное действие после вспышки болезни. В Швейцарии пионером воздушной терапии был немецкий врач Александр Шпенглер. Он начал практиковать как сельский врач в Давосе в 1853 году и вскоре пришёл к выводу, что жители этого района практически не страдают от туберкулёза, что он приписал высокогорному климату. Томас Манн прославил Давос как климатический курорт в своём романе «Волшебная гора»."
 panum.205.g: "Построить санаторий в [SCOPE.sState('panum_davos_scope').GetCustom('RU_SL_PP')]!"
 panum.205.h: "Всё это лишь дорогостоящее шарлатанство."
 panum.206.t: "Болезнь пролетариев"
 panum.206.d: "Эпидемия туберкулёза в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] сильнее всего бьёт по низшему классу. Сложившаяся ситуация вызвала резкую критику со стороны [SCOPE.sCharacter('union_leader').GetFullName], [SelectLocalization(SCOPE.sCharacter('union_leader').IsFemale, 'которая призвала', 'который призвал')] к далеко идущим изменениям."
 panum.206.f: "Туберкулёз привлёк широкий интерес в XIX и начале XX веков как эндемическое заболевание городской бедноты. В 1815 году четверть смертей в Англии, а в 1918 году шестая часть смертей во Франции были вызваны туберкулёзом. Около 1880 года каждая вторая смерть в Германии в возрастной группе от 15 до 40 лет была вызвана этой болезнью."
 panum.206.g: "Может, бедным просто стоит чаще мыться?"
 panum.206.h: "Выборочные улучшения в этой области оправданы."
 panum.206.i: "Вопрос здравоохранения — дело государственное."
 panum.206.j: "Мы приветствуем эту инициативу!"
 panum.207.t: "Религиозная инициатива"
 panum.207.d: "[SCOPE.sCharacter('devout_leader').GetFullName] лично [SelectLocalization(SCOPE.sCharacter('devout_leader').IsFemale, 'выступила', 'выступил')] в защиту многих больных в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')]. [SelectLocalization(SCOPE.sCharacter('devout_leader').IsFemale, 'Она хотела', 'Он хотел')] бы в скором времени основать там некоммерческий госпиталь."
 panum.207.f: "«Едва ли осталась страна, где так или иначе не была бы начата борьба с туберкулёзом, и чрезвычайно отрадно видеть, как сейчас кампания ведётся довольно повсеместно и со значительной энергией против этого опасного врага», — Роберт Кох."
 panum.207.g: "Эти сказочники просто пытаются набрать влияние!"
 panum.208.t: "Белая чума собирает свою дань"
 panum.208.d: "Вспышка туберкулёза в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] усугубилась. Число больных и умерших растёт с каждым днём. Никто из врачей не ожидал такого развития событий."
 panum.208.f: "«Как я бледен! Мне кажется, я хотел бы умереть от чахотки… потому что тогда все женщины сказали бы: „посмотрите на бедного Байрона — как интересно он выглядит, умирая!“» — Лорд Байрон."
 panum.208.g: "Неужели это никогда не закончится?"
 panum_has_physician_tt: "#default_text Есть [concept_panum_physician].#!"
 panum_has_active_physician_tt: "#default_text Есть [concept_panum_physician|l], который не занят.#!"
 panum_physician_experienced: "Опытный врач"
 panum_physician_experienced_desc: "Проведя годы за лечением пациентов, этот [concept_panum_physician|l] стал настоящим экспертом в своей области."
 panum_physician_famous: "Знаменитый врач"
 panum_physician_famous_desc: "Медицинские новшества и открытия, сделанные этим [Concept('panum_physician', '#b #BLUE врачом#!#')], принесли ему известность в медицинских кругах."
 panum_typhus_quarantine_modifier: "Карантин по тифу"
 panum_typhus_fever_sheds_modifier: "Лихорадочные бараки"
 panum_typhus_rigid_rules_modifier: "Жёсткие правила"
 panum_typhus_fever_sheds_help_modifier: "Помощь в лихорадочных бараках"
 panum_additional_fever_shed_protection_modifier: "Защита лихорадочных бараков"
 panum_additional_funeral_aids_modifier: "Дополнительная помощь на похороны"
 panum_typhus_barracks_modifier: "Тиф в казармах"
 panum_yellow_fever_quarantine_modifier: "Карантин по жёлтой лихорадке"
 panum_plantation_quarantine_modifier: "Карантин на плантациях"
 panum_administrative_evacuation_modifier: "Эвакуация администрации"
 panum_yellow_fever_barracks_modifier: "Жёлтая лихорадка в казармах"
 panum_yellow_fever_port_modifier: "Жёлтая лихорадка в порту"
 panum.301.t: "Оспа распространяется на [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_VP')]"
 panum.301.d: "Согласно последним сообщениям, оспа теперь бушует и в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')]. Наши усилия по сдерживанию эпидемии оказались безуспешными."
 panum.301.g: "Оспа повсюду!"
 panum.302.t: "Эпидемия оспы достигла [SCOPE.sCountry('panum_infected_country').GetAltNameNoFlag('RU_CL_RP')]"
 panum.302.d: "Мы получили сообщения, что первые случаи оспы были зарегистрированы сегодня в [SCOPE.sCountry('panum_infected_country').GetAltNameNoFlag('RU_CL_PP')]. Местные власти обвиняют нас в том, что мы не сделали достаточно для предотвращения распространения болезни."
 panum.302.g: "Кто бы мог подумать?"
 panum.303.t: "Оспа выходит из-под контроля"
 panum.303.d: "Система здравоохранения в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] находится на грани коллапса. Врачи уже покидают этот район, потому что сами рискуют заразиться. К сожалению, мы вынуждены скорректировать число погибших в регионе в сторону увеличения."
 panum.303.f: "«Не было предпринято никаких попыток подсчитать жертв, и невозможно точно оценить их число в любом из этих племён; считается, что если бы цифра в 17 200 для индейцев верховьев реки Миссури была удвоена, то общая цифра не была бы слишком большой для тех, кто пал к востоку от Скалистых гор»."
 panum.303.g: "Неужели нет лекарства от этой ужасной болезни?"
 panum.401.t: "Тиф распространяется на [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_VP')]"
 panum.401.d: "Опасный тиф, по-видимому, распространился на другую область. Сообщения из [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_RP')] свидетельствуют о том, что всё больше людей становятся жертвами этой болезни."
 panum.401.g: "Тиф кажется неудержимым..."
 panum.402.t: "Болезнь морального разложения?"
 panum.402.d: "Учитывая ограниченные знания о том, что такое тиф, что его вызывает и как эффективно с ним бороться, существует множество теорий о причинах заражения. Преобладает мнение, что это болезнь, связанная с образом жизни, а не с передачей от человека к человеку."
 panum.402.f: "Подобно туберкулёзу, многие врачи предполагали, что тиф не является заразной болезнью. В то время как туберкулёз рассматривался почти в романтизированном ключе — это была болезнь романтиков и, следовательно, «благородных» душ, — в случае с тифом болезнь считалась клеймом морального разложения. Тот факт, что высшие классы почти не были затронуты, порождал у них определённое чувство превосходства. Точно так же, как в Средние века болезни часто приписывались божественному влиянию или наказанию, казалось доказанным фактом, что дефекты характера или развращённость в некоторой степени связаны с определёнными болезнями. Лишь со второй трети XIX века этот взгляд начал меняться."
 panum.402.g: "Есть причина, по которой тиф в первую очередь поражает преступников, проституток и аморальных солдат."
 panum.402.h: "Вероятно, важно не столько то, кто эти люди, сколько то, где они живут."
 panum.403.t: "Карантин"
 panum.403.d: "Средний и высший классы выступают за создание отдельных учреждений для низших социальных слоёв, затронутых тифом. Эти «лихорадочные дома» будут финансироваться некоммерческими организациями. Однако некоторые представители бедных слоёв видят в этом скорее метод изоляции, чем заботы о здоровье. Часть членов правительства, с другой стороны, требует полного карантина, что средний класс, в частности, считает совершенно чрезмерной мерой."
 panum.403.f: "Как и многие другие эпидемии, тиф служил инструментом сегрегации. Поэтому призыв к всеобщему карантину был во многих местах непопулярен, поскольку считалось, что болезнь можно приписать определённым людям, тем более что многие считали её наследственной. Однако подспудный страх заражения играл свою роль, поэтому во многих местах строились лихорадочные дома. Во время великой эпидемии тифа в Северной Америке в 1847 году идея о заразности болезни стала настолько распространённой, что массы заражённых ирландских иммигрантов были фактически сосланы в такие учреждения."
 panum.403.g: "Вся территория должна быть помещена в карантин."
 panum.403.h: "Отправить больных тифом в специальные дома."
 panum.403.i: "Тиф — не заразная болезнь, поэтому карантин не имеет смысла."
 panum.404.t: "Грязные бараки"
 panum.404.d: "Ситуация в так называемых лихорадочных домах, которые всё больше превращаются в переполненные гробы, полные экскрементов и страданий, уже стала серьёзной проблемой в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')]. Пасторы и сиделки написали письмо с призывом демонтировать эти ужасные учреждения."
 panum.404.f: "Лихорадочные бараки были грязными и переполненными, пациенты лежали на двухъярусных нарах, что позволяло нечистотам с верхнего яруса падать на нижний. Согласно отчёту сенатского комитета, двух или трёх пациентов помещали вместе на одну койку, независимо от возраста или пола. Хлеба не было: еда состояла из чая, каши или бульона, подаваемых три раза в день. Поскольку питьевую воду привозили, её никогда не хватало для больных лихорадкой. Один католический священник, отец Мойлан, сообщил, что давал воду пациентам в палатке, которые не могли пить 18 часов. Бараки изначально не предназначались для размещения больных лихорадкой и не имели вентиляции; новые бараки строились без туалетов. Сенатский комитет заявил, что из-за нехватки персонала и места больные лежали в собственных экскрементах по несколько дней, а персонала не хватало даже на то, чтобы убирать умерших ночью."
 panum.404.g: "Мы не можем рисковать заражением ещё большего числа людей."
 panum.404.h: "Улучшить положение больных тифом и оказать медицинскую помощь."
 panum.404.i: "Демонтировать эти бесчеловечные бараки!"
 panum.405.t: "Бунты против лихорадочных бараков"
 panum.405.d: "Страх перед распространением тифа в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] настолько радикализировал некоторых граждан, что они образовали разъярённую толпу. Ходят слухи, что они хотят сбросить лихорадочные бараки вместе с их пациентами в ближайшую реку!"
 panum.405.f: "В 1847 году количество бараков в Монреале выросло до 22, а войска оцепили этот район, чтобы больные не могли сбежать. Когда толпа пригрозила сбросить лихорадочные бараки в реку, мэр Монреаля Джон Истон Миллс подавил бунт и лично занялся уходом за больными, давая им воду и меняя постельное бельё. Он умер в ноябре, пробыв на посту менее года."
 panum.405.g: "Этому варварству нет места в нашей стране!"
 panum.405.h: "Они всё равно умрут."
 panum.406.t: "Непогребённые трупы"
 panum.406.d: "Число смертей в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] растёт так быстро, что гробовщики едва справляются с работой. Существует опасность, что непогребённые тела могут привести к ещё большим проблемам."
 panum.406.f: "В 1860-х годах исключительно суровые погодные условия и неурожаи поразили тогдашнее Великое княжество Финляндское, что привело к голоду и эпидемиям. В 1866–1868 годах от голода и, в особенности, от того, что в то время считалось тифом, в регионе умерло 270 000 человек."
 panum.406.g: "Использовать все доступные средства, чтобы эта проблема не стала непреодолимой."
 panum.406.h: "Вырыть обычные массовые захоронения."
 panum.406.i: "Наши возможности исчерпаны, вы должны сами позаботиться об этом!"
 panum.407.t: "Тиф в казармах"
 panum.407.d: "В настоящее время тиф в основном распространяется на военных объектах в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_RP')]. Там он собирает свою смертельную дань."
 panum.407.f: "Многие историки считают, что вспышка тифа среди войск Наполеона является истинной причиной, по которой он остановил свою военную кампанию в России, а не голод или холод. Тиф был значительным убийцей во время Гражданской войны в США, хотя брюшной тиф был более распространённой причиной «лагерной лихорадки». До 900 000 смертей приписывают тифу во время Крымской войны 1853–1856 годов. Тиф был эндемичен в Польше и нескольких соседних странах до Первой мировой войны (1914–1918), но стал эпидемическим во время войны. Тиф опустошил армии Восточного фронта, где только в Сербии умерло более 150 000 человек. Смертность обычно составляла от 10% до 40% инфицированных, и болезнь была основной причиной смерти среди тех, кто ухаживал за больными."
 panum.407.g: "Невидимый враг, смертоноснее любой армии..."
 panum.408.t: "Мучения от болезни, а не на войне"
 panum.408.d: "Эпидемия тифа в наших казармах продолжает распространяться с каждым днём. Солдаты теперь входят в число наиболее часто погибающих в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] — и всё это без вражеского вмешательства."
 panum.408.f: "«Война — это не приключение. Это болезнь. Это как тиф», — Антуан де Сент-Экзюпери."
 panum.408.g: "Ужасно!"
 panum.501.t: "Жёлтая лихорадка распространяется на [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_VP')]"
 panum.501.d: "Сообщения о новых случаях жёлтой лихорадки подтвердили наши худшие опасения. Болезнь теперь бушует и в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')]!"
 panum.501.g: "Почему не удалось это остановить?"
 panum.502.t: "Заразная болезнь?"
 panum.502.d: "Хотя неясно, является ли жёлтая лихорадка заразной болезнью или имеет другие причины, многие заботящиеся о своей безопасности граждане призывают к карантину, чтобы остановить распространение. Если мы этого не сделаем, они могут расценить это как невежество или безразличие к их нуждам."
 panum.502.f: "Первые вспышки жёлтой лихорадки в XVII веке вызвали панику и дезориентацию. Даже в XVIII веке люди в значительной степени расходились во мнениях о том, что вызывает инфекцию. Хотя правительства и отдельные лица прибегали к строгим мерам или профилактике, успеха не было. Страх перед жёлтой лихорадкой означал, что не упускалась ни одна возможность предотвратить её дальнейшее распространение, иногда с помощью экспериментальных или драконовских мер. Поэтому некоторые действия могли иметь скорее психологические, чем медицинские причины, чтобы избежать эскалации недовольства среди населения."
 panum.502.g: "Нет никаких доказательств того, что это заразная болезнь."
 panum.503.t: "Жёлтая лихорадка поражает плантации"
 panum.503.d: "Ежедневно поступают сообщения о том, что на плантациях в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] наблюдается особенно высокий уровень заболеваемости жёлтой лихорадкой. Некоторые правительственные советники настаивают на полном прекращении там работ, чтобы уменьшить распространение."
 panum.503.f: "«Бедный чернокожий по имени Сэмпсон постоянно ходил от дома к дому, где была беда и не было помощи, без платы или вознаграждения. Он был поражён этой болезнью и умер. После его смерти его семья была забыта теми, кому он служил. Сара Басс, бедная чернокожая вдова, оказывала всю возможную помощь в нескольких семьях, за что ничего не получала; а когда ей что-то предлагали, она оставляла это на усмотрение тех, кому служила», — Ричард Аллен."
 panum.503.g: "Убрать рабочих с полей!"
 panum.503.h: "Плантации должны продолжать работать любой ценой!"
 panum.504.t: "Эвакуация"
 panum.504.d: "Ситуация со здоровьем в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] продолжает ухудшаться. Члены местного правительства и администрации попросили разрешения покинуть город и организовать управление из сельской местности. Некоторые считают это разумным предложением, другие — чистой трусостью."
 panum.504.f: "Во время эпидемии жёлтой лихорадки в Филадельфии в 1793 году в реестре смертей с 1 августа по 9 ноября было зарегистрировано 5000 или более человек. Подавляющее большинство из них умерло от жёлтой лихорадки, что делает эпидемию в городе с населением 50 000 человек одной из самых тяжёлых в истории Соединённых Штатов. К концу сентября город покинуло 20 000 человек, включая членов конгресса и исполнительных чиновников федерального правительства. Большинство из них не вернулись до тех пор, пока эпидемия не утихла в конце ноября. Президент Джордж Вашингтон покинул город и уехал в своё поместье Маунт-Вернон. Смертность достигла пика в октябре, прежде чем мороз окончательно убил комаров и положил конец вспышке. Некоторые соседние города отказывались впускать беженцев из Филадельфии, опасаясь, что они несут лихорадку. Крупные портовые города, в том числе Балтимор и Нью-Йорк, ввели карантин для беженцев и товаров из Филадельфии, хотя Нью-Йорк и направил городу финансовую помощь."
 panum.504.g: "Эвакуировать власти."
 panum.504.h: "Местная администрация не должна пасть."
 panum.505.t: "Жёлтая лихорадка распространяется на казармы"
 panum.505.d: "Жёлтая лихорадка в настоящее время в первую очередь распространяется на военных объектах [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_RP')]. Там она собирает свою смертельную дань."
 panum.505.f: "Для повстанцев на Гаити на рубеже XVIII и XIX веков и на Кубе почти 100 лет спустя жёлтая лихорадка была великим союзником против колониальных армий, присланных из Европы. Лидер кубинской борьбы за независимость говорил о своих «непобедимых генералах Июне, Июле и Августе» — тех месяцах, когда приходят дожди, а с ними и комары. У британцев был подобный опыт во время осады Картахены в 1741 году. 29 000 британских солдат осаждали крепость. Когда начались дожди, 22 000 погибли мучительной смертью в течение нескольких недель. Смертность в британских гарнизонах на Ямайке была в семь раз выше, чем в гарнизонах в Канаде, в основном из-за жёлтой лихорадки и других тропических болезней."
 panum.505.g: "Нет! Они были предназначены для почётной смерти на поле боя!"
 panum.506.t: "Болезнь моряков"
 panum.506.d: "Работа порта в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] практически остановилась из-за жёлтой лихорадки. С одной стороны, многие портовые рабочие и моряки больны. С другой стороны, большинство кораблей стараются избегать проклятого региона."
 panum.506.f: "«Самое плачевное опустошение в Новом Орлеане производит жёлтая лихорадка. Тысячи были унесены её разрушениями, и каждый день добавляет ещё 200 к ужасному списку. Мёртвых хоронят в траншеях бригады негров, нанятых по гинее в час. И так, под песни и непристойные шутки могильщиков, жужжание мух, певучие крики торговок, продающих свои сладости, грубую брань мужчин, которые везут телеги с мёртвыми, весёлый свист мальчишек и удушающий смрад от десятков почерневших трупов, день проходит быстро, работа по погребению сделана, и ночь опускает занавес. Тем временем развлечения, регаты, балы и т. д. продолжаются как обычно, как будто такой ужасной эпидемии в обречённом городе нет», — Cambridge Weekly News в 1853 году."
 panum.506.g: "Это крах для судоходства!"
 panum.507.t: "Чёрная рвота"
 panum.507.d: "В [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] жёлтая лихорадка свирепствует сильнее, чем ожидалось. Врачи сообщают, что от этой болезни умерло больше людей, чем предполагалось ранее."
 panum.507.f: "«Те, кто выходил на улицу, держали у носа платки или губки, пропитанные уксусом с камфорой, или нюхательные флаконы, полные „уксуса воров“. Другие носили в руках или карманах куски просмолённой верёвки или мешочки с камфорой на шее... Люди поспешно меняли курс при виде приближающегося катафалка. Многие никогда не ходили по тротуару, а шли посреди улицы, чтобы не заразиться, проходя мимо домов, где умерли люди. Знакомые и друзья избегали друг друга на улицах и лишь выражали своё расположение холодным кивком. Старый обычай пожимать руки вышел из такого всеобщего употребления, что многие отшатывались в ужасе даже от протянутой руки. Человека в траурной одежде или с любым признаком траура избегали, как гадюку», — Мэтью Кэри."
 panum.507.g: "Когда же мы наконец освободимся от этой чумы?"
