 je_panum_measles_description_reason: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] в настоящее время обследует нескольких пациентов в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')], чтобы определить симптомы #YELLOW кори#!. Крайне важно уметь отличать её от других, похожих или сопутствующих заболеваний. По окончании своей работы учёный сделает своё описание доступным для общественности, чтобы будущие поколения имели больше шансов распознать причины болезни и найти методы лечения."
