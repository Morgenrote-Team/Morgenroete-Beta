 country_panum_psychological_treatment_success_chance_mult: "Шанс успеха психологического лечения"
 panum.641.t: "Болезнь, подлежащая регистрации"
 panum.641.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'написала', 'написал')] срочное письмо властям с требованием прекратить относиться к кори как к доброкачественному заболеванию и сделать его подлежащим обязательной регистрации."
 panum.641.f: "«Мне приходилось выслушивать обвинения от коллег, даже очень влиятельных коллег в высших государственных и университетских органах, в том, что я преувеличиваю опасность, которую представляет корь. Меня даже обвиняли в том, что я раздуваю проблему кори только для того, чтобы улучшить своё положение. Это правда, что смертность от кори составляет от 2 до 5 процентов. Но если мы предположим, что от кори умирает примерно 2 из 100 человек, то в стране с населением 10 миллионов это означает несколько тысяч смертей. В мире миллионы смертей, которых можно было бы избежать с помощью простых мер защиты. Разве не лучше, если мы все просто будем немного внимательнее и будем следовать правилам, чтобы спасать жизни людей? Хотим ли мы совершать те же ошибки, что и женщины, недавно родившие, и высокомерные врачи, не моющие руки, хотя это небольшая затрата времени с огромным эффектом?»\n\nОтрывок из письма доктора [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] местному правительству в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')]"
 panum.641.g: "Маленькие вещи могут иметь большое значение."
 panum.642.t: "Заражение животных корью"
 panum.642.d: "В широко освещённом эксперименте на животных доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'заразила', 'заразил')] обезьян корью."
 panum.642.f: "«Ввиду большой важности предмета и очевидной невосприимчивости других животных, нам показалось крайне желательным подвергнуть вопрос о восприимчивости обезьян к инфекции кори дальнейшей проверке.\nМы начали работу год назад и теперь хотим сообщить о некоторых результатах, которые, по нашему мнению, демонстрируют, что макака-резус может быть заражена кровью, взятой из общего кровотока больного корью, и что так заражённая обезьяна может проявлять определённую лихорадочную реакцию, напоминающую течение температуры при некоторых типах кори у человека, с генерализованной экзантемой или без неё.\nПолные детали нашей работы будут приведены в статье, которая сейчас готовится».\n\nОтчёт доктора [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] Медицинскому факультету."
 panum.642.g: "Это поможет найти успешное лечение."
 panum.642.h: "Это поможет в поиске возбудителя."
 panum.643.t: "Возрастно-зависимая болезнь"
 panum.643.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'изучила', 'изучил')] несколько случаев заболевания в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] и [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'выявила', 'выявил')] значительные различия в смертности пациентов."
 panum.643.f: "«Корь считается безобидным детским заболеванием. Однако мои исследования показали, что это верно только для детей детсадовского возраста. Напротив, смертность особенно высока у детей в возрасте от 6 месяцев до 3 лет. После этого смертность довольно быстро падает. Хотя корь у взрослых считается безобидной, отчёты Людвига Панума с Фарерских островов показали, что лучше, если иммунизация происходит в детстве — опытные рыбаки также сообщают о тяжёлом течении болезни и даже смерти».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')] г."
 panum.643.g: "Значит, есть особые группы риска."
 panum.644.t: "Крайне заразно"
 panum.644.d: "Во время визита в школу в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'смогла', 'смог')] лично убедиться, что как только болезнь вспыхивает, она распространяется почти неудержимо."
 panum.644.f: "«Спасибо, что пришли, доктор».\n«Радость на моей стороне, мисс. Сколько случаев кори сейчас в школе?»\n«К сожалению, мы полностью сбились со счёта. Вчера было 35, но сейчас мы должны были превысить 40».\n«Когда был задокументирован первый случай кори?»\n«На прошлой неделе»."
 panum.644.g: "Тревожно."
 panum.645.t: "Чихание и кашель"
 panum.645.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] рекомендует карантинные меры, подобные тем, что рекомендуются при гриппе или туберкулёзе, для ограничения кори."
 panum.645.f: "«Корь не воспринимается как респираторное заболевание, но мои подозрения подтвердились, что это единственный способ остановить её распространение. Корь — одна из самых заразных человеческих болезней — видимо, передаётся воздушно-капельным путём. Есть сообщения, что люди в комнате больного заражались, даже если они были вне комнаты в течение двух часов. По-видимому, инфекционные выделения остаются заразными и позже».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')] г."
 panum.645.g: "К счастью, это хорошо известные методы."
 panum.646.t: "Антибиотики"
 panum.646.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] видит возможность уменьшить некоторые побочные эффекты кори с помощью новых антибиотиков."
 panum.646.f: "«Тот факт, что корь часто не воспринимается всерьёз как болезнь, также связан с тем, что она часто не имеет дальнейших побочных эффектов. К сожалению, это не всегда так. Вторичные заболевания, такие как инфекции в ухе или лёгких, часто становились решающим фактором между лёгким, тяжёлым и смертельным течением. Антибиотики не могут вылечить корь, но они могут избавить от её ужаса».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')] г."
 panum.646.g: "Больше антибиотиков!"
 panum.646.h: "Эти находки должны помочь в поиске настоящего возбудителя."
 panum.647.t: "Статистика"
 panum.647.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] особенно отличил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ась', 'ся')] в статистической регистрации случаев кори, обработке данных по заражённым домохозяйствам и оценке этих данных."
 panum.647.f: "«В ходе тщательного исследования доступных данных за последние несколько лет я изучил смертность от кори в 22 странах и пришёл к следующим выводам»:\n\nЧили 4,84%, Венгрия 4,43%, Австралия 0,24%, Шотландия 0,35%, Испания 3,85%, Италия, Англия и Уэльс 2,91%, США 1,08%. В странах, где корь была эндемичной, эпидемические вспышки происходят каждые три-пять лет после обновления популяции. Впоследствии сообщалось о гораздо более высоких показателях, достигающих 10%, особенно на островах Тихого океана и в Африке».\n\nОтчёт доктора [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] Медицинскому факультету."
 panum.647.g: "Полезно."
 panum.647.h: "У доктора есть талант, [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она должна', 'он должен')] углубить свои исследования."
 panum.648.t: "Распространение"
 panum.648.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] опубликовал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] поразительные цифры о распространении и заражении корью."
 panum.648.f: "«Корь чрезвычайно заразна, и по оценкам, 90% неиммунных людей, контактировавших с инфицированным человеком, заболеют. Математические модели оценивают базовое репродуктивное число в 12–18; то есть среднее число вторичных инфекций, которые следуют за одним случаем в восприимчивой популяции. Она чрезвычайно заразна: девять из десяти человек, не имеющих иммунитета и живущих с инфицированным человеком, заразятся».\n\nОтчёт доктора [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] Медицинскому факультету."
 panum.648.g: "То, что раньше было лишь догадкой, теперь доказано наукой."
 panum.649.t: "Инфекция без симптомов"
 panum.649.d: "После нескольких наблюдений на месте доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] сделал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] разумное предположение, что корь также передаётся бессимптомными пациентами, даже до появления внешних признаков."
 panum.649.f: "«Высокая распространённость кори — хорошо известный феномен, и риск заражения известен с древних времён. Большая проблема заключается в том, что, по-видимому, здоровые люди также переносят болезнь, даже если она ещё не проявилась. Это опровергает многие ранее действовавшие предположения. Заразность — как показали несколько наблюдений в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] — начинается за 4 дня до появления сыпи и обычно длится до 4 дней после её появления. По-видимому, заразность максимальна непосредственно перед появлением сыпи».\n\nОтчёт доктора [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] Медицинскому факультету."
 panum.649.g: "Следовательно, оправданы более тщательные расследования."
 panum.650.t: "Дезинфекция казарм"
 panum.650.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] посетил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] казарму в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')], где были приняты некоторые образцовые меры для предотвращения распространения кори среди молодых людей."
 panum.650.f: "«Некоторые из этих мер включали более длительную и строгую изоляцию прибывающих новобранцев, чем ранее; надзор для предотвращения скоплений в казармах, столовых, театрах и других местах; расположение соседних коек в шахматном порядке; постоянную влажную уборку и дезинфекцию полов, стен, столов, дверных ручек. Весь персонал носил халаты и марлевые маски, менял их и мыл руки с мылом, водой или дезинфицирующими средствами между контактами с пациентами, что было редкой практикой ранее. В некоторых палатах персонал был обязан носить резиновые перчатки. Пациенты помещались в индивидуальную изоляцию, с простынями, подвешенными на проволоке вокруг кровати, и были обязаны носить маски. Простыни в изоляторах периодически опрыскивали дезинфицирующими средствами. Пациентам в масках разрешалось посещать туалеты только по одному под наблюдением санитара».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')] г."
 panum.650.g: "Современные методы борьбы с корью."
 panum.651.t: "Неудачная инокуляция"
 panum.651.d: "Попытка доктора [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] иммунизировать корь с помощью процедуры, подобной вариоляции от оспы, обернулась колоссальным провалом."
 panum.651.f: "В 1757 году шотландский врач Фрэнсис Хоум обнаружил, что корь вызывается возбудителем: он передал болезнь здоровым людям, используя кровь инфицированных пациентов, и продемонстрировал, что она вызвана инфекционным агентом. Он протестировал группу из 12 детей, у 10 из которых развилась характерная умеренная лихорадочная сыпь после инкубационного периода в 6–7 дней, а двое остались незаражёнными. Этот подход был быстро оставлен из-за технических трудностей, в частности, из-за получения материала кори в нужное время для инокуляции болезни."
 panum.651.g: "Пустая трата времени."
 panum.652.t: "Полоскание горла"
 panum.652.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] опробовал[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] несколько средств для полоскания горла, которые годами рекламировались коллегами-врачами для лечения кори. Все они оказались бесполезными."
 panum.652.f: "«После последнего эксперимента у меня осталось нечто большее, чем просто горький привкус. С одной стороны, потому что даже змеиное масло имеет лучшие эффекты. С другой стороны, потому что мы терпим в нашей медицинской гильдии больше продавцов змеиного масла и шарлатанов, которых срочно нужно отсеять».\n\nДоктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName], [TimeKeeper.GetCurrentDate.Format('y')] г."
 panum.652.g: "Что вы имеете в виду, змеиное масло бесполезно?"
 panum.653.t: "Дезинфицирующий спрей"
 panum.653.d: "В одной казарме солдаты, страдающие от вспышки кори, недавно начали принимать внутрь дезинфицирующее средство. Доктор считает это глупой затеей и [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'была вынуждена', 'был вынужден')] долго их переубеждать."
 panum.653.f: "«Мы действительно должны размещать на этикетках химических и медицинских продуктов маленькие картинки, которые показывают даже самому последнему дураку, что определённо НЕ следует делать с жидкостью, спреем или другим веществом».\n\nИз письма доктора [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] доктору Анжелике Хазенбайн"
 panum.653.g: "Это ценное время, которое мы теряем в поисках лечения!"
 panum.661.t: "Принимайте витамины!"
 panum.661.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] обнаружил[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')], что приём витаминов во время заболевания корью полезен для устранения неприятных побочных эффектов."
 panum.661.f: "«Эффект витаминов хорошо известен, но в случае кори их действие меня удивило. Дети с дефицитом витамина А рискуют получить тяжёлое заболевание или даже ослепнуть. Добавки с витамином А могут укрепить общую иммунную систему, хотя и не могут вылечить болезнь».\n\nОтчёт доктора [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] Медицинскому факультету."
 panum.661.g: "Очень хорошо."
 panum.900.t: "Эпидемия дифтерии"
 panum.900.d: "В одной из наших областей вспыхнула эпидемия: в [SCOPE.sState('panum_disease_state').GetCustom('RU_SL_PP')] свирепствует #YELLOW дифтерия#!!"
 panum.900.f: "Дифтерия — острое инфекционное заболевание, которое встречается в основном у детей и вызывается инфекцией верхних дыхательных путей (дифтерия зева). Пьер Фидель Бретонно ввёл термин «дифтерия» в медицинский обиход в 1826 году как diphtherite («дифтерит»). Слово относится к тёмным псевдомембранам (кожистым коричневым отложениям в гортани и трахее), состоящим из мёртвой слизистой оболочки и компонентов крови. Дифтерия известна с древних времён; Гиппократ уже описывал эту болезнь. Дифтерия смертельна в 5–10% случаев. У детей до пяти лет и взрослых старше 40 лет смертность может достигать 20%."
 panum.900.g: "У меня тоже горло сжимается."
 panum.920.t: "Эпидемия дифтерии заканчивается"
 panum.920.d: "Тяжёлая эпидемия дифтерии, державшая нашу страну в тисках, подошла к концу. Врачи и власти дают отбой, дети снова осмеливаются выходить на улицу, пожилые люди облегчённо вздыхают."
 panum.920.f: "«В сырой холодный сезон в Кингстоне, внутреннем городе в Нью-Гэмпшире, расположенном на низкой равнине, появилось среди детей заболевание, обычно называемое „горловой лихорадкой“, самого злокачественного вида и, безусловно, самое смертоносное из когда-либо известных в этой стране». — Ноа Уэбстер"
