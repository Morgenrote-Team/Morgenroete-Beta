 panum.2007.t: "Медицинские изобретения"
 panum.2007.d: "На конгрессе стало известно, что есть специалисты, преуспевшие в медицинских инновациях. Они готовы поделиться своими знаниями."
 panum.2007.f: "Уникальные инновации в медицине, такие как трансплантация, разработка рентгеновских лучей или химиотерапия, имеют такое большое значение для человечества, что изобретатели делятся знаниями без оговорок. В конечном счёте, речь идёт о благополучии всех людей."
 panum.2007.g: "За человечество!"
 panum.2205.t: "Опыты на животных"
 panum.2205.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] считается хладнокровным учёным с определённой склонностью к жестокости. Говорят, что число животных, которых [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'она убила', 'он убил')] «на благо науки», исчисляется трёхзначными числами. Тем не менее, эти эксперименты приносят свои плоды."
 panum.2205.f: "Хотя опыты на животных на благо медицины существовали с древних времён, только в XIX веке они приобрели невиданный ранее масштаб. В частности, в ходе открытия теории микробов — и после неё — проводились многочисленные эксперименты, в которых животных сознательно заражали патогенами бесчисленное количество раз, и они буквально становились «подопытными кроликами» для новых лекарств. В этот период также широко распространилось введение опытов на животных и вивисекции в университетах для студентов."
 panum.2205.g: "Доктор волен поступать, как [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'ей', 'ему')] угодно."
 panum.2205.h: "Студенты должны учиться препарировать животных."
 panum.2205.i: "Это уже заходит слишком далеко."
 panum.2411.t: "Аспирин"
 panum.2411.d: "Наш химик, доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], изобрёл настоящее медицинское чудо, которое может произвести революцию в фармацевтике: аспирин. Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] подтвердил его обезболивающий эффект."
 panum.2411.f: "Салициловая кислота использовалась в медицине с древних времён. Лекарства из ивового дерева и других богатых салицилатами растений упоминаются на глиняных табличках из древнего Шумера и в папирусе Эберса из Древнего Египта. Гиппократ в 400 г. до н.э. упоминал использование салицилового чая для снижения температуры. Богатые салицилатами растения были частью фармакопеи западной медицины в классической античности и в Средние века. Экстракт ивовой коры стал известен в середине XVIII века благодаря своему специфическому действию на жар, боль и воспаление. В XIX веке фармацевты экспериментировали и прописывали различные химические вещества, связанные с салицином, активным компонентом ивового экстракта. В 1853 году химик Шарль Фредерик Жерар впервые обработал ацетилхлорид салицилатом натрия для получения ацетилсалициловой кислоты. В 1897 году учёные на фабриках лекарств и красок Bayer начали изучать ацетилсалициловую кислоту как менее раздражающую желудок замену обычным салицилатным препаратам и создали новый синтетический путь без примесей. К 1899 году Bayer назвала этот препарат «Аспирин» и продавала его по всему миру."
 panum.2411.g: "Это лекарство станет отправной точкой для дальнейших медицинских исследований."
 panum.2411.h: "Химия, несомненно, приведёт к ещё более впечатляющим открытиям."
 panum.2411.i: "Фармацевтическая промышленность извлечёт из этого выгоду."
 panum.2412.t: "Рентгеновские лучи"
 panum.2412.d: "Наш физик, доктор [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName], [SelectLocalization(ROOT.Var('curie_physicist_var').GetCharacter.IsFemale, 'сделала', 'сделал')] впечатляющее открытие: [SelectLocalization(ROOT.Var('curie_physicist_var').GetCharacter.IsFemale, 'она обнаружила', 'он обнаружил')] ранее неизвестные лучи, которые можно использовать для просвечивания тела. Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] подчеркнул[SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'а', '')] возможности для медицины."
 panum.2412.f: "Рентгеновские лучи — это электромагнитные волны с квантовой энергией выше 100 эВ, что соответствует длинам волн менее 10 нм. В электромагнитном спектре рентгеновские лучи находятся в диапазоне энергий выше ультрафиолетового света. Рентгеновские лучи были открыты в 1895 году немецким учёным Вильгельмом Конрадом Рентгеном, который назвал их X-излучением, чтобы обозначить неизвестный тип излучения. Рентгеновские лучи могут проникать через многие твёрдые вещества, такие как строительные материалы и живые ткани, поэтому рентгенография широко используется в медицинской диагностике (например, для проверки переломов костей) и материаловедении (например, для идентификации некоторых химических элементов и обнаружения слабых мест в конструкционных материалах)."
 panum.2412.g: "Жутко — будто видишь собственную смерть."
 panum.2413.t: "Группы крови"
 panum.2413.d: "Доктор [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('curie_physicist_var').GetCharacter.IsFemale, 'сделала', 'сделал')] поразительное открытие, которое объясняет, почему человеческая кровь иногда смешивается, а иногда сворачивается: очевидно, существуют разные группы крови. Это решающий прорыв для донорства и переливания крови."
 panum.2413.f: "«Недавно я наблюдал и констатировал, что сыворотка нормальных людей способна агглютинировать эритроциты других здоровых индивидуумов... Проще говоря, можно сказать, что в этих случаях существует по крайней мере два разных вида агглютининов, один вид в A, другой в B, оба вместе в C. Клетки, естественно, нечувствительны к агглютининам в их собственной сыворотке», — Карл Ландштейнер."
 panum.2413.g: "Исследования групп крови необходимо продвигать."
 panum.2413.h: "Клиника должна определять группы крови и собирать их для переливания."
 panum.2414.t: "Электрокардиография"
 panum.2414.d: "Доктор [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('curie_physicist_var').GetCharacter.IsFemale, 'изобрела', 'изобрёл')] удивительное устройство, которое записывает электрическую активность волокон сердечной мышцы. Врач называет его электрокардиографом — ЭКГ."
 panum.2414.f: "В 1843 году Карло Маттеуччи в ходе экспериментов на сердцах голубей понял, что сердечная деятельность основана на электрических процессах. В 1882 году физиолог Огастес Дезире Уоллер провёл первое ЭКГ на своей собаке Джимми, погрузив её четыре лапы в проводящий раствор хлорида натрия. В 1887 году он впервые смог записать сердечные токи с помощью капиллярного электрометра. Инструменты были значительно усовершенствованы в 1903 году Виллемом Эйнтховеном, который, на основе своего струнного гальванометра, разработанного в 1895 году, превратил ЭКГ в полезную диагностическую процедуру и внедрил её в клинику. Введённая им терминология используется и по сей день."
 panum.2414.g: "Это устройство должно быть в каждой больнице."
 panum.2415.t: "Первая трансплантация"
 panum.2415.d: "Доктор [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('curie_physicist_var').GetCharacter.IsFemale, 'известна', 'известен')] своим хирургическим талантом по всей стране, но недавно [SelectLocalization(ROOT.Var('curie_physicist_var').GetCharacter.IsFemale, 'она удивила', 'он удивил')] экспертов дерзкой процедурой: [SelectLocalization(ROOT.Var('curie_physicist_var').GetCharacter.IsFemale, 'она пересадила', 'он пересадил')] ткань щитовидной железы человека под кожу и в брюшную полость молодого мужчины."
 panum.2415.f: "Первой трансплантацией в современном смысле — имплантацией ткани органа с целью замены его функции — была трансплантация щитовидной железы в 1883 году. Её провёл швейцарский хирург и будущий нобелевский лауреат Теодор Кохер. В предыдущие десятилетия Кохер усовершенствовал удаление избыточной ткани щитовидной железы при зобе до такой степени, что мог удалить весь орган, не приводя к смерти пациента. Кохер проводил полное удаление органа в некоторых случаях для предотвращения рецидива зоба. В последующие годы Кохер и другие хирурги использовали трансплантацию щитовидной железы также для лечения её недостаточности, которая возникала спонтанно, без предварительного удаления органа. Трансплантация щитовидной железы стала моделью для совершенно новой терапевтической стратегии: трансплантации органов."
 panum.2415.g: "А люди-то думали, что «Франкенштейн» — это роман ужасов!"
 panum.2416.t: "Стереотаксический метод"
 panum.2416.d: "Доктор [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] настоящий хирургический гений: [SelectLocalization(ROOT.Var('curie_physicist_var').GetCharacter.IsFemale, 'она произвела', 'он произвёл')] революцию в нейрохирургии с помощью новой операции на мозге."
 panum.2416.f: "Стереотаксическая хирургия головного мозга — это малоинвазивные нейрохирургические и лучевые терапевтические процедуры, при которых голова пациента и медицинские инструменты фиксируются в прочно закреплённой раме для достижения максимальной точности. Впервые в последние годы XIX века были проведены единичные операции на открытом мозге с использованием процедуры, которая уже тогда была известна как стереотаксия. Во время процедуры тело пациента, и особенно голова, были жёстко зажаты в надёжной рамной системе. Тестирование возможностей в контексте исследовательского любопытства и психиатрической хирургии в то время было ещё очень ограниченным и простым. В последующие десятилетия инструменты и методология были усовершенствованы."
 panum.2416.g: "Блестяще!"
 panum.2417.t: "Аппарат искусственного кровообращения"
 panum.2417.d: "Разработав аппарат искусственного кровообращения, доктор Хазенбайн создал шедевр современной медицины. Скоро люди смогут без проблем переносить операции на сердце."
 panum.2417.f: "Во время искусственного кровообращения кровь покидает тело через систему канюль и трубок, обогащается кислородом и снова закачивается обратно. Это называется экстракорпоральным кровообращением. Кровь обычно идёт от полых вен или правого предсердия, а также из камер сердца и вскрытых коронарных артерий в операционной зоне и, после фильтрации, обогащения кислородом и удаления углекислого газа, а также согревания и дальнейшей фильтрации, возвращается через главную артерию или бедренную артерию. Французский физиолог Ле Галлуа опубликовал идею экстракорпорального кровообращения в 1812 году. В 1885 году Максимилиан фон Фрей и его коллега Макс фон Грубер в Лейпцигском университете построили предшественника современных аппаратов искусственного кровообращения с плёночным оксигенатором и поршневым насосом для первого использования кровообращения в закрытой экстракорпоральной системе."
 panum.2417.g: "Это рождение современной кардиохирургии!"
 panum.2418.t: "Эндоскоп"
 panum.2418.d: "Доктор [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] может оказать неоценимую помощь в медицинских обследованиях, своим новым изобретением — его можно использовать для осмотра тела изнутри!"
 panum.2418.f: "Эндоскоп — это устройство, которое можно использовать для исследования и манипуляций внутри организмов или технических полостей. Использование эндоскопа, известное как эндоскопия, изначально было разработано для медицинской диагностики человека. После изобретения Томаса Эдисона использование электрического света стало важным шагом в усовершенствовании эндоскопа. Первые такие светильники были внешними, хотя и обеспечивали достаточное освещение для проведения цистоскопии, гистероскопии и сигмоидоскопии, а также для обследования носовых (а позже и грудных) полостей, что уже в 1865 году рутинно выполнял сэр Фрэнсис Круз (используя свой собственный коммерчески доступный эндоскоп) на пациентах в больнице Mater Misericordiae в Дублине, Ирландия."
 panum.2418.g: "Полезное медицинское устройство."
 panum.2419.t: "Офтальмоскоп"
 panum.2419.d: "Доктор [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('curie_physicist_var').GetCharacter.IsFemale, 'изобрела', 'изобрёл')] аппарат, который облегчает обследование глазных болезней и тем самым оказал[SelectLocalization(ROOT.Var('curie_physicist_var').GetCharacter.IsFemale, 'а', '')] неоценимую услугу офтальмологии."
 panum.2419.f: "Офтальмоскопия или фундоскопия — это осмотр видимых частей глаза, проводимый с помощью офтальмоскопа. В частности, можно исследовать сетчатку и питающие её кровеносные сосуды. Офтальмоскоп, изобретённый в 1850 году, был впервые описан его изобретателем Германом фон Гельмгольцем в начале октября 1851 года. С помощью офтальмоскопа можно выявлять заболевания зрительного нерва, сетчатки, сосудистой оболочки и стекловидного тела. Это ознаменовало начало истории офтальмологии как самостоятельной медицинской и научной дисциплины. После этого офтальмоскоп стал всё более важным для диагностики внутренних болезней."
 panum.2419.g: "Интересное медицинское устройство."
 panum.2420.t: "Химиотерапия"
 panum.2420.d: "Новая медицинская процедура, которую в настоящее время тестирует доктор [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName], может дать проблеск надежды многим больным — даже рак станет если не излечимым, то хотя бы частично поддающимся лечению."
 panum.2420.f: "Химиотерапия — это медикаментозное лечение рака или инфекций. Пауль Эрлих использовал термин «химиотерапия» для описания лечения инфекционных заболеваний химическими веществами, которые действуют непосредственно против возбудителя. В 1904 году он открыл трипановый красный как первое эффективное химиотерапевтическое средство, которое он использовал для лечения мышей, страдающих сонной болезнью. Эрлих начал дальнейшие эксперименты 31 августа 1909 года во Франкфурте-на-Майне, вводя возбудителей сифилиса крысам, а затем леча их с помощью химиотерапевтических процедур. Эти эксперименты имели такой убедительный эффект, что их стали рассматривать как новое «оружие» медицины против инфекционных заболеваний. Впоследствии Эрлиха назвали «создателем химиотерапии». Используемые препараты либо производятся искусственно, либо являются производными природных веществ."
 panum.2420.g: "Может ли это стать ответом на страдания онкологических больных?"
 panum.2100.t: "Наём врача"
 panum.2100.d: "Один из самых многообещающих врачей в Главном госпитале — [SCOPE.sCharacter('panum_new_physician_scope').GetFullName]. [SelectLocalization(SCOPE.sCharacter('panum_new_physician_scope').IsFemale, 'Она была', 'Он был')] бы отличным кандидатом на должность нового главного врача. [SelectLocalization(SCOPE.sCharacter('panum_new_physician_scope').IsFemale, 'Её', 'Его')] специальность..."
 panum.2100.f: "$concept_panum_physician_desc$\n\nНовый #V врач#!, [SCOPE.sCharacter('panum_new_physician_scope').GetFullName], — это #tooltip:[SCOPE.sCharacter('panum_new_physician_scope').GetTooltipTag],panum_physician_rating_tt_loc [SCOPE.sCharacter('panum_new_physician_scope').GetCustom('panum_physician_rating_new_physician_icon_text_type')]#! [concept_panum_physician|l].[GetPlayer.GetCustom('panum_physician_rating_display_existing_physician_type')]"
 panum.2100.g: "Эпидемиология."
 panum.2100.h: "Хирургия."
 panum.2100.i: "Психиатрия."
 panum.2100.j: "Военная медицина."
 panum_cholera_condition: "Холера"
 panum_cholera_condition_desc: "Холера — опасное заболевание тонкого кишечника. Она считается определяющей эпидемией XIX века, унёсшей миллионы жизней по всему миру."
 panum_tuberculosis_condition: "Туберкулёз"
 panum_tuberculosis_condition_desc: "Туберкулёз считается, наряду с холерой, одной из самых распространённых причин смерти в викторианскую эпоху. Также известный как чахотка, он в первую очередь поражает лёгкие."
 panum_smallpox_condition: "Оспа"
 panum_smallpox_condition_desc: "Известная своими пустулами, которые обезображивают лицо и тело, оспа долгое время была одной из самых смертоносных болезней в истории."
 panum_typhus_condition: "Тиф"
 panum_typhus_condition_desc: "Тиф на протяжении веков наводил ужас на солдат, особенно во время Наполеоновских войн, когда он унёс жизни тысяч военнослужащих. Он снова и снова свирепствовал после стихийных бедствий."
 panum_yellow_fever_condition: "Жёлтая лихорадка"
 panum_yellow_fever_condition_desc: "Жёлтая лихорадка в основном поражает тропические районы Южной Америки и Африки. В Карибском бассейне эта болезнь унесла больше жизней среди расквартированных солдат, чем любая война."
 panum_measles_condition: "Корь"
 panum_measles_condition_desc: "Корь — высококонтагиозное заболевание, известное своей типичной красной кожной сыпью. Она может иметь катастрофические последствия, особенно для населения, не имеющего предварительного иммунитета."
 panum_scarlet_condition: "Скарлатина"
 panum_scarlet_condition_desc: "Скарлатина — распространённое заболевание, которое до начала XX века было одной из самых частых причин смерти среди детей."
 panum_plague_condition: "Чума"
 panum_plague_condition_desc: "Бубонная чума отождествляется с «чёрной смертью» Средневековья, одной из худших катастроф в истории. Название происходит от опухших, болезненных бубонов."
 panum_diphteria_condition: "Дифтерия"
 panum_diphteria_condition_desc: "Дифтерия — опасное заболевание, которое может привести к опасным для жизни осложнениям и долгосрочным последствиям."
 panum_polio_condition: "Полиомиелит"
 panum_polio_condition_desc: "Полиомиелит — это заболевание, которое в первую очередь поражает детей, часто приводя к смерти или пожизненным физическим осложнениям."
