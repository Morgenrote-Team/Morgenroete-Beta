 manzoni_writer_poem_bestseller_title_1_loc: "Шёпот осеннего ветра"
 manzoni_writer_poem_bestseller_title_2_loc: "Под нежным взором луны"
 manzoni_writer_poem_bestseller_title_3_loc: "Одинокая тропа на рассвете"
 manzoni_writer_poem_bestseller_title_4_loc: "Безмолвные отголоски забытых снов"
 manzoni_writer_poem_bestseller_title_5_loc: "Под тайную песнь ручья"
 manzoni_writer_poem_bestseller_title_6_loc: "Когда тени танцуют в сумерках"
 manzoni_writer_poem_bestseller_title_7_loc: "Сердце, сплетённое с далёкими звёздами"
 manzoni_writer_poem_bestseller_title_8_loc: "Роза, что расцвела на дыхании зимы"
 manzoni_writer_poem_bestseller_title_9_loc: "Отголоски из глубин времён"
 manzoni_writer_poem_bestseller_title_10_loc: "В саду увядших воспоминаний"
 manzoni_writer_poem_bestseller_title_11_loc: "Под сенью плакучей ивы"
 manzoni_writer_poem_bestseller_title_12_loc: "Нежный зов утреннего света"
 manzoni_writer_poem_bestseller_title_13_loc: "Когда море встречается с вечерним небом"
 manzoni_writer_poem_bestseller_title_14_loc: "Песня для странствующей души"
 manzoni_writer_poem_bestseller_title_15_loc: "Где шепчутся полевые цветы"
 manzoni.2600.t: "«Лев Фландрии, или Битва золотых шпор»"
 manzoni.2600.d: "«Лев Фландрии, или Битва золотых шпор», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Это исторический роман, посвящённый битве при Куртре, в которой фландрское ополчение победило французские силы вторжения. Книга считается фламандским национальным эпосом."
 manzoni.2600.f: "«Ты, фламандец, прочитавший эту книгу, задумайся, через славные деяния, которые она повествует, о том, чем была Фландрия когда-то, чем она является сейчас, и тем более, чем она станет, если ты забудешь священные примеры своих предков!»\n— Хендрик Консианс, «Лев Фландрии, или Битва золотых шпор»"
 manzoni.2600.g: "За Фландрию!"
 manzoni.1601.t: "«Красная комната»"
 manzoni.1601.d: "«Красная комната» — это критика шведского общества, автор которой [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. В ней идеалистический государственный служащий Арвид Фальк становится писателем и вступает в конфликт со своим консервативным братом Карлом Николаусом Фальком. Стокгольмское общество изображено сатирически."
 manzoni.1601.f: "«...как только произведение искусства становится практически полезным, выдаёт цель или тенденцию, его красота исчезает».\n— Август Стриндберг, «Красная комната»"
 manzoni.1601.g: "Общество должно измениться!"
 manzoni.1602.t: "«Подойдёт»"
 manzoni.1602.d: "«Подойдёт», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Это атака  на пожизненный брак, как институт и неспособность женщин стать финансово независимыми. В романе сержант Альберт влюбляется в Сару Видебек, дочь стекольщика, во время поездки на пароходе между Стокгольмом и Лидчёпингом. Сара заинтересована, но предлагает эгалитарный брак без официальной свадебной церемонии и без совместного имущества. Роман заканчивается её вопросом: «Всё это подойдёт, Альберт?», и его ответом: «Подойдёт»."
 manzoni.1602.f: "«...тот, кто хочет резать стекло, милорд, должен иметь алмаз!»\n— Карл Юнас Луве Альмквист, «Подойдёт»"
 manzoni.1602.g: "Подойдёт!"
 manzoni.1603.t: "«Деньги»"
 manzoni.1603.d: "«Деньги», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Это критика современных законов о браке. Книга рассказывает о Сельме с шестнадцати до двадцати трёх лет. За это время она превращается из живой молодой девушки с художественными мечтами в закалённую женщину, для которой единственной целью является свобода. В шестнадцать лет Сельма выходит замуж за гораздо более старшего Поля Кристерссона, богатого человека, который заработал своё состояние тяжёлым трудом, в основном потому, что она убеждена, что он хорошая партия в финансовом плане. Однако она никогда не испытывает к нему любви и, кажется, постепенно забывает, что такое любовь. Её муж описывается как «бритая свинья». За годы их брака она начинает осознавать все недостатки их отношений, а также более широкие общественные проблемы, касающиеся положения женщин, их отсутствия юридической самостоятельности и их прав."
 manzoni.1603.f: "«...её самообман сотворил искажённый образ, очень похожий на счастье».\n— Виктория Бенедиктссон, «Деньги»"
 manzoni.1603.g: "Свободу Сельме!"
 manzoni.1604.t: "«Герта»"
 manzoni.1604.d: "«Герта», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Это роман, выступающий за юридическую самостоятельность женщин и доступ к образованию. Главная героиня романа, своевольная молодая женщина Герта, живёт в доме, где доминирует тиранический отец. Они живут в патриархальном маленьком городке под названием Кунгшёпинг — миниатюрной версии Швеции. Однажды ночью вспыхивает пожар, угрожающий уничтожить весь город. Пожар становится событием, которое раскрывает истинные лица жителей и обнажает узколобость шведского общества. Однако во время спасательных работ впервые женщины и мужчины города, богатые и бедные, работают бок о бок. Старое сгорело, и можно построить что-то новое. Герта становится движущей силой, и в новой реальности города после пожара женщинам обещана центральная роль."
 manzoni.1604.f: "«...я бы, конечно, хотела выйти замуж сегодня вечером, если бы только могла стать вдовой к завтрашнему дню!»\n— Фредрика Бремер, «Герта»"
 manzoni.1604.g: "Сжечь всё дотла!"
 manzoni.1605.t: "«Брызги и пятна»"
 manzoni.1605.d: "«Брызги и пятна» — это сборник стихов [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Эротическое любовное стихотворение «Утренний сон», представленное в сборнике, многослойно. В своей основе оно служит критикой взглядов эпохи — особенно церкви — на мораль, наготу и сексуальность."
 manzoni.1605.f: "«...она лежала обнажённая, неприкрытая в потребностях своей красоты, и с разведёнными коленями и трепещущим ядром, она вновь встретила томление своего возлюбленного».\n— Густаф Фрёдинг, «Брызги и пятна»"
 manzoni.1605.g: "Подвергнуть цензуре!"
 manzoni.1606.t: "«В новогодний день»"
 manzoni.1606.d: "«В новогодний день» — это короткое, выразительное стихотворение, автор которого [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Его называют боевым гимном для убеждённых индивидуалистов."
 manzoni.1606.f: "«Один в хрупком судне, моряк осмеливается отправиться в огромное море...»\n— Эрик Густав Гейер, «В новогодний день»"
 manzoni.1606.g: "Вперёд! - таков приказ его судьбы"
 manzoni.1607.t: "«Спокойной ночи, земля»"
 manzoni.1607.d: "«Спокойной ночи, земля», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Это коллективный роман  изображающий жизнь крофтеров в поместье в Сёдерманланде — ежедневный труд и бедное окружение, подавленное томление и бесхитростная радость. Из кипучего коллектива с поразительной интимностью вырисовывается ряд индивидуальных жизненных историй. Вокруг них всех витает аромат пейзажа Сёдерманланда, пышного дубами и яркого маками."
 manzoni.1607.f: "«Говорят, что листья подорожника в основном встречаются на тропинках, где их топчут. То же самое можно сказать и о крофтерах».\n— Ивар-Лу Юханссон, «Спокойной ночи, земля»"
 manzoni.1607.g: "Спокойной ночи!"
 manzoni.1608.t: "«Палач»"
 manzoni.1608.d: "«Палач» — это роман, автор которого [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. История разворачивается в двух временных линиях: в Средние века и в настоящем. Общей нитью между двумя частями является место действия, таверна, и палач, который присутствует в обоих разделах. Книга завершается речью палача к гостям, в которой он выражает свой мрачный взгляд на человечество."
 manzoni.1608.f: "«Насилие — это высшее выражение как физических, так и духовных сил человечества».\n— Пер Лагерквист, «Палач»"
 manzoni.1608.g: "Ужас!"
 manzoni.1609.t: "«Крапива цветёт»"
 manzoni.1609.d: "«Крапива цветёт» — это частично автобиографический роман, который написал[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'а', '')] [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Книга рассказывает историю ребёнка-сироты Мартина, который является альтер-эго автора, и написана с точки зрения ребёнка. Отец Мартина умирает, а его мать оставляет своих детей ради новой жизни в Калифорнии. Всё, что ему дорого, исчезает в очень раннем возрасте, и он растёт, работая на нескольких фермах и будучи либо отосланным, либо уходящим сам, поскольку он сталкивается с суровой трудовой жизнью батрака. Мартин описывается как эгоистичный, глупый, инфантильный, жалеющий себя, подобострастный, трусливый и лживый. Таким образом, идеализации ребёнка нет."
 manzoni.1609.f: "«Он слишком много думал, но слишком мало понимал».\n— Харри Мартинсон, «Крапива цветёт»"
 manzoni.1609.g: "Бедный ребёнок"
 manzoni.1610.t: "«Мать выходит замуж»"
 manzoni.1610.d: "«Мать выходит замуж» — это частично автобиографический роман, который написал[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'а', '')] [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Книга рассказывает историю семилетней Мии, которая слишком хорошо понимает мир, и в то же время ничего не понимает. Она не может понять, почему её мать хочет выйти замуж за красивого, но безнадёжного мужчину, который пьёт, дерётся и изменяет? Её мать трудится ради хлеба насущного и обеспечивает, чтобы жизнь в продуваемых съёмных комнатах была сносной. Жизнь в этой семье становится чередой болезненных и унизительных отъездов, где Миа постепенно формируется в классовом обществе. Она мечтает о тихом доме с голубыми цветами на меловой стене печи, но обнаруживает, что в мире нет места для всех мечтаний — и едва ли даже места для жизни для многих."
 manzoni.1610.f: "«Когда горе overwhelming и стремится уничтожить человека, мёртвые восстают из могил, чтобы протянуть руку помощи».\n— Муа Мартинсон, «Мать выходит замуж»"
 manzoni.1610.g: "Действительно радостный брак"
 manzoni.1611.t: "«Раскенс»"
 manzoni.1611.d: "«Раскенс», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Действие происходит во второй половине XIX века на юго-востоке Смоланда. История повествует о Густаве, бедном батраке, который вступает в систему наделения землёй как солдат. Получив солдатский крофт и имя Раск, он женится на Иде, служанке, также живущей в бедности. Роман изображает их борьбу и упорство на крофте, предлагая яркий исторический отчёт о жизни в Швеции."
 manzoni.1611.f: "«Ну, давай! Я могу драться с тобой восемь дней, даже не снимая жилета».\n— Вильгельм Моберг, «Раскенс»"
 manzoni.1611.g: "Проклятая царапающаяся кошка!"
 manzoni.1612.t: "«Доктор Глас»"
 manzoni.1612.d: "«Доктор Глас», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Это эпистолярный роман, рассказывающий историю врача в Швеции XIX века, который сталкивается с моральными и любовными проблемами. Роман повествует о докторе Тюко Габриэле Гласе, уважаемом враче в Стокгольме. История рассказана в форме дневника и следует за доктором Гласом, когда он борется с депрессией. Антагонистом является преподобный Грегориус, морально разложившийся священнослужитель. Красивая молодая жена Грегориуса доверяет доктору Гласу, что её сексуальная жизнь делает её несчастной, и просит его о помощи. Глас влюбляется в неё и соглашается помочь, хотя у неё уже есть другой любовник. Он пытается вмешаться, но преподобный отказывается отказаться от своих «супружеских прав» — она должна заниматься с ним сексом, нравится ей это или нет. Итак, чтобы сделать свою возлюбленную счастливой, он начинает замышлять убийство её мужа."
 manzoni.1612.f: "«Хочется быть любимым, а если не получается — то чтобы тобой восхищались, а если не получается — то чтобы тебя боялись, а если не получается — то чтобы тебя ненавидели и презирали».\n— Яльмар Сёдерберг, «Доктор Глас»"
 manzoni.1612.g: "Принесите мне цианистый калий!"
 manzoni.1613.t: "«Сингоалла»"
 manzoni.1613.d: "«Сингоалла», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Действие происходит в средневековой Швеции, это романтическая и историческая повесть, в которой смешаны элементы приключений, трагедии и фольклора. История сосредоточена на Сингоалле, красивой и загадочной цыганке, и Йёране, дворянине, который влюбляется в неё. Роман разворачивается во времена политических интриг, где любовь Сингоаллы и Йёрана переплетается с конфликтом между социальными классами, силами судьбы и личными желаниями."
 manzoni.1613.f: "«Иди! Прочь! Иди к своему чужаку!»\n— Виктор Рюдберг, «Сингоалла»"
 manzoni.1613.g: "Так романтично!"
 manzoni.1614.t: "«Новые стихи»"
 manzoni.1614.d: "«Новые стихи», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Сборник стихов, охватывающий темы шведской истории, природы и национальной идентичности. Этот сборник часто рассматривается как принятие поэтом романтического национализма, где он сосредотачивается на красоте и силе шведского народа и его наследия. Здесь явно прослеживается акцент на почитании прошлого и праздновании наследия страны, а также на размышлениях о будущем."
 manzoni.1614.f: "«Прекраснее слушать струну, что порвалась, чем никогда не натягивать лук».\n— Вернер фон Хейденстам, «Новые стихи»"
 manzoni.1614.g: "Какая гордая история!"
 manzoni.1504.t: "«Приключения Тома Сойера»"
 manzoni.1504.d: "Вдоль берегов реки Миссисипи озорной мальчик по имени Том Сойер и его лучший друг, Гек Финн, пускаются в захватывающие авантюры, включая шалости, поиски сокровищ и даже становятся свидетелями убийства. На протяжении своих приключений Том усваивает важные жизненные уроки о дружбе, морали и ответственности."
 manzoni.1504.f: "«Работа — это то, что человек обязан делать, а игра — это то, что человек не обязан делать».\n— Сэмюэл «Марк Твен» Клеменс, «Приключения Тома Сойера»"
 manzoni.1504.g: "Маленький негодник!"
