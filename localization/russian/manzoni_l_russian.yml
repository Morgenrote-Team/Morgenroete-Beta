 manzoni_writer_masterpiece_newspaper_report_desc_loc: "[GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetFullName] написал[SelectLocalization(GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.IsFemale, 'а', '')] в газете потрясающую статью, которая привлекла внимание каждого читателя. Только из-за этой статьи газета была распродана менее чем за час."
 manzoni_writer_good_newspaper_report_desc_loc: "[GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetFullName] опубликовал[SelectLocalization(GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.IsFemale, 'а', '')] в газете новый репортаж, который оказался довольно увлекательным и интересным."
 manzoni_writer_mediocre_newspaper_report_desc_loc: "[GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetFullName] написал[SelectLocalization(GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.IsFemale, 'а', '')] новую статью, которая ничем особенным не выделяется, но и не ужасна. Это достойное произведение журналистики, но оно скоро будет забыто."
 manzoni_writer_bad_newspaper_report_desc_loc: "Удивительно, что хоть какая-то газета опубликовала статью [GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetFullName], но, похоже, некоторые газеты считают себя туалетной бумагой. Как бы то ни было, статья ужасна и едва читаема."
 manzoni_rotary_press_tech: "Ротационная печатная машина"
 manzoni_rotary_press_tech_desc: "Вращая цилиндрически изогнутую печатную форму и подавая под неё бумагу, можно печатать на гораздо более высоких скоростях, чем это было возможно ранее."
