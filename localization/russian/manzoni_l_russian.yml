 manzoni_je_pro_government_newspaper: "Проправительственная газета"
 manzoni_je_pro_government_newspaper_reason: "Четвёртая власть существует для контроля над правительством. Однако часто случалось, что определённый придворный характер репортажей приводил к слишком тесным отношениям между властью и журналистами. Это может быть прискорбно для репортажей и свободы прессы, но кто хочет, чтобы его беспокоили неприятные новости?\n\n«Проправительственная газета» срабатывает, когда [Concept('concept_executive', 'директор')] издательской компании принадлежит к [Concept('concept_interest_group', 'заинтересованной группе')], которая #G входит в состав правительства#!. Тогда он занимается проправительственными статьями."
 manzoni_has_publisher_ig_in_government_tt: "[Concept('concept_interest_group', 'Заинтересованная группа')], к которой принадлежит [Concept('concept_executive', 'директор')] издательской компании, находится в #G правительстве#!."
 manzoni_has_publishing_company_tt: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть издательская [Concept('concept_company', 'компания')].#!"
 manzoni_has_penny_press_tt: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть $building_manzoni_publishing_industry$, в которых $manzoni_pm_penny_press$."
 manzoni_je_freedom_of_the_press: "Свобода прессы"
 manzoni_je_freedom_of_the_press_reason: "Движимые неудержимой волей провозглашать правду — или просто потому, что их собственная политическая партия не у власти, — издатели не раз бросали вызов государству. В такие времена свобода прессы важна как никогда.\n\n«Свобода прессы» срабатывает, когда [Concept('concept_executive', 'директор')] издательской компании принадлежит к [Concept('concept_interest_group', 'заинтересованной группе')], которая #R не входит в состав правительства#!. Тогда он занимается оппозиционной работой."
 manzoni_has_publisher_ig_in_opposition_tt: "[Concept('concept_interest_group', 'Заинтересованная группа')], к которой принадлежит [Concept('concept_executive', 'директор')] издательской компании, находится в #R оппозиции#!."
