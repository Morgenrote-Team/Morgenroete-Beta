 manzoni.711.t: "Хвала #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_1').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_1').GetCustom('RU_IG_DP')]#!#"
 manzoni.711.d: "Газета, принадлежащая издательской империи, владелец которой [SCOPE.sCharacter('target_character_1').GetFullName], особо выделила и похвалила усилия #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_1').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_1').GetCustom('RU_IG_RP')]#!# в управлении. Неслучайно [SCOPE.sCharacter('target_character_1').GetLastName] сам[SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'а', '')] принадлежит к этой [Concept('concept_interest_group', 'заинтересованной группе')]."
 manzoni.711.f: "«Пресса подобна женщине: возвышенна, когда лжёт, она не отпустит, пока не заставит вас поверить ей. Публика, как глупый муж, всегда поддаётся». — Оноре де Бальзак"
 manzoni.711.g: "Статью следует распространить как можно шире!"
 manzoni.711.h: "Это отвратительная попытка подхалимства."
 manzoni.712.t: "Деликатный союз"
 manzoni.712.d: "[SCOPE.sCharacter('target_character_1').GetFullName] уже привлек[SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'ла', '')] внимание своим недавним браком. Теперь выяснилось, что [SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'её', 'его')] супруг является членом семьи [SCOPE.sCharacter('target_character_2').GetLastNameNoFormatting]. [SCOPE.sCharacter('target_character_2').GetFullName] - лидер #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_1').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_1').GetCustom('RU_IG_RP')]#!#. Это поднимает вопросы о независимости газеты — её связях с правительством и истинной власти империи [SCOPE.sCharacter('target_character_1').GetLastName]."
 manzoni.712.f: "Когда стало известно, что жена министра финансов работает в газете, которая также входит в издательский дом [SCOPE.sCharacter('target_character_1').GetLastName], некоторые чиновники задумались о том, что они сделали не так в жизни — и не нашли лучших партий."
 manzoni.712.g: "Любовь зла!"
 manzoni.712.h: "Это развитие, достойное критики."
 manzoni.713.t: "Правительственная пропаганда"
 manzoni.713.d: "В одном регионе [SCOPE.sCharacter('target_character_1').GetFullName] стал такой доминирующей силой в повседневной жизни, что практически вся информация о текущих событиях предоставляется исключительно [SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'её', 'его')] средствами массовой информации. Фактически, [SCOPE.sCharacter('target_character_1').GetLastName] может диктовать, что является правдой. К счастью, эти репортажи проправительственные."
 manzoni.713.f: "«Я — пресса». — [SCOPE.sCharacter('target_character_1').GetFullNameNoFormatting]"
 manzoni.713.g: "Зачем цензура, если пресса работает на правительство?"
 manzoni.714.t: "Незаметные субсидии"
 manzoni.714.d: "[SCOPE.sCharacter('target_character_1').GetFullName] годами получал скрытые субсидии из государственной казны. Правительство покупает дружественную прессу. Посредником является однопартиец, [SCOPE.sCharacter('target_character_2').GetFullName]. Это дело подорвало доверие к прессе."
 manzoni.714.f: "«Я встречаю журналистов в театральных фойе; меня бросает в дрожь при их виде. Журналистика — это ад, бездонная яма беззакония, предательства и лжи; никто не может пройти через неё незапятнанным, если только, как Данте, его не защищает священный лавр Вергилия». — Оноре де Бальзак"
 manzoni.714.g: "Сотрудничество идёт хорошо, в чём дело?"
 manzoni.714.h: "Это сотрудничество между прессой и государством должно прекратиться!"
 manzoni.721.t: "[SCOPE.gsInterestGroup('target_ig_2').GetName] под прицелом"
 manzoni.721.d: "[SCOPE.sCharacter('target_character_1').GetFullName] поручил[SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'а', '')] своей газете нацелиться на #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_2').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_2').GetCustom('RU_IG_VP')]#!#, которая в настоящее время занимает министерские посты в правительстве. [SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'Она', 'Он')] развернул[SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'а', '')] настоящую охоту на ведьм, и газеты продаются лучше с каждым сенсационным заголовком."
 manzoni.721.f: "«Кто вмешивается в почтовые индексы?\nКто строит козни на железных дорогах?\nКто шепчет „Правду“ за веером,\nИ ставит под сомнение корону, церковь и человека?\n[SCOPE.gsInterestGroup('target_ig_2').GetName] Учёные вредители!\nОни никогда не прекращают своих тщетных протестов!»"
 manzoni.721.g: "Ложь! Ничего кроме лжи!"
 manzoni.721.h: "Эта статья не будет перепечатана."
 manzoni.721.i: "Но если так говорит газета?"
 manzoni.722.t: "Голос оппозиции"
 manzoni.722.d: "Используя свою медийную мощь, [SCOPE.sCharacter('target_character_1').GetFullName] похвалил[SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'а', '')] #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_1').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_1').GetCustom('RU_IG_VP')]#!# во влиятельной статье. Связанная с ним медиаимперия уже подхватила тон и бьёт в барабаны пропаганды."
 manzoni.722.f: "«Журналистика, далеко не находясь в руках жречества, сначала стала партийным оружием, а затем коммерческой спекуляцией, ведущейся без совести и скрупулёзности, как и другие коммерческие спекуляции. Каждая газета, как говорит Блонде, — это лавка, куда люди приходят за мнениями нужного оттенка. Если бы существовала газета для горбунов, она бы ясно излагала, утром и вечером, в своих колонках, красоту, полезность и необходимость уродства». — Оноре де Бальзак"
 manzoni.722.g: "Какое нам дело до этой дешёвой пропаганды?"
 manzoni.722.h: "Профинансировать опровержение в сочувствующей нам газете."
 manzoni.723.t: "[SCOPE.sCharacter('target_character_2').GetLastName]: Дело"
 manzoni.723.d: "[SCOPE.sCharacter('target_character_1').GetFullName] спровоцировал[SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'а', '')] национальный кризис большой редакционной статьёй в сочетании с журналистскими расследованиями: похоже, [SCOPE.sCharacter('target_character_2').GetFullName] присвоил[SelectLocalization(SCOPE.sCharacter('target_character_2').IsFemale, 'а', '')] средства. Общественность возмущена растратой налогов, правительство скатывается в кризис, #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_2').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_2').GetCustom('RU_IG_VP')]#!# охватила паника, а издательский дом [SCOPE.sCharacter('target_character_1').GetLastName] процветает как никогда."
 manzoni.723.f: "[SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'Её', 'Его')] недооценили. Годами [SCOPE.sCharacter('target_character_1').GetLastName] считался просто очередным издателем. Но [SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'её', 'его')] амбиции увеличить влияние #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_1').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_1').GetCustom('RU_IG_RP')]#!# и сместить с поста правительство, которое [SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'она', 'он')] презирал[SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'а', '')], приносят плоды. В течение нескольких месяцев [SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'она', 'он')] направлял[SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'а', '')] своих лучших журналистов на правительственные учреждения и чиновников, чтобы разоблачить исторический скандал с хищениями. Даже бывшие критики вынуждены признать, что это было блестящее журналистское расследование, которое ещё долгие годы будет приносить пользу коллегам. Однако для членов государства и правительства эта атака имеет неисчислимые последствия. Говорят об отставке, перестановках в правительстве и даже о возможных новых выборах."
 manzoni.723.g: "Это просто пропаганда оппозиции!"
 manzoni.723.h: "Отставка давно назрела."
 manzoni.723.i: "Переформировать весь кабинет."
 manzoni.723.j: "Пусть народ решает на выборах!"
 manzoni.731.t: "Тираж любой ценой"
 manzoni.731.d: "[SCOPE.sCharacter('target_character_1').GetFullName] твёрдо убежден[SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'а', '')], что тираж падает только потому, что [SelectLocalization(SCOPE.sCharacter('target_character_1').IsFemale, 'её', 'его')] журнал недостаточно бульварный."
 manzoni.731.f: "«Мне кажется, мы потеряли связь с простыми людьми. Мы не можем отсиживаться в башне из слоновой кости. Нам нужно снова нарастить темп. Нам нужны короткие, быстрые материалы — максимум три-четыре абзаца. Больше огня! ОГНЯ! Больше статей с поножовщиной — кровь должна хлестать!» — [SCOPE.sCharacter('target_character_1').GetFullNameNoFormatting]"
 manzoni.731.g: "О ДА!"
 manzoni.731.h: "Разве не существует хоть какой-то журналистской этики?"
