 notification_manzoni_book_license_notification_name: "Иностранный издатель приобретает книжную лицензию"
 notification_manzoni_book_license_notification_desc: "Иностранный издатель приобрёл книжную лицензию. Мы получаем #G 10#! [Concept('concept_manzoni_literary_tradition', 'литературной традиции')] и [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] получает #G 20#! #V [Concept('concept_artists_experience', 'репутации')]#!."
 notification_manzoni_anthology_meets_taste_notification_name: "Популярная антология"
 notification_manzoni_anthology_meets_taste_notification_desc: "Наш [Concept('concept_manzoni_national_writer', 'национальный писатель')] своим сборником стихов попал во [Concept('concept_manzoni_popular_taste', 'вкус публики')]. Мы получаем #G 30#! [Concept('concept_manzoni_literary_tradition', 'литературной традиции')] и [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] получает #G 50#! #V [Concept('concept_artists_experience', 'репутации')]#!."
 notification_manzoni_anthology_close_taste_notification_name: "Новая антология"
 notification_manzoni_anthology_close_taste_notification_desc: "Наш [Concept('concept_manzoni_national_writer', 'национальный писатель')] опубликовал новый сборник стихов, который привлёк внимание критиков. Мы получаем #G 15#! [Concept('concept_manzoni_literary_tradition', 'литературной традиции')] и [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] получает #G 25#! #V [Concept('concept_artists_experience', 'репутации')]#!."
 notification_manzoni_anthology_no_taste_notification_name: "Незамеченная антология"
 notification_manzoni_anthology_no_taste_notification_desc: "Наш [Concept('concept_manzoni_national_writer', 'национальный писатель')] не смог убедить публику своим новым сборником стихов. Мы получаем #G 5#! [Concept('concept_manzoni_literary_tradition', 'литературной традиции')] и [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] получает #G 10#! #V [Concept('concept_artists_experience', 'репутации')]#!."
 manzoni.1001.t: "«Хоббит, или Туда и обратно»"
 manzoni.1001.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] создал[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'а', '')] историю, которая быстро стала [Concept('concept_manzoni_bestseller', 'бестселлером')]. История, посвящённая приключениям хоббита, разворачивается в фантастическом мире, созданном [SCOPE.sCharacter('manzoni_writer_scope').GetLastName]. Надеемся, [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'она', 'он')] напишет больше книг об этом мире под названием Средиземье!"
 manzoni.1001.f: "«В норе под землёй жил-был хоббит. Не в какой-то там мерзкой, грязной, сырой норе, где со всех сторон торчат хвосты червей и пахнет плесенью, но и не в сухой песчаной норе, где не на что присесть и нечего съесть: это была нора хоббита, а значит — благоустроенная нора».\n— Дж. Р. Р. Толкин, «Хоббит, или Туда и обратно»"
 manzoni.1001.g: "Какой удивительный мир [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'она', 'он')] создал[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'а', '')]!"
 manzoni.1002.t: "«Война миров»"
 manzoni.1002.d: "«Война миров» [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] — это научно-фантастическая история о вторжении пришельцев на Землю. Переживите разрушение и страдания, причинённые пришельцами в их трёхногих боевых машинах. Выстоит ли человечество или будет уничтожено марсианами?"
 manzoni.1002.f: "«Это не война, — сказал артиллерист. — Это никогда не было войной, так же как нет войны между человеком и муравьями».\n— Г. Уэллс, «Война миров»"
 manzoni.1002.g: "Неужели там действительно есть инопланетные захватчики?"
 manzoni.1100.t: "«Хайди»"
 manzoni.1100.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] опубликовал[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'а', '')] историю о маленькой девочке-сироте, живущей со своим дедушкой в Альпах. Книга под названием «Годы учения и странствий Хайди» показывает, как Хайди сближается со своим дедушкой, и они наслаждаются совместной жизнью. Но вскоре их разлучают, так как Хайди должна переехать во Франкфурт-на-Майне, чтобы жить с Кларой Штреземан — дочерью бизнесмена. Увидит ли она когда-нибудь снова своего дедушку?"
 manzoni.1100.f: "«Я хочу бегать, как легконогие козы».\n— Иоганна Шпири, «Годы учения и странствий Хайди»"
 manzoni.1101.t: "«Платье делает человека»"
 manzoni.1101.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] — не безызвестный писатель. Он опубликовал такие произведения, как «Зелёный Генрих» и «Люди из Зельдвилы». Его новейшая история «Платье делает человека» — это один из рассказов второй части «Людей из Зельдвилы». Подмастерье-портной, которому не заплатил его работодатель, по дороге подбирает карета. Когда он прибывает в деревню Гольдах, люди принимают его за знатного человека, потому что он приехал в карете, носит роскошную одежду и у него ухоженные усы. Будучи довольно застенчивым, он не проясняет недоразумение. Узнают ли люди о его секрете?"
 manzoni.1101.f: "«Когда князь захватывает землю и людей, когда священник представляет учение своей церкви без убеждения, но с достоинством потребляет плоды своего синекуры, когда тщеславный учитель пользуется почестями и благами своей образовательной должности, ни на йоту не задумываясь о значении своего учения и нисколько его не продвигая, когда художник достигает славы без добродетели, через легкомысленные сделки и пустые фокусы, отнимая хлеб и репутацию у тех, кто трудится честно; или когда мошенник, унаследовавший или получивший обманом имя крупного торгового дома, затем лишает тысячи людей их сбережений, тогда все эти люди не оплакивают свои перспективы, а скорее находят удовольствие в своей удаче и никогда не пропускают вечера без весёлой компании и хороших друзей».\n— Готфрид Келлер, «Платье делает человека»"
 manzoni.1102.t: "«Ули-батрак»"
 manzoni.1102.d: "Под псевдонимом [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], Альберт Битциус, швейцарский пастор, опубликовал свою книгу «Ули-батрак». Это типичное для Готхельфа произведение, в котором батрак Ули должен преодолеть свою неряшливость, чтобы найти самореализацию. Для этого ему нужны многочисленные образцы для подражания и он должен подчиняться различным авторитетам."
 manzoni.1102.f: "«Слушай, Ули, — сказал хозяин, — так дальше продолжаться не может, ты для меня слишком дикий, твои загулы слишком часты; я не хочу доверять своих лошадей и коров никому с головой, полной хлеба или вина, я не могу пустить такого человека в конюшню с фонарём, и особенно если он ещё и пьян, как ты, слишком много домов уже так сгорело. Я не знаю, о чём ты думаешь и куда ты с этим катишься». Ули ответил, что он ещё ни о чём не думал, что свою работу он всё равно делал, что никому не нужно было делать её за него, и что никто не платил ему за то, что он пил; то, что он пил, никого не касалось, он пил свои деньги. «Но это мой слуга», — ответил хозяин.\n— Иеремия Готхельф, «Ули-батрак»"
 manzoni.1103.t: "«Степной волк»"
 manzoni.1103.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] опубликовал[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'а', '')] свою новую книгу «Степной волк», которую он написал во время пребывания в Базеле. Гессе уже известен своими другими работами, такими как «Сиддхартха». В его новой истории Гарри Галлер средних лет недоволен буржуазным обществом. Он даже подумывает о самоубийстве, но встреча с молодой Герминой и её коллегами меняет его жизнь. Гермину нельзя было бы считать лучшим влиянием, так как она иногда занимается проституцией, но она может помочь Гарри испытать то, чего он раньше не знал, высвободив «степного волка» внутри него."
 manzoni.1103.f: "«Ибо то, что я всегда ненавидел, презирал и проклинал больше всего, было это довольство, это здоровье и комфорт, этот тщательно оберегаемый оптимизм среднего класса, это жирное и процветающее отродье посредственности».\n— Герман Гессе, «Степной волк»"
 manzoni.1104.t: "«История Альбера»"
 manzoni.1104.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] опубликовал[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'а', '')] свой новый графический роман «История Альбера». Это не традиционная книга, а панели с картинками и короткими текстами под ними. История представляет собой карикатуру на молодого человека, пытающегося найти свой путь и в итоге становящегося радикалом в смутное время Женевы."
 manzoni.1104.f: "«Пусть нечистая кровь\nпропитает наши борозды!\nпропитает наши борозды!»\n— Родольф Тёпфер, «История Альбера»"
 manzoni.1105.t: "«Великий страх в горах»"
 manzoni.1105.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] создал[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'а', '')] литературный шедевр, действие которого происходит в швейцарских Альпах. В нём [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'она', 'он')] исследует, что страх делает с нами. Некоторые критики говорят, что книга «Великий страх в горах» отражает неопределённость [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]."
 manzoni.1105.f: "«Солнца больше не было. Была только эта великая тень, которая была над нами, потом мы увидели, как она бежит за нами, взбираясь по склонам с большой скоростью, сначала по травянистым склонам, затем по первым скалам; в то время как вещи меняли свой облик, и цвет всего, и даже климат менялся».\n— Ш. Ф. Рамю, «Великий страх в горах»"
 manzoni.1105.g: "Что страх делает с нами?"
 manzoni.1400.t: "«Вокруг света за восемьдесят дней»"
 manzoni.1400.d: "«Вокруг света за восемьдесят дней» — великая книга, автор которой [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. В ней Филеас Фогг и его слуга Паспарту должны обогнуть мир за 80 дней или меньше, чтобы выиграть пари. Они отправляются в великое приключение и посещают множество стран."
 manzoni.1400.f: "«Всё, что один человек может вообразить, другие могут сделать реальным».\n— Жюль Верн, «Вокруг света за восемьдесят дней»"
 manzoni.1400.g: "Интересно, сможем ли мы когда-нибудь обогнуть мир за один день?"
 manzoni.1401.t: "«Человеческая комедия»"
 manzoni.1401.d: "«Человеческая комедия» — это многотомный сборник взаимосвязанных историй, автор которой [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. С помощью этих историй [SCOPE.sCharacter('manzoni_writer_scope').GetLastNameNoFormatting] пытается дать нам представление о повседневной жизни людей во Франции."
 manzoni.1401.f: "«Человек не может всё время творить зло, и даже в компании пиратов должны быть какие-то приятные моменты на их зловещем корабле, когда чувствуешь себя так, будто находишься на борту прогулочной яхты».\n— Оноре де Бальзак, «Человеческая комедия»"
 manzoni.1401.g: "Итак, как живут обычные люди во Франции?"
 manzoni.1402.t: "«Три мушкетёра»"
 manzoni.1402.d: "История «Трёх мушкетёров» рассказывает о трёх мушкетёрах Атосе, Портосе и Арамисе, а также о д'Артаньяне в их приключениях, происходящих во время правления Людовика XIII. Книга, автор которой [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], стала довольно известной всего за несколько дней."
 manzoni.1402.f: "«Негодяй смеётся не так, как честный человек; лицемер не проливает слёз человека доброй совести. Всякая ложь — это маска; и как бы хорошо ни была сделана маска, при небольшом внимании мы всегда сможем отличить её от истинного лица».\n— Александр Дюма, «Три мушкетёра»"
 manzoni.1402.g: "Один за всех, и все за одного!"
 manzoni.1500.t: "«Ворон»"
 manzoni.1500.d: "«Ворон» — это повествовательная поэма, автор которой [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. В ней человека, скорбящего по своей умершей Леноре, посещает ворон. Он пытается поговорить с вороном, но птица отвечает только «Никогда»."
 manzoni.1500.f: "Как-то в полночь, в час угрюмый, полный тягостною думой,\nНад старинными томами я склонялся в забытьи,\nИ очнулся вдруг от звука, будто кто-то вдруг застукал,\nВ мою дверь забарабанил, постучался в забытьи.\n«Это гость, — я пробормотал, — постучался в забытьи,\nГость — и больше ничего».\n— Эдгар Аллан По, «Ворон»"
 manzoni.1500.g: "Тёмная тень нависла над человеком..."
 manzoni.1600.t: "«Чудесное путешествие Нильса с дикими гусями»"
 manzoni.1600.d: "«Чудесное путешествие Нильса с дикими гусями» — это детская книга, автор которой [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. В книге Нильс Хольгерссон превращается в гнома и внезапно может разговаривать с животными. Вскоре после этого он и домашний гусь Мартин присоединяются к стае диких гусей и путешествуют по всей Швеции. Во время путешествия Нильс меняется к лучшему."
 manzoni.1600.f: "«Не много было проку от этого мальчика. Главным его удовольствием было есть и спать; а после этого он больше всего любил проказничать».\n— Сельма Лагерлёф, «Чудесное путешествие Нильса с дикими гусями»"
 manzoni.1600.g: "Это звучит как удивительное путешествие!"
 manzoni.1700.t: "«Превращение»"
 manzoni.1700.d: "Представьте, что вы внезапно превратились в огромное насекомое. [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], в своей книге, «Превращение» исследует такой сценарий. Когда Грегор Замза, единственный кормилец в семье, однажды превращается в таракана и больше не может зарабатывать деньги, становится ясно, как мало он на самом деле значит для своей семьи."
 manzoni.1700.f: "«Какая судьба: быть обречённым работать на фирму, где малейшая небрежность сразу же вызывала самые серьёзные подозрения! Неужели все служащие были всего лишь кучкой негодяев, не было ли среди них ни одного верного, преданного человека, который, потратив всего лишь час или около того времени фирмы утром, был бы так терзаем совестью, что сошёл бы с ума и фактически не мог бы встать с постели?»\n— Франц Кафка, «Превращение»"
 manzoni.1700.g: "Фу! Насекомое!"
 manzoni.1701.t: "«Человек без свойств»"
 manzoni.1701.d: "«Человек без свойств», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] — это великий роман идей, действие которого происходит в Вене накануне Первой мировой войны. Он рассказывает историю Ульриха, бывшего солдата и учёного, соблазнителя и скептика, который оказывается вовлечённым в грандиозные планы по празднованию 70-летнего юбилея императора Франца Иосифа."
 manzoni.1701.f: "«Секрет хорошего библиотекаря в том, что он никогда не читает из литературы, находящейся в его ведении, ничего, кроме названия и оглавления. Тот, кто позволяет себе увлечься и начинает читать книгу, потерян как библиотекарь... Он обязательно потеряет перспективу».\n— Роберт Музиль, «Человек без свойств»"
 manzoni.1701.g: "Фу! Насекомое!"
 manzoni.1702.t: "«Звёздные часы человечества»"
 manzoni.1702.d: "«Звёздные часы человечества», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] — это серия из 14 исторических миниатюр. В этих рассказах Цвейг изображает ряд моментов, изменивших ход истории, так называемые «мировые минуты», в которые героический протагонист исполнял свою судьбу и тем самым формировал мир для грядущих поколений."
 manzoni.1702.f: "«В этот момент Бальбоа приказывает команде остановиться. Никто не должен следовать за ним, потому что он не хочет ни с кем делить этот первый взгляд на неизвестный океан. Один и только он хочет быть и навсегда остаться первым испанцем, первым европейцем, первым христианином, который, проплыв через один огромный океан нашей вселенной, Атлантический, теперь также и другой, ещё неизвестный Тихий, увидел. И Васко Нуньес де Бальбоа смотрит, и смотрит, и смотрит, гордо и блаженно впивая в себя сознание, что его глаз — первый из европейских, в котором отражается бесконечная синева этого моря».\n— Стефан Цвейг, «Звёздные часы человечества»"
 manzoni.1702.g: "Фу! Насекомое!"
 manzoni.1800.t: "«Русалочка»"
 manzoni.1800.d: "«Русалочка», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Младшая дочь Морского Царя спасает принца от смерти и влюбляется в него. Она меняет свой хвост на ноги в надежде, что принц влюбится в неё. Закончится ли её история хэппи-эндом?"
 manzoni.1800.f: "«Я знаю, чего ты хочешь. Это очень глупо с твоей стороны, но ты получишь своё, и это принесёт тебе горе, моя хорошенькая принцесса».\n— Ганс Христиан Андерсен, «Русалочка»"
 manzoni.1800.g: "Подождите, её зовут не Ариэль?!"
 manzoni.1900.t: "«Дракула»"
 manzoni.1900.d: "История «Дракулы», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Повествование ведется с разных точек зрения. От бортового журнала капитана до газетных статей и частей дневников. В этой истории вампир Дракула пирует на своих жертвах, но затем на него начинает охотиться группа охотников на вампиров. Выживут ли охотники, или Дракула продолжит преследовать человечество."
 manzoni.1900.f: "«Неужели вы не думаете, что есть вещи, которые вы не можете понять, и тем не менее они существуют; что некоторые люди видят то, чего другие не могут? Но есть вещи старые и новые, которые не должны созерцать глаза человеческие, потому что они знают — или думают, что знают — некоторые вещи, которые им рассказали другие люди. Ах, это вина нашей науки, что она хочет всё объяснить; и если она не объясняет, то говорит, что объяснять нечего».\n— Брэм Стокер, «Дракула»"
 manzoni.1900.g: "Мне нужно купить чеснок..."
 manzoni.2000.t: "«Макс Хавелар»"
 manzoni.2000.d: "«Макс Хавелар»,[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Это книга о голландской колониальной системе в Индонезии. В ней бывший колониальный чиновник пишет историю, которая раскрывает некомпетентность и коррупцию в колониальной системе. В то же время он предвосхищает критику буржуазного истеблишмента и карикатурно изображает его."
 manzoni.2000.f: "«Вся совесть наций вопиет против этой жестокой тирании, осуществляемой купеческими князьями Европы».\n— Эдуард Доувес «Мультатули» Деккер, «Макс Хавелар»"
 manzoni.2000.g: "Это звучит ужасно! Мы должны что-то сделать!"
