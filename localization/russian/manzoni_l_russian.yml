 manzoni.500.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName], [concept_manzoni_local_writer|l], [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'недовольна', 'недоволен')] нашим правительством. [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'Она', 'Он')] решил[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'а', '')] пойти в политику, чтобы изменить нашу нацию к лучшему. Вопрос в том, должны ли мы это позволить?"
 manzoni.801.t: "Прекрасные иллюстрации"
 manzoni.801.d: "Для своего нового произведения [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] смог[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'ла', '')] убедить художника [SCOPE.sCharacter('klimt_painter_scope').GetFullName] сделать несколько иллюстраций. Первые готовые иллюстрации несравненно прекрасны и привели в восторг [SCOPE.sCharacter('manzoni_writer_scope').GetLastName]."
 manzoni.801.f: "«Это великолепная иллюстрация! Интересно, спрятал ли художник какие-нибудь мелкие детали, которые расскажут нам больше об истории?»"
 manzoni.801.g: "Детали невероятны!"
 manzoni.801.h: "Это станет [Concept('concept_manzoni_bestseller', 'бестселлером')]!"
 manzoni.801.h_tt: "Это повысит шанс [SCOPE.GetCharacter.GetLastName] написать [Concept('concept_manzoni_bestseller', 'бестселлер')]."
 manzoni.802.t: "Теории о внеземной жизни"
 manzoni.802.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName], писатель-фантаст, и наш астроном, доктор [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName], встретились, чтобы обсудить возможность существования внеземной жизни. Вместе они сделали предположения о том, как эта жизнь может выглядеть и где она может быть возможна. Они опубликовали свои теории как гипотезу [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]—[SCOPE.sCharacter('manzoni_writer_scope').GetLastName]."
 manzoni.802.f: "«Очевидно, эти существа жили бы в газовых океанах газового гиганта. Я бы предположил, что они не могли бы общаться с внешним миром, но что, если бы они нашли способ, который позволил бы им колонизировать новые газовые гиганты? Мы могли бы даже увидеть революцию в одной из этих колоний!»"
 manzoni.802.g: "Может, нам стоит поискать внеземную жизнь?"
 manzoni.802.h: "Им следует написать книгу о своих теориях!"
 manzoni.802.i: "Поразительно!"
 manzoni.803.t: "[SCOPE.sCharacter('manzoni_adventurer_scope').GetFullName]: Приключения"
 manzoni.803.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] услышал[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'а', '')] о приключениях доктора [SCOPE.sCharacter('manzoni_adventurer_scope').GetLastName] и решил[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'а', '')] встретиться с [SelectLocalization(SCOPE.sCharacter('manzoni_adventurer_scope').IsFemale, 'ней', 'ним')] для интервью. Они долго разговаривали, что привело к тому, что у [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] появилось много идей для [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'её', 'его')] следующей книги."
 manzoni.803.f: "«Да, теперь, когда вы упомянули, я помню, что там были пираты! На самом деле это были пираты с пираньями в качестве домашних животных!»"
 manzoni.803.g: "Надеюсь, это принесёт плоды!"
 manzoni.804.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] вдохновл[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'ена', 'ён')] полётом на воздушном шаре"
 manzoni.804.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] взял[SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'а', '')] нашего поэта [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] на полёт на воздушном шаре. Теперь, вернувшись, [SCOPE.sCharacter('manzoni_writer_scope').GetLastName], кажется, вдохновл[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'ена', 'ён')] этим путешествием."
 manzoni.804.f: "«Облака выглядели как белый океан, и видеть крошечных людей на земле... Это было невероятно!»"
 manzoni.804.g: "Ах, красота полёта!"
 manzoni.804.h: "Может, [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'её', 'его')] стихи теперь станут лучше!"
 manzoni.804.i: "Что бы я отдал, чтобы самому стать воздухоплавателем!"
 manzoni.805.t: "Красота гор"
 manzoni.805.d: "Известным альпинист [SCOPE.sCharacter('mountaineer_scope').GetFullName] и [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] совершили поход в горы. Подъём был трудным, но оказавшись на вершине, [SCOPE.sCharacter('manzoni_writer_scope').GetLastName] восхитил[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'ась', 'ся')] видом."
 manzoni.805.f: "«Окружённый морем тумана, которое прорывалось лишь несколькими вершинами, я смотрел на восходящее солнце. Прекрасный вид»."
 manzoni.805.g: "Горы вдохновляли многих поэтов!"
 manzoni.805.h: "Надеюсь, горный воздух поможет [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'ей', 'ему')] писать лучшие стихи!"
 manzoni.805.i: "Может, [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'ей', 'ему')] самому стать альпинистом?"
 manzoni.1003.t: "«Остров сокровищ»"
 manzoni.1003.d: "«Остров сокровищ», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Это путешествие Джима Хокинса, молодого парня, в поисках сокровищ. Вместе с доктором Ливси и сквайром Джоном Трелони они отправляются на остров на корабле. Но оказывается, что большая часть команды — пираты, которые хотят убить остальную часть команды, чтобы забрать сокровища себе. Выживет ли Джим в этом приключении?"
 manzoni.1003.f: "«Это были сокровища Флинта, за которыми мы так долго гнались, и которые уже стоили жизни семнадцати человек с „Испаньолы“. Сколько их стоило накопить, сколько крови и горя, сколько добрых кораблей потоплено в море, сколько храбрых людей шло по доске с завязанными глазами, сколько пушечных выстрелов, сколько позора, лжи и жестокости, возможно, никто из ныне живущих не мог бы сказать».\n— Роберт Луис Стивенсон, «Остров сокровищ»"
 manzoni.1003.g: "Аррр!"
 manzoni.1004.t: "«Франкенштейн, или Современный Прометей»"
 manzoni.1004.d: "«Франкенштейн, или Современный Прометей», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Это роман, в котором доктор Франкенштейн пытается воскресить существо, состоящее из частей тел. Благодаря молнии ему удаётся оживить тело. Как только монстр оживает, доктор Франкенштейн не может вынести его уродства и оставляет его на произвол судьбы. Лицо монстра сеет страх и ужас среди жителей деревни, и поэтому добродушное существо начинает поддаваться одиночеству."
 manzoni.1004.f: "«Даже сломленный духом, как он, никто не может чувствовать глубже, чем он, красоту природы. Звёздное небо, море и всякий вид, открывающийся в этих чудесных краях, кажется, всё ещё имеют силу возвышать его душу от земли. Такой человек имеет двойное существование: он может страдать от несчастий и быть подавленным разочарованиями; но, когда он уходит в себя, он будет подобен небесному духу, окружённому ореолом, в круг которого не осмеливается войти ни горе, ни глупость».\n— Мэри Шелли, «Франкенштейн, или Современный Прометей»"
 manzoni.1004.g: "Вернуть мёртвых, не правда ли, было бы неплохо?"
 manzoni.1005.t: "«Приключения Алисы в Стране чудес»"
 manzoni.1005.d: "В «Приключениях Алисы в Стране чудес» юная Алиса падает в кроличью нору и оказывается в странном мире. Книга, автор которой [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], изобилует сказочными существами и странными правилами, созданными взрослыми. История высмеивает моралистический мир викторианской эпохи."
 manzoni.1005.f: "«Если бы у меня был свой мир, всё было бы чепухой. Ничто не было бы тем, что оно есть, потому что всё было бы тем, чем оно не является. И наоборот, то, что есть, того бы не было. А то, чего бы не было, было бы. Понимаете?»\n— Льюис Кэрролл, «Приключения Алисы в Стране чудес»"
 manzoni.1005.g: "Какая интересная страна!"
 manzoni.1006.t: "«Винни-Пух»"
 manzoni.1006.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] написал[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'а', '')] «Винни-Пуха», вдохновляясь своим сыном Кристофером Робином и его мягкими игрушками. Это сборник коротких рассказов, посвящённых медведю Винни-Пуху и его друзьям. В нём Пух переживает различные приключения."
 manzoni.1006.f: "«„Ну, — сказал Пух, — что я люблю больше всего,“ — и тут ему пришлось остановиться и подумать. Потому что, хотя есть мёд было очень хорошим занятием, был момент прямо перед тем, как начать его есть, который был лучше, чем когда ты его ел, но он не знал, как он называется».\n— А. А. Милн, «Винни-Пух»"
 manzoni.1006.g: "Плюшевый мишка в качестве друга звучит замечательно!"
 manzoni.1007.t: "«Загадочное происшествие в Стайлзе»"
 manzoni.1007.d: "«Загадочное происшествие в Стайлзе» — это детективный роман [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Он знакомит с персонажем Эркюля Пуаро, бельгийца, который переехал в Англию и должен раскрыть убийство миссис Инглторп, с которой он в настоящее время живёт. Пуаро позже появится в общей сложности в 33 романах [SCOPE.sCharacter('manzoni_writer_scope').GetLastNameNoFormatting]."
 manzoni.1007.f: "«Вы слишком много воли давали своему воображению. Воображение — хороший слуга, но плохой господин. Самое простое объяснение всегда самое вероятное».\n— Агата Кристи, «Загадочное происшествие в Стайлзе»"
 manzoni.1007.g: "Интересно, увижу ли я снова Эркюля Пуаро?"
 manzoni.1008.t: "«Книга джунглей»"
 manzoni.1008.d: "«Книга джунглей» — это детская книга, автор которой [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Её главная тема — покинутость и воспитание, отражённая в Маугли, мальчике, который был оставлен в дикой природе и воспитан волками. Ещё один важный аспект книги — закон джунглей, которому следуют животные джунглей. Книга учит детей знать своё место и придерживаться правил и закона."
 manzoni.1008.f: "«Одна из прелестей закона джунглей в том, что наказание улаживает все счёты. После этого нет никаких придирок».\n— Редьярд Киплинг, «Книга джунглей»"
 manzoni.1008.g: "Ищи лишь самое необходимое!"
 manzoni.1009.t: "«Повесть о Кролике Питере»"
 manzoni.1009.d: "«Повесть о Кролике Питере» — это история о Кролике Питере, который пробирается в сад мистера Макгрегора, и за ним впоследствии гоняются по всему саду. История, автор которой [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], радикальна и новаторска для детской книги, со многими нововведениями, которые ранее не были распространены в детской литературе."
 manzoni.1009.f: "«Жили-были четыре маленьких кролика, и звали их Флопси, Мопси, Ватный Хвост и Питер».\n— Беатрис Поттер, «Повесть о Кролике Питере»"
 manzoni.1009.g: "Зайти в запретный сад, это звучит интересно!"
 manzoni.1010.t: "«На маяк»"
 manzoni.1010.d: "«На маяк» — это модернистский роман, автор которой [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Он изображает отдых семьи Рэмзи на острове Скай и написан с акцентом на мысли и наблюдения, а не на диалоги и действия."
 manzoni.1010.f: "«В чём смысл жизни? Это было всё — простой вопрос; тот, что с годами имеет тенденцию смыкаться вокруг тебя, великое откровение так и не пришло. Великое откровение, возможно, никогда и не приходит. Вместо этого были маленькие ежедневные чудеса, озарения, спички, неожиданно зажжённые в темноте; вот одно из них».\n— Вирджиния Вулф, «На маяк»"
 manzoni.1010.g: "Семьи..."
 manzoni.1307.t: "«Будденброки: Упадок одной семьи»"
 manzoni.1307.d: "«Будденброки: Упадок одной семьи» — первый социальный роман на немецком языке. В нём [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] описывает упадок богатой купеческой семьи на протяжении четырёх поколений в ганзейском городе Любек."
 manzoni.1307.f: "«Часто внешние и видимые материальные знаки и символы счастья и успеха проявляются только тогда, когда процесс упадка уже начался. Внешние проявления требуют времени — как свет той звезды наверху, которая в действительности, возможно, уже погасла, когда нам кажется, что она сияет ярче всего».\n— Томас Манн, «Будденброки»"
 manzoni.1307.g: "Надеюсь, моя семья не в упадке."
 manzoni.1404.t: "«Дама с камелиями»"
 manzoni.1404.d: "«Дама с камелиями» — это любовная история. [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] брал[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'а', '')] вдохновение из собственной жизни. В ней бессмертную любовь между Арманом и куртизанкой Маргаритой прерывает отец Армана, который беспокоится, что отношения его сына могут разрушить шансы его дочери на замужество. Поэтому он убеждает её покинуть Армана. Узнает ли он когда-нибудь об этом?"
 manzoni.1404.f: "«Её восторг от самых малых вещей был подобен восторгу ребёнка. Бывали дни, когда она бегала по саду, как десятилетняя девочка, за бабочкой или стрекозой. Эта куртизанка, которая потратила на букеты больше денег, чем хватило бы на содержание целой семьи, иногда сидела на траве по часу, разглядывая простой цветок, чьё имя она носила».\n— Александр Дюма-сын, «Дама с камелиями»"
 manzoni.1404.g: "Ах, любовь, которая никогда не умирает!"
 manzoni.1405.t: "«Госпожа Бовари»"
 manzoni.1405.d: "«Госпожа Бовари» — это реалистическая история, автор которой [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. В ней Эмма Бовари скучает от своей жизни в сельской Франции и от своего мужа и начинает заводить романтические приключения с другими мужчинами. Она также тратит гораздо больше денег, чем у неё есть, и всё больше и больше влезает в долги. Сможет ли она выплатить свой долг?"
 manzoni.1405.f: "«В глубине души, однако, она ждала, что что-то произойдёт. Как потерпевшие кораблекрушение моряки, она обращала отчаянные взоры на одиночество своей жизни, ища вдали какой-нибудь белый парус в туманах горизонта. Она не знала, что это будет за случай, какой ветер принесёт его ей, к какому берегу он её прибьёт, будет ли это шлюпка или трёхпалубный корабль, гружённый тоской или полный блаженства до самых иллюминаторов. Но каждое утро, просыпаясь, она надеялась, что он придёт в тот день; она прислушивалась к каждому звуку, вскакивала от испуга, удивлялась, что он не приходит; затем на закате, всегда более опечаленная, она ждала завтрашнего дня».\n— Гюстав Флобер, «Госпожа Бовари»"
 manzoni.1405.g: "Эта книга немного... странная."
 manzoni.1406.t: "«Пышка»"
 manzoni.1406.d: "«Пышка», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Когда пруссаки оккупируют часть Нормандии, группа французов бежит из своего дома, однако они случайно попадают на оккупированные территории и оказываются под бессрочным арестом. Тогда Пышка, проститутка среди путешественников, объясняет, что немецкий офицер отпустит их только после того, как она переспит с ним. Сначала другие путешественники поддерживают Пышку, но через несколько дней это меняется..."
 manzoni.1406.f: "«Горожане в своих затемнённых комнатах были ошеломлены, как будто от какого-то катаклизма, какого-то разрушительного землетрясения, против которого всякая мудрость и всякое сопротивление бесполезны. Такое чувство возникает всякий раз, когда нарушается установленный порядок вещей, когда уничтожается безопасность и всё, что до сих пор защищалось законами человека или природы, внезапно оказывается во власти дикой, неразумной жестокости».\n— Ги де Мопассан, «Пышка»"
 manzoni.1406.g: "Так подставить свою собственную спасительницу..."
 manzoni.1407.t: "«Арсен Люпен, джентльмен-грабитель»"
 manzoni.1407.d: "«Арсен Люпен, джентльмен-грабитель» — это сборник рассказов, в которых фигурирует джентльмен-грабитель Арсен Люпен. [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], в своих историях, описывает, как Люпен сначала попадает под арест, затем сбегает из тюрьмы, а в последней истории ему предстоит сразиться с Шерлоком Холмсом."
 manzoni.1407.f: "«Какая жалость, что я не честный человек!»\n— Морис Леблан, «Арсен Люпен, джентльмен-грабитель»"
 manzoni.1407.g: "Интересно, кто лучше, Шерлок Холмс или Арсен Люпен?"
 manzoni.1408.t: "«В поисках утраченного времени»"
 manzoni.1408.d: "«В поисках утраченного времени» следует за воспоминаниями рассказчика о детстве и опыте взросления в высшем обществе Франции конца XIX — начала XX века. Автор, [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], особенно использует непроизвольную память как сюжетный приём."
 manzoni.1408.f: "«Связи между нами и другим человеком существуют только в нашем сознании. Память, по мере того как она ослабевает, ослабляет их, и, несмотря на иллюзию, которой мы хотим быть обмануты и которой, из любви, дружбы, вежливости, уважения, долга, мы обманываем других людей, мы существуем в одиночестве. Человек — это существо, которое не может убежать от самого себя, которое знает других людей только в себе, и когда он утверждает обратное, он лжёт».\n— Марсель Пруст, «В поисках утраченного времени»"
 manzoni.1408.g: "Эта книга мне что-то напоминает..."
 manzoni.1409.t: "«Маленькая Фадетта»"
 manzoni.1409.d: "В «Маленькой Фадетте» два брата-близнеца из известной фермерской семьи влюбляются в Фадетту. Сначала их отношения бросают вызов патриархальным нормам и ожиданиям деревни, но когда Фадетта наследует состояние, всё меняется. [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] использует своё сельское происхождение, чтобы точно описать деревню и её жителей."
 manzoni.1409.f: "«Бог оставляет только тех, кто оставляет себя, и тот, у кого хватает мужества запереть своё горе в собственном сердце, сильнее в борьбе с ним, чем тот, кто жалуется».\n— Жорж Санд, «Маленькая Фадетта»"
 manzoni.1409.g: "Умные молодые люди!"
 manzoni.1501.t: "«Хижина дяди Тома»"
 manzoni.1501.d: "«Хижина дяди Тома», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Это книга, которая изображает зло и ужасы рабства. Она описывает жизни различных рабов, которые характеризуются нищетой и страданиями."
 manzoni.1501.f: "«...сердце не может пролить слёз, — оно роняет только кровь, истекая ею в молчании».\n— Гарриет Бичер-Стоу, «Хижина дяди Тома»"
 manzoni.1501.g: "Это звучит ужасно!"
 manzoni.1502.t: "«Бен-Гур: Повесть о Христе»"
 manzoni.1502.d: "В «Бен-Гуре: Повести о Христе» [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] изображает жизнь Иуды Бен-Гура, иудейского принца, которого порабощают римляне и который становится колесничим. История отражает жизнь Иисуса."
 manzoni.1502.f: "«Прекраснее доверять Богу. Прекрасное в этом мире всё от его руки, объявляя совершенство вкуса; он автор всех форм; он одевает лилию, он окрашивает розу, он дистиллирует каплю росы, он создаёт музыку природы; одним словом, он организовал нас для этой жизни и наложил её условия; и они являются такой гарантией для меня, что, доверчивый, как малое дитя, я оставляю ему организацию моей Души и все устроения для жизни после смерти. Я знаю, что он любит меня».\n— Лью Уоллес, «Бен-Гур: Повесть о Христе»"
 manzoni.1502.g: "Истинный христианин!"
 manzoni.1503.t: "«Моби Дик, или Белый кит»"
 manzoni.1503.d: "«Моби Дик, или Белый кит», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Автор показывает одержимость капитана Ахава белым китом с точки зрения молодого моряка Измаила. После того как кит откусывает ногу Ахава до колена, Ахав знает только одну цель в жизни: месть."
 manzoni.1503.f: "«Всякий раз, когда я чувствую, что мои губы мрачно сжимаются; всякий раз, когда в моей душе наступает сырой, промозглый ноябрь; всякий раз, когда я невольно останавливаюсь перед гробовыми мастерскими и иду в хвосте каждой похоронной процессии, которую встречаю; и особенно всякий раз, когда моя ипохондрия берёт надо мной такой верх, что требуется сильный моральный принцип, чтобы удержать меня от того, чтобы намеренно выйти на улицу и методично сбивать шляпы с людей, — тогда я считаю, что самое время как можно скорее отправиться в море».\n— Герман Мелвилл, «Моби Дик, или Белый кит»"
 manzoni.1503.g: "Кто мой Белый кит?"
 manzoni.2100.t: "«Тан Тхыонг Нгау Лук»"
 manzoni.2100.d: "«Тан Тхыонг Нгау Лук — Произвольные записи о печали» — это сборник рассказов Фам Динь Хо и Нгуен Ан, в которых зафиксированы религиозные и общественные события Вьетнама конца XVIII — начала XIX века. Всего 89 рассказов, разделённых на две книги, Верхнюю и Нижнюю, сборник включает в себя рассказы о великих людях, живописных путешествиях, исторических реликвиях и даже местных легендах. Записи предоставляют уникальный взгляд на жизнь во Вьетнаме в бурную эпоху поздней династии Ле и ранней династии Нгуен."
 manzoni.2100.f: "Со времён Ли, Чан, Ле, Чинь и до наших дней, спустя сотни лет, существуют истории, не задокументированные официальными историками и не запомненные местными легендами; поэтому оба мужа решили собрать их в царстве печальных перемен. Если бы они оба сочли эти сказки печальными и решили забыть их, то рано или поздно они были бы забыты. К счастью, записав эти истории, они могут служить плотом, переправляющим нас с бредового берега, светом, освещающим тьму, именуемым Тан Тхыонг Нгау Лук — Произвольные записи о печали, и смысл, таким образом, может быть воспринят."
 manzoni.2100.g: "Сказания о тёмных временах, мы должны стремиться быть лучше."
 manzoni.2200.t: "Дуэль за честь"
 manzoni.2200.d: "После того как [SCOPE.sCharacter('manzoni_writer_scope').GetLastName] отправил крайне оскорбительное письмо Жоржу д'Антесу, предполагаемому поклоннику его жены, тот вызвал его на дуэль. Теперь пришло время им встретиться лицом к лицу."
 manzoni.2200.f: "«Правила дуэли предусматривают, что два противника выстраиваются на оговорённом расстоянии. Их спины должны быть обращены к противнику. По сигналу дуэлянты поворачиваются и идут навстречу друг другу. Они решают, когда стрелять. Тот, кто выстрелит первым, должен оставаться на том же месте.\nВы оба согласны с этими правилами?»"
 manzoni.2200.g: "Надеюсь, он выживет!"
 manzoni.2200.h: "Надеюсь, этот смутьян умрёт!"
 manzoni.2201.t: "«Преступление и наказание»"
 manzoni.2201.d: "«Преступление и наказание», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Автор рассказывает о душевных муках и моральных дилеммах Родиона Раскольникова, обедневшего бывшего студента в Санкт-Петербурге, который планирует убить бессовестную процентщицу, старуху, которая хранит деньги и ценные вещи в своей квартире."
 manzoni.2201.f: "«Боль и страдание всегда неизбежны для большого ума и глубокого сердца. По-настоящему великие люди, я думаю, должны испытывать великую печаль на земле».\n— Фёдор Достоевский, «Преступление и наказание»"
 manzoni.2201.g: "Хорошо, что я ничего не должен!"
 manzoni.2202.t: "«Война и мир»"
 manzoni.2202.d: "«Война и мир», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Произведение рассказывает о различных персонажах из разных слоёв общества, от крестьян до дворян. Действие книги происходит во время наполеоновских войн, которые меняют жизнь трёх главных героев книги."
 manzoni.2202.f: "«Людям не дано судить, что правильно, а что нет. Люди вечно ошибались и будут ошибаться, и ни в чём так, как в том, что они считают правильным и неправильным».\n— Лев Толстой, «Война и мир»"
 manzoni.2202.g: "Настоящий шедевр! Только немного длинноват..."
 manzoni.2300.t: "«Нравы современных студентов»"
 manzoni.2300.d: "«Нравы современных студентов», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Это один из первых современных романов Японии. Вместе с написанной им критикой «Сущность романа» эти книги помогли сделать романы и драмы более приемлемыми в Японии."
 manzoni.2300.f: ""
 manzoni.2300.g: "Теперь и в Японии будут романы!"
 manzoni.2400.t: "«Посмертные записки Браза Кубаса»"
 manzoni.2400.d: "В «Посмертных записках Браза Кубаса», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Автор позволяет главному герою Бразу Кубасу рассказать о своей жизни после смерти. Это позволяет Кубасу критиковать бразильское общество. Это первая из реалистических книг Машаду, и некоторые персонажи и элементы снова поднимаются в более поздних книгах."
 manzoni.2400.f: "«Червю, который первым грыз холодную плоть моего трупа, я с нежным воспоминанием посвящаю эти Посмертные записки».\n— Машаду де Ассис, «Посмертные записки Браза Кубаса»"
 manzoni.2400.g: "Быть раскритикованным мертвецом!"
 manzoni.2401.t: "«Ирасема»"
 manzoni.2401.d: "«Ирасема», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. История пытается показать, как возник первый бразилец. Это история коренной жительницы Ирасемы и португальского колониста Мартима, у которых позже рождается сын по имени Моасир. Название книги — анаграмма к слову «Америка», название, подходящее для темы колонизации."
 manzoni.2401.f: "«Зелёные дикие моря моей родины, где жандайя поёт в листве карнаубы».\n— Жозе де Аленкар, «Ирасема»"
 manzoni.2401.g: "История для создания нации..."
 manzoni.2402.t: "«Трущоба»"
 manzoni.2402.d: "«Трущоба» — это натуралистический роман. В нём [SCOPE.sCharacter('manzoni_writer_scope').GetLastName] описывает жизнь различных португальских и других иммигрантов в трущобе. Эти люди адаптируются и меняются в своём новом доме."
 manzoni.2402.f: "«И в этой сырой, дымящейся земле, в этой горячей, грязной влажности, начал копошиться, прорастать, расти мир, живое существо, поколение, которое, казалось, возникло спонтанно, прямо здесь, из этой грязи, и размножалось, как личинки в навозе».\n— Алуизиу Азеведу, «Трущоба»"
 manzoni.2402.g: "Как мы можем позволять существовать таким трущобам?"
 manzoni.2500.t: "«Дневник сумасшедшего»"
 manzoni.2500.d: "«Дневник сумасшедшего» — это современный китайский рассказ, написанный в основном на разговорном китайском языке. Автор - [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. В нём брат рассказчика всё больше и больше сходит с ума. Он подозревает людей в каннибализме и в попытках заставить его совершить самоубийство."
 manzoni.2500.f: "«Я знал, что в этом смехе были мужество и честность. И старик, и мой брат побледнели, поражённые моим мужеством и честностью».\n— Лу Синь, «Дневник сумасшедшего»"
 manzoni.2500.g: "По крайней мере, вокруг меня нет каннибалов!"
 manzoni_beautiful_illustrations_modfier: "Прекрасные иллюстрации"
 manzoni_alien_theories_modfier: "Внеземные теории"
 manzoni_adventure_idea_modifier: "Идеи для приключений"
 manzoni.332.d: "Всемирно известный писатель оказал честь нашей стране. В настоящее время [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'она', 'он')] находится в читательском турне."
 manzoni.332.f: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] — писатель из [SCOPE.sCharacter('manzoni_writer_scope').GetHomeCountry.GetAltNameNoFlag('RU_CL_RP')], чья [Concept('concept_artists_experience', 'репутация')] составляет [SCOPE.sCharacter('manzoni_writer_scope').MakeScope.GetVariable('manzoni_writer_experience').GetValue|V0]. Из множества [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'её', 'его')] произведений [SCOPE.sCharacter('manzoni_writer_scope').MakeScope.GetVariable('manzoni_num_bestsellers_var').GetValue|V0] считаются [Concept('concept_manzoni_bestseller', 'бестселлерами')], а книги издаются в [SCOPE.sCharacter('manzoni_writer_scope').MakeScope.GetVariable('manzoni_num_book_licenses_var').GetValue|V0] странах."
