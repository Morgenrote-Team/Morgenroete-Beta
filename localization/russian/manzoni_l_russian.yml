 manzoni.1205.t: "«Самопознание Дзено»"
 manzoni.1205.d: "Арон Этторе Шмиц, более известный под псевдонимом [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], был итальянским писателем и бизнесменом, автором романов, пьес и рассказов. Близкий друг ирландского романиста и поэта Джеймса Джойса, Свево считался пионером психологического романа в Италии и наиболее известен своим модернистским романом «Самопознание Дзено», который стал широко ценимой классикой итальянской литературы. Свево также послужил прототипом для Леопольда Блума, главного героя «Улисса» Джойса."
 manzoni.1205.f: "«В отличие от других болезней, жизнь всегда смертельна. Она не терпит терапии. Это было бы всё равно что затыкать дыры, которые есть в наших телах, считая их ранами. Мы бы умерли от удушья в тот момент, когда нас начали бы лечить».\n— Итало Свево, «Самопознание Дзено»"
 manzoni.1207.t: "«Приключения Пиноккио. История деревянной куклы»"
 manzoni.1207.d: "Карло Лоренцини, более известный как [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], был журналистом и автором, который больше всего запомнился своей историей о кукле Пиноккио, которая ожила. «Приключения Пиноккио. История деревянной куклы» впервые появилась в «Газете для детей» с 1880 года как серийная история, прежде чем была опубликована в двух томах в 1883 году. Она рассказывает о озорных приключениях ожившей марионетки по имени Пиноккио и его создателя и отца, бедного резчика по дереву по имени Джеппетто."
 manzoni.1207.f: "«Совесть — это тот тихий, слабый голос, который люди не хотят слушать».\n— Карло Коллоди, «Приключения Пиноккио. История деревянной куклы»"
 manzoni.1208.t: "«Сердце»"
 manzoni.1208.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] был итальянским писателем и журналистом, который позже стал известен своей детской литературой. Де Амичис был патриотом и сражался в итальянских войнах за независимость, но ушёл со службы, потому что разочаровался в армии. Будучи убеждённым масоном, Де Амичис в своих работах стремился заменить глубоко укоренившийся в итальянской душе католицизм светскими добродетелями и преданностью государству. В более поздние годы на него оказали формирующее влияние социалистические идеи."
 manzoni.1208.f: "«Эта книга особенно посвящена ученикам начальной школы, которым от 9 до 13 лет, и её можно было бы назвать: История одного учебного года, написанная третьеклассником из муниципальной школы в Италии. Говоря „написанная третьеклассником“, я не имею в виду, что он действительно написал её, как она напечатана. Он постепенно записывал в тетрадь, как умел, то, что видел, слышал, думал, в школе и вне её; а его отец в конце года написал эти страницы по тем запискам, стараясь не искажать его мыслей и сохранить, насколько это возможно, слова своего сына. Который затем, 4 года спустя, уже будучи в старшей школе, перечитал рукопись и добавил что-то от себя, пользуясь своей ещё свежей памятью о людях и вещах. Теперь прочтите эту книгу, ребята: я надеюсь, вы будете ею довольны и что она принесёт вам пользу».\n— Эдмондо де Амичис, «Сердце»"
 manzoni.1208.h: "Какая замечательная книга!"
 manzoni.1306.t: "«Берлин, Александерплац»"
 manzoni.1306.d: "«Берлин, Александерплац», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Произведение рассказывает историю рабочего Франца Биберкопфа, который после освобождения из тюрьмы не может снова найти своё место в нормальной жизни и снова скатывается в преступность. Биберкопф борется не только с внутренними и внешними демонами, но и с мегаполисом как таковым, в котором он рискует погибнуть."
 manzoni.1306.f: "«Не стоит беспокоиться о своей судьбе. Я противник судьбы. Я не грек, я берлинец».\n— Альфред Дёблин, «Берлин, Александерплац»"
 manzoni.1306.g: "Новаторское произведение модернизма."
 manzoni.1403.t: "«Маленький принц»"
 manzoni.1403.d: "«Маленький принц», [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Автор отправляет маленького принца с маленькой планеты в путешествие по другим планетам, где он встречает различных людей, которые являются карикатурами на разные типы взрослых. В своих путешествиях принц надеется понять вселенную. Найдёт ли он ответ на этот вопрос?"
 manzoni.1403.f: "«Все взрослые сначала были детьми... только мало кто из них об этом помнит».\n— Антуан де Сент-Экзюпери, «Маленький принц»"
 manzoni.1403.g: "Понять вселенную? Это звучит невозможно..."
 manzoni.1901.t: "«Улисс»"
 manzoni.1901.d: "«Улисс» — это модернистский роман, автор которого [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. В нём автор отправляет читателя в путешествие по Дублину, в котором главный герой, Леопольд Блум, посещает различные места. Особенностью романа является то, что он показывает мысли и ассоциации людей. Он описывает их так, как они проходят в голове человека."
 manzoni.1901.f: "«я была цветком горы да когда я вплела розу в волосы как андалузские девушки или мне надеть красное да и как он целовал меня под мавританской стеной и я подумала ну что ж он так он а потом я попросила его глазами попросить ещё раз да и тогда он спросил меня хочу ли я да сказать да мой горный цветок и сначала я обняла его да и притянула к себе чтобы он почувствовал мою грудь всю в духах да и его сердце колотилось как сумасшедшее и да я сказала да я хочу Да».\n— Джеймс Джойс, «Улисс»"
 manzoni.1901.g: "Это интересный новый стиль письма!"
