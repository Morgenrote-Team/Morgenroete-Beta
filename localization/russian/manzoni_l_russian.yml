 manzoni_political_tailwind_modifier: "Политический попутный ветер"
 manzoni.1300.t: "Генрих Гейне, «Германия. Зимняя сказка»"
 manzoni.1300.d: "Генрих Гейне, один из важнейших поэтов немецкого языка, написал сатирическую эпическую поэму, направленную против политической ситуации в Германии. Либералы приветствуют книгу, но некоторые политики хотят её запретить."
 manzoni.1300.f: "В 1843 году немецкий поэт Генрих Гейне, покинувший Германию в 1831 году и уехавший во Францию, вернулся на несколько недель, чтобы навестить свою мать и издателя Юлиуса Кампе в Гамбурге. Гейне был не типичным романтиком, а скорее сатириком, который критиковал реакционную политику и цензуру авторитарных немецких государств, а также своих националистических и шовинистических соотечественников. На обратном пути в Париж оформился первый набросок поэмы «Германия. Зимняя сказка». Согласно цензурным постановлениям Карлсбадской конференции 1819 года, рукописи объёмом более двадцати листов не подпадали под надзор цензора. Поэтому она была опубликована вместе с другими стихами в томе под названием «Новые стихи». Произведение компактно представило мир образов Гейне и его поэтическую манеру, близкую к народной песне, с ироничной критикой обстановки на родине."
 manzoni.1300.g: "Её следует опубликовать."
 manzoni.1300.h: "Запретить и конфисковать!"
 manzoni.1300.i: "Подвергнуть цензуре..."
 manzoni.1301.t: "Генрих Гейне высмеивает Кёльнский собор"
 manzoni.1301.d: "В своём последнем произведении Генрих решительно высмеял возобновление строительства Кёльнского собора."
 manzoni.1301.f: "Гейне, бывший прусский гражданин (он родился в Дюссельдорфе), был против милитаризма в своей стране. В своей стихотворной эпопее он критиковал «прусское поведение», но также выступал против преображающего немецкого романтизма. Фактически он высмеивал анахроничных немцев, которые предпочитали достраивать средневековый собор вместо того, чтобы смотреть в будущее."
 manzoni.1301.g: "Будь ты проклят, Гейне!"
 manzoni.1302.t: "Йозеф фон Эйхендорф, «Лунная ночь»"
 manzoni.1302.d: "Новое стихотворение Йозефа фон Эйхендорфа считается одной из вершин немецкой поэзии."
 manzoni.1302.f: "Йозеф фрайхерр фон Эйхендорф был немецким поэтом и прозаиком поздней немецкой романтической школы. Ведущей поэтической темой Эйхендорфа было то, что человек должен находить счастье в полном погружении в красоты и изменчивые настроения природы. Лиризм поэзии Эйхендорфа высоко ценится, и его стихи были положены на музыку многими композиторами, включая Шуберта, Шумана, Мендельсона, Брамса, Хуго Вольфа, Рихарда Штрауса, Фридриха Ницше, Ганса Пфицнера и Александра Цемлинского. В 1837 году было опубликовано его стихотворение «Лунная ночь», которое часто называют «жемчужиной жемчужин» немецкой романтической лирики."
 manzoni.1302.g: "Прекрасно."
 manzoni.1302.h: "Вместо того чтобы бороться за свою политическую свободу, немцы позволяют отвлекать себя глупыми стишками?"
 manzoni.1303.t: "Восстание ткачей"
 manzoni.1303.d: "В [SCOPE.sState('manzoni_weberaufstand_state').GetCustom('RU_SL_PP')] назревают социальные, экономические и политические проблемы. Грядущие либеральные идеалы и растущая нищета среди традиционных ремесленников создали угрожающую конфликтную ситуацию. Ходят слухи, что произойдёт восстание, возглавляемое местными ткачами."
 manzoni.1303.f: "Начало индустриализации ввергло многих ткачей в нищету. Владелец местной текстильной фабрики покупает у них пряжу, но может снижать цену из-за предложения. Таким образом, ткачи — это не классические фабричные рабочие, а обедневшие, самозанятые люди, зависимые от фабрики. Столкнувшись со страданиями от эксплуатации и опасностью того, что в будущем их могут эксплуатировать ещё больше, некоторые в регионе объединились и теперь угрожают предпринимателю, которого они считают ответственным за свои беды. Политические элиты уже по-своему интерпретируют эту сложную ситуацию. Промышленники, в частности, призывают к жёстким мерам, чтобы избежать подобных инцидентов в будущем. Те, кто требует лучших условий оплаты труда, конечно же, сочтут это оскорблением."
 manzoni.1303.g: "Отправить войска."
 manzoni.1303.h: "Вступить в переговоры."
 manzoni.1304.t: "Генрих Гейне, «Песнь ткачей»"
 manzoni.1304.d: "Восстание ткачей в #tooltippable_name [SCOPE.sCountry('manzoni_weberaufstand_country').GetAdjectiveNoFlag|l]ой#! области — [SCOPE.sState('manzoni_weberaufstand_state').GetName] — было подавлено. Это событие стало символом нерешённых социальных и политических проблем на территории Германского союза. Генрих Гейне раскритиковал ответственные власти в своём стихотворении."
 manzoni.1304.f: "Не плача средь угрюмых глаз,\nСидят и точат зуб на вас.\nГермания, твой саван ткём,\nТройным проклятьем мы идём.\n— Мы ткём, мы ткём!\n\nПроклятье богу! Вновь и вновь\nК нему взывала наша кровь.\nНапрасно ждали мы, увы,\nОн издевался, мёртв и вы.\n— Мы ткём, мы ткём!\n\nПроклятье королю! Ему\nНе тронуть сердца и уму\nНужду и горе бедняков,\nС нас выжал всё, и был таков.\n— Мы ткём, мы ткём!\n\nПроклятье родине! Лишь гной\nИ срам цветут в стране родной.\nГде гибнет в грязи юный цвет,\nГде тлен и смрад, а правды нет.\n— Мы ткём, мы ткём!"
 manzoni.1304.g: "Опять ты, Гейне?"
 manzoni.1304.h: "Цензура! Цензура!"
 manzoni.1305.t: "Герхарт Гауптман, «Ткачи»"
 manzoni.1305.d: "Герхарт Гауптман представил самую важную драму в своей карьере. Она укрепила его репутацию представителя немецкой литературы в стране и за рубежом. В 1912 году Гауптман получил Нобелевскую премию по литературе за «богатую, разнообразную, выдающуюся деятельность в области драматической поэзии»."
 manzoni.1305.f: "Большинство персонажей в «Ткачах» — пролетарии, борющиеся за свои права. В отличие от большинства пьес любого периода, как неоднократно отмечалось в литературной критике и введениях, в пьесе нет истинного центрального персонажа, что предоставляет широкие возможности для ансамблевой игры. Вместо героя Гауптман создал толпу. Эта толпа, следовательно, является протагонистом — или главным персонажем — и если отдельные личности и выходят из рядов, то они не выдвигаются на передний план надолго. Историческим фоном послужило восстание ткачей в 1840-х годах в [SCOPE.sState('manzoni_weberaufstand_state').GetCustom('RU_SL_PP')]."
 manzoni.1305.g: "В Германии даже кровавая трагедия становится культурным достоянием."
 maria_luigia_died_tt: "#O Мария-Луиза Пармская#! умирает."
 je_manzoni_lucca: "Судьба Лукки"
 je_manzoni_lucca_reason: "Венский конгресс столкнулся с некоторыми проблемами во время Реставрации в 1815 году. К ним относился вопрос о восстановлении Бурбонов в Парме и апанаже для жены Наполеона Марии-Луизы, урождённой Габсбург. Бурбонам в Парме было пожаловано королевство Этрурия после того, как Бонапарт включил Парму в состав Французской империи; однако Этрурия должна была уступить место восстановлению Тосканы под властью наследника Габсбургов. Компромисс состоял в том, что принцы дома Бурбон-Парма могли претендовать на герцогство Лукка, в то время как Мария-Луиза могла сохранить Парму в качестве апанажа до своей смерти. После смерти Марии-Луизы дом Бурбон-Парма должен был вернуться в Парму, а Лукка переходила к Тоскане."
 manzoni.901.t: "Судьба Лукки"
 manzoni.901.d: "Согласно положениям Венского конгресса, дом Бурбон-Парма вновь взошёл на престол в Парме после смерти Марии-Луизы Габсбургской. Взамен Лукка должна быть уступлена Тоскане."
 manzoni.901.f: "Венский конгресс столкнулся с некоторыми проблемами во время Реставрации в 1815 году. К ним относился вопрос о восстановлении Бурбонов в Парме и апанаже для жены Наполеона Марии-Луизы, урождённой Габсбург. Бурбонам в Парме было пожаловано королевство Этрурия после того, как Бонапарт включил Парму в состав Французской империи; однако Этрурия должна была уступить место восстановлению Тосканы под властью наследника Габсбургов. Компромисс состоял в том, что принцы дома Бурбон-Парма могли претендовать на герцогство Лукка, в то время как Мария-Луиза могла сохранить Парму в качестве апанажа до своей смерти. После смерти Марии-Луизы дом Бурбон-Парма должен был вернуться в Парму, а Лукка переходила к Тоскане."
 manzoni.901.g: "Да здравствует [SCOPE.sCharacter('manzoni_ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('manzoni_ruler_scope').GetFullName]!"
 manzoni.902.g: "Лукка наконец-то наша."
 manzoni_italian_irredenta_decision: "Ирредентистская Италия"
 manzoni_italian_irredenta_decision_desc: "Исторически Далмация, Ионические острова, Мальта и Корсика были частью итальянской родины. Корсика принадлежала Генуе, Мальта — Сицилии, а Далмация и Ионические острова входили в состав Венецианской республики. В этих регионах до сих пор существуют итальянские общины. После славного объединения Италии и достигнутого нами великого прогресса пришло время вернуть последние итальянские территории, которые всё ещё находятся под иностранным правлением. В последний раз мы должны воскликнуть: Va fuori, stranier'!"
 united_italian: "Итальянцы"
 je_manzoni_italianization: "Итальянизация"
 je_manzoni_italianization_reason: "После объединения Италии Массимо д'Адзельо сказал: «Мы создали Италию, теперь мы должны создать итальянцев». Хотя это высказывание исторически сомнительно, оно всё же точно отражает истину о том, что после политического объединения Италии внутреннее единство было далеко не стабильным. Это относится не только к югу, где бесчинствовали разбойники, — даже на севере, за пределами буржуазной элиты, большинство людей всё ещё ощущали связь со своей региональной идентичностью. Совместные войны, национальная система образования, общая военная служба и строительство национальных институтов, таких как казармы, военные порты и административные учреждения, скорее всего, обеспечат появление в ближайшие несколько лет значительно более сильной общеитальянской идентичности в результате трудного процесса национального единения."
 manzoni_italian_consiousness_capital_tt: "Местное североитальянское и южноитальянское население нашей столицы становится единым итальянским народом. Она будет преобразована в итальянскую родину. Наша основная культура изменится на итальянскую, и мы сможем итальянизировать всю страну."
 je_manzoni_italianization_goal: "Прогресс в формировании #O национальной идентичности#! достигает #G 250#!."
 je_manzoni_italianization_ai: "Итальянизация"
 je_manzoni_italianization_ai_reason: "После объединения Италии Массимо д'Адзельо сказал: «Мы создали Италию, теперь мы должны создать итальянцев». Хотя это высказывание исторически сомнительно, оно всё же точно отражает истину о том, что после политического объединения Италии внутреннее единство было далеко не стабильным. Это относится не только к югу, где бесчинствовали разбойники, — даже на севере, за пределами буржуазной элиты, большинство людей всё ещё ощущали связь со своей региональной идентичностью. Совместные войны, национальная система образования, общая военная служба и строительство национальных институтов, таких как казармы, военные порты и административные учреждения, скорее всего, обеспечат появление в ближайшие несколько лет значительно более сильной общеитальянской идентичности в результате трудного процесса национального единения."
 je_manzoni_italianization_ai_goal: "Прогресс в формировании #O национальной идентичности#! достигает #G 250#!."
 je_manzoni_italian_national_identity: "Итальянская идентичность"
 je_manzoni_italian_national_identity_reason: "После нескольких лет сближения и нескольких реформ чувство принадлежности к общеитальянской идентичности всё больше распространяется среди населения. Это чувство будет распространяться из региона в регион, независимо от того, как государство установит соответствующие рамки: регионы, хорошо обслуживаемые правительственными администрациями, университетами, казармами или военно-морскими базами, с большей вероятностью разовьют общеитальянскую идентичность благодаря своей интеграционной функции. Сильно урбанизированные районы с большей вероятностью примут концепцию, которая ранее исследовалась только интеллектуалами. При идеальных обстоятельствах одно подчинённое государство могло бы принимать новую идентичность каждый год. Если все итальянцы в национальном государстве почувствуют себя таковыми, это также повлияет на итальянцев за рубежом, которые тогда всё чаще будут чувствовать себя нашими соотечественниками за границей, а не ломбардцами, сицилийцами или тосканцами."
 manzoni.911.t: "Итальянское самосознание в [SCOPE.sState('united_italian_culture_state').GetCustom('RU_SL_PP')]"
 manzoni.911.d: "После многих лет социального и политического влияния население в [SCOPE.sState('united_italian_culture_state').GetCustom('RU_SL_PP')] развило чувство принадлежности ко всему итальянскому полуострову. Теперь они полностью привержены общеитальянской идентичности."
 manzoni.911.f: "«Итальянцы хотели создать новую Италию, но остаться прежними итальянцами, с опасениями и моральными невзгодами, которые были их наследием с древних времён; потому что они думают о реформировании Италии, и никто не понимает, что для достижения этого они должны сначала реформировать себя». — Массимо д'Адзельо"
 manzoni.911.g: "Старая мечта Макиавелли становится реальностью!"
 manzoni_italian_consiousness_tt: "Местное североитальянское и южноитальянское население становится единым итальянским народом. Североитальянские и южноитальянские родины будут преобразованы в итальянские родины."
 manzoni.912.t: "Общеитальянское самосознание"
 manzoni.912.d: "Теперь, когда всё население Италии больше не видит себя в первую очередь принадлежащим к своей региональной идентичности, а к своей национальной идентичности, это оказывает влияние не только на итальянцев дома, но и во всём мире."
 manzoni.912.f: "С созданием итальянского национального государства и утверждением общеитальянской идентичности те итальянцы, что находятся за его пределами — будь то эмигранты по всему миру или коренные жители под иностранным правлением — также будут идентифицировать себя в первую очередь как итальянцы."
 manzoni.912.g: "Мы создали итальянцев!"
 manzoni_pan_italian_identity_tt: "Во всём мире всё североитальянское и южноитальянское население теперь будет идентифицировать себя как общеитальянский народ. Североитальянские и южноитальянские родины по всему миру станут только итальянскими родинами."
 manzoni.913.d: "Теперь, когда всё население Италии больше не видит себя в первую очередь принадлежащим к своей региональной идентичности, а к своей национальной идентичности, это оказывает влияние не только на итальянцев дома, но и во всём мире. В нашей стране также возникает стремление идентифицировать себя как итальянцев, вместо того чтобы просто ссылаться на региональное происхождение, как это было ранее."
 manzoni.913.g: "Вы хотите сказать, что нет разницы между сицилийским рыбаком и трентинским пастухом?"
 rule_manzoni_united_cultures_rule: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon! #! Культурное слияние"
 setting_manzoni_united_cultures_rule: "Культурное слияние: #G включено#!"
 setting_manzoni_united_cultures_rule_desc: "Итальянизация, германизация и швейцаризация возможны: отдельные культуры могут сливаться в итальянскую, немецкую и швейцарскую. Это улучшает производительность в ходе игры, но может привести к несовместимости с другими модами."
 setting_manzoni_no_united_cultures_rule: "Культурное слияние: #R отключено#!"
 setting_manzoni_no_united_cultures_rule_desc: "Итальянизация, германизация и швейцаризация #R невозможны#!. Это улучшает совместимость с другими модами, но не оказывает положительного влияния на производительность в ходе игры."
 manzoni_brigants_modifier: "Разбойничество"
 manzoni_anti_regionalism_ig_modifier: "Антирегионализм"
 manzoni_anti_regionalism_country_modifier: "Антирегионализм"
 manzoni_linguistic_impurity_modifier: "Языковая нечистота"
 manzoni_no_foscolo_modifier: "В Фосколо отказано"
 manzoni.914.t: "[SCOPE.sCharacter('manzoni_character_scope').GetLastName] поддерживает итальянское дело"
 manzoni.914.d: "На волне растущего призыва к общеитальянской идентичности [SCOPE.sCharacter('manzoni_character_scope').GetFullName] полностью отождествил[SelectLocalization(SCOPE.sCharacter('manzoni_character_scope').IsFemale, 'а', '')] себя с идеалами Рисорджименто. [SelectLocalization(SCOPE.sCharacter('manzoni_character_scope').IsFemale, 'Она', 'Он')] считает своё происхождение вторичным и подчёркивает свою национальную итальянскую идентичность."
 manzoni.914.f: "Ещё до объединения Италии интеллектуальная элита в основном идентифицировала себя как итальянцы и рассматривала региональное происхождение лишь как фольклор. С момента объединения это осознание распространилось особенно в итальянских вооружённых силах — армия и флот стали «школой нации». В политике централистские силы с самого начала одержали верх над регионалистскими."
 manzoni.914.g: "Дни кампанилизма сочтены."
 manzoni.915.t: "Разбойники в [SCOPE.sState('manzoni_brigant_state').GetCustom('RU_SL_PP')]"
 manzoni.915.d: "Тяжёлые условия в [SCOPE.sState('manzoni_brigant_state').GetCustom('RU_SL_PP')] привели к тому, что [SCOPE.sCharacter('manzoni_brigant_character').GetFullName] набирает всё больше людей без перспектив, в свою банду. Теперь они сеют хаос в окрестностях — до такой степени, что разбойники стали настоящей проблемой. Среди простого народа даже находятся сторонники, которые видят в них противников правительства и растущей итальянизации, а следовательно, политических и региональных борцов сопротивления."
 manzoni.915.f: "Разбойничество в Южной Италии в той или иной форме существовало с древних времён. Однако его происхождение как преступников, нападающих на случайных путешественников, позднее значительно изменилось, приняв форму политического движения сопротивления. После завоевания Королевства Обеих Сицилий в 1861 году Савойским королевством Сардиния (позднее Королевство Италия) возникла самая известная форма разбойничества в этом регионе. Среди разбойников были люди разного происхождения и с разными мотивами; в их число входили бывшие заключённые, бандиты и другие люди, которых итальянское правительство считало обычными преступниками, а также бывшие солдаты и лоялисты бурбонской армии. Они совершали нападения не только на итальянские власти и землевладельческую верхушку, но и на простых людей, часто грабя деревни, города и фермы, а также совершая вооружённые ограбления как отдельных лиц, так и групп, включая фермеров, горожан и конкурирующие банды разбойников."
 manzoni.915.g: "Ещё один бандит, выдающий себя за Робин Гуда!"
 manzoni.916.t: "Опасения за региональное наследие"
 manzoni.916.d: "Простые люди в [SCOPE.sState('manzoni_regionalist_state').GetCustom('RU_SL_PP')] опасаются, что новые национальные итальянские институты и популяризация итальянского языка могут уничтожить традиционный уклад жизни. [SCOPE.sCharacter('manzoni_rural_leader_scope').GetFullName] утверждает, что особое наследие региона не должно игнорироваться и что гомогенизация Италии зашла слишком далеко."
 manzoni.916.f: "С провалом революции 1848–1849 годов неогвельфы, как ведущая сила итальянского движения за единство, фактически лишились власти. Изначально они выступали за федеративное устройство Италии под председательством папы primus inter pares. В ответ на это абсолютное превосходство получили централистские круги — явление, которое оставалось преобладающим вплоть до XX века. Региональные особенности больше не принимались во внимание, а наоборот, региональные чувства рассматривались как опасные тенденции, которые могли разрушить усилия Италии по объединению."
 manzoni.916.g: "[SCOPE.sState('manzoni_regionalist_state').GetName] — такой же итальянский регион, как и любой другой."
 manzoni.916.h: "Мы должны принять во внимание это особое наследие."
 manzoni.917.t: "Диалекты или языки?"
 manzoni.917.d: "Ведущие учителя, лекторы и профессора нашей страны высказались за особое содействие внедрению итальянского языка не только в государственных учреждениях, но и в повседневной жизни. Это должно значительно улучшить научные и политические процессы в новой Италии, но среди населения, особенно сельского, это крайне непопулярное требование, поскольку люди там продолжают говорить исключительно на диалекте."
 manzoni.917.f: "Ещё в XVIII веке не было сомнений в том, что отдельные языковые разновидности итальянского полуострова являются независимыми языками. Не только тосканский имел большой престиж благодаря Данте Алигьери. Венецианский был официальным и письменным языком Венецианской республики, на венецианском писались пьесы, такие как у Карло Гольдони, и литература, которая также имела особое значение как лингва-франка в Адриатическом регионе. Нечто подобное можно сказать и о неаполитанском. Однако в XIX веке возобладало мнение, что существует только одна стандартная итальянская разновидность и что все остальные языки в Италии — всего лишь диалекты, хотя итальянский, на котором говорили на севере, уже имел особый лингвистический статус. Однако в ходе политических движений всё больше утверждалась реальность: язык отличается от диалекта тем, что у первого есть флот и армия."
 manzoni.917.g: "Наше языковое разнообразие — наше достояние."
 manzoni.917.h: "Говорите по-итальянски, говорите ясно. Остальное — лишь диалекты."
 manzoni.918.t: "Судьба Фосколо"
 manzoni.918.d: "По мере того как национальные чувства становятся всё более очевидными, раздаются голоса, призывающие перевезти тело великого итальянского поэта Уго Фосколо из Великобритании в Италию."
 manzoni.918.f: "Новая итальянская нация искала ориентиры: исторические события, а также исторических личностей. Идея создания усыпальницы художников, учёных и других великих личностей по образцу Пантеона, подобно тому, что во Франции, возникла на раннем этапе. Санта-Кроче во Флоренции, которая ранее служила местом захоронения выдающихся граждан, казалась подходящим местом для этого. Такие личности, как Макиавелли, Микеланджело и Галилей, давно были скорее итальянцами, чем тосканцами. Уго Фосколо, поэт венецианского происхождения с острова Закинф, жил в революционные годы и считается определяющей фигурой раннего итальянского либерализма и национализма. Он стал бы идеальным дополнением к этой галерее великих итальянских умов. Однако Фосколо умер в изгнании в 1827 году — в Тёрнем-Грин близ Лондона."
 manzoni.918.g: "Попросить их отдать нам Фосколо."
 manzoni.918.h: "Нам будет неловко, если они откажут."
 manzoni.919.d: "Итальянское правительство обратилось с просьбой о передаче тела знаменитого поэта и борца за итальянский национализм, Уго Фосколо."
 manzoni.919.g: "Пусть забирают своего мелкого поэтишку. Как его там звали?"
 manzoni.919.h: "Этот Фосколо остаётся здесь."
 manzoni.920.t_foscolo: "Возвращение Фосколо"
 manzoni.920.d_foscolo: "Британское правительство дало согласие — тело Фосколо скоро вернётся на итальянскую землю и найдёт своё последнее пристанище в церкви Санта-Кроче!"
 manzoni.920.f_foscolo: "Возвращение Уго Фосколо в Италию считается одним из первых ключевых моментов для молодого национального государства. Фосколо чествовали как вернувшегося героя; его похороны были похожи на процессию — с плачущими и ликующими людьми. С «Пантеоном» великих итальянских личностей в Санта-Кроче был открыт опорный пункт итальянского национализма, на который люди могли ориентироваться. Итальянские герои должны были стать центром этой идеологии, а не католические святые."
 manzoni.920.g: "Великий итальянец возвращается домой!"
 manzoni.920.t_no_foscolo: "Фосколо остаётся в изгнании"
 manzoni.920.d_no_foscolo: "К сожалению, британское правительство воспрепятствовало возвращению Уго Фосколо в Италию, используя несколько лицемерных предлогов."
 manzoni.920.f_no_foscolo: "У них действительно хватило наглости назвать великого итальянского поэта «этот Фосколо»!"
 manzoni.920.h: "Эти сыновья одноногой коровы отказывают нам в нашем Фосколо!"
 manzoni_gbr_hits_ita_prestige_tt: "Это нанесёт удар по престижу Италии."
 manzoni_roma_aeterna_decision: "Вечный Рим"
 manzoni_roma_aeterna_decision_desc: "Рим, Вечный город, был единственной истинной столицей Италии со времён Римской империи. Поэтому мы можем перенести туда наше правительство без каких-либо недостатков. Если в старой столице у нас есть зоопарк, музей или обсерватория, они будут там демонтированы, но мы немедленно получим соответствующую замену в новой столице."
 manzoni.910.t: "Вечный Рим"
 manzoni.910.d: "Только с переносом столицы в Рим Италия может называть себя истинной столицей всех итальянцев. Воистину, теперь Италия может носить шлем Сципиона!"
 manzoni.910.f: "«Когда падёт Колизей, падёт и Рим;\nА когда падёт Рим — падёт и Мир». — Лорд Байрон"
 manzoni.910.g: "Рим — столица мира."
