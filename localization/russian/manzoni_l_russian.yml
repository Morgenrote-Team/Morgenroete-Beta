 manzoni.921.t: "Итальянская музыкальная культура"
 manzoni.921.d: "Италия считается одной из стран, сыгравших решающую роль в развитии музыкальной культуры — будь то в области изготовления инструментов, в развитии оперы, в подготовке знаменитых певцов или в лице великих композиторов. В музыкальном плане, по меньшей мере со времён Ренессанса, полуостров отличался уникальной музыкальной культурой, которая покорила всю Европу и давала новые импульсы. Тот факт, что до XIX века итальянский был единственным оперным языком, свидетельствует об этом великом наследии."
 manzoni.921.f: "«Дайте мне счёт из прачечной, и я положу на музыку даже его». — Джоаккино Россини"
 manzoni.921.g: "У Италии богатая музыкальная история."
 manzoni.921.h: "Будущее принадлежит итальянской музыкальной культуре!"
 manzoni.922.t: "Культ Данте"
 manzoni.922.d: "Данте Алигьери считается высшим символом итальянской культуры, а его «Божественная комедия» — одним из классических произведений мировой литературы и важнейшим литературным свидетельством Средневековья. Поклонение Данте превратилось в настоящий культ среди патриотов и в то же время рассматривается как доказательство для внешнего мира, что общеитальянское чувство существовало задолго до Рисорджименто — в конце концов, именно Данте первым определил границы Италии как область, где говорят на языке «Sì». Во Флоренции должен быть воздвигнут памятник, увековечивающий «верховного поэта»."
 manzoni.922.f: "«Земную жизнь пройдя до половины,\nЯ очутился в сумрачном лесу,\nУтратив правый путь во тьме долины». — Данте Алигьери"
 manzoni.922.g: "Поддержать культ Данте и построить памятник во Флоренции."
 manzoni.922.h: "И мучить будущие поколения терцинами?"
 manzoni_italian_consiousness_2_tt: "Местное корсиканское, тичинское, мальтийское и романшское население становится единым итальянским народом. Их родины будут преобразованы в итальянские родины."
 je_manzoni_italian_greater_national_identity: "Наследие Данте"
 je_manzoni_italian_greater_national_identity_reason: "Где заканчивается итальянская идентичность? Для Данте всё было ясно: с языком! И даже для многих патриотов, далёких от сердца итальянской культуры, оставалось ясным, каковы не только истинные границы, но и истинный язык. Отступники-народы Альп с их грубой латынью и корсиканцы под игом французов с их тосканским языком также должны стать частью нации — не только политически, но и духовно. Мальта — исключение, но потерянный итальянский народ скоро вновь выучит свой язык, как ребёнок, которого слишком надолго отняли у матери."
 manzoni.924.t: "Язык «Sì»"
 manzoni.924.d: "Спустя 500 с лишним лет после того, как Данте Алигьери определил языковые границы Италии, это языковое сообщество теперь стало национальным. От альпийских долин до Мальты, от побережий Сардинии и Корсики до Истрии, существует единое итальянское языковое сообщество, которое несёт наследие величайшего поэта."
 manzoni.924.f: "Неаполитанский? Итальянский диалект. Венецианский? Итальянский диалект. Корсиканский? Итальянский диалект. Ладинский? Итальянский диалект. Романшский? Итальянский диалект. Мальтийский? Что-то вроде итальянского диалекта с семитской лексикой."
 manzoni.924.g: "Италия теперь объединена и лингвистически!"
 manzoni_italian_irredenta_decision_tt: "Принято решение #YELLOW «Ирредентистская Италия»#!."
 manzoni.925.t: "Корсиканцы интегрированы"
 manzoni.925.d: "Корсиканский язык и культура теперь полностью интегрированы в итальянскую. Изолированная итальянская культура вернулась домой."
 manzoni.926.t: "Тичинцы интегрированы"
 manzoni.926.d: "Тичинский язык и культура теперь полностью интегрированы в итальянскую. Изолированная итальянская культура вернулась домой."
 manzoni.927.t: "Мальтийцы интегрированы"
 manzoni.927.d: "Мальтийский язык и культура теперь полностью интегрированы в итальянскую. Изолированная итальянская культура вернулась домой."
 manzoni.928.t: "Романши интегрированы"
 manzoni.928.d: "Романшский язык и культура теперь полностью интегрированы в итальянскую. Изолированная итальянская культура вернулась домой."
 manzoni.925.f: "«Ибо одни говорят утвердительно Oc, другие Oil, третьи Si, а именно испанцы, французы и латиняне. Но есть признак того, что языки этих трёх народов происходят от одного и того же диалекта, потому что они называют многие вещи одинаковыми выражениями, например Deum, Caelum, Amorem, Mare, Terram и Vivit, Moritur, Amat, почти всё остальное. Из них те, кто говорил Oc, занимают западную часть южной Европы, начиная от границ генуэзцев. Но те, кто говорит Si, занимают восточную часть от вышеупомянутых границ, а именно до того мыса Италии, где начинается Адриатическое море, и до Сицилии». — Данте Алигьери"
 manzoni.925.g: "Добро пожаловать, братья!"
 je_manzoni_italian_greater_national_identity_tt: "Все корсиканские, тичинские, мальтийские и романшские родины были преобразованы в итальянские родины."
