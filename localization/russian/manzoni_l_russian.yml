l_russian:
 manzoni.1000.t: "Артур Конан Дойл, «Этюд в багровых тонах»"
 manzoni.1000.d: "Детектив, раскрывающий преступления с помощью логики и силы разума. Этот Шерлок Холмс — поистине выдающийся персонаж. Какую же интересную идею придумал Артур Конан Дойл."
 manzoni.1000.f: "«Проще догадаться, чем объяснить, почему я это знаю. Если бы вас попросили доказать, что дважды два — четыре, вы бы столкнулись с трудностями, хотя и совершенно уверены в этом факте».\n— Артур Конан Дойл, «Этюд в багровых тонах»"
 manzoni.1000.a: "Элементарно, мой дорогой Ватсон."
 manzoni.1100.g: "Хотел бы я жить в Альпах!"
 manzoni.1101.g: "Я сужу о людях по их внешности или по их характеру?"
 manzoni.1102.g: "Может, и я тоже смогу обрести самореализацию, если буду прислушиваться к авторитетам?"
 manzoni.1103.g: "Неужели мой внутренний волк тоже рычит?"
 manzoni.1104.g: "Могу я ещё почитать графические романы?"
 manzoni.1200.t: "Алессандро Мандзони, «Обручённые»"
 manzoni.1200.d: "«Обручённые» — исторический роман итальянского писателя Алессандро Мандзони, впервые опубликованный в 1827 году в трёх томах. Это был первый итальянский исторический роман, ставший образцом для последующей художественной литературы и основой современного итальянского языка. В начале XIX века всё ещё велись споры о том, какую форму должен принять стандартный литературный язык Италии. Мандзони, уроженец Милана, твёрдо стоял за флорентийский диалект и, «прополоскав своё бельё в реке Арно» (как он сам выразился), переработал язык романа для его переиздания в 1842 году."
 manzoni.1200.f: "Действие романа разворачивается в северной Италии в 1628 году. В центре сюжета — двое молодых людей, Ренцо и Лючия, которые живут в деревне на озере Комо и хотят пожениться. Однако им мешает и преследует их местный феодал, положивший глаз на Лючию, из-за чего им приходится бежать из своей деревни. Многие выражения, цитаты и имена из романа до сих пор широко используются в итальянском языке, например, Перпетуя (означающее домработницу священника) или «Этой свадьбе не бывать» (используется иронически). Роман по-прежнему считается настоящим шедевром мировой литературы. Поскольку действие книги происходит в период испанской оккупации, «Обручённых» часто интерпретировали как скрытый выпад против австрийского правления в Италии XIX века."
 manzoni.1200.g: "Кому есть дело до какого-то глупого итальянского романа?"
 manzoni.1200.h: "Вершина итальянской культуры!"
 manzoni.1202.t: "Джакомо Леопарди, «Дрок»"
 manzoni.1202.d: "Джакомо Леопарди создал выдающиеся и знаменитые поэтические произведения, относящиеся к эпохе романтизма. Вместе с Алессандро Мандзони Леопарди оказал огромное влияние на итальянский язык и был одной из ведущих фигур патриотических движений в Италии, хотя и относился сдержанно к национализму и вере в прогресс. Он часто писал о поэзии в целом и о своём собственном представлении о ней, её языке и предназначении. Леопарди умер в 1837 году в возрасте всего 38 лет."
 manzoni.1202.f: "«Дрок» — предпоследнее лирическое стихотворение Джакомо Леопарди. Оно начинается с описания склонов Везувия — вулкана, который в 79 году н. э. извергся, посеяв разрушение и смерть там, где когда-то стояли виллы, сады и большие, процветающие города. С этого момента поэт обращается к дроку, который становится привилегированным собеседником в его поэтическом дискурсе: предаваясь воспоминаниям, Леопарди говорит цветку, что уже видел его в пустынной сельской местности. Таким образом, дрок считается символом красоты и стойкости перед лицом разрушения. Но даже дрок в какой-то момент должен будет склониться перед неизбежным, чем стихотворение подчёркивает бренность человеческого существования в противовес силам природы. Тем самым Леопарди высмеивает идею господства человека над природой или превознесения материального богатства и власти над высшими идеалами."
 manzoni.1202.g: "Как меланхолично."
 manzoni.1203.t: "Джозуэ Кардуччи, «Новые стихи»"
 manzoni.1203.d: "Джозуэ Кардуччи считался официальным национальным поэтом современной Италии, являясь частью общей культурной и политической жизни. Кардуччи был популярным лектором и яростным критиком литературы и общества. Его сборники «Новые стихи» и «Варварские оды» содержат его величайшие произведения. Он также перевёл на итальянский язык некоторые произведения Гёте и Гейне. За год до своей смерти Кардуччи стал первым итальянцем, получившим Нобелевскую премию по литературе."
 manzoni.1203.f: "В сборнике «Новые стихи», которому предшествует «Интермеццо», запечатлены отголоски и мотивы Гюго, фон Платена, Гёте, Гейне, Бодлера и По. Содержание и формы в нём во многом заимствованы из предыдущих произведений, но являются более глубокими и зрелыми. Среди тем, возникающих в «Новых стихах», важное место занимает культ прошлого и исторических воспоминаний, где мечта о создании эгалитарного и либерального общества ощущается прежде всего через восхваление эпохи коммун, которые берутся в качестве примера нравственного здоровья и гражданской жизни. Другим примером демократического развития, взятым Кардуччи, является Французская революция, которая вспоминается в двенадцати сонетах цикла «Ça ira»."
 manzoni.1203.g: "Но можно ли доверять человеку, написавшему гимн сатане?"
 manzoni.1204.t: "Джованни Пасколи, «Мирики»"
 manzoni.1204.d: "Джованни Пасколи учился в Болонском университете, где его учителем и наставником был Джозуэ Кардуччи. Пасколи, даже в период позитивизма и науки, верил, что жизнь — это тайна. Лишь символические ассоциации, обнаруживаемые в скромных вещах природы, могут позволить мельком увидеть истину за внешней видимостью. Его более поздние стихи затрагивают схожие темы, но более экспериментальны и отражают его знание классической античности. Они оказали большое влияние на последующих итальянских поэтов, которые включили его меланхоличные темы в свои собственные произведения. Пасколи писал как на итальянском, так и на латыни."
 manzoni.1204.f: "«Мирики» — сборник стихов Джованни Пасколи. Название сборника Пасколи происходит от части второго стиха IV буколики Вергилия. «Мирики» охватывают почти весь период поэтического творчества автора, так что историю их создания можно считать совпадающей с самим развитием поэтического сознания Пасколи. Поэзия «Мирик» представляет собой символическое видение мира с интуицией и раскрытием аналогий и таинственных соответствий между вещами, ощущение жизни, полное недоумения и растерянности. Чувство тайны жизни, тоска, смерть и меланхолия — широко распространённые аспекты в поэзии Пасколи, в которой также присутствует тема гнезда как метафоры дома."
 manzoni.1204.g: "Маленький великий поэт."
 manzoni.1205.g: "Автор что, издевается над Зигмундом Фрейдом?"
 manzoni.1206.t: "Габриэле Д'Аннунцио, «Наслаждение»"
 manzoni.1206.d: "Габриэле Д'Аннунцио занимал видное место в итальянской литературе и политической жизни. Его прозвали Il Vate (Поэт) и Il Profeta (Пророк). В своих литературных произведениях Д'Аннунцио ассоциировался с декадентским движением, которое тесно переплеталось с французским символизмом и британским эстетизмом. На пике своего успеха Д'Аннунцио прославился оригинальностью, мощью и декадансом своего творчества. Его работы оказали огромное влияние по всей Европе и на поколения итальянских писателей."
 manzoni.1206.f: "«Наслаждение» был первым романом Д'Аннунцио. Подобно тому как веком ранее книга Уго Фосколо «Последние письма Якопо Ортиса» распространила в Италии романтическое течение и чувствительность, «Наслаждение» и его главный герой Андреа Сперелли ввели в итальянскую культуру конца девятнадцатого века декадентскую тенденцию и эстетизм. Д'Аннунцио положил начало новому типу психологической и интроспективной прозы, которой суждено было иметь большой успех и которая позволила ему исследовать заблуждения и невзгоды жизни «последнего потомка интеллектуальной расы»."
 manzoni.1206.g: "Это символизм или уже декаданс?"
 manzoni.1207.g: "Эта детская сказка определённо имела бы больший успех в виде фильма."
 manzoni.1208.g: "Патриотический роман для юных итальянцев!"
 manzoni_great_writer: "Великий писатель"
 manzoni_great_writer_desc: "Этот персонаж — один из величайших писателей своего времени. Он знаменит во всём мире благодаря своим литературным произведениям."
 manzoni_heine_bad_influence_modifier: "Генрих Гейне"
 manzoni_heine_very_bad_influence_modifier: "Генрих Гейне"
 manzoni_heine_banned_modifier: "Гейне запрещён"
 manzoni_heine_censored_modifier: "Гейне под цензурой"
 manzoni_heine_allowed_modifier: "Гейне опубликован"
 manzoni_censorship_machinery_modifier: "Цензурный аппарат"
 manzoni_mocked_by_heine_modifier: "Осмеян Генрихом Гейне"
 manzoni_michel_sleeps_modifier: "Немецкий Михель спит"
 manzoni_weaver_revolt_suppression_modifier: "Восстание ткачей подавлено"
 manzoni_weaver_revolt_negotiation_modifier: "Переговоры с ткачами"
