 je_manzoni_literary_circle: "Литературный кружок"
 je_manzoni_literary_circle_reason: "Если бы у нас была богатая литературная жизнь, выраженная не только в литературном салоне и многочисленных писателях, но и в общем настроении fin de siècle, создание литературного общества было бы лишь вопросом времени."
 manzoni.3.t_juvenile: "Детская литература"
 manzoni.3.t_crime: "Криминал и мистика"
 manzoni.3.t_adventure: "Приключенческие истории"
 manzoni.3.t_science: "Научная фантастика"
 manzoni.3.t_social: "Социальная критика"
 manzoni.3.t_literary: "Художественная литература"
 manzoni.3.t_devotional: "Религиозная литература"
 manzoni.3.t_romance: "Любовный роман"
 manzoni.3.d: "Фундаментальные изменения во [Concept('concept_manzoni_popular_taste', 'вкусах публики')], обусловленные политическими, социальными и культурными переменами в стране, привели к смене предпочтений в литературном [Concept('concept_manzoni_genre', 'жанре')] в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')]."
 manzoni.3.f_juvenile: "В XVII и XVIII веках пуритане в Англии и Америке издавали детские книги, пропитанные протестантской этикой. Некоторые из первых детских книг, которые несли не только чисто образовательное послание, но и развлекательную ценность, были опубликованы Джоном Ньюбери в 1740-х годах. Несколькими годами ранее Томас Борман написал «Гигантские истории». Тем не менее, моралистические ценности продолжали формировать многие детские книги до конца XIX века, хотя с середины XVIII века чисто религиозное послание всё чаще заменялось рациональным морализмом, пропагандируемым Локком и Руссо. С середины XIX века чистые фэнтези и приключенческие истории всё больше принимались как детская литература."
 manzoni.3.f_crime: "Хотя истоки криминального романа уходят вглубь веков, как литературный жанр он утвердился только в XIX веке. Обычно в центре внимания — преступление, его преследование и расследование полицией, детективом или частным лицом. Возможности описания психологических моментов, движущих преступником, описания окружения или погружения следователя в его собственные муки совести также были обработаны в изысканной литературной манере. «Преступление и наказание» Фёдора Достоевского можно понимать как криминальный роман. Переход к триллеру и мистике может быть плавным."
 manzoni.3.f_adventure: "Приключенческая литература так же стара, как и сама литература. Её истоки можно проследить до античности, даже до Древнего Ближнего Востока. Средневековый артуровский роман и рыцарский роман считаются дальнейшими предшественниками современных приключенческих романов. Разнообразная приключенческая литература появилась с XIX века, наиболее известными представителями которой были Александр Дюма, Роберт Луис Стивенсон, Карл Май и Жюль Верн."
 manzoni.3.f_science: "Ещё до появления термина «научная фантастика» видения будущих технических разработок можно найти по крайней мере со времён Средневековья. Сам термин впервые был использован в 1851 году британским поэтом и эссеистом Уильямом Уилсоном. Параллельно с верой в науку в XIX веке возник страх перед наукой и технологиями. Эта вера и этот страх слились в эпохально новое и разделённое отношение к жизни, как к неомифическому титану, который боится собственной мощи. Именно поэтому появились дистопии, такие как у Олдоса Хаксли и Джорджа Оруэлла. Эта амбивалентность характеризует научную фантастику."
 manzoni.3.f_social: "Истоки современной социальной критики уходят по крайней мере в эпоху Просвещения. Художественная литература может оказывать значительное социальное влияние. Например, роман 1852 года «Хижина дяди Тома» Гарриет Бичер-Стоу способствовал развитию антирабовладельческого движения в Соединённых Штатах. Джордж Оруэлл и Чарльз Диккенс написали «Скотный двор» и «Повесть о двух городах» соответственно, чтобы выразить своё разочарование в обществе и человеческой природе."
 manzoni.3.f_literary: "Художественная литература часто используется как синоним литературы в узком смысле, то есть произведений, специально считающихся имеющими значительную художественную ценность. Художественная литература включает в себя классические книги, то есть произведения в любой дисциплине, которые были признаны образцовыми или заслуживающими внимания. Хотя художественная литература обычно считается художественно превосходящей жанровую, они не являются взаимоисключающими."
 manzoni.3.f_devotional: "Религиозная литература изначально описывает популярные произведения с религиозной мотивацией. Это не теологическая литература, поскольку она не преследует научных дискурсов и не имеет догматических намерений. Скорее, с изменениями нового времени произошла концентрация на внутреннем мире, что характеризовалось повышенным благочестием. Это было руководство к добродетельной жизни, которое должно было эмоционально возвышать дух."
 manzoni.3.f_romance: "Популярный любовный роман относится к обширному жанру тривиальной литературы, который нацелен в первую очередь на женскую аудиторию и чья структура в основном следует тривиальным, то есть легкодоступным, базовым образцам. Однако не каждый любовный роман можно отнести к тривиальной литературе, поскольку такие темы, как смерть детей, насилие, смертельные болезни или аналогично сложные темы, не могут быть легко тривиализированы."
 manzoni.3.g: "Вкусы и мода приходят и уходят."
 manzoni.10.t: "Новое издательство"
 manzoni.10.d: "[SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting] сегодня открыл[SelectLocalization(SCOPE.sCharacter('manzoni_publisher_scope').IsFemale, 'а', '')] двери, своего нового издательства, в [SCOPE.sState('manzoni_publisher_state').GetCustom('RU_SL_PP')]. Печатный станок грохочет с полудня. Общественная жизнь [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] стала на одну грань богаче."
 manzoni.10.f: "Новое издательство в [SCOPE.sState('manzoni_publisher_state').GetCustom('RU_SL_PP')] в настоящее время вызывает общественный интерес. [SCOPE.sCharacter('manzoni_publisher_scope').GetFullName] сегодня объявил[SelectLocalization(SCOPE.sCharacter('manzoni_publisher_scope').IsFemale, 'а', '')] в специально отпечатанной листовке, что его компания отныне будет выпускать на рынок многочисленные новые публикации. Новость распространилась чрезвычайно быстро, и перед зданием собрались зеваки. Уже циркулирует вопрос, на какой области специализируется новый издатель."
 manzoni.10.g: "Наверняка это издательство высокой литературы."
 manzoni.10.h: "Это же научное издательство, не так ли?"
 manzoni.10.i: "Думаю, этот издатель будет хорошо развлекать людей."
 manzoni.10.j: "Художественное издательство, это было бы здорово!"
 manzoni.11.t: "Массовое издательство"
 manzoni.11.d: "Благодаря [SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting] в [SCOPE.sState('manzoni_publisher_state').GetCustom('RU_SL_PP')] появилось одно из самых интересных и захватывающих издательств в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')]. Компания хочет расширяться и в будущем, а её владелец, [SCOPE.sCharacter('manzoni_publisher_scope').GetFullName], уже является одним из важнейших представителей отрасли."
 manzoni.11.f: "Коммерческое издательство может уделять больше внимания количеству, чем качеству, но это одно из новаторских учреждений XIX века: литература больше не является привилегией небольшого и богатого класса с несколькими книжными наименованиями, а становится продуктом, доступным всё более широкому кругу менее обеспеченных классов. С появлением массового издательства приходит не только обслуживание масс, но и массовый успех."
 manzoni.11.g: "Это издательство — краеугольный камень нашей книжной индустрии."
 manzoni.12.t: "Литературное издательство"
 manzoni.12.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] сегодня подписал[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'а', '')] издательский контракт с издательством [SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting]. Компания со штаб-квартирой в [SCOPE.sState('manzoni_publisher_state').GetCustom('RU_SL_PP')], скорее всего, станет одним из самых востребованных адресов для литературы."
 manzoni.12.f: "Престижное литературное предприятие — венец любой издательской индустрии. Оно может быть оправдано, если [Concept('concept_manzoni_national_writer', 'национальный писатель')] сумеет достичь славы великого писателя. Как хранитель и распространитель его произведений, издательство будет оставаться точкой притяжения даже после его смерти."
 manzoni.12.g: "Это издательство — краеугольный камень наших литературных стандартов."
 manzoni.13.t: "Научное издательство"
 manzoni.13.d: "[SCOPE.sCharacter('manzoni_scientist_scope').GetFullName], своими новаторскими открытиями, уже некоторое время находят отклик в научном мире. [SelectLocalization(SCOPE.sCharacter('manzoni_scientist_scope').IsFemale, 'Её', 'Его')] трактаты и книги регулярно публикуются издательством [SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting]. Издательство объявило, что будет продолжать расширяться и станет одним из ведущих академических издательств в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')]."
 manzoni.13.f: "Научные издательства могут возникать из синергии между издательской индустрией и научной сферой — например, когда учёный пишет трактат. Издательство, специализирующееся на научной работе, также окажет важную поддержку студентам, надёжно передавая новейшие знания о новых открытиях и технологиях."
 manzoni.13.g: "Это издательство — краеугольный камень нашего академического общества."
 manzoni.14.t: "Художественное издательство"
 manzoni.14.d: "Издатель [SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting] объявил, что в скоро, под их началом, начнет публиковаться наш высокоуважаемый художник, [SCOPE.sCharacter('manzoni_artist_scope').GetFullName]. Это, вероятно, станет началом многообещающей художественной издательской компании национального значения."
 manzoni.14.f: "Если шедевр великого художника становится настолько важным, что кто-то его публикует, это может стать началом замечательного развития в мире искусства. Сборники нот или иллюстрированные книги — это не только прекрасные вещи для образованного непрофессионала, они служат вдохновением и учебным пособием для последующих поколений художников, которые хотят пойти по стопам великого мастера."
 manzoni.14.g: "Это издательство — краеугольный камень нашей культурной жизни."
 artists.52.h: "[SCOPE.sCharacter('manzoni_new_writer_scope').GetFullName] будет под нашим пристальным вниманием!"
 manzoni.101.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]: [SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_bestseller_title_work_type')]"
 manzoni.101.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_local_or_national_short_text_type')] создал[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'а', '')] [Concept('concept_manzoni_bestseller', 'бестселлер')] в жанре [SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_work_type')]. История под названием [SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_bestseller_title_work_type')] — это [SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_work_type')] в жанре [SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_work_genre_type')]."
 manzoni.101.f: "[SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_bestseller_flavor_work_type')]"
 manzoni.101.g: "Фантастика!"
 manzoni.201.g: "Я обожаю эту книгу!"
 manzoni.102.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName]: Всемирная слава"
 manzoni.102.d: "Наш писатель, [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], считается уважаемым автором не только на родине, но и за рубежом. [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'Её', 'Его')] произведения теперь считаются мировой литературой!"
 manzoni.102.f: "Известные издатели по всему миру включили произведения нашего художника в свои программы. Тем самым он достигает аудитории, которая простирается далеко за наши границы. Книжные лицензии теперь — весьма востребованный товар."
 manzoni.102.g: "Надеюсь, это не вскружит [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'ей', 'ему')] голову."
 manzoni_universal_writer: "Писатель мирового уровня"
 manzoni_universal_writer_desc: "Этот писатель считается автором мировой литературы."
 manzoni_writer_local_or_national_short_text_national_writer_loc: "Наш национальный писатель, [ROOT.GetCharacter.GetFullName], "
 manzoni_writer_local_or_national_short_text_local_writer_loc: "[ROOT.GetCharacter.GetFullName], #tooltippable_name [GetPlayer.GetAdjective|l]ый#! писатель, "
 manzoni.301.t: "#tooltippable_name [SCOPE.sCulture('print_addict_culture').GetCustom('RU_CUL_ADJ')]ая#! библиомания"
 manzoni.301.d: "В [GetPlayer.GetAltNameNoFlag('RU_CL_PP')] процветает книжная индустрия и имеется представительная литературная элита. Хорошо образованные граждане страны всё больше интересуются культурной жизнью. Некоторые уже говорят о настоящей зависимости от письменного слова — голод по печатному и написанному кажется безграничным. [SCOPE.sCulture('print_addict_culture').GetName] особенно подвержены зарождающейся тенденции."
 manzoni.301.f: "Термин «библиомания» относится к чрезмерной страсти к коллекционированию книг, которая проявляет признаки зависимости и/или обсессивно-компульсивного расстройства. В отличие от безобидной библиофилии, которая часто сопровождает накопление частной библиотеки, библиомания включает в себя либо аспект компульсивного накопительства, либо финансовый крах, вызванный коллекционированием, либо совершение преступлений для удовлетворения библиомании. Первым известным случаем преступного библиомана в Германии был саксонский священник Иоганн Георг Тиниус. Он растрачивал церковные средства и совершил несколько покушений на убийство с целью ограбления (при этом он использовал наркотики), чтобы финансировать свою страсть к коллекционированию. Только аукционный каталог оставшейся библиотеки Тиниуса содержал 16 650 произведений. Примером библиотафа является граф де Линьероль, который, по слухам, с 1848 года полностью отошёл от общественной жизни и посвятил себя только расширению и поддержанию своей книжной коллекции, которую он хранил в специально оборудованной квартире в Париже. Он не делился своими знаниями с другими и даже отрицал владение определёнными книгами. Размер и ценность его коллекции стали очевидны только тогда, когда книги были выставлены на аукцион после его смерти."
 manzoni.301.g: "Но все знают, как опасно чтение!"
 manzoni.302.t: "Пик библиомании пройден?"
 manzoni.302.d: "В издательской отрасли намечается кризис: по-видимому, значительная часть населения потеряла желание читать, будь то из-за низкого качества книг или из-за изменения досуговых привычек."
 manzoni.302.f: "Там, за окном, есть мир без книг. Помощь возможна. Фильмы, спорт, алкогольная зависимость и азартные игры предлагают схожие стимулы и могут вернуть библиоманов к общественной жизни."
 manzoni.302.g: "Книги всё равно скучные."
 manzoni.302.h: "Начать кампанию по пробуждению любви к чтению!"
 manzoni.303.t: "Книжный клуб мадам [SCOPE.sCharacter('manzoni_bookmadame_scope').GetLastNameNoFormatting]"
 manzoni.303.d: "Влиятельная и образованная дама в [SCOPE.sState('manzoni_book_state').GetCustom('RU_SL_PP')] основала книжный клуб, который стал центром для любителей литературы. Жаждущие книг люди тянутся в это место."
 manzoni.303.f: "Хотя женщины создавали группы по изучению Библии с 1600-х годов, светские читательские кружки появились как в Америке, так и в Европе только в конце 1700-х годов. Читательские кружки не были ограничены определёнными расами или классами, и одна из первых читательских групп для чернокожих женщин была создана в Линне, штат Массачусетс, в 1827 году. В течение 1800-х годов женские читательские кружки расширялись, некоторые из них стали активно высказываться по социальным вопросам, таким как аболиционизм, предвещая клубное движение конца того века. Вплоть до 1900-х годов книжные клубы продолжали служить как интеллектуальным выходом, так и радикальным политическим инструментом."
 manzoni.303.g: "Фантастическая инициатива."
 manzoni.304.t: "Процветающая книжная индустрия"
 manzoni.304.d: "Перспективное издательство [SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting] в [SCOPE.sState('manzoni_book_state').GetCustom('RU_SL_PP')] превратилось в значимого игрока на рынке. По-видимому, его владелец [SCOPE.sCharacter('manzoni_publisher_scope').GetFullName] уловил дух времени."
 manzoni.304.f: "В прошлом [SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting] было именем только среди инсайдеров, которое сделало себе имя на небольшой печатной продукции. Однако малотиражные книги теперь стали любимцами публики, поэтому компания расширила свои подразделения и теперь хочет больше сосредоточиться на массовом вкусе. Критики уже видят нивелирование существующего качественного предложения, но это может быть просто тенденцией времени."
 manzoni.304.g: "Производить ещё больше книг!"
 manzoni.304.h: "Производить высококачественные книги."
 manzoni.311.t: "Издательство как пешка"
 manzoni.311.d: "Традиционное издательство в [SCOPE.sState('manzoni_book_state').GetCustom('RU_SL_PP')] находится на грани банкротства. Конкурирующее издательство сделало предложение, которое спасёт множество рабочих мест. Однако оно близко к оппозиционной партии, точнее, к #tooltippable_name #tooltip:[SCOPE.sCharacter('publisher_ig_leader').GetInterestGroup.GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.sCharacter('publisher_ig_leader').GetInterestGroup.GetCustom('RU_IG_DP')]#!#."
 manzoni.311.f: "Для медиамира стало шоком, когда на прошлой неделе крупное издательство объявило, что находится на грани банкротства и вынуждено будет уволить множество сотрудников. Казалось удачей, что вскоре нашлось другое издательство, которое захотело поглотить всю компанию и пообещало, что сокращений не будет. Однако есть подвох. За щедрым предложением стоят [SCOPE.sCharacter('publisher_ig_leader').GetInterestGroup.GetName], которая владеет большой долей в издательстве. Таким образом, слияние корпораций произойдёт под руководством политической партии. Критики уже отметили, что это может привести к значительному влиянию на медиарынок, которое затронет не только регион. Некоторые даже подозревают, что за этим делом стоит [SCOPE.sCharacter('publisher_ig_leader').GetFullName]."
 manzoni.311.g: "Если они спасут компанию, зачем нам ставить им палки в колёса?"
 manzoni.311.h: "Мы не можем допустить такого политического влияния!"
 manzoni.312.t: "Оппозиционное издательство"
 manzoni.312.d: "В [SCOPE.sState('manzoni_book_state').GetCustom('RU_SL_PP')] стало значимым одно издательство. Оно, по-видимому, хочет расширяться в ближайшем будущем и видит себя в первую очередь противовесом правительственной политике и близко к оппозиционным партиям. Некоторые члены правительства считают, что можно поставить несколько бюрократических препятствий на пути проблемной компании."
 manzoni.312.f: "«Мнения других и свобода слова — ценное достояние. Не должны ли мы ценить наши собственные слова ещё выше, сэр?»"
 manzoni.312.g: "Несколько административных актов могут усложнить их бизнес."
 manzoni.312.h: "Нам не нужны такие грязные трюки."
 manzoni.321.t: "Книжная лицензия"
 manzoni.321.d: "Писатель [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] из [SCOPE.sCountry('manzoni_country_scope').GetAltNameNoFlag('RU_CL_RP')] сегодня подписал эксклюзивный контракт с издательством [SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting]. Произведения [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'этой писательницы', 'этого писателя')] чрезвычайно популярны у публики."
 manzoni.321.f: "Издатели не могут игнорировать вкусы аудитории. Успешные авторы из-за рубежа, идущие в ногу со временем, имеют возможность быть опубликованными в нашей стране."
 manzoni.321.g: "Но почему люди не читают произведения отечественных авторов?"
 manzoni.322.t: "Зарубежная бульварная литература"
 manzoni.322.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] уже некоторое время публикует свои зарубежные произведения в местном издательстве. Критики сходятся во мнении, что эта бульварная литература весьма сомнительна и пагубно влияет на качество нашего книжного рынка. Однако этот китч продаётся как горячие пирожки."
 manzoni.322.f: "«Действительно ли стоит публиковать всё, что пишется? Стали бы вы играть любую музыку только потому, что кто-то нацарапал ноты на флейте? И почему детские рисунки висят на холодильнике, а не в галерее? Некоторые литературные излияния — это именно то: мусор!»"
 manzoni.322.g: "Запретить этот зарубежный мусор!"
 manzoni.322.h: "Если люди хотят это читать, значит, это не так уж и плохо."
 manzoni.323.t: "Пиратские копии"
 manzoni.323.d: "Представитель Министерства торговли [SCOPE.sCountry('manzoni_country_scope').GetAltNameNoFlag('RU_CL_RP')] сегодня пожаловался нам. Их национальный автор, [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], якобы публикуется в [SCOPE.sState('manzoni_book_state').GetCustom('RU_SL_PP')]. Но местное издательств не имеет лицензии и просто наживается на этом. Нас попросили прекратить это пиратство."
 manzoni.323.f: "К сожалению, в XVIII веке всё ещё было обычным делом, что авторов и их издателей обманывали, лишая их доходов, потому что конкуренты копировали произведения без согласия авторов. С XIX века вступили в силу улучшения, защищающие права авторов и издателей, но эти улучшения часто были возможны только на национальном уровне. Издатели за рубежом часто по-прежнему печатали копии и переводы без согласия авторов. Это затрагивало даже всемирно известных авторов, таких как Жюль Верн, чьи книги распространялись в англоязычных странах без разрешения и иногда были сильно изменены."
 manzoni.323.g: "Остановить печатные станки до заключения контракта."
 manzoni.323.h: "Литература — для всех."
 manzoni.331.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetLastName]: Международное читательское турне"
 manzoni.331.d: "Величайший писатель [GetPlayer.GetAltNameNoFlag('RU_CL_RP')], [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], после предварительных обсуждений с зарубежным издателем решил[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'а', '')] также почтить свою аудиторию за рубежом, читая собственные произведения. Первым пунктом назначения станет [SCOPE.sCountry('manzoni_writer_destination_scope').GetName]."
 manzoni.331.f: "Писатели могут отправиться в читательское турне один раз за свою карьеру. Пункты назначения соответствуют странам, где [Concept('concept_manzoni_popular_taste, 'вкусы публики')] совпадают с [Concept('concept_manzoni_genre', 'жанром')] автора. С каждой новой остановкой можно улучшить репутацию, [Concept('concept_manzoni_literary_tradition', 'литературные традиции')] и отношения. Писатель может посетить максимум 5 стран в своём турне. Турне также заканчивается, если больше нет стран, которые находят его [Concept('concept_manzoni_genre', 'жанр')] привлекательным."
 manzoni.331.g: "Удачи!"
 manzoni.332.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetLastName] прибывает в [GetPlayer.GetNameNoFlag]"
 manzoni.332.g: "Организовать встречу с местным издателем."
 manzoni.332.h: "Организовать публичное чтение в литературном салоне."
 manzoni.332.i: "Монарх желает частного представления произведений [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'писательницы', 'писателя')]."
 manzoni.332.j: "Оказать [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'ей', 'ему')] тёплый приём."
 manzoni.333.t: "Встреча литературных гигантов"
 manzoni.333.d: "Всемирно известный писатель [SCOPE.sCharacter('manzoni_writer_2_scope').GetFullName] и наш национальный писатель [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] встретились на презентации книги. Обмен мнениями был, очевидно, очень продуктивным."
 manzoni.333.f: "«Вы весьма велики».\n«Спасибо, вы тоже весьма велики».\n«Нет, это вы велики».\n«Нет, вы»."
 manzoni.333.g: "Вдохновляюще!"
 manzoni.334.t: "Ещё один пункт назначения?"
 manzoni.334.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] завершил[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'а', '')] своё пребывание за границей. Возникает вопрос, [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'должна ли она', 'должен ли он')] вернуться или выбрать новый пункт назначения."
 manzoni.334.f: "Писатели могут отправиться в читательское турне один раз за свою карьеру. Пункты назначения соответствуют странам, где [Concept('concept_manzoni_popular_taste, 'вкусы публики')] совпадают с [Concept('concept_manzoni_genre', 'жанром')] автора. С каждой новой остановкой можно улучшить репутацию, [Concept('concept_manzoni_literary_tradition', 'литературные традиции')] и отношения. Писатель может посетить максимум 5 стран в своём турне. Турне также заканчивается, если больше нет стран, которые находят его [Concept('concept_manzoni_genre', 'жанр')] привлекательным."
 manzoni.334.g: "[SCOPE.sCountry('manzoni_writer_destination_scope').GetName] был[SCOPE.sCountry('manzoni_writer_destination_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] бы хорошим пунктом назначения."
 manzoni.334.h: "[SCOPE.sCharacter('manzoni_writer_scope').GetLastName] [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'должна', 'должен')] вернуться."
 manzoni.341.t: "Литературный кружок"
 manzoni.341.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] сформировал[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'а', '')] кружок ведущих авторов страны в городе [ROOT.GetCountry.GetCapital.GetCityHubName]. Мероприятие привлекло большое общественное внимание. На эти периодические встречи возлагаются большие надежды."
 manzoni.341.f: "Литературные кружки всегда были влиятельными культурными учреждениями. Они могут быть довольно формальными, как французские поэты-парнасцы или немецкий Георгекрайс. Примером неформального литературного общества были «Инклинги», литературная дискуссионная группа, связанная с Дж. Р. Р. Толкином и К. С. Льюисом в Оксфордском университете на протяжении почти двух десятилетий между началом 1930-х и концом 1949 года. «Инклинги» были литературными энтузиастами, которые восхваляли ценность повествования в художественной литературе и поощряли написание фэнтези. Наиболее известными, помимо Толкина и Льюиса, были Чарльз Уильямс и (хотя и лондонец) Оуэн Барфилд."
 manzoni.341.g: "Это значительно повысит литературную культуру нашей страны."
 manzoni.341.h: "Это вдохновит новое поколение художников."
 manzoni.341.i: "Этот кружок окажет сильное влияние на наше общество."
 manzoni.400.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] критикует наше правительство"
 manzoni.400.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] недовол[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'ьна', 'ен')] политической ситуацией в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')]. Если мы не изменим нашу политику, [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'она', 'он')] может перестать быть нашим [Concept('concept_manzoni_national_writer', 'национальным писателем')]."
 manzoni.400.f: "«Это возмутительно! Это несправедливо!» — [SCOPE.sCharacter('manzoni_writer_scope').GetFullNameNoFormatting]"
 manzoni.400.g: "Может, нам стоит что-то изменить..."
 manzoni.400_tt: "Если [Concept('concept_approval', 'одобрение')] [Concept('concept_interest_group', 'заинтересованной группы')] [Concept('concept_manzoni_national_writer', 'национального писателя')] опустится ниже #n -2#!, он может уйти в отставку. У вас есть год, чтобы повысить [Concept('concept_approval', 'одобрение')]."
 manzoni.401.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] больше не является национальным писателем"
 manzoni.401.d: "Ситуация в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')] стала невыносимой для [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]. Поэтому [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'она', 'он')] решил[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'а', '')] уйти с поста нашего [Concept('concept_manzoni_national_writer', 'национального писателя')] и больше не быть лицом нашей нации."
 manzoni.401.f: "«С меня хватит! Вы — некомпетентные идиоты! Вам на нас наплевать! Вы нам не помогаете. Это абсолютно неприемлемо!» — [SCOPE.sCharacter('manzoni_writer_scope').GetFullNameNoFormatting]"
 manzoni.401.g: "О нет! Ну и ладно!"
 manzoni.500.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] сыт[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'а', '')] по горло правительством"
 manzoni.500.f: "«Нам нужны перемены! Люди страдают! Я сосредоточу свои произведения исключительно на изменении мира! Долой этих диктаторов!» — [SCOPE.sCharacter('manzoni_writer_scope').GetFullNameNoFormatting]"
 manzoni.500.g: "Хорошо."
 manzoni.500.h: "Сделать всё возможное, чтобы остановить [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'её', 'его')]"
 manzoni.500.i: "Нет."
 manzoni.500.j: "Хорошая шутка!"
 manzoni.510.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] сосредотачивается на писательстве"
 manzoni.510.d: "Поскольку политическая ситуация вполне благоприятна для #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('manzoni_writer_ig_scope').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('manzoni_writer_ig_scope').GetCustom('RU_IG_RP')]#!#, [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] решил[SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'а', '')], что сейчас самое время уйти в отставку и полностью сосредоточиться на писательстве — одной из [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'её', 'его')] страстей."
 manzoni.510.f: "«У меня наконец-то снова есть вдохновение! После всех этих лет борьбы за правое дело я наконец-то могу вернуться к писательству! О, мои истории будут фантастическими. Может, мне стоит написать историю о политике!» — [SCOPE.sCharacter('manzoni_writer_scope').GetFullNameNoFormatting]"
 manzoni.510.g: "Надеюсь, [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'она', 'он')] создаст фантастические произведения!"
 manzoni.510.h: "Думаю, [SelectLocalization(SCOPE.sCharacter('manzoni_writer_scope').IsFemale, 'ей', 'ему')] следует остаться в политике."
 set_character_as_local_writer_scope_effect_tt: "[SCOPE.sCharacter('wannabe_writer_scope').GetFullName] становится [Concept('concept_manzoni_local_writer', 'местным писателем')]."
 manzoni.590.t: "Появился местный писатель"
 manzoni.590.d: "[SCOPE.sCharacter('manzoni_new_writer_scope').GetFullName], [Concept('concept_manzoni_local_writer', 'местный писатель')], становится всё более известным. Наверняка [SelectLocalization(SCOPE.sCharacter('manzoni_new_writer_scope').IsFemale, 'её', 'его')] ждёт великое будущее!"
 manzoni.590.f: "«О, я не могу дождаться, когда стану самым известным писателем [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]! Я хочу быть лучшим!» — [SCOPE.sCharacter('manzoni_new_writer_scope').GetFullNameNoFormatting]"
 manzoni.590.g: "Больше писателей — это всегда хорошо!"
 manzoni.600.t: "Торжественное открытие Национальной библиотеки"
 manzoni.600.d: "С открытием Национальной библиотеки [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] сделан важный шаг к продвижению обмена знаниями и образованию народа. [SCOPE.sCharacter('manzoni_librarian_scope').GetFullName] был[SelectLocalization(SCOPE.sCharacter('manzoni_librarian_scope').IsFemale, 'а', '')] назначен[SelectLocalization(SCOPE.sCharacter('manzoni_librarian_scope').IsFemale, 'а', '')] первым библиотекарем нового учреждения."
 manzoni.600.f: "Национальные библиотеки появились в Европе в конце XVIII века и пережили свой расцвет в долгом XIX веке. Основное внимание уделялось предоставлению широкой и равноправной гражданской общественности доступа к образованию, что рассматривалось как национальная задача. В то же время английские и французские учреждения, считавшиеся образцами для подражания, служили для передачи претензий на превосходство соответствующей культурной нации и её глобальной миссии, что подхватили американские и российские подражатели. Благодаря расширению и дифференциации наук национальные библиотеки также вытеснили частные академические библиотеки."
 manzoni.600.g: "Шампанского, шампанского!"
 manzoni.601.t: "Расформирование библиотеки"
 manzoni.601.d: "Администрация стремится обеспечить полноту национального книжного фонда в столице. Поэтому было принято решение закрыть библиотеку в [SCOPE.sState('manzoni_library_state').GetCustom('RU_SL_PP')] и передать книжный фонд."
 manzoni.601.f: "Если по какой-либо причине [Concept('concept_manzoni_library', 'национальная библиотека')] существует за пределами столицы, половина книжной коллекции будет автоматически передана в столицу. Библиотеки за пределами столицы закрываются."
 manzoni.601.g: "Эта изысканная коллекция книг обогатит нашу Национальную библиотеку."
 manzoni.601.h: "Взять эту коллекцию за основу для строительства новой Национальной библиотеки."
 manzoni.610.t: "Национальная библиотека [SCOPE.sCountry('manzoni_library_country').GetAltNameNoFlag('RU_CL_RP')]"
 manzoni.610.d: "С оккупацией вражеской столицы Национальная библиотека [SCOPE.sCountry('manzoni_library_country').GetAltNameNoFlag('RU_CL_RP')] также попала под наш контроль. Некоторые солдаты уже были пойманы на краже редких книг в хаосе. Растёт желание конфисковать книги и передать их в нашу собственную национальную библиотеку."
 manzoni.610.f: "Гульельмо Либри был итальянским графом и математиком, который стал известен своей любовью к древним и драгоценным рукописям и последующей их кражей. Его оригинальные исследования частично основывались на примерно 1800 рукописях и книгах Галилея, Ферма, Декарта, Лейбница и других светил, которые, по его утверждению, он собирал на протяжении всей своей карьеры; на самом деле, некоторые из них, как выяснилось, были украдены во Флоренции из Библиотеки Медичи Лауренциана. В 1841 году Либри получил назначение на должность главного инспектора французских библиотек благодаря своей дружбе с влиятельным французским начальником полиции Франсуа Гизо. Эта работа, включавшая в себя, в частности, каталогизацию ценных книг и драгоценных рукописей, позволила графу Либри удовлетворить свою страсть к коллекционированию, воруя их. Злоупотребляя своими привилегиями и притворяясь больным (кашляя, одетый в большой плащ в любую погоду), ему удавалось проводить время в одиночестве в архивах библиотек по всей стране. Там он «одалживал» предметы, которые никогда не возвращались. Ему удалось украсть более 30 000 книг."
 manzoni.610.g: "Конфисковать книги."
 manzoni.610.h: "Это было бы грехом против искусства и культуры!"
 manzoni.611.t: "Национальная библиотека разграблена!"
 manzoni.611.d: "Вражеские войска разграбили нашу Национальную библиотеку! Потребуются годы, чтобы восстановить это престижное учреждение в его былой славе!"
 manzoni.611.f: "Гульельмо Либри был итальянским графом и математиком, который стал известен своей любовью к древним и драгоценным рукописям и последующей их кражей. Его оригинальные исследования частично основывались на примерно 1800 рукописях и книгах Галилея, Ферма, Декарта, Лейбница и других светил, которые, по его утверждению, он собирал на протяжении всей своей карьеры; на самом деле, некоторые из них, как выяснилось, были украдены во Флоренции из Библиотеки Медичи Лауренциана. В 1841 году Либри получил назначение на должность главного инспектора французских библиотек благодаря своей дружбе с влиятельным французским начальником полиции Франсуа Гизо. Эта работа, включавшая в себя, в частности, каталогизацию ценных книг и драгоценных рукописей, позволила графу Либри удовлетворить свою страсть к коллекционированию, воруя их. Злоупотребляя своими привилегиями и притворяясь больным (кашляя, одетый в большой плащ в любую погоду), ему удавалось проводить время в одиночестве в архивах библиотек по всей стране. Там он «одалживал» предметы, которые никогда не возвращались. Ему удалось украсть более 30 000 книг."
 manzoni.611.g: "Они сделали ЧТО?!"
