 je_ito_specimen_collection_reason: "[ROOT.GetCountry.GetCustom('je_ito_specimen_collection_active_type')]Незанятый [Concept('concept_dubois_naturalist', '#b #GREEN натуралист#!#!')] будет искать [Concept('concept_dubois_specimen', 'образцы')] в вашей стране. Пока не активен ни один другой проект, вы будете пассивно получать некоторое количество [Concept('concept_dubois_specimen', 'образцов')].\n$mr_divider_for_je$\nПредполагаемая добыча в настоящее время составляет @dubois_specimen! [ROOT.Var('ito_estimated_specimen_on_specimen_collection_var').GetValue|+=0] [Concept('concept_dubois_specimen', 'образцов')]"
