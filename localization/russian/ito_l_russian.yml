l_russian:
 mr_botanical_expedition_no_current_expedtion_tt: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] нет активной [Concept('concept_dubois_botanical_expedition', 'ботанической экспедиции')] или сейчас идёт #V выбор места для её отправки#!.#!"
 je_ito_botanical_expedition: "Ботаническая экспедиция"
 je_ito_botanical_expedition_reason: "Ваш [concept_dubois_naturalist|l] в данный момент находится в [Concept('concept_dubois_botanical_expedition', 'ботанической экспедиции')], чтобы собрать [ROOT.Var('ito_botanical_expedition_target_var').GetFlagName|V] и новые [Concept('concept_dubois_specimen', 'образцы')].\n$mr_divider_for_je$\nКаждый месяц экспедиция будет продвигаться к сбору [ROOT.Var('ito_botanical_expedition_target_var').GetFlagName|V]. За одну ботаническую экспедицию можно собрать максимум 10 [Concept('concept_ito_medicinal_plants', 'лекарственных растений')]\n\nКроме того, экспедиция будет приносить [Concept('concept_dubois_specimen', 'образцы')] каждый месяц, и есть шанс возникновения событий, которые добавят дополнительные [Concept('concept_dubois_specimen', 'образцы')] или даже особые растения.\n$mr_divider_for_je$\nТекущая добыча экспедиции: @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [Concept('concept_dubois_specimen', 'образцов')]\nОжидаемая ежемесячная добыча: @dubois_specimen! [GetPlayer.MakeScope.Var('ito_estimated_specimen_on_botanical_expedition_var').GetValue|=+0] [Concept('concept_dubois_specimen', 'образцов')]"
 je_ito_botanical_expedition_goal_tt: "$ito_botanical_expedition_progress_bar$ достиг #V 12#!."
 ito_botanical_expedition_progress_bar: "Прогресс экспедиции"
 ito_botanical_expedition_progress_bar_desc: "Прогресс экспедиции: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/12)"
 ito_botanical_expedition_progress_bar_monthly_progress_tt: "Ежемесячный прогресс"
 ito_naturalist_is_dead_tt: "#default_text У вас нет [Concept('concept_dubois_naturalist', '#b #GREEN натуралиста#!#!')]."
 dubois.390.t: "Возвращение ботанической экспедиции"
 dubois.390.d: "Наша [Concept('concept_dubois_botanical_expedition', 'ботаническая экспедиция')], которую [SelectLocalization(SCOPE.sCharacter('dubois_naturalist_scope').IsFemale, 'возглавляла', 'возглавлял')] [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName], вернулась. Всего они собрали [SCOPE.GetValue('medicinal_herbs_scope_value')|0+] [ROOT.Var('ito_botanical_expedition_target_var').GetFlagName|V] и @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*0+] [Concept('concept_dubois_specimen', 'образцов')]"
 dubois.390.f: "«Я нашёл здесь это поразительное растение, на которое ещё никто не претендовал! Пусть оно будет называться [SCOPE.sCharacter('dubois_naturalist_scope').GetLastNameNoFormatting]а!»"
 dubois.390.g: "С возвращением!"
 ito_total_specimen_collected_on_expedition_tt: "Всего в этой [Concept('concept_dubois_botanical_expedition', 'ботанической экспедиции')] было собрано @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [Concept('concept_dubois_specimen', 'образцов')]."
