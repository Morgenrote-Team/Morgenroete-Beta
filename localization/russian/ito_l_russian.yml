l_russian:
 mr_botanical_expedition_no_current_expedtion_tt: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] нет активной [Concept('concept_dubois_botanical_expedition', 'ботанической экспедиции')] или сейчас идёт #V выбор места для её отправки#!.#!"
 je_ito_botanical_expedition: "Ботаническая экспедиция"
 je_ito_botanical_expedition_reason: "Ваш [Concept('concept_dubois_naturalist', '#b #GREEN натуралист#!#!')] сейчас находится в [Concept('concept_dubois_botanical_expedition', 'ботанической экспедиции')] с целью сбора новых [Concept('concept_dubois_specimen', 'образцов')].\n$mr_divider_for_je$\nЭкспедиция будет ежемесячно приносить [Concept('concept_dubois_specimen', 'образцы')], и есть вероятность событий, которые добавят дополнительные [Concept('concept_dubois_specimen', 'образцы')] или даже особые растения.\n$mr_divider_for_je$\nТекущая добыча экспедиции: @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [Concept('concept_dubois_specimen', 'образцов')]\nПредполагаемая ежемесячная добыча: @dubois_specimen! [GetPlayer.MakeScope.Var('ito_estimated_specimen_on_botanical_expedition_var').GetValue|=+0] [Concept('concept_dubois_specimen', 'образцов')]"
 je_ito_botanical_expedition_goal_tt: "Полоса прогресса достигла #V 24#!."
 ito_botanical_expedition_progress_bar: "Прогресс экспедиции"
 ito_botanical_expedition_progress_bar_desc: "Прогресс экспедиции: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/24)"
 ito_botanical_expedition_progress_bar_monthly_progress_tt: "Ежемесячный прогресс"
 ito_naturalist_is_dead_tt: "#default_text У вас нет [Concept('concept_dubois_naturalist', '#b #GREEN натуралиста#!#!')]."
 dubois.390.t: "Возвращение ботанической экспедиции"
 dubois.390.d: "Наша [Concept('concept_dubois_botanical_expedition', 'ботаническая экспедиция')], которую возглавлял [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName], вернулась. Всего было собрано @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [Concept('concept_dubois_specimen', 'образцов')]."
 dubois.390.f: "«Я нашёл здесь это поразительное растение, на которое ещё никто не претендовал! Пусть оно будет называться [SCOPE.sCharacter('dubois_naturalist_scope').GetLastNameNoFormatting]а!»"
 dubois.390.g: "С возвращением!"
 ito_total_specimen_collected_on_expedition_tt: "Всего в этой [Concept('concept_dubois_botanical_expedition', 'ботанической экспедиции')] было собрано @dubois_specimen! [GetPlayer.MakeScope.Var('ito_total_specimen_current_botanical_expedition_var').GetValue|*V0] [Concept('concept_dubois_specimen', 'образцов')]."
 ito_state_trait_medicinal_plant_aloe_vera: "Алоэ вера"
 ito_state_trait_medicinal_plant_atropa_belladonna: "Белладонна"
 ito_state_trait_medicinal_plant_carapichae_ipecacuanha: "Ипекакуана"
 ito_state_trait_medicinal_plant_cinchona_pubescens: "Хинное дерево"
 ito_state_trait_medicinal_plant_digitalis_purpurea: "Наперстянка пурпурная"
 ito_state_trait_medicinal_plant_ephedra_sinica: "Эфедра китайская"
 ito_state_trait_medicinal_plant_pilocarpus_pennatifolius: "Пилокарпус"
 ito_state_trait_medicinal_plant_strophanthus_gratus: "Строфант приятный"
 ito_state_trait_medicinal_plant_strychnos_nuxvomica: "Чилибуха"
 ito_state_trait_medicinal_plant_thymus_vulgaris: "Тимьян обыкновенный"
 dubois_botany_sickness_modifier: "Ботаническая болезнь"
 je_ito_specimen_collection: "Сбор образцов"
 je_ito_specimen_collection_reason: "[ROOT.GetCountry.GetCustom('je_ito_specimen_collection_active_type')]Незанятый [Concept('concept_dubois_naturalist', '#b #GREEN натуралист#!#!')] будет искать [Concept('concept_dubois_specimen', 'образцы')] в вашей стране. Пока не активен ни один другой проект, вы будете пассивно получать некоторое количество [Concept('concept_dubois_specimen', 'образцов')].\n$mr_divider_for_je$\nПредполагаемая добыча в настоящее время составляет @dubois_specimen! [ROOT.Var('ito_estimated_specimen_on_specimen_collection_var').GetValue|+=0] [Concept('concept_dubois_specimen', 'образцов')]"
 je_ito_specimen_collection_active_loc: "#p Этот проект сейчас активен.#!\n$mr_divider_for_je$\n"
 je_ito_specimen_collection_inactive_loc: "#n Этот проект сейчас неактивен.#!\n$mr_divider_for_je$\n"