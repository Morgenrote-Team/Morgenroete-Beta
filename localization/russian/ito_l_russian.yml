 ito_state_trait_madagascar_forest: "Тропические леса Мадагаскара"
 je_ito_improve_forestry_project: "Улучшить лесоводство"
 je_ito_improve_forestry_project_reason: "Ваш [concept_dubois_naturalist|l] доктор [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] работает над улучшением производства #tooltippable_name #tooltip:[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetTooltipTag],DATA_BUILDING_NAME_TOOLTIP,BuildingTooltip [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('RU_BL_RP')]#!#! в [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetCustom('RU_SL_PP')].\n$mr_divider_for_je$\nПроект будет получать прогресс каждый месяц. Каждый раз, когда прогресс достигает 24, текущее сооружение будет получать новый модификатор. Как только все выбранные для этого проекта сооружения получат модификаторы, проект завершится.\nВсего доступно 3 модификатора. Для получения каждого следующего шкала прогресса должна заполниться заново.Как только [GetBuildingType('building_logging_camp').GetName] получит все модфикаторы, вы так же получите #p 500#! @dubois_specimen! [Concept('concept_dubois_specimen','образцов')].\n$mr_divider_for_je$\nТекущее сооружение: [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] в [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetCustom('RU_SL_PP')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_ito_improve_forestry_project_modifier_1_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_ito_improve_forestry_project_modifier_2_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_ito_improve_forestry_project_modifier_3_type')]\n\nВсего осталось сооружений (не считая текущего): [JournalEntry.MakeScope.Var('mr_number_of_remaining_list_entries_var').GetValue|V0]\n$concept_dubois_specimens$ из проекта: [JournalEntry.MakeScope.ScriptValue('ito_specimens_from_forestry_project_value')|+0] @dubois_specimen!\n\nТекущий ежемесячный прогресс: #underline #tooltip:[GetRawTextTooltipTag('dubois_monthly_naturalist_improvement_progress_var_tt')] [GetPlayer.MakeScope.ScriptValue('ito_naturalist_improvement_project_progress_value')|+2] #!#!"
 ito_naturalist_improve_forestry_project_progress_bar: "Улучшение лесопромышленности"
