 mr_papermap_belemnite_desc: "Окаменелость белемнита, найденная палеонтологом. Эти существа бродили по морям между 358 и 66 миллионами лет назад." #deepl:3029270793
 mr_stop_paleontology_automation_gui_tt: "Остановить автоматизацию задач [concept_dubois_paleontologist]." #deepl:3778604609
 nationalization.11.d: "В [TimeKeeper.GetCurrentDate.Format('y')] в Италии была опубликована новаторская поваренная книга, которая навсегда изменила ее кулинарную культуру. Ее автор, Пеллегрино Артузи, внес свой вклад в становление всемирно признанной итальянской кухни, которая подчеркивает единство и величие нации." #deepl:4223602969
 nationalization.11.f: "Опубликованная в 1891 году книга Пеллегрино Артузи "Наука готовить и искусство жить вкусно" считается первой современной итальянской поваренной книгой. В то время, когда Италия только начинала формировать свою национальную идентичность, работа Артузи сыграла ключевую роль в объединении разнообразных региональных кухонь в единую национальную кулинарную традицию. Его скрупулезная коллекция рецептов, представленная с остроумием и ясностью, не только установила новый стандарт для кулинарной литературы, но и внесла значительный вклад в повышение уровня жизни нации, способствуя повышению качества, инновациям и гордости за местную гастрономию." #deepl:2207143835
 nationalization.11.g: "Триумф кулинарного искусства!" #deepl:1345745332
 nationalization.11.t: "Наука в кулинарии и искусство готовить полезные блюда" #deepl:3987888764
 pius.101.d: "Двое детей в горах на юго-востоке Франции утверждают, что стали свидетелями явления Девы Марии, что вызвало волну духовного энтузиазма - и беспокойства - во всем католическом мире." #deepl:1912784731
 pius.101.f: "Подойдите ближе, дети мои, не бойтесь. Я здесь, чтобы сообщить вам великую весть...\n\nНа альпийских пастбищах над деревней Ла-Салетт, недалеко от Корпа на юго-востоке Франции, двое детей-пастухов рассказывают о видении, которое сегодня будоражит сердца по всему христианству. Им явилась женщина, сияющая светом и окутанная печалью. Она плакала - плакала о мире, отвернувшемся от Бога. Она говорила о богохульствах, произнесенных без стыда, об оскверненных воскресеньях, о голоде и разрухе, которые наступят, если человечество не покается.\nТо, что сначала казалось деревенской легендой, теперь превратилось в движение. Паломники стекаются к отдаленным горным склонам. Монахи и журналисты поднимаются по тем же тропам. Церковь колеблется: одни принимают видение как божественный призыв к покаянию, другие опасаются роста популярного мистицизма и иррационального рвения.\nЕпископ Гренобля выражает осторожное одобрение. Светские власти остаются недоверчивыми.\nА Рим? Рим наблюдает - молча. Но колокола уже звонят." #deepl:2145205681
 pius.101.g: "Небесное предупреждение." #deepl:3313498992
 pius.101.h: "Оставайтесь рациональными." #deepl:499500707
 pius.101.t: "Явление в Ла Салетт" #deepl:3065761669
 pius.102.d: "В маленьком городке Лурд четырнадцатилетняя девочка утверждает, что видела в гроте сияющую женщину. Вскоре ее видения привлекают паломников, споры и внимание Рима." #deepl:1624678567
 pius.102.f: "Она была молода, босая и бедная. Но она говорила о красоте, которую не описать никакими словами.\n\nВ отдаленном гроте близ Лурда, в предгорьях Пиренеев, крестьянская девушка по имени Бернадетта Субирус рассказывает о даме, одетой в белое, с голубым поясом и золотыми розами на ногах. Сначала видение ничего не говорит - только улыбается. Затем она заговорила: о покаянии, о молитве, о страданиях и о божественном милосердии. Она называет себя просто: Непорочное Зачатие.\nСначала жители деревни насмехаются. Но когда Бернадетта обнаруживает скрытый источник и заявляет, что он является источником исцеления, тысячи людей начинают прибывать сюда - надеясь, молясь, плача. Костыли остаются позади. Распространяются отзывы. Скептики объявляют это истерией. Врачи, священники и политики съезжаются в Лурд.\nЦерковь проводит расследование. Государство смотрит с опаской. И все равно люди приходят." #deepl:580789021
 pius.102.g: "Святыня исцеления и надежды." #deepl:2629250679
 pius.102.h: "Галлюцинации!" #deepl:3891021600
 pius.102.t: "Явление в Лурде" #deepl:1767463178
 pius.103.d: "В ирландской деревне Нок пятнадцать свидетелей сообщают о безмолвном явлении Девы Марии, Святого Иосифа и Святого Иоанна Евангелиста. Это видение будоражит народ, долгое время страдавший от нищеты, изгнания и иностранного владычества." #deepl:143567078
 pius.103.f: "Они не произнесли ни слова. Но в этом молчании народ услышал надежду.\n\nДождь непрерывно лил над приходской церковью Нока, графство Майо. И все же пятнадцать жителей деревни стояли, как зачарованные. Перед ними, освещая южную фронтонную стену, стояло молчаливое собрание: Дева Мария в молитвенной позе, святой Иосиф рядом с ней, святой Иоанн Евангелист в одежде и с Евангелием в руках. Позади них - агнец на алтаре и крест.\nНикто не говорил. Никаких движений. И все же свидетели клялись в том, что видели, - молодые и старые, мужчины и женщины.\nВ стране, измученной голодом, эмиграцией и духовной тоской, безмолвное видение прозвучало громче проповедей. Вскоре прибыли паломники, искавшие исцеления, знамений и утешения. Английские власти насмехались. Некоторые представители церкви колебались. Но среди бедных и набожных жителей Ирландии Тук стал святым криком о достоинстве." #deepl:216954390
 pius.103.g: "Свет под дождем." #deepl:4199802423
 pius.103.h: "Отнеситесь к этому как к фольклору." #deepl:2853965001
 pius.103.t: "Безмолвное видение в Ноке" #deepl:3086062832
 pius.104.d: "В центре Португалии трое детей-пастухов сообщают о неоднократных явлениях Девы Марии, кульминацией которых становится чудесное явление, свидетелями которого стали тысячи людей. Их видения несут в себе пророчества о войне, страданиях и будущем Церкви." #deepl:3494130064
 pius.104.f: "В конце концов Мое Непорочное Сердце восторжествует.\n\nНеподалеку от города Фатима, на сельских холмах Кова-да-Ирия, трое детей - Лусия, Франциско и Жасинта - рассказывают о даме, которая ярче солнца, одетая в сияние и печаль. В течение шести месяцев она появляется снова и снова, предупреждая о глобальной войне, росте безбожных идеологий и гонениях на верующих. Она призывает к покаянию, молитве и посвящению России своему сердцу.\n13 октября 1917 года, когда десятки тысяч людей стоят под проливным дождем, солнце, кажется, срывается с небес, вращаясь и разбиваясь в небе. Некоторые падают на колени. Другие бегут. Когда свет померк, их одежда высохла. Толпа расходится в молчании, потрясенная и испуганная.\nЦерковь осторожничает. Пресса разделена. Но среди людей - особенно бедных, раненых и верующих - разгорается новое пламя: надежда, предостережение, видение Девы Марии не только как матери, но и как стража грядущего века." #deepl:2513437425
 pius.104.g: "Прислушайтесь к предупреждениям Фатимы." #deepl:1664428204
 pius.104.h: "Развенчайте "Солнечное чудо"." #deepl:958137642
 pius.104.t: "Тайны Фатимы" #deepl:1100906175
 pius.105.d: "В глухой деревушке неподалеку от [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] появляются сообщения о явлении Девы Марии. История быстро распространяется, привлекая паломников, скептиков и внимание церковных властей." #deepl:45703861
 pius.105.f: "Она стояла над полями в короне света и смотрела на нас так, словно знала печаль каждой души.\n\n Первым заговорил ребенок - глаза расширились от благоговения, голос дрожал. Он говорил о даме, которая ярче рассвета, окутанная сиянием и печалью, явилась в тишине и смотрела на мир с глубокой, знающей скорбью. Другие утверждали, что тоже видят ее. Некоторые падали на колени. Другие бежали. Все запомнили последовавшую за этим тишину.\nИстория распространилась за пределы деревни. Прибывали паломники со свечами в руках. Верующие молились. Страдающие надеялись. Священники спорили. Чиновники поднимали брови. Но люди продолжали приходить - их влекла не уверенность, а нечто более древнее: потребность верить.\nЧто бы ни произошло - чудо, видение или миф, - это событие уже сформировало сердца тех, кто стал его свидетелем, и жизни тех, кто теперь должен решить, что оно означает." #deepl:3063415784
 pius.105.g: "Знак для верных." #deepl:1177288670
 pius.105.h: "Подавить истерию." #deepl:1037767630
 pius.105.t: "Богоматерь [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]" #deepl:4095895438
 pius.111.d: "Несмотря на официальные распоряжения, запрещающие публичные выступления, толпа верующих начала стихийное шествие к месту явления Марианны на сайте [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]." #deepl:3379456873
 pius.111.f: "Мы не зажигали факелов, не несли знамен. Только четки, тишина и наши ноги в пыли"\n\nОни приходили на рассвете, по двое и по трое, шли через поля и деревни, шепча молитвы. К полудню их были сотни, они шли по проселочным дорогам, некоторые босиком, некоторые плакали. Женщины держали цветы. Старики бормотали литании. Дети сжимали в руках иконы, вырезанные из дерева.\nВласти объявили место закрытым. Солдаты стояли на страже. Однако никто не остановил толпу. Возможно, дело было в пении. Возможно, тишина. Возможно, что-то невидимое.\nКогда верующие достигли места видения, они встали на колени, пробормотали молитвы и зажгли свечи в земле. С неба не раздался ни один голос. Чудо не было явлено. Но что-то уже изменилось. Народ действовал - не вопреки закону, а повинуясь чему-то более древнему, чем закон." #deepl:2369382513
 pius.111.g: "Пусть они молятся." #deepl:2163336687
 pius.111.h: "Наблюдайте спокойно." #deepl:3862482018
 pius.111.h_tt: "Высока вероятность того, что после Марианского явления произойдут новые события." #deepl:2612943668
 pius.111.i: "Разгоните их силой." #deepl:1733449904
 pius.111.i_tt: "Очень высока вероятность кровавого столкновения." #deepl:202372566
 pius.111.t: "Нежданное шествие" #deepl:3613794317
 pius.112.d: "Противостояние между властями и верующими на месте запрещенной Марианской процессии переросло в насилие. На земле, где когда-то видения вселяли надежду, теперь лежит пятно крови." #deepl:2719807490
 pius.112.f: "Молитвы были, а потом крики.\n\nКогда прибыли солдаты, свечи еще мерцали. Голоса звучали то в смятении, то в мольбе. Женщина упала. Заплакал мальчик. Никто не знает, кто отдал приказ, но мушкеты загрохотали, дубинки взмахнули, сапоги зашагали по ладану и земле. Когда тишина вернулась, она была тяжелее, чем прежде.\nЦерковь потрясена. Верующие возмущены. Пресса говорит тихим голосом: одни называют это несчастным случаем, другие - резней. Место, о котором когда-то шептали, что оно святое, теперь проклято памятью. И все же люди собираются - не с цветами, а с гневом, с молчанием, с взглядом, который не может погасить ни один закон." #deepl:2186004653
 pius.112.g: "Мы сожалеем о случившемся." #deepl:3313805008
 pius.112.h: "Они сами на себя это наложили." #deepl:402397332
 pius.112.t: "Кровь на святой земле" #deepl:1312740775
 pius.113.d: "Местный священник стал главным защитником Марианского явления на сайте [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Его проповеди собирают толпы людей, его слова вселяют надежду - и бросают вызов государственной власти. Его зовут отец [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName]." #deepl:1046441460
 pius.113.f: "Она явилась ничтожным, а не сильным мира сего. Возможно, именно поэтому они хотят заставить ее замолчать.\n\nВ каменной церкви над деревней священник по имени отец [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName] начал проповедовать - не только о милосердии Девы, но и о ее справедливости. Его слова эхом разносятся по нефу: 'Если Небо говорит здесь, то никакое правительство не может запретить его эхо'.\nПрихожане стекаются на его проповеди. Его имя распространяется в шепотах и гимнах. Он призывает к миру, но его присутствие провоцирует беспорядки. Одни называют его пророком. Другие - бунтарем в рясе.\nВласти начинают беспокоиться. Военные говорят о подстрекательстве. Церковная иерархия колеблется, разрываясь между догмой и дипломатией. На ваш стол ложится тихое предложение: Его можно убрать. Тихо. Незаметно.\nНо некоторые люди, когда молчат, говорят еще громче." #deepl:2395659126
 pius.113.g: "Пусть он проповедует." #deepl:3471579290
 pius.113.h: "Вызовите его в столицу для переговоров." #deepl:1641636788
 pius.113.i: "Заставьте его исчезнуть." #deepl:3010062703
 pius.113.t: "Голос на кафедре" #deepl:3682486724
 pius.114.d: "По всей стране верующие католики начали публичные демонстрации в поддержку Марианского явления. То, что начиналось как сельское паломничество, превратилось в национальное движение." #deepl:3473602537
 pius.114.f: "Они шли с четками в руках, с детьми на плечах и с именем Богородицы на устах.\n\nВезде, от рыбацких поселков до фабричных городов, знаки одни и те же: свечи горят в окнах, гимны разносятся по городским площадям, тысячи людей собираются в тишине. Никаких знамен - только статуи, иконы и одно имя, произносимое снова и снова: Мария. То, что начиналось как преданность, превратилось в неповиновение.\nВ ответ на насилие в святом месте [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] верующие вышли на улицы. Они не кричат. Они молятся. Но их число растет с каждым днем.\nНекоторые в правительстве призывают к терпимости. Другие требуют репрессий. Военные неспокойны. А в домах по всей стране даже сомневающиеся задаются вопросом: если так много верующих, может ли это быть ложью?" #deepl:3107082794
 pius.114.g: "Разрешить национальное шествие." #deepl:3918828179
 pius.114.h: "Запретить национальное шествие." #deepl:1813497751
 pius.114.t: "Шествие, которое потрясло нацию" #deepl:738056863
 pius.115.d: "Сильный неурожай поразил несколько сельских районов [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Среди верующих начинает распространяться опасный шепот: мол, Богородица, которую государство когда-то заставляло молчать, теперь плачет - и наказывает." #deepl:3238123436
 pius.115.f: "Она просила молитв. Мы дали ей солдат.\n\nДожди не пошли. Пшеница пожелтела слишком рано. Картофель сгнил под землей, невидимый и горький. Жители деревень говорят о полях, которые кажутся... брошенными. Не только людьми, но и милосердием.\nИ вот они шепчутся. О женщине в свете, которая однажды появилась - и была осмеяна. О священнике, который исчез. О запечатанном святилище и избитых паломниках. Теперь, говорят, она отвернула свое лицо.\nСвечи снова горят, но теперь за закрытыми окнами. Матери тайно крестят детей. Старики закапывают хлебные корки в качестве подношений. Церковь не смеет говорить, но люди уже верят: Это ее печаль. Или ее предупреждение." #deepl:2485032935
 pius.115.g: "Суеверие! Я надеюсь..." #deepl:2447781343
 pius.115.t: "Поля лежат пустые" #deepl:3151937266
 pius.116.d: "После многих лет репрессий и отрицания чудес многие некогда благочестивые граждане начали отказываться от своей веры в [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Все большее число людей теперь называют себя не католиками, а вообще никем." #deepl:1323000478
 pius.116.f: "Она больше не приходит. Ни во снах, ни в видениях. Свечи не горят.\n\nСвятилище закрыто. Жрец ушел. Поля молчат.\nТогда даже самые бедные шептали перед сном Ave Marias, когда иконы висели у очагов, а слезы падали при звуках колоколов. Теперь церкви стоят пустые. Дети спрашивают, что такое "исповедь". Молодые говорят о Разуме, о Прогрессе, о Ничто.\nНарод не обратился к идеологии. Они обратились к пеплу. Они не радикалы. Они измучены. И где-то в пустоте молчания застыл вопрос:\nОна оставила нас - или мы оставили ее?" #deepl:231766477
 pius.116.g: "Эпоха веры прошла." #deepl:146424195
 pius.116.t: "Тишина за колоколом" #deepl:2179217507
 pius.119.d: "Вновь созданное атеистическое правительство распорядилось закрыть место паломничества мариан. Место, которое когда-то было местом света и молитвы, теперь оцеплено и молчит под наблюдением государства." #deepl:1939840262
 pius.119.f: "Не звонили колокола. Не горели свечи. Ворота закрывались до восхода солнца.\n\nСвятыня, которая когда-то привлекала тысячи людей, теперь стоит в одиночестве. На двери часовни прибито объявление: "По решению Народного собрания это сооружение признано несущественным". Охранники стоят на страже, но не для защиты, а для предотвращения.\nНикакой силы не применялось. Никаких протестов. Изменения произошли тихо, бюрократическим путем - скорее отсутствие, чем взрыв. И все же в домах по всей стране дрожат старческие руки. Бабушки прячут свои четки. Дети спрашивают, почему паломники больше не поют.\nСвященнослужители молчат. Партия говорит о науке, разуме и прогрессе. А где-то за закрытыми дверями мерцает вопрос, как полусгоревшая свеча: Было ли это действительно необходимо?" #deepl:3255413028
 pius.119.g: "Мы больше не возводим памятники иллюзиям." #deepl:702720701
 pius.119.t: "Закрытие святилища" #deepl:589514149
 pius.121.d: "Марианское явление на сайте [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] было официально признано как положительный знак. Но даже сейчас его истинное значение остается открытым для интерпретации." #deepl:181746716
 pius.121.f: "За несколько недель, прошедших с момента появления сияющей фигуры перед жителями деревни, никаких новых знамений не последовало. Никакого огня с небес. Ни голоса в облаках. Только спокойное небо и затянувшееся эхо удивления.\nНо люди говорят - о мире, об исцелении, о том, что что-то изменилось в душе нации. Паломники приходят не в бешенстве, а в благоговении. Священнослужители читают тихие проповеди. Пресса, в кои-то веки, сообщает об этом без насмешек: Что означает это чудо?" #deepl:3589438214
 pius.121.g: "Благословение для простых людей." #deepl:560950828
 pius.121.h: "Божественное знамение для нашего духовенства." #deepl:2114621818
 pius.121.h_tt: "Эта мера может иметь неизвестные, серьезные последствия." #deepl:1123613034
 pius.121.i: "Показатель легитимности нашего правительства." #deepl:1976662076
 pius.121.t: "Что она имеет в виду?" #deepl:1525290236
 pius.122.d: "Место марианского явления стало признанным местом паломничества, привлекающим все большее число верующих из ближних и дальних стран." #deepl:3557311135
 pius.122.f: "Там, где раньше было только пастбище, теперь стоят свечи, розы и тихие шаги тысяч людей.\n\nДороги расширились. Поля были расчищены. Скромная часовня возвышается неподалеку от того места, где дети когда-то говорили о Даме, облаченной в свет. Каждый день сюда прибывают паломники: фермеры с сыновьями, вдовы в черном, солдаты в увольнении, матери, шепчущие молитвы за своих нерожденных детей.\nЦерковь признала святость этого места. Строится святилище. По его краям расцветают рынки, предлагающие хлеб, медали, четки, вино. То, что когда-то было историей, вызывающей сомнения в гостиных, теперь ощущается в костях нации.\nА когда в долине звонят колокола, возникает вопрос: Возрождается ли эта вера - или это семя чего-то большего, что еще предстоит?" #deepl:307938956
 pius.122.g: "Totus tuus." #deepl:314650754
 pius.122.t: "Святилище [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]" #deepl:3872076082
