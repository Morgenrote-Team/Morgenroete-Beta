 theme_mr_paleontology_desc: "Пользовательский интерфейс, вдохновленный палеонтологией, окаменелостями и костями динозавров." #deepl:415348285
 verrier.308.d: "Астрономы предсказали транзит Венеры в австралийско-индонезийско-тихоокеанском регионе в #ORANGE 1874 году#!. Научное сообщество [ROOT.GetCountry.GetNameNoFlag] требует наблюдать это астрономическое событие, которое бывает раз в жизни." #deepl:1738426681
 verrier.308.f: "Транзит Венеры - это прохождение планеты Венера перед Солнцем. Это явление происходит всего четыре раза примерно за 243 года. Исторически точное измерение таких прохождений имело большое значение для определения расстояния между Землей и Солнцем (астрономической единицы) и послужило поводом для многочисленных экспедиций и измерительных кампаний важных институтов и ученых. Транзит Венеры в 1874 году был относительно неблагоприятен для астрономических измерений. Она оставалась невидимой почти из всей Европы, длинные транзитные моменты наблюдались только из Азии, а короткие - из Австралии, островов южной части Тихого океана и южной части Индийского океана (особенно архипелага Кергелен). Тем не менее было отправлено около 60 экспедиций." #deepl:3786277450
 verrier.308.g: "Мы не должны упустить это." #deepl:2334937119
 verrier.308.t: "Транзит Венеры в 1874 году" #deepl:3101017563
 verrier.309.d: "Астрономы предсказали еще один транзит Венеры для регионов Южной Америки, Центральной Америки и Северо-Восточной Америки в #ORANGE 1882 году#!. Научное сообщество [ROOT.GetCountry.GetNameNoFlag] требует наблюдать это астрономическое событие, которое бывает раз в жизни." #deepl:3366532829
 verrier.309.f: "Транзит Венеры - это прохождение планеты Венера перед Солнцем. Это явление происходит всего четыре раза примерно за 243 года. Исторически точное измерение таких прохождений имело большое значение для определения расстояния между Землей и Солнцем (астрономической единицы) и послужило поводом для многочисленных экспедиций и измерительных кампаний важных институтов и ученых. Транзит Венеры в 1882 году имел некоторые преимущества перед транзитом 1874 года, поскольку был виден в некоторых более доступных регионах. Так, транзит был виден на всем американском континенте, за исключением севера и северо-востока Северной Америки." #deepl:1503344549
 verrier.309.t: "Транзит Венеры в 1882 году" #deepl:2995649523
 verrier.311.d: "Приближается редкое астрономическое событие: планета Венера пересечет лицо Солнца. По всему миру обсерватории и правительства начинают подготовку." #deepl:4200477530
 verrier.311.f: "Дата была рассчитана с точностью до секунды. Телескопы упаковываются. Часы синхронизированы. Планета Венера пересечет лицо Солнца. Астрономы считают, что транзит позволит точно измерить астрономическую единицу - фундаментальную шкалу Солнечной системы. Но успех этой работы полностью зависит от видимости - от местоположения, погоды и координации." #deepl:2621945333
 verrier.311.g: "Мы наблюдаем за транзитом из дома." #deepl:2383387639
 verrier.311.h: "Мы отправляем экспедицию в один из наших протекторатов." #deepl:1098022190
 verrier.311.i: "Мы отправляем экспедицию в далекие края." #deepl:381412623
 verrier.311.j: "Мы должны подумать об этом еще раз." #deepl:1178423846
 verrier.311.t: "Подготовка к транзиту Венеры" #deepl:967668025
 verrier.319.d: "Экспедиция с сайта [SCOPE.sCountry('verrier_venus_transit_leader').GetName] прибыла на нашу территорию для наблюдения редкого астрономического явления - транзита Венеры." #deepl:853589
 verrier.319.f: "Они высадились на берег с ящиками линз, часов и диаграмм. Их представители встречались с представителями университетов, предлагая дружескую переписку и технические брифинги. Ассистенты обсерваторий любопытны, газеты нейтральны, но бдительны.\n\nНа нескольких факультетах обсуждают последствия: научное сотрудничество, да - но также обмен данными, логистический суверенитет и видимость на мировой арене." #deepl:209223472
 verrier.319.g: "Пусть наука станет нашим общим языком." #deepl:183308092
 verrier.319.t: "Иностранные глаза к небу" #deepl:4019861958
 verrier.321.d: "Во время перехода на экспедиционное судно обрушился сильный шторм. Среди грохочущих волн и хаотичного такелажа несколько ящиков были сорваны с палубы и унесены в море - в том числе и хрупкие транзитные приборы." #deepl:2127492192
 verrier.321.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] держался за перила, когда небо разлетелось на куски. Море поднялось, как враг, и швырнуло канаты и бочки на палубу. Ящики - два из них - скользили по страшной дуге, прежде чем исчезнуть в черноте.\n\n Позже, когда шторм утих и осталась только тишина, был подсчитан ущерб. Главный гелиометр. Двойная линза из Кенигсберга. Несколько точных часов.\n\nДоктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] стоял среди промокшей команды и сломанного дерева, глядя на пустоту, в которой находилось оборудование. Были запасные варианты. Но ни один из них не был безупречным.\n\nА время, как и Венера, никого не ждет." #deepl:2744264311
 verrier.321.g: "Продолжайте. У нас еще достаточно времени, чтобы продолжить." #deepl:1985224258
 verrier.321.t: "Буря над транзитом" #deepl:2256455346
 verrier.322.d: "Во время ночной калибровки звездного поля астроном экспедиции заметил нерегулярные движения и неподвижные точки там, где их не должно быть. Дальнейшее сравнение с имеющимися звездными картами подтвердило это: возможно, команда обнаружила новые, неизведанные небесные тела." #deepl:2064965258
 verrier.322.f: "Корабль дрейфовал под бархатным небом. Облака разошлись несколько часов назад, оставив после себя такую чистоту, что она казалась неестественной. Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] снова прильнул к окуляру. Там - между Альтаиром и краем сетки секстанта - было движение. Слишком медленное для кометы. Слишком устойчивое для разлома.\n\nНочь за ночью [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] возвращался к тому же участку неба, зарисовывая, вычисляя, сравнивая. Наконец, [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] записи подтвердили: это малый планетарный объект. Возможно, два. Не каталогизированный.\n\nВенера будет ждать. Но звезды уже предлагали кое-что еще." #deepl:1791725592
 verrier.322.g: "Да будет вам известно: небеса по-прежнему хранят тайны." #deepl:1342826733
 verrier.322.t: "Неожиданные огни" #deepl:1561684464
 verrier.323.d: "Во время перерыва в путешествии команда экспедиции отправилась вглубь острова, чтобы осмотреть потенциальные точки возвышения для астрономических наблюдений. Вместо этого они обнаружили рощу незнакомых растений, ни одно из которых не встречается в доступных ботанических записях." #deepl:3286240010
 verrier.323.f: "Все началось с запаха. Тонкий, цитрусово-острый, он поднимался от папоротников на опушке леса. Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] последовал за ним через густой подлесок и нашел поляну, где свет струился, как вода.\n\nТам стебли глубокого фиолетового цвета распускались по идеальной спирали. Красный мох покрывал камни цвета обсидиана. Высоко вверху на ветру колыхались гроздья винограда, похожие на висячие звезды. Никто не мог их назвать.\n\n Один из младших помощников прошептал: "Похоже, что небо упало на землю."\n\nОни приехали в погоню за планетой Венера. Но здесь, в тихом воздухе и фильтрованном свете, они обнаружили чудо иного рода." #deepl:808904157
 verrier.323.g: "Собирайте образцы и сохраняйте их для изучения." #deepl:1767661174
 verrier.323.t: "Сад между звездами" #deepl:2845961206
 verrier.324.d: "Разбирая возвышенность для наблюдения, экспедиция наткнулась на место, представляющее огромный геологический интерес. На окружающем камне были обнаружены узоры и вкрапления, редко встречавшиеся ранее." #deepl:539957699
 verrier.324.f: "Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] провел рукой [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] по слоистой поверхности обнажения. Она слабо мерцала в утреннем свете, изломанная швами с металлическим блеском. Вихри темно-зеленого цвета закручивались вокруг оранжевых кристаллических ядер, образуя узор, который выглядел почти преднамеренным.\n\n Рядом с другой плитой обнаружился окаменевший пузырь - полый и все еще неповрежденный. Один геолог из команды предположил вулканическое происхождение. Другой покачал головой: "Это древнее, чем все, что я видел"\n\nПриборы, которые они привезли с собой, были созданы для наблюдения за небесами. Но здесь, в камне под их ботинками, был фрагмент глубокой памяти Земли." #deepl:908721635
 verrier.324.g: "Эта находка относится к истории самой Земли." #deepl:2450655201
 verrier.324.t: "Камень вне времени" #deepl:2335051515
 verrier.325.d: "Экспедиция прибыла в порт, но таможенные власти отказывают ей в немедленном прохождении контроля. Несколько ящиков с научным оборудованием были задержаны для проверки, и сотрудники требуют дополнительные документы, которые раньше никогда не требовались." #deepl:2525277400
 verrier.325.f: "Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] стоял рядом с грузовой декларацией, стиснув зубы. Ртутные линзы, точные часы, полированный латунный корпус - они бездействовали на складе за закрытыми воротами, ожидая чернил и печатей.\n\nТаможенник был вежлив, но тверд: "Научные или нет, все иностранные приборы должны быть задекларированы, проверены и обложены налогом, если это не исключено договором.\n\nНа улице все еще вставало солнце. И Венера не собиралась ждать бюрократии." #deepl:34765689
 verrier.325.g: "Оплатите сбор и ускорьте оформление." #deepl:240478226
 verrier.325.t: "Барьеры под небом" #deepl:2346862710
 verrier.340.d: "После нескольких недель подготовки наблюдательный пост для транзита Венеры готов. Приборы откалиброваны. Карты проверены. Единственное неизвестное теперь - это небо." #deepl:1138273071
 verrier.340.f: "Купол возвышался, как латунный маяк со спокойной целью. Будь он построен из камня на родной земле или из холста и заклепок на чужбине, сейчас он хранил в себе затаенное дыхание ожидания.  Внутри при свете ламп поблескивал гелиометр. Шестеренки вращались с шепотом. Таймеры щелкали в предвкушении. Снаружи ассистенты смахивали пыль с линз. Даже воздух, казалось, колебался. Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] встал у двери и коснулся порога. Долгие месяцы все шло к этому моменту. Теперь больше нечего было строить, оставалось только ждать. Над ними, где-то в невидимом небе, Венера проходила свой путь." #deepl:2967275520
 verrier.340.g: "Точность начинается со спокойных рук." #deepl:2872475059
 verrier.340.t: "Обсерватория готова к транзиту Венеры" #deepl:966063237
 verrier.341.d: "Доктор [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] предложил внести небольшие, но существенные изменения во внутренний стабилизатор главного телескопа. Модификация может уменьшить внутреннюю вибрацию и увеличить оптическую резкость в момент контакта." #deepl:491784908
 verrier.341.f: "Это произошло не в куполе, а в палатке-мастерской за ним. Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] перебирал графики, когда к нему подошел доктор [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] с блокнотом, испачканным жиром. Пересчитанное натяжение буфера. Пересмотренная опора для внутреннего латунного кольца.\n\n Остальные слушали с почтительным скептицизмом - пока испытания не доказали: изображение стало стабильнее на доли градуса. Достаточно, чтобы сместить грань между размытостью и четкостью." #deepl:2995793810
 verrier.341.g: "Небольшое изменение с большой точностью." #deepl:1641676745
 verrier.341.t: "Тихая адаптация" #deepl:3486983252
 verrier.342.d: "Недавний прорыв в электромагнитной теории позволил применить новый метод оптической фильтрации в протоколе наблюдений телескопа. Теперь помехи от рассеивания света в атмосфере могут быть лучше учтены, что приводит к получению более четких визуальных данных." #deepl:2503805121
 verrier.342.f: "Идея пришла не с купола, не со стола линзовика, а со страницы. Это было уточнение волновых уравнений - как свет ведет себя не просто как частица или луч, а как колеблющееся поле. С их помощью можно было предсказать новую модель интерференции и применить коррекцию. Фильтры были переделаны. Время экспозиции корректировалось. Инженеры перепроверили свои сомнения.\n\n Когда доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] посмотрел в ту ночь в объектив, звезды больше не дергались. Они стояли - точные, холодные, настоящие. Небо перестало дрожать." #deepl:914121255
 verrier.342.g: "Математика обостряет зрение." #deepl:2639991371
 verrier.342.t: "Уравнение ясности" #deepl:1039194191
 verrier.351.d: "Через континенты и океаны, от Йокогамы до Реюньона, от Кергелена до Пекина, астрономы наблюдали за тем, как планета Венера пересекает поверхность Солнца. Транзит 1874 года завершен, и многие команды сообщают об успехе." #deepl:3119534429
 verrier.351.f: "Они приезжали на пароходах, на верблюдах, по железной дороге и пешком. Инженеры, ботаники, картографы. Они строили обсерватории в джунглях и пустынях. Они изучали погоду, определяли время появления теней, полировали линзы до дрожи в руках.\n\n И в течение шести часов 9 декабря 1874 года они наблюдали, как черная точка скользит по солнечному диску.\n\n Венера входит как шепот и выходит как секрет. Измерения были не идеальными, но достаточными. Можно начинать триангуляцию. Впервые человечество могло узнать истинный масштаб Солнечной системы - не в мифах и метафорах, а в цифрах, прорисованных тенью. Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] закрыл блокнот [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] и выдохнул: Дело сделано." #deepl:1827747392
 verrier.351.g: "Это прекрасно" #deepl:2882436754
 verrier.351.t: "Транзит 1874 года" #deepl:2395808814
 verrier.352.d: "6 декабря 1882 года планета Венера вновь прошла перед Солнцем. В последний раз за столетие наблюдатели по всему миру направили свои приборы на небо и запечатлели черный диск Венеры в полете." #deepl:3903856343
 verrier.352.f: "На этот раз корабли ушли раньше. Обсерватории были прочнее. Часы были более точными. Уроки, полученные в 1874 году, направляли каждую руку, каждую тень, каждый расчет.\n\nОт Нью-Джерси до Патагонии, от Мексики до Австралии, мир замер в ожидании точки на Солнце.\n\nД-р [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] настроил последний фильтр. Появился диск, медленно скользящий по пылающему белому светилу. Не было никаких возгласов, только шелест ручек, щелчки затворов и тихий вздох триумфа. Пройдет еще 121 год, прежде чем Венера вернется. Но здесь, в этот момент, само время было отмерено." #deepl:907305697
 verrier.352.g: "Мы никогда не увидим следующего." #deepl:2603880366
 verrier.352.t: "Транзит 1882 года" #deepl:2224364038
 verrier.353.d: "По мере приближения долгожданного момента погодные условия начинают ухудшаться. Надвигаются облака - не настолько густые, чтобы заслонить все, но достаточные, чтобы исказить четкость и время." #deepl:1325753029
 verrier.353.f: "Небо не закрылось полностью, но оно больше не подчинялось. Слои дрейфующих облаков растекались по солнцу, как марля. Свет тускнел и вспыхивал неровными импульсами. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] Каждая линза боролась за равновесие, каждый ассистент - за дыхание.\n\nДоктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] не сводил глаз с фильтра. Появился силуэт Венеры - тусклый, преломленный, танцующий между паром и расчетом.\n\nЭто не была чистая дуга. Не хрестоматийное наблюдение. Но это были данные. Данные, с трудом добытые под капризным небом." #deepl:1908038831
 verrier.353.g: "Если небеса дают нам кусочки, мы должны сшить их вместе." #deepl:1646978536
 verrier.353.t: "Сквозь вуали света" #deepl:674640397
 verrier.354.d: "Во время транзита Венеры команда наблюдателей зафиксировала не только точные данные, но и изображения. Десятки фотопластинок были последовательно экспонированы и затем собраны в движение. Впервые в истории транзит планеты был запечатлен на пленку." #deepl:2258153461
 verrier.354.f: "Она мерцает. Дрожит. Но она движется. На серии обработанных пластин Венера заходит с краю, идеальная черная точка, катающаяся по солнечному диску. Не просто расчет, не просто набросок - движение. Запечатленное во времени. Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] стоял в темной комнате с поднятым фонарем и смотрел, как эта короткая последовательность повторяется снова и снова. Шесть часов измерений, сжатых до секунд удивления. Астрономы аплодировали. Они знали, что сделали нечто новое. Они заставили небеса двигаться." #deepl:1856959975
 verrier.354.g: "Анализируйте кадры для улучшения моделей планетарного движения." #deepl:3348594448
 verrier.354.t: "Движущаяся тень" #deepl:969441096
 verrier.355.d: "Вдохновленный всемирным волнением, вызванным транзитом Венеры в 1882 году, сайт [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName] написал новую церемониальную пьесу. Марш, премьера которого состоялась перед широкой аудиторией, передает как величие этого события, так и ритм нового научного века." #deepl:1566390789
 verrier.355.f: "Через год после транзита Венеры в 1882 году Джону Филипу Соузе было поручено сочинить процессию для открытия бронзовой статуи американского физика Джозефа Генри, умершего в 1878 году. Будучи масоном, Соуза был очарован тем, что группа считала мистическими свойствами в других природных явлениях. При жизни Соузы это произведение так и не прижилось. Оно оставалось неиспользованным в течение многих лет, после того как рукописные копии музыки Соузы были уничтожены во время наводнения." #deepl:3349639062
 verrier.355.g: "Некоторая музыка написана для истории, а не для толпы." #deepl:1666827653
 verrier.355.t: "Марш Венеры" #deepl:1281729794
 verrier_add_x_venus_success_0_tt: "Получить нет #V Успех наблюдения за транзитом Венеры#!." #deepl:2753469077
 verrier_add_x_venus_success_minus_x_tt: "Потерять [SCOPE.GetValue('verrier_venus_success_amount')|0+] #V  Успех наблюдения за транзитом Венеры#!." #deepl:867568724
 verrier_add_x_venus_success_plus_x_tt: "Получить [SCOPE.GetValue('verrier_venus_success_amount')|0+] #V  Успех наблюдения транзита Венеры#!." #deepl:667317191
 verrier_foreign_venus_expedition_modifier: "Зарубежная экспедиция по транзиту Венеры" #deepl:253236392
 verrier_venus_transit_diplomacy_modifier: "Дипломатические переговоры о транзите Венеры" #deepl:1903396933
 verrier_venus_transit_preparation_modifier: "Подготовка к транзиту Венеры" #deepl:3653758437
 vikelas.21.d: "В спортзале на сайте [SCOPE.sState('vikelas_basketball_state').GetName] была изобретена новая игра, которая однажды может зазвучать в залах и на стадионах по всему миру." #deepl:3471187932
 vikelas.21.f: "Никаких ударов. Никакого бега с мячом. И две корзины с персиками, прибитые к галерее.\n\nВ [TimeKeeper.GetCurrentDate.Format('y')], в школе в [SCOPE.sState('vikelas_basketball_state').GetFarmHubName], доктор [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] столкнулся с проблемой: как удержать [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] беспокойных учеников активными в помещении зимой. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] Решение было простым - и странным. Футбольный мяч, две приподнятые корзины для персиков и тринадцать правил.\nПоначалу мальчикам это показалось странным. Никакого контакта. Никакого дриблинга. Только осторожные пасы и броски по дуге. Но что-то в этом было. Игра распространилась по другим школам, затем по другим городам. Менее чем за десять лет спортивные залы от Нью-Йорка до Токио зазвучали в ритме прыгающих мячей и криков "Корзина!"\nТо, что начиналось как развлечение в холодное время года, может стать чем-то большим. Она быстрая, командная, приспособленная к современной жизни - и, прежде всего, [ROOT.GetCountry.GetAdjectiveNoFormatting]- рожденная." #deepl:3707830614
 vikelas.21.g: "Внедрите его в школах и гимназиях." #deepl:2248999233
 vikelas.21.t: "Игра с корзиной персиков" #deepl:2623215155
 vikelas.401.d: "Сегодня Международная футбольная ассоциация была основана в [GetGlobalVariable('vikelas_fifa_seat_global_var').GetStateRegion.GetCityHubName]. Ее полное название - Международная федерация футбольных ассоциаций (ФИФА)." #deepl:3487975302
 vikelas.401.f: "21 мая 1904 года делегаты из семи стран - Бельгии, Дании, Франции, Нидерландов, Испании, Швеции и Швейцарии - подписали устав. Цель: стандартизировать футбольные правила, организовать международные матчи и поднять игру на мировой уровень. Так родилась Международная федерация футбольных ассоциаций - ФИФА. В первые десятилетия своего существования ФИФА была скромной: неполный президентский состав, игроки-любители и региональные споры. Но под землей росло глобальное движение. Англия не решалась присоединиться к нему, опасаясь иностранного вмешательства. Южноамериканцы начали создавать свои собственные конфедерации. В 1924 и 1928 годах олимпийские турниры показали истинный размах футбола: толпы в 60 000 человек в Париже болели не за армии, а за команды." #deepl:2154770056
 vikelas.401.g: "Вступайте в FIFA и поддерживайте международные соревнования." #deepl:1192623767
 vikelas.401.t: "Международная федерация футбольных ассоциаций" #deepl:2948752940
 vikelas.411.d: "ФИФА решила, что в этом году чемпионат мира по футболу пройдет в [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. После предварительного раунда список фаворитов сократился до восьми команд." #deepl:1721956240
 vikelas.411.f: "#V В четвертьфинал вышли следующие сборные#!\n\n[SCOPE.sCountry('vikelas_first_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_second_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_third_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fourth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fifth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_sixth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_seventh_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_eighth_qualified_team_scope').GetName]" #deepl:1470693747
 vikelas.411.g: "Пусть победит лучшая команда." #deepl:900366891
 vikelas.411.t: "Чемпионат мира по футболу [TimeKeeper.GetCurrentDate.Format('y')]" #deepl:3683642621
 vikelas.412.d: "Наша команда одержала триумф на мировой арене, победив лучшие команды со всех континентов. По всей стране вспыхнули торжества!" #deepl:1604872733
 vikelas.412.f: "В напряженном матче против [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] наша команда доказала свою состоятельность в финале Кубка мира в [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. Наша сборная подняла золотой трофей. Финальный свисток эхом отозвался в радиоприемниках, кафе, казармах. От шахтеров на севере до торговцев в порту - народ ревел как один. Капитан плачет на трибуне. Новое поколение смотрит и мечтает." #deepl:1159882054
 vikelas.412.g: "Мы - чемпионы." #deepl:2663168066
 vikelas.412.t: "Чемпионы мира" #deepl:3853223886
 vikelas.413.d: "Наша футбольная команда вышла в финал - и не дотянула до славы. По всей стране гордость и душевная боль смешались в равной степени." #deepl:80141764
 vikelas.413.f: "К сожалению, все усилия нашей команды оказались недостаточными. В нервном матче против [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] наши мужчины не справились с задачей. В течение нескольких недель они несли надежды целой нации. На грязных полях и в ослепительную жару они бежали, сражались, верили. Матч за матчем они становились легендами. Они высоко подняли головы, когда зазвучал другой гимн. Никаких слез, только тишина, а затем медленные, нарастающие аплодисменты." #deepl:3695564906
 vikelas.413.g: "Это было украдено у нас!" #deepl:3624655051
 vikelas.413.t: "Серебряная слава в [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]" #deepl:3043927783
 vikelas.414.d: "Наша сборная досрочно выбыла из чемпионата мира по футболу [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]. [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] в финале обыграла [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName]." #deepl:317995881
 vikelas.414.f: "Была надежда - реальная, осязаемая надежда. Победы ликовали на заводских дворах, радиокомментарии шептали в церквях, дети повторяли голы в переулках. Команда олицетворяла собой нечто большее, чем футбол: амбиции, гордость, веру в то, что мы можем подняться над собой. Но последний матч изменил все. Единственный пропущенный гол. Незамеченный гандбол. Упущенная возможность. Теперь с мечтой покончено, и мир движется дальше." #deepl:640236906
 vikelas.414.g: "Мы верили. Этого было достаточно." #deepl:4069550601
 vikelas.414.t: "Сон заканчивается рано" #deepl:1366412702
 vikelas.490.d: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] Он сделал себе имя, обучив и воспитав целое поколение игроков. [ROOT.Var('vikelas_coach_var').GetCharacter.GetSheHe] теперь достаточно известен, чтобы считаться старшим тренером!" #deepl:3173542618
 vikelas.490.f: ""
 vikelas.490.g: "Награда за возможность бесстыдно кричать на поле." #deepl:1195265680
 vikelas.490.t: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] теперь старший тренер!" #deepl:454610152
 vikelas.495.d: "Новый [concept_vikelas_coach] представил [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerselfHimself]. Имя [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerHis|U] - [SCOPE.sCharacter('vikelas_new_coach_scope').GetFullName]." #deepl:1753591119
 vikelas.495.f: ""
 vikelas.495.g: "[SCOPE.sCharacter('vikelas_new_coach_scope').GetSheHe|U] приведет наших ребят к победе." #deepl:1930939286
 vikelas.495.t: "Новый тренер" #deepl:2806014865
 vikelas.601.d: "На бульварах появилось новое изобретение - двухколесное устройство, приводимое в движение педалями, прикрепленными прямо к переднему колесу. Оно называется "велоципед"." #deepl:497189807
 vikelas.601.f: "В парках и на широких улицах столицы головы поворачиваются. Джентльмены в шляпах и жилетах садятся на странные железные рамы, бешено крутят педали, пробираясь сквозь изумленные толпы. Некоторые падают. Некоторые летят. Дети смеются. Старшие государственные деятели поднимают брови. Газеты называют его le vélocipède - наполовину игрушка, наполовину обещание. Изобретенная вагоновожатым, эта "трясучка для костей" столь же тяжела, сколь и революционна. На булыжниках он вызывает дрожь в позвоночнике. Но по ровным набережным он движется с удивительной грацией. Поговаривают, что это не просто новинка, а зародыш нового вида движения." #deepl:2987098471
 vikelas.601.g: "Забавная мода!" #deepl:3063453559
 vikelas.601.t: "Педали на тротуаре" #deepl:583302045
 vikelas.602.d: "Появился новый дизайн велосипеда с колесами одинакового размера, задней осью с цепным приводом и улучшенным балансом. В отличие от шатких высококолесных велосипедов, этот "безопасный велосипед" устойчив, доступен по цене и быстро становится сенсацией. Его изобретатель? [SCOPE.sCharacter('vikelas_bicycle_inventor_scope').GetFullName]!" #deepl:1082254426
 vikelas.602.f: "Старые велоципеды сотрясали кости и нервы. Эти громадные копейки обеспечивали скорость, но за это мало кто был готов платить - одно неверное движение, и велосипедист летит. Теперь в столичных мастерских появился новый вид велосипедов: компактный, элегантный и безопасный. С цепным приводом на заднее колесо и пневматическими шинами на нем начинают ездить даже дамы и рабочие. Улицы, на которых когда-то ездили кареты, теперь перекликаются с мягким гулом резины по камню. И в кафе, и на фабриках вердикт один: это не игрушка. Это свобода - быстрая, бесшумная и неожиданно доступная." #deepl:2048166631
 vikelas.602.g: "Позвольте каждому гражданину вступить в современную эпоху." #deepl:158167297
 vikelas.602.t: "Велосипед будущего" #deepl:3168239488
 vikelas.611.d: "Этот день настал. Гонщики со всей страны собираются на стартовой линии, стремясь испытать человека и машину на открытой дороге. В воздухе витает предвкушение." #deepl:3817467534
 vikelas.611.f: "Солнце поднимается над бульваром, уже заполненным зрителями. Знамена развеваются. В утреннем воздухе витает запах смазки и пыли. Десятки гонщиков садятся на свои велосипеды - одни сверкающие, только что с завода, другие подлатанные в подворотнях.\nВыстрел. Раздаются аплодисменты. И колеса начинают вращаться.\nОни проезжают через городские ворота и выезжают в сельскую местность. Фермеры отдыхают на своих полях. Дети бегут по дороге. Священники благословляют их. Циники насмехаются. И все же, когда пыль уносится за ними, в толпе возникает странное чувство: это похоже на начало чего-то большего." #deepl:872369825
 vikelas.611.g: "Пусть каждый город услышит вой прогресса." #deepl:4082081516
 vikelas.611.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.621.d: "Победитель национальной велогонки не просто пришел к финишу - он покорил воображение всей страны. Теперь все внимание обращено на то, за что он выступает." #deepl:2904065614
 vikelas.621.f: "Газеты называют его "Железным всадником". Родился в семье ткача, осиротел в двенадцать лет, к шестнадцати стал рабочим на фабрике. Его победа на потрепанном безопасном велосипеде - залатанном, поцарапанном и смазанном с особой тщательностью - была не просто спортивным триумфом. Это была притча. Толпы скандируют его имя. Художники делают с него наброски. Дети подражают его осанке. Но больше того, идеологи берут его на заметку. Одни называют его лицом силы труда. Другие говорят, что он доказывает жизнеспособность нации. Пресса спорит о том, кто он - рабочий, патриот или нечто совершенно новое.\n Сам всадник говорит мало. Он улыбается, кивает и едет." #deepl:2953543537
 vikelas.621.g: "Сделайте его героем рабочего класса." #deepl:2363628364
 vikelas.621.h: "Отмечайте его как национальную икону." #deepl:255033591
 vikelas.621.i: "Представьте его как символ прогресса и современного человека." #deepl:3398545154
 vikelas.621.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.622.d: "Во время национальной велогонки произошла трагическая авария. Один велосипедист погиб, еще несколько получили ранения. Аплодисменты прекратились." #deepl:644341100
 vikelas.622.f: "Колесо попало в колею. Крик, треск, а затем крики. Зрители бросились вперед, когда велосипеды посыпались, как домино. Кровь смешалась с пылью. Шлемы раскалывались. Кости ломались. Один молодой человек - семнадцати лет, ученик на фабрике - погиб при столкновении. Газеты расходятся во мнениях. Одни называют это необходимой ценой прогресса, другие осуждают безрассудство публичного спорта." #deepl:1135060049
 vikelas.622.g: "Почтите память павших." #deepl:3728569964
 vikelas.622.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.623.d: "Один из этапов гонки завладел сердцами публики. Зрители говорят о нем не просто как о соревновании, а как о легенде." #deepl:438486236
 vikelas.623.f: "На рассвете гонщики скрылись в холмах. То, что последовало за этим, было уже не гонкой, а испытанием духа. Дюжина человек отстала. Трое упали. Один разбился на крутом повороте и стоял, истекая кровью, отмахиваясь от помощи. Но один рванул вперед сквозь туман, в сердца тысяч людей. Вся нация не говорит ни о чем другом." #deepl:130901318
 vikelas.623.g: "Пусть дорога запомнит его усилия на многие поколения." #deepl:3983380699
 vikelas.623.h: "Закажите картину с изображением этого момента." #deepl:1275386135
 vikelas.623.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.624.d: "После последнего этапа гонки в его адрес посыпались обвинения. Один из гонщиков был пойман на мошенничестве, хотя некоторые утверждают, что он делал то же, что и все, только менее скрытно." #deepl:3963790231
 vikelas.624.f: "Говорят, он менял велосипеды за сараем. Другие говорят, что его буксировали вверх по склону на скрытом тросе.\n\n Факты размыты. Ясно только одно: велосипедист ехал слишком быстро. Потрясающе быстрым. Слишком свеж после жестокого подъема. Его соперники в ярости. Зрители задыхаются. Пресса чувствует запах крови. На одной из фотографий виден второй человек в такой же одежде. Другой свидетель утверждает, что видел, как гонщика толкнула машина во время ночного этапа. Обвиняемый все отрицает, называя это завистью и политикой." #deepl:2810733320
 vikelas.624.g: "Дисквалифицируйте гонщика и разоблачите мошенничество." #deepl:2198835421
 vikelas.624.h: "Прикройте это ради блага спорта." #deepl:3797817672
 vikelas.624.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.625.d: "В этом году в гоночном сезоне развернулось ожесточенное соперничество. Два гонщика - равные по силе, противоположные по стилю - разделили нацию на два лагеря." #deepl:2483368762
 vikelas.625.f: "Один из них - огонь: безрассудный, смелый, обожаемый молодыми. Он бросает кепку в толпу, смеется, крутя педали, и нападает без предупреждения.\nДругой - лед: спокойный, расчетливый, почти математический. Он бережет силы, выигрывает по секундам и говорит только в случае необходимости.\n\nОб их именах кричат с крыш. Города встают на их сторону. Плакаты печатаются в красном или синем цвете. Портные продают кепки их цветов. Дети подражают им на деревянных велосипедах.\nГазеты говорят не только о гонке. Они говорят о характере, о философии, о том, кем хотят быть люди. И ни один из гонщиков не уступает ни дюйма." #deepl:1380551122
 vikelas.625.g: "Это пойдет на пользу газетной культуре." #deepl:3508242265
 vikelas.625.h: "Используйте соперничество в политических целях." #deepl:442554493
 vikelas.625.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.626.d: "В этом году в гоночном сезоне развернулось ожесточенное соперничество. Два гонщика - равные по силе, противоположные по стилю - разделили нацию на два лагеря." #deepl:2483368762
 vikelas.626.f: "Его нашли в деревенской кузнице, с молотом в руках, с лицом, почерневшим от копоти, в одиночестве.\n\nСпуск был коварным. Неправильно выбранный поворот, хруст гравия - и передняя вилка сломалась. Велосипед сложился, как раненая птица. Многие бы остановились. Но не он.\nОн хромал вниз по склону, таща за собой раму на протяжении нескольких километров. В отдаленной деревне он нашел кузницу. Механиков не было. Ни машины команды. Только мехи, наковальня и его собственные руки.\nВ течение нескольких часов он работал - рукава были закатаны, челюсть сжата, - создавая переднюю вилку по памяти и на ощупь. Когда прибыли официальные лица, он остановился, чтобы взглянуть и сказать: "Не трогайте ее"\nЧерез восемь часов после лидеров он снова поехал. Шансов на победу не было. Но по всему маршруту толпы людей поднимались, чтобы поддержать - не победителя, а того, кто отказался остановиться." #deepl:896070649
 vikelas.626.g: "Вдохновляющая история." #deepl:3324986220
 vikelas.626.h: "Разрешить аварийный ремонт." #deepl:385201552
 vikelas.626.i: "Почитайте его!" #deepl:581594471
 vikelas.626.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
