 MR_HIRE_COACH_BUTTON_TT: "#T Нанять национального тренера#!\nПосле основания ФИФА и проведения первых международных матчей можно нанять национального тренера. Национальные тренеры вносят свой вклад в улучшение результатов матчей. Если тренер не оправдывает ожиданий, он может быть заменен как минимум через три года.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3011015130
