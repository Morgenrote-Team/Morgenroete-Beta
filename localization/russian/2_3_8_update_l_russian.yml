 MR_FIFA_PRESIDENT_BUTTON_TT: "#T Станьте президентом FIFA#!\nБез действующего президента FIFA мы можем занять эту должность. Это предполагает, что мы контролируем штаб-квартиру Международной футбольной ассоциации.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1598483912
