 je_vikelas_basketball_reason: "Быстрая, командная, созданная для современного города - возможно, это игра века." #deepl:489957307
 je_vikelas_bicycle_race: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 je_vikelas_bicycle_race_reason: "Предприниматели, издатели и производители велосипедов предлагают устроить публичное соревнование: забег на длинную дистанцию, чтобы доказать скорость, силу и перспективность нового безопасного велосипеда." #deepl:1822735236
 khaldun.101.d: "Много веков назад Аль-Карауйин был центром науки и обучения. Теперь он вернулся на свое место в качестве одного из крупнейших университетов мира." #deepl:2097299752
 khaldun.101.f: "\"Аль-Карауйин был университетом дольше, чем все университеты Европы. В нем хранилось множество книг, но, к сожалению, он начал приходить в упадок. Сегодня наступает день, когда этот университет снова займет свое законное место!\"" #deepl:2075544153
