 je_verrier_venus_transit_1882_reason: "Приближается редкое небесное событие. Планета Венера пройдет прямо между Землей и Солнцем, отбрасывая свою крошечную тень на солнечный диск. Обсерватории по всему миру готовятся к этому мимолетному явлению, которое может помочь определить масштабы нашей Солнечной системы." #deepl:3195507086
