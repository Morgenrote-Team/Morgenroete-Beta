 concept_verrier_venus_transit: "Транзит Венеры" #deepl:3328636769
 concept_verrier_venus_transit_desc: "Транзит Венеры - это редкое явление, когда Луна проходит между Землей и Венерой. Однако в XIX веке он происходил дважды: в 1874 и 1882 годах. Поскольку наблюдения за транзитом Венеры позволяют сделать выводы о размерах Солнечной системы и более точно определить размер астрономической единицы (АС), это были важные научные события. Страны, расположенные на сайте [concept_verrier_venus_transit_zone], могут наблюдать это событие оттуда; другие страны должны отправлять экспедиции. Успех наблюдений зависит от опыта [concept_verrier_astronomer], наличия [concept_gaudi_engineer] и некоторого везения: иногда погода может помешать получить хорошее изображение. Чем лучше наблюдение, тем больше премия." #deepl:1890935103
 concept_verrier_venus_transit_zone: "Зона транзита Венеры" #deepl:535627695
 concept_verrier_venus_transit_zone_desc: "Зона транзита Венеры - это часть Земли, с которой можно наблюдать полный (а не только частичный) транзит Венеры. В 1874 году это было особенно актуально для Восточно-Азиатско-Тихоокеанского региона, а в 1882 году - почти для всего американского континента. Ниже приводится подробная разбивка стратегических регионов.\n\n#V Транзит Венеры 1874 года:#!\nИндонезия, Индокитай, Океания, Южный Китай, Северный Китай, Маньчжурия, Япония, Центральная Индия, Мадрас, Бенгалия, Гималаи; также государство Территория Индийского океана.\n\n#V Транзит Венеры 1882:#!\nБразилия, Ла-Плата, Анды, Гран-Колумбия, Мексика, Центральная Америка, Карибский бассейн, Средний Запад, Дикси, Новая Англия; также штаты Онтарио и Квебек." #deepl:1055797749
 concept_vikelas_coach: "Тренер" #deepl:3572285288
 concept_vikelas_coach_desc: "Тренеры - это национальные тренеры страны в определенном национальном виде спорта. К национальным видам спорта относятся [concept_vikelas_football], бейсбол, баскетбол и крикет. Тренеры обеспечивают бонусы для соответствующей команды на соревнованиях - будь то международные чемпионаты мира или международные матчи. Последние проводятся тайно через регулярные промежутки времени и увеличивают количество опыта тренера после победы. Высокие очки опыта и положительные черты [Concept('concept_character_trait','$concept_character_traits$')] повышают шансы на победу в чемпионате мира. Положительные черты характера - это те, которые особенно мотивируют игроков, например амбициозность или харизматичность, а демотивирующие черты характера снижают шансы на победу в матче. К ним относятся такие черты, как безжалостность или жестокость.\n\n#R ПРИМЕЧАНИЕ: На данный момент интегрирован только футбол.#!" #deepl:183600896
 concept_vikelas_coaches: "Тренеры" #deepl:3998480532
 concept_vikelas_football: "Футбол" #deepl:3334413449
 concept_vikelas_football_desc: "Футбол - возможный национальный вид спорта. Первые футбольные клубы могут быть созданы в Европе и Южной Америке; для этого потребуется относительно либеральная правовая система, сильная мелкая буржуазия или значительный средний уровень жизни. После этого можно будет проводить эпизодические футбольные матчи. С созданием ФИФА стали возможны международные матчи и чемпионат мира по футболу. Восемь лучших команд автоматически попадают на чемпионат мира. Команды рассчитываются по показателю Национальной футбольной команды (NFTV), который выводится из параметров уровня жизни (физической подготовки населения), силы мелкой буржуазии (клубной системы), грамотности (тактики) и традиций (национального спорта: да или нет?). В матчах учитывается не только НФТВ, но и черты характера и опыт [concept_vikelas_coach]." #deepl:3000477120
 country_artists_decorative_can_promote_architect_boolean_desc: "Если у вас есть хотя бы один [GetBuildingType('building_arts_academy').GetName] с [concept_pm_artists_academy_school], вы можете продвигать [concept_gaudi_architect] в обзоре художников." #deepl:738833409
 dubois.2051.basilosaurus: "Базилозавр" #deepl:3895138572
 dubois.2051.megalodon: "Мегалодон" #deepl:439976392
 dubois.2051.plesiosaurus: "Плезиозавр" #deepl:3684543079
 dubois.2171.h: "Плезиозавр." #deepl:868173169
 dubois.2171.i: "Базилозавр." #deepl:2592886142
 dubois.2171.j: "Мегалодон." #deepl:1809322411
 dubois.2173.f: "Плезиозавры - это порядок морских рептилий. Их окаменелости можно найти по всему миру. В зависимости от вида, длина животных составляла от 1,5 до 15 метров. В зависимости от вида они, вероятно, питались различными животными. От улиток и мидий до рыбы и другой добычи.\nСвои U-образные челюсти и острые зубы, напоминающие ловушку для рыбы, служили им полезным инструментом." #deepl:1725138010
 dubois.2173.t: "Плезиозавр" #deepl:3684543079
 dubois.2174.f: "Базилозавр - это не динозавр, а доисторическая форма кита. Его длинное тело напоминает длинную змею, а при длине до 20 метров он похож на кашалота." #deepl:4279559397
 dubois.2174.t: "Базилозавр" #deepl:3895138572
 dubois.2175.f: "Гигантская акула Мегалодон, вероятно, является самой большой из когда-либо существовавших акул. Однако определить ее длину довольно сложно, поскольку в настоящее время найдены только зубы и позвонки. По оценкам наших палеонтологов, ее длина составляет от 9 до 30 метров. В любом случае, скелет акулы захватывает дух и является одной из жемчужин нашей коллекции." #deepl:1066794911
 dubois.2175.t: "Мегалодон" #deepl:439976392
 dubois.2181.x: "Перемонтировать плезиозавра" #deepl:3298110349
