 MR_FIFA_BUTTON_TT: "#T Найти FIFA#!\nПо мере распространения футбола количество межнациональных матчей увеличивалось, и возникла необходимость в создании глобального руководящего органа. ФИФА (фр. Fédération Internationale de Football Association) - международная саморегулируемая организация, управляющая футболом, футзалом и пляжным футболом. Это одна из старейших и крупнейших в мире неправительственных организаций, основанная 21 мая 1904 года. Основание ФИФА позволило проводить международные матчи между отдельными странами, тренеры которых могут совершенствоваться благодаря победам в матчах. В конечном итоге это приведет к созданию Кубка мира.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3292557058
