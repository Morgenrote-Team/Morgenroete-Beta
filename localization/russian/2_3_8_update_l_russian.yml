 MR_AUTOMATE_PALEONTOLOGIST_TT: "#T Автоматизируйте [concept_dubois_paleontologist]#! \nВам больше не придется давать задания Палеонтологу, если вы его автоматизируете.\nОн будет работать самостоятельно и выполнять задания, которые имеют смысл в данный момент. Вам по-прежнему нужно будет получать [Concept('concept_dubois_paleontological_expedition','$concept_dubois_paleontological_expeditions$')] или устанавливать [Concept('concept_dubois_paleontological_team','$concept_dubois_paleontological_teams$')]. Вы также будете получать события." #deepl:1919857505
