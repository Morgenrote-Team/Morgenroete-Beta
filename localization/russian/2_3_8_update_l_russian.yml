 je_khaldun_al_qarawiyyin_reason: "Некогда великий центр обучения Аль-Карауйин пришел в упадок на протяжении многих веков. Но, возможно, мы сможем изменить его курс и снова сделать его важным центром науки." #deepl:1953836253
 je_verrier_venus_transit_1874: "Транзит Венеры 1874 года в [SCOPE.sCountry('target').GetName]" #deepl:3052931223
 je_verrier_venus_transit_1874_reason: "Приближается редкое небесное событие. Планета Венера пройдет прямо между Землей и Солнцем, отбрасывая свою крошечную тень на солнечный диск. Обсерватории по всему миру готовятся к этому мимолетному явлению, которое может помочь определить масштабы нашей Солнечной системы." #deepl:3195507086
