 manzoni_writer_crime_book_bestseller_title_1_loc: "«Дело безумного кока»"
 manzoni_writer_crime_book_bestseller_flavor_1_loc: "В открытом море, где опасность подстерегает за каждым углом, корабельный кок - безраздельный властелин своего камбуза. Но когда череда исчезновений потрясает команду, подозрение падает на того единственного, в чьих руках сосредоточена власть над жизнью и смертью.\n\n«Твоя курица так суха, что хочется запить её морской водой», - говорит матрос и отворачивается, не зная, что его судьба в этот миг была решена. Кок, чей голос сочился злобой, начал точить свой тесак и ответил: «О, не бойся, добрый сэр. Завтра утром ты отведаешь яств, достойных королей», - и зловеще ухмыльнулся.\n\nПрисоединяйтесь к нашему отважному повару, который готовит бурю из обмана и предательства в «Деле безумного кока» - захватывающей повести об убийстве в открытом море."
