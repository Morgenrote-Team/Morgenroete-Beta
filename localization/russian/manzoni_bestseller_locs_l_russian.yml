 manzoni_writer_literary_fiction_book_bestseller_title_1_loc: "«Королевская семья в работном доме»"
 manzoni_writer_literary_fiction_book_bestseller_flavor_1_loc: "Эта повесть рассказывает об испытаниях некогда правившей королевской семьи, которая правила железной рукой, в строгом режиме террора, где никто, кроме них, не знал ни богатства, ни благополучия. Они облагали своих подданных налогами по самым ничтожным поводам, жестоко наказывали за неповиновение или даже без всякой причины. Их тирания привела Великий Доминион Империи от процветающего и могущественного прошлого к голодающему, раздираемому войной государству, разорённому нищетой и упадком.\n\nИ всё же они требовали большего, что заставило имперский народ восстать и протестовать, в конце концов совершив кровавую революцию, в ходе которой было создано новое правительство, а бывшие правители схвачены.\n\nТеперь оставался вопрос: что с ними делать. Одни хотели немедленно их обезглавить, другие выступали за более длительное наказание.\n\nТаким образом, после недолгих дебатов, для бывших владык был выбран работный дом ужасов, где им предстояло провести остаток своих дней.\n\nТак начинается наша повесть о заслуженном правосудии, мести и возрождении некогда великой нации Империи!"
