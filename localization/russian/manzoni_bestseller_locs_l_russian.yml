 manzoni_writer_crime_book_bestseller_title_6_loc: "«Тайны и исчезновения в Блэквуде»"
 manzoni_writer_crime_book_bestseller_flavor_6_loc: "В освещённых газовыми фонарями переулках Блэквуда череда загадочных исчезновений потрясает жителей. Погрузитесь в глубины этой леденящей душу тайны, где ничто не является тем, чем кажется, а истина скрывается в тенях."
 manzoni_writer_crime_book_bestseller_title_7_loc: "«Загадка похищенного скипетра»"
 manzoni_writer_crime_book_bestseller_flavor_7_loc: ""
 manzoni_writer_crime_book_bestseller_title_8_loc: "«Бандиты-бастарды с базара в Бени-Суэфе»"
 manzoni_writer_crime_book_bestseller_flavor_8_loc: "На пыльных улицах Будждура, где безжалостно палит солнце, а крики торговцев эхом разносятся по многолюдному базару, банда изгоев стремится выковать свою собственную судьбу. Рождённые незаконными сыновьями богатого шейха, изгнанные из родного дома, чтобы выживать в неумолимой пустыне, они - «Бандиты-бастарды с базара в Будждуре».\n\nДвижимые голодом и жалом предательства, они встают на путь преступности, охотясь на купцов, проходящих через шумный рынок. Но по мере того, как они становятся смелее, а их амбиции растут, они понимают, что им уготовано нечто большее, чем мелкие кражи. Объединённые общим наследием и жаждой мести отцу, который их отверг, они замышляют свой путь к власти, поклявшись вернуть то, что принадлежит им по праву."
 manzoni_writer_crime_book_bestseller_title_9_loc: "«Тайное общество Серебряного Змея»"
 manzoni_writer_crime_book_bestseller_flavor_9_loc: ""
