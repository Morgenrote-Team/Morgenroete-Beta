 manzoni_writer_crime_book_bestseller_flavor_10_loc: ""
 manzoni_writer_crime_book_bestseller_title_11_loc: "«Загадка вороньего глаза»"
 manzoni_writer_crime_book_bestseller_flavor_11_loc: ""
 manzoni_writer_crime_book_bestseller_title_12_loc: "«Разбойники Дикого Запада»"
 manzoni_writer_crime_book_bestseller_flavor_12_loc: "Когда солнце садится над суровыми пейзажами Дикого Запада, из пыли появляются тёмные фигуры разбойников, их имена шепчут со страхом и восхищением. На страницах этого захватывающего повествования читатели прокатятся бок о бок с этими печально известными преступниками, воочию переживая полные адреналина перестрелки и дерзкие побеги, определившие эпоху беззакония."
 manzoni_writer_crime_book_bestseller_title_13_loc: "«Загадочное изумрудное ожерелье»"
 manzoni_writer_crime_book_bestseller_flavor_13_loc: ""
 manzoni_writer_crime_book_bestseller_title_14_loc: "«Смерть нищего в Опиумном переулке»"
 manzoni_writer_crime_book_bestseller_flavor_14_loc: "От роскошных особняков элиты до убогих трущоб нищих, Опиумный переулок - это плавильный котёл порока и добродетели. «Смерть нищего в Опиумном переулке» приглашает читателей погрузиться в сердце этого сурового подпольного мира, где перед лицом отчаяния стираются границы между добром и злом. Приготовьтесь быть поглощёнными этой захватывающей историей о преступлении, сострадании и поиске справедливости в сошедшем с ума мире."
 manzoni_writer_crime_book_bestseller_title_15_loc: "«Призрак Фенвикского леса»"
 manzoni_writer_crime_book_bestseller_flavor_15_loc: ""
