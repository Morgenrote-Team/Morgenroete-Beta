 manzoni_writer_mystery_book_bestseller_flavor_1_loc: ""
 manzoni_writer_mystery_book_bestseller_title_2_loc: "«Багровый кинжал»"
 manzoni_writer_mystery_book_bestseller_flavor_2_loc: "В лунных тенях ночи багровый блеск пронзает тьму - предвестник ужаса и отчаяния. «Багровый кинжал» шепчет свой зов сирены, заманивая ничего не подозревающие души в свои смертельные объятия. Выкованный в огне древнего колдовства, этот проклятый клинок жаждет крови, его злая сила развращает сердца тех, кто осмелится им владеть. Отправьтесь в глубины безумия и одержимости в этой леденящей душу истории о сверхъестественном ужасе и тёмном очаровании власти."
