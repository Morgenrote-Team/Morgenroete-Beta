 manzoni_bestseller_doyle_arthur_conan_1_t: "«Этюд в багровых тонах», автор: [ROOT.GetCharacter.GetFullName]"
 manzoni_bestseller_doyle_arthur_conan_1_d: "Детектив, раскрывающий преступления с помощью логики и силы разума. Этот Шерлок Холмс - завораживающий персонаж. Какую же интересную концепцию придумал Артур Конан Дойл."
 manzoni_bestseller_doyle_arthur_conan_1_f: "«Легче было догадаться, чем объяснить, почему я догадался. Если бы вас попросили доказать, что дважды два - четыре, вы, возможно, столкнулись бы с трудностями, и всё же вы совершенно уверены в этом факте».\n- Артур Конан Дойл, «Этюд в багровых тонах»"