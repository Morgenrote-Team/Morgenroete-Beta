 manzoni_writer_mystery_book_bestseller_title_12_loc: "«Безмолвная песнь бездушного моряка»"
 manzoni_writer_mystery_book_bestseller_flavor_12_loc: "Капитан Элиас Аптон стоял на палубе своего крепкого корабля, нахмурив брови в глубокой сосредоточенности и вглядываясь в тёмный горизонт. Воздух был пропитан жуткой тишиной, нарушаемой лишь слабым плеском волн о корпус. Его матросы суетились, их лица были искажены страхом, когда они пытались удержать тех, кто, казалось, был притянут манящим зовом.\n\nВ глубинах Карибского моря, среди шёпота древних легенд и теней забытых проклятий, таится тайна, не поддающаяся объяснению. Рассказы о пропавших душах и призрачных явлениях веками преследовали эти воды, но ни одна из них не была столь леденящей душу, как легенда о Безмолвной Песни - навязчивой мелодии, которая заманивает ничего не подозревающих моряков на верную гибель.\n\nПогружаясь всё глубже в сердце тьмы, капитан Аптон раскрывает секреты, которые угрожают разрушить саму ткань реальности. С каждым шагом ближе к истине он рискует разделить судьбу тех, кто был до него. Ибо во владениях Бездушного Моряка, где стирается грань между живыми и мёртвыми, лишь самые храбрые души осмелятся противостоять тьме, что таится под волнами."
