 manzoni_writer_science_fiction_book_bestseller_flavor_1_loc: "История о корабле, способном путешествовать к звёздам, и его удивительном капитане и команде, которые сталкиваются с невообразимыми трудностями в местах, где ещё не бывал человек. Они преодолевают огромные расстояния в темноте космоса, ведомые звёздным светом и своими чудесными навигационными приборами будущего. Они исследуют далёкие планеты, как чудесные, так и опасные - завораживающе красивые и невероятно рискованные. Узнайте на страницах этой книги, какие испытания их ждут, что они откроют за пределами человеческого мира и с кем могут столкнуться в своём опасном путешествии сквозь звёзды!"
