 manzoni_writer_juvenile_book_bestseller_flavor_2_loc: "В туманных горах Шотландии жила-была девчонка, столь же дерзкая, сколь и бойкая. Присоединяйтесь к юной Фионе в её причудливых приключениях по холмам и древним замкам её родины. От встреч с озорными феями до обмана неуклюжих великанов, каждая история - это восхитительное путешествие, полное смеха, дружбы и капельки волшебства. Приготовьтесь быть очарованными неотразимым обаянием «Историй дерзкой шотландской девчонки», ведь приключения Фионы покорят сердца читателей всех возрастов."
