 je_mendelejew_improve_fertilizer_project_reason: "Ваш [concept_mendelejew_chemist')] доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] работает над модернизацией методов производства #tooltippable_name #tooltip:[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetTooltipTag],DATA_BUILDING_NAME_TOOLTIP,BuildingTooltip [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('RU_BL_RP')]#!#! в [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetCustom('RU_SL_PP')].\n$mr_divider_for_je$\nПроект будет получать прогресс каждый месяц. Каждый раз, когда прогресс достигает #V 24 очков#!, сооружение будет получать новый модификатор. Всего можно получить 3 модификатора.\n$mr_divider_for_je$\nТекущее сооружение: [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] в [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetCustom('RU_SL_PP')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_mendelejew_improve_chemical_plants_project_modifier_1_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_mendelejew_improve_chemical_plants_project_modifier_2_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_mendelejew_improve_chemical_plants_project_modifier_3_type')]\n\nВсего осталось сооружений (не считая текущего): [JournalEntry.MakeScope.Var('mr_number_of_remaining_list_entries_var').GetValue|V0]\n\nТекущий ежемесячный прогресс: #underline #tooltip:[GetRawTextTooltipTag('gaudi_monthly_mechanical_research_progress_tt')] [GetPlayer.MakeScope.ScriptValue('mendelejew_general_project_progress_value')|+2] #!#!"
