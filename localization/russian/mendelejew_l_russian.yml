 je_mendelejew_improve_explosives_project: "Улучшение взрывчатых веществ"
 je_mendelejew_improve_synthetics_project: "Улучшение синтетики"
 mendelejew_synthetic_fuel_tech: "Синтетическое топливо"
 mendelejew_synthetic_fuel_tech_desc: "Процесс Бергиуса-Пира — это крупномасштабный процесс сжижения угля путём прямого гидрирования. Макромолекулы угля расщепляются на более мелкие молекулы водородом при высоком давлении и температуре. В качестве продуктов образуются газообразные и жидкие углеводороды, которые используются в качестве топлива и смазочных материалов. С 1910 по 1925 год немецкий химик Фридрих Бергиус разработал основы процесса. Коммерческая разработка процесса и катализатора была проведена BASF с 1925 года под руководством Маттиаса Пира."
 mendelejew.501.t: "На службе человечеству"
 mendelejew.501.d: "[SCOPE.sCharacter('mendelejew_chemist_scope').GetFullName] произвел[SelectLocalization(SCOPE.sCharacter('mendelejew_chemist_scope').GetCharacter.IsFemale, 'а', '')] революцию на заводах по производству удобрений в стране. Новые химические процессы и методы значительно улучшили производство и эффективность. Уже говорят, что доктор [SCOPE.sCharacter('mendelejew_chemist_scope').GetCharacter.GetLastName] внес[SelectLocalization(SCOPE.sCharacter('mendelejew_chemist_scope').GetCharacter.IsFemale, 'ла', '')] значительный вклад в борьбу с мировым голодом.\n\nВсего улучшено сооружений: [GetPlayer.MakeScope.Var('mr_num_improved_chemical_plants_buildings_var').GetValue|V0]"
 mendelejew.501.f: "«Фермеры нас опередят с нашими суперновыми удобрениями! Действительно большой шаг для человечества, сказочное достижение профессора! Он очень умный человек. Тот факт, что я зарабатываю состояние, — это просто побочный эффект, который вы можете смело опустить в своей статье. Но не стесняйтесь упомянуть мою победу на последнем турнире по гольфу»."
 mendelejew.501.g: "Больше нитратов для всех!"
 mendelejew.502.t: "На службе горной промышленности"
 mendelejew.502.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] начал[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')] новый этап в горнодобывающей промышленности нашей страны, запатентовав новые процессы в производстве взрывчатых веществ. С новой формулой, разработанной доктором [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], производство стало более эффективным, и требуется меньше материалов.\n\nВсего улучшено сооружений: [GetPlayer.MakeScope.Var('mr_num_improved_explosives_factory_buildings_var').GetValue|V0]"
 mendelejew.502.f: "«Конечно, эти взрывчатые вещества не сделают шахтёров безопаснее. Но если они успешны, то теперь они ещё более успешны. Я убедился во взрывной силе нашего нового динамита, изобретённого доктором [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], и обнаружил, что теперь шахтёрам приходится работать меньше, чем когда-либо. В принципе, они должны платить мне, потому что им больше ничего не остаётся, кроме как подметать обломки»."
 mendelejew.502.g: "Больше нитроглицерина для всех!"
 mendelejew.503.t: "На службе национальному суверенитету"
 mendelejew.503.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] инициировал[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')] значительные изменения в производстве синтетических продуктов. С усовершенствованием некоторых формул и улучшенными процессами теперь можно производить ещё больше продуктов с меньшими затратами. [GetPlayer.GetName] стал[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] как никогда независим[GetPlayer.GetAltNameNoFormatting('RU_CL_END_FEM')] от заграницы, а доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] уже считается национальным героем.\n\nВсего улучшено сооружений: [GetPlayer.MakeScope.Var('mr_num_improved_synthetics_factory_buildings_var').GetValue|V0]"
 mendelejew.503.f: "«По сути, покупка наших новых синтетических продуктов — это патриотический долг. Их изобрёл #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ий#! учёный, доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], их производят #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ие#! рабочие на #tooltippable_name [ROOT.GetCountry.GetAdjective|l]их#! фабриках из — более или менее — #tooltippable_name [ROOT.GetCountry.GetAdjective|l]их#! ресурсов. И вы ведь хотите быть хорошим, патриотичным гражданином, не так ли? Тогда более высокая цена должна чего-то стоить, в конце концов, речь идёт об отечестве»."
 mendelejew.503.g: "Больше синтетических продуктов для всех!"
 mendelejew.601.t: "Конгресс химиков"
 mendelejew.601.d: "Приготовления к важнейшей международной встрече химиков в городе [ROOT.GetCountry.GetCapital.GetCityHubName] почти завершены. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] особо позаботил[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'ась', 'ся')], чтобы мероприятие привлекло самых важных экспертов. Теперь не хватает только приглашений."
 mendelejew.601.f: "Химия утвердилась как научная дисциплина в середине XIX века и всё ещё имела значительный теоретический дефицит. Различные «школы» представляли разные взгляды, особенно по вопросам строения атомов и молекул. Согласно Джону Дальтону, они в целом принимались как мельчайшие строительные блоки химических соединений, но об их структуре почти ничего не было известно. Разные взгляды существовали и по другим фундаментальным теоретическим вопросам, таким как базовая величина атомных весов. Номенклатура и написание формул также были крайне непоследовательны. Однако до сих пор не было форума, на котором можно было бы обсуждать текущие проблемы. Поэтому три молодых профессора химии взяли на себя инициативу организовать конгресс, чтобы прояснить спорные вопросы в дискуссии с коллегами по цеху, и пригласили самых важных представителей предмета в Карлсруэ с 3 по 5 сентября 1860 года."
 mendelejew.601.g: "Наши гости станут хлоридом натрия в супе."
 mendelejew.602.d: "[SCOPE.sCountry('mendelejew_congress_host_country').GetNameNoFlag] пригласил[SCOPE.sCountry('mendelejew_congress_host_country').GetAltNameNoFormatting('RU_CL_END_FEM')] на международный конгресс химиков. По-видимому, люди хотят обсудить международно установленный вес атомов. Доктор [SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName] получил[SelectLocalization(SCOPE.sCharacter('mendelejew_chemist_scope').IsFemale, 'а', '')] тёплое приглашение."
 mendelejew.602.g: "Мы должны быстро отреагировать!"
 mendelejew.604.t: "Вес атома"
 mendelejew.604.d: "Хотя конференция началась многообещающе, попытки наконец-то установить вес атомов на международном уровне вскоре зашли в тупик. Фракция национально настроенных химиков не хотела отказываться от своих прежних систем."
 mendelejew.604.f: "На конгрессе в Карлсруэ в 1860 году не было достигнуто согласия по нескольким темам. Одной из важнейших тем были атомные и молекулярные веса. Основываясь на выводах предыдущих химиков, было достигнуто согласие в том, что атомы являются дискретными частицами, а молекулы строятся из них, но параллельно использовалось несколько систем атомных весов. Одна из них была основана на водороде, которому было присвоено значение 1 как базовой единице, углероду — 6, а кислороду — 8. Пока существовали неопределённости в атомных весах, элементный состав исследуемых соединений был сомнителен. Существовало до пяти различных вариантов взвешивания, и из-за сложных преобразований некоторые химики склонялись к тому, чтобы вообще ничего не менять."
 mendelejew.604.g: "Нет причин отказываться от старой системы, когда столько разногласий."
 mendelejew.604.h: "Нам нужен общий, международный атомный вес."
 mendelejew.605.t: "Беседы химиков"
 mendelejew.605.d: "В кулуарах научной конференции доктор [SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName] получает возможность обменяться идеями со многими коллегами-профессионалами со всего мира. Остаётся вопрос, как лучше всего воспользоваться этой уникальной возможностью."
 mendelejew.605.f: "«В самом деле, нет ничего удивительного в этой необходимости гипотезы, чтобы помочь нам в постижении законов. Часто случается, что разум человека, изучающего новую науку, должен пройти через все те фазы, которые сама наука прошла в своей исторической эволюции». — Станислао Канниццаро"
 mendelejew.605.g: "Наш химик должен собрать новые идеи на будущее."
 mendelejew.605.h: "Наш химик должен искать решения текущих проблем в своих исследованиях."
 mendelejew.605.i: "Наш химик должен отправить вперёд своих ассистентов, чтобы они чему-нибудь научились."
 mendelejew.609.t_national: "Конгресс химиков завершился безрезультатно"
 mendelejew.609.d_national: "Три дня организаторы и ведущие эксперты в области химии пытались спасти мероприятие, но в конечном итоге так и не удалось найти универсального правила, как следует указывать атомный вес. Национальным государствам ещё некоторое время придётся пользоваться традиционными системами, что делает необходимыми таблицы перевода."
 mendelejew.609.f_national: "Конгресс в Карлсруэ был первым специализированным конгрессом научной дисциплины. Несмотря на отсутствие решающих результатов, конгресс химиков в Карлсруэ можно считать важнейшим событием в истории химии XIX века. Встреча такого количества химиков из страны и из-за рубежа оказала каталитическое влияние на дальнейшее развитие теоретической химии."
 mendelejew.609.g: "Это отбросит нас на годы назад."
 mendelejew.609.t_international: "Конгресс химиков завершился соглашением"
 mendelejew.609.d_international: "К счастью, химики на научной конференции нашли единое решение для атомного веса. Теперь оно признано на международном уровне. Учёные ссылаются на теорему Амедео Авогадро. Доктор [SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName] сегодня с радостью сообщил об успехе в письме."
 mendelejew.609.f_international: "Важным долгосрочным результатом конгресса в Карлсруэ стало принятие ныне привычных атомных весов. После встречи в Карлсруэ были приняты значения около 1 для водорода, 12 для углерода, 16 для кислорода и так далее. Это было основано на признании того, что некоторые элементы, такие как водород, азот и кислород, состоят из двухатомных молекул, а не из отдельных атомов."
 mendelejew.609.h: "Прорыв в химии!"
 mendelejew.201.d: "Это потребовало напряжённых часов и просеивания утомительного количества материала, но доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] теперь уверен[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')]: если последние исследования верны, то [SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'она', 'он')] действительно открыл[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')] долгожданный #YELLOW элемент № [ROOT.Var('mendelejew_searched_variable').GetValue|0]#!. Доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] решил[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')] назвать элемент #YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('mendelejew_element_name')]#!."
 mendelejew.301.d: "Больше нет никаких сомнений: #YELLOW элемент № [ROOT.Var('mendelejew_examined_variable').GetValue|0]#! не только существует, но и может быть выделен с помощью современных химических методов. Это поистине великий день для нашей страны!"
 je_mendelejew_element_isolation_reason: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] неустанно работает над выделением нового элемента. Опыт, навыки и черты характера, а также оборудование лаборатории в обсерватории оказывают значительное влияние на то, сколько времени займёт этот процесс. Исследование посвящено #YELLOW элементу № [ROOT.Var('mendelejew_examined_variable').GetValue|0]#!."
 je_mendelejew_element_theory_goal: "#E Прогресс химика#! достигает #ORANGE [JournalEntry.GetTotalGoalValue|V0]#! очков."
 je_mendelejew_element_discovery_goal: "#E Прогресс химика#! достигает #ORANGE [JournalEntry.GetTotalGoalValue|V0]#! очков."
 je_mendelejew_element_isolation_goal: "#E Прогресс химика#! достигает #ORANGE [JournalEntry.GetTotalGoalValue|V0]#! очков."
 mendelejew.202.t: "Поиски нового элемента доктором [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]"
 mendelejew.302.t: "Изучение нового элемента доктором [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]"
 ACHIEVEMENT_GROUP_mendelejew_achievement_group: "Достижения Менделеева"
 ACHIEVEMENT_mendelejew_chemist: "Химик"
 ACHIEVEMENT_DESC_mendelejew_chemist: "Достигните показателя химии не менее 50."
 ACHIEVEMENT_mendelejew_proud: "Менделеев бы гордился"
 ACHIEVEMENT_DESC_mendelejew_proud: "Изобрести периодическую таблицу химических элементов."
 ACHIEVEMENT_mendelejew_oil: "Нефтяная самодостаточность"
 ACHIEVEMENT_DESC_mendelejew_oil: "Стать первой державой, изобретшей синтетическое топливо."
 mendelejew.11.t: "Взрывное дело"
 mendelejew.11.d: "[SCOPE.sCharacter('mendelejew_chemist_scope').GetFullName] в ходе своих экспериментов с нитроглицерином исследовал[SelectLocalization(SCOPE.sCharacter('mendelejew_chemist_scope').IsFemale, 'а', '')] усовершенствованное взрывчатое вещество и [SelectLocalization(SCOPE.sCharacter('mendelejew_chemist_scope').IsFemale, 'добилась', 'добился')] буквально оглушительного успеха. Химик запатентовал[SelectLocalization(SCOPE.sCharacter('mendelejew_chemist_scope').IsFemale, 'а', '')] своё изобретение и производит его в опытном порядке на собственной фабрике."
 mendelejew.11.f: "Во время учёбы в Париже в 1850 году Альфред Нобель познакомился с Асканио Собреро, который тремя годами ранее открыл нитроглицерин, но не счёл его практичным из-за чувствительности к ударам и огню. Нобель очень заинтересовался изобретением и с 1862 года направил свои усилия на внедрение нитроглицерина в технику в качестве взрывчатого вещества. Во время экспериментов Нобеля с нитроглицерином произошло несколько несчастных случаев. В сентябре 1864 года в результате взрыва 125 килограммов нитроглицерина, хранившихся в его лаборатории, погибли его брат Эмиль, инженер Герцман, горничная Мария, посыльный Герман и плотник Юхан Петер Нюман. В 1866 году Нобель добился прорыва и разработал взрывчатое вещество, которое он назвал «динамит», на своей фабрике взрывчатых веществ в Крюммеле близ Гестхахта."
 mendelejew.11.g: "[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'Она', 'Он')] ещё и предприниматель?"
 mendelejew.12.t: "[SCOPE.sCharacter('mendelejew_chemist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('mendelejew_chemist_scope').IsFemale, 'нашла', 'нашёл')] причину линий Фраунгофера"
 mendelejew.12.d: "Долгое время причина тонких чёрных линий в спектре Солнца была предметом догадок. Но теперь доктор [SCOPE.sCharacter('mendelejew_chemist_scope').GetFullName] наконец-то [SelectLocalization(SCOPE.sCharacter('mendelejew_chemist_scope').IsFemale, 'нашла', 'нашёл')] причину их появления: определённые химические элементы вызывают эти линии. Это даёт возможность узнать, какие элементы присутствуют на звёздах."
 mendelejew.12.f: "Йозеф Фраунгофер заметил отчётливые линии в спектре Солнца в 1813 году. Лишь десятилетия спустя Густав Роберт Кирхгоф и Роберт Бунзен нашли причину этих линий. Сжигая различные элементы и химические соединения, они заметили, что эти элементы поглощают определённые части спектра. Поэтому они пришли к выводу, что поглощение определённых частей спектра является доказательством наличия определённого химического соединения или элемента во внешней части звезды.\n\nСпектроскопия не только позволила классифицировать звёзды по их типу, но и дала возможность проводить спектроскопический анализ материалов и химических веществ. Даже открытие гелия произошло благодаря спектроскопии Солнца."
 mendelejew.12.g: "Ещё одна тайна вселенной раскрыта!"
 building_mendelejew_hydrogenation_plants: "Гидрогенизационные заводы"
 pmg_mendelejew_coal_liquefaction: "Сжижение угля"
 pm_mendelejew_coal_liquefaction: "Сжижение угля"
 mendelejew_chemist_synthetic_oil_cost_modifier: "Исследование синтетической нефти"
 je_mendelejew_synthetic_oil: "Исследование сжижения угля"
 je_mendelejew_synthetic_oil_reason: "Сжижение угля, также гидрирование угля, сегодня преимущественно называемое coal-to-liquid (CtL), — это карбохимический процесс преобразования бурого или каменного угля в жидкие основные химикаты и синтетические топлива, такие как бензин, дизель, керосин. С 1910 по 1925 год Фридрих Бергиус разработал процесс высокого давления, который впоследствии был изменён Маттиасом Пиром: первый крупномасштабный процесс сжижения угля. Это прямое гидрирование, которое проводится в две фазы. В 1925 году Франц Фишер, тогдашний директор Института кайзера Вильгельма по исследованию угля, и его коллега Ганс Тропш открыли реакцию, которая является одной из важнейших в области гетерогенного катализа и чьё научное, экономическое и социальное значение видно и сегодня."
 je_mendelejew_synthetic_oil_goal: "#E Прогресс химика#! достигает #ORANGE 100#! очков."
 mendelejew.701.t: "Из угля в нефть"
 mendelejew.701.d: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetFullName] достиг[SelectLocalization(GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'ла', '')] исторического свершения, которое войдёт в историю химии. После многих лет экспериментов и строительства новой лаборатории нашему главному химику удалось произвести синтетическое топливо. Это произведёт революцию во всей химической промышленности."
 mendelejew.701.f: "Систематические исследования эквивалентных заменителей для производства бензина начались в Германии после Первой мировой войны. С одной стороны, различные правительства Веймарской республики постоянно ставили под сомнение импорт нефти из-за экономической ситуации и всё чаще стремились к самообеспечению. С другой стороны, американские учёные в исследовании, которое было воспринято всерьёз во всём мире, предсказывали, что мировые запасы нефти будут исчерпаны в короткие сроки, в то время как моторизация неумолимо росла. На этом фоне, при поддержке правительства, исследователи и компании с большой интенсивностью обратились к источнику энергии, которого в Германии было в избытке: к углю. Тот факт, что из угля можно получить бензол, был известен уже в начале XIX века — задолго до нефтяного бензина. Немецкий химик Фридрих Бергиус подал первый патент на гидрирование углерода в 1913 году, за что вместе с Карлом Бошем получил Нобелевскую премию."
 mendelejew.701.g: "Это означает, что у нас есть самодостаточное снабжение нефтью."
 mendelejew_chemist_periodic_table_inventor: "Изобретатель периодической таблицы"
 mendelejew_chemist_periodic_table_inventordesc: "Как создатель периодической таблицы, этот персонаж особенно хорош в теоретическом обосновании элементов."
 mendelejew.801.t: "Периодическая таблица элементов"
 mendelejew.801.d: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetFullName] удалось упорядочить ранее известные химические элементы и даже сделать предсказания о том, каких элементов ещё не хватает. Как и предполагалось ранее, свойства элементов в предсказуемой системе периодически повторяются — поэтому доктор [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName] назвал[SelectLocalization(GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')] её «Периодической таблицей элементов»."
 mendelejew.801.f: "Современная периодическая таблица была разработана Лотаром Мейером и Дмитрием Ивановичем Менделеевым. Оба опубликовали свои результаты в 1869 году и в 1882 году совместно получили медаль Дэви от Британского королевского общества за свою работу. Менделеев упоминается чаще Мейера как создатель сегодняшней периодической таблицы. С одной стороны, потому что периодическая таблица Мейера была опубликована несколькими месяцами позже, а с другой — потому что Менделеев сделал предсказания о свойствах ещё не открытых элементов. В России периодическая таблица до сих пор называется «таблицей Менделеева». Ни Менделеев, ни Мейер не знали о работах друг друга по периодической таблице. Менделеев также не был осведомлён о работах Бегье де Шанкуртуа 1862 года, Ньюлендса 1863/64 годов или Хинрикса 1866/67 годов."
 mendelejew.801.g: "Теперь химия — настоящая наука."
 je_mendelejew_periodic_table: "Порядок элементов"
 je_mendelejew_periodic_table_reason: "В начале XIX века уже велись поиски закономерностей в отношениях между элементами. Препятствиями были, среди прочего, неопределённости в атомных массах и тот факт, что многие элементы ещё не были известны. Дёберейнер первым установил связь между атомной массой и химическими свойствами отдельных элементов. В 1824 году Фалькнер опубликовал систему естественных семейств элементов. Однако большого прорыва пока не произошло."
