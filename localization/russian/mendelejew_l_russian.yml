 je_noble_gases: "Неизвестные элементы в воздухе"
 je_noble_gases_reason: "Генри Кавендиш в 1783 году нашёл первое указание на то, что воздух содержит нереакционноспособный газ. Он смешал воздух и кислород таким образом, что содержащиеся в нём элементы азот и кислород полностью прореагировали, образовав оксиды азота с помощью фрикционного электричества. При этом остался не вступивший в реакцию остаток. Однако он не осознал ценности своего открытия и не прекратил свои эксперименты. Это может быть свидетельством существования ранее неизвестных элементов, которые необходимо исследовать с помощью самых современных методов."
 je_mendelejew_noble_gases_has_famous_chemist_tt: "Есть знаменитый [concept_mendelejew_chemist]."
 je_mendelejew_noble_gases_invalid: "Другая держава открывает благородные газы."
 mendelejew.901.t: "Благородные газы"
 mendelejew.901.d: "Доктор [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName] смог[SelectLocalization(GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'ла', '')] выделить ранее теоретически предсказанный гелий, который также был обнаружен на Земле. Он сделал поразительное открытие: в воздухе присутствует не один, а несколько неизвестных элементов. Из-за их низкой реакционной способности он назвал их благородными газами."
 mendelejew.901.f: "Эксперименты Кавендиша по изучению воздуха были продолжены лордом Рэлеем с 1888 года. Он отметил, что азот, полученный из воздуха, имеет иную плотность, чем тот, что получен из разложения аммиака. Поэтому Рэлей предположил, что в воздухе должен быть ещё неизвестный, инертный компонент. Поэтому он и Уильям Рамзай попытались полностью удалить азот из образца воздуха, прореагировав его с магнием, и выделить этот неизвестный газ. Наконец, в 1894 году им удалось спектроскопически обнаружить новый элемент, названный аргоном. После определения основных свойств гелия и аргона было установлено, что эти газы одноатомны, в отличие от других атмосферных газов. Уильям Рамзай тогда предположил, что должна существовать целая группа таких газов, которые образуют свою собственную группу в периодической таблице, и он начал их искать. В 1898 году ему и Моррису Уильяму Траверсу удалось выделить неон, криптон и ксенон путём фракционной дистилляции воздуха."
 mendelejew.901.g: "Благородные? Я бы назвал это ленивыми."
 mandelejew_noble_gases_901.tt: "Теоретически обосновать, открыть и выделить #YELLOW аргон#!, #YELLOW неон#!, #YELLOW криптон#! и #YELLOW ксенон#!."
 mendelejew_chemist_synthetic_rubber_cost_modifier: "Исследование синтетического каучука"
 mendelejew_synthetic_rubber_tech: "Синтетический каучук"
 mendelejew_synthetic_rubber_tech_desc: "Синтетический каучук — это искусственный эластомер. Это полимеры, синтезированные из побочных продуктов нефти. Синтетические каучуки превосходят натуральные по двум основным параметрам: термической стабильности и устойчивости к маслам и сопутствующим соединениям."
 building_mendelejew_synthetic_rubber_factory: "Завод синтетического каучука"
 pmg_mendelejew_isoprene: "Изопрен"
 pm_mendelejew_isoprene: "Изопрен"
 je_mendelejew_synthetic_rubber_reason: "Около 1860 года Чарльзу Хэнсону Гревиллу Уильямсу удалось дистиллировать изопрен из натурального каучука и определить молекулярную формулу C5H8. Это позволило Гюставу Бушарда в 1879 году впервые произвести синтетический каучук в процессе, который занял несколько месяцев, путём нагревания изопрена, полученного из каучука, с соляной кислотой и получения каучукоподобного вещества. Около 1900 года Иван Кондаков произвёл первый полностью синтетический каучук из 2,3-диметилбутадиена. Первый патент на производство синтетического каучука был выдан Фрицу Хофману в 1909 году. Так называемый метилкаучук был полимеризован из 2,3-диметилбутадиена."
 je_mendelejew_synthetic_rubber_goal: "#E Прогресс химика#! достигает #ORANGE 75#! очков."
 mendelejew.702.t: "Каучук в лаборатории"
 mendelejew.702.d: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetFullName] достиг[SelectLocalization(GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'ла', '')] исторического свершения, которое войдёт в историю химии. После многих лет экспериментов и строительства новой лаборатории нашему главному химику удалось произвести синтетический каучук. Это произведёт революцию во всей химической промышленности."
 mendelejew.702.f: "Во время обеих мировых войн Германия потеряла доступ к своим источникам каучука, что стимулировало поиск альтернатив. Во время Первой мировой войны с 1915 по 1918 год на заводе Bayer в Леверкузене было произведено около 2500 тонн метилкаучука по процессу Фрица Хофмана. Первым коммерчески пригодным синтетическим каучуком стал стирол-бутадиеновый каучук (SBR), который был разработан в 1926 году немецкими химиками Вальтером Боком и Эдуардом Чункуром на заводе I.G.-Farbenindustrie в Леверкузене и запатентован 15 января 1927 года."
 mendelejew.702.g: "Больше никакой аллергии на латекс!"
