 mendelejew_chemist_theorist: "Специализация химика: теоретик"
 mendelejew_chemist_theorist_desc: "Этот химик сосредоточился на теоретической химии и быстрее формулирует новые гипотезы о ранее не открытых элементах."
 mendelejew_chemist_analyst: "Специализация химика: аналитик"
 mendelejew_chemist_analyst_desc: "Этот химик — талантливый первооткрыватель новых элементов и добивается успеха быстрее других коллег."
 mendelejew_chemist_inspector: "Специализация химика: исследователь"
 mendelejew_chemist_inspector_desc: "Этот химик считается опытным исследователем веществ и может выделять элементы быстрее, чем кто-либо другой."
 je_mendelejew_element_theory: "Теоретическое обоснование элемента"
 je_mendelejew_element_theory_reason: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] выдвигает теорию о новом элементе. Опыт, навыки и черты характера, а также оборудование лаборатории в обсерватории оказывают значительное влияние на то, сколько времени займёт этот процесс. Исследование посвящено #YELLOW элементу № [ROOT.Var('mendelejew_thought_variable').GetValue|0]#!."
 je_chemist_dies_tt: "Доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] умирает"
 je_element_theory_failed_tt: "Другая держава выдвигает теорию об элементе раньше, чем доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]"
 je_mendelejew_element_discovery: "Поиск элемента"
 je_mendelejew_element_discovery_reason: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] неустанно работает над открытием нового элемента. Опыт, навыки и черты характера, а также оборудование лаборатории в обсерватории оказывают значительное влияние на то, сколько времени займёт этот процесс. Исследование посвящено #YELLOW элементу № [ROOT.Var('mendelejew_searched_variable').GetValue|0]#!."
 je_element_discovery_failed_tt: "Другая держава открывает элемент раньше, чем доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]."
 je_mendelejew_element_isolation: "Изучение элемента"
 je_element_isolation_failed_tt: "Другая держава выделяет элемент раньше, чем доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]."
 mendelejew.101.t: "Теория о новом элементе"
 mendelejew.101.d: "После обширных исследований и изысканий доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] предположил, что должен существовать ещё один, неизвестный элемент. Химик называет его гипотетическим #YELLOW элементом № [ROOT.Var('mendelejew_thought_variable').GetValue|0]#!. Однако его открытие ещё впереди."
 mendelejew.101.f: "Термин «химический элемент» возник в XVII веке, когда всё чаще стали признавать, что концепция элементов в алхимии непригодна для научного объяснения разнообразных свойств веществ и их реакций друг с другом. В 1661 году Роберт Бойль опубликовал влиятельную критику недостатков алхимии под названием «Химик-скептик». В ней он объяснил, что под химическими элементами следует понимать те первоначальные вещества, «которые не возникли ни из других веществ, ни друг из друга, но которые образуют компоненты, из которых состоят смешанные вещества»."
 mendelejew.101.g: "Но эй, это всего лишь теория. Теория химика!"
 mendelejew.102.t: "Недостающий элемент?"
 mendelejew.102.d: "В своём последнем исследовании доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] установил, что, исходя из текущих знаний, должны существовать и другие, неизвестные элементы. Пока неясно, как именно их можно определить, но скоро должна быть сформулирована гипотеза."
 mendelejew.102.f: "Термин «элементы» (stoicheia) впервые использовал греческий философ Платон около 360 года до н. э. в своём диалоге «Тимей», который включает обсуждение состава неорганических и органических тел и является умозрительным трактатом по химии. Платон считал, что элементы, введённые веком ранее Эмпедоклом, состоят из маленьких многогранных форм: тетраэдра (огонь), октаэдра (воздух), икосаэдра (вода) и куба (земля)."
 mendelejew.102.g: "Как может недоставать того, о существовании чего ты не знаешь?"
 mendelejew.103.t: "Иностранная держава выдвигает теорию о новом элементе"
 mendelejew.103.d: "К сожалению нашего главного химика, [SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'она узнала', 'он узнал')] сегодня, что в иностранном журнале будет опубликована научная статья с гипотезой о #YELLOW элементе № [ROOT.Var('mendelejew_thought_variable').GetValue|0]#!, которую как раз собирался выдвинуть доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]. Все исследования были прекращены."
 mendelejew.103.f: "«Удача благоволит подготовленному уму». — Луи Пастер"
 mendelejew.103.g: "Наглость! Наша публикация уже практически была в печати!"
 mendelejew.111.t: "Отсутствующий профессор?"
 mendelejew.111.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] считается не только превосходным исследователем, но и одарённым преподавателем. Однако текущие обязанности в ходе исследования элементов создают проблемы в учебном плане. Уже поступают жалобы на то, что семинарам и лекциям уделяется недостаточно внимания."
 mendelejew.111.f: "Немецкий профессор химии Юстус фон Либих был особенно популярен среди своих студентов благодаря своим современным методам обучения. Его открытия и труды вскоре сделали его известным во всём мире, в результате чего, помимо многих немцев, в Гиссен приезжали многочисленные иностранцы, в том числе 84 англичанина и 18 американцев, чтобы послушать лекции Либиха по химии и фармации."
 mendelejew.111.g: "Доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] должен сосредоточиться на исследованиях."
 mendelejew.111.h: "Доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] должен сосредоточиться на преподавании."
 mendelejew.111.i: "Доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] должен найти баланс."
 mendelejew.112.t: "Сон"
 mendelejew.112.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] рассказывает о вдохновляющем ночном сне, который помог [SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'ей', 'ему')] решить теоретическую химическую проблему, с которой [SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'она', 'он')] ранее не мог[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'ла', '')] справиться."
 mendelejew.112.f: "«Я сидел и писал свой учебник, но работа не двигалась; мои мысли были где-то в другом месте. Я повернул стул к огню и задремал. Снова атомы резвились перед моими глазами. На этот раз меньшие группы скромно держались на заднем плане. Мой мысленный взор, обострённый повторяющимися видениями такого рода, теперь мог различать более крупные структуры многообразной формы; длинные ряды, иногда более плотно прилегающие друг к другу, все извивались и крутились, подобно змеям. Но смотрите! Что это было? Одна из змей схватила себя за хвост, и эта форма насмешливо закружилась перед моими глазами. Словно от вспышки молнии я проснулся; и на этот раз я также провёл остаток ночи, прорабатывая следствия этой гипотезы. Научимся мечтать, господа, и тогда, возможно, мы познаем истину... но остережёмся публиковать наши сны, прежде чем они будут проверены бодрствующим разумом». — Август Кекуле"
 mendelejew.112.g: "Вы хотите сказать, что доктор работает даже во сне?"
 mendelejew.113.t: "Трактат по химии"
 mendelejew.113.d: "В качестве побочного исследования к основной теории о неизвестном элементе был создан трактат по химии. Доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] до сих пор предназначал его только для личного пользования, но ассистент настаивает на том, чтобы его завершить и опубликовать, а не рассматривать просто как набросок."
 mendelejew.113.f: "Не только в химии, но и почти в любой академической дисциплине может случиться так, что искомый результат исследования не достигается, но по пути делаются гораздо более интересные открытия, которые фиксируются лишь наспех. Часто бывает, что цель ненадолго теряется, чтобы посвятить себя чему-то более новаторскому."
 mendelejew.113.g: "Это всего лишь для частного исследования."
 mendelejew.113.h: "Это исследование следует преподавать на курсах."
 mendelejew.113.i: "Эта публикация имеет научную ценность — она должна быть общедоступной!"
 mendelejew.114.t: "Грёзы наяву"
 mendelejew.114.d: "Наш химик, доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], указал[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')], что [SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'ей', 'ему')] необходимы особый отдых и возможности для уединения, особенно вдохновляющий сон, чтобы успешно завершить свои исследования. Однако с тех пор мало что произошло."
 mendelejew.114.f: "«Если все гипотезы верны, и эта химическая формула действительна, то должен быть... о, белка!»"
 mendelejew.114.g: "Химик всё это время просто бездельничал?!"
 mendelejew.115.t: "Астрономо-химическое сотрудничество"
 mendelejew.115.d: "Наши астроном и химик, доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] и доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] обменялись идеями, что дало революционные импульсы в теоретическом обосновании нового элемента."
 mendelejew.115.f: "Ещё до открытия спектроскопии, но особенно после, химия и астрономия продолжали влиять друг на друга. Спектроскопия первоначально использовалась как астрономический метод в экспериментах Уильяма Хайда Волластона, который построил первый спектрометр для отображения спектральных линий солнечных лучей. Эти спектральные линии позже были охарактеризованы Йозефом фон Фраунгофером. Позднее Густав Роберт Кирхгоф и Роберт Бунзен обнаружили, что каждый химический элемент связан с определённым числом и расположением спектральных линий. Из этого они заключили, что линии, наблюдаемые Волластоном и Фраунгофером, обусловлены поглощающими свойствами этих элементов в верхних слоях Солнца и что, следовательно, они должны присутствовать и в фотосфере."
 mendelejew.115.g: "Академический синтез!"
 mendelejew.201.t: "Открытие нового элемента"
 mendelejew.201.f: "«Мы должны ожидать открытия многих ещё неизвестных элементов, например, элементов, аналогичных алюминию и кремнию, чей атомный вес будет находиться между 65 и 75». — Дмитрий Менделеев"
 mendelejew.201.g: "А какой он на вкус?"
 mendelejew.202.d: "Наш главный химик, [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName], твёрдо убеждён, что постулированный #YELLOW элемент № [ROOT.Var('mendelejew_searched_variable').GetValue|0]#! действительно существует, и решил его найти."
 mendelejew.202.f: "Из элементов в сегодняшнем понимании в древности в чистом виде были известны только десять элементов, которые либо встречались в природе, либо могли быть выплавлены из руды: углерод, сера, железо, медь, цинк, серебро, олово, золото, ртуть и свинец. В ходе средневековой истории горного дела в рудах, особенно в Рудных горах, были обнаружены небольшие количества примесей неизвестных металлов, которые были названы в честь горных духов (кобальт, никель). Открытие фосфора в 1669 году Хеннигом Брандом окончательно открыло эру открытия большинства элементов, включая уран из урановой смолки Мартином Генрихом Клапротом в 1789 году."
 mendelejew.202.g: "Элементарное исследование."
 mendelejew.203.t: "Иностранная держава открывает новый элемент"
 mendelejew.203.d: "Сегодня на конференции доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] узнал[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')], что иностранному химику удалось первым открыть #YELLOW элемент № [ROOT.Var('mendelejew_searched_variable').GetValue|0]#!. Демотивированн[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'ая', 'ый')] этой новостью, [SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'она прекратила', 'он прекратил')] все исследования."
 mendelejew.203.f: "«Я испробовала различные эксперименты, описанные в трактатах по физике и химии, и результаты иногда были неожиданными. Временами меня воодушевлял маленький нежданный успех; в другие я была в глубочайшем отчаянии из-за несчастных случаев и неудач, вызванных моей неопытностью». — Мария Кюри"
 mendelejew.203.g: "Мы должны доказать, что это ложный элемент!"
 mendelejew.211.t: "Новая лаборатория?"
 mendelejew.211.d: "Доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] жалуется, что химическая лаборатория в [SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'её', 'его')] университете находится в плохом состоянии. Срочно необходимо закупить новые инструменты и оборудование. В противном случае открытие новых элементов может значительно затянуться."
 mendelejew.211.f: "Обустройство лабораторий и закупка нового оборудования или инструментов были далеко не само собой разумеющимися. Во многих местах в начале XIX века к химии всё ещё относились негативно. Несмотря на свой важный ранг, химику Юстусу фон Либиху даже приходилось самому оплачивать лабораторное оборудование."
 mendelejew.211.g: "Профинансировать новую лабораторию с самым современным оборудованием."
 mendelejew.211.h: "Сэкономить в университете, чтобы закупить новые инструменты."
 mendelejew.211.i: "И кто всё это будет финансировать?"
 mendelejew.212.t: "Неизвестное химическое соединение"
 mendelejew.212.d: "В своих попытках наконец открыть #YELLOW элемент № [ROOT.Var('mendelejew_searched_variable').GetValue|0]#!, доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] обнаружил[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')] ранее неизвестное химическое соединение, которое может принести практическую пользу промышленности."
 mendelejew.212.f: "Химическое соединение — это химическое вещество, состоящее из множества одинаковых молекул (или молекулярных единиц), содержащих атомы более чем одного химического элемента, удерживаемые вместе химическими связями. Молекула, состоящая из атомов только одного элемента, следовательно, не является соединением. Соединение может быть преобразовано в другое вещество в результате химической реакции, которая может включать взаимодействие с другими веществами. В этом процессе связи между атомами могут быть разорваны или образованы новые связи."
 mendelejew.212.g: "Отлично!"
 mendelejew.213.t: "Ассистент-химик"
 mendelejew.213.d: "В поисках всё ещё не открытого #YELLOW элемента № [ROOT.Var('mendelejew_searched_variable').GetValue|0]#!, доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] получает ценную поддержку от талантливого ассистента. Некоторые коллеги считают, что он даже слишком хорош, чтобы работать простым ассистентом."
 mendelejew.213.f: "«Я был просто очарован химическими явлениями, реакциями, в которых появляются вещества, часто с поразительно разными свойствами; и я надеялся узнавать всё больше и больше об этом аспекте мира». — Лайнус Полинг"
 mendelejew.213.g: "Ассистент должен сосредоточиться на исследовании элемента."
 mendelejew.213.h: "Поощрить этот научный талант."
 mendelejew.214.t: "Плохие образцы"
 mendelejew.214.d: "Как выяснилось, доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] месяцами работал[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')] с нечистыми образцами и поэтому получал[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')] из них ложные результаты."
 mendelejew.214.f: "«Что значит, это просто обесцвеченный кварц?!»"
 mendelejew.214.g: "Научная неудача."
 mendelejew.215.t: "Геолого-химическое сотрудничество"
 mendelejew.215.d: "Наши геолог и химик, доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] и доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] обменивались идеями, что дало революционные импульсы для открытия нового элемента."
 mendelejew.215.f: "Без новых минералов, каталогизированных геологами, открытие многих химических элементов было бы невозможно. В 1839 году немецко-швейцарский химик Кристиан Фридрих Шёнбейн ввёл термин «геохимия». Она основана на концепции не только описания минералов, но и понимания их материальной основы и химической динамики, стоящей за ними."
 mendelejew.301.t: "Выделение нового элемента"
 mendelejew.301.f: "«В природе ничего не создаётся, ничего не теряется, всё меняется. Мы должны доверять только фактам: они представлены нам Природой и не могут обмануть». — Антуан Лавуазье"
 mendelejew.301.g: "Триумф науки."
 mendelejew.302.d: "Хотя #YELLOW элемент № [ROOT.Var('mendelejew_examined_variable').GetValue|0]#! считается «открытым», его существование ещё не подтверждено, пока его не удастся выделить. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] решил[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')] изучить элемент более подробно, проверить его и, наконец, сделать доступным в чистом виде."
 mendelejew.302.f: "Первый современный список элементов был дан в «Элементах химии» Антуана Лавуазье 1789 года, который содержал 33 элемента, включая свет и теплород. К 1818 году Йёнс Якоб Берцелиус определил атомные веса для 45 из 49 принятых на тот момент элементов. В периодической таблице Дмитрия Менделеева 1869 года было 63 элемента."
 mendelejew.302.g: "Надеюсь, лаборатория застрахована."
 mendelejew.303.t: "Иностранная держава выделяет новый элемент"
 mendelejew.303.d: "Плохие новости! Похоже, иностранный химик выделил #YELLOW элемент № [ROOT.Var('mendelejew_examined_variable').GetValue|0]#!. Все усилия и надежды, которые вложил доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], оказались напрасны. Может, нам стоит исследовать другой элемент?"
 mendelejew.303.f: "«Это правильная идея, но не в подходящее время. Если я и преуспел больше, чем многие из тех, кто меня окружает, то это в основном — могу ли я сказать, почти исключительно — благодаря всеобщему усердию». — Джон Дальтон"
 mendelejew.303.g: "Эта научная слава должна была принадлежать нам..."
 mendelejew.311.t: "Химический синтез"
 mendelejew.311.d: "Во время попыток выделить #YELLOW элемент № [ROOT.Var('mendelejew_examined_variable').GetValue|0]#! доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] преуспел[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')] в синтезе, который ранее считался технически очень сложным. Это принесёт пользу как экономике и промышленности, так и науке."
 mendelejew.311.f: "Химический синтез (химическое соединение) — это искусственное проведение химических реакций для получения одного или нескольких продуктов. Это происходит путём физических и химических манипуляций, обычно включающих одну или несколько реакций. В современных лабораторных условиях процесс является воспроизводимым и надёжным. В химическом синтезе участвуют одно или несколько соединений (известных как реагенты или реактанты), которые претерпевают трансформацию при определённых условиях. Для получения желаемого продукта могут применяться различные типы реакций. Это требует смешивания соединений в реакционном сосуде, таком как химический реактор или простая круглодонная колба. Многие реакции требуют некоторой формы обработки или процедуры очистки для выделения конечного продукта."
 mendelejew.311.g: "Прекрасно."
 mendelejew.312.t: "Химическая диссоциация"
 mendelejew.312.d: "Доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] добился прогресса в своих попытках выделить #YELLOW элемент № [ROOT.Var('mendelejew_examined_variable').GetValue|0]#!. Химическая диссоциация позволила [SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'ей', 'ему')] сделать решающий шаг вперёд."
 mendelejew.312.f: "Диссоциация в химии — это общий процесс, при котором молекулы (или ионные соединения, такие как соли или комплексы) разделяются или расщепляются на другие частицы, такие как атомы, ионы или радикалы, обычно обратимым образом. Например, когда кислота растворяется в воде, ковалентная связь между электроотрицательным атомом и атомом водорода разрывается гетеролитическим расщеплением, что даёт протон (H+) и отрицательный ион. Диссоциация является противоположностью ассоциации или рекомбинации."
 mendelejew.312.g: "Фантастика!"
 mendelejew.313.t: "Пренебрежение обязанностями"
 mendelejew.313.d: "Не секрет, что [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] использует своё текущее исследовательское задание по выделению #YELLOW элемента № [ROOT.Var('mendelejew_examined_variable').GetValue|0]#! как предлог, чтобы избежать остальных неприятных академических обязанностей. Ректор призвал [SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'её', 'его')] к ответу, так как [SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'она не появляется', 'он не появляется')] на университетских собраниях или лекциях."
 mendelejew.313.f: "Любой предлог хорош, чтобы держаться подальше от надоедливых существ, которые обычно называются «студенты»."
 mendelejew.313.g: "Доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] займется делами поважнее."
 mendelejew.313.h: "Доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] будет выполнять и другие свои обязанности."
 mendelejew.314.t: "Непредвиденная химическая реакция"
 mendelejew.314.d: "Во время одного из своих последних химических экспериментов доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], по-видимому, неверно истолковал[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')] несколько мелочей и тем самым несколько недооценил[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')] эффект реакции."
 mendelejew.314.f: "Газеты всё ещё сообщают о неудачной операции пожарной бригады, чьё использование воды только подстегнуло химическую реакцию вместо того, чтобы уменьшить ущерб. Несколько студентов жаловались на отравление дымом, а в лаборатории было несколько пострадавших. Здание университета на факультете естественных наук получило значительные повреждения и будет закрыто на месяцы, если не на годы. Местная газета ожидала, что доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] выскажет своё мнение. Однако с [SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'ней', 'ним')] не удалось связаться, после [SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'её', 'его')] недолгого пребывания в больнице из-за теннисного турнира."
 mendelejew.314.g: "Катастрофа!"
 mendelejew.315.t: "Инженерно-химическое сотрудничество"
 mendelejew.315.d: "Инженер, доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName], усовершенствовал научное оборудование, чтобы доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] продвинулся в запланированном выделении элемента."
 mendelejew.315.f: "В начале XX века химики и инженеры-механики сотрудничали в химической промышленности, например, при проектировании реакторов и котлов, некоторые из которых подвергались значительным нагрузкам (600 °C и 100 бар). На этом стыке в конечном итоге развилась новая дисциплина химической инженерии, выпускники которой сегодня доминируют в химической промышленности."
 mendelejew.401.t: "Химический эксперимент"
 mendelejew.401.d: "Чтобы отвлечься от своей обычной работы, доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] хочет использовать пространство в самой важной лаборатории страны для проведения химического эксперимента. Лабораторная посуда уже готова."
 mendelejew.401.f: "Время от времени химикам приходит в голову идея заняться своей страстью вместо порученных им задач. Иногда это действительно приводит к ценным открытиям: например, к усовершенствованию удобрений или производству химикатов в промышленности. Произойдёт ли такой успех, во многом зависит от черт характера, навыков и опыта химика."
 mendelejew.401.g: "Мне не терпится увидеть, что получится из этого эксперимента!"
 mendelejew.401.h: "Прекратите эту чушь."
 mendelejew.402.t: "Успешный эксперимент"
 mendelejew.402.d: "Доктор [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] был[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')] прав[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')] и действительно извлек[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'ла', '')] полезные знания из своего последнего эксперимента. Недавно открытый химический процесс повлияет на сельское хозяйство и промышленность в ближайшие годы. Может быть, когда-нибудь этот процесс назовут в честь [SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'неё', 'него')]?"
 mendelejew.402.f1: "Благодаря своим экспериментальным исследованиям, [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] удалось создать более качественное удобрение, которое обещает более богатые урожаи в ближайшие годы."
 mendelejew.402.f2: "Своим революционным процессом [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] заложил[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')] основы для специального удобрения, которое будет использоваться в основном на плантациях."
 mendelejew.402.f3: "Новый процесс, который [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] сделал[SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')] доступным для промышленности, должен значительно улучшить производство на химических заводах."
 mendelejew.402.g: "Успех!"
 mendelejew.403.t: "Неудачный эксперимент"
 mendelejew.403.d: "Хотя [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] с коллегами возлагали большие надежды на работу, [SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'её', 'его')] эксперимент не увенчался успехом. Вместо этого [SelectLocalization(ROOT.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'она потеряла', 'он потерял')] драгоценное время, которое лучше было бы потратить на исследование элементов."
 mendelejew.403.f: "«Что ж, это сработало не так, как ожидалось. По крайней мере, лаборатория не взорвалась!»"
 mendelejew.403.g: "Разочаровывающе."
