l_russian:
 thriving_culture_lesson_start_tutorial_button_loc: "Начать обучение"
 mr_tutorial_buttons: "Кнопки Morgenröte"
 mr_tutorial_buttons_desc: "Большинство возможностей Morgenröte доступно через окна мода. Открыть их можно, нажав на кнопки в боковой панели. В настоящее время существуют следующие окна:\n\n\n- #V Окно науки#!: здесь вы можете найти своих [Concept('concept_academics_academic', 'учёных')], информацию об их деятельности, ваш [Concept('concept_academics_progress', 'научный прогресс')] и научные экспедиции.\n\n- #V Окно искусства#!: здесь вы можете найти своих [Concept('concept_artists_artist', 'деятелей искусства')], информацию об их деятельности, ваш [Concept('concept_artistic_progress', 'творческий прогресс')] и [Concept('concept_artists_art_style', 'художественные стили')].\n\n- #V Окно спорта#!: здесь вы можете найти различные виды спорта и связанных с ними персонажей, а также информацию о воздухоплавании и международных спортивных организациях."
 mr_tutorial_science_window_open: "Откройте окно науки"
 mr_tutorial_science_window_open_desc: "Теперь давайте подробнее рассмотрим окно науки. Откройте его, нажав на кнопку или клавишу «M» на клавиатуре."
 mr_tutorial_science_window_open_tt: "Откройте окно науки, нажав на кнопку науки или клавишу «M»"
 mr_tutorial_science_tab: "Окно науки"
 mr_tutorial_science_tab_desc: "Окно науки — это место, где вы можете найти информацию и действия, связанные с вашими научными начинаниями.\n\n\nОно разделено на 4 вкладки:\n\n- #V Обзор#!: на этой вкладке находится [Concept('concept_academics_progress', 'научный прогресс')], #V общие научные экспедиции#! и #V научный фокус#!\n\n- #V Математико-технические науки#!: на этой вкладке находятся [Concept('concept_tesla_engineer', '#b #ORANGE инженеры#!#!')], [Concept('concept_mendelejew_chemist', '#b #ORANGE химики#!#!')] и [Concept('concept_verrier_astronomer', '#b #ORANGE астрономы#!#!')]\n\n- [Concept('concept_dubois_natural_history', 'Естественные науки')]: на этой вкладке находятся [Concept('concept_agassiz_geologist', '#b #GREEN геологи#!#!')], [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтологи#!#!')] и [Concept('concept_dubois_naturalist', '#b #GREEN натуралисты#!#!')]\n\n- #V Гуманитарно-антропологические науки#!: на этой вкладке находятся [Concept('concept_panum_physician', '#b #BLUE врачи#!#!')], [Concept('concept_lepsius_archaeologist', '#b #BLUE археологи#!#!')] и [Concept('concept_lepsius_anthropologist', '#b #BLUE антропологи#!#!')]"
 mr_tutorial_science_tab_tt: "Окно науки открыто"
 mr_tutorial_science_overview_tab_open: "Откройте вкладку «Обзор»"
 mr_tutorial_science_overview_tab_open_desc: "Вкладка «Обзор» даёт доступ к [Concept('concept_academics_progress', 'научному прогрессу')], #V общим научным экспедициям#! и #V научному фокусу#!.\n\nПерейдите на вкладку «Обзор», нажав на неё."
 mr_tutorial_science_overview_tab_open_tt: "Перейдите на вкладку «Обзор», нажав на неё."
 mr_tutorial_science_overview_tab_promote_academics: "Поддержка учёных"
 mr_tutorial_science_overview_tab_promote_academics_desc: "Сердце Morgenröte — это персонажи. Но как их получить?\n\nЧтобы получить нового [Concept('concept_academics_academic', 'учёного')], вам нужно накопить достаточно [Concept('concept_academics_progress', 'научного прогресса')]. Вы можете навести курсор на индикатор прогресса, чтобы увидеть, какие факторы влияют на его прирост.\n\nВы можете целенаправленно взрастить определённого учёного, если у вас есть университет со [Concept('concept_academics_university_specialization', 'специализацией')].\n\nВы также можете инвестировать деньги, чтобы быстрее накапливать научный прогресс.\n\nКроме того, учёных можно получить в результате событий или нанять с помощью дипломатического действия, если ваша держава не входит в число самых передовых в научном отношении стран."
 mr_tutorial_science_overview_tab_scientific_focus: "Научный фокус"
 mr_tutorial_science_overview_tab_scientific_focus_desc: "Иногда вам может понадобиться сосредоточиться на определённом виде исследований. Вы можете использовать научные фокусы, если соответствуете их требованиям. Они будут способствовать исследованию определённых групп технологий, снижая при этом эффективность других."
 mr_tutorial_science_overview_tab_scientific_expedition: "Научные экспедиции"
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "Научные экспедиции — это экспедиции, которые может начать ваша страна. В зависимости от типа экспедиции, они могут принести вашей стране большие выгоды.\n\nВ настоящее время существуют следующие экспедиции:\n- [Concept('concept_dubois_pacific_expedition', 'Тихоокеанская экспедиция')]\n- Экспедиция для наблюдения за [Concept('concept_verrier_venus_transit', 'прохождением Венеры')]\n- Экспедиция по поиску Северо-Западного прохода\n- Экспедиция на цеппелине\n- Экспедиция по прокладке трансатлантического кабеля"
 mr_tutorial_science_natural_history_tab_open: "Откройте вкладку «Естественные науки»"
 mr_tutorial_science_natural_history_tab_open_desc: "Теперь давайте взглянем на одного из [Concept('concept_academics_academic', 'учёных')]. Откройте вкладку «Естественные науки», чтобы продолжить."
 mr_tutorial_science_natural_history_tab_open_tt: "Перейдите на вкладку «Естественные науки», нажав на неё."
 mr_tutorial_science_natural_history_tab_character: "Учёные"
 mr_tutorial_science_natural_history_tab_character_desc: "Сердце Morgenröte — это его персонажи. На вкладке науки этими персонажами являются [Concept('concept_academics_academic', 'учёные')].\n\nСлева для каждой новой роли персонажа вы можете увидеть портрет вашего учёного и дополнительную информацию о нём."
 mr_tutorial_science_natural_history_tab_character_rating: "Рейтинг персонажа"
 mr_tutorial_science_natural_history_tab_character_rating_desc: "У большинства персонажей рядом с именем есть небольшой значок. Этот значок указывает на их пригодность для своей роли. Вы можете увидеть, какие факторы влияют на этот рейтинг, наведя курсор на значок.\n\nРасшифровка значков:\n@mr_rating_fantastic!  Идеально\n@mr_rating_very_good!  Очень хорошо\n@mr_rating_good!  Хорошо\n@mr_rating_mediocre!  Посредственно\n@mr_rating_bad!  Плохо\n@mr_rating_very_bad!  Очень плохо"
 mr_tutorial_science_natural_history_tab_character_experience_bar: "Опыт персонажа"
 mr_tutorial_science_natural_history_tab_character_experience_bar_desc: "Каждый персонаж имеет [Concept('concept_academics_experience', 'опыт')] в своей области знаний. Чем выше опыт, тем лучше персонаж справляется с различными задачами.\n\nОпыт накапливается пассивно каждый год, а также активно — за выполнение заданий и успешные действия. [Concept('concept_academics_academic', 'Учёные')] получают более высокие черты, достигнув 100 (опытный) и 300 (знаменитый) единиц опыта."
 mr_tutorial_science_natural_history_tab_character_achievements: "Достижения персонажа"
 mr_tutorial_science_natural_history_tab_character_achievements_desc: "[Concept('concept_academics_academic', 'Учёные')] иногда совершают впечатляющие деяния. Вы всегда можете проверить, чего уже достиг ваш учёный, наведя курсор на этот значок."
 mr_tutorial_science_natural_history_tab_currencies: "Открытия и показатели"
 mr_tutorial_science_natural_history_tab_currencies_desc: "У большинства персонажей в Morgenröte есть связанные с ними показатели. Они отображаются в центре для каждого учёного. Например, для геологии вы увидите, сколько минералов было найдено или сколько у вас геологических знаний.\n\nЧасто вы можете узнать больше об определённых показателях, наведя на них курсор."
 mr_tutorial_science_natural_history_visit_button: "Кнопка посещения"
 mr_tutorial_science_natural_history_visit_button_desc: "У большинства [Concept('concept_academics_academic', 'учёных')] есть специальные кнопки посещения, которые расскажут вам больше об этом конкретном учёном.\n\nНапример, у [Concept('concept_dubois_naturalist', '#GREEN #b натуралиста#!#!')] есть кнопка для посещения зоопарка, где вы можете узнать больше о ваших животных."
 mr_tutorial_science_natural_history_ranking: "Рейтинг"
 mr_tutorial_science_natural_history_ranking_desc: "Возможно, вам нравится сравнивать себя с другими странами. В таком случае рейтинг может быть для вас интересен. Наведя курсор на этот значок, вы увидите различные списки, которые позволят вам оценить, насколько вы преуспеваете в определённом аспекте Morgenröte по сравнению с другими державами.\n\nНапример, для [concept_agassiz_geologist|l] можно сравнить ваш геологический счёт, геологические знания, океанографические знания, а также количество минералов и редких минералов."
 mr_tutorial_science_natural_history_project_buttons: "Кнопки проектов и другие кнопки"
 mr_tutorial_science_natural_history_project_buttons_desc: "Эта часть интерфейса — одна из самых важных для вас. Она позволяет поручать вашим [Concept('concept_academics_academic', 'учёным')] проекты и начинать другие важные взаимодействия.\n\n[concept_agassiz_geologist] может отправляться в экспедиции, улучшать ваши отрасли промышленности, пересчитывать возраст Земли, а вы можете основать минералогический кабинет или начать конгресс по дрейфу континентов."
 mr_tutorial_science_natural_history_view_switch_buttons: "Сменить вид"
 mr_tutorial_science_natural_history_view_switch_buttons_desc: "Если вы предпочитаете более компактный интерфейс, вы можете изменить его вид с помощью этой кнопки. Для самой игры не имеет значения, какой вариант вы используете. Так что выбирайте тот, который вам больше нравится."
 mr_start_culture_tutorial_button_loc: "Обучение по культуре"
 mr_tutorial_not_yet_implemented_tt: "Это обучение ещё не готово."
 mr_tutorial_arts_window_open: "Откройте окно искусства"
 mr_tutorial_arts_window_open_desc: "Теперь давайте подробнее рассмотрим окно искусства. Откройте его, нажав на кнопку или клавиши «Ctrl + A» на клавиатуре."
 mr_tutorial_arts_window_open_tt: "Откройте окно искусства, нажав на кнопку науки или клавиши «Ctrl + A»"
 mr_tutorial_arts_tab: "Вкладка «Искусство»"
 mr_tutorial_arts_tab_desc: "Искусство было важной частью XIX и XX веков. Великие [Concept('concept_artists_artist', 'деятели искусства')] этой эпохи до сих пор широко известны.\n\nMorgenröte предлагает различных деятелей искусства и их произведения.\n\nСамо окно искусства имеет две вкладки. Одна показывает обзор искусства в вашей стране, на другой вы можете найти своих деятелей искусства и нанимать их из-за рубежа."
 mr_tutorial_arts_tab_cultural_tradition: "Культурная традиция"
 mr_tutorial_arts_tab_cultural_tradition_desc: "Культурная традиция — это показатель, отражающий культурные достижения вашей страны.\nОна состоит из [Concept('concept_elgar_musical_tradition', 'музыкальной традиции')], [Concept('concept_manzoni_literary_tradition', 'литературной традиции')] и [Concept('concept_klimt_painting_tradition', 'художественной традиции')].\n\nКультурная традиция рассчитывается по следующей формуле:\nМузыкальная традиция / 4 + Художественная традиция / 3 + Литературная традиция / 2\n\nКроме того, вы будете получать [concept_prestige|l] от вашей художественной традиции. Каждые 5 очков художественной традиции принесут 1 дополнительную единицу престижа."
 mr_tutorial_arts_overview_tab_open_tt: "Откройте вкладку обзора искусства"
 mr_tutorial_arts_tab_artist_progress: "Творческий прогресс"
 mr_tutorial_arts_tab_artist_progress_desc: "Вы можете получать новых [Concept('concept_artists_artist', 'деятелей искусства')] разными способами: нанимать их, получать в результате событий или накапливая достаточно [Concept('concept_artistic_progress', 'творческого прогресса')].\n\nХотя события и наём доступны не для каждой нации, получение деятелей искусства путём заполнения индикатора творческого прогресса возможно, как только у вас появится $building_elgar_opera$ или $building_art_academy$.\nВы можете увидеть полный список факторов, влияющих на ежемесячный прирост, наведя курсор на индикатор прогресса.\n\nКроме того, вы можете покровительствовать искусствам, чтобы получить больше прогресса, и продвигать определённых деятелей искусства, если у вас есть необходимый [concept_production_method|l] в вашей $building_art_academy$."
 mr_tutorial_arts_tab_center_of_arts: "Центр искусств"
 mr_tutorial_arts_tab_center_of_arts_desc: "[Concept('concept_artists_center_of_arts', 'Центры искусств')] — это места, где зародился тот или иной [concept_artists_art_style|l].\nНекоторые центры искусств уже существуют в начале игры. Другие можно разблокировать через [Concept('concept_journal_entry', 'записи в дневнике')] или нажав одну из кнопок, которые вы здесь видите. Наведите курсор на центр искусств, чтобы узнать, как его получить.\n\nОчевидно, что центры искусств полезны для вас и вашей страны, так как они дают доступ к бонусам."
 mr_tutorial_arts_tab_artists_tab_open: "Откройте вкладку «Деятели искусства»"
 mr_tutorial_arts_tab_artists_tab_open_desc: "Теперь давайте подробнее рассмотрим [Concept('concept_artists_artist', 'деятелей искусства')].\n\nОткройте вкладку «Деятели искусства», нажав на неё."
 mr_tutorial_arts_tab_artists_tab_open_open_tt: "Откройте вкладку «Деятели искусства»"
 mr_tutorial_arts_tab_artists: "Вкладка «Деятели искусства»"
 mr_tutorial_arts_tab_artists_desc: "[Concept('concept_artists_artist', 'Деятели искусства')] выглядят довольно похоже на учёных, но работают немного иначе.\n\nВ настоящее время существует 3 типа деятелей искусства:\n- [Concept('concept_elgar_composer', '#b #PURPLE Композиторы#!#!')]\n- [Concept('concept_manzoni_writer', '#b #PURPLE Писатели#!#!')]\n- [Concept('concept_klimt_painter', '#b #PURPLE Художники#!#!')]"
 mr_tutorial_arts_tab_artists_invite: "Приглашение деятелей искусства"
 mr_tutorial_arts_tab_artists_accquisation_desc: "Как мы уже упоминали, [Concept('concept_artists_artist', 'деятелей искусства')] можно не только получить, накопив достаточно [Concept('concept_artistic_progress', 'творческого прогресса')], но и просто пригласив их.\n\nУ каждого типа деятелей искусства разные требования. Вы можете приглашать [Concept('concept_elgar_travelling_composer', 'странствующих композиторов')] со всего мира, но для этого ваша страна должна иметь достаточно сооружений «$building_elgar_opera$» и достаточно высокий уровень [Concept('concept_elgar_musical_tradition', 'музыкальных традиций')].\n\n[Concept('concept_klimt_independent_painter', 'Независимых художников')] можно пригласить, только если у них схожая культура.\n\n[Concept('concept_manzoni_writer', '#b #PURPLE Писателей#!#!')], с другой стороны, вообще нельзя пригласить."
 mr_tutorial_arts_tab_artists_character: "Общая информация"
 mr_tutorial_arts_tab_artists_character_desc: "Самая левая часть окна показывает основную информацию о вашем деятеле искусства.\n\nЗдесь вы можете увидеть:\n- Портрет\n- Имя и рейтинг\n- [Concept('concept_artists_experience', 'Репутацию')]\n- [Concept('concept_character_trait', 'Черты характера')]"
 mr_tutorial_arts_tab_artists_currencies: "Важные показатели искусства"
 mr_tutorial_arts_tab_artists_currencies_desc: "Эта часть интерфейса позволяет вам увидеть общую информацию, касающуюся этого конкретного аспекта искусства.\nНапример, для [concept_elgar_composer|l] здесь отображается [concept_elgar_musical_tradition|l], произведения и шедевры вашего композитора, а также обзор пяти лучших композиторов мира.\n\nКроме того, вы можете найти рейтинг, наведя курсор на маленький значок в правом верхнем углу."
 mr_tutorial_arts_tab_artists_actions: "Действия деятелей искусства"
 mr_tutorial_arts_tab_artists_actions_desc: "У [Concept('concept_artists_artist', 'деятелей искусства')] также есть действия. Здесь вы можете увидеть, над чем могут работать ваши деятели искусства или какие решения вы можете принять на уровне нации.\n\nЭто была самая важная информация о деятелях искусства. Отсюда вы можете перейти к обучению по спорту или продолжить игру."
 mr_start_sports_tutorial_button_loc: "Обучение по спорту"
 mr_tutorial_sports_window_open: "Откройте окно спорта"
 mr_tutorial_sports_window_open_desc: "Теперь давайте подробнее рассмотрим окно спорта. Откройте его, нажав на кнопку или клавиши «Ctrl + S» на клавиатуре."
 mr_tutorial_sports_window_open_tt: "Откройте окно спорта, нажав на кнопку науки или клавиши «Ctrl + S»"
 mr_tutorial_sports_window: "Окно спорта"
 mr_tutorial_sports_window_desc: "Окно спорта даёт вам доступ ко всем видам спорта и персонажам, которые к ним относятся.\n\nОкно разделено на обычные виды спорта и воздухоплавание.\n\nОбычные виды спорта включают:\n- [Concept('concept_vikelas_olympic_games', 'Олимпийские игры')]\n- [Concept('concept_douglas_mountaineering', 'Альпинизм')]\n- Игры с мячом\n- [Concept('concept_vikelas_car_racing', 'Автогонки')]\n\nВоздухоплавание включает:\n- [Concept('concept_curtiss_balloonist', 'Аэронавтов')]\n- [Concept('concept_curtiss_pilot', 'Пилотов')]"
 mr_tutorial_sports_tab: "Вкладка «Спорт»"
 mr_tutorial_sports_tab_desc: "Вкладка «Спорт» даёт вам обзор различных спортивных мероприятий и персонажей.\nВ отличие от учёных и деятелей искусства, персонажи на вкладке спорта часто являются просто генералами или политиками."
 mr_tutorial_sports_tab_open_tt: "Откройте вкладку «Спорт»"
 mr_tutorial_sports_tab_character_overview: "Обзор персонажа"
 mr_tutorial_sports_tab_character_overview_desc: "Эта часть интерфейса даёт вам обзор [concept_character|l].\n\nНекоторые персонажи, такие как [concept_vikelas_coach|l] и автогонщик, — это персонажи, которых вы можете нанять, и поэтому у них есть [concept_academics_experience|l]. У других, например у альпиниста, опыта нет."
 mr_tutorial_sports_tab_currencies: "Показатели и информация"
 mr_tutorial_sports_tab_currencies_desc: "В середине вы можете увидеть важную информацию, касающуюся этого конкретного вида спорта.\n\nНапример, для [Concept('concept_vikelas_olympic_games', 'Олимпийских игр')] здесь представлен обзор президента и правления [Concept('concept_vikelas_ioc', 'МОК')], количество членов и сколько медалей вы уже собрали."
 mr_tutorial_sports_tab_actions: "Действия"
 mr_tutorial_sports_tab_actions_desc: "Правая сторона позволяет вам предпринимать определённые действия для этого вида спорта.\nЭти действия — по сути, решения, которые позволяют вам использовать ваших [Concept('concept_character', 'персонажей')] или учреждать что-то новое, например, [concept_vikelas_ioc|l]."
 mr_tutorial_sports_tab_aeronautics_tab_open: "Откройте вкладку «Воздухоплавание»"
 mr_tutorial_sports_tab_aeronautics_tab_open_desc: "Теперь давайте подробнее рассмотрим вкладку «Воздухоплавание». Откройте её, нажав на кнопку."
 mr_tutorial_aeronautics_tab_open_tt: "Откройте вкладку «Воздухоплавание»"
 mr_tutorial_aeronautics_tab: "Вкладка «Воздухоплавание»"
 mr_tutorial_aeronautics_tab_desc: "Вкладка «Воздухоплавание» выглядит в основном так же, как и вкладка «Спорт».\n\nОдно большое различие заключается в самих персонажах. Вы можете спонсировать и автоматизировать действия [Concept('concept_curtiss_balloonist', 'аэронавта')], а [concept_curtiss_pilot|l] будет появляться при различных обстоятельствах.\n\nНа этом обзорное обучение заканчивается. Пожалуйста, используйте «Википедию» или добавленные нами концепты, если хотите узнать больше о персонажах Morgenröte."
