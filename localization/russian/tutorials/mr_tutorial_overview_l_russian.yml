l_russian:
 thriving_culture_lesson_start_tutorial_button_loc: "Начать обучение"
 mr_tutorial_buttons: "Кнопки Morgenröte"
 mr_tutorial_buttons_desc: "Большинство механик в Morgenröte доступны через специальные окна. Вы можете получить к ним доступ, щелкнув по соответствующим кнопкам на боковой панели. В настоящее время существуют следующие окна:\n\n\n-#V Наука#!: Здесь находятся ваши [[Concept('concept_academics_academic', 'академики')], их деятельность, ваш [Concept('concept_academics_progress', 'академический прогресс')] и научные экспедиции.\n\n-#V Искусства#!: Здесь находятся ваши [Concept('concept_artists_artist','$concept_artists_artists$')], их деятельность, ваш [concept_artistic_progress] и [Concept('concept_artists_art_style','$concept_artists_art_styles$')].\n\n-#V Спорт#!: Здесь вы можете найти различные виды спорта и персонажей, связанных с ними, а также вкладку аэронавтика и пилотов. Во вкладке спорт вы также можете посмотреть международные спортивные организации, по разным видам спорта."
 mr_tutorial_science_window_open: "Откройте окно \"Наука\""
 mr_tutorial_science_window_open_desc: "Теперь давайте подробнее рассмотрим интерфейс науки. Откройте окно \"Наука\", щелкнув по соответствующей кнопке в боковом меню или нажав клавишу \"M\" на клавиатуре."
 mr_tutorial_science_window_open_tt: "Откройте окно \"Наука\", щелкнув по нужной кнопке или нажав клавишу \"M\"."
 mr_tutorial_science_tab: "Окно \"Наука\""
 mr_tutorial_science_tab_desc: "The science window is the place where you can find information and actions for your scientific endeavours.\n\n\nIt is seperated in 4 tabs:\n\n- #V Overview#!: This tab contains [concept_academics_progress], #V General Scientific Expeditions#! and the #V Scientific Focus#!\n\n- #V Mathematical-Technical#!: This tab contains the [concept_tesla_engineer], [concept_mendelejew_chemist] and [concept_verrier_astronomer]\n\n- [concept_dubois_natural_history]: This tab contains the [concept_agassiz_geologist], [concept_dubois_paleontologist] and [concept_dubois_naturalist]\n\n- #V Humanities-Anthropological#!: This tab contains the [concept_panum_physician], [concept_lepsius_archaeologist] and [concept_lepsius_anthropologist]"
 mr_tutorial_science_tab_tt: "Окно \"Наука\" открыто"
 mr_tutorial_science_overview_tab_open: "Откройте вкладку \"Обзор\""
 mr_tutorial_science_overview_tab_open_desc: "Вкладка \"Обзор\" позволяет вам получить доступ к таким механикам, как: [Concept('concept_academics_progress', 'академический прогресс')],#V  научные экспедиции#! и #V научный фокус#!\n\nПерейдите во вкладку \"Обзор\", щелкнув по соответствующей кнопке."
 mr_tutorial_science_overview_tab_open_tt: "Перейдите во вкладку \"Обзор\", щелкнув по соответствующей кнопке."
 mr_tutorial_science_overview_tab_promote_academics: "Продвижение академиков"
 mr_tutorial_science_overview_tab_promote_academics_desc: "Сердце Morgenröte — это персонажи. Но как-же получить этих персонажей?\n\nЧтобы у вас появился новый [Concept('concept_academics_academic', 'академик')], нужно набрать достаточно пунктов шкалы [Concept('concept_academics_progress', 'академического прогресса')]. Вы можете навести курсор на шкалу прогресса, чтобы увидеть, какие факторы влияют на её увеличение.\n\nВы можете продвинуть определённого академика, если у вас есть университет, где установлен соответствующий [Concept('concept_academics_university_specialization', 'университетский фокус')].\n\nТакже можно инвестировать деньги, чтобы ускорить получение научного прогресса.\n\n\nКак альтернатива, вы можете получить учёных с помощью событий или приобрести одного через специальное дипломатическое действие, если ваша страна не относится к самым развитым."
 mr_tutorial_science_overview_tab_scientific_focus: "Научный фокус"
 mr_tutorial_science_overview_tab_scientific_focus_desc: "Иногда вам может понадобиться сосредоточиться на определённом виде исследований. Вы можете воспользоваться научными фокусами, если выполните их требования. Они, по сути, будут способствовать развитию определённых групп технологий, одновременно снижая эффективность исследования других."
 mr_tutorial_science_overview_tab_scientific_expedition: "Научные экспедиции"
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "Научные экспедиции — это экспедиции, которые может организовать ваша страна. В зависимости от типа экспедиции, это может принести вашей стране огромную пользу.\n\nВ настоящее время существуют следующие экспедиции:\n- [concept_dubois_pacific_expedition]\n- Экспедиция [concept_verrier_venus_transit]\n- Экспедиция по поиску Северо-Западного прохода\n- Экспедиция на дирижабле\n- Экспедиция по прокладке трансатлантического кабеля"
 mr_tutorial_science_natural_history_tab_open: "Откройте вкладку \"Естествознание\""
 mr_tutorial_science_natural_history_tab_open_desc: "Давайте взглянем на [Concept('concept_academics_academic','академиков')]. Откройте вкладку \"Естествознание\", чтобы продолжить."
 mr_tutorial_science_natural_history_tab_open_tt: "Перейдите во вкладку \"Естествознание\", щелкнув по соответствующей кнопке."
 mr_tutorial_science_natural_history_tab_character: "Академики"
 mr_tutorial_science_natural_history_tab_character_desc: "Сердце Morgenröte — это его персонажи. В окне \"Наука\" - это [Concept('concept_academics_academic','академики')].\n\nПод ролью персонажа вы можете увидеть портрет вашего академика и дополнительную информацию о нём."
 mr_tutorial_science_natural_history_tab_character_rating: "Пригодность персонажа"
 mr_tutorial_science_natural_history_tab_character_rating_desc: "Для большинства персонажей вы найдёте небольшой значок рядом с их именем. Этот значок указывает на их пригодность к выполнению своей роли. Вы можете увидеть, какие факторы влияют на рейтинг, наведя курсор на такой значок. \n\nОбъяснение значков:\n@mr_rating_fantastic! Фантастическая\n@mr_rating_very_good! Очень хорошая\n@mr_rating_good! Хорошая\n@mr_rating_mediocre! Средняя\n@mr_rating_bad! Плохая\n@mr_rating_very_bad! Очень плохая"
 mr_tutorial_science_natural_history_tab_character_experience_bar: "Опыт персонажа"
 mr_tutorial_science_natural_history_tab_character_experience_bar_desc: "Каждый персонаж имеет [Concept('concept_academics_experience', 'опыт')] в своей области знаний. Чем выше опыт, тем лучше персонаж справляется с различными задачами.\n\nОпыт накапливается пассивно каждый год, а также активно, в ходе выполнения заданий и при их успешном завершении. [Concept('concept_academics_academic','$concept_academics_academics$')] получают более высокие характеристики, достигнув 100 (опытный) и 300 (известный) опыта."
 mr_tutorial_science_natural_history_tab_character_achievements: "Достижения персонажа"
 mr_tutorial_science_natural_history_tab_character_achievements_desc: "[Concept('concept_academics_academic','$concept_academics_academics$')] временами достигают впечатляющих достижений. Вы всегда можете проверить, чего достиг ваш академик, наведя курсор на этот значок."
 mr_tutorial_science_natural_history_tab_currencies: "Открытия и ценности"
 mr_tutorial_science_natural_history_tab_currencies_desc: "Большинство типов персонажей в Morgenröte имеют связанные с ними ценности. Эти ценности отображаются в центре карточки персонажа. Например, для геолога вы увидите, сколько минералов было найдено или сколько геологических знаний у вас имеется.\n\nЧасто вы можете узнать больше о ценностях, наведя курсор на них."
 mr_tutorial_science_natural_history_visit_button: "Кнопка \"Посетить\""
 mr_tutorial_science_natural_history_visit_button_desc: "В основе своей [Concept('concept_academics_academic','академики')] имеют специальные кнопки посещения, которые позволяют исследовать конкретный предмет или особенность науки подробнее. Это может быть какое ни будь здание, краткий обзор науки и так далее (экспериментируйте!). К примеру, у [Concept('concept_dubois_naturalist', 'натуралиста')] есть кнопка для посещения зоопарка, где вы можете узнать больше о животных, которые там обитают."
 mr_tutorial_science_natural_history_ranking: "Рейтинг"
 mr_tutorial_science_natural_history_ranking_desc: "Может быть, вам нравится сравнивать себя с другими странами? В таком случае вам может быть интересен рейтинг. Наведя курсор на этот значок (подсвечен), вы сможете увидеть различные списки, которые показывают, как хорошо вы справляетесь в определённой области Morgenröte по сравнению с другими нациями.\n\nНапример, рейтинг у [Concept('concept_agassiz_geologist', 'геолога')] позволяет вам сравнивать ваш Геологический рейтинг, Геологические знания, Океанографические знания, Минералы и Редкие минералы."
 mr_tutorial_science_natural_history_project_buttons: "Кнопки проектов и другие кнопки"
 mr_tutorial_science_natural_history_project_buttons_desc: "Эта часть интерфейса — одна из самых важных для вас. Она позволяет назначать ваших академиков на проекты и выполнять другие важные взаимодействия.\n\n[Concept('concept_agassiz_geologist', 'Геолог')] может отправляться в экспедиции, улучшать промышленность, считать возраст Земли, а также основывать минералогический кабинет или начинать конгресс по дрейфу материков."
 mr_tutorial_science_natural_history_view_switch_buttons: "Сменить вид"
 mr_tutorial_science_natural_history_view_switch_buttons_desc: "Если вы предпочитаете более компактный интерфейс, вы можете изменить его внешний вид, используя эту кнопку. На саму игру это не влияет, поэтому выбирайте тот, который вам больше нравится."
 mr_start_culture_tutorial_button_loc: "Обучение культуре"
 mr_tutorial_not_yet_implemented_tt: "Это обучение еще не готово"
 mr_tutorial_arts_window_open: "Откройте окно \"Искусства\""
 mr_tutorial_arts_window_open_desc: "Теперь давайте подробнее рассмотрим окно искусств. Откройте его, щелкнув по кнопке в боковом меню или использовав сочетание \"Ctrl + A\" на вашей клавиатуре."
 mr_tutorial_arts_window_open_tt: "Откройте окно \"Искусства\", щелкнув по кнопке или использовав сочетание \"Ctrl + A\""
 mr_tutorial_arts_tab: "Окно \"Искусства\""
 mr_tutorial_arts_tab_desc: "Искусство было важной частью 19-го и 20-го века. Великие [Concept('concept_artists_artist','деятели искусств')] этой эпохи до сих пор хорошо известны.\n\nMorgenröte предлагает различные виды деятелей искусства и их произведений.\n\nОкно \"искусства\" состоит из двух вкладок. Одна показывает вам обзор искусств в вашей стране, на другой вы можете найти своих деятелей искусства и нанимать их из иностранных стран."
 mr_tutorial_arts_tab_cultural_tradition: "Культурная традиция"
 mr_tutorial_arts_tab_cultural_tradition_desc: "Культурная традиция — это величина, представляющая культурные достижения вашей страны. Она состоит из [Concept('concept_elgar_musical_tradition', 'музыкальной традиции')], [Concept('concept_manzoni_literary_tradition', 'литературной традиции')] и [Concept('concept_klimt_painting_tradition', 'художественной традиции')].\n\n Культурная традиция рассчитывается по такой формуле:\n(Музыкальная традиция/4) + (художественная традиция/3) + (литературная традиция/2)\n\nДополнительно вы получите [Concept('concept_prestige', 'престиж')] от вашей культурной традиции. Каждый 5 очков культурной традиции дают вам 1 дополнительное очко престижа."
 mr_tutorial_arts_overview_tab_open_tt: "Откройте вкладку \"Обзор\""
 mr_tutorial_arts_tab_artist_progress: "Продвижение деятеля искусства"
 mr_tutorial_arts_tab_artist_progress_desc: "Вы можете получить новых [Concept('concept_artists_artist','деятелей искусства')] различными способами: вы можете нанять их, получить через события или набрать достаточно [Concept('concept_artistic_progress', 'прогресса деятелей искусства')].\n\nХотя некоторые события и набор доступны не для всех стран, получение деятелей искусства путем заполнения шкалы прогресса возможно после того, как вы станете владельцем таких зданий, как: $building_elgar_opera$ или $building_arts_academy$.\nВы можете увидеть полный список факторов, влияющих на ежемесячный прирост, наведя курсор на шкалу прогресса.\n\nДополнительно вы можете покровительствовать искусству, чтобы набрать больше прогресса и продвигать определённые типа деятелей искусства, если у вас есть необходимый производственный метод в $building_arts_academy$."
 mr_tutorial_arts_tab_center_of_arts: "Культурный центр"
 mr_tutorial_arts_tab_center_of_arts_desc: "[Concept('concept_artists_center_of_arts','Культурные центры')] - это регионы, где родились и развились разные [Concept('concept_artists_art_style','стили искусства')].\nНекоторые культурные центры уже существуют на момент начала игры. Другие могут быть открыты через [Concept('concept_journal_entry','записи в дневнике')] или или с помощью кнопок, которые вы видите здесь. Наведите курсор на центр искусств, чтобы увидеть, как его можно открыть.\n\nОчевидно, что культурные центры полезны для вас и вашей страны, так как они дают доступ к разным бонусам."
 mr_tutorial_arts_tab_artists_tab_open: "Откройте вкладку \"Деятели искусства\""
 mr_tutorial_arts_tab_artists_tab_open_desc: "Теперь давайте подробнее рассмотрим разных [Concept('concept_artists_artist','деятелей искусств')].\n\nОткройте вкладку \"Деятели искусства\", щелкнув по соответствующей вкладке."
 mr_tutorial_arts_tab_artists_tab_open_open_tt: "Откройте вкладку \"Деятели искусства\""
 mr_tutorial_arts_tab_artists: "Вкладка \"Деятели искусства\""
 mr_tutorial_arts_tab_artists_desc: "[Concept('concept_artists_artist','Деятели искусства')] выглядят похоже на академиков, но работают немного по-другому.\n\nСейчас тут 3 типа (туториал ранней версии) деятелей искусств:\n- [concept_elgar_composer]\n- [concept_manzoni_writer]\n- [concept_klimt_painter]"
 mr_tutorial_arts_tab_artists_invite: "Приглашение деятелей искусств"
 mr_tutorial_arts_tab_artists_accquisation_desc: "Как мы уже упоминали, [Concept('concept_artists_artist','деятелей искусства')] можно приобрести не только путем получения достаточного количества очков [Concept('concept_artistic_progress', 'прогресса')], но и просто пригласив их к себе.\n\nКаждый вид таких персонажей имеет разные требования. Вы можете пригласить [Concept('concept_elgar_travelling_composer','странствующих композиторов')] со всего мира, но для этого вам нужно быть страной с достаточным количеством построек типа $building_elgar_opera$ и сильными [Concept('concept_elgar_musical_tradition', 'музыкальными традициями')].\n\n[Concept('concept_klimt_independent_painter','$concept_klimt_independent_painters$')] могут быть пригашены, только если они имеют схожую культуру.\n\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] недоступны для приглашения в принципе."
 mr_tutorial_arts_tab_artists_character: "Основная информация"
 mr_tutorial_arts_tab_artists_character_desc: "Самая левая часть карточки показывает вам основную информацию о персонаже.\n\nТут вы можете увидеть:\n- Портрет\n- Имя и пригодность\n- [Concept('concept_artists_experience', 'Репутацию')]\n- [Concept('concept_character_trait','$concept_character_traits$')]"
 mr_tutorial_arts_tab_artists_currencies: "Важные аспекты искусства"
 mr_tutorial_arts_tab_artists_currencies_desc: "Эта часть интерфейса позволяет вам увидеть общую информацию о конкретном аспекте искусства.\n\nДля [Concept('concept_elgar_composer', 'композитора')] тут можно увидеть [Concept('concept_elgar_musical_tradition', 'музыкальную традицию')], композиции и шедевры, а также список пяти лучших композиторов всего мира (как пример).\n\nТакже тут вы можете найти рейтинг, наведя курсор на небольшой значок (три полосочки) в правом верхнем углу карточки персонажа."
 mr_tutorial_arts_tab_artists_actions: "Действия"
 mr_tutorial_arts_tab_artists_actions_desc: "[Concept('concept_artists_artist','Деятели искусства')] имеют разные действия. Здесь вы можете увидеть, над чем ваши артисты могут работать или какие решения вы можете принять для своей страны.\n\nЭто была самая важная информация о деятелях искусства. Вы можете продолжить с обучением по спорту отсюда или продолжить вашу игру, пропустив дальнейшее обучение."
 mr_start_sports_tutorial_button_loc: "Обучение спорту"
 mr_tutorial_sports_window_open: "Откройте окно \"Спорт\""
 mr_tutorial_sports_window_open_desc: "Теперь давайте подробнее рассмотрим окно спорта. Откройте его, щелкнув по кнопке в боковом меню или использовав сочетание \"Ctrl + S\" на вашей клавиатуре."
 mr_tutorial_sports_window_open_tt: "Откройте окно \"Спорт\", щелкнув по кнопке или использовав сочетание \"Ctrl + S\""
 mr_tutorial_sports_window: "Окно \"Спорт\""
 mr_tutorial_sports_window_desc: "Окно спорта позволяет вам получить доступ к различным видам спорта и персонажам, которые имеют отношение к спорту.\n\nОкно разделено на обычные виды спорта и аэронавтику.\n\nОбычные виды спорта включают:\n- [concept_vikelas_olympic_games]\n- [concept_douglas_mountaineering]\n- игровые виды спорта\n- [concept_vikelas_car_racing]\n\nАэронавтика включает таких персонажей, как:\n- [concept_curtiss_balloonist]\n- [concept_curtiss_pilot]"
 mr_tutorial_sports_tab: "Вкладка \"Спорт\""
 mr_tutorial_sports_tab_desc: "Вкладка \"Спорт\" даёт вам обзор различных спортивных мероприятий и персонажей.\nВ отличие от академиков и деятелей искусства, персонажи на вкладке \"Спорт\" часто являются просто генералами или политиками."
 mr_tutorial_sports_tab_open_tt: "Откройте вкладку \"Спорт\""
 mr_tutorial_sports_tab_character_overview: "Обзор персонажа"
 mr_tutorial_sports_tab_character_overview_desc: "Эта часть интерфейса даёт вам обзор [Concept('concept_character', 'персонажа')].\n\nНекоторые персонажи, такие как [Concept('concept_vikelas_coach', 'тренер')] и автогонщик, — это персонажи, которых вы можете получить, и поэтому они имеют [Concept('concept_academics_experience', 'опыт')]. Другие-же, такие как альпинист не имеют опыта (возможно следствие устаревшего обучения)."
 mr_tutorial_sports_tab_currencies: "Значения и информация"
 mr_tutorial_sports_tab_currencies_desc: "В центре вы можете увидеть важную информацию, касающуюся этого конкретного спорта.\n\nНапример, [concept_vikelas_olympic_games] включают влладку Президента и Совета [Concept('concept_vikelas_ioc', 'МОК')], а также количество членов МОК и ваши достижения на данный момент."
 mr_tutorial_sports_tab_actions: "Действия"
 mr_tutorial_sports_tab_actions_desc: "Правая сторона карточки позволяет вам выполнять конкретные действия для определённого вида спорта.\n Эти действия по сути представляют собой решения, которые позволяют вам использовать ваших [Concept('concept_character', 'персонажей')] или создать что-то новое, например, [Concept('concept_vikelas_ioc', 'Международный Олимпийский Комитет')]."
 mr_tutorial_sports_tab_aeronautics_tab_open: "Откройте вкладку \"Аэронавтика\""
 mr_tutorial_sports_tab_aeronautics_tab_open_desc: "Теперь давайте подробнее рассмотрим вкладку Аэронавтика. Откройте вкладку, щелкнув по соответствующей кнопке."
 mr_tutorial_aeronautics_tab_open_tt: "Откройте вкладку \"Аэронавтика\""
 mr_tutorial_aeronautics_tab: "Вкладка \"Аэронавтика\""
 mr_tutorial_aeronautics_tab_desc: "Вкладка Аэронавтика выглядит в основном так же, как и вкладка спорта.\n\nОдна большая разница заключается в самих персонажах. Вы можете спонсировать и автоматизировать [Concept('concept_curtiss_balloonist', 'воздухоплавателя')], в свою очередь [Concept('concept_curtiss_pilot', 'пилот')] будет появляться при особых, отдельных обстоятельствах (некоторые события, технологии и т.д.).\n\nЭто конец обзорного экскурса. Пожалуйста, используйте Викапедию или концепты, которые мы добавили, если хотите узнать больше о персонажах Morgenröte."
