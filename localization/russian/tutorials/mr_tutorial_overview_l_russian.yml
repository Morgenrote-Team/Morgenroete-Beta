l_russian:

 thriving_culture_lesson_start_tutorial_button_loc: "Начальный самоучитель" #deepl:1296206908

 mr_tutorial_buttons: "Пуговицы Morgenröte" #deepl:3232304745
 mr_tutorial_buttons_desc: "Большинство вещей в Morgenröte доступны в окнах Morgenröte-Windows. Вы можете получить доступ к ним, нажав на кнопки в боковой панели. В настоящее время существуют следующие окна:\n\n\n- #V Окно науки#!: Здесь вы можете найти ваши [Concept('concept_academics_academic','$concept_academics_academics$')], их деятельность, ваши [concept_academics_progress] и научные экспедиции.\n\n- #V Окно искусств#!: Здесь вы можете найти [Concept('concept_artists_artist','$concept_artists_artists$')], их деятельность, ваши [concept_artistic_progress] и [Concept('concept_artists_art_style','$concept_artists_art_styles$')].\n\n- #V Спортивное окно#!: Здесь вы можете найти различные виды спорта и персонажей, связанных со спортом, а также воздухоплавание, их деятельность и Международные спортивные организации." #deepl:3017682288

 mr_tutorial_science_window_open: "Откройте окно науки" #deepl:734722697
 mr_tutorial_science_window_open_desc: "Теперь мы подробнее рассмотрим окно науки. Откройте окно науки, щелкнув по кнопке или нажав клавишу \"M\" на клавиатуре." #deepl:1849505402
 mr_tutorial_science_window_open_tt: "Откройте окно науки, нажав на кнопку науки или нажав \"M\"." #deepl:1188172678

 mr_tutorial_science_tab: "Окно науки" #deepl:1054166281
 mr_tutorial_science_tab_desc: "Окно науки - это место, где вы можете найти информацию и действия для вашей научной деятельности.\n\n\n Оно разделено на 4 вкладки:\n\n- #V Обзор#!: Эта вкладка содержит [concept_academics_progress], #V Общие научные экспедиции#! и #V Научные фокусы#!\n\n- #V Математико-технические#!: Эта вкладка содержит [concept_gaudi_engineer], [concept_mendelejew_chemist] и [concept_verrier_astronomer]\n\n- #V Гуманитарно-антропологические#!: Эта вкладка содержит [concept_panum_physician], [concept_lepsius_archaeologist] и [concept_lepsius_anthropologist]\n\n- [concept_dubois_natural_history]: Эта вкладка содержит [concept_agassiz_geologist], [concept_dubois_paleontologist] и [concept_dubois_naturalist]\n\n- #V Гуманитарно-антропологические#!: Эта вкладка содержит [concept_panum_physician], [concept_lepsius_archaeologist] и [concept_lepsius_anthropologist]" #deepl:271317186
 mr_tutorial_science_tab_tt: "Открывается окно науки" #deepl:3571747254

 mr_tutorial_science_overview_tab_open: "Откройте вкладку "Обзор"." #deepl:2171973784
 mr_tutorial_science_overview_tab_open_desc: "Вкладка "Обзор" позволяет вам получить доступ к разделам [concept_academics_progress], #V "Общие научные экспедиции"#! и #V "Научные фокусы"#!\n\nПерейдите на вкладку "Обзор", нажав на кнопку вкладки." #deepl:3801100877
 mr_tutorial_science_overview_tab_open_tt: "Перейдите на вкладку "Обзор", нажав на кнопку вкладки." #deepl:583115154

 mr_tutorial_science_overview_tab_promote_academics: "Продвижение академических знаний" #deepl:3127848749
 mr_tutorial_science_overview_tab_promote_academics_desc: "Сердце Morgenröte - это персонажи. Но как получить этих персонажей?\n\nЧтобы получить нового [concept_academics_academic], нужно набрать достаточное количество [concept_academics_progress]. Вы можете навести курсор на шкалу прогресса, чтобы увидеть, какие факторы влияют на прирост прогресса.\n\nВы можете продвинуть определенного академика, если у вас есть университет с [concept_academics_university_specialization].\n\nВы также можете инвестировать деньги, чтобы быстрее получить академический прогресс.\n\n\nДругие способы получения академиков - это события или покупка академика с помощью дипломатических действий, если вы не принадлежите к наиболее развитым в научном отношении странам." #deepl:3334402372

 mr_tutorial_science_overview_tab_scientific_focus: "Научная направленность" #deepl:4254522642
 mr_tutorial_science_overview_tab_scientific_focus_desc: "Иногда вы можете захотеть сосредоточиться на каком-то конкретном виде исследований. Вы можете использовать научные центры, если соответствуете их требованиям. В основном они будут способствовать развитию исследований определенных технологических групп и снижению эффективности других." #deepl:2966516010

 mr_tutorial_science_overview_tab_scientific_expedition: "Научные экспедиции" #deepl:3527687538
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "Научные экспедиции - это экспедиции, которые может начать ваша страна. В зависимости от типа экспедиции она может привести к большим достижениям для вашей страны.\n\nВ настоящее время существуют такие экспедиции:\n- [concept_dubois_pacific_expedition]\n- [concept_verrier_venus_transit] Экспедиция\n- Экспедиция по поиску Северо-Западного прохода\n- Экспедиция Цеппелинов\n- Экспедиция по прокладке трансатлантического кабеля" #deepl:413711623

 mr_tutorial_science_natural_history_tab_open: "Откройте вкладку "Естественная история" #deepl:1440158592
 mr_tutorial_science_natural_history_tab_open_desc: "Теперь давайте посмотрим на один из сайтов [Concept('concept_academics_academic','$concept_academics_academics$')]. Чтобы продолжить, откройте вкладку "Естественная история"." #deepl:3933847545
 mr_tutorial_science_natural_history_tab_open_tt: "Перейдите на вкладку "Естественная история", нажав на кнопку вкладки." #deepl:1038657530

 mr_tutorial_science_natural_history_tab_character: "Академия" #deepl:1408513918
 mr_tutorial_science_natural_history_tab_character_desc: "Сердце игры Morgenröte - это ее персонажи. На вкладке "Наука" эти персонажи находятся на сайте [Concept('concept_academics_academic','$concept_academics_academics$')].\n\nНа левой стороне каждой новой роли персонажа вы можете увидеть портрет вашего Академика и дополнительную информацию о нем." #deepl:1020069787

 mr_tutorial_science_natural_history_tab_character_rating: "Рейтинг персонажей" #deepl:3205270775
 mr_tutorial_science_natural_history_tab_character_rating_desc: "У большинства персонажей рядом с именем вы найдете небольшой значок. Этот значок указывает на их пригодность к роли. Наведя курсор на значок, вы можете увидеть, какие факторы влияют на этот рейтинг.\n\nПояснения к значкам:\n@mr_rating_fantastic!  Отлично\n@mr_rating_very_good!  Очень хорошо\n@mr_rating_good!  Хорошо\n@mr_rating_mediocre!  Посредственный\n@mr_rating_bad!  Плохо\n@mr_rating_very_bad!  Очень плохо" #deepl:2393422146

 mr_tutorial_science_natural_history_tab_character_experience_bar: "Опыт персонажа" #deepl:356262571
 mr_tutorial_science_natural_history_tab_character_experience_bar_desc: "Каждый персонаж имеет [concept_academics_experience] в своей области знаний. Чем выше опыт, тем лучше персонаж справляется с различными заданиями.\n\nОпыт набирается пассивно каждый год, а также активно, выполняя задания и добиваясь успеха. [Concept('concept_academics_academic','$concept_academics_academics$')] получают более высокие черты, если достигают 100 (опытный) и 300 (знаменитый) опыта." #deepl:4293324584

 mr_tutorial_science_natural_history_tab_character_achievements: "Достижения персонажа" #deepl:2935735490
 mr_tutorial_science_natural_history_tab_character_achievements_desc: "[Concept('concept_academics_academic','$concept_academics_academics$')] иногда совершают впечатляющие поступки. Наведя курсор на этот значок, вы всегда можете проверить, чего уже достиг ваш академик." #deepl:1195783621

 mr_tutorial_science_natural_history_tab_currencies: "Дискурсы и ценности" #deepl:1384869411
 mr_tutorial_science_natural_history_tab_currencies_desc: "У большинства персонажей в Morgenröte есть свои ценности. Эти значения отображаются в центре каждого академика. Например, для геологии вы увидите, сколько минералов было найдено или сколько геологических знаний у вас есть.\n\nОчень часто вы можете узнать больше о некоторых значениях, наведя на них курсор." #deepl:4066533914

 mr_tutorial_science_natural_history_visit_button: "Посетить кнопку" #deepl:3858963492
 mr_tutorial_science_natural_history_visit_button_desc: "На большинстве сайтов [Concept('concept_academics_academic','$concept_academics_academics$')] есть специальные кнопки посещения, которые расскажут вам больше о конкретном учебном заведении.\n\n На сайте [concept_dubois_naturalist], например, есть кнопка посещения зоопарка, где вы можете узнать больше о животных вашего зоопарка." #deepl:1189517097

 mr_tutorial_science_natural_history_ranking: "Рейтинг" #deepl:4181663012
 mr_tutorial_science_natural_history_ranking_desc: "Возможно, вам нравится сравнивать себя с другими странами. В таком случае рейтинг может быть вам интересен. Наведя курсор на этот значок, вы увидите различные списки, которые позволят вам увидеть, насколько хорошо вы преуспели в определенном аспекте Morgenröte по сравнению с другими странами.\n\nНапример, на [concept_agassiz_geologist] вы можете сравнить свои геологические показатели, геологические знания, океанические знания, минералы и редкие минералы." #deepl:394625426

 mr_tutorial_science_natural_history_project_buttons: "Кнопки проекта и другие кнопки" #deepl:430248338
 mr_tutorial_science_natural_history_project_buttons_desc: "Эта часть интерфейса - одна из самых важных для вас. Здесь вы можете поручать [Concept('concept_academics_academic','$concept_academics_academics$')] проекты и начинать другие важные взаимодействия.\n\nA [concept_agassiz_geologist] может отправляться в экспедиции, улучшать ваши отрасли, пересчитывать возраст Земли, а вы можете основать минеральный шкаф или начать конгресс по континентальному дрейфу." #deepl:2696053152

 mr_tutorial_science_natural_history_view_switch_buttons: "Изменить макет" #deepl:1671308253
 mr_tutorial_science_natural_history_view_switch_buttons_desc: "Если вы предпочитаете более плотный интерфэйс, то можете изменить его вид с помощью этой кнопки. Для самой игры не имеет значения, какой вариант вы используете. Поэтому выбирайте тот вариант, который вам больше нравится." #deepl:2800918764

 mr_start_culture_tutorial_button_loc: "Самоучитель по культуре" #deepl:231585177
 mr_tutorial_not_yet_implemented_tt: "Этот учебник еще не готов." #deepl:1971937521

 mr_tutorial_arts_window_open: "Откройте окно искусств" #deepl:2590280325
 mr_tutorial_arts_window_open_desc: "Теперь мы подробнее рассмотрим окно искусств. Откройте окно искусств, щелкнув по кнопке или нажав клавиши \"Ctrl + A\" на клавиатуре." #deepl:53394483
 mr_tutorial_arts_window_open_tt: "Откройте окно искусств, нажав на кнопку "Наука" или \"Ctrl + A\"." #deepl:2950751548

 mr_tutorial_arts_tab: "Вкладка "Искусство" #deepl:2793588649
 mr_tutorial_arts_tab_desc: "Искусство было важной частью XIX и XX веков. Великие [Concept('concept_artists_artist','$concept_artists_artists$')] этой эпохи известны и сегодня.\n\nMorgenröte предлагает различные виды Художников и их произведения искусства.\n\nСамо окно Искусств имеет две вкладки. На одной из них вы найдете обзор искусств в вашей стране, а на другой сможете найти своих художников и набрать художников из других стран." #deepl:543699742

 mr_tutorial_arts_tab_cultural_tradition: "Культурная традиция" #deepl:3268694731
 mr_tutorial_arts_tab_cultural_tradition_desc: "Культурная традиция - это ценность, представляющая культурные достижения вашей страны.\nОна состоит из [concept_elgar_musical_tradition], [concept_manzoni_literary_tradition] и [concept_klimt_painting_tradition].\n\nКультурная традиция рассчитывается по следующей формуле:\nМузыкальная традиция / 4 + Живописная традиция / 3 + Литературная традиция / 2\n\nВы дополнительно получите [concept_prestige] от вашей Традиции искусств. Каждые 5 очков Традиции искусств дают 1 дополнительный Престиж." #deepl:3774927584
 mr_tutorial_arts_overview_tab_open_tt: "Откройте вкладку "Обзор искусств" #deepl:3810726030

 mr_tutorial_arts_tab_artist_progress: "Прогресс художника" #deepl:61174778
 mr_tutorial_arts_tab_artist_progress_desc: "Вы можете получить новых [Concept('concept_artists_artist','$concept_artists_artists$')] разными способами: \n\nВы можете завербовать их, получить с помощью событий или собрав достаточное количество [concept_artistic_progress].\n\nВ то время как события и вербовка возможны не для каждой нации, получение художников, заполняя полосу художественного прогресса, возможно, если вы владеете $building_elgar_opera$ или $building_arts_academy$.\nВы можете увидеть полный список факторов, влияющих на ежемесячный прирост, наведя курсор на полосу прогресса.\n\nДалее вы можете покровительствовать искусству, чтобы получить больше прогресса и продвигать определенных художников, если у вас есть необходимые [concept_production_method] в вашем $building_arts_academy$." #deepl:1108726132

 mr_tutorial_arts_tab_center_of_arts: "Центр искусств" #deepl:4265095628
 mr_tutorial_arts_tab_center_of_arts_desc: "[Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] это места, где родился [concept_artists_art_style].\n Некоторые Центры искусств уже существуют в начале игры. Другие можно разблокировать с помощью [Concept('concept_journal_entry','$concept_journal_entries$')] или нажав одну из кнопок, которые вы видите здесь. Наведите курсор на центр искусств, чтобы увидеть, как вы можете его получить.\n\nОчевидно, что центры искусств полезны для вас и вашей страны, так как они дают вам доступ к бонусам." #deepl:1287628103

 mr_tutorial_arts_tab_artists_tab_open: "Откройте вкладку "Художники" #deepl:974477655
 mr_tutorial_arts_tab_artists_tab_open_desc: "Теперь давайте подробнее рассмотрим [Concept('concept_artists_artist','$concept_artists_artists$')].\n\nОткройте вкладку "Художники", нажав на кнопку вкладки." #deepl:391030067
 mr_tutorial_arts_tab_artists_tab_open_open_tt: "Откройте вкладку "Художники" #deepl:974477655

 mr_tutorial_arts_tab_artists: "Вкладка "Художники" #deepl:1211285969
 mr_tutorial_arts_tab_artists_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] внешне очень похожи на Академиков, но работают немного по-другому.\n\nНа данный момент есть 3 Артиста:\n- [concept_elgar_composer]\n- [concept_manzoni_writer]\n- [concept_klimt_painter]" #deepl:124747602

 mr_tutorial_arts_tab_artists_invite: "Приглашение художников" #deepl:1648609371
 mr_tutorial_arts_tab_artists_accquisation_desc: "Как мы уже говорили, [Concept('concept_artists_artist','$concept_artists_artists$')] можно получить не только набрав достаточное количество [concept_artistic_progress], но и просто пригласив их.\n\nКаждый вид артистов имеет свои требования. Вы можете пригласить [Concept('concept_elgar_travelling_composer','$concept_elgar_travelling_composers$')] со всего мира, но для этого вам нужно быть страной с достаточным количеством $building_elgar_opera$и достаточно хорошей [concept_elgar_musical_tradition].\n\n[Concept('concept_klimt_independent_painter','$concept_klimt_independent_painters$')] можно пригласить только в том случае, если у них похожая культура.\n\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] с другой стороны, их вообще нельзя приглашать." #deepl:2127803597

 mr_tutorial_arts_tab_artists_character: "Общая информация" #deepl:995936974
 mr_tutorial_arts_tab_artists_character_desc: "В левой части окна отображается основная информация о художнике.\n\nЗдесь вы можете увидеть:\n- Портрет.\n- Имя и рейтинг.\n- [concept_artists_experience].\n- The [Concept('concept_character_trait','$concept_character_traits$')]" #deepl:1445240346

 mr_tutorial_arts_tab_artists_currencies: "Важные ценности искусства" #deepl:71895904
 mr_tutorial_arts_tab_artists_currencies_desc: "В этой части интерфейса вы можете просмотреть общую информацию о данном виде искусства.\n\nДля [concept_elgar_composer] здесь отображается [concept_elgar_musical_tradition], композиции и шедевры вашего композитора, а также обзор пяти лучших композиторов мира.\n\nДополнительно вы можете найти рейтинг, наведя курсор на маленький значок в правом верхнем углу." #deepl:1891899818

 mr_tutorial_arts_tab_artists_actions: "Действия художника" #deepl:2320930103
 mr_tutorial_arts_tab_artists_actions_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] также есть действия. Здесь вы можете увидеть, над чем могут работать ваши художники или какие решения вы можете принимать вместе со своей нацией.\n\nЭто была самая важная информация, касающаяся художников. Вы можете продолжить туториал по спорту отсюда или продолжить игру." #deepl:746856108
 mr_start_sports_tutorial_button_loc: "Спортивный самоучитель" #deepl:826655861

 mr_tutorial_sports_window_open: "Откройте окно "Спорт" #deepl:1830514457
 mr_tutorial_sports_window_open_desc: "Теперь мы подробнее рассмотрим окно спорта. Откройте окно спорта, щелкнув по кнопке или нажав клавиши \"Ctrl + S\" на клавиатуре." #deepl:243246943
 mr_tutorial_sports_window_open_tt: "Откройте окно спорта, нажав на кнопку науки или нажав \"Ctrl + S\"." #deepl:1482293542

 mr_tutorial_sports_window: "Спортивное окно" #deepl:4243980162
 mr_tutorial_sports_window_desc: "Окно "Спорт" позволяет вам получить доступ ко всем видам спорта и персонажам, которые имеют отношение к ним.\n\nОкно разделено на обычные виды спорта и аэронавтику.\n\nОбычные виды спорта включают:\n- [concept_vikelas_olympic_games]\n- [concept_douglas_mountaineering]\n- Спорт с мячом\n- [concept_vikelas_car_racing]\n\nАэронавтика включает:\n- [concept_curtiss_balloonist]\n-... [concept_curtiss_pilot]" #deepl:2523227399

 mr_tutorial_sports_tab: "Спортивная вкладка" #deepl:2701935579
 mr_tutorial_sports_tab_desc: "Вкладка "Спорт" дает вам обзор различных занятий и персонажей, связанных со спортом.\nВ отличие от академиков и художников, персонажи в закладке "Спорт" часто являются просто генералами или политиками." #deepl:1383542418
 mr_tutorial_sports_tab_open_tt: "Откройте вкладку "Спорт" #deepl:176871982

 mr_tutorial_sports_tab_character_overview: "Обзор персонажей" #deepl:96645084
 mr_tutorial_sports_tab_character_overview_desc: "В этой части пользовательского интерфейса представлен обзор [concept_character].\n\nНекоторые персонажи, такие как [concept_vikelas_coach] и Гонщик, являются персонажами, которых вы можете получить, и поэтому у них есть [concept_academics_experience]. Другие, такие как Горнист, не имеют опыта." #deepl:1695633540

 mr_tutorial_sports_tab_currencies: "Ценности и информация" #deepl:2440189283
 mr_tutorial_sports_tab_currencies_desc: "В центре вы можете увидеть важную информацию, касающуюся данного вида спорта.\n\nНа сайте [concept_vikelas_olympic_games], например, можно найти информацию о президенте и правлении [concept_vikelas_ioc], количестве членов и медалях, которые вы уже собрали." #deepl:1125108675

 mr_tutorial_sports_tab_actions: "Действия" #deepl:1951990429
 mr_tutorial_sports_tab_actions_desc: "В правой части вы можете предпринять определенные действия для этого вида спорта.\nВ основном эти действия представляют собой решения, которые позволяют вам использовать свой [Concept('concept_character', '$concept_characters$')] или создать что-то новое, например [concept_vikelas_ioc]." #deepl:2455654735

 mr_tutorial_sports_tab_aeronautics_tab_open: "Откройте вкладку "Аэронавтика" #deepl:2120346894
 mr_tutorial_sports_tab_aeronautics_tab_open_desc: "Теперь давайте подробнее рассмотрим вкладку "Аэронавтика". Откройте вкладку, нажав на кнопку ." #deepl:2671641916
 mr_tutorial_aeronautics_tab_open_tt: "Откройте вкладку "Аэронавтика" #deepl:2187560588

 mr_tutorial_aeronautics_tab: "Вкладка "Аэронавтика" #deepl:2661687945
 mr_tutorial_aeronautics_tab_desc: "Вкладка "Аэронавтика" выглядит в основном так же, как и вкладка "Спорт"\n\nОдно большое отличие заключается в самих персонажах. Вы можете спонсировать и автоматизировать [concept_curtiss_balloonist], а [concept_curtiss_pilot] будет появляться при различных обстоятельствах.\n\nНа этом обзорный туториал закончен. Если вы хотите узнать больше о персонажах Morgenröte, воспользуйтесь Википедией или концептами, которые мы добавили." #deepl:851922845
