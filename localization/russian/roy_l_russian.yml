 roy_ethnology_tech_desc: "В XIX веке этнология сформировалась как самостоятельная академическая дисциплина, перейдя от случайных путевых наблюдений к систематическому изучению человеческих культур и их происхождения. Под влиянием эволюционной теории и колониальной экспансии ранние этнологи стремились классифицировать мировое многообразие с помощью сравнительных методов и сбора материальных артефактов. Со временем эта область отошла от чисто умозрительных расовых иерархий к более строгой этнографической полевой работе, заложив основы современной социальной антропологии."
 alert_roy_ethnologist_will_retire_soon_alert_name: "[concept_roy_ethnologist] близок к отставке"
 alert_roy_ethnologist_will_retire_soon_alert_desc: "Ваш [concept_roy_ethnologist|l] близок к отставке. Стоит найти замену."
 roy_ethnologist_will_retire_soon_alert_setting_name: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon! #! [concept_roy_ethnologist] близок к отставке"
 alert_roy_ethnologist_will_retire_soon_alert_hint: "Ваш [concept_roy_ethnologist|l] выйдет в отставку в течение следующих #V 5 лет#!. Стоит найти [Concept('concept_roy_ethnologist', '#b #ORANGE нового этнолога#!#!')] на замену."
 alert_roy_ethnologist_will_retire_soon_alert_action: "$mr_alert_send_to_science_humanities$"