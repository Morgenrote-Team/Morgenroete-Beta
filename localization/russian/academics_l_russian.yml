 academics.6.d: "Проведя десятилетия своей жизни за открытием новых [Concept('concept_dubois_zoo_animal','экзотических животных')], растений и других форм жизни, [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('academics_retired_person_scope').IsFemale, 'решила', 'решил')] уйти на покой. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] больше не будет работать нашим [Concept('concept_dubois_naturalist', '#b #GREEN натуралистом#!#!')]."
 academics.7.d: "Проведя десятилетия своей жизни, открывая новые окаменелости, реконструируя динозавров и другие вымершие виды, [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('academics_retired_person_scope').IsFemale, 'решила', 'решил')] уйти на покой. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] больше не будет работать нашим [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтологом#!#!')]."
 academics.7.f: "[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetCustom('dubois_paleontologist_achievements_switch_to_character_scope_type')]"
 academics.9.d: "Проведя десятилетия своей жизни, открывая реликвии древних цивилизаций, [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('academics_retired_person_scope').IsFemale, 'решила', 'решил')] уйти на покой. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] больше не будет работать нашим [Concept('concept_lepsius_archaeologist', '#b #BLUE археологом#!#!')]."
 academics.10.d: "Проведя десятилетия своей жизни в поисках реликвий доисторических людей, [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('academics_retired_person_scope').IsFemale, 'решила', 'решил')] уйти на покой. [SelectLocalization(SCOPE.sCharacter('academics_retired_person_scope').IsFemale, 'Она', 'Он')] больше не будет работать нашим [Concept('concept_andersson_anthropologist', '#b #BLUE антропологом#!#!')]."
 academics.116.g: "Подарить [SelectLocalization(GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.IsFemale, 'ей', 'ему')] хлыст!"
