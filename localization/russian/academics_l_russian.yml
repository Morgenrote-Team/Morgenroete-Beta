 setting_academics_historical_focus_rule_desc: "Некоторые страны начинают игру со своей исторической научной школой. Например, Пруссия начинает с военно-промышленного комплекса, а Франция - с авангардной интеллигенции."
 setting_academics_no_focus_rule: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_academics_historical_focus_rule_desc Без фокуса#!#!"
 setting_academics_no_focus_rule_desc: "Все страны начинают игру без научной школы."
