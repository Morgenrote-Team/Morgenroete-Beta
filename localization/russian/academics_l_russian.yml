 academics.2016.t: "Мы нашли Планету X"
 academics.2016.d: "Мы первыми нашли Планету X! Надеемся, это порадует [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]."
 academics.2016.f: "Письмо было исписано странными формулами и диаграммами. На нём были пятна, как будто кто-то пролил жидкость, и, если присмотреться, можно было поклясться, что на бумаге остались следы икры. Вы не могли перестать удивляться, что здесь произошло."
 academics.2016.g: "Это самое важное астрономическое открытие столетия!"
 academics.2017.t: "Мы опоздали с открытием Планеты X"
 academics.2017.d: "Другая нация открыла Планету X раньше нас. Члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] сокрушены этим поражением!"
 academics.2017.f: "Неприемлемо.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2017.g: "Это всё равно не настоящая планета!"
