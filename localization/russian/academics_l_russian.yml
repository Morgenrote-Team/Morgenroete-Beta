 academics.1010.t: "Женщины-студентки?"
 academics.1010.d: "Несколько женщин подали заявления на обучение в один из наших университетов. Теперь возник вопрос, законно ли для них учиться и какова официальная позиция нашего правительства в отношении обучения женщин."
 academics.1010.f: "\"Женский мозг создан не для логического мышления, а скорее для эмоций. Им нельзя позволять учиться!\"\n\n\"Вы просто боитесь, что женщина станет более способным ученым, чем вы. Что обязательно произойдет, поскольку ваши аргументы лишены какой-либо научной основы! Пусть женщины учатся в тех же условиях, что и мужчины!\""
 academics.1010.g: "Позволить им учиться!"
 academics.1010.h: "Погодите, они до сих пор не могли учиться?"
 academics.1010.i: "Место женщины у домашнего очага!"
 academics.1011.t: "Блестящая женщина-ученый"
 academics.1011.d: "[SCOPE.sCharacter('academics_female_scientist').GetFullName] окончила один из наших университетов, став лучшей в своем классе. В области, где преобладают мужчины, она смогла закончить учебу в рекордно короткие сроки и горит желанием начать работать по специальности. Она блестящая специалистка..."
 academics.1011.f: "Я искренне поздравляю вас с получением невероятного диплома! Кто бы мог подумать, что это возможно для женщины!"
 academics.1011.g: "...инженер"
 academics.1011.h: "...астроном"
 academics.1011.i: "...натуралист"
 academics.1011.j: "...палеонтолог"
 academics.1011.k: "...археолог"
 academics.1011.l: "...антрополог"
 academics.1011.m: "Она нам не нужна."
