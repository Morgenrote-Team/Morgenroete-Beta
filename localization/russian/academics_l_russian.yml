 academics.91.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] считает следующие теоремы верными. Однако их можно изменить на научном конгрессе."
 academics.91.history: "#T История#!\n"
 academics.91.exodus_default: "Библия - полезный #YELLOW первоисточник#!."
 academics.91.exodus_merit: "Библия не является первоисточником, но это полезный #YELLOW вторичный источник#!."
 academics.91.exodus_invention: "Библия #YELLOW бесполезна#! как источник и поэтому не представляет ценности для исследований."
 academics.91.civilization_default: "\n#YELLOW Египет#! - древнейшая цивилизация."
 academics.91.civilization_panbabylonism: "\n#YELLOW Вавилон#! - древнейшая цивилизация. Все культурные достижения и идеи исходят оттуда."
 academics.91.civilization_antipanbabylonism: "\nВавилония - важная колыбель человечества, но существуют и #YELLOW параллельные пути развития#!."
 academics.91.troy_default: "\nТроя - это #YELLOW миф#!."
 academics.91.troy_homeric: "\nГомеровские эпосы о Трое описывают #YELLOW исторические события#!."
 academics.91.troy_historical: "\nВ гомеровских эпосах о Трое есть #YELLOW доля правды#!."
 academics.91.troy_myth: "\nТроя - это #YELLOW миф#!."
 academics.91.troy_disputed: "\nНаучная дискуссия о Трое остаётся #YELLOW неразрешённой#!."
 academics.91.natural_history: "\n\n#T Естествознание#!"
 academics.91.hippocampus_default: "\nМесто человека в животном царстве #YELLOW не определено#!."
 academics.91.hippocampus_unique: "\nВ животном царстве человек #YELLOW уникален#!."
 academics.91.hippocampus_primate: "\nВ животном царстве человек #YELLOW ближе всего к обезьянам#!."
 academics.91.origin_default: "\nПроисхождение современного человека #YELLOW неизвестно#!."
 academics.91.origin_europe: "\nСовременный человек произошёл из #YELLOW Европы#!."
 academics.91.origin_asia: "\nСовременный человек произошёл из #YELLOW Азии#!."
 academics.91.origin_africa: "\nСовременный человек произошёл из #YELLOW Африки#!."
 academics.91.extinction_default: "\nПричина вымирания динозавров #YELLOW неизвестна#!."
 academics.91.extinction_asteroid: "\nК вымиранию динозавров привело #YELLOW падение астероида#!."
 academics.91.extinction_climate: "\nПричиной вымирания динозавров стало #YELLOW изменение климата#!."
 academics.91.extinction_sex: "\nДинозавры вымерли, потому что они просто #YELLOW больше не хотели заниматься сексом#!. Прямо как жена профессора Тоттенхэма."
 academics.91.extinction_mammals: "\n#YELLOW Конкуренция с млекопитающими#! и их пристрастие к яйцам динозавров привели к вымиранию последних."
 academics.91.extinction_fat: "\nДинозавры стали #YELLOW слишком большими и толстыми#! (патологический гигантизм) и, зайдя в эволюционный тупик, в конце концов вымерли."
 academics.91.extinction_stupid: "\nДинозавры вымерли, потому что #YELLOW их мозг со временем уменьшился, и они стали слишком глупы, чтобы выжить#!."
 academics.91.astronomy: "\n\n#T Астрономия#!"
 academics.91.ceres_default: "\nВ Солнечной системе #YELLOW [GetGlobalVariable('verrier_planets_number').GetValue]#! планет."
 academics.91.ceres_demoted: "\nВ Солнечной системе #YELLOW [GetGlobalVariable('verrier_planets_number').GetValue]#! планет. Церера - всего лишь астероид."
 academics.91.ceres_saved: "\nВ Солнечной системе #YELLOW [GetGlobalVariable('verrier_planets_number').GetValue]#! планет. Церера - одна из них."
 academics.91.galaxies_default: "\nТуманности, такие как туманность Андромеды, #YELLOW остаются загадкой#!."
 academics.91.galaxies_no: "\nМлечный Путь охватывает #YELLOW всю вселенную#!. Такие явления, как туманность Андромеды, - это #YELLOW всего лишь газовые облака#!."
 academics.91.galaxies_yes: "\nМлечный Путь - лишь #YELLOW одна из многих галактик#!, составляющих вселенную. Такие явления, как туманность Андромеды, на самом деле являются #YELLOW другими галактиками#!."
