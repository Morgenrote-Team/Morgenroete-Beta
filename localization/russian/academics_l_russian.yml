 je_academics_rivalry_for_specimen_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы мы нашли больше [Concept('concept_dubois_specimen','$concept_dubois_specimens$')], чем наш соперник [SCOPE.sCountry('target').GetName].\n\nНаши #b Всего Образцов#!: [ROOT.Var('dubois_specimen').GetValue|0+]\n#b Всего Образцов#! [SCOPE.sCountry('target').GetName]: [ROOT.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+]"
 je_academics_rivalry_for_specimen_success: "У вас ([GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]) больше [Concept('concept_dubois_specimen','$concept_dubois_specimens$')], чем у [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+])."
 academics.2201.t: "Удивительная коллекция образцов"
 academics.2201.d_rival: "Мы собрали большую коллекцию [Concept('concept_dubois_specimen','$concept_dubois_specimens$')], чем наш соперник [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] и наше население в восторге от этой победы нашей нации!"
 academics.2201.d_rival_gone: "Наш соперник в стремлении к огромной биологической коллекции исчез. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] и наше население в восторге от этой победы нашей нации!"
 academics.2201.f: "Наконец-то у нас есть #b Коллекция Образцов#!, достойная нашей великой нации. Пришло время, когда мы можем выставлять самых увлекательных живых существ на этой планете. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] удовлетворён нашей коллекцией на данный момент. Очевидно, мы должны продолжать расти нашу коллекцию, чтобы предотвратить забой этих бедных животных и растений другими нациями.\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2201.g: "Достойная коллекция!"
 academics.2202.t: "Нам не удалось собрать больше Образцов, чем [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]"
 academics.2202.d: "Мы не смогли расширить нашу коллекцию образцов больше, чем наши соперники в [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName]. Члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] абсолютно подавлены."
 academics.2202.f: "Теперь они нашли самое увлекательное животное в мире тоже. Летающую ящерицу. Они назвали её в честь президента их Академии наук. Вы провалились.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2202.g: "Я никогда не оправлюсь от этого с научной точки зрения!"
 academics.2203.t: "[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] хотят [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] для нашего зоопарка"
 academics.2203.d: "[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] обратились к нашему правительству с петицией о приобретении [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] для нашего [concept_dubois_zoo] за 10 лет."
 academics.2203.f: "Есть [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')], которого не хватает нашему зоопарку. Нам нужно, чтобы наше правительство нашло [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] и привезло его в наш зоопарк. Мы не можем позволить нашему зоопарку не иметь этого прекрасного животного в конце концов.\n\nС уважением, представители [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]"
 academics.2203_goal_tt: "Вам предстоит приобрести [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] для нашего [concept_dubois_zoo] за 10 лет."
 academics.2203_reward_tt: "В награду [GetPlayer.MakeScope.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] получит #p 5#! одобрения вашего правительства и #p 5%#! больше привлекательности для населения, а ваша страна получит #p 5%#! больше престижа на 5 лет."
 academics.2203.g: "Поймать их всех!"
 academics.2203.h: "Я возглавляю великую нацию. Я не имею дела с зоопарком!"
 je_academics_get_exotic_animal: "Фокус на натурализме: Приобрести [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] для нашего зоопарка"
 je_academics_get_exotic_animal_reason: "[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] хочет, чтобы мы приобрели [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] для нашего [concept_dubois_zoo].\nЕсть различные способы приобрести такое [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]."
 academics.2204.t: "Новый дом для [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]"
 academics.2204.d: "Нам удалось приобрести [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] для нашего [concept_dubois_zoo]. Это, несомненно, обрадует [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]."
 academics.2204.f: "Ваше правительство успешно приобрело [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] для нашей славной страны. Это показывает, что наша страна достаточно могущественна, чтобы тратить свои ресурсы на развлечение нашего населения. Спасибо!\n\nС уважением, представители [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]"
 academics.2204.g: "Замечательное животное!"
 academics.2205.t: "В нашем зоопарке нет новых животных"
 academics.2205.d: "Нам не удалось приобрести [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] для нашего зоопарка. [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] не позабавится."
 academics.2205.f: "Вы не можете даже приобрести животное для нашего зоопарка. Как мы можем доверять вам вести эту страну?\n\nС уважением, представители [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]"
 academics.2205.g: "У нас нет времени на каких-то случайных животных!"
 academics_exotic_animal_acquired_ig_modifier: "Приобретено экзотическое животное"
 academics_exotic_animal_not_acquired_ig_modifier: "Экзотическое животное не приобретено"
 academics_exotic_animal_acquired_country_modifier: "Приобретено экзотическое животное"
 academics.2206.t: "Для [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] требуется создать зоопарк"
 academics.2206.d: "Предыдущие научные успехи в области естественных исследований можно охарактеризовать как незначительные. В связи с этим некоторые влиятельные представители науки обратились к правительству с петицией."
 academics.2206.f: "Для укрепления биологических исследований в целом и зоологических исследований в частности необходим зоопарк с коллекцией редких животных. Такое учреждение также значительно улучшило бы благосостояние населения. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] поэтому предлагает, чтобы все средства были использованы для создания национального зоопарка, а также помогло бы в обучении энергичного зоолога.\n\nС уважением, Совет [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2206.g: "Несколько животных, конечно, можно найти."
 academics.2206.h: "Неужели этим людям больше некого беспокоить?"
 academics.2207.t: "Новый зоопарк"
 academics.2207.d: "Некоторые представители научного сообщества лично присутствовали на открытии нового зоопарка."
 academics.2207.f: "Отличный, действительно прекрасный новый зоопарк. Участники провели замечательный день и особенно рады бесплатному корму для домашних животных. Мы надеемся, что это только начало, и что только что открывшийся зоопарк вскоре будет расширен и наполнен более ценными, экзотическими и удивительными созданиями.\n\nС уважением, Совет [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2207.g: "Оставь мне немного орешков!"
 academics.2208.t: "Нет зоопарка"
 academics.2208.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] написал горькое письмо сегодня, жалуясь, что желание о новом зоопарке не было выполнено."
 academics.2208.f: "К нашему великому сожалению, мы обнаружили, что нынешнее правительство, похоже, состоит из откровенных врагов науки, биологии в целом и зоологии в частности, или, по крайней мере, из кучки бесчеловечных ненавистников животных. Возможно, в такой обстановке великолепные животные были бы растрачены впустую.\n\nС уважением, Совет [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2208.g: "Если вы будете упрямы, то наверняка не добьетесь исполнения ни одного желания."
 academics.2206_goal_tt: "Вам предстоит собрать #p 5#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] и построить [concept_dubois_zoo] за #n 5#! лет."
 academics.2206_reward_tt: "В награду наш натуралист получит #p 50 опыта#! Если у нас ещё нет натуралиста, мы получим его."
 academics.2209.t: "Расширение зоопарка"
 academics.2209.d: "Открытое письмо от [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] сетует на тот факт, что Национальный зоопарк предлагает мало разнообразия."
 academics.2209.f: "Несмотря на то, что в нашей столице теперь есть зоопарк, который предлагает ученым некоторое разнообразие для изучения животных и для платной публики, это учреждение едва ли достигло уровня, соответствующего размерам города и нашему национальному значению. Поэтому, чтобы повысить престиж, развлечь население и продвинуть науку, мы рекомендуем расширить нынешний зоопарк, по крайней мере, до среднего размера..\n\nС уважением, Совет [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2209.g: "Привести больше животных!"
 academics.2209.h: "У нас есть дела поважнее."
 academics.2210.t: "Ещё больший зоопарк"
 academics.2210.d: "Открытое письмо от [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] сетует на тот факт, что Национальный зоопарк предлагает мало разнообразия."
 academics.2210.f: "Несмотря на то, что в прошлом мы позволили нашему зоопарку вырасти до внушительных размеров, он пока не имеет того международного значения, которое он мог бы и должен был иметь, чтобы поражать другие страны нашей зоологической страстью. Нам нужно все больше и больше экзотических животных. На карту поставлена не только наука, но и наш престиж. Мы настоятельно рекомендуем превратить наш зоопарк в крупный.\n\nС уважением, Совет [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]Зоопарк"
 academics.2211.t: "Процветающий зоологический сад"
 academics.2211.d: "Расширенный зоологический сад является одной из главных достопримечательностей столицы и пользуется большой популярностью как у ученых, так и у обычных граждан. Научное сообщество с радостью отмечает, что их желание было удовлетворено."
 academics.2211.f: "Отличная работа! Новый зоопарк более просторный и отвечает требованиям, предъявляемым к более широкому спектру представителей животного мира. Надеюсь, вы также подумали об утконосе? Мы хотели бы взять на себя спонсорскую поддержку. Его случайно не зовут Перри?\n\nС уважением, Совет [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2211.g: "Животные всего мира в нашем доме!"
 academics.2212.t: "Зоологическое разочарование"
 academics.2212.d: "Научное сообщество задается вопросом, стоит ли по-прежнему обращаться к правительству, когда их интересы попираются таким образом, как крошечная просьба о нескольких животных из зоопарка."
 academics.2212.f: "Мы очень, очень разочарованы.\n\nС уважением, Совет [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2212.g: "Они должны заниматься исследованиями, а не развлекаться в зоопарке."
 academics.2209_goal_tt: "Вам предстоит увеличить ваш [concept_dubois_zoo] до #p размера 3#! (зоопарк среднего размера) за #n 10#! лет."
 academics.2210_goal_tt: "Вам предстоит увеличить ваш [concept_dubois_zoo] до #p размера 4#! (большой зоопарк) за #n 10#! лет."
 academics.2209_reward_tt: "В награду наш натуралист получит #p 50 опыта#! Если у нас ещё нет натуралиста, мы получим его."
 je_academics_found_zoo: "Фокус на натурализме: основать зоопарк"
 je_academics_found_zoo_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы мы построили [concept_dubois_zoo] для расширения знаний, но также и уровня жизни наших интеллектуалов. Строительство зоопарка требует #p 5#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')], которые могут быть пойманы [concept_dubois_naturalist] в местной Зоологической Экспедиции или Сафари Хейя. Животных также можно купить у других стран."
 je_academics_medium_zoo: "Фокус на натурализме: расширить зоопарк"
 je_academics_medium_zoo_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] запросил расширение [concept_dubois_zoo] У нас есть в общей сложности десять лет, чтобы модернизировать наш зоопарк до #p зоопарка среднего размера#!. Это требует больше [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')], которые могут быть пойманы [concept_dubois_naturalist] в местной Зоологической Экспедиции или Сафари Хейя. Животных также можно купить у других стран."
 je_academics_large_zoo: "Фокус на натурализме: расширить зоопарк"
 je_academics_large_zoo_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] запросил расширение [concept_dubois_zoo] У нас есть в общей сложности десять лет, чтобы модернизировать наш зоопарк до #p большого зоопарка#!. Это требует больше [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')], которые могут быть пойманы [concept_dubois_naturalist] в местной Зоологической Экспедиции или Сафари Хейя. Животных также можно купить у других стран."
 academics.2300.t: "Нам нужно найти больше окаменелостей, чем [SCOPE.sCountry('rival_scope').GetName]"
 academics.2300.d: "Нам не хватает достаточно [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] для большей коллекции, чем [SCOPE.sCountry('rival_scope').GetName]. Поэтому [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы мы нашли в общей сложности больше #b Окаменелостей#!, чем [SCOPE.sCountry('rival_scope').GetName]. Они, несомненно, были бы очень благодарны, если бы мы смогли обыграть этого соперника."
 academics.2300.f: "В то время как у наших соперников в [SCOPE.sCountry('rival_scope').GetName] есть различные окаменелости из разных эпох и мест по всему миру, наши весьма ограничены как во времени, так и в географических рамках. Это огромный позор и неприемлемо для такой великой нации, как наша.\nНам необходимо немедленно расширить нашу коллекцию окаменелостей!\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2300_goal_tt: "Вам предстоит собрать больше [Concept('concept_dubois_fossil','$concept_dubois_fossils$')], чем ваш соперник, [SCOPE.sCountry('rival_scope').GetName], за #n 10#! лет. У них [GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+], у нас [GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]."
 academics.2300_reward_tt: "В награду Интеллигенты получат #p 5 одобрения#!, а вы получите #p 10%#! больше престижа на 4 года."
 academics.2300.g: "Ах, древняя вражда!"
 academics.2300.h: "Нам не нужны никакие пыльные камни..."
 academics_no_competition_with_rival_fossils: "Соперничество за окаменелости проиграно"
 academics_competition_with_rival_won_fossils: "\"Выиграно соперничество за окаменелости"
 je_academics_rivalry_for_fossils: "Фокус на палеонтологии: соперничество за окаменелости"
 je_academics_rivalry_for_fossils_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы мы собрали больше [Concept('concept_dubois_fossil','$concept_dubois_fossils$')], чем наш соперник [SCOPE.sCountry('target').GetName].\n\nНаше #b Общее количество окаменелостей#!: [ROOT.Var('dubois_fossil').GetValue|0+]\n#b Общее количество окаменелостей#! [SCOPE.sCountry('target').GetName]: [ROOT.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+]"
 je_academics_rivalry_for_fossils_success: "У вас ([GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]) больше [Concept('concept_dubois_fossil','$concept_dubois_fossils$')], чем у [SCOPE.sCountry('target').GetName] ([GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+])."
 academics.2301.t: "Фантастическая коллекция ископаемых"
 academics.2301.d_rival: "Мы собрали бо́льшую коллекцию [Concept('concept_dubois_fossil','$concept_dubois_fossils$')], чем наш соперник [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] и наше население в восторге от этой победы нашей нации!"
 academics.2301.d_rival_gone: "Наш соперник в стремлении собрать огромную коллекцию окаменелостей побежден. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] и наше население в восторге от этой победы нашей нации!"
 academics.2301.f: "С самого начала было ясно, что нам нужна более обширная коллекция ископаемых, чем у нашего конкурента. Теперь, когда мы собрали так много окаменелостей от кембрия до четвертичного периода и от Америки до островов Тихого океана, у нас действительно достойная коллекция! Очевидно, что это следовало сделать много лет назад, и нам следует расширить эту коллекцию еще больше. На данный момент ситуация \"достаточно хорошая\", как говорят крестьяне.\n\nПодписано, членами [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2301.g: "Это положит конец нашей вражде!"
 academics.2302.t: "Нам не удалось собрать больше окаменелостей, чем [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]"
 academics.2302.d: "Мы не смогли расширить нашу коллекцию окаменелостей больше, чем наши соперники в [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName]. Члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] не в восторге."
 academics.2302.f: "Их коллекция насчитывает века, у них есть все, а у нас есть несколько пыльных камней с плохо различимыми окаменелостями... это ужасно. Это позорное время для нашей нации! Отвратительно.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2302.g: "Мне все равно не нужны старые камни..."
