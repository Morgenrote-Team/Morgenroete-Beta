 academics.2101.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] требует построить музей"
 academics.2101.d: "Мы - одна из самых могущественных держав мира, но у нас до сих пор нет никакого археологического престижа. Поэтому [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] просит нас построить археологический музей."
 academics.2101.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] просит вас уделить больше внимания археологии. Изучение прошлого, открытие забытых культур и поиск ценных артефактов имеют первостепенное значение как для науки, так и для престижа державы.\nПоэтому мы просим вас основать археологический музей для приумножения, распространения и сохранения знаний и выдающихся произведений искусства прошлых культур.\n\nС уважением, совет [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2101.g: "Отправляемся на охоту за сокровищами!"
 academics.2101.h: "Нам не нужен этот пыльный музей."
 academics.2101_goal_tt: "Вам предстоит собрать #p 5#! [Concept('concept_lepsius_artifact','артефактов')] и построить археологический музей в течение #n 10#! лет."
 academics.2102.t: "Торжественное открытие археологического музея"
 academics.2102.d: "Судя по всему, представители [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] остались очень довольны сегодняшним открытием археологического музея."
 academics.2102.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] с восторгом восприняло весть об открытии нового музея для публики. Теперь многочисленные граждане могут наслаждаться найденными артефактами, которые также представляют большую научную ценность. Однако это только начало, и мы уже договорились с директором музея, что он будет способствовать дальнейшему пополнению коллекции. Разумеется, он также является членом нашего общества.\n\nС уважением, совет [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2102.g: "Теперь нужно найти для него экспонаты..."
 academics.2103.t: "Позор для археологии"
 academics.2103.d: "Сегодня [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] с большим огорчением отметило, что, несмотря на обещание содействовать развитию археологии в стране, никаких усилий в этом направлении предпринято не было."
 academics.2103.f: "Мы, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], глубоко разочарованы бездействием правительства. Неужели какой-то небольшой музей - это слишком много?\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2103.g: "Кому вообще нужен этот пыльный музей?"
 academics.2104.t: "Директор музея предлагает устроить египетскую выставку"
 academics.2105.t: "Директор музея предлагает устроить месопотамскую выставку"
 academics.2106.t: "Директор музея предлагает устроить эгейскую выставку"
 academics.2107.t: "Директор музея предлагает устроить доколумбову выставку"
 academics.2104.d: "Директор археологического музея предупредил, что наше учреждение может отстать от международных конкурентов, если мы в срочном порядке не соберём недостающие артефакты для новой выставки."
 academics.2104.f: "Как полноправный член [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], я сожалею о пренебрежении к нашему прекрасному музею. Весь мир коллекционирует египетские артефакты, а недавно я слышал о привезённой из-за границы статуэтке кошки Бастет. Говорят, это последний писк моды! Ещё я слышал, что она розовая. А у нас нет даже достаточного количества скарабеев, чтобы организовать приличную выставку. Если мы в ближайшее время не соберём достаточно артефактов хотя бы для средней выставки, я буду пессимистично смотреть на будущее археологии в нашей стране.\n\nС уважением, директор археологического музея"
 academics.2105.f: "Как ярый член [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], я сожалею о пренебрежении к нашему уважаемому музею. Месопотамские артефакты сейчас нарасхват, и великие державы не могут ими насытиться. Конечно, я считаю, что не размер ламассу определяет его ценность, а то, как вы его используете. Однако у нас нет даже достаточного количества клинописных табличек, чтобы организовать приличную выставку. Если мы в ближайшее время не соберём достаточно артефактов хотя бы для средней выставки, я буду пессимистично смотреть на будущее археологии в нашей стране.\n\nС уважением, директор археологического музея"
 academics.2106.f: "Как важный член [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], я сожалею о пренебрежении к нашему прославленному музею. Эгейские артефакты расходятся как горячие пирожки - таков опыт последних нескольких лет. Эпосы Гомера стали частью массовой культуры с тех пор, как была вновь открыта Троя, и теперь у каждого нувориша в саду стоит античная статуя. А что у нас? У нас нет даже нескольких жалких микенских погребальных предметов! Если мы в ближайшее время не соберём достаточно артефактов хотя бы для средней выставки, я буду пессимистично смотреть на будущее археологии в нашей стране.\n\nС уважением, директор археологического музея"
 academics.2107.f: "Как видный член [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], я сожалею о пренебрежении к нашему значимому музею. Майянизм больше не знает границ. Эзотерически настроенные члены нашего общества тратят огромные деньги, чтобы заполучить самые экзотические предметы из Центральной и Южной Америки. Расхищение гробниц и уничтожение ценных исторических ценностей идёт полным ходом. Я слышал, что один руководитель экспедиции даже хотел перевезти пирамиды Тикаля! У нас же нет даже нескольких оккультных каменных масок, чтобы пугать детей в музее. Если мы в ближайшее время не соберём достаточно артефактов хотя бы для средней выставки, я буду пессимистично смотреть на будущее археологии в нашей стране.\n\nС уважением, директор археологического музея"
 academics.2104.g: "Удача и слава!"
 academics.2104.h: "У нас есть дела поважнее охоты за сокровищами."
 academics.2108.t: "Новая археологическая коллекция"
 academics.2108.d: "Директор музея выразил свой восторг тем, что его опасения по поводу новых артефактов были услышаны, и сообщил своим друзьям из [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], что в музее скоро откроется новая выставка."
 academics.2108.f: "Мы искренне благодарим правительство за помощь в повышении научного авторитета нации. Многочисленные новые артефакты являются выражением мастерства и неустанного исследовательского рвения лучших мужей и жён этой страны.\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2108.g: "Успех!"
 academics.2109.t: "Археологическое разочарование"
 academics.2109.d: "Поражённый, встревоженный и шокированный пренебрежением к его настоятельным просьбам, директор музея, рыдая, заперся в своём кабинете и отказывается с кем-либо разговаривать."
 academics.2109.f: "Отлично, просто отлично. В последний раз, когда директор музея был в таком состоянии, он чуть не выбросился из окна. Поразительно, с каким безразличием действуют некоторые правительственные чиновники. Он всего лишь хотел несколько артефактов. Парочку невзрачных маленьких артефактов. У него нет ничего в этом мире, кроме нескольких пыльных статуэток и разбитых ваз! Надеюсь, теперь вы счастливы. Бедняга совершенно раздавлен.\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2109.g: "Неудача..."
 academics.2104_goal_tt: "Вам предстоит собрать #p 25#! египетских [Concept('concept_lepsius_artifact','артефактов')] в течение #n 15#! лет."
 academics.2105_goal_tt: "Вам предстоит собрать #p 25#! месопотамских [Concept('concept_lepsius_artifact','артефактов')] в течение #n 15#! лет."
 academics.2106_goal_tt: "Вам предстоит собрать #p 25#! эгейских [Concept('concept_lepsius_artifact','артефактов')] в течение #n 15#! лет."
 academics.2107_goal_tt: "Вам предстоит собрать #p 25#! доколумбовых [Concept('concept_lepsius_artifact','артефактов')] в течение #n 15#! лет."
 je_academics_found_archaeological_museum: "Фокус на археологии: основать музей"
 je_academics_found_archaeological_museum_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы мы построили археологический музей для приумножения знаний, а также для повышения уровня жизни нашей интеллигенции. Для строительства музея требуется #p 5#! [Concept('concept_lepsius_artifact','артефактов')], которые должен найти [Concept('concept_lepsius_archaeologist', '#b #BLUE археолог#!#!')] в [Concept('concept_lepsius_expedition','археологической экспедиции')], если только нам несказанно не повезёт получить их в дар или в ходе местных раскопок.\nЭто также очень важно, потому что профессиональная археологическая фраза «Этому место в музее!» не имела бы особого смысла без самого музея.\n\nНа самом деле, было бы довольно неловко."
