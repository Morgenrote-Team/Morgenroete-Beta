 academics_recruit_foreign_scientist_desc: "Нанять [Concept('concept_academics_academic','учёного')] из более развитой страны. Поскольку лучшие умы останутся на родине, мы не сможем заполучить самых выдающихся специалистов. Поэтому нанятому учёному потребуется больше времени для накопления опыта."
