 academics.140.t: "Наш инженер, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], теперь инженер-строитель"
 academics.140.d: "Годы работы в гражданском строительстве окупились. Построив множество мостов и туннелей, доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] теперь считается настоящим [Concept('concept_tesla_civil_engineer', '#b #ORANGE инженером-строителем#!#!')]. Это, несомненно, придаст импульс [SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'её', 'его')] проектам!"
 academics.140.f: ""
 academics.140.g: "Инженер нашего будущего!"
 academics.141.t: "Наш инженер, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], теперь инженер-механик"
 academics.141.d: "Годы работы с механизмами окупились. Доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'создала', 'создал')] множество изобретений и новых машин, и они наконец-то позволили [SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'ей', 'ему')] стать настоящим [Concept('concept_tesla_mechanical_engineer', '#b #ORANGE инженером-механиком#!#!')]. Мы надеемся на новые удивительные проекты!"
 academics.141.f: ""
 academics.141.g: "Настоящий двигатель прогресса!"
 academics.142.t: "Наш инженер, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], теперь военный инженер"
 academics.142.d: "Годы работы на военных окупились. После строительства крепостей, создания нового оружия и оснащения наших солдат в течение многих лет доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] теперь считается настоящим [Concept('concept_tesla_military_engineer', '#b #ORANGE военным инженером#!#!')]. Надеемся, он продолжит служить нашей нации!"
 academics.142.f: ""
 academics.142.g: "Инженерный фундамент нашей армии!"
 academics.143.t: "Наш инженер, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], теперь инженер-электрик"
 academics.143.d: "Доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] всегда [SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'мечтала', 'мечтал')] укротить силу электричества. После многих прорывов в этой области [SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'она', 'он')] теперь считается [Concept('concept_tesla_electrical_engineer', '#b #ORANGE инженером-электриком#!#!')]."
 academics.143.f: ""
 academics.143.g: "Искра знания!"
 academics.144.t: "Наш инженер, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], теперь авиаконструктор"
 academics.144.d: "Долгое время люди мечтали о полётах. Теперь, когда началась эра авиации, доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] находится на переднем крае авиастроения. После многих прорывов в этой области [SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'она', 'он')] теперь считается [Concept('concept_tesla_aeronautical_engineer', '#b #ORANGE авиаконструктором#!#!')]."
 academics.144.f: ""
 academics.144.g: "К небесам!"
 notification_academics_yearly_experience_gain_notification_name: "Ежегодный прирост опыта учёных"
 notification_academics_yearly_experience_gain_notification_desc: "Каждый учёный, который может получать опыт, получил от #p 0#! до #p 5#! ед. опыта."
 dubois_humanities_receive_promotion_loc: "Расхитители гробниц и некрофилы не приносят нашему обществу абсолютно никакой пользы!"
 dubois_natural_history_receive_promotion_loc: "Почему коллекционеры бабочек и создатели монстров получают всё финансирование, а мы должны перебиваться остатками?"
 dubois_mathematics_receive_promotion_loc: "Это абсолютный идиотизм, что сумасшедшим изобретателям и звездочётам исполняют все их желания, в то время как мы должны довольствоваться крохами!"
 academics_engineer_focus_atmospheric_engine_loc: "Мы пытаемся обуздать силу пара, чтобы заменить рабочих машинами. Это удешевит добычу ресурсов и производство товаров!"
 academics_engineer_focus_computer_loc: "Мы пытаемся построить машину, которая сможет выполнять всевозможные вычисления. Это сделает ненужными людей-вычислителей. Мы сможем всё рассчитывать с высочайшей точностью и без ошибок!"
 academics_engineer_focus_washing_machine_loc: "Наша цель - создать машину, которая сможет стирать бельё без участия человека. Это произведёт революцию в нашем обществе, так как нам больше не придётся тратить время на стирку грязного белья!"
 academics_engineer_focus_lighter_loc: "Можете ли вы представить, насколько полезна была бы маленькая карманная зажигалка? Такая, что создаёт большое пламя и может зажигать свечи или сигареты? Это целое состояние, которое ждёт своего часа!"
 academics_engineer_focus_rocket_loc: "Мы хотим создать ракету, способную достичь космоса. Только представьте себе военное применение такой ракеты. Вы сможете поражать своих врагов, и они ничего не смогут с этим поделать!"
 academics_engineer_focus_telephone_loc: "Представьте себе устройство, с помощью которого можно разговаривать с кем-то на огромных расстояниях! Именно над этим мы сейчас работаем в нашей лаборатории!"
 academics_engineer_focus_combustion_engine_loc: "Поезда - это здорово, но они огромны и нуждаются в рельсах. Что, если бы мы могли построить небольшой мотор, способный приводить в движение небольшое транспортное средство? Каждый мог бы путешествовать куда угодно. У такого мотора много полезных применений. И именно над этим сейчас работает моя команда!"
 academics_engineer_focus_basic_research_alloys_loc: "Мы проводим фундаментальные исследования, чтобы найти как можно больше полезных сплавов. Если мы найдём правильные сплавы, это может привести к созданию лучших конструкций, более эффективных машин и устройств, которые сейчас считаются невозможными!"
 academics_engineer_focus_basic_research_factory_machinery_loc: "Моя команда работает над улучшением станков, используемых на заводах. Это может привести к значительному росту нашего производства и богатства нашей нации!"
 academics_engineer_focus_basic_research_housing_loc: "Мы ищем наиболее эффективный способ строительства домов, чтобы дёшево создавать жилое пространство. Это могло бы помочь населению позволить себе лучшие условия жизни и дало бы толчок нашему строительному сектору."
 academics_engineer_focus_basic_research_urban_planing_loc: "Наши города недостаточно эффективны. Поэтому мы должны выяснить, как сделать города более эффективными, чтобы повысить уровень жизни наших людей!"
 academics.2001.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] просит нас сосредоточиться на исследовании небес"
 academics.2001.d: "У нашей нации пока мало астрономических исследований, и у нас даже нет главного [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')]. Поэтому [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы мы создали новую звёздную карту и назначили главного астронома."
 academics.2001.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] просит вас усилить наше участие в астрономии. Такой фокус позволил бы нам получить новые знания о небе и вселенной.\nПоэтому мы просим вас, во-первых, создать новую, обновлённую звёздную карту и, во-вторых, нанять главного астронома.\n\nС уважением, совет [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2001.g: "К звёздам!"
 academics.2001.h: "Звёзды? У нас есть дела поважнее!"
 academics_unhappy_intelligentsia: "Научное общество недовольно"
 academics.2001_goal_tt: "Вам нужно будет открыть #p 75#! [Concept('concept_verrier_astronomical_object', 'астрономических объектов')] и нанять [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')] в течение #n 10#! лет."
 academics.2001_reward_tt: "В награду ваш астроном получит #p 15 ед. опыта#!, кроме того, интеллигенция получит #p +5 к одобрению#!, а стоимость производственных технологий будет снижена на #p 5%#! на 3 года."
 je_academics_find_more_stars: "Фокус на астрономии: звёздная карта"
 je_academics_find_more_stars_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы мы нашли [JournalEntry.GetGoalAddValue] новых [Concept('concept_verrier_astronomical_object', 'астрономических объектов')] для создания новой звёздной карты и назначили нового главного [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')].\n\nНа данный момент мы нашли [JournalEntry.GetGoalProgressValue] #b астрономических объектов#!."
 je_academics_find_more_stars_success: "Найти #p 75#! новых #b астрономических объектов#!"
 je_academics_find_more_stars_event_tt: "Наш новый [Concept('concept_verrier_astronomer', '#b #ORANGE астроном#!#!')] представит новую звёздную карту"
 je_academics_find_more_stars_goal: ""
 academics.2002.t: "Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] представляет новую звёздную карту"
 academics.2002.d: "Нам удалось создать новую звёздную карту и найти нового главного [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')]. Члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] будут довольны!"
 academics.2002.f: "«Эта новая звёздная карта очень точна! Я сравнил её с картами других наций, и наша, очевидно, превосходит их. Кроме того, мы нашли много новых звёзд, некоторые из которых весьма интересны! У этой, например, больше красного света, чем обычно»."
 academics.2002.g: "Ура!"
 academics_scientific_society_happy: "Научное общество довольно"
 academics.2003.t: "Наш фокус на астрономии провалился!"
 academics.2003.d: "Мы не смогли достаточно сосредоточиться на астрономии, чтобы достичь целей, поставленных перед нами [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]. Они не будут довольны!"
 academics.2003.f: "«Похоже, война, экономика и даже вино и прочий алкоголь важнее для наших лидеров, чем наука. Мы разочарованы. Надеемся, что внимание нашей великой нации скоро вновь обратится к науке!»"
 academics.2003.g: "Какая жалость!"
 academics.2004.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] запрашивает у нашего [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')] новую звёздную карту"
 academics.2004.d: "По мнению [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], нашей нации необходимо сосредоточиться на исследовании неба. Они попросили доктора [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] найти новые звёзды и другие [Concept('concept_verrier_astronomical_object', 'астрономические объекты')] и создать новую звёздную карту."
 academics.2004_goal_tt: "Вам нужно будет открыть #p 100#! [Concept('concept_verrier_astronomical_object', 'астрономических объектов')] за #n 10#! лет."
 academics.2004_reward_tt: "В награду ваш астроном получит #p 25 ед. опыта#!, кроме того, интеллигенция получит #p +5 к одобрению#!, а стоимость производственных технологий будет снижена на #p 5%#! на 3 года."
 je_academics_create_star_chart: "Фокус на астрономии: звёздная карта нашего астронома"
 je_academics_create_star_chart_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы наш [Concept('concept_verrier_astronomer', '#b #ORANGE астроном#!#!')] нашёл [JournalEntry.GetGoalAddValue] новых [Concept('concept_verrier_astronomical_object', 'астрономических объектов')] для создания новой звёздной карты.\n\nНа данный момент мы нашли [JournalEntry.GetGoalProgressValue] #b астрономических объектов#!."
 je_academics_create_star_chart_success: "Найти #p 100#! новых #b астрономических объектов#!"
 je_academics_create_star_chart_event_tt: "Наш [Concept('concept_verrier_astronomer', '#b #ORANGE астроном#!#!')] представит новую звёздную карту."
 je_academics_create_star_chart_event_without_astronomer_tt: "Наша новая звёздная карта будет опубликована."
 je_academics_create_star_chart_failed_event_tt: "Наш [Concept('concept_verrier_astronomer', '#b #ORANGE астроном#!#!')] не смог предоставить новую звёздную карту."
 je_academics_create_star_chart_failed_event_without_astronomer_tt: "Потеряв [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')], мы не сможем предоставить звёздную карту."
 je_academics_create_star_chart_goal: ""
 academics.2005.t: "Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] представляет новую звёздную карту"
 academics.2005.f: "Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'была', 'был')] в окружении своих коллег, когда они поднимали тосты друг за друга.\n\n«Дорогой друг, я знал, что вы легко с этим справитесь. Ваша новая звёздная карта необычайна! Настоящий шедевр!»"
 academics.2006.t: "Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'потерпела', 'потерпел')] неудачу!"
 academics.2006.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] не [SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'смогла', 'смог')] создать новую звёздную карту. [SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'Она', 'Он')] не [SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'смогла', 'смог')] найти достаточно звёзд и других [Concept('concept_verrier_astronomical_object', 'астрономических объектов')], чтобы это имело смысл. Остальные члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] крайне разочарованы [SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'её', 'его')] неудачей."
 academics.2006.f: "[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'Уважаемая', 'Уважаемый')] [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFirstName],\n\n   Мы заметили, что вы не смогли предоставить новую звёздную карту, что ещё раз доказывает, что вы предпочитаете другие занятия науке. К сожалению, это плохо отразится на нашем Обществе. В будущем мы ожидаем лучших результатов!\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2006.g: "Какая жалость!"
 academics.2007.t: "Новая звёздная карта"
 academics.2007.d: "К сожалению, в отсутствие нашего бывшего [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')] новая звёздная карта была представлена в [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]. Академики, похоже, весьма довольны новой картой."
 academics.2007.f: "«Благодаря этой новой звёздной карте мы сможем ещё лучше изучать небо! Надеемся, мы получим много новых знаний о движении этих тел!\nЭто стало возможным только благодаря [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]! Тост за нас, господа!»"
 academics.2008.t: "Нет астронома - нет звёздной карты"
 academics.2008.d: "Потеря нашего [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')] привела к меньшему количеству открытий звёзд и других [Concept('concept_verrier_astronomical_object', 'астрономических объектов')], чем мы ожидали. Поэтому мы не смогли найти достаточно материала для создания новой звёздной карты. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] недовольно этим результатом."
 academics.2008.f: "«Наше правительство не только потеряло своего блестящего главного астронома, но и не смогло в достаточной мере поддержать работу наших астрономов. В результате наблюдений стало гораздо меньше. Это означает, что мы отстанем в наших астрономических исследованиях. Это поистине ужасно!»"
 academics.2009.t: "Нам нужно найти больше звёзд, чем у [SCOPE.sCountry('rival_scope').GetAltNameNoFlag('RU_CL_RP')]"
 academics.2009.d: "Члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] недовольны тем, что [SCOPE.sCountry('rival_scope').GetName] открыл[SCOPE.sCountry('rival_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] больше [Concept('concept_verrier_astronomical_object', 'астрономических объектов')], чем наша держава. Они просят нас за 10 лет найти в общей сложности больше #b астрономических объектов#!, чем у [SCOPE.sCountry('rival_scope').GetAltNameNoFlag('RU_CL_RP')]."
 academics.2009.f: "Это позор, что такая незначительная нация, как [SCOPE.sCountry('rival_scope').GetName], нашла больше астрономических объектов, чем мы. Мы должны как можно скорее обогнать этих нецивилизованных астрономов-любителей и найти в целом больше астрономических объектов, чем они.\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2009_goal_tt: "Вам нужно будет за #n 10#! лет открыть больше [Concept('concept_verrier_astronomical_object', 'астрономических объектов')], чем у вашего соперника, [SCOPE.sCountry('rival_scope').GetAltNameNoFlag('RU_CL_RP')]. У них [GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+], у нас - [GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]."
 academics.2009_reward_tt: "В награду интеллигенция получит #p +5 к одобрению#!, а вы получите на #p 10%#! больше престижа на 4 года."
 academics.2009.g: "Давайте их победим!"
 academics.2009.h: "Это не космическая гонка..."
 academics_no_competition_with_rival: "Гонка за звёзды проиграна"
 academics_competition_with_rival_won: "Гонка за звёзды выиграна"
 je_academics_rivalry_for_stars: "Фокус на астрономии: звёздная гонка"
 je_academics_rivalry_for_stars_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы мы нашли больше [Concept('concept_verrier_astronomical_object', 'астрономических объектов')], чем у нашего соперника, [SCOPE.sCountry('target').GetAltNameNoFlag('RU_CL_RP')].\n\nНаши #b астрономические объекты#!: [ROOT.Var('verrier_astronomical_objects').GetValue|0+]\n#b Астрономические объекты#! [SCOPE.sCountry('target').GetAltNameNoFlag('RU_CL_RP')]: [ROOT.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+]"
 je_academics_rivalry_for_stars_success: "У вас ([GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]) больше [Concept('concept_verrier_astronomical_object', 'астрономических объектов')], чем у [SCOPE.sCountry('target').GetAltNameNoFlag('RU_CL_RP')] ([GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+])."
 academics.2010.t: "Мы выиграли гонку за звёзды"
 academics.2010.d_rival: "Мы открыли больше астрономических объектов, чем [ROOT.Var('je_rival_nation_var').GetCountry.GetName]. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] и наше население в восторге от этой победы нашей нации!"
 academics.2010.d_rival_gone: "Наш соперник в гонке за звёзды сошёл с дистанции. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] и наше население в восторге от этой победы нашей нации!"
 academics.2010.f: "Мы, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], очень рады нашей научной победе над нашим соперником. Их учёные оказались застрявшими в каменном веке и неспособными открыть больше астрономических объектов. Это великий день для нашей нации!\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2011.t: "Мы проиграли гонку за звёзды"
 academics.2011.d: "Мы не смогли найти больше [Concept('concept_verrier_astronomical_object', 'астрономических объектов')], чем [ROOT.Var('je_rival_nation_var').GetCountry.GetName]. Члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] глубоко разочарованы."
 academics.2011.f: "Эта неудача нашей академии ещё раз доказывает, что внимание нашей нации обращено не к науке и научному прогрессу. Поэтому мы предлагаем прекратить военные действия и отказаться от планов мирового завоевания ради науки.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2012.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] требует построить [Concept('concept_verrier_observatory', 'обсерваторию')]"
 academics.2012.d: "Члены нашего [Concept('concept_academics_scientific_society', 'научного общества')] требуют, чтобы мы построили современную [Concept('concept_verrier_observatory', 'обсерваторию')] в течение 10 лет или менее. Это позволило бы нам заниматься [Concept('concept_verrier_astronomy', 'астрономией')] и находить [Concept('concept_verrier_astronomical_object', 'астрономические объекты')]."
 academics.2012.f: "Поскольку в наши дни у каждой великой нации есть обсерватория, мы, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], требуем её строительства. Без обсерватории мы никогда не окажемся на переднем крае науки. Поэтому обсерватория нам необходима.\n\nС уважением, совет [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2012.g: "Мне нужны наши лучшие архитекторы и инженеры прямо сейчас!"
 academics.2012.h: "Кому вообще нужна обсерватория?"
 academics.2012_goal_tt: "Вам нужно будет построить [Concept('concept_verrier_observatory', 'обсерваторию')] за #n 10#! лет."
 academics.2012_reward_tt: "В награду интеллигенция получит #p +5 к одобрению#!, стоимость производственных технологий будет снижена на #p 5%#! на 5 лет, а также вы получите #p +5%#! лоялистов среди учёных."
 je_academics_build_observatory: "Фокус на астрономии: построить обсерваторию"
 je_academics_build_observatory_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы мы построили [Concept('concept_verrier_observatory', 'обсерваторию')]. Для строительства обсерватории нам нужен как минимум один университет и либо исследованная технология #b «Современная астрономия»#!, либо [Concept('concept_verrier_astronomer', '#b #ORANGE астроном#!#!')]."
 academics.2013.t: "Новая обсерватория начинает наблюдения"
 academics.2013.d: "Новая [Concept('concept_verrier_observatory', 'обсерватория')] открыла свои двери и начала наблюдение за небом. Члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] довольны... пока что."
 academics.2013.f: "После строительства обсерватории наша нация наконец-то может исследовать ночное небо. Поздравляем. Теперь нас действительно можно считать научно развитой страной.\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2013.g: "Мы раскроем тайны ночного неба!"
 academics.2014.t: "Астрономический провал"
 academics.2014.d: "Мы не смогли построить [Concept('concept_verrier_observatory', 'обсерваторию')]. Члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] глубоко разочарованы!"
 academics.2014.f: "Строительство обсерватории, должно быть, чрезвычайно сложное дело, раз наша нация не смогла сделать это за 10 лет! За это время мы могли бы найти новую планету, сотни звёзд или рассчитать движение многих комет. Но без надлежащего телескопа это невозможно. Постыдное зрелище.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2014.g: "Это всё комета виновата!"
 academics.2015.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы мы нашли Планету X"
 academics.2015.d: "Члены нашего [Concept('concept_academics_scientific_society', 'научного общества')] убеждены, что открытие Планеты X станет величайшим научным успехом этого столетия. Они просят нас сосредоточиться на поиске таинственной планеты раньше всех."
 academics.2015.f: "Мы слышали, что другие нации стремятся найти Планету X. Но этот прорыв принадлежит только нам! Мы должны опередить всех в этой колоссальной задаче!\n\nС уважением, совет [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2015.g: "Направить все наши ресурсы на поиски этой планеты!"
 academics.2015.h: "Планета X? Скорее Планета Y..."
 academics.2015_goal_tt: "Вам нужно будет найти #b Планету X#! раньше всех. Чтобы иметь шанс её обнаружить, нам понадобится [Concept('concept_verrier_astronomer', '#b #ORANGE астроном#!#!')] и #p 1500#! открытых [Concept('concept_verrier_astronomical_object', 'астрономических объектов')]."
 academics.2015_reward_tt: "В награду интеллигенция получит #p +5 к одобрению#!, стоимость производственных технологий будет снижена на #p 5%#! на 10 лет, вы также получите #p +10%#! лоялистов среди учёных, а ваш [Concept('concept_verrier_astronomer', '#b #ORANGE астроном#!#!')] получит #p 50#! ед. [Concept('concept_academics_experience', 'опыта')]."
