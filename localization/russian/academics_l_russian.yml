 academics_recruit_foreign_scientist_proposal_notification_desc: "От державы [INITIATOR_COUNTRY.GetAltNameNoFlag('RU_CL_RP')] поступила просьба: за денежное вознаграждение отправить туда одного из наших [Concept('concept_academics_academic','учёных')], поскольку там не могут нанять специалиста самостоятельно. Мы отправим туда нового неопытного учёного, а не одного из наших учёных."
 academics_recruit_foreign_scientist_proposal_notification_effects_desc: "Мы получим @money! #p 250 тыс.#! и отправим одного из наших младших [Concept('concept_academics_academic','учёных')] в [INITIATOR_COUNTRY.GetAltNameNoFlag('RU_CL_VP')]."
