 academics.2401.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_title_custom_loc')]"
 academics_spanisch_broetli_title_loc: "Швейцарская Северная железная дорога"
 academics_ferrovia_torino_genova_title_loc: "Железная дорога Турин-Генуя"
 academics_generic_title_loc: "Первая железнодорожная линия [SCOPE.GetRootScope.GetCountry.GetName]"
 academics.2401.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_desc_custom_loc')]"
 academics_spanisch_broetli_desc_loc: "В Швейцарии было налажено первое железнодорожное сообщение между городом Цюрихом и Баденом. Надеемся, что этот железнодорожный маршрут облегчит перевозку товаров, людей и почты и будет способствовать развитию промышленности в Бадене и Цюрихе. По крайней мере, это позволяет богатым дворянам из Цюриха отправлять своих слуг утром в Баден за свежими испанскими булочками (отсюда и неофициальное название железной дороги: Spanisch-Brötli-Bahn) , знаменитыми сладкими булочками, которые были испечены известным баденским пекарем. Промышленники очень довольны этой новой железнодорожной линией."
 academics_ferrovia_torino_desc_title_loc: "Турино-Генуэзская железная дорога была официально открыта в присутствии [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting]. Железнодорожная линия от Турина до Генуи — шедевр итальянской инженерии. Двухпутная линия длиной 169 километров имеет более 30 мостов и, с тоннелем Джови длиной 3259 метров, — самый длинный тоннель в мире.\nНадеемся, железнодорожная линия ускорит перемещение товаров и пассажиров между Турином и Генуей и поспособствует развитию нашей промышленности. Очевидно, наши промышленные магнаты в восторге от этой первой железнодорожной линии."
 academics_generic_desc_loc: "Строительство нашей первой железнодорожной линии не было ни легким, ни дешевым. Но благодаря превосходной [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting] инженерии оно было завершено в рекордные сроки. Промышленники очень довольны, поскольку эта линия предоставляет им быстрый способ перемещения своих товаров и ресурсов."
 academics.2401.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_flavor_custom_loc')]"
 academics_spanisch_broetli_flavor_loc: "Соблазнительный аромат испанских булочек щекочет ваше обоняние. Вкусное кондитерское изделие было доставлено первым поездом Швейцарии, соединившим Цюрих с городом Баден.\n\n#b Исторически#! железная дорога от Цюриха до Бадена была завершена в 1847 году, вскоре перед гражданской войной в Швейцарии, \\"Sonderbundskrieg\\". Было 4 локомотива, которые позволяли осуществлять четыре рейса в день. Они могли преодолеть 23 километра примерно за 45 минут. Швейцарская северная железная дорога, как она официально называлась, не имела большого экономического успеха, и вскоре планы по расширению до Арау были отменены, а одно из ежедневных рейсов прекращено.\n\nРеконструкция \\"Спанisch-Брётли-Бан\\" существует и иногда используется как исторический поезд на современных железнодорожных путях в Швейцарии."
 academics_ferrovia_torino_genova_flavor_loc: "Архиепископ Генуи крестил первый локомотив. Затем чудовище тронулось с места. Это был первый поезд, который проследовал из Генуи до самого Турина.\n\n#b Исторически сложилось так,#! что эта линия стала первой железнодорожной линией на Сардинии-Пьемонте. Она была введена в эксплуатацию королем Карло Альберто I 18 июля 1844 года. Еще до того, как строительство линии было завершено, первые участки линии были однопутными. 6 декабря 1853 года линия была официально открыта.\nЖелезнодорожная ветка быстро стала самой посещаемой в Италии. Тем более что это позволяло перевозить грузы из порта Генуи. В 1889 году через перевал Джиови была построена альтернативная линия с меньшими уклонами, чем на старой линии.\n В 1898 году железнодорожная бригада задохнулась в туннеле Джови, и локомотив продолжил движение без машиниста. Он протаранил ожидавший его поезд, в результате чего погибли в общей сложности 13 человек. В результате линия была электрифицирована."
 academics_generic_flavor_loc: "\"Нам также давно пора было обзавестись собственной железнодорожной линией! Мы значительно отстали от конкурентов! Теперь мы наконец-то можем перевозить всю нашу продукцию достойным образом!\""
 academics.2401.g: "Да, мы можем!"
 academics.2402.t: "Нам не удалось построить нашу первую железнодорожную ветку"
 academics.2402.d: "Прошло 5 лет с тех пор, как промышленники попросили нас построить первую железнодорожную линию в нашей стране. Мы не смогли завершить строительство вовремя. Несомненно, это повлияет на мнение промышленников о нашем правительстве."
 academics.2402.f: "\"Вы не можете даже построить железнодорожную ветку. Ваше правительство - абсолютный неудачник. Позор!\""
 academics.2402.g: "Нет, мы не можем"
