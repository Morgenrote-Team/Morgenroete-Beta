 je_goettinger_seven_monument: "Памятник Гёттингенской семёрке"
 je_goettinger_seven_monument_reason: "Объединенная немецкая нация могла бы почтить память Геттингенской семерки - при условии, что ведущая объединяющая держава исторически уже вступалась за них. Памятник вдохновил бы поколения ученых! Конечно, это предполагает, что правительство Германии разделяет либеральные идеи легендарных профессоров."
 academics.3101.t: "Конституция Ганновера"
 academics.3101.d: "В качестве одного из своих первых официальных актов король объявил, что он отменит конституцию, так называемый Staatsgrundgesetz (\"Основной закон государства\"). Эрнест Август подчеркнул, что он не чувствует себя связанным ею."
 academics.3101.f: "Ганновер получил свою первую конституцию, дарованную принцем-регентом в 1819 году; это лишь обозначило превращение Ганновера из электората в королевство, гарантированное Венским конгрессом. Герцог Кембриджский, как вице-король короля Вильгельма в Ганновере, рекомендовал провести тщательную реорганизацию правительства Ганновера. Вильгельм IV дал свое согласие на принятие новой конституции в 1833 году; согласия герцога Камберлендского никто не спрашивал и не получал, и он официально протестовал против принятия конституции без его согласия. Сразу по прибытии в Ганновер король распустил ганноверский парламент, который был созван в соответствии с оспариваемой конституцией. Он объявил о приостановлении действия конституции на том основании, что его согласия не спрашивали и что оно не отвечает потребностям королевства."
 academics.3101.g: "Приостановить конституцию."
 academics.3101.h: "Король не выше закона."
 academics.3102.t: "Гёттингенская семёрка"
 academics.3102.d: "Историк и политик Фридрих Кристоф Дальманн выступил против планов Эрнеста изменить конституцию по своему усмотрению, поскольку сам Дальманн внес свой вклад в ее разработку. Шесть других известных профессоров Геттингенского университета присоединились к протесту и выступили в защиту конституции 1833 года. Вскоре эти люди стали известны как \"Геттингенская семерка\" и стали досаждать королю."
 academics.3102.f: "Документ Далмана произвел взрывной эффект — студенты университета выпустили многие сотни или даже тысячи экземпляров и распространили их по всей Германии. Другими шестью протестующими были братья-германисты Вильгельм и Якоб Гримм (знаменитые писатели и сказочники народных сказок, известные как Братья Гримм), юрист Вильгельм Эдуард Альбрехт, историк Георг Готфрид Гервинус, физик Вильгельм Эдуард Вебер и богослов и востоковед Генрих Георг Август Эвальд. Массовый протест вынудил короля принять меры, и семь непокорных профессоров были допрошены в университетском суде."
 academics.3102.g: "Их следует сместить с должностей и изгнать!"
 academics.3102.h: "Уступить их требованиям, пока ситуация не обострилась."
 academics.3103.d: "После восшествия королевы Виктории на престол в Соединенном Королевстве было немного грустно из-за разрыва личной унии с Ганновером, которая длилась более 120 лет. Но после последних событий в Германии вы можете с уверенностью сказать: хорошо, что наши пути разошлись."
 academics.3103.f: "Всего через несколько месяцев после вступления нового короля на престол Ганновер отменил конституцию, принятую при британском правлении. Новый король Эрнест Август столкнулся с противодействием со стороны ученых. Об этом споре уже говорят по всей Германии. Воистину, как только страна покидает благотворную британскую сферу влияния, она впадает в варварство."
 academics.3103.g: "Так хорошо быть британцем."
 academics.3104.d: "Государства Германской конфедерации потрясены конфликтом между королем Ганновера и семью непокорными профессорами: после того, как король Эрнест Август отменил конституцию, \"Геттингенская семерка\" восстала против него. Они потеряли свои позиции, но завоевали много симпатий в либеральном немецком лагере."
 academics.3104.f: "Историк и политик Фридрих Кристоф Дальманн выступил против планов Эрнеста изменить конституцию по своему усмотрению, поскольку сам Дальманн внес свой вклад в ее разработку. Шесть других известных профессоров Геттингенского университета присоединились к протесту и выступили в защиту конституции 1833 года. Другими шестью протестующими были братья-германисты Вильгельм и Якоб Гримм (знаменитые писатели и сказочники народных сказок, известные как Братья Гримм), юрист Вильгельм Эдуард Альбрехт, историк Георг Готфрид Гервинус, физик Вильгельм Эдуард Вебер и богослов и востоковед Генрих Георг Август Эвальд. Прямые последствия акции протеста были ограниченными, но общественный резонанс и интерес средств массовой информации в Германии и большей части Европы были высокими, и \"семерка\" пользовалась популярностью у широкой публики."
 academics.3104.g: "При всём уважении, король зашёл слишком далеко."
 academics.3104.h: "Эта учёная чернь получила заслуженное наказание."
 academics.3105.t: "Жаркие дебаты о Ганновере"
 academics.3105.d: "Конфликт с \"Гёттингенской семёркой\" не остался незамеченным в других государствах Германской конфедерации. Даже в Великобритании люди раздражены тем, что король отменил конституцию."
 academics.3105.f: "[SCOPE.sCountry('academics_anti_hanover_country').GetName] — одно из многочисленных немецких государств, которые критиковали действия Эрнста Августа. Но всё ещё есть страны, особенно с авторитарным правлением, которые проявили понимание к процессу. К ним относится [SCOPE.sCountry('academics_pro_hanover_country').GetName]."
 academics.3105.g: "Это не их дело!"
 academics.3106.t: "Студенческая пропаганда"
 academics.3106.d: "Несмотря на все усилия государства по предотвращению распространения пропаганды в пользу \"Геттингенской семерки\", либеральным студенческим кругам удалось массово распространять листовки в крупных городах."
 academics.3106.f: "Помните наших героев! Помните Геттингенскую семерку! Восхваляйте их добродетели! Когда профессор Дальман опубликовал свои документы против короля Ганновера, они получили широкую поддержку немецких студентов и либералов. Это имело огромное влияние на государства Германской конфедерации. Студенты Геттингенского университета изготовили многие сотни или даже тысячи экземпляров и распространили их по всей Германии."
 academics.3106.g: "Это бунтующее студенческое отродье!"
 academics.3107.t: "Якоб Гримм в [ROOT.GetCountry.GetNameNoFlag]"
 academics.3107.d: "После изгнания из Ганновера известный немецкий ученый и юрист Якоб Гримм ищет новый дом. Наши симпатии к \"Гёттингенской семёрке\" передались и ему, поэтому он надеется на новую работу."
 academics.3107.f: "Якоб Людвиг Карл Гримм был немецким писателем, лингвистом, филологом, юристом и фольклористом. Он сформулировал лингвистический закон братьев Гримм и был соавтором \"Немецкого вестника\", автором \"Немецкой мифологии\" и редактором \"Сказок братьев Гримм\". Он был старшим братом Вильгельма Гримма; вместе они составляли литературный дуэт, известный как \"Братья Гримм\"."
 academics.3107.g: "Приветствуем его."
 academics.3107.h: "Нам не нужен ещё один чудаковатый учёный."
 academics.3108.t: "Вильгельм Эдуард Вебер в [ROOT.GetCountry.GetNameNoFlag]"
 academics.3108.d: "После изгнания из Ганновера знаменитый физик Вильгельм Эдуард Вебер ищет новый дом. Наши симпатии к \"Гёттингенской семёрке\" передались и ему, поэтому он надеется на новую работу."
 academics.3108.f: "Вильгельм Эдуард Вебер был немецким физиком и вместе с Карлом Фридрихом Гауссом изобрел первый электромагнитный телеграф."
 academics.3111.t: "Немецкий словарь братьев Гримм"
 academics.3111.d: "Братья Якоб и Вильгельм Гримм представили первый том словаря немецкого языка, который призван охватить весь словарный запас немецкого языка. Это непростая задача, но она еще больше сближает немецкую культурную нацию."
 academics.3111.f: "Das Deutsche Wörterbuch (Словарь немецкого языка) - один из важнейших словарей немецкого языка. Он предназначен для немецкого языка так же, как Оксфордский словарь английского языка для английского языка, и содержит подробную историческую информацию о происхождении и употреблении немецких слов с течением времени, с примерами, взятыми из реальных документов. На немецком языке словарь также известен как \"Der Grimm\". Он был создан братьями Гримм в 1838 году. Первоначально предполагалось, что проект займет десять лет и будет выпущен в 6 или 7 томах. На самом деле первый том был опубликован только в 1854 году. Вильгельм Гримм умер в 1859 году, а Якоб - в 1863-м, работая над записью для \"Frucht\" (фрукты). После их смерти к работе над словарем были привлечены многочисленные учреждения, в том числе Прусская академия наук и Берлинская академия наук, а также центр в Геттингене. Окончательно завершенный в 1961 году словарь будет состоять из 32 томов и включать около 350 000 основных статей. \"Гримм\" был не только научным, но и народным произведением."
 academics.3111.g: "Это должно быть опубликовано в каждом немецком государстве!"
 academics.3112.g: "Я надеялся, они сделают новую книгу сказок вместо этого..."
 academics.3113.t: "Первый День Германистов во Франкфурте"
 academics.3113.d: "Несколько немецких интеллектуалов пригласили своих единомышленников на конференцию во Франкфурте, посвященную \"Дню германистов\". Хотя многие хотят видеть в этом мероприятии просто культурное событие, политический посыл не менее очевиден."
 academics.3113.f: "Вопреки тому, что следует из названия, \"дни германистов\" были мероприятием не только для них. Они были инициированы учеными немецких университетов в рамках развития немецкого национального самосознания. В отличие от сегодняшнего дня, в Вормарце термин \"германистика\" имел более широкое значение: он объединял историков, юристов, лингвистов и литературоведов, которые занимались немецкой историей, немецким правом и немецким языком. На первом Дне германистов, организованном во Франкфурте в 1846 году тюбингенским юристом Августом Людвигом Рейшером, Фридрих Кристоф Дальман, Георг Вайц и Иоганн Густав Дройзен говорили о неделимости Шлезвиг-Гольштейна. Якоб Гримм говорил о \"ценности точных наук\", его брат Вильгельм - о словаре немецкого языка. Конференции проходили в Музее Ремера во Франкфурте. В 1847 году в Любеке состоялся второй День германистов. Третий день германистов, который должен был состояться в Нюрнберге в 1848 году, не состоялся из-за Мартовской революции."
 academics.3113.g: "Германия — это культурная нация."
 academics.3113.h: "Их либеральные идеалы служат руководством для нас."
 academics.3115.t: "Спор о коленопреклонении"
 academics.3115.d: "В результате аннексий окрестных земель в эпоху Наполеона Бавария получила обширные территории, которые были протестантскими. В это время король проводил более терпимую политику по отношению к своим подданным. Примером может служить указ, согласно которому солдаты-протестанты не должны преклонять колени перед католической мессой или процессией. Однако министр Карл фон Абель предложил изменить это."
 academics.3115.f: "Так называемый спор о преклонении колен произошел в королевстве Бавария в первой половине XIX века. Все началось с указа баварского министра Карла фон Абеля, который также обязывал солдат-протестантов преклонять колени перед Святыми Дарами во время военных служб. Этот указ стал известен как \"Декрет о коленопреклонении\". Это привело к ожесточенным спорам в Палате депутатов, которые продолжались несколько лет."
 academics.3115.g: "Мы католическая страна, и здесь преклоняют колени!"
 academics.3115.h: "Но как же наши протестантские соотечественники?"
 mr_is_special_character_tt: "#default_text [concept_character] является #V особым персонажем#! (например, [concept_tesla_engineer]).#!"
 academics.2004.f: "Уважаемый д-р [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]\n\n Мы очень надеемся, что вы сможете создать новую звездную карту с большим количеством новых звезд. Судя по вашим отличным навыкам, это не должно стать проблемой. Поэтому мы ожидаем, что в течение 10 лет вы получите отличную новую звездную карту.\n\nПодписано, Ваши коллеги из [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.1.d: "После проведения десятилетий [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis] жизни, проектируя и строя мосты, механизмы и здания, [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] теперь выходит на пенсию. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] больше не будет активен в качестве нашего [concept_tesla_engineer]."
 academics.1.g: "[SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] заслужил [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis] пенсию!"
 academics.2.d: "После проведения десятилетий [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis] жизни, открывая новые звёзды, туманности и другие астрономические явления, [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] принимает решение выйти на пенсию. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] больше не будет работать нашим [concept_verrier_astronomer]."
 academics.2.f: "[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetCustom('verrier_astronomer_achievements_switch_to_character_scope_type')]"
 academics.6.d: "После проведения десятилетий [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis] жизни, открывая новые [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')], растения и другие формы жизни, [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] принимает решение выйти на пенсию. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] больше не будет работать нашим [concept_dubois_naturalist]."
 academics.7.d: "После проведения десятилетий [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis] жизни, открывая новые окаменелости, восстанавливая динозавров и другие вымершие виды, [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] решает выйти на пенсию. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] больше не будет работать нашим [concept_dubois_paleontologist]."
 academics.7.f: "[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetCustom('dubois_paleontologist_achievements_switch_to_character_scope_type')]"
 academics.9.d: "После проведения десятилетий [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis] жизни, открывая реликвии древних цивилизаций, [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] принимает решение выйти на пенсию. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] больше не будет работать нашим [concept_lepsius_archaeologist]."
 academics.10.d: "После проведения десятилетий [SCOPE.sCharacter('academics_retired_person_scope').GetHerHis] жизни, открывая реликвии доисторических людей, [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] решает выйти на пенсию. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] больше не будет работать нашим [concept_lepsius_anthropologist]."
 academics.116.g: "Подарить [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] кнут!"
 academics_gentlewoman_loc: "леди"
