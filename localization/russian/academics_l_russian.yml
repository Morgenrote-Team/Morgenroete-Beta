 academics.103.t: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] теперь известный астрономом"
 academics.103.d: "Работа в обсерватории и опубликованные труды сделали нашего [Concept('concept_verrier_astronomer', 'астронома')], профессора [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName], знаменитым в мире астрономии!"
 academics.103.f: ""
 academics.103.g: "Настоящая звезда!"
 academics.110.t: "[ROOT.Var('dubois_naturalist_var').GetCharacter.GetFullName] теперь опытный натуралист"
 academics.110.d: "Спустя годы самоотверженного труда наш [Concept('concept_dubois_naturalist', 'натуралист')], профессор [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] заслуженно признан опытным учёным!"
 academics.110.f: ""
 academics.110.g: "Скачок в развитии!"
 academics.111.t: "[ROOT.Var('dubois_naturalist_var').GetCharacter.GetFullName] теперь известный натуралист"
 academics.111.d: "После многих лет работы и учёбы, наш [Concept('concept_dubois_naturalist', 'натуралист')], профессор [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] стал широко известен благодаря своей работе!"
 academics.111.f: ""
 academics.111.g: "Сверхнатуралист!"
 academics.112.t: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] теперь опытный палеонтолог"
 academics.112.d: "Спустя годы самоотверженного труда наш [Concept('concept_dubois_paleontologist', 'палеонтолог')], профессор [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] заслуженно признан опытным учёным!"
 academics.112.f: ""
 academics.112.g: "Восхитительно!"
 academics.113.t: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] теперь — известный палеонтолог"
 academics.113.d: "После долгого и кропотливого поиска, изучения окаменелостей и костей динозавров, наш [Concept('concept_dubois_paleontologist', 'палеонтолог')], профессор [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] стал известной фигурой в мире палеонтологии!"
 academics.113.f: ""
 academics.113.g: "Устоит ли слава профессора также долго, как кости динозавров?"
 academics.116.t: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] теперь опытный специалист"
 academics.116.d: "После многих лет работы и учёбы, наш [Concept('concept_lepsius_archaeologist', 'археолог')], профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] теперь — опытный специалист!"
 academics.116.f: ""
 academics.117.t: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] теперь — известный археолог"
 academics.117.d: "После долгого и кропотливого поиска и изучения артефактов ушедших цивилизаций, наш [Concept('concept_lepsius_archaeologist', 'археолог')], профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] стал известной фигурой в мире археологии!"
 academics.117.f: ""
 academics.117.g: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] теперь нуждается в шляпе-федоре!"
 academics.118.t: "[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetFullName] теперь — известный антрополог"
 academics.118.d: "После многих лет работы и учёбы, наш [Concept('concept_lepsius_anthropologist', 'антрополог')], профессор [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetLastName] теперь — опытный специалист!"
 academics.118.f: ""
 academics.118.g: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetSheHe] эволюционировал!"
 academics.119.t: "[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetFullName] теперь — известный антрополог"
 academics.119.d: "После долгого и кропотливого поиска и изучения артефактов первобытных людей, [Concept('concept_lepsius_anthropologist', 'антрополог')], профессор [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetLastName] стал известной фигурой в мире антропологии!"
 academics.119.f: ""
 academics.119.g: "Новый вид человека!"
 academics.108.t: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] теперь — опытный геолог"
 academics.108.d: "После многих лет копания, бурения, дробления и изучения камней, [Concept('concept_agassiz_geologist', 'геолог')], профессор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] теперь — опытный специалист!"
 academics.108.f: ""
 academics.108.g: "Закопаться можно!"
 academics.109.t: "[ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] теперь — известный геолог"
 academics.109.d: "Проведя больше времени с камнями, чем с людьми, [Concept('concept_agassiz_geologist', 'геолог')], профессор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] стал известной фигурой в мире геологии!"
 academics.109.f: ""
 academics.109.g: "Настоящая Rock-звезда!"
 academics.140.t: "Наш инженер, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], стал инженером-строителем"
 academics.140.d: "Годы работы в гражданском строительстве окупились. После постройки множества мостов и туннелей доктора [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] теперь считают настоящим [concept_tesla_civil_engineer]. Это несомненно ускорит его проекты!"
 academics.140.f: ""
 academics.140.g: "Инженер нашего будущего!"
 academics.141.t: "Наш инженер, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], стал инженером-механиком"
 academics.141.d: "Годы работы с машинами окупились. Многочисленные изобретения и новые машины, созданные доктором [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName], наконец позволили стать настоящим [concept_tesla_mechanical_engineer]. Мы надеемся на ещё более удивительные проекты!"
 academics.141.f: ""
 academics.141.g: "Настоящий двигатель прогресса!"
 academics.142.t: "Наш инженер, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], стал военным инженером"
 academics.142.d: "Годы работы на военных окупились. После многих лет строительства фортификаций, создания нового оружия и экипировки наших солдат доктора [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] теперь считают настоящим [concept_tesla_military_engineer]. Надеемся на продолжение служения нашей нации!"
 academics.142.f: ""
 academics.142.g: "Строитель фундамента нашей армии!"
 academics.143.t: "Наш инженер, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], стал электротехником"
 academics.143.d: "Укрощение силы электричества всегда было мечтой доктора [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName]. После многих прорывов в этой области [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] теперь считается [concept_tesla_electrical_engineer]."
 academics.143.f: ""
 academics.143.g: "Искра знаний!"
 academics.144.t: "Наш инженер, [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], стал авиаинженером"
 academics.144.d: "Долгое время люди мечтали летать. Теперь, когда началась эра полётов, доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] находится на переднем крае авиационной инженерии. После многих прорывов в этой области [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] теперь считается [concept_tesla_aeronautical_engineer]."
 academics.144.f: ""
 academics.144.g: "К небесам!"
 notification_academics_yearly_experience_gain_notification_name: "Ежегодное повышение квалификации академиков"
 notification_academics_yearly_experience_gain_notification_desc: "Каждый академик, способный получать опыт, получил #p 5#! опыта."
 academics.1000.t: "Профессор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] запрашивает финансирование"
 academics.1000.d: "Наш [concept_tesla_engineer], доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetFullName], выражает недовольство финансированием [ROOT.Var('tesla_engineer_var').GetCharacter.GetHerHis] отдела. [ROOT.Var('tesla_engineer_var').GetCharacter.GetSheHe] запрашивает существенно больше средств для [ROOT.Var('tesla_engineer_var').GetCharacter.GetHerHis] исследований."
 academics.1000.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')] Я провожу реальные научные исследования! \nМой отдел заслуживает большего финансирования — проект, над которым я работаю, способен изменить мир!\n [SCOPE.GetRootScope.GetCountry.GetCustom('academics_engineer_focus_custom_loc')] \n\nДля этого нам необходимы дополнительные средства! "
 academics.1000.g: "Профинансируем их исследования!"
 academics.1000.h: "Кого волнуют какие-то инженеры?"
 academics_additional_funding_engineer_modifier: "Дополнительное финансирование для инженеров"
 academics_no_funding_engineer_modifier: "Инженеры остались без финансирования"
 dubois_humanities_receive_promotion_loc: "Расхитители гробниц и некрофилы не приносят нашему обществу никакой пользы!"
 dubois_natural_history_receive_promotion_loc: "Почему все финансирование достается коллекционерам бабочек и создателям монстров, а нам приходится довольствоваться лишь остатками?"
 dubois_mathematics_receive_promotion_loc: "Это полный идиотизм, что безумные изобретатели и звездочёты получают всё, о чём только помыслят, в то время как нам приходится довольствоваться крошками со стола!"
 academics_engineer_focus_atmospheric_engine_loc: "Мы стремимся овладеть силой пара, чтобы заменить рабочих машинами. Это сделает добычу ресурсов и производство товаров гораздо дешевле!"
 academics_engineer_focus_computer_loc: "Мы пытаемся создать машину, способную выполнять всевозможные вычисления. Это сделает профессию счетовода ненужной. Мы могли бы вычислять всё с наивысшей точностью и без малейших ошибок!"
 academics_engineer_focus_washing_machine_loc: "Наша цель — создать машину, способную стирать бельё без участия человека. Это произведёт настоящую революцию в обществе, ведь нам не придётся тратить время и силы на стирку своей грязной одежды!"
 academics_engineer_focus_lighter_loc: "Представляете, насколько полезной может быть маленькая карманная зажигалка? Такая, которая создаёт большое пламя и может зажигать свечи или сигареты? Это же целое состояние, которое только и ждет своего часа!"
 academics_engineer_focus_rocket_loc: "Мы хотим создать ракету, способную достичь космоса. Только представьте себе военное применение такой ракеты. Вы сможете поразить врагов, а они не смогут противостоять этому!"
 academics_engineer_focus_telephone_loc: "Представьте себе устройство, с помощью которого можно общаться с людьми на огромных расстояниях! Именно над таким прибором мы сейчас работаем в нашей лаборатории!"
 academics_engineer_focus_combustion_engine_loc: "Поезда удобны, но велики и требуют рельсов. Что если создать небольшой мотор, способный приводить в движение лёгкое транспортное средство? Тогда каждый мог бы путешествовать куда угодно. У такого мотора множество полезных применений. Именно над этим сейчас работает моя команда!"
 academics_engineer_focus_basic_research_alloys_loc: "Мы проводим фундаментальные исследования с целью обнаружить как можно больше полезных сплавов. Найдя подходящие по характеристикам сплавы, мы сможем создавать более прочные конструкции, более эффективные машины и приборы, которые ныне кажутся невозможными!"
 academics_engineer_focus_basic_research_factory_machinery_loc: "Моя команда работает над совершенствованием машин и станков, применяемых на фабриках. Это способно привести к значительному росту производства и богатства нашего государства!"
 academics_engineer_focus_basic_research_housing_loc: "Мы ищем наиболее эффективный способ строительства домов, позволяющий экономить жилую площадь. Это может помочь населению улучшить жилищные условия и будет способствовать развитию строительного сектора."
 academics_engineer_focus_basic_research_urban_planing_loc: "Наши города недостаточно эффективны. Поэтому мы должны найти способ сделать их ещё эффективнее, чтобы повысить уровень жизни наших людей!"
 academics.1001.t: "Профессор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] запрашивает финансирование"
 academics.1001.d: "Наш [Concept('concept_verrier_astronomer', 'астроном')], профессор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName], требует значительно большего финансирования для своей обсерватории. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] утверждает, что без дополнительных средств его команда не сможет открывать новые [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]."
 academics.1001.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')] Наша работа имеет решающее значение для раскрытия тайн пространства и времени. Мы могли бы открыть столько великих вещей, если бы лишь имели достаточное финансирование! \nНам нужен современный телескоп, который позволит нам опередить все другие страны в исследовании неба! Речь идет о престиже нашего государства!"
 academics.1001.g: "Выделите средства на новый телескоп!"
 academics.1001.h: "И что дальше? Они больше не смогут открывать новые звёзды?"
 academics_additional_funding_astronomer_modifier: "Дополнительное финансирование для астрономов"
 academics_no_funding_astronomer_modifier: "Астрономы остались без финансирования"
 academics.1002.t: "Профессор [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] запрашивает финансирование"
 academics.1002.d: "Наш [Concept('concept_dubois_naturalist', 'натуралист')], [ROOT.Var('dubois_naturalist_var').GetCharacter.GetFullName], стремится провести исследовательскую экспедицию в дикий, отдалённый уголок мира, полный неизвестных растений и животных. В таком удивительном месте, [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] надеется открыть множество новых видов!"
 academics.1002.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')] Я, очень хочу обнаружить все виды, обитающие на нашей Земле! Это может оказаться крайне важным в будущем, ведь никогда не знаешь, чем могут пригодиться новые виды и их особенности. И представьте только — я даже смогу назвать новое животное или растение в вашу честь! Разве это не замечательно? \nМне просто нужно достаточно средств для проведения этой экспедиции."
 academics.1002.g: "Профинансируем их экспедицию!"
 academics.1002.h: "У нас дома уже достаточно биологических видов..."
 academics_additional_funding_naturalist_modifier: "Дополнительное финансирование для натуралистов"
 academics_no_funding_naturalist_modifier: "Натуралисты остались без финансирования"
 academics.1003.t: "Профессор [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] запрашивает финансирование"
 academics.1003.d: "Наш [Concept('concept_dubois_paleontologist', 'палеонтолог')], [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] остро нуждается в средствах для своего музея динозавров. Это позволит ему выставлять больше [Concept('concept_dubois_dinosaur_skeleton','скелетов динозавров')] и [Concept('concept_dubois_fossil','окаменелостей')], внося вклад в славу нашей страны."
 academics.1003.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')] \nВсё это время у меня есть престижный музей, который я едва могу себе позволить. Эти динозавры — величайшее чудо мира, а они просто пылятся на складе! \nЕсли бы у меня были адекватные средства, я мог бы расширить музей и украсить его новыми диковинными ящерами. Это была бы фантастическая коллекция, которая привлекла бы тысячи туристов и исследователей в нашу страну! \nБез финансирования мне придётся сокращать штат ассистентов, и кто знает, смогу ли я без их помощи понять, где у динозавров голова!"
 academics.1003.g: "Профинансируем музей!"
 academics.1003.h: "Очередной безумный палеонтолог хочет финансирование на «Парк Юрского периода» или что-то подобное? Нет!"
 academics_additional_funding_paleontologist_modifier: "Дополнительное финансирование для палеонтологов"
 academics_no_funding_paleontologist_modifier: "Палеонтологи остались без финансирования"
 academics.1004.t: "Профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] запрашивает финансирование"
 academics.1004.d: "Наш [Concept('concept_lepsius_archaeologist', 'археолог')], [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName], остро нуждается в финансировании для организации дальнейших экспедиций и раскопок. Только так наша страна сможет не отставать от других держав."
 academics.1004.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')] \nВсе другие страны ежедневно отправляют новые экспедиции по всему миру и присваивают археологические сокровища, в то время как наш музей пустует. Это недопустимо!\nМоим командам срочно нужны средства, чтобы не отставать. А что если мы упустим гробницу какого нибудь фараона только потому, что у нас не хватило денег? Представьте себе: наши соперники празднуют успех на весь мир, а мы остаёмся у разбитого корыта!"
 academics.1004.g: "Предоставим им больше средств!"
 academics.1004.h: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]требует финансирования лишь для того, чтобы поддерживать свой богемный образ жизни!"
 academics_additional_funding_archaeologist_modifier: "Дополнительное финансирование для археологов"
 academics_no_funding_archaeologist_modifier: "Археологи остались без финансирования"
 academics.1005.t: "Профессор [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetLastName] запрашивает финансирование"
 academics.1005.d: "Наш [Concept('concept_lepsius_anthropologist', 'антрополог')], [ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetFullName], остро нуждается в финансировании для организации дальнейших экспедиций и раскопок. Только так наша страна сможет не отставать от других держав."
 academics.1005.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_receiver_of_funding_custom_loc')]\nВсе остальные страны сосредоточены на поиске недостающего звена нашей эволюции, в то время как у нас есть только скучные средневековые кости...Это неприемлемо!\nМоим командам срочно нужны средства, чтобы не отставать от других исследователей. Только представьте: кости первобытного человека лежат у нас под ногами, а потом их уничтожают какие-то безразличные рабочие. Если мы не получим финансирования, у нас не будет шанса найти эти окаменелости! Что, если наши конкуренты найдут самого раннего предка человека и докажут, что их страна является родиной всего человечества?"
 academics.1005.g: "Предоставим им больше средств!"
 academics.1005.h: "[ROOT.Var('lepsius_anthropologist_var').GetCharacter.GetSheHe] хочет подделать первобытный череп, чтобы прославиться!"
 academics_additional_funding_anthropologist_modifier: "Дополнительное финансирование для антропологов"
 academics_no_funding_anthropologist_modifier: "Антропологи остались без финансирования"
 academics.2001.t: "Организация [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] просит нас сосредоточиться на наблюдении за небесами"
 academics.2001.d: "Наша страна пока не располагает значительными астрономическими исследованиями, у нас даже отсутствует главный [Concept('concept_verrier_astronomer', 'астроном')]. Поэтому организация [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] поручает нам составить новый звёздный каталог и назначить главного астронома."
 academics.2001.f: "Организация [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] просит вас усилить внимание астрономии. Такой акцент позволит нам обрести новые знания о небе и вселенной.\n Следовательно, мы просим вас, во‑первых, составить новый, обновлённый звёздный каталог, а во‑вторых, назначить главного астронома. \n\n С уважением, высший совет организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2001.g: "К звёздам!"
 academics.2001.h: "Звёзды? У нас есть дела и поважнее!"
 academics_unhappy_intelligentsia: "Научное общество недовольно"
 academics.2001_goal_tt: "Вам предстоит открыть #p 75#![Concept('concept_verrier_astronomical_object','астрономических объектов')] и получить [Concept('concept_verrier_astronomer', 'астронома')] за #n 10#!лет."
 academics.2001_reward_tt: "В награду ваш астроном получит #p 15 опыта#!, дополнительно Интеллигенты получат #p 5 одобрения#!, а стоимость производственных технологий будет снижена на #p 5%#! в течение 3 лет."
 je_academics_find_more_stars: "Фокус на астрономии: Звёздный каталог"
 je_academics_find_more_stars_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] желает, чтобы мы открыли [JournalEntry.GetGoalAddValue] новых [Concept('concept_verrier_astronomical_object','астрономических объектов)] для составления нового звёздного каталога и назначения на должность [Concept('concept_verrier_astronomer', 'астронома')]. \n\nДо сих пор мы обнаружили [JournalEntry.GetGoalProgressValue] #b астрономических объектов#!."
 je_academics_find_more_stars_success: "Откройте#p 75#! новых#b астрономических объектов#!"
 je_academics_find_more_stars_event_tt: "Наш новый [Concept('concept_verrier_astronomer', 'астроном')] представит новый звёздный каталог"
 je_academics_find_more_stars_goal: ""
 academics.2002.t: "Профессор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] представляет новый звёздный каталог"
 academics.2002.d: "Нам удалось составить новый звёздный каталог и найти нового главного [Concept('concept_verrier_astronomer', 'астронома')]. Совет учёных организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] будет доволен!"
 academics.2002.f: "«Этот новый звёздный каталог чрезвычайно точен! Я сравнил его с каталогами других стран, и наш очевидно превосходит их. Более того, мы открыли множество новых звёзд, некоторые из которых весьма удивительный! Вот, например, эта испускает больше красного света, чем остальные.»"
 academics.2002.g: "Ура!"
 academics_scientific_society_happy: "Научное сообщество счастливо"
 academics.2003.t: "Наш фокус на астрономии потерпел неудачу!"
 academics.2003.d: "Нам не удалось сосредоточить достаточно усилий на астрономии, чтобы достичь целей, поставленных перед нами организацией [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]. Совет будет недоволен!"
 academics.2003.f: "«Похоже, что война, экономика и даже вино с водкой важнее для наших чиновников, чем наука. Мы разочарованы. Надеемся, что взор нашей великой нашей нации вскоре снова обратится к науке!»"
 academics.2003.g: "Какая досада!"
 academics.2004.t: "Организация [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] запрашивает новый звёздный каталог у нашего [Concept('concept_verrier_astronomer', 'астронома')]"
 academics.2004.d: "Согласно заявлению организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], нашей нации необходимо сосредоточить усилия на исследовании неба. Они поручили такому большому специалисту, как профессор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] обнаружить новые звёзды и другие [Concept('concept_verrier_astronomical_object','астрономические объекты')], после чего составить новый звёздный каталог."
 academics.2004_goal_tt: "Вам предстоит открыть #p 100#! [Concept('concept_verrier_astronomical_object','астрономических объектов')] в течение #n 10#! лет"
 academics.2004_reward_tt: "В награду ваш астроном получит #p 25 опыта#!, дополнительно Интеллигенты получат #p 5 одобрения#!, а стоимость производственных технологий будет снижена на #p 5%#! в течение 3 лет."
 je_academics_create_star_chart: "Фокус на астрономии: Звёздный каталог нашего астронома"
 je_academics_create_star_chart_reason: "Организация [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы наш [Concept('concept_verrier_astronomer', 'астроном')] открыл [JournalEntry.GetGoalAddValue] новых [Concept('concept_verrier_astronomical_object','астрономических объектов')] для составления нового звёздного каталога.\n\nНа данный момент мы нашли [JournalEntry.GetGoalProgressValue] #b астрономических объектов#!."
 je_academics_create_star_chart_success: "Откройте #p 100#! новых #b астрономических объектов#!"
 je_academics_create_star_chart_event_tt: "Наш [Concept('concept_verrier_astronomer', 'астроном')] представит новый звёздный каталог"
 je_academics_create_star_chart_event_without_astronomer_tt: "Наш новый звёздный каталог будет опубликован."
 je_academics_create_star_chart_failed_event_tt: "Наш [Concept('concept_verrier_astronomer', 'астроном')] не смог предоставить новый звёздный каталог."
 je_academics_create_star_chart_failed_event_without_astronomer_tt: "После утраты [Concept('concept_verrier_astronomer', 'астронома')] мы не сможем предоставить звёздный каталог."
 je_academics_create_star_chart_goal: ""
 academics.2005.t: "Профессор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] представляет новый звёздный каталог"
 academics.2005.f: "Профессор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] был окружён своими коллегами, когда они подняли тост за друг друга.\n\n «Дорогой друг, мы знали, что ты легко справишься с этим. Твой новый звёздный каталог — это нечто исключительное! Настоящий шедевр!»"
 academics.2006.t: "Профессор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] потерпел неудачу!"
 academics.2006.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] не смог создать новый звёздный каталог. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] не смог найти достаточное количество звёзд и других [Concept('concept_verrier_astronomical_object','астрономических объектов')] чтобы оно стоило того. Организация [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] крайне разочарована неудачей такого именитого учёного."
 academics.2006.f: "Дорогой [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFirstName],\n\n Мы заметили, что вы так и не смогли представить новый звёздный каталог, что вновь подтверждает, ваше безответственное отношение к науке. К сожалению, это явно отразится негативно на нашем Обществе. Мы ожидаем от вас гораздо большего в будущем, не подведите!\n\n [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2006.g: "Какая досада!"
 academics.2007.t: "Новый звёздный каталог"
 academics.2007.d: "К сожалению, новый звёздный каталог был представлен организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] в отсутствие нашего бывшего именитого астронома. Тем не менее, академики, похоже, весьма довольны новым каталогом."
 academics.2007.f: "«Благодаря этому новому звёздному каталогу мы сможем ещё лучше изучать небо! Надеемся, что найдём много новых откровений о том, как эти небесные тела движутся!\nЭто стало возможным только благодаря усилиям совета организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]. Тост за нас, господа!»"
 academics.2008.t: "Нет астронома — нет звёздного каталога"
 academics.2008.d: "Потеря нашего [Concept('concept_verrier_astronomer', 'астронома')] привела к меньшему числу открытий звёзд и других небесных тел, чем мы ожидали. Поэтому нам не удалось найти достаточно, чтобы создать новый звёздный каталог. Организация [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] недовольна результатом!"
 academics.2008.f: "«Наше правительство потеряло не только выдающегося главного астронома, но и не смогло должным образом поддержать остальных наших астрономов в их исследованиях. Это привело к значительно меньшему количеству наблюдений. Это значит, что мы отстанем в астрономических исследованиях. Это просто отвратительно!»"
 academics.2009.t: "Нам нужно найти больше звёзд, чем [SCOPE.sCountry('rival_scope').GetName]"
 academics.2009.d: "Члены организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] недовольны тем, что страна [SCOPE.sCountry('rival_scope').GetName] открыла больше [Concept('concept_verrier_astronomical_object','астрономических объектов')], чем наша страна. Они просят нас найти больше #b астрономических объектов#!, в целом чем [SCOPE.sCountry('rival_scope').GetName], в течение 10 лет."
 academics.2009.f: "Как же стыдно, что такая незначительная страна, как [SCOPE.sCountry('rival_scope').GetName] , открыла больше астрономических объектов, чем мы. Мы должны как можно скорее обогнать этих дикарей-любителей астрономии и найти больше астрономических объектов, чем они! \n\n С уважением, члены высшего совета организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2009_goal_tt: "Вам предстоит открыть больше [Concept('concept_verrier_astronomical_object','астрономических объектов')] чем ваш соперник, [SCOPE.sCountry('rival_scope').GetName], за #n 10#! лет. У них сейчас [GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+], а у нас [GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]."
 academics.2009_reward_tt: "В качестве награды Интеллигенты получат #p 5 одобрения#!, а вы получите прирост в #p 10%#! престижа на 4 года."
 academics.2009.g: "Давайте обгоним их!"
 academics.2009.h: "Это не космическая гонка..."
 academics_no_competition_with_rival: "Упустили гонку за звёздами..."
 academics_competition_with_rival_won: "Выиграли гонку за звёздами!"
 je_academics_rivalry_for_stars: "Фокус на астрономии: Гонка за звёздами"
 je_academics_rivalry_for_stars_reason: "Организация [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]хочет, чтобы мы нашли больше [Concept('concept_verrier_astronomical_object','астрономических объектов')], чем наш соперник - [SCOPE.sCountry('target').GetName].\n\nНаши #b астрономические объекты#!:[ROOT.Var('verrier_astronomical_objects').GetValue|0+]\n#b Астрономические объекты#! страны [SCOPE.sCountry('target').GetName]: [ROOT.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+]"
 je_academics_rivalry_for_stars_success: "Вы ([GetPlayer.MakeScope.Var('verrier_astronomical_objects').GetValue|0+]) имеете больше [Concept('concept_verrier_astronomical_object','астрономических объектов')], чем [SCOPE.sCountry('target').GetName]([GetPlayer.MakeScope.Var('je_rival_nation_var').GetVariable('verrier_astronomical_objects').GetValue|0+])."
 academics.2010.t: "Мы выиграли гонку за звёздами!"
 academics.2010.d_rival: "Мы открыли больше астрономических объектов, чем [ROOT.Var('je_rival_nation_var').GetCountry.GetName]. Организация [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] и наше население в восторге от этой победы нашего государства!"
 academics.2010.d_rival_gone: "Наш соперник в гонке за звёздами выбыл из неё. Организация [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] и наше население в восторге от этой победы нашего государства!"
 academics.2010.f: "Мы, члены высшего совета организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], очень довольны научной победой над нашим общим соперником. Их \"учёные\" доказали, что застряли в каменном веке и не способны открыть больше астрономических объектов, чем мы. Это великий день для нашей нации!\n\nС уважением, члены высшего совета организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2011.t: "Мы проиграли гонку за звёздами..."
 academics.2011.d: "Нам не удалось найти больше [Concept('concept_verrier_astronomical_object','астрономических объектов')], чем [ROOT.Var('je_rival_nation_var').GetCountry.GetName]. Члены высшего совета организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] абсолютно разочарованы!"
 academics.2011.f: "Этот провал нашей Академии вновь доказывает, что фокус нашего правительства не на науке и научных достижениях. Мы предлагаем прекратить военные действия или планы по мировому завоеванию в пользу науки.\n\n С уважением, члены высшего совета организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2012.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] требует [Concept('concept_verrier_observatory','обсерваторию')]"
 academics.2012.d: "Члены нашего [Concept('concept_academics_scientific_society','научного общества')] требуют, чтобы мы построили современную [Concept('concept_verrier_observatory','обсерваторию')] за 10 лет или раньше. Это позволит нам проводить [Concept('concept_verrier_astronomy','астрономические исследования')] и находить [Concept('concept_verrier_astronomical_object','астрономические объекты')]."
 academics.2012.f: "Будучи гражданами такой великой страны, мы, члены организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], требуем строительства Обсерватории. Без Обсерватории мы никогда не будем на переднем крае науки. Следовательно, Обсерватория — это безусловная необходимость.\n\nС уважением, члены высшего совета организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2012.g: "Мне нужны наши лучшие архитекторы и инженеры прямо сейчас!"
 academics.2012.h: "Кому вообще нужна обсерватория?"
 academics.2012_goal_tt: "Вам предстоит построить [Concept('concept_verrier_observatory','обсерваторию')] за #n 10#! лет."
 academics.2012_reward_tt: "В качестве награды Интеллигенты получат #p 5 одобрения#!, а стоимость технологий производства будет снижена на #p 5%#! на 5 лет. Вы также получите #p 5%#! сторонников среди академиков."
 je_academics_build_observatory: "Фокус на астрономии: Построить обсерваторию"
 je_academics_build_observatory_reason: "Организация [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы мы построили [Concept('concept_verrier_observatory','обсерваторию')]. Для того чтобы построить обсерваторию, нам необходимо иметь хотя бы один университет и либо исследовать #b Современную астрономию#!, либо иметь [Concept('concept_verrier_astronomer', 'астронома')]."
 academics.2013.t: "Новая обсерватория начинает наблюдения"
 academics.2013.d: "Новая [Concept('concept_verrier_observatory','обсерватория')] открыла свои двери и начала наблюдать за небом. Совет учёных организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] доволен... пока что."
 academics.2013.f: "После строительства обсерватории наша страна наконец-то может исследовать ночное небо. Поздравляем! Теперь нас действительно можно считать страной с передовой наукой.\n\nС уважением, члены высшего совета организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2013.g: "Мы раскроем тайны ночного неба!"
 academics.2014.t: "Астрономический провал!"
 academics.2014.d: "Нам не удалось построить [Concept('concept_verrier_observatory','обсерваторию')]. Члены высшего совета организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] глубоко разочарованы!"
 academics.2014.f: "Построить обсерваторию, должно быть, невероятно сложно, раз наша страна не смогла сделать это за 10 лет! За это время мы могли бы открыть новые планеты, сотни звёзд или рассчитать движение множества комет. Но без настоящего телескопа это невозможно. Позорное зрелище.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2014.g: "Во всем виновата комета!"
 academics.2015.t: "Организация [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы мы нашли Планету X"
 academics.2015.d: "Члены [Concept('concept_academics_scientific_society','научного сообщества')] убеждены, что открытие Планеты X станет величайшим научным достижением в этом столетии. Они просят нас сосредоточиться на поиске этой загадочной планеты, прежде чем это сделает кто-либо другой."
 academics.2015.f: "Мы слышали, что другие страны горят желанием найти Планету X. Но этот прорыв принадлежит только нам! Мы должны превзойти всех остальных в этой колоссальной задаче!\n\nС уважением, члены высшего совета организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2015.g: "Сосредоточьте все ресурсы на поиске этой планеты!"
 academics.2015.h: "Планета X? Скорее, планета Y..."
 academics.2015_goal_tt: "Вам предстоит найти #b Планету X#! раньше всех. Чтобы иметь шанс её открыть, нам потребуется [Concept('concept_verrier_astronomer', 'астроном')] и #p 1500#! открытых [Concept('concept_verrier_astronomical_object','астрономических объектов')]."
 academics.2015_reward_tt: "В качестве награды Интеллигенты получат #p 5 одобрения#!, а стоимость технологий производства будет снижена на #p 5%#! на 10 лет. Вы также получите #p 10%#! сторонников среди академиков, а ваш [concept_verrier_astronomer] получит #p 50#! [concept_academics_experience]."
 je_academics_find_planet_x: "Фокус на астрономии: Найти Планету X"
 je_academics_find_planet_x_reason: "Организация [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы мы нашли таинственную #o Планету X#!. Чтобы иметь шанс её открыть, нам потребуется [Concept('concept_verrier_astronomer', 'астроном')] и #p 1500#! открытых [Concept('concept_verrier_astronomical_object','астрономических объектов')]."
 je_academics_find_planet_x_complete_tt: "Откройте #o Планету X#! раньше всех."
 je_academics_find_planet_x_fail_tt: "Кто-то другой открыл #o Планету X#! раньше вас."
 academics.2016.t: "Мы нашли Планету X"
 academics.2016.d: "Мы первыми нашли Планету X! Надеемся, что это порадует совет организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]."
 academics.2016.f: "Письмо было исписано странными формулами и диаграммами. На нём были пятна, похожие на следы от пролившейся жидкости, и, если бы вам пришлось угадать, вы бы поклялись, что на бумаге остались следы икры. Вы не могли перестать размышлять, что же здесь произошло."
 academics.2016.g: "Это самое важное астрономическое открытие века!"
 academics.2017.t: "Мы опоздали в поисках Планеты X"
 academics.2017.d: "Другая нация открыла Планету X раньше нас. Члены совета организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ошарашены этим поражением!"
 academics.2017.f: "Неприемлемо.\n\n Высший совет организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]."
 academics.2017.g: "В любом случае, это не настоящая планета!"
