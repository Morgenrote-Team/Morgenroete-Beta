 country_academics_decorative_natural_history_project_add: "Прогресс реализации проектов по естествознанию"
 country_academics_decorative_natural_history_project_add_desc: "Количество прогресса, которое вы получаете от уровней [GetBuildingType('building_university').GetName] с [concept_pm_academics_university_natural_history] для проектов по естествознанию. К таким проектам относятся: Палеонтологические экспедиции, проекты натуралистов по улучшению жизни, документирование местных животных и  геологические проекты по улучшению жизни."
 country_academics_decorative_animal_breeding_progress_add: "Прогресс в области животноводства"
 country_academics_decorative_animal_breeding_progress_add_desc: "Количество прогресса, которое вы получаете от уровней [GetBuildingType('building_university').GetName] с [concept_pm_academics_university_natural_history] для разведения [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')]."
 country_academics_decorative_mathematical_project_add: "Прогресс выполнения технико-математических проектов"
 country_academics_decorative_mathematical_project_add_desc: "Количество прогресса, которое вы получаете от уровней [GetBuildingType('building_university').GetName] с [concept_pm_academics_university_mathematics] для технико-математических проектов. Эти проекты включают в себя:  проекты [concept_tesla_engineering], проекты [concept_mendelejew_chemist], а также теоретизирование, открытие и изоляцию [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]"
 academics.121.d: "После долгих лет работы в больницах, лабораториях и других учреждениях для спасения жизней, наш [concept_panum_physician] д-р [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] приобретает известность в мире медицины!"
 academics.102.d: "После сотен ночей, проведенных в обсерватории, наблюдения за небом, наш [concept_verrier_astronomer] д-р [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] становится опытным специалистом!"
