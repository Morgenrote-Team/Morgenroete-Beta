 academics.2101_reward_tt: "В качестве награды #p уровень жизни#! среднего класса в каждой области с университетом повысится на один пункт на 5 лет, одобрение #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetCustom('RU_IG_RP')]#!#! вырастет на #p 5 ед.#!, а стоимость производственных технологий будет снижена на #p 5%#! на 3 года."
 academics.2104_reward_tt: "В качестве награды мы будем получать на #p 5% больше престижа#! в течение 5 лет, одобрение #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetCustom('RU_IG_RP')]#!#! вырастет на #p 5 ед.#!, а стоимость производственных технологий будет снижена на #p 5%#! на 3 года. Наш археолог получит #p 15 ед. опыта#!."
 academics.2110_reward_tt: "В качестве награды мы будем получать на #p 5% больше престижа#! в течение 5 лет, одобрение #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetCustom('RU_IG_RP')]#!#! вырастет на #p 5 ед.#!, а стоимость производственных технологий будет снижена на #p 5%#!. Наш археолог получит #p 25 ед. опыта#!."
 academics.2112_reward_tt: "В качестве награды мы будем получать на #p 10% больше престижа#! в течение 5 лет, одобрение #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetCustom('RU_IG_RP')]#!#! вырастет на #p 5 ед.#!, а стоимость производственных технологий будет снижена на #p 5%#!. Уровень жизни нашего народа также повысится на #p 1 ед.#!. Наш археолог получит #p 50 ед. опыта#!"
 academics.2309.t: "Научные амбиции: [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]"
 academics.2309.d: "Профессор [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] считается национальным авторитетом в области палеонтологии. Научное общество хотело бы сделать [SelectLocalization(SCOPE.sCharacter('dubois_paleontologist_scope').IsFemale, 'её', 'его')] всемирно известной личностью, чтобы использовать [SelectLocalization(SCOPE.sCharacter('dubois_paleontologist_scope').IsFemale, 'её', 'его')] в качестве научного символа."
 academics.2309.f: "Мы пришли к твёрдому убеждению, что профессор [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastNameNoFormatting] идеально подходит для того, чтобы представлять нашу страну как научный центр. [SelectLocalization(SCOPE.sCharacter('dubois_paleontologist_scope').IsFemale, 'Она', 'Он')] [SelectLocalization(SCOPE.sCharacter('dubois_paleontologist_scope').IsFemale, 'должна', 'должен')] получить всю возможную поддержку для повышения своей репутации. Это, в частности, побудило бы молодых людей самим делать научную карьеру.\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2309.g: "[SelectLocalization(SCOPE.sCharacter('dubois_paleontologist_scope').IsFemale, 'Она станет знаменитой.', 'Он станет знаменитым.')]"
 academics.2309.h: "Не стоит потакать [SelectLocalization(SCOPE.sCharacter('dubois_paleontologist_scope').IsFemale, 'её', 'его')] мании величия."
 academics.2310.t: "Слава палеонтологии"
 academics.2310.d: "Получив известность как палеонтолог, [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName] теперь [SelectLocalization(SCOPE.sCharacter('dubois_paleontologist_scope').IsFemale, 'стала', 'стал')] тем научным символом, которого и хотело видеть Научное общество."
 academics.2310.f: "Теперь к нам приходит много новых студентов, вдохновлённых величием и славой профессора [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastNameNoFormatting]. [SelectLocalization(SCOPE.sCharacter('dubois_paleontologist_scope').IsFemale, 'Она', 'Он')] не только [SelectLocalization(SCOPE.sCharacter('dubois_paleontologist_scope').IsFemale, 'оживила', 'оживил')] собственную дисциплину, но и в корне [SelectLocalization(SCOPE.sCharacter('dubois_paleontologist_scope').IsFemale, 'пробудила', 'пробудил')] интерес к наукам. Быть учёным - теперь не чудаковатая карьера с туманными перспективами, а захватывающая работа, сулящая славу и приключения.\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics_academy_promote_physician_loc: "В [GetPlayer.GetAltNameNoFlag('RU_CL_PP')] в данный момент содействуют подготовке [Concept('concept_panum_physician', '#b #BLUE врача#!#!')]."
