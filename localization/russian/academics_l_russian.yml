 academics.2110.t: "Директор музея требует крупный артефакт"
 academics.2110.d: "Директор археологического музея сегодня от имени [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] написал открытое письмо правительству."
 academics.2110.f: "С большим сожалением вынужден констатировать, что, несмотря на богатый фонд артефактов, нашему музею по-прежнему не хватает крупного экспоната, который можно было бы назвать жемчужиной коллекции. К сожалению, правительство до сих пор не сделало качество, а не количество, главным стандартом археологической оценки экспонатов. Поэтому я настоятельно советую исправить это упущение в ближайшие несколько лет, иначе в научном мире нашу нацию в лучшем случае будут считать мелочными счетоводами.\n\nС уважением, директор археологического музея"
 academics.2110.g: "Престижное начинание."
 academics.2110.h: "Оно того не стоит."
 academics.2110_goal_tt: "Вам предстоит найти #p 1#! [Concept('concept_lepsius_major_artifact','крупный артефакт')] в течение #n 15#! лет."
 academics.2111.t: "Великолепие музея"
 academics.2111.d: "Сегодня в своём письме [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] выразило свою благодарность."
 academics.2111.f: "Поздравляем с решением сделать археологию национальным приоритетом страны. Недавно приобретённый исключительный экземпляр будет выставлен на специальной выставке в ближайшие несколько недель. Весь мир нам завидует!\n\nС уважением, директор археологического музея"
 academics.2111.g: "Замечательно."
 academics.2112.t: "Пыльное место"
 academics.2112.d: "В сегодняшнем открытом письме от имени [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] директор археологического музея выразил сожаление, что к археологии в нашей стране не прислушиваются."
 academics.2112.f: "Никогда ещё так много не было разрушено столь немногими за столь короткое время.\n\nС уважением, директор археологического музея"
 academics.2112.g: "И что с того?"
 je_academics_major_artifact: "Фокус на археологии: крупный артефакт"
 je_academics_major_artifact_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы мы нашли хотя бы #p 1#! [Concept('concept_lepsius_major_artifact','крупный артефакт')]. Крупные артефакты можно получить в результате крупных открытий, постоянных раскопок или в случайных цепочках событий во время экспедиций."
 je_academics_major_artifact_success: "Иметь #p 1#! [Concept('concept_lepsius_major_artifact','крупный артефакт')]."
 academics.2113.t: "Директор музея требует археологического совершенства"
 academics.2113.d: "Директор археологического музея отметил, что для доведения выставки до совершенства не хватает совсем немного."
 academics.2113.f: "Я скромный человек. Как вы знаете, мои требования не отличаются особой экстравагантностью. Я никогда не просил это правительство о причудливых одолжениях. Я всегда держался в тени, как и подобает хранителю такого великолепного учреждения. Но... для того, чтобы поднять нашу прекрасную коллекцию до мирового уровня, не хватает последней вишенки на торте. Всё, что для этого нужно - превосходная выставка. Не более. Собрать 100 артефактов из одного региона и один крупный артефакт, надеюсь, не составит труда, верно?\n\nС уважением, директор археологического музея"
 academics.2113.g: "Интересный вызов."
 academics.2113.h: "Это слишком рискованно."
 academics.2112_goal_tt: "Вам предстоит организовать превосходную выставку в течение #n 20#! лет."
 academics.2114.t: "Археология на пике своего развития"
 academics.2114.d: "Сегодня из археологического музея нам пришло размытое, едва разборчивое письмо."
 academics.2114.f: "Можно было разобрать только имя отправителя. Подпись явно принадлежала директору музея. Секретарь подозревает, что он плакал от радости, когда писал это письмо."
 academics.2114.g: "Он счастлив, и мы тоже."
 academics.2115.t: "Удар по археологии"
 academics.2115.d: "Сегодня из археологического музея нам пришло размытое, едва разборчивое письмо."
 academics.2115.f: "Можно было разобрать только имя отправителя. Подпись явно принадлежала директору музея. Секретарь предполагает, что, когда директор писал это письмо, у него на глаза навернулись слёзы. Наша неудача в последней археологической миссии, должно быть, повергла его в глубокую депрессию."
 academics.2115.g: "Он опечален, и мы тоже."
 je_academics_excellent_collection: "Фокус на археологии: превосходная коллекция"
 je_academics_excellent_collection_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы мы создали превосходную выставку. Для этого нам нужны #G 100#! [Concept('concept_lepsius_artifact','артефактов')] и #p 1#! [Concept('concept_lepsius_major_artifact','крупный артефакт')] из одного археологического региона."
 academics.2116.t: "Нам нужно найти больше артефактов, чем у [SCOPE.sCountry('rival_scope').GetAltNameNoFlag('RU_CL_RP')]"
 academics.2116.d: "Члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] недовольны тем, что [SCOPE.sCountry('rival_scope').GetName] собрал[SCOPE.sCountry('rival_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] больше [Concept('concept_lepsius_artifact','артефактов')], чем наша держава. Они просят нас за 10 лет собрать в общей сложности больше #b артефактов#!, чем у [SCOPE.sCountry('rival_scope').GetAltNameNoFlag('RU_CL_RP')]."
 academics.2116.f: "Какой позор, что такая ничтожная нация, как [SCOPE.sCountry('rival_scope').GetName], обладает большей коллекцией артефактов, чем мы. Мы должны обогнать этих расхитителей гробниц, которые копают только ради наживы и даже не занимаются настоящей археологией! Сколько знаний было утеряно из-за этих варваров?\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2116_goal_tt: "Вам предстоит за #n 10#! лет собрать больше [Concept('concept_lepsius_artifact','артефактов')], чем у вашего соперника, [SCOPE.sCountry('rival_scope').GetAltNameNoFlag('RU_CL_RP')]. У них: [GetPlayer.MakeScope.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+], у нас: [GetPlayer.MakeScope.Var('lepsius_total_artifacts').GetValue|0+]."
 academics.2116_reward_tt: "В качестве награды одобрение интеллигенции вырастет на #p 5 ед.#!, а вы будете получать на #p 10%#! больше престижа в течение 4 лет."
 academics.2116.g: "Я - археолог, и я копаю яму!"
 academics.2116.h: "Археология - это не охота за сокровищами!"
 academics_no_competition_with_rival_total_artifacts: "Поражение в охоте за сокровищами"
 academics_competition_with_rival_won_total_artifacts: "Победа в охоте за сокровищами"
 je_academics_rivalry_for_artifacts: "Фокус на археологии: охота за сокровищами"
 je_academics_rivalry_for_artifacts_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы мы нашли больше [Concept('concept_lepsius_artifact','артефактов')], чем у нашего соперника, [SCOPE.sCountry('target').GetAltNameNoFlag('RU_CL_RP')].\n\nНаши #b артефакты#!: [ROOT.Var('lepsius_total_artifacts').GetValue|0+]\n#b Артефакты#! [SCOPE.sCountry('target').GetAltNameNoFlag('RU_CL_RP')]: [ROOT.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+]"
 je_academics_rivalry_for_artifacts_success: "У вас ([GetPlayer.MakeScope.Var('lepsius_total_artifacts').GetValue|0+]) больше [Concept('concept_lepsius_artifact','артефактов')], чем у [SCOPE.sCountry('target').GetAltNameNoFlag('RU_CL_RP')] ([GetPlayer.MakeScope.Var('je_artifacts_rival_nation_var').GetVariable('lepsius_total_artifacts').GetValue|0+])."
 academics.2117.t: "Изумительная коллекция артефактов"
 academics.2117.d_rival: "Наш соперник, [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName], повержен! Мы собрали более крупную коллекцию артефактов. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] и наш народ в восторге от этой победы!"
 academics.2117.d_rival_gone: "Наш археологический соперник сошёл с дистанции. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] и наш народ в восторге от этой победы!"
 academics.2117.f: "Очевидно, что у нашей нации должна быть лучшая археологическая коллекция, чем у этих варваров. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] удовлетворено этой коллекцией. Хотя есть ещё много артефактов, которые нужно спасти от подобных дикарей.\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2117.g: "Сколько спасённых артефактов!"
 academics.2118.t: "Нам не удалось расширить нашу археологическую коллекцию"
 academics.2118.d: "Наш соперник, [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName], одержал победу. Нам не удалось расширить свою археологическую коллекцию в достаточной мере. Члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] глубоко разочарованы."
 academics.2118.f: "Грязные руки этих дикарей оскверняют саму историю человечества. Как вы могли позволить расхитителям гробниц разграбить все эти артефакты? Столько знаний будет утрачено, потому что они предпочитают сокровища сохранению нашей истории. Отвратительно!\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2118.g: "Нам не нужны эти пыльные артефакты."
 academics.2200.t: "Нам нужно найти больше образцов, чем у [SCOPE.sCountry('rival_scope').GetAltNameNoFlag('RU_CL_RP')]"
 academics.2200.d: "Члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] недовольны тем, что [SCOPE.sCountry('rival_scope').GetName] собрал[SCOPE.sCountry('rival_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] больше [Concept('concept_dubois_specimen','образцов')], чем наша держава. Они просят нас за 10 лет найти в общей сложности больше #b образцов#!, чем у [SCOPE.sCountry('rival_scope').GetAltNameNoFlag('RU_CL_RP')]."
 academics.2200.f: "Наши коллекции образцов - ничто по сравнению с коллекциями в [SCOPE.sCountry('rival_scope').GetAltNameNoFlag('RU_CL_PP')]. У них есть всё, о чём мы так мечтаем! Я даже слышал, что у них есть гигантский цветок, который пахнет гниющими трупами. Вся наша гордость - оранжевая бабочка. Нам нужно найти новые образцы, образцы, которые никто не находил до нас! Иначе они могут попасть в руки этих мясников!\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2200_goal_tt: "Вам предстоит за #n 10#! лет собрать больше [Concept('concept_dubois_specimen','образцов')], чем у вашего соперника, [SCOPE.sCountry('rival_scope').GetAltNameNoFlag('RU_CL_RP')]. У них: [GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+], у нас: [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]."
 academics.2200_reward_tt: "В качестве награды одобрение интеллигенции вырастет на #p 5 ед.#!, а вы будете получать на #p 10%#! больше престижа в течение 4 лет."
 academics.2200.g: "Нужно немедленно отправить нашего натуралиста!"
 academics.2200.h: "Какая пустая трата времени!"
 academics_no_competition_with_rival_specimen: "Поражение в гонке за образцами"
 academics_competition_with_rival_won_specimen: "Победа в гонке за образцами"
 je_academics_rivalry_for_specimen: "Фокус на естествознании: гонка за образцами"
 je_academics_rivalry_for_specimen_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы мы нашли больше [Concept('concept_dubois_specimen','образцов')], чем у нашего соперника, [SCOPE.sCountry('target').GetAltNameNoFlag('RU_CL_RP')].\n\nНаши #b образцы#!: [ROOT.Var('dubois_specimen').GetValue|0+]\n#b Образцы#! [SCOPE.sCountry('target').GetAltNameNoFlag('RU_CL_RP')]: [ROOT.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+]"
 je_academics_rivalry_for_specimen_success: "У вас ([GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]) больше [Concept('concept_dubois_specimen','образцов')], чем у [SCOPE.sCountry('target').GetAltNameNoFlag('RU_CL_RP')] ([GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+])."
 academics.2201.t: "Поразительная коллекция образцов"
 academics.2201.d_rival: "Наш соперник, [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetName], повержен! Мы собрали более крупную коллекцию [Concept('concept_dubois_specimen','образцов')]. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] и наш народ в восторге от этой победы!"
 academics.2201.d_rival_gone: "Наш соперник в погоне за огромной биологической коллекцией сошёл с дистанции. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] и наш народ в восторге от этой победы!"
 academics.2201.f: "Наконец-то у нас есть #b коллекция образцов#!, достойная нашей великой нации. Пришло время выставить на обозрение самых удивительных живых существ на этой планете. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] на данный момент довольно нашей коллекцией. Очевидно, нам придётся продолжать её пополнять, чтобы помешать другим нациям истреблять эти несчастные виды животных и растений.\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2201.g: "Достойная коллекция!"
 academics.2202.t: "Нам не удалось собрать больше образцов, чем у [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetAltNameNoFlag('RU_CL_RP')]"
 academics.2202.d: "Нам не удалось расширить нашу коллекцию образцов больше, чем нашим соперникам из [ROOT.Var('je_specimen_rival_nation_var').GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] совершенно подавлены."
 academics.2202.f: "Теперь они нашли и самое удивительное животное в мире. Летающую ящерицу. Они назвали её в честь президента своей Академии наук. Вы потерпели неудачу.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2202.g: "От такого научного провала я никогда не оправлюсь!"
 academics.2203.t: "Представители #tooltippable_name #tooltip:[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetTooltipTag],EMPTY_STRING,IGTooltip [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetCustom('RU_IG_RP')]#!#! требуют доставить в наш зоопарк [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]"
 academics.2203.d: "[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] подали прошение нашему правительству с требованием приобрести [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] для нашего [Concept('concept_dubois_zoo', 'зоопарка')] в течение 10 лет."
 academics.2203.f: "В нашем зоопарке не хватает одного [Concept('concept_dubois_zoo_animal', 'экзотического животного')]. Наше правительство должно найти [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] и привезти его в наш зоопарк. В конце концов, мы не можем допустить, чтобы в нашем зоопарке не было этого чудесного животного.\n\nС уважением, представители #tooltippable_name #tooltip:[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetTooltipTag],EMPTY_STRING,IGTooltip [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetCustom('RU_IG_RP')]#!#!"
 academics.2203_goal_tt: "Вам предстоит приобрести [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] для нашего [Concept('concept_dubois_zoo', 'зоопарка')] в течение 10 лет."
 academics.2203_reward_tt: "В качестве награды одобрение #tooltippable_name #tooltip:[GetPlayer.MakeScope.Var('academics_mission_interest_group_var').GetInterestGroup.GetTooltipTag],EMPTY_STRING,IGTooltip [GetPlayer.MakeScope.Var('academics_mission_interest_group_var').GetInterestGroup.GetCustom('RU_IG_RP')]#!#! вырастет на #p 5#!, привлекательность этой группы для населения вырастет на #p 5%#!, а ваша страна будет получать на #p 5%#! больше престижа в течение 5 лет."
 academics.2203.g: "Нужно поймать их всех!"
 academics.2203.h: "Я руковожу великой нацией, а не каким-то зоопарком!"
 je_academics_get_exotic_animal: "Фокус на естествознании: достать [GetPlayer.MakeScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] для нашего зоопарка"
 je_academics_get_exotic_animal_reason: "[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName] хочет, чтобы мы приобрели [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] для нашего [Concept('concept_dubois_zoo', 'зоопарка')].\nЕсть разные способы заполучить такое [Concept('concept_dubois_zoo_animal','экзотическое животное')]."
 academics.2204.t: "Новый дом для [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')]"
 academics.2204.d: "Нам удалось приобрести [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] для нашего [Concept('concept_dubois_zoo', 'зоопарка')]. Это наверняка обрадует [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetName]."
 academics.2204.f: "Ваше правительство успешно приобрело [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] для нашей славной страны. Это показывает, что наша страна достаточно сильна, чтобы тратить свои ресурсы на развлечение населения. Спасибо!\n\nС уважением, представители #tooltippable_name #tooltip:[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetTooltipTag],EMPTY_STRING,IGTooltip [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetCustom('RU_IG_RP')]#!#!"
 academics.2204.g: "Чудесное животное!"
 academics.2205.t: "В нашем зоопарке нет нового животного"
 academics.2205.d: "Нам не удалось приобрести [SCOPE.GetRootScope.GetCountry.GetCustom('je_academics_get_exotic_animal_custom_loc')] для нашего зоопарка. Представители #tooltippable_name #tooltip:[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetTooltipTag],EMPTY_STRING,IGTooltip [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetCustom('RU_IG_RP')]#!#! не будут в восторге."
 academics.2205.f: "Вы даже не можете приобрести животное для нашего зоопарка. Как мы можем доверять вам управление этой страной?\n\nС уважением, представители #tooltippable_name #tooltip:[ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetTooltipTag],EMPTY_STRING,IGTooltip [ROOT.Var('academics_mission_interest_group_var').GetInterestGroup.GetCustom('RU_IG_RP')]#!#!"
 academics.2205.g: "У нас нет времени на каких-то случайных животных!"
 academics_exotic_animal_acquired_ig_modifier: "Экзотическое животное приобретено"
 academics_exotic_animal_not_acquired_ig_modifier: "Экзотическое животное не приобретено"
 academics_exotic_animal_acquired_country_modifier: "Экзотическое животное приобретено"
 academics.2206.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] требует построить зоопарк"
 academics.2206.d: "Предыдущие научные успехи в области естественных исследований можно охарактеризовать как скудные. Поэтому некоторые влиятельные представители научного сообщества обратились к правительству с петицией."
 academics.2206.f: "Для укрепления биологических исследований в целом и зоологических в частности, необходим зоопарк с коллекцией редких животных. Такое учреждение также значительно улучшило бы благосостояние населения. Поэтому [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] предлагает использовать все средства для создания национального зоопарка и готово помочь в подготовке энергичного зоолога.\n\nС уважением, совет [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2206.g: "Пару животных уж точно можно найти."
 academics.2206.h: "Этим людям больше некого донимать?"
 academics.2207.t: "Новый зоопарк"
 academics.2207.d: "Некоторые представители научного общества лично присутствовали на торжественном открытии нового зоопарка."
 academics.2207.f: "Отлично, просто превосходный новый зоопарк. Члены общества прекрасно провели день и особенно рады бесплатному корму для животных. Мы надеемся, что это только начало, и что только что открывшийся зоопарк скоро будет расширен и пополнится более ценными, экзотическими и чудесными существами.\n\nС уважением, совет [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2207.g: "Оставьте мне немного арахиса!"
 academics.2208.t: "Нет зоопарка"
 academics.2208.d: "Сегодня [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] направило гневное письмо, в котором жалуется, что желание о новом зоопарке не было исполнено."
 academics.2208.f: "К нашему большому сожалению, мы обнаружили, что нынешнее правительство, по-видимому, состоит из явных врагов науки, биологии в целом и зоологии в частности, или, по крайней мере, из кучки бесчеловечных ненавистников животных. Возможно, в такой обстановке великолепные животные были бы потрачены впустую.\n\nС уважением, совет [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2208.g: "Будете упрямиться - точно ничего не получите."
 academics.2206_goal_tt: "Вам предстоит собрать #p 5#! [Concept('concept_dubois_zoo_animal','животных для зоопарка')] и построить [Concept('concept_dubois_zoo', 'зоопарк')] в течение #n 5#! лет. "
 academics.2206_reward_tt: "В качестве награды наш натуралист получит #p 50 ед. опыта#!. Если у нас ещё нет натуралиста, мы его получим."
 academics.2209.t: "Расширение зоопарка"
 academics.2209.d: "В открытом письме [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] сетует на слишком скудное разнообразие в национальном зоопарке."
 academics.2209.f: "Хотя в нашей столице теперь есть зоопарк, где есть некоторое разнообразие и для учёных-зоологов, и для публики, покупающей билеты, это учреждение едва ли соответствует стандартам, достойным размеров города и значения нашей нации. Чтобы повысить престиж, развлечь население и продвинуть науку, мы рекомендуем расширить нынешний зоопарк как минимум до среднего размера.\n\nС уважением, совет [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2209.g: "Привезите больше животных!"
 academics.2209.h: "У нас есть дела поважнее."
 academics.2210.t: "Ещё больший зоопарк"
 academics.2210.d: "В открытом письме [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] сетует на слишком скудное разнообразие в национальном зоопарке."
 academics.2210.f: "Хотя в прошлом мы позволили нашему зоопарку вырасти до внушительных размеров, он ещё не пользуется той международной значимостью, которую мог бы и должен был бы иметь, чтобы впечатлять другие нации нашей зоологической страстью. Нам нужно всё больше и больше экзотических животных. На кону не только наука, но и наш престиж. Мы настоятельно советуем расширить наш зоопарк до большого размера.\n\nС уважением, совет [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2211.t: "Процветающий зоологический сад"
 academics.2211.d: "Расширенный зоологический сад является одной из главных достопримечательностей столицы и пользуется большой популярностью как у учёных, так и у простых граждан. Научное общество с удовлетворением отмечает, что его пожелание было исполнено."
 academics.2211.f: "Отлично! Новый зоопарк стал просторнее и отвечает требованию представить более широкий спектр животного мира. Надеюсь, вы не забыли об утконосе? Мы бы хотели взять над ним шефство. Его случайно не зовут Перри?\n\nС уважением, совет [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2211.g: "Животные всего мира у нас дома!"
 academics.2212.t: "Зоологическое разочарование"
 academics.2212.d: "Научное общество задаётся вопросом, стоит ли вообще обращаться к правительству, если его заботы так легко попираются - как, например, крошечная просьба о нескольких животных для зоопарка."
 academics.2212.f: "Мы очень, очень разочарованы.\n\nС уважением, совет [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2212.g: "Пусть лучше занимаются исследованиями, а не развлекаются в зоопарке."
 academics.2209_goal_tt: "Вам предстоит расширить ваш [Concept('concept_dubois_zoo', 'зоопарк')] до #p 3-го уровня#! (средний зоопарк) в течение #n 10#! лет."
 academics.2210_goal_tt: "Вам предстоит расширить ваш [Concept('concept_dubois_zoo', 'зоопарк')] до #p 4-го уровня#! (большой зоопарк) в течение #n 10#! лет."
 academics.2209_reward_tt: "В качестве награды наш натуралист получит #p 50 ед. опыта#!. Если у нас ещё нет натуралиста, мы его получим."
 je_academics_found_zoo: "Фокус на естествознании: основать зоопарк"
 je_academics_found_zoo_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы мы построили [Concept('concept_dubois_zoo', 'зоопарк')] для приумножения знаний, а также для повышения уровня жизни нашей интеллигенции. Для строительства зоопарка требуется #p 5#! [Concept('concept_dubois_zoo_animal','животных для зоопарка')], которых может поймать [Concept('concept_dubois_naturalist', '#b #GREEN натуралист#!#!')] в местной зоологической экспедиции или на сафари. Животных также можно купить у других стран."
 je_academics_medium_zoo: "Фокус на естествознании: расширить зоопарк"
 je_academics_medium_zoo_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] потребовало расширения [Concept('concept_dubois_zoo', 'зоопарка')]. У нас есть десять лет, чтобы расширить наш зоопарк до #p среднего размера#!. Это требует большего количества [Concept('concept_dubois_zoo_animal','животных для зоопарка')], которых может поймать [Concept('concept_dubois_naturalist', '#b #GREEN натуралист#!#!')] в местной зоологической экспедиции или на сафари. Животных также можно купить у других стран."
 je_academics_large_zoo: "Фокус на естествознании: расширить зоопарк"
 je_academics_large_zoo_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] потребовало расширения [Concept('concept_dubois_zoo', 'зоопарка')]. У нас есть десять лет, чтобы расширить наш зоопарк до #p большого размера#!. Это требует большего количества [Concept('concept_dubois_zoo_animal','животных для зоопарка')], которых может поймать [Concept('concept_dubois_naturalist', '#b #GREEN натуралист#!#!')] в местной зоологической экспедиции или на сафари. Животных также можно купить у других стран."
 academics.2300.t: "Нам нужно найти больше окаменелостей, чем у [SCOPE.sCountry('rival_scope').GetAltNameNoFlag('RU_CL_RP')]"
 academics.2300.d: "Нам не хватает [Concept('concept_dubois_fossil','окаменелостей')], чтобы наша коллекция стала больше, чем у [SCOPE.sCountry('rival_scope').GetAltNameNoFlag('RU_CL_RP')]. Поэтому [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы мы нашли больше #b окаменелостей#!, чем [SCOPE.sCountry('rival_scope').GetName]. Они, безусловно, были бы очень признательны, если бы мы смогли победить этого соперника."
 academics.2300.f: "В то время как наши соперники из [SCOPE.sCountry('rival_scope').GetAltNameNoFlag('RU_CL_RP')] имеют различные окаменелости разных эпох и со всего мира, наши весьма ограничены как по времени, так и по географии. Это огромный позор и неприемлемо для такой великой нации, как наша.\nМы должны немедленно расширить нашу коллекцию окаменелостей!\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2300_goal_tt: "Вам предстоит за #n 10#! лет собрать больше [Concept('concept_dubois_fossil','окаменелостей')], чем ваш соперник, [SCOPE.sCountry('rival_scope').GetName]. У них: [GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+], у нас: [GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]."
 academics.2300_reward_tt: "В качестве награды одобрение интеллигенции вырастет на #p 5 ед.#!, а вы будете получать на #p 10%#! больше престижа в течение 4 лет."
 academics.2300.g: "Ах, вражда из-за окаменелостей!"
 academics.2300.h: "Нам не нужны какие-то пыльные камни..."
 academics_no_competition_with_rival_fossils: "Поражение в битве за окаменелости"
 academics_competition_with_rival_won_fossils: "Победа в битве за окаменелости"
 je_academics_rivalry_for_fossils: "Фокус на палеонтологии: битва за окаменелости"
 je_academics_rivalry_for_fossils_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы мы собрали больше [Concept('concept_dubois_fossil','окаменелостей')], чем у нашего соперника, [SCOPE.sCountry('target').GetAltNameNoFlag('RU_CL_RP')].\n\nНаши #b окаменелости#!: [ROOT.Var('dubois_fossil').GetValue|0+]\n#b Окаменелости#! [SCOPE.sCountry('target').GetAltNameNoFlag('RU_CL_RP')]: [ROOT.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+]"
 je_academics_rivalry_for_fossils_success: "У вас ([GetPlayer.MakeScope.Var('dubois_fossil').GetValue|0+]) больше [Concept('concept_dubois_fossil','окаменелостей')], чем у [SCOPE.sCountry('target').GetAltNameNoFlag('RU_CL_RP')] ([GetPlayer.MakeScope.Var('je_fossil_rival_nation_var').GetVariable('dubois_fossil').GetValue|0+])."
 academics.2301.t: "Фантастическая коллекция окаменелостей"
 academics.2301.d_rival: "Наш соперник, [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetName], повержен! Мы собрали более крупную коллекцию [Concept('concept_dubois_fossil','окаменелостей')]. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] и наш народ в восторге от этой победы!"
 academics.2301.d_rival_gone: "Наш соперник в погоне за огромной коллекцией окаменелостей сошёл с дистанции. [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] и наш народ в восторге от этой победы!"
 academics.2301.f: "С самого начала было ясно, что нам нужна коллекция окаменелостей больше, чем у нашего соперника. Теперь, когда мы собрали столько окаменелостей от кембрия до четвертичного периода и от Америки до тихоокеанских островов, у нас действительно есть достойная коллекция! Очевидно, это должно было случиться много лет назад, и мы должны расширять эту коллекцию и дальше. На данный момент ситуация, как говорят крестьяне, «достаточно хороша».\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2301.g: "Это положит конец вражде!"
 academics.2302.t: "Нам не удалось собрать больше окаменелостей, чем у [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetAltNameNoFlag('RU_CL_RP')]"
 academics.2302.d: "Нам не удалось расширить нашу коллекцию окаменелостей больше, чем нашим соперникам из [ROOT.Var('je_fossil_rival_nation_var').GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] не в восторге."
 academics.2302.f: "Их коллекция охватывает целые эоны, у них есть всё, а у нас - какие-то пыльные камни с плохо различимыми окаменелостями... Это ужасно. Это позорное время для нашей нации! Отвратительно.\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2302.g: "Мне и так не нужны старые камни..."
