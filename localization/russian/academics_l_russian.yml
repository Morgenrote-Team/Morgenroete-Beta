 setting_academics_missions_rule_desc: "Каждые десять лет ваша академия будет получать [Concept('concept_academics_academic_mission', 'научное задание')]. Например, таким заданием может быть строительство научного здания или поиск определённого количества образцов. За выполнение этих заданий вы получите небольшую награду."
 setting_academics_no_missions_rule: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_academics_no_missions_rule_desc Научные задания #n отключены#!#!#!"
