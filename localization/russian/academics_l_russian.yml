 ademics_our_own_dinosaur_modifier: "Наш новый динозавр"
 ademics_no_dinosaur_modifier: "Нет динозавра"
 academics.2303_goal_tt: "Собрать #G 1#! [Concept('concept_dubois_dinosaur_skeleton', 'скелет динозавра')]"
 academics.2303_reward_tt: "В качестве награды одобрение интеллигенции вырастет на #p 5 ед.#!, а вы будете получать на #p 5%#! больше престижа в течение 4 лет. Мы также получим средние инвестиции в технологии."
 je_academics_giant_of_the_past: "Фокус на палеонтологии: гигант прошлого"
 je_academics_giant_of_the_past_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] попросило собрать [Concept('concept_dubois_dinosaur_bone','кости динозавров')] и реконструировать [Concept('concept_dubois_dinosaur_skeleton','скелет динозавра')]. Его состояние второстепенно - главное, чтобы в нашей коллекции был роскошный экспонат. Кости динозавров находят в великих формациях. Если на нашей территории таковых нет, [Concept('concept_dubois_paleontological_licence','палеонтологическая лицензия')] была бы кстати, чтобы наш палеонтолог мог вести поиски за границей."
 academics.2303.t: "Гигант прошлого"
 academics.2303.d: "Некоторые ведущие учёные сетуют на то, что, несмотря на наши палеонтологические успехи, у нас до сих пор нет полного скелета динозавра. Наше научное общество также выразило глубокое сожаление по поводу этой прискорбной ситуации в письме и хотело бы, чтобы она была исправлена."
 academics.2303.f: "МЫ ХОТИМ ДИНОЗАВРА, И МЫ ХОТИМ ЕГО СЕЙЧАС!\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2303.g: "Прекрасная инициатива!"
 academics.2303.h: "Это не парк развлечений для мальчишек, а научный институт."
 academics.2304.t: "Ужасный ящер"
 academics.2304.d: "Новый динозавр - самый зрелищный экспонат палеонтологической коллекции. Каждый день на выставку стекаются толпы посетителей, чтобы увидеть скелет."
 academics.2304.f: "Можно нам ещё одного?\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2304.g: "Наш собственный динозавр!"
 academics.2305.t: "Нет ящера"
 academics.2305.d: "Платформа, отведённая для запланированного скелета динозавра, остаётся пустой. Научное общество отреагировало на это с большим раздражением."
 academics.2305.f: "Нам нужно выражаться ещё яснее?\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2305.g: "Найдите себе другую игрушку!"
 academics.2306_goal_tt: "Найти #G 3#! #O особые окаменелости#!"
 academics.2306_reward_tt: "В качестве награды наш [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолог#!#!')] получит #p 50 ед. опыта#!. Если у нас ещё нет [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолога#!#!')], мы его получим. Мы также получим крупные инвестиции в технологии."
 je_academics_special_fossils: "Фокус на палеонтологии: особые окаменелости"
 je_academics_special_fossils_reason: "Особые окаменелости - это уникальные ископаемые, которые рассматриваются отдельно из-за их исключительного статуса. К ним относятся переходные формы, такие как археоптерикс или ихтиостега, а также крупные вымершие виды млекопитающих, такие как гигантский ленивец мегатерий или дельфиноподобный ихтиозавр. Но к этой категории также относятся и более мелкие окаменелости, которые используются для определения эпохи - самые известные из них - аммониты и трилобиты. Всего существует дюжина особых окаменелостей, которые можно найти не только в формациях, но и в ходе научных экспедиций."
 je_academics_special_fossils_success: "Найти #G 3#! #O особые окаменелости#!"
 academics.2306.t: "Необычные окаменелости"
 academics.2306.d: "Научное общество обратилось к нам с необычной просьбой относительно необычных окаменелостей."
 academics.2306.f: "История происхождения животных - это тайна природы, которую наши исследователи с каждым днём приоткрывают всё больше. Особую роль играют те формы, которые находятся на пороге между видами, так называемые «недостающие звенья». В то же время на нашей планете существуют необычные существа, которым не обязательно быть динозаврами, чтобы впечатлять: вымершие млекопитающие, такие как саблезубые тигры или гигантские ленивцы. Если бы мы собрали хотя бы 3 особые окаменелости, мы могли бы ещё больше укрепить репутацию нашего института в мире.\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2306.g: "Особые окаменелости для особой коллекции."
 academics.2306.h: "Не можем ли мы направить наши научные мощности на что-то более значимое?"
 academics.2307.t: "Поразительная коллекция окаменелостей"
 academics.2307.d: "Нет сомнений в том, что Национальный палеонтологический институт обладает одной из самых важных международных коллекций. Вряд ли найдётся сравнимое место с такими необычными экспонатами."
 academics.2307.f: "Особые окаменелости, возможно, не всегда так впечатляют, как можно было бы подумать, но они имеют огромную научную ценность. Поэтому научное общество направило благодарственное письмо. В ближайшие дни будет организована специальная выставка."
 academics.2307.g: "Великолепно."
 academics.2308.t: "Особое разочарование"
 academics.2308.d: "Научное общество выразило тревогу по поводу последней палеонтологической неудачи."
 academics.2308.f: "Это национальная трагедия, что проблемы естествознания в стране полностью игнорируются. Палеонтологические исследования отметаются как чушь о мёртвых птицах и ящерицах, субсидии на специальные экспедиции выделяются редко, и даже самые малые просьбы игнорируются. Я обвиняю!\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2308.g: "О, боже."
 ademics_no_paleontological_hero_modifier: "Нет героя палеонтологии"
 academics.2309_goal_tt: "Иметь #o знаменитого#! [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолога#!#!')]"
 academics.2309_reward_tt: "В качестве награды мы получим #p 120 ед.#! [Concept('concept_academics_progress', 'научного прогресса')]."
 je_academics_famous_paleontologist: "Фокус на палеонтологии: знаменитый палеонтолог"
 je_academics_famous_paleontologist_reason: "Становление [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолога#!#!')] сопровождается ростом его опыта. Как и любой учёный, палеонтолог ежегодно получает 5 очков опыта. Дополнительный опыт он получает за успешные палеонтологические исследования формаций. Кроме того, палеонтолога можно задействовать в альпинистских и тихоокеанских экспедициях. Успешная сборка и пересборка скелетов динозавров также помогает повысить опыт палеонтолога."
 academics.2310.g: "Вдохновение для молодёжи."
 academics.2311.t: "Нет героя палеонтологии"
 academics.2311.d: "По какой-то причине мы не смогли поддержать палеонтолога и помочь ему достичь мировой известности."
 academics.2311.f: "К сожалению, эта неудача означает, что научные дисциплины по-прежнему считают узкой нишей, а интерес к академическому обучению и настоящей исследовательской работе остаётся ограниченным. Члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] всё чаще слышат недовольные разговоры. Интеллектуальная элита винит в этой ситуации правительство."
 academics.2311.g: "Разочаровывающе."
 academics_splendid_dinosaur_collection_modifier: "Великолепная коллекция динозавров"
 academics.2312_goal_tt: "Иметь #o рейтинг динозавров#! не менее #G 5#!"
 academics.2312_reward_tt: "В качестве награды одобрение интеллигенции вырастет на #p 5 ед.#!. Кроме того, вы будете получать на #p 10%#! больше престижа, а стоимость социальных технологий будет снижена на #p 5%#! на 10 лет."
 je_academics_dinosaur_rating: "Фокус на палеонтологии: рейтинг динозавров"
 je_academics_dinosaur_rating_reason: "Для улучшения #O рейтинга динозавров#! нужны не только новые скелеты динозавров, но и их идеальная реконструкция. Это может занять годы. Поэтому [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] решило не устанавливать временных ограничений."
 je_academics_dinosaur_rating_success: "Иметь #o рейтинг динозавров#! не менее #G 5#!"
 academics.2312.t: "Великолепие палеонтологии"
 academics.2312.d: "Палеонтологическое направление наших научных исследований уже имеет хорошую репутацию. Теперь пришло время сделать его всемирно известным, значительно улучшив нашу выставку динозавров."
 academics.2312.f: "Мы бы хотели показать на нашей выставке другого динозавра. Большее количество скелетов пошло бы на пользу не только научным исследованиям, но и нашей национальной репутации. Весь мир копает в поисках костей динозавров и очарован ранее неизвестной доисторической эпохой. Дело должно быть не только в количестве, но и в качестве. Мы должны стремиться стать лидером в реконструкции скелетов динозавров.\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2312.g: "Это будет колоссальное предприятие!"
 academics.2312.h: "Только не опять эта палеонтологическая чушь."
 academics.2313.t: "Великолепная коллекция"
 academics.2313.d: "Сегодня научное общество с гордостью объявило о специальной выставке скелетов динозавров."
 academics.2313.f: "Мы в глубоком долгу перед правительством за то, что у нас наконец-то есть коллекция динозавров, которая подчёркивает высокий уровень палеонтологических исследований в нашей стране. Вряд ли найдутся более изысканные коллекции, чем эта. Это потребовало много упорного труда и усилий, а также жажды исследований и настойчивости. Общество может с гордостью смотреть на эту работу, в то время как за границей смотрят на неё с завистью. Господа, это великий день для науки в целом и для палеонтологии в частности!\n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2313.g: "Великолепно!"
 academics_royalist_reaction_modifier: "Роялистская реакция"
 academics_royalist_weakness_modifier: "Слабость роялистов"
 academics_constitution_suspended_modifier: "Действие «Основного закона» приостановлено"
 academics_constitution_confirmed_modifier: "Действие «Основного закона» подтверждено"
 academics_academic_purge_modifier: "Академическая чистка\n #R -1#! #o к научному прогрессу#!"
 academics_good_to_be_british_modifier: "Хорошо быть британцем"
 academics_supported_hanover_modifier: "Поддержка Ганновера"
 academics_supported_goettinger_seven_modifier: "Поддержка «Гёттингенской семёрки»"
 academics_kneeling_decree_modifer: "Указ о коленопреклонении"
 academics_germanistentag_modifier: "Съезд германистов"
 je_goettinger_seven_monument: "Памятник «Гёттингенской семёрке»"
 je_goettinger_seven_monument_reason: "Единая германская нация могла бы почтить память «Гёттингенской семёрки», при условии что ведущая объединяющая держава уже исторически заступалась за них. Памятник вдохновил бы поколения учёных! Разумеется, это предполагает, что германское правительство разделяет либеральные идеи легендарных профессоров."
 academics.3101.t: "Конституция Ганновера"
 academics.3101.d: "Одним из своих первых официальных указов король объявил об отмене конституции, так называемого «Основного закона» (Staatsgrundgesetz). Эрнст Август подчеркнул, что не считает себя связанным её положениями."
 academics.3101.f: "Ганновер получил свою первую конституцию, дарованную принцем-регентом, в 1819 году; она лишь ознаменовала превращение Ганновера из курфюршества в королевство, что было гарантировано Венским конгрессом. Герцог Кембриджский, будучи наместником короля Вильгельма в Ганновере, рекомендовал провести тщательную реорганизацию правительства. Вильгельм IV дал своё согласие на новую конституцию в 1833 году; согласия герцога Камберлендского не спрашивали, и он формально протестовал против её принятия. Сразу по прибытии в Ганновер новый король распустил ганноверский парламент. Он объявил о приостановке действия конституции на том основании, что его согласия не спросили и что она не отвечает потребностям королевства."
 academics.3101.g: "Приостановить действие конституции."
 academics.3101.h: "Король не выше закона."
 academics.3102.t: "«Гёттингенская семёрка»"
 academics.3102.d: "Историк и политик Фридрих Кристоф Дальман оспорил планы Эрнста изменить конституцию по своему усмотрению, так как сам Дальман принимал участие в её разработке. Шесть других известных профессоров Гёттингенского университета присоединились к протесту в защиту конституции 1833 года. Вскоре эти люди стали известны как «Гёттингенская семёрка» - и превратились в настоящую головную боль для короля."
 academics.3102.f: "Документ Дальмана произвёл эффект разорвавшейся бомбы - студенты университета изготовили сотни, если не тысячи копий и распространили их по всей Германии. Остальными шестью протестующими были братья-германисты Вильгельм и Якоб Гримм (знаменитые сказочники, известные как братья Гримм), юрист Вильгельм Эдуард Альбрехт, историк Георг Готфрид Гервинус, физик Вильгельм Эдуард Вебер и теолог-востоковед Генрих Георг Август Эвальд. Протест заставил короля действовать, и семеро непокорных профессоров предстали перед университетским судом."
 academics.3102.g: "Лишить их должностей и изгнать!"
 academics.3102.h: "Нужно уступить их требованиям, пока ситуация не обострилась."
 academics.3103.d: "После восшествия на престол королевы Виктории в Соединённом Королевстве многие опечалились из-за утраты личной унии с Ганновером, длившейся более 120 лет. Но после последних событий в Германии можно с уверенностью сказать: хорошо, что наши пути разошлись."
 academics.3103.f: "Всего через несколько месяцев после восшествия на престол нового короля Ганновер отменил конституцию, принятую под британским правлением. Теперь король Эрнст Август столкнулся с целой оппозицией из учёных. Об этом споре уже говорят по всей Германии. Воистину, как только страна покидает благотворную британскую сферу влияния, она впадает в варварство."
 academics.3103.g: "Как же хорошо быть британцем."
 academics.3104.d: "Государства Германского союза потрясены конфликтом между королём Ганновера и семью непокорными профессорами: после того как король Эрнст Август отменил конституцию, «Гёттингенская семёрка» восстала против него. Они лишились своих должностей, но завоевали множество симпатий в либеральном немецком лагере."
 academics.3104.f: "Историк и политик Фридрих Кристоф Дальман оспорил планы Эрнста изменить конституцию по своему усмотрению, так как сам Дальман принимал участие в её разработке. Шесть других известных профессоров Гёттингенского университета присоединились к протесту в защиту конституции 1833 года. Ими были братья-германисты Вильгельм и Якоб Гримм, юрист Вильгельм Эдуард Альбрехт, историк Георг Готфрид Гервинус, физик Вильгельм Эдуард Вебер и теолог-востоковед Генрих Георг Август Эвальд. Прямые последствия протеста были ограничены, но общественный резонанс и интерес СМИ в Германии и большей части Европы были высоки, и семёрка пользовалась популярностью в народе."
 academics.3104.g: "При всём уважении, король зашёл слишком далеко."
 academics.3104.h: "Эта академическая свора получила по заслугам."
 academics.3105.t: "Жаркие споры о Ганновере"
 academics.3105.d: "Конфликт с «Гёттингенской семёркой» не остался незамеченным в других государствах Германского союза. Даже в Великобритании раздосадованы тем, что король отменил конституцию."
 academics.3105.f: "[SCOPE.sCountry('academics_anti_hanover_country').GetName] - одно из многих германских государств, осудивших действия Эрнста Августа. Но есть и страны, особенно с авторитарным правлением, которые отнеслись к произошедшему с пониманием. К ним относится [SCOPE.sCountry('academics_pro_hanover_country').GetName]."
 academics.3105.g: "Это не их дело!"
 academics.3106.t: "Студенческая пропаганда"
 academics.3106.d: "Несмотря на все усилия государства по пресечению пропаганды в пользу «Гёттингенской семёрки», либеральным студенческим кружкам удалось массово распространить листовки в крупных городах."
 academics.3106.f: "«Помните наших героев! Помните „Гёттингенскую семёрку“! Славьте их добродетели!» Когда профессор Дальман опубликовал свои документы против короля Ганновера, он получил широкую поддержку среди немецких студентов и либералов. Это произвело эффект разорвавшейся бомбы в государствах Германского союза. Студенты Гёттингенского университета изготовили сотни, если не тысячи, копий и распространили их по всей Германии."
 academics.3106.g: "Эта бунтарская студенческая шайка!"
 academics.3107.t: "Якоб Гримм в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]"
 academics.3107.d: "После изгнания из Ганновера знаменитый немецкий учёный и юрист Якоб Гримм ищет новый дом. Наши симпатии к «Гёттингенской семёрке» дошли и до него, поэтому он надеется получить новую работу."
 academics.3107.f: "Якоб Людвиг Карл Гримм - немецкий писатель, лингвист, филолог, юрист и фольклорист. Он сформулировал лингвистический закон Гримма, был соавтором «Немецкого словаря», автором «Немецкой мифологии» и редактором «Сказок братьев Гримм». Он был старшим братом Вильгельма Гримма; вместе они составляли литературный дуэт, известный как братья Гримм."
 academics.3107.g: "Принять его."
 academics.3107.h: "Нам не нужен ещё один чудаковатый учёный."
 academics.3108.t: "Вильгельм Эдуард Вебер в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]"
 academics.3108.d: "После изгнания из Ганновера знаменитый физик Вильгельм Эдуард Вебер ищет новый дом. Наши симпатии к «Гёттингенской семёрке» дошли и до него, поэтому он надеется получить новую работу."
 academics.3108.f: "Вильгельм Эдуард Вебер - немецкий физик и, совместно с Карлом Фридрихом Гауссом, изобретатель первого электромагнитного телеграфа."
 academics.3111.t: "«Словарь братьев Гримм»"
 academics.3111.d: "Братья Якоб и Вильгельм Гримм представили первый том немецкого словаря, который должен охватить всю лексику немецкого языка. Титаническая задача, но она ещё больше сближает немецкую культурную нацию."
 academics.3111.f: "«Немецкий словарь» (Das Deutsche Wörterbuch) - один из важнейших словарей немецкого языка. Для немецкого он значит то же, что Оксфордский словарь английского языка для английского, и содержит подробную историческую информацию о происхождении и использовании немецких слов с течением времени, с примерами из реальных документов. В Германии словарь также известен как «Гримм». Работа над ним была начата братьями Гримм в 1838 году. Изначально они предполагали, что проект займёт десять лет и составит 6 или 7 томов. На самом деле первый том был опубликован только в 1854 году. Вильгельм Гримм умер в 1859, а Якоб - в 1863, работая над статьёй «Frucht» (фрукт). После их смерти в работе участвовали несколько учреждений, включая Прусскую академию наук и Берлинскую академию, а также центр в Гёттингене. Окончательно завершённый в 1961 году, словарь будет состоять из 32 томов и включать около 350 000 основных статей. «Гримм» был не только научным, но и национальным трудом."
 academics.3111.g: "Это должно быть опубликовано в каждом германском государстве!"
 academics.3112.g: "Я надеялся, что они выпустят новую книгу сказок, а не это..."
 academics.3113.t: "Первый съезд германистов во Франкфурте"
 academics.3113.d: "Несколько немецких интеллектуалов пригласили единомышленников на конференцию во Франкфурте - «Съезд германистов». Хотя многие хотят видеть в этом собрании лишь культурное событие, его политический посыл столь же ясен."
 academics.3113.f: "«Съезды германистов», вопреки своему названию, не были мероприятием только для германистов. Они были инициативой немецких университетских учёных в рамках развития немецкого национального самосознания. В отличие от сегодняшнего дня, в эпоху «Формерц» термин «германистика» имел более широкое значение: он объединял историков, юристов, лингвистов и литературоведов, занимавшихся немецкой историей, немецким правом и немецким языком. На первом съезде германистов, инициированном во Франкфурте в 1846 году тюбингенским юристом Августом Людвигом Рейшером, Фридрих Кристоф Дальман, Георг Вайц и Иоганн Густав Дройзен говорили о неделимости Шлезвиг-Гольштейна. Якоб Гримм рассуждал о «ценности неточных наук», а его брат Вильгельм - о немецком словаре. Конференции проходили в ратуше Рёмер во Франкфурте. Второй съезд германистов состоялся в Любеке в 1847 году. Третий, который должен был пройти в Нюрнберге в 1848 году, не состоялся из-за Мартовской революции."
 academics.3113.g: "Германия - культурная нация."
 academics.3113.h: "Их либеральные идеалы служат нам ориентиром."
 academics.3115.t: "Спор о коленопреклонении"
 academics.3115.d: "С аннексиями земель в наполеоновскую эпоху Бавария получила большие территории, населённые протестантами. В это время король проводил более терпимую политику по отношению к своим подданным. Примером был эдикт, согласно которому протестантские солдаты не должны были преклонять колени перед католической мессой или процессией. Однако министр Карл фон Абель предложил это изменить."
 academics.3115.f: "Так называемый спор о коленопреклонении произошёл в Королевстве Бавария в первой половине XIX века. Он начался с указа баварского министра Карла фон Абеля, который также обязывал протестантских солдат преклонять колени перед Святыми Дарами во время военных служб. Эдикт стал известен как «Указ о коленопреклонении». Это привело к ожесточённым спорам в Палате депутатов, которые длились несколько лет."
 academics.3115.g: "Мы - католическая страна, и здесь преклоняют колени!"
 academics.3115.h: "А как же наши соотечественники-протестанты?"
 mr_is_special_character_tt: "#default_text Этот [concept_character|l] - #V особый персонаж#! (например, [Concept('concept_tesla_engineer', '#b #ORANGE инженер#!#!')]).#!"
 academics.2004.f: "Уважаемый д-р [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]!\n\n   Мы очень надеемся, что вы сможете создать новую звёздную карту со множеством новых звёзд. Судя по вашим выдающимся способностям, это не должно составить для вас никакого труда. Поэтому мы ожидаем превосходную новую звёздную карту в течение 10 лет.\n\nС уважением, ваши коллеги из [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.1.d: "Проведя десятилетия своей жизни, проектируя и строя мосты, машины и здания, [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] уходит на покой. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] больше не будет выполнять обязанности нашего [Concept('concept_tesla_engineer', '#b #ORANGE инженера#!#!')]."
