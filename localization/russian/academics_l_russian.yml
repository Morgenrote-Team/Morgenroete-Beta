 academics.2101_reward_tt: "В качестве награды #p уровень жизни#! среднего класса в каждой провинции с университетом повысится на один пункт на 5 лет, additionally [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] получит #p 5 одобрения#! и стоимость производственных технологий будет снижена на #p 5%#! на 3 года."
 academics.2104_reward_tt: "В качестве награды мы получим#p  5% престижа#! в течение 5 лет, кроме того,[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] получат#p  5#! одобрения, а затраты на технологию производственные технологии снизятся на#p  5%#! в течение 3 лет. Наш археолог получит#p  15% опыта#!."
 academics.2110_reward_tt: "В награду мы получим #p 5% престижа#! на 5 лет, кроме того, [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] получат #p 5 одобрения#! и стоимость производственных технологий будет снижена на #p 5%#! на 3 года. Наш археолог получит #p 15 опыта#!."
 academics.2112_reward_tt: "В награду мы получим #p 5% престижа#! на 5 лет, кроме того [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] получат #p  5 одобрения#! и стоимость производственных технологий будет снижена на #p  5%#!. Наши люди также будут счастливее на #p 1 уровень жизни#! больше. Наш археолог получит #p 25 опыта#!."
 academics.2309.t: "Амбиция [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]"
 academics.2309.d: "Профессор [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] считается национальным эталоном в области палеонтологии. Научное сообщество хотело бы отметить [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim] личность, пользующуюся международным спросом, с целью использования [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim] как номинального академического руководителя."
 academics.2309.f: "Мы пришли к твердому выводу, что наш коллега, профессор.[SCOPE.sCharacter('dubois_paleontologist_scope').GetLastNameNoFormatting], идеально подходит для представления нашей страны как научного центра. [SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe] должен получать всевозможную поддержку для расширения [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHim]. Это, в частности, побудило бы молодых людей самим строить научную карьеру.\n\n Подписано, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2309.g: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe] станет известным."
 academics.2309.h: "[SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe] не должен страдать манией величия."
 academics.2310.t: "Палеонтологическая слава"
 academics.2310.d: "В связи с [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHis] восхождением к славе как палеонтолога, [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName] теперь является тем научным руководителем, о котором мечтало Научное общество."
 academics.2310.f: "Сейчас мы принимаем много новых студентов, которые вдохновлены величием и славой профессора [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastNameNoFormatting]. [SCOPE.sCharacter('dubois_paleontologist_scope').GetSheHe] не только оживляет [SCOPE.sCharacter('dubois_paleontologist_scope').GetHerHis] собственный предмет, но и в корне пробудил интерес к наукам. Быть ученым - это не более чем необычная карьера с небольшими перспективами, а скорее захватывающая работа, сулящая славу и приключения.\n\nПодписано, членами [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
