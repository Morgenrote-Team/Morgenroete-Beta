 je_academics_first_railway: "Фокус на промышленности: построить первую железную дорогу в [SCOPE.GetRootScope.GetCountry.GetAltNameNoFlag('RU_CL_PP')]"
 je_academics_first_railway_reason: "Теперь, когда изобретение железной дороги дошло и до [SCOPE.GetRootScope.GetCountry.GetAltNameNoFlag('RU_CL_RP')], многие наши промышленники хотят, чтобы мы построили её для облегчения перевозки товаров. Это поможет нам стать промышленной державой."
 academics.2400.t: "Нам нужны железные дороги!"
 academics.2400.d: "Железные дороги облегчают перевозку товаров. Поэтому капитаны промышленности [SCOPE.GetRootScope.GetCountry.GetAltName('RU_CL_RP')] требуют строительства железной дороги в нашей стране в ближайшие 5 лет."
 academics.2400.f: "Мы всё ещё перевозим нашу продукцию по грунтовым дорогам и рекам. Такое положение дел неприемлемо. Если бы у нас был лучший способ транспортировки товаров и ресурсов, наши прибыли взлетели бы до небес, и мы могли бы строить больше фабрик, что привело бы к улучшению условий жизни для всех. Постройте железную дорогу немедленно!"
 academics.2400.g: "Сможем ли мы её построить?"
 academics_industrialists_happy_modifier: "Промышленники довольны"
 academics_industrialists_discontent_modifier: "Промышленники недовольны"
 academics_first_railway_modifier: "Первая железная дорога"
 academics.2401.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_title_custom_loc')]"
 academics_spanisch_broetli_title_loc: "Железная дорога «Испанская булочка»"
 academics_ferrovia_torino_genova_title_loc: "Железная дорога Турин-Генуя"
 academics_generic_title_loc: "Первая железнодорожная линия в [SCOPE.GetRootScope.GetCountry.GetAltNameNoFlag('RU_CL_PP')]"
 academics.2401.d: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_desc_custom_loc')]"
 academics_spanisch_broetli_desc_loc: "Швейцария открыла своё первое железнодорожное сообщение между Цюрихом и Баденом. Надеемся, этот маршрут облегчит перевозку товаров, людей и почты, а также даст толчок развитию промышленности в Бадене и Цюрихе. По крайней мере, теперь богатые господа из Цюриха могут утром отправлять своих слуг в Баден за свежими «испанскими булочками» - знаменитыми сладкими булочками от известного баденского пекаря. Промышленники весьма довольны новой железнодорожной линией."
 academics_ferrovia_torino_desc_title_loc: "Железная дорога Турин-Генуя была официально открыта на церемонии, где [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'присутствовала', 'присутствовал')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting]. Эта линия - шедевр итальянской инженерии. Двухпутная дорога длиной 169 километров имеет более 30 мостов, а тоннель Джови длиной 3259 метров является самым длинным тоннелем в мире.\nНадеемся, что эта линия ускорит перемещение товаров и пассажиров между Турином и Генуей и поспособствует развитию нашей промышленности. Очевидно, наши капитаны промышленности в восторге от первой железнодорожной линии."
 academics_generic_desc_loc: "Строительство нашей первой железнодорожной линии было нелёгким и недешёвым. Но благодаря превосходной [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting|l]ой инженерной мысли оно было завершено в рекордно короткие сроки. Промышленники очень довольны, так как эта линия обеспечивает им быстрый способ перевозки товаров и ресурсов."
 academics.2401.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_railway_line_flavor_custom_loc')]"
 academics_spanisch_broetli_flavor_loc: "Аппетитный запах «испанской булочки» щекочет вам ноздри. Восхитительная выпечка была доставлена первым поездом Швейцарии, соединившим Цюрих с городом Баден.\n\n#b Историческая справка:#! Железная дорога из Цюриха в Баден была достроена в 1847 году, незадолго до гражданской войны в Швейцарии - «Зондербундской войны». Четыре локомотива обеспечивали четыре рейса в день. Они могли преодолеть 23 километра примерно за 45 минут. Швейцарская Северная железная дорога, как она официально называлась, имела небольшой экономический успех, и вскоре планы по расширению до Арау были отменены, а один из ежедневных рейсов был снят.\n\nРеконструкция «Spanisch-Brötli-Bahn» существует и по сей день и иногда используется как исторический поезд на современных железнодорожных путях Швейцарии."
 academics_ferrovia_torino_genova_flavor_loc: "Архиепископ Генуи освятил первый локомотив. Затем этот гигант тронулся с места. Это был первый поезд, который должен был отправиться из Генуи в Турин.\n\n#b Историческая справка:#! Эта линия стала первой железной дорогой в Сардинском королевстве. Её строительство было заказано королём Карлом Альбертом I 18 июля 1844 года. Ещё до завершения строительства первые участки линии последовательно открывались в однопутном варианте. 6 декабря 1853 года линия была официально открыта.\nЖелезнодорожная линия быстро стала самой используемой в Италии, особенно благодаря тому, что она позволяла перевозить товары из порта Генуи. В 1889 году была построена альтернативная линия через перевал Джови с меньшими уклонами, чем у старой.\nВ 1898 году в тоннеле Джови задохнулась бригада поезда, и локомотив продолжил движение без машиниста. Он протаранил ожидающий поезд, в результате чего погибло 13 человек. После этого линия была электрифицирована."
 academics_generic_flavor_loc: "Давно пора было обзавестись собственной железнодорожной линией! Мы сильно отстаём от конкурентов! Теперь мы наконец-то сможем достойно перевозить всю нашу продукцию!"
 academics.2401.g: "Да, мы сможем!"
 academics.2402.t: "Нам не удалось построить нашу первую железнодорожную линию"
 academics.2402.d: "Прошло 5 лет с тех пор, как промышленники попросили нас построить первую железнодорожную линию в нашей стране. Мы не смогли закончить её вовремя. Безусловно, это повлияет на отношение промышленников к нашему правительству."
 academics.2402.f: "Вы даже не можете построить железнодорожную линию. Ваше правительство - абсолютный провал. Позор вам!"
 academics.2402.g: "Нет, не смогли."
