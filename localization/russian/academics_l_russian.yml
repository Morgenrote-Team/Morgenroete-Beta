 academics_society_visit_status_tt: "Взгляните на текущие, признанные на международном уровне научные теории"
 academics.91.t: "Научные теоремы"
 academics.91.d: "Научное сообщество считает справедливыми следующие теоремы. Однако они могут быть изменены на научном конгрессе."
 academics.91.history: "#T История#!\n"
 academics.91.exodus_default: "Библия является полезным #YELLOW первоисточником#!."
 academics.91.exodus_merit: "Библия не является первоисточником, но это полезный #YELLOW вторичный источник#!."
 academics.91.exodus_invention: "Библия #YELLOW бесполезна#! как источник и, следовательно, не нужна для исследований."
 academics.91.civilization_default: "\n#YELLOW Египет#! — древнейшая цивилизация."
 academics.91.civilization_panbabylonism: "\n#YELLOW Вавилон#! — древнейшая цивилизация. Все культурные достижения и идеи исходят от него."
 academics.91.civilization_antipanbabylonism: "\nВавилония — важная колыбель человечества, но существуют #YELLOW параллельные ветви развития#!."
 academics.91.troy_default: "\nТроя — это #YELLOW миф#!."
 academics.91.troy_homeric: "\nГомеровские эпосы о Трое описывают #YELLOW исторические события#!."
 academics.91.troy_historical: "\nГомеровские эпосы о Трое имеют #YELLOW зерно истины#!."
 academics.91.troy_myth: "\nТроя — это #YELLOW миф#!."
 academics.91.troy_disputed: "\nУчёные споры о Трое остаются #YELLOW неразрешёнными#!."
 academics.91.natural_history: "\n\n#T Естественная история#!"
 academics.91.hippocampus_default: "\nМесто человека в царстве животных #YELLOW не определено#!."
 academics.91.hippocampus_unique: "\nВ царстве животных человек #YELLOW уникален#!."
 academics.91.hippocampus_primate: "\nВ царстве животных человек #YELLOW ближе всего к обезьянам#!."
 academics.91.origin_default: "\nПроисхождение современного человека #YELLOW неизвестно#!."
 academics.91.origin_europe: "\nПроисхождение современного человека заложено в #YELLOW Европе#!."
 academics.91.origin_asia: "\nПроисхождение современного человека заложено в #YELLOW Азии#!."
 academics.91.origin_africa: "\nПроисхождение современного человека заложено в #YELLOW Африке#!."
 academics.91.extinction_default: "\nПричина вымирания динозавров #YELLOW неизвестна#!."
 academics.91.extinction_asteroid: "\n#YELLOW Падение астероида#! привело к вымиранию динозавров."
 academics.91.extinction_climate: "\n#YELLOW Изменение климата#! ответственно за вымирание динозавров."
 academics.91.extinction_sex: "\nДинозавры вымерли, потому что они просто #YELLOW больше не хотели заниматься сексом#!. Прямо как жена профессора Тоттенхэма."
 academics.91.extinction_mammals: "\n#YELLOW Конкуренция с млекопитающими#! и их предпочтение яйцам динозавров привели к вымиранию последних."
 academics.91.extinction_fat: "\nДинозавры стали #YELLOW слишком большими и толстыми#! (патологический гигантизм) и, достигнув эволюционного тупика, в конечном итоге вымерли."
 academics.91.extinction_stupid: "\nДинозавры вымерли, потому что #YELLOW их мозг со временем уменьшился, и они стали слишком глупы, чтобы выжить#!."
 academics.91.astronomy: "\n\n#T Астрономия#!"
 academics.91.ceres_default: "\nВ Солнечной системе #YELLOW [GetGlobalVariable('verrier_planets_number').GetValue]#! планет."
 academics.91.ceres_demoted: "\nВ Солнечной системе #YELLOW [GetGlobalVariable('verrier_planets_number').GetValue]#! планет. Церера — всего лишь астероид."
 academics.91.ceres_saved: "\nВ Солнечной системе #YELLOW [GetGlobalVariable('verrier_planets_number').GetValue]#! планет. Церера — одна из них."
 academics.91.galaxies_default: "\nТуманности, такие как Туманность Андромеды, #YELLOW остаются загадкой#!."
 academics.91.galaxies_no: "\nМлечный Путь охватывает #YELLOW всю вселенную#!. Явления вроде Туманности Андромеды — это #YELLOW просто газовые облака#!."
 academics.91.galaxies_yes: "\nМлечный Путь — это всего лишь #YELLOW одна из многих галактик#!, составляющих вселенную. Явления вроде Туманности Андромеды на самом деле являются #YELLOW другими галактиками#!."
 academics.91.sun_default: "\nСолнце находится в #YELLOW центре Вселенной#!."
