 ademics_our_own_dinosaur_modifier: "Наш новый динозавр"
 ademics_no_dinosaur_modifier: "Нет динозавра"
 academics.2303_goal_tt: "Соорудить#G 1#! [concept_dubois_dinosaur_skeleton]"
 academics.2303_reward_tt: "В награду Интеллигенты получат #p 5 Одобрения#!, и вы получите #p 5%#! больше престижа на 4 года. Мы также получим средний объем технологических инвестиций."
 je_academics_giant_of_the_past: "Палеонтологический фокус: гигант прошлого"
 je_academics_giant_of_the_past_reason: "[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] просит собрать [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] и восстановить [concept_dubois_dinosaur_skeleton]. В каком он состоянии — второстепенно, главное, чтобы у нас был роскошный экспонат в нашей коллекции. Кости динозавров находят в Великих Формациях. Если у нас нет такой на нашей территории, было бы выгодно иметь [concept_dubois_paleontological_licence], чтобы наш палеонтолог мог искать за границей."
 academics.2303.t: "Гигант прошлого"
 academics.2303.d: "Некоторые ведущие ученые выразили сожаление по поводу того, что, несмотря на наши палеонтологические достижения, нам еще предстоит продемонстрировать полный скелет динозавра. Наше научное сообщество также выразило глубокое сожаление по поводу этой печальной ситуации в письме и хотело бы, чтобы эта ситуация была исправлена."
 academics.2303.f: "МЫ ХОТИМ ДИНОЗАВРА, И МЫ ХОТИМ ЕГО СЕЙЧАС!\n\nПодписано, членами [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2303.g: "Превосходная инициатива!"
 academics.2303.h: "Это не парк развлечений для мальчиков, а научный институт."
 academics.2304.t: "Ужасный ящер"
 academics.2304.d: "Новый динозавр - самый впечатляющий экспонат палеонтологической коллекции. Каждый день на выставку приходят новые посетители, чтобы увидеть скелет."
 academics.2304.f: "Можем мы получить ещё одного?\n\nПодписано, членами [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2304.g: "Наш собственный динозавр!"
 academics.2305.t: "Нет ящера"
 academics.2305.d: "Площадка, отведенная для запланированного размещения скелета динозавра, остается пустой. Научное сообщество отреагировало на это с большим раздражением."
 academics.2305.f: "Нам нужно быть ещё яснее?\n\nПодписано, членами [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2305.g: "Найдите другую игрушку!"
 academics.2306_goal_tt: "Найти #G 3#! #O особые окаменелости#!"
 academics.2306_reward_tt: "В награду наш [concept_dubois_paleontologist] получит #p 50 опыта#! Если у нас ещё нет [concept_dubois_paleontologist], мы его получим. Мы также получим большое технологическое вложение."
 je_academics_special_fossils: "Палеонтологический фокус: особые окаменелости"
 je_academics_special_fossils_reason: "Особые окаменелости - это уникальные окаменелости, которые рассматриваются отдельно из-за их исключительного статуса. К ним относятся переходные формы, такие как археоптерикс или ихтиостега, а также крупные вымершие виды млекопитающих, такие как гигантский ленивец мегатерий или дельфиноподобный ихтиозавр. Но более мелкие окаменелости, которые используются для определения эпохи, - наиболее известные из них - аммониты и трилобиты - также относятся к этой категории. Всего существует дюжина особых окаменелостей, которые можно найти не только в формациях, но и в научных экспедициях."
 je_academics_special_fossils_success: "Найти #G 3#! #O особые окаменелости#!"
 academics.2306.t: "Экстраординарные окаменелости"
 academics.2306.d: "Научное общество обратилось к нам с необычной просьбой относительно необычных окаменелостей."
 academics.2306.f: "История происхождения животных - это тайна природы, которую наши исследователи раскрывают с каждым днем все больше. Особую роль играют те формы, которые находятся на границе между видами, так называемые \"недостающие звенья\". В то же время на нашей планете есть необычные существа, которым не обязательно быть динозаврами, чтобы произвести впечатление: вымершие млекопитающие, такие как саблезубые тигры или гигантские ленивцы. Если бы мы собрали хотя бы 3 особенных окаменелости, мы могли бы еще больше укрепить репутацию нашего института в мире..\n\nПодписано, членами [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2306.g: "Особые окаменелости для особой коллекции."
 academics.2306.h: "Не можем ли мы сосредоточить наши научные мощности на чём-то более значимом?"
 academics.2307.t: "Потрясающая коллекция окаменелостей"
 academics.2307.d: "Нет сомнений в том, что Национальный палеонтологический институт обладает одной из самых важных международных коллекций. Вряд ли найдется место, сравнимое с такими необычными экспонатами."
 academics.2307.f: "Особые окаменелости не всегда могут быть такими впечатляющими, как может показаться на первый взгляд, но они имеют огромную научную ценность. Поэтому Научное общество отправило вам благодарственное письмо. В ближайшие дни состоится специальная выставка."
 academics.2307.g: "Великолепно."
 academics.2308.t: "Особое разочарование"
 academics.2308.d: "Научное сообщество выразило обеспокоенность в связи с последней палеонтологической неудачей."
 academics.2308.f: "То, что проблемы естественной истории в стране полностью игнорируются, является национальной трагедией. Палеонтологические исследования о мертвых птицах и ящерицах отвергаются как бессмыслица, выплаты на специальные экспедиции производятся редко, и игнорируются даже самые незначительные пожелания. Я обвиняю!\n\nПодписано, членами [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2308.g: "О, боже."
 ademics_no_paleontological_hero_modifier: "Нет Героя Палеонтологии"
 academics.2309_goal_tt: "Есть #o известного#! [concept_dubois_paleontologist]"
 academics.2309_reward_tt: "В награду мы получим #p 120#! [concept_academics_progress]."
 je_academics_famous_paleontologist: "Палеонтологический фокус: известный палеонтолог"
 je_academics_famous_paleontologist_reason: "Восхождение [concept_dubois_paleontologist] сопровождается повышением его квалификации. Как и любой ученый, палеонтолог ежегодно получает 5 очков опыта. Он приобретает дополнительный опыт успешного палеонтологического исследования формаций. Кроме того, палеонтолога можно использовать в альпинистских экспедициях и тихоокеанских экспедициях. Успешное конструирование и повторная сборка скелетов динозавров также помогает расширить опыт палеонтолога."
 academics.2310.g: "Вдохновение для молодёжи."
 academics.2311.t: "Нет Героя Палеонтологии"
 academics.2311.d: "По какой-то причине мы не смогли продвинуть палеонтолога и позволить ему добиться мировой известности."
 academics.2311.f: "К сожалению, неудача привела к тому, что научные дисциплины по-прежнему игнорируются как предметы для изучения орхидей, а энтузиазм к академическому обучению и активной исследовательской работе ограничен. Члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] ощущают недовольство в разговорах. Интеллектуальная элита винит правительство в этой ситуации."
 academics.2311.g: "Разочаровывающе."
 academics_splendid_dinosaur_collection_modifier: "Великолепная коллекция динозавров"
 academics.2312_goal_tt: "Иметь #o рейтинг динозавров#! не менее #G 5 #!"
 academics.2312_reward_tt: "В награду Интеллигенты получат #p 5 одобрения#!. Дополнительно, вы получите #p 10%#! больше престижа и стоимость общественных технологий будет снижена на #p 5%#! на 10 лет."
 je_academics_dinosaur_rating: "Палеонтологический фокус: рейтинг динозавров"
 je_academics_dinosaur_rating_reason: "Для улучшения #O рейтинга динозавров#! нужны не только новые скелеты динозавров, но и их идеальная реконструкция. Это может занять годы. Поэтому [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] решила не устанавливать временных ограничений."
 je_academics_dinosaur_rating_success: "Иметь #o рейтинг динозавров#! не менее #G 5 #!"
 academics.2312.t: "Великолепие палеонтологии"
 academics.2312.d: "Палеонтологическое направление наших научных исследований уже имеет хорошую репутацию. Теперь пришло время сделать его известным во всем мире, значительно улучшив нашу выставку динозавров."
 academics.2312.f: "Возможно, мы хотели бы показать на нашей выставке другого динозавра. Большее количество скелетов пошло бы на пользу не только научным исследованиям, но и репутации нашей страны. Весь мир занимается раскопками костей динозавров и увлечен ранее неизвестной доисторической историей. Дело должно быть не только в количестве, но и в качестве. Мы должны стремиться быть лидерами в области реконструкции скелетов динозавров.\n\nПодписано, членами [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2312.g: "Это будет колоссальное предприятие!"
 academics.2312.h: "Только не эта палеонтологическая чепуха снова."
 academics.2313.t: "Великолепная коллекция"
 academics.2313.d: "Научное общество с гордостью объявило сегодня о специальной выставке скелетов динозавров."
 academics.2313.f: "Мы глубоко признательны правительству за то, что у нас наконец-то появилась коллекция динозавров, которая подчеркивает высокий уровень палеонтологических исследований в нашей стране. Вряд ли есть более изысканные коллекции, чем эта. Это потребовало большого труда и стараний, а также жажды исследований и настойчивости. Общество может смотреть на эту работу с гордостью, в то время как за рубежом на нее смотрят с завистью. Джентльмены: это великий день для науки в целом и палеонтологии в частности!\n\nПодписано, членами [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2313.g: "Замечательно!"
