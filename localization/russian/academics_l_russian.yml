 academics.21.t: "Наш [concept_tesla_engineer] умер"
 academics.21.d: "После десятилетий работы в качестве [Concept('concept_tesla_engineer', 'инженера')] наш бывший #b #ORANGE главный инженер#!#! умер. Сможем ли мы когда-нибудь заменить такого удивительного ученого?"
 academics.21.g: "Это невосполнимая потеря!"
 academics.21_tt: "Иногда игра убивает персонажей. Мод не может предотвратить это. Это событие удаляет роль этого учёного из игры, чтобы вы не были преследуемы его призраком."
 academics.22.t: "Наш [Concept('concept_verrier_astronomer', 'астроном')] умер"
 academics.22.d: "Проведя десятилетия как [Concept('concept_verrier_astronomer', 'астроном')], наш бывший #b #ORANGE главный астроном#!#! скончался. Сможем ли мы когда-нибудь заменить такого поразительного учёного?"
 academics.26.t: "Наш [Concept('concept_dubois_naturalist', 'натуралист')] умер"
 academics.26.d: "Проведя десятилетия как [Concept('concept_dubois_naturalist', 'натуралист')], наш бывший #b #GREEN главный натуралист#!#! скончался. Сможем ли мы когда-нибудь найти ему замену? "
 academics.27.t: "Наш [Concept('concept_dubois_paleontologist', 'палеонтолог')] умер"
 academics.27.d: "Проведя десятилетия как [Concept('concept_dubois_paleontologist', 'палеонтолог')], наш бывший #b #GREEN главный палеонтолог#!#! скончался. Сможем ли мы когда-нибудь заменить такого поразительного учёного?"
 academics.29.t: "Наш [Concept('concept_lepsius_archaeologist', 'археолог')] умер"
 academics.29.d: "Проведя десятилетия как [Concept('concept_lepsius_archaeologist', 'археолог')], наш бывший #b #BLUE главный археолог#!#! скончался. Сможем ли мы когда-нибудь заменить такого поразительного учёного?"
