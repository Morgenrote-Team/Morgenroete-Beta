 academics.2.d: "Проведя десятилетия своей жизни, открывая новые звёзды, туманности и другие астрономические явления, [SCOPE.sCharacter('academics_retired_person_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('academics_retired_person_scope').IsFemale, 'решила', 'решил')] уйти на покой. [SCOPE.sCharacter('academics_retired_person_scope').GetSheHe|U] больше не будет работать нашим [Concept('concept_verrier_astronomer', '#b #ORANGE астрономом#!#!')]."
