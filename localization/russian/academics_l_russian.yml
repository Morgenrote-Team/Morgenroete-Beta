 academics.2117.t: "Чудесная коллекция артефактов"
 academics.2117.d_rival: "Мы собрали большую коллекцию артефактов, чем наш соперник [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName]. Организация [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] и наше население воодушевлены этой победой нашей страны!"
 academics.2117.d_rival_gone: "Наш соперник повержен. Организация [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] и наше население взволнованы этой победой нашей нации!"
 academics.2117.f: "Должно быть очевидно, что наша страна должна иметь лучшую археологическую коллекцию, чем эти варвары. Организация [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] довольна этой коллекцией. Хотя есть еще артефакты, которые нужно спасти от этих необразованных дикарей.\n\nЧлены организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2117.g: "Так много спасённых древностей!"
 academics.2118.t: "Нам не удалось расширить нашу археологическую коллекцию"
 academics.2118.d: "Мы не смогли расширить нашу археологическую коллекцию дальше, чем наши соперники в [ROOT.Var('je_artifacts_rival_nation_var').GetCountry.GetName]. Члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] utterly разочарованы."
 academics.2118.f: "Грязные руки этих дикарей пачкают саму историю человечества. Как вы могли позволить всем этим артефактам быть разграбленными этими расхитителями гробниц?! Так много знаний будет потеряно, потому что они скорее хотят сокровища, чем сохранить нашу историю. Отвратительно!\n\n[SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2118.g: "Нам не нужны эти пыльные артефакты."
 academics.2200.t: "Нам нужно найти больше образцов, чем [SCOPE.sCountry('rival_scope').GetName]"
 academics.2200.d: "Члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] недовольны тем, что [SCOPE.sCountry('rival_scope').GetName] собирает больше [Concept('concept_dubois_specimen','$concept_dubois_specimens$')], чем наша нация. Они просят нас найти в общей сложности больше #b Образцов#!, чем [SCOPE.sCountry('rival_scope').GetName] за 10 лет."
 academics.2200.f: "Наши Коллекции Образцов — ничто по сравнению с теми, что в [SCOPE.sCountry('rival_scope').GetName]. У них есть все, о чем мы мечтаем! Я даже слышал, что у них есть гигантский цветок, пахнущий, как гнилые трупы. Наша гордость - оранжевые бабочки. Нам нужно найти новые экземпляры, которых до нас никто не находил! Иначе они могут попасть в руки этих мясников! \n\nС уважением, члены [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2200_goal_tt: "Вам предстоит собрать больше [Concept('concept_dubois_specimen','$concept_dubois_specimens$')], чем ваш соперник, [SCOPE.sCountry('rival_scope').GetName], за #n 10#! лет. У них [GetPlayer.MakeScope.Var('je_specimen_rival_nation_var').GetVariable('dubois_specimen').GetValue|0+], у нас [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]."
 academics.2200_reward_tt: "В качестве награды Интеллигенты получат #p 5 одобрения#!, а вы получите на #p 10%#! больше престижа в течение 4 лет."
 academics.2200.g: "Нам нужно немедленно отправить нашего натуралиста!"
 academics.2200.h: "Какая пустая трата времени!"
 academics_no_competition_with_rival_specimen: "Утеря интереса к образцу"
 academics_competition_with_rival_won_specimen: "Выиграна гонка за образцом"
