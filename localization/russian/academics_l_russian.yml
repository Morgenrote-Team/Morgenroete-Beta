 academics.21.t: "Наш [concept_tesla_engineer] скончался"
 academics.21.d: "Проведя десятилетия в качестве [Concept('concept_tesla_engineer', '#b #ORANGE инженера#!#!')], наш бывший #b #ORANGE главный инженер#!#! скончался. Сможем ли мы когда-нибудь заменить столь выдающегося учёного?"
 academics.21.g: "Это огромная потеря!"
 academics.21_tt: "Иногда игра убивает персонажей. Мод не может это предотвратить. Это событие удаляет роль учёного из игры, чтобы вас не преследовал его призрак."
 academics.22.t: "Наш [concept_verrier_astronomer] скончался"
 academics.22.d: "Проведя десятилетия в качестве [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')], наш бывший #b #ORANGE главный астроном#!#! скончался. Сможем ли мы когда-нибудь заменить столь выдающегося учёного?"
 academics.26.t: "Наш [concept_dubois_naturalist] скончался"
 academics.26.d: "Проведя десятилетия в качестве [Concept('concept_dubois_naturalist', '#b #GREEN натуралиста#!#!')], наш бывший #b #GREEN главный натуралист#!#! скончался. Сможем ли мы когда-нибудь заменить столь выдающегося учёного?"
 academics.27.t: "Наш [concept_dubois_paleontologist] скончался"
 academics.27.d: "Проведя десятилетия в качестве [Concept('concept_dubois_paleontologist', '#b #GREEN палеонтолога#!#!')], наш бывший #b #GREEN главный палеонтолог#!#! скончался. Сможем ли мы когда-нибудь заменить столь выдающегося учёного?"
 academics.29.t: "Наш [concept_lepsius_archaeologist] скончался"
 academics.29.d: "Проведя десятилетия в качестве [Concept('concept_lepsius_archaeologist', '#b #BLUE археолога#!#!')], наш бывший #b #BLUE главный археолог#!#! скончался. Сможем ли мы когда-нибудь заменить столь выдающегося учёного?"
 academics.30.t: "Наш [concept_andersson_anthropologist|l] скончался"
 academics.30.d: "Проведя десятилетия в качестве [Concept('concept_andersson_anthropologist', '#b #BLUE антрополога#!#!')], наш бывший #b #BLUE главный антрополог#!#! скончался. Сможем ли мы когда-нибудь заменить столь выдающегося учёного?"
