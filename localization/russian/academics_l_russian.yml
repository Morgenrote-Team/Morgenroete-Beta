 country_academics_decorative_excavation_add_desc: "Количество прогресса, которое вы получаете от уровней сооружений «[GetBuildingType('building_university').GetName]», где используется [concept_pm_academics_university_humanities|l] для некоторых археологических раскопок."
 country_academics_decorative_natural_history_project_add: "Прогресс для проектов по естествознанию"
 country_academics_decorative_natural_history_project_add_desc: "Количество прогресса, которое вы получаете от уровней сооружений «[GetBuildingType('building_university').GetName]», где используется [concept_pm_academics_university_natural_history|l] для проектов по естествознанию. К таким проектам относятся: палеонтологические экспедиции, проекты по улучшению натуралиста, документирование местных животных и проекты по улучшению геолога."
 country_academics_decorative_animal_breeding_progress_add: "Прогресс для разведения животных"
 country_academics_decorative_animal_breeding_progress_add_desc: "Количество прогресса, которое вы получаете от уровней сооружений «[GetBuildingType('building_university').GetName]», где используется [concept_pm_academics_university_natural_history|l] для разведения [Concept('concept_dubois_zoo_animal','экзотических животных')]."
 country_academics_decorative_mathematical_project_add: "Прогресс для математико-технических проектов"
 country_academics_decorative_mathematical_project_add_desc: "Количество прогресса, которое вы получаете от уровней сооружений «[GetBuildingType('building_university').GetName]», где используется [concept_pm_academics_university_mathematics|l] для математико-технических проектов. К таким проектам относятся: проекты [Concept('concept_tesla_engineering', 'инженерного дела')], проекты по улучшению [Concept('concept_mendelejew_chemist', '#b #ORANGE химика#!#!')], а также теоретизирование, открытие и выделение [Concept('concept_mendelejew_element','элементов')]."
 academics.121.d: "После многих лет работы в больницах, лабораториях и других учреждениях ради спасения жизней наш [concept_panum_physician|l] д-р [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] теперь [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'знаменита', 'знаменит')] в мире медицины!"
 academics.102.d: "Проведя сотни ночей в обсерватории, наблюдая за небом, наш [concept_verrier_astronomer|l] д-р [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'набралась', 'набрался')] опыта!"
