 je_academics_first_railway: "Фокус на промышленность: построить первую железную дорогу [SCOPE.GetRootScope.GetCountry.GetName]"
 je_academics_first_railway_reason: "Теперь, когда изобретение железной дороги распространилось на [SCOPE.GetRootScope.GetCountry.GetName], многие наши промышленники хотят, чтобы мы создали такое устройство, которое упростило бы транспортировку грузов. Это помогло бы нам стать мощным промышленным центром."
 academics.2400.t: "Нам нужны железные дороги!"
 academics.2400.d: "Железные дороги облегчают транспортировку грузов. Поэтому представители отраслей промышленности [SCOPE.GetRootScope.GetCountry.GetName] требуют строительства железной дороги в нашей стране в ближайшие 5 лет."
 academics.2400.f: "\"Мы по-прежнему перевозим нашу продукцию по грунтовым дорогам и рекам. Такая ситуация неприемлема. Если бы у нас был лучший способ транспортировки товаров и ресурсов, наша прибыль взлетела бы до небес, и мы могли бы построить больше заводов, что привело бы к улучшению условий жизни для всех. Постройте железную дорогу прямо сейчас!\""
 academics.2400.g: "Можем ли мы его построить?"
 academics_industrialists_happy_modifier: "Промышленники довольны"
