 academics.2101.t: "Организация [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] требует музей"
 academics.2101.d: "Будучи одной из самых могущественных держав мира, мы до сих пор не овладели престижными открытиями в области археологии. Поэтому организация [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] просит нас построить археологический музей. "
 academics.2101.f: "Организация [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] просит вас усилить внимание к археологии. Изучение прошлого, открытие забытых культур и восстановление ценных артефактов имеет первостепенное значение как для науки, так и для национального престижа.\nИсходя из этого, мы просим вас основать археологический музей, чтобы преумножать, передавать и сохранять знания, а также выдающиеся произведения искусства древних культур.\n\nС уважением, высший совет организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2101.g: "Мы отправимся на поиски сокровищ!"
 academics.2101.h: "Нет необходимости в пыльном музее."
 academics.2101_goal_tt: "Вам нужно будет собрать #p 5#! [Concept('concept_lepsius_artifact','артефактов)] и построить археологический музей в течение #n 10#! лет."
 academics.2102.t: "Открытие археологического музея"
 academics.2102.d: "Представители организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], похоже, были очень довольны открытием археологического музея сегодня."
 academics.2102.f: "В организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] с радостью узнали, что новый музей открыт для публики, и теперь множество граждан могут наслаждаться найденными нами артефактами, имеющими огромную научную ценность. Однако, поскольку это лишь начало, мы уже договорились с директором музея, чтобы он напомнил о необходимости будущего пополнения коллекции артефактов. Он, разумеется, также является членом нашего светлого общества.\n\nСовет организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2102.g: "Теперь нам нужно что-то ещё..."
 academics.2103.t: "Археологический позор"
 academics.2103.d: "К великому разочарованию организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], сегодня было отмечено, что, несмотря на обещание способствовать развитию археологии нашего государвства, в этом направлении не было сделано ни-че-го..."
 academics.2103.f: "Мы, члены организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], глубоко огорчены пренебрежением со стороны правительства. Разве столь скромное учреждение, как музей, является настолько чрезмерной просьбой?\n\nС уважением, совет организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]."
 academics.2103.g: "Кому, собственно, нужен этот пыльный музей?"
 academics.2104.t: "Директор музея предлагает выставку, посвящённую Египту"
 academics.2105.t: "Директор музея предлагает выставку, посвящённую Месопотамии"
 academics.2106.t: "Директор музея предлагает провести выставку, посвящённую Эгейскому региону"
 academics.2107.t: "Директор музея предлагает провести выставку, посвящённую доколумбовым культурам"
 academics.2104.d: "Директор археологического музея предупредил, что наш музей может отстать в международном сравнении, если мы срочно не соберём недостающие артефакты в одной выставке."
 academics.2104.f: "Как гордый член организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], с сожалением отмечаю пренебрежение нашим прекрасным музеем. Весь мир собирает египетские артефакты, недавно я слышал о статуе кошки Бастет из-за границы. Абсолютная новинка, скажу вам! Говорят, она даже розовая. А у нас даже нет достаточного количества скарабеев для того, чтобы организовать достойную выставку. Если мы не соберём достаточно артефактов для выставки среднего размера в ближайшее время, я пессимистично настроен относительно будущего археологии в нашей стране.\n\nС уважением, Директор археологического музея"
 academics.2105.f: "Как ярый член организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], с сожалением отмечаю пренебрежение нашим уважаемым музеем. Артефакты Месопотамии сейчас на пике моды, и великие нации не могут насытиться ими. Конечно, я считаю, что ценность Ламассу определяет не его величина, а то, как им пользуются. Однако у нас даже нет достаточного количества клинописных табличек для того, чтобы организовать достойную выставку. Если мы не соберём достаточно артефактов для выставки среднего размера в ближайшее время, я пессимистично настроен относительно будущего археологии в нашей стране.\n\nС уважением, Директор археологического музея"
 academics.2106.f: "Как важный член организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], с сожалением отмечаю пренебрежение нашим прекрасным музеем. Артефакты Эгейского региона пользуются огромным спросом, и это видно по последним годам. Гомеровские эпопеи стали популярной темой с тех пор, как Троя была заново открыта, и теперь каждый новоявленный буржуа имеет в своём саду антикварную статую. А мы? У нас нет даже нескольких жалких микенских погребальных предметов, чтобы показать народу! Если мы не соберём достаточно артефактов для выставки среднего размера в ближайшее время, я пессимистично настроен относительно будущего археологии в нашей стране.\n\nС уважением, Директор археологического музея"
 academics.2107.f: "Как прекрасный член организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], я сожалею о пренебрежении нашим важнейшим музеем. \"Маянизм\" не знает границ. Эзотерические члены нашего общества тратят огромные средства, чтобы заполучить самые экзотические экспонаты из Центральной и Южной Америки. Грабёж могил и уничтожение ценных исторических артефактов идут полным ходом. Я слышал, что один из руководителей экспедиции даже собирался переместить пирамиды Тикаля! В то время как мы, с другой стороны, не можем даже собрать несколько оккультных каменных масок, чтобы пугать детишек в музее. Если мы не соберем достаточно артефактов для небольшой выставки в ближайшее время, я пессимистично настроен относительно будущего археологии в нашей стране.\n\nС уважением, Директор археологического музея"
 academics.2104.g: "Удача и слава!"
 academics.2104.h: "У нас есть дела поважнее, чем поиск сокровищ."
 academics.2108.t: "Новая археологическая коллекция"
 academics.2108.d: "Директор музея выразил свою радость от того, что его обеспокоенность по поводу новых артефактов была услышана, и сообщил своим друзьям в организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')], что вскоре в музее откроется новая выставка."
 academics.2108.f: "Научное сообщество благодарит правительство за помощь в повышении научной репутации страны. Такое множество новых артефактов является выражением мастерства и неустанного исследовательского порыва лучших мужчин и женщин этой страны. \n\nСовет организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2108.g: "Успех!"
 academics.2109.t: "Археологическое разочарование"
 academics.2109.d: "Поражённый, озадаченный и шокированный отказом от его настоятельных просьб, директор музея удалился в свой кабинет, рыдая, заперся и отказывается говорить с кем-либо."
 academics.2109.f: "Хорошая работа... В последний раз, когда директор музея был в таком состоянии, он чуть не выкинулся из окна. Это действительно жестоко, то, как некоторые правительственные чиновники ведут себя. Он же просто хотел несколько артефактов... Несколько жалких, старых артефактов! У него нет ничего в мире, кроме пылящихся статуэток и разбитых ваз! Надеюсь, вы теперь довольны. Бедный человек опустошён. \n\nЧлены совета организации [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')]"
 academics.2109.g: "Провал..."
 academics.2104_goal_tt: "Вам нужно будет собрать #p 25#! египетских [Concept('concept_lepsius_artifact','артефактов')] за #n 15#! лет."
 academics.2105_goal_tt: "Вам нужно будет собрать #p 25#! месопотамских [Concept('concept_lepsius_artifact','артефактов)] в течение #n 15#! лет."
 academics.2106_goal_tt: "Вам нужно будет собрать #p 25#! эгейских [Concept('concept_lepsius_artifact','артефактов')] за #n 15#! лет."
 academics.2107_goal_tt: "Вам нужно будет собрать #p 25#! доколумбовых [Concept('concept_lepsius_artifact','артефактов)] в течение #n 15#! лет."
 je_academics_found_archaeological_museum: "Фокус на археологии: Основать музей"
 je_academics_found_archaeological_museum_reason: "Организация [SCOPE.GetRootScope.GetCountry.GetCustom('academics_scientific_society_name_custom_loc')] хочет, чтобы мы построили археологический музей для повышения знаний, а также уровня жизни наших интеллектуалов. Для строительства музея необходимо собрать #p 5#! [Concept('concept_lepsius_artifact','артефактов')], которые должен найти [Concept('concept_lepsius_archaeologist', 'археолог')] в ходе экспедиций, если только нам не повезёт получить их случайно или раскопки непосредственно у нас в стране.\nЭто также очень важно, потому что профессиональное выражение \"Это должно быть в музее!\" не будет иметь смысла без настоящего музея.\nНа самом деле, это было бы довольно неловко..."
