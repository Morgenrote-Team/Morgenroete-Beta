 academics_good_to_be_british_modifier: "Хорошо быть британцем"
 academics_supported_hanover_modifier: "Поддержал Ганновер"
 academics_supported_goettinger_seven_modifier: "Поддержал Гёттингенскую семёрку"
 academics_kneeling_decree_modifer: "Указ о коленопреклонении"
