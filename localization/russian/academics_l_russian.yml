 academics.51.d_civil_engineer: "Доктор [SCOPE.sCharacter('tesla_new_engineer_scope').GetLastName] - многообещающий талант из научного сообщества. [SelectLocalization(SCOPE.sCharacter('tesla_new_engineer_scope').IsFemale, 'Она получила', 'Он получил')] квалификацию [Concept('concept_tesla_engineer', '#b #ORANGE инженера#!#!')] со специализацией в [Concept('concept_tesla_civil_engineer', 'гражданском строительстве')]."
