 academics.1010.t: "Женщины в науке?"
 academics.1010.d: "Несколько женщин подали заявления на обучение в одном из наших университетов. Теперь возник вопрос, законно ли это, и какова официальная позиция нашего правительства по поводу обучения женщин."
 academics.1010.f: "«Женский мозг создан не для логических мыслей, а скорее для эмоций. Их нельзя допускать к обучению!»\n\n«Вы просто боитесь, что женщина станет более способной учёной, чем вы. И это непременно случится, ведь ваши аргументы лишены всякого научного основания! Позвольте женщинам учиться на тех же условиях, что и мужчинам!»"
 academics.1010.g: "Пусть учатся!"
 academics.1010.h: "Постойте, разве до сих пор они не могли учиться?"
 academics.1010.i: "Место женщины - у очага!"
 academics.1011.t: "Блестящая женщина-учёный"
 academics.1011.d: "[SCOPE.sCharacter('academics_female_scientist').GetFullName] окончила один из наших университетов с отличием. В области, где доминируют мужчины, она смогла завершить учёбу в рекордно короткие сроки и горит желанием начать работать по специальности. Она блестящая..."
 academics.1011.f: "Мои искренние поздравления с вашим невероятным дипломом! Кто бы мог подумать, что женщина на такое способна!"
 academics.1011.g: "...инженер"
 academics.1011.h: "...астроном"
 academics.1011.i: "...натуралист"
 academics.1011.j: "...палеонтолог"
 academics.1011.k: "...археолог"
 academics.1011.l: "...антрополог"
 academics.1011.m: "Она нам не нужна."
