l_russian:
 pius_adopt_gregorian_calender_decision: "Принять григорианский календарь"
 pius_adopt_gregorian_calender_decision_desc: "Поскольку григорианский календарь действует в большинстве стран Европы, использование других календарей часто вызывает проблемы. Мы могли бы принять григорианский календарь, чтобы облегчить взаимодействие с европейскими странами."
 pius_non_gregorian_calender_modifier: "Не используется григорианский календарь"
 pius_new_calender_modifier: "Нечестивый календарь"
 pius_modernized_calender_modifier: "Модернизированный календарь"
