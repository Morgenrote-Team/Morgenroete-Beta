 pius.111.h_tt: "Высока вероятность дальнейших событий в связи с явлением Богородицы."
 pius.111.i_tt: "Очень высока вероятность кровавого столкновения."
 pius.121.h_tt: "Эта мера может иметь неизвестные, серьёзные последствия."
 pius.101.t: "Явление в Ла-Салетт"
 pius.101.d: "Двое детей в горах юго-восточной Франции утверждают, что стали свидетелями явления Девы Марии, что вызвало волну духовного энтузиазма - и беспокойства - во всём католическом мире."
 pius.101.f: "«Подойдите ближе, дети мои, не бойтесь. Я здесь, чтобы принести вам великую весть…»\n\nВысоко на альпийских пастбищах над деревней Ла-Салетт, близ Корпа на юго-востоке Франции, двое детей-пастухов сообщают о видении, которое теперь волнует сердца всего христианского мира. Им явилась дама, сияющая светом и облачённая в скорбь. Она плакала - слёзы падали за мир, отвернувшийся от Бога. Она говорила о богохульствах, произносимых без стыда, об осквернённых воскресеньях, о грядущем голоде и разрухе, если человечество не покается.\nТо, что сначала казалось деревенской легендой, превратилось в движение. Паломники стекаются к отдалённому горному склону. Монахи и журналисты поднимаются по тем же тропам. Церковь колеблется: одни принимают видение как божественный призыв к покаянию; другие опасаются роста народного мистицизма и иррационального пыла.\nЕпископ Гренобля выражает осторожное одобрение. Светские власти относятся к этому с подозрением.\nА Рим? Рим наблюдает - молча. Но колокола уже звонят."
 pius.101.g: "Небесное предупреждение."
 pius.101.h: "Сохранять здравомыслие."
 pius.102.t: "Явление в Лурде"
 pius.102.d: "В маленьком городке Лурд четырнадцатилетняя девочка утверждает, что видела сияющую даму в гроте. Её видения вскоре привлекают паломников, споры - и внимание Рима."
 pius.102.f: "«Она была молода, боса и бедна. Но она говорила о красоте, которую не могли описать никакие слова».\n\nВ отдалённом гроте близ Лурда, в предгорьях Пиренеев, крестьянская девочка по имени Бернадетта Субиру рассказывает о даме, одетой в белое, с голубым поясом и золотыми розами на ногах. Видение сначала ничего не говорит - только улыбается. Затем она говорит: о покаянии, о молитве, о страдании и о божественном милосердии. Она просто называет себя Непорочным Зачатием.\nСначала жители деревни насмехаются. Но когда Бернадетта обнаруживает скрытый источник и утверждает, что это источник исцеления, тысячи начинают прибывать - надеясь, молясь, плача. Костыли остаются позади. Свидетельства распространяются. Скептики осуждают истерию. Врачи, священники и политики съезжаются в Лурд.\nЦерковь проводит расследование. Государство настороженно наблюдает. А люди всё прибывают."
 pius.102.g: "Святыня исцеления и надежды."
 pius.102.h: "Галлюцинации!"
 pius.103.t: "Молчаливое видение в Ноке"
 pius.103.d: "В ирландской деревне Нок пятнадцать свидетелей сообщают о молчаливом явлении Девы Марии, святого Иосифа и святого Иоанна Евангелиста. Видение волнует народ, давно обременённый бедностью, изгнанием и иностранным правлением."
 pius.103.f: "«Они не сказали ни слова. Но в этой тишине нация услышала надежду».\n\nДождь неустанно лил над приходской церковью в Ноке, графство Мейо. И всё же пятнадцать жителей деревни стояли как зачарованные. Перед ними, залитое светом на южной фронтонной стене, стояло молчаливое собрание: Дева Мария в молитвенной позе; святой Иосиф рядом с ней; святой Иоанн Евангелист, в ризе и с Евангелием в руках. За ними - агнец на алтаре и крест.\nНе было сказано ни слова. Не было сделано ни одного движения. И всё же свидетели клялись тем, что видели, - и молодые, и старые, и мужчины, и женщины.\nВ стране, изнурённой голодом, эмиграцией и духовной тоской, молчаливое видение отозвалось громче проповедей. Вскоре прибыли паломники в поисках исцеления, знамений и утешения. Английские власти насмехались. Некоторые в Церкви колебались. Но среди бедных и благочестивых ирландцев Нок стал святым криком о достоинстве."
 pius.103.g: "Свет под дождём."
 pius.103.h: "Отмахнуться как от фольклора."
 pius.104.t: "Тайны Фатимы"
 pius.104.d: "В центральной Португалии трое детей-пастухов сообщают о неоднократных явлениях Девы Марии, кульминацией которых стало чудесное явление, свидетелями которого стали тысячи людей. Их видения несут пророчества о войне, страданиях и будущем Церкви."
 pius.104.f: "«В конце концов, моё Непорочное Сердце восторжествует».\n\nНедалеко от города Фатима, на сельских холмах Кова-да-Ирия, трое детей - Лусия, Франсишку и Жасинта - говорят о даме, ярче солнца, облачённой в сияние и скорбь. В течение шести месяцев она является снова и снова, предупреждая о мировой войне, росте безбожных идеологий и преследовании верующих. Она призывает к покаянию, молитве и посвящению России её сердцу.\n13 октября 1917 года, когда десятки тысяч людей стоят под проливным дождём, солнце, кажется, срывается с небес, вращаясь и падая на небосклоне. Некоторые падают на колени. Другие бегут. Когда свет гаснет, их одежда суха. Толпа расходится в тишине, в благоговении и страхе.\nЦерковь осторожна. Пресса разделена. Но среди людей - особенно бедных, раненых и верующих - зажигается новое пламя: надежды, предупреждения, которое видит в Деве не только мать, но и стражницу грядущей эпохи."
 pius.104.g: "Внять предупреждениям Фатимы."
 pius.104.h: "Развенчать солнечное чудо."
 pius.105.t: "Богоматерь из окрестностей [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]"
 pius.105.d: "В отдалённой деревне неподалёку от поселения [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] появляются сообщения о явлении Девы Марии. История быстро распространяется, привлекая паломников, скептиков и внимание церковных властей."
 pius.105.f: "«Она стояла над полями, в венце света, и смотрела на нас, словно знала скорбь каждой души».\n\nПервым заговорил ребёнок - глаза широко раскрыты от благоговения, голос дрожит. Он говорил о даме, ярче зари, облачённой в сияние и скорбь, которая явилась в тишине и смотрела на мир с глубокой, всезнающей печалью. Другие тоже утверждали, что видели её. Некоторые падали на колени. Другие бежали. Все запомнили наступившую тишину.\nИстория вышла за пределы деревни. Прибыли паломники со свечами в руках. Верующие молились. Страждущие надеялись. Священники спорили. Чиновники поднимали брови. Но люди продолжали приходить - влекомые не уверенностью, а чем-то более древним: потребностью верить.\nБудь то чудо, видение или миф, это событие уже изменило сердца тех, кто его видел, - и жизни тех, кто теперь должен решить, что оно означает."
 pius.105.g: "Знак для верующих."
 pius.105.h: "Подавить истерию."
 pius.111.t: "Непрошенная процессия"
 pius.111.d: "Несмотря на официальные приказы, запрещающие публичные демонстрации, толпа верующих начала стихийную процессию к месту явления Богородицы неподалёку от поселения [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]."
 pius.111.f: "«Мы не зажигали факелов, не несли знамён. Только чётки, тишина и наши ноги в пыли».\n\nОни пришли на рассвете, по двое и по трое, идя через поля и деревни, шепча молитвы. К полудню их были сотни, они текли по просёлочным дорогам, некоторые босиком, некоторые плача. Женщины держали цветы. Старики бормотали литании. Дети сжимали иконы, вырезанные из дерева.\nВласти объявили место закрытым. Солдаты стояли на страже. Но никто не остановил толпу. Возможно, это было пение. Возможно, тишина. Возможно, что-то невидимое.\nКогда верующие достигли места видения, они преклонили колени, пробормотали молитвы и зажгли свечи в земле. Никакой голос не прогремел с небес. Никакого чуда не было явлено. Но что-то уже изменилось. Народ действовал - не вопреки закону, а повинуясь чему-то более древнему, чем закон."
 pius.111.g: "Пусть молятся."
 pius.111.h: "Наблюдать молча."
 pius.111.i: "Разогнать их силой."
 pius.112.t: "Кровь на святой земле"
 pius.112.d: "Столкновение между властями и верующими на месте запрещённой процессии в честь Богородицы переросло в насилие. Земля, где видения когда-то внушали надежду, теперь несёт на себе следы крови."
 pius.112.f: "«Были молитвы, а потом были крики».\n\nСвечи ещё мерцали, когда прибыли солдаты. Голоса поднялись в замешательстве, затем в мольбе. Женщина упала. Мальчик вскрикнул. Никто не знает, кто отдал приказ, - но загремели мушкеты, засвистели дубинки, солдатские сапоги прошли по земле среди дыма благовоний. Когда тишина вернулась, она стала тяжелее, чем прежде.\nЦерковь потрясена. Верующие возмущены. Пресса говорит вполголоса - одни называют это несчастным случаем, другие - бойней. Место, когда-то считавшееся святым, теперь проклято памятью. И всё же люди собираются - не с цветами, а с гневом, с молчанием, с взглядом, который не в силах погасить ни один закон."
 pius.112.g: "Мы сожалеем о случившемся."
 pius.112.h: "Они сами навлекли это на себя."
 pius.113.t: "Голос с амвона"
 pius.113.d: "Местный священник, отец [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName], стал главным защитником явления Богородицы неподалёку от поселения [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]. Его проповеди собирают толпы, его слова внушают надежду - и бросают вызов государственной власти."
 pius.113.f: "«Она явилась смиренным, а не сильным мира сего. И, возможно, именно поэтому они хотят заставить её замолчать».\n\nВ каменной церкви над деревней священник по имени отец [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName] начал проповедовать - не только о милосердии Девы, но и о её справедливости. Его слова эхом разносятся за пределы нефа: «Если Небеса заговорили здесь, то никакое правительство не может запретить их эхо».\nПаломники стекаются на его проповеди. Его имя распространяется шёпотом и в гимнах. Он призывает к миру, но его присутствие разжигает волнения. Одни называют его пророком. Другие - бунтарём в рясе.\nВласти тревожатся. Военные говорят о подстрекательстве. Церковная иерархия колеблется - разрываясь между догмой и дипломатией. На ваш стол ложится деликатное предложение: его можно устранить. Тихо. Незаметно.\nНо некоторые люди, когда их заставляют замолчать, говорят ещё громче."
 pius.113.g: "Пусть проповедует."
 pius.113.h: "Вызвать его в столицу для переговоров."
 pius.113.i: "Заставить его исчезнуть."
 pius.114.t: "Процессия, потрясшая нацию"
 pius.114.d: "По всей стране верующие-католики начали публичные демонстрации в поддержку явления Богородицы. То, что началось как сельское паломничество, превратилось в национальное движение."
 pius.114.f: "«Они шли с чётками в руках, с детьми на плечах и с именем Девы на устах».\n\nОт рыбацких деревень до фабричных городов - знаки одни и те же: свечи горят в окнах, гимны эхом разносятся по городским площадям, тысячи собираются в тишине. Нет знамён - только статуи, иконы и одно имя, повторяемое снова и снова: Мария. То, что началось как благочестие, стало неповиновением.\nВ ответ на насилие на святом месте в [SCOPE.sState('pius_marian_apparition_state').GetCustom('RU_SL_PP')] верующие вышли на улицы. Они не кричат. Они молятся. Но их число растёт с каждым днём.\nНекоторые в правительстве призывают к терпимости. Другие требуют репрессий. Военные беспокойны. А в домах по всей стране даже сомневающиеся задаются вопросом: если так много людей верят, может ли это всё ещё быть ложью?"
 pius.114.g: "Разрешить национальную процессию."
 pius.114.h: "Запретить национальную процессию."
 pius.115.t: "Поля пустуют"
 pius.115.d: "Сильный неурожай поразил несколько сельских районов [SCOPE.sState('pius_marian_apparition_state').GetCustom('RU_SL_RP')]. Среди верующих начинает распространяться опасный шёпот: что Дева, однажды замолкшая по воле государства, теперь плачет - и наказывает."
 pius.115.f: "«Она просила молитв. Мы дали ей солдат».\n\nДождей не было. Пшеница пожелтела слишком рано. Картофель гнил под землёй, невидимый и горький. Жители деревень говорят о полях, которые кажутся... покинутыми. Не только людьми, но и милосердием.\nИ вот они шепчутся. О женщине в свете, которая однажды явилась - и была осмеяна. О священнике, который исчез. О запечатанной святыне и избитых паломниках. Теперь, говорят они, она отвернулась.\nСвечи снова горят, но теперь за закрытыми ставнями. Матери крестят детей втайне. Старики закапывают хлебные корки в качестве подношений. Церковь не смеет говорить, но народ уже верит: это её скорбь. Или её предупреждение."
 pius.115.g: "Суеверие! Надеюсь..."
 pius.116.t: "Тишина за пределами колокола"
 pius.116.d: "После многих лет репрессий и отрицаемых чудес многие некогда набожные граждане в [SCOPE.sState('pius_marian_apparition_state').GetCustom('RU_SL_PP')] начали терять веру. Всё большее число теперь называют себя не католиками, а вообще никем."
 pius.116.f: "«Она больше не приходит. Ни во снах, ни в видениях. Свечи не зажигаются».\n\nСвятыня заперта. Священник исчез. Поля молчат.\nБыло время, когда даже самые бедные шептали «Аве Мария» перед сном, когда иконы висели у очагов, а слёзы падали при звуке колоколов. Теперь церкви стоят пустыми. Дети спрашивают, что такое «исповедь». Молодёжь говорит о Разуме, о Прогрессе, о Ничто.\nЛюди не обратились к идеологии. Они обратились в пепел. Они не радикалы. Они измучены. И где-то в пустоте тишины остаётся вопрос:\nОна покинула нас - или мы покинули её?"
 pius.116.g: "Эпоха веры прошла."
 pius.119.t: "Закрытие святыни"
 pius.119.d: "Новообразованное атеистическое правительство приказало закрыть место паломничества в честь Богородицы. То, что когда-то было местом света и молитвы, теперь оцеплено, молчит под государственным надзором."
 pius.119.f: "«Колокола не звонили. Свечи не горели. Ворота были заперты до восхода солнца».\n\nСвятыня, которая когда-то привлекала тысячи, теперь стоит в одиночестве. На дверях часовни прибито объявление: «По приказу Народного собрания это сооружение объявлено несущественным». Стража стоит на посту не для того, чтобы защищать, а чтобы не пускать.\nСила не применялась. Протесты не допускались. Перемена произошла тихо, бюрократически - скорее отсутствие, чем взрыв. Но в домах по всей стране дрожат старые руки. Бабушки прячут свои чётки. Дети спрашивают, почему паломники больше не поют.\nДуховенство молчит. Партия говорит о науке, разуме и прогрессе. И где-то за запертыми дверями мерцает вопрос, как полусгоревшая свеча: было ли это действительно необходимо?"
 pius.119.g: "Мы больше не строим памятники иллюзиям."
 pius.121.t: "Что она имеет в виду?"
 pius.121.d: "Явление Богородицы в [SCOPE.sState('pius_marian_apparition_state').GetCustom('RU_SL_PP')] было официально признано положительным знаком. Но даже сейчас его истинное значение остаётся открытым для толкования."
 pius.121.f: "В недели, прошедшие с тех пор, как сияющая фигура явилась жителям деревни, не последовало никаких дальнейших знамений. Ни огня с небес. Ни голоса в облаках. Только ясное небо и застывшее эхо чуда.\nНо люди говорят - о мире, об исцелении, о чём-то, что изменилось в душе нации. Паломники приходят не в исступлении, а в благоговении. Духовенство проповедует мягко. Пресса, на этот раз, сообщает без насмешек: что означает это чудо?"
 pius.121.g: "Благословение для простого народа."
 pius.121.h: "Божественный знак нашему духовенству."
 pius.121.i: "Указание на легитимность нашего правительства."
 pius.122.t: "Святыня у поселения [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]"
 pius.122.d: "Место явления Богородицы теперь стало полностью признанным местом паломничества, привлекающим всё больше верующих из ближних и дальних краёв."
 pius.122.f: "«Там, где когда-то было лишь пастбище, теперь стоят свечи, розы и тихие шаги тысяч».\n\nДороги расширились. Поля были расчищены. Скромная часовня возвышается рядом с местом, где дети когда-то говорили о Даме, облачённой в свет. Каждый день прибывают паломники: фермеры со своими сыновьями, вдовы в чёрном, солдаты в отпуске, матери, шепчущие молитвы за своих нерождённых.\nЦерковь признала святость этого места. Строится святыня. У её стен расцветают рынки, предлагающие хлеб, медали, чётки, вино. То, что когда-то было историей, в которую сомневались в гостиных, теперь стало присутствием, которое нация ощущает до глубины души.\nИ когда в долине звенят колокола, возникает вопрос: возрождается ли вера - или это семя чего-то ещё большего?"
 pius.122.g: "Весь твой."