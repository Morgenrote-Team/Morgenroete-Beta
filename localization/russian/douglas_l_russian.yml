 douglas_chimborazo_highest_mountain_flag: "Чимборасо (Эквадор)"
 douglas.217.t: "Следы на снегу"
 douglas.217.d: "«Они были слишком велики для любого человека и слишком глубоки для любого снежного барса», — [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'объясняла', 'объяснял')] [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] корреспонденту из «The Penny Illustrated Paper». Статья быстро распространилась по чайным и салонам от Лондона до Калькутты, вызывая равные доли смеха и благоговения. Существо, высокое, как медведь, и тихое, как летящая снежинка, по слухам, бродило по ледяным склонам Кабру, Камета и Эвереста. Даже шерпы-проводники не сомневались — они называли его Ме́тох-Кангми́."
 douglas.217.f: "«Я видел многое на этих горах — ледопады, внезапные бури, людей, которые теряли пальцы и находили Бога. Но клянусь ботинками Её Величества, я видел, как что-то ходило за пределами нашего костра. И оно наблюдало за нами».\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], письмо [TimeKeeper.GetCurrentDate.Format('y')] года."
 douglas.217.g: "Людям интересны такие истории."
 douglas.217.h: "Эти сообщения вредят репутации нашего альпиниста!"
