 douglas.101.t: "Основан альпинистский клуб"
 douglas.101.d: "[SCOPE.sCharacter('douglas_president_scope').GetFullName] бросает вызов — и гора отвечает. Основание альпинистского клуба знаменует новую эру для всех, кто стремится к вершинам."
 douglas.101.f: "Экспедиции вели [SCOPE.sCharacter('douglas_president_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('douglas_president_scope').GetLastName] через бури и лавины, но теперь [SelectLocalization(SCOPE.sCharacter('douglas_president_scope').IsFemale, 'она', 'он')] [SelectLocalization(SCOPE.sCharacter('douglas_president_scope').IsFemale, 'хочет', 'хочет')] передать своё наследие. В городе [ROOT.GetCountry.GetCapital.GetCityHubName] [SelectLocalization(SCOPE.sCharacter('douglas_president_scope').IsFemale, 'она', 'он')] основывает альпинистский клуб [GetPlayer.GetAltNameNoFlag('RU_CL_RP')], и не в одиночку, а вместе с многообещающим новичком: [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], целеустремлённым альпинистом с острым взглядом и железной волей. [SCOPE.sCharacter('douglas_president_scope').GetFullName] видит в [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'ней', 'нём')] не просто амбиции, а будущую легенду. Вместе они стоят на пороге пути, который ведёт не только к вершинам, но и к славе, мужеству и, возможно, к месту в истории. Клуб открыт для всех, кто слышит зов гор. Восхождение начинается."
 douglas.101.g: "Горы зовут!"
 douglas.102.t: "Альпийский клуб"
 douglas.102.d: "Альпийский клуб был официально основан в городе [ROOT.GetCountry.GetCapital.GetCityHubName] в [TimeKeeper.GetCurrentDate.Format('y')] году и признан первой в мире международной альпинистской организацией. Его создание знаменует собой институциональное начало современного альпинизма."
 douglas.102.f: "Исторически группа британских джентльменов собралась в Лондоне в 1857 году, чтобы основать клуб, посвящённый альпинизму. Под руководством таких деятелей, как Джон Болл и Эдвард Кеннеди, Альпийский клуб стремился содействовать систематическому исследованию Альп, сочетая физические испытания с географическими и естественно-научными изысканиями. Клуб обеспечил структурированную основу для обмена знаниями, организации экспедиций и укрепления чувства общности среди альпинистов. Его члены сыграли ключевую роль в эпохе, которая позже стала известна как «Золотой век альпинизма», совершив множество первых восхождений и задокументировав свой опыт. Вскоре после этого началось издание «Альпийского журнала», что способствовало развитию литературы об альпинизме. Основание Альпийского клуба заложило фундамент для организованного альпинизма во всём мире и установило непреходящие стандарты в исследовании гор."
 douglas.102.g: "Вместе к вершине!"
