 douglas.111.t: "Первый шаг"
 douglas.111.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] снабжает команду базовым альпинистским снаряжением."
 douglas.111.f: "Эпоха импровизированных восхождений окончена. Под руководством [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] команда получает первое стандартизированное снаряжение: верёвки, ледорубы, скальные крючья и прочные рюкзаки. Эти инструменты не просто спасают жизни — они меняют само восприятие горы. Восхождение становится более методичным, просчитанным. Там, где когда-то имели значение только смелость и грубая сила, теперь на первый план выходят техника и подготовка. Это скромный, но эпохальный шаг для всех, кто осмеливается войти в безжалостный мир льда и скал."
 douglas.111.g: "Теперь горы принадлежат подготовленным."
 douglas.112.t: "Связанные одной верёвкой"
 douglas.112.d: "У нашего альпиниста [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] появилась новая идея: для повышения безопасности вводятся фиксированные связки."
 douglas.112.f: "Каждый шаг в горах несёт в себе риск, но теперь никто не поднимается в одиночку. Введение связок знаменует собой сдвиг в мышлении: это больше не противостояние одиночки и горы, а цепь альпинистов, объединённых доверием и плетёной верёвкой. Это изменение приносит порядок, дисциплину и глубокое чувство общей ответственности. Если один падает, остальные его держат. Опасность не устраняется, а перераспределяется. Гора остаётся дикой, но наш ответ ей больше не героический, а совместный."
 douglas.112.g: "Одна верёвка. Одна воля. Одна команда."
 douglas.113.t: "Хрупкое тело"
 douglas.113.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] настаивает на введении системы первой помощи для команды."
 douglas.113.f: "Волдыри, переломы, обморожения — гора не знает пощады. То, что когда-то считалось частью риска, теперь рассматривается систематически. Небольшая аптечка, используемая с умом, может спасти жизнь. Быстро построенное убежище может выиграть время. Впервые базовые медицинские знания становятся частью подготовки. Гора по-прежнему требует всего, но с введением аптечек и планов действий в чрезвычайных ситуациях команда отвечает не только выдержкой. Человеческое тело больше не игнорируется — оно защищено."
 douglas.113.g: "Даже сильнейшие могут пасть."
 douglas.114.t: "Камень говорит"
 douglas.114.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] внедрил научные методы в альпинизм: для улучшения анализа местности вводятся знания по геологии."
 douglas.114.f: "То, что когда-то казалось фоном — щебень, осадочные породы, скалы — теперь становится языком, который нужно прочесть. Один из членов команды привносит геологические знания: слои раскрывают древние движения, типы пород предупреждают о лавинах, линии разломов указывают безопасные маршруты. Гора больше не миф — это архив. Наука приходит с блокнотами и молотками, и внезапно экспедиции становятся не просто приключениями, а полевыми исследованиями. Это новый способ видеть — тихая революция."
 douglas.114.g: "Познаем, прежде чем взойти."
 douglas.115.t: "Дыхание высоты"
 douglas.115.d: "Почему бы не использовать опыт химической войны в целях альпинизма? Новая технология позволяет использовать кислородные маски на экстремальных высотах."
 douglas.115.f: "Выше определённой высоты небо истончается. Дыхание становится борьбой, тело протестует. Но теперь, с помощью механических аппаратов, люди достигают мест, для которых они никогда не были предназначены. Кислородные маски — некогда научная диковинка — становятся стандартом. Они переопределяют пределы возможного. Мир выше 7000 метров становится доступным, хотя и за определённую цену: альпинист больше не один, а часть системы жизнеобеспечения. Триумф над горой не умаляется — он лишь становится холоднее."
 douglas.115.g: "Мы дышим искусственно, но мы побеждаем."
