 douglas.211.t: "Вершина"
 douglas.211.d: "После трудного восхождения группа альпинистов наконец достигает вершины. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] — первый человек от [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], кто ступил на эту точку земли. Теперь остаётся лишь насладиться моментом триумфа."
 douglas.211.f: "«Первый вопрос, который вы зададите и на который я должен попытаться ответить, таков: „Какая польза от восхождения на Джомолунгму?“ И мой ответ должен быть немедленным: „Никакой“. Нет ни малейшей перспективы какой-либо выгоды.\n\nО, мы можем немного узнать о поведении человеческого тела на больших высотах, и, возможно, медицинские специалисты смогут использовать наши наблюдения для нужд авиации. Но в остальном из этого ничего не выйдет. Мы не принесём обратно ни крупицы золота или серебра, ни одного драгоценного камня, ни угля, ни железа. Мы не найдём ни одного фута земли, которую можно было бы засадить культурами для производства пищи. Это бесполезно.\n\nТак что, если вы не можете понять, что в человеке есть нечто, что отвечает на вызов этой горы и выходит ему навстречу, что эта борьба — это сама борьба жизни, вверх и вечно вверх, тогда вы не поймёте, зачем мы идём. То, что мы получаем от этого приключения, — это чистая радость.\n\nА радость, в конце концов, и есть цель жизни. Мы живём не для того, чтобы есть и зарабатывать деньги. Мы едим и зарабатываем деньги, чтобы иметь возможность наслаждаться жизнью. Вот что значит жизнь и для чего она нужна». — Джордж Ли Мэллори"
 douglas.211.g: "Насладимся рассветом!"
 douglas.212.t: "Восхождение прервано"
 douglas.212.d: "Попытка [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] достичь вершины пока что провалилась. Наш альпинист вынужден прекратить предприятие и вернуться."
 douglas.212.f: "Причин, по которым альпинист прерывает восхождение, может быть множество. Иногда достаточно изменения погоды; иногда предполагаемый путь к вершине оказывается слишком коварным. Часто восхождение занимает слишком много времени и выходит за рамки временного окна, потому что определённое время суток и изменения погоды затрудняют или делают подъём невозможным. А иногда вы просто выбрали неверный путь."
 douglas.212.g: "Какое разочарование."
 douglas.213.t: "Катастрофа в горах!"
 douglas.213.d: "Во время восхождения в горах в [SCOPE.sState('douglas_location_scope').GetCustom('RU_SL_PP')] [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] совершил ужасную ошибку, которая привела экспедицию к катастрофе — несколько человек погибли, а провизия и снаряжение сорвались вниз вместе с ними. Вся нация в шоке!"
 douglas.213.f: "«Каждую ночь, понимаете, я вижу своих товарищей по Маттерхорну, скользящих на спинах, с раскинутыми руками, один за другим, в идеальном порядке на равных расстояниях — Кро, проводник, первый, затем Хэдоу, затем Хадсон и, наконец, Дуглас. Да, я всегда буду их видеть...» — Эдвард Уимпер"
 douglas.213.g: "Какая трагедия!"
