 douglas.210.t: "Научная поддержка"
 douglas.210.d: "Доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'предложила', 'предложил')] услуги своего ассистента для помощи экспедиции в изучении структуры горы."
 douglas.210.f: "Письмо было написано чётким почерком, печать оставалась нетронутой до сего момента. В нём профессор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] предлагает временно направить своего самого многообещающего ассистента — тихого, наблюдательного молодого человека, умело классифицирующего минералы и анализирующего склоны. Профессор надеется на подробные отчёты. Ассистент прибывает с измерительными стержнями, блокнотами и безграничным любопытством. Он мало что знает о восхождениях, но много — о камне."
 douglas.210.g: "Принять ассистента."
 douglas.214.t: "Горная симфония"
 douglas.214.d: "Вдохновлённый недавним успехом [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('elgar_composer_var').GetCharacter.IsFemale, 'объявила', 'объявил')], что [SelectLocalization(ROOT.Var('elgar_composer_var').GetCharacter.IsFemale, 'она', 'он')] хочет написать крупное музыкальное произведение о горах и борьбе человека с природой. Музыкальный мир уже сходится во мнении, что это будет важная работа."
 douglas.214.f: "«Альпийская симфония», соч. 64 — это симфоническая поэма композитора Рихарда Штрауса, впервые исполненная в 1915 году. В основе произведения лежит замысел композитора изобразить музыкальными средствами восхождение на альпийскую вершину и возвращение в долину в течение одного дня. Идея программы восходит к детскому опыту Штрауса. Летом 1879 года он оступился на горе Хаймгартен в Баварских Альпах и попал в грозу. На следующий день он воспроизвёл это событие на фортепиано. Из этого воспоминания и родился замысел. Композитор поставил себе цель дать слушателю возможность непосредственно и чувственно пережить этапы горного похода в виде звуковой картины. По мнению многих музыкальных критиков, произведение достигает этой цели впечатляющим образом."
 douglas.214.g: "Надеюсь, там не будет альпийских рогов."
 douglas.215.t: "От вершины к науке"
 douglas.215.d: "Один из спутников экспедиции избрал новый путь. Под впечатлением от того, что [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'она увидела', 'он увидел')] в высоких горах, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] начинает карьеру в геологии."
 douglas.215.f: "Когда снег хрустел под [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'её', 'его')] ботинками, а солнце вставало над зубчатыми вершинами, что-то изменилось в [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName]. Слои скал, безмолвная мощь складчатых пластов, вулканические шрамы — всё это запечатлелось в [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'её', 'его')] памяти глубже, чем любая вершина. После спуска, пока другие праздновали, [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'она', 'он')] искал[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] книги, карты, молотки. Экспедиция оставила нечто большее, чем флаг: она пробудила разум."
 douglas.215.g: "Поощрить [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'её', 'его')] исследования!"
 douglas.221.t: "Лёгкое восхождение"
 douglas.221.d: "Команда альпинистов легко продвигается в своей попытке покорить #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!. Никаких примечательных происшествий."
 douglas.221.f: "«Счастлив тот, кто в расцвете сил познал ту деятельную среду, к которой более всего стремился. В наши дни потрясений и бурных перемен, когда основные ценности сегодня — это тщетные и разбитые мечты завтрашнего дня, многое можно сказать в пользу философии, которая стремится жить полной жизнью, пока есть возможность. Немногие сокровища имеют более непреходящую ценность, чем опыт образа жизни, который сам по себе полностью удовлетворяет. Таковы, в конце концов, единственные владения, которых нас не может лишить ни судьба, ни космическая катастрофа; ничто не может изменить тот факт, если на одно мгновение в вечности мы действительно жили». — Эрик Шиптон"
 douglas.221.g: "Вперёд!"
 douglas.222.t: "Склон"
 douglas.222.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] заметил[SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'а', '')] небольшой склон в горах, но это не должно стать серьёзной проблемой для альпинистов."
 douglas.222.f: "Чем выше поднимается команда альпинистов, тем серьёзнее становятся испытания. Склон может быть препятствием, но не должен стать проблемой для умеренно оснащённой экспедиции."
 douglas.222.g: "Команда справится с этим."
 douglas.222.h: "Это слишком рискованно."
 douglas.223.t: "Крутая стена"
 douglas.223.d: "Скала представляет собой серьёзное препятствие для альпинистов на их пути к вершине, но [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'уверена', 'уверен')], что [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'она', 'он')] справится с этой задачей."
 douglas.223.f: "На горах высотой от 2000 метров группа альпинистов может столкнуться со скалами. Для невысоких гор это последнее препятствие перед вершиной, но во многих случаях это скорее разминка. С этого момента обычный горный поход отличается от настоящего альпинизма."
 douglas.224.t: "Лавина!"
 douglas.224.d: "На высотах #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#! сошла опасная лавина, угрожая всему предприятию. Обломки теперь перекрывают прямой путь, и поиск обходного маршрута может быть безопаснее, но будет стоить драгоценного времени. Некоторые альпинисты предлагают подождать, что включает в себя вероятность того, что путь может стать ещё более заблокированным."
 douglas.224.f: "Лавины сходят со снежных высот и с незапамятных времён представляли опасность для всех, кто жил в горах, а не только для покорителей вершин. Их коварство уже привело многих к гибели. С этого момента зёрна отделяются от плевел."
 douglas.224.g: "Альпиниста таким не сломить."
 douglas.224.h: "Искать обходной путь."
 douglas.225.t: "Пропасть"
 douglas.225.d: "Опасное ущелье разверзается перед [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], когда [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'она', 'он')] достигает последнего скального образования. Кажущееся непреодолимым препятствие бросает вызов альпинистам."
 douglas.225.f: "«Альпинизм — это искусство восхождения на горы, при котором величайшим опасностям противостоят с величайшей осмотрительностью. Искусство здесь означает применение знаний в действии. Нельзя всегда оставаться на вершинах. Приходится снова спускаться. Так в чём же смысл? Только в этом: то, что наверху, знает, что внизу, а то, что внизу, не знает, что наверху. Поднимаешься — видишь. Спускаешься — больше не видишь, но ты видел. Во время подъёма замечай все трудности на своём пути. Во время спуска ты их уже не увидишь, но будешь знать, что они там, если наблюдал внимательно». — Рене Домаль"
 douglas.226.t: "Смертельная ступень"
 douglas.226.d: "Незадолго до вершины [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] сталкивается с последним, решающим испытанием: почти отвесная скала, возвышающаяся перед [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'ней', 'ним')], решает судьбу победы или поражения. Среди альпинистов уже ходят слухи, что это смертельная ловушка, или смертельная ступень."
 douglas.226.f: "«После часа упорного пути мы достигли подножия самой грозной на вид проблемы на хребте — скальной ступени высотой около сорока футов. Мы понимали, что на этой высоте она вполне может означать разницу между успехом и неудачей. Сама скала, гладкая и почти без зацепов, могла бы стать интересной воскресной задачкой для группы опытных скалолазов в Озёрном крае, но здесь это была преграда, преодолеть которую было выше наших слабых сил. Я не видел способа обойти её по крутому скальному обрыву на западе, но, к счастью, оставалась ещё одна возможность. С её восточной стороны был ещё один большой карниз, и по всей сорокафутовой высоте ступени шла узкая трещина между карнизом и скалой. Оставив Тенцинга страховать меня как можно лучше, я втиснулся в эту трещину, затем, отталкиваясь кошками, я вонзил их шипы глубоко в замёрзший снег позади и оторвался от земли. Используя каждую маленькую зацепку на скале и всю силу колен, плеч и рук, какую я мог собрать, я буквально полз спиной вперёд по трещине, горячо молясь, чтобы карниз не отделился от скалы». — Эдмунд Хиллари"
 douglas.226.i: "Это совершенно безнадёжно!"
 douglas.227.t: "Перемена погоды"
 douglas.227.d: "Перемена погоды в горах [SCOPE.sState('douglas_location_scope').GetCustom('RU_SL_PP')] ставит перед альпинистами смертельно опасную проблему. Ещё есть возможность достичь более защищённого места на больших высотах, но это рискованное предприятие. В базовом лагере альпинисты нашли бы безопасное убежище, но это свело бы на нет прогресс последних дней, если не недель."
 douglas.227.f: "Перемены погоды в горах могут быть одним из самых угрожающих событий, которые могут случиться в горном походе. Это относится к дождю, бурям и снегу. Особенно на самых больших высотах внезапный снегопад может означать, что попытку восхождения на вершину придётся прервать, потому что непредсказуемые стихии могут закончиться трагедией."
 douglas.227.g: "Альпиниста таким не сломить."
 douglas.227.h: "Вернуться в последний лагерь!"
 douglas.228.t: "Камнепад!"
 douglas.228.d: "Внезапный оползень обрушился на лагерь. Несколько альпинистов ранены, а необходимое снаряжение утеряно!"
 douglas.228.f: "Всё началось с резкого треска, а затем — с рёва. Склон над бивуаком обрушился, словно дремлющий зверь. Камни, пыль и валуны хлынули вниз ужасающим каскадом. Одного носильщика ударило камнем, верёвка была разорвана, а ящик с припасами разлетелся в щепки. Те, кому удалось укрыться, теперь молча смотрят на обломки. Никто не говорит этого вслух, но все знают: это могло закончиться трагедией. Маршрут казался безопасным, но гора — не друг."
 douglas.228.g: "Обезопасить лагерь и помочь раненым."
 douglas.229.t: "Головокружительная высота"
 douglas.229.d: "По мере приближения к вершине разреженный воздух и открытые хребты начинают сказываться на альпинистах."
 douglas.229.f: "Небо темнеет даже в полдень, воздух резок, как бритва. Каждый шаг кажется подъёмом валуна. Дыхание короткое, поверхностное, а ветер, кажется, вырывает душу прямо из лёгких. Некоторые слишком долго смотрят в пропасть внизу, и у них начинают дрожать колени. У других начинаются галлюцинации: голоса во льду, тени в снегу. Гора не проявляет здесь милосердия — только высоту, ветер и тишину. На такой высоте даже мужество начинает замерзать."
 douglas.229.g: "Вперёд, не поднимая головы."
 douglas.229.h: "Время для перерыва."
 douglas.230.t: "Чтения в камне"
 douglas.230.d: "Наш ассистент-геолог подробно проанализировал местность и выявил скрытые риски до того, как они могли стать смертельными."
 douglas.230.f: "Пока остальные распаковывали верёвки и проверяли ботинки, геолог изучал камень. Слой за слоем, крупица за крупицей, ассистент доктора [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] отмечал крошечные трещины, едва заметные изменения в окраске, угол осадочных полос. «Этот склон нестабилен», — пробормотал он, указывая на то, что казалось безопасным путём. И он был прав. Меньшая разведывательная группа подтвердила признаки предыдущего схода. Благодаря его тихой точности маршрут был вовремя изменён, и, возможно, были спасены жизни. Гора может быть огромной, но её узоры могут прочесть те, кто смотрит внимательно."
 douglas.230.g: "Довериться науке."
 douglas.231.t: "Горная наука"
 douglas.231.d: "Неизведанные высоты #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#! открывают ассистенту-геологу целый ряд новых знаний, которые он собирает и записывает во время горного похода."
 douglas.231.f: "Учёные часто изучали необычную флору и фауну местности на ранних этапах горных экспедиций. Геологические исследования представляли особый интерес — не только по общенаучным причинам, но и часто для упрощения будущих восхождений."
 douglas.231.g: "Ради науки!"
 douglas.232.t: "Прекрасный минерал"
 douglas.232.d: "Группа альпинистов уже жаловалась на медлительность геолога, который как учёный был скорее обузой, чем помощью; но, как оказалось, во время восхождения на вершину он обнаружил редкий материал."
 douglas.232.f: "Мужчины уже час ждали академика, который остановился где-то на склоне и внезапно достал свои инструменты. Сначала покачав головами, они решили совместить неприятное с полезным и перенесли приём пищи, чтобы не терять времени зря. Однако ассистент доктора [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] не собирался ни есть, ни приходить. Когда [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] пригрозил продолжить экспедицию без геолога, тот внезапно вернулся к группе — со сверкающим камнем в руке."
 douglas.232.g: "Какой милый маленький сюрприз."
 douglas.233.t: "Потерянное животное"
 douglas.233.d: "На нижнем ярусе Гималаев наш натуралист [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] сделал странное открытие: там бродит одинокое, брошенное животное, страдающее от голода и холода."
 douglas.233.f: "Для [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] было странно найти такое маленькое, нежное существо, которое, как говорят, обитает в бамбуковых лесах Непала, в этой пустынной местности. [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'Она', 'Он')] знал[SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'а', '')] иллюстрации из книг и знал[SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'а', '')], что в ближайших лесах живут местные жители; но как одно животное могло попасть сюда? На такое расстояние? Без еды? Это оставалось загадкой. Неужели маленькая красная панда тоже заразилась альпинистской лихорадкой? Или она спасалась от хищников? Как бы то ни было, альпинист заботится об истощённом животном и выхаживает его. Решено, что научный сотрудник доставит красную панду в базовый лагерь, а оттуда подготовит её к путешествию в местный зоопарк."
 douglas.233.g: "Это ли то самое легендарное 43-е животное?"
