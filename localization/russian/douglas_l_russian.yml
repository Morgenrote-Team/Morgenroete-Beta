 douglas.209.t: "Продвинутое снаряжение"
 douglas.209.d: "Уже в начале восхождения на #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#! [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] понимает, что хорошее снаряжение почти избыточно для требований, которые предъявляет гора."
 douglas.209.f: "Если уровень снаряжения альпинистской экспедиции лучше уровня горы, это снижает начальный риск горной экспедиции и даёт бонус к прогрессу."
 douglas.209.g: "Увидимся на вершине!"
 douglas.216.t: "Демотивация"
 douglas.216.d: "Сегодня наша альпинистская команда получила известие, что другая нация первой покорила #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!. В команде появляются первые признаки разлада; некоторые поворачивают назад, а [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] открыто высказал идею прекратить восхождение."
 douglas.216.f: "Если другая нация первой покоряет вершину горы, то попытка восхождения почти наверняка будет прекращена."
 douglas.216.g: "Эта экспедиция потеряла свой смысл."
 douglas_mountaineer_speech_tt: "Альпинистская экспедиция продлится на #YELLOW 60 дней дольше#! до истечения времени."
 douglas.208.t: "Слова перед восхождением"
 douglas.208.d: "Перед финальным рывком к вершине [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] обращается к команде. Гора #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#! зовёт, но и его голос звучит не менее властно."
 douglas.208.f: "«Над нами лежит вершина — холодная, безмолвная, неподвижная. Ей нет дела до отваги. Она не задаёт нам вопросов. Но мы отвечаем ей — каждым шагом. Там нет ни барабанов, ни славы. Только вид позади нас и гордость за то, что мы осмелились. Мы здесь не для того, чтобы встретиться с горой. Мы здесь, чтобы покорить её. Каждый из вас имеет право на страх. Но никакой страх нас не остановит. Не сегодня»."
 douglas.208.g: "С [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFirstName] мы бросим вызов горе!"
 douglas_alpine_club_new_board_tt: "Избирается новый совет Альпийского клуба."
 douglas.302.t: "Альпийский клуб: новый совет"
 douglas.302.d: "Альпийский клуб сегодня на своём собрании в городе [SCOPE.sState('douglas_alpine_club_state').GetStateRegion.GetCityHubName] назначил новых членов совета."
 douglas.302.f: "Альпийский клуб определил следующий состав:\n\n#V Президент: [GetGlobalVariable('douglas_alpine_club_president_global_var').GetCountry.GetName|V] #!\n\n#V Совет: [GetGlobalVariable('douglas_alpine_club_board_member_1_global_var').GetCountry.GetName|V], [GetGlobalVariable('douglas_alpine_club_board_member_2_global_var').GetCountry.GetName|V], [GetGlobalVariable('douglas_alpine_club_board_member_3_global_var').GetCountry.GetName|V], [GetGlobalVariable('douglas_alpine_club_board_member_4_global_var').GetCountry.GetName|V], [GetGlobalVariable('douglas_alpine_club_board_member_5_global_var').GetCountry.GetName|V]"
 douglas.302.g: "Поздравляем новых членов совета."
 douglas.302.h: "И обошлось без взяток?"
 douglas_mountaineering_international_expedition_modifier: "Недавняя международная альпинистская экспедиция"
 douglas_mountaineering_international_expedition_setback_modifier: "Неудача в Альпийском клубе"
 douglas.311.t: "Предложение о международной альпинистской экспедиции"
 douglas.311.d: "[SCOPE.sCountry('douglas_board_scope').GetName], член совета Альпийского клуба, запросил[SCOPE.sCountry('douglas_board_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] организацию международной альпинистской экспедиции. Страна оплатит комиссионные. Однако президент клуба может наложить вето на это предложение."
 douglas.311.f: "«Господа, горам нет дела до флагов и границ. Они возвышаются над мелкими ссорами наций, невосприимчивые к нашему соперничеству. Вот почему я стою сегодня перед вами с видением: вершина вне политики, вне родословных — вершина самого человечества. Давайте соберём лучших альпинистов со всей Европы, Америки, даже далёкой Азии, и встретим гору не как португальцы, французы или саксонцы, а как содружество тех, кто смеет. Это будет триумф не только воли и верёвки, но и дипломатии, доверия и общей славы. Пусть это будет нашим наследием: не завоевание, а сотрудничество»."
 douglas.311.g: "Хорошее предложение."
 douglas.311.h: "Нет."
 douglas.312.t: "Вето"
 douglas.312.d: "[SCOPE.sCountry('douglas_president_scope').GetName], президент Альпийского клуба, объявил[SCOPE.sCountry('douglas_president_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] о вето на международную альпинистскую экспедицию."
 douglas.312.f: "«Лезть в горы с французами? Швейцарцами? Я скорее в тапочках с медведем бороться буду. Вы когда-нибудь пробовали договориться с англичанином о чае, не говоря уже о палатках? Нет уж, спасибо. В прошлый раз, когда мы пригласили иностранную команду, они привезли четыре бочки шнапса и забыли карты. Кроме того, господа, гора никуда не денется, и я тоже. Если и добывать славу, то пусть это будут наши ботинки в снегу, а не какой-то пикник Организации Объединённых Наций на леднике. Мы будем восходить с достоинством — или никак!»."
 douglas.312.g: "И кто вообще избрал этого президента?"
 douglas.321.t: "Выбор вершины"
 douglas.321.d: "С одобрением международной экспедиции клуб теперь обсуждает главный вопрос: какая вершина станет полем битвы за славу?"
 douglas.321.f: "Альпийский клуб может принять решение о восхождении на любую гору, расположенную на территории страны, имеющей альпинистский клуб. Лицензия не требуется. Однако гора должна быть 2-го, 3-го или 4-го уровня."
 douglas.321.g: "Гора не должна быть слишком сложной."
 douglas.321.h: "Давайте выберем одну из обычных классических гор."
 douglas.321.i: "Гора должна быть вызовом!"
 douglas.331.t: "Экспедиция Альпийского клуба"
 douglas.331.d: "Альпийский клуб объявил о смелой цели: покорение известной вершины международной командой альпинистов, состоящей из его ведущих членов. Цель — #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!"
 douglas.331.f: "Все члены исполнительного комитета Альпийского клуба могут участвовать в международной альпинистской экспедиции, организованной Альпийским клубом. Для этого требуется, чтобы активный альпинист присоединился к экспедиции клуба. Международные экспедиции имеют почти стопроцентный шанс на успех, но проводятся редко. Президент клуба, в случае успешного восхождения, имеет право на первое восхождение и получает наибольший престиж, но все остальные участвовавшие члены исполнительного комитета также вознаграждаются."
 douglas.331.g: "Пусть на вершине будет общее знамя."
 douglas.341.t: "Восхождение наций"
 douglas.341.d: "Флаги подняты. Провизия упакована. Международная экспедиция готовится взойти туда, где ещё никто не стоял."
 douglas.341.f: "Над базовым лагерем, где акценты со всего мира смешивались с морозным утренним воздухом, воцарилась тишина. Некоторые молча затягивали ботинки, другие обменивались последними нервными шутками. На краю лагеря [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] стоял неподвижно, наблюдая за вершиной, окутанной облаками.\n\n«Говорят, на неё ещё никто не поднимался», — пробормотал француз, закуривая сигарету.\n\n«Значит, пора», — ответила англичанка с тихой улыбкой."
 douglas.341.g: "Пусть мир восходит вместе."
 douglas.351.t: "Триумф на вершине"
 douglas.351.d: "После недель лишений вершина достигнута. [GetGlobalVariable('douglas_alpine_club_president_global_var').GetCountry.GetName|V] завладел[GetGlobalVariable('douglas_alpine_club_president_global_var').GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')] вершиной от имени Альпийского клуба."
 douglas.351.f: "Они стояли плечом к плечу в разреженном воздухе, кристаллы льда цеплялись за бороды и ресницы, усталость была написана на каждой морщинке их лиц. Но никто не отступил, когда президент Альпийского клуба развернул знамя экспедиции и крепко водрузил его в снег.\n\nОстальные собрались вокруг. Был подготовлен фотоаппарат, с трудом доставленный на эту немыслимую высоту. За ними разошлись облака, открыв долину внизу, словно нарисованную карту.\n\n«Держитесь ровно, — сказал фотограф. — Это для вечности».\n\nЩёлкнул затвор.\n\nЭта единственная фотография украсит гостиные, лекционные залы и газеты по всему миру. На ней президент стоит прямо со знаменем, в окружении обмороженных, улыбающихся альпинистов — объединённых не нацией, а покорением."
 douglas.351.g: "За науку, за славу, за человечество."
 douglas_add_international_expedition_effect_tt: "#default_text [GetPlayer.GetName] завершает экспедицию Альпийского клуба"
 je_douglas_international_mountaineering_expedition_preparation: "Подготовка к экспедиции Альпийского клуба"
 je_douglas_international_mountaineering_expedition_preparation_reason: "Все члены исполнительного комитета Альпийского клуба могут участвовать в международной альпинистской экспедиции, организованной Альпийским клубом. Для этого требуется, чтобы активный альпинист присоединился к экспедиции клуба. Международные экспедиции имеют почти стопроцентный шанс на успех, но проводятся редко. Президент клуба, в случае успешного восхождения, имеет право на первое восхождение и получает наибольший престиж, но все остальные участвовавшие члены исполнительного комитета также вознаграждаются.\n\nЧтобы принять участие в международной экспедиции, вы должны присоединиться к ней в меню альпиниста в разделе «Клуб». Это возможно, пока эта запись в дневнике не истекла."
 je_douglas_international_mountaineering_expedition: "Экспедиция Альпийского клуба"
 je_douglas_international_mountaineering_expedition_reason: "Успех альпинистской экспедиции под руководством Альпийского клуба обычно гарантирован. Однако её продолжительность во многом зависит от количества участвующих членов совета. Президент клуба, в случае успешного восхождения, имеет право на первое восхождение и получает наибольший престиж, но все остальные участвовавшие члены исполнительного комитета также вознаграждаются."
 douglas_international_mountain_expedition_progress_bar: "Экспедиция Альпийского клуба"
 douglas_international_mountain_expedition_progress_bar_desc: "Прогресс экспедиции: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/10)"
