 douglas.104.t: "Внутренняя гора"
 douglas.104.d: "После пяти изнурительных лет восхождений и тренировок [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] возвращается."
 douglas.104.f: "У горы нет голоса, но она учит. За пять долгих лет наш альпинист столкнулся со снежной слепотой, осыпающимися скалами, пронизывающим ветром и тишиной, которая ранит глубже любого клинка. Но каждая трудность оттачивала знания в мышцах, терпение — в дыхании. То, что начиналось как амбиция, теперь закалилось в мастерство. Альпинист научился слушать камень, предсказывать бури по запаху, вязать узлы с закрытыми глазами и спокойным сердцем. [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'Она', 'Он')] возвращается [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'преображённой', 'преображённым')]. Это начало мастерства."
 douglas.104.g: "[SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'Она', 'Он')] больше не покоряет гору — [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'она', 'он')] понимает её"
