 je_douglas_mountaineering_training_reason: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] исследует и покоряет известные горы в нашей стране, чтобы улучшить свой опыт и, возможно, освоить новые навыки."
