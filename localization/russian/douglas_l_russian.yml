 douglas_mountaineer: "Альпинист"
 douglas_mountaineer_desc: "Альпинист — это человек, который взбирается на горы, часто ради спорта или приключений. Он умеет перемещаться по сложной местности и выживать в суровых условиях. Альпинисты известны своей физической выносливостью, силой духа и глубоким уважением к природе."
