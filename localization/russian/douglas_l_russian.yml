 je_douglas_mountaineering_expedition_reason: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], наш альпинист, в настоящее время возглавляет команду в экспедиции по восхождению на #V [AddLocalizationIf( Scope.Var('douglas_mountain_expedition_var').IsSet , Scope.Var('douglas_mountain_expedition_var').GetFlagName)]#!. Цель — первое восхождение на вершину. Скорость восхождения во многом зависит от его опыта и черт характера. В зависимости от сложности горы могут возникнуть большие опасности. Если экспедиция не достигнет своей цели в определённые сроки, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] прервёт восхождение. Если по какой-либо причине экспедиция столкнётся с величайшей мыслимой опасностью, то случится худшее."
