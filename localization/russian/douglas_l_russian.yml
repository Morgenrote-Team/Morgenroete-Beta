 ACHIEVEMENT_DESC_douglas_seven: "Покорите семь горных вершин."
 ACHIEVEMENT_douglas_everest: "Последнее желание Мэллори"
 ACHIEVEMENT_DESC_douglas_everest: "Покорите Джомолунгму до 1953 года."
 je_douglas_mount_everest_expedition_preparation: "Подготовка к экспедиции на Джомолунгму"
 je_douglas_mount_everest_expedition_preparation_reason: "Покорение высочайшей горы мира требует не только выдающегося альпиниста, но и всесторонней подготовки. Чем больше мы готовимся к нашему восхождению, тем ниже базовый риск."
 je_douglas_mount_everest_expedition: "Экспедиция на Джомолунгму"
 je_douglas_mount_everest_expedition_reason: "Джомолунгма — царица гор. Прогресс здесь измеряется исключительно исходом событий. Успех альпиниста зависит от его способностей. Поскольку базовый риск на Джомолунгме очень высок, можно предположить, что экспедиция заранее обратилась за всесторонней научной консультацией, чтобы мелкие оплошности не обернулись катастрофой."
 je_mount_everest_metereologist_tt: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_curie_physicist] с [Concept('concept_character_trait', 'чертой')] #V «$curie_meteorologist$»#!.#!"
 je_mount_everest_mechanical_engineer_tt: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_tesla_engineer] с [Concept('concept_character_trait', 'чертой')] #V «$tesla_mechanical_engineer$»#!.#!"
 je_mount_everest_good_physician_tt: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_panum_physician] с [Concept('concept_character_trait', 'чертой')] #V «$panum_physician_experienced$»#! или #V «$panum_physician_famous$»#!.#!"
 je_mount_everest_good_ethnologist_tt: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_roy_ethnologist] с [Concept('concept_character_trait', 'чертой')] #V «$roy_ethnologist_experienced$»#! или #V «$roy_ethnologist_famous$»#!."
 je_mount_everest_good_geologist_tt: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_agassiz_geologist] с [Concept('concept_character_trait', 'чертой')] #V «$agassiz_geologist_experienced$»#! или #V «$agassiz_geologist_famous$»#!.#!"
 douglas.401.t: "У подножия священной горы"
 douglas.401.d: "Экспедиция достигает Гималаев — и теперь должна выбрать свой путь к вершине мира."
 douglas.401.f: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'развернула', 'развернул')] карту и [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'расстелила', 'расстелил')] её на камне. Две линии. Два выбора.\n\nНа севере: известный путь через Тибет. Дипломатическое разрешение, старые съёмки и призраки былых экспедиций.\n\nНа юге: запретная долина Непала. Неизведанная местность, шёпот о божественном гневе. Но склоны могут быть более пологими.\n\nОни не могли пойти обоими путями.\n\nГора позволяла лишь одну попытку."
 douglas.401.g: "Следовать по маршруту северного склона."
 douglas.401.h: "Следовать по маршруту южного склона."
 douglas.411.t: "Запретная долина"
 douglas.411.d: "После месяцев переговоров экспедиция входит в Непал, чтобы попытаться совершить южное восхождение на Джомолунгму."
 douglas.411.f: "Её называли «запретной долиной». Десятилетиями ни один иностранец не ступал за последний пост Дарджилинга. Но в то утро туман рассеялся, и [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] с командой проскользнули за последний хребет.\n\nРека, что вилась через лес, больше не была отмечена ни на одной карте. Не было троп. Только козьи стёжки и приглушённые голоса из соседних деревень. Даже шерпы выглядели встревоженными. Ночью ветер доносил звук, не похожий ни на что, что [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'она слышала', 'он слышал')] в Альпах или Андах — низкую, дышащую тишину, которая, казалось, сходила с самих ледников. Мужчины говорили мало. Вьючные животные беспокоились. А врач сообщил о первых случаях горной болезни гораздо раньше, чем ожидалось. Но никто не повернул назад. Потому что за деревьями, за туманом, за последним изгибом долины лежал склон Эвереста — нетронутый с юга.\n\nОн был прекрасен. И, казалось, желал им смерти."
 douglas.411.g: "На этом пути нет дорог."
 douglas.412.t: "Сераки наверху"
 douglas.412.d: "Экспедиция достигает подножия ледопада Кхумбу — лабиринта снежных глыб и зияющих трещин."
 douglas.412.f: "Ледник двигался в тишине. Он скрипел, смещался, вздыхал под их ногами, словно живой. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'видела', 'видел')] лёд и раньше, но никогда такой. Это были не альпийские склоны — это были монолиты, полые и наклонённые, синие, как замёрзшие лёгкие, и такие же хрупкие.\n\nК полудню температура поднялась. Слева раздался глухой треск, затем ещё один — и глыба размером с дом откололась, упав, как стекло. Шерпы разбежались. Один человек потерял равновесие у трещины, и его вытащили в последнее мгновение. Карта была бесполезна. Верёвки замерзали, рвались. Солнечный свет плавил опоры для ног быстрее, чем они могли подниматься.\n\nОни прошли едва ли половину пути.\n\nМожно было двигаться вперёд. Надеяться, что ледник выдержит. Или отступить и попробовать снова перед рассветом, когда холод удержит лёд на месте.\n\nНо каждый час, потраченный здесь, — это ещё один час без воздуха на высоте более восьми тысяч метров."
 douglas.412.g: "Вперёд. Мы пришли сюда, чтобы взойти."
 douglas.412.h: "Это непреодолимое препятствие."
 douglas.413.t: "Белая печь"
 douglas.413.d: "Команда входит в Западный цирк — широкую ледниковую долину между высокими ледяными стенами, где солнце отражается со всех сторон."
 douglas.413.f: "Это должна была быть более лёгкая часть. Плоский участок, короткая передышка перед стеной Лхоцзе. Но никто не предупредил их о жаре.\n\nК полудню Западный цирк превратился в печь. Снег таял под их ботинками. Солнцезащитные очки запотевали или разбивались. Ледяные стены с обеих сторон отражали солнце вниз ослепительным сиянием, пока не казалось, что они идут по горящему стеклу. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'попыталась', 'попытался')] что-то сказать, но больше не [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'чувствовала', 'чувствовал')] языка.\n\nОдин носильщик упал. Другого вырвало. Обморожение сменилось солнечным ожогом. Ледник стонал под ногами, словно возмущаясь их весом. Не было ни ветра, ни звука, ни тени — только слепящий свет, жара и подкрадывающееся ощущение, что тебя варят заживо на крыше мира.\n\nИ всё же стена впереди манила. Стена Лхоцзе маячила, синяя и отвесная.\n\nЖдать означало терять больше времени, еды, сил.\n\nДвигаться означало играть против солнца."
 douglas.413.g: "Вперёд. Мы не можем сейчас останавливаться."
 douglas.413.h: "Прекратите это безумие."
 douglas.414.t: "Синяя стена"
 douglas.414.d: "Чтобы достичь Южного седла, команда должна подняться по крутому и открытому склону Лхоцзе в ухудшающихся условиях."
 douglas.414.f: "Это было уже не восхождение, а ползание вверх против самой гравитации. Лёд под их ногами был твёрд, как мрамор, и синий, как сталь. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'вонзала', 'вонзал')] кошки, [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'вбивала', 'вбивал')] топор и [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'молилась', 'молился')], чтобы он держался. Каждый шаг занимал минуты. Каждый вдох — войну.\n\nДалеко внизу Западный цирк мерцал в ложном спокойствии. Над ними стена простиралась бесконечно. Вернулся ветер — не шторм, а сухой, скребущий свист, высасывающий тепло из костей. Верёвки замерзали. Пальцы коченели. Но права на ошибку не было. Один срыв мог унести троих.\n\nКто-то кашлянул позади [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]. Кровь на снегу. Один шерпа ослабевал. Слишком высоко, слишком быстро. Но они уже были на стене.\n\nСтена не предлагала ни укрытия, ни отдыха. Только подъём.\n\nИ хребет наверху казался не ближе, чем два часа назад."
 douglas.414.g: "Вверх. Мы зашли слишком далеко, чтобы поворачивать назад."
 douglas.414.h: "Бегите, глупцы!"
 douglas.415.t: "Последний лагерь"
 douglas.415.d: "Команда достигает Южного седла. Впереди только вершинный хребет — и окончательное решение."
 douglas.415.f: "Это было всё равно что разбить лагерь на Луне. Воздух был хрупким, ветер — безжалостным. Палатки дрожали от каждого порыва, как раненые животные. Ни птиц, ни голосов, даже треска ледника. Только тонкое, хриплое дыхание. Южное седло было не местом для отдыха, а местом ожидания либо славы, либо смерти.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'сидела', 'сидел')], сгорбившись в тканевой оболочке палатки, и [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'смотрела', 'смотрел')] на карту дрожащей рукой. Путь к вершине был ясен: по юго-восточному хребту на вершину мира.\n\nНо кислород заканчивался. Припасы истощались. Пальцы почернели. Один человек не говорил с самого восхода солнца.\n\nТоплива хватало лишь на один рывок. Одну последнюю попытку. Вершина стояла менее чем в 1000 вертикальных метрах, но в зоне смерти это могло быть всё равно что тысяча миль.\n\nСнаружи ветер выл, как живое существо. Пришло время решать.\n\nВверх или вниз.\n\nЖить или попытаться."
 douglas.415.g: "Начать штурм вершины."
 douglas.415.h: "Отменить восхождение. Выжить, чтобы вернуться в другой год."
 douglas.416.t: "Ступень [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]"
 douglas.416.d: "Прямо под вершиной неожиданное препятствие преграждает путь по финальному хребту — отвесная стена из скал и льда."
 douglas.416.f: "Солнце ещё не взошло. Вершинный хребет бледнел в предрассветном свете, и на мгновение [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'поверила', 'поверил')], что путь открыт. Воздух был слишком разрежен для разговоров. Ветер пронизывал перчатки и очки. Но затем — это остановило их.\n\nОтвесная стена. Десять, может быть, двенадцать метров. Слишком круто, чтобы идти, слишком открыто, чтобы обойти. Один вертикальный монолит перерезал хребет, как лезвие, и не было ни верёвок, ни крючьев, ни маршрута. Этого не было на картах. Ни один отчёт не упоминал об этом. Никто их не предупредил.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'смотрела', 'смотрел')] вверх на стену. Снег истончился. Это был гранит, чёрный и покрытый инеем. Один шерпа попытался разведать слева — отвесный обрыв. Другой попробовал справа — ничего, кроме неба.\n\nГора припасла последний трюк. Последний барьер.\n\nНе было пути в обход. Только наверх.\n\nПозже они назовут его в честь того, кто увидел его первым."
 douglas.416.g: "Подняться по ступени [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]."
 douglas.416.h: "Это слишком опасно. Мы поворачиваем назад."
 douglas.421.t: "Запретный склон"
 douglas.421.d: "С разрешения местных властей экспедиция отправляется на восхождение на Эверест с севера, через долину Ронгбук."
 douglas.421.f: "Не было гостеприимства, только ветер. Молитвенные флаги трепетали без цвета. Монахи смотрели с вершин холмов, как призраки, неподвижные, безмолвные. Тропа заканчивалась там, где начинался ледник, а ледник вёл в тишину.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'читала', 'читал')] отчёты. Мэллори, Нортон, Финч. Их карты были неполными, их заметки — загадочными. Но гора была там, такой, какой они её описывали: высокой, серой, суровой.\n\nЯки остановились у монастыря Ронгбук. Отсюда всё придётся нести на спинах. Экспедиция перестала быть теорией. Она стала камнем, льдом, высотой. Небо над ними было тонким и хрупким. Снег не падал — он висел. Ледник скрипел по ночам, словно что-то древнее ворочалось во сне.\n\nОдин из носильщиков прошептал что-то о боге, который живёт на горе и ещё не умилостивлен.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'не стала', 'не стал')] просить перевода."
 douglas.421.g: "Север даёт разрешение, но не гостеприимство."
 douglas.422.t: "Ледник трещит"
 douglas.422.d: "Восточный ледник Ронгбук раскрывает свои опасности — обрушивающиеся сераки и скрытые трещины угрожают продвижению каравана."
 douglas.422.f: "Солнце едва согрело дно долины, когда раздался первый звук — глухой, стонущий треск из-под льда. Затем ещё один. Люди замерли. Яки забеспокоились. Снег медленно, шипящими пластами сходил с утёсов.\n\nВосточный ледник Ронгбук издали казался неподвижным, но вблизи это был лабиринт синих хребтов, полей трещин и наклонённых башен. Каждый шаг был догадкой. Каждый след — риском.\n\nОни попытались обойти хребет слева. Лёд поддался. Носильщик исчез без звука. Второй человек повис на верёвке, крича. Его кошки скребли по гладкому льду, не находя опоры. Его вытащили — окровавленного, с широко раскрытыми глазами. Долгое время никто не говорил.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'посмотрела', 'посмотрел')] вперёд. Оставалось ещё три километра ледника, прежде чем склон выровняется. Можно было прорываться — сейчас, быстро — или отступить, дождаться более холодных часов и попробовать снова, когда лёд затвердеет.\n\nНо погода менялась. Облака катились, как барабаны. Задержка могла означать шторм."
 douglas.423.t: "Ледяная стена"
 douglas.423.d: "Чтобы достичь Северного седла, команда должна взобраться по крутому и открытому ледяному склону, обдуваемому ветром и тенью."
 douglas.423.f: "Маршрут круто пошёл вверх. Язык ледника, твёрдый как железо, вёл прямо в небо. Северное седло висело над ними, как обещание, высеченное во льду. Но не было тропы — только склон, только ветер, только страх.\n\nЧем выше они поднимались, тем сильнее становился ветер. Он не выл — он визжал. Он сдирал снег со стены и швырял им в лицо, как стеклом. Крючья не вбивались. Верёвки коченели. Солнце исчезло за облаками, словно устыдившись.\n\nЧеловек поскользнулся. Его крик был коротким. Его удержали — едва. Но верёвка теперь была изношена. А хребет наверху казался не ближе.\n\nНекоторые шерпы отказались идти дальше, опустившись на колени в снег и шепча молитвы невидимым божествам.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'стояла', 'стоял')] у основания финального участка. Линия хребта мерцала вверху, как галлюцинация. Можно было пробиться наверх — или спуститься, отдохнуть и попробовать снова с более крепкими верёвками и в более тёплую погоду.\n\nНо задержка грозила штормами. Или хуже — сомнением."
 douglas.424.t: "На грани дыхания"
 douglas.424.d: "Команда разбивает последний лагерь над Северным седлом, открытый ветру и тяжести вершины над ними."
 douglas.424.f: "Не было укрытия. Только ветер и звук лёгких, ищущих воздух, которого не было. Палатки прогибались внутрь с каждым порывом, словно сама гора пыталась их поглотить.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'залезла', 'залез')] в спальный мешок, всё ещё покрытый инеем. Термометр был бесполезен. Холод больше не был числом — он был состоянием бытия. Ни огня. Ни аппетита. Только дрожь и неумолимое шипение кислорода, подаваемого в маски через уже обледеневшие клапаны.\n\nОдин из шерпов больше не говорил. Он сидел неподвижно, с открытыми глазами. Его пальцы стали серыми. Другой всё шептал о доме, хотя никто не спрашивал.\n\nОни были на высоте более 8000 метров. Зона смерти. Мышцы больше не восстанавливались. Тело пожирало само себя, чтобы остаться в живых. Даже дыхание было решением.\n\nВершинный хребет лежал впереди. Они либо достигнут его завтра, либо больше никогда не заговорят о нём."
 douglas.425.t: "Вторая ступень"
 douglas.425.d: "Прямо под вершиной команда достигает отвесной скалы из камня и льда — величайшего препятствия на северном хребте."
 douglas.425.f: "Она вырастала из хребта, как стена для гигантов. Десять метров в высоту, чёрная, вертикальная, покрытая инеем. Вторая ступень.\n\nНе было никакого предупреждения. Ни одна карта не показывала этого.\n\nПуть здесь заканчивался. С одной стороны, тысяча метров воздуха. С другой, узкий уступ не шире ботинка. Ветер впивался в их куртки. Кислород шипел через маски, как пар.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'смотрела', 'смотрел')] вверх. Не было очевидной зацепки. Ни трещины. Просто голая скала, скользкая от замёрзшего дыхания. Шерпы не пошли дальше. Остальные ждали, с пустыми глазами, слишком уставшие, чтобы говорить.\n\nОдин человек предложил попробовать без рюкзаков. Другой вызвался подняться и закрепить верёвку. Но верёвок не осталось.\n\nОни достигли места, где люди поворачивают назад. Или исчезают."
 douglas.425.g: "Попытаться взойти на Вторую ступень."
 douglas.425.h: "Повернуть назад. Это конец."
 douglas.431.t: "Крыша мира"
 douglas.431.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] достигает вершины Джомолунгмы — первый человек, стоящий над миром."
 douglas.431.f: "Не было ни ветра. Ни звука. Только хруст снега под [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'её', 'его')] ботинками и глухая тишина оставленного позади мира.\n\nПоследние шаги казались сном. Лёгкие горели, глаза затуманились, тело дрожало — а затем: ничего выше.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'стояла на вершине одна', 'стоял на вершине один')], солнце ударяло по снегам, как пламя. Далеко внизу облака плыли, как океаны. Вершины, некогда казавшиеся могучими, теперь лежали, как скомканный пергамент.\n\nЗемля изгибалась. Время остановилось. Лишь одно мгновение, высеченное во льду и бездыханном небе."
 douglas.431.g: "Третий полюс наш."
 douglas.432.t: "Гора ждёт"
 douglas.432.d: "Столкнувшись с потерями, истощением и угасающей надеждой, экспедиция отменяется, не достигнув вершины."
 douglas.432.f: "Ни одно решение не далось легко. Не шторм, не обморожение, не голод положили этому конец. Это была тишина у костра. Глаза, которые больше не поднимались. Люди, которые больше не спрашивали «как далеко», а спрашивали «зачем».\n\nКарты были порваны, верёвки задубели от льда. Носильщики шептали молитвы в темноте. Даже [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] больше не [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'смотрела', 'смотрел')] на вершину — только на небо.\n\nОни похоронили то, что не могли унести. Оставили флаг на каменной пирамиде под перевалом.\n\nНа долгом спуске никто не говорил. Но в их молчании не было стыда."
 douglas.432.g: "Неудача на Эвересте — не поражение. Лишь отсрочка."
 douglas.433.t: "Они не вернулись"
 douglas.433.d: "После последнего рывка от них не было вестей. Гора хранила своё молчание."
 douglas.433.f: "Последний сигнал пришёл на закате. Проблеск света на хребте. Силуэт, движущийся прямо под небом. Затем — ничего.\n\nНесколько дней они обыскивали склоны. Шерпы прочёсывали ледник. Ни верёвки. Ни перчатки. Только занесённые ветром следы, ведущие в никуда.\n\nНикто не знал, как далеко они зашли. Достигли ли они вершины. Увидели ли они мир с высоты и узрели ли его целиком.\n\nОдно было известно наверняка: они не вернулись.\n\nНекоторые говорили, что они сорвались. Другие — что они лежат прямо под снегом, с одной рукой, протянутой к небу.\n\nНо немногие шептали другое — что гора приняла их. И что они всё ещё там, во льду и камне, ждут, когда кто-нибудь последует за ними."
 douglas.433.g: "Экспедиция стала легендой."
 douglas_third_pole_modifier: "Третий полюс"
 douglas_mount_everest_physicist_button: "Прогнозы погоды в Гималаях"
 douglas_mount_everest_physicist_button_desc: "Нестабильные погодные условия часто становились причиной неудачных экспедиций в прошлом. Физик с чертой метеоролога мог бы рассчитать подходящую дату для экспедиции, когда при штурме вершины будет наилучшая видимость."
 douglas_mount_everest_engineer_button: "Улучшенное кислородное обеспечение"
 douglas_mount_everest_engineer_button_desc: "Использование кислородных баллонов для альпинизма на экстремальных высотах всё ещё находится в зачаточном состоянии. Инженер мог бы разработать более совершенное устройство на основе этой экспериментальной технологии."
 douglas_mount_everest_physician_button: "Исследование высотной болезни"
 douglas_mount_everest_physician_button_desc: "Высотная болезнь считается одним из опасных побочных эффектов альпинизма в Гималаях. Опытный врач мог бы подробнее изучить это состояние."
 douglas_mount_everest_ethnologist_button: "Местные шерпы"
 douglas_mount_everest_ethnologist_button_desc: "Самые успешные маршруты к гималайским вершинам лежат через знания местных жителей, которые лучше всех знают эту территорию. Этнолог мог бы нанять опытного шерпу в качестве партнёра для экспедиции."
 douglas_mount_everest_geologist_button: "Геологическая съёмка"
 douglas_mount_everest_geologist_button_desc: "Геолог может создать профиль горы и наметить более перспективные маршруты, а также предложить лучшие способы восхождения."
 douglas_mount_everest_risk_decrease_tt: "Начальный риск при восхождении на Джомолунгму снижен."
 douglas.402.t: "Прогноз"
 douglas.402.d: "Доктор [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] представляет первую долгосрочную модель погоды для Гималаев — за несколько дней до отправления экспедиции [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName]."
 douglas.402.f: "Месяцами физик работал в тишине. Графики. Барометрические данные. Записи о ветре из Индии. И теория — радикальная, возможно, но элегантная: великие ветры Центральной Азии следуют сезонным коридорам, а не хаосу.\n\nТеперь, с испачканными мелом рукавами и потрескавшимися кончиками пальцев, доктор [ROOT.Var('curie_physicist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('curie_physicist_var').GetCharacter.IsFemale, 'стояла', 'стоял')] перед альпинистским советом и [SelectLocalization(ROOT.Var('curie_physicist_var').GetCharacter.IsFemale, 'указывала', 'указывал')] на бумагу: последовательность изобар, нарисованных от руки, предсказывающая десятидневное атмосферное окно вдоль гималайского хребта.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'сузила', 'сузил')] глаза. «И вы уверены?»\n\nФизик [SelectLocalization(ROOT.Var('curie_physicist_var').GetCharacter.IsFemale, 'поправила', 'поправил')] очки.\n\n«Настолько, насколько можно быть уверенным, — говоря с горой»."
 douglas.402.g: "Использовать прогноз для определения времени восхождения."
 douglas.403.t: "Воздух для зоны смерти"
 douglas.403.d: "Доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] представляет новый кислородный аппарат, разработанный для выживания на больших высотах."
 douglas.403.f: "До сих пор кислород на высоте более 8000 метров был экспериментом — неуклюжим, шипящим грузом, пристёгнутым к спинам людей, которые едва могли идти. Протекающие клапаны. Замёрзшие трубки. Баллоны, слишком тяжёлые для задыхающихся плеч.\n\n[ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'изменила', 'изменил')] это.\n\nС регуляторами давления, настроенными с микроскопической точностью, изолированными трубками и модульной системой крепления, новое устройство весило вдвое меньше и обеспечивало вдвое большую стабильность потока. Баллоны теперь можно было носить под одеждой, предотвращая замерзание. Маска прилегала к лицу, как вторая кожа водолаза.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'подняла', 'поднял')] устройство рукой в перчатке и [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'кивнула', 'кивнул')].«Будет ли это работать на высоте более 26 000 футов?»\n\nИнженер улыбнулся.\n\n«Оно было создано, чтобы работать там, где не работает ничего другого»."
 douglas.403.g: "Оснастить команду улучшенной системой."
 douglas.404.t: "Невидимая опасность"
 douglas.404.d: "Доктор [ROOT.Var('panum_physician_var').GetCharacter.GetLastName] инструктирует команду о том, как распознавать и предотвращать высотную болезнь во время восхождения."
 douglas.404.f: "Обморожение будет видно. К падениям можно подготовиться. Но это — это было нечто иное.\n\n[ROOT.Var('panum_physician_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'стояла', 'стоял')] перед экспедицией и [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'начала', 'начал')] описывать симптомы: головная боль, одышка, едва заметное замешательство, которое приводит к фатальным решениям.\n\n«Это начинается как опьянение, — [SelectLocalization(ROOT.Var('panum_physician_var').GetCharacter.IsFemale, 'сказала она', 'сказал он')], — но заканчивается как утопление».\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'слушала', 'слушал')] в тишине. Это был рецепт выживания."
 douglas.404.g: "Строго следовать протоколу врача."
 douglas.405.t: "Человек, который знает гору"
 douglas.405.d: "Благодаря тихим переговорам и культурному пониманию, доктор [ROOT.Var('roy_ethnologist_var').GetCharacter.GetLastName] заручается поддержкой ветерана-шерпы с непревзойдённым знанием склонов Эвереста."
 douglas.405.f: "Он не носил карт. Он почти не говорил по-английски. И всё же, когда он указывал, гора отвечала.\n\nИменно [ROOT.Var('roy_ethnologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('roy_ethnologist_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] его — не в списке имён, а в тихой деревне в двух долинах отсюда.\n\n«Он был выше, чем любой из нас, — [SelectLocalization(ROOT.Var('roy_ethnologist_var').GetCharacter.IsFemale, 'сказала', 'сказал')] этнолог, — и возвращался не раз».\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'протянула', 'протянул')] руку. Шерпа молча взял её. Без церемоний. Без сомнений.\n\n«Вы, может, и изучали вершину, — [SelectLocalization(ROOT.Var('roy_ethnologist_var').GetCharacter.IsFemale, 'пробормотала', 'пробормотал')] доктор [ROOT.Var('roy_ethnologist_var').GetCharacter.GetLastName], — но он говорил с её тенью»."
 douglas.405.g: "Нанять ветерана-шерпу в качестве ведущего проводника."
 douglas.406.t: "Кости горы"
 douglas.406.d: "Доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] исследует местность и находит более безопасный маршрут восхождения через древние формации."
 douglas.406.f: "[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'Она провела', 'Он провёл')] пальцами по чёрным прожилкам в камне и медленно [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'кивнула', 'кивнул')]. Сланцы, затем гнейс, затем карман трещиноватого известняка. Линии разломов, как шрамы. Складки давления, как замёрзшие волны.\n\n«Гора не неподвижна, — [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'сказала', 'сказал')] геолог, — она просто медленная».\n\nЧасами доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'шла', 'шёл')] впереди команды, с молотком в руке, стуча, слушая, читая. [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'Учёная отметила', 'Учёный отметил')] хребет, который избегал опасного ледопада. Другой, который срезал по диагонали через открытые ветрам осыпи, экономя два дня восхождения.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] молча [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'наблюдала', 'наблюдал')].\n\n«Вы можете предсказать, что выдержит?»\n\nДоктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'пожала', 'пожал')] плечами.\n\n«Нет, — [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'сказала она', 'сказал он')]. — Но я могу сказать вам, что держалось последние десять миллионов лет».\n\nИ иногда этого было достаточно."
 douglas.406.g: "Следовать рекомендациям геолога."
 douglas.121.t: "Храбрость, выкованная дома"
 douglas.121.d: "Годы тренировок в #tooltippable_name [ROOT.GetCountry.GetAdjective]их#! горах вселили спокойствие туда, где когда-то было сомнение. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] возвращается с более твёрдой рукой и более храбрым сердцем."
 douglas.121.f: "«Раньше [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'я думала', 'я думал')], что страх — это то, что нужно преодолеть, — [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'сказала она', 'сказал он')]. — Но на самом деле, это то, что нужно нести, не позволяя ему управлять тобой».\n\nМесяцами [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] поднимался на хребты и ледники дома — в одиночку, в тишине, часто повторяя один и тот же маршрут, чтобы заметить то, что когда-то осталось незамеченным.\n\nВершины не стали выше, но [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'она стала', 'он стал')] выше. Камнепады, холод и белая мгла стали знакомыми противниками. И хотя ни одно из восхождений не попало в заголовки газет, каждое оставило свой след — не в славе, а в силе духа."
 douglas.121.g: "Пусть придут высоты."
 douglas.122.t: "Шаги, не потраченные впустую"
 douglas.122.d: "Там, где другие поворачивали назад, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] просто [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'продолжала', 'продолжал')] идти. Даже неудача становилась топливом, а каждая тропа — уроком."
 douglas.122.f: "Вершина никогда не была целью. Не совсем.\n\nНа одном хребте буря разразилась до того, как [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'она достигла', 'он достиг')] финального участка. На другом лавина за ночь стёрла маршрут. Временами заканчивалась еда, или проводники отказывались от попытки. Но [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'она', 'он')] оставался. Возвращался. Приспосабливался.\n\nГора не поддаётся упрямству. Но она признаёт настойчивость.\n\nМесяцами [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] взбирался на знакомые вершины незнакомыми путями, пробуя новые подходы, тестируя инструменты, нанося на карту скрытые уступы. То, что другие считали бесплодным повторением, стало основой чего-то, что труднее заслужить, чем славу: выносливости."
 douglas.122.g: "Ни один путь, пройденный дважды, не бывает прежним."
 douglas.123.t: "За пределами известных карт"
 douglas.123.d: "Любопытство увело [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] за пределы маршрутов, которым доверяли другие. Там, в белых пятнах, [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'она нашла', 'он нашёл')] цель — и путь."
 douglas.123.f: "Старые карты показывали границы знаний, а не только земли. Большинство альпинистов оставались в их пределах. Но не [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName].\n\nПока другие следовали установленным маршрутам, [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'она уходила', 'он уходил')] дальше — на разрушенные хребты, которые никто не наносил на карту, в безымянные долины, к утёсам, слишком далёким от любого города, чтобы привлекать туристов или искателей славы.\n\nВ одном из таких путешествий [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'она разбила', 'он разбил')] лагерь у забытого ледника, [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'каталогизировала', 'каталогизировал')] скальные пласты, намекающие на древние сдвиги, и [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'нанесла', 'нанёс')] на карту ущелье, о котором шептались местные жители, но в которое никогда не осмеливались войти. Это не было первым восхождением. Но это было первым пониманием."
 douglas.123.g: "Нет большей радости, чем найти то, чего никто не ожидал."
 douglas.124.t: "Сталь и камень"
 douglas.124.d: "Когда [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'встретилась', 'встретился')] с генералом [SCOPE.sCharacter('douglas_general_scope').GetLastName], опыт столкнулся с инстинктом — и оба вышли преображёнными."
 douglas.124.f: "У [SelectLocalization(SCOPE.sCharacter('mountain_general').IsFemale, 'неё', 'него')] была осанка человека, привыкшего кричать сквозь артиллерийские обстрелы, и мундир, на котором всё ещё была альпийская снежная пыль. Генерал [SCOPE.sCharacter('mountain_general').GetFullName] сражался на высотах, вёл людей через мороз и тишину и понимал гору не как преграду, а как поле битвы.\n\n[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'пришла', 'пришёл')], чтобы учиться у [SelectLocalization(SCOPE.sCharacter('mountain_general').IsFemale, 'неё', 'него')]. И всё же, через несколько дней стало ясно, что обмен был взаимным.\n\n«Мы планируем кампании. Вы планируете выживание», — пробормотал генерал, когда [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('douglas_mountaineer_var').GetCharacter.IsFemale, 'осматривала', 'осматривал')] скальные крючья и высотные карты.\n\n«Вы двигаете армии, — последовал ответ, — я двигаюсь в одиночку. Но гора судит нас обоих одинаково»."
 douglas.124.g: "Гора учит всех, но на разных языках."
