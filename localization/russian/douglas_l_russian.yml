 douglas.103.t: "Полк горных стрелков"
 douglas.103.d: "Благодаря своему впечатляющему опыту в покорении гор и обороне в горной местности, [SCOPE.sCharacter('douglas_mountain_veteran').GetFullName] решил использовать свои превосходные навыки для создания элитного подразделения горных стрелков."
 douglas.103.f: "«Гебиргсъегер», «Альпини» или «Альпийские стрелки» — вот лишь несколько примеров элитных войск некоторых стран, специализирующихся на войне на высотах. Созданные в 1872 году, «Альпини» являются старейшей действующей горной пехотой в мире. Их первоначальной задачей была защита границы Италии с Францией и Австро-Венгрией."
 douglas.103.g: "Они пронесут его наследие в будущее."
