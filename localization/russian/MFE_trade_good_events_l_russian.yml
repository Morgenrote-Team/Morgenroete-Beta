l_russian:
 MFE_trade_good_events.1.t: "Пули для «[SCOPE.sW('active_war').GetName]»"
 MFE_trade_good_events.1.d: "Поступили сообщения о недавней модернизации оружейных заводов в [SCOPE.sC('munitions_state').GetCustom('RU_SL_PP')]."
 MFE_trade_good_events.1.f: "«Местная пресса вовсю трубит об этом впечатляющем достижении, и мы их не виним»."
 MFE_trade_good_events.1.a: "Как раз вовремя для войны"
 MFE_trade_good_events.2.t: "Просьбы о боеприпасах"
 MFE_trade_good_events.2.d: "Война «[SCOPE.sW('active_war').GetName]», в которой участву[SCOPE.sC('ally').GetAltNameNoFormatting('RU_CL_END_T')] [SCOPE.sC('ally').GetNameNoFlag], вскрыла скудность их запасов боеприпасов, и теперь они умоляют нас дать им боеприпасы."
 MFE_trade_good_events.2.f: "«Назовите свою цену, [ROOT.GetCountry.GetNameNoFlag], и как только мы выиграем эту войну, она ваша»."
 MFE_trade_good_events.2.a: "Мы можем поделиться патронами"
 MFE_trade_good_events.2.b: "Как же мы будем стрелять во врагов без патронов?!"
 MFE_trade_good_events.3.t: "Тайная просьба от [SCOPE.sC('ally').GetAltNameNoFlag('RU_CL_RP')]"
 MFE_trade_good_events.3.d: "Похоже, война «[SCOPE.sW('active_war').GetName]» застала [SCOPE.sC('ally').GetAltNameNoFlag('RU_CL_VP')] врасплох. У них уже заканчиваются припасы, в особенности артиллерия.\n\nОни тайно прислали к нам дипломатов, которые сулят всевозможные блага, если мы поможем."
 MFE_trade_good_events.3.f: "«Поверьте, у [SCOPE.sC('ally').GetAltNameNoFlag('RU_CL_RP')] действительно есть шанс выиграть эту войну, но нам понадобится помощь! Не бросайте нас в самый отчаянный час!»"
 MFE_trade_good_events.3.a: "Мы можем выделить несколько артиллерийских орудий"
 MFE_trade_good_events.3.b: "Боюсь, наши собственные запасы слишком малы"
 MFE_trade_good_events.4.t: "Угроза безопасности"
 MFE_trade_good_events.4.d: "Наши спецслужбы докладывают о вторжениях на военные заводы в [SCOPE.sS('arms_state').GetCustom('RU_SL_PP')], в результате которых пропало большое количество взрывчатых материалов."
 MFE_trade_good_events.4.f: "Как они могли такое допустить?"
 MFE_trade_good_events.4.a: "Надеюсь, они не попали не в те руки..."
 MFE_trade_good_events.5.t: "Небывалый урожай в [SCOPE.sS('arable_state').GetCustom('RU_SL_PP')]"
 MFE_trade_good_events.5.d: "Поступают сообщения, что дожди в [SCOPE.sS('arable_state').GetCustom('RU_SL_PP')] сотворили чудо с местными фермами. Сельскохозяйственное производство, и без того впечатляющее, превзошло все ожидания."
 MFE_trade_good_events.5.f: "«Урожай в этом году настолько хорош, что придётся нанять больше рабочих, но, к счастью, мы можем себе это позволить»."
 MFE_trade_good_events.5.a: "Лучшего времени и не придумаешь"
 MFE_trade_good_events.6.t: "Безумец на танковом заводе"
 MFE_trade_good_events.6.d: "Местные газеты в [SCOPE.sS('tank_state').GetCustom('RU_SL_PP')] пестрят ужасными заголовками: какой-то безумец угнал танк и устроил кровавую бойню, уничтожив целую деревню и убив десятки невинных, прежде чем его остановила полиция."
 MFE_trade_good_events.6.f: "«Никто не знает, почему произошла эта бессмысленная трагедия, и мы никогда не узнаем причину»."
 MFE_trade_good_events.6.a: "Мы скорбим вместе с ними, но ничем не можем помочь"
 MFE_trade_good_events.6.b: "Дайте им всё, что нужно - это просто ужасно..."
 MFE_trade_good_events.7.t: "Инвестиции взлетают в [SCOPE.sS('plane_state').GetCustom('RU_SL_PP')]"
 MFE_trade_good_events.7.d: "Инвесторы в авиацию продолжают стекаться в [SCOPE.sS('plane_state').GetCustom('RU_SL_VP')], перебивая ставки друг друга в попытках заключить контракты с местными заводами."
 MFE_trade_good_events.7.f: "«Мы никогда не видели ничего подобного - промышленники изо всех сил пытаются урвать свой кусок пирога, пока не стало слишком поздно»."
 MFE_trade_good_events.7.a: "Прекрасное время, чтобы жить в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]"
 MFE_trade_good_events.8.t: "Низкое качество"
 MFE_trade_good_events.8.d: "[SCOPE.sS('ironclad_state').GetName] стремительно приобретает дурную славу из-за низкого качества экспортируемых кораблей."
 MFE_trade_good_events.8.f: "«Эти корабли и месяца на воде не пробыли, а уже полностью проржавели? Это говорит лишь о плохом качестве железа»."
 MFE_trade_good_events.8.a: "Будем надеяться, что качество их поставок улучшится"
 MFE_trade_good_events.9.t: "Неблагодарный труд"
 MFE_trade_good_events.9.d: "Нехватка зерна в [SCOPE.sS('grain_state').GetCustom('RU_SL_PP')] начинает вызывать социальные проблемы. Радикальные элементы из числа интеллигенции пользуются моментом, чтобы обрушиться на [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] с критикой за неумелое управление кризисом."
 MFE_trade_good_events.9.f: "«Народ не должен вверять власть правительству, которое не может прокормить своих граждан»."
 MFE_trade_good_events.9.a: "А им точно нужна еда, чтобы жить?"
 MFE_trade_good_events.9.b: "Перенаправить часть средств в [SCOPE.sS('grain_state').GetCustom('RU_SL_DP')]"
 MFE_trade_good_events.9.c: "Насколько я знаю, в магазинах [SCOPE.sS('grain_state').GetCustom('RU_SL_RP')] полно пирожных"
 MFE_trade_good_events.10.t: "Вонючие креветки и окунь"
 MFE_trade_good_events.10.d: "В последнее время рыболовные траулеры из [SCOPE.sS('fish_state').GetCustom('RU_SL_RP')] привозят улов с отвратительным вкусом: все виды морепродуктов имеют жирную, маслянистую текстуру с привкусом тухлятины."
 MFE_trade_good_events.10.f: "«Фу, чувствуете этот запах? Конечно, чувствуете. Как только входишь в здание, хочется тут же выйти. Даже дворовые коты от этого нос воротят»."
 MFE_trade_good_events.10.a: "Как рыба может быть слишком рыбной?"
 MFE_trade_good_events.11.t: "Верфи [SCOPE.sS('ship_state').GetCustom('RU_SL_RP')]"
 MFE_trade_good_events.11.d: "Начальник порта в [SCOPE.sS('ship_state').GetCustom('RU_SL_PP')] докладывает о завершении строительства военных кораблей."
 MFE_trade_good_events.11.f: "«Надеюсь, вы захватили с собой бутылку шампанского - по традиции, при спуске военного корабля на воду принято устраивать крещение»."
 MFE_trade_good_events.11.a: "Фантастические новости! Ещё и с опережением графика"
 MFE_trade_good_events.11.b: "В таком случае нам нужно больше шампанского!"
 MFE_trade_good_events.12.t: "Текстиль из [SCOPE.sS('fabric_state').GetCustom('RU_SL_RP')]"
 MFE_trade_good_events.12.d: "Ткани, производимые в [SCOPE.sS('fabric_state').GetCustom('RU_SL_PP')], приобретают международную репутацию благодаря превосходному качеству."
 MFE_trade_good_events.12.f: "«Посмотрите, как материал меняет цвет на солнце. Как думаете, это египетский хлопок?»"
 MFE_trade_good_events.12.a: "Мы всегда рады, когда промышленность процветает"
 MFE_trade_good_events.12.b: "Это высокая мода!"
 MFE_trade_good_events.13.t: "Пожар на лесопилках"
 MFE_trade_good_events.13.d: "Газеты в [SCOPE.sS('sawmill_fire_state').GetCustom('RU_SL_PP')] сообщают о страшном пожаре, который уничтожил большие кварталы города."
 MFE_trade_good_events.13.f: "«На окраине города загорелась куча промасленной ветоши, и в результате вспыхнувшего пожара погибло 139 человек»."
 MFE_trade_good_events.13.a: "Какое бедствие! Бедные, бедные души"
 MFE_trade_good_events.13.b: "Немедленно отправить помощь!"
 MFE_trade_good_events.14.t: "Лучшая древесина в [SCOPE.sS('hardwood_state').GetCustom('RU_SL_PP')]"
 MFE_trade_good_events.14.d: "Мебельщики по всей [SCOPE.sS('hardwood_state').GetCustom('RU_SL_DP')] славятся использованием твёрдых пород дерева из местных лесов."
 MFE_trade_good_events.14.f: "«Давайте, взгляните на текстуру, постучите по доске... слышите этот звук? Это крепкий, прочный материал... прослужит сто лет»."
 MFE_trade_good_events.14.a: "Это ведь хорошо, да?"
 MFE_trade_good_events.14.b: "Звучит отлично! Давайте делать из этой древесины музыкальные инструменты!"
 MFE_trade_good_events.15.t: "Всплеск организованной преступности в [SCOPE.sS('grocery_state').GetCustom('RU_SL_PP')]"
 MFE_trade_good_events.15.d: "В [SCOPE.sS('grocery_state').GetCustom('RU_SL_PP')] банды из голодающих местных жителей сообща грабят бакалейные и гастрономические лавки."
 MFE_trade_good_events.15.f: "«Когда фунт ростбифа стоит вдвое дороже, чем полгода назад, что ещё остаётся простому человеку?»"
 MFE_trade_good_events.15.a: "Надеюсь, полиция с этим разберётся"
 MFE_trade_good_events.15.b: "Давайте пошлём помощь, а не войска!"
 MFE_trade_good_events.16.t: "Плачевное положение дел"
 MFE_trade_good_events.16.d: "Рост цен на хлопок привёл к резкому подорожанию одежды в [SCOPE.sS('clothes_state').GetCustom('RU_SL_PP')]."
 MFE_trade_good_events.16.f: "«О да, дела определённо плохи. Я видел, как беспризорники носят мешки из-под муки вместо туник, и, поверьте, это ещё счастливчики»."
 MFE_trade_good_events.16.a: "Это трагедия, но она вне нашего контроля..."
 MFE_trade_good_events.16.b: "Думаю, мы можем позволить себе по мешку муки для каждого..."
 MFE_trade_good_events.17.t: "Трагедия в выставочном зале"
 MFE_trade_good_events.17.d: "[ROOT.GetCountry.GetRuler.GetFullName] [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'скончалась', 'скончался')] во время визита на мебельную фабрику в [SCOPE.sS('furniture_state').GetCustom('RU_SL_PP')]: [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'она', 'он')] внезапно [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'потеряла', 'потерял')] сознание, присев на стул."
 MFE_trade_good_events.17.f: "«Массовое присутствие полиции в [SCOPE.sS('furniture_state').GetCustom('RU_SL_PP')] мешает выяснить детали произошедшего, но это очевидная катастрофа»."
 MFE_trade_good_events.17.a: "Это был несчастный случай или злой умысел?"
 MFE_trade_good_events.17.b: "Хм... Стул-убийца. Такого в нашей коллекции ещё нет."
 MFE_trade_good_events.18.t: "Лучшая бумага в мире"
 MFE_trade_good_events.18.d: "Производство бумаги в [SCOPE.sS('paper_state').GetCustom('RU_SL_PP')] превзошло все ожидания, и регион становится известен как крупный промышленный центр."
 MFE_trade_good_events.18.f: "«Всего двадцать лет назад в городе не было ни одной фабрики, а теперь они на каждом углу»."
 MFE_trade_good_events.18.a: "Мы продадим излишки за ту бумагу, что можно сложить, если вы понимаете, о чём я"
 MFE_trade_good_events.18.b: "Бумагу, пожалуйста!"
 MFE_trade_good_events.19.t: "Погасите звёзды"
 MFE_trade_good_events.19.d: "Растущее использование электричества в [SCOPE.sS('power_state').GetCustom('RU_SL_PP')], особенно уличных фонарей, привело к световому загрязнению."
 MFE_trade_good_events.19.f: "«Раньше в ясную ночь с городской площади можно было увидеть Большую Медведицу, а теперь, чтобы созерцать небеса, нужно выезжать за город»."
 MFE_trade_good_events.19.a: "Можно сказать, у прогресса есть непредвиденные последствия"
 MFE_trade_good_events.19.b: "Выключайте часть фонарей на ночь!"
 MFE_trade_good_events.20.t: "Взрывоопасная ситуация"
 MFE_trade_good_events.20.d: "Мощный взрыв на серных рудниках близ [SCOPE.sS('sulfur_state').GetCustom('RU_SL_RP')] уничтожил рабочую площадку и унёс жизни сотен рабочих."
 MFE_trade_good_events.20.f: "«Казалось, это будет обычный день, как и любой другой, но потом земля затряслась, и раздался ужасный звук...»"
 MFE_trade_good_events.20.a: "Под землёй остались люди? Это ужасно"
 MFE_trade_good_events.20.b: "Где сера? Она в безопасности? С ней всё в порядке?"
 MFE_trade_good_events.21.t: "Странные сцены в свинцовой шахте"
 MFE_trade_good_events.21.d: "Произошла авария на свинцовых рудниках в [SCOPE.sS('lead_state').GetCustom('RU_SL_PP')]; всё потеряно."
 MFE_trade_good_events.21.f: "«Рабочие всё ещё пытаются спасти тех, кто оказался под землёй, но надежды мало...»"
 MFE_trade_good_events.21.a: "Мы скорбим об этой трагической, бессмысленной гибели людей"
 MFE_trade_good_events.21.b: "Это была наша ведущая свинцовая шахта!"
 MFE_trade_good_events.22.t: "Утечка вредных химикатов"
 MFE_trade_good_events.22.d: "Свинцовые рудники близ [SCOPE.sS('lead_state').GetCustom('RU_SL_RP')] загрязняют местные источники питьевой воды."
 MFE_trade_good_events.22.f: "«Крестьяне говорят, что вода вызывает болезни почек и выпадение волос, и просят, чтобы [ROOT.GetCountry.GetRuler.GetFullName] в знак солидарности [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'выпила', 'выпил')] из местного колодца»."
 MFE_trade_good_events.22.a: "Я это пробовать не буду! Уберите от меня этот стакан воды"
 MFE_trade_good_events.22.b: "Это лучшая вода, которую мне доводилось пить!"
 MFE_trade_good_events.23.t: "Начало новой эры"
 MFE_trade_good_events.23.d: "Чудесное вещество, известное как „каучук“, меняет жизнь повсюду - от столицы до деревни."
 MFE_trade_good_events.23.f: "«Это может прозвучать как преувеличение, но справедливо будет сказать, что мы вступаем в новую эру - из этого дивного вещества можно сделать практически всё!»"
 MFE_trade_good_events.23.a: "Мы приветствуем технологические достижения, которые сулит этот материал"
 MFE_trade_good_events.23.b: "Просто делайте больше!"
 MFE_trade_good_events.24.t: "Чёрное золото [SCOPE.sS('oil_state').GetCustom('RU_SL_RP')]"
 MFE_trade_good_events.24.d: "Количество нефти, найденной в [SCOPE.sS('oil_state').GetCustom('RU_SL_PP')], в одночасье сделало людей миллионерами, повысив национальный интерес к горнодобывающей промышленности."
 MFE_trade_good_events.24.f: "«Эта штука, может, и не выглядит впечатляюще, но, говорю вам, она на вес золота!»"
 MFE_trade_good_events.24.a: "Наша тяжёлая промышленность требует столько нефти, сколько мы можем добыть, так что это радует"
 MFE_trade_good_events.24.b: "Я предпочитаю настоящее золото!"
 MFE_trade_good_events.25.t: "Сталелитейный завод разрушает местные общины"
 MFE_trade_good_events.25.d: "Жители [SCOPE.sState('steel_state').GetCustom('RU_SL_RP')] начинают сожалеть о появлении сталелитейных заводов в городе, оплакивая потерю своего традиционного уклада жизни."
 MFE_trade_good_events.25.f: "«Сначала мы были просто благодарны за рабочие места, но шестнадцатичасовые смены, семь дней в неделю... разве это жизнь?»"
 MFE_trade_good_events.25.a: "Будущее [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] требует, чтобы у нас была мощная сталелитейная промышленность"
 MFE_trade_good_events.25.b: "Хотя бы сократите им смены..."