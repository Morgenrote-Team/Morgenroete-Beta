 curtiss_altitude_under_5000_custom_1: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'отправилась', 'отправился')] в высотный полёт. Взяв как можно меньше груза, [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'поднялась', 'поднялся')] на борт воздушного шара [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]. Набор высоты был стремительным. Вскоре [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] уже едва [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'могла', 'мог')] различить людей внизу. Панорама захватывала дух. Несмотря на довольно большую высоту, [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'была', 'был')] ещё далеко от облачного покрова. Когда барометр показал #p [ROOT.Var('new_balloon_altitude_var').GetValue]#! метров, [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName] сперва [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'провела', 'провёл')] замеры метеорологическим оборудованием, а затем, открыв клапан, медленно [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'опустилась', 'опустился')] обратно на землю."
 curtiss_altitude_under_9000_custom_1: "Воздушный шар [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] взмыл в воздух. Он должен был быть лёгким, ведь [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'поставила', 'поставил')] себе цель подняться как можно выше. Сначала дома становились всё меньше и меньше, пока не превратились в крошечные точки. Затем шар вошёл в облака; казалось, будто он плывёт в тумане, и на метеорологическом оборудовании начали собираться капельки воды. Постепенно становилось всё холоднее. К счастью, [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName] тепло [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'оделась', 'оделся')]. Вскоре [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'почувствовала', 'почувствовал')], что дышать становится всё труднее.\nНа высоте #p [ROOT.Var('new_balloon_altitude_var').GetValue]#! метров [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'начала', 'начал')] необходимые замеры. Затем начался долгий спуск."
 curtiss_altitude_under_12000_no_tools_custom_1: "Воздух становился всё более разреженным. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] с трудом [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'могла', 'мог')] сосредоточиться. [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'Её', 'Его')] голова гудела. Взгляд на барометр показал, что [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она находится', 'он находится')] выше любой горы на планете. Люди могли подняться на такую высоту, только если летели. Тем временем тело аэронавта начало дрожать. Одежда промокла от облаков, а температура уже была значительно ниже нуля.\n[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'упала', 'упал')] на колени. [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'Она', 'Он')] с трудом [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'смогла', 'смог')] лишь ослабить клапан, чтобы начать спуск. Затем [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'потеряла', 'потерял')] сознание.\nНа земле [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'пришла', 'пришёл')] в себя. Точнее, в тёплой постели. К счастью, [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'её', 'его')] нашли."
 curtiss_altitude_under_12000_tools_custom_1: "Даже с кислородным баллоном было нелегко. Аэронавт [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'дрожала', 'дрожал')] от холода, пробиравшего тело. Воздух был ледяным, и было трудно стоять. Но данные на этой высоте были важны. Поэтому [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'начала', 'начал')] проводить замеры. Барометр показывал высоту #p [ROOT.Var('new_balloon_altitude_var').GetValue]#! метров. Выше любой горы на свете. К сожалению, отсюда почти ничего не было видно. Плотные облака закрывали обзор.\nКогда замеры были закончены, [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'начала', 'начал')] выпускать газ из оболочки шара [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]. Шар начал снижаться."
 curtiss_altitude_under_16000_no_tools_custom_1: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] почти не [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'могла', 'мог')] двигать собственным телом. [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'Она', 'Он')] даже не [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'чувствовала', 'чувствовал')] холода. Только тяжёлое дыхание. Здесь, наверху, воздух был чрезвычайно разрежен. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName] не [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'знала', 'знал')], переживёт ли это приключение. С трудом [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'подтянулась', 'подтянулся')] на одном из канатов. [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'Она', 'Он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'должна была', 'должен был')] добраться до клапана. Так близко. Всё медленно начало темнеть. Своими зубами [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'схватила', 'схватил')] клапан. [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'Начала', 'Начал')] поворачивать его. Затем [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'потеряла', 'потерял')] сознание.\nТак тепло. Где [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')]? Перед [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'ней', 'ним')] проносились тени. Медленно они превратились в людей. Женщина протянула [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'ей', 'ему')] миску с супом. Похоже, [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'выжила', 'выжил')]."
 curtiss_altitude_under_16000_tools_custom_1: "Кислородный баллон помогал справляться с разреженным воздухом. Но холод проникал сквозь толстую одежду. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'дрожала', 'дрожал')]. Но, похоже, [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'поднялась', 'поднялся')] так высоко, как только позволял воздушный шар [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'начала', 'начал')] проводить замеры для научного общества. Барометр показывал #p [ROOT.Var('new_balloon_altitude_var').GetValue]#! метров. Невероятная высота. К сожалению, из-за облаков вид был не очень хорош.\nПосле того как [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'закончила', 'закончил')] замеры, [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'начала', 'начал')] выпускать воздух из оболочки. Медленно шар поплыл вниз."
 curtiss_altitude_over_16000_custom_1: "В гермокабине было относительно тепло. Температура снаружи, однако, была невыносимой. Хорошо, что [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'сидела', 'сидел')] в кабине, а не снаружи. Дышать здесь тоже было легко. Из окна [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'смотрела', 'смотрел')] на земной шар. Отсюда кривизна Земли была хорошо видна. Кверху синева неба становилась всё более чёрной. Над землёй плыли облака. Отсюда они были похожи на сахарную вату. Когда барометр показал #p [ROOT.Var('new_balloon_altitude_var').GetValue]#! метров, [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName], находясь под защитой гермокабины, [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'открыла', 'открыл')] клапан, заставив шар медленно опуститься на землю."
 curtiss_distance_under_400_custom_1: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'поставила', 'поставил')] себе цель пролететь как можно дальше на воздушном шаре [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]. Пока шар плыл над ландшафтом, [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'была занята', 'был занят')] всем необходимым. [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'Ей', 'Ему')] нужно было найти правильную высоту, чтобы наилучшим образом использовать ветер, следить за погодой и ориентироваться. После #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#! часов полёта шар мягко приземлился. После того как [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'спросила', 'спросил')] у местного жителя, где [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она приземлилась', 'он приземлился')], [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] с помощью карты [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'рассчитала', 'рассчитал')] пройденное расстояние. Оно должно было составлять около #p [ROOT.Var('new_balloon_distance_var').GetValue]#! километров."
 curtiss_distance_under_800_custom_1: "Пролететь как можно дальше на воздушном шаре было не так-то просто. Нужно было дождаться хорошей погоды, иметь хороший шар и успешно ориентироваться. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'считала', 'считал')], что все эти условия для [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'неё', 'него')] соблюдены. Поэтому [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'поднялась', 'поднялся')] в воздух на шаре [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')], чтобы установить новый рекорд дальности. По пути [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'пролетела', 'пролетел')] над различными ландшафтами, небольшими горами и реками. Погода оставалась хорошей на протяжении всего полёта, и поэтому [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'смогла', 'смог')] без проблем приземлиться через #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#! часов.\nНа земле [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'спросила', 'спросил')] у местного жителя, где [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'приземлилась', 'приземлился')]. В результате удалось определить, что пройденное расстояние составило около #p [ROOT.Var('new_balloon_distance_var').GetValue]#! километров."
 curtiss_distance_under_2000_custom_1: "Погода для полёта была идеальной и оставалась такой до конца. Во время полёта [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'смогла', 'смог')] увидеть самые разнообразные пейзажи: от огромных городов и маленьких деревушек до необитаемых просторов. Однако для такого длительного путешествия было недостаточно лететь только днём; [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] продолжал скользить по небу и ночью. Лишь спустя #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#! часов [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'решила', 'решил')] приземлиться. Шар медленно опустился на землю, где [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'узнала', 'узнал')] от местных жителей, где теперь [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'находится', 'находится')]. Похоже, [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'пролетела', 'пролетел')] #p [ROOT.Var('new_balloon_distance_var').GetValue]#! километров. Приличное расстояние."
 curtiss_distance_over_2000_custom_1: "Такой длительный полёт, какой [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'запланировала', 'запланировал')] [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName], требовал достаточного количества припасов, нескольких человек и идеальной погоды. На борту воздушного шара [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] было достаточно припасов, а аэронавта сопровождали ещё двое. К счастью, погода в тот день тоже была очень хорошей. Итак, полёт начался из столицы — [ROOT.GetCountry.GetCapital.GetCityHubName] — и шар часами плыл по воздуху. Вечером все трое насладились вкусным ужином из вина и жареного цыплёнка, которого они взяли с собой. Звёздной ночью они по очереди несли вахту. За этот #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#!-часовой полёт шар преодолел огромное расстояние. В общей сложности [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'пролетела', 'пролетел')] #p [ROOT.Var('new_balloon_distance_var').GetValue]#! километров. Почти невообразимая дистанция."
 curtiss_custom_death_sea: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'предприняла', 'предпринял')] новую попытку установить рекорд. В процессе [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'сбилась', 'сбился')] с курса, и [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'её', 'его')] унесло в море. Все попытки спасти аэронавта не увенчались успехом. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName], вероятно, [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'утонула', 'утонул')] в море."
 curtiss_custom_death_hydrogen_ignition: "Когда [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'поднялась', 'поднялся')] на большую высоту на шаре [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')], никто не ожидал, что этот полёт станет для [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'неё', 'него')] последним. На высоте около 900 метров произошёл несчастный случай: каким-то образом водород в шаре воспламенился. В мгновение ока вся оболочка сгорела, а гондола рухнула на землю. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'погибла', 'погиб')] при ударе."
 curtiss_custom_death_firework: "Пролетая вечером над столицей — [ROOT.GetCountry.GetCapital.GetCityHubName] — шар [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] попал в зону запуска фейерверков. Взрывающиеся ракеты сверкали всеми цветами радуги, и вскоре шар засиял не хуже. Горящий, он рухнул вниз и разбился. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'погибла', 'погиб')] в катастрофе."
 curtiss_custom_death_redneck: "Во время полёта над сельской местностью [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] шар [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] был поражён несколькими пулями, выпущенными ради забавы одним из местных жителей. В результате шар быстро потерял газ и рухнул на землю. Там [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'столкнулась', 'столкнулся')] со стрелком, который сбил [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'её', 'его')] с ног и насмерть затоптал."
 curtiss_custom_death_belltower: "Во время захода на посадку шар, на котором [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'летела', 'летел')] [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName], снесло в сторону города. Чтобы не врезаться в один из домов, [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'попыталась', 'попытался')] снова набрать высоту. Отвлёкшись на это, [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] не [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'заметила', 'заметил')], что летит прямо на колокольню. Шар врезался в башню, и [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'выпала', 'выпал')] из гондолы, по-видимому, сломав себе шею."
 curtiss_custom_death_stork: "Невероятный случай произошёл сегодня в небе над [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]! Шар [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')], на котором [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'летела', 'летел')] [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName], столкнулся с аистом или другой птицей. Клюв птицы проткнул оболочку шара. Пытаясь выбраться, птица проделала ещё большую дыру в оболочке, из которой выходило всё больше газа. Шар рухнул на землю, и [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'погибла', 'погиб')] при ударе."
 curtiss_custom_death_balloon_duel: "В споре за сердце известной оперной певицы между нашим аэронавтом [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] и другим аэронавтом соглашения достичь не удалось. Было решено, что единственный способ разрешить ситуацию — дуэль на воздушных шарах. Они поднялись на своих шарах и начали стрелять друг в друга. Ожесточённая перестрелка длилась почти час — вероятно, потому что попасть в цель с летящего шара не так-то просто. Наконец, [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'получила', 'получил')] смертельное ранение. Шар [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'погибшей', 'погибшего')] — [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] — улетел с телом и был обнаружен лишь несколько часов спустя в чистом поле."
 curtiss_custom_death_stray_bullet: "Каким-то образом [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] слишком близко [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'подлетела', 'подлетел')] к линии фронта на своём шаре. Вражеские войска открыли огонь. Пули миновали шар [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')], но [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'была смертельно ранена', 'был смертельно ранен')]. Шар ещё долго парил над полем боя и в конце концов рухнул на нашей стороне."
 curtiss_custom_death_power_line: "При посадке на своём шаре [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] слишком близко [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'подлетела', 'подлетел')] к линии электропередачи. Шар зацепился за провод, в результате чего весь электрический разряд прошёл через тело аэронавта, а сам шар загорелся. Неясно, от чего именно [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'умерла', 'умер')] [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName], но это определённо было неприятно."
 curtiss_custom_death_seagull: "Пролетая близко к берегу, [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'попала', 'попал')] в стаю чаек, которые нацелились на рыбу, взятую в качестве провизии. Хотя шар, [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')], не пострадал, [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'получила', 'получил')] такой сильный удар чайкой в голову, что [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она потеряла', 'он потерял')] сознание и [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'выпала', 'выпал')] из гондолы. [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'Она', 'Он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'скончалась', 'скончался')] от полученных травм, в то время как шар улетел под крики чаек."
 curtiss_custom_death_lightning: "Ballooning in a thunderstorm may not be the best idea. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] had to learn that firsthand when [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetSheHe] was struck by lightning. The balloon, [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')], burst into flames and crashed as a result. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] died in the crash."
 curtiss_custom_death_sabotage: "То, что должно было стать обычным полётом, быстро превратилось в кошмар. В середине полёта несколько канатов шара оборвались, в результате чего корзина [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] рухнула и разбилась о землю. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'погибла', 'погиб')]. При осмотре обломков на канатах были обнаружены следы порезов. Очевидно, это саботаж. Кто за этим стоит, пока неясно."
 curtiss_custom_death_updraft: "Во время полёта шар [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')], на котором [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'летела', 'летел')] [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName], был подхвачен очень сильным восходящим потоком. Шар поднимался всё выше и выше. С набором высоты дышать становилось труднее, а температура падала. Неясно, задохнулся ли аэронавт или замёрз насмерть, но [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'погибла', 'погиб')] на этой экстремальной высоте."
 curtiss_custom_death_stampede: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] во время одного из своих полётов [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'приземлилась', 'приземлился')] на пастбище. Когда [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она складывала', 'он складывал')] свой шар, [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')], то, должно быть, [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'напугала', 'напугал')] лошадей. Следы показывают, что животные бросились врассыпную, и несколько из них сбили с ног [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] и насмерть затоптали [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'её', 'его')]."
 curtiss_custom_death_failed_fixing: "Находясь ещё на небольшой высоте, [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'заметила', 'заметил')] проблему с шаром [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]. Сбоку происходила утечка газа, и шар немного терял высоту. [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'Она', 'Он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'решила', 'решил')] устранить проблему в полёте и [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'взобралась', 'взобрался')] на оболочку шара. Как сообщили некоторые свидетели, [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'потеряла', 'потерял')] равновесие и [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'рухнула', 'рухнул')] на землю, где [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'её', 'его')] и нашли [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'мёртвой', 'мёртвым')]. Шар опустился на землю несколько позже, когда из него вышло достаточно газа."
 curtiss_custom_death_weak_spot: "Сегодня [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'упала', 'упал')] с неба и [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'погибла', 'погиб')] при ударе. Сначала было неясно, что произошло, но чуть позже были найдены обломки шара [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]. В корзине была большая дыра, что указывает на то, что она была плохо сделана и сломалась под весом аэронавта. Смерть [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] — большая потеря для нашей нации."
 curtiss_custom_death_heart_attack: "Шар [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] сегодня потерпел крушение. Тело [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] было извлечено из обломков. Причину аварии было трудно установить. Сначала подозревали, что [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] намеренно [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'открыла', 'открыл')] выпускной клапан, так как воздух вышел из оболочки. Некоторое время спустя врач установил, что [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'умерла', 'умер')] ещё до крушения. Похоже, у [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'неё', 'него')] случился сердечный приступ в воздухе. Это вызвало спазм мышц, который и активировал клапан."
 curtiss_custom_death_balloon_crash: "Невероятный случай произошёл сегодня в небе над [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]! Как бы невероятно это ни звучало, в воздухе столкнулись два воздушных шара. Шар [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')], на котором [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'летела', 'летел')] [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName], был повреждён и быстро потерял высоту. Он ударился о землю, в результате чего [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'погибла', 'погиб')]. Другой шар смог приземлиться, но его пилот был совершенно опустошён случившимся и пытался помочь. К сожалению, все усилия были напрасны."
 curtiss_custom_death_fighter_intercepted: "Когда наш аэронавт [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] случайно [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'пересекла', 'пересёк')] границу нашей страны, [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она была атакована', 'он был атакован')] неизвестным летательным аппаратом. Шар [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] получил несколько попаданий и быстро потерял высоту. Прежде чем шар успел коснуться земли, аппарат атаковал снова, и [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'была смертельно ранена', 'был смертельно ранен')]. Власти соседней страны отрицают свою причастность к нападению."
 curtiss_custom_death_tornado: "Хотя над Великими равнинами бушевала буря, [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'решила', 'решил')] подняться на своём шаре [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]. Шар крутило в воздухе, но [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] не [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'испугалась', 'испугался')] и [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'продолжила', 'продолжил')] полёт. Незаметно за [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'ней', 'ним')] образовался торнадо, который притягивал шар всё ближе. Лишь незадолго до того, как шар был захвачен вихрем, [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'заметила', 'заметил')] опасность. К сожалению, было уже слишком поздно. Тело было найдено лишь несколько дней спустя, так как его завалило обломками."
 curtiss_custom_death_fall: "Неясно, как именно это произошло, но [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] каким-то образом [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'выпала', 'выпал')] из шара [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] и [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'погибла', 'погиб')] при ударе. Шар был найден несколько дней спустя, после того как медленно опустился на землю. В шаре не было найдено никаких следов, которые позволили бы сделать выводы о том, что именно случилось."
 curtiss_custom_death_envelope_falls_apart: "Вскоре после старта [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'потерпела', 'потерпел')] крушение на своём шаре [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]. На первый взгляд казалось, что оболочка была разорвана в клочья. Но после более тщательного осмотра было обнаружено, что швы оболочки разошлись в воздухе. Таким образом, шар развалился и рухнул на землю. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName], к сожалению, [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'погибла', 'погиб')] при ударе."
 curtiss_custom_killed_by_indigenous_people: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'приземлилась', 'приземлился')] на своём шаре [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] на территории туземцев. Те никогда раньше не видели воздушного шара и приняли его за злого демона. Прежде чем [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'успела', 'успел')] показаться, [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'её', 'его')] застрелили. Наш патруль нашёл тело в разрушенном шаре несколько дней спустя."
 curtiss_custom_death_cigar: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'разбилась', 'разбился')] в своём последнем полёте. Шар [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] ярко пылал, падая с неба. Похоже, [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'курила', 'курил')] сигару во время полёта и каким-то образом [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'подожгла', 'поджёг')] корзину. В результате загорелась и оболочка шара, что привело к крушению. В этом случае курение определённо было смертельным."
 curtiss_custom_killed_crash_mountainside: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'пыталась', 'пытался')] преодолеть горы на шаре [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]. В процессе [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'попала', 'попал')] в снежную бурю, в которой ничего не было видно. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'пыталась', 'пытался')] выбраться из метели, но шар был подхвачен сильным ветром и врезался в скалу. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'получила', 'получил')] смертельные травмы в результате крушения, и тело было найдено лишь несколько дней спустя."
 curtiss_custom_death_hail_storm: "Все отговаривали [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] от полёта в такую плохую погоду, но [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'настояла', 'настоял')] на своём. Когда [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'поднялась', 'поднялся')] на шаре [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')], погода стала ещё хуже. Сначала из мрачных туч хлынул сильный дождь, который вскоре сменился градом. Некоторые градины были размером с кулак и всё больше рвали оболочку шара. Шар рухнул на землю. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'погибла', 'погиб')] в катастрофе."
 curtiss_custom_killed_alcohol: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'выпила', 'выпил')] несколько бутылок вина перед взлётом на шаре [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]. Конечно, алкоголь не помогает в полёте, а в пьяном виде воздухоплавание становится ещё опаснее. Однако [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'погибла', 'погиб')] не потому, что [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'выпала', 'выпал')] из шара или случайно [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'подожгла', 'поджёг')] его, нет. Причиной стало сбрасывание всех мешков с балластом сразу после взлёта. Шар взмыл вверх и мгновенно исчез. Лишь несколько дней спустя были найдены обломки. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] всё ещё [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'была', 'был')] в корзине, по-видимому, умерев от жажды после того, как [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'выпила', 'выпил')] последнюю бутылку вина."
 curtiss_custom_killed_opium: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'была найдена мёртвой', 'был найден мёртвым')] в поле после того, как [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'улетела', 'улетел')] на шаре [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]. Сначала было неясно, почему [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'выпала', 'выпал')] из шара, но когда через несколько дней приземлился и сам шар, внутри был найден опиум. По-видимому, [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'употребляла', 'употреблял')] опиум во время полёта, а затем [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'выпала', 'выпал')] из шара по необъяснимым причинам."
 curtiss_custom_death_acrobatics: "Перед большой толпой [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'пыталась', 'пытался')] перебраться с одного привязанного шара на второй по канату. Сначала казалось, что [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] с лёгкостью это сделает. Но затем [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'её', 'его')] подхватил сильный порыв ветра, который сбросил с каната. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'упала', 'упал')] в самую гущу толпы и скончался от полученных травм на месте."
 curtiss_custom_death_goose: "Как и в каждый полёт, [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'взяла', 'взял')] с собой на борт [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] гуся на удачу. Они улетели вместе. Часы спустя шар успешно приземлился. Удивительно, но на борту остался только один пассажир. Гусь. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'исчезла', 'исчез')]. Даже после нескольких дней поисков [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'её', 'его')] так и не удалось найти."
 curtiss_custom_death_mile_high_club: "Корзина шара [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] была найдена в поле. В ней лежали [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] и [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'женщина', 'мужчина')]. Странно, но оба были без одежды. Было много догадок о причинах. Большинство предполагает, что они умерли от переохлаждения и сняли одежду незадолго до этого. Такое часто случается при замерзании, когда внезапно возникает ощущение сильного жара. Но есть и предположения, что они занимались чем-то... непристойным."
 curtiss_custom_death_zoo_crocodile: "Полёт был полным успехом. За исключением посадки... из всех мест на свете вольер с крокодилами в зоопарке был, пожалуй, одним из худших мест для приземления. Когда шар [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] оказался посреди воды, жизнь аэронавта быстро оборвалась. Прежде чем кто-либо успел вмешаться, крокодилы набросились на аэронавта, и [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'стала', 'стал')] для них закуской."
 curtiss_custom_death_cheap_parts: "Экономия обычно является добродетелью. Но не тогда, когда речь идёт о конструктивных элементах воздушного шара. Канаты для шара [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] были куплены у самого дешёвого поставщика, что сэкономило несколько фунтов. К сожалению, качество оказалось намного хуже обещанного. Во время полёта несколько канатов оборвались, гондола накренилась, и [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'выпала', 'выпал')] из шара, погибнув при ударе."
 curtiss_custom_death_disappearance: "Прошёл уже месяц с тех пор, как [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'улетела', 'улетел')] на шаре [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]. Вскоре после взлёта все следы были потеряны. Никаких сообщений о шаре, обломках или теле. Наши поиски также не увенчались успехом. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'исчезла', 'исчез')] вместе со своим шаром, и никто не знает, что случилось."
 curtiss_custom_death_train: "В результате цепи несчастных случайностей шар [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] при посадке был сбит поездом и разрушен. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'погибла', 'погиб')]. Похоже, шар приземлился в густом тумане, и [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] не [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'заметила', 'заметил')], что находится на железнодорожных путях. Всего через несколько секунд поезд на полной скорости врезался в шар. Поезд не пострадал, и, кроме аэронавта, никто не пострадал."
 curtiss_custom_death_skyscraper: "Во время полёта над городом шар [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] был подхвачен сильным воздушным потоком и направлен прямо на небоскрёб. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'ничего не могла', 'ничего не мог')] поделать и [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'беспомощно наблюдала', 'беспомощно наблюдал')], как здание приближается. Шар врезался в фасад и запутался. Мгновение спустя оболочка была разорвана, и шар рухнул вниз. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'упала', 'упал')] прямо на прилавок зеленщика, уничтожив свежую капусту. К сожалению, кочаны не смогли достаточно смягчить падение, и [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'скончалась', 'скончался')] на месте."
 curtiss_custom_death_disease: "Со словами: «Это просто простуда!», [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'попрощалась и забралась', 'попрощался и забрался')] в шар [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]. Однако, похоже, это была не просто простуда, так как шар был найден вместе с безжизненным телом аэронавта несколько дней спустя. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName], по-видимому, скончался от серьёзной болезни. При всех опасностях воздухоплавания, это была довольно маловероятная причина смерти."
 curtiss_custom_death_slipped: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'отправилась', 'отправился')] в путешествие на шаре [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]. [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'Её', 'Его')] сопровождал друг. В середине полёта [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName], должно быть, как-то поскользнулся. Может быть, из-за лёгкого дождя, намочившего корзину, может быть, это была просто неосторожность. В любом случае, [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'потеряла', 'потерял')] равновесие и [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'выпала', 'выпал')] из шара. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'погибла', 'погиб')]. Друг с большим трудом смог посадить шар, но остался невредим."
 curtiss_custom_death_ladder: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'умерла', 'умер')] не в приключении, как можно было бы ожидать от аэронавта. Нет, [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'погибла', 'погиб')] во время работы над шаром [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]. Как раз когда [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'осматривала', 'осматривал')] оболочку шара на наличие слабых мест под давлением, [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'потеряла', 'потерял')] равновесие на лестнице и [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'упала', 'упал')]. К сожалению, падение было очень неудачным, что и привело к смерти."
 curtiss_custom_death_angry_worker: "Во время последнего полёта несколько канатов шара [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] оборвались, в результате чего гондола рухнула на землю. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'погибла', 'погиб')] при ударе. При осмотре обломков шара на канатах были обнаружены следы порезов. Оказалось, что рабочий, который был в подчинении у аэронавта, повредил канаты ночью, чтобы убить [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'её', 'его')]. Рабочий заметил: «[SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'Эта кровопийца получила по заслугам! Она эксплуатировала нас', 'Этот кровопийца получил по заслугам! Он эксплуатировал нас')], чтобы наслаждаться воздухоплаванием!»"
 curtiss_custom_death_sabotage_slaver: "Как только шар [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] приземлился в поле и [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'вышла', 'вышел')], [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'её', 'его')] схватила и убила группа наёмников. Наше расследование показало, что рабовладелец приказал убить аэронавта, чтобы ослабить движение против рабства. Какая ужасная смерть!"
 curtiss_custom_death_shot_over_prison: "Во время полёта на воздушном шаре с клиентом, [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'пролетала', 'пролетал')] над территорией тюрьмы Сисика на шаре [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]. Охранники открыли огонь по шару. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'осталась невредима', 'остался невредим')], но [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'попала', 'попал')] в другую перестрелку с бандой О'Дрисколлов недалеко от Аннесберга. В ходе неё [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она была застрелена', 'он был застрелен')] и [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'выпала', 'выпал')] из корзины. Пассажир, по-видимому, совершил аварийную посадку возле реки. До сих пор о нём нет никаких сведений."
 curtiss.600.t: "Полёт на воздушном шаре из садов Воксхолл в Вайльбург"
 curtiss.600.d: "Английский аэронавт Чарльз Грин с двумя членами экипажа вылетел из садов Воксхолл в Лондоне на шаре «Королевский Воксхолл». Благодаря хорошему ветру шар пересёк Ла-Манш и долетел до Вайльбурга в Нассау, Германия. Преодолев расстояние около 500 миль или 800 километров, этот полёт стал самым дальним в истории."
 curtiss.600.f: "Полёт «Королевского Воксхолла» был невероятным успехом. Рекорд дальности продержался 80 лет.\nПолёт был не без риска. Воздухоплавание в XIX веке было особенно опасным, потому что никогда не знаешь, где приземлишься. Соответственно, Грин взял с собой в путешествие много припасов. Он также вёз тонну песка в качестве балласта, 1000-футовый канат, барометры, телескопы, различные алкогольные напитки, пальто и множество других вещей. Помимо всего этого багажа, Грин и его два спутника, Томас Монк Мейсон и Роберт Холлонд, должны были втиснуться в гондолу.\nПрибыв в Вайльбург, с помощью местных жителей — и используя привезённый с собой бренди — шар был освобождён от содержимого и подготовлен к обратному пути. В Вайльбурге троицу тепло встретили, в том числе и принц Нассау. Обратный путь им пришлось проделать в карете, так как для шара не было каменноугольного газа."
 curtiss.600.g: "Ещё один рекорд для Великобритании!"
 curtiss.601.t: "Изобретение вытяжной панели"
 curtiss.601.d: "Энтузиаст воздухоплавания и изобретатель [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'представила своё', 'представил своё')] последнее изобретение, чтобы сделать полёты на воздушном шаре намного безопаснее. Вытяжная панель — это часть оболочки шара, которая лишь слегка прикреплена к нему. Когда шар приземляется, эту часть можно оторвать. Это позволяет газу молниеносно выйти из шара. Это предотвращает волочение шара по земле, зацепление за что-либо или столкновение с чем-либо."
 curtiss.601.f: "До изобретения вытяжной панели аэронавтам приходилось либо закреплять свой шар якорями, либо взбираться на верхушку шара и открывать там клапан, чтобы выпустить воздух. Это было чрезвычайно опасно, потому что газ быстро выходит, и шар сдувается. Случалось, что аэронавты запутывались в оболочке и погибали. Изобретение вытяжной панели 27 апреля 1839 года сделало воздухоплавание намного безопаснее."
 curtiss.601.g: "Отличная работа! Надеюсь, мы ещё услышим об этом аэронавте!"
 curtiss.601.h: "На самом деле, нам нужен новый аэронавт!"
 curtiss.601.h.tt: "Опытный аэронавт [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] становится нашим новым спонсируемым аэронавтом."
 curtiss.602.t: "Франсиск Арбан первым пересёк Альпы на воздушном шаре"
 curtiss.602.d: "Французский аэронавт Франсиск Арбан стал первым человеком, пересёкшим Альпы на водородном шаре. Вечером 2 сентября 1849 года он вылетел из Марселя и полетел на восток. Чтобы пересечь Коттийские Альпы, его шар поднялся на высоту около 15 000 футов или 4600 метров. На следующее утро в полтретьего он приземлился недалеко от Турина."
 curtiss.602.f: "Пересечение Альп стало рекордом, который долгое время оставался непревзойдённым. Повторить его удалось лишь в 1924 году.\nАрбан уже имел опыт в воздухоплавании до своего пересечения Альп. Свои первые попытки он предпринял в возрасте 17 лет около 1832 года, но большинство своих полётов совершил в 1845 и 1849 годах в Италии. В 1846 году его пришлось спасать рыбакам из моря после того, как он сбился с курса недалеко от Триеста."
 curtiss.602.g: "Великолепно! Настоящий герой Франции!"
 curtiss.603.t: "Франсиск Арбан исчез во время полёта над Средиземным морем"
 curtiss.603.d: "Всего через месяц после пересечения Альп на воздушном шаре Франсиск Арбан исчез. После взлёта из Барселоны его унесло ветром в сторону Средиземного моря. С тех пор от него нет никаких известий. Следует ли нам отправить спасательные команды на поиски?"
 curtiss.603.f: "Исторически, шар Франсиска Арбана унесло в открытое море 7 октября 1849 года. С тех пор от него нет никаких известий. Предположительно, он погиб в этом полёте. Что именно произошло, однако, неизвестно."
 curtiss.603.g: "Ужасно! Немедленно отправьте корабли на его поиски!"
 curtiss.603.h: "Он осознавал риск. Мы ничего не можем сделать."
 curtiss.604.t: "Франсиск Арбан спасён"
 curtiss.604.d1: "Наши поиски увенчались успехом! Франсиск Арбан был найден одним из наших кораблей! К счастью, Арбан проявил сообразительность и продолжал сбрасывать со своего шара предметы, которые плавали на поверхности воды. Один из наших кораблей нашёл след и последовал по нему. Арбан несколько дней держался за свою корзину, которую он освободил от ткани шара. Благодаря некоторым припасам в шаре он пережил это испытание."
 curtiss.604.d2: "Рыбацкая лодка нашла шар Франсиска Арбана у побережья Барселоны. Учитывая обстоятельства, он чувствует себя хорошо, но сильно обезвожен. Надеюсь, скоро ему станет лучше!"
 curtiss.604.f: "«Это был самый захватывающий полёт в моей жизни! Надеюсь, я при этом побил рекорд!»"
 curtiss.604.g: "Какая удача! С возвращением, Арбан!"
 curtiss.605.t: "Срочно: Арбан попал в рабство в Африке!"
 curtiss.605.d: "Различные испанские газеты сообщают, что Арбан не утонул в Средиземном море, а долетел на своём шаре до Африки и был там обращён в рабство. К нам приходит всё больше писем от граждан с просьбой найти и освободить его."
 curtiss.605.f: "Исторически, в 1853 году в различных газетах действительно были статьи, утверждающие, что Арбан был обращён в рабство в Африке. Однако доказательств этому не было. Неясно, что именно случилось с Арбаном, но наиболее вероятно, что он утонул в Средиземном море."
 curtiss.605.g: "Мы должны найти Арбана!"
 curtiss.605.h: "Это неправдоподобные истории, в которые никто не должен верить."
 curtiss.606.t: "Арбан попал в рабство в [SCOPE.sCountry('curtiss_arban_slaver_scope').GetAltNameNoFlag('RU_CL_PP')]"
 curtiss.606.d: "Наше расследование показало, что Арбан действительно ещё жив. Он был найден в [SCOPE.sCountry('curtiss_arban_slaver_scope').GetAltNameNoFlag('RU_CL_PP')], где ему приходится работать рабом на полях. Владельцы предложили нам выкупить его за огромную сумму. Конечно, мы могли бы просто освободить его силой."
 curtiss.606.f: "Исторически, газетные сообщения не получили дальнейшего развития. Соответственно, неясно, был ли Арбан порабощён. Но это очень маловероятно."
 curtiss.606.g: "Мы освободим его из рабства!"
 curtiss.606.h: "Давайте просто заплатим и покончим с этим..."
 curtiss.607.t: "Арбан спасён из рабства и вернулся домой"
 curtiss.607.d1: "Небольшой отряд был отправлен для освобождения Арбана из плена. После короткой стычки они смогли освободить его и нескольких других европейцев и скрылись на лошадях. Прежде чем #tooltippable_name [SCOPE.sCountry('curtiss_arban_slaver_scope').GetAdjective|l]ие#! власти смогли отреагировать, они уже прибыли на корабль, который доставил их домой. Из-за долгого плена он измотан и слаб, но смог рассказать нам о своём авантюрном полёте. Его знания, безусловно, помогут нам."
 curtiss.607.d2: "Арбан вернулся домой. Из-за долгого плена он измотан и слаб, но смог рассказать нам о своём авантюрном полёте. Его знания, безусловно, помогут нам."
 curtiss.607.f: "«Меня унесло ветром в открытое море. Поскольку меня несло на юг, я решил попытаться добраться до Балеарских островов. Но ветер был плохой, и меня прибило к побережью Северной Африки, где я смог приземлиться. К сожалению, местные жители были не очень дружелюбны. Кто-нибудь ещё когда-нибудь перелетал Средиземное море? Я установил рекорд?»"
 curtiss.607.g: "Успешное спасение!"
 curtiss.607.h: "С возвращением, Арбан!"
 curtiss.608.t: "Никаких следов Арбана"
 curtiss.608.d: "После месяцев поисков мы так и не нашли никаких следов Арбана. Похоже, истории о его порабощении в Северной Африке вымышлены. Франсиск Арбан, несомненно, мёртв."
 curtiss.608.f: "«Француз? Конечно! Мы продаём много французов. Какого вы хотите? Все они сильные, были моряками!»"
 curtiss.608.g: "Отменить поиски."
 curtiss.609.t: "Надар делает первые аэрофотоснимки с воздушного шара"
 curtiss.609.d: "Французский фотограф Надар объединил две свои страсти: воздухоплавание и фотографию. Ему удалось сделать фотографии с воздуха. Они показывают мир сверху, каким его видели немногие."
 curtiss.609.f: "Свои первые аэрофотоснимки Надар сделал в 1859 году в битве при Сольферино. В 1863 году Надар стал президентом #b Общества содействия воздушному передвижению с помощью аппаратов тяжелее воздуха#!. Секретарём общества был не кто иной, как Жюль Верн, которого воздушные шары Надара вдохновили на написание рассказа «#b Пять недель на воздушном шаре#!»."
 curtiss.609.g: "Мир сверху выглядит таким другим!"
 curtiss.610.t: "«Гигант» Надара терпит крушение в Ганновере"
 curtiss.610.d: "После изнурительного и чрезвычайно трудного полёта из Парижа в Ганновер Надар разбил свой гигантский воздушный шар «Гигант» в поле в Ганновере. Он был серьёзно ранен, как и его жена. Надеюсь, он скоро поправится и продолжит летать на воздушных шарах!"
 curtiss.610.f: "«Гигант» был 60-метровым (196 футов) воздушным шаром, метко названным. Он был построен Эженом Годаром и управлялся Надаром. Уже во втором своём полёте Надар разбил «Гиганта». Несмотря на собственные серьёзные травмы и сильно повреждённый шар, Надар отремонтировал «Гиганта» и снова полетел на нём. В 1867 году он брал на борт до дюжины пассажиров и подавал холодного цыплёнка и вино."
 curtiss.610.g: "Какой ужасный несчастный случай!"
 curtiss.611.t: "Глейшер и Коксвелл устанавливают рекорд высоты полёта на воздушном шаре"
 curtiss.611.d: "Метеоролог Джеймс Глейшер и аэронавт Генри Трейси Коксвелл установили рекорд высоты полёта на воздушном шаре. Они вместе поднялись на высоту примерно 11 270 метров (37 000 футов). На высоте 8800 метров Глейшер уже потерял сознание. Коксвелл с большим трудом смог заставить шар снижаться. К счастью, оба выжили в этом приключении."
 curtiss.611.f: "В 1862 году Глейшер и Коксвелл поднялись на воздушном шаре «Мамонт». Британская ассоциация содействия развитию науки поручила им провести эксперименты в верхних слоях атмосферы. На высоте 8800 метров (29 000 футов) Глейшер потерял сознание, а Коксвелл потерял чувствительность в руках. Поскольку стропа клапана запуталась, Коксвелл не мог заставить шар снижаться из корзины. Ему пришлось взобраться на такелаж и открыть клапан зубами. Затем он потерял сознание, но шар начал снижаться. За 15 минут шар опустился на землю, где благополучно приземлился."
 curtiss.611.g: "Им повезло, что они выжили!"
 curtiss.612.t: "Эдуард Шпельтерини перевозит пассажиров через Альпы"
 curtiss.612.d: "Во время полёта с пассажирами швейцарец Эдуард Шпельтерини пересёк Альпы. При этом он пролетел над одними из самых высоких точек Альп. Шпельтерини теперь — звезда воздухоплавания."
 curtiss.612.f: "Эдуард Шпельтерини, урождённый Альберт Швайцер, в юности прошёл обучение на аэронавта. После того, как он построил свой первый собственный воздушный шар под названием «Урания», он путешествовал по Европе, чтобы показать людям из высшего общества мир с высоты. Обычно в полёт входил небольшой пикник, состоящий из отбивных и шампанского. Шпельтерини также начал делать аэрофотоснимки, но наибольшую известность ему принесли пассажирские полёты через Альпы."
 curtiss.612.g: "Невероятный вид!"
 curtiss.613.t: "Первый полёт управляемого дирижабля, построенного Жиффаром"
 curtiss.613.d: "Большой проблемой полётов на воздушном шаре является то, что они всегда зависят от хорошего ветра. Шар слишком легко сносит, что неоднократно приводит к авариям. Анри Жиффар попытался найти решение этой проблемы, построив вытянутый дирижабль с паровым двигателем и рулём для управления. На своём «дирижабле Жиффара» он совершил 27-километровый полёт из Парижа в Эланкур. Поскольку дирижабль очень медленный, полёт против ветра пока невозможен. Кто знает, в каком направлении будут развиваться эти дирижабли?"
 curtiss.613.f: "Своим полётом 24 сентября 1852 года Жиффар совершил первый полёт на дирижабле с двигателем и управлением. Однако тяга парового двигателя была очень слабой, что означало, что дирижабль ещё не утвердился. Позже, с изобретением двигателя внутреннего сгорания, мечта о дирижаблях смогла осуществиться."
 curtiss.613.g: "Может быть, эти управляемые шары скоро завоюют небеса!"
 curtiss.614.t_brussels: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] рассматривает переезд в Брюссель"
 curtiss.614.t_capital: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] рассматривает переезд в [SCOPE.sCountry('curtiss_august_piccard_destination').GetCapital.GetCityHubName]"
 curtiss.614.d_brussels: "[SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'Одна из наших важнейших учёных', 'Один из наших важнейших учёных')], [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName], [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'получила', 'получил')] приглашение от Брюссельского свободного университета стать там профессором. Университет обещает значительные финансовые ресурсы, которые позволят Пиккару использовать воздушные шары для ещё более тщательного изучения стратосферы. Пиккар, кажется, [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'готова', 'готов')] принять предложение. Это будет означать потерю [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'великой учёной, которая', 'великого учёного, который')] также имеет большой опыт в воздухоплавании."
 curtiss.614.d_capital: "[SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'Одна из наших важнейших учёных', 'Один из наших важнейших учёных')], [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName], [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'получила', 'получил')] приглашение от университета [SCOPE.sCountry('curtiss_august_piccard_destination').GetCapital.GetCityHubName] стать там профессором. Университет обещает значительные финансовые ресурсы, которые позволят Пиккару использовать воздушные шары для ещё более тщательного изучения стратосферы. Пиккар, кажется, [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'готова', 'готов')] принять предложение. Это будет означать потерю [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'великой учёной, которая', 'великого учёного, который')] также имеет большой опыт в воздухоплавании."
 curtiss.614.f: "Пиккар был назначен в Брюссельский свободный университет в 1922 году, где помимо преподавания он посвятил себя исследованиям стратосферы с помощью воздушных шаров. В своих стратосферных исследованиях он также сотрудничал со своим другом Альбертом Эйнштейном, с которым разрабатывал эксперименты.\nПомимо стратосферных исследований, Пиккар изобрёл измерительный прибор для радиоактивности и очень точный сейсмограф. Он также изучал атомную физику и предсказал третий изотоп урана, который позже был открыт и теперь известен как уран-235.\nВ Брюсселе его лекции также сделали его прототипом для персонажа мультфильма профессора Турнесоля."
 curtiss.614.g: "Мы не можем потерять Пиккара! Предложите ему спонсорство!"
 curtiss.614.h: "У нас уже есть великий аэронавт!"
 curtiss.614.g.tt: "Опытный аэронавт [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] становится нашим новым спонсируемым аэронавтом."
 curtiss.615.t: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'переехала', 'переехал')] в [SCOPE.sCountry('curtiss_august_piccard_destination').GetCapital.GetCityHubName]"
 curtiss.615.d: "[SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'Швейцарская учёная', 'Швейцарский учёный')] [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'переехала', 'переехал')] в [SCOPE.sCountry('curtiss_august_piccard_destination').GetCapital.GetCityHubName], чтобы преподавать в местном Свободном университете в качестве профессора. Университет пообещал большие финансовые ресурсы, которые позволят Пиккару использовать воздушные шары для ещё более тщательного изучения стратосферы. Будучи [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'блестящей учёной', 'блестящим учёным')] и аэронавтом, Пиккар может установить новые рекорды в воздухоплавании."
 curtiss.615.f: "Пиккар был назначен в Брюссельский свободный университет в 1922 году, где помимо преподавания он посвятил себя исследованиям стратосферы с помощью воздушных шаров. В своих стратосферных исследованиях он также сотрудничал со своим другом Альбертом Эйнштейном, с которым разрабатывал эксперименты.\nПомимо стратосферных исследований, Пиккар изобрёл измерительный прибор для радиоактивности и очень точный сейсмограф. Он также изучал атомную физику и предсказал третий изотоп урана, который позже был открыт и теперь известен как уран-235.\nВ Брюсселе его лекции также сделали его прототипом для персонажа мультфильма профессора Турнесоля."
 curtiss.615.g: "Аэронавт такой известности должен стать нашим официальным аэронавтом!"
 curtiss.615.h: "Желаем [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'ей', 'ему')] удачи в карьере!"
 curtiss.615.g.tt: "Опытный аэронавт [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] становится нашим новым спонсируемым аэронавтом."
 curtiss.650.t: "Представляем нашего нового аэронавта"
 curtiss.650.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] — успешный аэронавт, [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'которая хочет', 'который хочет')] использовать нашу поддержку, чтобы раздвинуть границы воздухоплавания. Рекорды ждут, чтобы их побили, а научные открытия — чтобы их совершили. [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'Она уверена', 'Он уверен')], что сможет достичь новых высот на своём шаре [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]."
 curtiss.650.f: "«Я приумножу славу нашей страны!»"
 curtiss.650.g: "Надеюсь, поддержка [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'её', 'его')] окупится! Откройте мне окно воздухоплавания."
 curtiss.650.h: "Удачи!"
 curtiss.651.t: "Воздухоплавание в нашей стране"
 curtiss.651.balloonist: "Мы спонсируем аэронавта, [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName]. [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'Она', 'Он')] продолжает совершать всё более авантюрные попытки полётов на своём шаре [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')]."
 curtiss.651.noballoonist: "В настоящее время мы не спонсируем аэронавта. Поэтому мы очень редко, если вообще когда-либо, будем устанавливать новые рекорды. Мы могли бы начать спонсировать аэронавта из нашей нации, который будет пытаться устанавливать новые рекорды и разрабатывать для нас лучшие воздушные шары."
 curtiss.651.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloonist_trait_level_type')]\n\n#b Текущие рекорды [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]:#!\n - Рекорд высоты: #b #p [ROOT.Var('curtiss_balloon_altitude_record_var').GetValue]#! метров#!\n - Рекорд дальности: #b #p [ROOT.Var('curtiss_balloon_distance_record_var').GetValue]#! километров#!\n - Рекорд времени: #b #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#! часов#!\n\n#b Текущие мировые рекорды:#!\n - Рекорд высоты: #b #p [GetGlobalVariable('curtiss_balloon_altitude_record_global_var').GetValue]#! метров#! [GetGlobalVariable('curtiss_balloon_altitude_record_holder_global_var').GetCountry.GetFlagTextIcon]\n - Рекорд дальности: #b #p [GetGlobalVariable('curtiss_balloon_distance_record_global_var').GetValue]#! километров#! [GetGlobalVariable('curtiss_balloon_distance_record_holder_global_var').GetCountry.GetFlagTextIcon]\n - Рекорд времени: #b #p [GetGlobalVariable('curtiss_balloon_time_record_global_var').GetValue]#! часов#! [GetGlobalVariable('curtiss_balloon_time_record_holder_global_var').GetCountry.GetFlagTextIcon]"
 curtiss.651.g: "Начать спонсировать аэронавта!"
 curtiss.651.h: "Прекратить спонсировать аэронавта"
 curtiss.651.htt: "Эта опция удалит аэронавта из игры."
 curtiss.651.l: "Позвольте мне вернуться к своим делам!"
 curtiss.651.w: "Больше не сообщать о #yellow полётах#! моего аэронавта!"
 curtiss.651.w.tt: "Вы больше не будете получать события о #yellow полётах#! вашего аэронавта или [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'её', 'его')] #yellow новых чертах#!. Вы можете включить это обратно в любое время."
 curtiss.651.x: "Снова сообщать мне о #yellow полётах#! моего аэронавта!"
 curtiss.651.x.tt: "Вы снова будете получать события о #yellow полётах#! вашего аэронавта и [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'её', 'его')] #yellow чертах#!. Вы можете выключить это обратно в любое время."
 curtiss.651.y: "Больше не сообщать мне о #yellow смертях#! моего аэронавта"
 curtiss.651.y.tt: "Вы больше не будете получать события о #yellow смертях#! вашего аэронавта. Новый аэронавт будет спонсироваться автоматически. Вы можете включить это обратно в любое время."
 curtiss.651.z: "Снова сообщать мне о #yellow смертях#! аэронавта."
 curtiss.651.z.tt: "Вы снова будете получать события о #yellow смертях#! вашего аэронавта. Вы можете выключить это обратно в любое время."
 curtiss.652.t: "Первый полёт [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] для нашей страны"
 curtiss.652.f: " - #b Высота: #p [ROOT.Var('new_balloon_altitude_var').GetValue]#! метров#!\n - #b Дальность: #p [ROOT.Var('new_balloon_distance_var').GetValue]#! километров#!\n - #b Время: #p [ROOT.Var('new_balloon_time_var').GetValue]#! часов#!"
 curtiss.652.g: "Хорошее начало!"
 curtiss.653.t1: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] не [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'смогла', 'смог')] побить рекорд высоты"
 curtiss.653.t2: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'достигла', 'достиг')] нового рекорда высоты для нашей страны"
 curtiss.653.t3: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] на своём шаре [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'поднялась', 'поднялся')] выше, чем кто-либо из людей до него!"
 curtiss.653.d1: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'пыталась', 'пытался')] подняться как можно выше на своём шаре. С высотой #b #n [ROOT.Var('new_balloon_altitude_var').GetValue]#! метров#! [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] не [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'смогла', 'смог')] побить предыдущий рекорд нашей страны в #b #p [ROOT.Var('curtiss_balloon_altitude_record_var').GetValue]#! метров#!. [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'Она', 'Он')] обязательно попробует снова."
 curtiss.653.d2: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'установила', 'установил')] новый рекорд высоты для нашей страны на своём шаре! С высотой #b #p [ROOT.Var('new_balloon_altitude_var').GetValue]#! метров#! [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'побила', 'побил')] предыдущий рекорд нашей страны в #b #p [ROOT.Var('curtiss_balloon_altitude_record_var').GetValue]#! метров#!. Но, к сожалению, этого не хватило для мирового рекорда в #b #p [GetGlobalVariable('curtiss_balloon_altitude_record_global_var').GetValue]#! метров#! [GetGlobalVariable('curtiss_balloon_altitude_record_holder_global_var').GetCountry.GetFlagTextIcon]."
