 curtiss_custom_balloonist: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] — [Concept('concept_curtiss_balloonist', 'аэронавт')] с опытом #p [ROOT.Var('curtiss_balloonist_var').GetVariable('curtiss_balloonist_experience_var').GetValue]#! / 100. При достижении 100 ед. опыта черта навыка улучшится до [Concept('concept_curtiss_experienced_balloonist', 'опытного аэронавта')]."
