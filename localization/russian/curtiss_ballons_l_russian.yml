 curtiss_distance_description_no_record: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'пыталась', 'пытался')] пролететь на своём шаре как можно дальше. С дистанцией #b #n [ROOT.Var('new_balloon_distance_var').GetValue]#! километров#! [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] не [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'смогла', 'смог')] побить предыдущий рекорд нашей страны в #b #p [ROOT.Var('curtiss_balloon_distance_record_var').GetValue]#! километров#!. Также [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] не [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'побила', 'побил')] предыдущий рекорд продолжительности в #b #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#! часов#! с продолжительностью #b #n [ROOT.Var('new_balloon_time_var').GetValue]#! часов#!. [ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFirstName], безусловно, попробует снова."
 curtiss_distance_description_distance_record_country: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'установила', 'установил')] новый рекорд дальности для нашей страны на своём шаре! С дистанцией #b #p [ROOT.Var('new_balloon_distance_var').GetValue]#! километров#! [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'смогла', 'смог')] уверенно превзойти предыдущий рекорд нашей страны в #b #p [ROOT.Var('curtiss_balloon_distance_record_var').GetValue]#! километров#!. Но, к сожалению, этого не хватило, чтобы побить мировой рекорд в #b #p [GetGlobalVariable('curtiss_balloon_distance_record_global_var').GetValue]#! километров#! [GetGlobalVariable('curtiss_balloon_distance_record_holder_global_var').GetCountry.GetFlagTextIcon]. Продолжительности в #b #n [ROOT.Var('new_balloon_time_var').GetValue]#! часов#!, к сожалению, не хватило для нашего национального рекорда в #b #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#! часов#!"
 curtiss_distance_description_time_record_country: "[ROOT.Var('curtiss_balloonist_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'установила', 'установил')] новый рекорд продолжительности полёта для нашей страны на своём шаре! С продолжительностью #b #p [ROOT.Var('new_balloon_time_var').GetValue]#! часов#! [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'она', 'он')] [SelectLocalization(ROOT.Var('curtiss_balloonist_var').GetCharacter.IsFemale, 'смогла', 'смог')] побить предыдущий рекорд нашей страны в #b #p [ROOT.Var('curtiss_balloon_time_record_var').GetValue]#! часов#!. К сожалению, этого не хватило для мирового рекорда в #b #p [GetGlobalVariable('curtiss_balloon_time_record_global_var').GetValue]#! часов#! [GetGlobalVariable('curtiss_balloon_time_record_holder_global_var').GetCountry.GetFlagTextIcon]. Рекорд дальности нашей страны в #b #p [ROOT.Var('curtiss_balloon_distance_record_var').GetValue]#! километров#! также не был побит с дистанцией #b #n [ROOT.Var('new_balloon_distance_var').GetValue]#! километров#!."
