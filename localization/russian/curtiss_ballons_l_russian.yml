 curtiss.655.f1: "«В этот раз у меня не получилось. Но в следующий раз я обязательно справлюсь!»"
 curtiss.655.f2: "«Кого волнует такой рекорд? Я хочу мировой!»"
 curtiss.655.f3: "«Это было проще простого!»"
 curtiss.655.g: "Удачи в следующий раз!"
 curtiss.655.h: "Хорошая работа!"
 curtiss.655.i: "Замечательно! Поздравляю!"
 curtiss.656.t: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] боится высоты и бросает воздухоплавание"
 curtiss.656.d: "Хотя [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'утверждала, что совершила', 'утверждал, что совершил')] немало полётов, во время первого же полёта для нашей страны [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'она обнаружила', 'он обнаружил')], что боится высоты, поднявшись всего на десять метров. Поэтому [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'она', 'он')] бросает воздухоплавание."
 curtiss.656.f: "«Это ужасно! Две недели назад я летал на огромных высотах, а теперь.... Теперь я даже на лестницу залезть не могу!»"
 curtiss.656.g: "Как жаль..."
 curtiss.656.h: "Чёрт! Есть ли другой аэронавт, которого мы могли бы спонсировать?"
 curtiss.670.t: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] погибает в результате несчастного случая"
 curtiss.670.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'разбилась', 'разбился')] во время полёта на своём воздушном шаре и [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'погибла', 'погиб')]. Мы теряем героя воздухоплавания."
 curtiss.670.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloonist_death_type')]"
 curtiss.670.g: "Какой ужас!"
 curtiss.670.h: "Ужасно! Есть ли другой аэронавт, которого мы могли бы спонсировать?"
 curtiss.671.t: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] теперь опытный аэронавт"
 curtiss.671.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'совершила', 'совершил')] множество полётов и [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'приобрела', 'приобрёл')] большой опыт в воздухоплавании. Теперь [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'она считается опытной', 'он считается опытным')] аэронавтом, [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'которая', 'который')] знает, что делает."
 curtiss.671.f: "«Не бойтесь! Я делал это десятки раз!»"
 curtiss.671.g: "Приятно слышать!"
 curtiss.672.t: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] теперь известный аэронавт"
 curtiss.672.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] уже [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'совершила', 'совершил')] сотни полётов, в которых также [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'побила', 'побил')] несколько рекордов. К настоящему времени [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'она известна', 'он известен')] не только в нашей стране."
 curtiss.672.f: "«[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]? Это не [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'та ли', 'тот ли')] аэронавт? Я очень хочу с [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'ней', 'ним')] познакомиться!»"
 curtiss.672.g: "Замечательно!"
 curtiss.673.t: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] сбит кометой во время полёта"
 curtiss.673.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'была сбита', 'был сбит')] кометой во время полёта и [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'погибла', 'погиб')]."
 curtiss.673.f: "Вскоре после взлёта на шаре [SCOPE.GetRootScope.GetCountry.GetCustom('curtiss_balloon_type')] был слышен громкий хлопок. Люди на земле увидели вспышку света, пронесшуюся по небу и ударившую прямо в корзину аэронавта. Шар загорелся и рухнул вниз. После расчистки обломков было найдено тело [SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName]. Этому событию обрадовались только наши астрономы, потому что они смогли изучить остатки кометы."
 curtiss.673.g: "Если бы только у [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'неё', 'него')] было чутьё на кометы..."
 curtiss.673.h: "О, комета, дьявольское отродье... Есть ли другой аэронавт, которого мы могли бы спонсировать?"
 curtiss.674.t: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] разбился и погиб, приземляясь на пляже"
 curtiss.674.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'разбилась', 'разбился')] на пляже во время полёта и [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'погибла', 'погиб')]. Как ни странно, на обломках шара был найден кит."
 curtiss.674.f: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'летела', 'летел')] вдоль пляжа в славный день. Поскольку [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'она', 'он')] так и не [SelectLocalization(SCOPE.sCharacter('curtiss_balloonist_scope').IsFemale, 'вернулась', 'вернулся')], были отправлены поисковые группы. Вскоре были найдены обломки. Шар и корзина, как ни странно, были найдены под останками сильно раздавленного кита. Алкоголик из соседней деревни сообщил, что видел, как с неба падали кит и горшок с петуниями, и что кит попал прямо в шар. Очевидно, этой истории не поверили. Интересно, что неподалёку был найден целый горшок с петуниями. Петуния выглядела немного потрёпанной и была передана в опытные руки местного ботаника.\n\n[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName] запомнится своим золотым сердцем и способностью сохранять спокойствие в любой ситуации."
 curtiss.674.g: "О нет! Только не снова!"
 curtiss.674.h: "Привет, Земля! Есть ли другой аэронавт, которого мы могли бы спонсировать?"
 curtiss.676.t: "Нашего аэронавта не стало"
 curtiss.676.d: "Проведя десятилетия в качестве [Concept('concept_curtiss_balloonist', 'аэронавта')], наш бывший #b #r аэронавт#!#! покинул этот мир. Сможем ли мы когда-нибудь заменить такого удивительного исследователя?"
