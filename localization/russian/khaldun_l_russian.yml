 khaldun_reorganize_library_button: "Реорганизовать библиотеку"
 khaldun_reorganize_library_button_desc: "В библиотеке хранится множество старинных фолиантов и книг, но долгие годы она была в запустении. Собрание трудов срочно нуждается в реорганизации."
 khaldun_accquire_modern_books_button: "Приобрести современные книги"
 khaldun_accquire_modern_books_button_desc: "Есть страны, которые в научном плане значительно нас опережают. Нам следует попытаться приобрести некоторые из их книг, чтобы наша библиотека снова стала источником знаний."
