 khaldun_al_qarawiyyin_center_of_learning_modifier: "Центр знаний в Аль-Карауине"
 khaldun.101.t: "Аль-Карауин: центр знаний"
 khaldun.101.d: "Много веков назад Аль-Карауин был центром науки и знаний. Теперь он вернул себе место одного из ведущих университетов мира."
 khaldun.101.f: "«Аль-Карауин был университетом дольше, чем любой из университетов Европы. В нём хранилось множество книг, но, к сожалению, он начал приходить в упадок. Сегодняшний день знаменует собой возвращение этого университета на его законное место!»"
 khaldun.101.g: "Аль-Карауин станет светочем знаний!"
 khaldun.101.h: "Аль-Карауин станет светочем математики и инженерии!"
 khaldun.101.i: "Аль-Карауин станет светочем естествознания!"
 khaldun.101.j: "Аль-Карауин станет светочем гуманитарных наук!"