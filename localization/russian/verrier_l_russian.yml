 verrier.9000.t: "Учительница из Мичигана пытается переправиться через Ниагарский водопад в бочке"
 verrier.9000.d: "Граничит с безумием — хотеть как-то пересечь ревущий водопад. Но в бочке? Женщина? Энни Эдсон Тейлор хочет сделать именно это. Она хочет спуститься по Ниагарскому водопаду в бочке.\nДолжны ли мы остановить её план или позволить ей рискнуть?"
 verrier.9000.f: "«Пять баксов, что она утонет!»\n«Десять долларов, что она доберётся до дна живой!»\n\n#b Исторически#! были различные попытки пересечь, спуститься или спрыгнуть с Ниагарского водопада. Большинство попыток закончились смертью. Выжившие обычно сталкивались со штрафами и наказаниями."
 verrier.9000.g: "Остановите это безумие сейчас же!"
 verrier.9000.h: "Не моя проблема. Пусть делает, что хочет..."
 verrier_niagara_falls_not_allow_barrel_tt: "Если вы остановите учительницу от того, что она делает, наверняка ничего плохого не случится."
 verrier_niagara_falls_allow_barrel_tt: "Может быть, учительница станет первым человеком, который живым пересечёт Ниагарский водопад в бочке. Но может быть, она и не выживет."
 verrier.9001.t: "Энни Эдсон Тейлор — первая, кто пересёк Ниагарский водопад в бочке"
 verrier.9001.d: "Хотя многие думали, что попытка Энни Эдсон Тейлор будет смертельной, она выжила после падения с Ниагарского водопада. У неё есть некоторые травмы, включая кровотечение, но она в порядке. Тем не менее, она предостерегает всех от повторения подобного. Местные власти уже разработали приказ, чтобы сделать такие попытки наказуемыми по закону."
 verrier.9001.f: "«Никто никогда не должен делать этого снова».\n\n   #b Исторически#! Энни Эдсон Тейлор выжила в своей попытке в 1901 году. Однако, оказавшись внизу, она истекала кровью и предостерегала возможных подражателей.\n   Тем не менее, были люди, пытавшиеся сделать то же самое. Чарльз Стивенс был первым человеком, погибшим в своей попытке в 1920 году."
 verrier.9001.g: "Ей повезло. Теперь запретите людям пытаться снова!"
 verrier.9002.t: "Энни Эдсон Тейлор погибает при попытке пересечь Ниагарский водопад"
 verrier.9002.d: "То, чего многие ожидали, произошло. Энни Эдсон Тейлор погибла при попытке пересечь Ниагарский водопад в бочке. Похоже, она добралась до дна живой, но тяжело раненной. Однако, поскольку она не смогла выбраться из своей бочки, она утонула, когда внутрь попала вода. Конечно, не самая красивая смерть."
 verrier.9002.f: "«Женщина из Мичигана погибает, пытаясь упасть с огромного водопада в бочке».\n\n   #b Исторически#! Энни Эдсон Тейлор выжила в своей попытке в 1901 году. Однако, оказавшись внизу, она истекала кровью и предостерегала возможных подражателей.\n   Тем не менее, были люди, пытавшиеся сделать то же самое. Чарльз Стивенс был первым человеком, погибшим в своей попытке в 1920 году."
 verrier.9002.g: "Дурацкие игры — дурацкие призы... Запретите кому-либо когда-либо пытаться снова."
 verrier_barrel_successful_modifier: "Успешно пересёк Ниагарский водопад в бочке"
 verrier_barrel_unsuccessful_modifier: "Смертельная экспедиция в бочке"
 verrier.9003.t: "Ниагарский водопад замерзает"
 verrier.9003.d: "Морозная зима приводит к тому, что Ниагарский водопад всё больше и больше замерзает. Тем временем под одним из водопадов уже образовался ледяной мост. Люди стекаются, чтобы посмотреть на это зрелище, а предприимчивые бизнесмены уже устанавливают на льду первые мобильные магазины. Но есть и голоса, предупреждающие, что лёд может в какой-то момент сломаться. Должны ли мы что-то сделать, чтобы защитить людей?"
 verrier.9003.f: "«Какая ледяная страна чудес! Выглядит волшебно! Я уверен, что эта зимняя сказка запомнится навсегда как прекрасный момент!»\n\n#b Исторически,#! воды Северной Америки время от времени замерзали. Ниагарский водопад не был исключением. Падающий лёд часто образовывал «ледяной мост» под водопадами, и с 1880-х годов люди собирались там, чтобы отпраздновать своего рода народный праздник с развлечениями и напитками."
 verrier.9003.g: "Мы должны обеспечить безопасность. Перекрыть ледяной мост."
 verrier.9003.h: "Люди, безусловно, осознают риск и осторожны!"
 verrier_niagara_falls_no_security_tt: "Вы не перекрываете ледяной мост, надеюсь, ничего не случится, но #n никогда не знаешь#!...."
 verrier.9004.t: "Ледяной мост на Ниагарском водопаде рухнул — несколько погибших"
 verrier.9004.d: "До нас дошли ужасные новости с Ниагарского водопада. Ледяной мост разломился, и отдельные куски с головокружительной скоростью поплыли вниз по реке. Большинству людей на мосту удалось спастись, но некоторые несчастные оказались в ловушке на ледяном пирсе. Когда пожарные попытались их спасти, они погибли в ревущей смеси льда и воды.\nСильная критика обрушилась на правительство [SCOPE.sState('niagara_falls_state_scope').GetName], так как катастрофу можно было легко предотвратить."
 verrier.9004.f: "«Это звучало как рёв артиллерийского парка, когда огромный ледяной мост в ущелье прямо под могучим водопадом внезапно унёсся со своей ношей людей. Отдельные люди прыгали в воду и смогли спастись, дрожа на берегу, другие были слишком медлительны и должны были беспомощно наблюдать, как огромная масса льда несётся вниз по реке».\n\n#b Исторически,#! воды Северной Америки время от времени замерзали. Ниагарский водопад не был исключением. Падающий лёд часто образовывал «ледяной мост» под водопадами, и с 1880-х годов люди собирались там, чтобы отпраздновать своего рода народный праздник с развлечениями и напитками. В 1912 году ледяной мост обломился, что привело к гибели трёх человек. С тех пор посетителей предупреждают не ступать на лёд."
 verrier.9004.g: "Какая ненужная трагедия!"
 verrier.9005.t: "Лёд на Ниагарском водопаде растаял"
 verrier.9005.d: "На Ниагарском водопаде снова стало тише. Лёд продержался недолго и тем временем отступил. Теперь вода снова, как обычно, ревёт в бассейн. От короткого времени остались очаровательные воспоминания и солидная прибыль для нескольких местных бизнесменов. Кто знает, когда Ниагарский водопад замёрзнет в следующий раз?"
 verrier.9005.f: "«Однажды я расскажу своим детям о том, как я стоял на ледяном мосту и услышал треск. К счастью, ничего плохого не случилось. Вместо этого я танцевал на льду со своей женой!»\n\n#b Исторически,#! воды Северной Америки время от времени замерзали. Ниагарский водопад не был исключением. Падающий лёд часто образовывал «ледяной мост» под водопадами, и с 1880-х годов люди собирались там, чтобы отпраздновать своего рода народный праздник с развлечениями и напитками. В 1912 году ледяной мост обломился, что привело к гибели трёх человек. С тех пор посетителей предупреждают не ступать на лёд."
 verrier.9005.g: "Прекрасно!"
