 verrier.300.t: "Прохождение Венеры"
 verrier.300.d: "Астрономы предсказали солнечное затмение в австралийско-индонезийско-тихоокеанском регионе в #ORANGE 1874#! году. Научное сообщество [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] настаивает на [Concept('concept_dubois_pacific_expedition', 'тихоокеанской экспедиции')] для наблюдения этого уникального астрономического события."
 verrier.300.f: "Прохождение Венеры — это прохождение планеты Венера перед Солнцем. Это явление происходит всего четыре раза примерно за 243 года. Исторически точное измерение таких прохождений имело большое значение для определения расстояния между Землёй и Солнцем (астрономическая единица) и послужило поводом для многих экспедиций и измерительных кампаний важных институтов и учёных. Прохождение Венеры в 1874 году было относительно неблагоприятным для астрономических измерений. Оно осталось невидимым почти для всей Европы, длительные прохождения наблюдались только из Азии, а короткие — из Австралии, островов Южной части Тихого океана и южной части Индийского океана (особенно архипелага Кергелен). Тем не менее, было отправлено около 60 экспедиций.\n\n#R Примечание: в тихоокеанской экспедиции, наблюдающей прохождение Венеры, должен быть [concept_verrier_astronomer|l] на борту.#!"
 verrier.300.g: "Мы не должны это пропустить."
 verrier.301.t: "Прохождение Венеры 1874 года"
 verrier.301.d: "Экспедиция #YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('rapanui_expedition_ship_type')]»#! стала свидетелем прохождения Венеры. [SCOPE.sCharacter('rapanui_scientist').GetFullName] смог[SelectLocalization(SCOPE.sCharacter('rapanui_scientist').IsFemale, 'ла', '')] сделать важные астрономические записи, которые будут занимать науку долгие годы."
 verrier.301.f: "Прохождение Венеры 1874 года, состоявшееся 9 декабря 1874 года, было первым из пары прохождений Венеры, произошедших в XIX веке. Как и в случае с предыдущими прохождениями, прохождение 1874 года предоставило возможность для улучшенных измерений и наблюдений. Были запланированы и отправлены многочисленные экспедиции для наблюдения за прохождением из разных точек земного шара, при этом несколько стран создали официальные комитеты для организации планирования. Было шесть официальных французских экспедиций, пять британских экспедиций, восемь экспедиций, финансируемых Конгрессом США, три немецкие экспедиции (включая экспедицию «Газель») и две мексиканские экспедиции. Италия, Россия и Австрия также отправили экспедицию для наблюдения за этим астрономическим моментом. Особенно известными стали записи французской экспедиции, которая сложила несколько фотографий одну за другой и таким образом составила первый «фильм». Прохождение Венеры — одно из первых движущихся изображений человечества."
 verrier.301.g: "Потрясающее зрелище."
 verrier.401.t: "Пултуский метеоритный дождь"
 verrier.401.d: "Люди в Мазовии стали свидетелями чего-то в небе."
 verrier.401.f: "Расположенный в самом сердце Мазовии, quaint городок Пултуск хранит тайну из космоса. Именно здесь, в холодный зимний день, развернулось небесное событие беспрецедентного масштаба, навсегда связав это мирное поселение с огромной, таинственной вселенной за его пределами. Шёл 1868 год. 30 января жители Пултуска занимались своими повседневными делами, не подозревая, что их жизни вот-вот пересекутся с необыкновенным явлением. Когда день сменился вечером, над городом опустилась необычная тишина. Без предупреждения яркий свет пронзил небо. Огненный шар, более сияющий, чем солнце, пронёсся по небесам. Свидетели описывали его как пылающий шар, оставляющий за собой светящийся хвост, с громовым рёвом расколовший небо. Огненный шар, позже идентифицированный как метеорит, взорвался при входе в атмосферу Земли. Тысячи осколков обрушились на Пултуск и его окрестности, создав дождь из метеоритных камней. Это событие стало известно как Пултуский метеоритный дождь."
 verrier.401.g: "Какой прекрасный вид!"
 verrier.402.t: "Холбрукский метеоритный дождь"
 verrier.402.d: "Люди в Аризоне стали свидетелями чего-то в небе."
 verrier.402.f: "Когда над Холбруком опустилась ночь, небо взорвалось каскадом сияющих огненных шаров около 19:15. Сотни светящихся метеоров, различающихся по размеру и яркости, пронеслись по небесам, исходя из одной точки и рассеиваясь во всех направлениях. Эти метеоры, оставляя следы ярко-белого и светящегося жёлтого света, создали впечатляющее зрелище. Более крупные фрагменты с огненными ядрами распадались на более мелкие части, прежде чем исчезнуть в нижних слоях атмосферы. Раздавались далёкие, похожие на пушечные, звуки, отражающие огромную энергию их фрагментации. Жители, сначала напуганные, вскоре собрались, чтобы полюбоваться небесным зрелищем. Последующие поиски обнаружили многочисленные мелкие фрагменты метеоритов, разбросанные по ландшафту, состоящие в основном из железа и никеля."
 verrier.403.t: "Княгининский метеоритный дождь"
 verrier.403.d: "Люди в Восточной Словакии стали свидетелями чего-то в небе."
 verrier.403.f: "Княгининский метеорит был самым значительным падением метеороида в Европе в исторические времена. Долгое время этот метеорит считался самым тяжёлым каменным метеоритом в мире. Падение произошло в горах к северу от города Княгиня 9 июня 1866 года между 16:00 и 17:00. Существуют многочисленные свидетельства очевидцев, которые позже были запечатлены на рисунках. Метеор затем распался на более чем 1000 частей при входе в атмосферу Земли."
 verrier.411.t: "Метеорит Кейп-Йорк"
 verrier.411.d: "Во время своих геологических изысканий доктор [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetLastName] наткнулся на значительное случайное открытие. Странный камень, который он исследовал, после тщательного изучения оказался материалом из космоса. Метеорит имеет значительный, почти рекордный размер."
 verrier.411.f: "В ледяных просторах Гренландии [concept_agassiz_geologist|l] [GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] обнаружил[SelectLocalization(GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] метеорит Кейп-Йорк, небесное чудо, которое обещает расширить наши научные горизонты. Эти массивные железные фрагменты, долгое время использовавшиеся инуитами для изготовления инструментов, были подтверждены как внеземные, демонстрируя уникальные видманштеттеновы структуры и включения троилита. Весом до 31 метрической тонны, эти метеориты предлагают беспрецедентный взгляд на первозданные материалы, из которых образовалась наша Солнечная система. Это открытие обогащает наше понимание формирования ранней Солнечной системы и подчёркивает глубокую связь между историей человечества и космическими событиями. Путешествие метеоритов в научные учреждения позволит провести детальный анализ, проливая свет на тайны великого замысла вселенной. Изучая эти небесные реликвии, мы углубляем наше понимание сложной ткани космоса и нашего места в ней."
 verrier.411.g: "Это невероятное открытие!"
 verrier.412.t: "Метеорит Бакубирито"
 verrier.412.f: "Метеорит Бакубирито — самый большой метеорит, найденный в Мексике. Найденный в 1863 году [Concept('concept_agassiz_geologist', '#b #GREEN геологом#!#!')] Гилбертом Эллисом Бейли в деревне Ранчито недалеко от города Синалоа-де-Лейва, это железный метеорит весом от 20 до 22 тонн. Его размеры составляют 4,25 метра в длину, 2 метра в ширину и 1,75 метра в высоту."
 verrier.413.t: "Метеорит Мундрабилла"
 verrier.413.f: "Метеорит Мундрабилла — это железный метеорит, который упал на равнину Налларбор в Западной Австралии и распался на фрагменты ещё в атмосфере Земли. Считается, что метеоритный дождь произошёл несколько миллионов лет назад. С общей массой 24 тонны это одна из крупнейших находок метеоритов в мире. Считается, что он упал на Землю 60 миллионов лет назад, что делает его одним из древнейших известных метеоритов на планете."
 verrier.414.t: "Метеорит Уилламетт"
 verrier.414.f: "Уилламетт — это название метеорита, который был официально обнаружен в американском штате Орегон в 1902 году. Однако на Землю он упал несколькими тысячами лет ранее. На момент своего открытия он считался третьим по величине в мире, а сегодня — шестым. Он весит 15,5 тонн. Было подсчитано, что до 6 тонн метеорита было удалено из-за погодных влияний за последние 13 000 лет. Метеорит Уилламетт почитался народом клакамас задолго до того, как его убрали с его места в долине Уилламетт недалеко от современного города Уэст-Линн, штат Орегон. В 1902 году Эллис Хьюз был первым европейским поселенцем, признавшим значение метеорита."
 verrier.415.t: "Метеорит Хоба"
 verrier.415.f: "Метеорит Хоба — самый большой метеорит, обнаруженный на Земле на сегодняшний день. Он находится на территории фермы «Хоба» в горах Отави, примерно в 20 километрах к западу от Гротфонтейна в Намибии. Информация о весе варьируется от 50 до 60 тонн. Его первоначальные размеры составляли 2,70 метра х 2,70 метра х 0,90 метра. Железный метеорит упал на Землю около 80 000 лет назад и до сих пор находится в своём первоначальном положении. Его предполагаемый возраст составляет от 190 до 410 миллионов лет."
 verrier.421.t: "[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName] хочет изучить [Concept('concept_verrier_meteorite', 'метеориты')]"
 verrier.421.d: "Благодаря настойчивости нашего [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')], [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName], через несколько дней после падения метеорита было обнаружено множество фрагментов. Находка, вероятно, прольёт свет на некоторые тайны вселенной — но доктор [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName] настаивает на том, чтобы сохранить найденные им находки."
 verrier.421.f: "В разгар викторианской эпохи [concept_verrier_astronomer|l] обратил свой взор на небеса, что привело к открытию фрагментов метеорита. Его острые наблюдательные навыки и методичный подход позволили ему собрать и изучить эти небесные останки. Каждый фрагмент был тщательно проанализирован, что способствовало более глубокому пониманию состава и происхождения метеоритов. Его работа стала примером викторианской преданности науке, движимой ненасытным любопытством и глубоким желанием раскрыть тайны вселенной."
 verrier.421.g: "Все фрагменты должны быть переданы в Академию наук!"
 verrier.421.h: "[GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName] может изучить один из [Concept('concept_verrier_meteorite', 'метеоритов')]."
 verrier.422.t: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetFullName] хочет проанализировать [Concept('concept_verrier_meteorite', 'метеориты')]"
 verrier.422.d: "Доктор [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName], ведущий [concept_mendelejew_chemist|l] страны, обратился к правительству с просьбой исследовать недавно найденный [Concept('concept_verrier_meteorite', 'метеорит')]. Кроме того, в его лаборатории он хранится более надёжно, чем в небезопасном сейфе."
 verrier.422.f: "«Инопланетный материал! С неизвестного расстояния! Это научная сенсация и уникальная возможность подробно изучить химический состав метеорита»."
 verrier.422.g: "Почему каждый встречный академик думает, что может выпросить мой [Concept('concept_verrier_meteorite', 'метеорит')]?"
 verrier.422.h: "Я уверен, что это продвинет химию."
 verrier.1013.f: "Георгиос Константинос Вурис, известный [concept_verrier_astronomer|l], читал лекции первым греческим студентам нового построенного университета. В Греции наступала новая эра, эра обучения и прогресса.\n\n#b Исторически,#! университет был запланирован в 1836 году и официально основан 3 мая 1837 года. Это был первый университет на материковой части Греции. Когда в 1841 году было завершено главное здание, университет был переведён в новое здание. Строительство крыльев университета продолжалось до 1864 года.\n Othóneion Panepistímion позже был переименован в Национальный университет, так как Отто пришлось бежать из Греции после переворота в 1862 году.\n\nСегодня Национальный и Каподистрийский университет Афин является одним из ведущих университетов Греции. Двое выпускников университета, оба поэта, получили Нобелевские премии за свои произведения, а пятнадцать греческих премьер-министров и три греческих президента были студентами университета."
 je_verrier_meteorites: "Коллекция метеоритов"
 je_verrier_meteorites_reason: "[Concept('concept_verrier_meteorite', 'Метеориты')], будь то только что упавшие с неба или найденные спустя миллионы лет, дают fascinante представление о прошлом планеты и вселенной. Достаточное количество открытий позволяет добиться научного прогресса."
