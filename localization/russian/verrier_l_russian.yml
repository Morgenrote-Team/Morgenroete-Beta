 verrier.161.t: "Оторванная от Земли"
 verrier.161.d: "Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] предложил[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] новую теорию: Луна когда-то была частью Земли, отделившейся в результате быстрого вращения и приливных сил в ранней истории планеты."
 verrier.161.f: "Вразрез с широко принятой моделью Канта-Лапласа, согласно которой Земля и Луна образовались одновременно из вращающегося газового облака, доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] предполагает, что Луна была выброшена из внешних слоёв Земли из-за периода экстремальной скорости вращения. Теория основана на приливной динамике, предполагая, что система Земля-Луна сохраняет угловой момент, который был бы совместим с таким событием. Относительно низкая плотность Луны и её схожий состав с внешними слоями Земли подтверждают идею о том, что она возникла вблизи поверхности. Хотя физических образцов нет, модель предлагает механическое объяснение того, почему орбита Луны и замедление вращения Земли так тесно связаны."
 verrier.161.g: "Увлекательно."
 verrier.162.t: "Пленённая Луна"
 verrier.162.d: "Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] выдвинул[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] смелую гипотезу: Луна не образовалась вместе с Землёй, а была захвачена её гравитацией после образования в другом месте Солнечной системы."
 verrier.162.f: "Отходя от современных моделей совместного образования, доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] утверждает, что Луна когда-то была независимым небесным телом. Согласно его расчётам, гравитационные силы — возможно, при содействии раннего атмосферного сопротивления или взаимодействий с третьим телом — могли притянуть Луну на орбиту Земли спустя долгое время после того, как оба объекта уже образовались. Это объяснило бы наклонную орбиту и особое движение Луны, хотя критики отмечают, что такой захват был бы динамически нестабилен без точных условий. Пока нет механизма, объясняющего требуемую потерю энергии. Тем не менее, теория вызвала интерес своим смелым вызовом традиционным взглядам."
 verrier.162.g: "Спекулятивно, но стоит изучить."
 verrier.163.t: "Столкновение на заре времён"
 verrier.163.d: "Доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] представил[SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'а', '')] смелую геологическую гипотезу: Луна образовалась из земного материала, выброшенного в результате сильного удара в самой ранней истории Земли."
 verrier.163.f: "Разочарованный нерешёнными противоречиями в преобладающих теориях происхождения Луны, доктор [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] предлагает драматическую альтернативу. В фазе формирования Земли массивное небесное тело — не крошечное и не планетарного масштаба, но достаточно существенное — ударило по планете под косым углом. Образовавшиеся обломки, в основном из внешних слоёв Земли, вышли на орбиту и постепенно слились в Луну. Этот сценарий согласуется с более низкой плотностью Луны, её очевидным сходством с мантией Земли и необычным импульсом системы Земля-Луна. Идея остаётся спекулятивной и труднодоказуемой, но она примечательна тем, что связывает геологические рассуждения с небесной механикой — и смелостью рассматривать формирование планет как процесс столкновения, а не постепенной гармонии."
 verrier.163.g: "Эта теория может перевернуть планетологию."
