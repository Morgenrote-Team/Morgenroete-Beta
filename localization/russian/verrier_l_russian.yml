 je_from_the_earth_to_the_moon: "С Земли на Луну"
 je_from_the_earth_to_the_moon_reason: "Балтиморский оружейный клуб хочет построить гигантскую пушку, чтобы отправить снаряд на Луну. Среди прочего, они планируют гранату весом 10 000 кг и толщиной стенок 60 см из алюминия. Они также договорились о стволе пушки длиной 270 м, внутренним диаметром 2,70 м и толщиной стенок 1,80 м из чугуна. Это требует подходящей оружейной промышленности и способных людей для проектирования и строительства устройства. Флорида кажется идеальным местом для запуска. Из-за транспортировки материалов региону нужна собственная железнодорожная линия."
 verrier_baltimore_president_alive_tt: "Президент Балтиморского оружейного клуба, [SCOPE.sCharacter('verrier_club_president').GetFullName], всё ещё жив"
 verrier.131.t: "С Земли на Луну"
 verrier.131.d: "[SCOPE.sCharacter('verrier_club_president').GetFullName] основал Балтиморский оружейный клуб, который считается развлекательным мероприятием для любителей оружия. Последнее предложение общества попало в заголовки газет по всей стране."
 verrier.131.f: "Балтиморский оружейный клуб был основан во время Гражданской войны и объединяет в своих рядах специалистов по артиллерии. Его председатель [SCOPE.sCharacter('verrier_club_president').GetLastName] и секретарь, [concept_tesla_engineer|l] [SCOPE.sCharacter('gaudi_engineer_scope').GetFullName], чувствуют себя невостребованными после окончания гражданской войны. Они созывают собрание, чтобы открыть новое поле деятельности. После предложений начать новую войну, чтобы иметь возможность использовать новое оружие, они соглашаются с предложением использовать пушку для отправки снаряда с Земли на Луну. Среди прочего, они планируют гранату весом 10 000 кг и толщиной стенок 60 см из алюминия. Они также договорились о стволе пушки длиной 270 м, внутренним диаметром 2,70 м и толщиной стенок 1,80 м из чугуна. В качестве метательного заряда следует использовать пироксилин."
 verrier.131.g: "США высадят первого человека на Луну до конца десятилетия!"
 verrier.131.h: "Гораздо безопаснее дождаться следующей войны..."
 verrier.132.t: "Экипаж для полёта на Луну"
 verrier.132.d: "Подготовка проведена, но остаётся важный вопрос: кто должен сесть в капсулу?"
 verrier.132.f: "На самом деле, можно подумать, что для самоубийственной миссии, которая запустит человека в космос в гигантском пушечном снаряде, будет трудно найти добровольцев. Но для некоторых членов Балтиморского оружейного клуба это большая честь. И президент, и главный [concept_tesla_engineer|l] имеют право на место, другие выступают за известного [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')]. Более осторожные умы утверждают, что в космос следует запустить только двух собак в качестве теста, чтобы не подвергать опасности человеческие жизни."
 verrier.132.g: "[SCOPE.sCharacter('gaudi_engineer_scope').GetFullName], [concept_tesla_engineer|l]"
 verrier.132.h: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], [concept_verrier_astronomer|l]."
 verrier.132.i: "[SCOPE.sCharacter('verrier_club_president').GetFullName], президент клуба."
 verrier.132.j: "Просто посадите туда собак."
 verrier.132.k: "ВСЕХ!"
 verrier.133.t: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]: вмешательство"
 verrier.133.d: "Во время последних приготовлений к строительству и установке гигантской пушки, [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] предупредил[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] инициаторов проекта: по его расчётам, [SCOPE.sCharacter('gaudi_engineer_scope').GetFullName] просчитался."
 verrier.133.f: "Известный [concept_verrier_astronomer|l] рассчитал, что если пушка будет построена в нынешних масштабах и снаряд будет нацелен нынешним образом, капсула едва ли покинет гравитацию Земли. Он[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] представил[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] несколько улучшенных планов строительства, которые значительно повышают успех путешествия."
 verrier.133.g: "Он[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] мог[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'ла', '')] бы предотвратить катастрофу."
 verrier.134.t: "Обратный отсчёт"
 verrier.134.d: "Сколько людей лишились сна в ночь, предшествующую этому долгожданному дню! Все сердца бились в тревоге. «Колумбиада» готова лететь на Луну."
 verrier.134.f: "После рассвета бесчисленное множество людей покрыло прерию, которая простирается, насколько хватает глаз, вокруг Стоунс-Хилл. Каждые четверть часа железная дорога привозила новых зевак; и, по заявлению «Тампа Таун Обсервер», не менее пяти миллионов зрителей толпились на земле Флориды. Луна поднималась вверх по небу чистейшей ясности, затмевая своим прохождением мерцающий свет звёзд. Она прошла над созвездием Близнецов и теперь приближалась к середине пути между горизонтом и зенитом. Ужасная тишина давила на всю сцену! Ни дуновения ветерка на земле! Ни звука дыхания из бесчисленных грудей зрителей! Их сердца, казалось, боялись биться! Все глаза были устремлены на зияющее жерло «Колумбиады».\n«Тридцать пять! — тридцать шесть! — тридцать семь! — тридцать восемь! — тридцать девять! — сорок!»"
 verrier.134.g: "ОГОНЬ!"
 verrier.135.t: "Катастрофа"
 verrier.135.d_humans_dead: "Первая космическая миссия человечества обернулась первой космической катастрофой человечества. Вся миссия была колоссальным провалом! Ужас до сих пор в костях у зрителей."
 verrier.135.d_dogs_dead: "Вся миссия была колоссальным провалом! Страдания бедных животных прискорбны, но, с другой стороны, многие вздохнули с облегчением, что в капсуле не было человека."
 verrier.135.f: "В тот момент, когда эта пирамида огня поднялась на огромную высоту в воздух, зарево пламени осветило всю Флориду; и на мгновение день сменил ночь на значительном пространстве страны. Этот огромный огненный купол был виден на расстоянии ста миль в море, и не один капитан корабля записал в свой бортовой журнал появление этого гигантского метеора. Выстрел «Колумбиады» сопровождался настоящим землетрясением. Флорида содрогнулась до самых глубин. Газы пороха, расширенные от жары, с огромной силой отбросили атмосферные слои, и этот искусственный ураган пронёсся, как смерч, по воздуху.\nНо затем эксперимент вышел из-под контроля: по-видимому, пушка не смогла создать достаточную тягу, чтобы propelling снаряд в космос. После всех фантастических эффектов капсула потеряла скорость, устремилась обратно на землю — и с громким треском разбилась."
 verrier.135.g: "Всё равно лучше, чем Kerbal Space Program 2."
 verrier.136.t: "Полёт на Луну"
 verrier.136.d_humans_in_space: "Старт «Колумбиады» прошёл с полным успехом. Человек впервые вышел в космос! Остаётся вопрос, вернётся ли он..."
 verrier.136.d_dogs_in_space: "Старт «Колумбиады» прошёл с полным успехом. Впервые созданный человеком объект достиг космоса! К сожалению, собаки вряд ли смогут вернуть «Колумбиаду» на Землю..."
 verrier.136.f: "В тот момент, когда эта пирамида огня поднялась на огромную высоту в воздух, зарево пламени осветило всю Флориду; и на мгновение день сменил ночь на значительном пространстве страны. Этот огромный огненный купол был виден на расстоянии ста миль в море, и не один капитан корабля записал в свой бортовой журнал появление этого гигантского метеора. Выстрел «Колумбиады» сопровождался настоящим землетрясением. Флорида содрогнулась до самых глубин. Газы пороха, расширенные от жары, с огромной силой отбросили атмосферные слои, и этот искусственный ураган пронёсся, как смерч, по воздуху.\nЭксперимент удался."
 verrier.136.g: "Это действительно ра... ПОЗДРАВЛЯЮ!"
 verrier.136.h: "Жаль, что мы не отправили настоящих пилотов."
 verrier.137.t: "Возвращение с Луны!"
 verrier.137.d: "Капсула лунной миссии благополучно приземлилась в Тихом океане и была подобрана американским корветом. Новость разнеслась по всей стране: человек побывал на Луне и вернулся!"
 verrier.137.f_person: "Место, где снаряд погрузился под волны, было точно известно; но механизма, чтобы схватить его и поднять на поверхность океана, ещё не было. Его нужно было сначала изобрести, а затем изготовить. Американские инженеры не могли беспокоиться о таких мелочах. Как только захваты будут закреплены, с их помощью они были уверены, что поднимут его, несмотря на его вес, который уменьшался плотностью жидкости, в которую он был погружён.\nМы можем вспомнить то сильное сочувствие, которое сопровождало отъезд. Если в начале предприятия приключение вызвало такое волнение как в старом, так и в новом свете, с каким энтузиазмом героя примут по возвращении! Так он мчался из одного города в другой, находя на своём пути целые народы за столом, приветствуя его теми же возгласами, расточая те же браво."
 verrier.137.f_team: "Место, где снаряд погрузился под волны, было точно известно; но механизма, чтобы схватить его и поднять на поверхность океана, ещё не было. Его нужно было сначала изобрести, а затем изготовить. Американские инженеры не могли беспокоиться о таких мелочах. Как только захваты будут закреплены, с их помощью они были уверены, что поднимут его, несмотря на его вес, который уменьшался плотностью жидкости, в которую он был погружён.\nМы можем вспомнить то сильное сочувствие, которое сопровождало отъезд. Если в начале предприятия приключение вызвало такое волнение как в старом, так и в новом свете, с каким энтузиазмом их примут по возвращении! Так они мчались из одного города в другой, находя на своём пути целые народы за столом, приветствуя их теми же возгласами, расточая те же браво."
 verrier.137.g: "Мы должны отпраздновать!"
 verrier.1051.t: "Возвращение Гаусса"
 verrier.1051.d: "Когда-то считавшийся одним из величайших астрономов, [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] в последние несколько лет сосредоточился на других вопросах, таких как математика и магнетизм. Но теперь он вернулся в астрономию."
 verrier.1051.f: "Я вернулся."
 verrier.1051.g: "Он имеет какое-то отношение к колоколам, верно?"
 verrier.1051.h: "Он найдёт новые планеты!"
 verrier.90.f: "Конгресс пришёл к следующему выводу:\n\n"
 verrier.90.one_universe_loc: "Млечный Путь охватывает всю Вселенную (Голоса: [GetGlobalVariable('verrier_galaxies_no').GetValue|+0] против [GetGlobalVariable('verrier_galaxies_yes').GetValue|V0])\n"
 verrier.90.many_universe_loc: "Во вселенной существуют разные галактики (Голоса: [GetGlobalVariable('verrier_galaxies_yes').GetValue|+0] против [GetGlobalVariable('verrier_galaxies_no').GetValue|V0])\n"
 verrier.90.sun_center_loc: "Солнце находится в центральной области Млечного Пути (Голоса: [GetGlobalVariable('verrier_sun_center_yes').GetValue|+0] против [GetGlobalVariable('verrier_sun_center_no').GetValue|V0])"
 verrier.90.sun_outer_loc: "Солнце находится во внешней области Млечного Пути (Голоса: [GetGlobalVariable('verrier_sun_center_no').GetValue|+0] против [GetGlobalVariable('verrier_sun_center_yes').GetValue|V0])"
 verrier.90.g: "Наука никогда не стоит на месте."
