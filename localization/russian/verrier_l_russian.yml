 verrier_add_x_venus_success_plus_x_tt: "Получить [SCOPE.GetValue('verrier_venus_success_amount')|0+] #V успеха в наблюдении за прохождением Венеры#!."
 je_verrier_venus_transit_1874: "Прохождение Венеры 1874 года в [SCOPE.sCountry('target').GetAltNameNoFlag('RU_CL_PP')]"
 je_verrier_venus_transit_1874_reason: "Приближается редкое небесное событие. Планета Венера пройдёт прямо между Землёй и Солнцем, отбросив свою крошечную тень на солнечный диск. Обсерватории по всему миру готовятся к этому мимолётному явлению, которое может помочь определить сам масштаб нашей Солнечной системы.\n$mr_divider_for_je$\nВо время этой экспедиции вы будете получать шанс на успех. В конце экспедиции вы получите модификатор. Чем выше ваш шанс на успех, тем больше будет эффект от модификатора.\n#V Текущий успех:#! [GetPlayer.MakeScope.Var('verrier_venus_transit_success_var').GetValue|0+]"
 je_verrier_venus_transit_1874_on_complete_tt: "В конце экспедиции есть #n 25%-й шанс на плохую погоду#!, что снизит ваше значение успеха. В конце вы получите #V модификатор#!, который будет #V основан на вашем значении успеха#!."
 add_je_verrier_venus_transit_1874_tt: "Добавляет #V «Прохождение Венеры 1874 года»#! в журнал [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]"
 je_verrier_venus_transit_1882: "Прохождение Венеры 1882 года в [SCOPE.sCountry('target').GetAltNameNoFlag('RU_CL_PP')]"
 je_verrier_venus_transit_1882_reason: "$je_verrier_venus_transit_1874_reason$"
 je_verrier_venus_transit_1882_tt: "Добавляет #V «Прохождение Венеры 1882 года»#! в журнал [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]"
 verrier.308.t: "Прохождение Венеры в 1874 году"
 verrier.308.d: "Астрономы предсказали прохождение Венеры в австралийско-индонезийско-тихоокеанском регионе в #ORANGE 1874#! году. Научное сообщество [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] требует наблюдения за этим уникальным астрономическим событием."
 verrier.308.f: "Прохождение Венеры — это прохождение планеты Венера перед Солнцем. Это явление происходит всего четыре раза примерно за 243 года. Исторически точное измерение таких прохождений имело большое значение для определения расстояния между Землёй и Солнцем (астрономическая единица) и послужило поводом для многих экспедиций и измерительных кампаний важных институтов и учёных. Прохождение Венеры в 1874 году было относительно неблагоприятным для астрономических измерений. Оно осталось невидимым почти для всей Европы, длительные прохождения наблюдались только из Азии, а короткие — из Австралии, островов Южной части Тихого океана и южной части Индийского океана (особенно архипелага Кергелен). Тем не менее, было отправлено около 60 экспедиций."
 verrier.308.g: "Мы не должны это пропустить."
 verrier.309.t: "Прохождение Венеры в 1882 году"
 verrier.309.d: "Астрономы предсказали ещё одно прохождение Венеры для регионов Южной Америки, Центральной Америки и Северо-Восточной Америки в #ORANGE 1882#! году. Научное сообщество [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] требует наблюдения за этим уникальным астрономическим событием."
 verrier.309.f: "Прохождение Венеры — это прохождение планеты Венера перед Солнцем. Это явление происходит всего четыре раза примерно за 243 года. Исторически точное измерение таких прохождений имело большое значение для определения расстояния между Землёй и Солнцем (астрономическая единица) и послужило поводом для многих экспедиций и измерительных кампаний важных институтов и учёных. Прохождение Венеры в 1882 году имело некоторые преимущества перед прохождением 1874 года, поскольку оно было видно в некоторых более доступных регионах. Так, прохождение было видно на всём американском континенте, за исключением севера и северо-востока Северной Америки."
 verrier.311.t: "Подготовка к прохождению Венеры"
 verrier.311.d: "Приближается редкое астрономическое событие: планета Венера пройдёт по диску Солнца. По всему миру обсерватории и правительства начинают подготовку."
 verrier.311.f: "Дата была рассчитана с точностью до секунды. Телескопы упаковываются. Часы синхронизируются. Планета Венера пройдёт по диску Солнца. Астрономы считают, что прохождение позволит точно измерить астрономическую единицу, фундаментальный масштаб Солнечной системы. Но успех этого предприятия полностью зависит от видимости — от местоположения, погоды и координации."
 verrier.311.g: "Мы будем наблюдать за прохождением из дома."
 verrier.311.h: "Мы отправим экспедицию в один из наших протекторатов."
 verrier.311.i: "Мы отправим экспедицию в далёкую страну."
 verrier.311.j: "Мы должны ещё раз об этом подумать."
 verrier.319.t: "Иностранные глаза в небе"
 verrier.319.d: "Экспедиция из [SCOPE.sCountry('verrier_venus_transit_leader').GetAltNameNoFlag('RU_CL_RP')] прибыла на нашу территорию для наблюдения редкого астрономического явления — прохождения Венеры."
 verrier.319.f: "Они высадились с ящиками линз, часов и карт. Их представители встретились с представителями университета, предложив дружескую переписку и технические брифинги. Ассистенты обсерватории любопытны, газеты нейтральны, но бдительны.\n\nНесколько ведомств обсуждают последствия: научное сотрудничество, да — но также и обмен данными, логистический суверенитет и видимость на мировой арене."
 verrier.319.g: "Пусть наука будет нашим общим языком."
 verrier.321.t: "Буря над прохождением"
 verrier.321.d: "Сильный шторм обрушился на экспедиционное судно во время перехода. Среди грохочущих волн и хаотичного такелажа несколько ящиков было сорвано с палубы и унесено в море, включая хрупкие инструменты для наблюдения за прохождением."
 verrier.321.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] цеплялся за перила, когда небо разверзлось. Море поднялось, как враг, швыряя канаты и бочки по палубе. Ящики — два из них — скользнули по ужасной дуге, прежде чем исчезнуть в черноте.\n\nПозже, когда шторм утих и осталась только тишина, был подсчитан ущерб. Главный гелиометр. Двойная линза из Кёнигсберга. Несколько точных хронометров.\n\nДоктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] стоял среди промокшего экипажа и сломанного дерева, глядя в пустоту, где было оборудование. Были запасные. Но ни один из них не был безупречным.\n\nА время — как и Венера — никого не ждёт."
 verrier.321.g: "Продолжайте. У нас всё ещё достаточно, чтобы продолжать."
 verrier.322.t: "Неожиданные огни"
 verrier.322.d: "Во время ночной калибровки звёздного поля астроном экспедиции заметил нерегулярные движения и неподвижные точки там, где их не должно было быть. Дальнейшее сравнение с имеющимися звёздными картами подтвердило это: команда, возможно, обнаружила новые, не нанесённые на карту небесные тела."
 verrier.322.f: "Корабль дрейфовал под бархатным небом. Облака рассеялись несколько часов назад, оставив после себя ясность, настолько чистую, что она казалась неестественной. Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] снова прильнул к окуляру. Там — между Альтаиром и краем сетки секстанта — было движение. Слишком медленное для кометы. Слишком устойчивое для дефекта.\n\nНочь за ночью [SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'она', 'он')] возвращался к тому же участку неба, делая наброски, вычисляя, сравнивая. Наконец, [SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'её', 'его')] записи подтвердили это: малый планетарный объект. Возможно, два. Не каталогизированных.\n\nВенера подождёт. Но звёзды уже предложили нечто иное."
 verrier.322.g: "Да будет известно: небеса всё ещё хранят тайны."
 verrier.323.t: "Сад между звёзд"
 verrier.323.d: "Во время остановки в пути экспедиционная команда отправилась вглубь страны для обследования потенциальных высотных точек для астрономических наблюдений. Вместо этого они обнаружили рощу незнакомых растений — ни одно из которых не значится в имеющихся ботанических записях."
 verrier.323.f: "Всё началось с запаха. Тонкого, цитрусово-острого, поднимающегося от папоротников на опушке леса. Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] последовал за запахом сквозь густой подлесок и нашёл поляну, где свет собирался, как вода.\n\nТам стебли глубокого фиолетового цвета цвели в идеальной спирали. Красный мох покрывал обсидианового цвета камни. Высоко над головой гроздья лиан в форме висячих звёзд качались на ветру. Никто не мог их назвать.\n\nОдин из младших ассистентов прошептал: «Похоже, небо упало на землю».\n\nОни пришли, чтобы преследовать планету Венера. Но здесь, в неподвижном воздухе и отфильтрованном свете, они нашли иное чудо."
 verrier.323.g: "Собрать образцы и сохранить их для изучения."
 verrier.324.t: "Камень вне времени"
 verrier.324.d: "Во время разведки возвышенности для наблюдений экспедиция наткнулась на место огромного геологического интереса. Окружающий камень имеет узоры и включения, редко — если вообще когда-либо — виденные ранее."
 verrier.324.f: "Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] провёл рукой по слоистой поверхности обнажения. Оно слабо мерцало в утреннем свете, расколотое прожилками металлического блеска. Вихри тёмно-зелёного цвета обвивали оранжевые кристаллические ядра, образуя узор, который казался почти преднамеренным.\n\nРядом другая плита обнаружила окаменевший пузырь — полый и всё ещё целый. Геолог в команде предположил вулканическое происхождение. Другой покачал головой: «Это старше всего, что я видел».\n\nИнструменты, которые они привезли, были созданы для наблюдения за небесами. Но здесь, в скале под их ногами, был фрагмент глубокой памяти самой Земли."
 verrier.324.g: "Эта находка принадлежит истории самой Земли."
 verrier.325.t: "Барьеры под небом"
 verrier.325.d: "Экспедиция прибыла в порт въезда — но таможенные власти отказывают в немедленном оформлении. Несколько ящиков с научным оборудованием были задержаны для досмотра, и офицеры запрашивают дополнительную документацию, которая ранее никогда не требовалась."
 verrier.325.f: "Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] стоял рядом с грузовым манифестом, стиснув зубы. Ртутные линзы, точные часы, полированный латунный корпус — они лежали без движения на складе за запертыми воротами, ожидая чернил и печатей.\n\nТаможенник был вежлив, но твёрд: «Научные или нет, все иностранные инструменты должны быть задекларированы, проверены и обложены налогом, если не освобождены по договору».\n\nНа договоры времени не было.\n\nСнаружи всё ещё вставало солнце. И Венера не будет ждать бюрократии."
 verrier.325.g: "Заплатить пошлину и ускорить оформление."
 verrier.340.t: "Обсерватория готова к прохождению Венеры"
 verrier.340.d: "После недель подготовки наблюдательный пункт для прохождения Венеры готов. Инструменты откалиброваны. Карты проверены. Единственное неизвестное теперь — это небо."
 verrier.340.f: "Купол возвышался, как маяк из латуни и тихого предназначения. Будь то построенный из камня на родной земле или из холста и заклёпок в чужой стране, теперь он вмещал затаённое ожидание. Внутри гелиометр блестел под светом лампы. Шестерни вращались с шёпотом. Таймеры тикали в предвкушении. Снаружи ассистенты сметали пыль с линз. Даже воздух, казалось, замер. Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] стоял у двери и коснулся порога. В течение нескольких месяцев всё двигалось к этому моменту. Теперь больше нечего было строить, только ждать. Над ними, где-то в невидимом небе, Венера следовала своим путём."
 verrier.340.g: "Точность начинается со спокойных рук."
 verrier.341.t: "Тихая настройка"
 verrier.341.d: "Доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName] предложил[SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'а', '')] незначительное, но существенное изменение внутреннего стабилизатора главного телескопа. Модификация может уменьшить внутреннюю вибрацию и повысить оптическую резкость в момент контакта."
 verrier.341.f: "Это произошло не в куполе, а в палатке-мастерской за ним. Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] изучал[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] карты, когда подош[SelectLocalization(ROOT.Var('tesla_engineer_var').GetCharacter.IsFemale, 'ла', 'ёл')] доктор [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName], держа в руках испачканный смазкой блокнот. Пересчитанное натяжение буфера. Пересмотренная опора для внутреннего латунного кольца.\n\nОстальные слушали с уважительным скептицизмом — пока тесты не доказали: изображение стало стабильнее на доли градуса. Достаточно, чтобы сместить границу между размытостью и чёткостью."
 verrier.341.g: "Небольшое изменение с большой точностью."
 verrier.342.t: "Уравнение чёткости"
 verrier.342.d: "Недавний прорыв в электромагнитной теории позволил применить новый метод оптической фильтрации к протоколу наблюдений телескопа. Помехи от рассеяния атмосферного света теперь можно лучше учесть, что приводит к более чётким визуальным данным."
 verrier.342.f: "Идея пришла не из купола и не со скамьи оптика, а со страницы. Это было уточнение волновых уравнений — как свет ведёт себя не просто как частица или луч, а как колеблющееся поле. С его помощью можно было предсказать новую модель интерференции и применить поправку. Фильтры были переделаны. Время экспозиции скорректировано. Инженеры перепроверили свои сомнения.\n\nКогда доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] в ту ночь посмотрел[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] в тестовую линзу, звёзды больше не дрожали. Они стояли — точные, холодные, настоящие. Небо перестало дрожать."
 verrier.342.g: "Математика обостряет зрение."
 verrier.351.t: "Прохождение 1874 года"
 verrier.351.d: "Через континенты и океаны, от Иокогамы до Реюньона, от Кергелена до Пекина, астрономы наблюдали, как планета Венера пересекает диск Солнца. Прохождение 1874 года завершено — и многие команды сообщают об успехе."
 verrier.351.f: "Они прибыли на пароходах, на верблюдах, по железной дороге и пешком. Инженеры, ботаники, картографы. Они строили обсерватории в джунглях и пустынях. Они изучали погоду, замеряли тени, полировали линзы до тех пор, пока они не дрожали в их руках.\n\nИ в течение шести часов 9 декабря 1874 года они наблюдали, как чёрная точка скользит по солнечному диску.\n\nВенера вошла, как шёпот, и вышла, как тайна. Измерения были неидеальны, но достаточны. Можно было начинать триангуляцию. Впервые человечество могло узнать истинный масштаб своей Солнечной системы — не в мифах или метафорах, а в числах, начертанных тенью. Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] закрыл[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] свой блокнот и выдохнул[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')]: всё было сделано."
 verrier.351.g: "Это прекрасно"
 verrier.352.t: "Прохождение 1882 года"
 verrier.352.d: "6 декабря 1882 года планета Венера снова прошла перед Солнцем. В последний раз в этом столетии наблюдатели по всему земному шару направили свои инструменты на небеса — и запечатлели чёрный диск Венеры в полёте."
 verrier.352.f: "На этот раз корабли отплыли раньше. Обсерватории были прочнее. Часы точнее. Уроки, извлечённые в 1874 году, направляли каждую руку, каждую тень, каждый расчёт.\n\nОт Нью-Джерси до Патагонии, от Мексики до Австралии, мир замер ради точки на Солнце.\n\nДоктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] настроил[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] последний фильтр. Диск появился — медленно скользя по пылающей белизне. Не было ни аплодисментов, только шелест перьев, щелчок затворов, безмолвное дыхание триумфа. Пройдёт ещё 121 год, прежде чем Венера вернётся. Но здесь, в этот момент, было измерено само время."
 verrier.352.g: "Мы никогда не увидим следующего."
 verrier.353.t: "Сквозь пелену света"
 verrier.353.d: "По мере приближения долгожданного момента погодные условия начинают ухудшаться. Набегают облака — не настолько плотные, чтобы скрыть всё, но достаточные, чтобы исказить чёткость и время."
 verrier.353.f: "Небо не закрылось полностью, но больше не подчинялось. Слои дрейфующих облаков растекались по солнцу, как марля. Свет тускнел и вспыхивал неравномерными импульсами. Каждая линза боролась за равновесие, каждый ассистент — за дыхание.\n\nДоктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] держал[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] глаз прикованным к фильтру. Силуэт Венеры появился — слабый, преломлённый, танцующий между паром и расчётом.\n\nЭто не была чистая дуга. Не учебное наблюдение. Но это были данные. Данные, добытые с трудом под капризным небом."
 verrier.353.g: "Если небеса дают нам кусочки, мы должны их сшить."
 verrier.354.t: "Движущаяся тень"
 verrier.354.d: "Во время прохождения Венеры команда наблюдателей запечатлела не только точные данные, но и изображения. Десятки фотографических пластин были экспонированы последовательно и позже собраны в движение. Впервые в истории прохождение планеты было записано как фильм."
 verrier.354.f: "Оно мерцает. Оно дрожит. Но оно движется. На серии обработанных пластин Венера входит с края, идеальная чёрная точка, скользящая по солнечному диску. Не просто расчёт, не эскиз — движение. Запечатлённое во времени. Доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] стоял[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] в тёмной комнате, подняв фонарь, наблюдая, как короткая последовательность повторяется снова и снова. Шесть часов измерений, сжатые в секунды чуда. Астрономы аплодировали. Зная, что они сделали что-то новое. Они заставили небеса двигаться."
 verrier.354.g: "Проанализировать кадры для улучшения моделей движения планет."
 verrier.355.t: "Марш Венеры"
 verrier.355.d: "Вдохновлённый всеобщим волнением вокруг прохождения Венеры 1882 года, [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName] написал[SelectLocalization(ROOT.Var('elgar_composer_var').GetCharacter.IsFemale, 'а', '')] новое торжественное произведение. Премьера перед широкой аудиторией, марш запечатлел как величие события, так и ритм нового научного века."
 verrier.355.f: "Через год после прохождения Венеры в 1882 году Джону Филипу Сузе было поручено сочинить процессию для открытия бронзовой статуи американского физика Джозефа Генри, умершего в 1878 году. Будучи масоном, Суза был очарован тем, что группа считала мистическими качествами в иных случаях естественных явлений. Произведение так и не прижилось при жизни Сузы. Оно не исполнялось много лет после того, как рукописные копии музыки Сузы были уничтожены во время наводнения."
 verrier.355.g: "Некоторая музыка пишется для истории, а не для толпы."
 verrier_venus_transit_modifier: "Наблюдалось прохождение Венеры"
