 verrier_astronomer: "Астроном"
 verrier_astronomer_desc: "Этот учёный занимается явлениями звёздного неба и неустанно наблюдает за [Concept('concept_verrier_astronomical_object', 'астрономическими объектами')] в телескоп."
 verrier_astronomer_experienced: "Опытный астроном"
 verrier_astronomer_experienced_desc: "Этот персонаж совершил несколько выдающихся астрономических открытий и поэтому пользуется большим уважением у публики."
 verrier_astronomer_famous: "Знаменитый астроном"
 verrier_astronomer_famous_desc: "Благодаря своим многочисленным открытиям и вкладу в лучшее понимание вселенной, этот [concept_verrier_astronomer|l] считается одним из самых уважаемых умов своего времени."
 verrier_mathematician: "Математик"
 verrier_mathematician_desc: "Этот персонаж совершил несколько выдающихся математических открытий и поэтому пользуется большим уважением у публики."
 verrier_physics_tech: "Классическая физика"
 verrier_physics_tech_desc: "Физика стала отдельной наукой, когда европейцы раннего Нового времени использовали экспериментальные и количественные методы для открытия того, что сейчас считается законами физики. Основные события этого периода включают замену геоцентрической модели Солнечной системы гелиоцентрической моделью Коперника, законы, управляющие движением планетных тел (определённые Кеплером между 1609 и 1619 годами), новаторскую работу Галилея по телескопам и наблюдательной астрономии в XVI и XVII веках, а также открытие и объединение Исааком Ньютоном законов движения и всемирного тяготения (которые впоследствии получили его имя)."
 verrier_astronomy_tech: "Современная астрономия"
 verrier_astronomy_tech_desc: "В XVIII-XIX веках изучение задачи трёх тел Леонардом Эйлером, Алексисом Клодом Клеро и Жаном ле Роном д'Аламбером привело к более точным предсказаниям движений Луны и планет. Эта работа была далее уточнена Жозефом-Луи Лагранжем и Пьером-Симоном Лапласом, что позволило оценить массы планет и лун по их возмущениям."
 verrier_electromagnetism_tech: "Электромагнетизм"
 verrier_electromagnetism_tech_desc: "В 1864 году Джеймс Клерк Максвелл из Эдинбурга объявил о своей электромагнитной теории света, что, возможно, стало величайшим шагом в мировом знании об электричестве. Электромагнитная теория света Максвелла, очевидно, подразумевала существование электрических волн в свободном пространстве, и его последователи поставили перед собой задачу экспериментально доказать истинность теории. Открытие электромагнитных волн в пространстве привело к развитию радио в последние годы XIX века."
 verrier_chemistry_tech_desc: "Развитие электрохимической теории химических соединений произошло в начале XIX века в результате работ двух учёных, в частности, Йёнса Якоба Берцелиуса и Гемфри Дэви, что стало возможным благодаря предшествующему изобретению вольтова столба Алессандро Вольтой. Британский учёный Уильям Праут первым предложил упорядочить все элементы по их атомному весу, поскольку все атомы имели вес, который был точным кратным атомного веса водорода. Дж. А. Р. Ньюлендс разработал раннюю таблицу элементов, которая затем была развита в современную периодическую систему элементов."
 je_verrier_neptune: "Неизвестная планета"
 je_verrier_neptune_reason: "В 1821 году Алексис Бувар опубликовал астрономические таблицы орбиты Урана, делая предсказания будущих положений на основе законов движения и гравитации Ньютона. Последующие наблюдения выявили существенные отклонения от таблиц, что привело Бувара к гипотезе о некоем возмущающем теле. Эти неровности, как в эклиптической долготе планеты, так и в её радиус-векторе (расстоянии от Солнца), могли быть объяснены несколькими гипотезами: влияние гравитации Солнца на таком большом расстоянии могло отличаться от описания Ньютона; или расхождения могли быть просто ошибкой наблюдения; или, возможно, Уран притягивался или возмущался неоткрытой планетой. Джон Кауч Адамс узнал об этих неровностях ещё будучи студентом и убедился в гипотезе о возмущении. Адамс считал, что он может использовать наблюдаемые данные об Уране и закон гравитации Ньютона для выведения массы, положения и орбиты возмущающего тела. Тем временем, 10 ноября 1845 года, Урбен Леверье представил в Академии наук в Париже мемуар об Уране и показал, что существующая теория не объясняет его движение. Не зная о работе Адамса, он предпринял аналогичное исследование, и 1 июня 1846 года во втором мемуаре, представленном на открытом заседании Академии, он указал положение, но не массу или орбиту предполагаемого возмущающего тела. Леверье определил местоположение неизвестной планеты с точностью до одного градуса от её фактического положения. Леверье не знал, что его публичное подтверждение частных расчётов Адамса положило начало британским поискам предполагаемой планеты. 31 августа Леверье представил третий мемуар, теперь уже с указанием массы и орбиты нового тела. Теперь оставалось только найти небесное тело и тем самым доказать его существование."
 je_verrier_neptune_fail: "Нация со вторым по величине количеством [Concept('concept_verrier_astronomical_object', 'астрономических объектов')] получит утешительный приз. Усилия всех остальных будут напрасны."
 je_verrier_pluto: "Планета X"
 je_verrier_pluto_reason: "В 1840-х годах Урбен Леверье использовал ньютоновскую механику для предсказания положения тогда ещё неоткрытой планеты Нептун после анализа возмущений в орбите Урана. Последующие наблюдения Нептуна в конце XIX века заставили астрономов предположить, что орбита Урана возмущается ещё одной планетой, помимо Нептуна. В 1906 году Персиваль Лоуэлл — богатый бостонец, основавший обсерваторию Лоуэлла во Флагстаффе, штат Аризона, в 1894 году — начал обширный проект по поиску возможной неизвестной планеты, которую он назвал «Планета X». К 1909 году Лоуэлл и Уильям Г. Пикеринг предложили несколько возможных небесных координат для такой планеты. Лоуэлл и его обсерватория вели поиски до его смерти в 1916 году, но безуспешно. Лоуэлл не знал, что в его обзорах 19 и 7 апреля 1915 года были запечатлены два тусклых изображения Планеты X, но они не были распознаны. Вдова Персиваля, Констанс Лоуэлл, вступила в десятилетнюю судебную тяжбу с обсерваторией Лоуэлла за наследие своего мужа, и поиски Планеты X возобновились только в 1929 году. Весто Мелвин Слайфер, директор обсерватории, поручил задачу по поиску Планеты X 23-летнему Клайду Томбо, который только что прибыл в обсерваторию после того, как Слайфер был впечатлён образцом его астрономических рисунков. Задачей Томбо было систематически фотографировать ночное небо парами фотографий, затем изучать каждую пару и определять, сместились ли какие-либо объекты. Используя блинк-компаратор, он быстро переключался между видами каждой из пластин, чтобы создать иллюзию движения любых объектов, изменивших своё положение или внешний вид между фотографиями. 18 февраля 1930 года, после почти года поисков, Томбо обнаружил возможный движущийся объект на фотографических пластинах."
 je_verrier_pluto_fail: "Если другая нация выполнит требования раньше нас и откроет Планету X, все наши усилия будут напрасны."
 je_verrier_charter_moon: "Составить карту Луны"
 je_verrier_charter_moon_reason: "Селенография — это изучение поверхности и физических особенностей Луны (также известное как география Луны или селенодезия). Подобно географии и ареографии, селенография является поддисциплиной в области планетологии. Исторически основной задачей селенографов было картографирование и наименование лунной поверхности, определение морей, кратеров, горных хребтов и других различных особенностей. Лунное картографирование стало систематическим в 1779 году, когда Иоганн Шрётер начал скрупулёзные наблюдения и измерения лунной топографии. В 1834 году Иоганн Генрих фон Медлер опубликовал первую большую картографию (карту) Луны, состоящую из 4 листов, а затем опубликовал «Всеобщую селенографию». Все лунные измерения основывались на прямых наблюдениях до марта 1840 года, когда Дж. У. Дрейпер, используя 5-дюймовый рефлектор, сделал дагерротип Луны и тем самым ввёл фотографию в астрономию. Сначала изображения были очень низкого качества, но, как и в случае с телескопом 200 лет назад, их качество быстро улучшалось. К 1890 году лунная фотография стала признанной поддисциплиной астрономии."
 je_verrier_charter_moon_success: "Собрав #G 10#! @verrier_moon_photo! #T [Concept('concept_verrier_moon_photo', 'фотографий Луны')]#!, мы сможем создать карту Луны."
