 ACHIEVEMENT_verrier_gmt: "Это Гринвич... верно?"
 ACHIEVEMENT_DESC_verrier_gmt: "Убедитесь, что нулевой меридиан совпадает с вашей обсерваторией."
 verrier.171.t: "Железнодорожное время"
 verrier.171.d: "Появление новых технологий не только изменило чувство времени у людей, но и выявило его ограничения. С появлением железных дорог и телеграфа люди всё больше осознают, что время не везде одинаково."
 verrier.171.f: "В начале XIX века не существовало единого стандартного времени во всём мире. Каждый город и деревня следовали местному солнечному времени, которое определялось по наивысшей точке солнца в данном месте. Эта практика была беспроблемной на протяжении веков, пока путешествия и связь были относительно медленными. Однако быстрый рост связей между отдалёнными местами привёл к всё более заметным разницам во времени: между Лондоном и Бристолем, например, разница составляла около 11 минут, а между Нью-Йорком и Чикаго — почти час. Это множество местных времён создавало серьёзную проблему для расписаний, которые должны были координировать точное время отправления и прибытия.\n\nВ ответ на это железнодорожные компании в Великобритании с 1840-х годов разработали систему, известную как железнодорожное время. Изначально это время было только для внутреннего пользования; вокзальные часы продолжали показывать местное время. Но практическое преимущество стандартизации возобладало. Уже в 1847 году почти все крупные железнодорожные компании приняли GMT в качестве обязательного времени для своих расписаний, а к 1855 году почти все британские города адаптировались. Таким образом, железнодорожное время стало де-факто национальным стандартным временем, хотя для этого не было никакой юридической основы."
 verrier.171.g: "Время устанавливают железнодорожные компании и телеграфные станции?"
 verrier.172.t: "Стандартное время"
 verrier.172.d: "С принятием закона о стандартизации времени в [GetPlayer.GetAltNameNoFlag('RU_CL_PP')] прежняя система исчисления времени, ранее использовавшаяся только железнодорожными компаниями и телеграфными постами, теперь стала частью повседневной жизни. Процесс рационализации повышает эффективность в экономике и бюрократии, хотя некоторые города скорбят по своему местному времени."
 verrier.172.f: "Железнодорожное время было лишь прагматичным предшественником более поздних национальных стандартных времён. Оно возникло из деловой необходимости, а не из правительственной инициативы. Лишь позже многие страны законодательно установили национальное стандартное время, которое стало обязательным не только для железнодорожных расписаний, но и для всех сфер общества. Великобритания сделала это в 1880 году, Германия последовала в 1893 году с введением центральноевропейского времени, а Франция, наконец, в 1911 году с приведением в соответствие со средним временем по Гринвичу плюс один час.\n\nКлючевое различие между железнодорожным временем и стандартным временем заключается в их охвате и обязательности: железнодорожное время было отраслевым решением, которое первоначально только упорядочивало железнодорожные операции, в то время как национальное стандартное время представляло собой введённую правительством и всеобъемлющую стандартизацию времени. Оба события также были косвенно связаны с последующим установлением нулевого меридиана на Международной меридианной конференции 1884 года."
 verrier.172.g: "Макс Вебер, безусловно, имел бы что сказать об этом развитии."
 verrier.173.t: "Международная меридианная конференция"
 verrier.173.d: "На конференции в городе [ROOT.GetCountry.GetCapital.GetCityHubName] в присутствии представителей нескольких стран было решено, что нулевой меридиан должен проходить через [GetGlobalVariable('verrier_prime_meridian_global_var').GetCountry.GetName]. Люди уже говорят о «среднем времени по [GetPlayer.GetCustom('verrier_prime_meridian_city')]»."
 verrier.173.f: "Международная меридианная конференция была конференцией для определения нулевого меридиана для международного использования. Предметом обсуждения был выбор «меридиана, который будет использоваться как общий ноль долготы и стандарт исчисления времени во всём мире». Исторически она привела к рекомендации Гринвичского меридиана в качестве международного стандарта для нулевого градуса долготы. Однако введение нулевого меридиана было уже не чисто картографическим, а началом международного соглашения о часовых поясах, которые должны были ориентироваться на определённую точку.\n\nИсторическое преобладание Гринвича было в первую очередь обусловлено статусом Великобритании как великой державы и её доминированием в торговле. Власть, физические технологии, лидерство на рынке торгового флота, успешная прокладка трансатлантического кабеля, помощь компании в телеграфии или железнодорожных вопросах, а также хороший астроном — всё это играет роль в определении страны, через которую проходит нулевой меридиан."
 verrier.173.g: "Можно ли интернационализировать время?"
 verrier.174.t: "Часовые пояса"
 verrier.174.d: "После установления [GetPlayer.GetCustom('verrier_prime_meridian_city')] в качестве нулевого меридиана и среднего времени по [GetPlayer.GetCustom('verrier_prime_meridian_city')] в качестве эталонного времени, в центре внимания Международной меридианной конференции находится определение часовых поясов."
 verrier.174.f: "Разделение на часовые пояса устраивало не каждую страну. В то время как США легко приняли концепцию нации, разделённой на четыре зоны, это было не так для всех. Некоторые придерживались всеобъемлющего, ориентированного на столицу часового пояса для всей страны, хотя это приводило к проблематичным искажениям времени на границах. В некоторых случаях использовалось получасовое время вместо округления до ближайшего часа, чтобы лучше соответствовать конкретным временным потребностям нации. Некоторые государства даже выбрали часовой пояс, который отличается от их фактического часового пояса."
 verrier.174.g: "Мы в первую очередь основываемся на международных стандартах."
 verrier.174.h: "[GetPlayer.GetName] в первую очередь нуждается в часовом поясе, который выгоден ей, даже если он не полностью вписывается в международную концепцию."
 verrier_radioactivity_tech: "Радиоактивность"
 verrier_radioactivity_tech_desc: "Естественная радиоактивность была открыта в 1895 году Анри Беккерелем на основе почернения фотографической пластинки, но как физическое явление она была должным образом классифицирована только около 1915 года. Важные открытия, первоначально сделанные в основном Пьером и Марией Кюри, включали существование различных радиоактивных элементов, некоторые из которых также образуются в процессе. Беккерель и супруги Кюри получили Нобелевскую премию по физике в 1903 году за свои эксперименты по радиоактивности, которые можно считать историческим началом ядерных исследований."
 verrier_spectroscopy_tech: "Спектроскопия"
 verrier_spectroscopy_tech_desc: "Спектроскопия относится к группе физических методов, которые анализируют излучение по определённым свойствам, таким как длина волны, энергия, масса и т. д. Результирующее распределение интенсивности называется спектром. После изобретения спектроскопа Роберт Бунзен и Густав Кирхгоф открыли новые элементы, наблюдая их эмиссионные спектры."