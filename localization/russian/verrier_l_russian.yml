 verrier.501.t: "Спутник открыт другой нацией"
 verrier.501.d: "К сожалению, другая нация нашла [Concept('concept_verrier_satellite', 'спутник')], который намеревался открыть доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]. Новость уже во всех газетах."
 verrier.501.f: "«Видеть — это в некотором роде искусство, которому нужно учиться». — Уильям Гершель"
 verrier.501.g: "Разочаровывающе."
 verrier.511.t: "Открыт Деймос"
 verrier.511.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] завешает свои поиски с успехом: он[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] открыл[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] ранее неизвестный спутник на орбите Марса! Небесное тело получило название #YELLOW Деймос#!."
 verrier.511.f: "«Я повторил исследование в начале ночи 11-го (августа 1877 года) и снова ничего не нашёл, но, попробовав ещё раз через несколько часов, я нашёл слабый объект с восточной стороны и немного к северу от планеты. У меня едва хватило времени, чтобы зафиксировать его положение, когда туман с реки прекратил работу. Это было в половине третьего ночи 11-го. Несколько дней стояла облачная погода. 16 августа объект был снова найден с восточной стороны планеты, и наблюдения той ночи показали, что он движется вместе с планетой и, если это спутник, находится вблизи одной из своих элонгаций. До этого времени я никому в обсерватории не говорил о своих поисках спутника Марса, но, покидая обсерваторию после этих наблюдений 16-го, около трёх часов ночи, я сказал своему ассистенту, Джорджу Андерсону, которому я показал объект, что, по-моему, я открыл спутник Марса». — Асаф Холл"
 verrier.511.g: "Ещё один спутник в нашей коллекции."
 verrier.512.t: "Открыт Фобос"
 verrier.512.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] завешает свои поиски с успехом: он[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] открыл[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] ранее неизвестный спутник на орбите Марса! Небесное тело получило название #YELLOW Фобос#!."
 verrier.512.f: "«17 августа (1877 года) между часом и двумя, когда я обрабатывал свои наблюдения, профессор Ньюкомб зашёл в мою комнату пообедать, и я показал ему свои измерения слабого объекта возле Марса, которые доказывали, что он движется вместе с планетой. 17 августа, пока я ждал и наблюдал за внешним спутником, был открыт внутренний. Наблюдения 17-го и 18-го не оставили сомнений в характере этих объектов, и открытие было публично объявлено адмиралом Роджерсом». — Асаф Холл"
 verrier.521.t: "Открыта Амальтея"
 verrier.521.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] завешает свои поиски с успехом: он[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] открыл[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] ранее неизвестный спутник на орбите Юпитера! Небесное тело получило название #YELLOW Амальтея#!."
 verrier.521.f: "Амальтея была открыта 9 сентября 1892 года с помощью 91-сантиметрового телескопа из обсерватории Лик на горе Гамильтон (Калифорния, США) астрономом Эдвардом Э. Барнардом во время систематических поисков дополнительных спутников Юпитера. Это был пятый спутник Юпитера, открытый после первого наблюдения четырёх галилеевых спутников в 1610 году. Будучи пятым открытым спутником Юпитера, Амальтея систематически называлась Юпитер V, поскольку римская цифра V представляет число 5. Французский астроном Камиль Фламмарион предложил назвать спутник Амальтея, поэтому это имя неофициально использовалось десятилетиями, пока не было официально принято."
 verrier.522.t: "Открыта Гималия"
 verrier.522.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] завешает свои поиски с успехом: он[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] открыл[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] ранее неизвестный спутник на орбите Юпитера! Небесное тело получило название #YELLOW Гималия#!."
 verrier.522.f: "Гималия — самый большой из внешних или нерегулярных спутников планеты Юпитер. Гималия была открыта 3 декабря 1904 года астрономом Чарльзом Диллоном Перрайном в обсерватории Лик (Сан-Хосе, Калифорния). Спутник был назван в честь нимфы Гималии, возлюбленной Зевса из греческой мифологии."
 verrier.523.t: "Открыта Элара"
 verrier.523.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] завешает свои поиски с успехом: он[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] открыл[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] ранее неизвестный спутник на орбите Юпитера! Небесное тело получило название #YELLOW Элара#!."
 verrier.523.f: "Элара была открыта 2 января 1905 года астрономом Чарльзом Диллоном Перрайном в обсерватории Лик (Сан-Хосе, Калифорния). Это второй по величине из внешних или нерегулярных спутников и восьмой по величине спутник планеты Юпитер. Спутник был назван в честь Элары, возлюбленной Зевса из греческой мифологии."
 verrier.524.t: "Открыта Пасифе"
 verrier.524.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] завешает свои поиски с успехом: он[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] открыл[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] ранее неизвестный спутник на орбите Юпитера! Небесное тело получило название #YELLOW Пасифе#!."
 verrier.524.f: "Пасифе была открыта 27 января 1908 года астрономом Филибером Жаком Мелоттом. Впервые она была обнаружена на фотографических пластинах, экспонированных в Королевской Гринвичской обсерватории (Англия) в ночь на 28 февраля 1908 года. Изучение других пластин показало, что объект был зафиксирован уже 27 января. Поскольку сначала было неясно, астероид это или спутник, ему было присвоено временное астероидное обозначение 1908 CJ. 10 апреля открытие восьмого спутника у Юпитера было окончательно подтверждено. Спутник был назван в честь Пасифаи, жены Миноса и матери Минотавра из греческой мифологии. Пасифе является тёзкой группы спутников Юпитера, которые движутся по схожим орбитам. Группа Пасифе состоит из тринадцати членов, причём Пасифе — самый крупный."
 verrier.525.t: "Открыта Синопе"
 verrier.525.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] завешает свои поиски с успехом: он[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] открыл[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] ранее неизвестный спутник на орбите Юпитера! Небесное тело получило название #YELLOW Синопе#!."
 verrier.525.f: "Синопе была открыта 1 июля 1914 года астрономом Сетом Барнсом Николсоном в обсерватории Лик. Спутник был назван в честь Синопы, нимфы из греческой мифологии, которую домогался Зевс и похитил Аполлон. Синопе отнесена к группе Пасифе из-за своих орбитальных свойств."
 verrier.526.t: "Открыта Лиситея"
 verrier.526.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] завешает свои поиски с успехом: он[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] открыл[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] ранее неизвестный спутник на орбите Юпитера! Небесное тело получило название #YELLOW Лиситея#!."
 verrier.526.f: "Лиситея была открыта 6 июля 1938 года астрономом Сетом Барнсом Николсоном в обсерватории Маунт-Вилсон. Спутник был назван в честь Лиситеи, возлюбленной Зевса из греческой мифологии. Из-за своих орбитальных свойств он отнесён к группе Гималии, названной в честь спутника Юпитера Гималии."
 verrier.527.t: "Открыта Карме"
 verrier.527.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] завешает свои поиски с успехом: он[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] открыл[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] ранее неизвестный спутник на орбите Юпитера! Небесное тело получило название #YELLOW Карме#!."
 verrier.527.f: "Карме была открыта 30 июля 1938 года астрономом Сетом Барнсом Николсоном в обсерватории Маунт-Вилсон в Калифорнии. Николсон фотографировал Юпитер с 5 по 25 августа, и Карме была видна на фотографической пластине, экспонированной 30 июля. Об открытии нового спутника у Юпитера было объявлено в конце августа того же года. Спутник был назван в честь Карме, возлюбленной Зевса из греческой мифологии."
 verrier.531.t: "Открыт Энцелад"
 verrier.531.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] завешает свои поиски с успехом: он[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] открыл[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] ранее неизвестный спутник на орбите Сатурна! Небесное тело получило название #YELLOW Энцелад#!."
 verrier.531.f: "Энцелад был открыт 28 августа 1789 года немецко-британским астрономом Вильгельмом Гершелем. Энцелад — шестой открытый спутник Сатурна и двенадцатый открытый спутник (кроме Луны Земли) во всей Солнечной системе. Из-за своей орбиты, второй по близости к Сатурну на тот момент, он был классифицирован как второй самый внутренний из семи известных на тот момент больших спутников Сатурна. Спутник был назван в честь гиганта Онкеладоса (латинская форма: Энцелад) из греческой мифологии. Название Энцелад, а также названия семи других спутников Сатурна, были предложены сыном Вильгельма Гершеля, астрономом Джоном Гершелем."
 verrier.532.t: "Открыт Мимас"
 verrier.532.d: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] завешает свои поиски с успехом: он[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] открыл[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] ранее неизвестный спутник на орбите Сатурна! Небесное тело получило название #YELLOW Мимас#!."
 verrier.532.f: "«Я постоянно продолжал свои наблюдения, когда позволяла погода; и большой свет сорокафутового зеркала теперь был так полезен, что я также 17 сентября обнаружил седьмой спутник, когда он находился в своей наибольшей предшествующей элонгации». — Уильям Гершель"
 verrier.533.t: "Открыт Гиперион"
 verrier.533.d: "Многомесячные поиски увенчались успехом: [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'открыла', 'открыл')] ранее неизвестный спутник на орбите Сатурна! Небесное тело получило название #YELLOW Гиперион#!."
 verrier.533.f: "Гиперион был независимо открыт Уильямом Крэнчем Бондом и его сыном Джорджем Филлипсом Бондом в Соединённых Штатах, и Уильямом Ласселлом в Соединённом Королевстве в сентябре 1848 года. Спутник назван в честь титана Гипериона, бога бдительности и наблюдения, и старшего брата Кроноса (греческого эквивалента римского бога Сатурна)."
 verrier.534.t: "Открыта Феба"
 verrier.534.d: "Многомесячные поиски увенчались успехом: [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'открыла', 'открыл')] ранее неизвестный спутник на орбите Сатурна! Небесное тело получило название #YELLOW Феба#!."
 verrier.534.f: "Феба была открыта Уильямом Генри Пикерингом 18 марта 1899 года по фотографическим пластинам, сделанным начиная с 16 августа 1898 года в обсерватории Бойдена близ Арекипы, Перу, Делайлом Стюартом. Это был первый спутник, открытый фотографически. Феба названа в честь Фебы, титаниды в греческой мифологии, связанной с Луной, которая была сестрой Кроноса. «В 1900 году даже я, — заявил Пикеринг, — начал задаваться вопросом, не были ли четыре изображения 1898 года, в конце концов, дефектами или слабыми звёздами, появившимися по любопытному совпадению». Однако Пикеринг снова нашёл Фебу. Он считал, что открыл десятый спутник Сатурна в 1905 году по пластинам, сделанным в 1904 году, который он назвал «Фемида». За это открытие он был награждён премией Лаланда Французской академии наук в 1905 году. Позже было показано, что «Фемида» не существует."
 verrier.541.t: "Открыта Титания"
 verrier.541.d: "Многомесячные поиски увенчались успехом: [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'открыла', 'открыл')] ранее неизвестный спутник на орбите Урана! Небесное тело получило название #YELLOW Титания#!."
 verrier.541.f: "Титания — самый большой спутник Урана и восьмой по величине спутник в Солнечной системе. Он был открыт Уильямом Гершелем 11 января 1787 года, в тот же день, когда он открыл второй по величине спутник Урана, Оберон. Позже он сообщил об открытии ещё четырёх спутников, хотя впоследствии они оказались ложными. В течение почти следующих 50 лет Титания и Оберон не наблюдались ни одним инструментом, кроме телескопа Уильяма Гершеля, хотя спутник можно увидеть с Земли с помощью современного высококлассного любительского телескопа. Все спутники Урана названы в честь персонажей, созданных Уильямом Шекспиром или Александром Поупом. Название Титания было взято у королевы фей из «Сна в летнюю ночь»."
 verrier.542.t: "Открыт Оберон"
 verrier.542.d: "Многомесячные поиски увенчались успехом: [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'открыла', 'открыл')] ранее неизвестный спутник на орбите Урана! Небесное тело получило название #YELLOW Оберон#!."
 verrier.542.f: "Оберон — самый дальний и второй по величине спутник Урана. Это второй по массе спутник Урана и десятый по массе спутник в Солнечной системе. Оберон был открыт Уильямом Гершелем 11 января 1787 года, в тот же день, когда он открыл самый большой спутник Урана, Титанию. Позже он сообщил об открытии ещё четырёх спутников, хотя впоследствии они оказались ложными. В течение почти следующих 50 лет Титания и Оберон не наблюдались ни одним инструментом, кроме телескопа Уильяма Гершеля, хотя спутник можно увидеть с Земли с помощью современного высококлассного любительского телескопа. Все спутники Урана названы в честь персонажей, созданных Уильямом Шекспиром или Александром Поупом. Название Оберон было взято у Оберона, короля фей из «Сна в летнюю ночь»."
 verrier.543.t: "Открыт Ариэль"
 verrier.543.d: "Многомесячные поиски увенчались успехом: [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'открыла', 'открыл')] ранее неизвестный спутник на орбите Урана! Небесное тело получило название #YELLOW Ариэль#!."
 verrier.543.f: "Спутник Ариэль — самый яркий и четвёртый по величине из известных спутников планеты Уран. Ариэль и Умбриэль были открыты 24 октября 1851 года как третий и четвёртый спутники Урана британским астрономом Уильямом Ласселлом с помощью 60-сантиметрового рефлекторного телескопа в самодельной обсерватории в Ливерпуле. Спутник был назван в честь сильфа из эпической поэмы Александра Поупа «Похищение локона»."
 verrier.544.t: "Открыт Умбриэль"
 verrier.544.d: "Многомесячные поиски увенчались успехом: [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'открыла', 'открыл')] ранее неизвестный спутник на орбите Урана! Небесное тело получило название #YELLOW Умбриэль#!."
 verrier.544.f: "Умбриэль — третий по величине спутник Урана. Он был открыт 24 октября 1851 года Уильямом Ласселлом. Он был открыт одновременно с Ариэлем и назван в честь персонажа из поэмы Александра Поупа 1712 года «Похищение локона». Хотя Уильям Гершель, первооткрыватель Титании и Оберона, в конце XVIII века утверждал, что наблюдал ещё четыре спутника Урана, его наблюдения не были подтверждены, и эти четыре объекта теперь считаются ложными."
 verrier.545.t: "Открыта Миранда"
 verrier.545.d: "Многомесячные поиски увенчались успехом: [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'открыла', 'открыл')] ранее неизвестный спутник на орбите Урана! Небесное тело получило название #YELLOW Миранда#!."
 verrier.545.f: "Миранда была открыта 16 февраля 1948 года планетарным астрономом Джерардом Койпером с помощью 82-дюймового (2080 мм) телескопа Отто Струве в обсерватории Мак-Доналд. Её движение вокруг Урана было подтверждено 1 марта 1948 года. Это был первый спутник Урана, открытый почти за 100 лет. Койпер решил назвать объект «Миранда» в честь персонажа из «Бури» Шекспира, потому что четыре ранее открытых спутника Урана, Ариэль, Умбриэль, Титания и Оберон, все были названы в честь персонажей Шекспира или Александра Поупа. Однако предыдущие спутники были названы специально в честь фей, в то время как Миранда была человеком."
 verrier.551.t: "Открыт Тритон"
 verrier.551.d: "Вскоре после открытия Нептуна [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'открыла', 'открыл')] ранее неизвестный спутник на орбите Нептуна! Небесное тело получило название #YELLOW Тритон#!."
 verrier.551.f: "Тритон — самый большой естественный спутник планеты Нептун. Это единственный спутник Нептуна, достаточно массивный, чтобы быть округлым под действием собственной гравитации, и имеющий тонкую, но хорошо структурированную атмосферу. Тритон вращается вокруг Нептуна по ретроградной орбите — орбите в направлении, противоположном вращению родительской планеты — единственный крупный спутник в Солнечной системе, делающий это. Тритон был открыт британским астрономом Уильямом Ласселлом 10 октября 1846 года, всего через 17 дней после открытия Нептуна. Когда Джон Гершель получил известие об открытии Нептуна, он написал Ласселлу, предложив ему поискать возможные спутники. Ласселл открыл Тритон восемь дней спустя. Пивовар по профессии, Ласселл заметил Тритон с помощью своего самодельного 61-сантиметрового (24 дюйма) рефлекторного телескопа с металлическим зеркалом (также известного как «двухфутовый» рефлектор). Тритон назван в честь греческого морского бога Тритона, сына Посейдона (греческого бога, соответствующего римскому Нептуну)."
 verrier.552.t: "Открыта Нереида"
 verrier.552.d: "Многомесячные поиски увенчались успехом: [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'открыла', 'открыл')] ранее неизвестный спутник на орбите Нептуна! Небесное тело получило название #YELLOW Нереида#!."
 verrier.552.f: "Нереида — третий по величине спутник Нептуна. Она была открыта 1 мая 1949 года Джерардом П. Койпером с помощью фотографических пластин, сделанных 82-дюймовым телескопом в обсерватории Мак-Доналд. Он предложил это название в отчёте о своём открытии. Она названа в честь нереид, морских нимф греческой мифологии и спутниц бога Нептуна. Это был второй и последний спутник Нептуна, открытый до прибытия «Вояджера-2»."
 verrier.49.t: "Солнечные пятна"
 verrier.49.d: "Исследователи в нашей обсерватории наблюдали необычную солнечную активность, связанную с солнечными пятнами."
 verrier.49.f: "Солнечные пятна — это тёмные пятна на видимой поверхности Солнца (фотосфере), которые холоднее и поэтому излучают меньше видимого света, чем остальная поверхность. Их количество и размер составляют простейшую меру так называемой солнечной активности. Частота солнечных пятен имеет периодичность в среднем одиннадцать лет, что называется циклом солнечных пятен. Причиной пятен и извержений, происходящих рядом с ними, являются сильные магнитные поля, которые в некоторых областях препятствуют переносу тепла изнутри на поверхность Солнца. Было обнаружено несколько неизвестных пятен."
 verrier.49.g: "Увлекательно!"
