 verrier_neptune_academic_synergies_button_desc: "Сосредоточив науку полностью на поиске неизвестной планеты, мы можем добиться гораздо более быстрого успеха и тем самым обогнать наших конкурентов. Это, конечно, повлияет на другие академические отрасли в наших технических университетах. Если мы в данный момент продвигаем [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')], это также ускорит его финансирование."
 verrier_neptune_star_chart_tt: "Союзная нация должна была найти не менее #G 5#! @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object', 'астрономических объектов')]."
 verrier.142.t: "Солнечная вспышка"
 verrier.142.d: "Наблюдая за солнечными вспышками, [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName] заметил[SelectLocalization(GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] очень необычное явление. Если его теория верна, то к Земле мчится солнечная буря. С одной стороны, это сенсация революционного научного значения. Однако это также может быть опасно."
 verrier.142.f: "Солнечная вспышка — это структура повышенного излучения в хромосфере Солнца, которая питается энергией магнитного поля. Спектр поглощения области вспышки обычно показывает гелий и кальций в дополнение к водороду. Области излучают повышенное коротковолновое излучение в ультрафиолетовом и рентгеновском диапазонах, а также протоны, электроны и ионы. На Земле это вызывает возмущения в ионосфере с соответствующими нарушениями в радиосвязи. Когда частицы попадают в атмосферу Земли, они вызывают магнитные бури. Ионосферные бури возникают, когда частицы, медленно проникающие в зоны полярных сияний, вызывают видимость полярных сияний ночью, а сильно колеблющиеся электрические токи вызывают геомагнитные возмущения."
 verrier.142.g: "Что это значит, профессор?"
 verrier.143.t: "[SCOPE.sCharacter('verrier_carrington_discoverer').GetLastName]: событие"
 verrier.143.d: "Магнитная буря обрушилась на Землю! Это уникальное природное явление привело к тому, что северное сияние было видно даже в Риме, Гаване и Китае. Люди поражены этим небесным зрелищем. По-видимому, это как-то связано с солнечной вспышкой, которую обнаружил[SelectLocalization(SCOPE.sCharacter('verrier_carrington_discoverer').GetCharacter.IsFemale, 'а', '')] [concept_verrier_astronomer] [SCOPE.sCharacter('verrier_carrington_discoverer').GetFullName]."
 verrier.143.f: "С 28 августа по 4 сентября 1859 года произошло несколько мощных солнечных вспышек, которые, в частности, наблюдал астроном Ричард Кэррингтон. Вещество, выброшенное в результате корональных выбросов массы, имело скорость более 2000 км/с. Оно достигло Земли примерно через 17,5 часов. Самая мощная геомагнитная буря на сегодняшний день была зафиксирована в ночь с 1 на 2 сентября. Полярные сияния наблюдались по всему миру как в северном, так и в южном полушариях. Сияние над Скалистыми горами в США было настолько ярким, что свечение разбудило золотоискателей, которые начали готовить завтрак, думая, что наступило утро. Люди на северо-востоке США могли читать газету при свете сияния. Сияние было видно от полюсов до низких широт, таких как южно-центральная Мексика, Куба, Гавайи, Квинсленд, южная Япония и Китай, и даже на ещё более низких широтах, очень близко к экватору, например, в Колумбии."
 verrier.143.g: "Это ужасно и фантастически одновременно."
 verrier.144.t: "Телеграфная система рушится"
 verrier.144.d: "Из-за геомагнитно-индуцированного тока от электромагнитного поля телеграфные системы по всей Европе и Северной Америке вышли из строя, в некоторых случаях операторы получали удары током. В телеграфных линиях индуцировались такие высокие напряжения, что бумажные ленты в приёмниках загорались от искр. Некоторые операторы могли продолжать отправлять и получать сообщения, несмотря на отключение своих источников питания."
 verrier.144.f: "Оператор из Бостона (оператору из Портленда): «Пожалуйста, полностью отключите свою батарею на пятнадцать минут».\nОператор из Портленда: «Сделаю. Сейчас отключено».\nБостон: «Моя отключена, и мы работаем на полярном токе. Как вы принимаете моё письмо?»\nПортленд: «Лучше, чем с включёнными батареями. Ток приходит и уходит постепенно».\nБостон: «Мой ток временами очень сильный, и мы можем работать лучше без батарей, так как полярное сияние, кажется, поочерёдно нейтрализует и усиливает наши батареи, делая ток временами слишком сильным для наших релейных магнитов. Предположим, мы будем работать без батарей, пока нас затрагивает эта проблема».\nПортленд: «Очень хорошо. Мне продолжать работу?»\nБостон: «Да. Продолжайте»."
 verrier.144.g: "Телеграфы работают без электричества?! Это совершенно невозможно!"
 verrier.9010.t: "Звук науки"
 verrier.9010.d: "Профессор в университете города [SCOPE.sState('sound_of_science_state').GetCityHubName] продемонстрировал справедливость теории #variable Кристиана Доплера#! о том, что наблюдаемая частота звука или света меняется, если движется либо источник, либо наблюдатель."
 verrier.9010.f: "Гоночный поезд, ревущий медный рожок и дюжина ушей с абсолютным слухом собрались на железной дороге #bold #variable [SCOPE.sState('sound_of_science_state').GetFarmHubName]—[SCOPE.sState('sound_of_science_state').GetCityHubName]#!#! для творческого эксперимента. На кону? Теория Доплера о движении звёзд. Ибо если теория о том, что частота волны меняется со скоростью объекта, верна, то при проезде поезда мимо зрителей должно наблюдаться заметное падение высоты тона от ревущего рожка.\nОтобранные за свою способность слышать даже 1/8 разницы в высоте тона, зрители тщательно записывают свои наблюдения, пока поезд мчится мимо. Теперь, после 3 дней подсчётов, результаты готовы... И... Единогласно зафиксировано падение высоты тона!"
 verrier.9010.g: "Наблюдение и эксперимент — основа знания."
 verrier.9010.h: "Нельзя знать, как неожиданно новая истина может найти своё применение."
 verrier_sound_of_science_prestige_modifier: "Звук науки"
 verrier_sound_of_science_tech_spread_modifier: "Звук науки"
 je_verrier_uranus: "Ещё одна планета?"
 je_verrier_uranus_reason: "Может ли быть, что там есть ещё одна планета? Веками было всего 6 планет, но с недавними усовершенствованиями телескопов вполне возможно, что мы найдём ещё одну. И почему останавливаться на 7, может быть, их даже больше! Нахождение большего количества планет может даже помочь разгадать тайны вселенной.\n\n#b Исторический контекст:#! 6 планет были известны давно, так как их было легко наблюдать даже невооружённым глазом благодаря их яркости. Уран, Нептун и Плутон, с другой стороны, были менее яркими, и хотя Уран виден невооружённым глазом в подходящих условиях, его медленная орбитальная скорость заставила многих астрономов считать, что планета — это неподвижная звезда."
 je_verrier_uranus_goal: "Чтобы определить, есть ли ещё одна планета или нет, нам нужно открыть [JournalEntry.GetTotalGoalValue|0+] @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object', 'астрономических объектов')]."
 je_verrier_uranus_fail: "Если другая нация выполнит требования раньше нас, они могут найти новую планету или, может быть, поймут, что планет всего 6."
 verrier.12.t: "Новая планета!"
 verrier.12.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] открыл[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] неизвестную планету, которая теперь называется Уран! Событие, которого никто не ожидал."
 verrier.12.f: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] сначала думал[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')], что наш[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'ла', 'ёл')] новую комету. Лишь несколько недель спустя стало ясно, что это на самом деле новая планета! Невероятно, что существование ещё одной планеты ранее практически не рассматривалось. Но теперь, когда Уран найден, многие задаются вопросом, могут ли быть и другие планеты.\n\n#b Исторический контекст:#! Только в 1781 году Вильгельм Гершель случайно наткнулся на Уран. Сначала он думал, что это комета, потому что зачем бы существовать больше планет, чем известные? Однако в течение следующих 3 месяцев научное сообщество поняло, что это действительно новая планета."
 verrier.12.g: "Невероятно! Возможно, есть и другие планеты?"
 verrier.13.d: "Произошла сенсация! [concept_verrier_astronomer] из [SCOPE.sCountry('verrier_uranus_discoverer_country').GetAltNameNoFlag('RU_CL_RP')] нашёл новую планету под названием Уран. И если есть ещё одна, может быть, мы сможем найти ещё больше!"
 verrier.13.g: "Если их больше 6, может быть, нам предстоит открыть ещё больше!"
 verrier_uranus_discoverer_modifier: "Первооткрыватель Урана"
 je_verrier_dwarf_planets: "Небесная полиция"
 je_verrier_dwarf_planets_reason: "Примечание: это задание в журнале можно выполнить несколько раз.\n\nПосле открытия Урана может существовать возможность найти и другие планеты. Поскольку в огромном регионе между Марсом и Юпитером нет планет, астрономы надеются найти там ещё одну планету. Поэтому они основали Небесную полицию, несколько обсерваторий, работающих вместе, чтобы найти планету.\n\n#b Исторический контекст:#! Небесная полиция (нем. Himmelspolizey) — это сотрудничество многочисленных европейских астрономов в начале XIX века. Она в основном известна в связи с поиском объектов, которые, как ожидалось, находились между орбитами Марса и Юпитера. Она была создана в 1800 году на втором европейском конгрессе астрономов."
 je_verrier_dwarf_planets_goal: "Чтобы, возможно, найти новую планету, нам нужно открыть [JournalEntry.GetGoalAddValue|0+] @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object', 'астрономических объектов')]."
 verrier.14.t: "Открыта Церера"
 verrier.14.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] открыл[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] неизвестную планету в регионе между Марсом и Юпитером. Огромное открытие!"
 verrier.14.f: "#b Исторический контекст:#! Астрономы давно подозревали существование ещё одной планеты в промежутке между Марсом и Юпитером. Поэтому была основана Небесная полиция, и пространство было разделено и передано по частям разным обсерваториям.\nВ новогоднюю ночь 1801 года Джузеппе Пиацци случайно обнаружил Цереру в звёздном каталоге."
 verrier.14.g: "Интересно, сколько ещё планет существует?"
 verrier_ceres_discoverer_modifier: "Первооткрыватель Цереры"
 notification_verrier_ceres_discovered_notification_name: "Открыта Церера"
 notification_verrier_ceres_discovered_notification_desc: "Доктор [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] сделал[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] невероятное открытие и наш[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'ла', 'ёл')] новую планету в Солнечной системе. Планета будет названа Церера и расположена между Марсом и Юпитером."
 verrier.15.t: "Открыта Паллада"
 verrier.15.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] открыл[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] неизвестную планету в регионе между Марсом и Юпитером. Огромное открытие!"
 verrier.15.f: "#b Исторический контекст:#! Когда между Марсом и Юпитером была найдена Церера, никто не ожидал, что в том же регионе будет ещё одна планета. Было огромным сюрпризом, когда Генрих Вильгельм Ольберс обнаружил новую планету, ища Цереру. Открытие Паллады заставило Небесную полицию искать другие планеты в том же регионе, что оказалось плодотворным всего через несколько лет."
 verrier_pallas_discoverer_modifier: "Первооткрыватель Паллады"
 notification_verrier_pallas_discovered_notification_name: "Открыта Паллада"
 notification_verrier_pallas_discovered_notification_desc: "Доктор [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] сделал[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] невероятное открытие и наш[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'ла', 'ёл')] новую планету в Солнечной системе. Планета будет названа Паллада и расположена между Марсом и Юпитером."
 verrier.16.t: "Открыта Веста"
 verrier.16.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] открыл[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] неизвестную планету в регионе между Марсом и Юпитером. Огромное открытие!"
 verrier.16.f: "#b Исторический контекст:#! Когда Генрих Вильгельм Ольберс нашёл свою вторую планету в 1807 году, он попросил Карла Фридриха Гаусса назвать её. Новоназванная Веста была четвёртой планетой, найденной в регионе между Марсом и Юпитером, и оставалась последней около 40 лет."
 verrier_vesta_discoverer_modifier: "Первооткрыватель Весты"
 notification_verrier_vesta_discovered_notification_name: "Открыта Веста"
 notification_verrier_vesta_discovered_notification_desc: "Доктор [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] сделал[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] невероятное открытие и наш[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'ла', 'ёл')] новую планету в Солнечной системе. Планета будет названа Веста и расположена между Марсом и Юпитером."
 verrier.17.t: "Открыта Юнона"
 verrier.17.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] открыл[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] неизвестную планету в регионе между Марсом и Юпитером. Огромное открытие!"
 verrier.17.f: "#b Исторический контекст:#! После открытия Цереры в 1801 году и Паллады в 1802 году прошло всего 2 года, прежде чем Карл Людвиг Хардинг нашёл Юнону в том же регионе между Марсом и Юпитером. Все три планеты, а также Веста (открытая в 1807 году), некоторое время оставались планетами, пока не было найдено всё больше и больше астероидов, которые считались планетами. Затем астрономы решили, что ни одна из них не является настоящей планетой."
 verrier_juno_discoverer_modifier: "Первооткрыватель Юноны"
 notification_verrier_juno_discovered_notification_name: "Открыта Юнона"
 notification_verrier_juno_discovered_notification_desc: "Доктор [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] сделал[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] невероятное открытие и наш[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'ла', 'ёл')] новую планету в Солнечной системе. Планета будет названа Юнона и расположена между Марсом и Юпитером."
 je_verrier_neptune_goal: "Успешное открытие Неизвестной планеты требует детального изучения звёздного неба. После нахождения [JournalEntry.GetTotalGoalValue|0+] @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object', 'астрономических объектов')], у нас может появиться шанс открыть планету."
