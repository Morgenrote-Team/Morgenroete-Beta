 verrier_found_observatory_decision: "Основать обсерваторию"
 verrier_found_observatory_decision_desc: "В XIX веке астрономия достигла огромного прогресса, не в последнюю очередь благодаря покровительству национальных государств. Охота за небесными телами также была начата, потому что наименование новых звёзд, планет или астероидов обеспечивало престиж странам и правителям. С появлением всё новых методов, таких как модернизация телескопов или введение фотографии, результаты значительно возросли. Строительство [Concept('concept_verrier_observatory', 'обсерватории')] приведёт к пассивному открытию новых небесных тел каждый год; точное число можно будет проверить в самой обсерватории, когда она будет завершена. Новые технологии и [concept_verrier_astronomer|l] улучшают статистику."
 verrier_charter_moon_decision: "Составить карту Луны"
 verrier_charter_moon_decision_desc: "Атласы Луны и сопутствующие попытки составить карту спутника Земли существуют уже много веков. Изобретение телескопа революционизировало эту науку, известную как «селенография», но с изобретением фотографии у нас появился совершенно новый способ точного картографирования Луны."
 verrier_visit_observatory_decision: "Посетить обсерваторию"
 verrier_visit_observatory_decision_desc: "Посетите главную [Concept('concept_verrier_observatory', 'обсерваторию')] нашей страны, чтобы увидеть всю важную национальную и международную информацию по астрономии."
 verrier_asteroid_congress_decision: "Астрономический конгресс по астероидам"
 verrier_asteroid_congress_decision_desc: "С момента открытия Цереры в 1801 году астрономы находили всё больше и больше небесных тел, из-за чего число планет в Солнечной системе продолжало расти. Открытие Нептуна подняло вопрос о том, не имеет ли смысл создать новую категорию для многочисленных, более мелких объектов, обнаруженных, в частности, между Марсом и Юпитером. В частности, изобретение новых астрономических символов и их относительно небольшой размер заставили астрономов предположить, что это скорее «маленькие звёзды» или «малые планеты». Конечно, такая категоризация означала бы, что некоторые из объектов, ранее считавшихся планетами, потеряют свой статус и будут понижены до простых валунов."
 verrier_asteroid_congress_decision_tt: "Чем больше небесных тел находят, тем более актуальной становится реформа прежнего определения планет. С более чем #BLUE 1500#! объектами ситуация, вероятно, станет настолько запутанной, что конференция станет неизбежной."
 verrier_carte_congress_decision: "Карта неба"
 verrier_carte_congress_decision_desc: "Обширный и беспрецедентный международный проект по составлению звёздной карты был инициирован в 1887 году директором Парижской обсерватории Амедеем Муше, который осознал потенциал нового процесса сухой пластинчатой фотографии для революционизации процесса создания звёздных карт. В результате Астрографического конгресса, в котором приняли участие более 50 астрономов, состоявшегося в Париже в апреле 1887 года, 20 обсерваторий со всего мира согласились принять участие в проекте. Мы можем провести такой конгресс, чтобы поделиться астрономическими знаниями международного сообщества."
 verrier_great_debate_decision: "Большой спор"
 verrier_great_debate_decision_desc: "Дебаты Шепли-Кёртиса, также известные как Большой спор, объединили дискуссии начала XX века, которые в конечном итоге привели к новому пониманию природы галактик и размера Вселенной. Они вращались вокруг размера Млечного Пути и того, являются ли галактики, тогда известные как спиральные туманности, небольшими объектами в Млечном Пути или гораздо более далёкими и отдельными от Млечного Пути. В тот день два учёных представили независимые технические доклады о масштабах Вселенной, за которыми последовала публичная дискуссия вечером. Мы можем провести такой конгресс, чтобы обсудить главные тайны вселенной."
 notification_verrier_astronomical_observation_notification_name: "Ежегодный астрономический отчёт"
 notification_verrier_astronomical_observation_notification_desc: "Наши [Concept('concept_verrier_astronomer', '#b #ORANGE астрономы#!#!')] в этом году обнаружили и зафиксировали [GetPlayer.MakeScope.Var('verrier_astronomical_objects_notification_var').GetValue|0+=] новых [Concept('concept_verrier_astronomical_object', 'небесных тел')]."
 verrier.10.t: "Нептун открыт"
 verrier.10.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] открыл[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] Нептун во славу нашей нации!"
 verrier.10.f: "Нептун был открыт сразу после полуночи, менее чем за час поисков и менее чем в 1 градусе от предсказанного Леверье положения — поразительное совпадение. После двух ночей наблюдений, в ходе которых его положение и движение были проверены, [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] с удивлением ответил Леверье: «Планета, место которой вы (вычислили), действительно существует!»"
 verrier.10.g: "Другие страны позеленеют от зависти!"
 verrier.5.t: "Торжественное открытие обсерватории"
 verrier.5.d: "Сегодня на торжественной церемонии была открыта [Concept('concept_verrier_observatory', 'обсерватория')], сердце астрономических исследований нашей страны."
 verrier.5.f: ""
 verrier.5.g: "Посетить новую обсерваторию."
 verrier.6.t: "Закрытие обсерватории"
 verrier.6.d: "Астрономы страны решили закрыть [Concept('concept_verrier_observatory', 'обсерваторию')]."
 verrier.6.f: "Недавние политические события привели к тому, что в нашей стране стало несколько обсерваторий. Чтобы устранить конкуренцию и обеспечить государственное финансирование главной обсерватории в столице, исследователи решили прекратить свою деятельность в филиале и закрыть учреждение. Все результаты исследований передаются в столицу вместе с устоявшимся научным персоналом."
 verrier.6.g: "Прискорбно, но необходимо."
 verrier.6.h: "Эм... У нас ещё нет [Concept('concept_verrier_observatory', 'обсерватории')] в столице. Переместить её туда!"
 verrier.11.d: "Учёные из [SCOPE.sCountry('verrier_neptune_discoverer_country').GetAltNameNoFlag('RU_CL_RP')] сообщили нам сегодня, что один из их коллег открыл ранее неизвестную планету Нептун."
 verrier.11.g: "Поздравляю..."
 verrier.20.t: "Плутон открыт"
 verrier.20.d: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] открыл[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] Плутон во славу нашей нации!"
 verrier.20.f: "Как только Плутон был найден, его тусклость и отсутствие видимого диска поставили под сомнение идею, что это Планета X. Фактически, небесное тело стало горьким разочарованием для некоторых учёных. Оценки массы Плутона пересматривались в сторону уменьшения на протяжении всего XX века. Астрономы первоначально рассчитывали его массу на основе предполагаемого воздействия на Нептун и Уран. В 1931 году масса Плутона была оценена примерно в массу Земли, а дальнейшие расчёты в 1948 году снизили массу примерно до массы Марса. Тем не менее, открытие попало в заголовки газет по всему миру."
 verrier.20.g: "Может, он и маленький, но всё равно планета."
 verrier.21.d: "Учёные из [SCOPE.sCountry('verrier_pluto_discoverer_country').GetAltNameNoFlag('RU_CL_RP')] сообщили нам сегодня, что один из их коллег открыл ранее неизвестную планету Плутон."
 verrier.21.g: "Это вообще настоящая планета?"
 verrier.30.t: "Астрономический конгресс по астероидам"
 verrier.30.d: "На международной конференции предстоит решить судьбу некоторых небесных тел, которые до сих пор считались планетами."
 verrier.30.f: "Идея о том, что более мелкие [Concept('concept_verrier_astronomical_object', 'астрономические объекты')], обнаруженные с начала XIX века, в значительной степени не соответствуют тому, что на самом деле понималось под планетами, быстро прижилась — особенно после открытия Нептуна, который гораздо больше похож на давно известные планеты. Лишь после некоторых колебаний небесные тела Паллада, Веста и Юнона, которые полвека назывались планетами, также были отнесены к новой категории астероидов. Однако до сих пор не найдено консенсуса по поводу малой планеты Церера, открытой Джузеппе Пиацци в 1801 году. Группа традиционалистов хочет сохранить её в качестве планеты. Хотя она значительно меньше всех других планет, она слишком велика для астероида. Поэтому некоторые члены конгресса призывают к голосованию."
 verrier.30.f_astraea: "Идея о том, что более мелкие [Concept('concept_verrier_astronomical_object', 'астрономические объекты')], обнаруженные с начала XIX века, в значительной степени не соответствуют тому, что на самом деле понималось под планетами, быстро прижилась — особенно после открытия Нептуна, который гораздо больше похож на давно известные планеты. Лишь после некоторых колебаний небесные тела Паллада, Веста, Юнона и Астрея, которые полвека назывались планетами, также были отнесены к новой категории астероидов. Однако до сих пор не найдено консенсуса по поводу малой планеты Церера, открытой Джузеппе Пиацци в 1801 году. Группа традиционалистов хочет сохранить её в качестве планеты. Хотя она значительно меньше всех других планет, она слишком велика для астероида. Поэтому некоторые члены конгресса призывают к голосованию."
 verrier.30.g: "Мне нравится эта планета. Давайте решим судьбу Цереры голосованием."
 verrier.30.h: "Нет необходимости в ещё одном заседании."
 verrier.31.t: "Статус Цереры"
 verrier.31.d: "Наша страна приглашена на астрономический конгресс, организованный [SCOPE.sCountry('verrier_congress_host_country').GetAltNameNoFlag('RU_CL_TP')]. Самый важный вопрос касается судьбы (бывшей?) планеты Церера."
 verrier.31.f: "Идея о том, что более мелкие [Concept('concept_verrier_astronomical_object', 'астрономические объекты')], обнаруженные с начала XIX века, в значительной степени не соответствуют тому, что на самом деле понималось под планетами, быстро прижилась — особенно после открытия Нептуна, который гораздо больше похож на давно известные планеты. Лишь после некоторых колебаний небесные тела Паллада, Веста и Юнона, которые полвека назывались планетами, также были отнесены к новой категории астероидов. Однако до сих пор не найдено консенсуса по поводу малой планеты Церера, открытой Джузеппе Пиацци в 1801 году. Группа традиционалистов хочет сохранить её в качестве планеты. Хотя она значительно меньше всех других планет, она слишком велика для астероида. Другая сторона утверждает, что если Церера останется планетой, многие более крупные объекты также могут быть отнесены к планетам, что усложнит астрономию."
 verrier.31.f_astraea: "Идея о том, что более мелкие [Concept('concept_verrier_astronomical_object', 'астрономические объекты')], обнаруженные с начала XIX века, в значительной степени не соответствуют тому, что на самом деле понималось под планетами, быстро прижилась — особенно после открытия Нептуна, который гораздо больше похож на давно известные планеты. Лишь после некоторых колебаний небесные тела Паллада, Веста, Юнона и Астрея, которые полвека назывались планетами, также были отнесены к новой категории астероидов. Однако до сих пор не найдено консенсуса по поводу малой планеты Церера, открытой Джузеппе Пиацци в 1801 году. Группа традиционалистов хочет сохранить её в качестве планеты. Хотя она значительно меньше всех других планет, она слишком велика для астероида. Другая сторона утверждает, что если Церера останется планетой, многие более крупные объекты также могут быть отнесены к планетам, что усложнит астрономию."
 verrier.31.g: "Церера — это планета."
 verrier.31.h: "Церера — не планета."
 verrier.32.t_demoted: "Церера понижена в статусе"
 verrier.32.t_saved: "Церера спасена"
 verrier.32.d_demoted: "Астрономический конгресс лишил Цереру статуса планеты."
 verrier.32.d_saved: "Астрономический конгресс подтвердил статус Цереры как планеты."
 verrier.32.f_demoted: "Результат не стал неожиданностью: если другие более мелкие небесные тела — астероиды, то логично, что и Церера должна быть им. Астрономы согласились, что Церера, вероятно, является крупнейшим небесным телом в так называемом поясе астероидов и, таким образом, также почётно присвоили бывшей планете номер 1 среди астероидов; но и не более того. Хотя есть некоторые голоса, которые предполагают, что планетарный статус имеет как культурные, так и академические последствия, такие аргументы, вероятно, больше связаны с иррациональной ностальгией, чем с наукой.\n\n Итоговый результат: #G [GetGlobalVariable('verrier_ceres_yes').GetValue]#! голосов «за» против #R [GetGlobalVariable('verrier_ceres_no').GetValue]#! голосов «против»."
 verrier.32.f_saved: "Результат стал неожиданностью для многих: большинство астрономов проголосовали за сохранение Цереры в качестве планеты! Форма и масса, утверждали традиционалисты, отличают Цереру от других объектов в поясе астероидов. Планета явно выделяется. В примечании учёные добавили, что Церера на протяжении десятилетий является частью Солнечной системы, признанной не только научно, но и социально и культурно. Граничит с высокомерием понижать планету, которую полюбили так много людей, до астероида и тем самым лишать её своей идентичности.\n\n Итоговый результат: #G [GetGlobalVariable('verrier_ceres_yes').GetValue]#! голосов «за» против #R [GetGlobalVariable('verrier_ceres_no').GetValue]#! голосов «против»."
 verrier.32.g: "Церера была всего лишь карликовой планетой."
 verrier.32.h: "Церера спасена!"
 verrier.33.t: "Четыре планеты понижены в статусе"
 verrier.33.t_astraea: "Пять планет понижены в статусе"
 verrier.33.d: "Астрономический конгресс написал свою окончательную декларацию: четыре небесных тела, которые когда-то считались планетами, теперь объявлены астероидами."
 verrier.33.f: "Конгресс ввёл новую категорию небесных тел — астероиды, чтобы улучшить будущую астрономию. Так что теперь не каждый камень в космосе — планета. Помимо некоторых новых объектов, «планеты» Церера, Паллада, Веста и Юнона, открытые с 1801 года, также классифицируются как астероиды."
 verrier.33.f_astraea: "Конгресс ввёл новую категорию небесных тел — астероиды, чтобы улучшить будущую астрономию. Так что теперь не каждый камень в космосе — планета. Помимо некоторых новых объектов, «планеты» Церера, Паллада, Веста, Юнона и Астрея, открытые с 1801 года, также классифицируются как астероиды."
 verrier.33.g: "В Солнечной системе 8 планет."
 verrier.34.t: "Три планеты понижены в статусе"
 verrier.34.t_astraea: "Четыре планеты понижены в статусе"
 verrier.34.d: "Астрономический конгресс написал свою окончательную декларацию: три небесных тела, которые когда-то считались планетами, теперь объявлены астероидами."
 verrier.34.f: "Конгресс ввёл новую категорию небесных тел — астероиды, чтобы улучшить будущую астрономию. Так что теперь не каждый камень в космосе — планета. Помимо некоторых новых объектов, «планеты» Паллада, Веста и Юнона, открытые с 1801 года, также классифицируются как астероиды. Церера остаётся планетой."
 verrier.34.f_astraea: "Конгресс ввёл новую категорию небесных тел — астероиды, чтобы улучшить будущую астрономию. Так что теперь не каждый камень в космосе — планета. Помимо некоторых новых объектов, «планеты» Паллада, Веста, Юнона и Астрея, открытые с 1801 года, также классифицируются как астероиды. Церера остаётся планетой."
 verrier.34.g: "В Солнечной системе 9 планет."
 verrier.35.t: "Спорный планетарный статус"
 verrier.35.d: "Недавнее заявление астрономического конгресса имеет последствия для престижа нашей нации."
 verrier.35.f: "Несколько возражений не помогли. Лишение одной или нескольких открытых нами планет планетарного статуса негативно сказывается на нашем положении в мире. Почти каждый может найти астероид в настоящее время; ничего в этом не приносит международного признания. Раньше мы хвастались, что один из наших учёных открыл такое небесное тело, но с последним решением такие тщеславия больше не имеют значения."
 verrier.35.g: "Это голосование было явно сфальсифицировано!"
 verrier.40.t: "Комета замечена!"
 verrier.40.d: "Учёные из нашей обсерватории открыли новую комету."
 verrier.40.f: "В небе была замечена комета, некоторые считают, что это предвещает грядущие тяжёлые времена. Другие считают, что это на самом деле пикси-феи, парящие в небе. Есть и те, кто считает, что эта комета, скорее всего, гигантский ледяной шар, плывущий по небу, а длинный хвост создаётся за счёт энергии солнца. Споры между тремя одинаково жизнеспособными теориями стимулируют стремление к знаниям в нашей стране."
 verrier.40.g: "Слава Богу, мы живём в такие просвещённые времена."
 verrier.41.t: "Новый астероид"
 verrier.41.d: "Астрономы обнаружили новое небесное тело в астероиде и добавили его в наши звёздные карты."
 verrier.41.f: "В течение XIX века картографирование небесных тел, особенно астероидов, набрало огромные обороты. В то время как к 1850 году учёные обнаружили всего дюжину астероидов, к концу века их было уже около 300. Среди прочего, эти открытия заставили переосмыслить прежние категории и создать новые."
 verrier.41.g: "Сколько ещё?"
 verrier.42.t: "Метеоритный дождь"
 verrier.42.d: "Сезонный метеоритный дождь позволяет нашим астрономам увидеть в этом году особенно большое количество [Concept('concept_verrier_astronomical_object', 'астрономических объектов')]."
 verrier.42.f: "Метеоритный дождь — это небесное явление, при котором наблюдается, что множество метеоров излучаются или исходят из одной точки на ночном небе. Эти метеоры вызваны потоками космического мусора, называемого метеороидами, которые входят в атмосферу Земли на чрезвычайно высоких скоростях по параллельным траекториям. Большинство метеоров меньше песчинки, поэтому почти все они распадаются и никогда не достигают поверхности Земли. Очень интенсивные или необычные метеоритные дожди известны как метеоритные вспышки и метеоритные бури, которые производят не менее 1000 метеоров в час, в основном от Леонид."
 verrier.42.g: "Надеюсь, небо ясное и видимость хорошая!"
 verrier.43.t: "Туманность"
 verrier.43.d: "Наша [Concept('concept_verrier_observatory', 'обсерватория')] обнаружила ранее неизвестную красивую туманность с многочисленными неизвестными звёздами."
 verrier.43.f: "Первая настоящая туманность, в отличие от звёздного скопления, была упомянута мусульманским персидским астрономом Абд ар-Рахманом ас-Суфи. Он отметил «маленькое облачко» там, где находится галактика Андромеды. С 1751 по 1753 год Никола-Луи де Лакайль каталогизировал 42 туманности с мыса Доброй Надежды, большинство из которых были ранее неизвестны. Количество туманностей затем было значительно увеличено благодаря усилиям Уильяма Гершеля и его сестры Каролины Гершель, которые каталогизировали около 2000 туманностей. Начиная с 1864 года Уильям Хаггинс исследовал спектры около 70 туманностей. Примерно к 1923 году, после Большого спора, стало ясно, что многие «туманности» на самом деле являются галактиками, далёкими от Млечного Пути."
 verrier.43.g: "Прекрасно!"
 verrier.44.t: "Название звезды"
 verrier.44.d: "Совершенно случайно [SCOPE.sCharacter('verrier_star_discoverer').GetFullName] открыл[SelectLocalization(SCOPE.sCharacter('verrier_star_discoverer').IsFemale, 'а', '')] новую звезду. В настоящее время всё ещё обсуждается, в честь кого или чего её следует назвать."
 verrier.44.f: "В то время как астрономы первоначально следовали неписаному правилу называть небесные объекты в честь мифологических моделей, появилась мода использовать имя правителя или вызывать ассоциации с родиной, как в случае с неизвестными частями света. Планета Уран, например, сначала должна была быть названа «Георг» в честь правящего в то время британского короля. Пиацци добавил эпитет «Фердинандея» в честь своего покровителя и правителя, когда открыл Цереру."
 verrier.44.g: "Звезда должна быть названа в честь нашей страны."
 verrier.44.h: "Звезда будет названа в честь нашего правителя."
 verrier.44.i: "Звезда будет названа в честь своего первооткрывателя."
 verrier.45.t: "Новый [concept_verrier_astronomer|l] выходит на сцену"
 verrier.45.d: "В прошлом [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] часто проявлял[SelectLocalization(SCOPE.sCharacter('verrier_new_astronomer_scope').IsFemale, 'а', '')] большой интерес к астрономии и в свободное время наблюдает за звёздным небом."
 verrier.45.f: "По сей день ряд астрономов-любителей оказывали выдающиеся услуги и продвигали астрономию как науку. Бесчисленное количество объектов неоднократно означало, что научные дилетанты также могли помогать учёным-экспертам своими записями. Неудивительно, ведь некоторые известные астрономы часто начинали как страстные звездочёты."
 verrier.45.g: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('verrier_new_astronomer_scope').IsFemale, 'должна', 'должен')] стать профессиональным [Concept('concept_verrier_astronomer', '#b #ORANGE астрономом#!#!')]."
 verrier.45.h: "Исследования интересные, не более того."
 verrier.46.t: "Звёздные карты неверны"
 verrier.46.d: "К сожалению, после проверки старых звёздных карт мы обнаружили, что некоторых из нанесённых на карту звёзд вообще не существует."
 verrier.46.f: "К сожалению, ошибки в астрономических записях не редкость. Это было верно не только для раннего Нового времени, но даже для XIX века, несмотря на улучшенные и усовершенствованные методы. Например, в 1861 году Герман Гольдшмидт утверждал, что нашёл ещё один спутник Сатурна, который он назвал «Хирон», но существование которого так и не было подтверждено."
 verrier.46.g: "Вы хотите сказать, что это была просто грязь на телескопе?"
 verrier.47.t: "Открыты новые спутники Сатурна"
 verrier.47.d: "После модернизации телескопа в одной из наших главных обсерваторий наши астрономы смогли открыть два новых спутника Сатурна."
 verrier.47.f: "Спутники Сатурна многочисленны и разнообразны, от крошечных лун диаметром всего в десятки метров до огромного Титана, который больше планеты Меркурий. У Сатурна 83 спутника с подтверждёнными орбитами, которые не встроены в его кольца, а также плотные кольца, содержащие миллионы встроенных лун и бесчисленное множество более мелких частиц колец. Семь спутников Сатурна достаточно велики, чтобы принять расслабленную, эллипсоидальную форму, хотя только один или два из них, Титан и, возможно, Рея, в настоящее время находятся в гидростатическом равновесии. Особенно примечателен среди спутников Сатурна Титан, второй по величине спутник в Солнечной системе после Ганимеда Юпитера."
 verrier.47.g: "Отлично."
 verrier.48.t: "Невероятная новая!"
 verrier.48.d: "Наш [concept_verrier_astronomer|l], доктор [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName], открыл новую звезду, гораздо ярче окружающих её звёзд. Такие наблюдения невероятно редки и обычно доступны только лучшим астрономам."
 verrier.48.f: "Мы первыми заметили появление новой звезды. Но вскоре многие другие обсерватории начали направлять свои телескопы на неё. Новая была гораздо ярче окружающих звёзд и продержалась почти две недели. Хотя со временем она угасла, она была хорошо видна в течение довольно долгого времени. Мы пока не знаем, почему это произошло, но наблюдение, безусловно, поможет нам лучше понять это явление!"
 verrier.48.g: "Невероятно"
 verrier.50.t: "Карта Луны"
 verrier.50.d: "После многих лет интенсивных наблюдений и картографирования, а также с использованием самых современных фототехнологий, наши астрономы смогли создать точную карту Луны."
 verrier.50.f: "Лунное картографирование стало систематическим в 1779 году, когда Иоганн Шрётер начал скрупулёзные наблюдения и измерения лунной топографии. В 1834 году Иоганн Генрих фон Медлер опубликовал первую большую картографию (карту) Луны, состоящую из 4 листов, а затем опубликовал «Всеобщую селенографию». Все лунные измерения основывались на прямых наблюдениях до марта 1840 года, когда Дж. У. Дрейпер, используя 5-дюймовый рефлектор, сделал дагерротип Луны и тем самым ввёл фотографию в астрономию. Сначала изображения были очень низкого качества, но, как и в случае с телескопом 200 лет назад, их качество быстро улучшалось. К 1890 году лунная фотография стала признанной поддисциплиной астрономии."
 verrier.50.g: "Превосходно."
 verrier.51.t: "Лунная борозда"
 verrier.51.d: "Проект по фотографическому картографированию Луны продвинулся вперёд."
 verrier.51.f: "Борозда обычно используется для описания любых длинных, узких впадин на поверхности Луны, которые напоминают каналы. Латинский термин — rima, множественное число rimae. Как правило, борозда может быть шириной в несколько километров и длиной в сотни километров. Однако этот термин также свободно использовался для описания подобных структур на ряде планет Солнечной системы, включая Марс, Венеру, и на ряде спутников. Все они имеют структурное сходство друг с другом."
 verrier.51.g: "Увлекательно."
 verrier.52.t: "Лунный кратер"
 verrier.52.f: "Записи о кратерах на очень старых поверхностях — таких как Луна — фиксируют период интенсивной ранней бомбардировки во внутренней Солнечной системе около 3,9 миллиардов лет назад. Поскольку процессы эрозии на Луне минимальны, кратеры сохраняются. В 1893 году Гроув Карл Гилберт впервые предположил, что лунные кратеры были образованы в результате ударов крупных астероидов."
 verrier.53.t: "Лунные моря"
 verrier.53.f: "Лунные моря — это большие, тёмные, базальтовые равнины на Луне, образованные в результате древних ударов астероидов на обратной стороне Луны, которые вызвали вулканическую активность на противоположной (ближней) стороне. Ранние астрономы, ошибочно принимая их за настоящие моря, назвали их maria, что по-латыни означает «моря». Они менее отражательны, чем «высокогорья», из-за своего богатого железом состава, и поэтому кажутся тёмными невооружённым глазом. Моря покрывают около 16% лунной поверхности, в основном на видимой с Земли стороне. Немногочисленные моря на обратной стороне намного меньше и в основном находятся в очень больших кратерах. Традиционная номенклатура для Луны также включает один oceanus (океан), а также объекты с названиями lacus («озеро»), palus («болото») и sinus («залив»). Последние три меньше морей, но имеют ту же природу и характеристики."
 verrier.54.t: "Лунные высокогорья"
 verrier.54.f: "Более светлые области Луны называются terrae, или, чаще, высокогорьями, потому что они выше большинства морей. Датируется, что они образовались 4,4 миллиарда лет назад, и могут представлять собой плагиоклазовые кумуляты лунного магматического океана. Концентрация морей на ближней стороне, вероятно, отражает значительно более толстую кору высокогорий на обратной стороне, которая могла образоваться в результате медленного удара второго спутника Земли через несколько десятков миллионов лет после образования Луны."
 verrier.61.t: "Комета [SCOPE.sCharacter('verrier_1843_discoverer').GetLastName]"
 verrier.61.d: "[SCOPE.sCharacter('verrier_1843_discoverer').GetFullName] открыл[SelectLocalization(SCOPE.sCharacter('verrier_1843_discoverer').IsFemale, 'а', '')] @verrier_comet! большую комету!"
 verrier.61.f: "Большая комета 1843 года была долгопериодической кометой, которая стала очень яркой в марте 1843 года (она также известна как Большая мартовская комета). Она была открыта 5 февраля 1843 года и быстро стала яркой, превратившись в большую комету. Она была членом семейства Крейца, семейства комет, образовавшихся в результате распада родительской кометы на несколько фрагментов примерно в 1106 году. Эти кометы проходят чрезвычайно близко к поверхности Солнца — в пределах нескольких солнечных радиусов — и в результате часто становятся очень яркими. Она прошла ближе всего к Земле 6 марта 1843 года и достигла своей наибольшей яркости на следующий день; к сожалению для наблюдателей к северу от экватора, в пике своей яркости она была лучше всего видна из Южного полушария. Последний раз её наблюдали 19 апреля 1843 года. В то время эта комета прошла ближе к Солнцу, чем любой другой известный объект."
 verrier.61.g: "Слава [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')]!"
 verrier.62.t_name: "Комета [SCOPE.sCharacter('verrier_1843_discoverer').GetLastName]"
 verrier.62.t_year: "Большая комета 1843 года"
 verrier.62.d: "Прекрасная большая комета уже несколько дней заполняет небеса."
 verrier.62.g: "Продолжайте смотреть на небо!"
 verrier.64.t: "Комета [SCOPE.sCharacter('verrier_1858_discoverer').GetLastName]"
 verrier.64.d: "[SCOPE.sCharacter('verrier_1858_discoverer').GetFullName] открыл[SelectLocalization(SCOPE.sCharacter('verrier_1858_discoverer').IsFemale, 'а', '')] @verrier_comet! большую комету!"
 verrier.64.f: "После Большой кометы 1811 года Большая комета 1858 года была самой яркой кометой, появившейся в XIX веке. Это была также первая сфотографированная комета. Она была ближе всего к Земле 10 октября 1858 года, и в течение большей части октября была ярким объектом с длинным, похожим на ятаган пылевым хвостом и заметным газовым хвостом. Она оставалась видимой невооружённым глазом до ноября для наблюдателей в Южном полушарии. Она считается одной из самых красивых наблюдаемых комет и была одной из самых ярких в веке, произведя сильное впечатление как на художников, так и на широкую публику. После предшествующего периода истерии по поводу комет, особенно в Париже (частично вызванной неверными расчётами Джона Рассела Хайнда, которые предполагали, что одна из них столкнётся с Землёй в июне 1857 года), она стала самой наблюдаемой в веке из-за своей отличной видимости на тёмном небе для наблюдателей Северного полушария, особенно в Европе, и хорошей погоды в сентябре и октябре. Уильям Генри Смит, английский астроном, вспоминал её как «один из самых красивых объектов, которые я когда-либо видел». Она была запечатлена на нескольких эскизах и по крайней мере на одной картине Уильяма Тёрнера из Оксфорда."
 verrier.65.t_name: "Комета [SCOPE.sCharacter('verrier_1858_discoverer').GetLastName]"
 verrier.65.t_year: "Большая комета 1858 года"
 verrier.67.t: "Комета [SCOPE.sCharacter('verrier_1861_discoverer').GetLastName]"
 verrier.67.d: "[SCOPE.sCharacter('verrier_1861_discoverer').GetFullName] открыл[SelectLocalization(SCOPE.sCharacter('verrier_1861_discoverer').IsFemale, 'а', '')] @verrier_comet! большую комету!"
 verrier.67.f: "«Вечером 13 мая 1861 года, во время поисков комет на западном небе, я обнаружил слабый туманный объект вблизи звезды Лакайль 1316 в созвездии Эридана. В мой морской телескоп объект казался очень расплывчатым, и с величайшим трудом я оценил его расстояние от трёх хорошо известных неподвижных звёзд. Объект едва различался в маленький телескоп, прикреплённый к секстанту, и мне пришлось использовать цветное стекло между индексным и горизонтным стёклами, так как превосходная яркость опорных звёзд Процион, Сириус и Канопус, когда они попадали в поле зрения, полностью затмевала его слабый свет. Каждый охотник за кометами знает, как необходимо для выполнения своей работы иметь под рукой обширный каталог туманностей, но этого ценного приложения у меня, к сожалению, не было. Однако я не смог найти объект в имеющихся у меня ограниченных каталогах. Поэтому я решил наблюдать за ним, и хорошо, что я это сделал, иначе я бы упустил одну из лучших возможностей представить себя астрономическому миру»."
 verrier.68.t_name: "Комета [SCOPE.sCharacter('verrier_1861_discoverer').GetLastName]"
 verrier.68.t_year: "Большая комета 1861 года"
 verrier.70.t: "Комета [SCOPE.sCharacter('verrier_1874_discoverer').GetLastName]"
 verrier.70.d: "[SCOPE.sCharacter('verrier_1874_discoverer').GetFullName] открыл[SelectLocalization(SCOPE.sCharacter('verrier_1874_discoverer').IsFemale, 'а', '')] @verrier_comet! большую комету!"
 verrier.70.f: "Большая комета 1874 года — это непериодическая комета, которую летом 1874 года можно было видеть невооружённым глазом. Без сомнения, это была красавица; настоящая большая комета. В своей максимальной яркости она, вероятно, превосходила первую величину и демонстрировала серию оболочек в своей коме, которые астрономы сравнивали с Большой кометой 16-летней давности. Наблюдатели, находившиеся в подходящих местах, также отмечали максимальную длину хвоста, видимую невооружённым глазом, достигавшую 70 градусов, когда комета проходила мимо Земли в июле. Общественный страх по поводу кометы был высмеян Марком Твеном в его рассказе «Любопытная увеселительная поездка»."
 verrier.71.t_name: "Комета [SCOPE.sCharacter('verrier_1874_discoverer').GetLastName]"
 verrier.71.t_year: "Большая комета 1874 года"
 verrier.73.t: "Комета [SCOPE.sCharacter('verrier_1882_discoverer').GetLastName]"
 verrier.73.d: "[SCOPE.sCharacter('verrier_1882_discoverer').GetFullName] открыл[SelectLocalization(SCOPE.sCharacter('verrier_1882_discoverer').IsFemale, 'а', '')] @verrier_comet! большую комету!"
 verrier.73.f: "Большая комета 1882 года — это комета, которая стала очень яркой в сентябре 1882 года. Она была членом семейства Крейца. Комета была достаточно яркой, чтобы её можно было видеть рядом с Солнцем на дневном небе в перигелии. Комета появилась на утреннем небе в сентябре 1882 года. Сообщения говорят о том, что её впервые увидели уже 1 сентября 1882 года с мыса Доброй Надежды, а также из Гвинейского залива, и в течение следующих нескольких дней многие наблюдатели в южном полушарии сообщали о новой комете. Астроном Её Величества на мысе, Дэвид Гилл, сообщил, что наблюдал, как комета восходит за несколько минут до Солнца 18 сентября, и описал её как «Ядро тогда было, несомненно, одиночным и, конечно, скорее меньше, чем больше 4 дюймов в диаметре; фактически, как я его описал, оно очень напоминало звезду 1-й величины, видимую днём». Фрагменты Большой кометы 1882 года вернутся через несколько сотен лет, растянувшись, возможно, на два-три столетия."
 verrier.74.t_name: "Комета [SCOPE.sCharacter('verrier_1882_discoverer').GetLastName]"
 verrier.74.t_year: "Большая комета 1882 года"
 verrier.80.t: "Конгресс «Карта неба»"
 verrier.80.d: "Подготовка к астрономическому конгрессу завершена. Пора приглашать другие страны."
 verrier.80.f: "На трёх конгрессах (1887, 1889 и 1891) были разработаны единые методы наблюдения и расчётов на основе лучших техник того времени. В этом парламенте «Карты неба» приняли участие астрономы из 38 стран; в конечном итоге зоны склонения были разделены между 18 обсерваториями в соответствии с их широтами. Однако запланированное время экспозиции в 40 минут пришлось частично адаптировать к климатической ситуации, а также оценку — к имеющимся компараторам. Примерно с 1895 года несколько институтов также захотели внести свой проектный опыт в улучшения, ускорение методологии и новейшие лабораторные технологии. Это усугублялось тем, что они также хотели направить ресурсы на развитие зарождающейся астрофизики."
 verrier.80.g: "Пригласить ведущие астрономические нации."
 verrier.81.t: "Приглашение на «Карту неба»"
 verrier.81.d: "Наши астрономы были приглашены на конгресс, направленный на более детальное исследование и картографирование звёздного неба."
 verrier.81.f: "На трёх конгрессах (1887, 1889 и 1891) были разработаны единые методы наблюдения и расчётов на основе лучших техник того времени. В этом парламенте «Карты неба» приняли участие астрономы из 38 стран; в конечном итоге зоны склонения были разделены между 18 обсерваториями в соответствии с их широтами. Однако запланированное время экспозиции в 40 минут пришлось частично адаптировать к климатической ситуации, а также оценку — к имеющимся компараторам. Примерно с 1895 года несколько институтов также захотели внести свой проектный опыт в улучшения, ускорение методологии и новейшие лабораторные технологии. Это усугублялось тем, что они также хотели направить ресурсы на развитие зарождающейся астрофизики."
 verrier.81.g: "Мы придём."
 verrier.82.t_laughed: "Насмешки на астрономическом конгрессе"
 verrier.82.t_respected: "Уважение на астрономическом конгрессе"
 verrier.82.t_lauded: "Похвала на астрономическом конгрессе"
 verrier.82.d_laughed: "Нашу делегацию высмеяли на астрономическом конгрессе за недостаток астрономических знаний!"
 verrier.82.d_respected: "Нашу делегацию с уважением приняли на астрономическом конгрессе."
 verrier.82.d_lauded: "Передовые знания нашей нации в области астрономии привлекли внимание других учёных."
 verrier.82.f_laughed: "«Что вы имеете в виду, теория эфира устарела?»"
 verrier.82.f_respected: "«Надеюсь, на фуршете ещё остались кусочки в форме Сатурна»."
 verrier.82.f_lauded: "«Добрый вечер, мистер Большое Магелланово Облако — я наконец-то знаю, почему эта штука так называется»."
 verrier.82.g: "Ужасно..."
 verrier.82.h: "Хорошо."
 verrier.82.i: "Фантастика!"
 verrier.83.t: "Обмен звёздными картами"
 verrier.83.d: "Наши астрономы хотели бы обменять наши звёздные карты на карты коллег из-за рубежа."
 verrier.83.f: "Астрономия была одной из областей исследований, в которой международное сотрудничество началось очень рано; только Первая мировая война временно положила конец таким усилиям. Задача увидеть всё небо и разгадать тайны вселенной означала, что учёные из всех стран посвятили себя общей цели. Только политика могла ставить препятствия."
 verrier.83.g: "Мы хотим поделиться нашими картами."
 verrier.83.h: "Нам это не интересно."
 verrier.84.t: "Обмен картами"
 verrier.84.d: "Астрономы обменялись несколькими ящиками звёздных карт с иностранными учёными без нашего ведома."
 verrier.84.f: "Астрономия была одной из областей исследований, в которой международное сотрудничество началось очень рано; только Первая мировая война временно положила конец таким усилиям. Задача увидеть всё небо и разгадать тайны вселенной означала, что учёные из всех стран посвятили себя общей цели. Только политика могла ставить препятствия — или не ставить."
 verrier.84.g: "Они должны были сначала спросить меня!"
 verrier.85.t: "Астрономический конгресс завершается"
 verrier.85.d: "Конгресс завершился, и мы недавно получили некоторую важную информацию о звёздном небе."
 verrier.85.f: "Проект по созданию карты неба с международной сетью обсерваторий оказался в последующие десятилетия титанической задачей, которую было не так просто осилить. «Карта неба» осталась незавершённой. Тем не менее, международные встречи дали возможность для обмена и заложили основу для будущих международных сотрудничеств и конференций в области астрономических исследований."
 verrier.85.g: "Это было довольно познавательно."
 verrier.86.t: "Большой спор"
 verrier.86.d: "Подготовка к астрономическому конгрессу завершена. Пора приглашать другие страны."
 verrier.86.f: "Большой спор, также называемый дебатами Шепли-Кёртиса, состоялся между астрономами Харлоу Шепли и Гебером Кёртисом. Он касался природы так называемых спиральных туманностей и размера вселенной. Шепли считал, что эти туманности относительно малы и лежат на окраинах галактики Млечный Путь (тогда считавшейся всей вселенной), в то время как Кёртис утверждал, что они на самом деле являются независимыми галактиками, подразумевая, что они чрезвычайно велики и далеки. Большая часть преданий о Большом споре выросла из двух статей, опубликованных Шепли и Кёртисом в майском выпуске 1921 года Бюллетеня Национального исследовательского совета. После публичных дебатов учёные смогли проверить отдельные доказательства обоих астрономов."
 verrier.86.g: "Пригласить ведущие астрономические нации."
 verrier.87.t: "Большой спор"
 verrier.87.d: "Наши астрономы были приглашены на конгресс, чтобы прояснить вопрос о размере и природе вселенной."
 verrier.87.f: "Большой спор, также называемый дебатами Шепли-Кёртиса, состоялся между астрономами Харлоу Шепли и Гебером Кёртисом. Он касался природы так называемых спиральных туманностей и размера вселенной. Шепли считал, что эти туманности относительно малы и лежат на окраинах галактики Млечный Путь (тогда считавшейся всей вселенной), в то время как Кёртис утверждал, что они на самом деле являются независимыми галактиками, подразумевая, что они чрезвычайно велики и далеки. Большая часть преданий о Большом споре выросла из двух статей, опубликованных Шепли и Кёртисом в майском выпуске 1921 года Бюллетеня Национального исследовательского совета. После публичных дебатов учёные смогли проверить отдельные доказательства обоих астрономов."
 verrier.87.g: "Я предполагаю, что ответ — 42?"
 verrier.88.t: "Одна вселенная или разные галактики?"
 verrier.88.d: "Дебаты на астрономическом конгрессе вращаются вокруг того, представляет ли Млечный Путь всю вселенную."
 verrier.88.f: "Шепли выступал за то, что Млечный Путь — это вся вселенная. Он считал, что «спиральные туманности», такие как Андромеда, являются просто частью Млечного Пути. Он мог подкрепить это утверждение, ссылаясь на относительные размеры — если бы Андромеда не была частью Млечного Пути, то её расстояние должно было бы быть порядка 100 000 000 световых лет — диапазон, который большинство современных астрономов не приняли бы. Кёртис, с другой стороны, утверждал, что Андромеда и другие подобные «туманности» являются отдельными галактиками, или «островными вселенными» (термин, придуманный философом XVIII века Иммануилом Кантом, который также считал, что «спиральные туманности» являются внегалактическими). Он показал, что в Андромеде больше новых, чем в Млечном Пути. Исходя из этого, он мог спросить, почему в одной небольшой части галактики больше новых, чем в других частях галактики, если Андромеда не является отдельной галактикой, а просто туманностью в галактике Земли. Это привело к поддержке Андромеды как отдельной галактики со своим собственным характерным возрастом и частотой появления новых."
 verrier.88.g: "Вселенная состоит из разных галактик."
 verrier.88.h: "Есть только один Млечный Путь, остальное — облака газа."
 verrier.89.t: "Солнце во вселенной"
 verrier.89.d: "Другой предмет спора — находится ли Солнце в центре Млечного Пути или во внешней области."
 verrier.89.f: "«Как следствие исключительного роста и активности великих обсерваторий, с их мощными методами анализа звёзд и зондирования космоса, мы достигли, я считаю, эпохи, когда необходим ещё один шаг вперёд; наша концепция галактической системы должна быть расширена, чтобы поддерживать в должном соотношении объекты, которые находят наши телескопы; Солнечная система больше не может занимать центральное положение».\n\n «Существовало аналогичное общее согласие в выведенных результатах относительно формы и структуры галактики:\n 1. Звёзды не бесконечны в числе и не равномерно распределены.\n 2. Наша галактика, очерченная для нас спроецированными контурами Млечного Пути, содержит, возможно, миллиард солнц.\n 3. Эта галактика имеет форму, похожую на линзу или тонкие часы, толщина которых, вероятно, меньше одной шестой диаметра.\n 4. Наше Солнце расположено довольно близко к центру фигуры галактики."
 verrier.89.g: "Солнце находится во внутренней части Млечного Пути."
 verrier.89.h: "Солнце находится на окраинах Млечного Пути."
 verrier.90.t: "Большой спор завершается"
 verrier.90.d: "Большой спор окончен, и позиции, принятые большинством учёных, определились."
 verrier.91.t: "Статьи «года чудес»"
 verrier.91.d: "Учёный Альберт Эйнштейн революционизировал классическую физику несколькими теориями."
 verrier.91.f: "Статьи «года чудес» — это четыре статьи, которые Альберт Эйнштейн опубликовал в «Annalen der Physik» («Анналах физики»), научном журнале, в 1905 году. Эти четыре статьи внесли значительный вклад в основание современной физики. Они революционизировали научное понимание фундаментальных понятий пространства, времени, массы и энергии. Первая статья объясняла фотоэлектрический эффект, вторая — броуновское движение. Третья статья представила специальную теорию относительности Эйнштейна, которая установила универсальную постоянную скорость света для всех систем отсчёта и теорию пространства-времени. Четвёртая, следствие специальной теории относительности, развила принцип эквивалентности массы и энергии, выраженный в знаменитом уравнении E = mc^2, и который привёл к открытию и использованию атомной энергии. Эти четыре статьи, вместе с квантовой механикой и более поздней общей теорией относительности Эйнштейна, являются основой современной физики."
 verrier.91.g: "Значит, теперь всё относительно?"
 verrier.92.t: "Эйнштейн переезжает в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]"
 verrier.92.d: "Знаменитый физик Альберт Эйнштейн был назначен профессором одним из наших университетов — и он согласился."
 verrier.92.f: "Альберт Эйнштейн был немецким физиком-теоретиком, широко признанным одним из величайших и самых влиятельных физиков всех времён. Эйнштейн наиболее известен разработкой теории относительности, но он также внёс важный вклад в развитие теории квантовой механики. Относительность и квантовая механика — два столпа современной физики. Его работа также известна своим влиянием на философию науки. Эйнштейн родился в Германской империи, но в 1895 году переехал в Швейцарию, отказавшись от своего немецкого гражданства в следующем году. В 1901 году он получил швейцарское гражданство, которое сохранил до конца своей жизни. В 1914 году Эйнштейн переехал в Берлин, чтобы присоединиться к Прусской академии наук и Берлинскому университету имени Гумбольдта. В 1917 году Эйнштейн стал директором Института физики кайзера Вильгельма; он также снова стал гражданином Германии, на этот раз прусским. В 1933 году, когда Эйнштейн находился в Соединённых Штатах, к власти в Германии пришёл Адольф Гитлер. Эйнштейн, будучи евреем, возражал против политики новоизбранного нацистского правительства; он поселился в Соединённых Штатах и стал американским гражданином в 1940 году."
 verrier.92.g: "Добро пожаловать!"
 verrier.93.t: "Теория гравитации Эйнштейна"
 verrier.93.d: "С революционной теорией Альберт Эйнштейн вновь изменил наш взгляд на гравитацию в частности и на вселенную в целом."
 verrier.93.f: "Общая теория относительности — это геометрическая теория гравитации, опубликованная Альбертом Эйнштейном в 1915 году и являющаяся современным описанием гравитации в современной физике. Общая теория относительности обобщает специальную теорию относительности и уточняет закон всемирного тяготения Ньютона, предоставляя единое описание гравитации как геометрического свойства пространства и времени или четырёхмерного пространства-времени. В частности, кривизна пространства-времени напрямую связана с энергией и импульсом любой присутствующей материи и излучения. Теория Эйнштейна имеет астрофизические последствия, включая предсказание чёрных дыр — областей пространства, в которых пространство и время искажены таким образом, что ничто, даже свет, не может из них вырваться. Чёрные дыры — это конечная стадия для массивных звёзд. Считается, что микроквазары и активные ядра галактик — это звёздные чёрные дыры и сверхмассивные чёрные дыры. Она также предсказывает гравитационное линзирование, при котором изгиб света приводит к множественным изображениям одного и того же далёкого астрономического явления."
 verrier.93.g: "Этот человек — гений."
 verrier.94.t: "Эйнштейн эмигрирует"
 verrier.94.d: "Из-за политических изменений в нашей стране известный физик Альберт Эйнштейн сегодня сдал свой паспорт и покинул нашу страну!"
 verrier.94.f: "Альберт Эйнштейн при жизни был преимущественно известен разработкой теории относительности и своей работой в области физики в целом. Однако его политические взгляды представляли общественный интерес в середине XX века из-за его славы и участия в политических, гуманитарных и академических проектах по всему миру. Эйнштейн был сторонником гражданских прав и использовал свою известность для осуждения американской дискриминации. Прибыв в Америку, он возражал против жестокого обращения с афроамериканцами. Эйнштейн, испытавший на себе сильную антисемитскую дискриминацию в предвоенной Германии, работал с рядом ведущих активистов за гражданские права и правозащитными организациями. Он был сторонником социализма, особенно в более поздние годы жизни, подробно изложив свои экономические взгляды в статье 1949 года под названием «Почему социализм?» для Monthly Review. Его мнения о большевиках также со временем менялись. В 1925 году он критиковал их за отсутствие «хорошо отрегулированной системы правления» и называл их правление «режимом террора и трагедией в истории человечества»."
 verrier.94.g: "Он нам и так не нужен."
 verrier.95.t: "Эйнштейн, политик"
 verrier.95.d: "Физик Альберт Эйнштейн получил национальное и международное признание и, по-видимому, подумывает о том, чтобы активно заняться политикой."
 verrier.95.f: "В 1918 году Эйнштейн был одним из основателей Немецкой демократической партии, либеральной партии. Его политические взгляды представляли общественный интерес в середине XX века из-за его славы и участия в политических, гуманитарных и академических проектах по всему миру. Эйнштейн был пацифистом и твёрдым сторонником глобального федерализма и мирового права. Он был сторонником социализма, особенно в более поздние годы жизни, подробно изложив свои экономические взгляды в статье 1949 года под названием «Почему социализм?» для Monthly Review. Мнения Эйнштейна о большевиках со временем менялись. В 1925 году он критиковал их за отсутствие «хорошо отрегулированной системы правления» и называл их правление «режимом террора и трагедией в истории человечества». Его видное положение в обществе позволяло ему говорить и писать откровенно, даже провокационно, в то время, когда многие люди в Европе молчали из-за подъёма нацизма в Германии. Эйнштейн был сторонником гражданских прав и использовал свою известность для осуждения американской дискриминации. Эйнштейн был пожизненным пацифистом и считал, что войны мешают прогрессу человечества."
 verrier.95.g: "Он — важная общественная фигура."
 verrier.95.h: "Он — учёный, а не политик."
 verrier.100.t: "Обсерватория"
 verrier.100.d: "Обзор важнейших астрономических статистических данных."
 verrier.100.planets: "Следующие #G [GetGlobalVariable('verrier_planets_number').GetValue]#! небесных тел признаны #T планетами#! Солнечной системы:\n"
 verrier.100.mercury: "\n#V Меркурий#!, известный с древних времён."
 verrier.100.venus: "\n#V Венера#!, известная с древних времён."
 verrier.100.earth: "\n#V Земля#!, также известная как Терра, наш дом."
 verrier.100.mars: "\n#V Марс#!, известный с древних времён."
 verrier.100.jupiter: "\n#V Юпитер#!, известный с древних времён."
 verrier.100.saturn: "\n#V Сатурн#!, известный с древних времён."
 verrier.100.moon: "\n\n#T @verrier_moon_photo! [Concept('concept_verrier_moon_photo', 'Фотографии Луны')]#! собрано: #G [ROOT.Var('verrier_moon_photo').GetValue]#!/#BLUE 10#!.\n"
 verrier.100.comets: "\n#T @verrier_comet! Больших комет#! замечено: #G [ROOT.Var('verrier_great_comet').GetValue]#!/#BLUE [GetGlobalVariable('verrier_total_verrier_great_comet').GetValue]#!.\n"
 verrier.100.objects: "\nМеждународная астрономия обнаружила в общей сложности #BLUE [GetGlobalVariable('verrier_total_astronomical_objects').GetValue]#! @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object', 'астрономических объектов')], из которых мы обнаружили #G [ROOT.Var('verrier_astronomical_objects').GetValue]#!.\n"
 verrier.100.no_galaxies: "\nМлечный Путь охватывает #E всю вселенную#!. Явления, подобные туманности Андромеды, — это #E простые облака газа#!."
 verrier.100.galaxies: "\nМлечный Путь — это лишь #E одна из многих галактик#!, составляющих вселенную. Явления, подобные туманности Андромеды, на самом деле являются #E другими галактиками#!."
 verrier.100.sun_center: "Солнце находится в #E центральной области#! Млечного Пути."
 verrier.100.sun_outer: "Солнце находится во #E внешней области#! Млечного Пути."
 verrier.100.g: "Через тернии к звёздам."
 verrier.100.h: "Посетить [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')]!"
 verrier.100.i: "Показать мне страны с наибольшим количеством астрономических открытий!"
 verrier_leave_observatory_tt: "Вы покинете обсерваторию"
 verrier.101.t: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]"
 verrier.101.d: "Наш [concept_verrier_astronomer|l], [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName], неустанно трудится, чтобы раскрыть тайны неба."
 verrier.101.g: "Через тернии к звёздам."
 verrier.101.h: "Вернуться в обсерваторию."
 verrier.111.t: "Чудеса неба"
 verrier.111.d: "Йозеф Иоганн фон Литтров, один из самых выдающихся живых астрономов Европы, опубликовал новый стандартный труд по астрономии."
 verrier.111.f: "Йозеф Иоганн фон Литтров был австрийским астрономом и инициатором новой университетской обсерватории в Вене. Будучи директором университетской обсерватории и с 1838 года деканом, он смог к 1825 году полностью перестроить устаревшую обсерваторию и оснастить её хорошими, средними инструментами. В 1834-36 годах Литтров опубликовал научно-популярную книгу «Чудеса неба», из которой за несколько лет было напечатано 14 000 экземпляров. Трёхтомное произведение стало классикой астрономической литературы и сделало Литтрова самым читаемым немецкоязычным астрономом XIX века. Литтров первоначально планировал опубликовать обширную историю астрономии в качестве заключительной части своих «Чудес неба». Однако он не смог завершить этот проект. Его история астрономии осталась в рукописи. Литтров умер в ноябре 1840 года."
 verrier.111.g: "Эта книга имеет практическую пользу."
 verrier.111.h: "Эта книга имеет теоретическую пользу."
 verrier.111.i: "Эта книга имеет образовательную пользу."
 verrier.112.t: "Боннское обозрение"
 verrier.112.d: "Прусские астрономы представили обширный звёздный каталог с ранее неизвестными [Concept('concept_verrier_astronomical_object', 'астрономическими объектами')]."
 verrier.112.f: "Боннское обозрение (BD) — это звёздный каталог (или производный от него атлас с 36 листами), основанный на визуальных измерениях звёзд северного неба. Обзор был проведён [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] в Боннской обсерватории Боннского университета. Он был проведён и опубликован между 1846 и 1863 годами при поддержке Адальберта Крюгера и Эдуарда Шёнфельда. Всего было измерено около 324 198 звёзд в диапазоне склонений от 89° до −2° до величины 9,5 (иногда до величины 10). В качестве инструмента для этого служил искатель комет, изготовленный Йозефом фон Фраунгофером, с апертурой 7,7 см и фокусным расстоянием 65 см."
 verrier.112.g: "Отлично!"
 verrier.112.h: "Наверняка [SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName] откроет ещё больше чудес неба!"
 verrier.113.t: "Марсианские каналы"
 verrier.113.d: "Один из наших астрономов сделал несколько странных наблюдений на нашей красной соседней планете."
 verrier.113.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] считается самым зорким [Concept('concept_verrier_astronomer', '#b #ORANGE астрономом#!#!')] своего века и наиболее известен своими наблюдениями планет Меркурий, Венера и Марс. На последней в 1877 году он обнаружил то, что казалось тонкими оврагами, вскоре названными СМИ марсианскими каналами и ставшими предметом исследований на 80 лет. Эти линейные структуры находились на пределе видимости 30-50-сантиметровых линзовых телескопов того времени и требовали особого опыта наблюдений. Только при следующем противостоянии Марса в 1879 году их наблюдение было подтверждено другими астрономами. [SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName] считал их естественно образовавшимися, прямолинейными впадинами длиной до 2000 км и шириной около 100 км, по которым в конечном итоге могла распространяться вода на в остальном сухой поверхности. Однако неверный перевод на английский (canals вместо правильного channels) заставил многих журналистов думать об инженерных сооружениях. Это породило научно-фантастические романы и многолетний миф о марсианах."
 verrier.113.g: "Удивительное открытие."
 verrier.113.h: "Мы должны обучить генерала против будущей марсианской угрозы!"
 verrier.113.i: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName] может дать названия большему количеству объектов, в свою честь!"
 verrier.114.t: "Комета Галлея"
 verrier.114.d: "Комета Галлея вновь появилась на небе примерно через 75 лет."
 verrier.114.f: "Галлея — единственная известная короткопериодическая комета, которая регулярно видна невооружённым глазом с Земли, и, таким образом, единственная комета, видимая невооружённым глазом, которая может появиться дважды в жизни человека. Периодические возвращения Галлеи во внутреннюю Солнечную систему наблюдались и регистрировались астрономами по всему миру по крайней мере с 240 года до н. э. Но только в 1705 году английский астроном Эдмонд Галлей понял, что эти появления были повторными появлениями одной и той же кометы. В результате этого открытия комета названа в честь Галлея. Сближение 1910 года было примечательно по нескольким причинам: это было первое сближение, о котором существуют фотографии, и первое, для которого были получены спектроскопические данные. Американский сатирик и писатель Марк Твен родился 30 ноября 1835 года, ровно через две недели после перигелия кометы. В своей автобиографии, опубликованной в 1909 году, он сказал: «Я пришёл с кометой Галлея в 1835 году. Она снова прилетит в следующем году, и я ожидаю уйти с ней. Это будет величайшее разочарование в моей жизни, если я не уйду с кометой Галлея. Всевышний, без сомнения, сказал: „Вот эти два необъяснимых чудака; они пришли вместе, они должны уйти вместе“». Твен умер 21 апреля 1910 года, на следующий день после последующего перигелия кометы."
 verrier.114.g: "Увидимся снова через 75 лет!"
 verrier.115.t: "Расширяющаяся вселенная Леметра"
 verrier.115.d: "Католический священник написал интригующую и революционную теорию о статусе и происхождении вселенной, которая может перевернуть наше прежнее мировоззрение."
 verrier.115.f: "Жорж Леметр был бельгийским католическим священником, физиком-теоретиком, математиком, астрономом и профессором физики в Католическом университете Лёвена. Он первым предположил, что удаление близлежащих галактик можно объяснить расширяющейся вселенной, что вскоре было подтверждено наблюдениями Эдвина Хаббла. Он первым вывел «закон Хаббла», теперь называемый законом Хаббла-Леметра МАС, и опубликовал первую оценку постоянной Хаббла в 1927 году, за два года до статьи Хаббла. Леметр также предложил «теорию Большого взрыва» о происхождении вселенной, назвав её «гипотезой первичного атома», а позже — «началом мира». Под названием «Однородная Вселенная постоянной массы и растущего радиуса, объясняющая радиальную скорость внегалактических туманностей» (1927), которая позже принесла ему международную известность, он представил новую идею о том, что вселенная расширяется, которую он вывел из общей теории относительности."
 verrier.115.g: "Значит, вся эта история с «большим взрывом» была придумана иезуитом? Я так и знал!"
 verrier.116.t: "Квантовая теория"
 verrier.116.d: "Своей квантовой теорией физик [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] навсегда изменил человеческое понимание атомных и субатомных процессов."
 verrier.116.f: "«Он был по натуре консервативным умом; в нём не было ничего революционного, и он был абсолютно скептически настроен по отношению к спекуляциям. Тем не менее его вера в убедительную силу логических рассуждений, основанных на фактах, была настолько сильна, что он не дрогнул, объявив самую революционную идею, которая когда-либо потрясала физику». — Макс Борн о Максе Планке \n\n Центральным предположением, лежащим в основе его нового вывода, было предположение, ныне известное как постулат Планка, что электромагнитная энергия может излучаться только в квантованной форме. Физики теперь называют эти кванты фотонами. Это предположение, несовместимое с классической физикой, считается рождением квантовой физики и величайшим интеллектуальным достижением карьеры Планка. Открытие постоянной Планка позволило ему определить новый универсальный набор физических единиц, основанный на фундаментальных физических константах, на которых основана большая часть квантовой теории. В знак признания фундаментального вклада Планка в новую отрасль физики ему была присуждена Нобелевская премия по физике за 1918 год."
 verrier.116.g: "Исторический прорыв для науки!"
 verrier.116.h: "Этот гениальный человек должен работать на нас!"
 verrier.117.t: "За пределами Млечного Пути"
 verrier.117.d: "Астроном [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] доказал, что многие объекты, ранее считавшиеся облаками пыли и газа и классифицированные как «туманности», на самом деле являются галактиками за пределами Млечного Пути."
 verrier.117.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] был американским астрономом. Он сыграл решающую роль в становлении областей внегалактической астрономии и наблюдательной космологии. Хаббл представил доказательства того, что скорость удаления галактики увеличивается с её расстоянием от Земли, свойство, ныне известное как «закон Хаббла», хотя оно было предложено двумя годами ранее Жоржем Леметром. Используя телескоп Хукера на горе Уилсон, Хаббл идентифицировал цефеиды, стандартную свечу, открытую Генриеттой Ливитт. Сравнение их видимой светимости с их истинной светимостью даёт их расстояние от Земли. Хаббл нашёл цефеиды в нескольких туманностях, включая туманность Андромеды и туманность Треугольника. Его наблюдения, сделанные в 1924 году, окончательно доказали, что эти туманности находятся слишком далеко, чтобы быть частью Млечного Пути, и на самом деле являются целыми галактиками за пределами нашей, поэтому сегодня они больше не считаются туманностями. Хаббл также разработал наиболее часто используемую систему классификации галактик, группируя их по их внешнему виду на фотографических изображениях. Он расположил различные группы галактик в том, что стало известно как последовательность Хаббла."
 verrier.117.h: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName] станет прекрасным дополнением к моей коллекции!"
 verrier.118.t: "Ядерная физика"
 verrier.118.d: "Исследования и работы, проведённые под руководством Эрнеста Резерфорда, устанавливают ядерную структуру атома и сущность радиоактивного распада как ядерного процесса."
 verrier.118.f: "Эрнест Резерфорд был новозеландским физиком, который стал известен как отец ядерной физики. Помимо работы на родине, он провёл значительную часть своей карьеры за границей, как в Канаде, так и в Великобритании. В ранних работах Резерфорд открыл понятие радиоактивного периода полураспада, радиоактивный элемент радон, а также дифференцировал и назвал альфа- и бета-излучение. Это является основанием для Нобелевской премии по химии, которую он получил в 1908 году «за его исследования в области распада элементов и химии радиоактивных веществ». Резерфорд переехал в Великобританию, где он и Томас Ройдс доказали, что альфа-излучение — это ядра гелия. Позже он предположил, что атомы имеют свой заряд, сосредоточенный в очень маленьком ядре, и тем самым положил начало модели атома Резерфорда, благодаря своему открытию и интерпретации рассеяния Резерфорда в эксперименте с золотой фольгой Ганса Гейгера и Эрнеста Марсдена. Он провёл первую искусственно вызванную ядерную реакцию в экспериментах, где ядра азота бомбардировались альфа-частицами. В результате он открыл испускание субатомной частицы, которую он назвал протоном."
 verrier.119.t: "Периодическая система"
 verrier.119.d: "Химик Дмитрий Менделеев создал версию периодической системы элементов."
 verrier.119.f: "В 1863 году было известно 56 элементов, и новый элемент открывался со скоростью примерно один в год. Другие учёные ранее определили периодичность элементов. Став учителем в 1867 году, Менделеев написал «Основы химии», которые стали основным учебником своего времени. Он был опубликован в двух томах между 1868 и 1870 годами, и Менделеев написал его, готовя учебник для своего курса. Пытаясь классифицировать элементы по их химическим свойствам, он заметил закономерности, которые привели его к постулированию своей периодической таблицы; он утверждал, что увидел полное расположение элементов во сне: «Я увидел во сне таблицу, где все элементы встали на свои места, как требовалось. Проснувшись, я немедленно записал её на листе бумаги, только в одном месте позже потребовалась поправка». Добавляя дополнительные элементы, следуя этому образцу, Менделеев разработал свою расширенную версию периодической таблицы. Менделеев опубликовал свою периодическую таблицу всех известных элементов и предсказал несколько новых элементов для завершения таблицы в русскоязычном журнале."
 verrier.120.t: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]"
 verrier.120.d: "Самый известный [concept_verrier_astronomer|l] Франции написал компендиум о небесных телах Солнечной системы."
 verrier.120.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] был французским астрономом и математиком, который специализировался на небесной механике и наиболее известен тем, что предсказал существование и положение Нептуна, используя только математику. Расчёты были сделаны для объяснения расхождений с орбитой Урана и законами Кеплера и Ньютона. Леверье отправил координаты Иоганну Готфриду Галле в Берлин, попросив его проверить. Галле нашёл Нептун в ту же ночь, когда получил письмо Леверье, в пределах 1° от предсказанного положения. После этого Леверье взял на себя задачу «...охватить в одной работе всю планетную систему, по возможности привести всё в гармонию, в противном случае с уверенностью заявить, что существуют ещё неизвестные причины возмущений...», работа, которая заняла у него остаток жизни. Леверье начал с переоценки до 7-го порядка техники вычисления планетных возмущений, известной как функция возмущения. Этот вывод, который привёл к 469 математическим терминам, был завершён к 1849 году. Затем он собрал наблюдения положений планет вплоть до 1750 года. Изучение их и исправление несоответствий с самыми последними данными занимало его до 1852 года. Таблицы легли в основу фундаментальных эфемерид Connaissance des Temps, астрономического альманаха Бюро долгот, примерно до 1912 года."
 verrier.120.h: "Он должен служить нам."
 verrier_congress_attend_modifier: "Посещение астрономического конгресса"
 verrier.121.t: "Открыта Астрея"
 verrier.121.d: "Прусский астроном-любитель Карл Людвиг Хенке случайно открыл новую планету и назвал её «Астрея»."
 verrier.121.f: "Карл Людвиг Хенке — на самом деле бывший почтовый секретарь — в отставке посвятил себя своей страсти, астрономии. 8 декабря 1845 года он открыл пятый астероид в Солнечной системе, Астрею. Это было почти через 40 лет после открытия последней «планеты» Весты. Король Пруссии назначил ему ежегодную пенсию в 1200 марок за это открытие. Открытие Астреи должно было стать прелюдией к дальнейшим открытиям в поясе астероидов и было последним крупным открытием небесного тела до открытия Нептуна. В то же время «Астрея» вызвала рост сомнений в том, заслуживают ли такие маленькие объекты в космосе на самом деле названия «планета». В то время Александр фон Гумбольдт предложил сгруппировать небесные тела в отдельную категорию: астероид."
 verrier.121.g: "Двенадцатая планета!"
 verrier.122.g: "Кажется, в наши дни каждый камень объявляют планетой."
 verrier.200.t: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] определяет расстояние до 61 Лебедя в 11,4 световых лет"
 verrier.200.d: "Одним махом вселенная стала намного больше. Используя параллакс 61 Лебедя, [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] определил[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] расстояние до звезды в 11,4 световых лет. Эта техника позволит добиться огромного прогресса в изучении вселенной."
 verrier.200.f: "В 1836 году немецкому астроному Фридриху Бесселю впервые удалось определить расстояние до звезды. Для этого он использовал параллакс, который использует движение Земли для регистрации относительного положения неподвижной звезды на фоне. Это похоже на то, как смотреть на объект сначала правым глазом, а затем левым.\n\nЗатем из этого изменения положения можно рассчитать расстояние."
 verrier.200.g: "Великий день для астрономии!"
 verrier_modern_astronomy_invented_modifier: "Первое измерение расстояния до звезды"
 verrier.201.t: "[SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] наш[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'ла', 'ёл')] причину линий Фраунгофера"
 verrier.201.d: "Долгое время причина тонких чёрных линий в солнечном спектре была предметом спекуляций. Но теперь доктор [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName] наконец-то наш[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'ла', 'ёл')] их причину: определённые химические элементы вызывают появление этих линий. Это даёт возможность выяснить, какие элементы присутствуют на звёздах."
 verrier.201.f: "Йозеф Фраунгофер заметил отчётливые линии в спектре Солнца в 1813 году. Лишь десятилетия спустя Густав Роберт Кирхгоф и Роберт Бунзен нашли причину этих линий. Сжигая различные элементы и химические соединения, они заметили, что эти элементы поглощают определённые части спектра. Поэтому они утверждали, что поглощение определённых частей спектра является свидетельством наличия определённого химического соединения или элемента во внешней части звезды.\n\nСпектроскопия не только позволила классифицировать звёзды по их типу, но и позволила проводить спектроскопический анализ материалов и химических веществ. Даже открытие гелия произошло благодаря спектроскопии Солнца."
 verrier.201.g: "Ещё одна тайна вселенной разгадана!"
 verrier.1001.t: "Строительство Тара Вали Коти"
 verrier.1001.d: "Строительство нашей обсерватории Тара Вали Коти идёт медленно. В прошлом году подполковник [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] был назначен королевским [Concept('concept_verrier_astronomer', '#b #ORANGE астрономом#!#!')] в надежде на более быстрое строительство. Строительство, вероятно, займёт ещё несколько лет, если мы не поддержим Уилкокса деньгами и знаниями. Но первый вопрос — хотим ли мы вообще продолжать строительство здания."
 verrier.1001.f: "Тара Вали Коти была обсерваторией, заказанной королём Насир-уд-Дином Хайдером, который интересовался астрономией и астрологией и даже изучал астрономию в Калькутте.\nСтроительство Тара Вали Коти, или в переводе «Особняк звёзд», началось в 1832 году и потребовало 9 лет для завершения в 1841 году. Она использовалась всего несколько лет и позже использовалась как штаб-квартира во время индийского восстания. Позже она использовалась как банк."
 verrier.1001.g: "Под руководством [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] мы увидим быстрый прогресс!"
 verrier.1001.h: "Это пустая трата денег!"
 stop_constructing_tara_wali_kothi_tt: "Мы не будем продолжать строительство обсерватории Тара Вали Коти. У вас больше никогда не будет шанса её построить."
 verrier.1002.t: "Тара Вали Коти завершена"
 verrier.1002.d: "После многих лет строительства Тара Вали Коти наконец-то завершена и будет вмещать новейшие астрономические инструменты и вести нас к великим открытиям."
 verrier.1002.f: "[ROOT.GetCountry.GetRuler.GetFullName] смотрел в большой телескоп, ища звёзды и планеты. Теперь, когда Тара Вали Коти наконец-то построена, здание будет вмещать величайшие умы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и предоставлять классы для студентов. Это был огромный шаг в будущее."
 verrier.1002.g: "Особняк звёзд приведёт нас к новым открытиям!"
 je_verrier_tara_wali_kothi: "Строительство Тара Вали Коти"
 je_verrier_tara_wali_kothi_reason: "Обсерватория Тара Вали Коти строится в королевстве Авад. На прогресс можно влиять разными способами."
 je_verrier_tara_wali_kothi_goal: "Прогресс строительства должен достичь 60 или выше."
 je_verrier_tara_wali_kothi_success: "Прогресс строительства равен или выше 60."
 verrier_add_20_tara_wali_kothi_progress_tt: "Добавить #p 20 очков прогресса#! к строительству Тара Вали Коти."
 verrier_add_10_tara_wali_kothi_progress_tt: "Добавить #p 10 очков прогресса#! к строительству Тара Вали Коти."
 verrier_kothe_buy_additional_instruments_button: "Купить современные астрономические инструменты"
 verrier_kothe_buy_additional_instruments_button_desc: "Купите современные астрономические инструменты для Тара Вали Коти. Это поможет нам завершить строительство раньше."
 verrier_kothe_employ_physics_teachers_button: "Нанять учителей физики"
 verrier_kothe_employ_physics_teachers_button_desc: "Наймите учителей для своих школ, которые будут преподавать новейшие открытия физики и астрономии. Это поможет нам быстрее закончить Тара Вали Коти и даст нам исследовательский импульс."
 verrier_kothe_employ_foreign_engineers_button: "Нанять иностранных инженеров"
 verrier_kothe_employ_foreign_engineers_button_desc: "Наймите иностранных инженеров для создания необходимых астрономических инструментов и зданий для Тара Вали Коти. Это поможет нам завершить строительство раньше."
 verrier_kothe_pay_workers_extra_button: "Заплатить рабочим дополнительно"
 verrier_kothe_pay_workers_extra_button_desc: "Чтобы завершить строительство быстрее, мы заплатим рабочим дополнительно. Это поможет нам завершить строительство раньше."
 verrier.1011.t: "Началось строительство Афинской национальной обсерватории"
 verrier.1011.d: "Первая греческая обсерватория стала ещё одним шагом на пути Греции к новому времени. Огромная толпа собралась на холме Нимф, чтобы наблюдать за этой вехой в истории Греции. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] был там вместе с членами правительства и греческой церкви. Все они праздновали, произносили речи и смотрели на небо."
 verrier.1011.f: "   Под аплодисменты народа был заложен фундамент здания. На камне было выгравировано изображение Солнечной системы, что подходило для новой обсерватории Греции.\n\n   #b Исторически, #! строительство Афинской национальной обсерватории началось 26 июня 1842 года, в день солнечного затмения. Это произошло после многих лет лоббирования со стороны греческого астронома Георгиоса Константиноса Вуриса, который, вероятно, был самым известным греческим учёным своего времени.\n   Поскольку Вурис долгое время жил в Австрии, у него были хорошие связи как с австрийцами, так и с греками. Он убедил греко-австрийского банкира и предпринимателя Георгиоса Синаса пожертвовать на это дело. Первое здание обсерватории было названо в честь Синаса."
 verrier.1011.a: "Скоро мы сможем наблюдать за звёздами с беспрецедентной точностью."
 verrier.1012.t: "Астрономы начинают наблюдать за небом в Афинской национальной обсерватории"
 verrier.1012.d: "Строительство Афинской национальной обсерватории, первой обсерватории Греции, было завершено сегодня. Обсерватория является первым исследовательским институтом в Греции и огромной вехой научного сообщества в Греции. Её астрономы сосредоточатся на наблюдении за Солнцем, Луной и звёздами. Надеемся, их работа приведёт к новым открытиям в области астрономии."
 verrier.1012.f: "Луна была хорошо видна в телескоп. Она выглядела потрясающе. Можно было даже увидеть маленькие кратеры на ней.\n\n#b Исторически, #! обсерватория начала свою работу в 1856 году под руководством греческого астронома Георгиоса Константиноса Вуриса, два года спустя Вурис заболел и ушёл на пенсию в Вене. Его преемник, Иоганн Фридрих Юлиус Шмидт, расширил библиотеку обсерватории и наблюдал за многими [Concept('concept_verrier_astronomical_object', 'астрономическими объектами')]. Одним из его основных направлений была Луна. Его главный труд, «Топографическая карта Луны», содержал точные рисунки всей видимой поверхности Луны. Он также заметил, что кратер Линне претерпел морфологические изменения.\n   Шмидт также публиковал работы по землетрясениям и метеорологии и пытался найти Трою.\n\n   Обсерватория на холме Нимф всё ещё используется, но есть ещё три объекта, которые являются частью Национальной обсерватории Афин: астрономическая станция Пентели, астрономическая станция Крионери и обсерватория Хелмос."
 verrier.1012.g: "Какие чудеса мы откроем?"
 verrier.1012.h: "Я уверен, что Вурис сделает великие открытия!"
 verrier.1013.t: "Первые студенты в Афинском университете"
 verrier.1013.d: "Король Оттон использовал свои связи с различными европейскими учёными для создания нового университета, Othóneion Panepistímion или Афинского университета. Многие из новых профессоров были греками, получившими образование на Западе. Эти учёные и исследователи принесут в Грецию значительные знания и будут обучать следующее поколение. Сейчас университет расположен в доме архитекторов Стаматиоса Клеантиса и Эдуарда Шауберта, но он переедет, как только будет достроено главное здание."
 verrier.1013.g: "Эти знания помогут нам сократить отставание от великих держав!"
 verrier.1013.h: "Нам не нужна помощь иностранцев!"
 verrier.1050.t: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName]"
 verrier.1050.d: "Математик и астроном [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] является наблюдателем Лейпцигской обсерватории. Только в этом году он опубликовал свою новейшую работу по астрономии «Основные положения астрономии». Он, безусловно, был бы полезен в качестве официального [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')]."
 verrier.1050.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] был одновременно математиком и астрономом. Он опубликовал много книг по астрономии, а также преподавал её в Лейпцигском университете. В математике он в основном занимался топологией, разделом геометрии, который занимается положением и расположением геометрических объектов. Наиболее известна лента Мёбиуса, которую Мёбиус изобрёл, чтобы показать, что поверхность не обязательно имеет две стороны."
 verrier.1050.g: "Прекрасно!"
 verrier.1050.h: "Он должен стать нашим главным [Concept('concept_verrier_astronomer', '#b #ORANGE астрономом#!#!')]!"
 verrier.1060.t: "Комета, задевшая Солнце, наполнила казну Гарварда"
 verrier.1060.d: "После того как яркая комета стала видна даже днём, в Гарвардский университет поступило большое количество пожертвований от жителей Бостона. Деньги будут использованы для строительства обсерватории. Предыдущий наблюдатель университета, [SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName], в восторге от возможности создания современной обсерватории."
 verrier.1060.f: "[SCOPE.sCharacter('verrier_new_astronomer_scope').GetFullName] изначально был часовщиком и одновременно астрономом-любителем. В своём первом доме он построил обсерваторию, с помощью которой измерял небо. В 1839 году он был назначен неоплачиваемым наблюдателем в Гарвардском университете, при этом ему пришлось привезти собственное оборудование. Когда в 1843 году в университет поступили пожертвования в размере 25 730 долларов США, он смог построить современную обсерваторию.\n[SCOPE.sCharacter('verrier_new_astronomer_scope').GetLastName] удалось, среди прочего, открыть спутник Сатурна Гиперион и вместе со своим сыном открыть самое внутреннее кольцо Сатурна. Он также был пионером астрофотографии. Ему удалось сделать первый в Америке снимок звезды."
 verrier.1060.g: "Нам не нужна помощь Бонда!"
 verrier.1060.h: "Бонд приведёт нас в новую эру астрономии!"
 verrier.1060.i: "Нам не нужны пожертвованные деньги!"
 verrier.1100.t: "Стрессовая работа"
 verrier.1100.d: "Ваш [concept_verrier_astronomer|l], [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], сильно устал[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')]. Может, нам стоит дать [SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'ей', 'ему')] отдохнуть?"
 verrier.1100.f: "Я ДОЛЖЕН найти больше звёзд! Их там так много! Как я могу не найти ни одной, которую ещё никто не нашёл? А как насчёт комет и астероидов? Я должен что-то найти!\nМожет, марсиан? Подождите, марсиане реальны? Или я имел в виду марсианские каналы? Я не помню. И где опять мои заметки?"
 verrier.1100.g: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] нуждается в отдыхе!"
 verrier.1100.h: "Это [SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'её', 'его')] работа. [SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'Ей', 'Ему')] платят за открытие звёзд, а не за перерывы!"
 astronomer_on_break_tt: "Ваш [concept_verrier_astronomer|l] возьмёт перерыв на #n 1#! год. В это время вы не будете получать никаких обычных событий."
 verrier.1101.t: "Доктор [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] сходит с ума?"
 verrier.1101.d: "Ваш [concept_verrier_astronomer|l], [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], кажется, всё больше и больше забывает. Может, [SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'ей', 'ему')] пора уйти с поста [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')]?"
 verrier.1101.f: "Куда я дел эти заметки? Подождите, куда я дел свой обед? И что это за странная штука на моём телескопе? Это... это мой обед?\nПодождите, что это за запах? Это пожар? Как это случилось!?"
 verrier.1101.g: "Я не думаю, что [SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'ей', 'ему')] следует продолжать работать."
 verrier.1101.h: "Пфф, это совершенно нормально!"
 verrier.1110.t: "Двойная звезда исчезла"
 verrier.1110.d: "Наш [concept_verrier_astronomer|l], [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], был[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] уверен[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')], что идентифицировал[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] две двойные звезды, которые вели себя абсолютно одинаково ночью. Когда другие [Concept('concept_verrier_astronomer', '#b #ORANGE астрономы#!#!')] попытались найти эти звёзды, они смогли найти только одну. Похоже, у [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] серьёзные проблемы с глазами или с алкоголем."
 verrier.1110.f: "Клянусь! *ик* Там была вторая звезда! *ик* Она была хорошо видна *ик* и была идеальной копией. *ик* Она, должно быть, исчезла. *ик* Или, может, мои коллеги лгут! *ик* Кто знает!"
 verrier.1110.g: "[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'Ей', 'Ему')|U] нужно взять себя в руки!"
 verrier.1111.t: "Уничтожены исследовательские заметки"
 verrier.1111.d: "Ужасный инцидент в [Concept('concept_verrier_observatory', 'обсерватории')] вызвал пожар, который уничтожил несколько исследовательских заметок нашего [Concept('concept_verrier_astronomer', '#b #ORANGE астронома#!#!')], [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName]. Похоже, свеча подожгла эти исследовательские заметки, но мы не уверены, почему [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] не остановил[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] пламя."
 verrier.1111.f: "Я не знаю, как это произошло! Я очень усердно работал[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] и, должно быть, был[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] так занят[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] телескопом, что просто не заметил[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')]!"
 verrier.1111.g: "[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'Она', 'Он')] был[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] пьян[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] или что-то в этом роде?"
 verrier.1111.h: "[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'Она', 'Он')] был[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] под наркотиками?"
 verrier.1111.i: "У [SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'неё', 'него')] был очередной срыв?"
 verrier.1111.j: "[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'Она', 'Он')] снова забыл[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] свечи?"
 verrier.1112.t: "Потерянные звёзды"
 verrier.1112.d: "Несколько дней назад наш [concept_verrier_astronomer|l], [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], наш[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'ла', 'ёл')] различные новые звёзды. К сожалению, [SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'она', 'он')] , кажется, потерял[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] свои заметки о них и не может найти звёзды снова. Мы не знаем, исчезли ли они, или [SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'она', 'он')] забыл[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')], где [SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'она', 'он')] их наш[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'ла', 'ёл')]."
 verrier.1112.f: "Где эти заметки? Я искал[SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'а', '')] везде! На кухне, в мусорке, на моём столе... Везде!\nИ звёзды тоже исчезли! Как это могло случиться!"
 verrier.1112.g: "Надеюсь, [SelectLocalization(SCOPE.sCharacter('verrier_astronomer_scope').IsFemale, 'она', 'он')] снова найдёт звёзды!"
