 je_verrier_neptune_satellites: "Неизвестный спутник Нептуна"
 verrier.55.t: "Тёмная сторона"
 verrier.55.d: "Наш [concept_verrier_astronomer|l], проявив удачу и мастерство, сумел сделать фотографию либрации Луны!"
 verrier.55.f: "Это тонкое явление, почти незаметное, но Луна не идеально зафиксирована своей стороной к Земле. Неровности в её орбите достаточны, чтобы дать крошечный проблеск на иначе недоступную обратную сторону, тонкие намёки, которые дают ценное представление о самых сокровенных тайнах Луны. Фотографировать такие виды, которые иначе никогда не были бы увидены, — это в такой же степени дело удачи, как и мастерства, ибо это означает сидеть часами в одиночестве с камерой, постоянно молясь, чтобы время было выбрано идеально для получения идеального снимка.\n\nНо если они сделают это правильно. Тогда они смогут увидеть часть древнего спутника Земли, которую никогда по-настоящему не видели раньше, даже за всю историю."
 verrier.55.g: "Однажды мы увидим всю Луну с обратной стороны."
