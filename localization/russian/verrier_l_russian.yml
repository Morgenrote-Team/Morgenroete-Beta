 je_verrier_astro_physics: "Астрофизика"
 je_verrier_astro_physics_reason: "Новые физические открытия революционизировали мир науки. Астрономия также не осталась в стороне. Обе научные дисциплины находятся в плодотворном обмене, и теоретическая и наблюдательная физика могут внести свой вклад в лучшее понимание вселенной."
 verrier_astro_physics_tech: "Астрофизика"
 verrier_astro_physics_tech_desc: "Астрофизика — это наука, которая применяет методы и принципы физики и химии при изучении астрономических объектов и явлений. Как сказал один из основателей этой дисциплины, Джеймс Килер, астрофизика «стремится выяснить природу небесных тел, а не их положение или движение в пространстве — что они есть, а не где они находятся»."
 verrier_modern_physics_tech: "Современная физика"
 verrier_modern_physics_tech_desc: "Современная физика — это раздел физики, который развился в начале XX века. Заметные разделы современной физики включают квантовую механику, специальную теорию относительности и общую теорию относительности. Она занимается экстремальными условиями, такими как высокие скорости, сравнимые со скоростью света, малые расстояния, сравнимые с атомным радиусом, и очень высокие энергии."
 verrier_nuclear_physics_tech: "Ядерная физика"
 verrier_nuclear_physics_tech_desc: "Ядерная физика — это раздел физики, который занимается структурой и поведением атомных ядер. Ядерная физика занимается выяснением ядерной структуры, то есть деталей строения атомных ядер и их реакций. Для этого, например, экспериментально и теоретически исследуются спонтанные превращения ядер (радиоактивность), процессы рассеяния на ядрах и реакции с ядрами. Технологии, основанные на ядерном делении и ядерном синтезе, основаны на исследованиях в области ядерной физики."
 verrier_first_sun_photo_modifier: "Первая фотография солнечного затмения"
 verrier_helium_discovered_modifier: "Солнечный элемент"
 verrier_comet_observer: "Наблюдатель комет"
 verrier_comet_observer_desc: "Этот [concept_verrier_astronomer|l] открыл большую комету, названную в его честь."
 verrier_magnetic_storm_observer: "Наблюдатель магнитной бури"
 verrier_magnetic_storm_observer_desc: "Этот [concept_verrier_astronomer|l] внимательно наблюдал и изучал магнитную бурю, вызванную солнечной вспышкой."
 verrier_solar_observer: "Наблюдатель Солнца"
 verrier_solar_observer_desc: "Этот [concept_verrier_astronomer|l] наблюдал солнечное затмение и получил ценные научные знания."
 verrier.152.t: "Солнечное затмение"
 verrier.152.d: "В этом году произошло редкое явление: над городом [ROOT.GetCountry.GetCapital.GetCityHubName] появилось полное солнечное затмение. [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName] получил[SelectLocalization(GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] уникальную возможность наблюдать его более подробно."
 verrier.152.f: "Земное солнечное затмение — это астрономическое явление, при котором Солнце частично или полностью закрывается Луной при наблюдении с определённых областей на Земле. Тень Луны проходит по Земле, что возможно только во время новолуния. Солнечные затмения часто использовались для получения новых сведений о Солнце в частности и о вселенной в целом. Полное солнечное затмение 29 мая 1919 года, наблюдавшееся на африканском острове Принсипи экспедицией под руководством Артура Стэнли Эддингтона, привлекло особое внимание в связи с теорией относительности, разработанной несколькими годами ранее Альбертом Эйнштейном, которая, среди прочего, предсказывала отклонение света далёких звёзд гравитационным полем Солнца — что было подтверждено наблюдениями."
 verrier.152.g: "Очень редкое явление!"
 verrier.153.t: "Чётки [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName]"
 verrier.153.d: "Наш [concept_verrier_astronomer|l], [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName], имел[SelectLocalization(GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] необыкновенную возможность более подробно наблюдать солнечную корону и выдающиеся объекты во время последнего солнечного затмения. Учёный отнёс их к частям солнечной атмосферы."
 verrier.153.f: "Чётки Бейли, эффект алмазного кольца или, реже, эффект двойного алмазного кольца — это особенности полных и кольцевых солнечных затмений. Хотя они вызваны одним и тем же явлением, это разные события во время этих типов солнечных затмений. Когда Луна закрывает Солнце во время солнечного затмения, неровный рельеф лунного лимба позволяет бусинкам солнечного света пробиваться в одних местах, а в других — нет. Они названы в честь Фрэнсиса Бейли, который объяснил эти эффекты в 1836 году. Эффекты алмазного кольца видны, когда остаётся одна или две бусинки, выглядящие как сияющие «алмазы», вставленные в яркое кольцо вокруг лунного силуэта."
 verrier.153.g: "Это явление следует назвать в честь доктора [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetLastName]."
 verrier.154.t: "Первая фотография солнечного затмения"
 verrier.154.d: "С помощью нового технического процесса доктору [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName] удалось сделать первую фотографию солнечного затмения."
 verrier.154.f: "Фотографирование такого редкого события, как полное затмение, ставило перед ранней фотографией уникальные задачи, включая экстремальный контраст между короной и тёмной тенью Луны, а также необычный угол, под которым нужно было ориентировать фотографическое оборудование. До затмения 28 июля 1851 года ещё не было получено ни одной правильно экспонированной фотографии солнечной короны. По этому случаю Королевская прусская обсерватория в Кёнигсберге поручила одному из самых искусных дагерротипистов города, Иоганну Юлиусу Фридриху Берковскому, сделать неподвижный снимок этого события. Наблюдатели прикрепили небольшой шестисантиметровый рефрактор к 15,8-сантиметровому гелиометру Фраунгофера, и Берковский сделал восьмидесятичетырёхсекундную экспозицию вскоре после начала полной фазы."
 verrier.154.g: "Идеально."
 verrier.155.t: "Солнечный элемент"
 verrier.155.d: "Используя новую спектрографическую технику, доктор [GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.GetFullName] сделал[SelectLocalization(GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] замечательное открытие во время последнего солнечного затмения. Похоже, он[SelectLocalization(GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] открыл[SelectLocalization(GetPlayer.MakeScope.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'а', '')] новый элемент. Сначала ему никто не хотел верить, но химик, доктор [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName], только что подтвердил[SelectLocalization(GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.IsFemale, 'а', '')] это открытие."
 verrier.155.f: "Свидетельства существования элемента гелия были впервые получены по ярко-жёлтой спектральной линии на длине волны 587,49 нанометра в спектре хромосферы Солнца. Французский астроном Жюль Жансен сделал это наблюдение в Индии во время полного солнечного затмения 18 августа 1868 года. Когда он объявил о своём открытии, ему сначала никто не поверил, потому что ни один новый элемент никогда не был найден в космосе до того, как его существование могло быть доказано на планете Земля. 20 октября того же года англичанин Норман Локьер подтвердил, что жёлтая линия действительно присутствует в солнечном спектре, и пришёл к выводу, что она вызвана ранее неизвестным элементом. Поскольку эта спектральная линия была очень близка (1,8 нм от центра) к двойной D-линии Фраунгофера (D2 = 589,00 нм, D1 = 589,60 нм) металла натрия, он назвал эту линию D3, чтобы отличить её от этих линий D1 и D2 натрия. Он и его английский коллега Эдвард Франкленд предложили назвать новый элемент гелием (от греческого helios, солнце)."
 verrier.155.g: "Гелий? Подходящее название для солнечного элемента!"
