 pm_curie_nuclear_reactor: "Ядерный реактор"
 curie_nuclear_reactor_tech: "Ядерный реактор"
 curie_nuclear_reactor_tech_desc: "Путь к управляемому ядерному делению начался в 1942 году с «Чикагской поленницы-1», первого в мире искусственного ядерного реактора, который продемонстрировал самоподдерживающуюся цепную реакцию под трибунами стадиона. На этой основе затем появился графитовый реактор X-10 в Теннесси, служивший опытной установкой для проверки крупномасштабного производства плутония и работы с интенсивным излучением. Вершиной этой эпохи стал реактор B в Хэнфорде, первый в мире полноразмерный промышленный реактор, который окончательно сделал промышленное применение ядерной энергии реальностью."
 curie_the_bomb_tech: "Бомба"
 curie_the_bomb_tech_desc: "«Теперь я стал Смертью, разрушителем миров»."
 curie_nuclear_fission_tech: "Ядерное деление"
 curie_nuclear_fission_tech_desc: "В конце 1930-х годов исследователям впервые удалось расщепить тяжёлые атомные ядра, бомбардируя их нейтронами, и тем самым открыть прежде немыслимый источник энергии внутри материи. Этот научный прорыв обозначил переход от теоретической физики к практическому овладению силами, связывающими вселенную воедино."
 curie_facility_can_construct_only_facility_tt: "У нас ещё нет ядерного исследовательского центра."
 curie_rocket_science_tech: "Ракетная техника"
 curie_rocket_science_tech_desc: "На рубеже XX века ракетная техника перешла из области научной фантастики в строгую теоретическую систему, во многом благодаря русскому визионеру Константину Циолковскому. В своей основополагающей работе 1903 года Циолковский вывел фундаментальное уравнение ракеты, доказав, что космические полёты математически возможны с помощью многоступенчатых ракет и жидкого топлива. Трансильванско-немецкий физик Герман Оберт независимо разработал принципы астронавтики в 1920-е годы, предоставив инженерные чертежи, которые позднее вдохновили первое поколение практических ракетных инженеров."
 curie_modern_rockets_tech: "Современные ракеты"
 curie_modern_rockets_tech_desc: "Роберт Годдард перевёл ракетную технику в практическую эпоху, запустив первые ракеты на жидком топливе и разработав важные системы, такие как гироскопическая стабилизация. В Германии исследования усилились в Обществе космических путешествий, где молодой Вернер фон Браун начал совершенствовать инженерные решения, необходимые для крупномасштабной тяги. В итоге этот период привёл к переходу технологий от частных экспериментов к масштабным государственным проектам, завершившись созданием первых ракет, способных достичь границы космоса."
