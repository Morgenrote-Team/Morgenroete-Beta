 curie.10.t: "Уран найден в [SCOPE.sState('curie_uranium_state_scope').GetName]"
 curie.10.d: "Геологи обнаружили исключительно богатые залежи урана во время сбора образцов в [SCOPE.sState('curie_uranium_state_scope').GetName]. Физики и химии чрезвычайно заинтересованы."
 curie.10.f: "Уран (названный в честь планеты Уран) - химический элемент с символом U и атомным номером 92. Соединения урана использовались на протяжении 19 века для окрашивания стекла и керамики, ваз и декоративных изделий, а также предметов повседневного обихода, таких как чаши или бокалы. Производители стекла в Иоахимстале (Богемия) использовали эту технологию еще в 1826 году. Уран использовался для окрашивания стекла до середины XX века, только затем его заменили другими, менее вредными красящими минералами. Ураносодержащая керамическая глазурь от оранжевого до ярко-красного цвета использовалась для изготовления всего, от посуды до архитектурных аксессуаров. Эта керамика, называемая в США \"Fiestaware\" по названию производителя, вероятно, является одним из самых радиоактивных предметов, которые до сих пор можно найти во многих американских домах."
 curie.10.g: "Блестящие перспективы!"
