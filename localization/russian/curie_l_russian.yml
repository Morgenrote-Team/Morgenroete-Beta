 curie.11.d: "Д-р [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('agassiz_geologist_var').GetCharacter.IsFemale, 'обнаружила', 'обнаружил')] исключительно богатые залежи урана во время сбора образцов в [SCOPE.sState('curie_uranium_state_scope').GetCustom('RU_SL_PP')]. Физики и химики рекомендуют немедленно начать разработку месторождения."
 curie.11.f: "Уран (названный в честь планеты Уран) - химический элемент с символом U и атомным номером 92. Соединения урана использовались на протяжении XIX века для окрашивания стекла и керамики, ваз и декоративных изделий, а также предметов быта, таких как миски или стаканы. Стеклодувы в Иоахимстале (Богемия) использовали эту технику уже в 1826 году. Уран использовался для окрашивания стекла до середины XX века, после чего его заменили другими, менее вредными красящими минералами. Урансодержащие керамические глазури от оранжевого до ярко-красного цвета использовались на всём, от посуды до архитектурных аксессуаров. Эта керамика, называемая в США «Fiestaware» по названию одного из производителей, вероятно, является одним из самых радиоактивных предметов, которые до сих пор можно найти во многих американских домах."
 curie.11.g: "Построить там урановый рудник!"
 curie.12.t: "Иоахимсталь"
 curie.12.d: "До сих пор урановый рудник в Иоахимстале, Богемия, давал лишь небольшие объёмы добычи. С возросшим спросом из-за потенциального использования урана в производстве и науке, теперь планируется значительно увеличить производство."
 curie.12.g: "Иоахимсталь станет центром добычи урана!"
