 curie.10.f: "Уран (названный в честь планеты Уран) - химический элемент с символом U и атомным номером 92. Соединения урана использовались на протяжении XIX века для окрашивания стекла и керамики, ваз и декоративных изделий, а также предметов быта, таких как миски или стаканы. Стеклодувы в Иоахимстале (Богемия) использовали эту технику уже в 1826 году. Уран использовался для окрашивания стекла до середины XX века, после чего его заменили другими, менее вредными красящими минералами. Урансодержащие керамические глазури от оранжевого до ярко-красного цвета использовались на всём, от посуды до архитектурных аксессуаров. Эта керамика, называемая в США «Fiestaware» по названию одного из производителей, вероятно, является одним из самых радиоактивных предметов, которые до сих пор можно найти во многих американских домах."
