 mfe_industry_events.1.t: "Появление железнодорожной компании"
 mfe_industry_events.1.d: "Политик со связями, [SCOPE.sCharacter('rich_dude').GetFullName], хочет профинансировать новую железнодорожную компанию, но [SCOPE.gsInterestGroup('ig_intelligentsia').GetName] не поддерживает это предложение."
 mfe_industry_events.1.f: "«Железнодорожная лихорадка охватывает весь мир, открывая множество возможностей для заработка, но мы должны действовать, и действовать быстро. Что скажете?»"
 mfe_industry_events.1.a: "Пусть [SCOPE.sCharacter('rich_dude').GetFullName] продолжает своё дело."
 mfe_industry_events.1.b: "Заблокировать все дальнейшие попытки."
 mfe_industry_events.1.c: "Субсидировать их усилия."
 mfe_industry_events.2.t: "Процветающая железнодорожная компания"
 mfe_industry_events.2.d: "Новые железные дороги в [SCOPE.sState('railway_state').GetCustom('RU_SL_PP')] пользуются огромным успехом у местных жителей, которые приняли их с восторгом."
 mfe_industry_events.2.f: "«Раньше путешествие из [SCOPE.sState('railway_state').GetCustom('RU_SL_RP')] в столицу [ROOT.GetCountry.GetCapital.GetName] занимало три часа, но эти новые маршруты сокращают время в пути вдвое»."
 mfe_industry_events.2.a: "Это великолепно!"
 mfe_industry_events.3.t: "Железнодорожная компания в беде"
 mfe_industry_events.3.d: "Из-за внезапных изменений на фондовом рынке [SCOPE.gsInterestGroup('ig_industrialists').GetName] столкнулись с давлением и нехваткой капитала. Теперь раздутые железнодорожные компании в [SCOPE.sState('railway_state').GetCustom('RU_SL_PP')] терпят крах."
 mfe_industry_events.3.f: "«Конечно, пресса этим вовсю пользуется — каждый день [SCOPE.gsInterestGroup('ig_intelligentsia').GetName] публикует статьи, злорадствуя над нашим отчаянием. Нужно что-то делать»."
 mfe_industry_events.3.a: "Субсидировать железные дороги!"
 mfe_industry_events.3.b: "[SCOPE.gsInterestGroup('ig_industrialists').GetName] сами хотели свободного рынка..."
 subsidize_rail_state_tt: "Начать субсидирование железных дорог в [SCOPE.sState('railway_state').GetCustom('RU_SL_PP')]"