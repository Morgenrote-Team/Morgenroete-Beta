 objective_thriving_culture_name_SWE: "Швеция"
 objective_thriving_culture_desc_SWE: "За последние 100 лет Швеция стала одной из ведущих научных держав, внеся значительный вклад в науку, включая систему наименования организмов, температурную шкалу Цельсия и систему символов для химических элементов. \n   Сможет ли Швеция удержать свои позиции на переднем крае науки, или пришло время перенаправить внимание на культурные цели, взращивая писателей и композиторов?"
