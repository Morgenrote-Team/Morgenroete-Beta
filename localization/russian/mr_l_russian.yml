 objective_thriving_culture_name_BAV: "Bavaria"
 objective_thriving_culture_desc_BAV: "Culturally, Bavaria has always been able to compete with the large German states. The 19th century was a time when art and architecture were booming in Munich. In addition to Walhalla and Neuschwanstein, Bavaria is also the location where Archaeopteryx was found, the home of the Munich Secession and the birthplace of Spitzweg. As a German middle power, can Bavaria defend itself against its large neighbors by relying less on the military and more on science and art?"
 objective_thriving_culture_name_MEX: "Mexico"
 objective_thriving_culture_desc_MEX: "At first glance, Mexico might not seem like the first choice when it comes to making a culture flourish. But its rich archaeological history is promising. In theory, Mexico could even achieve a breakthrough in the Northwest Passage. If the country, shaken by crises, finds harmony, it can crown its success aesthetically with the Palacio de Bellas Artes."
 je_mr_morgenrote_introduction_reason: "[concept_morgenroete] is a mod that focuses on science, arts and culture. It includes many new mechanics and a lot of content. To get a general overview over the mod, try to use the concepts either by going into the menu and to the Vickypedia or by hovering over this [Concept('concept_morgenroete','$concept_morgenroete_concept$')].\n\nTo access most of the Morgenröte content, either click the button in this journal entry or the one close to the sidebar. The button in this journal entry should always work."
 je_objective_cradle_of_culture_tt: "Be the first nation to invent #ORANGE Impressionism#!, #ORANGE Expressionism#! or #ORANGE Art Nouveau#!."
