 objective_thriving_culture_name_BAV: "Бавария"
 objective_thriving_culture_desc_BAV: "В культурном плане Бавария всегда могла соперничать с крупными германскими государствами. XIX век стал для Мюнхена временем расцвета искусства и архитектуры. Помимо Вальхаллы и Нойшванштайна, Бавария также является местом, где был найден археоптерикс, родиной Мюнхенского сецессиона и местом рождения Шпицвега. Сможет ли Бавария, будучи средней германской державой, защитить себя от своих крупных соседей, полагаясь меньше на армию и больше на науку и искусство?"
 objective_thriving_culture_name_MEX: "Мексика"
 objective_thriving_culture_desc_MEX: "На первый взгляд, Мексика может показаться не лучшим выбором, когда речь заходит о культурном расцвете. Но её богатое археологическое прошлое многообещающе. Теоретически, Мексика может даже совершить прорыв в Северо-Западном проходе. Если страна, сотрясаемая кризисами, обретёт гармонию, она сможет эстетически увенчать свой успех Дворцом изящных искусств."
 je_mr_morgenrote_introduction_reason: "[concept_morgenroete] - это модификация, сосредоточенная на науке, искусстве и культуре. Она включает в себя множество новых механик и огромное количество контента. Чтобы получить общее представление о моде, воспользуйтесь концептами, либо зайдя в меню и открыв Википедию, либо наведя курсор на этот [Concept('concept_morgenroete', 'концепт Morgenröte')].\n\nЧтобы получить доступ к большей части контента Morgenröte, нажмите либо на кнопку в этой записи дневника, либо на ту, что находится рядом с боковой панелью. Кнопка в этой записи дневника должна работать всегда."
 je_objective_cradle_of_culture_tt: "Стать первой нацией, открывшей #ORANGE импрессионизм#!, #ORANGE экспрессионизм#! или #ORANGE модерн#!."
