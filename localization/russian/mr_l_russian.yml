l_russian:
 objective_thriving_culture: "Культурный расцвет"
 objective_thriving_culture_desc: "Любая варварская страна может завоевать клочок земли. Но высшая цивилизация проявляет себя в области науки и культуры. Находите археологические сокровища, открывайте новые звёзды и планеты, нанимайте композиторов, собирайте экзотических животных и растения, отправляйтесь в исследовательские поездки или ставьте рекорды в эпоху авиации. Наступает новый рассвет!"
 objective_thriving_culture_name_AUS: "Австрия"
 objective_thriving_culture_desc_AUS: "«Пусть воюют другие, ты же, счастливая Австрия, заключай браки!». Неужели эти времена для Австрии прошли? Венский конгресс и Меттерних в последний раз вывели Австрию на центральное место в Европе, но амбиции Пруссии и России угрожают компромиссной политике Габсбургской империи. Сможет ли Австрия, как и в прошлом, восторжествовать в будущем, став центром притяжения культуры и образа жизни? Отстаивайте репутацию Вены как музыкальной метрополии и сделайте её самым привлекательным городом в Европе."
 objective_thriving_culture_name_BEL: "Бельгия"
 objective_thriving_culture_desc_BEL: "Бельгия - не только развивающаяся экономическая держава, но и страна, обладающая всеми возможностями для процветания в научной сфере: в палеонтологии, астрономии, а также благодаря тихоокеанским экспедициям эта маленькая страна может укрепить свою мировую славу, которую другие добывают войной. Является ли Конго просто колонией или местом для ботанической экспедиции? И является ли Брюссель лишь транзитным пунктом для путешествующих композиторов, или страна попытается создать собственную музыкальную традицию?"
 objective_thriving_culture_name_SAR: "Сардиния-Пьемонт"
 objective_thriving_culture_desc_SAR: "Сардиния-Пьемонт находится в непростом положении: с одной стороны, сможет ли она собрать политические и военные силы для объединения итальянской нации, а с другой - соответствовать репутации культурной нации Италии? У объединённой Италии появятся новые возможности: от строительства Моле Антонеллиана и музыкальных успехов до рекордов в авиагонке за Кубок Шнейдера."
 objective_thriving_culture_name_SWI: "Швейцария"
 objective_thriving_culture_desc_SWI: "Будучи страной, не имеющей выхода к морю, Швейцария может находиться в менее выгодном положении, когда речь заходит об экспедициях в дальние страны, но она обладает значительным потенциалом в своих границах. Разумные решения в области поддержки классической музыки позволят альпийскому государству, возможно, убедить одного из великих композиторов остаться. Геологическая формация пригодится для палеонтологии. И, конечно, всегда есть проект века, задуманный Альфредом Эшером: огромный туннель прямо сквозь горы..."
 objective_thriving_culture_idle_header: "Продолжайте свой путь"
 objective_thriving_culture_idle_hint: "Со временем появятся новые испытания"
 thriving_culture_welcome: "Добро пожаловать в Morgenröte!"
 thriving_culture_welcome_desc: "Поздравляем с выбором культурного пути! Это сценарий «Morgenröte». Попробуйте мирным путём привести нацию на вершину мира, опираясь исключительно на культурные и научные аспекты."
 thriving_culture_lesson_button_skip: "Вперёд!"
 thriving_culture_complete_desc: "Поздравляем! Ваша нация - культурный образец этой эпохи! Но действительно ли вы открыли все грани Morgenröte? Путешествовали ли вы к Центру Земли? Переоткрыли ли Затерянный мир? Нашли ли Атлантиду? Обнаружили ли Шангри-Ла? Нет? Тогда как вы можете говорить, что закончили?"
 thriving_culture_lesson_button_complete: "Это ещё не всё?"
 je_objective_promote_an_academic: "Поддержать [Concept('concept_academics_academic', 'учёного')]"
 je_objective_promote_an_academic_reason: "Для продолжения нашей разнообразной научной и культурной деятельности необходима поддержка [Concept('concept_academics_academic', 'учёного')]."
 je_objective_a_great_step_forward: "Большой шаг вперёд"
 je_objective_a_great_step_forward_reason: "Наша нация должна совершить важный исторический прорыв, изучив ключевую научную технологию."
 je_objective_a_great_step_forward_theory_of_evolution_tt: "Первыми в мире открыть #b теорию эволюции#!."
 je_objective_a_great_step_forward_early_archaeology_tt: "Первыми в мире открыть #b раннюю археологию#!."
 je_objective_a_great_step_forward_modern_astronomy_tt: "Первыми в мире открыть #b современную астрономию#!."
 je_objective_a_great_step_forward_steel_frame_tt: "Первыми в мире открыть технологию #b стальных каркасов#!."
 je_objective_major_discovery: "Крупное открытие"
 je_objective_major_discovery_reason: "Фаустовский дух нашей эпохи призывает к испытанию пределов возможного. Мы должны совершить великое открытие во славу нашей нации!"
 je_objective_go_on_scientifical_expedition: "Профинансировать научную экспедицию"
 je_objective_go_on_scientifical_expedition_reason: "Научная экспедиция имеет основополагающее значение для продолжения исследований наших учёных и обогащения наших музеев и коллекций. Мы должны как можно скорее нанять учёного для её проведения."
 je_objective_go_on_scientifical_expedition_archaeology: "Начать [Concept('concept_lepsius_expedition', 'экспедицию')]."
 je_objective_go_on_scientifical_expedition_paleontology: "Начать [Concept('concept_dubois_paleontological_expedition', 'палеонтологическую экспедицию')]."
 je_objective_go_on_scientifical_expedition_botany: "Начать [Concept('concept_dubois_botanical_expedition', 'ботаническую экспедицию')]."
 je_objective_go_on_scientifical_expedition_pacific: "Начать [Concept('concept_dubois_pacific_expedition', 'тихоокеанскую экспедицию')]."
 je_objective_dawn_of_a_new_era: "Заря новой эры"
 je_objective_dawn_of_a_new_era_reason: "В XIX веке простая страсть к коллекционированию превратилась в научные методы и систематику. Больше нет недоступных уголков планеты, никакое прошлое, каким бы тёмным оно ни было, не кажется непостижимым. Всё можно измерить, проанализировать и интерпретировать. Пришло время создать научную коллекцию, которая будет соответствовать этим амбициям."
 dawn_of_new_era_fossil_tt: "Собрать #G 25#! [Concept('concept_dubois_fossil', 'окаменелостей')]."
 dawn_of_new_era_specimen_tt: "Собрать #G 35 000#! [Concept('concept_dubois_specimen', 'образцов')]."
 dawn_of_new_era_artifacts_tt: "Собрать #G 50#! [Concept('concept_lepsius_artifact', 'артефактов')]."
 dawn_of_new_era_astronomical_objects_tt: "Нанести на карту #G 75#! [Concept('concept_verrier_astronomical_object', 'астрономических объектов')]."
 je_objective_more_than_politics: "Больше, чем политика"
 je_objective_more_than_politics_reason: "Красота и истина имеют большую ценность, чем презренная борьба за власть. Строительство значимых научных и культурных учреждений должно стать знаком того, что действительно имеет значение перед лицом истории."
 je_objective_assemble_dinosaur_skeleton: "Воссоздать динозавра"
 je_objective_assemble_dinosaur_skeleton_reason: "Не следует пренебрегать палеонтологическими усилиями нашей страны. Внушительный скелет динозавра может стать началом изысканной коллекции!"
 je_objective_relevant_culture: "Культура мирового значения"
 je_objective_relevant_culture_reason: "Мы уже продемонстрировали нашу любовь к изящным искусствам и наукам у себя дома, но чтобы об этом узнал весь мир, мы должны значительно активизировать наши усилия - в какой области специализироваться, решать только нам."
 relevant_culture_astronomy_tt: "Провести #O астрономический конгресс#!."
 relevant_culture_music_tt: "Иметь #O регионально значимую#! [Concept('concept_elgar_musical_tradition', 'музыкальную традицию')]."
 je_objective_cradle_of_culture: "Колыбель культуры"
 je_objective_cradle_of_culture_reason: "Новые формы искусства вытесняют жёсткие формы историзма, маньеризма и реализма. Началась новая эра. Наша нация должна быть в авангарде этого нового рассвета и стать флагманом авангарда!"
 je_objective_thriving_culture: "Культурный расцвет"
 je_objective_thriving_culture_reason: "Чтобы стать важнейшей культурной нацией мира, мы должны проявить наше эстетическое чувство и наше научное понимание во всех аспектах."
 thriving_culture_archaeological_discovery_tt: "Совершить великое #O археологическое открытие#!."
 thriving_culture_great_comet_tt: "Открыть [Concept('concept_verrier_comet', 'комету')]."
 thriving_culture_great_composer_tt: "Нанять в игре хотя бы одного [Concept('concept_elgar_great_composer', 'великого композитора')]."
 mr_hide_geography_decisions: "Скрыть географические решения"
 mr_hide_geography_decisions_desc: "Скрыть все географические решения для лучшего обзора."
 mr_show_geography_decisions: "Показать географические решения"
 mr_show_geography_decisions_desc: "Показать все географические решения."
 mr_show_geography_decisions_tt: "Показать все географические решения."
 mr_hide_geography_decisions_tt: "Скрыть все географические решения."
 mr_appoint_chief_engineer: "Назначить главного инженера"
 mr_appoint_chief_engineer_desc: "С главным инженером ежемесячный прогресс строительства памятников получает дополнительное очко строительства."
 mr_dismiss_chief_engineer: "Уволить главного инженера"
 mr_visiting_museum_tt: "В данный момент вы не посещаете музей."
 mr_visiting_observatory_tt: "В данный момент вы не посещаете обсерваторию."
 mr_visiting_opera_tt: "В данный момент вы не посещаете оперу."
 mr_visiting_zoo_tt: "В данный момент вы не посещаете зоопарк."
 mr_visiting_fossils_tt: "В данный момент вы не посещаете палеонтологическую коллекцию."
 mr_visiting_human_evolution_tt: "В данный момент вы не посещаете антропологическую коллекцию."
 mr_visiting_scientific_society_tt: "В данный момент вы не посещаете [Concept('concept_academics_scientific_society', 'научное общество')]."
 je_mr_scientific_conferences: "Научные конференции"
 je_mr_scientific_conferences_reason: "Сколько лет Земле? Откуда произошёл человек? Насколько достоверна Библия как исторический источник? Бесконечна ли Вселенная - и что на самом деле представляют собой галактики? За сто лет значительно изменилась не только наука как таковая, но и взгляд людей на мир. Теория эволюции потрясла уверенность человека в себе не меньше, чем теория относительности. Научные конференции призваны прояснить некоторые из фундаментальных вопросов путём их обсуждения учёными со всего мира."
 mr_exodus_congress_egyptian_artifacts_tt: "Нам нужно не менее #G 25#! #O @lepsius_egypt_minor! египетских артефактов#!."
 mr_exodus_congress_global_artifacts_tt: "В ходе международных археологических исследований должно быть добыто в общей сложности #BLUE 150#! #O артефактов#!. В настоящее время найдено [GetGlobalVariable('lepsius_global_artifacts').GetValue] #O артефактов#!."
 mr_civilization_congress_mesopotamian_artifacts_tt: "Нам нужно не менее #G 25#! #O @lepsius_mesopotamia_minor! месопотамских артефактов#!."
 mr_civilization_congress_global_artifacts_tt: "В ходе международных археологических исследований должно быть добыто в общей сложности #BLUE 300#! #O артефактов#!. В настоящее время найдено [GetGlobalVariable('lepsius_global_artifacts').GetValue] #O артефактов#!."
 mr_troy_congress_aegean_artifacts_tt: "Нам нужно не менее #G 25#! #O @lepsius_aegean_minor! эгейских артефактов#!."
 mr_troy_congress_global_artifacts_tt: "В ходе международных археологических исследований должно быть добыто в общей сложности #BLUE 500#! #O артефактов#!. В настоящее время найдено [GetGlobalVariable('lepsius_global_artifacts').GetValue] #O артефактов#!."
 mr_hippocampus_congress_specimen_tt: "Нам нужно не менее #G 20 000#! @dubois_specimen! [Concept('concept_dubois_specimen', 'образцов')]."
 mr_hippocampus_congress_global_specimen_tt: "В ходе международных исследований натуралистов должно быть собрано в общей сложности #BLUE 100 000#! @dubois_specimen! [Concept('concept_dubois_specimen', 'образцов')]. В настоящее время собрано [GetGlobalVariable('dubois_global_specimen').GetValue] #O образцов#!."
 mr_origin_congress_human_fossil_tt: "Нам нужно не менее #G 10#! @dubois_human_fossil! #O ископаемых останков человека#!."
 mr_origin_congress_special_human_fossil_tt: "Нам нужно не менее #G 3#! @dubois_human_fossil! #O ископаемых останков человека#! одного из этих видов: неандерталец, человек прямоходящий, австралопитек или парантроп."
 mr_origin_congress_global_human_fossil_tt: "В ходе международных антропологических исследований должно быть найдено в общей сложности #BLUE 50#! @dubois_human_fossil! #O ископаемых останков человека#!. В настоящее время найдено [GetGlobalVariable('dubois_global_human_fossil').GetValue] #O ископаемых останков человека#!."
 mr_extinction_congress_fossil_tt: "Нам нужно не менее #G 5#! @dubois_dinosaur_skeleton! [Concept('concept_dubois_dinosaur_skeleton', 'скелетов динозавров')]."
 mr_extinction_congress_global_fossil_tt: "В ходе международных палеонтологических исследований должно быть найдено в общей сложности #BLUE 500#! @dubois_fossil! [Concept('concept_dubois_fossil', 'окаменелостей')]. В настоящее время найдено [GetGlobalVariable('dubois_global_fossil').GetValue] @dubois_fossil! [Concept('concept_dubois_fossil', 'окаменелостей')]."
 je_mr_archaeology: "Археология"
 je_mr_archaeology_reason: "В XIX и начале XX века произошёл стремительный скачок в области изучения древностей: от поиска сокровищ до серьёзной науки. Раскопки Трои Генрихом Шлиманом и открытие гробницы Тутанхамона Говардом Картером - лишь два самых известных ярких момента этой эпохи. В то же время они показывают, что в поиске ценных артефактов важную роль играла не только научная жажда, но и национальный престиж. С (почти) полной расшифровкой египетских иероглифов Карлом Рихардом Лепсиусом в 1837 году должна была начаться эта новая эра."
 mr_romantic_composer_button: "Нанять нового [Concept('concept_elgar_composer', '#b #PURPLE композитора#!#!')] (романтизм)"
 mr_composer_button_desc: "В отличие от [Concept('concept_elgar_great_composer', 'великих композиторов')], обычные [Concept('concept_elgar_composer', '#b #PURPLE композиторы#!#!')] отвечают за повседневную деятельность. Их можно нанять в качестве дирижёров, и они дают своей стране пассивный бонус к [Concept('concept_elgar_musical_tradition', 'музыкальной традиции')]. Композитора можно нанимать три раза за игру, что требует изучения определённой технологии (романтизм, иррационализм, неоклассицизм/новая объективность/ар-деко). Страна может содержать только одного обычного композитора, при этом требуются десятилетние инвестиции в музыкальную культуру страны."
 mr_wagnerian_composer_button: "Нанять нового [Concept('concept_elgar_composer', '#b #PURPLE композитора#!#!')] (иррационализм)"
 mr_modern_composer_button: "Нанять нового [Concept('concept_elgar_composer', '#b #PURPLE композитора#!#!')] (модерн)"
 mr_appoint_conductor_button: "Назначить главного дирижёра"
 mr_appoint_conductor_button_desc: "Дирижёры управляют национальным музыкальным делом, в частности, ведущим [Concept('concept_elgar_opera', 'оперным театром')] страны. В оперном театре им можно поручить на три года конкретную задачу: дирижирование, сочинение музыки или гастроли. В этом они похожи на [Concept('concept_elgar_great_composer', 'великих композиторов')], хотя их вклад в [Concept('concept_elgar_musical_tradition', 'музыкальную традицию')] остаётся в разумных пределах."
 mr_national_conservatory_button: "Основать национальную консерваторию"
 mr_national_conservatory_button_desc: "С консерваторией есть шанс, что персонажи с чертой «Композитор» со временем появятся сами, без необходимости их нанимать. Шанс очень мал, но он есть. Вероятность можно увеличить с помощью балетной школы при одной из наших оперных школ."
 mr_santa_cecilia_button: "Преобразовать Санта-Чечилию в академию"
 mr_santa_cecilia_button_desc: "Академия Санта-Чечилия была основана папской буллой «Ratione congruit» Сикста V в 1585 году в форме конгрегации. В 1838 году Конгрегация Святой Цецилии была официально названа академией, а затем - Папской академией. В то время в её состав входили Луиджи Керубини, Меркаданте, Доницетти, Россини, Паганини, Обер, Лист, Мендельсон, Берлиоз, Гуно и Мейербер. Одним из её почётных членов была королева Виктория. В объединённой Италии она превратилась в ведущую консерваторию."
 mr_leipzig_conservatory_button: "Основать Лейпцигскую консерваторию"
 mr_leipzig_conservatory_button_desc: "Традиционный музыкальный город Лейпциг, где уже творил Иоганн Себастьян Бах, в начале XIX века предлагал оптимальные условия для основания музыкальной и академической кузницы талантов. Четверо преданных делу горожан - юрист Генрих Конрад Шляйниц (второй директор), окружной директор Лейпцига Иоганн Пауль фон Фалькенштайн, королевский саксонский придворный советник Иоганн Георг Кайль, а также капельмейстер Гевандхауза Феликс Мендельсон-Бартольди - воплотили в жизнь прежние идеи."
 mr_petrograd_conservatory_button: "Основать Петроградскую консерваторию"
 mr_petrograd_conservatory_button_desc: "По инициативе великой княгини Елены Павловны, Антона Рубинштейна, Андрея Николаевича Марковича и других деятелей общества и музыкальной жизни было основано Русское музыкальное общество, из музыкальных классов которого и была создана первая в России консерватория. Антон Рубинштейн стал первым директором консерватории и профессором по классу фортепиано. Первым выпускником, завершившим здесь композиторское образование, был Пётр Чайковский. Николай Андреевич Римский-Корсаков сыграл особенно влиятельную роль как профессор композиции и инструментовки и руководитель оркестрового класса."
 mr_bayreuth_button: "Учредить фестиваль Рихарда Вагнера"
 mr_bayreuth_button_desc: "Рихард Вагнер давно мечтал о собственном фестивальном зале, где ежегодно исполнялись бы его величайшие произведения. Такое место могло бы быстро стать местом паломничества для всех любителей музыки и стало бы прочным, живым памятником в его честь."
