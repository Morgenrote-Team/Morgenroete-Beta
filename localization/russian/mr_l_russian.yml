l_russian:
 objective_thriving_culture: "Процветающая культура"
 objective_thriving_culture_desc: "Любая варварская страна может завоевать кусок земли. Но высшая цивилизация проявляет себя в области науки и культуры. Находите археологические сокровища, открывайте новые звезды и планеты, нанимайте композиторов, собирайте экзотических животных и растения, отправляйтесь в экспедиции или устанавливайте рекорды в эпоху авиации. Да наступит же новое утро!"
 objective_thriving_culture_name_AUS: "Австрия"
 objective_thriving_culture_desc_AUS: "Bella gerant alii, tu felix Austria nube! Прошли ли эти времена для Австрии? Венский конгресс и Меттерних в последний раз выдвинули Австрию на центральное место в Европе, но амбиции Пруссии и России угрожают компромиссной политике Габсбургской империи. Сможет ли Австрия торжествовать в будущем, став центром притяжения для культуры и образа жизни, как это было в прошлом? Защитите репутацию Вены как музыкальной столицы и превратите ее в самый привлекательный город Европы."
 objective_thriving_culture_name_BEL: "Бельгия"
 objective_thriving_culture_desc_BEL: "Бельгия является не только перспективной экономической державой, но и имеет все возможности для процветания в научной сфере: в палеонтологии, астрономии, а также благодаря тихоокеанским экспедициям маленькая страна могла бы закрепить свою мировую славу, которую другие приобретают благодаря войне. Является ли Конго просто колонией или пунктом назначения ботанической экспедиции? И является ли Брюссель просто транзитной зоной для путешествующих композиторов, или страна попытается создать свою собственную музыкальную традицию?"
 objective_thriving_culture_name_SAR: "Сардиния-Пьемонт"
 objective_thriving_culture_desc_SAR: "Сардиния-Пьемонт оказалась в сложной ситуации: с одной стороны, сможет ли она мобилизовать свои политические и военные силы для объединения итальянской нации, а с другой - оправдать репутацию итальянской культурной нации? Объединенная Италия получила бы новые возможности - от строительства Моле Антонеллиана и музыкальных успехов до рекордных полетов на Schneider Trophy."
 objective_thriving_culture_name_SWI: "Швейцария"
 objective_thriving_culture_desc_SWI: "Как страна, не имеющая выхода к морю, Швейцария, возможно, находится в худшем положении, когда речь заходит об экспедициях в отдаленные места, но в пределах своих границ она обладает значительным потенциалом. Продуманные решения в области популяризации классической музыки позволяют альпийскому государству мотивировать одного из великих композиторов остаться. Эта формация полезна для палеонтологии. И еще есть проект века, задуманный Альфредом Эшером: огромный туннель, проходящий через середину гор..."
 objective_thriving_culture_idle_header: "Продолжайте свой путь"
 objective_thriving_culture_idle_hint: "Со временем появятся новые проблемы"
 thriving_culture_welcome: "Добро пожаловать в Morgenröte!"
 thriving_culture_welcome_desc: "Поздравляем с выбором культурного пути! Это сценарий \"Morgenröte\". Попытайтесь мирным путем вывести нацию на вершину мирового развития, основываясь исключительно на культурных и научных аспектах."
 thriving_culture_lesson_button_skip: "Вперёд!"
 thriving_culture_complete_desc: "Поздравляю! Ваша нация является образцом культуры нашего времени! Вы действительно открыли для себя все грани Morgenröte? Вы путешествовали к Центру Земли? Вы заново открыли Затерянный мир? Нашли Атлантиду? Открыли Шангри-Ла? Нет? Тогда как вы можете говорить, что закончили?"
 thriving_culture_lesson_button_complete: "Есть ещё?"
 je_objective_promote_an_academic: "Повысить [concept_academics_academic]"
 je_objective_promote_an_academic_reason: "Для того чтобы продолжать нашу разнообразную научную и культурную деятельность, продвижение по службе в академических кругах неизбежно."
 je_objective_a_great_step_forward: "Большой шаг вперёд"
 je_objective_a_great_step_forward_reason: "Наша страна должна установить важную историческую веху, разработав ключевую научную технологию."
 je_objective_a_great_step_forward_theory_of_evolution_tt: "Откройте #b Теорию эволюции #! станьте первой страной."
 je_objective_a_great_step_forward_early_archaeology_tt: "Откройте #b Древнюю археологию#! станьте первым народом."
 je_objective_a_great_step_forward_modern_astronomy_tt: "Откройте #b современную астрономию#! станьте первой страной."
 je_objective_a_great_step_forward_steel_frame_tt: "Откройте #b здания со стальным каркасом#! станьте первой страной."
 je_objective_major_discovery: "Важное открытие"
 je_objective_major_discovery_reason: "Фаустовский дух нашего времени призывает к испытанию крайностей. Мы должны совершить великое открытие во славу нашей нации!"
 je_objective_go_on_scientifical_expedition: "Профинансировать научную экспедицию"
 je_objective_go_on_scientifical_expedition_reason: "Научная экспедиция имеет основополагающее значение для продолжения исследований наших ученых и обогащения наших музеев и коллекций. Мы должны нанять ученого для ее проведения как можно скорее."
 je_objective_go_on_scientifical_expedition_archaeology: "Active [concept_lepsius_expedition]."
 je_objective_go_on_scientifical_expedition_paleontology: "Active [concept_dubois_paleontological_expedition]."
 je_objective_go_on_scientifical_expedition_botany: "Active [concept_dubois_botanical_expedition]."
 je_objective_go_on_scientifical_expedition_pacific: "Active [concept_dubois_pacific_expedition]."
 je_objective_dawn_of_a_new_era: "Рассвет новой эры"
 je_objective_dawn_of_a_new_era_reason: "В XIX веке чистая страсть к коллекционированию превратилась в научные методы и систематику. Ни один уголок планеты больше не является недоступным, никакое прошлое, каким бы темным оно ни было, не кажется непостижимым. Все можно измерить, проанализировать и интерпретировать. Пришло время создать научную коллекцию, которая соответствовала бы этому утверждению."
 dawn_of_new_era_fossil_tt: "Collect #G 25#! [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]."
 dawn_of_new_era_specimen_tt: "Collect #G 35,000#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]."
 dawn_of_new_era_artifacts_tt: "Collect #G 50#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]."
 dawn_of_new_era_astronomical_objects_tt: "Map #G 75#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]."
 je_objective_more_than_politics: "Больше, чем политика"
 je_objective_more_than_politics_reason: "Красота и истина имеют большую ценность, чем презренная борьба за власть. Строительство значительных научных и культурных учреждений должно быть признаком того, что действительно имеет значение перед лицом истории."
 je_objective_assemble_dinosaur_skeleton: "Реконструкция динозавра"
 je_objective_assemble_dinosaur_skeleton_reason: "Не следует пренебрегать усилиями палеонтологов нашей страны. Внушительный скелет динозавра мог бы стать основой для создания изысканной коллекции!"
 je_objective_relevant_culture: "Культура, имеющая международное значение"
 je_objective_relevant_culture_reason: "У себя на родине мы уже продемонстрировали свою склонность к изобразительному искусству и наукам, но для того, чтобы об этом узнал весь мир, мы должны значительно активизировать наши усилия - в какой области мы специализируемся, зависит исключительно от нас."
 relevant_culture_astronomy_tt: "Host an #O Astronomical Congress#!."
 relevant_culture_music_tt: "Have a #O Regionally important#! [concept_elgar_musical_tradition]."
 je_objective_cradle_of_culture: "Колыбель культуры"
 je_objective_cradle_of_culture_reason: "Новые формы искусства приходят на смену жестким формам историзма, маньеризма и реализма. Началась новая эра. Наша нация должна быть в авангарде этого нового рассвета и быть флагманом авангарда!"
 je_objective_thriving_culture: "Процветающая культура"
 je_objective_thriving_culture_reason: "Чтобы стать самой важной культурной нацией в мире, мы должны проявить наше эстетическое чувство и наше научное понимание во всех аспектах."
 thriving_culture_archaeological_discovery_tt: "Makes a great #O Archeological Discovery#!."
 thriving_culture_great_comet_tt: "Открыть [concept_verrier_comet]."
 thriving_culture_great_composer_tt: "Наймите хотя бы одного [concept_elgar_great_composer] в игре."
 mr_hide_geography_decisions: "Скрыть географические решения"
 mr_hide_geography_decisions_desc: "Скрыть все географические решения, чтобы сохранить лучший обзор."
 mr_show_geography_decisions: "Показать географические решения"
 mr_show_geography_decisions_desc: "Показать все географические решения."
 mr_show_geography_decisions_tt: "Показать все географические решения."
 mr_hide_geography_decisions_tt: "Скрыть все географические решения."
 mr_appoint_chief_engineer: "Назначить главного инженера"
 mr_appoint_chief_engineer_desc: "С главным инженером ежемесячный прогресс строительства памятников получает дополнительные очки."
 mr_dismiss_chief_engineer: "Уволить главного инженера"
 mr_visiting_museum_tt: "В настоящее время не посещает музей."
 mr_visiting_observatory_tt: "В настоящее время не посещает обсерваторию."
 mr_visiting_opera_tt: "В настоящее время не посещает оперу."
 mr_visiting_zoo_tt: "В настоящее время не посещает зоопарк."
 mr_visiting_fossils_tt: "В настоящее время не посещает палеонтологическую коллекцию."
 mr_visiting_human_evolution_tt: "В настоящее время не посещает антропологическую коллекцию."
 mr_visiting_scientific_society_tt: "В настоящее время не посещает [concept_academics_scientific_society]."
 je_mr_scientific_conferences: "Научные конференции"
 je_mr_scientific_conferences_reason: "Сколько лет Земле? Откуда появился человек? Насколько достоверна Библия как исторический источник? Бесконечна ли Вселенная и что такое галактики на самом деле? За сто лет значительно изменилась не только наука как таковая, но и мировоззрение людей. Теория эволюции поколебала уверенность человека в себе не меньше, чем теория относительности. Научные конференции призваны прояснить некоторые фундаментальные вопросы, привлекая к их обсуждению международных ученых."
 mr_exodus_congress_egyptian_artifacts_tt: "We need at least #G 25#! #O @lepsius_egypt_minor! Egyptian Artifacts#!."
 mr_exodus_congress_global_artifacts_tt: "International archaeological research must have secured a total of #BLUE 150 #! #O Artifacts#!. Currently [GetGlobalVariable('lepsius_global_artifacts').GetValue] #O Artifacts#! have been recovered."
 mr_civilization_congress_mesopotamian_artifacts_tt: "We need at least #G 25#! #O @lepsius_mesopotamia_minor! Mesopotamian Artifacts#!."
 mr_civilization_congress_global_artifacts_tt: "International archaeological research must have secured a total of #BLUE 300 #! #O Artifacts#!. Currently [GetGlobalVariable('lepsius_global_artifacts').GetValue] #O Artifacts#! have been recovered."
 mr_troy_congress_aegean_artifacts_tt: "We need at least #G 25#! #O @lepsius_aegean_minor! Aegean Artifacts#!."
 mr_troy_congress_global_artifacts_tt: "International archaeological research must have secured a total of #BLUE 500 #! #O Artifacts#!. Currently [GetGlobalVariable('lepsius_global_artifacts').GetValue] #O Artifacts#! have been recovered."
 mr_hippocampus_congress_specimen_tt: "We need at least #G 20000#! @dubois_specimen! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]."
 mr_hippocampus_congress_global_specimen_tt: "International naturalist research must have secured a total of #BLUE 100000 #! @dubois_specimen! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]. Currently [GetGlobalVariable('dubois_global_specimen').GetValue] #O Specimens#! have been collected."
 mr_origin_congress_human_fossil_tt: "We need at least #G 10#! @dubois_human_fossil! #O Human Fossils#!."
 mr_origin_congress_special_human_fossil_tt: "We need at least #G 3#! @dubois_human_fossil! #O Human Fossils#! from one of these species: Homo Neanderthalensis, Homo Erectus, Australopithecus or Paranthropus."
 mr_origin_congress_global_human_fossil_tt: "International anthropologist research must have secured a total of #BLUE 50 #! @dubois_human_fossil! #O Human Fossils#!. Currently [GetGlobalVariable('dubois_global_human_fossil').GetValue] #O Human Fossils#! have been found."
 mr_extinction_congress_fossil_tt: "We need at least #G 5#! @dubois_dinosaur_skeleton! [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')]."
 mr_extinction_congress_global_fossil_tt: "International paleontologist research must have secured a total of #BLUE 500 #! @dubois_fossil! [Concept('concept_dubois_fossil','$concept_dubois_fossils$')]. Currently [GetGlobalVariable('dubois_global_fossil').GetValue] @dubois_fossil! [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] have been found."
 je_mr_archaeology: "Археология"
 je_mr_archaeology_reason: "XIX век и начало XX века ознаменовались бурным развитием исследований античности: от поиска сокровищ до серьезной науки. Раскопки Трои Генрихом Шлиманом и открытие гробницы Тутанхамона Говардом Картером - лишь два самых известных события этой эпохи. В то же время они показывают, что не только научная жажда, но и национальный престиж сыграли важную роль в восстановлении ценных артефактов. С (почти) полной расшифровки египетских иероглифов Карлом Ричардом Лепсиусом в 1837 году должна была начаться новая эра."
 mr_romantic_composer_button: "Hire a new [concept_elgar_composer] (Romanticism)"
 mr_composer_button_desc: "Unlike [Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')], ordinary [Concept('concept_elgar_composer','$concept_elgar_composers$')] are responsible for day-to-day operations. They can be hired as conductors and give their country a passive [concept_elgar_musical_tradition] bonus. A composer can be hired three times per game, which requires research into a specific technology (Romanticism, Irrationalism, Neoclassicism/New Objectivity/Art Deco). A country can only support one ordinary composer, and a ten-year investment in the country's musical culture is required."
 mr_wagnerian_composer_button: "Hire a new [concept_elgar_composer] (Irrationalism)"
 mr_modern_composer_button: "Hire a new [concept_elgar_composer] (Modern)"
 mr_appoint_conductor_button: "Appoint a Chief Conductor"
 mr_appoint_conductor_button_desc: "Conductors run the national music business, particularly a country's leading [Concept('concept_elgar_opera','$concept_elgar_opera_house$')]. In the opera house they can be entrusted with a specific task for three years: conducting, composing or a tour. In this way they are similar to the [Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')], although their earnings for the [concept_elgar_musical_tradition] are kept within manageable limits."
 mr_national_conservatory_button: "Found a National Conservatory"
 mr_national_conservatory_button_desc: "\"With a Conservatory, there is a chance that characters with the Composer trait will appear over time without having to hire them. The chance is very small, but it is there. The probability can be increased with a ballet school in one of our opera schools."
 mr_santa_cecilia_button: "Make Santa Cecilia an Academy"
 mr_santa_cecilia_button_desc: "The Accademia di Santa Cecilia was founded by the papal bull 'Ratione congruit' by Sixtus V in 1585 in the form of a congregation. In 1838 the Congregation of Saint Cecilia was officially named an Academy and then the Pontifical Academy. Its members at that time included Luigi Cherubini, Mercadante, Donizetti, Rossini, Paganini, Auber, Liszt, Mendelssohn, Berlioz, Gounod and Meyerbeer. One of its honorary members was Queen Victoria. In united Italy it developed into a leading conservatory."
 mr_leipzig_conservatory_button: "Found the Leipzig Conservatory"
 mr_leipzig_conservatory_button_desc: "The traditional music city of Leipzig, where Johann Sebastian Bach was already active, offered optimal conditions for the founding of a musical and academic talent factory at the beginning of the 19th century. Four committed citizens of the city, namely the lawyer Heinrich Conrad Schleinitz (second director), the district director of Leipzig Johann Paul von Falkenstein and the Royal Saxon Court Councilor Johann Georg Keil as well as the Gewandhaus Kapellmeister Felix Mendelssohn Bartholdy put the previous ideas into practice."
 mr_petrograd_conservatory_button: "Found the Petrograd Conservatory"
 mr_petrograd_conservatory_button_desc: "On the initiative of the Grand Duchess Elena Pavlovna, Anton Rubinstein, Andrei Nikolayevich Markovich and other personalities of society and musical life, the Russian Music Society was founded, from whose music classes the first conservatory in Russia was founded. Anton Rubinstein was the first director of the conservatory and professor of piano. The first graduate to complete his composition studies here was Peter Tchaikovsky. Nikolai Andreyevich Rimsky-Korsakov had a particularly influential role as professor of composition and instrumentation and head of the orchestra class."
 mr_bayreuth_button: "Establish the Richard Wagner Festival"
 mr_bayreuth_button_desc: "Richard Wagner has long dreamed of having his own festival hall where his greatest works are performed every year. Such a place could quickly become a place of pilgrimage for all music enthusiasts and would be a lasting, living memorial in his honor."
