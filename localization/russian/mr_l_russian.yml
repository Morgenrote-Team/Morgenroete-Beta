 dlc_morgenrote: "Morgenröte - Рассвет вкуса"
 dlc_morgenrote_desc: "Morgenröte - Рассвет вкуса - это модификация, обогащающая мир Victoria 3 культурой, красотой и стилем жизни. Наш подход заключается не в улучшении карты или экономики, а в проработке тех аспектов викторианской эпохи, которые в ранее стерильном игровом мире появлялись лишь мельком. К ним относятся захватывающие научные экспедиции, повышение престижа за счёт культуры, а также обучение деятелей искусства и учёных.\n\nНе волнуйтесь, Morgenröte #p активен#!."
 rule_mr_tech_bonus_rule: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon! #! Бонус к технологиям"
 setting_mr_tech_normal_rule: "#V Обычный бонус к технологиям#!"
 setting_mr_tech_normal_rule_desc: "Многие события Morgenröte дают вашей стране небольшой бонус к исследованию технологии. При этой настройке используются #V обычные значения#!."
 setting_mr_tech_half_rule: "#n Половинный#! #V бонус к технологиям#!"
 setting_mr_tech_half_rule_desc: "Многие события Morgenröte дают вашей стране небольшой бонус к исследованию технологии. При этой настройке значения #n вдвое ниже#!. Это может замедлить скорость исследования."
 setting_mr_tech_quarter_rule: "#n Четверть#! #V бонуса к технологиям#!"
 setting_mr_tech_quarter_rule_desc: "Многие события Morgenröte дают вашей стране небольшой бонус к исследованию технологии. При этой настройке значения #n вчетверо ниже#!. Это может замедлить скорость исследования."
