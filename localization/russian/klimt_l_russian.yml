l_russian:
 klimt_painter: "Художник"
 klimt_painter_desc: "Этот персонаж — художник, который в основном пишет картины. Возможно, однажды его полотна станут известны всему миру?"
 klimt_great_painter: "Великий художник"
 klimt_great_painter_desc: "Этот персонаж — один из величайших художников в мире. Его картины висят во всех значимых художественных галереях, а коллекционеры платят за них целое состояние."
 klimt_spitzweg_not_funny_modifier: "Подозрительный Шпицвег"
 klimt.1300.t: "Карл Шпицвег, «Бедный поэт»"
 klimt.1300.d: "«Бедный поэт» (нем. Der arme Poet) — самая известная и популярная картина немецкого художника Карла Шпицвега. Она была написана в 1839 году и имела три версии. Считается ранним шедевром."
 klimt.1300.f: "Карл Шпицвег — немецкий художник-романтик и поэт. Он считается одним из важнейших деятелей эпохи бидермайера. Его отец, богатый купец, настоял, чтобы Карл выучился на фармацевта. Он получил диплом в Мюнхенском университете, но, выздоравливая после болезни, увлёкся живописью. Шпицвег был художником-самоучкой и начинал с копирования работ фламандских мастеров. Свои первые работы он публиковал в сатирических журналах. Получив наследство в 1833 году, он смог полностью посвятить себя живописи. Его поздние картины и рисунки часто были юмористическими жанровыми произведениями. На многих его картинах изображены ярко очерченные эксцентрики."
 klimt.1300.g: "Ха-ха, какой забавный художник!"
 klimt.1300.h: "Постойте! А сатира против кого?"
 klimt_has_active_painter_tt: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] есть [concept_klimt_painter|l], который #V ничем не занят#!.#!."
