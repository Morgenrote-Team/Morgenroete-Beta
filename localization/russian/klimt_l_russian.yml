 klimt.2.t: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] определяет свой стиль"
 klimt.2.d: "После многих лет, в течение которых [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'набиралась', 'набирался')] опыта и впечатлений, чтобы улучшить свою технику, [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'она', 'он')] наконец-то [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'остановилась', 'остановился')] на предпочитаемом стиле."
 je_klimt_painter_trip_fail: "Если [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] придётся досрочно завершить своё путешествие, его заменят или он умрёт во время пребывания в чужой стране, [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'она', 'он')] не приобретёт новую школьную [Concept('concept_character_trait', 'черту характера')]."
