 klimt.11.t: "Расформирование галереи"
 klimt.11.d: "Правительство больше не может гарантировать содержание Национальной галереи в области [SCOPE.sState('klimt_gallery_state').GetName]. Было решено расформировать её и перевезти самые важные экспонаты в нашу столицу."
 klimt.11.f: "Если Национальная галерея существует за пределами столицы, она будет автоматически расформирована, а её экспонаты выставлены в собственной Национальной галерее. Если Национальной галереи ещё нет, будет построена новая."
 klimt.11.g: "Эта изысканная коллекция картин обогатит нашу Национальную галерею."
 klimt.11.h: "Взять коллекцию за основу для строительства новой Национальной галереи."
 alert_klimt_painter_trip_possible_alert_hint: "У вас есть [concept_klimt_painter|l], который мог бы изучить новый художественный стиль в [Concept('concept_artists_center_of_arts', 'центре исскуств')]. Нажмите кнопку на вкладке «Деятели искусства» в #V окне Morgenröte#!, чтобы отправить его."
 klimt_add_x_painting_tradition_minus_x_tt: "[THIS.GetCountry.GetName] теряет [SCOPE.GetValue('painting_tradition_amount')|0+] ед. @klimt_painting_tradition! [Concept('concept_klimt_painting_tradition', 'художественной традиции')]."
 klimt_add_x_painting_tradition_0_tt: "[THIS.GetCountry.GetName] не получает @klimt_painting_tradition! [Concept('concept_klimt_painting_tradition', 'художественной традиции')]."
 klimt_add_x_painting_tradition_plus_x_tt: "[THIS.GetCountry.GetName] получает [SCOPE.GetValue('painting_tradition_amount')|0+] ед. @klimt_painting_tradition! [Concept('concept_klimt_painting_tradition', 'художественной традиции')]."
 klimt.403.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'вернулась', 'вернулся')] из своей учебной поездки и [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'привезла', 'привёз')] с собой новый опыт, новые знания и новое вдохновение. [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'Она', 'Он')] также несколько улучшил[SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'а', '')] свою репутацию в мире искусства."
 klimt.425.d: "С момента своего прибытия в город [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] получил[SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'а', '')] сотни и тысячи впечатлений. Давно уже одна идея не сменяла другую. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] буквально чувствует, как это место бодрит [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'её', 'его')]."
 country_klimt_decorative_painting_tradition_add: "Ежегодный прирост @klimt_painting_tradition! [Concept('concept_klimt_painting_tradition', 'художественной традиции')]"
