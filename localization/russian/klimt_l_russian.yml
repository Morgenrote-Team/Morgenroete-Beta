 klimt.2.f: "Примерно в 40 лет [concept_klimt_painter|l] сочтёт своё обучение завершённым и окончательно остановится на предпочитаемом стиле живописи. Как правило, этот стиль основывается на самом современном жанре, причём ар-нуво является самой современной, а классицизм — самой архаичной формой искусства. Художники со специализированным стилем живописи при определённых условиях будут создавать шедевры в этом стиле. Вы также можете создать в галерее коллекцию произведений искусства, соответствующую вашему вкусу. Специализированный художник считает своё обучение живописи завершённым и больше не будет отправляться в [concept_klimt_painter_trip|l]."
 klimt.2.g: "Стиль живописи теперь созрел."
 klimt.10.t: "Открытие галереи"
 klimt.10.d: "Новоназначенный директор открыл новую художественную галерею торжественной церемонией. Одним из почётных гостей был [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName], который с удовлетворением присутствовал на этом акте."
 klimt.10.f: "Строительство национальной галереи открывает множество возможностей. Специализированные художники автоматически создадут коллекцию произведений искусства, соответствующую их вкусам. Соответственно, художники, отказавшиеся от романтического стиля, создадут коллекцию романтической живописи. Такую коллекцию можно дополнительно пополнить шедевром, чтобы сделать её превосходной. Шедевры могут быть со временем написаны художниками этого направления или приобретены за рубежом."
 klimt.10.g: "Наконец-то нам больше не придётся хранить это барахло на чердаке!"
 klimt.20.t: "Национальная галерея"
 klimt.20.d: "В художественной галерее выставлены определяющие шедевры эпохи. В настоящее время мы владеем следующими уникальными картинами:"
 klimt.20.none: "В настоящее время в Национальной галерее нет шедевров."
 klimt.20.classicism: "#T Классицизм:#!\n#YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]»#!, приобретена в [ROOT.Var('klimt_classic_masterwork_year_var').GetValue] г."
 klimt.20.romanticism: "\n\n#T Романтизм:#!\n#YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]»#!, приобретена в [ROOT.Var('klimt_romantic_masterwork_year_var').GetValue] г."
 klimt.20.realism: "\n\n#T Реализм:#!\n#YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]»#!, приобретена в [ROOT.Var('klimt_realistic_masterwork_year_var').GetValue] г."
 klimt.20.impressionism: "\n\n#T Импрессионизм:#!\n#YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]»#!, приобретена в [ROOT.Var('klimt_impressionistic_masterwork_year_var').GetValue] г."
 klimt.20.expressionism: "\n\n#T Экспрессионизм:#!\n#YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]»#!, приобретена в [ROOT.Var('klimt_expressionistic_masterwork_year_var').GetValue] г."
 klimt.20.art_nouveau: "\n\n#T Ар-нуво:#!\n#YELLOW «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]»#!, приобретена в [ROOT.Var('klimt_art_nouveau_masterwork_year_var').GetValue] г."
 klimt.20.g: "Хорошего дня."
 klimt.30.t: "Свежий ветер в искусстве"
 klimt.30.d: "Город [SCOPE.sState('klimt_secession_state').GetCityHubName] стал центром выдающегося международного художественного движения, тесно связанного с ар-нуво. Художественный кружок называет себя «Сецессион города [SCOPE.sState('klimt_secession_state').GetCityHubName]»."
 klimt.30.f: "Венский сецессион — это художественное движение, тесно связанное с ар-нуво, которое было образовано в 1897 году группой австрийских художников, графиков, скульпторов и архитекторов, включая Йозефа Гофмана, Коломана Мозера, Отто Вагнера и Густава Климта. Они вышли из Ассоциации австрийских художников в знак протеста против её поддержки более традиционных художественных стилей. Их самым влиятельным архитектурным произведением стало здание Сецессиона, спроектированное Йозефом Марией Ольбрихом как место для выставок группы. Их официальный журнал назывался Ver Sacrum («Священная весна» на латыни), который публиковал высоко стилизованные и влиятельные произведения графического искусства. В 1905 году сама группа раскололась, когда некоторые из самых видных членов, включая Климта, Вагнера и Гофмана, ушли в отставку из-за спора о приоритетах, но она продолжала функционировать и функционирует по сей день из своей штаб-квартиры в здании Сецессиона. В своей нынешней форме выставочная галерея Сецессиона независимо возглавляется и управляется художниками."
 klimt.30.g: "Этот поцелуй всему миру!"
 klimt.30.h: "Климт? Вы имеете в виду Густава Климта?"
 klimt.30_tt: "Запускает событие #white #b «Первый сецессион»#!#!"
 klimt.40.t: "Вернисаж"
 klimt.40.d: "Выставка в городе [SCOPE.sState('klimt_vernissage_state').GetCityHubName] была полностью посвящена работам [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]. Мероприятие считается одним из культурных событий года и принесло ему признание критиков. Для нашей страны это подтверждение того, что мы являемся ведущей культурной державой."
 klimt.40.f: "«Кто я в глазах большинства — ничтожество, эксцентрик или неприятный человек — кто-то, кто не имеет положения в обществе и никогда не будет иметь; короче говоря, самый низкий из низких. Хорошо, тогда — даже если бы это было абсолютно верно, то я хотел бы однажды показать своей работой, что у такого эксцентрика, такого ничтожества, есть в сердце.\nЭто моя амбиция, основанная меньше на обиде, чем на любви, несмотря ни на что, основанная больше на чувстве безмятежности, чем на страсти.\nХотя я часто нахожусь в глубине несчастья, во мне всё ещё есть спокойствие, чистая гармония и музыка. Я вижу картины или рисунки в самых бедных хижинах, в самых грязных углах. И мой разум с непреодолимой силой устремляется к этим вещам», — Винсент ван Гог."
 klimt.40.g: "Как там был фуршет?"
 klimt.101.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]"
 klimt.101.d: "На своём вернисаже маэстро [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'представила', 'представил')] публике свою последнюю картину: «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]» — типичное произведение классицизма, которое уже считается значимым в этом жанре."
 klimt.101.f: "Новая работа художника [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] сразу привлекла внимание искусствоведов. В частности, более консервативно настроенным академикам понравились эстетические формы и баланс линии и цвета. Особенно подчёркивались моральная целостность и возвышенность произведения искусства. Картина уже считается превосходным культурным наследием нашей нации и должна стать украшением любой галереи."
 klimt.101.g: "Этому место в... галерее!"
 klimt.102.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]"
 klimt.102.d: "Национальный художник [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'представила', 'представил')] свою работу публике в кругу нескольких приглашённых гостей. Чувственность и сила красок производят впечатление на публику. Картина уже считается ключевым произведением романтизма."
 klimt.102.f: "«[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]» уже в первый вечер произвела сильное впечатление на некоторых посетителей. Дух, стоящий за этим шедевром, отчётливо ощущается. Критики жаловались, что контуры в некоторых местах размыты, другие видели силу сюжета в этой нечёткости в сочетании с богатством красок. Этой картиной [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] определённо [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'обеспечила', 'обеспечил')] себе место в книгах по истории искусства."
 klimt.103.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]"
 klimt.103.d: "На одном из вечеров [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'воспользовалась', 'воспользовался')] возможностью показать новую картину, которую можно однозначно отнести к реализму. Некоторые присутствовавшие искусствоведы высоко оценили работу."
 klimt.103.f: "Некоторые присутствовавшие гости опасались более провокационного сюрприза, но «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]» оказалась очень сдержанным изображением. На первый взгляд некоторые гости приняли её за жанровую живопись. Но чем дольше присутствующие смотрели на изображение бытовой сцены, тем яснее становилась тонкая, подстрекательская идея, стоящая за ней, и социальные проблемы, на которые намекал автор. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName], возможно, [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'оттолкнула', 'оттолкнул')] нескольких членов вечернего общества своим социально-критическим подходом, но подавляющее большинство сходится во мнении, что такое сокровище искусства должно находиться в достойной национальной выставке."
 klimt.104.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]"
 klimt.104.d: "На большой художественной выставке высокопоставленных представителей национального общества живописцев [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'представила', 'представил')] работу, которая, хотя и привлекла значительное внимание, также вызвала насмешки некоторых критиков. Однако выгодное предложение от иностранного торговца искусством внезапно сделало её очень популярной."
 klimt.104.f: "Мнения разделились, когда была представлена картина «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]». Одни находили идиллию почти наивной и лишённой политических или социальных устремлений, другие критиковали отсутствие формы и линий. Кто-то язвил, что растворяющийся пейзаж, вероятно, связан с растворяющимся мозгом автора. Сторонники не могли одержать верх, пока торговец искусством из [SCOPE.sCountry('klimt_art_dealer_country').GetAltNameNoFlag('RU_CL_RP')] особо не подчеркнул качество и новаторский дух шедевра. Он был немедленно готов заплатить за картину огромную цену и увезти её в свою страну. После этого эпизода интерес к картине возрос, и она была немедленно объявлена национальным культурным достоянием. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] может быть более чем [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'счастлива', 'счастлив')]."
 klimt.105.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]"
 klimt.105.d: "Последняя картина [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] вызвала ужас, ненависть, гнев и отвращение у публики и критиков. Другими словами: это был сенсационный успех!"
 klimt.105.f: "«Что это вообще значит: „[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]“? В чём смысл? Что это за цвета из детской раскраски? Эти грубые фигуры? Эти бредовые сцены? Вы называете это искусством? ИСКУССТВОМ?! Вы шарлатан! Если плюнуть на картину, в ней будет больше искусства, чем сейчас!»\n\nИ это был один из более положительных комментариев на презентации. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] тем самым [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'вызвала', 'вызвал')] исторический скандал, который только увеличивает значение картины."
 klimt.106.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]"
 klimt.106.d: "После публикации своей новой работы «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]» [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] считается одним из важнейших художников на международной арене. Она восхитила как традиционалистов, так и авангардистов."
 klimt.106.f: "«Что это, ар-нуво? Искусство никогда не может быть новым», — Альфонс Муха."
 klimt.110.t: "Секретное поручение"
 klimt.110.d: "Опытный торговец искусством и антиквариатом предложил достать редкий шедевр за границей. В этом деле требуется крайняя осмотрительность — торговец покупает и у соперников, и даже у военных противников. [SCOPE.sCharacter('klimt_art_dealer').GetFullName] заверил, что выполнит свой заказ тихо — при условии хорошей оплаты и нескольких картин взамен."
 klimt.110.f: "Для покупки иностранной картины торговец искусством за границей должен сделать подходящее предложение. Это включает не только деньги, но и несколько картин взамен, что нанесёт ущерб нашей [Concept('concept_klimt_painting_tradition', 'художественной традиции')]. Торговец искусством может покупать шедевры только в странах, у которых есть более одной картины того же стиля — уникальное произведение они не продадут. Точно так же нация не может приобрести за границей более одного шедевра одного стиля. Потребуется около шести месяцев, чтобы сделка была завершена и картина прибыла в нашу Национальную галерею."
 klimt.110.g: "Приобрести шедевр классицизма."
 klimt.110.h: "Приобрести шедевр романтизма."
 klimt.110.i: "Приобрести шедевр реализма."
 klimt.110.j: "Приобрести шедевр импрессионизма."
 klimt.110.k: "Приобрести шедевр экспрессионизма."
 klimt.110.l: "Приобрести шедевр ар-нуво."
 klimt.111.t: "Шедевр классицизма"
 klimt.111.d: "Картина «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]» сегодня прибыла в Национальную галерею в качестве нового шедевра. Правительство было очень довольно произведением. Торговец искусством считает свою работу выполненной."
 klimt.111.f: "Большие ожидания не были обмануты. «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]» точно соответствует требованиям и должна стать превосходным дополнением к коллекции картин [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]. Торговая пресса также согласна, что эта покупка стоила каждого потраченного пенни. На следующий месяц запланирована выставка, которая будет посвящена этой вершине классицизма."
 klimt.111.g: "Ещё одно сокровище искусства для нашей коллекции!"
 klimt.112.t: "Шедевр романтизма"
 klimt.112.d: "Некоторые зеваки собрались сегодня у Национальной галереи. Представители местной и национальной прессы также осаждают это место с раннего утра. Уже прошёл слух, что «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]», романтический шедевр, вот-вот прибудет в коллекцию картин."
 klimt.112.f: "Уже ходили слухи о «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]». Это должна быть красочная картина, которая будоражит чувства. Больше никакой информации о сюжете не известно. Неизвестный торговец искусством, который мог бы предоставить больше информации, говорят, уехал за границу с большой суммой денег и строит планы на пенсию. Для интервью он больше не доступен."
 klimt.113.t: "Шедевр реализма"
 klimt.113.d: "Новый шедевр «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]» был представлен публике на церемонии сегодня в рамках специальной выставки. Произведение относится к жанру реализма и считается одной из ключевых картин этой художественной эпохи. Толпа была соответственно большой. Билеты на мероприятие были полностью распроданы за несколько недель до этого."
 klimt.113.f: "«Для меня, как директора Национальной галереи, большая честь и удовольствие представить вам сегодня новый шедевр, который с сегодняшнего дня обогатит нашу коллекцию картин. Как вы знаете, мы долго работали над тем, чтобы назвать ключевое произведение реализма своим. „[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]“ — именно такое. Мне не нужно много говорить о художнике, вы все его знаете. Своим трезвым изображением и повседневной актуальностью оно поначалу было неправильно понято критиками как жанровая живопись или как бездуховное. Но на самом деле его содержание глубоко. Обратите внимание на детали в колорите, которые создают впечатление, что...»"
 klimt.114.t: "Шедевр импрессионизма"
 klimt.114.d: "Торговец искусством выполнил свою миссию сегодня и доставил «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]» ответственным лицам в Национальной галерее за солидное вознаграждение. Процесс прошёл гладко. Директор также положительно отозвался о покупке, но пожаловался, что цвета немного размыты."
 klimt.114.f: "«Я очень подавлен и глубоко разочарован в живописи. Это действительно постоянная пытка», — Клод Моне."
 klimt.115.t: "Шедевр экспрессионизма"
 klimt.115.d: "Картина «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]», шедевр из-за границы, приобретённый доверенным торговцем искусством, наконец-то прибыла в [GetPlayer.GetAltNameNoFlag('RU_CL_VP')]. Однако о безоговорочном одобрении говорить не приходится. Торговец искусством также уехал после оплаты, и его не найти."
 klimt.115.f: "После того, как прибыла картина «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]», некоторые ценители искусства выразили удивление, если не критику. Необычная композиция создавала впечатление, что это вряд ли может быть работа известного художника. Необычное название, мало связанное с мазнёй, также вызвало подозрение, не наткнулись ли они, возможно, на шарлатана, который пошутил. Тот факт, что на картине был найден подлинный автограф, скорее усугубил, чем улучшил положение. Будьте готовы к сильной реакции со стороны публики."
 klimt.116.t: "Шедевр ар-нуво"
 klimt.116.d: "Директор Национальной галереи с облегчением обнаружил сегодня, что шедевр прибыл из-за океана. «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]» — это просто услада для глаз."
 klimt.116.f: "Когда «[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]» наконец-то достали из ящика, она сразу же покорила сердца присутствующих, как новый тигрёнок в зоопарке. Или новый крупный артефакт в музее. Или новооткрытая планета в обсерватории. Или новый музыкальный шедевр композитора. Или собранный заново скелет палеонтолога. Или найденные останки предка человека. Или..."
 klimt.116.g: "Или победа в Кубке Шнейдера?"
 klimt.301.t: "Премия города [SCOPE.sState('klimt_art_capital').GetCityHubName]"
 klimt.301.d: "Элита нашей любящей искусство страны настаивает на учреждении художественной премии за лучшие картины."
 klimt.301.f: "Страны, имеющие галерею, время от времени организуют художественные конкурсы. Пять самых искусных художников награждаются премией, которая оказывает сильное влияние на их репутацию. Художественная премия обычно присуждается каждые пять лет. Великие художники не приглашаются — они уже получили свою награду."
 klimt.301.g: "Мы должны организовать художественный конкурс."
 klimt.301.h: "Какая пустая трата денег!"
 klimt.302.t: "Премия города [SCOPE.sState('klimt_art_capital').GetCityHubName]"
 klimt.302.d: "Жюри пришло к выводу и выбрало лучшие картины. Список пяти победителей уже распространяется."
 klimt.302.f: "1.   [SCOPE.sCharacter('klimt_character_first_winner_scope').GetFullName] из [GetGlobalVariable('klimt_prize_winner_1_global_var').GetCountry.GetAltNameNoFlag('RU_CL_RP')]\n2.   [SCOPE.sCharacter('klimt_character_second_winner_scope').GetFullName] из [GetGlobalVariable('klimt_prize_winner_2_global_var').GetCountry.GetAltNameNoFlag('RU_CL_RP')]\n3.   [SCOPE.sCharacter('klimt_character_third_winner_scope').GetFullName] из [GetGlobalVariable('klimt_prize_winner_3_global_var').GetCountry.GetAltNameNoFlag('RU_CL_RP')]\n4.   [SCOPE.sCharacter('klimt_character_fourth_winner_scope').GetFullName] из [GetGlobalVariable('klimt_prize_winner_4_global_var').GetCountry.GetAltNameNoFlag('RU_CL_RP')]\n5.   [SCOPE.sCharacter('klimt_character_fifth_winner_scope').GetFullName] из [GetGlobalVariable('klimt_prize_winner_5_global_var').GetCountry.GetAltNameNoFlag('RU_CL_RP')]"
 klimt.302.g: "Наградить победителей."
 klimt.401.t: "Цель поездки художника"
 klimt.401.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] уже [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'собрала', 'собрал')] вещи. В какой художественной школе [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'она должна', 'он должен')] учиться?"
 klimt.401.f: "[concept_klimt_painter], который продолжает своё образование в художественной поездке, не будет приносить [Concept('concept_klimt_painting_tradition', 'художественной традиции')] в своё отсутствие. [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'Она', 'Он')] может изучать только те художественные стили, которые [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'ей', 'ему')] ранее были неизвестны. Обычно такая поездка длится год, но могут возникнуть препятствия или возможности, которые продлят пребывание."
 klimt.401.g: "Классицизм."
 klimt.401.h: "Романтизм."
 klimt.401.i: "Реализм."
 klimt.401.j: "Импрессионизм."
 klimt.401.k: "Экспрессионизм."
 klimt.401.l: "Ар-нуво."
 klimt.401.m: "Неважно."
 klimt.402.t: "Прибытие в город [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]"
 klimt.402.d: "Хорошие новости! [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'прибыла', 'прибыл')] в город [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]. [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'Она', 'Он')] всё ещё ищет свободную комнату и скоро начнёт своё обучение."
 klimt.402.f: ""
 klimt.402.g: "Ах... [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]"
 klimt.403.t: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] возвращается из поездки"
 klimt.403.f: "«Искусство есть искусство только там, где оно является самоцелью, где оно абсолютно свободно, предоставлено самому себе, где оно не знает высших законов, кроме своих собственных, законов истины и красоты», — Людвиг Фейербах."
 klimt.403.g: "А вся поездка была не просто для развлечения?"
 klimt.411.t: "Художники среди своих"
 klimt.411.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] во время своей учебной поездки [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'встретила', 'встретил')] коллегу-художника из [SCOPE.sCharacter('klimt_fellow_painter').GetHomeCountry.GetAltNameNoFlag('RU_CL_RP')]. Они признают друг в друге равных коллег. [SCOPE.sCharacter('klimt_fellow_painter').GetFullName] кажется одарённым и общительным человеком."
 klimt.411.f: "Если случайно несколько наций одновременно отправили художника в учебную поездку, то есть вероятность, что они встретятся и возникнут положительные синергетические эффекты. Соперничество и вражда могут тогда быстро исчезнуть в интересах общего энтузиазма по поводу искусства."
 klimt.411.g: "Им следует обменяться своими художественными знаниями."
 klimt.411.h: "Они, безусловно, могут поучиться техникам друг у друга."
 klimt.411.i: "Знакомство будет полезно в мире искусства для взаимной поддержки."
 klimt.421.t: "По стопам гигантов"
 klimt.421.d: "Наш художник [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'написала', 'написал')] со своего места учёбы, что [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'она', 'он')] уже предвидит своё будущее в славных видениях. Однако для этого [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'ей', 'ему')] нужно больше времени и денег."
 klimt.421.f: "В Риме [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] сталкивается с некоторыми из самых важных художников в истории искусства, а также с остатками римской архитектуры. Путешественники в Рим снова и снова развивали особые отношения с этим городом и его историей. Желание пойти по стопам классиков двигало многими художниками. У художника [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] растут амбиции, чтобы однажды стать таким же великим, как один из [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'её', 'его')] кумиров. Это может граничить с манией величия, но прежде всего это потребует времени, терпения — и дальнейшего обучения, как [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'сказала', 'сказал')] [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'она', 'он')] в письме."
 klimt.421.g: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'должна', 'должен')] не торопиться и подражать Микеланджело и Рафаэлю."
 klimt.421.h: "Пусть [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] рисует, а не мечтает!"
 klimt.422.t: "Дух романтиков"
 klimt.422.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] уже несколько дней не пишет из Бамберга. По-видимому, [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'она', 'он')] предаётся мечтаниям."
 klimt.422.f: "Бамберг — это не просто живописное место с многочисленными фахверковыми домами и богатым барочным наследием, которое приглашает к романтическим прогулкам. В этом городе есть нечто, что делало его невероятно привлекательным для романтиков. Людвиг Тик и Генрих Вакенродер были важными романтиками, которые на самом деле приехали из Берлина, но на которых Франкония оставила свой след. Они тоже меньше интересовались учёбой и больше — страной, её людьми и богатым наследием городов этого региона. Э. Т. А. Гофман, ещё один романтик из Пруссии, пережил свой литературный прорыв во время своего пятилетнего пребывания в Бамберге. То, чем для Гёте была его поездка в Италию, для молодых романтиков была эта часть Германии. В культурном ландшафте они не только нашли связь с идеализированным немецким Средневековьем, но и с картинами Альбрехта Дюрера в Нюрнберге и с католицизмом, чья духовность больше привлекала романтиков, чем секуляризованный протестантизм."
 klimt.422.g: "Жизнь бездельника..."
 klimt.423.t: "Обращение в веру"
 klimt.423.d: "На самом деле, [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] до сих пор [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'не имела', 'не имел')] особого отношения к вере. Однако сильный католицизм, с которым [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'она столкнулась', 'он столкнулся')], как в искусстве, так и в повседневной жизни, что-то в [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'ней', 'нём')] пробудил. Всё больше и больше [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'она', 'он')] чувствует связь, которую до тех пор никогда бы не [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'сочла', 'счёл')] возможной. [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'Вдохновлённая', 'Вдохновлённый')] этим, [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'она нарисовала', 'он нарисовал')] свою первую религиозную картину."
 klimt.423.f: "«Увидеть Бамберг и стать католиком» — был девиз среди немецких романтиков. На самом деле, немецкий романтизм был одной из немногих эпох, на которую больше повлияли католические, чем протестантские мыслители, включая многих новообращённых. Подобным образом и Рим приводил сомневающихся в лоно Церкви. Это может показаться удивительным в материалистическую эпоху, в которой прогресс и наука играли ведущую роль в обществе, но именно потребность в противодействии в конечном итоге приводила гедониста в монастырь."
 klimt.423.g: "Надеюсь, это не слащавая картина Мадонны."
 klimt.423.tt: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] теряет все отрицательные черты зависимости и обращается в #YELLOW католичество#!, если [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'она', 'он')] ещё не католик."
 klimt.424.t: "Внимание к деталям"
 klimt.424.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] в городе [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] мастера реализма, который поможет [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'ей', 'ему')] улучшить свою технику живописи. Однако это займёт месяцы, а плата высока."
 klimt.424.f: "«Живопись — искусство по существу конкретное и может состоять только из изображения реальных и существующих вещей», — Гюстав Курбе."
 klimt.424.g: "Это может занять некоторое время, но оно того стоит."
 klimt.424.h: "Пусть [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] лучше сосредоточится на получении признания у мастера."
 klimt.425.t: "Вдохновение без границ"
 klimt.425.f: "«С появлением импрессионизма официальные салоны, которые раньше были коричневыми, стали синими, зелёными и красными… Но будь то мятные леденцы или шоколад, это всё равно кондитерские изделия», — Клод Моне."
 klimt.425.g: "Эти новые идеи вдохновят его на создание многочисленных картин."
 klimt.425.h: "Эти новые идеи должны вдохновить нашу культуру дома."
 klimt.426.t: "Жизнь художника"
 klimt.426.d: "Изысканная жизнь в городе [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] также оставила свой след на [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]. [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'Она', 'Он')] часто бывает в барах и пабах и использует стимуляторы для повышения своей творческой силы. Без одного-двух опьянений [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'она', 'он')] вряд ли [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'смогла бы', 'смог бы')] выполнить свой объём работы за такое короткое время."
 klimt.426.f: "«После первого бокала вы видите вещи такими, какими хотели бы их видеть.\nПосле второго вы видите вещи такими, какими они не являются.\nНаконец, вы видите вещи такими, какие они есть на самом деле,\nчто является самым ужасным в мире», — Оскар Уайльд."
 klimt.426.g: "Если это вдохновляет [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'её', 'его')] искусство — в чём проблема?"
 klimt.426.h: "Тогда это просто займёт больше времени."
 klimt.427.t: "Порок художника"
 klimt.427.d: "Мы получаем тревожные сообщения из города [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]. Зависимости [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] достигают пугающих масштабов. По-видимому, [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'она', 'он')] использует своё отсутствие, чтобы предаваться порокам и разврату, что значительно подрывает [SelectLocalization(GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.IsFemale, 'её', 'его')] здоровье."
 klimt.427.f: "Камиль Писсарро, Анри де Тулуз-Лотрек, Поль Гоген, Оскар Уайльд и Шарль Бодлер — все они стали жертвами абсента. То же самое относится и к Винсенту ван Гогу. Габриэле Д'Аннунцио, с другой стороны, искал эротических приключений. Жан Кокто открыл для себя опиум и написал дневник о его употреблении и последствиях. Тот факт, что во многих случаях эти зависимости и пороки приводили к саморазрушению и преждевременной смерти, является одним из трагических эпизодов жизни художников."
 klimt.427.g: "У каждого художника есть свой порок."
 klimt.427.h: "Мы должны вмешаться!"
 klimt.427.tt: "Образовательная поездка отменяется. [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] будет [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'взята', 'взят')] под стражу нашими агентами в городе [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] и [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'возвращена', 'возвращён')] в [GetPlayer.GetAltNameNoFlag('RU_CL_VP')]. Там [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'её', 'его')] поместят в реабилитационный центр на следующие шесть месяцев."
 klimt.428.t: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] снова доступен"
 klimt.428.d: "После нескольких месяцев перерыва наш художник вернулся к своим обычным делам. [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] не [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'отказалась', 'отказался')] от своего образа жизни, но, по крайней мере, удалось предотвратить худшее."
 klimt.428.f: "«Похищение? Нет, нет, мсье, это было вмешательство. Похищение случилось бы к вашему страданию, вмешательство инициируется только для вашего блага... что вы имеете в виду, мы не знаем, что для вас лучше?»"
 klimt.428.g: "Надеюсь, теперь всё вернётся в норму."
 klimt.431.t: "Ведута"
 klimt.431.d: "[SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'Вдохновлённая', 'Вдохновлённый')] красотой принимающего города [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName], наш художник во время образовательной поездки начал писать мастерскую ведуту. Однако это может немного продлить [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'её', 'его')] пребывание."
 klimt.431.f: "Ведута — это очень детализированная, обычно крупномасштабная картина или, чаще, гравюра городского пейзажа или какого-либо другого вида. Художников, пишущих ведуты, называют ведутистами. В конце XIX века более личные «впечатления» от городских пейзажей вытеснили стремление к топографической точности, которое удовлетворялось вместо этого раскрашенными, а позже и сфотографированными панорамами. К наиболее важным художникам-ведутистам этого времени относятся Дэвид Робертс и Эдуард Гертнер."
 klimt.431.g: "Великолепная идея."
 klimt.431.h: "Сосредоточиться на учёбе."
 klimt.432.t: "Кружок живописцев"
 klimt.432.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] был[SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'а принята', ' принят')] в местную группу художников города [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] как свой."
 klimt.432.f: "«Я должен оставаться один и знать, что я один, чтобы созерцать и чувствовать природу в полной мере; я должен отдаться тому, что меня окружает, я должен слиться со своими облаками и скалами, чтобы быть тем, кто я есть. Одиночество необходимо для моего диалога с природой», — Каспар Давид Фридрих."
 klimt.432.g: "Нам нужно признание мира живописи."
 klimt.433.t: "Быстрое усвоение"
 klimt.433.d: "Во время своей образовательной поездки в город [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName] наш художник делает успехи быстрее, чем ожидалось. Может быть, [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'она', 'он')] сможет вернуться раньше."
 klimt.433.f: "«Талант делает всё, что хочет. Гений делает только то, что может», — Эжен Делакруа."
 klimt.433.g: "Талант виден с первого взгляда."
 klimt.434.t: "Торговец искусством"
 klimt.434.d: "Во время своего образовательного пребывания [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'нашла', 'нашёл')] известного торговца искусством, который мог бы продать несколько произведений."
 klimt.434.f: "«Я абсолютно серьёзный бизнесмен. Клевета моих конкурентов о том, что я продаю подделки, вызвана только завистью. Могу ли я теперь заинтересовать вас этой картиной? Настоящий Леонардо да Винчи: „Дама с сикстинским дегу“. Редкость! Такого предложения больше никогда не будет!»"
 klimt.434.g: "Купить несколько картин."
 klimt.434.h: "Нам не нужен второсортный иностранный товар."
 klimt.435.t: "Последняя мода"
 klimt.435.d: "Во время своей образовательной поездки наш художник [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'узнала', 'узнал')] о новых модах, новых архитектурных стилях и новых развлечениях, которые ранее были [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'ей', 'ему')] неизвестны."
 klimt.435.f: "«Мужчины, приехавшие из Англии, умели рассказывать своим удивлённым друзьям, что люди за Ла-Маншем, какими бы разумными они ни были, всё же очень любят детские забавы. Так, молодые люди развлекаются, пиная кожаный мяч по лугу, другие бьют по мячу через сетку чем-то вроде выбивалки для ковров, и это безумие привлекает толпы зрителей. Среди них есть люди при должностях и званиях, которые иногда даже не брезгуют сами поучаствовать»."
 klimt.435.g: "Свежее дыхание новой культуры."
 klimt.435.h: "Но правильно ли просто следовать духу времени?"
 alert_klimt_painter_trip_possible_alert_name: "Ваш [concept_klimt_painter|l] мог бы изучить новый художественный стиль"
 klimt_painter_trip_possible_alert_setting_name: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon! #! Ваш [concept_klimt_painter|l] мог бы изучить новый художественный стиль"
 klimt_great_painting_modifier: "Великолепный портрет"
 klimt_excellent_taste_modifier: "Отличный вкус"
 klimt_disgusting_painting_modifier: "Отвратительный портрет"
 klimt_disgusting_taste_modifier: "Отвратительный вкус"
 klimt_art_censorship_modifier: "Цензура в живописи"
 je_klimt_rossetti: "Братство прерафаэлитов"
 je_klimt_rossetti_reason: "Прерафаэлиты — это группа художников, которые видят культурный разрыв в искусстве Возрождения Рафаэля и Микеланджело. Они предпочитают итальянскую живопись Треченто и Кватроченто. Они видели себя реформаторским движением. Их соперничество было направлено не столько на самих художников Возрождения, сколько на неоклассицистов, которые брали с них пример. Они особенно часто обращались к средневековым сюжетам. Одним из самых известных их представителей был Данте Габриэль Россетти."
 je_klimt_fattori: "Маккьяйоли"
 je_klimt_fattori_reason: "Маккьяйоли были уникальной итальянской художественной группой, которая предвосхитила новшества импрессионизма, но осталась в значительной степени незамеченной в своё время. Термин «Маккьяйоли» происходит от итальянского слова macchia, что означает «пятно» (второе значение — заросли, маквис). Их самым важным представителем был Джованни Фаттори."
 je_klimt_barbizon: "Барбизонская школа"
 je_klimt_barbizon_reason: "Барбизонская школа была образована группой французских пейзажистов к концу первой трети XIX века. Художники останавливались в деревне Барбизон недалеко от Фонтенблоского леса. Колония художников, основанная Теодором Руссо и существовавшая примерно до 1870 года, оказала значительное влияние на пейзажную живопись по всей Европе, особенно на импрессионизм."
 klimt.501.t: "Прерафаэлиты"
 klimt.501.d: "С прерафаэлитами было создано братство, которое выступало против классицизма и реализма, но в то же время видело себя реформаторским движением. Их поддержка могла бы выявить новые таланты, но это противоречило бы стилю нашего нынешнего художника, [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]."
 klimt.501.f: "«Я был здесь раньше,\nНо когда и как, не могу сказать:\nЯ знаю траву за дверью,\nСладкий, острый запах,\nВздыхающий звук, огни вокруг берега», — Данте Габриэль Россетти."
 klimt.501.g: "Продвигать Братство прерафаэлитов."
 klimt.501.h: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] намного лучше"
 klimt.502.t: "Маккьяйоли"
 klimt.502.d: "Сегодня во Флоренции была основана художественная группа «Маккьяйоли». Хотя её влияние невелико, группа вдохновляет некоторых молодых художников искать новые пути в искусстве."
 klimt.502.f: "«Пятно (macchia) — это плотность тел перед светом», — Джованни Фаттори."
 klimt.502.g: "Так они были авангардом до авангарда?"
 klimt.503.t: "Барбизонская школа"
 klimt.503.d: "С созданием кружка художников недалеко от Фонтенбло под руководством Теодора Руссо пейзажная живопись получила новый импульс во всей художественной среде."
 klimt.503.f: "«Если моя картина передаёт верно и без излишней изысканности простой и истинный характер места, которое вы посещали, если мне удастся... дать свою жизнь этому миру растительности, тогда вы услышите, как стонут деревья под зимним ветром, как птицы зовут своих птенцов и плачут после их разлуки; вы почувствуете, как дрожит старый замок; он скажет вам, что, как и любимая вами жена, он тоже... исчезнет и возродится в множестве форм... Нельзя копировать с математической точностью то, что видишь, но можно чувствовать и интерпретировать реальный мир, все фатальности которого крепко держат вас», — Теодор Руссо."
 klimt.503.g: "Прекрасные пейзажи!"
 klimt.601.t: "Смерть [SCOPE.sCharacter('klimt_painter_scope').GetLastName]"
 klimt.601.d: "[SCOPE.sCharacter('klimt_painter_scope').GetFullName], высоко ценимый на национальном и международном уровне художник и одна из выдающихся творческих личностей нашей страны, [SelectLocalization(SCOPE.sCharacter('klimt_painter_scope').IsFemale, 'скончалась', 'скончался')] сегодня. [SelectLocalization(SCOPE.sCharacter('klimt_painter_scope').IsFemale, 'Она', 'Он')] оставляет пустоту, которую вряд ли можно заполнить."
 klimt.601.f: "26 июня 1835 года Каспар Давид Фридрих перенёс инсульт с симптомами паралича. Он лечился в Теплице, что мог позволить себе только продав несколько картин о поэте Жуковском русскому царскому двору. После лечения Фридрих снова начал рисовать, что давалось ему с трудом. Тем не менее, в 1835/36 годах была создана масляная картина «Морской берег при лунном свете». До 1839 года он в основном создавал рисунки сепией и акварели, меньше пейзажей и больше аллегорий смерти. Фридрих отправил несколько рисунков сепией на дрезденские художественные выставки в 1836 и 1838 годах. В последний год жизни работа прекратилась. Фридрих умер в возрасте 65 лет 7 мая 1840 года в Дрездене и был похоронен на Троицком кладбище."
 klimt.601.g: "Но кто же теперь напишет [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'её', 'его')] посмертный портрет?"
 klimt.602.f: "С возрастом Тёрнер становился всё более эксцентричным. У него было мало близких друзей, за исключением отца, который прожил с ним 30 лет и работал его ассистентом в студии. Смерть отца в 1829 году оказала на него глубокое влияние, и после этого он страдал от приступов депрессии. Тёрнер умер от холеры в доме Софии Каролины Бут на Чейни-Уок в Челси 19 декабря 1851 года. Он похоронен в соборе Святого Павла, где покоится рядом с художником сэром Джошуа Рейнольдсом. По-видимому, его последними словами были «Солнце (или Сын?) — это Бог», хотя это может быть апокрифом."
 klimt.603.f: "6 февраля 1848 года семья Коул посетила утреннюю службу в епископальной церкви Святого Луки в Кэтскилле. После обеда Коул пожаловался на слабость, и к полуночи его состояние ухудшилось, и был вызван врач. Последовал приступ плеврита и застой в лёгких. Томас Коул умер в главном доме в Сидар-Гроув в 8 часов вечера в пятницу, 11 февраля 1848 года."
 klimt.604.f: "Зима 1862/63 года была для Делакруа чрезвычайно тяжёлой; он страдал от сильной ангины, которая, казалось, ухудшалась в течение сезона. Во время поездки в Шампрозе он встретил друга в поезде и истощился после разговора. 1 июня он вернулся в Париж, чтобы показаться врачу. Две недели спустя, 16 июня, ему стало лучше, и он вернулся в свой загородный дом. Но к 15 июля ему стало так плохо, что он снова обратился к врачу, который сказал, что больше ничего не может для него сделать. К тому времени единственной пищей, которую он мог есть, были фрукты. Делакруа осознал серьёзность своего состояния и написал завещание, оставив подарок каждому из своих друзей. Своей верной экономке, Женни Ле Гийу, он оставил достаточно денег на жизнь, приказав продать всё в своей студии. Он также вставил пункт, запрещающий любое изображение его черт, «будь то посмертная маска, рисунок или фотография. Я запрещаю это категорически». 13 августа Делакруа умер."
 klimt.605.f: "В последние годы жизни зрение Эккерсберга начало ухудшаться. В конце концов это привело к тому, что ему пришлось полностью отказаться от живописи. Он умер в Копенгагене от холеры 22 июля 1853 года во время большой эпидемии. Он похоронен на копенгагенском кладбище Ассистенс."
 klimt.901.t: "Небосвод [GetPlayer.GetAltNameNoFlag('RU_CL_RP')]"
 klimt.901.d: "[GetPlayer.GetName] — ведущая держава в области астрономии. Выдающимися открытиями в ней прославил[SelectLocalization(ROOT.Var('verrier_astronomer_var').GetCharacter.IsFemale, 'ась', 'ся')] [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]. Под их впечатлением [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'создала', 'создал')] картину, изображающую ночное небо и космос."
 klimt.901.f: "Вехи в истории нации также оказывают влияние на художников страны. Необычные культурные события, технологические достижения и научные открытия могут вдохновить художников запечатлеть их на холсте для вечности."
 klimt.901.g: "Прекрасно!"
 klimt.902.t: "Сокровища Тихого океана"
 klimt.902.d: "Возвращение экспедиции из Тихого океана оставило свой след: в [GetPlayer.GetAltNameNoFlag('RU_CL_VP')] прибыли экзотические товары, увлекательные сокровища искусства, новые океанографические знания и дикие животные. Это вдохновило художника [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] на создание картины, демонстрирующей волю нашей нации к открытиям и исследованиям."
 klimt.903.t: "Восточное искусство"
 klimt.903.d: "Растущее число экспедиций на Ближний Восток пробудило в обществе эйфорию по поводу художественного направления, которое можно охарактеризовать как «ориентализм». [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] также был[SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'а охвачена', ' охвачен')] очарованием Востока и [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'написала', 'написал')] фантазийную картину из «1001 ночи»."
 klimt.904.t: "Импульс новой эры"
 klimt.904.d: "[GetPlayer.GetName] находится на переднем крае покорения неба. Новые машины, будь то самолёты или дирижабли, заполняют небо. Каждый день бьются новые рекорды, а наши пилоты считаются национальными героями. [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'запечатлела', 'запечатлел')] дух этой новой эры в цвете и прославляет триумф технологии, воли и героизма."
 klimt.905.t: "Портрет с тигром и львом"
 klimt.905.d: "Во время своего последнего визита в зоопарк [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'смогла', 'смог')] воочию увидеть экзотических животных, которых [GetPlayer.GetName] уже [SelectLocalization(GetPlayer.GetRuler.IsFemale, 'привезла', 'привёз')] в столицу со всего мира. Как квалифицированный зоолог, профессор [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('dubois_naturalist_var').GetCharacter.IsFemale, 'провела', 'провёл')] [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'ей', 'ему')] экскурсию и [SelectLocalization(ROOT.Var('dubois_naturalist_var').GetCharacter.IsFemale, 'рассказала', 'рассказал')] несколько интересных фактов о животных. В конце своего пребывания [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'она создала', 'он создал')] необычный автопортрет."
 klimt.906.t: "Наброски динозавров"
 klimt.906.d: "[SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'Вдохновлённая', 'Вдохновлённый')] успехами профессора [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName], [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'попыталась', 'попытался')] вернуть к жизни вымерших рептилий на картине."
 klimt.907.t: "Тайны джунглей"
 klimt.907.d: "Археологические открытия на Юкатане и авантюрные обстоятельства, в которых исследователи, такие как профессор [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], неоднократно открывали новые поселения майя, побудили [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] увековечить наши экспедиции на картинах."
 klimt.908.t: "[ROOT.Var('elgar_composer_var').GetCharacter.GetFullName]: портрет"
 klimt.908.d: "Маэстро [ROOT.Var('elgar_composer_var').GetCharacter.GetLastName] известен своей неутомимой работой и постоянным созданием новых шедевров. Вдохновившись этим, художник [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'решила создать', 'решил создать')] портрет этого [Concept('concept_elgar_composer', '#PURPLE #b композитора#!#!')]. Не только его несравненная музыка, но и эта картина приумножат его славу."
 klimt.911.t: "[SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle] на портрете?"
 klimt.911.d: "В официальной галерее глав государства [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] до сих пор отсутствует портрет, на котором был бы изображен [SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('klimt_ruler_scope').GetFullName]. Он считается очевидным кандидатом для достойного изображения правителя."
 klimt.911.f: "Каждый срок есть шанс, что художника попросят написать портрет главы правительства или главы государства. Удастся ли это, зависит от репутации соответствующего художника."
 klimt.911.g: "Создать портрет."
 klimt.911.h: "А если что-то пойдёт не так — кто за это заплатит?"
 klimt.912.t: "Весьма... примечательный портрет"
 klimt.912.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] сегодня публично [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'представила', 'представил')] свой портрет [SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle|l]. В то время как коллеги-художники подчёркивают «смелость» и «новаторство», часть правительства в ужасе от него."
 klimt.912.f: "«Это отвратительно!»\n«Это называется кубизм, сэр»."
 klimt.912.g: "Искусство есть искусство."
 klimt.912.h: "Уничтожить эту картину!"
 klimt.913.t: "Великолепный портрет"
 klimt.913.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'превзошла саму себя', 'превзошёл самого себя')] своей картиной, на которой изображен [SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle]. Картина сразу же вызвала восторг и считается одной из [SelectLocalization(ROOT.Var('klimt_painter_var').GetCharacter.IsFemale, 'её', 'его')] лучших работ."
 klimt.913.f: "«Рост шесть с половиной футов, мускулы как у Геракла, волевой взгляд как у Наполеона, лицо как у Афродиты — да, это точно я! Осыпьте художника деньгами»."
 klimt_can_aquire_masterwork_tt: "#default_text У [GetPlayer.GetAltNameNoFlag('RU_CL_RP')] в общей сложности #V 100 #! ед. [Concept('concept_klimt_painting_tradition', 'художественной традиции')].#!"
