 je_klimt_painter_trip: "Образовательная поездка"
 je_klimt_painter_trip_reason: "Во время [Concept('concept_klimt_painter_trip', 'образовательного путешествия')] художник может изучить ранее неизвестный ему художественный стиль и тем самым увеличить годовой прирост [Concept('concept_klimt_painting_tradition', 'художественной традиции')]. Он также может приобрести другие положительные и отрицательные черты во время своего пребывания в иностранном [concept_artists_center_of_arts|l]."
 je_klimt_painter_trip_goal: "Обычно художник завершает обучение за #G 12 месяцев#!. События могут удлинить или сократить это время."
 je_klimt_secession: "Сецессион в стиле ар-нуво"
 je_klimt_secession_reason: "Новое художественное направление ар-нуво привлекло множество художников. При определённых условиях это может привести к созданию признанного художественного движения, пользующегося международной известностью и дающего новый импульс живописи и архитектуре. Исторически одним из важнейших объединений такого типа был Венский сецессион. Венский сецессион, точнее Ассоциация австрийских художников, — это объединение художников в Вене периода fin de siècle. Отсюда венский вариант ар-нуво также называют стилем сецессион или венским модерном."
 je_klimt_secession_fail: "Другая держава создала сецессион раньше нас."
