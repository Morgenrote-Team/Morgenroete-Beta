 klimt_classic_school_desc: "Этот персонаж изучал классицизм. После 40 лет он может специализироваться на этом художественном стиле."
 klimt_romantic_school_desc: "Этот персонаж изучал романтизм. После 40 лет он может специализироваться на этом художественном стиле."
 klimt_realistic_school_desc: "Этот персонаж изучал реализм. После 40 лет он может специализироваться на этом художественном стиле."
 klimt_impressionistic_school_desc: "Этот персонаж изучал импрессионизм. После 40 лет он может специализироваться на этом художественном стиле."
 klimt_expressionistic_school_desc: "Этот персонаж изучал экспрессионизм. После 40 лет он может специализироваться на этом художественном стиле."
 klimt_art_nouveau_school_desc: "Этот персонаж изучал ар-нуво. После 40 лет он может специализироваться на этом художественном стиле."
 klimt_classic_painter_desc: "Этот персонаж специализируется на написании картин в стиле классицизма. Это позволяет ему создавать шедевры классицизма."
 klimt_romantic_painter_desc: "Этот персонаж специализируется на написании картин в стиле романтизма. Это позволяет ему создавать шедевры романтизма."
 klimt_realistic_painter_desc: "Этот персонаж специализируется на написании картин в стиле реализма. Это позволяет ему создавать шедевры реализма."
 klimt_impressionistic_painter_desc: "Этот персонаж специализируется на написании картин в стиле импрессионизма. Это позволяет ему создавать шедевры импрессионизма."
 klimt_expressionistic_painter_desc: "Этот персонаж специализируется на написании картин в стиле экспрессионизма. Это позволяет ему создавать шедевры экспрессионизма."
 klimt_art_nouveau_painter_desc: "Этот персонаж специализируется на написании картин в стиле ар-нуво. Это позволяет ему создавать шедевры ар-нуво."
