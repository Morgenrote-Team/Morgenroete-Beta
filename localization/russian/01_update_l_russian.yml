 gaudi.10.t: "Архитектор улучшил репутацию" #deepl:3290657742
 gaudi.10.d: "За последние несколько лет [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] продемонстрировала [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] опыт в улучшении и строительстве новых зданий по всей стране, значительно повысив репутацию и квалификацию [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]." #deepl:1621312069
 gaudi.10.f: ""Материнское искусство - это архитектура. Без собственной архитектуры у нас нет души нашей цивилизации". -Фрэнк Ллойд Райт" #deepl:2640014774
 gaudi.10.g: "К новым архитектурным задачам!" #deepl:4140846455

