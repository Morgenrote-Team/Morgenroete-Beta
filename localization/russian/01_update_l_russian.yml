 je_douglas_mountaineering_expedition: "Альпинистская экспедиция" #deepl:4271916428
 je_douglas_mountaineering_expedition_reason: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]Наш альпинист в настоящее время возглавляет группу альпинистов в экспедиции на сайте [SCOPE.sState('douglas_location_scope').GetName]. Цель - первовосхождение на вершину. Скорость восхождения во многом зависит от его опыта и особенностей характера. В зависимости от сложности горы могут возникнуть большие опасности. Если экспедиция не достигнет цели в определенный срок, [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetLastName] прервет восхождение на вершину. Если же по какой-либо причине экспедиция окажется в самой большой мыслимой опасности, то произойдет самое худшее." #deepl:488000629

