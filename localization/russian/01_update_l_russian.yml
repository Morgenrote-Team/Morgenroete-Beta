 douglas.101.t: "Основан альпинистский клуб" #deepl:222126293
 douglas.101.d: "[SCOPE.sCharacter('douglas_president_scope').GetFullName] зовет - и гора отвечает. Основание Альпинистского клуба знаменует собой новую эру для всех, кто стремится ввысь." #deepl:4067420597
 douglas.101.f: "[SCOPE.sCharacter('douglas_president_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('douglas_president_scope').GetLastName] Экспедиции привели [SCOPE.sCharacter('douglas_president_scope').GetHerHim] через штормы и лавины - но теперь [SCOPE.sCharacter('douglas_president_scope').GetSheHe] стремится передать [SCOPE.sCharacter('douglas_president_scope').GetHerHis] наследие. В [ROOT.GetCountry.GetCapital.GetCityHubName] [SCOPE.sCharacter('douglas_president_scope').GetSheHe] он основывает Альпинистский клуб [GetPlayer.GetName], но не один, а вместе с многообещающим новичком: [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName], начинающим альпинистом с острым взглядом и железной волей. [SCOPE.sCharacter('douglas_president_scope').GetFullName] видит в [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetHerHim] не просто амбиции, а будущую легенду. Вместе они стоят на пороге пути, который ведет не только к вершинам, но и к славе, мужеству и, возможно, месту в истории. Клуб открыт для всех, кто слышит зов гор. Восхождение начинается." #deepl:3771164746
 douglas.101.g: "Гора зовет!" #deepl:249284577

 douglas.102.t: "Альпийский клуб" #deepl:1599559370
 douglas.102.d: "Альпийский клуб был официально основан в [ROOT.GetCountry.GetCapital.GetCityHubName] в [TimeKeeper.GetCurrentDate.Format('y')] и признан первой в мире международной альпинистской организацией. Его создание знаменует собой институциональное начало современного альпинизма." #deepl:3982546221
 douglas.102.f: "Исторически сложилось так, что группа британских джентльменов собралась в Лондоне в 1857 году, чтобы основать клуб, посвященный альпинизму. Возглавляемый такими деятелями, как Джон Болл и Эдвард Кеннеди, Альпийский клуб стремился содействовать систематическому исследованию Альп, сочетая физические нагрузки с изучением географии и природы. Клуб обеспечивал структурированную основу для обмена знаниями, организации экспедиций и развития чувства общности среди альпинистов. Его члены сыграли ключевую роль в том, что впоследствии будет известно как "Золотой век альпинизма", совершив множество первовосхождений и задокументировав свой опыт. Вскоре после этого начал выходить "Альпийский журнал", который внес свой вклад в зарождающуюся литературу об альпинизме. Основание Альпийского клуба заложило основу для организованного альпинизма во всем мире и установило непреходящие стандарты в исследовании гор." #deepl:4126383378
 douglas.102.g: "На вершину вместе!" #deepl:2506053391

