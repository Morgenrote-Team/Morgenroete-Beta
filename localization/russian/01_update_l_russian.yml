 MR_MOUNTAIN_EXPEDITION_LEVEL_1_BUTTON_TT: "#T Альпинистская экспедиция: Вершины первого уровня#!\nЭта категория гор может быть поднята с альпинистским снаряжением первого уровня. Уровень не указывает на высоту или риск. К этим вершинам относятся: Гора Уитни, Цитлальтепетль, Попокатепетль, Чимборасо, Пико Ането, Монблан, Гросвенедигер, Гора Камерун, Рас Дашен и Гора Гилуве. Для получения дополнительной информации загляните на сайт [concept_douglas_mountain_summit_list].\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1466134091
