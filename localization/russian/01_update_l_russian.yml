 MR_ARCHITECT_MODERN_SPLENDOUR_BUTTON_TT: "#T Современное великолепие#!\nПолучив современную архитектурную школу, мы сможем превратить столицу нашей страны в настоящую мечту о смелых архитектурных экспериментах. Ар-деко считается самым престижным, но его преобразование займет больше времени.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:4119465333
