 douglas.211.t: "Саммит" #deepl:3152681021
 douglas.211.d: "После тяжелого восхождения группа альпинистов наконец достигает вершины. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] - первый человек, штурмовавший эту точку Земли [ROOT.GetCountry.GetNameNoFormatting]. Теперь остается только наслаждаться моментом триумфа." #deepl:2761012191
 douglas.211.f: "Первый вопрос, который вы зададите, и на который я должен попытаться ответить, звучит так: "Какая польза от восхождения на Эверест?" И мой ответ сразу же должен быть таким: "Никакой пользы". Нет ни малейшей перспективы получить какую-либо выгоду.\n\nО, мы можем узнать немного о поведении человеческого тела на больших высотах, и, возможно, медики смогут использовать наши наблюдения для целей авиации. Но в остальном из этого ничего не выйдет. Мы не привезем ни крупицы золота или серебра, ни одного драгоценного камня, ни угля, ни железа. Мы не найдем ни одного фута земли, который можно было бы засеять зерном, чтобы вырастить пищу. Это бесполезно.\n\nЕсли вы не можете понять, что в человеке есть что-то, что отвечает на вызов этой горы и идет навстречу ему, что борьба - это борьба самой жизни вверх и навсегда вверх, тогда вы не поймете, зачем мы идем. Все, что мы получаем от этого приключения, - это только радость.\n\n А радость - это, в конце концов, конец жизни. Мы живем не для того, чтобы есть и зарабатывать деньги. Мы едим и зарабатываем деньги, чтобы иметь возможность наслаждаться жизнью. Вот что значит жизнь и для чего она нужна. Джордж Ли Мэллори" #deepl:2116445992
 douglas.211.g: "Давайте наслаждаться рассветом!" #deepl:3916807741
 douglas.212.t: "Восхождение прервано" #deepl:2889222354
 douglas.212.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName]Попытка достичь вершины пока провалилась. Наш альпинист вынужден отказаться от затеи и вернуться." #deepl:641296697
 douglas.212.f: "Причин, по которым альпинист отказывается от восхождения, может быть множество. Иногда достаточно изменения погоды, иногда предполагаемый путь к вершине оказывается слишком коварным. Восхождение часто занимает слишком много времени и выходит за рамки временного окна, потому что определенное время суток и изменения делают восхождение трудным или невозможным. А иногда вы просто выбрали неправильный путь." #deepl:430022267
 douglas.212.g: "Разочарование." #deepl:1131565686
 douglas.213.t: "Альпинистская катастрофа!" #deepl:285221578
 douglas.213.d: "Во время восхождения в горы на сайте [SCOPE.sState('douglas_location_scope').GetName], [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] была допущена ужасная ошибка, которая закончилась катастрофой - несколько человек погибли, провизия и снаряжение упали вместе с ними. Вся страна в шоке!" #deepl:2272067559
 douglas.213.f: "Каждую ночь, понимаете ли, я вижу, как мои товарищи с Маттерхорна скользят на спине, раскинув руки, один за другим, в идеальном порядке на равном расстоянии - сначала проводник Кроз, потом Хадоу, потом Хадсон и, наконец, Дуглас. Да, я всегда буду видеть их..." - Эдвард Уимпер" #deepl:3038127729
 douglas.213.g: "Трагедия!" #deepl:1503732790

