 douglas.104.t: "Гора внутри" #deepl:2079471330
 douglas.104.d: "После пяти лет изнурительных восхождений и тренировок [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] возвращается." #deepl:862787273
 douglas.104.f: "У горы нет голоса, но она учит. За пять долгих лет наш альпинист столкнулся со снежной слепотой, осыпающимися скалами, пронизывающим ветром и тишиной, которая режет глубже любого лезвия. Но каждое испытание превращало знания в мускулы, а терпение - в дыхание. То, что начиналось как амбиции, теперь превратилось в мастерство. Альпинист научился слушать камень, предсказывать бурю по запаху, завязывать узлы с закрытыми глазами и ровным сердцем. [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] возвращается преображенным. Это начало мастерства." #deepl:1510753382
 douglas.104.g: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe|U] больше не покоряет гору -[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetSheHe] понимает ее." #deepl:2453485277

