 gaudi.35.t: "Квартал в стиле модерн в [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]" #deepl:1088148255
 gaudi.35.d: "Новое художественное развитие не остановилось на [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]: в квартале, который теперь считается кварталом авангарда, строятся новые здания в стиле модерн." #deepl:3696139674
 gaudi.35.f: "Дебют архитектуры модерна в Брюсселе сопровождался волной декоративного искусства в новом стиле. Среди художников были Гюстав Страувен, который использовал кованое железо для создания барочных эффектов на брюссельских фасадах; мебельный дизайнер Гюстав Серрюрье-Бови, известный своими оригинальными стульями и шарнирной металлической мебелью; ювелирный дизайнер Филипп Вольферс, который создавал украшения в виде стрекоз, бабочек, лебедей и змей. Этот стиль быстро заметили в соседней Франции. Посетив отель Орта "Тассель", Гектор Гимар построил замок Беранже - одно из первых парижских зданий в новом стиле. Парижане приветствовали оригинальный и живописный стиль Гимара; замок Беранже был выбран одним из лучших новых фасадов в Париже, что положило начало карьере Гимара. Всемирная выставка 1900 года в Париже стала кульминацией модерна. С апреля по ноябрь 1900 года она привлекла около пятидесяти миллионов посетителей со всего мира и продемонстрировала архитектуру, дизайн, изделия из стекла, мебель и предметы декора, характерные для этого стиля. Хотя Парижская выставка была, безусловно, самой крупной, другие выставки сделали многое для популяризации стиля." #deepl:3102882922
 gaudi.35.g: "Новая яркая культура." #deepl:3379987285

 gaudi.22.t: "Линии и меры" #deepl:2020920879
 gaudi.22.d: "Наш архитектор возвращается - на этот раз с геодезическим жезлом в руках и новыми глазами на землю." #deepl:505021070
 gaudi.22.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] когда-то довольствовался зарисовкой фасадов на городских площадях, прослеживанием теней и орнамента. Теперь [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] рисует линии на земле.\n\nВо время путешествий [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] покинул города и отправился в глубинку. В диких местах Галиции, в болотах дельты реки По и на железнодорожных перегонах Мидлендса [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] ходил с инженерами, фермерами и прорабами. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] научился читать местность, как другие читают Священное Писание. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] Он может сказать вам, куда потечет вода, где сдвинется глина, где фундамент треснет через пять зим.\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] теперь говорит об уклонах и геодезических пунктах. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] блокноты заполнены не росчерками, а углами, высотами и расстояниями, измеренными с точностью до дюйма. Некоторые говорят, что [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]'стал сухим - слишком требовательным, слишком жестким. Но когда [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] смотрит на пустое поле, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] уже видит, где могут проходить проспекты." #deepl:3503840059
 gaudi.22.g: "Строительство начинается задолго до закладки краеугольного камня." #deepl:960677900
 gaudi.23.t: "Архитектор, который считает" #deepl:2805524520
 gaudi.23.d: "После двух лет обучения наш архитектор возвращается -[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] ум острее, [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] чертежи необычнее." #deepl:3720893
 gaudi.23.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] когда-то делал наброски инстинктивно. Теперь [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] делает наброски с помощью логики.\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] проводил [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] время не среди каменщиков или строителей, а в лекционных залах. Париж, Геттинген, даже Санкт-Петербург. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] сидел под меловыми досками, заполненными символами, учился у людей, которые ничего не строили руками, но все строили умом. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] теперь говорит о симметрии, о модуле, о кривых нагрузки, описанных элегантными формулами.\n\n Исчезли размашистые росчерки. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] новые планы строги, странны, почти чужды в своей точности. Кому-то они покажутся холодными, нечеловеческими. Но потом [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] объясняет: красота купола не в его украшении, а в совершенстве его кривой.\n\nЧиновники не знают, что делать с [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] Коллеги шепчут о непрактичности. Но другие - особенно молодые - прислушиваются." #deepl:796837829
 gaudi.23.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] строит то, что другие только воображают." #deepl:2581034432
 gaudi.24.t: "Бумага перед камнем" #deepl:3533867777
 gaudi.24.d: "Наш архитектор возвращается не с инструментами или уравнениями, а с печатями, подписями и сетью чиновников." #deepl:223531508
 gaudi.24.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] больше не борется за чертежной доской. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] теперь скользит по офисам.\n\nВ течение двух лет за границей [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] не просто изучал архитектуру -[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] изучал администрацию. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] узнал, как проект живет или умирает не по замыслу, а по указу. В Вене [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] наблюдал за работой министерств; в Брюсселе [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] следил за клерками, выдающими разрешения; в Марселе [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] присутствовал на заседаниях совета, на которых канализационные трубы решали судьбу горизонта.\n\n Теперь, вернувшись домой, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] знает, какие документы когда подавать, на какие постановления ссылаться, кому льстить, а кого игнорировать. Правила, говорит [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe], - это не стены, а строительные леса: их можно передвигать, смягчать, изменять. И почему-то разрешения приходят быстрее, чем когда-либо." #deepl:3047390249
 gaudi.24.g: "Каждая великая структура начинается с подписанной формы." #deepl:3498658136
 gaudi.25.t: "Архитектор возвращается... В конечном итоге" #deepl:2911431628
 gaudi.25.d: "Наш архитектор наконец-то вернулся из грандиозного турне [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis]. Никто не знает, что именно [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] привезет с собой, кроме историй." #deepl:3640320352
 gaudi.25.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] уходят с эскизами. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] возвращается с сигариллами и анекдотами. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] называет имена, высказывает мнения, а долги [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] делает вид, что не помнит.\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] говорит красиво, даже убедительно о сооружениях, которые [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] никогда не измерял. Когда его спрашивают о планах, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] меняет тему. Когда его спрашивают о результатах, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] улыбается и уверяет, что гениальность нельзя торопить.\n\nНекоторые говорят, что [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]- мошенник. Другие называют [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] гением, которого неправильно поняли. А правда? Скорее всего, где-то между кафе в Триесте и опоздавшим поездом в Неаполе." #deepl:3339735037
 gaudi.25.g: "Что [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] делал все это время?!" #deepl:3328871879
 gaudi.26.t: "В тени мастера" #deepl:1494314704
 gaudi.26.d: "Наш архитектор возвращается - более мудрым, стойким и несущим на себе отпечаток великого учителя." #deepl:2040369888
 gaudi.26.f: "В то время как другие много путешествовали, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] предпочел глубину расстоянию. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] провел большую часть своих лет под руководством одной фигуры - стареющего архитектора с легендарной репутацией. Не только в лекционных залах, но и на строительных лесах и в тишине, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] учился видеть структуру за орнаментом, замысел за фасадом. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] линии становились чище. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] взгляд критичнее. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] учили не только как строить, но и зачем. Слухи о наставничестве [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] распространились раньше, чем [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]. Молодые подмастерья уже ищут [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim], а городские власти встречают его с неожиданным почтением. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] возвращается как человек, отмеченный преемственностью, традицией и, возможно, когда-нибудь наследием." #deepl:833263334
 gaudi.26.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] несет на себе груз чужой мудрости." #deepl:1891012360

 je_gaudi_study_trip: "Учебная поездка архитектора" #deepl:471476780
 je_gaudi_study_trip_reason: "Наш архитектор, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName], в настоящее время путешествует по архитектурным достопримечательностям, академиям и встречается с другими художниками. Мы не сможем связаться с ним в течение двух лет." #deepl:840922178
 je_gaudi_study_trip_success: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] возвращается через два года." #deepl:130151750
 je_gaudi_study_trip_result: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] получит опыт и (в большинстве случаев) новую способность." #deepl:1095907610
