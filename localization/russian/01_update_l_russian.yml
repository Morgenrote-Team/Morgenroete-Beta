 ### MR Concepts ###

 concept_gaudi_architectural_splendour: "Architectural Splendour" #please replace
 concept_gaudi_architectural_splendour_desc: "Architectural Splendour is a collective term for the spectacular advances in modern architecture, referring primarily to Art Deco, Bauhaus, and Neoclassicism as they emerged in the early 20th century. The value represents the transformation of outdated forms into a future-ready architecture. Art Deco requires reaching a higher threshold to fulfill the dream of an Art Deco city — yet the benefits are greater." #please replace
 concept_artists_artist_desc: "In [concept_morgenroete] #b Artists#! are special characters that allow you to use certain mechanics of the mod. You can get #b Artists#! in some events or by aquiring enough [concept_artistic_progress]. Artists have [concept_artists_experience] that reflects their standing in their respective field.\nCurrently these #b Artists#! exist:\n - [concept_elgar_composer]\n - [concept_klimt_painter]\n - [concept_manzoni_writer] - [concept_gaudi_architect]" # Please replace
 concept_elgar_architecture_desc: "Architecture is one of the core concepts of [concept_morgenroete]. It is divided into two major parts.\n\nOn the one hand, [concept_gaudi_monuments] have been completely redesigned: they are no longer built directly, but expanded step by step based on decisions. On the other hand, numerous monuments have been added - some of which must be built, others exist at the start of the game.\n\nThe other key point is the introduction of the [concept_gaudi_architect], who can upgrade cities and design up to 15 new unique buildings by researching [Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')]. Architects can also rebuild a country in the Bauhaus, Neoclassical, and Art Deco styles. A [concept_gaudi_great_architect] can even design their own [concept_gaudi_custom_monument]!" #Please replace
 concept_gaudi_architect_desc: "#PURPLE #b Architects#!#! are [Concept('concept_artists_artist','$concept_artists_artists$')] whose skills relate to urban planning, building design and construction. They are special character types that you can gain either from events, from gaining enough [concept_artistic_progress] to create one in your nation or by offering a position to a [concept_gaudi_independent_architect].\nWhile other artists are more likely to accumulate cultural tradition, architects only rarely generate the very valuable [concept_gaudi_architectural_splendour] when they are involved in urban planning or the expansion of the capital—or when they completely redesign the country in a particular architectural style. Their main task is more practical in nature. They work in public construction, thus providing a nation with additional construction points. They improve infrastructure through planning and enhance capital cities into livable places. Architects can also hone their skills on a study tour or write an architectural treatise.\nOf paramount importance is the design of new, unique buildings, for which they create a [concept_gaudi_architectural_blueprint]. A total of 15 of these [concept_gaudi_blueprint_buildings] can be researched—since this takes a long time, it's worth considering which ones make sense.\nArchitects also provide a passive bonus: their mere presence accelerates the construction of [concept_gaudi_monuments] by 100 percent. The greatest achievement of an architect is the design of their own [concept_gaudi_custom_monument]. This is only possible with a [concept_gaudi_great_architect]." #Please replace
 concept_douglas_mountaineering: "Альпинизм" #deepl:2724886722
 concept_douglas_mountaineering_desc: "Countries that own at least one [concept_douglas_mountain_summit] or have a #b Mountaineering License#! with a country that has one can participate in mountaineering. To start a #b Mountain Expedition#! you need both the #b Prospecting#! and #b Nationalism#! technologies as well as a general that has either the #b Mountaineer#!, #b Explorer#!, #b Mountain Commander#! or #b Surveyor#! Trait.\nAs soon as you start a #b Mountain Expedition#! you will have to first choose which general will be the main Mountaineer. Then you will choose the summit to climb.\nThe higher the mountains, the more dangerous is the ascent. The Mountains are classified according to their height in meters ranging from under 4000 meters upt to over 8000 meters. Success depends on researched military technologies, the age and health of the leader, and their characteristics. Avalanches and steep slopes can pose a major risk that threatens the entire endeavor.\nYou can even send an additional [Concept('concept_academics_academic','$concept_academics_scientist$')] on the trip. Either a [concept_dubois_naturalist] or a [concept_dubois_paleontologist] will help discover more about the mountain you climbed on.\nIn the end you will get a prestige bonus and your general will develop better traits that will help them in combat as well for mountaineering." #Please replace

 concept_gaudi_great_architect: "#PURPLE #b Великий архитектор#!#!" #deepl:2311505900
 concept_gaudi_great_architects: "#PURPLE #b Great Architects#!#!" #You can use this for plural: [Concept('concept_gaudi_great_architect','$concept_gaudi_great_architects$')]
 concept_gaudi_great_architect_desc: "#b Великие архитекторы#! - это [Concept('concept_gaudi_architect','$concept_gaudi_architects$')], которые считаются самыми выдающимися умами в своей области. #b Архитекторы#!, достигшие 500 [concept_artists_experience], становятся #b Великими архитекторами#!. Если художник достигнет этого особого звания, он сможет разработать проект действительно выдающегося [concept_gaudi_custom_monument], воплощающего дух нации." #deepl:3535354395

 concept_gaudi_monuments: "Памятники в #R Morgenröte#!" #deepl:3575665350
 concept_gaudi_monuments_desc: "Многие страны получили новые #b памятники#! в [concept_morgenroete]: #b  Кельнский собор#! в Германии, #b Готтардбан#! в Швейцарии, #b Кристо Редентор#! в Бразилии, #b Моле Антонеллиана#! в Италии, #b Летний дворец#! в Китае, #b  Собор Святого Семейства#! в Испании, #b Замок Нойшванштайн#! в Баварии, #b Дворец искусств#! в Мексике и #b Дворец Кёнбоккун#! в Корее.\nВсе здания, кроме #b Летнего дворца#! и #b Кампанилы#!, должны быть построены их владельцем, #b Саксонский дворец#! может быть восстановлен польской нацией. В начале игры также появляются новые памятники, такие как #b Будды Бамиана#! или #b Дворец Потала#!\nТакже есть возможность, чтобы [concept_gaudi_custom_monument] был спроектирован [concept_gaudi_great_architect].\n\nВ отличие от ванильной игры, #b памятники#! не строятся напрямую, а скорее через решение. Строительство проходит в несколько этапов, в зависимости от размера здания, и может занять годы или даже десятилетия - и стоит значительно дороже." #deepl:1566202277

 concept_athletes_athlete: "Спортсмен" #deepl:850847351
 concept_athletes_athletes: "Athletes" #You can use this for plural: [Concept('concept_athletes_athlete','$concept_athletes_athletes$')]
 concept_athletes_athlete_desc: "В [concept_morgenroete] #b  Спортсмены#! - это специальные персонажи, которые позволяют использовать определенные механики мода.\n#b Спортсмены#! обычно создаются через события или с помощью кнопки. Как и другие персонажи, #b Спортсмены#! обладают опытом, который гарантирует больший успех в их области.\nВ настоящее время эти #b Спортсмены#! существуют:\n - [concept_curtiss_balloonist]\n - [concept_curtiss_pilot]\n - [concept_vikelas_olympian]\n - [concept_douglas_mountaineer]\n - [concept_vikelas_coach]\n - \n - [concept_vikelas_racer]" #deepl:1061453309

 concept_gaudi_independent_architect: "Независимый архитектор" #deepl:2730756570
 concept_gaudi_independent_architects: "Independent Architects" #You can use this for plural: [Concept('concept_gaudi_independent_architect','$concept_gaudi_independent_architects$')]
 concept_gaudi_independent_architect_desc: "[Concept('concept_gaudi_architect','$concept_gaudi_architects$')] #b #!\nВ отличие от многих других деятелей искусства, для найма независимого архитектора #b #! не существует особых требований, за исключением минимальных технологических требований. Они настоящие путешественники по миру и обычно требуют только хорошей оплаты." #deepl:4188716455

 concept_gaudi_architectural_blueprint: "Архитектурный чертеж" #deepl:4294565305
 concept_gaudi_architectural_blueprints: "Architectural Blueprints" #You can use this for plural [Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')]
 concept_gaudi_architectural_blueprint_desc: "Архитектурные чертежи можно изучить на сайте [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]. Они необходимы для строительства специальных зданий [concept_gaudi_blueprint_buildings], которые могут быть возведены только один раз в нации. Всего существует 15 различных зданий в пяти категориях. Некоторые чертежи требуют изучения технологий. Поскольку на исследования иногда уходят годы, стоит заранее решить, какие чертежи наиболее важны. Здания могут быть построены в любом штате, но требуют определенного уровня урбанизации. В некоторых случаях могут быть дополнительные требования.\n\n#R Важно#!: В одном штате можно построить только одно здание определенной категории. Так, если в штате находится фонтан, то триумфальная арка или статуя также не могут быть там расположены." #deepl:1017261789
 concept_gaudi_blueprint_buildings: "Здания по чертежам" #deepl:2672159620
 concept_gaudi_blueprint_buildings_desc: "Здания, построенные по чертежам, - это здания, для которых нужен чертеж, изученный на сайте [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]. В государстве может быть построено только одно здание определенной категории. Существует 15 различных зданий:\n\n#b Памятник#!\n- [GetBuildingType('building_gaudi_statue').GetName]\n- [GetBuildingType('building_gaudi_fountain').GetName]\n- [GetBuildingType('building_gaudi_arch').GetName]\n\n#b Общественная площадь#!\n- [GetBuildingType('building_gaudi_park').GetName]\n- [GetBuildingType('building_gaudi_luna').GetName]\n- [GetBuildingType('building_gaudi_parade').GetName]\n\n#b Служебные здания#!\n- [GetBuildingType('building_gaudi_almshouse').GetName]\n- [GetBuildingType('building_gaudi_school').GetName]\n- [GetBuildingType('building_gaudi_prison').GetName]\n\n#b Медицинские учреждения#!\n- [GetBuildingType('building_gaudi_canalization').GetName]\n- [GetBuildingType('building_gaudi_hospital').GetName]\n- [GetBuildingType('building_gaudi_health').GetName]\n\n#b Национальные академии#!\n- [GetBuildingType('building_gaudi_science').GetName]\n- [GetBuildingType('building_gaudi_arts').GetName]\n-... [GetBuildingType('building_gaudi_sports').GetName]" #deepl:3852362262

 concept_gaudi_custom_monument: "Памятник на заказ" #deepl:2715885677
 concept_gaudi_custom_monument_desc: "Памятник на заказ - это величайший шедевр [concept_gaudi_architect]. Он может конкурировать с другими, обычными памятниками. Только [concept_gaudi_great_architect] может разработать такие планы. Для этого необходимо изучить самые современные архитектурные технологии. Тип памятника, который проектирует архитектор, во многом зависит от его архитектурного стиля. Архитекторы ар-деко проектируют [GetBuildingType('building_gaudi_people_monument').GetName], архитекторы баухауза - [GetBuildingType('building_gaudi_people_forum').GetName], а архитекторы неоклассицизма - [GetBuildingType('building_gaudi_people_palace').GetName]." #deepl:759442240

