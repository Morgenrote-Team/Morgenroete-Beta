 je_gaudi_capital_expansion_project: "Расширение капитала" #deepl:4033066520
 je_gaudi_capital_expansion_project_reason: "В период с 1836 по 1936 год викторианские столицы претерпели глубокие градостроительные преобразования. Париж был перестроен благодаря широким бульварам и осевым видам Хаусмана. Вена снесла свои стены в 1857 году, заменив их грандиозной Рингштрассе. Берлин быстро разрастался за счет доходных домов, промышленных кварталов и более поздних модернистских жилых комплексов. Лондон разрастался за счет железнодорожных пригородов, инфраструктурных проектов и первого в мире метро. На всем европейском континенте королевские города превращались в современные мегаполисы - памятники власти, амбиций и растущей социальной напряженности." #deepl:4052914498

 gaudi.41.t: "Город, не связанный узами брака" #deepl:1231776512
 gaudi.41.d: "Старые стены рушатся. На их месте - воздух, свет и обещание роста." #deepl:2117769530
 gaudi.41.f: "На протяжении столетий сайт [ROOT.GetCountry.GetCapital.GetCityHubName] был обнесен стеной: гордой, компактной, замкнутой в себе. Но теперь каменная кладка рассыпается в порошок.\n\nСредневековые укрепления были разрушены. На их месте выросли широкие бульвары, усаженные деревьями и благородными фасадами. Там, где когда-то маршировали стражники, теперь стоят рыночные повозки и прогуливаются парочки. Бульвары - это не просто дороги, это заявления: уверенность, экспансия, будущее, слишком большое, чтобы его можно было удержать.\n\nНекоторые сетуют на потерю старинных ворот. Но [ROOT.GetCountry.GetCapital.GetCityHubName] наконец-то сделал свой первый глубокий вдох." #deepl:4076900735
 gaudi.41.g: "Мы строим снаружи - с дальновидностью и энергией" #deepl:1116241139
 gaudi.42.t: "Кольцо прогресса" #deepl:3156235256
 gaudi.42.d: "Новое кольцо бульваров связывает город и штат." #deepl:3367270166
 gaudi.42.f: "Там, где раньше были грязные насыпи, теперь властвует камень и железо. Великий проспект изгибается, как ожерелье, вокруг сердца [ROOT.GetCountry.GetCapital.GetCityHubName], связывая его районы в движении и свете.\n\nЭто были не просто дорожные работы. Целые кварталы были перерисованы, парки вырезаны, памятники обрамлены в идеальной перспективе. Газовые фонари расцветают в сумерках, как упорядоченные звезды. С каждым проложенным метром [ROOT.GetCountry.GetCapital.GetCityHubName] становится все более разборчивым, все более имперским.\n\nОфициальные лица говорят о "городской гармонии". А люди? Они прогуливаются, любуясь статуями, которых никогда не видели, по улицам, по которым когда-то боялись ходить." #deepl:3543082084
 gaudi.42.g: "Кольцо не защиты, а направления." #deepl:2497263912
 gaudi.43.t: "Пути власти" #deepl:4104296278
 gaudi.43.d: "Новый префект меняет форму [ROOT.GetCountry.GetCapital.GetCityHubName]- по одной оси за раз. Широкий, прямой и абсолютно бескомпромиссный." #deepl:2867872335
 gaudi.43.f: "Это не расширение. Это хирургия.\n\nЦелые районы попадают под компас и план. Улицы прокладываются, как бульвары, через некогда удивительные кварталы. Старые переулки исчезают. На их месте возникают линии - длинные, прямые, всегда ведущие к памятнику, казарме или министерству.\n\nПроисходит сопротивление, но разрешения подписываются, дома экспроприируются, фасады выравниваются. [ROOT.GetCountry.GetCapital.GetCityHubName] теперь говорит на языке порядка: видимость, циркуляция, контроль. За грандиозностью скрывается намерение.\n\nБедняки называют это "Очисткой". Чиновники называют это "модернизацией". Префект называет это необходимостью." #deepl:4133801679
 gaudi.43.g: "Пусть никто не уйдет от плана" #deepl:2017759053
 gaudi.44.t: "Столичный горизонт" #deepl:3803938371
 gaudi.44.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] больше не является просто столицей. Она становится миром в миниатюре." #deepl:101717450
 gaudi.44.f: "У старого города были края. У этого их нет.\n\nСталь и стекло пронзают те места, где раньше доминировал камень. Железнодорожные линии пересекаются под скверами. Электрические фонари стирают границы между сумерками и рассветом. Посольства, банки, галереи и кафе расцветают, как орхидеи в железной оранжерее нового века.\n\nИностранные языки перекликаются в аркадах. Небоскребы бросают вызов соборам.\N [ROOT.GetCountry.GetCapital.GetCityHubName] больше не просит разрешения расти - он ожидает лидерства. Из каждого района вытекает одна истина: это больше не город нации. Это город наций." #deepl:3494578230
 gaudi.44.g: "Мы поднимаемся, потому что мир уже смотрит." #deepl:1129952378

 gaudi_capital_expansion_project_progress_bar: "Расширение капитала" #deepl:4033066520
 gaudi_capital_expansion_project_progress_bar_desc: "Расширение капитала: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|1%] #! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/30)" #deepl:707314599

 gaudi.511.d: "Когда речь зашла о благоустройстве [ROOT.GetCountry.GetCapital.GetCityHubName], в градостроительстве возникли разногласия." #deepl:2161912626
 gaudi.512.t: "Статуи на кольцевой дороге" #deepl:1070850347
 gaudi.512.d: "На новой кольцевой дороге [ROOT.GetCountry.GetCapital.GetCityHubName] будет установлена новая группа фигур, но пока неясно, какая мифологическая фигура займет особое место." #deepl:275330526
 gaudi.513.f: "Новое министерство должно было стать флагманом правительства, однако постоянные изменения плана, расширение и скрытая коррупция привели к тому, что строительство здания затянулось, а все средства были израсходованы до конца. Недостроенное здание можно привести в функциональное состояние с помощью нескольких временных мер, но это, вероятно, не в интересах правительства, которому придется довольствоваться меньшими офисами и меньшим комфортом, чем ожидалось. Дальнейшее строительство возможно, но оно, вероятно, будет дорогостоящим." #deepl:3580582680

 gaudi.511.t: "Фонтан или павильон?" #deepl:2151137688
 gaudi.511.f: "Можно было бы принять это за ссору из-за бороды императора: из пустяка развился ощутимый политический спор. Речь идет о проекте строительства на репрезентативной площади, имеющей высокую эстетическую ценность. Одна фракция хотела бы построить там павильон для отдыха, другая выступает за возведение фонтана. Поскольку участок только один, то и построить можно только один из проектов; компромисс невозможен." #deepl:1541667756
 gaudi.511.g: "Мы строим павильон." #deepl:2064679099
 gaudi.511.h: "Мы строим фонтан." #deepl:2431357846
 gaudi.511.i: "У меня свои планы на это место..." #deepl:53271135
 gaudi.512.f: "При планировании кольцевой дороги до сих пор неясны некоторые детали. До сих пор не определено, какие фигуры должны быть размещены на видном месте. Очевидно, что это должны быть фигуры из римского пантеона. Определенные слои населения отождествляют себя с соответствующими фигурами - например, капиталисты предложили поместить Меркурия, бога торговли, в центре. Аристократы, напротив, настаивают на Юпитере, отце богов. Военные предпочитают Марс, а ученые хотят видеть в центре Аполлона." #deepl:3457913174
 gaudi.512.g: "Юпитер." #deepl:641978563
 gaudi.512.h: "Ртуть." #deepl:4064282680
 gaudi.512.i: "Аполлон." #deepl:2704921915
 gaudi.512.j: "Марс." #deepl:4251022611
 gaudi.513.t: "Здание министерства превышает стоимость" #deepl:3536337121
 gaudi.513.d: "Строительство нового здания министерства превращается в небольшой скандал." #deepl:3745484689
 gaudi.513.g: "Существует бюджет, и его необходимо соблюдать." #deepl:2982007153
 gaudi.513.h: "Это прискорбно, но часто встречается в этой сфере." #deepl:3799202878
 gaudi.513.i: "Этот проект должен получить столько денег и времени, сколько ему необходимо." #deepl:3703152475
 gaudi.514.t: "Новая кофейня" #deepl:760472506
 gaudi.514.d: "На Рингштрассе открылась новая кофейня." #deepl:977697169
 gaudi.514.f: "Кофейня оставалась для нас лучшим местом обучения всему новому". Чтобы понять это, нужно знать, что венская кофейня - это заведение особого рода, которое нельзя сравнить ни с одним подобным заведением в мире. Это своего рода демократический клуб, доступный каждому за дешевую чашку кофе, где за эту небольшую плату каждый посетитель может часами сидеть, обсуждать, писать, играть в карты, получать почту и, самое главное, потреблять неограниченное количество газет и журналов. В лучшей венской кофейне были доступны все венские газеты, и не только венские, но и газеты всего германского рейха, французские, английские, итальянские, американские, а также все важнейшие литературные и художественные обзоры мира. Так что мы знали обо всем, что происходит в мире, из первых рук, слышали о каждой вышедшей книге, о каждом спектакле, где бы он ни проходил, и сравнивали рецензии во всех газетах. Пожалуй, ничто так не способствовало интеллектуальной гибкости и международной ориентации австрийца, как то, что он мог так полно ориентироваться во всех событиях в мире в кофейне и одновременно обсуждать их в дружеском кругу. Мы сидели там часами каждый день и ничего не упускали". - Стефан Цвейг" #deepl:1426019469
 gaudi.514.g: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] должны посетить его." #deepl:3567062403
 gaudi.514.h: "Это повысит уровень жизни в Вене." #deepl:993415000
 gaudi.515.t: "Дворец на кольцевой дороге" #deepl:2889767777
 gaudi.515.d: "Один дворянин перестарался, строя дворец в новом районе города [ROOT.GetCountry.GetCapital.GetCityHubName]. Полуразрушенное здание грозит стать бельмом на глазу." #deepl:3082201997
 gaudi.515.f: "Дворцы на кольцевой дороге - это название великолепных дворцов на венской улице Рингштрассе. Эти здания были построены в основном старой знатью или банкирами и промышленниками в конце XIX века. Дворцы были построены в смешении стилей необарокко и неоренессанса, или неоманьеризма. Они также являлись символом возвышения и статуса. Однако недавно один из строителей перестарался, и ему грозит банкротство. Люди уже насмехаются над этим зрелищем, которое в худшем случае придется сносить заново, тем самым продлевая срок завершения всего проекта." #deepl:2482976903
 gaudi.515.g: "Мы разделяем расходы." #deepl:1778759255
 gaudi.515.h: "Это не наше дело." #deepl:2515722656
 gaudi.516.t: "Расширение капитала: Хороший прогресс" #deepl:3725304670
 gaudi.516.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] заявил, что продление капитального ремонта может быть завершено раньше." #deepl:1876608469
 gaudi.516.f: "По непонятным причинам все развивается быстрее: любовь к родине, высокие зарплаты, дружеская поддержка местной элиты или просто лучшая погода." #deepl:771529955
 gaudi.516.g: "Чудесно." #deepl:1621308786
 gaudi.517.t: "Расширение капитала: Медленный прогресс" #deepl:4246146058
 gaudi.517.d: "К сожалению, сегодня руководство строительной компании [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] вынуждено было признать, что строительство нового микрорайона в [ROOT.GetCountry.GetCapital.GetCityHubName] отстает от графика." #deepl:984753109
 gaudi.517.f: "По неизвестным причинам все продвигается медленнее: то ли это агитация враждебных политических элементов, то ли подрыв трудовой этики профсоюзами, то ли заговор иллюминатов, то ли просто плохая погода." #deepl:967308050
 gaudi.517.g: "Прискорбно." #deepl:1477108256
 gaudi.518.t: "Памятник [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName]" #deepl:4291665084
 gaudi.518.d: "На Рингштрассе планируется установить новый памятник: это будет статуя нашего короля [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]." #deepl:642834231
 gaudi.518.f: "Рингштрассе служила иллюстрацией к австрийской истории. С одной стороны, была увековечена длинная череда монархов из правящей семьи Габсбургов, из которых Мария Тереза получила самый роскошный памятник. Но и такие генералы, как Эуген фон Савойен или Шварцберг, обогатили венский городской пейзаж. Буржуазия же придавала большое значение увековечиванию своих выразителей, а именно князей-поэтов Гете и Шиллера, а также великих композиторов Шуберта, Моцарта и Бетховена." #deepl:795951503
 gaudi.518.g: "Хорошо быть [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]." #deepl:2477877691
 gaudi.518.h: "Прекрасно - но вместо этого сосредоточьтесь на завершении Рингштрассе." #deepl:1336009648
 gaudi.519.t: "Огонь!" #deepl:3279516897
 gaudi.519.d: "Разрушительный пожар уничтожил несколько зданий на строительной площадке в [ROOT.GetCountry.GetCapital.GetCityHubName]." #deepl:603406045
 gaudi.519.f: "Самой известной катастрофой на кольцевой дороге стал пожар в Рингтеатре 8 декабря 1881 года. Это одна из крупнейших пожарных катастроф XIX века. Число жертв оценивается в сотни, а то и более тысячи человек. Причиной пожара стала неисправность газового освещения, в результате чего газ улетучился и взорвался при следующей попытке зажечь его. В результате огонь перекинулся на задник, затем быстро распространился на остальную часть сцены и в конечном итоге на зрительный зал. Этот пожар оказал влияние на внутреннюю и международную ситуацию в области превентивной противопожарной защиты, особенно в театральной сфере, а также на соответствующие законодательные положения по строительству театров в Австрии. Композитор Антон Брукнер, у которого были билеты на вечернее представление, избежал смерти только благодаря тому, что остался дома из-за плохого самочувствия." #deepl:1763422665
 gaudi.519.g: "Ужасный день." #deepl:3953408834
 gaudi.520.t: "Предрассудки против расширения города" #deepl:3932558777
 gaudi.520.d: "Представители сельского населения рассматривают развитие сайта [ROOT.GetCountry.GetCapital.GetCityHubName] как минус для простых сельских жителей." #deepl:3359656956
 gaudi.520.f: "'Правительство своей невыразимой развязностью в столице дает понять, что оно состоит из отстраненных горожан, которые мыслят только несколькими улицами и никогда не покидали [ROOT.GetCountry.GetCapital.GetCityHubName]. Там растрачиваются огромные суммы, которые доходят только до столицы, но о которых простые деревенские жители в маленьких городках и деревнях ничего не замечают. Идеология, лежащая в ее основе, поддерживает централизм, поддерживает бюрократию, поддерживает и помогает государственному аппарату; но какую перспективу такой упадочный проект открывает для простого человека?" #deepl:2119590629
 gaudi.520.g: "Как насчет дружеского подарка на благо трудолюбивого сельского населения?" #deepl:1425408969
 gaudi.520.h: "Город и провинция равны." #deepl:154752402
 gaudi.520.i: "Кого волнуют эти глупые фермерские разговоры?" #deepl:1424618973
 gaudi.521.t: "Резиденция промышленника" #deepl:1054941492
 gaudi.521.d: "Богатый бизнесмен построил новый дворец и тем самым обогатил [ROOT.GetCountry.GetCapital.GetCityHubName] великолепным зданием." #deepl:2324185893
 gaudi.521.f: "Дворцы промышленников и банкиров рассматривались как способ подчеркнуть свое новое положение в государстве. Богатые люди еврейского происхождения также могли подчеркнуть свою эмансипацию. Развитие Вены в XIX веке - хороший тому пример. Один из самых известных дворцов на кольцевой дороге - дворец Эпштейна. Он был построен для промышленника и банкира Густава Риттера фон Эпштейна. Архитектором был Теофил Фрайхерр фон Хансен, который также спроектировал соседнее здание австрийского парламента. Здание высотой до пяти этажей построено в стиле неоренессанса, характерном для своего времени." #deepl:2653721730
 gaudi.521.g: "[ROOT.GetCountry.GetCapital.GetCityHubName] растет и процветает." #deepl:2259204183
 gaudi.522.t: "Расширение казарм" #deepl:3408528723
 gaudi.522.d: "Расширение сайта [ROOT.GetCountry.GetCapital.GetCityHubName] дает возможность модернизировать и расширить казармы." #deepl:933440251
 gaudi.522.f: "Казармы Франца-Иосифа - венское здание казарменного типа в районе современной Рингштрассе, долгое время являвшееся препятствием для строительства масштабного проекта. Казармы были названы в честь императора Франца Иосифа I и построены в 1854-1857 годах после революции 1848 года. Вскоре после постройки казармы встали на пути застройки Венской Рингштрассе, которая началась в 1857 году, но потребовалось четыре десятилетия, чтобы армия снова переехала отсюда. Поэтому пришлось заранее возводить новые казармы, чтобы компенсировать потерю казарм Франца-Иосифа." #deepl:4162429863
 gaudi.522.g: "Расширьте казармы." #deepl:2381627455
 gaudi.522.h: "Давайте лучше потратим это время в другом месте." #deepl:3269234038
 gaudi.523.t: "Расширение строительного сектора" #deepl:2392547084
 gaudi.523.d: "Расширение сайта [ROOT.GetCountry.GetCapital.GetCityHubName] открывает возможности для развития строительного сектора. " #deepl:3106227577
 gaudi.523.f: ""Мы обычно называем природой художника совокупность качеств, которые мешают ему творить". - Артур Шницлер" #deepl:2115168723
 gaudi.523.g: "Расширить строительный офис." #deepl:771559939
 gaudi.524.t: "Замечательный парк" #deepl:3707211248
 gaudi.524.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]Строительство нового парка завершено, и теперь он открыт для прогулок всех горожан." #deepl:2209166008
 gaudi.524.f: "Ворота нового Штадтпарка распахиваются. Газоны катятся, как бархат. Тропинки вьются между клумбами и статуями. Но больше всего толпы привлекает не трава, а звук. Эстрада, небольшой оркестр, вальс, доносящийся с ветерком. Публичная музыка, которая когда-то была уделом салонов и дворцов, теперь наполняет воздух для всех желающих. В таких городах, как Вена, Курсалон превратился в гражданский храм мелодии. Великолепное здание в стиле итальянского Ренессанса расположено на Йоханнесгассе и имеет широкую террасу в парке. Во времена братьев Штраусов Курсалон был популярным местом для танцев и концертов." #deepl:556984663
 gaudi.524.g: "Давайте пройдемся." #deepl:3870101360
 gaudi.524.h: "Давайте отпразднуем это событие концертом!" #deepl:3249539672
 gaudi.525.t: "Расширение оперы" #deepl:3647447347
 gaudi.525.d: "Расширение сайта [ROOT.GetCountry.GetCapital.GetCityHubName] дает возможность модернизировать и расширить оперу." #deepl:1640821642
 gaudi.525.f: "Среди бульваров и аркад, фонтанов и министерств существующий оперный театр начинает казаться скромным, даже провинциальным. Предложение: новая структура или значительное расширение. Больше мест, лучшая акустика, монументальные фасады. Храм культуры, соответствующий статусу города. В Европе подобные жесты стали символами национального престижа. В Париже Опера Гарнье возвышается мраморными лестницами и золотыми потолками. В Вене Штаатсопер, открытая в 1869 году, с элегантностью и гордостью обрамляет Рингштрассе." #deepl:2327891128
 gaudi.525.g: "Расширьте оперный театр." #deepl:4005131669
 gaudi.526.t: "Расширение ратуши" #deepl:857877700
 gaudi.526.d: "Расширение сайта [ROOT.GetCountry.GetCapital.GetCityHubName] дает возможность модернизировать и расширить здание мэрии." #deepl:3575590115
 gaudi.526.f: "На старой ратуше до сих пор висит герб, созданный в другом веке. Внутри: узкие лестницы, переполненные кабинеты, бухгалтерские книги, нагроможденные выше потолка. Стол мэра едва ли достаточно просторен для работы с бумагами, не говоря уже о власти. Предложение: новая ратуша, отражающая растущую роль города в управлении, экономике и гражданском самосознании. Башни со шпилями или сдержанный классицизм - в любом случае она должна стать символом власти. По всей Европе города отвечают на этот вызов. В Вене неоготический Ратхаус (построенный в 1883 году) стал символом уверенности муниципалитета. Париж восстановил свой Отель де Виль после 1871 года с величием и вызовом. Берлинский Rotes Rathaus возник как сплав ренессансной формы и прусской функции." #deepl:2422046000
 gaudi.526.g: "Расширьте ратушу." #deepl:5728920
 gaudi.527.t: "Хельденплац" #deepl:959071592
 gaudi.527.d: "После завершения строительства Хельденплац (площади Героев) некоторые ведущие политические деятели настаивают на достойной инаугурации." #deepl:1468121085
 gaudi.527.f: "Когда была построена Рингштрассе, "внешняя Бургплац" была спроектирована при императоре Франце-Иосифе как часть Кайзерфорума, который так и не был завершен. Планировалось создать прямоугольную площадь, которую обрамляли бы крыло Леопольдина, Новый Хофбург, Габсбургские коллекции и аналог Нового замка, который так и не был построен на месте Фольксгартена. Название Хельденплац было закреплено в 1878 году; оно происходит от двух конных памятников, оба из которых выполнены Антоном Домиником Фернкорном. Старший из них - памятник эрцгерцогу Карлу, открытый в 1860 году. Аналогичная конная статуя принца Евгения также была завершена в 1865 году. После поражения в Первой мировой войне, распада Австро-Венгерской двуединой монархии под властью династии Габсбургов-Лотарингских и основания первой Австрийской республики Хельденплац служила местом сбора всех политических лагерей и парадным плацем для австрийской армии." #deepl:562832934
 gaudi.527.g: "Устройте парад и пригласите наших друзей." #deepl:99539180
 gaudi.527.h: "Устройте постоянный военный парад на ближайшие несколько лет." #deepl:3502479331
 gaudi.527.i: "И кто должен платить за все это?" #deepl:3263444788
 gaudi.528.t: "Расширение университета" #deepl:2548530815
 gaudi.528.d: "Расширение сайта [ROOT.GetCountry.GetCapital.GetCityHubName] дает возможность модернизировать и расширить университет." #deepl:966048719
 gaudi.528.f: "Что такое великий город без мысли? На фоне железнодорожных линий, министерств и театров университет начинает напрягаться от собственного успеха. Слишком много студентов на слишком малое количество залов. Факультеты разбросаны по арендованным зданиям. Профессора борются за пространство между библиотеками и лабораториями. Предложение очевидно: новый кампус или масштабное расширение - современные лекционные залы, специализированные факультеты, монументальная библиотека. Такие проекты - это не просто инфраструктура, это декларация интеллектуальных амбиций. В Вене университет был перенесен и перестроен в 1870-х годах вдоль Рингштрассе, с грандиозным фасадом и символическим центром. В Париже Сорбонна была основательно расширена в результате реформ Жюля Ферри, чтобы вместить растущий академический класс Франции." #deepl:3542359765
 gaudi.528.g: "Расширяйте университет." #deepl:4228402238
 gaudi.529.t: "Расширение Академии искусств" #deepl:1188603187
 gaudi.529.d: "Расширение сайта [ROOT.GetCountry.GetCapital.GetCityHubName] дает возможность модернизировать и расширить художественную академию." #deepl:2971034584
 gaudi.529.f: "С ростом города растет и его тяга к искусству. Однако художники и скульпторы теснятся в маленьких студиях и тусклых чердаках, учась не у мастеров, а по слухам и заимствованным наброскам. Предложение: построить настоящую художественную академию со светлыми ателье, анатомическими театрами и галереями, открытыми для публичных выставок. По всей Европе такие академии формируют национальный вкус. Парижская Школа изящных искусств задает классические стандарты для половины континента. В Вене величественное здание Академии изящных искусств закрепляет культурный престиж улицы Рингштрассе." #deepl:2427288221
 gaudi.529.g: "Расширьте академию." #deepl:3521772928
 gaudi.530.t: "Урания" #deepl:3604286803
 gaudi.530.d: "Вместе с Urania в Вене открылся так называемый "центр народного образования", точное назначение которого до сих пор оспаривается." #deepl:2388110616
 gaudi.530.f: "В 1883 году немецкий астроном Макс Вильгельм Мейер приехал в Вену, чтобы в качестве ассистента Венского университета рассчитать исторические и будущие солнечные затмения. Он также читал лекции по фольклору и разрабатывал идею фольклорного учебного заведения. Однако, поскольку в 1885 году его вызвали в Берлин, он продолжил развивать свои идеи там. Венская Урания была построена по образцу берлинской Урании: она вмещала 800 человек и содержала лекционный зал на 200 человек, комнаты для научных демонстраций и обсерваторию. Однако эта "временная" Урания с трудом справлялась с наплывом посетителей, поэтому вскоре возникла необходимость в новом здании на Рингштрассе. Урания" не только расширила спектр образовательных возможностей (например, за счет языковых курсов), но и стала местом проведения концертов, где выступали собственный симфонический оркестр "Урания" и хор "Урания". Нестандартная форма и конструкция вызвали в Вене привычный скандал. Однако венцам здание понравилось, и вскоре "Урания" стала одной из достопримечательностей Вены." #deepl:2564552960
 gaudi.530.g: "Это архитектурная достопримечательность." #deepl:631489671
 gaudi.530.h: "В первую очередь это развлекательное заведение." #deepl:1069754801
 gaudi.530.i: "Прежде всего, это обсерватория." #deepl:2017455388

 gaudi.9.t: "Градостроительство завершено" #deepl:1330111739
 gaudi.9.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] Сегодня завершена работа над градостроительным проектом [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] в одном из важных провинциальных городов. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] теперь снова полностью доступен." #deepl:60424068
 gaudi.9.f: ""Архитектура не достигает своего наивысшего состояния, пока не проникнется воображением и фантазией - не недисциплинированным воображением или капризной фантазией, - что упорядоченная ткань радует глаз каждого разумного наблюдателя и вызывает эмоции, как поэма". -Генри ван Брант" #deepl:2388189232
 gaudi.9.g: "Так много проектов, так мало времени." #deepl:224764128

 gaudi_architecture_treatise_modifier: "Трактат по архитектуре" #deepl:1594143488

 gaudi.8.t: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetLastName]Трактат об архитектуре" #deepl:1170819237
 gaudi.8.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] завершил [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] работу. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] трактат об исторической и современной архитектуре, обогащенный [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] теоретическими размышлениями, окажет влияние на будущие поколения архитекторов." #deepl:66798799
 gaudi.8.f: "Архитектура запечатлела великие идеи человечества. Не только каждый религиозный символ, но и каждая человеческая мысль имеет свою страницу в этой огромной книге. -Виктор Гюго" #deepl:864116211
 gaudi.8.g: "Работа для потомков." #deepl:575316054

 je_gaudi_architecture_treatise: "Трактат по архитектуре" #deepl:1594143488
 je_gaudi_architecture_treatise_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] полностью ушел в себя на год, чтобы собрать [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] предыдущие знания об архитектурном искусстве в книгу. Она задумывалась как манифест [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] жизни, обобщающий весь [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] опыт и теории об архитектуре. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] Репутация играет решающую роль в определении ценности произведения. Однако черты характера, такие как $literary$, $erudite$, $innovative$ и $aesthete$, также имеют ценность." #deepl:9152525
 je_gaudi_architecture_treatise_success: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] возвращается через год." #deepl:2379549832
 je_gaudi_architecture_treatise_goal: ""

### LEPSIUS/ANDERSSON ###

 lepsius.1502_peking_d: "\nAlong with Java Man, Peking Man is believed to be the first Homo Erectus found and reinforced the belief that humanity originally came from Asia. The bones are said to be 400,000 to 780,000 years old." #please replace

 lepsius_state_trait_heidelbergensis_cave: "Доисторическая пещера" #deepl:59949327

 lepsius.1326.t: "Homo Heidelbergensis завершен" #deepl:2121693630
 lepsius.1326.d: "[SCOPE.sCharacter('lepsius_anthropologist_scope').GetFullName] собрал достаточно костей, чтобы сделать конкретные выводы о вымершем виде. Homo Heidelbergensis больше не является загадкой для науки, и теперь его можно с определенной степенью уверенности определить место в семейном древе человека, хотя многие вопросы еще остаются без ответа." #deepl:4182329393
 lepsius.1326.f: "Нижняя челюсть Homo heidelbergensis была обнаружена в 1907 году рабочим Даниэлем Хартманном в песчаном карьере близ Мауэра под Гейдельбергом и описана в 1908 году анатомом Отто Шотензаком; находка возрастом около 600 000 лет считается самым древним свидетельством существования ранних людей в Европе, морфологически стоит между Homo erectus и Homo sapiens, указывает на широкое распространение этого вида гоминид в Африке, Европе и Азии и, благодаря своей прочности и предполагаемому объему мозга, позволяет сделать выводы о развитой физической адаптации, использовании инструментов и социальной организации." #deepl:2078634084
 
 lepsius.1336.t: "Гейдельбергский человек" #deepl:140239375
 lepsius.1336.d: "Один рабочий сделал удивительную находку в шахте города Мауэр, расположенного недалеко от Гейдельберга. Профессор Гейдельбергского университета сразу же признал ее ценность." #deepl:3838910430
 lepsius.1336.f: "Нижняя челюсть Homo heidelbergensis была обнаружена в 1907 году рабочим Даниэлем Хартманном в песчаном карьере близ Мауэра под Гейдельбергом и описана в 1908 году анатомом Отто Шотензаком; находка возрастом около 600 000 лет считается самым древним свидетельством существования ранних людей в Европе, морфологически стоит между Homo erectus и Homo sapiens, указывает на широкое распространение этого вида гоминид в Африке, Европе и Азии и, благодаря своей прочности и предполагаемому объему мозга, позволяет сделать выводы о развитой физической адаптации, использовании инструментов и социальной организации." #deepl:2078634084

