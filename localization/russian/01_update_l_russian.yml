 gaudi.16.f: "Украшательство - это напрасный труд и, следовательно, напрасное здоровье. Сегодня она также означает напрасно потраченный материал, и оба эти понятия означают напрасно потраченный капитал. Современный человек, человек с современными нервами, не нуждается в украшениях, он их отвергает". -Адольф Лоос" #deepl:1476970686
 gaudi.16.g: "Новое здание!" #deepl:1359643446

