 je_gaudi_custom_monument_blueprint_research_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] пользуется всемирной известностью как один из самых выдающихся архитекторов [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] времени. Чтобы увековечить имя [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis], [ROOT.Var('gaudi_architect_var').GetCharacter.GetHeShe] работает над проектом выдающегося памятника, который сделает нашу страну центром архитектурного искусства." #deepl:2632883859

 gaudi.81.t: "Мастерство архитекторов" #deepl:681011782
 gaudi.81.d: "В последние годы [THIS.GetCountry.GetName] превратилась в одну из ведущих стран в области архитектуры. [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] сыграла значительную роль в этом развитии. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] приняла заказ на проектирование памятника, который мог бы соперничать с великими чудесами античной, средневековой и современной эпох." #deepl:2672646441
 gaudi.81.f: "Памятник архитектору основывается на предпочтительном стиле великого архитектора:\n\nАрт-деко архитекторы спроектируют [GetBuildingType('building_gaudi_people_monument').GetName].\nБаухаус архитекторы предложат [GetBuildingType('building_gaudi_forum_monument').GetName].\nНеоклассические архитекторы создадут [GetBuildingType('building_gaudi_people_palace').GetName]." #deepl:4088582525
 gaudi.81.g: "Великолепно." #deepl:573443058

