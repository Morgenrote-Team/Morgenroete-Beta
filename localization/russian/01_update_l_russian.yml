 douglas.111.t: "Первый шаг" #deepl:1387851608
 douglas.111.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] оснащает команду основным альпинистским снаряжением." #deepl:1200110309
 douglas.111.f: "Эпоха импровизированных восхождений закончилась. Под руководством [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] команда получает свое первое стандартное снаряжение: веревки, ледорубы, питоны и прочные рюкзаки. Эти инструменты не просто спасают жизнь - они меняют само восприятие горы. Восхождение становится более методичным, расчетливым. Там, где раньше важны были только смелость и грубая сила, теперь на первый план выходят техника и подготовка. Это скромный, но определяющий эпоху шаг для каждого, кто решится войти в безжалостный мир льда и скал." #deepl:444296823
 douglas.111.g: "Теперь горы принадлежат подготовленным." #deepl:660628980
 douglas.112.t: "Связанные веревкой" #deepl:263345135
 douglas.112.d: "У нашего альпиниста [ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] появилась новая идея: Для повышения безопасности вводятся команды с фиксированной веревкой." #deepl:3311883976
 douglas.112.f: "Каждый шаг в горах сопряжен с риском, но теперь никто не лазает в одиночку. Появление веревочных команд знаменует собой изменение менталитета: теперь не человек противостоит горе, а цепочка альпинистов, объединенных доверием и плетеной веревкой. Это изменение приносит порядок, дисциплину и глубокое чувство общей ответственности. Если один падает, другие его держат. Опасность не устраняется, а перераспределяется. Гора остается дикой, но наш ответ на нее уже не героический, а совместный." #deepl:1978213156
 douglas.112.g: "Одна веревка. Одно желание. Одна команда." #deepl:1569127386
 douglas.113.t: "Хрупкое тело" #deepl:3178580481
 douglas.113.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] настаивает на введении в команде системы оказания первой помощи." #deepl:887703212
 douglas.113.f: "Мозоли, переломы, обморожения - горы не знают пощады. То, что раньше считалось частью риска, теперь лечится систематически. Небольшая аптечка, использованная с умом, может спасти жизнь. Быстро построенное убежище может выиграть время. Впервые базовые медицинские знания стали частью обучения. Горы по-прежнему требуют всего, но с появлением аптечек и планов действий в чрезвычайных ситуациях команда реагирует на них не только с готовностью. Человеческое тело больше не игнорируют - его защищают." #deepl:563827659
 douglas.113.g: "Даже самые сильные могут упасть." #deepl:4107036891
 douglas.114.t: "Камень говорит" #deepl:2102994496
 douglas.114.d: "[ROOT.Var('douglas_mountaineer_var').GetCharacter.GetFullName] внедрил научные методы в альпинизм: Введены геологические знания для улучшения анализа рельефа." #deepl:3612073372
 douglas.114.f: "То, что раньше казалось фоном - пузырьки, осадочные породы, камни, - теперь становится языком, который нужно читать. Один из членов команды привносит геологический опыт: слои показывают древние движения, типы пород предупреждают о лавинах, линии разломов указывают безопасные маршруты. Гора больше не миф - это архив. Наука приходит с блокнотами и молотками, и внезапно экспедиции становятся не просто приключениями, а полевыми исследованиями. Это новый способ видения - тихая революция." #deepl:1873707756
 douglas.114.g: "Давайте учиться, прежде чем подниматься." #deepl:3896308340
 douglas.115.t: "Дыхание высоты" #deepl:1444940126
 douglas.115.d: "Почему бы не использовать опыт химической войны в альпинистских целях? Новые технологии позволяют использовать кислородные маски на экстремальных высотах." #deepl:2351243748
 douglas.115.f: "Выше определенной высоты небо редеет. Дыхание становится трудным, тело протестует. Но теперь, с помощью механических аппаратов, люди достигают мест, для которых они никогда не были предназначены. Кислородные маски - некогда диковинка науки - стали стандартом. Они заново определяют границы возможного. Мир выше 7 000 метров становится доступным, хотя и дорогой ценой: альпинист больше не одинок, а является частью системы жизнеобеспечения. Триумф над горой не уменьшается, только становится холоднее." #deepl:689433627
 douglas.115.g: "Мы дышим искусственно, но мы побеждаем." #deepl:53945526

