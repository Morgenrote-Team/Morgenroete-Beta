 je_gaudi_public_construction_reason: "Архитектор с чертой #V $gaudi_art_deco_style$ #! , #V $gaudi_bauhaus_style$ #! или #V $gaudi_neoclassical_style$ #! предоставляет вашей стране #p +30#! $country_construction_add$ при распределении на общественное строительство.\nАрхитектор с чертой #V $gaudi_historicism_style$ #! предоставляет вашей стране #p +20#! $country_construction_add$ при распределении на общественное строительство.\nАрхитектор с чертой #V $gaudi_traditional_style$ #! предоставляет вашей стране #p +10#! $country_construction_add$ при распределении государственного строительства.\n\nДалее, архитектор с чертой #V $gaudi_great_architect$ #! предоставляет вашей стране #p +20#! $country_construction_add$ при распределении государственного строительства." #deepl:1073409171

