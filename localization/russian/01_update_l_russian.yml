 gaudi.51.t: "Неоклассическое возрождение" #deepl:3536136445
 gaudi.51.d: "[ROOT.GetCountry.GetName] стал образцом вневременной и достойной архитектуры. Этот статус внушает благоговение всему цивилизованному миру!" #deepl:1191503815
 gaudi.51.f: "Общая и самая выдающаяся характеристика античных шедевров - это, в конечном счете, благородная простота и спокойное величие, как в позе, так и в выражении лица.'\n- Иоганн Иоахим Винкельманн" #deepl:3328862889
 gaudi.51.g: "В этом и заключается суть настоящего искусства." #deepl:3736488828
 gaudi.52.t: "Триумф Баухауса" #deepl:1539285104
 gaudi.52.d: "[ROOT.GetCountry.GetName] стал маяком рациональной и прогрессивной архитектуры. Это статус, который вызывает всеобщее уважение и восхищение!" #deepl:1188995024
 gaudi.52.f: "Дизайн - это не профессия, а отношение к жизни." #deepl:1692369698
 gaudi.52.g: "Потребности людей вместо потребности в роскоши!" #deepl:3765042267

 je_gaudi_bauhaus_architecture: "Архитектура Баухаус" #deepl:2452320752
 je_gaudi_bauhaus_architecture_reason: "Баухауз - немецкая художественная школа, работавшая с 1919 по 1933 год и объединявшая ремесла и изобразительное искусство. Школа прославилась своим подходом к дизайну, который пытался объединить индивидуальное художественное видение с принципами массового производства и акцентом на функции. В ее основе лежала идея создания Gesamtkunstwerk (всеобъемлющего произведения искусства), в котором в конечном итоге будут объединены все виды искусства. Впоследствии стиль Баухауз стал одним из самых влиятельных течений в современном дизайне, модернистской архитектуре и архитектурном образовании." #deepl:1381087306
 je_gaudi_neoclassical_architecture: "Неоклассическая архитектура" #deepl:3915160230
 je_gaudi_neoclassical_architecture_reason: "Неоклассицизм в начале XX века был возрожденным архитектурным и художественным направлением, стремившимся воссоединиться с формальной ясностью, симметрией и величием греко-римской античности. Возникший как противовес излишествам историзма и растущей абстракции современного искусства, этот стиль подчеркивал монументальность, геометрический порядок и использование традиционных форм в рациональном, часто санкционированном государством идиоме. Он был тесно связан с национальной идентичностью и гражданской архитектурой, проецируя идеалы постоянства, власти и дисциплинированной красоты." #deepl:2628512539
 je_gaudi_art_deco_architecture: "Архитектура в стиле ар-деко" #deepl:2695214977
 je_gaudi_art_deco_architecture_reason: "Движение ар-деко возникло в 1920-х годах как декоративный и архитектурный стиль, который воспринял современность, сохранив при этом элементы классического порядка. Благодаря характерному использованию стилизованных форм, богатых материалов и орнаментальной геометрии, ар-деко объединил роскошь ремесленного искусства с зарождающейся эстетикой машины. Он прославлял технологический прогресс и городской динамизм с помощью мотивов, вдохновленных промышленностью, скоростью и экзотикой." #deepl:2018331500

 je_gaudi_splendour_bauhaus: "Триумф Баухауса" #deepl:1539285104
 je_gaudi_splendour_bauhaus_reason: "С привнесением духа Баухауза архитекторы стали отказываться от украшений и иллюзий в пользу ясности, точности и правдивости материала. Цель больше не в том, чтобы производить впечатление роскошью или вызывать в памяти величие прошлых империй, а в том, чтобы служить обществу, создавая функциональные, честные и современные пространства. Баухауз - это не просто эстетика, это философия дизайна, основанная на убеждении, что архитектура и повседневная жизнь должны быть согласованы через простоту, практичность и единство формы и цели. Принимая принципы Баухауса, столица демонстрирует не просто современность, а прогресс в его чистом виде: возвышение функции над фасадом, инноваций над традициями." #deepl:3357423326
 je_gaudi_splendour_neoclassical: "Неоклассическое возрождение" #deepl:3536136445
 je_gaudi_splendour_neoclassical_reason: "Неоклассицизм - это стиль, уходящий корнями в рациональную гармонию античности, в архитектурную грамматику колонн, фронтонов и симметричных планировок. Однако в начале XX века он был переосмыслен с помощью современных строительных технологий, более чистых линий и зачастую монументальных масштабов. Она стала не только символом традиций, но и дисциплинированным видением будущего, в котором общественная жизнь, право и культура будут обрамлены зданиями, внушающими благоговение и единство. Архитектура, воплощающая эти принципы, наделит нашу столицу серьезностью и величием, превратив ее в маяк порядка, устойчивости и культивируемой силы в глазах всего мира." #deepl:605890088
 je_gaudi_splendour_art_deco: "Мечта об ар-деко" #deepl:1198646901
 je_gaudi_splendour_art_deco_reason: "С появлением ар-деко архитекторы произвели революцию в мире искусства, например, порвав с жестким историзмом прошлого. Но в отличие от многих современных школ, их здания не были выражением простой функциональности и объективности. Ар-деко - это развитие в разгар общего пробуждения классического модернизма, в котором на первый план вышло творческое сочетание элегантности формы, дороговизны материалов, силы цвета и чувственности темы. В период своего расцвета он олицетворял роскошь, гламур, изобилие и веру в социальный и технологический прогресс. Архитектура, в которой соблюдаются эти принципы, сделала бы нашу страну образцом современности и богатства." #deepl:980834049

