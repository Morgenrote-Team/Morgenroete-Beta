 MR_MOUNTAINEERING_CLUB_BUTTON_TT: "#T Основать альпинистский клуб#!\nАльпинистский клуб - это первый шаг страны к организованному альпинизму. Он должен быть основан опытным джентльменом (или джентльменшей), обладающим альпинистским опытом. Из этого клуба потом выйдут новые альпинисты, которые будут покорять вершины мира!\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:2346036384

 MR_ALPINE_CLUB_BUTTON: "Альпийский клуб" #deepl:3580940097
 MR_ALPINE_CLUB_BUTTON_TT: "#T Основание Альпийского клуба#!\nОснованный в Лондоне в 1857 году, Альпийский клуб является старейшей в мире альпинистской организацией. Его создание ознаменовало начало организованного альпинизма в викторианской Англии. Целью клуба было содействие научным, географическим и спортивным исследованиям Альп. Среди его основателей был Эдвард Уимпер, совершивший первое восхождение на Маттерхорн в 1865 году. Альпийский клуб сыграл ключевую роль во время "золотого века альпинизма" и публиковал влиятельные работы, в том числе "Альпийский журнал". Он установил стандарты для будущих альпинистских клубов по всему миру.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1435537543
 MR_ALPINE_CLUB_TRIGGER_TT: "#default_text По крайней мере, #G 6#! странах есть альпинистский клуб.#!" #deepl:877941772

 MR_ALPINE_CLUB_PRESIDENT_BUTTON: "Станьте президентом Альпийского клуба" #deepl:2811041330
