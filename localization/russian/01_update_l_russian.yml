 concept_douglas_mountain_summit: "Горная вершина" #deepl:193458424
 concept_douglas_mountain_summits: "Mountain Summits" #You can use this for plural [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]
 concept_douglas_mountain_summit_desc: "Горные вершины - желанная цель всех альпинистов. Они обозначают самую высокую точку горы. У каждой вершины есть три отличительных признака, которые определяют, насколько сложно ее успешно достичь.\n\n#V Высота#!: Высота определяет, сколько шагов нужно сделать, чтобы подняться на гору - это отражает общую продолжительность экспедиции. На каждые 1000 метров приходится один шаг продвижения. Значение округляется в большую сторону, то есть гора Уитни высотой 4 421 метр требует 5 шагов, а пик Кауфмана высотой 7 134 метра - 8. Престиж горы рассчитывается в зависимости от ее высоты: общая высота делится на 250. Таким образом, идеальная гора высотой 5 000 метров дает 20 престижа.\n\n#V Уровень#!: Уровень горы отражает требования к снаряжению, необходимому для восхождения на нее. Он не привязан строго к ее высоте. Например, несмотря на высоту 5 636 метров, Цитлальтепетль относится только к первому уровню и требует лишь базового снаряжения. Напротив, Маттерхорн, находящийся на высоте всего 4 478 метров, считается значительно более сложной вершиной 3-го уровня, требующей, как минимум, подготовки к оказанию первой помощи в чрезвычайных ситуациях в Альпах.\n\n#V Риск#!: Уровень риска горы указывает на вероятность негативных событий, влияющих на экспедицию. Он не зависит ни от высоты, ни от уровня. Лавины, туман и суровая погода - основные факторы риска. На Попокатепетль можно было подняться уже в ранние современные времена благодаря ее гостеприимным окрестностям. Напротив, гораздо меньшая по высоте вершина Гросвенедигер (3 666 метров) представляла серьезную угрозу для австрийских экспедиций вплоть до начала XIX века.\n\nБольше информации об отдельных вершинах можно найти в разделе [concept_douglas_mountain_summit_list]." #deepl:3359948048
 concept_douglas_mountain_range: "Горный хребет" #deepl:3289022657
 concept_douglas_mountain_ranges: "Mountain Ranges" #You can use this for plural [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')]
 concept_douglas_mountain_range_desc: "Горный хребет - это горное образование, которое обеспечивает возможность тренировок [concept_douglas_mountaineering] на больших расстояниях. К классическим горным массивам относятся Скалистые горы, Анды, Альпы и Кавказ. [concept_douglas_mountaineer] В отличие от [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')], которые нужно покорять, существует множество менее сложных гор, где нет риска смертельного падения. Скорее, их следует рассматривать как тренировочный маршрут. В странах, где есть горные хребты, вероятность рождения альпинистов выше, чем в тех, где нет этой географической особенности." #deepl:2685064578
 concept_douglas_alpine_heritage: "Альпийское наследие" #deepl:3116364012
 concept_douglas_alpine_heritage_desc: "Альпийское наследие - это собирательный термин, обозначающий связь с горами и специализацию в альпинизме. Он также означает потенциал для привлечения новых [Concept('concept_douglas_mountaineer','$concept_douglas_mountaineers$')]- поскольку в большинстве случаев опытные альпинисты приезжают из горных районов. Это всегда дает преимущество странам с [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')] или [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]. Вербовка нового альпиниста, как и другие действия, стоит Альпийского наследия." #deepl:707449492

 concept_douglas_mountain_summit_list: "Список горных вершин" #deepl:4208448161
 concept_douglas_mountain_summit_list_desc: "Существует множество [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')], на которые можно подняться.\n\n#V Северная Америка:#!\n#b Гора Мак-Кинли#! (Аляска), высота 6190 метров, уровень 4\n#b Гора Логан#! (территория Юкон), высота 5959 метров, уровень 4\n#b Цитлальтепетль#! (Мексика), высота 5636 метров, уровень 1\n#b Гора Уитни#! (Калифорния), высота 4421 метр, уровень 1\n\n#V Южная Америка:#!\n#b Аконкагуа#! (Мендоса), Высота 6267 метров, Уровень 3\n#b Уаскаран#! (Территория Лимы), Высота 6768 метров, Уровень 5\n#b Иллимани#! (Ла-Пас), Высота 6438 метров, Уровень 4\n#b Чимборасо#! (Эквадор), Высота 6267 метров, Уровень 1\n\n#V Европа:#!\n#b Шкара#! (Большой Кавказ), Высота 5642 метра, Уровень 4\n#b Дюфуршпитце#! (Дюфуршпитце), Высота 4634 метра, Уровень 2\n#b Маттерхорн#! (Западная Швейцария), Высота 4478 метров, Уровень 3\n#b Aiguille Verte#! (Савойя), Высота 4122 метра, Уровень 3\n#b Pico de Aneto#! (Арагон), Высота 3404 метра, Уровень 1\n\n#V Африка:#!\n#b Кибо#! (Танганьика), Высота 5895 метров, Уровень 2\n#b Батиан#! (Кения), Высота 5199 метров, Уровень 3\n#b Гора Стэнли#! (Уганда), Высота 5109 метров, Уровень 3\n#b Гора Камерун#! (Южный Камерун), Высота 4095 метров, Уровень 1\n\n#V Азия:#!\n#b Камет#! (Дели), высота 7756 метров, Level\n#b Чоголиса#! (Кашмир), высота 7665 метров, Level 5\n#b Кабру#! (Гималаи), высота 7412 метров, Level 5\n#b Пик Кауфмана#! (Таджикистан), высота 7134 метра, Level 4\n\n#V Австралия и Океания:#!\n#b Гора Вильгельм#! (Восточная Новая Гвинея), высота 4121 метр, уровень 2\n#b Гора Кука#! (Южный остров), высота 3724 метра, уровень 2" #deepl:721187631

