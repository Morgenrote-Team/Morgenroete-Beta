 MR_ARCHITECT_PUBLIC_CONSTRUCTION_BUTTON_TT: "#T Общественное строительство#!\nНа основе своего архитектурного стиля архитектор может внести очки строительства на национальном уровне, чтобы продвинуть общественное строительство. После пяти лет непрерывной работы они получают повышение репутации.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3434490324

