 MR_ARCHITECT_BLUEPRINTS_MONUMENT_BUTTON_TT: "#T Чертежи: Городские памятники#!\nАрхитектор может разработать три возможных чертежа в категории "Памятники": [GetBuildingType('building_gaudi_statue').GetName], [GetBuildingType('building_gaudi_fountain').GetName] и [GetBuildingType('building_gaudi_arch').GetName]. Некоторые чертежи требуют технологий, а некоторые здания имеют особые требования в своих штатах.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1470268006
