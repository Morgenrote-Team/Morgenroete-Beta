 gaudi.82.t: "Работа архитектора" #deepl:1436757673
 gaudi.82.d: "После нескольких месяцев подготовки на сайте [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] представлены планы, расчеты, статистические данные и макет, сделанный вручную. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] амбициозный памятник уже считается мечтой архитектурного искусства. Остается лишь один вопрос: кто воплотит эту мечту в жизнь?" #deepl:1546320616
 gaudi.82.f: ""Завтра мы будем делать прекрасные вещи". -Антони Гауди" #deepl:3107908861
 gaudi.82.g: "Памятник самим себе." #deepl:3586195485

