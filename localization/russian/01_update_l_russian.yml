 douglas.103.t: "Полк горных войск" #deepl:459726214
 douglas.103.d: "Благодаря впечатляющему опыту покорения и обороны гор, [SCOPE.sCharacter('douglas_mountain_veteran').GetFullName] решил использовать свои превосходные навыки для создания элитного подразделения горных войск." #deepl:3198382874
 douglas.103.f: "Gebirgsjäger, Alpini или Chasseurs Alpins - вот лишь несколько примеров элитных войск некоторых стран, специализирующихся на войне на высотах. Альпийцы, основанные в 1872 году, являются старейшей действующей горной пехотой в мире. Их первоначальной задачей была защита границы Италии с Францией и Австро-Венгрией." #deepl:3963027024
 douglas.103.g: "Они будут нести его наследие в будущее." #deepl:1701012348

