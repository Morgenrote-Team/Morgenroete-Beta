l_russian:
 je_nationalization_germanization: "Германизация"
 je_nationalization_germanization_goal: "#O Прогресс национальной идентичности#! достигает #G 250#!."
 je_nationalization_german_national_identity: "Германская идентичность"
 je_nationalization_german_national_identity_reason: "После нескольких лет сближения и ряда реформ среди населения всё шире распространяется чувство принадлежности к пангерманской идентичности. Это чувство будет распространяться от региона к региону, независимо от того, как государство создаёт для этого условия: регионы с хорошо развитой государственной администрацией, университетами, казармами или военно-морскими базами с большей вероятностью разовьют общенемецкую идентичность благодаря своей интеграционной функции. В высокоурбанизированных районах скорее найдётся доступ к концепции, которую ранее исследовали только интеллектуалы. При идеальных обстоятельствах один субъект сможет принимать новую идентичность каждый год."
 nationalization.101.t: "Германское самосознание в [SCOPE.sState('united_german_culture_state').GetCustom('RU_SL_PP')]"
 nationalization.101.d: "После многих лет социального и политического влияния население [SCOPE.sState('united_german_culture_state').GetCustom('RU_SL_RP')] развило чувство принадлежности ко всей германской нации. Теперь они полностью привержены пангерманской идентичности."
 nationalization.101.f: "«Быть немцем - значит делать что-то ради самого дела». - Рихард Вагнер"
 nationalization.101.g: "Единство, справедливость и свобода!"
 nationalization.102.t: "Пангерманское самосознание"
 nationalization.102.d: "Теперь, когда всё население Германии считает себя в первую очередь принадлежащим к своей национальной, а не региональной идентичности, это оказывает влияние не только на немцев внутри страны, но и во всём мире."
 nationalization.102.f: "С созданием немецкого национального государства и утверждением пангерманской идентичности те немцы, что живут за границей - будь то эмигранты по всему миру или коренные жители под иностранным правлением - также будут идентифицировать себя в первую очередь как немцы."
 nationalization.102.g: "Пока звучит немецкий язык!"
 nationalization.103.d: "С созданием немецкого национального государства и утверждением пангерманской идентичности те немцы, что живут за границей - будь то эмигранты по всему миру или коренные жители под иностранным правлением - также будут идентифицировать себя в первую очередь как немцы. В нашей стране также возникло стремление идентифицировать себя как немцев, а не просто ссылаться на региональное происхождение, как это было раньше."
 nationalization.103.g: "Но не может ли это изобретение быть опасным для человечества?"
 united_german: "Немецкая"
 nationalization_pan_german_identity_tt: "Во всём мире всё северогерманское и южногерманское население теперь будет идентифицировать себя как пангерманское. Северогерманские и южногерманские исконные земли станут просто германскими."
 nationalization_german_consiousness_tt: "Местное северогерманское и южногерманское население становится немецким. Северогерманские и южногерманские исконные земли будут преобразованы в германские."
 nationalization_german_consiousness_capital_tt: "Местное северогерманское и южногерманское население нашей столичной области становится единым немецким населением. Она будет преобразована в германскую исконную землю. Наша основная культура изменится на немецкую, и мы сможем германизировать всю страну."
 je_nationalization_german_national_identity_tt: "Все северогерманские, южногерманские и алеманнские исконные земли преобразованы в германские."
 nationalization.104.t: "Северогерманцы интегрированы"
 nationalization.104.d: "Северогерманская культура теперь полностью интегрирована в немецкую."
 nationalization.105.t: "Южногерманцы интегрированы"
 nationalization.105.d: "Южногерманская культура теперь полностью интегрирована в немецкую."
 nationalization.106.t: "Алеманны интегрированы"
 nationalization.106.d: "Алеманнская культура теперь полностью интегрирована в немецкую."
 nationalization.104.f: "«Я не беспокоюсь о том, что Германия не станет единой; наши хорошие дороги и будущие железные дороги сделают своё дело. Прежде всего, пусть они будут едины в любви друг к другу и всегда едины против внешнего врага; едины в том, чтобы немецкий талер и грош имели одинаковую ценность по всей империи; едины в том, чтобы мой чемодан мог проехать через все тридцать шесть государств нераскрытым». - Иоганн Вольфганг фон Гёте"
 nationalization.104.g: "Добро пожаловать, братья!"
 nationalization.111.t: "[SCOPE.sCharacter('german_character_scope').GetLastName] поддерживает германское дело"
 nationalization.111.d: "На волне растущего призыва к пангерманской идентичности [SCOPE.sCharacter('german_character_scope').GetFullName] [SelectLocalization(SCOPE.sCharacter('german_character_scope').IsFemale, 'полностью отождествила себя', 'полностью отождествил себя')] с идеалами единого немецкого национального государства. [SCOPE.sCharacter('german_character_scope').GetSheHe|U] считает собственное происхождение второстепенным и подчёркивает свою национальную германскую идентичность."
 nationalization.111.f: "«Я больше не знаю никаких партий, я знаю только немцев!» - Вильгельм II"
 nationalization.111.g: "Дни раздробленности прошли."
 nationalization.112.t: "Немецкая культура"
 nationalization.112.d: "Германия известна как страна поэтов и мыслителей. Ещё до политического объединения культура формировала нацию. Немецкая литература и музыка всемирно известны и могут служить связующим звеном для идентичности."
 nationalization.112.f: "«Человек, и в особенности немец, формирует свой собственный мир и учится терпеть то, что не поддаётся воспитанию». - Фридрих Шиллер"
 nationalization.112.g: "У Германии богатая музыкальная история."
 nationalization.112.h: "У Германии богатая литературная история."
 nationalization.112.i: "Будущее принадлежит немецкой культуре!"
 nationalization.113.t: "Немецкие памятники"
 nationalization.113.d: "Многочисленные клубы и ассоциации, а также патриоты и националисты стремятся воздвигнуть множество мемориалов, прославляющих героев Германии и празднующих новое единство страны. Огромная статуя Германии должна быть построена в Нидервальде на Рейне."
 nationalization.113.f: "После объединения Германии началась бурная строительная деятельность, отразившаяся в необычайной культуре памятников. Наряду с памятником Барбароссе на горе Кифхойзер, Немецким углом в Кобленце, памятником Герману близ Детмольда в южном Тевтобургском лесу, памятником кайзеру Вильгельму у Порта-Вестфалики, памятником Битве народов в Лейпциге, памятником Бисмарку в Гамбурге и Вальхаллой близ Донауштауфа, памятник в Нидервальде является одним из монументальных мемориальных сооружений в Германии, которые были в основном построены во времена Германской империи. Строительство заняло 12 лет."
 nationalization.113.g: "Поддержать культуру памятников и построить Нидервальдский монумент."
 nationalization.113.h: "Нет."
 je_nationalization_frenchization: "Французизация"
 je_nationalization_frenchization_reason: "С 1881 года детей, говоривших в школе на окситанском языке, наказывали в соответствии с рекомендациями министра Жюля Ферри; это привело к унижению языка, известному как la vergonha (позор). Это также относилось и к другим частям Франции, которые страдали от централизаторских усилий со времён Французской революции. С конца XIX века французское государство активизировало свои усилия по дальнейшему сокращению региональных различий в пользу монолитной идентичности."
 nationalization_frenchization_tt: "Местное окситанское, франко-провансальское, бретонское и валлонское население становится французским. Их исконные земли будут преобразованы во французские."
 je_nationalization_french_national_identity_tt: "Все окситанские, франко-провансальские, бретонские и валлонские исконные земли преобразованы во французские."
 nationalization_pan_french_identity_tt: "Во всём мире всё окситанское, франко-провансальское, бретонское и валлонское население теперь будет идентифицировать себя как общефранцузское."
 nationalization.201.t: "Французизация в [SCOPE.sState('frenchization_state').GetCustom('RU_SL_PP')]"
 nationalization.201.d: "После многих лет политического влияния и интенсивного образования население в [SCOPE.sState('frenchization_state').GetCustom('RU_SL_PP')] стало неотличимо от других французских граждан. Их образ жизни и культура соответствуют парижскому образцу."
 nationalization.201.f: "«Парижанин для французов - то же, что афинянин для греков: никто не спит лучше него, никто не является более открыто легкомысленным и праздным, никто не кажется более беззаботным. Но это обманчиво. Он склонен ко всякого рода апатии, но когда нужно завоевать славу, он может быть вдохновлён на любую ярость. Дайте ему пику, и он совершит десятое августа, мушкет - и вы получите Аустерлиц. Он был трамплином для Наполеона и опорой для Дантона. На клич „Отечество“ он записывается в армию, а на зов свободы рвёт мостовые. Берегитесь его!» - Виктор Гюго"
 nationalization.201.g: "Будь чистым, говори по-французски."
 nationalization.202.t: "Французизация завершена"
 nationalization.202.d: "Годы усилий не прошли даром. Франция - это нация с одним языком, одной культурой и одной центральной столицей. Время языковых и культурных различий прошло. Образование французов - это веха в нашей истории."
 nationalization.202.f: "С утверждением французской идентичности франкоязычное сообщество за границей - будь то эмигранты по всему миру или коренные жители под иностранным правлением - также будет идентифицировать себя в первую очередь как французы."
 nationalization.202.g: "День славы настал!"
 nationalization.204.t: "Окситанцы интегрированы"
 nationalization.204.d: "После многих лет образования, пропаганды и искоренения региональных глупостей окситанскую культуру едва ли можно отличить от французской."
 nationalization.205.t: "Франко-провансальцы интегрированы"
 nationalization.205.d: "После многих лет образования, пропаганды и искоренения региональных глупостей франко-провансальскую культуру едва ли можно отличить от французской."
 nationalization.206.t: "Бретонцы интегрированы"
 nationalization.206.d: "После многих лет образования, пропаганды и искоренения региональных глупостей бретонскую культуру едва ли можно отличить от французской."
 nationalization.207.t: "Валлоны интегрированы"
 nationalization.207.d: "После многих лет образования, пропаганды и искоренения региональных глупостей валлонскую культуру едва ли можно отличить от французской."
 nationalization.204.f: "«Франция велика, потому что она - Франция». - Виктор Гюго"
 nationalization.204.g: "Добро пожаловать, братья!"
 nationalization.301.t: "Швейцарское самосознание в [SCOPE.sState('united_swiss_culture_state').GetCustom('RU_SL_PP')]"
 nationalization.301.d: "После многих лет социального и политического влияния население в [SCOPE.sState('united_swiss_culture_state').GetCustom('RU_SL_PP')] развило чувство принадлежности к единой швейцарской нации. Теперь они полностью привержены швейцарской идентичности."
 nationalization.301.f: "«В случае конца света я бы предпочёл оказаться в Швейцарии». - Альберт Эйнштейн"
 nationalization.301.g: "Один за всех, и все за одного!"
 nationalization.302.t: "Формирование швейцарской нации завершено"
 nationalization.302.d: "Всё население Швейцарии больше не считает себя в первую очередь частью региональной идентичности, а ощущает принадлежность к национальной. Отныне ни одна французская, итальянская или немецкая нация не сможет так легко заявить, что мы - просто смесь разных народов."
 nationalization.302.f: "«Мы хотим быть единым народом братьев,\nНикогда не расставаться в опасности и беде.\nМы хотим быть свободными, как наши отцы,\nИ лучше умереть, чем жить в рабстве.\nМы хотим верить в единого высшего Бога\nИ никогда не бояться человеческой власти»."
 nationalization.302.g: "Мы - нация воли."
 nationalization.313.t: "Памятник Вильгельму Теллю"
 nationalization.313.d: "Вильгельм Телль считается одной из мифических фигур-основателей Швейцарии и имеет в исторической памяти населения такой же статус, как и Клятва Рютли. Многие патриоты хотят воздвигнуть в его честь статую, чтобы вдохновить пробудившееся национальное самосознание."
 nationalization.313.f: "«Хороший человек думает о себе в последнюю очередь». - Фридрих Шиллер"
 nationalization.313.g: "Мы должны прославлять наше прошлое."
 nationalization.313.h: "А кто за это будет платить?"
 united_swiss: "Швейцарская"
 nationalization_swiss_consiousness_capital_tt: "Местное алеманнское, франко-провансальское, тичинское и романшское население нашей столичной области становится единым швейцарским населением. Она будет преобразована в швейцарскую исконную землю. Наша основная культура изменится на швейцарскую, и мы сможем сформировать швейцарскую нацию по всей стране."
 nationalization_swiss_consiousness_tt: "Местное алеманнское, франко-провансальское, тичинское и романшское население становится единым швейцарским населением. Исконные земли будут преобразованы в швейцарские."
 je_nationalization_swiss_national_identity_tt: "Все алеманнские, франко-провансальские, тичинские и романшские исконные земли преобразованы в швейцарские."
 nationalization_pan_swiss_identity_tt: "Всё оставшееся алеманнское, франко-провансальское, тичинское и романшское население становится единым швейцарским населением. Все персонажи этого типа также станут швейцарцами."
 nationalization_disunited_italy_modifier: "Последствия объединения Италии"
 nationalization_disunited_germany_modifier: "Последствия объединения Германии"
 nationalization_brigants_modifier: "Разбойничество"
 nationalization_anti_regionalism_ig_modifier: "Антирегионализм"
 nationalization_anti_regionalism_country_modifier: "Антирегионализм"
 nationalization_linguistic_impurity_modifier: "Языковая нечистота"
 nationalization_no_foscolo_modifier: "В выдаче Фосколо отказано"
 je_nationalization_italianization: "Итальянизация"
 je_nationalization_italianization_reason: "После объединения Италии Массимо д'Адзельо сказал: «Мы создали Италию, теперь мы должны создать итальянцев». Даже если это высказывание исторически сомнительно, оно всё же доносит до сути ту истину, что после политического объединения Италии внутреннее единство было далеко не стабильным. Это относится не только к югу, где бесчинствовали разбойники, - даже на севере, за пределами буржуазной элиты, большинство людей всё ещё чувствовали связь со своей региональной идентичностью. Совместные войны, высокий престиж, строительство национальных институтов, таких как университеты, художественные академии или административные учреждения, вероятно, обеспечат появление значительно более сильной общеитальянской идентичности в результате трудного процесса национального единства в ближайшие несколько лет."
 je_nationalization_italianization_goal: "#O Прогресс национальной идентичности#! достигает #G 250#!."
 je_nationalization_germanization_reason: "После основания Германской империи в 1871 году чувство единства немцев уже было очень широко распространено в различных федеральных землях. Насущная необходимость объединения германских государств существовала с 1848 года. Только в Баварии до XX века преобладало особое региональное чувство, но оно всё больше вытеснялось. Совместные войны, высокий престиж, строительство национальных институтов, таких как университеты, художественные академии или административные учреждения, вероятно, обеспечат появление значительно более сильной общенемецкой идентичности в результате трудного процесса национального единства в ближайшие несколько лет."
 nationalization.12.f: "Разбойничество в Южной Италии в той или иной форме существовало с древних времён. Однако его происхождение как деятельность преступников, нападающих на случайных путешественников, позже значительно изменилось, приняв форму политического движения сопротивления. После завоевания Королевства Обеих Сицилий в 1861 году Савойским королевством Сардиния (позже Королевством Италия) возникла самая известная и широко известная форма разбойничества в этом районе. Среди разбойников были разные люди с разным опытом работы и мотивами; среди них были бывшие заключённые, бандиты и другие люди, которых итальянское правительство считало обычными преступниками, а также бывшие солдаты и лоялисты бурбонской армии. Они совершали нападения не только на итальянские власти и землевладельческие высшие классы, но и на простых людей, часто грабя деревни, города и фермы, а также совершая вооружённые ограбления как отдельных лиц, так и групп, включая фермеров, горожан и конкурирующие банды разбойников."
 nationalization.12.g: "Ещё один бандит, изображающий из себя Робин Гуда!"
 nationalization.13.t: "Страх за региональное наследие"
 nationalization.13.f: "С провалом революции 1848/1849 годов неогвельфы, как ведущая сила итальянского движения за единство, фактически стали бессильны. Изначально они выступали за федеративно устроенную Италию под председательством Папы Римского как первого среди равных. В ответ на это централистские круги получили абсолютное превосходство - явление, которое оставалось распространённым вплоть до XX века. Региональные особенности больше не принимались во внимание, а, наоборот, региональные чувства рассматривались как опасные тенденции, которые могли разрушить усилия по объединению Италии."
 nationalization.13.h: "Мы должны учесть это особое наследие."
 nationalization.14.t: "Диалекты или языки?"
 nationalization.14.d: "Ведущие учителя, лекторы и профессора нашей страны высказались в пользу особого содействия внедрению итальянского языка не только в государственных учреждениях, но и в повседневной жизни. Это должно значительно улучшить научные и политические процессы в новой Италии, но среди населения, особенно сельского, это крайне непопулярное требование, так как люди там продолжают говорить исключительно на диалекте."
 nationalization.14.f: "Ещё в XVIII веке не было никаких сомнений в том, что отдельные языковые разновидности Апеннинского полуострова являются самостоятельными языками. Не только тосканский имел большой престиж благодаря Данте Алигьери. Венецианский был официальным и письменным языком Венецианской республики, на венецианском писали пьесы, такие как Карло Гольдони, и литературу, которая также имела особое значение как лингва-франка в Адриатическом регионе. Нечто подобное можно сказать и о неаполитанском. Однако в XIX веке возобладало мнение, что существует только одна стандартная итальянская разновидность, а все остальные языки в Италии - всего лишь диалекты, хотя итальянский, на котором говорили на севере, уже имел особый лингвистический статус. Однако в ходе политических движений всё больше утверждалась реальность: язык отличается от диалекта тем, что у первого есть флот и армия."
 nationalization.14.g: "Наше языковое разнообразие - наш престиж."
 nationalization.14.h: "Говорите по-итальянски, говорите ясно. Остальное - лишь диалекты."
 nationalization.15.t: "Судьба Фосколо"
 nationalization.15.d: "По мере того как национальное чувство становится всё более очевидным, раздаются голоса, призывающие перевезти тело великого итальянского поэта Уго Фосколо из Великобритании в Италию."
 nationalization.15.f: "Новая итальянская нация искала ориентиры: исторические события, а также исторические личности. Идея создания гробницы художников, учёных и других великих личностей по образцу Пантеона, как во Франции, возникла на раннем этапе. Санта-Кроче во Флоренции, которая ранее служила местом захоронения видных граждан, казалась подходящим местом для этого. Такие личности, как Макиавелли, Микеланджело и Галилей, уже давно были скорее итальянцами, чем тосканцами. Уго Фосколо, поэт венецианского происхождения с острова Закинф, жил в революционные годы и считается определяющей фигурой раннего итальянского либерализма и национализма. Он стал бы идеальным дополнением к этой галерее великих итальянских умов. Однако Фосколо умер в изгнании в 1827 году - в Тернем-Грин близ Лондона."
 nationalization.15.g: "Попросить их отдать нам Фосколо."
 nationalization.15.h: "Нам будет неловко, если они откажут."
 nationalization.16.d: "Итальянское правительство запросило передачу им тела знаменитого поэта и борца за итальянский национализм, Уго Фосколо."
 nationalization.16.g: "Пусть забирают своего мелкого поэтишку. Как его там звали?"
 nationalization.16.h: "Этот Фоско-парень остаётся здесь."
 nationalization.17.t_foscolo: "Фосколо возвращается"
 nationalization.17.d_foscolo: "Британское правительство согласилось - тело Фосколо скоро вернётся на итальянскую землю и найдёт свой последний покой в церкви Санта-Кроче!"
 nationalization.17.f_foscolo: "Возвращение Уго Фосколо в Италию считается одним из первых ключевых моментов для молодого национального государства. Фосколо чествовали как вернувшегося героя; его похороны были подобны процессии - с плачущими и ликующими людьми. С «Пантеоном» великих итальянских личностей в Санта-Кроче был открыт ориентир итальянского национализма, на который люди могли ориентироваться. Итальянские герои должны были стать центром этой идеологии, а не католические святые."
 nationalization.17.g: "Великий итальянец возвращается домой!"
 nationalization.17.t_no_foscolo: "Фосколо остаётся в изгнании"
 nationalization.17.d_no_foscolo: "К сожалению, британское правительство, используя несколько лицемерных предлогов, воспрепятствовало возвращению Уго Фосколо в Италию."
 nationalization.17.f_no_foscolo: "Они действительно имели наглость назвать великого итальянского поэта «этим Фоско-парнем»!"
 nationalization.17.h: "Эти сыновья одноногой коровы отказывают нам в нашем Фосколо!"
 nationalization.18.t: "Итальянская музыкальная культура"
 nationalization.18.d: "Италия считается одной из стран, сыгравших решающую роль в развитии музыкальной культуры - будь то в области изготовления инструментов, в развитии оперы, в обучении знаменитых певцов или в плане великих композиторов. В музыкальном плане, по крайней мере со времён Ренессанса, полуостров отличался уникальной музыкальной культурой, которая очаровывала всю Европу и давала новые импульсы. Тот факт, что до XIX века итальянский был единственным оперным языком, свидетельствует об этом великом наследии."
 nationalization.18.f: "«Дайте мне счёт прачки, и я положу на музыку даже его». - Джоаккино Россини"
 nationalization.18.g: "У Италии богатая музыкальная история."
 nationalization.18.h: "Будущее принадлежит итальянской музыкальной культуре!"
 nationalization.19.t: "Культ Данте"
 nationalization.19.d: "Данте Алигьери считается высшим символом итальянской культуры, а его «Божественная комедия» - одним из классических произведений мировой литературы и важнейшим литературным свидетельством Средневековья. Почитание Данте превратилось в настоящий культ среди патриотов и в то же время рассматривается как доказательство для внешнего мира того, что общеитальянское чувство существовало задолго до Рисорджименто - в конце концов, именно Данте первым определил границы Италии как область, где говорят на языке «Sì». Во Флоренции должен быть воздвигнут памятник в честь «верховного поэта»."
 nationalization.19.f: "«Земную жизнь пройдя до половины,\nЯ очутился в сумрачном лесу,\nУтратив правый путь во тьме долины». - Данте Алигьери"
 nationalization.19.g: "Поддержать культ Данте и построить памятник во Флоренции."
 nationalization.19.h: "И мучить будущие поколения терцинами?"
 nationalization.12.t: "Разбойники в [SCOPE.sState('nationalization_brigants_modifier').GetCustom('RU_SL_PP')]"
 nationalization.12.d: "Тяжёлые условия в [SCOPE.sState('nationalization_brigants_modifier').GetCustom('RU_SL_PP')] привели к тому, что всё больше людей без перспектив присоединяются к банде, которую возглавляет [SCOPE.sCharacter('manzoni_brigant_character').GetFullName]. Теперь они сеют хаос в окрестностях - до такой степени, что разбойники стали настоящей проблемой. Среди простого народа есть даже сторонники, которые видят в них противников правительства и растущей итальянизации, а следовательно, политических и региональных борцов сопротивления."
 nationalization.13.d: "Простые люди в [SCOPE.sState('nationalization_regionalist_state').GetCustom('RU_SL_PP')] опасаются, что новые национальные итальянские институты и популяризация итальянского языка могут разрушить традиционный уклад жизни. [SCOPE.sCharacter('nationalization_rural_leader_scope').GetFullName] утверждает, что особое наследие региона не следует игнорировать и что гомогенизация Италии зашла уже слишком далеко."
 nationalization.13.g: "[SCOPE.sState('nationalization_regionalist_state').GetName] - такой же итальянский регион, как и любой другой."
 nationalization.11.t: "Наука на кухне и искусство хорошего питания"
 nationalization.11.d: "В [TimeKeeper.GetCurrentDate.Format('y')] году в Италии была опубликована новаторская кулинарная книга, которая навсегда изменила её кулинарную культуру. Её автор, Пеллегрино Артузи, таким образом внёс свой вклад в становление международно признанной итальянской кухни, подчёркивающей единство и величие нации."
 nationalization.11.f: "Опубликованная в 1891 году книга Пеллегрино Артузи «Наука на кухне и искусство хорошего питания» по праву считается первой современной итальянской кулинарной книгой. В то время, когда Италия только начинала формировать свою национальную идентичность, работа Артузи сыграла ключевую роль в объединении разнообразных региональных кухонь в единую национальную кулинарную традицию. Его тщательно собранная коллекция рецептов, представленная с остроумием и ясностью, не только установила новый стандарт для кулинарной литературы, но и внесла значительный вклад в повышение уровня жизни нации, продвигая качество, инновации и гордость за местную гастрономию."
 nationalization.11.g: "Триумф кулинарного искусства!"