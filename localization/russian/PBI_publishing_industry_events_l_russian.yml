 pbi_publishing_industry_events.100.t: "Что душе угодно"
 pbi_publishing_industry_events.100.d.1: "В [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] есть газеты, поддерживающие партию «[SCOPE.sParty('target_party_1').GetName]», газеты, поддерживающие партию «[SCOPE.sParty('target_party_2').GetName]», и даже газеты для #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_3').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_3').GetCustom('RU_IG_RP')]#!#!, что позволяет гражданам выбирать газету по своему вкусу."
 pbi_publishing_industry_events.100.d.2: "В [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] есть газеты, поддерживающие партию «[SCOPE.sParty('target_party_1').GetName]», и даже газеты для партии «[SCOPE.sParty('target_party_2').GetName]», что позволяет гражданам выбирать газету по своему вкусу."
 pbi_publishing_industry_events.100.d.3: "В [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] есть газеты, поддерживающие #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_1').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_1').GetCustom('RU_IG_VP')]#!#!, газеты, поддерживающие #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_2').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_2').GetCustom('RU_IG_VP')]#!#!, и даже газеты для #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_3').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_3').GetCustom('RU_IG_RP')]#!#!, что позволяет гражданам выбирать газету по своему вкусу."
 pbi_publishing_industry_events.100.d.4: "В [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] есть газеты, поддерживающие #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_1').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_1').GetCustom('RU_IG_VP')]#!#! и #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_2').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_2').GetCustom('RU_IG_VP')]#!#!, что позволяет гражданам выбирать газету по своему вкусу."
 pbi_publishing_industry_events.100.f: "«Мы считаем, что величайшее право в мире — это право на ошибку, и в осуществлении этого права люди имеют неотъемлемое право выражать свои необузданные мысли на все темы и обо всех личностях, неся ответственность лишь за злоупотребление этим правом».\n— Уильям Рэндольф Хёрст"
 pbi_publishing_industry_events.100.a: "Хорошо, когда есть выбор."
 pbi_publishing_industry_events.100.b: "Люди довольны, когда газеты говорят за них."
 pbi_publishing_industry_events.105.t: "Правительственная газета по связям с общественностью"
 pbi_publishing_industry_events.105.d.1: "[SCOPE.sCharacter('target_character_2').GetFullName], представитель партии «[SCOPE.sParty('target_party_2').GetName]», раскритиковал газету «[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]», принадлежащую партии «[SCOPE.sParty('target_party_1').GetName]» в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')]. По его словам, это издание, владельцем которого является [SCOPE.sCharacter('target_character_1').GetFullName], похоже на правительственный пиар-листок."
 pbi_publishing_industry_events.105.d.2: "[SCOPE.sCharacter('target_character_2').GetFullName], представитель #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_2').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_2').GetCustom('RU_IG_RP')]#!#!, раскритиковал газету «[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]», принадлежащую партии «[SCOPE.sParty('target_party_1').GetName]» в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')]. По его словам, это издание, владельцем которого является [SCOPE.sCharacter('target_character_1').GetFullName], похоже на правительственный пиар-листок."
 pbi_publishing_industry_events.105.d.3: "[SCOPE.sCharacter('target_character_2').GetFullName], представитель партии «[SCOPE.sParty('target_party_2').GetName]», раскритиковал газету «[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]», принадлежащую #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_1').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_1').GetCustom('RU_IG_DP')]#!#! в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')]. По его словам, это издание, владельцем которого является [SCOPE.sCharacter('target_character_1').GetFullName], похоже на правительственный пиар-листок."
 pbi_publishing_industry_events.105.d.4: "[SCOPE.sCharacter('target_character_2').GetFullName], представитель #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_2').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_2').GetCustom('RU_IG_RP')]#!#!, раскритиковал газету «[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]», принадлежащую #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_1').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_1').GetCustom('RU_IG_DP')]#!#! в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')]. По его словам, это издание, владельцем которого является [SCOPE.sCharacter('target_character_1').GetFullName], похоже на правительственный пиар-листок."
 pbi_publishing_industry_events.105.f: "«Поскольку очевидно, что люди от рабочего класса до высших слоёв действуют в своих интересах, нет никаких сомнений в том, что воля государства должна осуществляться правительством, представляющим государство, и что народ обязан поддерживать и содействовать решениям правительства»."
 pbi_publishing_industry_events.105.a: "В этом тоже заключается роль журналистики."
 pbi_publishing_industry_events.105.b: "Должна быть и газета для оппозиции."
 pbi_publishing_industry_events.110.t: "Приоритетные права СМИ"
 pbi_publishing_industry_events.110.d: "[SCOPE.sCharacter('target_character').GetFullName], член #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig').GetCustom('RU_IG_RP')]#!#!, настаивает на том, чтобы его газете был предоставлен приоритет в освещении правительственных заявлений."
 pbi_publishing_industry_events.110.f: "«Мы должны точно сообщать общественности о наших намерениях, прежде чем наша политика будет очернена безответственным и морально разложившимся триумвиратом журналистов»."
 pbi_publishing_industry_events.110.a: "Наша миссия — сообщать правду."
 pbi_publishing_industry_events.110.b: "Такое фаворитство неприемлемо."
 pbi_publishing_industry_events.115.t: "Газеты поддерживают новый закон"
 pbi_publishing_industry_events.115.d.1: "Газета «[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]», принадлежащая партии «[SCOPE.sParty('target_party').GetName]», издателем которой является [SCOPE.sCharacter('target_character').GetFullName], ежедневно публикует статьи, восхваляющие закон «[SCOPE.sLaw('target_law').GetName]», но другие газеты раскритиковали это как перегиб."
 pbi_publishing_industry_events.115.d.2: "Газета «[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]», принадлежащая #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig').GetCustom('RU_IG_DP')]#!#!, издателем которой является [SCOPE.sCharacter('target_character').GetFullName], ежедневно публикует статьи, восхваляющие закон «[SCOPE.sLaw('target_law').GetName]», но другие газеты раскритиковали это как перегиб."
 pbi_publishing_industry_events.115.f: "«Если в этом законопроекте и есть проблема, так это то, что от господ из оппозиции вряд ли можно ожидать должного понимания его важности»."
 pbi_publishing_industry_events.115.a: "Общественное мнение — это то, что мы создаём."
 pbi_publishing_industry_events.115.b: "Роль прессы — указывать на проблемы в законопроекте."
 pbi_publishing_industry_events.120.t: "Скандал с политиком"
 pbi_publishing_industry_events.120.d: "В ответ на сообщения некоторых газет о скандале, в который попал[SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'а', '')] [SCOPE.sCharacter('target_character').GetFullName], принадлежащий[SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'ая', 'ий')] к #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig').GetCustom('RU_IG_DP')]#!#!, [SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'она', 'он')] утверждает, что статьи являются ложными и клеветническими."
 pbi_publishing_industry_events.120.f: "«Учитывая, с какими людьми [SCOPE.sCharacter('target_character').GetLastName] общал[SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'ась', 'ся')], прежде чем занять своё нынешнее респектабельное положение, неудивительно, что [SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'она', 'он')] был[SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'а', '')] замешан[SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'а', '')] в похищениях и убийствах. На самом деле, эта газета смогла поговорить с одним из тех, кто хорошо знал [SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'её', 'его')] в те дни. Удивительные подробности будут раскрыты в нашем следующем выпуске!»"
 pbi_publishing_industry_events.120.a: "Мы должны этим воспользоваться."
 pbi_publishing_industry_events.120.b: "Это проблема всей группы #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig').GetCustom('RU_IG_RP')]#!#!!"
 pbi_publishing_industry_events.125.t: "Газета для кого?"
 pbi_publishing_industry_events.125.d: "Общественность в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')] считает, что газеты пишут только то, что удобно правительству."
 pbi_publishing_industry_events.125.f: "«В [SCOPE.sState('target_state').GetCustom('RU_SL_PP')] издаётся множество газет, но [SCOPE.sCharacter('target_character').GetFullName] является акционером во всех них и решает, что печатать. Газеты могут публиковать статьи только в соответствии с [SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'её', 'его')] желаниями. В этом смысле в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')] существует только одна газета»."
 pbi_publishing_industry_events.125.a: "Информация имеет смысл, только если она контролируется."
 pbi_publishing_industry_events.125.b: "Они никогда не довольствуются тем, что им дают."
 pbi_publishing_industry_events.200.t: "Есть ли Санта-Клаус?"
 pbi_publishing_industry_events.200.d: "Дорогой редактор!\nМне 8 лет. Некоторые из моих маленьких друзей говорят, что Санта-Клауса не существует.\nПожалуйста, скажите мне правду: есть ли Санта-Клаус?\nВирджиния О'Хэнлон"
 pbi_publishing_industry_events.200.f: "«Да, Вирджиния, Санта-Клаус существует. Он существует так же несомненно, как существуют любовь, щедрость и преданность, и вы знаете, что они изобилуют и придают вашей жизни высшую красоту и радость».\n— Фрэнсис Фарселлус Чёрч (The Sun)"
 pbi_publishing_industry_events.200.a: "Полагаю, газеты иногда пишут и хорошие вещи."
 pbi_publishing_industry_events.200.b: "Любовь и искренность не делают страну сильной."
 pbi_publishing_industry_events.205.t: "Авторитетная газета критикует грошовую прессу"
 pbi_publishing_industry_events.205.d: "Престижная газета в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] раскритиковала грошовую прессу в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')] за привлечение читателей сенсационной дезинформацией."
 pbi_publishing_industry_events.205.f: "«Высокомерие популярной прессы нашей страны только растёт. Всё, что они печатают, — это сплетни о политиках и светских львицах, или скандальные преступления и судебные процессы. И большинство этих статей сфабрикованы без какой-либо реальной репортёрской работы или знаний!»"
 pbi_publishing_industry_events.205.a: "Это поистине плачевно."
 pbi_publishing_industry_events.205.b: "По крайней мере, они могут научить массы читать."
 pbi_publishing_industry_events.210.t: "Оскорблённая честь"
 pbi_publishing_industry_events.210.d: "Грошовая пресса в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')] сообщает о скандале, в который попал [SCOPE.sCharacter('target_character').GetPrimaryRoleTitle|l] [SCOPE.sCharacter('target_character').GetFullName]. [SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'Она', 'Он')] пытается добиться удаления публикации на том основании, что она является ложной и клеветнической."
 pbi_publishing_industry_events.210.f: "«Учитывая, с какими людьми [SCOPE.sCharacter('target_character').GetLastName] общал[SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'ась', 'ся')], прежде чем занять своё нынешнее респектабельное положение, неудивительно, что [SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'она', 'он')] был[SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'а', '')] замешан[SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'а', '')] в похищениях и убийствах. На самом деле, эта газета смогла поговорить с одним из тех, кто хорошо знал [SelectLocalization(SCOPE.sCharacter('target_character').IsFemale, 'её', 'его')] в те дни. Удивительные подробности будут раскрыты в нашем следующем выпуске!»"
 pbi_publishing_industry_events.210.a: "В данном случае правдивость новостного репортажа не имеет значения."
 pbi_publishing_industry_events.210.b: "Честь [SCOPE.sCharacter('target_character').GetLastName] должна быть восстановлена."
 pbi_publishing_industry_events.215.t: "Газета как лоскутное одеяло"
 pbi_publishing_industry_events.215.d: "Плагиат статей является обычным делом для большинства грошовых изданий в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')]."
 pbi_publishing_industry_events.215.f: "«Журналисты в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')] подобны голодным гиенам. Они находят статью, которая, по их мнению, принесёт им несколько читателей, и публикуют её в своей газете. Трудно найти статью, которая не была бы сплагиачена. Одна газета даже перепечатала редакционную статью прямо из другого издания!»"
 pbi_publishing_industry_events.215.a: "Вознаграждение за статью должен получить тот, кто её написал."
 pbi_publishing_industry_events.215.b: "Хорошую статью следует распространять."
 pbi_publishing_industry_events.220.t: "Очень волнующе"
 pbi_publishing_industry_events.220.d: "Жестокие убийства, неприглядные ссоры любовников и скандалы сомнительной подлинности. Граждане [SCOPE.sState('target_state').GetCustom('RU_SL_RP')] в восторге от радикальных историй, которые ежедневно появляются в грошовой прессе."
 pbi_publishing_industry_events.220.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_publishing_industry_flavor_220')]"
 pbi_publishing_industry_events.220.f.1: "«В старом павильоне было сделано крайне удивительное открытие. Владелец дома нанял строительного подрядчика для проведения ремонта. Рабочие были удивлены, когда сняли часть стены. Открылся проход, ведущий в большой подвал. Рабочие с трепетом вошли в него. Светящийся свет факела ясно показал останки двух человеческих тел. Это были скелеты, одетые в одежду почти двухсотлетней давности. Соседние жители предоставили разнообразную информацию. Однако в настоящее время невозможно сделать вывод, были ли эти два человека замурованы в подвале и оставлены умирать ужасной смертью, или же они были сначала убиты где-то, а затем перенесены сюда, чтобы скрыть их»."
 pbi_publishing_industry_events.220.f.2: "«Обычно тихий город в ту субботу был весьма напряжён. Сообщалось, что ходили слухи о жутком убийстве семилетней девочки. Около 13:30 в тот день к трём детям подошёл молодой клерк из адвокатской конторы. Мужчина предложил девочке монету и пригласил её пойти с ним в овраг или на старую дорогу, ведущую в деревню. Двое других детей также получили монеты и пообещали не следовать за мужчиной. Однако девочка не захотела идти с ним. Тогда мужчина схватил её за руку и потащил, заставив плакать. В семь или восемь часов девочка так и не появилась, и соседи начали о ней говорить. Вскоре после входа на ферму они обнаружили на земле голову пропавшей девочки. Она была явно отрублена острым лезвием, а её лицо было покрыто порезами от рта до уха, а также на левом виске. Это было ужасное зрелище. Каждая часть расчленённого, безконечного тела была разбросана по всей плантации»."
 pbi_publishing_industry_events.220.f.3: "«Рабочего обвинили в избиении жены. Мужчина пришёл домой несколько ночей назад с длинным конским кнутом и избил свою жену в одной сорочке, которая лежала в постели. Она была на седьмом месяце беременности и не могла сопротивляться. Поэтому его избиение чуть не стоило ей жизни. Он залез на кровать и топтал её, сломав три ребра. Её доставили в больницу с серьёзными травмами. На первом слушании обвиняемый прошептал, что это из-за того, что у его жены была привычка пить. Судья приговорил его к неделе заключения»."
 pbi_publishing_industry_events.220.f.4: "«Двадцатитрёхлетний сын крестьянина с беспрецедентной жестокостью убил своих родителей, пятерых братьев и сестёр и служанку. Его признание было лишь объяснением мотивов и способа убийства, без признаков раскаяния. Держа в руках шестифутовый золотой рычаг, он одного за другим избил до смерти своих братьев сзади. Затем настала очередь отца. Он сказал им, что коровы убежали, и забил отца до смерти перед полем, когда тот вышел из парадной двери. Он положил тело отца на телегу и отвёз его за дом, где перекопал землю, чтобы скрыть пятна крови. Затем он пошёл в свою комнату, чтобы покончить с младшими братьями и сёстрами. Мать ударили топором, и она упала на пол. Сестра выскочила из кровати, чтобы помочь матери, но её порезали ножом и добили топором. Наконец, он вбежал в комнату служанки и, угадывая в темноте, дважды ударил топором по её кровати. Служанка умерла без звука. Его судили и приговорили к смертной казни. Преступник покинул зал суда с поразительным хладнокровием»."
 pbi_publishing_industry_events.220.f.5: "«Джон Воти, житель Рид-стрит, был обвинён в пьянстве и насилии по отношению к своим родителям. Джон был проблемным 38-летним мужчиной — его отцу было 93, а матери обвинителя 88 — который неоднократно был пьян и жесток со своими родителями. Мать жалела сына и не могла решиться посадить его в тюрьму»."
 pbi_publishing_industry_events.220.f.6: "«Когда миссис Таунсенд попросила у мужа два шиллинга, потому что она покупала бренди, «чтобы вымыть детям головы», он не поверил ей и отклонил её просьбу. Он подумал, что если он купит бренди и т. д., она нальёт его себе в рот, прежде чем он попадёт на головы детей. Тут же супруги начали ссориться, и рассерженная жена выгнала мужа из дома. Когда муж вернулся домой ночью, он нашёл жену в не поддающемся описанию беспорядке. Когда он яростно обвинил её, миссис Таунсенд схватила каминные щипцы и ударила мужа по голове. Муж не остался в долгу и избил жену до полусмерти. Вердикт был таков, что виновны оба — и муж, и жена»."
 pbi_publishing_industry_events.220.f.7: "«Сьюзан Бёрк — миссис Бездомная — три месяца жила без крыши над головой. Мировой судья сказал, что ей пора обрести дом, и предоставил ей жильё на срок шесть месяцев»."
 pbi_publishing_industry_events.220.a: "Этот шум — наша сила."
 pbi_publishing_industry_events.220.b: "Нам нужно вновь обрести скромность."
 pbi_publishing_industry_events.225.t: "Астрономический прорыв"
 pbi_publishing_industry_events.225.d: "The Sun, грошовая газета из [SCOPE.sState('target_state').GetCustom('RU_SL_RP')], сообщает, что обсерватория на африканском мысе Доброй Надежды сделала удивительное открытие с помощью гигантского телескопа, работающего на совершенно новом принципе."
 pbi_publishing_industry_events.225.f: "«С помощью этого гигантского телескопа Джон Гершель смог ясно увидеть то, что существует на Луне. В результате он убедился, что на Луне существует жизнь, и смог определить законы вселенной, по которым она существует»."
 pbi_publishing_industry_events.225.a: "Мы были не одни!"
 pbi_publishing_industry_events.226.t: "Названный Человек-летучая мышь"
 pbi_publishing_industry_events.226.d: "Грошовая газета The Sun из [SCOPE.sState('target_state').GetCustom('RU_SL_RP')] опубликовала продолжение репортажа о лунных открытиях, и общественность была взбудоражена поразительными подробностями."
 pbi_publishing_industry_events.226.f: "«Внезапно я увидел больших крылатых существ, медленно спускающихся со скалы на равнину. Я ясно видел, что их крылья напоминали крылья летучих мышей. Крылья были сделаны из полупрозрачной мембраны, закруглённой и выступающей из их спин, поистине великолепное строение. Некоторые из них стояли лицом друг к другу и широко двигали руками, что явно указывало на то, что они общаются с помощью жестов. Астрономы назвали это неожиданное новое существо Vespertilio homo, или человек-летучая мышь. Существа были как мужского, так и женского пола, и мы продолжили детальные наблюдения за их повадками. Мы не сомневаемся, что это невинные и счастливые существа, но их способ развлечения слишком неумерен для земного этикета»."
 pbi_publishing_industry_events.226.a: "Если эта история правдива, это самое удивительное, что когда-либо было!"
 pbi_publishing_industry_events.227.t: "Правда или ложь, не имеет значения"
 pbi_publishing_industry_events.227.d: "Новость об открытии существа на Луне, опубликованная The Sun, грошовой газетой из [SCOPE.sState('target_state').GetCustom('RU_SL_RP')], теперь стала темой для разговоров по всем Соединённым Штатам, в том числе среди учёных и интеллектуалов."
 pbi_publishing_industry_events.227.f: "«Интеллектуалы и региональные читатели с небывалым энтузиазмом и доверием день за днём с нетерпением ждали почты из Нью-Йорка. Вы уже читали о великом открытии Джона Гершеля? Вы знаете, что на Луне обнаружили людей? Куда бы я ни пошёл, мне задавали один и тот же вопрос. Это была тема, которая в то время всех завораживала. Никто не думал и не говорил, правда это или нет».\n— Студент Йельского университета"
 pbi_publishing_industry_events.227.a: "Даже если это ложь, этот репортёр заслуживает похвалы."
 pbi_publishing_industry_events.230.t: "Няня Джорджа Вашингтона"
 pbi_publishing_industry_events.230.d: "Все газеты [SCOPE.sState('target_state').GetCustom('RU_SL_RP')] только и говорят о чернокожей женщине по имени Джойс Хесс, которая утверждает, что была няней Джорджа Вашингтона."
 pbi_publishing_industry_events.230.f: "«Этой старушке целых 161 год. В этом факте нет никаких сомнений. Даже если бы она сказала, что ей 500 лет, никто бы не усомнился. Более того, П. Т. Барнум, промоутер шоу, в качестве доказательства показал нам накладную, которую он получил от неё, когда она была рабыней. Она была датирована 1727 годом и гласила, что Джойс Хесс была куплена Огастином Вашингтоном, отцом Джорджа Вашингтона, когда ей было пятьдесят четыре года»."
 pbi_publishing_industry_events.230.a: "Мир полон сюрпризов!"
 pbi_publishing_industry_events.235.t: "Лох-Несское чудовище"
 pbi_publishing_industry_events.235.d: "Сообщается о наблюдении неопознанного существа в озере Лох-Несс в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')], [SCOPE.sState('target_state').GetOwner.GetAltNameNoFlag('RU_CL_PP')], и это стало главной новостью."
 pbi_publishing_industry_events.235.f: "«Житель Балнайна Д. Маккензи видел объект, похожий на бревно или перевёрнутую лодку, который взбивал воду, извиваясь, двигаясь сначала медленно, а затем постепенно ускоряясь и исчезая в воде»."
 pbi_publishing_industry_events.235.a: "Мир полон сюрпризов!"
 pbi_publishing_industry_events.236.t: "Странное зрелище в Лох-Нессе"
 pbi_publishing_industry_events.236.d: "Сообщается о наблюдении неопознанного существа в озере Лох-Несс в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')], [SCOPE.sState('target_state').GetOwner.GetAltNameNoFlag('RU_CL_PP')], и это стало главной новостью."
 pbi_publishing_industry_events.236.f: "«Александр Макдональд, каменотёс из Абриахана, в тот день видел, как из озера Лох-Несс примерно в 50 ярдах от берега появилось большое коренастое животное»."
 pbi_publishing_industry_events.236.a: "Мир полон сюрпризов!"
 pbi_publishing_industry_events.237.t: "Фотография хирурга"
 pbi_publishing_industry_events.237.d: "Фотографии неопознанного существа в озере Лох-Несс в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')], [SCOPE.sState('target_state').GetOwner.GetAltNameNoFlag('RU_CL_PP')], стали главной новостью."
 pbi_publishing_industry_events.237.f: "«Споры вокруг наблюдения неопознанного существа в Лох-Нессе велись давно, но эта фотография, сделанная Робертом Кеннетом Уилсоном, гинекологом из Лондона, ставит точку в спорах и предоставляет неопровержимое доказательство того, что Лох-Несское чудовище всё ещё живёт там»."
 pbi_publishing_industry_events.237.a: "Мир полон сюрпризов!"
 pbi_publishing_industry_events.240.t: "Феи из Коттингли"
 pbi_publishing_industry_events.240.d: "На фотографиях, сделанных в деревне Коттингли в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')], [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_PP')], изображена фея, играющая с маленькой девочкой."
 pbi_publishing_industry_events.240.f: "«В [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_PP')] была сделана замечательная фотография. На снимке, опубликованном через Теософское общество, отчётливо видна фея, играющая с маленькой девочкой. Общество попросило фотоэксперта проверить подлинность фотографии, и тот пришёл к выводу, что это не подделка. Романист Артур Конан Дойл заявил в спиритическом журнале, что фотография является ясным доказательством психических явлений»."
 pbi_publishing_industry_events.240.a: "Мир полон сюрпризов!"
 pbi_publishing_industry_events.245.t: "Умный Ганс"
 pbi_publishing_industry_events.245.d: "Лошадь, которая умеет решать математические задачи и производить календарные расчёты, стала притчей во языцех в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')], [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_PP')]."
 pbi_publishing_industry_events.245.f: "«Ганса спрашивают: „Если 8-е число — вторник, какая дата будет в следующую пятницу?“, на что он отвечает, 11 раз стукнув копытом. Немецкое министерство образования создало следственную комиссию из 13 человек, включая ветеринара, директора зоопарка и кавалерийского офицера, для изучения удивительной лошади. Комиссия пришла к выводу, что в выступлении Ганса не использовалось никаких трюков»."
 pbi_publishing_industry_events.245.a: "Мир полон сюрпризов!"
 pbi_publishing_industry_events.246.t: "Секрет мудрости"
 pbi_publishing_industry_events.246.d: "Психолог Оскар Фунгст разгадал секреты Ганса, умной лошади, которая стала главной темой для разговоров в [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_PP')]."
 pbi_publishing_industry_events.246.f: "«Когда спрашивающий не знал ответа, Ганс редко мог дать правильный ответ. Он также обнаружил общую закономерность: по мере того как количество ударов копытом Ганса приближалось к ответу, выражение лица и поза спрашивающего постепенно становились напряжёнными, а в момент правильного ответа напряжение спадало. Из этого Фунгст заключил, что Ганс использовал физические сигналы спрашивающего как подсказку для своего ответа».\nПоведение Ганса, реагирующего на ожидания наблюдателя, улавливая реакции окружающих, называется «эффектом умного Ганса», и даже сегодня эффект умного Ганса наблюдается при обнаружении запахов полицейскими собаками."
 pbi_publishing_industry_events.246.a: "Умный Ганс действительно был умным Гансом!"
 pbi_publishing_industry_events.250.t: "Свистящий мальчик"
 pbi_publishing_industry_events.250.d: "Читателей позабавила небольшая статья в газете [SCOPE.sState('target_state').GetCustom('RU_SL_RP')] о небылице."
 pbi_publishing_industry_events.250.f: "«Мальчик из Вермонта привык работать в одиночестве, и как только он видит, что никого нет рядом, он начинает свистеть. Он свистит с удивительно громким и тихим свистом, даже когда он совершенно без сознания и спит, так как его рот, грудь и лёгкие работают вместе по собственной воле. Его мать, обеспокоенная, бросилась принимать меры. Она попросила другого мальчика постоянно находиться рядом с ним и бить его, как только начнётся свист»."
 pbi_publishing_industry_events.250.a: "Мир полон сюрпризов!"
 pbi_publishing_industry_events.300.t: "Эффективность журналистики"
 pbi_publishing_industry_events.300.d: "В [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] все, от [Concept('concept_upper_strata', 'высших слоёв')] до [Concept('concept_lower_strata', 'низших слоёв')], читают газеты. Массы потребляют самые разные новости через газеты, от напряжённых инцидентов между странами далеко за рубежом до загадочного убийства местной проститутки."
 pbi_publishing_industry_events.300.f: "«С этой точки зрения, столь осмеиваемая газета внесла один практический вклад: она научила людей читать и привила им вкус к печатному слову. Она научила людей читать и дала им хобби — чтение печатного слова».\n— Эмиль Золя (Парижская газета)"
 pbi_publishing_industry_events.300.a: "Мы должны сосредоточиться на политической роли, которую играют газеты."
 pbi_publishing_industry_events.300.b: "Ценность газет как развлечения для народа велика."
 pbi_publishing_industry_events.305.t: "Революционный печатный станок"
 pbi_publishing_industry_events.305.d: "Новый печатный станок, который [SCOPE.sCharacter('target_character').GetFullName] из [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_RP')] представил на собрании #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig').GetCustom('RU_IG_RP')]#!#!, получил высокую оценку за превосходные характеристики."
 pbi_publishing_industry_events.305.f: "Ротационная машина, в которой вращаются цилиндрически изогнутые печатные формы и подаётся бумага для печати, может печатать более 8000 листов в час, что намного быстрее обычных печатных станков."
 pbi_publishing_industry_events.305.a: "Отличная идея."
 pbi_publishing_industry_events.305.b: "Нам не нужна их помощь."
 pbi_publishing_industry_events.310.t: "Планы по созданию газетной компании"
 pbi_publishing_industry_events.310.d.1: "[SCOPE.sCharacter('target_character').GetFullName] планирует основать первую газету в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')].\nЭто будет газета для #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig').GetCustom('RU_IG_RP')]#!#!."
 pbi_publishing_industry_events.310.d.2: "[SCOPE.sCharacter('target_character').GetFullName] из [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_RP')] планирует основать свою первую газету в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')].\nЭто повлияет на отношения с [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_TP')]."
 pbi_publishing_industry_events.310.f: "«Наш первоначальный мотив для зарождения идеи издания газеты в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')] был в первую очередь связан с коммерческими потребностями различных сообществ. То, что эта идея встретила широкое одобрение, наглядно продемонстрировал отклик на наше предложение».\n— The Advertiser"
 pbi_publishing_industry_events.310.a: "Отличная идея."
 pbi_publishing_industry_events.310.b: "Им не следует давать трибуну для выступлений."
 pbi_publishing_industry_events.315.t: "Спор в газете"
 pbi_publishing_industry_events.315.f: "«Как, я уверен, согласятся мудрые читатели этой газеты, в их утверждениях нет никакой конкретной основы, а лишь куча лжи и фальши для нападок на нас. Их газета в лучшем случае годится на то, чтобы в неё заворачивать рыбу!»"
 pbi_publishing_industry_events.315.c: "Газеты просто раздувают из мухи слона."
 pbi_publishing_industry_events.320.t: "Запрет на выпуск"
 pbi_publishing_industry_events.320.d: "Суд вынес запрет на публикацию газете «[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]» из [SCOPE.sState('target_state').GetCustom('RU_SL_RP')], которая неоднократно публиковала статьи с критикой правительства."
 pbi_publishing_industry_events.320.f: "У них нет никакой политической власти, но они используют газеты, чтобы злонамеренно критиковать правительство и нашептывать общественности дьявольские слова, которые приведут нацию к гибели."
 pbi_publishing_industry_events.320.a: "Справедливость восторжествовала."
 pbi_publishing_industry_events_320_tt.1: "Издательство [GetBuildingType('building_manzoni_publishing_industry').GetName] в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')] будет неактивно в течение 1 года."
 pbi_publishing_industry_events_320_tt.2: "Издательство [GetBuildingType('building_manzoni_publishing_industry').GetName] в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')] будет неактивно в течение 6 месяцев."
 pbi_publishing_industry_events.320.b: "Дисциплинарные меры должны быть минимальными."
 pbi_publishing_industry_events.325.t: "Забастовка газетчиков"
 pbi_publishing_industry_events.325.d: "Газетчики в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')] начали массовую забастовку, требуя лучшего обращения со стороны издателей газет."
 pbi_publishing_industry_events.325.f: "«Друзья и товарищи рабочие. Это время, которое испытывает сердца людей. Это время, когда мы должны держаться вместе, как клей... Мы знаем, чего хотим, и мы добьёмся этого, даже если мы слепы».\n— Луис «Малыш Блинк» Балетти"
 pbi_publishing_industry_events.325.a: "Это искажение должно быть исправлено."
 pbi_publishing_industry_events.325.b: "Это всего лишь забастовка, верно?"
 pbi_publishing_industry_events.330.t: "Убитые проститутки"
 pbi_publishing_industry_events.330.d: "Газеты [SCOPE.sState('target_state').GetCustom('RU_SL_RP')] сенсационно освещают убийство молодой проститутки, привлекая большое внимание.\nНекоторые газеты даже опубликовали фальшивые интервью с настоящим убийцей."
 pbi_publishing_industry_events.330.f: "«Тело 23-летней проститутки Хелен Джуэтт было найдено в борделе. Тело было сожжено дотла в постели, после того как её трижды ударили топором, а затем подожгли.\nПолиция арестовала Ричарда П. Робинсона, 19-летнего молодого человека, который был последним гостем жертвы, в качестве подозреваемого. Подозреваемый отрицает обвинения. Его суд назначен через два месяца»."
 pbi_publishing_industry_events.330.a: "Интересно."
 pbi_publishing_industry_events.331.t: "Предвзятый суд"
 pbi_publishing_industry_events.331.d: "Когда в суде [SCOPE.sState('target_state').GetCustom('RU_SL_RP')] начался процесс над Ричардом П. Робинсоном, арестованным за убийство Хелен Джуэтт, газеты разделились в жарких дебатах между теми, кто сочувствовал Джуэтт, происходившей из рабочего класса, и теми, кто говорил, что проститутки не заслуживают сочувствия, но суд быстро закончился."
 pbi_publishing_industry_events.331.f: "«Несмотря на то, что все представленные доказательства и показания указывали на виновность подсудимого, судья поручил присяжным проигнорировать показания, поскольку большинство свидетелей были проститутками. В результате подсудимый был оправдан менее чем за 30 минут!»"
 pbi_publishing_industry_events.331.a: "Как это можно назвать справедливым судом?"
 pbi_publishing_industry_events.331.b: "Разве жизнь многообещающего молодого человека равна жизни проститутки?"
 pbi_publishing_industry_events.335.t: "Массовое убийство"
 pbi_publishing_industry_events.335.d: "Виновники серии убийств в пригороде [SCOPE.sState('target_state').GetCustom('RU_SL_RP')] в [SCOPE.sState('target_state').GetOwner.GetAltNameNoFlag('RU_CL_PP')] были пойманы, и жестокие описания преступлений и их мотивов, которые раскрываются одно за другим, привлекают большое внимание."
 pbi_publishing_industry_events.335.f: "«Рабочий, работавший в поле в пригороде Парижа, выкопал из земли тела женщины и её пятерых детей. Женщина была заколота ножом более чем в 30 местах, а дети были убиты различными способами, в том числе им перерезали горло, задушили и вспороли животы. Виновником этого невероятно жестокого убийства оказался механик по имени Жан-Батист Тропманн. Он признался, что совершил убийство по просьбе мужа жертвы, который подозревал её в неверности. Муж, Жан-Кинк, пропал без вести, и полиция всё ещё его ищет»."
 pbi_publishing_industry_events.335.a: "Дело рук дьявола!"
 pbi_publishing_industry_events.336.t: "Публичная казнь"
 pbi_publishing_industry_events.336.d: "В пригороде [SCOPE.sState('target_state').GetCustom('RU_SL_RP')] в [SCOPE.sState('target_state').GetOwner.GetAltNameNoFlag('RU_CL_PP')] состоялась публичная казнь на гильотине за серию убийств, привлекшая большую толпу зевак."
 pbi_publishing_industry_events.336.f: "«Полиция нашла мужа жертвы, которого разыскивали как важного свидетеля, мёртвым. Тропманн признал, что его показания были ложью, и заявил, что преступление было совершено с самого начала с целью ограбления Жана Кинка»."
 pbi_publishing_industry_events.336.a: "Здесь нет места жалости."
 pbi_publishing_industry_events.340.t: "Телеграфный шнур повесил преступника!"
 pbi_publishing_industry_events.340.d: "В [SCOPE.sState('target_state').GetCustom('RU_SL_PP')], [SCOPE.sState('target_state').GetOwner.GetAltNameNoFlag('RU_CL_PP')], преступник, сбежавший на поезде, был успешно задержан на станции, куда он бежал, с помощью телеграфа, что стало горячей темой для обсуждения."
 pbi_publishing_industry_events.340.f: "«Со станции Слау на станцию Паддингтон. В этом районе в Солт-Хилл произошло убийство. Свидетели видели, как подозреваемый купил билет первого класса до Лондона и сел на поезд в 7:42 утра с этой станции. Подозреваемый одет в одежду квакера, коричневый плащ с подолом до пят, и находится во втором с конца купе второго вагона первого класса того же поезда»."
 pbi_publishing_industry_events.340.a: "Это триумф науки."
 pbi_publishing_industry_events.400.t: "Четвёртая власть"
 pbi_publishing_industry_events.400.d: "[SCOPE.sCharacter('target_leader').GetFullName] из #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig').GetCustom('RU_IG_RP')]#!#! забил тревогу в Конгрессе, назвав журналистику «четвёртой властью»."
 pbi_publishing_industry_events.400.f: "«В нашем обществе теперь есть четвёртая власть, более могущественная и влиятельная, чем все королевские особы, духовенство, дворянство и горожане вместе взятые. Это журналистика.\nЕё сила велика, но она может быть силой, способной разрушить нацию или привести её к процветанию. Нельзя переоценить, что государственная власть должна гарантировать свободу прессы журналистике, но только если они ведут себя должным образом!»"
 pbi_publishing_industry_events.400.a: "Они не могут их контролировать, возможно, даже самих себя!"
 pbi_publishing_industry_events.400.b: "Всё нуждается в гарантиях."
 pbi_publishing_industry_events_400_tt: "Следующие поправки ко всем отечественным [GetBuildingType('building_manzoni_publishing_industry').GetCustom('RU_BL_DP')]: "
 pbi_publishing_industry_events.405.t: "Арест издателя газеты"
 pbi_publishing_industry_events.405.d: "Местная полиция в [SCOPE.sState('target_state').GetCustom('RU_SL_PP')] арестовала издателя газеты «[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]». Им оказался [SCOPE.sCharacter('target_character').GetFullName], который неоднократно публиковал статьи с критикой правительства."
 pbi_publishing_industry_events.405.f: "«Суверенные избиратели!\nГоспода, вас обманули!\nПротивопоставьте вооружённой силе несгибаемую силу!\nЗакройте все заводы.\nЗакройте все компании.\nЗакройте фондовые биржи.\nЗакройте театры!\nУйдите в отставку все уважающие себя чиновники.\nВсе должны бастовать».\n— Эмиль де Жирарден, народный комиссар."
 pbi_publishing_industry_events.405.a: "Сделаем из них пример для подражания."
 pbi_publishing_industry_events.405.b: "[SCOPE.sCharacter('target_character').GetFullName] должен быть защищён законом."
 pbi_publishing_industry_events.405.c: "Пусть они немного остынут."
 pbi_publishing_industry_events.410.t: "Приказ о прекращении выпуска газеты"
 pbi_publishing_industry_events.410.d: "Суд вынес решение против газеты из [SCOPE.sState('target_state').GetCustom('RU_SL_RP')], которая неоднократно чрезмерно критиковала правительство, приостановив её выпуск."
 pbi_publishing_industry_events.410.f: "У них нет никакой политической власти, но они используют газеты, чтобы злонамеренно критиковать правительство и нашептывать общественности дьявольские слова, которые приведут нацию к гибели."
 pbi_publishing_industry_events.410.a: "Сделаем из них пример для подражания."
 pbi_publishing_industry_events.410.b: "Свобода прессы должна быть защищена."
 pbi_publishing_industry_events.410.c: "Всему есть предел."
 pbi_publishing_industry_events.415.t: "Порнографический роман"
 pbi_publishing_industry_events.415.d: "Суд постановил удалить из любовного романа, опубликованного издательством из [SCOPE.sState('target_state').GetCustom('RU_SL_RP')], откровенно сексуальные и непристойные отрывки, поскольку они были слишком откровенными и непристойными."
 pbi_publishing_industry_events.415.f: "«В конце концов, руки мужчины @censored!@censored!@censored!@censored! женщины @censored!@censored!@censored!@censored!, и порыв, как он @censored!@censored!, достиг своего апогея в @censored!@censored!@censored!@censored!@censored!@censored!@censored!@censored!. Женщина @censored!@censored!@censored!@censored! это @censored!@censored!@censored!@censored!, и @censored!@censored!@censored!@censored!@censored!@censored!@censored!@censored! было @censored!@censored!@censored!@censored!@censored!@censored!@censored!@censored!!»"
 pbi_publishing_industry_events.415.a: "Искусство будет только испорчено."
 pbi_publishing_industry_events.415.b: "Я не знаю, что это такое!"
 pbi_publishing_industry_events.420.t: "Разглашение государственных секретов"
 pbi_publishing_industry_events.420.d: "Информация, опубликованная в качестве сенсации газетой «[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]» из [SCOPE.sState('target_state').GetCustom('RU_SL_RP')], была известна только правительственным инсайдерам."
 pbi_publishing_industry_events.420.f: "«Французские газеты с большим удовольствием болтают о политических секретах, чтобы увеличить подписку».\n— Оноре де Бальзак (Физиология журналистики)"
 pbi_publishing_industry_events.420.a: "Немедленно уволить причастных!"
 pbi_publishing_industry_events.420.b: "Лучше этого не касаться."
 pbi_publishing_industry_events.425.t: "Призывы к правовой реформе"
 pbi_publishing_industry_events.425.d: "Ведущая газета [SCOPE.sState('target_state').GetCustom('RU_SL_RP')] поддерживает утверждение #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig').GetCustom('RU_IG_RP')]#!#! о том, что [SCOPE.sPoliticalMovement('target_movement').GetName]."
 pbi_publishing_industry_events.425.f: "«Нет никаких сомнений в том, что [SCOPE.sPoliticalMovement('target_movement').GetName], за которое мы, #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig').GetName]#!#!, выступаем уже много лет, — это то, что нужно для будущего этой страны»."
 pbi_publishing_industry_events.425.a: "Утверждения газеты используются для пропаганды определёнными группами."
 pbi_publishing_industry_events.425.b: "Давайте и здесь ответим с помощью газет."
 pbi_publishing_industry_events.425.c: "Это шанс продемонстрировать щедрость правительства."
 pbi_publishing_industry_events.430.t: "Газеты разжигают социальные волнения"
 pbi_publishing_industry_events.430.d.1: "Газета «[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]» из [SCOPE.sState('target_state').GetCustom('RU_SL_RP')] публикует лишь домыслы о вспышке эпидемии на #tooltippable_name #tooltip:[SCOPE.sBuilding('target_building').GetTooltipTag],DATA_BUILDING_NAME_TOOLTIP,BuildingTooltip [SCOPE.sBuilding('target_building').GetCustom('RU_BL_PP')]#!#! в [SCOPE.sState('target_state_2').GetCustom('RU_SL_PP')], необоснованно разжигая социальные волнения."
 pbi_publishing_industry_events.430.d.2: "Газета «[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]» из [SCOPE.sState('target_state').GetCustom('RU_SL_RP')] публикует лишь домыслы об аварии на #tooltippable_name #tooltip:[SCOPE.sBuilding('target_building').GetTooltipTag],DATA_BUILDING_NAME_TOOLTIP,BuildingTooltip [SCOPE.sBuilding('target_building').GetCustom('RU_BL_PP')]#!#! в [SCOPE.sState('target_state_2').GetCustom('RU_SL_PP')], необоснованно разжигая социальные волнения."
 pbi_publishing_industry_events.430.d.3: "Газета «[SCOPE.GetRootScope.GetCountry.GetCustom('pbi_newspaper_type')]» из [SCOPE.sState('target_state').GetCustom('RU_SL_RP')] публикует лишь домыслы о плохом урожае на #tooltippable_name #tooltip:[SCOPE.sBuilding('target_building').GetTooltipTag],DATA_BUILDING_NAME_TOOLTIP,BuildingTooltip [SCOPE.sBuilding('target_building').GetCustom('RU_BL_PP')]#!#! в [SCOPE.sState('target_state_2').GetCustom('RU_SL_PP')], необоснованно разжигая социальные волнения."
 pbi_publishing_industry_events.430.f.1: "«Наш корреспондент сообщает, что многие рабочие мертвы или больны из-за вспышки болезни, и плантация и соседние деревни теперь в руинах. Руководители компании, управляющей плантацией, также начали возвращаться в свои родные страны, и влияние на наш образ жизни будет неизбежным»."
 pbi_publishing_industry_events.430.f.2: "«Наш корреспондент сообщает, что произошла крупная авария из-за обвала породы, и шахта была закрыта. Нам также сообщили, что капиталисты, инвестировавшие в шахту, уже решили её закрыть, и влияние на наш образ жизни будет неизбежным»."
 pbi_publishing_industry_events.430.f.3: "«Наш корреспондент сообщает, что последствия засухи, которая продлится несколько месяцев, будут серьёзными и почти наверняка приведут к плохому урожаю. Влияние нехватки продовольствия на наш образ жизни будет неизбежным»."
 pbi_publishing_industry_events.430.a: "Мы не должны мириться с подобной ложью."
 pbi_publishing_industry_events.430.b: "Нам нужно принять меры."
 pbi_publishing_industry_events.315.d.1: "В [SCOPE.sState('target_state').GetCustom('RU_SL_PP')] газета, поддерживающая партию «[SCOPE.sParty('target_party_2').GetName]», раскритиковала утверждения газеты, поддерживающей партию «[SCOPE.sParty('target_party_1').GetName]», что привело к ежедневному обмену острой критикой между двумя изданиями."
 pbi_publishing_industry_events.315.d.2: "В [SCOPE.sState('target_state').GetCustom('RU_SL_PP')] газета, поддерживающая #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_2').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_2').GetCustom('RU_IG_VP')]#!#!, раскритиковала утверждения газеты, поддерживающей партию «[SCOPE.sParty('target_party_1').GetName]», что привело к ежедневному обмену острой критикой между двумя изданиями."
 pbi_publishing_industry_events.315.d.3: "В [SCOPE.sState('target_state').GetCustom('RU_SL_PP')] газета, поддерживающая #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_2').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_2').GetCustom('RU_IG_VP')]#!#!, раскритиковала утверждения газеты, поддерживающей #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_1').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_1').GetCustom('RU_IG_VP')]#!#!, что привело к ежедневному обмену острой критикой между двумя изданиями."
 pbi_publishing_industry_events.315.a: "Аргументы #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_1').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_1').GetCustom('RU_IG_RP')]#!#! более убедительны."
 pbi_publishing_industry_events.315.b: "У #tooltippable_name #tooltip:[SCOPE.gsInterestGroup('target_ig_2').GetTooltipTag],EMPTY_STRING,IGTooltip [SCOPE.gsInterestGroup('target_ig_2').GetCustom('RU_IG_RP')]#!#! аргументы лучше!"
