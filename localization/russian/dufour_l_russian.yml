 dufour.901.t: "Местные жители обеспокоены съёмкой"
 dufour.901.d: "Во время геодезических работ в [SCOPE.sState('dufour_mapping_scope').GetCustom('RU_SL_PP')] наши геодезисты вступили в конфликт с сельскими жителями региона. По-видимому, они помешали похоронам своей работой."
 dufour.901.f: "«Лучше уходите сейчас! Разве вы не слышали? Нам не нужна ваша карта, мы всегда сами находили дорогу домой!»"
 dufour.901.g: "Мои соболезнования."
 dufour.901.h: "Продолжайте!"
 dufour.902.t: "Геодезист погиб в горах"
 dufour.902.d: "Во время съёмки с одной из высоких гор [SCOPE.sState('dufour_mapping_scope').GetCustom('RU_SL_RP')] наших геодезистов застала гроза. Был шторм и ливень. Геодезисты укрылись в своей палатке, но удар молнии убил одного из них и ранил другого."
 dufour.902.f: "«Молния ударила мне в ногу, но через несколько дней стало лучше. Я наконец-то смог спуститься и добраться до безопасного места. Это было испытание!»"
 dufour.902.g: "Боже мой!"
 dufour.903.t: "Местные жители помогают геодезистам"
 dufour.903.d: "Наши геодезисты чуть не заблудились в [SCOPE.sState('dufour_mapping_scope').GetCustom('RU_SL_PP')], но несколько местных жителей смогли им помочь и даже предложили ночлег и информацию о самых быстрых путях. Это, безусловно, поможет быстрее закончить карту!"
 dufour.903.f: "«Вы можете поработать позже. Сначала мы должны выпить вместе. Это наш лучший кирш!»"
 dufour.903.g: "Мы ценим помощь!"
 dufour.904.t: "Оборудование утеряно!"
 dufour.904.d: "Один из наших геодезистов потерял своё оборудование во время восхождения на гору в [SCOPE.sState('dufour_mapping_scope').GetCustom('RU_SL_PP')]. Либо мы должны предоставить новое оборудование, либо прогресс замедлится."
 dufour.904.f: "«Оно просто упало... Я не смог его удержать... Кто бы мог подумать, что нужно было закреплять оборудование на рюкзаках?»"
 dufour.904.g: "Им придётся с этим смириться."
 dufour.904.h: "Достать новые инструменты!"
 dufour.905.t: "Блюмлисальп или Фрау"
 dufour.905.d: "У местных жителей в [SCOPE.sState('dufour_mapping_scope').GetCustom('RU_SL_PP')] есть два названия для одной и той же горы: Блюмлисальп и Фрау. Какое название нам выбрать?"
 dufour.905.f: "«Может, просто подбросим монетку?»"
 dufour.905.g: "Блюмлисальп!"
 dufour.905.h: "Фрау!"
 dufour.906.t: "Геодезист ускоряет работу над картой"
 dufour.906.d: "[SCOPE.sCharacter('surveyor_scope').GetFullName], известный геодезист, оказал поддержку в создании топографической карты и прогресс сделал огромный скачок."
 dufour.906.f: "«Да, этот инструмент для измерений, а не для разглядывания звёзд»."
 dufour.906.g: "Отличная работа!"
 dufour.907.t: "Математик помогает с расчётами"
 dufour.907.d: "[SCOPE.sCharacter('mathematician_scope').GetFullName], имеющий математическое образование, смог[SelectLocalization(SCOPE.sCharacter('mathematician_scope').IsFemale, 'ла', '')] помочь нашей команде решить различные расчёты. Это поможет быстрее закончить карту."
 dufour.907.f: "«Кто бы мог подумать, что математика на самом деле полезна!»"
 dufour.907.g: "Хорошо, что у нас есть математики!"
 dufour.908.t: "Полёт на воздушном шаре вдохновляет художников"
 dufour.908.d: "[SCOPE.sCharacter('balloonist_scope').GetFullName], известный воздухоплаватель, помог нескольким художникам и геодезистам увидеть мир с высоты. Художники были вдохновлены захватывающим видом и получили более реалистичное представление о том, как изобразить нашу страну на карте."
 dufour.908.f: "«О боже! Надеюсь, мы не разобьёмся!»"
 dufour.908.g: "Вид на мир с высоты впечатляет!"
 dufour.910.t: "Опубликованы первые листы: Юра и Базель"
 dufour.910.d: "Опубликованы первые несколько листов нашей новой топографической карты, они посвящены области вокруг Базеля и Юры."
 dufour.910.f: "Юра — это гряда невысоких гор, которая простирается от Савойи до Базеля, а некоторые предгорья доходят даже до Боденского озера. Она охватывает части кантонов Во, Невшатель, Берн, обоих Базелей, Золотурн и Ааргау. Многие крупные города расположены недалеко от Юры.\nБазель, например, один из важнейших городов Швейцарии. Базель граничит как с Эльзасом, так и с Баденом и имеет хорошее сообщение благодаря реке Рейн.\nВсего несколько лет назад кантон Базель был разделён на кантоны Базель-Штадт (город) и Базель-Ланд (сельская местность). Интересно, что в то время сельская местность была более либеральной, в то время как городом правили патриции. Базель — довольно интернациональный город со старым университетом, в котором работали такие великие мыслители, как Леонард Эйлер и Даниил Бернулли.\nЖенева, с другой стороны, — большой город, окружённый Францией. Во время правления Наполеона она была частью Франции и вернулась в Швейцарию в 1815 году. Сейчас основываются первые частные банки, и Женева постепенно становится центром финансового сектора. Кроме того, это был дом Вольтера и Жан-Жака Руссо, двух величайших философов Швейцарии."
 dufour.910.g: "Интересно!"
 dufour.910.h: "Я не хочу ничего слышать о Швейцарии!"
 dufour.910.no_more_information_tt: "Вы #n больше не будете#! получать события, которые только описывают Швейцарию без каких-либо эффектов."
 dufour.911.t: "Опубликованы новые листы: Шаффхаузен, Тургау и Санкт-Галлен"
 dufour.911.d: "Опубликовано больше листов. На этот раз основное внимание уделено северной и восточной Швейцарии с кантонами Шаффхаузен, Тургау и Санкт-Галлен."
 dufour.911.f: "Шаффхаузен расположен на северо-востоке Швейцарии и в основном окружён Германией. Сам город находится прямо на Рейне и очень близко к Рейнскому водопаду в Нойхаузене. Благодаря энергии реки Шаффхаузен смог довольно рано индустриализироваться, а благодаря сельскому населению в 1831 году стал либеральным кантоном.\nТургау управлялся другим кантоном, который менялся каждый год, пока Французская революция не распространилась на Швейцарию. С 1815 года это полноценный кантон и центр текстильной промышленности и сельского хозяйства. Большое количество грушевых деревьев привело к названию «Мостиндия», что означает «Сидровая Индия» — игра слов Ost (восток) и Most (сидр). Тургау с 1831 года является одним из либеральных кантонов и выступает за большую централизацию в Швейцарии.\nСанкт-Галлен — разделённый по религиозному признаку кантон, когда-то бывший резиденцией монастыря и княжества-епископства. Это центр текстильной промышленности и либеральный кантон. Кантон Санкт-Галлен окружает оба кантона Аппенцелль и примечательный горный массив Сентис, часть Альп."
 dufour.912.t: "Опубликованы новые листы: Граубюнден и Ретийские Альпы"
 dufour.912.d: "Опубликовано больше листов. На этот раз основное внимание уделено огромному кантону Граубюнден и Ретийским Альпам."
 dufour.912.f: "Граубюнден — не только самый большой кантон Швейцарии, но и родина ретороманскоговорящего населения, меньшинства в Швейцарии и одной из групп альпийских романских языков, также встречающихся в Южном Тироле и Фриули.\nГраубюнден малонаселён, так как в нём преобладают Альпы. В частности, Ретийские Альпы, названные в честь древних племён ретов. Граубюнден — в основном аграрный кантон, который также получает прибыль от перевозки товаров через альпийские перевалы. Потеря некоторых ныне итальянских земель после Наполеоновских войн стала катастрофой, но в Граубюндене всё ещё есть районы с преобладанием италоговорящего населения, что делает его кантоном с тремя языковыми группами: немецкой, ретороманской и итальянской.\nПолитически Граубюнден находится под властью своих муниципалитетов, которые имеют большую власть. Но в последнее время либеральные силы, желающие большей централизации кантона, набирают силу."
 dufour.913.t: "Опубликованы новые листы: Центральная Швейцария"
 dufour.913.d: "Опубликовано больше листов. На этот раз основное внимание уделено многочисленным кантонам Центральной Швейцарии."
 dufour.913.f: "Центральная Швейцария — родина «Eidgenossenschaft», Швейцарской Конфедерации. Сначала кантоны Ури, Швиц и Унтервальден (сегодня разделённые на Нидвальден и Обвальден) образовали свободный союз, который позже всё больше расширялся.\nОсновная часть экономики многих небольших кантонов центральной Швейцарии — это перевозка товаров, в основном по готардскому маршруту. Кроме того, в регионе были важны сельское хозяйство, лесозаготовки и некоторое текстильное производство.\nПолитически в центральной Швейцарии доминировали консервативные католики. В то время как кантон Люцерн был самым либеральным из кантонов центральной Швейцарии благодаря городу Люцерн, меньшие кантоны Ури, Швиц, Об- и Нидвальден, Гларус и Цуг были ещё более консервативными и находились под властью местных высших классов.\nШвиц чуть не разделился на два кантона в 1830-х годах, когда внешние части кантона потребовали равенства и политического участия. После того как внутренний Швиц был оккупирован войсками Тагзатцунга («правительства» Швейцарии), внутренний Швиц в итоге согласился с этими пунктами, и Швиц остался одним кантоном."
 dufour.914.t: "Опубликованы новые листы: Тичино"
 dufour.914.d: "Опубликовано больше листов. На этот раз основное внимание уделено самому южному кантону Швейцарии, Тичино."
 dufour.914.f: "Тичино — единственное оставшееся владение Швейцарской Конфедерации в Италии. Будучи завоёванной в XV и XVI веках, эта область находилась под властью старых кантонов до основания Гельветической республики. Однако с 1803 года это полноценный кантон.\nДоминирующими отраслями экономики в Тичино были сельское хозяйство и лесозаготовки. Производство шёлка также было прибыльным бизнесом. В Тичино можно было выращивать сельскохозяйственные продукты, которые не росли в других частях Швейцарии: например, каштаны, табак, шёлк и различные фрукты.\nВ 1830 году Тичино стал одним из первых кантонов, получивших либеральную конституцию. Однако политическая ситуация в кантоне нестабильна, так как либералы хотят централизовать государство, в то время как консерваторы предпочитают региональную автономию."
 dufour.915.t: "Опубликованы новые листы: Берн и Фрибур"
 dufour.915.d: "Опубликовано больше листов. На этот раз основное внимание уделено Берну и Фрибуру."
 dufour.915.f: "И в кантоне Берн, и в кантоне Фрибур есть франко- и немецкоязычные части. В то время как Берн — огромный кантон, Фрибур намного меньше. Берн простирается от горного хребта Юра до Альп на юге. Фрибур расположен к западу от Берна и включает такие города, как Фрибур и Грюйер, откуда родом известный сыр.\nВ кантоне Берн в основном доминирует сельское хозяйство, но часовое дело медленно распространилось из соседнего Невшателя в Бернскую Юру. Надеемся, что индустриализация скоро поможет развитию кантона.\nПолитически Берн долгое время находился под властью патрициев самого города, но в 1830-х годах либералы из небольших городов кантона смогли разработать новую конституцию, которая уравновесила права жителей Берна и сельского населения.\nФрибур — кантон, в котором доминирует сельское хозяйство, особенно производство зерна и сыра. Сыр из Грюйера особенно известен.\nПолитически Фрибур находился под властью консервативных патрициев и духовенства. Даже когда в 1831 году была издана новая конституция, кантон оставался консервативным, и на выборах консерваторы по-прежнему получали большинство голосов."
 dufour.916.t: "Опубликованы новые листы: Цюрих и Ааргау"
 dufour.916.d: "Опубликовано больше листов. На этот раз основное внимание уделено Цюриху и Ааргау."
 dufour.916.f: "И Цюрих, и Ааргау расположены на севере Швейцарии, в основном на относительно плоской равнине Миттелланд (центральная земля). Оба кантона быстро индустриализируются и могут вскоре стать промышленными центрами.\nЦюрих — один из старых кантонов и долгое время находился под властью самого города. Цюрих является центром механизированной текстильной промышленности, а также машиностроения. Многие фабрики расположены на реках и получают от них энергию.\nПолитически Цюрих находился под властью патрициев города до 1830/31 года, когда жители сельской местности заставили принять новую конституцию. На следующих выборах либералы и радикалы получили большинство и теперь доминируют в политике Цюриха.\nАаргау управлялся другими кантонами до времён Гельветической республики. Теперь, когда это полноценный кантон, Ааргау быстро индустриализируется, особенно за счёт текстильных фабрик. Множество рек Ааргау позволяло фабрикам получать энергию от воды и привело к появлению множества децентрализованных фабрик.\nАаргау был в основном противовесом кантонам Цюрих и Берн и чуть не стал полноценным кантоном в 1814/15 году. Даже после 1815 года Ааргау оставался довольно либеральным, в отличие от других кантонов. В 1831 году новая конституция дала населению ещё больше прав. Правительство отреагировало на сопротивление католического населения усилению контроля государства над церковью, оккупировав мятежные регионы."
 dufour.917.t: "Опубликованы новые листы: Во и Вале"
 dufour.917.d: "Опубликовано больше листов. На этот раз основное внимание уделено Во и Вале."
 dufour.917.f: "Вале — это большая долина на самом юге Швейцарии, в основном отделённая от остальной части страны Альпами. Река Рона протекает через долину, а затем впадает в Женевское озеро. Северное побережье озера является частью кантона Во, но кантон простирается от Женевы и Альп до Юры.\nВ Во по-прежнему доминирует сельское хозяйство, но с 1826 года либералы начали проводить изменения для развития промышленности. Время покажет, останется ли Во аграрным кантоном или станет центром промышленности.\nБлагодаря дипломатическому искусству кантон Во был подтверждён после поражения Наполеона. Взамен, однако, кантон должен был принять более консервативную конституцию. Благодаря авторитарному руководству либералы набрали силу и смогли в 1830 году провести новую конституцию. Тем временем радикалы набирали силу и пытались способствовать демократизации.\nВ Вале доминирует сельское хозяйство и его сельское население. Значительной промышленности нет, а внешние связи ограничены.\nОсновной политический конфликт в Вале был между немецкоязычным верхним Вале и франкоязычным нижним Вале. Верхний Вале был доминирующей частью кантона, хотя в нижнем Вале было больше населения. Вопрос в том, смогут ли либералы и радикалы нижней долины способствовать демократизации Вале или старые силы смогут стабилизировать своё правление."
 dufour.920.t: "Раздаются голоса за возвращение козерога в Швейцарию"
 dufour.920.d: "Роберт Мадер, владелец отеля «Вальхалла» в Санкт-Галлене, хочет вернуть альпийского козерога в Швейцарию. Он предлагает построить в Санкт-Галлене зоопарк, где он подготовит вольер для разведения козерогов, чтобы позже выпустить их на волю."
 dufour.920.f: "«Козерог — национальный символ Швейцарии. Мы должны его вернуть!»"
 dufour.920.g: "Мы вернём козерога!"
 dufour.920.h: "Какая пустая трата времени!"
 company_VonRoll: "Ludwig von Roll'sche Eisenwerke"
 dufour_company_escher_wyss: "Escher Wyss & Cie"
 dufour_company_slm: "Schweizerische Lokomotiv- und Maschinenfabrik"
 company_Maggi: "J. Maggi & Cie"
 ethnicity_mr_swiss_alpine: "Швейцарские альпийцы"
 ethnicity_mr_swiss_alpine_short_beards: "Швейцарские альпийцы с короткими бородами"
 ethnicity_mr_swiss_alpine_long_beards: "Швейцарские альпийцы с длинными бородами"
 ethnicity_mr_ticinese: "Тичинцы"
 ethnicity_mr_ticinese_short_beards: "Тичинцы с короткими бородами"
 ethnicity_mr_ticinese_long_beards: "Тичинцы с длинными бородами"
 dufour.2100.t: "Мартин Дистели — карикатурист"
 dufour.2100.d: "[SCOPE.sCharacter('character_1_scope').GetFullName], художник и карикатурист из Ольтена, очень интересуется либеральным делом. Его политические карикатуры могут стать большим подспорьем для либералов, так что, может быть, он принесёт нам больше пользы в качестве агитатора?"
 dufour.2100.f: "«Хотите ещё одну карикатуру на злых католических священников? О, я уверен, что хотите!»"
 dufour.2100.g: "Либеральному делу нужны хорошие карикатуры!"
 dufour.2100.h: "Он художник!"
 dufour_language_rhaeto_romance: "Ретороманский"
 je_dufour_carte_dufour_lobby: "Guillaume Henri Dufour was tasked with the creation of a topographic map of Switzerland."