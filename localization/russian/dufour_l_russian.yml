 je_dufour_carte_dufour: "Топографическая карта Швейцарии"
 je_dufour_carte_dufour_reason: "С 1822 года геодезическая съёмка является делом Швейцарской Конфедерации, а не кантонов. Генералу Дюфуру было поручено провести съёмку Швейцарии по единым стандартам и зафиксировать результаты на карте. Это займёт много времени и будет стоить немалых денег, но поможет дальнейшему развитию Швейцарии."
 je_dufour_carte_dufour_goal: "Съёмки завершены, и карта опубликована."
 dufour_creating_carte_dufour_modifier: "Создание карты Дюфура"
 dufour.900.t: "Публикация карты Дюфура"
 dufour.900.d: "После многих лет упорной работы топографическая карта Швейцарии наконец-то завершена, и все 25 листов либо опубликованы, либо будут опубликованы в ближайшее время."
 dufour.900.f: "Наконец-то вы можете увидеть первый оттиск карты Дюфура. Тонкие линии показывают горы, города, даже дома. Никогда прежде не существовало такой точной карты Швейцарии!\n\n#b Историческая справка: #! Дюфур и его команда работали над картой с 1832 по 1865 год. Первые два листа были опубликованы в 1845 году, а последний из 25 листов — в 1865 году. Топографическая карта была напечатана методом гравюры и имела масштаб 1:100 000. Интересно, что Дюфур был первым генералом современной Швейцарии и возглавлял швейцарскую армию против Зондербунда в швейцарской гражданской войне (Sonderbundskrieg) в 1848 году.\n\n#b Сегодня #! карта Дюфура находится в Швейцарском национальном музее в Цюрихе. Но вы можете найти карту в Интернете, так как она была опубликована вместе со многими другими национальными картами Швейцарии."
 dufour.900.g: "Мы должны назвать гору в честь Дюфура!"
 dufour_carte_dufour_modifier: "Карта Дюфура"
