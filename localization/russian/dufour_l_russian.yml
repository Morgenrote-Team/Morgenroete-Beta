l_russian:
 dufour_celebrate_schwingfest_decision: "Провести первый Eidgenössisches Schwing- und Älplerfest"
 dufour_celebrate_schwingfest_decision_desc: "Швинген стал своего рода национальным видом спорта Швейцарии. Давайте сделаем его настоящим национальным видом спорта, отпраздновав Schwing- und Älplerfest!"
 dufour_schwingfest_modifier: "Eidgenössisches Schwing- und Älplerfest"
 dufour_schwingerkonig: "Schwingerkönig"
 dufour_schwingerkonig_desc: "Этот персонаж выиграл Eidgenössisches Schwingfest в Швейцарии. Массы видят в нём чемпиона."
 dufour.1000.t: "Два Аппенцелля не вводят избирательное право для женщин"
 dufour.1000.d: "В Швейцарии введено избирательное право для женщин. К сожалению, некоторые кантоны действуют несколько медленно. В кантонах Аппенцелль-Иннерроден и Аппенцелль-Ауссерроден женщинам разрешено участвовать в федеральных голосованиях и выборах, но не в голосованиях и выборах муниципалитетов и кантона. Для этого сначала потребуется внести поправку в кантональную конституцию, и она должна быть одобрена на Ландсгемайнде. Этот процесс может занять несколько лет. Должны ли мы вмешаться и заставить народ Аппенцелля ввести избирательное право для женщин или подождать и надеяться, что они введут его сами?"
 dufour.1000.f: "«Наверняка наши мужчины всё делают правильно!»\n\n#b Историческая справка:#! введение избирательного права для женщин в Швейцарии заняло очень много времени. Оно было введено для швейцарских голосований и выборов только в 1971 году. В некоторых кантонах это заняло ещё больше времени. Дольше всего это заняло в двух Аппенцеллях. Аппенцелль-Ауссерроден принял избирательное право для женщин в 1989 году на Ландсгемайнде. Аппенцелль-Иннерроден, с другой стороны, был вынужден ввести избирательное право для женщин в 1990 году по решению Федерального суда.\nТаким образом, Швейцария является одной из стран, которые ввели избирательное право для женщин последними. К странам, которые ввели избирательное право для женщин раньше, относятся Афганистан, Финляндия, США и многие другие."
 dufour.1000.g: "Заставить их разрешить женщинам голосовать."
 dufour.1000.h: "Наверняка они скоро решат предоставить женщинам право голоса."
 dufour_womens_suffrage_appenzell_effects_tt:0 "Вы не заставляете два кантона вводить избирательное право для женщин. Вы получите событие, если в этом вопросе будет прогресс или если потребуется ваше решение."
 dufour.1001.t: "Поражение в голосовании по избирательному праву для женщин в обоих Аппенцеллях"
 dufour.1001.d: "Правительства Аппенцелль-Ауссерродена и Аппенцелль-Иннерродена предложили законопроект о введении избирательного права для женщин на кантональном уровне. Законопроект был отклонён. Это означает, что женщины Аппенцелля по-прежнему не могут голосовать. Мы могли бы заставить два Аппенцелля предоставить женщинам их право, но это, безусловно, настроило бы местное население против нас."
 dufour.1001.f: "«Поднимите руку, если вы хотите ввести избирательное право для женщин на кантональном уровне!» В воздух поднялось много рук. Но было ли их достаточно? «Вы отклонили введение избирательного права для женщин на кантональном уровне!»\n\n#b Историческая справка:#! введение избирательного права для женщин в Швейцарии заняло очень много времени. Оно было введено для швейцарских голосований и выборов только в 1971 году. В некоторых кантонах это заняло ещё больше времени. Дольше всего это заняло в двух Аппенцеллях. Аппенцелль-Ауссерроден принял избирательное право для женщин в 1989 году на Ландсгемайнде. Аппенцелль-Иннерроден, с другой стороны, был вынужден ввести избирательное право для женщин в 1990 году по решению Федерального суда.\nТаким образом, Швейцария является одной из стран, которые ввели избирательное право для женщин последними. К странам, которые ввели избирательное право для женщин раньше, относятся Афганистан, Финляндия, США и многие другие."
 dufour.1001.g: "С меня хватит! Просто заставьте их ввести избирательное право для женщин!"
 dufour.1001.h: "Давайте просто подождём ещё немного."
 dufour.1002.t: "Оба Аппенцелля вводят избирательное право для женщин"
 dufour.1002.d: "Кто бы мог подумать? Оба Аппенцелля ввели избирательное право для женщин поднятием рук на своих региональных собраниях. Это означает, что теперь женщины могут голосовать везде в Швейцарии."
 dufour.1002.f: "«Поднимите руку, если вы хотите ввести избирательное право для женщин на кантональном уровне!» В воздух поднялось много рук. Но было ли их достаточно? «Вы одобрили введение избирательного права для женщин на кантональном уровне!» Раздались аплодисменты!\n\n#b Историческая справка:#! введение избирательного права для женщин в Швейцарии заняло очень много времени. Оно было введено для швейцарских голосований и выборов только в 1971 году. В некоторых кантонах это заняло ещё больше времени. Дольше всего это заняло в двух Аппенцеллях. Аппенцелль-Ауссерроден принял избирательное право для женщин в 1989 году на Ландсгемайнде. Аппенцелль-Иннерроден, с другой стороны, был вынужден ввести избирательное право для женщин в 1990 году по решению Федерального суда.\nТаким образом, Швейцария является одной из стран, которые ввели избирательное право для женщин последними. К странам, которые ввели избирательное право для женщин раньше, относятся Афганистан, Финляндия, США и многие другие."
 dufour.1002.g: "Это заняло у них больше времени, чем я думал!"
 dufour.1003.t: "Очередная неудача с введением избирательного права для женщин в двух Аппенцеллях"
 dufour.1003.d: "Это была уже вторая попытка некоторых прогрессивных аппенцелльцев ввести избирательное право для женщин. Но и эта попытка оказалась безуспешной. Мы всё ещё можем принудительно ввести его или подождать ещё дольше и надеяться, что народ Аппенцелля введёт избирательное право для женщин добровольно."
 dufour.1003.f: "«Поднимите руку, если вы хотите ввести избирательное право для женщин на кантональном уровне!» В воздух поднялось много рук. Но было ли их достаточно? «Вы отклонили введение избирательного права для женщин на кантональном уровне!»\n\n#b Историческая справка:#! введение избирательного права для женщин в Швейцарии заняло очень много времени. Оно было введено для швейцарских голосований и выборов только в 1971 году. В некоторых кантонах это заняло ещё больше времени. Дольше всего это заняло в двух Аппенцеллях. Аппенцелль-Ауссерроден принял избирательное право для женщин в 1989 году на Ландсгемайнде. Аппенцелль-Иннерроден, с другой стороны, был вынужден ввести избирательное право для женщин в 1990 году по решению Федерального суда.\nТаким образом, Швейцария является одной из стран, которые ввели избирательное право для женщин последними. К странам, которые ввели избирательное право для женщин раньше, относятся Афганистан, Финляндия, США и многие другие."
 dufour.1003.g: "Чёртовы деревенщины. У них был свой шанс, теперь мы их заставим!"
 dufour.1003.h: "Мы не можем просто подрывать демократический процесс."
 dufour.1004.t: "Федеральный суд заставляет Аппенцелль-Иннерроден ввести избирательное право для женщин"
 dufour.1004.d: "После того как Аппенцелль-Ауссерроден принял избирательное право для женщин на своей последней Ландсгемайнде, Федеральный суд вынес решение по делу Аппенцелль-Иннерродена. Аппенцелль-Иннерроден должен ввести избирательное право для женщин. Таким образом, вопрос решён раз и навсегда."
 dufour.1004.f: "«Федеральный суд считает, что Аппенцелль нарушает конституцию Швейцарской Конфедерации. Женщины имеют те же права, что и мужчины. Аппенцелль-Иннерроден обязан немедленно ввести избирательное право для женщин!»\n\n#b Историческая справка:#! введение избирательного права для женщин в Швейцарии заняло очень много времени. Оно было введено для швейцарских голосований и выборов только в 1971 году. В некоторых кантонах это заняло ещё больше времени. Дольше всего это заняло в двух Аппенцеллях. Аппенцелль-Ауссерроден принял избирательное право для женщин в 1989 году на Ландсгемайнде. Аппенцелль-Иннерроден, с другой стороны, был вынужден ввести избирательное право для женщин в 1990 году по решению Федерального суда.\nТаким образом, Швейцария является одной из стран, которые ввели избирательное право для женщин последними. К странам, которые ввели избирательное право для женщин раньше, относятся Афганистан, Финляндия, США и многие другие."
 dufour.1004.g: "Наконец-то!"
 dufour.2000.t: "Первый Eidgenössisches Schwing- und Älplerfest в Биле"
 dufour.2000.d: "Многие швингеры приняли участие в первом Eidgenössisches Schwing- und Älplerfest. Мероприятие состоялось в городе Биль и было спланировано швейцарскими клубами швингена после того, как этот вид спорта стал всё более популярным. После огромного успеха участники и организаторы с нетерпением ждут следующего события через три года. И многие швингеры жаждут выиграть соревнование и главный приз — сильного быка."
 dufour.2000.f: "Два огромных тела борются друг с другом, ни один не хочет упасть. Оба противника падают под аплодисменты зрителей. Альфред Никлаус сверху. Он — первый Schwingerkönig! Но сначала он помогает своему противнику встать и очищает его спину от опилок.\n\n#b Историческая справка: #! Швинген — вид борьбы с очень строгими правилами — был популярным видом спорта в Швейцарии, хотя его происхождение точно не прослеживается. Но первый местный Schwingfest состоялся на Уншпунненматте в Интерлакене. Первый Eidgenössisches Schwing- und Älplerfest состоялся в 1895 году в Биле, а затем регулярно каждые два-три года. На Schwing- und Älplerfest также представлены два других национальных вида спорта Швейцарии — хорнуссен (командный вид спорта, в котором бьют по шайбе под названием «хорнусс») и штайнштоссен (вид толкания камня).\n\nThe Eidgenössisches Schwing- und Älplerfest отмечается и по сей день. Последнее мероприятие состоялось в Праттельне недалеко от Базеля в 2022 году, а следующее пройдёт в Моллисе в 2025 году. Победитель награждается быком, Schwingerkönig 2022 года — Йоэль Вики — выиграл быка по кличке «Магнус» красной голштинской породы."
 dufour.2000.g: "Не могу дождаться следующего события!"
 dufour.2001.t: "[SCOPE.sCharacter('dufour_schwingerkonig_scope').GetFirstName] [SCOPE.sCharacter('dufour_schwingerkonig_scope').GetLastName] выиграл[SelectLocalization(SCOPE.sCharacter('dufour_schwingerkonig_scope').IsFemale, 'а', '')] Eidgenössisches Schwingfest!"
 dufour.2001.d: "После ожесточённой борьбы [SCOPE.sCharacter('dufour_schwingerkonig_scope').GetFirstName] [SCOPE.sCharacter('dufour_schwingerkonig_scope').GetLastName] стал[SelectLocalization(SCOPE.sCharacter('dufour_schwingerkonig_scope').IsFemale, 'а', '')] победителем Eidgenössisches Schwingfest этого года."
 swiss_flavor_events.21.f1: "Два огромных тела борются друг с другом, ни один не хочет упасть. Оба противника падают под аплодисменты зрителей. Один человек сверху, он выиграл этот «ганг». Он помогает своему противнику встать и очищает спину другого от опилок."
 swiss_flavor_events.21.f2: "\n\nИнтересно, что в швингене имена швингеров меняются местами и начинаются с фамилии. Если бы Авраам Линкольн был швингером, его бы звали Линкольн Авраам."
 swiss_flavor_events.21.f3: "\n\nЕсли у противника столько же очков, сколько у Schwingerkönig, он получает титул «Erstgekrönter», что означает «первый коронованный»."
 swiss_flavor_events.21.f4: "\n\nЛучшие 15 процентов на Eidgenössisches награждаются венком. Их обычно называют «Eidgenossen»."
 swiss_flavor_events.21.f5: "\n\nДругие участники также получают призы. Их помещают в храм подарков. Каждый подарок был пожертвован кем-то или какой-то организацией."
 swiss_flavor_events.21.f6: "\n\nТри разных швингера становились Schwingerkönig по три раза. Ханс Штуки побеждал в 1900, 1902 и 1905 годах. Рудольф Хунспергер — в 1966, 1969 и 1974 годах. Йорг Абдерхальден — в 1998, 2004 и 2007 годах."
 swiss_flavor_events.21.f7: "\n\nВ Швейцарии есть и другие Schwingfeste. Два самых важных — это «Unspunnen-Schwinget» недалеко от Интерлакена и «Kilchberger Schwinget» в кантоне Цюрих. Если швингер выигрывает эти два и Eidgenössisches, это называется «Schwinger-Grand-Slam»."
 swiss_flavor_events.21.f8: "\n\nВ швингене очки начисляются не только за победу. Если у двух противников ничья, но они провели привлекательный бой, они получают на 0,25 очка больше, чем если бы это был скучный бой. Даже если вы проиграете, но будете сражаться храбро и хорошо, вы получите на 0,75 очка больше."
 swiss_flavor_events.21.f9: "\n\nSchwingfeste с высоким престижем — это «Bergschwingfeste», которые проходят в горах. Это народные гулянья, на которых также звучит традиционная музыка. Самые известные Bergschwingfeste — это «Stoos-Schwinget», «Rigi Schwing- und Älplerfest», «Brünigschwinget», «Schwarzsee-Schwinget», «Weissenstein-Schwinget» и «Schwägalp-Schwinget»."
 dufour.2001.g: "Поздравляем!"
