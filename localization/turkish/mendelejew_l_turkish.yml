 mendelejew_synthetic_rubber_tech: "Sentetik Kauçuk"
 mendelejew_synthetic_rubber_tech_desc: "Sentetik kauçuk yapay bir elastomerdir. Petrol türevlerinden sentezlenen polimerlerdir. Sentetik kauçuk, doğal kauçuğa göre iki önemli açıdan üstündür: ısıl dayanıklılık ve yağlar ile ilgili bileşiklere karşı direnç."
 building_mendelejew_synthetic_rubber_factory: "Sentetik Kauçuk Fabrikası"
 pmg_mendelejew_isoprene: "İzopren"
 pm_mendelejew_isoprene: "İzopren"
 je_mendelejew_synthetic_rubber_reason: "1860 civarında Charles Hanson Greville Williams, doğal kauçuktan izopreni damıtarak C5H8 molekül formülünü belirledi. Bu, Gustave Bouchardat’ın 1879’da kauçuktan elde edilen izopreni hidroklorik asitle ısıtarak birkaç ay süren bir süreç sonunda kauçuğa benzer bir madde elde etmesini ve ilk kez sentetik kauçuk üretmesini sağladı. 1900 civarında Ivan Kondakov, 2,3-dimetilbutadien’den ilk tamamen sentetik kauçuğu üretti. Sentetik kauçuk üretimi için ilk patent 1909’da Fritz Hofmann’a verildi. Bu süreçte 'metil kauçuk', 2,3-dimetilbutadien’den polimerize edildi."
 je_mendelejew_synthetic_rubber_goal: "#E Kimyager İlerlemesi#! #ORANGE 75#! puana ulaşır."
 mendelejew.702.t: "Laboratuvarda Kauçuk"
 mendelejew.702.d: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetFullName], kimya tarihine geçecek tarihi bir başarı elde etti. Yıllar süren deneyler ve yeni bir laboratuvarın inşasından sonra başkimyagerimiz sentetik kauçuk üretmeyi başardı. Bu, tüm kimya endüstrisini devrim niteliğinde etkileyecek."
 mendelejew.702.f: "Her iki dünya savaşında da Almanya kauçuk kaynaklarına erişimini kaybetti ve alternatiflerin araştırılması teşvik edildi. Birinci Dünya Savaşı sırasında, 1915 ile 1918 arasında Bayer Leverkusen’de Fritz Hofmann süreci kullanılarak yaklaşık 2.500 ton metil kauçuk üretildi. İlk ticari olarak kullanılabilir sentetik kauçuk, 1926’da Alman kimyagerler Walter Bock ve Eduard Tschunkur tarafından I.G.-Farbenindustrie Leverkusen tesisinde geliştirilen ve 15 Ocak 1927’de patenti alınan stiren-bütadien kauçuk (SBR) oldu."
 mendelejew.702.g: "Artık lateks alerjisi yok!"
