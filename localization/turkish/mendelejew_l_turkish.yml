 je_mendelejew_synthetic_oil: "Kömür Sıvılaştırma Araştırması"
 je_mendelejew_synthetic_oil_reason: "Kömür sıvılaştırma, aynı zamanda kömür hidrojenasyonu olarak da bilinir ve bugün ağırlıklı olarak kömürden-sıvıya (CtL) dönüşüm olarak adlandırılır. Bu, linyit veya taş kömürünü benzin, dizel, kerosen gibi sıvı temel kimyasallara ve sentetik yakıtlara dönüştürmeye yarayan bir karbokimyasal süreçtir. 1910 ile 1925 arasında Friedrich Bergius, daha sonra Matthias Pier tarafından değiştirilen yüksek basınçlı bir süreç geliştirdi: kömür sıvılaştırmasının ilk büyük ölçekli süreci. Bu, iki aşamada gerçekleştirilen doğrudan bir hidrojenasyondur. 1925’te Kaiser Wilhelm Kömür Araştırma Enstitüsü direktörü Franz Fischer ve meslektaşı Hans Tropsch, heterojen kataliz alanında en önemli reaksiyonlardan birini keşfettiler. Bilimsel, ekonomik ve sosyal önemi bugün hâlâ görünür durumdadır."
 je_mendelejew_synthetic_oil_goal: "#E Kimyager İlerlemesi#! #ORANGE 100#! puana ulaşıyor."
 mendelejew.701.t: "Kömürden Petrole"
 mendelejew.701.d: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetFullName], kimya tarihine geçecek tarihi bir başarıya ulaştı. Yıllar süren deneyler ve yeni bir laboratuvarın inşasının ardından başkimyagerimiz sentetik yakıt üretmeyi başardı. Bu, tüm kimya endüstrisini devrim niteliğinde değiştirecek."
 mendelejew.701.f: "Benzin üretiminde eşdeğer ikamelerin sistematik araştırması Birinci Dünya Savaşı’ndan sonra Almanya’da başladı. Bir yandan, Weimar Cumhuriyeti hükümetleri ekonomik durum nedeniyle sürekli olarak petrol ithalatını sorguluyor ve giderek kendi kendine yeterli kaynaklar arıyordu. Öte yandan, ABD’li bilim insanları, dünyada ciddiye alınan bir çalışmada, küresel petrol rezervlerinin kısa sürede tükeneceğini öngörürken motorlaşma durmaksızın artıyordu. Bu bağlamda, devlet desteğiyle araştırmacılar ve şirketler Almanya’nın bolca sahip olduğu enerji kaynağına yoğun bir şekilde yöneldi: kömür. Kömürden benzen elde edilebileceği 19. yüzyılın başlarında -petrol benzininden çok önce- zaten biliniyordu. Alman kimyager Friedrich Bergius, 1913’te karbon hidrojenasyonu için ilk patenti aldı ve Carl Bosch ile birlikte Nobel Ödülü’ne layık görüldü."
 mendelejew.701.g: "Bu, artık kendi kendine yeterli bir petrol kaynağımız olduğu anlamına geliyor."
 mendelejew_chemist_periodic_table_inventor: "Periyodik Tablo’nun Mucidi"
 mendelejew_chemist_periodic_table_inventordesc: "Periyodik tabloyu ortaya koyan bu karakter, elementler üzerine teori üretmede özellikle iyidir."
 mendelejew.801.t: "Elementlerin Periyodik Tablosu"
 mendelejew.801.d: "[GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetFullName], bilinen kimyasal elementleri düzenlemeyi ve hatta eksik olanları tahmin etmeyi başardı. Daha önce de öngörüldüğü gibi, elementlerin özellikleri öngörülebilir bir sistemde periyodik olarak tekrarlanıyordu – bu yüzden Dr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName] ona 'Elementlerin Periyodik Tablosu' adını verdi."
 mendelejew.801.f: "Modern periyodik tablo Lothar Meyer ve Dmitri İvanoviç Mendeleyev tarafından geliştirildi. İkisi de 1869’da sonuçlarını yayımladı ve çalışmalarından dolayı 1882’de Britanya Kraliyet Cemiyeti’nden Davy Madalyası’nı ortaklaşa aldılar. Bugünkü periyodik tablonun kurucusu olarak Mendeleyev’in Meyer’den daha sık anılmasının nedeni, bir yandan Meyer’in periyodik tablosunu birkaç ay daha geç yayımlaması, diğer yandan ise Mendeleyev’in henüz keşfedilmemiş elementlerin özelliklerini öngörmesidir. Rusya’da periyodik tablo hâlâ Tabliza Mendeleyeva (Mendeleyev’in tablosu) olarak anılır. Ne Mendeleyev ne de Meyer birbirlerinin periyodik tablo üzerine çalışmalarından haberdardı. Mendeleyev ayrıca 1862’de Béguyer de Chancourtois’nin, 1863/64’te Newlands’ın veya 1866/67’de Hinrichs’in çalışmalarından da habersizdi."
 mendelejew.801.g: "Kimya artık gerçek bir bilim dalı."
 je_mendelejew_periodic_table: "Elementlerin Düzeni"
 je_mendelejew_periodic_table_reason: "19. yüzyılın başında, elementler arasındaki ilişkilerde düzenlilikler aranıyordu. Engeller arasında atom kütlelerindeki belirsizlikler ve birçok elementin henüz bilinmiyor olması vardı. Döbereiner, atom kütlesi ile tek tek elementlerin kimyasal özellikleri arasında bağlantı kuran ilk kişiydi. 1824’te Falckner doğal element ailelerinden oluşan bir sistem yayımladı. Ancak büyük atılım henüz gerçekleşmemişti."
