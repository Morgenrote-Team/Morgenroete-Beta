 je_noble_gases: "Havadaki Bilinmeyen Elementler"
 je_noble_gases_reason: "Henry Cavendish, 1783'te havanın tepkimeye girmeyen bir gaz içerdiğine dair ilk işareti buldu. Havadaki azot ve oksijenin, sürtünme elektriğinin yardımıyla tamamen azot oksitlerine dönüştüğü şekilde hava ve oksijeni karıştırdı. Bu işlemden geriye tepkimeye girmeyen bir kalıntı kaldı. Ancak, keşfinin değerini fark etmedi ve deneylerini durdurmadı. Bu, modern yöntemlerle araştırılması gereken daha önce bilinmeyen elementlerin kanıtı olabilir."
