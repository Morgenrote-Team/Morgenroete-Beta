 mendelejew_lauded_congress_modifier: "Kimya Kongresinde Övüldü"
 mendelejew_stop_chemistry_project_button: "Kimya Projesini Durdur"
 mendelejew_stop_chemistry_project_button_desc: "Mevcut Kimya Projeni durdur. Kimya İlerlemen kaybolacak."
 mendelejew_stop_chemist_improving_project_tt: "You decided to stop the project by clicking the #italic Stop Chemistry Project#! button or you do not have a [concept_mendelejew_chemist]."
 mendelejew_conference_chemist_double_vote_tt: "Deneyimli kimyagerimiz sayesinde #G iki kat#! oy gücüne sahibiz."
 mendelejew_conference_chemist_triple_vote_tt: "Ünlü kimyagerimiz sayesinde #G üç kat#! oy gücüne sahibiz."
 je_mendelejew_improve_fertilizer_project: "Gübreyi Geliştir"
 je_mendelejew_improve_explosives_project: "Patlayıcıları Geliştir"
 je_mendelejew_improve_synthetics_project: "Sentetikleri Geliştir"
 mendelejew_synthetic_fuel_tech: "Sentetik Yakıt"
 mendelejew_synthetic_fuel_tech_desc: "Bergius-Pier süreci, kömürün doğrudan hidrojenasyon yoluyla sıvılaştırılması için büyük ölçekli bir yöntemdir. Kömürün makromolekülleri yüksek basınç ve sıcaklıklarda hidrojen ile daha küçük moleküllere ayrılır. Ürün olarak gaz ve sıvı hidrokarbonlar elde edilir ve bunlar yakıt ve yağlayıcı olarak kullanılır. 1910 ile 1925 yılları arasında Alman kimyager Friedrich Bergius sürecin temellerini geliştirdi. Ticari süreç ve katalizör geliştirmeleri ise 1925’ten itibaren BASF tarafından, Matthias Pier’in proje yönetiminde yürütüldü."
 mendelejew.501.t: "İnsanlığın Hizmetinde"
 mendelejew.501.d: "[SCOPE.sCharacter('mendelejew_chemist_scope').GetFullName] has initiated a revolution in the country's fertilizer factories. New chemical processes and methods have significantly improved production and efficiency. There is already talk that Dr. [SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName] has made a significant contribution to combating world hunger.\n\nTotal improved buildings: [GetPlayer.MakeScope.Var('mr_num_improved_chemical_plants_buildings_var').GetValue|V0]"
 mendelejew.501.f: "'Çiftçiler yeni süper gübrelerimizle bizi alt edecekler! İnsanlık için gerçekten büyük bir adım, profesörün olağanüstü bir başarısı! Çok zeki bir insan. Bir servet kazanmam gerçeği ise sadece bir yan etki, makalene dahil etmesen olur. Ama son golf turnuvasındaki zaferimi anmadan geçme lütfen.'"
 mendelejew.501.g: "Herkese daha fazla nitrat!"
 mendelejew.502.t: "Madenciliğin Hizmetinde"
 mendelejew.502.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] has initiated a new phase of mining in our country by patenting new processes in the production of explosives. With the new formula that Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] has developed, production has become more efficient and fewer materials are required.\n\nTotal improved buildings: [GetPlayer.MakeScope.Var('mr_num_improved_explosives_factory_buildings_var').GetValue|V0]"
 mendelejew.502.f: "'Elbette bu patlayıcılar madencileri daha güvenli yapmayacak. Ama başarılılarsa, şimdi daha da başarılılar. Yeni dinamitimizin - Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] tarafından icat edildi - patlayıcı gücünden emin oldum ve artık madencilerin hiç olmadığı kadar az çalışması gerektiğini keşfettim. Temelde bana ödeme yapmalılar çünkü yapacakları tek şey biraz moloz süpürmek.'"
 mendelejew.502.g: "Herkese daha fazla nitrogliserin!"
 mendelejew.503.t: "Ulusal Egemenliğin Hizmetinde"
 mendelejew.503.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] has initiated a significant change in the production of synthetic products. With the refinement of some formulas and improved processes, even more products can now be produced with less effort. [GetPlayer.GetName] has become more independent than ever from abroad and Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] is already considered a national hero.\n\nTotal improved buildings: [GetPlayer.MakeScope.Var('mr_num_improved_synthetics_factory_buildings_var').GetValue|V0]"
 mendelejew.503.f: "'Özünde, yeni sentetik ürünlerimizi satın almak vatansever bir görevdir. Onlar [ROOT.GetCountry.GetAdjectiveNoFlag] bilim insanı Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] tarafından icat edildi, [ROOT.GetCountry.GetAdjectiveNoFlag] işçileri tarafından [ROOT.GetCountry.GetAdjectiveNoFlag] fabrikalarında - az çok - [ROOT.GetCountry.GetAdjectiveNoFlag] kaynaklarından üretildi. Ve umarım iyi bir vatansever vatandaş olmak istersiniz? O halde daha yüksek fiyat size değerli görünmeli, sonuçta mesele vatan.'"
 mendelejew.503.g: "Herkese daha fazla sentetik ürün!"
 mendelejew.601.t: "Kimyagerler Kongresi"
 mendelejew.601.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]’de kimyagerlerin en önemli uluslararası toplantısının hazırlıkları neredeyse tamamlandı. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName], etkinliğin en önemli uzmanları çekmesine özellikle özen gösterdi. Artık geriye sadece davetiyeler kaldı."
 mendelejew.601.f: "Kimya, 19. yüzyılın ortalarında bilimsel bir disiplin olarak kuruldu ancak hâlâ önemli bir teorik açığı vardı. Farklı “okullar” farklı görüşleri temsil ediyordu, özellikle atomik ve moleküler yapıya ilişkin sorularda. John Dalton’a göre, bunlar kimyasal bileşiklerin en küçük yapı taşları olarak kabul ediliyordu, ancak yapıları hakkında neredeyse hiçbir şey bilinmiyordu. Atom ağırlıklarının temel boyutu gibi diğer teorik sorularda da farklı görüşler mevcuttu. Adlandırma ve formül yazımı da son derece tutarsızdı. Ancak mevcut sorunların tartışılabileceği bir forum hâlâ yoktu. Bu nedenle üç genç kimya profesörü, meslektaşlarıyla tartışmalarda tartışmalı soruları netleştirmek için bir kongre düzenleme girişiminde bulundu ve konunun en önemli temsilcilerini 3-5 Eylül 1860 tarihleri arasında Karlsruhe’ye davet etti."
 mendelejew.601.g: "Konuklarımız yemeğin tuzu biberi olacak."
 mendelejew.602.d: "[SCOPE.sCountry('mendelejew_congress_host_country').GetName], uluslararası bir Kimyagerler Kongresi’ne davet etti. Görünüşe göre insanlar atomların uluslararası bir ağırlığının belirlenmesini tartışmak istiyor. Dr. [SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName] sıcak bir davetiye aldı."
 mendelejew.602.g: "Hızlı tepki vermeliyiz!"
 mendelejew.604.t: "Bir Atomun Ağırlığı"
 mendelejew.604.d: "Konferans umut verici başlamış olsa da, atomların ağırlığını uluslararası olarak nihayet belirleme çabası kısa sürede tıkandı. Milliyetçi düşüncedeki bazı kimyagerler önceki sistemlerinden vazgeçmek istemedi."
 mendelejew.604.f: "1860 Karlsruhe Kongresi’nde birkaç konuda anlaşma sağlanamadı. En önemli konulardan biri atom ve molekül ağırlıklarıydı. Önceki kimyagerlerin bulgularına dayanarak, atomların ayrı parçacıklar olduğu ve moleküllerin bunlardan oluştuğu kabul edilmişti, ancak birkaç farklı atom ağırlığı sistemi yan yana kullanılıyordu. Bunlardan biri, hidrojenin 1 temel birim olarak alındığı, karbonun 6, oksijenin ise 8 değerine sahip olduğu sistemdi. Atom ağırlıklarıyla ilgili belirsizlikler sürdüğü sürece, incelenen bileşiklerin element bileşimi şüpheliydi. Beş farklı tartım seçeneği vardı ve karmaşık dönüşümler nedeniyle bazı kimyagerler hiçbir şeyi değiştirmemeyi tercih ediyordu."
 mendelejew.604.g: "Bu kadar anlaşmazlık varken eski sistemden vazgeçmek için bir sebep yok."
 mendelejew.604.h: "Ortak, uluslararası bir atom ağırlığına ihtiyacımız var."
 mendelejew.605.t: "Kimyager Sohbetleri"
 mendelejew.605.d: "Bilim konferansının oturum aralarında Dr. [SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName], dünyanın dört bir yanından birçok meslektaşıyla fikir alışverişinde bulunma fırsatı yakaladı. Geriye, bu eşsiz fırsatı en iyi nasıl değerlendireceği sorusu kaldı."
 mendelejew.605.f: "'Gerçekten de, yasaların kavranmasında bir hipotezin yardımcı olma gerekliliğinde şaşırtıcı hiçbir şey yoktur. Yeni bir bilim öğrenen kişinin zihni, çoğu zaman bilimin kendi tarihsel evriminde geçtiği bütün aşamalardan geçmek zorundadır.' -Stanislao Canizzaro"
 mendelejew.605.g: "Kimyagerimiz geleceğe dair yeni içgörüler toplamalı."
 mendelejew.605.h: "Kimyagerimiz, araştırmasındaki mevcut sorunlara çözüm aramalı."
 mendelejew.605.i: "Kimyagerimiz asistanlarını önden göndermeli ki bir şeyler öğrenebilsinler."
 mendelejew.609.t_national: "Kimya Kongresi Sonuçsuz Bitti"
 mendelejew.609.d_national: "Üç gün boyunca, organizatörler ve kimya alanındaki önde gelen uzmanlar etkinliği kurtarmaya çalıştı, ancak nihayetinde atom ağırlığının nasıl raporlanacağına dair evrensel bir kural bulunamadı. Ulus devletler bir süre daha geleneksel sistemlere bağlı kalacak, bu da dönüşüm tablolarını zorunlu kılıyor."
 mendelejew.609.f_national: "Karlsruhe Kongresi, bir bilim dalının ilk uzmanlık kongresiydi. Kesin sonuçlar çıkmamış olsa da, 19. yüzyılda kimya tarihindeki en önemli olay olarak kabul edilebilir. Yurtiçinden ve yurtdışından bu kadar çok kimyagerin bir araya gelmesi, teorik kimyanın gelişimi üzerinde katalizör etkisi yaptı."
 mendelejew.609.g: "Bu bizi yıllarca geri götürecek."
 mendelejew.609.t_international: "Kimya Kongresi Anlaşmayla Sona Erdi"
 mendelejew.609.d_international: "Neyse ki, bilim kongresindeki kimyagerler atom ağırlığı için ortak bir çözüm buldu. Artık bu uluslararası olarak tanınıyor. Bilim insanları, Amedeo Avogadro’nun bir teoremine atıfta bulunuyor. Dr. [SCOPE.sCharacter('mendelejew_chemist_scope').GetLastName], bugün bir mektupta bu başarıyı sevinçle duyurdu."
 mendelejew.609.f_international: "Karlsruhe Kongresi’nin önemli uzun vadeli sonucu, bugün tanıdık olan atom ağırlıklarının benimsenmesiydi. Karlsruhe toplantısını takiben hidrojen için yaklaşık 1, karbon için 12, oksijen için 16 ve benzeri değerler kabul edildi. Bu, hidrojen, azot ve oksijen gibi bazı elementlerin tek atomlardan değil, iki atomlu moleküllerden oluştuğunun fark edilmesine dayanıyordu."
 mendelejew.609.h: "Kimya için büyük bir atılım!"
 mendelejew.201.d: "Zorlu saatler ve yığınla malzeme arasından süzülmek gerekmiş olsa da, Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] artık emin: son araştırmalar doğruysa, nihayet uzun süredir aranan #YELLOW [ROOT.Var('mendelejew_searched_variable').GetValue|0]#! numaralı elementi keşfetti. Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], elementi #YELLOW [SCOPE.GetRootScope.GetCountry.GetCustom('mendelejew_element_name')]#! olarak adlandırmaya karar verdi."
 mendelejew.301.d: "Artık hiçbir şüphe yok: #YELLOW [ROOT.Var('mendelejew_examined_variable').GetValue|0]#! numaralı element sadece var olmakla kalmıyor, modern kimyasal yöntemlerle izole de edilebiliyor. Bu, ülkemiz için gerçekten büyük bir gün!"
 je_mendelejew_element_isolation_reason: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName], yeni bir elementi izole etmek için yorulmadan çalışıyor. Deneyimler, beceriler ve karakter özellikleri, ayrıca gözlemevindeki laboratuvarın donanımı, bu sürecin ne kadar süreceğini önemli ölçüde etkiliyor. Araştırma, #YELLOW [ROOT.Var('mendelejew_examined_variable').GetValue|0]#! numaralı element üzerinde."
