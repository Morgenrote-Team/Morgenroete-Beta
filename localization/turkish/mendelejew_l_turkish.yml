 je_mendelejew_element_discovery: "Bir Element Arayışı"
 je_mendelejew_element_discovery_reason: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName] yeni bir element keşfetmek için yorulmadan çalışıyor. Tecrübeler, beceriler ve karakter özellikleri ile gözlemevindeki laboratuvarın donanımı, bu sürecin süresini büyük ölçüde etkiler. Araştırma #YELLOW Element Numarası [ROOT.Var('mendelejew_searched_variable').GetValue|0]#! üzerinedir."
 je_element_discovery_failed_tt: "Başka bir ulus, Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]ten önce elementi keşfediyor."
 je_mendelejew_element_isolation: "Bir Element İncelemesi"
 je_element_isolation_failed_tt: "Başka bir ulus, Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]ten önce elementi izole ediyor."
 mendelejew.101.t: "Yeni Bir Element Teorisi"
 mendelejew.101.d: "Kapsamlı çalışmalar ve araştırmalardan sonra, Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] hâlâ bilinmeyen bir element olması gerektiğini öne sürdü. Kimyager bu varsayımsal elemente #YELLOW Element Numarası [ROOT.Var('mendelejew_thought_variable').GetValue|0]#! adını verdi. Ancak, hâlâ keşfedilmeyi bekliyor."
 mendelejew.101.f: "Kimyasal element terimi 17. yüzyılda ortaya çıktı; o dönemde simyadaki element kavramının maddelerin çeşitli özelliklerini ve birbirleriyle olan tepkimelerini bilimsel olarak açıklamak için yetersiz olduğu giderek daha fazla fark ediliyordu. Robert Boyle, 1661’de 'Şüpheci Kimyager' adlı eserinde simyanın yetersizliklerini sert biçimde eleştirdi. Burada, kimyasal elementlerin 'başka maddelerden veya birbirlerinden türememiş, fakat karışık maddeleri oluşturan temel bileşenler' olarak anlaşılması gerektiğini açıkladı."
 mendelejew.101.g: "Ama hey, bu sadece bir teori. Bir kimyagerin teorisi!"
 mendelejew.102.t: "Kayıp bir Element mi?"
 mendelejew.102.d: "Son araştırmalarında Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], mevcut bilgiye göre hâlâ bilinmeyen başka elementler olması gerektiğini belirledi. Bunların tam olarak nasıl belirleneceği henüz bilinmiyor, ancak yakında bir hipotez formüle edilmeli."
 mendelejew.102.f: "'Elementler' (stoicheia) terimi ilk kez MÖ 360 civarında Yunan filozofu Platon tarafından Timaeus diyaloğunda kullanıldı. Bu diyalog, inorganik ve organik yapıların bileşiminden söz eden ve kimya üzerine spekülatif bir inceleme niteliği taşır. Platon, bir yüzyıl önce Empedokles’in öne sürdüğü elementlerin küçük çokyüzlü şekillerden oluştuğuna inanıyordu: tetrahedron (ateş), oktahedron (hava), ikosahedron (su) ve küp (toprak)."
 mendelejew.102.g: "Var olduğunu bilmediğin bir şey nasıl eksik olabilir?"
 mendelejew.103.t: "Yabancı Bir Ulus Yeni Element Üzerine Teori Ortaya Koyuyor"
 mendelejew.103.d: "Başkimyagerimizin üzüntüsüne, [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetSheHe] bugün yabancı bir dergide #YELLOW Element Numarası [ROOT.Var('mendelejew_thought_variable').GetValue|0]#! üzerine bir hipotez yayınlanacağını öğrendi. Bu, Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]’in teorileştirmek istediği elementti. Tüm araştırmalar durduruldu."
 mendelejew.103.f: "'Şans, hazırlıklı zihinleri sever.' -Louis Pasteur"
 mendelejew.103.g: "Saygısızlık! Bizim yayınımız fiilen baskıya girmişti!"
 mendelejew.111.t: "Kaybolan Bir Profesör mü?"
 mendelejew.111.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName], yalnızca mükemmel bir araştırmacı değil aynı zamanda yetenekli bir öğretmen olarak da görülüyor. Ancak element araştırmalarıyla ilgili mevcut yükümlülükler, ders programında sorunlara yol açıyor. Seminerler ve derslerin ihmal edildiğine dair şikâyetler çoktan başladı."
 mendelejew.111.f: "Alman kimya profesörü Justus von Liebig, modern öğretim yöntemleri sayesinde öğrencileri arasında özellikle popülerdi. Onun keşifleri ve yazıları kısa sürede ona dünya çapında ün kazandırdı; bunun sonucunda birçok Alman’ın yanı sıra 84 İngiliz ve 18 Amerikalı da dahil olmak üzere çok sayıda yabancı Giessen’e gelip Liebig’in kimya ve eczacılık derslerini dinledi."
 mendelejew.111.g: "Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] araştırmaya odaklanmalı."
 mendelejew.111.h: "Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] derslere odaklanmalı."
 mendelejew.111.i: "Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] bir denge bulmalı."
 mendelejew.112.t: "Bir Rüya"
 mendelejew.112.d: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName], gece gördüğü ilham verici bir rüyanın, daha önce çözemediği teorik bir kimya sorununu çözmesine yol açtığını anlatıyor."
 mendelejew.112.f: "'Kitabım üzerinde çalışıyordum ama ilerleme kaydedemiyordum; düşüncelerim başka yerdeydi. Sandalyemi ateşe çevirdim ve dalıp gittim. Yine atomlar gözlerimin önünde dans ediyordu. Bu kez küçük gruplar geri planda kalmıştı. Bu türden tekrar tekrar gördüğüm vizyonlar zihinsel gözümü keskinleştirmişti; artık çok çeşitli şekillerdeki daha büyük yapıları seçebiliyordum; uzun sıralar bazen birbirine daha sıkı oturmuş, yılanvari bir hareketle kıvrılıp bükülüyordu. Ama bakın! Bu da neydi? Yılanlardan biri kendi kuyruğunu yakalamıştı ve şekil gözlerimin önünde alaycı bir şekilde dönüyordu. Şimşek çakmış gibi uyandım; ve bu sefer de gecenin geri kalanını hipotezin sonuçlarını çalışarak geçirdim. Hayal kurmayı öğrenelim beyler, belki gerçeği öğreniriz… ama hayallerimizi, uyanık aklın doğrulamasından geçmeden yayımlamaktan sakınalım.' -August Kekulé"
 mendelejew.112.g: "Yani Doktor uykusunda bile mi çalışıyor diyorsun?"
 mendelejew.113.t: "Kimya Üzerine İnceleme"
 mendelejew.113.d: "Bilinmeyen bir elemente dair teorinin yanında yan çalışma olarak bir kimya incelemesi oluşturuldu. Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] bunu şimdilik yalnızca kişisel kullanım için tasarlamıştı, ancak bir asistan bu çalışmanın tamamlanması ve yalnızca taslak olarak kalmaktansa yayımlanması gerektiğinde ısrar ediyor."
 mendelejew.113.f: "Yalnızca kimyada değil, hemen her akademik disiplinde, aslında aranan sonuç elde edilmese de yol boyunca çok daha ilginç keşifler yapılabilir. Bunlar aceleyle yazıya dökülerek kayıt altına alınır. Çoğu zaman amaç kısa süreliğine gözden kaybolur ama onun yerine daha çığır açıcı bir şeye yönelinir."
 mendelejew.113.g: "Bu sadece kişisel bir araştırma için."
 mendelejew.113.h: "Bu çalışma derslerde öğretilmeli."
 mendelejew.113.i: "Bu yayın bilimsel değere sahip — kamuya açık olmalı!"
 mendelejew.114.t: "Hayal Kurma"
 mendelejew.114.d: "Kimyagerimiz Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], araştırmasını başarıyla tamamlayabilmek için özellikle ilham verici bir uyku olmak üzere özel dinlenme ve inziva imkânlarına ihtiyaç duyduğunu belirtti. Ancak o zamandan beri pek bir şey olmadı."
 mendelejew.114.f: "'Eğer tüm hipotezler doğruysa ve bu kimyasal formül geçerliyse, o zaman burada... ah, bir sincap!'"
 mendelejew.114.g: "Kimyager bütün bu zaman boyunca sadece yan gelip mi yatmış?!"
 mendelejew.115.t: "Bir Astronomi-Kimya İşbirliği"
 mendelejew.115.d: "Gökbilimci Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] ile yapılan fikir alışverişi, kimyagerimiz Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]’e yeni bir element üzerine teorileşmesinde çığır açıcı ilhamlar verdi."
 mendelejew.115.f: "Spektroskopinin keşfinden önce de ama özellikle sonrasında, kimya ve astronomi birbirlerini etkilemeye devam etti. Spektroskopi başlangıçta William Hyde Wollaston’un deneyleriyle, güneş ışınlarının tayf çizgilerini göstermek için ilk spektrometreyi inşa etmesi sayesinde astronomik bir teknik olarak kullanıldı. Bu tayf çizgileri daha sonra Josef von Fraunhofer tarafından karakterize edildi. Sonrasında Gustav Robert Kirchhoff ve Robert Bunsen, her kimyasal elementin belirli sayıda ve düzende tayf çizgisine sahip olduğunu keşfetti. Buradan, Wollaston ve Fraunhofer’in gözlemlediği çizgilerin, güneşin üst katmanlarındaki elementlerin soğurma özelliklerinden kaynaklandığını ve dolayısıyla bu elementlerin fotosferde de bulunması gerektiğini çıkardılar."
 mendelejew.115.g: "Akademik bir sentez!"
 mendelejew.201.t: "Yeni Bir Elementin Keşfi"
 mendelejew.201.f: "'Henüz bilinmeyen birçok elementin keşfini beklemeliyiz; örneğin, atom ağırlığı 65 ile 75 arasında olan, alüminyum ve silikona benzer elementler.' -Dmitri Mendeleyev"
 mendelejew.201.g: "Peki tadı nasıl acaba?"
 mendelejew.202.d: "Başkimyagerimiz [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName], öne sürülen #YELLOW Element Numarası [ROOT.Var('mendelejew_searched_variable').GetValue|0]#!’in gerçekten var olduğuna kesinlikle inanıyor ve onu bulmaya karar verdi."
 mendelejew.202.f: "Bugünkü anlamda elementlerden yalnızca on tanesi, saf hâlde antik çağda biliniyordu. Bunlar ya doğada kendiliğinden bulunuyor ya da cevherden eritilebiliyordu: karbon, kükürt, demir, bakır, çinko, gümüş, kalay, altın, cıva ve kurşun. Orta Çağ madencilik tarihinde özellikle Erzgebirge’de (Cevher Dağları) cevherlerde bilinmeyen metallerin küçük karışımları keşfedildi ve dağ ruhlarının adları verildi (kobalt, nikel). 1669’da Hennig Brand’ın fosforu keşfi, ardından 1789’da Martin Heinrich Klaproth’un uranyumu keşfi, çoğu elementin keşif çağını resmen başlattı."
 mendelejew.202.g: "Elementer araştırma."
 mendelejew.203.t: "Yabancı Bir Ulus Yeni Element Keşfetti"
 mendelejew.203.d: "Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], bugün bir konferansta yabancı bir kimyagerin #YELLOW Element Numarası [ROOT.Var('mendelejew_searched_variable').GetValue|0]#!’i ilk keşfeden kişi olduğunu öğrendi. Bu haber karşısında motivasyonunu kaybeden [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetSheHe], tüm araştırmaları durdurdu."
 mendelejew.203.f: "'Fizik ve kimya üzerine yazılmış incelemelerdeki çeşitli deneyleri denedim ve sonuçlar bazen beklenmedik oluyordu. Bazen umulmadık küçük bir başarı beni cesaretlendiriyordu; bazen de deneyimsizliğimden kaynaklanan kazalar ve başarısızlıklar yüzünden en derin umutsuzluğa düşüyordum.' -Marie Curie"
 mendelejew.203.g: "Bunun sahte bir element olduğunu kanıtlamalıyız!"
 mendelejew.211.t: "Yeni Bir Laboratuvar mı?"
 mendelejew.211.d: "Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], üniversitesindeki kimya laboratuvarının kötü durumda olduğundan şikâyet ediyor. Yeni araçların ve ekipmanların acilen satın alınmasına ihtiyaç var. Aksi takdirde yeni elementlerin keşfi ciddi şekilde gecikebilir."
 mendelejew.211.f: "Laboratuvar kurmak ve yeni araç-gereç satın almak hiç de garanti bir şey değildi. 19. yüzyılın başında birçok yerde kimya hâlâ olumsuz görülüyordu. Önemli mevkiine rağmen, kimyager Justus von Liebig bile laboratuvar ekipmanlarını kendi cebinden ödemek zorunda kalmıştı."
 mendelejew.211.g: "En modern ekipmanlarla donatılmış yeni bir laboratuvarı finanse et."
 mendelejew.211.h: "Yeni araç-gereç almak için üniversitede tasarruf yap."
 mendelejew.211.i: "Peki tüm bunların finansmanını kim sağlayacak?"
 mendelejew.212.t: "Bilinmeyen Kimyasal Bileşik"
 mendelejew.212.d: "#YELLOW Element Numarası [ROOT.Var('mendelejew_searched_variable').GetValue|0]#!’i sonunda keşfetmeye çalışırken Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], sanayiye pratik faydalar sağlayabilecek daha önce bilinmeyen bir kimyasal bileşik keşfetti."
 mendelejew.212.f: "Bir kimyasal bileşik, birden fazla kimyasal elementin atomlarını içeren ve kimyasal bağlarla birbirine bağlanmış, özdeş moleküllerden (veya moleküler varlıklardan) oluşan kimyasal bir maddedir. Yalnızca tek bir elementin atomlarından oluşan bir molekül bu nedenle bileşik değildir. Bir bileşik, kimyasal bir tepkime yoluyla başka bir maddeye dönüştürülebilir; bu süreçte atomlar arasındaki bağlar kopabilir veya yeni bağlar oluşabilir."
 mendelejew.212.g: "Harika!"
 mendelejew.213.t: "Kimyasal Asistan"
 mendelejew.213.d: "Hâlâ keşfedilmemiş #YELLOW Element Numarası [ROOT.Var('mendelejew_searched_variable').GetValue|0]#! arayışında, Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] yetenekli bir asistandan faydalı destek alıyor. Bazı meslektaşları, onun sırf bir asistan olarak çalışmak için fazla yetenekli olduğunu düşünüyor."
 mendelejew.213.f: "'Kimyasal olgular, çoğu zaman belirgin şekilde farklı özelliklere sahip maddelerin tepkimeleri beni büyülemişti; ve dünyanın bu yönü hakkında gitgide daha fazla şey öğrenmeyi umuyordum.' -Linus Pauling"
 mendelejew.213.g: "Asistan element araştırmasına odaklanmalı."
 mendelejew.213.h: "Bu bilimsel yeteneği teşvik et."
 mendelejew.214.t: "Kötü Örnekler"
 mendelejew.214.d: "Görünüşe göre Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] aylarca saf olmayan örneklerle çalışmış ve bu yüzden yanlış sonuçlar çıkarmış."
 mendelejew.214.f: "'Ne demek sadece renk değiştirmiş kuvars bu?!'"
 mendelejew.214.g: "Bilimsel bir gerileme."
 mendelejew.215.t: "Bir Jeoloji-Kimya İşbirliği"
 mendelejew.215.d: "Jeolog Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] ile yapılan fikir alışverişi, kimyagerimiz Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]’e yeni bir elementin keşfi için çığır açıcı ilhamlar verdi."
 mendelejew.215.f: "Jeologların katalogladığı yeni mineraller olmasaydı, birçok kimyasal elementin keşfi mümkün olmazdı. 1839’da Alman-İsviçreli kimyager Christian Friedrich Schönbein ‘jeokimya’ terimini ortaya attı. Bu kavram yalnızca mineralleri tanımlamak değil, aynı zamanda onların maddi temelini ve ardındaki kimyasal dinamikleri anlamak üzerine kuruludur."
 mendelejew.301.t: "Yeni Bir Elementin İzolasyonu"
 mendelejew.301.f: "'Doğada hiçbir şey yaratılmaz, hiçbir şey kaybolmaz, her şey değişir. Hiçbir şeye güvenmemeliyiz, sadece olgulara: Bunlar bize Doğa tarafından sunulur ve bizi aldatamaz.' -Antoine Lavoisier"
 mendelejew.301.g: "Bilimin bir zaferi."
 mendelejew.302.d: "#YELLOW Element Numarası [ROOT.Var('mendelejew_examined_variable').GetValue|0]#! ‘keşfedilmiş’ kabul edilse de, saf hâlde izole edilmeden varlığı henüz doğrulanmadı. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName], elementi daha yakından incelemeye, doğrulamaya ve sonunda saf formda erişilebilir hâle getirmeye karar verdi."
 mendelejew.302.f: "İlk modern element listesi, Antoine Lavoisier’in 1789 tarihli *Kimyanın Elementleri* eserinde verildi; bu listede ışık ve kalorik dahil 33 element bulunuyordu. 1818’e gelindiğinde, Jöns Jacob Berzelius o zamanki kabul gören 49 elementten 45’inin atom ağırlığını belirlemişti. Dmitri Mendeleyev’in 1869 tarihli periyodik tablosunda ise 63 element vardı."
 mendelejew.302.g: "Umarım laboratuvar sigortalıdır."
 mendelejew.303.t: "Yabancı Bir Ulus Yeni Elementi İzole Etti"
 mendelejew.303.d: "Kötü haber! Görünüşe göre bir yabancı kimyager #YELLOW Element Numarası [ROOT.Var('mendelejew_examined_variable').GetValue|0]#!’i izole etmiş. Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]’in tüm çabaları ve yatırımları boşa gitmiş oldu. Belki başka bir elementi araştırabiliriz?"
 mendelejew.303.f: "'Fikir doğru ama zamanı değil. Çevremdeki pek çok kişiden daha başarılı olduysam, bu çoğunlukla – hatta neredeyse yalnızca – evrensel gayretimden kaynaklanmıştır.' -John Dalton"
 mendelejew.303.g: "Bu bilimsel şan bize ait olmalıydı..."
 mendelejew.311.t: "Kimyasal Sentez"
 mendelejew.311.d: "#YELLOW Element Numarası [ROOT.Var('mendelejew_examined_variable').GetValue|0]#!’i izole etmeye çalışırken Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], daha önce teknik olarak son derece zor kabul edilen bir sentezi başarmayı başardı. Bu, bilim kadar ekonomi ve sanayiye de fayda sağlayacak."
 mendelejew.311.f: "Kimyasal sentez (kimyasal birleşim), bir ya da birkaç ürün elde etmek için kimyasal tepkimelerin yapay olarak gerçekleştirilmesidir. Bu, genellikle bir veya daha fazla tepkime içeren fiziksel ve kimyasal işlemlerle meydana gelir. Modern laboratuvarlarda süreç tekrarlanabilir ve güvenilirdir. Bir kimyasal sentez, belirli koşullar altında dönüşüme uğrayacak olan bir veya daha fazla bileşiği (reaktifler veya giren maddeler) içerir. İstenilen ürünü elde etmek için çeşitli tepkime türleri uygulanabilir. Bu, bileşiklerin bir tepkime kabında – kimyasal reaktör ya da basit bir yuvarlak dipli şişe gibi – karıştırılmasını gerektirir. Birçok tepkime, nihai ürünü izole etmek için bir tür işleme veya saflaştırma prosedürü gerektirir."
 mendelejew.311.g: "Harika."
 mendelejew.312.t: "Kimyasal Ayrışma"
 mendelejew.312.d: "Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], #YELLOW Element Numarası [ROOT.Var('mendelejew_examined_variable').GetValue|0]#!’i izole etme çabalarında ilerleme kaydetti. Bir kimyasal ayrışma onu belirleyici bir adım daha ileriye taşıdı."
 mendelejew.312.f: "Kimyada ayrışma, moleküllerin (veya tuzlar ya da kompleksler gibi iyonik bileşiklerin) atomlara, iyonlara veya radikallere ayrıldığı ya da bölündüğü genel bir süreçtir; bu genellikle tersinir bir şekilde gerçekleşir. Örneğin, bir asit suda çözündüğünde, elektronegatif bir atom ile hidrojen atomu arasındaki kovalent bağ heterolitik yarılma ile kırılır; bu da bir proton (H⁺) ve bir negatif iyon verir. Ayrışma, birleşmenin ya da yeniden birleşmenin tersidir."
 mendelejew.312.g: "Müthiş!"
 mendelejew.313.t: "İhmal Edilen Görevler"
 mendelejew.313.d: "Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]’in #YELLOW Element Numarası [ROOT.Var('mendelejew_examined_variable').GetValue|0]#!’in izolasyonu konusundaki mevcut araştırma görevini, kalan hoş olmayan akademik sorumluluklarından kaçmak için bir bahane olarak kullandığı sır değil. Rektör, üniversite toplantılarına ya da derslere katılmadığı için onu hesap vermeye çağırdı."
 mendelejew.313.f: "Genellikle 'öğrenci' unvanını taşıyan sinir bozucu yaratıklardan uzak kalmak için hiçbir bahane fazla değildir."
 mendelejew.313.g: "Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]’in yapacak daha önemli işleri var."
 mendelejew.313.h: "Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] diğer yükümlülüklerini yerine getirmeli."
 mendelejew.314.t: "Öngörülmeyen Bir Kimyasal Tepkime"
 mendelejew.314.d: "Son kimyasal deneylerinden birinde, Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] görünüşe göre bazı küçük şeyleri yanlış yorumladı ve bu nedenle bir tepkimenin etkisini biraz hafife aldı."
 mendelejew.314.f: "Gazeteler hâlâ başarısız olmuş itfaiye müdahalesinden bahsediyor; suyun kullanılması hasarı azaltmak yerine kimyasal tepkimeyi daha da körüklemişti. Birkaç öğrenci dumandan etkilendi, laboratuvarda ise birçok yaralanma yaşandı. Fen Fakültesi’ndeki üniversite binası ciddi hasar gördü ve aylarca, hatta yıllarca kapalı kalacak. Yerel gazete Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]’ten bir açıklama bekliyordu; fakat kısa süreli hastane yatışından sonra tenis turnuvası nedeniyle kendisine ulaşılamadı."
 mendelejew.314.g: "Bir felaket!"
 mendelejew.315.t: "Bir Mühendis-Kimya İşbirliği"
 mendelejew.315.d: "Mühendis Dr. [ROOT.Var('tesla_engineer_var').GetCharacter.GetLastName], bir elementin planlanan izolasyonunda Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName]’e yardımcı olmak için bazı bilimsel ekipmanları geliştirdi."
 mendelejew.315.f: "20. yüzyılın başlarında kimyagerler ve makine mühendisleri kimya endüstrisinde birlikte çalıştılar; örneğin reaktörler ve kazanların tasarımında (bunların bazıları 600 °C ve 100 bar gibi büyük zorlanmalara maruz kalıyordu). Sonunda, mezunları bugün kimya endüstrisine hâkim olan kimya mühendisliği disiplini bu kesişim noktasında ortaya çıktı."
 mendelejew.401.t: "Bir Kimyasal Deney"
 mendelejew.401.d: "Günlük işlerine ara vermek isteyen Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName], ülkenin en önemli laboratuvarındaki alanı kullanarak bir kimyasal deney gerçekleştirmek istiyor. Deneysel cam eşyalar şimdiden hazır."
 mendelejew.401.f: "Zaman zaman kimyagerler, kendilerine verilen görevler yerine tutkularının peşinden gitme fikrine kapılırlar. Bazen gerçekten değerli bulgular da ortaya çıkar: örneğin gübrelerin geliştirilmesi ya da endüstride kimyasal üretimi. Böyle bir başarının gerçekleşip gerçekleşmeyeceği büyük ölçüde bir kimyagerin karakter özelliklerine, becerilerine ve deneyimine bağlıdır."
 mendelejew.401.g: "Bu deneyden ne çıkacağını görmek için sabırsızlanıyorum!"
 mendelejew.401.h: "Bu saçmalığa son ver."
 mendelejew.402.t: "Başarılı Deney"
 mendelejew.402.d: "Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] haklı çıktı ve son deneyinden gerçekten faydalı bilgiler elde etti. Yeni keşfedilen kimyasal yöntem önümüzdeki yıllarda tarımı ve sanayiyi etkileyecek. Belki bu süreç bir gün [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetHerHim]’in adıyla anılır?"
 mendelejew.402.f1: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName], yaptığı deneysel araştırma sayesinde önümüzdeki yıllarda daha verimli hasatlar vaat eden daha iyi bir gübre üretmeyi başardı."
 mendelejew.402.f2: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName], devrimsel yöntemiyle özellikle plantasyon tarımında kullanılacak özel bir gübrenin temellerini attı."
 mendelejew.402.f3: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]’in sanayiye kazandırdığı yeni süreç, kimya fabrikalarındaki üretimi önemli ölçüde iyileştirmeli."
 mendelejew.402.g: "Başarı!"
 mendelejew.403.t: "Başarısız Deney"
 mendelejew.403.d: "Her ne kadar meslektaşları [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetFullName]’in çalışmasından büyük umutlar beslese de, onun deneyi başarılı olmadı. Bunun yerine, element araştırmasına harcansa daha iyi olacak değerli zamanı kaybetti."
 mendelejew.403.f: "'Eh, beklendiği gibi gitmedi. En azından laboratuvar patlamadı!'"
 mendelejew.403.g: "Hayal kırıklığı."
