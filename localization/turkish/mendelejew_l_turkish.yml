 je_mendelejew_improve_fertilizer_project_reason: "Your [concept_mendelejew_chemist] Dr. [ROOT.Var('mendelejew_chemist_var').GetCharacter.GetLastName] focuses on modernizing the production methods of the [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] in [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName].\n$mr_divider_for_je$\nThe project will get progress every month. Every time the progress reaches #V 24 Points#! the building will receive a new modifier. There is a total number of 3 modifiers to gain.\n$mr_divider_for_je$\nCurrent Building: [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetName] in [JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetState.GetName]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_mendelejew_improve_chemical_plants_project_modifier_1_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_mendelejew_improve_chemical_plants_project_modifier_2_type')]\n[JournalEntry.MakeScope.Var('mr_target_building_var').GetBuilding.GetCustom('je_mendelejew_improve_chemical_plants_project_modifier_3_type')]\n\nTotal Remaining Buildings (excluding current): [JournalEntry.MakeScope.Var('mr_number_of_remaining_list_entries_var').GetValue|V0]\n\nCurrent monthly progress: #underline #tooltip:[GetRawTextTooltipTag('gaudi_monthly_mechanical_research_progress_tt')] [GetPlayer.MakeScope.ScriptValue('mendelejew_general_project_progress_value')|+2] #!#!"
