 je_mendelejew_noble_gases_invalid: "Asil Gazları başka bir ulus keşfetti."
 mendelejew.901.t: "Asil Gazlar"
 mendelejew.901.d: "Dr. [GetPlayer.MakeScope.Var('mendelejew_chemist_var').GetCharacter.GetLastName], Dünya'da da tespit edilmiş olan daha önce teorileştirilmiş helyumu izole etmeyi başardı. Şaşırtıcı bir keşif yaptı: havada sadece bir tane değil, birkaç tane bilinmeyen element vardı. Düşük tepkimeye girme yetenekleri nedeniyle onlara 'asil gazlar' adını verdi."
 mendelejew.901.f: "Cavendish'in hava üzerine yaptığı deneyler 1888'den itibaren Lord Rayleigh tarafından sürdürüldü. Rayleigh, havadan elde edilen azotun, amonyak ayrıştırılarak elde edilenden farklı bir yoğunluğa sahip olduğunu fark etti. Bu nedenle, havada henüz bilinmeyen, tepkimeye girmeyen bir bileşen olması gerektiğinden şüphelendi. Bunun üzerine William Ramsay ile birlikte, azotu magnezyumla tepkimeye sokarak bir hava örneğinden tamamen uzaklaştırmaya ve bu bilinmeyen gazı izole etmeye çalıştılar. Sonunda, 1894'te argon adını verdikleri yeni bir elementi spektroskopik olarak tespit etmeyi başardılar. Helyum ve argonun temel özellikleri belirlendikten sonra, bu gazların diğer atmosferik gazlardan farklı olarak tek atomlu olduğu anlaşıldı. Ardından William Ramsay, periyodik tabloda kendi gruplarını oluşturan tüm bu tür gazların olması gerektiğinden şüphelenerek onları aramaya başladı. 1898'de Morris William Travers ile birlikte havanın fraksiyonel damıtımıyla neon, kripton ve ksenonu izole etmeyi başardı."
 mendelejew.901.g: "Asil mi? Ben buna tembellik derim."
 mandelejew_noble_gases_901.tt: "#YELLOW Argon#!, #YELLOW Neon#!, #YELLOW Kripton#! ve #YELLOW Ksenon#! üzerine teoriler geliştir, keşfet ve izole et."
