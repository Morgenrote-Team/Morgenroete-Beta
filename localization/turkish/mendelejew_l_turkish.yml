 mendelejew.11.t: "Patlayıcı Bir İş"
 mendelejew.11.d: "[SCOPE.sCharacter('mendelejew_chemist_scope').GetFullName], nitrogliserinle yaptığı deneylerde geliştirilmiş bir patlayıcıyı araştırdı ve kelimenin tam anlamıyla yankı uyandıran bir başarı elde etti. Kimyager, buluşunun patentini aldı ve kendi fabrikasında deneme üretimine başladı."
 mendelejew.11.f: "1850’de Paris’te öğrenim görürken Alfred Nobel, üç yıl önce nitrogliserini keşfeden Ascanio Sobrero ile tanıştı, ancak Sobrero onu darbelere ve ateşe karşı aşırı hassasiyeti nedeniyle pratik bulmamıştı. Nobel icatla çok ilgilendi ve 1862’den itibaren çabalarını nitrogliserini patlayıcı olarak teknolojiye kazandırmaya yöneltti. Nobel’in deneyleri sırasında birçok kaza meydana geldi. Eylül 1864’te, laboratuvarında saklanan 125 kilogram nitrogliserinin patlaması, kardeşi Emil, mühendis Hertzman, hizmetçi Maria, çırak Herman ve marangoz Johan Peter Nyman’ın ölümüne yol açtı. 1866’da Nobel bir atılım gerçekleştirdi ve Geesthacht yakınlarındaki Krümmel patlayıcı fabrikasında 'dinamit' adını verdiği patlayıcıyı geliştirdi."
 mendelejew.11.g: "[ROOT.Var('mendelejew_chemist_var').GetCharacter.GetSheHe] aynı zamanda bir girişimci mi?"
 mendelejew.12.t: "[SCOPE.sCharacter('mendelejew_chemist_scope').GetFullName], Fraunhofer Çizgilerinin Sebebini Buldu"
 mendelejew.12.d: "Güneşin tayfındaki ince siyah çizgilerin sebebi uzun süre spekülasyon konusuydu. Ancak şimdi Dr. [SCOPE.sCharacter('mendelejew_chemist_scope').GetFullName] nihayet onların nedenini buldu: Belirli Kimyasal Elementler bu çizgilerin oluşmasına sebep oluyor. Bu, yıldızlarda hangi elementlerin bulunduğunu öğrenmenin bir yolunu sunuyor."
 mendelejew.12.f: "Joseph Fraunhofer, 1813’te güneşin tayfında belirgin çizgiler fark etti. Ancak onlarca yıl sonra Gustav Robert Kirchhoff ve Robert Bunsen bu çizgilerin nedenini buldu. Çeşitli elementleri ve kimyasal bileşikleri yakarak bu elementlerin tayfın belirli kısımlarını emdiğini gözlemlediler. Bu nedenle, tayfın belirli kısımlarının soğurulmasının bir yıldızın dış kısmında belirli bir bileşik veya elementin kanıtı olduğunu öne sürdüler.\n\nSpektroskopi sadece yıldızları türlerine göre sınıflandırmayı sağlamakla kalmadı, aynı zamanda malzemelerin ve kimyasalların spektroskopik analizine de imkân tanıdı. Helyum’un keşfi bile güneşin spektroskopisi sayesinde gerçekleşti."
 mendelejew.12.g: "Evrenin bir başka gizemi daha çözüldü!"
