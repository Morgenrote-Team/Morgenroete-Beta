 andersson_cave_collection_decrease_20_tt: "Lose #R 20#! #V Collection Progress#!."
 andersson.301.a: "Reconstruction Type Selection"
 andersson.301.d: "[ROOT.Var('andersson_anthropologist_var').GetCharacter.GetFullName] retreated to his bone collection with some fossils and meticulously arranged the finds according to their location and similarity. Apparently, the bones fit together to form a skeleton. But which one?"
 andersson.301.f: "'The head bone's connected to—the rib bone\nThe rib bone's connected to the—leg bone\nThe leg bone's connected to the—hip bone\nThe hip bone is connected to the—arm bone.\nThe arm bone is connected to the—head bone.\nThe head bone is connected to the—rib bone."
 andersson.301.g: "The [GetPlayer.GetCustom('andersson_fossil_vero')] Man."
 andersson.301.h: "The [GetPlayer.GetCustom('andersson_fossil_lagoa_santa')] Man."
 andersson.301.i: "The [GetPlayer.GetCustom('andersson_fossil_cro_magnon')] Man."
 andersson.301.j: "The [GetPlayer.GetCustom('andersson_fossil_boskop')] Man."
 andersson.301.k: "The [GetPlayer.GetCustom('andersson_fossil_tianyuan')] Man."
 andersson.301.l: "The [GetPlayer.GetCustom('andersson_fossil_talgai')] Man."
 andersson.301.m: "The [GetPlayer.GetCustom('andersson_fossil_neanderthal')] Man."
 andersson.301.n: "The [GetPlayer.GetCustom('andersson_fossil_gibraltar')] Man."
 andersson.301.o: "The [GetPlayer.GetCustom('andersson_fossil_spy')] Man."
 andersson.301.p: "The [GetPlayer.GetCustom('andersson_fossil_krapina')] Man."
 andersson.301.q: "The [GetPlayer.GetCustom('andersson_fossil_galilee')] Man."
 andersson.301.r: "The [GetPlayer.GetCustom('andersson_fossil_heidelberg')] Man."
 andersson.301.s: "The [GetPlayer.GetCustom('andersson_fossil_rhodesian')] Man."
 andersson.301.t: "The [GetPlayer.GetCustom('andersson_fossil_peking')] Man."
 andersson.301.u: "The [GetPlayer.GetCustom('andersson_fossil_java')] Man."
 andersson.301.v: "The [GetPlayer.GetCustom('andersson_fossil_australopithecus')]."
 andersson.311.t: "New Prehistoric Skeleton"
 andersson.311.d: "At a public event, Dr. [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] presented the new prehistoric skeleton to the public. The scientific community has taken note of the reconstruction."
 andersson.311.f: "'You can only look forward as far as you can look back. -Raymond Dart"
 andersson.311.g: "[GetPlayer.GetName] is a world-class scientific nation!"
 andersson.911.t: "Anthropological Congress: Origin of Modern Humans"
 andersson.911.d: "Our country will host the most important congress in the history of anthropology. One of the great questions of humanity, namely that of its origin, should be clarified. Anthropologists from around the world will discuss whether this happened in Europe, Asia or Africa. [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] will lead the debate."
 andersson.911.f: "Where does man come from? The biblical story about the expulsion from paradise already contains the core of this question - he obviously does not come from the region in which he lives today. Consequently, for a long time in Europe, ancient human bones were thought to be the remains of those people who perished in the Great Flood - just as dinosaurs were long thought to be animals that had no place on the ark. With the postulation of the ice age theory and subsequent geological and paleontological studies, which showed that the earth was significantly older than expected, interest in 'cavemen' increased. At the latest with the theory of evolution and the discovery of prehistoric bones that were more than a few thousand years old, the question of the place of origin of modern humans became more virulent."
 andersson.911.g: "Where is the cradle of humanity?"
 andersson.912.d: "[SCOPE.sCountry('andersson_congress_host_country').GetName] has invited to an international science congress. The topic will be the origin of modern humans. Professor [SCOPE.sCharacter('andersson_anthropologist_scope').GetLastName] has received a warm invitation."
 andersson.914.t: "Did modern humans emerge in Europe, Asia or Africa?"
 andersson.914.d: "The academic world has divided into three camps. The question of the cradle of humanity is not only linked to a certain national pride, but also to further theses on human evolution."
 andersson.914.f: "In a stimulating debate, the respective advocates of the three camps exchanged their arguments. [SCOPE.sCharacter('andersson_europe_defender_scope').GetLastName] brought Europe into the field because the finds so far showed the largest brain volume in European fossils. Since the larger brain preceded upright walking, this is inevitable. [SCOPE.sCharacter('andersson_asia_defender_scope').GetLastName] doubted this theory. The fossils of upright walking, human-like representatives have already been found in Asia - the brain therefore only developed after walking upright. [SCOPE.sCharacter('andersson_africa_defender_scope').GetLastName], on the other hand, pointed out that the known ape species that are closest to humans came from Africa, not Asia. As the inventor of the evolution theory had based it, the origin of humanity had to be found there."
 andersson.914.g: "Modern humans developed in Europe."
 andersson.914.h: "Everything points to an Asian origin."
 andersson.914.i: "The cradle of humanity lies in Africa."
 andersson.915.t: "Respected Speech"
 andersson.915.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] gave a lecture to the assembled scientific staff in [SCOPE.sCountry('andersson_congress_host_country').GetName] that inspired the audience and young academics alike."
 andersson.915.f: "'The Earth is the cradle of humanity, but mankind cannot stay in the cradle forever.'\n -Konstantin Tsiolkovsky."
 andersson.915.g: "Professor [SCOPE.sCharacter('andersson_anthropologist_scope').GetLastName] makes a considerable impression."
 andersson.916.t: "Valuable Contribution to the Debate"
 andersson.916.d: "A brilliant scientific lecture by Professor [SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] broadened the horizons of the academic world at the science congress in [SCOPE.sCountry('andersson_congress_host_country').GetName]. It will probably have a long-lasting effect."
 andersson.916.f: "'He held very strange theories about a good many things. He had even got up once at the British Association, and declared that apes had hippopotamus majors in their brains just as men have. Which was a shocking thing to say; for, if it were so, what would become of the faith, hope, and charity of immortal millions? You may think that there are other more important differences between you and an ape, such as being able to speak, and make machines, and know right from wrong, and say your prayers, and other little matters of that kind; but that is a child's fancy, my dear. Nothing is to be depended on but the great hippopotamus test. If you have a hippopotamus major in your brain, you are no ape, though you had four hands, no feet, and were more apish than the apes of all aperies.' -Charles Kingsley"
 andersson.917.t: "Anthropological Heritage"
 andersson.917.d: "At the congress, the sad news was announced that a renowned anthropologist had passed away a few days earlier. His private collection is to be auctioned off."
 andersson.917.f: "'The man had no children, no wife, and no friends, but plenty of old stones and bones. What a blessed life!'"
 andersson.917.g: "Every bone is valuable to our collection."
 andersson.917.h: "...but we have enough bones."
 andersson.919.t_europe: "Modern humans come from Europe"
 andersson.919.t_asia: "Modern humans come from Asia"
 andersson.919.t_africa: "Modern humans come from Africa"
 andersson.919.d_europe: "International science has agreed on a European origin of modern humanity. Non-European scholars have denounced this decision as suprematism."
 andersson.919.d_asia: "The International Anthropological Congress recently agreed on the compromise that humans must come from Asia. Most members of the Assembly agreed with this view."
 andersson.919.d_africa: "After a very controversial final debate, the scientists were able to agree by a narrow majority that the origin of humanity should be located in Africa."
 andersson.919.f_europe: "Historically, the question of the actual place of origin of humanity was not resolved at the beginning of the 20th century. While a small group, partly misled by the discovery of the so-called Piltdown Man, suspected the origin of modern man in Europe less for scientific than ideological reasons, the Asia theory had received the most support. The discoveries on Java and the recovery of the Peking Man played a large part in this. It was only from the middle of the 20th century that more and more African finds began to erode this view."
 andersson.919.f_asia: "Historically, the question of the actual place of origin of humanity was not resolved at the beginning of the 20th century. While a small group, partly misled by the discovery of the so-called Piltdown Man, suspected the origin of modern man in Europe less for scientific than ideological reasons, the Asia theory had received the most support. The discoveries on Java and the recovery of the Peking Man played a large part in this. It was only from the middle of the 20th century that more and more African finds began to erode this view."
 andersson.919.f_africa: "Historically, the question of the actual place of origin of humanity was not resolved at the beginning of the 20th century. While a small group, partly misled by the discovery of the so-called Piltdown Man, suspected the origin of modern man in Europe less for scientific than ideological reasons, the Asia theory had received the most support. The discoveries on Java and the recovery of the Peking Man played a large part in this. It was only from the middle of the 20th century that more and more African finds began to erode this view."
 andersson.919.g: "As expected, Humanity evolved in Europe."
 andersson.919.h: "All evidences suggest that humanity evolved in Asia."
 andersson.919.i: "'Out of Africa' is an approved thesis now."
