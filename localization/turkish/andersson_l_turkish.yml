 setting_andersson_anthropology_historical_rule: "Historical"
 setting_andersson_anthropology_historical_rule_desc: "From a historical date onwards, fossils sre are found. Human fossils discovered as part of a historical event do not receive anthropological prestige. If a country makes a human fossil discovery before the historical date, that discovery is generically named after the site where it was found."
 setting_andersson_anthropology_free_rule: "Free"
 setting_andersson_anthropology_free_rule_desc: "There are no specific historical events associated with human fossil finds. All finds are generically named after the site where they were discovered."
 andersson_has_active_anthropologist_tt: "Has a [concept_andersson_anthropologist] who is not busy."
 andersson.106.t: "Anthropological Team leaves"
 andersson.106.d: "After the anthropological team has finished its work, the research assistants return to their home country. The caves they found are now also accessible to our scientists."
 andersson.106.f: "'No man has gone before us in these depths, no one knows where we go nor what we see, nothing so strangely beautiful was ever presented to us, and spontaneously we ask each other the same question: are we not dreaming?' -Charles Lyell"
 andersson.106.g: "That used to be useful foreign aid."
