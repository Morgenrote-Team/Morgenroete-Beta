 klimt.20.g: "İyi günler dilerim."
 klimt.30.t: "Sanata Taze Bir Nefes"
 klimt.30.d: "[SCOPE.sState('klimt_secession_state').GetCityHubName], Art Nouveau ile derinlemesine bağlantılı uluslararası bir sanat hareketinin merkezi hâline geldi. Sanat çevresi kendisini '[SCOPE.sState('klimt_secession_state').GetCityHubName] Secession' olarak tanımlıyor."
 klimt.30.f: "Viyana Secession, 1897’de Avusturyalı ressamlar, grafik sanatçılar, heykeltıraşlar ve mimarlardan oluşan bir grup tarafından (Josef Hoffman, Koloman Moser, Otto Wagner ve Gustav Klimt dahil) kurulan, Art Nouveau ile yakından ilişkili bir sanat hareketidir. Avusturyalı Sanatçılar Birliği’nin geleneksel tarzlara verdiği desteğe karşı çıkarak birlikten ayrıldılar. En etkili mimari eserleri, grubun sergilerine ev sahipliği yapmak üzere Joseph Maria Olbrich tarafından tasarlanan Secession Binası oldu. Resmî dergileri olan *Ver Sacrum* (Latince “Kutsal Bahar”), son derece stilize ve etkili grafik eserler yayımladı. 1905’te, aralarında Klimt, Wagner ve Hoffmann’ın da bulunduğu önde gelen üyeler öncelikler konusunda çıkan anlaşmazlık nedeniyle ayrıldı, ancak grup varlığını sürdürdü ve bugün hâlâ Secession Binası’ndaki merkezinden faaliyet göstermeye devam ediyor. Günümüzde Secession sergi galerisi bağımsız olarak sanatçılar tarafından yönetilmektedir."
 klimt.30.g: "Bu öpücük tüm dünya için!"
 klimt.30.h: "Klimt mi? Gustav Klimt’ten mi bahsediyorsun?"
 klimt.30_tt: "Etkinliği Tetikler: #white #b İlk Secession#!#!"
 klimt.40.t: "Vernisaj"
 klimt.40.d: "[SCOPE.sState('klimt_vernissage_state').GetCityHubName]’deki sergi tamamen [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]’ın eserlerine adandı. Bu etkinlik yılın kültürel doruk noktalarından biri olarak kabul ediliyor ve eleştirmenlerden övgü aldı. Ülkemiz için bu, önde gelen bir kültür ulusu olduğumuzun teyidi niteliğinde."
 klimt.40.f: "'Çoğu insanın gözünde ben kimim? – Önemsiz biri, bir garip ya da hoş karşılanmayan bir kişi – toplumda hiçbir yeri olmayan ve asla olmayacak biri; kısacası en dipteki kişi. Pekâlâ öyle olsun – bu tamamen doğru olsa bile, bir gün eserlerimle böyle bir garibin, böyle bir hiçin kalbinde ne olduğunu göstermek isterim.\nBu benim tutkum; öfkeden çok sevgiden, her şeye rağmen sevgiden doğan, tutkudan çok huzurdan kaynaklanan bir arzu.\nSık sık sefaletin dibine düşsem de, içimde hâlâ dinginlik, saf uyum ve müzik var. En yoksul kulübelerde, en pis köşelerde resimler ya da çizimler görüyorum. Ve zihnim durdurulamaz bir ivmeyle bu şeylere yöneliyor.' -Vincent van Gogh"
 klimt.40.g: "Açık büfe nasıldı?"
 klimt.101.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]"
 klimt.101.d: "Vernisajında, Maestro [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] halka son eserini sundu: '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]' klasisizmin tipik bir eseri olup bu türde şimdiden önemli görülüyor."
 klimt.101.f: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName]’ın yeni eseri sanat uzmanlarının dikkatini hemen çekti. Özellikle daha muhafazakâr düşünceli akademisyenler estetik biçimleri ve çizgi ile rengin dengesini beğendi. Eserin ahlaki bütünlüğü ve yüceliği özellikle vurgulandı. Bu tablo şimdiden ulusumuzun mükemmel bir kültürel mirası olarak kabul ediliyor ve her galerinin süsü olmalı."
 klimt.101.g: "Bu bir ... Galeriye ait!"
 klimt.102.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]"
 klimt.102.d: "Ulusal ressam [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName], birkaç davetlinin katıldığı bir etkinlikte eserini halka sundu. Renklerin duyusallığı ve gücü izleyiciler üzerinde derin bir etki bıraktı. Bu tablo şimdiden Romantizm’in kilit eserlerinden biri olarak kabul ediliyor."
 klimt.102.f: "'[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]' daha ilk geceden bazı ziyaretçiler üzerinde güçlü bir etki yarattı. Başyapıtın ardındaki ruh açıkça hissediliyordu. Eleştirmenler bazı yerlerdeki konturların bulanık olduğundan şikâyet etti, diğerleri ise bu belirsizliği renklerin zenginliğiyle birleşmiş bir güç olarak gördü. Bu tabloyla birlikte [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName], sanat tarihinin sayfalarına adını yazdırmayı kesinlikle başardı."
 klimt.103.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]"
 klimt.103.d: "Bir akşam davetinde, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] realizme açıkça ait bir yeni tabloyu sergileme fırsatı buldu. Katılan bazı sanat uzmanları eseri övdü."
 klimt.103.f: "Bazı davetliler daha kışkırtıcı bir sürprizden korkmuştu, ancak '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]' oldukça sade bir tasvir olarak ortaya çıktı. İlk bakışta bazı konuklar tabloyu tür resmi sandı. Fakat sahnedeki gündelik olayın daha dikkatli incelenmesiyle, ardındaki ince, kışkırtıcı fikir ve sanatçının değindiği toplumsal sorunlar daha da belirginleşti. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName], bu toplumsal eleştirel yaklaşımıyla akşam toplumundaki bazı kişileri kendinden uzaklaştırmış olabilir, ancak genel görüş böylesi bir sanat hazinesinin ulusal düzeyde değerli bir sergide yer alması gerektiği yönündeydi."
 klimt.104.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]"
 klimt.104.d: "Ulusal resim topluluğunun üst düzey temsilcilerinin katıldığı büyük bir sergide, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] bir eser sundu. Eser, büyük ilgi toplamasına rağmen bazı eleştirmenlerin alay konusu oldu. Ancak yabancı bir sanat tüccarından gelen yüksek fiyatlı teklif, tabloyu aniden çok popüler hâle getirdi."
 klimt.104.f: "'[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]' sergilendiğinde görüşler ikiye bölündü. Kimileri sahneyi neredeyse safça, politik veya toplumsal bir amacı olmayan bir idil olarak görürken, diğerleri şekil ve çizgi eksikliğini eleştirdi. Biri alayla, çözülmekte olan manzaranın yazarın çözülmekte olan beyninden kaynaklandığını söyledi. Taraftarlar, [SCOPE.sCountry('klimt_art_dealer_country').GetName]’den bir sanat tüccarı başyapıtın kalitesini ve yenilikçi ruhunu özellikle vurgulayana kadar seslerini duyuramadılar. Tüccar tablo için derhâl olağanüstü bir bedel ödemeye ve onu ülkesine götürmeye hazırdı. Bu olayın ardından esere olan ilgi arttı ve tablo hemen ulusal kültürel miras ilan edildi. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] bu durumdan fazlasıyla memnun olabilir."
 klimt.105.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]"
 klimt.105.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]’ın son tablosu seyirci ve eleştirmenlerde dehşet, nefret, öfke ve tiksinti uyandırdı. Başka bir deyişle: sansasyonel bir başarı elde etti!"
 klimt.105.f: "'Ne demek bu: '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]'? Bunun anlamı ne? Bu çocuk kitabı boyama defterinden fırlamış renkler de ne? Bu kaba figürler? Bu sayıklama sahneleri? Siz buna sanat mı diyorsunuz? SANAT MI?! Sahtekâr! Eğer tabloya tükürseydiniz, şu an olduğundan daha fazla sanat olurdu!'\n\nVe bu, sunumda yapılan en olumlu yorumlardan biriydi. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName] böylece eserin önemini daha da artıran tarihi bir skandala imza attı."
 klimt.106.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]"
 klimt.106.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName]’ın yeni eseri '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')]' yayımlandıktan sonra, kendisi uluslararası sahnenin en önemli sanatçılarından biri olarak kabul edilmeye başlandı. Hem gelenekçileri hem de avangardları büyüledi."
 klimt.106.f: "'Nedir bu, Art Nouveau mu? Sanat asla yeni olamaz.' -Alphonse Mucha"
 klimt.110.t: "Gizli Bir Sipariş"
 klimt.110.d: "Deneyimli bir sanat ve antika tüccarı, yurt dışından nadir bir başyapıt temin etmeyi teklif etti. Bu konuda son derece gizlilik gerekiyor — zira tüccar rakiplerden ve hatta savaş hâlindeki düşmanlardan da eser satın alıyor. [SCOPE.sCharacter('klimt_art_dealer').GetFullName], yeterli ödeme ve birkaç tablo karşılığında siparişi sessizce yerine getireceği konusunda güvence verdi."
 klimt.110.f: "Yabancı bir tablo satın almak için, yurtdışındaki bir sanat tüccarına uygun bir teklif yapılmalıdır. Bu sadece para değil, aynı zamanda birkaç tabloyu iade etmeyi de içerir — bu da bizim [concept_klimt_painting_tradition]’ımıza zarar verecektir. Bir sanat tüccarı yalnızca aynı tarzda birden fazla tablosu olan ülkelerden başyapıt satın alabilir — benzersiz bir parçayı satmazlar. Benzer şekilde, bir ulus yurt dışında bir tarzın birden fazla başyapıtını satın alamaz. Anlaşmanın tamamlanması ve tablonun Ulusal Galerimize ulaşması yaklaşık altı ay sürecektir."
 klimt.110.g: "Klasisizm Başyapıtı Edin."
 klimt.110.h: "Romantizm Başyapıtı Edin."
 klimt.110.i: "Realizm Başyapıtı Edin."
 klimt.110.j: "Empresyonizm Başyapıtı Edin."
 klimt.110.k: "Ekspresyonizm Başyapıtı Edin."
 klimt.110.l: "Art Nouveau Başyapıtı Edin."
 klimt.111.t: "Bir Klasisizm Başyapıtı"
 klimt.111.d: "'[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]' bugün Ulusal Galeri’ye yeni bir başyapıt olarak ulaştı. Hükûmet bu eserden oldukça memnun kaldı. Sanat tüccarı işini tamamlanmış görüyor."
 klimt.111.f: "Büyük beklentiler boşa çıkmadı. '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_classicism')]' tam da gereklilikleri karşılıyor ve [GetPlayer.GetNameNoFlag]’ın resim koleksiyonuna mükemmel bir katkı olmalı. Sanat basını da bu satın alımın harcanan her kuruşa değdiği konusunda hemfikir. Önümüzdeki ay, bu klasisizm zirvesine odaklanacak bir sergi planlanıyor."
 klimt.111.g: "Koleksiyonumuz için bir başka sanat hazinesi!"
 klimt.112.t: "Bir Romantizm Başyapıtı"
 klimt.112.d: "Bugün Ulusal Galeri’de bazı meraklılar toplandı. Yerel ve ulusal basının temsilcileri de sabahın erken saatlerinden beri mekânı kuşatmış durumdaydı. '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]' adlı romantik bir başyapıtın resim koleksiyonuna girmek üzere olduğu haberi çoktan yayılmıştı."
 klimt.112.f: "'[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_romanticism')]' hakkında şimdiden bazı söylentiler dolaşıyor. Duyuları harekete geçiren rengârenk bir tablo olduğu söyleniyor. Konusu hakkında başka bir bilgi bilinmiyor. Daha fazla bilgi verebilecek olan, kimliği belirsiz sanat tüccarının ise büyük bir parayla yurtdışına gittiği ve emeklilik planları yaptığı söyleniyor. Artık röportajlara çıkmıyor."
 klimt.113.t: "Bir Realizm Başyapıtı"
 klimt.113.d: "Yeni başyapıt '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]', bugün özel bir serginin parçası olarak halka tanıtıldı. Bu eser realizm türüne ait olup, bu sanat döneminin kilit tablolarından biri kabul ediliyor. Kalabalık da buna göre büyüktü. Etkinliğin biletleri haftalar öncesinden tamamen tükenmişti."
 klimt.113.f: "'Ulusal Galeri’nin direktörü olarak, bugün koleksiyonumuzu zenginleştirecek bu yeni başyapıtı size sunabilmek benim için hem büyük bir onur hem de mutluluk. Bildiğiniz gibi uzun süredir realizmin kilit eserlerinden birine sahip olmak için çalışıyorduk. '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_realism')]' tam olarak budur. Ressam hakkında fazla bir şey söylememe gerek yok, hepiniz onu tanıyorsunuz. Sade tasviri ve gündelik hayata yakınlığı nedeniyle eleştirmenlerce başlangıçta tür resmi ya da ruhsuz bir eser olarak yanlış anlaşılmıştı. Oysa gerçekte içeriği derindir. Renklerdeki ayrıntılara dikkat edin, izlenim veriyor ki...'"
 klimt.114.t: "Bir Empresyonizm Başyapıtı"
 klimt.114.d: "Sanat tüccarı bugün görevini yerine getirdi ve '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_impressionism')]' eserini yüklü bir ödül karşılığında Ulusal Galeri yetkililerine teslim etti. Süreç sorunsuz ilerledi. Direktör satın alımı olumlu değerlendirdi, ancak renklerin biraz bulanık olduğundan yakındı."
 klimt.114.f: "'Resimden çok mutsuzum ve derinden tiksiniyorum. Bu gerçekten sürekli bir işkence.' -Claude Monet"
 klimt.115.t: "Bir Ekspresyonizm Başyapıtı"
 klimt.115.d: "Güvenilir bir sanat tüccarının yurtdışından temin ettiği '[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]' başyapıtı nihayet [GetPlayer.GetNameNoFlag]’a ulaştı. Ancak tam bir onaydan söz edilemez. Sanat tüccarı da ödemesini aldıktan sonra ortadan kayboldu."
 klimt.115.f: "'[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_expressionism')]' geldikten sonra bazı sanat uzmanları şaşkınlık, hatta eleştiri dile getirdi. Alışılmadık kompozisyon, eserin tanınmış bir sanatçıya ait olamayacağı izlenimini verdi. Eserin garip ismi de, karalamanın kendisiyle pek ilgisi olmaması nedeniyle, belki de şaka yapmış bir sahtekâra rastlandığı şüphesini doğurdu. Tablo üzerinde otantik bir imzanın bulunması ise işleri düzeltmekten çok daha da kötüleştirdi. Seyirciden güçlü tepkiler bekleyin."
 klimt.116.t: "Bir Art Nouveau Başyapıtı"
 klimt.116.d: "Ulusal Galeri’nin direktörü bugün başyapıtın denizaşırı ülkeden geldiğini görünce rahatladı. [SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')] tam bir görsel şölen."
 klimt.116.f: "[SCOPE.GetRootScope.GetCountry.GetCustom('custom_painting_art_nouveau')] kutusundan çıkar çıkmaz, orada bulunanların kalbini tıpkı hayvanat bahçesindeki yeni bir kaplan yavrusu gibi derhâl fethetti. Ya da bir müzedeki yeni büyük bir eser gibi. Ya da bir gözlemevinde keşfedilmiş yeni bir gezegen gibi. Ya da bir bestecinin yeni müzik başyapıtı gibi. Ya da bir paleontoloğun yeniden birleştirdiği bir iskelet gibi. Ya da insan atasına ait yeni bulunan kalıntılar gibi. Ya da ..."
 klimt.116.g: "Yoksa Schneider Kupası’nı kazanmak gibi mi?"
 klimt.301.t: "[SCOPE.sState('klimt_art_capital').GetCityHubName] Ödülü"
 klimt.301.d: "Sanatsever ülkemizin seçkinleri, en iyi tablolar için bir sanat ödülü verilmesi konusunda baskı yapıyor."
 klimt.301.f: "Galerisi olan ülkeler ara sıra sanat yarışmaları düzenler. En yetenekli beş ressama, itibarları üzerinde güçlü etkisi olan bir ödül verilir. Sanat ödülü genellikle her beş yılda bir verilir. Büyük Ressamlar davet edilmez — onlar zaten ödüllerini almışlardır."
 klimt.301.g: "Bir sanat yarışması düzenlemeliyiz."
 klimt.301.h: "Ne büyük para israfı!"
 klimt.302.t: "[SCOPE.sState('klimt_art_capital').GetCityHubName] Ödülü"
 klimt.302.d: "Jüri bir sonuca vardı ve en iyi tabloları seçti. Beş kazananın listesi şimdiden elden ele dolaşıyor."
 klimt.302.f: "1.   [SCOPE.sCharacter('klimt_character_first_winner_scope').GetFullName], [GetGlobalVariable('klimt_prize_winner_1_global_var').GetCountry.GetName]\n2.   [SCOPE.sCharacter('klimt_character_second_winner_scope').GetFullName], [GetGlobalVariable('klimt_prize_winner_2_global_var').GetCountry.GetName]\n3.   [SCOPE.sCharacter('klimt_character_third_winner_scope').GetFullName], [GetGlobalVariable('klimt_prize_winner_3_global_var').GetCountry.GetName]\n4.   [SCOPE.sCharacter('klimt_character_fourth_winner_scope').GetFullName], [GetGlobalVariable('klimt_prize_winner_4_global_var').GetCountry.GetName]\n5.   [SCOPE.sCharacter('klimt_character_fifth_winner_scope').GetFullName], [GetGlobalVariable('klimt_prize_winner_5_global_var').GetCountry.GetName]"
 klimt.302.g: "Kazananlara ödül ver."
 klimt.401.t: "Ressamın Seyahat Rotası"
 klimt.401.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] eşyalarını çoktan topladı. Hangi sanat okulunda eğitim görmeli?"
 klimt.401.f: "Sanat yolculuğuna çıkarak eğitimine devam eden bir [concept_klimt_painter], yokluğunda [concept_klimt_painting_tradition] üretmeyecek. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetSheHe], yalnızca kendisi için önceden bilinmeyen sanat tarzlarını çalışabilir. Genellikle böyle bir yolculuk bir yıl sürer, fakat konaklamayı uzatabilecek engeller veya fırsatlar olabilir."
 klimt.401.g: "Klasisizm."
 klimt.401.h: "Romantizm."
 klimt.401.i: "Realizm."
 klimt.401.j: "Empresyonizm."
 klimt.401.k: "Ekspresyonizm."
 klimt.401.l: "Art Nouveau."
 klimt.401.m: "Boşver."
 klimt.402.t: "[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]’ya Varış"
 klimt.402.d: "Güzel haber! [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName], [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]’ya ulaştı. [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe|U] hâlâ boş bir oda arıyor ve yakında eğitimine başlayacak."
 klimt.402.f: ""
 klimt.402.g: "Ah... [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]"
 klimt.403.t: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] Ressam Yolculuğundan Döndü"
 klimt.403.f: "'Sanat yalnızca kendisi için bir amaç olduğunda, tamamen özgür bırakıldığında, kendi dışında daha yüce yasaları tanımadığında, yalnızca kendi yasalarını — hakikat ve güzelliğin yasalarını — bildiğinde sanattır.' -Ludwig Feuerbach"
 klimt.403.g: "Ve tüm yolculuk sadece eğlence için değil miydi?"
 klimt.411.t: "Ressamlar Arasında"
 klimt.411.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName], eğitim yolculuğunda [SCOPE.sCharacter('klimt_fellow_painter').GetHomeCountry.GetName]’den bir ressamla tanıştı. İkisi birbirlerini eşit meslektaşlar olarak tanıdı. [SCOPE.sCharacter('klimt_fellow_painter').GetFullName] yetenekli bir ruha ve sosyal bir kişiliğe sahip görünüyor."
 klimt.411.f: "Aynı anda birden fazla ülke bir ressamı eğitim yolculuğuna göndermişse, onların karşılaşma ihtimali vardır ve olumlu sinerjik etkiler doğabilir. Rakiplikler ve düşmanlıklar, sanata duyulan ortak coşkunun çıkarları uğruna hızla ortadan kalkabilir."
 klimt.411.g: "Sanatsal bilgilerini paylaşmalılar."
 klimt.411.h: "Birbirlerinin tekniklerinden kesinlikle öğrenebilirler."
 klimt.411.i: "Bu tanışıklık, sanat dünyasında birbirlerine destek olmak için faydalı olacaktır."
 klimt.421.t: "Devlerin İzinde"
 klimt.421.d: "Ressamımız [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] eğitim yerinden yazdı: [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] şimdiden geleceğini görkemli vizyonlarla öngörüyor. Ancak ihtiyacı olan şey daha fazla zaman ve daha fazla para."
 klimt.421.f: "Roma’da, [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName], hem sanat tarihinin en önemli ressamlarıyla hem de Roma mimarisinin kalıntılarıyla yüzleşiyor. Roma’ya seyahat edenler, tekrar tekrar, bu şehir ve tarihiyle özel bir bağ kurdular. Klasiklerin izinden gitme arzusu birçok sanatçıyı harekete geçirdi. [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]’ın hırsı, bir gün idolü olanlardan biri kadar büyük bir sanatçı olmak yönünde büyüyor. Bu megalomaniye yaklaşabilir, ama her şeyden önce zaman, sabır — ve daha fazla eğitim gerektirecek, dediği gibi bir mektupta."
 klimt.421.g: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName], Michelangelo ve Raphael’i örnek almalı ve zamanını ayırmalı."
 klimt.421.h: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] hayal kurmayı bırakıp resim yapmalı!"
 klimt.422.t: "Romantizmin Ruhu"
 klimt.422.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName], Bamberg’den günlerdir yazmıyor. Görünüşe göre [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] kendini hayallere kaptırmış."
 klimt.422.f: "Bamberg, yalnızca sayısız yarı ahşap evleriyle ve zengin barok mirasıyla romantik bir şekilde oyalanmaya davet eden pitoresk bir yer değildir. Bu şehirde, Romantikleri inanılmaz derecede cezbeden bir şey vardı. Ludwig Tieck ve Heinrich Wackenroder aslında Berlin’den gelmiş önemli Romantik yazarlardı, ancak Frankonya’nın onlarda bıraktığı iz büyüktü. Onlar da derslerinden çok ülkeyle, insanlarıyla ve bölgedeki şehirlerin zengin mirasıyla ilgilenmişlerdi. Prusyalı bir başka Romantik olan E. T. A. Hoffmann ise Bamberg’deki beş yıllık kalışı sırasında edebiyat dünyasında asıl çıkışını yaptı. Goethe için İtalya seyahati neyse, Almanya’nın bu bölgesi de genç Romantikler için oydu. Bu kültürel manzarada, yalnızca idealize edilmiş Alman Orta Çağı’yla değil, aynı zamanda Nürnberg’deki Albrecht Dürer’in tablolarıyla ve Romantikleri sekülerleşmiş Protestanlıktan çok daha fazla cezbeden Katolikliğin ruhaniyetiyle de bağ kurdular."
 klimt.422.g: "Bir Avare’nin Hayatı..."
 klimt.423.t: "İnanç Değişimi"
 klimt.423.d: "Aslında, [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]’in şimdiye kadar inançla pek bir ilişkisi olmamıştı. Ancak hem sanatta hem de gündelik yaşamda karşılaştığı güçlü Katoliklik, [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHim] üzerinde bir şeyleri tetikledi. Gittikçe daha fazla [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe], o ana kadar asla mümkün olduğunu düşünmediği bir bağ hissediyor. Bundan ilham alarak, [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] ilk dini resmini yaptı."
 klimt.423.f: "'Bamberg’i gör ve Katolik ol' Alman Romantikleri arasında bir mottodu. Gerçekten de Alman Romantizmi, aralarında birçok din değiştirenin de bulunduğu, Protestan düşünürlerden çok Katolik düşünürlerden etkilenmiş nadir dönemlerden biriydi. Benzer şekilde Roma da şüphecileri Kilise’nin saflarına katmıştı. Bu, ilerleme ve bilimin toplumda ön planda olduğu materyalist bir çağda şaşırtıcı görünebilir, ancak tam da buna bir karşı tepki ihtiyacı, nihayetinde bir hedonisti manastıra yönlendirmişti."
 klimt.423.g: "Umarım bu Madonna’nın ucuz bir resmi değildir."
 klimt.423.tt: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName], tüm olumsuz bağımlılık özelliklerini kaybeder ve eğer hâlâ Katolik değilse #YELLOW Katolikliğe#! geçer."
 klimt.424.t: "Detaylara Dikkat"
 klimt.424.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName], [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]’da resim tekniğini geliştirmesine yardımcı olacak bir realizm ustası buldu. Ancak bu aylar sürecek — ve ücret de oldukça yüksek."
 klimt.424.f: "'Resim esasen somut bir sanattır ve yalnızca gerçek ve mevcut şeylerin temsillerinden oluşabilir.' -Gustave Courbet"
 klimt.424.g: "Bu biraz zaman alabilir, ama değer."
 klimt.424.h: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName], ustadan takdir kazanmayı hedeflemeli."
 klimt.425.t: "Sınırsız İlham"
 klimt.425.f: "'Empresyonizmin ortaya çıkışından bu yana, eskiden kahverengi olan resmî salonlar mavi, yeşil ve kırmızıya dönüştü... Ama nane şekeri ya da çikolata olsun, hâlâ birer şekerleme.' -Claude Monet"
 klimt.425.g: "Bu yeni fikirler onu sayısız tablo yapmaya ilham edecek."
 klimt.425.h: "Bu yeni fikirler kültürümüze de ilham kaynağı olmalı."
 klimt.426.t: "Bir Sanatçının Hayatı"
 klimt.426.d: "[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]’daki incelikli yaşam, [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] üzerinde de iz bıraktı. [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe|U] sık sık barlarda ve meyhanelerde vakit geçiriyor — ve yaratıcılığını artırmak için uyarıcılar kullanıyor. Bir iki sarhoşluk olmadan, [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe], iş yükünü bu kadar kısa sürede tamamlayamazdı."
 klimt.426.f: "'İlk bardaktan sonra, şeyleri olmasını istediğiniz gibi görürsünüz.\nİkinci bardaktan sonra, şeyleri aslında olmadıkları gibi görürsünüz.\nSonunda ise şeyleri gerçekten oldukları gibi görürsünüz,\nbu da dünyadaki en korkunç şeydir.' -Oscar Wilde"
 klimt.426.g: "Eğer bu onun sanatına ilham veriyorsa — sorun nerededir ki?"
 klimt.426.h: "O zaman sadece daha uzun sürer."
 klimt.427.t: "Bir Sanatçının Zaafı"
 klimt.427.d: "[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]’den endişe verici raporlar alıyoruz. [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]’in bağımlılıkları korkutucu boyutlara ulaşıyor. Görünüşe göre [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe], yokluğunu zaaflarına ve sefahate kapılarak geçiriyor, bu da sağlığını ciddi şekilde zorluyor."
 klimt.427.f: "Camille Pissarro, Henri de Toulouse-Lautrec, Paul Gauguin, Oscar Wilde ve Charles Baudelaire — hepsi absinthe sarhoşluğunun kurbanı oldular. Aynı şey Vincent van Gogh için de geçerliydi. Öte yandan Gabriele D'Annunzio, erotik maceralar arıyordu. Jean Cocteau ise kendisi için afyonu keşfetti ve kullanımını, etkilerini anlatan bir günlük yazdı. Çoğu durumda bu bağımlılıkların ve zaafların öz-yıkıma ve erken ölüme yol açması, sanatçıların yaşamlarının trajik bölümlerinden biridir."
 klimt.427.g: "Her sanatçının bir zaafı vardır."
 klimt.427.h: "Müdahale etmeliyiz!"
 klimt.427.tt: "Eğitim gezisi iptal edildi. [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName], [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]’deki ajanlarımız tarafından gözaltına alındı ve [GetPlayer.GetName]’e geri getirildi. Önümüzdeki altı ay boyunca orada rehabilitasyona alınacak."
 klimt.428.t: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] yeniden müsait"
 klimt.428.d: "Birkaç aylık aranın ardından ressamımız, günlük işlerine geri döndü. [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName] yaşam tarzından vazgeçmedi, ama en azından daha kötü bir şeyin önüne geçilebildi."
 klimt.428.f: "'Bir adam kaçırma mı? Hayır, hayır, monsieur, bu bir müdahaleydi. Kaçırma, acınız için yapılırdı, müdahale ise sadece iyiliğiniz için başlatılır... ne demek, sizin için neyin en iyi olduğunu bilmediğimizi söylüyorsunuz?'"
 klimt.428.g: "Umarım işler artık normale döner."
 klimt.431.t: "Veduta"
 klimt.431.d: "Ev sahibi şehir [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]’in güzelliğinden ilham alan ressamımız, eğitim gezisinde ustaca bir veduta tablosu yapmaya başladı. Ancak bu, [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] kalışını biraz uzatabilir."
 klimt.431.f: "Veduta, genellikle büyük boyutlu ve son derece detaylı bir kent manzarası ya da başka bir manzara resmidir; çoğunlukla baskı olarak yapılır. Veduta ressamlarına vedutisti denir. 19. yüzyılın sonlarında, topografik doğruluğu sağlayan bu tür resimler (ve daha sonra fotoğraflanmış panoramalar), yerini kent manzaralarının daha kişisel 'izlenimlerine' bıraktı. Bu dönemin en önemli veduta ressamları arasında David Roberts ve Eduard Gaertner sayılabilir."
 klimt.431.g: "Harikulade bir fikir."
 klimt.431.h: "Çalışmaya odaklansın."
 klimt.432.t: "Ressamlar Topluluğu"
 klimt.432.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName], [SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]’in yerel sanatçı grubuna içlerinden biriymiş gibi kabul edildi."
 klimt.432.f: "'Yalnız kalmalı ve yalnız olduğumu bilmeliyim ki doğayı tam anlamıyla tefekkür edebileyim ve hissedebileyim; beni kuşatan şeye kendimi bırakmalı, bulutlarımla ve kayalarımla kaynaşmalı, böylece olduğum şey olmalıyım. Doğayla diyaloğum için yalnızlık vazgeçilmezdir.' -Caspar David Friedrich"
 klimt.432.g: "Resim dünyasının takdirine ihtiyacımız var."
 klimt.433.t: "Hızlı Kavrayış"
 klimt.433.d: "[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]’deki eğitim yolculuğunda sanatçımız beklenenden daha hızlı ilerleme kaydediyor. Belki de [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe] daha erken dönebilir."
 klimt.433.f: "'Yetenek, yapmak istediği her şeyi yapar. Deha ise yalnızca yapabileceğini yapar.' -Eugène Delacroix"
 klimt.433.g: "Yetenek ilk bakışta belli olur."
 klimt.434.t: "Sanat Tüccarı"
 klimt.434.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] eğitim konaklaması sırasında [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName], birkaç eser satabilecek ünlü bir sanat tüccarı buldu."
 klimt.434.f: "'Ben son derece ciddi bir iş adamıyım. Rakiplerimin, sahte eser sattığıma dair iftiraları sadece kıskançlıktandır. Şimdi sizi bu resim hakkında heyecanlandırabilir miyim? Gerçek bir Leonardo da Vinci: Sistine Degu’lu Hanım. Bir nadirlik! Böyle bir teklif bir daha asla gelmez!'"
 klimt.434.g: "Biraz tablo satın al."
 klimt.434.h: "İkinci sınıf yabancı mallara ihtiyacımız yok."
 klimt.435.t: "En Son Moda"
 klimt.435.d: "[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]’deki eğitim yolculuğunda sanatçımız, daha önce [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] için bilinmeyen yeni modalar, yeni mimari stiller ve yeni eğlenceler öğrendi."
 klimt.435.f: "'İngiltere’den gelen adamlar, Manş Denizi’nin öte yakasındaki insanların her ne kadar aklı başında olsalar da çocukça zevklerden hâlâ çok hoşlandıklarını şaşkın arkadaşlarına anlatmayı biliyorlardı. Böylece gençler çayırlarda deri bir topa tekme atarak eğleniyor, diğerleri halı tokmağına benzeyen bir şeyle topu bir ağın üzerinden geçiriyor ve bu çılgınlık her kalabalıkta seyirci topluyor. Aralarında makam ve mevki sahibi insanlar da var — ve bazen kendilerini işin içine katmaktan geri durmuyorlar.'"
 klimt.435.g: "Yeni kültürün taze esintisi."
 klimt.435.h: "Ama gerçekten ruhun çağını körü körüne takip etmek doğru mu?"
