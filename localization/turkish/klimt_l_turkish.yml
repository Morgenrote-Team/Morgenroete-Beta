 klimt_recently_hired_independent_painter_modifier: "Yakın Zamanda Bağımsız Ressam Tutuldu"
 klimt.2.f: "Yaklaşık 40 yaşına geldiğinde bir [concept_klimt_painter], eğitimini tamamlamış sayar ve sonunda tercih ettiği resim tarzına yerleşir. Genel kural, bu tarzın en modern akıma dayanmasıdır; Art Nouveau en modern, Klasisizm ise en arkaik sanat formudur. Uzmanlaşmış bir resim tarzına sahip ressam, belirli koşullar altında bu tarzda başyapıtlar yaratır. Ayrıca zevkine uygun bir galeride sanat koleksiyonu başlatabilirsin. Uzmanlaşmış bir ressam, resim eğitimini tamamlanmış kabul eder ve artık eğitim yolculuklarına çıkmaz."
 klimt.2.g: "Resim tarzı artık olgunlaştı."
 klimt.10.t: "Galeri Açıldı"
 klimt.10.d: "Yeni atanan müdür, yeni sanat galerisini kutlama töreniyle açtı. Onur konuklarından biri memnuniyetle katılım sağlayan [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] idi."
 klimt.10.f: "Ulusal bir galeri inşası birçok olasılığı beraberinde getirir. Uzmanlaşmış ressamlar otomatik olarak kendi zevklerine uygun bir sanat koleksiyonu oluşturur. Buna göre, Romantik tarzı bırakmış olan sanatçılar Romantik resimlerden oluşan bir koleksiyon yapacaktır. Böyle bir sanat koleksiyonu, bir başyapıtla zenginleştirilerek mükemmel bir koleksiyona dönüştürülebilir. Başyapıtlar, bu sanat hareketine ait sanatçılar tarafından zamanla rastgele yapılabileceği gibi yurtdışından da edinilebilir."
 klimt.10.g: "Sonunda bu eşyaları tavan arasında saklamak zorunda kalmayacağız!"
 klimt.20.t: "Ulusal Galeri"
 klimt.20.d: "Bir dönemi tanımlayan başyapıtlar sanat galerisinde sergileniyor. Şu anda sahip olduğumuz eşsiz tablolar şunlardır:"
 klimt.20.none: "Şu anda Ulusal Galeri’de hiçbir başyapıtımız yok."
