 klimt.11.t: "Bir Galerinin Dağıtılması"
 klimt.11.d: "Hükûmet artık [SCOPE.sState('klimt_gallery_state').GetName]’de bir Ulusal Galeri’yi garanti edemez. Onu dağıtmaya ve en önemli eserleri başkentimize aktarmaya karar verildi."
 klimt.11.f: "Eğer başkent dışında bir Ulusal Galeri varsa, otomatik olarak dağıtılacak ve kendi Ulusal Galerisi’nde sergilenecek. Henüz bir Ulusal Galeri yoksa, yenisi inşa edilecek."
 klimt.11.g: "Bu seçkin tablo koleksiyonu Ulusal Galerimizi zenginleştirecek."
 klimt.11.h: "Koleksiyonu yeni bir Ulusal Galeri inşası için temel olarak al."
