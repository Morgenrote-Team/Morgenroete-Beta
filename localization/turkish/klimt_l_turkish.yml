 klimt.403.d: "[GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName], eğitim gezisinden döndü ve beraberinde yeni deneyimler, yeni bilgiler ve yeni ilham getirdi. Ayrıca sanat dünyasındaki itibarını da bir nebze geliştirdi."
 klimt.425.d: "[SCOPE.sState('klimt_center_of_art_scope').GetCityHubName]’e gelişinden bu yana, [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetFullName] yüzlerce, binlerce izlenim edindi. Uzun zamandır bir fikrin diğerini bu kadar hızlı takip ettiği olmamıştı. [GetPlayer.MakeScope.Var('klimt_painter_var').GetCharacter.GetLastName], bu yerin kendisini nasıl canlandırdığını adeta hissedebiliyor."
