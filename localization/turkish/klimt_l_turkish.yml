 klimt_painter_desc: "Bu karakterin ana uğraşı resim yapmaktır. Belki bir gün resimleri tüm dünyada tanınır?"
 klimt_great_painter: "Büyük Ressam"
 klimt_great_painter_desc: "Bu karakter dünyanın en büyük ressamlarından biridir. Resimleri bütün önemli sanat galerilerinde sergilenir ve koleksiyoncular onlara servet öder."
 klimt_spitzweg_not_funny_modifier: "Şüpheli Spitzweg"
 klimt.1300.t: "Carl Spitzweg, Zavallı Şair"
 klimt.1300.d: "Zavallı Şair (Almanca: Der arme Poet), Alman ressam Carl Spitzweg’in en bilinen ve en popüler tablosudur. 1839’da yapılmış olup üç versiyonu vardır. Erken dönem bir başyapıt olarak kabul edilir."
 klimt.1300.f: "Carl Spitzweg Alman romantik ressam ve şairdir. Biedermeier döneminin en önemli sanatçılarından biri kabul edilir. Zengin bir tüccar olan babası, Carl’ı eczacı olarak yetiştirdi. Münih Üniversitesi’nden diplomasını aldı, ancak bir hastalıktan iyileşirken resim yapmaya başladı. Spitzweg bir sanatçı olarak otodidakt idi ve Flaman ustaların eserlerini kopyalayarak başladı. İlk eserini hiciv dergilerine verdi. 1833’te bir miras aldıktan sonra kendini tamamen resme adadı. Sonraki resim ve çizimleri genellikle mizahi türdeydi. Birçok resmi keskin biçimde betimlenmiş eksantrikleri konu alır."
 klimt.1300.g: "Ahahah, komik bir ressam!"
 klimt.1300.h: "Bekle! Hiciv kime karşı?"
