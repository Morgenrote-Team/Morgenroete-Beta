 je_klimt_painter_trip: "Eğitim Yolculuğu"
 je_klimt_painter_trip_reason: "[concept_klimt_painter_trip] sırasında bir ressam, daha önce bilmediği bir sanat tarzını öğrenebilir ve böylece yıllık [concept_klimt_painting_tradition]ini geliştirebilir. Ayrıca yabancı bir [concept_artists_center_of_arts]’te bulundukları süre boyunca olumlu veya olumsuz başka özellikler de edinebilirler."
 je_klimt_painter_trip_goal: "Genellikle bir ressam eğitimini #G 12 ay#! içinde tamamlar. Olaylar bu süreyi uzatabilir veya kısaltabilir."
 je_klimt_secession: "Art Nouveau Secession"
 je_klimt_secession_reason: "Yeni sanat akımı olan Art Nouveau birçok sanatçıyı cezbetmiştir. Belirli koşullar altında, uluslararası ün kazanan ve resim ile mimariye yeni bir ivme kazandıran köklü bir sanatsal harekete dönüşebilir. Tarihsel olarak bu türün en önemli birliklerinden biri Viyana Secession’dur. Daha kesin ifadeyle, Avusturyalı Sanatçılar Birliği olan Viyana Secession, fin de siècle döneminde Viyana’daki sanatçıların birliğidir. Buradan türeyen Viyana Art Nouveau çeşidine de Secession tarzı veya Viyana Art Nouveau’su denir."
 je_klimt_secession_fail: "Başka bir ulus bizden önce Secession’u açtı."
