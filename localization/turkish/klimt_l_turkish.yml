 je_klimt_rossetti: "Ön-Rafaelist Kardeşlik"
 je_klimt_rossetti_reason: "Ön-Rafaelistler, kültürel bir kopuşu Raffaello ve Michelangelo’nun Rönesans sanatında gören bir sanatçı grubuydu. Trecento ve Quattrocento dönemi İtalyan resmini tercih ediyorlardı. Kendilerini bir reform hareketi olarak görüyorlardı. Asıl rekabetleri Rönesans sanatçılarıyla değil, onlara öykünen neoklasikçilerleydi. Özellikle Orta Çağ konularına yöneldiler. En ünlü temsilcilerinden biri Dante Gabriele Rossetti’ydi."
 je_klimt_fattori: "Macchiaioli"
 je_klimt_fattori_reason: "Macchiaioli, Empresyonizmdeki yenilikleri önceden haber veren, ancak kendi zamanlarında büyük ölçüde fark edilmemiş eşsiz bir İtalyan sanat topluluğuydu. Macchiaioli terimi, İtalyanca 'leke' anlamına gelen *macchia* kelimesinden türemiştir (ikinci anlamı çalılık, maki). En önemli temsilcisi Giovanni Fattori’ydi."
 je_klimt_barbizon: "Barbizon Okulu"
 je_klimt_barbizon_reason: "Barbizon Okulu, 19. yüzyılın ilk üçte birlik döneminin sonlarına doğru bir grup Fransız peyzaj ressamı tarafından kuruldu. Ressamlar, Fontainebleau Ormanı yakınındaki Barbizon köyünde kaldılar. Théodore Rousseau tarafından kurulan ve yaklaşık 1870’e kadar varlığını sürdüren bu ressam kolonisi, Avrupa genelinde özellikle empresyonizm üzerinde önemli bir etki bıraktı."
 klimt.501.t: "Ön-Rafaelistler"
 klimt.501.d: "Ön-Rafaelistlerle birlikte, klasisizm ve realizme karşı çıkan ama aynı zamanda kendini bir reform hareketi olarak gören bir kardeşlik kuruldu. Onların desteği yeni yetenekleri ortaya çıkarabilirdi, ancak bu bizim mevcut ressamımız [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName]’in tarzıyla çelişirdi."
 klimt.501.f: "'Burada daha önce bulundum,\nAma ne zaman ya da nasıl, söyleyemem:\nKapının ötesindeki çimleri biliyorum,\nTatlı, keskin kokuyu,\nİç çekişi, kıyıdaki ışıkları.' -Dante Gabriele Rossetti"
 klimt.501.g: "Ön-Rafaelist Kardeşliği destekle."
 klimt.501.h: "[ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] çok daha iyi"
 klimt.502.t: "Macchiaioli"
 klimt.502.d: "Macchiaioli sanatçı grubu bugün Floransa’da kuruldu. Etkisi küçük olsa da, grup bazı genç sanatçılara sanatta yeni yollar aramaları için ilham veriyor."
 klimt.502.f: "'Leke (macchia), ışık önündeki cisimlerin sağlamlığıdır.' -Giovanni Fattori"
 klimt.502.g: "Yani Avangart’tan önce onlar mı avangarttı?"
 klimt.503.t: "Barbizon Okulu"
 klimt.503.d: "Théodore Rousseau’nun önderliğinde Fontainebleau yakınlarında bir ressamlar çevresinin kurulmasıyla, peyzaj resmi sanat dünyasında yeni bir ivme kazandı."
 klimt.503.f: "'Eğer resmim, ziyaret ettiğiniz yerin basit ve gerçek karakterini sadık biçimde ve aşırı inceliklere kaçmadan yansıtıyorsa, eğer... bitki örtüsü dünyasına kendi hayatını vermeyi başarırsam, o zaman kış rüzgârı altında ağaçların inlediğini, yavrularını çağıran ve dağıldıklarında feryat eden kuşları duyacaksınız; eski şatonun titrediğini hissedeceksiniz; size, sevdiğiniz eşiniz gibi, onun da... yok olacağını ve birçok biçimde yeniden doğacağını söyleyecektir... İnsan gördüğünü matematiksel kesinlikle kopyalamaz, gerçek bir dünyayı hisseder ve yorumlar, onun tüm kaçınılmazlıkları sizi sımsıkı bağlar.' -Théodore Rousseau"
 klimt.503.g: "Harika Peyzajlar!"
 klimt.601.t: "[SCOPE.sCharacter('klimt_painter_scope').GetLastName]’in Ölümü"
 klimt.601.d: "Ülkemizin önde gelen sanatsal kişiliklerinden biri ve ulusal ve uluslararası düzeyde büyük saygı gören ressam [SCOPE.sCharacter('klimt_painter_scope').GetFullName] bugün öldü. Ardında doldurulması güç bir boşluk bıraktı."
 klimt.601.f: "26 Haziran 1835’te Caspar David Friedrich felç belirtileriyle bir inme geçirdi. Teplitz’de bir tedaviye girdi; bunu ancak bazı resimlerini şair Zhukovsky aracılığıyla Rus çarının sarayına satarak karşılayabildi. Tedaviden sonra Friedrich yeniden resim yapmaya başladı, bu da ona zorluk çıkardı. Yine de 1835/36’da *Ay Işığında Deniz Kıyısı* adlı yağlı boya eseri ortaya çıktı. 1839’a kadar daha çok sepya desenler ve suluboyalar yaptı; daha az peyzaj, daha çok ölüm alegorileri üretti. Friedrich, 1836 ve 1838’de Dresden sanat sergilerine bazı sepya desenler gönderdi. Hayatının son yılında çalışmaları durma noktasına geldi. Friedrich, 7 Mayıs 1840’ta 65 yaşında Dresden’de öldü ve Trinity Mezarlığı’na gömüldü."
 klimt.601.g: "Peki şimdi [ROOT.Var('klimt_painter_var').GetCharacter.GetHerHis] ölüm portresini kim yapacak?"
 klimt.602.f: "Turner yaşlandıkça daha da eksantrik hale geldi. Otuz yıl boyunca birlikte yaşadığı ve atölyesinde asistanlık yapan babası dışında az sayıda yakın arkadaşı vardı. 1829’daki babasının ölümü onu derinden etkiledi ve sonrasında depresyon nöbetleri geçirdi. Turner, 19 Aralık 1851’de Chelsea’de Cheyne Walk’taki Sophia Caroline Booth’un evinde koleradan öldü. Aziz Paul Katedrali’ne, ressam Sir Joshua Reynolds’un yanına defnedildi. Son sözleri muhtemelen 'Güneş (ya da Oğul?) Tanrı’dır' oldu, ancak bunun doğruluğu kesin değildir."
 klimt.603.f: "6 Şubat 1848’de Cole ailesi, Catskill’deki Aziz Luke Episkopal Kilisesi’nde sabah ayinine katıldı. Öğle yemeğinden sonra Cole halsizlikten şikâyet etti ve gece yarısına doğru durumu kötüleşti, doktor çağrıldı. Akciğerlerinde zatürre ve iltihap gelişti. Thomas Cole, 11 Şubat 1848 Cuma günü akşam 8’de Cedar Grove’daki Büyük Ev’de öldü."
 klimt.604.f: "1862/63 kışı Delacroix için son derece çetin geçti; gittikçe kötüleşen ağır bir boğaz enfeksiyonundan muzdaripti. Champrosay’a yaptığı bir yolculukta trende bir arkadaşıyla sohbet ederken yorgun düştü. 1 Haziran’da Paris’e dönüp doktoruna göründü. İki hafta sonra, 16 Haziran’da iyileşmeye başladı ve kırsaldaki evine döndü. Ancak 15 Temmuz’a gelindiğinde yeniden hastalanmıştı; doktoru artık yapacak bir şey olmadığını söyledi. O dönemde yiyebildiği tek şey meyveydi. Delacroix durumunun ciddiyetini anladı ve her arkadaşına bir hediye bıraktığı vasiyetini yazdı. Güvendiği hizmetçisi Jenny Le Guillou’ya geçinmesi için yeterli para bıraktı ve atölyesindeki her şeyin satılmasını emretti. Ayrıca, 'ölü maskesi, çizim ya da fotoğraf yoluyla' hiçbir şekilde yüzünün tasvir edilmemesini açıkça yasaklayan bir madde ekledi. Delacroix 13 Ağustos’ta öldü."
 klimt.605.f: "Eckersberg’in yaşamının son yıllarında görme yetisi zayıflamaya başladı. Bu, sonunda resim yapmayı tamamen bırakmasına neden oldu. 22 Temmuz 1853’te, büyük kolera salgını sırasında Kopenhag’da koleradan öldü. Kopenhag’daki Assistens Mezarlığı’na gömüldü."
 klimt.901.t: "[GetPlayer.GetNameNoFlag]’in Gökkubbesi"
 klimt.901.d: "[GetPlayer.GetNameNoFlag], astronomi alanında önde gelen bir ulus. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName]’in olağanüstü keşifleri, [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]’i gece gökyüzünü ve kozmosu resmeden bir tablo yapmaya ilham verdi."
 klimt.901.f: "Bir ulusun dönüm noktaları ressamları da etkiler. Olağanüstü kültürel olaylar, teknolojik gelişmeler ve bilimsel keşifler sanatçıları bunları sonsuzluğa tuvalde aktarmaya yönlendirebilir."
 klimt.901.g: "Harika!"
 klimt.902.t: "Pasifik’in Hazineleri"
 klimt.902.d: "Pasifik’ten dönen bir keşif gezisi iz bıraktı: egzotik eşyalar, büyüleyici sanat hazineleri, yeni okyanusbilimsel bilgiler ve vahşi hayvanlar [GetPlayer.GetNameNoFlag]’a ulaştı. [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName], ulusumuzun keşfetme ve araştırma iradesini sergileyen bir tablo yapmaya ilham aldı."
 klimt.903.t: "Oryantal Sanat"
 klimt.903.d: "Ortadoğu’ya düzenlenen artan keşifler, toplumda 'Oryantalizm' olarak tanımlanabilecek bir sanat akımı için coşku uyandırdı. [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName] de Doğu’nun büyüsüne kapıldı ve 1001 Gece’den esinlenen fantastik bir tablo yaptı."
 klimt.904.t: "Yeni Bir Çağın İvmesi"
 klimt.904.d: "[GetPlayer.GetNameNoFlag], göklerin fethinde öncü. Uçaklar ve zeplinler gibi yeni makineler gökyüzünü dolduruyor. Her gün yeni rekorlar kırılıyor ve pilotlarımız ulusal kahramanlar olarak görülüyor. [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName], bu yeni çağın ruhunu renklere döktü ve teknolojinin, iradenin ve kahramanlığın zaferini kutladı."
 klimt.905.t: "Kaplan ve Aslanlı Portre"
 klimt.905.d: "Son hayvanat bahçesi ziyaretinde [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName], [GetPlayer.GetNameNoFlag]’ın dünyanın dört bir yanından başkente getirdiği egzotik hayvanları ilk elden görme fırsatı buldu. Nitelikli bir zoolog olan Prof. [ROOT.Var('dubois_naturalist_var').GetCharacter.GetLastName], ona hayvanlar hakkında ilginç bilgiler verdi. Ziyaretin sonunda [ROOT.Var('klimt_painter_var').GetCharacter.GetSheHe|U], olağanüstü bir otoportre yaptı."
 klimt.906.t: "Dinozor Çizimleri"
 klimt.906.d: "Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName]’in başarılarından esinlenen [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName], yok olmuş sürüngenlere bir tabloda yeniden hayat vermeye çalıştı."
 klimt.907.t: "Ormanın Sırları"
 klimt.907.d: "Yucatan’daki arkeolojik keşifler ve Prof. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] gibi araştırmacıların yeni Maya yerleşimlerini bulduğu maceralı koşullar, [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]’i keşiflerimizi resimlerle ölümsüzleştirmeye yöneltti."
 klimt.908.t: "[ROOT.Var('elgar_composer_var').GetCharacter.GetFullName]’in Portresi"
 klimt.908.d: "Maestro [ROOT.Var('elgar_composer_var').GetCharacter.GetLastName]’in bitmek bilmeyen çalışmaları ve sürekli yeni zirvelere ulaşan eserleri, [ROOT.Var('klimt_painter_var').GetCharacter.GetLastName]’i bestecinin bir portresini yapmaya ilham verdi. Eşi benzeri olmayan müziği kadar bu tablo da onun ününü artıracak."
 klimt.911.t: "[SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle]’in Portresi mi?"
 klimt.911.d: "[GetPlayer.GetNameNoFlag]’ın devlet başkanlarının resmi galerisi hâlâ [SCOPE.sCharacter('klimt_ruler_scope').GetFullName]’in portresinden yoksun. [ROOT.Var('klimt_painter_var').GetCharacter.GetFullName], hükümdarı uygun şekilde ölümsüzleştirmek için bariz bir aday olarak görülüyor."
 klimt.911.f: "Her görev döneminde bir ressamdan hükümet başkanı ya da devlet başkanının portresini yapması istenebilir. Başarılı olup olmayacağı, ilgili sanatçının ününe bağlıdır."
 klimt.911.g: "Bir portre yap."
 klimt.911.h: "Ya kötü olursa – bedelini kim ödeyecek?"
 klimt.912.t: "Tuhaf Bir Portre"
 klimt.912.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName], [SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle]’in portresini bugün halka sundu. Bazı sanatçılar eserin 'cüretkârlığını' ve 'yeniliğini' övse de, hükümetin bazı kesimleri dehşete düştü."
 klimt.912.f: "'Bu iğrenç!'\n'Buna Kübizm deniyor, efendim.'"
 klimt.912.g: "Sanat sanattır."
 klimt.912.h: "O tabloyu yok edin!"
 klimt.913.t: "Büyük Bir Portre"
 klimt.913.d: "[ROOT.Var('klimt_painter_var').GetCharacter.GetFullName], [SCOPE.sCharacter('klimt_ruler_scope').GetPrimaryRoleTitle] portresinde kendini aştı. Tablo derhal büyük beğeni topladı ve en iyi eserlerinden biri olarak kabul edildi."
 klimt.913.f: "'Altı buçuk fit boyunda, Herkül gibi kaslı, Napolyon gibi kararlı bakışlı, Afrodit gibi yüzlü – evet, doğru, bu benim! Sanatçıyı paraya boğun.'"
