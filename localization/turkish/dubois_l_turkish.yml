 dubois.1322.d: "Ne yazık ki, [ROOT.Var('dubois_breeding_state_var').GetState.GetName]’deki [concept_dubois_nature_reserve] içinde yeni ve istikrarlı bir [concept_dubois_habitat] kurma girişimimiz başarısız oldu. İstersek tekrar deneyebilir ve bu sefer daha şanslı olmayı umabiliriz."
 dubois.1322.f: "Bu [GetPlayer.MakeScope.GetCountry.GetCustom('dubois_breeding_animal_type')] kaybına yas tutuyoruz."
 dubois.1322.g: "Ne üzücü bir gün."
 dubois.2001.t: "Paleontoloji Koleksiyonu"
 dubois.2001.d: "Paleontoloji Koleksiyonuna hoş geldiniz."
 dubois.2001.f_paleontologist: "Koleksiyonumuz şu anda [concept_dubois_paleontologist] [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] tarafından yönetilmektedir. Koleksiyon şunları içeriyor:\n\n#G [ROOT.Var('dubois_fossil').GetValue]#! @dubois_fossil! Fosil\n\n#G [ROOT.Var('dubois_special_fossil').GetValue]#! @dubois_special_fossil! Özel Fosil\n\n#G [ROOT.Var('dubois_human_fossil').GetValue]#! @dubois_human_fossil! İnsan Fosili\n\n#G [ROOT.Var('dubois_dinosaur_bone_total').GetValue]#! @dubois_dinosaur_bone! Dinozor Kemiği\n\n#G [ROOT.Var('dubois_dinosaur_skeleton').GetValue]#! @dubois_dinosaur_skeleton! Dinozor İskeleti\n\nSergilenen tüm dinozor iskeletlerimiz için #T Dinozor Derecemiz#!: [ROOT.Var('dubois_dinosaur_rating').GetValue]."
 dubois.2001.f_no_paleontologist: "Koleksiyonumuz şu anda #R kimse#! tarafından yönetilmiyor. Koleksiyon şunları içeriyor:\n\n#G [ROOT.Var('dubois_fossil').GetValue]#! @dubois_fossil! Fosil\n\n#G [ROOT.Var('dubois_special_fossil').GetValue]#! @dubois_special_fossil! Özel Fosil\n\n#G [ROOT.Var('dubois_human_fossil').GetValue]#! @dubois_human_fossil! İnsan Fosili\n\n#G [ROOT.Var('dubois_dinosaur_bone_total').GetValue]#! @dubois_dinosaur_bone! Dinozor Kemiği\n\n#G [ROOT.Var('dubois_dinosaur_skeleton').GetValue]#! @dubois_dinosaur_skeleton! Dinozor İskeleti\n\nSergilenen tüm dinozor iskeletlerimiz için #T Dinozor Derecemiz#!: [ROOT.Var('dubois_dinosaur_rating').GetValue]."
