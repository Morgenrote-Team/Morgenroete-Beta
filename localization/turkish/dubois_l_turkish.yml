 dubois.128.d: "Hayvanat bahçemiz, yeni, egzotik bir hayvanla zenginleşti: bugün uzun zamandır beklenen #O Elk#! yeni kafesine taşındı."
 dubois.128.f: "Avrupa Elk'i, Kuzey Amerika'da Moose olarak bilinen, geyik ailesinin en büyük üyesidir. Avrupa ve Asya ormanlarına özgü olan bu yalnız devler, yıllık olarak dökülüp yeniden büyüyen dev boynuzlarıyla bilinir. Elksler, yapraklar, kabuklar ve su bitkileriyle beslenirler. Boyutlarına rağmen, çevik ve soğuk, ormanlık yaşam alanlarına çok iyi adapte olurlar."
