 dubois.7.t: "Beyaz Kelebek (Peppered Moth) evrimleşiyor!"
 dubois.7.d: "Dr. [ROOT.Var('ito_naturalist_var').GetCharacter.GetLastName] noticed that the appearance of the Peppered Moth changed in the recent years which is clear evidence for the Theory of Evolution."
 dubois.7.f: "\"Beyaz Kelebek’in yaşadığı huş ağaçları kirlilikten dolayı gittikçe kararırken, koyu renkli kelebeklerin sayısının belirgin şekilde arttığını görebiliyoruz. Daha görünür oldukları için yırtıcılar tarafından daha çok beyaz kelebek yeniyor ve böylece koyu renkli olanlar baskın hale geliyor.\nBu, kısa bir sürede evrimin açık bir kanıtıdır. Gözlemlerim büyüleyici ve Evrim Teorisi’nin kesinlikle doğru olduğunu ispatlıyor.\"\n\n#b Tarihsel olarak#!, Beyaz Kelebek’in renk değişimine dair evrimsel kayma ilk kez 1848’de Manchester’da fark edildi. 1896’da J. W. Tutt bunun doğal seçilim sonucu olduğunu gösterdi.\nGünümüzde hava temizlenip huş ağaçlarının çoğu yeniden beyaz hale geldiği için kelebeklerin beyaz fenotipi yeniden baskın hale gelmiştir."
 dubois.7.g: "Evrime dair açık kanıt!"
