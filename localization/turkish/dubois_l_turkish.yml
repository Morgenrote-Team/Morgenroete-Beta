 je_dubois_paleontological_expedition_reason: "Paleontolog, bir [concept_dubois_paleontological_expedition] gerçekleştiriyor.\n$mr_divider_for_je$\nKeşfi tamamlamak 12 ay sürecektir. Tamamlandığında, Keşif #V Başarı#! değerine göre [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] ve [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] elde edeceksiniz.\n$mr_divider_for_je$\nHer ay küçük bir #V Başarı Şansı#! eklenir. Ayrıca rastgele olaylar başarıyı artırabilir veya azaltabilir.\n\nMevcut tahmin edilen aylık Başarı değişikliği: #underline #tooltip:[GetRawTextTooltipTag('je_dubois_paleontological_expedition_monthly_progress_tt')] [Country.MakeScope.Var('dubois_paleontological_expedition_estimated_progress_var').GetValue|2+] #!#! (Maksimum: 1)\n$mr_divider_for_je$\nEğer bir [concept_dubois_paleontological_team] boşta ise bir [concept_dubois_paleontological_excavation] kurabileceksiniz. Bir Kazı, daha fazla Fosil ve Kemik üretir.\n$mr_divider_for_je$\nKeşiften elde edilecek şu anki #tooltip:[GetRawTextTooltipTag('je_dubois_paleontological_expedition_yield_tt')] #underline #b tahmini verimlilik#!#!#!:\n[GetPlayer.GetCustom('je_dubois_paleontological_expedition_yield_type')]"
 je_dubois_paleontological_expedition_yield_tt: "You gain more fossils and bones depending on your #V Success Chance#!:\n0 - 3:     $je_dubois_paleontological_expedition_yield_level_1_loc$\n4 - 7:     $je_dubois_paleontological_expedition_yield_level_2_loc$\n8 - 11:   $je_dubois_paleontological_expedition_yield_level_3_loc$\n12 - 14: #p 4#! @dubois_fossil!  [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] and #p 1#! @dubois_dinosaur_bone! [concept_dubois_dinosaur_bone]\n15:         #p 5#! @dubois_fossil!  [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] and #p 2#! @dubois_dinosaur_bone! [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')]\n"
