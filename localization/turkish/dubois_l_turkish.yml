 dubois.158.d: "Hayvanat bahçemiz, yeni, egzotik bir hayvanla zenginleşti: bugün uzun zamandır beklenen #O Tazmanya Kaplanı#! yeni kafesine taşındı."
 dubois.158.f: "Tazmanya Kaplanı, Tazmanya ve Avustralya'ya özgü etobur bir keseli hayvandır. Kendine özgü çizgili sırtı ile tanınır ve çoğunlukla gececi bir yaşam sürer. Tazmanya Kaplanları yalnız avcılar olup, küçük memeliler ve kuşlar gibi avlarını yakalamak için gizlilik kullanırlar. Ne yazık ki, avlanma ve yaşam alanı kaybı nedeniyle, Tazmanya Kaplanı artık nesli tükenmiş olarak kabul edilmektedir."
