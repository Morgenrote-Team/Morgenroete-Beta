 dubois.2011.d_to_location: "Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] is the leading [concept_dubois_paleontologist] of our country. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe|U] is currently traveling to a rock formation to examine it more closely."
 dubois.2011.d_from_location: "Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] is the leading [concept_dubois_paleontologist] of our country. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe|U] is currently returning from a fossil hunt."
 dubois.2011.d_default: "Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] is the leading [concept_dubois_paleontologist] of our country. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe|U] currently has no assignment."
 dubois.2011.d_other: "Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] is the leading [concept_dubois_paleontologist] of our country. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe|U] is busy elsewhere at the moment."
 dubois.2011.f: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] toplam paleontolojik [concept_academics_experience] düzeyine sahip: #G [ROOT.Var('dubois_paleontologist_var').GetVariable('dubois_paleontologist_experience_var').GetValue]#!\n\nPaleontologlar her yıl oluşumlarda yeni fosiller bulabilir. Büyük Oluşumlar ayrıca iskeletleri yeniden inşa etmek için kullanılabilecek nadir dinozor kemiklerinin keşfedilme şansına da sahiptir. Bunun için [concept_dubois_paleontologist] bir oluşuma atanmalıdır. Sınırlarımız içinde herhangi bir oluşum yoksa, bir Büyük Oluşuma sahip ülkeyle Paleontolojik Lisans Anlaşması yapılabilir. Bir oluşuma atanmadığında paleontolog pasif kalır. Ancak bu süre zarfında [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe], keşiflere katılabilir, dinozor kemiklerini yeniden inşa edebilir, iskelet oluşturabilir veya iskeletleri yeniden monte edebilir."
 dubois.2011.g: "Kuzey Amerika’daki Oluşumları Araştır."
 dubois.2011.h: "Güney Amerika’daki Oluşumları Araştır."
 dubois.2011.i: "Avrupa’daki Oluşumları Araştır."
 dubois.2011.j: "Afrika’daki Oluşumları Araştır."
 dubois.2011.k: "Asya’daki Oluşumları Araştır."
 dubois.2011.l: "Avustralya’daki Oluşumları Araştır."
 dubois.2021.t: "Özel Fosiller"
 dubois.2021.d: "Bu koleksiyon, bugüne kadar bulunan en olağanüstü fosillerden bazılarını barındırıyor."
 dubois.2021_amber: "#T Kehribar#!\nReçine, milyonlarca yıllık bir böceği korumuş.\n\n"
 dubois.2021_ammonite: "#T Ammonit#!\nOn binlerce tür, 350 milyon yıl boyunca denizleri şekillendirdi.\n\n"
 dubois.2021_archaeopteryx: "#T Archaeopteryx#!\nBu 'ilkel kuş', bazı araştırmacılar tarafından sürüngenlerle kuşlar arasındaki olası bir bağ olarak kabul edilmektedir.\n\n"
 dubois.2021_composita: "#T Composita#!\nComposita, Geç Devoniyen’den Geç Permiyen’e kadar yaşamış yaygın bir türdü.\n\n"
 dubois.2021_eusthenopteron: "#T Eusthenopteron#!\nBu balığın kurumuş bir nehir yatağında hayatta kalmış olabileceği ve amfibiyenlere doğru önemli bir adımı temsil ettiği düşünülüyor.\n\n"
 dubois.2021_ichthyosaurus: "#T İhtiyozor#!\nBu sürüngen sadece bir yunusa çok benzemekle kalmıyor, aynı zamanda doğuruyordu da.\n\n"
 dubois.2021_ichthyostega: "#T Ichthyostega#!\nA possible missing link between fishes and tetrapods.\n\n"
 dubois.2021_megatherium: "#T Megatherium#!\nA Giant Ground Sloth. Unfortunately an extinct species, too.\n\n"
 dubois.2021_pterodactylus: "#T Pterodactylus#!\nMuhtemelen kıyılarda yaşamış küçük, kısa kuyruklu bir pterozor.\n\n"
 dubois.2021_smilodon: "#T Smilodon#!\nEn iyi bilinen kılıç dişli yırtıcılardan biri.\n\n"
 dubois.2021_trilobite: "#T Trilobit#!\nBu eklembacaklıların çok sayıda bulunması ve tabakalanması, onları Paleozoyik dönemi için önemli indeks fosilleri yapar."
 dubois.2041.t: "Dinozor Kemikleri"
 dubois.2041.d: "Burada fosillerden dinozor kemikleri yeniden inşa edilebilir ve dinozor kemikleri dinozor iskeletlerine dönüştürülebilir."
 dubois.2041.f: "Bir kıta bölgesinden beş dinozor kemiği ile bir [concept_dubois_paleontologist] tam bir dinozoru yeniden inşa edebilir. Deneyimli bir paleontolog ayrıca 20 fosil parçasından bir dinozor kemiğini yeniden inşa etmeyi deneyebilir. Bir dinozor kemiği ancak en az bir dinozor kemiği referans olarak mevcutsa yeniden inşa edilebilir. Herhangi bir işlem için paleontolog yorgun veya meşgul olmamalıdır. Başarı büyük ölçüde paleontolojik deneyime bağlıdır.\n\n#G [ROOT.Var('dubois_north_american_dinosaur_bone').GetValue]#! Kuzey Amerika Dinozor Kemikleri\n#G [ROOT.Var('dubois_south_american_dinosaur_bone').GetValue]#! Güney Amerika Dinozor Kemikleri\n#G [ROOT.Var('dubois_european_dinosaur_bone').GetValue]#! Avrupa Dinozor Kemikleri\n#G [ROOT.Var('dubois_african_dinosaur_bone').GetValue]#! Afrika Dinozor Kemikleri\n#G [ROOT.Var('dubois_asian_dinosaur_bone').GetValue]#! Asya Dinozor Kemikleri\n#G [ROOT.Var('dubois_australian_dinosaur_bone').GetValue]#! Avustralya Dinozor Kemikleri"
 dubois.2041.g: "Fosillerden Dinozor Kemiği Yeniden İnşa Et."
 dubois.2042.t: "Dinozor Kemiği Yeniden İnşa Edildi"
 dubois.2042.d: "Profesör [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] tam bir başarı elde etti: bilimsel bilgisi sayesinde fosil parçalarından bir dinozor kemiğini yeniden inşa edebildi."
 dubois.2042.f: "Zihinsel açıdan teşvik edici bir bulmaca gibiydi ama [concept_dubois_paleontologist]’imizin üstün yetenekleri için sorun oluşturmadı. Birkaç aylık çalışma ve sofistike kombinasyonlarla, kibrit çöpü büyüklüğündeki fosil kalıntılarından kemik parçalarını yeniden inşa ederek daha önce yalnızca dağınık kemikleri bilinen bir dinozor türünün ana bölümlerini ortaya çıkardı."
 dubois.2042.g: "Harika!"
 dubois.2043.t: "Şaşkın Profesör"
 dubois.2043.d: "Aylar süren denemelere rağmen Profesör [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName], kullanılan malzemeler açısından herhangi bir sonuç elde edemedi. Yazık oldu fosillere!"
 dubois.2043.f: "Bu parça nereye aitti? Ya bu? Ama eğer bu parça buraya aitse, o zaman diğeri artık uymuyordu. Sonunda [concept_dubois_paleontologist] dayanamadı. Tüm gece kafasını yorup uğraştı ama şimdiye kadar bulunan nesnelerden yola çıkarak dinozor iskeletinin bir zamanlar nasıl göründüğünü anlamayı başaramadı ve başaramayacaktı."
 dubois.2043.g: "Profesör fosillerimizi boşa harcadı!"
 dubois.2044.t: "Mükemmel Birleşmiş İskelet"
 dubois.2044.d: "[concept_dubois_paleontologist]’imiz iskeleti bir araya getirmede harika bir iş çıkardı ve doğa tarihi koleksiyonuna önemli bir parça ekledi."
 dubois.2044.f: "Profesör, yeni monte edilen dinozor iskeletini halka sunduğunda sergiyi gürültülü bir alkış doldurdu. Böylece uzmanları yıllardır meşgul eden bazı sorunları çözdü ve dinozor kemiklerini yorumlamada tamamen yeni bir yaklaşım ortaya koydu. Orada bulunan uluslararası paleontologlar profesörle konuşmak ve kendi koleksiyonlarında da benzer buluntular inşa etmek istediler. Hatta bazıları [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]’i bir yapboz dâhisi olarak nitelendirdi, çünkü diğerlerinin onlarca yılda başardığını anında yapmayı başarmıştı."
 dubois.2044.g: "Mükemmel iş, Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName]."
 dubois.2045.t: "Kusurlu Monte Edilmiş İskelet"
 dubois.2045.d: "Profesör [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] elinden gelenin en iyisini yaptı, fakat ne yazık ki monte edilen dinozor iskeletinde bazı hatalar var."
 dubois.2045.f: "Yeni dinozor iskeleti doğa tarihi koleksiyonunda sunulduğunda kibar ama oldukça çekingen bir alkış duyuldu. Ülkenin önde gelen paleontoloğu her şeyi denemiş olsa da, meslektaşları sunum günü bazı kusurlar keşfetti ve bu da çalışmanın etkisini gölgeledi. Yine de iskelet en azından genel hatlarıyla gereklilikleri karşılıyor ve sergiyi zenginleştirmeli, hatta ilerleyen yıllarda biraz rötuş gerekse de."
 dubois.2045.g: "İdare ediyor, değil mi?"
 dubois.2046.t: "Kötü Monte Edilmiş İskelet"
 dubois.2046.d: "[ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName] tarafından bir araya getirilen iskelet uzmanları… hayrete düşürdü. Fakat Paleontoloji Derneği’nin umduğu şekilde değil."
 dubois.2046.f: "Etkinliğin tuhaflığıyla zirveye çıkan unutulmaz bir gündü. Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName], yeni dinozor iskeletini bir brandanın altından dramatik hareketlerle açtı ve coşkulu alkış bekledi. Ama bunun yerine: sessizlik. Ardından fısıldaşmalar. Daha sonra: gülüşmeler. Araştırmacılar gülümsemeye başladı, bazıları kendini toparlamaya çalıştı, en sonunda ise bir meslektaş yarı gülerek, yarı inanamayarak derme çatma yaratığı işaret edip bağırdı: 'Bu üç başlı bir dinozor mu?!'"
 dubois.2046.g: "Bu herhalde bir şaka!"
 dubois.2051.t: "Dinozor İskeletleri"
 dubois.2051.d: "Dinozor iskeletleri, her doğa tarihi koleksiyonunun gurur kaynağıdır. Kusursuzca monte edilen iskeletler Dinozor Puanımız üzerinde olumlu etkiye sahiptir."
 dubois.2051.f: "Dinozor koleksiyonumuz şu iskeletlerden oluşuyor:\n\n"
 dubois.2051.ankylosaurus: "Ankylosaurus"
 dubois.2051.diplodocus: "Diplodocus"
 dubois.2051.triceratops: "Triceratops"
 dubois.2051.tyrannosaurus: "Tyrannosaurus Rex"
 dubois.2051.stegosaurus: "Stegosaurus"
 dubois.2051.antarctosaurus: "Antarctosaurus"
 dubois.2051.argyrosaurus: "Argyrosaurus"
 dubois.2051.iguanodon: "Iguanodon"
 dubois.2051.plateosaurus: "Plateosaurus"
 dubois.2051.giraffatitan: "Giraffatitan"
 dubois.2051.spinosaurus: "Spinosaurus"
 dubois.2051.psittacosaurus: "Psittacosaurus"
 dubois.2051.velociraptor: "Velociraptor"
 dubois.2051.muttaburrasaurus: "Muttaburrasaurus"
 dubois.2051.rhoetosaurus: "Rhoetosaurus"
 dubois.2051.g: "Kuzey Amerika İskeletlerini Ziyaret Et."
 dubois.2051.h: "Güney Amerika İskeletlerini Ziyaret Et."
 dubois.2051.i: "Avrupa İskeletlerini Ziyaret Et."
 dubois.2051.j: "Afrika İskeletlerini Ziyaret Et."
 dubois.2051.k: "Asya İskeletlerini Ziyaret Et."
 dubois.2051.l: "Avustralya İskeletlerini Ziyaret Et."
 dubois.2101.t: "Geliştirilmiş Bir İskelet"
 dubois.2101.d: "[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')]’imizin çabaları meyvesini verdi: daha önce kusurlu olan iskelet önemli ölçüde iyileştirildi."
 dubois.2101.f: "Profesör [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName], tarih öncesi hayvanı, onun hareketlerini, ekolojik çevresini ve birçok başka unsuru düşündükten sonra, bazı kemikleri doğru yere koyma fikrine ulaştı. Böylece tüm iskelet ciddi ölçüde geliştirildi."
 dubois.2101.g: "Çok daha iyi görünüyor!"
 dubois.2102.t: "Değişmeden Kalan İskelet"
 dubois.2102.d: "İskeleti geliştirmek için birçok denemeye rağmen [concept_dubois_paleontologist]’imiz başarılı olamadı."
 dubois.2102.f: "Profesör [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName], iskeletin üzerinde büyük bir özenle çalıştı. Fazla tahribat yaratmamak ve temkinli ilerlemek için o kadar dikkatli davrandı ki neredeyse hiçbir şeyi değiştirmedi."
 dubois.2102.g: "Hiç değişmedi mi? Bu [concept_dubois_paleontologist] tam olarak ne için maaş alıyor?"
 dubois.2103.t: "Daha da Bozulmuş İskelet"
 dubois.2103.d: "Belki de [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetFullName]’in bir dinozor iskeleti üzerinde çalışmaması daha iyi olurdu."
 dubois.2103.f: "Profesör [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName], iskeletin 'revize edilmiş versiyonunu' sunduğunda herkes için son derece şaşırtıcıydı. Özellikle de artık bir kalçanın omuzlardan birine oturması ve hayvana alın bölgesinden çıkan görkemli bir ikinci kuyruğun eklenmiş olması nedeniyle."
 dubois.2103.g: "O ahmak işi daha da berbat etti!"
 dubois.2111.t: "Kuzey Amerika Dinozor Bölümü"
 dubois.2111.d: "Hangi dinozor iskeleti ziyaret edilsin?"
 dubois.2111.f: "Kuzey Amerika dinozorları kendi türlerinin en bilinenleri arasındadır. 19. yüzyılın sonlarında Morrison Oluşumu’nda çok sayıda dinozor türü bulundu. Tanınmış örnekler Ankylosaurus, Diplodocus, Triceratops ve Tyrannosaurus Rex’tir."
 dubois.2111.g: "Ankylosaurus."
 dubois.2111.h: "Diplodocus."
 dubois.2111.i: "Triceratops."
 dubois.2111.j: "Tyrannosaurus Rex."
 dubois.2111.k: "Stegosaurus."
 dubois.2112.t: "Ankylosaurus"
 dubois.2112.f: "Ankylosaurus, Geç Kretase döneminde yaklaşık 68 ila 66 milyon yıl önce yaşamış dikkat çekici bir zırhlı dinozor cinsidir. Otçul dinozorlar grubu olan ankylosauridlerin bir üyesi olan bu tarih öncesi canlı, kendine has ve etkileyici savunma adaptasyonlarıyla tanınır.\nSağlam ve yoğun şekilde zırhlı vücuduyla tanınan Ankylosaurus’un gövdesi, derisine gömülü kemiksi plakalar (osteodermler) ile kaplıydı ve bu da onu olası yırtıcılara karşı güçlü şekilde koruyordu. En ikonik özelliği ise kuyruğunun ucunda yoğun kemikten oluşan bir topuzdu. Bu yapı muhtemelen hem saldırganlara karşı caydırıcıydı hem de tür içi çatışmalarda bir silah olarak kullanılıyordu.\nYaklaşık 6 ila 9 metre uzunluğa sahip olan Ankylosaurus dört ayaklı bir otoburdu ve geniş gagasıyla bitkileri koparıyordu. Küçük kafası, devasa gövdesine kıyasla, düşük seviyedeki bitkiler ve çalılarla beslenmede seçici bir diyet uyguladığını gösterir."
 dubois.2113.t: "Diplodocus"
 dubois.2113.f: "Diplodocus, Geç Jura döneminde yaklaşık 154 ila 152 milyon yıl önce yaşamış devasa, uzun boyunlu dinozorların simgesel bir cinsidir. Bir sauropod olarak sınıflandırılan Diplodocus, olağanüstü uzun boynu ve devasa boyutuyla tarih öncesi yaşamın görkemini temsil eder.\nKendine has vücut planıyla öne çıkan Diplodocus, uzun boyun ve kuyruk ile nispeten küçük bir kafaya sahipti. Bu kafada, bitkiyle beslenmeye uygun çivi benzeri dişler bulunuyordu. 27 metreye varan uzunluğuyla, yeryüzünde yaşamış en uzun kara hayvanlarından biri sayılır. Görece hafif iskeleti ve dört ayaklı duruşu hareket kabiliyetini kolaylaştırıyordu.\nDiplodocus’un otobur olduğu, uzun boynunu kullanarak yerden yüksekteki bitkilere ulaştığı ve böylece diğer otoburlarla rekabetten kaçındığı düşünülmektedir. Fosil bulguları, bu dinozorların nehir kıyılarındaki bitki açısından zengin bölgelerde yaşamış olabileceğini göstermektedir."
 dubois.2114.t: "Triceratops"
 dubois.2114.f: "Triceratops, Geç Kretase döneminde yaklaşık 68 ila 66 milyon yıl önce yaşamış boynuzlu dinozorların simgesel bir cinsidir. Ceratopsid ailesine mensup Triceratops, yüzündeki boynuzları ve kafasının arkasındaki kemiksi fırfırıyla tanınır.\nGüçlü savunma özellikleriyle öne çıkan Triceratops, büyük ve sağlam bir vücuda, burnunun üzerinde belirgin bir burun boynuzuna ve gözlerinin üstünde iki uzun kaş boynuzuna sahipti. Fırfırı ise delikler (fenestrae) ve karmaşık desenlerle süslenmişti; bu yapıların tür tanıma, ısı düzenleme veya savaş gösterilerinde rol oynamış olabileceği düşünülmektedir.\nTriceratops, ormanlık alanlardan ovalara kadar farklı çevrelerde yaşayan dört ayaklı otçuldu. Güçlü gagası bitkileri kolayca koparmasını, kuvvetli çeneleri ise sert bitki materyalini öğütmesini sağlıyordu. Fosilleşmiş Triceratops kemikleri, bu dinozorların sürüler halinde yaşadığını ve sosyal hiyerarşiler kurmuş olabileceğini göstermektedir."
 dubois.2115.t: "Tyrannosaurus Rex"
 dubois.2115.f: "Tyrannosaurus rex, yaygın olarak T. rex olarak bilinen, Geç Kretase döneminde yaklaşık 68 ila 66 milyon yıl önce yeryüzünde dolaşmış ikonik ve devasa bir yırtıcı dinozordur. Theropod grubuna ait olan T. rex, tarih öncesi besin zincirinin en üstünde yer alarak, yaşamış en büyük kara yırtıcılarından biri olmuştur.\nAyırt edici özellikleriyle ünlü olan T. rex, 12 metreye varan uzunluğu ve 4,5 ila 6 metre yüksekliğiyle görkemli bir duruşa sahipti. Muz büyüklüğünde, tırtıklı dişlerle donatılmış devasa kafatası, diğer dinozorlarla beslenen etçil bir diyeti işaret eder. Güçlü arka bacakları hızlı hareket etmeye uygundu, orantısız derecede küçük kolları ise hâlâ bilimsel merak konusudur.\nPaleontolojik kanıtlar, T. rex’in keskin koku alma duyusu, çift gözlü görüşü ve olağanüstü çene gücü sayesinde ekosistemin zirvesinde olduğunu gösteriyor. Avcı mı yoksa leşçi mi olduğu sorusu ise hâlen tartışılmakta ve araştırılmaktadır."
 dubois.2116.t: "Stegosaurus"
 dubois.2116.f: "Stegosaurus, Geç Jura döneminde yaklaşık 155 ila 150 milyon yıl önce yaşamış otçul dinozorların ikonik bir cinsidir. Thyreophoran grubuna ait olan Stegosaurus, kendine has ve çarpıcı görünümüyle tanınır.\nSırtında çift sıra halinde dizilmiş büyük kemiksi plakaları ve kuyruğunda yer alan sivri uçlu thagomizer dikenleriyle ayırt edilir. Orta boyutlu bir dinozor olan Stegosaurus’un bu plakalarının amacı – ısı düzenleme, gösteri ya da savunma – hâlâ bilimsel tartışma konusudur.\n9 metreye kadar uzunluğa sahip olan Stegosaurus, küçük kafasıyla dikkat çeker. Gaga ve yanak dişleri, bitkileri koparıp öğütmesine uyum sağlamıştır. Muhtemelen yere yakın bitkilerle besleniyordu.\nStegosaurus fosilleri özellikle Kuzey Amerika’nın batısında, Colorado ve Utah’ta bulunmuştur. Bu bulgular thyreophoran dinozorların anatomisi, davranışı ve evrimsel tarihi hakkında değerli bilgiler sunar. Stegosaurus’un ayırt edici görünümü, onu hem paleontoloji hem de popüler kültürde kalıcı bir figür hâline getirmiştir."
 dubois.2112.h: "Kuzey Amerika Bölümüne Dön."
 dubois.2121.t: "Güney Amerika Dinozor Bölümü"
 dubois.2121.d: "Hangi dinozor iskeleti ziyaret edilsin?"
 dubois.2121.f: "19. yüzyılın sonunda, Güney Amerika’nın Patagonya masiflerinde giderek daha fazla dinozor kemiği bulunmaya başlandı. İlk temsilciler arasında Antarctosaurus ve Argyrosaurus vardır."
 dubois.2121.g: "Antarctosaurus."
 dubois.2121.h: "Argyrosaurus."
 dubois.2122.t: "Antarctosaurus"
 dubois.2122.f: "Antarctosaurus, Geç Kretase döneminde yaklaşık 70 ila 65 milyon yıl önce Gondwana kıtasında yaşamış dikkat çekici bir sauropod dinozor cinsidir. Titanosaurlar içinde sınıflandırılan Antarctosaurus, yeryüzünde dolaşan sauropod çeşitliliğinin önemli bir örneğini temsil eder.\nDevasa boyutuyla tanınan Antarctosaurus, 18 metreyi aşan uzunluğa ulaşabilen, dört ayaklı bir otoburdu. Uzun boynu ve kuyruğu, görece küçük kafasıyla birlikte, yüksek bitkilerle beslenmeye uyum sağladığını gösterir. Bu titanosaur, güçlü uzuv yapısıyla dikkat çeker; bu yapı ağırlığını taşımada ve hareket etmesinde önemli rol oynamıştır.\nAntarctosaurus fosilleri ağırlıklı olarak Güney Amerika ve Antarktika’da keşfedilmiştir. Bu bulgular, Geç Kretase döneminde sauropodların evrimi ve dağılımı hakkında değerli bilgiler sunar. Ayrıca o dönemde Gondwana’da var olan eşsiz ekosistemleri anlamamıza katkı sağlar."
 dubois.2123.t: "Argyrosaurus"
 dubois.2123.f: "Argyrosaurus, Geç Kretase döneminde yaklaşık 90 ila 70 milyon yıl önce Güney Amerika’nın eski manzaralarında dolaşmış önemli bir sauropod dinozor cinsidir. Titanosaurlar olarak bilinen sauropod alt grubuna ait olan Argyrosaurus, bölgenin zengin tarih öncesi faunasına dair önemli ipuçları sunar.\nBiyolojisi ve davranışlarının bazı yönleri hâlâ varsayımsal olsa da Argyrosaurus, paleontolojik araştırmalarda ilgi çekici bir konu olmaya devam etmekte ve Güney Yarımküre’deki tarih öncesi yaşamın görkemi ile karmaşıklığına ışık tutmaktadır."
 dubois.2122.h: "Güney Amerika Bölümüne Dön."
 dubois.2131.t: "Avrupa Dinozor Bölümü"
 dubois.2131.d: "Hangi dinozor iskeleti ziyaret edilsin?"
 dubois.2131.f: "19. yüzyılın başlarından itibaren, Avrupa masiflerinde özellikle madenciliğin artmasıyla birlikte yeni dinozor fosilleri keşfedildi. Bunlar arasında Iguanodon ve Plateosaurus bilinmektedir."
 dubois.2131.g: "Iguanodon."
 dubois.2131.h: "Plateosaurus."
 dubois.2132.t: "Iguanodon"
 dubois.2132.f: "Iguanodon, Erken Kretase döneminde yaklaşık 140 ila 120 milyon yıl önce yaşamış dikkat çekici bir otçul dinozor cinsidir. Iguanodontid ailesine ait olan Iguanodon, dinozor anatomisi ve davranışını anlamamızda kilit bir rol oynamıştır.\nKendine özgü başparmak dikeni ve gaga benzeri burnuyla ayırt edilen Iguanodon, orta büyüklükte bir vücuda sahipti ve hem iki hem dört ayak üzerinde yürüyebiliyordu. Bu, ilginç bir şekilde hem iki ayaklı hem dört ayaklı hareket kabiliyetini göstermektedir. Başparmak dikeni, bir zamanlar boynuz sanılsa da artık yırtıcılara karşı savunmada veya bitkileri tutmada kullanıldığı düşünülmektedir.\nIguanodon, ormanlardan ovalara kadar farklı çevrelerde yaşamış bir otoburdu. Dişsiz gagası bitkileri koparmasına, dişleri ise öğütmesine uyumluydu. Yaklaşık 10 metreye varan uzunluğuyla döneminin en baskın otoburlarından biriydi. Iguanodon fosilleri ilk kez Avrupa’da, özellikle Belçika ve İngiltere’de bulunmuştur ve bu türün incelenmesi paleontoloji biliminin gelişiminde kritik bir rol oynamıştır."
 dubois.2133.t: "Plateosaurus"
 dubois.2133.f: "Plateosaurus, Geç Triyas döneminde yaklaşık 214 ila 204 milyon yıl önce yaşamış önemli bir otçul dinozor cinsidir. Prosauropod olarak sınıflandırılan Plateosaurus, dinozorların erken evrimi ve farklı çevrelere uyumları hakkında önemli bilgiler sunar.\nUzun boynu, küçük kafası ve görece uzun kuyruğuyla ayırt edilen Plateosaurus, hem iki ayaklı hem dört ayaklı hareket kabiliyeti göstermiştir. Bu durum, dinozor evriminde geçiş aşamasını yansıtır. Güçlü uzuvları ve ağırlık taşıyıcı adaptasyonları, bitki toplamasına ve habitatında rahatça hareket etmesine imkân tanımıştır.\nYaklaşık 9 metre uzunluğa ulaşan Plateosaurus, döneminin baskın otoburlarından biriydi ve taşkın ovalarından yüksek ormanlara kadar farklı manzaralarda yaşamıştır. Geniş, yaprak biçimli dişleri bitki materyalini yemesine uyumluydu."
 dubois.2132.h: "Avrupa Bölümüne Dön."
 dubois.2141.t: "Afrika Dinozor Bölümü"
 dubois.2141.d: "Hangi dinozor iskeleti ziyaret edilsin?"
 dubois.2141.f: "Afrika’da paleontoloji ancak 20. yüzyılın başlarında büyük bir gelişme yaşadı. Özellikle Tanzanya ve Güney Afrika, ayrıca Mısır dikkat çekicidir. Bu dönemde önemli keşifler Giraffatitan ve Spinosaurus’tur."
 dubois.2141.g: "Giraffatitan."
 dubois.2141.h: "Spinosaurus."
 dubois.2142.t: "Giraffatitan"
 dubois.2142.f: "Eskiden Brachiosaurus olarak bilinen Giraffatitan, Geç Jura döneminde yaklaşık 154 ila 150 milyon yıl önce yaşamış devasa, uzun boyunlu dinozorların dikkat çekici bir cinsidir. Sauropod grubuna ait olan Giraffatitan, olağanüstü boyutu ve eşsiz adaptasyonlarıyla tanınır.\nUzun boynu ve görece kısa kuyruğuyla ayırt edilen Giraffatitan, ön bacaklarının arka bacaklarından daha uzun olmasıyla farklı bir duruşa sahipti. Bu sayede yükseklerdeki bitkilere ulaşabiliyordu. 12 metre yüksekliğe ve 25 metreden fazla uzunluğa ulaşarak, yaşamış en uzun ve en iri kara hayvanlarından biri olmuştur.\nGiraffatitan, muhtemelen nehir vadileri ve taşkın ovaları gibi bitki açısından zengin ortamlarda yaşayan bir otoburdu. Güçlü uzuv kemikleri ve fıçı biçimli göğsü, devasa vücut kütlesini destekliyordu. Giraffatitan fosilleri ağırlıklı olarak Afrika’da, özellikle günümüz Tanzanya ve Zimbabve’sinde bulunmuştur."
 dubois.2143.t: "Spinosaurus"
 dubois.2143.f: "Spinosaurus, Kretase döneminde yaklaşık 112 ila 93 milyon yıl önce Kuzey Afrika’da yaşamış dikkat çekici bir etçil dinozor cinsidir. Theropod grubuna ait olan Spinosaurus, kendine özgü özellikleri ve eşsiz uyumlarıyla tanınır.\nUzun burnu, yelken benzeri sırt çıkıntısı ve güçlü, timsah benzeri çeneleriyle ayırt edilen Spinosaurus’un yarı suda yaşayan bir yırtıcı olduğu düşünülmektedir. Büyük olasılıkla balık ve diğer su canlılarıyla beslenmeye özelleşmişti. Yelkeni, muhtemelen vücut ısısını düzenlemede veya tür içi tanımada rol oynamış olabilir.\n15 ila 18 metreye ulaşabilen uzunluğuyla Spinosaurus, en büyük theropod dinozorlardan biri olarak kabul edilir. Güçlü uzuvları ve uzun kafatası, sucul avları yakalayıp tüketmeye yönelik uyumlarını göstermektedir. Spinosaurus fosilleri ilk kez Mısır’da, daha sonra Fas’ta keşfedilmiştir."
 dubois.2142.h: "Afrika Bölümüne Dön."
 dubois.2151.t: "Asya Dinozor Bölümü"
 dubois.2151.d: "Hangi dinozor iskeleti ziyaret edilsin?"
 dubois.2151.f: "20. yüzyılın ilk üçte birlik kısmında yapılan ilk Amerikan keşif gezisi, Asya’da yeni dinozor türlerinin bulunmasına yol açtı. Psittacosaurus ve Velociraptor bilinen en eski türler arasındadır."
 dubois.2151.g: "Psittacosaurus."
 dubois.2151.h: "Velociraptor."
 dubois.2152.t: "Psittacosaurus"
 dubois.2152.f: "Psittacosaurus, Erken Kretase döneminde yaklaşık 126 ila 101 milyon yıl önce Asya’da yaşamış küçük boyutlu otçul bir dinozor cinsidir. Ceratopsian grubuna ait olan Psittacosaurus, dikkat çekici özellikleri ve dinozor evrimini anlamamıza yaptığı katkılarla öne çıkar.\nPapağan benzeri gagası, tıknaz gövdesi ve kuyruğu boyunca uzanan püskül benzeri yapılarla ayırt edilir. Bu diken benzeri yapılar, muhtemelen gösteriş ya da vücut ısısını düzenleme amacıyla kullanılıyordu.\nYaklaşık 1 ila 2 metre uzunluğa sahip Psittacosaurus, ormanlar ve ovalar dahil olmak üzere çeşitli ortamlarda yaşamıştır. Gaga yapısı ve özelleşmiş dişleri, farklı bitki türlerini işlemeye uygun olduğunu gösterir. Psittacosaurus fosilleri ağırlıklı olarak Çin ve Moğolistan’da keşfedilmiştir."
 dubois.2153.t: "Velociraptor"
 dubois.2153.f: "Velociraptor, Geç Kretase döneminde yaklaşık 75 ila 71 milyon yıl önce Asya’nın bazı bölgelerinde yaşamış küçükten orta boyuta kadar değişen etçil bir dinozor cinsidir. Dromaeosaurid theropod grubuna ait olan Velociraptor, dikkat çekici uyumlarıyla ve dinozor algısındaki popüler rolüyle tanınır.\nKeskin, kıvrık ayak pençeleri ve gelişmiş avcı özellikleriyle ayırt edilen Velociraptor, çevik ve zeki bir yırtıcıydı. İnce yapılı vücudu, uzun kuyruğu ve her ayağında yer alan orak biçimli pençesi, avını parçalamada kullanılıyordu.\nÖnceki tasvirlerin aksine Velociraptor oldukça küçüktü; yaklaşık 2 metre uzunluğunda ve 20-25 kilogram ağırlığındaydı. Keskin duyuları, dişleri ve muhtemelen sürü halinde avlanma davranışları, onu güçlü bir avcı yapıyordu."
 dubois.2152.h: "Asya Bölümüne Dön."
 dubois.2161.t: "Avustralya Dinozor Bölümü"
 dubois.2161.d: "Hangi dinozor iskeleti ziyaret edilsin?"
 dubois.2161.f: "1926 yılında Avustralya’da ilk kez dinozor kemikleri bulundu. Bu keşif, daha yoğun araştırmaların başlangıcı oldu. Daha sonra Muttaburrasaurus ün kazandı."
 dubois.2161.g: "Muttaburrasaurus."
 dubois.2161.h: "Rhoetosaurus."
 dubois.2162.t: "Muttaburrasaurus"
 dubois.2162.f: "Muttaburrasaurus, Erken Kretase döneminde yaklaşık 112 ila 99 milyon yıl önce Avustralya’da yaşamış dikkat çekici bir ornithopod dinozor cinsidir. Iguanodontian grubuna ait olan Muttaburrasaurus, bu bölgenin tarih öncesi faunası hakkında değerli bilgiler sunar.\nBurnunda bulunan içi boş ve yuvarlak tepecik benzeri çıkıntısıyla ayırt edilen Muttaburrasaurus, 6 ila 9 metre uzunluğa ulaşabilen orta büyüklükte bir vücuda sahipti. Güçlü çeneleri, bitkileri öğütmeye uygun dişlerle donatılmıştı, bu da otçul beslenme alışkanlığını doğrular.\nKafatası çıkıntısı, muhtemelen ses üretiminde rezonans odası olarak veya gösteriş amacıyla kullanılıyordu. Güçlü uzuvları ve büyük yapısı, onun etkili bir şekilde hareket etmesini ve otçul yaşamına uyum sağlamasını mümkün kılıyordu."
 dubois.2163.t: "Rhoetosaurus"
 dubois.2163.f: "Rhoetosaurus, Orta Jura döneminde yaklaşık 165 milyon yıl önce Avustralya’da yaşamış dikkat çekici bir sauropod dinozor cinsidir. Sauropodomorflar içinde sınıflandırılan Rhoetosaurus, Avustralya dinozorlarının eski tarihine dair önemli bir bakış sunar.\nDevasa boyutuyla öne çıkan Rhoetosaurus, uzun boynu, güçlü uzuvları ve görece küçük kafası olan dört ayaklı bir otoburdu. Diğer bazı sauropod akrabalarına göre daha küçük olsa da yaklaşık 15 metre uzunluğuyla Avustralya’daki döneminin en büyük hayvanlarından biriydi.\nRhoetosaurus fosilleri ilk kez Queensland, Avustralya’da keşfedildi. Bunlar, bu bölgedeki sauropod dinozorlarına dair en eski kanıtlardan biridir. Uzun boynu ve görece uzun kuyruğu, bitki beslenmesine ve çeşitli bitki kaynaklarını kullanmasına uyum sağladığını gösterir."
 dubois.2162.h: "Avustralya Bölümüne Dön."
 dubois.2112.d_perfect_dinosaur: "Bu dinozor iskeleti mükemmel şekilde monte edilmiş kabul edilir. Değiştirilmesine gerek yoktur ve maksimum Dinozor Puanı verir."
 dubois.2112.d_imperfect_dinosaur: "Bu dinozor iskeleti kusurlu monte edilmiş kabul edilir. Olası Dinozor Puanının yalnızca yarısını verir. Meşgul veya yorgun değilse bir [concept_dubois_paleontologist] tarafından yeniden monte edilebilir."
 dubois.2112.d_poor_dinosaur: "Bu dinozor iskeleti kötü şekilde monte edilmiş kabul edilir. Dinozor Puanımızı büyük ölçüde düşürür. Meşgul veya yorgun değilse bir [concept_dubois_paleontologist] tarafından yeniden monte edilebilir."
 dubois.2112.g: "Bu dinozor iskeletini yeniden monte et."
