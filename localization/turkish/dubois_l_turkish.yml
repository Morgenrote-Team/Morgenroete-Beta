 dubois.271.t_triassic: "Prehistorik Manzara: Triyas"
 dubois.271.d: "Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName], bugün bir grup meslektaşını yeni Prehistorik Manzarayı ziyaret etmeye davet etti. Akademisyenler, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis] detaylara olan ilgisini övdüler."
 dubois.271.f_cretaceous: "Kretase dönemindeki iklim genellikle ılıman ve dengeliydi. Bu, bazı dinozorların, en azından yaz aylarında, yüksek güney ve kuzey enlemlerine ulaşmalarını sağladı. Kutup bölgeleri buzdan arındı ve deniz seviyesi buna bağlı olarak oldukça yüksekti, Alt Turonyan'da zirveye ulaştı. Kretase'nin sonunda, Maastrichtiyen'de ise soğuma ve belirgin bir gerileme yaşandı. Önceki Jura döneminde olduğu gibi, kara makrofaunası ve megafaunası dinozorlar tarafından domine edilmiştir. Alt Kretase'de, kulüp yosunları, eğrelti otları, ağaç eğreltileri, ginkgoales, Bennettitales ve kozalaklılar en yaygın bitkilerdi. Üst Kretase'de, pek çok dökme yapraklı ağaç, örneğin akçaağaç, meşe ve ceviz, Sequoia ve Geinitzia gibi kozalaklılarla rekabet etti. Çimenler kara alanlara yayıldı ve erozyon davranışını büyük ölçüde değiştirdi."
 dubois.271.f_jurassic: "Alt Jura dönemi, büyük bir magmatik bölgede devasa patlamalarla sona ermiş olabilir. Bu, küresel ısınmaya ve ikinci dereceden bir kitlesel yok oluşa yol açtı. O zamanki, kuraklığa dayanıklı küçük yapraklı kozalaklılar, florada önemli bir yer tutmaya başladı ve dinozorlar arasında modern sauropodlar gelişti. Jura dönemi, özellikle geç Jura dönemi (Üst Jura), dinozorların ilk zirve dönemini gördü ve büyük theropodlar, örneğin Allosaurus ve dev sauropodlar, örneğin Diplodocus ve Giraffatitan, en büyükleri oldu. Flora, gymnospermlerle (kozalaklı bitkiler, örneğin sequoia ve çamlar, ayrıca ginkgo ağaçları ve sikadlar) domine ediliyordu. Jura dönemi aynı zamanda sikadların çok yaygın olduğu bir dönem olarak bilinir. Eğrelti otları ve at kuyruğu, ormanların alt katmanını oluşturuyordu."
 dubois.271.f_triassic: "Triyas dönemi boyunca, neredeyse sürekli sıcak bir iklim hakimdi, ancak dönemin başında bu, büyük dalgalanmalara tabi olmuştu. Ayrıca iklimin dünya çapında oldukça kuru olduğu da görülüyor: Bunun nedeni, süper kıta Pangea'nın şekli ve ortaya çıkan muson etkisiydi. İç bölgelerde büyük çöller olması muhtemeldi. Permiyen ile Triyas arasındaki geçiş, belirgin bir fauna değişikliğiyle ilişkilendirilmektedir. Bu kadar köklü bir değişiklik ki, fosil kayıtlarının önemli ölçüde değişmesi nedeniyle, Permiyen ile Triyas arasındaki geçiş sadece iki dönemin değil, aynı zamanda dünya tarihinin iki çağı arasında da bir sınırdır: Paleozoik ve Mesozoik. Sonuç olarak, birçok denizel omurgasız grubu tamamen veya kalıcı olarak fosil kaydından kayboldu. Kara omurgalı fauna da önemli değişiklikler geçirmektedir. Bitki dünyasında, Permiyen'de eğrelti otlarından gymnospermler grubuna geçiş, Triyas'ta da devam etti."
 dubois.271.g: "Güzel!"
 dubois.272.t: "Malzemeler"
 dubois.272.d: "[GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetFullName], prehistorik manzarasını tamamlama konusunda olağanüstü bir mükemmeliyetçilik sergiliyor. Bu yüzden [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe]'nin bütçesi şimdiden tükenmiş durumda."
 dubois.272.f: "Sergi için özel sipariş edilen dinozor yumurtası mıydı? O özel tohumlar mıydı? Yoksa doğa toprağı için taşıyıcıya verilen 300 poundluk bahşiş mi? Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] ne kadar açıklamaya çalışsa da, paranın ellerinden sadece akıp gittiği bir gerçek."
 dubois.272.g: "Biraz yapay bitki ve kertenkele için daha fazla para mı? Unut gitsin!"
 dubois.272.h: "Güzel bir diorama istiyoruz, harcamalardan kaçınmayın!"
 dubois.273.t: "Saçma bir iş mi?"
 dubois.273.d: "Bazı akademik 'meslektaşlar', Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]'yı sadece [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis] arkasından değil, artık doğrudan, prehistorik manzara takıntısı yüzünden alay ediyorlar. Bazı araştırmacılar, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHis] faaliyetlerini absürd bir hobi olarak kabul ediyorlar ve projeyi temelde saçma bir iş olarak değerlendiriyorlar."
 dubois.273.f: "'Fosil kayıtlarındaki geçiş formlarının aşırı nadirliği, paleontolojinin ticari sırrıdır.' - Søren Kierkegaard"
 dubois.273.g: "Paleontoloji ciddi bir bilimdir!"
 dubois.273.h: "Doğru, paleontologumuz biraz tuhaf."
 dubois.273.i: "O kirli akademisyenlere birkaç şişe şeri alıp doktoru yalnız bırakmalarını sağla."
 dubois.274.t: "Öğrenci İlgisi"
 dubois.274.d: "Bir süredir üniversitedeki öğrenciler, Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]'nın prehistorik manzara inşa edişini artan bir ilgiyle izliyorlar. Bazıları bunu tuhaf bir girişim olarak görürken, diğerleri bunu ilham kaynağı olarak değerlendiriyor - birdenbire uzak geçmiş somut hale geliyor."
 dubois.274.f: "Crystal Palace Parkı'ndaki Dinozor Mahkemesi, Londra'nın güneyinde yer alan bir jeolojik ve paleontolojik tema parkıdır. 19. yüzyılın ortalarında, Benjamin Waterhouse Hawkins tarafından, soyu tükenmiş hayvanların dünyadaki ilk yaşam boyutundaki figüratif temsilleri olarak yaratılan hayvan heykelleriyle tanınır. Park, hem eğlence hem de eğitim amacıyla Victoria dönemi ziyaretçilerine hizmet etmek üzere tasarlanmıştı. Kompleksin bir parçası olarak, İngiliz peyzaj bahçesi olarak tasarlanan gölet adalarında, Britanya'nın jeolojik tarihini yansıtan bir tema parkı tasarlandı. David Thomas Ansted'in önerdiği bir konsepte göre, üç adanın her biri, Phanerozoik dönemin bir çağına atanmış ve bu dönemdeki sedimanlarla tasarlanmıştı. Hawkins, paleontolog Richard Owen tarafından danışmanlık edilmiştir. Prehistorik hayvanlar, aynı yüzyıldaki araştırma durumuna artık uyumlu olmasa da büyük bir ilgi uyandırmış ve geniş bir nüfusa paleontoloji hakkında temel bir bilgi sağlamıştır."
 dubois.274.g: "Yeni bir akademisyen nesli!"
 dubois.274.h: "Doktora yardımcı olmalılar."
 je_dubois_safari_hippopotamus: "Afrika Safari: Hipopotam"
 je_dubois_safari_hippopotamus_reason: "Afrika safarisinde, sürekli iz sürme ve tuzak kurma yoluyla, büyük avlar yakalanabilir ve daha sonra bir [concept_dubois_zoo]'ya taşınabilir. Her safariye yalnızca bir hayvan yakalanabilir. Hayvan türüne bağlı olarak, tuzakların gerekli olup olmadığı veya iz sürülüp sürülmeyeceği farklılık gösterir. Genel kılavuz olarak, büyük, tembel hayvanlar daha fazla tuzak gerektirirken, hızlı hayvanlar daha fazla iz sürme gerektirir. Safari 300 gün sürer. O süre zarfında hiçbir hayvan yakalanmazsa, safari ekibi ülkeden yine başarısız olarak ayrılır.\n\nAgresif hayvanlar kendilerini savunabilir ve tuzaklanırken saldırabilir. Utangaç hayvanlar ise kaçar. Bir [concept_dubois_naturalist] Zoolog olan özellikse, böyle durumları dezavantajlı olmadan çözebilir. #ORANGE Makine Tüfeği#! veya #ORANGE İçten Yanmalı Motor#! gibi yeni teknolojiler, hayvanları iz sürmeyi ve tuzaklamayı daha kolay hale getirir."
