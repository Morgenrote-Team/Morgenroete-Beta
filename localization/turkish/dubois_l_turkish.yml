 dubois.2171.h: "Plesiosaurus."
 dubois.2171.i: "Basilosaurus."
 dubois.2171.j: "Megalodon."
 dubois.2173.t: "Plesiosaurus"
 dubois.2173.f: "Plesiosaurus, deniz sürüngenlerinin bir türüdür. Fosilleri dünya çapında bulunabilir. Türüne bağlı olarak, bu hayvanlar 1.5 ile 15 metre arasında uzunluğa sahipti. Türlerine bağlı olarak, muhtemelen farklı hayvanlarla besleniyorlardı. Salyangozlar ve midyelerden balık ve diğer avlara kadar.\nU şeklindeki çeneleri ve balık tuzağını andıran keskin dişleri, onlara kullanışlı bir araç sağlamıştır."
 dubois.2174.t: "Basilosaurus"
 dubois.2174.f: "Basilosaurus bir dinozor değil, fakat tarih öncesi bir balina türüdür. Uzun vücudu, uzun bir yılanı andırsa da, 20 metreye kadar uzunluğu ile, sperm balinası ile benzer bir uzunluğa sahiptir."
 dubois.2175.t: "Megalodon"
 dubois.2175.f: "Dev köpekbalığı Megalodon, muhtemelen şimdiye kadar var olmuş en büyük köpekbalığıdır. Ancak uzunluğunu tahmin etmek zordur, çünkü şu anda sadece dişler ve omurgalar bulunmuştur. Paleontologlarımız, uzunluğunun 9 ile 30 metre arasında bir yerde olduğunu tahmin ediyorlar. Her halükarda, bu köpekbalığı iskeleti göz kamaştırıcıdır ve koleksiyonumuzun en değerli parçalarından biridir."
