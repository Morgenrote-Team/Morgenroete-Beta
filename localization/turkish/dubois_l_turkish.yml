 dubois.1031.t: "Avustralasya Doğa Tarihi Galerileri"
 dubois.1031.d: "Etnografik ve doğa tarihi sergisi biçiminde düzenlenmiş öğretici bir gezinti: Antipodaları çağrıştıran mütevazı pavyonlar, Okyanusya’dan oyma süsler ve Avustralya içlerini anımsatan okra tonlu kayalar. Burada Avustralasya’nın karakteristik faunası dikkatli halka eğitim ve ciddiyet gözetilerek sunulur."
