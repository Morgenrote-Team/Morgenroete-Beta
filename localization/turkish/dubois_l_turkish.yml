 dubois.138.d: "Hayvanat bahçemiz, yeni, egzotik bir hayvanla zenginleşti: bugün uzun zamandır beklenen #O Surikata#! yeni kafesine taşındı."
 dubois.138.f: "Surikata, Afrika'da yaşayan küçük bir Mangustadır. Surikatalar son derece sosyal olup, 30 bireyden oluşan gruplar halinde yaşarlar. Genellikle yırtıcılardan korunmak için deliklerde veya mağaralarda yaşarlar. Genellikle en az bir Surikata, tehlikeye karşı dikkatli olup, grubu uyarır. Gözcülük işi, hayvanlar arasında sırayla yapılır."
 dubois.138.g: "Ne kadar tatlı!"
