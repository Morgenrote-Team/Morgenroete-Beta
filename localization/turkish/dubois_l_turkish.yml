 dubois.231.t: "Rakip Kazı Alanını Yok Etti"
 dubois.231.d: "Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] umut verici bir yatak peşindeydi. Ancak oraya vardığında, bir rakibin zaten birçok kemiği çıkardığını ve ardından alanı havaya uçurduğunu keşfetti."
 dubois.231.f: "Eğer bu kemiklere ben sahip olamayacaksam, kimse sahip olamaz!"
 dubois.231.g: "Bunu neden yapsınlar ki!"
 dubois.232.t: "Yerel Halk Bilgi Paylaşıyor"
 dubois.232.d: "Küçük bir köyün sakinleri yakınlarda çeşitli fosiller bulmuştu. Bunları sevinçle Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] ile paylaştılar. Bu, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetHerHim] yeni bir kazı alanı keşfine bir adım daha yaklaştıracak!"
 dubois.232.f: "Büyük büyükbabam bir keresinde tek boynuzlu at boynuzu bulmuş. Ne düşündüğünü biliyorum ama bence o bir dinozor kemiğiydi! Ne yazık ki onu satmış. Ama bana ilk bulduğu yeri söyledi. Nehir yatağındaydı. Eminim nehir kenarında kemikler bulacaksınız!"
 dubois.232.g: "Teşekkür ederim!"
 dubois.233.t: "Yerel Paleontolog Araştırmalarını Paylaşıyor"
 dubois.233.d: "Küçük bir köyün sakini görünüşe göre hobi olarak Paleontologluk yapıyor. [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName] artık olası alanlarda kazı yapamayacak kadar yaşlı olduğundan, tüm bilgisini Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] ile paylaştı."
 dubois.233.f: "Çocukken fosil toplamaya başladım ve hiç bırakmadım. Ama artık dizlerimin üstüne çöküp kazı yapamayacak kadar yaşlandım. Bu yüzden en azından size bazı dinozor kemikleri ve fosilleri bulmanızda yardımcı olmayı umuyorum. Eğer bulursanız, lütfen bana da gösterin!"
 dubois.233.g: "Bu harika bir koleksiyon!"
 dubois.234.t: "Heyelan Umut Veren Alanı Örttü"
 dubois.234.d: "Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName] ve ekibi umut verici bir alan keşfettikten sadece bir gün sonra, büyük bir heyelanla tamamen toprak altında kaldı. Ne kadar süre alacağı belirsiz; oradaki gizlenmiş şeyleri açığa çıkarmak aylar hatta yıllar sürebilir."
 dubois.234.f: "Önce kazı için hava çok sıcaktı, sonra çok yağışlıydı, şimdi de çok çamurlu mu? Belki de kazı yapmayı sevmiyorsunuz!"
 dubois.234.g: "Lanet olsun sana, hava durumu!"
 dubois.235.t: "Yeni Bir İpucu"
 dubois.235.d: "Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName]’ın sıkı çalışmaları sonunda karşılığını veriyor gibi görünüyor. Kayaçlar ve oluşumlara dair raporları topladıktan sonra, birkaç umut verici alan belirledi. Umarız bu bölgelerden birinde dinozor kemikleri bulunur."
 dubois.235.f: "Bakın, bu tortullar genellikle dinozor kemikleri içerir. Bu bölgelerde yüzeye çıkarlar, yani mutlaka kemik bulacağız! Umarım... Belki..."
 dubois.235.g: "Aferin!"
