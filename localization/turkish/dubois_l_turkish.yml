 dubois.442.t: "Jeolojik Bilgi"
 dubois.442.d: "Dağlarda kaldığı süre boyunca, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetFullName] dağı ayrıntılı olarak inceledi, haritasını çıkardı ve bilimsel yorumlarda bulundu. Tüm dağcılık ekibinin şaşkınlığına, ertesi sabah onlara dağın tehlikelerini ve daha kolay tırmanış rotalarını gösteren bir kabartma harita sundu."
 dubois.442.f: "'Neden mi yaptım? Ah, sadece biraz sıkılmıştım ve minerallerimi de kataloglamıştım. Özel bir şey değil! Hatta renklendirmedim bile...'"
 dubois.442.g: "Tanrıya şükür ki Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName] var."
 dubois.443.t: "Güzel Bir Mineral"
 dubois.443.d: "Dağcı grubu, bir bilim insanı olarak yardımdan çok yük olan jeoloğun oyalanan doğasından zaten şikâyetçiydi; fakat meğerse Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], zirveye tırmanırken nadir bir malzeme keşfetmişti."
 dubois.443.g: "Ne hoş bir sürpriz."
