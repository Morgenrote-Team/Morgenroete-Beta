 dubois_documented_animal_gila_loc: "\n- Gila Canavarı"
 dubois_state_trait_gila_habitat: "Yaşam Alanı: Gila Canavarı"
 dubois.11.gila: "Gila Canavarı"
 dubois.1041.gila: "#o Gila Canavarı#! Ziyaret Et"
 dubois.1302.gila: "Gila Canavarları"
 dubois.108.t: "Gila Canavarı"
 dubois.108.d: "Hayvanat bahçemiz, yeni, egzotik bir hayvanla zenginleşti: bugün uzun zamandır beklenen #O Gila Canavarı#! yeni kafesine taşındı."
 dubois.108.f: "Gila Canavarı, güneybatı Amerika Birleşik Devletleri ve kuzeybatı Meksika'ya özgü, zehirli bir kertenkele türüdür. Kendine has siyah ve turuncu renkleriyle tanınan bu kertenkele, dünyadaki nadir zehirli kertenkelelerden biridir. Gila Canavarları yavaş hareket eder ve çoğunlukla gececi olup küçük memeliler, kuşlar ve yumurtalarla beslenir. Kuyruklarında yağ depolar, böylece uzun süre yiyecek olmadan hayatta kalabilirler."
 dubois.108.g: "O kadar tehlikeli görünmüyor..."
 visit_gila_tt: "#o Gila Canavarı#! kafesini ziyaret edeceksiniz."
