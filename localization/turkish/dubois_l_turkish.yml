 dubois.251.t: "Bilinmeyen İnsan Kemikleri"
 dubois.251.d: "Paleontolojik araştırması sırasında [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName], tarihöncesi dönemlerden kalma insan kemikleri buldu. Muhtemelen on binlerce yıllık. Kemikleri güvenli şekilde gönderdi ki bir uzman inceleyebilsin."
 dubois.251.f: "Paleontoloğun şaşkınlığına, [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetSheHe], üst kaya tabakasında bir insan iskeletinin kalıntılarını buldu. Ancak bağlantıları yeniden kuramadı. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] temel paleoantropoloji bilgisine sahip olsa da, bilimsel sonucu etkilememek için görüş belirtmek istemiyor."
