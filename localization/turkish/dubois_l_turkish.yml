 dubois.35.t: "Hayvan kaçtı!"
 dubois.35.d: "Safari ekibi hayvanı takip etmeye çalışırken, birden hayvan kaçtı - Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]'ın asistanları sallanıp düşmek üzere!"
 dubois.35.f: "'Hayvan hayatını tanımaktan hâlâ çok uzağız ve biz hâlâ hayvanları tanımak amacıyla çalışıyoruz.' - Alfred Edmund Brehm"
 dubois.35.g: "Yapabileceğimiz bir şey yok..."
 dubois.36.t: "Hayvan saldırıyor!"
 dubois.36.d: "Safari ekibi tuzakları kurmaya çalışırken, hayvanı korkutmuşlar - bu da saldırıya geçmesine yol açmış!"
 dubois.36.f: "'Filin sinirli bir hayvan olduğunu söylemek yanlıştır. Doğası nazik ve sakin. Her yaratıkla dostluk içinde ve barış içinde yaşar.' - Alfred Edmund Brehm"
 dubois.36.g: "Kaçın, siz aptallar!"
 dubois.36.h: "Tuzakları yine de yerleştirin!"
 dubois.36.i: "Bizim doğa bilimcimiz her şeyi kontrol altında tutuyor."
 dubois.37.t: "Safari kazası"
 dubois.37.d: "Dikkatsizce safari ekibi yanlış hayvanla karşılaştı. Tüm tuzakları kırdı, asistanları yaraladı ve sonra kaçtı. Haftalarca süren çalışma birkaç saat içinde yok oldu. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] bu yüzden safarinin iptal edilmesine karar verdi."
 dubois.37.f: "'Afrika'da hiç sabah uyanıp mutlu olmadım diyemem.' -Ernest Hemingway"
 dubois.37.g: "Korkunç!"
 dubois.36.success_tt: "Safari ekibi tuzaklarını başarılı bir şekilde yerleştiriyor."
 dubois.36.fail_tt: "Ciddi bir kaza, safarinin erken iptal edilmesine yol açtı."
 dubois_safari_zoologist_tt: "Bu, Doğa bilimcimizin Zoolog özelliğine sahip olmasından mümkündür."
 dubois.38.t: "Safari Ekstra"
 dubois.38.d: "Teknolojik ilerleme, safariyi yeni silahlar veya araçlarla devrim niteliğinde değiştiriyor."
 dubois.38.f: "'Afrika'da uyandığım her sabah mutluydum, bunu daha önce hiç bilmiyordum.' -Ernest Hemingway"
 dubois.38.machine_guns_tt: "Makine tüfeği icadıyla, ekibimiz insan ve hayvan tehditlerine karşı çok daha üstün hale geldi."
 dubois.38.combustion_engine_tt: "İçten yanmalı motor icadıyla, herhangi bir hayvanı kolayca yakalayabiliriz."
 dubois.38.g: "Bu, 'Heia Safari!'ye bambaşka bir anlam katıyor."
 dubois.40.d: "Hiçbir şey getirmeyen, sadece zorluklarla geçen bir arayışın sonunda, Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] pes eder ve ekibiyle birlikte [ROOT.GetCountry.GetNameNoFlag]a geri döner."
 dubois_add_zoo_animal_gila_tt: "Bir #O Gila Canavarı#! ekle [concept_dubois_zoo]'ya."
 has_zoo_animal_gila_trigger_tt: "Bir #p Gila Canavarı#! var."
