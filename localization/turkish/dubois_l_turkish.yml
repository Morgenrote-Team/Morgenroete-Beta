 dubois.443.f: "Adamlar, bir saat boyunca akademisyeni beklemişti, oysa akademisyen bir yamacın ortasında durmuş ve aniden [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] araçlarını çıkarmıştı. İlk başta başlarını sallayarak, hoş olmayanı faydalı ile birleştirmeye karar verdiler ve zamanı boşa harcamamak için yemeği öne aldılar. Ancak Dr. [ROOT.Var('agassiz_geologist_var').GetCharacter.GetLastName], yemek yemeyi veya gelmeyi düşünmüyordu. Lider, jeolog olmadan keşif yapmakla tehdit ettiğinde, [ROOT.Var('agassiz_geologist_var').GetCharacter.GetSheHe] aniden gruba katıldı - elinde parlayan bir taşla, o taşın güzelliği tüm [ROOT.Var('agassiz_geologist_var').GetCharacter.GetHerHis] meslektaşlarını etkiledi."
