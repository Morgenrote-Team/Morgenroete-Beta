 dubois_paleontological_research_modifier_desc: "Toprak, keşif heyecanı ile canlı. Çıkarılan her fosil, kaybolmuş bir dünyaya açılan bir pencere gibidir ve her kazı, bilim insanlarını ve halkı aynı şekilde heyecanlandırır. Antik yaşamı araştırmak, ulusal bir merak haline gelmiş, hem akademik hırsı hem de popüler hayranlığı beslemektedir."
 dubois_paleontologist_travell_to_location_modifier_desc: "Defterler ellerinde ve tarih öncesi devlerin hayalleriyle, paleontologumuz zorlu arazilerde yol alır, taşlara hapsolmuş sırları arar. Yolculuk, hem macera hem de bilimle ilgili bir yarıştır—Dünyanın uzak geçmişinin kalıntılarını ortaya çıkarmak için zamanla yarışırlar."
 dubois_paleontologist_travell_from_location_modifier_desc: "Sahada geçirdiği ayların ardından, paleontolog geri döner, yorgun ama zafer kazanmış bir şekilde. Çantalar fosiller, eskizler ve keşif hikayeleriyle doludur. Her buluntu, tarih kitaplarını yeniden yazmayı vaat eder ve yeni bir nesil ilham verir."
 notification_dubois_paleontological_report_notification_tooltip: "Profesör Dubois'un keşif gezisinden gelen bir paleontolojik rapor, olağanüstü fosil buluntuları içeriyor."
 notification_dubois_java_man_notification_tooltip: "Profesör Dubois'un yeni paleoantropolojik raporu, 'Java Adamı' olarak adlandırılan eski bir insan atası keşfini öne sürüyor."
 notification_dubois_animal_breeding_notification_tooltip: "Hayvanat bahçemizdeki bir örnek başarılı bir şekilde üredi. Bu, tür hakkında anlayışımızda bir atılımı işaret ediyor."
