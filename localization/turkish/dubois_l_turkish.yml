 dubois.1302.capybara: "Capybaralar"
 dubois.118.t: "Capybara"
 dubois.118.d: "Hayvanat bahçemiz, yeni, egzotik bir hayvanla zenginleşti: bugün uzun zamandır beklenen #O Capybara#! yeni kafesine taşındı."
 dubois.118.f: "Capybara, dünyanın en büyük kemirgenidir ve Güney Amerika'ya özgüdür. Webbed ayakları ve yarı sucul yaşam tarzı ile bataklıklarda ve nehir kenarlarında yaşar. Capybaralar son derece sosyal hayvanlardır, genellikle 10 ila 20 bireyden oluşan gruplarda yaşarlar. Genellikle otlar ve su bitkileriyle beslenirler ve nazik ve uysal doğalarıyla bilinirler. Boyutlarına rağmen, mükemmel yüzücüdürler ve yırtıcılardan kaçmak için suya dalabilirler."
 dubois.118.g: "Bu, dev bir Kobay Fare!"
 visit_capybara_tt: "#o Capybara#! kafesini ziyaret edeceksiniz."
