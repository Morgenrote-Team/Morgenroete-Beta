 dubois.12.t: "Kaçakçılar Hayvan Habitatına Ulaştı"
 dubois.12.d: "Professor [ROOT.Var('ito_naturalist_var').GetCharacter.GetLastName] has successfully gained covert access to a remote animal habitat in [SCOPE.sCountry('dubois_animal_country').GetName]. Now arises the delicate question: which specimen shall be 'acquired' in the name of scientific advancement?"
 dubois.12.f: "'Vahşi bir yaratığı yakalamak nasıl olur da yasa dışı sayılır? Elbette, yasal mülkiyetin sahibi değildir,' diye düşündü Profesör dönüşünde, bir keşif üyesi eylemlerinin yasal sınırların ötesine geçip geçmediğini nazikçe sorduğunda."
 dubois.13.t: "Kaçakçılar Yakalandı!"
 dubois.13.d: "[SCOPE.sCountry('dubois_animal_country').GetName]’den talihsiz haberler geldi: Zoolojik bir örnek elde etmek üzere gönderilen küçük kaçakçı grubu yakalandı. Ortaya çıkan olay bir diplomatik skandala yol açtı—ulusumuz artık resmen kaçak avcılıkla suçlanıyor."
 dubois.13.f: "Reports suggest that the group was first discovered by local foresters, who quickly alerted the authorities. Our ambassador has since been summoned to face formal protestations. By great fortune, Professor [ROOT.Var('ito_naturalist_var').GetCharacter.GetLastName] managed to depart the country prior to the arrests, thus preserving their scientific reputation from irreparable harm."
 dubois.13.g: "İşler hiç de planlandığı gibi gitmedi."
 dubois.21.t: "Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], Nadir Türlerle Döndü"
 dubois.21.d: "Bir yıllık vahşi doğa seferinin ardından, Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] zaferle geri döndü. Yerel rehberler, avcılar ve tuzakçılar eşliğinde yürütülen keşif, bilimsel inceleme ve halka sergi için dikkate değer [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] elde etmeyi başardı."
 dubois.21.f: "Güvence altına alınan hayvan sayısı: #G [ROOT.Var('dubois_catch_animal_total').GetValue]#!"
 dubois.21.g: "Bilim ve ulus için muazzam bir zafer!"
 dubois.31.t: "Safari Başlıyor"
 dubois.31.d: "Seçkin Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] önderliğindeki keşif heyeti Afrika kıtasına ulaştı. Hedefleri: Ulusal [concept_dubois_zoo] için olağanüstü bir örneği ele geçirmek. Peki hangi yaratığın peşine düşecekler?"
 dubois.31.f: "Tüm canlılar aynı şekilde yakalanmaz. Genel bir tavsiye: fil bol miktarda tuzak gerektirir, zürafa ise daha kolay tuzağa düşer. Aslanlar huzursuzdur, ağırkanlı suaygırına kıyasla daha sık yer değiştirirler."
 dubois.31.g: "Suaygırının peşine düş."
 dubois.31.h: "Afrika Aslanının peşine düş."
 dubois.31.i: "Afrika Çalı Filinin peşine düş."
 dubois.31.j: "Zürafanın peşine düş."
 dubois.31.k: "Düzlük Zebrasının peşine düş."
 dubois.32.t.hippopotamus_1: "Koca Bir Suaygırı"
 dubois.32.t.hippopotamus_2: "İkinci Suaygırı Görülüyor"
 dubois.32.t.hippopotamus_3: "Bir Suaygırı Daha"
 dubois.32.t.lion_1: "Görkemli Bir Aslan"
 dubois.32.t.lion_2: "İkinci Aslan Görülüyor"
 dubois.32.t.lion_3: "Bir Aslan Daha"
 dubois.32.t.elephant_1: "Heybetli Bir Fil"
 dubois.32.t.elephant_2: "İkinci Fil Görülüyor"
 dubois.32.t.elephant_3: "Bir Fil Daha"
 dubois.32.t.giraffe_1: "Zarif Bir Zürafa"
 dubois.32.t.giraffe_2: "İkinci Zürafa Görülüyor"
 dubois.32.t.giraffe_3: "Bir Zürafa Daha"
 dubois.32.t.zebra_1: "Hızlı Bir Zebra"
 dubois.32.t.zebra_2: "İkinci Zebra Görülüyor"
 dubois.32.t.zebra_3: "Bir Zebra Daha"
 dubois.32.d: "Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] hedeflenen yaratığın izini sürdü. Şimdi ekip, sabır ve ustalıkla onu yakalamaya uygun bir konuma yönlendirmek zorunda."
 dubois.32.f.hippopotamus.1: "Büyük nehrin gölgesinde, köylüler alacakaranlıkta suları dalgalandıran yaratıklardan fısıltıyla söz eder. Bir yerli avcı, dişi bir suaygırının yavrusunu korumak için bir timsahı ağırlığının altında ezdiği geceden bahseder—Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] de timsahın paramparça kalıntılarını inceleyerek olayı doğrular. Gece boyunca yankılanan kükremeleri, onların sadece bu toprakların sakinleri değil, hükümdarları olduğunu hatırlatır."
 dubois.32.f.hippopotamus.2: "Güneş sabah sisini yarıp yükselirken ekip, nehirden çıkan devasa bir gövdeyi gördü—kalın derili, buhar saçan, heybetli bir varlık. Köylüler onlara ‘hayalet boğalar’ der; çünkü iz bırakmadan sulara gömülür ve ölümcül bir güçle saldırırlar. Fildişi gibi parlayan dişleri, öfkeye meyilli huylara işaret eder. Hatta aslanlar bile bu devlerden uzak durur. Fakat Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], demir gibi sinirleri ve not defteriyle öne çıkar, yılmadan."
 dubois.32.f.hippopotamus.3: "Kamp ateşlerinde ve kervan yollarında yankılanan söylenceler bir yaratıktan bahseder—‘Fildişi Heyula’—kemik plaklarının kalkan gibi sert ve beyaz olduğu söylenir. Kimileri onun ölümsüz olduğuna, kimileri nefesinin fırtına çağırdığına inanır. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], bunun olağanüstü yaş ve boyuta sahip bir örnek olduğuna kanaat getirir. Yerel halk arasında gördüğü saygı, ona neredeyse efsanevi bir konum atfetmektedir. Eğer yakalanabilirse, her zoolojik koleksiyonun tacı olacaktır."
 dubois.32.f.lion.1: "Savananın altın ufuklarında, imparatorluk zarafetiyle bir gölge süzülür. Yelesi alev gibi dalgalanan aslan, burada yalnızca yaşamaz—hükmeder. Yerli izciler hayranlıkla ‘Savananın Kraliçesi’nden söz eder; öyle kudretli bir dişi aslan ki, yavrularını korumak için tüm sırtlan sürüsünü geri püskürtmüştür. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], deneyimli olmasına rağmen izlerini takip etmeyi göz korkutucu bulur. Sanki toprağın kendisi onun yoluna boyun eğer."
 dubois.32.f.lion.2: "Kampta sessizlik hakimdir: kocaman, belirgin izler tozlu çalılıklara doğru uzanır. ‘Altın Hükümdar’ fısıldanır etrafta. Denir ki bir boğa Afrika mandasıyla dövüşüp kanlar içinde ama dimdik çıkmıştır. Yelesi, güneşin öfkeli ihtişamına benzetilir. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] bunun sıradan bir yırtıcı olmadığını bilir. Bu, sessizlik ve korkuyla ölçülen bir hükümranlık alanına sahip bir hükümdardır; bakışı, deneyimli avcıları bile kaçırmaya yeter."
 dubois.32.f.lion.3: "Ağaçkakanların sesi ve rüzgârda savrulan otların arasında bir şey kıpırdar. Aslanın kükremesi—derin, boğuk ve yankılı—bozkırda uzak bir gök gürültüsü gibi dolaşır. Rivayet, bir patriğin varlığından bahseder: yalnızca mevcudiyetiyle rakiplerini susturan, fillerinin yolunu kesen bir hükümdar. İşte Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], bu kadim avcı-av sahnesine adım atar; doğanın en ihtişamlı hükümdarının peşinde bir bilim adamı."
 dubois.32.f.elephant.1: "Yakıcı güneş savananın üzerinde parıldarken, uzaklardan gelen bir uğultu yaklaşır. Bu gök gürültüsü değil—fil sürüsünün ağır adımlarıdır. Bir anaç, ailesini tozlu düzlükte önderlik ederek akasya gölgelerine taşır; hortumları göğe periskop gibi yükselir. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], dürbünüyle sessizce izler; onu etkileyen yalnızca büyüklükleri değil, aralarındaki uyumlu ahenktir. Fakat ardında, sabırsız hamilerinin fısıltıları yankılanır: bu yolculuk, yalnızca duygusal gözlemler için finanse edilmedi."
 dubois.32.f.elephant.2: "Sürü, böylesine devasa canlılardan beklenmeyecek bir zarafetle hareket eder; her adım bilinçli, aralarındaki her bakış anlam yüklüdür. Nice göçlere tanıklık etmiş gözlere sahip deneyimli bir anaç önderliğinde ağırbaşlı bir birlik halinde ilerlerler. Akşam alaca karanlığında, sığ bir su birikintisinin kıyısında borazanları çalınır—müzikle ağıt arasında bir ses. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], elinde hareketsiz defteriyle şüpheye kapılır. Bu peşinceden gelen dürtü, bilim mi, yoksa seyirlik bir gösteri midir?"
 dubois.32.f.elephant.3: "Kadim ve görkemli baobabların altında, zaman adeta askıda kalır. Orada Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], hem asil hem hüzünlü bir manzaraya tanık olur: kulakları yelpaze gibi açılmış, dişleri cilalı fildişi gibi parıldayan bir grup fil huzurla durmaktadır. Ne tehdit ederler, ne kaçarlar—sadece var olurlar. Ve yine de, bu uyumdan birini koparıp almak, böylesi toprakların hükümdarını kafese hapsetmek sürüde yara gibi yankılanacaktır. Profesör kemikleri ve türleri isimlendirmeyi bilir, ama bu—bu bambaşka bir şeydir."
 dubois.32.f.giraffe.1: "Günlerce kavurucu güneşin altında dolaşan ekip, avlarının izine rastlayamadı. Ta ki bir sabah, şafak ufku aydınlatırken, siluetler belirdi—heybetli, heykel gibi dimdik. Kızıl sabah göğüne karşı zürafaların boyunları akasyaların üzerinden yükselerek yaşayan bir ufuk çizgisi oluşturuyordu. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] işareti verdi. Av—bilgi için olan av—başlamıştı."
 dubois.32.f.giraffe.2: "Güneş ışığı ağaçların arasından dağılmış altın parçacıkları gibi süzülürken zürafalar ortaya çıktı. Devasa, dingin, soyut mozaikler gibi desenlenmiş derileriyle, yalnızca kendilerinin duyduğu bir müziğe uyarcasına hareket ediyorlardı. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], büyülenmiş halde defteri ve dürbünüyle ağır ağır yaklaştı. Bu yaratıkların zarafeti eşsizdi—her adımları bir asalete çalışmaydı. Doğa bilimci bunun sadece zoolojik bir fırsat olmadığını, yüce olana açılan bir pencere olduğunu anladı."
 dubois.32.f.giraffe.3: "En yakın yerleşimden uzak, savananın el değmemiş bir köşesinde, ekip daha önce tanımlanmamış bir zürafa ile karşılaştı. Postunda yıldız biçiminde benekler vardı ve hareketleri olağandışı bir çevikliğe sahipti. Yerli rehberler bunun bir alamet olduğundan, insanoğlunun gözünden nadiren görülen kutsal bir yaratık olduğundan fısıldadı. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], hem kuşkucu hem bilgin, dikkatle gözlem için hazırlandı. Bu gerçekten farklı bir alt tür müydü—yoksa ışığın ve efsanenin oyunu mu?"
 dubois.32.f.zebra.1: "Güneş batarken düzlükler sessizdi, ta ki dikenli çalıların ve yaşlı ağaçların arasından siyah-beyaz çizgiler belirinene kadar. Bir zebra sürüsü, sakin ve şüphe duymaksızın, hemen ötede otluyordu. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] sessizce izledi, çizgilerinden büyülenmiş halde—evrimin yaşayan bilmecesi, karşıtlığın bedende vücut bulmuş hali. Onları daha derin inceleme arzusu ile vakit kaybetmeden harekete geçme gereği arasında kaldı: çok oyalanırsa, bu an sonsuza dek yitip gidebilirdi."
 dubois.32.f.zebra.2: "Haftalarca süren sonuçsuz arayıştan sonra ekip, yerli izcilerin verdiği hayati bir ipucunu hatırladı: zebralar sudan pek uzaklaşmaz. Bir sonraki güvenilir su kaynağının yakınında kamp kurdular ve gerçekten de, akşam çökerken bir sürünün tanıdık kişnemeleri ve kuyruk savurmalarıyla gelişini müjdeledi. Nihayet ikinci bir şans—belki de biraz dikkat ve şansla, canlı bir yakalama."
 dubois.32.f.zebra.3: "Savanna sessizce şiddete tanıklık ediyordu: bir aslanın saldırısından yeni çıkmış, parçalanmış bir zebra leşi önlerinde yatıyordu. Ölümü ürkütücüydü ama izler, sesler, hareketler bırakmıştı. Ekip, aciliyetin itişiyle ileri atıldı. Alçak bir tepeyi aştıklarında, vahşi uyumun bir sahnesiyle karşılaştılar: hareket halindeki bir zebra sürüsü, çığlıkları at ve eşek arasında tuhaf bir karışım, çizgileri rüzgârla dans eder halde. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] için bu manzara, trajedi ile zaferi bir arada barındırıyordu."
 dubois.32.g: "Ekibe tuzak kurmalarını emret."
 dubois.32.h: "Ekibe hayvanı izlemeye başlamalarını emret."
 dubois.33.t: "Nadir Çiçeklerle Dolu Bir Çayır"
 dubois.33.d.hippopotamus: "Zor bulunan #O Suaygırının#! izini sürerken safari, olağanüstü bir bitki örtüsüyle dolu bir alana rastladı. Bilinmeyen kökenden parlak çiçekler profesörün ilgisini çekti. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] şimdi avdan sapmayı düşünüyor; bilimsel merakı uyanmış durumda."
 dubois.33.d.lion: "#O Aslanın#! izini sürerken ekip, nadir ve canlı bitkilerle dolu bir koruya rastladı. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] avı ertelemeyi tartışıyor—bu bitkiler en az hayvanlar kadar sır barındırabilir."
 dubois.33.d.elephant: "#O Filin#! peşindeyken ekip, nadir ve göz alıcı bir çiçeğe rastladı. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], bu merak uyandırıcı bitkileri toplamak için oyalanmaya hevesli görünüyor."
 dubois.33.d.giraffe: "#O Zürafanın#! peşinde iken safari ekibi, bitki çeşitliliği açısından zengin bir bölgeye rastladı. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], örnekler toplamak için kısa bir mola önerdi."
 dubois.33.d.zebra: "#O Zebranın#! izini sürerken safari grubu, bilinmeyen bitkilerle dolu bir koruluk keşfetti. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], örnek toplamak için durmayı düşündü."
 dubois.33.f: "Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], alışılmadık bir koku fark edince kafileye durmalarını emretti. Önlerinde, parlak ve yabancı çiçeklerle süslenmiş bir açıklık uzanıyordu. Yüzeysel bir inceleme bile tıbbi özellikler barındırabileceğini gösterdi. Şimdi profesör bir ikilemle karşı karşıyaydı—bu değerli botanik örneklerini toplamak için avı ertelemek mi, yoksa hayvanın peşine düşmeye devam etmek mi?"
 dubois.33.g: "Çiçekleri toplayın—bu keşif görmezden gelinemeyecek kadar değerli."
 dubois.33.h: "Zaman dar. Hedefimiz önceliğimiz olmalı."
 dubois.34.t: "Bir Keşif Sürüsü"
 dubois.34.d.hippopotamus: "#O Suaygırının#! peşinde bataklığın derinliklerine ilerlerken ekip, Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]’in kaybolduğunu fark etti. Ayak izleri, böceklerle parıldayan çökmüş bir termit tepesine doğru gidiyordu—belli ki profesör, doğanın bir başka merak uyandırıcı cazibesine kapılmıştı."
 dubois.34.d.lion: "#O Aslanın#! izini süren safari beklenmedik bir kargaşayla karşılaştı. Çalılıkların arasında Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] ortadan kaybolmuştu—onu belki de aslan kadar haşmetli ya da cezbedici bir şey uzaklaştırmıştı."
 dubois.34.d.elephant: "#O Fil#! için yapılan safari aniden kesintiye uğradı. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] çalılıklara karışıp kaybolmuştu—belki devasa canlının peşinde, belki de yalnızca kendi yanıtlayabileceği daha derin bir sorunun ardında."
 dubois.34.d.giraffe: "#O Zürafanın#! peşindeki safari yarıda kesildi—Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] tek kelime etmeden bitkilerin arasına karıştı. Endişeler giderek büyüyor."
 dubois.34.d.zebra: "#O Zebranın#! peşine düşen safari bozuldu—Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] ortalarda yoktu."
 dubois.34.f: "Kısa bir molanın ardından safari ekibi liderlerinin yokluğunu fark etti. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] kısa süre sonra kurumuş bir termit tepesinin üzerinde bulundu; gözleri, mavi, kırmızı ve yeşilin parıltısıyla kıpır kıpır böcek sürüsüne kilitlenmişti. Çocukça bir coşkuyla, birkaçının daha önce belgelendirilmemiş türler olabileceğini katalogluyordu."
 dubois.34.g: "Bilimsel çalışma için böcek örnekleri toplayın."
 dubois.34.h: "Böceklerle vakit kaybedilecek zaman değil—av devam etsin!"
 dubois.39.t: "Başarılı Bir Av"
 dubois.39.f: "'Afrika’da her şey ısırır, ama en kötüsü safari ateşidir.' – Ernest Hemingway"
 dubois.39.g: "Bilim için bir zafer!"
 dubois.40.t: "Safari Tamamlandı"
 dubois.40.d.success: "Hedef ele geçirilip sefer tamamlandıktan sonra Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] zaferle yurda döner. [ROOT.GetCountry.GetNameNoFlag] Ulusal Hayvanat Bahçesi’ne yapılacak bu yeni ekleme, halkı hayranlığa, akademiyi ise büyük ilgiye sürükleyecektir."
 dubois.40.d.fail: "Aylar süren zorluklar ve boş geçen izlerin ardından Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], [ROOT.GetCountry.GetNameNoFlag]’a eli boş döndü. Sefer sona erdi, vaatleri boşa çıktı."
 dubois.40.f: "'Tek istediğim Afrika’ya geri dönmekti. Hâlâ oradaydık ama geceleri uyandığımda dinlerken, şimdiden özlemini çekiyordum...' – Ernest Hemingway"
 dubois.40.g: "Sıradaki sefere doğru!"
 dubois.41.t: "Egzotik Bitkiler"
 dubois.41.d: "Sefer, olağanüstü bir egzotik bitki çeşitliliğiyle karşılaştı; fakat bu yemyeşil yerin güvenliği belirsizliğini koruyor."
 dubois.41.f: "Sefer üyeleri nehirler aşmış, sırtları tırmanmış, yoğun orman altını zorlamıştı. Fakat hiçbiri, devasa yapraklı, imkânsız renklere bürünen bu kocaman çiçekli bitkilerin görkemi için hazırlıklı değildi. [SCOPE.sCharacter('expedition_leader').GetFullName] önce oyalanmayacaklarını ilan etti, ancak sonra bir araştırma yardımcısının birkaç örnek toplamasına izin verdi. Bilimsel değeri göz ardı edilemeyecek kadar büyüktü. Yine de orman, ne kuş ne hayvan ne de insan sesi olduğu belli olmayan garip yankılarla doluydu; bu sesler lideri tedirgin etti."
 dubois.41.g: "Birkaç bitki örneği toplayın."
 dubois.41.h: "Olabildiğince çok örnek toplayın."
 dubois.42.t: "Kelebekler"
 dubois.42.d: "Sefer, güneş ışığına boğulmuş bir açıklığa vardığında gökyüzünde on binlerce kelebeğin dans ettiğini gördü."
 dubois.42.f: "'Bunlar uçan çiçeklerdir, neredeyse şarkı söylerler.' – Robert Frost"
 dubois.42.g: "Doğabilimcilerimiz bu manzaradan büyülenecek."
 dubois.43.t: "Nehir Balıkları"
 dubois.43.d: "Bir nehri geçerken, seferin bazı üyeleri sığ sularda tanınmayan balık [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] fark etti. Ancak [SCOPE.sCharacter('expedition_leader').GetFullName]’in farklı fikirleri vardı."
 dubois.43.f: "Parıltılı, mücevher tonlarında yaratıklar suyun hemen altında yüzüyordu—güzel, gizemli ve tamamen bilinmeyen. Bilimsel ekip için bu, kataloglanması gereken bir mucizeydi. Sefer lideri içinse tencereye atılması gereken bir ihtiyaç. Kısa bir tartışmanın ardından ateş çoktan yanıyordu."
 dubois.43.g: "Balıkları koruyun ve inceleyin."
 dubois.43.h: "Balıkları pişirip yiyin."
 dubois.44.t: "Kaybolan Örnekler"
 dubois.44.d: "Birkaç gün önce sefer, büyük bilimsel değer taşıyan örnekler toplamıştı—şimdi ise herkesin üzüntüsüne, bunlar kayboldu."
 dubois.44.f: "Öğle vakti bir çığlık yükseldi. [SCOPE.sCharacter('expedition_leader').GetFullName], pusuda bekleyen yerel düşmanlardan ya da vahşi hayvanlardan korktu—ama bu sadece solgun yüzlü, telaşlı bir araştırma asistanıydı. Böceklerle, yapraklarla ve korunmuş örneklerle dolu sandıklar kaybolmuştu. Asistan geri dönmeyi talep etti ama hamallar reddetti; lider ise bu fikri umursamadı: çok tehlikeliydi ve zaten ot toplamak için fazlasıyla vakit harcanmıştı. Asistan ise bu ihmali bilim ve siyaset çevrelerinde etkili dostlarına şikâyet etmekle tehdit etti."
 dubois.44.g: "Geri dönüp koleksiyonu kurtarın."
 dubois.44.h: "‘Önemsiz otları’ geride bırakın ve yola devam edin."
 dubois.45.t: "Değerli Bir Koleksiyon"
 dubois.45.d: "Issız bir açıklıkta, sefer yıllar önce uygarlıktan vazgeçmiş, nadir örneklerden oluşan olağanüstü bir koleksiyon toplamış yalnız bir doğabilimci keşfetti."
 dubois.45.f: "İnce, yıpranmış bir bedeni, dağınık saçları ve yalnızlıktan çökmüş gözleri vardı. Ancak barınağı titizlikle korunmuş böcekler, kelebekler, tohumlar ve notlarla dolu eskizlerle taşmaktaydı. [SCOPE.sCharacter('expedition_leader').GetFullName] adamın deli değil, parlak zekâlı—ama korkmuş—olduğunu hemen anladı. Borçlularından ve itibarından korkan bu münzevi geri dönmeye çekiniyordu. Oysa koleksiyonu, bilimsel ve başka açılardan paha biçilmezdi. Burada fırsatlar vardı, yalnızca botanik olanlar değil."
 dubois.45.g: "Koleksiyonu kurumumuz için satın alın."
 dubois.45.h: "Biz daha çok bildiklerine ilgi duyuyoruz."
 dubois.72.t: "Jeolojik Oluşum Keşfedildi"
 dubois.72.d: "[SCOPE.sState('dubois_formation_state').GetName] bölgesinde [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], milyonlarca yıllık kaya oluşumları keşfetti. Hâlâ bilinmeyen fosillerin orada saklı olduğuna inanıyorlar."
 dubois.72.f: "Kadim kaya katmanları paleontologlar için bir cennettir. Tüm kaya oluşumlarında küçük fosiller bulunabilir. Büyük oluşumlar ise devasa dinozor iskeletlerini bile barındırabilir. Paleontolojik süreç birkaç aşamada gerçekleşir. Fosilleri ortaya çıkarmak için bir paleontolog gereklidir. Onlar, oluşumları yıllık incelemelerle araştırır ve fosilleri gün yüzüne çıkarır."
 dubois.72.g: "Daha yakından incelemeliyiz."
 dubois.73.t: "Büyük Jeolojik Oluşum Keşfedildi"
 dubois.73.d: "[SCOPE.sState('dubois_formation_state').GetName] bölgesinde paleontologlar, milyonlarca yıllık kaya oluşumları keşfetti. Bu devasa oluşumda sayısız fosilin—hatta belki de şimdiye dek sadece hayalini kurabildiğimiz, iyi korunmuş iskeletlerin—gizlendiği düşünülüyor."
 dubois.101.t: "Kutup Ayısı Geldi"
 dubois.101.d: "Hayvanat bahçemize yeni bir mucize katıldı: uzun zamandır beklenen #O Kutup Ayısı#! güvenle kafesine yerleştirildi."
 dubois.101.f: "Kutup Ayısı (*Ursus maritimus*), buzlu kuzeyin kudretli yırtıcısıdır; Arktik’in sürüklenen deniz buzuna uyum sağlamıştır. Buzlu sularda fok avlar, yiyecek bulmak için muazzam mesafeler kateder. Gücüne rağmen diğer ayı türlerine göre daha az bölgeci olup çoğu kez kavga etmektense geri çekilir. Hem korkulan hem tehdit altında olan bu canlı, dünyanın en soğuk diyarlarının haşin güzelliğini temsil eder."
 dubois.101.g: "Haşmetli bir ekleme."
 dubois.102.t: "Grizzly Ayısı Geldi"
 dubois.102.d: "Hayvanat bahçemiz heyecanla çalkalanıyor: korkulan ve saygı duyulan #O Grizzly Ayısı#! artık koleksiyonumuzun bir parçası."
 dubois.102.f: "Grizzly Ayısı (*Ursus arctos horribilis*), kimi zaman Kuzey Amerika boz ayısı olarak da bilinir, muazzam gücü ve efsanevi vahşetiyle tanınır. Adı bile çift anlam taşır—postunun griliği ve kudretinin dehşeti. Bir zamanlar Amerika kıtasında özgürce dolaşan bu görkemli hayvan, artık hem doğanın kudretine hem de insanlığın yıkıcı geçmişine tanıklık etmektedir. Bu yalnızca bir merak unsuru değil; bir hatırlatmadır."
 dubois.102.g: "Heybetli bir varlık."
 dubois.103.t: "Kel Kartal Geldi"
 dubois.103.d: "Bugün ulusal bir sembol ve doğa harikasını sergiliyoruz: #O Kel Kartal#! artık kuşhanelerimizi süslüyor."
 dubois.103.f: "Kel Kartal (*Haliaeetus leucocephalus*), Kuzey Amerika’ya özgü bir yırtıcı kuştur ve en çok nehirler, göller ve kıyı sularında görülür. Asil silueti ve çınlayan çığlığı, özgürlüğün ve gücün simgesi haline gelmiştir. Adına rağmen kel değildir; koyu gövdesiyle kontrast oluşturan beyaz tüylü bir kafası vardır. Fırsatçı ve uyumlu yapısıyla yalnızca bir yırtıcı olarak değil, Amerikan cumhuriyetinin kültürel bir simgesi olarak da saygı görür."
 dubois.103.g: "Asil bir yırtıcı kuş."
 dubois.104.t: "Amerikan Bizonu Geldi"
 dubois.104.d: "Koleksiyonumuz gitgide daha da görkemli hâle geliyor: ikonik #O Amerikan Bizonu#! artık özenle hazırlanmış bozkır alanımızda dolaşıyor."
 dubois.104.f: "Amerikan Bizonu (*Bison bison*), bazen buffalo olarak da anılır, bir zamanlar Kuzey Amerika bozkırlarında dev sürüler halinde gürleyerek dolaşırdı. Bu tüylü devler, kontrolsüz avlanma ve yerleşimlerin yayılmasıyla yok olma noktasına getirilmişti. Onların korunaklı alanlara dönüşü, hem geçmişin sorumsuzluğuna hem de bugünün sorumluluğuna bir anıt niteliğindedir. Kadim gücün canlı bir simgesi, değişen bir kıtada direncin vücut bulmuş hâlidir."
 dubois.104.g: "Tüylü bir dev."
 dubois.105.t: "Florida Puması Geldi"
 dubois.105.d: "Bugün #O Florida Puması#! hayvanat bahçemize katıldı ve ziyaretçilere bu ürkek kedigili görme fırsatı sundu."
 dubois.105.f: "Florida Puması (*Puma concolor coryi*), Kuzey Amerika dağ aslanının (cougar) içine kapanık bir alttürüdür; ABD’nin güneydoğusundaki bataklık ormanlarda ve subtropikal çalılıklarda yaşar. Solgun postu, koyu kuyruk ucu ve kulaklarıyla dikkat çeker. Sessiz adımlarına karşın daha çok çıkardığı cıvıltı, homurtu ve tıslamalarla fark edilir. Uzun süre zulme uğramış ve bugün koruma altına alınmış olan bu hayvan, Kuzey Amerika’daki en nadir büyük memelilerden biridir."
 dubois.105.g: "Bataklıkların hayaleti."
 dubois.106.t: "Amerikan Timsahı Geldi"
 dubois.106.d: "Geçmiş çağlardan kalma korkutucu bir kalıntı artık bizimle: #O Amerikan Timsahı#! hayvanat bahçemize ulaştı."
 dubois.106.f: "Amerikan Timsahı (*Alligator mississippiensis*), bataklıkların kudretli sürüngenidir ve tam anlamıyla bir hâkimdir. Hem en üst avcı hem de ekosistem düzenleyicisidir; av nüfuslarını dengeleyerek ve su birikintileri açarak çevresini şekillendirir. Çiftleşme ya da üstünlük gösterilerinde çıkardığı derin böğürtüler bataklıklarda yankılanır. Korkutucu görünümüne karşın, bu kadim yaratık hem yaşam alanının sağlığı hem de halkın eğitimi için hayati önemdedir."
 dubois.106.g: "Diş ve dehşet."
 dubois.107.t: "Aksolotl Geldi"
 dubois.107.d: "Suların esrarengiz harikası artık bizim himayemizde: #O Aksolotl#! sergileniyor."
 dubois.107.f: "Aksolotl (*Ambystoma mexicanum*), Meksika’nın kadim göllerine özgü, yaşamı boyunca suda kalan bir semender türüdür. Eşsiz biçimde, hiçbir zaman başkalaşım geçirmez; erginliğe ulaştığında bile yavru özelliklerini korur. Kaybettiği uzuvlarını, hatta kalbinin veya beyninin parçalarını yenileme kabiliyetiyle kuşaklar boyunca bilim insanlarını büyülemiştir. Von Humboldt’un çağından beri incelenen bu canlı, hâlâ biyolojik gizemin ve uyumun bir simgesidir."
 dubois.107.g: "Yaşayan bir mucize."
 dubois.111.t: "Kahverenk Boğazlı Tembel Hayvan Geldi"
 dubois.111.d: "Ağaçların tepesinden gelen sıra dışı bir hazine artık bahçemize ev sahipliği yapıyor: #O Kahverenk Boğazlı Tembel Hayvan#! yavaşça kafesine yerleştirildi."
 dubois.111.f: "Kahverenk Boğazlı Tembel Hayvan (*Bradypus variegatus*), Orta ve Güney Amerika’nın Neotropik bölgelerinde bulunan yavaş hareket eden bir ağaç memelisidir. Ormanın üst katmanlarını tercih eder ve hayatının büyük kısmını baş aşağı asılı geçirir; yalnızca sekiz günde bir dışkılamak için yere iner. Çok küçük bir yaşam alanına bağlı kalarak, genellikle yalnızca bir ya da iki ağaç türünde uzmanlaşır. Ağırkanlı görünümüne rağmen mükemmel bir kamuflaj ustasıdır ve evrimsel sabrın bir sembolüdür."
 dubois.111.g: "En yavaş filozof."
 dubois.112.t: "Jaguar Geldi"
 dubois.112.d: "Sessiz adımları ve yanar gibi gözleriyle #O Jaguar#! artık hayvanat bahçemizin gölgeli kafeslerinde dolaşıyor."
 dubois.112.f: "Jaguar (*Panthera onca*), tropikal Amerika’nın en tepe yırtıcısı ve dünyadaki üçüncü en büyük kedigil türüdür. Kaslı yapısı, benekli rozet desenli kürkü ve olağanüstü güçlü ısırığıyla tanınır; tek bir darbe ile avının kafatasını parçalayabilir. Adı, Tupi-Guarani dilindeki *yaguara* sözcüğünden gelir: 'tek sıçrayışta öldüren.' Kaçak ve yalnız yaşayan bu kedi, yağmur ormanlarında gizlilik ve sürprizin ustasıdır."
 dubois.112.g: "Gizliliğin cisimleşmiş hâli."
 dubois.113.t: "Dev Karıncayiyen Geldi"
 dubois.113.d: "Tuhaf bir böcekçil artık aramızda: #O Dev Karıncayiyen#! yeni yuvasında ilk adımlarını attı."
 dubois.113.f: "Dev Karıncayiyen (*Myrmecophaga tridactyla*), karıncayiyen türlerinin en büyüğüdür ve Orta ile Güney Amerika’nın otlakları ve ormanlarında yaşar. Bu yalnız memeli, 60 cm’ye kadar uzayabilen ince burnu ve diliyle, ayrıca güçlü pençeleriyle dikkat çeker; termit yuvalarını ve karınca tepelerini parçalamak için bunları kullanır. Hantal yürüyüşüne karşın, özel beslenme ve yaşam tarzına kusursuz uyum sağlamıştır. Sakin görünümüne rağmen tehdit edildiğinde kendini şiddetle savunabilir."
 dubois.113.g: "Böcekçillerin aristokratı."
 dubois.114.t: "Dokuz Bantlı Armadillo Geldi"
 dubois.114.d: "Zırhla kaplı bir yaratık şimdi sergimizde koşturuyor: #O Dokuz Bantlı Armadillo#! geldi."
 dubois.114.f: "Dokuz Bantlı Armadillo (*Dasypus novemcinctus*), Amerika kıtasındaki en yaygın armadillo türüdür. Segmentli, kemiksi kabuğu ve çekingen tavrıyla tanınır; kazmada ve böcek avında ustadır. Büyük Amerikan Biyotik Değişimi’nin önemli bir katılımcısı olmuş, son on yıllarda yaşam alanını kuzeye doğru genişletmiştir. Garip hareket yöntemleri arasında yüzmek ya da nehir diplerinde yürümek de vardır; bu da onu biyolojik dayanıklılığın ve uyumun bir harikası yapar."
 dubois.114.g: "Merakla kaplanmış."
 dubois.115.t: "And Kondoru Geldi"
 dubois.115.d: "Bir zamanlar sarp kayalıkların ve zirvelerin üstünde süzülen #O And Kondoru#! artık dev kanatlarını kuşhanemizin üzerine geriyor."
 dubois.115.f: "And Kondoru (*Vultur gryphus*), kanat açıklığı ve ağırlığı bakımından dünyanın en büyük uçan kuşlarından biridir; Güney Amerika’nın And Dağları ve Pasifik kıyılarına özgüdür. Leş yiyici olarak dağ ekosistemlerinde kritik bir rol oynar. Tüysüz başı ve boynu, duygu ya da sıcaklığa göre renk değiştirir; dev kanatları ise tek çırpma olmaksızın saatlerce süzülmesini sağlar. And mitolojisinde yüceltilmiş ve özgürlüğün sembolü sayılmıştır; hem görkemli hem de nesli tehlike altındadır."
 dubois.115.g: "Yükselen akımların hükümdarı."
 dubois.116.t: "Batı Hint Manatısı Geldi"
 dubois.116.d: "Karayip sığlıklarından gelen nazik bir yüzücü artık bizimle: #O Batı Hint Manatısı#! sergileniyor."
 dubois.116.f: "Batı Hint Manatısı (*Trichechus manatus*), Karayipler, Meksika Körfezi ve ABD’nin güneydoğusundaki sıcak kıyı sularında bulunan, yavaş hareket eden otçul bir deniz memelisidir. Bazen 'deniz inekleri' olarak anılan manatılar, sualtı bitkileriyle beslenir ve uysal tabiatlarıyla bilinir. Boyutlarına rağmen çevik yüzücülerdir; güçlü, kürek biçimli kuyruklarıyla ilerlerler. Doğal yırtıcıları olmamasına rağmen, insan faaliyetlerinden—tekne çarpmaları ve yaşam alanı kaybından—büyük zarar görmüştür."
 dubois.116.g: "Yüzen bir filozof."
 dubois.117.t: "Sincap Maymun Geldi"
 dubois.117.d: "Küçük bedeniyle ama büyük cazibesiyle #O Sincap Maymun#! koleksiyonumuza katıldı."
 dubois.117.f: "Sincap Maymunlar (*Saimiri cinsi*), Orta ve Güney Amerika’nın tropikal ormanlarına özgü, son derece sosyal primatlardır. Bir kilogramdan daha az ağırlıklarıyla çevik tırmanıcılar, hızlı sıçrayıcılar ve bitmek bilmez bir merakın sahipleridir. Baskın dişilerin önderlik ettiği büyük gruplarda yaşarlar; cıvıltı, kahkaha ve ıslıklarla dolu karmaşık iletişimleri, gelişmiş sosyal bağlarını yansıtır. İfade dolu yüzleri ve bitmeyen enerjileri, onları hem araştırma konusu hem de halkın gözdesi yapar."
 dubois.117.g: "Ufak akrobatlar, büyük cazibeyle."
 dubois.121.t: "İber Vaşağı Geldi"
 dubois.121.d: "Yeni ve ürkek bir sakin koleksiyonumuza katıldı: nadir ve zarif #O İber Vaşağı#! artık kafesinde."
 dubois.121.f: "İber Vaşağı (*Lynx pardinus*), yalnızca İber Yarımadası’na özgü, kritik derecede tehlike altındaki bir kedigildir. Benekli sarımsı kürkü, siyah kulak püskülleri ve kısa kuyruğuyla ayırt edilir; Avrasya kuzeninden belirgin şekilde küçüktür. İşitmesi son derece hassastır; kulaktaki fırça kılları yön tayininde yardımcı olur—deneyler, bu püsküller alındığında işitsel algının bozulduğunu göstermiştir. Yalnız ve bölgeci olan İber Vaşağı, bir zamanlar İspanya ve Portekiz’e yayılmışken bugün sıkı koruma çabalarıyla varlığını sürdürmektedir."
 dubois.121.g: "Yarımadanın nadide mücevheri."
 dubois.122.t: "Avrasya Kurdu Geldi"
 dubois.122.d: "Sessiz adımlar ve tetikte gözlerle #O Avrasya Kurdu#! artık hayvanat bahçemizde."
 dubois.122.f: "Avrasya Kurdu (*Canis lupus lupus*), gri kurdun en yaygın alt türüdür ve Avrupa ile Asya’nın geniş bölgelerine yayılır. Kürkü griden kızılımsıya değişir, sırtında ise belirgin siyah bir 'eyer' lekesi bulunur. Kurnaz ve sosyal bir yırtıcıdır. Uluması, Amerikan kuzenlerinden daha uzun ve ezgisel olup eski dünyanın ürkütücü şarkısı gibidir. Yüzyıllar boyu hem efsanelerde hem de zulümde yaşamış ama uzak ormanlarda ve bozkırlarda hayatta kalmayı başarmıştır."
 dubois.122.g: "Hayalet bir nöbetçi."
 dubois.123.t: "Avrasya Porsuku Geldi"
 dubois.123.d: "Bugün inatçı bir kazıcı koleksiyonumuza katıldı: #O Avrasya Porsuku#! başarıyla yerleştirildi."
 dubois.123.f: "Avrasya Porsuku (*Meles meles*), Avrupa’nın büyük kısmında yaşayan, tıknaz yapılı gececi bir sansargildir. Siyah-beyaz yüz çizgileriyle ayırt edilir ve 'sett' adı verilen karmaşık yeraltı yuvalarında yaşar; genellikle akrabalarıyla paylaşır. Sosyal bu etoburlar, solucanlar, böcekler ve yumrularla beslenir ve nesiller boyunca aktarılan geniş yuva sistemleri kurarlar. Mevsimsel kilo değişimleri, kış uykusu ve iklim koşullarının zorluklarını yansıtır."
 dubois.123.g: "Yeraltının azimli bekçisi."
 dubois.124.t: "Avrasya Gelinciği Geldi"
 dubois.124.d: "Memeli koleksiyonumuz yeniden büyüyor: çevik ve ölümcül #O Avrasya Gelinciği#! artık hayvanat bahçemizde."
 dubois.124.f: "Avrasya Gelinciği (*Mustela erminea*), kışın beyaz postuyla 'ermini' olarak da bilinen, Avrasya ve Kuzey Amerika’ya özgü küçük bir sansargildir. Uzun gövdesi, kısa bacakları ve siyah uçlu kuyruğuyla, özellikle kemirgenlerin hızlı takibine uyum sağlamıştır. Kendisinden birkaç kat büyük hayvanlara saldırabildiği bilinmektedir. Beyaz kürkü yüzyıllar boyunca kraliyet kaftanlarını süslemiş, bu gizemli canlıyı asalete dair kalıcı bir sembol hâline getirmiştir."
 dubois.124.g: "Ermin kürküne bürünmüş bir katil."
 dubois.125.t: "Avrasya Su Samuru Geldi"
 dubois.125.d: "Hayvanat bahçemizin sularına yeni bir sakin dâhil oldu: #O Avrasya Su Samuru#! geldi."
 dubois.125.f: "Avrasya Su Samuru (*Lutra lutra*), Avrupa ve Asya’nın geniş kesimlerine yayılan yarı sucul bir yırtıcıdır. Temel olarak balıkla beslenir ve nehirlerde, göllerde olağanüstü çeviklikle dolaşır. Kürkü, hayvanlar âleminin en yoğun yapılarından biridir; kilitlenen tüyleri havayı hapseder ve suyu iter, bu sayede buzlu koşullarda bile kuru ve sıcak kalır. Çekingen ama meraklı olan su samuru, sağlıklı tatlı su ekosistemlerinin göstergesi ve başarılı koruma çabalarının bir simgesidir."
 dubois.125.g: "Akarsuların ruhu."
 dubois.126.t: "Alp Keçisi Geldi"
 dubois.126.d: "Alp sergimizin kayalıklarında #O Alp Keçisi#! artık gururla yükseliyor."
 dubois.126.f: "Alp Keçisi (*Capra ibex*), Avrupa Alpleri’ne özgü bir yaban keçisi türüdür ve görkemli boynuzları ile çevik tırmanışlarıyla tanınır. Erkekleri, çiftleşme döneminde ritüel dövüşlerde kullandıkları büyük kıvrımlı boynuzlara sahiptir. Dikey arazilere olağanüstü uyum sağlar; seyrek alp bitkileriyle beslenir ve sarp kayalık iklimlerde yaşar. Bir zamanlar neredeyse yok olma noktasına getirilmişken, kraliyet fermanları ve koruma çalışmalarıyla dağlara yeniden kazandırılmıştır."
 dubois.126.g: "Dağların hükümdarı."
 dubois.127.t: "Avrupa Bizonu (Wisent) Geldi"
 dubois.127.d: "Avrupa’nın kadim devi geri döndü: #O Avrupa Bizonu (Wisent)#! artık yemyeşil padokta dolaşıyor."
 dubois.127.f: "Wisent (*Bison bonasus*), ya da Avrupa Bizonu, Avrupa’nın hâlen yaşayan en ağır kara memelisidir. Bir zamanlar İspanya’dan Ural Dağları’na kadar uzanırken, 20. yüzyılın başlarında doğada tamamen yok olmuştur. Bugün yaşayan tüm bireyler, yalnızca bir düzine kadar hayvanat bahçesinde korunan atalarından türemiştir. Amerikan kuzenine kıyasla daha uzun ve daha ince yapılıdır; karışık ve yaprak döken ormanlara uyum sağlamıştır. Zor koşullara karşı direnişin yaşayan bir sembolüdür."
 dubois.127.g: "Yeniden doğan bir yadigâr."
 dubois.131.t: "Su Aygırı Geldi"
 dubois.131.d: "Hayvanat bahçemiz şimdi kudretli bir canlıya daha ev sahipliği yapıyor: ağırbaşlı #O Su Aygırı#! sucul alanına yerleştirildi."
 dubois.131.f: "Su Aygırı (*Hippopotamus amphibius*), Sahra-altı Afrika’ya özgü yarı sucul bir çift toynaklıdır ve fil ile gergedandan sonra üçüncü en büyük kara memelisidir. Adı Yunanca 'nehir atı'ndan türetilmiştir; ancak huysuz mizacı atlardan çok daha tehlikelidir. Gün içinde nehir ve bataklıklarda suya gömülü durur, yalnızca nefes almak için çıkar; geceleri ise otlamak için tek başına dolaşır. Otçul olmasına rağmen, su aygırı Afrika faunasının en tehlikeli hayvanlarından biridir; kışkırtıldığında olağanüstü hız ve saldırganlık sergiler."
 dubois.131.g: "Sığlıkların leviathanı."
 dubois.132.t: "Afrika Aslanı Geldi"
 dubois.132.d: "Asil duruşu ve kadim ünüyle bir canlı artık bizim korumamızda: #O Afrika Aslanı#! bahçemizdeki alanında dolaşıyor."
 dubois.132.f: "Aslan (*Panthera leo*), Afrika’nın çayır ve savanlarına ve kısmen Hindistan’a özgü güçlü bir kedigildir. Çoğu kedi türünden farklı olarak, aslanlar 'pride' adı verilen karmaşık aile gruplarında yaşayan sosyal hayvanlardır. Erkeklerin görkemli yelesi hem süs hem de koruma işlevi görür. Tarih boyunca armalar, heykeller ve dizelerde yüceltilmiş olan aslan, hâlen egemenliğin, cesaretin ve kudretin güçlü bir simgesidir. Ancak mitin ardında, bireysel gücünü işbirliğiyle katlayan gerçek bir yırtıcı vardır."
 dubois.132.g: "Egemen canavar."
 dubois.133.t: "Afrika Çalı Fili Geldi"
 dubois.133.d: "Yeryüzünün en büyük kara hayvanı geldi: bugün #O Afrika Çalı Fili#! özel hazırlanmış alanına kavuşuyor."
 dubois.133.f: "Afrika Çalı Fili (*Loxodonta africana*), zekâsı, hafızası ve anaerkil toplumsal yapısıyla tanınan devasa bir otoburdur. Kocaman kulakları vücut ısısını düzenlerken, olağanüstü bir biçimde burun ve üst dudaktan birleşmiş hortumu dokunma, koku alma ve nesneleri kavrama işlevi görür. Filler ölülerini anmaları ve karmaşık sosyal davranışlarıyla bilinir. Bir zamanlar uçsuz bucaksız düzlüklerin hâkimleri iken, bugün değişen dünyada hem görkemin hem de kırılganlığın sembolüdürler."
 dubois.133.g: "Hafıza ve kudretin timsali."
 dubois.134.t: "Zürafa Geldi"
 dubois.134.d: "Herkesin üzerine yükselen #O Zürafa#! artık hayvanat bahçemizdeki yerini aldı."
 dubois.134.f: "Zürafa (*Giraffa camelopardalis*), yaşayan en uzun kara hayvanıdır; uzun boynu ve yamalı kürküyle kolayca ayırt edilir. Afrika savanları ve ormanlık alanlarına özgüdür; diğer otoburların ulaşamadığı yükseklikteki akasya yapraklarını tüketir. Çelimsiz gibi görünse de şaşırtıcı derecede zarif ve hızlı hareket eder. İnsanlığı uzun süredir büyülemiş; zarafetin ve dünyadışı tasarımın kalıcı bir sembolü olmuştur."
 dubois.134.g: "Diğerlerinden bir boy önde."
 dubois.135.t: "Afrika Pengueni Geldi"
 dubois.135.d: "Güney denizlerinden beklenmedik bir misafir koleksiyonumuza katıldı: #O Afrika Pengueni#! artık sergileniyor."
 dubois.135.f: "Afrika Pengueni (*Spheniscus demersus*), Afrika kıtasında üreyen tek penguen türüdür. Siyah yüz maskesi ve pembe göz halkalarıyla ayırt edilir; balık ve kalamarla beslenen bir dalış avcısıdır. Ilıman iklimlere uyum sağlamıştır ve soğuk koşullara ihtiyaç duymadan kıyı bölgelerde yaşar. Komik yürüyüşü, denizdeki olağanüstü çevikliğini ve dayanıklılığını gizler; hem ziyaretçilerin hem de doğa bilimcilerin gözdesidir."
 dubois.135.g: "Takım elbiseli bir deniz kuşu."
 dubois.136.t: "Çıplak Kör Fare Geldi"
 dubois.136.d: "Doğanın eşsiz bir garipliği şimdi gözlerimizin önünde toprağı kazıyor: #O Çıplak Kör Fare#! geldi."
 dubois.136.f: "Çıplak Kör Fare (*Heterocephalus glaber*), Doğu Afrika topraklarının altında yaşamaya uyum sağlamış olağanüstü bir kemirgendir. Neredeyse tüysüz ve soğukkanlıdır; memeliler arasında tek 'ısıl uyum sağlayıcı' ve az sayıdaki 'eusosyal' türden biridir; koloniler, bir kraliçe ve eşlerinin hâkimiyetindedir. Kansere dirençli olması ve oksijensiz koşullarda uzun süre hayatta kalabilmesiyle bilinir. Uzun ömür ve hücresel onarım konularında yoğun bilimsel araştırmalara konu olmuştur."
 dubois.136.g: "Güzellik değilse de biyolojinin harikası."
 dubois.137.t: "Ovalar Zebrası Geldi"
 dubois.137.d: "Afrika’nın açık ovalarının çizgili sakini koleksiyonumuza katıldı: işte #O Ovalar Zebrası#! yeni yuvasında."
 dubois.137.f: "Zebra (*Equus quagga*), yalnızca Afrika’ya özgü yabani atgillerden bir türdür. Siyah-beyaz çizgileriyle bilinir; savanlarda, otlaklarda ve hatta dağlık bölgelerde yaşar. Eşsiz kürk desenlerinin evrimsel amacı hâlâ tartışmalıdır—kamuflaj, yırtıcıları şaşırtma, ısı düzenlemesi veya sinekleri uzak tutma gibi farklı teoriler öne sürülmektedir. Sürü hâlinde yaşayan zebralar, keskin görme duyuları ve güçlü toynaklarıyla hem zarif hem de tetiktir."
 dubois.137.g: "Çizgiler içinde düzen."
 dubois.141.t: "Dev Panda Geldi"
 dubois.141.d: "Doğu’nun eşsiz bir sembolü artık bahçemizi süslüyor: #O Dev Panda#! özel olarak inşa edilmiş alanına yerleşti."
 dubois.141.f: "Dev Panda (*Ailuropoda melanoleuca*), Çin’in orta kesimlerindeki ılıman dağ ormanlarına özgü bir ayıdır. Belirgin siyah-beyaz kürkü ve ağır yürüyüşüyle ayırt edilir. Ursid familyasında neredeyse tamamen bambuyla beslenen tek türdür. Etçil takımına ait olmasına rağmen sindirim sistemi bambuya pek uygun değildir; bu nedenle sürekli beslenmek zorundadır. Yalnız yaşamayı tercih eder; belirlenmiş bir bölgede dolaşır ve yalnızca kısa çiftleşme döneminde diğerleriyle etkileşir. Batılı doğa bilimciler için bir zamanlar neredeyse efsanevi bir canlı olan panda, bugün hâlen korumanın yaşayan simgesidir."
 dubois.141.g: "Çin’in elçisi."
 dubois.142.t: "Borneo Orangutanı Geldi"
 dubois.142.d: "Bugün derin zekâ ve arboreal zarafet sahibi bir canlıyı karşılıyoruz: #O Borneo Orangutanı#! artık ağaç tepelerindeki yuvasında."
 dubois.142.f: "Borneo Orangutanı (*Pongo pygmaeus*), Borneo ve Sumatra yağmur ormanlarına özgü bir büyük insansı maymundur. Uzun kolları ve kızılımsı tüyleriyle tanınır; en ağaçsıl yaşam süren primatlardandır ve her gece dallardan yuvalar yapar. Erkekler geniş yüz çıkıntıları geliştirir ve varlıklarını ilan etmek için yankılı uzun sesler çıkarır. Genellikle yalnızdır; sosyal bağlar çoğunlukla anne-çocuk ilişkisiyle sınırlıdır. Olağanüstü problem çözme yeteneği, alet kullanımı ve hafızasıyla öne çıkar; insan dışındaki en zeki hayvanlardan biri kabul edilir."
 dubois.142.g: "Ormanın bilge sakinlerinden biri."
 dubois.143.t: "Bengal Kaplanı Geldi"
 dubois.143.d: "Ormanların ve çayırların hükümdarı sonunda geldi: #O Bengal Kaplanı#! artık görkemli alanında hüküm sürüyor."
 dubois.143.f: "Bengal Kaplanı (*Panthera tigris tigris*), Hint altkıtasına özgü, güçlü bir yırtıcıdır. Parlak turuncu kürkü ve cesur siyah çizgileriyle dünyanın en büyük ve en dikkat çekici kedilerinden biridir. Yalnız yaşamayı tercih eden kaplan, avını gizlilik ve güçle, çoğu kez ölümcül bir pusu ile yakalar. Ormanlarda, bataklıklarda ve çayırlarda, büyük otçulların bulunduğu her yerde yaşam alanı bulur. Şairlerin, prenslerin ve avcıların hayranlığını yüzyıllardır kazanan kaplan, ihtişamın ve vahşiliğin kalıcı bir sembolüdür."
 dubois.143.g: "Taçsız bir gerçek kral."
 dubois.144.t: "Malay Tapiri Geldi"
 dubois.144.d: "Eşsiz görünüşü ve merak uyandıran alışkanlıklarıyla #O Malay Tapiri#! artık egzotik hayvanlarımız arasında."
 dubois.144.f: "Malay Tapiri (*Tapirus indicus*), tapirler arasında en büyük ve en farklı görünüme sahip türdür; ayrıca Amerika kıtası dışında bulunan tek tapir türüdür. Siyah ve beyazdan oluşan çarpıcı renk düzeni, Güneydoğu Asya’nın tropik ormanlarındaki gölgeli ışık altında kamuflaj sağlar. Görme duyusu zayıf, fakat işitme ve koku alma yetisi son derece gelişmiştir. Gece beslenen, gizemli bir otçuldur. Bir zamanlar garip görünüşü yüzünden zoologları şaşırtmış olsa da, bugün kadim bir soyun yaşayan kalıntısı olarak değerlidir."
 dubois.144.g: "Doğanın illüzyonisti."
 dubois.145.t: "Komodo Ejderi Geldi"
 dubois.145.d: "Uzak adalardan gelen sürüngen bir dehşet artık alanımızda dolaşıyor: #O Komodo Ejderi#! güvenle barınağına yerleştirildi."
 dubois.145.f: "Komodo Ejderi (*Varanus komodoensis*), yalnızca birkaç Endonezya adasında yaşayan, dünyanın en büyük kertenkele türüdür. Bu tepe yırtıcı üç metreye kadar büyüyebilir; güçlü kuyruğu, tırtıklı dişleri ve zehirli bezleriyle avını etkisiz hâle getirir. Usta bir pusu avcısıdır; canlı avını alt ettiği kadar leş de tüketir. Batı bilim dünyasının onu 1910’da keşfi, ününe mitolojik bir hava katmıştır. Bugün hâlâ ilkel kudretin simgesi olarak görülmektedir."
 dubois.145.g: "Sürüngenler çağından bir yankı."
 dubois.146.t: "Kar Leoparı Geldi"
 dubois.146.d: "Dünyanın çatısından süzülen, hayaletimsi #O Kar Leoparı#! koleksiyonumuza katıldı."
 dubois.146.f: "Kar Leoparı (*Panthera uncia*), 'ounce' olarak da bilinir, Orta ve Güney Asya’nın soğuk dağlık bölgelerinde yaşar. Duman rengi kürkü, kalın tüyleri, güçlü bacakları ve uzun kuyruğu sayesinde dağlık arazilere mükemmel şekilde uyum sağlamıştır. Sessiz ve nadiren görülen bir hayvandır; yaban koyunları ve keçileri avlamak için yüksek dağ geçitlerinde dolaşır. Diğer büyük kedilerden farklı olarak kükreyemez; bunun yerine tıslama, homurtu ve iniltili miyavlamalarla iletişim kurar. Orta Asya folklorunda uzun zamandır kutsal sayılmıştır; doğada ve kültürde hayaletvari varlığını sürdürür."
 dubois.146.g: "Dağların hayaleti."
 dubois.147.t: "Asya Çitası Geldi"
 dubois.147.d: "Çöl rüzgârı kadar hızlı, nadir bulunan #O Asya Çitası#! artık ziyaretçilerimizi hayran bırakmak için burada."
 dubois.147.f: "Asya Çitası (*Acinonyx jubatus venaticus*), bir zamanlar Orta Doğu’dan Hindistan’a kadar geniş bir alana yayılmış olan, kritik derecede tehlike altındaki bir çita alttürüdür. Daha açık renkli kürkü ve daha ince yapısıyla ayırt edilir; hâlâ dünyanın en hızlı kara memelisidir—kısa patlamalar hâlinde koşarak inanılmaz ısı üretir. Hindistan’daki soylular tarafından avcılıkta eğitilmesiyle tarihsel bağ kurmuş, hem zarafetin hem de düşüşün sembolü olmuştur. Günümüzde İran’daki çok küçük bir nüfusla hayatta kalmaktadır; yok olmuş yaşam alanlarının yaşayan anıtıdır."
 dubois.147.g: "Kaybolan hız."
 dubois.148.t: "Kızıl Panda Geldi"
 dubois.148.d: "Sisli Himalayalar’dan gelen nadir ve çekingen bir canlı ortaya çıktı: #O Kızıl Panda#! artık ağaçlarımızı süslüyor."
 dubois.148.f: "Kızıl Panda (*Ailurus fulgens*), doğu Himalayalar’ın ve güneybatı Çin’in ılıman ormanlarında yaşayan ağaçta yaşayan bir memelidir. Dev panda ile ismini paylaşsa da, bambaşka bir familyaya aittir. Kızılımsı kürkü, halkalı kuyruğu ve sevimli yüzüyle dikkat çeker. Gece ve alacakaranlıkta aktiftir, başlıca bambuyla beslenir. Sıcağa karşı hassastır ve yalnız yaşamayı tercih eder; gündüzlerini ağaç tepelerinde, kuyruğunu burnunun üzerine dolayarak uyuyarak geçirir. Nadir bir orman cevheri olan kızıl panda, hem değerli hem de tehdit altındadır."
 dubois.148.g: "Uzak duran ama zarif."
 dubois.151.t: "Yeşil Deniz Kaplumbağası Geldi"
 dubois.151.d: "Okyanusların kadim yolcusu güvenli bir liman buldu: #O Yeşil Deniz Kaplumbağası#! artık sualtı pavyonumuzda yaşıyor."
 dubois.151.f: "Yeşil Deniz Kaplumbağası (*Chelonia mydas*), beslenme alanları ile yumurtlama kumsalları arasında yaptığı uzun göçlerle tanınan büyük bir deniz sürüngenidir. Gözyaşı damlası şeklindeki aerodinamik kabuğu ve yüzgeç benzeri geniş uzuvlarıyla usta bir yüzücüdür. Genellikle zeytin yeşilinden siyaha kadar değişen renkleri, bulunduğu bölgeye göre farklılık gösterir. Yetişkinler neredeyse yalnızca deniz çayırlarıyla beslenir ve otlamalarıyla tüm sualtı çayır ekosistemlerini şekillendirir. Uzun ömürlü, sabırlı ve gizemli olan yeşil kaplumbağa, yüzyıllardır denizciler için dayanıklılığın sembolü olmuştur."
 dubois.151.g: "Kadim ve kalıcı."
 dubois.152.t: "Dev Okyanus Vatozu Geldi"
 dubois.152.d: "Engin ve sessiz bir dev kanat çırpıyor suyun altında: #O Dev Okyanus Vatozu#! artık büyük tuzlu su tankımızda süzülüyor."
 dubois.152.f: "Dev Okyanus Vatozu (*Mobula birostris*), vatozların en büyüğüdür; kanat açıklıkları 7 metreyi, hatta daha fazlasını bulabilir. Tropik ve subtropik denizlerde yaşayan bu nazik süzgeçle beslenen canlılar, kütlelerine rağmen son derece zarif bir şekilde okyanusta süzülür. Doğada çok az yırtıcıları vardır; asıl tehdit insandır. Pürüzsüz derileri üzerinde benzersiz desenler bulunur; bu desenler sayesinde her birey kolayca ayırt edilebilir. Okyanusların en görkemli canlılarından biri kabul edilen manta, yüzyıllardır denizcilerin ve doğabilimcilerin hayranlığını kazanmıştır."
 dubois.152.g: "Kanatlı bir hayalet."
 dubois.153.t: "Kızıl Kanguru Geldi"
 dubois.153.d: "Avustralya’nın kavrulmuş düzlüklerinden sıçrayarak gelen en yeni konuğumuz: #O Kızıl Kanguru#! artık esaret altındaki ilk sıçrayışını yaptı."
 dubois.153.f: "Kızıl Kanguru (*Osphranter rufus*), yaşayan keselilerin en büyüğü ve Avustralya taşrasının güçlü bir sembolüdür. 'Büyük Kızıllar' olarak bilinen erkekler özellikle heybetlidir; ayakta durduklarında 2,4 metreyi aşabilirler. Güçlü arka bacakları ve elastik tendonları sayesinde saatte 60 km’ye varan hızlarla uzun mesafeler kat edebilirler. Evrimsel tasarımın gerçek bir harikası olan kızıl kanguru, zarafeti, dayanıklılığı ve atletizmiyle çetin ve kurak vatanına eşsiz biçimde uyum sağlamıştır."
 dubois.153.g: "Uç noktalardan doğmuş bir canlı."
 dubois.154.t: "Koala Geldi"
 dubois.154.d: "Uykulu bir inatla dalına tutunan #O Koala#! artık okaliptus koruluğumuzda huzurla uyukluyor."
 dubois.154.f: "Koala (*Phascolarctos cinereus*), miskin yaşam tarzı ve okaliptus yapraklarına bağımlılığıyla tanınan bir keselidir. Tıknaz vücudu, belirgin kulakları ve kaşık biçimli burnuyla kolayca tanınır ve çok sevilir. Sevimli görünüşüne rağmen hem seçici bir beslenici hem de bölgeci bir hayvandır. Günün 20 saatine kadarını uyuyarak geçirir; enerjisini korumak için uykuyu seçer. Sosyal olmaktan çok düşünceli bir ağaç sakini olan koala, besin açısından fakir diyetine kusursuz uyum sağlamıştır."
 dubois.154.g: "Bozkırın uyuyan güzeli."
 dubois.155.t: "Gagalı Hayvan Geldi"
 dubois.155.d: "Doğabilimcilerin bilmecesi, okul çocuklarının merakı: bugün #O Gagalı Hayvan#! halk önünde ilk kez sahneye çıkıyor."
 dubois.155.f: "Gagalı Hayvan (*Ornithorhynchus anatinus*), doğu Avustralya ve Tazmanya’ya özgü bir tek deliklidir. Yumurta bırakan bu memeli, ördeğe benzeyen gagası, perdeli ayakları ve kunduz kuyruğuyla 18. yüzyılda Avrupalı bilim insanlarını öylesine şaşırtmıştır ki sahtecilikten şüphe etmişlerdir. Erkeklerin arka ayaklarında zehirli mahmuzları vardır; ayrıca tüm gagalı hayvanlar gagalarında avlarını bulan elektrosensörlere sahiptir. Evrimsel soy çizgileri öylesine farklıdır ki, tanıdık ile akıl almaz olan arasında bir sınırda varlığını sürdürür ve hâlâ büyüleyici bir araştırma konusudur."
 dubois.155.g: "Doğanın çelişkiden korkmadığının kanıtı."
 dubois.156.t: "Güney Tavuğu Geldi"
 dubois.156.d: "Yağmur ormanlarının gölgelerinden gizemli bir kuş beliriyor: #O Güney Tavuğu#! artık ormanlık alanında devriye geziyor."
 dubois.156.f: "Güney Tavuğu (*Casuarius casuarius*), Yeni Gine ve kuzey Avustralya’nın tropik ormanlarında yaşayan, iri yapılı ve huysuz bir uçamaz kuştur. Yüksek miğferi, parlak mavi derisi ve hançer gibi pençeleriyle ayırt edilir. Meyveyle beslenmesine rağmen huysuz ve tehlikeli olabilir; kışkırtıldığında ölümcül saldırganlık gösterebilir. Miğferinin işlevi hâlâ tartışmalıdır—cinsel gösterimden ses yankılamaya, ya da yoğun çalılıklarda kafa korumasına kadar çeşitli görüşler vardır. Hem bir kalıntı hem de eski kuşlar dünyasının çözülmemiş bir bilmecesidir."
 dubois.156.g: "En iyisi saygıyla izlenmeli."
 dubois.157.t: "Yeni Zelanda Deniz Aslanı Geldi"
 dubois.157.d: "Subantarktik kıyıların yılmaz sakini artık deniz sergimize katıldı: #O Yeni Zelanda Deniz Aslanı#! şimdi kayalar üzerinde dinleniyor."
 dubois.157.f: "Yeni Zelanda Deniz Aslanı (*Phocarctos hookeri*), dünyanın en nadir ve en sınırlı dağılıma sahip fok türlerinden biridir. Erkekleri—heybetli ve koyu yeleli—2,45 metreye kadar büyüyebilirken, daha küçük dişiler sarımsı kahverengi ve daha zarif görünür. 19. yüzyılda kürk avcılığıyla neredeyse yok olma noktasına gelmiş, fakat günümüzde özellikle uzak Auckland Adaları’nda koruma altında kolonileri toparlanmaktadır. Sosyal bir kıyı canlısı olan deniz aslanı, güçlü yapısı, ifade dolu yüzleri ve aile bağlarıyla hem büyüleyici hem de bilimsel açıdan ilgi çekicidir."
 dubois.157.g: "Bir zamanlar avlandı, şimdi yüceltiliyor."
 dubois.200.t: "Doğa Tarihi Müzesi’nin Açılışı"
 dubois.200.d: "Profesör [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName], evrim araştırmalarına ve doğa felsefesinin ilerlemesine adanmış Doğa Tarihi Müzesi’ni resmen açtı."
 dubois.200.f: "Profesör [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName], ülkemizin ilk Doğa Tarihi Müzesi’nin açılışını duyurduğunda, bu kurumun hayata geçirilmesi için verilen büyük uğraşları pek az kişi hatırlıyordu. Daha önce doğa tarihinin koruyucusu olan Ulusal Müze, ayrılığı reddetmiş, doğa tarihini ikinci planda bir uğraş olarak görmüştü. Ancak profesörün ısrarı ve nüfuzu sayesinde proje başarıya ulaştı. Yeni müze, paleontolojik araştırmaları yükseltmeyi vaat ediyor; halk, nesli tükenmiş türlerin gizemleri ve insanlığın kökeni konularına şimdiden yoğun ilgi göstermekte. Bir zamanlar jeolojinin yan dalı sayılan paleontoloji, artık saygın bir disiplin olarak öne çıkıyor; kendi kurumlarıyla çağın başlıca bilimleri arasında yer alıyor."
 dubois.200.g: "Son derece öğretici bir kuruluş!"
 dubois_natural_history_museum_modifier: "Doğa Tarihi Müzesi"
 dubois.201.t: "Paleontolojik Sefer Hedefi"
 dubois.201.f: "Bir [concept_dubois_paleontologist], yıllık kazıların fosil verdiği jeolojik oluşumlara gönderilebilir. Büyük Oluşumlar kıtalara göre değişen dinozor kemiklerini de içerebilir. En doğrudan erişim yolu bölgenin egemen kontrolüdür; ancak diplomatik düzenlemelerle bilimsel lisanslar da alınabilir."
 dubois.201.g: "Belki başka zaman."
 dubois.202.t: "Fosilleşmiş Köpekbalığı Dişleri"
 dubois.202.d: "Bir paleontolojik inceleme, eski denizlerin kalıntısı olan fosilleşmiş köpekbalığı dişlerinden bir koleksiyon ortaya çıkardı."
 dubois.202.f: "Fosilleşmiş köpekbalığı dişleri, genellikle bu yok olmuş canlıların geriye kalan tek parçalarıdır ve yaşayan köpekbalıklarının sürekli diş değiştirmeleri nedeniyle tüm fosiller arasında en bol bulunanlardandır. Daha 1616’da Fabio Colonna, *De Glossopetris Dissertatio* adlı eserinde, ‘yılan dili’ denen taşların aslında köpekbalığı dişleri olduğunu göstermişti. Yassı, testere dişi benzeri dişlere sahip *Squalicorax pristodontus* cinsi Kretase döneminde yaygın bir türdü. Amerika, Afrika, Asya ve Avrupa’daki Mezozoik katmanlarından çıkarılan bu dişler, bu güçlü yırtıcıların hem eski hem de evrensel varlıklarının sessiz tanıklarıdır."
 dubois.202.g: "Koleksiyon için değerli bir ek."
 dubois.203.t: "Dinozor Ayak İzleri mi?"
 dubois.203.d: "[SCOPE.sCharacter('pb_leader').GetFullName], Profesör [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]’in son keşfi hakkında şüphelerini dile getiriyor."
 dubois.203.f: "Yeni bir buluntunun duyurulmasının ardından küçük burjuvazinin lideri, sözde dinozor ayak izlerini incelemek için bölgeye gitti. Kanıtları pek önemsemeyen [SCOPE.sCharacter('pb_leader').GetFullName], izleri sıradan buldu. Bu kaba tavır profesörle hararetli bir tartışmaya yol açtı; profesör derhal özür talep etti. Tartışma kısa sürede büyüyerek, [SCOPE.sCharacter('pb_leader').GetLastName]’in destekçileri ile profesörün akademik çevresi arasında bir bölünmeye neden oldu."
 dubois.203.g: "Bunlar kesinlikle dinozor izleri."
 dubois.203.h: "Kanıtlar hâlâ kesin değil."
 dubois.204.t: "Palaeosinopa"
 dubois.204.d: "Bir bilim ekibi, olağanüstü korunmuş bir erken memeli iskeleti ortaya çıkardı."
 dubois.204.f: "Palaeosinopa, artık soyu tükenmiş Pantolestidae ailesine ait bir cinstir; yaklaşık 59 ila 48 milyon yıl önce, Üst Paleosen’den Alt Eosen’e kadar varlığını sürdürmüştür. Çoğunlukla Kuzey Amerika’dan, nadiren Avrupa’dan gelen fosiller; güçlü bir vücut, uzun bir kuyruk, kısa ön uzuvlar ve uzun arka uzuvlar gösterir. Bu morfoloji, günümüz su samurlarına benzer şekilde yarı sucul bir yaşam tarzına işaret ederken, diş yapısı et ağırlıklı bir beslenmeye işaret eder. Green River ve Willwood oluşumları bu tür açısından zengin fosil yataklarıdır ve erken memelilerin evrimsel tarihine değerli bir ışık tutar."
 dubois.204.g: "Son derece öğretici bir örnek."
 dubois.204.h: "Bir meslektaşa uygun bir armağan."
 dubois.205.t: "Maden Ocağında Kemikler Bulundu"
 dubois.205.d: "[SCOPE.sState('dubois_excavation_state').GetName]’deki madenciler, tarih öncesi bir türe ait kemikler buldu. Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] inceleme için çağrıldı."
 dubois.205.f: "Madenin içinden kemiklerin çıkarılması farklı tepkiler doğurdu. Paleontolog bilimsel kazıya başlamak için sabırsızlanırken, maden yönetimi çalışmaların aksamasından endişe etti. Profesör, doğru bir kazının madenciliğin geçici olarak durmasını gerektireceğini belirtti; bu da sanayicilerin protestosuna yol açtı. Buluntu kısa sürede kamuoyunun ilgi odağı oldu; aydınlar bilimsel araştırmayı savundu. Bazılarıysa bir uzlaşma önerdi—fosillerin yalnızca belgelenmesi, fakat kazılmaması—bu da doğrudan elde etmeyi engelleyecekti."
 dubois.205.g: "Fosiller bilim için güvence altına alınmalı."
 dubois.205.h: "Yalnızca yüzeysel bir incelemeye izin ver."
 dubois.205.i: "Madenciler işlerine devam etsin."
 dubois.206.t: "Composita"
 dubois.206.d: "Bu yıl, Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] önderliğindeki [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [SCOPE.sState('dubois_excavation_state').GetName]’deki kazı alanında güzel *Composita* örnekleri buldu."
 dubois.206.f: "*Composita*, soyu tükenmiş bir brachiopod cinsidir; Geç Devoniyen’den Geç Permiyen’e kadar yaşamış ve kozmopolit bir dağılım göstermiştir. Düz kabuğu, belirgin kıvrım ve oluk yapısı, yuvarlak sap deliği karakteristik özelliklerindendir. Athyrididae ailesi, Spirigerellinae alt familyasına aittir. Antarktika dışında tüm kıtalarda bulunan bu fosiller, yaşlılıkları ve öğretici değerleri nedeniyle doğabilimciler tarafından yüksek saygı görür; sıradan bir deniz kabuğundan çok daha fazlasıdır."
 dubois.206.g: "Dolabımız için değerli bir ek."
 dubois.207.t: "Trilobit"
 dubois.207.d: "Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName], paleontolojik koleksiyona örnek niteliğinde bir trilobit katkısı yaptı. Yaklaşık 400 milyon yıllık olduğu tahmin edilen fosil, büyük bilimsel değere sahiptir."
 dubois.207.f: "Trilobitler, soyu tükenmiş bir deniz eklembacaklısı sınıfıdır; Kambriyen’den Permiyen’e kadar tüm Paleozoik çağ boyunca varlıklarını sürdürmüşlerdir. Kalsit takviyeli dış iskeletleri sıkça korunmuş olarak bulunur; bu sayede evrimsel çeşitlilikleri yeniden inşa edilebilir. Dokuz takım, 150’den fazla familya, 5000 cins ve 15.000’den fazla tanımlanmış türle trilobitler, Paleozoik dönem için önemli kılavuz fosiller olmuş ve jeolojik ile paleontolojik çalışmaların vazgeçilmez unsurları hâline gelmiştir."
 dubois.207.g: "Profesöre minnettarız."
 dubois.208.t: "Ammonitler"
 dubois.208.d: "[SCOPE.sState('dubois_excavation_state').GetName]’de keşfedilen ammonitler, ülkemizin paleontolojik koleksiyonunu daha da zenginleştirdi."
 dubois.208.f: "Ammonitler (*Ammonoidea*), soyu tükenmiş bir kafadanbacaklı takımıdır ve olağanüstü çeşitliliğe sahiptir; 1500’den fazla cins ve belki de 30.000–40.000 türü vardır. Kabukları genellikle 1 ila 30 cm çapındadır ve Devoniyen’den Kretase–Paleojen sınırına kadar deniz tortullarında bulunur. Ammonitler, katmanların kronolojik sınıflandırılmasında yardımcı olmaları nedeniyle paha biçilmez kılavuz fosillerdir. 'Ammonis cornua' (Amon’un boynuzları) adı antik çağa kadar gider ve incelenmeleri Viktorya dönemi jeolojisi ve paleontolojisinin merkezinde kalmaya devam etmiştir."
 dubois.208.g: "Birini müzeye ayırın."
 dubois.209.t: "Fosilleşmiş Bitkiler"
 dubois.209.d: "[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], bir taş ocağından çok eski fosilleşmiş bitkiler çıkardı."
 dubois.209.f: "Karbonifer döneminde (yaklaşık 360–300 milyon yıl önce), eğreltiotları, atkuyrukları ve likopodlardan oluşan devasa ormanlar, günümüz kömür yataklarının temelini attı. En eski fosil eğreltiotları Alt Devoniyen’e (yaklaşık 400 milyon yıl önce) tarihlenir ve tohumlu bitkilerin ortaya çıkışından daha eskidir. Bu kadim floralar, doğa filozofları için büyük bir ilgi konusu olup, karasal bitki örtüsünün kökenlerini ve Sanayi Çağı’nı şekillendiren jeolojik süreçleri aydınlatır."
 dubois.209.g: "Sanayi ve ilerlemenin kökleri."
 dubois.210.t: "Dinozor Yumurtaları"
 dubois.210.d: "Bir zamanlar taş sanılan nesnelerin, daha yakından incelendiğinde, neredeyse kesinlikle bir dinozor türüne ait fosilleşmiş yumurtalar olduğu anlaşıldı."
 dubois.210.f: "İlk bilimsel olarak belgelenmiş dinozor yumurtası fosilleri 1859’da güney Fransa’da bulundu, ancak başlangıçta dev kuşlara atfedildi. 1923’te Amerikan Doğa Tarihi Müzesi’nin Moğolistan’daki keşif gezisinde, daha önce Protoceratops’a ait olduğu düşünülen ama şimdi Oviraptor’a ait olduğu bilinen yumurtalar ortaya çıkarıldı. Bu tür buluntuların çoğalması, farklı sınıflandırma sistemlerinin doğmasına yol açtı ve dinozor yumurtalarının incelenmesi hâlâ canlı bir Viktorya dönemi tartışma konusudur."
 dubois.210.g: "Bunları en büyük özenle ele alalım."
 dubois.211.t: "Dinozor Kazısı"
 dubois.211.d: "Büyük bir oluşumu araştırırken, Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] dikkat çekici bir keşif yaptı: bir dinozor kemiği! [concept_dubois_paleontologist] derhal tam kapsamlı bir kazı düzenledi ve daha fazla kalıntı bulmayı umdu."
 dubois.211.f: "“Böylesi özelliklerin birleşimi—bazıları sürüngenler arasında benzersiz, bazıları artık farklı gruplardan ödünç alınmış—yaşayan en büyük sürüngenlerden çok daha büyük yaratıklarda sergilendiğinde, Sürüngenler arasında ayrı bir kabile ya da alt takım kurulması için yeterli dayanak sayılacaktır; bu nedenle ben ‘Dinosauria’ adını önermekteyim.” —Richard Owen"
 dubois.211.g: "Kazı başlasın!"
 dubois.213.t: "Fosil Parçaları"
 dubois.213.d: "Dinozor kazı alanında, bilim insanları daha küçük fosil parçaları ortaya çıkardı."
 dubois.213.f: "“Aradığımız ödül bu olmayabilir, ama her parça anlayışımıza katkı sağlar.” —[SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName]"
 dubois.213.g: "Fosilleri toplayın!"
 dubois.214.t: "Dinozor Kemiği"
 dubois.214.d: "Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]’in ekibi, kazı alanında yeni bir dinozor kemiği ortaya çıkardı."
 dubois.214.f: "“Tek bir kemiğin, tek bir kemik parçasının görünüşünden, onun ait olduğu bütünün hangi kısmına ait olduğunu tanıyıp yeniden kurarım. Bu parçanın ait olduğu bütün, zihnimde canlanır.” —Georges Cuvier"
 dubois.214.g: "Koleksiyona ekleyin."
 dubois.215.t: "Dinozor Kafatası"
 dubois.215.d: "Kazılar, muhteşem bir dinozor kafatasını gün yüzüne çıkardı."
 dubois.215.f: "“Kafa, tam büyümüş bir boz ayınınki kadar ya da ondan daha uzundu ve çeneler, uzunluklarına oranla daha derindi. Burnu, bulldog’ununkinden daha kısa ve derindi. Dişlerin hepsi düzgün, silindirik, parlak ve pürüzsüz sivri uçlardı, düzensiz boyutlardaydılar. Çenelerin belli aralıklarında üç inç yukarı çıkan ve bir inç çeneye gömülen dişler vardı; böylece bir kaplanın dişleri kadar uzun ama daha inceydiler. Ön çenenin ortasında, her iki tarafta iki diş birbirini çaprazlıyordu. Küçük balıkların yanı sıra sürüngenler de şüphesiz iştahını karşılıyordu.” —Edward Drinker Cope"
 dubois.215.g: "Muhteşem bir buluntu!"
 dubois.216.t: "Dinozor İskeleti"
 dubois.216.d: "Aylarca süren titiz çalışmalardan sonra, Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName], pek çok kemiği mükemmel durumda olan etkileyici bir dinozor iskeleti ortaya çıkardı."
 dubois.216.f: "“İskelet, Philadelphia Bilimler Akademisi Müzesi’nde bu restorasyona göre düzenlenmişti ve Profesör Cope bana gösterip özelliklerini açıkladığında, omurların eklemlerinin ters olduğunu fark ettim ve ona nazikçe hayvanın tersine çevrilmiş olduğunu söyledim. Büyük bir öfkeye kapıldı ve hayvanı aylarca incelediğini, en azından başı ile sonunu ayırt edebilecek durumda olması gerektiğini güçlü bir dille savundu.” —Othniel Charles Marsh"
 dubois.216.g: "Büyüleyici."
 dubois.220.t: "Kazı Tamamlandı"
 dubois.220.d: "[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], dinozor sahasındaki kazılarını tamamladı. Önemli bir bilimsel araştırma sona erdi."
 dubois.220.f: "“Fosil avcısı her şeyden önce bilimsel bir hevesli olmalıdır. İlkbaharın başında, sonbaharın sonlarında ve kışın ilk aylarında soğuğa katlanmaya; yaz aylarında kavurucu sıcağa ve güneşin parlaklığına göğüs germeye; alkali su içmeye ve bazı bölgelerde sivrisinek ve diğer haşerelerin saldırısıyla mücadele etmeye hazır olmalıdır. Yoldan yoksun çöl arazilerinde büyük taş kütlelerini idare edebilmek ve en yakın nakliye noktasına taşımak için biraz mühendis olmalı; kırıldığında en küçük kemik parçalarını korumak için hassas ve becerikli bir dokunuşa sahip olmalı; meslek neredeyse hiç kazançlı olmadığından çok sade bir yaşamla yetinmeli, çünkü çoğu zaman yetersiz ücret alır; en büyük ödülünü ve teşvikini keşif duygusunda ve hiç görmediği müzelere, yaptığı fedakârlıklardan habersiz bir halkın yararı için numuneler göndermekte bulmalıdır.” —Henry Fairfield Osborn"
 dubois.220.g: "Koleksiyonumuza en azından yeni bir dinozor iskeleti bekliyorum."
 dubois.221.t: "Eusthenopteron"
 dubois.221.d: "Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName], sucul hayattan karasal yaşama geçişte kritik bir adımı temsil edebilecek, nadir bir tarihöncesi balık keşfetti."
 dubois.221.f: "Eusthenopteron, Kuzey Amerika ve Avrupa’nın Üst Devoniyen döneminden kalma, soyu tükenmiş bir lop yüzgeçli balık (*Sarcopterygii*) cinsidir. Erken *Tetrapodomorpha*’nın klasik bir örneği kabul edilir. Hem solungaçlara hem de ilkel bir akciğer–yüzme kesesine sahipti; ayrıca sağlam bir yüzgeç iskeleti vardı. Olağanüstü biçimde, ön yüzgeçlerinde karasal omurgalılarda bulunan üç kemik—humerus, ulna ve radius—zaten mevcuttu. Bu uyumlar onun kısa süreliğine de olsa suyun dışında hareket edebildiğini gösterir. İki sırt yüzgeci geriye yerleşmişti, karın ve anal yüzgeçler birbirine karşı konumlanmıştı."
 dubois.221.g: "Kayda değer bir evrimsel bağlantı."
 dubois.222.t: "Archaeopteryx"
 dubois.222.d: "Solnhofen yakınlarındaki Bavyera kireçtaşında yapılan bir kazıda, Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName], bilim dünyasını hayrete düşüren bir keşif yaptı: sürüngenlerle kuşlar arasındaki boşluğu doldurabilecek bir fosil."
 dubois.222.f: "Archaeopteryx, Geç Jura dönemine tarihlenen en ünlü geçiş fosillerinden biridir. Tüylü kanatları, dişleri ve uzun kemikli kuyruğu ile hem kuşlara hem de sürüngenlere ait özellikler taşır. Keşfi, kuşların küçük teropod dinozorlardan evrimleştiğini öne sürerek Darwin’in evrim teorisine güçlü bir kanıt sağlamıştır."
 dubois.223.t: "Megatherium"
 dubois.223.d: "Bir paleontolojik araştırma sırasında, Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]’in ekibi dev bir kara tembel hayvanına ait kemikler buldu."
 dubois.223.f: "Megatherium, yaklaşık 10.000 yıl öncesine kadar Güney Amerika’da yaşamış dev kara tembel hayvanlarının bir cinsiydi. Fillerle aynı boyutlara ulaşan bu yavaş otoburlar, ağaçları kökünden sökerek ve kökleri kazarak çevrelerini şekillendirmiştir. Soylarının tükenmesi iklim değişikliği ve insan faaliyetleriyle ilişkilidir."
 dubois.224.t: "İhtiyozor"
 dubois.224.d: "Paleontolojik kazıların başkanı, hem balığa hem de yunusa benzeyen tarihöncesi bir sürüngenin keşfedildiğini bildirdi."
 dubois.224.f: "İhtiyozor (*Ichthyosaurus*), Jura döneminden bir deniz sürüngeniydi ve açık deniz yaşamına uyum sağlamıştı. Zarif vücut yapısı, uzun burnu ve büyük gözleri onu verimli bir avcı yapıyordu. Çoğu sürüngenin aksine, canlı yavru doğuruyordu ve modern yunuslarla yakınsak evrimin çarpıcı bir örneğidir."
 dubois.225.t: "Smilodon"
 dubois.225.d: "Doğa tarihi bölümü gururla yeni bir buluntuyu duyuruyor: paleontoloğumuz bir kılıç dişli kedi iskeleti ortaya çıkardı."
 dubois.225.f: "Halk arasında kılıç dişli kaplan olarak bilinen Smilodon, Pleistosen döneminde Amerika kıtalarının korkutucu bir yırtıcısıydı. Uzun köpek dişleri ve güçlü yapısı onu tepe avcısı yapıyordu. Katran çukurlarından elde edilen fosiller, sosyal davranışlarını ve diğer Buzul Çağı dev faunasıyla dramatik karşılaşmalarını ortaya koymaktadır."
 dubois.226.t: "Pterodactylus"
 dubois.226.d: "Küçük bir pterosaura ait kemikler bilim camiasını sevindirdi ve şimdiden Paleontolojik Koleksiyon’a gönderildi."
 dubois.226.f: "Pterodactylus, Geç Jura’nın en erken pterosaur (uçan sürüngen) türlerinden biriydi. 1,5 metreye kadar kanat açıklığıyla kıyı lagünlerinin üzerinde süzülerek balık ve küçük hayvanlarla besleniyordu. Keşfi, tarihöncesi yaşamın çeşitliliğini ve uçuşun evrimini kanıtlamada önemli rol oynadı."
 dubois.227.t: "Ichthyostega"
 dubois.227.d: "Zeplin indiğinde, Ebedi Buzlar’daki keşif olağanüstü bir fosil buldu; bu, paleontolojiyi devrim niteliğinde değiştirebilirdi. Fosil hızla ülkenin önde gelen paleontoloğu Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName]’e gönderildi. Sözde, balıklarla kara hayvanları arasındaki kayıp halka buydu!"
 dubois.227.f: "Ichthyostega, Geç Devoniyen dönemine ait en eski bilinen tetrapodlardan biridir. Güçlü uzuvları ve akciğerleri, sucul yaşamdan karasal yaşama geçişin önemli bir aşamasını işaret eder. Fosil, balık ve amfibi özelliklerinin birleşimini göstererek omurgalı yaşamın karasal kökenlerine ışık tutar."
 dubois.301.t: "Botanik Keşif Seferi Hedefi"
 dubois.301.d: "Professor [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] stands ready to embark on a botanical journey. Which Kind of plants should be the focus of this expedition?"
 dubois.301.f: "\"I wonder if I can find any giant plants for my botanical collection? If only I wouldn't have to search for useful stuff...\""
 dubois.302.t: "Victoria amazonica"
 dubois.302.d: "Botanik seferi sırasında Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], görkemiyle eşsiz olağanüstü bir nilüferle karşılaştı."
 dubois.302.f: "Amazon dev nilüferi *Victoria amazonica*, nilüfergiller (Nymphaeaceae) familyasında yer alan *Victoria* cinsine aittir. Amazon havzasının yavaş akan sularına özgüdür ve Kraliçe Victoria’nın onuruna adlandırılmıştır. Su altında kalan sapı 8 metreye kadar ulaşabilir, yüzen yaprakları ise kenarları kıvrımlı ve derin yarıklı olup doğada 3 metre çapına kadar büyür. Bu yarıklar, yaprakların yırtılmasını engeller ve yoğun yağmurlardan sonra fazla suyun boşalmasını sağlar. Botanik bahçelerinde yapraklar genellikle 2 metreyi bulur."
 dubois.302.g: "Bu örnek sergimizin yıldızı olacak."
 dubois.302.h: "Örneği kataloglayın ve bilimsel araştırmalar için inceleyin."
 dubois.303.t: "Attacus atlas"
 dubois.303.d: "Seferin odak noktası bitkiler olsa da, Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], yağmur ormanındaki görkemli atlas güvelerinden oluşan bir koloniye hayran kaldı."
 dubois.303.f: "Atlas güvesi (*Attacus atlas*), dünyanın en büyük güvelerinden biridir ve adını Yunan mitolojisindeki Titan Atlas’tan alır. Dişiler erkeklerden daha büyüktür. Kozaları açık kahverengi ve sıradan ipekten belirgin şekilde daha dayanıklı olan Fagara ipeğini verir."
 dubois.304.t: "Amorphophallus titanum"
 dubois.304.d: "Endonezya’da Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], muhtemelen dünyanın en büyük çiçeği olan dev bir Titan Arum keşfetti. Doğabilimci heyecanlıydı, ancak ekibin geri kalanı keskin kokusundan şikâyet ediyordu."
 dubois.304.f: "*Amorphophallus* cinsi, Yeni Gine’den Batı Afrika’ya kadar uzanan bölgede bulunan yaklaşık 200 tür içerir. *A. titanum*, bilinen en büyük dallanmamış çiçek durumunu üretir ve 3 metreden fazla boylanabilir. Çiçek, böcekleri tozlaşmaya çekmek için leş benzeri bir koku salar ve ısı üretir. Nadir çiçeklenmeleri botanik bahçelerinde büyük ilgi görür."
 dubois.305.t: "Goliath"
 dubois.305.d: "Bir Goliath böceğinin keşfi, Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]’i kısa süreliğine botanik çalışmalarından uzaklaştırdı."
 dubois.305.f: "Goliath böcekleri (*Goliathus*), dünyanın en büyük ve en ağır böcekleri arasında yer alır ve gül böcekleri alt familyasına (Cetoniinae) aittir. Larvalar 110 grama kadar ulaşabilir. Ölü örnekleri koleksiyoncular tarafından değerli görülür ve yüksek fiyatlara alıcı bulur."
 dubois.306.t: "Orkide Hazinesi"
 dubois.306.d: "Botanik Keşif Seferi, yağmur ormanlarının derinliklerinde bilim dünyası için daha önce bilinmeyen birçok türün de dahil olduğu büyüleyici bir orkide çeşitliliği ortaya çıkardı."
 dubois.306.f: "Orkideler olağanüstü çeşitlilikleriyle ünlüdür—hiçbir bitki ailesi bu kadar geniş şekil, boyut ve renk yelpazesine sahip değildir. Çiçekleri bir toplu iğne başı kadar küçük ya da bir tabak kadar büyük olabilir; renk paleti ise narin beyaz ve yeşillerden parlak kırmızı, mavi ve sarılara, çoğu zaman da dikkat çekici kombinasyonlara uzanır. Binlerce cinse ve on binlerce türe sahip olan orkideler, çiçekli bitkiler arasında papatyaların ardından ikinci sıradadır. Her yeni keşif, doğanın yaratıcılığını anlamamızı zenginleştirir."
 dubois.306.g: "Koleksiyonumuz için görkemli bir katkı."
 dubois.307.t: "Medicinal Plants"
 dubois.307.d: "The expedition has found several remarkable herbs, each with promising medicinal properties."
 dubois.307.f: "Plants have long been the foundation of medicine—over half of all known remedies are derived from botanical sources. Willow bark, for example, contains salicin, the precursor to modern aspirin, and has soothed pain and fever for centuries. Rainforest in particular have a rich flora which may yield new cures, waiting to be studied and understood."
 dubois.307.g: "Bitkileri bilimsel inceleme için analiz edin."
 dubois.307.h: "Bitkileri toplayın ve gelecekte kullanmak üzere saklayın."
 dubois.308.t: "Gizemli Çiçekler"
 dubois.308.d: "Sefer, yağmur ormanlarının keşfedilmemiş bir köşesinde alışılmadık derecede etkileyici ve tanıdık olmayan çiçeklerle karşılaştı."
 dubois.308.f: "Güzellikleri inkâr edilemez, fakat yerel rehberler bu çiçeklerin tehlikeli—hatta zehirli—olabileceği konusunda uyarıyor. Ekip bir ikilemle karşı karşıya: çiçekleri bolca toplayıp öngörülemeyen sonuçları göze almak mı, yoksa temkinli davranıp önce incelemek mi? Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] merak ile tedbiri nasıl dengeleyeceğine karar vermek zorunda."
 dubois.308.g: "Mürettebata çiçekleri toplamasını emret."
 dubois.308.h: "Sefer lideri çiçekleri toplayıp incelesin."
 dubois.308.i: "Bu gizemli çiçeklere hiç dokunmayın."
 dubois.309.t: "Muhalefet Botanik Seferini Eleştiriyor"
 dubois.309.d: "[SCOPE.sCharacter('dubois_sceptical_leader').GetLastName], botanik seferini kamu kaynaklarının aşırı harcanması olarak nitelendiriyor ve kaynakların başka alanlara ayrılması gerektiğini savunuyor. Protestosu hem yüksek sesli hem de ısrarcı."
 dubois.309.f: "“Bir keşif daha mı? Önce zeplinler, sonra Pasifik, şimdi de botanikçilerin ormanlarda gezinmesi. Arkeologlar, paleontologlar, zoologlar—bu ne zaman bitecek? Bu tam bir bürokratik savurganlık!”"
 dubois.309.g: "Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]’i derhal geri çağırın."
 dubois.309.h: "Bilimsel araştırmalar siyasetin üzerinde kalmalıdır."
 dubois.310.t: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] Hastalandı"
 dubois.310.d: "Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], yağmur ormanında botanik örnekler toplarken zehirlenme geçirdi. Hastalığın ciddiyeti, seferin ani şekilde durdurulmasına yol açtı."
 dubois.310.f: "Doğabilimci rahatsızken botanik seferi askıya alındı. İyileşme sağlanana kadar yeni örnek gönderilmeyecek."
 dubois.310.g: "Endişe verici bir gelişme."
 dubois.311.t: "Egzotik Tohumların Keşfi"
 dubois.311.d: "Botanik seferi sırasında Prof. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], bilimsel ve tarımsal açıdan büyük potansiyele sahip nadir tohumlar buldu."
 dubois.311.f: "Küresel ürün değişimi yüzyıllardır tarımı şekillendirmiştir. Bir zamanlar Akdeniz’e özgü olan şeker kamışı, Güney Amerika’da gelişti; 1876’da Henry Wickham’ın Brezilya’dan Asya’ya kauçuk tohumlarını gizlice götürmesi, ekonomileri ve manzaraları kökten değiştirdi."
 dubois.311.g: "Tohumları bilimsel koleksiyonumuza ekleyin."
 dubois.311.h: "Yeni tohumları yerel tarıma kazandırın."
 dubois.1000.t: "Hayvanlar Karnavalı"
 dubois.1000.d: "Bir besteci, Hayvanat Bahçesi’ni ziyaretinde aslan, fil, kanguru ve kaplumbağalardan ilham alarak ‘Hayvanlar Karnavalı’ adında eğlenceli bir müzik süiti besteledi."
 dubois.1000.f: "*Hayvanlar Karnavalı* (Büyük Zoolojik Fantezi), Camille Saint-Saëns tarafından 1886’da küçük bir Avusturya köyünde bestelenmiştir. Saint-Saëns, Paris’teki öğretim yıllarından kalma eskizlerden yararlanarak, öğrencilerinin ısrarıyla bu neşeli oda müziğini ortaya koydu. Eser, hayvan seslerini taklit etmesi ve diğer bestecilerle nazikçe alay etmesi nedeniyle besteci, yaşamı boyunca yayınlanmasını istemedi. Saint-Saëns’in ölümünden sonra eser, yayıncı Jacques Durand sayesinde halka ulaştı."
 dubois.1000.g: "Müzikte zoolojik bir başyapıt mı?"
