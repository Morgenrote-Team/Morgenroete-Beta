 dubois.1059.t: "Gila Monster Kafesi"
 dubois.1059.d: "Gila Monster'ın kafesi, kumlu arazi ve kayalık yarıklardan oluşan engebeli bir peyzajdı. İlk bakışta, kertenkele'nin canlı siyah ve turuncu pulları çevresiyle mükemmel bir şekilde kaynaşıyordu. Sonra, onu fark ettiniz—gölgelik bir yuvalamadan yavaşça çıkıyor, kalın, boncuk gibi derisi ışıkta parlıyor ve dikkatlice yaşadığı alanda hareket ediyor."
 dubois.1059.f1: "Hayvanat bahçesinin güneşte kavrulmuş kafesinde, yalnız bir Gila Monster, kayalık arazide yavaşça ilerliyor, kendine özgü siyah ve turuncu pulları güneş ışığını yakalıyor. Bu zehirli kertenkele'nin kasvetli, neredeyse tembel hareketi meraklı ziyaretçilerin dikkatini çekiyor. Eşsiz görünüşü ve davranışları hakkında daha fazla bilgi edinmek isteyen biri olarak bir bakıcıya yaklaşır ve daha fazla bilgi edinirsiniz.\n\"Gila Monster, dünyadaki az sayıda zehirli kertenkeleden biridir,\" diyor bakıcı. \"Yavaş hareket eder, çöl ortamında enerji tasarrufu yapar. Diğer pek çok yırtıcı gibi hızla hareket etmek yerine, küçük memeliler ve kuşlar gibi avları etkisiz hale getirmek için güçlü zehirini kullanır. Parlak renkleri, potansiyel yırtıcılara, kolay bir hedef olmadığını gösterir.\""
 dubois.1059.f2: "Kayalık kafeste, Gila Monster'ı büyük bir kayanın altına kısmen gizlenmiş halde görüyorsunuz, iki uçlu dili havayı tatmak için dışarı fırlıyor. Bu, prehistorik görünümlü yaratığın, boncuk gibi derisi ve güçlü çeneleriyle izleyicileri büyülemesi inanılmaz. Beslenme alışkanlıkları hakkında daha fazla bilgi edinmek için bir bakıcıya sorarsınız.\n\"Gila Monsters, yavaş bir metabolizmaya sahiptir ve yılda sadece birkaç büyük öğünle hayatta kalabilirler,\" diyor bakıcı. \"Güçlü çenelerini kullanarak kuşların ve sürüngenlerin yumurtalarını ezmek, en sevdikleri yiyeceklerden biridir. Bir öğünden sonra, kuyruklarında yağ depolayabilirler, bu da onları uzun süre aç kalmalarına rağmen hayatta tutar. Bu adaptasyon, yiyeceklerin az olduğu kurak çöllerde hayatta kalmak için kritik öneme sahiptir.\""
 dubois.1059.f3: "Gila Monster'ı çöl benzeri ortamında izlerken, kayalar üzerinde dikkatlice tırmanıp yarıkları incelediğini fark ediyorsunuz. Hareketlerinin yavaş temposu ve çevresini sistematik bir şekilde keşfetme biçimi ilginizi çekiyor. Bu ilginç davranış hakkında daha fazla şey öğrenmek isteyen biri olarak, bir bakıcıya yaklaşır ve daha fazla bilgi alırsınız.\n\"Gila Monsters, doğası gereği gececi hayvanlardır,\" diyor bakıcı. \"Çoğu zaman gün boyunca yer altı yuvalarında veya kayaların altında gizlenirler, aşırı sıcaktan kaçınırlar. Ortaya çıktıklarında, hareketlerinde dikkatli davranırlar, yiyecek aramak veya dinlenmek için güvenli bir yer bulmak adına keskin koku alma yeteneklerini kullanırlar. Yalnız ve gizemli yaşam tarzları, onları dünyanın en sert ortamlarında hayatta kalmalarına yardımcı olmuştur.\""
