 dubois.261.t: "Sistematik Tamamlandı"
 dubois.261.d: "Yıllarca süren çalışmalarının ardından Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName], tarih öncesi hayvan ve bitki dünyasında ilişkilerle ilgili teorilerini yayınladı. Yayın, canlıların soyağacı hakkındaki yeni anlayışları nedeniyle bir vakıf tarafından tanındı."
 dubois.261.f: "'Bitkileri ve fosilleri toplayacağım ve en iyi aletlerle astronomik gözlemler yapacağım. Ama bu yolculuğumun asıl amacı değil. Doğanın kuvvetlerinin birbirlerine nasıl etki ettiğini ve coğrafi çevrenin hayvanlar ve bitkiler üzerindeki etkisini araştırmaya çalışacağım. Kısacası, doğadaki uyumu keşfetmeliyim.' -Alexander von Humboldt"
 dubois.261.g: "Gerçekten... SON DERECE İLGİNÇ."
 dubois.262.t: "Bir Hayvanın Soyağacı"
 dubois.262.d: "Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName], yerel ve uluslararası fosil raporlarını karşılaştırarak, bu hayvan türünün evrimiyle ilgili daha önce kabul edilen gerçekleri köklü bir şekilde sorguladı."
 dubois.262.f: "'Özel araştırmaya dalmışken, farkında olmadan inşa edilmekte olan yapıyı göz ardı ettim. Ancak Paris'teki fosil türlerinin karşılaştırmasını tamamladıktan sonra, aynı fosil türlerinin jeolojik oluşumlarına göre bir liste yapmayı düşündüm ve böylece daha kesin özellikleri belirleyip, onları sayılarıyla daha belirgin hale getirmeyi amaçladım. Ne büyük bir sevinç ve şaşkınlıkla buldum ki, fosil balıkların basit bir sıralaması, aynı zamanda ailelerin birbirleriyle olan doğal ilişkilerinin de tam bir açıklamasını sundu; böylece tüm sınıfın genetik gelişimi yaratılış tarihinin içinde okunabilir hale geldi ve türlerin ve cinslerin temsil edilmesi, her birinin belirli bir aileye ait olduğu şekilde belirlendi; kısacası, balıkların genetik sıralaması, zoolojik sınıflandırmalarına mükemmel şekilde uyuyor ve bunu da ben önerdim.' -Louis Agassiz"
 dubois.262.g: "Bu hayvanı hayvanat bahçemizde var mı?"
 dubois.263.t: "Küçük Bir Edinim"
 dubois.263.d: "Çalışmaları sırasında Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName], başka bir paleontologla iletişime geçti. Pazarlık kanalları aracılığıyla, en son tezini destekleyen bir fosil edindi - bazen üniversitenin masraflarına mal oldu."
 dubois.263.f: "'Karşılaştırmalı anatominin sesiyle, her kemik ve kemik parçası yerini aldı. Bunu ifade etmek için kelimeler bulamıyorum, gördükçe, keşfettiğim her bir karakterin, tahmin ettiğim tüm sonuçları nasıl ardışık olarak doğruladığını görmek bana büyük bir zevk verdi; ayaklar, dişlerle açıklanan özelliklere uygun bulundu; dişler, önceden ayaklar tarafından belirtilenlerle uyumlu; bacaklar ve uyluk kemikleri, her bağlantı parçasıyla tam olarak daha önce düzenlediğim gibi bulundu, tahminlerim fosil türlerinin tamamlanmasıyla doğrulandı: kısacası, her tür, bir türün bileşen elemanlarından biriyle yeniden inşa edilmiş gibiydi.' -William Buckland"
 dubois.263.g: "Değdi mi?"
 dubois.264.t: "Jeolojik Öneriler"
 dubois.264.d: "[GetPlayer.MakeScope.Var('agassiz_geologist_var').GetCharacter.GetFullName] ile kaya tabakalarındaki fosil yerleri hakkında yaptığı bir konuşma sırasında, Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetFullName] önemli yeni bilgiler elde etti ve jeolojik tarihler konusunda önemli bir ilerleme kaydetti."
 dubois.264.f: "'Neden kimse görmedi ki, fosiller tek başına, dünyanın oluşumu hakkında bir teorinin doğmasına neden oldu; fosiller olmasaydı, kimse dünyanın oluşumunda ardışık dönemlerin olduğunu hayal bile edemezdi.' -Georges Cuvier"
 dubois.264.g: "Ah, jeoloji ve paleontolojinin sinerjisi!"
 dubois.265.t: "Etkileyici Bir Konferans"
 dubois.265.d: "Dr. [GetPlayer.MakeScope.Var('dubois_paleontologist_var').GetCharacter.GetLastName], bu dönem üniversitesinde oldukça beğenilen bir konferans serisi verdi ve bu konferanslar paleontoloji için ilham verici olarak kabul edildi. Birçok yeni öğrenci bu alana kaydoldu."
 dubois.265.f: "'Bir katmandan diğerine, bir tabakadan diğerine geçerken, Montmartre taş ocaklarında ya da Uralların şistlerinde, antedilüviyan uygarlıklara ait fosilleşmiş hayvanların kalıntılarını keşfettiğinizde, insanın zayıf hafızası ve yok olmayan ilahi gelenekler tarafından unutulmuş, milyonlarca yıl ve milyonlarca halkın vadilerini gördükçe, akıl, yüzeydeki küllerin üzerindeki iki ayağımızda oluşan ekmeği ve çiçekleri bize sağlayan yerkürenin tarihi karşısında şaşkınlıkla durur.' -Honoré de Balzac"
 dubois.265.g: "Popüler bir profesör!"
