 dubois.1039.t: "Thylacine Kafesi"
 dubois.1039.d: "Hayvanat bahçesinin gölgeli kafesinde, gizemli Thylacine çevresinde zarifçe dolaşıyor, sırtındaki çizgiler ve ince yapısı ona neredeyse efsanevi bir görünüm kazandırıyor. Ziyaretçiler, onun bu başka dünyadan gelen varlığına büyülenerek toplanıyor. Kökenleri hakkında meraklanarak, bir bakıcıya yaklaşır ve daha fazla bilgi edinmek istersiniz."
 dubois.1039.f1: "\"Thylacine, ya da Tasmanian Tiger, evrimsel örtüşmenin ilginç bir örneğidir,\" diyor bakıcı. \"Köpek benzeri vücut yapısı ve çizgili postu ile bir canavara benzese de, aslında bir marsupialdir, daha yakın akrabaları kangurular ve koalalardır. Tasmanya ve Avustralya ana karasında yaşayan Thylacine, bir zamanlar çevresinin en üst düzey yırtıcısıydı. Belirgin çizgileri, avlanırken sıkça saklandığı yoğun ormanlarda ve otlaklarda ona gizlenme imkanı verirdi.\""
 dubois.1039.f2: "\"Thylacine'lar genellikle gece avlanan yırtıcılardı,\" diyor bakıcı. \"Keskin görme ve işitme duyuları sayesinde avlarını izlerlerdi, genellikle yalnız ya da çiftler halinde avlanırlardı. Birçok diğer yırtıcıdan farklı olarak Thylacine'lar oldukça sessizdi, avlarına yaklaşırken gizlilik ve sabır kullanırlardı. Diyetleri genellikle küçük ve orta büyüklükteki hayvanlardan, duvar kanguruları, kuşlar ve kemirgenlerden oluşuyordu.\""
 dubois.1039.f3: "\"Thylacine'ın vokalizasyonları nadirdi ama unutulmazdı,\" diyor bakıcı. \"Genellikle üreme mevsiminde veya tehdit hissettiklerinde bir dizi havlama, hırlama ve uluma üretirlerdi. Bu çağrılar, diğer Thylacine'lar ile uzun mesafeler boyunca iletişim kurmak için kullanılır, özellikle Tasmanya'nın yoğun ormanlarında. Vokal aralıkları bazı diğer yırtıcılara göre o kadar çeşitli olmasa da, Thylacine'ın çağrıları davranışlarının önemli bir parçasıdır ve ona gizemli bir hava katar.\""
