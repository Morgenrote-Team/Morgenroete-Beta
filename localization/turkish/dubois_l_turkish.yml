 dubois_chemical_warfare_tt: "Bu girişim, #O Kimyasal Savaş#! geliştirmemiz sayesinde mümkün oldu — kasvetli ama belirleyici bir yenilik."
 dubois_triage_tt: "Bu tedbir, savaş alanı hekimliğinde #O Triage#! sistemini benimsememizle mümkün hale geldi."
 dubois_logistics_tt: "Bu operasyon, modern #O Lojistik#! ustalığımız sayesinde destekleniyor; zamanında ikmal ve koordinasyon sağlanıyor."
