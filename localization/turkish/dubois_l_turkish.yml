 dubois.139.d: "Hayvanat bahçemiz, yeni, egzotik bir hayvanla zenginleşti: bugün uzun zamandır beklenen #O Goril#! yeni kafesine taşındı."
 dubois.139.f: "Goril, Orta Afrika'nın ormanlarında yaşayan, en büyük büyük maymun türüdür. Güçlü yapısı ve zeki bakışlarıyla, sosyal gruplar halinde yaşarlar ve grubu yöneten dominant erkek, gümüş sırt olarak bilinir. Goriller genellikle otçul olup, yapraklar, saplar ve meyvelerle beslenirler. Boyutlarına ve güçlerine rağmen, genellikle nazik ve utangaç olup, çoğunlukla orman yaşam alanlarında beslenir ve dinlenirler."
 dubois.139.g: "Ne kadar büyükler!"
