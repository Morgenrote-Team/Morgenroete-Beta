 dubois.1052.t: "Kutup Ayısı Bölümü"
 dubois.1052.d: "#o Kutup Ayısı#! bölümü muhtemelen her hayvanat bahçesindeki en az doğala benzeyen bölümdür. Bunun nedeni hayvanat bahçelerinin çabalamaması değil, yalnızca Kuzey Kutbu’nda olmayan bölgelerde ziyaretçi çekebilmeleridir. Yine de kayalık bölüm, kutup ayıları için hoş bir yerdi."
 dubois.1052.f1: "Hayvanat bahçesinin geniş Arktik temalı bölümünde, Kutup Ayısı olarak bilinen görkemli bir canlı kayalık yaşam alanında dolaşır; kalın beyaz kürkü ve güçlü duruşu dikkatleri üzerine çeker. Onun görkeminden etkilenen sen, daha fazlasını öğrenmek için bilgili bir bakıcıya başvurursun.\n\n\"Kutup Ayısı, Arktik vahşi doğasının bir sembolüdür; aşırı soğuğa uyum sağlamış gerçek bir mucizedir,\" diye söze başlar bakıcı. \"Yoğun kürkleri, kalın yağ tabakası ve perdeli patileri sayesinde dondurucu sıcaklıklarda hayatta kalabilirler. Harika yüzücülerdir; yiyecek bulmak için, çoğunlukla fokları avlamak üzere, çok uzun mesafeleri kat edebilirler.\""
 dubois.1052.f2: "Hayvanat bahçesinin büyüleyici kutup manzarasında bir anne Kutup Ayısı yavrularıyla özenle ilgilenir; onların kabarık beyaz kürkleri ve neşeli oyunları her yaştan ziyaretçiyi büyüler. Onların anne–yavru bağına hayran kalan sen, daha fazlasını öğrenmek için bilgili bir bakıcıya başvurursun.\n\n\"Kutup Ayıları fedakâr annelerdir; yavrularına dikkatle bakarlar,\" diye açıklar bakıcı. \"Yaklaşık sekiz aylık gebelik süresinin ardından dişi, kar yığınında yaptığı bir inin içinde bir ila üç yavru doğurur. Yavrular hayatta kalmak için annenin sıcaklığına ve besleyici sütüne bağımlıdır; buzlu dünyaya çıkmaya hazır olana kadar emzirilirler. Anne Kutup Ayısı, yavrularına avlanma ve tehlikeli deniz buzunu aşma gibi hayati becerileri öğretir.\""
 dubois.1052.f3: "Arktik temalı yaşam alanında bir Kutup Ayısı, karla kaplı bir tümseğin üzerine uzanır; görkemi hem güç hem de dinginlik saçar. Onun bu davranışından etkilenen sen, anlamını öğrenmek için bilgili bir bakıcıya başvurursun.\n\n\"Kutup Ayıları enerji tasarrufu yapabilmeleriyle ve 'yürüyen kış uykusu' adı verilen davranışlarıyla bilinir,\" diye paylaşır bakıcı. \"Yaz aylarında yiyecek kıt olduğunda, aktivitelerini azaltarak yağ depolarına güvenirler. Bu uyum, deniz buzunun geri dönmesine kadar, yani temel yiyecek kaynakları olan foklara yeniden erişene dek, zorlu dönemleri atlatmalarını sağlar. Bu davranışları anlayarak biz de hayvanat bahçemizde Kutup Ayılarına uygun bakım ve zenginleştirme sağlayabiliriz.\""
 dubois.1052.k: "Kuzey Amerika Bölümlerine Dön"
 zoo_north_american_enclosures_tt: "Hayvanat bahçesinin Kuzey Amerika Bölümlerine döneceksin."
 dubois.1053.t: "Grizzly Ayısı Bölümü"
 dubois.1053.d: "#o Grizzly Ayısı#! Bölümünün büyük kısmı sert ağaçlık bir alanla kaplıydı. Ayıların ihtiyaç duyduğu her şeyi sağlıyordu: saklanma yerleri ve serinlemek için küçük bir gölet."
 dubois.1053.f1: "Hayvanat bahçesinin engebeli vahşi doğa temalı bölümünde, Grizzly Ayısı olarak bilinen güçlü ve etkileyici bir canlı otoriter bir varlıkla dolaşır; kalın kürkü ve iri yapısı ziyaretçilerin dikkatini çeker. Onun gücünden etkilenen sen, daha fazlasını öğrenmek için bilgili bir bakıcıya başvurursun.\n\n\"Grizzly Ayısı, yani Kuzey Amerika boz ayısı, güç ve vahşi doğanın bir sembolüdür,\" diye başlar bakıcı. \"Bu görkemli ayılar yaşam alanlarına çok iyi uyum sağlamışlardır; kaslı gövdeleri, keskin pençeleri ve güçlü koku alma duyularıyla tanınırlar. Hepçildirler; beslenmeleri meyveler, balıklar, küçük memeliler ve hatta bitkilerden oluşur. Grizzly Ayısı’nın ekosistemlerdeki kilit tür rolü, yaşadıkları alanların dengesini etkiler.\""
 dubois.1053.f2: "Hayvanat bahçesindeki geniş Grizzly ayısı bölümünde bir anne Grizzly, yavrularını kayalık arazide yönlendirir; kabarık kürkleri ve oyunbaz hareketleri ziyaretçilerin yüzünü güldürür. Onların aile bağlarından etkilenen sen, daha fazlasını öğrenmek için bilgili bir bakıcıya başvurursun.\n\n\"Grizzly Ayıları güçlü anne içgüdüleri ve sıkı aile bağlarıyla tanınırlar,\" diye açıklar bakıcı. \"Kış uykusundan çıktıktan sonra anne, yavrularıyla birlikte hayati becerileri öğretir; balık tutma, yiyecek arama ve potansiyel tehditleri tanıma gibi. Onların iyiliğini gözetir ve bilgeliğini aktarır; yavrularını vahşi doğada bağımsız bir yaşama hazırlar. Anne–yavru etkileşimlerini görmek, bu güçlü canlıların koruyucu yönlerinin kanıtıdır.\""
 dubois.1053.f3: "Grizzly ayısı bölümünün engebeli manzarasında devasa bir erkek ayı ağır adımlarla arazide dolaşır; güçlü adımları ve arada bir çıkardığı homurtular üstünlüğünü ve bölgeciliğini gösterir. Onun davranışından etkilenen sen, anlamını öğrenmek için bilgili bir bakıcıya başvurursun.\n\n\"Grizzly Ayıları ilginç bölgesel davranışlar sergiler,\" diye paylaşır bakıcı. \"Erkekler bölgelerini belirleyip kokuları ve sesleriyle işaretleyerek üstünlüklerini ve eş çekme gücünü gösterirler. Arkalarında koku bırakmak ve varlıklarını duyurmak için arka ayakları üzerine kalkarak veya vücutlarını ağaçlara sürterek farklı gösteriler yaparlar. Bu davranışlar, bu görkemli ayıların sosyal dinamiklerinde ve üreme başarısında önemli bir rol oynar.\""
 dubois.1053.f4: "Magazin gazeteleri çılgına dönmüş durumda! Ünlü Grizzly ayılarımızdan biri hayvanat bahçesinden kaçtı; fakat yetkililer alarmı yeni verirken ayı, yakınlardaki bir parkta gezen bir Yunan güreşçisine rastladı. Güreşçi, yanında genç bir kadınla fayton gezintisi yaparken vakit geçiriyordu. Hızla harekete geçti, ayıyla boğuştu ve onu bayılttı. Polis olay yerine geldiğinde gözlerine inanamadı, çünkü bu gerçekten olağanüstü bir başarıydı. Yerel basın güreşçiye hemen 'Yeni Herkül' adını verdi ve cesaretini kutladı. Ağır aksanı nedeniyle sözlerini kimse tam olarak anlayamasa da kısa sürede hem genç göçmenler hem de yerliler arasında popüler oldu. Ancak bu durum, genç erkeklerin sevgililerine kendilerini kanıtlamak için kasıtlı olarak vahşi doğaya açılmaya çalıştığı bir dizi talihsiz kazaya yol açtı.\nGrizzly ayımız zarar görmeden hayvanat bahçesine geri getirildi."
 dubois.1054.t: "Kel Kartal Kafesi"
 dubois.1054.d: "Sert kayalıklarla dolu bir kuş kafesi, #o Kel Kartal#!ın yuvasıydı. Kafesin üzerindeki ağ sayesinde hayvanın kaçması mümkün değildi."
 dubois.1054.f1: "Hayvanat bahçesinin geniş kafesinde yüksek bir dala görkemli şekilde tünemiş bir Kel Kartal, delici bakışlarıyla çevresini süzer; beyaz başı ve güçlü koyu kanat açıklığı ziyaretçilerin hayranlığını kazanır. Onun haşmetinden etkilenen sen, daha fazlasını öğrenmek için bilgili bir bakıcıya başvurursun.\n\n\"Kel Kartal, güç ve özgürlüğün saygı gören bir sembolüdür,\" diye söze başlar bakıcı. \"Etkileyici kanat açıklıkları ve keskin pençeleriyle bu yırtıcılar usta avcılardır. Genellikle balıkla beslenirler; keskin gözleri sayesinde avlarını büyük yüksekliklerden görebilirler. Kel Kartal’ın koruma başarısı, yaşam alanlarının korunmasının ve bu görkemli kuşların gelecek nesiller için güvence altına alınmasının önemini göstermektedir.\""
 dubois.1054.f2: "Hayvanat bahçesinin doğal görünümlü kafesinde bir çift Kel Kartal gökyüzünde zahmetsizce süzülür; uyumlu uçuşları ve melodik çağrıları gökyüzünde yankılanır. Onların uçuş yeteneklerinden etkilenen sen, daha fazlasını öğrenmek için bilgili bir bakıcıya başvurursun.\n\n\"Kel Kartallar olağanüstü uçuş becerileri ve karmaşık kur yapma ritüelleriyle bilinir,\" diye açıklar bakıcı. \"Kur gösterileri sırasında erkek ve dişi birlikte büyüleyici bir hava dansı yapar; birlikte yükselir ve dalış yaparlar. Bu gösteriler hem çift bağlarını güçlendirir hem de görsel bir şölen sunar. Onları uçarken izlemek gerçekten hayranlık vericidir.\""
 dubois.1054.f3: "Kartal bölümünün manzaralı arka planında bir Kel Kartal yüksek bir dala tünemiştir; çıkardığı ayırt edici çağrı vahşi doğanın ruhuyla yankılanır. Onun seslerinden etkilenen sen, anlamını öğrenmek için bilgili bir bakıcıya başvurursun.\n\n\"Kel Kartallar sesleri iletişim aracı olarak kullanır,\" diye paylaşır bakıcı. \"Vahşi doğadaki varlıklarıyla özdeşleşen o ünlü tiz çağrıları birçok amaca hizmet eder. Bu sesler sayesinde bölgelerini belirler, eşleriyle iletişim kurar ve yuvalarını savunurlar. Kel Kartal’ın ses çeşitliliği, onun uyum yeteneğinin ve farklı yaşam alanlarında başarılı olabilmesinin bir kanıtıdır.\""
 dubois.1055.t: "Florida Panteri Bölümü"
 dubois.1055.d: "#o Florida Panteri#!nin yaşam alanı, subtropikal bitkiler ve küçük bir nehirle kaplıydı. Bazı ağaçlar tırmanma olanağı sunuyordu."
 dubois.1055.f1: "Hayvanat bahçesinin yemyeşil subtropikal bölümünde Florida Panteri olarak bilinen güçlü ve çevik bir yırtıcı sessiz bir zarafetle dolaşır; kaslı yapısı ve delici yeşil gözleri ziyaretçilerin bakışlarını üzerine çeker. Onun benzersizliğinden etkilenen sen, daha fazlasını öğrenmek için bilgili bir bakıcıya başvurursun.\n\n\"Florida Panteri, pumanın olağanüstü bir alttürüdür,\" diye başlar bakıcı. \"Florida’nın sulak alanları ve ormanlarının zengin ve çeşitli yaşam alanlarına özgüdürler. Bu panterler, bu farklı çevrede gelişip hayatta kalmak için uyum sağlamışlardır. Keskin duyuları, güçlü çeneleri ve olağanüstü çeviklikleriyle doğal yaşam alanlarında avlanmaya ve hayatta kalmaya mükemmel şekilde uygundurlar. Florida Panteri, bu bölgedeki yaban hayatının olağanüstü çeşitliliğinin bir kanıtıdır.\""
 dubois.1055.f2: "Panter bölümünün doğal bitki örtüsünde bir erkek Florida Panteri alçak, yankılanan bir kükreme yayar; bu çağrı varlığını ve bölgesini gösterir. Onun seslerinden etkilenen sen, anlamını öğrenmek için bilgili bir bakıcıya başvurursun.\n\n\"Florida Panterleri farklı seslerle iletişim kurar,\" diye paylaşır bakıcı. \"Erkekler kükremeler, tıslamalar ve çığlıklar gibi çağrılar çıkararak üstünlüklerini gösterir ve bölgelerini savunurlar. Bu sesler, olası rakipleri uzaklaştırmaya ve yakınlardaki dişilerle iletişim kurmaya yardımcı olur. Onların ses çeşitliliğini dinleyerek araştırmacılar ve korumacılar, Florida Panteri’nin davranışları ve nüfus dinamikleri hakkında değerli bilgiler elde eder.\""
 dubois.1055.f3: "Panter bölümünün doğal bitki örtüsünde bir erkek Florida Panteri alçak, yankılanan bir kükreme yayar; bu çağrı varlığını ve bölgesini gösterir. Onun seslerinden etkilenen sen, anlamını öğrenmek için bilgili bir bakıcıya başvurursun.\n\n\"Florida Panterleri farklı seslerle iletişim kurar,\" diye paylaşır bakıcı. \"Erkekler kükremeler, tıslamalar ve çığlıklar gibi çağrılar çıkararak üstünlüklerini gösterir ve bölgelerini savunurlar. Bu sesler, olası rakipleri uzaklaştırmaya ve yakınlardaki dişilerle iletişim kurmaya yardımcı olur. Onların ses çeşitliliğini dinleyerek araştırmacılar ve korumacılar, Florida Panteri’nin davranışları ve nüfus dinamikleri hakkında değerli bilgiler elde eder.\""
 dubois.1055.f4: "Esir panterin kaderinden ilham alan [SCOPE.sCharacter('manzoni_literary_scope').GetFullName] bir şiir yazdı:\n\n'Bakışları, parmaklıkların geçişinden,\no kadar yoruldu ki artık tutamıyor.\nOna binlerce parmaklık var gibi gelir\nve o binlerce parmaklığın ardında hiçbir dünya yoktur.\n\nYumuşak adım, güçlü ve esnek yürüyüş,\nen küçük alanda dönüp durur,\nbu, merkez etrafında bir güç dansı gibidir,\nbir güçlü iradenin felce uğradığı yerde.\n\nYalnızca bazen gözbebeğinin perdesi\nsessizce kalkar –. Bir imge girer içeri\ndonuk bedenin sessizliği arasından süzülerek –\nve kalpte varlığını yitirir.'"
 dubois.1056.t: "Amerikan Bizonu Bölümü"
 dubois.1056.d: "#o Amerikan Bizonları#! geniş bir alanda yaşıyordu. Bu bölüm, Amerikan Ortabatısı’nın manzarasını yansıtmaya çalışıyordu. Alanın büyük kısmı bizonların otlayabildiği bozkır otlarıyla kaplıydı."
 dubois.1056.f1: "Hayvanat bahçesinin geniş bozkır temalı bölümünde, Amerikan Bizonu olarak bilinen görkemli ve heybetli bir canlı ağır adımlarla dolaşır; devasa yapısı ve etkileyici boynuzları ziyaretçilerin dikkatini çeker. Onun tarihsel öneminden etkilenen sen, daha fazlasını öğrenmek için bilgili bir bakıcıya başvurursun.\n\n\"Amerikan Bizonu, yani Buffalo, büyük kültürel ve ekolojik öneme sahiptir,\" diye başlar bakıcı. \"Bu muhteşem otoburlar, devasa sürüler halinde geniş bozkırlarda dolaşarak manzarayı şekillendirir ve pek çok türün yaşamını destekler. Bizonlar inanılmaz bir güç ve dayanıklılığa sahiptir; sert hava koşullarına dayanabilir ve yiyecek ile su arayışında uzun mesafeler katedebilirler.\""
 dubois.1056.f2: "Hayvanat bahçesinin sakin bizon bölümünde bir Amerikan Bizonu sürüsü huzur içinde otlar; devasa gövdeleri çimenlikte uyum içinde hareket eder. Nalları yere vurdukça çıkan ses havada yankılanarak ritmik bir uyum oluşturur. Onların sosyal düzeninden etkilenen sen, daha fazlasını öğrenmek için bilgili bir bakıcıya başvurursun.\n\n\"Amerikan Bizonları son derece sosyal hayvanlardır; sürü adı verilen uyumlu gruplar halinde yaşarlar,\" diye açıklar bakıcı. \"Bir sürüde, baskın erkekler yani boğalar tarafından yönetilen hiyerarşik bir düzen bulunur. Bu görkemli canlılar birbirlerini tımar eder, çeşitli seslerle iletişim kurar ve çiftleşme mevsiminde ilgi çekici davranışlar sergilerler. Bir bizon sürüsündeki etkileşimleri gözlemlemek, onların karmaşık sosyal yapısına dair eşsiz bir bakış sunar.\""
 dubois.1056.f3: "Bizon bölümünün dalgalı bozkır manzarasında, devasa bir boğa Bizon dimdik durur; püsküllü postu ve kudretli varlığı ziyaretçilerin hayranlığını kazanır. Onun davranışlarından etkilenen sen, anlamını öğrenmek için bilgili bir bakıcıya başvurursun.\n\n\"Bir boğa Bizonun güç ve hakimiyet gösterisi büyüleyici bir manzaradır,\" diye paylaşır bakıcı. \"Çiftleşme mevsiminde erkekler statülerini belirlemek ve eşleşme fırsatları için olağanüstü gösterilere girişir. Buna toprağı eşelemek, tozda yuvarlanmak ve rakiplerle boynuz kilitleyerek güç mücadeleleri yapmak dahildir. Bu davranışlar sürünün sosyal yapısını korumak ve türün devamını sağlamak için hayati öneme sahiptir.\""
 dubois.1057.t: "Timsah Bölümü"
 dubois.1057.d: "Timsah bölümü, doğrudan Florida’dan alınmış gibi görünen büyük bir bataklıktı."
 dubois.1057.f1: "Hayvanat bahçesinin büyüleyici sulak alanında, timsah olarak bilinen tarih öncesinden kalma güçlü bir yaratık suyun yüzeyinin hemen altında pusuda bekler; pullu derisi ve dikkatli gözleri ziyaretçilerin ilgisini çeker. Onun kadim görünümünden etkilenen sen, daha fazlasını öğrenmek için bilgili bir bakıcıya başvurursun.\n\n\"Timsahlar, geçmiş çağlardan kalma yaşayan fosillerdir,\" diye başlar bakıcı. \"Bu kadim sürüngenler milyonlarca yıldır neredeyse hiç değişmeden günümüze ulaşmıştır. Güçlü çeneleri ve sert ısırıklarıyla çeşitli avları yakalayıp tüketebilirler. Timsahlar, küçük hayvanların nüfusunu kontrol ederek ve sulak alan ekosistemlerinin dengesini koruyarak yaşadıkları çevrelerde hayati bir rol oynar.\""
 dubois.1057.f2: "Hayvanat bahçesinin sakin sucul ortamında bir timsah, güneşin ısıttığı kıyıda güneşlenir; zırhlı gövdesi ve heybetli boyu ziyaretçilerin hayranlık uyandırmasına neden olur. Onun güneşlenme davranışı ilgini çeker ve bilgili bir bakıcıya sorular yöneltirsin.\n\n\"Timsahlar soğukkanlı canlılardır, yani vücut ısılarını düzenlemek için dış ısı kaynaklarına ihtiyaç duyarlar,\" diye açıklar bakıcı. \"Güneşlenme onlar için çok önemli bir davranıştır. Güneşte dinlenerek vücut ısılarını yükseltirler; bu da metabolizmalarını ve enerji seviyelerini artırır. Bu davranış özellikle çevre koşullarının serin olduğu aylarda, vücut sıcaklıkları düştüğünde çok daha önemlidir.\""
 dubois.1057.f3: "Timsah bölümünün yemyeşil ortamında, büyük bir erkek timsah derin ve uğultulu bir homurtu çıkarır; sesi su boyunca yankılanır, bu da onun hakimiyetini ve bölgesini sergiler. Onun bu seslerinden etkilenen sen, anlamını öğrenmek için bilgili bir bakıcıya başvurursun.\n\n\"Timsahların çıkardığı sesler iletişimlerinin çok önemli bir parçasıdır,\" diye paylaşır bakıcı. \"Çiftleşme mevsiminde erkekler, hakimiyetlerini göstermek ve dişileri çekmek için kendilerine özgü böğürtü seslerini kullanırlar. Bu sesli iletişim, rakip erkekler arasındaki çatışmaları önlemeye yardımcı olur. Ayrıca timsahlar tıslama ve homurdanma gibi başka sesler de çıkararak birbirleriyle iletişim kurar ve sulak alanlarda varlıklarını belli ederler.\""
 dubois.1058.t: "Aksolotl Bölümü"
 dubois.1058.d: "Aksolotl Bölümü, bir bölümden çok kayaların arasındaki küçük bir göleti andırıyordu. Aksolotllar oldukça küçük oldukları için ziyaretçiler onlara çok yaklaşabiliyor ve neredeyse dokunabiliyorlardı."
 dubois.1058.f1: "Hayvanat bahçesinin büyüleyici sucul yaşam alanında, Aksolotl olarak bilinen tuhaf ve adeta başka bir dünyadan gelmiş canlı suda süzülür; püsküllü dış solungaçları ve eşsiz görünümü ziyaretçilerin dikkatini çeker. Onun bu farklı özelliklerinden etkilenen sen, daha fazlasını öğrenmek için bilgili bir bakıcıya başvurursun.\n\n\"Aksolotl, olağanüstü yenilenme yetenekleri ve uyumuyla gerçek bir mucizedir,\" diye başlar bakıcı. \"Çoğu amfibiden farklı olarak Aksolotllar yaşamları boyunca yavru özelliklerini korur; bu duruma neoteni denir. Ayrıca inanılmaz yenilenme güçleriyle tanınırlar; kaybolan uzuvlarını, hatta omuriliklerinin bir kısmını bile yeniden büyütebilirler. Bu yetenekler bilim insanlarının ve araştırmacıların ilgisini çekmiş, doku yenilenmesi hakkında değerli bilgiler sağlamıştır.\""
 dubois.1058.f2: "Hayvanat bahçesinin sakin sucul ortamında bir Aksolotl, suya gömülü bir kayanın üzerinde dinlenir; tüy gibi solungaçları suyun içinde nazikçe hareket eder. Onun eşsiz solunum adaptasyonları ziyaretçilerin ilgisini çeker. Nefes alışverişi davranışından etkilenen sen, daha fazlasını öğrenmek için bilgili bir bakıcıya başvurursun.\n\n\"Aksolotllar, onları diğer amfibilerden ayıran eşsiz solunum özelliklerine sahiptir,\" diye açıklar bakıcı. \"Çoğu amfibi başkalaşım geçirerek karada nefes almak için akciğer geliştirirken, Aksolotllar suda kalır ve oksijeni dış solungaçları aracılığıyla alırlar. Bu solungaçlar son derece verimlidir ve yaşamları boyunca suyun altında nefes almalarını sağlar. Bu adaptasyon, onların sucul yaşama ne kadar özelleştiklerinin kanıtıdır.\""
 dubois.1058.f3: "Aksolotl bölümündeki su bitkileri arasında, genç Aksolotllardan oluşan bir grup oyuncu bir şekilde etkileşir; nazik hareketleri ve meraklı davranışları sevimli kişiliklerini ortaya koyar. Onların bu etkileşimlerinden etkilenen sen, anlamını öğrenmek için bilgili bir bakıcıya başvurursun.\n\n\"Aksolotllar meraklı ve sosyal doğalarıyla bilinirler,\" diye paylaşır bakıcı. \"Genellikle barışçıl canlılardır ve aynı akvaryumdaki diğer türlerle uyum içinde yaşarlar. Keskin bir dokunma duyusuna sahiptirler ve sudaki titreşimleri algılayabilirler. Bu duyuları çevrelerini keşfetmek, yiyecek bulmak ve birbirleriyle etkileşim kurmak için kullanırlar. Onların oyuncu davranışları ve etkileşimleri cazibelerini daha da artırır.\""
