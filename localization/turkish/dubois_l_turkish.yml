 dubois.228.t: "Haast Kartalı"
 dubois.228.f: "\"Önce devasa bir pençe bulduk ve bir dinozora ait olduğunu sandık, fakat sonra daha fazla kemik buldukça bunun bir kartal olduğu ortaya çıktı. İyi ki bu kartal bugün nesli tükenmiş, yoksa muhtemelen insanları bile öldürebilirdi.\""
 dubois.228.g: "Korkutucuymuş!"
