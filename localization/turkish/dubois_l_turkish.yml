 dubois_panda_baby: "#b Panda Yavruları#!"
 dubois_lion_baby_birth_flavor: "İki küçük aslan yavrusu annelerinin etrafında emekliyordu. Birkaç hafta önce doğmuşlardı ama anneleri onları bir süre saklı tutmuştu. Şimdi ise sonunda dünyayı görebiliyor, oynayıp zıplayabiliyorlardı. Çok sevimlilerdi!"
 dubois_otter_baby_birth_flavor: "Küçük su samuru ilk kez suya girip yüzdü. İlk sefer olmasına rağmen oldukça iyiydi. Sonra sudan çıktı ve sıcak bir kayanın üstüne uzandı."
 dubois_jaguar_baby_birth_flavor: "Yaklaşık 6 haftalık küçük jaguar annesini takip ediyordu. Oldukça sakar görünüyordu. Ama yakında tehlikeli bir yırtıcıya dönüşecekti."
 dubois_koala_baby_birth_flavor: "Küçük koala annesinin sırtına sıkıca tutunmuştu. Artık oldukça büyümüştü ama hâlâ annesine bağımlıydı. Aniden ağaçtaki bir yaprağı kopardı ve kemirmeye başladı."
 dubois_panda_baby_birth_flavor: "Küçük panda çok masum görünüyordu. Yuvarlanıyor, biraz sakarca davranıyordu. Ama annesi sürekli göz kulak oluyordu. Bu minik şeye asla bir şey olamazdı."
 dubois.1250.t: "Yosemite Ulusal Parkı?"
 dubois.1250.d: "Bazı etkili doğa korumacıları, Yosemite Vadisi’nin eşsiz manzarasını korumak için burada bir Ulusal Park kurulmasını istiyor. Vadi, nefes kesici manzaralarıyla eşsiz bir yer. Soru şu: Bir Doğa Koruma Alanı mı tercih edilmeli, yoksa vadiyi tarım, ormancılık ve madencilik için mi kullanmalıyız?"
 dubois.1250.f: "\"Ama insan eliyle yapılmış hiçbir tapınak Yosemite ile kıyaslanamaz. Duvarlarındaki her kaya yaşamla parıldıyor gibi.\"\n - John Muir"
 dubois.1250.g: "Harika bir fikir!"
 dubois.1250.h: "Aslında burası madencilik için çok uygun görünüyor!"
 dubois.1251.t: "Son Bizonlar"
 dubois.1251.d: "Avrupa Bizonu olarak da bilinen #o Wisent#! neredeyse yok olma noktasına geldi. Sadece birkaç hayvan Białowieża Ormanı’nda kaldı. 1830’a kadar orman koruma altındaydı, ancak Kasım Ayaklanması’ndan sonra neredeyse tüm ormancı görevleri kaldırıldı. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting]’in ziyareti, ormanda bir [concept_dubois_nature_reserve] yeniden kurulmasına yol açabilir."
 dubois.1251.f: "\"Białowieża, Avrupa’nın son bakir ormanıdır ve son bizonlara ev sahipliği yapar. Bu doğal bir mucizedir!\"\n\"Ama bu ağaçlar kesilip ekonomimizi güçlendirebilir!\""
 dubois.1251.g: "Bizonları korumalıyız!"
 dubois.1251.h: "Bu orman kerestecilik için mükemmel."
 dubois.1252.t: "Gran Paradiso’da Kraliyet Av Koruma Alanı mı?"
 dubois.1252.d: "Gran Paradiso’da avlanmak harika! Özellikle de burası #b Alpin Dağ Keçisi#!’nin yaşadığı son yer olduğundan. Burada yapılan bir avın ardından [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullNameNoFormatting], kalan birkaç dağ keçisini korumak için burada bir [Concept('concept_dubois_nature_reserve','$concept_dubois_royal_hunting_reserve$')] kurmayı düşündü."
 dubois.1252.f: "\"Bu sıradan insanlar benim dağ keçilerimi nasıl öldürmeye cüret eder? Onları avlamaya yalnızca benim hakkım var! Bu av hayvanımı bu vahşilerden korumalıyız!\"\n\n#b Tarihsel olarak,#! Gran Paradiso Ulusal Parkı 1922’de, Vittorio Emanuele III’ün Kraliyet Av Koruma Alanı’nı bağışlamasıyla kuruldu ve böylece İtalya’nın ilk ulusal parkı oluşturuldu. Alpin dağ keçisinin korunması, parkın en önemli görevlerinden biri olmaya devam etti. 1922’de parkta yaklaşık 3000 dağ keçisi vardı. Bu sayı Faşist yönetim ve İkinci Dünya Savaşı sırasında dramatik biçimde azaldı, ancak sonrasında nüfus toparlandı ve bugün parkta yaklaşık 4000 dağ keçisi bulunmaktadır."
 dubois.1252.g: "Hemen Kraliyet Av Koruma Alanını kur!"
 dubois.1252.h: "Belki sonra..."
