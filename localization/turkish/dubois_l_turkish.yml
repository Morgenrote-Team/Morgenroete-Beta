 dubois_has_rainforest_tt: "En az bir yağmur ormanına sahip bir eyaleti kontrol ediyor. Tanınmış yağmur ormanları: Amazon Ormanı, Kongo Ormanı, Borneo Ormanı ve Hindiçini Ormanı."
 dubois_has_mountains_tt: "Önemli bir dağ silsilesiyle kaplı en az bir eyalet üzerinde toprak iddiasına sahip."
