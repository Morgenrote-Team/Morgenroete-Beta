 dubois.1069.t: "Capybara Kafesi"
 dubois.1069.d: "Capybara kafesi, geniş bir çimenlik alanı ve büyük bir göleti çevreliyordu. Hemen, bu büyük, nazik kemirgenlerin bir kısmının su kenarında dinlendiğini, diğerlerinin ise sığ sularda keyifle yüzerken izlediğini fark ettiniz. Sakin tavırları ve sıkı bağlarla bağlı grup davranışları hemen ziyaretçilerin ilgisini çekti."
 dubois.1069.f1: "Güneş ışığının içindeki Capybara kafesinde, küçük bir grup bu büyük kemirgen su kenarında dinleniyor, bazıları tembelce ot yerken diğerleri gölgede dinleniyor. Sakin ve sosyal davranışları hemen ziyaretçilerin dikkatini çekiyor. Yaşam tarzları hakkında meraklı olan biri olarak, daha fazla bilgi edinmek için bir bakıcıya yaklaşır ve sorarsınız.\n\"Capybaralar son derece sosyal hayvanlardır,\" diyor bakıcı. \"Gruplar halinde yaşarlar, bazen 20 veya daha fazla bireyden oluşurlar ve nadiren yalnız görülürler. Güçlü sosyal bağları, hayatta kalmalarının anahtarıdır, yırtıcılardan korunmalarına yardımcı olur ve sıkı aile yapılarını sürdürmelerine olanak tanır. Birbirleriyle bağlantı kurmak için çeşitli sesler, mırlamalar ve ıslıklar kullanarak iletişim kurarlar.\""
 dubois.1069.f2: "Hareketli Capybara habitatında, bir Capybara grubu özellikle maceraperest bir Capybara suya girip burnuna kadar suya daldı, diğerleri de ardından gelerek suda oynayarak sıçrıyor. Bu büyük kemirgenlerin yüzme keyfini izlemek ziyaretçileri büyülüyor. Bu davranışı merak ederek, bir bakıcıya daha fazla bilgi almak için yaklaşırısınız.\n\"Capybaralar yarı suculdur ve mükemmel yüzücülerdir,\" diyor bakıcı. \"Çok fazla zaman suyun içinde geçirirler, bu da vücut ısılarını düzenlemelerine ve yırtıcılardan kaçmalarına yardımcı olur. Su içinde uyuyabilirler ve sadece burunları suyun üzerinde kalır. Bu suya olan yakınlıkları, doğal davranışlarının hayati bir parçasıdır ve burada en rahat hissederler.\""
 dubois.1069.f3: "Capybara grubunu kafeste izlerken, birdenbire bir hareketlilik gözünüze çarpar. Genç bir Capybara, özellikle lezzetli bir çimenlik alan bulmuş ve heyecanla yemeye başlamış, diğerleri de etrafına toplanıp ona katılmıştır. Bu toplu beslenme davranışını görmek, kalbinizi ısıtıyor ve daha fazla öğrenmek için bir bakıcıya sorarsınız.\n\"Capybaralar otoburdur ve birlikte otlamaktan çok zaman harcarlar,\" diyor bakıcı. \"Yemekleri genellikle çimenler ve su bitkileriyle sınırlıdır, bunları birbirleriyle sevinçle paylaşırlar. Yabancı yemekler konusunda benzersiz bir sindirim sistemine sahiptirler ve çoğu zaman yiyeceklerini yeniden sindirerek maksimum besin almalarını sağlarlar. Bu grup halinde beslenme alışkanlıkları, güçlü sosyal bağlarını pekiştirir ve grup içinde uyumun korunmasına yardımcı olur.\""
