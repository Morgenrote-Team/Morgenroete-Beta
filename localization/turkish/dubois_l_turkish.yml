 dubois.52.t: "Yüksek Kaliteli Ormancılık"
 dubois.52.d: "Dr. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] has achieved [SCOPE.sCharacter('dubois_naturalist_scope').GetHerHis] goal. Through careful selection of particularly resistant seedlings, measures for natural pest control and the study of several animals and plants in symbiosis, [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] has sustainably strengthened our country's forestry industry.\n\nTotal improved buildings: [GetPlayer.MakeScope.Var('mr_num_improved_forestry_buildings_var').GetValue|V0]\n$concept_dubois_specimens$ from Project: [GetPlayer.MakeScope.ScriptValue('ito_specimens_from_forestry_project_for_event_value')|+0] @dubois_specimen!"
 dubois.52.f: "'Afedersiniz, ne? Ağaçları mı KESMEK istiyorsunuz? Onları yetiştirmek, beslemek ve bakmak için bunca zahmete katlandım ve şimdi bu kapitalist canavarlar benim yavrularımı öldürmek istiyor? Tanrım, ben ne yaptım!'"
 dubois.52.g: "Herkese daha fazla odun!"
 dubois.53.t: "Yüksek Kaliteli Kauçuk Ağaçları"
 dubois.53.d: "Dr. [ROOT.Var('ito_naturalist_var').GetCharacter.GetLastName] has achieved [ROOT.Var('ito_naturalist_var').GetCharacter.GetHerHis] goal. Through careful selection of particularly resistant seedlings, measures for natural pest control and the study of several animals and plants in symbiosis, [ROOT.Var('ito_naturalist_var').GetCharacter.GetSheHe] has sustainably strengthened our country's rubber industry.\n\nTotal improved buildings: [GetPlayer.MakeScope.Var('mr_num_improved_runner_buildings_var').GetValue|V0]"
 dubois.53.f: "'Herkes neden tamamen işe yaramaz kauçukla ilgileniyor? Ben bunu sadece Neohesperialist Bataklık Sivrisineği ile ilgilendiğim için yaptım. Bu küçük, kolayca ölümcül olan hayvan sadece bu iklimde ürer.'"
 dubois.53.g: "Herkese daha fazla kauçuk!"
