 dubois.1011.t: "Afrika Doğa Tarihi Galerileri"
 dubois.1011.d: "Hayvanat Bahçesi’nin Afrika Pavyonlarına girin; burada özenle düzenlenmiş habitatlar ve incelikli mimari detaylar kıtanın çeşitli fizyografyasını yansıtır. Bilgin doğabilimcilerin danışmanlığında tasarlanan bu bölmeler, dikkatli ziyaretçiye savan, nehir ve kıyı faunasını eğitim ve görgüye uygun koşullar altında gözlemleme fırsatı sunar."
