 dubois.39.d: "Haftalar süren başarısız denemeler ve sonsuz çabalar sonrasında, uzun zamandır beklenen hayvan nihayet yakalandı. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] çok mutlu. Kahramanlar, kazandıkları hayvanla eve dönüyorlar. Şüphesiz, bu hayvan bu rahatsız edici doğada değil, [ROOT.GetCountry.GetNameNoFlag]'deki güzel Ulusal Hayvanat Bahçesi'nde daha mutlu olacak!"
