 dubois.1021.t: "Asya Doğa Tarihi Galerileri"
 dubois.1021.d: "Hayvanat Bahçesi içindeki Asya Pavyonları, ciddi bir öğretici amaçla düzenlenmiştir: ahşap köşkler ve pagodalar, lake panolar ve sade semboller karakteristik faunayı çerçeveler. Düşünceli ziyaretçi Asya’nın çeşitlenmiş âlemleri boyunca ölçülü bir gezintiye davet edilir."
