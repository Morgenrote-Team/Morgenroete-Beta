 dubois.1030.t: "Pallas's Cat Kafesi"
 dubois.1030.d: "Pallas's Cat kafesi, yarıklar ve küçük mağaralarla dolu kayalık bir araziydi. İlk bakışta, kalın, kabarık kedi neredeyse görünmezdi, çevresiyle mükemmel bir şekilde kaynaşıyordu. Sonra birini fark ettiniz — yuvarlak, geniş gözleri dikkatlice bir kayanın arkasından bakarak etrafını izliyordu."
 dubois.1030.f1: "Hayvanat bahçesinin kayalık kafesinde, Pallas's Cat bir kayanın arkasından çıkıyor, geniş, yuvarlak gözleri etrafı tarayarak bakıyor. Soğuğa karşı kabarık, gümüş rengi tüyleriyle, küçük, vahşi bir pamuk topu gibi görünüyor. Birçok diğer yırtıcı kedinin aksine, Pallas's Cat kısa bacakları ve sağlam yapısıyla, yaşadığı Orta Asya'nın soğuk, yüksek irtifalı bölgelerine mükemmel bir şekilde uyum sağlamış bir hayvandır."
 dubois.1030.f2: "Pallas's Cat, kayaların arasındaki saklanma yerinden çıkarken, düz yüzü ve büyük, ifade dolu gözleri ona neredeyse komik bir görünüm kazandırıyor. Ziyaretçiler, küçük boyutları ve kar beyazı tüyleriyle çevresine uyum sağlayan bu sevimli kediyi sıkça hayranlıkla izlerler. Doğal olarak yalnız olan Pallas's Cat, vahşi doğada nadiren görülür; gün boyunca kayalık yarıklarda ve inlerde saklanmayı tercih eder, şafak ya da alacakaranlıkta avlanmak için dışarı çıkar."
 dubois.1030.f3: "Soğuk, simüle edilmiş bozkır ortamında Pallas's Cat, sessiz bir hassasiyetle hareket ederken, kalın kuyruğu arkasından bir tüy gibi sürükleniyor. Kaçan ve kamuflaj yetenekleriyle tanınan bu küçük vahşi kedi, yalnızlık tercihiyle, yırtıcılardan ve avlardan gizlenmek için tüylerini kullanır. Çoğunlukla küçük memelilerle beslenen Pallas's Cat, keskin gözleriyle açık araziyi izleyerek başarılı bir avcıdır."
