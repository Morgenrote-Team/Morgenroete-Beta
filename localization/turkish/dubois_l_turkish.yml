 dubois_extend_zoo_small_decision: "[concept_dubois_zoo]’yu genişlet (küçük)"
 dubois_extend_zoo_small_decision_desc: "[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')], herkesin mutluluk kaynağıdır: insanlar hayvanat bahçesinde gezip dağılır, bilim insanları zoolojik çalışmalarını sürdürebilir ve en fazla yabancı faunayı sergileyebilenlere uluslararası prestij bahşedilir. Her genişletmede ulusun itibarı artar. Bazı genişleme aşamaları yalnızca çok sayıda değil, aynı zamanda dünyanın farklı bölgelerinden hayvan toplamayı da gerektirir."
