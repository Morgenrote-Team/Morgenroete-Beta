 dubois_paleontological_excavation_explanation_loc: "Sizin [concept_dubois_paleontological_team] şu anda bir [concept_dubois_paleontological_excavation] gerçekleştiriyor. Bir Kazı, size her yıl belirli miktarda [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] ve [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] sağlayacaktır.\n[concept_dubois_paleontologist]ınızı Kazıya göndererek yıllık Kemik ve Fosil miktarını artırabilirsiniz. Ancak, Paleontolog'u geri çağırırsanız, bir yıl boyunca onu tekrar gönderemezsiniz."
