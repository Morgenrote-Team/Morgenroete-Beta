 dubois.2011.d_north_america: "Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] is the leading [concept_dubois_paleontologist] of our country. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe|U] is currently conducting surveys in a rock formation in #YELLOW North America#!."
 dubois.2011.d_south_america: "Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] is the leading [concept_dubois_paleontologist] of our country. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe|U] is currently conducting surveys in a rock formation in #YELLOW South America#!."
 dubois.2011.d_europe: "Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] is the leading [concept_dubois_paleontologist] of our country. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe|U] is currently conducting surveys in a rock formation in #YELLOW Europe#!."
 dubois.2011.d_africa: "Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] is the leading [concept_dubois_paleontologist] of our country. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe|U] is currently conducting surveys in a rock formation in #YELLOW Africa#!."
 dubois.2011.d_asia: "Prof. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName] is the leading [concept_dubois_paleontologist] of our country. [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetSheHe|U] is currently conducting surveys in a rock formation in #YELLOW Asia#!."
