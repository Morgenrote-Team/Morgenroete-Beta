 dubois.901.t: "Doğa Bilimciler Kongresi: İnsanın Doğadaki Yeri"
 dubois.901.d: "Geçmiş ve gelecek yılların en önemli bilimsel kongresi olabilecek etkinliğin hazırlıkları tamamlandı. Konu, insanın taksonomik sınıflandırması olacak – Darwin’in evrim teorisini ortaya koymasından bu yana en hararetli tartışmalardan biri. Dünyadaki tüm doğa bilimciler davet edilecek. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] oturuma başkanlık edecek."
 dubois.901.f: "19. yüzyıl boyunca insanın taksonomik sınıflandırması üzerine tartışma, evrim teorisinin formülasyonu ile doruğa ulaştı. İnsanların büyük maymunlara benzediği uzun zamandır bilinse de ve Carl Linnaeus onları primatlar sınıfına dahil etmiş olsa da bazı çekinceler vardı. İnsanın eşsizliğini vurgulamak için Johann Friedrich Blumenbach onu diğer primatlardan \"iki elli\" (Bimana) olarak, \"dört elli\" (Quadrumana) olandan ayırdı. Bu sınıflandırma oldukça yeni olmasına rağmen, etkili İngiliz paleontolog Richard Owen gibi akademik çevrelerde popülerlik kazandı. Evrim teorisinin savunucuları için bu kabul edilemez bir durumdu, anatomistler içinse bir dehşetti – çünkü bu sınıflamaya göre bir goril, bir insandan çok bir bozkır babununa daha yakın sayılıyordu."
 dubois.901.g: "Bilim dünyası bizim misafirimiz olmalı."
 dubois.902.d: "[SCOPE.sCountry('dubois_congress_host_country').GetName], uluslararası bir bilim kongresine davet etti. Konu, evrim teorisi ışığında insanın taksonomik sınıflandırması olacak. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] sıcak bir davet aldı."
 dubois.902.g: "Bu etkinliği kaçırmayacağız."
 dubois.904.t: "Doğadaki Yeri: Benzersiz mi, yoksa sadece başka bir Maymun mu?"
 dubois.904.d: "Sadece iki dersin ardından, aslında zoolojide idari bir süreç olan bu konunun ne kadar rekabetçi olduğu ortaya çıktı. Akademik dostluklar bile insanların nasıl sınıflandırılması gerektiği sorusu yüzünden bölünmüş durumda. Görünüşe göre artık üstün gelen şey bilimsel soru değil, ona bağlı çıkarımlar."
 dubois.904.f: "Morfolojik unsurlar tartışmaya dahil edildikten sonra, mesele anatominin belirli bir yönüne, yani beyne yoğunlaştı. [SCOPE.sCharacter('dubois_hippocampus_defender_scope').GetFullName], maymunlar ile insanlar arasındaki anatomik farklara dair birkaç makale sundu ve maymunların insana dönüşmesinin imkânsız olduğunu vurguladı. İnsanların sadece primatların ayrı bir biyolojik takımı değil, memelilerin tümünden ve diğer primatlardan ayrı, bağımsız bir alt sınıf olduğunu ileri sürdü. Prof. [SCOPE.sCharacter('dubois_hippocampus_defender_scope').GetLastName], bu sınıflandırmayı üç özelliğe dayandırıyordu; en önemlisi yalnızca insan beyninde küçük hipokampus (hippocampus minor) bulunduğu iddiasıydı. Buna karşılık [SCOPE.sCharacter('dubois_hippocampus_attacker_scope').GetFullName], bu sözde benzersiz özelliklerin büyük maymunlarda da bulunabileceğini savundu. Kendisine sadece değiştirilmiş bir maymun fikriyle yaşayıp yaşayamayacağı sorulduğunda, Prof. [SCOPE.sCharacter('dubois_hippocampus_attacker_scope').GetLastName] şöyle yanıtladı: 'Değiştirilmiş bir maymun olmak, değiştirilmiş bir çamur olmaktan daha onurludur.'"
 dubois.904.g: "İnsan hayvanlar âleminde benzersizdir."
 dubois.904.h: "İnsanların, daha önce sanılandan maymunlara çok daha yakın olduğu ortaya çıktı."
 dubois.905.t: "Saygı Uyandıran Konuşma"
 dubois.905.d: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName], [SCOPE.sCountry('dubois_congress_host_country').GetName]’de toplanan bilim insanlarına verdiği konferansla hem dinleyicileri hem de genç akademisyenleri etkiledi."
 dubois.905.f: "'Owen der ki, görebilirsin,\nŞempanzenin beyni,\nHep olağanüstü küçük,\nArkadaki 'boynuz' yok,\nSon ucu da yok,\nVe hiç 'Hipokampus' da yok.\nSonra Huxley yanıt verir,\nOwen yalan söyler,\nLatince alıntıyı çarpıtır;\nGerçekleri yeni değil,\nHataları hiç az değil,\nİtibarı için zararlı.'\n -Sir Philip Egerton"
 dubois.905.g: "Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] büyük bir etki bırakıyor."
 dubois.906.t: "Tartışmaya Değerli Katkı"
 dubois.906.d: "Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]’in parlak bilimsel dersi, [SCOPE.sCountry('dubois_congress_host_country').GetName]’deki bilim kongresinde akademik dünyanın ufkunu genişletti. Muhtemelen kalıcı bir etki bırakacak."
 dubois.906.f: "'Pek çok konuda çok garip teorileri vardı. Hatta bir keresinde İngiliz Derneği’nde ayağa kalkıp, maymunların da tıpkı insanlar gibi beyinlerinde büyük hipokampus (hippocampus major) olduğunu ilan etmişti. Bu söylenecek korkunç bir şeydi; çünkü eğer öyleyse, ölümsüz milyonların inancı, umudu ve sevgisi ne olacaktı? Aranızda maymunla sizin aranızda başka farklar olduğunu düşünebilirsiniz – konuşabilmek, makineler yapabilmek, doğruyu yanlıştan ayırabilmek, dua edebilmek gibi; ama bunlar çocukça hayaller, sevgili dostum. Güvenilecek tek şey büyük hipokampus testidir. Eğer beyninizde büyük hipokampus varsa, dört eliniz olsa, ayaklarınız olmasa ve tüm maymunlardan daha maymunsu olsanız bile maymun değilsinizdir.' -Charles Kingsley"
 dubois.907.t: "Hipokampus Meselesi"
 dubois.907.d: "İnsanın hayvanlar âlemindeki rolüne dair tartışma, zaten geniş çapta kamuoyunun dikkatini çekti – pek de övünülecek şekilde değil. Yazar [SCOPE.sCharacter('dubois_hippopotamus_writer').GetLastName], akademik çekişmeyle alay eden bir eser kaleme aldı bile."
 dubois.907.f: "'Çok keyiflendik ve doğrusu epey de ilgimizi çekti; meğer hepimizin beyninde hipokampus varmış. Elbette benimkinde hiç hissetmedim; belki ölmüştür, kıpırdamamıştır, o zaman da sayılmaz tabii. Herkesin kafasında beyin vardır, iskelet değilse; ve bir maymununki gibi şeyleri kuyrukla sardığını biliyorum, kendi gözlerimle gördüm. Profesör Huxley öyle dedi – onun kuyruğunda değil tabii, maymununkinde; yalnız maymunların kuyruğu yok, orayı pek anlamadım. Sonra ayağa kalkan öbür beyefendi, Bay Flower, dedi ki maymunun her yerinde varmış. Baştan ayağa hipokampus doluymuş, zavallı hayvan, tıpkı kenelerle kaplı bir köpek gibi! Neden ense köküne biraz mavi taş sürmüyorlar ki, tazıya yapılır ya hani. Neyse. Nerede kalmıştım? Ha evet! Profesör Owen dedi ki maymunlarda hiç yokmuş: sadece bimana düzeninde, yani sen ve ben. Eh, o daha iyi bilir. Onlar da çok akıllı adamlar, biri haklı, hepsi yanlış ya da biri yanlış, hepsi haklı – görüyor musun? Neden yazı tura atmıyorlar acaba?' -Charles Kingsley"
 dubois.907.g: "Bu çok komik."
 dubois.908.t: "Entelektüel ya da maddi alışveriş"
 dubois.908.d: "Doğa bilimcimiz kongrenin kenarında biraz boş vakit kazandı ve şimdi bu zamanı en iyi nasıl değerlendirmesi gerektiğini düşünüyor."
 dubois.908.f: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName], bilim kongresinde bazı ilginç meslektaşlarla tanıştı ve onlar da bazı bilimsel konularda fikir alışverişi yapmak istiyor. Deneyim paylaşımı son derece verimli olabilir. Öte yandan profesör, zamanını bazı böcek ve bitki koleksiyonlarını meslektaşlarıyla değiş tokuş etmek için de kullanabilir..."
 dubois.908.g: "Meslektaşlarla fikir alışverişi yap."
 dubois.908.h: "Meslektaşlarla örnek değiş tokuşu yap."
 dubois.909.t_unique: "İnsan benzersizdir"
 dubois.909.t_primate: "İnsan ve Maymunlar akrabadır"
 dubois.909.d_unique: "Doğa bilimciler uzun tartışmalarını sonuçlandırdı. Akademisyenlerin bugün kongre başkanının törenle okuduğu nihai bildiride belirttiğine göre, insanlar hayvanlar âleminde özel bir konuma sahiptir."
 dubois.909.d_primate: "Kongre sona ererken ve nihai bildiri okunurken bazı profesörler öfkeyle salonu terk etti. Akademisyenler, insanların daha önce sanılandan çok daha fazla maymunlara yakın olduğunu buldu."
 dubois.909.f_unique: "'İnsanda beyin, gelişimde, bir önceki alt sınıfın altındakinden ayrıldığı adımdan daha yüksek ve belirgin bir basamak gösterir. Yalnızca beyin yarımküreleri koku alma loblarını ve beyincikleri örtmekle kalmaz, aynı zamanda birinden ileriye, diğerinden geriye doğru da uzanır. Arka kısımları öylesine gelişmiştir ki, anatomistler bu bölgeye üçüncü bir lob karakteri vermiştir; bu Homo cinsine özgüdür ve aynı şekilde her yarımkürenin arka lobunu karakterize eden 'yan karıncığın arka boynuzu' ve 'küçük hipokampus' da ona özgüdür. Beynin yüzeysel gri maddesi, girintilerin sayısı ve derinliği sayesinde, insanda en yüksek düzeye ulaşır. Bu en gelişmiş beyin biçimiyle özel zihinsel güçler ilişkilidir ve sonuçları beynin değerini olağanüstü biçimde gösterir; bu değerlendirmeme göre, Homo cinsini yalnızca ayrı bir takımın temsilcisi değil, Memelilerin ayrı bir alt sınıfı olarak görmem gerekir; bunun için 'ARCHENCEPHALA' adını öneriyorum.' -Richard Owen"
 dubois.909.f_primate: "'İnsana en yakın olan maymunun kesinlikle ya şempanze ya da goril olduğu açıktır. Vücut ve uzuvların genel oranlarında, Goril ile insan arasında dikkate değer bir fark vardır; fakat Gorilin insandan fark ettiği oranda, diğer maymunlar da Gorilden daha fazla farklılık gösterir; bu yüzden bu tür oran farklılıklarının takım değeri olamaz. Kafatası kapasitesi gibi önemli bir konuda ise, insanlar birbirlerinden, maymunlardan farklı olduklarından daha fazla farklıdır; en alt maymunlar ile en üst maymunlar arasındaki oran farkı da, en üst maymun ile insan arasındaki kadar büyüktür. Dolayısıyla, en üst maymunların diş yapısı insanınkinden ne kadar farklıysa, en alt maymunlarınki de onlardan çok daha farklıdır. Böylece hangi organ sistemi incelenirse incelensin, maymun serisindeki farklılıkların karşılaştırılması hep aynı sonuca götürür: İnsan ile Goril ve Şempanze arasındaki yapısal farklar, Goril ile alt maymunlar arasındaki farklardan daha büyük değildir.' -Thomas Henry Huxley"
 dubois.909.g: "İnsan yaratılışın tacıdır."
 dubois.909.h: "Biz sadece tüysüz maymunlar mıyız?"
 dubois.921.t: "Paleontoloji Kongresi: Dinozorların Yok Oluşu"
 dubois.921.d: "Ulusumuz paleontolojinin en önemli kongrelerinden birini hazırlama onuruna sahip. Dünyanın dört bir yanından bilim insanları, dinozorların neden yok olduğuna dair soruya yanıt bulmak için [SCOPE.sCountry('dubois_congress_host_country').GetName]’e akın edecek. [SCOPE.sCharacter('dubois_paleontologist_scope').GetFullName], açılış konuşmasında giymek üzere favori tropik şapkasını (pith helmet) şimdiden seçti."
 dubois.921.f: "Dinozorların yok olmasına neyin yol açtığı sorusu, ilk dinozor kemiği bulunup bilinmeyen bir türün parçası olarak sınıflandırıldığından beri insanlığı meşgul ediyor. 19. yüzyıldan önce, insanlar dinozorları Tufan’da Nuh’un Gemisi’ne alınmayan hayvanlar olarak görüp geçiyordu. Yeni jeolojik ve paleontolojik yöntemler geliştikçe, resim daha da karmaşıklaştı. Tufan fikri, Georges Cuvier’de bile yaşamaya devam etti, ama ters yönde: Deniz seviyelerinin düştüğüne ve sulak alanlarda bulduğu kertenkelelerin yaşam alanlarını kaybettiğine inanıyordu. Bu, sonraki yüz elli yılda ortaya çıkacak sayısız teoriden yalnızca biriydi – tatmin edici olmayan yanıtlar."
 dubois.921.g: "Bu soru hiç yanıt bulabilecek mi?"
 dubois.922.d: "[SCOPE.sCountry('dubois_congress_host_country').GetName], uluslararası bir bilim kongresine davet etti. Konu dinozorların yok oluşunun nedeni olacak. Profesör [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] sıcak bir davet aldı."
 dubois.922.f: "Bu on yılın olayı olacak."
 dubois.923.t: "[SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]’ın Devrimci Teorisi"
 dubois.923.d: "Kongre başlamadan kısa süre önce, ulusumuzun en tanınmış gökbilimcisi [SCOPE.sCharacter('verrier_astronomer_scope').GetFullName], dinozorların yok oluşuna neyin yol açtığına dair kendi fikrini açıkladı: bir asteroid çarpması! Bu tezin paleontologlar arasında yayılmasını istiyor."
 dubois.923.f: "Profesör [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName] her ne kadar bir paleontolog olmasa da, kozmik olaylara aşinaydı – ve onların yıkıcı gücünü biliyordu. 19. yüzyılda gökyüzünde bazı inanılmaz büyüklükte kuyruklu yıldızlar görülmüştü, ama aynı zamanda Tunguska olayında, dünya dışı kaya parçalarının neler yapabileceği de deneyimlenmişti. Astronom sadece teorik hesaplamalar yapmakla kalmadı, aynı zamanda belirli kaya katmanlarında olağandışı materyaller içeren örnekler de toplattı; buna Kretase’nin sonundakiler de dahildi. Profesör [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] ile sürekli iletişim halinde olan bu iki ünlü bilim insanı, en modern fizik bilgilerini kullanarak görüşlerini paylaştı ve dinozor çağının sonunun en mantıklı sebebinin bir asteroid çarpması olduğu sonucuna vardılar – çarpmanın kendisinden çok, onun ekolojik ve iklimsel sonuçları nedeniyle."
 dubois.923.g: "Bu büyüleyici bir fikir."
 dubois.923.h: "Bu tamamen saçmalık."
 dubois.924.t: "Dinozorlar Neden Yok Oldu?"
 dubois.924.d: "Paleontologlar bir araya geldi – ve Kretase döneminin sonunda gerçekleşen kitlesel yok oluş konusunda görüşler farklı. İki ya da üç kamp yok – olasılık ve saçmalık açısından küçük farklılıklarla ayrılan karmaşık tezler var."
 dubois.924.f: "Dinozorların keşfinden bu yana, onların neden dünyadan yok olduğuna dair en fantastik açıklamalar dolaşımda oldu. İşte sadece küçük bir seçki."
 dubois.924.a: "Sebep bir asteroid çarpmasıydı."
 dubois.924.g: "Deniz seviyesi düştü ve yaşam alanlarını yok etti."
 dubois.924.h: "Dünya atmosferindeki oksijen oranı, kuşlar ve memelilere daha uygun seviyelere yükseldi."
 dubois.924.i: "Uyumsuz özellikler evrimsel bir çıkmaza yol açtı."
 dubois.924.j: "Cinsel aktivitenin azalması yok oluşa yol açtı."
 dubois.924.k: "Patolojik Büyüklük!"
 dubois.924.l: "Yumurtalarını yiyen memelilerle rekabet."
 dubois.924.m: "İklim Değişikliği."
 dubois.924.n: "Volkanik Patlamalar."
 dubois.924.o: "Kozmik ya da ultraviyole radyasyon bombardımanı."
 dubois.924.p: "Mezozoik boyunca dinozorların beyin boyutu küçüldü ve sonunda hayatta kalamayacak kadar aptallaştılar."
 dubois.929.t: "Paleontoloji Kongresi Sona Erdi"
 dubois.929.d_asteroid: "Son bir bildiride paleontoloji kongresi bir karara vardığını duyurdu: dinozorların sonunu getiren asteroid çarpması tezi tek başına ikna edici görünüyor."
 dubois.929.d_climate: "Ev sahibi ülkenin profesörü, bugün yaptığı konferansta dinozorların iklim değişikliği nedeniyle yok oluşuna işaret ederek üzüntüyle konuştu."
 dubois.929.d_sex: "Paleontoloji kongresinin başkanı, biraz mahcup bir şekilde ve sık sık boğazını temizleyerek, cinsel üremenin eksikliğinin dinozorların sonunun nedeni olduğunu açıkladı. Profesör Tottenham’ın her zaman eşinin bir Brontosaurus olduğunu düşündüğüne dair araya girmesi tutanaklarda kınandı."
 dubois.929.d_mammals: "Günlerce süren tartışmalardan sonra, paleontologlar memelilerle rekabetin dinozorların sonunu getirdiği sonucuna vardı. Kemirgenlerin dinozor yumurtalarını yemeyi tercih etmiş olabileceğinden şüpheleniyorlar."
 dubois.929.d_fat: "Bugün, paleontoloji kongresi başkanı büyük bir ciddiyetle, dinozorların sadece çok büyük ve çok şişman hale geldiğini ve bunun onların kaçınılmaz yok oluşuna yol açtığını savunan bir belgeyi okudu. Profesör Tottenham’ın bunun başkanın koltuğunun da yakında boşalacağı anlamına geldiğini söylemesi kamuya açık bir azarla sonuçlandı."
 dubois.929.d_stupid: "Bugün paleontoloji kongresinde okunan son bildiride, dinozorların beyinlerinin milyonlarca yıl boyunca giderek küçüldüğü ve sonunda hayatta kalamayacak kadar aptal hale geldikleri ayrıntılı biçimde açıklandı. Profesör Tottenham’ın, bunun bazı bilimsel meslektaşları için de kongre öncesinde arzu edilir olacağını söylemesi tutanaklara geçirilmedi."
 dubois.929.f: "19. ve 20. yüzyılın başlarında bazı önemli bilim insanlarının gerçekten de inandıkları şey buydu."
 dubois.929.g: "Sorumlu olan bir asteroid çarpmasıydı."
 dubois.929.h: "Garip bir teori, ama kabul edilen tek teori bu."
