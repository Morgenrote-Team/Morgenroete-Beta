 dubois.3000.t: "Dr. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] aklını mı kaybediyor?"
 dubois.3000.d: "[concept_dubois_naturalist]’ınız, [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName], giderek daha fazla şeyi unutuyor gibi görünüyor. Belki de [SCOPE.sCharacter('dubois_naturalist_scope').GetHerHis] bir Doğa Bilimci olarak görevini bırakma zamanı gelmiştir?"
 dubois.3000.f: "Wait a second... Where did I put my tea? Oh, is it here? Or was that the poisonous plant? And why is there a huge spider sitting in the corner of the room?"
 dubois.3000.g: "Bence [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] artık çalışmaya devam etmemeli."
 dubois.3000.h: "Pff, bu tamamen normal!"
 dubois.3010.t: "Numuneler kayboldu"
 dubois.3010.d: "Dr. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] bir anda koleksiyonundaki bazı numuneleri bulamaz oldu. [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] onların... kaybolduğunu söyledi."
 dubois.3010.f: "I am absolutely sure that I just put them here on those pins. But now they are gone. Those were magnificent insects! Maybe I just put them somewhere else?"
 dubois.3010.g: "Nasıl kaybolabilirler? Öldüklerini sanıyordum..."
 dubois.3011.t: "Doğa Bilimci koleksiyonun parçalarını satıyor"
 dubois.3011.d: "Görünüşe göre Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] büyük borçlar biriktirmiş. [SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe] için tek çözüm koleksiyonumuzun bir kısmını satmak olmuş gibi görünüyor."
 dubois.3011.f: "\"Hayır, lütfen küçük Umuduma bir şey yapmayın. Onun hiçbir suçu yok! Parayı bulmak için her şeyi yapacağım! Ne olur ona zarar vermeyin. O sadece masum küçük bir örümcek!\""
 dubois.3011.g: "[SCOPE.sCharacter('dubois_naturalist_scope').GetSheHe|U] ne yaptı?!"
