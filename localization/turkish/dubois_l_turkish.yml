 dubois.1019.t: "Meyerkat Kafesi"
 dubois.1019.d: "The Meerkat Eclosure was dominated by rocks with caves in them. Immediately you noticed many of the little animals standing an running around."
 dubois.1019.f1: "\"Meyerkatlar, son derece organize olmuş sosyal yapılarıyla dikkat çekerler,\" diyor bakıcı. \"Her grup üyesi, bir 'çete' ya da 'gang' olarak bilinir ve yırtıcılara karşı diğerleri beslenirken ya da dinlenirken nöbet tutar. İletişimleri keskin ve nettir; farklı sesler tehdit seviyelerini bildirir. Bu sürekli dikkat ve işbirliği, hayatta kalmalarının anahtarıdır.\""
 dubois.1019.f2: "\"Meyerkatlar mükemmel kazıcılardır,\" diyor bakıcı. \"Sadece birkaç dakika içinde birkaç fit derinliğe kazabilirler, bu da onlara böcekler, küçük sürüngenler ve kökler gibi yiyecekler bulmak için gereklidir. Bu kazma davranışı, aynı zamanda karmaşık yuva sistemlerini oluşturmakta da önemli bir rol oynar. Bu yer altı ağları, yırtıcılardan ve aşırı hava koşullarından korunmalarını sağlar.\""
 dubois.1019.f3: "\"Meyerkatlar geniş bir vokalizasyon yelpazesine sahiptir,\" diyor bakıcı. \"Sesleri, hareketlerini koordine etmek için alarm çağrılarından, grup içinde iletişim kurmak için daha yumuşak çağrılara kadar her şeyi içerir. Bir üye yiyecek bulduğunda, genellikle diğerlerine keşfini paylaşmak için çağrıda bulunur, bu da toplumlarının topluluk doğasını vurgular. Bu vokal iletişimler, hayatta kalmaları için çok önemlidir ve onların bağlantılı ve koordine kalmalarına yardımcı olur.\""
