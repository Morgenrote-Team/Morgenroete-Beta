 dubois.1022.t: "Dev Panda Bölmesi"
 dubois.1022.d: "#o Dev Panda#! için hazırlanmış bu barınak, gölgeli bir pagoda ve bambu koruluklarıyla, hayvanın ılıman dağ ormanlarını anımsatacak şekilde tasarlanmıştır."
 dubois.1022.f1: "Bambu altında, minik yavrusuyla birlikte bir anne panda hüküm sürmekte. Dev Pandaların üremesi meşhur şekilde kıttır; dişi yılda yalnızca çok kısa bir süre kızgınlığa girer ve yeni doğan yavru—çoğu zaman iki yüz gramdan biraz fazla—kör ve çaresiz doğar. Bu yüzden annelik ilgisi olağanüstü derecede güçlüdür; yavru yeterli güç ve uyum kazanana dek emzirilir ve korunur."
 dubois.1022.f2: "Oyun, boş gibi görünse de açık bir faydaya sahiptir. Genç pandalar güreşir ve yuvarlanır; bu hem uzuvları güçlendirir, hem dengesiz zeminlerde dengeyi öğretir, hem de türlerinin temel görgülerini tekrarlar. Hatta yetişkin hayvanlar bile zaman zaman oyun oynar; bu da egzersizin hem vahşi doğada hem de hayvanat bahçesinde sağlığa ne kadar katkı sağladığını hatırlatır."
 dubois.1022.f3: "Dev Panda, diyetinin neredeyse tamamı bambudan oluşan benzersiz bir ayı türüdür. Azı dişleri lifli sürgünleri ezmeye uygundur ve olağanüstü bir radyal sesamoid—sözde sahte başparmak—sapları kavramasına yardımcı olur. Yetersiz besin değerini telafi edebilmek için uzun süre beslenmek ve enerjisini ağır, dikkatli adımlarla korumak zorundadır."
 dubois.1022.k: "Asya Bölmelerine Geri Dön"
 zoo_asian_enclosures_tt: "Hayvanat Bahçesinin Asya Bölmelerine geri döneceksiniz."
 dubois.1023.t: "Orangutan Bölmesi"
 dubois.1023.d: "Malay dilinde orang-utan, 'orman adamı' anlamına gelir. Burada bu #o Borneo Orangutanları#! yüksek yürüyüş yolları, ağlar ve bol ağaç gövdeleriyle, dallar arasında geçen yaşamlarına uygun bir çevreden yararlanır."
 dubois.1023.f1: "Orangutan, insansı maymunların en ağaçsılıdır. Olağanüstü kol açıklığı ve son derece esnek el ve ayaklarıyla göğüsleme (brachiation) ve dikkatli tırmanış sayesinde ağaç tepelerinde yol alır. Her akşam kıvrılmış dallardan düzenli bir uyku platformu yapar; bu alışkanlık hem özgür yaşamda hem de iyi bakılan tutsaklıkta gözlemlenir."
 dubois.1023.f2: "Anne-yavru bağı uzun ve örnek niteliğindedir. Bir yavru, annesiyle yıllarca kalır; yuva yapmayı, meyve seçmeyi ve dikkatli seyahati öğrenir. Bu sabır ve öğretim, yüksek zekâyı ve yalnız orman yaşamına uygun bir sosyal düzeni işaret eder."
 dubois.1023.f3: "Erişkin erkekler, özellikle yüz yanak çıkıntıları gelişmiş olanlar, uzak mesafelere ulaşan uzun ve yankılı sesler çıkarır. Bu çağrılar varlığı duyurur, rakipleri caydırır ve bireylerin yoğun ormanda birbirinden uzaklaşmasına yardımcı olur."
 dubois.1024.t: "Kaplan Bölmesi"
 dubois.1024.d: "Başta padok boş görünür; ardından gölgelerden güneşe doğru, bir #o Bengal Kaplanı#! ağırbaşlı bir ustalıkla ilerler, çizgili postu sanki ustaca yapılmış bir hileyle silueti eritir."
 dubois.1024.f1: "Bengal Kaplanı, Asya kedigillerinin en görkemlisidir. Yalnız yaşayan ve bölgeci olan bu hayvan, çoğunlukla pusu kurarak avlanır; güçlü ön gövdesine, geri çekilebilir pençelerine ve kısa mesafede ani atılışına güvenir. Meşhur postu—kızılımsı zemin üzerindeki çizgiler—kamışlıklar ve orman gölgeleri arasında silueti parçalar."
 dubois.1024.f2: "Dişi kaplan uyanık bir annedir. Kısa bir gebelikten sonra tenha bir mağaraya çekilir ve iki ila dört yavru doğurur. Zamanla onları ete, koku ve iz sürmeye, sabır, ihtiyat ve kesin sıçrayış gibi vazgeçilmez derslere alıştırır."
 dubois.1024.f3: "Kaplanın sesi öksürükler, iniltiler ve alacakaranlıkta bölgesini ilan eden yankılı kükremeyi içerir. Bu sesler gereksiz çatışmaları azaltır ve mevsimi geldiğinde, güçlü bir eşin varlığını duyurur."
 dubois.1025.t: "Malay Tapiri Bölmesi"
 dubois.1025.d: "#o Malay Tapiri#! için hazırlanmış bu gölgeli alan, doğal yaşamındaki sürekli yeşil ormanları taklit edecek biçimde barınak, otlak ve su sunar."
 dubois.1025.f1: "Malay Tapiri, koyu siyah-beyaz postuyla ayırt edilir; bu desen, kırık ışıkta hayvanın siluetini gizler. Çoğunlukla gece aktiftir; kavrayıcı hortumuyla sürgün ve yaprakları yer ve hem serinlemek hem de kaçış için sıkça suya girer."
 dubois.1025.f2: "Uzun bir gebelikten sonra dişi tek bir yavru doğurur; yavrunun postu şeritler ve beneklerle süslenmiştir—bu yavruya geçici bir kamuflaj sağlar ve yaşla birlikte kaybolur. Anne, yavrusunu yumuşak ama kararlı bir şekilde yönlendirir; güvenli patikalardan otlaklara ve suya götürür."
 dubois.1025.f3: "Tapirler ince ıslıklar ve alçak homurtularla iletişim kurar. Bu sesler sık çalılıklar arasında temas, kur yapma ve muhtemelen orman içindeki yalnız dolaşmalarını sessizce düzenleme işlevi görür."
 dubois.1026.t: "Komodo Ejderi Bölmesi"
 dubois.1026.d: "Bu sıcak ve kayalık alanda birkaç #o Komodo Ejderi#! ağır adımlarla devriye gezer ya da güneşlenir, dilleri havayı yoklar."
 dubois.1026.f1: "Yaşayan en büyük kertenkele olan Komodo Ejderi, güçlü bir pusu avcısı ve leş bulucusudur. Testere gibi dişleri ve güçlü boynu derin yaralar açar; zehirli salgılar ve enfeksiyonla desteklenen bu darbeler, güçlü avları bile kısa bir kovalamacadan sonra alt edebilir."
 dubois.1026.f2: "Sert adalara uyum sağlamış olan tür, kanaatkârlık ve sabırla yaşar. Görme ve koku alma duyuları son derece gelişmiştir; uzaklardaki bir leşi şaşırtıcı bir kesinlikle bulabilir. Tavır ve görünüşüyle hayvana ilkel çağlardan kalma bir hava sinmiştir."
 dubois.1026.f3: "Üstünlüğü gösterme davranışları arasında boğaz şişirme, baş sallama ve tıslama bulunur. Bu tür gösteriler, etkileyici olmalarına rağmen tarafları yıpratıcı bir dövüşten korur ve leş ya da güneşlenme alanında üstünlüğü belirlemeye yeter."
 dubois.1027.t: "Kar Leoparı Bölmesi"
 dubois.1027.d: "Kayalıklar ve çıkıntılardan oluşan bu alan, doğal yaşam alanı Asya’nın soğuk dağ zirveleri olan #o Kar Leoparı#!na uygundur."
 dubois.1027.f1: "Kar Leoparı dağlık ülke için kusursuz biçimde yaratılmıştır: geniş tüylü ayakları tutunmaya yarar, uzun kuyruğu denge ve sıcaklık sağlar, soluk benekli postu ise taş yığınları ve karla bütünleşir. Sessiz ve esnek bir zarafetle hareket eder; başka hayvanları acze düşüren arazileri kolayca aşar."
 dubois.1027.f2: "Beslenmesi çoğunlukla yabani koyun ve keçilerden oluşur; fırsat buldukça da dağ sıçanı ve tavşan avlar. Yalnız yaşar, geniş alanları dolaşır ve en çok alacakaranlıkta aktiftir."
 dubois.1027.f3: "Çiftleşme döneminde, alçak miyavlamalar ve başka hafif sesler yakınlık ve niyeti duyurur. Bu sesler, aslanın kükremesiyle kıyaslandığında mütevazıdır; ama ince dağ havasında eşleri kayalık arazide birbirine ulaştırmaya yeter."
 dubois.1028.t: "Asya Çitası Bölmesi"
 dubois.1028.d: "Bu geniş, açık koşu alanı, bir zamanlar #o Asya Çitası#!nın çok daha yaygın olduğu Orta Doğu’nun yalın bozkırlarını hatırlatır."
 dubois.1028.f1: "Asya Çitası hızın simgesidir. İnce yapısı, derin göğsü, uzun bacakları ve tutunmaya yarayan yarı geri çekilebilir pençeleri sayesinde, dört ayaklılar arasında eşsiz bir hız patlaması yaşar. Ne yazık ki bugün yalnızca bir kalıntı nüfusa indirgenmiştir ve ciddi koruma altına alınması gerekir."
 dubois.1028.f2: "Avcılık sanatı gizlilik, ani sprint ve ayağı kaydıran darbe üzerine kuruludur. Göz altındaki koyu çizgiler parlamayı azaltır; esnek omurgası ise olağanüstü adımlar atmasına yardım eder. Ceylanlar ve diğer küçük antiloplar başlıca avlarıdır."
 dubois.1028.f3: "Erkekler düşük perdeli, titreşimli sesler çıkararak hâkimiyetlerini ve uygunluklarını ilan eder; bu sesler rakipler arasındaki çatışmaları azaltır ve eş adaylarını yönlendirir. Esaret altında yapılan titiz gözlemler, bu seslerin türün refahı için faydalı olduğunu kanıtlamıştır."
