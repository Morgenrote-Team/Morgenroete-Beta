 dubois.1012.t: "Su Aygırı Bölmesi"
 dubois.1012.d: "The #o Hippopotamus#! Enclosure harbors a bunch of these huge creatures. Thankfully, they are separated from the visitors by a big moat."
 dubois.1012.f1: "Su aygırları, bölmelerindeki suda süzülüyordu. Çok fazla hareket yoktu. Acaba hiç hareket ederler mi diye düşünürken bir bakıcı yanınızda belirdi.\n\n\"Su aygırlarının gündüzleri genellikle böylece suda süzülmeleri çok ilginçtir. Ama alacakaranlıktan sonra çok aktifleşirler ve otlamaya başlarlar. Onların doğal yaşam alanlarındaki sıcaklık göz önüne alındığında bu çok açıktır. Su, onları gündüzleri serin tutar ve akşamları dolaşmaya başlayabilirler.\""
 dubois.1012.f2: "Birden bir su aygırı sudan çıktı. Birkaç dakikadır bölmeyi izliyor olmanıza rağmen bunu daha önce görmemiştiniz. Uzun süredir suyun altında olmalıydı.\n\nYanınızdaki biri konuşmaya başladı: \"İnanılmaz değil mi? Bu su aygırları beş dakika boyunca su altında kalabiliyor. Daldıklarında burun delikleri ve kulakları kapanıyor, böylece su giremiyor.\""
 dubois.1012.f3: "One of the Hippopotami opened its huge mouth and showed its long, curved teeth. Then it started grunting and splashing.\n\nYou once read that male Hippos do this to warn off rivals, as they are very protective of their territory. Male Hippos use their feces to mark specific points in their territory as well. Sometimes they even stare at other male hippos as a form of dominance."
 dubois.1012.k: "Afrika Bölmelerine Dön"
 zoo_african_enclosures_tt: "Hayvanat Bahçesi’nin Afrika Bölmelerine döneceksiniz."
 dubois.1013.t: "Afrika Aslanı Bölmesi"
 dubois.1013.d: "Bu bölmede bir grup #o Afrika Aslanı#! gözlemlenebilir; gölge sağlayan ağaçlar ve sığ bir havuz, türün alışkanlıklarına uygun şekilde düzenlenmiştir."
 dubois.1013.f1: "Ailesinin ortasında uzanan yetişkin erkek, koyu renkli görkemli yelesini sergiler—yaş ve güçle artan bir süs. Doğabilimciler yelenin iki işlevi olduğunu belirtir: birincisi, taşıyıcısının sağlığını ve statüsünü ilan eden bir cinsel seçilim aracı; ikincisi ise rakiplerle dövüşte boğaz ve boynu koruyan bir savunma yelesi. Daha serin iklimlerde ve özellikle Afrika’dan uzaktaki hayvanat bahçelerinde yele daha uzun ve gür çıkar, bazen 16 cm’den fazla uzunluğa ulaşır; bu olgu, sıcaklık ve bünyeyle bağlantılıdır."
 dubois.1013.f2: "Afrika aslanları, ‘pride’ denen sosyal topluluklarda yaşar; bunlar genellikle akraba dişiler ve yavrularından oluşur ve bir ya da birkaç yetişkin erkek geçici olarak bu gruplara katılır. Dişiler, doğdukları grupta kalarak çoğu avlanmayı ve yiyecek bulmayı üstlenir; birlikte çalışmaları, büyük otçullar üzerinde kayda değer başarı sağlar. Erkekler ise grubu ve bölgeyi savunur; büyük bir avı indirdiklerinde yetişkin bir erkek tek öğünde 40 kilogram et tüketebilir."
 dubois.1013.f3: "Aslanın ölçülü adımlarla gezinmesi—dikkatli ziyaretçilerin sık sık gözlemlediği bir davranış—bir nöbetçinin devriyesine benzetilebilir; çünkü bu, hayvanın doğal eğilimini, sınırları devriye gezmesini, kokuları incelemesini ve alacakaranlık saatlerinde nöbet tutmasını yansıtır. Doğada, bölge; kükremeyle, idrar ve salgılarla koku bırakılarak ve tanıdık yolların ve işaretlerin incelenmesiyle korunur; tutsaklıkta ise bu atalarından gelen dürtüler, bölmede düzenli devriyelere dönüşür."
 dubois.1013.f4: "Hayvanat bahçesinde [SCOPE.sCharacter('dubois_prinz_eugen').GetFullName], yaşlı aslanı her gün ziyaret ederdi; sanki savaşçı ile hayvan birbirlerinde zorluklar ve zaferlerle dolu bir geçmişi tanıyordu. Adam üç gün boyunca görünmeyince, aslan yemek yemeyi reddetti ve huzursuz bir şekilde dolaştı. Üçüncü günün sabahında aslan muazzam bir kükreme salıverdi; aynı anda şapelin çanı, büyük General [SCOPE.sCharacter('dubois_prinz_eugen').GetLastName]’in ölümünü ilan ediyordu. Böylesi tesadüfler, bilimsel kanıt olmasa da, en savaşçı kalpleri bile etkiler."
 dubois.1014.t: "Afrika Çalı Fili Bölmesi"
 dubois.1014.d: "Bu geniş padokta #o Afrika Çalı Filleri#! dinlenir. Büyüklükleri ve zekâları, onları Bahçelerin en önemli cazibelerinden biri yapar."
 dubois.1014.f1: "İşte matriark—ailesinin en tecrübeli üyesi—etrafında sürü düzenlenir. Fil toplumu açıkça anaerkildir: yetişkin dişiler kızları ve kız kardeşleriyle birlikte kalır, su ve yiyecek arayışını yönetir ve yavrulara dikkatle özen gösterir. Doğabilimciler, arkadaşlarını kaybettiklerinde yas tuttuklarını ve hatırlama belirtileri gösterdiklerini kaydetmiştir; bu, hayvanın olağanüstü hafızasına ve sosyal duygusuna tanıklık eder."
 dubois.1014.f2: "Kulağa çok güçlü gelen boru sesi, filin geniş ses repertuvarının yalnızca bir parçasıdır. Bu gür seslerin ve boğuk homurtuların yanı sıra, tür insan kulağının eşiğinin altındaki infrasesleri de çıkarır; bu sesler havada ve yerde büyük mesafeler kat eder. Sürü bu sayede yürüyüşlerini koordine eder, yardım çağırır ve savanada varlıklarını duyurur."
 dubois.1014.f3: "Olağanüstü hortum—burun ve üst dudağın birleşimi—on binlerce kastan oluştuğu söylenen, en hassas hareketleri yapabilen mucizevi bir organdır. Dişler aslında sürekli uzayan kesici dişlerdir; kazmada, kabuk soymada ve savunmada kullanılır. Filler, yerleri ve kişileri uzun süre hatırlayabilir; yıllar önce ziyaret edilen su kaynaklarını yanılmadan bulurlar ve bireyleri koku ve görünümden uzun aralardan sonra bile ayırt edebilirler."
 dubois.1015.t: "Zürafa Bölmesi"
 dubois.1015.d: "#o Zürafalar#! uzaktan bile görülebiliyor; doğanın uygun gördüğü gibi uzun boyunlarını yüksek dallara uzatıyorlar."
 dubois.1015.f1: "Maviye çalan dili, yaklaşık yarım arşın (25–30 cm) uzunluğunda olup dikenli dalları yakalamak için mükemmel şekilde uyum sağlamıştır. Zürafa, akasyaların yapraklarını dikenlerden ustalıkla ayırarak incelikle koparır ve bir günde neredeyse otuz kilo yaprak tüketebilir. Öyle ki, bu beslenme sayesinde zürafanın pek nadiren su içmek için eğilmesi gerekir."
 dubois.1015.f2: "Erkekler üstünlük için rekabet ettiklerinde ‘boyun dövüşü’ denen ilginç bir davranışa girerler; başlarını sarkaç gibi sallayıp rakiplerinin böğrüne vururlar. Yıllar geçtikçe kafatasındaki çıkıntılar (ossikonlar) daha da sertleşir ve uçları çıplak hale gelir; bu, yaşın ve rütbenin göstergesidir. Zürafalar genellikle gevşek topluluklar halinde dolaşır; bu toplulukların bileşimi ovada gezerken değişir, ancak yavrulu inekler birlikte kalır."
 dubois.1015.f3: "Zürafanın postu, açık bir zemin üzerindeki mozaik gibi yamalarla kaplıdır; bu, hem kırık ışıklar arasında kamuflaj sağlar hem de her bir desenin altında bolca damar bulunduğundan ısı düzenlemesinde rol oynadığı düşünülür. Zürafanın devasa kalbi ve güçlü atardamarları, yerçekimine karşı uzun boynunu besler; buna rağmen hayvan, görkemli boyuna rağmen zarif bir şekilde hareket eder."
 dubois.1016.t: "Afrika Pengueni Bölmesi"
 dubois.1016.d: "Bazı #o Afrika Penguenleri#! suda eğlenirken, diğerleri kıyıda topluca durup tüylerini özenle temizlemektedir."
 dubois.1016.f1: "Bu tür (Spheniscus demersus), eşek anırtısını andıran sesinden dolayı ‘eşek pengueni’ diye bilinir; Namibya ve Cape başta olmak üzere Güney Afrika’nın ılıman kıyılarında yaşar. Antarktika’daki akrabalarının aksine, ılıman denizlerde gayet iyi yaşar; ters renkli tüyleri onları hem yukarıdan hem de aşağıdan gelen düşmanlara karşı korur. Başlıca küçük balıklar ve kafadanbacaklılarla beslenir, dalgaların altında son derece çevik bir şekilde avlarını kovalar."
 dubois.1016.f2: "Afrika penguenleri genellikle eski guano (kuş pisliği) yığınlarında yuva kazar; burada yumurtlar ve yavrularını büyütürler. Ebeveynler kuluçka ve yiyecek bulma görevini dönüşümlü olarak üstlenir. Kuluçkada çoğunlukla iki yumurta bulunur. İnsanlar guanoyu temizlediğinde uygun yuvalama alanları azalır; umulur ki bilinçli koruma çalışmaları zamanla bu zararı telafi edecektir."
 dubois.1016.f3: "Tüyleri olağanüstü yoğun ve yağlıdır; bu da hem yalıtım hem de su geçirmezlik sağlar. Suda çok hızlı yüzerler ve sertleşmiş kanatçıklarıyla kuyruğunu dümen gibi kullanarak hayranlık uyandıran bir doğrulukla yön değiştirirler. Karada ise sosyal canlılardır; kalabalık kolonilerde her biri kendi ses repertuvarıyla iletişim kurar, bu karmaşa içinde birbirlerini ayırt ederler."
 dubois.1017.t: "Çıplak Körfare Bölmesi"
 dubois.1017.d: "Bu kemirgenler yaşamlarının çoğunu yeraltında geçirdiğinden, bölme toprak bir tümsek gibi düzenlenmiştir; içindeki camlı geçitler, meraklı gözlere odalarını ve tünellerini gösterir."
 dubois.1017.f1: "Çıplak Körfare (Heterocephalus glaber), memeliler arasında eşsizdir; tüysüz derisi, sıcaklığa uyum sağlayan yapısı ve oksijeni az havaya olağanüstü dayanıklılığıyla derin, havasız tünellerde yaşamaya mükemmel şekilde uygundur. Kapanan dudaklarının önünde çalışan devasa kesici dişleriyle toprağı kazarken, dudaklar dişlerin arkasında mühürlenir ve tozun içeri girmesini engeller. Zayıf görünüşlü olmasına rağmen inanılmaz çalışkandır; uzun koridorlar ve geniş depo odaları yapar."
 dubois.1017.f2: "Bu tür, nadir bir ‘öte-sosyal’ düzen sergiler: yalnızca tek bir üreyen ‘kraliçe’, ona eşlik eden erkekler ve onların altında çok sayıda kısır işçi ve asker bulunur. İşçiler tünelleri genişletir, yiyecek getirir ve yavrulara bakar; askerler ise yılanlar ve diğer davetsiz misafirlere karşı topluluğu savunur. Bu tür bir organizasyon genellikle böceklerde görülür ve doğabilimcilere düşünmek için pek çok malzeme sunar."
 dubois.1017.f3: "Sıcak yuvalarında hayvanlar birbirine sokulur, vücut ısısını paylaşır ve sık sık tımar ederek yakınlık kurarlar. Sesleri küçük olsa da çeşitlidir; bu sayede kolonideki üyeler arasında tanışıklık ve iletişim sürer. Bu küçük canlı, alışılmadık derecede uzun ömürlüdür ve bazı hastalıklara karşı dikkat çekici bir direnç gösterir; bu da hem hekimlerin hem de zoologların ilgisini uyandırmıştır."
 dubois.1018.t: "Ovalar Zebrası Bölmesi"
 dubois.1018.d: "Bu düz çimenlik padok, serpiştirilmiş gölgelikleriyle, Afrika savanasının minyatür bir hâlidir; burada #o Ovalar Zebrası#! kendini evinde hisseder."
 dubois.1018.f1: "Zebranın siyah-beyaz cesur desenleri bizim gözümüze çok belirgin görünse de, savananın ışık-gölge oyununda hem sinekleri hem de yırtıcıları yanıltır. Her bireyin deseni bir imza gibi eşsizdir. Bu atgiller genellikle ‘harem’ denen aile gruplarında yaşar: bir aygır, birkaç kısrak ve yavruları. Grup üyeleri, birbirlerini tımar ederek ve yırtıcılara karşı uyanık durarak düzeni korur."
 dubois.1018.f2: "Erkekler arasındaki hâkimiyet, resmî gösterilerle belirlenir—kulakları geriye yatırmak, boynu yay gibi germek, ön ayaklarla yere vurmak—ve bazen de ısırma ve hızlı tekmelerle. İletişimleri; anırma, homurtu ve yüksek kişnemeleri içerir; ayrıca kulak ve kuyruk diliyle çok şey anlatırlar. Genç erkekler, ‘bekâr grupları’ halinde ayrı takılır, ta ki kısraklar için mücadele edene kadar."
 dubois.1018.f3: "Zebra yavrusu doğar doğmaz gelişkindir; doğumdan bir saat içinde ayağa kalkar ve koşar, çünkü açık ovada güvenlik hızda yatar. Yavru, annesinin kokusunu ve desenini hafızasına kazır ve anne ona büyük bir şefkatle bakar. Zamanla, sürünün geleneklerini öğrenir—nerede otlanacağını, ne zaman yolculuğa çıkılacağını ve yoldaşlarının çok sayıdaki gözünden nasıl faydalanacağını."
