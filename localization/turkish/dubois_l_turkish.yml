 dubois.1032.t: "Deniz Kaplumbağası Bölümü"
 dubois.1032.d: "#o Deniz Kaplumbağası#! pavyonu, berrak suyla dolu geniş bir havuzdan ve etrafını saran küçük kumlu plajlardan oluşur. Su seviyesinin altındaki camlı bir açıklık, meraklılara hayvanları kendi doğal ortamlarında gözlemleme imkânı tanır."
 dubois.1032.f1: "Yeşil Deniz Kaplumbağası (Chelonia mydas) hayranlık uyandıran bir tasarıma sahiptir. Zeytin kabuğu ve güçlü yüzgeçleriyle tropikal ve subtropikal denizlerde yol alır, olağanüstü uzun göçler yapar ve sahilleri asla şaşmadan hatırlar. Sakin görünümü, okyanusun enginliğine uygun bir dayanıklılığı gizler."
 dubois.1032.f2: "Üreme döngüsü büyük bir ciddiyetle yürütülür. Çiftleşmeden sonra dişi, gece vakti uygun bir kumsala çıkar, sabırla bir yuva kazıp yumurtalarını bırakır ve üzerini kumla örter. Zamanı geldiğinde yavrular, hem içgüdü hem de gökyüzü ışığının rehberliğinde hızla denize yönelir ve tehlikelerle dolu hayatlarına başlar."
 dubois.1032.f3: "Doğanın düzeninde Yeşil Deniz Kaplumbağası boş bir süs değildir. Deniz çayırlarını tüketerek sualtı çayırlarını yeniler, zaman zaman denizanalarını avlayarak dengeyi sağlar. Böylece hem otlakları hem de açık denizleri aşırılıktan korur."
 dubois.1032.k: "Avustralya ve Okyanusya Bölümlerine Geri Dön"
 zoo_australian_enclosures_tt: "Hayvanat Bahçesi’nin Avustralya ve Okyanusya Bölümlerine geri döneceksin."
 dubois.1033.t: "Manta Vatozu Bölümü"
 dubois.1033.d: "Büyük bir akvaryumda birkaç #o Manta Vatozu#! barınır; camlı bir tünel ziyaretçiye bu nazik devleri ağırbaşlı bir zarafetle süzülürken görme imkânı verir."
 dubois.1033.f1: "Dev Okyanus Manta Vatozu (Mobula, genelde Manta olarak anılır), vatozların en asilidir. Rombik gövdesi ve devasa göğüs yüzgeçleriyle suyu bir uçurtma gibi yarar; bazıları altı metreden fazla kanat genişliğine ulaşır. Huzurlu alışkanlıkları vardır, diyeti ise en küçük pelajik canlılardan oluşur."
 dubois.1033.f2: "Güneşli denizlerin sadık temizleyicileri olan Manta’lar, sayısız planktonu hassas solungaç süzgeçleriyle filtreler, böylece bu küçük canlıların fazlalığını dengeler. Uygun bölgelerde, küçük balıkların ciltlerini temizlemesine izin verirler—doğada sık rastlanan karşılıklı faydaya dayalı bir düzen."
 dubois.1033.f3: "Doğa bilimciler bu vatozlarda sosyal eğilimler gözlemlemiştir: düzenli daireler çizmek, iyi bilinen beslenme alanlarına tekrar tekrar dönmek ve hatta ölçülü dönüşlerle yapılan ilkel bir kur davranışı. Bu gözlemler, kayda değer bir hafıza ve sürekliliği işaret eder."
 dubois.1034.t: "Koala Bölümü"
 dubois.1034.d: "Gölgeli ve korunaklı olacak şekilde dikilmiş okaliptüs ağaçları, #o Koala#!ya kendi doğal yuvasına benzer bir sahne sunar."
 dubois.1034.f1: "Koala (Phascolarctos cinereus) alışkanlık olarak ağaçsı ve hareketsizdir. Tutucu elleri ve karşıt başparmaklarıyla okaliptüs ağaçlarına tırmanır ve dallarda yaşar; neredeyse tamamen onların yapraklarıyla beslenir. Yavaş nabzı ve ölçülü nefesi, kıt besine uyum sağlamış bir düzeni gösterir."
 dubois.1034.f2: "Anneliği örnek teşkil eder. Doğduğunda son derece küçük ve gelişmemiş olan yavru, annenin kesesine girerek büyür. Zamanla anne onu türün kendine özgü diyetine alıştırır; ardından sırtında taşıyarak ağaçların yerlerini ve kurallarını öğretir."
 dubois.1034.f3: "Sessizliği konuşmaya tercih etse de, tür düşük homurtular ve boğuk sesler çıkarır—özellikle erkekler, bölgelerini ve çiftleşme mevsimini ilan etmek için. Bu beklenmedik derinlikteki sesler, korulukların sessizliğinde uzaklara kadar yayılır."
 dubois.1035.t: "Kanguru Bölümü"
 dubois.1035.d: "Uzun otların ve dağınık kızıl kayaların bulunduğu bozkır benzeri bir alan #o Kangurular#! için ayrılmıştır; burada onların eşsiz hareket tarzını dilediğin gibi inceleyebilirsin."
 dubois.1035.f1: "Kızıl Kanguru (Osphranter rufus), sıçrayarak hareket etmenin harikasıdır. Arka bacaklarının esnek tendonları ve güçlü kuyruğu, dikkate değer hızlarda sürekli sıçramalar yapmasını sağlar; topluca hareket eden bir grubun manzarası, doğanın mekanik düzenine dair bir ders gibidir."
 dubois.1035.f2: "Kanguruların annelik bakımı özellikle dikkat çekicidir. Minik yavru, neredeyse canlı bir hücreden ibaretken, kendi başına annenin kesesine ulaşır ve orada gelişimini tamamlar. Doğa bilimciler, annenin ardışık yavrulara olağanüstü bir doğa tasarrufuyla bakabildiğini kaydetmiştir."
 dubois.1035.f3: "Toplumsal düzen, tavır ve işaretlerle korunur: tehlike anında ayağın yere vurulması, çekişmede tıslamalar ve düşük homurtular, erkekler arasındaki resmi gösteriler. Böylece fazla şiddete gerek kalmadan rütbe ve hak iddia edilir."
 dubois.1036.t: "Ornitorenk Bölümü"
 dubois.1036.d: "Gölgeli kıyıları olan berrak ve serin bir dere #o Ornitorenk#! için sahneyi oluşturur; bu hayvan zamanının çoğunu ya suda ya da yuvasında geçirir."
 dubois.1036.f1: "Ornitorenk (Ornithorhynchus anatinus) bir monotremdir—yumurtlayan bir memeli. İlk keşfiyle bilim dünyasını şaşkına çevirmiştir. Yumuşak gagası, perdeli ayakları ve yoğun kürküyle dere yaşamına kusursuzca uyum sağlamıştır; erkeğin arka ayağında zehirli bir mahmuz bulunur, dikkat edilmelidir."
 dubois.1036.f2: "Ev düzeni merak uyandırıcıdır. Dişi bir yuva kazıp yapraklarla döşer ve birkaç yumurta bırakır. Kör ve çıplak doğan yavrular, meme olmadığı için annenin derisinden salgılanan sütle beslenir; kendileri yiyecek bulabilecek hale gelene kadar böyle büyürler."
 dubois.1036.f3: "Her ne kadar pek ses çıkarmasa da Ornitorenk, işaret ve koku ile varlığını belli eder; özellikle mevsiminde erkekler bölgelerini azimle korur. Yaptıkları dalışlar ve dipte böcek larvaları aramaları, çalışkanlığın hoş bir gösterisini sunar."
 dubois.1036.f4: "#o Platypus Perry Misplaced from the Gardens#!\nA brief commotion attended the discovery that one of our Platypi—styled Perry—could not be readily found within his retreat. The keepers, Messrs. Phineas Flynn and Ferb Fletcher, counsel patience: 'Our Perry is wont to conceal himself where none would look, and invariably reappears before the day is out.'\n\n#o Man of Science Preserved from a Laboratory Mishap#!\nDr. Heinz Doofenshmirtz narrowly escaped injury when an experiment issued in an explosion. By fortune—or timely intervention from an unknown benefactor—the savant sustained no lasting harm."
 dubois.1032.g: "Bir Ornitorenk mi? Perry the Platypus!"
 dubois_unknown_hero_modifier: "Bilinmeyen Kahraman"
 dubois.1037.t: "Kasuar (Cassowary) Bölümü"
 dubois.1037.d: "Yağmur ormanına benzeyecek şekilde tasarlanmış yoğun bitkili bir alan, meşhur 'bahçıvan' kuşlar olan #o Güney Kasuarları#!na ev sahipliği yapar."
 dubois.1037.f1: "Güney Kasuarı (Casuarius casuarius), kara tüyleri ve kobalt mavisi derisiyle belirginleşen, başındaki boynuz benzeri ibiğiyle dikkat çeken büyük, uçamayan bir kuştur. Mükemmel bir meyve yiyicidir; birçok orman tohumunu sindirmeden dağıtır ve böylece ormanın yenilenmesine büyük katkıda bulunur."
 dubois.1037.f2: "Görevi hâlâ tartışılan ibik, yoğun bitki örtüsünü yarıp geçmeye veya ses iletimine yardımcı olabilir. Bacakları güçlüdür, ölümcül iç pençeyle donanmıştır; kuş bunları saldırıdan çok kararlılık için kullanır, fakat yine de dikkatli olmak gerekir."
 dubois.1037.f3: "Evcil düzenlerinde cinsiyetler görevleri eşit paylaşmaz. Çoğunlukla erkek kuluçkaya yatar ve çizgili civcivleri korur, dişi ise özgürlüğüne geri döner. Bu düzen, kuşlarda nadir olsa da bu grupta sabittir."
 dubois.1038.t: "Yeni Zelanda Deniz Aslanı Bölümü"
 dubois.1038.d: "Kayalar ve çıkıntılarla çevrili geniş bir havuz, #o Yeni Zelanda Deniz Aslanları#!na hem güneşlenme hem de dalış alanı sağlar; su altı manzarası şüphesiz gelecek nesilleri büyüleyecektir."
 dubois.1038.f1: "Yeni Zelanda Deniz Aslanı (Phocarctos hookeri), doğası gereği güney adalarıyla sınırlıdır; sağlam yapılı, sempatik tavırlı bir pinnipeddir. Suda zarif bir canlıdır; karada ise sosyal ve kolonisine sadıktır."
 dubois.1038.f2: "Akıcı gövdesi ve güçlü ön yüzgeçleriyle dalgaların altında balık ve kafadanbacaklıların peşinden gider. Yarı karanlığa uyumlu büyük gözleri, ışığın kıt olduğu yerde avı yakalamasına yardım eder."
 dubois.1038.f3: "Üreme mevsiminde boğalar, kayaların üzerinde derin kükremeler ve gösterişli duruşlarla hâkimiyetlerini ilan eder; bu gösteriler çoğunlukla üstünlük sırasını belirlemeye ve dişilerin dikkatini çekmeye yeter. Böylece kolonide sürekli kavga olmadan düzen korunur."
