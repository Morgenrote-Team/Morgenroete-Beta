 dubois.2171.f: "Bazı iskeletler dünya genelinde bulunabilir. Çoğu deniz dinozorları veya denizlerin diğer canlılarıydı."
 dubois.2171.g: "Mosasaurus."
 dubois.2172.t: "Mosasaurus"
 dubois.2172.f: "Mosasaurus aslında bir dinozor değil, bir deniz sürüngenidir. Kretase döneminde okyanuslarda yaşamışlardır. Mosasaurus'un farklı bölgelerde adapte olmuş birçok türü vardır. Çoğu apex yırtıcılarıydı ve balık, köpekbalığı ve diğer dinozorlar ile deniz sürüngenlerini avlamışlardır."
