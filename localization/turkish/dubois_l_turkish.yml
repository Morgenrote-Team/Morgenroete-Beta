 dubois.1210.t: "[ROOT.GetState.GetName] bölgesindeki habitat tehlikede"
 dubois.1210.d: "Giderek büyüyen medeniyetin etkisi, [ROOT.GetState.GetName] bölgesindeki [Concept('concept_dubois_habitat','$concept_dubois_animal_habitat$')] ile çatışıyor. Yerel yaban hayatını bir [concept_dubois_nature_reserve] kurarak korumazsak hayvanlar yaklaşık 10 yıl içinde yok olacak."
 dubois.1210.f: "Toprağı yiyip bitiren aç makineler. Her geçen gün daha fazla toprak yutan yayılmış şehirler. Çiçek açmış arazileri yaran tren yolları. Hayvanlar her gün krallıklarının biraz daha fazlasını kaybediyor. İnsanlar adım adım içine giriyor."
 dubois.1210.g: "Bu hayvanları korumalıyız!"
 dubois.1210.h: "Her şeyden önce ilerleme!"
 dubois_endangered_habitat_tt: "Bir [concept_dubois_habitat] tehlikeye girdiğinde 10 yıl içinde yok olur. Bunu, eyalette bir [concept_dubois_nature_reserve] kurarak engelleyebilirsin. Böylece [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] türlerini yok olmaktan korursun."
