 dubois_theory_of_evolution_tech: "Evrim Teorisi"
 dubois_theory_of_evolution_tech_desc: "Değişmez biyolojik türler doktrininden kesin kopuş, doğal seçilim yoluyla evrim teorisiyle sağlandı. Darwin, kontrolsüz nüfus artışının kaçınılmaz olarak bir 'var olma mücadelesi'ne yol açacağını, bu süreçte avantajlı varyasyonların korunduğunu ve diğerlerinin elendiğini gözlemledi. Bu mekanizma, canlıların ortak bir atadan çeşitlenmesine akılcı bir açıklama sundu. Bunun sonuçları birçok kişiyi sarstı, zira insanlığın doğada ayrıcalıklı bir konumu olmadığını ima ediyordu."
 dubois_paleontology_tech: "Paleontoloji"
 dubois_paleontology_tech_desc: "Dünyanın kadim tarihi ve soyu tükenmiş organizmalara duyulan ilgi antik çağlara kadar uzansa da, 1800’ler civarında Georges Cuvier’nin karşılaştırmalı anatomi çalışmalarıyla önemli bir dönüm noktasına ulaştı. 'Türlerin Kökeni Üzerine' adlı eserin yayımlanması, özellikle paleontolojide, yaşam bilimlerinde bir dönüm noktası oldu. Sonraki bilimsel tartışmalar, geçiş fosillerini ve jeolojik kayıtlardaki evrimsel süreçlerin kanıtlarını sistematik olarak aramaya yöneltti."
 dubois_genetics_tech: "Genetik"
 dubois_genetics_tech_desc: "Modern genetik, Avusturyalı rahip Gregor Johann Mendel’in titiz deneyleriyle ortaya çıktı. 1900’de Mendel’in çalışmalarının yeniden keşfi, alanda hızlı ilerlemelere yol açtı. 1915’e gelindiğinde Mendelci kalıtım ilkeleri çok çeşitli organizmalarda, özellikle sirke sineği *Drosophila melanogaster* üzerinde açıklığa kavuşmuştu. Aynı zamanda matematikçiler, popülasyon genetiğinin istatistiksel çerçevesini geliştirerek genetik teoriyi daha geniş biyolojik çalışmalarla bütünleştirdi."
 dubois_paleontologist: "Paleontolog"
 dubois_paleontologist_desc: "Fosilleşmiş kalıntıları incelemeye adanmış bir bilgin; tarih öncesi yaşamın kayıp dünyalarını aydınlatır."
 dubois_paleontologist_experienced: "Seçkin Paleontolog"
 dubois_paleontologist_experienced_desc: "Bir dizi dikkate değer kazıyla tanınan bu bilim insanı, dönemin jeoloji toplulukları arasında itibar kazanmıştır."
 dubois_paleontologist_famous: "Ünlü Paleontolog"
 dubois_paleontologist_famous_desc: "Yoğun araştırmalar ve ses getiren keşifleri sayesinde bu paleontolog, eski yaşam konusunda önde gelen bir otorite olarak kabul edilmektedir."
