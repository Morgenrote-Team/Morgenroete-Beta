 dubois.32.f.gorilla.1: "Yüksek dağlık alanların sisle kaplanmış ormanlarında, derin, rezonanslı bir göğüs vuruşu yoğun ormanın içinde yankı yapar—her canlıyı ürperten bir ses. Orada, kadim ağaçlar arasında, gümüş sırtlı goril varlığını belli eder. Gövdeli ve etkileyici, hem koruyucu hem de grubunun hükümdarıdır. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] büyülenmiş bir şekilde, bu büyük maymunun gücüne rağmen zarifçe grubunu yönetişini izler. Doğa araştırmacısı, hayranlık ve görev arasında bölünmüş bir şekilde, ekipmanını hazırlar, bu görkemli canlıyı hayvanat bahçesi için yakalamanın şimdiye kadar yapılacak en zor görev olabileceğini biliyor."
 dubois.32.f.gorilla.2: "Güneş dağların arkasında batmaya başlarken, orman doğanın sesleriyle canlanır. Yoğun ağaçların arasından, bir goril ailesi ortaya çıkar, hareketleri kasıtlı ve amaçla doludur. Aralarındaki en genç olanı annesinin sırtına tutunur, büyük gümüş sırt ise grubun sonrasındadır, gözleri herhangi bir tehlike belirtisi için tarar. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] nefesini tutar, dürbünlerini bu nadir ve kısa süreli görünüme odaklar. Böyle bir aileyi ayırma düşüncesi aklını kurcalar, ancak hayvanat bahçesinin izleyicilerinin baskısı onu, hatta ormanın huzurunu bozmayı seçmesine zorlar—devam etmelidir, hatta bu, onun için en zor görev olabilir."
 dubois.32.f.gorilla.3: "Yağmur ormanlarının derinliklerinde, hava toprak kokusu ve görünmeyen yaratıkların çağrılarıyla dolarken, goriller yuvalarını burada kurar. Gümüş sırt, gümüş damarlarıyla kaplı tüyleri ve bilge, derin bakışlarıyla sürüsünün tartışmasız lideridir. Dev elleri, nadiren böyle güçlü bir varlık tarafından gösterilen bir incelikle, genç bir gorili nazikçe kucaklar. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], bu samimi anı uzaktan izlerken, karşısındaki etik ikilemle çatışır. Hayvanat bahçesinin sahipleri sonuç beklerken, bu olağanüstü hayvanlar arasındaki karmaşık sosyal bağları gözlemlerken, vahşi doğanın ruhunu gerçekten bir kafeste tutmanın mümkün olup olmadığını sorgulamaya başlar."
 dubois.33.d.gorilla: "Goril #O Gorilla#!'yı ararken, safari ekibimiz harika bir bitki örtüsüyle karşılaştı. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], bir ara vermek istiyor."
 dubois.34.d.gorilla: "Goril #O Gorilla#!'yı yakalamayı amaçlayan safari, kesintiye uğramalıdır. Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] kayboldu!"
 je_dubois_safari_gorilla: "Afrika Safarisi: Goril"
 je_dubois_safari_gorilla_reason: "Bir Afrika safarisinde, sürekli iz sürme ve tuzak kurma ile büyük avlar yakalanabilir ve sonra bir [concept_dubois_zoo]ya taşınabilir. Her safari sırasında yalnızca bir hayvan yakalanabilir. Hayvan türüne bağlı olarak, tuzak kurmanız veya izini sürmeniz gerekebilir. Genel bir kılavuz olarak, büyük, ağır hareket eden hayvanlar daha fazla tuzak gerektirirken, hızlı hayvanlar daha fazla iz sürme gerektirir. Safari 300 gün sürer. Eğer o süre içinde hayvan yakalanmazsa, safari ekibi ülkeyi terk eder - başarısız olarak.\n\nAgresif hayvanlar kendilerini savunabilir ve tuzak kurarken saldırabilirler. Utangaç hayvanlar ise kaçar. Bir [concept_dubois_naturalist] ve Zoolog unvanına sahip bir karakter bu tür durumları dezavantajsız çözebilir. Yeni teknolojiler, örneğin #ORANGE Makine Tüfeği#! veya #ORANGE Patlayıcı Motor#!, hayvanları izlemek ve tuzak kurmak işini kolaylaştırır."
 dubois.228.d: "Kim New Zealand'dan gelen bir kartal beklerdi? Prof. [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName] 2.6 metrelik (8 ft 6 in) devasa kanat açıklığına sahip bir kartala ait çeşitli kemikler buldu. Profesör [SCOPE.sCharacter('dubois_paleontologist_scope').GetLastName], bu kuşun, Māori halkının Pouākai efsanesine ilham vermiş olabileceğini düşünüyor."
