 dubois_send_paleontologist_to_excavation_button_desc: "[concept_dubois_paleontologist]’ınızı [concept_dubois_paleontological_excavation]’a gönderin.\nAktif bir Paleontolog, Kazıdan [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] ve [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] miktarını artıracaktır.\n\nHer zaman Paleontologu geri çağırabilirsiniz, ancak bir yıl boyunca tekrar kazıya gönderilemez."
 dubois_recall_paleontologist_from_excavation_button: "Paleontologu Geri Çağır"
 dubois_recall_paleontologist_from_excavation_button_desc: "[concept_dubois_paleontologist]’ınızı [concept_dubois_paleontological_excavation]’dan geri çağırın.\nArtık Kazıdan ek [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] ve [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] kazanamayacaksınız.\n\nPaleontolog, #n bir yıl#! boyunca başka bir kazıya gönderilemeyecektir."
 dubois_recall_excavation_button: "Takımı Geri Çağır"
 dubois_recall_excavation_button_desc: "[concept_dubois_paleontological_team]’ınızı [concept_dubois_paleontological_excavation]’dan geri çağırın. Bu işlem Paleontolojik Kazıyı kaldıracaktır."
