 dubois_catch_local_animal_decision: "Yerel Fauna Yakala"
 dubois_catch_local_animal_decision_desc: "Ülkemiz, [concept_dubois_zoo]’da sergilenebilecek büyüleyici türlere sahip hayvan yaşam alanlarına sahiptir. Bir hayvan uzmanı, bir yıl boyunca ülkeyi dolaşarak hayvanat bahçesi için [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] toplayacak."
 dubois_visit_zoo_decision: "Zooloji Bahçesini Gez"
 dubois_visit_zoo_decision_desc: "Özel bir etkinliği başlatarak Zooloji Bahçenizde gezinebilir ve keşiflerle toplanmış tüm egzotik canlıları gözlemleyebilirsiniz."
 dubois_ban_animal_export_decision: "Hayvan İhracatını Yasakla"
 dubois_ban_animal_export_decision_desc: "Canlı örneklerin ihracatına yasak getirerek doğal hazinelerimizi koruma hakkımızı ilan ediyoruz. Yabancı hükümetler taleplerinden vazgeçecektir."
 dubois_allow_animal_export_decision: "Hayvan İhracatına İzin Ver"
 dubois_allow_animal_export_decision_desc: "Seçili hayvanların ihracatına lisans vermek hem diplomatik dostluk sağlar hem de ek bir gelir kaynağı oluşturur."
 dubois_collect_specimen_decision: "[concept_dubois_specimen] Koleksiyonunu Başlat"
 dubois_collect_specimen_decision_desc: "Hem bitkilerden hem de hayvanlardan derlenmiş seçkin bir [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] koleksiyonu oluşturmak yalnızca bilimsel kurumlarımızı geliştirmekle kalmaz, aynı zamanda milletimizin araştırma ruhunu ve aydınlanmış ilerleme anlayışını da ilan eder."
 dubois_safari_decision: "Afrika Safarisini Başlat"
 dubois_safari_decision_desc: "Afrika’nın vahşi doğasına bir keşif ekibi göndererek [concept_dubois_zoo] için güçlü avların peşine düşüyoruz. İz sürme ve dikkatli tuzak kurma yoluyla canlı bir örnek elde etmek mümkün olabilir. Her safari yalnızca bir yaratık kazandırabilir. Kılavuz ilke şudur: Ne kadar büyük ve ağırsa, o kadar çok tuzak gerekir; hızlı hayvanlar ise bitmek bilmez bir takip ister."
 je_dubois_safari: "Afrika Safari Keşfi"
 je_dubois_safari_reason: "Deneyimli avcılar ve doğa bilimcilerden oluşan bir ekip, [concept_dubois_zoo] için nadir bir örnek edinmek üzere Afrika safarisine gönderildi. Keşif, başarıya ulaşmak için kurnazlık, dayanıklılık ve bilimsel yöntemleri eşit ölçüde kullanmalıdır. Ağır hayvanlar çok sayıda tuzak gerektirir; kaçak av ise ustaca iz sürmeyi şart koşar. Her keşif yalnızca bir hayvan getirebilir."
 je_dubois_safari_goal: "Afrika safarisi yarım yıl sürecek. Keşif bu sürede bir örnek elde edemezse, ekip çabalarının karşılığını almadan geri dönecek."
 je_dubois_safari_fail: "Safari başarısızlıkla sonuçlandı. Aylarca süren zahmet ve gayrete rağmen ekip, sergilenecek bir örnek olmadan geri döndü."
 je_dubois_dinosaur_excavation: "Dinozor Kazısı"
 je_dubois_dinosaur_excavation_reason: "Fosilleşmiş bir dinozor kemiğinin ortaya çıkarılmasının ardından Profesör [ROOT.Var('dubois_paleontologist_var').GetCharacter.GetLastName], tam kapsamlı bir paleontolojik kazıya başlamıştır. Bir yıl sürecek bu çalışma boyunca, deneyimine ve yetkinliğine bağlı olarak saygın [concept_dubois_paleontologist]’imiz bir ila üç ek fosil parçası bulabilir. Keşif sona erdiğinde de yeni buluntular olasılık dahilindedir—zira tam iskelet kaydı henüz açığa çıkmamıştır. Eksiksiz bir rekonstrüksiyon için, Paleontolojik Koleksiyon’da sergilenecek bir örneği monte edebilmek adına beş kemik gereklidir."
 je_dubois_dinosaur_excavation_goal: "On iki ayın sonunda [concept_dubois_paleontologist]’imiz bulguların ve çıkarılan kalıntıların resmi raporunu sunacaktır."
 dubois_specimen_tt: "En az #G 50.000#! @dubois_specimen! #O Biyolojik [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]#! biriktirin—zoolojik ve botanik keşiflerden oluşan zengin bir arşivi temsil eder."
 notification_dubois_paleontological_report_notification_name: "Yıllık Paleontoloji Raporu"
 notification_dubois_paleontological_report_notification_desc: "[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] bu yıl [GetPlayer.MakeScope.Var('dubois_fossils_notification_var').GetValue|0+=] yeni fosil buldu."
 notification_dubois_java_man_notification_name: "[INITIATOR_COUNTRY.GetName], Java Adamını keşfetti"
 notification_dubois_java_man_notification_desc: "[INITIATOR_COUNTRY.GetName]’den bir [concept_dubois_paleontologist], insan evrimine dair soruları yanıtlayabilecek önemli bir iskeleti Java’da keşfetti."
 dubois.1.t: "Zooloji Bahçesinin Açılışı"
 dubois.1.d: "Yeni [concept_dubois_zoo]’nun görkemli açılışı, meraklı ziyaretçilerin toplandığı büyük bir kalabalığı cezbetti. Halkın coşkusu yüksekken, şimdiden daha fazla barınak inşası ve yeni türlerin edinilmesi çağrıları yapılmaya başlandı."
 dubois.1.f: "'İki gece önce Exeter Change’de kaplanların yemek yediğini gördüm. Mora’da Veli Paşa’nın, bakıcısının ardından köpek gibi giden aslanı dışında, sırtlanın bakıcısına olan düşkünlüğü beni en çok eğlendirdi. Ne sohbetti ama! — Bir “suaygırı” vardı, yüzü Lord Liverpool’a benziyordu; “Ayı Tembeli”nin ise uşağımın aynı ses ve tavırları vardı—ama kaplan çok konuşuyordu. Fil paramı aldı, geri verdi—şapkamı çıkardı, kapı açtı, kırbacı hortumladı ve öyle iyi davrandı ki, keşke uşağım olsaydı. Dünyanın en güzel hayvanı panterlerden biri; ama zavallı antiloplar ölmüştü. Burada görmekten nefret ederdim: deveyi görünce Küçük Asya’yı yeniden özledim.' —Lord Byron"
 dubois.1.g: "Ulusal hayvanat koleksiyonu için görkemli bir başlangıç."
 dubois.2.t: "Türlerin Kökeni Üzerine"
 dubois.2.d: "Devrim niteliğinde bir incelemenin yayımlanmasıyla Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], türlerin kökenini doğal süreçlerle açıklamayı hedefleyen cesur bir teori ortaya koydu."
 dubois.2.f: "'Yaşam mücadelesi nedeniyle, her türden birey için az da olsa fayda sağlayacak herhangi bir değişim, kökeni ne olursa olsun, bu bireyin korunmasına yol açacak ve genellikle yavrularına geçecektir ... Bu prensibe, yani yararlı olan her küçük değişimin korunmasına, insanın seçme gücüyle olan ilişkisini belirtmek için Doğal Seçilim adını verdim.' —Charles Darwin"
 dubois.2.g: "Doğa bilimlerini kökten değiştirecek bir teori."
 dubois.2.h: "Bilimin hurafelere indirdiği bir başka darbe."
 dubois.3.t: "Beagle’ın Dönüşü"
 dubois.3.d: "HMS Beagle, yıllar süren bilimsel keşif gezisinden döndü. Gemi, doğal örnekler, fosilleşmiş kalıntılar, detaylı çizimler ve gözlemsel verilerle dolu. Mürettebat arasında tanınmış [concept_dubois_naturalist] [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] de vardı ve katkıları şimdiden önemli olarak görülüyor."
 dubois.3.f: "'HMS Beagle’da doğa bilimci olarak görev yaparken, Güney Amerika’nın sakinlerinin dağılımına ve kıtanın geçmiş ve şimdiki sakinleri arasındaki jeolojik ilişkilere dair bazı olgular beni oldukça etkilemişti. Bu olgular bana türlerin kökenine—büyük filozoflarımızdan birinin “gizemlerin gizemi” dediği şeye—biraz ışık tutuyor gibi geldi.' —Charles Darwin"
 dubois.3.g: "Çığır açan bir yolculuk. Hangi sırlar ortaya çıkacak?"
 dubois.4.t: "Kosmos"
 dubois.4.d: "Alexander von Humboldt’un anıtsal eseri *Kosmos* yayımlandı—bilimleri tek bir felsefi çerçevede birleştirmeyi amaçlayan iddialı bir çalışma. Önce Berlin’de dersler olarak sunulan eser, şimdi dünya çapında okurlara ulaşarak doğa ve insan merakına ansiklopedik bir bakış sunuyor."
 dubois.4.f: "'Yoğun bir yaşamın akşamında, ruhumda neredeyse yarım yüzyıldır hayali dolaşan bir eseri Alman halkına teslim ediyorum. Pek çok ruh halinde bu çalışmayı yapılmaz gördüm: Ve ne zaman bıraksam, belki de dikkatsizce, tekrar döndüm. Gücümün ölçüsüne dair haklı bir güvensizliğin doğurduğu çekingenlikle çağdaşlarıma ithaf ediyorum. Uzun zamandır beklenen yazıların genellikle daha az hoşgörüyle karşılandığını unutmaya çalışıyorum.' —Alexander von Humboldt"
 dubois.4.g: "Çağdaş bilimsel düşüncenin köşe taşı."
 dubois.4.h: "Bu eser gelecek nesillere ışık tutacak."
 dubois.5.t: "Mendel’in Mirası"
 dubois.5.d: "Abbot Gregor Mendel’in uzun süredir göz ardı edilen deneyleri yeniden keşfedildi ve kalıtımın incelenmesinde devrim yarattı. Onun basit ama güçlü ilkeleri—şimdi Mendel Yasaları olarak biliniyor—yeni bir bilimin, genetiğin, temellerini atıyor."
 dubois.5.f: "'Süs bitkilerinde renk varyasyonları elde etmek için yapılan yapay döllenme deneyimleri, burada tartışılacak deneylere yol açmıştır. Aynı türler arasında döllenme gerçekleştiğinde her zaman aynı melez biçimlerin düzenli şekilde yeniden ortaya çıkması, melezlerin soylarındaki gelişimlerinin izlenmesini amaçlayan yeni deneyler yapılmasına sebep olmuştur.' —Gregor Mendel"
 dubois.5.g: "Modern genetiğin doğuşu."
 dubois.6.t: "Java Fosilinin Keşfi"
 dubois.6.d: "Hollanda Doğu Hint Adaları’nda [SCOPE.sCharacter('dubois_new_paleontologist_scope').GetFullName], bir hekim ve anatomist, tarihöncesi bir insan atasının fosilleşmiş kalıntılarını ortaya çıkardı—bilim dünyasında hem heyecan hem de tartışma uyandırdı."
 dubois.6.f: "1891’de Doğu Java’daki Solo Nehri boyunca [SCOPE.sCharacter('dubois_new_paleontologist_scope').GetFullName] tarafından ilk kez keşfedilen fosiller, Java Adamı olarak tanındı. Yaklaşık bir milyon yıl öncesine tarihlenen bu kalıntılar, Avrupa dışında bulunan ilk hominin fosiliydi ve Neandertal’den sonra ikinci örneği temsil ediyordu. Önce *Anthropopithecus*, ardından *Pithecanthropus erectus* olarak sınıflandırılan örnek, bugün genel olarak *Homo erectus*, bazen de *Homo erectus javanensis* olarak kabul edilmektedir. Paleoantropolog Ralph von Koenigswald’ın da dediği gibi: 'Başka hiçbir paleontolojik keşif bu denli büyük bir sansasyon yaratmamış ve böylesine çelişkili bilimsel görüşlere yol açmamıştır.'"
 dubois.11.t: "Yeni Bir [concept_dubois_zoo_animal]"
 dubois.11.d: "[SCOPE.sCountry('dubois_animal_country').GetName], saygın Zooloji Bahçelerimizde sergilenmek üzere nadir bir örneğin devrini cömertçe kabul etti."
 dubois.11.f: "Bilimsel değişim protokollerine uygun olarak, aynı anda yalnızca tek bir hayvan Zooloji Bahçesi için temin edilebilir. Edinimin ardından, yaratığın nakledilmesi ve yeni ortamına uyum sağlaması birkaç hafta sürecektir. Koleksiyona uygun ve saygın bir şekilde tanıtıldıktan sonra, ek örnekler için diplomatik girişimlerde bulunulabilir. Peki hangi değerli hayvan menajerimizi onurlandıracak?"
