 je_dubois_mount_dinosaur_skeleton_reason: "Paleontolog bir [concept_dubois_dinosaur_skeleton] montajı yapıyor.\n$mr_divider_for_je$\nTamamlandığında bir Dinozor İskeleti alacaksınız. Paleontologunuzun [concept_academics_experience] gibi çeşitli faktörlere bağlı olarak bir #p Mükemmel#!, #y Imperfect#! veya #n Zayıf#! İskelet alacaksınız. İskeletin kalitesi, Paleontolojik Prestijinizi etkileyecektir [concept_dubois_paleontological_collection].$je_dubois_mount_dinosaur_skeleton_progress_and_success_chance_loc$"
