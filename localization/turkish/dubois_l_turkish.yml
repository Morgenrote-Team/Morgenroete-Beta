 dubois.149.d: "Hayvanat bahçemiz, yeni, egzotik bir hayvanla zenginleşti: bugün uzun zamandır beklenen #O Pallas'ın Kedisi#! yeni kafesine taşındı."
 dubois.149.f: "Pallas'ın Kedisi, Orta Asya'nın çayır ve dağlık bölgelerinde yaşayan küçük bir vahşi kedidir. Yoğun, kabarık kürkü ve kısa yapısı ile soğuk ortamlara oldukça iyi adapte olmuştur. Pallas'ın Kedileri yalnızdır ve kayalıklarda veya deliklerde saklanarak yırtıcılardan korunurlar. Çoğunlukla küçük memeliler ve kuşları avlayarak beslenirler, keskin gözleri ve gizlilikleriyle avlarını yakalarlar."
