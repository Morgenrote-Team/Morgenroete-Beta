 dubois.1049.t: "Elk Kafesi"
 dubois.1049.d: "Hayvanat bahçesinin ormanlık kafesinde, görkemli bir Avrupa Elk'i dikilmiş duruyor, devasa boynuzları gökyüzüne doğru uzanıyor."
 dubois.1049.f1: "Elk'in sakin tavrı ve etkileyici boyutu, ziyaretçilerin dikkatini çekiyor; bu nazik devin saf ölçeğine hayran kalıyorlar. Etkileyici boynuzları hakkında meraklanarak, daha fazla bilgi edinmek için bir bakıcıya yaklaşırısınız.\n\"Avrupa Elk'i, Kuzey Amerika'da Moose olarak bilinir, geyik ailesinin en büyük üyeleridir,\" diyor bakıcı. \"Boynuzları altı fit genişliğe kadar uzanabilir ve esas olarak çiftleşme mevsiminde, erkeklerin dişiler için rekabet ettiği zaman kullanılır. Bu boynuzlar her yıl dökülür ve yeniden büyür, yeni takımlar yaşlandıkça daha büyük ve daha karmaşık hale gelir.\""
 dubois.1049.f2: "Elk'in yaşam alanının gölgeli köşesinde, büyük bir erkek Avrupa Elk'i devasa başını eğerek yumuşak sürgünler ve yapraklar yemektedir. Çenesinin sakin ve ritmik hareketi neredeyse hipnotik bir şekilde etrafındakileri çekiyor. Elk'in beslenme alışkanlıkları hakkında daha fazla şey öğrenmek isteyen biri olarak, bir bakıcıya sorarsınız.\n\"Elk'ler otlayıcı değildir,\" diyor bakıcı. \"Çoğu otlayan hayvanın aksine, elk'ler çeşitli bitkilerle beslenmeyi tercih ederler, bunlar arasında yapraklar, kabuklar ve su bitkileri bulunur. Keskin bir koku alma duyuları vardır ve bu sayede çevrelerindeki en besleyici bitkileri bulmalarına yardımcı olur. Doğada, bir gün içinde 70 pound kadar yiyecek tüketebilirler, bu da büyük vücutlarını beslemek için gereklidir.\""
 dubois.1049.f3: "Kafeste, ağaçların arasında bir Avrupa Elk'i aniden derin ve rezonanslı bir böğürtü çıkarır, çağrısı havada yankılanır. Ses, etraftaki herkesin dikkatini çeker, duraklarlar ve bu ilkel çığlığı dinlerler. Bu vokalizasyonun anlamı hakkında daha fazla şey öğrenmek isteyen biri olarak, bir bakıcıya yaklaşır ve daha fazla bilgi alırsınız.\n\"Bu bir çiftleşme çağrısıydı,\" diyor bakıcı. \"Çiftleşme mevsiminde, erkek elk'ler bu yüksek sesli vokalizasyonları baskınlık kurmak ve dişileri çekmek için kullanır. Çağrı uzun mesafeler boyunca duyulabilir ve genellikle boynuzlarını sergileyip agresif bir duruş sergilerler. Bu, elk'in doğal habitatındaki dominant rolünün güçlü bir hatırlatıcısıdır.\""
