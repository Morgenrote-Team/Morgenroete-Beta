l_turkish:
 MFE_workplace_events.1.t:0 "Maden Kazası"
 MFE_workplace_events.1.d:0 "A horrible accident has occurred at the mine in [SCOPE.sState('mine_state').GetName]. Two people have died after an explosion at the [SCOPE.sState('mine_state').GetName] mine. Minor accidents like this happen all the time but this one was... different. All the local workers refuse to continue their duties until conditions have improved."
 MFE_workplace_events.1.f:0 "Bunu kendi gözlerimle gördüm, ikisi de parçalanmış ve inanılmaz acı verici şekilde ezilmişti. Bu madenlerde bir gün daha çalışmayacağız, burası güvenli değil."
 MFE_workplace_events.1.a:0 "That really is a shame, get them back to work immediately"
 MFE_workplace_events.1.b:0 "Madende çalışan insanlar da bizim gibi insan!"
 MFE_workplace_events.1.c:0 "Başından beri madenciliğe hiç başlamamalıydık"
 MFE_workplace_events.2.t:0 "Kömür Ocaklarından Gelen Kız"
 MFE_workplace_events.2.d:0 "Kömür yüklü arabacık, yıllarca zorlu çalışmadan dolayı yıpranmış ve narin bedeni üzerinde ağır geliyordu; ayakları artık onu taşıyamıyordu. Orada, karanlıkta, derin şaftlarda kayıp düştü.\n\nBaşka bir genç kız, vilayetlerimizden birindeki bir kömür kazasında hayatını kaybetti ve olay ulusal çapta dikkat çekti."
 MFE_workplace_events.2.f:0 "Bizi böyle devam ettirmelerine nasıl izin verebilirler, sanki insan bile değilmişiz gibi."
 MFE_workplace_events.2.a:0 "O sadece bir kızdı... ne hâle geldik biz"
 MFE_workplace_events.2.tt:0 "[SCOPE.sState('mining_state').GetName] halkı uğursuz bir plan peşinde..."
 MFE_workplace_events.3.t:0 "Üretim Açıkları"
 MFE_workplace_events.3.d:0 "Mühimmat fabrikalarımızdan biri son üç ayda ciddi üretim açığı yaşadı. Bu durum, yatırımcılar ve yerel sanayiciler arasında panik yaratmasın diye rapor edilmedi. Fabrika kayıplarını ulusal stoktan karşılayarak yerel işlerin kurtarıldığı izlenimi yaratabiliriz."
 MFE_workplace_events.3.f:0 "Bize insanları vurun diyorlar ama onlarla vurmamız için hiçbir şey vermiyorlar, böyle bir ordu nasıl savaşır?!"
 MFE_workplace_events.3.a:0 "Yapılacak bir şey yok"
 MFE_workplace_events.3.b:0 "Onlara biraz para gönder, belki işe yarar"
 MFE_workplace_events.4.t:0 "Çay Fabrikası Soyuldu"
 MFE_workplace_events.4.d:0 "Çay üretim vilayetlerimizden birindeki merkezi çay tartı istasyonu silahlı kişilerce soyuldu. Bazıları, vilayetteki zorlu koşulların, kar marjını yiyen distribütör ve perakendecilere karşı köylüleri soyguna yönlendirmiş olabileceğini düşünüyor. Nedeni ne olursa olsun, durumu çözmeliyiz."
 MFE_workplace_events.4.f:0 "Gece karanlığında geldiler, bekçileri öldürdüler ve elimizdeki tüm yeşil çayı çaldılar. Siyah çayı bıraktılar ama zaten kimse onu içmek istemiyor."
 MFE_workplace_events.4.b:0 "Bir fincan çay için tüm dünyayı fethederdim! Bunlar bulunmalı."
 MFE_workplace_events.4.ttt:0 "Soygunla ilgili soruşturma başlat."
 MFE_workplace_events.5.t:0 "Eski Konserve Yemek"
 MFE_workplace_events.5.d:0 "Kıdemli Malzeme Sorumlusu, [SCOPE.sState('canning_state').GetName]’deki bir ordu stokunda unutulmuş konserve yiyecekler keşfetti. Konserveler birkaç yıllık olmasına rağmen hâlâ yenilebilir görünüyor. 15 ton konserveyi ne yapmalıyız?"
 MFE_workplace_events.5.f:0 "Onları bir köşede, bir metre kalınlığında toz yığınının altında bulduk. Yenilebilir olup olmadığını test etmek için bir fareye verdik ve yedi. Atasözünde dediği gibi, 'fare yiyecekse işçiler de yer'."
 MFE_workplace_events.5.a:0 "Bu iğrenç"
 MFE_workplace_events.5.b:0 "I'm sure we can find some people to eat that goop!"
 MFE_workplace_events.5.tt:0 "[SCOPE.sState('canning_state').GetName]’de halkın refahı azalacak."
 MFE_workplace_events.6.t:0 "Sığır Ateşi"
 MFE_workplace_events.6.d:0 "[SCOPE.sState('bovine_state').GetName]’de hayvanlar arasında garip bir ateş salgını çıktı ve çok sayıda hayvan öldü. Yerel garnizondaki veteriner, hastalığın etkilerini azaltmak için vilayet genelinde dolaşıyor. Hastalık zamanla geçse de, yüzlerce çiftçi ve aileleri için tazminat sorunu hâlâ çözülmedi."
 MFE_workplace_events.6.f:0 "Dün sabah tarlaya çıktım ve ineklerime baktım; üzerlerinde yeşil lekeler ve garip mor irin vardı. Bu inekler eskiden çok değerliydi, şimdi ancak [GetPopType('peasants').GetName]’a satmayı umabiliriz ve kötü kokularını fark etmeyecekler."
 MFE_workplace_events.6.a:0 "Gereken tüm yardımı gönderin!"
 MFE_workplace_events.6.b:0 "Yardım için hiçbir şey ayıramayız"
 MFE_workplace_events.6.c:0 "Komşu eyaletlerle konuşup yardım alıp alamayacağımızı görün"
 MFE_workplace_events.7.t:0 "İpek Tarlalarında Ölüm"
 MFE_workplace_events.7.d:0 "Kokonaqlar kurumakta ve ölüyor, iplikler doğru şekilde koagüle olmuyor ve en küçük esintide çözülüyor. İpek tarlalarında bir sorun var ve en iyi kimyagerlerimiz bile hastalığın çözümünü bulamadı. Yerel ipek çiftçileri öfke içinde ve hükümeti harekete geçmeye çağırıyor."
 MFE_workplace_events.7.f:0 "Böylesini daha önce hiç görmedik, tüm emeğimiz boşa gidiyor. Her şey ölüyor, işçiler umutsuz; ipek yoksa iş yok ve iş yoksa yaşam yok diyorlar."
 MFE_workplace_events.7.a:0 "[SCOPE.sCharacter('guilty_silk_field_owner').GetFullName] sadece [SCOPE.sCharacter('guilty_silk_field_owner').GetHerHis] işini yapıyor"
 MFE_workplace_events.7.b:0 "[SCOPE.sCharacter('guilty_silk_field_owner').GetFullName] cezasını [SCOPE.sCharacter('guilty_silk_field_owner').GetHerHis] bilgisizliği için ödeyecek"
 MFE_workplace_events.7.tt:0 "[SCOPE.sCharacter('guilty_silk_field_owner').GetFullName] tutuklanacak ve [SCOPE.sCharacter('guilty_silk_field_owner').GetHerHis] yetkili konumundan alınacak"
 MFE_workplace_events.8.t:0 "Kan ve Demir"
 MFE_workplace_events.8.d:0 "Büyük sorular, çoğunluğun konuşmaları ve oylarıyla değil, demir ve kan ile çözülür.'\n-Otto von Bismarck\n\n[SCOPE.sState('iron_state').GetName] demir madenlerinde yeni, zengin bir cevher yatağı keşfedildi. Cevher zengin olsa da, güncel madencilik teknolojimizin erişemeyeceği tehlikeli bir derinlikte bulunuyor. Cevheri çıkarmaya çalıştık ama bu bize can ve kan kaybettirdi. Büyük demir çukurunda birkaç işçi hayatını kaybetti, ancak şimdi demir daha önce imkansız olduğu düşünülen oranlarda çıkarılabiliyor."
 MFE_workplace_events.8.f:0 "Böylesini hiç görmemiştik, üretimi dört katına çıkaracak kadar büyük bir demir yatağı. Birkaç kişiyi aşağı gönderip çıkarmak için yol yapmalarını sağladık. Oraya vardılar ama güzel olmadı, 10 kişiden sadece biri geri geldi ve anlatacak hâli bile yoktu."
 MFE_workplace_events.8.a:0 "Birkaç gün izin verin ve yardım gönderin"
 MFE_workplace_events.8.b:0 "Birkaç ölüm kimin umurunda... işe geri dönün!"
 MFE_workplace_events.9.t:0 "Maden Trajedisi"
 MFE_workplace_events.9.d:0 "Bugün demir madenlerinde bir kaza bildirildi ve birkaç işçi hayatını kaybetti. Bazı işçiler yaralandı, bazıları hâlâ kayıp. Rapora göre, madendeki hatalı bir destek kirişinin çökmesi kazaya yol açtı. Bu olay, madencilik koşulları hakkında en azından yerel bir tartışmayı başlatacaktır."
 MFE_workplace_events.9.f:0 "Bu nasıl olabilir..."
 MFE_workplace_events.9.a:0 "O lanet sanayiciler..."
 MFE_workplace_events.9.b:0 "İşçilere elimizden gelen desteği verelim"
 MFE_workplace_events.9.c:0 "Neden tarlalardaki eski basit zamanlara dönemiyoruz"
 MFE_workplace_events.10.t:0 "Pamuk Kalite Sorunları"
 MFE_workplace_events.10.d:0 "[SCOPE.sState('cotton_state').GetName] pamuk tarlalarında üretilen pamuk kalitesiyle ilgili birçok sorun yaşanıyor. Bazıları bunun garip yağışlardan kaynaklandığını söylüyor ama sebep her ne olursa olsun..."
 MFE_workplace_events.10.f:0 "Bu çöpü kullanamam, buna pamuk demek bile mümkün mü?!"
 MFE_workplace_events.10.a:0 "Toprak sahipleri bizi bu durumdan çıkaracak"
 MFE_workplace_events.10.b:0 "Kırsal halk bunu yüzyıllardır yapıyor"
 MFE_workplace_events.10.c:0 "Dini liderler daha iyi pamuk için dua edecek"
 MFE_workplace_events.11.t:0 "Kazanda Patlama"
 MFE_workplace_events.11.d:0 "Bugün [SCOPE.sState('steamer_state').GetName]’de trajedi yaşandı, bir buhar kazanı rutin test sırasında patladı. Patlamada yedi işçi öldü ve binlerce pound değerinde ekipman yok oldu. Yerel yetkililer işyeri koşullarını araştırıyor ve umarız gelecekte bu tür kazalar önlenebilir, ama şimdilik [SCOPE.sState('steamer_state').GetName] ölenlerini anıyor."
 MFE_workplace_events.11.f:0 "Bu korkunç, geçen hafta bu kazanları kontrol ettik, patlayacaklarını kimse tahmin edemezdi."
 MFE_workplace_events.11.a:0 "Bu olaylar ilerlemenin bedeli."
 MFE_workplace_events.11.b:0 "İşçiler sömürülmemeli ve bu koşullara zorlanmamalı."
 MFE_workplace_events.11.c:0 "Makineler tehlikeli! Sanayi başlı başına bir kanser."
 MFE_workplace_events.12.t:0 "Boya Fabrikasında Yıkım"
 MFE_workplace_events.12.d:0 "Bugün bir boya fabrikasında sıcak boyanın büyük bir küveti kazara döküldü ve işçiler üzerine yayıldı. Yerel halk, sıcak ve tehlikeli iş yerindeki yetersiz güvenlik önlemlerinin kazaya sebep olduğunu belirtiyor ve hükümetten önlem alınmasını talep ediyor. Kurtarma ekibi olay yerini terk ederken bazı çalışanlar yaralı olarak bırakıldı."
 MFE_workplace_events.12.f:0 "Sadece çalışıyordum, gömlek boyuyordum ve herkes etrafımda ölmeye başladı."
 MFE_workplace_events.12.a:0 "Herkes bir gün boyayacak"
 MFE_workplace_events.12.b:0 "Boşa boyamamış olacaklar!"
 MFE_workplace_events.13.t:0 "Petrol Tankı Patlaması"
 MFE_workplace_events.13.d:0 "[SCOPE.sState('oil_state').GetName]’deki rafinerilerimizden birinde, nedeni henüz bilinmeyen bir şekilde yakıt tankı patladı ve yedi işçi hayatını kaybetti, binlerce dolarlık şirket mülkü zarar gördü. Rafineri sahibi kazada sorumluluğu reddediyor, hükümet denetimlerinin yetersiz olduğunu öne sürüyor."
 MFE_workplace_events.13.f:0 "Bu korkunç, petrol harika akıyordu, birden patladı, ne yazık."
 MFE_workplace_events.13.a:0 "[SCOPE.sCharacter('guilty_oil_owner').GetFullName] sadece [SCOPE.sCharacter('guilty_oil_owner').GetHerHis] işini yapıyor"
 MFE_workplace_events.13.b:0 "[SCOPE.sCharacter('guilty_oil_owner').GetFullName] bu [SCOPE.sCharacter('guilty_oil_owner').GetHerHis] bilgisizliği sürdürmeyecek"
 MFE_workplace_events.13.tt:0 "[SCOPE.sCharacter('guilty_oil_owner').GetFullName] tutuklanacak ve kaybolacak..."
 MFE_workplace_events.14.t:0 "Rafineride Aşırı Üretim"
 MFE_workplace_events.14.d:0 "Rafinerilerimizden biri son zamanlarda oldukça iyi gidiyor, üretim beklenen kotayı birkaç bin galon aşıyor. Depolama sorunları nedeniyle rafineri sahibi, hükümete yakıtı büyük bir indirimle satın almak için bir teklif sundu. Yakıtı kendimiz satın alabiliriz veya onu reddedip ucuz yakıtın piyasaya çıkmasını bekleyebiliriz. Ucuz yakıtın yerel etkisi halkı oldukça memnun edecektir, ama muhtemelen yakıtı kendimiz kullanabiliriz."
 MFE_workplace_events.14.f:0 "Siyah altın akıyor!"
 MFE_workplace_events.14.a:0 "Petrol geleceğin yakıtıdır!"
 MFE_workplace_events.14.b:0 "Fonları daha... meşru işlere yönlendir"
 MFE_workplace_events.15.t:0 "Yaşlı Adam ve Deniz"
 MFE_workplace_events.15.d:0 "[SCOPE.sState('fishing_state').GetName] kıyısındaki [SCOPE.sCharacter('fisherman').GetFullName] isimli bir balıkçı bugün muazzam bir av getirdi. Trolleri neredeyse okyanusun en zengin nimetleriyle dolu ve kısa süre sonra diğer balıkçılar da onun örneğini tekrarlayabiliyor. Bu yıl [SCOPE.sState('fishing_state').GetName]’de balık avı olağanüstü iyi görünüyor."
 MFE_workplace_events.15.f:0 "[SCOPE.sCharacter('fisherman').GetFullName]'ı birkaç gün önce kıyıda gördüm. Sanki büyülenmiş gibi balıkları çekiyordu, bir saatte yaklaşık 500 balık teknesine çıktı. Teknesi, yakaladığı balıkların ağırlığından batmak üzereydi ve [SCOPE.sState('fishing_state').GetName]'e dönmek zorunda kaldı. Karaya çıktığında avladığı balıklar bir ailenin bir ay boyunca yiyeceği kadar büyüktü."
 MFE_workplace_events.15.a:0 "Nasıl müdahale edebiliriz ki, bu gerçekten inanılmaz"
 MFE_workplace_events.15.b:0 "[SCOPE.sState('fishing_state').GetName] halkı dünyanın en ucuz balığını yiyecek"
 MFE_workplace_events.16.t:0 "Patlayıcılar Patladı"
 MFE_workplace_events.16.d:0 "[SCOPE.sBuilding('explosion_building').GetName] Patlayıcı Deposu’nda çıkan yangın, bazılarına göre [SCOPE.GetRootScope.GetCountry.GetCapital.GetName]’e kadar duyulabilecek büyük bir patlamaya yol açtı. Yıkım büyük ve çevrede yüzlerce kişinin öldüğü bildirildi. Yangın şehir boyunca yayılırken itfaiye öncelik belirlemek zorunda: Yangın kuzeye zengin [SCOPE.sBuilding('explosion_building').GetName] mahallelerine ve güneye daha fakir bölgelere yayılmakla tehdit ediyor."
 MFE_workplace_events.16.f:0 "[SCOPE.sBuilding('explosion_building').GetName]'daki birkaç işçi patlayıcıların patlayacağını söylemişti ama kimse inanmadı... ta ki iş işten geçene kadar."
 MFE_workplace_events.16.a:0 "Fabrikayı hemen onarın!"
 MFE_workplace_events.16.b:0 "Yapılacak bir şey yok, sadece enkaz kaldı..."
 MFE_workplace_events.17.t:0 "Zarif Mobilya"
 MFE_workplace_events.17.d:0 "Belki bu sandalye, hanımefendi? En kaliteli Brezilya Maunundan yapılmış, narin Nubia desenleriyle Kenya fildişi kakmalı. Derideki zengin mermerleşmeyi gözlemleyin. [SCOPE.GetRootScope.GetCountry.GetName]’de bunun gibi başka bir tane bulamazsınız!\n\n[SCOPE.GetRootScope.GetCountry.GetName]’de artan yaşam standartları, daha iyi ve zarif mobilya talebini artırdı. İnsanların evleri güzelleştikçe, hükümet ofislerinin de modern standartlara uyacak şekilde iyileştirilmesi mantıklı oldu."
 MFE_workplace_events.17.f:0 "Bu kadar güzel mobilyalar imkansız sanılırdı, gerçekten harika!"
 MFE_workplace_events.17.a:0 "Üretimi teşvik et!"
 MFE_workplace_events.17.b:0 "Zenginler bu masaları çok sevecek!"
 MFE_workplace_events.18.t:0 "Fabrika Kötü Kokuyor"
 MFE_workplace_events.18.d:0 "[SCOPE.sState('stinking_state').GetName]’deki bazı yerel halk, yerel gübre fabrikasından gelen bazı emisyonlardan şikayet ediyor. Yerel bütçeye göre burası gül gibi koksa da, son zamanlarda yerel burunlar için durum hiç de iyi değil. Çalışma sürecini değiştirecek bir yasa tasarısını destekleyebiliriz ama bu yerel sanayi patronlarını kızdırabilir."
 MFE_workplace_events.18.f:0 "Bu sabah uyandım ve sokaklara çıktım, karşılaştığım koku şimdiye kadar yaşadığım en iğrenç koku idi. Böyle berbat bir kokunun var olabileceğine inanmak zor ama bir şey kesin: Kimyasal tesisten geliyordu."
 MFE_workplace_events.18.a:0 "Üzgünüm ama mahsuller kendiliğinden büyümez."
 MFE_workplace_events.18.b:0 "Yerel kısıtlamaları düşünmeliyiz."
 MFE_workplace_events.19.t:0 "Yelkenli Patlaması"
 MFE_workplace_events.19.d:0 "Kıyı bölgelerimizden birindeki iskeleler, rıhtımlar ve kuru havuzlar çekiçlerin ve testere şarkılarının sesiyle dolu; yerel fabrika yeni yelkenli siparişlerini yetiştirmeye çalışıyor. Verimli iş süreçleri ve mükemmel ustalık sayesinde önceki yıllardan daha fazla ve kaliteli gemi üretiyorlar! Belki artık dinlenme zamanı ama gelecek her zaman belirsizdir."
 MFE_workplace_events.19.f:0 "Bu gemiler dünyanın en iyisi, sadece bakın; yelkenler güneşte parlıyor ve inanılmaz güzellikte."
 MFE_workplace_events.19.a:0 "Kutlayalım!"
 MFE_workplace_events.19.b:0 "Bir Denizcilik Okulu kur"
 MFE_workplace_events.20.t:0 "Radyo [SCOPE.sState('radio_state').GetName]"
 MFE_workplace_events.20.d:0 "İllerimizden birindeki yerel bir radyo istasyonu, [SCOPE.sState('radio_state').GetName], vericiler için radyo bileşenleri sıkıntısı yaşıyor ve durum çözülene kadar yayınlarına ara vermek zorunda kaldı. Yerel yetkililer, halkın cepheden haber alamayacağı için endişelenmesi sebebiyle hükümetin radyo bileşenlerinden bazılarını istasyona ödünç vermeyi önerdi."
 MFE_workplace_events.20.f:0 "Duydun mu, [SCOPE.sState('radio_state').GetName]’deki radyo istasyonu geçtiğimiz gün yayın yapmayı durdurdu. Şimdi savaşla ilgili neler olabileceğini kim bilir..."
 MFE_workplace_events.20.a:0 "Hiçbir şey ayıramayız"
 MFE_workplace_events.20.b:0 "Radyo bileşenlerini verelim"
 MFE_workplace_events.4.a: "Zaten çaya neden ihtiyacımız var ki?"
 robbed_tea_station_mod: "Soyulmuş Çay İstasyonu"