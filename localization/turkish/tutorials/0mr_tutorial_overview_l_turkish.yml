l_turkish:

 thriving_culture_lesson_start_tutorial_button_loc: "Öğreticiyi Başlat" #deepl:1296206908

 mr_tutorial_buttons: "Morgenröte Düğmeleri" #deepl:3232304745
 mr_tutorial_buttons_desc: "Morgenröte'deki çoğu şeye Morgenröte-Pencerelerinden erişilebilir. Bunlara kenar çubuğundaki düğmelere tıklayarak erişebilirsiniz. Şu anda bu pencereler mevcuttur:\n\n\n- #V Bilim Penceresi#!: Burada [Concept('concept_academics_academic','$concept_academics_academics$')] adresinizi, etkinliklerini, [concept_academics_progress] adresinizi ve Bilimsel Keşiflerinizi bulabilirsiniz.\n\n- #V Sanat Penceresi#!: Burada [Concept('concept_artists_artist','$concept_artists_artists$')], etkinlikleri, [concept_artistic_progress] ve [Concept('concept_artists_art_style','$concept_artists_art_styles$')] bulabilirsiniz.\n\n- #V Spor Penceresi#!: Burada çeşitli sporlar ve sporla ilgili karakterlerin yanı sıra havacılık, faaliyetleri ve Uluslararası Spor Organizasyonlarını bulabilirsiniz." #deepl:3017682288

 mr_tutorial_science_window_open: "Bilim Penceresini Açın" #deepl:734722697
 mr_tutorial_science_window_open_desc: "Şimdi bilim penceresine daha yakından bakacağız. Düğmeye tıklayarak veya klavyenizdeki \"M\" tuşuna basarak bilim penceresini açın." #deepl:1849505402
 mr_tutorial_science_window_open_tt: "Bilim düğmesine tıklayarak veya \"M\" tuşuna basarak bilim penceresini açın" #deepl:1188172678

 mr_tutorial_science_tab: "Bilim Penceresi" #deepl:1054166281
 mr_tutorial_science_tab_desc: "Bilim penceresi, bilimsel çalışmalarınız için bilgi ve eylemleri bulabileceğiniz yerdir.\n\n\n4 sekmeye ayrılmıştır:\n\n- #V Genel Bakış#!: Bu sekme [concept_academics_progress], #V Genel Bilimsel Keşifler#! ve #V Bilimsel Odak#!\n\n- #V Matematiksel-Teknik#!: Bu sekme [concept_gaudi_engineer], [concept_mendelejew_chemist] ve [concept_verrier_astronomer]\n\n- #V Beşeri Bilimler-Antropolojik#! içerir: Bu sekme [concept_panum_physician], [concept_lepsius_archaeologist] ve [concept_lepsius_anthropologist]\n\n- [concept_dubois_natural_history]: Bu sekme [concept_agassiz_geologist], [concept_dubois_paleontologist] ve [concept_dubois_naturalist]\n\n- #V Beşeri Bilimler-Antropolojik#!: Bu sekme [concept_panum_physician], [concept_lepsius_archaeologist] ve [concept_lepsius_anthropologist]" #deepl:271317186
 mr_tutorial_science_tab_tt: "Bilim penceresi açılır" #deepl:3571747254

 mr_tutorial_science_overview_tab_open: "Genel Bakış Sekmesini Açın" #deepl:2171973784
 mr_tutorial_science_overview_tab_open_desc: "Genel Bakış sekmesi [concept_academics_progress], #V Genel Bilimsel Keşifler#! ve #V Bilimsel Odak#! sayfalarına erişmenizi sağlar \n\Sekme düğmesine tıklayarak Genel Bakış sekmesine gidin." #deepl:3801100877
 mr_tutorial_science_overview_tab_open_tt: "Sekme düğmesine tıklayarak Genel Bakış sekmesine gidin." #deepl:583115154

 mr_tutorial_science_overview_tab_promote_academics: "Akademisyenleri Teşvik Etmek" #deepl:3127848749
 mr_tutorial_science_overview_tab_promote_academics_desc: "Morgenröte'nin kalbi karakterlerdir. Ama bu karakterleri nasıl elde edersiniz? Yeni bir [concept_academics_academic] elde etmek için yeterince [concept_academics_progress] kazanmanız gerekir. İlerleme kazanımını hangi faktörlerin etkilediğini görmek için ilerleme çubuğunun üzerine gelebilirsiniz.\n\nBelirli bir Akademisyeni [concept_academics_university_specialization] ile bir Üniversiteniz varsa tanıtabilirsiniz.\n\nAkademik İlerlemeyi daha hızlı kazanmak için para da yatırabilirsiniz.\n\n\nAlternatif olarak, bilimsel olarak en gelişmiş ülkelere ait olmayan bir ulus iseniz, etkinliklerle veya diplomatik bir eylemle bir tane satın alarak Akademisyen alabilirsiniz." #deepl:3334402372

 mr_tutorial_science_overview_tab_scientific_focus: "Bilimsel Odak" #deepl:4254522642
 mr_tutorial_science_overview_tab_scientific_focus_desc: "Bazen belirli bir araştırma türüne odaklanmak isteyebilirsiniz. Gereksinimlerini karşılıyorsanız bilimsel odakları kullanabilirsiniz. Temel olarak belirli teknoloji gruplarının araştırmalarını teşvik edecek ve diğerlerinin verimliliğini azaltacaklardır." #deepl:2966516010

 mr_tutorial_science_overview_tab_scientific_expedition: "Bilimsel Keşif Gezileri" #deepl:3527687538
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "Bilimsel Keşif Gezileri, ülkenizin başlatabileceği Keşif Gezileridir. Keşif gezisinin türüne bağlı olarak bu, ülkeniz için büyük nimetlere yol açabilir.\n\nŞu anda şu Keşif Gezileri mevcuttur:\n- [concept_dubois_pacific_expedition]\n- [concept_verrier_venus_transit] Keşif Gezisi\n- Kuzeybatı Geçidini Bulma Keşif Gezisi\n- Zeplin Keşif Gezisi\n- Transatlantik Kablo Döşeme Keşif Gezisi" #deepl:413711623

 mr_tutorial_science_natural_history_tab_open: "Doğa Tarihi Sekmesini Açın" #deepl:1440158592
 mr_tutorial_science_natural_history_tab_open_desc: "Şimdi [Concept('concept_academics_academic','$concept_academics_academics$')] adresinden birine göz atalım. Devam etmek için Doğa Tarihi Sekmesini açın." #deepl:3933847545
 mr_tutorial_science_natural_history_tab_open_tt: "Sekme düğmesine tıklayarak Doğa Tarihi sekmesine gidin." #deepl:1038657530

 mr_tutorial_science_natural_history_tab_character: "Akademisyenler" #deepl:1408513918
 mr_tutorial_science_natural_history_tab_character_desc: "Morgenröte'nin kalbi karakterleridir. Bilim sekmesinde bu karakterler [Concept('concept_academics_academic','$concept_academics_academics$')].\n\nHer yeni karakter rolünün sol tarafında Akademisyeninizin bir portresini ve onlar hakkında ek bilgileri görebilirsiniz." #deepl:1020069787

 mr_tutorial_science_natural_history_tab_character_rating: "Karakter Değerlendirmesi" #deepl:3205270775
 mr_tutorial_science_natural_history_tab_character_rating_desc: "Çoğu karakter için isimlerinin yanında küçük bir simge bulacaksınız. Bu simge, rolleri için uygunluklarını gösterir. Simgenin üzerine gelerek bu derecelendirmeyi hangi faktörlerin etkilediğini görebilirsiniz.\n\nSimgelerin açıklaması:\n@mr_rating_fantastic!  Mükemmel\n@mr_rating_very_good!  Çok İyi\n@mr_rating_good!  İyi\n@mr_rating_mediocre!  Vasat\n@mr_rating_bad!  Bad\n@mr_rating_very_bad!  Çok Kötü" #deepl:2393422146

 mr_tutorial_science_natural_history_tab_character_experience_bar: "Karakter Deneyimi" #deepl:356262571
 mr_tutorial_science_natural_history_tab_character_experience_bar_desc: "Her karakterin kendi uzmanlık alanında [concept_academics_experience] vardır. Deneyim ne kadar yüksekse, karakter çeşitli görevlerde o kadar iyi performans gösterir.\n\nDeneyim her yıl pasif olarak kazanıldığı gibi, görevleri tamamlayarak ve başarı elde ederek aktif olarak da kazanılır. [Concept('concept_academics_academic','$concept_academics_academics$')] 100 (deneyimli) ve 300 (ünlü) deneyime ulaştıklarında daha yüksek özellikler kazanırlar." #deepl:4293324584

 mr_tutorial_science_natural_history_tab_character_achievements: "Karakter Başarıları" #deepl:2935735490
 mr_tutorial_science_natural_history_tab_character_achievements_desc: "[Concept('concept_academics_academic','$concept_academics_academics$')] bazen etkileyici işler başarırlar. Bu simgenin üzerine gelerek akademisyeninizin şimdiye kadar neler başardığını her zaman kontrol edebilirsiniz." #deepl:1195783621

 mr_tutorial_science_natural_history_tab_currencies: "Disiplinler ve Değerler" #deepl:1384869411
 mr_tutorial_science_natural_history_tab_currencies_desc: "Morgenröte'deki çoğu karakterin kendilerine atfedilmiş değerleri vardır. Bu değerler her akademisyenin ortasında gösterilir. Örneğin Jeoloji için, kaç tane mineral bulunduğunu veya ne kadar jeolojik bilgiye sahip olduğunuzu göreceksiniz.\n\nÇoğu zaman belirli değerlerin üzerine gelerek onlar hakkında daha fazla bilgi edinebilirsiniz." #deepl:4066533914

 mr_tutorial_science_natural_history_visit_button: "Düğmeyi Ziyaret Et" #deepl:3858963492
 mr_tutorial_science_natural_history_visit_button_desc: "Çoğu [Concept('concept_academics_academic','$concept_academics_academics$')] adresinde, size bu belirli akademi hakkında daha fazla bilgi veren özel ziyaret düğmeleri bulunur.\n\n Örneğin [concept_dubois_naturalist] adresinde, Hayvanat Bahçesi hayvanları hakkında daha fazla bilgi edinebileceğiniz Hayvanat Bahçesini ziyaret etmek için bir düğme bulunur." #deepl:1189517097

 mr_tutorial_science_natural_history_ranking: "Sıralama" #deepl:4181663012
 mr_tutorial_science_natural_history_ranking_desc: "Belki de kendinizi diğer ülkelerle kıyaslamaktan hoşlanıyorsunuz. Bu durumda sıralama sizin için ilginç olabilir. Bu simgenin üzerine geldiğinizde Morgenröte'nin belirli bir alanında diğer ülkelere kıyasla ne kadar iyi durumda olduğunuzu görmenizi sağlayan çeşitli listeler görebilirsiniz.\n\nÖrneğin [concept_agassiz_geologist] Jeolojik Puanınızı, Jeolojik Bilginizi, Okyanus Bilginizi, Minerallerinizi ve Nadir Minerallerinizi karşılaştırmanıza olanak tanır." #deepl:394625426

 mr_tutorial_science_natural_history_project_buttons: "Proje Düğmeleri ve diğer Düğmeler" #deepl:430248338
 mr_tutorial_science_natural_history_project_buttons_desc: "Arayüzün bu kısmı sizin için en önemli kısımlardan biridir. [Concept('concept_academics_academic','$concept_academics_academics$')] 'unuzu projelerle görevlendirmenize ve diğer önemli etkileşimleri başlatmanıza olanak tanır.\n\nBir [concept_agassiz_geologist] keşif gezilerine çıkabilir, endüstrilerinizi geliştirebilir, dünyanın yaşını yeniden hesaplayabilir ve bir mineral dolabı kurabilir veya Kıtasal Sürüklenme üzerine bir kongre başlatabilirsiniz." #deepl:2696053152

 mr_tutorial_science_natural_history_view_switch_buttons: "Düzeni Değiştirin" #deepl:1671308253
 mr_tutorial_science_natural_history_view_switch_buttons_desc: "Daha yoğun bir arayüz tercih ederseniz, bu düğmeyi kullanarak arayüzün görünümünü değiştirebilirsiniz. Oyunun kendisi için hangi varyantı kullandığınız önemli değildir. Bu yüzden, daha çok sevdiğiniz varyantı seçin." #deepl:2800918764

 mr_start_culture_tutorial_button_loc: "Kültür Eğitimi" #deepl:231585177
 mr_tutorial_not_yet_implemented_tt: "Bu Eğitim henüz hazır değildir." #deepl:1971937521

 mr_tutorial_arts_window_open: "Sanat Penceresini Açın" #deepl:2590280325
 mr_tutorial_arts_window_open_desc: "Şimdi sanat penceresine daha yakından bakacağız. Sanat penceresini düğmeye tıklayarak veya klavyenizdeki \"Ctrl + A\" tuşlarına basarak açın." #deepl:53394483
 mr_tutorial_arts_window_open_tt: "Bilim düğmesine tıklayarak veya \"Ctrl + A\" tuşlarına basarak sanat penceresini açın" #deepl:2950751548

 mr_tutorial_arts_tab: "Sanat Sekmesi" #deepl:2793588649
 mr_tutorial_arts_tab_desc: "Sanat, 19. ve 20. yüzyılın önemli bir parçasıydı. Bu dönemin büyük [Concept('concept_artists_artist','$concept_artists_artists$')] bugün hala iyi bilinmektedir.\n\nMorgenröte çeşitli Sanatçılar ve onların sanat eserlerini sunmaktadır.\n\nSanat penceresinin kendisi iki sekmeye sahiptir. Biri ülkenizdeki Sanatlara genel bir bakış sağlarken, diğerinde sanatçılarınızı bulabilir ve yabancı ülkelerden sanatçıları işe alabilirsiniz." #deepl:543699742

 mr_tutorial_arts_tab_cultural_tradition: "Kültürel Gelenek" #deepl:3268694731
 mr_tutorial_arts_tab_cultural_tradition_desc: "Kültürel Gelenek, ülkenizin kültürel başarılarını temsil eden bir değerdir.\n [concept_elgar_musical_tradition], [concept_manzoni_literary_tradition] ve [concept_klimt_painting_tradition] adreslerinden oluşur.\n\nKültürel Gelenek şu formül kullanılarak hesaplanır:\nMüzikal Gelenek / 4 + Resim Geleneği / 3 + Edebi Gelenek / 2\n\nSanat Geleneğinizden ayrıca [concept_prestige] kazanacaksınız. Her 5 Sanat Geleneği puanı 1 ek Prestij kazandıracaktır." #deepl:3774927584
 mr_tutorial_arts_overview_tab_open_tt: "Sanatlara Genel Bakış Sekmesini Açın" #deepl:3810726030

 mr_tutorial_arts_tab_artist_progress: "Sanatçı İlerlemesi" #deepl:61174778
 mr_tutorial_arts_tab_artist_progress_desc: "Yeni [Concept('concept_artists_artist','$concept_artists_artists$')] 'u farklı yollarla elde edebilirsiniz: Onları işe alabilir, etkinliklerle veya yeterince [concept_artistic_progress] toplayarak kazanabilirsiniz.\n\nEtkinlikler ve işe alma her ulus için mümkün olmasa da, bir $building_elgar_opera$ veya $building_arts_academy$ sahibi olduğunuzda Sanatsal İlerleme çubuğunu doldurarak sanatçı kazanmak mümkündür.\nİlerleme çubuğunun üzerine gelerek aylık kazancı etkileyen faktörlerin tam listesini görebilirsiniz.\n\nEk olarak, $building_arts_academy$ adresinizde gerekli [concept_production_method] varsa, daha fazla ilerleme kaydetmek ve belirli sanatçıları terfi ettirmek için Sanatı Himaye edebilirsiniz." #deepl:1108726132

 mr_tutorial_arts_tab_center_of_arts: "Sanat Merkezi" #deepl:4265095628
 mr_tutorial_arts_tab_center_of_arts_desc: "[Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] bir [concept_artists_art_style] 'un doğduğu yerlerdir.\n Bazı Sanat Merkezleri oyun başladığında zaten mevcuttur. Diğerlerinin kilidi [Concept('concept_journal_entry','$concept_journal_entries$')] tarafından veya burada görebileceğiniz düğmelerden birine basılarak açılabilir. Nasıl elde edebileceğinizi görmek için Sanat Merkezinin üzerine gelin.\n\nAçıkçası, Sanat Merkezleri size bonuslara erişim sağladıkları için siz ve ülkeniz için yararlıdır." #deepl:1287628103

 mr_tutorial_arts_tab_artists_tab_open: "Sanatçılar Sekmesini Açın" #deepl:974477655
 mr_tutorial_arts_tab_artists_tab_open_desc: "Şimdi [Concept('concept_artists_artist','$concept_artists_artists$')] adresine daha yakından bakalım.\n\nSekme düğmesine tıklayarak Sanatçılar Sekmesini açın." #deepl:391030067
 mr_tutorial_arts_tab_artists_tab_open_open_tt: "Sanatçılar Sekmesini Açın" #deepl:974477655

 mr_tutorial_arts_tab_artists: "Sanatçılar Sekmesi" #deepl:1211285969
 mr_tutorial_arts_tab_artists_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')], Akademisyenlere oldukça benziyor, ancak biraz farklı çalışıyorlar.\n\nŞu anda 3 Sanatçı var:\n- [concept_elgar_composer]\n- [concept_manzoni_writer]\n- [concept_klimt_painter]" #deepl:124747602

 mr_tutorial_arts_tab_artists_invite: "Sanatçıları Davet Etmek" #deepl:1648609371
 mr_tutorial_arts_tab_artists_accquisation_desc: "Daha önce de belirttiğimiz gibi, [Concept('concept_artists_artist','$concept_artists_artists$')] sadece yeterince [concept_artistic_progress] kazanarak değil, aynı zamanda onları davet ederek de elde edilebilir.\n\nHer Sanatçı türünün farklı gereksinimleri vardır. Dünyanın her yerinden [Concept('concept_elgar_travelling_composer','$concept_elgar_travelling_composers$')] davet edebilirsiniz, ancak yeterli sayıda $building_elgar_opera$ve yeterince iyi bir [concept_elgar_musical_tradition] olan bir ülke olmanız gerekir.\n\n[Concept('concept_klimt_independent_painter','$concept_klimt_independent_painters$')] yalnızca benzer bir kültüre sahiplerse davet edilebilir.\n\n Öte yandan[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] hiç davet edilemez." #deepl:2127803597

 mr_tutorial_arts_tab_artists_character: "Genel Bilgiler" #deepl:995936974
 mr_tutorial_arts_tab_artists_character_desc: "Pencerenin en sol kısmı sanatçınızla ilgili bazı temel bilgileri gösterir.\n\nBurada şunları görebilirsiniz:\n-Portre\n-İsim ve Derecelendirme\n- [concept_artists_experience]\n- Sanatçının [Concept('concept_character_trait','$concept_character_traits$')]" #deepl:1445240346

 mr_tutorial_arts_tab_artists_currencies: "Önemli Sanat Değerleri" #deepl:71895904
 mr_tutorial_arts_tab_artists_currencies_desc: "Arayüzün bu bölümü, sanatın bu özel yönüyle ilgili genel bilgileri görmenizi sağlar.\n [concept_elgar_composer] için [concept_elgar_musical_tradition], Bestecinizin Besteleri ve Başyapıtları ve örneğin dünyanın en iyi beş Bestecisine genel bir bakış görüntülenir.\n\nAyrıca sağ üst köşedeki küçük simgenin üzerine geldiğinizde bir Sıralama bulabilirsiniz." #deepl:1891899818

 mr_tutorial_arts_tab_artists_actions: "Sanatçı Eylemleri" #deepl:2320930103
 mr_tutorial_arts_tab_artists_actions_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] eylemleri de vardır. Burada Sanatçılarınızın ne üzerinde çalışabileceğini veya ulusunuzla hangi kararları alabileceğinizi görebilirsiniz.\n\nSanatçılarla ilgili en önemli bilgiler bunlardı. Spor Öğreticisine buradan devam edebilir veya oyununuza devam edebilirsiniz." #deepl:746856108
 mr_start_sports_tutorial_button_loc: "Spor Eğitimi" #deepl:826655861

 mr_tutorial_sports_window_open: "Spor Penceresini Açın" #deepl:1830514457
 mr_tutorial_sports_window_open_desc: "Şimdi spor penceresine daha yakından bakacağız. Düğmeye tıklayarak veya klavyenizdeki \"Ctrl + S\" tuşlarına basarak spor penceresini açın." #deepl:243246943
 mr_tutorial_sports_window_open_tt: "Bilim düğmesine tıklayarak veya \"Ctrl + S\" tuşlarına basarak spor penceresini açın" #deepl:1482293542

 mr_tutorial_sports_window: "Spor Penceresi" #deepl:4243980162
 mr_tutorial_sports_window_desc: "Spor Penceresi, tüm farklı sporlara ve sporlarla ilgili karakterlere erişmenizi sağlar.\n\nPencere normal sporlar ve Havacılık olarak ayrılmıştır.\n\nNormal Sporlar şunları içerir:\n- [concept_vikelas_olympic_games]\n- [concept_dubois_mountaineering]\n- Top Sporları\n- [concept_vikelas_car_racing]\n\nHavacılık şunları içerir:\n- [concept_curtiss_balloonist]\n- [concept_curtiss_pilot]" #deepl:2523227399

 mr_tutorial_sports_tab: "Spor Sekmesi" #deepl:2701935579
 mr_tutorial_sports_tab_desc: "Spor Sekmesi size sporla ilgili çeşitli faaliyetler ve karakterler hakkında genel bir bakış sunar.\nAkademisyenler ve Sanatçıların aksine, spor sekmesindeki karakterler genellikle sadece generaller veya politikacılardır." #deepl:1383542418
 mr_tutorial_sports_tab_open_tt: "Spor Sekmesini Açın" #deepl:176871982

 mr_tutorial_sports_tab_character_overview: "Karaktere Genel Bakış" #deepl:96645084
 mr_tutorial_sports_tab_character_overview_desc: "Kullanıcı arayüzünün bu kısmı size [concept_character] hakkında genel bir bakış sunar.\n\n [concept_vikelas_coach] ve Araba Yarışçısı gibi bazı Karakterler elde edebileceğiniz karakterlerdir ve bu nedenle [concept_academics_experience]'a sahiptirler. Dağcı gibi diğerlerinin Deneyimi yoktur." #deepl:1695633540

 mr_tutorial_sports_tab_currencies: "Değerler ve Bilgiler" #deepl:2440189283
 mr_tutorial_sports_tab_currencies_desc: "Ortada bu spora ilişkin önemli bilgileri görebilirsiniz.\n\nÖrneğin [concept_vikelas_olympic_games] adresinde [concept_vikelas_ioc] Başkanı ve Yönetim Kurulu, kaç üye olduğu ve şu ana kadar kaç madalya topladığınıza dair genel bir bilgi yer almaktadır." #deepl:1125108675

 mr_tutorial_sports_tab_actions: "Eylemler" #deepl:1951990429
 mr_tutorial_sports_tab_actions_desc: "Sağ taraf, o spor için belirli eylemleri gerçekleştirmenize olanak tanır.\nBu Eylemler temel olarak [Concept('concept_character', '$concept_characters$')] adresinizi kullanmanıza veya [concept_vikelas_ioc] gibi yeni bir şey oluşturmanıza olanak tanıyan kararlardır." #deepl:2455654735

 mr_tutorial_sports_tab_aeronautics_tab_open: "Havacılık Sekmesini Açın" #deepl:2120346894
 mr_tutorial_sports_tab_aeronautics_tab_open_desc: "Şimdi Havacılık Sekmesine daha yakından bakalım. Düğmeye tıklayarak Sekmeyi açın." #deepl:2671641916
