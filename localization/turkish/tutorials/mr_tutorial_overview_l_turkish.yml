l_turkish:
 thriving_culture_lesson_start_tutorial_button_loc: "Eğitimi Başlat"
 mr_tutorial_buttons: "Morgenröte Düğmeleri"
 mr_tutorial_buttons_desc: "Morgenröte'deki çoğu şeye Morgenröte Pencerelerinden erişilebilir. Bunlara kenar çubuğundaki düğmelere tıklayarak erişebilirsiniz. Şu anda şu pencereler mevcut:\n\n\n- #V Bilim Penceresi#!: Burada [Concept('concept_academics_academic','$concept_academics_academics$')]lerinizi, faaliyetlerini, [concept_academics_progress]unuzu ve Bilimsel Keşiflerinizi bulabilirsiniz.\n\n- #V Sanat Penceresi#!: Burada [Concept('concept_artists_artist','$concept_artists_artists$')]lerinizi, faaliyetlerini, [concept_artistic_progress]unuzu ve [Concept('concept_artists_art_style','$concept_artists_art_styles$')]lerini bulabilirsiniz.\n\n- #V Spor Penceresi#!: Burada çeşitli sporları ve sporla ilgili karakterleri, havacılık faaliyetlerini ve Uluslararası Spor Organizasyonlarını bulabilirsiniz."
 mr_tutorial_science_window_open: "Bilim Penceresini Aç"
 mr_tutorial_science_window_open_desc: "Şimdi bilim penceresine daha yakından bakacağız. Bilim penceresini açmak için düğmeye tıklayın veya klavyenizdeki \"M\" tuşuna basın."
 mr_tutorial_science_window_open_tt: "Bilim penceresini açmak için bilim düğmesine tıklayın veya \"M\" tuşuna basın"
 mr_tutorial_science_tab: "Bilim Penceresi"
 mr_tutorial_science_tab_desc: "The science window is the place where you can find information and actions for your scientific endeavours.\n\n\nIt is seperated in 4 tabs:\n\n- #V Overview#!: This tab contains [concept_academics_progress], #V General Scientific Expeditions#! and the #V Scientific Focus#!\n\n- #V Mathematical-Technical#!: This tab contains the [concept_tesla_engineer], [concept_mendelejew_chemist] and [concept_verrier_astronomer]\n\n- [concept_dubois_natural_history]: This tab contains the [concept_agassiz_geologist], [concept_dubois_paleontologist] and [concept_dubois_naturalist]\n\n- #V Humanities-Anthropological#!: This tab contains the [concept_panum_physician], [concept_lepsius_archaeologist] and [concept_lepsius_anthropologist]"
 mr_tutorial_science_tab_tt: "Bilim penceresi açıldı"
 mr_tutorial_science_overview_tab_open: "Genel Bakış Sekmesini Aç"
 mr_tutorial_science_overview_tab_open_desc: "Genel Bakış sekmesi, [concept_academics_progress]a, #V Genel Bilimsel Keşifler#!e ve #V Bilimsel Odak#!a erişmenizi sağlar.\n\nSekme düğmesine tıklayarak Genel Bakış sekmesine gidin."
 mr_tutorial_science_overview_tab_open_tt: "Sekme düğmesine tıklayarak Genel Bakış sekmesine gidin."
 mr_tutorial_science_overview_tab_promote_academics: "Akademisyen Yetiştirme"
 mr_tutorial_science_overview_tab_promote_academics_desc: "Morgenröte'nin kalbi karakterlerdir. Peki bu karakterleri nasıl elde edersiniz?\n\nYeni bir [concept_academics_academic] elde etmek için yeterli [concept_academics_progress] kazanmanız gerekir. İlerleme kazanımını hangi faktörlerin etkilediğini görmek için ilerleme çubuğunun üzerine gelebilirsiniz.\n\nBir [concept_academics_university_specialization] olan bir Üniversiteniz varsa belirli bir Akademisyen yetiştirebilirsiniz.\n\nAyrıca Akademik İlerleme kazanımını hızlandırmak için para yatırabilirsiniz.\n\n\nAlternatif olarak, olaylarla Akademisyenler elde edebilir veya bilimsel olarak en gelişmiş ülkelerden biri değilseniz diplomatik bir eylemle satın alabilirsiniz."
 mr_tutorial_science_overview_tab_scientific_focus: "Bilimsel Odak"
 mr_tutorial_science_overview_tab_scientific_focus_desc: "Bazen belirli bir araştırma türüne odaklanmak isteyebilirsiniz. Gerekli şartları sağlıyorsanız bilimsel odakları kullanabilirsiniz. Bunlar temel olarak belirli teknoloji gruplarının araştırmasını teşvik eder ve diğerlerinin verimliliğini azaltır."
 mr_tutorial_science_overview_tab_scientific_expedition: "Bilimsel Keşifler"
 mr_tutorial_science_overview_tab_scientific_expedition_desc: "Bilimsel Keşifler, ülkenizin başlatabileceği keşiflerdir. Keşif türüne bağlı olarak bu, ülkeniz için büyük faydalara yol açabilir.\n\nŞu anda şu Keşifler mevcut:\n- [concept_dubois_pacific_expedition]\n- [concept_verrier_venus_transit] Keşfi\n- Kuzeybatı Geçidi'ni bulma Keşfi\n- Zeplin Keşfi\n- Transatlantik Kablo döşeme Keşfi"
 mr_tutorial_science_natural_history_tab_open: "Doğa Tarihi Sekmesini Aç"
 mr_tutorial_science_natural_history_tab_open_desc: "Şimdi [Concept('concept_academics_academic','$concept_academics_academics$')]lerden birine göz atalım. Devam etmek için Doğa Tarihi Sekmesini açın."
 mr_tutorial_science_natural_history_tab_open_tt: "Sekme düğmesine tıklayarak Doğa Tarihi sekmesine gidin."
 mr_tutorial_science_natural_history_tab_character: "Akademisyenler"
 mr_tutorial_science_natural_history_tab_character_desc: "Morgenröte'nin kalbi karakterleridir. Bilim sekmesinde bu karakterler [Concept('concept_academics_academic','$concept_academics_academics$')]lerdir.\n\nHer yeni karakter rolünün sol tarafında, Akademisyeninizin bir portresini ve onlar hakkında ek bilgileri görebilirsiniz."
 mr_tutorial_science_natural_history_tab_character_rating: "Karakter Değerlendirmesi"
 mr_tutorial_science_natural_history_tab_character_rating_desc: "Çoğu karakter için adlarının yanında küçük bir simge bulacaksınız. Bu simge, rollerine olan yatkınlıklarını gösterir. Bu derecelendirmeyi hangi faktörlerin etkilediğini görmek için simgenin üzerine gelebilirsiniz.\n\nSimgelerin açıklaması:\n@mr_rating_fantastic!  Mükemmel\n@mr_rating_very_good!  Çok İyi\n@mr_rating_good!  İyi\n@mr_rating_mediocre!  Vasat\n@mr_rating_bad!  Kötü\n@mr_rating_very_bad!  Çok Kötü"
 mr_tutorial_science_natural_history_tab_character_experience_bar: "Karakter Deneyimi"
 mr_tutorial_science_natural_history_tab_character_experience_bar_desc: "Her karakterin uzmanlık alanında [concept_academics_experience] bulunur. Deneyim ne kadar yüksekse, karakter çeşitli görevlerde o kadar iyi performans gösterir.\n\nDeneyim her yıl pasif olarak ve ayrıca görevleri tamamlayarak ve başarı elde ederek aktif olarak kazanılır. [Concept('concept_academics_academic','$concept_academics_academics$')]ler 100 (deneyimli) ve 300 (ünlü) deneyime ulaştıklarında daha yüksek özellikler kazanırlar."
 mr_tutorial_science_natural_history_tab_character_achievements: "Karakter Başarıları"
 mr_tutorial_science_natural_history_tab_character_achievements_desc: "[Concept('concept_academics_academic','$concept_academics_academics$')]ler bazen etkileyici başarılar elde ederler. Akademisyeninizin şu ana kadar neler başardığını bu simgenin üzerine gelerek her zaman kontrol edebilirsiniz."
 mr_tutorial_science_natural_history_tab_currencies: "Keşifler ve Değerler"
 mr_tutorial_science_natural_history_tab_currencies_desc: "Morgenröte'deki çoğu karakterin ilişkili değerleri vardır. Bu değerler her akademisyenin merkezinde görüntülenir. Jeoloji için örneğin kaç mineral bulunduğunu veya ne kadar jeolojik bilgiye sahip olduğunuzu görebilirsiniz.\n\nÇoğu zaman belirli değerler hakkında daha fazla bilgi edinmek için üzerlerine gelebilirsiniz."
 mr_tutorial_science_natural_history_visit_button: "Ziyaret Düğmesi"
 mr_tutorial_science_natural_history_visit_button_desc: "Çoğu [Concept('concept_academics_academic','$concept_academics_academics$')]ın, bu spesifik akademisyen hakkında daha fazla bilgi veren özel ziyaret düğmeleri vardır.\n\nÖrneğin [concept_dubois_naturalist]ın, Hayvanat Bahçesi hakkında daha fazla bilgi edinebileceğiniz bir hayvanat bahçesini ziyaret etme düğmesi vardır."
 mr_tutorial_science_natural_history_ranking: "Sıralama"
 mr_tutorial_science_natural_history_ranking_desc: "Belki kendinizi diğer ülkelerle karşılaştırmayı seviyorsunuzdur. Bu durumda sıralama sizin için ilginç olabilir. Bu simgenin üzerine gelmek, Morgenröte'nin belirli bir yönünde diğer uluslara kıyasla ne kadar iyi durumda olduğunuzu görmenizi sağlayan çeşitli listeleri görüntülemenize olanak tanır.\n\nÖrneğin [concept_agassiz_geologist], Jeolojik Skorunuzu, Jeolojik Bilginizi, Okyanus Bilginizi, Minerallerinizi ve Nadir Minerallerinizi karşılaştırmanıza olanak tanır."
 mr_tutorial_science_natural_history_project_buttons: "Proje Düğmeleri ve Diğer Düğmeler"
 mr_tutorial_science_natural_history_project_buttons_desc: "Arayüzün bu kısmı sizin için en önemli kısımlardan biridir. [Concept('concept_academics_academic','$concept_academics_academics$')]larınızı projelerle görevlendirmenize ve diğer önemli etkileşimleri başlatmanıza olanak tanır.\n\nBir [concept_agassiz_geologist] keşiflere çıkabilir, endüstrilerinizi geliştirebilir, dünyanın yaşını yeniden hesaplayabilir ve bir mineral kabinesi kurabilir veya Kıtasal Sürüklenme üzerine bir kongre başlatabilirsiniz."
 mr_tutorial_science_natural_history_view_switch_buttons: "Düzeni Değiştir"
 mr_tutorial_science_natural_history_view_switch_buttons_desc: "Daha yoğun bir arayüzü tercih ediyorsanız, bu düğmeyi kullanarak görünümünü değiştirebilirsiniz. Oyunun kendisi için hangi varyantı kullandığınız önemli değildir. Bu yüzden, daha çok beğendiğiniz varyantı seçin."
 mr_start_culture_tutorial_button_loc: "Kültür Eğitimi"
 mr_tutorial_not_yet_implemented_tt: "Bu Eğitim henüz hazır değil."
 mr_tutorial_arts_window_open: "Sanat Penceresini Aç"
 mr_tutorial_arts_window_open_desc: "Şimdi sanat penceresine daha yakından bakacağız. Sanat penceresini açmak için düğmeye tıklayın veya klavyenizdeki \"Ctrl + A\" tuşlarına basın."
 mr_tutorial_arts_window_open_tt: "Sanat penceresini açmak için sanat düğmesine tıklayın veya \"Ctrl + A\" tuşlarına basın"
 mr_tutorial_arts_tab: "Sanat Sekmesi"
 mr_tutorial_arts_tab_desc: "Sanat, 19. ve 20. yüzyılın önemli bir parçasıydı. Bu dönemin büyük [Concept('concept_artists_artist','$concept_artists_artists$')]leri bugün hala iyi bilinmektedir.\n\nMorgenröte çeşitli türlerde Sanatçılar ve onların sanat eserlerini sunar.\n\nSanat penceresinin kendisinde iki sekme bulunur. Biri ülkenizdeki Sanatlar hakkında bir genel bakış sunar, diğerinde ise sanatçılarınızı bulabilir ve yabancı ülkelerden sanatçılar işe alabilirsiniz."
 mr_tutorial_arts_tab_cultural_tradition: "Kültürel Gelenek"
 mr_tutorial_arts_tab_cultural_tradition_desc: "Kültürel Gelenek, ülkenizin kültürel başarılarını temsil eden bir değerdir.\n[concept_elgar_musical_tradition], [concept_manzoni_literary_tradition] ve [concept_klimt_painting_tradition]dan oluşur.\n\nKültürel Gelenek şu formül kullanılarak hesaplanır:\nMüzikal Gelenek / 4 + Resim Geleneği / 3 + Edebi Gelenek / 2\n\nAyrıca Sanat Geleneğinizden [concept_prestige] kazanacaksınız. Her 5 Sanat Geleneği puanı, 1 ek Prestij sağlayacaktır."
 mr_tutorial_arts_overview_tab_open_tt: "Sanat Genel Bakış Sekmesini Aç"
 mr_tutorial_arts_tab_artist_progress: "Sanatçı İlerlemesi"
 mr_tutorial_arts_tab_artist_progress_desc: "You can get new [Concept('concept_artists_artist','$concept_artists_artists$')] by different means: You can recruit them, gain them with events or by collecting enough [concept_artistic_progress].\n\nWhile events and recruitment is not possible for every nation, gaining artists by filling the Artistic Progress bar is possible once you own an $building_elgar_opera$ or an $building_art_academy$.\nYou can see a full list of factors influencing the monthly gain by hovering over the progress bar.\n\nAdditionally you can Patronize the Arts to gain more progress and promote certain artists if you have the necessary [concept_production_method] in your $building_art_academy$."
 mr_tutorial_arts_tab_center_of_arts: "Sanat Merkezleri"
 mr_tutorial_arts_tab_center_of_arts_desc: "[Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')]ler, bir [concept_artists_art_style]ın doğduğu yerlerdir.\nBazı Sanat Merkezleri oyun başında zaten mevcuttur. Diğerleri [Concept('concept_journal_entry','$concept_journal_entries$')] ile veya burada görebileceğiniz düğmelerden birine basılarak açılabilir. Nasıl elde edeceğinizi görmek için Sanat Merkezinin üzerine gelin.\n\nAçıkçası Sanat Merkezleri, size bonuslara erişim sağladıkları için sizin ve ülkeniz için faydalıdır."
 mr_tutorial_arts_tab_artists_tab_open: "Sanatçılar Sekmesini Aç"
 mr_tutorial_arts_tab_artists_tab_open_desc: "Şimdi [Concept('concept_artists_artist','$concept_artists_artists$')]lere daha yakından bakalım.\n\nSekme düğmesine tıklayarak Sanatçılar Sekmesini açın."
 mr_tutorial_arts_tab_artists_tab_open_open_tt: "Sanatçılar Sekmesini Aç"
 mr_tutorial_arts_tab_artists: "Sanatçılar Sekmesi"
 mr_tutorial_arts_tab_artists_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] Akademisyenlere oldukça benzer görünür, ancak biraz farklı çalışırlar.\n\nŞu anda 3 Sanatçı türü bulunmaktadır:\n- [concept_elgar_composer]\n- [concept_manzoni_writer]\n- [concept_klimt_painter]"
 mr_tutorial_arts_tab_artists_invite: "Sanatçıları Davet Etmek"
 mr_tutorial_arts_tab_artists_accquisation_desc: "Daha önce de belirttiğimiz gibi, [Concept('concept_artists_artist','$concept_artists_artists$')] sadece yeterli [concept_artistic_progress] kazanılarak değil, aynı zamanda davet edilerek de elde edilebilir.\n\nHer bir Sanatçı türünün farklı gereksinimleri vardır. Dünyanın her yerinden [Concept('concept_elgar_travelling_composer','$concept_elgar_travelling_composers$')] davet edebilirsiniz ancak yeterli sayıda $building_elgar_opera$s ve yeterince iyi bir [concept_elgar_musical_tradition]'a sahip bir ülke olmanız gerekir.\n\n[Concept('concept_klimt_independent_painter','$concept_klimt_independent_painters$')] ise ancak benzer bir kültüre sahiplerse davet edilebilir.\n\nÖte yandan [Concept('concept_manzoni_writer','$concept_manzoni_writers$')] hiçbir şekilde davet edilemez."
 mr_tutorial_arts_tab_artists_character: "Genel Bilgiler"
 mr_tutorial_arts_tab_artists_character_desc: "Pencerenin en sol kısmı, sanatçınız hakkında bazı temel bilgileri gösterir.\n\nBurada şunları görebilirsiniz:\n- Portre\n- İsim ve Derecelendirme\n- [concept_artists_experience]\n- [Concept('concept_character_trait','$concept_character_traits$')]"
 mr_tutorial_arts_tab_artists_currencies: "Önemli Sanat Değerleri"
 mr_tutorial_arts_tab_artists_currencies_desc: "Arayüzün bu kısmı, sanatın bu belirli alanına ilişkin genel bilgileri görmenizi sağlar.\nÖrneğin, [concept_elgar_composer] için [concept_elgar_musical_tradition]'ınızı, Bestecinizin Bestelerini ve Şaheserlerini ve dünyanın en iyi beş Bestecisine dair bir genel bakışı görüntüler.\n\nAyrıca, sağ üst köşedeki küçük simgenin üzerine geldiğinizde bir Sıralama bulabilirsiniz."
 mr_tutorial_arts_tab_artists_actions: "Sanatçı Eylemleri"
 mr_tutorial_arts_tab_artists_actions_desc: "[Concept('concept_artists_artist','$concept_artists_artists$')] da eylemlere sahiptir. Burada Sanatçılarınızın ne üzerinde çalışabileceğini veya ulusunuzla hangi kararları alabileceğinizi görebilirsiniz.\n\nBunlar Sanatçılar hakkındaki en önemli bilgilerdi. Buradan Spor Eğitimine devam edebilir veya oyununuza devam edebilirsiniz."
 mr_start_sports_tutorial_button_loc: "Spor Eğitimi"
 mr_tutorial_sports_window_open: "Spor Penceresini Aç"
 mr_tutorial_sports_window_open_desc: "Şimdi spor penceresine daha yakından bakacağız. Spor penceresini butona tıklayarak veya klavyenizde \"Ctrl + S\" tuşlarına basarak açın."
 mr_tutorial_sports_window_open_tt: "Spor penceresini açmak için bilim düğmesine tıklayın veya \"Ctrl + S\" tuşlarına basın"
 mr_tutorial_sports_window: "Spor Penceresi"
 mr_tutorial_sports_window_desc: "Spor Penceresi, tüm farklı sporlara ve sporlarla ilgili karakterlere erişmenizi sağlar.\n\nPencere normal sporlar ve Havacılık olarak ayrılmıştır.\n\nDüzenli Sporlar şunları içerir:\n- [concept_vikelas_olympic_games]\n- [concept_douglas_mountaineering]\n- Top Sporları\n- [concept_vikelas_car_racing]\n\nHavacılık şunları içerir:\n- [concept_curtiss_balloonist]\n- [concept_curtiss_pilot]"
 mr_tutorial_sports_tab: "Spor Sekmesi"
 mr_tutorial_sports_tab_desc: "Spor Sekmesi, çeşitli sporla ilgili aktiviteler ve karakterlere genel bir bakış sunar.\nAkademisyenler ve Sanatçıların aksine, spor sekmesindeki karakterler genellikle sadece generaller veya politikacılardır."
 mr_tutorial_sports_tab_open_tt: "Spor Sekmesini Aç"
 mr_tutorial_sports_tab_character_overview: "Karakter Genel Bakışı"
 mr_tutorial_sports_tab_character_overview_desc: "Kullanıcı arayüzünün bu kısmı, [concept_character] hakkında genel bir bakış sunar.\n\n[concept_vikelas_coach] ve Araba Yarışçısı gibi bazı karakterler, edinebileceğiniz karakterlerdir ve bu nedenle [concept_academics_experience]'a sahiptir. Dağcı gibi diğerleri ise Deneyime sahip değildir."
 mr_tutorial_sports_tab_currencies: "Değerler ve Bilgiler"
 mr_tutorial_sports_tab_currencies_desc: "Ortada, bu belirli sporla ilgili önemli bilgileri görebilirsiniz.\n\nÖrneğin [concept_vikelas_olympic_games], [concept_vikelas_ioc] Başkanı ve Yönetim Kurulu'na genel bir bakış, kaç üye olduğu ve şu ana kadar kaç madalya topladığınızı gösterir."
 mr_tutorial_sports_tab_actions: "Eylemler"
 mr_tutorial_sports_tab_actions_desc: "Sağ taraf, o spor için belirli eylemler gerçekleştirmenizi sağlar.\nBu Eylemler, temelde [Concept('concept_character', '$concept_characters$')] kullanmanıza veya [concept_vikelas_ioc] gibi yeni bir şey oluşturmanıza olanak tanıyan kararlardır."
 mr_tutorial_sports_tab_aeronautics_tab_open: "Havacılık Sekmesini Aç"
 mr_tutorial_sports_tab_aeronautics_tab_open_desc: "Şimdi Havacılık Sekmesine daha yakından bakalım. Sekmeyi açmak için düğmeye tıklayın."
 mr_tutorial_aeronautics_tab_open_tt: "Havacılık Sekmesini Aç"
 mr_tutorial_aeronautics_tab: "Havacılık Sekmesi"
 mr_tutorial_aeronautics_tab_desc: "Havacılık Sekmesi, çoğunlukla Spor Sekmesiyle aynı görünür.\n\nBir büyük fark, karakterlerin kendisinde yatar. [concept_curtiss_balloonist] destekleyebilir ve otomatikleştirebilirsiniz ve [concept_curtiss_pilot] çeşitli koşullar altında ortaya çıkacaktır.\n\nBu, genel bakış eğitiminin sonudur. Morgenröte'nin karakterleri hakkında daha fazla bilgi edinmek istiyorsanız lütfen Vickypedia'yı veya eklediğimiz Kavramları kullanın."
