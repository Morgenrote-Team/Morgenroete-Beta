 objective_thriving_culture_name_SWE: "İsveç"
 objective_thriving_culture_desc_SWE: "Son 100 yıl içinde İsveç, bilim alanında öncü bir ulus haline geldi; organizmaların adlandırılması için bir sistem, Celsius sıcaklık ölçeği ve kimyasal element sembolleri sistemi gibi önemli katkılar yaptı. \n   İsveç bilimdeki öncül konumunu koruyabilir mi, yoksa dikkatini kültürel alanlara mı yönlendirmeli; yazarlar ve besteciler yetiştirmeye odaklanmalı?"
