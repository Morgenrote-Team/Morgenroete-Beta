 je_mr_archaeology: "Arkeoloji"
 je_mr_archaeology_reason: "19. yüzyıl ve 20. yüzyılın başları, antik çağ araştırmalarında hızlı bir gelişmeye sahne oldu: hazine kazılarından ciddi bilime. Heinrich Schliemann’ın Truva kazısı ve Howard Carter’ın Tutankhamun mezarının keşfi, bu dönemin en ünlü iki olayıdır. Aynı zamanda, değerli eserleri kurtarmada yalnızca bilimsel merak değil, ulusal prestij de önemli bir rol oynadı. 1837'de Karl Richard Lepsius tarafından Mısır hiyerogliflerinin (neredeyse) tamamen çözülmesiyle, bu yeni çağ başlamalıydı."
 mr_romantic_composer_button: "Yeni bir [concept_elgar_composer] işe al (Romantizm)"
 mr_composer_button_desc: "[Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')] ile karşılaştırıldığında, sıradan [Concept('concept_elgar_composer','$concept_elgar_composers$')] günlük işleri yürütmekle sorumludur. Orkestra şefi olarak işe alınabilir ve ülkeye pasif bir [concept_elgar_musical_tradition] bonusu sağlar. Bir besteci oyunda üç kez işe alınabilir ve belirli bir teknolojiye (Romantizm, Rasyonellik Karşıtlığı, Neoklasizm/Yeni Nesnellik/Art Deco) sahip olunması gerekir. Bir ülke yalnızca bir sıradan besteciyi destekleyebilir ve ülkenin müzik kültürüne on yıllık bir yatırım gerekir."
 mr_wagnerian_composer_button: "Yeni bir [concept_elgar_composer] işe al (Rasyonellik Karşıtlığı)"
 mr_modern_composer_button: "Yeni bir [concept_elgar_composer] işe al (Modern)"
 mr_appoint_conductor_button: "Baş Orkestra Şefi Atayın"
 mr_appoint_conductor_button_desc: "Orkestra şefleri, özellikle ülkenin önde gelen [Concept('concept_elgar_opera','$concept_elgar_opera_house$')] kurumlarını yönetir. Opera binasında üç yıl boyunca belirli bir göreve atanabilirler: yönetmek, bestelemek veya turneye çıkmak. Bu şekilde, [Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')] ile benzerlik gösterir, ancak [concept_elgar_musical_tradition] kazançları yönetilebilir düzeyde tutulur."
 mr_national_conservatory_button: "Ulusal Konservatuvar Kur"
 mr_national_conservatory_button_desc: "Bir Konservatuvar ile, zamanla Besteci özelliğine sahip karakterlerin işe alınmadan ortaya çıkma şansı vardır. Olasılık çok küçük, ancak vardır. Şans, bir bale okulunun opera okullarından birinde olmasıyla artırılabilir."
 mr_santa_cecilia_button: "Santa Cecilia'yı Akademi Yap"
 mr_santa_cecilia_button_desc: "Accademia di Santa Cecilia, Papa VI. Sixtus tarafından 1585'te 'Ratione congruit' papalık belgesi ile bir cemiyet olarak kuruldu. 1838'de Saint Cecilia Cemiyeti resmen bir Akademi ve ardından Papalık Akademisi olarak adlandırıldı. Üyeleri arasında Luigi Cherubini, Mercadante, Donizetti, Rossini, Paganini, Auber, Liszt, Mendelssohn, Berlioz, Gounod ve Meyerbeer bulunuyordu. Onursal üyelerinden biri Kraliçe Victoria idi. Birleşik İtalya’da önde gelen bir konservatuvara dönüştü."
 mr_leipzig_conservatory_button: "Leipzig Konservatuvarını Kur"
 mr_leipzig_conservatory_button_desc: "Johann Sebastian Bach’ın aktif olduğu geleneksel müzik şehri Leipzig, 19. yüzyılın başında müzikal ve akademik yetenek fabrikasının kurulması için optimal koşullar sundu. Şehrin dört özverili vatandaşı: avukat Heinrich Conrad Schleinitz (ikinci müdür), Leipzig ilçe müdürü Johann Paul von Falkenstein, Kraliyet Sakson Mahkeme Konseyi üyesi Johann Georg Keil ve Gewandhaus Kapellmeister Felix Mendelssohn Bartholdy, önceki fikirleri hayata geçirdi."
 mr_petrograd_conservatory_button: "Petrograd Konservatuvarını Kur"
 mr_petrograd_conservatory_button_desc: "Büyük Düşes Elena Pavlovna'nın girişimiyle, Anton Rubinstein, Andrei Nikolayevich Markovich ve toplum ve müzik yaşamından diğer kişiler tarafından Rus Müzik Derneği kuruldu ve bu dersten Rusya'nın ilk konservatuvarı doğdu. Anton Rubinstein konservatuvarın ilk müdürü ve piyano profesörü oldu. Burada kompozisyon çalışmalarını tamamlayan ilk mezun Peter Tchaikovsky oldu. Nikolai Andreyevich Rimsky-Korsakov, kompozisyon ve orkestrasyon derslerinde profesör olarak ve orkestra sınıfının başkanı olarak özellikle etkili bir rol oynadı."
 mr_bayreuth_button: "Richard Wagner Festivali Kur"
 mr_bayreuth_button_desc: "Richard Wagner, en büyük eserlerinin her yıl sahneleneceği kendi festival salonuna sahip olmayı uzun zamandır hayal ediyordu. Böyle bir yer, kısa sürede tüm müzik meraklıları için bir hac yeri olabilir ve onun anısına kalıcı, yaşayan bir anıt haline gelirdi."
