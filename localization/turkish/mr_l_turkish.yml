 je_objective_more_than_politics: "Siyasetten Daha Fazlası"
 je_objective_more_than_politics_reason: "Güzellik ve gerçek, aşağılık güç mücadelesinden daha büyük bir değere sahiptir. Önemli bilimsel ve kültürel kurumların inşası, tarihin karşısında gerçekten önemli olanın bir işareti olmalıdır."
 je_objective_assemble_dinosaur_skeleton: "Bir Dinozor Yeniden İnşa Et"
 je_objective_assemble_dinosaur_skeleton_reason: "Ülkemizin paleontolojik çabaları ihmal edilmemelidir. Görkemli bir dinozor iskeleti, muhteşem bir koleksiyonun başlangıcı olabilir!"
 je_objective_relevant_culture: "Uluslararası Ölçekte Önemli Kültür"
 je_objective_relevant_culture_reason: "Evimizde zaten güzel sanatlar ve bilimlere olan ilgimizi gösterdik, ancak tüm dünyanın bunu bilmesini sağlamak için çabalarımızı büyük ölçüde artırmalıyız - hangi alanda uzmanlaşacağımız tamamen bize bağlı."
 relevant_culture_astronomy_tt: "#O Astronomi Kongresi#! düzenleyin."
 relevant_culture_music_tt: "#O Bölgesel öneme sahip#! [concept_elgar_musical_tradition] kazanın."
 je_objective_cradle_of_culture: "Kültürün Beşiği"
 je_objective_cradle_of_culture_reason: "Yeni sanat biçimleri, tarihçilik, manirizm ve realizmin katı biçimlerinin yerini alıyor. Yeni bir çağ başladı. Ulusumuz bu yeni şafakta öncü olmalı ve avangardın amiral gemisi olmalıdır!"
 je_objective_thriving_culture: "Gelişen Kültür"
 je_objective_thriving_culture_reason: "Dünyanın en önemli kültürel ulusu olmak için tüm yönleriyle estetik anlayışımızı ve bilimsel anlayışımızı göstermeliyiz."
