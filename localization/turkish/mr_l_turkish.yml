 je_objective_go_on_scientifical_expedition_pacific: "Aktif [concept_dubois_pacific_expedition]."
 je_objective_dawn_of_a_new_era: "Yeni Bir Çağın Şafağı"
 je_objective_dawn_of_a_new_era_reason: "19. yüzyılda, saf bir toplama tutkusu bilimsel yöntemler ve sistematik çalışmalar haline dönüştü. Artık gezegenin hiçbir köşesi erişilemez değil, geçmiş ne kadar karanlık olursa olsun anlaşılmaz görünmüyor. Her şey ölçülebilir, analiz edilebilir ve yorumlanabilir. Bu iddiaya uygun bir bilimsel koleksiyon oluşturma zamanı geldi."
