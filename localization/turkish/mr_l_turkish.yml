 dlc_morgenrote: "Morgenröte - Lezzetin Şafağı"
 dlc_morgenrote_desc: "Morgenröte – Lezzetin Şafağı, Victoria 3 dünyasını kültür, güzellik ve yaşam tarzıyla zenginleştiren bir Moddur. Amacımız haritayı veya ekonomiyi geliştirmek değil, Victoria döneminde yalnızca kısa süreli görünen bu yönleri iyileştirmektir. Bunlar arasında etkileyici bilimsel keşifler, kültür yoluyla prestij artırma ve sanatçı ile bilim insanı yetiştirme yer alır.\n\nEndişelenmeyin, Morgenröte #p aktif#!."
