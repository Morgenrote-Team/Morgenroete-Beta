l_turkish:
 objective_thriving_culture: "Gelişen Kültür"
 objective_thriving_culture_desc: "Her barbar ülke bir toprak parçasını fethedebilir. Ama daha yüksek medeniyet, bilim ve kültür alanında kendini gösterir. Arkeolojik hazineleri ortaya çıkarın, yeni yıldızlar ve gezegenler keşfedin, besteciler işe alın, egzotik hayvan ve bitkiler toplayın, araştırma gezilerine çıkın veya havacılık çağında rekorlar kırın. Yeni bir sabah doğuyor!"
 objective_thriving_culture_name_AUS: "Avusturya"
 objective_thriving_culture_desc_AUS: "Bella gerant alii, tu felix Austria nube! Bu zamanlar Avusturya için artık sona mı erdi? Viyana Kongresi ve Metternich, Avusturya'yı son bir kez Avrupa'nın merkezi konumuna itti, ama Prusya ve Rusya'nın hırsları Habsburg İmparatorluğu'nun uzlaşmacı politikasını tehdit ediyor. Geçmişte olduğu gibi, Avusturya gelecekte de kültür ve yaşam tarzı merkezi olarak başarılı olabilir mi? Viyana'nın müzik metropolü itibarını koruyun ve şehri Avrupa'nın en çekici şehri haline getirin."
 objective_thriving_culture_name_BEL: "Belçika"
 objective_thriving_culture_desc_BEL: "Belçika sadece yükselen bir ekonomik güç değil, aynı zamanda bilim alanında da birçok fırsata sahiptir: paleontoloji, astronomi veya Pasifik keşifleriyle küçük ülke, diğerlerinin savaşla kazandığı dünya ününü pekiştirebilir. Kongo sadece bir koloni mi, yoksa botanik bir keşif gezisinin hedefi mi? Ve Brüksel, sadece seyahat eden besteciler için bir geçiş noktası mı olacak, yoksa ülke kendi müzik geleneğini mi kuracak?"
 objective_thriving_culture_name_SAR: "Sardinya-Piyemonte"
 objective_thriving_culture_desc_SAR: "Sardinya-Piyemonte kendini zorlu bir durumda buluyor: bir yandan İtalyan ulusunu birleştirmek için siyasi ve askeri güçlerini toplayabilir mi, diğer yandan bir İtalyan kültür ulusu olma itibarını sürdürebilir mi? Birleşik bir İtalya yeni fırsatlar sunacaktır; Mole Antonelliana'nın inşasından müzik başarılarına, Schneider Kupası'nda uçuş rekorlarına kadar."
 objective_thriving_culture_name_SWI: "İsviçre"
 objective_thriving_culture_desc_SWI: "Karasal bir ülke olarak, İsviçre uzak yerlere yapılan keşiflerde daha dezavantajlı olabilir, ancak kendi sınırları içinde büyük potansiyele sahiptir. Klasik müzik alanında yapılan akıllıca hamleler, Alpler ülkesinin büyük bir besteciyi kalmaya ikna etmesini sağlayabilir. Bir formasyon paleontoloji için faydalıdır. Ve her zaman Alfred Escher’in düşündüğü yüzyılın projesi vardır: dağların ortasından geçen dev bir tünel..."
 objective_thriving_culture_idle_header: "Yolunuza devam edin"
 objective_thriving_culture_idle_hint: "Daha fazla zorluk sonunda ortaya çıkacaktır"
 thriving_culture_welcome: "Morgenröte'ye Hoş Geldiniz!"
 thriving_culture_welcome_desc: "Kültürel yolu seçtiğiniz için tebrikler! Bu 'Morgenröte' senaryosudur. Bir ulusu yalnızca kültürel ve bilimsel yönleriyle barışçıl bir şekilde dünyanın zirvesine taşımayı deneyin."
 thriving_culture_lesson_button_skip: "Forza!"
 thriving_culture_complete_desc: "Tebrikler! Ulusunuz bu çağın kültürel vitrini oldu! Morgenröte'nin tüm yönlerini gerçekten keşfettiniz mi? Dünyanın Merkezine yolculuk ettiniz mi? Kayıp Dünyayı yeniden keşfettiniz mi? Atlantis'i buldunuz mu? Shangri-La'yı keşfettiniz mi? Hayır mı? O zaman işinizin bittiğini nasıl söyleyebilirsiniz?"
 thriving_culture_lesson_button_complete: "Daha fazlası mı var?"
 je_objective_promote_an_academic: "Bir [concept_academics_academic] terfi ettir"
 je_objective_promote_an_academic_reason: "Çeşitli bilimsel ve kültürel faaliyetlerimizi sürdürebilmek için bir akademisyeni terfi ettirmek kaçınılmazdır."
 je_objective_a_great_step_forward: "Büyük Bir Adım İleri"
 je_objective_a_great_step_forward_reason: "Ulusumuz, önemli bir tarihi dönüm noktasını belirlemek için kilit bir bilimsel teknolojiyi keşfetmelidir."
 je_objective_a_great_step_forward_theory_of_evolution_tt: "Teorik olarak ilk olarak #b Evrim Teorisi#! keşfedin."
 je_objective_a_great_step_forward_early_archaeology_tt: "İlk Arkeolojiyi #b keşfedin#!"
 je_objective_a_great_step_forward_modern_astronomy_tt: "Modern Astronomiyi #b ilk olarak keşfedin#!"
 je_objective_a_great_step_forward_steel_frame_tt: "Çelik Çerçeve Binaları'nı #b ilk olarak keşfedin#!"
 je_objective_major_discovery: "Büyük Bir Keşif"
 je_objective_major_discovery_reason: "Çağımızın Faustvari ruhu, sınırları zorlamamızı gerektiriyor. Ulusumuzun şanı için büyük bir keşif yapmalıyız!"
 je_objective_go_on_scientifical_expedition: "Bilimsel Bir Keşif Finansmanı"
 je_objective_go_on_scientifical_expedition_reason: "Bilimsel bir keşif, akademisyenlerimizin araştırmalarını sürdürmesi ve müzelerimiz ile koleksiyonlarımızın zenginleşmesi için temel bir unsurdur. Bir akademisyeni mümkün olan en kısa sürede görevlendirmeliyiz."
