 objective_thriving_culture_name_BAV: "Bavyera"
 objective_thriving_culture_desc_BAV: "Kültürel olarak Bavyera, her zaman büyük Alman devletleri ile rekabet edebilmiştir. 19. yüzyıl, Münih’te sanat ve mimarinin yükseldiği bir dönemdi. Walhalla ve Neuschwanstein’ın yanı sıra, Bavyera aynı zamanda Archaeopteryx’in bulunduğu yer, Münih Ayrılıkçılığı’nın evi ve Spitzweg’in doğum yeri olarak da bilinmektedir. Orta büyüklükte bir Alman gücü olarak, Bavyera büyük komşularına karşı askeri güçten çok bilim ve sanata dayanarak kendini savunabilir mi?"
 objective_thriving_culture_name_MEX: "Meksika"
 objective_thriving_culture_desc_MEX: "İlk bakışta, Meksika kültürü geliştirmek için ilk tercih gibi görünmeyebilir. Ancak zengin arkeolojik geçmişi umut verici. Teorik olarak, Meksika Kuzeybatı Geçidi’nde bile bir atılım gerçekleştirebilir. Ülke, krizlerden sarsılmış olsa da uyumu bulursa, başarısını estetik olarak Palacio de Bellas Artes ile taçlandırabilir."
 je_mr_morgenrote_introduction_reason: "[concept_morgenroete], bilim, sanat ve kültüre odaklanan bir moddur. Birçok yeni mekanik ve içerik sunar. Mod hakkında genel bir bakış elde etmek için, menüye gidip Vickypedia’yı kullanabilir veya bu [Concept('concept_morgenroete','$concept_morgenroete_concept$')] üzerine gelerek bilgi alabilirsiniz.\n\nMorgenröte içeriğinin çoğuna erişmek için ya bu günlük girdisindeki düğmeye ya da yan taraftaki butona tıklayın. Günlükteki düğme her zaman çalışmalıdır."
 je_objective_cradle_of_culture_tt: "İlk olarak #ORANGE Empresyonizm#!, #ORANGE Ekspresyonizm#! veya #ORANGE Art Nouveau#! icat eden ulus olun."
