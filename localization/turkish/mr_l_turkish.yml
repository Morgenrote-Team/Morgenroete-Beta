 je_mr_scientific_conferences: "Bilimsel Konferanslar"
 je_mr_scientific_conferences_reason: "Dünya kaç yaşında? İnsan nereden geliyor? İncil ne kadar güvenilir bir tarihsel kaynak? Evren sonsuz mu ve galaksiler gerçekten ne? Yüz yıl boyunca sadece bilim değil, insanların dünya görüşü de önemli ölçüde değişti. Evrim teorisi, görelilik teorisi kadar insanın kesinliğini sarstı. Bilimsel konferanslar, uluslararası bilim insanlarının bu temel soruları tartışarak bazılarını netleştirmeyi amaçlar."
