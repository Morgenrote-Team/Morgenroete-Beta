 khaldun_al_qarawiyyin_center_of_learning_modifier: "Karaouiyin’de İlim Merkezi"
 khaldun.101.t: "Karaouiyin: İlim Merkezi"
 khaldun.101.d: "Yüzyıllar önce Karaouiyin bir Bilim ve İlim merkeziydi. Şimdi yeniden dünyanın önde gelen üniversitelerinden biri olarak yerini aldı."
 khaldun.101.f: "\"Karaouiyin, Avrupa’daki tüm üniversitelerden daha uzun süredir bir üniversite. Pek çok kitaba ev sahipliği yaptı ancak maalesef gerilemeye başladı. Bugün bu üniversitenin hak ettiği yeri tekrar aldığı gündür!\""
 khaldun.101.g: "Karaouiyin İlim için bir meşale olacak!"
 khaldun.101.h: "Karaouiyin Matematik ve Mühendislik için bir meşale olacak!"
 khaldun.101.i: "Karaouiyin Doğa Tarihi için bir meşale olacak!"
 khaldun.101.j: "Karaouiyin Beşeri Bilimler için bir meşale olacak!"