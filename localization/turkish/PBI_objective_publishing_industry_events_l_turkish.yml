l_turkish:
 pbi_objective_publishing_industry_events.200.t: "Başarılı Bir Gazete Romanı"
 pbi_objective_publishing_industry_events.200.d: "[SCOPE.sCharacter('target_character').GetFullName]'ın romanı, [SCOPE.sState('target_state').GetName] gazetesinde seri halinde yayımlandı ve çok popüler olduktan sonra seri sona erdi."
 pbi_objective_publishing_industry_events.200.f: "Serileştirme süresi boyunca gazete satışları sonunda üç katına çıktı. Yayıncı, serileştirmeyi özetleyen bir kitap yayımladı ve kitabı uluslararası pazara bile çevirdi; bu kitapların satışları sürekli olarak arttı."
 pbi_objective_publishing_industry_events.200.a: "Aferin!"
 pbi_objective_publishing_industry_events.200.good: "Roman yazımının ilerlemesi #positive_value artacak#!"
 pbi_objective_publishing_industry_events.200.bad: "Roman yazımının ilerlemesi #negative_value azalacak#!"
 pbi_objective_publishing_industry_events.200.stop: "#negative_value Gelecekteki roman ilerleme sıfırlama olasılığını artırır#!"
 pbi_objective_publishing_industry_events.201.t: "Serileştirmenin İptali"
 pbi_objective_publishing_industry_events.201.d: "[SCOPE.sState('target_state').GetName] gazetesinde serileştirilen roman, yazarın yazmaya devam edememesi nedeniyle tamamlanamadan sona erdi."
 pbi_objective_publishing_industry_events.201.f: "Birçok okuyucu, sabırsızlıkla bekledikleri serileştirilmiş romanların geri kalanını artık okuyamayacak."
 pbi_objective_publishing_industry_events.201.a: "Çok yazık"
 pbi_objective_publishing_industry_events.202.t: "Geleceğin Büyük Yazarı"
 pbi_objective_publishing_industry_events.202.d: "[SCOPE.sState('target_state').GetName] gazete şirketi yeni bir gazete yayımlamayı planlıyor.\nBu iddialı gazete için yeni bir romancı arıyorlar."
 pbi_objective_publishing_industry_events.202.f: "Günümüzde bir gazetenin satışlarını belirleyen şey siyasi açıklama, baş editörün zekice köşe yazısı veya sansasyonel üç sayfalık makale değil; serileştirilen kurguya olan ilgidir."
 pbi_objective_publishing_industry_events.202.a: "[SCOPE.sCharacter('target_character_1').GetFullName] geleceğin büyük yazarı!"
 pbi_objective_publishing_industry_events.202.a.tt: "Roman serisi yazmaya başla"
 pbi_objective_publishing_industry_events.202.b: "[SCOPE.sCharacter('target_character_2').GetFullName]'dan taşan bir zekâ hissediyorum!"
 pbi_objective_publishing_industry_events.202.c: "[SCOPE.sCharacter('target_character_3').GetFullName]'ın yazısı karşı konulamaz bir çekiciliğe sahip!"
 pbi_objective_publishing_industry_events.202.e: "Parlayan başka cevherler olmalı!"
 pbi_objective_publishing_industry_events.202.e.tt: "Diğer adayları arayacağız"
 pbi_objective_publishing_industry_events.203.t: "Yazmaya Devam Edemiyor"
 pbi_objective_publishing_industry_events.203.d: "[SCOPE.sCharacter('target_character').GetFullName] romanında ilerleme kaydetmekte zorlanıyor. Bu devam ederse, serileştirme muhtemelen duracak."
 pbi_objective_publishing_industry_events.203.f: "Sorumlu editör, sabah erken saatlerde [SCOPE.sCharacter('target_character').GetLastName]'ın evini ziyaret ederek taslağın ilerlemesini kontrol etti, ancak [SCOPE.sCharacter('target_character').GetSheHe] orada değildi. Hizmetçi, efendinin üç gündür evde olmadığını ve nerede olduğunu bilmediğini söyledi."
 pbi_objective_publishing_industry_events.203.a: "[SCOPE.sCharacter('target_character').GetHerHim]'ı sandalyeye bağlayın, ama yazmaya devam ettirin!"
 pbi_objective_publishing_industry_events.203.b: "[SCOPE.sCharacter('target_character').GetFullName] için bir ortam değişikliği gerekli"
 pbi_objective_publishing_industry_events.204.t: "Taslağın Sahibi Kim?"
 pbi_objective_publishing_industry_events.204.d: "Yazar, [SCOPE.sCharacter('target_character').GetFullName]'ın serileştirdiği romanın içeriğinin yayıncı tarafından incelenmesine izin vermeyi reddediyor."
 pbi_objective_publishing_industry_events.204.f: "Yayıncı, romandaki bazı karakterlerin belirli politikacılarla alay ediyor gibi algılanmasından endişe ediyor."
 pbi_objective_publishing_industry_events.204.a: "Yayıncıların inceleme hakkı vardır"
 pbi_objective_publishing_industry_events.204.b: "Yazarın iradesine saygı gösterilmeli"
 pbi_objective_publishing_industry_events.205.t: "Ahlaksız İçerik"
 pbi_objective_publishing_industry_events.205.d: "[SCOPE.gsInterestGroup('target_ig').GetName], [SCOPE.sCharacter('target_character').GetFullName]'ın serileştirilmiş romanlarının ahlaksız içeriği nedeniyle iyileştirilmesini talep ediyor."
 pbi_objective_publishing_industry_events.205.f: "'Gazetelerde serileştirilen [SCOPE.sCharacter('target_character').GetLastName]'ın tartışmalı romanının içeriği kabul edilemez'"
 pbi_objective_publishing_industry_events.205.a: "Büyük eserler eski değerler için kabul edilemez"
 pbi_objective_publishing_industry_events.205.b: "İçeriği gözden geçirmemiz gerekiyor"
 pbi_objective_publishing_industry_events.206.t: "İntihal Şüphesi"
 pbi_objective_publishing_industry_events.206.d: "Çeşitli romancılar, [SCOPE.sCharacter('target_character').GetFullName]'ın serileştirilmiş romanında eserlerinin kopyalandığını iddia etti."
 pbi_objective_publishing_industry_events.206.f: "'Sizin çok saygıdeğer yazarınızın iddia edilen yaratıcılığı tamamen sahtekarlık. Onun uydurduğunu iddia ettiği sahne benim kitabımın bir bölümüne dayanıyor. Bunu nasıl inkar edebilirsiniz? Banyo yapan kadın sahnesi tamamen özgün. Telif hakkımı talep ediyorum!'"
 pbi_objective_publishing_industry_events.206.a: "Bu yanlış bir suçlama"
 pbi_objective_publishing_industry_events.207.t: "Kehanet Gibi Bir Roman"
 pbi_objective_publishing_industry_events.207.d: "[SCOPE.sCharacter('target_character').GetFullName]'ın serileştirilmiş romanlarının içeriği, [SCOPE.sState('target_state').GetName]’deki yakın zamanda yaşanan garip bir cinayetle çarpıcı benzerlik gösterdiği için dikkat çekti."
 pbi_objective_publishing_industry_events.207.f: "'Toplumumuzun şu anda karşı karşıya olduğu yoksulluk sorununun bu tür olayların ortaya çıkmasının arkasında olduğunda şüphe yok. Ve şaşırtıcı olan, şu anda serileştirilmekte olan [SCOPE.sCharacter('target_character').GetLastName] romanının tam olarak aynı betimlemeyi içermesi, sanki böyle bir durumu önceden haber veriyormuş gibi.'"
 pbi_objective_publishing_industry_events.207.a: "Zamanın ruhunu yakalayan bir eser"
 pbi_objective_publishing_industry_events.208.t: "Ünlülerden Olumlu Kitap Eleştirileri"
 pbi_objective_publishing_industry_events.208.d: "[SCOPE.sCharacter('target_character_1').GetFullName], [SCOPE.gsInterestGroup('target_ig_1').GetName] grubunun etkili bir üyesi, [SCOPE.sCharacter('target_character').GetFullName]'ın serileştirdiği roman hakkında olumlu bir eleştiri yayınladı."
 pbi_objective_publishing_industry_events.208.f: "'Tüm gazeteler roman yayımlıyor, ama [SCOPE.sCharacter('target_character').GetFullName]'ın romanı hepsinin arasında en ilginç olanı. Açıkçası, [SCOPE.sCharacter('target_character').GetSheHe]'nin böyle bir edebi yeteneğe sahip olmasına şaşırdım.'"
 pbi_objective_publishing_industry_events.208.a: "[SCOPE.sCharacter('target_character_1').GetLastName] görebilen gözlere sahip"
 pbi_objective_publishing_industry_events.208.b: "[SCOPE.sCharacter('target_character_1').GetHerHis]'in iyiliğine ihtiyacım yok"
 pbi_objective_publishing_industry_events.209.t: "Ünlülerden Eleştirel Kitap Eleştirileri"
 pbi_objective_publishing_industry_events.209.d: "[SCOPE.sCharacter('target_character_1').GetFullName], [SCOPE.gsInterestGroup('target_ig_1').GetName] grubunun önde gelen bir üyesi, [SCOPE.sCharacter('target_character').GetFullName]'ın serileştirdiği roman hakkında eleştirel bir inceleme yayınladı."
 pbi_objective_publishing_industry_events.209.f: "'[SCOPE.sCharacter('target_character').GetLastName]'ın serileştirilmiş romanlarının çirkinliği, son yılların serileştirilmiş romanlarına kıyasla dikkat çekiyor. Özellikle bu hafta yayımlanan roman sıradandı. Bu kırık hikayeyi artık onarmak mümkün değil. Hatta [SCOPE.sCharacter('target_character').GetLastName]'e acıma hissi bile duyuyorum; dünya alay konusu olmasına rağmen roman yazmaya devam etmek zorunda.'"
 pbi_objective_publishing_industry_events.209.a: "[SCOPE.sCharacter('target_character_1').GetLastName] kendi cehaletini ortaya koyuyor"
 pbi_objective_publishing_industry_events.210.t: "Serileştirilmiş Romanlar İlgi Çekiyor"
 pbi_objective_publishing_industry_events.210.d: "[SCOPE.sCharacter('target_character').GetFullName]'ın romanları, [SCOPE.sState('target_state').GetName] gazetelerinde serileştirildi ve her bölümle birlikte daha fazla ilgi görmeye başladı."
 pbi_objective_publishing_industry_events.210.f: "Kahramanın kendi hayatına dayanan sıkıntıları ve çabaları, birçok okuyucunun kalbini fethetti."
 pbi_objective_publishing_industry_events.210.a: "Geri kalanını görmek için sabırsızlanıyorum!"
 pbi_objective_publishing_industry_events.211.t: "Tutkulu Hayran"
 pbi_objective_publishing_industry_events.211.d.rich: "[SCOPE.sCharacter('target_character').GetFullName]'ın serileştirilmiş romanları, [SCOPE.sState('target_state').GetName]'in [concept_upper_strata] sınıfında popüler."
 pbi_objective_publishing_industry_events.211.d.middle: "[SCOPE.sCharacter('target_character').GetFullName]'ın serileştirilmiş romanları, [SCOPE.sState('target_state').GetName]'in [concept_middle_strata] sınıfında popüler."
 pbi_objective_publishing_industry_events.211.d.poor: "[SCOPE.sCharacter('target_character').GetFullName]'ın serileştirilmiş romanları, [SCOPE.sState('target_state').GetName]'in [concept_lower_strata] sınıfında popüler."
 pbi_objective_publishing_industry_events.211.f: "[SCOPE.sState('target_state').GetName]’de farklı gazetelerden romanlar okunabilse de, [SCOPE.sCharacter('target_character').GetFullName]'ın eserleri son yıllarda büyük ilgi gördü."
 pbi_objective_publishing_industry_events.211.a: "İmza günleri planlıyor musunuz?"
 pbi_objective_publishing_industry_events.212.t: "Serileştirmenin Durdurulması"
 pbi_objective_publishing_industry_events.212.d: "Mahkeme, [SCOPE.sCharacter('target_character').GetFullName]'ın serileştirilmiş romanlarının karakterlerinin belirli politikacıları karaladığı gerekçesiyle serileştirmesinin durdurulmasına karar verdi."
 pbi_objective_publishing_industry_events.212.f: "Romanı okuyan herkes, [SCOPE.sCharacter('target_character').GetFullName]'ın romanındaki karakterlerin belirli politikacılardan esinlendiğini bilir."
 pbi_objective_publishing_industry_events.212.a: "Aman Tanrım"
 pbi_objective_publishing_industry_events.300.t: "Cephede Gazeteciler"
 pbi_objective_publishing_industry_events.300.d: "[SCOPE.sFront('target_front').GetName] cephesinden [SCOPE.sWar('target_war').GetName] savaşında görev yapan muhabirlerin gönderdiği makaleler büyük ilgi gördü."
 pbi_objective_publishing_industry_events.300.f: "'General [SCOPE.sCharacter('target_character').GetFullName] tekrar tekrar saldırılar emretti ve sonunda düşmanı geri çekilmeye zorlamayı başardı, ancak kuvvetlerimiz de büyük kayıplar verdi. Yarım gün süren bu savaşın sonucu, konumumuzda yalnızca 100 metre ilerlemeydi.'"
 pbi_objective_publishing_industry_events.300.a: "Gönüllüleri toplama zamanı"
 pbi_objective_publishing_industry_events.300.b: "Bağış toplayalım"
 pbi_objective_publishing_industry_events.400.t: "Diplomatik Mücadeleyi Kazanmak"
 pbi_objective_publishing_industry_events.400.d: "[SCOPE.sCountry('target_country').GetName] ile yaptığımız halka açık görüşmeler, [SCOPE.sCountry('target_country').GetName] basınında topluca yayımlandı. Bu durum [SCOPE.sCountry('target_country').GetName]’de [Concept('concept_radical', '$concept_radicals$')]’a ivme kazandırırken, ilgili ülkeler arasında [SCOPE.sCountry('target_country').GetName]’in kınanmasına da yol açtı."
 pbi_objective_publishing_industry_events.400.f: "'[SCOPE.sCountry('target_country').GetName] diplomatının #bold küstah talebine#! karşı olarak, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] #bold diplomatla görüşmeyi reddetti#! ve ona #bold bir ast subay aracılığıyla#! #bold söyleyecek başka bir şeyi olmadığını#! bildirdi.'"
 pbi_objective_publishing_industry_events.400.a: "Aptallar ve gazeteler bile, akıllı birinin elinde işe yarayabilir"
 pbi_objective_publishing_industry_events.402.t: "Bilgi Savaşı"
 pbi_objective_publishing_industry_events.402.d: "Gazeteler artık herhangi bir politikacının konuşmasından daha fazla güce sahip. Bu gücü etkili kullanırsak, düşmanlarımıza zarar verebilmeliyiz."
 pbi_objective_publishing_industry_events.402.f: "'Sen resimleri sağla, ben savaşı sağlayayım.'\nWilliam Randolph Hearst"
 pbi_objective_publishing_industry_events.402.a: "[SCOPE.sCountry('target_country_1').GetName] bizim düşmanımız"
 pbi_objective_publishing_industry_events.402.b: "[SCOPE.sCountry('target_country_2').GetName]'in büyümesine izin veremeyiz"
 pbi_objective_publishing_industry_events.402.c: "[SCOPE.sCountry('target_country_3').GetName] ile ilgili sorunu çözmeliyiz"
 pbi_objective_publishing_industry_events.402.e: "Bunu dikkatlice değerlendirmeliyiz"
 pbi_objective_publishing_industry_events.402.tt: "Hedef ülke ile ilgili kararı bir ay erteleyelim"
 pbi_objective_publishing_industry_events.403.t: "Barut Dergisi"
 pbi_objective_publishing_industry_events.403.d: "[SCOPE.sCountry('target_country').GetName] gazeteleri, [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName] bölgesindeki iddialarımızın haksız olduğunu belirtti."
 pbi_objective_publishing_industry_events.403.f: "[SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName], hem bizim hem de [SCOPE.sCountry('target_country').GetName] için bir [concept_strategic_region] olan bu bölgede, [SCOPE.sCountry('target_country').GetName] gazeteleri haklarının meşruiyetini sürekli olarak savunuyor. Bu bölgedeki sorun, [SCOPE.sCountry('target_country').GetName]’de kamuoyu duyarlılığını güçlü bir şekilde tetikleyecektir."
 pbi_objective_publishing_industry_events.403.a: "Bundan yararlanmamak imkânsız"
 pbi_objective_publishing_industry_events.404.t: "Küstah Talep"
 pbi_objective_publishing_industry_events.404.d: "[SCOPE.sCountry('target_country').GetName] hükümeti, diplomatları aracılığıyla bizden ödünler talep ediyor ve [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] ile gizli bir görüşme arıyor."
 pbi_objective_publishing_industry_events.404.f: "[SCOPE.sCountry('target_country').GetName] kamuoyu, [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName] bölgesindeki üstünlükleri tanınmazsa savaş açılması gerektiğinde ısrar etmeye başladı. [SCOPE.sCountry('target_country').GetName] hükümetinin son talebinin, içerideki kamuoyunu bastırarak savaştan kaçınma arzusunu yansıttığı neredeyse kesin; bu kamuoyu giderek savaşı destekleyen grupların eline geçiyor."
 pbi_objective_publishing_industry_events.404.a: "Perdeyi çekmek istiyorlar.\nVe kendi yararlarına en uygun şekilde!"
 pbi_objective_publishing_industry_events.405.t: "Kader Telgrafı"
 pbi_objective_publishing_industry_events.405.d: "[SCOPE.sCharacter('target_character').GetFullName]'a bir telgraf ulaştı; telgraf, [SCOPE.sCharacter('target_character').GetHerHim]'a, [SCOPE.sCountry('target_country').GetName] diplomatları ile [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]'ın [SCOPE.sState('target_state_2').GetName]’deki villasındaki gizli toplantının içeriğini bildiriyordu. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], içeriğin açıklanıp açıklanmayacağına hükümetin karar vereceğini söyledi."
 pbi_objective_publishing_industry_events.405.f: "'[SCOPE.sCountry('target_country').GetName] diplomatları sadece [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] ile görüşmeyi güçlü bir şekilde talep etmekle kalmadılar, aynı zamanda [concept_interest]’imizi [SCOPE.sState('target_state').GetStateRegion.GetStrategicRegion.GetName] bölgesinden çekmemizi ve bağlılıklarını kanıtlamak için tahtı bırakmamızı istediler. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] diplomatlara, böyle bir taahhütte bulunamayacağını ve bulunmaması gerektiğini, görüşmede söyleyecek başka bir şeyi olmadığını ve müzakerelerin sona erdiğini bildirdi.'"
 pbi_objective_publishing_industry_events.405.a: "Herkese duyur. Ama biraz heyecanlı bir şekilde"
 pbi_objective_publishing_industry_events.405.a.tt: "Olaylar bir [concept_diplomatic_incident]’e dönüşecek"
 pbi_objective_publishing_industry_events.405.b: "Yayınlanmasın"
 pbi_objective_publishing_industry_events.405.b.tt: "Durum dostane bir şekilde çözülecek"
 pbi_objective_publishing_industry_events.500.t: "Işığı üzerine tut"
 pbi_objective_publishing_industry_events.500.d: "Gazeteler resimler yayınlamaya başladıkça, toplumumuzun çıplak gerçeği gün yüzüne çıkıyor."
 pbi_objective_publishing_industry_events.500.f: "Fotoğrafta, güvenlik ve hijyen açısından yetersiz bir favela görülüyor. Birçok işçi düşük ücretlerle tehlikeli işler yapmak zorunda. Çocuklar, okula gitmelerine izin verilmediği için çalışmak zorunda bırakılıyor."
 pbi_objective_publishing_industry_events.500.a: "Refahı artırmaya odaklanmalıyız."
 pbi_objective_publishing_industry_events.500.b: "[SCOPE.sCharacter('target_character_1').GetLastName], [GetLawGroup('lawgroup_childrens_rights').GetName] hakkında fikrini değiştirmiş gibi görünüyor"
 pbi_objective_publishing_industry_events.500.c: "[SCOPE.sCharacter('target_character_2').GetLastName], [GetLawGroup('lawgroup_welfare').GetName] hakkında fikrini değiştirmiş gibi görünüyor"
 pbi_objective_publishing_industry_events.500.e: "[SCOPE.sCharacter('target_character_3').GetLastName], [GetLawGroup('lawgroup_citizenship').GetName] hakkında fikrini değiştirmiş gibi görünüyor"
 gaudi_transatlantic_cable_expedition_modifier: "Atlantik Ötesi Kablo Seferi"
 gaudi_transatlantic_cable_expedition_failed_modifier: "Başarısız Atlantik Ötesi Kablo Seferi"