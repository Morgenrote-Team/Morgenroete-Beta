l_turkish:
 je_nationalization_germanization: "Almanlaştırma"
 je_nationalization_germanization_goal: "#O Ulusal Kimlik İlerlemesi#! #G 250#! seviyesine ulaşsın."
 je_nationalization_german_national_identity: "Alman Kimliği"
 je_nationalization_german_national_identity_reason: "Birkaç yıl birlikte büyümenin ve bazı reformların ardından, genel nüfus arasında pan-Alman kimliğiyle bağlantılı hisler giderek yayılıyor. Bu hisler, devlet hangi çerçeveyi kurarsa kursun, bölgeden bölgeye yayılacak: hükümet yönetimleri, üniversiteler, kışlalar veya deniz üsleri ile iyi hizmet verilen bölgeler, bütüncül Alman kimliği geliştirmeye daha yatkındır. Yoğun kentleşmiş alanlar, daha önce sadece entelektüeller tarafından araştırılan bir kavrama erişim bulma olasılığına sahiptir. Mükemmel koşullar altında, her yıl bir alt devlet yeni kimliği benimseyebilir."
 nationalization.101.t: "[SCOPE.sState('united_german_culture_state').GetName] içinde Alman bilinci"
 nationalization.101.d: "Sosyal ve politik etkileşim yıllarının ardından, [SCOPE.sState('united_german_culture_state').GetName] nüfusu tüm Alman milletine aidiyet hissi geliştirdi. Artık tamamen pan-Alman kimliğine bağlıdırlar."
 nationalization.101.f: "'Alman olmak, kendi başına bir şey yapmak demektir.' - Richard Wagner"
 nationalization.101.g: "Birlik, adalet ve özgürlük!"
 nationalization.102.t: "Pan-Alman Bilinci"
 nationalization.102.d: "Artık Almanya'nın tüm nüfusu kendini öncelikle bölgesel kimliğe değil ulusal kimliğe ait olarak görüyor ve bu durum yalnızca ülkedeki Almanları değil, tüm dünyadaki Almanları da etkiliyor."
 nationalization.102.f: "Alman ulusal devletinin kurulması ve pan-Alman kimliğinin uygulanmasıyla, sınırlar dışındaki Almanlar — ister dünyada göçmen olarak, ister yabancı yönetim altında yaşayanlar — öncelikle kendilerini Alman olarak tanımlayacaklar."
 nationalization.102.g: "Alman dili ne kadar güzel sesleniyor!"
 nationalization.103.d: "Alman ulusal devletinin kurulması ve pan-Alman kimliğinin uygulanmasıyla, sınırlar dışındaki Almanlar — ister dünyada göçmen olarak, ister yabancı yönetim altında yaşayanlar — öncelikle kendilerini Alman olarak tanımlayacaklar. Ülkemizde de artık sadece bölgesel kökenlere atıfta bulunmak yerine Alman olarak tanımlanma isteği var."
 nationalization.103.g: "Ama bu icat insanlık için tehlikeli olabilir mi?"
 united_german: "Alman"
 nationalization_pan_german_identity_tt: "Dünya çapında, tüm kuzey ve güney Alman nüfusları artık pan-Alman nüfusu olarak kendilerini tanımlayacak. Kuzey ve Güney Alman vatanları yalnızca Alman vatanları olacak."
 nationalization_german_consiousness_tt: "Yerel kuzey ve güney Alman nüfusları Alman nüfusu haline gelir. Kuzey ve güney Alman vatanları Alman vatanlarına dönüştürülecek."
 nationalization_german_consiousness_capital_tt: "Başkent devletimizdeki yerel kuzey ve güney Alman nüfusu tek bir Alman nüfusu haline gelir. Alman vatanına dönüştürülecek. Ana kültürümüz Alman olacak ve tüm ülkeyi Almanlaştırabileceğiz."
 je_nationalization_german_national_identity_tt: "Tüm kuzey, güney ve Alemannic vatanları Alman Vatanları haline getirilmiştir."
 nationalization.104.t: "Kuzey Alman entegrasyonu"
 nationalization.104.d: "Kuzey Alman kültürü artık tamamen Alman kültürüne entegre oldu."
 nationalization.105.t: "Güney Alman entegrasyonu"
 nationalization.105.d: "Güney Alman kültürü artık tamamen Alman kültürüne entegre oldu."
 nationalization.106.t: "Alemannic entegrasyonu"
 nationalization.106.d: "Alemannic kültürü artık tamamen Alman kültürüne entegre oldu."
 nationalization.104.f: "'Almanya'nın birleşmeyeceğinden endişelenmiyorum; iyi yollarımız ve gelecekteki demiryollarımız işini yapacak. Her şeyden önce, birbirine sevgiyle bağlı olsunlar ve yabancı düşmana karşı her zaman bir olsunlar; Alman taleri ve groschen tüm imparatorlukta aynı değere sahip olsun; valizim tüm otuz altı devletten açılmadan geçebilsin.' - Johann Wolfgang von Goethe"
 nationalization.104.g: "Hoş geldiniz, kardeşler!"
 nationalization.111.t: "[SCOPE.sCharacter('german_character_scope').GetLastName] Alman Davasını Destekliyor"
 nationalization.111.d: "Pan-Alman kimliği için artan çağrılar doğrultusunda, [SCOPE.sCharacter('german_character_scope').GetFullName] birleşik Alman ulus-devletinin ideallerini tamamen benimsemiştir. Kendi kökenlerini ikincil görür ve ulusal Alman kimliğini vurgular."
 nationalization.111.f: "'Artık partileri bilmiyorum, sadece Almanları tanıyorum!' - Wilhelm II."
 nationalization.111.g: "Kleinstaaterei günleri sona erdi."
 nationalization.112.t: "Alman Kültürü"
 nationalization.112.d: "Almanya, şairler ve düşünürler ülkesi olarak bilinir. Siyasi birleşmeden önce bile kültür ulusu şekillendirdi. Alman edebiyatı ve müziği dünya çapında ünlüdür ve kimlik için bir yapıştırıcı görevi görebilir."
 nationalization.112.f: "'İnsan, özellikle Alman, kendi dünyasını oluşturur ve eğitimi kabul etmeyen şeye katlanmayı öğrenir.' - Friedrich Schiller"
 nationalization.112.g: "Almanya zengin bir müzik geçmişine sahiptir."
 nationalization.112.h: "Almanya zengin bir edebiyat geçmişine sahiptir."
 nationalization.112.i: "Gelecek Alman kültürüne aittir!"
 nationalization.113.t: "Alman Anıtları"
 nationalization.113.d: "Çeşitli kulüpler ve dernekler ile vatanseverler ve milliyetçiler, Almanya'nın kahramanlarını yücelten ve ülkenin yeni birliğini kutlayan çok sayıda anıt inşa etmeye kendini adamıştır. Niederwald am Rhein'de devasa bir Germania heykeli yapılacaktır."
 nationalization.113.f: "Alman birleşmesinin ardından hızlı bir inşaat faaliyeti başladı ve bu, olağanüstü bir anıt kültürüne yansıdı. Kyffhäuserberg'deki Barbarossa Anıtı, Koblenz'deki Deutsches Eck, Güney Teutoburg Ormanı yakınlarındaki Hermannsdenkmal, Porta Westfalica'daki Kaiser Wilhelm Anıtı, Leipzig'deki Völkerschlachtdenkmal, Hamburg'daki Bismarck Anıtı ve Donaustauf yakınlarındaki Walhalla ile birlikte Niederwald Anıtı, çoğunlukla Alman İmparatorluğu döneminde inşa edilmiş anıtsal anıt yapılardan biridir. İnşaat 12 yıl sürmüştür."
 nationalization.113.g: "Anıt kültürünü destekleyin ve Niederwalddenkmal'i inşa edin."
 nationalization.113.h: "Hayır."
 je_nationalization_frenchization: "Fransızlaştırma"
 je_nationalization_frenchization_reason: "1881'den itibaren, okulda Occitan konuşan çocuklar, bakan Jules Ferry’nin önerilerine uygun olarak cezalandırıldı; bu, la vergonha (utanç) olarak bilinen dilin küçümsenmesine yol açtı. Bu uygulama, Fransız Devrimi'nden bu yana merkeziyetçi çabalarla mücadele eden Fransa'nın diğer bölgeleri için de geçerliydi. 19. yüzyılın sonundan itibaren, Fransız devleti, bölgesel farklılıkları daha da azaltmak ve tek tip bir kimlik lehine çalışmak için çabalarını artırdı."
 nationalization_frenchization_tt: "Yerel Occitan, Franco-Provençal, Breton ve Wallon nüfusları Fransız olacak. Yurtları Fransız yurtlarına dönüştürülecek."
 je_nationalization_french_national_identity_tt: "Tüm Occitan, Franco-Provençal, Breton ve Wallon Yurtları Fransız Yurtları haline gelmiştir."
 nationalization_pan_french_identity_tt: "Dünya çapında, tüm Occitan, Franco-Provençal, Breton ve Wallon nüfusları artık pan-Fransız nüfusu olarak kendilerini tanımlayacak."
 nationalization.201.t: "[SCOPE.sState('frenchization_state').GetName] içinde Fransızlaşma"
 nationalization.201.d: "Yıllar süren siyasi etki ve yoğun eğitim sonrası, [SCOPE.sState('frenchization_state').GetName] nüfusu artık diğer Fransız vatandaşlarından ayırt edilemez hale gelmiştir. Yaşam tarzları ve kültürleri Paris ile uyumludur."
 nationalization.201.f: "'Parisli, Fransızlar için Atinalıların Yunanlılar için olduğu gibidir: Kimse ondan daha iyi uyumaz, kimse ondan daha açıkça kaygısız ve tembel görünmez, kimse daha dikkatsiz görünmez. Ama bu yanıltıcıdır. Her türlü miskinliğe eğilimlidir, ama şan kazanılacaksa her tür öfkeyle ilham alabilir. Ona bir mızrak verin, onuncu Ağustos'u canlandırır, bir tüfek verin, Austerlitz'i verirsiniz. Napolyon’un sıçrama tahtası ve Danton'un dayanağıydı. 'La patrie' diye bağırıldığında kaydolur, özgürlük çağrısında kaldırım taşlarını söker. Dikkat edin!' - Victor Hugo"
 nationalization.201.g: "Temiz kalın, Fransızca konuşun."
 nationalization.202.t: "Fransızlaşma tamamlandı"
 nationalization.202.d: "Yıllarca süren çabalar değerini gösterdi. Fransa, tek dil, tek kültür ve tek merkezi başkente sahip bir ulus haline geldi. Dilsel ve kültürel farklılıkların zamanı sona erdi. Fransızların eğitimi tarihimizde bir dönüm noktasıdır."
 nationalization.202.f: "Fransız kimliği uygulamaya konduğunda, sınırlar dışındaki Fransızca konuşan topluluklar — ister dünyada göçmen olarak, ister yabancı yönetim altında yaşayanlar — öncelikle kendilerini Fransız olarak tanımlayacaklar."
 nationalization.202.g: "Zafer günü geldi!"
 nationalization.204.t: "Occitan entegrasyonu"
 nationalization.204.d: "Yıllar süren eğitim, propaganda ve bölgesel saçmalıkları dışlama çabalarının ardından, Occitan kültürü artık Fransız kültüründen ayırt edilemez hale gelmiştir."
 nationalization.205.t: "Franco-Provençal entegrasyonu"
 nationalization.205.d: "Yıllar süren eğitim, propaganda ve bölgesel saçmalıkları dışlama çabalarının ardından, Franco-Provençal kültürü artık Fransız kültüründen ayırt edilemez hale gelmiştir."
 nationalization.206.t: "Breton entegrasyonu"
 nationalization.206.d: "Yıllar süren eğitim, propaganda ve bölgesel saçmalıkları dışlama çabalarının ardından, Breton kültürü artık Fransız kültüründen ayırt edilemez hale gelmiştir."
 nationalization.207.t: "Wallon entegrasyonu"
 nationalization.207.d: "Yıllar süren eğitim, propaganda ve bölgesel saçmalıkları dışlama çabalarının ardından, Wallon kültürü artık Fransız kültüründen ayırt edilemez hale gelmiştir."
 nationalization.204.f: "'Fransa büyüktür çünkü Fransa’dır.' - Victor Hugo"
 nationalization.204.g: "Hoş geldiniz, kardeşler!"
 nationalization.301.t: "[SCOPE.sState('united_swiss_culture_state').GetName] içinde İsviçre bilinci"
 nationalization.301.d: "Yıllar süren sosyal ve siyasi etki sonucunda, [SCOPE.sState('united_swiss_culture_state').GetName] nüfusu tek bir İsviçre-Alman ulusuna aidiyet duygusu geliştirmiştir. Artık İsviçre kimliğine tamamen bağlıdırlar."
 nationalization.301.f: "'Dünyanın sonu geldiğinde, İsviçre’de olmayı tercih ederim.' - Albert Einstein"
 nationalization.301.g: "Unus pro omnibus, omnes pro uno!"
 nationalization.302.t: "İsviçrelileştirme tamamlandı"
 nationalization.302.d: "İsviçre'nin tüm nüfusu artık öncelikle bölgesel kimliğe değil, ulusal kimliğe ait olduğunu görüyor. Artık hiçbir Fransız, İtalyan veya Alman ulusu, bizlerin sadece farklı halkların karışımı olduğunu kolayca iddia edemez."
 nationalization.302.f: "Kardeşler olarak tek bir Halk olmak istiyoruz,\nTehlike ve sıkıntıda asla ayrılmamak.\nBabalarımız gibi özgür olmak istiyoruz,\nKölelik içinde yaşamaktansa ölmeyi tercih ediyoruz.\nYüce Tanrı’ya güvenmek istiyoruz\nVe insan gücünden asla korkmamak."
 nationalization.302.g: "Biz irade sahibi bir ulusuz."
 nationalization.313.t: "Wilhelm Tell Anıtı"
 nationalization.313.d: "William Tell, İsviçre'nin efsanevi kurucu figürlerinden biri olarak kabul edilir ve nüfusun tarihsel hafızasında Rütli Yeminine benzer bir statüye sahiptir. Birçok vatansever, yeni uyanan ulusal bilinci teşvik etmek için onun onuruna bir heykel dikmek istiyor."
 nationalization.313.f: "'İyi insan kendini en sona düşünür.' - Friedrich Schiller"
 nationalization.313.g: "Geçmişimizi yüceltmemiz gerekiyor."
 nationalization.313.h: "Peki bunu kim ödeyecek?"
 united_swiss: "İsviçreli"
 nationalization_swiss_consiousness_capital_tt: "Başkentimizin yerel Alemannic, Franco-Provençal, Ticinese ve Rumantsch nüfusları tek bir İsviçre nüfusu haline gelir. İsviçre yurduna dönüştürülecek. Birincil kültürümüz İsviçre kültürü olacak ve tüm ülkeyi İsviçrelileştirebileceğiz."
 nationalization_swiss_consiousness_tt: "Yerel Alemannic, Franco-Provençal, Ticinese ve Rumantsch nüfusları tek bir İsviçre nüfusu haline gelir. Yurtları İsviçre yurtlarına dönüştürülecek."
 je_nationalization_swiss_national_identity_tt: "Tüm Alemannic, Franco-Provençal, Ticinese ve Rumantsch Yurtları İsviçre Yurtları haline gelmiştir."
 nationalization_pan_swiss_identity_tt: "Kalan tüm Alemannic, Franco-Provençal, Ticinese ve Rumantsch nüfusları tek bir İsviçre nüfusu olur. Bu tür tüm karakterler de İsviçreli olur."
 nationalization_disunited_italy_modifier: "İtalyan Birleşmesinin Sonuçları"
 nationalization_disunited_germany_modifier: "Alman Birleşmesinin Sonuçları"
 nationalization_brigants_modifier: "Haydutluk"
 nationalization_anti_regionalism_ig_modifier: "Bölgecilik Karşıtlığı"
 nationalization_anti_regionalism_country_modifier: "Bölgecilik Karşıtlığı"
 nationalization_linguistic_impurity_modifier: "Dilsel Safsızlık"
 nationalization_no_foscolo_modifier: "Foscolo reddedildi"
 je_nationalization_italianization: "İtalyanlaştırma"
 je_nationalization_italianization_reason: "İtalya'nın birleşmesinden sonra, Massimo d'Azeglio 'İtalya'yı yaptık, şimdi İtalyan yapmalıyız' dedi. Bu söz tarihsel olarak tartışmalı olsa da, İtalya'nın siyasi birleşmesinden sonra iç birliğin ne kadar istikrarsız olduğunu özetler. Bu sadece haydutların güya karışıklık çıkardığı güney için geçerli değil — kuzeyde, burjuva elitinin dışında, çoğu insan hala bölgesel kimliğiyle bağ kuruyordu. Ortak savaşlar, yüksek prestij, üniversiteler, sanat akademileri veya idari tesisler gibi ulusal kurumların inşası, önümüzdeki yıllarda ulusal birliğin zor sürecinden önemli ölçüde daha güçlü bir tüm İtalyan kimliğinin ortaya çıkmasını sağlayacaktır."
 je_nationalization_italianization_goal: "#O Ulusal Kimlik İlerlemesi#! #G 250#! seviyesine ulaşsın."
 je_nationalization_germanization_reason: "1871'de Alman İmparatorluğu'nun kurulmasından sonra, Almanların birlik duygusu çeşitli federal eyaletlerde zaten oldukça yaygındı. Alman devletlerini birleştirme aciliyeti 1848'den beri vardı. Sadece Bavyera'da belirli bir bölgesel his 20. yüzyıla kadar geçerliydi, ancak bu giderek geri itildi. Ortak savaşlar, yüksek prestij, üniversiteler, sanat akademileri veya idari tesisler gibi ulusal kurumların inşası, önümüzdeki yıllarda ulusal birliğin zor sürecinden daha güçlü bir tüm-Alman kimliğinin ortaya çıkmasını sağlayacaktır."
 nationalization.12.f: "Güney İtalya'da haydutluk eski çağlardan beri belirli bir biçimde var olmuştur. Ancak, rastgele yolcuları hedef alan suçlular olarak ortaya çıkan bu oluşum, daha sonra politik direniş hareketi biçiminde büyük ölçüde evrilmiştir. 1861’de Sardinya Krallığı tarafından İki Sicilya Krallığı’nın fethi sonrası (sonrasında İtalya Krallığı) bölgede en ünlü ve bilinen haydutluk biçimi ortaya çıkmıştır. Haydutlar arasında farklı çalışma geçmişi ve motivasyona sahip bir karışım bulunuyordu; haydutlar eski mahkumlar, suçlular ve diğer kişilerden oluşuyor, ayrıca eski askerler ve Bourbon ordusunun sadıkları da bulunuyordu. Sadece İtalyan yetkililerine ve toprak sahiplerine değil, aynı zamanda sıradan insanlara da saldırılar düzenliyor; köyleri, kasabaları ve çiftlikleri yağmalıyor, bireylere ve gruplara silahlı soygunlar gerçekleştiriyorlardı."
 nationalization.12.g: "Robin Hood kılığında başka bir haydut!"
 nationalization.13.t: "Bölgesel miras korkusu"
 nationalization.13.f: "1848/1849 devriminin başarısız olmasıyla, İtalyan birliği hareketinin önde gelen kolu olarak Neo-Güelfler fiilen güçsüz hale geldi. Başlangıçta Papa'nın primus inter pares başkanlığı altında federal bir İtalya lehine konuşmuşlardı. Bunun sonucunda, merkeziyetçi çevreler mutlak üstünlüğe kavuştu - bu durum 20. yüzyıla kadar etkisini sürdürdü. Bölgesel hassasiyetler artık dikkate alınmadı; aksine, bölgesel duygular, İtalya'nın birleşme çabalarını yok edebilecek tehlikeli eğilimler olarak görüldü."
 nationalization.13.h: "Bu özel mirası dikkate almalıyız."
 nationalization.14.t: "Şiveler mi yoksa diller mi?"
 nationalization.14.d: "Ülkemizdeki önde gelen öğretmenler, akademisyenler ve profesörler, İtalyan dilinin yalnızca resmi kurumlarda değil, günlük yaşamda da özellikle teşvik edilmesini savundular. Bu, yeni İtalya’daki bilimsel ve siyasi süreçleri önemli ölçüde geliştirecekti - ancak genel nüfus, özellikle kırsal kesimde, bu talep oldukça popüler değildi; zira insanlar hâlâ sadece şiveyle konuşmaya devam ediyordu."
 nationalization.14.f: "18. yüzyılda bile, İtalyan yarımadasındaki bireysel dil çeşitlerinin bağımsız diller olduğu tartışmasızdı. Dante Alighieri sayesinde sadece Toskanca büyük prestije sahip değildi. Venedik, Venedik Cumhuriyeti'nin resmi ve yazılı diliydi; Carlo Goldoni gibi oyunlar ve edebiyat Venedik dilinde yazılmıştır ve Adriyatik bölgesinde lingua franca olarak özel bir öneme sahipti. Napoli dili için de benzer şeyler söylenebilir. 19. yüzyılda ise, tek bir standart İtalyanca çeşidi olduğu ve İtalya’daki diğer tüm dillerin sadece şive olduğu görüşü hâkim oldu - kuzeyde konuşulan İtalyanca ise zaten özel bir dil statüsüne sahipti. Yine de politik hareketler sürecinde gerçeklik giderek daha fazla kabul gördü: Bir dil, bir şive ile arasındaki farkı deniz ve orduya sahip olmasıyla gösterir."
 nationalization.14.g: "Dil çeşitliliğimiz prestijimizdir."
 nationalization.14.h: "İtalyanca konuş, açık konuş. Diğerleri sadece şivedir."
 nationalization.15.t: "Foscolo'nun Kaderi"
 nationalization.15.d: "Ulusal duygular belirginleştikçe, büyük İtalyan şairi Ugo Foscolo'nun cesedinin Büyük Britanya'dan İtalya'ya taşınması için sesler yükselmeye başladı."
 nationalization.15.f: "Yeni İtalyan ulusu, simge arayışındaydı: tarihi olaylar ve tarihi şahsiyetler. Fransa'daki modele benzer şekilde, sanatçılar, bilim insanları ve diğer büyük şahsiyetlerin bir tür anıt mezarını oluşturma fikri erken dönemde ortaya çıktı. Önceden önde gelen vatandaşların gömü yeri olan Floransa'daki Santa Croce, bunun için uygun bir yer olarak görüldü. Machiavelli, Michelangelo ve Galileo gibi şahsiyetler uzun zamandır Toskanca'dan daha çok İtalyan olarak kabul ediliyordu. Zakynthos adasından Venedikli bir şair olan Ugo Foscolo, devrim yıllarında yaşamış ve erken İtalyan liberalizmi ile milliyetçiliğinin belirleyici figürü olarak kabul edilir. Bu büyük İtalyan zihinler galerisine mükemmel bir katkı olurdu. Ancak Foscolo 1827'de sürgünde, Londra yakınlarındaki Turnham Green'de öldü."
 nationalization.15.g: "Onlardan Foscolo’yu vermelerini isteyin."
 nationalization.15.h: "Hayır derlerse utanırız."
 nationalization.16.d: "İtalyan hükümeti, ünlü şair ve İtalyan milliyetçiliğinin savunucusu Ugo Foscolo'nun cesedinin kendilerine teslim edilmesini talep etti."
 nationalization.16.g: "Kendi küçük şairlerini alsınlar. Adı neydi yine?"
 nationalization.16.h: "Fosco adam burada kalıyor."
 nationalization.17.t_foscolo: "Foscolo geri dönüyor"
 nationalization.17.d_foscolo: "İngiliz hükümeti kabul etti - Foscolo'nun cesedi yakında İtalyan topraklarına geri gelecek ve Santa Croce kilisesinde son istirahat yerini bulacak!"
 nationalization.17.f_foscolo: "Ugo Foscolo'nun İtalya'ya dönüşü, genç ulus-devlet için ilk önemli dönüm noktalarından biri olarak kabul edilir. Foscolo, dönen bir kahraman gibi kutlandı; gömülmesi bir tören gibiydi - insanlar ağlıyor ve tezahürat yapıyordu. Santa Croce’daki büyük İtalyan şahsiyetlerin 'Pantheon'u ile, İtalyan milliyetçiliğinin sabit bir noktası kurulmuş oldu. İtalyan kahramanlar, bu ideolojinin odak noktası olmalıydı, Katolik azizler değil."
 nationalization.17.g: "Büyük bir İtalyan evine dönüyor!"
 nationalization.17.t_no_foscolo: "Foscolo sürgünde kalıyor"
 nationalization.17.d_no_foscolo: "Ne yazık ki İngiliz hükümeti, çeşitli ikiyüzlü bahanelerle Ugo Foscolo'nun İtalya'ya dönmesini engelledi."
 nationalization.17.f_no_foscolo: "Aslında büyük İtalyan şairini 'şu Fosco adam' olarak adlandıracak kadar küstahlık yaptılar!"
 nationalization.17.h: "Bu tek ayaklı ineklerin oğulları bize Foscolo'muzu vermiyor!"
 nationalization.18.t: "İtalyan Müzik Kültürü"
 nationalization.18.d: "İtalya, müzik kültürünün gelişiminde belirleyici bir rol oynamış ülkelerden biri olarak kabul edilir - ister enstrüman yapımı, opera gelişimi, ünlü şarkıcıların eğitimi veya büyük besteciler açısından olsun. Müziğe dair, en geç Rönesans'tan itibaren, yarımada tüm Avrupa'yı büyüleyen ve yeni etkiler sağlayan benzersiz bir müzik kültürüyle karakterize edilmiştir. Opera dilinin 19. yüzyıla kadar yalnızca İtalyanca olması bu büyük mirasın kanıtıdır."
 nationalization.18.f: "'Bana çamaşırcı faturasını verin ve onu bile müziğe dönüştüreceğim.' -Gioachino Rossini"
 nationalization.18.g: "İtalya’nın zengin bir müzik geçmişi var."
 nationalization.18.h: "Gelecek, İtalyan müzik kültürüne aittir!"
 nationalization.19.t: "Dante Kültü"
 nationalization.19.d: "Dante Alighieri, İtalyan kültürünün en büyük simgesi olarak kabul edilir ve 'İlahi Komedya' dünya edebiyatının klasikleri arasında ve Orta Çağ’ın en önemli edebi tanıklığı olarak görülür. Dante’ye olan tapınma, vatanseverler arasında gerçek bir kült haline gelmiş ve aynı zamanda dış dünyaya, Risorgimento’dan çok önce pan-İtalyan duygusunun var olduğunu göstermektedir - sonuçta, İtalya’nın sınırlarını ilk kez 'Sì' dilinin konuşulduğu alan olarak belirleyen Dante olmuştur. Floransa’da 'yüce şair'i anan bir anıt dikilmesi planlanmaktadır."
 nationalization.19.f: "'Hayatımızın yolunun ortasında\nkendimi karanlık bir ormanda buldum,\nçünkü doğru yol kaybolmuştu.' -Dante Alighieri"
 nationalization.19.g: "Dante kültünü destekleyin ve Floransa’da bir anıt inşa edin."
 nationalization.19.h: "Ve gelecek nesilleri üçlüklerle mi işkence edeceğiz?"
 nationalization.12.t: "[SCOPE.sState('nationalization_brigants_modifier').GetName]’de Haydutlar"
 nationalization.12.d: "[SCOPE.sState('nationalization_brigants_modifier').GetName]’deki kötü koşullar, geleceği olmayan daha fazla insanın [SCOPE.sCharacter('manzoni_brigant_character').GetFullName] çetesine katılmasına yol açtı. Artık çevrede yıkım yaratıyorlar - öyle ki haydutlar gerçek bir sorun haline geldi. Hatta sıradan halk arasında onları hükümete ve artan İtalyanlaşmaya karşı birer politik ve bölgesel direnişçi olarak gören destekçiler bile var."
 nationalization.13.d: "[SCOPE.sState('nationalization_regionalist_state').GetName]’de sıradan insanlar, yeni ulusal İtalyan kurumlarının ve İtalyanca'nın yaygınlaşmasının geleneksel yaşam biçimlerini yok edebileceğinden korkuyor. [SCOPE.sCharacter('nationalization_rural_leader_scope').GetFullName], bölgenin özel mirasının göz ardı edilmemesi gerektiğini ve İtalya’nın homojenleşmesinin çok ilerlediğini savundu."
 nationalization.13.g: "[SCOPE.sState('nationalization_regionalist_state').GetName], diğer İtalyan bölgeleri gibi bir İtalyan bölgesidir."
 nationalization.11.t: "La scienza in cucina e l'arte di mangiar bene"
 nationalization.11.d: "[TimeKeeper.GetCurrentDate.Format('y')] yılında, İtalya, mutfak kültürünü sonsuza dek değiştirecek çığır açan bir yemek kitabının yayınlanmasına tanık oldu. Yazar Pellegrino Artusi, böylece ulusun birliğini ve büyüklüğünü vurgulayan uluslararası tanınmış bir İtalyan mutfağı oluşturulmasına katkıda bulundu."
 nationalization.11.f: "1891’de yayınlanan Pellegrino Artusi'nin 'La scienza in cucina e l'arte di mangiare bene' eseri, modern İtalyan mutfak kitaplarının ilk örneği olarak kabul edilir. İtalya’nın ulusal kimliğini yeni yeni oluşturmaya başladığı bir dönemde, Artusi’nin eseri, farklı bölgesel mutfakları uyumlu bir ulusal mutfak geleneğinde birleştirmede kritik bir rol oynadı. Tariflerin titizlikle toplanması, zekice ve açık bir şekilde sunulması, sadece mutfak edebiyatında yeni bir standart belirlemekle kalmadı, aynı zamanda yerel gastronomi üzerinde kalite, yenilik ve gururu teşvik ederek ülkenin yaşam standartlarının iyileştirilmesine önemli katkı sağladı."
 nationalization.11.g: "Mutfak Sanatının Zaferi!"