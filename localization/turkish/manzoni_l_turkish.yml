 je_manzoni_literary_circle: "Edebi Çevre"
 je_manzoni_literary_circle_reason: "Zengin bir edebi yaşamımız olsa, yalnızca edebiyat salonları ve çok sayıda yazarla değil, aynı zamanda fin de siècle ruhuyla da ifade edilseydi, bir edebiyat topluluğunun kurulması sadece zaman meselesi olurdu."
 manzoni.3.t_juvenile: "Çocuk Edebiyatı"
 manzoni.3.t_crime: "Suç & Gizem"
 manzoni.3.t_adventure: "Macera Hikâyeleri"
 manzoni.3.t_science: "Bilimkurgu"
 manzoni.3.t_social: "Toplumsal Eleştiri"
 manzoni.3.t_literary: "Edebi Kurgu"
 manzoni.3.t_devotional: "Dini Edebiyat"
 manzoni.3.t_romance: "Romantik"
 manzoni.3.d: "[GetPlayer.GetName] ülkesindeki politik, sosyal ve kültürel değişimler nedeniyle [Concept('concept_manzoni_popular_taste','$concept_manzoni_popular_tastes_audience$')] içinde köklü değişiklikler meydana geldi ve bu durum edebi [concept_manzoni_genre] tercihlerinde değişime yol açtı."
 manzoni.3.f_juvenile: "17. ve 18. yüzyıllarda, İngiltere ve Amerika’daki Püritenler Protestan ahlakına dayalı çocuk kitapları yayımladılar. Hem eğitici hem de eğlenceli mesajlara sahip ilk çocuk kitaplarından bazıları, 1740’larda John Newbery tarafından yayımlandı. Birkaç yıl önce Thomas Boreman, Gigantick Histories’i yazmıştı. Bununla birlikte, 19. yüzyılın sonlarına kadar çocuk kitaplarının çoğunu ahlakçı değerler şekillendirmeye devam etti. Ancak 18. yüzyılın ortalarından itibaren Locke ve Rousseau’nun yaydığı rasyonel ahlakçılık, salt dini mesajın yerini almaya başladı. 19. yüzyılın ortalarından itibaren ise saf hayal gücü ve macera hikâyeleri çocuk edebiyatı olarak giderek daha fazla kabul görmeye başladı."
 manzoni.3.f_crime: "Suç romanının kökenleri daha eskiye gitse de, edebi bir tür olarak ancak 19. yüzyılda yerleşti. Genellikle bir suça ve onun kovuşturulması ile polis, bir dedektif veya bir birey tarafından yürütülen soruşturmaya odaklanır. Suçluyu harekete geçiren psikolojik anların betimlenmesi, çevrenin tasviri ya da araştırmacının vicdan azaplarıyla boğuşması gibi unsurlar da edebi bir şekilde işlenirdi. Fyodor Dostoyevski’nin Suç ve Ceza’sı bir suç romanı olarak görülebilir. Gerilim ve gizem türüne geçiş ise akışkandır."
 manzoni.3.f_adventure: "Macera edebiyatı, edebiyatın kendisi kadar eskidir. Macera edebiyatı antik çağlara, hatta Antik Yakın Doğu’ya kadar takip edilebilir. Orta Çağ’daki Arthur efsaneleri ve şövalyelik romanları, modern macera romanlarının öncülleri olarak kabul edilir. 19. yüzyıldan itibaren pek çok macera edebiyatı türü ortaya çıktı; bunların en bilinen temsilcileri Alexandre Dumas, Robert Louis Stevenson, Karl May ve Jules Verne’dir."
 manzoni.3.f_science: "Bilim kurgu terimi ortaya çıkmadan önce bile, en geç Orta Çağ’dan bu yana gelecekteki teknik gelişmelere dair hayaller bulunmaktaydı. Bu terim ilk kez 1851’de Britanyalı şair ve denemeci William Wilson tarafından kullanıldı. Bilime olan inançla birlikte 19. yüzyılda bilim ve teknolojiden korku da doğdu. Bu inanç ve korku, kendi gücünden korkan yeni mitolojik bir titan olma hâlini alan, döneme özgü bölünmüş bir yaşam anlayışında birleşti. İşte bu yüzden Aldous Huxley ve George Orwell’in eserlerinde olduğu gibi distopyalar ortaya çıktı. Bu ikilik, bilim kurguyu karakterize eder."
 manzoni.3.f_social: "Modern toplumsal eleştirinin kökenleri en azından Aydınlanma dönemine kadar uzanır. Kurmaca edebiyat toplumsal açıdan önemli etkiler yaratabilir. Örneğin, Harriet Beecher Stowe’un 1852 tarihli “Tom Amca’nın Kulübesi” adlı romanı, Amerika Birleşik Devletleri’nde kölelik karşıtı hareketi güçlendirdi. George Orwell ve Charles Dickens ise sırasıyla “Hayvan Çiftliği” ve “İki Şehrin Hikâyesi”ni, toplum ve insan doğasına dair hayal kırıklıklarını ifade etmek için yazdılar."
 manzoni.3.f_literary: "Edebi kurgu çoğu zaman, özellikle sanatsal açıdan önemli kabul edilen yazılar için, edebiyatın eşanlamlısı olarak kullanılır. Edebi kurgu, klasik kitapları içerir; yani herhangi bir alanda örnek teşkil eden veya dikkate değer kabul edilen eserler. Edebi kurgu çoğunlukla tür kurgusundan sanatsal olarak üstün kabul edilse de, ikisi birbirini dışlayan kavramlar değildir."
 manzoni.3.f_devotional: "Dini edebiyat başlangıçta, dini motivasyona sahip popüler yazıları tanımlar. Teolojik edebiyat değildir, çünkü bilimsel tartışmaları takip etmez ve dogmatik amaçları yoktur. Daha çok, modern zamanların değişimleriyle birlikte içe dönüklüğe, yani artan dindarlıkla karakterize edilen bir yoğunlaşmaya odaklandı. Bu yazılar, erdemli bir yaşam için rehber niteliği taşır ve ruhu duygusal olarak yüceltmeyi amaçlar."
 manzoni.3.f_romance: "Popüler aşk romanı, öncelikle kadın okuyuculara hitap eden ve yapısı genellikle kolay erişilebilir, basit kalıpları takip eden geniş bir edebiyat türünü ifade eder. Ancak her aşk romanı sıradan edebiyat olarak sınıflandırılamaz; çocuk ölümleri, istismar, ölümcül hastalıklar veya benzeri karmaşık konular kolayca basite indirgenemez."
 manzoni.3.g: "Zevkler ve modalar gelir ve geçer."
 manzoni.10.t: "Yeni Bir Yayıncı"
 manzoni.10.d: "Yeni yayınevi [SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting], bugün [SCOPE.sState('manzoni_publisher_state').GetName]’de kapılarını açtı. Matbaa bugünden öğle saatlerinden beri gürültüyle çalışıyor. [GetPlayer.GetName]’in sosyal hayatı artık daha da renkli."
 manzoni.10.f: "[SCOPE.sState('manzoni_publisher_state').GetName]’deki yeni yayınevi şu anda halkın ilgisini çekiyor. [SCOPE.sCharacter('manzoni_publisher_scope').GetFullName], bugün özel olarak basılan bir broşürde şirketinin artık çok sayıda yeni yayın çıkaracağını açıkladı. Haber hızla yayıldı ve binanın önünde meraklı bir kalabalık toplandı. Şimdiden, yeni yayınevinin hangi alanda uzmanlaşacağı konuşuluyor."
 manzoni.10.g: "Kesinlikle yüksek edebiyat yayınevi."
 manzoni.10.h: "Bu bilimsel bir yayınevi, öyle değil mi?"
 manzoni.10.i: "Bence bu yayınevi insanları iyi eğlendirecek."
 manzoni.10.j: "Bir sanat yayınevi olsa harika olurdu!"
 manzoni.11.t: "Halk Yayınevi"
 manzoni.11.d: "[SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting] ile birlikte, [SCOPE.sState('manzoni_publisher_state').GetName], [GetPlayer.GetName] içindeki en heyecan verici yayınevlerinden birine sahip. Şirket gelecekte daha da büyümek istiyor ve sahibi [SCOPE.sCharacter('manzoni_publisher_scope').GetFullName], şimdiden sektörün en önemli temsilcilerinden biri."
 manzoni.11.f: "Ticari yayınevi kaliteye kıyasla niceliğe daha fazla odaklanıyor olabilir, ama 19. yüzyılın öncü kurumlarından biridir: Edebiyat artık birkaç kitap başlığına sahip küçük ve zengin bir sınıfın ayrıcalığı olmaktan çıkmış, daha geniş ve yoksul sınıfların da erişebildiği bir ürün hâline gelmiştir. Ticari yayıncılık sadece kitlelere hizmet etmekle kalmaz, aynı zamanda kitlesel başarı da getirir."
 manzoni.11.g: "Bu yayınevi kitap endüstrimizin temel taşlarından biridir."
 manzoni.12.t: "Edebi Yayınevi"
 manzoni.12.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName], bugün [SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting] yayıneviyle bir yayın sözleşmesi imzaladı. Merkezi [SCOPE.sState('manzoni_publisher_state').GetName]’de bulunan şirket, edebiyat için en çok aranan adreslerden biri olmaya aday."
 manzoni.12.f: "Prestijli bir edebiyat yayınevi, yayıncılık dünyasının zirvesidir. Eğer bir [concept_manzoni_national_writer], Büyük Bir Yazar’ın ününü elde etmeyi başarırsa, bu haklı bir övgüdür. Eserlerinin koruyucusu ve dağıtıcısı olarak yayınevi, yazarın yaşamından sonra da bir başvuru noktası olmaya devam edecektir."
 manzoni.12.g: "Bu yayınevi, edebiyat standartlarımızın temel taşlarından biridir."
 manzoni.13.t: "Bilimsel Yayınevi"
 manzoni.13.d: "[SCOPE.sCharacter('manzoni_scientist_scope').GetFullName]'ın çığır açan keşifleri bir süredir bilim dünyasında yankı uyandırıyor. [SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting] tarafından düzenli olarak makaleleri ve kitapları yayımlanıyor. Yayınevi artık büyümeye devam edeceğini ve [GetPlayer.GetName]'in önde gelen akademik yayınevlerinden biri olacağını duyurdu."
 manzoni.13.f: "Bilimsel yayınevleri, yayıncılık sektörü ile bilim dünyasının etkileşiminden doğabilir – örneğin bir bilim insanı bir inceleme yazdığında. Bilimsel çalışmalara odaklanan yayınevi, aynı zamanda yeni keşifler ve teknolojiler hakkındaki güncel bilgileri güvenilir şekilde aktararak öğrencilere de önemli destek sağlayacaktır."
 manzoni.13.g: "Bu yayınevi, akademik toplumumuzun temel taşlarından biridir."
 manzoni.14.t: "Sanat Yayınevi"
 manzoni.14.d: "Yayınevi [SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting], çok değerli sanatçımız [SCOPE.sCharacter('manzoni_artist_scope').GetFullName]'ın eserlerini yayımlayacağını duyurdu. Bu, ulusal ölçekte önem taşıyan umut verici bir sanat yayınevinin başlangıcı olabilir."
 manzoni.14.f: "Büyük bir sanatçının başyapıtı öylesine önemli hale gelir ki yayımlanırsa, bu sanat dünyasında harika bir gelişimin başlangıcı olabilir. Nota koleksiyonları ya da resimli kitaplar yalnızca eğitimli okuyucu için güzel parçalar değildir – aynı zamanda büyük bir sanatçının izinden gitmek isteyen sonraki kuşaklar için ilham ve öğretici kaynak işlevi görürler."
 manzoni.14.g: "Bu yayınevi, kültürel hayatımızın temel taşlarından biridir."
 artists.52.h: "[SCOPE.sCharacter('manzoni_new_writer_scope').GetHerHis] kariyerini büyük bir ilgiyle izleyeceğiz!"
 manzoni.101.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_bestseller_title_work_type')] – [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]"
 manzoni.101.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_local_or_national_short_text_type')] bir [SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_work_type')] yazdı ve bu eser büyük satış başarısı yakaladı. [SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_bestseller_title_work_type')] adlı hikâye, [SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_work_genre_type')] türünde bir [SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_work_type')]."
 manzoni.101.f: "[SCOPE.sCharacter('manzoni_writer_scope').GetCustom('manzoni_writer_bestseller_flavor_work_type')]"
 manzoni.101.g: "Harika!"
 manzoni.201.g: "Bu kitaba bayıldım!"
 manzoni.102.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] için Dünya Çapında Ün"
 manzoni.102.d: "Yazarımız [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], yalnızca ülkemizde değil, yurtdışında da saygı gören bir yazar olarak kabul ediliyor. [SCOPE.sCharacter('manzoni_writer_scope').GetHerHis|U] eserleri artık dünya edebiyatının bir parçası sayılıyor!"
 manzoni.102.f: "Dünyanın dört bir yanındaki tanınmış yayınevleri, sanatçımızın eserlerini kataloglarına dahil etti. Böylece sınırlarımızın çok ötesine ulaşan bir kitleye erişiyor. Kitap lisansları artık son derece aranan bir değer haline geldi."
 manzoni.102.g: "Umarım bu [SCOPE.sCharacter('manzoni_writer_scope').GetHerHis] başına gitmez."
 manzoni_universal_writer: "Evrensel Yazar"
 manzoni_universal_writer_desc: "Bu yazar, dünya edebiyatı yazarı olarak kabul ediliyor."
 manzoni_writer_local_or_national_short_text_national_writer_loc: "Ulusal yazarımız [ROOT.GetCharacter.GetFullName], "
 manzoni_writer_local_or_national_short_text_local_writer_loc: "[ROOT.GetCharacter.GetFullName], yerel bir [GetPlayer.GetAdjective] yazarı "
 manzoni.301.t: "[SCOPE.sCulture('print_addict_culture').GetName] Kitap Tutkusu"
 manzoni.301.d: "[GetPlayer.GetName] canlı bir kitap endüstrisine ve göz alıcı bir edebiyat elitine sahip. Ülkenin iyi eğitimli vatandaşları kültürel hayata giderek daha fazla ilgi duyuyor. Bazı insanlar şimdiden yazılı eserlere gerçek bir bağımlılıktan söz ediyor – basılı ve yazılı şeylere olan açlık sınırsız görünüyor. [SCOPE.sCulture('print_addict_culture').GetName] vatandaşları, ortaya çıkan bu trende özellikle duyarlı."
 manzoni.301.f: "Bibliyomani terimi, bağımlılık ve/veya obsesif kompulsif bozukluk özellikleri gösteren aşırı kitap toplama tutkusunu ifade eder. Özel bir kütüphane oluşturmayla birlikte görülen zararsız bibliyofiliye kıyasla, bibliyomani ya takıntılı biriktirme, kitap toplama nedeniyle mali çöküş ya da bibliyomaniyi tatmin etmek için suç işleme ile ilişkilidir. Almanya’daki ilk bilinen suçlu bibliyoman Johann Georg Tinius adlı Saksonyalı bir rahiptir. Kilise fonlarını zimmetine geçirmiş ve kitap toplama tutkusunu finanse etmek için (uyuşturucu kullanarak) birkaç soygun ve cinayete teşebbüs etmiştir. Tinius’un kalan kütüphanesinin açık artırma kataloğunda yalnızca 16.650 eser bulunuyordu. Bir bibliyotaf örneği olarak ise Comte de Lignerolles gösterilebilir. 1848’den itibaren tamamen sosyal hayattan çekildiği ve yalnızca Paris’te özel olarak tasarlanmış bir dairede sakladığı kitap koleksiyonunu büyütmeye ve korumaya adadığı söylenir. Bilgisini başkalarıyla paylaşmaz, hatta bazı kitaplara sahip olduğunu inkâr ederdi. Koleksiyonunun büyüklüğü ve değeri ancak ölümünden sonra kitaplar açık artırmaya çıkarıldığında ortaya çıkmıştır."
 manzoni.301.g: "Ama herkes okumanın ne kadar tehlikeli olduğunu bilir!"
 manzoni.302.t: "Kitap Deliliği zirvesini geçti mi?"
 manzoni.302.d: "Yayıncılık sektöründe bir kriz baş gösteriyor: Görünüşe göre halkın büyük bir kısmı okumaya olan isteğini kaybetti, kimi düşük kaliteli kitaplar yüzünden, kimi de değişen boş zaman alışkanlıkları nedeniyle."
 manzoni.302.f: "Dışarıda kitapsız bir dünya var. Çare mümkün. Filmler, spor, alkol bağımlılığı ve kumar benzer teşvikler sunar ve kitap delisi bireyleri yeniden toplumsal hayata döndürebilir."
 manzoni.302.g: "Kitaplar zaten sıkıcı."
 manzoni.302.h: "Okuma sevgisini uyandırmak için bir kampanya başlat!"
 manzoni.303.t: "Madam [SCOPE.sCharacter('manzoni_bookmadame_scope').GetLastNameNoFormatting]'ın Kitap Kulübü"
 manzoni.303.d: "[SCOPE.sState('manzoni_book_state').GetName]’de nüfuzlu ve eğitimli bir hanımefendi, edebiyat meraklılarının merkezi haline gelen bir kitap kulübü kurdu. Kitaplara aç insanlar buraya akın ediyor."
 manzoni.303.f: "Kadınlar 1600’lerden beri İncil çalışma grupları kurmuş olsa da, laik okuma toplulukları hem Amerika’da hem de Avrupa’da ancak 1700’lerin sonlarında ortaya çıktı. Okuma grupları belirli ırk veya sınıflarla sınırlı değildi; örneğin Siyah kadınlar için bilinen ilk okuma grubu 1827’de Massachusetts, Lynn’de kuruldu. 1800’ler boyunca kadınların okuma toplulukları büyüdü, bazıları köleliğin kaldırılması gibi toplumsal meselelerde seslerini yükseltti—ve bu da yüzyılın sonundaki kulüp hareketinin öncüsü oldu. 1900’lere gelindiğinde kitap kulüpleri hem entelektüel bir çıkış noktası hem de radikal bir siyasi araç olmaya devam etti."
 manzoni.303.g: "Harika bir girişim."
 manzoni.304.t: "Gelişen Kitap Endüstrisi"
 manzoni.304.d: "[SCOPE.sState('manzoni_book_state').GetName]’de yükselen bir yayınevi [SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting]&[SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting], piyasada önemli bir oyuncu haline geldi. Görünüşe göre sahibi [SCOPE.sCharacter('manzoni_publisher_scope').GetFullName] dönemin ruhunu yakalamış."
 manzoni.304.f: "Eskiden [SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting]&[SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting], yalnızca küçük basılı ürünlerle bilinen, ancak içeridekilerin tanıdığı bir isimdi. Ancak küçük baskılar artık halkın gözdesi haline geldi, bu yüzden şirket bölümlerini genişletti ve artık kitlelerin zevkine daha çok hitap etmeye odaklanmak istiyor. Eleştirmenler mevcut kalite seviyesinin düşebileceğini öne sürüyor, fakat bu belki de yalnızca dönemin modasıdır."
 manzoni.304.g: "Daha da fazla kitap üretin!"
 manzoni.304.h: "Yüksek kaliteli kitaplar üretin."
 manzoni.311.t: "Piyon Olarak Bir Yayınevi"
 manzoni.311.d: "[SCOPE.sState('manzoni_book_state').GetName]’de geleneksel bir yayınevi iflasın eşiğinde. Rakip bir yayınevi ise sayısız işi kurtaracak bir teklif sundu. Ancak bu yayınevi bir muhalefet partisine, daha doğrusu [SCOPE.sCharacter('publisher_ig_leader').GetInterestGroup.GetName] grubuna yakın."
 manzoni.311.f: "Geçen hafta büyük bir yayınevi iflasın eşiğinde olduğunu ve birçok çalışanı işten çıkarmak zorunda kalacağını açıkladığında medya dünyası şok yaşadı. Ne şanstır ki, kısa sürede tüm şirketi devralmak isteyen başka bir yayınevi bulundu ve hiçbir kesinti yapılmayacağı sözünü verdi. Ancak bir sorun var. Bu cömert teklifin arkasında yayınevinde büyük paya sahip olan [SCOPE.sCharacter('publisher_ig_leader').GetInterestGroup.GetName] bulunuyor. Şirket birleşmesi böylece siyasi bir partinin liderliği altında gerçekleşecek. Eleştirmenler bunun yalnızca bölgeyi değil, medya pazarının tamamını etkileyecek önemli bir siyasi etkiye yol açabileceğini belirtiyor. Bazıları ise olayın ardında [SCOPE.sCharacter('publisher_ig_leader').GetFullName]’in planı olduğunu düşünüyor."
 manzoni.311.g: "Şirketi kurtarıyorlarsa, neden önlerine engel koyalım ki?"
 manzoni.311.h: "Bu siyasi etkiye izin veremeyiz!"
 manzoni.312.t: "Muhalefetçi Yayınevi"
 manzoni.312.d: "[SCOPE.sState('manzoni_book_state').GetName]’de bir yayınevi güç kazandı. Görünüşe göre yakın gelecekte büyümek istiyor ve kendisini esasen hükümet politikalarına karşı bir denge unsuru olarak görüyor, muhalefet partilerine yakın duruyor. Hükümetteki bazı üyeler, sorunlu şirkete birkaç bürokratik engel çıkarılabileceğini düşünüyor."
 manzoni.312.f: "'Başkalarının görüşleri ve konuşma özgürlüğü değerli bir hazinedir. Kendi sözlerimize daha çok değer vermemiz gerekmez mi, efendim?'"
 manzoni.312.g: "Birkaç idari işlem onların işini zorlaştırabilir."
 manzoni.312.h: "Böyle kirli numaralara ihtiyacımız yok."
 manzoni.321.t: "Kitap Lisansı"
 manzoni.321.d: "Yayıncı [SCOPE.sCharacter('manzoni_publisher_scope').GetLastNameNoFormatting], bugün [SCOPE.sCountry('manzoni_country_scope').GetName]’den yazar [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] ile özel bir sözleşme imzaladı. [SCOPE.sCharacter('manzoni_writer_scope').GetHerHis] eserleri halk arasında son derece popüler."
 manzoni.321.f: "Yayıncılar, halkın zevklerini görmezden gelemez. Çağa uygun yabancı yazarlar, ülkemizde yayımlanma fırsatına sahiptir."
 manzoni.321.g: "Ama insanlar neden yerli yazarların eserlerini okumuyor?"
 manzoni.322.t: "Yabancı Popüler Edebiyat"
 manzoni.322.d: "Yerel bir yayınevi bir süredir [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]’in yabancı eserlerini yayımlıyor. Eleştirmenler, bu popüler edebiyatın oldukça sorgulanabilir olduğunu ve kitap piyasamızın kalitesine zarar verdiğini kabul ediyor. Ancak bu bayağı eserler çılgınca satıyor."
 manzoni.322.f: "'Gerçekten yazılan her şey yayımlanmaya değer mi? Biri flütle birkaç nota çıkardı diye her müzik çalınır mı? Çocukların resimleri neden bu yüzden galeride değil de buzdolabında sergilenir? Bazı edebî döküntüler sadece çöp, o kadar!'"
 manzoni.322.g: "Bu yabancı çöplüğü yasakla!"
 manzoni.322.h: "İnsanlar okumak istiyorsa o kadar da kötü olamaz."
 manzoni.323.t: "Korsan Kopyalar"
 manzoni.323.d: "[SCOPE.sCountry('manzoni_country_scope').GetName] Ticaret Bakanlığı’ndan bir temsilci bugün bize şikâyette bulundu. [SCOPE.sState('manzoni_book_state').GetName]’de bir yayınevinin, ulusal yazarları [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]’in önemli eserlerini lisanssız yayımlayarak büyük kazanç elde ettiği söyleniyor. Bu korsanlığı durdurmamız istendi."
 manzoni.323.f: "Ne yazık ki 18. yüzyılda, yazarların ve yayınevlerinin gelirlerinin rakipler tarafından eserlere izinsiz kopyalar yapılarak ellerinden alınması hâlâ olağandı. 19. yüzyıldan itibaren, yazarların ve yayıncıların haklarını koruyan iyileştirmeler yürürlüğe girdi, ancak bu düzenlemeler çoğunlukla yalnızca ulusal düzeyde mümkün oldu. Yabancı yayınevleri hâlen çoğu zaman yazarların izni olmadan kopyalar ve çeviriler basıyordu. Bu durum Jules Verne gibi uluslararası ünlü yazarları bile etkiledi; eserleri İngilizce konuşulan ülkelerde izinsiz dağıtılıyor, hatta bazen büyük ölçüde değiştirilmiş olarak yayımlanıyordu."
 manzoni.323.g: "Bir sözleşme yapılana kadar baskı makinelerini durdurun."
 manzoni.323.h: "Edebiyat herkes içindir."
 manzoni.331.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetLastName]'ın Uluslararası Okuma Turu"
 manzoni.331.d: "[GetPlayer.GetNameNoFlag]’ın en büyük yazarı [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], yabancı bir yayıneviyle yaptığı ön görüşmelerin ardından, yurtdışındaki okurlarını da kendi eserlerini okuyarak onurlandırmaya karar verdi. İlk durağı [SCOPE.sCountry('manzoni_writer_destination_scope').GetName] olacak."
 manzoni.331.f: "Yazarlar kariyerlerinde bir kez okuma turuna çıkabilir. Duraklar, izleyici zevklerinin yazarın türüyle örtüştüğü ülkelere karşılık gelir. Her yeni durakla birlikte itibar, edebiyat geleneği ve ilişkiler gelişebilir. Bir yazar turunda en fazla 5 ülke ziyaret edebilir. Eğer artık yazarın türüne ilgi duyan ülke kalmazsa tur sona erer."
 manzoni.331.g: "Bol şans!"
 manzoni.332.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetLastName], [GetPlayer.GetNameNoFlag]’a ulaştı"
 manzoni.332.g: "Yerel bir yayıneviyle toplantı ayarla."
 manzoni.332.h: "Edebiyat salonunda halka açık bir okuma düzenle."
 manzoni.332.i: "Hükümdar, [SCOPE.sCharacter('manzoni_writer_scope').GetHerHis] eserlerinin özel bir sunumunu istiyor."
 manzoni.332.j: "[SCOPE.sCharacter('manzoni_writer_scope').GetHerHim] sıcak bir şekilde karşıla."
 manzoni.333.t: "Edebî Devlerin Buluşması"
 manzoni.333.d: "Dünya çapında ünlü yazar [SCOPE.sCharacter('manzoni_writer_2_scope').GetFullName] ile ulusal yazarımız [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], bir kitap tanıtımında bir araya geldi. Görüş alışverişi belli ki çok verimli geçti."
 manzoni.333.f: "'Sen gerçekten harikasın.'\n'Teşekkür ederim, sen de gerçekten harikasın.'\n'Hayır, asıl sen harikasın.'\n'Hayır, sen harikasın.'"
 manzoni.333.g: "İlham verici!"
 manzoni.334.t: "Yeni Bir Durağa mı?"
 manzoni.334.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] yurtdışındaki konaklamasını tamamladı. Şimdi soru şu: [SCOPE.sCharacter('manzoni_writer_scope').GetSheHe] geri mi dönmeli, yoksa yeni bir durak mı seçmeli?"
 manzoni.334.f: "Yazarlar kariyerlerinde bir kez okuma turuna çıkabilir. Duraklar, izleyici zevklerinin yazarın türüyle örtüştüğü ülkelere karşılık gelir. Her yeni durakla birlikte itibar, edebiyat geleneği ve ilişkiler gelişebilir. Bir yazar turunda en fazla 5 ülke ziyaret edebilir. Eğer artık yazarın türüne ilgi duyan ülke kalmazsa tur sona erer."
 manzoni.334.g: "[SCOPE.sCountry('manzoni_writer_destination_scope').GetName] iyi bir durak olurdu."
 manzoni.334.h: "[SCOPE.sCharacter('manzoni_writer_scope').GetLastName] geri dönmeli."
 manzoni.341.t: "Edebiyat Çevresi"
 manzoni.341.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName], [ROOT.GetCountry.GetCapital.GetCityHubName]’de ülkenin önde gelen yazarlarından oluşan bir çevre kurdu. Etkinlik büyük ilgi topladı. Bu düzenli buluşmadan büyük beklentiler var."
 manzoni.341.f: "Edebiyat çevreleri her zaman etkili kültürel kurumlar olmuştur. Fransız Parnas şairleri ya da Alman Georgekreis gibi oldukça resmî olabilirler. Daha gayriresmî bir edebiyat topluluğuna örnek ise, 1930’ların başından 1949’un sonlarına kadar yaklaşık yirmi yıl boyunca Oxford Üniversitesi’nde J. R. R. Tolkien ve C. S. Lewis ile bağlantılı olan The Inklings’tir. The Inklings, kurguda anlatının değerini öven ve fantastik yazını teşvik eden edebiyat meraklılarıydı. Tolkien ve Lewis dışında en bilinen üyeleri Charles Williams ve (her ne kadar Londralı olsa da) Owen Barfield idi."
 manzoni.341.g: "Bu, ülkemizin edebiyat kültürünü önemli ölçüde artıracak."
 manzoni.341.h: "Bu, yeni bir sanatçı nesline ilham verecek."
 manzoni.341.i: "Bu çevre toplumumuz üzerinde güçlü bir etkiye sahip olacak."
 manzoni.400.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] hükümetimizi eleştiriyor"
 manzoni.400.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName], [GetPlayer.GetName]’deki siyasi durumdan memnun değil. Politikamızı değiştirmezsek, [SCOPE.sCharacter('manzoni_writer_scope').GetSheHe] artık [concept_manzoni_national_writer] olmamayı düşünebilir."
 manzoni.400.f: "\"Bu rezalet! Bu haksızlık!\" - [SCOPE.sCharacter('manzoni_writer_scope').GetFullNameNoFormatting]"
 manzoni.400.g: "Belki de bir şeyleri değiştirmeliyiz..."
 manzoni.400_tt: "Eğer [concept_manzoni_national_writer]'ın [concept_interest_group] [concept_approval] seviyesi #n -2#! altında olursa, istifa etmeyi düşünecek. Onayın artırılması için bir yılın var."
 manzoni.401.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] artık Ulusal Yazar değil"
 manzoni.401.d: "[GetPlayer.GetName]'deki durum [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] için katlanılmaz hale geldi. Bu yüzden [SCOPE.sCharacter('manzoni_writer_scope').GetSheHe], [concept_manzoni_national_writer] görevinden istifa edip artık ulusumuzun yüzü olmamaya karar verdi."
 manzoni.401.f: "\"Yeter artık! Siz beceriksiz ahmaklarsınız! Bize önem vermiyorsunuz! Bize yardım etmiyorsunuz. Bu kesinlikle kabul edilemez!\" - [SCOPE.sCharacter('manzoni_writer_scope').GetFullNameNoFormatting]"
 manzoni.401.g: "Aman Tanrım! Neyse, devam!"
 manzoni.500.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] hükümetten bıktı"
 manzoni.500.f: "\"Değişim lazım! Halk acı çekiyor! Yazılarımı yalnızca dünyayı değiştirmeye adayacağım! Kahrolsun o diktatörler!\" - [SCOPE.sCharacter('manzoni_writer_scope').GetFullNameNoFormatting]"
 manzoni.500.g: "Pekala."
 manzoni.500.h: "[SCOPE.sCharacter('manzoni_writer_scope').GetHerHim]'i durdurmak için ne gerekiyorsa yap"
 manzoni.500.i: "Hayır."
 manzoni.500.j: "Güzel şaka!"
 manzoni.510.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] yazmaya odaklanıyor"
 manzoni.510.d: "Siyasi durum [SCOPE.gsInterestGroup('manzoni_writer_ig_scope').GetName] için oldukça iyi olduğundan, [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] görevinden ayrılmanın ve tutkularından biri olan yazarlığa tamamen odaklanmanın doğru zaman olduğuna karar verdi."
 manzoni.510.f: "\"Nihayet yeniden ilham buldum! Bunca yıl iyi bir dava uğruna savaştıktan sonra nihayet tekrar yazmaya dönebiliyorum! Hikâyelerim harika olacak. Belki siyaset hakkında da bir hikâye yazmalıyım!\" - [SCOPE.sCharacter('manzoni_writer_scope').GetFullNameNoFormatting]"
 manzoni.510.g: "Umarım [SCOPE.sCharacter('manzoni_writer_scope').GetSheHe] harika eserler yaratır!"
 manzoni.510.h: "Bence [SCOPE.sCharacter('manzoni_writer_scope').GetSheHe] siyasette kalmalı."
 set_character_as_local_writer_scope_effect_tt: "[SCOPE.sCharacter('wannabe_writer_scope').GetFullName] bir [concept_manzoni_local_writer] oluyor."
 manzoni.590.t: "Yerel bir Yazar ortaya çıktı"
 manzoni.590.d: "[SCOPE.sCharacter('manzoni_new_writer_scope').GetFullName], bir [concept_manzoni_local_writer] olarak giderek daha tanınır hale geliyor. Şüphesiz [SCOPE.sCharacter('manzoni_new_writer_scope').GetSheHe]'nin önü parlak!"
 manzoni.590.f: "\"[GetPlayer.GetName]'in en ünlü yazarı olmak için sabırsızlanıyorum! En iyisi olmak istiyorum!\" - [SCOPE.sCharacter('manzoni_new_writer_scope').GetFullNameNoFormatting]"
 manzoni.590.g: "Daha fazla yazar her zaman iyidir!"
 manzoni.600.t: "Ulusal Kütüphane Açılışı"
 manzoni.600.d: "[GetPlayer.GetNameNoFlag] Ulusal Kütüphanesi'nin açılışıyla birlikte, bilgi alışverişini ve halkın eğitimini geliştirmek adına önemli bir adım atıldı. [SCOPE.sCharacter('manzoni_librarian_scope').GetFullName], yeni kurumun ilk kütüphanecisi olarak terfi etti."
 manzoni.600.f: "Ulusal kütüphaneler Avrupa’da 18. yüzyılın sonunda ortaya çıktı ve uzun 19. yüzyılda altın çağını yaşadı. Amaç, geniş ve eşitlikçi bir sivil halka eğitime erişim sağlamaktı; bu ulusal bir görev olarak görülüyordu. Aynı zamanda, rol model kabul edilen İngiliz ve Fransız kurumları, kendi kültürel uluslarının üstünlük iddiasını ve küresel misyonunu aktarıyordu; Amerikalı ve Rus taklitçiler de bu çizgiyi benimsedi. Bilimlerin genişlemesi ve farklılaşmasıyla birlikte ulusal kütüphaneler özel akademik kütüphanelerin yerini aldı."
 manzoni.600.g: "Şampanya, Şampanya!"
 manzoni.601.t: "Bir Kütüphanenin Kapatılması"
 manzoni.601.d: "Yönetim, başkentteki ulusal kitap arşivinin tamlığını sağlamak için çabalıyor. Bu nedenle [SCOPE.sState('manzoni_library_state').GetName]’deki kütüphanenin kapatılmasına ve kitap arşivinin taşınmasına karar verildi."
 manzoni.601.f: "Eğer herhangi bir nedenle başkent dışında bir [concept_manzoni_library] bulunuyorsa, kitap koleksiyonunun yarısı otomatik olarak başkente aktarılacak. Başkent dışındaki kütüphaneler kapatılıyor."
 manzoni.601.g: "Bu seçkin kitap koleksiyonu Ulusal Kütüphanemizi zenginleştirecek."
 manzoni.601.h: "Koleksiyonu yeni bir Ulusal Kütüphane inşası için temel al."
 manzoni.610.t: "[SCOPE.sCountry('manzoni_library_country').GetName] Ulusal Kütüphanesi"
 manzoni.610.d: "Düşman başkentinin işgaliyle birlikte, [SCOPE.sCountry('manzoni_library_country').GetName] Ulusal Kütüphanesi de kontrolümüz altına girdi. Kaos sırasında nadir kitapları çalarken yakalanan askerler oldu bile. Kitaplara el koyma ve onları kendi ulusal kütüphanemize aktarma isteği giderek artıyor."
 manzoni.610.f: "Guglielmo Libri, eski ve değerli el yazmalarına olan sevgisi ve bunları çalmasıyla tanınan bir İtalyan kontu ve matematikçiydi. Kendi araştırmaları kısmen Galileo, Fermat, Descartes, Leibniz ve diğer büyük isimlerin yaklaşık 1800 el yazması ve kitabına dayanıyordu; bunların kariyeri boyunca topladığını iddia etmişti. Ancak gerçekte, bunların bazıları Floransa’daki Biblioteca Medicea Laurenziana’dan çalınmıştı. 1841’de, dönemin güçlü Fransız Polis Şefi François Guizot ile dostluğu sayesinde Fransız Kütüphanelerinin Baş Müfettişi olarak görevlendirildi. Değerli kitapların ve el yazmalarının kataloglanmasını da içeren bu görev, Kont Libri’nin tutkusunu tatmin etmesi için ona fırsat sağladı—çalmak. Ayrıcalıklarını kötüye kullanarak ve sahte bir sağlık sorununu (öksürük, hava durumuna aldırmadan giydiği büyük pelerin) bahane ederek, ülke genelindeki kütüphane arşivlerinde tek başına vakit geçirmeyi başardı. Orada 'ödünç aldığı' ve asla geri getirmediği eserleri topladı. 30.000’den fazla kitabı çalmayı başardı."
 manzoni.610.g: "Kitaplara el koy."
 manzoni.610.h: "Bu, sanat ve kültüre karşı işlenmiş bir günah olur!"
 manzoni.611.t: "Ulusal Kütüphane yağmalandı!"
 manzoni.611.d: "Düşman birlikleri Ulusal Kütüphanemizi yağmaladı! Bu saygın kurumu eski ihtişamına kavuşturmak yıllar alacak!"
 manzoni.611.f: "Guglielmo Libri, eski ve değerli el yazmalarına olan sevgisi ve bunları çalmasıyla tanınan bir İtalyan kontu ve matematikçiydi. Kendi araştırmaları kısmen Galileo, Fermat, Descartes, Leibniz ve diğer büyük isimlerin yaklaşık 1800 el yazması ve kitabına dayanıyordu; bunların kariyeri boyunca topladığını iddia etmişti. Ancak gerçekte, bunların bazıları Floransa’daki Biblioteca Medicea Laurenziana’dan çalınmıştı. 1841’de, dönemin güçlü Fransız Polis Şefi François Guizot ile dostluğu sayesinde Fransız Kütüphanelerinin Baş Müfettişi olarak görevlendirildi. Değerli kitapların ve el yazmalarının kataloglanmasını da içeren bu görev, Kont Libri’nin tutkusunu tatmin etmesi için ona fırsat sağladı—çalmak. Ayrıcalıklarını kötüye kullanarak ve sahte bir sağlık sorununu (öksürük, hava durumuna aldırmadan giydiği büyük pelerin) bahane ederek, ülke genelindeki kütüphane arşivlerinde tek başına vakit geçirmeyi başardı. Orada 'ödünç aldığı' ve asla geri getirmediği eserleri topladı. 30.000’den fazla kitabı çalmayı başardı."
 manzoni.611.g: "NE YAPTILAR?!"
