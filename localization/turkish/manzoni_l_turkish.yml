 manzoni.711.t: "[SCOPE.gsInterestGroup('target_ig_1').GetName] için Övgü"
 manzoni.711.d: "[SCOPE.sCharacter('target_character_1').GetFullName] yayın imparatorluğuna ait bir gazete, [SCOPE.gsInterestGroup('target_ig_1').GetName] yönetim çabalarını özel bir şekilde övgüyle vurgulamıştır. [SCOPE.sCharacter('target_character_1').GetLastName] [SCOPE.sCharacter('target_character_1').GetHerselfHimself] bu çıkar grubuna ait olduğundan bu bir tesadüf değildir."
 manzoni.711.f: "'Basın, bir kadına benzer: yalan söylediğinde yücedir, inanmanız için sizi zorlayana kadar bırakmaz. Halk, aptal bir koca gibi, her zaman boyun eğer.' -Honoré de Balzac"
 manzoni.711.g: "Makaleyi mümkün olduğunca geniş dağıtın!"
 manzoni.711.h: "Bu, yağcılık girişimi açısından iğrençtir."
 manzoni.712.t: "Hassas Bir Birlik"
 manzoni.712.d: "[SCOPE.sCharacter('target_character_1').GetFullName]'ın son evliliği zaten dikkat çekmişti. Şimdi ortaya çıktı ki [SCOPE.sCharacter('target_character_1').GetHerHis] eşi, [SCOPE.sCharacter('target_character_2').GetLastNameNoFormatting] ailesinin bir üyesi ve bu aile, [SCOPE.sCharacter('target_character_2').GetFullName] ile birlikte, [SCOPE.gsInterestGroup('target_ig_1').GetName] liderini sağlar. Bu durum gazetenin bağımsızlığı, hükümetle bağları ve [SCOPE.sCharacter('target_character_1').GetLastName] imparatorluğunun gerçek gücü hakkında soru işaretleri yaratıyor."
 manzoni.712.f: "Maliye bakanının eşinin, [SCOPE.sCharacter('target_character_1').GetLastName] yayın evine ait bir gazetede çalıştığı haberi çıktığında, bazı yetkililer hayatta neyi yanlış yaptıklarını düşünmeye başladılar - ve daha iyi eşler bulamadılar."
 manzoni.712.g: "Aşk nereye düşer!"
 manzoni.712.h: "Bu eleştirilmeye değer bir gelişmedir."
 manzoni.713.t: "Hükümet Propagandası"
 manzoni.713.d: "Bir bölgede, [SCOPE.sCharacter('target_character_1').GetFullName]'ın gazeteleri, günlük yaşamda öylesine baskın hale geldi ki, neredeyse tüm güncel olaylar bilgisi yalnızca bu medya aracılığıyla sağlanmaktadır. Etkili olarak, [SCOPE.sCharacter('target_character_1').GetLastName] gerçeği dikte edebilir. Neyse ki, bu haberler hükümet yanlısıdır."
 manzoni.713.f: "'Ben basınım.' -[SCOPE.sCharacter('target_character_1').GetFullNameNoFormatting]"
 manzoni.713.g: "Basın hükümet için çalışıyorsa sansüre ne gerek var?"
 manzoni.714.t: "Göze Çarpmayan Sübvansiyonlar"
 manzoni.714.d: "[SCOPE.sCharacter('target_character_1').GetFullName]'ın gazeteleri yıllardır devlet hazinesinden gizli sübvansiyon almaktadır. Hükümet, dostane bir basın satın almaktadır. Aracı, [SCOPE.sCharacter('target_character_1').GetLastName] ile aynı partiden olan [SCOPE.sCharacter('target_character_2').GetFullName]'dir. Bu durum basına olan güveni zedelemiştir."
 manzoni.714.f: "'Gazetecilerle tiyatro lobilerinde karşılaşıyorum; onları görmekten ürperiyorum. Gazetecilik bir cehennemdir, kötülük, ihanet ve yalanlarla dolu dipsiz bir kuyu; Dante gibi, Virgil'in kutsal defnesi tarafından korunmadıkça kimse lekelenmeden geçemez.' -Honoré de Balzac"
 manzoni.714.g: "İşbirliği iyi gidiyor, sorun ne?"
 manzoni.714.h: "Basın ve devlet arasındaki bu işbirliği sona ermeli!"
 manzoni.721.t: "Hedefteki [SCOPE.gsInterestGroup('target_ig_2').GetName]"
 manzoni.721.d: "[SCOPE.sCharacter('target_character_1').GetFullName], gazetelerini hükümette bakanlık pozisyonlarında bulunan [SCOPE.gsInterestGroup('target_ig_2').GetName]'i hedef almak üzere talimatlandırdı. [SCOPE.sCharacter('target_character_1').GetSheHe|U] adeta bir cadı avı başlattı—ve gazeteler, her sansasyonel başlıkla daha çok satıyor."
 manzoni.721.f: "'Posta kodlarıyla kim uğraşıyor?\nDemiryolu yollarında kim entrika çevriliyor?\nKim bir yelpazenin arkasında \"Gerçek\" fısıldıyor,\nVe taç, kilise ve insanı sorguluyor?\n[ SCOPE.gsInterestGroup('target_ig_2').GetName]! Bilgin zararlılar!\nBoşuna protestolarından hiç vazgeçmezler!'"
 manzoni.721.g: "Yalan! Sadece yalan!"
 manzoni.721.h: "Bu makale yeniden paylaşılmayacak."
 manzoni.721.i: "Ama gazete öyle diyorsa?"
 manzoni.722.t: "Muhalefetin Sesi"
 manzoni.722.d: "[SCOPE.sCharacter('target_character_1').GetHerHis] medya gücünü kullanarak, [SCOPE.sCharacter('target_character_1').GetFullName] etkili bir makalede [SCOPE.gsInterestGroup('target_ig_1').GetName]'i övdü. İlgili medya imparatorluğu zaten tonu ele aldı ve propaganda davulunu çalmaya başladı."
 manzoni.722.f: "'Gazetecilik, bir din adamının elinde olmanın ötesinde, önce bir parti silahı ve sonra vicdansız ve çekincesiz yürütülen bir ticari spekülasyon haline geldi. Her gazete, Blondet'in dediği gibi, doğru görüşlerin elde edildiği bir dükkandır. Eğer kambur için bir gazete olsaydı, sütunlarında sabah ve akşam, sakatlığın güzelliği, yararı ve gerekliliğini açıkça anlatırdı.' -Honoré de Balzac"
 manzoni.722.g: "Bu ucuz propagandayla ne ilgimiz var?"
 manzoni.722.h: "Bize yakın bir gazetede karşı argüman yayımladık."
 manzoni.723.t: "[SCOPE.sCharacter('target_character_2').GetLastName] Olayı"
 manzoni.723.d: "[SCOPE.sCharacter('target_character_1').GetFullName], büyük bir editoryal ve araştırmacı haberlerle ulusal bir kriz başlattı: Görünüşe göre [SCOPE.sCharacter('target_character_2').GetFullName] fonları zimmete geçirmiş. Halk vergi israfına öfkeli, hükümet krize sürükleniyor, [SCOPE.gsInterestGroup('target_ig_2').GetName] paniğe kapıldı—ve [SCOPE.sCharacter('target_character_1').GetLastName] yayın evi her zamankinden daha çok kazanç sağlıyor."
 manzoni.723.f: "[SCOPE.sCharacter('target_character_1').GetSheHe|U] küçümsenmişti. Yıllarca, [SCOPE.sCharacter('target_character_1').GetLastName] sadece bir yayıncı olarak görülüyordu. Ama [SCOPE.sCharacter('target_character_1').GetHerHis] [SCOPE.gsInterestGroup('target_ig_1').GetName]'in etkisini artırma ve hükümetten nefret ettiği kişiyi görevden alma arzusu meyvesini veriyor. Aylarca, [SCOPE.sCharacter('target_character_1').GetSheHe] en iyi gazetecilerini hükümet kurumları ve yetkililerini hedef almak için konuşlandırdı, tarihi bir yolsuzluk skandalını ortaya çıkarmak için. Eski eleştirmenler bile bunun parlak bir gazetecilik araştırması olduğunu ve yıllarca meslektaşlara fayda sağlayacağını kabul etmek zorunda. Devlet ve hükümet üyeleri için ise saldırının hesaplanamaz sonuçları vardır. İstifa, hükümet değişikliği ve hatta olası yeni seçimler konuşuluyor."
 manzoni.723.g: "Bu sadece muhalefetin propagandası!"
 manzoni.723.h: "Bir istifa çoktan gerekliydi."
 manzoni.723.i: "Tüm kabineyi yeniden organize edin."
 manzoni.723.j: "Halkı oy sandığında karar vermeye bırakın!"
 manzoni.731.t: "Her Yolla Daha Yüksek Tiraj"
 manzoni.731.d: "[SCOPE.sCharacter('target_character_1').GetFullName], tirajın sadece dergisi yeterince magazinsel olmadığı için düştüğüne kesinlikle inanıyor."
 manzoni.731.f: "'Sanki sıradan insanlarla bağımızı kaybettik. Fildişi kuleye geri çekilemeyiz. Tekrar hızlanmalıyız. Kısa, hızlı yazılar—en fazla üç, dört paragraf. Daha fazla çarpıcı haber! ÇARPICI! Daha fazla bıçaklama haberi—kan fışkırmalı!' -[SCOPE.sCharacter('target_character_1').GetFullNameNoFormatting]"
 manzoni.731.g: "EVET!"
 manzoni.731.h: "En azından biraz gazetecilik etiği yok mu?"
