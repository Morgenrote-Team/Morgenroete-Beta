 manzoni.921.t: "İtalyan Müzik Kültürü"
 manzoni.921.d: "İtalya, müzik kültürünün gelişiminde belirleyici rol oynayan ülkelerden biri olarak kabul edilir – ister çalgı yapımı, ister operanın gelişimi, ister ünlü şarkıcıların eğitimi ya da büyük besteciler açısından olsun. Rönesans’tan itibaren yarımada, tüm Avrupa’yı büyüleyen ve yeni esinler sağlayan eşsiz bir müzik kültürüyle tanınmıştır. 19. yüzyıla kadar operanın tek dilinin İtalyanca olması bu büyük mirasın kanıtıdır."
 manzoni.921.f: "'Bana çamaşırcının faturasını verin, onu bile müziğe dökerim.' -Gioachino Rossini"
 manzoni.921.g: "İtalya zengin bir müzik tarihine sahiptir."
 manzoni.921.h: "Gelecek İtalyan müzik kültürüne aittir!"
 manzoni.922.t: "Dante Kültü"
 manzoni.922.d: "Dante Alighieri İtalyan kültürünün en büyük sembolü kabul edilir ve onun 'İlahi Komedya'sı dünya edebiyatının klasiklerinden ve Orta Çağ’ın en önemli edebi tanıklığından biri olarak görülür. Dante’ye duyulan hayranlık, yurtseverler arasında adeta bir kült haline gelmiştir ve aynı zamanda dış dünyaya, Risorgimento’dan çok önce bir pan-İtalyan hissiyatının var olduğunun kanıtı olarak gösterilmektedir. Sonuçta, İtalya’nın sınırlarını ilk kez 'Sì' dilinin konuşulduğu yerler olarak tanımlayan Dante’ydi. Floransa’da 'en yüce şair'i anmak için bir anıt dikilecektir."
 manzoni.922.f: "'Hayat yolculuğumuzun ortasında\nkendimi karanlık bir ormanda buldum,\nzira doğru yol kaybolmuştu.' -Dante Alighieri"
 manzoni.922.g: "Dante kültünü destekle ve Floransa’da bir anıt inşa et."
 manzoni.922.h: "Ve gelecek nesilleri üçlüklerle işkenceye mi maruz bırakalım?"
 manzoni_italian_consiousness_2_tt: "Yerel Korsikalı, Ticinez, Maltalı ve Romansh halkları İtalyan nüfusu haline gelir. Onların toprakları İtalyan yurtlarına dönüştürülecektir."
 je_manzoni_italian_greater_national_identity: "Dante’nin Mirası"
 je_manzoni_italian_greater_national_identity_reason: "İtalyan kimliği nerede biter? Dante için bu açıktı: dilde! Ve İtalyan kültürünün kalbinden uzak birçok yurtsever için bile gerçek sınırların yanı sıra gerçek dilin hangisi olduğu netti. Dağlardaki kaba Latin lehçelerine sahip halklar ve Fransız boyunduruğu altındaki Toskanca konuşan Korsikalılar da ulusun bir parçası olmalıydı – sadece siyasi olarak değil, aynı zamanda ruhen de. Malta bir istisna – ama kaybolmuş bir İtalyan halkı çok uzun süre annesinden koparılmış bir çocuk gibi yakında kendi dilini yeniden öğrenecektir."
 manzoni.924.t: "Sì’nin Dili"
 manzoni.924.d: "Dante Alighieri’nin İtalya’nın dil sınırlarını tanımlamasının üzerinden 500 yıldan fazla zaman geçti ve bu dil topluluğu artık ulusal bir topluluk haline geldi. Alplerin vadilerinden Malta’ya, Sardunya ve Korsika kıyılarından İstria’ya kadar tek bir İtalyan dil topluluğu, en büyük şairin mirasını taşımaktadır."
 manzoni.924.f: "Napoliten mi? Bir İtalyan lehçesi. Venedikçe mi? Bir İtalyan lehçesi. Korsikaca mı? Bir İtalyan lehçesi. Ladince mi? Bir İtalyan lehçesi. Romansh mı? Bir İtalyan lehçesi. Maltaca mı? Semitik kelime hazinesi olan bir çeşit İtalyan lehçesi."
 manzoni.924.g: "İtalya artık dilsel olarak da birleşti!"
 manzoni_italian_irredenta_decision_tt: "#YELLOW İtalyan Irredenta#! kararı uygulandı."
 manzoni.925.t: "Korsika Entegre Edildi"
 manzoni.925.d: "Korsika dili ve kültürü artık tamamen İtalyanlığa entegre oldu. İzole bir İtalyan kültürü yuvasına geri döndü."
 manzoni.926.t: "Ticinese Entegre Edildi"
 manzoni.926.d: "Ticinese dili ve kültürü artık tamamen İtalyanlığa entegre oldu. İzole bir İtalyan kültürü yuvasına geri döndü."
 manzoni.927.t: "Maltalı Entegre Edildi"
 manzoni.927.d: "Maltalı dili ve kültürü artık tamamen İtalyanlığa entegre oldu. İzole bir İtalyan kültürü yuvasına geri döndü."
 manzoni.928.t: "Romansh Entegre Edildi"
 manzoni.928.d: "Romansh dili ve kültürü artık tamamen İtalyanlığa entegre oldu. İzole bir İtalyan kültürü yuvasına geri döndü."
 manzoni.925.f: "'Bazıları olumlu cevap olarak Oc der, diğerleri Oil der, diğerleri ise Si, yani İspanyollar, Fransızlar ve Latinler. Ancak bu üç halkın dillerinin aynı lehçeden türediğini gösteren bir işaret vardır, çünkü birçok şeyi aynı ifadelerle adlandırırlar, örneğin Deum, Caelum, Amorem, Mare, Terram ve Vivit, Moritur, Amat, neredeyse her şey. Bunlardan Oc diyenler, Ceneviz sınırlarından başlayan güney Avrupa’nın batı kısmını işgal eder. Ama Si diyenler, yukarıda bahsedilen sınırların doğu kısmını üstlenir, yani Adriyatik Denizi’nin başladığı İtalya’nın burnuna ve Sicilya’ya kadar.' -Dante Alighieri"
 manzoni.925.g: "Hoş geldiniz kardeşlerim!"
