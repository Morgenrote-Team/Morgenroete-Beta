 manzoni_has_penny_press_tt: "#default_text [GetPlayer.GetName] bir $building_manzoni_publishing_industry$ ile $manzoni_pm_penny_press$ sahip.#!"
 manzoni_je_freedom_of_the_press: "Basın Özgürlüğü"
 manzoni_je_freedom_of_the_press_reason: "Gerçeği ilan etme karşı konulamaz arzusu ile – veya sadece kendi siyasi partileri iktidarda olmadığı için – yayıncılar devletin karşısına çıkmıştır. Böyle zamanlarda basın özgürlüğü her zamankinden daha önemlidir.\n\n'Freedom of the press' durumu, bir yayın şirketinin [concept_executive] üyesi, #R hükümetin bir parçası değil#! olan bir çıkar grubuna ait olduğunda tetiklenir. Bu durumda muhalif çalışmalar yürütülür."
 manzoni_has_publisher_ig_in_opposition_tt: "Yayın Şirketinin [concept_executive] üyesi olduğu çıkar grubu #R muhalefeti#! ile bağlantılıdır."
