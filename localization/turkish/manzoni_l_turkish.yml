 manzoni.1300.t: "\"Deutschland. Ein Wintermärchen\" - Heinrich Heine"
 manzoni.1300.d: "Almanca’nın en önemli şairlerinden Heinrich Heine, Almanya’daki siyasi duruma karşı satirik bir epik şiir kaleme aldı. Liberaller eseri överken, bazı siyasetçiler yasaklanmasını istiyor."
 manzoni.1300.f: "1843 yılında, 1831’de Fransa’ya göç eden Alman şair Heinrich Heine birkaç hafta için ülkesine dönerek annesini ve yayıncısı Julius Campe’yi Hamburg’da ziyaret etti. Heine tipik bir romantik yazar değildi; daha çok otoriter Alman devletlerinin gerici politikalarını ve sansürünü, ayrıca milliyetçi ve şoven yurttaşlarını hicveden bir satir yazarıydı. Paris’e dönüş yolculuğunda, \"Deutschland. Ein Wintermärchen\" (Almanya: Bir Kış Masalı) ilk taslağını oluşturdu. 1819 Karlsbad Konferansı’nın sansür kurallarına göre, yirmi yapraktan uzun el yazmaları sansüre tabi değildi. Bu yüzden eser, ‘Yeni Şiirler’ adlı bir ciltte başka şiirlerle birlikte yayımlandı. Çalışma, Heine’nin imgeler dünyasını ve halk şarkılarını andıran şiirsel üslubunu yoğun bir biçimde yansıtırken, ülkesindeki koşulları hicvediyordu."
 manzoni.1300.g: "Yayınlansın."
 manzoni.1300.h: "Yasaklayın ve toplatın!"
 manzoni.1300.i: "Sansürleyin..."
 manzoni.1301.t: "Heinrich Heine Köln Katedrali’yle Alay Ediyor"
 manzoni.1301.d: "Heinrich, son eserinde Köln Katedrali’nin inşasının yeniden başlamasını alenen alaya aldı."
 manzoni.1301.f: "Düsseldorf doğumlu eski bir Prusya vatandaşı olan Heine, kendi ülkesindeki militarizme karşıydı. Epik şiirinde ‘Prusya davranışını’ eleştirdiği gibi, Alman romantizminin idealize edilmiş imgelerine de karşı çıktı. Aslında, çağdışı bir tavırla Ortaçağ katedrali tamamlamayı tercih eden Almanlarla dalga geçti."
 manzoni.1301.g: "Kahrol Heine!"
 manzoni.1302.t: "\"Mondnacht\" - Joseph von Eichendorff"
 manzoni.1302.d: "Joseph von Eichendorff’un yeni şiiri, Alman şiirinin zirvelerinden biri olarak kabul ediliyor."
 manzoni.1302.f: "Joseph Freiherr von Eichendorff, geç dönem Alman romantik akımının şair ve romancılarındandı. Onun şiirlerinde temel tema, insanın mutluluğu doğanın güzelliklerine ve değişen ruh hallerine bütünüyle kendini kaptırmakta bulmasıydı. Eichendorff’un lirik şiirleri çok övülmüş, eserleri Schubert, Schumann, Mendelssohn, Brahms, Hugo Wolf, Richard Strauss, Friedrich Nietzsche, Hans Pfitzner ve Alexander Zemlinsky gibi pek çok besteci tarafından bestelenmiştir. 1837’de yayımlanan \"Mondnacht\" (Ay Gecesi) şiiri, Alman romantik lirik şiirinin ‘inci incisi’ olarak kabul edilir."
 manzoni.1302.g: "Güzel."
 manzoni.1302.h: "Siyasi özgürlükleri için savaşmak yerine, Almanlar kendilerini aptalca şiirlerle mi avutuyor?"
 manzoni.1303.t: "Dokumacıların İsyanı"
 manzoni.1303.d: "[SCOPE.sState('manzoni_weberaufstand_state').GetName] bölgesinde toplumsal, ekonomik ve siyasi sorunlar barizdir. Yükselen liberal idealler ve geleneksel zanaatkârlar arasındaki yoksulluğun artması tehlikeli bir çatışma ortamı yaratmıştır. Bölgede, yerel dokumacıların önderlik edeceği bir isyanın patlak vereceğine dair söylentiler dolaşıyor."
 manzoni.1303.f: "Sanayileşmenin başlangıcı pek çok dokumacıyı sefalet içine sürükledi. Yerel tekstil fabrikası sahibi onlardan iplik satın alıyor, ancak arzın artması nedeniyle fiyatı düşürebiliyor. Bu yüzden dokumacılar klasik fabrika işçileri değil, fabrikaya bağımlı fakat yoksullaşmış, kendi hesabına çalışan kişilerdi. Hem sömürünün acısıyla hem de gelecekte daha da kötü sömürüye uğrama tehlikesiyle karşı karşıya kalan bazıları birleşerek, sefaletlerinden sorumlu tuttukları girişimciyi tehdit etmeye başladılar. Politik elitler ise bu zor durumu kendi çıkarları doğrultusunda yorumluyordu. Özellikle sanayiciler, gelecekte benzer olayları önlemek için sert tedbirler alınması gerektiğini savunuyordu. Daha iyi ücret koşulları talep edenler ise elbette bunun hakaretten başka bir şey olmadığını düşünüyordu."
 manzoni.1303.g: "Askerleri gönder."
 manzoni.1303.h: "Müzakere et."
 manzoni.1304.t: "\"Weberlied\" - Heinrich Heine"
 manzoni.1304.d: "[SCOPE.sCountry('manzoni_weberaufstand_country').GetAdjectiveNoFlag] [SCOPE.sState('manzoni_weberaufstand_state').GetName] bölgesindeki dokumacıların ayaklanmasının bastırılması, Alman Konfederasyonu topraklarındaki çözülemeyen toplumsal ve siyasi sorunların sembolü haline geldi. Heinrich Heine, sorumluları bir şiirinde eleştirdi."
 manzoni.1304.f: "Kasvetli gözlerinden tek bir yaş akmıyor,\nTezgâh başında oturuyorlar, beyaz dişleri görünüyor:\nAlmaniya, kefenini şimdi biz dokuyoruz,\nÜç kat beddua dokuyoruz sana,\n—Dokuyoruz, dokuyoruz!\n\nAçlıktan kıvranırken boşuna yakardığımız,\nAma dileklerimize hiç kulak vermeyen Tanrı’ya lanet;\nBoşuna umut ettik, boşuna bekledik,\nO yalnızca acımızla alay etti,\n—Dokuyoruz, dokuyoruz!\n\nZenginlerin kralına lanet,\nKi sefaletimizi defalarca görmezden geldi;\nSon kuruşumuzu da aldı elimizden,\nVe bizi köpekler gibi sokakta vurdurdu,\n—Dokuyoruz, dokuyoruz!\n\nSahtekâr vatanımıza lanet,\nUtanç ve rezaletin yeşerdiği diyara,\nÇiçeklerin açmadan koparıldığı yere,\nÇürümüşlükten beslenen solucanların yuvasına,\n—Dokuyoruz, dokuyoruz!"
 manzoni.1304.g: "Yine mi sen, Heine?"
 manzoni.1304.h: "Sansürle! Sansürle!"
 manzoni.1305.t: "\"Die Weber\" - Gerhart Hauptmann"
 manzoni.1305.d: "Gerhart Hauptmann kariyerinin en önemli dramasını sundu. Bu eser, hem yurtiçinde hem de yurtdışında Alman edebiyatının temsilcisi olarak ününü pekiştirdi. 1912’de Hauptmann, 'dramatik şiir alanındaki zengin, çeşitli ve etkileyici katkılarından' ötürü Nobel Edebiyat Ödülü’nü aldı."
 manzoni.1305.f: "\"Die Weber\" (Dokumacılar) oyunundaki karakterlerin çoğu hakları için savaşan proleterlerden oluşur. Edebiyat eleştirilerinde ve giriş yazılarında defalarca belirtildiği üzere, oyun herhangi bir dönemin çoğu eserinden farklıdır çünkü gerçek bir baş karakteri yoktur; toplu oyunculuk için geniş imkânlar sunar. Hauptmann bir kahraman yaratmak yerine bir kalabalık yarattı. Bu kalabalık, yani isyancılar, oyunun başkahramanı oldu. Eğer sıradanlardan biri öne çıksa bile uzun süre merkezde kalmaz. Tarihsel arka plan, 1840’larda [SCOPE.sState('manzoni_weberaufstand_state').GetName] bölgesinde gerçekleşen Dokumacıların Ayaklanmasıdır."
 manzoni.1305.g: "Almanya’da kanlı bir trajedi bile kültürel miras haline geliyor."
 maria_luigia_died_tt: "#O Parma’lı Maria Luisa#! öldü."
 je_manzoni_lucca: "Lucca’nın Kaderi"
 je_manzoni_lucca_reason: "1815’te Restorasyon sırasında Viyana Kongresi bazı sorunlarla karşılaştı. Bunlar arasında, Parma’daki Bourbonların yeniden tahta çıkarılması ve Habsburg asıllı olan, Napolyon’un eşi Maria Luisa’ya verilecek mülk konusu da vardı. Bonaparte, Parma’yı Fransız İmparatorluğu’na kattığında Bourbonlar’a Etrürya Krallığı verilmişti; ancak Etrürya, bir Habsburg varisine bırakılan Toskana’nın restorasyonu için feshedildi. Uzlaşma şöyleydi: Bourbon-Parma Hanedanı prensleri Lucca Dükalığı’nı kendilerine alabilecekti, Maria Luisa ise ölümüne kadar Parma’yı mülk olarak elinde tutabilecekti. Maria Luisa’nın ölümünden sonra Bourbon-Parma Hanedanı Parma’ya dönecek, Lucca ise Toskana’ya geçecekti."
 manzoni.901.t: "Lucca’nın Kaderi"
 manzoni.901.d: "Viyana Kongresi’nin kararlarına göre, Habsburg’lu Maria Luisa’nın ölümünden sonra Bourbon-Parma Hanedanı yeniden Parma tahtına çıktı. Karşılığında Lucca, Toskana’ya bırakılmak zorundaydı."
 manzoni.901.f: "1815’te Restorasyon sırasında Viyana Kongresi bazı sorunlarla karşılaştı. Bunlar arasında, Parma’daki Bourbonların yeniden tahta çıkarılması ve Habsburg asıllı olan, Napolyon’un eşi Maria Luisa’ya verilecek mülk konusu da vardı. Bonaparte, Parma’yı Fransız İmparatorluğu’na kattığında Bourbonlar’a Etrürya Krallığı verilmişti; ancak Etrürya, bir Habsburg varisine bırakılan Toskana’nın restorasyonu için feshedildi. Uzlaşma şöyleydi: Bourbon-Parma Hanedanı prensleri Lucca Dükalığı’nı kendilerine alabilecekti, Maria Luisa ise ölümüne kadar Parma’yı mülk olarak elinde tutabilecekti. Maria Luisa’nın ölümünden sonra Bourbon-Parma Hanedanı Parma’ya dönecek, Lucca ise Toskana’ya geçecekti."
 manzoni.901.g: "Yaşasın [SCOPE.sCharacter('manzoni_ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('manzoni_ruler_scope').GetFullName]"
 manzoni.902.g: "Lucca artık nihayet bizim."
 manzoni_italian_irredenta_decision: "Irredenta İtalya"
 manzoni_italian_irredenta_decision_desc: "Tarihsel olarak Dalmaçya, İyon Adaları, Malta ve Korsika İtalyan anavatanının parçalarıydı. Korsika Cenova’ya, Malta Sicilya’ya, Dalmaçya ve İyon Adaları ise Venedik Cumhuriyeti’ne aitti. Bu bölgelerde hâlâ İtalyan toplulukları yaşamaktadır. İtalya’nın görkemli birleşmesinden ve kaydettiğimiz büyük ilerlemeden sonra, hâlen yabancı egemenliği altında bulunan son İtalyan topraklarını da geri alma zamanı geldi. Son kez haykırmalıyız: Va fuori, stranier'!"
 united_italian: "İtalyan"
 je_manzoni_italianization: "İtalyanlaştırma"
 je_manzoni_italianization_reason: "İtalya’nın birleşmesinden sonra Massimo d’Azeglio şöyle demişti: 'İtalya’yı yarattık, şimdi İtalyanları yaratmalıyız.' Tarihsel açıdan tartışmalı olsa da bu söz, İtalya’nın siyasi birleşmesinden sonra iç birliğin hiç de sağlam olmadığını vurgular. Bu yalnızca güneydeki haydutların ortalığı karıştırdığı yerler için değil – kuzeyde de burjuva elitin dışındaki çoğu insan hâlâ bölgesel kimliğine bağlıydı. Ortak savaşlar, ulusal bir eğitim sistemi, ortak askerlik hizmeti ve kışlalar, askeri limanlar, idari kurumlar gibi ulusal kurumların inşası, önümüzdeki birkaç yıl içinde zorlu ulusal birlik sürecinden çok daha güçlü bir İtalyan kimliğinin doğmasını sağlayacaktır."
 manzoni_italian_consiousness_capital_tt: "Başkentimizdeki kuzey ve güney İtalyan yerel halkı tek bir İtalyan nüfusuna dönüşür. İtalyan yurdu haline gelecektir. Birincil kültürümüz İtalyan olarak değişecek ve tüm ülkeyi İtalyanlaştırabileceğiz."
 je_manzoni_italianization_goal: "#O Ulusal Kimlik İlerlemesi#! #G 250#! seviyesine ulaşır."
 je_manzoni_italianization_ai: "İtalyanlaştırma"
 je_manzoni_italianization_ai_reason: "İtalya’nın birleşmesinden sonra Massimo d’Azeglio şöyle demişti: 'İtalya’yı yarattık, şimdi İtalyanları yaratmalıyız.' Tarihsel açıdan tartışmalı olsa da bu söz, İtalya’nın siyasi birleşmesinden sonra iç birliğin hiç de sağlam olmadığını vurgular. Bu yalnızca güneydeki haydutların ortalığı karıştırdığı yerler için değil – kuzeyde de burjuva elitin dışındaki çoğu insan hâlâ bölgesel kimliğine bağlıydı. Ortak savaşlar, ulusal bir eğitim sistemi, ortak askerlik hizmeti ve kışlalar, askeri limanlar, idari kurumlar gibi ulusal kurumların inşası, önümüzdeki birkaç yıl içinde zorlu ulusal birlik sürecinden çok daha güçlü bir İtalyan kimliğinin doğmasını sağlayacaktır."
 je_manzoni_italianization_ai_goal: "#O Ulusal Kimlik İlerlemesi#! #G 250#! seviyesine ulaşır."
 je_manzoni_italian_national_identity: "İtalyan Kimliği"
 je_manzoni_italian_national_identity_reason: "Birlikte geçirilen birkaç yılın ardından ve birkaç reform sayesinde, pan-İtalyan kimliğine bağlılık duygusu halk arasında giderek yayılmaktadır. Bu duygu, devletin doğru çerçeveyi sunmasına bağlı olarak bölgeden bölgeye yayılacaktır: devlet daireleri, üniversiteler, kışlalar veya deniz üsleriyle iyi hizmet alan bölgeler, bütünleştirici işlevlerinden dolayı daha kolay bir şekilde İtalyan kimliği geliştirecektir. Yoğun kentleşmiş bölgeler ise daha önce yalnızca entelektüellerin araştırdığı bu kavrama daha çabuk uyum sağlayacaktır. Uygun şartlarda her yıl bir alt bölge bu yeni kimliği benimseyebilir. Eğer ulus-devlet içindeki tüm İtalyanlar kendilerini böyle hissederse, bu durum yurtdışındaki İtalyanları da etkileyecek; onlar da giderek Lombardlar, Sicilyalılar ya da Toskana halkı yerine ülkemizin yurttaşları gibi hissedeceklerdir."
 manzoni.911.t: "[SCOPE.sState('united_italian_culture_state').GetName]’de İtalyan Bilinci"
 manzoni.911.d: "Yıllar süren sosyal ve siyasi etkilerden sonra [SCOPE.sState('united_italian_culture_state').GetName] halkı tüm İtalyan yarımadasıyla aidiyet duygusu geliştirdi. Artık tamamen pan-İtalyan kimliğine bağlılar."
 manzoni.911.f: "'İtalyanlar yeni bir İtalya yaratmak istediler, ama eski zamanlardan miras kalan kaygılar ve ahlaki sefaletlerle eski İtalyan olarak kalmak istediler; çünkü İtalya’yı reform etmeyi düşünüyorlar, fakat kimse bunu başarmak için önce kendilerini reform etmeleri gerektiğini fark etmiyor.'\n- Massimo d’Azeglio"
 manzoni.911.g: "Machiavelli’nin eski hayali gerçeğe dönüştü!"
 manzoni_italian_consiousness_tt: "Yerel kuzey ve güney İtalyan halkları tek bir İtalyan nüfusuna dönüşür. Kuzey ve güney İtalyan yurtları İtalyan yurtlarına dönüştürülecektir."
 manzoni.912.t: "Pan-İtalyan Bilinci"
 manzoni.912.d: "Artık İtalya halkı kendini öncelikle bölgesel kimliğe değil, ulusal kimliğe ait gördüğünden bu durum yalnızca ülke içindeki İtalyanları değil, tüm dünyadaki İtalyanları da etkilemektedir."
 manzoni.912.f: "İtalyan ulus-devletinin kurulması ve pan-İtalyan kimliğinin pekişmesiyle birlikte, sınırlar dışında yaşayan – ister göçmen olarak dünyaya yayılmış, ister yabancı yönetim altında kalmış olsun – İtalyanlar da kendilerini öncelikle İtalyan olarak görmeye başlayacaktır."
 manzoni.912.g: "Artık İtalyanları da yarattık!"
 manzoni_pan_italian_identity_tt: "Dünya genelinde tüm kuzey ve güney İtalyan halkları artık kendilerini pan-İtalyan halkı olarak tanımlayacak. Kuzey ve Güney İtalyan yurtları yalnızca İtalyan yurtları olacak."
 manzoni.913.d: "Artık İtalya halkı kendini öncelikle bölgesel kimliğe değil, ulusal kimliğe ait gördüğünden bu durum yalnızca ülke içindeki İtalyanları değil, tüm dünyadaki İtalyanları da etkilemektedir. Bizim ülkemizde de artık insanlar, daha önce olduğu gibi sadece bölgesel kökenlerine değil, İtalyan kimliğine bağlanma eğilimindeler."
 manzoni.913.g: "Söylemek istediğin, bir Sicilyalı balıkçı ile bir Trentinolu çoban arasında hiç fark yok mu?"
 rule_manzoni_united_cultures_rule: "#tooltip:[GetRawTextTooltipTag('mr_morgenroete_tt')] @mr_morgenroete_icon! #! Kültürel Birleşme"
