 manzoni.1000.t: "\"A Study in Scarlet\" – Arthur Conan Doyle tarafından"
 manzoni.1000.d: "Mantık ve zekâsını kullanarak suçları çözen bir dedektif. Bu Sherlock Holmes karakteri büyüleyici. Arthur Conan Doyle’un ortaya çıkardığı ne kadar ilginç bir fikir."
 manzoni.1000.f: "\"Bunu bilmek, neden bildiğimi açıklamaktan daha kolaydı. Eğer size iki artı iki dört eder mi diye kanıtlamanız istenseydi, biraz zorluk yaşayabilirdiniz, ancak gerçeğe tamamen eminsinizdir.\"\n- Arthur Conan Doyle, A Study in Scarlet"
 manzoni.1000.a: "Basit, sevgili Watson."
 manzoni.1100.g: "Keşke Alpler’de yaşayabilseydim!"
 manzoni.1101.g: "İnsanları dış görünüşüne göre mi yoksa kişiliğine göre mi yargılıyorum?"
 manzoni.1102.g: "Belki otorite figürlerini de dinlersem tatmin bulabilirim?"
 manzoni.1103.g: "İçimdeki kurt da mı uluyor?"
 manzoni.1104.g: "Daha fazla çizgi roman okuyabilir miyim?"
 manzoni.1200.t: "\"I promessi sposi\" – Alessandro Manzoni tarafından"
 manzoni.1200.d: "\"I promessi sposi\" (Sözlenen Evli) Alessandro Manzoni tarafından yazılmış bir İtalyan tarihi romanıdır, ilk kez 1827’de üç cilt halinde yayımlanmıştır. Bu, İtalyan edebiyatındaki ilk tarihî romandır, sonraki İtalyan edebî kurgu için bir model olmuş ve modern İtalyan dilinin temeli sayılmıştır. 19. yüzyılın başlarında, İtalya’nın standart edebî dili hakkında hâlâ tartışmalar vardı. Milan kökenli Manzoni, Floransa lehçesini kesinlikle destekliyordu ve romanı 1842’de yeniden yayımlarken dilini bu lehçeye göre gözden geçirdi."
 manzoni.1200.f: "Roman, 1628 yılında Kuzey İtalya’da geçer ve Como Gölü kıyısındaki bir köyde yaşayan Renzo ve Lucia adlı iki gencin evlenme hayalini konu alır. Ancak yerel feodal lord Lucia’ya göz koymuş ve onları engelleyip zulmetmiştir; bu yüzden köylerini terk etmek zorunda kalırlar. Romandan birçok ifade, alıntı ve isim hâlâ İtalyanca’da yaygın olarak kullanılır, örneğin Perpetua (bir papazın ev işçisi anlamında) veya 'Questo matrimonio non s'ha da fare' ('Bu evlilik yapılmayacak', ironik olarak kullanılan) ve eser hâlâ dünya edebiyatının gerçek bir başyapıtı olarak kabul edilir. Kitap, İspanyol işgali döneminde geçtiği için, 19. yüzyıl İtalya’sında Avusturya yönetimine gizli bir eleştiri olarak yorumlanmıştır."
 manzoni.1200.g: "Kim umursar aptal bir İtalyan romanını?"
 manzoni.1200.h: "İtalyan kültürünün zirvesi!"
 manzoni.1202.t: "\"La Ginestra\" – Giacomo Leopardi tarafından"
 manzoni.1202.d: "Giacomo Leopardi, Romantizm dönemiyle ilgili önemli ve tanınmış bir şiir eseri yarattı. Alessandro Manzoni ile birlikte, Leopardi İtalyan diline büyük bir etki yaptı ve İtalya’daki vatansever hareketlerin önde gelen figürlerinden biri oldu; ancak milliyetçilik ve ilerleme inancı konusunda çekinceleri vardı. Genellikle şiiri ve kendi şiir anlayışını, dili ve kapsamını yazardı. Leopardi 1837’de, sadece 38 yaşında hayatını kaybetti."
 manzoni.1202.f: "\"La Ginestra\" (Süpürge) Giacomo Leopardi’nin sondan bir önceki lirik şiiridir. 79 MS’de patlayan Vezüv Yanardağı’nın yamaçlarının tasviriyle açılır; bu patlama, bir zamanlar villalar, bahçeler ve büyük, zengin şehirlerin bulunduğu yerlerde yıkım ve ölüme yol açmıştır. Bu noktadan sonra şair, şiirsel söyleminin ayrıcalıklı muhatabı olarak süpürgeye yönelir: kendini anılara bırakır ve çiçeğe, onu daha önce ıssız kırsalda gördüğünü anlatır. Süpürge bu nedenle yıkıma karşı güzellik ve direnişin bir sembolü olarak kabul edilir. Ancak süpürge de er ya da geç kaçınılmaz olana boyun eğmek zorunda kalacaktır; şiir, insan yaşamının geçiciliğini doğa güçlerine karşı vurgular. Bunu yaparken, Leopardi insanların doğaya hâkim olma ya da maddi zenginlik ve gücü yüksek ideallerin önüne koyma fikriyle alay eder."
 manzoni.1202.g: "Ne kadar melankolik."
 manzoni.1203.t: "\"Rime Nuove\" – Giosuè Carducci tarafından"
 manzoni.1203.d: "Giosuè Carducci, modern İtalya’nın resmi ulusal şairi olarak kabul edilirdi; genel kültürel ve siyasi hayatın bir parçasıydı. Carducci popüler bir konuşmacı ve edebiyat ile toplumun sert eleştirmeniydi. \"Rime Nuove\" (Yeni Kafiyeler) ve Odi Barbare (Barbar İlahiler) koleksiyonları onun en büyük eserlerini içerir. Goethe ve Heine’in bazı eserlerini İtalyanca’ya çevirdi. Ölümünden bir yıl önce, Nobel Edebiyat Ödülü’nü kazanan ilk İtalyan oldu."
 manzoni.1203.f: "\"Rime Nuove\" koleksiyonunda, bir Intermezzo’dan önce, Hugo, von Platen, Goethe, Heine, Baudelaire ve Poe’nun yankıları ve motifleri yakalanır. İçerik ve biçimler büyük ölçüde önceki yazılardan türetilmiş, ancak daha derin ve olgundur. \"Rime Nuove\"’da öne çıkan temalar arasında geçmiş kültü ve tarihî anılar yer alır; eşitlikçi ve özgür bir toplum yaratma hayali özellikle belediye döneminin yüceltilmesiyle hissedilir. Carducci’nin demokratik genişleme örneklerinden biri, 'Ça ira' adlı on iki sonette hatırlanan Fransız Devrimi’dir."
 manzoni.1203.g: "Ama şeytani bir ilahiyi yazan birine güvenebilir misin?"
 manzoni.1204.t: "\"Myricae\" – Giovanni Pascoli tarafından"
 manzoni.1204.d: "Giovanni Pascoli, Bologna Üniversitesi’nde eğitim aldı; öğretmeni ve akıl hocası Giosuè Carducci idi. Pascoli, pozitivizm ve bilim döneminde bile, hayatın bir gizem olduğuna inanıyordu. Sadece doğadaki sade şeylerde keşfedilen sembolik bağlantılar, kişinin gerçeklerin yalnızca görünüşün ötesinde bir kesitini görmesini sağlar. Sonraki şiirleri benzer temalara sahipti, ancak daha deneyseldi ve klasik antik bilgilerini yansıtır. Bu şiirler, sonraki İtalyan şairler üzerinde büyük etki yaptı; melankolik temalarını kendi eserlerine dahil ettiler. Pascoli hem İtalyanca hem de Latince yazdı."
 manzoni.1204.f: "Myricae, Giovanni Pascoli’nin şiirlerinden oluşan bir derlemedir. Pascoli’nin eserinin başlığı, Virgil’in IV. Bucolica’sının ikinci dizesinden alınmıştır. Myricae, şairin neredeyse tüm edebi üretimine yayıldığından, eserin oluşum tarihi Pascoli’nin şiirsel bilincinin gelişimiyle örtüşmektedir. Myricae’nin şiirleri, dünyayı sembolik bir bakış açısıyla ele alır; şeyler arasındaki benzerlikleri ve gizemli bağları sezgiyle ortaya çıkarır. Hayatın gizemi, kaygı, ölüm ve melankoli Pascoli’nin şiirlerinde sıkça işlenen temalardır. Bunun yanı sıra, yuva teması da evin bir metaforu olarak öne çıkar."
 manzoni.1204.g: "Küçük ama büyük bir şair."
 manzoni.1205.g: "Yazar, Sigmund Freud’la alay mı ediyor?"
 manzoni.1206.t: "\"Il Piacere\" - Gabriele D'Annunzio"
 manzoni.1206.d: "Gabriele D'Annunzio, İtalyan edebiyatı ve siyasi hayatında önemli bir yere sahipti. Ona Il Vate (Şair) ve Il Profeta (Peygamber) lakapları verilmişti. Edebi eserlerinde Decadent (Çöküşçü) hareketle anılır, Fransız Sembolizmi ve İngiliz Estetizmi ile yakın bağlar kurardı. Başarılarının zirvesindeyken, yazılarının özgünlüğü, gücü ve dekadan niteliği nedeniyle kutlanıyordu. Eserleri, tüm Avrupa’da ve birçok kuşak İtalyan yazar üzerinde derin bir etki bırakmıştır."
 manzoni.1206.f: "\"Il Piacere\", D'Annunzio’nun ilk romanıdır. Bir yüzyıl önce Ugo Foscolo’nun \"Jacopo Ortis’in Son Mektupları\" kitabı İtalya’da romantik akımı yaymışken, \"Il Piacere\" ve kahramanı Andrea Sperelli 19. yüzyılın sonunda İtalyan kültürüne dekadan eğilimleri ve estetizmi tanıtmıştır. D'Annunzio, psikolojik ve içsel derinliğe sahip yeni bir düzyazı türü başlatmış, bu sayede ‘entelektüel bir soyun son temsilcisinin’ hayatındaki hataları ve zorlukları irdelemiştir."
 manzoni.1206.g: "Bu sembolizm mi yoksa artık dekadans mı?"
 manzoni.1207.g: "Bu çocuk masalı kesinlikle film olarak daha başarılı olurdu."
 manzoni.1208.g: "Genç İtalyanlar için vatansever bir roman!"
 manzoni_great_writer: "Büyük Yazar"
 manzoni_great_writer_desc: "Bu karakter, çağının en büyük yazarlarından biridir. Edebi eserleriyle tüm dünyada tanınmaktadır."
