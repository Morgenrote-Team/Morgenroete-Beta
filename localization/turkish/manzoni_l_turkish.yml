 manzoni.1001.t: "\"Hobbit ya da Orada ve Tekrar\""
 manzoni.1001.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName], kısa sürede Bestseller olan bir hikâye yazdı. Hikâye, [SCOPE.sCharacter('manzoni_writer_scope').GetLastName] tarafından yaratılan fantastik bir dünyada geçen bir Hobbit’in macerasına odaklanıyor. Umuyoruz ki [SCOPE.sCharacter('manzoni_writer_scope').GetSheHe], Orta Dünya adı verilen bu dünya hakkında daha fazla kitap yazar!"
 manzoni.1001.f: "\"Yerdeki bir oyukta bir hobbit yaşardı. Ne solucanlarla dolu ve yapış yapış kokan iğrenç, pis, ıslak bir oyuktu, ne de içinde oturacak ya da yiyecek hiçbir şey bulunmayan kuru, çıplak, kumlu bir oyuk: bu bir hobbit-oyuğuydu ve bu da konfor demekti.\"\n- J.R.R. Tolkien, Hobbit ya da Oradaydı ve Geri Döndü"
 manzoni.1001.g: "Ne inanılmaz bir dünya yaratmış [SCOPE.sCharacter('manzoni_writer_scope').GetSheHe]!"
 manzoni.1002.t: "\"Dünyalar Savaşı\""
 manzoni.1002.d: "\"Dünyalar Savaşı\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış, Dünya’ya yapılan bir uzaylı istilasını konu alan bilimkurgu öyküsüdür. Üç ayaklı savaş makineleriyle gelen uzaylıların yol açtığı yıkımı ve acıları deneyimle. İnsanlık galip mi gelecek, yoksa Marslılar tarafından yok mu edilecek?"
 manzoni.1002.f: "\"Bu bir savaş değil,\" dedi topçu eri. \"Hiçbir zaman da savaş olmadı, tıpkı insanla karıncalar arasında savaş olmaması gibi.\"\n- H.G. Wells, Dünyalar Savaşı"
 manzoni.1002.g: "Gerçekten orada bir yerlerde uzaylı istilacılar olabilir mi?"
 manzoni.1100.t: "\"Heidi\""
 manzoni.1100.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] published a story about a young orphan girl living with her grandfather on the \"Alp\". The book called \"Heidis Lehr- und Wanderjahre\" or \"Heidi: Her Years of Wandering and Learning\" shows Heidi bonding with her grandfather and they enjoy living together. But soon they get separated as Heidi has to move to Frankfurt am Main to live with Klara Streseman - daughter of a businessman. Will she ever see her grandfather again?"
 manzoni.1100.f: "\"Hafif adımlı keçiler gibi dolaşmak istiyorum.\"\n- Johanna Spyri, Heidis Lehr- und Wanderjahre"
 manzoni.1101.t: "\"Kleider machen Leute\""
 manzoni.1101.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tanınmayan bir yazar değildir. \"Der Grüne Heinrich\" ve \"Die Leute von Seldwyla\" gibi eserleri vardır. En yeni öyküsü \"Kleider machen Leute\" (\"Kıyafetler Adamı Yapar\") ise \"Die Leute von Seldwyla\"nın ikinci bölümünde yer alır. İşvereni tarafından ödenmeyen bir terzi yolda arabayla alınınca köye vardığında insanlar onu asil bir beyefendi sanır: çünkü bir arabayla gelmiştir, lüks kıyafetler giymektedir ve bakımlı bir bıyığı vardır. Çekingen olduğu için yanlış anlamayı düzeltmez. Peki köylüler sırrını öğrenebilecek mi?"
 manzoni.1101.f: "\"Bir prens topraklara ve halka sahip olduğunda, bir rahip inancına ikna olmadan kilisesinin öğretilerini sunduğunda ama makamının nimetlerini onurla tükettiğinde, bir ukala öğretmen bilgiye dair en ufak bir düşünce taşımadan eğitim makamının şereflerini ve faydalarını sürdürdüğünde, bir sanatçı erdemsizce, boş eğlenceler ve sahte oyunlarla şöhret kazandığında ve dürüstçe çalışanların ekmeğini ve itibarını çaldığında; ya da bir dolandırıcı hileyle büyük bir ticaret hanesinin adını devralıp ardından binlerce insanın birikimlerini elinden aldığında — tüm bu insanlar gelecekleri için ağlamaz, aksine talihlerinden zevk alır ve hiçbir akşamı neşeli dostlar ve keyifli sohbet olmadan geçirmezler.\"\n- Gottfried Keller, Kleider machen Leute"
 manzoni.1102.t: "\"Uli der Knecht\""
 manzoni.1102.d: "Gerçek adı Albert Bitzius olan İsviçreli bir papaz, [SCOPE.sCharacter('manzoni_writer_scope').GetFullName)] takma adıyla \"Uli der Knecht\" (\"Çiftlik İşçisi Uli\") kitabını yayımladı. Bu, Gotthelf’in tipik bir eseridir çünkü tembel bir çiftlik işçisi olan Uli’nin (Ulric) hayatına odaklanır. Uli, olgunluğa ulaşmak için tembelliğini aşmalı, farklı otorite figürlerine boyun eğmeli ve çeşitli rol modellerden ders almalıdır."
 manzoni.1102.f: "\"Dinle Uli,\" dedi efendi, \"bu böyle devam edemez, bana fazla haşarısın; sakarlığın çok sık tekrar ediyor; kafası şarapla dolu birine atlarımı ve ineklerimi emanet edemem, böyle birini elinde fenerle ahıra da sokmam, hele hele göbeği de varsa asla, çünkü nice evler bu yüzden yanıp kül oldu. Ne düşündüğünü ve nereye varmak istediğini bilmiyorum.\" Uli cevapladı ki, henüz bir şey düşünmediğini, işini yaptığını, kimsenin onun yerine çalışmadığını, kimsenin içtiği için para vermediğini, içtiklerinin kendi parası olduğunu söyledi. \"Ama benim hizmetkârımsın,\" diye karşılık verdi efendi.\"\n- Jeremias Gotthelf, Uli der Knecht"
 manzoni.1103.t: "\"Der Steppenwolf\""
 manzoni.1103.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName], Basel’de yazdığı en yeni kitabı \"Der Steppenwolf\"u (\"Bozkır Kurdu\") yayımladı. Hesse zaten \"Siddharta\" gibi eserleriyle tanınıyordu. Bu hikâyede orta yaşlı Harry Haller burjuva toplumundan hoşnutsuzdur. İntiharı bile düşünür, ancak genç Hermine ve arkadaşlarıyla tanışması hayatını değiştirir. Hermine en iyi etkiyi sunmasa da — zaman zaman kendini fuhşa satar — Harry’ye daha önce bilmediği şeyleri deneyimleme fırsatı verir ve içindeki \"Bozkır Kurdu\"nu ortaya çıkarır."
 manzoni.1103.f: "\"Her zaman nefret ettiğim, tiksindiğim ve lanetlediğim şey, her şeyin üzerinde, şu doyum, şu sağlıklılık ve rahatlıktı; orta sınıfın özenle korunmuş iyimserliği, bu şişkin ve refah içinde büyüyen vasatlık sürüsüydü.\"\n- Hermann Hesse, Der Steppenwolf"
 manzoni.1104.t: "\"Histoire d'Albert\""
 manzoni.1104.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName], \"Histoire d'Albert\" adlı yeni bant karikatürünü yayımladı. Bu geleneksel bir kitap değildir, resim panelleri ve altında kısa metinlerden oluşur. Hikâye, yolunu bulmaya çalışan ama sonunda Cenevre’nin çalkantılı döneminde bir radikale dönüşen genç bir adamın karikatürüdür."
 manzoni.1104.f: "\"Qu'un sang impur\nAbreuve nos sillons!\nAbreuve nos sillons!\"\n- Rodolphe Töpffer, Histoire d'Albert"
 manzoni.1105.t: "\"Dağdaki Büyük Korku\""
 manzoni.1105.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName], İsviçre Alpleri'nde geçen edebi bir başyapıt yarattı. Bu eserde [SCOPE.sCharacter('manzoni_writer_scope').GetSheHe], korkunun bizlerle neler yaptığı üzerine eğiliyor. Bazı eleştirmenler, \"La Grande Peur dans la montagne\" ya da \"Dağlardaki Büyük Korku\" adlı kitabın [GetPlayer.GetNameNoFormatting]’in belirsizliğini yansıttığını söylüyor."
 manzoni.1105.f: "\"Artık güneş yoktu. Üzerimizde sadece bu büyük gölge vardı, sonra onun hızla arkamızdan gelip büyük bir süratle yamaçlara tırmandığını gördük, önce çimenlik yamaçlara, sonra ilk kayalara; eşyaların görünüşü değişirken her şeyin rengi ve hatta iklim bile değişiyordu.\"\n- C.F. Ramuz, La Grande Peur dans la montagne"
 manzoni.1105.g: "Korku bizimle ne yapar?"
 manzoni.1400.t: "\"Le Tour du monde en quatre-vingts jours\""
 manzoni.1400.d: "\"Le Tour du monde en quatre-vingts jours\" ya da \"Seksen Günde Dünya Turu\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış büyük bir kitaptır. Bu hikâyede Phileas Fogg ve uşağı Passepartout, bir bahsi kazanmak için dünyayı 80 günde ya da daha kısa sürede dolaşmak zorundadır. Büyük bir maceraya atılırlar ve birçok ülkeyi ziyaret ederler."
 manzoni.1400.f: "\"Bir insanın hayal edebildiği her şeyi, diğer insanlar gerçeğe dönüştürebilir.\"\n- Jules Verne, Le Tour du monde en quatre-vingts jours"
 manzoni.1400.g: "Acaba bir gün dünyayı bir günde dolaşabilecek miyiz?"
 manzoni.1401.t: "\"La Comédie humaine\""
 manzoni.1401.d: "\"La Comédie humaine\" ya da \"İnsanlık Komedyası\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış, birbirine bağlı çok sayıda hikâyeden oluşan çok ciltli bir koleksiyondur. Bu hikâyelerle [SCOPE.sCharacter('manzoni_writer_scope').GetLastNameNoFormatting], Fransa’daki insanların günlük yaşamlarına dair bize bir bakış sunmaya çalışır."
 manzoni.1401.f: "\"İnsan tüm zamanını kötülük yaparak geçiremez ve korsanların arasında bile, uğursuz gemilerinde bir zevk yatında gibi hissettiren tatlı anların olması gerekir.\"\n- Honoré de Balzac, La Comédie humaine"
 manzoni.1401.g: "Peki sıradan insanlar Fransa’da nasıl yaşıyor?"
 manzoni.1402.t: "\"Les Trois Mousquetaires\""
 manzoni.1402.d: "\"Les Trois Mousquetaires\" ya da \"Üç Silahşör\"ün hikâyesi, üç silahşör Athos, Porthos ve Aramis’in yanı sıra d’Artagnan’ın, XIII. Louis döneminde geçen maceralarını konu alır. [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılan bu kitap, yalnızca birkaç gün içinde oldukça ünlü hâle gelmiştir."
 manzoni.1402.f: "\"Bir sahtekâr, dürüst bir insan gibi gülmez; bir ikiyüzlü, dürüst bir insanın gözyaşlarını dökemez. Tüm sahtekârlık bir maskedir; maske ne kadar iyi yapılmış olursa olsun, biraz dikkatle onu her zaman gerçek yüzden ayırmayı başarabiliriz.\"\n- Alexandre Dumas, Les Trois Mousquetaires"
 manzoni.1402.g: "Hepimiz birimiz için, birimiz hepimiz için!"
 manzoni.1500.t: "\"The Raven\""
 manzoni.1500.d: "\"The Raven\" (Kuzgun), [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış anlatı türünde bir şiirdir. Hikâyede, Lenore’un yasını tutan bir adamı bir kuzgun ziyaret eder. Adam kuşla konuşmaya çalışır, ancak kuşun tek cevabı \"Nevermore\" (Bir daha asla) olur."
 manzoni.1500.f: "Bir gece yarısı kasvetinde, bitkin ve yorgunken düşüncelere daldığımda,\nUnutulmuş bilgilerin eski ve garip ciltlerini karıştırırken—\nBaşım düşüp uyuklarken aniden bir tıklama geldi,\nSanki birisi hafifçe kapımı çalıyordu.\n\"Bir ziyaretçi,\" diye mırıldandım, \"odamın kapısını çalıyor—\nHepsi bu, başka bir şey değil.\"\n- Edgar Allen Poe, The Raven"
 manzoni.1500.g: "Adamın üzerine karanlık bir gölge çökmüş..."
 manzoni.1600.t: "\"Nils Holgerssons underbara resa genom Sverige\""
 manzoni.1600.d: "\"Nils Holgerssons underbara resa genom Sverige\" ya da \"Nils’in Harika İsveç Yolculuğu\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış bir çocuk kitabıdır. Kitapta Nils Holgersson bir tomteye (cüce) dönüşür ve birden hayvanlarla konuşabilmeye başlar. Kısa süre sonra evcil kazı Martin ile bir yabani kaz sürüsüne katılır ve tüm İsveç’i dolaşırlar. Bu yolculuk boyunca Nils daha iyi bir insana dönüşür."
 manzoni.1600.f: "\"O çocuk pek bir işe yaramazdı. En büyük zevki yemek yemek ve uyumaktı; ondan sonra da en çok yaramazlık yapmaktan hoşlanırdı.\"\n- Selma Lagerlöf, Nils Holgerssons underbara resa genom Sverige"
 manzoni.1600.g: "Kulağa inanılmaz bir yolculuk gibi geliyor!"
 manzoni.1700.t: "\"Die Verwandlung\""
 manzoni.1700.d: "Birdenbire dev bir böceğe dönüştüğünü hayal et. [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]’in yazdığı \"Die Verwandlung\" (Dönüşüm) böyle bir senaryoyu ele alır. Ailesinin tek geçim kaynağı olan Gregor Samsa bir sabah hamamböceğine dönüşür ve artık para kazanamaz. Böylece, ailesi için aslında ne kadar az şey ifade ettiği açığa çıkar."
 manzoni.1700.f: "\"Ne talih: en ufak bir ihmali hemen en ağır kuşkulara yol açan bir firmada çalışmaya mahkûm olmak! Tüm çalışanlar birer düzenbaz mıydı, yoksa aralarında yalnızca bir tek sadık ve kendini adamış adam yok muydu ki, sabah işin sadece bir saatini boşa harcadığında bile vicdan azabıyla delirip yataktan kalkamayacak hâle gelsin?\"\n- Franz Kafka, Die Verwandlung"
 manzoni.1700.g: "Iyyy! Bir böcek!"
 manzoni.1701.t: "\"Der Mann ohne Eigenschaften\""
 manzoni.1701.d: "\"Der Mann ohne Eigenschaften\" ya da \"Niteliksiz Adam\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmıştır. I. Dünya Savaşı’nın arifesinde Viyana’da geçen bu büyük fikir romanı; eski bir asker ve bilim insanı, baştan çıkarıcı ve kuşkucu olan Ulrich’in, İmparator Franz Josef’in 70. jübilesi için hazırlanan görkemli planlara dahil edilişini anlatır."
 manzoni.1701.f: "\"İyi bir kütüphanecinin sırrı, sorumluluğu altındaki edebiyattan asla başlık ve içindekiler kısmından fazlasını okumamasıdır. Kendini kaptırıp bir kitabı okumaya başlayan bir kütüphaneci kaybolmuştur... Perspektifini kaybetmeye mahkûmdur.\"\n- Robert Musil, Niteliksiz Adam"
 manzoni.1701.g: "Iyy! Bir böcek!"
 manzoni.1702.t: "\"Sternstunde der Menschheit\""
 manzoni.1702.d: "\"Sternstunde der Menschheit\" ya da \"Tarihte Karar Anları\" [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından kaleme alınmış 14 tarihi minyatürden oluşan bir seridir. Zweig, bu öykülerde tarihi akışını değiştiren anları tasvir eder; kahramanın kaderini gerçekleştirdiği ve böylece dünyayı kuşaklar boyunca şekillendirdiği bu anlara \"dünya dakikaları\" denir."
 manzoni.1702.f: "\"O anda Balboa tayfaya durmalarını emreder. Kimse onu takip etmemelidir, çünkü bu bilinmez okyanusu ilk kez görme ayrıcalığını kimseyle paylaşmak istemez. Yalnızca kendisi, sonsuza dek ilk İspanyol, ilk Avrupalı, ilk Hristiyan olarak kalmak ister; evrenimizin tek büyük okyanusu Atlantik’i aştıktan sonra şimdi de diğerini, hâlâ bilinmeyen Pasifik’i gören ilk kişi olarak. Vasco Nuñez de Balboa bakar ve bakar, gururla ve huzurla gözünün Avrupa’dan bir çift göz olarak bu denizin sonsuz mavisini ilk kez yansıttığının bilincini içine çeker.\"\n- Stefan Zweig, Tarihte Karar Anları"
 manzoni.1702.g: "Iyy! Bir böcek!"
 manzoni.1800.t: "\"Den lille Havfrue\""
 manzoni.1800.d: "\"Den lille Havfrue\" ya da \"Küçük Deniz Kızı\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmıştır. Denizler Kralı’nın en küçük kızı bir prensi ölümden kurtarır ve ona âşık olur. Kuyruğunu bacaklarla değiş tokuş ederek prensi kendisine âşık etmeyi umut eder. Hikâyesi mutlu sonla mı bitecek?"
 manzoni.1800.f: "\"Ne istediğini biliyorum. Bu çok aptalca bir şey, ama dediğin olacak, ve bu seni kedere sürükleyecek, güzel prensesim.\"\n- Hans Christian Andersen, Küçük Deniz Kızı"
 manzoni.1800.g: "Bekle, adı Ariel değil miymiş?!"
 manzoni.1900.t: "\"Dracula\""
 manzoni.1900.d: "\"Dracula\" hikâyesi [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından farklı bakış açılarından aktarılır. Bir kaptanın seyir defterlerinden, gazete haberlerine ve günlük parçalarına kadar… Hikâyede vampir Kont Dracula kurbanlarının kanını içer, ancak ardından bir grup vampir avcısı tarafından izlenir. Avcılar hayatta kalabilecek mi yoksa Dracula insanlığı avlamaya devam mı edecek?"
 manzoni.1900.f: "\"Anlamanızın imkânsız olduğu ama var olan şeyler olduğunu düşünmez misiniz; bazı insanların gördüğü ama başkalarının göremediği şeyler? İnsanların gözlerinin görmemesi gereken, eski ve yeni birçok şey vardır; çünkü onlar bildiklerini zannederler, başka insanların söylediklerini duymuşlardır. Ah, bilimin hatası her şeyi açıklamak istemesidir; açıklayamazsa, açıklanacak bir şey yok der.\"\n- Bram Stoker, Dracula"
 manzoni.1900.g: "Şimdi biraz sarımsak almam lazım..."
 manzoni.2000.t: "\"Max Havelaar\""
 manzoni.2000.d: "\"Max Havelaar\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]'ın Endonezya’daki Hollanda sömürge sistemine yönelik hesaplaşmasıdır. Eski bir sömürge yetkilisi olarak yazdığı hikâyede sömürge düzenindeki beceriksizlik ve yolsuzluğu açığa çıkarır. Aynı zamanda burjuva düzeninin eleştirilerini öngörür ve bunu hicveder."
 manzoni.2000.f: "\"Avrupa’nın tüccar prensleri tarafından uygulanan bu zalim zorbalığa karşı ulusların vicdanı haykırmaktadır.\"\n- Eduard Douwes \"Multatuli\" Dekker, Max Havelaar"
 manzoni.2000.g: "Bu korkunç! Bir şeyler yapmalıyız!"
