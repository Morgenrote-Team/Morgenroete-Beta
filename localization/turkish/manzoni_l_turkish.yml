 manzoni_je_pro_government_newspaper: "Hükümet Yanlısı Gazete"
 manzoni_je_pro_government_newspaper_reason: "Dördüncü kuvvet hükümeti denetlemek için vardır. Ancak, bazen mahkeme benzeri haberler, iktidardakiler ile gazeteciler arasında fazlasıyla yakın ilişkiler kurulmasına yol açmıştır. Bu durum haber yapma ve basın özgürlüğü açısından olumsuz olabilir, fakat kim tatsız haberlerle rahatsız edilmek ister ki?\n\n'Pro-Government Newspaper' durumu, bir yayın şirketinin [concept_executive] üyesi, #G hükümetinin bir parçası#! olan bir çıkar grubuna ait olduğunda tetiklenir. Bu durumda, hükümet yanlısı makaleler yayımlanır."
 manzoni_has_publisher_ig_in_government_tt: "Yayın Şirketinin [concept_executive] üyesi olduğu çıkar grubu #G hükümeti#! ile bağlantılıdır."
