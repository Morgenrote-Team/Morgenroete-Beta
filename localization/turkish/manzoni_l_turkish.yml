 manzoni_no_foscolo_modifier: "Foscolo reddedildi"
 manzoni.914.t: "[SCOPE.sCharacter('manzoni_character_scope').GetLastName] İtalyan Davasını Destekliyor"
 manzoni.914.d: "Pan-İtalyan kimliğine yönelik artan çağrıların ardından, [SCOPE.sCharacter('manzoni_character_scope').GetFullName] Risorgimento idealleriyle tamamen özdeşleşti. Kendi kökenlerini ikinci planda görüp ulusal İtalyan kimliğini öne çıkarıyor."
 manzoni.914.f: "İtalya’nın birleşmesinden önce bile özellikle entelektüel elit kendini çoğunlukla İtalyan olarak tanımlıyor ve bölgesel kökenleri yalnızca folklor olarak görüyordu. Birleşme anından itibaren bu bilinç özellikle İtalyan ordusunda yaygınlaştı – ordu ve donanma ‘ulusun okulu’ haline geldi. Siyasette ise merkezci güçler, bölgeselci güçlere daha başından üstün geldi."
 manzoni.914.g: "Campanilismo günleri geride kaldı."
 manzoni.915.t: "[SCOPE.sState('manzoni_brigant_state').GetName]’da Haydutlar"
 manzoni.915.d: "[SCOPE.sState('manzoni_brigant_state').GetName]’daki kötü koşullar, umudu olmayan birçok kişinin [SCOPE.sCharacter('manzoni_brigant_character').GetFullName] çetesine katılmasına yol açtı. Artık çevreye zarar veriyorlar – öyle ki haydutlar ciddi bir sorun haline geldi. Hatta aralarında onları hükümetin ve artan İtalyanlaştırmanın karşısında, siyasi ve bölgesel direnişçiler olarak gören sıradan halktan destekçileri bile var."
 manzoni.915.f: "Güney İtalya’da haydutluk antik çağlardan beri bir biçimde var olmuştu. Ancak rastgele yolcuları hedef alan kanun kaçaklığı kökeni, daha sonra siyasi direniş hareketine evrildi. 1861’de Sardinya Krallığı’nın (daha sonra İtalya Krallığı) İki Sicilya Krallığı’nı fethetmesinden sonra bölgedeki en ünlü ve bilinen haydutluk biçimi ortaya çıktı. Haydutlar arasında farklı geçmişlerden ve motivasyonlardan insanlar vardı; eski mahkûmlar, haydutlar ve İtalyan hükümetince sıradan suçlu sayılan kişiler olduğu gibi, eski askerler ve Bourbon ordusuna sadık olanlar da bulunuyordu. Yalnızca İtalyan yetkililere ve toprak sahibi üst sınıflara değil, köylüler, kasaba halkı ve rakip haydut çeteleri de dâhil olmak üzere sıradan insanlara da saldırılar düzenlediler; köyleri, kasabaları, çiftlikleri yağmaladılar ve bireylere ya da gruplara silahlı soygunlar gerçekleştirdiler."
 manzoni.915.g: "Kendini Robin Hood sanan bir haydut daha!"
 manzoni.916.t: "Bölgesel miras için kaygı"
 manzoni.916.d: "[SCOPE.sState('manzoni_regionalist_state').GetName]’daki sıradan insanlar, yeni ulusal İtalyan kurumları ve İtalyanca’nın yaygınlaşmasının oradaki geleneksel yaşam biçimini yok edebileceğinden korkuyor. [SCOPE.sCharacter('manzoni_rural_leader_scope').GetFullName], bölgenin özel mirasının göz ardı edilmemesi gerektiğini ve İtalya’daki homojenleşmenin zaten çok ileri gittiğini savundu."
 manzoni.916.f: "1848/1849’daki başarısız devrimle birlikte, İtalyan birlik hareketinin önde gelen kolu olan Neo-Guelphler fiilen güçsüz hale geldi. Başlangıçta Papa’nın başkanlığında federatif yapılı bir İtalya’yı savunmuşlardı. Buna karşılık merkezci çevreler mutlak üstünlük kazandı – bu olgu 20. yüzyıla kadar baskın kaldı. Bölgesel hassasiyetler artık dikkate alınmıyor, aksine bölgesel duygular İtalyan birliğini yok edebilecek tehlikeli eğilimler olarak görülüyordu."
 manzoni.916.g: "[SCOPE.sState('manzoni_regionalist_state').GetName], diğer tüm bölgeler gibi İtalyan bölgesidir."
 manzoni.916.h: "Bu özel mirası dikkate almalıyız."
 manzoni.917.t: "Ağızlar mı diller mi?"
 manzoni.917.d: "Ülkemizdeki önde gelen öğretmenler, akademisyenler ve profesörler, İtalyanca’nın yalnızca kamu kurumlarında değil, günlük yaşamda da uygulanmasının özellikle teşvik edilmesi gerektiğini savundu. Bu, yeni İtalya’daki bilimsel ve siyasi süreçleri önemli ölçüde iyileştirebilir – ancak özellikle kırsal kesimde halk arasında son derece popüler olmayan bir taleptir, çünkü orada insanlar hâlâ yalnızca ağız/diyalekt konuşmaktadır."
 manzoni.917.f: "18. yüzyılda bile, İtalya yarımadasındaki farklı dil çeşitlerinin bağımsız diller olduğu konusunda hiç şüphe yoktu. Dante Alighieri sayesinde yalnızca Toskanca büyük bir prestije sahip değildi. Venedik dili, Venedik Cumhuriyeti’nin resmi ve yazılı diliydi; Carlo Goldoni’nin oyunları ve edebiyat eserleri Venedikçe yazılmıştı. Ayrıca Venedikçe, Adriyatik bölgesinde hâlâ bir lingua franca olarak özel bir öneme sahipti. Benzer bir şey Napoli dili için de söylenebilir. Ancak 19. yüzyılda, yalnızca bir tek standart İtalyanca çeşidi olduğu ve İtalya’daki diğer tüm dillerin sadece lehçe olduğu görüşü baskın hale geldi – oysa kuzeyde konuşulan İtalyanca zaten özel bir dilsel statüye sahipti. Yine de siyasi hareketler sonucunda gerçeklik gitgide daha çok kabul gördü: Bir dili lehçeden ayıran şey, onun donanması ve ordusunun olmasıdır."
 manzoni.917.g: "Dil çeşitliliğimiz prestijimizdir."
 manzoni.917.h: "İtalyanca konuş, açık konuş. Geri kalan sadece lehçedir."
 manzoni.918.t: "Foscolo’nun Kaderi"
 manzoni.918.d: "Ulusal duygular giderek daha belirgin hale geldikçe, büyük İtalyan şairi Ugo Foscolo’nun naaşının Büyük Britanya’dan İtalya’ya getirilmesi çağrıları yükselmeye başladı."
 manzoni.918.f: "Yeni İtalyan ulusu kendisine işaret noktaları arıyordu: tarihî olaylar ama aynı zamanda tarihî şahsiyetler. Fransa’dakine benzer şekilde, sanatçıların, bilim insanlarının ve diğer büyük kişiliklerin mezarının bulunduğu bir 'Pantheon' oluşturma fikri erken dönemde ortaya çıktı. Daha önce önemli vatandaşların gömüldüğü Floransa’daki Santa Croce bunun için doğru yer gibi görünüyordu. Machiavelli, Michelangelo ve Galileo gibi isimler çoktan Toskana’dan ziyade İtalyan olarak kabul edilmişti. Zakintos adasında doğmuş Venedik kökenli şair Ugo Foscolo, devrimci yıllarda yaşamış ve erken İtalyan liberalizmi ile milliyetçiliğinin tanımlayıcı bir figürü olarak kabul edilmişti. Bu büyük İtalyan zekâ galerisine mükemmel bir ek olacaktı. Ancak Foscolo 1827’de sürgünde, Londra yakınlarındaki Turnham Green’de öldü."
 manzoni.918.g: "Bize Foscolo’yu vermelerini isteyin."
 manzoni.918.h: "Hayır derlerse mahcup oluruz."
 manzoni.919.d: "İtalyan hükümeti, ünlü şair ve İtalyan milliyetçiliğinin savunucusu Ugo Foscolo’nun naaşının kendilerine verilmesini talep etti."
 manzoni.919.g: "O önemsiz küçük şairlerini alsınlar. Adı neydi yine?"
 manzoni.919.h: "O Fosco denen adam burada kalıyor."
 manzoni.920.t_foscolo: "Foscolo dönüyor"
 manzoni.920.d_foscolo: "Britanya hükümeti kabul etti – Foscolo’nun naaşı yakında İtalyan topraklarına dönecek ve son istirahatgahını Santa Croce kilisesinde bulacak!"
 manzoni.920.f_foscolo: "Ugo Foscolo’nun İtalya’ya dönüşü, genç ulus-devlet için ilk dönüm noktalarından biri olarak kabul edildi. Foscolo, dönen bir kahraman gibi karşılandı; cenazesi gözyaşları ve tezahüratlar eşliğinde bir tören havasında geçti. Santa Croce’deki büyük İtalyan şahsiyetlerinin 'Pantheon’u ile, insanların kendilerini yönlendirebileceği sabit bir İtalyan milliyetçiliği noktası açılmış oldu. Bu ideolojinin merkezinde Katolik azizler değil, İtalyan kahramanlar olmalıydı."
 manzoni.920.g: "Büyük bir İtalyan eve dönüyor!"
 manzoni.920.t_no_foscolo: "Foscolo sürgünde kalıyor"
 manzoni.920.d_no_foscolo: "Ne yazık ki Britanya hükümeti, çeşitli ikiyüzlü bahanelerle Ugo Foscolo’nun İtalya’ya dönmesini engelledi."
 manzoni.920.f_no_foscolo: "Gerçekten de büyük İtalyan şairini 'o Fosco denen adam' diye nitelendirecek kadar küstah davrandılar!"
 manzoni.920.h: "Bu topal inek yavruları bize Foscolo’muzu vermeyi reddediyor!"
 manzoni_gbr_hits_ita_prestige_tt: "Bu, İtalya’nın prestijine darbe vuracak."
 manzoni_roma_aeterna_decision: "Roma Aeterna"
 manzoni_roma_aeterna_decision_desc: "Roma, Ebedi Şehir, Roma İmparatorluğu’ndan bu yana tek gerçek İtalyan başkenti olmuştur. Bu yüzden hükümet merkezimizi oraya taşımamızın hiçbir dezavantajı olmayacaktır. Eğer eski başkentte bir hayvanat bahçesi, müze veya gözlemevi varsa, onlar orada kaldırılacak; ancak yeni başkentte hemen karşılığı verilecektir."
 manzoni.910.t: "Roma Aeterna"
 manzoni.910.d: "Yalnızca başkentin Roma’ya taşınmasıyla İtalya, tüm İtalyanların gerçek başkentine sahip olduğunu iddia edebilir. Gerçekten de artık İtalya, Scipio’nun miğferini takabilir!"
 manzoni.910.f: "'Kolezyum çöktüğünde Roma da çökecek;\nRoma çöktüğünde – Dünya da.' -Lord Byron"
 manzoni.910.g: "Roma Caput Mundi."
