 manzoni.332.d: "Dünya çapında ünlü bir yazar ülkemize saygı göstermiştir. [SCOPE.sCharacter('manzoni_writer_scope').GetSheHe|U] şu anda bir okuma turundadır."
 manzoni.332.f: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName], [SCOPE.sCharacter('manzoni_writer_scope').GetHomeCountry.GetName]’den bir yazardır ve [SCOPE.sCharacter('manzoni_writer_scope').MakeScope.GetVariable('manzoni_writer_experience').GetValue|V0] itibara sahiptir. [SCOPE.sCharacter('manzoni_writer_scope').GetHerHis] sayısız eserinden [SCOPE.sCharacter('manzoni_writer_scope').MakeScope.GetVariable('manzoni_num_bestsellers_var').GetValue|V0] tanesi bestseller kabul edilmiş ve [SCOPE.sCharacter('manzoni_writer_scope').GetHerHis] kitapları [SCOPE.sCharacter('manzoni_writer_scope').MakeScope.GetVariable('manzoni_num_book_licenses_var').GetValue|V0] ülkede yayımlanmıştır."
