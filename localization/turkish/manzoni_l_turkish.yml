 manzoni.2600.t: "\"Flaman Aslanı veya Altın Mızraklar Savaşı\""
 manzoni.2600.d: "\"Flaman Aslanı veya Altın Mızraklar Savaşı\" ya da \"De Leeuw van Vlaenderen, of de Slag der Gulden Sporen\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış bir tarihi romandır ve Flaman milislerinin Fransız işgal kuvvetini yendiği Altın Mızraklar Savaşı’na odaklanır. Kitap, Flaman ulusal destanı olarak kabul edilir."
 manzoni.2600.f: "\"Bu kitabı okuyan Flaman, anlattığı görkemli eylemler aracılığıyla, Flandre’nin bir zamanlar ne olduğunu, şimdi ne olduğunu ve daha da önemlisi, atalarının kutsal örneklerini unutursan ne olacağını düşün!\"\n- Hendrik Conscience, De Leeuw van Vlaenderen, of de Slag der Gulden Sporen"
 manzoni.2600.g: "Flandre için!"
 manzoni.1601.t: "\"Kırmızı Oda\""
 manzoni.1601.d: "\"Kırmızı Oda\" veya \"Röda rummet\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış İsveç toplumunun eleştirisidir. Romanda idealist memur Arvid Falk yazar olur ve muhafazakar kardeşi Carl Nikolaus Falk ile çatışmaya girer. Stockholm toplumu alaycı bir şekilde tasvir edilir."
 manzoni.1601.f: "\"...bir sanat eseri pratik bir kullanım amacına hizmet etmeye başladığı anda, bir amacı veya eğilimi ortaya koyduğu anda, güzelliğini kaybeder.\"\n- August Strindberg, Kırmızı Oda"
 manzoni.1601.g: "Toplumun değişmesi gerekiyor!"
 manzoni.1602.t: "\"Olur\""
 manzoni.1602.d: "\"Olur\" veya \"Det går an\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından, ömür boyu evlilik kurumunu ve kadınların mali bağımsızlık kazanamamasını eleştiren bir romandır. Romanda çavuş Albert, Stockholm ve Lidköping arasında bir vapur yolculuğu sırasında camcı kızı Sara Videbeck’e aşık olur. Sara ilgilenir, ancak resmi bir düğün töreni olmadan ve mal paylaşımı yapmadan eşitlikçi bir evlilik önerir. Roman, onun \"Hepsi olur mu, Albert?\" sorusu ve Albert’in \"Olur\" cevabı ile sona erer."
 manzoni.1602.f: "\"...cam kesmek isteyen, efendim, bir elmasa sahip olmalı!\"\n- Carl Jonas Love Almqvist, Olur"
 manzoni.1602.g: "Bu olur!"
 manzoni.1603.t: "\"Paralar\""
 manzoni.1603.d: "\"Paralar\" veya \"Pengar\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından çağdaş evlilik yasalarına yönelik bir eleştiridir. Kitap, Selma’nın on altı yaşından yirmi üç yaşına kadar olan hayatını takip eder. Bu süre içinde, sanat dolu hayalleri olan canlı bir genç kızdan, tek amacı özgürlük olan sert bir kadına dönüşür. On altı yaşında Selma, servetini çok çalışarak kazanmış yaşlı Pål Kristersson ile evlenir; büyük ölçüde finansal olarak iyi bir eş olduğuna inandığı için. Ancak ona karşı hiçbir zaman aşk hissetmez ve yavaş yavaş aşkın ne olduğunu unutuyor gibi görünür. Kocası 'traşlı bir domuz' olarak tanımlanır. Evlilik yılları boyunca, ilişkilerindeki tüm kusurları fark etmeye başlar, ama aynı zamanda kadınların konumu, yasal özerklik eksikliği ve haklarıyla ilgili daha geniş toplumsal sorunları da görür."
 manzoni.1603.f: "\"...kendi kendini aldatışı, mutluluğa çok benzeyen çarpıtılmış bir imaj yarattı.\"\n- Victoria Benedictsson, Pengar"
 manzoni.1603.g: "Selma için özgürlük!"
 manzoni.1604.t: "\"Hertha\""
 manzoni.1604.d: "\"Hertha\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış bir romandır ve kadınların yasal özerkliği ile eğitim hakkını savunur. Romanın başkahramanı, inatçı genç kadın Hertha, baskıcı bir babanın egemen olduğu bir evde yaşamaktadır. Küçük, patriarkal bir kasaba olan Kungsköping’de yaşarlar—İsveç’in minyatür bir versiyonu. Bir gece, kasabayı tamamen yok etme tehdidinde bulunan bir yangın çıkar. Yangın, kasaba halkının gerçek yüzlerini açığa çıkarır ve İsveç toplumunun dar görüşlülüğünü sergiler. Kurtarma çabaları sırasında, kasabanın kadın ve erkekleri, zengin ve fakir, ilk kez yan yana çalışır. Eski her şey yanmıştır ve yeni bir şey inşa edilebilir. Hertha bir itici güç olarak öne çıkar ve yangından sonra kasabanın yeni gerçekliğinde kadınlara merkezi bir rol vaat edilir."
 manzoni.1604.f: "\"...Bu akşam kesinlikle evlenmek isterim, keşke yarına kadar dul olabilseydim!\"\n- Fredrika Bremer, Hertha"
 manzoni.1604.g: "Yakıp yık!"
 manzoni.1605.t: "\"Stänk och flikar\""
 manzoni.1605.d: "\"Stänk och flikar\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış bir şiir koleksiyonudur. Koleksiyonda yer alan erotik aşk şiiri \"En morgondröm\" veya \"Bir Sabah Rüyası\", derin anlamlar içerir. Temelde, dönemin—özellikle kilisenin—ahlak, çıplaklık ve cinsellik görüşlerini eleştirir."
 manzoni.1605.f: "\"...o çıplak yatıyordu, güzelliğinin ihtiyaçlarıyla örtüsüz ve dizleri ayrık, titreyen bedeninin ortasıyla sevgilisinin özlemini bir kez daha karşıladı.\"\n- Gustaf Fröding, Stänk och flikar"
 manzoni.1605.g: "Sansürle!"
 manzoni.1606.t: "\"På nyårsdagen\""
 manzoni.1606.d: "\"På nyårsdagen\" veya \"Yeni Yıl Günü\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış kısa, etkileyici bir şiirdir. Tutkulu bireyciler için bir savaş ilahisi olarak tanımlanmıştır."
 manzoni.1606.f: "\"Kırılgan bir gemide yalnız, denizcinin cesareti onu geniş denizlere sürer...\"\n- Erik Gustaf Geijer, På nyårsdagen"
 manzoni.1606.g: "İleri! - işte kaderinin buyruğu"
 manzoni.1607.t: "\"Godnatt, jord\""
 manzoni.1607.d: "\"Godnatt, jord\" veya \"İyi Geceler, Dünya\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından Södermanland’daki bir mülkteki kiracılarının yaşamlarını konu alan kolektif bir romandır—günlük çaba ve yoksul çevre, bastırılmış özlem ve basit mutluluk. Hareketli topluluktan, dikkate değer bir yakınlıkla bir dizi bireysel yaşam hikayesi ortaya çıkar. Hepsini çevreleyen ise Södermanland manzarasının kokusudur; meşe ağaçlarıyla dolu ve gelinciklerle canlıdır."
 manzoni.1607.f: "\"Mısırkıranı yapraklarının çoğunlukla patikalarda, üzerinde ezilerek bulunduğu söylenir. Aynı şey kiracılar için de geçerlidir.\"\n- Ivar-Lo Johansson, Godnatt, jord"
 manzoni.1607.g: "İyi Geceler!"
 manzoni.1608.t: "\"Bödeln\""
 manzoni.1608.d: "\"Bödeln\" veya \"Cellat\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış bir romandır. Hikaye iki zaman çizgisi boyunca ilerler: Orta Çağ ve günümüz. İki bölüm arasındaki ortak nokta, bir meyhanedir ve her iki bölümde de bulunan cellattır. Kitap, celladın misafirlere insanlık hakkındaki kasvetli görüşünü aktardığı bir konuşmayla sona erer."
 manzoni.1608.f: "\"Şiddet, insanlığın hem fiziksel hem de ruhsal güçlerinin nihai ifadesidir.\"\n- Pär Lagerkvist, Bödeln"
 manzoni.1608.g: "Dehşet!"
 manzoni.1609.t: "\"Nässlorna blomma\""
 manzoni.1609.d: "\"Nässlorna blomma\" veya \"Çiçek Açan Isırgan\" kısmen otobiyografik bir romandır ve [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmıştır. Kitap, yetim çocuk Martin’in hikayesini anlatır; Martin yazarın alter egosudur ve çocuk bakış açısıyla yazılmıştır. Babası ölür ve annesi çocuklarını California’da yeni bir hayat için bırakır. Ona değer verdiği her şey çok erken yaşta kaybolur ve çeşitli çiftliklerde çalışarak büyür, gönderilir veya kendi başına gider. Martin bencil, aptal, çocukça, kendine acıyan, yaltakçı, korkak ve sahte olarak tanımlanır. Böylece çocuk idealize edilmez."
 manzoni.1609.f: "\"Çok düşündü ama anlayışı çok azdı.\"\n- Harry Martinson, Nässlorna blomma"
 manzoni.1609.g: "Zavallı çocuk"
 manzoni.1610.t: "\"Mor gifter sig\""
 manzoni.1610.d: "\"Mor gifter sig\" veya \"Annem Evleniyor\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından kısmen otobiyografik bir romandır. Kitap, yedi yaşındaki Mia’nın hikayesini anlatır; dünyayı fazlasıyla anlar, ama hiçbir şey anlamaz. Annesinin yakışıklı ama umutsuz, içki içen, kavga eden ve aldatıcı bir adamla evlenmek istemesini neden anlayamaz? Annesi günlük ekmeklerini kazanmak için çalışır ve rüzgârlı kiralık odalarda hayatı katlanılır kılar. Ailedeki yaşam, Mia’nın yavaş yavaş sınıf toplumuna şekillendiği acılı ve utanç verici ayrılıklardan oluşan bir dizi olur. Mia, tebeşirle çizilmiş bir soba duvarında mavi çiçekler olan sakin bir ev hayal eder, ama dünya herkesin hayallerine yer bırakmaz—ve birçok kişi için yaşam alanı bile neredeyse yoktur."
 manzoni.1610.f: "\"Üzüntü bunaltıcı olduğunda ve birini yok etmeye çalıştığında, ölüler mezarlarından kalkıp yardım elini uzatır.\"\n- Moa Martinson, Mor gifter sig"
 manzoni.1610.g: "Gerçekten neşeli bir evlilik"
 manzoni.1611.t: "\"Raskens\""
 manzoni.1611.d: "\"Raskens\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış bir romandır. 19. yüzyılın ikinci yarısında, güneydoğu Småland’da geçer ve hikaye, bir asker olarak tahsis sistemine katılan yoksul bir çiftlik işçisi olan Gustav’ı takip eder. Asker kulübesi ve Rask adını alan Gustav, yoksul bir hizmetçi olan Ida ile evlenir. Roman, onların kulübelerdeki mücadelelerini ve sebatlarını anlatırken, İsveç’teki yaşamın tarihi bir tasvirini de sunar."
 manzoni.1611.f: "\"Hadi bakalım! Yeleğimi çıkarmadan sekiz gün boyunca seninle dövüşebilirim.\"\n- Vilhelm Moberg, Raskens"
 manzoni.1611.g: "Lanetli tüy döken kedi!"
 manzoni.1612.t: "\"Doktor Glas\""
 manzoni.1612.d: "\"Doktor Glas\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış bir mektup romanıdır ve 19. yüzyıl İsveç’inde bir doktorun ahlaki ve aşk sorunlarıyla mücadelesini anlatır. Roman, Stockholm’de saygı gören Dr. Tyko Gabriel Glas’ın hikayesini günlüğü şeklinde anlatır. Antagonist, ahlaken yozlaşmış bir papaz olan Reverend Gregorius’tur. Gregorius’un güzel genç eşi, Dr. Glas’a cinsel yaşamının onu mutsuz ettiğini anlatır ve yardım ister. Glas ona aşık olur ve başka bir sevgilisi olmasına rağmen yardım etmeyi kabul eder. Müdahale etmeye çalışır, ama papaz “evlilik haklarından” vazgeçmez – eşi istemese bile onunla ilişkiye girmek zorundadır. Bu yüzden sevgilisini mutlu etmek için kocasını öldürmeyi planlamaya başlar."
 manzoni.1612.f: "\"Sevilmek ister insan, olmuyorsa hayran olunmak, olmuyorsa korkulmak, olmuyorsa nefret edilmek ve küçümsenmek.\"\n- Hjalmar Söderberg, Doktor Glas"
 manzoni.1612.g: "Bana potasyum siyanür getir!"
 manzoni.1613.t: "\"Singoalla\""
 manzoni.1613.d: "\"Singoalla\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış bir romandır. Orta Çağ İsveç’inde geçen roman, macera, trajedi ve folklor öğelerini harmanlayan romantik ve tarihi bir hikaye sunar. Hikaye, güzel ve gizemli bir Çingene kızı olan Singoalla ile ona aşık olan soylu Jöran’ın etrafında döner. Roman, Singoalla ve Jöran’ın aşkının sosyal sınıflar, kader güçleri ve kişisel arzularla iç içe geçtiği bir siyasi entrika zamanında geçer."
 manzoni.1613.f: "\"Git! Uzaklaş! Yabancına dön!\"\n- Viktor Rydberg, Singoalla"
 manzoni.1613.g: "Ne romantik!"
 manzoni.1614.t: "\"Nya dikter\""
 manzoni.1614.d: "\"Nya dikter\" veya \"Yeni Şiirler\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış bir şiir koleksiyonudur ve İsveç tarihi, doğası ve ulusal kimliği temalarını işler. Bu koleksiyon, şairin Romantik milliyetçiliği benimsediği bir eser olarak görülür; İsveç halkının güzelliğine ve mirasına odaklanır. Geçmişi onurlandırmaya ve ülkenin mirasını kutlamaya odaklanırken, geleceği de düşünür."
 manzoni.1614.f: "\"Kırılmış bir teli dinlemek, asla yay çekmemekten daha güzeldir.\"\n- Verner von Heidenstam, Nya dikter"
 manzoni.1614.g: "Ne kadar gururlu bir tarih!"
 manzoni.1504.t: "\"Tom Sawyer’ın Maceraları\""
 manzoni.1504.d: "Mississippi Nehri kıyılarında, yaramaz bir çocuk olan Tom Sawyer ve en iyi arkadaşı Huck Finn heyecan verici maceralara atılır; şakalar, hazine avları ve hatta bir cinayete tanık olurlar. Tom, maceraları boyunca arkadaşlık, ahlak ve sorumluluk hakkında önemli hayat dersleri öğrenir."
 manzoni.1504.f: "\"İş, birinin yapmak zorunda olduğu şeydir; oyun ise yapmak zorunda olmadığınız şeydir.\"\n- Samuel \"Mark Twain\" Clemens, Tom Sawyer’ın Maceraları"
 manzoni.1504.g: "Ufaklık bir haylaz!"
