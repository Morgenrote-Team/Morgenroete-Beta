 setting_manzoni_united_cultures_rule_desc: "İtalyanlaştırma, Almanlaştırma ve İsviçreleştirme mümkündür: bireysel kültürler İtalyan, Alman ve İsviçre kültürüne birleşebilir. Bu, oyun boyunca performansı artırır ancak diğer modlarla uyumsuzluklara yol açabilir."
 setting_manzoni_no_united_cultures_rule: "Kültürel Birleşme: #R devre dışı#!"
 setting_manzoni_no_united_cultures_rule_desc: "İtalyanlaştırma, Almanlaştırma ve İsviçreleştirme #R mümkün değildir#!. Bu, diğer modlarla uyumluluğu artırır fakat oyun boyunca performansa olumlu bir etkisi yoktur."
