 manzoni.1205.t: "\"La Coscienza di Zeno\""
 manzoni.1205.d: "Aron Ettore Schmitz, [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] takma adıyla tanınır, İtalyan bir yazar ve iş insanıdır; roman, oyun ve kısa hikâyelerin yazarıdır. İrlandalı romancı ve şair James Joyce'un yakın arkadaşıdır. Svevo, İtalya’da psikolojik romanın öncüsü sayılır ve modernist romanı \"La Coscienza di Zeno\" yani \"Zeno'nun Bilinci\" ile tanınır; bu eser İtalyan edebiyatının klasiklerinden biri hâline gelmiştir. Svevo ayrıca Joyce’un Ulysses’inin baş kahramanı Leopold Bloom’un modelidir."
 manzoni.1205.f: "\"Diğer hastalıkların aksine, yaşam her zaman ölümcülüdür. Tedavilere tolerans göstermez. Vücudumuzdaki delikleri durdurmak gibi olurdu, onları yara sanarak. Tedavi edildiğimiz anda boğularak ölürdük.\"\n- Italo Svevo, La Coscienza di Zeno"
 manzoni.1207.t: "\"Le avventure di Pinocchio. Storia di un burattino\""
 manzoni.1207.d: "Carlo Lorenzini, [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] adıyla tanınır, gazeteci ve yazardır. En çok, hayat bulan Pinokyo adlı kuklanın hikâyesiyle hatırlanır. \"Pinokyo’nun Maceraları. Bir Kuklanın Hikâyesi\" 1880’de 'Giornale dei Bambini'de seri hâlinde yayınlandı, 1883’te iki cilt hâlinde basıldı. Hikâye, canlanan Pinokyo ve yaratıcı/ebeveyn figürü fakir bir marangoz olan Geppetto’nun yaramaz maceralarını anlatır."
 manzoni.1207.f: "\"Vicdan, insanların dinlemediği hâlâ küçük sessiz bir sestir.\"\n- Carlo Collodi, Le avventure di Pinocchio. Storia di un burattino"
 manzoni.1208.t: "\"Cuore\""
 manzoni.1208.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName] İtalyan bir yazar ve gazeteci olup, daha sonra çocuk edebiyatıyla tanınır. De Amicis bir vatanseverdi ve İtalyan Bağımsızlık Savaşları’na katıldı; ancak orduya olan hayal kırıklığı nedeniyle görevinden ayrıldı. Açık bir Mason olarak, eserlerinde İtalyan ruhundaki Katoliklik yerine seküler erdemleri ve devlete bağlılığı öne çıkarmaya çalıştı. İlerleyen yıllarda sosyalist fikirler üzerinde etkili oldu."
 manzoni.1208.f: "\"Bu kitap özellikle 9 ila 13 yaş arasındaki ilkokul çocuklarına adanmıştır ve başlığı şöyle olabilir: Bir okul yılının hikâyesi, İtalya’daki bir belediye okulunun üçüncü sınıf öğrencisi tarafından yazıldı. Üçüncü sınıf öğrencisi tarafından yazıldığını söylediğimde, aslında yazdığı anlamına gelmez; yazdırılmıştır. Kendi bildiklerini, gördüklerini, duyduklarını ve düşündüklerini bir deftere yavaş yavaş not etti; yıl sonunda babası bu notlara dayanarak sayfaları yazdı, düşüncelerini değiştirmemeye ve çocuğunun sözlerini mümkün olduğunca korumaya dikkat etti. Dört yıl sonra, lise çağında, yazmayı yeniden okudu ve kendi katkısını ekledi; hâlâ taze olan hafızasından insanlar ve olaylarla yararlandı. Şimdi bu kitabı okuyun çocuklar: umarım hoşunuza gider ve size faydalı olur.\"\n- Edoardo de Amicis, Cuore"
 manzoni.1208.h: "Ne harika bir kitap!"
 manzoni.1306.t: "\"Berlin Alexanderplatz\""
 manzoni.1306.d: "\"Berlin Alexanderplatz\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmıştır. Hapisten çıktıktan sonra normal hayata uyum sağlayamayan işçi Franz Biberkopf’un hikâyesini anlatır ve yeniden suça sürüklenir. Biberkopf yalnızca içsel ve dışsal şeytanlarla değil, aynı zamanda metropolün kendisiyle mücadele eder; yok olma tehdidi altındadır."
 manzoni.1306.f: "\"Kaderin için endişelenmemelisin. Ben kaderin karşısındayım. Ben Yunan değilim, Berlinliyim.\"\n- Alfred Döblin, Berlin Alexanderplatz"
 manzoni.1306.g: "Modernizmin çığır açan bir eseri."
 manzoni.1403.t: "\"Le Petit Prince\""
 manzoni.1403.d: "\"Küçük Prens\"te [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], küçük bir prensin diğer gezegenlere seyahatini ve farklı türde yetişkinlerin karikatürleriyle karşılaşmasını anlatır. Prens, evreni anlamayı ummaktadır. Acaba bu soruya bir yanıt bulabilecek mi?"
 manzoni.1403.f: "\"Tüm büyükler bir zamanlar çocuktu... ama yalnızca azı hatırlar.\"\n- Antoine de Saint-Exupéry, Le Petit Prince"
 manzoni.1403.g: "Evreni anlamak mı? Bu imkânsız gibi görünüyor..."
 manzoni.1901.t: "\"Ulysses\""
 manzoni.1901.d: "\"Ulysses\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış modern bir romandır. Yazar, okuyucuyu Dublin’de bir yolculuğa çıkarır; başkahraman Leopold Bloom çeşitli yerleri ziyaret eder. Romanın özelliği, insanların düşüncelerini ve çağrışımlarını olduğu gibi göstermesidir."
 manzoni.1901.f: "\"Ben bir dağın çiçeğiydim evet, saçıma Endülüs kızlarının yaptığı gibi gül takarken ya da kırmızı mı takmalıyım evet ve o beni Mağribi duvarının altında öptü ve düşündüm ki, eh, onunla da olabilir başkasıyla da ve sonra gözlerimle tekrar sormasını istedim evet ve sonra o bana sordu evet der miyim evet dağ çiçeğim ve önce kollarımı onun etrafına sardım evet ve onu bana çekip göğsümü hissetmesini sağladım tüm koku evet ve kalbi deli gibi atıyordu ve evet dedim evet yapacağım Evet.\"\n- James Joyce, Ulysses"
 manzoni.1901.g: "Bu ilginç ve yeni bir yazım tarzı!"
 manzoni_company_basic_publishing_industries: "Yayıncılık"
 manzoni_company_basic_publishing_industries_dynamic_name_tag_singular: "Yayıncılık"
 manzoni_company_basic_publishing_industries_dynamic_name_tag_plural: "Yayıncılık"
 manzoni.500.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName], bir yerel yazar, hükümetimizden bıkmış durumda. [SCOPE.sCharacter('manzoni_writer_scope').GetSheHe|U] ülkemizi daha iyiye götürmek için siyasete atılmaya karar verdi. Soru şu: buna izin vermeli miyiz?"
 manzoni.801.t: "Güzel İllüstrasyonlar"
 manzoni.801.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetHerHis] yeni eseri için [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], ressam [SCOPE.sCharacter('klimt_painter_scope').GetFullName]'yi bazı illüstrasyonlar yapması için ikna etti. İlk tamamlanan illüstrasyonlar eşsiz güzellikte ve [SCOPE.sCharacter('manzoni_writer_scope').GetLastName]'i büyüledi."
 manzoni.801.f: "\"This is a magnificent illustration! I wonder if the artist hid any small details that will tell us more about the story?\""
 manzoni.801.g: "Detaylar inanılmaz!"
 manzoni.801.h: "Bu bir çok satan olacak!"
 manzoni.801.h_tt: "Bu, [GetPlayer.MakeScope.Var('manzoni_writer_var').GetCharacter.GetLastName]'in bir [concept_manzoni_bestseller] yazma şansını artıracak"
 manzoni.802.t: "Dünya Dışı Yaşam Hakkında Teoriler"
 manzoni.802.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName], bir Bilim Kurgu Yazarı ve Astronomumuz Dr. [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName], dünya dışı yaşam olasılığını tartışmak için bir araya geldi. Birlikte bu yaşamın nasıl görünebileceği ve nerede mümkün olabileceği hakkında varsayımlarda bulundular. Teorilerini [SCOPE.sCharacter('verrier_astronomer_scope').GetLastName]-[SCOPE.sCharacter('manzoni_writer_scope').GetLastName]-Hipotezi olarak yayınladılar."
 manzoni.802.f: "\"Elbette, bu yaratıklar bir Gaz Devi'nin gaz okyanuslarında yaşayabilir. Dış dünya ile iletişim kuramayacaklarını varsayardım, ama ya yeni Gaz Devleri’ni kolonileştirmelerini sağlayacak bir yol bulsalar? Belki o kolonilerden birinde bir devrim bile görürüz!\""
 manzoni.802.g: "Belki dünya dışı yaşam aramalıyız?"
 manzoni.802.h: "Teorileri hakkında bir kitap yazmalılar!"
 manzoni.802.i: "Büyüleyici!"
 manzoni.803.t: "[SCOPE.sCharacter('manzoni_adventurer_scope').GetFullName]'in Maceraları"
 manzoni.803.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName], Dr. [SCOPE.sCharacter('manzoni_adventurer_scope').GetLastName]'in maceralarını duymuş ve [SCOPE.sCharacter('manzoni_adventurer_scope').GetHerHim] ile röportaj yapmak için buluşmaya karar vermiştir. Uzun süre konuştular, bu da [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]'in bir sonraki kitabı için birçok fikir edinmesini sağladı."
 manzoni.803.f: "\"Evet, şimdi bahsettiğine göre hatırlıyorum, korsanlar vardı! Aslında, evcil piranhaları olan korsanlardı!\""
 manzoni.803.g: "Umarım bu verimli olur!"
 manzoni.804.t: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName], Balon Uçuşundan İlham Aldı"
 manzoni.804.d: "[SCOPE.sCharacter('curtiss_balloonist_scope').GetFullName], şairimiz [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]'i balonla uçuşa çıkardı. Şimdi döndüğünde, [SCOPE.sCharacter('manzoni_writer_scope').GetLastName] yolculuktan ilham almış gibi görünüyor."
 manzoni.804.f: "\"Bulutlar beyaz bir okyanus gibi görünüyordu ve yerdeki minik insanları görmek inanılmazdı!\""
 manzoni.804.g: "Ah, uçuşun güzelliği!"
 manzoni.804.h: "Belki [SCOPE.sCharacter('manzoni_writer_scope').GetHerHis] şiirleri şimdi daha iyi olur!"
 manzoni.804.i: "Keşke ben de bir baloncu olsaydım!"
 manzoni.805.t: "Dağların Güzelliği"
 manzoni.805.d: "Ünlü dağcı [SCOPE.sCharacter('mountaineer_scope').GetFullName] ile birlikte [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] bir dağ turuna çıktı. Tırmanış zordu ama zirveye ulaştıklarında [SCOPE.sCharacter('manzoni_writer_scope').GetLastName] manzaraya hayran kaldı."
 manzoni.805.f: "\"Sadece birkaç zirve tarafından bölünen bir sis deniziyle çevrili olarak, yükselen güneşe baktım. Harika bir manzara."
 manzoni.805.g: "Dağlar birçok Şairi etkilemiştir!"
 manzoni.805.h: "Umarım dağ havası [SCOPE.sCharacter('manzoni_writer_scope').GetHerHim]’in daha iyi şiirler yazmasına yardımcı olur!"
 manzoni.805.i: "Acaba o dağcı mı olmalı [SCOPE.sCharacter('manzoni_writer_scope').GetHerselfHimself]?"
 manzoni.1003.t: "\"Define Adası\""
 manzoni.1003.d: "\"Define Adası\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmıştır. Jim Hawkins adında genç bir çocuğun hazine arayışı yolculuğunu anlatır. Dr. Livesey ve yaver John Trelawney ile birlikte gemiyle adaya giderler. Ancak mürettebatın çoğunun hazinenin tamamını kendine almak isteyen korsanlar olduğu ortaya çıkar. Jim bu maceradan sağ çıkabilecek mi?"
 manzoni.1003.f: "\"Aradığımız, bu kadar yol kat ettiğimiz Flint’in hazinesiydi ve bu hazinenin peşinde Hispaniola’dan on yedi adamın hayatı zaten kaybolmuştu. Toplamda ne kadar bedel ödendi, ne kan ve keder, hangi iyi gemiler batırıldı, hangi cesur adamlar kör edilmiş tahtada yürütüldü, hangi top atışı, hangi utanç ve zulüm, belki de yaşayan hiçbir insan bunu tam olarak söyleyemez.\"\n- Robert Louis Stevenson, Define Adası"
 manzoni.1003.g: "Arrr!"
 manzoni.1004.t: "\"Frankenstein; veya Modern Prometheus\""
 manzoni.1004.d: "\"Frankenstein; veya Modern Prometheus\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış bir romandır. Dr. Frankenstein, vücut parçalarından oluşan bir varlığı yeniden hayata döndürmeye çalışır. Şimşek sayesinde bedeni canlandırmayı başarır. Canavar hayata döndüğünde, Dr. Frankenstein onun çirkinliğine katlanamaz ve onu kaderine terk eder. Canavarın yüzü köylüler arasında korku ve dehşet yayar ve iyi niyetli varlık yalnızlığa mahkûm olmaya başlar."
 manzoni.1004.f: "\"Ruhu kırık olmasına rağmen, doğanın güzelliklerini ondan daha derinden hisseden kimse yoktur. Yıldızlı gökyüzü, deniz ve bu harika bölgelerin sunduğu her manzara, ruhunu hâlâ yerden yükseltme gücüne sahiptir. Böyle bir insanın çift bir varlığı vardır: Sefalet çekebilir, hayal kırıklıklarına uğrayabilir; fakat kendine döndüğünde, etrafında hiçbir keder veya aptallığın girmediği bir hale sahip göksel bir ruh gibi olur.\"\n- Mary Shelley, Frankenstein; veya Modern Prometheus"
 manzoni.1004.g: "Ölüleri geri getirmek, güzel olmaz mıydı?"
 manzoni.1005.t: "\"Alice Harikalar Diyarında\""
 manzoni.1005.d: "\"Alice Harikalar Diyarında\" adlı eser, genç Alice’in bir tavşan deliğinden aşağı inip kendini tuhaf bir dünyada bulmasını anlatır. [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılan kitap, yetişkinler tarafından oluşturulmuş fantastik yaratıklar ve garip kuralları içerir. Hikâye, Viktorya dönemi ahlakçılığını hicveder."
 manzoni.1005.f: "\"Kendi dünyam olsaydı, her şey saçmalık olurdu. Hiçbir şey olduğu gibi olmazdı, çünkü her şey olmadığı gibi olurdu. Ve tersi de doğru, olan, olmazdı. Ve olmayan, olurdu. Anladınız mı?\"\n- Lewis Carroll, Alice Harikalar Diyarında"
 manzoni.1005.g: "Ne kadar ilginç bir diyar!"
 manzoni.1006.t: "\"Winnie-the-Pooh\""
 manzoni.1006.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetFullName], oğlu Christopher Robin ve onun peluş oyuncaklarından ilham alarak \"Winnie-the-Pooh\"u yazdı. Kitap, ayı Winnie-the-Pooh ve arkadaşları üzerine kısa hikâyelerden oluşur. Pooh bu hikâyelerde çeşitli maceralar yaşar."
 manzoni.1006.f: "\"\"Peki,\" dedi Pooh, \"en çok sevdiğim şey...\" ve sonra durup düşünmek zorunda kaldı. Çünkü Bal yemesi çok iyi bir şey olsa da, yemeye başlamadan önceki an, yemekte olduğundan daha iyiydi, ama ne olarak adlandırılacağını bilmiyordu.\"\n- A.A. Milne, Winnie-the-Pooh"
 manzoni.1006.g: "Bir oyuncak ayı dost olarak harika olur!"
 manzoni.1007.t: "\"Gizemli Olaylar: Styles\""
 manzoni.1007.d: "\"Gizemli Olaylar: Styles\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış bir dedektif romanıdır. Romanda Hercule Poirot karakteri tanıtılır, Belçikalı bir adam olan Poirot, İngiltere’ye taşınmış ve birlikte yaşadığı Mrs. Inglethorp’un cinayetini çözmek zorundadır. Poirot, daha sonra [SCOPE.sCharacter('manzoni_writer_scope').GetLastNameNoFormatting]’in toplam 33 romanında yer alacaktır."
 manzoni.1007.f: "\"Hayal gücünü fazla serbest bıraktın. Hayal gücü iyi bir hizmetkar, kötü bir efendidir. En basit açıklama her zaman en olası olandır.\"\n- Agatha Christie, Gizemli Olaylar: Styles"
 manzoni.1007.g: "Acaba Hercule Poirot’yu tekrar görebilecek miyim?"
 manzoni.1008.t: "\"Orman Kitabı\""
 manzoni.1008.d: "\"Orman Kitabı\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış bir çocuk kitabıdır. Ana teması, terk edilme ve yetiştirilmedir; bu, Mowgli adlı bir çocuğun ormanda bırakılması ve kurtlar tarafından büyütülmesi ile yansıtılır. Kitap ayrıca ormandaki hayvanların uyduğu yasaları ve kuralları öğretir."
 manzoni.1008.f: "\"Orman Yasası'nın güzelliklerinden biri, cezanın tüm hesapları kapatmasıdır. Sonrasında başkaca dırdır yoktur.\"\n- Rudyard Kipling, Orman Kitabı"
 manzoni.1008.g: "Gerekli şeyleri aramaya bak!"
 manzoni.1009.t: "\"Peter Tavşan Hikâyesi\""
 manzoni.1009.d: "\"Peter Tavşan Hikâyesi\", Peter Rabbit’in Mr. McGregor’un bahçesine girip orada kovalanmasını anlatır. [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılan hikâye, çocuk edebiyatı için radikal ve yenilikçi olup, o dönemde çocuk kitaplarında nadiren görülen birçok yenilik içerir."
 manzoni.1009.f: "\"Bir zamanlar dört küçük Tavşan vardı, isimleri Flopsy, Mopsy, Cottontail ve Peter'di.\"\n- Beatrix Potter, Peter Tavşan Hikâyesi"
 manzoni.1009.g: "Yasak bir bahçeye girmek, ilginç görünüyor!"
 manzoni.1010.t: "\"Fenere Doğru\""
 manzoni.1010.d: "\"Fenere Doğru\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış modernist bir romandır. Skye Adası’nda Ramsey ailesinin tatilini anlatır ve diyaloğa ve eyleme değil, düşünce ve gözlemlere odaklanır."
 manzoni.1010.f: "\"Hayatın anlamı nedir? İşte tüm soru buydu; yıllar geçtikçe insanı içine alan basit bir soru; büyük bir aydınlanma asla gelmedi. Belki de hiç gelmedi. Bunun yerine küçük günlük mucizeler, ani aydınlanmalar vardı; işte bir tanesi.\"\n- Virginia Woolf, Fenere Doğru"
 manzoni.1010.g: "Aileler..."
 manzoni.1307.t: "\"Buddenbrooks: Bir Ailenin Çöküşü\""
 manzoni.1307.d: "\"Buddenbrooks: Bir Ailenin Çöküşü\" veya \"Buddenbrooks: The Decline of a Family\", Almanca yazılmış ilk sosyal romandır. Kitapta, [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], Lübeck şehrinde zengin bir tüccar ailesinin dört kuşak boyunca çöküşünü anlatır."
 manzoni.1307.f: "\"Dışa dönük ve görünen mutluluk ve başarı göstergeleri, çöküş süreci başlamadan kendilerini göstermez. Dışa yansıyan belirtiler zaman alır - tıpkı yukarıdaki yıldızın ışığı gibi, aslında sönmüş olabilir, ama bize en parlak şekilde parlıyormuş gibi görünür.\"\n- Thomas Mann, Buddenbrooks"
 manzoni.1307.g: "Umarım ailem çöküşte değildir."
 manzoni.1404.t: "\"Kamelyalı Kadın\""
 manzoni.1404.d: "\"Kamelyalı Kadın\" veya \"The Lady of the Camellias\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName]'in kendi hayatından esinlenen bir aşk hikayesidir. Romanda, Armand ve fahişe Marguerite arasındaki ölümsüz aşk, Armand’ın babasının müdahalesiyle kesintiye uğrar; baba, oğlunun ilişkisi kızının evlilik şansını yok edebileceği endişesi taşır. Bu nedenle Marguerite’i Armand’dan ayrılmaya ikna eder. Armand bunu bir gün öğrenecek mi?"
 manzoni.1404.f: "\"En küçük şeylerden duyduğu sevinç bir çocuğun sevinci gibiydi. Bazı günler, on yaşında bir çocuk gibi bahçede bir kelebek veya yusufçuk peşinden koşardı. Buketlere öylesine para harcamış olan bu fahişe, bazen çimenin üzerine oturup kendi adını taşıyan basit çiçeği incelerdi.\"\n- Alexandre Dumas Fils, Kamelyalı Kadın"
 manzoni.1404.g: "Ah, ölümsüz aşk!"
 manzoni.1405.t: "\"Madame Bovary\""
 manzoni.1405.d: "\"Madame Bovary\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış realist bir hikayedir. Romanda Emma Bovary, Fransa kırsalındaki hayatından ve kocasından sıkılır ve başka erkeklerle romantik maceralara başlar. Ayrıca sahip olduğundan fazla para harcar ve giderek borca girer. Borcunu ödeyebilecek mi?"
 manzoni.1405.f: "\"Ama kalbinin derinliklerinde, bir şeylerin olmasını bekliyordu. Batık gemiciler gibi, hayatının yalnızlığına umutsuz gözlerle bakıyor, ufukta bir beyaz yelken arıyordu. Bu şansın ne olacağını, hangi rüzgarın onu getireceğini, hangi kıyıya sürükleyeceğini bilmiyordu; tekne tek katlı mı olacak, yoksa üç katlı mı, acıyla mı yoksa mutlulukla mı dolu olacak pencerelerde. Ama her sabah uyandığında, o gün gelmesini umuyor; her sesi dinliyor, birden irkiliyor, neden gelmediğine şaşırıyordu; sonra gün batımında, her zaman daha hüzünlü olarak, ertesi günü bekliyordu.\"\n- Gustave Flaubert, Madame Bovary"
 manzoni.1405.g: "Bu kitap biraz... garip."
 manzoni.1406.t: "\"Boule de Suif\""
 manzoni.1406.d: "\"Boule de Suif\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış bir kısa hikâyedir. Prusya askerleri Normandiya’nın bazı bölgelerini işgal ettiğinde, bir grup Fransız evlerinden kaçarken yanlışlıkla işgal altındaki bölgelere girer ve süresiz olarak tutulur. Daha sonra Boule de Suif (Hamur Topu), yolcular arasında bir fahişe, Alman subayının onları yalnızca onunla ilişkiye girdikten sonra serbest bırakacağını açıklar. Başta diğer yolcular Boule de Suif’i destekler, ama birkaç gün sonra bu değişir..."
 manzoni.1406.f: "\"Kasaba halkı karartılmış odalarında, sanki bir felaket, yıkıcı bir deprem tarafından sersemlemiş gibi görünüyordu; bütün bilgelik ve direnç işe yaramazdı. Bu his, her zaman mevcut düzen altüst olduğunda, güvenlik yok edildiğinde ve insan veya doğa yasalarının koruduğu her şeyin aniden vahşi ve akılsız bir zulme bırakıldığında ortaya çıkar.\"\n- Guy de Maupassant, Boule de Suif"
 manzoni.1406.g: "Kendi kurtarıcını böyle bağlamak..."
 manzoni.1407.t: "\"Arsène Lupin, centilmen hırsız\""
 manzoni.1407.d: "\"Arsène Lupin, centilmen hırsız\" veya \"Arsène Lupin, Gentleman Burglar\" [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış kısa hikâyeler koleksiyonudur. Hikâyeler, centilmen hırsız Arsène Lupin’in önce tutuklanmasını, ardından hapisten kaçmasını ve son hikâyede Sherlock Holmes ile yüzleşmesini anlatır."
 manzoni.1407.f: "\"Ne yazık ki dürüst bir adam değilim!\"\n- Maurice Leblanc, Arsène Lupin, centilmen hırsız"
 manzoni.1407.g: "Acaba hangisi daha iyi, Sherlock Holmes mu Arsène Lupin mi?"
 manzoni.1408.t: "\"Kayıp Zamanın Peşinde\""
 manzoni.1408.d: "\"Kayıp Zamanın Peşinde\" veya \"In Search of Lost Time\", anlatıcının çocukluğunu ve 19. yüzyıl sonu ile 20. yüzyıl başı Fransa’sındaki yüksek sosyete yaşamını hatırlamalarını takip eder. Yazar [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], özellikle istemsiz belleği bir kurgu aracı olarak kullanır."
 manzoni.1408.f: "\"Kendimizle ve bir başkasıyla olan bağlar sadece zihnimizde vardır. Bellek soldukça onları gevşetir ve bizi aldatmak istediğimiz yanılsamalara rağmen, sevgi, dostluk, nezaket, saygı ve görev uğruna diğer insanları aldattığımızda, yalnız var oluruz. İnsan, kendisinden kaçamayan, diğer insanları yalnızca kendi içinde tanıyan, aksi iddia ettiğinde yalan söyleyen bir yaratıktır.\"\n- Marcel Proust, Kayıp Zamanın Peşinde"
 manzoni.1408.g: "Bu kitap bana bir şeyleri hatırlattı..."
 manzoni.1409.t: "\"Küçük Fadette\""
 manzoni.1409.d: "\"Küçük Fadette\" veya \"La Petite Fadette\", tanınmış bir çiftçi ailesinden iki ikiz kardeşin Fadette’e aşık olmasını anlatır. Başlangıçta ilişkileri köydeki ataerkil normlara ve beklentilere meydan okur, fakat Fadette miras kaldığında her şey değişir. [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], kırsal kökenlerini kullanarak köyü ve sakinlerini detaylı şekilde betimler."
 manzoni.1409.f: "\"Tanrı yalnızca kendini terk edenleri terk eder ve kederini kendi kalbinde saklamaya cesaret eden kişi, yakınmalarla uğraşan kişiden daha güçlüdür.\"\n- George Sand, Küçük Fadette"
 manzoni.1409.g: "Zeki gençler!"
 manzoni.1501.t: "\"Tom Amca'nın Kulübesi\""
 manzoni.1501.d: "\"Tom Amca'nın Kulübesi\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış ve köleliğin kötülüklerini ve dehşetini anlatan bir kitaptır. Çeşitli kölelerin, acı ve sefaletle dolu yaşamlarını tasvir eder."
 manzoni.1501.f: "\"...kalbin verecek gözyaşı yok, yalnızca sessizce kan akıtır.\"\n- Harriet Beecher Stowe, Tom Amca'nın Kulübesi"
 manzoni.1501.g: "Korkunç görünüyor!"
 manzoni.1502.t: "\"Ben-Hur: Mesih'in Hikayesi\""
 manzoni.1502.d: "\"Ben-Hur: Mesih'in Hikayesi\"'nde [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], Yahudi prensi Judah Ben Hur'un Roma tarafından köleleştirilmesini ve arabacı olmasını anlatır. Hikâye, İsa'nın hayatını yansıtır."
 manzoni.1502.f: "\"Tanrı'ya güvenmek daha güzeldir. Bu dünyadaki güzellikler onun elindendir; her şey onun mükemmel zevkini gösterir; tüm şekillerin yaratıcısıdır; zambağı giydirir, gülü renklendirir, çiy damlasını damıtır, doğanın müziğini yapar; kısacası bizi bu hayata uygun şekilde yaratmıştır ve koşullarını koymuştur; bu bana o kadar güven verir ki, küçük bir çocuk gibi, ruhumun ve ölüm sonrası hayatın her düzenlemesini ona bırakırım. Onun beni sevdiğini biliyorum.\"\n- Lew Wallace, Ben-Hur: Mesih'in Hikayesi"
 manzoni.1502.g: "Gerçek bir Hristiyan!"
 manzoni.1503.t: "\"Moby-Dick; veya Balina\""
 manzoni.1503.d: "\"Moby-Dick; veya Balina\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmıştır ve genç denizci Ishmael’in bakış açısından Kaptan Ahab'ın beyaz balinaya takıntısını anlatır. Balina, Ahab’ın bacağını dizine kadar kopardıktan sonra, Ahab hayatında sadece bir amaç bilmektedir: intikam."
 manzoni.1503.f: "\"Ağzımın kararmaya başladığını hissettiğimde; ruhumda nemli, çiseleyen bir Kasım olduğunda; istemeden tabut depolarının önünde durduğumda ve karşılaştığım her cenazenin ardında yürüdüğümde; ve özellikle de karamsarlıklarım o kadar baskın olduğunda, güçlü bir ahlaki ilke olmadan bilerek sokağa çıkıp insanların şapkalarını tek tek düşürecek olsam - işte o zaman denize açılmam gerektiğini anlarım.\"\n- Herman Melville, Moby-Dick; veya Balina"
 manzoni.1503.g: "Benim Balinam ne?"
 manzoni.2100.t: "\"Tang Thương Ngẫu Lục\""
 manzoni.2100.d: "\"Tang Thương Ngẫu Lục - Rastgele Hüzün Kayıtları\", Pham Dinh Ho ve Nguyen An tarafından yazılmış hikâyeler koleksiyonudur ve 18. yüzyıl sonu ile 19. yüzyıl başı Vietnam’ındaki dini ve toplumsal olayları kaydeder. Toplam 89 hikâyeden oluşur ve Üst ile Alt kitap olarak ikiye ayrılmıştır; koleksiyon, önemli kişilerin hikâyelerini, manzaralı gezileri, tarihi kalıntıları ve yerel efsaneleri içerir. Bu kayıtlar, Later Le ve Nguyen hanedanlarının çalkantılı döneminde Vietnam yaşamına eşsiz bir bakış sunar."
 manzoni.2100.f: "Ly, Tran, Le, Trinh’den günümüze, yüzlerce yıl sonra, resmi tarihçiler tarafından kaydedilmeyen veya yerel efsaneler tarafından hatırlanmayan hikâyeler vardır; böylece iki yazar bunları hüzünlü değişimlerin dünyasında topladı. Eğer bu hikâyeleri hüzünlü sayıp unutmayı seçselerdi, eninde sonunda unutulacaklardı. Neyse ki, bu hikâyeleri yazarak, bizi delirium kıyısından kurtaracak bir sal, karanlığı aydınlatacak bir ışık olarak Tang Thương Ngẫu Lục adını verdi ve anlam böyle algılanabilir."
 manzoni.2100.g: "Daha karanlık zamanlardan hikâyeler, daha iyi olmaya çalışmalıyız."
 manzoni.2200.t: "Şeref için Düello"
 manzoni.2200.d: "[SCOPE.sCharacter('manzoni_writer_scope').GetLastName], eşinin sözde hayranı Georges d'Anthès'e son derece aşağılayıcı bir mektup gönderdikten sonra, diğeri onu düelloya davet etti. Artık iki tarafın yüzleşme zamanı geldi."
 manzoni.2200.f: "\"Düello kuralları, iki rakibin kararlaştırılan bir mesafede sıralanmasını gerektirir. Arkaları rakibine dönük olmalıdır. Sinyal ile, iki düellocu birbirine doğru döner ve yürür. Ateş etmeye kendileri karar verir. İlk ateş eden kişi aynı yerde durmalıdır.\nBu kuralları kabul ediyor musunuz?\""
 manzoni.2200.g: "Umarım hayatta kalır!"
 manzoni.2200.h: "Umarım bu belalı ölür!"
 manzoni.2201.t: "\"Suç ve Ceza\""
 manzoni.2201.d: "\"Suç ve Ceza\" veya \"Prestupleniye i nakazaniye\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmıştır ve Saint Petersburg'da yoksul eski bir öğrenci olan Rodion Raskolnikov'un zihinsel ıstırabını ve ahlaki ikilemlerini takip eder. Raskolnikov, para ve değerli eşyaları dairelerinde saklayan ahlaksız bir tefeciyi öldürmeyi planlar."
 manzoni.2201.f: "\"Büyük zekâ ve derin kalp için acı ve ıstırap her zaman kaçınılmazdır. Gerçekten büyük insanların, bence, dünyada büyük bir üzüntüye sahip olması gerekir.\"\n- Fyodor Dostoyevski, Suç ve Ceza"
 manzoni.2201.g: "İyi ki borcum yok!"
 manzoni.2202.t: "\"Savaş ve Barış\""
 manzoni.2202.d: "\"Savaş ve Barış\" veya \"Voyna i mir\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmıştır ve farklı sosyal sınıflardan çeşitli karakterleri takip eder. Kitap, Napolyon Savaşları sırasında geçer ve kitabın üç ana karakterinin hayatını değiştirir."
 manzoni.2202.f: "\"Doğru ya da yanlış olanı yargılamak insana verilmemiştir. İnsanlar sürekli yanılmıştır ve yanılacak, ve hiç kimse haklı ya da yanlış olduğunu düşündüğü konudan daha çok yanılmamıştır.\"\n- Lev Tolstoy, Savaş ve Barış"
 manzoni.2202.g: "Gerçek bir başyapıt! Sadece biraz uzun..."
 manzoni.2300.t: "\"Tōsei Shosei Katagi\""
 manzoni.2300.d: "\"Tōsei Shosei Katagi\" veya \"Çağdaş Öğrencilerin Portreleri\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış ve Japonya'nın ilk modern romanlarından biridir. Yazdığı eleştiri 'Shōsetsu Shinzui' ile birlikte, bu kitaplar Japonya'da roman ve dramaların daha kabul görmesini sağlamıştır."
 manzoni.2300.f: ""
 manzoni.2300.g: "Artık Japonya'nın da romanları olacak!"
 manzoni.2400.t: "\"Braz Cubas’ın Ölümünden Sonraki Anıları\""
 manzoni.2400.d: "\"Braz Cubas’ın Ölümünden Sonraki Anıları\" veya \"Memorias Posthumas de Braz Cubas\"'ta [SCOPE.sCharacter('manzoni_writer_scope').GetFullName], kahraman Brás Cubas’ın ölümünden sonra hayatını anlatmasına izin verir. Bu sayede Cubas, Brezilya toplumunu eleştirebilir. Bu, Machado'nun gerçekçi kitaplarının ilki olup, bazı karakterler ve ögeler daha sonraki kitaplarda tekrar ele alınmıştır."
 manzoni.2400.f: "\"Cesedimin soğuk etini ilk kemiren kurda, bu Ölüm Sonrası Anıları sevgili bir hatıra ile ithaf ediyorum.\"\n- Machado de Assis, Braz Cubas’ın Ölümünden Sonraki Anıları"
 manzoni.2400.g: "Ölü birinden eleştirilmek!"
 manzoni.2401.t: "\"Iracema\""
 manzoni.2401.d: "\"Iracema\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış ve ilk Brezilyalının nasıl ortaya çıktığını göstermeye çalışan bir hikâyedir. Yerli Iracema ve Portekizli kolonist Martim’in birlikte Moacir adında bir oğul sahibi olmasını anlatır. Kitabın başlığı 'America' anagramıdır ve sömürgeleştirme temasına uygundur."
 manzoni.2401.f: "\"Doğduğum toprakların yeşil, vahşi denizleri, jandaianın carnauba yapraklarında şarkı söylediği yer.\"\n- José de Alencar, Iracema"
 manzoni.2401.g: "Bir ulus yaratmak için bir hikâye..."
 manzoni.2402.t: "\"O Cortiço\""
 manzoni.2402.d: "\"O Cortiço\" veya \"Gecekondular\", [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından yazılmış bir natüralist romandır. Kitapta [SCOPE.sCharacter('manzoni_writer_scope').GetLastName], bir gecekonduda yaşayan çeşitli Portekizli ve diğer göçmenlerin yaşamını tasvir eder. Bu insanlar yeni evlerinde uyum sağlar ve değişirler."
 manzoni.2402.f: "\"Ve o ıslak, buharlı toprakta, sıcak, çamurlu nemde, bir dünya kıvranmaya, filizlenmeye, büyümeye başladı; yaşayan bir varlık, bir nesil, sanki o çamurdan kendiliğinden doğmuş gibi çoğalmaya başladı, gübredeki kurtçuklar gibi.\"\n- Aluísio Azevedo, O Cortiço"
 manzoni.2402.g: "Böyle gecekonduların var olmasına nasıl izin verebiliriz?"
 manzoni.2500.t: "\"Kuángrén Rìjì\""
 manzoni.2500.d: "\"Kuángrén Rìjì\" veya \"Bir Deli Günlüğü\", çoğunlukla günlük konuşma Çince ile yazılmış modern bir Çin hikayesidir, [SCOPE.sCharacter('manzoni_writer_scope').GetFullName] tarafından. Hikâyede anlatıcının kardeşi giderek daha fazla delirmeye başlar. İnsanların yamyam olduğunu ve onu intihara zorlamaya çalıştıklarını düşünür."
 manzoni.2500.f: "\"Bu kahkaha içinde cesaret ve bütünlük olduğunu biliyordum. Hem yaşlı adam hem de kardeşim soldu, cesaretim ve bütünlüğüm karşısında hayran kaldı.\"\n- Xun Lu, Kuángrén Rìjì"
 manzoni.2500.g: "En azından etrafımda yamyam yok!"
