 pius.111.h_tt: "Meryem görünüşünün ardından başka olayların da yaşanma olasılığı yüksek."
 pius.111.i_tt: "Kanlı bir çatışma olasılığı çok yüksek."
 pius.121.h_tt: "Bu önlemin bilinmeyen, ciddi sonuçları olabilir."
 pius.101.t: "La Salette'deki Görünüş"
 pius.101.d: "Güneydoğu Fransa'nın dağlarında iki çocuk, Meryem Ana'yı gördüklerini iddia ederek Katolik dünyasında büyük bir ruhani heyecan — ve endişe — dalgası yarattı."
 pius.101.f: "'Yaklaşın, çocuklarım, korkmayın. Size büyük bir haber getirmek için buradayım…'\n\nLa Salette köyünün üstündeki yüksek Alpin meralarında, Corps yakınlarında, iki çoban çocuğu bir vizyon gördüklerini bildiriyor. Işıkla parlayan ve üzüntüyle örtülü bir hanım onlara görünür. Ağlar — Tanrı'dan uzaklaşmış bir dünya için gözyaşları döker. Küstahlıkla söylenen küfürleri, profan edilmiş Pazar günlerini ve insanlık tövbe etmezse gelecek olan kıtlık ve felaketi anlatır.\nBaşlangıçta bir köy efsanesi gibi görünen olay bir harekete dönüşür. Hacılar uzak dağ yamaçlarına akın eder. Rahipler ve gazeteciler aynı patikalardan tırmanır. Kilise kararsızdır: bazıları bu vizyonu ilahi bir tövbe çağrısı olarak kabul eder; diğerleri ise popüler mistisizm ve irrasyonel heyecanın yükselişinden korkar.\nGrenoble piskoposu ihtiyatlı bir onay sunar. Seküler otoriteler şüpheli kalır. Peki Roma? Roma sessizce izler. Ama çanlar çoktan çalmaya başlamıştır."
 pius.101.g: "Göksel bir uyarı."
 pius.101.h: "Mantıklı kalın."
 pius.102.t: "Lourdes'daki Görünüş"
 pius.102.d: "Küçük Lourdes kasabasında, on dört yaşındaki bir kız bir mağarada ışıldayan bir hanımı gördüğünü iddia eder. Onun vizyonları kısa sürede hacıları, tartışmaları ve Roma'nın ilgisini çeker."
 pius.102.f: "'Genç, çıplak ayaklı ve fakirdi. Yine de anlatılamayacak bir güzellikten söz etti.'\n\nPirene eteklerinde, Lourdes yakınlarındaki uzak bir mağarada, Bernadette Soubirous adındaki bir köylü kız beyaz giysili, mavi kuşaklı ve ayaklarında altın güller olan bir hanımdan bahseder. Başlangıçta vizyon hiçbir şey söylemez — sadece gülümser. Sonra konuşur: tövbe, dua, acı ve ilahi merhamet hakkında. Kendini sadece \"Masum Meryem\" olarak tanıtır.\nBaşlangıçta köylüler alay eder. Ancak Bernadette gizli bir kaynak bulup bunun iyileştirici bir yer olduğunu iddia ettiğinde, binlerce kişi gelir — umutla, dua ederek, ağlayarak. Bastonlar bırakılır. Tanıklıklar yayılır. Şüpheciler histeri olarak nitelendirir. Doktorlar, rahipler ve politikacılar Lourdes'a gelir.\nKilise araştırır. Devlet temkinli gözlemler. Ve halk hâlâ gelir."
 pius.102.g: "Şifa ve Umut için Bir Tapınak."
 pius.102.h: "Hâlüsinasyonlar!"
 pius.103.t: "Knock'taki Sessiz Vizyon"
 pius.103.d: "İrlanda'nın Knock köyünde, on beş tanık Meryem Ana, Aziz Joseph ve Aziz Yuhanna'nın sessiz bir görünüşünü bildirir. Vizyon, uzun süredir yoksulluk, sürgün ve yabancı yönetim altında ezilen bir halkı etkiler."
 pius.103.f: "'Hiçbir kelime söylemediler. Ama o sessizlikte bir ulus umut duydu.'\n\nCounty Mayo, Knock'taki cemaat kilisesine sürekli yağmur yağmaktadır. Yine de on beş köylü büyülenmiş şekilde durur. Önlerinde, güney cephe duvarında ışıkla yıkanmış bir sessiz topluluk durmaktadır: Meryem Ana dua pozunda; Aziz Joseph yanında; Aziz Yuhanna İncili tutmaktadır. Arkada bir kuzu ve bir haç.\nHiçbir mesaj söylenmez. Hiçbir hareket yapılmaz. Yine de tanıklar gördüklerine yemin eder — genç ve yaşlı, erkek ve kadınlar.\nKıtlık, göç ve ruhsal özlemle yıpranmış bir ülkede, sessiz vizyon vaazlardan daha yüksek sesle yankılanır. Hacılar kısa süre içinde iyileşme, işaret ve teselli aramak için gelir. İngiliz yetkililer alay eder. Kilise içinde bazıları tereddüt eder. Ama İrlanda'nın yoksul ve dindar halkı için Knock, bir kutsal onur çağrısına dönüşür."
 pius.103.g: "Yağmurda Bir Işık."
 pius.103.h: "Bunu Folklor olarak görmezden gelin."
 pius.104.t: "Fátima'nın Sırları"
 pius.104.d: "Portekiz’in merkezi bölgelerinde üç çoban çocuk, Meryem Ana’nın tekrarlayan görünüşlerini bildirir; bu, binlerce kişi tarafından görülen mucizevi bir olaya yol açar. Vizyonları savaş, acı ve Kilise'nin geleceğine dair kehanetler taşır."
 pius.104.f: "'Sonunda, Masum Kalbim zafer kazanacak.'\n\nFátima kasabası yakınlarında, Cova da Iria'nın kırsal tepelerinde, Lucia, Francisco ve Jacinta adındaki üç çocuk, güneşten daha parlak, ışık ve üzüntüyle örtülü bir hanımdan söz eder. Altı ay boyunca, o tekrar tekrar görünür, küresel savaş, tanrısız ideolojilerin yükselişi ve inananların zulüm görmesi hakkında uyarılarda bulunur. Pişmanlık, dua ve Rusya'nın kalbine adanmasını ister.\n13 Ekim 1917'de, on binlerce kişi sağanak yağmur altında dururken, güneş gökyüzünden kopar gibi görünür, döner ve çarpışır. Bazıları diz çöküp dua eder. Diğerleri kaçar. Işık kaybolduğunda, giysiler kuru kalır. Kalabalık sessizce dağılır, hem hayran hem korku içindedir.\nKilise temkinlidir. Basın bölünmüştür. Ama halk arasında — özellikle yoksullar, yaralılar ve inananlar arasında — yeni bir ateş yanar: umut, uyarı ve Meryem’i yalnızca anne değil, gelecek çağın bekçisi olarak gören bir alev."
 pius.104.g: "Fátima'nın Uyarılarını Dinleyin."
 pius.104.h: "Güneş Mucizesini Çürütün."
 pius.105.t: "[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]'daki Meryem Ana"
 pius.105.d: "[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] yakınındaki uzak bir köyde Meryem Ana'nın görünüşüne dair haberler çıkıyor. Hikaye hızla yayılıyor, hacılar, şüpheciler ve kilise yetkilileri ilgileniyor."
 pius.105.f: "'O, tarlaların üzerinde, bir ışık tacı içinde duruyordu ve her ruhun üzüntüsünü biliyormuş gibi bize baktı.'\n\nİlk konuşan bir çocuktu — gözleri hayranlıkla açılmış, sesi titrek. O, şafaktan daha parlak, ışık ve üzüntüyle örtülü bir hanımdan söz etti, sessizce göründü ve dünyayı derin, bilge bir üzüntüyle izledi. Başkaları da onu gördüklerini iddia etti. Bazıları diz çöküp dua etti. Diğerleri koştu. Herkes ardından gelen sessizliği hatırladı.\nHikaye köyün dışına yayıldı. Hacılar geldi, ellerinde mumlarla. İnananlar dua etti. Muhtaçlar umut etti. Rahipler tartıştı. Yetkililer kaşlarını kaldırdı. Ama halk gelmeye devam etti — kesinlik değil, daha eski bir şeye çekilerek: inanma ihtiyacı.\nMucize, vizyon ya da efsane olsun, olay şimdiden tanıklık edenlerin kalplerini şekillendirdi — ve şimdi bunun ne anlama geldiğine karar vermesi gerekenlerin hayatlarını."
 pius.105.g: "İnananlar için Bir İşaret."
 pius.105.h: "Histeriyi Bastırın."
 pius.111.t: "İstenmeyen Alay"
 pius.111.d: "Resmi emirlerin halk gösterilerini yasaklamasına rağmen, [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]’daki Meryem Ana görünüşü alanına doğru inananların spontan bir alayı başladı."
 pius.111.f: "'Hiç meşale yakmadık, bayrak taşımadık. Sadece tespihler, sessizlik ve ayaklarımızın toprağa değmesi.'\n\nŞafakta geldiler, ikişer üçer, tarlalar ve köyler boyunca yürüyerek, dualar fısıldadılar. Öğlene kadar yüzlerce kişi oldular, kır yollarında akıyorlardı, bazıları çıplak ayaklı, bazıları ağlıyordu. Kadınlar çiçek taşıdı. Yaşlılar dualar mırıldandı. Çocuklar tahta oyma ikonlara sarıldı.\nYetkililer alanın kapalı olduğunu ilan etmişti. Askerler nöbetteydi. Yine de kalabalığı durduran olmadı. Belki şarkı söylemeleri, belki sessizlik, belki görünmeyen bir şey.\nİnananlar vizyon yerine ulaştığında diz çöktü, dualar fısıldadı ve toprakta mum yaktı. Gökyüzünden hiçbir ses yankılanmadı. Hiçbir mucize görülmedi. Ama bir şey değişmişti. Bir halk harekete geçmişti — yasa ihlali değil, yasadan daha eski bir şeye itaatle."
 pius.111.g: "Dua etsinler."
 pius.111.h: "Sessizce gözlemleyin."
 pius.111.i: "Güç kullanarak dağıtın."
 pius.112.t: "Kutsal Zeminde Kan"
 pius.112.d: "Yasak Meryem alayında yetkililerle inananlar arasında bir çatışma şiddetle sonuçlandı. Bir zamanlar umut ilham veren topraklar artık kan lekesi taşıyor."
 pius.112.f: "'Önce dualar vardı, sonra çığlıklar.'\n\nAskerler geldiğinde mumlar hâlâ titriyordu. Sesler karmaşık bir şekilde yükseldi, sonra yalvarışa dönüştü. Bir kadın düştü. Bir çocuk bağırdı. Kim emri verdi bilinmiyor — ama tüfekler ateşlendi, coplar sallandı, botlar tütsü ve toprakta yürüdü. Sessizlik döndüğünde, öncekinden daha ağırdı.\nKilise sarsıldı. İnananlar öfkelendi. Basın sessizce konuştu — bazıları kazayla, bazıları katliamla suçladı. Alan, bir zamanlar kutsal olarak fısıldanan, şimdi hafıza tarafından lanetlendi. Ama halk hâlâ toplandı — çiçeklerle değil, öfkeyle, sessizlikle, hiçbir yasanın söndüremeyeceği bakışlarla."
 pius.112.g: "Olanlardan üzüntü duyuyoruz."
 pius.112.h: "Bunu kendileri davet ettiler."
 pius.113.t: "Vaazdaki Ses"
 pius.113.d: "Yerel bir rahip, [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]’daki Meryem görünüşünün baş savunucusu olarak öne çıktı. Vaazları kalabalıkları çeker, sözleri umut aşılar — ve devlet otoritesine meydan okur. Adı Rahip [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName]."
 pius.113.f: "'O, güçlülere değil, alçakgönüllülere göründü. Belki bu yüzden onu susturmak istiyorlar.'\n\nKöyün üzerindeki taş kilisede, Rahip [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName] vaaz vermeye başladı — yalnızca Meryem’in merhameti değil, adaleti hakkında. Sözleri nefeh boyunca yankılanıyor: 'Eğer Cennet burada konuştuysa, hiçbir hükümet yankısını yasaklayamaz.'\nHacılar vaazlarına akın ediyor. Adı fısıltılar ve ilahilerle yayılıyor. Barışı teşvik ediyor, ama varlığı huzursuzluğu tetikliyor. Bazıları onu peygamber, bazıları ise cüppe içinde isyancı olarak nitelendiriyor.\nYetkililer huzursuz. Ordu kışkırtmadan söz ediyor. Kilise hiyerarşisi tereddüt ediyor — dogma ve diplomasi arasında bölünmüş. Masanıza sessiz bir öneri geliyor: O uzaklaştırılabilir. Sessizce. Gizlice.\nAma bazı insanlar susturulduğunda, daha yüksek sesle konuşur."
 pius.113.g: "Vaaz vermesine izin verin."
 pius.113.h: "Müzakere için başkente çağırın."
 pius.113.i: "Onu ortadan kaldırın."
 pius.114.t: "Ulusu Sarsan Alay"
 pius.114.d: "Ülke genelinde Katolik inananlar, Marian görünüşünü destekleyen halk gösterilerine başladılar. Kırsal bir hac olarak başlayan olay, ulusal bir harekete dönüştü."
 pius.114.f: "'Ellerinde tespihler, omuzlarında çocukları ve dudaklarında Meryem’in adıyla yürüdüler.'\n\nBalıkçı köylerinden fabrika kasabalarına, işaretler aynıydı: pencerelerde yanan mumlar, meydanlarda yankılanan ilahiler, binlerce kişi sessizce toplanıyordu. Hiçbir pankart taşınmadı — sadece heykeller, ikonlar ve tekrar tekrar fısıldanan tek bir isim: Maria. Bağlılıkla başlayan şey, itaatsizliğe dönüştü.\n[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]’daki kutsal alandaki şiddete yanıt olarak inananlar sokaklara çıktı. Bağırmıyorlar. Dua ediyorlar. Ama sayıları her gün artıyor.\nHükümette bazıları hoşgörüyü öneriyor. Diğerleri sert müdahaleler talep ediyor. Ordu huzursuz. Ve ülke genelindeki evlerde, şüpheciler bile merak ediyor: Eğer bu kadar çok kişi inanıyorsa, hâlâ yalan olabilir mi?"
 pius.114.g: "Ulusal alaya izin verin."
 pius.114.h: "Ulusal alayı yasaklayın."
 pius.115.t: "Tarlalar Boş Kaldı"
 pius.115.d: "[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]’ın birkaç kırsal bölgesinde ciddi bir mahsul kaybı yaşandı. İnananlar arasında tehlikeli bir fısıltı yayılmaya başladı: Bir zamanlar devlet tarafından susturulan Meryem artık ağlıyor — ve cezalandırıyor."
 pius.115.f: "'O, dua istedi. Biz ona asker verdik.'\n\nYağmurlar yağmadı. Buğday çok erken sarardı. Patatesler toprağın altında çürüdü, görülmeden ve acı bir şekilde. Köylüler, tarlaların... terk edilmiş olduğunu söylüyor. Sadece insanlar tarafından değil, merhamet tarafından da.\nVe böylece fısıldıyorlar. Bir zamanlar görünen ve alay edilen ışık içindeki kadından. Kaybolan rahipten. Mühürlenen kutsal alandan ve dövülen hacılardan. Şimdi, diyorlar, yüzünü çevirdi.\nMumlar tekrar yanıyor, ama artık kepenkli pencerelerin arkasında. Anneler çocukları gizlice vaftiz ediyor. Yaşlı adamlar ekmek kırıntılarını sunu olarak gömüyor. Kilise konuşmaya cesaret edemiyor, ama halk zaten inanıyor: Bu onun üzüntüsü. Ya da uyarısı."
 pius.115.g: "Batıl inanç! Umarım…"
 pius.116.t: "Çanın Ötesindeki Sessizlik"
 pius.116.d: "Yıllar süren baskı ve reddedilen mucizelerin ardından, bir zamanlar dindar olan birçok vatandaş [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]’daki inançlarını bırakmaya başladı. Artan sayıda kişi kendini artık Katolik değil — ama hiçbir şey olarak tanımlıyor."
 pius.116.f: "'Artık gelmiyor. Ne rüyalarda, ne vizyonlarda. Mumlar yanmıyor.'\n\nMabet kapatıldı. Rahip gitti. Tarlalar sessiz.\nEskiden en yoksullar bile uyumadan önce Ave Maria fısıldardı, evlerde ikonlar asılır, çan sesinde gözyaşları dökülürdü. Şimdi kiliseler boş. Çocuklar 'itiraf'ın ne olduğunu soruyor. Gençler Akıl, İlerleme, Hiçbir Şey’den söz ediyor.\nHalk ideolojiye yönelmedi. Kül oldu. Radikal değiller. Tükenmişler. Ve boş sessizlikte, bir soru hâlâ sürüyor:\nO bizi terk etti mi — yoksa biz onu mu?"
 pius.116.g: "İnanç Çağı sona erdi."
 pius.119.t: "Mabetin Kapatılması"
 pius.119.d: "Yeni kurulan ateist hükümet, Marian hac alanının kapatılmasını emretti. Bir zamanlar ışık ve dua yeri olan alan şimdi devlet gözetiminde sessiz ve yasaklı."
 pius.119.f: "'Hiç çan çalmadı. Hiç mum yanmadı. Kapılar gün doğmadan kilitlendi.'\n\nBir zamanlar binlerce kişiyi çeken mabet şimdi yalnız duruyor. Şapel kapısına bir bildiri çakıldı: 'Halk Meclisi emriyle, bu yapı önemsiz ilan edilmiştir.' Gözcüler, korumak için değil, engellemek için nöbette.\nHiçbir güç kullanılmadı. Hiçbir protestoya izin verilmedi. Değişiklik sessizce, bürokratik olarak geldi — bir yokluk, patlama değil. Ama ülke genelindeki evlerde, yaşlı eller titriyor. Büyükanneler tespihlerini saklıyor. Çocuklar neden hacıların artık şarkı söylemediğini soruyor.\nDin adamları sessiz. Parti bilimden, akıldan ve ilerlemeden söz ediyor. Ve kilitli kapıların arkasında bir soru yanıp sönüyor: Bu gerçekten gerekli miydi?"
 pius.119.g: "Artık hayallere anıt inşa etmiyoruz."
 pius.121.t: "Ne demek istiyor?"
 pius.121.d: "[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]’daki Marian görünüşü resmen olumlu bir işaret olarak tanındı. Ama hâlâ gerçek anlamı yorumlamaya açık."
 pius.121.f: "Parlak figür köylülere göründüğünden bu yana haftalar geçti, ama başka bir işaret gelmedi. Gökyüzünden ateş, bulutlardan ses yok. Sadece sakin gökyüzü ve merakın yankısı.\nAma halk konuşuyor — barış, şifa ve ulusun ruhunda bir şeylerin değiştiği hakkında. Hacılar coşkuyla değil, saygıyla geliyor. Din adamları yumuşak vaaz veriyor. Basın, bir kez olsun, alay etmeden rapor ediyor: Bu mucize ne anlama geliyor?"
 pius.121.g: "Halk için bir nimet."
 pius.121.h: "Din adamlarımıza ilahi bir işaret."
 pius.121.i: "Hükümetimizin meşruiyetine dair bir gösterge."
 pius.122.t: "[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] Mabedi"
 pius.122.d: "Marian görünüşünün gerçekleştiği yer artık tam olarak tanınan bir hac alanı haline geldi ve inananları yakın ve uzak yerlerden artan sayıda çekiyor."
 pius.122.f: "'Bir zamanlar sadece otlak olan yerde şimdi mumlar, güller ve binlerin sessiz adımları var.'\n\nYollar genişletildi. Tarlalar temizlendi. Çocukların bir zamanlar ışıkla kuşanmış bir Hanımefendi’den söz ettiği noktanın yakınında mütevazı bir şapel yükseliyor. Her gün hacılar geliyor: oğullarıyla çiftçiler, siyahlar giymiş dul kadınlar, izinli askerler, doğmamış çocukları için dua fısıldayan anneler.\nKilisenin siteye kutsallık tanıması sağlandı. Bir mabet inşa ediliyor. Kenarlarında pazarlar açılıyor; ekmek, madalya, tespih, şarap satılıyor. Bir zamanlar oturma odalarında kuşku uyandıran hikaye, artık ulusun kemiklerinde hissedilen bir varlık hâline geldi.\nVe vadide çanlar çalarken insan merak ediyor: Bu inanç yeniden mi doğdu — yoksa hâlâ gelmekte olan daha büyük bir şeyin tohumu mu?"
 pius.122.g: "Tamamen sana ait."