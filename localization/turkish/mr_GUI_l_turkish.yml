 MR_CHEMIST_SYNTHETIC_RUBBER_BUTTON: "Sentetik Kauçuk"
 MR_CHEMIST_SYNTHETIC_RUBBER_BUTTON_TT: "#T Sentetik Kauçuk#!\nKauçuk çok küçük bir iklim bölgesi ile sınırlıdır. Koloniler veya ithalat olmadan bu değerli hammaddeleri elde etmek neredeyse imkansızdır. Ama belki kimyanın imkanları, diğer yerlerde eksikliğini çektiğimiz şeyi telafi edebilir?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANIMAL_DOCUMENTATION_BUTTON: "Yerel Faunayı Belgele"
 MR_ANIMAL_DOCUMENTATION_BUTTON_TT: "#T Yerel Faunayı Belgele#!\nEn egzotik hayvanları araştırma hedeflerinizde, yerel fauna göz ardı edilmemelidir. Bir doğacı, çekirdek bölgelerde yaşayan hayvanları yakından inceleyebilir ve bilimsel makaleler yazabilir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ANIMAL_DOCUMENTATION_ACTIVE_TT: "#T Yerel Faunayı Belgele#!\n#p Doğacınız şu anda yerel vahşi yaşamı belgeliyor.#!\nEn egzotik hayvanları araştırma hedeflerinizde, yerel fauna göz ardı edilmemelidir. Bir doğacı, çekirdek bölgelerde yaşayan hayvanları yakından inceleyebilir ve bilimsel makaleler yazabilir."
