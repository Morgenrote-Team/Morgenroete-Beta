 MR_AERONAUTICAL_ENGINEER_GIANT_ZEPPELIN_BUTTON: "Dev Zeppelin"
 MR_AERONAUTICAL_ENGINEER_GIANT_ZEPPELIN_BUTTON_TT: "#T Dev Zeppelin#!\nHava gemisi seyahati zirveye ulaştı. Ülkemiz, dünyanın en büyük ve en etkileyici zeppelinlerinin doğduğu yer olarak kabul ediliyor. Artık dev bir hava gemisi inşa edip dünyayı gezme zamanı.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
