 MR_EXTINCTION_CONGRESS_BUTTON: "Yok Oluş Kongresi"
 MR_EXTINCTION_CONGRESS_BUTTON_TT: "#T Yok Oluş Kongresi#!\nDoğa tarihinin en kafa karıştırıcı gizemlerinden biri, dinozorların kayboluşudur. Paleontolojinin babası Georges Cuvier, Kretase döneminin sonunda bir kitlesel yok oluş olduğunu ve dinozorların da bu yok oluşta ortadan kalktığını keşfetti. Ama milyonlarca yıl dünyaya hükmetmiş bu dev kertenkeleler nasıl bir anda yok olmuş olabilir?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
