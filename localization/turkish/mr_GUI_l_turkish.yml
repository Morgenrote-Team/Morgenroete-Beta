 MR_SYSTEMIZE_FOSSILS_BUTTON_TT: "#T Fosilleri Sınıflandır#!\nSahada olmayan paleontologlar daha teorik çalışmalar yapabilir, fosilleri sistematize edebilir, hayvanların aile ağaçlarını yeniden oluşturabilir veya bitkilerin Dünya tarihi boyunca gelişimini izleyebilir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_NOT_HAS_RECENT_VOLCANO_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V Son Volkan Seferi#! etkisine sahip değil.#!"
 MR_PROMOTE_ENGINEER_TT: "#T Promote Engineer#!\n[Concept('concept_tesla_engineer','$concept_tesla_engineers$')] are versatile technicians in the military and in construction. They also speed up the construction of monuments by twice as much.\n\n#n Note:#! You can only have one Engineer at a time.[GetPlayer.GetCustom('mr_promote_has_engineer_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ASTRONOMER_TT: "#T Astronomu Terfi Ettir#!\n[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] yeni astronomik cisimler bulur, yıldız ve gezegenleri keşfeder veya astronomik kongrelere katılabilir.\n\n#n Not:#! Aynı anda yalnızca bir Astronom sahibi olabilirsiniz.[GetPlayer.GetCustom('mr_promote_has_astronomer_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_CHEMIST_TT: "#T Kimyageri Terfi Ettir#!\n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] yeni elementlerin keşfine ve kimya sanayinizin geliştirilmesine odaklanan bilim insanlarıdır.\n\n#n Not:#! Aynı anda yalnızca bir Kimyager sahibi olabilirsiniz.[GetPlayer.GetCustom('mr_promote_has_chemist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_GEOLOGIST_TT: "#T Jeoloğu Terfi Ettir#!\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] mineralleri, volkanları ve diğer jeolojik oluşumları inceler.\n\n#n Not:#! Aynı anda yalnızca bir Jeolog sahibi olabilirsiniz.[GetPlayer.GetCustom('mr_promote_has_geologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_NATURALIST_TT: "#T Doğacı Terfi Ettir#!\n[Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] evde veya yurtdışında hayvanları yakalayabilir, örnekler bulabilir veya botanik seferlerine liderlik edebilir.\n\n#n Not:#! Aynı anda yalnızca bir Doğacı sahibi olabilirsiniz.[GetPlayer.GetCustom('mr_promote_has_naturalist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_PALEONTOLOGIST_TT: "#T Paleontoloğu Terfi Ettir#!\n[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] jeolojik oluşumları fosiller ve dinozor kemikleri açısından inceleyebilir veya seferlerde bunları bulabilir.\n\n#n Not:#! Aynı anda yalnızca bir Paleontolog sahibi olabilirsiniz.[GetPlayer.GetCustom('mr_promote_has_paleontologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ARCHAEOLOGIST_TT: "#T Arkeoloğu Terfi Ettir#!\n[Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] eserler bulabilir, büyük keşifler yapabilir ve arkeoloji kongrelerine katılabilir.\n\n#n Not:#! Aynı anda yalnızca bir Arkeolog sahibi olabilirsiniz.[GetPlayer.GetCustom('mr_promote_has_archaeologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_ANTHROPOLOGIST_TT: "#T Antropoloğu Terfi Ettir#!\n[Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] insanın kökenini, insan evriminin başlangıcından Taş Devri’ne kadar inceler.\n\n#n Not:#! Aynı anda yalnızca bir Antropolog sahibi olabilirsiniz.[GetPlayer.GetCustom('mr_promote_has_anthropologist_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_COMPOSER_TT: "#T Besteciyi Terfi Ettir#!\n[Concept('concept_elgar_composer','$concept_elgar_composers$')] gelişen bir Müzik Kültürü yaratmak için gereklidir. Ülkenin daha fazla [concept_elgar_musical_tradition] oluşturmasına yardımcı olurlar.\n\n#n Not:#! Aynı anda yalnızca bir Besteci sahibi olabilirsiniz.[GetPlayer.GetCustom('mr_promote_has_composer_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_WRITER_TT: "#T Yazarı Terfi Ettir#!\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] hikâye anlatımında ustadır ve kitaplar ile diğer edebiyat eserleri üzerinde çalışır. Eserleriyle bir ülkenin [concept_manzoni_literary_tradition]’ını güçlendirir.\n\n#n Not:#! Aynı anda yalnızca bir ulusal Yazar ve 3 yerel Yazar sahibi olabilirsiniz.[GetPlayer.GetCustom('mr_promote_has_writers_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTE_PAINTER_TT: "#T Ressamı Terfi Ettir#!\n[Concept('concept_klimt_painter','$concept_klimt_painters$')] izlenimleri, manzaraları ve dünyanın harikalarını tuvale aktarır. Başyapıtlarıyla bir ülkenin [concept_klimt_painting_tradition]’ını güçlendirir.\n\n#n Not:#! Aynı anda yalnızca bir Ressam sahibi olabilirsiniz.[GetPlayer.GetCustom('mr_promote_has_painter_type')]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
