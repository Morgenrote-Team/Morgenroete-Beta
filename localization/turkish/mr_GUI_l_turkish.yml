 MR_RECALL_ANTHROPOLOGIST_BUTTON_TT: "#T Antropoloğu Geri Çağır#!\nBazen koşullar, bir mağara keşfini erken bitirmenizi gerektirebilir. [concept_lepsius_anthropologist] bu durumda süresi dolmadan önce kullanılabilir hale gelir, ancak herhangi bir kazanç getirmez.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ORIGIN_CONGRESS_BUTTON: "İnsan Kökeni Kongresi"
 MR_ORIGIN_CONGRESS_BUTTON_TT: "#T Modern İnsanların Kökeni Kongresi#!\nTarih öncesi insan kemiklerinin keşfiyle birlikte insanın kökeni sorusu da gündeme geldi. Darwin Afrika kökenini varsayarken, diğerleri birden fazla paralel gelişim öne sürdü. Yüzyılın başından itibaren baskın görüş, modern insanların Asya'da geliştiği yönündeydi.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
