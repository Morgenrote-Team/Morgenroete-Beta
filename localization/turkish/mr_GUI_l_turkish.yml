 MR_AERONAUTICAL_ENGINEER_GIANT_AIRPLANE_BUTTON: "Dev Uçak"
 MR_AERONAUTICAL_ENGINEER_GIANT_AIRPLANE_BUTTON_TT: "#T Dev Uçak#!\nGökyüzü son sınırdır. Bir zamanlar erken modern dönemdeki keşif çağı, artık gökyüzünün fethedilmesi dönemi oldu. Ancak İspanyolların gemilerine kıyasla, günümüzün göksel araçları küçük görünüyor. Okyanus devleri denizlerde yol alıyor, ancak gökyüzü bugüne kadar yalnızca küçük makinelerle sınırlı kaldı. Yüzlerce kişiyi taşıyabilecek dev bir uçak inşa etmek ütopik görünebilir. Fakat gelişmiş bir uçak endüstrisi ve doğru yöneticiye sahip güçlü bir havayolu bunu değiştirebilir...\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
