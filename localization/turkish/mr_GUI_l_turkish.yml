 MR_CHEMIST_CONGRESS_BUTTON_TT: "#T Kimyager Kongresi#!\nKarlsruhe Kongresi, modern kimya üzerine düzenlenen ilk uluslararası sempozyumdu. 3-5 Eylül 1860 tarihleri arasında Friedrich August Kekulé von Stradonitz, Charles Adolphe Wurtz ve Karl Weltzien girişimiyle Karlsruhe Ständehaus’ta gerçekleştirildi. Konular arasında kimyasal bileşiklerin adlandırılması ve formüllerle gösterimi ile kimyasal bileşiklerin atomik ve moleküler ağırlıkları yer aldı. Bu, dünyanın ilk uluslararası kimya konferansıydı.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
