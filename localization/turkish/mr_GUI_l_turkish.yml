 MR_PROMOTING_ENGINEER_TT: "#T Promote Engineer#!\n#p You are currently promoting the Engineer.#!\n[Concept('concept_tesla_engineer','$concept_tesla_engineers$')] are versatile technicians in the military and in construction. They also speed up the construction of monuments by twice as much."
 MR_PROMOTING_ASTRONOMER_TT: "#T Astronomu Terfi Ettir#!\n#p Şu anda Astronomu terfi ettiriyorsunuz.#!\n[Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] yeni astronomik cisimler bulur, yıldız ve gezegenleri keşfeder veya astronomik kongrelere katılabilir."
 MR_PROMOTING_NATURALIST_TT: "#T Doğacıyı Terfi Ettir#!\n#p Şu anda Doğacıyı terfi ettiriyorsunuz.#!\n[Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] evde veya yurtdışında hayvanları yakalayabilir, örnekler bulabilir veya botanik seferleri yönetebilir."
 MR_PROMOTING_PALEONTOLOGIST_TT: "#T Paleontoloğu Terfi Ettir#!\n#p Şu anda Paleontoloğu terfi ettiriyorsunuz.#!\n[Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] fosil ve dinozor kemiklerini inceleyebilir veya seferlerde bulabilir."
 MR_PROMOTING_ARCHAEOLOGIST_TT: "#T Arkeoloğu Terfi Ettir#!\n#p Şu anda Arkeoloğu terfi ettiriyorsunuz.#!\n[Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] eserler bulabilir, büyük keşifler yapabilir ve arkeoloji konferanslarına katılabilir.\n"
 MR_PROMOTING_ANTHROPOLOGIST_TT: "#T Antropoloğu Terfi Ettir#!\n#p Şu anda Antropoloğu terfi ettiriyorsunuz.#!\n[Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] insanın kökenini, insan evriminden Taş Devri'ne kadar inceler.#T Akademik Yatırım#!"
 MR_ACADEMICS_INVESTMENT_ACTIVE_TT: "#T Akademik Yatırım#!\n#p Şu anda Akademiye yatırım yapıyorsunuz.#!\nÜniversitelerimize yapılan genel hükümet yatırımı #O Akademik İlerleme#! değerini aylık #G +1#! artıracaktır. Fonlama 10 yıllık planlanmıştır."
 MR_PROMOTING_COMPOSER_TT: "#T Besteciyi Terfi Ettir#!\n#p Şu anda Besteciyi terfi ettiriyorsunuz.#!\n[Concept('concept_elgar_composer','$concept_elgar_composers$')] gelişmiş bir Müzik Kültürü yaratmak için gereklidir. Bir ülkenin daha fazla [concept_elgar_musical_tradition] yaratmasına yardımcı olurlar."
 MR_PROMOTING_WRITER_TT: "#T Yazarı Terfi Ettir#!\n#p Şu anda Yazarı terfi ettiriyorsunuz.#!\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] hikaye anlatımında ustadır ve kitaplar ile diğer edebi eserler üzerinde çalışır. Çalışmaları ile bir ülkenin [concept_manzoni_literary_tradition] değerini güçlendirir."
 MR_PROMOTING_PAINTER_TT: "#T Ressamı Terfi Ettir#!\n#p Şu anda Ressamı terfi ettiriyorsunuz.#!\n[Concept('concept_klimt_painter','$concept_klimt_painters$')] izlenimleri, manzaraları ve dünyanın harikalarını tuvale aktarır. Başyapıtları ile bir ülkenin [concept_klimt_painting_tradition] değerini güçlendirir."
 MR_AVANTGARDE_INTELLIGENTSIA_ACTIVE_TT: "#T Avangard Aydınlar#!\n#p Avangard Aydınlar şu anda etkin bilimsel odak noktanız.#!\nNet kültürel, sosyolojik ve antropolojik fikirleri olan bir akademisyen grubu günlük bilimsel yaşamı belirler. Buna karşılık, pratik alanlar daha az önemlidir.\n#R Not#!: Akademisyenlerin görünürlüğünü ayda bir puan artırır."
 MR_PRACTICAL_ACADEMIA_ACTIVE_TT: "#T Pratik Akademi#!\n#p Pratik Akademi şu anda etkin bilimsel odak noktanız.#!\nÜlkemizdeki bilim insanları, pratik günlük kullanıma uygun tüm alanlarda keşifler yapmak için durmaksızın çalışır. Bu, insanlığın genel ilerlemesine ve barışına hizmet eder.\n#p Not#!: Akademisyenlerin görünürlüğünü ayda bir puan artırır."
 MR_MILITARY_INDUSTRIAL_COMPLEX_ACTIVE_TT: "#T Askeri-Sanayi Kompleksi#!\n#p Askeri-Sanayi Kompleksi şu anda etkin bilimsel odak noktanız.#!\nÖzel sanayiciler ve ordu arasındaki iş birliği, küçük bir yolsuzluk ihtimali barındıran ama en iyi şekilde Askeri-Sanayi Kompleksi olarak tanımlanabilecek önemli bir bağlantılar ve tanıdıklık ağı geliştirilmesine yol açtı."
 MR_BUSINESS_AND_TYCOON_ACTIVE_TT: "#T İşletme Okulları & Kapitalist Zenginler#!\n#p İşletme Okulları & Kapitalist Zenginler şu anda etkin bilimsel odak noktanız.#!\nBağımsız birey ve refah dolu bir ilerleme dönemi, ticaret okulları, orta ölçekli şirketler ve büyük şirketlerin ülkenin bilimsel hayatında belirleyici etki sahibi olduğu bir zihniyeti ortaya çıkardı. Üniversiteler ise yeni teknolojilerle ülkenin elde ettiği refahı artırmak ve sosyal fikirleri ilerleme yoluyla yaymak için çalışır."
 MR_SEA_POWER_AND_MERCHANT_ACTIVE_TT: "#T Deniz Gücü & Ticaret Filosu#!\n#p Deniz Gücü & Ticaret Filosu şu anda etkin bilimsel odak noktanız.#!\nDonanma ve uluslararası ticaret, ülkemiz için çok önemli bir rol oynar. Gelişmiş üretim ve küresel ticaretle refahı artırmak, elde edilen kazanımları savunmak kadar önemlidir."
 MR_IVORY_TOWER_ACTIVE_TT: "#T Faydalı Fildişi Kule#!\n#p Faydalı Fildişi Kule şu anda etkin bilimsel odak noktanız.#!\nAkademi, ülkede böcek sayan, eski vazoları parlatan ve tuhaf şeylerle uğraşan eksantrik zihinler için bir sığınak olarak görülür. Ancak, fildişi kule izolasyonunun da avantajları vardır. Rahat bırakıldığında birçok profesör daha iyi çalışır.\n#p Not#!: Akademisyenlerin görünürlüğünü ayda bir puan artırır."
 MR_ON_PACIFIC_EXPEDITION_TT: "#T Pasifik Seferi#!\n#p Şu anda bir Pasifik Seferi devam ediyor.#!\nKuzey ve Güney kutuplarıyla birlikte, Pasifik Okyanusu da hâlâ sırlarını saklayan son alanlardan biridir. Birçok bilim dalından araştırmacılar, doğal, paleontolojik, astronomik ve okyanus bilimleri çalışmaları yapmak için bu görevle ilgilenir. Büyük güçler için, dünyanın sonundaki etkilerini göstermek prestijli bir fırsat olabilir."
 MR_ON_NORTHWEST_EXPEDITION_TT: "#T Kuzeybatı Geçidi#!\n#p Şu anda Kuzeybatı Geçidi’ni bulma seferi devam ediyor.#!\nGeçen yüzyılın başlarında cesur kaşifler Arktik Denizi’nin dış bölgelerini keşfetmişti. Eski bir hayal hâlâ gerçekleşmedi: Kanada ile Arktik Okyanusu arasındaki Kuzeybatı Geçidi’nin keşfi. Ama böyle tehlikeli bir sefere kim cesaret eder?"
 MR_ON_ARCTICA_EXPEDITION_TT: "#T Zeppelin Seferi#!\n#p Şu anda bir Zeppelin Seferi devam ediyor.#!\nAeroarctic, 'Hava Gemisi ile Arktik’in Keşfi Uluslararası Çalışma Derneği', hava gemilerini kutup araştırmalarında kullanmayı hedefleyen sivil bir bilimsel kuruluştur. Kuruluş, esas olarak aeronaut ve daha sonra derneğin genel sekreteri Walther Bruns’un girişimiyle kurulmuştur. 1924’te kurucu başkan Fridtjof Nansen olmuştur. Hazırlık çalışmalarının birkaç yıl sürmesinin ardından, 1931’de bir hava gemisi ile tamamen bilimsel bir kutup seferi gerçekleştirilmiştir. LZ 127 Graf Zeppelin’in Arktik uçuşu, uçulan kutup bölgelerinin coğrafi bilgisini önemli ölçüde artırmıştır. 1926’da Umberto Nobile 'Norge' hava gemisiyle Kuzey Kutbu’nu geçmiş ve daha sonra 'Italia' ile bir sefer yapmıştır."
 MR_IS_CIVIL_ENGINEER_TT: "#T [concept_tesla_civil_engineer]#!\nYour [concept_tesla_engineer] is focusing on [Concept('concept_tesla_civil_engineer','$concept_tesla_civil_engineering$')]."
 MR_IS_MECHANICAL_ENGINEER_TT: "#T [concept_tesla_mechanical_engineer]#!\nYour [concept_tesla_engineer] is focusing on [Concept('concept_tesla_mechanical_engineer','$concept_tesla_mechanical_engineering$')]."
 MR_IS_MILITARY_ENGINEER_TT: "#T [concept_tesla_military_engineer]#!\nYour [concept_tesla_engineer] is focusing on [Concept('concept_tesla_military_engineer','$concept_tesla_military_engineering$')]."
 MR_IS_ELECTRICAL_ENGINEER_TT: "#T [concept_tesla_electrical_engineer]#!\nYour [concept_tesla_engineer] is focusing on [Concept('concept_tesla_electrical_engineer','$concept_tesla_electrical_engineering$')]."
 MR_IS_AERONAUTICAL_ENGINEER_TT: "#T [concept_tesla_aeronautical_engineer]#!\nYour [concept_tesla_engineer] is focusing on [Concept('concept_tesla_aeronautical_engineer','$concept_tesla_aeronautical_engineering$')]."
 MR_SAFARI_ACTIVE_TT: "#T Heia Safari#!\n#p Doğacınız şu anda bir Safari’de.#!\nAfrika safarisinde, sürekli izleme ve tuzaklarla büyük oyun hayvanları yakalanabilir ve ardından bir [concept_dubois_zoo]’ya taşınabilir. Her safari sırasında yalnızca bir hayvan yakalanabilir. Hayvan türüne göre, tuzak mı kullanılacağı yoksa izini mi takip edeceğiniz değişir. Genellikle büyük ve yavaş hayvanlar daha fazla tuzak, hızlı hayvanlar daha fazla takip gerektirir."
 MR_ZOOLOGICAL_EXPEDITION_ACTIVE_TT: "#T Yerel Hayvanları Yakala#!\n#p Doğacınız şu anda yerel hayvanları yakalıyor.#!\nÜlkemizde sergilenecek ilginç türlere sahip hayvan yaşam alanları bulunuyor. Bir [concept_dubois_naturalist], bir yıl boyunca bir hayvanat bahçesi için [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] toplamak üzere ülke çapında seyahat eder."
 MR_CHEMIST_IMPROVE_FERTILIZER_BUTTON: "Gübreyi Geliştir"
