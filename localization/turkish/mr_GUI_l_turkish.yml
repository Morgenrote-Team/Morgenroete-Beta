 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESEARCH_STATION_BUTTON: "Geomanyetik Derneğe Katıl"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESEARCH_STATION_BUTTON_TT: "#T Geomanyetik Derneğe Katıl#!\nGöttingen’deki Manyetik Derneğe katılmak, yer manyetizması alanında araştırmamıza başlamak ve bir Geomanyetik Gözlemevi kurmak için zorunlu bir gerekliliktir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON: "Telgraf Ağı"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_BUTTON_TT: "#T Telgraf Ağı Kur#!\nTelgraf, ülke iletişimini devrim niteliğinde değiştirir ve telegraf ağı olan bölgelerde hizmetler ve altyapıyı geliştirir. Ülkeyi kablolamak, ülke büyüdükçe daha zor hale gelir. Telgraf direkleri yalnızca komşu devlette de bir telgraf direği varsa inşa edilebilir. Denizaşırı telgraf için hem elektrik telgrafı hem de elektromanyetizma gerekir, böylece denizaltı kabloları döşenebilir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_TELEGRAPH_RAILWAY_CAPITAL_TRIGGER_TT: "#default_text [GetPlayer.GetName] başkentte bir [GetBuildingType('building_railway').GetName]’a sahip.#!"
