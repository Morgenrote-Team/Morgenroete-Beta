 MR_CRETACEOUS_SCENERY_BUTTON_TT: "#T Kretase Dönemi Manzarası Kur#!\nKüresel jeolojik bilgi belirli bir seviyeye ulaştığında, paleontologlar üniversitelerde tarih öncesi manzaralarla bir oda kurabilir. Her üniversite için yalnızca bir manzara mümkündür. Bu durumda Paleontoloğunuzun Kretase Dönemi manzarası oluşturmasını sağlayın.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
