 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON: "Radyo Ağı"
 MR_ELECTRICAL_ENGINEER_RADIO_BUTTON_TT: "#T Radyo İstasyonu Ağı Kur#!\nKarmaşık kablolarla uğraşma zamanı sona erdi! Radyo teknolojisinin icadı ile mesajlar artık anten üzerinden gönderilebilir. Bu, haber alışverişini sağlamak ve radyo programları oluşturmak için imkan sağlar. Öncelikle, ülke genelinde bir radyo istasyonu ağı kurulmalıdır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON: "Demir Yatağı Ara"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_1_BUTTON_TT: "#T Demir Yatağı Ara#!\nJeofizik ve jeomanyetizmanın birçok pratik kullanımı vardır. Özellikle madencilik, olası yatakların keşfiyle fayda sağladı. Büyük şirketler, jeofizik bilgisi ile daha önce bilinmeyen demir, kurşun ve petrol yataklarını buldu. Doğru teknolojiler ve dünya manyetik alanının haritalanması ile mevcut teorik bilgilerin verimli kullanımı kolay olmalıdır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ELECTRICAL_ENGINEER_OBSERVATORY_WITH_MAGNETIC_OBSERVATORY_TRIGGER_TT: "#default_text [GetPlayer.GetName] bir #V Jeomanyetik Gözlemevi#! ile bir [GetBuildingType('building_verrier_observatory').GetName]’a sahip. [concept_production_method].#!"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_2_BUTTON: "Kurşun Yatağı Ara"
 MR_ELECTRICAL_ENGINEER_MAGNETIC_RESSOURCE_2_BUTTON_TT: "#T Kurşun Yatağı Ara#!\nJeofizik ve jeomanyetizmanın birçok pratik kullanımı vardır. Özellikle madencilik, olası yatakların keşfiyle fayda sağladı. Büyük şirketler, jeofizik bilgisi ile daha önce bilinmeyen demir, kurşun ve petrol yataklarını buldu. Doğru teknolojiler ve dünya manyetik alanının haritalanması ile mevcut teorik bilgilerin verimli kullanımı kolay olmalıdır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
