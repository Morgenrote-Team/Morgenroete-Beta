 MR_SPECIMEN_COLLECTION_BUTTON: "Numune Koleksiyonu Kur"
 MR_SPECIMEN_COLLECTION_BUTTON_TT: "#T Numune Koleksiyonu Kur#!\nTüm egzotik böceklerimizi, kelebeklerimizi ve diğer [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] toplamak, dünyaya ülkemizin ne kadar bilimsel olarak ileri olduğunu gösterecektir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
