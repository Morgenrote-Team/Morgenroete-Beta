 MR_NATURALIST_IMPROVE_FORESTRY_BUTTON_TT: "#T Ormancılığı Geliştir#!\nDoğacı, ülkenizdeki ormanları geliştirmek için yeteneğini kullanabilir; bu da bir [GetBuildingType('building_logging_camp').GetName]’nın gelişmesini sağlar.\n\nBina kazanacağı modifikasyonlar:\n$dubois_building_throughput_add_modifier_with_tooltip$\n$dubois_building_production_mult_modifier_with_tooltip$\n$dubois_building_goods_input_mult_modifier_with_tooltip$\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
