 MR_IMPRESSIONISM_BUTTON: "Empresyonizm"
 MR_IMPRESSIONISM_BUTTON_TT: "#T Empresyonizmi Seç#!\n[concept_elgar_impressionism], sanat tarihinde, bir sahnenin geçici anlarını atmosferik bir şekilde tasvir etmesiyle karakterize edilen bir üsluptur. 19. yüzyılın ikinci yarısında Fransa'daki bir resim hareketinden doğmuştur. Empresyonizm terimi, müzik, edebiyat, film ve fotoğrafın belirli üsluplarına da uygulanmıştır. Heinrich Hart gibi birçok Natüralist, müziği 'gerçek arayan Eylemcilik' ifadesi olarak reddetse de, Empresyonistler genellikle 'nesnesiz ileri düşlemeyi' ince derecelendirilmiş renkli akorlar olarak bir zevk olarak görmüşlerdir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_POWERFUL_LANDOWNERS_TRIGGER_TT: "#default_text [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] [concept_powerful].#!"
 MR_NOT_POWERFUL_INTELLIGENTSIA_TRIGGER_TT: "#default_text [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] [concept_powerful] değil.#!"
 MR_HAPPY_INTELLIGENTSIA_TRIGGER_TT: "#default_text [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] #V 5 veya daha yüksek#! bir [concept_approval]a sahip.#!"
 MR_EXPRESSIONISM_BUTTON: "Ekspresyonizm"
 MR_EXPRESSIONISM_BUTTON_TT: "#T Ekspresyonizmi Seç#!\n[concept_elgar_expressionism], sanat alanında bir üsluptur. Başlangıçları ve öncülleri 19. yüzyılın sonlarına dayanır. Empresyonizm, Sembolizm ve Fauvism gibi, Ekspresyonizm de Natüralizmin eğilimlerine karşı bir harekettir. Ekspresyonizmde ifade düzeyi, estetik, appellatif ve gerçekçi düzeyin önüne geçer. Sanatçı, izleyiciye kendi deneyimini göstermek ister. Dış görünüş algısını tasvir eden müzikal empresyonizmin aksine, ekspresyonist sanat hareketleri insan ruhunun duygularını formüle eder.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_POWERFUL_INTELLIGENTSIA_OR_TRADE_UNIONS_TRIGGER_TT: "#default_text Ya [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] ya da [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] [concept_powerful].#!"
 MR_NOT_POWERFUL_LANDOWNERS_TRIGGER_TT: "#default_text [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] [concept_powerful] değil.#!"
 MR_HAPPY_INTELLIGENTSIA_OR_TRADE_UNIONS_TRIGGER_TT: "#default_text Ya [GetPlayer.GetAdjective] [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] ya da [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] #V 5 veya daha yüksek#! bir [concept_approval]a sahip.#!"
 MR_ART_NOUVEAU_BUTTON: "Art Nouveau"
 MR_ART_NOUVEAU_BUTTON_TT: "#T Art Nouveau Seç#!\n[concept_elgar_art_nouveau], çoğunlukla İtalya ile bağlantılı olarak Stile liberty, 19. yüzyıl sonu ile 20. yüzyıl başı arasında bir sanat tarihi dönemidir. Art Nouveau'ya dahil edilebilecek akımlar: Reform tarzı (reform hareketinden sonra), Viyana Secession tarzı (Viyana Secession'dan sonra), Katalonya'da Modernisme, İsviçre'de Style Sapin ve ABD'de Tiffany Style. Fransızca, İngilizce ve İtalyanca'da baskın olan Art Nouveau ifadesine ek olarak, İngilizce'de Modern Style ve İtalyanca'da Stile Floreale de kullanılır. Zaman açısından Art Nouveau, fin de siècle dönemine aittir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
