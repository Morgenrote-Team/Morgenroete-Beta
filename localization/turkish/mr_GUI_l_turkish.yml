 MR_FOSSIL_IDENTIFICATION_BUTTON_TT: "#T Fosilleri Tanımla#!\nBir [concept_lepsius_anthropologist], bilinmeyen bir kemiği zamanla analiz edip belirli bir insan veya pre-insan türüne atayabilir. Aynı türe ait üç kemiği başarıyla atayabilirse, bu türü sistematikleştirebilir. Bir kemiği doğru tanımlama süresi, antropoloğun deneyimine bağlıdır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
