 MR_PAINTER_TRIP_BUTTON: "Eğitim Yolculuğu"
 MR_PAINTER_TRIP_BUTTON_TT: "#T Eğitim Yolculuğu#!\nBir [concept_klimt_painter_trip] sırasında, bir sanatçı daha önce bilmediği bir sanat tarzını öğrenerek yıllık [concept_klimt_painting_tradition] değerini artırabilir. Ayrıca, yabancı bir [concept_artists_center_of_arts] ziyaretinde bazı olumlu veya olumsuz karakter özellikleri edinebilir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACQUIRE_MASTERWORK_BUTTON: "Bir Başyapıt Satın Al"
 MR_ACQUIRE_MASTERWORK_BUTTON_TT: "#T Bir Başyapıt Satın Al#!\nHenüz sahip olmadığımız bir tarzda bir başyapıtı yurtdışından satın alabiliriz. Ancak bu, başka bir ülkenin en az bir tane bu tarz başyapıta sahip olmasını gerektirir. Ayrıca, satın almak için Ulusal Galeri'ye sahip olmamız gerekir. Satın alma maliyetlerine ek olarak, bazı tablolarımızı da takas etmemiz gerekmektedir, bu da bize #R 100#! [concept_klimt_painting_tradition] maliyet getirir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_VERNISSAGE_BUTTON: "Vernisaj"
 MR_VERNISSAGE_BUTTON_TT: "#T Vernisaj#!\nBir vernisajda, bir [concept_klimt_painter] bazı tablolarını sergileyebilir ve karşılığında itibar ve [concept_klimt_painting_tradition] kazanabilir. Bir vernisaj, bir ressamın hayatında sadece bir kez mümkündür.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_INDEPENDENT_PAINTER: "Bağımsız Ressamlar"
 MR_INDEPENDENT_PAINTER_EXPERIENCE_TOOLTIP: "[Character.GetFullName] itibarı [FixedPointToFloat(Character.MakeScope.GetVariable('klimt_painter_experience').GetValue)|+0] seviyesindedir."
