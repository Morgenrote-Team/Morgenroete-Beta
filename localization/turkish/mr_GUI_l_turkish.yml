 MR_BAN_ANIMAL_EXPORT_BUTTON: "Hayvan İhracatını Yasakla"
 MR_BAN_ANIMAL_EXPORT_BUTTON_TT: "#T Hayvan İhracatını Yasakla#!\nHayvan ihracatını yasaklayarak, prensip olarak hayvanlarımızı yurt dışına satmaya hazır olmadığımızı açıkça belirtiyoruz. Diğer ülkeler sorulardan kaçınacaktır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
