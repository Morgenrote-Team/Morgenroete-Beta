 MR_INVITE_INDEPENDENT_PAINTER: "Ressamı Davet Et"
 MR_INVITE_INDEPENDENT_PAINTER_TT: "#T Bu Ressamı Davet Et#!\nBir [concept_klimt_painter] davet etmek, ülkeniz yeterince iyi bir ressam sağlayamıyorsa veya mevcut ressamınız sizi tatmin etmiyorsa yeni bir Ressam kazanmanın yoludur.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).AddScope('chosen_painter', Scope.GetCharacter.MakeScope ).End)]"
