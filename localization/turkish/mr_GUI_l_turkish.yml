 MR_ACADEMICS_PROMOTE_UNIVERSITY_INVESTMENT_TT: "#T Akademik Yatırım#!\nHükümetin üniversitelere genel yatırımı #O Akademik İlerlemeyi#! ayda #G +1#! artıracak. Fonlama 10 yıl boyunca devam edecek.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_PROMOTE_UNIVERSITY_INVESTMENT_TRIGGER_TT: "[GetPlayer.GetAdjective] zaten akademiye yatırım yapmıyor."
 MR_ACADEMICS_AVANTGARDE_TT: "#T Avantgarde İntelijansiya#!\nAçık kültürel, sosyolojik ve antropolojik fikirlere sahip bir akademisyen grubu günlük bilimsel hayatı belirler. Pratik alanlar ise daha az önemlidir.\n#R Not#!: Akademisyenlerin görünürlüğünü ayda bir puan artırır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_AVANTAGRDE_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] henüz #b Avantgarde İntelijansiya#! Odak noktasına sahip değil ve yakın zamanda değiştirmedi.#!"
 MR_ACADEMICS_AVANTGARDE_BUILDING_REQUIREMENT_TT: "#default_text En az #p %50#! [GetPlayer.GetAdjective] Üniversiteleri [concept_pm_academics_university_humanities] odaklı.#!"
 MR_ACADEMICS_PRACTICAL_TT: "#T Pratik Akademi#!\nÜlkemizdeki bilim insanları pratik günlük kullanıma uygun her alanda keşifler yapmaya çalışır. Bu, genel ilerlemeyi ve insanlığın huzurunu sağlamayı amaçlar.\n#R Not#!: Akademisyenlerin görünürlüğünü ayda bir puan artırır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_PRACTICAL_OR_CONFUSION_TT: "#S [GetPlayer.GetName] henüz #b Pratik Akademi#! Odak noktasına sahip değil ve yakın zamanda değiştirmedi.#!"
 MR_ACADEMICS_PRACTICAL_BUILDING_REQUIREMENT_TT: "#default_text En az #p %50#! [GetPlayer.GetAdjective] Üniversiteleri [concept_pm_academics_university_natural_history] odaklı.#!"
 MR_ACADEMICS_MILITARY_TT: "#T Askeri-Sanayi Kompleksi#!\nÖzel sanayiciler ve ordu arasındaki işbirliği, bir dereceye kadar yolsuzluk barındıran, ancak en iyi Askeri-Sanayi Kompleksi olarak tanımlanabilecek bir bağlantılar ve kişisel ilişkiler ağı oluşturmuştur.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_MILITARY_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] henüz #b Askeri-Sanayi Kompleksi#! Odak noktasına sahip değil ve yakın zamanda değiştirmedi.#!"
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_TT: "#default_text En az #p %50#! [GetPlayer.GetAdjective] Üniversiteleri [concept_pm_academics_university_mathematics] odaklı.#!"
 MR_ACADEMICS_MILITARY_BUILDING_REQUIREMENT_2_TT: "#default_text [GetPlayer.GetName] has at least one [GetBuildingType('building_automotive_industry').GetName], [GetBuildingType('building_arms_industry').GetName], [GetBuildingType('building_munition_plant').GetName] or [GetBuildingType('building_artillery_foundry').GetName] of level #p 5#! or higher.#!"
 MR_ACADEMICS_MILITARY_ARMY_SIZE_REQUIREMENT_TT: "#default_text [GetPlayer.GetAdjective] Ordusu en az #b %50#! veya daha büyük.#!"
 MR_ACADEMICS_BUSINESS_TT: "#T İş Okulları ve Sermaye Kapitalizmi#!\nBağımsız birey ve ilerleme dönemindeki refah, ticaret okullarının, orta ölçekli şirketlerin ve büyük şirketlerin ülke bilimini belirleyici şekilde etkilemesine yol açtı. Üniversiteler ise yeni teknolojilerle ulusal refahı artırmaya ve toplumsal fikirleri ilerleme yoluyla yaymaya çalışıyor.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_BUSINESS_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] henüz #b İş Okulları ve Sermaye Kapitalizmi#! Odak noktasına sahip değil ve yakın zamanda değiştirmedi.#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_TT: "#default_text En az #p %35#! [GetPlayer.GetAdjective] Üniversiteleri [concept_pm_academics_university_mathematics] odaklı.#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_2_TT: "#default_text En az #p %35#! [GetPlayer.GetAdjective] Üniversiteleri [concept_pm_academics_university_humanities] odaklı.#!"
 MR_ACADEMICS_BUSINESS_BUILDING_REQUIREMENT_3_TT: "#default_text [GetPlayer.GetName] has either [GetBuildingType('building_textile_mill').GetName] or [GetBuildingType('building_furniture_manufactory').GetName] of at least level #p 15#! or either [GetBuildingType('building_tooling_workshop').GetName] or [GetBuildingType('building_steel_mill').GetName] of at least level #p 10#! or either [GetBuildingType('building_motor_industry').GetName] or [GetBuildingType('building_electrics_industry').GetName] of at least level #p 5#!.#!"
 MR_ACADEMICS_SEAPOWER_TT: "#T Deniz Gücü ve Ticaret Filosu#!\nDonanma ve uluslararası ticaret ülkemiz için büyük önem taşır. Ürünlerimizin ileri üretim ve küresel ticaret yoluyla refahını artırmak, kazanılmış olanı savunmak kadar önemlidir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_SEAPOWER_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] henüz #b Deniz Gücü ve Ticaret Filosu#! Odak noktasına sahip değil ve yakın zamanda değiştirmedi.#!"
 MR_ACADEMICS_SEAPOWER_BUILDING_REQUIREMENT_TT: "#default_text En az #p %35#! [GetPlayer.GetAdjective] Üniversiteleri [concept_pm_academics_university_mathematics] odaklı.#!"
 MR_ACADEMICS_SEAPOWER_BUILDING_REQUIREMENT_2_TT: "#default_text En az #p %35#! [GetPlayer.GetAdjective] Üniversiteleri [concept_pm_academics_university_natural_history] odaklı.#!"
 MR_ACADEMICS_SEAPOWER_NAVY_SIZE_REQUIREMENT_TT: "#default_text [GetPlayer.GetAdjective] Donanması en az #b %50#! veya daha büyük.#!"
 MR_ACADEMICS_USEFUL_TT: "#T Faydalı Fildişi Kulesi#!\nÜlkemizde akademi, böcek sayan, eski vazoları cilalayan ve tuhaf şeylerle uğraşan eksantrik zihinler için bir sığınak olarak görülür. Ancak fildişi kulesinin topluma uzaklığı da avantaj sağlar. Rahatsız edilmeden birçok profesör daha iyi çalışır.\n#R Not#!: Akademisyenlerin görünürlüğünü ayda bir puan artırır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ACADEMICS_NO_USEFUL_OR_CONFUSION_TT: "#default_text [GetPlayer.GetName] henüz #b Faydalı Fildişi Kulesi#! Odak noktasına sahip değil ve yakın zamanda değiştirmedi.#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_TT: "#default_text En az #p %35#! [GetPlayer.GetAdjective] Üniversiteleri [concept_pm_academics_university_humanities] odaklı.#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_2_TT: "#default_text En az #p %35#! [GetPlayer.GetAdjective] Üniversiteleri [concept_pm_academics_university_natural_history] odaklı.#!"
 MR_ACADEMICS_USEFUL_BUILDING_REQUIREMENT_3_TT: "#default_text [GetPlayer.GetName] bir [GetBuildingType('building_lepsius_archaeological_museum').GetName], bir [GetBuildingType('building_verrier_observatory').GetName] veya bir [GetBuildingType('building_dubois_zoo').GetName] sahip.#!"
 MR_MOUNTAIN_EXPEDITION_TT: "#T Dağ Seferi#!\n1786’da Mont Blanc tırmanışıyla, dünyanın en yüksek zirvelerini fethetme çağının başladığı bir dönem açıldı; bu trend 19. ve 20. yüzyıllarda daha da arttı. Henüz tırmanılmamış bir dağ silsilesine sahipsek, fethetmeyi uygun yeteneklere sahip bir generale devredebiliriz.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MOUNTAIN_UNCONQUERED_SUMMIT_TRIGGER_TT: "#default_text [GetPlayer.GetName] en az bir #V Tırmanılmamış Zirve#! veya bir ulusun sahip olduğu bir #V Dağcılık Lisansı#!na sahip.#!"
 MR_MOUNTAIN_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] yakın zamanda yeni bir dağa başarıyla tırmanmadı veya bir Dağ Seferinde başarısız oldu.#!"
 MR_ZEPPELIN_EXPEDITION_TT: "#T Zeppelin Seferi#!\nAeroarctic, 'Hava Gemisi ile Kutup Araştırmaları için Uluslararası Çalışma Derneği', hava gemilerini kutup araştırmalarında kullanmayı hedefleyen hükümet dışı bir bilimsel dernekti. Dernek, özellikle aeronot ve daha sonra genel sekreter olan Walther Bruns’un girişimiyle kuruldu. 1924’teki kurucu başkan Fridtjof Nansen’di. Birkaç yıl hazırlık çalışmasının ardından, 1931’de şirket, bir hava gemisi ile tamamen bilimsel bir kutup seferini başarıyla gerçekleştirdi. LZ 127 Graf Zeppelin’in Arktik uçuşu, uçulan kutup bölgelerinin coğrafi bilgisini önemli ölçüde genişletti. 1926’da Umberto Nobile, 'Norge' hava gemisi ile Kuzey Kutbu’nu geçti ve daha sonra 'Italia' ile bir sefer düzenledi.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ZEPPELIN_OBSERVATORY_TRIGGER_TT: "#default_text [GetPlayer.GetName] bir [GetBuildingType('building_verrier_observatory').GetName] ve #V Hava Durumu İstasyonu Üretim Yöntemi#! sahip.#!"
 MR_ZEPPELIN_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] ya sahip ya da bir [concept_curtiss_airspace_convention] ile erişime sahip şu eyaletlerden birine: #V Grönland#!, #V Kuzey Norveç#!, #V Alaska#!, #V Nunavut#! veya #V Nenetsya#!.#!"
 MR_ZEPPELIN_RECENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] bir #V Zeppelin Seferi#!nde değil veya #V yakın zamanda bir sefer yapmadı#!.#!"
 MR_PACIFIC_EXPEDITION_TT: "#T Pasifik Seferi#!\nKutup bölgeleriyle birlikte, Pasifik Okyanusu da hâlâ sırlar barındıran son bölgelerden biridir. Birçok bilim dalından araştırmacılar, doğal bilim, paleontoloji, astronomi ve okyanusografik çalışmalar için bir araştırma görevine ilgi duymaktadır. Büyük güçler için ise, dünyanın sonundaki etkilerini göstermek için prestijli bir fırsat olabilir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PACIFIC_RANK_TRIGGER_TT: "#default_text [GetPlayer.GetName] ya #V Büyük Güç#! ya da #V Büyük Devlet#!.#!"
