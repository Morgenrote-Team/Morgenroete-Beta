 MR_EXTEND_ZOO_SMALL_2_SPECIAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V 2 Afrika#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (şu anda [GetPlayer.MakeScope.Var('dubois_zoo_animal_africa').GetValue|0+]), #V 2 Asya#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (şu anda [GetPlayer.MakeScope.Var('dubois_zoo_animal_asia').GetValue|0+]) veya #V 2 Okyanusya#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (şu anda [GetPlayer.MakeScope.Var('dubois_zoo_animal_australia').GetValue|0+])."
 MR_EXTEND_ZOO_SMALL_CURRENT_EXPANSION_TRIGGER_TT: "#default_text [GetPlayer.GetName] şu anda [concept_dubois_zoo]'yu #V genişletmiyor#!.#!"
 MR_EXTEND_ZOO_MEDIUM_BUTTON: "[concept_dubois_zoo]'yu genişlet (orta)"
 MR_EXTEND_ZOO_MEDIUM_BUTTON_TT: "#T Hayvanat Bahçesini Orta Boyuta Genişlet#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')], herkesin mutluluğudur: insanlar hayvanat bahçesinde dolaşır, bilim insanları zoolojik çalışmalarına devam edebilir ve en fazla yabancı faunayı gösterebilenler uluslararası prestij kazanır. Her genişleme ile bir ulusun prestiji artar. Bazı genişleme aşamaları sadece çok sayıda hayvan toplamakla değil, aynı zamanda dünyanın farklı bölgelerinden de hayvan toplamakla mümkündür.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
