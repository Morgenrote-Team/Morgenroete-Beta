 MR_GERMAN_MUSIC_ASSOCIATION_BUTTON_TT: "#T Alman Genel Müzik Derneğini Kur#!\nAllgemeiner Deutscher Musikverein (ADMV, 'Alman Genel Müzik Derneği'), 1861’de Franz Liszt ve Franz Brendel tarafından kurulan ve Yeni Alman Müzik Okulu ideallerini temsil eden bir müzik derneğidir. ADMV, hem müzik performansı hem de pratik destek sunmayı amaçladı. Sanatsal amaçlar çerçevesinde, önemli, nadiren çalınan ve özellikle yeni müzik eserlerinin her türden yıllık Tonkünstler-Versammlungen etkinlikleri düzenlenecekti. Ayrıca yalnızca nadiren veya hiç çalınmamış, fakat önemi nedeniyle ilgi çekici eski eserler de seslendirilecekti.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
