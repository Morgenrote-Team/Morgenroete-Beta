 MR_VISIT_GALLERY_BUTTON: "Galeriyi Ziyaret Et"
 MR_VISIT_GALLERY_BUTTON_TT: "#T Galeriyi Ziyaret Et#!\nBoyama geleneğimizin ve sanat eserlerimizin toplam değerini galeride görebilirsiniz.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
