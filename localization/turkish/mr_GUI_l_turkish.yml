 MR_RED_CROSS_BUTTON: "[concept_panum_red_cross] Kur"
 MR_RED_CROSS_BUTTON_TT: "#T [concept_panum_red_cross] Kur#!\nUluslararası Kızılhaç, ilk ulusüstü kuruluşlardan biridir. Bu kuruluşun kurulması, uluslararası hukuk yolunda önemli bir adımdır. İnsan hayatını ve sağlığını korumak, tüm insanlara saygıyı sağlamak ve insan acısını önlemek ve hafifletmek amacıyla kurulmuştur.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_IRC_INFAMY_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V 35 [concept_infamy]#!’dan az sahip.#!"
 MR_JOIN_RED_CROSS_BUTTON: "[concept_panum_red_cross]’a Katıl"
 MR_JOIN_RED_CROSS_BUTTON_TT: "#T [concept_panum_red_cross]’a Katıl#!\nÜlkemiz Uluslararası Kızılhaç’a katılabilir ve uluslararası anlaşmalar yoluyla itibarını artırabilir - acımasız savaşların bedeliyle.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_FIRST_CONVENTION_BUTTON: "Birinci Sözleşmeyi İmzala"
 MR_SIGN_FIRST_CONVENTION_BUTTON_TT: "#T Birinci Sözleşmeyi İmzala#!\nBirinci Cenevre Sözleşmesi, Resmen Sahadaki Ordulardaki Yaralıların Durumunun İyileştirilmesi Sözleşmesi olarak bilinir ve 'silahlı çatışmalarda mağdurların korunması için uluslararası hukukun temelini' belirler. En önemli düzenlemelerinden biri, yaralı ve hasta askerlerin tedavi merkezlerinin ele geçirilmesi ve yok edilmesinden muafiyet ve tüm savaşçıların tarafsız şekilde kabul edilip tedavi edilmesidir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_SECOND_CONVENTION_BUTTON: "İkinci Sözleşmeyi İmzala"
 MR_SIGN_SECOND_CONVENTION_BUTTON_TT: "#T İkinci Sözleşmeyi İmzala#!\n1899 ve 1907 Lahey Konvansiyonları, Hollanda’daki Lahey’de düzenlenen iki uluslararası barış konferansında müzakere edilen bir dizi uluslararası antlaşma ve deklarasyondur. Her iki konferans da silahsızlanma, savaş yasaları ve savaş suçlarıyla ilgili müzakereleri içeriyordu. 1907 konferansında deniz savaşı üzerinde daha fazla odaklanıldı.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SIGN_THIRD_CONVENTION_BUTTON: "Üçüncü Sözleşmeyi İmzala"
 MR_SIGN_THIRD_CONVENTION_BUTTON_TT: "#T Üçüncü Sözleşmeyi İmzala#!\nBoğucu, zehirli veya diğer gazların ve bakteriyolojik savaş yöntemlerinin savaşta kullanımının yasaklanması Protokolü, genellikle Cenevre Protokolü olarak adlandırılır, uluslararası silahlı çatışmalarda kimyasal ve biyolojik silahların kullanımını yasaklayan bir antlaşmadır. 17 Haziran 1925’te Cenevre’de imzalanmıştır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LEAVE_RED_CROSS_BUTTON: "Kızılhaç’tan Ayrıl"
 MR_LEAVE_RED_CROSS_BUTTON_TT: "#T Kızılhaç’tan Ayrıl#!\nHomo homini lupus.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_INTRODUCE_MEDICAL_TECHNIQUES_LEVEL_BUTTON_TT: "#T Tıbbi Teknikleri Tanıt#!\nDoktor, modern ekipman, yöntem ve yeni tedavileri ülke genelindeki tıbbi kurumlara tanıtır. Bazen doktorlar olağanüstü yeni icatlar geliştirebilir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PHYSICIAN_INTRODUCE_MEDICAL_TECHNIQUES_LEVEL_BUTTON_ACTIVE_TT: "#T Tıbbi Teknikleri Tanıtıyor#!\nDoktorunuz şu anda modern ekipman, yöntem ve yeni tedavileri ülke genelindeki tıbbi kurumlara tanıtıyor. Bazen doktorlar olağanüstü yeni icatlar geliştirebilir."
