 MR_AERONAUTICAL_ENGINEER_SPEED_AIRPLANE_BUTTON: "Yüksek Hızlı Uçak"
 MR_AERONAUTICAL_ENGINEER_SPEED_AIRPLANE_BUTTON_TT: "#T Yüksek Hızlı Uçak#!\nHavacılık mühendisimiz mevcut rekoru kıracak yüksek hızlı bir uçak inşa edebilir. Dünyanın en hızlı uçağını yapmak için yalnızca bir mühendis değil, aynı zamanda uçağı uçuracak bir pilota da ihtiyaç vardır. Başarı, hem mühendis hem de pilotun deneyimine ve ileri teknolojilere bağlıdır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
