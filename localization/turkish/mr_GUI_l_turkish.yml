 MR_EXTEND_ZOO_SMALL_5_SPECIAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V 5 Afrika#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (şu anda [GetPlayer.MakeScope.Var('dubois_zoo_animal_africa').GetValue|0+]), #V 5 Asya#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (şu anda [GetPlayer.MakeScope.Var('dubois_zoo_animal_asia').GetValue|0+]), #V 5 Okyanusya#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (şu anda [GetPlayer.MakeScope.Var('dubois_zoo_animal_australia').GetValue|0+]) veya #V 5 Güney Amerika#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] (şu anda [GetPlayer.MakeScope.Var('dubois_zoo_animal_south_america').GetValue|0+]).#!"
 MR_EXTEND_ZOO_LARGE_BUTTON: "[concept_dubois_zoo]'yu genişlet (büyük)"
 MR_EXTEND_ZOO_LARGE_BUTTON_TT: "#T Hayvanat Bahçesini Büyük Boyuta Genişlet#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')], herkesin mutluluğudur: insanlar hayvanat bahçesinde dolaşır, bilim insanları zoolojik çalışmalarına devam edebilir ve en fazla yabancı faunayı gösterebilenler uluslararası prestij kazanır. Her genişleme ile bir ulusun prestiji artar. Bazı genişleme aşamaları sadece çok sayıda hayvan toplamakla değil, aynı zamanda dünyanın farklı bölgelerinden de hayvan toplamakla mümkündür.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_30_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] toplam #V 30#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] sahip. Şu anda [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+].#!"
 MR_EXTEND_ZOO_FAMOUS_BUTTON: "[concept_dubois_zoo]'yu genişlet (ünlü)"
 MR_EXTEND_ZOO_FAMOUS_BUTTON_TT: "#T Hayvanat Bahçesini Ünlü Boyuta Genişlet#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')], herkesin mutluluğudur: insanlar hayvanat bahçesinde dolaşır, bilim insanları zoolojik çalışmalarına devam edebilir ve en fazla yabancı faunayı gösterebilenler uluslararası prestij kazanır. Her genişleme ile bir ulusun prestiji artar. Bazı genişleme aşamaları sadece çok sayıda hayvan toplamakla değil, aynı zamanda dünyanın farklı bölgelerinden de hayvan toplamakla mümkündür.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXTEND_ZOO_SMALL_40_TOTAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] toplam #V 40#! [Concept('concept_dubois_zoo_animal','$concept_dubois_zoo_animals$')] sahip. Şu anda [GetPlayer.MakeScope.Var('dubois_zoo_animal_total').GetValue|0+]#!"
 MR_SPECIMEN_GARDEN_BUTTON: "Botanik Bahçesi Kur"
 MR_SPECIMEN_GARDEN_BUTTON_TT: "#T Botanik Bahçesi Kur#!\nHayvanat bahçenizdeki bir Botanik Bahçesi, prestiji daha da artıracaktır. [concept_dubois_naturalist]'imiz tarafından toplanan tüm egzotik bitkileri burada dikebiliriz.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
