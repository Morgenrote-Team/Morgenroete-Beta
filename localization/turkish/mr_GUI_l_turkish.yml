 MR_UPPER_EGYPT_EXPEDITION_TT: "#T Krallar Vadisi'ne Bir Keşif Gönder#!\nEski başkent Teba ve Krallar Vadisi ile Yukarı Mısır, Mısırbilim’in merkezi olarak kabul edilir. Bu bölge için bir kazı izni almalıyız ve Mısır hazinelerini aramalıyız.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V Lepsius Rosellini’ye bir mektup yazdı#!, bu Mısır’da Arkeolojiyi başlattı.#!"
 MR_UPPER_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] şu anda Yukarı Mısır’a bir [concept_lepsius_expedition] finanse etmiyor.#!"
 MR_UPPER_EGYPT_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] ya #V Yukarı Mısır Eyaleti’ne sahip#! ya da sahibinden bir [concept_lepsius_excavation_licence]e sahip.#!"
 MR_LOWER_EGYPT_EXPEDITION_TT: "#T Piramitlere Bir Keşif Gönder#!\nTarihin başlangıcından beri, Mısır piramitleri insanlığı büyülemiştir. Söylenene göre, Aşağı Mısır’da kaybolmuş diğer mezarlar, tapınaklar ve hatta şehirler yeniden keşfedilmeyi bekliyor.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_LOWER_EGYPT_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] şu anda Aşağı Mısır’a bir [concept_lepsius_expedition] finanse etmiyor.#!"
 MR_LOWER_EGYPT_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] ya #V Aşağı Mısır Eyaleti’ne sahip#! ya da sahibinden bir [concept_lepsius_excavation_licence]e sahip.#!"
 MR_BABYLONIA_EXPEDITION_TT: "#T Medeniyetin Beşiği’ne Bir Keşif Gönder#!\nMezopotamya’nın güneyinde yer alan Babil, bir zamanlar güçlü Babil şehrine adını borçludur. Bölge, değerli arkeolojik eserlerin tekrar tekrar keşfedildiği 'medeniyetin beşiği' olarak kabul edilir. Bu eserler kesinlikle bir müzede olmalıdır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MESOPOTAMIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V Akadca dili çözüldü#!, bu da Mezopotamya’da Arkeolojiyi mümkün kıldı.#!"
 MR_BABYLONIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] şu anda Babil’e bir [concept_lepsius_expedition] finanse etmiyor.#!"
 MR_BABYLONIA_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] ya #V Bağdat Eyaleti’ne sahip#! ya da sahibinden bir [concept_lepsius_excavation_licence]e sahip.#!"
 MR_ASSYRIA_EXPEDITION_TT: "#T Asur’un Bahçelerine Bir Keşif Gönder#!\nAsur, Mezopotamya’nın kuzeyini ve önemli iki şehir olan Asur ve Ninova’yı ifade eder. Ülke hakkındaki sınırlı bilgi hâlâ kaynağı olarak İncil’e dayansa da – belki de daha güvenilir tarihsel kanıtlar vardır?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASSYRIA_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] şu anda Asur’a bir [concept_lepsius_expedition] finanse etmiyor.#!"
 MR_ASSYRIA_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] ya #V Musul Eyaleti’ne sahip#! ya da sahibinden bir [concept_lepsius_excavation_licence]e sahip.#!"
 MR_ARGOLIS_EXPEDITION_TT: "#T Agamemnon’un Şehrine Bir Keşif Gönder#!\nTruva’nın keşfinden sonra, şüpheci bilim insanları bile eski Yunan mitlerinin sadece masal olmadığını fark ediyor. Tunç Çağı şehirlerinin kalıntılarının Argolis’te yattığı söyleniyor, en bilineni Mikene’dir. Bunu kendimiz görmeliyiz.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GREECE_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text #V Schliemann Truva’yı keşfetti#!, bu da Yunanistan’da Arkeolojiyi mümkün kıldı.#!"
 MR_ARGOLIS_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] şu anda Argolis’e bir [concept_lepsius_expedition] finanse etmiyor.#!"
 MR_ARGOLIS_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] ya #V Peloponez Eyaleti’ne sahip#! ya da sahibinden bir [concept_lepsius_excavation_licence]e sahip.#!"
 MR_CRETE_EXPEDITION_TT: "#T Girit Saraylarına Bir Keşif Gönder#!\nEfsanevi Kral Minos’un bir zamanlar Girit’i yönettiği söylenir. Truva ve Mikene’ye benzer şekilde, bu hikâyede de doğruluk payı olabilir: Efsanevi Minos kültürüne ait eserler adada giderek daha fazla bulunuyor. Ülkemiz de birkaçını temin etmelidir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CRETE_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] şu anda Girit’e bir [concept_lepsius_expedition] finanse etmiyor.#!"
 MR_CRETE_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] ya #V Girit Eyaleti’ne sahip#! ya da sahibinden bir [concept_lepsius_excavation_licence]e sahip.#!"
 MR_YUCATAN_EXPEDITION_TT: "#T Maya’nın Kayıp Şehirlerine Bir Keşif Gönder#!\nOrmanın ortasında bilinmeyen ve devasa şehirlerle ilgili raporlar arttı. Daha fazla araştırmalı ve Yucatán’a bir arkeolojik keşif göndermeliyiz.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_YUCATAN_EXPEDITION_DISCOVERED_TRIGGER_TT: "#default_text #V Stephens & Catherwood bir Keşif gerçekleştirdi#!, bu da Yucatán’da Arkeolojiyi mümkün kıldı.#!"
 MR_YUCATAN_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] şu anda Yucatán’a bir [concept_lepsius_expedition] finanse etmiyor.#!"
 MR_YUCATAN_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] ya #V Yucatán Eyaleti’ne sahip#! ya da sahibinden bir [concept_lepsius_excavation_licence]e sahip.#!"
 MR_PERU_EXPEDITION_TT: "#T İnka’ların Gizli Mirasını Araştırmak İçin Bir Keşif Gönder#!\nPilotlar, Peru üzerinde uçuşlarında And Dağları’nda tuhaf kaleler ve surlarla çevrili yapılar gördüklerini rapor ediyorlar. Belki İspanyollar İnka kültürünü tamamen yok etmedi? Yerli direnişinin bazı şehirleri günümüze kadar bulunamadı.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PERU_EXPEDITION_DISCOVERED_TRIGGER_TT: "#default_text #V Bingham Machu Picchu’yu keşfetti#!, bu da Peru’da Arkeolojiyi mümkün kıldı.#!"
 MR_PERU_EXPEDITION_POSSIBLE_TRIGGER_TT: "#default_text [GetPlayer.GetName] şu anda Peru’ya bir [concept_lepsius_expedition] finanse etmiyor.#!"
 MR_PERU_EXPEDITION_ACCESS_TRIGGER_TT: "#default_text [GetPlayer.GetName] ya #V $STATE_ICA$ Eyaleti’ne sahip#! ya da sahibinden bir [concept_lepsius_excavation_licence]e sahip.#!"
 MR_EXODUS_CONGRESS_BUTTON: "Çıkış Kongresi"
 MR_EXODUS_CONGRESS_BUTTON_TT: "#T Çıkış Kongresi#!\nMısır ve Levant üzerine artan araştırmalarla birlikte, Kutsal Kitap’taki olayların tarihsel gerçekliği sorusu tekrar gündeme gelmiştir. Özellikle Çıkış’ın, yani İbranilerin Mısır’dan ayrılmasının anılmaması, Musa’nın Beş Kitabı’nın sadece uydurma olup olmadığı sorusunu doğurmuştur. Radikal bilim insanları tüm Kutsal Kitap hikâyelerinin tamamen göz ardı edilmesini talep etmektedir. Başka bir grup ise Kutsal Kitap hikâyelerinin kelimenin tam anlamıyla alınamayacağını ama yine de bilimsel değeri olduğunu savunur.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_EXODUS_CONGRESS_EGYPTIAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetName] en az #V 25#! @lepsius_egypt_minor! Mısır [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]e sahip olmalı (şu anda [GetPlayer.MakeScope.Var('lepsius_egyptian_artifact_minor').GetValue|0+] adet mevcut).#!"
 MR_EXODUS_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text Dünyada en az #V 150#! @lepsius_egypt_minor! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] bulundu (şu anda [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0] adet mevcut).#!"
 MR_CIVILIZATION_CONGRESS_BUTTON: "Medeniyet Kongresi"
 MR_CIVILIZATION_CONGRESS_BUTTON_TT: "#T Medeniyetin Yükselişi Kongresi#!\nYüzyıllar boyunca sadece Avrupa’da değil, Akdeniz ve Orta Doğu’nun diğer ülkelerinde de Mısır’ın en eski medeniyet olduğu düşünülüyordu. Ancak Asur ve Babil’den gelen günlük buluntular bu teoriyi sarsmıştır. Görünüşe göre yazı Mezopotamya’da icat edilmiştir ve medeniyetin başlangıcını getiren diğer birçok başarı da orada ortaya çıkmıştır. Acaba her medeniyet sonunda Babil’den mi doğmuştur ve her din biçimi Babil mitlerinden mi türemiştir? Gilgamesh Destanı, İncil’den Homeros epiklerine kadar her türlü edebiyat için ilham kaynağı mıdır?\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_CIVILIZATION_CONGRESS_MESOPOTAMIAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetName] en az #V 25#! @lepsius_mesopotamia_minor! Mezopotamya [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] eserine sahip olmalı (şu anda [GetPlayer.MakeScope.Var('lepsius_mesopotamian_artifact_minor').GetValue|0+] adet mevcut).#!"
 MR_CIVILIZATION_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text Dünyada en az #V 300#! @lepsius_mesopotamia_minor! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] bulundu (şu anda [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0] adet mevcut).#!"
 MR_TROY_CONGRESS_BUTTON: "Truva Kongresi"
 MR_TROY_CONGRESS_BUTTON_TT: "#T Truva Kongresi#!\nSchliemann Truva’yı buldu. En azından iddia ettiği budur. Truva’yı sadece uydurma olarak gören eleştirel sesler azalsa da, hâlâ cevaplanmamış birçok soru vardır. Schliemann’ın bulduğu Truva, Homeros’un Truva’sı mıdır? Ve Truva aslında neydi? Birçok akademisyen şüpheci kalmaktadır. Anadolu’dan gelen yeni keşifler, bu bulgulara tamamen yeni bir ışık tutabilir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_TROY_CONGRESS_AEGEAN_ARTIFACTS_TT: "#default_text [GetPlayer.GetName] en az #V 25#! @lepsius_aegean_minor! Ege [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] eserine sahip olmalı (şu anda [GetPlayer.MakeScope.Var('lepsius_aegean_artifact_minor').GetValue|0+] adet mevcut).#!"
 MR_TROY_CONGRESS_GLOBAL_ARTIFACTS_TT: "#default_text Dünyada en az #V 300#! @lepsius_aegean_minor! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] bulundu (şu anda [GetGlobalVariable('lepsius_global_artifacts').GetValue|+0] adet mevcut).#!"
 MR_INSPECT_EXCAVATION_BUTTON: "Kazıyı İncele"
 MR_INSPECT_EXCAVATION_BUTTON_TT: "#T Kazıyı İncele#!\nKazı yaptığımız bir bölgeye deneyimli bir arkeolog gönderebilir ve çabalarımızı yoğunlaştırabiliriz. Arkeologumuz yaklaşık bir yıl içinde yeni bir kazı alanı açacak ve yoğun araştırmalar yapacaktır; bu süreçte daha önce bilinmeyen büyük arkeolojik keşiflerin izlerini bulabiliriz. Başarı büyük ölçüde arkeologumuzun deneyimine bağlıdır. Bir Arkeoloji Derneği’nin kurulması da şansımızı artırır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_INSPECT_EXCAVATION_TRIGGER_TT: "#default_text [GetPlayer.GetName] en az #V bir devam eden [concept_lepsius_excavation]e sahip#!, bu bölgede henüz büyük bir arkeolojik keşif yapılmamıştır.#!"
 MR_INSPECT_EXCAVATION_ARTIFACT_FOR_DISCOVERY_TRIGGER_TT: "#default_text [GetPlayer.GetName] bir bölgedeki ipuçlarını araştırmadan önce en az #V 30 [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] eserini incelemiş olmalı.#!"
 MR_CANCEL_EXCAVATION_BUTTON: "Kazıyı İptal Et"
 MR_CANCEL_EXCAVATION_BUTTON_TT: "#T Kazıyı İptal Et#!\nBazı durumlarda kazı ekibini geri çağırmak faydalı olabilir. Elde ettiğimiz eserler ve koleksiyonlar korunacak, ancak kalıcı kazımız sona erecektir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHAEOLOGY_ON_ARCHAEOLOGICAL_EXCAVATION_TRIGGER_TT: "#default_text [GetPlayer.GetName] en az #V 1#! [Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')] ile bir [concept_lepsius_excavation] yürütüyor.#!"
 MR_LOCAL_EXCAVATION_BUTTON: "Yerel Kazı"
 MR_LOCAL_EXCAVATION_BUTTON_TT: "#T Yerel Kazı#!\nArkeolojik hazineler yalnızca uzak yerlerde beklemiyor. Yerel kazılar, ünlü eserlerin arayışına kıyasla daha az prestijli kabul edilse de, kendi bölgemizin çoğunlukla tarih öncesi dönemine dair fikir verir. Bir keşif sonrası yapılan kazılardan farklı olarak, Yerel Kazılar fon tükenene kadar tamamlanamaz.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ARCHAEOLOGICAL_MUSEUM_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] bir [GetBuildingType('building_lepsius_archaeological_museum').GetName]e sahip.#!"
