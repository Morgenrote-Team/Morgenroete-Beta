 MR_MOZART_MONUMENT_BUTTON_TT: "#T Mozart Anıtı İnşa Et#!\nWolfgang Amadeus Mozart tüm zamanların en önemli bestecilerinden biridir, ancak bazıları bunu hala kabul etmez. Daha yakın zamanda, bir kuşak besteci onu çağdaş müziğin başlangıcı olarak yeniden keşfetti. Doğum yeri Salzburg'da bir Mozart anıtı inşa edilmesi, gelecek nesilleri onun izinden gitmeye teşvik edecektir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
