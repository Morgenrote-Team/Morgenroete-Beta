 TOTAL_MINERALS_VAR_TT: "#header [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]#!\n[GetPlayer.GetName] toplam @agassiz_mineral! [GetPlayer.MakeScope.GetVariable('agassiz_generic_minerals_var').GetValue|V0] [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] topladı. Bu yıl [GetPlayer.GetNameNoFormatting] muhtemelen [GetPlayer.MakeScope.ScriptValue('agassiz_yearly_mineral_value')|+=0] ek [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] toplayacak.\n\n#T [GetPlayer.GetNameNoFormatting]'ın yıllık Mineralleri etkileyen faktörler:#!\n#p  +500#! Temel Değerden#![GetPlayer.GetCustom('agassiz_yearly_minerals_desert_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_arctic_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_geyser_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_special_deposit_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_cave_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_mountain_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_formation_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_great_formation_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_volcano_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_uranium_type')][GetPlayer.GetCustom('agassiz_yearly_minerals_geological_research_type')]"
