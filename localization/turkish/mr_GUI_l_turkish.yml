 MR_EXAMINE_CAVE_BUTTON_BUTTON_TT: "#T Mağarayı İncele#!\nBir [concept_lepsius_anthropologist] yardımıyla, ulusal topraklarda bilinen [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] mağaralar keşfedilebilir. [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_bones$')] ve tarih öncesi eserler çıkarılabilir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
