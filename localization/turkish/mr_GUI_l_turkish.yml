 MR_GEOLOGIST_OIL_STOP_BUTTON_TT: "#T Petrol Aramayı Durdur#!\n[concept_agassiz_geologist]’iniz şu anda halihazırda var olan petrol platformlarının yakınında yeni petrol kuyuları arıyor ve böylece üretimi artırıyor.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_geologist_oil_stop_button_effect_tt: "[concept_agassiz_geologist]’iniz petrol aramayı durduracak."
 MR_GEOLOGIST_GEOLOGICAL_RESEARCH_BUTTON_TT: "#T Jeolojik Araştırma#!\nBir jeolog, bilgilerini artırmak için ülke genelinde 5 yıl seyahat edebilir. Bu sayede jeolojik oluşumlar, mağaralar veya (sonrasında) uranyum bile bulabilir. Mineraloji özelliğine sahip jeologlar, yıllık olarak elde edilen mineral sayısını iki katına çıkarır. Araştırmanın sonunda, jeologlar ek mineraller, deneyim ve henüz sahip değillerse mineraloji özelliği kazanır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 mr_geologist_geological_research_stop_effect_tt: "[concept_agassiz_geologist]’iniz Jeolojik Araştırmalarını durduracak."
 MR_GEOLOGIST_UNDERWATER_MOUNTAINS_ACTIVE_TT: "#T Atlantik Dağlarını Keşfetmek#!\n#p [concept_agassiz_geologist]’iniz şu anda Atlantik Dağlarını keşfediyor.#!"
 MR_GEOLOGIST_TECTONICS_CONGRESS_BUTTON: "Kıtaların Kayması Kongresi"
 MR_GEOLOGIST_TECTONICS_CONGRESS_BUTTON_TT: "#T Kıtaların Kayması Kongresi#!\nYüzyıllarca, kıtaların sabit ve hareketsiz olduğuna dair inanç değişmezdi. Önde gelen bir jeolog ve kayda değer jeolojik bilgisi olan bir kişi bu mantrayı çökertilebilir. Başarılı olup olmayacağı ise şüpheli.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_CONGRESS_KNOWLEDGE_TRIGGER_TT: "#default_text [GetPlayer.GetName], #V 50 veya daha fazla#! @agassiz_geological_knowledge! [concept_agassiz_geological_knowledge] sahip (şu an [GetPlayer.MakeScope.Var('agassiz_geological_knowledge_var').GetValue|0+]).#!"
 MR_ASTRONOMER_ACTIVE_TRIGGER_TT: "#default_text [GetPlayer.GetName]’in #V meşgul olmayan bir [concept_verrier_astronomer]’i var#!.#!"
 MR_ASTRONOMER_MOON_MAP_BUTTON_TT: "#T Ay Haritası Oluştur#!\nKamera ve modern teleskoplar yardımıyla, Dünya’nın uydusunu benzeri görülmemiş bir kalite ile haritalamak mümkündür. Ay haritası astronomide önemli bir dönüm noktası olacaktır. Ancak, bir astronom eğer selenografik çalışmalar yaparsa daha az astronomik obje bulur.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTRONOMER_MOON_MAP_ACTIVE_TT: "Ay Haritası Oluştur\n#p [concept_verrier_astronomer]’iniz şu anda Ay’ı haritalıyor ve [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')] çekiyor.#!"
