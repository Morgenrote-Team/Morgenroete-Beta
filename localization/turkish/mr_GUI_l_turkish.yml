 MR_ASTEROID_CONGRESS_BUTTON: "Asteroitler Kongresi"
 MR_ASTEROID_CONGRESS_BUTTON_TT: "#T Asteroitler Kongresi#!\n1801 yılında Ceres'in keşfinden bu yana, gökbilimciler giderek daha fazla gök cismi buldu, bu yüzden güneş sistemindeki gezegen sayısı artmaya devam etti. Neptün'ün keşfi, özellikle Mars ile Jüpiter arasındaki sayısız küçük cisim için yeni bir kategorinin daha anlamlı olup olmayacağı sorusunu gündeme getirdi. Yeni astronomik sembollerin icadı ve görece küçük boyutları, gökbilimcileri bunların daha çok 'küçük yıldızlar' veya 'küçük gezegenler' olduğu sonucuna yöneltti. Elbette bu sınıflandırma, daha önce gezegen olarak kabul edilen bazı cisimlerin statüsünü kaybetmesine ve sadece taş kütlesi olarak görülmesine yol açacaktı.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTEROID_CONGRESS_NEPTUNE_TT: "#default_text #V Neptün#! keşfedildi.#!"
 MR_ASTEROID_CONGRESS_OBSERVATORY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] bir [GetBuildingType('building_verrier_observatory').GetName] sahip.#!"
 MR_ASTEROID_CONGRESS_ASTRONOMER_TRIGGER_TT: "#default_text Bir [concept_verrier_astronomer] sahip.#!"
 MR_ASTEROID_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Dünya genelinde toplam en az #BLUE 1500#! @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] keşfedildi (şu anda [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalobject! bulundu).#!"
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON: "Carte du Ciel"
 MR_CARTE_DE_CIEL_CONGRESS_BUTTON_TT: "#T Carte du Ciel Kongresi#!\n1887 yılında Paris Gözlemevi müdürü Amédée Mouchez, yeni kuru plaka fotoğrafçılık sürecinin yıldız haritalarını yapma sürecini devrim niteliğinde değiştirebileceğini fark ederek, kapsamlı ve eşi görülmemiş bir uluslararası yıldız haritalama projesi başlattı. Nisan 1887'de Paris'te toplanan 50'den fazla gökbilimcinin katıldığı Astrographic Kongresi sonucunda, dünya genelindeki 20 gözlemevi projeye katılmayı kabul etti. Biz de böyle bir kongre düzenleyerek uluslararası topluluğun astronomik bilgisini paylaşabiliriz.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTRONOMY_CONGRESS_5_YEARS_TRIGGER_TT: "#default_text Son #V 5 yıl içinde#! bir Astronomik Kongre #V düzenlenmedi#! (son ev sahibi 'Astronomik Kongre Düzenlendi' Modifikatörüne sahip değil).#!"
 MR_CARTE_DE_CIEL_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Dünya genelinde toplam en az #BLUE 7000#! @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] keşfedildi (şu anda [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalobject! bulundu).#!"
 MR_CARTE_DE_CIEL_CONGRESS_UNIVERSITY_BUILDING_TRIGGER_TT: "#default_text [GetPlayer.GetName] bir [GetBuildingType('building_university').GetName] sahip ve #V seviye 10 veya daha yüksek#!.#!"
 MR_GREAT_DEBATE_CONGRESS_BUTTON: "Büyük Tartışma"
 MR_GREAT_DEBATE_CONGRESS_BUTTON_TT: "#T Büyük Tartışma#!\nShapley-Curtis Tartışması, diğer adıyla Büyük Tartışma, 20. yüzyılın başındaki tartışmaları bir araya getirerek galaksilerin doğası ve evrenin büyüklüğü hakkında yeni bir anlayışa yol açtı. Tartışma, Samanyolu'nun büyüklüğü ve o dönemde spiral nebula olarak bilinen galaksilerin Samanyolu içinde küçük cisimler mi yoksa Samanyolu'ndan çok daha uzak ve ayrı mı olduğu etrafında dönüyordu. O gün, iki bilim insanı evrenin büyüklüğü hakkında bağımsız teknik makaleler sundu ve akşam ise halka açık bir tartışma gerçekleştirdi. Biz de evrenin nihai sırlarını tartışmak için böyle bir kongre düzenleyebiliriz.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GREAT_DEBATE_CONGRESS_OBJECTS_TRIGGER_TT: "#default_text Dünya genelinde toplam en az #BLUE 12000#! @verrier_astronomicalobject! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] keşfedildi (şu anda [GetGlobalVariable('verrier_total_astronomical_objects').GetValue|+0] @verrier_astronomicalobject! bulundu).#!"
