 MR_CHEMIST_CONGRESS_ELEMENTS_TRIGGER_TT: "#default_text Dünya çapında toplam en az #V 60#! [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')] doğrulandı ([GetGlobalVariable('mendelejew_isolated_elements_global_number_var').GetValue|+0] izole edildi).#!"
 MR_MOUNT_SKELETON_ACTIVE_TT: "#T Dinozor İskeleti Kur#!\n#p Paleontoloğun şu anda bir Dinozor İskeleti kuruyor.#!\n[concept_dubois_paleontologist]’iniz, aynı kıtadan 5 [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] kullanarak yeni bir [concept_dubois_dinosaur_skeleton] inşa edebilir."
 MR_REMOUNT_SKELETON_ACTIVE_TT: "#T Dinozor İskeletini Yeniden Kur#!\n#p Paleontoloğun şu anda bir Dinozor İskeletini yeniden kuruyor.#!\nEksik [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')] varsa, [concept_dubois_paleontologist]’in yeniden kurmasını sağlayabilirsiniz. Paleontoloğun yeterince deneyimli ise, yeniden kurulan iskelet daha kaliteli olabilir."
 MR_UPPER_EGYPT_EXPEDITION_ACTIVE_TT: "#T Krallar Vadisi Seferi#!\n#p Arkeoloğunuz şu anda Krallar Vadisi’ne bir seferde.#!\nEski başkent Thebes ve Krallar Vadisi ile Yukarı Mısır, Mısırbilim için adeta bir Mekke sayılır. Bölge için bir kazı izni almalıyız ve Mısır hazinelerini araştırmalıyız."
 MR_LOWER_EGYPT_EXPEDITION_ACTIVE_TT: "#T Piramitler Seferi#!\n#p Arkeoloğunuz şu anda Piramitler’de bir seferde.#!\nZamanın başlangıcından beri, Mısır piramitleri insanlığı büyülemiştir. Söylenene göre, Aşağı Mısır’da kaybolmuş diğer mezarlar, tapınaklar ve hatta şehirler yeniden keşfedilmeyi bekliyor."
 MR_BABYLONIA_EXPEDITION_ACTIVE_TT: "#T Babil Seferi#!\n#p Arkeoloğunuz şu anda Babil’de bir seferde.#!\nBabil, Mezopotamya’nın güney kısmında yer alır ve bir zamanlar güçlü olan Babil şehrinin adını taşır. Bölge, değerli arkeolojik eserlerin tekrar tekrar keşfedildiği 'medeniyetin beşiği' olarak kabul edilir. Eserler kesinlikle bir müzede yer almalıdır."
 MR_ASSYRIA_EXPEDITION_ACTIVE_TT: "#T Asur Seferi#!\n#p Arkeoloğunuz şu anda Asur’da bir seferde.#!\nAsur, Mezopotamya’nın kuzey kısmını ve iki önemli şehir olan Asur ve Ninova’yı ifade eder. Ülke hakkında sınırlı bilgi hâlâ İncil’e dayansa da – belki daha güvenilir tarihi kanıtlar vardır?"
 MR_ARGOLIS_EXPEDITION_ACTIVE_TT: "#T Argolis Seferi#!\n#p Arkeoloğunuz şu anda Argolis’te bir seferde.#!\nTruva’nın keşfinden sonra, şüpheci bilim insanları bile eski Yunan mitlerinin yalnızca masal olmadığını fark eder. Tunç Çağı şehirlerinin kalıntılarının Argolis’te olduğu söylenir, en bilineni Mikene’dir. Bunu kendimiz doğrulamalıyız."
 MR_CRETE_EXPEDITION_ACTIVE_TT: "#T Girit Seferi#!\n#p Arkeoloğunuz şu anda Girit’te bir seferde.#!\nEfsanevi Kral Minos’un bir zamanlar Girit’i yönettiği söylenir. Truva ve Mikene’de olduğu gibi, bu hikâyede de bir gerçeklik olabilir: Efsanevi Minos kültürüne ait eserler adada giderek daha fazla bulunuyor. Ülkemiz de birkaçını güvence altına almalı."
 MR_YUCATAN_EXPEDITION_ACTIVE_TT: "#T Yucatán Seferi#!\n#p Arkeoloğunuz şu anda Yucatán’da bir seferde.#!\nOrmanın ortasında bilinmeyen ve devasa şehirlerin raporları arttı. Daha fazla araştırmalı ve Yucatán’a arkeolojik bir sefer göndermeliyiz."
 MR_PERU_EXPEDITION_ACTIVE_TT: "#T Peru Seferi#!\n#p Arkeoloğunuz şu anda Peru’da bir seferde.#!\nPilotlar, Peru üzerindeki uçuşlarda gördükleri And Dağları’ndaki garip kaleler ve duvarlı yapılar rapor etti. Belki İspanyollar İnka kültürünü tamamen yok etmedi? Bazı yerli direniş kasabaları hâlâ bulunamadı."
 MR_FOSSIL_IDENTIFICATION_ACTIVE_TT: "#T Fosilleri Tanımla#!\n#p Antropoloğunuz şu anda fosilleri tanımlıyor.#!\nBir [concept_lepsius_anthropologist], bilinmeyen bir kemiği zaman içinde analiz edebilir ve belirli bir insan veya ön-insan türüne atayabilir. Üç kemiği aynı türe atamayı başarırsa, bu türü başarıyla sınıflandırabilir. Bir kemiği doğru tanımlamak antropoloğun deneyimine bağlıdır."
 MR_CONDUCTING_ACTIVE_TT: "#p Besteciniz şu anda Operada bir Sezon yönetiyor.#!\n[Localize('concept_elgar_conducting_desc')]"
 MR_MUSIC_TOUR_ACTIVE_TT: "#p Besteciniz şu anda bir Müzik Turunda.#!\n[Localize('concept_elgar_musical_tour_desc')]"
 MR_NEWSPAPER_NOVEL_ACTIVE_TT: "#T Gazete Romanı#!\n#p Yazarınız şu anda bir Gazete Romanı yazıyor.#!\n19. yüzyılda, gazete romanı birçok yazara güvenli gelir ve ulusal ün sağlıyordu. Tolstoy, Dostoyevski, Flaubert ve Dumas gibi dönemin ünlü yazarları, romanlarını önce gazetelerde seri hâlinde yayınlamış, sonra kitap olarak yayımlamışlardır."
 MR_READNG_TOUR_ACTIVE_TT: "#T Okuma Turu#!\n#p Yazarınız şu anda bir Okuma Turunda.#!\nUluslararası alanda tanınan ve yabancı yayınevleriyle temas hâlinde olan bir yazar, bir okuma turuna çıktığında ülkenin kendi itibarını artırabilir. Bu sadece karşılıklı ilişkileri değil, aynı zamanda yazarın itibarını da güçlendirecektir."
 MR_PAINTER_TRIP_ACTIVE_TT: "#T Eğitim Yolculuğu#!\n#p Ressamınız şu anda bir Eğitim Yolculuğunda.#!\nBir [concept_klimt_painter_trip] sırasında, bir sanatçı daha önce bilinmeyen bir sanat tarzını öğrenebilir ve böylece yıllık [concept_klimt_painting_tradition]’ı geliştirebilir. Ayrıca yabancı bir [concept_artists_center_of_arts]’ta kaldığı süre boyunca başka olumlu veya olumsuz özellikler kazanabilir."
 MR_MOUNTAIN_EXPEDITION_ACTIVE_TT: "#T Dağ Seferi#!\n#p Şu anda bir Dağ Seferi devam ediyor.#!\n1786’da Mont Blanc’ın tırmanışıyla, dünyanın en yüksek zirvelerini fethetme çağının yeni bir dönemi başladı; 19. ve 20. yüzyıllarda bu eğilim daha da arttı. Henüz tırmanılmamış bir dağ sırasına sahipsek, fethetme görevini uygun becerilere sahip bir generale devredebiliriz."
 MR_AIR_COMBAT_MISSION_ACTIVE_TT: "#T Hava Muharebesi Görevi#!\n#p Pilotunuz şu anda bir Hava Muharebesi Görevinde.#!"
 MR_AIRCRAFT_PARADE_ACTIVE_TT: "#T Uçak Geçit Töreni#!\n#p Pilotunuz şu anda bir Uçak Geçit Törenine katılıyor.#!"
