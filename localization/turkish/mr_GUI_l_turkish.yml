 MR_PALEONTOLOGICAL_EXPEDITION_BUTTON_TT: "#T Paleontolojik Keşif#!\n[concept_dubois_paleontologist]’inizi bir [concept_dubois_paleontological_expedition] gönderin. Bir keşif 1 yıl sürer ve belli miktarda [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] ve [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] ile sonuçlanır.\n\nKeşif sonunda, bir [concept_dubois_paleontological_team] bırakarak bir [concept_dubois_paleontological_excavation] kurabilirsiniz.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
