 MR_HIPPOCAMPUS_CONGRESS_SPECIMEN_TRIGGER_TT: "#default_text [GetPlayer.GetName] #V 20000 veya daha fazla#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] sahip (şu anda [GetPlayer.MakeScope.Var('dubois_specimen').GetValue|0+]).#!"
 MR_HIPPOCAMPUS_CONGRESS_GLOBAL_SPECIMEN_TRIGGER_TT: "#default_text Dünya genelinde #V 100000 veya daha fazla#! [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] toplandı (şu anda [GetGlobalVariable('dubois_global_specimen').GetValue|0+]).#!"
 MR_EXTEND_ZOO_SMALL_BUTTON: "[concept_dubois_zoo]'yu genişlet (küçük)"
 MR_EXTEND_ZOO_SMALL_BUTTON_TT: "#T Hayvanat Bahçesini Küçük Boyuta Genişlet#!\n[Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')], herkesin mutluluğudur: insanlar hayvanat bahçesinde dolaşır, bilim insanları zoolojik çalışmalarına devam edebilir ve en fazla yabancı faunayı gösterebilenler uluslararası prestij kazanır. Her genişleme ile bir ulusun prestiji artar. Bazı genişleme aşamaları sadece çok sayıda hayvan toplamakla değil, aynı zamanda dünyanın farklı bölgelerinden de hayvan toplamakla mümkündür.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
