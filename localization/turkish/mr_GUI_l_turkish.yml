 MR_MINERAL_CABINET_BUTTON: "Mineral Dolabı Kur"
 MR_MINERAL_CABINET_BUTTON_TT: "#T Mineral Dolabı Kur#!\nHayvanat bahçenize bir Mineral Dolabı eklemek prestiji artırır. Topladığımız tüm mineralleri [concept_agassiz_geologist] tarafından burada sergileyebiliriz.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_MINERAL_CABINET_NUMBER_TRIGGER_TT: "#default_text [GetPlayer.GetName], #V 50 veya daha fazla#! [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] sahip (şu an [GetPlayer.MakeScope.Var('agassiz_rare_minerals_var').GetValue|0+]).#!"
 MR_MINERAL_CABINET_EFFECT_TT: "[GetBuildingType('building_dubois_zoo').GetName]’ınız bir #V Mineral Dolabı#! kazanacak; bu size 50 prestij ve küçük bir yaşam standardı artışı sağlayacak."
 MR_GEOLOGIST_UNDERWATER_MOUNTAINS_BUTTON_TT: "#T Atlantik Dağlarını Keşfet#!\nTransatlantik kablo döşenirken deniz altı yükseltilerine dair kanıtlar bulundu. Önde gelen jeologlar bunun nedenini merak ediyor. Modern ölçüm ekipmanı ve deneyimli bir jeolog gizemi çözebilir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_EXPERIENCED_TRIGGER_TT: "#default_text [GetPlayer.GetName], bir #O deneyimli#! veya #O ünlü#! [concept_agassiz_geologist]’e sahip.#!"
 MR_PALEONTOLOGIST_FAMOUS_TRIGGER_TT: "#default_text [GetPlayer.GetName], bir #O ünlü#! [concept_dubois_paleontologist]’e sahip.#!"
 MR_GEOLOGIST_ORE_VEIN_BUTTON_TT: "#T Prospect Ore#!\nA [concept_agassiz_geologist] can search for new raw material deposits near already established mines and thus increase the production of the ore.\n\nThe building would gain the $agassiz_building_production_mult_modifier_with_tooltip$ [concept_modifier]\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_ORE_VEIN_STOP_BUTTON_TT: "#T Cevher Aramayı Durdur#!\n[concept_agassiz_geologist]’iniz şu anda halihazırda var olan madenlerin yakınında yeni hammadde yataklarını arıyor ve böylece cevher üretimini artırıyor.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_OIL_BUTTON_TT: "#T Petrol Ara#!\nBir [concept_agassiz_geologist], halihazırda var olan petrol platformlarının yakınında yeni petrol kuyuları arayabilir ve üretimi artırabilir.\n\nBina, $agassiz_building_production_2_mult_modifier_with_tooltip$ [Concept('concept_modifier','$concept_modifiers$')] kazanır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 VISIT_OBSERVATORY_BUTTON: "Planetaryumu Ziyaret Et"
 VISIT_OBSERVATORY_BUTTON_TT: "#T Planetaryumu Ziyaret Et#!\nPlanetaryum, ülkenizin, diğer ülkelerin ve bilim topluluğunun astronomik bilgilerine genel bir bakış sunar."
 MR_SELL_MINERALS_FOR_RARE_MINERAL_BUTTON_TT: "#T Mineralleri Nadir Minerallerle Takas Et#!\nBir [concept_agassiz_geologist], meslektaşlarından, koleksiyonculardan ve diğer jeoloji meraklılarından [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] satın alabilir. Bunun için önemli miktarda sıradan mineral takas etmesi gerekir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON: "Disiplinler Arası Sempozyum"
 MR_GEOLOGIST_PALEONTOLOGIST_SYMPOSIUM_BUTTON_TT: "#T Jeoloji-Paleontoloji Sempozyumu#!\nJeoloji ve paleontoloji arasındaki kesişim alanları geniştir. Alanın önde gelen isimlerini bir araya getirmeli ve bu değişimden doğacak sinerjileri kullanarak Dünya tarihi hakkında yeni bilimsel teoriler oluşturmalıyız.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_PROMOTING_GEOLOGIST_TT: "#T Jeologu Terfi Ettir#!\n#p Şu anda Jeologu terfi ettiriyorsunuz.#!\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] mineralleri, volkanları ve diğer jeolojik oluşumları inceler."
