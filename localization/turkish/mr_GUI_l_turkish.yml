 NUMBER_MOONS_VAR_TT: "#header [Concept('concept_verrier_satellite','$concept_verrier_satellites$')]#!\n[GetPlayer.GetName], bilinen tüm @verrier_moons! [GetGlobalVariable('verrier_moon_number_global_var').GetValue|V0] [Concept('concept_verrier_satellite','$concept_verrier_satellites$')]’den @verrier_moons! [GetPlayer.MakeScope.Var('verrier_num_discovered_moons_var').GetValue|V0]’sini keşfetti."
 MR_ASTRONOMER_DISCOVER_SATELLITES_BUTTON_TT: "#T Yeni Uydular Keşfet#!\nGüneş Sistemi’nde, Dünya’nın uydusuna benzer, keşfedilmemiş doğal [Concept('concept_verrier_satellite','$concept_verrier_satellites$')]’lar vardır. Teknoloji seviyesi, gözlemevimizdeki üretim yöntemleri ve astronomun yeteneklerine bağlı olarak daha önce tamamen bilinmeyen bir gezegen uydusunu bulma olasılığı ortaya çıkabilir. Ancak, bir astronom eğer yeni uydular ararsa daha az astronomik obje bulur.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ASTRONOMER_CAN_DISCOVER_SATELLITES_TRIGGER_TT: "#default_text Keşfedilebilecek doğal [Concept('concept_verrier_satellite','$concept_verrier_satellites$')]’lar var.#!"
