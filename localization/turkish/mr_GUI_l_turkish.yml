 MR_AUTOMATE_PALEONTOLOGIST_TT: "#T [concept_dubois_paleontologist] Otomatikleştir#!\nPaleontoloğunuzun görevlerini otomatikleştirdiğinizde artık görev vermeniz gerekmez.\nKendi başına çalışacak ve o an mantıklı olan görevleri yapacaktır. Yine de [Concept('concept_dubois_paleontological_expedition','$concept_dubois_paleontological_expeditions$')] göndermeniz veya [Concept('concept_dubois_paleontological_team','$concept_dubois_paleontological_teams$')] kurmanız gerekecektir. Ayrıca hâlâ olaylar alırsınız."
