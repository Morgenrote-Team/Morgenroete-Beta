 MR_READING_TOUR_BUTTON_TT: "#T Yazarı Okuma Turu'na Gönder#!\nUluslararası tanınmış bir yazar, yabancı yayınevleriyle iletişim halindeyse, okuma turuna çıktığında ülkenin şöhretini artırabilir. Bu yalnızca karşılıklı ilişkileri geliştirmekle kalmaz, aynı zamanda yazarın kendi itibarını da yükseltir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
