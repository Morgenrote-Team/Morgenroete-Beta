 MR_GEOLOGIST_AGE_EARTH_BUTTON_TT: "#T Dünya’nın Yaşını Hesapla#!\nBir jeolog, hayatında bir kez Dünya’nın yaşını hesaplayabilir ve teorisini tüm diğer jeologlara sunabilir. Eğer kabul edilir ise, onun belirlemesi geçerli olur. Eğer reddedilirse, belirli bir süre sonra tekrar deneyebilir. Yeni bir teori sunmak için ulusal Jeoloji Puanı, son Dünya yaşı belirlemesinde kullanılan puandan yüksek olmalıdır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_GEOLOGIST_AGE_EARTH_ACTIVE_TT: "#T Dünya’nın Yaşını Hesapla#!\n#p Jeoloğunuz şu anda Dünya’nın yaşını hesaplıyor.#!"
