 MR_BREEDING_ANIMALS_TRIGGER: "#default_text [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] üretebilirsiniz eğer, bir [concept_dubois_nature_reserve] bulunan eyaletiniz varsa ve bu eyalette henüz aynı bölgeden spesifik hayvan yoksa ve bu hayvan [concept_dubois_zoo]'nuzda mevcutsa.\nÖrneğin bir Avrupa Eyaletinde #b Doğa Rezerviniz#! varsa ve #b Alpin Keçisi#! üretmek istiyorsanız, eyalette henüz bir Keçi [concept_dubois_habitat] olmamalı ve #b Alpin Keçileri#! #b Hayvanat Bahçenizde#! mevcut olmalıdır.#!"
