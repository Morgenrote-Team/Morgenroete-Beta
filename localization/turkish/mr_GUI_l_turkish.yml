 SPECIMEN_VAR_TT: "#header [Concept('concept_dubois_specimen','$concept_dubois_specimens$')]#!\n[GetPlayer.GetName], @dubois_specimen! [GetPlayer.MakeScope.GetVariable('dubois_specimen').GetValue|V0] [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] topladı."
 MR_SAFARI_EXPEDITION_BUTTON_TT: "#T Heia Safari#!\nAfrika safarisinde, sürekli izleme ve tuzak kurma yoluyla büyük av hayvanları yakalanabilir ve ardından bir [concept_dubois_zoo]'ya taşınabilir. Her safari için yalnızca bir hayvan yakalamak mümkündür. Hayvan türüne bağlı olarak tuzak kullanmanız mı yoksa izlerini takip etmeniz mi gerektiği değişir. Genel bir kural olarak, büyük ve yavaş hayvanlar daha fazla tuzak gerektirirken, hızlı hayvanlar daha fazla izleme gerektirir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_SAFARI_EXPEDITION_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] bir [concept_dubois_naturalist] sahip ve #V meşgul değil#!.#!"
 MR_SAFARI_EXPEDITION_HAS_SMALL_OR_BIGGER_ZOO_TRIGGER_TT: "#default_text En az #V küçük boyutlu#! bir [concept_dubois_zoo] sahip.#!"
 MR_SAFARI_EXPEDITION_HABITAT_TRIGGER_TT: "#default_text [GetPlayer.GetName] en az bir Afrika Hayvan Habitatı #V büyük av hayvanlarıyla sahip#! veya merkezi olmayan bir ülke #V tarafından sahip olunan#! bir eyalette böyle bir Habitat mevcut.#!"
 MR_SAFARI_EXPEDITION_RECENT_TRIGGER_TT: "#default_text [GetPlayer.GetName] şu anda #V bir Safari'de değil#! veya #V yakın zamanda bir Safari gerçekleştirmedi#!.#!"
 MR_ZOOLOGICAL_EXPEDITION_BUTTON_TT: "#T Yerel Hayvan Yakalama#!\nÜlkemizde, bir [concept_dubois_zoo]'da sergilenebilecek ilginç türlerin bulunduğu hayvan habitatları var. Bir [concept_dubois_naturalist] bir yıl boyunca ülke çapında [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] toplamak için seyahat edecek.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_ZOOLOGICAL_EXPEDITION_LOCAL_ANIMALS_TRIGGER_TT: "#default_text [GetPlayer.GetName] en az bir hayvan habitatına sahip ve buradaki [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] henüz [concept_dubois_zoo]'müzde yaşamıyor.#!"
 MR_ZOOLOGICAL_EXPEDITION_CURRENT_EXPEDITION_TRIGGER_TT: "#default_text [GetPlayer.GetName] şu anda #V yerel hayvanları yakalamıyor#!.#!"
 MR_HIPPOCAMPUS_CONGRESS_BUTTON: "Hippocampus Kongresi"
 MR_HIPPOCAMPUS_CONGRESS_BUTTON_TT: "#T Hippocampus Kongresi#!\nİnsan ne kadar benzersizdir? Ne kadar hayvandır? Antik Yunanlılar, insanlar ile maymunlar arasında bir yakınlık olduğunu fark etmişlerdi. Carl Linnaeus'un maymunları ve insanları primatlar olarak sınıflandırması - hayvanlar arasında 'en yüksek' seviye - bu alanın bir zamanlar tartışmasız olduğunu gösterir. Ancak evrim teorisinin formülasyonu ve insanların maymun benzeri bir atadan geldiği varsayımı ile şimdi çözülmesi gereken çatışmalar ortaya çıkmıştır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]"
 MR_NATURALIST_TRIGGER_TT: "#default_text [GetPlayer.GetName] bir [concept_dubois_naturalist] sahip.#!"
