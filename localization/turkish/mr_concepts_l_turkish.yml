l_turkish:
 ag_morgenroete_name: "[concept_morgenroete]"
 ag_morgenroete_tooltip: "Bir [concept_morgenroete] özelliği için en az bir olası eylemimiz var."
 concept_morgenroete: "#r Morgenröte#!"
 concept_morgenroete_mr: "MR"
 concept_morgenroete_concept: "Kavram"
 concept_pm_academics_university_humanities: "#b #MAVI Beşeri Bilimler-Odaklı#!#!"
 concept_pm_academics_university_natural_history: "#b #YESIL Doğa Tarihi Odaklı#!#!"
 concept_pm_academics_university_mathematics: "#b #TURUNCU Matematik-Teknik Odaklı#!#!"
 concept_academics_university_specialization: "Üniversite Odakları"
 concept_academics_academic: "Akademisyen"
 concept_academics_academics: "Akademisyenler"
 concept_academics_scientist: "Bilim İnsanı"
 concept_academics_scientists: "Bilim İnsanları"
 concept_academics_academic_desc: "In [concept_morgenroete] #b Academics#! are special characters that allow you to use certain mechanics of the mod. You can get #b Academics#! in some events or by aquiring enough [concept_academics_progress].\nCurrently these #b Academics#! exist:\n - [concept_tesla_engineer]\n - [concept_mendelejew_chemist]\n - [concept_verrier_astronomer]\n - [concept_agassiz_geologist]\n - [concept_dubois_paleontologist]\n - [concept_dubois_naturalist]\n - [concept_panum_physician]\n - [concept_lepsius_archaeologist]\n - [concept_lepsius_anthropologist]"
 concept_academics_progress: "Akademik İlerleme"
 concept_academics_progress_desc: "360 #b Akademik İlerleme#! elde ederek yeni bir [concept_academics_academic] kazanabilirsiniz. #b Akademik İlerleme#!'ye erişebilmek için #b Akademi#! Teknolojisine ve en az bir #b Üniversite#!'ye sahip olmanız gerekir.\n#b Akademik İlerleme#! kazanımınız çeşitli faktörlerden etkilenir. Örneğin, sahip olduğunuz [concept_literacy] ne kadar yüksekse, #b Akademik İlerleme#! o kadar hızlı kazanılır. Bir diğer faktör, ülkenizdeki akademik nüfus oranıdır. %2 veya daha fazla akademik nüfus için maksimum #b Akademik İlerleme#! kazanırsınız. Daha iyi okullar ve mutlu bir entelektüel sınıf da #b Akademik İlerleme#! kazanımını artırır. Ayrıca bazı teknoloji odakları ve özel binalar, örneğin [concept_dubois_zoo] veya [concept_verrier_observatory], ek #b Akademik İlerleme#! sağlar."
 concept_academics_scientific_society: "Bilimsel Topluluk"
 concept_academics_scientific_societies: "Bilimsel Topluluklar"
 concept_academics_scientific_society_desc: "#b Bilimsel Topluluk#!, ülkenizin en parlak zihinlerinden oluşan bir topluluktur. Ülkenizin bilim insanlarını ve akademisyenlerini temsil eder ve [Concept('concept_academics_academic','$concept_academics_academics$')] ziyaret etmenizi sağlar.\n\n#b Bilimsel Topluluk#!, size faydalı ödüller verecek [Concept('concept_academics_academic_mission','$concept_academics_missions$')] görevleri verebilir."
 concept_academics_experience: "Deneyim"
 concept_academics_experience_desc: "Bazı Akademisyenler yaşamları boyunca #b Deneyim#! kazanır. [concept_morgenroete] içinde karakterler oluşturulduğunda #b Deneyim#! kazanırlar. Genellikle 30 yaşından büyük her yıl için 10 #b Deneyim#! kazanırlar.\nAyrıca işlerini yaparak da #b Deneyim#! kazanırlar; örneğin yeni [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] keşfederken. Her yıl pasif olarak da #b Deneyim#! kazanırlar.\n100 #b Deneyim#! kazanan bir karakter, #b Tecrübeli Özelliği#! kazanır. 300 #b Deneyim#!'e ulaşan bir karakter ise #b Ünlü Özelliği#! kazanır.\nKarakterin #b Deneyim#! seviyesi ne kadar yüksekse, yaptığı iş o kadar iyidir. Örneğin deneyimli veya ünlü bir [concept_dubois_paleontologist], daha fazla [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] bulur ve [concept_dubois_dinosaur_skeleton] inşasında daha başarılı olur."
 concept_academics_academic_mission: "Akademik Görev"
 concept_academics_academic_missions: "Akademik Görevler"
 concept_academics_mission: "Görev"
 concept_academics_missions: "Görevler"
 concept_academics_academic_mission_desc: "[concept_academics_scientific_society] bazen sizden belirli bir hedefe ulaşmanızı isteyecektir. Bu hedefler, belirli bir miktarda [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] veya benzeri şeyler bulmak olabilir. Diğer #b Görevler#! ise X Gezegeni bulmanızı veya bir [Concept('concept_lepsius_exhibition','$concept_lepsius_excellent_exhibition$')] elde etmenizi gerektirebilir.\nBir #b Görev#! başarısız olursa #b Bilimsel Topluluk#! mutsuz olur, ancak bir görevi tamamlamak size faydalı ödüller kazandırır."
 concept_curtiss_aviation: "Havacılık"
 concept_curtiss_aviation_desc: "#b Havacılık#!, [concept_morgenroete]’nin temel özelliklerinden biridir. 19. ve 20. yüzyıl insan uçuşunun yükselişine tanık olmuştur. Önce #b Balonlar#! ve #b Zeplinler#! şeklinde, sonra #b Uçaklar#! ile. Uçmak prestijli bir aktiviteydi ve yeni ufuklara ulaşmayı sağlıyordu.\n\nBirçok ülke oyunun başında göklere yolculuğuna başlar ve bir [Concept('concept_curtiss_balloonist_role','$concept_curtiss_balloonist_role_only_balloonist$')] sponsor ederek rekor kırmayı hedefler. Rekorlardan birini kırmak, ülkenize teknoloji artışı ve prestij modifikasyonu kazandırır.\nZeppelin Teknolojisini araştırmak, Kuzey Kutbuna erişiminiz ve bir [concept_curtiss_pilot]’ınız varsa [concept_curtiss_arctic_expedition] yapmanızı sağlar.\nHavacılık yolunda daha fazla araştırma yapmak, yeni mekanikler kullanmanıza izin verir. [concept_curtiss_airport] inşa edebilir, yeni #b Uçuşlar#! ve #b Hizmetler#! üretebilirsiniz. #b Havaalanı#!, [concept_curtiss_airline] büyümesine olanak sağlar ve [concept_curtiss_airspace_convention] diplomatik eylemini kullanmanızı sağlar. #b Hava Sahası Konvansiyonu#!, Devletlere ve [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')] ile Kuzey Kutbu'na erişim sağlar. #b Havayolu#! yeterince büyürse dev bir zeplin veya dünyanın en büyük uçağını inşa edebilirsiniz.\n20. yüzyılın başında en heyecan verici özellik gelir: [concept_curtiss_schneider_trophy] yarışmasına katılabilirsiniz. #b Schneider Trophy#!, farklı ülkelerin yarıştığı bir deniz uçağı yarışıdır. Kazanırsanız prestij kazanır ve bir sonraki etkinliğe ev sahipliği yaparsınız. Yarışı 3 kez kazanırsanız #b Schneider Trophy#!’yi kalıcı olarak kazanırsınız."
 concept_curtiss_balloonist_role: "Baloncu Rolü"
 concept_curtiss_balloonist_role_only_balloonist: "Baloncu"
 concept_curtiss_balloonists_role: "Baloncus"
 concept_curtiss_balloonist_role_desc: "#b Baloncu#!, bir ülke tarafından sponsor edilebilen özel bir karakterdir. Genellikle gelişmiş veya batılı ülkeler #b Baloncuları#! sponsor eder ve rekorlar ve yeni keşifler için yarışırlar. #b Baloncular#! rastgele uçuşlar yapar ve en uzun mesafe, en uzun uçuş süresi veya en yüksek uçuş için rekorlar kırar. Her balon uçuşunda #b Baloncu#! deneyim kazanır ve rütbesi yükselir, bu da yeni rekorlar için şansı artırır. Ancak balonculuk tehlikeli bir iştir; birçok baloncu erken ölür, özellikle hasta, alkolik veya uyuşturucu bağımlısıysa."
 concept_curtiss_arctic_expedition: "Kuzey Kutbu Seferi"
 concept_curtiss_arctic_expeditions: "Kuzey Kutbu Seferleri"
 concept_curtiss_arctic_expedition_desc: "#b Zeppelin#! Teknolojisini araştırdıysanız, bir [concept_verrier_observatory] ve #b Hava Durumu İstasyonu#!, bir [concept_curtiss_pilot] ve Kuzey Kutbuna yakın bir eyalete erişiminiz varsa #b Kuzey Kutbu Seferi#! düzenleyebilirsiniz. Bu eyaletler #b Grönland#!, #b Kuzey Norveç#!, #b Alaska#!, #b Nunavut#! ve #b Nenetsia#!'dır. Erişimi ya eyaleti kendiniz yöneterek ya da sahibi ile [concept_curtiss_airspace_convention] yaparak elde edebilirsiniz.\n#b Kuzey Kutbu Seferi#! sırasında araştırma gezileri yapabilir, kutup istasyonları inşa edebilir, kutup bölgesinin coğrafyası, meteorolojisi ve biyolojisi hakkında yeni bilgiler edinebilir ve zeplin ile kutbu geçmek için ilk siz olabilirsiniz!"
 concept_curtiss_pilot: "Pilot"
 concept_curtiss_pilots: "Pilotlar"
 concept_curtiss_pilot_desc: "#b Pilot#!, #b Pilot Özelliği#! taşıyan bir karakterdir. #b Pilotlar#! #b Erken Havacılık#! keşfinden sonra düşük bir olasılıkla ortaya çıkar. Ayrıca, bir cephede Hava Gözetimi üretim yöntemi kullanılırken, bir #b Pilot#! etkinlik yoluyla savaşta ortaya çıkabilir. Uçaklar ve Modern Havacılık gibi gelişmiş teknolojiler, ayrıca Kararlarla Pilot Okulu kurulması, karakterin #b Pilot#! özelliğine sahip olma şansını artırır.\n#b Pilotlar#! size farklı şekillerde yardımcı olur. #b Havayolları#!, imajlarını güçlendirmek için #b Pilotlara#! ihtiyaç duyabilir; [concept_curtiss_schneider_trophy] yarışında deneyimli #b Pilotlar#! daha yüksek şansa sahiptir; ve [concept_curtiss_arctic_expedition] için #b Pilot#! gereklidir. #b Pilotlar#! bir etkinlikle usta pilotlara yükseltilebilir."
 concept_curtiss_airport: "Havaalanı"
 concept_curtiss_airports: "Havaalanları"
 concept_curtiss_airport_desc: "#b Havaalanı#!, #b Modern Havacılık#! Teknolojisiyle açılan bir binadır. Tamamen sivil bir binadır ve [GetGoods('air_travel').GetName] ve #b Hizmetler#! sağlar, ancak [GetGoods('tools').GetName], [GetGoods('paper').GetName], [GetGoods('aeroplanes').GetName] ve [GetGoods('oil').GetName] dahil çeşitli malları tüketir. Daha sonra [GetGoods('electricity').GetName], [GetGoods('telephones').GetName] ve [GetGoods('radios').GetName] da gerekir.\nYeterince #b Havaalanınız#! varsa bir [concept_curtiss_airline] kurulur ve büyüyen #b Havaalanlarınız#! ile #b Havayolu#! da büyür ve daha fazla bonus sağlar."
 concept_curtiss_airline: "Havayolu"
 concept_curtiss_airlines: "Havayolları"
 concept_curtiss_airline_desc: "#b Havayolu#!, yerel seviyeden uluslararası uçuşlara kadar [GetGoods('air_travel').GetName] sunan bir şirket veya devlet kurumu olabilir. #b Havayolları#! çeşitli bonuslar sağlar. #b Havayolları#!, bu uçuşları gerçekleştirmek için [Concept('concept_curtiss_airport','$concept_curtiss_airports$')]’a ihtiyaç duyar. #b Havaalanlarınız#! büyüdükçe #b Havayolu#! da büyür.\n#b Havayolu#! devlet tarafından işletiliyorsa, dev bir zeplin inşa etme ve uzun mesafeler kat etme fırsatınız olur. #b Havayolu#! özel veya kamuya ait ise, dünyanın en büyük uçağını inşa etme şansınız olabilir."
 concept_curtiss_airspace_convention: "Hava Sahası Konvansiyonu"
 concept_curtiss_airspace_conventions: "Hava Sahası Konvansiyonları"
 concept_curtiss_airspace_convention_desc: "#b Hava Sahası Konvansiyonu#!, etki alanınızdan uzak bölgelerle etkileşimde bulunmanızı sağlayan önemli bir [concept_diplomatic_pact]’tır. Eğer başka bir ülke ile #b Hava Sahası Konvansiyonu#! yapmışsanız ve o ülkenin bir [concept_lepsius_excavation_site]’i varsa, bölgede [concept_active_interest] olmadan [concept_lepsius_expedition] gerçekleştirebilirsiniz.\nBir #b Hava Sahası Konvansiyonu#!, gerekli eyaletlerden birine sahip değilseniz [concept_curtiss_arctic_expedition] göndermenizi sağlar."
 concept_curtiss_schneider_trophy: "Schneider Kupası"
 concept_curtiss_schneider_trophy_desc: "Birinci Dünya Savaşı öncesinde Fransız Jacques Schneider tarafından bağışlanan bu prestijli kupa için mücadele, öncelikle deniz uçaklarının gelişimini teşvik etmek amacıyla yapılmıştır. Zamanla bu kupa yarışı bir uluslar yarışı haline gelmiş, özellikle İngiltere, ABD ve İtalya takımlarına büyük destek vermiştir. Aslında teknolojik gelişim, #b Schneider Kupası#! için daha hızlı ve gelişmiş deniz uçakları kullanımıyla ilerlemiştir.\n#b Schneider Kupası#!, 5 ülke #b Deniz Uçakları#! Teknolojisini icat etmişse ve bir limana ve eyaletlerinizden birinde seviye 10 şehir merkezine sahipseniz kurulabilir.\nKupanın kazananı bir günlük kaydı ve çeşitli faktörlerle belirlenir. Örneğin, pilot okulu ve büyük bir [concept_curtiss_airline] olan bir ülke avantajlıdır. Harika bir [concept_curtiss_pilot] ve bol finansman da kazanmayı kolaylaştırır.\nSon Kupayı kazanan ülke, limana sahip veya çok sayıda göle sahip İsviçre ise bir sonraki yarışa ev sahipliği yapabilir. Kupanın üst üste 3 kez kazanılması daha iyidir; ülke kupayı kalıcı olarak alır ve prestij bonusu kazanır."
 concept_curtiss_balloonist: "Baloncu"
 concept_curtiss_balloonist_desc: "Bu karakter, maceralı balon uçuşlarına sıkça çıkan bir baloncudur."
 concept_curtiss_experienced_balloonist: "Deneyimli Baloncu"
 concept_curtiss_experienced_balloonist_desc: "Bu karakter, maceralı balon uçuşlarına sıkça çıkan deneyimli bir baloncudur. Bu özelliğe sahip karakterler, daha iyi rekorlar kırma olasılığına sahiptir."
 concept_curtiss_famous_balloonist: "Ünlü Baloncu"
 concept_curtiss_famous_balloonist_desc: "Bu karakter, maceralı balon uçuşlarına sıkça çıkan ünlü bir baloncudur. Bu özelliğe sahip karakterler, daha iyi rekorlar kırma olasılığına sahiptir."
 concept_dubois_natural_history: "Doğa Tarihi"
 concept_dubois_natural_history_desc: "#b Doğa Tarihi#!, [concept_morgenroete]’nin temel özelliklerinden biridir. 19. yüzyıl, birçok büyük doğa tarihi keşfine sahne olmuştur: Beagle seferi gibi büyük keşifler, evrim teorisinin icadı, yüzbinlerce yeni türün keşfi ve elbette dinozorların keşfi.\n\nDonanmalı ve amirali olan Büyük Güçler ve Majör Güçler, bir gemiyi [concept_dubois_pacific_expedition]’e gönderebilir. #b Pasifik Seferi#! sırasında nadir bitkiler, hayvanlar ve fosiller bulabilir, okyanus araştırmaları yapabilir veya güneş tutulmaları gibi astronomik olayları gözlemleyebilirsiniz.\n\nBulduğunuz büyük hayvanlar, [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')], bir [concept_dubois_zoo] inşa etmek ve sergilemek için kullanılabilir. Ne kadar çok hayvan olursa, #b Hayvanat Bahçesi#! o kadar etkili olur. Bu #b Hayvanlar#!’ı Seferlerde bulabilir, kendi topraklarınızda toplayabilir veya diğer ülkelerden satın alabilirsiniz.\n\nKüçük hayvanlar, bitkiler ve diğer organizmalar [concept_dubois_specimen] olarak adlandırılır. Bir [concept_dubois_naturalist], bu #b Örnekleri#! toplayabilir. #GREEN #b Doğabilimci#!#!, yağmur ormanı modifikasyonuna sahip eyaletlerde [Concept('concept_dubois_botanical_expedition','$concept_dubois_botanical_expeditions$')]’e gönderilebilir. Böyle bir eyaletiniz yoksa, başka bir ülkeden [concept_dubois_botanical_licence] alabilirsiniz. #GREEN #b Doğabilimci#!#! nadir örnekler bulduklarında [concept_academics_experience] kazanır.\n\n[Concept('concept_dubois_fossil','$concept_dubois_fossils$')] bir [concept_dubois_paleontologist]’in çalışma alanıdır; bitki, böcek veya küçük hayvan fosilleri olabilir. #b Fosiller#! #b Seferlerde#! veya [Concept('concept_dubois_formation','$concept_dubois_formations$')] olan eyaletlerde bulunabilir. Eğer #b Büyük Formasyon#! varsa, [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] bile bulabilirsiniz. Aksi halde bir [concept_dubois_paleontological_licence] satın alarak erişim sağlayabilirsiniz.\n\nÜlkenizin bir dağ sırasına erişimi varsa, bir general [concept_douglas_mountaineering]’e katılabilir ve daha iyi özellikler ile prestij bonusu kazanabilir."
 concept_dubois_naturalist: "#b #GREEN Doğabilimci#!#!"
 concept_dubois_naturalists: "#b #GREEN Doğabilimciler#!#!"
 concept_dubois_naturalist_desc: "#b #GREEN Doğabilimci#!#!, [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] ve [concept_dubois_specimen] toplayabilen akademisyenlerdir. #b #GREEN Doğabilimciler#!#!, [concept_dubois_pacific_expedition] veya [concept_dubois_botanical_expedition]’e gönderilebilir ve nadir bitki ve hayvanlar bularak küçük bonuslar sağlar. #b #GREEN Doğabilimciler#!#! yeni nadir örnekler bulduklarında [concept_academics_experience] kazanır."
 concept_dubois_paleontologist: "#b #GREEN Paleontolog#!#!"
 concept_dubois_paleontologists: "#b #GREEN Paleontologlar#!#!"
 concept_dubois_paleontologist_desc: "#b #GREEN Paleontologlar#!#!, [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] ve [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] için kazı yapan akademisyenlerdir. Bunları toplamak için bir [concept_dubois_formation]’a erişiminiz olmalıdır. Eğer #b Formasyon#!’a erişiminiz varsa, ister kendiniz sahip olun, ister bir [concept_dubois_paleontological_licence] ile, #b Paleontolog#!’unuzu [concept_dubois_paleontological_expedition]’e gönderebilirsiniz.\n5 #b Dinozor Kemiği#! topladıktan veya yeniden yapılandırdıktan sonra, #b Paleontolog#! bir [concept_dubois_dinosaur_skeleton] inşa edebilir. #b #GREEN Paleontologlar#!#! [concept_academics_experience] kazandıkça, #b Dinozor İskeletleri#!’ni daha iyi yeniden yapılandıracak ve #b iskeletler#! de daha kaliteli hale gelecektir. #b Dinozor İskeletleri#! ne kadar iyi olursa, [concept_dubois_paleontological_collection]’ınızın sağladığı prestij o kadar artar."
 concept_dubois_pacific_expedition: "Pasifik Seferi"
 concept_dubois_pacific_expeditions: "Pasifik Seferleri"
 concept_dubois_pacific_expedition_desc: "Bir Büyük veya Majör Güç olarak Pasifik Okyanusu’na bir Sefer gönderebilirsiniz. Bunun için #b Empirizm#!, #b Vidalı Fırkateyn#! ve #b Diyalektik Teknolojisi#! araştırılmış olmalı, bir Liman ve Üniversiteye sahip olmalı ve en az 15 gemilik bir Donanma ile bir Amiral gereklidir.\n#b Pasifik Seferi#! sırasında nadir bitkiler, [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] ve [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] bulabilir, okyanus araştırmaları yapabilir veya güneş tutulmaları gibi astronomik olayları gözlemleyebilirsiniz. #b Sefer#! başında bir #b Bilim İnsanı#! seçebilirsiniz; bir #b Haritacı#!, [concept_dubois_naturalist], [concept_dubois_paleontologist] veya [concept_verrier_astronomer]. Her biri, kendi uzmanlık alanına bağlı etkinliklerde daha iyi sonuçlar getirir.\nSeferinizin hangi alana odaklanacağını seçebilirsiniz. Tamamen denizin gizemlerine adanabilir ve okyanus ile astronomi bilginizi artırabilirsiniz; bu durumda sadece okyanus etkinlikleri tetiklenir. Doğanın harikalarını keşfederken botanik, zooloji ve paleontoloji etkinlikleri ile karşılaşırsınız. Büyük Güçler ayrıca prestij görevine katılabilir, bu görevde artefakt bulabilir, ticaret üsleri kurabilir veya misyonlar oluşturabilirsiniz - özellikle Okyanusya’da diplomatik ilginiz yoksa ama en azından küçük bir koloni edinmek istiyorsanız faydalıdır.\nGörevinizin tam olarak nereye gideceğini de seçmeniz gerekir: Okyanusya, Avustralya veya Endonezya. Her biri farklı etkinlikler ve ödüller sunar."
 concept_dubois_habitat: "Habitat"
 concept_dubois_habitats: "Habitats"
 concept_dubois_animal_habitat: "Hayvan Habitatı"
 concept_dubois_habitat_desc: "#b Habitat#!, belirli bir [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')]’ın yaşadığı bir eyalet bölgesidir. #r Morgenröte#!’de farklı hayvanlar için #b Habitat#!’lar çeşitli Eyalet Bölgelerinde bulunur. Bir #b Habitat#!’a sahip olursanız, #b Hayvanlar#!’ı [concept_dubois_zoo]’ya taşıyabilir veya diğer ülkelere satabilirsiniz.\n\nEyaletiniz [concept_urbanization] 2000 veya daha yüksek seviyeye ulaşırsa veya artık [concept_arable_land] kalmazsa, #b Egzotik Hayvanlar#! 10 yıl sonra #n yok olur#!.\n\n#b Hayvanlar#!’ı yok olmaktan kurtarmak için #b Habitat#!’a sahip bir eyalette [concept_dubois_nature_reserve] inşa edebilirsiniz."
 concept_dubois_nature_reserve: "Doğa Koruma Alanı"
 concept_dubois_nature_reserves: "Doğa Koruma Alanları"
 concept_dubois_royal_hunting_reserve: "Kraliyet Av Alanı"
 concept_dubois_nature_reserve_desc: "#b Doğa Koruma Alanı#!, [Concept('concept_dubois_habitat','$concept_dubois_habitats$')]’ları koruyabileceğiniz veya oluşturabileceğiniz koruma alanıdır.\n\nZaten bir #b Habitat#!’a sahipseniz, insan etkisinden dolayı yok olmasını önlemek için #b Doğa Koruma Alanı#! binasını o eyalette inşa edebilirsiniz. Bir #b Doğa Koruma Alanı#! inşa etmek için #b Genetik#! teknolojisini açmış olmalı ve birincil kültürlerinizden birinin anavatanında #b Habitat#! bulunan bir eyaletiniz olmalıdır.\n\n#b Habitat#!’a sahip değilseniz, ülkenizi inceleyerek #b Doğa Koruma Alanı#! inşa edebilirsiniz; bunun için #b Genetik#! teknolojisinin açılmış olması ve [concept_dubois_zoo]’nuzda kendi kıtanızdan en az bir [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animal$')] bulunmalıdır.\n\n#b Doğa Koruma Alanı#! sadece hayvan #b Habitat#!’larınızı korumaz, aynı zamanda kıtanızdan #b Egzotik Hayvanlar#!’ı yerleştirmenizi de sağlar. Böylece kıtanızdaki tüm #b Egzotik Hayvanlar#!’ı tek bir eyalette koruyabilirsiniz."
 concept_dubois_zoo_animal: "Hayvanat Bahçesi Hayvanı"
 concept_dubois_zoo_animals: "Hayvanat Bahçesi Hayvanları"
 concept_dubois_exotic_animal: "Egzotik Hayvan"
 concept_dubois_exotic_animals: "Egzotik Hayvanlar"
 concept_dubois_zoo_animal_desc: "Dünyada, [concept_dubois_naturalist]’ınızın yakalayabileceği birçok hayvan vardır. Bir #b Egzotik Hayvan#! yakalamak için bir eyalette [concept_dubois_habitat] bulunmalıdır. Alternatif olarak, #b Habitat#!’a sahip bir ülkeden #b Egzotik Hayvan#! satın alabilirsiniz.\nYakalandıktan sonra, #b Hayvanat Bahçesi Hayvanları#! [concept_dubois_zoo]’ya gönderilebilir ve #b Hayvanat Bahçesi#!’nin genişlemesini sağlar."
 concept_dubois_zoo: "Hayvanat Bahçesi"
 concept_dubois_zoos: "Hayvanat Bahçeleri"
 concept_dubois_zoo_desc: "#b Hayvanat Bahçesi#!, 5 [concept_dubois_zoo_animal] topladıktan sonra inşa edebileceğiniz özel bir binadır. #b Hayvanat Bahçesi#!, #b Hayvanlar#!’ınızı, [concept_dubois_specimen] koleksiyonunuzu ve Paleontoloji Koleksiyonunuzu barındırır."
 concept_dubois_specimen: "Örnek"
 concept_dubois_specimens: "Örnekler"
 concept_dubois_specimen_desc: "[concept_dubois_naturalist]’in toplayabileceği çeşitli böcekler, bitkiler ve küçük hayvanlar #b Örnek#! olarak adlandırılır. #b Örnek#!’leri, [concept_dubois_zoo]’nuzda bir Botanik Bahçesi veya Örnek Koleksiyonu inşa etmek için kullanabilirsiniz."
 concept_dubois_botanical_expedition: "Botanik Seferi"
 concept_dubois_botanical_expeditions: "Botanik Seferleri"
 concept_dubois_botanical_expedition_desc: "Hem #b Evrim Teorisi#! hem de #b Sıtma Önleme#! araştırılmışsa ve bir yağmur ormanı eyaletine erişiminiz varsa, bir [concept_dubois_naturalist]’ı #b Botanik Seferi#!’ne gönderebilirsiniz; bu erişim ya bir eyalete sahip olarak ya da bir [concept_dubois_botanical_licence] alarak sağlanabilir.\n#b Naturalist#!, #b Botanik Seferi#! sırasında her yıl pasif olarak [concept_dubois_specimen] toplayacaktır. Bazen nadir bir bitki bulur ve bu, [concept_dubois_zoo]’nuzun botanik koleksiyonuna büyük katkı sağlar."
 concept_dubois_botanical_licence: "Botanik Lisansı"
 concept_dubois_botanical_licences: "Botanik Lisansları"
 concept_dubois_botanical_licence_desc: "Yağmur ormanı eyaletine erişiminiz yoksa, yine de bir [concept_dubois_botanical_expedition] gönderebilirsiniz; bunun için #b Botanik Lisansı#! almanız gerekir. Küçük bir ödeme yapmanız gerekecek ama böylece [Concept('concept_dubois_specimen','$concept_dubois_specimens$')] toplayabilir ve nadir bitkiler bulabilirsiniz."
 concept_dubois_fossil: "Fosil"
 concept_dubois_fossils: "Fosiller"
 concept_dubois_fossil_desc: "Bir [concept_dubois_paleontologist], uzun zaman önce soyu tükenmiş bitki ve hayvan #b Fosilleri#! keşfedebilir; bunun için bir [concept_dubois_formation] açılmış olmalıdır."
 concept_dubois_dinosaur_bone: "Dinozor Kemiği"
 concept_dubois_dinosaur_bones: "Dinozor Kemikleri"
 concept_dubois_dinosaur_bone_desc: "Bir [concept_dubois_paleontologist], Büyük [Concept('concept_dubois_formation','$concept_dubois_formations$')]’larda Dinozor Kemikleri bulabilir.\n#b Deneyimli Paleontolog#! ayrıca 20 [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] parçasından bir #b Dinozor Kemiği#! yeniden yapılandırmayı deneyebilir. Bir #b Dinozor Kemiği#! yalnızca yönlendirme için en az bir dinozor kemiği mevcutsa yeniden yapılandırılabilir.\nPaleontologun yorgun veya meşgul olmaması gerekir. Başarı büyük ölçüde paleontolojik [concept_academics_experience]’a bağlıdır.\n#b Dinozor Kemikleri#!, [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')]’i yeniden yapılandırmak için kullanılır."
 concept_dubois_dinosaur_skeleton: "Dinozor İskeleti"
 concept_dubois_dinosaur_skeletons: "Dinozor İskeletleri"
 concept_dubois_dinosaur_skeleton_desc: "Bir kıta bölgesinden beş [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] ile bir [concept_dubois_paleontologist] tam bir dinozor iskeleti oluşturabilir. Bir #b Dinozor İskeleti#! inşa etmek için aynı bölgeden 5 #b Dinozor Kemiği#! gereklidir.\nUmarız #b Paleontolog#! yeterince deneyimlidir ve #b Dinozor İskeleti#! doğru şekilde inşa edilir. Aksi takdirde [concept_dubois_paleontological_collection]’ınız için prestij kaybı riski olabilir. Yanlış inşa edilen bir #b Dinozor İskeleti#!, başka bir #b Paleontolog#! tarafından düzeltilerek daha iyi bir rekonstrüksiyon yapılabilir."
 concept_dubois_paleontological_collection: "Paleontoloji Koleksiyonu"
 concept_dubois_paleontological_collections: "Paleontoloji Koleksiyonları"
 concept_dubois_paleontological_collection_desc: "#b Paleontoloji Koleksiyonu#!, [concept_dubois_paleontologist]’unuzun alanıdır. Burada tüm [Concept('concept_dubois_fossil','$concept_dubois_fossils$')], [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] ve [Concept('concept_dubois_dinosaur_skeleton','$concept_dubois_dinosaur_skeletons$')]’larınızı bulabilirsiniz.\n#b Paleontolog#!, #b Dinozor İskeletleri#!’ni ne kadar iyi monte ederse, #b Koleksiyon#! o kadar prestij sağlar. #b Paleontolog#!, #b İskeletler#!’i kötü monte ederse prestij kaybedebilirsiniz. Ancak aynı veya başka bir #b Paleontolog#! bunları daha iyi monte edebilir!"
 concept_dubois_formation: "Formasyon"
 concept_dubois_formations: "Formasyonlar"
 concept_dubois_geological_formation: "Jeolojik Formasyon"
 concept_dubois_formation_desc: "İki tür #b Formasyon#! vardır; normal Formasyonlar [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] toplamanızı sağlar, Büyük Formasyonlar ise [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] keşfetmeye imkan verir.\n#b Formasyon#!’lar, Paleontologunuz tarafından veya Paleontoloji Teknolojisi araştırıldığında açığa çıkarılabilir.\nKendi #b Büyük Formasyon#!’unuz yoksa, bir ülkeden [concept_dubois_paleontological_licence] satın alarak erişim sağlayabilirsiniz."
 concept_dubois_paleontological_expedition: "Paleontoloji Seferi"
 concept_dubois_paleontological_expeditions: "Paleontoloji Seferleri"
 concept_dubois_paleontological_licence: "Paleontoloji Lisansı"
 concept_dubois_paleontological_licences: "Paleontoloji Lisansları"
 concept_dubois_paleontological_licence_desc: "Bir [concept_dubois_formation]’a erişiminiz yoksa, #b Paleontoloji Lisansı#! ile erişim sağlamayı deneyebilirsiniz. Bu diplomatik eylem, #b Büyük Formasyon#!’a erişim kazandırır. Kullanabilmek için Büyük veya Majör Güç olmanız ve diğer ülkenin #b Büyük Formasyon#!’a sahip olması gerekir. Diğer ülkeye gelirinize göre küçük bir miktar ödeme yapmanız gerekecek, fakat buna değer olacaktır."
 concept_dubois_mountain: "Dağ"
 concept_dubois_mountains: "Dağlar"
 concept_dubois_mountain_desc: "Tırmanılabilecek birçok #b Dağ#! vardır.\n\n#V Kuzey Amerika:#!\n#b Mount McKinley#! (Alaska), 6190 metre\n#b Mount Logan#! (Yukon Territory), 5959 metre\n#b Citlaltépetl#! (Meksika), 5636 metre\n#b Mount Whitney#! (California), 4421 metre\n\n#V Güney Amerika:#!\n#b Aconcagua#! (Mendoza), 6267 metre\n#b Huascarán#! (Lima Territory), 6768 metre\n#b Illimani#! (La Paz), 6438 metre\n#b Chimborazo#! (Ekvador), 6267 metre\n\n#V Avrupa:#!\n#b Shkara#! (Büyük Kafkaslar), 5642 metre\n#b Dufourspitze#! (Dufourspitze), 4634 metre\n#b Matterhorn#! (Batı İsviçre), 4478 metre\n#b Aiguille Verte#! (Savoie), 4122 metre\n#b Pico de Aneto#! (Aragon), 3404 metre\n\n#V Afrika:#!\n#b Kibo#! (Tanganyika), 5895 metre\n#b Mount Kenya#! (Kenya), 5199 metre\n#b Mount Stanley#! (Uganda), 5109 metre\n#b Kamerunberg#! (Güney Kamerun), 4095 metre\n\n#V Asya:#!\n#b Kamet#! (Delhi), 7756 metre\n#b Chogolisa#! (Keşmir), 7665 metre\n#b Kabru#! (Himalayalar), 7412 metre\n#b Kaufmann Peak#! (Tacikistan), 7134 metre\n\n#V Avustralya & Okyanusya:#!\n#b Mount Wilhelm#! (Doğu Yeni Gine), 4121 metre\n#b Mount Cook#! (Güney Adası), 3724 metre"
 concept_elgar_music: "Müzik Kültürü"
 concept_elgar_opera: "Opera"
 concept_elgar_operas: "Operalar"
 concept_elgar_opera_house: "Opera Binası"
 concept_elgar_opera_houses: "Opera Binaları"
 concept_elgar_musical_tradition: "Müzikal Gelenek"
 concept_elgar_impressionism: "Empresyonizm"
 concept_elgar_expressionism: "Ekspresyonizm"
 concept_elgar_art_nouveau: "Art Nouveau"
 concept_elgar_architecture: "Mimarlık"
 concept_elgar_architectural_project: "Mimari Proje"
 concept_elgar_architectural_projects: "Mimari Projeler"
 concept_lepsius_archaeology: "Arkeoloji"
 concept_lepsius_archaeology_desc: "#b Arkeoloji#!, [concept_morgenroete]’nin ana özelliklerinden biridir.\n\nHaritada 8 adet [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')] bulunmaktadır.\n\nBir [concept_lepsius_expedition] gönderebilmek için Antikacılık Teknolojisi’ni araştırmalı, bir [concept_lepsius_archaeological_team]’e sahip olmalı ve kazı alanlarından birine erişiminiz olmalıdır. Erişimi ya kendiniz alabilir ya da kazı alanına sahip bir ülkeden [concept_lepsius_excavation_licence] isteyebilirsiniz.\n\nArtık bir Arkeolojik seferi Kazı Alanlarından birine gönderebilirsiniz. Ekibiniz [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] keşfedecek ve çok nadir durumlarda iyi bir [concept_lepsius_archaeologist] yardımıyla bir [concept_lepsius_major_artifact] bile bulabilirsiniz.\n\nEkibiniz eserlerle döndüğünde, bir [concept_lepsius_museum] inşa edebilirsiniz. Arkeoloji Müzesi’nde eserlerinizi görebilir, [concept_lepsius_exhibition] oluşturabilir ve #b #BLUE Arkeolog#!#!’larınızı ziyaret edebilirsiniz.\n\nNe kadar çok eser ve sergiye sahip olursanız, o kadar fazla prestij kazanırsınız.\n\n#b Antropoloji#!, Arkeoloji’nin bir diğer parçasıdır. Eğer bir [concept_lepsius_anthropologist] ve bir [concept_lepsius_cave]’a sahipseniz, [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils$')] bulabilir ve tarih öncesi insan türlerini yeniden oluşturabilirsiniz. Her iskelet size daha fazla antropolojik prestij kazandırır. Yeterli antropolojik prestij ile ülkeniz için bir prestij modifikatörü elde edersiniz."
 concept_lepsius_archaeologist: "#b #BLUE Arkeolog#!#!"
 concept_lepsius_archaeologists: "#b #BLUE Arkeologlar#!#!"
 concept_lepsius_archaeologist_desc: "#b #BLUE Arkeologlar#!#!, [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')]’a gönderilebilecek Akademisyenlerdir. Orada [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] toplayacaklar. Bazen bir [concept_lepsius_major_artifact] bile bulabilirler.\nArkeologlar çalışmalar sırasında ve her yıl pasif olarak [concept_academics_experience] kazanır. Yeterli #b Deneyim#! kazandıklarında arkeolog özelliği seviyelerini yükseltebilirler."
 concept_lepsius_anthropologist: "#b #BLUE Antropolog#!#!"
 concept_lepsius_anthropologists: "#b #BLUE Antropologlar#!#!"
 concept_lepsius_anthropologist_desc: "#b #BLUE Antropologlar#!#!, insan prehistorisini, hem paleontolojik hem de arkeolojik açıdan inceleyen akademisyenlerdir. [Concept('concept_lepsius_cave','$concept_lepsius_caves$')]’de [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils$')] ararlar veya daha önce bilinmeyen kemikleri tanımlarlar. Üç #b İnsan Fosili#!, pre-insan türünü yeniden oluşturmak için yeterlidir. Kemiklerin bulunması ve tanımlanması, erken insan türlerinin sistematizasyonu antropolojik prestij kazandırır. Mağaraları keşfederken yerel eserleri de bulabilirler."
 concept_lepsius_museum: "Arkeoloji Müzesi"
 concept_lepsius_museum_desc: "#b Arkeoloji Müzesi#!, ülkenizin bulduğu tüm [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]’i sergileyebileceğiniz bir binadır."
 concept_lepsius_excavation_site: "Tarihi Kazı Alanı"
 concept_lepsius_excavation_sites: "Tarihi Kazı Alanları"
 concept_lepsius_excavation_site_desc: "Farklı ülkelerde birçok #b Tarihi Kazı Alanı#! bulunmaktadır: Yukarı ve Aşağı Mısır, Babil, Asur, Girit, Argolis, Yucatán ve Peru. Her #b Tarihi Alan#! farklı [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] ve Etkinlikler sunar."
 concept_lepsius_expedition: "Arkeolojik Sefer"
 concept_lepsius_expeditions: "Arkeolojik Seferler"
 concept_lepsius_expedition_desc: "Bir #b Arkeolojik Sefer#!, bir [concept_lepsius_archaeologist] ve onun [concept_lepsius_archaeological_team]’i ile düzenlenen bir seferdir. Bu seferler, mümkün olduğunca çok [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] toplamak için birkaç ay sürebilir. #b Seferler#!, [Concept('concept_lepsius_major_artifact','$concept_lepsius_major_artifacts$')]’i elde etmenin tek yoludur.\nErken Arkeoloji teknolojisini araştırdıysanız, başarılı bir #b Sefer#! sonrasında ekibinizi #b Kazı#! yapmak üzere alanda bırakabilirsiniz."
 concept_lepsius_archaeological_team: "Arkeolojik Ekip"
 concept_lepsius_archaeological_teams: "Arkeolojik Ekipler"
 concept_lepsius_excavation_team: "Kazı Ekibi"
 concept_lepsius_archaeological_team_desc: "Bir veya daha fazla #b Arkeolojik Ekip#! olmadan [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] düzenleyemezsiniz. Maksimum 3 #b Arkeolojik Ekip#! edinebilirsiniz, fakat her birinin gereksinimleri artar.\n\nİlk #b Ekibinizi#!, Antikacılık Teknolojisi’ni araştırmış, en az seviye 3 Üniversiteye ve %33 Okuryazarlığa sahip olarak alabilirsiniz.\n\nBaşka bir Ekip, Modern Arkeoloji Teknolojisi’ni araştırmış, en az seviye 15 Üniversiteye ve %66 Okuryazarlığa sahip olduğunuzda edinilebilir.\n\nBir başka #b Ekip#!, Antikacılık Teknolojisi araştırılmış ve Deneyimli bir [concept_lepsius_archaeologist] mevcutsa edinilebilir.\n\n#b Ekipler#!, [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] ve [Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')] için gereklidir."
 concept_lepsius_excavation_licence: "Kazı Lisansı"
 concept_lepsius_excavation_licences: "Kazı Lisansları"
 concept_lepsius_excavation_licence_desc: "Bazı [Concept('concept_lepsius_excavation_site','$concept_lepsius_excavation_sites$')]’lara sahip değilseniz, #b Kazı Lisansı#! Diplomatik Eylemi ile erişim sağlayabilirsiniz.\n#b Kazı Lisansı#! almak için en az Büyük Güç olmalı ve Bölge’de [concept_active_interest]’e sahip olmalısınız.\nDiğer ülkeye, #b Kazı Lisansı#! için küçük bir ödeme yapmanız gerekecektir."
 concept_lepsius_artifact: "Eser"
 concept_lepsius_artifacts: "Eserler"
 concept_lepsius_minor_artifact: "Küçük Eser"
 concept_lepsius_minor_artifacts: "Küçük Eserler"
 concept_lepsius_oceanic_artifact: "Okyanus Eseri"
 concept_lepsius_oceanic_artifacts: "Okyanus Eserleri"
 concept_lepsius_artifact_desc: "Eserleri, [Concept('concept_lepsius_archaeological_team','$concept_lepsius_archaeological_teams$')]’i [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')], [Concept('concept_lepsius_excavation','$concept_lepsius_excavations$')], [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] veya Etkinlikler yoluyla göndererek elde edebilirsiniz.\n\nGenellikle Küçük #b Eserler#! elde edersiniz. Bu Küçük #b Eserler#!, [concept_lepsius_museum]’unuzda [Concept('concept_lepsius_exhibition','$concept_lepsius_exhibitions$')] yapmak için kullanılabilir.\n\n[Concept('concept_lepsius_major_artifact','$concept_lepsius_major_artifacts$')] ise tekil #b Eserler#!dir ve benzersiz bir isme sahiptir. Genellikle Seferler, kazılar ve Arkeolojik Keşifler sırasında bulunabilirler."
 concept_lepsius_major_artifact: "Büyük Eser"
 concept_lepsius_major_artifacts: "Büyük Eserler"
 concept_lepsius_major_artifact_desc: "#b Büyük Eserler#!, bir isme ve kimliğe sahip özel [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')]’dir.\n#b Büyük Eserler#! farklı şekillerde bulunabilir. Bazılarını [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] sırasında bulabilirsiniz. Bazıları için sürekli bir [concept_lepsius_excavation] yürütmeniz gerekir. Bazıları ise büyük bir keşifte ortaya çıkar.\nBir #b Büyük Eser#!’i bir ülkeden izinsiz almak diplomatik bir olaya neden olabilir ve sahip olmaktan daha zararlı olabilir. Öte yandan, #b Büyük Eserler#! ile [Concept('concept_lepsius_exhibition','$concept_lepsius_excellent_exhibition$')] oluşturabilir ve büyük prestij bonusu kazanabilirsiniz; bazı [Concept('concept_academics_academic_mission','$concept_academics_academic_missions$')] için gereklidir."
 concept_lepsius_exhibition: "Sergi"
 concept_lepsius_exhibitions: "Sergiler"
 concept_lepsius_excellent_exhibition: "Mükemmel Sergi"
 concept_lepsius_excavation: "Kazı"
 concept_lepsius_excavations: "Kazılar"
 concept_lepsius_excavation_desc: "Erken Arkeoloji teknolojisini araştırdıysanız ve bir [concept_lepsius_expedition] tamamladıysanız, [concept_lepsius_archaeological_team]’inizi alanda bırakıp pasif olarak [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] çıkarabilirsiniz. Ekibinizi her zaman #b Kazı#!’dan geri çağırabilirsiniz."
 concept_lepsius_human_fossil: "İnsan Fosili"
 concept_lepsius_human_fossils: "İnsan Fosilleri"
 concept_lepsius_human_fossils_fossils: "Fosiller"
 concept_lepsius_human_bones: "İnsan Kemikleri"
 concept_lepsius_human_fossil_desc: "#b İnsan Fosilleri#!, beş farklı türden birine aittir: Cro-Magnon, Neandertal, Homo Erectus, Australopithecus veya Paranthropus. [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] bu fosilleri [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] içinde bulabilir ve (genellikle) hemen tanımlayıp sınıflandırabilir. Ancak İnsan Fosilleri nadiren arkeologlar ve paleontologlar tarafından bulunabilir. Sadece #b #BLUE Antropologlar#!#! bu 'bilinmeyen insan fosillerini' doğru şekilde tanıyabilir. Üç kemik bir türü tamamlar ve antropolojik prestij kazandırır. Erken bir insan türünün ilk sınıflandırması, çok daha fazla prestij sağlar. İnsan Fosilleri, istenildiği kadar tamamlanabilir."
 concept_lepsius_cave: "Mağara"
 concept_lepsius_caves: "Mağaralar"
 concept_lepsius_cave_desc: "#b Tarih Öncesi Mağaralar#!, erken insan veya insan öncesi türlerin [Concept('concept_lepsius_human_fossil','$concept_lepsius_human_fossils_fossils$')] ve daha gelişmiş türlerde aletler bırakmış olabileceği yerlerdir. Mağaralar [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] tarafından keşfedilip araştırılabilir. Bazı Mağaralar ayrıca tarihi olaylar aracılığıyla açılır. Her Mağarada yalnızca bir türün fosilleri bulunur – bu, Cro-Magnon insanları ve Neandertallerin kemiklerinin aynı Mağarada bulunamayacağı anlamına gelir. Bazı Mağaralar tarihsel, bazıları ise oyunun başında Afrika, Asya ve Avrupa kıtalarından birinde rastgele dağıtılmıştır. Fosiller, insan öncesi türlerin dağılım alanına göre yaklaşık olarak yerleştirilmiştir – örneğin Australopithecus sadece Afrika’da bulunur."
 concept_verrier_astronomy: "Astronomi"
 concept_verrier_observatory: "Gözlemevi"
 concept_verrier_observatories: "Gözlemevleri"
 concept_verrier_astronomer: "#b #ORANGE Astronom#!#!"
 concept_verrier_astronomers: "#b #ORANGE Astronomlar#!#!"
 concept_verrier_astronomical_object: "Astronomik Cisim"
 concept_verrier_astronomical_objects: "Astronomik Cisimler"
 concept_verrier_astronomical_object_icon: "@verrier_astronomicalobject!"
 concept_verrier_celestial_body: "Göksel Cisim"
 concept_verrier_celestial_bodies: "Göksel Cisimler"
 concept_verrier_comet: "Büyük Kuyruklu Yıldız"
 concept_verrier_comets: "Büyük Kuyruklu Yıldızlar"
 concept_verrier_comet_desc: "Victoria Dönemi’nde birkaç #b Büyük Kuyruklu Yıldız#! halkın geniş ilgisini çekmiştir. Eğer bir [concept_verrier_astronomer]’ınız varsa, bu #b Büyük Kuyruklu Yıldız#!’lardan birini ilk keşfetme şansınız vardır ve bu, Prestij ve Araştırma bonusu sağlar."
 concept_verrier_moon_photo: "Ay Fotoğrafı"
 concept_verrier_moon_photos: "Ay Fotoğrafları"
 concept_rapanui_christian_mission: "Hristiyan Misyonu"
 concept_rapanui_christian_missions: "Hristiyan Misyonları"
 concept_rapanui_christian_mission_desc: "[Concept('concept_major_power','$concept_major_powers$')] veya [Concept('concept_great_power','$concept_great_powers$')], Okyanusya’da [Concept('concept_interest','$concept_interests$')] sahibi ise, bölgedeki merkezi olmayan bir ada ulusunu dönüştürmeye çalışabilir – ancak bu yalnızca ülkeniz çok laik değilse ve “dindar” çıkar grubu çok zayıf değilse mümkündür.\n\nVaaz üç aşamada gerçekleşir. Misyoneri gönderirseniz, misyoner ya iyi karşılanır, ya görmezden gelinir ya da hemen öldürülür. Misyon başarısız olursa, yeni bir misyoner bulmak için birkaç yıl beklemeniz gerekir. Sonrasında misyoneriniz yılda %1 nüfusu dönüştürür. Dönüşümü destekleyen veya engelleyen olaylar olabilir.\n\nİkinci aşama, yerli nüfusun %30’unu dönüştürdüğünüzde başlar. Artık Misyon İstasyonunuz kalıcı hale gelir. Eğer yerli nüfusun %51’i Hristiyanlığı kabul ederse, şef sizin dininize geçer ve [concept_protectorate] olarak korumanıza girer. Yıllar sonra, sıtmayı önleme teknolojiniz varsa bu bölgeler ilhak edilebilir.\n\nÜçüncü aşamada Günlük Kaydı aracılığıyla aktif kararlar alabilirsiniz. Ya misyonu doğrudan güçlendirip ek misyonerler gönderir, ya da ticaret yapmayı denersiniz. Bu sayede nadir [Concept('concept_lepsius_artifact','$concept_lepsius_oceanic_artifacts$')], [Concept('concept_dubois_zoo_animal','$concept_dubois_exotic_animals$')] veya zenginlerin yaşam standardını artıran inciler elde edebilirsiniz."
 concept_manzoni_literary_tradition: "Edebi Gelenek"
 concept_klimt_painters: "#PURPLE #b Ressamlar#!#!"
 concept_klimt_painting_tradition: "Resim Geleneği"
 concept_vikelas_sports: "Spor"
 concept_vikelas_sports_desc: "#b Spor#!, [concept_morgenroete]’nin ana özelliklerinden biridir.\n\nBir ülke #b Organize Sporlar#!’ı keşfettiğinde, farklı spor aktivitelerine erişim kazanır. En önemlisi [concept_vikelas_ioc]’nin kuruluşu ve [concept_vikelas_olympic_games]’i organize etmeye başlamasıdır. Olimpiyat Oyunları, ülkenize [concept_prestige] kazandıracak Altın Madalyalar kazanma şansı verir."
 concept_vikelas_olympic_games: "Olimpiyat Oyunları"
 concept_vikelas_olympic_games_desc: "#b Olimpiyat Oyunları#! [concept_vikelas_ioc] kurulduktan sonra her 4 yılda bir gerçekleşebilir. Her seferinde Komite bir #b Ev Sahibi#! seçecektir. Ev sahibi ülke büyük bir [concept_prestige] artışı kazanır.\nOlimpiyat Oyunları sırasında Sporcularınız madalyalar için yarışacak. Alacağınız madalya sayısını etkileyen birçok faktör vardır. Nüfusunuz küçük bir etkiye sahiptir, [concept_sol] daha büyük bir etkiye sahiptir, bazı olaylar şansınızı etkiler ve büyük [Concept('concept_general', '$concept_generals$')] ve büyük [Concept('concept_admiral', '$concept_admirals$')] da etkiler. Ayrıca #b Atlet#! özelliğine sahip karakterler ve #b Spor Tesisleri#! olan Kentler küçük bonuslar sağlar.\nTüm bu faktörler, ülkenizin 12 Altın Madalyadan kaçını alacağını belirler. Her Altın Madalya size 5 [concept_prestige] kazandırır."
 concept_vikelas_ioc: "Uluslararası Olimpiyat Komitesi"
 concept_vikelas_ioc_desc: "A Nation that has researched #V $vikelas_international_sports_tech$#! can found the #b International Olympic Comittee#! or #b IOC#! in short. The IOC will then start organizing the [concept_vikelas_olympic_games]. Each member of the IOC can participate in the Olympic Games.\n The most important members of the IOC are the #b Board Members#!. The Founder of the IOC will become the #b President#! and therefore stay a board member forever while the other members will be elected every 4 years. The Board has space for 5 Great Powers, 2 European, 2 Asian, 2 American, 1 African and 1 Oceanic nation.\nThe main task of the Board Members is choosing the next Host of the Games. There will be 3 candidates (or 4 if a country decides to bribe the Board) to choose from.\nIf Greece founds the IOC, the Olympic Games will only be held in Greece resulting in the Board being less important, as they do not choose the Host."
 concept_lepsius_exhibition_desc: "[concept_lepsius_museum]’unuz, aynı türden yeterli sayıda [Concept('concept_lepsius_artifact','$concept_lepsius_minor_artifacts$')] varsa otomatik olarak Sergiler kuracaktır (her bölge için bir [concept_production_method] şeklinde). Normal Artefaktlar için ilk Sergi 10 veya daha fazla artefakt ile oluşturulur. Daha iyi Sergiler ise 25 (Orta Sergi), 50 (Büyük Sergi) ve 100 Küçük Artefakt (Mükemmel Sergi) ile mümkündür. Mükemmel Sergi ayrıca bir [concept_lepsius_major_artifact] gerektirir.\nYerel Artefaktlar, daha az çeşitli Sergilere sahiptir ve yalnızca normal ve büyük Sergi ile sınırlıdır. Normal Sergi 25 yerel Artefakt, Büyük Sergi ise 50 yerel Artefakt gerektirir."
 concept_vikelas_racer: "Otomobil Yarışçısı"
 concept_vikelas_racers: "Otomobil Yarışçıları"
 concept_vikelas_racer_desc: "Otomobil Yarışçısı, [concept_vikelas_car_racing] etkinliklerine katılan özel bir [concept_character]’dır."
 concept_vikelas_car_racing: "Otomobil Yarışı"
 concept_vikelas_car_racing_desc: "Otomobil Yarışı, [Concept('concept_vikelas_racer','$concept_vikelas_racers$')]’in birbirleriyle yarıştığı bir spordur. Yarışlar pistte veya normal yollarda yapılabilir."
 concept_lepsius_archaeological_exhibition: "Arkeolojik Sergi"
 concept_elgar_opera_desc: "#b Opera#!, bir ülkenin müzik merkezidir. En önemli müzisyenlerin toplandığı ve halk için performans sergilediği yerdir.\n#b Opera#!, Şehir Merkezi en az seviye 5 olduğunda eyaletlerde inşa edilebilen ayrı bir binadır. #b Opera#! müzik üretir ve enstrüman tüketir. Opera seviyeniz ne kadar yüksek olursa, her yıl o kadar fazla [concept_elgar_musical_tradition] üretirsiniz.\nAyrıca bir #b Opera#! ile Opera’yı ziyaret etme gibi bazı kararlar alabilirsiniz."
 concept_elgar_impressionism_desc: "#b Empresyonizm#!, sanat tarihinde sahnenin geçici anlarını atmosferik şekilde tasvir eden bir tarzdır. 19. yüzyılın ikinci yarısında Fransa’daki bir resim hareketinden doğmuştur. Terim, müzik, edebiyat, sinema ve fotoğrafın bazı stilleri için de uygulanmıştır. Heinrich Hart gibi bazı Naturalistler müziği 'gerçek arayan Aktivizm' olarak reddetmişken, Empresyonistler 'nesnesiz hayal gücü' ile incelikle derecelendirilmiş renkli akorları bir zevk olarak görmüştür.\n\nOyunda, #b Empresyonizm#! yalnızca 1000 [concept_elgar_musical_tradition], bir [concept_elgar_opera], güçlü toprak sahipleri, güçlü olmayan sanayiciler ve 5 veya üzeri onay derecesine sahip bir Aydınlar sınıfı gerektiren bir günlük girişi ile açılabilir. #b Empresyonizm#! seçerseniz diğer iki dalı açamazsınız.\n\nOyunda #b Empresyonizm#!’in odak noktası müziktir. Bu nedenle [concept_elgar_musical_tradition] üzerinde en büyük bonusu verir."
 concept_elgar_expressionism_desc: "#b Ekspresyonizm#!, 19. yüzyılın sonlarında başlayan bir sanat tarzıdır. Empresyonizm, Sembolizm ve Fovizm gibi, Ekspresyonizm de Natüralizm’e karşı bir harekettir. Ekspresyonizmde ifade düzeyi estetik, uygulamalı ve gerçekçi düzeyden üstündür. Sanatçı deneyimlerini izleyiciye aktarmak ister. Müzikal empresyonizmin aksine, ekspresyonist sanat insan ruhunun duygularını formüle eder.\n\nOyunda, #b Ekspresyonizm#! yalnızca 1000 [concept_elgar_musical_tradition], bir [concept_elgar_opera], güçlü bir aydınlar veya sendikalar, güçlü olmayan toprak sahipleri ve Aydınlar veya sendikaların 5 veya üzeri onaya sahip olmasıyla açılabilir. #b Ekspresyonizm#! seçerseniz diğer iki dalı açamazsınız.\n\nOyunda #b Ekspresyonizm#! odak noktası edebiyat olacak, ancak henüz uygulanmamıştır."
 concept_elgar_art_nouveau_desc: "#b Art Nouveau#!, #italic Arts and Crafts Movement#!’ten türeyen ve doğal formlardan ilham alan bir sanat tarzıdır. Genellikle dinamizm ve hareketi vurgular ve modern malzemeler kullanır.\n\nOyunda, #b Art Nouveau#! yalnızca 1000 [concept_elgar_musical_tradition], bir [concept_elgar_opera], güçlü sanayiciler ve 5 veya üzeri onaya sahip Aydınlar sınıfı gerektiren bir günlük girişi ile açılabilir. #b Art Nouveau#! seçerseniz diğer iki dalı açamazsınız.\n\n#b Art Nouveau#! ve bu dalın sonraki teknolojisi olan #b Art Déco#!’nun odak noktası Mimarlıktır. Mimari başarılar hakkında çeşitli olaylar ve günlük girişleri alırsınız ve [concept_gaudi_architectural_splendour] kazanabilirsiniz."
 concept_elgar_composer: "#PURPLE #b Besteci#!#!"
 concept_elgar_composers: "#PURPLE #b Besteciler#!#!"
 concept_elgar_composer_desc: "#b Besteciler#!, müzik besteleyen erkek ve kadınlardır. Besteciler, ya olaylardan, yeterli [concept_artistic_progress] kazanarak ulusal olarak yaratılabilir veya bir [concept_elgar_travelling_composer]’a pozisyon teklif ederek elde edilir.\n#b Besteciler#!, [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')] veya [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')] başlatabilir. Her eylem bestecinin yaptığı işe, gereksinimlerine ve sağladığı kazanca göre farklıdır. Her görevden sonra #b Besteci#! [Concept('concept_elgar_composer_exhaustion','$concept_elgar_composer_exhaustion_exhausted$')] duruma gelir ve bir süre dinlenmesi gerekir.\nHayatları boyunca #b Besteciler#! [concept_artists_experience] kazanır ve bazen kaybeder. #b Ün#! yüksek olduğunda #b Bestecinin#! eylemlerinden elde edilen fayda artar. #b Besteciler#! 500 #b Ün#!’e ulaştığında [Concept('concept_elgar_great_composer','$concept_elgar_great_composers$')] olur, dünya çapında tanınan Müzik Titanları."
 concept_elgar_great_composer: "#PURPLE #b Büyük Besteci#!#!"
 concept_elgar_great_composers: "#PURPLE #b Büyük Besteciler#!#!"
 concept_elgar_great_composer_desc: "#b Büyük Besteciler#!, müziğin Titanlarıdır. İsimleri sonsuza dek hatırlanacaktır. [Concept('concept_elgar_composer','$concept_elgar_composers$')] 500 [concept_artists_experience] kazandığında #b Büyük Besteci#! olur. Bu, verimliliklerini büyük ölçüde artırır ve ülkenizin daha fazla [concept_elgar_musical_tradition] kazanmasını sağlar. Örneğin bir #b Büyük Besteci#! bir [concept_elgar_musical_masterwork]’ü çok daha hızlı yaratabilir."
 concept_elgar_travelling_composer: "Gezgin Besteci"
 concept_elgar_travelling_composers: "Gezgin Besteciler"
 concept_elgar_travelling_composer_desc: "#b Gezgin Besteciler#!, herhangi bir ülke tarafından işe alınmamış [Concept('concept_elgar_composer','$concept_elgar_composers$')]’dir. Bunun yerine konser turları yaparak dolaşırlar. Bir #b Gezgin Besteci#! edinme şansınız vardır, ancak ne kadar çok [concept_artists_experience] kazanırlarsa, talepleri o kadar büyük olur.\nBir #b Gezgin Besteci#! davet etmek için en az bir [Concept('concept_elgar_opera','$concept_elgar_opera_house$')]’a sahip olmanız gerekir. #b Besteciler#! yüksek #b Ün#! seviyesine sahip olduğunda daha büyük Opera Binaları, modern müzik [Concept('concept_technology', '$concept_technologies$')], belirli bir [concept_elgar_musical_tradition] ve bazıları yalnızca [Concept('concept_major_power', '$concept_major_power_short$')] veya [Concept('concept_great_power', '$concept_great_powers$')] ülkelerine katılmayı kabul eder.\nÖzel bir durum, yalnızca aynı veya çok benzer ulusal kimliğe sahip ülkeler için geçerli olan [Concept('concept_elgar_national_composer','$concept_elgar_national_composers$')]’dır."
 concept_elgar_national_composer: "Ulusal Besteci"
 concept_elgar_national_composers: "Ulusal Besteciler"
 concept_elgar_national_composer_desc: "#b Ulusal Besteciler#!, ülkelerine büyük değer veren [Concept('concept_elgar_composer','$concept_elgar_composers$')]’dir. Diğer ülkeler tarafından işe alınamazlar.\nBir #b Ulusal Besteci#!’nin size uygun olup olmadığı, kültürlerinin [Concept('concept_cultural_trait','$concept_cultural_traits$')] ile belirlenir. Birincil kültürlerinizden biri, hem kalıtsal olmayan bir #b Özellik#! hem de bir [concept_cultural_heritage_trait] paylaşmalıdır. Bu, Kuzey Alman bir #b Ulusal Besteci#!’nin hem Alman ülkeleri hem de İsviçre için mevcut olacağı anlamına gelir."
 concept_elgar_composing: "Besteleme"
 concept_elgar_composing_lower_case: "besteleme"
 concept_elgar_composing_compose: "bestele"
 concept_elgar_composing_desc: "Bir [concept_elgar_composer] #b bestelediğinde#! yılda 5 [concept_artists_experience] kazanır ve ülkeye 5 [concept_elgar_musical_tradition] ekler. Ayrıca her yıl rastgele sayıda beste üretir. Conductor, Virtuoso, Innovative veya Meticulous gibi özel becerilere sahip bir #b Besteci#! her yıl bir ekstra beste üretir. Bestelerin sayısı, sonraki [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tour_tours$')]’daki başarı için belirleyicidir. Bir #b Besteci#!, eylem Günlük Girişinden iptal edilene kadar bestelemeye devam eder ve bestecinin bestelemesi ülkeye yıllık küçük bir bakım ücreti gerektirir."
 concept_elgar_conducting: "Yönetme"
 concept_elgar_conducting_lower_case: "yönetme"
 concept_elgar_conducting_conduct: "yönet"
 concept_elgar_conducting_desc: "[concept_elgar_composer] 24 ay boyunca #b yönetmeye#! odaklanacak ve bir konser sezonu organize edecektir. Bu, rastgele bir [concept_elgar_opera]’nın müzik üretimini 5–10 yıl boyunca artırır, ülkenize küçük bir [concept_elgar_musical_tradition] bonusu verir ve #b Besteci#!’nin [concept_artists_experience]’ine orta düzeyde bir artış sağlar. Eğer #b Besteci#! henüz Conductor değilse, sezon sonunda [concept_character_trait] kazanabilir. #b Besteci#! #b yönetirken#! ödeme yapılmalıdır."
 concept_elgar_musical_tour: "Konser Turu"
 concept_elgar_musical_tours: "Konser Turları"
 concept_elgar_musical_tour_tour: "Tur"
 concept_elgar_musical_tour_tours: "Turlar"
 concept_elgar_musical_tour_desc: "[concept_elgar_composer] 30 ay sürecek bir #b Konser Turu#! için yurt dışına gidebilir. #b Konser Turları#!, #b Besteci#!’nin ülkesinin [concept_prestige] değerini artırır. Ayrıca #b Besteci#!, tur sonunda sahip olduğu Bestelerin sayısına ve özelliklerine bağlı olarak [concept_artists_experience] kazanır.\n20’den az Beste’ye sahip #b Besteciler#! muhtemelen #b Turlara#! çıkmamalı ve #b Reserved#! özelliğine sahip Besteciler#! #b Turlara#! çıkamaz."
 concept_elgar_musical_masterwork: "Müzik Başyapıtı"
 concept_elgar_musical_masterworks: "Müzik Başyapıtları"
 concept_elgar_musical_masterwork_masterwork: "Başyapıt"
 concept_elgar_musical_masterwork_masterworks: "Başyapıtlar"
 concept_elgar_musical_masterwork_of_music: "Müzik Başyapıtı"
 concept_elgar_musical_masterworks_of_music: "Müzik Başyapıtları"
 concept_elgar_musical_masterwork_desc: "[concept_elgar_composer] bir #b Başyapıt#! besteleme işlemine başlayabilir; bu, birkaç yıl sürecektir. #b Besteci#! ne kadar çok [concept_artists_experience]’e sahipse, o kadar hızlı tamamlar. #b Başyapıt#! tamamlandığında, #b Besteci#! 50 [concept_artists_experience] kazanır ve ülke [concept_rank]’ına bağlı olarak 150’ye kadar [concept_elgar_musical_tradition] elde eder.\nBir #b Besteci#! maksimum 3 #b Başyapıt#! yaratabilir ve çalışırken ülkesinden mali destek alması gerekir."
 concept_elgar_composer_exhaustion: "Besteci Yorgunluğu"
 concept_elgar_composer_exhaustion_exhausted: "yorgun"
 concept_elgar_composer_exhaustion_desc: "Bir [concept_elgar_composer], [Concept('concept_elgar_composing','$concept_elgar_composing_lower_case$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_lower_case$')], [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterwork_masterworks$')] veya bir [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')] görevini tamamladığında, yaptığı işten dolayı #b yorgun#! olur. #b Yorgun Besteci#! bir süre çalışamayacaktır. #b Besteci#! ne kadar yaşlıysa, #b Yorgunluk#! etkisinin geçmesi o kadar uzun sürer."
 concept_manzoni_writer: "#PURPLE #b Yazar#!#!"
 concept_manzoni_writers: "#PURPLE #b Yazarlar#!#!"
 concept_klimt_painter: "#PURPLE #b Ressam#!#!"
 concept_pm_artists_academy_conservatory: "#b #PURPLE Konservatuvar#!#!"
 concept_pm_artists_academy_conservatory_desc: "Konservatuvar, Sanat Akademisi'ni Müzik için özelleştirir. Bir Konservatuvarınız varsa, [Concept('concept_elgar_composer','$concept_elgar_composers$')] yetiştirebilirsiniz. Üretim yöntemini değiştirdiğinizde, Sanat Akademisi için #n negatif üretim verimi modifikasyonu#! ve [concept_artistic_progress] üzerinde #n negatif etki#! alırsınız."
 concept_pm_artists_academy_salon: "#b #PURPLE Edebiyat Salonu#!#!"
 concept_pm_artists_academy_salon_desc: "Edebiyat Salonu, Sanat Akademisi'ni Edebiyat için özelleştirir. Bir Edebiyat Salonunuz varsa, [Concept('concept_manzoni_writer','$concept_manzoni_writers$')] yetiştirebilirsiniz. Üretim yöntemini değiştirdiğinizde, Sanat Akademisi için #n negatif üretim verimi modifikasyonu#! ve [concept_artistic_progress] üzerinde #n negatif etki#! alırsınız."
 concept_pm_artists_academy_studio: "#b #PURPLE Sanat Stüdyosu#!#!"
 concept_pm_artists_academy_studio_desc: "Sanat Stüdyosu, Sanat Akademisi'ni Resim için özelleştirir. Bir Sanat Stüdyonuz varsa, [Concept('concept_klimt_painter','$concept_klimt_painters$')] yetiştirebilirsiniz. Üretim yöntemini değiştirdiğinizde, Sanat Akademisi için #n negatif üretim verimi modifikasyonu#! ve [concept_artistic_progress] üzerinde #n negatif etki#! alırsınız."
 concept_pm_artists_academy_specialization: "Sanat Akademisi Odak"
 concept_pm_artists_academy_specialization_desc: "Her Sanat Akademisi, üretim yöntemini değiştirerek özelleştirilebilir.\nBir [concept_pm_artists_academy_conservatory]’ye sahip bir Sanat Akademisi, [Concept('concept_elgar_composer','$concept_elgar_composers$')] yetiştirmenizi sağlar.\nBir [concept_pm_artists_academy_salon]’a sahip bir Sanat Akademisi, [Concept('concept_manzoni_writer','$concept_manzoni_writers$')] yetiştirmenizi sağlar.\nBir [concept_pm_artists_academy_studio]’ya sahip bir Sanat Akademisi, [Concept('concept_klimt_painter','$concept_klimt_painters$')] yetiştirmenizi sağlar.\nUzmanlığı değiştirmek, bina ve [concept_artistic_progress] üzerinde #n kısa süreli negatif etki#! yaratır."
 concept_artists_artist: "Sanatçı"
 concept_artists_artists: "Sanatçılar"
 concept_artistic_progress: "Sanatsal Gelişim"
 concept_artistic_progress_desc: "1000 #b Sanatsal Gelişim#! kazandığınızda yeni bir [concept_artists_artist] elde edebilirsiniz. #b Sanatsal Gelişim#!’e erişim sağlamak için ya bir #b Sanat Akademisi#! ya da bir #b Opera#! sahibi olmanız gerekir.\n#b Sanatsal Gelişim#! kazanımınız çeşitli faktörlerden etkilenir. Örneğin, [concept_literacy] ne kadar yüksekse, #b Sanatsal Gelişim#! o kadar hızlı kazanılır. Sanatsal Gelişimi etkileyen tüm faktörler hakkında ayrıntılı bilgi, Sanat Penceresindeki Sanatsal Gelişim Çubuğu Araç Çubuğundan elde edilebilir."
 concept_artists_experience: "Ün"
 concept_artists_experience_desc: "Her [concept_artists_artist]’ın bir #b Üni#! vardır. Ün, sanatçının ne kadar itibarlı olduğunu gösterir. Sanatçılar küçük bir Ün ile başlar ve kendi alanlarında çalışarak Ün kazanabilir. Ünü 500’e ulaşan sanatçılar #b Büyük Sanatçı#! olur ve ilgili [concept_character_trait]’i kazanır."
 concept_manzoni_great_writer: "Büyük Yazar"
 concept_manzoni_local_writer: "Yerel Yazar"
 concept_artists_center_of_arts: "Sanat Merkezi"
 concept_artists_centers_of_arts: "Sanat Merkezleri"
 concept_artists_center_of_classicism: "Klasisizm Merkezi"
 concept_artists_center_of_romanticism: "Romantizm Merkezi"
 concept_artists_center_of_realism: "Realizm Merkezi"
 concept_artists_center_of_impressionism: "Empresyonizm Merkezi"
 concept_artists_center_of_expressionism: "Ekspresyonizm Merkezi"
 concept_artists_center_of_art_nouveau: "Art Nouveau Merkezi"
 concept_klimt_great_painter: "#PURPLE #b Büyük Ressam#!#!"
 concept_klimt_great_painters: "#PURPLE #b Büyük Ressamlar#!#!"
 concept_klimt_great_painter_desc: "#b Büyük Ressamlar#!, sonsuza kadar hatırlanacak [Concept('concept_klimt_painter','$concept_klimt_painters$')]’dır. #b Ressamlar#! 500 [concept_artists_experience] kazandığında #b Büyük Ressam#! olur. Bu, verimliliklerini büyük ölçüde artırır ve ülkenizin daha fazla [concept_klimt_painting_tradition] kazanmasını sağlar."
 concept_klimt_independent_painter: "Bağımsız Ressam"
 concept_klimt_independent_painters: "Bağımsız Ressamlar"
 concept_klimt_painter_trip: "Ressamın Eğitim Yolculuğu"
 concept_klimt_painter_trip_journeys: "Yolculuklar"
 concept_elgar_music_desc: "#b Müzik Kültürü#!, [concept_morgenroete]’nin ana özelliklerinden biridir. 19. ve 20. yüzyıllarda, müzik halkı eğlendirmek ve bir ulusun büyüklüğünü göstermek için önemli bir araçtı.\n\n#r Morgenröte#!’deki çoğu Müzik içeriğine erişmek için bir [concept_elgar_opera] inşa etmeniz gerekir. #b Opera#! Müzik üretecek ancak çalışması için Enstrümanlara ihtiyaç duyacaktır. #b Operalar#!, halkınızın tüketmesi için #b Müzik#! üretmenin yanı sıra, ülkenize yavaş yavaş [concept_elgar_musical_tradition] kazandırır.\n\n#b Müzikal Gelenek#!, bir ulusun müziksel başarılarını ve geleneklerini yansıtır. #b Müzikal Gelenek#! miktarı size prestij bonusu verir ve ulusal sanat yolunuzu seçmenizi sağlar. Sanat yolunu [concept_elgar_impressionism], [concept_elgar_expressionism] veya [concept_elgar_art_nouveau] üzerinden ilerletebilirsiniz. Her bir Sanat Stili farklı bir odak sunar.\n\nDaha fazla #b Müzikal Gelenek#! kazanmanın iyi bir yolu, bir [concept_elgar_composer] elde etmektir. Bir besteci, [Concept('concept_elgar_composing','$concept_elgar_composing_compose$')], [Concept('concept_elgar_conducting','$concept_elgar_conducting_conduct$')], [Concept('concept_elgar_musical_tour','$concept_elgar_musical_tours$')] ve hatta [Concept('concept_elgar_musical_masterwork','$concept_elgar_musical_masterworks_of_music$')] oluşturabilir. Bu eylemler ya #b Besteci#!’nin [concept_artists_experience]’ını artırır ya da ülkenizin #b Müzikal Gelenek#! kazanmasını sağlar."
 concept_artists_center_of_arts_desc: "#b Sanat Merkezi#!, bir [concept_artists_art_style]’ın yaratıldığı [concept_state_region] içinde kurulan bir merkezdir. Her #b Sanat Stili#! için yalnızca bir #b Sanat Merkezi#! vardır.\n#b Sanat Merkezleri#!, [Concept('concept_klimt_painter','$concept_klimt_painters$')] için özellikle önemlidir; bu #b Ressamlar#!, #b Sanat Stili#!’ni incelemek için [concept_klimt_painter_trip] yapabilirler. Bunun dışında bazı #b Sanat Merkezleri#!, orada gerçekleşen özel etkinlikler sunar. Örneğin bazıları, [Concept('concept_klimt_art_prize','$concept_klimt_art_prizes$')] kazanmanıza olanak tanır."
 concept_klimt_painting_culture: "Resim Kültürü"
 concept_klimt_painting_culture_desc: "#b Resim Kültürü#!, [concept_morgenroete]’nin ana özelliklerinden biridir. 19. ve 20. yüzyılda resim hızla gelişti ve bireylere ve ülkelere büyük ilerlemeler getiren çeşitli yeni [Concept('concept_artists_art_style','$concept_artists_art_styles$')] ortaya çıktı.\n\n#r Morgenröte#!’deki çoğu Resim içeriğine erişmek için bir #b Sanat Akademisi#! inşa etmeniz gerekir. #b Sanat Akademileri#!, [concept_klimt_painting_tradition] kazanmaya ve yeni [Concept('concept_klimt_painter','$concept_klimt_painters$')] yetiştirmeye olanak tanır.\n\n#b Ressamlar#!, ülkeniz için resimler ve #b Masterworks#! yaratır ve büyük miktarda #b Resim Geleneği#! kazandırır. #b Ressamlar#!’ın odaklanabileceği farklı [Concept('concept_artists_art_style','$concept_artists_art_styles$')] olduğu için, ek #b Sanat Stilleri#! incelemeleri için [concept_klimt_painter_trip] yapmalarını sağlayabilirsiniz. 40 yaşına geldiklerinde, #b Ressamlar#! bir #b Sanat Stili#!’nde uzmanlaşır ve o #b Sanat Stili#! için resimler üretmeye odaklanır."
 concept_artists_art_style: "Sanat Stili"
 concept_artists_art_styles: "Sanat Stilleri"
 concept_artists_art_style_style: "Stil"
 concept_artists_art_style_desc: "#b Sanat Stili#!, sanatın belirli bir odak alanıdır. Bazı #b Sanat Stilleri#! başlangıçtan itibaren mevcuttur, örneğin #b Klasisizm#! ve #b Romantizm#!. Diğerleri, #b Realizm#!, #b Iraksiyonalizm#!, [concept_elgar_impressionism], [concept_elgar_expressionism] ve [concept_elgar_art_nouveau], yalnızca belirli koşullar sağlandıktan sonra ortaya çıkar. Her #b Sanat Stili#!, başladığı [concept_state_region] içinde bir [concept_artists_center_of_arts] ile ilişkilidir."
 concept_klimt_painter_desc: "#PURPLE #b Ressamlar#!#!, resimler ve diğer sanat eserlerini yaratan erkek ve kadınlardır. #b Ressamlar#!, olaylar, yeterli [concept_artistic_progress] kazanımı veya bir [concept_klimt_independent_painter]’a pozisyon teklif ederek elde edilebilen özel karakter tipleridir.\n#b Ressamlar#!, hemen resim yapmaya başlar ve her yıl [Concept('concept_character_trait','$concept_character_traits$')]’larına bağlı olarak belirli sayıda resim üretir. Bazen daha fazla [concept_klimt_painting_tradition] kazandıracak bir #b Masterwork#! bile yaratabilirler.\n#b Ressamlar#!, farklı [Concept('concept_artists_art_style','$concept_artists_art_styles$')]’ları [Concept('concept_klimt_painter_trip','$concept_klimt_painter_trip_journeys$')] sırasında inceleyebilir. 40 yaşına geldiklerinde, her #b Ressam#! bir #b Sanat Stili#! üzerinde uzmanlaşır ve o Stilde #b Masterworks#! yaratabilir."
 concept_klimt_independent_painter_desc: "[Concept('concept_klimt_painter','$concept_klimt_painters$')] bir ülkeye bağlı olmayanlar #b Bağımsız Ressam#!’dır. #b Bağımsız Ressamlar#!, [Concept('concept_primary_cultures','$concept_primary_culture$')] ile #b Ressam#!’ın kültürü arasında ortak bir [concept_cultural_trait] paylaşan ülkeler tarafından işe alınabilir.\n#b Bağımsız Ressamlar#!’ın ev sahibi ülke için çeşitli gereksinimleri vardır. #b Ressam#!’ın [concept_artists_experience]’ına bağlı olarak #b Sanat Akademileri#!, belirli [Concept('concept_technology', '$concept_technologies$')] veya [concept_klimt_painting_tradition] gereklidir. Ayrıca, #b Ressam#!’ın #b Şöhreti#! ve ülkenizin mali durumu dikkate alınarak belirlenen bir ücret ödenmelidir."
 concept_klimt_painter_trip_desc: "Bir [concept_klimt_painter], #b Eğitim Yolculuğu#! sırasında [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')]’a giderek yeni [Concept('concept_artists_art_style','$concept_artists_art_styles$')] öğrenebilir.\nBöyle bir #b Yolculuk#! sırasında, bir ressam işini ve üreteceği resim sayısını etkileyen olumlu ve olumsuz [Concept('concept_character_trait','$concept_character_traits$')] kazanabilir. Her #b Sanat Merkezi#! biraz farklı etkinlikler sunar ve yolculuk sonunda #b Ressam#!’a, ileride #b Ressam#!’ın Uzmanlığı olabilecek benzersiz bir #b Özellik#! kazandırır."
 concept_klimt_art_prize: "Sanat Ödülü"
 concept_klimt_art_prizes: "Sanat Ödülleri"
 concept_klimt_art_prize_desc: "Zaman zaman, sanat yarışmaları düzenlenir ve ödüller verilir - bu ödüller bir sanatçının itibarını artırır. #b Iraksiyonalizm#! veya [concept_elgar_impressionism] için bir [concept_artists_center_of_arts] olan ülkeler, beş yılda bir gerçekleşen bir yarışmada en iyi müzisyenleri seçer. Bir [concept_klimt_art_gallery] veya #b Realizm Sanat Merkezi#! sahibi olanlar, beş yılda bir düzenlenen bir resim yarışmasına ev sahipliği yapar. Kazananların geldiği ülke ayrıca Müzik veya Resim Geleneği kazanır. Özel bir sanat yarışması türü olan Biennale ise her iki yılda bir, en yüksek itibara sahip sanatçılara sahip ülkeye kapsamlı bir sanat ödülü verir ve tüm kültürel gelenek değerlerini artırır."
 concept_klimt_art_gallery: "Sanat Galerisi"
 concept_klimt_art_gallery_desc: "#b Sanat Galerisi#!, bir ülkenin başkentinde özel bir binadır ve #b Realizm#! ile kullanılabilir. Sadece, uzmanlaşmış bir [concept_klimt_painter] varsa inşa edilebilir. Uzmanlaşmış #b Ressamlar#!, kendi [Concept('concept_artists_art_style','$concept_artists_art_style_style$')] koleksiyonlarını açar - yani Romantizm uzmanlığı olan bir sanatçı, Romantizm koleksiyonunu açar. Bir koleksiyonu mükemmel koleksiyon seviyesine yükseltmek için, ya bir ressam tarafından yapılmış ya da yurt dışından edinilmiş bir başyapıt gereklidir."
 concept_manzoni_writer_novelist: "Roman Yazarı"
 concept_manzoni_writer_desc: "#b Yazar#!, ülkeniz için edebi eserler yazacak özel bir karakterdir. #b Yazarlar#! genellikle [concept_manzoni_local_writer] olarak başlar ve #b Yayınlar#! ve bazen de [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')] yazar. Bir #b Bestseller#!, #b Yazar#!’a büyük miktarda [concept_artists_experience] ve ülkenize [concept_manzoni_literary_tradition] kazandırır. Her yıl bir #b Bestseller#! yazma şansı vardır; bu, #b Yazar#!’ın [concept_manzoni_genre]’i [concept_manzoni_popular_taste] ile ne kadar uyumlu olduğuna bağlıdır.\n\nİyi tanınmış bir #b Yazar#! ve [concept_interest_group] yeterince memnun ise, ülkenizin [concept_manzoni_national_writer]’ı olabilir. Bir #b Ulusal Yazar#!, [Concept('concept_manzoni_book_licence','$concept_manzoni_book_licences$')] edinebilir veya Gazete Romanı oluşturabilir. Eğer bir #b Yazar#! 500 #b Reputation#! kazanırsa, [concept_manzoni_great_writer] olabilir ve ülkenize daha fazla #b Edebi Gelenek#! sağlar.\n\nDikkat edin, #b Yazarlar#!, bir ülkenin siyasi durumundan memnun değilse, [Concept('concept_agitator', '$concept_agitators$')] olabilir veya siyasi tartışmalara müdahale edebilir."
 concept_manzoni_great_writer_desc: "Bir #b Büyük Yazar#!, dünyaca tanınmış bir [concept_manzoni_writer]’dır. Bir #b Yazar#!, [concept_artists_experience]’ı #V 500#!’e ulaştığında #b Büyük Yazar#! olabilir. Eğer #b Büyük Yazar#! ülkenizin [concept_manzoni_national_writer]’ı ise, yıllık [concept_manzoni_literary_tradition] kazanımınıza bonus sağlar."
 concept_manzoni_local_writer_desc: "Neredeyse her [concept_manzoni_writer], #b Yerel Yazar#! olarak başlar. Her ülke maksimum 3 #b Yerel Yazar#! bulundurabilir; bu yazarlar #b Yayınlar#! yaratır, [concept_manzoni_literary_tradition] kazandırır ve eğer [concept_manzoni_genre] [concept_manzoni_popular_taste] ile uyumluysa [concept_artists_experience] kazanır.\nBir #b Yerel Yazar#!, #b Reputation#!’ı 150 ve [concept_interest_group] memnun ise, ülkenizin [concept_manzoni_national_writer]’ı olabilir ve daha fazla #b Edebi Gelenek#! ile ek avantajlar sağlar.\nDikkat edin, #b Yerel Yazarlar#! mevcut siyasi durumdan memnun değilse, siyasi tartışmalara müdahale edebilir veya bir [concept_agitator] olabilir."
 concept_manzoni_national_writer: "Ulusal Yazar"
 concept_manzoni_national_writer_desc: "Bir #b Ulusal Yazar#!, ülkenizin edebiyatının yüzü olarak kabul edilen [concept_manzoni_writer] türüdür. #b Ulusal Yazarlar#! size yılda minimum 1 ve maksimum 5 [concept_manzoni_literary_tradition] kazandırır.\nBir #b Ulusal Yazar#! elde etmek için, [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')]’ınızdan birini atayabilirsiniz. Bir #b Yerel Yazar#!’ı atayabilmek için, en az #V 150#! [concept_artists_experience]’a sahip olması ve [concept_interest_group]’ının olumlu bir [concept_approval]’a sahip olması gerekir."
 concept_manzoni_bestseller: "Çok Satan"
 concept_manzoni_bestsellers: "Çok Satanlar"
 concept_manzoni_bestseller_desc: "Bir #b Çok Satan#!, [concept_manzoni_writer] tarafından yazılmış ve çok iyi satılan bir #b Yayın#!’dır; genellikle #b Yazar#!’ın [concept_manzoni_genre]’i mevcut [concept_manzoni_popular_taste] ile uyumlu olduğunda ortaya çıkar.\nHer yıl, bir [concept_manzoni_national_writer] veya [concept_manzoni_local_writer], bir #b Çok Satan#! yazabilir. İlk #b Çok Satan#! büyük miktarda [concept_manzoni_literary_tradition] kazandırır; sonraki #b Çok Satanlar#! ise ülkeye önemli miktarda #b Edebi Gelenek#! kazandırır."
 concept_manzoni_genre: "Tür"
 concept_manzoni_genres: "Türler"
 concept_manzoni_genre_desc: "Her [Concept('concept_manzoni_writer','$concept_manzoni_writer_novelist$')] yazıları için belirli bir #b Tür#!’e sahiptir. #b Tür#!, #b Yazar#! oluşturulduğunda atanır ve birçok faktöre bağlıdır.\n#b Yazarlar#!, #b Tür#! ülkenin [concept_manzoni_popular_taste] ile eşleştiğinde veya buna yakın olduğunda daha fazla [concept_artists_experience] kazanır ve daha çok [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')] yazar."
 concept_manzoni_popular_taste: "Halkın Zevki"
 concept_manzoni_popular_taste_audience: "Halkın Zevki"
 concept_manzoni_popular_tastes_audience: "Halkın Zevkleri"
 concept_manzoni_popular_taste_desc: "Her ulusun nüfusu belirli bir [concept_manzoni_genre] için #b Zevk#!’e sahiptir. Yaklaşık her 10 yılda bir, bu #b Zevk#! ülkenin siyasi, sosyal ve kültürel değişimlerine bağlı olarak değişir.\n[Concept('concept_manzoni_writer','$concept_manzoni_writers$')] #b Tür#!’leri #b Zevk#! ile eşleştiğinde veya buna yakın olduğunda daha fazla [concept_artists_experience] kazanır ve daha çok [Concept('concept_manzoni_bestseller','$concept_manzoni_bestsellers$')] yazar.\n\n#V Yakın Zevkler:#!\n- #b $manzoni_taste_adventure_var_loc$#!: $manzoni_genre_science_fiction$, $manzoni_genre_juvenile$, $manzoni_genre_crime_mystery$\n- #b $manzoni_taste_crime_var_loc$#!: $manzoni_genre_science_fiction$, $manzoni_genre_adventure$, $manzoni_genre_romance$\n- #b $manzoni_taste_devotional_var_loc$#!: $manzoni_genre_juvenile$, $manzoni_genre_romance$, $manzoni_genre_adventure$\n- #b $manzoni_taste_juvenile_var_loc$#!: $manzoni_genre_adventure$, $manzoni_genre_devout$, $manzoni_genre_crime_mystery$\n- #b $manzoni_taste_literary_var_loc$#!: $manzoni_genre_social_critic$, $manzoni_genre_science_fiction$, $manzoni_genre_romance$\n- #b $manzoni_taste_romance_var_loc$#!: $manzoni_genre_devout$, $manzoni_genre_juvenile$, $manzoni_genre_literary_fiction$\n- #b $manzoni_taste_science_var_loc$#!: $manzoni_genre_adventure$, $manzoni_genre_social_critic$, $manzoni_genre_literary_fiction$\n- #b $manzoni_taste_social_var_loc$#!: $manzoni_genre_literary_fiction$, $manzoni_genre_juvenile$, $manzoni_genre_crime_mystery$"
 concept_manzoni_book_licence: "Kitap Lisansı"
 concept_manzoni_book_licences: "Kitap Lisansları"
 concept_manzoni_book_licence_desc: "Yabancı yayınevleri, bir [concept_manzoni_national_writer] ile sözleşme yapabilir ve kitaplarını kendi pazarlarında çeviri olarak sunabilir. Bu, bir yazarın yurtdışında [Concept('concept_manzoni_popular_taste','$concept_manzoni_popular_tastes_audience$')]’a uygun olduğunda gerçekleşir. Bir yazar en az beş kitap lisansı alırsa, kitapları dünya edebiyatı olarak kabul edilir ve ardından bir okuma turuna çıkabilir."
 concept_manzoni_local_writers: "Yerel Yazarlar"
 concept_manzoni_library: "Ulusal Kütüphane"
 concept_manzoni_library_desc: "#b Ulusal Kütüphaneniz#!, yeterli sayıda [concept_manzoni_publications] olduğunda otomatik olarak Kitap Koleksiyonları (bir [concept_production_method] şeklinde) oluşturacaktır. İlk Kitap Koleksiyonu, 1.000 veya daha fazla yayına sahip olduğunuzda oluşturulur. Daha sonra daha iyi Koleksiyonlar 2.500 (Küçük Kitap Koleksiyonu), 5.000 (Küçük Kitap Koleksiyonu), 10.000 (Orta Kitap Koleksiyonu), 25.000 (Büyük Kitap Koleksiyonu), 50.000 (Mükemmel Kitap Koleksiyonu) ve 100.000 (Harika Kitap Koleksiyonu) ile mümkündür."
 concept_manzoni_publications: "Yayınlar"
 concept_manzoni_publications_desc: "#b Yayınlar#!, bir ülkede yeni yayımlanan tüm kitap başlıklarını, gazeteleri, makaleleri ve benzeri yazılı ürünleri kapsar. Bunlar, @manzoni_prints! $manzoni_prints$’in mal olarak dolaşımıyla aynı şey değildir. Yayınlar, bazen yayınevi endüstrisinden bağımsız olarak, örneğin devlet binaları veya üniversitelerin kendi baskı makineleri aracılığıyla da ortaya çıkabilir. Akademisyenler ve özel kişiler, okuryazarlık seviyelerine bağlı olarak yayın üretir. Ancak yayın endüstrisi, işin çoğunu sağlar ve belirleyici faktör, modern üretim yöntemi kullanılıp kullanılmadığıdır. Çok sayıda yayın, bir [concept_manzoni_library]’nin genişlemesi için temel oluşturur."
 concept_curtiss_tourism: "Turizm"
 concept_curtiss_tourism_desc: "Turizm, kültürel olarak gelişmiş bir ülkeye ek gelir sağlar. Benzersiz anıtlar, müzeler ve sanat galerileri, arkeolojik alanlar, sanat merkezleri ve çeşitli kültürel geleneklerdeki yüksek değerler, bir ülkeyi çekici bir turizm destinasyonu yapar. Hareket özgürlüğünü ve ekonomik faaliyeti artıran yasalar da turizm gelirlerini artırır. Altyapı da kritik bir rol oynar – sonuçta uzak yerlere ulaşmak mümkün değildir. Özellikle bir havaalanı turizmi devrim niteliğinde artırır ve gelirde önemli bir artış sağlar."
 concept_curtiss_private_airline: "Özel Havayolu"
 concept_mendelejew_chemist: "#b #ORANGE Kimyager#!#!"
 concept_manzoni_literature: "Edebiyat Kültürü"
 concept_manzoni_literature_desc: "#b Edebiyat Kültürü#! [concept_morgenroete]’nin temel özelliklerinden biridir. Özellikle baskı ve gazete kültürü 19. ve 20. yüzyıllarda önemli değişimlerden geçti. Basılı ürünlerin ve günlük kullanımın çoğunluğunu matbaa endüstrisi temsil eder. Üretilen edebiyatın kültürel değeri, [concept_manzoni_literary_tradition] ile ölçülür. Bu değer büyük ölçüde bir ülkenin [Concept('concept_manzoni_writer','$concept_manzoni_writers$')]’lerine bağlıdır ve [Concept('concept_manzoni_local_writer','$concept_manzoni_national_writers$')] ile [Concept('concept_manzoni_national_writer','$concept_manzoni_local_writers$')] mevcuttur. Yazarların gölgede kalıp kalmaması veya tanınmış yazarlar haline gelmesi, [concept_manzoni_popular_taste]’a bağlıdır."
 concept_morgenroete_desc: "#r Morgenröte - Dawn of Flavor #! is a mod created to broaden the cultural and scientific aspects of Victoria 3. It features content for various aspects of the Victorian Age:\n\n#V Lepsius: #! [concept_lepsius_archaeology]\n#V Verrier:#! [concept_verrier_astronomy]\n#V Gaudi:#! [concept_elgar_architecture] & [concept_tesla_engineering]\n#V Dubois:#! [concept_dubois_natural_history]\n#V Mendelejew:#! [concept_mendelejew_chemistry]\n#V Elgar:#! [concept_elgar_music]\n#V Manzoni:#! [concept_manzoni_literature]\n#V Klimt:#! [concept_klimt_painting_culture]\n#V Curtiss:#! [concept_curtiss_aviation]\n#V Vikelas:#! [concept_vikelas_sports]"
 concept_agassiz_mineral: "Mineral"
 concept_agassiz_minerals: "Mineraller"
 concept_agassiz_mineral_desc: "Mineraller, endüstride kullanılan bilinen kaynaklar kapsamına girmeyen özel taş türleridir. Bir ülke #b Jeoloji#! teknolojisini icat ettiğinde yıllık belirli bir miktarda mineral alır. Eğer bir [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] bu ülkeye hizmet veriyorsa, ek mineraller bulabilir. Mineral konumları, dağlar, çöller, arktik bölgeler, ham madde yatakları (ör. kömür, demir ve kükürt alanları) ile jeolojik [Concept('concept_dubois_formation','$concept_dubois_formations$')] ve volkanlarla karakterize edilir. Çöller ve arktik bölgeler mineral bakımından fakir kabul edilirken, büyük jeolojik oluşumlar ve volkanlar özellikle zengin kabul edilir. Daha değerli bir mineral türü [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')]’dir."
 concept_agassiz_rare_mineral: "Nadir Mineral"
 concept_agassiz_rare_minerals: "Nadir Mineraller"
 concept_agassiz_rare_mineral_desc: "[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] keşifleri sırasında Nadir Mineraller bulabilir; örneğin [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')], [concept_douglas_mountaineering] seferleri, [concept_agassiz_volcano] seferleri veya mineral aramaları sırasında. Yaygın [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')]’den farklı olarak, bunlar çok sınırlı miktarlarda bulunur. Nadir Mineraller, bir mineral dolabı oluşturmak için kullanılır."
 concept_agassiz_geologist: "#b #GREEN Jeolog#!#!"
 concept_agassiz_geologists: "#b #GREEN Jeologlar#!#!"
 concept_agassiz_geologist_desc: "#b #GREEN Geologists#!#! are [Concept('concept_academics_academic','$concept_academics_academics$')] who primarily study rocks and earth history. They locate [Concept('concept_lepsius_cave','$concept_lepsius_caves$')], [Concept('concept_dubois_formation','$concept_dubois_formations$')] and [Concept('concept_curie_uranium','$concept_curie_uranium$')] deposits, which makes them irreplaceable colleagues for [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')], [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] and [Concept('concept_curie_physicist','$concept_curie_physicists$')]. During their expeditions, they may find additional [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] that a [concept_mendelejew_chemist] can use to discover or isolate [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]. They can find new deposits of raw materials. They are also active as volcanologists and can go on expeditions to local [Concept('concept_agassiz_volcano','$concept_agassiz_volcanoes$')] to research them in more detail. Together with [Concept('concept_tesla_engineer','$concept_tesla_engineers$')], they can develop new devices, such as seismographs, to learn more about the Earth's interior. Geologists can take part in [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] and [concept_douglas_mountaineering] expeditions."
 concept_agassiz_volcano: "Volkan"
 concept_agassiz_volcanoes: "Volkanlar"
 concept_curie_physicist: "#b #ORANGE Fizikçi#!#!"
 concept_curie_physicists: "#b #ORANGE Fizikçiler#!#!"
 concept_curie_physicist_desc: "#n Yakında Morgenröte’de!#!"
 concept_curie_uranium: "Uranyum"
 concept_curie_uranium_desc: "Uranyum, yalnızca seçilmiş, tarihi eyaletlerde [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] tarafından bulunabilen son derece nadir bir malzemedir. Bunun için Modern Fizik araştırılmış olmalıdır. İlk bakışta uranyum, yalnızca seramik üretiminde kullanılan ikincil bir cevherdir. Ancak ilerleyen süreçte, özellikle [concept_verrier_observatory] için gerekli olacaktır. En iyi fiziksel ve kimyasal üretim yöntemleri uranyumla desteklenmezse, nükleer fizik alanında veya önceden bilinmeyen elementlerin araştırılmasında amaçlarına ulaşamazlar. Uranyum olmadan radyoaktivite alanındaki tüm bilimsel faaliyetler imkansızdır. Bu nedenle, Victoria 3’ün son aşamasında [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] ve [Concept('concept_curie_physicist','$concept_curie_physicists$')] için özellikle ilgi çekicidir."
 concept_mendelejew_chemistry: "Kimya"
 concept_mendelejew_chemistry_desc: "#b Chemistry#! is one of the main features of [concept_morgenroete]. Starting in the 18th Century, #b Chemistry#! rapidly developed into a modern science. Suddenly many new elements were discovered and chemical processes were invented. The 19th and 20th century saw even more discoveries in Chemistry, ranging from new elements to the invention of dynamite or the Haber-Bosch-Process.\n\nIn #b Morgenröte#! #b Chemistry#! will be conducted by [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] who will be able to focus on different tasks.\nOne focus is the improvement of your countries #b $building_chemical_plant$#!, #b $building_explosives_factory$#! or #b $building_synthetics_plant$#!, which will make those [Concept('concept_building', '$concept_buildings$')] more efficient.\nIf you are looking for a more prestigous task, you can let your #b Chemist#! theorize, discover or isolate [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')]. Each Element will add a little bit of [concept_prestige] depending on whether you theoriized, discovered or isolated it.\nLater in the game the #b Chemist#! will also be able to invent #b Synthetic Oil#! and #b Synthetic Rubber#!. This will unlock the #b $building_mendelejew_hydrogenation_plants$#! or the #b $building_mendelejew_synthetic_rubber_factory$#!."
 concept_mendelejew_chemists: "#b #ORANGE Kimyagerler#!#!"
 concept_mendelejew_chemist_desc: "#b #ORANGE Kimyagerler#!#!, [Concept('concept_academics_academic','$concept_academics_academics$')] olup [Concept('concept_mendelejew_element','$concept_mendelejew_elements$')] teorize eder, keşfeder ve izole ederler. #b #ORANGE Kimyagerler#!#!, #b Elementler#! üzerinde araştırma yaptıklarında veya konferanslara katıldıklarında [concept_academics_experience] kazanırlar. Ayrıca gübre, patlayıcı ve sentetikleri geliştirebilirler. Kimyagerler periyodik tabloyu veya sentetik yakıtı icat edebilir, böylece petrol erişimi olmayan ülkeler için değerli hale gelirler. Her yıl pasif olarak #b Deneyim#! kazanırlar; bu, #b #ORANGE Kimyagerler#!#!’in daha iyi kimyager özellikleri kazanmasını sağlar. Ayrıca yaratıldıklarında veya bir olayla (etkinlik) uzmanlık (teorisyen, analist, denetçi) kazanabilirler."
 concept_mendelejew_element: "Kimyasal Element"
 concept_mendelejew_element_no_chemical: "Element"
 concept_mendelejew_elements: "Kimyasal Elementler"
 concept_mendelejew_element_desc: "Eskiden dünyanın dört elementten oluştuğuna inanılırdı: ateş, toprak, su ve hava. Kimyanın simyadan ayrılmasıyla kimyasal elementlerin bilimsel analizi ortaya çıktı. Bu süreç 19. yüzyılda tamamlanmış değildi.\n\n[Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] bu araştırmayı sürdürerek elementleri tek tek teorize edebilir, keşfedebilir ve izole edebilir. Bir element izole edilmeden önce sadece bir numaradır; izole edildiğinde ise tam olarak tanınır ve isimlendirilir. Elementlerin sınıflandırılması bilimsel ilerleme ve kimyager [concept_academics_experience] kazandırır. Tüm elementler baştan teorize, keşfedilme ve izole edilme aşamalarına açılamaz. Ön koşul, [concept_verrier_observatory]’deki kimya laboratuvarının yeterli donanıma sahip olmasıdır; bazı durumlarda Modern Fizik Enstitüsü de gerekir. Birçok element, spektrografi ile doğru bir şekilde araştırılabilir; oyunun sonlarına doğru siklotron gerekebilir. [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] kimyasal elementlerin keşfi ve izolasyonu için gereklidir. Üretim yöntemlerinin yanı sıra kimyagerin deneyimi ve karakter özellikleri, araştırmanın süresini belirler.\n\nAraştırılan elementler, periyodik tablonun geliştirilmesi ve kimya kongresinin organizasyonu için gereklidir."
 concept_verrier_meteorite: "Meteor"
 concept_verrier_meteorites: "Meteorlar"
 concept_manzoni_national_writers: "Ulusal Yazarlar"
 concept_verrier_astronomy_desc: "#b Astronomi#! [concept_morgenroete]’nin temel özelliklerinden biridir.\n\n#b Astronomi#! erişmek için bir [concept_verrier_observatory] veya bir [concept_verrier_astronomer]’a ihtiyacınız vardır.\n\nBir Gözlemevine sahip olduğunuzda, pasif olarak [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] keşfedeceksiniz.\n\nEğer bir [concept_verrier_astronomer]’ınız varsa, yeni Gezegenler, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] bulabilir ve [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')] çekebilirsiniz. Bazen [concept_agassiz_geologist]’ınız da [Concept('concept_verrier_meteorite','$concept_verrier_meteorites$')] bulabilir; bunlar #b Astronomlar#! ve [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] tarafından incelenebilir.\n\nHer Astronomik keşif, [concept_verrier_astronomical_prestige] kazandırır ve bu [concept_prestige]’inize eklenir. #b Astronomik Prestijinizi#! görmek için $verrier_astronomical_prestige_modifier$ [concept_modifier]’a bakın."
 concept_verrier_observatory_desc: "Bir #b Gözlemevi#!, bir ülkenin [concept_verrier_astronomy] ve [concept_mendelejew_chemistry] alanlarının bel kemiğidir. Buradan [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] Gezegenler, [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] keşfedebilir ve [Concept('concept_verrier_moon_photo','$concept_verrier_moon_photos$')] çekebilirler.\nBir #b Gözlemevi#! inşa etmek için bir Üniversiteye sahip olmalı ve $verrier_astronomy_tech$ veya $verrier_chemistry_tech$ [concept_technology] araştırılmış olmalıdır. Ayrıca bir #b Gözlemevi#! yalnızca bir kez ve sadece başkentinizde inşa edilebilir."
 concept_verrier_astronomer_desc: "#b Astronomlar#!, gökyüzünü keşfeden ve [Concept('concept_verrier_satellite','$concept_verrier_satellites$')], [Concept('concept_verrier_comet','$concept_verrier_comets$')] ve [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] keşfeden Akademisyenlerdir.\n#b Astronomlar#!, #b Astronomik Nesneler#! keşfettiklerinde veya Konferanslara katıldıklarında [concept_academics_experience] kazanırlar. Her yıl pasif olarak da #b Deneyim#! kazanırlar; bu, #b Astronomlar#!’ın daha iyi astronom özellikleri kazanmasını sağlar.\n\nBir #b Astronom#!, yeni #b Uydular#! keşfetmeye veya #b Ay Fotoğrafları#! çekmeye odaklanabilir. Bu, keşfedilen #b Astronomik Nesne#! miktarını azaltacaktır."
 concept_verrier_astronomical_prestige: "Astronomik Prestij"
 concept_verrier_astronomical_prestige_desc: "#b Astronomik Prestij#!, Astronomi’den kazandığınız [concept_prestige] miktarıdır. Çeşitli faktörler #b Astronomik Prestijinizi#! etkiler:\n- Yeni bir Gezegen bulmak, zorluğuna bağlı olarak #V 15#! ile #V 100#! Prestij kazandırır.\n- Her keşfedilen [concept_verrier_satellite] 10 Prestij kazandırır.\n- Tamamlanmış bir [Concept('concept_verrier_moon_photo','$concept_verrier_moon_map$')] #V 25#! Prestij verir.\n- Büyük bir Kuyruklu Yıldız 10 Prestij kazandırır.\n- Her [concept_verrier_meteorite] #V 1#! Prestij verir.\n- Her #V 100#! [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] #V 1#! Prestij kazandırır."
 concept_verrier_astronomical_object_desc: "#b Astronomik Nesneler#!, keşfettiğiniz Asteroitler ve Yıldızlardır. Bu Nesneler, bir [concept_verrier_observatory] varsa keşfedilebilir. Astronomi Teknolojiniz ne kadar gelişmişse, o kadar çok Nesne bulursunuz. Bir [concept_verrier_astronomer]’ınız varsa daha fazla #b Nesne#! keşfedersiniz.\nYeterli sayıda #b Astronomik Nesne#! ile yeni Gezegenler keşfedebilir veya Astro Fizik Teknolojisini geliştirebilirsiniz."
 concept_verrier_moon_map: "Ay Haritası"
 concept_verrier_moon_photo_desc: "Eğer bir [concept_verrier_observatory]’niz varsa ve Kamera Teknolojisi araştırıldıysa, [concept_verrier_astronomer]’ınıza Ay’ı fotoğraflamaya başlayabilir. Bu, #b Astronomunuz#!’un keşfettiği [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')] miktarını azaltır, ancak her yıl size #b Ay Fotoğrafları#! kazandırır.\nYeterli sayıda #b Ay Fotoğrafı#! toplarsanız, Dünya’nın Yoldaşının doğru bir haritasını oluşturursunuz. Ay Haritasını tamamlamak, ülkenize bazı [concept_verrier_astronomical_prestige] kazandırır."
 concept_verrier_satellite: "Uydu"
 concept_verrier_satellites: "Uydular"
 concept_verrier_satellite_desc: "#b Uydular#! veya Aylar, bir gezegenin etrafında dönen [Concept('concept_verrier_astronomical_object','$concept_verrier_astronomical_objects$')]’tır. Bazı #b Uydular#!, Dünya’nın Ay’ı gibi, zaten keşfedilmiştir; ancak bir [concept_verrier_astronomer] daha fazlasını bulmaya çalışabilir.\nÜlkeniz tarafından keşfedilen her #b Uydu#!, küçük bir miktar [concept_verrier_astronomical_prestige] kazandırır."
 concept_verrier_meteorite_desc: "Meteorlar, Dünya atmosferinden geçip yere ulaşan nispeten küçük, kozmik kökenli katı cisimlerdir. Nadiren, meteor yağmurlarının ardından meteor parçaları bulunabilir. Binlerce yıl önce Dünya’ya düşen meteorlar, [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] tarafından çöl ve arktik bölgeler gibi zor arazilerde de bulunabilir. [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')] ve [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')] meteorlarla özellikle ilgilenir ve onları analiz etmek isteyebilirler.\n\nAyrıca #b Meteorlar#!, [concept_agassiz_geological_score]’unuzu artırmaya yardımcı olur ve [concept_agassiz_age_of_earth]’in daha iyi tahmin edilmesini sağlar."
 concept_agassiz_volcano_desc: "#b Volkanlar#!, #r Morgenröte#!’de yeni bir eyalet özelliğidir. Victoria 3’ün temel oyunundan farklı olarak, stratejik bölgeler değil, volkanlara sahip eyaletler, bir volkanik patlamanın olup olmayışıyla bağlantılıdır. Volkanik aktivite oldukça yoğundur, ancak her zaman yıkıcı değildir. Volkan bulunan ülkelerde bir #b $building_agassiz_volcano_observatory$#! inşa edilebilir; bu sadece gözlemlerle patlamaları tahmin etmeye ve hafifletmeye yardımcı olmakla kalmaz, aynı zamanda bir volkan seferi için başlangıç noktasıdır. [Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] volkan seferlerinde yeni [concept_agassiz_geological_knowledge], [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')], deneyim ve volkanolog özelliği kazanabilir."
 concept_agassiz_geological_knowledge: "Jeolojik Bilgi"
 concept_agassiz_geological_knowledge_desc: "#b Jeolojik Bilgi#!, bir ülkenin yerin doğası hakkındaki genel anlayışını içerir. Çok nadir bulunan bir kaynaktır ve esas olarak jeolojik dönüm noktaları sırasında elde edilir. #b Jeolojik Bilgi#!, [concept_agassiz_geological_score] ile aynı değildir, ancak onun en önemli bileşenidir ve özellikle değerli kabul edilir."
 concept_agassiz_geological_score: "Jeolojik Puan"
 concept_agassiz_geological_score_desc: "#b Jeolojik Puan#!, bir ülkenin jeolojiyle ilgili tüm başarı ve bilgilerini içerir. En önemli bileşen [concept_agassiz_geological_knowledge]’dir, ancak başka önemli faktörler de vardır; bir [concept_agassiz_geologist] deneyimi, [concept_agassiz_oceanographic_knowledge], [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')], [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] veya [Concept('concept_dubois_specimen','$concept_dubois_specimens$')], ve jeolojik teknolojiler gibi. Jeolojik Puan, [concept_agassiz_age_of_earth]’in yeniden belirlenmesi için kritik öneme sahiptir."
 concept_agassiz_oceanographic_knowledge: "Oşinografik Bilgi"
 concept_agassiz_oceanographic_knowledge_desc: "#b Oşinografik Bilgi#!, [concept_agassiz_geological_knowledge]’nin bir parçasını oluşturur ve özellikle okyanus akıntıları, genel deniz araştırmaları ve jeofiziksel değerlendirmelerle ilgili bilgileri kapsar. #b Oşinografik Bilgi#! büyük ölçüde [Concept('concept_dubois_pacific_expedition','$concept_dubois_pacific_expeditions$')] sırasında kazanılır. [concept_agassiz_geological_knowledge] elde etmek için 50 #b Oşinografik Bilgi#! gereklidir."
 concept_agassiz_age_of_earth: "Dünya’nın Yaşı"
 concept_agassiz_age_of_earth_desc: "19. yüzyılın en büyük sorularından biri #b Dünya’nın Yaşı#! sorusuydu. Bu soru özellikle evrim teorisinin geçerliliği ve jeolojik olayların sırası açısından doğa tarihi ile ilgiliydi. Yeni bir dünya yaşı yalnızca bir [concept_agassiz_geologist] tarafından belirlenebilir. Bunu yapmak için, ülkesinin [concept_agassiz_geological_score]’u, Dünya yaşını en son belirleyen ülkenin puanından yüksek olmalıdır. Daha sonra araştırma sonuçlarını diğer meslektaşlarıyla paylaşır. Başarılı olmak zorunda değildir – çok genç ve deneyimsiz jeologlar dikkate alınmaz. Ancak, yıllardır yeni bir teori sunulmamışsa yabancı ülkeler biraz daha hoşgörülüdür. Jeologlar hayatları boyunca yalnızca bir kez Dünya’nın yaşını tahmin edebilir – ancak bu yalnızca başarılı oldukları durum için geçerlidir. Başarısız olursanız, motivasyon dönemi sonrası tekrar deneyebilirsiniz."
 concept_agassiz_geology: "Jeoloji"
 concept_agassiz_geology_desc: "#b Jeoloji#!, [concept_morgenroete]’nin temel özelliklerinden biridir. Viktorya Çağı başlamadan önce bile jeoloji önemli bir patlama yaşamış ve bu nedenle oyun başlangıcında birçok ülke için erişilebilir durumdadır.\n\n[Concept('concept_agassiz_geologist','$concept_agassiz_geologists$')] çeşitli şekillerde kullanılabilir: [Concept('concept_dubois_formation','$concept_dubois_formations$')], [Concept('concept_lepsius_cave','$concept_lepsius_caves$')] ve [concept_curie_uranium] yataklarını bulmak, [concept_agassiz_volcano] seferlerine katılmak, [concept_agassiz_age_of_earth]’i belirlemek, yeni maden ve petrol yatakları keşfetmek veya [concept_dubois_pacific_expedition] ve [concept_douglas_mountaineering] seferlerine katılmak gibi. Bir [concept_agassiz_geological_score], bir ülkenin genel bilgisini değerlendirir ve Dünya’nın yaşının belirlenmesinde kritik öneme sahiptir. [Concept('concept_agassiz_mineral','$concept_agassiz_minerals$')] ve [Concept('concept_agassiz_rare_mineral','$concept_agassiz_rare_minerals$')] jeolojinin vazgeçilmez parçalarıdır; ikincisi [concept_dubois_zoo]’da bir mineral dolabı kurmak için kullanılabilir. Özel bir jeolojik tesis ise #b $building_agassiz_volcano_observatory$#!’dir ve volkanoloji ve sismik çalışmalar yürütür."
 concept_theiler_biologist: "#b #GREEN Biyolog#!#!"
 concept_theiler_biologists: "#b #GREEN Biyologlar#!#!"
 concept_theiler_biologist_desc: "#n Yakında Morgenröte’de!#!"
 concept_gaudi_architect: "#b #PURPLE Mimar#!#!"
 concept_gaudi_architects: "#b #PURPLE Mimarlar#!#!"
 concept_academics_university_specialization_desc: "Each University can be specialized by changing its production method.\nA university with a [concept_pm_academics_university_humanities] will allow you to focus your nations research on society innovation and allows to specifically recruit [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] and [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')].\nA university with a [concept_pm_academics_university_natural_history] will allow you to focus your nations research on society innovation and allows to specifically recruit [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] and [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')].\nA university with a [concept_pm_academics_university_mathematics] will allow you to focus your nations research on production and military innovation and allows to specifically recruit [Concept('concept_tesla_engineer','$concept_tesla_engineers$')] or [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')].\nChanging the Specialization will have a #n short negative effect#! for the building and your [concept_academics_progress].\nSpecialized Universities can influence various projects as well. Universities with a $concept_pm_academics_university_mathematics$ focus will help with engineering projects for example."
 concept_pm_academics_university_humanities_desc: "Beşeri-Antropolojik Odak, üniversiteyi özelleştirir ve ülke genelinde Toplum Araştırmaları’na odaklanmayı ve özellikle [Concept('concept_lepsius_archaeologist','$concept_lepsius_archaeologists$')] ve [Concept('concept_lepsius_anthropologist','$concept_lepsius_anthropologists$')] işe almayı sağlar. Bu üretim yöntemini değiştirdiğinizde üniversite için #n negatif verimlilik değişkeni#! ve [concept_academics_progress] üzerinde #n negatif etki#! oluşur.\nÜniversitelerinizi Beşeri-Antropolojik Odak ile özelleştirmek, Seferlerin başarı şansında maksimum +4 olmak üzere bir bonus verir (40 seviyelik özelleştirme gerektirir) ve bazı diğer projelerde ilerlemeyi artırır."
 concept_pm_academics_university_natural_history_desc: "Doğa Tarihi Odak, üniversiteyi özelleştirir ve ülke genelinde Toplum Araştırmaları’na odaklanmayı ve özellikle [Concept('concept_dubois_naturalist','$concept_dubois_naturalists$')] ve [Concept('concept_dubois_paleontologist','$concept_dubois_paleontologists$')] işe almayı sağlar. Bu üretim yöntemini değiştirdiğinizde üniversite için #n negatif verimlilik değişkeni#! ve [concept_academics_progress] üzerinde #n negatif etki#! oluşur.\nÜniversitelerinizi Doğa Tarihi Odak ile özelleştirmek, Doğa bilimcilerinizin çeşitli projelerine bonus sağlar."
 concept_pm_academics_university_mathematics_desc: "Mathematical-Technical Focus specializes the University and allows a national focus on Production and Military Research and to specifically recruit [Concept('concept_tesla_engineer','$concept_tesla_engineers$')] or [Concept('concept_verrier_astronomer','$concept_verrier_astronomers$')]. You will get a #n negative throughput modifier#! for the University as well as a #n negative effect#! on your [concept_academics_progress] when you change this production method.\nSpecializing your Universities with the Mathematical-Technical Focus will give you a bonus to various projects of your [Concept('concept_tesla_engineer','$concept_tesla_engineers$')] and [Concept('concept_mendelejew_chemist','$concept_mendelejew_chemists$')]."
 concept_panum_physician: "#b #BLUE Doktor#!#!"
 concept_panum_physicians: "#b #BLUE Doktorlar#!#!"
 concept_panum_physician_desc: "#b #BLUE Doktorlar#!#!, [Concept('concept_academics_academic','$concept_academics_academics$')] olan ve [concept_panum_medicine] alanında çalışan akademisyenlerdir. Ana görevleri [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] yazmak ve [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] bulmaktır. Ayrıca tıbbi araştırmaları geliştirebilir, sağlık hizmetlerini iyileştirebilir ve diğer karakterleri iyileştirebilirler.\nDoktorlar iş sırasında ve her yıl pasif olarak [concept_academics_experience] kazanırlar. Yeterli #b Deneyim#! ile doktor özelliğinin seviyelerini geliştirebilirler."
 concept_panum_medicine: "Tıp"
 concept_panum_medicine_desc: "Tıp, Victoria 3 için [concept_morgenroete]’nin en büyük genişletmelerinden biridir. Odak noktalarından biri, yüzyıllardır insanlığı etkileyen ve bilimsel gelişmeler sayesinde nihayet kontrol altına alınan kolera, tüberküloz ve tifüs gibi salgın [Concept('concept_panum_disease','$concept_panum_diseases$')] hastalıklardır. Salgın hastalıklar, [concept_morgenroete]’de olumsuz olaylardan biridir. Bu nedenle [concept_panum_disease_treatment] arayışı ile kontrol sağlamak çok önemlidir. Tıbbın merkezi bir unsuru, antropolojik-beşeri üniversite odağına sahip akademisyenlerden biri olan [concept_panum_physician]’dır. Salgın hastalıkları tanımlayabilir ve tedaviler bulabilir. Bir tedavi yöntemi genellikle bir [concept_panum_disease_description] ve teknoloji gerektirir. Doktor ayrıca tıbbi teknolojilerin araştırılmasını geliştirebilir, hastaneler aracılığıyla sağlık hizmetlerini genişletebilir, yeni tıbbi teknikler sunabilir ve diğer karakterleri iyileştirebilir. Tıp konferansları, tıbbi bilginin uluslararası olarak yayılmasına yardımcı olur. Tıbbın modernleşmesinde önemli bir adım, miasma teorisinden [concept_panum_germ_theory]’ye geçiştir. Tıbbi keşiflerde lider olan bir ülke, yüksek [concept_panum_medical_prestige] gösterebilir."
 concept_panum_disease: "Hastalık"
 concept_panum_diseases: "Hastalıklar"
 concept_panum_disease_desc: "Hastalık terimi genellikle bir ulusu her birkaç yılda bir etkileyebilen salgın hastalıkları ifade eder. Bir [concept_panum_physician], [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] yazarak ve [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] sağlayarak bunlara karşı koyabilir. Salgın hastalıklar genellikle aynı anda ortaya çıkmaz ve tekrar patlak vermeleri biraz zaman alır. Türüne bağlı olarak, salgın hastalıklar yıkıcı etkiler gösterebilir ve birkaç eyalete yayılabilir. Bu tür hastalıkların başlamasını geciktirmek veya etkilerini azaltmak için çeşitli [concept_panum_disease_prevention] yöntemleri vardır. Hastalığın tetikleyicileri çok farklı olabilir. Sarı humma yalnızca tropik bölgelerde görülür ve kolera ile tüberkülozun etkili olabilmesi için minimum bir kentleşme düzeyi gereklidir. Bir eyaletin yaşam standardı ve tahrip seviyesi de rol oynar.\n\nBu özellikle korkulan salgın hastalıkların yanı sıra, bir doktorun tıbbi araştırmalar sırasında rastgele inceleyebileceği günlük hastalıklar da vardır. Bu tür hastalıklar arasında raşitizm, pellegra ve frengi bulunur."
 concept_panum_disease_description: "Hastalık Tanımı"
 concept_panum_disease_descriptions: "Hastalık Tanımları"
 concept_panum_disease_description_desc: "Tanımlar, bir [concept_panum_disease]’i anlamanın ilk adımıdır. Salgının şiddeti üzerinde etkisi yoktur, ancak [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')], [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] ve [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] bulmak için temel bir adımdır. Hastalık tanımlarının başka bir gereksinimi yoktur: tek gereken bir salgın hastalık ve bir [concept_panum_physician]'dir."
 concept_panum_disease_treatment: "Hastalık Tedavisi"
 concept_panum_disease_treatments: "Hastalık Tedavileri"
 concept_panum_disease_treatment_desc: "Bir [concept_panum_physician], uygun teknoloji ve bir [concept_panum_disease_description] ile uzun bir süreç sonunda bir [concept_panum_disease] için tedavi bulabilir. Tedaviler, bir hastalığın kesin çözümü değildir. Daha ziyade doktor, hastalığın nedenini belirler ve buna dayalı olarak salgını önlemeye veya önemli ölçüde sınırlamaya yönelik yöntemler geliştirir. Hastalık tedavileri, salgın hastalıkların süresini birkaç ay veya haftaya indirir ve birkaç eyalete yayılmasını engeller. Hastalık tedavileri, salgınlara karşı olası [concept_panum_disease_prevention] yöntemlerinin bir parçasıdır."
 concept_panum_disease_prevention: "Hastalık Önleme"
 concept_panum_disease_prevention_no_disease: "Önleme"
 concept_panum_disease_prevention_desc: "Bir salgın [concept_panum_disease]’den kaçınmanın veya etkilerini en aza indirmenin birkaç yolu vardır. En bilinen yöntem, bir [concept_panum_physician] tarafından geliştirilen [concept_panum_disease_treatment]’dir. Bu, hastalığın süresini önemli ölçüde kısaltır ve başka bir ülkeye yayılma olasılığını azaltır. Yaşam standardı, hastaneler, teknolojiler ve yüksek düzeyde sağlık kurumları da etki eder. Nihai önleme yöntemi, hastalığın baştan ortaya çıkmasını engelleyen bir [concept_theiler_vaccine]'dir. Aşılar, [Concept('concept_theiler_biologist','$concept_theiler_biologists$')] tarafından geliştirilir. Ancak etkin olabilmesi için sağlık kurumunun en az tıp fakültesinde belirtilen seviyeye ulaşmış olması gerekir. Sonuçta, bir aşının dağıtımı organize edilmeli ve denetlenmelidir."
 concept_panum_disease_type: "Hastalık Türü"
 concept_panum_disease_types: "Hastalık Türleri"
 concept_panum_disease_type_desc: "Salgın [Concept('concept_panum_disease','$concept_panum_diseases$')] yayılma derecelerine göre ayrılabilir. #V Yerel hastalıklar#!, kızıl gibi, ortaya çıktığı eyaletle sınırlıdır. #V Bölgesel hastalıklar#!, tüberküloz gibi, bazı çevre eyaletlere yayılabilir ancak ötesine geçmez. #V Bölgeötesi hastalıklar#! - en kötü şöhretlisi kolera - ülke genelinde yayılabilir, eyaletlerin birbirine bitişik olması gerekmez."
 concept_panum_local_disease: "Yerel Hastalık"
 concept_panum_local_diseases: "Yerel Hastalıklar"
 concept_panum_regional_disease: "Bölgesel Hastalık"
 concept_panum_regional_diseases: "Bölgesel Hastalıklar"
 concept_panum_transregional_disease: "Bölgeötesi Salgın"
 concept_panum_transregional_diseases: "Bölgeötesi Salgın"
 concept_panum_germ_theory: "Mikrop Teorisi"
 concept_panum_germ_theory_desc: "Mikrop teorisi, 19. yüzyılın temel tıbbi bilimsel gelişmelerindendir. Avrupa’da yaygın olan ve [Concept('concept_panum_disease','$concept_panum_diseases$')]’in nedenini açıklamaya çalışan miasma teorisi gibi daha eski teorilerin yerini almıştır. Mikrop teorisinin keşfi yalnızca ilk bulana değil, aynı zamanda [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] arayışında başarı şansını biraz artırır, çünkü bazı olumsuz olayları önler ve daha fazla olumlu olayı açar."
 concept_panum_medical_prestige: "Tıbbi Prestij"
 concept_panum_medical_prestige_desc: "Tıbbi Prestij, şimdiye kadar keşfedilen [Concept('concept_panum_disease_description','$concept_panum_disease_descriptions$')] (2 puan), [Concept('concept_panum_disease_treatment','$concept_panum_disease_treatments$')] (4 puan), [Concept('concept_theiler_pathogen','$concept_theiler_pathogens$')] (3 puan) ve [Concept('concept_theiler_vaccine','$concept_theiler_vaccines$')] (4 puan) üzerinden oluşur. İlk keşifler iki kat puan verir. Daha fazla tıbbi prestij, günlük hastalıkları iyileştirmek, özel iyileştirme yöntemleri icat etmek veya bir [concept_panum_physician] aracılığıyla genel sağlık sistemini geliştirmekten gelebilir."
 concept_theiler_pathogen: "Patojen"
 concept_theiler_pathogens: "Patojenler"
 concept_theiler_pathogen_desc: "#n Çok yakında Morgenröte’de!#!"
 concept_theiler_vaccine: "Aşı"
 concept_theiler_vaccines: "Aşılar"
 concept_theiler_vaccine_desc: "#n Çok yakında Morgenröte’de!#!"
 concept_panum_red_cross: "Kızıl Haç"
 concept_panum_red_cross_desc: "Kızıl Haç, ilk uluslararası kuruluşlardan biridir ve nadir durumlarda bir savaşta Kızıl Haç sağlık görevlisi alma imkânı sunar. Kızıl Haç üyeleri ayrıca belirli bonuslar da alır. Oyun kuralına bağlı olarak Kızıl Haç, tarihsel ya da dinamik olarak kurulabilir; tanınmış devletler belirli teknoloji gereksinimleri karşılandığında katılabilir. Kurucu, Kızıl Haç merkezini başkentinde alır. Üyeler, uluslararası hukuk açısından bağlayıcı olan en fazla üç [Concept('concept_panum_convention','$concept_panum_conventions$')]’a katılabilir."
 concept_panum_convention: "Uluslararası Sözleşme"
 concept_panum_conventions: "Uluslararası Sözleşmeler"
 concept_panum_convention_desc: "Uluslararası bir sözleşme, devletlerin uluslararası ilişkilerde oyunun belirli kurallarını oluşturmak için ortak niyet beyanıdır. 19. yüzyıl boyunca buna birkaç örnek vardır; örneğin Cenevre Sözleşmesi veya Lahey Kara Savaşları Kodu. Tüm sözleşmelerin ortak noktası, savaşın dehşetini hafifletmeye çalışmalarıdır. Bu nedenle yaralıların güvenli tıbbi bakımı yerine askeri seçenekler tercih edilir ve nihai silahlar yasaklanır; bu, savaşın belirli ölçüde sınırlanmasına yol açar. Avantaj, daha büyük esnekliktir. Bir sözleşmenin kabulü olumlu görülürken, bir sözleşmenin kaldırılması uluslararası öfkeye yol açabilir.\n\nUluslararası sözleşmeler genellikle bağlayıcı olmayan niyet beyanlarıdır. Ancak [concept_panum_red_cross] üyelerinin yeterli sayıda imzalaması durumunda, zamanla geçerli uluslararası hukuk haline gelir ve tüm imzacıların buna uyması beklenir; diğer üyeler de imza atar. Bu, tüm üyelerin %65’i ve Büyük Güçlerin çoğunluğu sözleşmeye onay verdiğinde olur — diğer tüm üyeler de buna uymak zorunda kalır. Bu sözleşme daha sonra normal şekilde kaldırılamaz. Bağlayıcı sözleşmelerden kaçınmak için Kızıl Haç’tan tamamen çekilmek gerekir — tüm sonuçlarıyla birlikte."
 concept_manzoni_literary_tradition_desc: "#b Literary Tradition#! is a representation of a nation's literary achievements and traditions.\nThere are various ways to gain #b Literary Tradition#!. Having at least one $building_art_academy$, having one or more [Concept('concept_manzoni_local_writer','$concept_manzoni_local_writers$')], a [concept_manzoni_national_writer] and having certain [Concept('concept_artists_center_of_arts','$concept_artists_centers_of_arts$')] will passively add #b Literary Tradition#! to your country.\nThe more #b Literary Tradition#! your nation gains, the higher the prestige bonus you gain. Additionally it will allow you to unlock the [concept_elgar_expressionism] [concept_artists_art_style]."
 concept_elgar_musical_tradition_desc: "#b Müzikal Gelenek#!, bir ulusun müzik alanındaki başarılarını ve geleneklerini temsil eder.\n#b Müzikal Gelenek#! kazanmanın çeşitli yolları vardır. En az bir [concept_elgar_opera] varsa, pasif olarak #b Müzikal Gelenek#! elde edersiniz. #b Opera#! sayınız arttıkça kazandığınız #b Müzikal Gelenek#! miktarı da artar. Müzik ve sanat teknolojilerinden de #b Müzikal Gelenek#! kazanabilirsiniz. Her teknoloji farklı bir bonus verir. Ayrıca etkinliklerden, özellikle bir [concept_elgar_composer] varsa, daha fazla #b Müzikal Gelenek#! kazanabilirsiniz.\nUlusun kazandığı #b Müzikal Gelenek#! ne kadar fazla olursa, kazandığınız prestij bonusu o kadar yüksek olur. Ayrıca [concept_elgar_impressionism] [concept_artists_art_style]’i açmanıza olanak sağlar."
 concept_klimt_painting_tradition_desc: "#b Resim Geleneği#!, bir ulusun resim alanındaki başarılarını ve geleneklerini temsil eder. #b Sanat Akademileri#!, bir [concept_klimt_painter], belirli [Concept('concept_technology', '$concept_technologies$')] veya etkinliklerden kazanılabilir.\n#b Resim Geleneği#!, [concept_elgar_art_nouveau] [concept_artists_art_style]’i açmanıza olanak sağlar ve #b Kültürel Gelenek#! hesaplamasında kullanılır."
 concept_mendelejew_theorized_elements: "Teorize Edilmiş Elementler"
 concept_mendelejew_discovered_elements: "Keşfedilmiş Elementler"
 concept_mendelejew_isolated_elements: "İzole Edilmiş Elementler"
 concept_panum_psycho_point: "Psikoterapi Puanı"
 concept_panum_psycho_points: "Psikoterapi Puanları"
 concept_panum_psycho_point_desc: "Psikoterapi puanları, bir ülkenin psikiyatri ve psikoloji alanındaki ilerlemesini temsil eden soyut bir para birimidir. Teknolojiler, bir akıl hastanesi veya #V Psikiyatrist#! [concept_character_trait] özelliğine sahip bir [concept_panum_physician] aracılığıyla aylık olarak üretilir. Psikoterapi puanları ayrıca etkinlikler aracılığıyla da kazanılabilir. Yüksek psikoterapi puanı, zihinsel hastalığı olan karakterleri iyileştirme şansını artırır. Psikoterapi seviyesi yükselmesi ayrıca araştırma bonusları ve [concept_academics_progress] sağlar. Belirli bir psikoterapi puanı, çoğu psikolojik okul için gereklidir."
 concept_vikelas_mechanic: "Mekanikçi"
 concept_vikelas_mechanic_desc: "LOREM IPSUM"
 concept_vikelas_mechanical_innovation: "Mekanik Yenilik"
 concept_vikelas_race_car: "Yarış Arabası"
 concept_vikelas_race_car_desc: "LOREM IPSUM"
 concept_vikelas_race_car_reliability: "Yarış Arabası Dayanıklılığı"
 concept_vikelas_race_car_safety: "Yarış Arabası Güvenliği"
 concept_vikelas_race_car_speed: "Yarış Arabası Hızı"
 concept_dubois_dinosaur_bone_no_dinosaur: "Kemikler"
 concept_dubois_dinosaur_bones_no_dinosaur: "Kemikler"
 concept_dubois_paleontological_expedition_desc: "Bir [concept_dubois_paleontologist], [Concept('concept_dubois_formation','$concept_dubois_formations$')] bölgelerine gönderilebilir. Bu, 1 yıl sürecek ve Seferin Başarı düzeyine bağlı olarak [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] ve [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] elde edilecektir. Bir Sefer tamamlandıktan ve eğer boş bir [concept_dubois_paleontological_team] varsa, bu bölgeden Fosiller ve Kemikler pasif olarak elde etmek için bir [concept_dubois_paleontological_excavation] kurabilirsiniz.\nBir formasyona erişmenin en kolay yolu, ilgili eyaleti kontrol etmektir. Ancak, erişim barışçıl yollarla da [Concept('concept_dubois_paleontological_licence','$concept_dubois_paleontological_licences$')] aracılığıyla elde edilebilir."
 concept_dubois_paleontological_team: "Paleontoloji Ekibi"
 concept_dubois_paleontological_teams: "Paleontoloji Ekipleri"
 concept_dubois_paleontological_team_desc: "Paleontoloji Ekipleri, bir [concept_dubois_paleontological_expedition] tamamlandıktan sonra bir [concept_dubois_paleontological_excavation] kurmak için kullanılabilir. Bu, [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] ve [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] pasif olarak elde etmenizi sağlar."
 concept_dubois_paleontological_excavation: "Paleontolojik Kazı"
 concept_dubois_paleontological_excavations: "Paleontolojik Kazılar"
 concept_dubois_paleontological_excavation_desc: "Boş bir [concept_dubois_paleontological_team] varsa, bir [concept_dubois_paleontological_expedition] tamamlandıktan sonra bir Paleontolojik Kazı kurabilirsiniz. Paleontolojik Kazı, Ekibinizin [Concept('concept_dubois_fossil','$concept_dubois_fossils$')] ve [Concept('concept_dubois_dinosaur_bone','$concept_dubois_dinosaur_bones$')] pasif olarak üretmesini sağlar."
 concept_verrier_venus_transit: "Venüs Geçişi"
 concept_verrier_venus_transit_desc: "The transit of Venus refers to the rare occurrence of the moon passing between Earth and Venus. However, it occurred twice in the 19th century: in 1874 and 1882. Since observations of the transit of Venus allow conclusions to be drawn about the size of the solar system and a more precise determination of the size of the astronomical unit (AU), these were major scientific events. Countries located in the [concept_verrier_venus_transit_zone] can observe the event from there; other countries must send expeditions. The success of the observation depends on the experience of the [concept_verrier_astronomer], the availability of an [concept_tesla_engineer], and a bit of luck: sometimes the weather can prevent a good image. The better the observation, the greater the bonus."
 concept_verrier_venus_transit_zone: "Venüs Geçişi Bölgesi"
 concept_verrier_venus_transit_zone_desc: "Venüs Geçişi Bölgesi, Dünya’dan Venüs’ün tam geçişinin (sadece kısmi değil) gözlemlenebileceği kısmı ifade eder. 1874 yılında özellikle Doğu Asya-Pasifik bölgesi için geçerliydi, 1882’de ise neredeyse tüm Amerika kıtası için geçerliydi. Stratejik bölgelerin detaylı dökümü aşağıdadır.\n\n#V Venüs Geçişi 1874:#!\nEndonezya, Hindistan, Okyanusya, Güney Çin, Kuzey Çin, Mançurya, Japonya, Orta Hindistan, Madras, Bengal, Himalayalar; ayrıca Hint Okyanusu Eyaleti.\n\n#V Venüs Geçişi 1882:#!\nBrezilya, La Plata, Andes, Gran Columbia, Meksika, Orta Amerika, Karayipler, Ortabatı, Dixie, Yeni İngiltere; ayrıca Ontario ve Quebec Eyaletleri."
 concept_vikelas_coach: "Antrenör"
 concept_vikelas_coaches: "Antrenörler"
 concept_vikelas_coach_desc: "Antrenörler, bir ülkenin belirli bir ulusal spordaki ulusal eğitmenleridir. Ulusal sporlar arasında [concept_vikelas_football], beyzbol, basketbol ve kriket bulunur. Antrenörler, ilgili takım için yarışmalarda – ister Uluslararası Dünya Şampiyonaları’nda ister uluslararası maçlarda – bonus sağlar. Sonuncuları düzenli aralıklarla gizli oynanır ve galibiyet halinde bir antrenörün deneyim değerini artırır. Yüksek deneyim puanları ve olumlu [Concept('concept_character_trait','$concept_character_traits$')] bir Dünya Şampiyonası’nı kazanma şansını artırır. Olumlu özellikler, oyuncuları özellikle motive eden özelliklerdir – örneğin hırslı veya karizmatik – olumsuz özellikler ise maç kazanma şansını azaltır. Bu özellikler arasında acımasız veya zalim gibi özellikler bulunur.\n\n#R NOT: Şu anda yalnızca futbol entegre edilmiştir.#!"
 concept_vikelas_football: "Futbol"
 concept_vikelas_football_desc: "Futbol, olası bir ulusal spordur. İlk futbol kulüpleri Avrupa ve Güney Amerika’da kurulabilir; bu, nispeten liberal bir hukuk sistemi, güçlü bir küçük burjuvazi veya önemli bir ortalama yaşam standardı gerektirir. Bundan sonra, ara sıra futbol maçları oynanabilir. FIFA’nın kurulmasıyla uluslararası maçlar ve Dünya Kupası da mümkün hale gelir. En iyi sekiz takım otomatik olarak Dünya Kupası’na katılır. Takımlar, Ulusal Futbol Takımı Değeri (NFTV) üzerinden hesaplanır; bu, yaşam standardı (nüfusun kondisyonu), küçük burjuvazinin gücü (kulüp sistemi), okuryazarlık (taktikler) ve gelenek (ulusal spor: evet veya hayır?) parametrelerinden türetilir. Maçlarda yalnızca NFTV değil, aynı zamanda [concept_vikelas_coach]’un karakter özellikleri ve deneyimi de dikkate alınır."
 concept_gaudi_architectural_splendour: "Mimari Görkem"
 concept_gaudi_architectural_splendour_desc: "Mimari Görkem, modern mimarideki spektaküler ilerlemeleri kapsayan kolektif bir terimdir ve öncelikle 20. yüzyılın başlarında ortaya çıkan Art Deco, Bauhaus ve Neoklasisizm’i ifade eder. Değer, eski biçimlerin geleceğe hazır bir mimariye dönüştürülmesini temsil eder. Art Deco, bir Art Deco şehri hayalini gerçekleştirmek için daha yüksek bir eşik gerektirir — ancak faydaları daha büyüktür."
 concept_artists_artist_desc: "[concept_morgenroete]’de #b Sanatçılar#!, modun bazı mekaniklerini kullanmanıza olanak tanıyan özel karakterlerdir. #b Sanatçılar#! bazı etkinliklerde veya yeterli [concept_artistic_progress] elde ederek kazanılabilir. Sanatçılar, kendi alanlarındaki statülerini yansıtan [concept_artists_experience] değerine sahiptir.\nŞu anda mevcut #b Sanatçılar#! şunlardır:\n - [concept_elgar_composer]\n - [concept_klimt_painter]\n - [concept_manzoni_writer]\n - [concept_gaudi_architect]"
 concept_elgar_architecture_desc: "Mimarlık, [concept_morgenroete]’nin temel kavramlarından biridir ve iki ana bölüme ayrılır.\n\nBir yandan, [concept_gaudi_monuments] tamamen yeniden tasarlanmıştır: artık doğrudan inşa edilmez, kararlar doğrultusunda adım adım genişletilir. Öte yandan, birçok anıt eklenmiştir — bazıları inşa edilmelidir, diğerleri oyunun başında mevcuttur.\n\nDiğer önemli nokta, şehirleri yükseltebilen ve [Concept('concept_gaudi_architectural_blueprint','$concept_gaudi_architectural_blueprints$')] araştırarak 15 yeni benzersiz bina tasarlayabilen [concept_gaudi_architect]’ın tanıtılmasıdır. Mimarlar ayrıca bir ülkeyi Bauhaus, Neoklasik ve Art Deco stillerinde yeniden inşa edebilirler. Bir [concept_gaudi_great_architect], kendi [concept_gaudi_custom_monument]’ını bile tasarlayabilir!"
 concept_gaudi_architect_desc: "#PURPLE #b Mimarlar#!#!, becerileri şehir planlaması, bina tasarımı ve inşaat ile ilgili olan [Concept('concept_artists_artist','$concept_artists_artists$')] karakterleridir. Bu, ya etkinliklerden, ya yeterli [concept_artistic_progress] ile ülkenizde birini yaratmaktan ya da bir [concept_gaudi_independent_architect]’a pozisyon teklif etmekten kazanılabilecek özel karakter türüdür.\nDiğer sanatçılar kültürel geleneği biriktirmeye daha yatkınken, mimarlar nadiren, şehir planlamasına veya başkent genişletmesine katıldıklarında çok değerli [concept_gaudi_architectural_splendour] üretirler—ya da ülkeyi belirli bir mimari stilde tamamen yeniden tasarladıklarında. Ana görevleri daha pratiktir. Kamu inşaatlarında çalışarak ülkeye ek inşaat puanları sağlarlar. Planlama yoluyla altyapıyı geliştirir ve başkentleri yaşanabilir alanlara dönüştürürler. Mimarlar ayrıca bir çalışma turunda becerilerini geliştirebilir veya bir mimari risale yazabilirler.\nYeni benzersiz binaların tasarımı ise en önemli görevdir; bunun için bir [concept_gaudi_architectural_blueprint] oluştururlar. Toplamda 15 [concept_gaudi_blueprint_buildings] araştırılabilir—bu uzun süreceğinden hangi binaların mantıklı olduğunu düşünmek önemlidir.\nMimarlar ayrıca pasif bir bonus sağlar: varlıkları, [concept_gaudi_monuments] inşaatını %100 hızlandırır. Bir mimarın en büyük başarısı, kendi [concept_gaudi_custom_monument]’ını tasarlamasıdır. Bu yalnızca bir [concept_gaudi_great_architect] ile mümkündür."
 concept_douglas_mountaineering: "Dağcılık"
 concept_douglas_mountaineering_desc: "En az bir [concept_douglas_mountain_summit] sahibi olan veya bunu sahip bir ülkeden #b Dağcılık Lisansı#! olan ülkeler dağcılığa katılabilir. Bir #b Dağ Seferi#! başlatmak için hem #b Keşif#! hem de #b Milliyetçilik#! teknolojilerine ve #b Dağcı#!, #b Kaşif#!, #b Dağ Komutanı#! veya #b Ölçümcü#! Traits sahip bir generale ihtiyacınız vardır.\n#b Dağ Seferi#! başlar başlamaz, önce hangi generalin ana Dağcı olacağını seçmelisiniz. Ardından tırmanılacak zirve seçilir.\nDağlar ne kadar yüksekse, tırmanış o kadar tehlikelidir. Dağlar metre cinsinden 4000 metrenin altından 8000 metrenin üstüne kadar sınıflandırılır. Başarı, araştırılmış askeri teknolojilere, liderin yaşına ve sağlığına ve özelliklerine bağlıdır. Çığlar ve dik yamaçlar tüm girişimi tehdit edebilir.\nEk olarak bir [Concept('concept_academics_academic','$concept_academics_scientist$')] de seyahate gönderilebilir. Bir [concept_dubois_naturalist] veya [concept_dubois_paleontologist], tırmanılan dağ hakkında daha fazla keşif yapılmasına yardımcı olur.\nSonuçta prestij bonusu alırsınız ve generaliniz, savaşta ve dağcılıkta da faydalı olacak daha iyi yetenekler kazanır."
 concept_gaudi_great_architect: "#PURPLE #b Büyük Mimar#!#!"
 concept_gaudi_great_architects: "#PURPLE #b Büyük Mimarlar#!#!"
 concept_gaudi_great_architect_desc: "#b Büyük Mimarlar#!, alanlarında en önemli zihinler olarak kabul edilen [Concept('concept_gaudi_architect','$concept_gaudi_architects$')]’tır. #b Mimarlar#! 500 [concept_artists_experience] değerine ulaştığında #b Büyük Mimar#! olurlar. Bir sanatçı bu özel rütbeye ulaştığında, ulusun ruhunu yansıtan gerçekten olağanüstü bir [concept_gaudi_custom_monument] için tasarım yapabilir."
 concept_gaudi_monuments: "#R Morgenröte#!’deki Anıtlar"
 concept_gaudi_monuments_desc: "[concept_morgenroete]’de birçok ülke yeni #b Anıtlara#! kavuştu: Almanya’da #b Köln Katedrali#!, İsviçre’de #b Gotthardbahn#!, Brezilya’da #b Cristo Redentor#!, İtalya’da #b Mole Antonelliana#!, Çin’de #b Yaz Sarayı#!, İspanya’da #b Sagrada Família#!, Bavyera’da #b Schloss Neuschwanstein#!, Meksika’da #b Palacio de Bellas Artes#! ve Kore’de #b Gyeongbokgung Sarayı#!.\n#b Yaz Sarayı#! ve #b Campanile#! hariç tüm binalar sahipleri tarafından inşa edilmelidir; #b Sakson Sarayı#! ise bir Polonya ülkesi tarafından yeniden etkinleştirilebilir. Ayrıca oyun başında mevcut olan yeni anıtlar da vardır: #b Bamiyan Buda’ları#! veya #b Potala Sarayı#! gibi.\nBir [concept_gaudi_custom_monument]’ın bir [concept_gaudi_great_architect] tarafından tasarlanması da mümkündür.\n\nVanilla oyundan farklı olarak, #b Anıtlar#! doğrudan inşa edilmez; bunun yerine bir karar yoluyla inşa edilir. İnşaat, binanın büyüklüğüne bağlı olarak birkaç aşamada gerçekleşir ve yıllar hatta onlarca yıl sürebilir — ayrıca maliyeti önemli ölçüde daha yüksektir."
 concept_athletes_athlete: "Atlet"
 concept_athletes_athletes: "Atletler"
 concept_athletes_athlete_desc: "[concept_morgenroete]’de #b Atletler#!, modun belirli mekaniklerini kullanmanıza olanak tanıyan özel karakterlerdir. #b Atletler#! genellikle etkinlikler aracılığıyla veya bir buton yoluyla oluşturulur. Diğer karakterlerde olduğu gibi, #b Atletler#! de alanlarında daha büyük başarıyı garanti eden deneyime sahiptir.\nMevcut #b Atletler#! şunlardır:\n - [concept_curtiss_balloonist]\n - [concept_curtiss_pilot]\n - [concept_vikelas_olympian]\n - [concept_douglas_mountaineer]\n - [concept_vikelas_coach]\n - [concept_vikelas_racer]"
 concept_gaudi_independent_architect: "Bağımsız Mimar"
 concept_gaudi_independent_architects: "Bağımsız Mimarlar"
 concept_gaudi_independent_architect_desc: "Bir ülke tarafından işe alınmamış [Concept('concept_gaudi_architect','$concept_gaudi_architects$')] #b Bağımsız Mimarlar#! olarak adlandırılır.\nDiğer birçok sanatçının aksine, bir #b Bağımsız Mimar#! işe almak için çok az gereklilik vardır, yalnızca minimum bir teknolojik gereklilik bulunur. Gerçek bir gezgindirler ve genellikle sadece iyi bir ödeme talep ederler."
 concept_gaudi_architectural_blueprint: "Mimari Plan"
 concept_gaudi_architectural_blueprints: "Mimari Planlar"
 concept_gaudi_architectural_blueprint_desc: "Mimari planlar, [Concept('concept_gaudi_architect','$concept_gaudi_architects$')] tarafından araştırılabilir. Bunlar, bir ülkede yalnızca bir kez inşa edilebilen özel [concept_gaudi_blueprint_buildings] için gereklidir. Toplamda beş farklı kategoride 15 farklı bina vardır. Bazı planların araştırılabilmesi için belirli teknolojilerin araştırılmış olması gerekir. Araştırmalar bazen yıllar sürebileceği için hangi planların öncelikli olduğunu önceden belirlemek akıllıca olur. Binalar potansiyel olarak herhangi bir eyalette inşa edilebilir, ancak belirli bir kentleşme seviyesine ihtiyaç duyar. Bazı durumlarda ek gereklilikler olabilir."
 concept_gaudi_blueprint_buildings: "Plan Binaları"
 concept_gaudi_blueprint_buildings_desc: "Plan binaları, [Concept('concept_gaudi_architect','$concept_gaudi_architects$')] tarafından araştırılan planlara ihtiyaç duyan binalardır. Bu binalar bir ülkede yalnızca bir kez inşa edilebilir. Toplam 15 farklı bina vardır:\n\n#b Anıt#!\n- [GetBuildingType('building_gaudi_statue').GetName]\n- [GetBuildingType('building_gaudi_fountain').GetName]\n- [GetBuildingType('building_gaudi_arch').GetName]\n\n#b Meydan#!\n- [GetBuildingType('building_gaudi_park').GetName]\n- [GetBuildingType('building_gaudi_luna').GetName]\n- [GetBuildingType('building_gaudi_parade').GetName]\n\n#b Hizmet Binaları#!\n- [GetBuildingType('building_gaudi_almshouse').GetName]\n- [GetBuildingType('building_gaudi_school').GetName]\n- [GetBuildingType('building_gaudi_prison').GetName]\n\n#b Sağlık Kurumları#!\n- [GetBuildingType('building_gaudi_canalization').GetName]\n- [GetBuildingType('building_gaudi_hospital').GetName]\n- [GetBuildingType('building_gaudi_health').GetName]\n\n#b Ulusal Akademiler#!\n- [GetBuildingType('building_gaudi_science').GetName]\n- [GetBuildingType('building_gaudi_arts').GetName]\n- [GetBuildingType('building_gaudi_sports').GetName]"
 concept_gaudi_custom_monument: "Özel Anıt"
 concept_gaudi_custom_monument_desc: "Özel bir anıt, bir [concept_gaudi_architect]'ın mümkün olan en büyük başyapıtıdır. Diğer sıradan anıtlarla yarışabilir. Böyle planları yalnızca bir [concept_gaudi_great_architect] hazırlayabilir. En modern mimari teknolojilerin araştırılmasını gerektirir. Bir mimarın tasarladığı anıt türü büyük ölçüde mimari stiline bağlıdır. Art Deco mimarları [GetBuildingType('building_gaudi_people_monument').GetName], Bauhaus mimarları [GetBuildingType('building_gaudi_people_forum').GetName] ve Neoklasik mimarlar [GetBuildingType('building_gaudi_people_palace').GetName] tasarlar."
 concept_douglas_mountaineer: "Dağcı"
 concept_douglas_mountaineers: "Dağcılar"
 concept_douglas_mountaineer_desc: "#b Dağcılar#!, fethedilmemiş [concept_douglas_mountain_summit]’lara tırmanabilen [Concept('concept_athletes_athlete','$concept_athletes_athletes$')] karakterlerdir. Bir dağcılık kulübü kurulduktan sonra [concept_douglas_alpine_heritage] karşılığında işe alınabilirler. Dağlar, zirveler veya volkanlar gibi coğrafi özelliklere sahip ülkeler işe alımda avantaj sağlar. Dağcılık özellikleri ve deneyim, bir dağı fethetmede veya tehlikeli bir durumu aşmada en önemli faktörlerdir.#!"
 concept_vikelas_olympian: "Olimpiyatçı"
 concept_vikelas_olympian_desc: "#n Bu giriş gözden geçiriliyor.#!"
 concept_douglas_mountain_summit: "Dağ Zirvesi"
 concept_douglas_mountain_summits: "Dağ Zirveleri"
 concept_douglas_mountain_summit_desc: "Dağ Zirveleri, tüm dağcıların arzuladığı hedeflerdir. Bir dağın en yüksek noktalarını işaret ederler. Her zirve, başarıyla tırmanmanın zorluk seviyesini belirleyen üç farklı özelliğe sahiptir.\n\n#V Yükseklik#!: Yükseklik, bir dağa tırmanmak için kaç adım gerektiğini belirler—bu, bir keşif gezisinin genel uzunluğunu yansıtır. Her 1.000 metre için bir ilerleme adımı gerekir. Değer yukarı yuvarlanır; örneğin 4.421 metre yüksekliğindeki Mount Whitney için 5 adım, 7.134 metre yüksekliğindeki Kauffmann Zirvesi için 8 adım gerekir. Bir dağın prestiji yüksekliğine göre hesaplanır: toplam yükseklik 300’e bölünür. Böylece ideal bir 4.500 metrelik dağ 15 prestij puanı verir.\n\n#V Seviye#!: Bir dağın seviyesi, tırmanış için gerekli ekipman gereksinimlerini temsil eder. Bu, mutlaka yüksekliğiyle bağlantılı değildir. Örneğin 5.636 metre yüksekliğindeki Citlaltépetl yalnızca Seviye 1’dir ve temel ekipman gerektirir. Buna karşın sadece 4.478 metre yüksekliğindeki Matterhorn, önemli ölçüde daha zorlu sayılır ve en azından Alpler için ilkyardım hazırlığı gerektirir.\n\n#V Risk#!: Bir dağın risk seviyesi, keşif gezisini etkileyebilecek olumsuz olayların olasılığını gösterir. Hem yükseklikten hem de seviyeden bağımsızdır. Çığlar, sis ve şiddetli hava koşulları temel endişelerdir. Popocatépetl, uygun çevresi nedeniyle erken modern dönemde bile tırmanılabilmiştir. Buna karşılık yalnızca 3.666 metre yüksekliğindeki Großvenediger, 19. yüzyılın başlarına kadar Avusturya keşifleri için ciddi bir tehdit oluşturmuştur.\n\nBireysel zirveler hakkında daha fazla bilgi için [concept_douglas_mountain_summit_list] bölümüne bakabilirsiniz."
 concept_douglas_mountain_range: "Dağ Sıradağları"
 concept_douglas_mountain_ranges: "Dağ Sıradağları"
 concept_douglas_mountain_range_desc: "Bir dağ sırası, uzun mesafelerde [concept_douglas_mountaineering] eğitimi için potansiyel sunan bir dağ oluşumu olarak tanımlanır. Klasik sıradağlar arasında Rocky Dağları, Andes, Alpler ve Kafkaslar bulunur. Fethedilecek [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')]’lerden farklı olarak, ölümlü bir düşme riski olmayan daha az zorlu dağlar da vardır. Bunlar bir eğitim rotası olarak görülmelidir. Dağ sıralarına sahip ülkeler, bu coğrafi özelliğe sahip olmayanlara göre daha fazla dağcı yetiştirir."
 concept_douglas_alpine_heritage: "Alp Mirası"
 concept_douglas_alpine_heritage_desc: "Alp Mirası, dağlarla bağ ve dağ tırmanışında uzmanlaşmayı ifade eden bir terimdir. Ayrıca yeni [Concept('concept_douglas_mountaineer','$concept_douglas_mountaineers$')] işe alma potansiyelini de kapsar—çünkü çoğu deneyimli dağcı dağlık bölgelerden gelir. Bu, her zaman [Concept('concept_douglas_mountain_range','$concept_douglas_mountain_ranges$')] veya [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] olan ülkelere avantaj sağlar. Yeni bir dağcıyı işe almak ve çeşitli diğer eylemler Alp Mirası gerektirir."
 concept_douglas_mountain_summit_list: "Dağ Zirveleri Listesi"
 concept_douglas_mountain_summit_list_desc: "Tırmanılabilecek birçok [Concept('concept_douglas_mountain_summit','$concept_douglas_mountain_summits$')] vardır.\n\n#V Kuzey Amerika:#!\n#b Mount McKinley#! (Alaska), Yükseklik 6190 metre, Seviye 4\n#b Mount Logan#! (Yukon Territory), Yükseklik 5959 metre, Seviye 4\n#b Citlaltépetl#! (Meksika), Yükseklik 5636 metre, Seviye 1\n#b Mount Whitney#! (California), Yükseklik 4421 metre, Seviye 1\n\n#V Güney Amerika:#!\n#b Aconcagua#! (Mendoza), Yükseklik 6267 metre, Seviye 3\n#b Huascarán#! (Lima Territory), Yükseklik 6768 metre, Seviye 5\n#b Illimani#! (La Paz), Yükseklik 6438 metre, Seviye 4\n#b Chimborazo#! (Ekvador), Yükseklik 6267 metre, Seviye 1\n\n#V Avrupa:#!\n#b Shkara#! (Büyük Kafkaslar), Yükseklik 5642 metre, Seviye 4\n#b Dufourspitze#! (Dufourspitze), Yükseklik 4634 metre, Seviye 2\n#b Matterhorn#! (Batı İsviçre), Yükseklik 4478 metre, Seviye 3\n#b Aiguille Verte#! (Savoy), Yükseklik 4122 metre, Seviye 3\n#b Pico de Aneto#! (Aragon), Yükseklik 3404 metre, Seviye 1\n\n#V Afrika:#!\n#b Kibo#! (Tanzanya), Yükseklik 5895 metre, Seviye 2\n#b Mount Kenya#! (Kenya), Yükseklik 5199 metre, Seviye 3\n#b Mount Stanley#! (Uganda), Yükseklik 5109 metre, Seviye 3\n#b Mount Cameroon#! (Güney Kamerun), 4095 metre, Seviye 1\n\n#V Asya:#!\n#b Kamet#! (Delhi), Yükseklik 7756 metre, Seviye 5\n#b Chogolisa#! (Keşmir), Yükseklik 7665 metre, Seviye 5\n#b Kabru#! (Himalayalar), Yükseklik 7412 metre, Seviye 5\n#b Kaufmann Peak#! (Tacikistan), Yükseklik 7134 metre, Seviye 4\n\n#V Avustralya & Okyanusya:#!\n#b Mount Wilhelm#! (Doğu Yeni Gine), Yükseklik 4121 metre, Seviye 2\n#b Mount Cook#! (Güney Adası), Yükseklik 3724 metre, Seviye 2"
