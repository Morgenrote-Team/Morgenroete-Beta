 gaudi.1321.d: "Our [concept_tesla_military_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] has worked for years to develop a new methods to construct fieldworks and fortifications for our army. Now our soldiers will be able use advanced methods to protect themselves by using fieldworks and fortifications."
