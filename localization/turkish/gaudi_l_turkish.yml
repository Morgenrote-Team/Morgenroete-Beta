 gaudi_eiffel_phase_1_decision: "Eyfel Kulesi"
 gaudi_eiffel_phase_1_decision_desc: "Sanayileşmenin teknik olanakları ile birlikte yüksek binalar inşa etme fikirleri ortaya çıktı. Özellikle kule yapıları dönemin ruhunu yansıtıyordu. 1 Mayıs 1886'da Ticaret Bakanı Édouard Lockroy, Paris Dünya Sergisi binaları için Fransız mimar ve mühendisleri hedefleyen bir fikir yarışmasını duyurdu. Yaklaşık 100 başvuru sahibi katıldı; birçoğu kule yapısı fikrini benimsedi. İlk seçimden sonra Eiffel'in katkısı ve Ferdinand Dutert ile Jean Camille Formigé’nin tasarımları dahil olmak üzere üç şablon kaldı. Eiffel, Sauvestre'in ağır süslemeli versiyonunu bazı dekoratif unsurları çıkarmadan tekrar revize ettirdi ve bu uzlaşma önerisi ile yarışmayı kazandı."
 gaudi_liberty_phase_1_decision: "Özgürlük Heykeli"
 gaudi_liberty_phase_1_decision_desc: "Heykeltıraş Frédéric-Auguste Bartholdi, Fransız ve Amerikan halkları arasındaki kardeşliği simgeleyen ve Bağımsızlık Savaşı’ndaki ortak mücadele ile Aydınlanma ideallerine atfen bir Özgürlük Heykeli dikilmesini önerdi. Heykel, özgür ve demokratik Amerika'nın sembolü olmalıydı. 1876’daki ABD'nin yüzüncü yıl kutlamaları bu fikre yeni bir ivme kazandırdı."
 gaudi_ben_phase_1_decision: "Değerli Bir Parlamento"
 gaudi_ben_phase_1_decision_desc: "16 Ekim 1834'te, yıkıcı bir yangın Westminster Sarayı'nın çoğunu yok etti. Maliye Bakanlığı, 1826'daki vergi reformundan sonra gereksiz hale gelen çıtalı odunları yakmaya karar vermişti. İki araba yükü iki fırında yakıldı ve Lords Odası'nda yangın çıktı. Yalnızca Westminster Hall, Mücevher Kulesi, St Stephen Şapeli’nin mahzeni ve revaklar zarar görmedi. Haziran 1835’te bir komisyon sarayın aynı yerde yeniden inşa edilmesine karar verdi; ya Gotik ya da Tudor tarzında. 1836'da 97 yarışma teklifini inceleyen komisyon, Gotik tarzda yeniden inşayı öngören Charles Barry’nin planını seçti."
 gaudi_ben_phase_2_decision: "Ayırt Edici Bir Çan"
 gaudi_ben_phase_2_decision_desc: "Big Ben adı, Westminster Sarayı'ndaki ünlü saat kulesinin beş çanından en ağırını ifade eder ve ağırlığı 13,5 ton. Kule 96,3 metre yüksekliğinde olup, ilk 61 metre tuğladan ve taş cepheli, üst kısmı ise dökme demirden yapılmıştır. Westminster Sarayı’nın mimarı Charles Barry, kule tasarımını Augustus Pugin’e emanet etti. Saat mekanizması 1848’de Sir George Airy ve Edmund Denison tarafından geliştirildi ve saatçi Edward John Dent tarafından üretildi. Dört kadranın çapı yedi metredir. Her dört kadranın altında Latince olarak 'Domine salvam fac reginam nostram Victoriam primam' (Tanrı Kraliçemiz Victoria’yı korusun) yazılıdır."
