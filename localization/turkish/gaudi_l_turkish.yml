 je_gaudi_custom_monument_blueprint_research_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName], [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] döneminin en önemli mimarlarından biri olarak dünya çapında ün kazanmıştır. Adını ölümsüzleştirmek için, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] ülkemizi mimari sanatın merkezi hâline getirecek olağanüstü bir anıt için plan üzerinde çalışıyor."
 gaudi.81.t: "Mimarın Başyapıtı"
 gaudi.81.d: "Son yıllarda, [THIS.GetCountry.GetName] mimarlık alanında önde gelen ülkelerden biri hâline geldi. Bu gelişimde [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] önemli bir rol oynadı. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U], antik, ortaçağ ve modern dönemin büyük harikalarıyla yarışacak bir anıt tasarlama görevini kabul etti."
 gaudi.81.f: "Mimarın Anıtı, Büyük Mimarın tercih ettiği stile dayanmaktadır:\n\nArt Deco Mimarları [GetBuildingType('building_gaudi_people_monument').GetName] tasarlayacak.\nBauhaus Mimarları [GetBuildingType('building_gaudi_people_forum').GetName] sunacak.\nNeoklasik Mimarlar [GetBuildingType('building_gaudi_people_palace').GetName] yaratacak."
 gaudi.81.g: "Muhteşem."
