 je_gaudi_sagrada_phase_10: "Sagrada Família: İsa’nın Çan Kulesi"
 je_gaudi_sagrada_phase_10_reason: "İsa’nın kulesi, incillerin kuleleriyle dört köprüyle bağlanır ve tepesinde altı kollu büyük bir haç bulunur, yüksekliği 13,5 m’dir: ortasında bir kuzu ve 'Tu solus Sanctus, Tu solus Dominus, Tu solus Altissimus' yazısı ile 'Amen' ve 'Hallelujah' kelimeleri yer alır. Haçın dört kolunun her biri, 'Ben dünyanın ışığıyım' ayetini hatırlatmak için büyük mesafelerden görülebilen güçlü ışık ışınları yayar. İçeride, İsa’nın kulesi üç kata bölünecek ve evrenin yaratılışını ve İsa ile ilgili 'Ben Yolum, Gerçektir ve Hayatım' ifadesini simgeleyecektir."
