 je_gaudi_rebuild_campanile: "Dov'era e com'era"
 je_gaudi_rebuild_campanile_reason: "Campanile di San Marco çöktükten sonra, önde gelen çevreler Venedik’in sembollerinden birini orijinal haliyle yeniden inşa etmeye karşı çıktı. Bu tarihî yeniden yapım zaman ve maliyet gerektirecek."
 je_gaudi_rebuild_campanile_goal: "#E İnşaat İlerleyişi#! #BLUE 120#! puana ulaşır. Şu anda #G [GetGlobalVariable('gaudi_campanile_progress').GetValue]#! puandayız. Normalde her ay bir puan kazanırız."
 gaudi.70.t: "Campanile’nin Çöküşü"
 gaudi.70.d: "Venedik’in simgelerinden biri olan Campanile di San Marco çöktü. Sadece Venedik sakinleri değil, tüm bir halk kaybı için yas tutuyor. Şimdi ne olacağı hâlâ tamamen belirsiz."
 gaudi.70.f: "Campanile di San Marco, Venedik’teki San Marco Bazilikası’nın çan kulesidir ve Piazza San Marco’da yer alır. Şehrin en tanınmış sembollerinden biridir. Temmuz 1902’de, kuzey duvarında tehlikeli bir çatlak belirtileri göstermeye başladı ve sonraki günlerde büyümeye devam etti. Sonunda, 14 Temmuz Pazartesi günü, saat 9:45 civarında Campanile tamamen çöktü ve logetta’yı da yıktı. Şaşırtıcı şekilde, kimse ölmedi, sadece bakıcının kedisi. Campanile’nin konumu nedeniyle, oluşan hasar nispeten sınırlı kaldı. Logetta dışında sadece Biblioteca Marciana’nın bir köşesi yıkıldı. Yasaların okunduğu büyük porfir kolon olan pietra del bando, bazilikayı korudu. Yine de, eski İtalyan kültürünün en büyük sembollerinden birinin kaybı tüm ülkede tartışıldı."
 gaudi.70.g: "Campanile’yi yeniden inşa et - olduğu yerde ve olduğu gibi."
 gaudi.70.h: "Yeni bir şey inşa et!"
 gaudi.70.i: "Buna gücümüz yetmez."
 gaudi.71.t: "Campanile Yeniden İnşası"
 gaudi.71.d: "Venedik’teki yeni Campanile di San Marco, selefine son tuğlasına kadar benzeyen, bugün görkemli bir törenle açıldı. Tüm Venedik simgesinin geri dönüşünü kutluyor."
 gaudi.71.f: "Yeni campanile, 25 Nisan 1912’de, San Marco bayramı vesilesiyle, iddia edilen orijinal binanın temellerinin atılmasının tam 1000. yılına denk gelerek açıldı."
 gaudi.71.g: "Paron geri döndü!"
