 je_gaudi_sagrada_phase_1: "Sagrada Família: Antoni Gaudí’nin Rüyası"
 je_gaudi_sagrada_phase_1_reason: "Antoni Gaudí i Cornet, İspanya’dan Katalan bir mimar ve tasarımcıydı, Katalan Modernizminin en büyük temsilcisi olarak bilinir. Gaudí’nin eserleri son derece bireyselleşmiş, kendine özgü bir üsluba sahiptir. 1883’te Gaudí, Barselona’da Basílica i Temple Expiatori de la Sagrada Família adlı kilisenin yeni başlatılan inşaatının sorumluluğunu üstlendi. Gaudí, ilk tasarımı tamamen değiştirdi ve kendi ayırt edici üslubuyla yoğurdu. Ölümüne kadar kendini tamamen bu projeye adadı. On yıllar boyunca Sagrada Família, dünyanın en büyük bitmemiş Katolik kilisesi oldu – dahilik ile delilik arasında bir yüzyıl projesi."
 je_gaudi_sagrada_phase_1_goal: "#E İnşaat İlerlemesi#! #BLUE 120#! puana ulaşmalı. Şu anda #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! puanımız var. Normalde her ay bir puan kazanıyoruz."
 je_gaudi_sagrada_phase_2: "Sagrada Família: Apsis"
 je_gaudi_sagrada_phase_2_reason: "Gaudí, del Villar’ın planlarına esasen bağlı kalarak başladığı kripti tamamladı; tonozlar ise Gaudí’nin revizyonuydu. 1880’lerin ortasında ilk ayinler burada yapılabilir hale geldi ve kript 1889’da tamamlandı. Kript inşaatıyla eşzamanlı olarak Gaudí, kilisenin planlarını köklü biçimde yeniden tasarlamaya başladı. 1885’te, mevcut projeden daha küçük ölçekli olsa da 18 kulenin görülebildiği Gotik bir tasarım diliyle yeni bir genel konsept sundu. 1893’te tamamlanan apsisin dış duvarı, del Villar’ın tasarımından daha yüksektir. Neo-Gotik ögeler içermektedir ancak Gotik biçimlerin kendine özgü kullanımı, natüralist çörtenler ve kule uçları Gaudí’nin imzasını taşımaktadır."
 je_gaudi_sagrada_phase_2_goal: "#E İnşaat İlerlemesi#! #BLUE 120#! puana ulaşmalı. Şu anda #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! puanımız var. Normalde her ay bir puan kazanıyoruz."
 je_gaudi_sagrada_phase_3: "Sagrada Família: Doğuş Cephesi"
 je_gaudi_sagrada_phase_3_reason: "İsa’nın doğumuna adanmış olan Doğuş cephesi, hayatın unsurlarını anımsatan sahnelerle süslenmiştir. Gaudí’nin natüralist üslubuna özgü olarak, heykeller ayrıntılı biçimde düzenlenmiş ve her biri kendi biçiminde bir sembol olan doğadan sahneler ve imgelerle bezenmiştir. Cephe kuzeydoğuya, doğan güneşe bakar – bu, Mesih’in doğumunun bir sembolüdür. Cephe üç revaktan oluşur, her biri bir teolojik erdemi temsil eder (Umut, İman ve Hayırseverlik). Hayırseverlik revağındaki İsa kapısının üzerinde Hayat Ağacı yükselir."
 je_gaudi_sagrada_phase_3_goal: "#E İnşaat İlerlemesi#! #BLUE 120#! puana ulaşmalı. Şu anda #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! puanımız var. Normalde her ay bir puan kazanıyoruz."
 je_gaudi_sagrada_phase_4: "Sagrada Família: Ana Nef"
 je_gaudi_sagrada_phase_4_reason: "Kilise planı beş nefli bir Latin haçıdır. İç mekân sütunları Gaudí’ye özgü eşsiz bir tasarımdır. Yüklerini taşımak için dallanmanın yanı sıra, sürekli değişen yüzeyleri çeşitli geometrik formların kesişiminin sonucudur. En basit örneği, sütunun kare bir tabandan yükseldikçe sekizgene, sonra on altıgen forma ve nihayet daireye dönüşmesidir. İç mekân yüzeylerinin neredeyse hiçbiri dümdüz değildir; süslemeler kapsamlı ve zengindir, büyük ölçüde pürüzsüz eğriler ve keskin uçları birleştiren soyut şekillerden oluşur. Balkonlar ve merdivenler için demir korkuluklar gibi ayrıntı seviyesindeki işler bile kıvrımlı bezemelerle doludur."
 je_gaudi_sagrada_phase_4_goal: "#E İnşaat İlerlemesi#! #BLUE 120#! puana ulaşmalı. Şu anda #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! puanımız var. Normalde her ay bir puan kazanıyoruz."
 je_gaudi_sagrada_phase_5: "Sagrada Família: Havarilerin Kuleleri"
 je_gaudi_sagrada_phase_5_reason: "Gaudí’nin orijinal tasarımı, yüksekliklerine göre sıralanmış toplam on sekiz kule öngörüyordu: On İki Havariler, Meryem Ana, dört İncil yazarı ve en yüksek olarak İsa Mesih. Bir piskopos asasını anımsatacak şekilde tasarlanmış tüm kulelerin uzun dikey oyukları ve hayvanlarla ya da kutsal sembollerle ve İncil’den alıntılarla süslenmiş renkli kule uçları vardır. Her biri ilgili havarinin adı yazılı küçük altın bir haç taşır. Bazı kuleler dar taş köprülerle birbirine bağlanmıştır."
 je_gaudi_sagrada_phase_5_goal: "#E İnşaat İlerlemesi#! #BLUE 120#! puana ulaşmalı. Şu anda #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! puanımız var. Normalde her ay bir puan kazanıyoruz."
 je_gaudi_sagrada_phase_6: "Sagrada Família: Tutku Cephesi"
 je_gaudi_sagrada_phase_6_reason: "Son derece süslü Nativity Cephesi’nin aksine, Passion Cephesi sade, yalın ve basittir; bolca çıplak taş içerir ve bir iskeletin kemiklerini andıracak şekilde sert düz çizgilerle oyulmuştur. İsa’nın çarmıha gerilmesi sırasında çektiği acılara adanmış olan cephe, insanın günahlarını tasvir etmeyi amaçlamaktadır. Gaudí, bu cephenin izleyicide korku uyandırmasını istedi. Kemerleri 'kırmak', sütunları 'kesmek' ve ışık-gölge efekti (sert ışık ile kontrast oluşturan karanlık köşeli gölgeler) kullanarak İsa’nın fedakarlığının ciddiyetini ve acımasızlığını daha da göstermek istedi. Batıya bakan, İsa’nın ölümü ile simgesel olan Passion Cephesi, gerilmiş kasları andıracak şekilde tasarlanmış altı büyük eğik sütunla desteklenmektedir."
 je_gaudi_sagrada_phase_6_goal: "#E İnşaat İlerleyişi#! #BLUE 120#! puana ulaşır. Şu anda elimizde #G [GetGlobalVariable('gaudi_sagrada_progress').GetValue]#! puan var. Normalde her ay bir puan kazanıyoruz."
 je_gaudi_sagrada_phase_7: "Sagrada Família: Transsept"
 je_gaudi_sagrada_phase_7_reason: "Dekorasyonda yer alan temalar arasında liturjiye ait kelimeler bulunur. Çan kuleleri 'Hosanna', 'Excelsis' ve 'Sanctus' gibi kelimelerle süslenmiştir; Passion cephesinin büyük kapıları, Yeni Ahit’ten İsa’nın Çilesi ile ilgili alıntıları, başlıca Katalanca olmak üzere çeşitli dillerde tekrarlar; Glory Cephesi ise Apostol İnancı’ndaki kelimelerle dekore edilecek ve ana kapısı Pater Noster dualarını Katalanca olarak tümüyle sunacak, çevresinde 'Bugün bize günlük ekmeğimizi ver' ifadesinin diğer dillerdeki varyasyonları bulunacaktır. Üç giriş üç erdemi simgeler: İnanç, Umut ve Sevgi. Her biri ayrıca İsa’nın hayatının bir kısmına adanmıştır."
