 je_gaudi_gyeong_phase_1: "Gyeongbokgung Sarayı’nın Yeniden İnşası"
 je_gaudi_gyeong_phase_1_reason: "Gyeongbokgung, Seul’de bulunan bir saraydır. Adı 'Kutlu Manzara Sarayı' anlamına gelir. Joseon Hanedanı döneminde inşa edilen beş sarayın ilki ve en büyüğüdür. Gyeongbokgung Sarayı, Joseon Hanedanı’nın kurucusu Kral Taejo tarafından yaptırılmış ve 1395’te tamamlanmıştır. Saray, 1592’deki Imjin Savaşı’nda Japonlar tarafından yıkılana dek kraliyet konutu olarak kullanılmıştır. Imjin Savaşı’nda çıkan yangınla yok olan saray, yaklaşık 300 yıl boyunca yeniden inşa edilmedi. Belki de şimdi onu onarma zamanı gelmiştir?"
 je_gaudi_gyeong_phase_1_goal: "#E İnşaat İlerlemesi#! #BLUE 60#! puana ulaşsın. Şu anda #G [GetGlobalVariable('gaudi_gyeong_progress').GetValue]#! puanımız var. Normalde her ay bir puan alıyoruz."
 gaudi_gyeong_phase_1_decision: "Gyeongbokgung Sarayı’nın Yeniden İnşası"
 gaudi_gyeong_phase_1_decision_desc: "Gyeongbokgung, Seul’de bir saraydır. İsmi 'Bereketli Manzara Sarayı' anlamına gelir. Joseon Hanedanı döneminde Kore’de inşa edilen beş saraydan ilk ve en büyüğüdür. Saray, Joseon Hanedanı’nın kurucusu Kral Taejo tarafından inşa edilmiş ve 1395’te tamamlanmıştır. Saray, 1592’de Japonlar tarafından Imjin Savaşı sırasında yok edilene kadar kraliyet konutu olarak hizmet vermiştir. Yangınla yok edilen saray, neredeyse 300 yıl boyunca yeniden inşa edilmemiştir. Belki şimdi onu yeniden inşa etme zamanı gelmiştir?"
 gaudi_custom_tt_trigger_gyeong: "#yellow Kore#! olarak oynuyorsunuz"
