 je_gaudi_ben_phase_1_reason: "16 Ekim 1834'te, yıkıcı bir yangın Westminster Sarayı'nın çoğunu yok etti. Maliye Bakanlığı, 1826'daki vergi reformundan sonra gereksiz hale gelen çıtalı odunları yakmaya karar vermişti. İki araba yükü iki fırında yakıldı ve Lords Odası'nda yangın çıktı. Yalnızca Westminster Hall, Mücevher Kulesi, St Stephen Şapeli’nin mahzeni ve revaklar zarar görmedi. Haziran 1835’te bir komisyon sarayın aynı yerde yeniden inşa edilmesine karar verdi; ya Gotik ya da Tudor tarzında. 1836'da 97 yarışma teklifini inceleyen komisyon, Gotik tarzda yeniden inşayı öngören Charles Barry’nin planını seçti."
 je_gaudi_ben_phase_2: "Ayırt Edici Bir Çan"
 je_gaudi_ben_phase_2_reason: "Big Ben adı, Westminster Sarayı'ndaki ünlü saat kulesinin beş çanından en ağırını ifade eder ve ağırlığı 13,5 ton. Kule 96,3 metre yüksekliğinde olup, ilk 61 metre tuğladan ve taş cepheli, üst kısmı ise dökme demirden yapılmıştır. Westminster Sarayı’nın mimarı Charles Barry, kule tasarımını Augustus Pugin’e emanet etti. Saat mekanizması 1848’de Sir George Airy ve Edmund Denison tarafından geliştirildi ve saatçi Edward John Dent tarafından üretildi. Dört kadranın çapı yedi metredir. Her dört kadranın altında Latince olarak 'Domine salvam fac reginam nostram Victoriam primam' (Tanrı Kraliçemiz Victoria’yı korusun) yazılıdır."
