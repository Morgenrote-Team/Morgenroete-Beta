 je_gaudi_sagrada_phase_8: "Sagrada Família: Meryem ve İncillerin Çan Kuleleri"
 je_gaudi_sagrada_phase_8_reason: "İncil yazarlarının çan kulelerinin tepesi geleneksel sembollerini taşıyan heykellerle süslenmiştir: kanatlı boğa (Aziz Luka), kanatlı adam (Aziz Matta), kartal (Aziz Yuhanna) ve kanatlı aslan (Aziz Mark). Kulelerin uçları 22,5 m yüksekliğinde ve üç farklı bölümden oluşur: taban, Al·leluia ve Amen yazılı dört satır altıgen ile herringbone tarzı seramik palmiyelerle çevrilidir; orta bölümde, ışık kaynaklarını içeren seramik trencadís ve Venedik camıyla kaplı bir küreyle kesişen bir ikosahedron vardır; üstte ise Tetramorf heykelleri, kanatlı ve her bir incilin baş harflerini taşıyan evanjelik kitaplıdır. Meryem’in kulesi apsis üzerinde yer alır ve sabah yıldızını simgeleyen büyük bir on iki köşeli yıldız ile tepesinde tamamlanır. Ayrıca, Meryem’e atıfta bulunan Hail Mary ve çeşitli çiçekler gibi ikonografik unsurlar taşır."
