 gaudi.801.t: "Palacio de Bellas Artes’in İnşaatı Başlıyor"
 gaudi.801.d: "Ulusal Tiyatro’nun yıkılmasıyla, Meksiko Şehri’ni tamamen kültüre adanmış büyük bir sarayla zenginleştirmek için artık yeterli alan var. [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle()] [SCOPE.sCharacter('gaudi_ruler').GetFullName()] bugün temel atma törenini gerçekleştirdi."
 gaudi.801.f: "Sahanın bilinen en eski yapısı 1680 yılında inşa edilen Santa Isabel Manastırı’ydı. Bu yapının Santa Isabel Sokağı’ndaki bir bölümü yıkıldı ve 19. yüzyılın sonlarında Ulusal Tiyatro ile değiştirildi. 19. yüzyılın sonları ve 20. yüzyılın başlarında, bu tiyatro Meksiko Şehri’nin yüksek kültürünün merkeziydi ve tiyatro, operet, Viyanalı dans ve daha fazlası gibi etkinlikler sunuyordu. Daha sonra, 1910’daki Meksika Bağımsızlığı’nın Yüzüncü Yılı kutlamaları için bu binanın daha görkemli bir yapı ile değiştirilmesine karar verildi. Eski tiyatro 1901’de yıkıldı ve yeni tiyatro Gran Teatro de Ópera olarak adlandırıldı."
 gaudi.801.g: "Meksika birinci sınıf bir kültür ulusu olacak!"
 gaudi.802.t: "Palacio de Bellas Artes: Birinci Aşama tamamlandı"
 gaudi.802.d: "Güzel Sanatlar Sarayı’nın iskeleti artık Meksiko Şehri’nin çatıları üzerinde yükseliyor. Sakinler, gözlerinin önünde bir başyapıtın yükseldiğini hissedebiliyor."
 gaudi.802.f: "Adamo Boari, planlarında dönemin çeşitli stillerini birleştirdi; Belle Époque tarzı ile birlikte neoklasik ve ön-Hispanik motifler baskındı. Sarayın cephesi beyaz mermerden yapılırken, binanın iç kısmı farklı renklerde mermerle inşa edildi. Bu nedenle, yapı o kadar ağırdır ki saray artık çevredeki sokullardan birkaç metre daha alçaktadır."
 gaudi.802.g: "Ön satışlar ne zaman başlıyor?"
 gaudi.803.t: "Palacio de Bellas Artes’in inşaatı devam ediyor"
 gaudi.803.d: "Bina büyük ölçüde tamamlanmış durumda, ancak ek inşaat çalışmalarının yanı sıra, odaların iç dekorasyonundaki görkemli ve detaylı çalışmalar şimdi başlıyor."
 gaudi.803.f: "José Clemente Orozco, Diego Rivera ve David Alfaro Siqueiros gibi çeşitli ünlü duvar ressamlarının eserleri saray duvarlarını süslüyor. Ayrıca André Allar’ın yedi musa’ya adanmış heykelleri sarayda bulunuyor. Binanın on süslü demir kapısı İtalyan Alessandro Mazzucotelli’ye yaptırıldı. Ana kubbenin tepesini süsleyen bronz heykel grubu Macar Géza Maróti tarafından yapılmış, kubbelerin asıl tasarımı ise Art Deco tarzında Roberto Álvarez Espinoza tarafından gerçekleştirilmiştir."
 gaudi.803.g: "Bir Art Deco rüyası."
 gaudi.804.t: "Palacio de Bellas Artes tamamlandı"
 gaudi.804.d: "Uzun yıllar süren inşaat ve birkaç öngörülemeyen gecikmeden sonra, Meksiko Şehri artık yeni bir simgeye sahip: Palacio de Bellas Artes kültürel gücüyle tüm ülkeyi aşmaktadır."
 gaudi.804.f: "Bina 1934’te tamamen tamamlandı ve 29 Kasım’da açıldı. Tiyatroda sahnelenen açılış eseri 1934’te Juan Ruiz de Alarcón’un 'La Verdad Sospechosa' adlı oyunu oldu. 1946 yılında, sanatı teşvik etmek için hükümet ajansı olarak Instituto Nacional de Bellas Artes (Ulusal Güzel Sanatlar Enstitüsü) kuruldu."
 gaudi.804.g: "Müzik, edebiyat ve resim tek bir çatı altında birleşti!"
 gaudi.809.t: "Meksika kaybedildi!"
 gaudi.809.d: "Meksika’yı kaybetmemizle birlikte, Palacio de Bellas Artes’in inşasına devam etme fırsatını tamamen kaybettik."
 gaudi.809.f: "Meksika herhangi bir nedenle kaybedilirse, inşaat ilerlemesi tamamen kaybolmayacaktır. Son inşaat aşamasına yalnızca Meksika devam edebilir. Yabancı işgalciler ise, inşaata devam etmekle ilgilenmeyecektir."
 gaudi.809.g: "Meksika’yı uzun süre onlara bırakamayız!"
 gaudi.811.t: "Bir Bağış"
 gaudi.811.d: "Ülkemizdeki hükümet partilerinin Palacio de Bellas Artes’in hızlı bir şekilde inşasına devam edilmesi konusunda anlaşılabilir bir ilgisi var. [SCOPE.sCharacter('gaudi_government_leader').GetFullName()] özellikle Kulturpalast için çaba gösterdi ve bağış topladı."
 gaudi.811.f: "Acilen ortadan kaldırılması gereken parti kasalarından gelen kara para olabileceği söylentileri, elbette tamamen muhalefetin uydurmasıdır."
 gaudi.811.g: "Muchas gracias."
 gaudi.812.t: "Sendikalar çalışma koşullarını eleştiriyor"
 gaudi.812.d: "[SCOPE.sCharacter('trade_unions_leader').GetFullName()] bugün Parlamento’da, Palacio de Bellas Artes’in inşasında uygulanan korkunç koşulları üzüntüyle dile getirdi."
 gaudi.812.f: "'Palacio de Bellas Artes ülkemizde bir kültür merkezi olmalı, insanların yalnızca gerçek, iyi ve güzel ile ilgilenebileceği bir yer. Ancak hükümetin sıradan işçiyi sömürerek, bu güzellikten başkalarının yararlanabilmesi için onları en olumsuz koşullar altında ezmesi, projede olması gereken estetik anlayışıyla açıkça çelişmektedir!'"
 gaudi.813.t: "Bataklık Zemin"
 gaudi.813.d: "Engebeli ve bataklık zemin, Palacio de Bellas Artes’in baş mimarına yeni sorunlar çıkarıyor. Bina giderek toprağa gömülme tehlikesiyle karşı karşıya. Alınan karşı önlemler, asıl inşaatı hâlâ geciktiriyor."
 gaudi.813.f: "Meksiko şehri, o zamanlar da şimdi olduğu gibi dünyanın en büyük yerleşimlerinden biriydi. Ancak durum hiç de avantajlı değildi. Azteklerin Tenochtitlán’ı, bir gölün ortasında yer alan önceki şehirdi. Bu göl yüzyıllar içinde kurutuldu ve çamurlu toprak geçmişte de sağlamlığını kanıtlamamıştı. Derin kuyuların açılması durumu daha da kötüleştirdi. Bazı Barok kiliseler, inşa edildikleri zamana kıyasla önemli ölçüde daha alçakta duruyor. Dolayısıyla Palacio de Bellas Artes de bir istisna değil."
 gaudi.813.g: "Lanet olsun, Texcoco Gölü!"
 gaudi.814.t: "Yeni makineler"
 gaudi.814.d: "Teknolojik ilerleme sayesinde Palacio de Bellas Artes, ilk düşünülenden daha iyi bir takvimde ilerliyor."
 gaudi.814.f: "'Asansör mü? Artık merdivenlere ihtiyacınız yok mu? Yani kendinizi yukarıya taşıtabiliyorsunuz? Bir de yeni inşaat malzemeleri mi? Bunu bize daha önce neden kimse söylemedi?'"
 gaudi.815.t: "Grev tehdidi"
 gaudi.815.d: "Palacio de Bellas Artes’in inşaat işçileri, daha iyi ücret için pazarlık yapmazsak greve gideceklerini duyurdu."
 gaudi.815.f: "Ah, grevlerin harika dünyası! Latin Amerika’da, demiryolu işçileri sendikasının aniden sabotaj kararı almasıyla tren istasyonunda mahsur kalmanın nasıl bir şey olduğunu yaşamadıysanız, çok şey kaçırıyorsunuz demektir. Bugün sadece bir inşaat sahası etkileniyor. Gerçekten çok şanslıyız!"
 gaudi.815.i: "Askerî polisi çağırın!"
 gaudi.816.t: "Cephe çökmesi işçileri öldürdü"
 gaudi.816.d: "Palacio de Bellas Artes’in inşaat sahasında ciddi bir kaza yaşandı: onlarca işçi yaralandı, bazıları öldü ve cephenin bir kısmı çöktü!"
 gaudi.816.f: "Sebep henüz netleşmedi ve baş mimar sorgulanıyor. Kimileri kötü işçilikten ve kaliteli malzemeler için ayrılan fonların usulsüz kullanılmasından şüpheleniyor. Diğer kanıtlar ise bir tasarım hatasına işaret ediyor. Kesin olan şu ki, düşen cephe duvarı bir işçi grubunun üzerine yıkıldı ve hâlihazırda inşa edilmiş bazı bölümleri tamamen yok etti."
 gaudi.817.t: "Palacio de Bellas Artes büyüyor"
 gaudi.817.d: "Palacio de Bellas Artes’in inşaatı, açıklanmayan nedenlerden beklenenden daha hızlı ilerliyor."
 gaudi.817.f: "Bilinmeyen nedenlerle görkemli Palacio de Bellas Artes’in inşaatı hızla ilerliyor. Belki güzel havadan kaynaklıdır. Belki Kutsal Bakire’ye edilen dualardan. Belki de geçen gün savurganca kullandığımız, kalitesiz inşaat malzemelerindendir — ki umarız kimse asla bulamaz. Kesin olan bir şey var: çeşitli sebeplerle tekrar tekrar gecikmeler yaşayan bu dev, beklenenden daha çabuk tamamlanacak gibi. Tabii bataklık zemin binanın tekrar çökmesine izin vermezse..."
 gaudi.817.g: "¡Excelente!"
 gaudi.818.t: "Meksiko’da arkeolojik araştırmalar"
 gaudi.818.d: "İnşaat sahasına yaptığı ziyarette [SCOPE.sCharacter('gaudi_archaeologist').GetFullName], Palacio de Bellas Artes’in görünüşe göre Aztek kalıntılarının üzerine kurulduğunu keşfetti. Kazı ruhsatı talep ediyor."
 gaudi.818.f: "Tenochtitlán, Aztek İmparatorluğu’nun başkentiydi ve Meksiko’nun önceki şehriydi. İspanyol fethinden sonra büyük ölçüde yıkıldı, kalıntıların bir kısmı çevredeki Texcoco Gölü’ne atıldı ya da yeni binaların yapımında kullanıldı. Aztek taş işçiliği, hâlâ bazı eski sömürge dönemi evlerinde görülebilir."
 gaudi.819.t: "Meksiko’da yeni işler"
 gaudi.819.d: "Palacio de Bellas Artes’in inşaatı, Meksika’ya büyük bir insan akınına yol açtı."
 gaudi.819.f: "Meksiko’nun olağanüstü önemi, sömürge öncesi döneme kadar uzanır. Tenochtitlán, Aztek İmparatorluğu’nun başkenti sayılırdı ve birçok merkezi işlev üstlenirdi. İspanyollar tarafından yıkılıp bir sömürge metropolü olarak yeniden inşa edilen şehir, merkezî sömürge idaresinin merkezi hâline geldi. 19. yüzyılın sonunda demiryolu ağının genişlemesiyle önemi daha da arttı. 20. yüzyılın başında ise finans ve ticaret merkezi olmasının yanında sanayi merkezi olarak da değer kazandı. İş umudu, on yıllar boyunca yüz binlerce insanı başkente çekti. Palacio de Bellas Artes gibi inşaat projeleri de bu konuda teşvik edici oldu."
