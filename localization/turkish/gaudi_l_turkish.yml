 gaudi.1101.t: "[GetPlayer.GetName]’in Modern Yolları"
 gaudi.1101.d: "Our [concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] has finally completed the project to modernize the roads of [GetPlayer.GetNameNoFormatting]. Our roads are now considered to be the most modern in the entire world. This will boost commerce and travel in our country."
 gaudi.1101.f: "\"Henüz yollarımız yokken hatırlıyorum; her gün yoğun ormanlardan kendi yollarımızı açmak zorundaydık! Siz gençler çok şanslısınız! Hükümet size gereken her şeyi sağlayacak! Artık hiç çalışmanıza gerek yok!\""
 gaudi.1101.g: "Artık tüm bu çukurlar olmadan seyahat edebiliriz!"
 je_gaudi_bridge_project: "Yeni Köprüler"
 gaudi_states_with_bridges_tt: "All [GetPlayer.GetAdjective] States have the $gaudi_new_bridge_modifier_with_tooltip$ [concept_modifier] (currently [GetPlayer.MakeScope.GetVariable('gaudi_num_states_bridge_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0])."
 gaudi.1121.t: "[GetPlayer.GetName]’in Köprüleri"
 gaudi.1121.d: "Our [concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] has finally completed the project to construct Bridges in important places in [GetPlayer.GetNameNoFormatting]. Now that those bridges connect places that were once far apart, we will see an influx of commerce and travel."
 gaudi.1121.f: "\"Köprüler mi? Kim köprüye ihtiyaç duyar ki. Ben gençken nehirlerin üzerinden yüzerek geçerdik! Bu gençler artık yüzemez bile! Medeniyetimiz ne olacak!\""
 gaudi.1121.g: "Üzerinden geçilecek yedi köprü var!"
 je_gaudi_tunnel_project: "Yeni Tüneller"
 gaudi_states_with_tunnels_tt: "All [GetPlayer.GetAdjective] States have the $gaudi_new_tunnel_modifier_with_tooltip$ [concept_modifier] (currently [GetPlayer.MakeScope.GetVariable('gaudi_num_states_tunnel_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0])."
 gaudi.1131.t: "[GetPlayer.GetName]’in Tünelleri"
 gaudi.1131.d: "Our [concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] has finally completed the project to create a few new tunnels through hills and mountains in [GetPlayer.GetNameNoFormatting]. Now that those tunnels make travelling and transport easier, we might see positive effects for out industry."
 gaudi.1131.f: "\"Ben bir cüceyim ve delik kazıyorum! Kaz, kaz, delik, delik kazıyorum!\""
 gaudi.1131.g: "Şans eseri altın bulabildin mi?"
 je_gaudi_railway_project: "Demiryolu Hatlarını Modernize Etme"
 gaudi_states_with_modernized_railway_tt: "All [GetPlayer.GetAdjective] States have the $tesla_modernized_railway_lines_building_modifier_with_tooltip$ [concept_modifier] (currently [GetPlayer.MakeScope.GetVariable('gaudi_num_states_modernized_railway_var').GetValue|+0] / [GetPlayer.MakeScope.GetVariable('tesla_num_states_var').GetValue|V0])."
 gaudi.1141.t: "[GetPlayer.GetName]’in Modern Demiryolu Hatları"
 gaudi.1141.d: "Our [concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] has finally completed the project to modernize the rail infrastructure in [GetPlayer.GetNameNoFormatting]. With our railway lines belonging to the most modern in the world, we will surely see more traffic on our rail network."
 gaudi.1141.f: "\"O yeni demiryolu hatları ihtiyacınız olan her şeye sahip! Demiryolu anahtarlarının ısıtıldığını görsem bile şaşırmam!\""
 gaudi.1141.g: "Çuu! Çuu!"
 je_gaudi_construction_sector_project: "İnşaat Sektörlerini Modernize Etme"
 gaudi.1151.f: "\"O duvarı inşa ederken yanına şık bir takım elbise giymiş biri geldi. Bana bu hilesini kullanırsam malzemeden tasarruf edebileceğimi söyledi. Gördünüz mü, gerçekten işe yaradı! Bu beyaz yakalı insanlar gerçekten bir şeyler yapabiliyor!\""
 gaudi.1151.g: "Daha iyi inşaat, daha fazla fabrika demek!"
