 gaudi.701.t: "Neuschwanstein’in İnşaatı Başlıyor"
 gaudi.701.d: "Bavyera Kralı, çocukluğundan bildiği eski Hohenschwangau konutu yakınlarında bir yer seçti. Gerçek inşaat yönetiminin seçilen mimarlarla değil, monark ile olduğu zaten açık."
 gaudi.701.f: "'Pöllat Boğazı yakınındaki eski Hohenschwangau kalıntılarını, eski Alman şövalyelerinin kaleleri tarzında yeniden inşa ettirmeyi düşünüyorum.' -Kral II. Ludwig"
 gaudi.701.g: "Kral ya bir dahi ya da bir deli."
 gaudi.702.t: "Neuschwanstein: Birinci Aşama Tamamlandı"
 gaudi.702.d: "Füssen yakınlarındaki tepe üzerinde, Palas artık Bavyera Allgäu üzerinde net biçimde görülüyor. Neuschwanstein kapı evi şimdiden hazır."
 gaudi.702.f: "'...her bakımdan bu kale, alt Hohenschwangau’dan daha güzel ve daha sıcak olacak...' -Kral II. Ludwig"
 gaudi.702.g: "Planlandığından daha yapmacıklı görünüyor."
 gaudi.703.t: "Neuschwanstein’in İnşaatı Devam Ediyor"
 gaudi.703.d: "Neuschwanstein Kalesi’nin bir sonraki inşaat aşaması başladı. Artık gösterişli yapı için paranın tam anlamıyla boşa harcandığını söyleyen sesler artıyor."
 gaudi.703.f: "Halk arasındaki söylentilerin aksine, Ludwig II Neuschwanstein’i tamamen özel varlıklarından finanse etti. Parası az olduğundan, eski Prusya karşıtından gelen finansal bağışlara da açık oldu. Prusya Kralı Wilhelm’in Alman Kaiser’i olarak taç giymesi sırasında Bavyera’nın iyi niyetini kazanmak için Bismarck, hükümdara yıllık 300.000 Reichsmark emekli maaşı ödedi. Hayatının sonunda, Ludwig’in özel borçları 8,25 milyon Reichsmark’a ulaştı."
 gaudi.703.g: "Bu ne kadar tutacak?"
 gaudi.704.t: "Neuschwanstein Tamamlandı"
 gaudi.704.d: "Neuschwanstein nihayet bugün tamamlandı! Tarih, yapının Louis XIV geleneğinde nostaljik megalomaniyi mi ifade edeceğini yoksa kralın mitinin yüzyıllarca yaşayacağını mı gösterecek. Şüphe durumunda, ikisi de geçerli olmalı."
 gaudi.704.f: "'Kendime ve başkalarına karşı sonsuz bir muamma olarak kalmak istiyorum...' -Kral II. Ludwig"
 gaudi.704.g: "Yaşasın [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFirstName]!"
 gaudi.709.t: "Bavyera kaybedildi!"
 gaudi.709.d: "Bavyera’nın kaybıyla, Neuschwanstein Kalesi’nin inşaatına devam etme fırsatını tamamen kaybettik."
 gaudi.709.f: "Bavyera herhangi bir nedenle kaybedilirse, inşaat ilerlemesi tamamen kaybolmaz. Yalnızca Bavyera, Neuschwanstein Kalesi’nin son inşaat aşamasına devam edebilir. Yabancı işgalciler ise inşaatla ilgilenmeyecekler."
 gaudi.709.g: "Bavyera’yı onlara uzun süre bırakamayız!"
 gaudi.711.t: "Kötü Tuğlalar"
 gaudi.711.d: "Neuschwanstein için son malzeme teslimi kötü çıktı."
 gaudi.711.f: "Bir an için, her gün daha da yükselen Neuschwanstein Kalesi inşaatındaki olağan faaliyet durdu. Kralın kısa envanteri, tuğlaların olağan kalitede olmadığını ortaya çıkardı ve başyapıtın bu tuğlalar yüzünden tehlikeye girmemesi için beklemeyi tercih ettiğini duyurdu. Ancak inşaat yönetiminde tuğlaların yine de kullanılmasını isteyen sesler vardı – yalnızca inşaatın gecikebileceği için değil, aynı zamanda monarkın planı tekrar değiştirme olasılığı korkusuyla..."
 gaudi.712.t: "Felaket!"
 gaudi.712.d: "Kalitesiz malzeme etkisini gösterdi: bu sabah Neuschwanstein’in bir bölümü çöktü ve önemli hasar meydana geldi."
 gaudi.712.f: "Belki Kral haklıydı. Belki de Neuschwanstein Kalesi gibi önemli bir anıt için yıkılmakta olan tuğlaları kullanmak gerçekten iyi bir fikir değildi. Belki de bu karar iki kez düşünülmeliydi. Ama artık çok geç – düşük kaliteli malzeme bugün etkisini gösterdi ve bir duvarın çökmesine yol açarak son haftalar ve aylarda yapılan inşaat ilerlemesinin büyük bir kısmını yok etti."
 gaudi.713.t: "Muhalefet Neuschwanstein’i Eleştiriyor"
 gaudi.713.d: "[SCOPE.sCharacter('gaudi_opposition_leader').GetFullName], Kral’a bir dilekçe gönderdi."
 gaudi.713.f: "'Yurtdışında insanlar, ruh haline göre kendini bir peri masalı kralı ya da XIV. Louis’in reenkarnasyonu olarak gören bir monarkla dalga geçiyor. Kraliyet ailesinin, modası geçmiş hayaller uğruna borçlanması durmalı. Bavyera, kendini Avrupa’nın alay konusu yapıyor. Böyle bir davranış, bir krala yakışmaz.'"
 gaudi.713.g: "Ben Kralım ve istediğimi inşa ederim!"
 gaudi.713.h: "Belki de bu KİBİRLİKTİR?"
 gaudi.714.t: "Yeni makineler"
 gaudi.714.d: "Teknik ilerleme, ortaçağ kalesi gibi eski görünümlü bir yapının inşasına da yardımcı oluyor."
 gaudi.714.f: "Münih’teki makine fabrikası ve modern çelik iskelet yapısı, Neuschwanstein’in daha önce bilinmeyen rekor sürede yeniden inşa edilmesini mümkün kılıyor."
 gaudi.715.t: "Komşu Neuschwanstein’den Etkilendi"
 gaudi.715.d: "Komşu ülkemiz [SCOPE.sCountry('gaudi_neighbour_nation').GetName], Bavyera’nın ideal kale hayaline gösterdiği özveriyi görmekten hayran kaldı ve inşaat çalışmalarının ilerlemesine büyük ilgi gösterdi."
 gaudi.715.f: "Neuschwanstein, Ludwig II’nin kaleleri arasında en ünlüsüdür ve Almanya’daki en tanınmış manzaralardan biridir. Ludwig’in ölüm yılı ziyaretçilere açıldığından beri kompleks, sürekli artan bir ziyaretçi sayısına sahiptir. İlk sekiz haftada yaklaşık 18.000 kişi kaleyi ziyaret etti. 1913’te 28.000’in üzerinde ziyaretçi vardı ve 1939’da zaten 290.000 kişi vardı. 2001’e gelindiğinde, 560.000 Alman ve 385.000 Amerikalı ve İngiliz dahil olmak üzere yaklaşık 1,3 milyon ziyaretçi sayısına ulaşıldı. O yıl üçüncü en büyük grup 149.000 Japon’du. 2005 itibarıyla toplam 50 milyonun üzerinde ziyaretçi sayılmıştı."
 gaudi.715.g: "Elçiye Neuschwanstein’i göster."
 gaudi.715.h: "Bir bağış talep et."
 gaudi.716.t: "Kral yine bir fikir buldu..."
 gaudi.716.d: "Monarkımız yakın zamanda inşaat yönetimini bir değişiklikle şaşırttı."
 gaudi.716.f: "Kalenin inşaatı 1869’da başladı. Ludwig II’nin istek ve talepleri inşaatla birlikte arttı, giderler de öyle; tasarımlar ve maliyet tahminleri birkaç kez revize edilmek zorunda kaldı. Büyük taht salonu yerine, başlangıçta sadece mütevazı bir çalışma odası planlanmıştı, planlanan misafir odaları ise, sürekli para eksikliği nedeniyle gerçekleştirilemeyen bir Mağribi Salonu için iptal edildi. Kalenin tamamlanması, başlangıçta 1872 için planlanmıştı, ancak defalarca gecikmişti."
 gaudi.716.g: "Kruzetiakn!"
 gaudi.716.h: "Sakrament!"
 gaudi.716.i: "Zefix!"
 gaudi.716.j: "Himme, Oarsch und Zwian!"
 gaudi.717.t: "Neuschwanstein Büyüyor"
 gaudi.717.d: "Neuschwanstein Kalesi’nin inşaatı, belirtilmeyen nedenlerle beklenenden daha hızlı ilerliyor."
 gaudi.717.f: "Sebebi bilinmese de, görkemli Neuschwanstein Kalesi’nin inşaatı ilerliyor. Belki hava güzeldi. Belki Kutsal Bakire’ye edilen dua işe yaradı. Muhtemelen de geçen gün israf ettiğimiz ve umarız bir daha bulunmayacak olan oldukça düşük kaliteli yapı malzemesi etkili oldu. Kesin olan bir şey var: en çeşitli sebeplerle defalarca gecikmeler yaşamış bu canavar, beklenenden daha hızlı tamamlanmalı. Tabii ki Kral bunu yeni bir genişleme ile telafi etmeye çalışmazsa..."
 gaudi.718.t: "Ulusal mı yoksa Kraliyet Projesi mi?"
 gaudi.718.d: "Parlamento’da şu anda Neuschwanstein Kalesi’nin öncelikle ulusal mı yoksa kraliyet binası mı olduğu konusunda ciddi bir tartışma var."
 gaudi.718.f: "Neuschwanstein Kalesi, Allgäu’daki uzak konumunda baştan itibaren kralın özel sığınağı olarak tasarlanmıştı. Yine de, yapı romantik ve dolayısıyla en azından dışarıdan bakanlar için ulusal etkiler de taşıyordu: Ortaçağ’ın Almanya tarihinin gerçek zirvesi olarak dönüşümü, ulusal hareketin anlatısının bir parçasıydı. Aynı zamanda kale, bölünmüş Alman ulusunun ulusal bestecisi Richard Wagner’e taş bir övgüydü."
 gaudi.718.g: "Bu bir ulusal proje."
 gaudi.718.h: "Bu hem ulusal hem de kraliyet projesi."
 gaudi.718.i: "Bu bir kraliyet projesi."
 gaudi.719.t: "Monark Ziyarette"
 gaudi.719.d: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName], Neuschwanstein inşaat alanına şahsen gitmeye karar verdi."
 gaudi.719.f: "Monarkımız [SCOPE.sCharacter('gaudi_ruler').GetFirstName], inşaatın nasıl ilerlediğini sürekli gözlemliyor ve başka bir ziyaret daha duyurdu. Hazırlıklar tam gaz devam ediyor - ve tabii ki Majesteleri’ne bir şeyler sunmak istiyorlar! Bu nedenle basit inşaat işçileri, inşaat yönetimi ve başmimar, duyuru sonrası daha önce bilinmeyen bir hızla çalışmaya başladı."
 gaudi.719.g: "Majesteleri motivasyonu biliyor."
 gaudi.720.t: "İnşaat Alanında Yangın"
 gaudi.720.d: "Bilinmeyen nedenlerle Neuschwanstein inşaat alanında yangın çıktı ve iş aylarca geri gitti!"
 gaudi.720.f: "'Şu anda Richard Wagner’in Valkürlerin Atağı çalınıyor mu?!'"
 gaudi.720.g: "Berbat! Sanki Wagner!"
 gaudi.721.t: "İşçiler için Kraliyet Eli"
 gaudi.721.d: "Bir sendika lideri, Neuschwanstein Kalesi inşaatındaki tehlikeli iş için kraldan daha iyi bakım talep etti."
 gaudi.721.f: "Büyük inşaat alanı yaklaşık yirmi yıl boyunca bölgenin en büyük işvereni oldu. 1880 yılında, tedarikçiler ve dolaylı olarak inşaatta görev alan diğer kişiler sayılmadan, her gün yaklaşık 200 usta inşaat alanında çalışıyordu. Kralın özellikle sıkı teslim tarihleri ve acil değişiklikler talep ettiği zamanlarda, günde 300 işçiye kadar çalıştığı, ayrıca gece lambalarıyla çalıştığı söyleniyordu. 3 Nisan 1870’de kurulan 'Hohenschwangau Kraliyet Sarayı Ustaları Derneği' çok modern bir sosyal kurumdu. Derneğin amacı, düşük aylık katkılarla hasta veya yaralı inşaat işçilerinin maaşlarının sürekli ödenmesini sağlamak ve kral tarafından sağlanan önemli sübvansiyonlarla desteklenmekti. İnşaat şirketi, günümüz sosyal sigortasına veya meslek derneğine benzer şekilde, 0,70 mark karşılığında 15 hafta boyunca maaşı garanti ediyordu. İnşaat sırasında ölenlerin mirasçılarına bir emeklilik sağlanmıştı - düşük olsa da, o dönemde yaygın değildi."
 gaudi.721.g: "Desteklenmeye değer bir kurum."
 gaudi.721.h: "Tüm ülke için bir örnek!"
 gaudi.721.i: "Sosyal yardım mı? Bana işçi lazım, sızlanan değil!"
