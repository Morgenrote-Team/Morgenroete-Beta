 gaudi.1151.d: "Our [concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] has finally completed the project to modernize the [SCOPE.sBuilding('target').GetName] in [SCOPE.sBuilding('target').GetState.GetName]. Now that our construction processes are more efficient then ever, we should be able to finish constructions way faster!."
