 je_gaudi_sagrada_phase_9: "Sagrada Família: Glory Cephesi"
 je_gaudi_sagrada_phase_9_reason: "Cephelerin en büyük ve en etkileyici olanı Glory Cephesi’dir. İsa’nın Göksel Görkemi’ne adanmış olan cephe, Tanrı’ya giden yolu temsil eder: Ölüm, Son Yargı ve Görkemi; Tanrı’nın iradesinden sapanlar için Cehennem bırakılmıştır. Glory Portico’ya ulaşmak için, Carrer de Mallorca altındaki geçit üzerine inşa edilen büyük merdivenler, Cehennem ve günahları temsil eden dekorasyonla geçer. Cephe, şeytanlar, putlar, sahte tanrılar, sapkınlık ve bölünmelerle süslenecektir. Araf ve ölüm de gösterilecektir; ölüm, yerdeki mezarlarla anlatılacaktır. Portiko, Kutsal Ruh’un armağanlarına adanmış yedi büyük sütuna sahiptir. Sütunların tabanında yedi ölümcül günahın temsilleri, üst kısmında ise yedi göksel erdem bulunur."
