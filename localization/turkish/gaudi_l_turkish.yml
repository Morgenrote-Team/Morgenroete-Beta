 je_gaudi_secession_1: "Birinci Art Nouveau Ayrılığı"
 je_gaudi_secession_1_reason: "Yeni sanat akımı Art Nouveau birçok sanatçıyı cezbetti. Belirli koşullar altında, uluslararası bir üne kavuşan ve resim ile mimariye yeni bir ivme kazandıran köklü bir sanat hareketine dönüşebilir. Tarihsel olarak bu türün en önemli birliklerinden biri Viyana Ayrılığı’dır. Viyana Ayrılığı, daha doğru adıyla Avusturyalı Sanatçılar Birliği, fin de siècle döneminde Viyana’daki sanatçıların birliğidir. Buradan türeyen Viyana varyantı da Ayrılık tarzı ya da Viyana Art Nouveau’su olarak anılır."
 je_gaudi_secession_2: "İkinci Art Nouveau Ayrılığı"
 je_gaudi_secession_2_reason: "Yeni sanat akımı Art Nouveau birçok sanatçıyı cezbetti. Belirli koşullar altında, uluslararası bir üne kavuşan ve resim ile mimariye yeni bir ivme kazandıran köklü bir sanat hareketine dönüşebilir. Tarihsel olarak bu türün en önemli birliklerinden biri Viyana Ayrılığı’dır. Viyana Ayrılığı, daha doğru adıyla Avusturyalı Sanatçılar Birliği, fin de siècle döneminde Viyana’daki sanatçıların birliğidir. Buradan türeyen Viyana varyantı da Ayrılık tarzı ya da Viyana Art Nouveau’su olarak anılır."
 je_gaudi_secession_3: "Üçüncü Art Nouveau Ayrılığı"
 je_gaudi_secession_3_reason: "Art Nouveau’nun yeni sanat akımı birçok sanatçıyı cezbetti. Belirli koşullar altında, bu durum uluslararası üne sahip ve resim ile mimariye yeni bir ivme kazandıran köklü bir sanat hareketine dönüşebilir. Tarihsel olarak, bu tür en önemli birliklerden biri Viyana Secesyonu’dur. Viyana Secesyonu, daha doğru bir ifadeyle Avusturyalı Sanatçılar Derneği, fin de siècle döneminde Viyana’da bir sanatçılar birliğidir. Buradan türeyen, Art Nouveau’nun Viyana versiyonu aynı zamanda Secesyon stili veya Viyanalı Art Nouveau olarak da anılır."
 je_gaudi_splendid_architecture: "Muhteşem Yeni Mimari"
 je_gaudi_splendid_architecture_reason: "Art Nouveau ve Art Deco’nun ortaya çıkışıyla, mimarlar örneğin geçmişin katı tarihçiliğinden koparak sanat dünyasında devrim yarattılar. Ancak birçok modern okulun aksine, bu binalar yalnızca işlevselliğin ve nesnelliğin ifadesi değildi. Art Deco, klasik modernizmin genel uyanışı sırasında gelişen bir tarz olup, ön planda formun zarafeti, malzeme değerleri, renklerin gücü ve konunun duygusallığının yaratıcı birleşimi bulunuyordu. Altın çağında, lüks, cazibe, coşku ve sosyal ile teknolojik ilerlemeye inancı temsil ediyordu. Bu ilkelere saygı gösteren bir mimari, ülkemizi modernlik ve zenginlik örneği haline getirecektir."
 je_gaudi_splendid_architecture_goal: "#E Muhteşem Mimari#! #BLUE 10#! puana ulaşır. Şu anda #G [ROOT.Var('gaudi_splendid_architecture').GetValue]#! @gaudi_architectural_splendour! puanımız var. Günlük Girdisi ile Art Nouveau bölgeleri, Art Deco Sinemaları, Art Deco Gökdelenleri, Art Deco Ofisleri ve Art Deco Havalimanlarını inşa etmek daha fazla puan kazandıracaktır."
 je_gaudi_art_nouveau_quarter: "Art Nouveau Bölgesi"
 je_gaudi_art_nouveau_quarter_reason: "İlk Art Nouveau evleri ve iç dekorasyonları 1890’larda Brüksel’de ortaya çıktı; evlerin mimari ve iç tasarımları Paul Hankar, Henry van de Velde ve özellikle Victor Horta tarafından yapılmıştı; Hôtel Tassel 1893’te tamamlandı. Hızla Paris’e yayıldı ve Hector Guimard, Horta’nın Brüksel’deki çalışmalarını görüp bu stili Paris Metrosu’nun girişlerinde uyguladı. Belçika ve Fransa’dan Art Nouveau, her ülkede farklı isimler ve karakteristiklerle Avrupa’nın geri kalanına yayıldı. Sıklıkla yalnızca başkentlerde değil, aynı zamanda sanatsal kimlik oluşturmak isteyen hızla büyüyen şehirlerde (İtalya’da Torino ve Palermo; İskoçya’da Glasgow; Almanya’da Münih ve Darmstadt) ve bağımsızlık hareketlerinin merkezlerinde (Finlandiya’da Helsinki, o dönem Rus İmparatorluğu’na bağlıydı; İspanya’da Katalonya, Barselona) ortaya çıktı."
 je_gaudi_art_deco_cinema: "Art Deco Sineması"
 je_gaudi_art_deco_cinema_reason: "En iyi korunmuş Art Deco örneklerinin çoğu, 1920 ve 1930’larda inşa edilmiş sinemalardır. Art Deco dönemi, sessiz filmlerin sesli filmlere dönüştüğü zamana denk gelmiş ve film şirketleri, büyük şehirlerde dev ekranlı gösterim alanları inşa ederek devasa izleyici kitlesini çekmek istemiştir. 1920’lerdeki sinema sarayları genellikle egzotik temaları Art Deco stili ile birleştirirdi; Hollywood’daki Grauman's Egyptian Theatre (1922) antik Mısır mezarları ve piramitlerinden esinlenmişti, California’daki Fox Theater ise Art Deco salonuna California Mission tarzı bir kule eklemişti."
 je_gaudi_art_deco_skyscraper: "Art Deco Gökdeleni"
 je_gaudi_art_deco_skyscraper_reason: "Gökdelenler günümüzün çan kuleleridir. Ama ayırt edici bir çanı olmayan bir çan kulesi ne işe yarar? Bir gökdeleni Art Deco stilinde inşa etmek, dünya çapında hayranlık uyandıracak prestijli bir çaba olacaktır."
 je_gaudi_art_deco_airport: "Art Deco Havalimanı"
 je_gaudi_art_deco_airport_reason: "Karaveller bir zamanlar Avrupalılara okyanusları açtı ve bilinen kıtaları Yeni Dünya ile bağladı. Şimdi havacılık çağı geldi ve daha önce sabit olan sınırlar açılıyor. Yeni uçan gemilerin limanlarını karşılamak için lüks ve yükselen Art Deco stilinden daha uygun bir tarz olabilir mi? Havacılar, güneşe merhaba deyin!"
 je_gaudi_art_deco_office: "Art Deco Ofisi"
 je_gaudi_art_deco_office_reason: "Art Deco tarzı ticaret dünyasında ve eğlence endüstrisinde baskın olsa da, ilgili hükümetler de modern binalarla ülkelerinin refahını vurgulamak ve halkına yükselen bir ulusta yaşadıklarını hissettirmek istemiştir."
 je_gaudi_bauhaus: "Bauhaus"
 je_gaudi_bauhaus_reason: "Bauhaus, 1919–1933 yılları arasında faaliyet göstermiş, zanaat ile güzel sanatları birleştiren bir Alman sanat okuludur. Okul, bireysel sanatsal vizyonu, seri üretim ve işlevsellik prensipleri ile birleştirmeye çalışan tasarım yaklaşımı ile ünlendi. Tüm sanatların bir araya getirileceği bir Gesamtkunstwerk (bütünsel sanat eseri) yaratma fikri üzerine kuruluydu. Bauhaus tarzı, daha sonra modern tasarım, modernist mimari ve mimarlık eğitimi üzerinde en etkili akımlardan biri oldu."
 je_gaudi_summer_burn: "Yazlık Saray’ın Yakılması"
 je_gaudi_summer_burn_reason: "Yazlık Saray, 18. yüzyılın ilk yarısından itibaren Qing Hanedanı’nın imparatorluk ailesinin gerçek ikametgâhı olmuştur. Çin’in büyüklüğünün ve ihtişamının simgesidir. Bir yıkım sadece düşmanın büyük bir aşağılanması anlamına gelmekle kalmaz, aynı zamanda değerli ganimet fırsatını da açar..."
 je_gaudi_summer_burn_success: "Başkent bölgesinin tamamını #T Pekin#! ele geçirin."
 je_gaudi_ben_burn: "Big Ben’in Yakılması"
 je_gaudi_ben_burn_reason: "Westminster Parlamentosu’ndaki yangından sonra Büyük Britanya, imparatorluğun iddiasını vurgulayan yeni ve ikonik bir parlamento binası inşa etti. Belki de Britanya gururunu bir başka yangınla yere indirme zamanı gelmiştir?"
 je_gaudi_ben_burn_success: "Başkent bölgesinin tamamını işgal et #T Anavatan#!."
 je_gaudi_dombau_phase_1: "Köln Katedrali: İnşaatın yeniden başlaması"
 je_gaudi_dombau_phase_1_reason: "Köln Katedrali dünyanın en kusursuz Gotik katedrali kabul edilir. 13. yüzyılda başlayan inşaat devasa boyutlardaydı. Koro bölümünün tamamlanmasının ardından çalışmalar yavaşladı ve 15. yüzyılın ortalarında tamamen durdu. Bugün bile Orta Çağ sonlarından kalma inşaat vinci, yarım kalmış güney kulesinin üzerinde yükselmektedir. Alman burjuvazisinde ulusal ve romantik duyguların canlanmasıyla, özellikle de orijinal planların yeniden keşfedilmesi ve yayılmasıyla birlikte, katedralin tamamlanmasının yalnızca Tanrı’nın yüceliği için değil, aynı zamanda Alman kültürünün ve ulusal birliğinin sembolü olduğuna dair inanç güçlenmiştir."
 je_gaudi_dombau_phase_1_goal: "#E İnşaat İlerlemesi#! #BLUE 120#! puana ulaşmalı. Şu anda #G [GetGlobalVariable('gaudi_dombau_progress').GetValue]#! puanımız var. Normalde her ay bir puan kazanıyoruz."
 je_gaudi_dombau_phase_2: "Köln Katedrali: Güney cephe"
 je_gaudi_dombau_phase_2_reason: "İnşaat çalışmaları birkaç yıl sürdükten sonra, mimarlar katedralin güney cephesinin inşası ve süslemeleriyle karşı karşıya kaldılar. Zengin figürlü süslemeleriyle sadece Alman heykel sanatının zirvesi olarak değil, aynı zamanda Gotik canlanma mimarisinin başyapıtlarından biri olarak kabul edilmektedir. Yalnızca cephenin inşası on üç yıl, bitirilmesi ve süslenmesi ise on sekiz yıl sürdü."
 je_gaudi_dombau_phase_2_goal: "#E İnşaat İlerlemesi#! #BLUE 120#! puana ulaşmalı. Şu anda #G [GetGlobalVariable('gaudi_dombau_progress').GetValue]#! puanımız var. Normalde her ay bir puan kazanıyoruz."
 je_gaudi_dombau_phase_3: "Köln Katedrali: Çatı yapısı"
 je_gaudi_dombau_phase_3_reason: "Gotik ideale dayalı Köln Katedrali tasarımı, baş mimarların dönemin en modern yapı malzemelerini kullanmalarına engel olmadı. Çatı yapısı demirden yapıldı ve bu sayede Eiffel Kulesi inşa edilene kadar dünyanın en büyük demir-çelik yapısı oldu. Bu karar sayesinde yapı, II. Dünya Savaşı’ndaki Müttefik bombardımanına rağmen ayakta kalabildi."
 je_gaudi_dombau_phase_3_goal: "#E İnşaat İlerlemesi#! #BLUE 120#! puana ulaşmalı. Şu anda #G [GetGlobalVariable('gaudi_dombau_progress').GetValue]#! puanımız var. Normalde her ay bir puan kazanıyoruz."
 je_gaudi_dombau_phase_4: "Köln Katedrali: Batı cephesi ve kuleler"
 je_gaudi_dombau_phase_4_reason: "Katedralin batı cephesi şimdiye kadar yapılmış en büyük kilise cephesidir. Ayrıntılarıyla, başmimar Michael von Savoyen’in 1370’te kayda geçirdiği ve cephe planı F olarak bilinen ortaçağ planını takip eder. Köln Katedrali’nin siluetinin karakteristik özelliği, iki yükselen kuleli ikiz kule cephesidir. Usta Michael, kademeli bir alemle taçlandırılmış sekizgen, tamamen ajurlu bir taş işçiliği kule tasarlamıştı. Teknik olarak mümkün olanın sınırlarını zorlayan bu çözümlerle Gotik mimarlar, yapının içeride Üç Bilge Adam’ın kutsal emanetlerini barındıran 'anıtsal bir kutsal emanet sandığı' olmak istediğini vurgulamak istemişlerdir."
 je_gaudi_dombau_phase_4_goal: "#E İnşaat İlerlemesi#! #BLUE 120#! puana ulaşmalı. Şu anda #G [GetGlobalVariable('gaudi_dombau_progress').GetValue]#! puanımız var. Normalde her ay bir puan kazanıyoruz."
 je_gaudi_gotthard_survey: "Gotthard Demiryolu: Plan ve etüt"
 je_gaudi_gotthard_survey_reason: "19. yüzyılda İsviçre, uluslararası demiryolu trafiğinde göz ardı edilme ve böylece yalnızca modern ulaşım sisteminden değil, aynı zamanda Sanayi Devrimi’nden de kopma tehlikesiyle karşı karşıyaydı. Brenner Geçidi üzerinden bir demiryolu hattının açılmasıyla bu tehlike yeni bir boyut kazandı. Coğrafi olarak İsviçre, Avusturya’dan daha büyük zorluklara sahipti: Brenner Geçidi İsviçre’nin alternatif yollarına kıyasla çok daha kolay aşılabiliyordu. İsviçre’de bir Alp demiryolunun inşasından önce güzergâh ve finansman konusunda onlarca yıl süren tartışmalar yaşandı. Zürihli politikacı ve girişimci Alfred Escher, Gotthard hattının belirlenmesinde kilit rol oynadı."
 je_gaudi_gotthard_survey_goal: "#E Planlama İlerlemesi#! #BLUE 60#! puana ulaşmalı. Şu anda #G [GetGlobalVariable('gaudi_gotthard_progress').GetValue]#! puanımız var. Normalde her ay bir puan kazanıyoruz."
 je_gaudi_gotthard_construction: "Gotthard Demiryolu: İnşaat"
 je_gaudi_gotthard_construction_reason: "Gotthard Demiryolu’nun inşası 19. yüzyılın en büyük inşaat projelerinden biri olarak kabul edilir ve boyutları ile teknik engelleri bakımından Süveyş Kanalı’nın inşasıyla karşılaştırılır. En başından itibaren, çekirdek ve en iddialı kısım Gotthard masifinin altından geçen bir tünelin gerçekleştirilmesiydi. 1882’de açıldığında Gotthard zirve tüneli 15 kilometre ile dünyanın en uzun tüneliydi. Çoğu demir ve çelikten yapılmış yaklaşık yüz küçük ve büyük köprü de bu iddialı güzergâhın bir parçasıdır; bu hat yalnızca kuzey ve güney Avrupa’yı birbirine bağlamakla kalmaz, aynı zamanda İsviçre birliğinin de bir sembolüdür."
 je_gaudi_gotthard_construction_goal: "#E İnşaat İlerlemesi#! #BLUE 120#! puana ulaşmalı. Şu anda #G [GetGlobalVariable('gaudi_gotthard_progress').GetValue]#! puanımız var. Normalde her ay bir puan kazanıyoruz."
 je_gaudi_gotthard_discontent: "Gotthard Demiryolu: İşçi Memnuniyetsizliği"
 je_gaudi_gotthard_discontent_reason: "Gotthard demiryolunun inşası sırasında çalışma koşulları, çağdaş standartlarla bile zorlayıcıydı. İşçi sınıfı çoğunlukla yabancılardan, özellikle İtalya'nın kuzey Alp vadilerinin daha yoksul bölgelerinden oluşuyordu ve fiilen hakları yoktu. Özellikle Gotthard tünelindeki işler, hayatı tehdit eden ve düşük ücretli olarak kabul ediliyordu. Bu durum, inşaat yönetimiyle defalarca anlaşmazlıklara yol açtı; öyle ki bir noktada tüm proje bile tehdit altına girdi."
 je_gaudi_gotthard_discontent_goal: "Eğer #E İşçilerin Memnuniyetsizliği#! maksimum değer olan #BLUE 10#! puana ulaşırsa, grev çıkabilir! Şu anda değer #R [GetGlobalVariable('gaudi_gotthard_discontent').GetValue]#! puan."
 je_gaudi_cristo: "Cristo Redentor: İnşaat"
 je_gaudi_cristo_reason: "Vincentian rahibi Pedro Maria Boss, 1850’lerin ortalarında, Brezilya’nın naibi Prenses Isabel ve İmparator Pedro II’nin kızı onuruna Corcovado Dağı’na bir Hristiyan anıt yerleştirilmesini önerdi, ancak proje onaylanmadı. Rio’daki Katolik Çevre, 1920’de dağa bir simgesel heykel için ikinci bir öneride bulundu. Yerel mühendis Heitor da Silva Costa ve sanatçı Carlos Oswald heykeli tasarladı. Fransız heykeltıraş Paul Landowski çalışmayı gerçekleştirdi. Art Deco tarzındaki heykel, daha sonra Rio de Janeiro’nun simgesi olarak, Şeker Kulağı’nın yanında dünya çapında ün kazandı."
 je_gaudi_cristo_goal: "#E İnşaat İlerleyişi#! #BLUE 120#! puana ulaşır. Şu anda elimizde #G [GetGlobalVariable('gaudi_cristo_progress').GetValue]#! puan var. Normalde her ay bir puan kazanıyoruz."
 je_gaudi_mole_phase_1: "Mole Antonelliana: Sinagogdan Ulusal Simgiye"
 je_gaudi_mole_phase_1_reason: "Mole Antonelliana, Torino’lu mimar Alessandro Antonelli tarafından yüksek ve keskin şekilde daralan yapısıyla pavyon benzeri bir bina olarak tasarlandı. Yahudi topluluğu adına bir sinagog olarak başlatıldı, ancak mimarın aşırı hırsı projeyi orijinal planların ötesine taşıdı. Maliyetler fırladı ve tamamlanması yıllar sürdü. Ambisyonlu girişimlere rağmen, Yahudi topluluğu daha fazla para toplayamadı. Ancak Torino halkı, binayı tamamlamak için yerel yönetimin projeyi devralmasını ve halihazırda etkileyici olan kaba yapıyı İtalyan birliğine adamasını savundu."
 je_gaudi_mole_phase_1_goal: "#E İnşaat İlerleyişi#! #BLUE 120#! puana ulaşır. Şu anda elimizde #G [GetGlobalVariable('gaudi_mole_progress').GetValue]#! puan var. Normalde her ay bir puan kazanıyoruz."
 je_gaudi_mole_phase_2: "Mole Antonelliana: Fener ve Çan Kulesi"
 je_gaudi_mole_phase_2_reason: "Antonelli binasında sürekli değişiklikler yaptı, örneğin 'tempietto' adı verilen, iki katlı ve kare tabanlı neoklasik altıgen sütunlu bir yapı ekledi; bu nedenle temel pronaos stilini aldı. Antonelli’nin çan kulesi vizyonu, beş köşeli bir yıldız ile tepeyi tamamlamaktı, ancak daha sonra yerine kanatlı bir cin, yani 'genio alato' tasvir eden bir heykeli tercih etti. Heykel, Antonelli’nin ölümünden aylar sonra heykeltıraş Fumagalli’ye sipariş edildi. Tasarım, bir elinde mızrak diğerinde palmiye dalı tutan kabartmalı ve altın kaplamalı bakır bir cin içeriyordu. Başında küçük bir beş köşeli yıldız vardı. Yıldız 10 Nisan 1889’da yerine konulduğunda, Mole’nin toplam yüksekliği 167,5 m (550 ft) oldu ve Avrupa’daki en yüksek tuğla bina haline geldi."
 je_gaudi_mole_phase_2_goal: "#E İnşaat İlerleyişi#! #BLUE 120#! puana ulaşır. Şu anda elimizde #G [GetGlobalVariable('gaudi_mole_progress').GetValue]#! puan var. Normalde her ay bir puan kazanıyoruz."
 je_gaudi_ringstrasse_phase_1: "Viyana Ringstrasse: Halka Yolların Efendisi"
 je_gaudi_ringstrasse_phase_1_reason: "Viyana Ring Yolu, 19. yüzyıl ortasında şehir duvarlarının yıkılmasından sonra inşa edildi. 1860’lardan 1890’lara kadar, Ringstrasse boyunca birçok büyük kamu binası eklektik tarihçi tarzında, bazen Ringstraßenstil ('Ring Yolu stili') olarak adlandırılan ve Klasik, Gotik, Rönesans ve Barok mimari unsurları içeren bir tarzda inşa edildi. Tüm halka yolu boyunca sayısız kamu ve özel bina yapıldı. Aristokratlar ve diğer zengin özel kişiler, temsil niteliğinde saraylar (halka yolu sarayları) inşa ettirmekte acele ettiler."
 je_gaudi_ringstrasse_phase_1_goal: "#E İnşaat İlerleyişi#! #BLUE 120#! puana ulaşır. Şu anda elimizde #G [GetGlobalVariable('gaudi_ringstrasse_progress').GetValue]#! puan var. Normalde her ay bir puan kazanıyoruz."
 je_gaudi_ringstrasse_phase_2: "Viyana Ringstrasse: Hofoper ve Neues Rathaus"
 je_gaudi_ringstrasse_phase_2_reason: "Yıkılan Viyana kalelerinin yerine muazzam bir bulvar yapılmasına karar verilmesinden sadece on yıl sonra halka yolu açıldı. Ancak o dönemde hâlâ boş araziler hâkimdi. Takip eden yıllarda en önemli projelerden biri, daha sonra Viyana Devlet Operası olacak büyük yeni bir opera binasının gerçekleştirilmesiydi. Yeni Belediye Binası da bu dönemde inşa edildi ve Ringstrasse, yalnızca bir cadde olmaktan çıkarak saraylar ve kamu binalarıyla yeni bir Viyana merkezi haline geldi."
