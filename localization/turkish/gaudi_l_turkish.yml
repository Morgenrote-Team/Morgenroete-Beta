 gaudi_dom_can_construct_tt: "Köln Katedrali yalnızca #E Kuzey Ren#! bölgesinde Alman birincil kültürüne sahip bir ulus tarafından inşa edilebilir. Karar yoluyla inşa edilmelidir."
