 je_gaudi_neuschwanstein_phase_1_reason: "Neuschwanstein, historicism ve Alman Romantizmi’nin en önemli örneği olarak kabul edilir. Daha sonra birçok kişi tarafından 'ideal' kale olarak görülecek olan bu peri masalı kalesi, Bavyera Kralı II. Ludwig tarafından tasarlanmıştır. 19. yüzyılda, kralların görkemli şekilde ortaçağ kaleleri yaptırması alışılmadık olmasa da, Neuschwanstein sadece Bavyera’nın değil, tüm Almanca konuşulan dünyanın bir simgesi olmalıdır."
 je_gaudi_neuschwanstein_phase_1_goal: "#E Construction Progress#! #BLUE 120#! puana ulaşmalı. Şu anda elimizde #G [GetGlobalVariable('gaudi_neuschwanstein_progress').GetValue]#! puan var. Normalde her ay bir puan alıyoruz."
 je_gaudi_neuschwanstein_phase_2: "Neuschwanstein: Bir Peri Masalı Kalesi"
 je_gaudi_neuschwanstein_phase_2_reason: "Başlangıçtan itibaren Neuschwanstein, temsil veya halk için değil, kral için özel bir sığınak olarak tasarlanmıştır. Kral, çalışmalarını ortaçağ Hristiyan mitlerine dayandırdı, ama her şeyden önce desteklediği ve hayranlık duyduğu Richard Wagner’in operalarına. Kralın sürekli yenilenen fikirleri ve Neuschwanstein ile sonsuza dek taş bir opera sahnesi inşa etme arzusu, inşaatı önemli ölçüde geciktirdi ve II. Ludwig’i iflasın eşiğine getirdi."
