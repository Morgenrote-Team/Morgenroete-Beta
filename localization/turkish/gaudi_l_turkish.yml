 je_gaudi_ringstrasse_phase_3: "Viyana Ringstrasse: Üniversite ve Sanat Müzeleri"
 je_gaudi_ringstrasse_phase_3_reason: "Ringstrasse çoktan sanayiciler, bankerler ve aristokrasi için gözde bir adres haline geldi. Kamusal binalar öne çıkmakta ve ülkeyi en estetik biçimde temsil etmektedir. Bununla birlikte, tamamlanması için yeni bir üniversite binasının inşasının ve sanat müzelerinin kurulmasının ön planda olacağı son bir inşaat aşaması gereklidir."
