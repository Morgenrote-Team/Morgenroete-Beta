 je_gaudi_palacio_phase_2: "Meksika Kültürünün Kalbi"
 je_gaudi_palacio_phase_2_reason: "İtalyan mimar Adamo Boari, Palacio de Bellas Artes’in tasarımı için görevlendirildi ve dört yıl içinde tamamlaması bekleniyordu. Ancak bir dizi problem nedeniyle bu süre tutulamadı. Meksika’nın bataklık zemini nedeniyle binalar çöktü, mali sıkıntılar yaşandı ve Boari nihayet Meksika Devrimi nedeniyle İtalya’ya geri döndü. İnşaatın gecikmesi ayrıca sanat ve mimari zevklerin değişmesine yol açtı ve Art Deco’dan ilham alınmasıyla yeni bir tarz benimsendi."
