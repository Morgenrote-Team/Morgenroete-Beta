 gaudi.74.t: "Taşta Yeni Bir Vizyon"
 gaudi.74.d: "Cesur bir yeni mimar, hem ruhbanı hem de kraliyet ailesini etkilemektedir. Adı Alessandro Antonelli."
 gaudi.74.f: "'1798'de Piedmont, Ghemme'de doğan Alessandro Antonelli, uzun süre İtalya'nın mimarlık çevrelerinde umut vadeden ancak denenmemiş bir figür olarak görülüyordu. Bu algı, Novara Katedrali'ndeki radikal müdahaleleriyle değişti. Yeni neoklasik sunak tasarımıyla görevlendirilen Antonelli, klasik geometri ile yükselen dikeyliği cesurca birleştiren bir sentez sundu; fikir ayrılıklarına yol açtı ama hiç kimseyi kayıtsız bırakmadı. Bazı eleştirmenler tasarımlarını aşırı bulsa da, diğerleri onun İtalyan Rönesansı'na değer bir ruh taşıdığını gördü.\n\nŞöhreti arttıkça, gelecekteki görevleri hakkında sorular ortaya çıkıyor ve İtalya Krallığı'nın silüetlerini yeniden şekillendirecek kişi olup olmayacağı merak konusu."
 gaudi.74.g: "Antonelli, Sardinya'nın yeni başmimarı olacak."
 gaudi.74.h: "Ona bir akademide bir koltuk verin."
