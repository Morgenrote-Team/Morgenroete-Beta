 gaudi.51.t: "Neoklasik Yeniden Doğuş"
 gaudi.51.d: "[ROOT.GetCountry.GetName], zamansız ve saygın mimarinin bir örneği haline geldi. Bu, medeni dünyada hayranlık uyandıran bir statüdür!"
 gaudi.51.f: "'Antik başyapıtların genel ve en belirgin özelliği, nihayetinde hem duruşta hem ifadede asil bir sadelik ve sessiz bir ihtişamdır.'\n- Johann Joachim Winckelmann"
 gaudi.51.g: "İşte gerçek sanatın özü budur."
 gaudi.52.t: "Bauhaus’un Zaferi"
 gaudi.52.d: "[ROOT.GetCountry.GetName], rasyonel ve ilerici mimarinin bir ışık kaynağı haline geldi. Bu statü, dünya çapında saygı ve hayranlık uyandırıyor!"
 gaudi.52.f: "'Tasarım bir meslek değil, bir tutumdur.'\n- László Moholy-Nagy"
 gaudi.52.g: "Lüks ihtiyacından ziyade halkın ihtiyaçları!"
 je_gaudi_bauhaus_architecture: "Bauhaus Mimarisi"
 je_gaudi_bauhaus_architecture_reason: "Bauhaus, 1919-1933 yılları arasında faaliyet gösteren ve el sanatları ile güzel sanatları birleştiren bir Alman sanat okuluydu. Okul, bireysel sanatsal vizyonu seri üretim ilkeleri ve işlevsellik vurgusuyla birleştirmeye çalışan tasarım yaklaşımıyla ünlendi. Tüm sanatların bir araya getirileceği bir Gesamtkunstwerk (kapsamlı sanat eseri) yaratma fikri üzerine kuruluydu. Bauhaus tarzı, modern tasarım, modernist mimari ve mimarlık eğitiminde en etkili akımlardan biri haline geldi."
 je_gaudi_neoclassical_architecture: "Neoklasik Mimari"
 je_gaudi_neoclassical_architecture_reason: "20. yüzyılın başında Neoklasisizm, Greko-Romen antik çağının formal açıklığı, simetrisi ve ihtişamıyla yeniden bağlantı kurmayı amaçlayan bir revivalist mimari ve sanatsal harekettir. Tarihselciliğin aşırılıklarına ve modern sanatın artan soyutlamasına karşı bir tepki olarak ortaya çıkmış, anıtsallığı, geometrik düzeni ve geleneksel biçimlerin mantıklı kullanımını vurgulamıştır. Ulusal kimlik ve kamu mimarisiyle yakından ilişkili olup, kalıcılık, otorite ve disiplinli güzellik ideallerini yansıtır."
 je_gaudi_art_deco_architecture: "Art Deco Mimarisi"
 je_gaudi_art_deco_architecture_reason: "Art Deco hareketi, 1920’lerde modernliği benimseyen ancak klasik düzen unsurlarını da koruyan dekoratif ve mimari bir stil olarak ortaya çıktı. Stilize formlar, zengin malzemeler ve süsleyici geometrinin karakteristik kullanımıyla, Art Deco zanaatkarlığın ihtişamını ortaya çıkan makine estetiğiyle birleştirdi. Endüstri, hız ve egzotizmden ilham alan motiflerle teknolojik ilerlemeyi ve şehir dinamizmini kutladı."
 je_gaudi_splendour_bauhaus: "Bauhaus’un Zaferi"
 je_gaudi_splendour_bauhaus_reason: "Bauhaus ruhunun benimsenmesiyle, mimarlar süslemeleri ve yanılsamaları kaldırıp netlik, hassasiyet ve malzemeye sadakat yolunu seçmeye başladı. Amaç artık ihtişamla etkilemek veya geçmiş imparatorlukların görkemini çağrıştırmak değil, topluma işlevsel, dürüst ve modern alanlar yaratmaktır. Bauhaus sadece bir estetik değil, mimari ve günlük yaşamın sadelik, işlev ve biçim ile amaç birliği ile uzlaştırılması gerektiğine dair bir tasarım felsefesidir. Başkent, Bauhaus ilkelerini benimseyerek yalnızca modernliği değil, fonksiyonun cepheye, yeniliğin geleneğe üstünlüğünü simgeler."
 je_gaudi_splendour_neoclassical: "Neoklasik Yeniden Doğuş"
 je_gaudi_splendour_neoclassical_reason: "Neoklasisizm, antik çağın rasyonel uyumuna, sütun, alınlık ve simetrik düzenlerin mimari diline dayanan bir stildir. Ancak 20. yüzyılın başında modern inşaat teknikleri, daha temiz çizgiler ve genellikle anıtsal ölçekle yeniden yorumlandı. Sadece geleneği değil, kamu yaşamını, hukuku ve kültürü hayranlık ve birliği teşvik eden binalarla çerçevelenmiş disiplinli bir gelecek vizyonunu temsil ediyordu. Bu ilkelere saygı gösteren mimari, başkentimize ciddiyet ve ihtişam kazandırır—onu dünyanın gözünde düzenin, dayanıklılığın ve kültürlü gücün bir sembolü haline getirir."
 je_gaudi_splendour_art_deco: "Art Deco Rüyası"
 je_gaudi_splendour_art_deco_reason: "Art Deco’nun tanıtımıyla mimarlar sanat dünyasında devrim yaptı; örneğin geçmişin katı tarihselciliğinden ayrıldılar. Ancak birçok modern okulun aksine, binaları sadece işlevsellik ve nesnellik ifadesi değildi. Art Deco, klasik modernizmin genel uyanışı ortasında bir gelişmeydi ve burada formun zarafeti, malzeme değerliği, renklerin gücü ve konunun duyusallığı ön plandaydı. Zirvesinde, lüks, ihtişam, coşku ve sosyal ile teknolojik ilerlemeye olan inancı temsil ediyordu. Bu ilkeleri benimseyen bir mimari, ülkemizi modernlik ve refahın simgesi haline getirir."
