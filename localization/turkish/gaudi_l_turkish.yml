 gaudi_nemo_button: "Canavarı Avla"
 gaudi_nemo_button_desc: "Deneyimli bir doğa bilimciyle küçük bir keşif gezisi, bilinmeyen canavarın oluşturduğu tehlike hakkında daha fazla bilgi edinmemize yardımcı olmalı."
 je_gaudi_nemo: "Denizlerin Yirmi Bin Fersahı"
 je_gaudi_nemo_reason: "Görgü tanıklarına göre dev bir narvala benzeyen gizemli bir deniz canavarı, ticaret gemilerimize ve hatta limanlara saldırıyor. Bir doğa bilimcisinin yardımıyla, yaratık hakkında daha fazla bilgi edinmek ve belki de durdurmak için bir keşif gezisi gönderebiliriz."
 gaudi.80.t: "Walhalla"
 gaudi.80.d: "Regensburg yakınlarındaki Walhalla’nın tamamlanmasıyla, Bavyera büyük Alman dehalarını büst formunda sergileyip onurlandırabileceği bir mekân inşa etti."
 gaudi.80.f: "Walhalla, Bavyera’nın Markt Donaustauf’taki Bräuberg’de bulunan bir anıttır. 1830–1842 yılları arasında Bavyera Kralı I. Ludwig tarafından, mimar Leo von Klenze aracılığıyla inşa edilmiştir. 1806’da Kutsal Roma İmparatorluğu’nun dağılması ve daha sonra Almanya olacak geniş bir alanın Napolyon’un doğrudan etkisi altına girmesiyle ortaya çıkan 'Almanya’nın en derin rezaleti' üzerine, dönemin Veliaht Prensi Ludwig, 'olağanüstü üstün Almanlar' büstlerini oluşturma emrini verdi. Üç katlı yazıların ilki, Ludwig’in Ocak 1807’de elli büyük Alman için onur tapınağı inşa etmeye karar verdiğini belirtir. Ludwig 1825’te göreve geldiğinde 60 büst tamamlanmıştı ama henüz bir inşaat alanı bulunmamıştı. Walhalla, Atina’daki Parthenon model alınarak Dorik Peripteros tarzında bir Yunan tapınağı şeklinde tasarlandı."
 gaudi.80.g: "Bir Alman besteciyi onurlandır."
 gaudi.80.h: "Bir Alman yazarı onurlandır."
 gaudi.80.i: "Bir Alman ressamı onurlandır."
 gaudi.90.t: "Gizemli Balina gemiyi batırıyor!"
 gaudi.90.d: "Başta denizcilerin batıl inancı olarak reddedilen ancak artık göz ardı edilemeyen raporlar artıyor. Özetle, zaman içinde birkaç gemi denizde 'devasa bir şey' ile karşılaştı, uzun iğ şeklinde bir nesne, bazen fosforlu bir ışık yayarak, herhangi bir balinadan çok daha büyük ve hızlı.\n\nGeçen yıl, birçok ticaret gemisi bu garip fenomen yüzünden kayboldu ve birçok kişi bunu henüz keşfedilmemiş büyük bir balina türü olarak gördü."
 gaudi.90.f: "Bu görünümle ilgili gerçekler, nesnenin ya da yaratığın şekli, hareketlerinin yorulmak bilmez hızı, şaşırtıcı bir hareket gücü ve sahip olduğu görünen tuhaf yaşam açısından çoğunlukla uyumluydu. Eğer bir balina türü ise, bugüne kadar bilim tarafından sınıflandırılan tüm türlerden büyüktü. Çeşitli zamanlarda yapılan gözlemlerin ortalaması dikkate alındığında, bu gizemli varlığın dönemin iktiyologlarının kabul ettiği tüm boyutları çok aşmış olduğunu söyleyebiliriz."
 gaudi.90.g: "Ama gerçekten bir balina mı?"
 gaudi.91.t: "Gizemli Balina tekrar saldırıyor!"
 gaudi.91.d: "Gizemli canavar tekrar saldırdı! Tüm ticaret denizciliği endüstrisi dehşet içinde."
 gaudi.91.f: "Mühendisler, kuru havuzda olan Scotia’yı ziyaret ettiler. Bunu mümkün bulmak neredeyse imkânsızdı; su çizgisinin iki buçuk yarda altında düzgün bir ikizkenar üçgen şeklinde yırtık vardı. Demir levhalardaki kırık o kadar kusursuzdu ki, bir zımba ile daha düzgün yapılamazdı. Bu nedenle, delik açan aracın sıradan bir alet olamayacağı açıktı; olağanüstü bir güçle itilmiş ve bir buçuk inç kalınlığındaki demir levhayı delmiş, sonra anlaşılmaz bir geri hareketle geri çekilmişti."
 gaudi.91.g: "Açık denizlerdeki bu sinsi tehdit sona ermeli!"
 gaudi.92.t: "Gizemli Balina kıyıya saldırıyor!"
 gaudi.92.d: "Balina ya da neyse, bir liman şehrine saldırdı ve geride yıkım bıraktı."
 gaudi.92.f: "Ulaşılamayan kum adası ve yüzen ada hipotezi, yargıda bulunacak yeterli bilgiye sahip olmayan zihinler tarafından desteklendi, ama bırakıldı. Eğer bu sığlık karnında bir makineye sahip değilse, bu kadar hızlı pozisyon değiştirebilir miydi? Aynı nedenle, devasa bir enkazın yüzen gövdesi fikri de bırakıldı.\n\nSorunun geriye kalan iki olası çözümü kaldı ve iki farklı grup oluştu: bir tarafta devasa güce sahip bir canavarı savunanlar; diğer tarafta büyük motor gücüne sahip bir denizaltı aracı olduğunu düşünenler."
 gaudi.93.t: "Profesör ve Canavarı"
 gaudi.93.d: "[SCOPE.sCharacter('dubois_naturalist_scope').GetFullName], bilinmeyen yaratığın son suç mahallini inceledikten sonra cesur bir ekiple canavarı aramaya çıktı."
 gaudi.93.f: "'Okyanusların derinlikleri tamamen bilinmiyor. Ölçümler onları ulaşamıyor. O uzak derinliklerde neler oluyor—hangi canlılar yaşıyor ya da yaşayabilir, su yüzeyinin 12–15 mil altında—bu hayvanların organizasyonu nedir—neredeyse tahmin edemiyoruz. Ancak bana sunulan problemin çözümü, ikilemin şeklini değiştirebilir. Ya tüm türleri biliyoruz ya da bilmiyoruz. Eğer hepsini bilmiyorsak, doğa bize hala balıkçılık konusunda sırlar saklıyorsa, mantığa en uygun olan şey, balıkların veya farklı türde deniz memelilerinin, hatta yeni türlerin, saptırmalarla üst seviyeye gelmiş organizasyonlarının varlığını kabul etmektir.'"
 gaudi.93.g: "İyi şanslar!"
 gaudi.94.t: "[SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] kayıp!"
 gaudi.94.d: "Deniz canavarı, onu araştırmak isteyen gemiye saldırdı. [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] canavarla mücadele sırasında denize düştü! Günlerce aramalarına rağmen bulunamadı."
 gaudi.94.f: "'Bu anda, pruva korkuluğuna yaslanmışken, aşağıda Ned Land’in bir elinde martingal, diğer elinde korkunç zıpkınıyla hareketsiz yaratığa sadece yirmi feet kadar mesafede mücadele ettiğini gördüm. Aniden kolu düzeldi ve zıpkın atıldı; silahın tok sesini duydum, sanki sert bir cisme çarpmış gibiydi. Elektrik ışığı birden söndü ve iki devasa su fışkırması fırkateynin güvertesini aştı, baştan kıça doğru bir sel gibi akarak adamları devirdi ve direklerin bağlarını kırdı. Korkunç bir sarsıntı oldu ve kendimi durdurmaya fırsat bulamadan korkuluk üzerinden denize düştüm.'"
 gaudi.94.g: "Hayır! Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] olamaz!"
 gaudi.95.t: "Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName] kıyıya vurdu!"
 gaudi.95.d: "Ünlü doğa bilimci [SCOPE.sCharacter('dubois_naturalist_scope').GetFullName] bugün kıyılarımızda bulundu. Profesör, gemileri batırıp yiyen gizemli bir balinanın ardındaki gerçeği keşfetmek için gönderilen bir keşif gezisine katıldığından beri kayıptı. Profesör, yaşadığı derin deneyim karşısında şokta ve hikayesi gerçekten dikkate değer. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], gemisinin yaratıkla yakın bir karşılaşma sırasında denize sürüklendiğini ve yaratığın aslında su altında hareket edebilen bir insan yapımı gemi olduğunu iddia ediyor. [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName], geminin özgürlüğüne düşkün bir bekçi tarafından yönetildiğini ve bu kişinin karaya temas etmeyi bırakıp tüm yaşamını denizlerde özgürce sürdürdüğünü belirtiyor. Gerçek ne olursa olsun, Profesör [SCOPE.sCharacter('dubois_naturalist_scope').GetLastName]'in bu garip gemide konuk olarak karşılaştığı pek çok yeni yaşam formuna dair ayrıntılı anlatımları, bilimsel çalışmalarımız için yıllarca değerli olacak."
 gaudi.95.f: "'Bu açıkça dev bir narval ve elektrikli bir narval.' -[SCOPE.sCharacter('gaudi_nemo_scope').GetFullName]"
 gaudi.95.g: "Ama Kaptan Nemo gerçekten yenildi mi?"
 gaudi.1004.t: "Magnetischer Verein Göttingen"
 gaudi.1004.d: "Ünlü astronom ve matematikçi Carl Friedrich Gauß ile fizikçi Wilhelm Eduard Weber, dünyanın manyetik alanını araştırmak için uluslararası bir dernek kurdu."
 gaudi.1004.f: "Magnetischer Verein (aynı zamanda Göttingen Manyetik Derneği olarak da bilinir), 1830’larda kurulan Göttingen merkezli bir araştırma topluluğudur. Ana amacı, dünyanın manyetik alanındaki zamansal ve mekânsal değişimleri araştıran küresel bir jeofizik araştırma projesi yürütmekti. Bu, ilk uluslararası bilimsel topluluk olarak kabul edilir. Dernek, Göttingen profesörleri Carl Friedrich Gauß ve Wilhelm Weber tarafından Alexander von Humboldt’un desteğiyle kuruldu. Amaç, dünya çapında dağıtılmış çok sayıda ölçüm istasyonu kullanarak dünyanın manyetik alanındaki dalgalanmaları koordineli şekilde ölçmekti. 1836–1841 yılları arasında altı yıllık bir dönemde, her biri 24 saat süren 28 ölçüm günü yapıldı, beş dakikalık aralıklarla. Bu projeye Avrupa’dan 35, Asya’dan 6, Afrika’dan 2, Kuzey Amerika’dan 3 ve Güney Denizleri’nden 4 olmak üzere 50 gözlemevi katıldı. Sonuçlar Göttingen’e ulaştırıldı ve Gauß ile Weber tarafından bilimsel olarak işlendi."
 gaudi.1004.g: "Mıknatıslar? Elektrik? Elektromanyetizma!"
 gaudi.1004.h: "Parlak fikirler!"
