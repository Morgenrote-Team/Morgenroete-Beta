 ACHIEVEMENT_GROUP_gaudi_achievement_group: "Gaudí Başarımları"
 ACHIEVEMENT_gaudi_kulturnation: "Kulturnation"
 ACHIEVEMENT_DESC_gaudi_kulturnation: "Bir Alman ulusu olarak Köln Katedrali’ni tamamla, Neptün’ü keşfet, Allgemeine Deutscher Musikverein’i kur, Richard Wagner Festivali’ni düzenle, İştar Kapısı’nı Almanya’ya taşı ve başkentini Ekspresyonizmin beşiği yap. Ayrıca aktif bir orkestra şefine ve ünlü bir arkeoloğa sahip olman gerekir."
 ACHIEVEMENT_gaudi_segundo_siglo_de_oro: "Segundo Siglo de Oro"
 ACHIEVEMENT_DESC_gaudi_segundo_siglo_de_oro: "İspanya’yı yeniden büyük kültür ulusları arasına döndür: Plüton’u keşfet, büyük bir arkeolojik keşif yap, başkentini Art Nouveau’nun beşiği yap ve Sagrada Família’yı tamamla! Ayrıca kampanyanda en az bir Büyük Besteci işe almalısın."
