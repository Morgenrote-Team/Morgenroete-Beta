 gaudi.35.t: "[SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]’da Art Nouveau Mahallesi"
 gaudi.35.d: "Yeni sanatsal gelişme [SCOPE.sState('gaudi_art_nouveau_quarter_state').GetCityHubName]'da durmadı: artık avant-garde olarak kabul edilen bir mahallede yeni Art Nouveau binaları inşa ediliyor."
 gaudi.35.f: "Brüksel’de Art Nouveau mimarisinin çıkışı, yeni tarzda Dekoratif Sanat dalgasıyla birlikte geldi. Önemli sanatçılar arasında, Brüksel cephelerinde barok etkiler yaratmak için dövme demir kullanan Gustave Strauven; son derece orijinal sandalyeler ve eklemli metal mobilyalar tasarlayan mobilya tasarımcısı Gustave Serrurier-Bovy; ve yusufçuk, kelebek, kuğu ve yılan şeklinde takılar tasarlayan mücevher tasarımcısı Philippe Wolfers vardı. Stil, kısa sürede komşu Fransa’da da dikkat çekti. Horta'nın Hôtel Tassel’ini ziyaret ettikten sonra Hector Guimard, Castel Béranger’ı inşa etti; bu Paris’teki yeni tarzın ilk binalarından biriydi. Parisliler, Guimard’ın özgün ve resmedilmeye değer tarzını benimsedi; Castel Béranger, Paris’in en iyi yeni cephelerinden biri seçildi ve Guimard’ın kariyerini başlattı. 1900 Paris Exposition universelle, Art Nouveau’nun zirvesini işaret ediyordu. Nisan ile Kasım 1900 arasında, dünyanın dört bir yanından yaklaşık elli milyon ziyaretçi çekti ve stilin mimarisini, tasarımını, cam işlerini, mobilyalarını ve dekoratif objelerini sergiledi. Paris Fuarı en büyük olmasına rağmen, diğer fuarlar da stilin popülerleşmesine büyük katkı sağladı."
 gaudi.35.g: "Canlı bir yeni kültür."
 gaudi.22.t: "Çizgiler ve Ölçüler"
 gaudi.22.d: "Mimarımız geri döndü—bu kez elinde bir ölçüm çubuğu ve araziyi görmek için yeni gözlerle."
 gaudi.22.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] bir zamanlar şehir meydanlarında cepheler çizmeye, gölgeleri ve süslemeleri izlemeye razıydı. Şimdi [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe], zemine çizgiler çiziyor.\n\nSeyahatleri sırasında [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe], şehirleri terk edip hinterlanda yöneldi. Galiçya’nın vahşi doğasında, Po Deltası’nın bataklıklarında ve Midlands’ın demiryolu kesitlerinde [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe], mühendisler, çiftçiler ve şeflerle yürüdü. Araziyi başkalarının kutsal metinleri okuduğu gibi okumayı öğrendi. Beş kış sonra suyun nereden akacağını, kilin nerede kayacağını, temel çatlağının nerede oluşacağını söyleyebilir.\n\nArtık [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe], eğimlerden ve jeodezik noktalardan söz ediyor. Not defterleri süslemelerle değil, açılar, yükseklikler ve inç hassasiyetinde ölçülmüş mesafelerle dolu. Bazıları, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]'nin fazla katı ve aşırı detaycı olduğunu söylüyor. Ama boş bir araziye baktığında, olası yolların yerini çoktan görüyor."
 gaudi.22.g: "Bir bina, temel atılmadan çok önce başlar."
 gaudi.23.t: "Saymayı Bilen Mimar"
 gaudi.23.d: "İki yıl süren çalışmanın ardından, mimarımız geri dönüyor—[ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] zihni daha keskin, çizimleri daha tuhaf."
 gaudi.23.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] bir zamanlar içgüdü ile çizerdi. Şimdi [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] mantıkla çiziyor.\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U], zamanını duvarcılar veya inşaatçılar arasında değil, dersliklerde geçirdi. Paris, Göttingen, hatta St. Petersburg. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U], tebeşir tahtalarıyla dolu dersliklerin altında oturdu, elleriyle hiçbir şey inşa etmeyen ama aklıyla her şeyi kuran insanların yanında çalıştı. Artık [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] simetriden, modülden, zarif formüllerle tanımlanan yük eğrilerinden söz ediyor.\n\nEskiden el çizimiyle yapılan süslemeler artık yok. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] yeni planları sert, tuhaf ve neredeyse yabancı bir hassasiyete sahip. Bazılarına soğuk ve insan dışı görünebilir. Ama sonra [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] açıklar: bir kubbenin güzelliği süslemelerinde değil, eğrisinin mükemmelliğindedir.\n\nYetkililer, [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim] ile ne yapacaklarını bilemiyor. Meslektaşları uygulanamazlık konusunda fısıldıyor. Ama diğerleri—özellikle gençler—dinliyor."
 gaudi.23.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U], başkalarının sadece hayal edebileceğini inşa ediyor."
 gaudi.24.t: "Taş Önce Kağıtta"
 gaudi.24.d: "Mimarımız geri döndü—bu kez aletlerle ya da denklemlerle değil, damgalar, imzalar ve bir yetkili ağı ile."
 gaudi.24.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] artık çizim masasında zorlanmıyor. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U], artık ofislerde süzüle süzüle ilerliyor.\n\nYurt dışında geçirdiği iki yılda, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] sadece mimarlık çalışmadı—[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] yönetimi inceledi. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U], bir projenin yaşayıp yaşamayacağını tasarım değil, kararname ile belirlediğini öğrendi. Viyana’da bakanlıkları gözlemledi; Brüksel’de izin memurlarını izledi; Marsilya’da kanalizasyonun silüetleri belirlediği konsey toplantılarına katıldı.\n\nŞimdi, ülkeye dönünce, hangi belgeleri ne zaman sunacağını, hangi yönetmeliğe atıf yapacağını, kimi pohpohlacağını ve kimi görmezden geleceğini biliyor. Kuralların duvar değil, iskele olduğunu söylüyor—hareket ettirilebilir, yumuşatılabilir, yeniden çerçevelendirilebilir. Ve bir şekilde, izinler her zamankinden hızlı geliyor."
 gaudi.24.g: "Her büyük yapı, imzalı bir form ile başlar."
 gaudi.25.t: "Mimar Geri Dönüyor… Nihayet"
 gaudi.25.d: "Mimarımız nihayet büyük turundan geri döndü. Kimse [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]'nin ne getirdiğini tam olarak bilmiyor—hikayeler dışında."
 gaudi.25.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] eskiz defterleriyle çıktı. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] puro ve anekdotlarla geri dönüyor. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] isimler veriyor, görüşler sunuyor ve hatırlamadığını iddia ettiği borçları anlatıyor.\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] güzel, hatta ikna edici konuşuyor—ölçmediği yapılar hakkında. Plan istendiğinde konuyu değiştiriyor. Sonuç istendiğinde, gülümseyerek dehanın acele edilemeyeceğini temin ediyor.\n\nBazıları, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe]'nin bir dolandırıcı olduğunu söylüyor. Diğerleri onu yanlış anlaşılan bir dahi olarak tanımlıyor. Gerçek? Muhtemelen Trieste’de bir kafede ve Napoli’de kaçırılan bir trende bir yerlerde."
 gaudi.25.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] tüm bu zamanı ne yaptı?!"
 gaudi.26.t: "Bir Ustanın Gölgesinde"
 gaudi.26.d: "Mimarımız geri döndü—daha bilge, daha kararlı ve büyük bir öğretmenin izini taşıyor."
 gaudi.26.f: "Diğerleri geniş çapta seyahat ederken, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] mesafeden ziyade derinliği tercih etti. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] yıllarının çoğunu tek bir figürün rehberliğinde geçirdi—efsanevi itibara sahip yaşlı bir mimarın yanında. Sadece dersliklerde değil, iskelelerde ve sessizlikte, [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe] süslemenin ardındaki yapıyı, cephelerin ardındaki niyeti görmeyi öğrendi. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] çizgileri daha temiz, bakışı daha eleştirel oldu. Sadece nasıl inşa edileceğini değil—neden inşa edileceğini de öğrendi. Mentorluk haberi, [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]’den önce yayıldı. Genç çıraklar onu arıyor, şehir yetkilileri beklenmedik bir saygıyla karşılıyor. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U], süreklilik, gelenek ve belki bir gün—miras ile işaretlenmiş biri olarak geri dönüyor."
 gaudi.26.g: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U], başka bir adamın bilgeliğinin yükünü taşıyor"
