 gaudi.1221.t: "Mekanik Bilgisayar"
 gaudi.1221.d: "Our [concept_tesla_mechanical_engineer] [GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] has finally finished one of the greatest inventions of mankind: The Mechanical Computer. This invention will have an influence no one can yet grasp."
 gaudi.1221.f: "Motorlar kükredi ve devasa makine çalışmaya, çıtırtılar ve gıcırtılar çıkarmaya başladı. Binlerce dişli dönmeye başladı ve yazıcı sayıları birbiri ardına yazdırmaya başladı. Tüm bunlar insanın yapamayacağı hız ve doğrulukta gerçekleşti."
 gaudi.1222.t: "Analitik Makine"
 gaudi.1222.d: "[SCOPE.sCharacter('tesla_new_engineer_scope').GetFullName] tanınmış bir çok yönlü bilim insanı, tüm hesaplamaları yapabilen yeni bir makine tasarladı. Şimdi hükümetimizden bu mekanik bilgisayarı inşa etmek için destek istiyor."
 gaudi.1222.f: "\"Bir Analitik Makine var olduğu anda, bilimsel geleceğin yönünü mutlaka belirleyecektir. Herhangi bir sonuç bu makine ile aranırken, o sonuçlara en kısa sürede hangi hesaplama yolu ile ulaşılabileceği sorusu ortaya çıkar.\" - Charles Babbage"
 gaudi.1222.g: "Ne kadar büyüleyici bir proje!"
 gaudi.1222.h: "Bunun yerine bu kadar çok savaş gemisi inşa edebilirdik!"
 tesla_mechanical_computer_project_finished_engineer_loc: "\n[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullNameNoFormatting] ilk #V Mekanik Bilgisayarı#! icat etti. İnsanlık tarihinin en büyük icatlarından biri."
