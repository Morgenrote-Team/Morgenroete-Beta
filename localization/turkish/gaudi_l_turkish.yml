 gaudi.82.t: "Bir Mimarın Ömür Boyu Çalışması"
 gaudi.82.d: "Aylar süren hazırlıkların ardından, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] planlar, hesaplamalar, istatistikler ve el yapımı bir model sundu. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] iddialı anıtı şimdiden mimarlık sanatının bir rüyası olarak kabul ediliyor. Tek kalan soru, bu rüyayı kimin gerçekleştireceği."
 gaudi.82.f: "'Yarın güzel şeyler yapacağız.' -Antoni Gaudí"
 gaudi.82.g: "Kendimize bir anıt."
