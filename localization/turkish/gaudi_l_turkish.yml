 gaudi.2101.t: "Çelik Titanın Doğuşu"
 gaudi.2101.d: "Halkın büyük ilgisiyle temel kazısı çalışmalarıyla inşaat başladı. Bu amaçla toplam 30.973 metreküp toprak kazılacak. Eyfel Kulesi, tek bir çelik kiriş dökmeye gerek kalmadan şimdiden bir rekor kırmış durumda."
 gaudi.2101.f: "'Bu kule yalnızca modern mühendis sanatını simgelemekle kalmayacak, aynı zamanda içinde yaşadığımız Sanayi ve Bilim yüzyılını ve bu anıtın inşa edileceği 18. yüzyılın büyük bilimsel hareketi ve 1789 Devrimi tarafından hazırlanan yolu da temsil edecektir. Bu anıt, Fransa'nın şükran ifadesi olarak inşa edilecektir.' -Gustave Eiffel"
 gaudi.2101.g: "Göğe, yıldızlara!"
 gaudi.2102.t: "Eyfel Kulesinin Açılışı"
 gaudi.2102.d: "Tamamlanması hem korkulan hem de dört gözle beklenen çelik titan artık Fransız başkenti üzerinde yükseliyor. Paris'in tamamı bir kule gölgesinde - şehrin yeni simgesi haline geldi. Açılışın coşkusu eleştirmenleri susturdu."
 gaudi.2102.f: "'Olmuş bitmiş bir duruma - ve ne büyük bir durum! - boyun eğmeliyiz. Ben de birçok kişi gibi Eyfel Kulesi’nin delilik olduğunu söyledim ve inandım, ama bu büyük ve gururlu bir delilik. Kesinlikle, bu devasa yapı serginin geri kalanını gölgede bırakıyor ve Champ de Mars’a yeniden çıktığınızda dev kubeler ve galeriler küçücük görünüyor. Ama ne bekliyorsunuz? Eyfel Kulesi hayal gücüne hitap ediyor, beklenmedik bir şey, fantastik bir şey, küçüklüğümüzü övüyor. Henüz yapım aşamasındayken Meissonier’den Zola’ya kadar en ünlü sanatçılar ve yazarlar, kuleye karşı sanat için korkunç bir suç olduğunu belirten ateşli bir protesto imzaladılar. Bugün yine imzalar mıydınız? Hayır, kesinlikle hayır ve bu öfke belgesinin var olmamasını tercih ederlerdi.'"
 gaudi.2102.g: "Yaşasın Fransa!"
 gaudi.2109.t: "Paris kaybedildi!"
 gaudi.2109.d: "Paris’in kaybıyla birlikte Eyfel Kulesi’nin inşaatına devam etme fırsatını da kaybettik."
 gaudi.2109.f: "Herhangi bir nedenle Paris kaybedilirse, inşaat ilerlemesi #R tamamen kaybedilecektir#!. Eyfel Kulesi’ni yalnızca Fransa inşa edebilir. Yabancı işgalciler inşaatla ilgilenmeyeceklerdir."
 gaudi.2109.g: "Paris’i onlara uzun süre bırakamayız!"
 gaudi.2111.t: "Asansörler"
 gaudi.2111.d: "Asansör teknolojisindeki yeni gelişmeler, Eyfel Kulesi’nin inşaat çalışmalarının beklenmedik şekilde daha hızlı ilerlemesini sağladı."
 gaudi.2111.f: "Eyfel Kulesi’ne çıkış, toplam dokuz farklı asansör sayesinde mümkün oluyor - kule sütunlarında beş asansör, giriş ile ikinci kat arasında çalışıyor ve ikinci ile üçüncü kat arasında çift kabinli iki çift asansör bulunuyor. Kule inşa edilirken Eiffel, hata durumunda bağımsız kalabilmek için farklı teknik ve üreticiler kullandı. Otis asansörleri 1910’a kadar kuzey ve güney sütunlarında çalıştı. 1897’ye kadar doğu ve batı sütunlarında Roux, Combaluzie ve Lepape asansörleri vardı. Sonsuz çift zincir yardımıyla 200 kişiyi taşıyabiliyorlardı. Her iki sistem de hidrolik taşıyıcı sistemiyle çalıştırılıyordu. 1900 Dünya Fuarı vesilesiyle Eiffel, asansörleri ve hidrolikleri çalıştıran buhar motorlarını elektrik motorlarıyla değiştirdi."
 gaudi.2111.g: "Muhteşem!"
 gaudi.2112.t: "Entelektüellerin Tepkisi"
 gaudi.2112.d: "Ünlü bir günlük gazetede, entelektüel, akademik ve sanatsal yaşamın birçok önde gelen ismi, Eyfel Kulesi'nin inşasına karşı protesto gösterdi; kuleyi çirkin bir göz zevki ihlali olarak nitelendirdiler."
 gaudi.2112.f: "'Biz, yazarlar, ressamlar, heykeltıraşlar, mimarlar ve şimdiye kadar dokunulmamış Paris güzelliğinin tutkulu savunucuları, küçümsenen Fransız zevki adına bütün gücümüzle, tüm öfkemizle, bu gereksiz ve devasa Eyfel Kulesi’nin inşasına karşı protesto ediyoruz... Argümanlarımızı anlamanız için, bir an için hayal edin: Paris’in üzerinde devasa siyah bir baca gibi, baş döndürücü ve saçma bir kule yükseliyor; barbar kütlesi altında Notre Dame, Tour Saint-Jacques, Louvre, Les Invalides Kubbesi, Zafer Takı, tüm küçük düşürülmüş anıtlarımız bu korkunç rüyada kaybolacak. Ve yirmi yıl boyunca... vidalı sac metalin nefret dolu sütununun iğrenç gölgesini mürekkepten bir leke gibi uzanmış olarak göreceğiz.'"
 gaudi.2112.g: "İnşaatı erteleyin."
 gaudi.2112.h: "Bu protesto, kulenin daha hızlı inşa edilmesini teşvik ediyor!"
 gaudi.2113.t: "Sanayiciler Çelik Titanı Alkışlıyor"
 gaudi.2113.d: "Sürekli yükselen Eyfel Kulesi, ülkenin sanayicileri tarafından Fransa’nın ekonomik ve teknik ilerlemesinin bir simgesi olarak görülüyor. Açılışı büyük bir heyecanla bekliyorlar."
 gaudi.2113.f: "Resmi açılıştan önce Eyfel Kulesi’ne tırmanmayı başarmış girişimci ve arkeolog Heinrich Schliemann, 24 Mayıs 1889’da Rudolf Virchow’a yazdığı bir mektupta yapıyı mühendislik becerilerinin bir harikası olarak övdü; Paris'teki dünya sergisi onun olmadan çekiciliğini yitirecekti. Başarılı bir ulusal öztemsil ve teknik ilerleme gösterisi olarak övülmesine rağmen, acımasız eleştiriler de vardı."
 gaudi.2113.g: "Belki biraz yardım edebilirsin?"
 gaudi.2113.h: "Sayende!"
 gaudi.2114.t: "Kalitesiz Çelik"
 gaudi.2114.d: "Başmimar, son çelik teslimatının kalitesini sert şekilde eleştirdi ve geri gönderilmesini sağladı. Eyfel Kulesi’nin inşaat programı gözle görülür şekilde değişiyor."
 gaudi.2114.f: "İnşaat çalışmalarına 250 kişiye kadar işçi katıldı, bunlardan yaklaşık 150’si bileşenleri yerinde perçinlemek için kullanıldı. Marangozların yanı sıra, işçilere baca temizleyiciler de dahil edildi; çünkü yüksek yerlerde çalışmaya alışkındılar. İş vardiyaları kış aylarında dokuz saat, yaz aylarında on iki saat sürdü. Eylül 1888’de bir işçi grevi oldu; üç ay sonra tekrar çalışmayı durdurdular ve daha fazla ücret talep ettiler. Gustave Eiffel onlarla pazarlık yaptı ve tamamlanmış ilk platforma bir yemekhane kurdu. Tüm çalışma boyunca yalnızca bir ölümcül kaza meydana geldi. Bir İtalyan işçi, resmi açılıştan sonra asansörleri kurarken kaza yaptı."
 gaudi.2114.g: "Yeni bir çelik yükü satın al."
 gaudi.2115.t: "Kaliteli Çelik"
 gaudi.2115.d: "Yakındaki Paris çelik fabrikalarından gelen çelik, Eyfel Kulesi inşasında o kadar yüksek kalite gösterdi ki, bu sadece işin verimliliğini artırmakla kalmadı, aynı zamanda diğer müşterilerin fabrikadan daha fazla çelik talep etmesini sağladı."
 gaudi.2115.f: "14 Ağustos 1888’de ikinci kat inşa edildi ve üst kısmı çıkma olarak monte edildi. Aynı zamanda platformlar donatıldı. Fabrikada önceden delinmiş parçalar, konik mandreller aracılığıyla çarparak sahada nihai konumlarına getirildi. Eyfel Kulesi’ni bir arada tutan toplam 2,5 milyon perçin bulunuyor. Dört kişi her biri perçinleme işini yaptı. İlk işçi perçini küçük bir dövme fırını kullanarak sıcak bastı ve parlatıldı. İkinci adımda başka bir işçi perçini delik üzerine yönlendirdi. Üçüncü işçi kilit başını şekillendirdi. Son adımda cıvata sıkıştırıldı."
 gaudi.2115.g: "Fransız çeliği en iyi çeliktir."
 gaudi.2116.t: "Matematikçi Çöküşü Öngörüyor"
 gaudi.2116.d: "Fransa'nın en saygın matematikçilerinden biri Eyfel Kulesi’nin yaklaşık 230 metre yükseklikte çökeceğini öngördükten sonra, bazı ev sahipleri arasında panik yayılıyor."
 gaudi.2116.f: "Champ de Mars’daki bir sakin, Eyfel Kulesi’nin çökeceği ve evini yok edeceği korkusuyla devlete ve Paris şehrine dava açtı. Mahkeme, inşaatın devam etmesine yalnızca Gustave Eiffel’in herhangi bir zarardan sorumlu tutulması koşuluyla izin verdi. Bu, Fransa’da temel bir tartışmayı başlattı ve Eiffel’in inşaatı ve hesaplamalarının ne kadar güvenilir olduğu sorusunu gündeme getirdi. Ancak sanayiciler bu eleştiriyi, ilerleme fikrine bir hakaret olarak görüyor."
 gaudi.2116.g: "Bu saçmalık."
 gaudi.2116.h: "Kule çökerse Eiffel ödeme yapacak."
 gaudi_admires_liberty_statue_modifier: "Özgürlük Heykeli: Amerikan İdeallerini Takdir Ediyor"
 gaudi_liberty_impressed_modifier: "Özgürlük Heykeli: Lady Liberty’den Etkilendi"
 gaudi_america_first_modifier: "Özgürlük Heykeli: Amerikan Bir Projesi"
 gaudi.2201.t: "Amerikan Limanında Bir Fransız Kadın"
 gaudi.2201.d: "Fransız inisiyatifiyle, yakında Yeni Dünyaya ulaşan herkesi özgürlüğün bir simgesi olarak karşılayacak devasa bir heykel şu anda yapılıyor."
 gaudi.2201.f: "Bedloe Adası, 1796’da New York Eyaleti’ne emanet edildi, ancak 1800’de ada nihayet ABD federal hükümetine devredildi. ABD, New York Limanı’nı korumak için Bedloe Adası’nda (ve ayrıca Governor's Island ve Ellis Adası’nda) savunmalar inşa etmeye karar verdi. Haziran 1871’de heykeltıraş Bartholdi New York’a gitti. Gözleri, Upper New York Körfezi’ndeki Bedloe Adası’na düştü. Her gelen gemi bu adadan geçmek zorundaydı, bu yüzden heykel için uygun bir yer gibi göründü."
 gaudi.2201.g: "Zaten uygun bir yer bulduk."
 gaudi.2202.t: "Dünyayı Aydınlatan Özgürlük"
 gaudi.2202.d: "Bugün, Özgürlük Heykeli'nin açılışı yüz binlerce kişi tarafından bir geçit töreniyle kutlandı; törenin başında [SCOPE.sCharacter('gaudi_ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler_scope').GetLastName] yer aldı. Fransız bir komite, hedefi Bedloe Adası olan deniz geçit töreninden de sorumlu."
 gaudi.2202.f: "Yunan ünlü küstah dev gibi değil\nFatih kollarıyla kara kara gezmek yerine\nBurada, denizle yıkanan günbatımı kapılarımızda duracak\nBir meşaleli güçlü bir kadın, ateşi\nHapisteki yıldırım ve adı\nSürgünler Annesi. Onun işaret eliyle\nDünya çapında bir karşılama parlıyor; nazik gözleri\nİkiz şehirlerin çerçevelediği köprülü limanı yönetiyor.\n\"Eski topraklar, gösterişli gururunuzu saklayın!\" diye haykırıyor dudakları sessiz. \"Bana yorgunlarınızı, fakirlerinizi verin,\nÖzgür nefes almak isteyen kalabalığınızı,\nDolu kıyılarınızın zavallı artığını gönderin bana:\nBen altın kapının yanında lambamı kaldırıyorum.\""
 gaudi.2202.g: "Bu Yeni Kolossus."
 gaudi.2209.t: "New York kaybedildi!"
 gaudi.2209.d: "New York’un kaybıyla, Özgürlük Heykeli’ni inşa etmeye devam etme fırsatını tamamen kaybettik."
 gaudi.2209.f: "New York herhangi bir nedenle kaybedilirse, inşaat ilerlemesi #R tamamen kaybolacak#!. Sadece Amerika Birleşik Devletleri Özgürlük Heykeli’ni inşa etmeye devam edebilir. Yabancı işgalciler inşaatla ilgilenmeyecek."
 gaudi.2209.g: "New York’u uzun süre onlara bırakamayız!"
 gaudi.2211.t: "Asansörler"
 gaudi.2211.d: "Asansör teknolojisindeki yeni gelişmeler, Özgürlük Heykeli inşaatının beklenmedik şekilde hızlı ilerlemesini sağladı."
 gaudi.2211.f: "'Yüzeyler açık ve basit olmalı, cesur ve temiz bir tasarımla belirlenmeli, önemli yerlerde vurgulanmalı. Detayları büyütmek veya çoğaltmak kaçınılmalıdır. Formları daha görünür kılmak için abartmak veya detay eklemek, eserin oranlarını bozacaktır. Son olarak, model tasarım gibi özet bir karaktere sahip olmalıdır, tıpkı hızlı bir taslak gibi. Bu karakter irade ve gözlem ürünü olmalı, sanatçı bilgilerini yoğunlaştırarak formu ve çizgiyi en basit şekilde bulmalıdır.' -Frédéric-Auguste Bartholdi"
 gaudi.2211.g: "Harika!"
 gaudi.2213.t: "Entelektüeller etkilendi"
 gaudi.2213.d: "Entelektüel elit, New York'taki mevcut inşaat projesini memnuniyetle karşılıyor; proje, ABD’nin demokratik ve liberal ruhunu tamamen yansıtıyor. Sanatçılar, şiir ve besteler yazmak için ilham buluyor."
 gaudi.2213.f: "'Batı kapısının bekçisi, Manhattan Körfezi üzerinde,\nYüzünü saklayan şüphe bulutları temizlendi:\nGözlerin nihayet uzak ve net bakıyor, elini kaldırıyorsun\nÖzgürlük ışığını her ülkeye yaymak için.' -Henry van Dyke"
 gaudi.2213.g: "Belki biraz tanıtım yapabilirler?"
 gaudi.2214.t: "Amerikan mı yoksa Fransız projesi mi?"
 gaudi.2214.d: "Özgürlük Heykeli’nin inşaatı ilerledikçe ve Manhattan açıklarındaki adadaki temel yükseldikçe, bazı politikacılar projenin gerçek olarak hangi ülkenin girişimi olduğunu sorguluyor."
 gaudi.2214.f: "'Bugün buraya, öfkeli ve intikam dolu savaş tanrısının tasvirine boyun eğmek için gelmedik; bunun yerine, Amerika’nın açık kapıları önünde bekleyen kendi tanrımızı sevinçle izliyoruz ve antik şarkılarda kutlanan tüm tanrılardan büyüktür. Elinde ölüm ve korku yıldırımlarını tutmak yerine, insanın özgürleşme yolunu aydınlatan ışığı yukarı kaldırıyor. Özgürlüğün burada evini bulduğunu unutmayacağız, seçilmiş sunak ihmal edilmeyecek. İstekli inananlar ateşini sürekli canlı tutacak ve bu ışık kardeş Cumhuriyetimizin kıyılarına yansıyacak, karşılık veren ışınlarla birleşerek cehaletin ve insan baskısının karanlığını delecek; Özgürlük dünyayı aydınlatana kadar.' -Groover Cleveland"
 gaudi.2214.g: "Bu bir Amerikan projesidir."
 gaudi.2214.h: "Bu bir Franco-Amerikan projesidir."
 gaudi.2214.i: "Bu bir Fransız projesidir."
 gaudi.2215.t: "Kaliteli Çelik"
 gaudi.2215.d: "New York yakınlarındaki çelik fabrikalarından gelen çelik, Özgürlük Heykeli inşasında o kadar yüksek kalite gösterdi ki, bu sadece işin verimliliğini artırmakla kalmadı, aynı zamanda fabrikadan diğer müşteriler için daha fazla çelik talebini artırdı."
 gaudi.2215.f: "'Özgürlük Heykeli’ni gördüm. Ve kendime dedim ki: Hanımefendi, ne kadar güzelsin! Kollarını açtın ve tüm yabancılar buraya geliyor. Bana kendimi kanıtlamam, bir şeyler yapmam, Amerika’da biri olmam için bir şans ver. Ve hep o heykel aklımdan çıkmadı.'"
 gaudi.2215.g: "Amerikan çeliği en iyi çeliktir."
 gaudi.2216.t: "Hükümet Partisi Lady Liberty’i Destekliyor"
 gaudi.2216.d: "[SCOPE.sCharacter('gaudi_liberty_leader').GetFullName], Özgürlük Heykeli’nin ateşli bir destekçisi olarak bilinir. Proje için çevresindeki birçok önemli kişiyi ikna etmeyi başardı ve bağış topladı."
 gaudi.2216.f: "Bartholdi, altın yaprak kaplı meşalenin balkonuna spot lambalar yerleştirmeyi planlamıştı. Adak töreninden bir hafta önce, Ordu Mühendisler Birliği, geçip giden gemilerde pilotları kör edeceği endişesiyle öneriyi reddetti. Bunun yerine, Bartholdi meşaleye pencereler açtırdı ve farları içine yerleştirdi."
 gaudi.2216.g: "Başka bir bağış isteyin."
 gaudi.2216.h: "Halk önünde onu övün!"
 gaudi.2217.t: "İnşaat alanında kaza"
 gaudi.2217.d: "Özgürlük Heykeli inşaat alanında meydana gelen bir kazada, birkaç kişi yaralandı ve bir kısmı tahrip oldu."
 gaudi.2217.f: "'New York Limanı’nda Özgürlük adını verdiğiniz devasa bir put kurdunuz. Bu anıtı tamamlamak için geriye tek şey kaldı: Pedestala Dante’nin cehennem kapısına yazdığı yazıyı koymak: Giriş yapan herkes umudunu yitirsin.' -George Bernard Shaw"
 gaudi.2217.g: "Amerikan çeliği en iyi çeliktir - sanmıştım..."
 gaudi.2218.t: "Özgürlük ne kadar maliyetli?"
 gaudi.2218.d: "[SCOPE.sCharacter('gaudi_opposition_leader').GetFullName], Özgürlük Heykeli inşaatının kararlı bir eleştirmeni olarak kabul edilir. Toplanacak para, çok daha iyi projelere yatırım yapılabilirdi."
 gaudi.2218.f: "Amerikan komitesi bağış toplamakta büyük zorluklarla karşılaştı. Özgürlük Heykeli, finansman eksikliğinden etkilenen tek proje değildi; Örneğin Washington Anıtı’nda çalışmalar, birçok kesintiyle üç buçuk on yıl sürdü. Bartholdi’nin heykeli ve Amerikalıların bu armağan için kaidenin maliyetini ödemek zorunda olması eleştirildi. Ayrıca, kamusal sanat eserlerinin Amerikalılar tarafından tasarlanması gerektiği görüşü hakimdi. Harper's Weekly dergisi, Bartholdi’nin hem heykeli hem de kaidesini bağışlayabileceğini belirtti ve New York Times şöyle yazdı: 'Gerçek bir vatansever, mevcut mali durumumuzda bronz kadınlar için yapılan masrafları sayamaz.'"
 gaudi.2218.g: "Ama bu proje çok önemli!"
 gaudi.2218.h: "Belki daha önemli şeyler vardır..."
 gaudi.2301.t: "Londra’da Yaraların İyileşmesi"
 gaudi.2301.d: "Eski Westminster Sarayı’nın yanmasının ardından Londralılar hâlâ şokta. Yangın, bir zamanlar Britanya’nın siyasi kalbinin attığı Thames kıyılarında bir yara bıraktı. Bu yarayı nihayet kapatmak için inşaat çalışmaları, ciddi bir törenle başladı."
 gaudi.2301.f: "Yangından hemen sonra Kral IV. William, neredeyse tamamlanmış Buckingham Sarayı’nı Parlamento’ya teklif etti; hoşlanmadığı bir ikameti elden çıkarmak umudundaydı. Ancak bina parlamento kullanımına uygun görülmedi ve teklif reddedildi. Neoklasik tasarım savunuculuğu popülerdi. Decimus Burton, yeni neoklasik Parlamento Binası için bir tasarım yarattı. Neo-gotik tarzın aksine, St. Paul Katedrali’ni inşa edenler takdir edildi; övülen bir gelecek için Roma mimarisinin daha güzel ve evrensel tarzında bir tasarım sunuldu. Gotik konusunda uzman Augustus W. N. Pugin, tasarımlarını diğer mimarlar James Gillespie Graham ve Charles Barry aracılığıyla sunmak zorunda kaldı; çünkü yakın zamanda açıkça ve coşkuyla Katolikliğe geçmişti. Pugin’in Barry aracılığıyla sunduğu Parlamento tasarımı yarışmayı kazandı."
 gaudi.2301.g: "Ve umuyordum ki politikacıları sokakta yaşatabilirdik."
 gaudi.2302.t: "Odalar tamamlandı"
 gaudi.2302.d: "Lordlar Odası ve Avam Kamarası’nın tamamlanmasıyla, Parlamento yeni Westminster Sarayı’nda olağan işleyişine devam edebilir. Ancak binanın tamamen bitmesi yıllar sürecek."
 gaudi.2302.f: "Lordlar Odası 1847’de, Avam Kamarası 1852’de tamamlandı (bu tarihte Barry şeref nişanı aldı). Çoğu iş 1860’ta Charles Barry öldüğünde yapılmış olmasına rağmen, inşaat on yıl sonra, oğlu Edward Middleton Barry gözetiminde tamamlandı."
 gaudi.2302.g: "Kayda değer ilerleme kaydediyoruz, değil mi?"
 gaudi.2303.t: "Big Ben"
 gaudi.2303.d: "İkinci inşaat aşamasında, parlamento binasının iç dekorasyonu ve saat kulesindeki dev çanların kurulumu beklemektedir."
 gaudi.2303.f: "Prens Albert başkanlığındaki Kraliyet Güzel Sanatlar Komisyonu denetiminde, Sir Robert Peel’i de içeren bir Seçici Komite, 1841’de uzmanlardan tanık hesaplarını almaya başladı. Bu uzmanlar arasında Sir Martin Archer Shee, P.R.A. ve sanat tarihi konusunda yetkili ressam Charles Lock Eastlake vardı; Eastlake kısa süre sonra Ulusal Galeri’nin ilk müdürü ve Westminster dekorasyon projesinin fiili yöneticisi olacaktı. Fırsatın, ulusal bir İngiliz Tarih Resim Okulu’nun gelişimini teşvik etmek için değerlendirilmesine ve resimlerin fresko olarak yapılmasına karar verildi."
 gaudi.2303.g: "Bütün bu yaygara, basit bir saat kulesi için mi?"
 gaudi.2304.t: "Westminster Sarayı restore edildi"
 gaudi.2304.d: "Yeni Britanya Parlamentosu gururla Thames kıyılarının üzerinde yükseliyor ve şehrin siluetini şekillendiriyor. Saat kulesinin çanlarının çalması, Londra yaşamının belirleyici bir özelliği haline geldi ve sakinlerle saat saat eşlik ediyor. Bina şimdiden tüm ülke için bir simge haline geldi."
 gaudi.2304.f: "'Sıradaki Soru Zamanı’nda, bana hizmetin çok büyük olduğunu mu söylememi istiyorsunuz, Bakan?'\n'Ama bu doğru, Bakanım.'\n'Gerçeği istemiyorum! Parlamentoya söyleyebileceğim bir şey istiyorum! Humphrey, sen benim daimi sekreterimsin, politikalarımı yürütmen gerek. Ama hâlâ neden onlara karşı durduğunu anlamıyorum. Tüm bunlarda ne tarafta olduğunu bilmeliyim.'\n'Nerede durulduğu, Bakanım, nerede oturduğuna bağlıdır.'"
 gaudi.2304.g: "Ding-dong ding-dong, ding-dong ding-dong."
 gaudi.2309.t: "Londra kaybedildi!"
 gaudi.2309.d: "Londra’nın kaybıyla, Westminster Sarayı’nı inşa etmeye devam etme fırsatını tamamen kaybettik."
 gaudi.2309.f: "Londra herhangi bir nedenle kaybedilirse, inşaat ilerlemesi #R tamamen kaybolacak#!. Sadece Büyük Britanya Westminster Sarayı’nı inşa etmeye devam edebilir. Yabancı işgalciler inşaatla ilgilenmeyecek."
 gaudi.2309.g: "Londra’yı uzun süre onlara bırakamayız!"
 gaudi_ben_decoration_modifier: "Westminster Sarayı Dekorasyonları"
 gaudi_praised_by_parliament_modifier: "Parlamento Tarafından Övüldü"
 gaudi_ben_decoration_tt: "Westminster Sarayı tamamlandığında daha prestijli olacak."
 gaudi.2311.t: "Kötü Kireçtaşı"
 gaudi.2311.d: "Westminster Sarayı için yapılan son malzeme teslimatı kalitesiz çıktı."
 gaudi.2311.f: "Bir an için, her gün yükselen Parlamento inşaatındaki olağan hareket durdu. Mimarın kısa bir envanter incelemesi, kireç taşının olağan kalitede olmadığını ortaya koydu ve proje tehlikeye girmeden önce beklemeyi tercih edeceğini açıkladı. Ancak inşaat yönetiminde, kireç taşının yine de kullanılmasını savunan sesler var."
 gaudi.2311.g: "Britanya’nın kaliteli işçiliğini önemsiyoruz."
 gaudi.2311.h: "Takvimimize uymamız gerekiyor!"
 gaudi.2312.t: "Felaket!"
 gaudi.2312.f: "Belki mimarın sözlerine kulak verilmeliydi. Belki Westminster Sarayı gibi önemli bir anıt için yıkılmaya yüz tutmuş kireç taşı kullanmak iyi bir fikir değildi. Bu nedenle, bu karar iki kez düşünülmeliydi. Ama artık çok geç - standart altı malzeme bugün bedelini ödedi ve bir duvarın çökmesi, son birkaç hafta ve ayın inşaat ilerlemesinin büyük bir kısmını yok etti."
 gaudi.2313.t: "Yeni bir makine"
 gaudi.2313.d: "Ülkemizin motor sanayisi, Westminster Sarayı inşaat sahasını son derece modern bir makineyle donattı ve çalışmalar hız kazandı."
 gaudi.2313.f: "'Lokomotiflerimiz olması güzel!'"
 gaudi.2313.g: "Bu bir ilerleme!"
 gaudi.2314.t: "Westminster Sarayı: İyi ilerleme"
 gaudi.2314.d: "Parlamento inşaatı şaşırtıcı şekilde hızlı ilerliyor. Mevcut duruma göre, inşaat daha erken tamamlanabilir."
 gaudi.2314.f: "Bilinen nedenlerle Westminster Sarayı’nın inşaatı daha iyi ilerliyor: vatan sevgisi, yüksek maaşlar, yerel seçkinlerin dostane desteği veya sadece daha iyi hava şartları olabilir."
 gaudi.2314.g: "Harika."
 gaudi.2315.t: "Westminster Sarayı: Yavaş ilerleme"
 gaudi.2315.d: "Ne yazık ki Londra inşaat yönetimi bugün kabul etmek zorunda kaldı ki Parlamento inşaatı programın gerisinde ve beklenenden daha uzun sürüyor."
 gaudi.2315.f: "Bilinmeyen nedenlerle Westminster Sarayı inşaatı daha yavaş ilerliyor: düşmanca siyasi unsurların kışkırtması, sendikalar tarafından iş ahlakının zayıflatılması, Cizvit komplosu veya sadece kötü hava koşulları olabilir."
 gaudi.2315.g: "Üzücü."
 gaudi.2316.t: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] bir ziyaret yapıyor"
 gaudi.2316.d: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName], Westminster Sarayı inşaat sahasını şahsen ziyaret etmeye karar verdi."
 gaudi.2316.f: "Monarşimiz [SCOPE.sCharacter('gaudi_ruler').GetFullName], Londra inşaat sahasında olan bitene geçmişte büyük ilgi göstermişti ve şimdi sahayı ziyaret etmeyi planlıyor. Hazırlıklar tüm hızıyla devam ediyor - ve tabii ki Majestelerine bir şey sunmak istiyorlar! Basit işçiler, inşaat yönetimi ve başmimar, duyurudan sonra daha önce bilinmeyen bir motivasyon hızı belirlediler."
 gaudi.2316.g: "Majesteleri motivasyonu biliyor."
 gaudi.2317.t: "Fırtınalı hava"
 gaudi.2317.d: "Bir fırtına Londra’daki inşaat çalışmalarımızı haftalarca geriye attı."
 gaudi.2317.f: "Dün gece Londra’ya bir gök gürültülü fırtına vurdu. Rüzgar branda ve iskeleleri uçurdu, pencerelere, heykellere ve çatıya zarar verdi."
 gaudi.2317.g: "Bir kuyruklu yıldız tercih ederdim."
 gaudi.2318.t: "Westminster Sarayı Dekorasyonları"
 gaudi.2318.d: "Yeni parlamento binasının ne kadar donatılması gerektiği konusunda siyaset ve inşaat yönetiminde yoğun bir tartışma var. Bir iç mimar, Westminster Sarayı’nı süslemek için zengin dekor önermiş, ancak bunun binanın tamamlanmasını önemli ölçüde etkileyebileceği endişeleri var."
 gaudi.2318.f: "1834’te Westminster Sarayı’nın yangınla yıkılmasının ardından Augustus Pugin, Sir Charles Barry tarafından mimari yarışmaya katılım tasarımı için görevlendirildi. Komisyon daha sonra Pugin’i, yeni sarayın iç mekanının inşasında yardımcı olarak atadı ve tasarımda Pugin en yetkili kişi oldu. Pugin’in hayatının sonunda, Şubat 1852’de, Barry onu Ramsgate’de ziyaret etti ve ikonik saray saat kulesi için ayrıntılı bir tasarım sağladı. Tasarım, Pugin’in daha önceki tasarımlarına çok yakındı, Scarisbrick Hall, Lancashire için inşa edilmemiş bir proje dahil. Kule, Pugin’in deliliğe düşmeden önceki son tasarımıydı."
 gaudi.2318.g: "Daha uzun sürebilir, ama Britanya Parlamentosu mümkün olduğunca görkemli olmalı."
 gaudi.2318.h: "Sırada ne var? Altın varaklı sandalye kılıfları mı?"
 gaudi.2319.t: "Yeni Parlamento için Destek"
 gaudi.2319.d: "[SCOPE.sCharacter('gaudi_ben_leader').GetFullName], gösterişli Yeni Westminster Sarayı inşaatının tutkulu bir destekçisi olarak bilinir. Çevresinde projeyi destekleyecek birkaç önemli kişiyi kazanmayı ve ek bağış toplamayı başardı."
 gaudi.2319.f: "Yeni sarayın inşaatı 1840’ta başladı. Barry inşaat süresini altı yıl olarak tahmin ederken, maliyetin @money! 724,986 olacağı öngörülüyordu; proje ise gerçekte 30 yılı aşkın sürdü ve maliyeti @money! 2 milyonu aştı."
 gaudi.2319.g: "Başka bir bağış isteyin."
 gaudi.2319.h: "Kamuoyunda onu övün!"
