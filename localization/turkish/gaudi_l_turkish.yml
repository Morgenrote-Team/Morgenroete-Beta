 je_gaudi_palacio_phase_1: "Meksika Kültürünün Kalbi"
 je_gaudi_palacio_phase_1_reason: "Palacio de Bellas Artes (İngilizce: Fine Arts Sarayı), Meksika'nın en önemli kültürel kurumudur. Bu anıtsal yapı, tiyatro, dans, müzik ve opera, görsel sanatlar, edebiyat ve mimariye adanmış Meksika'nın en yüksek ve en önemli kültürel binası olarak kabul edilir. Binanın inşaatı 1 Ekim 1904’te başladı. Amaç, daha önce tahrip edilmiş olan Ulusal Tiyatro’nun yerine geçmekti; bu tiyatro, sömürgecilik kalıntısı olarak görülüyordu."
