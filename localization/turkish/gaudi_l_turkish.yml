 je_gaudi_construction_sector_project_reason: "Your [concept_tesla_civil_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] started a project to modernize the [JournalEntry.GetTarget.GetBuilding.GetName] in [JournalEntry.GetTarget.GetBuilding.GetState.GetName]\n$mr_divider_for_je$\nThe project will get progress every month. Every time the progress reaches [JournalEntry.GetTotalGoalValue|V0] the building will receive a new modifier.\nThere is a total number of 3 modifiers to gain:\n- $gaudi_new_construction_methods_modifier_with_tooltip$\n- $gaudi_faster_construction_methods_modifier_with_tooltip$\n- $gaudi_efficient_construction_methods_modifier_with_tooltip$\n\nEach new modifier needs the progress to fill up again.\n$mr_divider_for_je$\nCurrent monthly progress: #underline #tooltip:[GetRawTextTooltipTag('gaudi_monthly_civil_research_progress_tt')] [GetPlayer.MakeScope.GetVariable('gaudi_monthly_civil_engineering_progress_var').GetValue|2+] #!#!"
