 je_gaudi_public_construction_reason: "[ROOT.GetCountry.GetCustom('je_gaudi_public_construction_active_type')]Başka bir projeyle meşgul olmayan bir [concept_gaudi_architect], kamu inşaatı üzerinde çalışacak ve ek serbest #V İnşaat Puanı#! sağlayacaktır.\nBaşka bir proje aktif olmadığı sürece, Modifikatörü kazanırsınız. Ayrıca, Mimarınız her yıl #V Şöhret#! kazanır.\n\n#V $gaudi_art_deco_style$#!, #V $gaudi_bauhaus_style$#! veya #V $gaudi_neoclassical_style$#! özelliğine sahip bir Mimar, kamu inşaatı dağıtırken ülkenize #p +30#! $country_construction_add$ sağlar.\n#V $gaudi_historicism_style$#! özelliğine sahip bir Mimar, kamu inşaatı dağıtırken ülkenize #p +20#! $country_construction_add$ sağlar.\n#V $gaudi_traditional_style$#! özelliğine sahip bir Mimar, kamu inşaatı dağıtırken ülkenize #p +10#! $country_construction_add$ sağlar.\n\nAyrıca, #V $gaudi_great_architect$#! özelliğine sahip bir Mimar, kamu inşaatı dağıtırken ülkenize #p +20#! $country_construction_add$ sağlar."
