 gaudi.73.t: "Jerónimos’un Geçmişi ve Geleceği"
 gaudi.73.d: "Lizbon’daki Hieronymus Manastırı, Manueline mimari tarzının başlıca örneklerinden biri olarak kabul edilir ve Portekiz’in en görkemli dönemlerinden birini hatırlatır. Ancak son on yıllarda binanın ihmal edilmesi, şimdi harap bir hale gelmesine yol açmıştır."
 gaudi.73.f: "Belém’deki Mosteiro dos Jerónimos, 16. yüzyılda inşa edilmiş Portekiz’in en ikonik geç Gotik-Manueline binalarından biridir. Yüzyıllar boyunca hava koşulları ve ihmalin ardından, 19. yüzyılın ikinci yarısında ulusal anıtlara artan ilgi ortaya çıkmıştır. Restorasyon çalışmaları, 1860’lar ve 1880’lerde, Portekiz’in imparatorluk geçmişini kültürel gurur kaynağı olarak yükseltmek isteyen Romantik dönemi tarihçi ve mimarları tarafından ciddi şekilde başlatılmıştır."
 gaudi.73.g: "Bazı küçük onarımlar gerekli."
 gaudi.73.h: "Tarihî ihtişamını tamamen restore et!"
 gaudi.73.i: "Devlet hazinesini doldurmak için en değerli eşyaları sat."
