 pmg_gaudi_magnetic_observatory: "Jeomanyetik Gözlemevi"
 pm_gaudi_no_magnetic_observatory: "Jeomanyetik Gözlemevi yok"
 pm_gaudi_magnetic_observatory: "Jeomanyetik Gözlemevi"
 je_gaudi_magnetic_observation: "Jeomanyetik Gözlem"
 je_gaudi_magnetic_observation_reason: "Carl Friedrich Gauß, 1832 yılında Göttingen’de ilk jeofizik gözlemevini kurdu ve bunun için hassas bir manyetometre geliştirdi. Küresel olarak dağıtılmış ölçümlerin aynı zamanda yapılması gerektiğini fark etti, böylece sapmaların nedenlerini belirleyip statik alanı daha doğru ölçebilecekti. 1836’dan itibaren, bu amaçla kurulan Manyetik Dernek ve İngiliz Kraliyet Cemiyeti, Gauß ve Wilhelm Weber’in değerlendirdiği verileri sağladı. Amaç, dünyanın farklı bölgelerine yayılmış çok sayıda ölçüm istasyonu kullanarak manyetik alan sapmalarını koordineli şekilde ölçmekti. Bu projeye 50’ye kadar gözlemevi katıldı; bunların 35’i Avrupa’da, altısı Asya’da, ikisi Afrika’da, üçü Kuzey Amerika’da ve dördü Okyanusya’da bulunuyordu. Sonuçlar Göttingen’e iletildi ve Gauß ile Weber tarafından bilimsel olarak işlendi."
 je_gaudi_magnetic_observation_goal: "#G 100#! @gaudi_magnetic_data! #O Manyetik Veri#! toplayın. Bu uluslararası bir çabadır, Manyetik Dernek’in her üyesi katkıda bulunacaktır."
 tesla_set_magnetic_association_tt: "Manyetik Derneği’ni kurun. Diğer ülkeler katılabilir ve #O Jeomanyetik Gözlemevleri#! inşa ederek @gaudi_magnetic_data! #O Manyetik Veri#! toplayabilir. Bu veriler daha sonra Göttingen’e gönderilir."
 tesla_add_magnetic_association_member_tt: "Manyetik Dernek’e katılın. Üyeler @gaudi_magnetic_data! #O Manyetik Veri#!’yi Göttingen’e gönderecek ve bilimsel sonuçlardan faydalanacak."
 tesla_add_x_magnetic_data_minus_x_tt: "[SCOPE.GetValue('magnetic_data_amount')|0+] @gaudi_magnetic_data! #O Manyetik Veri#! kaybedin."
 tesla_add_x_magnetic_data_minus_1_tt: "[SCOPE.GetValue('magnetic_data_amount')|0+] @gaudi_magnetic_data! #O Manyetik Veri#! kaybedin."
 tesla_add_x_magnetic_data_0_tt: "Hiç @gaudi_magnetic_data! #O Manyetik Veri#! kazanılmaz."
 tesla_add_x_magnetic_data_plus_1_tt: "[SCOPE.GetValue('magnetic_data_amount')|0+] @gaudi_magnetic_data! #O Manyetik Veri#! kazanın."
 tesla_add_x_magnetic_data_plus_x_tt: "[SCOPE.GetValue('magnetic_data_amount')|0+] @gaudi_magnetic_data! #O Manyetik Veri#! kazanın."
 gaudi_geomagnetical_knowledge_modifier: "Jeomanyetik Bilgi"
 gaudi.1401.t: "Manyetik Dernek’e yeni üye"
 gaudi.1401.d: "[GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] bugün Göttingen’de Manyetik Dernek’e katıldı. Diğer üyeler onu sıcak bir şekilde karşıladı."
 gaudi.1401.f: "Katılarak, Dr. [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName] işlevsel bir jeomanyetik gözlemevi inşa etmek için gerekli bilgileri elde edebildi. Başkan, mühendisimize böyle bir istasyonun planlarını ve bir manyetometre verdi. Tüm dernek inşaatın hızla başlaması ve ilk verilerin Göttingen’e gönderilmesi için çaba gösterdi."
 gaudi.1401.g: "Hemen bir ölçüm istasyonu kurmalıyız."
 gaudi.1402.t: "Jeomanyetik Gözlemevi tamamlandı"
 gaudi.1402.d: "Jeomanyetik Gözlemevi inşaatı bugün tamamlandı. Son aylarda çok sayıda veri toplandı ve Göttingen’e iletildi."
 gaudi.1402.f: "Elde edilen ölçüm verileri yalnızca yerin manyetik alanının bilimsel araştırması için değil, aynı zamanda pratik amaçlar için de kullanılmaktadır. Deklinasyon haritaları geçmişte ve günümüzde denizcilik ve havacılıkta navigasyon için kullanılmaktadır. Cevher ve petrol gibi ham maddelerin aranmasında jeomanyetik ölçüm verileri önemlidir."
 gaudi.1402.g: "Jeomanyetik bilim için!"
 gaudi.1403.t: "Uluslararası Manyetik Veri Toplama"
 gaudi.1403.d: "Dünyanın dört bir yanından jeomanyetik veri toplandıktan ve karşılaştırıldıktan sonra Göttingen’deki araştırmacılar ilginç bir sonuca ulaşabildi."
 gaudi.1403.f: "1839 yılında, Gauss Dünya’nın statik manyetik alanının çoğunun iç kaynaklı olduğunu, kısa süreli küçük değişimlerin ise dış kaynaklı olduğunu gösterebildi. Weber ile birlikte sonuçları 'Manyetik Dernek Gözlemlerinin Sonuçları' başlığı altında altı cilt halinde yayımladı. Haritalar, o dönemde tüm yerler için geçerli manyetik verileri gösteren ek bir ciltte yayımlandı. Çizgiler aynı deklinasyon, aynı eğim ve aynı alan gücüne sahip noktaları bağladı. Bu yayın, doğa bilimleri tarihinde bir dönüm noktası temsil etti."
 gaudi.1403.g: "Etkileyici bir başarı."
 gaudi.1404.t: "Denizcilik İlgi"
 gaudi.1404.d: "[SCOPE.sCharacter('gaudi_admiral_scope').GetFullName], [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName]’in jeomanyetik araştırmalarına büyük ilgi gösterdi. İnşaatı süren Jeomanyetik Gözlemevi’nde başarılı bir deney gerçekleştirdi."
 gaudi.1404.f: "'Kurbağa bacaklarıyla ne yapacağım? Oh, özel bir şey yok, tamamen hiçbir şey...'"
 gaudi.1404.g: "Yeni bilgiler onun için faydalı olmalı."
 gaudi.1404.h: "Bu bilgi herkesin faydasına olmalı."
 gaudi.1405.t: "Bir Anormallik"
 gaudi.1405.d: "Yeniden yapılan ölçümlere rağmen, Dr. [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetLastName]’in kaydettiği yerin manyetik alan değerleri beklenenle neredeyse uyuşmuyor. Henüz nedenini bulamadı."
 gaudi.1405.f: "Dünya manyetik alanının bir yerde diğerlerinden farklı olmasının çeşitli sebepleri olabilir. Bu tür olaylar, sahada büyük bir metal yatak olabileceği varsayımına yol açtı, bu yüzden jeomanyetik araştırmalar madencilik açısından ilginçti."
 gaudi.1405.g: "Verileri doğrudan Göttingen’e göndermeliyiz."
 gaudi.1406.t: "Astronom, Jeomanyetik Gözlemevi’ni danıştı"
 gaudi.1406.d: "Dr. [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] ve Dr. [GetPlayer.MakeScope.GetVariable('verrier_astronomer_var').GetCharacter.GetFullName], yeni inşa edilen jeomanyetik gözlemevini gezerek ufuk açıcı konuşmalar yaptılar. Bu etkileşim, [GetPlayer.MakeScope.GetVariable('verrier_astronomer_var').GetCharacter.GetLastName]’ın bilimsel bilgisini büyük ölçüde geliştirdi."
 gaudi.1406.f: "'Demek bu yüzden reçelli ekmek her zaman reçelli tarafı yere düşüyor!'"
 gaudi.1406.g: "Bu, [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetHerHim]’in pratik araştırmalarına yardımcı olacak."
 gaudi.1406.h: "Bu, [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetHerHim]’in teorik araştırmalarına yardımcı olacak."
 pmg_gaudi_communication: "İletişim"
 pm_gaudi_no_communication: "İletişim Yok"
 pm_gaudi_telegraph_office: "Telgraf Ofisi"
 gaudi_building_telegraph_network_modifier: "Ülkeyi Telgrafla Birleştir"
 gaudi_telegraphy_network_modifier: "Ulusal Telgraf Ağı"
 gaudi_mocked_by_telegram_modifier: "Telegram ile Alay Edildi"
 je_gaudi_telegraphy_network: "Bir Telgraf Ağı Kur"
 je_gaudi_telegraphy_network_reason: "In principle, a Telegraph Office can only be built where there is already a railway line, as the telegraph poles run along the route and are of considerable importance in coordinating the train system. It takes around a year to open a new office, with an [concept_tesla_engineer] speeding up the process. Completion is even faster if it is an [concept_tesla_electrical_engineer]. The invention of electromagnetism also has a positive effect on work progress. The invention of electromagnetism is also needed to set up Telegraphy Offices in overseas countries or other exclaves. Otherwise, a Telegraph Office can only be built in a state that borders another Telegraph Office."
 gaudi.1411.t: "Ulusal Telgraf Ağı"
 gaudi.1411.d: "Dr. [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] bugün [GetPlayer.GetName]’i birbirine bağlayacak yeni bir telgraf hattı planını sundu. Bu, insanları her zamankinden daha yakınlaştıracak."
 gaudi.1411.f: "Samuel Morse 1837’de bir kayıtlı elektrik telgrafı geliştirdi ve patentledi. Morse'un asistanı Alfred Vail, alınan mesajları kaydeden bir cihaz geliştirdi; bu cihaz 'register' olarak adlandırıldı. Elektromıknatıs ile çalıştırılan bir stilus ile hareketli bir kağıt şeride noktalar ve çizgiler kabartılıyordu. Morse ve Vail, Morse kodu iletişim alfabesini geliştirdi. ABD’deki ilk telgraf, 11 Ocak 1838’de Morristown, New Jersey yakınlarındaki Speedwell Demir İşleri’nde iki mil (3 km) tel üzerinden gönderildi; ancak mesaj \"WHAT HATH GOD WROUGHT\" 1844 yılında Washington’daki Capitol’den Baltimore’daki eski Mt. Clare Deposu’na 44 mil (71 km) gönderildi."
 gaudi.1411.g: "..-. .. -. ."
 gaudi.1412.t: "Telgraf Ağı durduruldu"
 gaudi.1412.d: "Hükümet telgraf hatlarının genişletilmesine derhal son verilmesini emretti."
 gaudi.1412.f: "Bugün şu emir verildi, bu yüzden tüm çalışmalar bundan sonra durdurulacak:\n\n-.-. --- -. ... - .-. ..- -.-. - .. --- -. / ... - --- .--. --..-- / -. --- .-- -.-.--"
 gaudi.1412.g: "Şimdilik inşaatı bitiriyoruz."
 gaudi.1413.t: "Telgraf Ağı tamamlandı"
 gaudi.1413.d: "Bugün, daha önce ulaşılamayan bir bölgede son telgraf direği törenle dikildi. Ülkemizin her yeri ulusal telgraf ağına bağlandı ve mesajlar ülkenin bir ucundan diğer ucuna gönderiliyor."
 gaudi.1413.f: "Tüm ülkeyi tek bir telgraf ağı ile kaplamak muazzam bir başarıdır. Uluslararası ağa bağlantı, ulusal ve küresel fikir alışverişinin önemli ölçüde teşvik edilmesini sağlayacaktır. Elbette, bu son değil: Eğer ülkemiz henüz kablo çekilmemiş yeni alanlar edinirse, oraya da telgraf ofisleri kurmamız gerekecek. Belki bir gün telgraf hatları kullanmadan mesaj göndermenin bir yolu bulunur..."
 gaudi.1413.g: "..-. .- -. - .- ... - .. -.-."
 gaudi.1414.t: "Üniversiteler Telgraf ile Bağlandı"
 gaudi.1414.d: "[SCOPE.sState('gaudi_university_state_1').GetName] ve [SCOPE.sState('gaudi_university_state_2').GetName] üniversiteleri artık doğrudan bir telgraf hattıyla bağlandı. Bilim insanları bunun artan bilgi alışverişine yol açacağını umuyor."
 gaudi.1414.f: "'Modern bilimin tüm muhteşem başarıları arasında elektrik telgrafı insanlık için en yüce ve en faydalıdır … Tüm dünya elektrik akımıyla kuşatılacak, insan düşünce ve duygularıyla titreyip atacak … O zaman telgraf, dünyanın uygarlığında ne kadar güçlü bir güç olacaktır! Bu, tüm dünya milletlerini hayati bir bağla birleştirir. Tüm milletler arasında düşünce alışverişi için böyle bir araç yaratıldığı sürece, eski önyargı ve düşmanlıkların var olması artık imkânsızdır.' -Augustus Maverick"
 gaudi.1414.g: "Bu teknik araştırmaları güçlendirecek."
 gaudi.1414.h: "Bu doğa araştırmalarını güçlendirecek."
 gaudi.1414.i: "Bu arkeolojik araştırmaları güçlendirecek."
 gaudi.1415.t: "Komşunuza Telgraf"
 gaudi.1415.d: "[SCOPE.sState('gaudi_our_telegraph_state').GetName]’deki telgraf istasyonu, komşu eyalet [SCOPE.sState('gaudi_neigbour_telegraph_state').GetName] ile bağlantı kurdu. Artık komşumuza telgraf gönderebiliyoruz."
 gaudi.1415.f: "Telgraf, uluslararası anlayış ve ilişkilerin iyileştirilmesine katkıda bulunabilir. Ancak bazı telgraflar böyle değildir."
 gaudi.1415.g: "İlişkilerimizi güçlendirmek için dostane bir telgraf gönderin."
 gaudi.1415.h: "Devlet başkanlarını kızdırmak için şaka telgrafı gönderin."
 gaudi.1416.t: "Komşudan Telgraf"
 gaudi.1416.d: "Komşumuz [SCOPE.sCountry('gaudi_telegram_country').GetName], komşu bir eyalette telgraf hattı kurdu ve bize dostane bir mesaj gönderdi."
 gaudi.1416.f: "'İyi komşulara.'"
 gaudi.1416.g: "Bir telgraf mı? Bana mı? Biz de bir tane göndermeliyiz!"
 gaudi.1417.d: "[SCOPE.sCountry('gaudi_telegram_country').GetName]’den gelen ilk resmi telgraf bugün gönderildi. Görünüşe göre bizi alaya almak istiyorlar!"
 gaudi.1417.f: "'[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName]’in pireleri var.'"
 gaudi.1417.g: "Bu bir şaka telgrafı mı demek?"
 gaudi_building_radio_network_modifier: "Herkes için Radyo İstasyonları"
 gaudi_radio_network_modifier: "Radyo İstasyonu Ağı"
 je_gaudi_radio_network: "Bir Radyo İstasyonu Ağı Kur"
 je_gaudi_radio_network_reason: "Radio stations can be set up anywhere in the country, provided there is already a railway there - it is not necessary to set up a telegraphy network beforehand. It takes around a year to build a new radio station, with an [concept_tesla_engineer] speeding up the process. Completion is even faster if it is an [concept_tesla_electrical_engineer]."
 gaudi.1421.t: "Radyo Ağı"
 gaudi.1421.d: "Kablosuz telgrafın icadı mucizeleri mümkün kılıyor. Bundan böyle, doğru teknik ekipman mevcut olduğu sürece, mesajlar herhangi bir yerden başka bir yere iletilebilir, iletim kulelerine ihtiyaç olmadan."
 gaudi.1421.f: "1897’de Karl Ferdinand Braun kablosuz öncüleri arasına katıldı. Onun en önemli katkıları, verici bölümündeki kapalı ayarlı devreyi tanıtması, bunu anten kısmından endüktif bağlama ile ayırması ve daha sonra alım amaçlı kristallerin kullanımıdır. 1898’de kablosuz telgraf Dr. Braun’un tüm ilgisini çekti ve sonraki yıllarda neredeyse tamamen bu problemleri çözmeye odaklandı. Dr. Braun kablosuz konular üzerine kapsamlı yazılar yazdı ve Electrician ve diğer bilimsel dergilerdeki katkılarıyla tanındı. 1899’da \"Sinyallerin Yüzeyler Üzerinden Kablosuz Elektro İletimi\" için patent başvurusu yaptı."
 gaudi.1421.g: "Her yerde bir anten!"
 gaudi.1422.t: "Radyo Ağı durduruldu"
 gaudi.1422.d: "Construction work on new antennas and radio stations has been interrupted for the time being. They can be continued at any time with an [concept_tesla_electrical_engineer]."
 gaudi.1422.f: "'Dünyaya iyilik mi yaptım, yoksa bir tehlike mi ekledim?' -Guglielmo Marconi"
 gaudi.1422.g: "Şimdilik inşaatı bitiriyoruz."
 gaudi.1423.t: "Radyo Ağı tamamlandı"
 gaudi.1423.d: "[GetPlayer.GetName]’in fizikçileri ve mühendisleri, tüm ülkeyi – kablosuz olarak – kapsadıklarını gururla duyuruyor!"
 gaudi.1423.f: "'Başlıca sorunum, fikrin o kadar temel ve mantıksal olarak basit olmasıydı ki, başkasının bunu uygulamaya koymayı düşünmemiş olması inanılmaz görünüyordu.' -Guglielmo Marconi"
 gaudi.1423.g: "Radyoyu Dinle!"
 gaudi.1424.t: "İlk Radyo Programı"
 gaudi.1424.d: "[SCOPE.sState('gaudi_radio_state').GetName]’de yayınlanan ilk özel radyo programı, bu yeni medyaya ilgiyi keskin şekilde artırdı. Yakındaki fabrika buna hazırlanıyor ve olası müşteri akınına karşı kendi üretim verimliliğini artırdı."
 gaudi.1424.f: "1909’da dünyanın ilk haber istasyonu 14 watt ile düzenli bir program yayınına başladı. San José, California’daki istasyon, fizikçi Charles 'Doc' Herrold ve Kablosuz ve Mühendislik Koleji öğrencileri tarafından kuruldu. 1921’de bu istasyon, artık ticari bir istasyon olarak, KQW tanımlayıcısını aldı; daha sonra CBS tarafından devralındı."
 gaudi.1424.g: "Her evde bir radyo mı?"
 gaudi.1425.t: "Radyo Propagandası"
 gaudi.1425.d: "Politika ve propaganda teknoloji ile değişiyor. [SCOPE.sCharacter('gaudi_opposition_leader').GetFullName] kendi küçük radyo kanalını açtı; parti destekçileri her gün dinliyor. Önceden siyasallaşmamış insanlar bile programa açık hale geliyor."
 gaudi.1425.f: "'Güüüzel sabahlar sevgili dinleyiciler. Bunlar sabah duyuruları. Futbol takımı seçmeleri Cuma öğleden sonra yapılacak. Tabii ki eğer [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] berbat futbol sahamız için bir şey yaparsa. Bir sorum var. [SCOPE.sCharacter('gaudi_ruler').GetFullName] aslında ne yapıyor? O [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] olması gerekmiyor mu? Gündemi ne? Herkese mi yalan söylüyor? Yoksa doğru mu? Bu soruları soralım. Ayrıca, [SCOPE.sCharacter('gaudi_ruler').GetFullName] için kim oy verdi? Ben vermedim. Ve oy veren herkes şimdi kafasını kaşıyor ve \"Ups, bunu yapmamalıymışım\" diyor. Ben kabinede değilim, sizin gibi normal bir insanım. Ve sizin gibi, ne olduğunu bilmek istiyorum... ülkemde olan biteni.'"
 gaudi.1425.g: "Bu radyo istasyonunu yasaklayın!"
 gaudi.1425.h: "Burası özgür bir ülke, bu yüzden istediğiniz gibi yayın yapabilirsiniz."
 gaudi.1426.t: "Rahatsız Edici Bir Radyo Oyunu"
 gaudi.1426.d: "Radyo şovundaki ilk radyo oyunlarından biri, kurgu hikayenin haber olarak algılanması nedeniyle bilinçsiz dinleyiciler arasında kitlesel paniğe yol açtı."
 gaudi.1426.f: "'Orson Welles burada, karakter dışı, The War of the Worlds’un yalnızca tatil hediyesi olarak anlam taşıdığını garanti etmek için; Mercury Theatre’ın kendi radyo versiyonu ile çarşaf giyip çalılık arasından 'Boo!' diyerek çıkması gibi… Bundan sonra, tüm pencerelerinizi sabunlayıp bahçe kapılarınızı çalamayacağımız için en iyi ikinci şeyi yaptık. Dünyayı gözlerinizin önünde yok ettik ve CBS’i tamamen yok ettik. Öğrenmekten rahatlayacağınızı umuyorum: Amacımız bu değildi ve her iki kurum da hâlâ açık. Hoşçakalın ve lütfen bir sonraki gün veya iki boyunca bu gece öğrendiğiniz korkunç dersi hatırlayın. O gülen, parlayan, küresel istilacı salonda yaşayan bir balkabağı tarlasından gelen bir varlıktır ve kapı zili çaldığında kimse yoksa, bu bir Marslı değildi, Cadılar Bayramı idi.' -Orson Welles"
 gaudi.1426.g: "Uzaylı istilası mı? Ve insanlar buna inandı mı?"
 gaudi.1426.h: "İyi ki hazırdık!"
 gaudi.1420.t: "Transatlantik Kablo"
 gaudi.1420.d: "Newfoundland ve İrlanda’nın iki lokasyonu artık bir transatlantik kablo ile bağlı. Kıtalar arasında ilk mesaj değiş tokuşu gerçekleşti."
 gaudi.1420.f: "'Bu, savaş alanında herhangi bir fatihin kazandığından çok daha görkemli ve insanlık için çok daha yararlı bir zaferdir. Atlantik telgrafı, Cennet’in bereketi altında, akraba uluslar arasında kalıcı bir barış ve dostluk bağı ve İlahi Takdir’in dini, medeniyeti, özgürlüğü ve hukuku dünyaya yaymak için öngördüğü bir araç olmasını dilerim.' -James Buchanan"
 gaudi.1420.g: ".... . .-.. .-.. --- -.-.--"
 gaudi.1430.t: "Transatlantik İletim"
 gaudi.1430.d: "İnsan ilerlemesi için büyük bir başarı: bugün ilk mesaj Atlantik üzerinden kablosuz olarak gönderildi!"
 gaudi.1430.f: "-s-"
 gaudi.1430.g: "Gerçekten işe yarıyor mu? Havadaki mesajlar mı?"
 je_gaudi_transatlantic_cable: "Transatlantik Kablo"
 je_gaudi_transatlantic_cable_reason: "Atlantik’in her iki tarafında bir telgraf istasyonu kurarak, Avrupa ve Amerika’yı birbirine yaklaştıracak bir deniz altı telgraf kablosu döşeme olanağı sağlanır."
 je_gaudi_transatlantic_radio: "Transatlantik İletim"
 je_gaudi_transatlantic_radio_reason: "Sihir gibi geliyor ama en yeni teknolojiyle Atlantik boyunca mesaj göndermek, telgraf kablolarını kullanmaktan çok daha kolaydır. Bu, kabloların tekrar tekrar kırılma sorununu çözerek iletişim aksaklıklarını önler."
