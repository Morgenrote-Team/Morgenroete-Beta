 gaudi.1002.d: "[SCOPE.sCharacter('gaudi_new_architect_scope').GetFullName] Pavellons Güell’in inşasını tamamladı; Modernizm tarzında bir fincanın uzantısıdır ve [SCOPE.sCharacter('gaudi_new_architect_scope').GetLastName] baş temsilcisidir."
 gaudi.1002.f: "Pavellons Güell’in Demir Kapısı, cam gözlü bir demir ejderha ile taçlandırıldı. Tüm yapılar Modernisme tarzında tasarlanmış ve Oryantalist bir tasarıma yönlendirilmiştir.\n\n[SCOPE.sCharacter('gaudi_new_architect_scope').GetLastName], Katalan Modernisme tarzının en önemli temsilcisiydi. Modernisme, Art Nouveau’nun Katalan bir ifadesi olarak görülebilir ve Katalonya’dan gelen geleneksel malzemeler ve tekniklerle karakterizedir. 'Doğallık' ve 'Hareket' Modernisme’yi tanımlayan en önemli kavramlardır. Örneğin Parc Güell’de yuvarlak şekiller ve bitkilerden esinlenen doğal formlar net şekilde görülebilir."
 gaudi.1002.h: "Gaudí’nin önünde parlak bir gelecek var!"
 gaudi_bauhaus_modifier: "Bauhaus Mimarisi"
 gaudi.21.t: "Bir Mühendis Dönüyor"
 gaudi.21.d: "İki yıl yurtdışında kaldıktan sonra, mimarımız yalnızca eskizlerle değil, yeni bir disiplin ile geri dönüyor."
 gaudi.21.f: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] eskizci olarak ayrıldı. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] bir inşaatçı olarak dönüyor.\n\nİki uzun yıl boyunca, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] Avrupa’yı gezdi—Lombardiya vadilerinden, Manchester’daki demirhanelere, Budapeşte köprülerinin altına. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] yalnızca kiliseleri değil, pompa istasyonlarını da inceledi; sadece başlıkları ve süslemeleri değil, kazan dairelerini ve vinç iskelelerini de. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] bir politeknikte derslere katıldı, mühendislerin defterlerini kopyaladı ve Lyon’da bir inşaat sahasında gücün çizilemeyeceğini—anlaşılması gerektiğini öğrendi.\n\n[ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] artık yeni kelimelerle konuşuyor. Taşıyıcı kuvvetlerden, çekme çerçevelerinden ve demirin ruhundan bahsediyor. Eski meslektaşlarından bazıları [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHim]’i neredeyse tanımıyor. Yine de [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] elleri aynı—sadece artık daha sabit. Ve bakışları? Sanki duvarlardan geçiyor."
 gaudi.21.g: "Mimari, şu soruyla başlar: ne tutar?"
