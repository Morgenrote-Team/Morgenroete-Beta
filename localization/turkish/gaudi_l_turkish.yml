 gaudi.1201.t: "Modern Lokomotifler"
 gaudi.1201.t_general: "Western & Atlantic Railroad #3 \"General\""
 gaudi.1201.t_forney: "\"Forney\" 0-4-4T"
 gaudi.1201.t_e6: "E6 Sınıfı \"Atlantic\""
 gaudi.1201.t_m_1000: "M-10000"
 gaudi.1201.t_gg1: "Sınıf GG1"
 gaudi.1201.t_kkstb_30: "kkStB-Reihe 30"
 gaudi.1201.t_fs_class_670: "FS Sınıfı 670"
 gaudi.1201.d: "Finally the Locomotives built by our [concept_tesla_mechanical_engineer][GetPlayer.MakeScope.GetCountry.GetCustom('gaudi_dr_engineer_type')] are finally on the tracks of the [GetPlayer.GetAdjectiveNoFormatting] rail network!. We will surely see new speed records from them!."
 gaudi.1201.f: "\"Bu mühendislik harikasına bakın! Muhteşem değil mi?\""
 gaudi.1201.f_general: "4-4-0 konfigürasyonu zaten harikalarını kanıtladı. \"General\" ve benzerleri Amerika'nın iş atları olacak!"
 gaudi.1201.f_forney: "Forney, küçük boyutu sayesinde şehir demiryollarındaki keskin dönüşleri rahatça alabiliyor, şehir bölgeleri için mükemmel bir lokomotif."
 gaudi.1201.f_e6: "E6 Sınıfı \"Atlantic\", yolculara konforlu bir sürüş sunan hızlı bir buharlı lokomotif. Ana yolcu hatlarında kullanılacak."
 gaudi.1201.f_m_1000: "M-10000, aerodinamik bir gaz-elektrik lokomotifi. Yüksek hızlara ulaşabiliyor ve ekspres hatlar için ideal lokomotif."
 gaudi.1201.f_gg1: "Sınıf GG1, yüksek hızlarda tren çekebilen aerodinamik bir elektrikli lokomotif. Kesinlikle uzun bir kariyere sahip olacak!"
 gaudi.1201.f_kkstb_30: "kkStB-Reihe 30, özellikle buharsız ve dumansız yanma süreci sayesinde harika bir banliyö treni."
 gaudi.1201.f_fs_class_670: "FS Sınıfı 670, lokomotifin normal düzenini tersine çeviren ikonik bir tasarıma sahip. Kabin lokomotifin önünde yer alıyor ve makiniste mükemmel bir görüş sağlıyor."
 gaudi.1201.g: "Bir mühendislik harikası!"
 je_gaudi_modernizing_industries_project: "Üretim Yöntemlerini Modernize Etme"
 gaudi_engineer_focus_building: "Mühendislik Odak Noktası"
 gaudi.1211.f: "\"Görüyorsunuz, bu yeni makine sayesinde üç işçiye daha ihtiyaç duymuyorum. Şimdi onlar diğer üç benzer makinede çalışabilir ve her şey çok daha kârlı olacak. Yeni bir yat alabilecek durumdayım!\""
 gaudi.1211.g: "Kârımız tavan yapacak!"
