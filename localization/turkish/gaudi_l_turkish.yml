 gaudi.16.f: "'Süsleme boşa harcanan iş ve dolayısıyla boşa harcanan sağlıktır. Bugün ayrıca boşa harcanan malzeme anlamına gelir ve her ikisi de boşa harcanan sermaye demektir. Modern insan, modern sinirlere sahip insan, süslemeye ihtiyaç duymaz; ondan nefret eder.' -Adolf Loos"
