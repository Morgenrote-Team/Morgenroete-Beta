 gaudi_gyeong_rooms_tt: "Gyeongbokgung tamamlandığında daha prestijli olacak."
 gaudi.901.t: "Gyeongbokgung Sarayı’nın İnşaatı Başlıyor"
 gaudi.901.d: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName], eski kraliyet konutunu yeniden inşa etme emrini verdi. Birkaç yıl içinde eski ihtişamıyla parlayacak."
 gaudi.901.f: "Saray iki buçuk yüzyıl boyunca harabe halinde kaldı. [SCOPE.sCharacter('gaudi_ruler').GetFullName], 40 hektar alanda 500 binayı ve 7.700 odayı restore etmek istiyor. Bu devasa mimari proje, sadece birkaç yıl içinde tamamlanması bekleniyor."
 gaudi.901.g: "Böylesine bir saray yalnızca bizim [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]’mıza yakışır!"
 gaudi.902.t: "Gyeongbokgung Sarayı Tamamlandı"
 gaudi.902.d: "Yıllar sonra, Gyeongbokgung nihayet tamamlandı. Başkent üzerinde bir mücevher gibi parlıyor. Nihayet ülkemiz, Kore’nin gücünü ve zenginliğini yansıtan bir saraya yeniden sahip."
 gaudi.902.f: "1867’de Daewongun’un vekâleti sırasında saray binaları yeniden inşa edildi ve 330 bina ve 5.792 odadan oluşan devasa bir kompleks oluşturuldu. 4.657.576 fit² (432.703 m²) arazi üzerine kurulan Gyeongbokgung, tekrar hem Kore ulusu hem de Kore kraliyet ailesi için simgesel bir sembol oldu. 1894’te Japonlar sarayı işgal etti ve Gojong’u Japon yanlısı bir hükümet kurmaya zorladı. Ulusal egemenliğin sembolü olması nedeniyle, Gyeongbokgung 20. yüzyılın başlarında Japon işgali sırasında ciddi şekilde zarar gördü. 1911’de saray arazisinin mülkiyeti Japon Genel Valisi’ne devredildi. 1915’te sergi düzenleme bahanesiyle, binaların %90’ından fazlası yıkıldı. Sergiden sonra Japonlar kalanları da düzeltti ve koloniyel karargâhlarını, Genel Hükümet Binası’nı, bu alana inşa etti."
 gaudi.902.g: "Kore’nin ihtişamı geri döndü!"
 gaudi.909.t: "Seul Kaybedildi!"
 gaudi.909.d: "Seul’ün kaybıyla birlikte Gyeongbokgung Sarayı’nın inşaatını sürdürme fırsatımızı kaybettik."
 gaudi.909.f: "Herhangi bir nedenle Seul kaybedilirse, inşaat ilerlemesi #R tamamen kaybedilecek#!. Gyeongbokgung Sarayı’nı yalnızca Seul’de inşa edebilirsiniz. Yabancı işgalciler bunu inşa etmekle ilgilenmeyecek."
 gaudi.909.g: "Seul’ü onlara uzun süre bırakamayız!"
 gaudi.911.t: "İnşaat İlerlemesi Yavaş"
 gaudi.911.d: "Kraliyet konutundaki inşaat çalışmaları yavaş ilerliyor. Baş mimarın hesaplamalarına göre, mevcut ilerleme aylardır planın gerisinde."
 gaudi.911.f: "Bilinmeyen nedenlerden ötürü, Gyeongbokgung inşaatı yavaş ilerliyor: düşman siyasi unsurların kışkırtması, sendikalar tarafından iş ahlakının baltalanması, Illuminati komplosu veya sadece kötü hava şartları olabilir."
 gaudi.911.g: "Çalışma saatlerini uzatın."
 gaudi.911.h: "İşçilere prim ödeyin."
 gaudi.911.i: "Bekleyelim."
 gaudi.912.t: "İyi İnşaat İlerlemesi"
 gaudi.912.d: "Gyeongbokgung’in inşaatı şaşırtıcı şekilde hızlı ilerliyor. Baş mimara göre saray daha erken tamamlanabilir."
 gaudi.912.f: "Bilinmeyen nedenlerden ötürü, Gyeongbokgung inşaatı daha iyi ilerliyor: vatan sevgisi, yüksek maaşlar, yerel elitlerin dostane desteği veya sadece daha iyi hava olabilir."
 gaudi.912.g: "Harika."
 gaudi.913.t: "Yangın!"
 gaudi.913.d: "Başkent üzerinde duman bulutları yükseliyor ve kilometrelerce görünür - Kore’nin en büyük inşaat sahasında yangın çıktı!"
 gaudi.913.f: "Yangının nedeni henüz netleşmedi, ancak dikkatsizlik ve kötü yangın söndürme organizasyonu nedeniyle yangın birçok bina ve odaya yayıldı. Özellikle hassas ahşap yapılar alevler tarafından yok edildi. İnşaat projesi haftalarca ve aylarca geri gitti!"
 gaudi.913.g: "Korkunç!"
 gaudi.914.t: "Daha Fazla Oda"
 gaudi.914.d: "İnşaat çalışmaları sırasında, baş mimar alanın daha dikkatli kullanımı için yeni planlar açıkladı. Ek binalar ve odalar mümkün olabilecekti. Ancak bu ek maliyet ve önemli gecikme demekti."
 gaudi.914.f: "'Sadece 5.000 oda mı? Haydi 7.000 yapalım!'"
 gaudi.914.g: "Monark ve ailesi için daha fazla alana ihtiyacımız var."
 gaudi.914.h: "Bu bir gösteriş!"
 gaudi.915.t: "Etkilenmiş bir ziyaretçi"
 gaudi.915.d: "Son birkaç gün içinde [SCOPE.sCharacter('gaudi_sycophant_leader').GetFullName], inşaat halindeki sarayın boyutlarını ve güzelliğini kendi gözleriyle görmek istedi. Yapılar yükselmeye başladığında ortaya çıkan başyapıta hayran kaldı."
 gaudi.915.f: "'Benim [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]’ım, Gyeongbokgung’u görene kadar kendi küçüklüğümün farkında değildim. Büyük plajda bir toz tanesi, akşam gökyüzünde kaybolmuş bir yıldız gibi hissettim. O gün sadece güneşle karşılaşan bir ateşböceğiydim. Gerçekten, bu saray tüm sarayların en görkemlisi olacak, krallar, imparatorlar - tanrılar için bir sığınak! Bu görkemi, zihninizin bu parlak fikrini şimdiden görebilmemiz yalnızca sizin sayenizde mümkün. Gölgenizi yalarım, üzerinizden düşen tükürük bile bu görkemden sonra utanç verici bedenime değmez. Ah, gerçekten ben, küçücük solucan, şüphe ettim, şüphe ettim sana, toprağa, denizler ve yıldızların gökleri arasındaki tüm topraklara! Ama yanlıştım, burada yanlıştım, orada yanlıştım, yukarıda yanlıştım, aşağıda yanlıştım. Nehrin alabalık kırlangıcı çayır kirpisi kralına konuştuğu gibi...'"
 gaudi.915.g: "Bu dalkavuklar bir bela."
 gaudi.1005.t: "İlk Telgraf"
 gaudi.1005.d: "Bugün, [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName] kendi icadı olan bir alfabe kullanarak elektrikli telgraf üzerinden ilk mesajı gönderdi. Test tamamen başarılı oldu."
 gaudi.1005.f: "1843 Mart’ında, ABD Kongresi Samuel Morse’a Washington D.C. ile Baltimore, Maryland arasında bir telgraf hattı döşemesi için 30.000 USD tahsis etti. Morse başlangıçta hattı yer altına döşemeye karar verdi ve Ezra Cornell’den, Cornell’in geliştirdiği özel bir kablo döşeme sabanı kullanmasını istedi. Ancak yaklaşık 9,3 mil kablo döşendikten sonra hat başarısız olduğu için proje durduruldu. Morse, İngiltere’de Cooke ve Wheatstone’un hatlarında direk kullandığını öğrendi ve onların yöntemini takip etmeye karar verdi. Eksik hat üzerinde bir test 1 Mayıs 1844’te, Whig Partisi’nin ABD Başkanı adayı Henry Clay’i aday göstermesiyle Baltimore’daki parti kongresinden Washington’daki Kongre Binası’na haber gönderildiğinde gerçekleşti. Morse’un hattı, 24 Mayıs 1844’te ABD Capitol’deki Eski Yüksek Mahkeme Odası’ndan Baltimore’daki Mount Clare istasyonuna kadar gösterildi ve Washington’dan Baltimore’daki Alfred Vail’e ilk Morse mesajı gönderildi."
 gaudi.1005.g: "Tanrı ne yarattı?"
 gaudi.1006.t: "İçten Yanmalı Motorlu İlk Otomobil"
 gaudi.1006.d: "Bugün, [GetPlayer.MakeScope.GetVariable('tesla_engineer_var').GetCharacter.GetFullName], [SCOPE.sState('gaudi_car_state_1_scope').GetName]’den [SCOPE.sState('gaudi_car_state_2_scope').GetName]’e kadar bir içten yanmalı motorlu otomobili sürdü ve saatte 16 kilometre hıza ulaştı."
 gaudi.1006.f: "\"Saatte 16 kilometre mi? Bu öldürücü derecede tehlikeli bir hız!\""
 gaudi.1006.g: "Vroom!"
