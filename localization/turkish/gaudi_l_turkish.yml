 je_gaudi_capital_expansion_project_reason: "1836 ile 1936 yılları arasında, Viktorya dönemi başkentleri derin kentsel dönüşümler geçirdi. Paris, Haussmann'ın geniş bulvarları ve aksiyal manzaralarıyla yeniden şekillendirildi. Viyana, 1857’de surlarını yıkarak yerine görkemli Ringstraße’yi inşa etti. Berlin, gecekondu bölgeleri, sanayi alanları ve daha sonra modernist konut projeleriyle hızla genişledi. Londra, demiryolu banliyöleri, altyapı projeleri ve dünyanın ilk metro hattı aracılığıyla dışa doğru yayıldı. Avrupa kıtasında, kraliyet şehirleri modern metropollere dönüşerek güç, hırs ve artan sosyal gerilimlerin anıtları haline geldi."
 gaudi.41.t: "Sınırsız Bir Şehir"
 gaudi.41.d: "Eski surlar yıkılıyor. Yerine—hava, ışık ve büyüme vaadi geliyor."
 gaudi.41.f: "Yüzyıllar boyunca, [ROOT.GetCountry.GetCapital.GetCityHubName] surlarla çevriliydi: gururlu, kompakt ve kendine kapalı. Ama artık taş örüntüleri kazma ve tozla düşüyor.\n\nOrtaçağ kaleleri yıkıldı. Yerine ağaçlarla ve görkemli cephelerle sıralanan geniş bulvarlar yükseliyor. Pazar arabaları ve dolaşan çiftler artık bir zamanlar muhafızların yürüdüğü yollarda yürüyor. Bulvarlar sadece yollar değil—bir ifadeler: güven, genişleme ve artık sınırlandırılamayacak bir gelecek.\n\nBazıları eski kapıların kaybını yasıyor. Ama [ROOT.GetCountry.GetCapital.GetCityHubName] nihayet derin bir nefes aldı."
 gaudi.41.g: "Dışa doğru inşa ediyoruz—vizyon ve enerji ile"
 gaudi.42.t: "İlerleme Halkası"
 gaudi.42.d: "Yeni bir bulvar halkası şehri ve devleti birbirine bağlıyor."
 gaudi.42.f: "Bir zamanlar çamurlu setlerin bulunduğu yerde artık taş ve demir hüküm sürüyor. Büyük bulvar, [ROOT.GetCountry.GetCapital.GetCityHubName]'nin kalbi etrafında bir kolye gibi kıvrılıyor, bölgelerini hareket ve ışık içinde bağlıyor.\n\nBu sadece bir yol çalışması değildi. Bütün bloklar yeniden çizildi, parklar oluşturuldu, anıtlar mükemmel perspektifle çerçevelendi. Gaz lambaları akşamları düzenli yıldızlar gibi yanıyor. Her metrekare döşendikçe, [ROOT.GetCountry.GetCapital.GetCityHubName] daha okunabilir—daha imparatorluk gibi oluyor.\n\nYetkililer 'kentsel uyum' diyor. Peki halk? Yürüyüşe çıkıyor—daha önce hiç görmedikleri heykellere bakıyor, bir zamanlar yürümekten korktukları caddelerde."
 gaudi.42.g: "Bir savunma halkası değil—yön halkası."
 gaudi.43.t: "Yetki Bulvarları"
 gaudi.43.d: "Yeni vali [ROOT.GetCountry.GetCapital.GetCityHubName]'yi yeniden şekillendiriyor—her seferinde bir eksen. Geniş, düz ve tamamen tavizsiz."
 gaudi.43.f: "Bu genişleme değil. Bu cerrahi.\n\nBütün mahalleler pusula ve planın altında kalıyor. Sokaklar, bir zamanlar labirent gibi olan mahalleler boyunca bulvarlar gibi kazılıyor. Eski sokaklar yok oluyor. Yerine çizgiler yükseliyor—uzun, düz ve her zaman bir anıta, kışlaya veya bakanlığa götürüyor.\n\nDireniş baş gösteriyor, ama izinler imzalanıyor, evler kamulaştırılıyor ve cepheler hizalanıyor. [ROOT.GetCountry.GetCapital.GetCityHubName] artık düzenin dilini konuşuyor: görünürlük, dolaşım, kontrol. Görkemin ardında niyet yatıyor.\n\nFakirler buna 'Temizlik' diyor. Yetkililer 'Modernizasyon' diyor. Vali buna gerekli diyor."
 gaudi.43.g: "Planın dışına kimse çıkmasın"
 gaudi.44.t: "Metropol Ufku"
 gaudi.44.d: "[ROOT.GetCountry.GetCapital.GetCityHubName] artık sadece bir başkent değil. Dünyanın minyatürü oluyor."
 gaudi.44.f: "Eski şehrin sınırları vardı. Bu şehrin yok.\n\nÇelik ve cam, bir zamanlar taşın hüküm sürdüğü yerleri deliyor. Demiryolu hatları, kamu bahçelerinin altından geçiyor. Elektrik ışıkları akşam ve sabah arasındaki sınırları bulanıklaştırıyor. Büyükelçilikler, bankalar, galeriler ve kafeler, yeni çağın demir serasında orkide gibi açıyor.\n\nYabancı diller galerilerde yankılanıyor. Gökdelenler katedrallere meydan okuyor. [ROOT.GetCountry.GetCapital.GetCityHubName] artık büyümek için izin istemiyor—lider olmayı bekliyor. Her bölgeden tek bir gerçek ortaya çıkıyor: artık burası bir ulusun şehri değil. Birden fazla ulusun şehri."
 gaudi.44.g: "Yükseliyoruz, çünkü dünya zaten izliyor."
 gaudi_capital_expansion_project_progress_bar: "Başkent Genişlemesi"
 gaudi_capital_expansion_project_progress_bar_desc: "Başkent Genişlemesi: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|1%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|0]/30)"
 gaudi.511.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]'yi güzelleştirmek söz konusu olduğunda, kentsel planlamada bir anlaşmazlık vardı."
 gaudi.512.t: "Ring Yolu Üzerindeki Heykeller"
 gaudi.512.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]'nin yeni ring yolu üzerinde yeni bir figür grubu dikilecek, ancak hangi mitolojik figürün özel bir yere sahip olacağı belirsiz."
 gaudi.513.f: "Yeni bir bakanlık binası hükümetin amiral gemisi olarak inşa edilmek isteniyordu, ancak sürekli plan değişiklikleri, genişlemeler ve gizli yolsuzluk nedeniyle inşaat uzadı ve tüm fonlar tamamlamaya harcandı. Bitmemiş bina, birkaç geçici önlemle işlevsel hale getirilebilir, ancak bu muhtemelen hükümetin çıkarına olmayacaktır; çünkü küçük ofisler ve beklenen konfordan daha azıyla yetinmek zorunda kalacaktır. Daha fazla inşaat mümkündür, ancak muhtemelen maliyetli olacaktır."
 gaudi.511.t: "Fıskiye mi, Pavilyon mu?"
 gaudi.511.f: "Bunu imparatorun sakalı hakkında bir tartışma sanabiliriz: önemsiz bir konu ciddi bir politik anlaşmazlığa dönüştü. Yüksek estetik değere sahip bir temsilî meydanda bir inşaat projesi söz konusu. Bir grup, burada dolaşmak için bir pavilyon inşa edilmesini isterken, diğer grup bir fıskiye yapılmasını savunuyor. Sadece bir arsa olduğundan, yalnızca bir proje inşa edilebilir; bir uzlaşma mümkün değil."
 gaudi.511.g: "Pavilyonu inşa ediyoruz."
 gaudi.511.h: "Fıskiyeyi inşa ediyoruz."
 gaudi.511.i: "Bu yer için kendi planlarım var..."
 gaudi.512.f: "Ring yolu planlanırken bazı detaylar hâlâ belirsiz. Hangi figürlerin ön planda yer alacağı henüz belirlenmedi. Net olan, bunların Roma panteonundan figürler olması gerektiği. Nüfusun bazı kesimleri kendilerini ilgili figürlerle özdeşleştiriyor—örneğin kapitalistler ortada ticaret tanrısı Merkür'ün olmasını öneriyor. Aristokratlar ise tanrıların babası Jüpiter konusunda ısrar ediyor. Askerîler Mars’ı, akademisyenler ise ortada Apollon’u istiyor."
 gaudi.512.g: "Jüpiter."
 gaudi.512.h: "Merkür."
 gaudi.512.i: "Apollon."
 gaudi.512.j: "Mars."
 gaudi.513.t: "Bakanlık binası maliyeti aştı"
 gaudi.513.d: "Yeni bir bakanlık binasının inşası küçük bir skandala dönüşüyor."
 gaudi.513.g: "Bütçe vardı ve bu bütçeye uyulmalı."
 gaudi.513.h: "Bu talihsiz, ancak bu alanda yaygın bir durum."
 gaudi.513.i: "Bu projeye ihtiyaç duyduğu kadar para ve zaman ayrılmalı."
 gaudi.514.t: "Yeni Kahvehane"
 gaudi.514.d: "Ringstrasse’de yeni bir kahvehane açıldı."
 gaudi.514.f: "'Kahvehane, her yeni şey için en iyi eğitim yerimiz olarak kaldı. Bunu anlamak için, Viyana kahvehanesinin dünya çapında başka hiçbir kuruma benzemeyen özel bir tür kurum olduğunu bilmek gerekir. Aslında bu, herkesin uygun fiyata kahve içebildiği, saatlerce oturup tartışabildiği, yazı yazabildiği, kart oynayabildiği, postasını alabileceği ve her şeyden önemlisi sınırsız gazete ve dergi tüketebileceği demokratik bir kulüp gibidir. Tüm Viyana gazeteleri, yalnızca Viyana gazeteleri değil, tüm Alman Reich'ı, Fransız, İngiliz, İtalyan ve Amerikan gazeteleri ve tüm önemli edebi ve sanatsal incelemeler daha iyi bir Viyana kahvehanesinde mevcuttu. Böylece dünyada olup bitenleri ilk elden öğrenebiliyor, hangi kitap yayımlandı, hangi performans nerede gerçekleşti takip edebiliyor ve tüm gazetelerdeki eleştirileri karşılaştırabiliyorduk. Belki de Avusturyalıların entelektüel esnekliğine ve uluslararası yönelimlerine bu kadar çok katkı sağlayan şey, dünyadaki tüm olaylar hakkında kahvehanede kapsamlı bir şekilde bilgi sahibi olup bunu arkadaşça çevrelerde tartışabilmeleriydi. Her gün saatlerce orada otururduk ve hiçbir şeyi kaçırmazdık.' - Stefan Zweig"
 gaudi.514.g: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] ziyaret etmeli."
 gaudi.514.h: "Bu, Viyana’da yaşam standardını yükseltecek."
 gaudi.515.t: "Ring Yolu Sarayı"
 gaudi.515.d: "Bir soylu, [ROOT.GetCountry.GetCapital.GetCityHubName]'nin yeni şehir bölgesinde bir saray inşa ederken kendini aştı. Yarı bitmiş bina harabesi bir göz zevkini bozma tehdidi oluşturuyor."
 gaudi.515.f: "Ring Yolu Sarayı, Viyana Ringstrasse üzerindeki görkemli saraylar için kullanılan terimdir. Bu binalar çoğunlukla eski soylular veya 19. yüzyılın sonlarında bankacılar ve sanayiciler tarafından inşa edilmiştir. Saraylar Neo-Barok ve Neo-Rönesans veya Neo-Mannerizm tarzlarının bir karışımıyla inşa edilmiş, aynı zamanda yükseliş ve statü sembolü olmuştur. Ancak, yakın zamanda bir yapımcı aşırı borçlanmış ve iflas tehlikesiyle karşı karşıyadır. Halk, göz zevki bozan binayı alay konusu yapıyor; en kötü durumda binanın tekrar yıkılması gerekebilir ve böylece tüm projenin tamamlanması uzar."
 gaudi.515.g: "Maliyetleri paylaşıyoruz."
 gaudi.515.h: "Bu bizim işimiz değil."
 gaudi.516.t: "Başkent Genişlemesi: İyi ilerleme"
 gaudi.516.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName], başkent genişlemesinin daha erken tamamlanabileceğini belirtti."
 gaudi.516.f: "Bilinmeyen nedenlerden dolayı her şey daha hızlı ilerliyor: vatan sevgisi, yüksek ücretler, yerel seçkinlerin dostane desteği veya basitçe daha iyi hava koşulları olabilir."
 gaudi.516.g: "Harika."
 gaudi.517.t: "Başkent Genişlemesi: Yavaş ilerleme"
 gaudi.517.d: "Ne yazık ki, [ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] liderliğindeki inşaat yönetimi bugün [ROOT.GetCountry.GetCapital.GetCityHubName]'de yeni bir bölgenin inşaatının planın gerisinde olduğunu kabul etmek zorunda kaldı."
 gaudi.517.f: "Bilinmeyen nedenlerden dolayı her şey daha yavaş ilerliyor: düşman siyasi unsurların tahriki, sendikaların çalışma etiğini baltalaması, bir Illuminati komplosu veya sadece kötü hava koşulları olabilir."
 gaudi.517.g: "Üzücü."
 gaudi.518.t: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] Anıtı"
 gaudi.518.d: "Ringstrasse’de yeni bir anıt planlanacak: bu, Kralımız [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle]’ın bir heykeli olacak."
 gaudi.518.f: "Ringstrasse, Avusturya tarihini göstermek için hizmet ediyordu. Bir yandan, Habsburg hanedanı tarafından yönetilen uzun monarklar zinciri ölümsüzleştirildi; bunların içinde Maria Theresa en gösterişli anıta sahipti. Ancak, Eugen von Savoyen veya Schwarzberg gibi generaller de Viyana şehir manzarasını zenginleştirdi. Burjuvazi ise, temsilcilerini, yani şair prensler Goethe ve Schiller’i, ayrıca büyük besteciler Schubert, Mozart ve Beethoven’ı ölümsüzleştirmeye büyük önem verdi."
 gaudi.518.g: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] olmak güzel."
 gaudi.518.h: "Güzel—ama Ringstrasse’nin tamamlanmasına odaklanalım."
 gaudi.519.t: "Yangın!"
 gaudi.519.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]’de bir inşaat alanında yıkıcı bir yangın birkaç binayı yok etti."
 gaudi.519.f: "Ring yolu üzerindeki en bilinen felaket, 8 Aralık 1881’deki Ringtheater yangınıdır. 19. yüzyılın en büyük yangın felaketlerinden biridir. Tahminler yüzlerce, belki de binin üzerinde kurban olduğunu gösterir. Sebebi, gaz aydınlatmasındaki bir arızaydı; bu, gazın sızmasına ve bir sonraki ateşleme denemesinde patlamasına yol açtı. Oluşan yangın sahne arkasına, ardından hızla sahnenin geri kalanına ve sonunda izleyici bölümüne yayıldı. Yangın, özellikle tiyatro alanında ve Avusturya’da tiyatro yapımına ilişkin yasal düzenlemelerde önleyici yangın koruması üzerinde hem ulusal hem de uluslararası etkiler yaptı. Akşamki gösteriye biletleri olan besteci Anton Bruckner, hasta olduğu için evde kalarak ölümden kaçtı."
 gaudi.519.g: "Korkunç bir gün."
 gaudi.520.t: "Şehir Genişlemesine Karşı Önyargılar"
 gaudi.520.d: "Kırsal nüfusun temsilcileri, [ROOT.GetCountry.GetCapital.GetCityHubName]’in gelişimini sıradan kırsal halk için bir dezavantaj olarak görüyor."
 gaudi.520.f: "'Hükümet, başkentteki tarif edilemez küstahlığıyla, sadece birkaç sokak ötesini düşünen ve [ROOT.GetCountry.GetCapital.GetCityHubName]’den hiç çıkmamış soğuk şehir sakinlerinden oluştuğunu açıkça gösteriyor. Orada büyük paralar heba ediliyor; bunlar yalnızca başkente gidiyor, küçük kasabalardaki veya köylerdeki sıradan insanlar ise bundan hiçbir şey fark etmiyor. Bunun arkasındaki ideoloji, merkeziyetçiliği, bürokrasiyi destekliyor ve devlet aygıtına yardım ediyor; ama bu dekadent proje sıradan insan için hangi perspektifi sunuyor?'"
 gaudi.520.g: "Çalışkan kırsal nüfus için dostane bir hediye sunalım?"
 gaudi.520.h: "Şehir ve taşra eşittir."
 gaudi.520.i: "Bu aptal köylülerin sözleri kimin umurunda?"
 gaudi.521.t: "Sanayici Konutu"
 gaudi.521.d: "Zengin bir iş insanı yeni bir saray inşa ettirdi ve böylece [ROOT.GetCountry.GetCapital.GetCityHubName]’i görkemli bir yapı ile zenginleştirdi."
 gaudi.521.f: "Sanayici ve bankerlerin sarayları, devletteki yeni konumlarını vurgulamanın bir yolu olarak görülüyordu. Yahudi kökenli zenginler de bununla özgürleşmelerini vurgulayabiliyordu. 19. yüzyılda Viyana’nın gelişimi bunun iyi bir örneğidir. En ünlü ring yolu saraylarından biri Palais Epstein’dir. Sanayici ve banker Gustav Ritter von Epstein için inşa edilmiştir. Mimar Theophil Freiherr von Hansen’dır; kendisi bitişikteki Avusturya Parlamento Binası’nı da tasarlamıştır. Beş katlıdır ve zamanının tipik Neo-Rönesans tarzında inşa edilmiştir."
 gaudi.521.g: "[ROOT.GetCountry.GetCapital.GetCityHubName] büyüyor ve gelişiyor."
 gaudi.522.t: "Kışlaların Genişletilmesi"
 gaudi.522.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]’in genişlemesi, kışlaların modernizasyonu ve genişletilmesi fırsatını sunuyor."
 gaudi.522.f: "Franz-Josephs-Kışlası, günümüzde Ringstrasse bölgesinde bulunan bir Viyana kışlasıydı ve uzun süre büyük projenin inşaatında bir engeldi. Kışla, İmparator Franz Joseph I adına inşa edilmiş ve 1848 devrimi sonrasında 1854-1857 yıllarında tamamlanmıştır. İnşaatının hemen ardından kışla, 1857’de başlayan Viyana Ringstrasse gelişiminin önünde duruyordu; ancak ordunun buradan taşınması dört on yıl sürdü. Franz Joseph kışlasının kaybını karşılamak için yeni kışlalar önceden inşa edilmek zorundaydı."
 gaudi.522.g: "Kışlaları genişlet."
 gaudi.522.h: "Zamanımızı başka yere harcayalım."
 gaudi.523.t: "İnşaat Sektörünün Genişletilmesi"
 gaudi.523.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]’in genişlemesi, inşaat sektörünün genişletilmesi fırsatını sunuyor."
 gaudi.523.f: "'Genellikle sanatçı doğasını, sanatçının üretmesini engelleyen niteliklerin toplamı olarak adlandırırız.' - Arthur Schnitzler"
 gaudi.523.g: "İnşaat ofisini genişlet."
 gaudi.524.t: "Harika bir park"
 gaudi.524.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]’in yeni parkı tamamlandı ve artık tüm vatandaşların yürüyüş yapması için açık."
 gaudi.524.f: "Yeni Stadtpark’ın kapıları açılıyor. Çimler kadife gibi uzanıyor. Yollar çiçek tarhları ve heykeller arasında kıvrılıyor. Ama kalabalığı en çok çeken, çimen değil—sese dair. Bir müzik podyumu, küçük bir orkestranın vals melodisi rüzgârla yayılıyor. Bir zamanlar salonlara ve saraylara ayrılmış olan halk müziği artık herkesin duyabileceği şekilde havayı dolduruyor. Viyana gibi şehirlerde, Kursalon, melodiye adanmış bir şehir mabedi haline gelmişti. İtalyan Rönesans tarzındaki muhteşem bina Johannesgasse üzerinde yer almakta ve parkta geniş bir terasa sahiptir. Strauss kardeşlerin zamanında Kursalon, dans ve konserler için popüler bir yerdi."
 gaudi.524.g: "Hadi bir yürüyüş yapalım."
 gaudi.524.h: "Haydi bir konserle kutlayalım!"
 gaudi.525.t: "Opera Binasını Genişletmek"
 gaudi.525.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]’in genişlemesi, operayı modernize etme ve genişletme fırsatını sunuyor."
 gaudi.525.f: "Bulvarlar ve pasajlar, çeşmeler ve bakanlıklar arasında mevcut opera binası mütevazı, hatta taşralı hissettirmeye başlıyor. Öneri: yeni bir yapı veya geniş çaplı bir genişleme. Daha fazla koltuk, daha iyi akustik, anıtsal cepheler. Şehrin statüsüne uygun bir kültür mabedi. Avrupa genelinde, böyle jestler ulusal prestij sembolleri haline gelmiştir. Paris’te Opéra Garnier mermer merdivenleri ve altın tavanlarıyla yükselir. Viyana’da Staatsoper, 1869’da açılmış, Ringstraße’ye zarafet ve gurur katmıştır."
 gaudi.525.g: "Opera binasını genişlet."
 gaudi.526.t: "Belediye Binasını Genişletmek"
 gaudi.526.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]’in genişlemesi, Belediye Binasını modernize etme ve genişletme fırsatını sunuyor."
 gaudi.526.f: "Eski belediye binası hâlâ başka bir yüzyıldan kalma armayı taşıyor. İçeride: dar merdivenler, kalabalık ofisler ve süpürgeliklerden yüksek defter yığınları. Belediye başkanının masası, kağıt işleri için zar zor yeterli, güç için değil. Öneri: yeni bir Belediye Binası, şehrin yönetimde, ekonomide ve sivil kimlikteki genişleyen rolünü yansıtan bir yapı. Yükselen kuleler veya ölçülü klasik tarz—her iki durumda da otoriteyi göstermeli. Avrupa’da şehirler bu zorluğu karşılamıştır. Viyana’da neo-Gotik Rathaus (1883’te tamamlandı) belediye güveninin simgesi oldu. Paris, 1871’den sonra Hôtel de Ville’i görkemli ve meydan okuyan şekilde restore etti. Berlin’in Rotes Rathaus’u, Rönesans formu ve Prusya işlevinin birleşimi olarak ortaya çıktı."
 gaudi.526.g: "Belediye binasını genişlet."
 gaudi.527.t: "Heldenplatz"
 gaudi.527.d: "Heldenplatz (Kahramanlar Meydanı) tamamlandıktan sonra, bazı önde gelen politik figürler uygun bir açılış için baskı yapıyor."
 gaudi.527.f: "Ringstrasse inşa edildiğinde, 'dış Burgplatz', İmparator Franz Joseph döneminde Kaiserforum’un bir parçası olarak tasarlanmış, ancak tamamlanmamıştır. Plan, Leopoldine Kanadı, Yeni Hofburg, Habsburg Koleksiyonları ve Volksgarten’ın yerine inşa edilmemiş Yeni Kale’nin bir karşılığı ile çerçevelenecek dikdörtgen bir meydan yaratmaktı. Heldenplatz ismi 1878’de kesinleşti; adını Anton Dominik Fernkorn tarafından yapılan iki atlı anıttan alır. Daha eski olanı Arşidük Karl’a aittir, 1860’ta açılmıştır. Karşılığı, Prens Eugene’in atlı heykeli, 1865’te tamamlanmıştır. I. Dünya Savaşı kaybı, Avusturya-Macaristan ikili monarşisinin çöküşü ve ilk Avusturya cumhuriyetinin kuruluşundan sonra, Heldenplatz tüm politik kamplar için bir toplanma noktası ve Avusturya ordusu için bir geçit alanı olarak hizmet vermiştir."
 gaudi.527.g: "Bir geçit töreni düzenleyip arkadaşlarımızı davet edelim."
 gaudi.527.h: "Önümüzdeki birkaç yıl için kalıcı bir askeri geçit töreni düzenleyelim."
 gaudi.527.i: "Peki tüm bunların masrafını kim ödeyecek?"
 gaudi.528.t: "Üniversiteyi Genişletmek"
 gaudi.528.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]’in genişlemesi, üniversiteyi modernize etme ve genişletme fırsatını sunuyor."
 gaudi.528.f: "Düşüncesiz bir büyük şehir neye yarar? Demiryolu hatları, bakanlıklar ve tiyatroların ortasında, üniversite kendi başarısının altında zorlanıyor. Çok fazla öğrenci, çok az salon. Bölümler kiralık binalara yayılmış. Profesörler, kütüphaneler ve laboratuvarlar arasında alan kavgası yapıyor. Öneri açık: yeni bir kampüs veya büyük bir genişleme—modern derslikler, özel fakülteler, anıtsal bir kütüphane. Bu projeler yalnızca altyapı değil; entelektüel iddianın ilanıdır. Viyana’da üniversite, 1870’lerde Ringstraße boyunca taşınmış ve büyük bir cephe ve simgesel merkezle yeniden inşa edilmiştir. Paris’te Sorbonne, Jules Ferry reformlarıyla Fransa’nın büyüyen akademik sınıfına hizmet edecek şekilde kapsamlı olarak genişletilmiştir."
 gaudi.528.g: "Üniversiteyi genişlet."
 gaudi.529.t: "Güzel Sanatlar Akademisini Genişletmek"
 gaudi.529.d: "[ROOT.GetCountry.GetCapital.GetCityHubName]’in genişlemesi, güzel sanatlar akademisini modernize etme ve genişletme fırsatını sunuyor."
 gaudi.529.f: "Şehir büyüdükçe, sanat için de açlığı artıyor. Yine de ressamlar ve heykeltıraşlar, küçük stüdyolara ve karanlık çatı katlarına sıkışıyor; ustalardan değil, söylentilerden ve ödünç alınmış eskizlerden öğreniyorlar. Öneri: ışık alan atölyeler, anatomi tiyatroları ve halka açık sergi salonları olan düzgün bir güzel sanatlar akademisi. Avrupa genelinde, bu tür akademiler ulusal zevki şekillendirir. Paris’te École des Beaux-Arts, yarım kıta için klasik standartları belirler. Viyana’da Akademie der bildenden Künste’nin büyük binası, Ringstraße’nin kültürel prestijini pekiştirir."
 gaudi.529.g: "Akademiyi genişlet."
 gaudi.530.t: "Urania"
 gaudi.530.d: "Viyana’da Urania adlı, sözde 'halk eğitim merkezi' açıldı; tam amacı hâlâ tartışmalıdır."
 gaudi.530.f: "1883’te Alman astronom Max Wilhelm Meyer, Viyana Üniversitesi’nde asistan olarak tarihi ve gelecekteki güneş tutulmalarını hesaplamak için Viyana’ya geldi. Ayrıca folklor dersleri verdi ve halk eğitim kurumu fikrini geliştirdi. Ancak 1885’te Berlin’e çağrıldığı için fikirlerini orada geliştirmeye devam etti. Viyana’daki Urania, Berlin’deki Urania model alınarak inşa edildi: 800 kişi kapasiteli ve 200 kişi için bir konferans salonu, bilimsel gösterim odaları ve bir gözlemevi içeriyordu. Ancak bu 'geçici' Urania, gelen ziyaretçi yoğunluğunu karşılayamıyordu; bu nedenle Ringstrasse’de yeni bir bina kısa sürede gerekli oldu. Urania, eğitim fırsatlarını genişletmekle kalmadı (ör. dil kursları) aynı zamanda kendi Urania senfoni orkestrası ve Urania korosuyla konserler için bir mekan haline geldi. Alışılmadık şekli ve yapısı, Viyana’da sıradan skandal yarattı. Yine de Viyanalılar binayı beğendi ve Urania kısa sürede Viyana’nın simge yapılarından biri haline geldi."
 gaudi.530.g: "Bu bir mimari simge."
 gaudi.530.h: "Öncelikle bir eğlence mekanıdır."
 gaudi.530.i: "Her şeyden önce bir gözlemevidir."
 gaudi.9.t: "Şehir Planlaması Tamamlandı"
 gaudi.9.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] bugün önemli bir taşra kentinde [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] şehir planlaması çalışmalarını tamamladı. [ROOT.Var('gaudi_architect_var').GetCharacter.GetSheHe|U] artık tamamen kullanılabilir durumda."
 gaudi.9.f: "'Mimarlık, en yüksek mertebesine ulaşmaz, ta ki öyle bir hayal gücü ve düş gücüyle dolup taşsın ki – disiplinli olmayan hayal gücü ya da kaprisli düş değil – düzenli yapı her akıllı gözlemcinin gözüne hoş görünür ve bir şiir gibi duyguları harekete geçirir.' -Henry van Brunt"
 gaudi.9.g: "Bu kadar çok proje, bu kadar az zaman."
 gaudi_architecture_treatise_modifier: "Mimarlık Risalesi"
 gaudi.8.t: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetLastName]'in Mimarlık Risalesi"
 gaudi.8.d: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName] [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] çalışmasını tamamladı. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] tarihî ve çağdaş mimarlık üzerine risalesi, [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] teorik yansımalarıyla zenginleştirilmiş olup, gelecek nesil mimarları etkileyecek."
 gaudi.8.f: "'Mimarlık, insan ırkının büyük fikirlerini kaydetmiştir. Sadece her dini sembol değil, her insan düşüncesi de o muazzam kitabın bir sayfasına sahiptir.' -Victor Hugo"
 gaudi.8.g: "Gelecek nesiller için bir eser."
 je_gaudi_architecture_treatise: "Mimarlık Risalesi"
 je_gaudi_architecture_treatise_reason: "[ROOT.Var('gaudi_architect_var').GetCharacter.GetFullName], önceki mimarlık bilgilerini bir kitapta derlemek için bir yıl boyunca tamamen geri çekildi. Bu kitap, [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis] hayatının bir manifestosu olacak, tüm deneyimlerini ve mimarlık üzerine teorilerini özetleyecek. [ROOT.Var('gaudi_architect_var').GetCharacter.GetHerHis|U] itibarı, eserin değerinin belirlenmesinde belirleyici rol oynar. Ancak $literary$, $erudite$, $innovative$ ve $aesthete$ gibi karakter özellikleri de değerlidir."
