 notification_gaudi_summer_palace_burned_notification_desc: "Yüzyıllardır Çin İmparatorlarının ikametgâhı olan görkemli Yazlık Saray, [INITIATOR_COUNTRY.GetName] tarafından yakıldı."
 gaudi_dombau_phase_1_decision: "Köln Katedrali’ni tamamla"
 gaudi_dombau_phase_1_decision_desc: "Köln Katedrali, dünyanın en mükemmel Gotik katedrali olarak kabul edilmektedir. İnşaat 13. yüzyılda başladı ve devasa boyutlardaydı. Koro binasının tamamlanmasından sonra çalışmalar yavaşladı ve 15. yüzyılda tamamen durdu. Bugüne kadar, Orta Çağ’ın sonlarından kalma inşaat vinci yarım kalmış güney kulesinin üzerinde yükselmeye devam ediyor. Alman burjuvazisinde ulusal ve romantik duyguların yeniden canlanmasıyla, özellikle de orijinal yapı planlarının yeniden keşfi ve yayılmasıyla birlikte, katedralin tamamlanmasının yalnızca Tanrı’nın yüceliği için değil, aynı zamanda Alman kültürünün ve Alman ulusunun birliğinin bir sembolü olduğu inancı güçleniyor."
 gaudi_dombau_phase_2_decision: "Köln Katedrali’nin Güney Cephesi"
 gaudi_dombau_phase_2_decision_desc: "İnşaat çalışmaları birkaç yıl sürdükten sonra mimarlar katedralin güney cephesinin inşası ve süslemeleriyle karşı karşıya kaldılar. Zengin figüratif süslemeleriyle, yalnızca Alman heykel sanatının zirvesi olarak değil, aynı zamanda Gotik canlanma mimarisinin başlıca eserlerinden biri olarak kabul edilir. Sadece cephenin inşası on üç yıl, tamamlanması ve süslenmesi ise on sekiz yıl sürdü."
 gaudi_dombau_phase_3_decision: "Köln Katedrali’nin Çatı Yapısı"
 gaudi_dombau_phase_3_decision_desc: "Gotik ideale dayanan Köln Katedrali tasarımı, ustaların zamanının en modern yapı malzemelerini kullanmasını engellemedi. Çatı yapısı demirden yapılmıştı ve bu, onu Eiffel Kulesi inşa edilene kadar dünyanın en büyük demir-çelik yapısı haline getirdi. Bu karar sayesinde yapı, II. Dünya Savaşı’ndaki Müttefik bombardımanlarına rağmen ayakta kaldı."
 gaudi_dombau_phase_4_decision: "Köln Katedrali’nin Batı Cephesi ve Kuleleri"
 gaudi_dombau_phase_4_decision_desc: "Katedralin batı cephesi, bugüne kadar inşa edilmiş en büyük kilise cephesidir. 1370’te ‘Cephe Planı F’ olarak kaydedilen ve usta mimar Michael von Savoyen tarafından geliştirilen Orta Çağ planını ayrıntılı biçimde takip eder. Köln Katedrali’nin siluetine özgü olan şey, iki dev kuleyle yükselen ikiz kuleli cephedir. Usta Michael, kademeli bir alemle taçlandırılmış sekizgen, tamamen oyma taş işçiliğine sahip bir kule ucu tasarlamıştı. Teknik olarak mümkün olanın sınırlarını zorlayan bu çözümlerle Gotik mimarlar, yapının içeride Üç Bilge Adam’ın kutsal emanetlerini barındıran ‘anıtsal bir kutsal emanet sandığı’ olmak istediğini vurgulamayı amaçladılar."
 gaudi_gotthard_survey_decision: "Gotthard Demiryolu: Planlama ve Etüt"
 gaudi_gotthard_survey_decision_desc: "19. yüzyılda, İsviçre uluslararası demiryolu trafiğinde bypass edilme tehlikesiyle karşı karşıyaydı ve böylece yalnızca modern ulaşım sisteminden değil, aynı zamanda Sanayi Devrimi’nden de kopma riski altındaydı. Brenner Geçidi üzerinden bir demiryolu hattının açılmasıyla bu tehlike yeni bir boyut kazandı. Coğrafi olarak İsviçre, Avusturya’dan daha büyük sorunlarla karşı karşıyaydı: Brenner Geçidi, İsviçre’nin alternatif güzergâhlarına göre çok daha kolay aşılabiliyordu. İsviçre’de bir Alpler demiryolu inşaatından önce güzergâh ve finansman konusunda on yıllarca süren tartışmalar yaşandı. Zürihli siyasetçi ve girişimci Alfred Escher, Gotthard hattının belirlenmesinde kilit rol oynadı."
 gaudi_gotthard_construction_decision: "Gotthard Demiryolu’nun İnşası"
 gaudi_gotthard_construction_decision_desc: "Gotthard Demiryolu’nun inşası 19. yüzyılın en büyük inşaat projelerinden biri olarak kabul edilir ve boyutları ile teknik engelleri bakımından Süveyş Kanalı’nın yapımıyla karşılaştırılır. Başlangıçtan itibaren, en önemli ve iddialı kısım Gotthard masifinin altından bir tünel açılmasıydı. 1882’de açıldığında, Gotthard zirve tüneli 15 kilometre ile dünyanın en uzun tüneliydi. Demir ve çelikten yapılmış yaklaşık yüz küçük ve büyük köprü bu iddialı güzergâhın bir diğer parçasını oluşturdu; bu hat yalnızca kuzey ve güney Avrupa’yı birbirine bağlamakla kalmıyor, aynı zamanda İsviçre’nin birliğinin sembolü de oluyordu."
 gaudi_cristo_construction_decision: "Cristo Redentor’un İnşası"
 gaudi_cristo_construction_decision_desc: "Vincentian rahibi Pedro Maria Boss, 1850’lerin ortalarında, Brezilya’nın hükümdarı II. Pedro’nun kızı ve naibi Prenses Isabel’i onurlandırmak için Corcovado Dağı’na Hristiyan bir anıt dikilmesini ilk kez önerdi, fakat proje onaylanmadı. Rio Katolik Çevresi 1920’de dağa anıtsal bir heykel yapılması için ikinci bir teklif sundu. Yerel mühendis Heitor da Silva Costa ve sanatçı Carlos Oswald heykeli tasarladı. Fransız heykeltıraş Paul Landowski eseri gerçekleştirdi. Art Deco tarzındaki bu heykel, daha sonra Rio de Janeiro’nun Sugar Loaf’un yanındaki simgesi olarak dünya çapında ünlendi."
 gaudi_mole_phase_1_decision: "Mole Antonelliana: Sinagogdan Ulusal Sembole"
 gaudi_mole_phase_1_decision_desc: "Mole Antonelliana, Torino’lu mimar Alessandro Antonelli tarafından tasarlanmış, yüksek ve keskin biçimde yükselen kubbeye sahip, pavyon benzeri bir yapıdır. Yahudi cemaatinin adına bir sinagog olarak başlatılmıştı, ancak mimarın aşırı hırsı, projenin orijinal planların ötesine geçmesine neden oldu. Maliyetler fırladı ve tamamlanma yıllarca ertelendi. Yoğun çabalara rağmen Yahudi cemaati artık daha fazla para toplayamadı. Ancak Torino halkı, şimdiden kaba biçimiyle bile etkileyici olan yapının tamamlanması için projenin yerel yönetim tarafından devralınmasını ve yapının İtalyan birliğine adanmasını savundu."
 gaudi_custom_tt_trigger_mole: "#yellow İtalya#! olarak oynuyorsun!"
 gaudi_mole_phase_2_decision: "Mole Antonelliana: Fener ve Çan Kulesi"
 gaudi_mole_phase_2_decision_desc: "Antonelli binasında sürekli değişiklikler yaptı; örneğin 'tempietto' adı verilen, iki katlı ve kare tabanlı neoklasik altıgen sütunlu bir yapı ekledi; bu nedenle temel pronaos stilini aldı. Antonelli’nin çan kulesi vizyonu, beş köşeli bir yıldız ile tepeyi tamamlamaktı, ancak daha sonra kanatlı bir cin, yani 'genio alato' tasvir eden bir heykeli tercih etti. Heykel, Antonelli’nin ölümünden aylar sonra heykeltıraş Fumagalli’ye sipariş edildi. Tasarım, bir elinde mızrak diğerinde palmiye dalı tutan kabartmalı ve altın kaplamalı bakır bir cin içeriyordu. Başında küçük bir beş köşeli yıldız vardı. Yıldız 10 Nisan 1889’da yerine konulduğunda, Mole’nin toplam yüksekliği 167,5 m (550 ft) oldu ve Avrupa’daki en yüksek tuğla bina haline geldi."
 gaudi_ringstrasse_phase_1_decision: "Viyana Ringstrasse: Halka Yolların Efendisi"
 gaudi_ringstrasse_phase_1_decision_desc: "Viyana Ring Yolu, 19. yüzyıl ortasında şehir duvarlarının yıkılmasından sonra inşa edildi. 1860’lardan 1890’lara kadar, Ringstrasse boyunca birçok büyük kamu binası eklektik tarihçi tarzda, bazen Ringstraßenstil ('Ring Yolu stili') olarak adlandırılan ve Klasik, Gotik, Rönesans ve Barok mimari unsurları içeren bir tarzda inşa edildi. Tüm halka yolu boyunca sayısız kamu ve özel bina yapıldı. Aristokratlar ve diğer zengin özel kişiler, temsil niteliğinde saraylar (halka yolu sarayları) inşa ettirmekte acele ettiler."
 gaudi_ringstrasse_phase_2_decision: "Viyana Ringstrasse: Hofoper ve Neues Rathaus"
 gaudi_ringstrasse_phase_2_decision_desc: "Yıkılan Viyana kalelerinin yerine muazzam bir bulvar yapılmasına karar verilmesinden on yıl sonra halka yolu açıldı. Ancak o dönemde hâlâ boş araziler hâkimdi. Takip eden yıllarda en önemli projelerden biri, daha sonra Viyana Devlet Operası olacak büyük yeni bir opera binasının gerçekleştirilmesiydi. Yeni Belediye Binası da bu dönemde inşa edildi ve Ringstrasse, yalnızca bir cadde olmaktan çıkarak saraylar ve kamu binalarıyla yeni bir Viyana merkezi haline geldi."
 gaudi_ringstrasse_phase_3_decision: "Viyana Ringstrasse: Üniversite ve Sanat Müzeleri"
 gaudi_ringstrasse_phase_3_decision_desc: "Ringstrasse, endüstri sahipleri, bankacılar ve aristokrasinin arzu edilen adresi haline gelmiştir. Kamu binaları öne çıkar ve ülkeyi en estetik şekilde temsil eder. Yine de tamamlanması için son bir inşaat aşaması gereklidir; bu aşamada yeni bir üniversite binasının inşası ve sanat müzelerinin kurulması ön planda olmalıdır."
 gaudi_custom_tt_trigger_ringstrasse: "#yellow Avusturya#! ile oynuyor"
 gaudi_sagrada_phase_1_decision: "Sagrada Família: Antoni Gaudí’nin Rüyası"
 gaudi_sagrada_phase_1_decision_desc: "Antoni Gaudí i Cornet, Katalan Modernizmi’nin en büyük temsilcisi olarak tanınan Katalan bir İspanyol mimar ve tasarımcıydı. Gaudí’nin eserleri son derece bireysel, kendine özgü bir üsluba sahiptir. 1883’te Gaudí, Barcelona’da Basílica i Temple Expiatori de la Sagrada Família adlı kilise projesinin sorumluluğunu üstlendi. Gaudí, başlangıç tasarımını tamamen değiştirdi ve kendi ayırt edici tarzını kattı. Ölümüne kadar tamamen bu projeye kendini adadı. On yıllar boyunca Sagrada Família, dünyanın en büyük bitmemiş Katolik kilisesi olacaktı – bir yüzyıl projesi, deha ile delilik arasında."
 gaudi_sagrada_phase_2_decision: "Sagrada Família: Apsis"
 gaudi_sagrada_phase_2_decision_desc: "Gaudí, esas olarak del Villar’ın planlarına göre başlattığı kripti tamamladı; tonozlar Gaudí tarafından revize edildi. 1880’lerin ortalarında ilk ayinler burada yapılabildi ve kript 1889’da tamamlandı. Kriptin inşasıyla eş zamanlı olarak Gaudí, kilisenin planlarını temelden yeniden tasarlamaya başladı. 1885’te, mevcut projeden daha küçük ölçekli olsa da 18 kuleyi tanımlayan Gotik tasarım dilinde yeni bir genel konsept sundu. 1893’te tamamlanan apsisin dış duvarı, del Villar’ın projesinden daha yüksektir. Neo-Gotik unsurlar içerir, ancak Gotik formların alışılmadık kullanımında, doğal tarzda gargoylarda ve sivri uçlarda Gaudí’nin imzasını gösterir."
 gaudi_sagrada_phase_3_decision: "Sagrada Família: Nativity Cephesi"
 gaudi_sagrada_phase_3_decision_desc: "İsa’nın doğumuna adanmış olan Nativity cephesi, yaşam öğelerini hatırlatan sahnelerle süslenmiştir. Gaudí’nin doğal stilinin karakteristik özelliği olarak heykeller özenle düzenlenmiş ve doğadan sahneler ve imgelerle dekore edilmiştir; her biri kendi biçiminde bir semboldür. Cephe, doğuda doğan güneşe bakar; bu, İsa’nın doğumunun bir simgesidir. Üç portiko halinde bölünmüştür; her biri bir teolojik erdemi temsil eder (Umut, İnanç ve Sevgi). Hayat Ağacı, Charity portikosundaki İsa kapısının üzerinde yükselir."
 gaudi_sagrada_phase_4_decision: "Sagrada Família: Ana Nef"
 gaudi_sagrada_phase_4_decision_desc: "Kilisenin planı beş nefli Latin haçıdır. İçerideki sütunlar, benzersiz bir Gaudí tasarımıdır. Yükü desteklemek için dallanmanın yanı sıra, yüzeylerinin sürekli değişimi çeşitli geometrik formların kesişiminden kaynaklanır. En basit örnek, kare tabandan yükselip sekizgen, sonra onaltıgen ve en sonunda daireye dönüşmesidir. Temelde iç yüzeylerin hiçbiri düz değildir; süslemeler kapsamlı ve zengindir; büyük ölçüde, pürüzsüz eğriler ve keskin noktaları birleştiren soyut şekillerden oluşur. Balkon ve merdiven demir korkulukları gibi detay seviyesindeki işlerde bile kıvrımlı bir işçilik vardır."
 gaudi_sagrada_phase_5_decision: "Sagrada Família: Apostol Çan Kuleleri"
 gaudi_sagrada_phase_5_decision_desc: "Gaudí’nin orijinal tasarımı, yükseklik sırasına göre On İki Havari, Meryem Ana, dört İncil yazarı ve en yüksek olarak İsa Mesih’i temsil eden toplam on sekiz kule öngörüyordu. Bir piskopos asası şeklini çağrıştıracak şekilde tasarlanan tüm kuleler, uzun dikey oyuklara ve hayvanlar, kutsal semboller ve İncil’den alıntılarla süslenmiş renkli kule uçlarına sahiptir. Her biri üzerinde ilgili havarinin adı yazılı küçük bir altın haç taşır. Bazı kuleler dar taş köprülerle birbirine bağlanmıştır."
 gaudi_sagrada_phase_6_decision: "Sagrada Família: Çile (Passion) Cephesi"
 gaudi_sagrada_phase_6_decision_desc: "Oldukça süslü Doğuş Cephesi’nin aksine, Çile Cephesi sade, yalın ve basittir; çıplak taşlarla doludur ve bir iskeletin kemiklerini andıracak şekilde sert düz çizgilerle oyulmuştur. İsa’nın çarmıha gerilmesi sırasında çektiği acılara adanan bu cephe, insanlığın günahlarını tasvir etmeyi amaçlar. Gaudí, bu cephenin izleyicide korku uyandırmasını istemişti. Kemerleri ‘kırmak’, sütunları ‘kesmek’ ve ışık-gölge (karanlık sert gölgeler ile keskin ışık kontrastı) etkisini kullanarak Mesih’in kurban oluşunun ciddiyetini ve vahşetini vurgulamayı hedefledi. Batmakta olan güneşe bakan bu cephe, Mesih’in ölümünün sembolü olarak altı büyük eğimli sütunla desteklenmektedir; bu sütunlar gerilmiş kasları andıracak şekilde tasarlanmıştır."
 gaudi_sagrada_phase_7_decision: "Sagrada Família: Transept"
 gaudi_sagrada_phase_7_decision_desc: "Süslemelerdeki temalar arasında litürjiden alınan sözler bulunur. Çan kuleleri ‘Hosanna’, ‘Excelsis’ ve ‘Sanctus’ gibi ifadelerle süslenmiştir; Çile Cephesi’nin büyük kapılarında Yeni Ahit’ten İsa’nın Çilesi’ne dair bölümler, çoğunlukla Katalanca olmak üzere çeşitli dillerde yer alır; Görkem Cephesi ise Havariler’in İnancı’ndan alıntılarla süslenecek, ana kapısında ise Katalanca Rab’bin Duası’nın tamamı, çevresinde ise “Bize bugün günlük ekmeğimizi ver” ifadesinin birçok dilde farklı versiyonu bulunacaktır. Üç giriş, üç erdemi sembolize eder: İman, Umut ve Sevgi. Her biri ayrıca Mesih’in yaşamının bir bölümüne adanmıştır."
 gaudi_sagrada_phase_8_decision: "Sagrada Família: Meryem ve İncil Yazarlarının Kuleleri"
 gaudi_sagrada_phase_8_decision_desc: "İncil yazarlarının kuleleri geleneksel sembolleriyle taçlandırılmıştır: kanatlı bir boğa (Aziz Luka), kanatlı bir insan (Aziz Matta), bir kartal (Aziz Yuhanna) ve kanatlı bir aslan (Aziz Markos). Kulelerin tepeleri 22,5 m yüksekliğindedir ve üç bölümden oluşur: taban, üzerinde ‘Al·leluia’ ve ‘Amin’ yazılı dört sıra altıgen ve balıksırtı desenli seramik palmiyelerden oluşur; orta kısım, seramik trencadís ve Venedik camıyla kaplı bir küreyle kesişen bir ikosahedrondur ve ışık kaynaklarını içerir; üst kısımda ise Tetramorf heykelleri bulunur, bunlar kanatlıdır ve üzerlerinde her bir İncil yazarının baş harflerinin bulunduğu birer İncil taşırlar. Meryem’in kulesi apsiste yer alır ve sabah yıldızını simgeleyen büyük on iki köşeli bir yıldızla taçlandırılmıştır. Ayrıca Ave Maria ve çeşitli çiçekler gibi Meryem Ana’ya atıfta bulunan ikonografik unsurlar taşır."
 gaudi_sagrada_phase_9_decision: "Sagrada Família: Görkem (Glory) Cephesi"
 gaudi_sagrada_phase_9_decision_desc: "Cephelerin en büyüğü ve en dikkat çekici olanı Görkem Cephesi’dir. İsa’nın İlahi Görkemi’ne adanmıştır ve Tanrı’ya giden yolu temsil eder: Ölüm, Son Yargı ve Görkem; Tanrı’nın iradesinden sapanlar içinse Cehennem bırakılmıştır. Görkem Kapısı’na ulaşmak için, Carrer de Mallorca’nın altına inşa edilmiş yer altı geçidinin üzerinden geçen büyük merdiven, Cehennem ve günahı temsil eden süslemelerle donatılacaktır. Şeytanlar, putlar, sahte tanrılar, sapkınlıklar ve bölünmeler tasvir edilecektir. Ayrıca Araf ve ölüm de gösterilecektir; ölüm, yere yerleştirilen mezar taşlarıyla simgelenir. Portiko, Kutsal Ruh’un armağanlarına adanmış yedi büyük sütuna sahiptir. Sütunların tabanında yedi ölümcül günah, tepelerinde ise yedi göksel erdem bulunacaktır."
 gaudi_sagrada_phase_10_decision: "Sagrada Família: İsa’nın Kulesi"
 gaudi_sagrada_phase_10_decision_desc: "İsa’nın kulesi, İncil yazarlarının kuleleriyle dört köprüyle bağlanır ve 13,5 m yüksekliğinde altı kollu büyük bir haçla taçlandırılmıştır: merkezinde bir kuzu figürü ve ‘Tu solus Sanctus, Tu solus Dominus, Tu solus Altissimus’ yazıtı ile ‘Amen’ ve ‘Hallelujah’ ifadeleri yer alır. Haçın dört kolunun her biri, uzaktan görülebilen güçlü ışık huzmeleri yayar; bu, İsa’yı ‘Ben dünyanın ışığıyım’ şeklinde tanımlayan İncil pasajını hatırlatır. İçeride, İsa’nın kulesi üç kata ayrılacak, bunlar evrenin yaratılışını ve İsa’ya atfedilen ‘Ben Yol’um, Gerçek’im ve Yaşam’ım’ ifadesini simgeleyecektir."
 gaudi_sagrada_support_decision: "Sagrada Família’yı Destekle"
 gaudi_sagrada_support_decision_desc: "Sagrada Família’nın inşası aslında bağışlara dayanmalıydı – ancak mevcut anayasamız, bu ‘bağışların’ daha geniş yorumlanmasına ve halkımızın inşaatı desteklemeye teşvik edilmesine olanak tanıyor. Bu sayede her ay fazladan bir inşaat puanı kazanıyoruz."
 gaudi_end_sagrada_support_decision: "Sagrada Família Desteğini Sonlandır"
 gaudi_end_sagrada_support_decision_desc: "Sagrada Família’nın inşaatına desteğimizi her zaman çekebiliriz, ama bunu gerçekten kim ister ki?"
 gaudi_activate_saxon_palace_decision: "Sakson Sarayı’nı Restore Et"
 gaudi_activate_saxon_palace_decision_desc: "Varşova’nın kurtuluşuyla birlikte Polonya ulusunun tarihinde yeni bir dönem başlıyor. Bir zamanlar Wettin hanedanı krallarının ikametgâhı olan bakımsız Sakson Sarayı, örneğin Meçhul Asker Anıtı’yla birlikte eski ihtişamına kavuşturulmalıdır."
 gaudi.31.t: "[SCOPE.sState('gaudi_art_deco_cinema_state').GetCityHubName]’de Art Deco Sineması"
 gaudi.31.d: "Yeni ve modern bir sinema bugün kapılarını açtı."
 gaudi.31.f: "Art Deco binaların önemli bir türü sinema salonlarıdır. Art Deco dönemi, sesli filmlerin doğuşuna ve devasa ve gösterişli dekore edilmiş sinema salonlarının çağını da beraberinde getirdi. Bu sinemaların birçoğu hala ayakta, ancak iç mekanları daha küçük gösterim salonlarına bölünmüş durumda. En ünlü örneklerden biri, Oakland, Kaliforniya’daki Paramount Theatre’dır; dört kat yüksekliğinde büyük lobiye sahip, yirmi yedi kapıdan giriliyor ve 3.746 kişilik oturma kapasitesine sahipti."
 gaudi.31.g: "Yeni Buster Keaton filmi çıktı mı?"
 gaudi.32.t: "[SCOPE.sState('gaudi_art_deco_skyscaper_state').GetCityHubName]’de Art Deco Gökdelen"
 gaudi.32.d: "Oyunlu süslemeleri, muhteşem mozaikleri ve çekici şekilleriyle [SCOPE.sState('gaudi_art_deco_skyscaper_state').GetCityHubName]’deki yeni gökdelen sadece yüksek bir bina olmanın ötesinde."
 gaudi.32.f: "Art Deco stili Paris’te doğdu, ancak o şehirde Notre Dame Katedrali’nden daha yüksek hiçbir bina inşa edilmesine izin verilmedi (tek istisna Eyfel Kulesi). Sonuç olarak, kısa sürede ABD yüksek binalar inşasında liderliği aldı. İlk gökdelenler 1880’lerde Chicago’da Beaux-Arts veya neoklasik tarzda inşa edildi. 1920’lerde New York mimarları, Chrysler Binası ve Empire State Binası’nı inşa etmek için yeni Art Deco stilini kullandı. Empire State Binası kırk yıl boyunca dünyanın en yüksek binası oldu. Gökdelenlerin iç ve dış dekorasyonu klasik Art Deco stilindeydi; geometrik şekiller ve zikzak desenler içeriyordu. Chrysler Binası, Gotik katedraldeki geleneksel gargoyle’ları bina köşelerinde Chrysler radyatör süsleri şeklindeki heykellerle güncelledi."
 gaudi.32.g: "Stilli gökdelenler."
 gaudi.33.t: "Art Deco Havaalanı"
 gaudi.33.d: "Lüks Art Deco tarzında yeni bir havaalanı, dünyanın dört bir yanından gelen yolcuları ağırlıyor ve yabancılara ülkemizin büyüklüğünü ilk andan gösteriyor."
 gaudi.33.f: "Yeni yüzyılın başında, havaalanları ilerlemenin sembolüydü: uzun süre insanlık için ulaşılamaz bir rüya olarak görülen gökyüzü fethedildi. Pilotlar yarıştı, rekorlar kırdı ve dünyayı dolaşmayı denedi; bunlarda antik kahraman ideali en son teknoloji ile birleşiyordu. Aynı zamanda yolcu uçuşu bir statü sembolüydü. Zarif ve lüks ona yapıştı. Art Deco havaalanları bu konuyu ele aldı ve dekorasyonlar veya devasa boyutlar aracılığıyla etkileyici bir imgeye dönüştürdü."
 gaudi.33.g: "Howard Hughes bundan gurur duyardı."
 gaudi.34.t: "Art Deco Ofisi"
 gaudi.34.d: "Yeni bir devlet binası bugün açıldı. Oyunlu cephesi Art Deco stilinin zaferini ilan ediyor."
 gaudi.34.f: "Her şeyden önce, Art Deco stili bolluk ve lüks ile ilişkilendirilen kurumlarla bağlantılıydı; ticari binalar, borsalar, sinemalar ve tiyatrolar gibi. Ancak zamanla, bu stil devlet kurumlarına da yayıldı. Belediye binaları, adliye binaları ve devlet binaları – posta ofisleri gibi – kısa süre içinde bu stili benimsedi."
 gaudi.34.g: "Artık sıradan yazı odaları değil!"
 gaudi.50.t: "Bir Art Deco rüyası"
 gaudi.50.d: "[ROOT.GetCountry.GetName], modern ve lüks mimarinin parlayan bir örneği haline geldi. Bu, tüm dünyanın imrendiği bir statüdür!"
 gaudi.50.f: "'Tout sert au luxe, aux plaisirs de ce monde.\nO le bon temps que ce siecle de fer !\nLe superflu, chose tres necessaire,\nA reuni l’un et l’autre hemisphere.\n\nLüks ve hazlar yükselir;\nBu demir çağ mutlu günler getirir.\nGereksiz ama gerekli şeyler ortaya çıkar;\nHer iki yarımküreyi birleştirmiştir.'\n- Voltaire"
 gaudi.50.g: "Başka bir dünyaya coşku dolu yolculuk!"
 gaudi.60.t: "Yazlık Saray’ın Yakılması"
 gaudi.60.d: "Ordumuzun yüksek rütbeli subayları, ülkemizden bazı vatandaşların yakalanıp öldürülmesinin ardından misilleme çağrısında bulunuyor. Artık hiçbir Çinli, yurttaşlarımıza göz dikmemelidir!"
 gaudi.60.f: "'Dünyanın bir köşesinde, dünyanın harikalarından biri vardı; bu harika Yazlık Saray olarak adlandırılıyordu. Sanatın iki ilkesi vardır: Avrupa sanatını üreten Fikir ve doğu sanatını üreten Hile. Yazlık Saray, hileli sanat için Parthenon neyse o kadardı. Devasa ve bilinmeyen bir başyapıt gibiydi, uzaktan alacakaranlıkta, Asya uygarlığının silueti gibi Avrupa uygarlığının ufkunda görülen.\nBu harika yok oldu.\nBir gün iki haydut Yazlık Saray’a girdi. Biri yağmaladı, diğeri yaktı. Zafer, hırsız bir kadın olabilir, öyle görünüyor. Yazlık Saray’ın tahribatı, iki galibin birlikte hareket etmesiyle gerçekleşti. Galiplerden biri ceplerini doldurdu; diğeri bunu görünce kasalarını doldurdu. Ve kol kola Avrupa’ya geri döndüler, gülerek. İşte iki haydudun hikayesi.\nBiz Avrupalılar medeniyiz ve Çinliler bizim için barbar. Medeniyet barbarlığa bunu yapmıştır.' - Victor Hugo"
 gaudi.60.g: "Yakın gitsin!"
 gaudi.60.h: "Bunu sadece barbarlar düşünebilir."
 gaudi.61.t: "Yazlık Saray yakıldı!"
 gaudi.61.d: "Dünya tarihinin en barbarca eylemlerinden birinde, düşman Qing Hanedanı’nın imparatorluk konutunu yağmaladı ve Yazlık Saray’ı ateşe verdi!"
 gaudi.61.g: "Gerçekten gözyaşı vadisinden geçiyoruz..."
 gaudi.62.t: "Big Ben’in Yakılması"
 gaudi.62.d: "İntikam tatlıdır."
 gaudi.62.f: "'Kalabalık sessizdi, hoşnut gibiydi; rüzgar geldiğinde ıslık çaldı, teşvik ediyormuş gibi: \"Lordlar Evi için bir parıltı (biz buna shine diyoruz).\"—\"Poor-Law Kanunu için bir hüküm!\"—\"İşte onların yasaları\" (eylemleri)! Bu tür ünlemler baskın görünüyordu. Kimse görmediği için üzgün bir adam.' - Thomas Carlyle"
 gaudi.63.t: "Westminster Parlamentosu yakıldı!"
 gaudi.63.d: "Dünya tarihinin en barbarca eylemlerinden birinde, düşman İngiliz Parlamentosu’nu yağmaladı ve Big Ben’i ateşe verdi!"
 gaudi.100.t: "Uyuyan dev"
 gaudi.100.d: "Romantizm akımı çerçevesinde Orta Çağ’ın idealize edilmesi, giderek daha fazla insanın Köln Katedrali’nin tamamlanmasını ulusal bir görev olarak görmesine yol açtı."
 gaudi.100.f: "1770’te Johann Wolfgang von Goethe, Gotik Strazburg Katedrali’nden büyülenmişti ve böylece Gotik mimari tarzının romantik temelli yeniden keşfini tetikledi. Daha sonra, yazarlar Köln Katedrali’ni hâlâ tamamlanmayı bekleyen bir sanat eseri olarak yücelttiler. Nihayetinde, Katolik yazar Joseph Görres 1814’te katedrali ulusal bir kutsal mekân olarak övdüğünde tartışmayı başka bir boyuta taşıdı ve onu arzulanan Alman ulus devletinin sembolü haline getirdi. Köln merkezli sanat tüccarı Sulpiz Boisserée, katedralin tamamlanması için yürütülen ısrarlı kampanyaların merkezindeydi. Çabaları, 1814 ve 1816’da kendisi ve Georg Moller’in katedralin batı cephesine temel teşkil eden 1370 tarihli cephe planını yeniden keşfetmeleriyle ivme kazandı. Boisserée, 1821 ile 1831 yılları arasında katedralin tamamlanmış hâlini gösteren bir dizi gravür yayımladı. Bu çalışma, Almanya genelinde katedral inşasına yönelik coşkuyu önemli ölçüde artırdı. O dönemde özgün bir Alman mimari tarzı olarak anlaşılan Gotik’in romantik bir yeniden yorumlanışı ve katedralin Alman ulusal anıtı olarak stilize edilmesi, nihayetinde Prusya Veliaht Prensi Friedrich Wilhelm’i katedral projesine kazandırdı. Başlangıçta Köln’e özgü bir fikir olan katedralin tamamlanması düşüncesi böylece Prusya’nın ve hatta tüm Almanya’nın meselesi haline geldi ve ilk kez gerçekçi bir seçenek oldu."
 gaudi.100.g: "O, görkemli bir adamdır."
 gaudi.101.t: "Birinci İnşaat Aşaması başlıyor"
 gaudi.101.d: "Köln Katedrali’nin ikinci temel taşı bugün görkemli bir törenle konuldu."
 gaudi.101.f: "4 Eylül 1842’de, Prusya Kralı IV. Friedrich Wilhelm ile dönemin piskopos yardımcısı ve daha sonra başpiskopos olacak Johannes von Geissel, katedralin inşaatına devam edilmesi için temel taşı koydu. Taş, henüz tamamlanmamış güney kulesine çıkarılıp orada duvara örüldü."
 gaudi.101.g: "Yeni bir inşaat aşaması başlıyor."
 gaudi.102.t: "Birinci İnşaat Aşaması tamamlandı"
 gaudi.102.d: "Köln Katedrali’nin birinci inşaat aşamasını tamamladık."
 gaudi.102.f: "Katedralin tamamlanması için temel taşının konmasından sadece altı yıl sonra, nefin ve transeptin tüm yan nefleri tonozlandı ve ana nefler triforyumun üzerine yükseltildi. Triforyumun üzerine, altı açık bir çatı makası kuruldu; böylece yukarıda devam eden çalışmalara rağmen nef ve transept alanları kullanılabildi."
 gaudi.102.g: "Hadi iyi çalışmaya devam edelim."
 gaudi.103.t: "İkinci İnşaat Aşaması başlıyor"
 gaudi.103.d: "Ustalarımız katedralin güney cephesini inşa etmeye ve süslemeye başladı."
 gaudi.103.f: "Orta Çağ’da ustalar koroyu tamamlamışlardı ancak nef ve transepti ihmal etmişlerdi. Bu kısımlardaki inşaat ilerledikten sonra, artık uzun kenarlardaki büyük cephelerin tasarımına odaklanılabiliyordu; kuzey cephesi daha sade tutulurken güney cephesi daha zengin işlendi."
 gaudi.104.t: "İkinci İnşaat Aşaması tamamlandı"
 gaudi.104.d: "Köln Katedrali’nin ikinci inşaat aşamasını tamamladık."
 gaudi.104.f: "Güney cephesi, planlarını Karl Friedrich Schinkel, Sulpiz Boisserée ve IV. Friedrich Wilhelm ile uyumlu hale getiren başmimar Ernst Friedrich Zwirner tarafından tasarlandı. 1842-1855 yılları arasında inşa edilen bu cephe, bugün neo-Gotik’in en önemli ve en sanatsal açıdan kusursuz eserlerinden biri kabul edilmektedir. Cephede solda Ursula Kapısı, ortada Çile Kapısı ve sağda Gereons Kapısı yer almaktadır."
 gaudi.105.t: "Üçüncü İnşaat Aşaması başlıyor"
 gaudi.105.d: "Çeşitli tartışmaların ardından mühendislerimiz katedral çatısı üzerinde çalışmaya başladılar."
 gaudi.105.f: "Orta Çağ’da tamamlanmış kısımlarda olduğu gibi ahşap çatı makaslarını savunan birçok destekçiye rağmen, başmimar Ernst Friedrich Zwirner, çatıyı ve geçiş kulesini demir yapılardan inşa ettirdi. Bu modern inşaat için ileri sürdüğü gerekçeler, maliyet tasarrufu, daha düşük ağırlık ve daha az yangın yüküydü."
 gaudi.106.t: "Üçüncü İnşaat Aşaması tamamlandı"
 gaudi.106.d: "Köln Katedrali’nin üçüncü inşaat aşamasını tamamladık."
 gaudi.106.f: "1863’te, kuleler arasındaki bölüm dışında nef ve transept tamamlandı. Yüzyıllar boyunca tamamlanmış koro ile yarım kalmış kısmı ayıran geçici duvar yıkılabildi ve katedralin neredeyse tüm iç mekânı ilk kez deneyimlenebildi."
 gaudi.107.t: "Dördüncü İnşaat Aşaması başlıyor"
 gaudi.107.d: "Köln Katedrali’nin güney kulesinde şehrin simgesi haline gelmiş olan geç ortaçağ vinci bugün kaldırıldı."
 gaudi.107.f: "Nef ve transeptin tamamlanmasının ardından kuleler nihayet tamamlandı. O dönemde 500’den fazla kişiyi istihdam eden Dombauhütte, en modern inşaat teknolojilerini kullandı; örneğin, şantiyede raylar üzerinde hareket eden vinç vagonları ya da buharlı makineler."
 gaudi.108.t: "Köln Katedrali tamamlandı"
 gaudi.108.d: "Bugün mimarlık ve Alman kültürü için görkemli bir gün: Köln Katedrali onlarca yıllık çalışmanın ardından tamamlandı. Gerçekten de Gotik ustalarını aştık!"
 gaudi.108.f: "Katedral nihayet tamamlandığında, 157 metreden yüksek iki kulesiyle dünyanın en yüksek binasıydı – inşası sırasında 600 yıl önce, yaklaşık 1280/90’da hazırlanmış olan Orta Çağ cephe planına büyük ölçüde sadık kalınmıştı. Ancak sanayi çağının bir ürünü olan Eyfel Kulesi, tamamlandıktan sonra Orta Çağ’da öngörülmüş bu yüksekliği aşacaktı."
 gaudi.108.g: "Ve ait olduğu yer orası!"
 gaudi.109.t: "Köln kaybedildi!"
 gaudi.109.d: "Kuzey Ren bölgesinin kaybıyla, Köln Katedrali’nde inşaata devam etme şansımızı tamamen yitirdik."
 gaudi.109.f: "Herhangi bir sebeple Kuzey Ren bölgesi kaybedilirse, inşaat ilerlemesi tamamen yok olmayacaktır. Bir başka ulus, eğer Alman birincil kültürüne sahipse, katedrali son kaldığı aşamadan devam ettirebilir. Yabancı istilacılar ise inşaatla ilgilenmeyecektir."
 gaudi.109.g: "Köln’ü onlara uzun süre bırakamayız!"
 gaudi.111.t: "Kalitesiz malzeme"
 gaudi.111.d: "Köln Katedrali için gelen son malzeme teslimatı kötü çıktı."
 gaudi.111.f: "İlk incelemede, getirilen taşların gözenekli olduğu fark edildi. Başmimar bu sevkiyatı hiç tereddüt etmeden reddetti. Bu elbette inşaatı geciktirecek ve ek maliyetlere yol açacaktı, fakat sonunda kalite üstün gelecektir. Aynı zamanda, sadece maliyet ve zaman sebepleriyle taşı kullanmamız gerektiğini, hatta eldeki daha iyi malzemelerin bir kısmını başka amaçlarla gelir sağlamak için ayırmamız gerektiğini söyleyenler de var."
 gaudi.111.g: "Kalitenin bir bedeli vardır."
 gaudi.111.h: "Sanki kim fark edecekmiş gibi."
 gaudi.112.t: "Özensiz inşaat"
 gaudi.112.d: "Kalitesiz malzeme etkisini gösterdi: bu sabah Köln Katedrali’nin bir bölümü çöktü ve ciddi hasara yol açtı."
 gaudi.112.f: "Köln Kilisesi yıkılıyor,\nyıkılıyor, yıkılıyor,\nKöln Kilisesi yıkılıyor,\nbenim güzel hanımım!"
 gaudi.112.g: "Bunu kim öngörebilirdi ki?"
 gaudi.113.t: "Daha hızlı inşaat ilerlemesi"
 gaudi.113.d: "Köln Katedrali’ndeki çalışmalar beklenenden daha iyi ilerliyor. Programın birkaç ay önünde olmayı bekliyoruz."
 gaudi.113.f: "Modern teknoloji, hızlı iş süreçleri, kesintisiz malzeme tedariki ve iyi hava koşulları inşaat ilerlemesini destekliyor."
 gaudi.113.g: "Ben öyle olacağını söylemiştim!"
 gaudi.114.t: "Kaza"
 gaudi.114.d: "Köln Katedrali şantiyesinde korkunç bir kaza yaşandı. Bazı işçiler yaralandı, bazıları ise hayatını kaybetti!"
 gaudi.114.f: "Ne yazık ki en iyi inşaat yönetmelikleri bile kazaları tamamen engelleyemez – özellikle bazı malzemeler birkaç yılı aşmışsa."
 gaudi.114.g: "Ne büyük bir trajedi!"
 gaudi.115.t: "Yeni işler"
 gaudi.115.d: "Katedralin inşası Köln’e büyük bir insan akınına yol açtı."
 gaudi.115.f: "Orta Çağ’da olduğu gibi, katedral inşası şehir yaşamında birçok yeni ihtiyaca yol açtı ve bunların çoğu yalnızca yeni işçilerle karşılanabilirdi. Sadece inşaat işçilerinin işe alınması gerekmiyordu; onlar aynı zamanda restoranlara, dükkânlara, tedarikçilere ve yeni apartmanların inşasına da bağımlıydılar – ki bunları da birilerinin inşa etmesi gerekiyordu. Bu durum Köln’de bir canlanma yarattı ve bazıları bundan doğrudan ya da dolaylı olarak faydalanmak istiyor."
 gaudi.115.g: "Büyük bir proje büyük insanlar gerektirir."
 gaudi.116.t: "Katedral üzerine siyasi tartışma"
 gaudi.116.d: "Herkes Köln Katedrali’nin tamamlanmasına sıcak bakmıyor. Bir işçi lideri bugün bu 'israfı' açıkça eleştirdi."
 gaudi.116.f: "'Ve size soruyorum, beyler – devleti bu korkunç harcamalara iten nedir, ki bu sadece ruhban sınıfını, milliyetçiliği ve kapitalizmi güçlendiriyor? Güçlüler prestijlerini artırıyor, zenginler inşaata katılarak kârlarını çoğaltıyor, Kilise ise işçilerin kafasına hurafeleri ve gericiliği yerleştiren kurum olarak bu gerici politikadan güçlenerek çıkıyor. Peki, size soruyorum, bu lüks ve israf dolu hayali sarayları kim inşa ediyor? Doğru, sıradan işçi! İnşaat kazalarında sakatlanan, eziyet gören ya da ölen sıradan emekçi – ve tek ödülü, var olmayan bir cennet krallığının vaadi. Bu Orta Çağ katedrali bu ulusta yanlış giden her şeyin temsilidir!'"
 gaudi.116.g: "Ve hava durumu raporu?"
 gaudi.116.h: "Aslında haksız değil."
 gaudi.117.t: "Katedrale siyasi destek"
 gaudi.117.d: "Bugün küçük burjuvaziden vatansever bir temsilci, Köln Katedrali’nin inşasını destekleyen ateşli bir konuşma yaptı."
 gaudi.117.f: "'Beyler, hainlerin, kıskançların ve dar görüşlülerin itirazlarını dinlemeyin. Köln Katedrali’nin yakında tamamlanmasıyla ulusumuz eski çöküşten kurtulmuş olacak ve atalarının izinden gidecektir. Hangi ülke bugüne kadar böyle bir büyük projeyi hayata geçirdi? Bunun için Orta Çağ’daki katedral inşaatçılarına – hatta piramitleri yapanlara kadar gitmek gerek. Tarih yazıyoruz. Ve gelecekteki nesiller, o devasa kulelere baktıklarında, o gün doğru kararı verdiğimizi hatırlayacak. Bir katedral yalnızca bir kilise değildir. O bir anıttır, ilham kaynağıdır; önümüzdeki onlarca yıl ve yüzyıllar boyunca birçok Alman’a yeni şeyler yapma ilhamı verecek!'"
 gaudi.117.g: "Bravo! Çok güzel konuştun!"
 gaudi.117.h: "Bunu daha fazla destek sağlamak için kullanmalıyız."
 gaudi.118.t: "Ulusal mı yoksa dini mi bir proje?"
 gaudi.118.d: "Parlamentoda şu anda Köln Katedrali’nin öncelikle ulusal mı yoksa dini bir yapı mı olduğu konusunda ciddi bir tartışma yaşanıyor."
 gaudi.118.f: "Orta Çağ yapısının tamamlanması fikri ilk gündeme geldiğinden beri katedralin Almanlar için bir 'birleşmiş' halk olarak önemi büyüktü. Orta Çağ, birçokları tarafından Alman ulusu için bir özdeşleşme noktası olarak görülüyordu; çünkü Kutsal Roma İmparatorluğu, özellikle de Salianlar ve Stauferler döneminde, Almanya’nın zirvesi olarak kabul ediliyordu. Diğerleri ise bunun Hristiyan fikrini sulandırmak olduğunu düşündü. Ne de olsa katedral yalnızca bir kilise değil, aynı zamanda Almanya’nın en güçlü piskoposlarından birinin makamıydı. Köln’ün Hristiyan tarihi Roma İmparatorluğu’na dayanıyordu ve Tanrı ile ulus arasındaki soru çoğu zaman birleştirici değil, ayrıştırıcı eğilimlere yol açabiliyordu."
 gaudi.118.g: "Bu ulusal bir projedir."
 gaudi.118.h: "Bu hem ulusal hem de dini bir projedir."
 gaudi.118.i: "Bu dini bir projedir."
 gaudi.119.t: "Katedral inşaatı piyangosu"
 gaudi.119.d: "Katedral inşaatı piyangosu bu yıl öyle olağanüstü kazanç sağladı ki, katedral inşaatı beklenenden çok daha hızlı ilerleyebilecek."
 gaudi.119.f: "Başlangıçta, baş usta Zwirner, nef tamamlanması için 1,2 milyon taler ve payandalar için de aynı miktarı tahmin etmişti. Bu temel alınarak yıllık inşaat maliyetleri 100.000 taler olarak hesaplandı; bunun yarısını Prusya kralı inşaat fonu ile karşılamak istedi. Kalan inşaat maliyetlerini toplamak için, Köln’de Merkezi Katedral İnşaat Derneği (Zentral-Dombau-Verein) kuruldu ve başlangıçta katkılarla finanse edildi. İç mekan 1863’te tamamlandığında, aynı mali akışın devam etmesi durumunda bitirmenin 50 yıl süreceği öngörüldü. Bu nedenle dernek 1864’te katedral piyangosu kurmaya karar verdi ve bu iyi bir gelir kaynağı oldu. Genel olarak, Dombau-Verein tüm maliyetlerin yaklaşık %60’ını karşıladı; devlet yalnızca katedral inşaat maliyetlerinin yaklaşık %32’sine katıldı."
 gaudi.119.g: "Büyük ikramiye!"
 gaudi.120.t: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName] katedrale destek veriyor"
 gaudi.120.d: "[SCOPE.sCharacter('gaudi_ruler').GetFullName] romantik akıma büyük kişisel ilgi duyuyor. Bu nedenle katedralin inşaatına kişisel bir bağışta bulundu."
 gaudi.120.f: "Tarihsel açıdan, Köln Katedrali’nin inşası da bir ölçüde Tanrı korkusu ile bilinen ve romantizmle ilişkilendirilen Kral Friedrich Wilhelm IV’ün kişisel girişimine dayanıyordu. Hayatı boyunca sanat ve mimarlığa büyük ilgi göstermiştir."
 gaudi.120.g: "Yaşasın iyi [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName]!"
 gaudi.121.t: "Gezilecek yer turu"
 gaudi.121.d: "Köln Katedrali hâlâ inşaat halinde, ama ilerleme kayda değer. Bir müttefikimizi davet edip her şeyi göstermeliyiz."
 gaudi.121.f: "Tamamlanmamış bir yapı olsa bile, Köln Katedrali ziyaretçileri etkiledi ve hayal güçlerini harekete geçirdi. Bu, katedralin on yıllar boyunca tekrar bir inşaat alanı olduğu dönemde de geçerliydi. Robert Schumann, inşaatın devamını görünce 3. senfonisini yazmaya ilham aldı ve Kraliçe Victoria, ziyaret sırasında projeyi gezip bilgilendirildi."
 gaudi.121.g: "Müttefikimizi Köln’ü görmeye davet et."
 gaudi.121.h: "Bu sadece çabalarımızı bozacaktır."
 gaudi.122.t: "Köln Katedrali’ne bağış?"
 gaudi.122.d: "Elçimiz, Köln Katedrali inşaat alanını gezmeye davet edildi. Bu etkileyici bir gezi oldu ve şimdi elçi, katedral için bağışçı olarak uluslararası prestij kazanmak isteyip istemeyeceğimizi soruyor."
 gaudi.122.f: "Tamamlanmamış bir yapı olsa bile, Köln Katedrali ziyaretçileri etkiledi ve hayal güçlerini harekete geçirdi. Bu, katedralin on yıllar boyunca tekrar bir inşaat alanı olduğu dönemde de geçerliydi. Robert Schumann, inşaatın devamını görünce 3. senfonisini yazmaya ilham aldı ve Kraliçe Victoria, ziyaret sırasında projeyi gezip bilgilendirildi."
 gaudi.122.g: "Bu muhteşem proje desteklenmeli."
 gaudi.122.h: "Nihayetinde o kadar da büyük değil."
 gaudi.123.t: "Müttefikten bağış"
 gaudi.123.d: "Bir turun ardından, müttefikimizin elçisi o kadar heyecanlandı ki, proje için bağışçı olarak kendini sunmaya karar verdi."
 gaudi.123.f: "Tamamlanmamış bir yapı olsa bile, Köln Katedrali ziyaretçileri etkiledi ve hayal güçlerini harekete geçirdi. Bu, katedralin on yıllar boyunca tekrar bir inşaat alanı olduğu dönemde de geçerliydi. Robert Schumann, inşaatın devamını görünce 3. senfonisini yazmaya ilham aldı ve Kraliçe Victoria, ziyaret sırasında projeyi gezip bilgilendirildi."
 gaudi.123.g: "Gerçek dostlar hemen tanınır."
 gaudi.124.t: "Köln’de yeni makineler"
 gaudi.124.d: "En son teknolojiyi kullanan makineler, Köln Katedrali’nin zahmetli inşaatını aylarca hızlandırıyor."
 gaudi.124.f: "Özellikle buharlı makinelerin kullanımı, malzemeleri katedralin üst seviyelerine taşımada yardımcı oldu. Ancak diğer birçok teknolojik gelişme de işleri Orta Çağ’dakinden çok daha verimli hale getirdi."
 gaudi.124.g: "Bu ilerleme demek!"
 gaudi.125.t: "Demiryolu katedrale taşımayı kolaylaştırıyor"
 gaudi.125.d: "Köln çevresinde demiryolunun kurulması, katedral inşaatının birkaç ay hızlanmasını sağladı."
 gaudi.125.f: "Malzemenin Köln’e klasik rotası Ren Nehri ile taşımaydı. Takip eden yıllarda, büyük miktarların katedral şehrine ulaştırılması için tercih edilen yöntem olarak kaldı. Ancak artan demiryolu trafiği, tedarik yollarının acil durumda değişebilmesini veya insanların ve makinelerin daha hızlı taşınabilmesini de sağladı."
 gaudi.126.t: "Fırtınalı hava"
 gaudi.126.d: "Bir fırtına, Köln’deki katedral çalışmalarımızı haftalarca geri attı."
 gaudi.126.f: "Dün gece Köln’e bir gök gürültüsü fırtınası vurdu. Rüzgar branda ve iskeleleri devirdi, bazı gargoyle ve heykellere zarar verdi."
 gaudi.126.g: "Bir kuyruklu yıldızı tercih ederdim."
 gaudi.127.t: "Köln’de arkeolojik araştırmalar"
 gaudi.127.d: "Köln ziyareti sonrasında, [SCOPE.sCharacter('gaudi_archaeologist').GetFullName], katedralin görünüşe göre Roma kalıntıları üzerine inşa edildiğini keşfetti. Kazı izni talep ediyor."
 gaudi.127.f: "Köln, Almanya'nın en eski şehirlerinden biridir ve Roma İmparatorluğu'nda önemli bir koloni olmuştur. Roma mirası, hem belediye örgütlü komünde hem de Aziz Peter'a yapılan Hristiyan referansı ve Roma'nın kızı olarak stilizasyonunda Köln'ün kentsel bilincinde etkili olmaya devam etmiştir. Şehir merkezinin Roma kalıntıları üzerine inşa edildiği kanıtlanmış, bazı sokaklar bile korunmuştur. Ancak yoğun yapılaşma nedeniyle kimse kazı yapmaya cesaret edememiştir. Katedral yakınında yapılacak bir kazı inşaat çalışmalarını önemli ölçüde etkileyebilir, ancak arkeoloğumuzun değerli deneyim kazanmasına yardımcı olabilir."
 gaudi.127.g: "Böyle uzun bir inşaat duraklamasını göze alamayız."
 gaudi.127.h: "Eşsiz bir arkeolojik fırsat."
 gaudi.200.t: "Alfred Escher'in Yükselişi"
 gaudi.200.d: "1849'da, sanayici Alfred Escher ilk kez Ulusal Konsey Başkanı olarak seçildi. Politikacı, bankacı, önemli bir demiryolu şirketi yöneticisi ve Gotthard tünelinin uygulayıcısı olarak, İsviçre tarihinin en etkili figürlerinden biri olacaktı."
 gaudi.200.f: "Johann Heinrich Alfred Escher vom Glas, Alfred Escher olarak bilinir, İsviçreli bir politikacı, iş lideri ve demiryolu girişimcisiydi. Çok sayıda siyasi görevi ve İsviçre Kuzeydoğu Demiryolu, İsviçre Federal Politeknik, İsviçre Kredi Enstitüsü, İsviçre Hayat Sigortası ve Emeklilik Fonu ile Gotthard Demiryolu Şirketi’ndeki kuruculuk ve yönetim faaliyetleri sayesinde, Escher 19. yüzyılda İsviçre’nin siyasi ve ekonomik gelişimini başka hiçbir kişi gibi etkilemiştir."
 gaudi.200.g: "İsviçre’ye büyük hizmet edecek."
 gaudi.200.h: "Bu adam çok tehlikeli."
 gaudi.201.t: "Alfred Escher’in Güç Kaybı"
 gaudi.201.d: "Gotthard demiryolu inşası, Alfred Escher’in kapasitesini zorladı. Rakipleri, önce Schweizer Kreditanstalt başkanlığından, sonra da Gotthard demiryolu şirketi başkanlığından çekilmesini sağlamak için fırsat buldu."
 gaudi.201.f: "Çok sayıda siyasi görevi ve Nordostbahn ile Kreditanstalt iş temelleri sayesinde, Escher olağanüstü bir güç sahibi olmuş ve 'I. Kral Alfred' unvanını almıştır. Bu üstünlük eleştirmenleri sahneye çekti. Demokratik hareket, halkın siyasi konularda daha fazla söz hakkı talep etti. Alfred Escher çevresindeki yeminli politikacı çevresi - 'Escher sistemi' - demokratların ilan edilmiş düşmanı haline geldi. Bu, broşürler ve halk toplantıları ile mücadele edildi ve sonuçta etkisi zayıfladı. 1870’lerde Kuzeydoğu Demiryolu’nun giderek mali krize girmesi durumu daha da zorlaştırdı."
 gaudi.201.g: "Düşüşü yakın mı?"
 gaudi.202.t: "Alfred Escher’in Ölümü"
 gaudi.202.d: "Alfred Escher, belki de 19. yüzyılda İsviçre üzerinde en büyük etkiye sahip kişi, bugün vefat etti."
 gaudi.202.f: "Kendisine yapılan saldırıların yanı sıra, Escher sağlık sorunlarıyla da uğraşmak zorunda kaldı. Hayatı boyunca sürekli hasta oldu ve uzun tedavilerle iyileşmek zorunda kaldı. Hastalıklara yatkınlığı ağır iş yüküyle uyumlu değildi. Gotthard projesinin kritik aşamasında neredeyse kendini öldürecek kadar çalıştı. Sürekli sağlık iniş çıkışları: astım, ateş, göz problemleri, çıbanlar. Ancak bu, Escher’in siyasi ve ekonomik görevlerini mümkün olduğunda yerine getirmesini engellemedi. Kasım 1882 sonunda tekrar ciddi şekilde hasta oldu. 6 Aralık 1882 sabahı, Alfred Escher 'Belvoir' mülkünde vefat etti."
 gaudi.202.g: "İsviçre’yi modern çağa taşıdı."
 gaudi.211.t: "Gotthard Demiryolu Planlaması"
 gaudi.211.d: "Gotthard projesi için planlamaya başladık. Arazi ölçümleri ve güzergah belirlemenin yanı sıra, yabancı bağışçı arayışı ve mali destek sağlamak için bir şirket kurulmasını da kapsıyor."
 gaudi.211.f: "1852’de federal demiryolu ofisi başkanı Gottlieb Koller, Gotthard masifi üzerinden bir demiryolu hattı inşa etmek için ilk projeyi sundu ve 19 Ağustos 1853’te dokuz kantondan oluşan ilk Gotthard komitesi kuruldu. Mühendis Koller, Flüelen’den Langen Gölü’ne ilk güzergah projesini geliştirdi. 1861’de Zürihli mühendis Kaspar Wetli, sadece beş ayda Erstfeld’den Lugano’ya giden güzergahı ölçtü, bu bugün hâlâ bir ölçüm teknolojisi şaheseri olarak kabul edilmektedir."
 gaudi.211.g: "Dev bir görev."
 gaudi.212.t: "Planlama tamamlandı"
 gaudi.212.d: "Gotthard demiryolu inşaatı için planlama ve hazırlıklar tamamlandı. Doğru ön koşullar sağlandığında, inşaata başlanabilir."
 gaudi.212.f: "Gotthard yanlıları ile Lukmanier ve Splügen varyantlarını savunanlar arasındaki sert tartışmaların ardından, 1863’te mühendisler Wetli ve Koller tarafından Gotthard altındaki bir tünel fikri ilk kez sunuldu. Zürih merkezli İsviçre Kuzeydoğu Demiryolu başkanı Alfred Escher sonunda güzergahı onayladığında karar verilmiş oldu. Ayrıca Gotthard güzergahı en kısaydı. Escher şöyle diyor: 'Uzun zamandır İsviçre ve komşu ülkelerimizde demiryolu ağının tasarımı sonucu, Gotthard üzerinden bir demiryolunun Graubünden’deki bir Alpler geçidi üzerinden bir demiryolundan çok daha faydalı olacağına ikna oldum.'"
 gaudi.212.g: "Zor kısım şimdi başlıyor..."
 gaudi.213.t: "Gotthard Demiryolu İnşaatı"
 gaudi.213.d: "Gotthard masifi üzerindeki inşaat çalışmaları - kuzeyde Göschenen yakınlarında ve güneyde Airolo yakınlarında - başladı. Gotthard demiryolu şirketi, çoğunlukla İtalya’dan olmak üzere binlerce işçi işe aldı."
 gaudi.213.f: "Yalnızca altı haftalık son derece kısa bir başvuru süresinin ardından, Gotthard tünelinin inşası için yedi teklif alındı. Louis Favre’nin Cenevre merkezli şirketi 'Entreprise du Grand Tunnel du Gothard' ihaleyi kazandı. En büyük rakip, Severino Grattoni’nin yönettiği İtalyan şirketi 'Società Italiana di Lavori Pubblici' idi. Grattoni, daha önce dünyanın en uzun tüneli olan 12 kilometrelik Mont Cenis demiryolu tünelini inşa etmişti. Ayrıca Gotthard ile ilgilenmiş, jeolojiyi incelemiş ve deneme sondajları yapmıştı. Favre ise 1.000 metreden daha uzun bir tünel hiç inşa etmemişti; rakiplerinin fiyatını kırdı, yıkıcı sözleşme şartlarını kabul etti ve 8 milyon İsviçre frangı teminat yatırdı. Sekiz yıllık bir inşaat süresi vaat etti – bilinmeyen jeoloji göz önünde bulundurulduğunda riskli bir girişim."
 gaudi.213.g: "Favre bu tarihi eserin parçası olacak kadar şanslı olmalı."
 gaudi.214.t: "Gotthard Demiryolu tamamlandı!"
 gaudi.214.d: "Bugün ülkemiz için büyük bir gün: Gotthard demiryolunun tamamlanmasıyla sadece Kuzey ve Güney Avrupa birbirine bağlanmakla kalmadı, İsviçre de uluslararası demiryolu trafiğinin kavşağı haline geldi."
 gaudi.214.f: "'Aslında dağlardan nefret ederim, çünkü soğukturlar ve gökyüzünden parçalar koparırlar, yani ışık küresinden, ufku daraltırlar. Şimdiki en sevdiğim hayal, Gotthard’ı ve tüm Alpleri kuzeyde dinamit ile havaya uçurmak, böylece doğrudan İtalyan havasını alabilmektir.' – Carl Spitteler"
 gaudi.214.g: "Yaşasın Gotthardbahn!"
 gaudi.219.t: "Doğu İsviçre kaybedildi!"
 gaudi.219.d: "Doğu İsviçre’nin kaybıyla, Gotthard Demiryolu’nda inşaata devam etme şansımızı tamamen yitirdik."
 gaudi.219.f: "Herhangi bir sebeple Doğu İsviçre kaybedilirse, inşaat ilerlemesi tamamen yok olmayacaktır. Başka bir ulus, tüneli son kaldığı aşamadan devam ettirebilir."
 gaudi.219.g: "Doğu İsviçre’yi onlara uzun süre bırakamayız!"
 gaudi.221.t: "İtalya’dan kredi"
 gaudi.221.d: "Alfred Escher, Milano’da Gotthard demiryolunun inşasına yatırım yapmak isteyen ve hükümetle iyi ilişkileri olan bir dizi İtalyan iş insanıyla görüştü."
 gaudi.221.f: "Gelecekteki Gotthard demiryolu şirketinin güzergâh ağının inşaat maliyetleri, inşaata başlanmadan önce 187 milyon İsviçre frangı olarak tahmin edilmişti. Bu miktarın en büyük kısmı (%54,55) uluslararası sermaye piyasasından sağlanmalıydı; İtalya %24,05, Almanya ve İsviçre ise %10,7’şer oranında sübvansiyon sağladı. Sermaye piyasasında 102 milyon İsviçre frangı toplamak için Alman bankalarının öncülüğünde bir finans konsorsiyumu kuruldu. Bu konsorsiyum, her biri 34 milyon İsviçre frangı toplamakla yükümlü bir Alman, bir İtalyan ve bir İsviçre grubundan oluşuyordu."
 gaudi.221.g: "Her yardım memnuniyetle karşılanır."
 gaudi.221.h: "Yabancılardan yardım istemiyoruz."
 gaudi.222.t: "Almanya’dan kredi"
 gaudi.222.d: "Alfred Escher, Gotthard demiryolunun inşasına yatırım yapmak isteyen ve hükümetle iyi ilişkileri olan bir dizi Alman iş insanıyla görüştü."
 gaudi.222.f: "Gelecekteki Gotthard demiryolu şirketinin güzergâh ağının inşaat maliyetleri, inşaata başlanmadan önce 187 milyon İsviçre frangı olarak tahmin edilmişti. Bu miktarın en büyük kısmı (%54,55) uluslararası sermaye piyasasından sağlanmalıydı; İtalya %24,05, Almanya ve İsviçre ise %10,7’şer oranında sübvansiyon sağladı. Sermaye piyasasında 102 milyon İsviçre frangı toplamak için Alman bankalarının öncülüğünde bir finans konsorsiyumu kuruldu. Bu konsorsiyum, her biri 34 milyon İsviçre frangı toplamakla yükümlü bir Alman, bir İtalyan ve bir İsviçre grubundan oluşuyordu."
 gaudi.223.t: "Gotthardbahn-Gesellschaft"
 gaudi.223.d: "Gotthard Demiryolu Şirketi’nin (Gotthardbahn-Gesellschaft) kuruluşuyla bu iddialı projenin hayata geçirilmesi yolunda önemli bir adım atıldı."
 gaudi.223.f: "Gotthard Demiryolu Şirketi, Gotthard Demiryolu’nu inşa etmek ve işletmek üzere Luzern’de anonim şirket olarak kuruldu. Gotthard demiryolunun finansmanı için yapılan siyasi kararlar ve müzakereler ile şirketin kuruluş öncesi ve ilk inşaat günlerindeki yönetimi esasen Zürih Kantonu Hükümet Konseyi eski Başkanı ve daha sonra üç kez Ulusal Konsey Başkanı olan Dr. Alfred Escher tarafından şekillendirildi. Gotthard projesinin finansmanı neredeyse tamamen İsviçre, kantonları ve 1869’dan itibaren İtalya ile 1871’den itibaren Alman İmparatorluğu tarafından sağlanan devlet sübvansiyonlarıyla güvence altına alındıktan sonra, Gotthard Derneği’nin haklarını devretmesiyle Gotthard Demiryolu Şirketi kuruldu. Alfred Escher başkan, Joseph Zingg ise başkan yardımcısı oldu. Şirket daha sonra Gotthard demiryolunun fiili inşasına girişti."
 gaudi.231.t: "Tünelde su sızıntısı"
 gaudi.231.d: "Gotthard tünelindeki su sızıntısı inşaatın ilerleyişini ve işçilerin hayatını tehdit ediyor."
 gaudi.231.f: "Gotthard masifindeki farklı kaya katmanları sık sık sorunlara yol açtı. Bazen kumlu zeminler geçit vermez kayalarla değişiyor, nadir ama son derece tehlikeli durumlarda ise tünele su ya da kaygan kaya çamuru sızıyor ve bu bazı işçiler için ölümcül oluyordu."
 gaudi.231.g: "Saha güvenliğini sağlamak için gerekeni yapın, güvenlik her şeyden önce gelir."
 gaudi.231.h: "İşçilere fazla mesai ücreti ödeyin, yarığı onarsınlar ama dikkatli olun."
 gaudi.231.i: "Ne pahasına olursa olsun deliği kapatın ve çalışmaya devam edin – kayıplar önemli değil!"
 gaudi.232.t: "Viyadük dayanıklılık testi"
 gaudi.232.d: "İnşaat yönetimi, sayısız viyadük üzerinde yaptığımız çok sayıdaki dayanıklılık testinin gerçekten bu kadar gerekli olup olmadığından emin değil, çünkü bunlar malzeme ve zaman tüketiyor."
 gaudi.232.f: "Gotthard Demiryolu’nu zamanında bitirme baskısı göz önüne alındığında, tüm projeler aynı düzeyde ilgi göremiyor. Örneğin, bazı mühendisler viyadüklerimizden birinde yapılan birden fazla yük testini gereksiz buluyor - yapı yeterince sağlam. Ancak bazı danışmanlarımız, testleri erken durdurmamakta ısrar ediyor; çünkü hasar, çalışmalarımızı aylarca geri atabilir ve itibarımızı lekeleyebilir."
 gaudi.232.g: "Ekstra bir test yapmalıyız."
 gaudi.232.h: "Bu viyadüğün kararsız olacağı konusunda endişem yok."
 gaudi.233.t: "Viyadük çöktü!"
 gaudi.233.d: "Viyadüklerimizden biri bugün çöktü. Görünüşe göre düşündüğümüz kadar güvenli değildi."
 gaudi.233.f: "İsviçre’nin hassasiyet ve titizlik itibarını böyle zedelemeye kim cüret eder?"
 gaudi.233.g: "Hemen söylemiştim, stres testi yapmalıydık!"
 gaudi.234.t: "Daha fazla çalışma molası"
 gaudi.234.d: "Gotthard tüneli işçileri, vardiyalarının çok uzun ve molaların çok kısa olduğunu düşünüyor."
 gaudi.234.f: "Gotthard tünelindeki riskli işlerin yanı sıra, çok kötü hava sirkülasyonu sorunlara yol açtı. Toprağın içi de tünel içinde 33 dereceyi (nadir durumlarda: 40 derece) aştı. Yine de işçiler, günde 8 saatten fazla zorlu ve terli işlerini yapmak zorundaydı."
 gaudi.234.g: "Mola mı? Hah! O tembel İtalyanlar çalışmanın ne olduğunu bile bilmiyor!"
 gaudi.234.h: "Biraz mola, hepsi bu."
 gaudi.234.i: "Mola yerine onlara bonus verin."
 gaudi.234.j: "Düzenli molaları hak ediyorlar."
 gaudi.235.t: "Tünelde baş dönmesi"
 gaudi.235.d: "Gotthard tünelindeki kötü hava kalitesi o kadar kötüleşti ki bazı işçiler baş dönmesinden bayıldı."
 gaudi.235.f: "Gotthard içindeki hava kalitesi alarm verici derecede düşük seviyelere ulaştı. Kazma ve makineler tarafından havaya yayılan toz bunun bir kısmından sorumlu; fakat dinamitle işin geri kalanı yapılıyor. İşçiler, patlamalardan çıkan duman henüz temizlenmeden tünele geri gönderiliyor. Görevlilerden biri tembel grubu tekrar işe çağırmak istedi ama tünel içinde talihsiz bir kalp-damar problemi nedeniyle yere yığıldı."
 gaudi.235.g: "Talihsiz bir durum. Şimdi çalışmaya devam edin!"
 gaudi.235.h: "İşçilerin hayatını riske atması için daha büyük bir teşvik verin..."
 gaudi.235.i: "Daha kısa vardiya değişiklikleri getirin."
 gaudi.236.t: "Fahiş fiyatlar"
 gaudi.236.d: "Gıda, giysi ve diğer ihtiyaçlar için uyguladığımız fiyat politikası, Gotthard tüneli işçileri tarafından şiddetle eleştirildi."
 gaudi.236.f: "Göschenen’de maksimum 1645, Airolo’da 1302 işçi çalıştı, çoğu Piedmont ve Lombardiya’nın fakir kırsal bölgelerinden geliyordu. Madenciler ve işçiler kirli ve kalabalık kulübelerde yaşıyor ve maddi olarak sömürülüyordu. Bir madenci, sekiz saatlik vardiyada yaklaşık 3,90 frank kazanıyordu. Bu ücretin üçte ikisi yiyecek ve konaklama için kesiliyordu, lambalar ve yağları için - günde 30 sent - işçiler kendileri ödemek zorundaydı. Ayrıca giyim için ayda 5 frank ve İsviçre oturma izni için 2 frank kesiliyordu. Kazançların bir kısmı sadece şirketin kendi mağazalarında kullanılabilen kuponlarla ödeniyordu."
 gaudi.236.g: "Bu projede çalışmak zorunda değil. Herkes istediği zaman ayrılabilir!"
 gaudi.236.h: "Onları sömürüyoruz ve fazla mesai için kendi paralarıyla ödüyoruz - mükemmel bir fikir!"
 gaudi.236.i: "Bu etik olmayan uygulamayı yasaklayın!"
 gaudi.237.t: "Kirli kulübeler"
 gaudi.237.d: "Gotthard tüneli işçi kulübelerindeki sefalet öyle bir seviyeye ulaştı ki demiryolu inşaat yöneticileri bir isyanın yakın olduğunu düşünüyor."
 gaudi.237.f: "'Göschenen’de durumu fazla değişmemiş buldum; Favre daireleri tatmin edici, ama son derece yetersiz, vatandaşların özel daireleri kısmen iyi, kısmen idare eder, kısmen kötü; işçi kışlaları, spekülasyonla inşa edilmiş ve kiraya verilmiş, özellikle postanenin yanındaki büyük evde 240 kişi yaşıyor; dış duvarlardan dökülen malzemeler, koridor ve köşelerde yığınlar halinde; odalar ve mobilyalar kir içinde, pencereler sıkıca kapalı, hava korkunç, aslında çoğu ahırdan daha kötü. Bir su borusu özenle yapılmış, ama öyle ki donmuş, yırtılmış, kış boyunca hiç su vermemiş ve hâlâ arızalı, haftalardır ciddi şekilde donmadı.'"
 gaudi.237.g: "Her birine kendi payı düşer."
 gaudi.237.h: "Evlerinde bu kadar hoşlarına gitmiyorsa daha çok çalışsınlar."
 gaudi.237.i: "Bu rezil koşullar medeni bir ülkede hemen kaldırılmalı!"
 gaudi.238.t: "Canlı gömülme"
 gaudi.238.d: "Gotthard tünelinde ciddi bir kaza meydana geldi. Birkaç işçi enkaz altında kaldı. Hayatta kalma şansları bilinmiyor."
 gaudi.238.f: "Gotthard Tüneli inşaatında 199 işçi öldü. Federal Arşivlerdeki kaza listesinde belirtilen 171 ölüden 53’ü vagon veya lokomotifler tarafından ezildi, 49’u taşla vuruldu, 46’sı dinamit ile öldü. 23 kişi diğer yollarla hayatını kaybetti, biri boğuldu. Resmi açıklamalara göre suçlu ya şanstı ya da kurbandı. İzleyen yıllarda yetersiz beslenme, hastalık ve tünel inşaatı sırasında alınan yaralanmalar nedeniyle çok sayıda diğer işçi de öldü."
 gaudi.238.g: "Maalesef, bu işin riski bu. Kazmaya devam!"
 gaudi.238.h: "Onlar için hiçbir şey yapamayız. Gelecekte daha iyi kurallar uygulayın."
 gaudi.238.i: "Bu zavallı ruhları kurtarmak için elinizden geleni yapın!"
 gaudi.239.t: "Tünelde yeni makineler"
 gaudi.239.d: "Yeni teknolojilerin kullanılması, Gotthard tüneli inşaatındaki ilerlememizi önemli ölçüde hızlandırdı."
 gaudi.239.f: "İnşaat yüklenicisi Louis Favre, Mont-Cenis tünelinden Sommeiller tipi ilk sondaj makinelerini devraldı. Bunun için sahada mevcut en önemli darbeli matkapları test etti. Airolo ve Göschenen’deki iki atölye şefi mevcut makineleri geliştirdi: Makinelerin daha az arızalanması ve darbeli matkapların otomatik tahrik ile donatılması gerekiyordu. Atölye yöneticileri Seguin ve Ferroux önemli ilerleme kaydedebildi: Başlangıçta her gün üç makine değiştirilirken, inşaatın sonuna doğru yalnızca her üç günde bir makine değiştiriliyordu. Aynı zamanda, pnömatik darbeli matkapların egzoz havası tüneli az da olsa havalandırmak için kullanılıyordu. Altı sondaj makinesi vagonlara monte edilmişti. Makineler yaklaşık bir metre derinliğinde delikler açıyor, bunlar daha sonra dinamit ile doldurulup patlatılıyordu."
 gaudi.239.g: "İlerlemenin şerefine!"
 gaudi.240.t: "Sendikalar Gotthard projesini eleştiriyor"
 gaudi.240.d: "Parlamentoda bir sendika lideri bugün Gotthard tünelinin inşa edildiği korkunç koşullardan yakındı."
 gaudi.240.f: "Her gün su baskını, fırın sıcağında çalışma, sefil konutlar, fahiş fiyatlar ve günde 4 franktan daha az düşük ücret! Ülkemizde yaşayan birçok köpek, hayatını demiryolu şirketinin kârı için riske atan yüzlerce işçiden daha iyi yaşıyor; talihsiz bir gün dinamitle paramparça edilmeden önce. Toprak sahiplerinin köylülerini sığır gibi sürdüğü günlerin geride kaldığını sanmıştım. Göschenen ve Airolo’da olanlar çok daha kötü görünüyor! Acilen bir şey değişmezse, durumu kötüleştireceğine söz veriyorum!"
 gaudi.240.g: "Bu adam, projemizin önemini anlamıyor mu?"
 gaudi.240.h: "Bazı reformlar gerçekten gerekli olabilir."
 gaudi.241.t: "Escher para bağışlıyor"
 gaudi.241.d: "Gotthard demiryolu inşaatını kişisel olarak önemsediği için Alfred Escher bugün öz sermayesini hattın yapımını ilerletmek için kullandı."
 gaudi.241.f: "Escher sadece Gotthard projesini başından sonuna takip etmekle kalmadı; aynı zamanda şahsen kendini feda etti. Sadece finansal konu değildi. Gotthard Demiryolu için neredeyse ölmek üzere çalıştığı bile söylendi."
 gaudi.241.g: "Teşekkürler, Bay Escher."
 gaudi.242.t: "Gözenekli kaya"
 gaudi.242.d: "Şaşırtıcı derecede yumuşak bir taş, Gotthard tüneli çalışmalarının beklenenden daha iyi ilerlemesini sağladı."
 gaudi.242.f: "Gotthard tüneli inşaatındaki birçok belirsizliğe rağmen, ki bunlar genellikle oldukça hoş olmayan etkiler yaratıyordu, her zaman olumlu sürprizler de vardı."
 gaudi.242.g: "Harika!"
 gaudi.243.t: "Geçilmez kaya"
 gaudi.243.d: "Şaşırtıcı derecede sert bir kaya, Gotthard tüneli çalışmalarının beklenenden daha yavaş ilerlemesine yol açtı."
 gaudi.243.f: "Şantiye yönetimi, Gotthard kütlesindeki değişken kayalarla tekrar tekrar sorunlarla karşılaştı. İnşaat başladığında mühendisler mozaik yapıya neredeyse hiç hazırlıklı değildi. Bu nahoş sürprizlerden ancak zamanla kaçınılabildi. Baş mühendis Robert Gerwig, tüm gerekli jeolojik araştırmaları yapmak üzere Alman madencilik mühendisi Friedrich Moritz Stapff’i görevlendirdi. Önce Airolo’daki inşaat bölümüne atandı, sonra merkezi inşaat yönetiminde jeoloji ve madencilik bölümünün başı oldu. Stapff’in görevleri arasında mevcut jeoloji haritalarını güncellemek, sıcaklık koşulları, su girişi ve kaya durumu gibi jeolojik koşulları gözlemlemek ve böylece inşaatın gecikmesini önlemek vardı. Stapff, tünel ekseni boyunca tüm kaya oluşumlarını kaydetti ve her kaya oluşumu için bir örnek topladı."
 gaudi.243.g: "İyi şeyler zaman alır."
 gaudi.243.h: "İşçiler fazla mesai yapmalı!"
 gaudi.243.i: "Uzun vadeli çözüm için üniversiteden uzmanlar getirin."
 gaudi.244.t: "Muhteşem patlamalar"
 gaudi.244.d: "Ulusal dinamit fabrikalarımızdan biri Gotthard tüneli inşaatının sürekli tedarikçisi oldu. Proje ve şirket bundan eşit şekilde faydalandı."
 gaudi.244.f: "İnşaat çalışmaları sırasında patlayıcıya olan ihtiyaç o kadar arttı ki tünel için Luzern Gölü’nde ayrı bir patlayıcı fabrikası kuruldu."
 gaudi.244.g: "Ama güvenlik için kontrol ediliyordur, değil mi?"
 gaudi.245.t: "İşçi akını"
 gaudi.245.d: "Doğu İsviçre’ye, Gotthard demiryolu inşaatında çalışmak için giderek daha fazla insan akın ediyor."
 gaudi.245.f: "Gotthard Demiryolu inşaatı, neredeyse on yıl boyunca 5.000’den fazla insanı işe getirdi."
 gaudi.245.g: "Herkese bir kürek verin, her ele ihtiyacımız var."
 gaudi.245.h: "Daha uzun süre burada kalmaları sağlanmalı."
 gaudi.246.t: "Yeni yabancı yatırımcı"
 gaudi.246.d: "Alfred Escher, Gotthard projesi için taze sermaye sağlayabilecek bir başka zengin yabancı yatırımcıyı çekmeyi başardı."
 gaudi.246.f: "Yıllar boyunca Escher, Gotthard tünelinin ünlü pahalı inşaatını finanse etmek için mali acil durumlarda yeniden ve yeniden temaslarını kullanmayı başardı - bu da son derece gerekliydi."
 gaudi.246.g: "Çölde bir gezgin gibi susadık!"
 gaudi.246.h: "Hayır, teşekkürler."
 gaudi.247.t: "GREV!"
 gaudi.247.d: "Kötü, kötü haber! Gotthard hattındaki işçiler iş bırakıp, tekrar küreklerini alıp çalışmaya başlamadan önce daha iyi ücret, ev, yiyecek ve giysi talep ediyor!"
 gaudi.247.f: "Gotthard tüneli inşaatı sırasında Göschenen’in nüfusu birkaç kez katlandı. İnşaat işçileri zor koşullarda yaşıyordu. İtalyan tünel işçileri daha fazla ücret talep ederek greve gitti ve köyde karışıklık çıkardı. Tetikleyici, bir posta şefi ile madenciler arasındaki bir tartışmaydı; madenciler, patlamalardan çıkan duman temizlenene kadar kazmaya devam etmeyi reddetti. Daha sonra sözlü bir savaş başladı ve madenciler öfkeyle işyerini terk etti. Dışarı çıkarken, bir dinamit kutusunun yandığına dair bir söylenti yayıldı. Bu, geri kalan tünel ekibinin de dışarı koşmasına neden oldu. İşçiler köye yöneldi, postanenin önünde durdular; burada belediye başkanı ve postacı yaşıyordu ve öfkelerini boşalttılar. Luigi Dissune, işçilerin taleplerini alkışlar eşliğinde sundu: günlük bir frank daha ücret, işleyen havalandırma ve daha iyi güvenlik kuralları. Bu tamamen yerine getirilene kadar madencilerin tünele girmeyeceği tehdidi, tünel girişinin önünde durarak pekiştirildi, böylece 22.00 vardiya değişiminde hiçbir madenci tünele giremedi."
 gaudi.247.g: "Bekçileri çağırın."
 gaudi.247.h: "Taleplerine boyun eğiyoruz."
 gaudi.248.t: "İsviçre için üzücü bir gün"
 gaudi.248.d: "Bir işçi ayaklanması olduğunda güvenlik güçlerimiz oldukça sert müdahale etti. Birkaç işçi öldü. Bu yüzden uluslararası itibar kaybettik."
 gaudi.248.f: "İlk ateşin neden ve kim tarafından yapıldığı bilinmiyor. Ateş açma emri verilmedi. Ateşin tam olarak nasıl gerçekleştiği de net değil. Sonrasında göstericiler dağıldı. Dört kişi öldü ve birkaç kişi yaralandı. Kaynağa bağlı olarak, iki ya da üç kişi olay yerinde öldü, biri ertesi gün yaralarına yenik düştü ve dördüncüsü birkaç gün sonra. Olay, suçlayıcı basın haberleri aracılığıyla tüm Avrupa’ya, İsviçre dışında bile duyuruldu. Özellikle, olayda görev alan polis birimlerinin oluşumunun arka planı sorgulandı."
 gaudi.248.g: "Onlar başlattı!"
 gaudi.249.t: "Delinme"
 gaudi.249.d: "Uzun yıllar süren zorlu çabalardan sonra, inşaat işçileri Gotthard kütlesinin ortasında yalnızca minimal bir sapmayla karşılaştılar."
 gaudi.249.f: "Yedi yıl beş ay sonra, kuzeyden ve güneyden dağ kütlesini delen inşaat ekipleri birbirleriyle buluştular. Sapmalar sadece yatayda 33 cm ve yükseklikte 5 cm idi - o dönemin mühendislik ve ölçme teknolojisinin bir başyapıtı. Olay Avrupa medyasında kutlandı ve o zamanın en uzun tüneli olan 15 kilometre uzunluğunda tünel tamamlanmıştı. O dönemde Zürich Landbote, 'Bugün kıta basını Gotthardwerk’e saygı gösteriyor ve içten bir takdir sunuyor' diye yazdı."
 gaudi.249.g: "Şampanya!"
 gaudi.301.t: "Cristo Redentor inşaatı başlıyor"
 gaudi.301.d: "Corcovado’da ilk iskeleler ve demir yapılar kurulmaya başlandı; işçiler İsa heykeli üzerinde çalışmaya başladılar."
 gaudi.301.f: "Kurtarıcı İsa, Art Deco tarzında inşa edilen dünyanın en büyük heykelidir. Heykelin yüzü, 1893’te Romanya’nın Galati şehrinde doğan heykeltıraş Gheorghe Leonida tarafından yapılmıştır. Leonida, Bükreş Güzel Sanatlar Konservatuvarı’nda heykel eğitimi aldı, ardından İtalya’da üç yıl daha eğitim gördü ve Reveil Heykel Ödülü’nü kazandı. Fransa’da portreci olarak ünlü olan Leonida, Paul Landowski tarafından 1922’de Cristo Redentor projesinde çalışmak üzere ekibe alındı. Gheorghe Leonida, heykelde İsa’nın yüzünü tasvir ederek ünlendi. Bir grup mühendis ve teknisyen Landowski’nin sunumlarını inceledi ve yapıyı çelik yerine betonarme ile inşa etme kararı aldı (Albert Caquot tasarladı), çarmıh formuna daha uygun bulundu. Dış katmanlar, dayanıklılığı ve kullanım kolaylığı nedeniyle seçilen steatit taşından yapılmıştır. İnşaat dokuz yıl sürdü ve USD 250.000 (2014 değerinde USD 3,3 milyon) maliyeti oldu."
 gaudi.301.g: "Ülkemiz için önemli bir adım."
 gaudi.302.t: "Corcovado’da İsa"
 gaudi.302.d: "Yıllarca süren inşaat çalışmalarının ardından, bugün Art Deco mimarisinin bir şaheseri tamamlandı: İsa heykeli - ve Brezilya’nın yeni simgelerinden biri!"
 gaudi.302.f: "Açılış töreninde heykel, kısa dalga radyo öncüsü Guglielmo Marconi tarafından uzaktan tetiklenen bir dizi projektörle aydınlatıldı. Marconi o sırada Roma, İtalya’daydı; kötü hava nedeniyle ışıklar sahada açıldı. Tören sırasında bir ayin de düzenlendi. Cristo Redentor, 1931’den 1981’e kadar dünyanın en yüksek İsa heykeli olmuştur."
 gaudi.302.g: "Ülkeyi ve şehri korusun."
 gaudi.309.t: "Rio kaybedildi"
 gaudi.309.d: "Rio de Janeiro’yu kaybetmemizle birlikte Cristo Redentor inşaatını sürdürme fırsatını da kaybettik."
 gaudi.309.f: "Rio de Janeiro’yu kaybedersek, yeniden ele geçirmek için inşaatı baştan başlatmak zorunda kalacağız. Cristo Redentor’u tamamlayabilecek tek ülke, Brezilya kültürüne sahip bir ülkedir."
 gaudi.309.g: "Rio de Janeiro’yu onlara uzun süre bırakamayız!"
 gaudi.311.t: "İyi ilerleme"
 gaudi.311.d: "Cristo Redentor üzerindeki çalışmalar beklenenden daha iyi ilerliyor. Takvime göre birkaç ay önde olmayı bekliyoruz."
 gaudi.311.f: "Modern teknoloji, hızlı iş süreçleri, kesintisiz malzeme tedariki ve iyi hava koşulları, inşaatın ilerlemesini destekliyor."
 gaudi.311.g: "Günü güzelleştiren haberler."
 gaudi.312.t: "Cristo Redentor için bir bağış"
 gaudi.312.d: "İyi bir Hristiyan olarak, [SCOPE.sCharacter('gaudi_cristo_donator').GetFullName] Cristo Redentor’a büyük kişisel ilgi duyuyor. Bu nedenle heykelin yapımı için kişisel bir bağışta bulundu."
 gaudi.312.f: "İsa heykelinin dikilmesi, gerçekleşmeden önce onlarca yıl boyunca konuşulan bir öneriydi ve özellikle dindar Katolik çevrelerinde büyük bir endişe konusuydu. Nihayet ele alınınca birçok bağışçı projeyi destekledi."
 gaudi.312.g: "Borçluyuz ona."
 gaudi.313.t: "Din adamları inşaat projemizi memnuniyetle karşılıyor"
 gaudi.313.d: "Brezilya’daki din adamları, Rio de Janeiro’daki Cristo Redentor heykelinin tamamlanması için ellerinden geleni yapmaya hazır. Kilise karşıtı güçler ise hükümetimizin kiliseden fazla etkilenmesinden korkuyor."
 gaudi.313.f: "Finansman sorunları, Cristo Redentor’un inşasını neredeyse on yıl geciktirdi; nihayet açılış, Rio de Janeiro Başpiskoposluğu, Kutsal Makam ve Fransa’nın desteğiyle gerçekleştirilebildi."
 gaudi.313.g: "Bundan faydalanmalıyız."
 gaudi.313.h: "Kiliseyi halka övün."
 gaudi.313.i: "Bu konu kiliseyi ilgilendirmez!"
 gaudi.314.t: "Sendikalar Cristo Redentor’u eleştiriyor"
 gaudi.314.d: "Sendikaları temsil eden [SCOPE.sCharacter('trade_unions_leader').GetFullName] bugün hükümete, Cristo Redentor’a verilen tartışmalı desteğin yeniden gözden geçirilmesini talep eden bir dilekçe gönderdi."
 gaudi.314.f: "Brezilya’daki sendika liderleri, Cristo Redentor’un inşasını korkunç bir para israfı olarak görüyor. İnşaatı engelleyemiyorlarsa, en azından tehlikeli yüksekliklerde çalışan ve tonlarca malzemeyi dağa taşımak zorunda olan işçiler için daha iyi muamele ve bakım talep ediyorlar."
 gaudi.314.g: "Onları görmezden gel."
 gaudi.314.h: "Sözde ilgilen."
 gaudi.314.i: "İşçilerin durumunu iyileştirmek için para harca."
 gaudi.315.t: "Taşıma sorunları"
 gaudi.315.d: "Corcovado Dağı, elbette, kilometrelerce görülebilecek bir simge yapmak için ideal bir nokta. Ancak lojistik olarak dezavantajları da var."
 gaudi.315.f: "Portekizce’de 'hörgüç' anlamına gelen Corcovado, Rio de Janeiro metropol bölgesinde 710 metre yüksekliğinde ve bir tarafı neredeyse dik bir dağdır. 19. yüzyılın sonunda bir demiryolu hattı dağı açmış olsa da, özellikle daha büyük bileşenlerin taşınması, dağın zirvesine çıkan dolambaçlı ve dar yol nedeniyle başta düşünüldüğünden daha zor oldu."
 gaudi.315.g: "Sadece şikayetler duyuyorum!"
 gaudi.316.t: "Kaza"
 gaudi.316.d: "Bugün Cristo Redentor inşaat alanında bir kaza oldu; inşaat çalışmaları haftalarca geri kaldı."
 gaudi.316.f: "Büyük yüksekliklere rağmen, İsa heykelinin inşası birçok gökdelenin inşasından daha az tehlikeliydi. Ancak kazalar göz ardı edilemezdi. Saha yöneticisi Heitor Levy neredeyse bir iskelenin üzerinden uçuruma düşüyordu. Levy, inşaat işçileri tarafından son anda kurtarıldı ve bu mucizeyi İsa’nın müdahalesine bağladı. Bu ölümden dönme deneyimi nedeniyle, yerli Yahudi daha sonra Katolikliğe geçti."
 gaudi.316.g: "Bir alamet mi?"
 gaudi.317.t: "Gök gürültülü fırtına"
 gaudi.317.d: "Bir gök gürültülü fırtınada yıldırım Cristo Redentor’a çarptı ve bazı kısımlarını yok etti."
 gaudi.317.f: "Fırtınalar inşaat sırasında ve heykel tamamlandıktan sonra sürekli bir sorun oldu. Yıldırım çarpmaları, steatit taşın bazı kısımlarını ve parmak gibi büyük parçaları tekrar tekrar yok etti."
 gaudi.317.g: "Talihsiz bir olay."
 gaudi.317.h: "Hasarı onarın."
 gaudi.317.i: "Daha fazla yıldırım çubuğu yapmamız gerekiyor."
 gaudi.317.j: "Hasarı onarın ve yeni yıldırım çubukları inşa edin."
 gaudi.318.t: "Bir övgü"
 gaudi.318.d: "[SCOPE.sCountry('gaudi_cristo_neighbour').GetName]’den bir parlamento üyesi bugün Rio de Janeiro’yu ziyaret etti ve her gün şekil alan Cristo Redentor heykelinden duyduğu memnuniyeti dile getirdi."
 gaudi.318.f: "İsa heykeli şimdiden Brezilya’nın ulusal simgesi haline geldi ve tüm Latin Amerika’yı geride bıraktı."
 gaudi.318.g: "Teşekkür ederiz."
 gaudi.318.h: "Kendi ülkesinde projemize destek toplamasını sağla."
 gaudi.319.t: "Ateist müdahalesi"
 gaudi.319.d: "Bugün yaptığı bir konuşmada, [SCOPE.sCharacter('gaudi_cristo_atheist').GetFullName], İsa heykelinin inşasını Orta Çağ’a dönüş olarak nitelendirdi ve benzer düşünen insanları para israfını kınamaya çağırdı."
 gaudi.319.f: "'Eğer Tanrı kendi heykeline ihtiyaç duysaydı, neden bunu söylemedi? Ve ihtiyaç duyuyorsa, neden kendisi inşa etmiyor? Brezilya modern bir ülkedir, ne tanrıya ne krallara ihtiyacı vardır, sadece insana. Bir insan alın teri hakkına sahip değil mi? Ben Tanrı’ya, gökyüzünde görünmez bir adama inanmıyorum. Bir bayrak veya Tanrı’ya ibadet etmek yerine, en iyisini yapma irademize tapabiliriz.'"
 gaudi.319.g: "Bu grubu fazla zorlamamalıyız."
 gaudi.319.h: "TANRI BUNU İSTER -DEUS VULT!-"
 gaudi.319.i: "Art Deco ve benzeri kelimeler. Bu adam hakkında ÇOK kötü bir hisse sahibim."
 gaudi.320.t: "Turistik yatırımlar"
 gaudi.320.d: "Turizm sektörü, İsa heykelini olumlu bir faktör olarak görüyor ve projeyi desteklemek istiyor."
 gaudi.320.f: "Cristo Redentor’un inşası, Rio de Janeiro’nun havayolu ağları, kumsalı ve canlı kültürel sahnesi sayesinde modaya uygun bir seyahat destinasyonu haline geldiği döneme denk geldi. Corcovado’daki modern heykel, yükselen turizm endüstrisi için de bir simge ve yeni bir cazibe merkezi olarak hoş bir katkı oldu."
 gaudi.320.g: "Plaj, güneş, oteller ve Cristo Redentor!"
 gaudi.401.t: "Mole Antonelliana inşaatı yeniden başladı"
 gaudi.401.d: "Torino şehri, Yahudi topluluğu ile son görüşmeleri tamamladıktan sonra, inşaat çalışmaları bugün tekrar başladı."
 gaudi.401.f: "Aslen Torino’daki Yahudi topluluğu, Sardinya-Piyemonte Krallığı’nın eski başkentinde görkemli bir merkez kurmak istiyordu. Yeni sinagog, şehrin Yahudi vatandaşlarının varlığını, ilerlemesini ve entegrasyonunu gösterecek şekilde tasarlanmıştı. Atanan mimar Alessandro Antonelli bu işi üstlenecekti. Ancak Antonelli, boyutlarını genişlettiği anıtsal binalarıyla da tanınıyordu. Örneğin Piyemonte’nin Castellamonte kasabasında, Roma’daki Aziz Petrus Katedrali ile yarışacak bir katedral planlamıştı; ancak devasa proje finansman eksikliği nedeniyle tamamlanamadı. Benzer bir kader, hızla yükselen yeni sinagoguyla Yahudi topluluğunu tehdit ediyordu ve mali bir felaket haline gelebilirdi. Torino şehir yetkilileri binayı satın aldı ve Yahudilere yeni arazi ve birkaç yıl içinde inşa edilen yeni bir sinagogla tazminat verdi. Bunun yerine \"Mole\" İtalya’nın ulusal simgesi olacaktı."
 gaudi.401.g: "Umarım Antonelli planlarını bir daha değiştirmez..."
 gaudi.402.t: "Mole Antonelliana: İlk aşama tamamlandı"
 gaudi.402.d: "Mole Antonelliana’nın temel yapıları tamamlandı. Ancak Antonelli, çatı ve sivri uçla ilgili yeni eksantrik fikirler geliştirdi."
 gaudi.402.f: "Mole Antonelliana başlangıçta sıradan bir kubbeye sahip olacak şekilde planlanmıştı. Ancak Antonelli, onu gittikçe hacimli ve yüksek inşa etti; sonuç olarak bugün bilinen karakteristik form ortaya çıktı. Bu durum, yapının üst kısmının tamamlanmasının ekstra zaman alacağı anlamına geliyordu."
 gaudi.402.g: "Bu adam hiç tatmin olmuyor mu?"
 gaudi.403.t: "Antonelli ile gökyüzüne ulaşmak"
 gaudi.403.d: "Mole Antonelliana’nın son inşaat aşaması başladı."
 gaudi.403.f: "Başlangıç projesine göre Antonelli, Mole’yi neredeyse sivri bir sona erdirme kararı aldı; neo-Gotik ile neo-klasik arasındaki kolonadlarla donatılmıştı ve böylece önceki eserlerinden biri olan Novara’nın sembolü Basilica di San Gaudenzio’nun ucunu taklit ediyordu. 90 metreden itibaren, kare tabanlı mimari temadan ayrılarak, konik taban üzerine yerleştirilen yuvarlak tabanlı granit bir kolonad tasarladı; buna 'Fener' deniyordu. Aynı şekilde, mimar Fener’in üzerine yaklaşık 50 metre yüksekliğinde, sekizgen kesitli ve on adet dairesel terasla bölünmüş bir sivri uç tasarladı; ilk iki teras kolonadla donatılmıştı, üstüne çıkıldıkça daha küçük teraslar ve küçük zikzaklı bir merdivenle erişim sağlanıyordu."
 gaudi.403.g: "Ve ben sadece son rötuşlar ve süslemeler olduğunu umuyordum..."
 gaudi.404.t: "Mole Antonelliana tamamlandı"
 gaudi.404.d: "İnşaat çalışmaları bugün bir cin heykelinin yerleştirilmesiyle törensel olarak tamamlandı. Torino ve İtalya yeni bir simgeyle zenginleşti!"
 gaudi.404.f: "Antonelli, Mole üzerinde ölümüne kadar büyük bir özveriyle çalıştı; yaklaşık doksan yaşındaki mimarı onlarca metre yükseğe taşıyan basit vinç efsaneleşti. Ölümünden birkaç ay sonra, mimar, sivri ucu 'Kanatlı Cin' heykeliyle tamamlamayı önerdi. Heykelin tasarımı Fumagalli’ye sipariş edildi; Kabartmalı ve altın kaplamalı bakırdan yapılan Cin, yaklaşık 300 kg ağırlığındaydı ve bir elinde mızrak, diğerinde palmiye dalı taşıyordu. Heykelin toplam yüksekliği 5,46 metreye ulaştı. Antonelli’nin ölümünden sonra, sivri ucun tamamlanması başta oğlu Costanzo ve öğrencisi Crescentino Caselli tarafından denetlendi. 'Kanatlı Cin’in son yerleştirilmesiyle bina toplamda 167,35 metre yüksekliğe ulaştı; bu yükseklik, o dönemde Avrupa ve dünyada hiçbir taş yapı tarafından ulaşılmamıştı. Mole, dünyanın en yüksek taş yapısı olarak Paris’te 10 gün önce açılan ve 1930’a kadar dünyanın en yüksek binası olacak olan Eyfel Kulesi ile doğrudan 'yarışa' girdi."
 gaudi.404.g: "Viva Torino, viva l'Italia!"
 gaudi.409.t: "Torino kaybedildi!"
 gaudi.409.d: "Piyemonte’nin kaybıyla Mole Antonelliana’yı inşa etmeye devam etme fırsatımızı kaybettik."
 gaudi.409.f: "Piyemonte herhangi bir nedenle kaybedilirse, inşaat ilerlemesi tamamen kaybolmaz. Mole Antonelliana’nın son inşaat aşamasını yalnızca İtalya sürdürebilir. Öte yandan yabancı işgalciler, inşaata ilgi göstermeyeceklerdir."
 gaudi.409.g: "Torino’yu onlara uzun süre bırakamayız!"
 gaudi.411.t: "Kötü tuğlalar"
 gaudi.411.d: "Mole Antonelliana için yapılan son malzeme teslimatı kalitesiz çıktı."
 gaudi.411.f: "Bir an için, Mole Antonelliana’nın her gün yükseldiği Torino inşaat alanındaki olağan faaliyet durdu. Antonelli’nin kısa bir envanter kontrolü, tuğlaların alışılmış kalitede olmadığını ortaya koydu ve şaheserinin bu tuğlalar yüzünden tehlikeye girmemesi için beklemeyi tercih edeceğini duyurdu. Ancak, inşaat yönetiminde tuğlaların yine de kullanılmasını isteyen sesler vardı; sadece inşaatın gecikebileceği için değil, aynı zamanda Antonelli’nin planı tekrar değiştirebileceği korkusu vardı..."
 gaudi.412.t: "Felaket!"
 gaudi.412.d: "Kalitesiz malzeme bedelini ödettirdi: bu sabah Mole Antonelliana’nın bir bölümü çöktü ve önemli hasara yol açtı."
 gaudi.412.f: "Belki Antonelli’ye kulak verilmeliydi. Belki de önemli bir anıt için çürüyen tuğlaların kullanılması iyi bir fikir değildi. Belki bu kararı iki kez düşünmeliydik. Ama artık çok geçti - düşük kaliteli malzeme bugün bedelini ödettirdi, bir duvar çöktü ve son birkaç haftada ve ayda yapılan inşaat ilerlemesinin büyük bir kısmı yıkıldı."
 gaudi.413.t: "Torino’da arkeolojik araştırmalar"
 gaudi.413.d: "Torino’yu ziyaret ettikten sonra [SCOPE.sCharacter('gaudi_archaeologist').GetFullName], Mole Antonelliana’nın görünüşe göre Roma kalıntıları üzerine inşa edildiğini keşfetti. Bir kazı izni talep ediyor."
 gaudi.413.f: "M.Ö. birinci yüzyılda Romalılar Augusta Taurinorum’u kurdular. Via Garibaldi, Roma kenti decumanusunun başlangıç noktası olan Porta Decumani’nin tam yolunu takip eder; bu daha sonra Castello veya Palazzo Madama’ya dahil edilmiştir. Mevcut şehir merkezinin kuzeyinde yer alan Porta Palatina, hâlâ katedral yakınlarındaki bir parkta korunmaktadır. Roma dönemine ait tiyatronun kalıntıları Manica Nuova bölgesinde korunmaktadır."
 gaudi.414.t: "Yeni bir makine"
 gaudi.414.d: "Ülkemizin motor endüstrisi, Mole Antonelliana inşaat sahasına son zamanlarda son derece modern bir makine sağladı ve çalışmaların ilerlemesini hızlandırıyor."
 gaudi.414.f: "Mole Antonelliana, zamanının en büyük tuğla yapılarından biri olarak, birçok açıdan geleneksel mimari teorilere bağlı kalmasıyla tanınır. Ancak bina çelik yapı veya çimento kullanmasa da, diğer makinelerin kullanılmasına engel değildi. Torino, Milano ve Cenova ile birlikte İtalya’nın önemli sanayi merkezlerinden biriydi; bu da Usta Antonelli talep ederse, çalışmayı kolaylaştıran makinelerin temin edilmesini mümkün kılıyordu."
 gaudi.415.t: "Vatandaş Bağışı"
 gaudi.415.d: "Vatansever burjuvazinin temsilcileri, liderleri [SCOPE.sCharacter('pb_leader').GetPrimaryRoleTitle] [SCOPE.sCharacter('pb_leader').GetFullName] önderliğinde, Mole Antonelliana’nın inşasına bağışta bulundu."
 gaudi.415.f: "Belediye yetkilileri tarafından devralındığından beri, Mole Antonelliana Torino’nun yükselen sanayi bölgesinin sembolünden çok daha fazlası haline gelmişti. Göğe ulaşmaya çalışan büyüklük, yalnızca modernliğin değil, aynı zamanda İtalya’nın ulusal ruhunun da bir sembolüydü. Vatansever burjuvazi için yapı, yeni devlet için bir kimlik sembolüydü. Tamamlandığında binada Risorgimento Müzesi yer alacaktı. Ulusal bilinçli İtalyanlar bu nedenle hızlı bir tamamlanma için büyük ilgi gösterdiler."
 gaudi.415.g: "Onlara minnettarız."
 gaudi.416.t: "Antonelli’nin bir fikri daha var ..."
 gaudi.416.d: "Münafiğine adını veren Alessandro Antonelli, yakın zamanda inşaat yönetimini bir değişiklikle şaşırttı..."
 gaudi.416.f: "Alessandro Antonelli’yi eksantrik bir mimar olarak nitelendirmek yetersiz kalır. 130 metre yüksekliğinde bir bina planlamak ve sonra 160 metreden az yüksekliğin bir mimarın onuruna yakışmadığını iddia etmek son derece doğal bir durumdur. Piyemonte’de bir kilise binasını Roma’daki Aziz Petrus boyutlarında planlamak da olağan bir durumdur. Ve tamamlanmamış çok sayıda yapısının olması da hafif bir megalomani işareti değildir; çünkü kendi standartlarına uymamıştır. Bunların hiçbiri Alessandro Antonelli’ye uymaz. Ne olursa olsun, Mole Antonelliana’nın inşaatını yeniden uzatacak yeni bir fikri vardır..."
 gaudi.416.g: "Mamma mia!"
 gaudi.416.h: "Santo Dio!"
 gaudi.416.i: "Porca miseria!"
 gaudi.416.j: "Cavolo!"
 gaudi.417.t: "Antonelliana gökyüzüne doğru büyüyor"
 gaudi.417.d: "Mole Antonelliana’nın inşaatı, belirtilmeyen sebeplerden dolayı beklenenden daha hızlı ilerliyor."
 gaudi.417.f: "Sebebi bilinmeyen bir şekilde, görkemli Mole Antonelliana’nın inşaatı ilerliyor. Belki hava iyiydi. Belki Madonna’ya yapılan dualar. Belki de geçen gün israf ettiğimiz ve umarız asla bulunmayacak olan oldukça kalitesiz malzeme. Kesin olan bir şey var: En çeşitli sebeplerle tekrar tekrar gecikmelere maruz kalan bu canavar, beklenenden daha hızlı tamamlanmalı. Antonelli bunu, kazançları yeni bir genişleme ile telafi etmek için kullanmazsa tabii..."
 gaudi.418.t: "Düşen kiriş tuğla duvarı yok etti"
 gaudi.418.d: "Bugün düşen bir destek kirişi Mole Antonelliana’ya ciddi zarar verdi ve inşaatı geri attı."
 gaudi.418.f: "Bu destek kirişi aslında gerçekten desteklemiyordu."
 gaudi.418.g: "Sinir bozucu."
 gaudi.419.t: "Monark bir ziyaret gerçekleştiriyor"
 gaudi.419.d: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName], Mole Antonelliana inşaat sahasını şahsen ziyaret etmeye karar verdi."
 gaudi.419.f: "Monarkımız [SCOPE.sCharacter('gaudi_ruler').GetFullName], Torino inşaat sahasında olan bitenlere geçmişte büyük ilgi göstermiş ve şimdi sahayı ziyaret etmeyi planlıyor. Hazırlıklar tüm hızıyla devam ediyor - ve elbette Majesteleri’ne bir şeyler sunmak istiyorlar! Basit işçiler, inşaat yönetimi ve Antonelli şahsen, duyuru sonrası daha önce bilinmeyen bir hızda çalışmaya başladı."
 gaudi.419.g: "Majesteleri motive etmeyi biliyor."
 gaudi.420.t: "İnşaat sahası kazası"
 gaudi.420.d: "Bugün bir kazada birkaç kişi yaralandı. Mole Antonelliana inşaat yönetimi, hasarı onarmadan ve yedek personel almadan büyük gecikmeler olacağını öngörüyor."
 gaudi.420.f: "Bugün Torino’da bir kazada birkaç kişi yaralandı, bazıları ciddi şekilde – hastaneye kaldırılmaları gerekti. Yaralılar arasında inşaatta kilit rol oynayan deneyimli usta işçiler de var. Onlar olmadan inşaatın tamamlanması, iyileşene kadar muhtemelen gecikecektir."
 gaudi.420.g: "Kazalar olur."
 gaudi.420.h: "Bunun inşaat ilerlemesini aksatmaması için elimizden geleni yapmalıyız."
 gaudi.421.t: "Grev tehdidi"
 gaudi.421.d: "Mole Antonelliana işçileri, daha iyi ücret için pazarlık yapmazsak greve gideceklerini açıkladı."
 gaudi.421.f: "Ah, grevlerin harika dünyası! İtalya’da demiryolu işçileri sendikasının ani bir şekilde sabotaj yapmaya karar verdiği için bir tren istasyonunda mahsur kalmanın nasıl bir şey olduğunu yaşamamışsanız, neler kaçırdığınızı bilemezsiniz. Bugün sadece bir şantiye etkileniyor. Gerçekten şanslıyız!"
 gaudi.421.g: "Pazarlık yapmayacağız."
 gaudi.421.h: "Birkaç taşeron işçi ödemek işe yarar."
 gaudi.421.i: "Carabinieri’yi çağırın!"
 gaudi.421.j: "Pazarlık yap."
 gaudi.422.t: "Fırtına Sancağı Yok Etti"
 gaudi.422.d: "Bir fırtına, kasırga benzeri bir olaya dönüşerek gece boyunca Mole Antonelliana’nın sancağını kopardı!"
 gaudi.422.f: "Muhtemelen bir hortum olan şiddetli bir fırtına, sancağın 47 metresinin kırılmasına ve küçük bir bahçeye düşmesine yol açtı. Sancak, üst kattaki bir odanın penceresine sürtünerek bir balkonun kısmen yıkılmasına neden oldu, ancak insanlara zarar vermedi. Benzer bir durum Mole’da 23 Mayıs 1953’te de yaşanmıştı. Kırık sancaklı Mole, Michelangelo Antonini’nin 1955 yapımı The Friends filminin açılış jeneriğinin sonunda görülebilir. Bu nedenle Avrupa’daki en yüksek tuğla bina unvanı Almanya’daki Ulm Katedrali çan kulesine geçti (161,53 metre), dünya genelinde ise Philadelphia Şehir Binası en yüksek tuğla yapı unvanını aldı (162,53 metre). Bunun sebebi ayrıca sancak artık tuğla yerine betonarme olarak yeniden inşa edilecekti."
 gaudi.422.g: "Bir felaket!"
 gaudi.423.t: "Nietzsche Mole’yi hayranlıkla izliyor"
 gaudi.423.d: "Ünlü Alman filozof Friedrich Nietzsche, 1870’ler ve 1880’ler boyunca Torino’da bulundu ve şehri çok beğendi. Mole Antonelliana’yı zamanının en büyük binalarından biri olarak övdü."
 gaudi.423.f: "'Mole Antonelliana’dan geçtim, belki de mutlak bir yukarı yönelme dürtüsü için inşa edilmiş en zeki bina - sadece Zarathustra’yı hatırlatıyor. Ona Ecce Homo adını verdim ve ruhumda etrafını muazzam bir boşlukla çevreledim.' - Friedrich Nietzsche"
 gaudi.423.g: "Adamın zevki var. Sadece 'Morgenröte'den beri değil."
 gaudi.424.t: "Mongolfiera Italo"
 gaudi.424.d: "Mole Antonelliana’nın inşaatı, özel bir önlemle finanse edilmeli ve böylece ek ilgi çekmeli."
 gaudi.424.f: "Belediye, Mole Antonelliana’nın tamamlanmasının büyük bir sergi zamanıyla çakışmasını planlamıştı. Ziyaretçiler Mole Antonelliana’yı yakından gözlemlemeliydi. Yapı zamanında bitmedi, ancak telafi amacıyla inşaat ilerlemesini balon turu ile ücret karşılığı görmek hâlâ mümkündü; balona 'Italo' adı verilmişti."
 gaudi.424.g: "Turistik bir balon iyi bir fikir gibi görünüyor."
 gaudi.424.h: "Ne israf!"
 gaudi.425.t: "Italo yıldırım çarptı"
 gaudi.425.d: "Mole Antonelliana’daki balon bir fırtınada yok oldu!"
 gaudi.425.f: "Mole Antonelliana’nın inşaatı sırasında üst sınıf için küçük bir gezi ücreti karşılığı hoş bir eğlence haline gelen 'Italo' balonuna 27 Nisan 1884’te yıldırım çarptı ve yere düştü. Ölü veya yaralı olmadı."
 gaudi.425.g: "Yeni bir balon inşa edin."
 gaudi.425.h: "Bu balon turları çok tehlikeli."
 gaudi.501.t: "Ringstrasse’nin inşaatı başlıyor"
 gaudi.501.d: "Bir kararname ile [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName], ring yolunun inşaatının bugün başlamasını başlattı."
 gaudi.501.f: "'İç kentin genişletilmesi mümkün olan en kısa sürede, banliyölerle bağlantısı göz önünde bulundurularak ele alınsın ve ikametgahım ile imparatorluk başkentimin düzenlenmesi ve güzelleştirilmesi dikkate alınsın. Bu amaçla, iç kentin duvarlarının ve tahkimatlarının yanı sıra etrafındaki hendeklerin terk edilmesini yetkilendiriyorum. Duvarın ve hendeklerin terk edilmesiyle elde edilen alan ve glacis topraklarının, temel plana göre başka bir belirlemeye ayrılmamış kısmı inşaat alanı olarak kullanılacak ve elde edilen gelir bir inşaat fonu oluşturmak için kullanılacak. Bu fondan, özellikle kamu binalarının inşaatı ve hâlâ gerekli olan askeri kurumların taşınması gibi devlet hazinesinin bu tedbirden doğan masrafları karşılanacaktır.' - Franz Joseph I."
 gaudi.501.g: "Viyana birinci sınıf bir metropol olacak."
 gaudi.502.t: "Ringstrasse’nin açılışı"
 gaudi.502.d: "Ringstrasse bugün bir törenle açıldı. Ancak bu yalnızca cadde için geçerli – burası hâlâ Viyana’yı Londra ve Paris ile eşdeğer kılacak büyüklükten yoksun."
 gaudi.502.f: "'Majesteleri, duvarların yıkılması ve kentin genişletilmesiyle tüm sadık ikametgah şehrinin halkına en güzel Noel hediyesini sundu. Viyana, Avrupa’nın en güzel ve sağlıklı şehirlerinden biri olmalı. Majesteleri tarafından belirlenen görevin büyük kısmı tamamlandı, çevreleyen perde duvarlar kayboldu, en güzel saraylar ve evlerle bir cadde tamamlandı, ikametgahı süsleyen ve sakinlerine rahatlama sağlayan bahçeler ve alanlar oluşturuldu. Şehrin temizliği ve halkın sağlığı için gerekli olan uzun zamandır beklenen su kemeri şehrin genişleme çalışmalarını taçlandıracak ve Majesteleri gelecek nesillerin en derin teşekkürünü hak edecek. Majesteleri, Ringstrasse’yi bugün açma lütfuna sahip oldukları için, Viyana Şehir temsilcileri adına en saygılı teşekkürlerimi sunmama izin verin.' - Andreas Zelinka, Viyana Belediye Başkanı"
 gaudi.502.g: "Viyana, sen bir mücevhersin!"
 gaudi.503.t: "Viyana için bir dönüm noktası"
 gaudi.503.d: "Ring yolu yavaş yavaş şekil alıyor. Özellikle büyük bir opera binası ve yeni bir belediye binasının inşası, bu inşaat aşamasının Viyana şehir tarihi için ne anlama geldiğini destekleyecek."
 gaudi.503.f: "'Ring yolunun tamamlanmasını kentsel genişleme çalışmaları açısından özellikle önemli bir aşama olarak görüyorum. Her zaman bu konuya özel dikkatimi verdim ve sayın Belediye Başkanı’na ve belediye meclisine, ikametgahımın güzelleştirilmesine gösterdiğiniz özel özen için takdir ve şükranımı ifade ediyorum. Gelecekte şehir genişlemesinin ilerlemesini takip etmeye devam edeceğim ve mümkün olduğunca, belediyenin okullar, depolar ve parklar inşa etmek için uygun fiyatlı arsa edinme taleplerini göz önünde bulunduracağım. En önemli sorulardan birini hızlı çözmek amacıyla, belediyenin Kaiserbrunnen’in su teminini ücretsiz olarak gerçekleştirmesine izin verilmesini emrettim ve umarım su temini böylece hızlı ve mutlu bir şekilde sonuçlanır.' - Franz Joseph I."
 gaudi.504.t: "Viyana’nın ihtişamı"
 gaudi.504.d: "Yeni Devlet Operası’nın açılışı ve Yeni Belediye Binası’na taşınma ile Viyana’yı gerçekten Avusturya’nın layık bir başkenti yapma yolunda önemli bir adım atıldı."
 gaudi.504.f: "'Viyana’nın sokakları kültürle döşelidir. Diğer şehirlerin sokakları asfaltla.' - Karl Kraus"
 gaudi.505.t: "Büyüklüğe giden yol"
 gaudi.505.d: "Üniversite, parlamento ve sanat müzeleri planlaması ile Viyana Ringstrasse’nin inşaatı son aşamaya giriyor. Şimdi görev, estetik açıdan hoş bir bölgeyi mimari bir harikaya dönüştürmek."
 gaudi.505.f: "'Viyana’da çok sayıda simge yapı var ve her Viyanalı bir simge gibi hissediyor.' - Karl Kraus"
 gaudi.506.t: "Viyana Ringstrasse tamamlandı"
 gaudi.506.d: "Bugünden itibaren Ringstrasse, belirleyici görünümünü kazandı. Gelecekte daha fazla uzatma yapılması ihtimali olmasa da, tarih boyunca 'ring house stili' olarak kalacak olan şey burada ve şimdi zirveye ulaştı. Tüm Avrupa bu manzaraya imreniyor!"
 gaudi.506.f: "'Çok güzeldi, beni çok memnun etti.' - Franz Joseph I."
 gaudi.506.g: "Çok güzeldi, gerçekten zevk aldım."
 gaudi.509.t: "Viyana kaybedildi!"
 gaudi.509.d: "Viyana’nın kaybıyla, Viyana Ringstrasse’yi inşa etmeye devam etme fırsatını da kaybettik."
 gaudi.509.f: "Viyana herhangi bir nedenle kaybedilirse, inşaat ilerlemesi tamamen kaybolmaz. Sadece Avusturya, Ringstrasse’nin son inşaat aşamasını tamamlayabilir. Yabancı işgalciler ise inşaatla ilgilenmeyecektir."
 gaudi.509.g: "Viyana’yı uzun süre onlara bırakamayız!"
 gaudi.601.t: "Kript"
 gaudi.601.d: "İnşaatın ilk aşaması, Sagrada Família’nın kripti ve apsisine odaklanacak. Başından itibaren boyutların başlangıçta düşünülenlerden daha büyük olduğu anlaşılıyor."
 gaudi.601.f: "'Kutsal Aile’nin işi yavaştır, çünkü bu işin Ustası acele etmiyor.' - Antoni Gaudí"
 gaudi.601.g: "Bu kadar uzun sürmez, değil mi?"
 gaudi.602.t: "Kript tamamlandı"
 gaudi.602.d: "Bugün Sagrada Família’nın kripti kutsandı. Yakında burada ilk ayin yapılabilir."
 gaudi.602.f: "'İnsanlar iki türe ayrılabilir: söz insanları ve eylem insanları. İlki konuşur; ikincisi eyleme geçer. Ben ikinci gruptayım. Kendimi yeterince ifade edecek araçlardan yoksunum. Sanatsal kavramlarımı kimseye açıklayamazdım. Henüz somutlaştırmadım. Üzerinde düşünmeye zamanım olmadı. Saatlerim işimde geçti.' - Antoni Gaudí"
 gaudi.602.g: "Dokuz inşaat aşaması daha..."
 gaudi.603.t: "Apse"
 gaudi.603.d: "Başlangıçta düşünülenlerden çok az benzerlik taşıyan tamamen yenilenmiş bir planla, Antoni Gaudí daha önce hiç var olmayan bir kilisenin penceresini açtı."
 gaudi.603.f: "'Birine deli, birine dahi demek verdik, zaman gösterecek.' - Elies Rogent, Barselona Mimarlık Okulu Müdürü"
 gaudi.603.g: "Bu bir insan ömründe bitecek mi?"
 gaudi.604.t: "Apse tamamlandı"
 gaudi.604.d: "Apse tamamlandıktan sonra Barselona sakinleri, Gaudí’nin aslında ne yaptığını ilk kez görüyor. Bina şimdiden sıradışı şekillere sahip."
 gaudi.604.f: "Düz çizgi insana aittir. Eğri çizgi Tanrı’ya aittir. - Antoni Gaudí"
 gaudi.604.g: "Sekiz inşaat aşaması daha..."
 gaudi.605.t: "Doğuş Cephe"
 gaudi.605.d: "Şehir yönetiminin isteklerinin aksine, Doğuş Cephe’nin inşasına başlandı. İlk istek, şehir yönüne bakan Tutku Cephe’sinin inşa edilmesiydi."
 gaudi.605.f: "'Herkes tapınakta kendi şeyini bulur: Köylüler tavuk ve horozu; bilim insanları Zodyak işaretlerini; teologlar İsa’nın soy ağacını; ama açıklama, akıl yürütme yalnızca yetkili tarafından bilinmeli ve halkın anlayacağı şekilde yayılmamalı.' - Antoni Gaudí"
 gaudi.605.g: "Kaplumbağaları sevdim."
 gaudi.606.t: "Doğuş Cephe tamamlandı"
 gaudi.606.d: "Doğuş Cephe’nin inşası tamamlandı. Oyunbaz görünümü ve devasa boyutları, sadece Barselona sakinlerini kilisenin inşasını desteklemeye ikna etmekle kalmıyor. Bütün çalışmanın bir ön izlemesini sunuyor."
 gaudi.606.f: "'Tek bir nesil Tapınak’ın tamamına ulaşamaz, bu yüzden gelecekteki nesillerin aynı şeyi yapmaları için bir teşvik hissetmesi için böyle güçlü bir gösterim bırakalım; diğer yandan onları geri kalan iş için bağlamayalım (...). Tapınak’ın tam bir cephesini yaptık ki önemi, işin devamını durdurmayı imkânsız kılıyor.' - Antoni Gaudí"
 gaudi.606.g: "Yedi inşaat aşaması daha."
 gaudi.607.t: "Ana Nave"
 gaudi.607.d: "Sagrada Família’nın içi her gün detaylarla zenginleşiyor; evden çok bir orman gibi hissediliyor."
 gaudi.607.f: "'Tapınağın içi bir orman gibi olacak. (...) Ana nave’nin sütunları palmiye ağaçları olacak; bunlar şan, fedakârlık ve şehadet ağaçlarıdır. Yan nave’lerin sütunları ise defne ağaçları olacak, şan ve akıl ağaçlarıdır.' - Antoni Gaudí"
 gaudi.607.g: "Bu kaç yıl sürecek?"
 gaudi.608.t: "Ana Nave tamamlandı"
 gaudi.608.d: "Papaz elçisi Sagrada Família’yı ziyaret ederken Gaudí’yi ziyaret etti. Elçiye göre, onun çalışması ve yaşam biçimi ona haklı olarak 'mimarlığın Dante’si' unvanını veriyor. Ancak grotesk mimari nedeniyle eleştirmenler kilisenin cenneti mi yoksa cehennemi mi yansıttığını bilmiyor."
 gaudi.608.f: "'Resim, renk aracılığıyla ve heykel, form aracılığıyla mevcut organizmaları temsil eder. Figürler, ağaçlar, meyveler... içlerini dışlarıyla ifade eder. Mimarlık organizmayı yaratır. Bu nedenle, doğanın yasalarıyla uyumlu bir yasa tarafından yönetilmelidir. Bu ilkeye uymayan mimarlar sanat eseri yerine beceriksiz işler yapar.' - Antoni Gaudí"
 gaudi.608.g: "Altı inşaat aşaması daha."
 gaudi.609.t: "Havariler’in kuleleri"
 gaudi.609.d: "Gaudí, Sagrada Família’nın Nativity Cephe’si ile zaten binanın genişlemekten çok yükselmesi gerektiğini vurgulamıştı; tek tek kulelerin inşası yapıya büyük bir etki kazandıracak."
 gaudi.609.f: "'Bir zamanlar, çocukken beni tanıyan eski bir komşu geldi, Sagrada Família Tapınağı’nı görünce naifçe haykırdı: Ah, ah! Çocukken yaptığını şimdi de yapıyor! Ve haklıydı. Bu, kalıtımla edinilmiş bir yetenektir, beni hareket ettirir ve yönlendirir.' - Antoni Gaudí"
 gaudi.609.g: "Bu iş hiç bitecek mi?"
 gaudi.610.t: "Havariler’in kuleleri tamamlandı"
 gaudi.610.d: "Sagrada Família’nın ilk kuleleri tamamlandı. Sakinler kısmen hayran, kısmen şokta."
 gaudi.610.f: "'Barselona’daki çoğu kilise gibi devrim sırasında zarar görmedi - 'sanatsal değeri' nedeniyle kurtarıldı, dediler. Anarşistlerin onu patlatmama konusunda kötü bir zevk gösterdiklerini düşünüyorum, ama yine de kuleleri arasına kırmızı-siyah bir pankart astılar.' - George Orwell"
 gaudi.610.g: "Beş inşaat aşaması daha."
 gaudi.611.t: "Tutku Cephe"
 gaudi.611.d: "Sagrada Família’nın Tutku Cephe’si ile şimdi, Gaudí’nin arkadaşları arasında rahatsızlık yaratan bir kilise bölümü oluşturuluyor."
 gaudi.611.f: "'Biri bu kapıyı çok süslü bulacak; ama korkutucu olmasını istiyorum ve bunu başarmak için chiaroscuro, giren ve çıkan motifler, en kasvetli etkiyi yaratacak her şeyden kaçınmayacağım. Dahası, inşaatı feda etmeye hazırım, kemerleri kırmaya ve sütunları kesmeye, Kanlı Kurban’ın ne olduğunu göstermek için.' - Antoni Gaudí"
 gaudi.611.g: "Taştan bir dehşet."
 gaudi.612.t: "Tutku Cephe tamamlandı"
 gaudi.612.d: "Nativity Cephe’sinin aksine, Tutku Cephe’si sade tutulmasına rağmen oldukça modern bir etkiye sahip ve bu nedenle bazılarına çekici, bazılarına itici geliyor. Gaudí’nin neden bu cepheyi önce inşa etmek istemediği artık tamamen anlaşılabiliyor."
 gaudi.612.f: "'Barselona’da gördüğüm - Gaudí - güç, inanç ve olağanüstü teknik kapasitenin tüm bir deha hayatı boyunca gösterimi; taşları gözlerinin önünde iyi düşünülmüş bir desenle işleyen bir adam. Gaudí, yüzyılın 'mimar'ıdır, taş, demir ve tuğla ile ustadır. Onun şanı bugün ülkesi tarafından görülüyor. Gaudí büyük bir sanatçıdır; yalnızca nazik insanların hassas kalplerini etkileyenler kalır.' - Le Corbusier"
 gaudi.612.g: "Sadece dört inşaat aşaması kaldı."
 gaudi.613.t: "Transept"
 gaudi.613.d: "İnşaat çalışmaları başarılı ilerlemesine rağmen, eleştirmenler hâlâ görüşlerini dile getiriyor, şimdi sanat dünyasından da. Binanın katı şartlara uymasını istemiyorlar, ancak mimarideki modern gelişmelerle de evrimleşmesi gerektiğini söylüyorlar. İnşaat yönetimi bu taleplere red cevabı verdi."
 gaudi.613.f: "'Kitaplarda nadiren aradığınızı bulursunuz ve bulduğunuzda çoğu zaman yanlıştır.' - Antoni Gaudí"
 gaudi.613.g: "Hosanna in excelsis."
 gaudi.614.t: "Transept tamamlandı"
 gaudi.614.d: "Sagrada Família neredeyse üçte iki tamamlandığında, Papa bir ayinle binayı küçük bir bazilika statüsüne yükseltti."
 gaudi.614.f: "'Sagrada Família’da her şey takdir edilendir: Konumu şehrin ve Barselona ovasının merkezindedir; tapınaktan denize ve dağlara, Sants ve Sant Andreu’ya ve Besòs ve Llobregat nehirlerine aynı mesafededir.' - Antoni Gaudí"
 gaudi.614.g: "Sadece üç inşaat aşaması kaldı."
 gaudi.615.t: "Meryem ve Evanjelistler’in kuleleri"
 gaudi.615.d: "Evanjelist kulelerinin planlamasıyla Gaudí, simgeleri, öğeleri, burçları ve erdemleri mimari olarak oynadı. Şimdi bunlar gerçeğe dönüşmeli."
 gaudi.615.f: "'Bakire Meryem, küçük olman kötü görünmüyor, tıpkı çiçekler ve yıldızlar gibi.' - Antoni Gaudí"
 gaudi.615.g: "Ave Maria."
 gaudi.616.t: "Meryem ve Evanjelistler’in kuleleri tamamlandı"
 gaudi.616.d: "Sagrada Família’nın beş yüksek kulesi Barselona’nın üzerine yükseliyor; Meryem Kulesi’nin inşası, on iki uçlu yıldızın yerleştirilmesiyle sona eriyor."
 gaudi.616.f: "'Sagrada Família son katedral değildir, ama yeni bir çağın ilki olan katedraldir.' - Antoni Gaudí"
 gaudi.616.g: "İki son inşaat aşaması!"
 gaudi.617.t: "İhtişam Cephe"
 gaudi.617.d: "Sagrada Família’nın ana cephesi nihayet ele alınıyor. Bunun için yeni inşaat alanları satın alınması gerekiyor, bu da şehir halkının hoşuna gitmiyor. Yönetimin onayı henüz verilmedi."
 gaudi.617.f: "'Ana cephenin çan kuleleri modelinin parçasını tamamlamayacak veya geliştirmeyeceğim. Sadece bir sonraki neslin tapınağa katkıda bulunması için planlı bırakmaya karar verdim; katedrallerin tarihindeki gibi, cepheleri sadece başka yazarlar tarafından değil, aynı zamanda farklı stillerde de yapılmıştır.' - Antoni Gaudí"
 gaudi.617.g: "Sanctus, Sanctus, Sanctus."
 gaudi.618.t: "İhtişam Cephe tamamlandı"
 gaudi.618.d: "İhtişam Cephe’nin tamamlanmasıyla, Sagrada Família artık neredeyse tamamlanmış durumda."
 gaudi.618.f: "'Sagrada Família... son yirmi beş yıldaki en büyük yaratıcı mimarlık eseridir. Taşta sembolize edilmiş ruhudur!' - Louis Sullivan"
 gaudi.618.g: "Sadece bir inşaat aşaması kaldı!"
 gaudi.619.t: "İsa’nın Kulesi"
 gaudi.619.d: "İsa Kulesi ile Sagrada Família sadece Barselona’nın üzerinde yükselmekle kalmayacak, aynı zamanda bugüne kadar Avrupa’nın en yüksek kilisesi olan Ulm Katedrali’ni de geçecek."
 gaudi.619.f: "'Özgünlük, kökenlere geri dönmekten oluşur.' - Antoni Gaudí"
 gaudi.619.g: "Bu, yeryüzündeki en yüksek kilise olacak."
 gaudi.620.t: "La Sagrada"
 gaudi.620.d: "Bitti! Gerçekten tamamlandı! Dünyanın mimari bir harikası olan Sagrada Família, Barselona ve tüm dünyaya ışık saçıyor!"
 gaudi.620.f: "Pater noster, qui es in caelis :\nsanctificetur nomen tuum :\nadveniat regnum tuum :\nfiat voluntas tua, sicut in caelo, et in terra.\nPanem nostrum quotidianum da nobis hodie :\net dimitte nobis debita nostra, sicut et nos dimittimus debitoribus nostris\net ne nos inducas in tentationem.\nSed libera nos a malo."
 gaudi.620.g: "Bu günü göreceğimi hiç düşünmemiştim."
 gaudi.629.t: "Barselona kaybedildi!"
 gaudi.629.d: "Barselona’nın kaybıyla, Sagrada Família’yı inşa etmeye devam etme fırsatını kaybettik."
 gaudi.629.f: "Katalonya herhangi bir nedenle kaybedilirse, inşaat ilerlemesi bütünüyle kaybolmayacaktır. Başka bir ülke, İber kültürüne sahip olması durumunda, katedralin son inşaat aşamasını tamamlamaya devam edebilir. Yabancı işgalciler ise inşaata ilgi göstermeyecektir."
 gaudi.629.g: "Barselona’yı onlara uzun süre bırakamayız!"
 gaudi.631.t: "Sagrada Família’ya dindar bağış"
 gaudi.631.d: "İyi bir Hristiyan olarak, [SCOPE.sCharacter('gaudi_sagrada_donator').GetFullName] Sagrada Família’ya büyük kişisel ilgi duyuyor. Bu nedenle kilisenin inşası için kişisel bir bağışta bulundu."
 gaudi.631.f: "On yıllar boyunca Sagrada Família esas olarak bağışlarla finanse edildi. İnşaat başlamadan kısa süre önce yapılan büyük anonim bir bağış sayesinde Antoni Gaudí, bina planlarını önemli ölçüde genişletti ve Sagrada Família’yı bugünkü projeye dönüştürdü. İnşaat çalışmaları hâlâ Josep Maria Bocabella tarafından öngörüldüğü gibi vakıflardan ve giriş ücretlerinden sağlanan bağışlarla finanse ediliyor. Yılda yaklaşık 22 milyon euro inşaat için mevcut; 2009’da ise 18 milyon euro idi."
 gaudi.631.g: "Ona borçluyuz."
 gaudi.632.t: "Sagrada Família’nın inşası din adamlarını sevindiriyor"
 gaudi.632.d: "Ülkemizin din adamları, Sagrada Família’daki inşaat ilerlemesinden coşku duyuyor ve yardım teklif ediyor. Ancak bu durum kilisenin fazla etkili olabileceği endişesi yaratıyor."
 gaudi.632.f: "Gaudí hayatının son yıllarını, yaygın olarak bilinen adıyla 'Fakirler Katedrali'ne tamamen adadı; inşaatı sürdürebilmek için sadaka topladı. Bu amaca adanmasının dışında, az sayıda etkinliğe katıldı ve bunların çoğu Katolik inancıyla ilgiliydi: 1916’da Benedict rahibi Gregori M. Sunyol tarafından verilen Palau de la Música Catalana’daki Gregorian ilahileri kursuna katıldı. Monsegnor Ragonesi, Gaudí’yi 'Mimarlığın Dante’si' olarak nitelendirdi. Devasa boyutlarına rağmen, Sagrada Família bir katedral kilisesi değildir ve resmi kilise kaynakları tarafından finanse edilmez."
 gaudi.632.g: "Bundan faydalanmalıyız."
 gaudi.632.h: "Halk önünde kiliseyi övün."
 gaudi.632.i: "Bu konu kiliseyi ilgilendirmez!"
 gaudi.633.t: "Sendikalar Sagrada Família’yı eleştiriyor"
 gaudi.633.d: "Sendikaların temsilcisi olarak, [SCOPE.sCharacter('trade_unions_leader').GetFullName] bugün hükümete, Sagrada Família’nın tartışmalı desteklenmesini yeniden gözden geçirmesi için bir dilekçe gönderdi."
 gaudi.633.f: "Sendika liderleri, Sagrada Família’nın mevcut inşaatını korkunç bir para israfı olarak görüyor. Fonları anlamlı hayır işlerine yönlendiremeyeceklerse bile, en azından tehlikeli yüksekliklerde çalışan işçilere daha iyi muamele ve bakım talep ediyorlar."
 gaudi.633.g: "Onları görmezden gel."
 gaudi.633.h: "Sadece sözde destek ver."
 gaudi.633.i: "İşçilerin durumunu iyileştirmek için para harca."
 gaudi.634.t: "Kaza"
 gaudi.634.d: "Bugün Sagrada Família inşaat alanında bir kaza meydana geldi ve inşaat çalışmaları haftalarca geri kaldı."
 gaudi.634.f: "Baş döndürücü yüksekliklerde çalışmak kazaların tek riski değil. 2020’de bir kundakçı Sagrada Família’yı ateşe verdi, inşaatı durdurdu ve inşaat işçileri ile turistlerin tahliyesini sağladı. Sakristane yangından etkilendi ve hasar gördü."
 gaudi.634.g: "Üzücü."
 gaudi.635.t: "Ateistler Sagrada Família’ya karşı harekete geçti"
 gaudi.635.d: "Bugün yapılan bir halk konuşmasında, [SCOPE.sCharacter('gaudi_sagrada_atheist').GetFullName], Sagrada Família’nın inşasını Orta Çağ’a dönüş olarak eleştirdi ve benzer düşünen insanları para israfını kınamaya çağırdı."
 gaudi.635.f: "'Sagrada Família’ya birçok nedenle karşı olabilirsiniz. Üstelik birçok iyi nedenle. Örneğin, çünkü bu bir mimari kabus, korkunç bir kabus demek istemiyorum ama. Dönemimizin Avrupa mimarisinde bile bu kadar kaba veya gösterişli bir şey bulamazsınız. Her gün göğe yükselen, en karanlık ve absürd biçimlerde büyüyen bir kabus; kitsch, batıl inanç ve insan deliliği arasında yerleşmiş. Her şeyden önce bu delilik, vergi mükelleflerimizin parasıyla ödeniyor, rahipler aptalı daha aptal, fakiri daha fakir kılıyor. Hanımlar ve beyler, söyleyeyim: bu delilik durmalı. Yarın değil, bugün!''"
 gaudi.635.g: "Bu grupla fazla çatışmamalıyız."
 gaudi.635.h: "TANRI BUNU İSTER -DEUS VULT!-"
 gaudi.636.t: "Turistik yatırımlar"
 gaudi.636.d: "Turizm sektörü Sagrada Família’yı olumlu bir faktör olarak görüyor ve projeyi desteklemek istiyor."
 gaudi.636.f: "20. yüzyıl boyunca Sagrada Família, Barselona’nın gerçek simgesi haline geldi. Manevi boyut Gaudí için öncelikli iken, kaynak bulabilen girişimciler için sonsuz inşaat alanının pazarlanabileceği giderek daha açık hale geldi. Sonraki yıllarda yüzlerce takasçı turist bu nedenle Barselona’ya akın etti. Bugün Sagrada Família, İspanya’nın en popüler turistik destinasyonlarından biri."
 gaudi.636.g: "Barselona yakında bir simge ile zenginleşecek."
 gaudi.637.t: "İnşaat alanına yeni makineler"
 gaudi.637.d: "Ülkemizin motor endüstrisi, Sagrada Família inşaat alanını son derece modern bir makine ile donattı; bu da çalışmaları hızlandırıyor."
 gaudi.637.f: "Yüzyılı aşkın süren Sagrada Família inşaatı, aynı zamanda inşaatı hızlandıracak teknolojik gelişmelere de tanık oldu. Yüzyıl başında yeni inşaat yöntemleri ve makineler kullanılırken, yüzyıl sonunda bilgisayar simülasyonları kilisenin inşaatını devrimsel biçimde dönüştürdü."
 gaudi.637.g: "Bu bir ilerleme!"
 gaudi.638.t: "Grev tehdidi"
 gaudi.638.d: "Sagrada Família işçileri, daha iyi ücret müzakereleri yapılmazsa greve gideceklerini duyurdular."
 gaudi.638.f: "Ah, grevlerin harika dünyası! Güney Avrupa’da tren istasyonunda mahsur kalmanın, demiryolu işçileri sendikasının aniden sabotaj yapmaya karar vermesinin ne demek olduğunu yaşamadıysanız, ne kaçırdığınızı bilemezsiniz. Bugün sadece bir inşaat alanını etkiliyor. Gerçekten şanslıyız!"
 gaudi.638.g: "Müzakere etmeyeceğiz."
 gaudi.638.h: "Birkaç taşeron ödemek iş görür."
 gaudi.638.i: "Guardia Civil’i çağır!"
 gaudi.638.j: "Müzakere et."
 gaudi.639.t: "Kalitesiz malzeme"
 gaudi.639.d: "Sagrada Família için yapılan son malzeme teslimatı kalitesiz çıktı."
 gaudi.639.f: "İlk gözlem, getirilen taşın gözenekli noktaları olduğunu gösterdi. Usta inşaatçı, yüklemeyi sorgusuz sualsiz reddetti. Bu elbette inşaatı geciktirecek ve ek maliyet getirecekti, ama kalite sonunda kazanır. Aynı zamanda, bazıları sadece maliyet ve zaman nedenleriyle taş kullanmamız gerektiğini değil, bazı iyi malzemeleri başka yerde kullanılmak üzere saklamamız gerektiğini söylüyor."
 gaudi.639.g: "Kalitenin bir bedeli vardır."
 gaudi.639.h: "Sanki fark edecek birileri varmış gibi."
 gaudi.640.t: "Düzensiz inşaat"
 gaudi.640.d: "Kalitesiz malzeme etkisini gösterdi: bu sabah Sagrada Família’nın bir bölümü çöktü ve ciddi hasara yol açtı."
 gaudi.640.f: "Antoni Gaudí pek memnun değil."
 gaudi.640.g: "Bunu kim tahmin edebilirdi?"
 gaudi.641.t: "İnşaatta hızlı ilerleme"
 gaudi.641.d: "Sagrada Família’daki çalışmalar beklenenden daha iyi ilerliyor. Programdan birkaç ay önde olmayı bekliyoruz."
 gaudi.641.f: "Modern teknoloji, hızlı iş süreçleri, kesintisiz malzeme tedariki ve iyi hava, inşaat ilerlemesini destekliyor."
 gaudi.641.g: "Bunu öngörmüştüm!"
 gaudi.642.t: "Barselona’da yeni işler"
 gaudi.642.d: "Kilisenin inşası, Barselona’ya büyük bir insan akınına yol açtı."
 gaudi.642.f: "Orta Çağ’da olduğu gibi, büyük bir kilisenin inşası şehir yaşamında birçok yeni talep yarattı; bu talepler çoğu zaman yeni işçilerle karşılanabiliyordu. Sadece inşaat işçilerini işe almak yetmezdi. Restoranlar, dükkanlar, tedarikçiler ve yeni dairelerin inşası da birilerinin işi olmalıydı. Bu durum Barselona’da bir canlanmaya yol açtı; bazıları bundan doğrudan veya dolaylı olarak faydalanmak istedi."
 gaudi.642.g: "Büyük bir proje, büyük insanları gerektirir."
 gaudi.643.t: "Büyük anonim bağış"
 gaudi.643.d: "Bilinmeyen, zengin bir bağışçı, Sagrada Família inşaatını hızlandıracak büyük bir para transferinde bulundu."
 gaudi.643.f: "On yıllar boyunca Sagrada Família esas olarak bağışlarla finanse edildi. İnşaat başlamadan kısa süre önce yapılan büyük anonim bir bağış sayesinde Antoni Gaudí, bina planlarını önemli ölçüde genişletti ve Sagrada Família’yı bugünkü projeye dönüştürdü. İnşaat çalışmaları hâlâ Josep Maria Bocabella tarafından öngörüldüğü gibi vakıflardan ve giriş ücretlerinden sağlanan bağışlarla finanse ediliyor. Yılda yaklaşık 22 milyon euro inşaat için mevcut; 2009’da ise 18 milyon euro idi."
 gaudi.643.g: "Görünüşe göre biri kurtuluşu konusunda büyük kaygılar taşıyor."
 gaudi.644.t: "[SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName], Sagrada Família’yı destekliyor"
 gaudi.644.d: "[SCOPE.sCharacter('gaudi_ruler').GetFullName], Sagrada Família’ya büyük kişisel ilgi gösterdi."
 gaudi.644.f: "Resmî olarak, Sagrada Família’nın inşasına hükümet desteği yoktur. İspanyol İç Savaşı sırasında radikal sol güçler, inşaatın devamını engellemeye bile karıştılar. Franco, La Sagrada ile çok ilgilenmedi ama yapabilecekleri sınırlıydı. Gaudí, bunun İspanya’daki Katolik topluluk tarafından finanse edilmesini ısrarla istemişti. Ancak bu, bir devlet başkanının projeyi gizli kanallar aracılığıyla önemli ölçüde ilerletmesini engellemez… ister maddi ister yerel yönetim bağlantıları yoluyla."
 gaudi.644.g: "Yaşasın iyi [SCOPE.sCharacter('gaudi_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('gaudi_ruler').GetFullName]!"
 gaudi.645.t: "Turistik gezi"
 gaudi.645.d: "Sagrada Família hâlâ yapım aşamasında, ancak ilerleme kayda değer. Bir müttefiki davet edip her şeyi göstermeliyiz."
 gaudi.645.f: "Bitmemiş bir yapı olmasına rağmen, Sagrada Família ziyaretçileri etkiledi ve hayal güçlerini uyandırdı. Yapının tasarımı zaten kutuplaştırıcıydı. Gaudí’nin meslektaşlarının değerlendirmeleri genellikle olumluydu; Louis Sullivan, Sagrada Família’yı son yirmi beş yılın 'en yaratıcı mimari eseri, taşla simgelenmiş ruh!' olarak tanımlayarak çok hayran kaldı. Walter Gropius, Sagrada Família’yı övdü ve duvarlarını 'teknik mükemmeliyet harikası' olarak nitelendirdi. Ancak yazar ve eleştirmen George Orwell, onu 'dünyanın en çirkin binalarından biri' olarak gördü."
 gaudi.645.g: "Müttefikimizi Barselona’yı gezmeye davet et."
 gaudi.645.h: "Bu sadece çabalarımızı bozacak."
 gaudi.646.t: "Sagrada Família’nın inşasını desteklemek?"
 gaudi.646.d: "Elçimiz Sagrada Família inşaat alanında bir tur için davet edildi. Bu etkileyici bir gezi oldu ve şimdi elçi, kiliseye bağışçı olarak destek vererek uluslararası prestij kazanmamızı öneriyor."
 gaudi.646.f: "Bitmemiş bir yapı olmasına rağmen, Sagrada Família ziyaretçileri etkiledi ve hayal güçlerini uyandırdı. Yapının tasarımı zaten kutuplaştırıcıydı. Gaudí’nin meslektaşlarının değerlendirmeleri genellikle olumluydu; Louis Sullivan, Sagrada Família’yı son yirmi beş yılın 'en yaratıcı mimari eseri, taşla simgelenmiş ruh!' olarak tanımlayarak çok hayran kaldı. Walter Gropius, Sagrada Família’yı övdü ve duvarlarını 'teknik mükemmeliyet harikası' olarak nitelendirdi. Ancak yazar ve eleştirmen George Orwell, onu 'dünyanın en çirkin binalarından biri' olarak gördü."
 gaudi.646.g: "Bu muhteşem projeye desteğimizi vermeliyiz."
 gaudi.646.h: "Bu 'kilise' canlı olsaydı, ateşle yok edilmeliydi."
 gaudi.647.t: "Müttefikten bağış"
 gaudi.647.d: "Geziden sonra, müttefikimizin elçisi o kadar heveslendi ki projeye bağışçı olarak katkıda bulunmayı kabul etti."
 gaudi.647.f: "Bitmemiş bir yapı olmasına rağmen, Sagrada Família ziyaretçileri etkiledi ve hayal güçlerini uyandırdı. Yapının tasarımı zaten kutuplaştırıcıydı. Gaudí’nin meslektaşlarının değerlendirmeleri genellikle olumluydu; Louis Sullivan, Sagrada Família’yı son yirmi beş yılın 'en yaratıcı mimari eseri, taşla simgelenmiş ruh!' olarak tanımlayarak çok hayran kaldı. Walter Gropius, Sagrada Família’yı övdü ve duvarlarını 'teknik mükemmeliyet harikası' olarak nitelendirdi. Ancak yazar ve eleştirmen George Orwell, onu 'dünyanın en çirkin binalarından biri' olarak gördü."
 gaudi.647.g: "Gerçek dostlar hemen tanınır."
 gaudi.648.t: "Barselona’da arkeolojik araştırmalar"
 gaudi.648.d: "Barselona’yı ziyaret ettikten sonra, [SCOPE.sCharacter('gaudi_archaeologist').GetFullName], Sagrada Família’nın görünüşe göre Roma kalıntıları üzerine kurulu olduğunu keşfetti. Kazı izni talep ediyor."
 gaudi.648.f: "Roma’lar Barcino’da yerleşmiş olsa da, burası Tarraco ve Caesaraugusta başkentleri kadar önemli değildi. Barcino ismi, Roma’nın ilk imparatoru Augustus’un döneminin sonunda belirlendi. Colonia Faventia Iulia Augusta Pia Barcino’nun kısa biçimiydi ve M.Ö. 133’te emekli askerler için arazi sağlamak amacıyla kuruldu. Romalı coğrafyacı Pomponius Mela, Barcino’yu Tarragona (Tarraco) kontrolü altında bir dizi küçük yerleşim olarak bildirir. Yine de, Via Augusta’nın bir kolu üzerindeki stratejik konumu ekonomik gelişimini sağladı ve böylece vergi muafiyeti kazandı."
 gaudi.648.g: "İnşaatta böyle uzun bir duraklamayı göze alamayız."
 gaudi.648.h: "Benzersiz bir arkeolojik fırsat."
 gaudi.649.t: "[SCOPE.sCharacter('gaudi_chief_engineer').GetLastName], bir başka fikirle geldi..."
 gaudi.649.d: "[SCOPE.sCharacter('gaudi_chief_engineer').GetFullName], inşaat yönetimini son zamanlarda bir değişiklikle şaşırttı..."
 gaudi.649.f: "Sagrada Família gibi bir canavar inşa eden herkes er ya da geç eksantrik olur - ya da zaten öyledir."
 gaudi.649.g: "Bu, Mole Antonelliana’nın inşası kadar kötü neredeyse..."
 gaudi.650.t: "[SCOPE.sCharacter('gaudi_chief_engineer').GetLastName], Sagrada Família’nın inşasını hızlandırıyor"
 gaudi.650.d: "[SCOPE.sCharacter('gaudi_chief_engineer').GetFullName], inşaat yönetimini son zamanlarda inşaat ilerlemesiyle şaşırttı."
 gaudi.650.f: "Başmühendis olmak iyidir."
 gaudi.650.g: "Bu, Viyana’nın ring yolu inşası kadar tatmin edici."
 gaudi.1001.t: "İnşaatta Çelik İskeletin Yayılması"
 gaudi.1001.d: "Çelik İskeletli Bina icadı tek bir kişinin eseri değildi. Bu yavaş bir süreçti. Ancak, tanınmış bir mühendis olan [SCOPE.sCharacter('gaudi_engineer_scope').GetFullName], olağanüstü dayanıklılığa sahip ve daha önce görülmemiş yüksekliklere ulaşan binalar inşa ederek icadın yayılmasını hızlandırıyor."
 gaudi.1001.f: "Gelecekte bir bankaya ev sahipliği yapacak olan yeni bina, gün geçtikçe daha da yükseldi. İskelet gibi, çelik çerçeve orada duruyor ve diğer malzemelerle kaplanmayı bekliyordu.\nAma mimarları şimdiden 10 katla yetinmiyor, çok daha fazlasını hayal ediyordu. Gelecekte 50, belki de 100 kat mümkün olacaktı!"
 gaudi.1001.g: "Kulelerimiz nihayet göğe ulaşacak!"
 gaudi.1002.t: "Pavellons Güell"
 gaudi.1002.g: "Gerçekten dikkat çekici bir Sanat Stili!"
 gaudi.1003.t: "[SCOPE.sCharacter('tesla_new_engineer_scope').GetFullName], Savio Pisti’nde kazandı"
 gaudi.1003.d: "Genç [SCOPE.sCharacter('tesla_new_engineer_scope').GetFullName], Ravenna’daki Savio Pisti Grand Prix Yarışı’nda birinci oldu. Belki bu yükselen yeteneği bir şekilde destekleyebiliriz?"
 gaudi.1003.f: "Havada benzin kokusu, motorların gürültüsü, heyecan, tehlike, aksiyon… İşte insanlar bu yüzden araba yarışlarına seyirci olarak akın ediyordu.\n\n1923’te genç Enzo Ferrari ilk Grand Prix’sini kazandı ve oğlu doğana kadar yarışmaya devam etti. Ancak Scuderia Ferrari adlı kendi yarış takımı kurarak yarışlara bağlı kaldı."
 gaudi.1003.g: "Ne muhteşem bir gösteri!"
