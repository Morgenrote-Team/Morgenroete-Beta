 nationalization.11.d: "[TimeKeeper.GetCurrentDate.Format('y')], İtalya, mutfak kültürünü sonsuza dek değiştirecek çığır açan bir yemek kitabının yayınlanmasına tanık oldu. Kitabın yazarı Pellegrino Artusi, ulusun birliğini ve büyüklüğünü vurgulayan ve uluslararası alanda tanınan bir İtalyan mutfağının oluşmasına katkıda bulunmuştur." #deepl:4223602969
 nationalization.11.f: "1891 yılında yayınlanan Pellegrino Artusi'nin 'La scienza in cucina e l'arte di mangiare bene' adlı kitabı yaygın olarak ilk modern İtalyan yemek kitabı olarak kabul edilmektedir. İtalya'nın ulusal bir kimlik oluşturmaya yeni başladığı bir dönemde Artusi'nin çalışması, farklı bölgesel mutfakların tutarlı bir ulusal mutfak geleneğinde birleştirilmesinde çok önemli bir rol oynamıştır. Zekâ ve açıklıkla sunduğu titiz tarif koleksiyonu, yalnızca mutfak literatürü için yeni bir standart oluşturmakla kalmamış, aynı zamanda yerel gastronomide kalite, yenilik ve gururu teşvik ederek ülkenin yaşam standardının iyileştirilmesine de önemli ölçüde katkıda bulunmuştur." #deepl:2207143835
 nationalization.11.g: "Mutfak Sanatının Zaferi!" #deepl:1345745332
 nationalization.11.t: "La scienza in cucina e l'arte di mangiar bene" #deepl:3987888764
 pius.101.f: "'Yaklaşın çocuklarım, korkmayın. Size harika haberler vermek için buradayım...'\n\nGüneydoğu Fransa'da Corps yakınlarındaki La Salette köyünün yukarısındaki dağlık otlaklarda iki çoban çocuk, şimdi Hıristiyan âleminde kalpleri heyecanlandıran bir görüden bahseder. Işık saçan ve kederle örtülü bir kadın onlara göründü. Ağlıyordu - Tanrı'dan uzaklaşmış bir dünya için dökülen gözyaşları. Utanmadan söylenen küfürlerden, kirletilen Pazar günlerinden ve insanlığın tövbe etmemesi halinde gelecek kıtlık ve yıkımdan söz etti.\nBaşlangıçta kırsal bir efsane gibi görünen şey bir hareket haline geldi. Hacılar uzak dağ yamaçlarına akın ediyor. Keşişler ve gazeteciler aynı patikaları tırmanıyor. Kilise kararsızdır: Bazıları bu vizyonu ilahi bir tövbe çağrısı olarak benimserken, diğerleri popüler mistisizmin ve irrasyonel coşkunun yükselişinden korkmaktadır.\n Grenoble Piskoposu ihtiyatlı bir onay verir. Laik yetkililer şüpheyle yaklaşıyor.\n Ya Roma? Roma sessizce izliyor. Ama şimdiden çanlar çalmaya başladı." #deepl:2145205681
 pius.101.g: "İlahi bir uyarı." #deepl:3313498992
 pius.101.h: "Mantıklı olun." #deepl:499500707
 pius.101.t: "La Salette'de Görünüş" #deepl:3065761669
 pius.102.d: "Küçük bir kasaba olan Lourdes'te, on dört yaşında bir kız çocuğu mağarada ışık saçan bir kadın gördüğünü iddia eder. Gördükleri kısa sürede hacıların, tartışmaların ve Roma'nın dikkatini çeker." #deepl:1624678567
 pius.102.f: "'Gençti, yalınayaktı ve fakirdi. Yine de hiçbir kelimenin tarif edemeyeceği bir güzellikten söz ediyordu."\n\nPirene Dağları'nın eteklerinde, Lourdes yakınlarındaki ücra bir mağarada, Bernadette Soubirous adında bir köylü kızı, beyazlar giymiş, mavi kuşaklı ve ayaklarında altın güller olan bir kadından söz eder. İmgelem önce hiçbir şey söylemez - sadece gülümser. Sonra konuşmaya başlar: kefaretten, duadan, acı çekmekten ve ilahi merhametten bahseder. Kendini basitçe adlandırır: Lekesiz Gebelik.\nKöylüler ilk başta alay ederler. Ancak Bernadette gizli bir pınarı ortaya çıkarıp bunun bir şifa kaynağı olduğunu iddia ettiğinde, binlerce kişi gelmeye başlar - umut ederek, dua ederek, ağlayarak. Koltuk değnekleri geride bırakılır. Referanslar yayılır. Şüpheciler histeriyi kınadı. Doktorlar, rahipler ve politikacılar Lourdes'e akın eder.\n Kilise araştırır. Devlet ihtiyatla izler. Ve hala insanlar geliyor." #deepl:580789021
 pius.102.g: "Şifa ve Umut Tapınağı." #deepl:2629250679
 pius.102.t: "Lourdes'teki Görünüş" #deepl:1767463178
 pius.103.d: "İrlanda'nın Knock köyünde on beş tanık Meryem Ana, Aziz Yusuf ve Evangelist Aziz John'un sessiz bir şekilde görüldüğünü bildirir. Bu görüntü, uzun zamandır yoksulluk, sürgün ve yabancı egemenliği altında ezilen bir halkı harekete geçirir." #deepl:143567078
 pius.103.f: ""Tek kelime etmediler. Yine de o sessizlikte bir ulus umudu duydu."\n\nYağmur, County Mayo'daki Knock kilisesinin üzerine durmadan yağıyordu. Yine de on beş köylü donup kalmıştı. Önlerinde, güney duvarında ışıkla yıkanan sessiz bir topluluk duruyordu: dua eden Meryem Ana; yanında Aziz Yusuf; cüppeli ve elinde İncil tutan Evangelist Aziz John. Arkalarında, sunağın üzerinde bir kuzu ve bir haç... Hiçbir mesaj söylenmedi. Hiçbir hareket yapılmadı. Yine de tanıklar gördükleri üzerine yemin ettiler - genç, yaşlı, kadın, erkek...\nKıtlık, göç ve ruhani özlemin yıprattığı bir ülkede, bu sessiz görüntü vaazlardan daha yüksek sesle yankılandı. Hacılar kısa sürede şifa, işaret ve teselli arayışıyla geldiler. İngiliz yetkililer alay etti. Kiliseden bazıları tereddüt etti. Ancak İrlanda'nın yoksulları ve dindarları arasında Knock, saygınlık için kutsal bir çığlık haline geldi." #deepl:216954390
 pius.103.g: "Yağmurda Bir Işık." #deepl:4199802423
 pius.103.h: "Folklor olarak görmeyin." #deepl:2853965001
 pius.103.t: "Knock'taki Sessiz Görüş" #deepl:3086062832
 pius.104.d: "Orta Portekiz'de üç çoban çocuk, Meryem Ana'nın binlerce kişinin tanık olduğu mucizevi bir olayla doruğa ulaşan görüntülerini tekrar tekrar rapor eder. Gördükleri imgelemler savaş, acı ve Kilise'nin geleceğine dair kehanetler taşımaktadır." #deepl:3494130064
 pius.104.f: ""Sonunda, Lekesiz Kalbim zafer kazanacak."\n\nFátima kasabasının yakınında, Cova da Iria'nın kırsal tepelerinde, üç çocuk - Lucia, Francisco ve Jacinta - güneşten daha parlak, ışıltı ve kederle giyinmiş bir kadından bahseder. Altı ay boyunca tekrar tekrar ortaya çıkarak küresel savaş, tanrısız ideolojilerin yükselişi ve inananlara yapılan zulüm konusunda uyarılarda bulunur. Tövbe, dua ve Rusya'nın kalbine adanması çağrısında bulunur.\n13 Ekim 1917'de, on binlerce kişi bardaktan boşanırcasına yağan yağmurun altında dururken, güneş göklerden kopmuş gibi görünür, dönerek gökyüzüne çarpar. Bazıları dizlerinin üstüne düşer. Diğerleri kaçar. Işık kaybolduğunda, giysileri kurudur. Kalabalık şaşkınlık ve korku içinde sessizce dağılır.\n Kilise temkinlidir. Basın bölünmüş durumda. Ancak insanlar arasında - özellikle de yoksullar, yaralılar ve inançlılar arasında - yeni bir alev yanar: bir umut, bir uyarı, Bakire'yi sadece anne olarak değil, gelecek çağın nöbetçisi olarak gören bir alev." #deepl:2513437425
 pius.104.g: "Fátima'nın Uyarılarına Kulak Verin." #deepl:1664428204
 pius.104.h: "Güneş Mucizesini Çürütmek." #deepl:958137642
 pius.104.t: "Fátima'nın Sırları" #deepl:1100906175
 pius.105.d: "[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] yakınlarındaki ücra bir köyde Meryem Ana'nın göründüğüne dair haberler ortaya çıkar. Hikaye hızla yayılır, hacıların, şüphecilerin ve kilise yetkililerinin dikkatini çeker." #deepl:45703861
 pius.105.f: ""Tarlaların üzerinde, ışıktan bir taç içinde durdu ve sanki her ruhun kederini biliyormuş gibi bize baktı."\n\nİlk konuşan bir çocuktu; gözleri huşu içindeydi, sesi titriyordu. Şafaktan daha parlak, ışıltı ve kederle örtülü, sessizlik içinde beliren ve dünyayı derin, bilgili bir kederle izleyen bir kadından söz etti. Diğerleri de onu gördüklerini iddia ettiler. Bazıları dizlerinin üstüne çöktü. Diğerleri koştu. Hepsi onu takip eden sessizliği hatırlıyordu.\nHikaye köyün ötesine yayıldı. Ellerinde mumlarla hacılar geldi. İnananlar dua etti. Acı çekenler umutlandı. Rahipler tartıştı. Yetkililer kaşlarını kaldırdı. Ama insanlar gelmeye devam etti - kesinlik tarafından değil, daha eski bir şey tarafından çekildiler: inanma ihtiyacı.\nİster mucize, ister vizyon, ister efsane olsun, bu olay ona tanık olanların kalplerini ve şimdi ne anlama geldiğine karar vermek zorunda olanların hayatlarını çoktan şekillendirdi." #deepl:3063415784
 pius.105.g: "Sadıklar İçin Bir İşaret." #deepl:1177288670
 pius.105.h: "Histeriyi bastırın." #deepl:1037767630
 pius.105.t: "Our Lady of [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]" #deepl:4095895438
 pius.111.d: "Halka açık gösterileri yasaklayan resmi emirlere rağmen, inananlardan oluşan bir kalabalık [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] adresindeki Meryem'in göründüğü yere doğru kendiliğinden bir yürüyüş başlattı." #deepl:3379456873
 pius.111.f: ""Meşaleler yakmadık, bayraklar taşımadık. Sadece tespihler, sessizlik ve ayaklarımız tozun içinde."\n\nŞafakta ikişer üçer geldiler, tarlalar ve mezralar arasında yürüdüler, dualar fısıldadılar. Öğleye doğru yüzlerce kişi oldular, kimi yalınayak, kimi ağlayarak köy yolları boyunca akıyorlardı. Kadınlar çiçek taşıyordu. Yaşlı adamlar ayin mırıldanıyordu. Çocuklar tahtadan oyulmuş ikonaları tutuyordu.\nYetkililer alanın kapalı olduğunu ilan etmişti. Askerler nöbet tutuyordu. Yine de kimse kalabalığı durdurmadı. Belki de şarkılar yüzünden. Belki de sessizlik. Belki de görünmeyen bir şeydi.\nİnananlar imgelem yerine ulaştıklarında diz çöktüler, dualar mırıldandılar ve toprağa mumlar yaktılar. Gökten hiçbir ses gelmedi. Hiçbir mucizeye tanık olunmadı. Ama bir şeyler çoktan değişmişti. Bir halk harekete geçmişti - yasaya karşı gelerek değil, yasadan daha eski bir şeye itaat ederek." #deepl:2369382513
 pius.111.g: "Dua etsinler." #deepl:2163336687
 pius.111.h: "Sessizce gözlemleyin." #deepl:3862482018
 pius.111.h_tt: "Marian görüntülerinin ardından başka olayların da meydana gelme ihtimali yüksektir." #deepl:2612943668
 pius.111.i: "Onları zorla dağıtın." #deepl:1733449904
 pius.111.i_tt: "Kanlı bir çarpışma ihtimali çok yüksek." #deepl:202372566
 pius.111.t: "Yasaksız Alay" #deepl:3613794317
 pius.112.d: "Yasaklanmış Meryem Ana töreninin yapıldığı yerde yetkililer ve inananlar arasında çıkan çatışma şiddete dönüştü. Bir zamanlar imgelemlerin umuda ilham verdiği toprak şimdi kan lekesi taşıyor." #deepl:2719807490
 pius.112.f: ""Dualar edildi ve sonra çığlıklar yükseldi."\n\nAskerler geldiğinde mumlar hâlâ titriyordu. Önce şaşkınlık, sonra yalvarış sesleri yükseldi. Bir kadın düştü. Bir çocuk haykırdı. Emri kimin verdiğini kimse bilmiyordu ama tüfekler havlıyor, coplar sallanıyor, botlar tütsü ve toprakta ilerliyordu. Sessizlik geri döndüğünde, öncekinden daha ağırdı.\n Kilise sarsıldı. İnananlar öfkeliydi. Basın kısık sesle konuşuyor; kimileri kaza, kimileri katliam diyor. Bir zamanlar kutsal olduğu fısıldanan yer, şimdi hafızalar tarafından lanetleniyor. Ve yine de insanlar toplanıyor - çiçeklerle değil, öfkeyle, sessizlikle, hiçbir yasanın söndüremeyeceği bir bakışla." #deepl:2186004653
 pius.112.h: "Bu duruma kendileri sebep oldular." #deepl:402397332
 pius.112.t: "Kutsal Topraklarda Kan" #deepl:1312740775
 pius.113.d: "Yerel bir rahip, [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] adresindeki Meryem Ana görüntülerinin en önde gelen savunucusu olarak yükseldi. Vaazları kalabalıkları çekiyor, sözleri umut veriyor ve devlet otoritesine meydan okuyor. Adı Peder [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName]." #deepl:1046441460
 pius.113.f: "'O güçlülere değil, alçakgönüllülere göründü. Belki de bu yüzden onu susturmak istiyorlar."\n\nKöyün yukarısındaki taş kilisede, Peder [SCOPE.sCharacter('pius_marian_priest_scope').GetFirstName] adında bir rahip vaaz vermeye başlamıştır - sadece Bakire'nin merhametini değil, adaletini de. Sözleri nefin ötesinde yankılanıyor: "Eğer cennet burada konuştuysa, hiçbir hükümet onun yankısını yasaklayamaz."\nHacılar onun vaazlarına akın eder. Adı fısıltılarla ve ilahilerle yayılır. Barış çağrısı yapıyor ama varlığı huzursuzluk yaratıyor. Bazıları ona peygamber diyor. Diğerleri ise cüppeli bir asi. Yetkililer tedirgin olur. Ordu kışkırtmadan söz ediyor. Kilise hiyerarşisi tereddüt eder - dogma ve diplomasi arasında kalır. Masanıza sessiz bir teklif gelir: Görevden alınabilir. Sessizce. Ama bazı adamlar susturulduklarında daha yüksek sesle konuşurlar." #deepl:2395659126
 pius.113.g: "Bırak vaaz versin." #deepl:3471579290
 pius.113.h: "Müzakere için onu başkente çağırın." #deepl:1641636788
 pius.113.i: "Onu yok et." #deepl:3010062703
 pius.113.t: "Kürsüdeki Ses" #deepl:3682486724
 pius.114.d: "Ülke çapında Katolik inananlar, Meryem Ana'nın görünmesini desteklemek için halka açık gösterilere başladı. Kırsal bir hac ziyareti olarak başlayan bu hareket ulusal bir harekete dönüştü." #deepl:3473602537
 pius.114.h: "Ulusal geçit törenini yasaklayın." #deepl:1813497751
 pius.114.t: "Ulusu Sarsan Geçit Töreni" #deepl:738056863
 pius.115.d: "Ciddi bir ürün kıtlığı [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]'un birçok kırsal bölgesini vurmuştur. İnananlar arasında tehlikeli bir fısıltı yayılmaya başlar: Bir zamanlar devlet tarafından susturulan Bakire şimdi ağlamakta ve cezalandırmaktadır." #deepl:3238123436
 pius.115.g: "Batıl inanç! Umarım..." #deepl:2447781343
 pius.115.t: "Tarlalar Boş Yatıyor" #deepl:3151937266
 pius.116.d: "Yıllarca süren baskı ve inkar edilen mucizelerin ardından, bir zamanlar dindar olan pek çok vatandaş [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]'a olan inançlarını terk etmeye başladı. Giderek artan sayıda kişi artık kendilerini Katolik olarak değil, hiçbir şey olarak tanımlıyor." #deepl:1323000478
 pius.116.f: "Artık gelmiyor. Ne rüyalarda, ne de hayallerde. Mumlar yanmıyor." Tapınak kapandı. Rahip gitti. Tarlalar sessiz.\nBir zamanlar en yoksullar bile uyumadan önce Ave Maria'ları fısıldar, ikonalar ocakların yanında asılı durur ve çan sesleriyle gözyaşları dökülürdü. Şimdi kiliseler boş duruyor. Çocuklar 'günah çıkarmanın' ne olduğunu soruyor. Gençler Akıl'dan, İlerleme'den, Hiçbir Şey'den bahsediyor.\nİnsanlar ideolojiye dönmedi. Küle döndüler. Onlar radikal değiller. Tükendiler. Ve boş sessizliğin içinde bir yerde şu soru duruyor:\nO mu bizi terk etti, yoksa biz mi onu?" #deepl:231766477
 pius.116.g: "İnanç Çağı geçti." #deepl:146424195
 pius.116.t: "Çanın Ötesindeki Sessizlik" #deepl:2179217507
 pius.119.d: "Yeni kurulan ateist hükümet Marian hac yerinin kapatılması emrini verdi. Bir zamanlar ışık ve dua mekanı olan bu yer şimdi kordon altına alınmış, devlet gözetiminde sessizliğe bürünmüştür." #deepl:1939840262
 pius.119.f: ""Çanlar çalmadı. Mumlar yanmıyordu. Kapılar gün doğmadan kilitlendi."\n\nBir zamanlar binlerce kişiyi çeken tapınak şimdi tek başına duruyor. Şapelin kapısına bir not çakılmış: 'Halk Meclisi'nin emriyle, bu yapının gerekli olmadığı ilan edilmiştir. Muhafızlar nöbet tutuyor, korumak için değil, engellemek için.\nHiçbir güç kullanılmadı. Hiçbir protestoya izin verilmedi. Değişim sessizce, bürokratik bir şekilde geldi - bir patlamadan ziyade bir yokluk. Yine de ülkenin dört bir yanındaki evlerde yaşlı eller titriyor. Büyükanneler tespihlerini saklıyor. Çocuklar hacıların neden artık şarkı söylemediğini soruyor. Din adamları sessiz. Parti bilimden, akıldan ve ilerlemeden bahsediyor. Ve kilitli kapıların ardında bir yerlerde, bir soru yarı sönmüş bir mum gibi titriyor: Bu gerçekten gerekli miydi?" #deepl:3255413028
 pius.119.g: "Artık yanılsamalar için anıtlar inşa etmiyoruz." #deepl:702720701
 pius.119.t: "Tapınağın Kapatılması" #deepl:589514149
 pius.121.d: "[SCOPE.sState('pius_marian_apparition_state').GetFarmHubName] adresindeki Marian görüntüsü resmi olarak olumlu bir işaret olarak kabul edilmiştir. Ancak şimdi bile, gerçek anlamı yoruma açık kalmaktadır." #deepl:181746716
 pius.121.f: "Işıltılı figürün köylülere görünmesinden bu yana geçen haftalarda başka bir işaret görülmedi. Gökten ateş gelmedi. Bulutlarda ses yok. Sadece sakin gökyüzü ve merakın kalıcı yankısı...\nYine de insanlar konuşuyor - barıştan, iyileşmeden, ulusun ruhunda bir şeylerin değiştiğinden. Hacılar coşkuyla değil, saygıyla gelirler. Din adamları yumuşak bir şekilde vaaz veriyor. Basın, ilk kez, alay etmeden haber yapıyor: Bu mucize ne anlama geliyor?" #deepl:3589438214
 pius.121.g: "Sıradan insanlar için bir nimet." #deepl:560950828
 pius.121.h: "Din adamlarımıza ilahi bir işaret." #deepl:2114621818
 pius.121.t: "Ne demek istiyor?" #deepl:1525290236
 pius.122.d: "Meryem Ana'nın göründüğü yer artık tamamen tanınan bir hac yeri haline gelmiştir ve giderek artan sayıda yakın ve uzak bölgelerden inananları kendine çekmektedir." #deepl:3557311135
 pius.122.g: "Totus tuus." #deepl:314650754
 pius.122.t: "Tapınağı [SCOPE.sState('pius_marian_apparition_state').GetFarmHubName]" #deepl:3872076082
