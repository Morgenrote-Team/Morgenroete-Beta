 MR_HIRE_COACH_BUTTON: "Ulusal Koç Kiralayın" #deepl:1754227168
 MR_HIRE_COACH_BUTTON_TT: "#T Bir Milli Antrenör Kiralayın#!\nFIFA'nın kuruluşundan ve ilk uluslararası maçlardan sonra bir milli antrenör kiralanabilir. Ulusal antrenörler, maç sonuçlarının iyileştirilmesine becerileriyle katkıda bulunurlar. Eğer bir antrenör beklentileri karşılayamazsa, en az üç yıl sonra değiştirilebilir.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3011015130
