 dubois.2173.f: "Plesiosaurus bir deniz sürüngenleri takımıdır. Fosilleri dünyanın her yerinde bulunabilir. Türlere bağlı olarak, hayvanlar 1,5 ila 15 metre uzunluğundaydı. Türlere bağlı olarak, muhtemelen farklı hayvanlarla besleniyorlardı. Salyangoz ve midyeden balık ve diğer avlara kadar...\nBalık tuzağını andıran U şeklindeki çeneleri ve keskin dişleri onlara kullanışlı bir alet sağlamıştır." #deepl:1725138010
 dubois.2173.t: "Plesiosaurus" #deepl:3684543079
 dubois.2174.f: "Basilosaurus bir dinozor değil, tarih öncesi bir balina türüdür. Uzun gövdesi uzun bir yılanı andırır, ancak 20 metreye varan uzunluğuyla ispermeçet balinasına benzer." #deepl:4279559397
 dubois.2174.t: "Basilosaurus" #deepl:3895138572
 dubois.2175.f: "Devasa köpekbalığı Megalodon muhtemelen şimdiye kadar var olmuş en büyük köpekbalığıdır. Ancak şu anda sadece dişleri ve omurları bulunduğu için uzunluğunu tahmin etmek zordur. Paleontologlarımız uzunluğunun 9 ila 30 metre arasında bir yerde olduğunu tahmin ediyor. Her iki durumda da köpekbalığı iskeleti nefes kesicidir ve koleksiyonumuzun en önemli mücevherlerinden biridir." #deepl:1066794911
