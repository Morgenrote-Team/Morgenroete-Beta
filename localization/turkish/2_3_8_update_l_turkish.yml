 concept_verrier_venus_transit: "Venüs Geçişi" #deepl:3328636769
 concept_verrier_venus_transit_desc: "Venüs'ün geçişi, Ay'ın Dünya ile Venüs arasından geçtiği nadir bir olayı ifade eder. Ancak bu olay 19. yüzyılda iki kez gerçekleşmiştir: 1874 ve 1882'de. Venüs'ün geçişinin gözlemlenmesi, güneş sisteminin büyüklüğü hakkında sonuçlar çıkarılmasına ve astronomik birimin (AU) büyüklüğünün daha kesin bir şekilde belirlenmesine olanak tanıdığından, bunlar önemli bilimsel olaylardı. [concept_verrier_venus_transit_zone] adresinde bulunan ülkeler olayı buradan gözlemleyebilir; diğer ülkelerin keşif gezileri göndermesi gerekir. Gözlemin başarısı [concept_verrier_astronomer]'un deneyimine, bir [concept_gaudi_engineer]'un mevcudiyetine ve biraz da şansa bağlıdır: bazen hava iyi bir görüntü alınmasını engelleyebilir. Gözlem ne kadar iyi olursa, ödül de o kadar büyük olur." #deepl:1890935103
 concept_verrier_venus_transit_zone: "Venüs Geçiş Bölgesi" #deepl:535627695
 concept_verrier_venus_transit_zone_desc: "Venüs Geçiş Bölgesi, Venüs'ün tam (sadece kısmi değil) geçişinin gözlemlenebildiği Dünya'nın bir bölümünü ifade eder. Bu durum 1874 yılında özellikle Doğu Asya-Pasifik bölgesi için, 1882 yılında ise neredeyse tüm Amerika kıtası için geçerliydi. Stratejik bölgelerin ayrıntılı bir dökümü aşağıda verilmiştir.\n\n#V 1874 Venüs Geçişi:#!\nEndonezya, Çinhindi, Okyanusya, Güney Çin, Kuzey Çin, Mançurya, Japonya, Orta Hindistan, Madras, Bengal, Himalayalar; ayrıca Hint Okyanusu Toprakları Eyaleti.\n\n#V Venüs Geçişi 1882:#!\nBrezilya, La Plata, And Dağları, Büyük Kolombiya, Meksika, Orta Amerika, Karayipler, Ortabatı, Dixie, New England; ayrıca Ontario ve Quebec Eyaletleri." #deepl:1055797749
