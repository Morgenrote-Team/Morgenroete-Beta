 verrier.308.d: "Astronomlar #ORANGE 1874#! Avustralya-Endonezya-Pasifik bölgesinde bir Venüs Geçişi öngörmüşlerdir. [ROOT.GetCountry.GetNameNoFlag] bilim topluluğu, hayatta bir kez görülebilecek bu astronomik olayı gözlemlemeyi talep etmektedir." #deepl:1738426681
 verrier.308.f: "Venüs geçişi, Venüs gezegeninin Güneş'in önünden geçişidir. Bu olay yaklaşık 243 yılda sadece dört kez gerçekleşir. Tarihsel olarak, bu tür geçişlerin hassas ölçümü, dünya ile güneş arasındaki mesafenin (astronomik birim) belirlenmesi için büyük önem taşıyordu ve önemli enstitüler ve bilim insanları tarafından birçok keşif ve ölçüm kampanyasına yol açtı. Venüs'ün 1874'teki geçişi astronomik ölçümler için nispeten elverişsizdi. Neredeyse tüm Avrupa'dan görünmüyordu, uzun geçiş süreleri sadece Asya'dan, kısa geçiş süreleri ise Avustralya, Güney Pasifik adaları ve güney Hint Okyanusu'ndan (özellikle Kerguelen Takımadaları) gözlemlendi. Yine de yaklaşık 60 keşif gezisi düzenlendi." #deepl:3786277450
 verrier.308.g: "Bunu kaçırmamalıyız." #deepl:2334937119
 verrier.308.t: "1874'te Venüs Geçişi" #deepl:3101017563
 verrier.309.d: "Astronomlar #ORANGE 1882#! tarihlerinde Güney Amerika, Orta Amerika ve Kuzeydoğu Amerika bölgeleri için bir başka Venüs Geçişi öngörmüşlerdir. [ROOT.GetCountry.GetNameNoFlag] bilim topluluğu, hayatta bir kez görülebilecek bu astronomik olayı gözlemlemeyi talep ediyor." #deepl:3366532829
 verrier.309.f: "Venüs geçişi, Venüs gezegeninin Güneş'in önünden geçişidir. Bu olay yaklaşık 243 yılda sadece dört kez gerçekleşir. Tarihsel olarak, bu tür geçişlerin hassas ölçümü, dünya ile güneş arasındaki mesafenin (astronomik birim) belirlenmesi için büyük önem taşımış ve önemli enstitüler ve bilim insanları tarafından birçok keşif ve ölçüm kampanyasına yol açmıştır. Venüs'ün 1882 geçişi, daha erişilebilir bazı bölgelerde görülebildiği için 1874 geçişine göre bazı avantajlara sahipti. Böylece geçiş, Kuzey Amerika'nın kuzeyi ve kuzeydoğusu dışında tüm Amerika kıtası boyunca görülebildi." #deepl:1503344549
 verrier.309.t: "1882'de Venüs Geçişi" #deepl:2995649523
 verrier.311.d: "Nadir görülen bir astronomik olay yaklaşıyor: Venüs gezegeni Güneş'in önünden geçecek. Dünya genelinde gözlemevleri ve hükümetler hazırlıklara başladı." #deepl:4200477530
 verrier.311.f: "Tarih saniyesine kadar hesaplandı. Teleskoplar paketleniyor. Saatler senkronize edildi. Venüs gezegeni Güneş'in önünden geçecek. Gökbilimciler bu geçişin, güneş sisteminin temel ölçeği olan astronomik birimin hassas bir şekilde ölçülmesine olanak sağlayacağına inanıyor. Ancak bu çabanın başarısı tamamen görünürlüğe, yani konuma, hava durumuna ve koordinasyona bağlı." #deepl:2621945333
 verrier.311.g: "Geçişi evden izliyoruz." #deepl:2383387639
 verrier.311.h: "Koruyucu devletlerimizden birine bir keşif gezisi gönderiyoruz." #deepl:1098022190
 verrier.311.i: "Uzak bir ülkeye bir keşif gezisi gönderiyoruz." #deepl:381412623
 verrier.311.j: "Bunu tekrar düşünmeliyiz." #deepl:1178423846
 verrier.311.t: "Venüs Transitine Hazırlık" #deepl:967668025
 verrier.319.d: "[SCOPE.sCountry('verrier_venus_transit_leader').GetName] adresinden bir keşif heyeti, Venüs geçişi gibi nadir bir astronomik fenomeni gözlemlemek üzere bölgemize ulaştı." #deepl:853589
 verrier.319.f: "Mercekler, saatler ve çizelgelerle dolu sandıklarla karaya çıktılar. Sözcüleri üniversite yetkilileriyle bir araya gelerek dostça yazışmalar ve teknik brifingler sundu. Gözlemevi asistanları meraklı, gazeteler tarafsız ama tetikte.\n\nBirçok bölüm bunun sonuçlarını tartışıyor: bilimsel işbirliği, evet - ama aynı zamanda veri alışverişi, lojistik egemenlik ve dünya sahnesinde görünürlük." #deepl:209223472
 verrier.319.g: "Bilim ortak dilimiz olsun." #deepl:183308092
 verrier.319.t: "Yabancı Gözler Gökyüzünde" #deepl:4019861958
 verrier.321.d: "Yolculuk sırasında keşif gemisini şiddetli bir fırtına vurdu. Çarpan dalgalar ve kaotik donanımın ortasında, hassas geçiş aletleri de dahil olmak üzere birkaç sandık güverteden koparak denize düştü." #deepl:2127492192
 verrier.321.f: "[ROOT.Var('verrier_astronomer_var').GetCharacter.GetFullName] gökyüzü paramparça olurken küpeşteye tutundu. Deniz bir düşman gibi yükselmiş, halatları ve varilleri güverteye savurmuştu. Sandıklar -iki tanesi- karanlığın içinde kaybolmadan önce korkunç bir kavis çizerek kaydılar.\n\nDaha sonra, fırtına dindiğinde ve geriye sadece sessizlik kaldığında, hasar sayıldı. Ana helyometre. Königsberg'den bir çift mercek. Birkaç hassas saat.\n\nDr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] sırılsıklam olmuş mürettebatın ve kırık tahtaların arasında durmuş, aletlerin bulunduğu boşluğa bakıyordu. Yedekleri vardı. Ama hiçbiri kusursuz değildi.\n\nVenüs gibi zaman da kimseyi beklemez." #deepl:2744264311
 verrier.321.t: "Transit Üzerinde Fırtına" #deepl:2256455346
 verrier.322.d: "Gece yıldız alanı kalibrasyonu sırasında, keşif gezisinin astronomu düzensiz hareketler ve olmaması gereken sabit noktalar kaydetti. Mevcut yıldız haritalarıyla yapılan karşılaştırmalar da bunu doğruladı: Ekip yeni, keşfedilmemiş gök cisimleri tespit etmiş olabilir." #deepl:2064965258
 verrier.322.f: "Gemi kadife gibi bir gökyüzünün altında sürükleniyordu. Bulutlar saatler önce dağılmış, geride doğal olmayan bir berraklık bırakmıştı. Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] tekrar göz merceğine eğildi. Orada - Altair ile sekstant ızgarasının kenarı arasında - hareket vardı. Bir kuyruklu yıldız için çok yavaştı. Bir arıza için fazla sabitti.\n\nGeceden geceye, [ROOT.Var('verrier_astronomer_var').GetCharacter.GetSheHe] aynı gökyüzü parçasına geri döndü, çizdi, hesapladı, karşılaştırdı. Sonunda [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] notları bunu doğruladı: küçük bir gezegen. Muhtemelen iki tane. Kataloglanmamış.\n\nVenüs bekleyecekti. Ama yıldızlar çoktan başka bir şey sunmuştu." #deepl:1791725592
 verrier.322.g: "Bilinsin ki: gökler hala sır saklıyor." #deepl:1342826733
 verrier.322.t: "Beklenmedik Işıklar" #deepl:1561684464
 verrier.323.d: "Yolculuk sırasında verilen bir mola sırasında keşif ekibi, astronomik gözlem için potansiyel yükselti noktalarını araştırmak üzere iç kesimlere doğru ilerledi. Bunun yerine buldukları şey, hiçbiri mevcut botanik kayıtlarında görünmeyen, yabancı bitkilerden oluşan bir koruluktu." #deepl:3286240010
 verrier.323.f: "Her şey bir kokuyla başladı. İnce, narenciye keskinliğinde, orman kenarındaki eğrelti otlarından yükseliyordu. Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] yoğun çalılıkların arasından kokuyu takip etti ve ışığın su gibi biriktiği bir açıklık buldu.\n\nBurada, koyu menekşe sapları mükemmel sarmallar halinde çiçek açmıştı. Kırmızı yosunlar obsidyen renkli taşları kaplamıştı. Yükseklerde, sarkan yıldızlara benzeyen sarmaşık kümeleri rüzgârda sallanıyordu. Kimse onlara isim veremiyordu.\n\nGenç asistanlardan biri fısıldadı: "Sanki gökyüzü yeryüzüne düşmüş gibi."\n\nVenüs gezegenini kovalamaya gelmişlerdi. Ama burada, durgun havada ve süzülmüş ışıkta, farklı türde bir mucize buldular." #deepl:808904157
 verrier.323.g: "Örnekleri toplayın ve çalışma için muhafaza edin." #deepl:1767661174
 verrier.323.t: "Yıldızlar Arasında Bir Bahçe" #deepl:2845961206
 verrier.324.d: "Keşif ekibi yüksek bir gözlem alanı ararken jeolojik açıdan son derece ilgi çekici bir alana rastladı. Etrafı çevreleyen taş, daha önce nadiren görülen desenler ve kalıntılar taşımaktadır." #deepl:539957699
 verrier.324.g: "Bu buluntu Dünya'nın kendi hikayesine aittir." #deepl:2450655201
 verrier.324.t: "Zamanın Ötesindeki Taş" #deepl:2335051515
 verrier.325.d: "Keşif gezisi giriş limanına ulaştı - ancak gümrük yetkilileri derhal geçiş izni vermeyi reddediyor. Birkaç sandık dolusu bilimsel ekipman incelenmek üzere alıkonuldu ve görevliler daha önce hiç talep edilmemiş ek belgeler istiyorlar." #deepl:2525277400
 verrier.325.f: "Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] kargo manifestosunun yanında durmuş, dişlerini sıkmıştı. Cıvalı mercekler, hassas saatler, cilalı pirinç muhafazalar - kilitli bir kapının ardındaki depoda hareketsiz duruyor, mürekkep ve pul bekliyorlardı.\n\nGümrük memuru kibar ama kararlıydı: 'Bilimsel olsun ya da olmasın, antlaşmayla muaf tutulmadıkça tüm yabancı aletler beyan edilmeli, incelenmeli ve vergilendirilmelidir."\n\nAntlaşmalar için zaman yoktu.\n\nDışarıda güneş hâlâ doğuyordu. Ve Venüs bürokrasiyi beklemezdi." #deepl:34765689
 verrier.325.g: "Ücreti ödeyin ve izni hızlandırın." #deepl:240478226
 verrier.325.t: "Gökyüzünün Altındaki Engeller" #deepl:2346862710
 verrier.340.d: "Haftalar süren hazırlıkların ardından Venüs geçişi için gözlem noktası tamamlandı. Aletler kalibre edildi. Haritalar doğrulandı. Artık tek bilinmeyen gökyüzü." #deepl:1138273071
 verrier.340.f: "Kubbe, pirinçten ve sessiz bir amaçtan oluşan bir deniz feneri gibi yükseliyordu. İster kendi topraklarında taştan inşa edilmiş olsun, ister yabancı bir sahada branda ve perçinlerden, şimdi beklentinin soluksuz dinginliğini barındırıyordu.  İçeride, helyometre lamba ışığında parıldıyordu. Dişliler fısıltıyla dönüyordu. Zamanlayıcılar beklenti içinde tıkırdadı. Dışarıda asistanlar merceklerdeki tozu süpürüyordu. Hava bile tereddüt ediyor gibiydi. Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] kapıda durdu ve eşiğe dokundu. Aylardır her şey bu ana doğru ilerlemişti. Artık inşa edilecek bir şey kalmamıştı, sadece beklemek gerekiyordu. Üstlerinde, görünmez gökyüzünde bir yerlerde Venüs yolunu izliyordu." #deepl:2967275520
 verrier.340.g: "Hassasiyet sakin ellerle başlar." #deepl:2872475059
 verrier.340.t: "Gözlemevi Venüs Geçişi İçin Hazır" #deepl:966063237
 verrier.341.d: "Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] ana teleskobun iç dengeleyicisinde küçük ama önemli bir değişiklik önerdi. Bu değişiklik iç titreşimi azaltabilir ve temas anında optik keskinliği artırabilir." #deepl:491784908
 verrier.341.f: "Olay kubbede değil, arkasındaki atölye çadırında gerçekleşti. Dr. [ROOT.Var('gaudi_engineer_var').GetCharacter.GetLastName] elinde yağ bulaşmış bir not defteriyle yaklaştığında Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] çizelgeleri inceliyordu. Yeniden hesaplanmış bir tampon gerilimi. İçteki pirinç halka için revize edilmiş bir destek.\n\nDiğerleri saygılı bir şüphecilikle dinledi - ta ki testler bunu kanıtlayana kadar: görüntü bir derecenin kesirleri kadar daha sabitti. Bulanıklık ve netlik arasındaki çizgiyi değiştirmeye yetecek kadar." #deepl:2995793810
 verrier.341.g: "Büyük bir hassasiyetle küçük bir değişiklik." #deepl:1641676745
 verrier.341.t: "Sessiz Ayarlama" #deepl:3486983252
 verrier.342.d: "Elektromanyetik teoride yakın zamanda yapılan bir atılım, teleskobun gözlem protokolüne yeni bir optik filtreleme yönteminin uygulanmasını sağladı. Atmosferik ışık saçılımından kaynaklanan parazit artık daha iyi hesaba katılabiliyor ve bu da daha net görsel veriler elde edilmesini sağlıyor." #deepl:2503805121
 verrier.342.f: "Fikir kubbeden ya da mercekçinin tezgahından değil, bir sayfadan geldi. Bu, dalga denklemlerinin geliştirilmesiydi - ışığın sadece parçacık ya da ışın olarak değil, salınan bir alan olarak nasıl davrandığı. Bununla birlikte, yeni bir girişim modeli tahmin edilebiliyor ve bir düzeltme uygulanabiliyordu. Filtreler yeniden kesildi. Pozlama zamanlamaları ayarlandı. Mühendisler şüphelerini yeniden kontrol ettiler.\n\nDr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] o gece test merceğinden baktığında, yıldızlar artık titremiyordu. Duruyorlardı - kesin, soğuk, gerçek. Gökyüzü sallanmayı bırakmıştı." #deepl:914121255
 verrier.342.g: "Matematik gözü keskinleştirir." #deepl:2639991371
 verrier.351.d: "Yokohama'dan Réunion'a, Kerguelen'den Pekin'e, kıtalar ve okyanuslar boyunca gökbilimciler Venüs gezegeninin Güneş'in önünden geçişini izlediler. 1874 geçişi tamamlandı - ve birçok ekip başarılı olduğunu bildirdi." #deepl:3119534429
 verrier.351.f: "Buharlı gemilerle, deve sırtında, demiryoluyla ve yaya olarak geldiler. Mühendisler, botanikçiler, haritacılar. Ormanlarda ve çöllerde gözlemevleri inşa ettiler. Hava durumunu incelediler, gölgeleri zamanladılar, mercekleri elleri titreyene kadar parlattılar.\n\nVe 9 Aralık 1874'te altı saat boyunca siyah bir noktanın güneş diski boyunca kaymasını izlediler.\n\nVenüs bir fısıltı gibi girdi ve bir sır gibi çıktı. Ölçümler mükemmel değildi ama yeterliydi. Üçgenleme başlayabilirdi. İnsanlık ilk kez güneş sisteminin gerçek ölçeğini bilebilirdi - efsane ya da metafor olarak değil, gölge tarafından izlenen sayılarla. Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] defterini kapattı ve nefes verdi: Bitmişti." #deepl:1827747392
 verrier.351.g: "Bu çok güzel." #deepl:2882436754
 verrier.351.t: "1874 Transiti" #deepl:2395808814
 verrier.352.f: "Bu sefer gemiler daha erken ayrıldı. Gözlemevleri daha sağlamdı. Saatler daha hassastı. 1874'te öğrenilen dersler her eli, her gölgeyi, her hesaplamayı yönlendirdi.\n\nNew Jersey'den Patagonya'ya, Meksika'dan Avustralya'ya, dünya güneşteki bir nokta için durdu.\n\nDr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] son filtreyi ayarladı. Disk belirdi; yanan beyazın üzerinde yavaşça kayıyordu. Tezahürat yoktu, sadece kalemlerin hışırtısı, kepenklerin tıkırtısı, zaferin sessiz nefesi vardı. Venüs'ün geri dönmesi için 121 yıl daha geçmesi gerekecekti. Ama burada, bu anda, zamanın kendisi ölçülmüştü." #deepl:907305697
 verrier.352.g: "Bir sonrakini asla göremeyeceğiz." #deepl:2603880366
 verrier.353.d: "Uzun zamandır beklenen an yaklaştıkça hava koşulları kötüleşmeye başlar. Her şeyi örtecek kadar yoğun olmasa da netliği ve zamanlamayı bozmaya yetecek kadar bulut oluşur." #deepl:1325753029
 verrier.353.f: "Gökyüzü tamamen kapanmamıştı ama artık itaat etmiyordu. Sürüklenen bulut katmanları güneşin üzerine tül gibi yayıldı. Işık düzensiz darbelerle azaldı ve parladı. Her mercek denge için, her asistan nefes almak için çabalıyordu. Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] [ROOT.Var('verrier_astronomer_var').GetCharacter.GetHerHis] gözünü filtrenin içinden sabit tuttu. Venüs'ün silueti ortaya çıktı - soluk, kırılmış, buhar ve hesaplama arasında dans eden.\n\nBu temiz bir yay değildi. Ders kitabı gözlemi değildi. Ama bu bir veriydi. Kaprisli bir gökyüzünün altında zor kazanılmış veriler." #deepl:1908038831
 verrier.353.g: "Eğer gökler bize parçalar verirse, onları birleştirmeliyiz." #deepl:1646978536
 verrier.353.t: "Işık Peçelerinin Arasından" #deepl:674640397
 verrier.354.d: "Venüs geçişi sırasında bir gözlemci ekibi yalnızca hassas veriler değil, görüntüler de yakaladı. Düzinelerce fotoğraf plakası sırayla pozlandı ve daha sonra hareket halinde birleştirildi. Tarihte ilk kez bir gezegen geçişi film olarak kaydedildi." #deepl:2258153461
 verrier.354.f: "Titriyor. Titriyor. Ama hareket ediyor. Bir dizi işlenmiş levha üzerinde Venüs kenardan giriyor, güneş diski boyunca kayan mükemmel bir siyah nokta. Sadece bir hesaplama değil, bir taslak hareket değil. Zaman içinde yakalandı. Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] karanlık odada durmuş, fenerini kaldırmış, kısa sekansın tekrar tekrar tekrarlanmasını izliyordu. Altı saatlik ölçüm, saniyeler süren bir mucizeye dönüştü. Astronomlar alkışladı. Yeni bir şey yaptıklarını biliyorlardı. Gökleri hareket ettirmişlerdi." #deepl:1856959975
 verrier.354.g: "Gezegensel hareket modellerini iyileştirmek için kareleri analiz edin." #deepl:3348594448
 verrier.354.t: "Hareketli Bir Gölge" #deepl:969441096
 verrier.355.d: "Bir [ROOT.Var('elgar_composer_var').GetCharacter.GetFullName], 1882 Venüs geçişini çevreleyen küresel heyecandan esinlenerek yeni bir tören parçası yazdı. Geniş bir dinleyici kitlesi önünde prömiyeri yapılan marş, hem olayın görkemini hem de yeni bir bilimsel yüzyılın ritmini yakalıyor." #deepl:1566390789
 verrier.355.f: "1882 Venüs geçişinden bir yıl sonra John Philip Sousa, 1878 yılında ölen Amerikalı fizikçi Joseph Henry'nin bronz heykelinin açılışı için bir tören müziği bestelemekle görevlendirildi. Bir Mason olan Sousa, grubun doğal olaylarda mistik nitelikler olarak gördüğü şeylerden etkilenmişti. Parça Sousa'nın yaşamı boyunca hiç tutulmadı. Sousa'nın müziğin el yazması kopyalarının bir selde yok olmasının ardından uzun yıllar çalınmadı." #deepl:3349639062
 verrier.355.g: "Bazı müzikler tarih için yazılır, kalabalıklar için değil." #deepl:1666827653
 verrier.355.t: "Venüs'ün Yürüyüşü" #deepl:1281729794
