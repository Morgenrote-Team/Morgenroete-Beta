 MR_FIFA_PRESIDENT_BUTTON_TT: "#T FIFA Başkanı Olun#!\nFIFA'nın aktif bir başkanı olmadan bu pozisyonu alabiliriz. Bu, Uluslararası Futbol Federasyonu Genel Merkezi'ni kontrol ettiğimizi varsayar.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:1598483912
