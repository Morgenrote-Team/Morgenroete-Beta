 verrier_venus_transit_preparation_modifier: "Venüs Geçişi için Hazırlıklar" #deepl:3653758437
 vikelas.21.d: "[SCOPE.sState('vikelas_basketball_state').GetName] adresindeki bir spor salonunda, bir gün dünyanın dört bir yanındaki salonlarda ve stadyumlarda yankılanabilecek yeni bir oyun icat edildi." #deepl:3471187932
 vikelas.21.f: "'Vurmak yok. Topla koşmak yok. Ve bir galeriye çivilenmiş iki şeftali sepeti."\n\n [TimeKeeper.GetCurrentDate.Format('y')]'de, [SCOPE.sState('vikelas_basketball_state').GetFarmHubName]'deki bir okulda Dr. [ROOT.Var('panum_physician_var').GetCharacter.GetFullName] bir sorunla karşı karşıyaydı: [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis] huzursuz öğrencilerini kış boyunca içeride nasıl aktif tutacaktı. [ROOT.Var('panum_physician_var').GetCharacter.GetHerHis|U] çözümü basitti - ve tuhaftı. Bir futbol topu, iki yüksek şeftali sepeti ve on üç kural.\nÇocuklar ilk başta bunu tuhaf buldular. Temas yok. Top sürme yok. Sadece dikkatli paslar ve kavisli atışlar. Ama bu oyunda bir şeyler vardı. Oyun önce diğer okullara, sonra da diğer şehirlere yayıldı. On yıldan kısa bir süre içinde New York'tan Tokyo'ya spor salonları zıplayan topların ritmi ve "Basket!" bağırışlarıyla yankılanmaya başladı.\nSoğuk hava eğlencesi olarak başlayan bu oyun daha büyük bir şeye dönüşebilir. Hızlı, takım temelli, modern hayata uygun ve hepsinden önemlisi [ROOT.GetCountry.GetAdjectiveNoFormatting] doğumlu." #deepl:3707830614
 vikelas.21.g: "Okullarda ve spor salonlarında tanıtın." #deepl:2248999233
 vikelas.21.t: "Şeftali Sepetli Oyun" #deepl:2623215155
 vikelas.401.d: "Bugün Uluslararası Futbol Birliği [GetGlobalVariable('vikelas_fifa_seat_global_var').GetStateRegion.GetCityHubName] adresinde kurulmuştur. Tam adı Fédération Internationale de Football Association'dır (FIFA)." #deepl:3487975302
 vikelas.401.f: "21 Mayıs 1904'te yedi ülkeden -Belçika, Danimarka, Fransa, Hollanda, İspanya, İsveç ve İsviçre- delegeler bir tüzük imzaladı. Amaç: futbol kurallarını standartlaştırmak, uluslararası maçlar düzenlemek ve oyunu küresel bir seviyeye yükseltmekti. Böylece Fédération Internationale de Football Association - FIFA doğdu. İlk yıllarında FIFA mütevazı bir yapıya sahipti: yarı zamanlı bir başkanlık, amatör oyuncular ve bölgesel anlaşmazlıklar. Ancak yüzeyin altında küresel bir hareket büyüdü. İngiltere yabancı müdahalelere karşı temkinli davranarak katılmakta tereddüt etti. Güney Amerikalılar kendi konfederasyonlarını kurmaya başladı. 1924 ve 1928'de Olimpiyat turnuvaları futbolun gerçek erişimini ortaya çıkardı: Paris'te orduları değil takımları alkışlayan 60.000 kişilik kalabalıklar." #deepl:2154770056
 vikelas.401.g: "FIFA'ya katılın ve uluslararası rekabeti destekleyin." #deepl:1192623767
 vikelas.401.t: "Fédération Internationale de Football Association" #deepl:2948752940
 vikelas.411.d: "FIFA bu yılki Dünya Kupası'nın [SCOPE.sCountry('vikelas_fifa_host_scope').GetName] adresinde yapılmasına karar verdi. Ön eleme turunun ardından favoriler listesi sekiz takıma indirildi." #deepl:1721956240
 vikelas.411.f: "#V Aşağıdaki milli takımlar çeyrek finallere katılmaya hak kazanmıştır#!\n\n[SCOPE.sCountry('vikelas_first_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_second_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_third_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fourth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_fifth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_sixth_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_seventh_qualified_team_scope').GetName]\n[SCOPE.sCountry('vikelas_eighth_qualified_team_scope').GetName]" #deepl:1470693747
 vikelas.411.g: "En iyi takım galip gelsin." #deepl:900366891
 vikelas.411.t: "Futbol Dünya Kupası [TimeKeeper.GetCurrentDate.Format('y')]" #deepl:3683642621
 vikelas.412.d: "Takımımız, her kıtadan en iyi takımları yenerek dünya sahnesinde zafere ulaştı. Ülke çapında kutlamalar patlak verdi!" #deepl:1604872733
 vikelas.412.f: "[SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] ile çekişmeli bir maça çıkan takımımız, [SCOPE.sCountry('vikelas_fifa_host_scope').GetName] adresindeki Dünya Kupası finalinde kendini kanıtladı. Milli takımımız altın kupayı kaldırdı. Final düdüğü radyolarda, kafelerde, barakalarda yankılandı. Kuzeydeki madencilerden limandaki tüccarlara kadar halk hep bir ağızdan kükredi. Kaptan podyumda ağlıyor. Yeni bir nesil izliyor ve hayal kuruyor." #deepl:1159882054
 vikelas.412.g: "Biz şampiyonuz." #deepl:2663168066
 vikelas.412.t: "Dünya Şampiyonları" #deepl:3853223886
 vikelas.413.d: "Futbol takımımız finale yükseldi ve zafere ulaşamadı. Ülke çapında gurur ve kalp kırıklığı eşit ölçüde birbirine karıştı." #deepl:80141764
 vikelas.413.f: "Ne yazık ki, takımımızın en iyisi yeterince iyi değildi. [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] ile oynadığımız sinir bozucu maçta erkeklerimiz yetersiz kaldı. Haftalar boyunca bir ulusun umutlarını taşıdılar. Çamurlu sahalarda ve kör edici sıcaklarda koştular, savaştılar, inandılar. Maç maç efsane oldular. Diğer marş çalınırken başlarını dik tuttular. Gözyaşı yok, sadece sessizlik ve ardından yavaşça yükselen bir alkış." #deepl:3695564906
 vikelas.413.g: "Bu bizden çalındı!" #deepl:3624655051
 vikelas.413.t: "Silver Glory in [SCOPE.sCountry('vikelas_fifa_host_scope').GetName]" #deepl:3043927783
 vikelas.414.d: "Milli takımımız [SCOPE.sCountry('vikelas_fifa_host_scope').GetName] adresinde düzenlenen FIFA Dünya Kupası'ndan erken elendi. [SCOPE.sCountry('vikelas_first_winner_team_scope').GetName] finalde [SCOPE.sCountry('vikelas_second_winner_team_scope').GetName] 'u mağlup etti." #deepl:317995881
 vikelas.414.f: "Umut vardı - gerçek, elle tutulur bir umut. Fabrika bahçelerinde tezahürat edilen zaferler, kiliselerde fısıldanan radyo yorumları, ara sokaklarda golleri canlandıran çocuklar. Takım futboldan daha fazlasını temsil ediyordu: hırsı, gururu, kendimizi aşabileceğimize olan inancı. Ama son maç her şeyi değiştirdi. Yenilen tek bir gol. Görülmeyen bir el topu. Kaçırılan bir fırsat. Artık rüya sona erdi ve dünya yoluna devam ediyor." #deepl:640236906
 vikelas.414.g: "İnandık. Bu kadarı yeterliydi." #deepl:4069550601
 vikelas.414.t: "Rüya Erken Biter" #deepl:1366412702
 vikelas.490.d: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] Bütün bir oyuncu neslini eğiterek ve geliştirerek kendine bir isim yaptı. [ROOT.Var('vikelas_coach_var').GetCharacter.GetSheHe] artık Kıdemli Koç olarak kabul edilecek kadar ünlü!" #deepl:3173542618
 vikelas.490.f: ""
 vikelas.490.g: "Sahada utanmadan bağırabildiğiniz için bir ödül." #deepl:1195265680
 vikelas.490.t: "[ROOT.Var('vikelas_coach_var').GetCharacter.GetFullName] artık Kıdemli Koç!" #deepl:454610152
 vikelas.495.d: "Yeni bir [concept_vikelas_coach] [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerselfHimself] adresini tanıttı. [SCOPE.sCharacter('vikelas_new_coach_scope').GetHerHis|U] adı [SCOPE.sCharacter('vikelas_new_coach_scope').GetFullName]." #deepl:1753591119
 vikelas.495.f: ""
 vikelas.495.g: "[SCOPE.sCharacter('vikelas_new_coach_scope').GetSheHe|U] çocuklarımızı zafere taşıyacaktır." #deepl:1930939286
 vikelas.495.t: "Yeni Bir Koç" #deepl:2806014865
 vikelas.601.d: "Bulvarlarda yeni bir icat ortaya çıktı - doğrudan ön tekerleğe bağlı pedallarla çalışan iki tekerlekli bir mekanizma. Buna 'velocipede' deniyor." #deepl:497189807
 vikelas.601.f: "Parklarda ve başkentin geniş caddelerinde başlar dönüyor. Şapkalı ve yelekli beyler garip demir iskeletlerin üzerine tünemiş, öfkeli bir şekilde pedal çeviriyor, ürkmüş kalabalığın arasından yalpalayarak geçiyor. Bazıları düşüyor. Bazıları uçuyor. Çocuklar gülüyor. Yaşlı devlet adamları kaşlarını kaldırır. Gazeteler buna le vélocipède diyor - yarı oyuncak, yarı vaat. Bir araba üreticisi tarafından icat edilen bu 'kemik kırıcı' devrimci olduğu kadar ağırdır da. Arnavut kaldırımlarında omurgayı sarsıyor. Ancak pürüzsüz gezinti yollarında şaşırtıcı bir zarafetle hareket ediyor. Bunun sadece bir yenilik değil, yeni bir hareket türünün tohumu olduğuna dair söylentiler var." #deepl:2987098471
 vikelas.601.g: "Eğlenceli bir moda!" #deepl:3063453559
 vikelas.601.t: "Kaldırımdaki Pedallar" #deepl:583302045
 vikelas.602.d: "Eşit büyüklükte tekerleklere, zincir tahrikli arka aksa ve gelişmiş dengeye sahip yeni bir bisiklet tasarımı ortaya çıktı. Tehlikeli yüksek tekerlekli bisikletlerin aksine, bu 'güvenlik bisikleti' dengeli, uygun fiyatlı ve hızla bir sansasyon haline geliyor. Mucidi mi? [SCOPE.sCharacter('vikelas_bicycle_inventor_scope').GetFullName]!" #deepl:1082254426
 vikelas.602.f: "Eski velosipedler hem kemikleri hem de sinirleri titretirdi. Yükselen penny-farthings hız sunuyordu, ancak çok az kişinin ödemeye istekli olduğu bir bedel karşılığında - yanlış bir hareket ve sürücü uçtu. Şimdi ise başkentimizdeki atölyelerden yeni bir bisiklet türü yayılıyor: kompakt, zarif ve güvenli. Arka tekerleğe bağlı zincir tahriki ve havalı lastikleriyle kadınlar ve işçiler bile bisiklete binmeye başladı. Bir zamanlar at arabalarının hüküm sürdüğü caddeler artık taş üzerindeki kauçuğun yumuşak uğultusuyla yankılanıyor. Kafelerde de fabrikalarda da karar aynı: Bu bir oyuncak değil. Bu özgürlüktür - hızlı, sessiz ve aniden ulaşılabilecek bir yerde." #deepl:2048166631
 vikelas.602.g: "Her vatandaşın modern çağa girmesine izin verin." #deepl:158167297
 vikelas.602.t: "Geleceğin Bisikleti" #deepl:3168239488
 vikelas.611.d: "O gün geldi çattı. Ülkenin dört bir yanından gelen sürücüler, açık yolda insan ve makineyi test etmeye hevesli bir şekilde başlangıç çizgisinde toplanıyor. Hava beklentiyle çatırdıyor." #deepl:3817467534
 vikelas.611.f: "Güneş, zaten seyircilerle dolu olan bulvarın üzerinde yükseliyor. Pankartlar dalgalanıyor. Yağ ve toz kokusu sabah havasında asılı duruyor. Düzinelerce yarışçı bisikletlerine biniyor - bazıları fabrikadan yeni çıkmış pırıl pırıl makineler, diğerleri arka sokaklardaki atölyelerde bir araya getirilmiş.\nBir silah sesi duyuluyor. Alkışlar patlar. Ve tekerlekler dönmeye başlar.\nŞehir kapılarından geçip kırlara doğru yol alırlar. Çiftçiler tarlalarında duraklar. Çocuklar yol kenarında koşuyor. Rahipler onları kutsar. Alaycılar alay eder. Ve yine de, arkalarında toz izleri kalırken, kalabalıkta garip bir his ortaya çıkar: bu daha büyük bir şeyin başlangıcı gibi hissettirir." #deepl:872369825
 vikelas.611.g: "Her şehir ilerlemenin uğultusunu duysun." #deepl:4082081516
 vikelas.611.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.621.d: "Ulusal bisiklet yarışının galibi bitiş çizgisinden daha fazlasını elde etti - ulusun hayal gücünü ele geçirdi. Şimdi tüm gözler onun neyi temsil ettiğine çevrilmiş durumda." #deepl:2904065614
 vikelas.621.f: "Gazeteler ona 'Demir Sürücü' diyor. Dokumacı bir ailenin çocuğu olarak doğdu, on iki yaşında yetim kaldı, on altı yaşında fabrika işçisi oldu. Yamalı, kazınmış ve özenle yağlanmış, hırpalanmış bir güvenlik bisikleti üzerindeki zaferi sadece bir spor zaferi değildi. Bu bir kıssaydı. Kalabalıklar onun adını zikretti. Ressamlar onu çizdi. Çocuklar onun duruşunu taklit ediyor. Ama bundan daha fazlası, ideologların dikkatini çekti. Bazıları ona emeğin gücünün yüzü diyor. Diğerleri onun ulusun canlılığını kanıtladığını söylüyor. Basın onun bir işçi mi, bir vatansever mi yoksa tamamen yeni bir şey mi olduğunu tartışıyor.\n Sürücünün kendisi çok az konuşuyor. Gülümsüyor, başını sallıyor ve sürüyor." #deepl:2953543537
 vikelas.621.g: "Onu işçi sınıfının kahramanı yapın." #deepl:2363628364
 vikelas.621.h: "Onu ulusal bir simge olarak kutlayın." #deepl:255033591
 vikelas.621.i: "Onu ilerlemenin ve modern insanın bir sembolü olarak çerçeveleyin." #deepl:3398545154
 vikelas.621.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.622.d: "Ulusal bisiklet yarışı sırasında trajik bir kaza meydana geldi. Bir bisiklet sürücüsü öldü, birkaçı da yaralandı. Tezahüratlar durdu." #deepl:644341100
 vikelas.622.f: "Bir tekerlek tekerlek izine takıldı. Bir çığlık, bir çarpışma ve ardından bir çığlık. Bisikletler domino taşları gibi yuvarlanırken seyirciler öne doğru fırladı. Kan toza karıştı. Kasklar yarıldı. Kemikler kırıldı. On yedi yaşında, fabrikada çırak olan genç bir adam çarpışmanın etkisiyle öldü. Gazeteler ikiye bölündü. Bazıları bunu ilerlemenin gerekli bir bedeli olarak nitelendirirken, diğerleri halk sporunun pervasızlığını kınadı." #deepl:1135060049
 vikelas.622.g: "Ölenleri onurlandırın." #deepl:3728569964
 vikelas.622.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.623.d: "Yarışın belirli bir etabı halkın kalbini fethetmiştir. Seyirciler bu etaptan sadece bir yarışma olarak değil, bir efsane olarak bahsediyor." #deepl:438486236
 vikelas.623.f: "Sürücüler şafakta tepelerde kayboldular. Bundan sonrası artık bir yarış değil, bir ruh testiydi. Bir düzine geride kaldı. Üçü yere yığıldı. Biri keskin virajda kaza yaptı ve kanlar içinde ayağa kalkarak yardım eli salladı. Ama biri sisin içinden geçerek binlerce kişinin kalbine doğru ilerledi. Tüm ulus başka bir şey konuşmuyor." #deepl:130901318
 vikelas.623.g: "Bırakın yol onun çabasını nesiller boyunca hatırlasın." #deepl:3983380699
 vikelas.623.h: "O anın resmini yaptırın." #deepl:1275386135
 vikelas.623.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.624.d: "Son yarış etabının ardından suçlamalar patlak verdi. Bir yarışçı hile yaparken yakalandı - ancak bazıları onun sadece herkesin yaptığı şeyi yaptığını, sadece daha az ihtiyatlı olduğunu iddia ediyor." #deepl:3963790231
 vikelas.624.f: ""Ahırın arkasında bisikletleri değiştirdiğini söylediler. Diğerleri ise gizli bir kabloyla tepeye çekildiğini söylüyor." Gerçekler bulanık. Net olan şu: Sürücü çok hızlıydı. Olağanüstü hızlı. Zorlu bir tırmanıştan sonra çok tazeydi. Rakipleri öfkelendi. Seyircilerin nefesi kesildi. Basın kan kokusu alıyor. Bir fotoğrafta aynı kıyafetleri giyen ikinci bir adam görülüyor. Başka bir tanık, gece etabı sırasında sürücünün bir araba tarafından itildiğini gördüğünü iddia ediyor. Sanık her şeyi inkar ediyor, kıskançlık ve politika diyor." #deepl:2810733320
 vikelas.624.g: "Sürücüyü diskalifiye edin ve sahtekarlığı ortaya çıkarın." #deepl:2198835421
 vikelas.624.h: "Sporun iyiliği için örtbas et." #deepl:3797817672
 vikelas.624.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.625.d: "Bu yılki yarış sezonuna şiddetli bir rekabet damgasını vurdu. Güçleri eşit, tarzları zıt iki yarışçı ülkeyi iki kampa böldü." #deepl:2483368762
 vikelas.625.f: "Biri ateştir: pervasız, cesur, gençlerin hayran olduğu. Şapkasını kalabalığa fırlatır, pedal çevirirken güler ve uyarıda bulunmadan saldırır.\nDiğeri buz: sakin, hesapçı, neredeyse matematiksel. Gücünü biriktirir, saniyelerle kazanır ve sadece gerektiğinde konuşur.\n\nİsimleri çatılardan haykırılır. Kasabalar taraf tutuyor. Posterler kırmızı ya da mavi renkte basılır. Terziler onların renklerinde şapkalar satar. Çocuklar tahta bisikletler üzerinde onların duruşlarını taklit eder.\n\nGazeteler bir yarıştan daha fazlasını anlatır. Karakterden, felsefeden, insanların kim olmak istediğinden bahsediyorlar. Ve hiçbir sürücü bir santim bile vermiyor." #deepl:1380551122
 vikelas.625.g: "Bu da gazete kültürüne fayda sağlayacaktır." #deepl:3508242265
 vikelas.625.h: "Rekabeti siyasi kazanç için kullanın." #deepl:442554493
 vikelas.625.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
 vikelas.626.d: "Bu yılki yarış sezonuna şiddetli bir rekabet damgasını vurdu. Güçleri eşit, tarzları zıt iki yarışçı ülkeyi iki kampa böldü." #deepl:2483368762
 vikelas.626.f: ""Onu bir köy demirhanesinde buldular, elinde çekiç, yüzü isle kararmış, tek başına."\n\nİniş hainceydi. Yanlış değerlendirilmiş bir viraj, bir çakıl çıtırtısı ve ön çatal yarıldı. Bisikleti yaralı bir kuş gibi kıvrıldı. Çoğu kişi dururdu. Ama o durmadı. Yokuş aşağı topallayarak, kadroyu kilometrelerce sürükledi. Uzak bir köyde bir demirci buldu. Tamirci yoktu. Ekip arabası yoktu. Sadece körük, örs ve kendi elleri.\n Saatlerce çalıştı - kolları sıvalı, çenesi sıkılı - ön çatalı hafızası ve hisleriyle yeniden şekillendirdi. Yetkililer geldiğinde, sadece gözlerini dikip 'Dokunma' demek için durakladı. Liderlerin sekiz saat gerisinde, tekrar sürdü. Zafer şansı yoktu. Ama rota boyunca kalabalıklar tezahürat için ayağa kalktı - kazanan için değil, durmayı reddeden için." #deepl:896070649
 vikelas.626.g: "İlham verici bir hikaye." #deepl:3324986220
 vikelas.626.h: "Acil onarımlara izin verin." #deepl:385201552
 vikelas.626.i: "Onu onurlandırın!" #deepl:581594471
 vikelas.626.t: "[SCOPE.GetRootScope.GetCountry.GetCustom('vikelas_custom_bicycle_race')]" #deepl:804172156
