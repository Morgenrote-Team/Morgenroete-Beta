 MR_FIFA_BUTTON_TT: "#T Found the FIFA#!\nFutbolun yaygınlaşmasıyla ülkeler arası maçların sayısının artmasıyla küresel bir yönetim organı ihtiyacı ortaya çıktı. FIFA (Fransızca: Fédération Internationale de Football Association), futbol, futsal ve plaj futbolunun uluslararası öz düzenleyici yönetim organıdır. Dünyanın en eski ve en büyük STK'larından biridir ve 21 Mayıs 1904 tarihinde kurulmuştur. FIFA'nın kuruluşu, antrenörleri maç kazanarak kendilerini geliştirebilen ülkeler arasında uluslararası maçlar yapılmasına olanak tanır. Bu, sonunda bir Dünya Kupası'nın kurulmasına yol açacaktır.\n\n[ScriptedGui.BuildTooltip( GuiScope.SetRoot( GetPlayer.MakeScope ).End )]" #deepl:3292557058
