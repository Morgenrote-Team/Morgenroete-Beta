 lepsius.1601.t: "[SCOPE.sCharacter('lepsius_donator_scope').GetLastName]'in Bağışı"
 lepsius.1601.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName], nadir Mısır eserlerinin bir koleksiyoncusu olarak kabul edilir. Mısırbilimsel ilgileri, şimdi dikkate değer bir koleksiyona sahip olmasına yol açtı. Zarif eserlerini Arkeoloji Müzesi’ne bağışlamayı cömertçe teklif etti."
 lepsius.1602.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName]’in muhtemelen en etkileyici özel Mezopotamya eseri koleksiyonuna sahip olduğu bilinir. Bu koleksiyonun devletin eline geçebileceğini hükümete bildirdi, ancak bazı eleştirel gözlemciler bunun karşılığında bir şey talep edebileceği konusunda uyarıyor."
 lepsius.1603.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName], en sanatsever kişi olarak görülmeyebilir; fakat şans eseri, mülkünde büyük değere sahip bazı arkeolojik hazineler keşfetti ve bunları birkaç yıldır saklıyor. Onlarla pek bir şey yapamayacağı için, bu eserleri Arkeoloji Müzesi’ne bağışlamayı hükümete teklif etti."
 lepsius.1604.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName], son yıllarda Güney Amerika’da birkaç seyahat yaptı ve burada Mezoamerikan ve And kültürlerine ait önemli kalıntıları hatıra olarak topladı. Şimdi bu eserleri müzeye bağışlamak istediğini açıkladı."
 lepsius.1605.d: "[SCOPE.sCharacter('lepsius_donator_scope').GetFullName], antik Ege uygarlıklarından etkilenmişti. Birkaç yıldır Girit’ten eserler topluyor ve hatta tüm bir Minos freskini villasına getirmişti. Ancak sosyal sorumluluklarının bilincinde olarak, hazinelerini [ROOT.GetCountry.GetAdjectiveNoFlag] halkına bağışlamaya karar verdi."
 lepsius.1601.f: "Sayısız arkeolojik koleksiyon, antik sanat eserlerini toplayan ve tüccarlar aracılığıyla satın alan Rönesans prenslerine kadar uzanır. 1824’te Kral Charles Felix, Fransa Genel Konsolosu Bernardino Drovetti’nin Mısır’da kaldığı süre boyunca oluşturduğu Drovetti koleksiyonunu (5.268 parça, 100 heykel, 170 papirüs, steller, mumyalar ve diğer eşyalar dâhil) satın aldı. Bu koleksiyon daha sonra Torino’daki Mısır Müzesi’nin temelini oluşturdu. Zengin girişimciler ve nüfuzlu elitler de statü sembollerini toplamaya ilgi duyuyor ve vasiyetlerinde bu eserleri halka bağışlıyordu. Çoğu zaman insanlar bu tür bağışlarla sadece kendi itibarlarını artırmak istemiyor, aynı zamanda toplumda daha iyi bir konum elde etmeyi de umuyorlardı."
 lepsius.1601.g: "Müze için harika bir bağış!"
 lepsius.1601.h: "Bu dalkavuk sadece kendi çıkarını düşünüyor."
 lepsius.1606.t: "Mısır Hayranlığı"
 lepsius.1606.d: "Mısır’a tutkuyla bağlı bir grup insan bir araya geldi. Gruba [SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName] liderlik ediyor. Herkes antik Mısır’a neredeyse fanatik bir hayranlık beslemese de, bu durumun bazı avantajları olabilir."
 lepsius.1606.f: "19. yüzyıl birçok açıdan ilerici ve bilimsel ruhun hâkim olduğu bir dönem olarak görülse de, tam da bu zamanda çeşitli okült ve sahte-bilimsel fenomenler yaygınlaştı. Bunların en bilinenlerinden biri, ruhların varlığını kanıtlamaya çalışan spiritüalizmdir. Arkeolojik araştırmalar sadece yanlış yönlendirilmiş birçok teoriye değil, aynı zamanda Panbabilcilik, Mayacılık ve Atlantis inancı gibi sahte-bilimsel ve ezoterik akımlara da ilham verdi. Her ne kadar bu tür olgular bilime çoğu zaman yıpratıcı etki yapsa da, bazıları moda haline gelmiş ve bilimsel araştırmaları popülerleştirerek verimli yan etkiler doğurabilmiştir."
 lepsius.1606.g: "Bırakın küçük tarikatlarının tadını çıkarsınlar."
 lepsius.1606.h: "Bu saçmalığı yasakla."
 lepsius.1607.t: "Mayacılık"
 lepsius.1607.d: "Ülkemizdeki bazı elitler, dünyanın Maya’lara dayanan kadim bir takvime göre işlediği gibi garip bir yanılgıya kapıldılar. Ayrıca bu halkın evrenin sırlarını barındıran bilgiye sahip olduğu ileri sürülüyor. Bu saçma fikirlere gülüp geçilebilirdi, eğer bu nüfuzlu grubun lideri [SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName] olmasaydı."
 lepsius.1608.t: "Panbabilcilik"
 lepsius.1608.d: "Bir grup insan, tüm bilginin Babil’den geldiğini – hatta Yahudi ve Hristiyan dinlerinin bile sadece bir taklit olduğunu – ileri sürerek toplumda ve bilim çevrelerinde kargaşaya yol açtı. [SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName] de fikirlerini yaymaya çalışan bu 'Panbabilciler Kulübü’nün içinde yer alıyor."
 lepsius.1608.g: "Bu düpedüz sahte-bilim!"
 lepsius.1608.h: "Harika."
 lepsius.1609.t: "Atlantisçilik"
 lepsius.1609.d: "[SCOPE.sCharacter('lepsius_esoteric_leader').GetFullName], Atlantis’in bir efsane değil, Buzul Çağı’nda gelişmiş teknolojiye sahip tarihî bir şehir olduğunu iddia eden ezoterik-sahte-bilimsel bir gruba liderlik ediyor. Ayrıca tüm kültürlerin Atlantis’ten türediğini ileri sürüyor. Her hafta Atlantislilerin ruhlarıyla iletişim kurmak için seanslar düzenliyor."
 lepsius.1609.h: "Kimin umurunda, gerçek mi yoksa efsane mi?"
 lepsius.1609.i: "Atlantis’in varlığına dair sağlam kanıtlar var."
 lepsius.1610.t: "Arkeolojik Yatırım"
 lepsius.1610.d: "Arkeoloji Müzesi’nin direktörü, yeni uzmanların yetiştirilmesini desteklemeyi teklif etti. Ancak bu, ek maliyetler gerektiriyor."
 lepsius.1610.f: "Enstitü, hükümetin şu sıralar ülkedeki arkeolojiyi desteklemeye özel ilgi gösterdiğini duydu. Ek mali yardım, yeni ve gelecek vaat eden asistanların işe alınmasına yardımcı olabilir."
 lepsius.1610.g: "Müzeye ek mali kaynak aktar."
 lepsius.1610.h: "Buna değmez."
 lepsius.1611.t: "Müze Biletleri"
 lepsius.1611.d: "Artan maliyetleri karşılamak için müze bilet fiyatlarını artırmak zorunda. Devlet ek kârı alabilir. Ancak bu, itibarımıza biraz zarar verebilir."
 lepsius.1611.f: "'Bilet yok!'"
 lepsius.1611.g: "Bilet fiyatlarını artır."
 lepsius.1611.h: "Bilet fiyatlarını düşür."
 lepsius.1611.i: "Bilet mi? Müze ücretsiz olmalı!"
 lepsius.1612.t: "Direktör [SCOPE.sCharacter('lepsius_director_scope').GetLastName]’in Mirası"
 lepsius.1612.d: "Kısa süre önce ölen müze direktörü [SCOPE.sCharacter('lepsius_director_scope').GetLastName], saygı gören biriydi. Mükemmel bir bilimsel itibara sahipti. Ancak yeni bir keşif, mirasını lekeleyebilir."
 lepsius.1612.f: "Yapılan bir araştırma, [SCOPE.sCharacter('lepsius_director_scope').GetFullName]’in görev süresi boyunca defalarca anonim kişilerden özel bağışlar aldığını ortaya koydu. Ancak bu eserleri hiçbir zaman müzeye vermedi – onları kendine sakladı. Yalnızca birkaç parça olmasına rağmen, bu eserler son derece değerliydi. Tüm aydın çevreler ciddi bir skandalla karşı karşıya."
 lepsius.1612.g: "Gerçek ortaya çıkmalı!"
 lepsius.1612.h: "[SCOPE.sCharacter('lepsius_director_scope').GetFullName] onurlu bir insandı."
 je_lepsius_pompeii: "Pompeii’de Modern Kazılar"
 je_lepsius_pompeii_reason: "MS 79’da Vezüv Yanardağı’nın patlamasıyla gömülen antik Roma kenti Pompeii, 18. yüzyıldan beri kazılmaktadır. Ancak birçok açıdan bu tür kazılar daha çok yağma olarak tanımlanabilir: sanat eserleri elde etmek için bilimsel malzemeyi yok etmek ya da sırf cehalet yüzünden değerli buluntuları tahrip etmek. Yeni arkeolojik yöntemler, Pompeii araştırmalarını önemli ölçüde geliştirebilir."
 je_lepsius_teotihuacan: "Teotihuacán"
 je_lepsius_teotihuacan_reason: "Teotihuacán, Aztekler için bile gizemli bir yer olarak görülüyordu; onların hâkimiyetinden çok önce ortaya çıkmıştı – bu harabe şehir onlar için tanrıların doğum yeri olmalıydı. Gerçekte ise birçok kanıt, Teotihuacán’ın Aztek İmparatorluğu’ndan yüzyıllar önce Orta Amerika’nın büyük bölümünü etkileyen antik bir şehir olduğunu ve Amerika kıtasındaki en büyük Kolomb-öncesi alanlardan biri olduğunu gösteriyor. Bu nedenle Meksika hükümetinin burayı daha ayrıntılı araştırmak için yalnızca bilimsel değil, millî nedenleri de var. Teotihuacán, Meksika’da kesintisiz uzun bir kültürün sembolü ve ulusumuzun öncüsü olarak görülebilir. Bağımsızlığın 100. yılı öncesinde kısmen yıkılmış Güneş Piramidi’nin yeniden inşası, bu sembolizmi vurgulamayı ve ulusal birlik ile tarihi kutlamayı amaçlıyor."
 je_lepsius_harappa: "İndus Vadisi Uygarlığı"
 je_lepsius_harappa_reason: "Harappa’daki harabe alanı bir süredir biliniyor ve ilk olarak Charles Masson tarafından 1844’te 'Narrative of Various Journeys in Balochistan, Afghanistan and The Panjab' adlı kitabında 'tuğladan yapılmış yıkık bir tahkimat' olarak tanımlanmıştı. Ancak önemi hâlâ tam olarak açıklığa kavuşmuş değil. Belki de Hindistan’da henüz tamamen bilinmeyen arkeolojik hazineler vardır?"
 je_lepsius_first_emperor: "İlk İmparator’un Mezarı"
 je_lepsius_first_emperor_reason: "Çin, arkeoloji alanında genç bir ulustur. Araştırmacılarımızın bilgilerini derinleştirmek için dünyaya açılıp deneyim kazanmaları gerekiyor. Ancak yeterince başarı elde ettiğimizde ve arkeologlarımız yeterince eğitimli olduğunda, kimsenin bugüne kadar cesaret edemediği en büyük arkeolojik maceraya girişebiliriz: yani İlk İmparator’un mezarını incelemeye."
 lepsius.7.t: "Pompeii’nin Kazısı"
 lepsius.7.d: "Pompeii’de Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] yönetiminde yeni bilimsel yöntemler denenecek. Bu, Pompeii kazı tarihinin dönüm noktası olacak. Ancak araştırmanın odak noktası hâlâ belirlenmeli."
 lepsius.7.f: "Giuseppe Fiorelli’nin kazıları, Pompeii’nin incelenmesinde ve kazı çalışmalarında yeni bir sayfa açtı. Erken dönem kazılarda, kül tabakasında bazen insan kalıntıları içeren boşluklara rastlanıyordu. Fiorelli, bunların çürümüş bedenlerin bıraktığı boşluklar olduğunu fark etti ve içine alçı enjekte ederek Vezüv’ün kurbanlarının biçimlerini yeniden ortaya çıkarma tekniğini geliştirdi. Bu teknik hâlâ kullanılmaktadır; ancak günümüzde alçı yerine daha dayanıklı ve kemikleri yok etmediği için ek analizlere imkân tanıyan şeffaf reçine tercih edilmektedir. Fiorelli ayrıca bilimsel belgeleme yöntemlerini de getirdi. Şehri bugünkü dokuz bölgeye ve bloklara ayırdı ve her bir evin girişlerini numaralandırdı. Ayrıca ilk kazı raporlarını içeren periyodik dergiyi yayımladı. Onun halefleri döneminde şehrin tüm batı bölümü ortaya çıkarıldı."
 lepsius.7.g: "Biz öncelikle eserlere ilgi duyuyoruz."
 lepsius.7.h: "Geçmiş hakkında daha fazla şey bilmemiz gerek."
 lepsius.7.i: "Yeni bir bilim insanı nesli yetiştirmek istiyoruz."
 lepsius.8.t: "Teotihuacán’daki Güneş Piramidi"
 lepsius.8.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName], yeniden inşa edilen piramidin en yüksek noktasından Teotihuacán manzarasına bakıyor: bu prestijli proje önemli bir eşiği aşmış olsa da, ülkenin kazılardan ne gibi somut bir fayda elde edeceği hâlâ belirsiz."
 lepsius.8.f: "Meksika’nın Orta Yaylaları’ndaki Teotihuacán, Amerika kıtasındaki en önemli tarihöncesi harabe metropollerinden biridir ve özellikle Güneş Piramidi gibi basamaklı tapınaklarıyla bilinir. Teotihuacán bölgesi MÖ 6. yüzyıldan itibaren sürekli olarak iskân edilmiştir. MS 100 ile 650 yılları arasında şehir, Mezoamerika’nın kültürel, ekonomik ve askerî merkeziydi. Gelişiminin zirvesinde nüfusunun 200.000’e kadar çıkmış olabileceği tahmin edilmektedir. O dönemde, kıtanın en büyük şehri ve dünyanın da en büyüklerinden biriydi. Yaklaşık 650’den itibaren önemi azaldı ve 750 civarında, sebepleri tam bilinmeyen nedenlerle büyük ölçüde terk edildi. Ancak kültürel etkileri, Meksika’nın İspanyol fethine kadar bölgeyi şekillendirmeye devam etti."
 lepsius.9.t: "Bilinmeyen Bir Uygarlık"
 lepsius.9.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] tamamen hayrete düşmüş durumda. Görünüşe göre binlerce yıl önce İndus Vadisi’ne yerleşmiş, daha önce tamamen bilinmeyen bir kültürün izlerini buldu – bu nedenle burası, Mısır ya da Babil gibi bir uygarlığın beşiği olabilir. Önümüzde onlarca yıllık araştırmalar var – ancak öncelikler ne olmalı?"
 lepsius.9.f: "Tunç Çağı İndus Uygarlığı, İndus Uygarlığı veya Harappa Kültürü olarak da bilinir ve en eski şehir uygarlıklarından biriydi. MÖ yaklaşık 2800 ile 1800 yılları arasında, Hint altkıtasının kuzeybatısında, İndus boyunca varlığını sürdürdü. İndus Uygarlığı, günümüz Pakistan’ının neredeyse tamamına ve Hindistan ile Afganistan’ın bazı bölgelerine uzanıyordu. 1912’de J. Fleet, dönemin Britanya Hindistanı’nda bilinmeyen işaretler taşıyan mühürler buldu ve bu, Avrupa’daki bilim çevrelerinin ilgisini çekti. Ardından 1921/22’de Harappa ve Mohenjo-Daro’da, Britanya Eski Eserler Servisi’nin direktörü John Marshall yönetiminde kazılar yapıldı. İki şehir arasındaki benzerlik, burada daha önce bilinmeyen bir ileri uygarlığın keşfedildiğini kısa sürede açıkça ortaya koydu."
 lepsius.70.t: "Terrakotta Ordusu"
 lepsius.70.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName], İlk Qin İmparatoru’nun Mozolesi çevresini incelerken inanılmaz bir keşif yaptı: Bugün bile ölü imparatoru savunan tamamen topraktan yapılmış bir ordu."
 lepsius.70.f: "'Dokuzuncu ayda, İlk İmparator Li Dağı’na defnedildi. Li Dağı’ndaki kazı ve hazırlık çalışmaları, İmparator ilk tahta çıktığında başladı. Daha sonra, imparatorluğunu birleştirdiğinde, imparatorluğun her yanından 700.000 kişi oraya gönderildi. Üç yeraltı suyu tabakasını kazdılar ve dış tabut için bronz döküldü. Yüzlerce memur için saraylar ve görkemli kuleler inşa edildi ve mezar nadir eserler ve muhteşem hazinelerle dolduruldu. Zanaatkârlara, mezara giren herkese ateş edecek şekilde kurulmuş yaylı tüfekler ve oklar yapmaları emredildi. Yüzlerce nehir, Yangtze, Sarı Nehir ve büyük deniz cıva ile taklit edilerek mekanik olarak akması sağlandı. Yukarıda göksel takımyıldızların, aşağıda ise yeryüzü şekillerinin tasvirleri vardı. Mumlar, uzun süre sönmeden yanacağı hesaplanan “insan-balığı” yağından yapıldı.' – Sima Qian"
 lepsius.70.g: "Çin’in eski görkemi hayranlık verici."
 lepsius.61.t: "[SCOPE.sState('lepsius_excavation_state').GetName]’deki Kazı"
 lepsius.61.d: "[SCOPE.sState('lepsius_excavation_state').GetName]’in işgali sırasında, arkeoloji ekipleri ve eserler elimize geçti. Arkeologlar, bilimsel çalışmanın kesintiye uğramaması ve kazı alanının korunması konusunda ısrar ediyor. Ancak bazı subaylar, ganimete el koymamız gerektiğini savunuyor."
 lepsius.61.f: "Ne yazık ki önemli kazı alanlarının yağmalanması yaygın bir durumdur. İlerleyen ordular, sanat hazinelerini koruma ve muhafaza etme konusundaki ünlerine her zaman sadık kalmadılar. Bazı durumlarda, hırslı adamların isteklerini körükleyen tek şey, geri dönerken fazladan ganimet elde etme ihtimaliydi – Sulla’nın zamanında doğru olan şey, bugün neden farklı olsun ki?"
 lepsius.61.g: "Kazı alanını yağmala!"
 lepsius.61.h: "Kazı alanını koru."
 lepsius.62.t: "Kazı Alanı Yağmalandı!"
 lepsius.62.d: "Kazı yapılan ülkelerden birindeki savaş izlerini bıraktı: düşman birlikleri, bir arkeolojik kazı yapılan bölgeyi işgal etti ve ekibimizin bulduğu eserleri derhal el koyarak ardında bir yıkım izi bıraktı."
 lepsius.62.f: "Arkeolojik kazı alanları savaşın ve yıkımın kurbanı olabilir – bu, tarafsız üçüncü taraf olan arkeoloji ekiplerini de etkiler. Açgözlü uluslar, henüz kendi ülkelerine iade edilmemiş eserlerden faydalanabilirler. Endişelenmeyin: kazı ekibi hâlâ orada ve kazı tamamen kaybolmadı. Ancak arkeologların hasarı normale döndürecek kadar onarması üç yıl sürecek. Bu süre boyunca bu kazı alanından müzelerimize yıllık eser ulaşmayacak."
 lepsius.62.g: "Bu barbarlar!"
 lepsius_excavation_sacked_state_modifier: "Yağmalanmış Arkeolojik Alan"
 lepsius_excavation_protected_state_modifier: "Korunmuş Arkeolojik Alan"
 lepsius_4_excavation_team_needed_tt: "En az #G 4#! Kazı ekibine sahip ol."
 lepsius.2101.t: "Bir Roma Savaşının Kalıntıları"
 lepsius.2101.f: "\"Efendim, bir çivi daha buldum!\"\n\"Harika! Bu, buranın eski bir savaşın sahnesi olduğu teorisini güçlendiriyor! Umarım yakında bazı kemikler de buluruz!\""
 lepsius.2101.g: "Prestijli değil ama önemli bir keşif!"
 lepsius.2102.t: "Villa Rustica Keşfedildi"
 lepsius.2102.f: "\"Bir Villa Rustica yalnızca tarım ürünleri, yiyecek ve içecek üreten büyük bir merkez değildi. Aynı zamanda yolculuk yapanların dinlenmesini sağlıyor ve lejyonların ikmalinde önemli bir rol oynuyordu. Bu kalıntılar, Roma’da yiyecek üretimi, Romalıların yaşamı ve Imperium Romanum’daki tarım hakkında sonuçlar çıkarmamıza olanak tanıyor.\""
 lepsius.2102.g: "Bu, kırsal Romalıların yaşamı hakkında bize çok şey anlatacak!"
 lepsius.2103.t: "Antik Roma Tabletleri Keşfedildi"
 lepsius.2103.f: "Claudia Severa’dan Lepidina’ya selamlar.\n11 Eylül’de, kardeşim, doğum günümün kutlaması için seni davet ediyorum; gelerek günümü daha keyifli hale getirmeni çok isterim. Cerialis’e selamlarımı ilet. Benim Aelius’um ve küçük oğlum da ona selamlarını gönderiyor.\nSeni bekleyeceğim kardeşim. Hoşça kal, en sevgili ruhum, refah içinde olmayı umut ederek, esen kal.\nCerialis’in eşi Sulpicia Lepidina’ya, Cl. Severa’dan."
 lepsius.2103.g: "Her hazine gümüş ve altından yapılmaz!"
 lepsius.2104.t: "Roma Sikke Hazinesi Keşfedildi"
 lepsius.2104.d: "Roma sikke hazineleri nadir bir buluntudur. Ancak [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]’de bir tane bulundu. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], muhtemelen Imperium Romanum’daki bir kriz döneminde saklanmış olan bu hazineyi ortaya çıkarmayı başardı."
 lepsius.2104.f: "\"Acaba gelecekteki arkeologlar bir gün bizim bıraktığımız paraları bulup onların oraya nasıl geldiğini merak edecek mi?\""
 lepsius.2104.g: "Benim Kıymetlimisss!"
 lepsius.2111.t: "Antik Pers Lahdi"
 lepsius.2111.f: "\"Dikkatli olun, dikkatli olun. Bu buluntunun zarar görmesine izin veremeyiz. Lütfen levye kullanmaktan kaçının!\""
 lepsius.2111.g: "Ne inanılmaz bir keşif!"
 lepsius.2112.t: "Pers Sarayında Hazine"
 lepsius.2112.d: "Bir çiftçinin verdiği ipucu, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName]’i Akamenid döneminden kalma kayıp bir Pers sarayına götürdü. Ardından yapılan kazıda sürpriz yaşandı."
 lepsius.2112.f: "Mezopotamya, antik Pers İmparatorluğu’nun çekirdek eyaletlerinden biriydi. Fethin ardından, Akamenidler çok sayıda sanat eseri ile birlikte çivi yazılı tabletleri de kendi topraklarına götürdüler. Ancak arkeoloji ekibinin, sarayın bir bölümünde bütün bir Mezopotamya tablet arşivini ortaya çıkarması yine de şaşırtıcı oldu."
 lepsius.2112.g: "Hepsini topla!"
 lepsius.2113.t: "Pers Mezarında Mısır Heykeli"
 lepsius.2113.d: "Bir Pers soylusunun mezarındaki küçük bir kazıda, Mısır tanrısı Thoth’un küçük bir heykelciği bulundu."
 lepsius.2113.f: "Persler Mısır’ı yüzyıldan fazla bir süre yönettiler. Ancak öncesinde ve sonrasında da iki uygarlık arasında, her ne kadar sık sık savaş yaşansa da, kültürel bir alışveriş vardı."
 lepsius.2113.g: "Bu eser buraya nasıl geldi?"
 lepsius.2114.t: "Anıtsal Yazıt"
 lepsius.2114.d: "Bir toprak kayması, daha önce kaybolduğu sanılan bir dağdaki anıtsal bir kaya yazıtını ortaya çıkardı. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] antik raporu incelemek için hemen yola çıktı."
 lepsius.2114.f: "Pers kaya yazıtları veya kabartmaları, düşmüş imparatorluğun sanatında kalıcı bir yere sahiptir. En ünlüsü, Büyük Darius tarafından yaptırılan çok dilli bir Akamenid kraliyet yazıtı ve büyük kaya kabartması olan Behistun Yazıtı’dır. İran’ın Kirmanşah eyaletindeki Behistun Dağı’nda yer alır. Çivi yazısının çözülmesinde önemli rol oynamıştır; bilinen en uzun üç dilli çivi yazılı metindir ve Eski Farsça, Elamca ve Babilce (Akkadca’nın bir lehçesi) dillerinde yazılmıştır."
 lepsius.2114.g: "Pers tarihi hakkında önemli bir birincil kaynak!"
 lepsius_state_trait_tikal: "Tikal - City in the Jungle\n#G +1#! @lepsius_local_minor! Local Artifact from Archaeological Projects"
 je_lepsius_tikal: "Tikal - Ormandaki Şehir"
 je_lepsius_tikal_reason: "Stephens & Catherwood’un keşif gezisi, özellikle kayıp Maya şehirlerinin birçok illüstrasyonunu içeren bir kitabın yayımlanmasının ardından büyük ilgi uyandırdı. Ancak iki maceracı tüm yerleri keşfetmemişti. Hâlâ keşfedilmeyi bekleyen sayısız bilinmeyen bölge vardı. Bunlardan biri efsanevi Tikal’di."
 lepsius.71.t: "Tikal - Ormandaki Şehir"
 lepsius.71.d: "Guatemala ormanlarının derinliklerinde zahmetli bir arayışın ardından, Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] önderliğindeki bir keşif gezisi, efsanevi Maya şehri Tikal’i buldu. Ülkemiz için tarihi bir olay – peki bundan nasıl bir sonuç çıkarmalıyız?"
 lepsius.71.f: "Tikal, Guatemala’nın kuzeyindeki Petén yağmur ormanlarında yer alan, dikkat çekici basamaklı tapınaklara sahip antik bir Maya kentidir. Klasik Maya döneminin (3.–9. yüzyıllar) en önemli şehirlerinden biriydi ve en iyi araştırılmış Maya şehirlerinden biridir. İlk yerleşim izleri MÖ 1. binyılın başlarına kadar uzanır. 2. yüzyılda, tapınaklar, steller ve saray-tapınak komplekslerinin inşasıyla gerçek kentsel gelişim başladı. 5. yüzyılda, güçlü bir hanedan komşu küçük devletleri birer birer boyunduruk altına alıp vasal krallıklara dönüştürerek ilk zirvesine ulaştı. Bu da güçlü komşu devlet Calakmul ile uzun süreli bir çatışmaya yol açtı. 8. yüzyılda, Calakmul rakip olarak yenilgiye uğratıldıktan sonra Tikal ikinci bir zirve yaşadı. 9. yüzyılın başlarında Tikal’in gücü azaldı ve inşaatlar durdu. En geç 10. yüzyılda şehir tamamen terk edildi."
 LEPSIUS_NO_MORE_EXPEDITIONS_FOR_YEARS_TT: "Buluntuların kataloglanmasıyla meşgul olacağı için [concept_lepsius_archaeologist] başka bir [Concept('concept_lepsius_expedition','$concept_lepsius_expeditions$')] düzenleyemeyeceksiniz. Bu #n 3 ila 5 yıl#! sürecek."
 LEPSIUS_SUB_TEAM_WITH_EXPLANATION_TT: "#R 1#! [Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')] kaybedeceksiniz. [concept_lepsius_expedition] sonrası geri #p alabilirsiniz#! ya da #V Erken Arkeoloji Teknolojisi#!ni araştırdıysanız orada bir [concept_lepsius_excavation] için bırakabilirsiniz."
 lepsius_long_expedition_tt: "Uzun bir [concept_lepsius_expedition] yaklaşık #V 1 yıl#! sürecek. Keşif sonrasında [concept_lepsius_archaeologist] buluntuları kataloglamakla meşgul olacağı için başka bir keşif düzenleyemeyeceksiniz ve bu #n 5 yıl#! sürecek."
 lepsius_medium_expedition_tt: "Orta uzunluktaki bir [concept_lepsius_expedition] yaklaşık #V 10 ay#! sürecek. Keşif sonrasında [concept_lepsius_archaeologist] buluntuları kataloglamakla meşgul olacağı için başka bir keşif düzenleyemeyeceksiniz ve bu #n 4 yıl#! sürecek."
 lepsius_short_expedition_tt: "Kısa bir [concept_lepsius_expedition] yaklaşık #V 8 ay#! sürecek. Keşif sonrasında [concept_lepsius_archaeologist] buluntuları kataloglamakla meşgul olacağı için başka bir keşif düzenleyemeyeceksiniz ve bu #n 3 yıl#! sürecek."
 lepsius_leave_team_for_excavation_tt: "[Concept('concept_lepsius_archaeological_team','$concept_lepsius_excavation_team$')], genellikle yılda #V 1#! [concept_lepsius_artifact] üretecek bir [concept_lepsius_excavation] kuracak."
 lepsius.2101.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]’de bir vatandaş bir demir hançer bulduğunda, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullName] bir ekip toplayarak kazı başlattı. Bir kalkan parçasından çivilere ve birkaç sikkeye kadar çeşitli eski Roma savaşı kalıntıları buldular. Sikkeler, arkeologların savaşı oldukça doğru biçimde tarihlendirmesini sağladı."
 lepsius.2102.d: "Bir çiftçi tarlasında antik kalıntılar buldu. Neyse ki üniversiteyle iletişime geçti ve Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]’de antik bir Villa Rustica’yı gün yüzüne çıkarmayı başardı. Çeşitli arkeolojik buluntular, kırsaldaki Roma halkının yaşamı hakkında çıkarımlar yapılmasına imkân veriyor."
 lepsius.2103.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]’de ince tahta levhalardan yapılmış çeşitli Roma tabletlerinin keşfi, arkeologlar arasında büyük bir sevinçle karşılandı. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] günümüz yöntemleriyle yalnızca birkaç tabletin anlamını çözebilmiş olsa da, bu birkaç tablet bile Roma yaşamına bir pencere açıyor."
 lepsius.2111.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]’de antik Pers İmparatorluğu’na ait olağanüstü bir buluntu ortaya çıkarıldı. Bir çiftçi eski bir bronz lahit buldu ve Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ile iletişime geçti. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] uzmanlığı sayesinde Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], lahti açmayı başardı ve lüks mücevherlerle kaplı bir iskelet keşfetti. Mücevherler, bunun bir Akamenid ileri gelenine ait olduğunu gösteriyor."
 je_lepsius_dreamtime: "Düşzamanı"
 je_lepsius_dreamtime_reason: "İngiliz etnolog Walter Baldwin Spencer ve Avustralyalı meslektaşı Francis James Gillen, Orta Avustralya dili Arrernte’deki *alcheringa* kelimesini rüya olarak çevirdiler. Aborjinler için Düşzamanı, kozmosun ruhani, doğal ve ahlaki düzeniyle ilgilidir. Bu bağlamda rüya; dünyanın ve bağlantılarının doğru anlaşılması ve kullanılması, mitolojik dünyanın bir ayin çerçevesinde yansıtılması ve yaşam gücüne sahip olunması anlamına gelir. Bu Düşzamanı ile ilgili tapınakların yanı sıra diğer Aborjin mitleri ve arkeolojik ile antropolojik kalıntılar Avustralya’ya yayılmıştır. Son kıtanın geçmişini derinlemesine inceleme zamanı geldi."
 lepsius_2_excavation_team_needed_tt: "En az #G 2#! Kazı ekibiniz olmalı."
 lepsius.72.t: "Düşzamanı"
 lepsius.72.d: "During their journey throughout Australia, the Professors [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] and [ROOT.Var('andersson_anthropologist_var').GetCharacter.GetLastName] have carried out valuable scientific research that sheds light on the continent's previously unexplored past."
 lepsius.72.f: "Dönüşlerinden sonra bilim insanları, Akademik Topluluğu etkileyici buluntular dizisiyle şaşırttılar. Mağara resimlerinin çizimlerini ve krokilerini yaptılar, binlerce yıllık kemikler getirdiler, antik ve yakın tarihli eserler ortaya çıkardılar ve Aborjinlerin efsanelerini ile hikâyelerini kaydettiler. Hiçbir meslektaşları bu kadar zengin bir ganimet beklemiyordu."
 lepsius.72.g: "Aa, bir didgeridoo bile var!"
 je_lepsius_gwanggaeto: "Gwanggaeto Yazıtı"
 je_lepsius_gwanggaeto_reason: "Gwanggaeto Yazıtı, 391’den ölümüne kadar Goguryeo kralı olan Gwanggaeto’nun anısına dikilmiş bir anıt taşıdır. Yazıt, Çin’de Kuzey Kore sınırına yakın bir yerde bulunmaktadır. Taş üzerine kazınmış yazıt, Goguryeo Krallığı tarihi üzerine hayatta kalmış en eski ve en ayrıntılı kaynaktır. Goguryeo Krallığı ve halefi Balhae 668’de yıkıldığında, Guonei ve Wandu çevresindeki bölgenin önemi azaldı. 1644’te Mançu istilasıyla Çin İmparatorluğu düştüğünde, yeni Qing hanedanının imparatorları Yalu Nehri’nin kuzeyinde geniş bir bölgeyi yasak bölge ilan ettiler. Bölge ancak 19. yüzyılın ikinci yarısında yeniden yerleşime açıldı. 1876 civarında, Çinli bir görevli tamamen otlarla kaplanmış ve kısmen toprağa gömülmüş yazıtı yeniden keşfetti."
 lepsius_gwanggaeto_modifier: "Goguryeo’nun Mirası"
 lepsius.73.t: "Gwanggaeto Yazıtı"
 lepsius.73.d: "Kaybolmuş Goguryeo İmparatorluğu dönemine ait büyük bir yazıtın tesadüfen keşfi yalnızca daha önce bilinmeyen bir geçmişe ışık tutmakla kalmıyor, aynı zamanda siyasi açıdan patlayıcı sonuçlar doğurabilecek bilmeceler de ortaya çıkarıyor."
 lepsius.74.t: "Goguryeo - Bir Kore İmparatorluğu"
 lepsius.74.d: "Kral Gwanggaeto’ya adanmış bir yazıtın keşfinden sonra Çin, bunun Goguryeo’nun bir Kore devleti değil, bir Çin devleti – en azından Çin’e bağımlı bir devlet – olduğunun kanıtı olduğunu iddia etti. Japonya ise bunun Kore’nin güneyinde Japon hâkimiyetini kanıtladığını öne sürüyor."
 lepsius.75.t: "Wa’nın İstilası"
 lepsius.75.d: "Yakın zamanda keşfedilen Gwanggaeto Yazıtı, Japonya’nın Güney Kore’ye başarılı bir istilasına ve oradaki devletlerin boyunduruk altına alınmasına dair kanıtlar sunuyor."
 lepsius.73.f: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] tarafından keşfedilen yazıt, muhtemelen dünyadaki en büyük yazıt bile olabilecek devasa bir anıttır. Kuzey Kore ve Güney Mançurya’daki Goguryeo devletinin tarihini inşa etmek için benzersiz bir kaynak olsa da, zor okunan kısımlar ve Goguryeo Krallığı’nın kimliği üzerine tartışmalar, özellikle Uzak Doğu devletlerinde milliyetçiliğin uyanmaya başladığı bir dönemde göz ardı edilemeyecek siyasi sonuçlar doğuruyor. Goguryeo’nun bir Kore krallığı olduğundan şüphe yoktur, ancak Çin de çok uluslu Güney Mançurya bölgesinin, Goguryeo’nun merkezi olduğu için, irredantist Kore milliyetçileri tarafından talep edilmesinden makul bir şekilde endişe duymaktadır. Öte yandan Japonya’ya (Wa) olası bir Kore istilasından bahseden bir bölüm, Güney Kore’de Japon hâkimiyetine dair spekülasyonlara yol açarken, Koreli yorumcular bunun Kore devletlerinin Japonya’yı işgali olduğunu savunmaktadır."
 lepsius.73.g: "Çözülmeye değer öğretici bir geçmiş."
 lepsius.73.h: "Goguryeo önemli bir Çin devletiydi."
 lepsius.73.i: "Bu, Güney Mançurya’nın aslında Kore toprağı olduğunu gösteriyor."
 lepsius.73.j: "Kore üzerindeki Japon etkisine dair bir ipucu."
 lepsius.2131.t: "Aztek Yerleşiminde Kafatası Parçaları Bulundu"
 lepsius.2131.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]’de korkunç bir keşif yapıldı. Çeşitli kafatası parçaları, Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName]’e buranın bir Tzompantli, yani kafatası rafı olduğuna inandırdı."
 lepsius.2131.f: "Aztekler genellikle Çiçek Savaşları’nın esirlerini kurban ederdi. Bu insan kurbanlarının kafatasları çoğu zaman Tzompantli adı verilen bir kafatası rafında toplanırdı. Kafatasları üst üste yığılarak bir tür kafatası duvarı oluşturulurdu. Bazı tapınaklarda ise taş ustaları, süsleme amacıyla taş duvarlara kafatası oymuştur."
 lepsius.2131.g: "Ne kadar zalimce!"
 lepsius.2132.t: "Yerel Bilgin Tarafından Kurtarılan Aztek Yazıtı"
 lepsius.2132.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]’deki bir kaldırım yenilenirken, hiç kimse kaldırım taşlarının bir arkeolojik keşfi ortaya çıkaracağını düşünmemişti. Ancak yerel bir bilgin taşlarda çeşitli Aztek yazıtları buldu. Profesör [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hemen olay yerine çağrıldı ve yazıtları kurtarmayı başardı."
 lepsius.2132.f: "Buluntu, Mexica tarafından yürütülmüş bir tür savaşı tasvir ediyor. Nahuatl yazılarının tamamının ne anlama geldiğini henüz bilmiyoruz, ancak pek çok yer adı var. En azından hangi bölgelerden bahsedildiğini anlayabiliyoruz."
 lepsius.2132.g: "Şükür ki kaldırım taşı olmadan önce bulabildi."
 lepsius.2133.t: "Aztek Harabeleri Keşfedildi"
 lepsius.2133.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]’de eski Aztek harabeleri keşfedildi. Profesör [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] hemen kazılara başladı. Ne yazık ki binaların kendisi dışında pek fazla şey bulunamadı."
 lepsius.2133.f: "\"Harabeler zaten yağmalanmış olsa da, Avrupalıların gelişinden önce Mexica halkının yaşamına dair fikir veriyorlar. Bu bizim için hâlâ önemli bir buluntu!\""
 lepsius.2133.g: "İlginç."
 lepsius.2134.t: "Obsidyen Ayna Keşfedildi"
 lepsius.2134.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]’de Aztek zanaatkârlığının bir şaheseri keşfedildi. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], Azteklerin dini ritüellerde kullandığı kusursuz bir obsidyen aynayı ortaya çıkarmayı başardı."
 lepsius.2134.f: "\"Obsidyen aynaların yeraltı dünyasıyla iletişim kurmanın bir aracı olduğuna inanılırdı. Tanrılardan biri olan Tezcatlipoca, ayağı yerine bir ayna ile tasvir edilmiştir. Bu harika bir arkeolojik buluntu!\""
 lepsius.2134.g: "İnanılmaz!"
 lepsius.2141.t: "Kartacalı Batık Gemi Keşfedildi"
 lepsius.2141.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]’deki inci dalgıçları, antik bir Kartacalı batık gemi buldu. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], geminin şimdilik denizde kalmasına karar verdi; ancak dalgıçlar sayesinde kargo analiz edilip kayda geçirilebildi, bu da Kartacalı ticaret yollarına dair yeni içgörüler sağladı."
 lepsius.2141.f: "\"Burada pek çok mor kumaş var, muhtemelen çeşitli ülkelerin soyluları için hazırlanmıştı.\""
 lepsius.2141.g: "Akdeniz’in en büyük tüccarları!"
 lepsius.2142.t: "Karaya Vuran Pön Savaş Gemisi"
 lepsius.2142.d: "Denizin ustaları Kartacalıların karaya vuracağını kim tahmin ederdi? Görünüşe göre bu, [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]’de oldu. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], bir zamanların kudretli savaş gemisinden pek çok buluntu kurtarmayı başardı. Ancak ahşap büyük ölçüde çürümüştü."
 lepsius.2142.f: "\"Bu bir Bireme mi, Trireme mi, Quinquireme mi yoksa daha da ‘reme’li bir gemi mi?\""
 lepsius.2142.g: "Bir zamanların görkemli gemisi!"
 lepsius.2143.t: "Pön Limanı Keşfedildi"
 lepsius.2143.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]’de antik bir Kartaca limanı keşfedildi. Profesör [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], bölgede kapsamlı bir araştırma yapılmasını emretti. Ne yazık ki yalnızca bazı kısımlar kurtarılabildi, çünkü zengin bir sanayici hemen oraya yeni bir fabrika kurmak istiyordu."
 lepsius.2143.f: "\"En azından birkaç amfora bulmayı başardık. Kuşkusuz bunlar bize antik Akdeniz ticareti hakkında çok şey anlatacaktır.\""
 lepsius.2143.g: "Tamamen bilinmeyen bir liman! Ne keşif ama!"
 lepsius.2144.t: "Antik Kartaca Sikkeleri Keşfedildi"
 lepsius.2144.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]’de bir çiftçi tarafından antik sikkelerden oluşan bir hazine ortaya çıkarıldı. Ne yazık ki Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] tarafından yapılan kapsamlı araştırmaya rağmen başka hiçbir Pön eseri bulunamadı. Bu sikkelerin nasıl olup da bu tarlaya geldiği hâlâ bir gizem."
 lepsius.2144.f: "\"Bu sikke, Hannibal’ın kardeşi Hasdrubal’ı tasvir ediyor. Belli ki nispeten yeni bir sikke olmalı.\""
 lepsius.2144.g: "Artık zenginim!"
 lepsius.2151.t: "Kelt Kazanı Keşfedildi"
 lepsius.2151.d: "Keltler kazanları pek çok amaçla kullanırdı. Şimdi bu devasa kazanlardan biri [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]’de bulundu. Profesör [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], bu büyük metal eserini koleksiyonumuza kazandırmayı başardı."
 lepsius.2151.f: "\"Bir efsaneye göre, büyük bir savaşçı herkese içtikçe insanüstü güç veren sihirli iksir dolu bir kazana düşmüştü. Görünüşe göre o savaşçı o kadar güçlüydü ki dev kayaları kaldırabiliyordu. Ayrıca Romalılarla savaşmayı da çok severdi.\""
 lepsius.2151.g: "Umarım henüz kimse Sihirli Kazana düşmemiştir!"
 lepsius.2152.t: "Kelt Bronz Kalkan Kaplaması Bulundu"
 lepsius.2152.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]’deki çamurlu nehir yatağında bir bronz levha bulundu. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] geldiğinde, bu metal levhanın bir zamanlar bir Kelt kalkanının parçası olduğunu belirledi."
 lepsius.2152.f: "\"Bazı hikâyelerde Kelt reislerinin kalkanlar üzerinde taşındığı söylenir, ama bu kesinlikle bir çocuk hikâyesi olmalı. Ancak Tacitus, yeni reis ilan edildiklerinde kalkan üzerinde kaldırılan reislerden bahseder. Muhtemelen bu hikâyelerin tarihsel kaynağı da budur.\""
 lepsius.2152.g: "Büyük bir reise yakışır bir kalkan!"
 lepsius.2153.t: "Kelt Bronz Miğferi Kurtarıldı"
 lepsius.2153.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]’de boynuzlu bir bronz miğfer bulundu. Profesör [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], bunun aslında savaşta giyilen bir miğfer değil, bir Kelt kült objesi olduğunu hemen anladı."
 lepsius.2153.f: "\"Keltlerin kanatlı ya da boynuzlu miğferlerle tasvirlerini görmüş olabilirsiniz, ama bu tasvirler yanlıştır. Böyle bir miğfer savaşta engel olurdu. Böyle miğferler vardı ama genellikle belirli Kelt tanrılarına adanmış kült objeleriydi.\""
 lepsius.2153.g: "What a magnifcient helmet!"
 lepsius.2154.t: "Antik Menhir Keşfedildi"
 lepsius.2154.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], kırsalda yaptığı yürüyüşlerden birinde [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]’de garip bir taş buldu. Bunun, yerel Kelt kabilesi tarafından dikilmiş bir Kelt menhiri olduğu ortaya çıktı. Şimdi Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], Menhir’i detaylıca inceliyor."
 lepsius.2154.f: "\"Keltlerin neden Menhir diktiğini bilmiyoruz, çünkü hiçbir yazılı kayıt bırakmadılar. Ama bu bir tür kült alanı olabilir. Bazı yerlilerin ise ünlü bir savaşçı ve onun kudretli köpeği hakkında kendi hikâyeleri var. Bu Obeliks görünüşe göre kusursuz şekilli Menhirler yapar ve onları hiç yardım almadan dikerdi. Ama bu sadece saçma bir hikâye.\""
 lepsius.2154.g: "Bu Obeliks’in işi olabilir mi?"
 lepsius.2161.t: "Ege Freski Bulundu"
 lepsius.2161.d: "A local excavation of an Aegean ruin unearthed a magnificent fresco in [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]. Professor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ordered drawings of the find to be produced as the fresco is connected to the ruins."
 lepsius.2161.f: "\"Bu desenler inanılmaz! Keşke günümüzde de böyle güzellikler yaratsak!\""
 lepsius.2161.g: "Bu Sanat!"
 lepsius.2162.t: "Ege Harabeleri Keşfedildi"
 lepsius.2162.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]’deki inşaat çalışmaları sırasında antik bir Ege harabesi bulundu. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], bölgede kapsamlı bir inceleme başlattı. Ne yazık ki çok fazla buluntu kalmamıştı, ama harabeler burada bir zamanlar yaşamış insanların hayatını anlamaya yardımcı olabilir."
 lepsius.2162.f: "\"Bu kemerler binlerce yıldır burada duruyor. Bizim binalarımız acaba bu kadar uzun süre dayanabilecek mi…\""
 lepsius.2162.g: "Bu bize antik Ege’de yaşam hakkında çok şey anlatacak."
 lepsius.2163.t: "Ortaya çıkarılan Ege Mücevheri"
 lepsius.2163.d: "Bir çiftçi, [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] bölgesinde şans eseri büyüleyici bir keşfe rastladı. Profesör [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] geldiğinde, yalnızca hayranlıkla bakabildi; büyüleyici Ege mücevherleri gerçekten göz kamaştırıcıydı."
 lepsius.2163.f: "\"Ne kadar güzel mücevherler. Keşke bugün de benzer parçalar yapabilseydik!\""
 lepsius.2163.g: "Harika bir işçilik!"
 lepsius.2164.t: "Ege Kökenli Altın Kupa"
 lepsius.2164.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], yerel kazı alanlarımızdan birinde altın bir kupa ortaya çıkarmayı başardı. Böyle olağanüstü bir keşif kimsenin beklediği bir şey değildi, fakat belli ki [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] hâlâ büyük keşifler için pek çok fırsat sunuyor."
 lepsius.2164.f: "\"Kupa, bir adam ile birkaç boğanın bulunduğu bir sahneyi tasvir ediyor. Boğalar oldukça hareketli ve farklı pozlarda.\""
 lepsius.2164.g: "Böyle bir kupa isterdim!"
 lepsius.2171.t: "Mısır Duvar Resimleri"
 lepsius.2171.d: "Antik Mısır’a ait duvar resimleri, Profesör [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] tarafından [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] bölgesindeki gezilerinden birinde bulundu. Resimler, antik Mısır’dan sahneleri betimliyor."
 lepsius.2171.f: "\"İlginç olan şu ki, duvarlarda hâlâ boya var; oysa Yunanistan’da her şey sadece beyaz. Görünüşe göre Mısırlılar renklere daha düşkündü ya da çöl renkleri daha iyi korudu.\""
 lepsius.2171.g: "Harika resimler!"
 lepsius.2172.t: "Ortaya Çıkarılan Antik Mısır Tapınağı"
 lepsius.2172.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] bölgesinde hâlâ keşfedilmemiş tapınaklar olduğunu kim tahmin ederdi? Görünüşe göre varmış ve Profesör [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], kumların altında bir tane buldu. Her ne kadar değerli olan her şey çoktan gitmiş olsa da bu yine de büyük bir keşif."
 lepsius.2172.f: "\"Şu tapınağa bakın! Burada yapılan dini törenleri hayal edebiliyor musunuz? Muhteşem değil mi?\""
 lepsius.2172.g: "Burada öğrenecek çok şey var!"
 lepsius.2173.t: "Bulunan Mısır Heykeli"
 lepsius.2173.d: "Her ne kadar heykel kırık olsa da, yine de bilinmeyen bir Mısırlı taş ustasının büyük bir eseridir. [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] bölgesinde bulunan bu heykel muhtemelen kırılmadan önce bir şahini tasvir ediyordu. En azından Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] böyle düşünüyor."
 lepsius.2173.f: "\"Çok etkileyici görünmüyor olabilir ama bu heykel bize Mısırlıların bu tarz heykelleri nasıl yaptığını anlatacak!\""
 lepsius.2173.g: "Bunlar taş ustalarının harika eserleri!"
 lepsius.2174.t: "Ortaya Çıkarılan Mısır Mumyası"
 lepsius.2174.d: "Mumyalar muhtemelen Mısır’daki en yaygın buluntulardan biridir. Bu da [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] bölgesinde bulundu. Profesör [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] onu dikkatlice incelemeye başladı, ancak bazı insanların… başka fikirleri vardı."
 lepsius.2174.f: "\"Bir düşünsenize; bu mumyaları kullanarak antik Mısır halkının ne yediğini, ne içtiğini, ne kadar sağlıklı olduğunu öğrenebilsek. Bu harika olurdu!\""
 lepsius.2174.g: "Ölüm sadece bir başlangıçtır."
 lepsius.2174.h: "Bazı insanların mumya yemeyi sevdiğini duydum! Hadi satalım!"
 lepsius.2181.t: "Keşfedilen Helenistik Savaş Alanı"
 lepsius.2181.d: "Diadokh Savaşları dünyanın birçok bölgesini harap etti. Örneğin [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] bölgesinde sınırlı bir savaşın gerçekleştiği anlaşılıyor. Bunun Diadokh Savaşları’nın bir parçası olup olmadığı hâlâ kesin değil, fakat Profesör [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] çeşitli silahlar ve zırh parçaları buldu."
 lepsius.2181.f: "\"Burada küçük bir savaş olmuş olmalı. Diğerleri kadar büyük değil ama yine de önemli. Eminim bu alan hakkında daha çok şey öğreneceğiz!\""
 lepsius.2181.g: "Ne yazık ki o savaşlar çok yıkıcıydı..."
 lepsius.2182.t: "Bulunan Helenistik Sikkeler"
 lepsius.2182.d: "Antik Helenler, izlerini Akdeniz’den Hindistan’a kadar dünyanın uzak bölgelerine bıraktı. Çoğu zaman sikkeler bulunabilir; [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] bölgesinde olduğu gibi. Bu sikkeler sayesinde Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], bölgedeki Yunan varlığını tespit edebilecek."
 lepsius.2182.f: "\"Sanırım artık zenginim!\""
 lepsius.2182.g: "Büyüleyici!"
 lepsius.2183.t: "Ortaya Çıkarılan Helenistik Kalıntılar"
 lepsius.2183.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName], Helenistik kalıntılara sahip en yeni alan oldu. Helenistik şehirler İspanya’dan Hindistan’a kadar görülebilir. Profesör [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], bu özel kentin Yunan yerleşimleri hakkında daha çok bilgi vereceğini düşünüyor."
 lepsius.2183.f: "\"Bir kültürün böylesine geniş bir alana yayılabildiğini hayal edebiliyor musunuz? Gerçekten inanılmaz!\""
 lepsius.2183.g: "Yunan şehirleri her yerde, değil mi?"
 lepsius.2184.t: "Bir Yunan Tanrısının Betimlemesi"
 lepsius.2184.d: "Yunan tanrıları ve dinleri uzak diyarlara kadar ulaştı. [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] bölgesinde yakın zamanda bir Yunan tanrısının betimlemesi ortaya çıkarıldı. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], bunun şarap tanrısı Dionysos olduğunu belirledi."
 lepsius.2184.f: "\"Yunanların anlattığına göre, Dionysos doğar doğmaz Zeus onu uyluğuna dikmiş ve Mısır’ın ötesindeki Habeşistan’da, Nysa’ya götürmüş. Pan’a gelince, Yunanlar onun doğumundan sonra başına ne geldiğini bilmezler. Bu yüzden bana göre, Yunanlar bu iki tanrının adlarını diğer tanrılarınkinden daha geç öğrenmiş ve doğumlarını da bilgiyi edindikleri zamana bağlamışlardır.\"\n- Herodot"
 lepsius.2184.g: "Bu keşif için biraz şarap içelim!"
 lepsius.2500.t: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]’in Yeni Arkeolojik Haritası"
 lepsius.2500.d: "Profesör [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], son yıllarda [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] bölgesindeki tüm arkeolojik buluntuları bir haritada kaydetmek için yoğun bir şekilde çalıştı. Bu harita, gelecekte nerelerde daha fazla buluntu olabileceğine dair sonuçlar çıkarmaya olanak sağlıyor."
 lepsius.2500.f: "\"Burada birkaç çivi bulduk, şurada ise bir koyunun kemiklerini! İnanılmaz değil mi?!\""
 lepsius.2500.g: "Bu yeni keşiflerin kapısını açacak!"
 lepsius.2501.t: "[GetPlayer.GetName] için Resimli Arkeolojik Katalog"
 lepsius.2501.d: "Profesör [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] yalnızca olağanüstü bir arkeolog değil, aynı zamanda harika bir sanatçı. Bu yeteneği sayesinde [GetPlayer.GetNameNoFormatting] için bir Resimli Arkeolojik Katalog yayımlayabildi ve bu çalışma birçok amatör tarafından arkeolojiye muazzam bir katkı olarak görülüyor."
 lepsius.2501.f: "\"Şu illüstrasyonlara bakın! Sanki bir müzedeyiz ve objeleri tam karşımızda görebiliyoruz! Harika!\""
 lepsius.2501.g: "Harika bir kitap!"
 lepsius.2502.t: "[GetPlayer.GetName]’deki Tüm Arkeolojik Buluntuların Yeni Kataloğu"
 lepsius.2502.d: "[GetPlayer.GetNameNoFormatting]’deki tüm arkeolojik buluntuların yeni kataloğu ile Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], çoğu kişinin imkânsız gördüğü titiz bir çalışmayı başardı. Olağanüstü emeği sayesinde artık 7 ciltte bugüne kadar yapılmış tüm buluntuların kesin bir kataloğuna sahibiz."
 lepsius.2502.f: "\"Numara 7342: Muhtemelen Neolitik dönemden kalma, ‘Rocky’ adı verilmiş bir taş parçası.\""
 lepsius.2502.g: "Bu gelecekte çok faydalı olacak!"
 lepsius.2503.t: "Profesör [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] eser kaçakçılığını durdurdu"
 lepsius.2503.d: "Aylar süren çalışmaların ardından Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], ülkemizden eser kaçıran bir kaçakçı çetesini çökertmeyi başardı. Eserlere el konuldu ve şimdi koleksiyonumuzda güvenle saklanıyorlar."
 lepsius.2503.f: "\"Değerli arkeolojik bilgileri yok ettiniz, alçaklar!\""
 lepsius.2503.g: "Bunlar bir müzeye ait!"
 lepsius.2600.t: "Kayıp Yıldız"
 lepsius.2600.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], yıldızların eski tasvirlerinden hep şaşkınlık duyardı; çünkü bunlar günümüzde gördüğümüz yıldızlara uymuyordu. Profesör [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName]’in yardımıyla sonunda bunun nedenini çözebildi. Birlikte gökyüzünde yeni bir yıldız keşfettiler."
 lepsius.2600.f: "\"İşte! Orada, bana Antik Mısırlıların söylediği gibi! Sonunda kayıp yıldızı bulduk!\""
 lepsius.2600.g: "Müthiş bir bilimsel keşif!"
 lepsius.2601.t: "Güneş Tutulmalarının Astronomik Bilgisiyle Tarihi Olayların Tarihlendirilmesi"
 lepsius.2601.d: "Ortak bir çalışmayla Profesör [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ve Profesör [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName], modern güneş tutulmaları bilgisini kullanarak birincil kaynaklardaki belirli tarihi olayları tarihlendirmeyi başardı."
 lepsius.2601.f: "\"Açıkça belli ki Miletli Thales, 28 Mayıs 585’teki güneş tutulmasından bahsediyordu; başka birinden değil!\""
 lepsius.2601.g: "Arkeoloji için dev bir adım"
 lepsius.2602.t: "Geçmiş Kültürlerin Astronomi Bilgisine Genel Bakış"
 lepsius.2602.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] ve Profesör [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName], antik uygarlıkların astronomi bilgisini özetleyen yeni bir kitap yayımladı."
 lepsius.2602.f: "\"Evet, Dünya’nın hiçbir şeyin merkezi olmadığını biliyorlardı. Hayır, o zamanlar bile Dünya’nın düz olduğuna inanacak kadar saf değillerdi. Evet, bundan tamamen eminim.\""
 lepsius.2602.g: "İlgi çekici bir okuma!"
 lepsius.2603.t: "Heron’un Buhar Makinesi Yeniden İnşa Edildi"
 lepsius.2603.d: "Profesör [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], Dr. [ROOT.Var('verrier_astronomer_var').GetCharacter.GetLastName] ile Heron’un antik buhar makinesinden bahsettiğinde, diğeri hemen bir rekonstrüksiyon yapmaya heveslendi. Birlikte Aeolipile’in küçük bir yeniden yapımını gerçekleştirdiler."
 lepsius.2603.f: "\"Gördüğünüz gibi, Aeolipile’in gücü aktarmak için bir mekanizması yok. Bu yüzden gerçek bir makineden çok bir oyuncak. Ne yazık ki asla daha fazla geliştirilmedi.\""
 lepsius.2603.g: "Nasıl sanayileşemediler?"
 lepsius_illustrated_archaeological_catalog_modifier: "Resimli Arkeoloji Kataloğu Yazdı"
 lepsius.12.f: "Şu anda Mısır Koleksiyonunda #p [ROOT.Var('lepsius_egyptian_artifact_minor').GetValue]#! @lepsius_egypt_minor! küçük eser ve #p [ROOT.Var('lepsius_egyptian_artifact_major').GetValue]#! @lepsius_egypt_major! büyük eser bulunuyor. \n\n Mısır koleksiyonu #T yeniden düzenlenebilir#! ve böylece yeni bir sergi başlatılabilir. Ancak bunun için belli sayıda esere ihtiyaç vardır. \n\n Bir #T küçük sergi#! için #p 10#! @lepsius_egypt_minor! eser, bir #T orta sergi#! için #p 25#! @lepsius_egypt_minor! eser, bir #T büyük sergi#! için #p 50#! @lepsius_egypt_minor! eser ve bir #T mükemmel sergi#! için #p 100#! @lepsius_egypt_minor! eser gerekir. Ayrıca, #T mükemmel sergi#! için #p 1#! @lepsius_egypt_major! büyük eser de gereklidir. \n\n Koleksiyonun yeniden düzenlenmesi ve yeni sergi hazırlıkları yaklaşık yarım yıl sürer. Serginin verdiği bonuslar kalıcıdır - yeniden düzenlenene kadar."
 lepsius.13.f: "Şu anda Mezopotamya Koleksiyonunda #p [ROOT.Var('lepsius_mesopotamian_artifact_minor').GetValue]#! @lepsius_mesopotamia_minor! küçük eser ve #p [ROOT.Var('lepsius_mesopotamian_artifact_major').GetValue]#! @lepsius_mesopotamia_major! büyük eser bulunuyor. \n\n Mezopotamya koleksiyonu #T yeniden düzenlenebilir#! ve böylece yeni bir sergi başlatılabilir. Ancak bunun için belli sayıda esere ihtiyaç vardır. \n\n Bir #T küçük sergi#! için #p 10#! @lepsius_mesopotamia_minor! eser, bir #T orta sergi#! için #p 25#! @lepsius_mesopotamia_minor! eser, bir #T büyük sergi#! için #p 50#! @lepsius_mesopotamia_minor! eser ve bir #T mükemmel sergi#! için #p 100#! @lepsius_mesopotamia_minor! eser gerekir. Ayrıca, #T mükemmel sergi#! için #p 1#! @lepsius_mesopotamia_major! büyük eser de gereklidir. \n\n Koleksiyonun yeniden düzenlenmesi ve yeni sergi hazırlıkları yaklaşık yarım yıl sürer. Serginin verdiği bonuslar kalıcıdır - yeniden düzenlenene kadar."
 lepsius.14.f: "Şu anda Ege Koleksiyonunda #p [ROOT.Var('lepsius_aegean_artifact_minor').GetValue]#! @lepsius_aegean_minor! küçük eser ve #p [ROOT.Var('lepsius_aegean_artifact_major').GetValue]#! @lepsius_aegean_major! büyük eser bulunuyor. \n\n Ege koleksiyonu #T yeniden düzenlenebilir#! ve böylece yeni bir sergi başlatılabilir. Ancak bunun için belli sayıda esere ihtiyaç vardır. \n\n Bir #T küçük sergi#! için #p 10#! @lepsius_aegean_minor! eser, bir #T orta sergi#! için #p 25#! @lepsius_aegean_minor! eser, bir #T büyük sergi#! için #p 50#! @lepsius_aegean_minor! eser ve bir #T mükemmel sergi#! için #p 100#! @lepsius_aegean_minor! eser gerekir. Ayrıca, #T mükemmel sergi#! için #p 1#! @lepsius_aegean_major! büyük eser de gereklidir. \n\n Koleksiyonun yeniden düzenlenmesi ve yeni sergi hazırlıkları yaklaşık yarım yıl sürer. Serginin verdiği bonuslar kalıcıdır - yeniden düzenlenene kadar."
 lepsius.15.f: "Şu anda Pre-Kolomb Koleksiyonunda #p [ROOT.Var('lepsius_precolumbian_artifact_minor').GetValue]#! @lepsius_precolumbian_minor! küçük eser ve #p [ROOT.Var('lepsius_precolumbian_artifact_major').GetValue]#! @lepsius_precolumbian_major! büyük eser bulunuyor. \n\n Pre-Kolomb koleksiyonu #T yeniden düzenlenebilir#! ve böylece yeni bir sergi başlatılabilir. Ancak bunun için belli sayıda esere ihtiyaç vardır. \n\n Bir #T küçük sergi#! için #p 10#! @lepsius_precolumbian_minor! eser, bir #T orta sergi#! için #p 25#! @lepsius_precolumbian_minor! eser, bir #T büyük sergi#! için #p 50#! @lepsius_precolumbian_minor! eser ve bir #T mükemmel sergi#! için #p 100#! @lepsius_precolumbian_minor! eser gerekir. Ayrıca, #T mükemmel sergi#! için #p 1#! @lepsius_precolumbian_major! büyük eser de gereklidir. \n\n Koleksiyonun yeniden düzenlenmesi ve yeni sergi hazırlıkları yaklaşık yarım yıl sürer. Serginin verdiği bonuslar kalıcıdır - yeniden düzenlenene kadar."
 lepsius.99.t: "Arkeoloji Müzesinin Taşınması"
 lepsius.99.d: "Nedense bir [GetBuildingType('building_lepsius_archaeological_museum').GetName] binamız var ama görkemli başkentimizde değil. Açıkça belli ki onu Başkente taşımamız gerekiyor!"
 lepsius.99.f: "\"Lütfen vazolara dikkat edin, çok kırılganlar! Hayır! Onları öyle kutuya fırlatamazsınız, bir tür koruyucuya ihtiyaçları var! Bence bu hiç de iyi bir fikir değil!\""
 lepsius.99.g: "Artık oraya her gün gidebilirim!"
 lepsius.140.d: "Arkeoloğumuz, keşif gezisi için son derece nitelikli personel toplamak amacıyla [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] bağlantılarını kullandı."
 lepsius.250.f: "Bir tartışmayla başladı, ardından küfürler, tehditler ve sonunda yumruklaşmalar geldi. Olay tam teşekküllü bir meyhane kavgasına dönüştü. Kavganın ortasında: keşif liderimiz. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] siniri bize büyük bir itibar kaybettirdi. Bu sabah hatanın raporu yüksek bir devlet görevlisine ulaştı. Büyük bir diplomatik krizi önledik ama kötü izlenim uzun süre kalacak."
 lepsius.260.f: "İyi haber! Görünüşe göre keşif liderimiz, yolculuğu sırasında kusursuz bir [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetCustom('academics_gentleman_or_gentlewoman_type')] olduğunu kanıtladı. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis|U] nazik ve karizmatik tavırları tipik [ROOT.GetCountry.GetAdjectiveNoFlag] davranışıyla özdeşleştirildi. Ülkemizin itibarı orada önemli ölçüde arttı."
 lepsius.270.d: "Keşif liderimiz, her gün kafede oturup soda içip dondurma yemesiyle özellikle dikkat çekiyor."
 lepsius.270.f: "Bütün gün çalışmaktan başka bir şey yapmayan hırslı liderler vardır. Büyük işler başarmak ya da servet biriktirmek isterler. Bazıları yaptıklarıyla ünlü olmak ister. Diğerleri ise her ayrıntıya takıntılıdır. Bizim arkeoloji direktörümüz öyle değil. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe], her gün soda içip dondurma yiyerek sıcağı yenmeyi alışkanlık haline getirdi. Buna tembellik denebilir. Başkaları içinse bu insan zarafetinin, iyi zevkin ve hayatta doğru önceliklere sahip olmanın bir göstergesidir."
 lepsius.280.d: "Keşif liderimizin diplomatik becerileri sayesinde [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim], yerel vali tarafından davet edilip ödüllendirildi."
 lepsius.311.d: "Son yurtdışı arkeoloji keşif gezisinin lideri, yolculuk sırasında yazdığı günlüğü yayımlamaya karar verdi."
 lepsius.312.d: "[SCOPE.sCharacter('lepsius_scientific_writer').GetFullName], yolculuk sırasında yazdığı bilimsel makaleyi yayımlamaya karar verdi."
 lepsius.408.f: "Nazar, kem gözlere karşı koruduğuna inanılan bir muska türüdür. Böyle bir batıl inanç, Doğu’nun geniş kesimlerinde ve Akdeniz’in bazı bölgelerinde vardır. Elbette bilimsel eğitim almış bir zihnin, kötü güçlerin keşfi mahvetmesini önlemek için böyle bir tılsıma güvenmesi saçma olurdu. Durum yerel yardımcılar ve hamallar için farklıdır. Liderin bir nazar edinmesini istiyorlar, aksi takdirde [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]'in büyük bir talihsizlikle karşılaşacağına inanıyorlar. Nazarın yetenekleri ne olursa olsun, keşfi etkilemese bile en azından yardımcılarımızın moralini etkiler."
 lepsius.409.f: "Keşif kıyı boyunca ilerlerken kısa sürede uç noktaları neredeyse birbirine değen geniş bir körfezle karşılaştılar. Uzun yoldan dolaşmak yerine, bazı Yunan balıkçıları bizi körfezin karşısına geçirmek için teklif sundu. Keşif lideri bu teklifi hemen kabul etti. Balıkçılarla yapılan bir sohbette, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe], muhtemelen klasik öncesi dönemden kalma bir harabe hakkında önemli bilgiler de elde edebildi."
 lepsius.421.d: "Arkeoloğumuz, yanında saklamak istediği küçük bir Mısır lapis lazuli bokböceği buldu."
 lepsius.452.f: "Geçmişte [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], bölgede uzun zaman önce yok edilmiş arkeolojik alanlara ait tarihsel kayıtların bulunması gerektiğini defalarca duymuştu. Birkaç gün önce [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe], faydalı bir ipucu aldı: bir tüccarın, çoktan kaybolmuş kayıtların bir kopyasını içeren 16. yüzyıldan kalma bir el yazması vardı. Orijinaller muhtemelen sonsuza dek kayboldu, ama en azından yeniden inşa etme ihtimali var."
 lepsius.461.f: "O garip, ezici bir his vardı. Gecenin bir yarısı. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], çadırın çöl kumundaki rüzgârla sarsıldığını sanarak ayağa kalktı; ama bu sadece rüzgâr değildi. Tuhaf bir fısıltı vardı. Uğultu, uyumsuz tonlara yükseldi, ardından melodik bir şarkıya dönüştü. Siren şarkısı gibi büyüledi ve duyuları bulandırdı. En azından, saatler süren arayıştan sonra [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe], Gize Büyük Sfenksi’nin pençeleri dibinde delirmiş gibi kazı yaparken bulunduğunda [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetLastName] böyle iddia etti. Altında binlerce yıldır gizlenmiş bir bilgi odası olduğuna inanıyordu. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] durumu o zamandan beri pek düzelmedi. Bu yer, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim] üzerinde gerçekten kötü bir etkiye sahip."
 lepsius.462.f: "There was this strange, crushing feeling. Middle of the night. [SCOPE.sCharacter('lepsius_military_attache').GetFullName] stood up, believing in the wind beating against the pitched tent in the desert sand; but it was more than wind. It was an odd whisper. A murmur that rose to dissonant tones until it increased to a melodic song. Like siren song, it beguiled - and clouded the senses. At least, that was what [SCOPE.sCharacter('lepsius_military_attache').GetLastName] claimed when, after hours of searching, [SCOPE.sCharacter('lepsius_military_attache').GetSheHe] was found at the paws of the Great Sphinx of Giza, digging like a madman, convinced that beneath the Sphinx was a secret chamber from which knowledge was to be found been hidden for thousands of years. [SCOPE.sCharacter('lepsius_military_attache').GetHerHis] condition has hardly improved since then. This place has a truly bad influence on [SCOPE.sCharacter('lepsius_military_attache').GetHerHim]."
 lepsius.465.f: "Keşif liderimiz nereden geldiğini, hangi dili konuştuğunu, hangi yemekleri tercih ettiğini ve hangi kültürü üstün gördüğünü saklamıyor. Yerellere ettiği hakaretler gün geçtikçe artıyor – ister işe alınan personel olsun, ister rastgele insanlar. Farklı köylerden geçerken, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe], muhtarları kendi astları gibi görmeye başladı. En misafirperver jest bile [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] için yeterli değil. Şimdiden yerel yönetimin çeşitli bölgelerinden [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName]'in kibirli ve aşağılayıcı davranışları hakkında birçok şikâyet geldi ve keşif giderek ülkemiz için olumsuz bir propaganda kampanyasına dönüşüyor."
 lepsius.467.f: "Eski Hristiyan Ortadoğu’dan pek bir şey kalmadı – yine de asırlardır hayatta kalmış Kıpti, Marunî, Keldani ve Ermeni toplulukları hâlâ var. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], aslında yola çıkarken dini bir niyeti olmamasına rağmen, geçen gece yerel bir rahibin önderliğinde çoktan unutulmuş bir kiliseye götürüldü. Arkeolojik ve tarihî açıdan ilgi çekici olan bu yerde, din adamı sonradan kaybolduğu sanılan bir kilise babasına ait kutsal bir emaneti barındıran bir kutsal emanet sandığını ortaya çıkardı. Zaten geç olmuştu ve kamp uzaktaydı; keşif lideri orada bir gece ve bir sabah geçirdi. O zamandan beri [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]'i rahat bırakmayan ve hakkında pek konuşmadığı bir rüya, [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]'in hayatının bazı alanlarını değiştirmek istemesi anlamına geliyor. Rahip, yeni bulduğu inançta güçlenmesi için [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]'e unutulmuş kutsal emanetten bir parça vermeyi teklif etti."
 lepsius.467.g: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] gerçekten kutsal bir görü mü yaşadı?"
 lepsius.471.g: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] zamanını almalı ve bu yer hakkında olabildiğince çok şey öğrenmeli."
 lepsius.471.h: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U], yanında birkaç eser getirmesi şartıyla orada daha uzun süre kalabilir."
 lepsius.471.i: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U], orayı ziyaret edebilir, ama sadece gerektiği kadar."
 lepsius.472.f: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], insan ve malzeme kaybının inanılmaz bir açıklamasını yaptı. Bu hem çirkin hem de utanç verici – özellikle makul ölçüde aydınlanmış bir zihin için. Keşif lideri, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe] ve adamlarının, aşılmaz Yucatán ormanında yüksek dağlarla çevrili, tanımadıkları bir vadiye rastlamadan önce bir hafta boyunca kaybolduklarını iddia ediyor. Daha önce bilinmeyen bir Maya bölgesi bulmayı umarak vadeyi keşfetmeyi planladılar – büyük bir hata olduğu ortaya çıktı. Çünkü vadi korkunç yaratıklara, dev kertenkelelere ev sahipliği yapıyordu. Aslında [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe], bu 'kayıp dünyada' nesli tükenmiş dinozorların milyonlarca yıldır yaşadığını, izole kaldıkları için hayatta kaldıklarını açıkladı. Canavarlar ekibe dehşet saçtı, birkaç hamalı ve araştırmacıyı acımasızca parçaladı. Kaçarken [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe], ekipmanların çoğunu bırakmak zorunda kalmış. Şimdi [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe], tüm keşif ekibinin yeniden donatılması için yalvarıyor. Neden [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe]'in bu masalsı hikâyeyle bizi etkileyeceğini düşündüğünü bilmiyoruz – aksine, hâlâ bu işi yönetmek için doğru kişi olup olmadığı konusunda şüpheler doğuyor!"
 lepsius.472.g: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe], dinozorların keşif ekibimizi yediğini mi söylüyor?!"
 lepsius.501.h: "[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]'in daha fazla araştırmasına izin ver."
 lepsius.506.f_engine: "Ne yazık ki keşif üyelerimiz Meçhul Firavun’un mezarını daha ayrıntılı inceleyecek vakti bulamadı. Arkeologlarımız gömü odasında yol açarken tavandan kayalar döküldü ve yukarıdaki çatlaklardan kum sızdı. Görünüşe göre ortam, sanılandan çok daha gözenekli kayalardan oluşuyordu; kopan kaya parçası yapının sonunu getirdi. Çabuk zekâsıyla [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], riske rağmen yoluna devam etti ve tabuta ulaşmak için mücadele ederek tüm mevcut adamların onu dışarı çıkarmasını sağladı. Görkemli, benzersiz bir parça – kalan buluntuların kaybını telafi edecek nitelikteydi; ne de olsa bütün kraliyet mezarı dakikalar içinde çökmekle tehdit ediyordu..."
 lepsius.506.f_muscular: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] gerçek gömü odasına girdiğinde bu gerçekten tarihî bir deneyimdi. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]'i özel bir sürpriz bekliyordu: Meçhul Firavun’un tabutu ve mumyası, gömülmesinin üzerinden 3000 yıldan fazla zaman geçmesine rağmen hâlâ yerindeydi! Yine eşsiz güce sahip Padualı bize yardım edecekti – tahta tabutu ve mumyayı granit mahfazadan kaldıracaktı. Ancak arkeologlarımızın baştaki sevinci, sonradan duydukları mutsuzluktan küçüktü. Öğle arasında ekip süslü galeride ekmeklerini paylaşırken, gömü odasından korkunç bir gıcırdama ve çatlama sesi geldi. Kazı yardımcılarının ve keşif liderimizin dehşetine kaslı dev de kendine bir mola vermişti – ve yanlışlıkla tabutun üzerine oturdu. Kral mumyasından ve tahta sanduktan geriye sadece parçalar kaldı..."
 lepsius.532.f: "Askerî ataşe defalarca Kürt topraklarına girilmemesi konusunda uyarıda bulundu. Bu bölgedeki önceki keşifler, yerel halkla iyi tecrübeler yaşamamıştı. Kürtler özgür, onurlu – ama aynı zamanda gururlu olarak bilinirler. Topraklarına izinsiz girmek onları öfkelendirebilir. Bu nedenle [SCOPE.sCharacter('lepsius_military_attache').GetFullName], tatsız olaylarla daha etkili mücadele edebilmek için birkaç adamın silahlandırılmasında ısrar etti. Ataşe en kötüsünü beklerken, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], Kürt kabilesini bir an önce bulup onlarla müzakere ederek dostane bir çözüme varmak ve Lamassu’yu hızla [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] ellerine geçirmek istiyor. [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe], birlikleri bölmeyi öneriyor: silahsız adamlar, eğitimsiz hamallar ve erzak ile ekipmanın çoğu geride kalmalı, kendisi ise askeri ataşe ile önden giderek lamassu’yu verimli şekilde arayabilecek daha esnek bir güç oluşturmalı. Öte yandan ataşe, geride kalan keşif ekibinin olası bir Kürt saldırısında tamamen savunmasız kalacağından endişe ettiğini dile getirdi."
 lepsius.534.f: "Keşif lideri, yerli kabilelerin gözüne girmek için yaptığı son girişimin [GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]'in amaçladığının tam tersi bir sonuç doğurduğunu çok geç fark etti. Çadırda bir çığlık yankılandı, bazı astları içgüdüsel olarak ellerini silahlarına attı. O andan itibaren havada gerginlik vardı ve askerî ataşe, bu çatışmanın diplomasiyle değil, ancak şiddetle çözülebileceği yönündeki kaygısında haklı olduğunu gördü. Yanında getirdiği adamları dizmesi için yalnızca kısa bir vakti vardı. Bazı araştırma asistanları ise şimdiden eşyaları toplayıp mümkün olduğunca uzaklaşmakta ısrar ediyordu."
 lepsius.551.f: "[ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] had worked late that day. The Greek sun brooded on [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] head, the wind from the mountains and from the sea remained absent. The boring and tedious cataloging of dull archaeological objects dragged on for days. The finds often amounted to only measly fragments of broken glass and chicken bones left behind, which the archaeologist attributed less to the Minoan food culture and more to the proletarian eating manners of the excavation helpers. In a mood of weariness and resignation, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] strolled the sprawling grounds of a little-explored palace complex. The last time [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] was sighted was near a structure classified as late Bronze Age or early Archaic. A crash echoed through the Cretan hills, drowning out cicadas and startling doves as the archaeologist broke through the ground - and despite a two-day search could not be found."
 lepsius.552.d: "When [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] regains consciousness, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] finds [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerselfHimself] in an unfamiliar subterranean building."
 lepsius.552.f: "It was perhaps the strangest experience in the archaeological leader's life. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] thought [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] had fallen down a meter-long rabbit hole; the shaft had been so narrow, accompanied at the same time by sand and mud, which had pressed [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] down like quicksand in excruciating lengths. Impossible that anyone could have followed [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim]; and impossible to see anything as no sunlight followed [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] down the shaft. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] felt plates under [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] palms upon impact. In the glow of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] lighter [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] recognizes the smoothly hewn walls, to which remains of paint are stuck. Frescoes from a lost culture, which [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] initially wants to assign to the Minoan, but soon no longer knows which century they come from. Apparently there are smooth transitions between Minoan and Mycenaean influences. Looking around, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] finds [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerselfHimself] in a hall not unlike a Megaron. The archaeologist slowly feels [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] way forward, hearing [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] own footsteps echoing in the hollow space. Corridors without ornaments, without objects, without distinguishable details follow; forks in the road; chambers; and dead ends. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] realizes that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has ended up in an ancient labyrinth that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has no overview of. The more [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] thinks [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]'s exploring it, the bigger and more unknown it becomes..."
 lepsius.553.d: "After some time of trial and error, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] realizes that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has arrived at the starting point of the labyrinth..."
 lepsius.553.f: "Legs heavy, head foggy - could it be that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] had been here before? The spot on the plates where [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] landed when [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] fell from above is unmistakable. And with growing horror the question arises: how long was [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] here? How many hours had passed? Maybe days? And would [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] find out before hunger and thirst tormented him to death...?"
 lepsius.554.d: "In the labyrinth, the missing person comes across a mosaic. The question is whether [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] chooses one of the two corridors or the stairs."
 lepsius.554.f: "After corridors and stairs without distinction, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] reaches a larger room. A corridor opens to the left and right, and a staircase leads up and down. A mosaic on the floor catches the eye. A sea scene confirms the thesis that the walls may come from Minoan times, while the rare jewelry bears witness to Mycenaean influences. The gods depicted are predecessors of the classical Greek pantheon. Surrounded by dolphins, father of the gods Zeus stretches his arm in the air with a thunderbolt. Demeter and Persephone point to the west, ears of corn in hand; Artemis is accompanied by two lions looking east. Finally Poseidon, the father of the gods of the Mycenaeans: with a trident he makes the earth tremble beneath him."
 lepsius.557.d: "In a hall, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] again encounters a riddle."
 lepsius.557.f: "Four passes. Four pictures. Above each passage, the prisoner of the labyrinth can see outlines engraved in stone. It takes some time before [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] realizes that these are the shores of islands. Based on [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] experiences on Crete, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] can roughly assign them. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] assigns the first passage to the island of Rhodes; the second of the island of Delos; the third of the island of Euoboea; the fourth of the island of Naxos. Unfortunately, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] cannot find any further clues."
 lepsius.558.d: "After several days, our excavation team found the missing archaeologist near a cliff. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] was completely exhausted - and has been mentally confused ever since."
 lepsius.558.f: "It remains a mystery where [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] has been for the past 72 hours. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] was found a few miles from the actual excavation site - in a pitiful condition, as if mauled by a wild animal. Although [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has since regained consciousness, the expedition doctor believes [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] must have received a severe blow to the head. At least [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] language center seems disturbed. Again and again [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] falls into an almost delusional style when [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has to tell what happened. The team has left the area because they are concerned [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] might go on a quest again - to prove [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe]'s not crazy."
 lepsius.559.f: "The police examined the body of the former archaeologist yesterday evening. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetFullNameNoFormatting] became known to the public mainly because of a mental illness after [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] went missing under mysterious circumstances during an excavation on Crete and was found again days later under just as mysterious circumstances. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] just hasn't been the same person since then. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] feared being alone, thought [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] saw monsters in the shadows. In the end [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] only slept when the light was on because nightmares kept [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] awake all night. In the last days of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] life, Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] had not only become heavily dependent on medication and had visibly deteriorated both physically and mentally, but [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] had also drawn the ridicule of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] academic colleagues because of abstruse claims about [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] Crete research. Despised by the scientific world, ridiculed in newspapers and visually reduced to a caricature of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] former self, investigators agree that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] took [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] own life."
 lepsius.560.f: "At first Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] was surprised how far away from the old excavation site [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] finally saw the sun again. It was several hours before [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] rejoined the rest of the digging mission, much to the relief of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] colleagues. There, to the surprise of those present, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] was able to report on [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] find - a truly magnificent discovery that could perhaps change the way we have interpreted the myths of the ancient Greeks. A mysterious ball of fabric that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] found there allows only one conclusion."
 lepsius.561.f: "Sütun ormanı yararak ilerlerken Yucatán tepelerinin üzerinde sis asılıydı. Uzakta jaguarlar inliyordu; hava sivrisineklerle uğulduyor, ateş birkaç yardımcımızı yere seriyordu. Geriye üç kişilik bir grup ve birkaç hamal kaldı. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] dur işareti verdi. Yerde dikili taşlar ve oyulmuş taşlar vardı; yosunla kayganlaşmış, yarı gömülü basamaklar yıkık bir terasa tırmanıyordu. Bir Maya piramidinin silueti ortaya çıktı. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U], bir hamal elini kaldırıp 'Patrón—bir giriş!' diye seslenince kulak kabarttı."
 lepsius.562.f: "İçeri tek başına girmekte ısrar eden sefer lideri, önceki bir istilacının ağarmış kemiklerinin yanından geçti ve yazıtlarla dolu bir panoyla karşılaştı. Geriye gömülmüş dört kartuş – büyük tanrıların yüzleri – tuş gibi basılabiliyordu. Altında şu beyit yazıyordu: doğuda doğan, zirvede parlayan, alacakaranlıkta batan ve günlerin sayısını tutan. Bu düzenek açıkça bir sınamaydı; tek bir hata [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] sonunu getirebilirdi."
 lepsius.563.f: "Dar bir geçitte ayak sesleri yankılandı. Meşale ışığında duvarlar oyma desenlerle parıldıyor; dev ağaçların kökleri devrilmiş bir lento taşını deliyordu. İleride bir oda açıldı – ortasında alçak bir sunak, loşlukta hafifçe parıldayan bir put vardı. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U], sol elinde bir kum torbasını tarttı, sağ eliyle putun ağırlığını hesapladı ve nefesini dengeledi. Tek temiz bir değişim – sonra dışarı."
 lepsius.564.d: "Belki de [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] bilmeceyi yanlış okudu – ya da belki de inşacılar hiç kimseye güvenmiyordu. Bir gök gürültüsü koptu; dev bir taş küre serbest kaldı ve koridor boyunca [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]'in üzerine yuvarlandı."
 lepsius.564.f: "Değişim yapıldı; çanta sunağın üzerine yerleştirildi. Bir anlığına hiçbir şey hareket etmedi. Sonra boğuk bir sarsıntı yükseldi, tavandan toz sızdı ve yukarıdan bir gürültüyle karşılık geldi – bu devasa yuvarlanan bir kaya parçasıydı!"
 lepsius.565.d_wrong: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] ışığa çıktığında daha da kötü bir sürprizle karşılaşır: kamp basılmıştır ve silahlı adamlar putu – ya da [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHis] hayatını – ister."
 lepsius.565.f_right: "Bu kuvvet değil, zekâ meselesiydi. 'Günlerin sayısını tutan' Güneş Tanrısı K'inich Ajaw’ı seçmek, [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]'i düzeneklerin gazabından kurtardı. Tertibatlardan yara almadan sıyrılan [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] putu ele geçirip aceleyle dışarı çıktı; [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetHerHim]'e rakip bir grubun yolda olduğu haberi ulaştı ve ekip derhal bölgeden ayrıldı."
 lepsius.565.f_wrong_right: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] geçitten kaçarken bir köke tutunup yana savruldu ve dev taş ormanın içine yuvarlanıp parçalandı. Dışarıda dağılmış mızraklar ve düşmüş adamlar yatıyordu – aynı tuzakla bozulmuş bir pusunun kalıntıları. [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] bunu kanıtlayamaz ama sahne, tehlikeleri bizim yerimize tetikletmek isteyen yabancı bir rakibin izlerini taşıyordu. Fark etmez – yola devam etme vakti."
 lepsius.565.f_wrong: "Son bir sıçrayışla [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName] eşikten çıktı – fakat kendini okçular tarafından sarılmış halde buldu. Ağaçların arasından yumuşak bir [SCOPE.sCountry('lepsius_archaeological_rival').GetAdjectiveNoFlag] aksanıyla zarif bir ses yükseldi, solgun keten giymiş bir adam öne çıktı: 'Nihayet tanışmak ne güzel. Ama bu eser daha iyi ellere ait.' Sayıca az kalan ve hamalları öldürülmüş olan [SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetSheHe|U] putu teslim etti. '[GetPlayer.MakeScope.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] Hovitos’un sizi benim tanıdığım gibi tanımaması ne yazık,' diye homurdandı ve fırsatını bulup elleri boş kaçtı."
 lepsius.581.d: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] kişisel bir endişeyle öne çıktı: [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] 'Kayıp Dünya'nın gerçekten var olduğunu kanıtlamak ve böylece onurunu geri kazanmak istiyor. [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] özel bir sefer için para topluyor."
 lepsius.581.f: "Yucatán seferinin büyük kısmının gizemli şekilde kaybolmasının üzerinden yıllar geçti. O zamandan beri [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName], akademinin alay konusu oldu. Gazetelerdeki karikatürlerde [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim], 'dino hikâyeleriyle' delirmiş biri olarak tasvir ediliyor. Travma derin izler bırakmış: [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] sözde vadinin gerçek olduğunu dünyaya kanıtlamaya takıntılı hale gelmiş. [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U], şimdi tüm mirasını bu seferi kendi imkânlarıyla finanse etmek için harcadığı söyleniyor. Elbette [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe], bu tamamen çılgın yolculuğu için devletten de destek istedi. Uzmanlarımız bu intihar görevine karşı tavsiyede bulunuyor – Yucatán’a yapılan son seferin nasıl sonuçlandığını herkes biliyor. Bu yüzden böyle bir seferi tamamen yasaklamak isteyen sesler var. Ancak bu, [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] ruh halini daha da kötüleştirebilir. Başkaları ise [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]'nin gitmesine izin verilmesi gerektiğini ama resmi bir müdahale olmadan olması gerektiğini düşünüyor; sonuçta kimse aklen dengesiz görünen bir adamın yolculuğuyla anılmak istemiyor. Sadece bir azınlık bu çılgınlık için keselerini açmayı düşünüyor. Onlar, [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] durumundan sözde sorumlu olduğumuzu savunuyor..."
 lepsius.581.h: "Bırakın [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] dinozorlarının peşinden koşsun."
 lepsius.582.f: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] Yucatán ormanlarına kaybolduktan aylar sonra, yorgun maceracı Mérida’nın taşra başkentinde tekrar ortaya çıktı. Yine birçok yardımcısını kaybetmişti ve geriye kalan grup perişan durumdaydı. Ancak birçok tanığın yanı sıra [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]'nin elinde ikna edici bir kanıt vardı: modern fotoğraflar sayesinde, birkaç akademisyen tarafından da gerçek olduğu doğrulanan, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]'nin çılgın hikâyelerine karşı konulamaz bir delil. Ve gerçekten: çizimlerde pterozorlar ve otobur brontozorlar açıkça görülüyordu! Halk, [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName]'i bir idol olarak kutlarken, meslek dünyası şoke oldu ve hükümetimiz hak ettiği şöhreti ulusal bir kahramana layık görmeyen inatçı bir cahiller topluluğu olarak anıldı!"
 lepsius.583.d: "Aylarca [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName]'den haber alamadık. Görünüşe göre [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe], Yucatán ormanlarının bilinmez derinliklerinde kaybolmuş."
 lepsius.583.f: "Belki bir gün bu mesele hakkında trajik oyunlar yazılabilir. Hayatının sonuna yakın aklını yitirmeye ramak kalmış olan [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName], görünüşe göre son ana dek sözde dinozor vadisinin izlerini aradı. Hastalıklar ve düşman Maya kabileleri [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHis] seferini yok etti. Az sayıdaki kurtulandan biri, [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName]'in en son vadinin bulunduğu plato yamaçlarını yeniden keşfettiğini iddia ettiğini anlatıyor. Ancak adamların geri kalanı isyan etmiş ve eve dönmüştü. [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim]'in akıbetini kimse bilmiyor. Yine de yalnız ve bitkin hâlde, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]'nin nihayetinde [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim]'i öldüren şeye karşı hayatta kalma şansı çok azdı."
 lepsius.583.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] aslında kötü biri değildi. Kötü bir kâşif evet, ama kötü biri değildi."
 lepsius.584.f: "Aslında herkes bu yolculuğun uzun sürmeyeceğini bekliyordu: ya koşullar adamları ölüme mahkûm edecekti ya da bir isyan çıkacaktı. Bu yüzden bir sabah yapılan keşif herkesi daha da şaşırttı. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName], günlerdir Yucatán’ın aşılmaz ormanlarında bir maden arayıcısı gibi çılgınca kafileye öncülük ediyordu. Sanki her ağacı ve her taşı tanıyormuş gibiydi. Diğer sefer üyeleri bunu ya delilik ya da onları kandırıp sahte umut vermek için hazırlanmış karmaşık bir plan olarak görmüştü. Ama şimdi, yıllardır bahsettiği efsanevi vadinin içinde bulunduğu geniş bir plato yamacında, bazıları fikirlerini değiştirmeye başladı. Bir pterodaktilin çığlığı gökyüzünde yankılanıp katılımcıların kulaklarına öyle bir işledi ki, tüm şüpheler yok oldu."
 lepsius.586.f: "Aslında [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] memnun olmalıydı: [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe] tüm iddialarında haklı çıkmıştı. Ekip, evde büyük sansasyon yaratacak birçok kanıt toplamıştı bile. Ancak Kayıp Dünya’nın daha yakından incelenmesiyle birlikte, [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]'nin bu vadideki ilk kişi olmadığı gittikçe daha fazla ortaya çıktı. Aslında yaklaşık 1.500 yıl önce bu bölgede önemli bir Maya varlığı olduğu anlaşılıyor. Görünüşe göre daha önce bilinmeyen bir Maya şehrinin sakinleri düzenli aralıklarla bu vadiye gelmiş. [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName], insan kurban etme geleneğinin kökeninin burada olabileceğini öne sürüyor. Her ne olursa olsun, vadinin dini bir işleve sahip olduğuna dair güçlü kanıtlar var. Yakın zamanda bir ekip üyesi Maya eserleri gün yüzüne çıkardı, bu da onların keşfinin birkaç dağınık dev kertenkeleden çok daha büyük bir sansasyon yaratabileceğini gösteriyor. Sorun şu: şüphelenilen Maya yerleşimi, raptorların yaşadığı bir bölgenin tam ortasında! Bu nedenle sefer üyelerinin çoğu, bir intihar görevinin ardından başka bir intihar görevine kalkışmak yerine derhâl eve dönmekte ısrar ediyor."
 lepsius.587.f: "Yalnızca bir kurtulan. Seferden geriye başka hiçbir şey kalmadı. O, üniversitede genç bir araştırma asistanıydı. Travma geçirmişti ve fiziksel durumu çok kötüydü. Yucatán’dan gelen bir telgraf böyle rapor ediyor. Ondan fazla bilgi alamadık. Görünüşe göre sefer liderimiz, Kayıp Dünya’daki bir Maya alanını incelemeye çalışırken kritik, trajik bir hata yaptı. Öyle bir hata ki, seferin neredeyse tüm üyeleri hayatıyla ödedi. Olay öylesine büyük bir şok yarattı ki, Yucatán’a sıkı anlamda arkeolojik olmayan tüm seyahatler süresiz olarak yasaklandı."
 lepsius.587.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] ... kötü bir seçim yaptı."
 lepsius.588.f: "Kukulkan, Mayalar tarafından tüylü yılan olarak biliniyordu – Aztekler tarafından Quetzalcoatl adıyla tapınılan bir tanrı. Mayaların bu vadiden haberdar olması tesadüf müydü? Yoksa Kayıp Dünya ile Kukulkan kültü arasında bir bağlantı mı vardı? [SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] bunu henüz kararlaştıramaz. Ancak [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe]'nin keşfettiği şey, raptor yuvaları arasında, bu topraklarda Kukulkan adıyla bilinen tüylü yılanı temsil eden, uzun zamandır unutulmuş bir kutsal alanın bulunmasıydı. Dikkat çekici olan şey ise, bir muska içine yerleştirilmiş gizemli bir mücevherdi. Öylesine muhteşem bir güzelliğe sahipti ki, sefer lideri ona 'Kukulkan’ın Mücevheri' adını verdi – bu tanrının rüzgârı kontrol edebildiği bir mücevheri vardı. Bu, muhtemelen Orta ve Güney Amerika’nın en büyük arkeolojik buluntularından biridir."
 lepsius.588.g: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] ... doğru bir seçim yaptı."
 lepsius.589.d: "[SCOPE.sCharacter('lepsius_lostworld_leader').GetFullName] önderliğindeki Kayıp Dünya seferimiz geri döndü. [SCOPE.sCharacter('lepsius_lostworld_leader').GetSheHe|U] ve ekibi halk tarafından kahramanlar gibi kutlanıyor."
 lepsius.589.g: "Zafer [SCOPE.sCharacter('lepsius_lostworld_leader').GetHerHim]'in olsun!"
 lepsius.803.d: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] seyahat hazırlıklarını tamamladı. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe|U] bugün yola çıkarak hâlihazırda kurulmuş bir kazı alanında bilgiyi ilerletecek."
 lepsius.803.f: "Arkeoloğumuzun yokluğunun yaklaşık bir yıl sürmesi bekleniyor, ancak duruma göre değişiklik gösterebilir. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetHerHis] çalışmasının sonunda [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] yeni bir kazı alanı açacak, ancak kalitesi değişiklik gösterebilir. Ayrıca [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetSheHe] daha önce bilinmeyen arkeolojik alanlara dair referanslar da bulacak."
 lepsius.811.f_vok: "[SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName], Krallar Vadisi’nde küçük bir mezar keşfettiğini rapor ediyor. Görünüşe göre mezar soyguncuları birçok nesneyi önceden çalmış ve duvar yazıları da geç antik çağda bilindiğini gösteriyor. Sefer liderleri, daha fazla buluntu elde edebilmek umuduyla burada kazı yapılmasına karar verdi."
 lepsius.811.f_ass: "Asur’daki kazı baştan itibaren zorluklarla doluydu. Birkaç günün ardından [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] hâlâ uygun bir kazı alanı bulamamıştı, bu yüzden en uygun görünen yerde yetinmek zorunda kaldı. Şimdiye kadar sadece bir zamanlar daha büyük bir kompleksin parçası olmuş olabilecek bir tapınağın temellerini ortaya çıkardılar."
 lepsius.812.f_bab: "Zaman, Mezopotamya’daki Babil görkeminin tüm tanıklarını yok etmedi. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName] su ikmalini yeniledikten sonra, yerel halk ona dindar Müslümanların pagan kökenlerinden ötürü uzak durduğu garip bir harabeden bahsetti. Meğer bu kalıntı bir ziguratmış. Kompleks şaşırtıcı derecede iyi korunmuştu ve son raporlara göre arkeologlarımız ilk buluntuları bile gün yüzüne çıkarmış."
 lepsius.813.f_vok: "Bu sabah sansasyonel bir telgraf geldi. [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName], bir Kraliçe’nin mezarını keşfettiğini bildiriyor. Ölen eşin kimliği tam olarak belli değil, fakat ilk raporlara göre gömü odası şaşırtıcı derecede sağlam durumda. Duvar resimleri ve değerli eserler, Antik Mısır hakkında uzun zamandır bilinmeyen değerli bir bakış açısı sunuyor."
 lepsius.813.f_bab: "Babil’in kapıları ve surlarıyla ilgili efsaneler binlerce yıldır yaşamaktadır. Ama bunları karşınızda görmek bambaşkadır. İlk başta [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName], duvar duvar yürüyüp kayıp bir şehrin muazzam boyutlarını keşfederken inanmakta zorlandı. Bu keşif bizi yıllarca meşgul edecek."
 lepsius.813.f_ass: "Asurlular yalnızca büyük bir askerî güç değil, aynı zamanda bahçeleriyle de ünlüydü. Hatta bazıları ünlü Babil Bahçeleri’nin aslında Asur başkenti Ninova’da olduğunu iddia eder. Bir saray kompleksi ve bitişiğindeki terasların kazısı sırasında [SCOPE.sCharacter('lepsius_archaeological_excavation_leader').GetFullName], Asur kültürünün ihtişamını bizzat görebildi. Müze yönetimi sevince boğuldu."
 lepsius.2191.t: "İnka Hamam Kompleksi Gün Yüzüne Çıkarıldı"
 lepsius.2191.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] bölgesinde muhteşem bir buluntu ortaya çıkardı. Alan, İnka İmparatorluğu’na ait bir hamam kompleksini açığa çıkardı. İlk varsayımlar, kompleksin ritüel törenlerde kullanıldığı yönünde."
 lepsius.2191.f: "\"İronik değil mi, bir hamam kazdık ama şimdi kendimiz de bir hamama ihtiyaç duyuyoruz!\""
 lepsius.2191.g: "Şu anda bir hamam harika olurdu!"
 lepsius.2192.t: "Delikli İnka Kafatası Keşfedildi"
 lepsius.2192.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] bölgesinde garip bir buluntu ortaya çıkarıldı. Bir İnka alanındaki kazı sırasında Profesör [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] çok sayıda kemik buldu. Bir kafatası özellikle [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] dikkatini çekti. Kafatasında kasten açılmış gibi görünen bir delik vardı. Görünüşe göre ölen kişi bu müdahaleden sağ çıkmış, çünkü delik kısmen kapanmıştı."
 lepsius.2192.f: "\"Bence kesinlikle bir insan kurbanıydı! Siz ne düşünüyorsunuz?\""
 lepsius.2192.g: "Uzaylılar!"
 lepsius_recent_excavation_inspection_modifier: "Recent Archaeological Inspection"
 lepsius.2193.t: "İnka Dağ Mumyalara Rastlandı"
 lepsius.2193.d: "[SCOPE.sState('lepsius_local_archaeological_state_scope').GetName] bölgesinde [SCOPE.sCharacter('lepsius_mountaineer_character_scope').GetFullName] ile yapılan bir keşif sırasında Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] şok edici bir keşif yaptı. Bir dağda genç bir kızın kalıntılarına rastlandı, şimdi mumyalanmış durumdaydı. Görünüşe göre o, İnkalara ait bir 'qhapaq hucha', yani çocuk kurbanıydı. Üzücü bir buluntu olsa da İnka hakkında çeşitli yeni içgörüler sağlayabilir."
 lepsius.2193.f: "\"Hava buz gibiydi, rüzgâr giysilerimizi parçalıyor ve neredeyse hiçbir şey göremiyorduk. Bedeni fark ettiğimizde, önce bizim gibi koşullarda ölen bir dağcı sandık. Ama kısa süre sonra bunun bir dağcı değil, genç bir kız olduğunu anladık.\""
 lepsius.2193.g: "Bu oldukça üzücü."
 lepsius.2194.t: "İnka Harabeleri"
 lepsius.2194.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], [SCOPE.sState('lepsius_local_archaeological_state_scope').GetName]’in uzak bir bölgesinde bir keşif yaptı. İnka İmparatorluğu dönemine ait çeşitli harabeler buldu. Harabelerin çoğu yanmış durumdaydı ve bazı Avrupa’ya ait ekipmanlar bulundu, bu da yerleşimin İspanyollar tarafından yok edildiği düşüncesine yol açtı. Muhtemelen yerleşimi yağmaladılar da, çünkü başka hiçbir buluntuya rastlanmadı. Değerli olan her şey alınmış gibiydi."
 lepsius.2194.f: "\"Çok uzun zaman önce bu harabeler sağlam yapılar olmalıydı. Hatta depremlere bile dayanabilecek gibiler. Ama... görünüşe bakılırsa İspanyol istilacılar depremlerden daha güçlüymüş.\""
 lepsius.2194.g: "Altın yok mu? O zaman neye yarar ki?"
