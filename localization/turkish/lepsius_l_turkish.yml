 lepsius_archaeologist: "Arkeolog"
 lepsius_archaeologist_desc: "Bu akademisyen, geçmişi yeniden inşa etmek için antik dillere, kayıp uygarlıklara ve değerli eserlere ilgi duyar."
 lepsius_archaeologist_experienced: "Deneyimli Arkeolog"
 lepsius_archaeologist_experienced_desc: "Bu karakter birkaç önemli arkeolojik keşif yapmış ve yüksek bir itibara sahiptir."
 lepsius_archaeologist_famous: "Ünlü Arkeolog"
 lepsius_archaeologist_famous_desc: "Maceralı seferleriyle dünya çapında tanınan bu arkeolog, uluslararası bir üne sahiptir."
 je_lepsius_letter_to_rosellini: "Lepsius’un Rosellini’ye Mektubu"
 je_lepsius_letter_to_rosellini_reason: "Genç ve hırslı bir filolog olan Karl Richard Lepsius bir atılımın eşiğinde. Yöntemini Champollion’un hiyeroglifleri çözümleme temellerini geliştirmek için kullanacak – ve böylece arkeolojik araştırmayı devrimleştirecek."
 je_lepsius_stephens_catherwood_expedition: "Stephens & Catherwood Expedition"
 je_lepsius_stephens_catherwood_expedition_reason: "Orta Amerika Büyükelçisi John Lloyd Stephens, Yucatán Yarımadası’nı ziyaret etmekle ilgilendiğini ifade etti. Sanatçı Frederik Catherwood, onunla birlikte ormandaki gizemli harabelere bir sefere katılmak istiyor. Doğru çerçeveyi oluşturabilirsek bu girişim ulusal prestij meselesi haline gelebilir."
 je_lepsius_decipherment_akkadian: "Akad Dili’nin Çözülmesi"
 je_lepsius_decipherment_akkadian_reason: "Yalnızca hiyerogliflerin çözülmesi uzmanları onlarca yıl boyunca merakta tutmadı. Antik Pers dili ve çivi yazısı artık alimlerimiz için bir sır değil. Austen Henry Layard’ın Nimrud seferi büyük yankı uyandırdı ve kamuoyunun ilgisini çekti. Behistun’da devasa, çok dilli bir yazıtın keşfinin ardından sıradaki proje belli: Antik Mezopotamya’nın en eski dillerini çözmek. Bu, tamamen yeni arkeolojik yollar açabilir."
 je_lepsius_support_schliemann: "Heinrich Schliemann ve Truva Rüyası"
 je_lepsius_support_schliemann_reason: "Heinrich Schliemann, dünyayı dolaşmış ve hatırı sayılır bir servet edinmiş Alman bir işadamı ve otodidakt. Ancak gençliğinden beri gerçek tutkusu Homeros destanları oldu. Schliemann, antik Truva’nın bir masal olmadığına inanıyor. Hâlâ destekçiler arıyor."
 je_lepsius_machu_picchu: "İnkaların Mirası"
 je_lepsius_machu_picchu_reason: "En yeni teknoloji ve en gelişmiş araştırma yöntemleriyle, 20. yüzyılın başında insanların erişemediği yerler artık sır değil. Özellikle uçağın icadı, daha önce ulaşılması zor bölgelerin haritalanmasına büyük ölçüde yardımcı oldu. Belki de uzun zaman önce kaybolmuş uygarlıkların son gizemleri nihayet aydınlatılabilir."
 je_lepsius_epic_of_gilgamesh: "Gılgamış Destanı"
 je_lepsius_epic_of_gilgamesh_reason: "Gılgamış Destanı esas olarak Babil bölgesinden gelen bir grup edebi eserin içeriğidir ve günümüze ulaşan en eski yazılı mühürlerden birini barındırır. Gılgamış Destanı, farklı versiyonlarıyla Akad ve Sümer edebiyatının en bilinen eseridir. Destan, Uruk Kralı Gılgamış’ın hikâyesini, kahramanlıklarını ve maceralarını, Enkidu ile dostluğunu, ölümünü ve ölümsüzlük arayışını anlatır. #T Temel bir versiyonu yeniden inşa etmek için destanın beş parçası gerekir.#!"
 je_lepsius_epic_of_gilgamesh_success: "En az #G 5#! @lepsius_gilgamesh_fragment! Gılgamış Destanı parçası bul ve bununla temel bir yeniden yapı oluştur."
