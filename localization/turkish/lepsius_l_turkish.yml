 lepsius.5000.t: "Palmira Harabeleri"
 lepsius.5000.d: "Ülkemiz, antik Palmira şehrinin harabelerine ev sahipliği yapıyor. Arkeologlarımız alanı kazmaya ve ondan olabildiğince çok şey öğrenmeye hevesli."
 lepsius.5000.f: "Palmira, yüzyıllar boyunca varlığını sürdüren antik bir Suriye şehridir. Şehir, tüccarlarıyla tanınırdı. Zengin tüccarlar, zamana direnen pek çok anıt inşa etti. Bunun sonucu olarak, birçok antik yapı değişikliklere uğradı; bu da arkeologlar için zor bir durum.\nŞehir yalnızca tüccarlarıyla değil, kısa ömürlü Palmira İmparatorluğu’nun kraliçesi Zenobia ile de ünlüdür. Zenobia, bir süre Roma İmparatorluğu’nun doğusunu ele geçirdi ancak İmparator Aurelian doğuyu yeniden fethedip Palmira’yı yıktı."
 lepsius.5000.g: "Acaba neler bulacağız!"
 lepsius.5001.t: "Bel Tapınağı Restore Edildi"
 lepsius.5001.d: "Arkeologlarımız Bel Tapınağı’nı restore etmek için yorulmadan çalıştı. Şehrin Müslüman döneminden kalan eklemeler ve değişiklikler kaldırıldı, gömülü kısımlar ise gün yüzüne çıkarıldı."
 lepsius.5001.f: "Tapınağın inşa edildiği tepe (tell), stratigrafik analizlerimizin ortaya koyduğu üzere, MÖ 3000’lere kadar insanlar tarafından kullanılıyordu. Mümkün olduğunca yeniden inşa ettiğimiz tapınak ise MS 1. yüzyıl sonları ile 2. yüzyılın ilk yarısına tarihlenen bir Roma tapınağıdır.\nDaha sonra tapınak bir Hristiyan kilisesine dönüştürüldü, Arapların bölgeyi fethetmesiyle de cami oldu.\n\n#V Günümüzde:#! Ne yazık ki Bel Tapınağı 2015’te IŞİD tarafından yıkıldı. Ancak hâlâ mevcut parçalarla yeniden inşa edilmesine dair planlar var."
 lepsius.5001.g: "Acaba neler bulacağız!"
 lepsius.5002.t: "Mezarlar Vadisi Kazıldı"
 lepsius.5002.d: "Palmira’nın batısında birçok mezar var. Bunlar, arkeologlarımızın kazıp kısmen restore ettiği etkileyici kule mezarlara ev sahipliği yapıyor."
 lepsius.5002.f: "Mezarlar Vadisi adı verilen nekropol birçok kule mezara ev sahipliği yapar. En eskisi MÖ 9 yılına tarihlenir ve Atenaten Kulesi olarak bilinir. Bir diğer kule, Elahbel Kulesi, İmparator Trajan döneminde Palmira aristokratı Marcus Ulpius Elahbelus tarafından inşa edilmiştir. Elahbelus, Trajan döneminde Roma vatandaşı olmuş gibi görünüyor; çünkü aynı ilk ve ikinci ismi paylaşıyorlar.\nBir diğer ilginç bulgu da muhtemelen Çin’den getirilmiş ipek parçalarıdır.\n\n#V Günümüzde:#! Palmira IŞİD’in kontrolündeyken pek çok mezar yıkıldı. Bunların arasında Elahbel Kulesi ve Iamblichus Kulesi de vardı."
 lepsius.5002.g: "Etkileyici!"
 lepsius.5003.t: "Palmira - Hurma Ağaçları Şehri"
 lepsius.5003.d: "Arkeologlarımız yıllarını Palmira kalıntılarını gün yüzüne çıkarmaya ve mümkün olanları yeniden inşa etmeye harcadı. Şimdi bir zamanların zengin şehri yeniden ziyaret edilmeye değer bir yer haline geldi."
 lepsius.5003.f: "Palmira harabeleri yeniden ziyaretçi çekiyor. Birçok insan, Roma’ya bile meydan okumuş ama sonunda kaybetmiş bir zamanların görkemli şehrinin kalıntılarını görmek istiyor. Görkemli Kule Mezarlar, Büyük Sütunlu Cadde, Bel Tapınağı ve Baalshamin Tapınağı, şehrin bir zamanlar sahip olduğu büyük zenginliği gözler önüne seriyor. Hurma Ağaçları Şehri en ihtişamlı zamanında ne olağanüstü bir manzara olmalıydı!"
 lepsius.5003.g: "Ziyaret etmek için harika bir yer!"
