l_turkish:
 lepsius_upper_egypt_modifier: "Krallar Vadisi"
 lepsius_upper_egypt_modifier_desc: "Krallar Vadisi dünyanın en büyüleyici arkeolojik alanlarından biridir. Binlerce yıllık mezarlarda keşfedilmeyi bekleyen hazinelerin olduğu söylenir."
 lepsius_lower_egypt_modifier: "Piramitler"
 lepsius_lower_egypt_modifier_desc: "Alt Mısır, antik başkent Memphis ile birlikte, keşfedilmemiş piramitlerin ve bilinmeyen şehirlerin diyarıdır. Bugün bile Mısır kumlarında kayıp eserlerin yattığı söylenir."
 lepsius_babylonia_modifier: "Uygarlığın Beşiği"
 lepsius_babylonia_modifier_desc: "Mezopotamya, yazının ve tarımın icat edildiği, ilk krallıkların kurulduğu yer kabul edilir. Çivi yazılı tabletler, dev taş heykeller ve tapınak harabeleri, bir zamanlar görkemli bir yüksek kültürün hâlâ kanıtlarıdır."
 lepsius_assyria_modifier: "The Ruins of Nineveh and Nimrud"
 lepsius_assyria_modifier_desc: "Asur yalnızca savaşçı imparatorlukların çıktığı yer değil, aynı zamanda eski doğu tarihi ile İncil anlatılarının kesiştiği noktadır. Eski bahçelerin ve görkemli surların kalıntıları hâlâ büyülemektedir."
 lepsius_argolis_modifier: "Miken Akropolileri"
 lepsius_argolis_modifier_desc: "Miken kültürü, Yunan ana karasındaki ilk gelişmiş uygarlık kabul edilir. Yunan mitolojisinin kralları uzun süre yalnızca masal sayılmıştır – ancak arkeolojik kazılar bu masalların bir gerçek payı olduğunu kanıtlayabilir."
 lepsius_crete_modifier: "Minos Uygarlığı"
 lepsius_crete_modifier_desc: "Girit, Avrupa’nın en eski şehirlerine ve gizemleri hâlâ çözülememiş saray komplekslerine ev sahipliği yapar. Minos kültürü, bir zamanlar tüm Ege’ye hükmettiği söylenen efsanevi Kral Minos’un adını taşır."
 lepsius_yucatan_modifier: "Yucatán’ın Gizemleri"
 lepsius_yucatan_modifier_desc: "Yucatán ormanlarının derinliklerinde, bir zamanlar gelişen Maya kültürünün batık şehirlerinin hâlâ yattığı söylenir. Yerel halkın raporları arkeolojik bir sansasyona işaret ediyor – eğer birileri bu geçilmez ormanı aşabilirse."
 lepsius_peru_modifier: "And Dağlarının Sırları"
 lepsius_peru_modifier_desc: "İnka İmparatorluğu bir zamanlar Güney Amerika kıtasının en güçlü devleti olmuş, ancak İspanyol fethiyle son bulmuştur. Yine de hâlâ bilinmeyen mezarların ve tapınakların bulunduğu söylenir. Hatta bazıları, Andlar’da saklı bilinmeyen bir şehirden bahseder."
