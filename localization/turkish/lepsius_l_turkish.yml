 lepsius.321.t: "Kataloglama Tamamlandı"
 lepsius.321.d: "Aylarca süren titiz düzenleme, tanımlama, numaralandırma ve keşif kalıntılarının değerlendirilmesinin ardından Doktor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] artık serbest."
