 lepsius_specialization_egypt_button: "Mısırbilim"
 lepsius_specialization_egypt_button_desc: "Mısırbilim, Antik Mısır uygarlığının tüm alanlarını inceler (gündelik yaşam, dil ve edebiyat, tarih, din, kültür ve sanat, ekonomi, hukuk, etik ve entelektüel yaşam). Bu alan, MÖ 5. binyılın (örneğin Negade ve Badari kültürleri) tarih öncesinden başlayarak MS 4. yüzyılda Roma egemenliğinin sonuna kadar uzanır."
 lepsius_specialization_mesopotamia_button: "Asuroloji"
 lepsius_specialization_mesopotamia_button_desc: "Asuroloji, diğer adıyla Çivi Yazısı Çalışmaları veya Antik Yakın Doğu Çalışmaları, çivi yazısı kullanan kültürlerin arkeolojik, antropolojik, tarihsel ve dilbilimsel incelenmesidir. Alan; Ön Hanedanlık Mezopotamya, Sümer, erken Sümero-Akad şehir devletleri, Akad İmparatorluğu, Ebla, Akadca ve İmparatorluk Aramicesi konuşan Asur, Babil ve Deniz Ülkesi Hanedanı, ayrıca Güney Mezopotamya’nın göçmen yabancı hanedanlıkları olan Gutiler, Amurrular, Kassitler, Aramiler, Suteanlar ve Kaldelileri kapsar."
 lepsius_specialization_aegean_button: "Ege Arkeolojisi"
 lepsius_specialization_aegean_button_desc: "Ege uygarlığı terimi, Ege Denizi çevresindeki Yunanistan’ın Tunç Çağı uygarlıklarının genel adıdır. Bu terim üç farklı ama birbirine bağlı ve etkileşimli coğrafi bölgeyi kapsar: Girit, Kikladlar ve Yunan anakarası. Girit, Erken Tunç Çağı’ndan itibaren Minos uygarlığıyla ilişkilendirilir. Kiklad uygarlığı, Erken Helladik dönemde anakara ile, Orta Minos döneminde ise Girit ile kesişir. Yaklaşık MÖ 1450’den itibaren (Geç Helladik, Geç Minos), Yunan Miken uygarlığı muhtemelen askerî fetihle Girit’e yayılmıştır."
 lepsius_specialization_precolumbian_button: "Pre-Kolomb Arkeolojisi"
 lepsius_specialization_precolumbian_button_desc: "Amerika kıtalarının tarihinde Pre-Kolomb dönemi, Üst Paleolitik çağda insanların kıtaya yerleşmesinden başlayarak 1492’de Kristof Kolomb’un yolculuğuyla başlayan Avrupalıların kolonizasyonuna kadar uzanır. Genellikle bu dönem, Avrupalıların önemli etkisine kadar yerli kültürlerin tarihini kapsar. Bu bazı kültürlerde Kolomb’dan onlarca hatta yüzlerce yıl sonra gerçekleşmiştir."
 lepsius_alexander_search_clue_button: "Daha Fazla İpucu Bul"
 lepsius_alexander_search_clue_button_desc: "Büyük İskender’in mezarına dair başka bir ipucu bulmak için özel bir arkeolojik sefer düzenleyebiliriz."
 lepsius_ark_search_clue_button: "Daha Fazla İpucu Bul"
 lepsius_ark_search_clue_button_desc: "Ahit Sandığı’na dair başka bir ipucu bulmak için özel bir arkeolojik sefer düzenleyebiliriz."
 lepsius_atlantis_search_clue_button: "Daha Fazla İpucu Bul"
 lepsius_atlantis_search_clue_button_desc: "Atlantis’e dair başka bir ipucu bulmak için özel bir arkeolojik sefer düzenleyebiliriz."
 lepsius_eldorado_search_clue_button: "Daha Fazla İpucu Bul"
 lepsius_eldorado_search_clue_button_desc: "El Dorado’ya dair başka bir ipucu bulmak için özel bir arkeolojik sefer düzenleyebiliriz."
 lepsius_legendary_expedition_modifier: "Efsanevi Arkeolojik Sefer"
 lepsius_alexander_intensive_study_button: "Siwa"
 lepsius_alexander_intensive_study_button_desc: "Siwa Vahası, İskender’in hayatındaki en önemli yerlerden biri sayılır. Bazıları, Mısır tanrısı Amon ile güçlü bağı nedeniyle burada gömüldüğünü, İskenderiye’de değil, iddia eder. Mısırbilim alanındaki üstün bilgimiz sayesinde burada kolayca ek bir ipucu bulabiliriz. Arkeoloğumuz, bir sefer gürültüsüne gerek kalmadan gizlice ve özel olarak yolculuk yapacaktır."
 lepsius_ark_intensive_study_button: "Kudüs"
 lepsius_ark_intensive_study_button_desc: "Kudüs Tapınak Dağı, Ahit Sandığı’nın kaybolmadan önce muhafaza edildiği son yer olarak kabul edilir. Babil fethinin kaosu sırasında gerçekte ne olduğuna dair hâlâ önemli ipuçlarının Tapınak Dağı’nın altında olması muhtemeldir. Asuroloji alanındaki üstün bilgimiz sayesinde burada kolayca ek bir ipucu bulabiliriz. Arkeoloğumuz, bir sefer gürültüsüne gerek kalmadan gizlice ve özel olarak yolculuk yapacaktır."
 lepsius_atlantis_intensive_study_button: "Santorini"
 lepsius_atlantis_intensive_study_button_desc: "Santorini (Thera), adadaki bir Minos kentini ve muhtemelen tüm Minos uygarlığını ciddi şekilde etkileyen devasa volkanik patlamasıyla ünlüdür. Volkanın patlamasının, Platon’un Atlantis’in batışına dair hikâyesinin kaynağı olduğu tezi, Atlantis’e dair birçok yerelleştirme hipotezinden biridir. Ege Arkeolojisi alanındaki üstün bilgimiz sayesinde burada kolayca ek bir ipucu bulabiliriz. Arkeoloğumuz, bir sefer gürültüsüne gerek kalmadan gizlice ve özel olarak yolculuk yapacaktır."
 lepsius_eldorado_intensive_study_button: "Bogotá"
 lepsius_eldorado_intensive_study_button_desc: "Bogotá, El Dorado efsanesiyle ilişkilendirilen Muisca uygarlığının eski başkenti kabul edilir. Muisca’nın her yeni hükümdarı göreve başladığında güneş tanrısına kurban sunar, çıplak bedeni altın tozundan yapılmış bir macunla kaplanırdı. Pre-Kolomb Arkeolojisi alanındaki üstün bilgimiz sayesinde burada kolayca ek bir ipucu bulabiliriz. Arkeoloğumuz, bir sefer gürültüsüne gerek kalmadan gizlice ve özel olarak yolculuk yapacaktır."
 lepsius_2_sub_archaeological_team_tt: "#R 2#! Kazı Ekibini kaybet."
 lepsius_egypt_specialist: "Uzmanlık: Mısırbilim"
 lepsius_egypt_specialist_desc: "Bu arkeolog Antik Mısır konusunda uzmandır ve bu nedenle eserleri ve ipuçlarını daha kolay bulur."
 lepsius_mesopotamia_specialist: "Uzmanlık: Asuroloji"
 lepsius_mesopotamia_specialist_desc: "Bu arkeolog Antik Mezopotamya konusunda uzmandır ve bu nedenle eserleri ve ipuçlarını daha kolay bulur."
 lepsius_aegean_specialist: "Uzmanlık: Ege Arkeolojisi"
 lepsius_aegean_specialist_desc: "Bu arkeolog Miken ve Minos uygarlıkları konusunda uzmandır ve bu nedenle eserleri ve ipuçlarını daha kolay bulur."
 lepsius_precolumbian_specialist: "Uzmanlık: Pre-Kolomb Arkeolojisi"
 lepsius_precolumbian_specialist_desc: "Bu arkeolog Pre-Kolomb uygarlıkları konusunda uzmandır ve bu nedenle eserleri ve ipuçlarını daha kolay bulur."
