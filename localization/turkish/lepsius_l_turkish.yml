 lepsius.1502_peking_d: "\nJava Adamı ile birlikte, Pekin Adamı’nın da ilk Homo Erectus olduğu ve insanlığın kökeninin Asya’dan geldiği inancını pekiştirdiği düşünülmektedir. Kemiklerin 400.000 ila 780.000 yaşında olduğu söylenmektedir."
 lepsius_state_trait_heidelbergensis_cave: "Tarihöncesi Mağara"
 lepsius.1326.t: "Homo Heidelbergensis tamamlandı"
 lepsius.1326.d: "[SCOPE.sCharacter('andersson_anthropologist_scope').GetFullName] has collected enough bones to draw specific conclusions about the extinct species. Homo Heidelbergensis is no longer a mystery to science and can now be located with a certain degree of certainty in the human family tree, even if there are still many questions unanswered."
 lepsius.1326.f: "Homo heidelbergensis’in alt çenesi 1907’de Mauer yakınlarında bir kum ocağında işçi Daniel Hartmann tarafından keşfedildi ve 1908’de anatomist Otto Schoetensack tarafından tanımlandı; yaklaşık 600.000 yıllık bu buluntu, Avrupa’daki en eski erken insan kanıtı kabul edilir. Morfolojik olarak Homo erectus ile Homo sapiens arasında yer alır, Afrika, Avrupa ve Asya’da geniş bir dağılım gösterir ve sağlam yapısı ile tahmini beyin hacmi sayesinde ileri düzey fiziksel uyum, alet kullanımı ve sosyal organizasyon hakkında çıkarımlara olanak tanır."
 lepsius.1336.t: "Heidelberg Adamı"
 lepsius.1336.d: "Heidelberg yakınlarındaki Mauer kasabasında bir işçi, bir madende olağanüstü bir keşif yaptı. Heidelberg Üniversitesi’nden bir profesör ise hemen değerini anladı."
 lepsius.1336.f: "Homo heidelbergensis’in alt çenesi 1907’de Mauer yakınlarında bir kum ocağında işçi Daniel Hartmann tarafından keşfedildi ve 1908’de anatomist Otto Schoetensack tarafından tanımlandı; yaklaşık 600.000 yıllık bu buluntu, Avrupa’daki en eski erken insan kanıtı kabul edilir. Morfolojik olarak Homo erectus ile Homo sapiens arasında yer alır, Afrika, Avrupa ve Asya’da geniş bir dağılım gösterir ve sağlam yapısı ile tahmini beyin hacmi sayesinde ileri düzey fiziksel uyum, alet kullanımı ve sosyal organizasyon hakkında çıkarımlara olanak tanır."
 lepsius.1501_heidelbergensis_human_fossils: "\n#G [ROOT.Var('lepsius_heidelbergensis_human_fossil').GetValue]#! #E Homo Heidelbergensis Fosili#!."
 lepsius.1501_taxonomy_heidelbergensis: "\n#E Homo Heidelbergensis#!, [SCOPE.sCountry('lepsius_heidelbergensis_systemizer_country').GetName] tarafından sınıflandırıldı."
 lepsius.1502_mauer_t: "#T Homo Heidelbergensis#! discovered by [SCOPE.sCountry('lepsius_heidelbergensis_finder_country').GetName]"
 lepsius.1502_mauer_d: "\nHomo heidelbergensis’in alt çenesi Heidelberg yakınlarında bulundu ve Avrupa’daki en eski erken insan kanıtı olarak kabul ediliyor. Homo erectus ile daha sonraki homininler arasında önemli bir geçişi işaret ediyor."
