 je_ishtar_gate: "İştar Kapısı’nın Yeniden İnşası"
 je_ishtar_gate_reason: "Babilonya’ya yapılan bir seferde efsanevi İştar Kapısı’nın kalıntıları bulundu, ardından kazı lisansımızı genişlettik ve Babil tuğlalarının müzemize gönderilmesini sağladık."
 je_ishtar_gate_success: "Kapının eski ihtişamına kavuşması için toplamda 200.000 tuğla gereklidir. Yıllık yaklaşık 20.000 tuğlanın bize ulaşması bekleniyor – herhangi bir sorun çıkmazsa."
 je_ishtar_gate_goal: ""
 je_lepsius_priams_treasure: "Priamos’un Hazinesi"
 je_lepsius_priams_treasure_reason: "Heinrich Schliemann, Truva’da bulduğunu iddia ettiği efsanevi Priamos’un hazinesi için uygun bir yer arıyor. Ciddi akademisyenler bu bulguların gerçekten Schliemann’ın öne sürdüğü döneme uyduğundan şüphe etse de bu ikincil bir meseledir. Ne de olsa bu, yüzyılın en büyük arkeolojik hazinelerinden birine sahip olmak için eşsiz bir fırsattır. Müzemiz bunun için mükemmel bir yer olurdu."
 je_lepsius_priams_treasure_fail: "Eğer bir rakip Schliemann’ın isteklerini bizden önce yerine getirirse, Priamos’un hazinesini elde etme şansımızı kaybederiz."
 je_lepsius_the_labyrinth: "Labirent"
 je_lepsius_the_labyrinth_reason: "Trapped in a strange, ancient labyrinth, Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastNameNoFormatting] must find [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] way back out. If [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] makes too many mistakes, [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] risks getting lost down there forever!"
 je_lepsius_discovery_tut: "Krallar Vadisi’nde Araştırma"
 je_lepsius_discovery_tut_reason: "Krallar Vadisi’nin büyük tarihî değere sahip gizli bir alan barındırabileceğine dair güçlü nedenlerimiz var. Arayışımız yıllar sürebilir. Bu keşfi gerçekleştiren kişi, tarihte bir yer edinmelidir."
 je_lepsius_disovery_tut_success: "Eğer Yukarı Mısır’da on ipucu bulmayı başarırsak, büyük tarihî öneme sahip kayıp bir yeri yeniden keşfetmek için yeterli malzeme toplamış olacağız."
 je_lepsius_disovery_tut_fail: "Eğer başka bir ulus bizden önce Yukarı Mısır’da on ipucu bulursa, çabalarımız boşa gidecek."
 je_lepsius_discovery_ship: "Piramitlerin Yanında Araştırmalar"
 je_lepsius_discovery_ship_reason: "Piramitlerin büyük tarihî değere sahip bir şeyi gizliyor olabileceğine dair her türlü sebebimiz var. Arayışımız yıllar sürebilir. Bu keşfi yapan kişi tarihte bir yer edinmelidir."
 je_lepsius_disovery_ship_success: "Eğer Aşağı Mısır’da on ipucu bulmayı başarırsak, büyük tarihî öneme sahip kayıp bir yeri yeniden keşfetmek için yeterli malzeme toplamış olacağız."
 je_lepsius_disovery_ship_fail: "Eğer başka bir ulus bizden önce Aşağı Mısır’da on ipucu bulursa, çabalarımız boşa gidecek."
 je_lepsius_discovery_babylon: "Babil’de Araştırmalar"
 je_lepsius_discovery_babylon_reason: "Babil bölgesinde hâlâ keşfetmediğimiz daha büyük bir şey olduğuna dair her türlü sebebimiz var. Arayışımız yıllar sürebilir. Bu keşfi yapan kişi tarihte bir yer edinmelidir."
 je_lepsius_disovery_babylon_success: "Eğer Babilonya’da on ipucu bulmayı başarırsak, büyük tarihî öneme sahip kayıp bir yeri yeniden keşfetmek için yeterli malzeme toplamış olacağız."
 je_lepsius_disovery_babylon_fail: "Eğer başka bir ulus bizden önce Babilonya’da on ipucu bulursa, çabalarımız boşa gidecek."
 je_lepsius_discovery_semiramis: "Asur’da Araştırmalar"
