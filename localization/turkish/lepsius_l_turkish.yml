 andersson_anthropologist_desc: "Anthropologists are useful in studying the earliest human history, from evolution in Africa to Stone Age man."
 andersson_anthropologist_experienced_desc: "This anthropologist has accomplished some achievements in the field of earliest human history and is considered an academic reference."
 andersson_anthropologist_famous_desc: "This researcher's numerous contributions to anthropology have made him one of the most important international figures in his field."
 andersson_state_trait_neanderthalensis_cave: "Prehistoric Cave"
 andersson_state_trait_erectus_cave: "Prehistoric Cave"
 andersson_state_trait_paranthropus_cave: "Prehistoric Cave"
 andersson_anthropology_tech: "Anthropology"
 andersson_anthropology_tech_desc: "Paleoanthropology or simply anthropology is a branch of paleontology and anthropology which seeks to understand the early development of anatomically modern humans, a process known as hominization, through the reconstruction of evolutionary kinship lines within the family Hominidae, working from biological evidence (such as petrified skeletal remains, bone fragments, footprints) and cultural evidence (such as stone tools, artifacts, and settlement localities)."
 lepsius.2105.t: "The Hildesheim Treasure"
 lepsius.2105.d: "Archaeologists have unearthed a significant hoard of silver in Hildesheim. Surprisingly, it consists of numerous valuable Roman artifacts!"
 lepsius.2105.f: "The Hildesheim Treasure, discovered on October 17, 1868, by Prussian soldiers near Galgenberg, remains one of the most significant finds of Roman silversmithing outside the imperial frontiers. Consisting of approximately 70 exquisite silver vessels, including the iconic Minerva Bowl, the collection dates primarily to the 1st century AD. The collection is masterpiece of Augustan-era craftsmanship, but it sparked intense nationalistic and academic debate when found. Early interpretations frequently linked the treasure to the Battle of the Teutoburg Forest (9 AD), speculating it was the lost baggage of the Roman general Varus. Later scholars viewed it as a diplomatic gift or a high-ranking officer's traveling service."
 lepsius.2105.g: "Roman silver in the heart of Germania?"
 lepsius.2115.t: "The Oxus Treasure"
 lepsius.2115.d: "On the banks of the Oxus, archaeologists have made a spectacular gold find that reflects the splendor of the ancient Persian Empire."
 lepsius.2115.f: "The Oxus Treasure is the most significant collection of Achaemenid Persian goldsmithing ever discovered. Found near the Oxus River (modern-day Tajikistan) around 1877, the hoard comprises approximately 180 gold and silver objects and over 200 coins. The collection showcases an extraordinary blend of Persian, Scythian, and Greek artistic influences. Key artifacts include a famous miniature gold chariot, intricate armlets featuring winged griffins, and numerous votive plaques depicting priests and warriors. The treasure was famously rescued from bandits by a British officer before reaching the British Museum. Historically, it serves as a primary source for understanding the wealth and artistic refinement of the Achaemenid Empire, reflecting the vast trade networks and cultural synthesis of the ancient Persian world. Its discovery provided scholars with the first major tangible evidence of the empire's legendary opulence."
 lepsius.2115.g: "These wonderful pieces deserve their own room in the museum!"
 lepsius.2135.t: "The Statue of Xōchipilli"
 lepsius.2135.d: "Locals have found an ancient statue among volcanic rock. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] is absolutely thrilled: It might be the best-preserved statue from the Aztec Empire!"
 lepsius.2135.f: "The seated male figure carved from volcanic andesite, discovered in the 1880s on the slopes of the Popocatépetl volcano, quickly became the subject of speculation about Aztec civilization. The statue depicts a man in a ritual, cross-legged squatting position on a richly decorated pedestal. The figure's entire body, as well as the throne, is covered with finely carved reliefs of stylized flowers and butterflies, bearing a striking resemblance to the hallucinogenic plants of the Mexican highlands. The slightly backward-tilted head, with its wide-open eyes and slightly parted mouth, conveys the impression of an ecstatic trance or divine dialogue. The mask-like features and floral iconography—including depictions of morning glory and tobacco—led researchers to identify him as the 'Prince of Flowers,' the deity Xōchipilli, who presided over the dance, song, and sacred dreams of the Aztecs."
 lepsius.2135.g: "This statue is eerie, disturbing, fascinating, and wonderful."
 lepsius.2145.t: "The Ksour Essef cuirass"
 lepsius.2145.d: "Archaeologists have made an astonishing discovery during excavations near ancient Carthage."
 lepsius.2145.f: "The Ksour Essef Cuirass is a piece of ancient armor discovered in 1909 in a Punic tomb near Ksour Essef, Tunisia. This bronze breastplate, characterized by its distinctive anatomical modeling and ornate engravings, is a masterpiece of South Italian or Campanian craftsmanship from the 3rd century BC. The cuirass features depictions of the Punic goddess Tanit, griffins, and floral motifs, symbolizing protection and status. Historically associated with the Second Punic War, many scholars believe it belonged to a high-ranking officer in Hannibal's army, possibly acquired during the Italian campaigns."
 lepsius.2145.g: "An ancient Italian suit of armor in the Punic region!"
 lepsius.2155.t: "The Gundestrup Cauldron"
 lepsius.2155.d: "In Himmerland, Jutland, archaeologists have surprisingly recovered a magnificent Celtic artifact."
 lepsius.2155.f: "The Gundestrup Cauldron, unearthed in a peat bog in Denmark in 1891, is the largest known example of Iron Age silverwork. The vessel is composed of several silver plates, originally gilded, featuring high-relief depictions of complex mythological narratives. Its discovery stunned the archaeological world, as it was found far north of the Celtic heartlands. The cauldron was likely manufactured in the lower Danube region (modern-day Romania or Bulgaria) by Thracian silversmiths for a Celtic clientele. During the late 19th and early 20th centuries, it became a focal point for understanding ancient European religious practices and the vast, interconnected trade networks that spanned from the Balkans to the North Sea."
 lepsius.2155.g: "Is it still possible to cook soup in it?"
 lepsius.2185.t: "The Antikythera Mechanism"
 lepsius.2185.d: "sponge divers have discovered a shipwreck off the coast of Antikythera. The Roman-era vessel contains not only archaeologically significant artifacts, but also a device that turns our understanding of Hellenistic antiquity on its head."
 lepsius.2185.f: "The Antikythera Mechanism is widely regarded by historians and scientists as the earliest known example of an analog computer. Dating back to the 2nd or early 1st century BCE, its complexity was not matched in the Western world for another 1,500 years. The mechanism originally consisted of at least 30 bronze gears housed in a wooden case roughly the size of a mantel clock. It was operated by a hand-crank and featured multiple dials with Greek inscriptions. The origin of the mechanism remains a subject of intense scholarly debate. While its precise creator is unknown, several theories persist - some even suggest a connection to Archimedes of Syracuse."
 lepsius.2185.g: "A compass? An astronomical instrument? A time machine?"
 lepsius.2205.t: "The Flying Horse of Gansu"
 lepsius.2205.d: "Our researchers have discovered perhaps the most outstanding figure of the Han era in the northern border region of the former empire."
 lepsius.2205.f: "The Flying Horse of Gansu, also known as the Galloping Horse Treading on a Flying Swallow, is an iconic bronze sculpture from the Eastern Han Dynasty (25-220 AD). Discovered in 1969 in a general's tomb at Leitai, it represents the pinnacle of ancient Chinese bronze casting. The artifact depicts a powerful 'heavenly horse'—the legendary Ferghana breed—captured in full gallop. In a masterclass of balance and kinetic energy, the horse is supported by a single hoof resting upon a flying swallow, suggesting a speed that surpasses even the swiftest bird. During its initial study, the piece was hailed as a symbol of the Silk Road, representing the military power and cultural exchange that defined China's expansion."
 lepsius.2205.g: "It is faster and more elegant than any bird!"
 lepsius.2215.t: "The Silla Gold Crowns"
 lepsius.2215.d: "In Gyeongju, the ancient capital of the Kingdom of Silla, archaeologists have found and opened the royal tombs. The discoveries they made there are a scientific sensation!"
 lepsius.2215.f: "The Silla Gold Crowns are among the most spectacular treasures of ancient Korean history, primarily discovered in the royal tombs of Gyeongju. While rumors of golden relics had persisted for centuries, the first scientific breakthrough occurred in 1921 with the accidental discovery of the Geumgwanchong (Gold Crown Tomb) during a construction project. Crafted from high-purity gold and adorned with magatama (comma-shaped jade beads), the crowns feature upright, tree-like structures and antler motifs. During the early 20th century, archaeologists and historians interpreted these designs as symbols of shamanic kingship, suggesting a cultural link to the steppe peoples of Siberia and Central Asia."
 lepsius.2215.g: "These crowns deserve places of honor in the next exhibition."
 lepsius.2225.t: "The Haniwa Warrior"
 lepsius.2225.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] was able to present an exquisite artifact today. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe|U] himself calls it the 'archaeological crowning achievement' of [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] career. The piece is already considered a prime example of art from the Yamato period."
 lepsius.2225.f: "The Haniwa Warrior refers to the iconic clay sculptures of the Japanese Kofun era. These figures were placed atop large burial mounds to protect the deceased and define the sacred space of the tomb. The most celebrated discovery occurred in 1924 in Oizumi, Gunma Prefecture. This remarkably intact figure, the Warrior in Keiko Armor, provides a rare, three-dimensional look at 6th-century military equipment, including lamellar armor and a traditional longbow. The artifact, now considered a national treasure, provided historians with insight into the developing military of the Yamato state. Romantic minds might see the soldier as a kind of 'great-grandfather' of the samurai class."
 lepsius.2225.g: "Japan's past is no longer buried in darkness!"
 lepsius.2235.t: "The Priest-King"
 lepsius.2235.d: "The archaeological team has made the most important find to date in their investigation of the Indus Valley Civilization: a small figurine of an unknown man in a meditative pose. It is already considered one of the most significant Bronze Age artifacts."
 lepsius.2235.f: "The discovery of a small, seated male figure carved from steatite during the 1925-26 excavations at Mohenjo-Daro quickly became a focal point for scholarly speculation regarding the political and religious structure of the Harappan civilization. This fragmentary statue, though only 17.5 centimeters tall, exhibited a remarkable level of sculptural detail, depicting a bearded man with a meticulously groomed mustache and eyes half-closed in a contemplative or meditative gaze. He was shown wearing a patterned cloak draped over one shoulder, adorned with trefoil motifs that bore a striking resemblance to religious symbols found in contemporary Mesopotamia and Egypt. The presence of a circular headband and an armband suggested a personage of significant social or ritual standing, leading the archaeologists of the time to dub him the 'Priest-King.'"
 lepsius.2235.g: "The face of a lost empire."
 lepsius.2245.t: "The Reclining Vishnu"
 lepsius.2245.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] announces that [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has found the most magnificent bronze statue of Buddha that all of Southeast Asia has to offer. The fact that it is actually a depiction of Vishnu doesn't register with [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHim] in [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] enthusiasm."
 lepsius.2245.f: "The Reclining Vishnu of West Mebon is a monumental 11th-century bronze sculpture from the Khmer Empire, discovered within the West Baray reservoir at Angkor, Cambodia. Depicting Vishnu in the Anantasayin pose—reclining on the serpent Shesha in the cosmic ocean—it is a masterpiece of the Baphuon style. Its significance lies in its scale and symbolism. As one of the largest ancient bronze statues in Southeast Asia, it showcases the Khmers' exceptional metallurgical skill. Religiously, its placement in the center of a massive artificial lake transformed the reservoir into a physical representation of the Hindu primordial ocean, legitimizing the King's divine authority. Recovered in fragments starting in 1936, the remaining torso and head are now iconic treasures of the National Museum of Cambodia."
 lepsius.2245.g: "Buddha or Vishnu? Who cares, it belongs in a museum!"
 lepsius.2255.t: "The Obelisk of Axum"
 lepsius.2255.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has recently been intensively studying the so-called 'Obelisk' of Axum. In [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetHerHis] opinion, it is indeed a stele intended to mark a burial site. The archaeologist considers the object one of the most magnificent artifacts of the ancient Axum kingdom."
 lepsius.2255.f: "The Obelisk of Axum (also known as Stele 2) is a 24-metre-high granite monolith dating from the 4th century AD, which epitomises the craftsmanship of the Aksumite Empire in present-day Ethiopia. The stele is adorned with ornate 'false doors' and windows that mimic a multi-storey building and served as a tomb for the elite. The monument also gained international renown through its modern-day odyssey: in 1937, it was taken to Rome as looted art on the orders of Benito Mussolini. It was only after decades of diplomatic efforts that the obelisk was returned to Ethiopia in three parts in 2005."
 lepsius.2255.g: "A proud symbol of our ancestors!"
 lepsius.2255.h: "Transport the obelisk to [ROOT.GetCountry.GetCapital.GetCityHubName]!"
 lepsius.2265.t: "The Malden Plates"
 lepsius.2265.d: "During excavations in one of the core areas of the Mississippian culture, archaeologists have made a surprising discovery: Wonderfully beautiful pieces of copper are seeing the light of day again after centuries."
 lepsius.2265.f: "The Malden Plates (also known as the Wulfing Cache) consist of eight embossed copper plates discovered in 1906 by Ray Grooming in Malden, Missouri. These extraordinary artifacts belong to the Mississippian culture (ca. 1200-1400 CE) and were found buried in a field, likely hidden for safekeeping or as a ritual offering. The plates are masterworks of pre-Columbian metallurgy, featuring intricate iconography of the Southeastern Ceremonial Complex. They predominantly depict the Falcon Dancer—an anthropomorphic figure with avian features, wings, and ritual regalia—representing a powerful supernatural being or a shamanic transformation."
 lepsius.2265.g: "Was America civilized before it was civilized?"
 lepsius.2275.t: "The Quimbaya Treasure"
 lepsius.2275.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has discovered what is believed to be Colombia's largest gold hoard to date. Hundreds of artifacts were unearthed during an excavation. It appears [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetSheHe] has stumbled upon the treasure of an entire lost civilisation."
 lepsius.2275.f: "The Quimbaya Treasure is a world-renowned collection of Pre-Columbian gold and tumbaga artifacts crafted by the Quimbaya civilization in modern-day Colombia. Dating primarily from the 4th to 10th centuries CE, the hoard was discovered in 1890 near Filandia. The collection consists of approximately 122 pieces, including jewelry, figurines, and ritual vessels known as poporos (lime containers). These objects showcase extraordinary mastery of the lost-wax casting technique, characterized by smooth, rounded surfaces and sophisticated stylized human forms. In 1893, the Colombian government gifted the treasure to Spain's Queen Regent Maria Christina."
 lepsius.2275.g: "I've never seen so much gold!"
 lepsius.2201.t: "Han Tomb Paintings"
 lepsius.2201.d: "Excavations in the graves of high-ranking personalities from the Han Empire have provided insights into the life and daily routine of long-gone times."
 lepsius.2201.f: "While many Han artifacts had been known, the discovery of Han Dynasty painted tombs in the early 20th century revealed expansive mural cycles that had been sealed since the 2nd century AD. these wall paintings depict lively scenes of daily life: grand banquets, acrobatic performances, and bustling processions of horse-drawn chariots. They proved that the Han Chinese had developed sophisticated perspective and narrative painting long before the Tang Dynasty. The vivid pigments—reds, ochres, and blacks—remain some of the best-preserved examples of early Chinese pictorial art."
 lepsius.2201.g: "Our knowledge of Han society has been insufficient until now."
 lepsius.2202.t: "Han Lacquerware"
 lepsius.2202.d: "Archaeologists have unearthed numerous lacquerware items in their latest discovery."
 lepsius.2202.f: " While lacquer had been used for millennia, it was during the Han period (206 BC - 220 AD) that its production became a massive, state-controlled industry. Major discoveries in the early 20th century, particularly in northern outposts like Lelang (modern-day North Korea), revealed the incredible durability and artistry of these objects. Lacquerware was far more valuable than bronze at the Han court, prized for its resistance to heat, moisture, and decay. Objects—ranging from wine cups and cosmetic boxes to ornate coffins—were typically painted in a striking red and black palette with fluid, cloud-like scrolls and mythical creatures."
 lepsius.2202.g: "More artifacts for the next exhibition."
 lepsius.2203.t: "Han Pottery Figurines"
 lepsius.2203.d: "Numerous grave goods were recovered during an excavation. The many ceramic objects suggest a very wealthy deceased person. The figurines and miniature houses particularly caught the team's attention."
 lepsius.2203.f: "Han Dynasty pottery figurines, known as mingqi (spirit objects) range from court dancers and infantrymen to remarkably detailed miniature models of houses, granaries, and watchtowers. For archaeologists of the era, these architectural models were invaluable, providing the only surviving evidence of Han-style timber construction, which had long since perished in the real world. The figurines and models were seen as a complete microcosm of the Han world, intended to provide the deceased with a fully functioning estate—complete with livestock, kitchens, and entertainment—in the afterlife."
 lepsius.2203.g: "Could you build a model city of Chang'an with this?"
 lepsius.2204.t: "Han Bronze Art"
 lepsius.2204.d: "During the latest excavation, archaeologists unearthed a hoard of bronze wares from the Han dynasty. The researchers were particularly taken with a beautifully decorated ding."
 lepsius.2204.f: "The discovery of Han-era bronze hoards during the late 19th and early 20th centuries revealed a civilization that had perfected metallurgy for both ritual and daily life. These hoards, often found in North China and the borderlands like Gansu, frequently contained elaborate incense burners, mirrors, and vessel sets that had remained hidden for two millennia. A hallmark of these discoveries is the Boshan Lu (hill censer), a bronze incense burner shaped like a sacred mountain swirled in mist. For scholars of the era, the discovery of massive bronze lamps and wine vessels (hu) in Han tombs proved that bronze remained a symbol of high status long after the introduction of iron."
 lepsius.2204.g: "Brilliant additions to our museum."
 lepsius.2211.t: "Silla Pond Artifacts"
 lepsius.2211.d: "After draining a pond near an old palace dating back to the time of the United Silla Kingdom, archaeologists found numerous artifacts from that era in the mud."
 lepsius.2211.f: "Unlike the solemn offerings found in tombs, the items recovered from the pond's silt were largely remnants of daily palace existence and grand festivities. Among the most intriguing finds were gilded bronze Buddhas, ornate roof tiles (ebwadang), and unique wooden gaming dice used during royal banquets. These artifacts showcased a lifestyle of extreme decadence and artistic refinement. They reflect Silla's role as a major terminal of the Silk Road, with aesthetic influences from Tang China and even distant Persia."
 lepsius.2211.g: "Remnants of a Golden Age."
 lepsius.2212.t: "Silla Coin Hoards"
 lepsius.2212.d: "Archaeologists have made a huge coin hoard in a Korean provincial city, almost by chance. The coins originate primarily from the Chinese Tang Dynasty, the large neighbor of the united Silla Kingdom."
 lepsius.2212.f: "Ancient Korea typically traded in goods—with textiles and grain playing a particularly important role—or in knife coins. Nevertheless, foreign coins are frequently documented. China, in particular, as a powerful neighbor of the Silla Kingdom, exerted considerable influence on its neighbors through its monetary system, especially the Wu Zhu coin minted from the Han Dynasty onward. This was followed by the Kaiyuan Tongbao of the Tang Dynasty. As part of the Silk Road, numerous Chinese coins thus reached Korea through international trade."
 lepsius.2212.g: "Whether Korean or Chinese ... the coins are ours."
 lepsius.2213.t: "Silla Woodblock Prints"
 lepsius.2213.d: "During archaeological investigations near a pagoda, researchers discovered several Buddhist texts. They date from the Silla period and were printed using woodblock printing."
 lepsius.2213.f: "The documents prove that the Silla kingdom already possessed the technique of woodblock printing in the 8th century, thus providing a theoretical possibility for mass printing. For researchers, these are therefore not only valuable religious texts, but also evidence of a technologically advanced society that had not been anticipated."
 lepsius.2213.g: "Fascinating!"
 lepsius.2214.t: "The Seokguram Grotto"
 lepsius.2214.d: "A postman alerted the Archaeological Institute to a spectacular discovery near the ancient capital Gyeongju, which sheds a whole new light on the Silla period."
 lepsius.2214.f: "The Seokguram Grotto, a monumental hermitage part of the Bulguksa temple complex, was rediscovered in 1909 by a local postman seeking shelter from a storm. Located on Mount Toham in Gyeongju, this artificial granite grotto—constructed in the 8th century during the Unified Silla period—had fallen into obscurity and was partially collapsed, buried under earth and debris for centuries. The grotto is hailed as a masterpiece of Eastern Buddhist art, featuring a serene, colossal Sakyamuni Buddha surrounded by intricately carved bas-reliefs of guardians, devas, and disciples. During the early 20th century, the discovery became a focal point of colonial-era archaeology. Scholars and engineers of the time were fascinated by its sophisticated architectural design, which utilized a unique dome structure to maintain temperature and humidity."
 lepsius.2214.g: "A gem from the Silla period."
 lepsius.2221.t: "Haniwa figurines"
 lepsius.2221.d: "A recent excavation has unearthed numerous ceramic figurines that guarded tomb entrances. The clay figurines are extremely fragile."
 lepsius.2221.f: "Haniwa are unglazed ceramic sculptures unique to the Kofun (Yamato) period, specifically created to be placed atop or around monumental burial mounds. These terracotta sentinels were seen as protective borders for the sacred tomb space. Developed between the 3rd and 6th centuries AD, these objects evolved from simple cylindrical jars into complex figures representing the entire social and material world of the deceased. They were among the first artifacts to be scientifically categorized by Japanese archaeologists. "
 lepsius.2221.g: "Once they protected graves, now they decorate museums."
 lepsius.2222.t: "Magatama"
 lepsius.2222.d: "Our archaeological team has found a large number of small jade magatama dating from the Yamato period."
 lepsius.2222.f: "Magatama are curved, comma-shaped beads that serve as one of the most distinctive hallmarks of the Japanese Yamato (Kofun) period. Typically crafted from precious stones such as jadeite, jasper, nephrite, or carnelian, these ornaments were highly prized as both elite status symbols and powerful religious amulets. the discovery of Magatama in monumental keyhole-shaped tombs sparked significant archaeological interest regarding the origins of Japanese culture. Scholars of the time noted the striking similarities between these jewels and those found in the Silla and Gaya confederacies of the Korean Peninsula. Beyond their aesthetic value, Magatama held a sacred place in the national consciousness; as one of the Three Sacred Treasures of the Imperial Regalia of Japan, their unearthing from ancient sites was often seen as a profound reconnection with the divine lineage of the Yamato state."
 lepsius.2222.g: "May I have one?"
 lepsius.2223.t: "Yamato Armor and Weaponry"
 lepsius.2223.d: "Our archaeologists suspect they have discovered a battlefield. Swords and armor from the Yamato period were found. The armor of a warrior, a tankō, is particularly well preserved."
 lepsius.2223.f: "The Yamato period was an era of intense military consolidation and expansion, characterized by the widespread adoption of advanced iron technology. Archeological excavations of Kofun tombs unearthed vast quantities of military equipment, including straight swords (chokutō), arrowheads, and sophisticated plate armor. Two primary types of armor defined this age: the tankō, a solid iron breastplate forged from riveted plates, and the keikō, a more flexible lamellar armor designed for mounted combat."
 lepsius.2223.g: "Japan has a great military past."
 lepsius.2224.t: "Yamato Bronze Mirrors"
 lepsius.2224.d: "Archeaologists have found numerous grave goods, among which the bronze mirrors stand out as relics of the glorious Yamato period."
 lepsius.2224.f: "Bronze mirrors, or Shinju-kyo, are among the most spiritually significant artifacts recovered from Yamato-period Kofun tombs. Often found placed near the head or chest of the deceased, these mirrors were revered as sacred ritual objects capable of reflecting and capturing light—a property associated with divine authority and the sun goddess Amaterasu. Many mirrors discovered in Japan were identified as 'Deity and Beast' mirrors imported from the Chinese Wei Dynasty, while others were local Japanese imitations known as Bosei-kyo. For historians of the Meiji and Taisho eras, the distribution of these mirrors served as a political map of ancient Japan; the discovery of identical mirrors in geographically distant tombs suggested that the Yamato court distributed these precious objects to local chieftains as symbols of a unified political alliance."
 lepsius.2224.g: "A reflection of Japan's past."
 lepsius.2231.t: "Indus Ceramics"
 lepsius.2231.d: "Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] announced today that a cache of numerous ceramic finds was discovered in the Indus Valley."
 lepsius.2231.f: "The potters of the Indus Valley Civilization were already using highly developed, high-speed pottery wheels over 4,000 years ago. Particularly striking is the so-called 'Black-on-Red Ware': vessels coated with a deep red clay slip and then painted with fine, black pigments. The motifs are either strictly geometric or depict the rich flora and fauna of the subcontinen - from peacocks to the characteristic pipal leaves. The vast quantities of these durable artifacts provided the primary evidence for the urbanization of the Indus basin, proving that a complex, standardized society had flourished long before the recorded history of the subcontinent began."
 lepsius.2231.g: "Now it's time to piece together the fragments."
 lepsius.2232.t: "Indus Beads"
 lepsius.2232.d: "A team of archaeologists led by Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] today secured a valuable find in an ancient Indus settlement, confirming the craftsmanship of the Harappan civilization."
 lepsius.2232.f: "The discovery of intricate jewelry and beadwork provided some of the most compelling evidence for the immense wealth and specialized craftsmanship of the Indus Valley Civilization. These ornaments were fashioned from a diverse array of materials, including gold, silver, lapis lazuli, turquoise, and various forms of terracotta. However, it was the production of long, carnelian beads that stood as the hallmark of Harappan technical mastery. Archaeologists were struck by the precision with which these hard stones were drilled and etched with delicate white alkali patterns, a process that required highly specialized kilns and copper-alloy drills. Beyond their aesthetic appeal, these jewelry finds offered vital clues regarding the extensive maritime and overland trade networks of the Bronze Age. The presence of unmistakable Harappan bead styles in the royal burials of Mesopotamian city-states further confirmed the subcontinent's role as a primary exporter of luxury goods."
 lepsius.2232.g: "This ancient culture had far-reaching trade relations!"
 lepsius.2233.t: "Indus Script"
 lepsius.2233.d: "Archaeologists have found several seals with writing in what appears to have been a warehouse of the Indus Valley Civilization. However, Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] has so far been unable to decipher the writing."
 lepsius.2233.f: "The recovery of small, square steatite seals remains the most enigmatic discovery of the Indus Valley excavations. These artifacts were typically carved in intaglio with exquisite depictions of animals—most notably the 'unicorn' bull, elephants, and rhinoceroses—surmounted by a series of standardized symbols known as the Indus script. Their discovery in large quantities within warehouse districts suggested that they functioned as official markers of ownership or authority, used to impress clay tags on trade goods destined for local and foreign markets. The brevity and recurring nature of the inscriptions led scholars to conclude that the script likely represented names, titles, or bureaucratic notations rather than long narrative texts. Despite rigorous linguistic analysis, the underlying language remained a subject of intense debate."
 lepsius.2233.g: "Writing and language will remain a mystery to future generations."
 lepsius.2234.t: "Indus Contact with Mesopotamia"
 lepsius.2234.d: "Farmers informed the Archaeological Institute about ancient structures in the suspected area of the Harappan civilization. Dr. [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName] made a surprising discovery there: cylindrical seals from Mesopotamia!"
 lepsius.2234.f: "The unearthing of distinctively Near Eastern artifacts within the ruins of Harappa and Mohenjo-Daro provided the first definitive archaeological proof of direct contact between the Indus Valley and the civilizations of Mesopotamia. Among the most significant finds were cylindrical seals, which contrasted sharply with the square, flat stamp seals native to the Indus basin. These imported objects, typically crafted from stones like hematite or lapis lazuli, featured the narrative and mythological iconography characteristic of the Akkadian and Sumerian city-states. Beyond the seals, archaeologists identified several specific luxury items, including fragments of 'Persian Gulf' style pottery and certain types of cast bronze weaponry that originated in the west."
 lepsius.2234.g: "Mesopotamian artifacts? Here? We don't even need to send an expedition?"
