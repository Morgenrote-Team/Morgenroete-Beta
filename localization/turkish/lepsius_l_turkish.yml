 lepsius_expedition_general_information_loc: "\n$mr_divider_for_je$\nYour [concept_lepsius_expedition] will get an event every month, adding progress to your expedition. Once the progress reaches the limit, your Expedition will end.\n$mr_divider_for_je$\nThe Success value tells you how succesful your expedition is. The more success you gain, the more [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] you will receive at the end of the expedition. You gain a maximal amount of artifacts if your success reaches #V 15#!.\nMany factors can influence your success from events to your preparation. 10 levels of Universities with a [concept_pm_academics_university_humanities] will grant you 1 point of success at the start of an expedition for example. Note that you can gain a maximum of 4 points from University specializations."
