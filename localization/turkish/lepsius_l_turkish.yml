 je_lepsius_excavation_harappa: "Harappa Kazısı"
 je_lepsius_excavation_harappa_reason: "#T Suriye’deki Palmira Harabeleri, Arkeologlar için büyüleyici bir yerdir.#!\n$mr_divider_for_je$\nHer ay birçok farklı faktöre bağlı olarak ilerleme kaydedeceksiniz. Kazının belirli aşamalarında size [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], deneyim ve eyalet özelliğini değiştiren, daha fazla [concept_curtiss_tourism] geliri sağlayan bir etkinlik verilecek.\n$mr_divider_for_je$\n$lepsius_excavation_progress_loc$"
 je_lepsius_excavation_harappa_0_loc: "Harabeler hâlâ yüzyıllardır oldukları durumda."
 je_lepsius_excavation_harappa_1_loc: "Bel Tapınağı’nın yakın zamanda kazılması ve kısmen onarılması, antik bölgeyi ziyaret etmek isteyen daha fazla insanı çekti."
 je_lepsius_excavation_harappa_2_loc: "Arkeologlarımız Bel Tapınağı, Kule Mezarlarla dolu Mezarlar Vadisi ve daha birçok yeri kazıp restore etti. Bu da giderek daha fazla ziyaretçi çekiyor."
 lepsius.5020.t: "Harappa Bölgesi"
 lepsius.5020.d: "Harappa Bölgesi hakkında henüz fazla şey bilmiyoruz, ancak Arkeologlarımız bu antik şehrin gizemlerini gün yüzüne çıkarmak için sabırsızlanıyor."
 lepsius.5020.f: "Şu anda alanın tüm bu zaman boyunca ne kadar hasar gördüğü bilinmiyor. Ancak arkeoloji ekiplerimiz bölgeyi kazmaya hazırlanıyor ve kazı için en umut verici yerleri bulmak amacıyla çeşitli bölgeleri inceliyor."
 lepsius.5020.g: "Hindistan için büyük önem taşıyan bir alan"
 lepsius.5021.t: "Izgara Şehir"
 lepsius.5021.d: "Kazılar ızgara planlı bir şehir ortaya çıkardı. Şehrin çok büyük olduğu kesin, ama burada bir zamanlar kaç kişinin yaşamış olabileceğini henüz bilmiyoruz."
 lepsius.5021.f: "\"It is quite fascinating that apart from Mesopotamia and Egypt there was another place where civilization originated. I would have never thought that India of all places could be home to one of the biggest bronze-age cities of the world.\" - One of your Archaeologists"
 lepsius.5021.g: "Yeni bir Medeniyet Beşiği"
 lepsius.5022.t: "Harappa’nın Surları"
 lepsius.5022.d: "Arkeologlarımız, şimdi ‘Akropol’ adını verdikleri bir alanı kazdılar. Harappa halkının şehirlerinde neden böyle tahkim edilmiş bir yere ihtiyaç duydukları henüz belli değil."
 lepsius.5022.f: "\"Eminim ki Deniz Kavimleri’nin istilasından korkuyorlardı!\"\n\"Deniz Kavimleri Akdeniz’deydi, burada değil! Bence yiyeceklerini o sinir bozucu köylülerden korumaları gerekiyordu!\"\n\"Bundan şüpheliyim. Tanrılarına adanmış tahkim edilmiş bir tapınak inşa etmiş olmalılar!\""
 lepsius.5022.g: "Bu gerçekten büyüleyici!"
 lepsius.5023.t: "Harappa’nın Kanalizasyon Sistemi"
 lepsius.5023.d: "Our excavation has brought a complex system of drainage and waste disposal to light. There even seem to be some toilets that were connected to those drainages."
 lepsius.5023.f: "\"Benim tuvaletim bile Harappalılarınki kadar modern değil! Gerçekten olağanüstü gelişmiş olmalılar!\""
 lepsius.5023.g: "Ve biz hâlâ günümüzde atık suyla uğraşıyoruz..."
 je_lepsius_petra: "Petra - Nebatîlerin Mirası"
 je_lepsius_petra_reason: "1800’lü yıllarda, Orta Doğu’da kayalardan oyulmuş efsanevi bir şehirden yalnızca birkaç bilim insanı haberdardı. Petra, 1812’de İsviçreli Arap gezgin Johann Ludwig Burckhardt tarafından yeniden keşfedildi. O zamandan beri birçok gezgin bölgeyi ziyaret etse de, Petra’nın ayrıntılı bir arkeolojik incelemesi hâlâ yapılmamıştı."
 lepsius.77.t: "Nebatîlerin Mirası"
 lepsius.77.d: "Doktor [ROOT.Var('lepsius_archaeologist_var').GetCharacter.GetLastName], Petra şehrinde ilk ciddi arkeolojik araştırmayı gerçekleştirdi ve geçmişten kalma kalıntıları gün yüzüne çıkardı. İlham verici bir bilimsel çalışma!"
 lepsius.77.f: "Günümüzde Ürdün’de bulunan Petra harabeleri, antik çağlarda Nebatî İmparatorluğu’nun başkentiydi. Kayalardan doğrudan oyularak yapılmış anıtsal mezar tapınaklarıyla eşsiz bir kültürel miras kabul edilir. Şehrin tarihi, tarihteki ilk Arap imparatorluğu olan Nebatî İmparatorluğu’nun tarihiyle yakından bağlantılıdır. Ancak, Nebatîler kendi dönemlerinden pek az yazılı kanıt bırakmıştır. Bu nedenle, onların tarihi ve Petra’nın geçmişi yalnızca parçalı bir şekilde, İncil, Yunan ve Roma kaynakları aracılığıyla anlaşılabilmektedir. Petra’nın en ünlü yapısı, Helenistik tarzda inşa edilmiş yaklaşık 40 metre yüksekliğinde ve 25 metre genişliğindeki Hazine Binası (Khazne al-Firaun)’dır. Bedeviler tarafından ‘Firavun’un Hazinesi’ olarak adlandırılan yapı, aslında çok sayıdaki kaya mezarlarından sadece biriydi. Büyük ihtimalle MÖ 1. yüzyılda hüküm süren Nebatî kralı Aretas IV için yapılmıştı. Ancak bazı araştırmacılar, Khazne’yi MS 2. yüzyıla, İmparator Hadrian dönemine tarihlendiriyor."
 lepsius.77.g: "Burası Hristiyan gizemli eserlerini saklamak için de bir yer olabilir."
