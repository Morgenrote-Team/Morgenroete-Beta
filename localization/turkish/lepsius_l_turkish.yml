 je_lepsius_palmyra_2_loc: "Bel Tapınağı’nın yakın zamanda kazılıp kısmen restore edilmesi, antik alanı görmek isteyen daha fazla insanı cezbetti."
 je_lepsius_palmyra_3_loc: "Arkeologlarımız Bel Tapınağı, Mezarlar Vadisi’ndeki Kule Mezarlar ve daha birçok yeri kazıp restore etti. Bu da giderek daha fazla ziyaretçi çekiyor."
