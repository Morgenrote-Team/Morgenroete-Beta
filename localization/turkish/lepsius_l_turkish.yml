 building_lepsius_archaeological_museum: "Arkeoloji Müzesi"
 building_lepsius_archaeological_museum_desc: "Kendine saygısı olan her milletin başkentinde, cesur maceralardan veya en yüksek nitelikteki bilimsel keşif gezilerinden elde edilen kültürel varlıklarını sergileyen eşsiz bir müzesi vardır. Eserlerin sayısı ve farklı koleksiyonların çeşitliliği yalnızca dünyadaki prestije değer katmakla kalmaz, aynı zamanda eğitsel bir nitelik de taşır."
