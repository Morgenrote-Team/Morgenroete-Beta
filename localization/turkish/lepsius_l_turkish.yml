 lepsius.321.g: "Bunu çok uzun süre yaparsan, sonunda eserlerle aynı tozu toplarsın."
 je_lepsius_cataloging: "Arkeolojik Kataloglama"
 je_lepsius_cataloging_reason: "Arkeolojik kataloglama, arkeolojik kazılardan veya mevcut koleksiyonlardan elde edilen buluntuların sistematik olarak belgelenmesi, tanımlanması ve bir veritabanına ya da envanter sistemine kaydedilmesi sürecidir. Her buluntu, konum, tabakalaşma, keşif koşulları, malzeme, boyutlar veya tarihleme gibi bağlamsal verileriyle ilişkilendirilir.\n\nBu süreç bir keşif gezisinden çok daha uzun sürer ve çoğu zaman bir arkeoloji ekibinin yeni bir hedefe yönelmesinin neden bu kadar zaman aldığını açıklar. Ama hangi arkeolog bu son derece heyecan verici görevi yerine getirmekten gurur duymaz ki?"
