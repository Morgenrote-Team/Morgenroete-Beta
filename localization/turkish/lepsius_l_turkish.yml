 lepsius.190.j: "Asur"
 lepsius.190.k: "Argolis"
 lepsius.190.l: "Girit"
 lepsius.190.m: "Yucatán"
 lepsius.190.n: "Peru"
 lepsius.190.o: "Devam etsinler."
 lepsius.901.t: "Tutankhamun’un Mezarı"
 lepsius.901.d: "Uluslararası bilim için sansasyonel bir gün. Büyük bir keşif yaptık: Tutankhamun’un mezarı bugün [ROOT.GetCountry.GetAdjectiveNoFlag] arkeologları tarafından açığa çıkarıldı!"
 lepsius.901.f: "Ağır ağır, umutsuzca ağır ilerliyor gibiydi; izlerken, kapının alt kısmını tıkayan geçit enkazı temizleniyordu, ta ki sonunda tüm kapı tamamen açığa çıkana dek. Karar anı gelmişti. Titreyen ellerle sol üst köşede küçük bir delik açtım. Demir bir çubukla yoklayabildiğim kadar boşluk vardı; içerisi bizim temizlediğimiz geçit gibi dolu değildi. Olası zehirli gazlara karşı önlem olarak mum testi uygulandı, ardından deliği biraz genişletip mumu içeri sokarak göz attım. İlk başta hiçbir şey göremedim; odadan çıkan sıcak hava mumun alevini titretiyordu. Ama gözlerim yavaş yavaş ışığa alıştıkça, odanın içindeki detaylar sisin arasından ortaya çıktı: garip hayvanlar, heykeller ve altın – her yerde altının parıltısı. O an – diğerleri için bir sonsuzluk gibi gelmiş olmalı – şaşkınlıktan konuşamaz hale geldim. Yanımdaki meslektaşım daha fazla dayanamayarak endişeyle sordu: ‘Bir şey görebiliyor musun?’ O sırada çıkarabildiğim tek söz, ‘Evet, harika şeyler.’ oldu."
 lepsius.901.g: "Gerçekten harika şeyler."
 lepsius.902.d: "[SCOPE.sCountry('lepsius_tut_discoverer').GetName] büyük bir keşif yaptı: Tutankhamun’un mezarı bugün açığa çıkarıldı!"
 lepsius.902.f: ""
 lepsius.902.g: "Umarım firavunun laneti onları vurur."
 lepsius.911.t: "Keops’un Gemisi"
 lepsius.911.d: "Uluslararası bilim için sansasyonel bir gün. Büyük bir keşif yaptık: Keops’un Gemisi bugün [ROOT.GetCountry.GetAdjectiveNoFlag] arkeologları tarafından açığa çıkarıldı!"
 lepsius.911.f: "Derin bir nefes aldı, gözlerini kazısının karanlığına alıştırmak için kapattı, sonra yavaşça açtı. Sağlam eliyle kesmeye devam etti. Kaplama çözülüp parçalandıkça hızlıca çalıştı. Deliği, vücudunu aşağı doğru farklı bir pozisyona kıvırabileceği kadar derin açtı, başının birkaç santim ötesinde çalışmaya devam etti. Kesiyor, kazıyordu. Zamanın hiçbir anlamı yoktu. Ne yorgun olduğunun ne de dik pozisyonda yattığının farkındaydı. Yokladı, kesti. Aniden ve mucizevi bir şekilde elleri boşluğa çıktı. Transa girmiş gibi yattı. Gözlerini kapadı. Burnuna belli belirsiz bir koku geldi. Tanımlayamadı. Neredeyse tatlıydı. Tütsü olamazdı. Yoksa? Belki de tarihin kokusuydu? Sonra anladı: sedir ağacı! Gözleri hâlâ kapalıydı. Derin bir nefes aldı ve gerçekten sedir olduğunu fark etti. Daha önce hiç bilmediği bir tatmin duygusu hissetti. Mutluluk damarlarında dolaştı. Gözleri hâlâ kapalıydı. Tanrı’ya şükür duası fısıldadı. Sonra zihni yeniden çalışmaya başladı. Eğer gerçekten aşağıdaki Güneş Teknesi’nden sedir kokusu alıyorsa, bu beyaz karıncaların iş başında olmadığı anlamına gelmezdi. Belki de kıymetli odun karıncalar tarafından yenmişti. ‘Bu gemi!’ diye bağırdı. ‘Bu gemi!’"
 lepsius.911.g: "4000 yıldan fazla zaman sonra hâlâ suya açılabilir mi?"
 lepsius.912.d: "[SCOPE.sCountry('lepsius_ship_discoverer').GetName] büyük bir keşif yaptı: Keops’un Gemisi’nin mezarı bugün açığa çıkarıldı!"
 lepsius.912.f: ""
 lepsius.912.g: "Yeni filolarının önemli bir parçası olur."
 lepsius.921.t: "Babil Kulesi"
 lepsius.921.d: "Uluslararası bilim için sansasyonel bir gün. Büyük bir keşif yaptık: Babil Kulesi bugün [ROOT.GetCountry.GetAdjectiveNoFlag] arkeologları tarafından açığa çıkarıldı!"
 lepsius.921.f: "Bu sırtın ötesinde, Amran İbn Ali tepesine doğru uzanan, oldukça geniş ve dikkat çekici biçimde düzgün bir ova vardı; köyümüz Kweiresh’ten Hilleh’e giden yol çaprazlama buradan geçiyordu. Burası ‘Sachn’ diye adlandırılıyordu, kelime anlamıyla: tava, ama günümüzde büyük hacı camilerinin etrafını çevreleyen avlular için kullanılıyor; örneğin Kerbela ya da Necef’teki gibi. Ama bizim ‘Sachn’ımız aslında antik kutsal alanın günümüzdeki görünümünden başka bir şey değildi; burada Etemenanki Zigguratı, yani ‘Göğün ve Yerin Temel Taşı’, Babil Kulesi yükseliyordu, etrafında ise çeşitli kült yapılarıyla çevrili bir sur vardı. Kule’nin tam yüksekliğini bilmiyoruz. Ama Nabupolassar da, Nebukadnezar da Etemenanki silindir yazıtında ondan özellikle bahseder. Nabupolassar şöyle der: ‘O zaman Marduk bana emretti… Babil Kulesi, benden önceki günlerde zayıflamış ve yıkılmıştı. Onun temellerini yeraltının göğsüne sağlamca oturt, zirvesi göğe ulaşsın.’"
 lepsius.921.g: "Demek ki İncil tamamen yanlış değildi."
 lepsius.922.d: "[SCOPE.sCountry('lepsius_babylon_discoverer').GetName] büyük bir keşif yaptı: Babil Kulesi bugün açığa çıkarıldı!"
 lepsius.922.f: ""
 lepsius.922.g: "Umarım onlar da kuleyi yapanlar kadar kafaları karışır."
 lepsius.931.t: "Sennacherib’in Bahçeleri"
 lepsius.931.d: "Uluslararası bilim için sansasyonel bir gün. Büyük bir keşif yaptık: Asma Bahçeleri bugün [ROOT.GetCountry.GetAdjectiveNoFlag] arkeologları tarafından açığa çıkarıldı!"
 lepsius.931.f: "Asma Bahçeleri gerçekten Babil’de miydi? Son keşfe göre bu iddianın yanlış olduğu kanıtlandı. Tarihî kaynakların karşılaştırılmasıyla, en yetenekli arkeologlarımız bu efsanevi Bahçeler’i Babil’e yerleştiren kaynakların aslında çok az olduğunu buldu. Ayrıca, gelişmiş bahçecilik teknikleriyle tanınanlar Babilliler değil, Asurlulardı. Kabartmalar, birkaç katlı geniş bahçelere tanıklık etmektedir. Bir arkeoloji ekibi, az keşfedildiği düşünülen Asur kralı Sanherib’in büyük sarayında deneme kazıları yapma fırsatı olarak bunu değerlendirdi. Bulgular açıktır: kayıp dünya harikası aslında Ninova’dadır. Arkeologlarımız böylece yalnızca bir keşiften değil, aynı zamanda iki buçuk bin yıl süren bir gizemin çözümünden de fayda sağladı."
 lepsius.931.g: "Yani bu aslında Ninova’nın Asma Bahçeleri mi demek oluyor?"
 lepsius.932.d: "[SCOPE.sCountry('lepsius_semiramis_discoverer').GetName] büyük bir keşif yaptı: Asma Bahçeler bugün açığa çıkarıldı!"
 lepsius.932.f: ""
 lepsius.932.g: "Burada neredeyse kesinlikle bir karışıklık var."
 lepsius.941.t: "Miken Hazineleri"
 lepsius.941.d: "Uluslararası bilim için sansasyonel bir gün. Büyük bir keşif yaptık: Miken Hazineleri bugün [ROOT.GetCountry.GetAdjectiveNoFlag] arkeologları tarafından açığa çıkarıldı!"
 lepsius.941.f: "Açık ara en önemli ve değerli kazı Aslan Kapısı’nın hemen arkasında olanıydı. Schliemann, 1874’teki deneme kazılarında kalenin en alçak noktasındaki kayaların en derininde molozla kaplı olduğunu belirlemişti. Pausanias’ın sözlerine göre, yönetici ailenin mezarlarının kale duvarlarının içinde olabileceğini düşünüyordu. Nitekim çalışmaların başlamasından kısa süre sonra 3 ila 5 metre derinlikte antik kabartmalarla süslü üç mezar taşı bulundu. Schliemann’ın anlattığına göre taşlar kaldırıldığında, sanıldığı gibi zemine değil, mezar açmak için kayaya dikey olarak kazılmış ve toprakla doldurulmuş şaftların üzerine oturdukları ortaya çıktı. Bu tür beş şaft kazıldı ve belli bir derinlikte, ölü kurbanların gömülmesinden sonra sunak olarak kullanılmış taş tabakalar kaldırıldıktan sonra kazma yaklaşık 6 metre derinlikte zemine ulaştı. Beş mezarda on beş ceset yatıyordu, olağanüstü zengin, hatta masalsı denilebilecek altın takılarla süslenmiş halde. Ölülerin yüzlerini taklit eden altın maskeler, erkeklerin yüzlerinin üzerinde, spiral desenlerle süslü altın plakalar göğüslerini örtüyordu; kadınların giysileri ise altınla yüklüydü."
 lepsius.941.g: "Agamemnon, bu sen misin?"
 lepsius.942.d: "[SCOPE.sCountry('lepsius_mycenae_discoverer').GetName] büyük bir keşif yaptı: Miken Hazineleri bugün açığa çıkarıldı!"
 lepsius.942.f: ""
 lepsius.942.g: "Şüpheye düştüğümüzde, bu sahtekârların bu ‘hazineleri’ kendilerinin gizlediğini söyleyebiliriz."
 lepsius.961.t: "Pakal’ın Mirası"
 lepsius.961.d: "Uluslararası bilim için sansasyonel bir gün. Büyük bir keşif yaptık: Pakal’ın Mezarı ve Gömü Hazineleri bugün [ROOT.GetCountry.GetAdjectiveNoFlag] arkeologları tarafından açığa çıkarıldı!"
 lepsius.961.f: "İlk izlenimim yeşil, kırmızı ve beyazdan oluşan bir mozaikti. Sonra detaylar belirdi – yeşil yeşim süsler, kırmızıya boyanmış dişler ve kemikler, bir maskenin parçaları. Tüm bu muazzam işin – mezar odası, heykeller, merdivenler, tepeye taç gibi oturan büyük piramit – kimin için yapıldığını görüyordum: Palenque’nin en büyük adamlarından birinin ölü yüzü! Bu bir lahitti, bir Maya piramidinde bulunan ilk lahit!"
 lepsius.961.g: "Güney Amerika’nın Tutankhamun Mezarı!"
 lepsius.962.d: "[SCOPE.sCountry('lepsius_pakal_discoverer').GetName] büyük bir keşif yaptı: Pakal’ın Mezarı ve Gömü Hazineleri bugün açığa çıkarıldı!"
 lepsius.962.f: ""
 lepsius.962.g: "Zaten o maske oldukça çirkindi."
 lepsius_local_excavation_modifier: "Yerel Kazı"
 lepsius_local_excavation_state_modifier: "Yerel Kazı"
 lepsius_local_excavation_cost_modifier: "Yerel Kazı Maliyeti"
 lepsius.1101.t: "Arkeoloji Kongresi: Çıkış (Exodus)"
 lepsius.1101.d: "Ulusumuz, bir sonraki Arkeoloji Kongresini düzenlemek için tüm gerekli hazırlıkları yaptı. Odak noktası, İncil’in arkeoloji ve antik çağ araştırmalarındaki rolü olacak. Dünyanın önde gelen arkeologlarına davetler gönderilecek. Profesör [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] oturuma başkanlık edecek."
 lepsius.1101.f: "Daha Roma döneminde, Antik Mısır hakkındaki kaynak eksikliği, tarihsel yazıların Herodot gibi ikincil kaynaklara dayanmasına neden oluyordu. Bu gelişim Orta Çağ’da da devam etti. İncil, ipuçları sunuyor ve uzun süre Yakın Doğu tarihi için güvenilir bir kaynak olarak görülüyordu — çünkü başka gelenekler yoktu. Hiyerogliflerin çözülmesi ve modern Mısırbilimin başlamasıyla birlikte, hem İncil’in taraftarları hem de eleştirmenleri, kutsal metinlerdeki anlatıların doğru ya da yanlış olduğuna dair kanıtlar sunmaya çalıştılar. Antik Babil’in keşifleriyle bu eğilim daha da arttı. İncil’deki hikâyelerin tarihselliği üzerine tartışmalara bir örnek de Exodus’tu — İsrailoğullarının Mısır’dan çıkışı — ki bu olay için Mısır kaynaklarında hiçbir kanıt bulunamamıştı."
 lepsius.1101.g: "Arkeoloji dünyası misafirimiz olmalı."
 lepsius.1102.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName] bizi bir arkeoloji kongresine davet etti. Konu, Exodus örneği üzerinden İncil’in tarihselliği olacak. Arkeoloğumuz Profesör [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] sıcak bir davet aldı."
 lepsius.1102.g: "Her seferinde kimin en şık deri cekete sahip olduğu tartışmaları..."
 lepsius.1103.t_laughed: "Arkeoloji Cemiyetinin Alay Konusu"
 lepsius.1103.t_respected: "Kendinden Emin Bir Görünüm"
 lepsius.1103.t_lauded: "Hayranlık ve Tebrikler"
 lepsius.1103.d_laughed: "Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]'ın katılımı eğlenceyle karşılandı. [ROOT.GetCountry.GetNameNoFlag], Mısırbilim alanında kayda değer bir başarıya ulaşmış bir ülke olarak bilinmiyor. Kapalı kapılar ardında açıkça şakalar yapılıyordu."
 lepsius.1103.d_respected: "Arkeoloji Kongresi başlamadan önce arkeoloğumuz sıcak bir şekilde karşılandı ve geleneksel nezaket ifadeleri paylaşıldı. [ROOT.GetCountry.GetNameNoFlag], araştırma dünyasında saygın bir üne sahip."
 lepsius.1103.d_lauded: "Profesör [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]'ın gelişi büyük bir coşkuyla karşılandı. O, en çok beklenen misafirlerden biri olarak görülüyordu. [ROOT.GetCountry.GetNameNoFlag], Mısırbilim alanında öncü kabul edildiği için çevresinde hızla bir kalabalık toplandı."
 lepsius.1103.f_laughed: "'[ROOT.GetCountry.GetAdjectiveNoFlag] arkeologları neden hiç kızlarla çıkamıyor?\n\nÇünkü en kötü flört yöntemlerine sahipler!'"
 lepsius.1103.f_respected: "Profesör [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName], varışında meslektaşlarıyla birkaç hoş sohbet yaptı; çoğunlukla sıradan harabeler hakkında — ki bilim insanı olmayan biri bunları daha da sıkıcı kaya oluşumları diye küçümserdi."
 lepsius.1103.f_lauded: "Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName], yoğun ilgiden neredeyse bunalmış görünüyordu. O kadar çok meslektaşı onunla konuşmak, seferlerinden ve deneyimlerinden faydalanmak istedi ki… Hatta bazıları özel bir ders vermesi için ısrar etti."
 lepsius.1103.g: "Ne kadar utanç verici!"
 lepsius.1103.h: "Sonunda benzer düşünenler arasında."
 lepsius.1103.i: "Biz önde gelen bir arkeoloji ulusuyuz!"
 lepsius.1104.t: "Exodus: Tarihsel bir değer mi yoksa uydurma mı?"
 lepsius.1104.d: "Konuya özgü konferans kısa sürede bir prensip tartışmasına dönüştü. Başta sadece İncil’deki Exodus ve Mısır kaynakları üzerine konuşulmak istenirken, mesele hızla tarihte ve arkeolojide İncil’in değeri üzerine bir tartışmaya evrildi. İki akademik kamp artık uzlaşmaz bir biçimde karşı karşıya."
 lepsius.1104.f: "[SCOPE.sCharacter('lepsius_bible_defender_scope').GetFullName], aslında İsrail halkının hafıza kültürü ve Exodus’un statüsü üzerine bir sunum yapmak istiyordu. Ancak [SCOPE.sCharacter('lepsius_bible_attacker_scope').GetFullName], böyle bir anlatının sadece zaman kaybı olup olmadığını soran kışkırtıcı ama haklı bir soru yöneltti — çünkü sonuçta asıl mesele, İncil’in bir kaynak sayılıp sayılamayacağıydı; zira Exodus’un tarihselliğini doğrulayan hiçbir arkeolojik gelenek yoktu. Çevrilen metinlerde de böyle bir gelenek bulunmuyordu. Dolayısıyla temel olarak sorulması gereken şey, Musa’nın beş kitabının uydurma hikâyeler olup olmadığı ve bu yüzden de yararsız sayılıp sayılamayacağıydı. 'Arkeoloji olgu ile ilgilidir, hakikatle değil,' diye noktaladı. [SCOPE.sCharacter('lepsius_bible_defender_scope').GetFullName] ise bu suçlamalara şöyle karşılık verdi: İncil metinlerini doğrudan tanıklık raporları gibi anlamak doğru olmaz, onları antik hafıza kültürünün bir parçasını oluşturan olaylar hakkında ikincil bir kaynak olarak görmek gerekir. 'İncil’i tamamen reddetmek de, her kelimesini tarihsel bir gerçek gibi kabul etmek kadar saçmalıktır. Asıl mesele doğru soruları sormaktır,' dedi."
 lepsius.1104.g: "İncil, ikincil kaynak olarak bazı tarihsel değerlere sahip."
 lepsius.1104.h: "İncil’in hiçbir tarihsel değeri yok."
 lepsius.1105.t: "Arkeologlar kendi aralarında"
 lepsius.1105.d: "Devam eden Arkeoloji Kongresi dışında, arkeoloğumuz yabancı bir meslektaşıyla arkadaşlık kurdu ve fikir alışverişinde bulundu."
 lepsius.1105.f: "Kongre günlerdir sürüyordu ve Profesör [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName], ancak aralarda daha önce tanımadığı bir meslektaşıyla konuşma fırsatı bulabildi. Bu buluşmayı birlikte yenilen bir yemek izledi. Bilim insanları konuştukça birbirleri hakkında — ve birbirlerinden — daha çok şey öğrendiler. Görünüşe göre [SCOPE.sCharacter('lepsius_foreign_archaeologist_scope').GetFullName], oldukça zengin bir deneyime sahip biri."
 lepsius.1105.g: "Arkeolojinin bir başka dostu!"
 lepsius.1106.t: "Bir Tüccarın Eseri"
 lepsius.1106.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName]'deki Arkeoloji Kongresine, bir antika sahibinin müzakerecisi katıldı. O, gizli bir aristokrat adına ilgilenen bir müzeye bir eser satmaya çalışıyordu. Şimdiye kadar müşteri bulamadı."
 lepsius.1106.f: "Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName], eserin özgünlüğüne kendisi kanaat getirebildi. Ancak yüksek fiyat göz önüne alındığında satın almada tereddüt ediyor ve harekete geçmeden önce başkentten bir onay bekliyor."
 lepsius.1106.g: "Pahalı ama değerli."
 lepsius.1106.h: "Yeterince değerli değil."
 lepsius.1107.t: "Dostane Sohbet"
 lepsius.1107.d: " [SCOPE.sCountry('lepsius_congress_host_country').GetName]'deki Arkeoloji Kongresinin oturum aralarında, arkeoloğumuz birkaç meslektaşıyla yaptığı konuşmalarda [ROOT.GetCountry.GetNameNoFlag]'ı çok olumlu bir şekilde temsil etti."
 lepsius.1107.f: "Profesör [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]'ın tam olarak ne söylediği bilinmiyor, ancak görünüşe göre diğer arkeologların gönlüne dokunmuştu. Bu olumlu izlenimi kendi ülkelerinde yayacakları kesin."
 lepsius.1107.g: "İlişkilerimizi geliştirelim."
 lepsius.1107.h: "İtibarımızı geliştirelim."
 lepsius.1108.t: "Bir Asistan"
 lepsius.1108.d: "Arkeoloji Kongresine girmek isteyen ancak kapı muhafızları tarafından engellenen hırslı bir genç, Profesör [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]'ın dikkatini çekti."
 lepsius.1108.f: "Elbette öğrenci, seçkin uluslararası arkeologların bulunduğu salona girmesi engellendi, fakat ısrarı [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName]'i öylesine etkiledi ki, gençle daha yakından tanışmak istedi. Ortaya çıktı ki yaşı için antik dillerde ve coğrafyada oldukça büyük bir bilgi birikimine sahipti. Sadece birkaç saat içinde profesör, kongreden sonra onu asistanı yapmaya karar verdi; umudu, gencin kısa sürede akademik dünyayı zenginleştirmesiydi."
 lepsius.1108.g: "Akademik bir kariyer bekliyoruz."
 lepsius.1109.t_merit: "Exodus: Bir Hikâyeden Fazlası"
 lepsius.1109.t_invention: "Exodus: Kurgu, Gerçek Değil"
 lepsius.1109.d_merit: "Birçok toplantı, tartışma ve münazaradan sonra Arkeoloji Kongresi sona erdi ve nihai bir bildiri hazırlandı. Buna göre, İncil birincil bir tarihsel kaynak değildir; ancak Mısır ve Babil’e doğrudan uygulanabilir olmasa bile bazı açılardan tarihsel bir değere sahiptir."
 lepsius.1109.d_invention: "Birçok toplantı, tartışma ve münazaradan sonra Arkeoloji Kongresi sona erdi ve nihai bir bildiri hazırlandı. Buna göre, İncil’in arkeoloji veya tarih için hiçbir değeri yoktur. Daha ziyade, antikite araştırmalarına yardımcı olmaktan çok engel teşkil eden bir dizi uydurmadan ibarettir."
 lepsius.1109.f_merit: "Daha küçük bir arkeolog grubu bildiriyi bir uzlaşma olarak gördü, ancak diğerleri bunun mutlak tutumların ötesine geçen daha incelikli bir geçmiş yaklaşımı olduğunu kabul etti. Exodus’a doğrudan atıfta bulunulmasına rağmen bazı arkeologlar, İsrail halkına yönelik yıkımdan bahseden Firavun Merenptah’a ait yakın zamanda keşfedilen bir pasajı öne çıkardı. Başka bir grup ise Champollion’un çevirdiği Bubastis kapısına göre Firavun Şişak’ın gerçekten Kudüs’ü yağmaladığını işaret etti. Bunların tümü, kitabı birebir kullanmaktan ziyade daha eski tarihin araştırılmasında bir bulmaca parçası olarak görmek gerektiğinin göstergesiydi. Yanlış yorumlar kaçınılmazdır; fakat bu durum tüm bilim dalları için geçerlidir."
 lepsius.1109.f_invention: "Sonunda, şüpheci grup en uç talepleriyle galip geldi. Artık İncil öykülerine, örneğin Roma’nın 7 Kralı efsaneleri ya da Yunan mitolojik hikâyeleri kadar değer biçilecekti — böylece Batı dünyasında İncil’in ayrıcalıklı konumu en azından bu alanda sona ermişti. Arkeolojik buluntular ile İncil pasajları arasındaki tesadüflere yapılan çaresiz göndermeler de oldukları gibi, yani tesadüf olarak kabul edildi. Dolayısıyla İncil ile ne yapılacağı sorusu yalnızca edebiyatın konusu haline geldi. Bazı arkeologlar ayrıca, İncil öykülerinin en fazla Mısır öykülerinden veya Babil mitlerinden kopya edilmiş olabileceği ihtimalini dile getirdi. Bu durumda mesele yalnızca bağımlılık ilişkisini araştırmaktı. Aksi halde, arkeoloji ve tarih açısından dosya kapanmıştı: İncil, bilim için değeri olmayan uydurma hikâyelerin bir derlemesiydi."
 lepsius.1109.g: "Metinleri doğru sınıflandırmak ve yorumlamak gerekir."
 lepsius.1109.h: "İncil, faydasız bir masal kitabıdır."
 lepsius.1109.i: "Bunu zaten önceden biliyorduk."
 lepsius.1111.t: "Arkeoloji Kongresi: Uygarlığın Yükselişi"
 lepsius.1111.d: "Ülkemiz, bir sonraki Arkeoloji Kongresini düzenlemek için gerekli tüm hazırlıkları yaptı. Odak noktası, uygarlığın ilk olarak nerede ortaya çıktığı sorusu olacak. Son bilgilere göre bu yer muhtemelen Babil. Bu da Babil kültürünün diğer kültürleri ne ölçüde etkilediği sorusunu gündeme getiriyor. Dünyanın tüm önde gelen arkeologlarına davetiyeler gönderilecek. Profesör [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] oturuma başkanlık edecek."
 lepsius.1111.f: "Bir Babil uygarlığı olduğu bilgisi asla tamamen kaybolmamıştı — Yunanlılar döneminde bile Babilliler ve Asurlular hakkında bilgi vardı. Ancak Akadca’nın çözülmesi, yaşça Mısırlıları bile gölgede bırakan Sümerler gibi çok daha eski kültürlerin varlığını ortaya çıkardı. Uygarlığa özgü bir dizi buluş bu antik halkların günlük yaşamını şekillendirmişti ve birçok filolog ve arkeolog kısa sürede Babil’in uygarlığın gerçek beşiği olduğundan şüphelenmeye başladı. Antik Mezopotamya’ya duyulan hayranlık, uygarlığın tüm alanlarının Babil’e dayandırılmasına yol açtı: yalnızca İncil değil, Levant ve Pers kültürleri, hatta Mısırlılar bile, özgün Babil kültürünün yalnızca ‘kültür alıcıları’ veya ‘kültür aktarıcıları’ olarak görülüyordu. Bu bilimsel darlık kısa sürede, bizzat taraftarlarının benimsediği alaycı bir ad kazandı: Panbabilonculuk."
 lepsius.1111.g: "Arkeoloji dünyası misafirimiz olmalı."
 lepsius.1112.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName], bizi bir arkeoloji kongresine davet etti. Odak noktası uygarlığın ilk olarak nerede ortaya çıktığı sorusu olacak. Son bilgilere göre bu yer muhtemelen Babil. Bu da Babil kültürünün diğer kültürleri ne ölçüde etkilediği sorusunu gündeme getiriyor. Arkeoloğumuz Profesör [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] sıcak bir davet aldı."
 lepsius.1112.g: "Hep şu en güzel deri ceket kavgaları..."
 lepsius.1113.d_laughed: "Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]'ın gelişi eğlenceyle karşılandı. [ROOT.GetCountry.GetNameNoFlag], Asurbilim alanında kayda değer bir başarıya ulaşmış bir ülke olarak tanınmıyor. Kapalı kapılar ardında açıkça şakalar yapılıyordu."
 lepsius.1113.d_respected: "Arkeoloji Kongresi başlamadan önce arkeoloğumuz sıcak bir şekilde karşılandı ve olağan nezaketler yerine getirildi. [ROOT.GetCountry.GetNameNoFlag], araştırma dünyasında tanınan bir itibara sahiptir."
 lepsius.1113.d_lauded: "Profesör [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]'ın gelişi büyük bir sevinçle karşılandı. Kendisi en çok beklenen misafirlerden biri olarak görülüyordu. [ROOT.GetCountry.GetNameNoFlag], Asurbilim alanında öncü sayıldığından etrafında hızla bir kalabalık oluştu."
 lepsius.1114.t: "Babil: Uygarlığın Beşiği mi?"
 lepsius.1114.d: "Kongre süresince uygarlığın kökeni sorusu giderek, Babil’in Orta Doğu ve Doğu Akdeniz’deki tüm kültürleri ne ölçüde etkilediği sorusuna dönüştü. Bazıları, sonradan rol oynayan hemen her fikrin antik Babil’de doğduğunu varsayıyor!"
 lepsius.1114.f: "Profesör [SCOPE.sCharacter('lepsius_babylon_defender_scope').GetLastName], 4.000 yıldan daha uzun süre önceki kültürel başarılar ve yüksek Babil bilgisi üzerine son derece ilginç bir katkıyla başladı: 'Sümer-Babil kültür dünyası, tüm devlet ve toplumsal örgütlenmelerin düzenlendiği bir dünya teorisini varsayar. Tüm bilimler ve sanatlar gökten vahyedilen ilksel bir bilgelikten doğmuştur; bu bilgelik doğrultusunda mülkiyet yönetilir ve korunur. Panbabilonculuk, bu astral dünya görüşünün dünyadaki tüm kültür ve dinlerde iz bıraktığına dair kanıt sunmayı amaçlar.' Ancak bu görüş, kısa sürede sözcüsü [SCOPE.sCharacter('lepsius_babylon_attacker_scope').GetFullName] olan çok sayıda akademisyenin güçlü muhalefetine yol açtı. O, tüm mitlerin Babillilerden türediği fikrini reddetti. '[SCOPE.sCharacter('lepsius_babylon_defender_scope').GetLastName]’in söyledikleri olgulardan çok kurguydu. Paralel gelişmelerin olamayacağı fikri gerçek dışıdır — örneğin Mısır hiyeroglifleri çivi yazısından esinlenmemiştir.' Panbabiloncular, Mezopotamya’yı merkeze yerleştirip tüm diğer mitolojileri kenara itmeye çalışırken, kültürlerin ortak bir spektrumda yaşayabileceğini tamamen gözden kaçırdılar."
 lepsius.1114.g: "Babil, Uygarlığın Beşiğidir."
 lepsius.1114.h: "Uygarlık birden fazla yerde doğdu."
 lepsius.1119.t_panbabylonism: "Uygarlığın Yükselişi: Panbabilonculuk Zaferi"
 lepsius.1119.t_antipanbabylonism: "Uygarlığın Yükselişi: Panbabilonculuk Çürütüldü"
 lepsius.1119.d_panbabylonism: "Çok sayıda akademisyen arasında ayrılıklara yol açan hararetli bir tartışmanın ardından, kongre nihai bir bildiride uzlaştı. Buna göre Mezopotamya yalnızca uygarlığın beşiği değil, aynı zamanda Orta Doğu’daki tüm mitolojik fikirlerin de çıkış noktasıdır."
 lepsius.1119.d_antipanbabylonism: "Tartışmalar sona erdi ve bazı sert sözlü atışmaların ardından bilim insanları toparlanarak Panbabiloncu kampın nihai yenilgisini mühürleyen bildiriyi imzaladı. Doğrudur, Mezopotamya uygarlığın en önemli beşiklerinden biri olarak kabul edildi; fakat tek beşik değildi. Tüm mitolojiyi Babillilere dayandırma girişimi daha başlangıçta boşa çıkarıldı."
 lepsius.1119.f_panbabylonism: "Nihai bildiri, Panbabiloncu takipçilerin ileri sürdüğü tüm teorileri doğruladı: Doğu mitolojisinin ve edebiyatının Babil kültürüne bağımlılığı açıktı. Hem İncil hem de Mısır mitleri, Gılgamış Destanı’nda görülenler gibi, iyi bilinen Babil fikirlerine açıkça bağımlıydı. Sonuçta Orta Doğu’nun tüm gelişimi, kimi zaman daha belirgin kimi zaman daha az belirgin şekilde, bu özgün kültürün astronomi ve astrolojisinden kültürel olarak güçlü biçimde etkilenmişti."
 lepsius.1119.f_antipanbabylonism: "Panbabilonculuğun taraftarları son zamanlarda azınlıkta kaldı. Akademisyenler, Mezopotamya kültürlerinin birçok başarısının Orta Doğu’nun düşünsel altyapısının çekirdeğinde yer aldığını kabul ettiler. Ancak, nihai bildiride mutlakiyet iddiasını, hatta ‘ilk kültür’ iddiasını reddettiler. Babil düşüncesinin başlangıç noktası sayılan astronomik araştırmaların aslında daha sonraki bir gelişme olduğu, yanlış biçimde başa konulduğu ortaya çıktı. Ayrıca bilim insanları Babil geleneğinin önceliğini de kabul etmedi: aksine, çeşitli ‘Babil’ öykülerinin aslında bölgedeki geleneklerin ortak bir mirası olduğu, Babillilerin yalnızca bunları ilk yazıya geçirenler olduğu anlaşıldı. Özellikle acı bir cümle öne çıktı ve Panbabilonculuğu kısaca sahtebilim ilan etti: 'Bu mistik bilgelik, ne yazık ki hâlâ müritleri bulunan büyük piramitteki tüm boyutların ‘ilk vahyi’nden daha fazla bilimsel öneme sahip değildir.'"
 lepsius.1119.g: "Her şey Mezopotamya’da başladı."
 lepsius.1119.h: "Tek bir köken yoktur."
 lepsius.1121.t: "Arkeoloji Kongresi: Truva’nın Statüsü"
 lepsius.1121.d: "Ülkemiz, bir sonraki Arkeoloji Kongresini düzenlemek için gerekli tüm hazırlıkları yaptı. Konferans, Truva sorununun nihayet çözümlenmesini amaçlıyor. Heinrich Schliemann’ın çarpıcı kazılarına rağmen, onun aslında ne bulduğu, bunun gerçekten Truva olup olmadığı ve Truva’nın bu biçimde var olup olmadığı sorusu tümüyle yerindedir. Dünyanın tüm önde gelen arkeologlarına davetiyeler gönderilecek. Profesör [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] oturuma başkanlık edecek."
 lepsius.1121.f: "Schliemann, Truva’yı keşfettiğini açıkladıktan sonra, daha kuşkucu zihinlerin şoklarını atlatmaları biraz zaman aldı. Daha sonraki incelemeler, Schliemann’ın yanlış tabakada kazı yaptığı gibi, bulduğu sözde 'Priamos’un Hazinesi’nin de Homeros’un Truva’sından çok daha eski olduğunu ortaya koydu. Kısa sürede Schliemann’ın yanlış şehri kazmış olabileceği söylentisi yayıldı. Kimileri, var olmayan bir şeyin kazılamayacağını iddia etti. Başkaları ise Schliemann’ın keşfini savundu ve onun, eski tasvirlere dayanarak kanıtı sunduğunu gördü. Roma buluntuları da, Yunanlıların ve Romalıların bu yeri Truva Savaşı’nın geçtiği yer olarak kabul ettiklerini kanıtladı. Truva’nın keşfi bilimsel tartışmayı sona erdirmedi, sadece yeni bir aşamaya taşıdı."
 lepsius.1121.g: "Arkeoloji dünyası misafirimiz olmalı."
 lepsius.1122.d: "[SCOPE.sCountry('lepsius_congress_host_country').GetName] bizi bir arkeoloji kongresine davet etti. Konferans, Truva sorununun nihayet çözümlenmesini amaçlıyor. Heinrich Schliemann’ın çarpıcı kazılarına rağmen, onun aslında ne bulduğu, bunun gerçekten Truva olup olmadığı ve Truva’nın bu biçimde var olup olmadığı sorusu tümüyle yerindedir. Arkeoloğumuz Profesör [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] sıcak bir davet aldı."
 lepsius.1122.g: "Yine kimin deri ceketinin daha güzel olduğu tartışmaları..."
 lepsius.1123.d_laughed: "Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]’ın görünüşü eğlenceyle karşılandı. [ROOT.GetCountry.GetNameNoFlag], Ege Arkeolojisi alanında dikkate değer bir başarı elde etmesiyle tanınmıyor. Kapalı kapılar ardında açıkça şakalar yapılıyordu."
 lepsius.1123.d_respected: "Arkeoloji Kongresi başlamadan önce arkeoloğumuz sıcak bir şekilde karşılandı ve olağan nezaketler yerine getirildi. [ROOT.GetCountry.GetNameNoFlag], araştırma dünyasında tanınan bir itibara sahiptir."
 lepsius.1123.d_lauded: "Profesör [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]’ın gelişi büyük bir sevinçle karşılandı. Kendisi en çok beklenen misafirlerden biri olarak görülüyordu. [ROOT.GetCountry.GetNameNoFlag], Ege Arkeolojisi alanında öncü sayıldığından etrafında hızla bir kalabalık oluştu."
 lepsius.1124.t: "Truva: Sadece Bir Efsane mi?"
 lepsius.1124.d: "Truva’nın statüsüne ilişkin tartışma beklenenden de daha çetrefilli geçti. Yalnızca iki değil, üç kamp ortaya çıktı. İlk grup, Schliemann’ın tüm tezlerinin doğru olduğuna bütünüyle ikna olmuş tutkulu destekçilerden oluşuyordu. Buna, Schliemann’ın kazı alanının Homeros’un Truva’sıyla ilgisinin çok zayıf olduğuna inanan uzlaşmaz bir karşıt kamp karşı çıktı. Üçüncü grup ise Schliemann’ın ciddi hatalar yaptığını, ancak bunun aslında aradığı şehir olduğunu düşünüyordu."
 lepsius.1124.f: "'Eğer Schliemann Truva’yı bulmadıysa, ne buldu? İlyada ve antik yazarların tasvirlerine uyan bir yer buldu. O döneme uygun bir yapı buldu. Ve düşmanlar tarafından yıkılmış gibi görünen bir yapı buldu. Daha ne kadar kanıt gerek?' diye sözlerine başlayan Prof. [SCOPE.sCharacter('lepsius_troy_defender_scope').GetLastName], meslektaşı [SCOPE.sCharacter('lepsius_troy_attacker_scope').GetLastName]’in çok sayıda sorusuyla kesildi. Örneğin, antik Yunanlılar klasik dönemde Truva’nın nerede olduğunu artık bilmiyorlardı ve bu yeri Truva ile karıştırmışlardı. Şehrin adının bilinmemesi, Yunan dünyasıyla nasıl bir ilişkisi olduğuna dair ipucu olmaması. Ve hiçbir güvenilir tarihî kaynağın Homeros’un tasvirlerine benzeyen bir Truva Savaşı’na dair bilgi vermemiş olması. Ardından Bay [SCOPE.sCharacter('lepsius_troy_mediator_scope').GetLastName] araya girdi: 'Sevgili meslektaşlarım, Schliemann elbette hatalar yapmıştır — ama büyük resmi gözden mi kaçıracağız?'"
 lepsius.1124.g: "Schliemann gerçekten Truva’yı buldu."
 lepsius.1124.h: "Schliemann ‘Truva’yı buldu, ama mesele daha karmaşık."
 lepsius.1124.i: "Bunun gerçekten Truva olduğuna dair gerçek bir kanıt yok."
 lepsius.1129.t_homeric: "Truva: Tarih, Efsane Değil"
 lepsius.1129.t_historical: "Truva: Tarih ve Efsane"
 lepsius.1129.t_myth: "Truva: Efsane, Tarih Değil"
 lepsius.1129.t_disputed: "Truva: Çözülememiş Bir Gizem"
 lepsius.1129.d_homeric: "Yoğun tartışmalar ve birçok sunumun ardından, Hisarlık tepesinde Homeros’un İlion’unu tanıyan Schliemann destekçilerinin kampı üstün geldi. Yalnızca Truva’nın tarihsel gerçekliği değil, aynı zamanda Truva Savaşı ve Homeros destanlarındaki diğer unsurlar da tarihsel bir gerçeklik olarak kabul edildi."
 lepsius.1129.d_historical: "[SCOPE.sCountry('lepsius_congress_host_country').GetName]’de toplanan arkeologlar, en azından Homeros geleneğinin bazı kısımlarının bir gerçeklik özünü içerdiği sonucuna vardılar. Schliemann kazıda yanılmış olsa bile, Hisarlık’ın edebiyat ve tarih yazımında genel olarak Truva olarak tanınan yerle örtüştüğüne dair bazı kanıtlar vardır — gerisi ayrıntıların netleştirilmesinden ibarettir."
 lepsius.1129.d_myth: "Kongre, Truva tartışmasının yüzyıllar sonra sona erdiği sonucuna vardı: Truva’nın sözde keşfi, Homeros destanlarının saf kurgu olduğu kuşkusunu daha da güçlendiren eleştirmenleri haklı çıkardı. Schliemann her ne kazmış olursa olsun, bu Truva olamaz çünkü Truva hiç var olmamıştır."
 lepsius.1129.d_disputed: "Bilim insanları arasındaki siper savaşı son zamanlarda büyük bir hayal kırıklığına ve umursamazlığa yol açtı. Truva sorununun çözümü görünürde yok — ortak bir nihai bildiride bile anlaşamadılar. Bazı temsilciler erken ayrıldı, diğerleri ise vakitlerini daha fazla beyhude tartışmalarla doldurdu."
 lepsius.1129.f_homeric: "Schliemann destekçileri bugün büyük bir zafer kutluyor: Truva’nın kâşifine tüm tezlerinin doğrulandığını ve hatta derneğin fahri üyesi yapılacağını coşkuyla telgrafla bildirdiler. O kesinlikle Truva’yı kazmış ve böylece Homeros destanlarındaki Truva Savaşı’nın bir uydurma, belirsiz bir hatıra değil, tarihsel bir olay olduğunu kanıtlamıştı. Artık Ege bölgesinde daha fazla eser aramak, bir zamanlar 'mitik' diye küçümsenen çağa dair daha çok bilgi sağlayabilir. Araştırmacıların coşkusu, Schliemann’ın tezlerini destekleyecek daha yoğun kazıların yakında yapılmasını sağlayacak: belki Odysseus’un evi, Aşil’in mezarı ya da Agamemnon’un öldürüldüğü küvet bile bulunur? Şaşırtıcı olan, Schliemann’ın henüz telgrafa yanıt vermemiş olması..."
 lepsius.1129.f_historical: "Uzun tartışmalar ve çokça ikna çabasından sonra, kongre üyelerinin çoğu arasında bir uzlaşı sağlandı. Uluslararası arkeoloji topluluğunun büyük çoğunluğu, Schliemann’ın Truva kazısında ciddi hatalar yaptığı görüşünde — özellikle yanlış tabakada araştırma yaptığı açıktı. Ancak bu sadece Schliemann’ın 'yanlış' Truva’yı 'doğru' yerde bulduğu anlamına gelir. Başka bir tabaka gerçekten Truva Savaşı dönemine ait şehri barındırıyor olabilir. Arkeologlar bunun tarihsel bir olay olup olmadığını kesinleştiremediler; gerçek şu ki Truva’nın bulunduğu tepe birçok kez yangınlara ve savaşlara kurban gitmişti. Şehrin kimliğiyle ilgili olarak Hitit etkisi tezi doğrulandı. Bilim insanları bu sonuçları daha yoğun araştırmalar için bir fırsat olarak kullanacaklarını ve Truva meselesini tartışmaya devam edeceklerini duyurdu."
 lepsius.1129.f_myth: "Ciddi tartışmalardan sonra arkeologlar ve tarihçiler — kimileri sadece içlerinde homurdanarak — ortak bir bildiriye imza atmayı başardılar. Buna göre, Homeros destanlarını yalnızca eski olaylara belki atıfta bulunan, fakat modern arkeoloji için yeniden inşası güç olan edebî ürünler olarak görüyorlar. Daha çok Truva Savaşı’nın, 'savaş' denen olgunun insanlık deneyimini yansıttığı bir simge olarak kabul edilmesi söz konusu olabilir. Dolayısıyla Truva’nın tarihsel içeriği, belki Atlantis’inki kadardır: bir tür ütopya, fikirlerin tartışıldığı edebî bir mekân. Kongre esasen Truva araştırmalarını 'sözdebilimin kıyısında' bir faaliyet ilan etti; hem amaçsız hem de faydasız. Arkeoloji artık daha değerli alanlara yönelmelidir."
 lepsius.1129.f_disputed: "'En azından yemekler güzeldi!'"
 lepsius.1129.g: "Yani Schliemann gerçekten Truva’yı bulmuş!"
 lepsius.1129.h: "Schliemann yanlış Truva’yı kazdı, ama yeri doğru."
 lepsius.1129.i: "Truva büyük olasılıkla saf edebiyattır."
 lepsius.1129.j: "Bu kongrenin tamamı tam bir vakit kaybıydı!"
 lepsius.1201.t: "[SCOPE.sState('lepsius_excavation_site').GetName]’de Yerel Kazı Alanı"
 lepsius.1201.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName], [SCOPE.sState('lepsius_excavation_site').GetName]’de yeni bir kazı alanı belirledi. Kendisi ve ekibi hemen çalışmalara başladı. Ancak kazının ne kadar süreyle finanse edileceği henüz belli değil."
 lepsius.1201.f: "Bir kazıya 5, 7 veya 10 yıl için izin verilebilir. Yurtdışındaki bir kazının aksine, bu herhangi bir zamanda iptal edilemez. Baş arkeolog, süresine bağlı olarak 6, 12 veya 18 ay boyunca kazı alanında kalacak, ardından geri dönecektir. Bu süre zarfında kendisi müsait olmayacaktır."
 lepsius.1201.g: "10 yıl."
 lepsius.1201.h: "7 yıl."
 lepsius.1201.i: "5 yıl."
 lepsius.1202.t: "Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] Kazı Alanından Dönüyor"
 lepsius.1202.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName], son birkaç ay içinde [SCOPE.sState('lepsius_excavation_site').GetName]’deki arkeolojik kazı alanının kurulmasına yardımcı oldu ve bazı ilk keşifler yaptı. Üniversitesine değerlendirme için geri dönüyor, bu sırada ekip kazıya bağımsız olarak birkaç yıl daha, fon tükenene kadar devam edecek."
 lepsius.1202.f: "'Az iş türünde sonuçlar, çalışanın kişiliğine kazılarda olduğu kadar doğrudan bağlıdır. Eski bir söz, bir insanın bir konuda aradığını bulduğunu söyler; bu çok doğrudur. Ya da aradığını bulacak sezgisi yoksa, en azından aramadığı hiçbir şeyi bulmadığı acı gerçeği doğrudur.' -Flinders Petrie"
 lepsius.1202.g: "Tekrar hoş geldin."
 lepsius.1203.t: "Yerel kazı tamamlandı"
 lepsius.1203.d: "Kazı ekibi yerel kazıyı tamamladı ve bazı son buluntuları kaldırdı. Artık diğer kazılar veya seferler için tekrar kullanılabilir."
 lepsius.1203.f: "'Dunkel sind des Schicksals Wege,\nungewiß der Zukunft Stern,\neh ich mich zu Bette lege,\ntrink ich einen Kognak gern.' -Robert Koldewey"
 lepsius.1203.g: "Yakında başka bir kazı yapmalıyız."
 lepsius.2000.t: "[SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetLastName], Üç Çağ Sistemini icat ediyor"
 lepsius.2000.d: "Danimarka Ulusal Müzesi’nin direktörü [SCOPE.sCharacter('lepsius_new_archaeologist_scope').GetFullName], arkeolojik buluntuları #b Taş Çağı#!, #b Tunç Çağı#! ve #b Demir Çağı#! olarak üç dönemde sınıflandıran bir sistem icat etti. Bu, Arkeoloji için devrim niteliğinde!"
 lepsius.2000.f: "\"Görüyorsunuz, bazı eserler her zaman birlikte ortaya çıkıyor ve bazı malzemeler ise hiçbir zaman aynı kazıda bulunmuyor. Gümüş mesela yalnızca demir alet ve silahların bulunduğu yerlerde görülüyor. Altın ise hem demir hem de tunç aletlerle birlikte bulunabiliyor.\nBir diğer ilginç nokta, bazı malzemelerin yalnızca belli mezar türlerinde görülmesi. Taş aletler sadece gömülmüş cesetlerle ve taş-odalı mezarlarda bulunabiliyor. Demir ise tümsekli mezarlardaki odalı mezarlarda çıkıyor.\nTüm bunlar, buluntularımızı çok daha kesin bir şekilde tarihlendirmemize olanak sağlıyor. Önce taş aletler vardı, sonra tunç aletler ve ancak ondan sonra demir aletler ortaya çıktı.\""
 lepsius.2000.g: "Böyle bir büyük zihin bizim için çalışmalı!"
 lepsius.2000.h: "Müzesinde kalabilir..."
