 lepsius_antiquarianism_tech: "Antikacılık"
 lepsius_antiquarianism_tech_desc: "Sanat hazinelerinin koleksiyoncuları, İtalyan Rönesansı’ndan bu yana geçmişe ilgi duydular. Johann Joachim Winckelmann, antik Roma ve Yunan’a ilgiyi artırırken, Napolyon’un seferleri geçmişin uykusundan Mısır’ı uyandırdı. Buna rağmen, arkeoloji-öncesi araştırmalar, araştırma yöntemleri hazine avcılığı ile mezar soygunculuğu arasında gidip gelen Giovanni Battista Belzoni gibi maceraperestler tarafından şekillendirildi."
 lepsius_early_archaeology_tech: "Erken Arkeoloji"
 lepsius_early_archaeology_tech_desc: "Champollion’un hazırlık çalışmalarının ardından, Karl Richard Lepsius Mısır hiyerogliflerini tamamen çözmeyi başardı. Bu, arkeolojik sahnede bir değişimi simgeliyordu: arkeoloji dernekleri, enstitüler ve müzeler yeni bir bilimsel kültürü teşvik etti. Buna rağmen, anıt korumanın kurucu babalarından Auguste Mariette, keşfedildiğinde Serapeum’u patlayıcılarla açmaktan çekinmedi."
 lepsius_modern_archaeology_tech: "Modern Arkeoloji"
 lepsius_modern_archaeology_tech_desc: "Arkeolojik saha metodolojisindeki ilerlemeler 19. yüzyılın sonlarında ortaya çıktı. Bu alandaki öncülerden biri, güney İngiltere’de Cranborne Chase’te titizlikle kazılar yapan Augustus Pitt Rivers’tı; sadece güzel veya değerli eşyaların değil, sıradan eşyaların da kaydedilmesi gerektiğini vurguladı. Flinders Petrie ise arkeolojiye ve eserlerin korunmasına sistematik yöntem kazandırdı."
