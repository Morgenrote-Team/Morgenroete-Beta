 je_lepsius_archaoelogical_society: "Arkeoloji Cemiyeti Kur"
 je_lepsius_archaoelogical_society_reason: "Ülkemizde arkeolojiye olan ilgi sürekli artıyor. Yıllar süren seferler, kazılar ve eser keşiflerinden sonra ülkemiz olağanüstü bir arkeolojik uzmanlık biriktirdi. Önde gelen bir arkeolog, bilimsel ve entelektüel güçleri bir araya getirmek ve yeni bir ivme sağlamak için bir Arkeoloji Cemiyeti kurabilir. Bu yalnızca bilimsel çıktımızı artırmakla kalmaz, aynı zamanda sonraki nesil arkeologların tecrübesini de zenginleştirir."
