 je_lepsius_palmyra_reason: "#T Suriye’deki Palmira Harabeleri, arkeologlar için büyüleyici bir yerdir.#!\n$mr_divider_for_je$\nHer ay birçok farklı faktöre bağlı olarak ilerleme kazanırsınız. Kazının belirli aşamalarında size [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')], deneyim ve eyalet niteliğini değiştiren etkinlikler verilir; bu da daha fazla [concept_curtiss_tourism] geliri sağlar.\n$mr_divider_for_je$\n$lepsius_excavation_progress_loc$"
