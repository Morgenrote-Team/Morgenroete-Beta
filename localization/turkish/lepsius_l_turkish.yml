 lepsius_mascapaicha_knowledge_modifier: "Ataların Bilgeliği"
 je_lepsius_mascapaicha: "Quipu’yu Çözmek"
 je_lepsius_mascapaicha_reason: "Quipu araştırması şimdiye kadar cevapladığından çok daha fazla soru ortaya çıkardı. Kesin olan bir şey var: bu, bir diziye atanabilecek yerlerin adlandırılmasıdır; sayılar farklı kabileleri temsil eder ve bu dizilim bir tür güzergâhı işaret eder. Kısacası: Quipu bir çeşit hazine haritasıdır. Bu gizemi yalnızca deneyimli bir arkeolog tamamen çözebilir. İnkaların böylesine dikkatle gizlediği şey hâlâ belirsizdir; onu ortaya çıkarmak için sıradan bir keşif ekibinden farklı küçük bir özel ekip kurmalıyız: arkeolog ve ataşenin yanı sıra bizi doğrudan And Dağları’na uçuracak bir pilota da ihtiyacımız var."
 je_lepsius_mascapaicha_success: "Quipu çözüldü."
 lepsius_decode_quipu_button: "Quipu’yu Çöz"
 lepsius_decode_quipu_button_desc: "Quipu’yu başarıyla çözmek için deneyimli ya da ünlü bir arkeolog ve Mezoamerikan eserleri üzerine eğitimli bir departman gereklidir."
 lepsius_decode_quipu_tt: "Quipu bir süre sonra çözülecek."
 lepsius_decode_quipu_done_tt: "Quipu’yu Çöz."
 lepsius.474.t: "Gizemli Quipu"
 lepsius.474.d: "Perulu rehber, keşif ekibini birçok yerlinin bile bilmediği gizli bir noktaya götürdü. En az dört yüz yıldır girilmeyen terk edilmiş bir tapınak yapısında garip bir nesne buldular."
 lepsius.474.f: "[SCOPE.sCharacter('lepsius_archaeological_expedition_leader').GetFullName], buranın eşsiz bir tarafı olduğunu hemen sezdi. Bu tapınak, İspanyol fethinden önce terk edilmişe benziyordu. Binanın sonunu getiren işgal değil, unutulmuşluk olmuştu. İlk bakışta, Francisco Pizarro’nun gelişinden önce İnkaların hayatı hakkında bilgi verecek hayal kırıklığı yaratacak kadar az kalıntı vardı. Ekip, zorunlu arkeolojik işlemlerle yetinirken bir asistan, sunak benzeri bir blokta uğursuz bir nesne buldu. Bu, İnkaların sayıları, istatistikleri ve verileri kaydetmek için kullandıkları düğümlerden oluşan bir Quipu’ydu. Ancak o kadar karmaşıktı ki yerinde çözmek neredeyse imkânsızdı."
 lepsius.474.g: "Daha yakından incelemek için eve götürülmeli."
 lepsius.571.t: "Quipu’nun Sırrı"
 lepsius.571.d: "Son Peru seferinden geri getirilen quipu’yu, evdeki akademisyenler bile çözmekte zorlanıyor. Bilim insanları artık bunun yalnızca bir sayı kaydı olmadığında hemfikir."
 lepsius.571.f: "Daha yakından yapılan incelemeler ve bilinen düğüm sistemleriyle karşılaştırmalar sonrasında, birçok üniversiteden bilim insanları ve Arkeoloji Müzesi çalışanları, düğümlerin zaten bilinen bir sistemi yansıttığı sonucuna vardılar. İlk bakışta bunun pek anlamı yoktu — sırf bir vergi listesi ya da nüfus sayımı varsayımı yapıldığında. Aslında bu bir yerler koleksiyonuydu. İsimler diğer Quipu kayıtlarından biliniyordu ama yer adlarından çok, belirli klanların yerleşim noktalarına işaret ediyordu. En yaygın teori, bunun bir çeşit yol tarifine benzer olduğuydu. Nereye çıktığı ise hâlâ belirsizdi."
 lepsius.571.g: "Bu düğüm yumağı... bir harita mı?"
 lepsius.572.t: "Mascapaicha’nın Peşinde"
 lepsius.572.d: "[SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName], yalnızca şifreli haritanın işaret ettiği yeri keşfettiğine inanmakla kalmıyor — aynı zamanda oranın ne olabileceğine dair de bir teoriye sahip. [SCOPE.sCharacter('lepsius_pilot_scope').GetFullName] ve [SCOPE.sCharacter('lepsius_archaeologist_attache').GetFullName] ile birlikte And Dağları’nın en yüksek zirvelerine özel bir göreve çıkıyor."
 lepsius.572.f: "Quipu’nun sırrını ortaya çıkarmak zordu. Notların coğrafi bir nitelikte olduğu, bir yere götürmek için tasarlandığı doğrulandı; öyle uzak bir yer ki oraya ulaşmak neredeyse imkânsızdı. [SCOPE.sCharacter('lepsius_pilot_scope').GetLastName], bu çetin bölgede uçağın inebileceği kadar büyük bir pist bulma ihtimaline fazla umut bağlamamaları gerektiğini belirtmişti. Ancak askerî kayıtlarda, hedef bölgeye yakın bu amaç için elverişli bir plato olduğu görülüyordu. Oradan hedefe yalnızca yaklaşık 10 millik bir yürüyüş kalıyordu. Peru’ya uçuş sırasında Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName], ikisine de orada ne olabileceğine dair teorisini açıkladı. Quipu’nun bulunduğu yapının, İspanyollar gelmeden önce Huayna Capac döneminde inşa edildiğini düşündürmesi; imparatorluk Huascar ile Atahualpa arasındaki iç savaşla yıkılmadan önceki bir döneme işaret ediyordu. Burada, imparatorluğun çöküşünden önceki birlik ve ihtişamı temsil eden, Atahualpa’dan özellikle saklanmış bir şey olabilirdi. Çünkü Atahualpa, birçok kişi tarafından kardeşi Huascar’a karşı darbe yapmış gayrimeşru bir hükümdar sayılıyordu. Sapa İnka’nın gücünü en iyi şekilde simgeleyen ve kayıp kabul edilen bir nesne: Huayna Capac’ın tacı, Mascapaicha."
 lepsius.572.g: "Bu arkeolojik bir sansasyon olurdu."
 lepsius.573.d: "[SCOPE.sCharacter('lepsius_pilot_scope').GetFullName], hedefe yakın uygun bir iniş alanı bulur. Ancak Mascapaicha’nın bulunduğu varsayılan yere doğru ilerlerken, üçlü kısa sürede görkemli bir keşfe rastlar."
 lepsius.573.f: "Quipu’yu [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHis] elinde bir çubuk gibi tutarak [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName], küçük grubu dağ yamacına yönlendirdi. Orada baş döndürücü yüksekliklerde kama gibi yerleştirilmiş basamaklar vardı. Üçlü birkaç metre tırmanıp sarmaşıklarla kaplanmış bir patika buldu. Arkeoloğun kısa bir incelemesi hiçbir şüphe bırakmadı. Özenle yerleştirilmiş kübik taşlar açıkça İnka dönemine aitti. İnka Yolu’nu takip ederek, uçaktan görünmeyen sisle kaplı bir vadiye indiler. Mil üstüne mil yürüdüler. Aniden [SCOPE.sCharacter('lepsius_pilot_scope').GetLastName] bir şey fark etti. Sise rağmen bir parıltı belirginleşti. Altındı. Saf altın. Devasa altın! Üç katlı bina yüksekliğinde dev bir idol, sisin içinden yükseliyordu. [SCOPE.sCharacter('lepsius_pilot_scope').GetLastName] patikadan ayrılıp yaklaşmaya başladı. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] bunun bir tuzak olabileceğini düşünerek [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHim] geri çağırmak istedi. Böyle bir dikkat dağınıklığı tehlikeli olabilirdi. Ancak [SCOPE.sCharacter('lepsius_attache_scope').GetLastName] kararsız kaldı."
 lepsius.573.g: "Biraz altının kimseye zararı olmaz."
 lepsius.573.h: "Sadece alçakgönüllü olan Mascapaicha’yı bulabilir."
 lepsius.574.d: "Üçlü yollarına devam etti. Fakat aniden [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName], onu durduran bir şey buldu. [SCOPE.sCharacter('lepsius_pilot_scope').GetFullName] ve [SCOPE.sCharacter('lepsius_attache_scope').GetFullName] birkaç metre ilerlemişti ki profesörün ortadan kaybolduğunu fark ettiler."
 lepsius.574.f: "Bir yazıttı. Bir yazıt mı? And Dağları’nda epigrafik kaynaklar mı? Alfabe karşılığı olmayan bir düğüm sistemine sahip bir toplumda mı? Bu başlı başına inanılmaz bir keşifti! Mayalar hiyerogliflere, Aztekler ise piktogramlara dayalı kodekslere güvenmişti. Ama bu, harf benzeri aksanlara sahip bir yazıydı. Bu mümkün olabilir miydi? Ve [SCOPE.sCharacter('lepsius_archaoelogist_scope').GetLastName]’i daha da çok şaşırtan şey şuydu:\n[SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] onları okuyabiliyordu.\nÖnceden bilgi edinmeden. Çalışmadan. Bunun nasıl mümkün olabileceğini en ufak bir şekilde bile anlamadan. Sanki [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] oyma yazının içine parmağını daldırıp içeriğini içine çekmişti. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] onları okumuyordu. Yazı [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHim] konuşuyordu. Ve [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe] kendini ne kadar çok kaptırırsa, öğrendikleri o kadar ezici oluyordu. Çünkü burada bilgi saklanmıştı. Yüzyıllarca, binyıllarca eski; Güney ve Orta Amerika’nın tüm kültürlerinden bilgi. Bu görkemli keşfe bütünüyle kapılmış haldeyken, [SCOPE.sCharacter('lepsius_archaeologist_scope').GetSheHe], ataşenin [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHim] sarstığını, [SCOPE.sCharacter('lepsius_archaeologist_scope').GetHerHim] uzaklaştırmaya çalıştığını fark etmiyordu — pilot ise kararsızca, karşısındaki absürt sahneyi seyrediyordu."
 lepsius.574.g: "Bilgi günah değildir."
 lepsius.575.d: "Grup, gizemli Quipu’nun bir zamanlar bulunduğu tapınağa benzer bir yapıya ulaşır. Araştırmacı bakışlarla etrafına bakan [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName] önderliğinde içeri girerler. Önlerindeki duvarı bir demonun korkunç imgesi kaplamaktadır."
 lepsius.575.f: "Bilinmeyen vadiyi kuşatan ebedî sis, tapınağı da sarmıştı. Duvarları ve heykelleri ince bir örtü gibi kaplıyordu. [SCOPE.sCharacter('lepsius_pilot_scope').GetLastName] bir sigara yaktı ve sise nikotin kokusu ekledi. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName] ipuçları aradı. Ama [SCOPE.sCharacter('lepsius_attache_scope').GetLastName] hiçbir şey fark etmedi. [SCOPE.sCharacter('lepsius_attache_scope').GetSheHe], hipnotize olmuş gibi demon imgesiyle yüz yüze duruyordu. [SCOPE.sCharacter('lepsius_attache_scope').GetHerHis] gözleri, ilkel yaratığın çarpık yüzüne kilitlenmişti. Rüzgâr, [SCOPE.sCharacter('lepsius_attache_scope').GetHerHis] kulaklarına fısıldıyordu. Kelimelere dönüşen rüzgâr. [SCOPE.sCharacter('lepsius_attache_scope').GetHerHim] diz çökmeye çağıran kelimeler. [SCOPE.sCharacter('lepsius_attache_scope').GetSheHe] kutsal bir zeminde duruyordu. Dünyanın efendisi olan bir tanrının toprağında. Dilencileri krallara yükselten, onlara dünyanın krallıklarını emanet eden bir Tanrı. İster prens ister seçilmiş olsun, tüm hükümdarları [SCOPE.sCharacter('lepsius_attache_scope').GetHerHim] önünde yere kapanmaya mecbur eden bir Tanrı. ‘Sana bu krallıkların tüm güç ve görkemini vereceğim; çünkü onlar benim ve ben onları dilediğime veririm. Önümde secde edip bana taparsan, her şey senin olacak.’\nSigara dumanı [SCOPE.sCharacter('lepsius_attache_scope').GetLastName]’in etrafında kıvrıldı. Pilot şaşkın sözlerle konuşuyor ve [SCOPE.sCharacter('lepsius_attache_scope').GetHerHim] kendine getirmeye çalışıyordu. Arkeolog ise yalnızca seyirciydi."
 lepsius.575.g: "Mascapaicha’yı istiyorsan hükmetmelisin."
 lepsius.576.t: "Mascapaicha"
 lepsius.576.d: "Vadide bulunduklarından beri ilk kez sis dağıldı. Prof. [SCOPE.sCharacter('lepsius_archaeologist_scope').GetLastName]’in açığa çıkardığı gizli bir odada sadece bir kaide vardı. Üzerine bir gölge düşüyordu. Bu, düşmüş bir imparatorluğun gölgesiydi. Kaybolmuş bilginin gölgesi. Yitirilmiş altının gölgesi. Sapa İnka’nın tacı, Mascapaicha’nın gölgesiydi."
 lepsius.576.f: "Mascaipacha, Cusco Kralı ve Tawantinsuyu İmparatoru olarak yalnızca Sapa İnka tarafından takılan imparatorluk sembolüydü. Katmanlı, rengârenk örülmüş bir çemberdi; ucundan latu adı verilen, en kaliteli kırmızı yünden yapılmış püsküller, altın tüplerin ucuna sabitlenmiş kırmızı saçaklarla sarkardı. Altın ipliklerle ve dağ karakarasının (İspanyolca’da corequenque denilen kutsal kuş) iki ya da üç dik tüyünden oluşan bir sorguçla süslenmişti. Bu, İnka İmparatorluğu’ndaki en yüksek siyasi otoritenin fiziksel ifadesiydi. Bazı törenlerde Sapa İnka, Mascaipacha’yı elinde taşır, başında ise tüylerle süslü bir savaş başlığı (miğfer) bulunurdu."
 lepsius.576.g: "Bu Huayna Capac’ın tacı olmalı!"
 lepsius.577.t: "And Dağları’nda Ölüm"
 lepsius.577.d: "And Dağları’ndaki özel görevden bir daha haber alınamadı. Ne bir yaşam belirtisi ne de iz vardı. Görünüşe göre seferin Mascapaicha arayışı ölümcül olmuştu."
 lepsius.577.f: "Bilim insanları ve gizli servis ajanları, Andlar’daki seferin ilerleyişini öğrendiklerinde hiçbir ipucu elde edemediler. Geride kalan tek kanıt, ekibin uçağıydı; en azından bir şeylerin yaşandığını kanıtlıyordu. Yerliler ise iniş yerinin lanetli bir vadiye çok yakın olduğunu söylüyordu. Lanetliydi çünkü oraya girenler orada kayboluyordu. Orada demonların cazibesine kapılır ve sefil bir şekilde ölürlerdi. Bilim insanları, bu sis benzeri pusun bilinmeyen bitkilerin sporlarından, kükürt dumanlarından ya da halüsinasyonlara yol açabilecek diğer gazlardan kaynaklanabileceğini öne sürdüler."
 lepsius.577.g: "Kendi yanılsamalarının kurbanı mı oldular?"
 lepsius_specialization_egypt_tech: "Mısırbilim"
 lepsius_specialization_egypt_tech_desc: "Antik Mısır’a odaklanmak, arkeologlarımızın en baştan Mısır Arkeolojisi özelliğine sahip olmasını sağlar. Ayrıca Mısır’daki her kazı için her yıl bir eser daha elde ederiz."
 lepsius_specialization_mesopotamia_tech: "Asuroloji"
 lepsius_specialization_mesopotamia_tech_desc: "Mezopotamya’ya odaklanmak, arkeologlarımızın en baştan Mezopotamya Arkeolojisi özelliğine sahip olmasını sağlar. Ayrıca Mezopotamya’daki her kazı için her yıl bir eser daha elde ederiz."
 lepsius_specialization_aegean_tech: "Ege Arkeolojisi"
 lepsius_specialization_aegean_tech_desc: "Ege Uygarlıkları’na odaklanmak, arkeologlarımızın en baştan Ege Arkeolojisi özelliğine sahip olmasını sağlar. Ayrıca Yunanistan veya Girit’teki her kazı için her yıl bir eser daha elde ederiz."
 lepsius_specialization_precolumbian_tech: "Pre-Kolomb Arkeolojisi"
 lepsius_specialization_precolumbian_tech_desc: "Pre-Kolomb Kültürleri’ne odaklanmak, arkeologlarımızın en baştan Pre-Kolomb Arkeolojisi özelliğine sahip olmasını sağlar. Ayrıca Orta veya Güney Amerika’daki her kazı için her yıl bir eser daha elde ederiz."
