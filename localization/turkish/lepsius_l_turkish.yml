 je_lepsius_specialization: "Arkeolojik Uzmanlık"
 je_lepsius_specialization_reason: "Bir ulus yalnızca bir kez arkeolojik odak seçebilir. Arkeolojik alt kategoriye bağlı olarak, her kazı için yılda bir ek eser (Mısır, Mezopotamya, Ege, Pre-Kolomb) elde eder. Yeni arkeologlar ilgili uzmanlık özelliğini kazanır ve seferin sonunda 5 eser daha bulur."
 je_lepsius_specialization_success: "[GetPlayer.GetName], bir arkeolojik uzmanlık seçti."
 lepsius_archaeological_expedition_specialization_tt: "Arkeoloğumuzun uzmanlığı sayesinde fazladan #G 5#! [Concept('concept_lepsius_artifact','$concept_lepsius_artifacts$')] elde ederiz."
 lepsius_add_1_specialization_clue_tt: "Arkeoloğumuzun uzmanlığı sayesinde fazladan #G 1#! ipucu elde ederiz."
 je_lepsius_alexander: "Büyük İskender’in Mezarı"
 je_lepsius_alexander_reason: "Büyük İskender, tüm zamanların en önemli generallerinden biriydi ve Helenistik imparatorlukların ortaya çıktığı bir dünya imparatorluğu kurdu. Hem saygı duyulan hem de korkulan bir figürdü; mezarı antik çağda bir hac yerine dönüşmüştü. Ancak en geç MS 5. yüzyıldan itibaren mezarın tam yeri bilinmiyordu. Çoğu kaynak, son gömülme yerinin İskenderiye olduğunu söylese de bu bile tamamen tartışmasız değildir. Öncelikli hedefimiz, ister izinle ister zorla, İskender’e ait izlerin bulunduğu alanlarda kazı yapmaktır. İpuçlarını takip ederek mezarı daha kesin biçimde saptayabiliriz. Bunu yapmak içinse bir define avı gibi bir kazı alanından diğerine geçmemiz gerekecek."
 je_lepsius_alexander_success: "Büyük İskender’in mezarına dair yeterince #V Gizemli İpucu#! bulursak, yerini tam olarak belirleyebiliriz."
 je_lepsius_alexander_goal: ""
 je_lepsius_ark: "Ahit Sandığı"
 je_lepsius_ark_reason: "Ahit Sandığı, en yüksek dini ve arkeolojik değere sahiptir. İsrail halkı onu Kudüs Tapınağı’ndaki kutsal mekânın merkezi sayıyordu. Musa zamanından beri On Emir’in koruyucusu olarak Kutsal Toprakların yeniden fethinde onlara eşlik etti. Tanrı’nın halkın ortasındaki varlığının garantörüydü. Nebukadnezar II’nin Kudüs’ü fethinden (MÖ 587/586) beri kayıp kabul edilmektedir. Öncelikli hedefimiz, ister izinle ister zorla, Ahit Sandığı’na dair izlerin bulunduğu alanlarda kazı yapmaktır. İpuçlarını takip ederek gerçek yerini daha kesin biçimde saptayabiliriz. Bunun için bir define avı gibi bir kazı alanından diğerine geçmemiz gerekecek."
 je_lepsius_ark_success: "Ahit Sandığı’na dair yeterince #V Gizemli İpucu#! bulursak, yerini tam olarak belirleyebiliriz."
 je_lepsius_ark_goal: ""
 je_lepsius_atlantis: "Atlantis’in Akıbeti"
 je_lepsius_atlantis_reason: "Atlantis, dünya tarihindeki en büyük insan mitlerinden biridir. Efsanevi şehrin çöküşü bir sembole dönüşmüştür: bir cennetin kaybını, batıda büyük bir ülkenin kehanetini ve gelişmiş bir uygarlığın düşüşünü temsil eder. İlk kez Platon, kaderini bir doğal felaketin mühürlediği güçlü bir deniz gücünden bahseder. Atlantis’in olası varlığı antik çağda bile tartışılmıştır. Yaşlı Plinius gibi bazı yazarlar bu ada krallığının varlığını reddederken, Krantor, Poseidonios ve Strabon gibi başkaları bunun mümkün olabileceğini düşünmüştür. Öncelikli hedefimiz, ister izinle ister zorla, Atlantis’e dair izlerin bulunduğu alanlarda kazı yapmaktır. İpuçlarını takip ederek şehrin yerini daha kesin biçimde saptayabiliriz. Bunun için bir define avı gibi bir kazı alanından diğerine geçmemiz gerekecek."
 je_lepsius_atlantis_success: "Atlantis’e dair yeterince #V Gizemli İpucu#! bulursak, yerini tam olarak belirleyebiliriz."
 je_lepsius_atlantis_goal: ""
 je_lepsius_eldorado: "El Dorado’nun Peşinde"
 je_lepsius_eldorado_reason: "Acaba konkistadorlar sadece masalları ve abartılı hikâyeleri mi takip ediyordu? Efsanevi altın halkların hikâyeleri olmasaydı, Balboa Pasifik’i bulamaz, Hernando de Soto bugünkü ABD topraklarını gezemezdi. Yeni Dünya’nın keşfi farklı olurdu. Cortés ve Pizarro vakaları bu efsaneleri doğruladı. Belki de Amerika kıtasında hâlâ keşfedilmemiş, önemli bir şehir vardır — arkeolojik bulgular bunu destekliyor. Öncelikli hedefimiz, ister izinle ister zorla, El Dorado’ya dair izlerin bulunduğu alanlarda kazı yapmaktır. İpuçlarını takip ederek şehrin yerini daha kesin biçimde saptayabiliriz. Bunun içinse bir define avı gibi bir kazı alanından diğerine geçmemiz gerekecek."
 je_lepsius_eldorado_success: "El Dorado’ya dair yeterince #V Gizemli İpucu#! bulursak, yerini tam olarak belirleyebiliriz."
 je_lepsius_eldorado_goal: ""
