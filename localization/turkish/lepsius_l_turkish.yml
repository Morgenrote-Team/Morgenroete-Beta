 notification_lepsius_rosellini_notification_name: "Lepsius’tan Rosellini’ye Mektup"
 notification_lepsius_rosellini_notification_desc: "Alman filolog Karl Richard Lepsius, hiyeroglif çevirisinin geliştirilmiş hâlini İtalyan Mısırbilimci Ippolito Rosellini’ye yazdığı bir mektupta sundu. Mısır’a bir sefer düzenlenmesi için sesler yükseliyor."
 notification_lepsius_stephens_catherwood_expedition_notification_name: "Stephens & Catherwood Seferi"
 notification_lepsius_stephens_catherwood_expedition_notification_desc: "Amerikalı kâşif John Lloyd Stephens ve Britanyalı sanatçı Frederick Catherwood, Yucatán Yarımadası’ndaki maceralı yolculuklarından döndü – ve ormandaki efsanevi harabelerden bahsettiler. Bilim insanları, Maya kültürünü daha yakından araştırmaya ilgi gösteriyor."
 notification_lepsius_decipherment_akkadian_notification_name: "Akad Dilinin Çözülmesi"
 notification_lepsius_decipherment_akkadian_notification_desc: "Ülkenin tüm gazeteleri, deneyimli bir arkeolog önderliğindeki ünlü araştırmacıların başarısını yazıyor: Mezopotamya’nın antik dilleri artık sır değil. Babilonya ve Asur’un ciddi biçimde araştırılmasının önünde hiçbir engel kalmadı."
 notification_lepsius_support_schliemann_notification_name: "Schliemann Truva’yı Keşfetti!"
 notification_lepsius_support_schliemann_notification_desc: "Alman iş insanı Heinrich Schliemann, uzun süre bir masal olarak görülen Truva’yı keşfetti. Dünyadaki arkeologlar antik Yunan’a yeni bir tutkuyla yöneliyor – her ne kadar bu, efsanevi çağlarda kalsa da."
 notification_lepsius_machu_picchu_notification_name: "Machu Picchu"
 notification_lepsius_machu_picchu_notification_desc: "Bir arkeoloji seferi, And Dağları’nın derinliklerinde kayıp İnka şehri Machu Picchu’yu keşfetti. Araştırmacılar bölgenin daha yoğun incelenmesini teşvik ediyor."
 notification_lepsius_excavation_artifacts_notification_name: "Yeni Kazı Eserleri"
 notification_lepsius_excavation_artifacts_notification_desc: "Bu sabah Arkeoloji Müzemiz, kazı alanlarımızdan gelen yeni eserlerin bulunduğu bir sevkiyat aldı."
 lepsius_hide_archaeological_decisions: "Arkeolojik Kararları Gizle"
 lepsius_hide_archaeological_decisions_desc: "Daha iyi bir genel görünüm için tüm arkeolojik kararları gizle."
 lepsius_show_archaeological_decisions: "Arkeolojik Kararları Göster"
 lepsius_show_archaeological_decisions_desc: "Tüm arkeolojik kararları göster."
 lepsius_cancel_excavation_decision: "Bir Kazı Ekibimizi Geri Çağır"
 lepsius_cancel_excavation_decision_desc: "Bazı durumlarda bir kazı ekibini geri çağırmak faydalı olabilir. Kazanılmış eserlerimiz ve koleksiyonlarımız kalacak, fakat kalıcı kazımız sona erecek."
 lepsius_gather_first_excavation_team_decision: "Yeni Bir Arkeoloji Ekibi Topla"
 lepsius_gather_first_excavation_team_decision_desc: "Ek bir arkeoloji ekibi yetiştirebiliriz. Bu, aynı anda birkaç kazının yapılabilmesi anlamına gelir."
 lepsius_gather_second_excavation_team_decision: "Yeni Bir Arkeoloji Ekibi Topla"
 lepsius_gather_second_excavation_team_decision_desc: "Ek bir arkeoloji ekibi yetiştirebiliriz. Bu, aynı anda birkaç kazının yapılabilmesi anlamına gelir."
 lepsius_gather_third_excavation_team_decision: "Bir Arkeoloğa Yeni Ekip Kurdur"
 lepsius_gather_third_excavation_team_decision_desc: "Ek bir arkeoloji ekibi yetiştirebiliriz. Bu, aynı anda birkaç kazının yapılabilmesi anlamına gelir."
 lepsius_upper_egypt_expedition_decision: "Krallar Vadisi"
 lepsius_upper_egypt_expedition_decision_desc: "Eski başkent Teb ve Krallar Vadisi ile Yukarı Mısır, Mısırbilimin Mekke’si kabul edilir. Bölge için bir kazı lisansı almalı ve Mısır hazinelerini aramalıyız."
 lepsius_lower_egypt_expedition_decision: "Piramitler"
 lepsius_lower_egypt_expedition_decision_desc: "Başlangıcından bu yana Mısır piramitleri insanlığı büyülemiştir. Aşağı Mısır’ın kumlarında kaybolmuş mezarların, tapınakların ve hatta şehirlerin yeniden keşfedilmeyi beklediği söylenir."
 lepsius_babylonia_expedition_decision: "Medeniyetin Beşiği"
 lepsius_babylonia_expedition_decision_desc: "Mezopotamya’nın güney kısmı olan Babilonya, adını bir zamanların güçlü kenti Babil’den alır. Bölge, tekrar tekrar değerli arkeolojik eserlerin bulunduğu ‘medeniyetin beşiği’ olarak kabul edilir. Bu eserler kesinlikle bir müzeye ait olmalı."
 lepsius_assyria_expedition_decision: "Asur’un Bahçeleri"
 lepsius_assyria_expedition_decision_desc: "Asur, Mezopotamya’nın kuzey kısmını ifade eder; Asur ve Ninova gibi iki önemli şehri barındırır. Ülke hakkında bilinen az şey hâlâ İncil’e dayandırılır – fakat belki de daha güvenilir tarihî kanıtlar vardır?"
 lepsius_argolis_expedition_decision: "Agamemnon’un Şehri"
 lepsius_argolis_expedition_decision_desc: "Truva’nın keşfinden sonra, en şüpheci bilim insanları bile antik Yunan efsanelerinin sadece masal olmadığını kabul etmeye başladı. Argolis’te hâlen Tunç Çağı şehirlerinin kalıntıları olduğu söylenir; en bilineni Miken’dir. Bunu kendi gözlerimizle görmeliyiz."
 lepsius_crete_expedition_decision: "Minotor’un Hikâyesi"
 lepsius_crete_expedition_decision_desc: "Efsanevi Kral Minos’un bir zamanlar Girit’e hükmettiği söylenir. Truva ve Miken gibi, bu hikâyede de bir gerçek payı var gibi görünüyor: adada giderek daha fazla efsanevi Minos uygarlığına ait eserler bulunuyor. Ulusumuz da bunlardan bazılarını güvence altına almalı."
 lepsius_yucatan_expedition_decision: "Maya’nın Kayıp Şehirleri"
 lepsius_yucatan_expedition_decision_desc: "Ormanın ortasında bilinmeyen ve devasa şehirlerin raporları arttı. Daha fazla araştırma yapmalı ve Yucatán’a bir arkeoloji seferi göndermeliyiz."
 lepsius_peru_expedition_decision: "İnkaların Gizli Mirası"
 lepsius_peru_expedition_decision_desc: "Pilotlar, Peru üzerinde yaptıkları uçuşlarda And Dağları’nda garip kaleler ve surlu yapılar gördüklerini bildiriyor. Belki de İspanyollar İnka kültürünü tamamen yok etmedi? Yerli direnişin bazı şehirleri bugüne kadar bulunamadı."
 lepsius_found_archaeological_museum_decision: "Bir Arkeoloji Müzesi Kur"
 lepsius_found_archaeological_museum_decision_desc: "Kendine saygısı olan her ulusun başkentinde, en kaliteli bilimsel seferlerden veya cesur maceralardan elde ettiği kültürel zenginlikleri sergileyen benzersiz bir müzesi vardır. Eserlerin sayısı ve koleksiyonların çeşitliliği yalnızca dünyadaki prestijimize değer katmakla kalmaz, aynı zamanda eğitsel değer de taşır."
 lepsius_visit_archaeological_museum_decision: "Arkeoloji Müzesini Ziyaret Et"
 lepsius_visit_archaeological_museum_decision_desc: "Edindiğin eserlerin istatistiklerini görüntüle ve onları prestijli sergilere dönüştür."
 lepsius_appoint_lead_scientist_decision: "Baş Bilimci Ataması Yap"
 lepsius_appoint_lead_scientist_decision_desc: "Arkeoloji Müzesi için yeni bir Baş Bilimci atar. Bu karakter yaklaşık 15 ila 20 yıl boyunca bu görevi üstlenecek. Bu atama, bu süre zarfında onun siyasi sahneden kaybolmasını önleyecektir."
 lepsius_found_archaeological_society_decision: "Bir Arkeoloji Cemiyeti Kur"
 lepsius_found_archaeological_society_decision_desc: "Ülkemizde yalnızca arkeolojiye olan ilgi giderek artmakla kalmıyor. Yıllar süren seferler, kazılar ve eser keşiflerinden sonra ülkemiz olağanüstü bir arkeolojik uzmanlık biriktirdi. Önde gelen bir arkeolog, bilimsel ve entelektüel güçleri toplamak ve yeni bir ivme sağlamak için bir Arkeoloji Cemiyeti kurabilir. Bu yalnızca bilimsel çıktımızı artırmakla kalmaz, sonraki nesil arkeologların deneyimini de zenginleştirir."
 lepsius_inspect_excavation_decision: "Derinlemesine Bir Arkeolojik İnceleme Düzenle"
 lepsius_inspect_excavation_decision_desc: "Kazı yaptığımız bir bölgeye deneyimli bir arkeolog gönderebilir, oradaki çabalarımızı yoğunlaştırabiliriz. Arkeoloğumuz yaklaşık bir yıl içinde yeni bir kazı alanı açacak ve yoğun araştırmalar yürütecek; bu süreçte daha önce bilinmeyen, büyük arkeolojik keşiflere dair ipuçları bulabiliriz. Başarı büyük ölçüde arkeoloğumuzun tecrübesine bağlıdır. Ayrıca bir Arkeoloji Cemiyeti’nin kurulması şansımızı artırır."
 lepsius.2.t: "Profesör Rosellini’ye Mektup"
 lepsius.2.d: "Alman filolog [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName], geliştirdiği hiyeroglif çeviri yöntemini İtalyan Mısırbilimci Ippolito Rosellini’ye yazdığı bir mektupta sundu. Mısır’a bir sefer yapılması için sesler yükseliyor."
 lepsius.2.f: "François Champollion’un ölümünden sonra hiyeroglif araştırmaları durakladı. 1837’de genç Alman filolog [SCOPE.sCharacter('lepsius_archaeologist_scope').GetFullName], Champollion’un yakın dostu ve 1829’daki Fransız-Toskana Mısır seferinden ortak sorumlu olan Ippolito Rosellini’ye bir mektup yazdı. Lepsius, Champollion’un biriktirdiği bilgileri sistematize ederek sundu ve Mısırbilimini ciddi bir bilim dalı haline getirmede önemli rol oynadı. Ayrıca Avrupa’nın siyasi elitlerini gelecekteki Mısır seferleri konusunda ikna etti."
 lepsius.2.a: "Mısır’ın harikalarını keşfedeceğiz!"
 lepsius.3.t: "Stephens ve Catherwood"
 lepsius.3.d: "Amerikalı kaşif John Lloyd Stephens ve Britanyalı sanatçı Frederick Catherwood, Yucatán Yarımadası’ndaki maceralı yolculuklarından döndüler – ve ormandaki efsanevi harabelerden söz ediyorlar. Bilim insanları, Maya kültürünü daha yakından incelemekle ilgileniyor."
 lepsius.3.f: "Yeni Dünya, Avrupalılar kıtaya ulaşmadan önce yalnızca vahşiler ve barbarlara mı yurt olmuştu? Kaşifler John Lloyd Stephens ve Frederick Catherwood bu dünya görüşünü derinden sarstı. Amerikalı ve Britanyalı kaşifler yıllar boyunca Yucatán Yarımadası’nın ormanlarını gezdiler ve kendi ifadelerine göre uzun zaman önce yok olmuş bir Mezoamerikan kültürüne ait 44 farklı yeri ziyaret ettiler. Yerel halk uzun süredir ormandaki unutulmuş şehirler ve gizli tapınaklarla ilgili hikâyeler anlatıyordu; ancak Stephens’ın raporları ve özellikle Catherwood’un çarpıcı litografileri, şimdiye dek tamamen bilinmeyen bir dünyayı gözler önüne serdi. Tapınak, heykel ve stellerin görüntüleri yalnızca romantiklerin hayal gücünü beslemekle kalmadı. ABD ve Avrupa’da bilinmeyen bu uygarlığa yönelik ilgi dalgası meraktan yüceltmeye, oradan da gerçek bilimsel araştırmalara kadar yayıldı."
 lepsius.3.a: "Güzel deri ceket stoklamalıyız."
 lepsius.4.t: "Akad Dilinin Çözülmesi"
 lepsius.4.d: "Ülkenin tüm gazeteleri, deneyimli bir arkeoloğun önderliğinde ünlü araştırmacılar tarafından elde edilen bir atılımı duyuruyor: Mezopotamya’nın kadim dilleri artık sır değil. Babil ve Asur’un ciddi şekilde incelenmesinin önünde hiçbir engel kalmadı."
 lepsius.4.f: "Daha 18. yüzyılda Alman matematikçi Carsten Niebuhr döneminde, çivi yazılı tabletler bilginlerin ilgisini uyandırmış ve bunları çözmek, dilleri çevirmek için girişimlerde bulunulmuştu. Georg Friedrich Grotefend, Anquetil-Duperron ve Antoine Isaac Silvestre de Sacy, Eski Fars çivi yazısının çözülmesinde belirleyici rol oynadılar; çalışmalarının doğruluğu, hiyerogliflerin çözülmesi ve dört dilli ‘Calyus Vazosu’ ile teyit edildi. Daha sonra, artık iyi bilinen Farsçanın yanı sıra Mezopotamya’nın daha eski dillerini de içeren Behistun yazıtının keşfiyle birlikte, Elamca, Babilce ve Akadcanın yüzyıllar sonra tekrar anlaşılır hale gelmesi sadece bir zaman meselesiydi. Bu kadim dilleri bildiğini iddia eden çeşitli Asurbilimciler davet edildi ve akademilerimizden biri onları sınadı: aynı yazıtı birbirlerinden bağımsız olarak çevirmeleri istendi. Şaşırtıcı şekilde, tüm bilim insanlarının çevirileri birbiriyle örtüştü. Artık Mezopotamya’daki insanlığın en eski kültürlerinin ciddi şekilde araştırılması başlayabilir."
 lepsius.4.a: "Biz Champollion’un mirasçılarıyız."
 lepsius.5.t: "Schliemann Truva’yı Keşfetti!"
 lepsius.5.d: "Alman işadamı Heinrich Schliemann, uzun süre masal sayılan Truva’yı keşfetti. Dünyanın dört bir yanındaki arkeologlar, mitolojik antik çağa ait olsa da eski Yunan’a yeni bir tutkuyla yöneliyor."
 lepsius.5.f: "Bilim nerede biter, mit nerede başlar? Günümüz, din ile bilgiyi birbirinden ayırmak için elinden geleni yaptı. On yıllar önce gerçek olduğuna inanılan efsaneleri ve destanları masallar âlemine sürdük. Ama sonra birden dünyaya yayıldı; önce gazetelere, sonra akademilere: Truva bulundu! Homeros’un İlyada’sında anlattığı, Batı’nın her eğitimli yurttaşının bildiği efsanevi Priamos’un şehri – yalnızca bir mit değilmiş. Alman tüccar Heinrich Schliemann, dünyanın büyüsünü yitirmesinden etkilenmedi ve hatta değerli bir hazine bulduğunu iddia ediyor: Priamos’un Hazinesi. Arkeoloji dünyası bu olay karşısında hem şok oldu hem de büyülendi – uzak geçmişten gelen başka hikâyeler de belki gerçektir? Ege kıyılarında keşfedilmeyi bekleyen başka batık şehirler olabilir mi?"
 lepsius.5.a: "Menin aeide, thea, Peleiadeo Achileos ..."
 lepsius.6.t: "Machu Picchu"
 lepsius.6.d: "Bir arkeolojik sefer, And Dağları’nın derinliklerinde kayıp İnka şehri Machu Picchu’yu keşfetti. Araştırmacılar bölgenin daha yoğun şekilde incelenmesini teşvik ediyor."
 lepsius.6.f: "Günümüzde bazı anlatılar baskın durumda. Her şey fethedildi, her şey keşfedildi ve her şey söylendi. Kolonyal bayrağın dalgalanmadığı bir toprak parçası, demiryoluna bağlanmamış bir köy veya bilmediğimiz devrimsel bir teknoloji yok. Ve yine de elitlerin nihilizminin çatladığı anlar oluyor. Kutuplara yarış, göklerin fethi ve insanlığın son gizemleriyle meşguliyet, tarihin bitmediğini gösteriyor. Machu Picchu’nun keşfi, dünyayı anladığımızı ve kontrol ettiğimizi sandığımız halde ne kadar az bildiğimizi gösteren bir parçadan ibaret. Belki de İspanyolları yanıltmak için uydurulduğu düşünülen bilinmeyen İnka şehirlerine dair söylentilerde bir gerçek payı vardır. Özgür İnkaların son başkenti Vilcabamba hâlâ bulunmuş değil..."
 lepsius.6.a: "Fedora’mı kapma vakti!"
 lepsius.10.t: "Müze Açılışı"
 lepsius.10.d: "Arkeoloji Müzesi bugün görkemli bir törenle açıldı."
 lepsius.10.f: ""
 lepsius.10.g: "Müzeyi ziyaret etmek için sabırsızlanıyorum!"
 lepsius.10.h: "Şampanya! Şampanya!"
 lepsius.11.t: "Müze Ziyareti"
 lepsius.11.d: "Arkeoloji Müzesi’ne hoş geldiniz."
 lepsius.11.f: "Müze koleksiyonumuz şu anda toplamda #T #G [ROOT.Var('lepsius_total_artifacts').GetValue]#! eser barındırıyor.#! \n\nEserler şu koleksiyonlara ayrılmıştır: \n\n#T Mısır Koleksiyonu:#! \n#G [ROOT.Var('lepsius_egyptian_artifact_minor').GetValue]#! @lepsius_egypt_minor! küçük eser ve #G [ROOT.Var('lepsius_egyptian_artifact_major').GetValue]#! @lepsius_egypt_major! büyük eser. \n\n#T Mezopotamya Koleksiyonu:#!\n#G [ROOT.Var('lepsius_mesopotamian_artifact_minor').GetValue]#! @lepsius_mesopotamia_minor! küçük eser ve #G [ROOT.Var('lepsius_mesopotamian_artifact_major').GetValue]#! @lepsius_mesopotamia_major! büyük eser. \n\n#T Ege Koleksiyonu:#!\n#G [ROOT.Var('lepsius_aegean_artifact_minor').GetValue]#! @lepsius_aegean_minor! küçük eser ve #G [ROOT.Var('lepsius_aegean_artifact_major').GetValue]#! @lepsius_aegean_major! büyük eser. \n\n#T Prekolomb Koleksiyonu:#!\n#G [ROOT.Var('lepsius_precolumbian_artifact_minor').GetValue]#! @lepsius_precolumbian_minor! küçük eser ve #G [ROOT.Var('lepsius_precolumbian_artifact_major').GetValue]#! @lepsius_precolumbian_major! büyük eser.\n\n#T Arkeolojik Ekipler:#!\nToplam #G [ROOT.Var('lepsius_total_excavation_teams').GetValue]#! ekibimizden #G [ROOT.Var('lepsius_excavation_teams').GetValue]#! tanesi hâlen kullanılabilir durumda."
 lepsius.11.g: "Oldukça öğretici oldu. Bir dahaki sefere kadar!"
